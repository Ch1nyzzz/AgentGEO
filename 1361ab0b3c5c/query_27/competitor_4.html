forced to conclude that, apart from and independent
of color and feature, there must be certain qualities
inherent in the nature of the negro which differentiate
him from other humankind as distinctly as
either color or feature. Believing these surmises
to be correct, it remains for us to show that this 
savage inheritance, modified but uneradicated, has been
perpetuated in the American offspring of an African


</span></p><hr data-dcnode-id="3601"><a data-dcnode-id="3599" name="thoma106"><span data-dcnode-id="3600" instrument_node=""> Page 106</span></a><p data-dcnode-id="3597"><span data-dcnode-id="3598" instrument_node="">



ancestry. Such a task would be simple had the 
imported negro type maintained its characteristics 
free from any infusion of alien blood; in that event 
there is little reason for doubt that the freedman of 
our day would be hardly one remove from his African 
ancestors. The slave offspring, however, underwent 
a physical transformation, and foreign 
miscegenation changed a sensuous savage animal into a 
rational human creature, with a possible attainment 
to manhood and spiritual consciousness.</span></p><span data-dcnode-id="3596" instrument_node="">
</span><p data-dcnode-id="3594"><span data-dcnode-id="3595" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The negro undoubtedly constitutes the most unique 
feature in universal anthropology, and as such 
furnishes a subject for profound psychological investigation 
and social study. There is, of course, broadly 
speaking, a common agreement in the public mind 
that the negro represents an accentuated type of 
human degradation. Beyond this there is a wide 
divergence of opinion as to whether he is a 
normally constituted but unawakened member of 
the human family, a survival of an earlier type of 
man, or a specific type of indurated degeneracy. 
Much may be said both for and against each of 
these views, but the one pregnant fact of which 
intelligent mankind is conscious is, that the negro is in 
every essential respect wholly unlike other races of 
men. It is estimated that the pure and mixed negro 
types of the world number about 160,000,000 of people, 
though the mixed types, native and foreign, are 
largely in excess of the pure negro stock. It is also 
important to know that, while certain well-defined

</span></p><hr data-dcnode-id="3593"><a data-dcnode-id="3591" name="thoma107"><span data-dcnode-id="3592" instrument_node=""> Page 107</span></a><p data-dcnode-id="3589"><span data-dcnode-id="3590" instrument_node="">



changes may be wrought in negro physical character 
by amalgamation, yet, despite the degree and duration 
of such admixture, an aberrant preference for intensified 
negro characteristics is not infrequently exhibited. 
We assume that the negro is still burdened 
with the mental and physical weakness of his 
heritage; and we realize the sum of ancestral characteristics 
transmitted to a people of stationary habits is 
immense, and usually so great as to preclude racial 
variation. This knowledge will shed light on many 
perplexing features of race conduct which appear 
inexplicable.</span></p><span data-dcnode-id="3588" instrument_node="">
</span><p data-dcnode-id="3586"><span data-dcnode-id="3587" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;All human life expresses through physical, mental, 
and moral qualities the three fundamental endowments 
of its nature. We shall now deal with such 
characteristic traits as the mental, moral, and social 
nature of the freedman appears to disclose. True 
intelligence is, to speak from a scientific standpoint, 
"the exact conformity of the inner, to the outer 
order of cognizable phenomena." That is, the law of 
intelligent growth demonstrates all capable advance 
in knowledge to proceed from simple to complex

</span></p><hr data-dcnode-id="3585"><a data-dcnode-id="3583" name="thoma109"><span data-dcnode-id="3584" instrument_node=""> Page 109</span></a><p data-dcnode-id="3581"><span data-dcnode-id="3582" instrument_node="">



states of consciousness, each step of which is attended
by accuracy of conception and adjustment of action
to all preceding phenomena. </span></p><span data-dcnode-id="3580" instrument_node="">
</span><p data-dcnode-id="3578"><span data-dcnode-id="3579" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;In applying these mental laws to the freed people 
the fair inference is that the supreme difficulty of the 
negro mind is its inability to parallel internal with 
external environing phenomena, because there is no 
apparent intelligent apprehension and adjustment of 
its internal mental states to external facts. The 
negro has all the physical endowments of intellect, 
but he has a mind that never thinks in complex 
terms, and, as it is wholly engrossed with units of 
phenomena, the states of consciousness aroused by 
visual or textual impressions rarely suggest sequences. 
The consequence is that the freedman exhibits great 
mental density, and gives conclusive evidence that 
he has neither clear nor distinct perceptions of 
specific facts, inasmuch as in every attempt at primary 
reasoning he falls into confusion and error. There 
is also reason to believe that the negro neither associates 
correlated facts, nor deduces logical sequences 
from obvious causes. He is largely devoid of imagination 
in all that relates to purely intellectual exercises, 
though he has fairly vivid conceptions of such 
physical objects as appeal to the passions or appetite.</span></p><span data-dcnode-id="3577" instrument_node="">
</span><p data-dcnode-id="3575"><span data-dcnode-id="3576" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;There is then no intelligent comprehension and 
adjustment of the freedman's internal mental states 
to external facts, because the former is only engrossed 
with units of phenomena. That many negro people 
are incapable of associating numbers, beyond a few

</span></p><hr data-dcnode-id="3574"><a data-dcnode-id="3572" name="thoma110"><span data-dcnode-id="3573" instrument_node=""> Page 110</span></a><p data-dcnode-id="3570"><span data-dcnode-id="3571" instrument_node="">



elementary numerals, verifies this conclusion. We 
have an example of this kind in the Australian 
negro, the zero, so to speak, of all anthropological 
analysis, who is of such low development as to be 
incapable of dealing with other than units of ideas 
as well as of numbers. Of course, such mental 
conditions forbid any apprehension of simultaneous or 
successive events being acquired; and we shall infer 
that, so long as the negro is devoid of the power of 
introspection, he will neither have the ability to 
analyze his own defects nor determine his relation 
to external phenomena.</span></p><span data-dcnode-id="3569" instrument_node="">
</span><p data-dcnode-id="3567"><span data-dcnode-id="3568" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The accuracy of human knowledge, as is well 
known, depends on the number and quality of stored-up 
concepts,--that is, on the clearness and vividness 
of the images impressed on the brain; and for this 
purpose attention is the fundamental factor. Hence, 
it is not what our visual organs behold, but what, as 
a result thereof, is imprinted on the brain, which 
determines man's intelligence. It is just at this 
point that negroes fail. They see as much with 
their eyes as others do, but for lack of attention 
to details the mental images formed by external 
impressions become vague and indistinct. Having 
no clear notion of that which passes before them, 
nor of that with which they are in daily contact, 
neither the observed experience of others, nor their 
own under like circumstances, ever appears to teach 
them as similar conditions teach others. The negro, 
then, with a visual consciousness perplexed and a

</span></p><hr data-dcnode-id="3566"><a data-dcnode-id="3564" name="thoma111"><span data-dcnode-id="3565" instrument_node=""> Page 111</span></a><p data-dcnode-id="3562"><span data-dcnode-id="3563" instrument_node="">



subjective consciousness bewildered, always betrays
in his normal states a lack of creative and constructive 
aptitude. Nor is such defect made good by any 
faculty of intuitive perception. What he undertakes 
is neither systematic in thought nor logical in 
statement, because his mind,--always dull and dense in 
repose,--when confronted by strange conditions, is 
not only slow to act, but exhibits an obvious want 
of cohesive strength. Nor is that all, for, like all 
people who are neither serious nor earnest, the 
freedman's mental attitude ceaselessly oscillates between 
depression and exaltation.</span></p><span data-dcnode-id="3561" instrument_node="">
</span><p data-dcnode-id="3559"><span data-dcnode-id="3560" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The negro not only lacks a fair degree of intuitive 
knowledge, but so dense is his understanding that 
he blindly follows weird fantasies and hideous 
phantoms. So great is his predilection in this 
direction, that he appears incapable of understanding the 
difference between evidence and assertion, proof and 
surmise. These facts warrant the conclusion that 
negro intelligence is both superficial and delusive, 
because, though such people excel in recollections of 
a concrete object, their retentive memories do not 
enable them to make any valuable deductions, either 
from the object itself, or from their familiar experience 
with it. The explication of such intellectual 
states is to be found in the fact that the chief mental 
anxiety of the freedman is for the immediate 
gratification of his physical senses. He lives wholly in 
his passions, and is never so happy as when 
enveloped in the glitter and gloss of shams. But while

</span></p><hr data-dcnode-id="3558"><a data-dcnode-id="3556" name="thoma112"><span data-dcnode-id="3557" instrument_node=""> Page 112</span></a><p data-dcnode-id="3554"><span data-dcnode-id="3555" instrument_node="">



the frankness of these reflections is only equalled 
by their veracity, we must remember that the negro 
represents an illiterate race, in which ignorance, 
cowardice, folly, and idleness are rife, and one whose 
existence is dominated by emotional sensations. It 
is only from this standpoint, and with this knowledge 
of his being, that his characteristic qualities 
can be fairly ascertained.</span></p><span data-dcnode-id="3553" instrument_node="">
</span><p data-dcnode-id="3551"><span data-dcnode-id="3552" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;To those who know the freedman the fact is 
obvious that the highest aspiration of negro ambition 
is, not to acquire the essential spirit of knowledge, 
but to imitate mechanically what he only 
succeeds in caricaturing. He certainly is not an 
intelligent observer of facts, for he can seldom 
accurately describe objects of daily contact, and 
one may easily discover that there is no such 
thing in his mind as capacity for original definition 
and analysis. We are also thoroughly convinced 
that the negro mind is rarely awakened to 
responsive intelligence by meditative reasoning. Nor 
has it shown, generally speaking, such accurate 
understanding, sound judgment, and correct 
comparisons as would assure a comprehensive and 
discriminating grasp of a given subject. The freedman 
certainly does not realize that the aim and 
consummation of mental development is to know, to do, 
and to be; that real knowledge is a matter of reflection; 
and that such knowledge comprehends, not 
only a particular thing itself in contradistinction 
to all other things, but also its relation to all else.

</span></p><hr data-dcnode-id="3550"><a data-dcnode-id="3548" name="thoma113"><span data-dcnode-id="3549" instrument_node=""> Page 113</span></a><p data-dcnode-id="3546"><span data-dcnode-id="3547" instrument_node="">



Nor is the fact that the freedman readily acquires 
superficial familiarity with theoretical forms and 
symbols of learning any proof that he comprehends 
their significance. He may even excel in textual 
work along elementary lines indicated by defined 
rules, yet he is always entangled in abstract studies, 
for the reason that he accepts all postulated statements 
as complete fundamental truths. What he 
acquires is memorized statements, and not real 
knowledge, because the most clearly expressed principles 
rarely suggest to him concurrent ideas or develop 
new points of view.</span></p><span data-dcnode-id="3545" instrument_node="">
</span><p data-dcnode-id="3543"><span data-dcnode-id="3544" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;To make our meaning clear we need only to state
that when the negro acquires the terminology of things
he vainly imagines himself endowed with a knowledge 
of the subject-matter represented thereby, and
so gets credit from the unthinking class for a knowledge 
he does not possess. And his mental environment
is not only complicated by the fact that in his
quest for knowledge he never gets beyond unverified 
theoretical assertion and memorized verbal learning, 
but also because the opinions he asserts are
echoings of second-hand utterances. He does not
realize the absurd contradictions involved in such a
course, especially in his many-sided attitude toward
American ethical culture and social living. For
while in each of these particulars the negro may
appropriate to himself whatever feature in them
serves his fancy, he does so with reference to its
external effect, and not for any purpose of internal

</span></p><hr data-dcnode-id="3542"><a data-dcnode-id="3540" name="thoma114"><span data-dcnode-id="3541" instrument_node=""> Page 114</span></a><p data-dcnode-id="3538"><span data-dcnode-id="3539" instrument_node="">



personal change. Knowledge, refinement, truth, and
honor are to the negro mind acquirable vestments
that may be put on or off as occasion requires, but 
which in no sense work a reconstruction in the nature 
of man. These conclusions are easily verified. Any 
one fairly conversant with the negro people will 
readily recognize that intellectual veneer, which 
makes up so large a portion of its assumed culture, 
and which is invariably rubbed off and supplanted by 
an insufferable pomposity whenever it is forced into 
illiterate association. That what there is of racial 
scholarship has never passed beyond the mediocre 
and commonplace in mental character is due to the 
fact that the negro is always an imitator and never 
a creator.</span></p><span data-dcnode-id="3537" instrument_node="">
</span><p data-dcnode-id="3535"><span data-dcnode-id="3536" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;As American philanthropy has never instituted 
searching inquiry respecting the fundamental characteristics 
of negro nature, it is pertinent to say that, if the 
foregoing deductions are correct, it follows that our 
negro educational methods are both wrong and profitless. 
There is an enormous waste in time, money, and 
results mainly because we have deliberately blinded 
the natural capacity and natural aptitude of the 
freedman by hedging him about with useless studies. 
It would have been far better for all concerned had 
he been taught a few essential things, and required 
to learn them intelligently and thoroughly. Two 
things, especially he needs to do,--one is to cultivate 
a habit of self-reliance, and the other, to use his 
rational faculty in a common-sense way. He can do

</span></p><hr data-dcnode-id="3534"><a data-dcnode-id="3532" name="thoma115"><span data-dcnode-id="3533" instrument_node=""> Page 115</span></a><p data-dcnode-id="3530"><span data-dcnode-id="3531" instrument_node="">



neither now, nor has he any idea that enlightenment
comes from within or that a man may be learned
without being enlightened. Have we not said that
mental growth is dependent upon the right adjustment 
of the mental organism to physical environment? 
That thoroughness in knowledge is the power
to think conscientiously and accurately to correlate
cause and effect? Sound educational training is a
rational appeal to individual alertness, intelligence,
and energy; it constantly sets knowledge against
ignorance, and skill against incompetence. Culture
and mind are not synonymous terms. It is well
to know that a stalwart mental power, uncultivated, 
is of infinitely more value than the most thoroughly 
cultured feeble intellect could possibly be.
But, inasmuch as the vacuous-minded negro possesses
neither strong mental powers nor intelligent culture,
he is never more than mechanical in mental assimilation. 
He has acquired a nomenclature of abstractions 
in the belief that symbols signify knowledge,
but he does not know that no man understands
a thing who does not perceive its relation to all other
things.</span></p><span data-dcnode-id="3529" instrument_node="">
</span><p data-dcnode-id="3527"><span data-dcnode-id="3528" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We do not decry negro training--on the contrary, 
our insistence is that he shall be trained adequately 
and wisely, but always with reference to the essential 
requirements of race life. It is useful knowledge, 
not useless smattering, which ignorance needs. 
We therefore believe that the end and aim of the 
race's education should be to inculcate self-respect,

</span></p><hr data-dcnode-id="3526"><a data-dcnode-id="3524" name="thoma116"><span data-dcnode-id="3525" instrument_node=""> Page 116</span></a><p data-dcnode-id="3522"><span data-dcnode-id="3523" instrument_node="">



self-restraint, prudent forethought, careful industry, 
honest courage, the grace of patience, the purity of 
maidenhood, the continence of youth, the nobility 
of manhood, the chastity of womanhood. But has 
this been achieved in a system of education which 
merely permits the negro to riot in a saturnalia of 
intelligent animalism? To be sure, he has pondered 
over mathematics and scanned the humanities, though 
neither he nor his teachers realize what insensate 
madness lies in such course. The educated class 
of the race--the result of such teachings--rarely 
seeks for truth in statement, but rather for rhetorical 
flourish, skill in contradiction, and word juggling, 
in order to confuse, bewilder, and impose upon their 
hearers, and to make those among the less informed 
believe them to be wise and all-knowing. So long 
as this shameless mendacity or pretence of learning 
continues, it will prove a fundamental hindrance to 
race awakening.</span></p><span data-dcnode-id="3521" instrument_node="">
</span><p data-dcnode-id="3519"><span data-dcnode-id="3520" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We all know that there is a tremendous difference 
between theory and fact in mental culture. Real 
education is acquired by training the individual mind, 
by the individual himself, to such a degree that it 
becomes an instrument of capable use in daily living. 
But as the negro scorns details, his intellect, we take 
it, is so constituted as to be incapable of indefatigable 
research or luminous penetration, and, so far as 
we can see, his chief mental outfit is nothing more 
than a facile memory for unconnected subjects. He 
always sees things in mass, with neither faculty for

</span></p><hr data-dcnode-id="3518"><a data-dcnode-id="3516" name="thoma117"><span data-dcnode-id="3517" instrument_node=""> Page 117</span></a><p data-dcnode-id="3514"><span data-dcnode-id="3515" instrument_node="">



close observation nor aptitude for analytical detail. 
He is an idle mental-incapable, with a self-satisfied 
knowledge that substitutes shadows for substance, 
darkness for light, sound for sense, chattering for 
wisdom. Small wonder, then, that our freed people are 
slow to comprehend their impotence and folly, but 
swift to display their ignorance. And as they are 
largely wanting in clearly defined ideas and executive 
ability, they are forced to copy the form and bearing of 
others, without knowing the reasons for their actions, 
a thing they will continue to do so long as their 
overshadowing curse is mental imbecility, moral 
induration, and spiritual stupor. Confronted by such 
conditions, it is obvious that the most transcendent 
gift to the negro people would be an endowment of 
universal intelligence. But for any such consummation 
in racial life current methods of enlightenment 
are useless as corrective forces. The negro is immoral; 
he must be endowed with morality. He is lazy, and 
therefore needs to be made industrious. He is a 
coward; he must acquire courage. His conscience 
is dead, his intellect dense; one must be resurrected, 
and the other set aflame by the light of heaven.</span></p><span data-dcnode-id="3513" instrument_node="">
</span><p data-dcnode-id="3511"><span data-dcnode-id="3512" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Not only do negroes lack the ability to acquire clear 
and concise knowledge of ideas and things, but in 
that which they appear to understand there is forever 
wanting judgment in its use. For example, words 
are, as we know, the vehicles of thought: thought, 
the vesture of ideas. Vague speech, therefore, 
indicates misty, incoherent conception, just as clean-cut

</span></p><hr data-dcnode-id="3510"><a data-dcnode-id="3508" name="thoma118"><span data-dcnode-id="3509" instrument_node=""> Page 118</span></a><p data-dcnode-id="3506"><span data-dcnode-id="3507" instrument_node="">



expressions show that the speaker has in his mind 
clearly defined mental images. Negroes have very 
meagre conception of the import of words, and are 
influenced more by sound than sense in their use. 
For illustration, we may take the word virtue, whose 
exact and complete significance no negro 
comprehends--who fails therefore to engraft its import
into the fibre of his being. With him it is a
vocal sound, and not a significant symbol representing
actual, visible, living qualities. The same is
true of words like truth, honor, and integrity. These
are meaningless expressions; and because the negro
cannot connect words with ideas, and ideas with
realities, he lies with avidious readiness, and in all
moods and degrees of enormity, without undergoing
the slightest remorse, and often without any apparent 
sense of prevarication, He lies to please, to 
evade, to conceal, to excuse, to assert, to command. 
He lies to be heard, and will not be silent, though he 
has no truth to utter. He lies not to be outdone in 
speech and glibness,--to gratify his vanity, to satisfy 
his ambition, and win applause from credulous and 
illiterate hearers. But the main cause of negro lying 
is his eager, voluble, incessant chatter. He talks 
too fast and too recklessly to afford time for pause 
or opportunity to think; hence his indiscriminate 
use of words, and the frequently disagreeable, and 
sometimes disastrous, consequences that ensue from 
his ill-timed sentences and falsely gauged phrases.</span></p><span data-dcnode-id="3505" instrument_node="">
</span><p data-dcnode-id="3503"><span data-dcnode-id="3504" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;It will readily be surmised that the negro idea of

</span></p><hr data-dcnode-id="3502"><a data-dcnode-id="3500" name="thoma119"><span data-dcnode-id="3501" instrument_node=""> Page 119</span></a><p data-dcnode-id="3498"><span data-dcnode-id="3499" instrument_node="">



conversation is a fluent use of words, uttered without 
any regard to truth or facts. That conclusion is
correct. He will spend hours in talking about the
most trivial things concerning himself and others.
This disposition to chatter consumes an amount of
time of the value of which he has not the slightest
idea. Prattle is a source of infinite mischief to the
freedman, for it leads him to be very inquisitive
about persons; though it may be said, that, were he
to expend half as much energy seeking to know
the why and wherefore of things, as he employs in
prying into the personal affairs of others, he would
speedily become an intelligent and self-reliant being.
As it is, though golden opportunities for acquiring
knowledge and material gain lie all about him, such
is his characteristic shiftlessness and so intrenched is
he in mental stubbornness and foolish egotism, that
he is never other than a sensuous dawdler, glorying
in self-laudation. Negroes are always creatures of
impulse; consequently they laugh and cry, not that
the ridiculous excites them to merriment or pity to
tenderness, but simply and solely because the vacuity
of their minds is such that every passing sensation is
likely to move them to hilarity or tears. It has been
said by some one that to talk understandingly one
must learn to listen well. The negro does neither;
he talks to be noticed, not to entertain, reason,
convince, acquire or convey information, but simply
and solely to put himself in evidence for egotistical
display and the gratification of personal vanity.

</span></p><hr data-dcnode-id="3497"><a data-dcnode-id="3495" name="thoma120"><span data-dcnode-id="3496" instrument_node=""> Page 120</span></a><p data-dcnode-id="3493"><span data-dcnode-id="3494" instrument_node="">



When silent he is not engaged in any endeavor to 
comprehend what is being said, unless he is the subject 
of criticism or his vanity is wounded. He is 
simply waiting, with bated breath and restless
impatience, like a fresh charger on the turf, for the 
vocal exhaustion of his speech competitor, and on 
whose slightest pause he will, without regard to 
relevance or sense, instantly plunge in for the sole 
object of outdistancing others in chattering clamor.</span></p><span data-dcnode-id="3492" instrument_node="">
</span><p data-dcnode-id="3490"><span data-dcnode-id="3491" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;It is no doubt difficult for any people, among 
whom a tendency toward exaggeration exists, to 
indulge in a discriminate use of  language, and obviously 
well-nigh impossible to a race bred in an atmosphere 
of mendacity. These conditions actually obtain 
among the freedmen. The educated as well as the 
illiterate are under the same spell, and, though all are 
ever ready for disputatious speech, they are obstinately 
impervious to the voice of reason, inasmuch as they 
never heed the wisest advice nor hearken to the 
soundest experience, should either conflict with their 
physical desires. Really, the inferiority of the negro 
in mind, morals, judgment, and character is such 
that there is no doubt that some very plausible 
confirmatory evidence of the justness of the simian theory 
of human origin might be derived from a close inspection 
of his demeanor. For example, the animated 
negro is a frisky, frothy creature of overflowing 
frivolity in speech and action, though one who 
instantly collapses into a glum, sullen, spiteful 
reticence at the slightest rebuke. He is, when awake,

</span></p><hr data-dcnode-id="3489"><a data-dcnode-id="3487" name="thoma121"><span data-dcnode-id="3488" instrument_node=""> Page 121</span></a><p data-dcnode-id="3485"><span data-dcnode-id="3486" instrument_node="">



a person of ever varying moods, but one whom, when 
the curtain of unconsciousness is drawn over him 
in sleep, we fully realize to be scarcely more than 
a sensuous animal. These reflections apply to all 
phases of negro development, for all chafe under 
criticism and rebel against wise guidance, though 
at the same time all are vainglorious and credulous, 
craving flattery, and burdened with self-conceit. The 
freedman is not only grotesque in his buffoonery, but 
at times a consummate humbug, who is forever 
floundering between the summit of hope and the depth of 
despair, not only because he substitutes servility for 
humility, and insolent brag for modest courage, but 
rather on account of his insufferable pretensions. He 
assumes knowledge when densely ignorant, and to 
have wealth when sunk in deepest poverty. Assuredly, 
such self-sufficiency would be amazingly 
inexplicable, did we not know that he has an 
inordinate craving for all spectacular display which makes 
him the central figure.</span></p><span data-dcnode-id="3484" instrument_node="">
</span><p data-dcnode-id="3482"><span data-dcnode-id="3483" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;There is a cunning astuteness about the nature of 
the negro which renders him an adept in deception 
and consequently enables him to hide many of the 
shams of his life. So dominated by insincerity and 
false-heartedness is he that he is compelled to be a 
pretender whether he will or not. He has, therefore, 
neither manly courage nor veracity, and his life and
living, founded on fallacious settings, is as artificial 
and stilted as one's knowledge of social functions 
would be if derived from a book of etiquette. Moreover,

</span></p><hr data-dcnode-id="3481"><a data-dcnode-id="3479" name="thoma122"><span data-dcnode-id="3480" instrument_node=""> Page 122</span></a><p data-dcnode-id="3477"><span data-dcnode-id="3478" instrument_node="">



so great is his vanity, obstinacy, and self-complacency, 
that he never realizes the depth of his own 
stupidity nor its identity with that of others whom 
he upbraids, and whose follies he is ever ready to 
decry. Upon the average he is either a beggar or
upstart, but in either case is incapable of self-repression 
in intercourse with his fellow-men. Moreover, 
in all his methods he is a petty schemer, and one 
result thereof is that many a white church has 
enrolled among its members mendicant freedmen 
who are there solely as gleaners of charity, and who 
exist in content on the crumbs that drop from the 
hands of sentimental philanthropy.</span></p><span data-dcnode-id="3476" instrument_node="">
</span><p data-dcnode-id="3474"><span data-dcnode-id="3475" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Again, negroes are wanting in the elements of 
solid affection and genuine sympathy for one another;
for, though their speech is brimful of tender sentiment
and vocal rectitude, yet so enveloped are they in a
nimbus of charlatanism that the one is evanescent,
and the other without guiding force. It would therefore
appear that the freed people have no conception
of the requirements of life or the amenities of society,--at least they always cast aside the substantial for
that which is showy and flimsy. In speech they are 
silly and vaunting; in their homes, untidy and 
negligent; in their associations, coarse and vulgar. 
Their demeanor toward inferiors is pompous and 
arrogant, while their conduct toward superiors is 
always servile and craven. Moreover, as they are 
improvident and idle, their undertakings often begin 
in folly and shame, and end in sin and crime.</span></p><span data-dcnode-id="3473" instrument_node="">
</span><hr data-dcnode-id="3472"><a data-dcnode-id="3470" name="thoma123"><span data-dcnode-id="3471" instrument_node=""> Page 123</span></a><p data-dcnode-id="3468"><span data-dcnode-id="3469" instrument_node="">
</span></p><p data-dcnode-id="3466"><span data-dcnode-id="3467" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;One of the chief reasons why negroes fail in vital 
undertakings is because they do not realize that there 
are near duties and remote relations, and that the 
nearest duty ought to take precedence in attention 
and performance. Then, again, as procrastination is 
the normal attitude of the negro toward every phase 
of activity involving labor, when he does act there is 
an invariable substitution of trivial for vital action. 
He has, moreover, an aversion to change which 
involves a deprivation of what he already understands 
and enjoys. When it is attempted, the 
preference is for movement along the line of least 
resistance to established usage, and where there is 
an obvious contribution to his sum total of sensational 
experience. Hence, while negroes are easily 
influenced by flattering appeals to their passions or 
vanity, they stubbornly resist everything which 
opposes their taste and inclination. By realizing 
these facts, we may readily understand how it 
happens that this people never apprehend the realities 
of life and living, and how the most wholesome, 
refined, and elevating suggestions for progress 
will be rejected so long as such instincts are the 
controlling factors of negro life and living. We 
shall get a deeper insight into this topic when we 
realize that the normal tendency of the mind of 
the negro is to rid itself of disagreeable conclusions. 
Moreover, such is his bias of character and 
perversion of intellect, that he resents rebuke for 
obvious shortcomings, and treats all racial criticism,

</span></p><hr data-dcnode-id="3465"><a data-dcnode-id="3463" name="thoma124"><span data-dcnode-id="3464" instrument_node=""> Page 124</span></a><p data-dcnode-id="3461"><span data-dcnode-id="3462" instrument_node="">



despite its elements of suggestive helpfulness, as
the accusation of enemies. This characteristic is
thoroughly exemplified by the manner in which
the freedman meets his critics. His whole mental
strength has hitherto been exhausted in faultfinding,
complaint, extenuation, and deprecation, with
grievances exaggerated and defects minimized. The
fact that he has not shown any capacity for defensive
reply is likely due to the very good reason that he
has no effective response to make.</span></p><span data-dcnode-id="3460" instrument_node="">
</span><p data-dcnode-id="3458"><span data-dcnode-id="3459" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;It may be well to say here that we have no intention 
of portraying the negro in any other character 
than his own, though to that end we have sought to 
lay bare the realities of his life. In so doing we 
insist that he is all and more than we have depicted 
him to be. In fact, we are confident that no one can 
make the slightest impartial investigation into this 
subject without coming to the conclusion that negro 
life is a makeshift, a conglomeration of specious 
expedients, evolved from high-sounding precepts 
that have existence and source in the pretensions 
of arrant hypocrisy. The conviction will also be
reached that the freedman is overshadowed with an 
environment of appalling darkness, which, together 
with his preference for low conditions of life and 
living, interpose serious obstacles to his speedy 
redemption. As the matter now stands, it is obvious 
that the negro has no adequate appreciation of 
his infirmities, and that he appears to be so given 
over to self-conceit as to be unconscious of his

</span></p><hr data-dcnode-id="3457"><a data-dcnode-id="3455" name="thoma125"><span data-dcnode-id="3456" instrument_node=""> Page 125</span></a><p data-dcnode-id="3453"><span data-dcnode-id="3454" instrument_node="">



ceaseless blunders and the formidable antagonisms 
which they arouse.</span></p><span data-dcnode-id="3452" instrument_node="">
</span><p data-dcnode-id="3450"><span data-dcnode-id="3451" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Such facts as these are bound to be disclosed. 
Furthermore, as he has been drilled by constant 
iteration in the false belief that he is the moral 
equal of the best product of our development, a spirit 
of race glorification and contentment with slight 
achievement misleads him, and will continue to mislead 
so long as adulation is the height of race desire. 
Devoid of insight or belief in realities, the average 
freedman is constantly settling into reckless indifference 
as to conduct, and, with amazing moral density, 
even glories in obvious infirmities. But, notwithstanding 
these facts, there is a disposition among 
many well-meaning white persons to sympathize 
with, apologize for, and condone his gravest 
shortcomings under the plea that he is ignorant of his 
duty and responsibilities to himself and society. It 
should be needless to say that this attitude toward 
the freedman does no good, and is productive of 
infinite harm. What he needs is less sentiment 
and more sense.</span></p><span data-dcnode-id="3449" instrument_node="">
</span><p data-dcnode-id="3447"><span data-dcnode-id="3448" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Professor Bryce says the family is the fundamental 
problem of civilization; and Sir Henry Maine, in his 
"Ancient Law," shows that the family is the germ of 
all social and political organisms. Obviously a right 
conception of the nature, purpose, and conservation 
of family life is everywhere necessary to sound 
human development. But, as indicative of the falsity 
and shallowness of negro conceptions of life and

</span></p><hr data-dcnode-id="3446"><a data-dcnode-id="3444" name="thoma126"><span data-dcnode-id="3445" instrument_node=""> Page 126</span></a><p data-dcnode-id="3442"><span data-dcnode-id="3443" instrument_node="">



living, it may be remarked that neither the men nor
the women of that race appear to appreciate the
responsibility of family life. They certainly do not
seem to understand that light, air, cleanliness of person, 
nutritious food, and decent association are necessary 
to their moral and physical well-being. For
example, negro women will toil and drudge as 
servants of the white class, and perform with reasonable
fidelity their allotted tasks; but when the same
persons marry, and have the care of their homes,
they will, in many instances, become slovenly and
careless, and even refuse to perform the ordinary
service requisite in every household for the preservation
of cleanliness and health. Moreover, as most
of them have a home demeanor and company manners,
it is no uncommon spectacle to see the same
class, who, in the seclusion of everyday living,
habitually eat their food out of the same vessels in
which it is cooked, and otherwise disregard every
plain rule of common-sense social requirement, spend
many hours of arduous toil in cleaning their houses
and in cooking food for the purpose of entertaining
some transient guest for a brief hour. Strange to
say, the chief beneficiaries of negro domestic culinary
bounty are neither relatives nor friends, but the
itinerant black preachers, whose wanton ways and
mendacious praise have wrought havoc in many a
hard-toiling freedman's home.</span></p><span data-dcnode-id="3441" instrument_node="">
</span><p data-dcnode-id="3439"><span data-dcnode-id="3440" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The stubborn aversion of the negro to everything 
implying the substitution of precision and order for

</span></p><hr data-dcnode-id="3438"><a data-dcnode-id="3436" name="thoma127"><span data-dcnode-id="3437" instrument_node=""> Page 127</span></a><p data-dcnode-id="3434"><span data-dcnode-id="3435" instrument_node="">



impulse and disorder, as well as his purely mechanical
adherence to irrational habits, may be exemplified 
in a hundred different ways. It will suffice to say, 
that nowhere are such traits brought more clearly to 
light than in that blind lack of discretion which he 
is wont to exhibit in the ordinary affairs of everyday 
life. Nor can such persistence in stupidity be 
attributed to ignorance of never-failing results; for 
negroes will, in spite of protest and warning, and the 
fact that in each instance repetition involves failure, 
deliberately, and of set purpose, continue time after 
time to do a particular thing in a certain way. For 
instance, they will indulge in inordinate eating, wear 
insufficient clothing, be negligent in bathing, and 
expose themselves to air-draughts when heated, 
notwithstanding their personal experience has shown 
them that any disregard of hygienic law is always 
followed by a swiftly inflicted penalty.</span></p><span data-dcnode-id="3433" instrument_node="">
</span><p data-dcnode-id="3431"><span data-dcnode-id="3432" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;To particularize still further, it is well known that 
negroes are peculiarly susceptible to pulmonary 
diseases, and that, when attacked with consumption 
or pneumonia, they die like sheep stricken with 
murrain. This is a fact of which they are as fully 
conscious as others, but, nevertheless, they cannot be 
induced to take those precautions which sensible 
people usually adopt for the preservation of their 
health. Nor do they employ skilled physicians to 
any considerable extent, especially in the early stages 
of their illness, for, inheriting from their African 
ancestry a belief in the potency of gri-gri charms

</span></p><hr data-dcnode-id="3430"><a data-dcnode-id="3428" name="thoma128"><span data-dcnode-id="3429" instrument_node=""> Page 128</span></a><p data-dcnode-id="3426"><span data-dcnode-id="3427" instrument_node="">



and fetich incantation, they almost invariably resort 
to the nostrums of quackery. Consequently there 
are, in all of the large cities, North and South, 
among the race, so-called voudoo and conjure doctors 
to whom vast throngs go for amulets to ward off 
disease, and for treatment when sick. So firmly 
rooted are these superstitions, that, however much 
we may be inclined to pity the freedmen, regrets are 
useless and expostulations vain, inasmuch as they will 
only learn, if at all, in this as in other particulars, 
through the hard school of actual experience.</span></p><span data-dcnode-id="3425" instrument_node="">
</span><p data-dcnode-id="3423"><span data-dcnode-id="3424" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The reasonable conviction is that it is largely owing 
to these causes that, for a given period, the rate of 
mortality among negroes in our large cities is so
great as to average fully sixty per cent in excess of 
the white race,--a fact that has more than a passing 
significance, for the excess of the death rate over 
the birth rate among the negro people shuts out any 
possibility of their attaining to formidable proportions 
in this country. Nevertheless, the most amazing 
feature in connection with this is the hopeless purblindness 
of the freedmen, for neither the tabulations 
of the census bureau nor the reports of municipal 
boards of health exert the slightest influence on racial 
habits of living. That the negro readily succumbs to 
every passing folly and is impervious to sense and 
sober reason is seen in any fair insight into his 
character. The question then arises, Can a helpless class, 
which forever requires suggestion and direction for 
wise guidance, ever rescue itself from degradation?</span></p><span data-dcnode-id="3422" instrument_node="">
</span><hr data-dcnode-id="3421"><a data-dcnode-id="3419" name="thoma129"><span data-dcnode-id="3420" instrument_node=""> Page 129</span></a><p data-dcnode-id="3417"><span data-dcnode-id="3418" instrument_node="">
</span></p><p data-dcnode-id="3415"><span data-dcnode-id="3416" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Seriously speaking, What is the negro, other than
the unassimilated ward of Western civilization, and 
our chief exemplification of imitative conformity to 
its external models? A savage at heart, he is our 
most consummate representative of illiterate stolidity, 
a type whose habits and customs have been transmitted 
by ancestors through interminable ages of 
sameness, and whose history, whether in savagery 
or civilized submergment, is a record of lawless existence, 
led by every impulse and every passion. "He 
unites with the character of a child," as Sir John 
Lubbock has said, "the strength and passions of a 
man." Under such racial conditions the negro of 
to-day, bereft of ideals and barren of energy, is content 
to imitate whatever his sodden nature permits. He 
revels in the débris of antiquity, and with perversity 
appropriates for his ethical standards the lifeless 
symbols of cast-off beliefs, and for knowledge the 
discredited lucrubations of the Dark Ages. Besides, 
so great is his dependence in other respects, that his 
simple implements of daily use are the inventions 
of other hands, and such is his improvidence that, 
where nature is not his spontaneous provider, the 
industrial thrift of other races is relied upon to 
supply his simplest wants.</span></p><span data-dcnode-id="3414" instrument_node="">
</span><p data-dcnode-id="3412"><span data-dcnode-id="3413" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The social idiosyncrasies of the negro do not range 
over a wide field, but are limited to certain well-defined 
and easily ascertained characteristics. While 
other races share, in common with him, the traits we 
impute to him, they have in addition qualities which

</span></p><hr data-dcnode-id="3411"><a data-dcnode-id="3409" name="thoma130"><span data-dcnode-id="3410" instrument_node=""> Page 130</span></a><p data-dcnode-id="3407"><span data-dcnode-id="3408" instrument_node="">



he does not possess, whose virility subordinates and
holds in check that which dominates in him. There
is running through his nature a vein of mental 
perversity of such fulness and force as to warp
apprehension and vitiate veracious judgment, and 
demonstrate, beyond the shadow of a doubt, that he is
wanting in the elements of common sense. For 
example, take the childish gullibility of the average
negro, which is as amazing as the audacity of his
ignorance. And yet he wants to be flattered and
treated with deference; and he is likely to become
sullen when any requirement commands him to take
his place in the ranks of humanity, and bear a manly
part in discharging its obligations.</span></p><span data-dcnode-id="3406" instrument_node="">
</span><p data-dcnode-id="3404"><span data-dcnode-id="3405" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;There are between negro and Irish character
many points of resemblance; for example, indirectness 
in speech, fondness for personal gossip, religious
veneration, and social superstitions. Amusing 
witticism is also a trait common to both races. The
negro, however, lacks continuity of endeavor. His
temperament is neither heroic nor stable. His will
is governed by mercurial and intractable ebullitions
of moods. He is not thoughtful, and will not consider, 
though approachable and controllable for the
moment through his vanity. This special racial
feature is exemplified by the fact that, in resenting
an affront or adjusting a controversy, the freedman
is incapable of dispassionate action. In expressing
indignation or in seeking redress, he must needs be
wrought up to a high state of frenzy. The freedman's

</span></p><hr data-dcnode-id="3403"><a data-dcnode-id="3401" name="thoma131"><span data-dcnode-id="3402" instrument_node=""> Page 131</span></a><p data-dcnode-id="3399"><span data-dcnode-id="3400" instrument_node="">



passions, however, are as fleeting as a summer 
shower. He may have received grievous indignities 
or suffered serious personal injuries that were 
deliberately inflicted, yet a little flattery will so excite his 
vanity as to cause him to forget his wrongs and 
become friendly with the wrong-doer, notwithstanding 
such truces knowingly open the way to a repetition 
of injuries and a renewal of enmities.</span></p><span data-dcnode-id="3398" instrument_node="">
</span><p data-dcnode-id="3396"><span data-dcnode-id="3397" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The evident shallowness of negro nature could
have no other effect than to make the race fickle 
in every relation of life, and such is the restless 
disposition of the freedmen that they flit from object to 
object for no reason other than search for sensational 
gratification. But, while the lightness of negro temperament 
disqualifies him for forming either enduring 
friendships or harboring deep-seated revenge, it is 
also true that such instability of character seriously 
handicaps him for strenuous endeavor in any 
particular--a conclusion unquestionably demonstrated by 
the futility of ceaseless enterprises which negroes 
undertake, and which all others besides themselves 
know they cannot perform. The most hopeless 
feature of it all is that, despite constant failures, they 
never have any realization of incompetency. Some 
convincing illustrations of the negro's inability to 
gauge rightly his actual capacity are not hard to 
find. There are those who can sing simple vernacular 
songs with a fair degree of success, but who, despite 
their defective musical training, disdain, even 
to their own discomfiture and the public's amusement,

</span></p><hr data-dcnode-id="3395"><a data-dcnode-id="3393" name="thoma132"><span data-dcnode-id="3394" instrument_node=""> Page 132</span></a><p data-dcnode-id="3391"><span data-dcnode-id="3392" instrument_node="">



to undertake anything less than the classical 
compositions of the world's renowned composers. 
Then, again, there are music teachers who ought to
be in laundries, and dressmakers better fitted for 
kitchen service than for making garments. There
are also numberless preachers and teachers so poorly 
equipped for their chosen vocation that one sees at 
a glance the physical industries have been deprived 
of some stalwart laborers.</span></p><span data-dcnode-id="3390" instrument_node="">
</span><p data-dcnode-id="3388"><span data-dcnode-id="3389" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;There are some genuine musicians among the 
negro people, with voices of marvellous power and 
charming sweetness, and to that fact is doubtless due 
the popular notion that the freedman belongs to a 
musically endowed race. He is no doubt greatly 
susceptible to musical impression, and, owing to 
his imitative ability and vocal powers, he does 
succeed fairly well in simple melody. But beyond that 
he must be regarded as a doubtful exponent of 
rhythmic cadences and harmonic scores. There is 
no question but that negroes may learn to sing, or 
that they do sing with great zeal and feeling, just as 
they learn to declaim well. They are not, however, 
creators and interpreters of music in any high artistic 
sense; that is, they have yet to show such inherent 
musical aptitude as is found in the German and 
Italian people. We should state, in this connection, 
that the current music known and sung as "plantation 
melodies" bears but slight resemblance to that 
which the freedman actually sings in his church and 
home. The deep pathos of words and weird melody

</span></p><hr data-dcnode-id="3387"><a data-dcnode-id="3385" name="thoma133"><span data-dcnode-id="3386" instrument_node=""> Page 133</span></a><p data-dcnode-id="3383"><span data-dcnode-id="3384" instrument_node="">



of expression is wanting in these transposed songs, 
which in many other respects are foreign to the life 
and habits of the freed people. A vital difference is 
also found in the fact that, while the negro platform 
songster is invariably mechanical in expression, and 
therefore insensibly caricatures what he does not feel, 
the song-abandoned freedman is filled with mental 
and physical rapture.</span></p><span data-dcnode-id="3382" instrument_node="">
</span><p data-dcnode-id="3380"><span data-dcnode-id="3381" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The morbid sombreness of negro character is evidenced 
by a manifest craving for attending funerals 
and gazing on the dead, it matters not whether the 
deceased be a relative or stranger. In many other 
respects the freedmen exhibit an abnormal disposition 
to gloat over the ghastly details of physical violence. 
We have seen men, women, and children gather in 
immense crowds to witness the hanging of a felon 
or the burning of a lecherous wretch by a frenzied 
mob. There is also allied to this brutal, morbid 
instinct a domineering spirit, which utterly unfits the 
freedman for rational self-control or the sane 
supervision of others. This characteristic, which is fully 
exemplified in the attitude of the negro ministry 
toward inferiors in station, and in the treatment of 
pupils by teachers, pervades every section of racial 
life. The freedman, therefore, is constantly on the 
lookout for something to domineer that is subject to 
him, as, for example, his wife, child, horse, mule, 
cow, or dog, upon whom he mercilessly inflicts brute 
force, as undeterred whim or temper inclines. So 
inexcusable are these brutalities, that they can only

</span></p><hr data-dcnode-id="3379"><a data-dcnode-id="3377" name="thoma134"><span data-dcnode-id="3378" instrument_node=""> Page 134</span></a><p data-dcnode-id="3375"><span data-dcnode-id="3376" instrument_node="">



be accounted for on the assumption that he is endowed 
with an imperviousness to moral sensibilities. He is, 
however, not a manly culprit, for, when detected in 
guilt, fear of punishment arouses all the cowardice 
of his nature, and he then becomes a cringing sycophant, 
but with neither remorse for crime nor contrition 
for wrong-doing. In fact, while he seems to make a 
mental distinction between moral and immoral acts, 
the negro is apparently unable practically to discern 
between right and wrong. The freedman's notion of 
social culture is often carried to absurd lengths, 
especially in the matter of speech, demeanor, and 
dress; though it cannot be that such oddities are 
the result of ignorance of social proprieties, for none 
is so merciless in criticism of each other's taste, or 
can point out with greater skill the incongruities in 
color, style, and effect of each other's make-up, as 
the freed people.</span></p><span data-dcnode-id="3374" instrument_node="">
</span><p data-dcnode-id="3372"><span data-dcnode-id="3373" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;It is by no means our intention to exhaust the list 
of what are obviously racial characteristics. There 
are, however, other phases of the social habits of the 
freedmen which deserve a passing notice, but which, 
we fear, will only the more firmly convince us that 
these people have an inborn aversion to orderly 
methods and such social requirements as impose 
restraints upon impulse and passion. The negro 
lives only in the present, and though at times doleful 
in language and frantic in grief, he is, like a child, 
readily soothed by trifles and easily diverted by 
persuasive speech. He has both aspiration and desire

</span></p><hr data-dcnode-id="3371"><a data-dcnode-id="3369" name="thoma135"><span data-dcnode-id="3370" instrument_node=""> Page 135</span></a><p data-dcnode-id="3367"><span data-dcnode-id="3368" instrument_node="">



for higher living, but so long as he is overwhelmed
with, an all-pervading sensuousness neither will find 
expression in concrete form. If he could get what he 
wants without labor, he would possess the best that our 
civilization affords; as it is, he soon wearies of mental 
or physical strain, and studiously avoids efforts that 
involve prolonged toil. It may, therefore, be taken 
for granted that, so long as the freedman has unsupplied 
desires, and has no inclination to provide for 
them by work, he will have no scruples about 
appropriating to his own use whatever lies within his 
reach and fancy that other hands have wrought.
This conclusion is fully born out by the example of 
those negroes who purloin chickens and the food 
products of their neighbors, rather than undergo the 
labor of raising such things for themselves. The 
same trait is illustrated on a higher scale by the 
negro preachers and others of the educated class,
who will not go through the mental and physical 
effort necessary to the preparation of original literary 
matter, even when qualified for such work. We have 
known many persons of this character who would, 
without remorse or blush of shame, memorize the 
sermon or oration of some eminent person, or copy 
for insertion in a negro journal an already 
published article, and with incomprehensible vanity palm 
it off on their illiterate brethren as their own creation. 
We have also had some conspicuous negro 
speakers, whose lectures and addresses were written 
for them by scholarly white men; and in current

</span></p><hr data-dcnode-id="3366"><a data-dcnode-id="3364" name="thoma136"><span data-dcnode-id="3365" instrument_node=""> Page 136</span></a><p data-dcnode-id="3362"><span data-dcnode-id="3363" instrument_node="">



literature it is no rare thing to see a negro's name 
attached to a publication whose subject-matter was 
prepared by other hands.</span></p><span data-dcnode-id="3361" instrument_node="">
</span><p data-dcnode-id="3359"><span data-dcnode-id="3360" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The thoughtful inquiry is, What, after all, are 
negro ideals? Is the race really striving after 
purity, justice, fraternity, industry, sobriety, and 
intelligence; or is licentious revelry and illiterate idleness 
the dream and reality of its aspirations? These questions 
are to be answered in the light of facts; and 
facts show that for some potent reason negro men 
and women readily succumb to vicious inclinations, 
and dwell in an environment of their own creation, 
contentedly oblivious to the uplifting influences that 
lie about them. Such facts also show that ignorance, 
egotism, envy, and ingratitude are vices always 
uppermost in characters seamed and seared with 
animal instincts. Nor does it require a keen insight 
to discover that the freedman has neither intuitive 
nor acquired knowledge of such strength and power 
as would assure his emergence from hereditary thraldom. 
On the contrary, with no conscious sense of 
responsibility, the accredited spokesmen of the race 
are incessantly striving to shift their obvious duties 
to other shoulders, and lay the blame of their own 
misdeeds to other causes than their own shortcomings. 
Not only so, but they stubbornly interpose 
all the force and influence of their crude organizations 
for the prevention of individual awakening, 
and invoke a barbarous ostracism to subdue 
recalcitrant offenders. Moreover, the fact that in all their

</span></p><hr data-dcnode-id="3358"><a data-dcnode-id="3356" name="thoma137"><span data-dcnode-id="3357" instrument_node=""> Page 137</span></a><p data-dcnode-id="3354"><span data-dcnode-id="3355" instrument_node="">



undertakings the welfare of the racial aggregate 
counts for nothing, and the ambition of units counts 
for everything, justifies the presumption that race 
degradation awakens in negro preachers and teachers 
no earnest desire for its regeneration.</span></p><span data-dcnode-id="3353" instrument_node="">
</span><p data-dcnode-id="3351"><span data-dcnode-id="3352" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;No sane person doubts that a sensuous faith and 
practice will always lead men away from God to 
unbelief, impiety, and physical degradation. With 
the persistent survival of ancestral fetich teachings 
that is just what negro religion has done, and is ever 
doing, for the freed people. What need, however, 
have we of marvel that the wanton vanity of an 
execrable religion should flaunt its defects in the 
face of light and truth, when negro hypocrisy, 
rioting in moral laxity and mental levity, is forever 
loud in its denunciations of any exposure of racial 
wrong-doing and has no reprobation for crimes or 
condemnation for criminals? It evidences a low 
estimate of life and its duties when men are found 
willing to defend that which makes for human 
degradation.</span></p><span data-dcnode-id="3350" instrument_node="">
</span><p data-dcnode-id="3348"><span data-dcnode-id="3349" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We have shown that the freedmen are ruled by 
whim and caprice; that they are inflated with 
vanity, and obstinately set in their ways; that the 
instinct for thoroughness is wanting in them; that
they cannot or will not discriminate between rational 
advice and foolish suggestion; that they will not 
heed sensible admonition, and refuse to be corrected 
by reproof. We have also made it evident that the 
freedman, in no particular, stands in need of further

</span></p><hr data-dcnode-id="3347"><a data-dcnode-id="3345" name="thoma138"><span data-dcnode-id="3346" instrument_node=""> Page 138</span></a><p data-dcnode-id="3343"><span data-dcnode-id="3344" instrument_node="">



prescriptive teachings. He can already point out 
essential distinctions between right and wrong, 
though it is clear that, while abstract statements of 
truth are within the verbal range of negro vision, 
they have utterly failed to impress wholesomely 
his life and living. The negroes in a general way 
are conscious of their defects. But, so sluggish is 
their nature, to them the gulf between well-meaning 
and well-doing is well-nigh spanless. Such are
some of the racial perplexities which the presence 
of the freedmen involves, and because of them the 
wisest of men are compelled to ask if there is hope 
that the negro people will ever awake to truth and 
righteousness. We do not despair, for, while we 
know that the supremacy of racial instincts assures 
continued degradation, we believe the freedmen can 
be regenerated, and will be whenever they are physically 
and ethically dealt with as they ought to be.
Meanwhile, the freedman himself would make a 
notable stride toward self-redemption, were he to 
realize that his one supreme need is an energized 
capacity for moulding truth and righteousness into 
concrete forms of life.</span></p><span data-dcnode-id="3342" instrument_node="">
</span><p data-dcnode-id="3340"><span data-dcnode-id="3341" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;This racial problem must be met in sheer 
self-defence. The question of national preservation is 
involved, and it will, at some time or other, be taken 
up and settled. Meanwhile, no thoughtful student 
of sociology can survey the social conditions in the 
South without reaching the conclusion that the 
presence of the negro people has wrought sad havoc

</span></p><hr data-dcnode-id="3339"><a data-dcnode-id="3337" name="thoma139"><span data-dcnode-id="3338" instrument_node=""> Page 139</span></a><p data-dcnode-id="3335"><span data-dcnode-id="3336" instrument_node="">



with the mental and moral habits of that section.
The negro represents an intrinsically inferior type of`
humanity, and one whose predominant characteristics 
evince an aptitude for a low order of living. While 
contact with civilization has superimposed on his 
barbarous nature a superficial conformity to its outward
requirements, such contact has failed to awaken 
in him a rational sense of personal needs, or to arouse 
a genuine desire for the realities of truth and 
right-doing. Such being the case, we are in duty bound 
to ascertain, by convincing practical tests, whether 
the dense mechanical mind of the negro can be 
endowed with an intelligence; whether his fleeting 
attention and roaming affection can be brought under 
steady control; whether his shiftless habits and 
slovenly ways, his destructive tendencies and 
unreliable performances, can be superseded by assiduous 
and painstaking acquirements; and lastly, whether 
his immoral tendencies can be eradicated, and moral 
aspirations awakened of such strength of purpose as 
will endow him with steadfast principles.</span></p><span data-dcnode-id="3334" instrument_node="">
</span><p data-dcnode-id="3332"><span data-dcnode-id="3333" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Physical disability is an unquestioned fact. There 
is such a thing also as mental and moral debility 
among the feeble races of men. Human life may 
be grouped into three classes: those guided by sane 
thought; those actuated by emotions; and those 
controlled by the cravings of the physical senses. 
We have already shown that the physical basis of 
life in the freedman is defective; that his intellect is 
feeble, his will unstable, and judgment untrustworthy;

</span></p><hr data-dcnode-id="3331"><a data-dcnode-id="3329" name="thoma140"><span data-dcnode-id="3330" instrument_node=""> Page 140</span></a><p data-dcnode-id="3327"><span data-dcnode-id="3328" instrument_node="">



that he is preëminently lacking in sincerity 
of purpose and frankness of manner. It has 
also been shown that neither possible indwelling 
qualities nor external agencies have modified, to any 
appreciable degree, the essential nature and habits 
of a people who have never been otherwise than 
in a low state of racial development. But, inasmuch 
as character-building is a slow and laborious 
process even among the most highly favored classes, 
our advice is for thorough personal supervision and 
the use of forceful examples in negro management 
and training. We advise this, not only because 
negroes are weak in will power and in endeavor for 
right-doing, but because in this, as in other aspects of 
human evolution, we should never lose sight of the 
fact that faith and force rule the world of mankind.</span></p><span data-dcnode-id="3326" instrument_node="">
</span><p data-dcnode-id="3324"><span data-dcnode-id="3325" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The essential question involved in this matter is, 
What agency can effectively eradicate the admittedly 
vicious traits inherent in the negro people? While 
advice, persuasion, and exhortation have their place 
and function, none of them will suffice. There is no 
denial of the fact that negroes have been improved 
in knowledge and elevated in character, to a degree, 
through their contact with the American people; 
but what we do say is that such changes as have 
been wrought in them are purely imitative and 
external. Neither precept nor principle, though ever
so luminous in the highest and divinest sense, can 
be impressed upon or inculcated in the character of 
a race which neither heeds admonition nor advice,

</span></p><hr data-dcnode-id="3323"><a data-dcnode-id="3321" name="thoma141"><span data-dcnode-id="3322" instrument_node=""> Page 141</span></a><p data-dcnode-id="3319"><span data-dcnode-id="3320" instrument_node="">



and which, when compassed with elevating and refining 
influences, is impervious to their teachings. 
There is common agreement that the evil instincts 
of negro nature ought to be eradicated, and, as the 
freedman is not amenable to verbal suasion, it is 
our conviction that, when appeals to conscience and 
reason fail of response, it is our duty to back up 
such commands for right-doing with force. We are, 
moreover, seriously inclined to the belief that, in a 
social organism of fixed ethical standards, all 
indwelling, non-conforming inferior types of mankind 
should be excluded or exterminated. Is this a 
barbarous suggestion? Assuredly not, so long as we 
absolve ourselves for summary executions by the 
plea that the good of society justifies them. It 
is far better to have individual extermination than 
national extinction. Besides, whatever we will or 
may say to the contrary, the simple truth is that the 
whole fabric of civilization everywhere rests on law 
and force. Obviously, then, so long as negroes are 
confessedly on the lowest rung of the ladder of social 
development, there is emphatic need of thoroughly 
safeguarding every step in their training with 
forceful and effectual methods of instruction.</span></p><span data-dcnode-id="3318" instrument_node="">
</span><p data-dcnode-id="3316"><span data-dcnode-id="3317" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We have sought in this discussion to indicate 
certain foundations on which the whole superstructure of 
negro social conditions rests. In this age of realism 
illusions should have no place,--and especially in a 
question of such perplexity as this, and one involving 
such vital issues. The negro, above all others, ought

</span></p><hr data-dcnode-id="3315"><a data-dcnode-id="3313" name="thoma142"><span data-dcnode-id="3314" instrument_node=""> Page 142</span></a><p data-dcnode-id="3311"><span data-dcnode-id="3312" instrument_node="">



to welcome honest race criticism, for in so doing he 
will discover that those who point out faults are not 
always actuated by vindictive sentiments; and he 
may learn that timely reproof and wise guidance 
may be derived even from the censure of enemies. 
What we have aimed to do, chiefly, is to convince the 
freedman that self-control, self-knowledge, and 
self-reverence are the keys to all power and all truth, 
because no man escapes from his sensuous Eden unless 
he first partakes of the fruit of the tree of knowledge. 
These virtues are profound endowments for 
any people. The negro will acquire them when he 
becomes imbued with a spirit of unrest and 
dissatisfaction with his present state. In that event, and 
not otherwise, will he have such a sense of responsibility 
and duty as shall make him amenable to a 
civilization which opens to all kindreds and tongues 
its avenues of knowledge and culture, and bids them 
Godspeed to the highest moral and intellectual 
altitudes their capacity will permit.</span></p><span data-dcnode-id="3310" instrument_node="">
</span><p data-dcnode-id="3309"></p><hr data-dcnode-id="3308"><a data-dcnode-id="3306" name="thoma143"><span data-dcnode-id="3307" instrument_node=""> Page 143</span></a><p data-dcnode-id="3304"><span data-dcnode-id="3305" instrument_node="">
</span></p><h3 align="center" data-dcnode-id="3302"><span data-dcnode-id="3303" instrument_node="">CHAPTER VI</span></h3><span data-dcnode-id="3301" instrument_node="">
</span><h3 align="center" data-dcnode-id="3299"><span data-dcnode-id="3300" instrument_node="">ETHNIC BELIEFS</span></h3><span data-dcnode-id="3298" instrument_node="">
</span><p data-dcnode-id="3296"><span data-dcnode-id="3297" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;THE freedmen who are identified with sectarian 
religious societies will aggregate three millions. They 
are chiefly adherents of the Methodist and Baptist 
denominations, and have membership in eight distinct 
branches of the former and six of the latter. 
Of the Methodist freedmen, four-fifths are in 
affiliation with the five organizations under their own 
control, all of which, in doctrine and polity, are moulded 
after the Methodist Episcopal Church, as well as being, 
in character and management, identical with each 
other. The negro Baptist churches are conducted 
after the plan of the white churches of the same 
faith and order, but are otherwise largely under 
race management. They are inferior to those of 
the Methodist freedmen in many respects, especially 
in organized coöperation. Moreover, though their 
peculiar church polity has given their members 
unusual opportunity for sensible training in 
self-government, they have, we regret to say, evinced but little 
capacity in that direction. Notwithstanding the 
negroes are allied with different religious organizations,

</span></p><hr data-dcnode-id="3295"><a data-dcnode-id="3293" name="thoma144"><span data-dcnode-id="3294" instrument_node=""> Page 144</span></a><p data-dcnode-id="3291"><span data-dcnode-id="3292" instrument_node="">


the sectarian freedman has no well-defined 
ethical convictions, neither does he have positive 
and steadfast notions regarding denominational 
distinctions, and will unite with one or the other as 
caprice may incline. Social instincts have much to 
do in promoting religious association among negroes, 
but, in the last analysis, church membership is to 
them what a paid-up life insurance policy would 
be to a prudent investor; it gives moral immunity 
on earth, and guarantees eternal bliss in heaven.</span></p><span data-dcnode-id="3290" instrument_node="">
</span><p data-dcnode-id="3288"><span data-dcnode-id="3289" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The prodigious multitudes which throng under the 
banners of negro religion are to it a source of weakness 
rather than strength, mainly for the reason 
that its adherents have no sense of accountability 
to authority, for in neither the homes nor churches 
of the race is personal discipline inculcated or 
enforced. The disorganization manifest in negro 
religion arises from the fact that its institutions are 
crude copies of misapprehended originals, the 
disowned offspring of an estranged paternity, the 
indifferent products and full-grown illiterates of our 
composite civilization. It is a religion glib of speech, 
but poor in ideas. By reason of its anomalous 
character it has never originated within its own 
environment a feasible movement for promoting the welfare 
of humanity, nor has it, at any time, made an 
important or valuable contribution to American life or 
morals. On the contrary, stubbornly refusing to 
consort and coöperate with other religious forces, 
it has been unable to impress contemporaneous Christian

</span></p><hr data-dcnode-id="3287"><a data-dcnode-id="3285" name="thoma145"><span data-dcnode-id="3286" instrument_node=""> Page 145</span></a><p data-dcnode-id="3283"><span data-dcnode-id="3284" instrument_node="">



society with a considerate regard for its leadership 
or admiration for its achievements. To be 
candid in statement, negro religion shuns the light 
of intelligent contrasts, and avoids searching 
inspection, preferring racial segregation and sectarian 
isolation, where, amidst inexplicable contentment, it can 
ladle out to credulous benightedness defunct ideas, 
decayed sophistries, galvanized superstitions, and all 
the frayed and discarded emblems of physical 
inspiration. In doing this, it has wrought irreparable 
mischief in quarters where mental and spiritual 
mendicancy reign supreme.</span></p><span data-dcnode-id="3282" instrument_node="">
</span><p data-dcnode-id="3280"><span data-dcnode-id="3281" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The current trend of negro religious belief is 
chiefly responsible for the capricious and hampering 
conditions which hedge about and permeate 
negro life. For instance, it enthralls illiterate souls 
and blindfolds consciences by its methods of false 
scriptural exegesis. It accentuates individual 
helplessness and emphasizes dependence on unknown forces 
by a prominence which it gives through songs, texts, 
sermons, and prayers to a weird psychic guidance. 
Nothing is risked in saying that such ethical beliefs 
will not, indeed in the nature of things can not, rid 
the negro race of its characteristic defects, which are 
bound to resist any attempt at overthrow and 
displacement by substantial virtues, especially those 
appalling weaknesses attaching to them through 
inherited ignorance, inherited laziness, inherited 
unbridled desires, inherited apathy and cowardice. 
But it may fairly be said that negroes, in or out

</span></p><hr data-dcnode-id="3279"><a data-dcnode-id="3277" name="thoma146"><span data-dcnode-id="3278" instrument_node=""> Page 146</span></a><p data-dcnode-id="3275"><span data-dcnode-id="3276" instrument_node="">



of church relations, do not understand the force 
and bent of their inherent characteristics. Lacking 
a trained and comprehending intelligence, they 
are blind to every weakness, and of necessity 
ignorant of their incapableness, and are therefore unfit 
to exercise self-discretion and self-government. 
Furthermore, so long as human greatness is not a 
pronounced feature in their religious beliefs, one may
rightfully conclude that their crude religious 
agencies, rioting in impiousness and revelling in infamy, 
can never function that moral and spiritual potency 
required to regenerate the negro race.</span></p><span data-dcnode-id="3274" instrument_node="">
</span><p data-dcnode-id="3272"><span data-dcnode-id="3273" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Modern religion is represented by several ethical 
systems of more or less clearness of spiritual perception 
and purity of ideal. The Saxon standard of 
spiritual belief is the Christian, and among us the 
term "Christian" carries with it a sharply defined 
meaning; it embodies profound convictions and 
personal obligations to a distinct ethical ideal. 
That ideal is Christ, who not only enunciated 
principles, but wove them into life and living. He 
made character the goal to which all human 
endeavor should be directed, and exemplified a 
consummate manifestation of ethical truth in being and 
doing. Now the divine function and prerogative of 
every human soul is to possess discriminate 
knowledge,--that is, the ability to discern with unerring 
instinct the real from the unreal. Max Müller says, 
"Religion consists in a perception of the Infinite 
under such manifestations as are able to influence the

</span></p><hr data-dcnode-id="3271"><a data-dcnode-id="3269" name="thoma147"><span data-dcnode-id="3270" instrument_node=""> Page 147</span></a><p data-dcnode-id="3267"><span data-dcnode-id="3268" instrument_node="">



moral character of man." The highest appreciable 
manifestation of the Infinite is the life and teaching 
of Christ, by which we are made to understand that 
true religion is a spiritual growth having inception
and perpetuity in sincere convictions of truth and 
duty. True regeneration is the life of God in the 
life of man, which in its outward manifestation 
exhibits two fundamental aspects,--a recognition 
of a supreme power to whose laws man yields due 
reverence and obedience; a recognition of a divine 
life within the souls of fellow-men, and therefore a 
recognition of the brotherhood of man.</span></p><span data-dcnode-id="3266" instrument_node="">
</span><p data-dcnode-id="3264"><span data-dcnode-id="3265" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Admitting these statements to be sound expressions 
of Christian truth, the question arises, To what 
extent does negro religion apprehend their significance 
and conform to their precepts? The answer 
is that the mass of negro religionists significantly 
fail to comprehend, both in their mental processes 
and actual living, the vital and fundamental principles 
of divine truth, and to that extent have no 
right to claim spiritual regeneration. This candid 
impeachment may provoke controversy, but only 
with those who wilfully shut their eyes to obvious 
facts or are blind to the logic of the situation. No 
intelligent observer can fail to note that the religious 
methods and ethical notions characteristic of a large 
body of our fellow-citizens are an irrational type of 
Christianity. For example, by the negro's code, 
it is impossible to predicate a divine power of 
absolute supremacy, who, as the embodiment of law, is

</span></p><hr data-dcnode-id="3263"><a data-dcnode-id="3261" name="thoma148"><span data-dcnode-id="3262" instrument_node=""> Page 148</span></a><p data-dcnode-id="3259"><span data-dcnode-id="3260" instrument_node="">



bereft of passion and divested of personality. To 
postulate such a being would be to the negro mind an
anomaly, an incomprehensible and impossible 
phenomenon. The God of negro Christianity is a fetich 
of personal characteristics and human idiosyncrasies, 
instinct with passion, cherishing hate, harboring 
revenge, swayed by importunity, relenting to entreaty, 
gloating over suffering, and appeased by sacrifice.</span></p><span data-dcnode-id="3258" instrument_node="">
