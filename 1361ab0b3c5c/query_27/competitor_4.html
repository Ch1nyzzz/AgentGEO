racial awakening, a spirit of aimless unrest has been insidiously sown among the freedmen through the hortatory quackeries of race demagogues and to such a degree that many yearn for a change in vocation

</span></p><hr data-dcnode-id="1086"><a data-dcnode-id="1084" name="thoma394"><span data-dcnode-id="1085" instrument_node=""> Page 394</span></a><p data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">



and locality under the absurd impression that their mere transference to a new settlement would give them opportunity and standing which they do not now enjoy. Yet even were the physical and social impediments in the negro's pathway set aside, he must have a conscious realization of the why and wherefore of the essentials of life before any radical change can be wrought in his nature. Another thing to be heeded by the freedman is that though opportunity may assist it never creates integrity--a quality of character of which the negro has yet to give demonstrable proof of possessing. Environment only aids in developing that which already exists.</span></p><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The chief question which confronts the freedman, and the one on whose answer the most vital consequences to himself and others depend, is, Shall he resolutely face his duty to stay and work out his redemption in the land of his birth, or shall he, by evasion, subterfuge, and flight, cravenly surrender every present and future possibility of racial regeneration? Our convictions are and have been that nowhere else is it possible for negro manhood and womanhood to be achieved, or racial degeneracy demonstrated, other than in his own Southland of cradled hopes and buried despair. Besides, where else has he so secure a footing, and in what other spot can he find greater opportunity or inspiration for deed and daring than in that soil watered by the sweat and enriched by the blood of ancestral servile toil? Where in all the earth could nobler victories

</span></p><hr data-dcnode-id="1078"><a data-dcnode-id="1076" name="thoma395"><span data-dcnode-id="1077" instrument_node=""> Page 395</span></a><p data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">



for human regeneration be won than in that region of balmy verdure and delicious languor, within whose subtropical Eden the freedman has an arena for mental awakening, moral evolution, and material opportunity whose possibilities are unsurpassed?</span></p><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;There is among the freedmen a widespread feeling that somehow they have gone wrong, or perhaps have never been right, and a harsh experience has at least taught them that illiterate poverty is no match for intelligent affluence. Hedged in by dense ignorance and hopeless indigence, and held in subjection to an imperious control, how can the negro's escape from such conditions be effected? There is but one possible avenue open to the race, and that is to establish rural schools, and put land and education within the reach of the indigent, illiterate freedman. Negro opportunity and welfare lie in clinging to the country and in adhering to those industries of which they have some knowledge. By becoming producers for others they best provide for their own sustenance,--a thing that they might not always attain in the vicissitudes of herded competition. Nor is this all, for well-wrought agricultural achievement will implant in foresighted industry conscious self-respect, and earn for the race the honest appreciation of fellow-men. It would also conduce in the highest degree to their social advancement, were there an inexorable expulsion and exclusion of the freedmen from our cities, for the reason that only in rural living can they secure for themselves and their children

</span></p><hr data-dcnode-id="1070"><a data-dcnode-id="1068" name="thoma396"><span data-dcnode-id="1069" instrument_node=""> Page 396</span></a><p data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">



health, strength, morality, intelligence, and physical comfort. The goal of common sense, and duty for every negro, is a cottage home, and sufficient land to provide reasonable subsistence for a legitimate family, in order that each and every member of the household may lead a wholesome life and build up an exemplary character.</span></p><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;And what are the bounds of negro station and duty? Inasmuch as there is to every man a place wherein success is ordained, and out of which failure is decreed, the obvious place of the negro is that which his measure of intelligence and capacity best fit him to fill. Such is his ordained sphere of action, and such are the terms upon which in the long run the station of all mankind is determined. Therefore, with this single standard set before him, the negro should promptly fall into line, and speedily find his rightful place in human activity. When he, awakened, has found his sphere, he should stay content until he has demonstratively outgrown its requirements. Meanwhile, he should sedulously cultivate the faculty of common sense, and seek to acquire character. To that end, he should emulate wholesome examples, and make his own life an inspiration to the rest of mankind.</span></p><span data-dcnode-id="1062" instrument_node="">
</span><p data-dcnode-id="1061"></p><hr data-dcnode-id="1060"><a data-dcnode-id="1058" name="thoma397"><span data-dcnode-id="1059" instrument_node=""> Page 397</span></a><p data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">
</span></p><h3 align="center" data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">CHAPTER XIV</span></h3><span data-dcnode-id="1053" instrument_node="">
</span><h3 align="center" data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">NATIONAL ASSIMILATION</span></h3><span data-dcnode-id="1050" instrument_node="">
</span><p data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;A NATION is an organized community under the jurisdiction of an established sovereignty; that is, every nation is composed of two elements, viz. government and subjects. Social organisms are created by a body of individuals having definite aims, and united for a common purpose, it may be for war, or peace, wealth and grandeur, or truth and righteousness. Whatever the controlling motive of the social compact, the organic trend of life and activity is determined by the maximum of individual preference. The justification for government is the security and happiness of the governed, whose conformity to its principles is the test of loyal citizenship. Where the social organism is based on autonomous principles, every constituent member is charged with the conservation of national aims and interests, and in proportion and to such degree as each constituent unit contributes to the general advancement of national aims and ideals, so strong in purpose and great in achievement the organism becomes. A nation at war with itself invites destruction. In government, then, whatever makes for the common good is to be fostered;

</span></p><hr data-dcnode-id="1047"><a data-dcnode-id="1045" name="thoma398"><span data-dcnode-id="1046" instrument_node=""> Page 398</span></a><p data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">



whatever militates against it should be suppressed. The right of preservation, as well as common sense, decrees that all warring elements within the body politic shall be assimilated or extirpated.</span></p><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Social antagonisms of more or less acuteness always arise between people within the same nation, who are
in antithetical stages of development. Moreover, it is impossible for people of dissimilar experience to come into perfect accord and sympathy with each other, except on the common ground of reciprocal human service. This implies a willingness on the part of inferior endeavors to conform to the standards of superior achievements. Negro and Saxon development are in opposition; in this lies the sum and substance of their disagreement. When we speak of
Anglo-Saxon civilization, however, we do not mean a particular race development, but a type of growth characteristic of a certain people. In a narrower sense it may partake more or less of pronounced racial habits. It constitutes the chief feature of American and English civilization, and it is a mode of development open to all people, for adoption and supersession of their own habits of living. Of course, such an exchange involves the giving up of many idiosyncrasies, but such surrender is in keeping with the law of progressive development for races or individuals. It may be well to add that we are not to be understood as saying that Anglo-Saxon people have developed a civilization of ethical and social completeness.

</span></p><hr data-dcnode-id="1039"><a data-dcnode-id="1037" name="thoma399"><span data-dcnode-id="1038" instrument_node=""> Page 399</span></a><p data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">



Such a statement would be at variance with facts. What we do say, and what all authentic evidence substantiates, is that, so far as they have gone, their comprehension of what life and living ought to be is altogether in advance of contemporaries, and beyond anything that has hitherto evolved from the human mind.</span></p><span data-dcnode-id="1034" instrument_node="">
</span><p data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;In America we have set for our standard certain well-defined ideals toward whose consummation our best energies are directed. What may be rightly insisted upon is that all inferior types of development within our borders shall join us in seeking a realization of national aims and purposes. These are noble and lofty demands, and as they are obviously divorced from every shred of individual selfishness, they appeal only to the highest instincts of the human heart, and they must be heeded by our submerged classes if they would enjoy the blessings which flow from the development of American liberty. What we aim to make clear is the conclusion that every member of a social compact, whether of alien or native birth, is bound to acquire a comprehensive knowledge of national ideals, and to make it his primary duty to conform to them.</span></p><span data-dcnode-id="1031" instrument_node="">
</span><p data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Homogeneous nation-making is a complex process, and especially so in a country like this, where numerous race varieties, gathered from every quarter of the globe, easily drift into factional groups, which, in ignorance of the highest functions of the government, undertake at the behest of partisan dictation to discharge

</span></p><hr data-dcnode-id="1028"><a data-dcnode-id="1026" name="thoma400"><span data-dcnode-id="1027" instrument_node=""> Page 400</span></a><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">



the duties of American citizenship. But the United States, in a thoroughly altruistic spirit, has set for itself the task of homogeneously developing, in patriotism, education, and civilization, the people of all tongues and classes who dwell within its borders. Therefore, in pursuance of that purpose, the fusion of antagonistic races is constantly taking place. The immigrant German, Irish, French, and other nationalities, through intercourse with their native born members and other American people, are actually being incorporated and assimilated in our civilization to such a degree that original race characteristics are completely obliterated in their immediate descendants. The principles of our autonomy are free men, free speech, free opportunity, in a government of the people, by the people, for the people. All of the component parts of the nation are compelled to subscribe to these principles, or else be excluded from active participation in government affairs.</span></p><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;It is evident that we are at present scarcely more than an organized community of composite people, with widely varying relations, among which, though not the least in number, is a negro population that is not only set apart from the main body of the American people by physical marks, but by mental and social traits as well. It is a population in a confessedly low state of racial development, whose instincts are incompatible with, and whose acts are opposed to, American-Anglo-Saxon civilization; a people who, though set in the midst of ceaseless

</span></p><hr data-dcnode-id="1020"><a data-dcnode-id="1018" name="thoma401"><span data-dcnode-id="1019" instrument_node=""> Page 401</span></a><p data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">



transformations, do not seem to realize that they have both place and functions in the ultimate composition of American life. We have already observed that republican institutions rest upon compacts entered into by a free people for their mutual welfare and protection. The Constitution of the United States confers equal rights and imposes equal obligations on all who conform to its requirements, in order to assimilate ultimately, both in conviction and endeavor, every dissentient element within the body politic.</span></p><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;But whatever may be our notion of federal and social assimilation, it is well to understand that mere external contact will not unite mankind; for, while some men will imitate within well-defined limits what is set before them, they will not emulate the higher characteristics of a contiguous superior type. That is, when a low and high degree of civilization are in juxtaposition, the lower will not always of its own volition assimilate with, or model itself after, the manners and language of the higher. It is possible for two races of different degrees of development to live side by side, and participate in daily superficial intercourse, using the same language and employing like symbols of expression, and yet be, as a matter of fact, separated by a spanless chasm. The strong and capable consort with the strong and capable, and unite in pushing aside the weak and incapable. Nor is it strange that inferior types should be objected to by progressive and superior

</span></p><hr data-dcnode-id="1012"><a data-dcnode-id="1010" name="thoma402"><span data-dcnode-id="1011" instrument_node=""> Page 402</span></a><p data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">



races of mankind, for in any given organism no harmonious social adjustment is possible where discordant elements have unchecked sway. However much individual men may suffer as to means and methods in government, the organized social compact is in duty bound to insist upon and compel agreement with, and conformity to, the aims and purposes for which such government was instituted.</span></p><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The negroes are an alien and diverse race, and differ from the main body of our people. They neither exhibit positive creative qualities, nor represent a brave, strong, self-reliant type of humanity; and they persist in clinging to race ideals and in pursuing paths diametrically opposed to those of the whites. Life, we are told, is a ceaseless struggle for existence, and survival of species is proof of adaption to environment. We take it, therefore, that when race aversion is derived from antagonistic acts of a race or type incorporated in the body politic, it is well founded, and becomes the legitimate expression of a superior people toward an inferior race. It will exist toward any class whose presence and conduct menaces and puts in jeopardy the aims and ideals of a civilization not yet removed from the tentative stages of construction. Such are the actual conditions created by the presence of the negro. And a difficulty which has beset the freedman in finding social adjustment has been the loss of forceful guidance. Left to his own volition, he has not sought, but rather has shunned, responsible social obligations.</span></p><span data-dcnode-id="1004" instrument_node="">
</span><hr data-dcnode-id="1003"><a data-dcnode-id="1001" name="thoma403"><span data-dcnode-id="1002" instrument_node=""> Page 403</span></a><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">
</span></p><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;No one denies that the negro is environed by a network of prejudices, many of which are a result of his acts. But were all racial antipathy instantaneously eradicated, he would still be inferior to the white man in many respects, not only on account of racial differences in color and development, but also because of whatever creates inequality, whether it be houses, lands, clothes, food, or personal dexterity and culture. The industrious man outstrips the lazy one; the thrifty, the spendthrift; the prudent, the imprudent; the capable, the incapable; the deliberative, the impetuous; the far-seeing, the short-sighted. Nevertheless, to insure the fulfilment of possibilities inherent in man, it is necessary that to each citizen there shall be accorded an equal chance with every other citizen, with equal protection and equal restraints imposed upon all. We have a right to ask of the governing authority equality of opportunity for all men, and it is all that we have a right to demand, or it to concede. No law can do more. It cannot create thrift, that is a matter of individual achievement; nor can it ordain individual success, for that comes in no case, other than through application, persistence, and judgment.</span></p><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We are well-nigh deafened with factitious chatter about human equality; but if all men were created alike, endowed alike, and started in life alike, why is it that the negro lags so far behind his brethren in the race for mundane achievements, and what is the moving cause which induces him to prefer the place

</span></p><hr data-dcnode-id="993"><a data-dcnode-id="991" name="thoma404"><span data-dcnode-id="992" instrument_node=""> Page 404</span></a><p data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">



and duty of a servant? Assuming that he has latent powers of moral recovery, why is it that neither moral suasion nor intelligent example has wrought any beneficent impression on his life? These are not idle questions, but grave problems, which are in evidence wherever the freed people are. Notwithstanding their ceaseless pretentious assumptions, or the fact that isolation forces them out of sympathy with their environment, negroes blindly persist in clinging to ideals fashioned by illiterate leaders, and evade contact with an intelligent civic and industrial fraternity. Isolation and segregation have wrought a conscious irreparable mischief to them, and neither force nor persuasion has hitherto induced them to join in common interests with other citizens. Hence, reprehensibly blind to causes and events, negroes do nothing more than prate about a denial of their rights. But what rights? The right of opportunity for honest living? for self-improvement? for capable service? Any interference or disregard of these rights justifies protest; but negroes are not claiming injustice on this score. Rather, they protest against any interference with their clannishness, their segregated living, their African habits of speech and conduct; and their chief ground of complaint is that white Americans will not admit their sable barbarities into fellowship. Why should they, when the sum total of negro contributions to the common treasury of American development is a pretentious imitation of civilization, a veneering over barbarous instincts? The aphorism,

</span></p><hr data-dcnode-id="988"><a data-dcnode-id="986" name="thoma405"><span data-dcnode-id="987" instrument_node=""> Page 405</span></a><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">



"Scratch a Russian, and you find a Tartar," may be fitly paraphrased by saying, "Strip off negro mannerisms, and you find an African savage."</span></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Say what we may to the contrary, negroes have a conscious sense of racial inferiority, which is evinced by a preference for flocking by themselves. Separate churches, schools, and social organizations are logical culminations of racial desire for segregation. These facts have an important bearing on the possibility of negro assimilation, since such segregation fixes in the negro mind a sense of personal degradation. The negro's preference for ecclesiastical separation is due to the fact that the ethical teachings of his cult are pitched on a lower key of spiritual conception than obtains elsewhere, and are wanting in vital force and practical service. No people, as negroes ought to know, have a right to be ignorant or degraded, or to assist in making others so. Nevertheless, it is a fact that most of the ignorance and degradation endured by the race is justly chargeable to a false system of Christianity, intent on blinding the consciences of men by burdening their souls with shams and pretence. The freedman's ethical notions, with their insidious and execrable teachings, as well as his false social ideas, inflict degradation on the race.</span></p><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;That the freedman's barbarous and vicious beliefs are repugnant to sober Christian thought, and incompatible with our civilization, is the inevitable conclusion of all intelligent investigation. Nor will he gain better conditions until he commits himself to the

</span></p><hr data-dcnode-id="977"><a data-dcnode-id="975" name="thoma406"><span data-dcnode-id="976" instrument_node=""> Page 406</span></a><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">



guidance of such teachers as regard right conduct as the highest test of Christian character, and who consider Christ the most transcendent example of humanity. Because the negro's Christianity is wanting in this conception, it has no ability to arouse him for individual betterment or for social elevation. It is wholly without awakening vitality. Negro Christianity, moreover, will not heartily and honestly fraternize with religious organizations which are superior to it in intelligence and usefulness. Voluminous evidence bears this out, but for our purpose we need only cite the fact that, while in all our large cities there are white ministerial associations yet negro preachers are rarely found among them, though a generous welcome would be accorded them. The same observation is equally true regarding their white church attendance, exchanging pulpit ministrations, and social visitations. Hence, though the negro nurses a social grievance, on which he descants glibly in his segregation, yet in reality he shuns intelligent contact; he craves white association, after a fashion, but stealthily avoids the capable and refined in churches, schools, and everyday life.</span></p><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;It is no uncommon thing for whites and blacks to mingle in social life, yet it is almost universally true that when this happens the whites are the social inferiors of the blacks. For instance, the educated negro minister will extend to a commonplace, strolling white preacher the courtesies of his pulpit, when no persuasion will induce him to bestow a like invitation

</span></p><hr data-dcnode-id="969"><a data-dcnode-id="967" name="thoma407"><span data-dcnode-id="968" instrument_node=""> Page 407</span></a><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">



on the settled pastor of a respectable white church within his own vicinage. So will the reputable negro matron, doubtless actuated by like motives, effusively entertain her white illiterate inferiors, though at the same time spurning all social advances from white superiors in education and refinement. Such being the case, it must be apparent that even where opportunity offers negroes will not associate with decent, self-respecting white people. Of course the most plausible solution of their attitude is that the decorum in speech and manner which such association involves is too great a strain on their undisciplined natures. Or that, while negroes crave white company, yet, conscious of their mental and social inferiority, they deliberately prefer a low to a high white development.</span></p><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;It is well known that the black man is morbidly sensitive regarding his color, for which he has an inbred aversion, and that he has a ceaseless yearning to supplant it with a lighter hue. Hence there are not wanting those among the freedmen who contend that no effectual solution of the negro problem can be reached until all traces of negroid lineage are blotted out through amalgamation. The folly of such contention is obvious, when we consider that a mass of white negroes would neither ameliorate nor eliminate racial antagonisms, but merely add to an already dangerous social element. There are already hundreds of thousands of white negroes in America, but in what respect does a white complexion add to

</span></p><hr data-dcnode-id="961"><a data-dcnode-id="959" name="thoma408"><span data-dcnode-id="960" instrument_node=""> Page 408</span></a><p data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">



their value, or secure to them immunity from the exactions imposed on the black hues? Suppose all negroes should instantaneously undergo a change in color and become white; in what way would this remove the African earmarks of speech, and other personal characteristics? No process of physical amalgamation can change the mental and spiritual nature of the freedman. That negroes have a conscious sense of degradation, which they falsely attribute to their color, is shown by their eagerness to get as far as possible away from black shades. It is this craving for a light color and better hair for their offspring, which is responsible for many of the illegitimate children of negro motherhood. The freedmen seem to be unaware that in seeking to effect a system of racial equality on a physical basis, they enter a confession of their inferiority.</span></p><span data-dcnode-id="956" instrument_node="">
</span><p data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;There is no doubt that judicious race amalgamation is capable of exercising a profound and far-reaching influence upon inferior types of people. Degenerate people are always improved and strengthened by an infusion of virile blood, but the benefits derived from wise race admixture are to be found in transmitted capacity, not color. The best examples of negro race admixture that have come under our observation are those which have an equal inheritance of characteristics from both white and black progenitors, with the initial amalgamation extending back to the third or fourth generation. In such cases we have a degree of intelligence, a poise of judgment,

</span></p><hr data-dcnode-id="953"><a data-dcnode-id="951" name="thoma409"><span data-dcnode-id="952" instrument_node=""> Page 409</span></a><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">



and solidity of character wholly wanting in the extreme of the negro.</span></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;There is an impression in the minds of some superficial white people that the best developed and most manly types of negro people are those of pure blood. But such impressions are misconceptions, and unwarranted by existing facts. In the first instance, a native pure-blooded negro is rarely found in the United States, though we have some millions of black people in whom a greater or less infusion of white blood exists. Color, moreover, is not an infallible criterion of race identity; some very fair freedmen have more pronounced negroid characteristics than others who are very black. As we have already shown, the pure negro people are, by the very nature of their characteristic endowments, precluded from reaching a high degree of efficiency. Whatever the freedmen has achieved in the way of intelligence and character is due to alien qualities incorporated into his being through race amalgamation. His change in color is, however, merely an incident of miscegenation; the fundamental outcome is the displacement of characteristic instincts, and the introduction of new traits, a thing that is not always accomplished through physical admixture.</span></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The physical transformation of the freedman is in process, but his mental and spiritual regeneration has scarcely begun, nor will it make headway until he is overwhelmed with an influx of ideas. Ideas are living things. Men die and institutions perish, while

</span></p><hr data-dcnode-id="942"><a data-dcnode-id="940" name="thoma410"><span data-dcnode-id="941" instrument_node=""> Page 410</span></a><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">



these tangible realities survive the wreck of time. The redemption of the negro is impossible through any process of physical amalgamation; it is possible and assured through a thorough assimilation of the thought and ideals of American civilization. The most intelligent and self-poised negro we have ever met was the slave and son of a Georgia master, who, though he could neither read nor write, yet for sound judgment, accurate understanding, intelligent knowledge, and wise discrimination of men and things, was surpassed by but few well-informed persons of any race. Here was an ideal man, with a genuine luminous soul, who was freed from the bonds of environment and heredity through a complete assimilation of the ideas and habits of a superior influence. Furthermore, though this man was a slave, he was respected and held in the highest esteem by the leading white citizens of the state, as a person of fearless courage and unswerving integrity, and we are confident that his color was never considered in the estimate of his character.</span></p><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;What one negro has done, all freedmen may and ought to do. Any enduring assimilation with the white American people is an impossible dream, so long as the negro segregates himself behind a rampart of offensive race instincts. He must either part forever with his savage inheritance, or be eternally submerged by American vigor and determination. Another fact that the freedmen may well bear in mind is that savage races become extinct as civilization

</span></p><hr data-dcnode-id="934"><a data-dcnode-id="932" name="thoma411"><span data-dcnode-id="933" instrument_node=""> Page 411</span></a><p data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">



advances. Within the last three centuries millions of human beings have been utterly destroyed, not by war, but simply and solely on account of their inability to assimilate and incorporate into their life and living the higher civilization thrust upon them. This law of social contact cannot be set aside by bringing forward the plea that the savage negro has survived in the midst of a hostile civilization. The negro has thriven and increased in numbers, not because he possesses greater resistive power than other inferior races, or has acquired greater tenacity of existence here than in his native habitat. His survival is due to the fostering care with which slavery surrounded him during eight generations of servitude. Since the withdrawal of this supervision, the fact has been made clear that the freedman is not of a hardy type, but is a perishable product, who squanders his vital energies with reckless abandon.</span></p><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;For the benefit of those who adhere to the notion that physical changes will bring about national assimilation, the suggestion is advanced that there might be devised, under legal restrictions, an effectual method of color bleaching, just as some negroes have acquired a process of straightening their woolly locks. But however effectual might be the change in color, the deeper and more significant change in morals and sense could not be brought about through any mere physical transformation. The variegated freedmen would still be a negro in mind, soul, and body. Hence the fallacy of such claims as assume

</span></p><hr data-dcnode-id="926"><a data-dcnode-id="924" name="thoma412"><span data-dcnode-id="925" instrument_node=""> Page 412</span></a><p data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">



that color changes will eradicate white antipathy to the black race.</span></p><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;It matters little what may have been the inceptive causes of racial prejudices in any locality, it is universally true that class distinctions eventually crystallize around cleavages in social development. A fitting and conspicuous example of this is furnished in the case of the white "crackers" of the South. Here we have a class representing hundreds of thousands of native Americans, of like hue but unlike development to their neighbors, who, by reason of their mental and social deterioration, are not only regarded as a serious menace to our civilization, but in many particulars are subjected to harsher caste restrictions than the blacks themselves. This condition of facts emphasizes our contention that heterogeneous races are capable of assimilation only through uniform culture and development in identical aims and ideals; and that any method of assimilation having for its object merely racial coalescence through color is false in premise and fatal in sequence.</span></p><span data-dcnode-id="918" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We have never doubted that the negro could find his place in the American commonwealth if he would. The freedman, with his generations of indulgence in childish folly, ought to put away forever "childish things," through a realization that "character is destiny," and so get in touch with the best sentiment of his environment. He has now reached a point where a choice of two courses awaits him, and where the selection of either will inexorably fix

</span></p><hr data-dcnode-id="915"><a data-dcnode-id="913" name="thoma413"><span data-dcnode-id="914" instrument_node=""> Page 413</span></a><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">



his status in the republic. One is to assimilate fully and thoroughly with his environment; the other is to remain, as now, in complete subordination to it, until exterminated. It does not necessarily follow that race extinction involves physical death through strife and carnage. That is an improbable event. Negro elimination, however, is just as inexorably decreed through the dry rot of mental and spiritual inanition; and to these forces he is fated to succumb, should he not yield ready obedience to the ethical and mental evolution in visible operation around him.</span></p><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Many of the conditions which formerly encompassed the negro have been forgotten in the whirl of transitional events. Forty years ago our negro people were not citizens, and nearly all of them were in a condition of servitude. A single generation has elapsed since they were emancipated and vested with citizenship, and it was as late as 1870 before the Northern negroes were clothed everywhere with the functions of the electoral franchise and, for the first time in national history, allowed to vote. Let it also be remembered that negroes were excluded from the army at the beginning of the Civil War, and when enlisted at a later period were rated and paid as laborers, until their well-tested prowess raised them to the dignity of soldiers. Nor are we to forget that previous to the war the negroes of the United States were the pariahs of the American social structure, and as such subject to legal and social disabilities

</span></p><hr data-dcnode-id="907"><a data-dcnode-id="905" name="thoma414"><span data-dcnode-id="906" instrument_node=""> Page 414</span></a><p data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">



to which their children are the veriest strangers. Massachusetts, now the foremost state of the Union in defence of human rights, passed an act just after the close of the Revolutionary War to expel all negroes from the commonwealth, and this too after they had fought for American independence, and freely mingled their blood with the white patriots of Lexington and Bunker Hill.</span></p><span data-dcnode-id="902" instrument_node="">
</span><p data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;But Massachusetts was not alone in this respect, for race proscription ran high in all of the Northern colonies. In fact, in many of them, persons of color could neither own property, make contracts, nor testify against white persons; and it is only within the last third of a century that many of these restrictions have been removed. In Ohio, one of the states carved out of the territory consecrated to freedom by the Ordinance of 1787, and settled by New England emigrants, no negro, before the year 1848, could vote, or testify in a court of justice in an issue between white men, or where a white man was defendant in a suit brought by a negro. To recover on a contract between a white man and a negro, the latter was required to have such contract attested by white witnesses, otherwise it was void. No provision was made for the education of the children of the black race, or the care of their orphaned or insane, all of whom were excluded from the humanities of law. Nor were such unwarranted racial degradations mitigated until the law known as the "Visible Admixture Bill" was passed, which gave to negroes the

</span></p><hr data-dcnode-id="899"><a data-dcnode-id="897" name="thoma415"><span data-dcnode-id="898" instrument_node=""> Page 415</span></a><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">



right to contract and testify, and which by a later supreme court decision rendered all who were half white, or mulattoes, eligible to vote. In the matter of public inns, railroad travel, and places of amusement, however, as well as schools and churches, there continued for many years to be severe and often forcible discrimination against them.</span></p><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;At a subsequent date the state of Illinois passed a law prohibiting the immigration of persons of color, with a penalty attached imposing a fine of fifty dollars, which, in default of payment, or for a second offence, decreed that such negro offenders were to be sold to the highest bidder as slaves. About the same period the legislature of Indiana proposed the adoption of a similar measure, which was the occasion of considerable excitement among the negro inhabitants of that state. In fact, from the passage of the Fugitive Slave Act in 1850 to the opening of the war, acute race discrimination was universal throughout the country. We have recalled these historical facts, not merely for the purpose of showing the onerous conditions to which free Northern negroes were subjected previous to our civil strife, nor ostentatiously to credit them with whatever of heroic endeavor they evinced in humble stations in securing the rights of manhood and womanhood; our aim is to emphasize seriously the need at the present day of like steady patience, intelligent forethought, and strenuous purpose, and to make known the fact that only through capable, self-reliant

</span></p><hr data-dcnode-id="891"><a data-dcnode-id="889" name="thoma416"><span data-dcnode-id="890" instrument_node=""> Page 416</span></a><p data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">



methods is any ultimate uplifting of the race possible.</span></p><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;In this later day, however, it is the negro who excommunicates himself from all rational intercourse with his fellow-men, and in speech, song, and act persists in treating himself as one who has neither part nor lot in American manhood. He is an enfranchised subject of a commonwealth which recognizes no distinctions in persons, and he is invested with functions no whit inferior to those of other citizens of the nation. Yet, notwithstanding such unquestioned endowments of equality and responsibility, he refuses to take any intelligent step toward the performance of his duties. He does not identify himself with the aims and interests of the community of which he forms a part, and through such voluntary separation from his fellow-citizens he becomes an alien to the public welfare. At his place of residence he is not in evidence in the town meetings, township conventions, or precinct caucus, and in those rare instances where he puts in an appearance he is there simply as a silent observer or quiescent factor, and equally lacking in either helpful suggestions or capable criticisms. He stands aloof in ignorance of such questions as relate to sanitary drainage, the location of highways, the construction of bridges, the erection of schoolhouses, the disposition of public charities, or other matters of vital interest to a suburban and municipal welfare; therefore, such measures are always disposed of without

</span></p><hr data-dcnode-id="883"><a data-dcnode-id="881" name="thoma417"><span data-dcnode-id="882" instrument_node=""> Page 417</span></a><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">



his intervention or coöperation. Hence, it becomes of little moment to any locality whether its freed citizens are scholars or idiots. It is this indifferent attitude toward the visible and subtle forces of life and nature in operation around them which constitutes one of the most perplexing features of the negro question. Where such apathy exists, there can be no effective response to any ameliorating movement. Inferiority, when conscious of its own weakness, is content to exist in subordination to superior dictation. The truth is that nowhere does the negro evince such capacity or fitness in performance as will give him parity of standing with his white fellowmen; and such facts as his inferiority in morals, intelligent judgment, discriminate knowledge, and general character are not to be set aside by flippant retort.</span></p><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The core of the negro question is not his relation to the whites, the withholding of conferred rights, the exercise of the franchise. These are secondary. The supreme question is the possibility and feasibility of transforming the freedman and making a new creature of him. He has had an era of ignorance, an epoch of degradation, a surfeit of follies; he can and ought to awake to a sense of manliness and sober living. It is no mere idle speech to say that no nation, no race, and no man will succeed, who is not equipped and girded for swift endeavor and constant endurance. We want the freedman to know that no power or influence in heaven or earth, other than a demonstrated capacity of character and intelligence,

</span></p><hr data-dcnode-id="875"><a data-dcnode-id="873" name="thoma418"><span data-dcnode-id="874" instrument_node=""> Page 418</span></a><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">



will ever secure him recognition and participation in American social and civic economy. Hence, we seriously advise negro manhood and womanhood to forget the past by facing the present and future with undaunted courage, but with an intelligent understanding of its duties and responsibilities. Only in that way will the social revolution, the moral reformation, and the spiritual regeneration of the race be consummated.</span></p><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Any candid facing of the situation will show that the sentiment of the nation is unfavorable to the present status of the negro. There remains to him both the opportunity and the ability to reverse the
popular judgment. Asked how, we could only say, by awakening in every freedman a conscious sense of duty, and belief that on his speech and act depends a recognition of the worth of his people. Were the notion once clearly realized that the burden of race redemption rested on each one himself, every negro then might become circumspect in conduct, faithful in service, truthful in endeavor, modest in pretensions. The adjustment and elimination of racial differences will finally come through sorting and sifting. The unfit will be pushed aside, but better so, that a nation may live. The fit among us, either of black or white people, are bound to survive. The freedman may lament his condition, and his indiscreet white friends may exploit chimerical schemes for his amelioration; both he and they may invite hopeless suppression by engaging in a struggle for equality

</span></p><hr data-dcnode-id="867"><a data-dcnode-id="865" name="thoma419"><span data-dcnode-id="866" instrument_node=""> Page 419</span></a><p data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">



or supremacy; but so long as he is by instinctive preference a negro in thought and conduct, he is irrevocably doomed to social and political effacement.</span></p><span data-dcnode-id="862" instrument_node="">
</span><p data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;It is obvious that much needless unrest has come to the freedman through false teachings in pulpit and schoolroom, which have simply excited in him unattainable desires, especially as regards political
and social rights. The freedman should have been taught the nature and obligations of social and civic rights, and made to understand that in order to enjoy such rights he must be capably fitted to discharge the duties which are attached to them. Social affinities rarely lie along race or color lines, but are mainly governed by ulterior motives, such as the acquirement of personal advantage, social distinction, material gain, or political preferment. If negroes, therefore, occupy the vantage ground in any of these particulars, conciliation and association with them will as naturally follow as if they were white men, simply and solely for the reason that the law of social gravitation is based on reciprocity of benefits, and none other than that can enforce or enjoin social intercourse. No class of our American citizens is hedged about with invidious legal restrictions. As to what social customs may decree, that is irrelevant, a matter which in no wise concerns us here. All that the freedmen need to know is that with shams abandoned and realities acquired, there would come to them a universal recognition, and their genuine freedom would be nigh at hand.</span></p><span data-dcnode-id="859" instrument_node="">
</span><hr data-dcnode-id="858"><a data-dcnode-id="856" name="thoma420"><span data-dcnode-id="857" instrument_node=""> Page 420</span></a><p data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">
</span></p><p data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;To those who dissent from these conclusions, and point to the material gains of the freedmen as proof of their aptitude for national assimilation, we may say that it is a mischievous fallacy to assume that aggregated material social progress represents individual growth or the betterment of individual human nature. We have in the aggregated wealth of the United States a striking refutation of such conclusions. The material accumulations of individual negroes, therefore, furnish no criterion of the material progress of the race, and assuredly give no insight into their mental and moral advancement or deterioration. The truth is that mental and moral force, and not material hoarding, is the germ and basis of all human advancement. Furthermore, the influence of environment exerts a far greater influence on social development than all other causes combined. An intelligent environment insensibly educates an uninformed, amenable man. An illiterate atmosphere keeps him in ignorance; a virtuous environment holds in check evil inclinations and strengthens chaste principles; so a vicious atmosphere breeds immorality.</span></p><span data-dcnode-id="851" instrument_node="">
</span><p data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Mankind makes progress just to the extent that it heartily coöperates in wholesome association. The first essential for human betterment is virtuous and enlightened contact; the second, a determined desire to profit by such advantages. It is not poverty that shuts the negro out from consort with the American people, but his preference for isolation and seclusion,

</span></p><hr data-dcnode-id="848"><a data-dcnode-id="846" name="thoma421"><span data-dcnode-id="847" instrument_node=""> Page 421</span></a><p data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">



and his persistent adherence to racial habits of grievous offence to modern ideals. Therefore, just as negro segregation breeds clannish prejudice and fosters racial degradation, so association with the world at large will beget hearty fellowship and wholesome desire for noble living. Negro redemption and assimilation with the American people depends entirely on his ability to absorb their ideals and conform to their standard of living. The processes which are constantly going on in our complex population in the extermination of foreign racial characteristics show the possibility of the ultimate assimilation of all foreign racial distinctions in citizens. The freedman can, if he will, be included in this civic transformation, and only through such national assimilation will negro individual consciousness be swallowed up in the universal consciousness, and his individual aims and selfishness absorbed in universal interest.</span></p><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;National assimilation, then, is possible for the negro. Nevertheless, there can be no absolute regeneration of the American freedman until his hereditary mental concepts have been uprooted, and replaced by the ideas and realities of modern civilization and culture. We contend for no mere imitation of the manner and speech of a dominant class, but a comprehensive understanding and assimilation of the ideas, impulses, and aspirations of a superior civilization, to such a degree as will easily enable the negro to breathe in its atmosphere, think in its language, speak its sentiments, and act as its inspirations impel. What the

</span></p><hr data-dcnode-id="840"><a data-dcnode-id="838" name="thoma422"><span data-dcnode-id="839" instrument_node=""> Page 422</span></a><p data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">



freedman needs is to become socialized, by getting in touch with all wholesome environing activities. White people will associate with negroes whenever and wherever they fill the place and conform to the ideals of white men. In fact, despite racial prejudices, there is no section where there will not be found freedmen who are thoroughly respected by the whites and freely mingle with them. The aim of true national assimilation should be to bring about, regardless of physical colors or ethnological affiliations, agreement in the thought and action of all dissimilar parts of the body politic, and if we gauge aright the sentiment of the nation, that is the ultimate aim and purpose of its civilization. Negro assimilation, then, means a conception of and identification with the highest and best American ideals, without any implication of identity in racial physical phenomena,--this latter a consummation which, at this stage in his history, would be both undesirable and unattainable. We sincerely believe that, when the negro begins to bestir himself in present-day activities, and exhibits sound discretion and judicious tact in friendly intercourse with his fellow-men, much of the existing racial prejudice and caste distinctions will speedily disappear, through an acknowledged recognition of the brotherhood of capable achievement. But we are none the less certain that it will not be a blending of colors, but an absorption of ideas which will consummate negro assimilation to American civilization.</span></p><span data-dcnode-id="835" instrument_node="">
</span><hr data-dcnode-id="834"><a data-dcnode-id="832" name="thoma423"><span data-dcnode-id="833" instrument_node=""> Page 423</span></a><p data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">
</span></p><p data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Race uplifting, however, can be accomplished in no other way than by a comprehensive individual development, carried on under conscious internal processes. The negro has never rendered whole-hearted obedience to lawful restraints. He was kept in physical subjection by slavery and fear of punishment, but he never acquired in servitude a clear conception of the need of self-discipline and respect for the law of right-doing. The removal of physical restraint by the emancipation of the freedmen has offensively brought into prominent activity the vulgar, self-asserting, levelling instincts previously latent in negro nature, which have since developed into supreme contempt for wholesome and orderly living. It is within the power of those freedmen who have deep convictions of their insufficiencies to exchange speedily sound for sense, words for ideas, shams for realities, shadows for substance, and every other childish encumbrance for stalwart character.</span></p><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;No matter what may be their degree of development, no people is exempt from the conditions of human nature, which are to-day as they were at the beginning, except as modified by intelligent forethought and skilful providence. Man's growth in civilization may be traced without much difficulty through the several stages of his development, from a state of savage robbery to barbaric warfare, from captive slavery to industrial serfdom, and thence through feudal tenure to personal and political freedom. Each transition marks a fundamental step in

</span></p><hr data-dcnode-id="824"><a data-dcnode-id="822" name="thoma424"><span data-dcnode-id="823" instrument_node=""> Page 424</span></a><p data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">


human evolution. That which has been the experience of all men is true of the freedman. As to what he was and is, we have a fair knowledge, but as to what he will become no man can say. At present, however, this is obvious: he is legally tolerated in the North; while in the South, though decretal emancipation released him from lawful servile domination, he is still, none the less, an industrial serf. In neither section does he have acknowledged fellowship. What he needs from all is sympathy, coöperation, and genuine recognition of whatever manly worth he is possessed. To help negro men and women effectually, we must lift them to a higher plane of living, by disciplining their thoughts, increasing their knowledge, refining their feelings, cultivating their self-respect, awakening their aspirations, developing their energies, and opening to them every possible avenue for self-improvement. Nothing is so potent to accomplish these things as genuine friendship,--that kind of friendship which embodies true human brotherhood, to which every human creature is susceptible and responsive, because, as has been aptly said, "hunger and labor, seedtime and harvest, love and death," are the inheritance of all races. Many, however, among both our white and black citizens, are far from realizing that the essence and aim of all life and living is the development of character, or that of all human virtues integrity is the chief among fundamentals. Nor do they perceive that, where we have personal integrity plus social integrity, the inevitable

</span></p><hr data-dcnode-id="819"><a data-dcnode-id="817" name="thoma425"><span data-dcnode-id="818" instrument_node=""> Page 425</span></a><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">



result is fellowship of service that wipes out all antipathy to color or other physical distinctions.</span></p><span data-dcnode-id="814" instrument_node="">
</span><p data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Herbert Spencer says, "The tendency of all government is toward rigidity of structure." No doubt that is true, for there is an observed disposition in modern society not only to specialize, but to centralize, administrative functions. Our government is by no means perfect either in form or practice, and fresh vital knowledge derived through open-eyed and openhearted observation will reveal many crude but remediable defects. Our first great need is an intelligently developed, homogeneous nation, not for aggressive warfare and foreign conquest, but for domestic security and industrial achievement. What we contend for is homogeneity in sentiment, impulse, conduct, and character. But in every process of successful national assimilation a twofold condition is required; one is a helpful reaching out on the part of a superior class; the other a willingness on the part of a submerged people to be transformed. Otherwise, national coalescence is impossible.</span></p><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Count Tolstoï rightly teaches that justice, civilization, humanity, peace, and freedom are ideals capable of realization wherever political duties and human duties are made coincident functions. These conclusions are preëminently true in a republic where enfranchised citizenship makes every man a peer of the realm and a king in civil duty. But in order to exercise his sovereign functions aright he must have the intelligence of a king, or be dethroned by ignorance

</span></p><hr data-dcnode-id="808"><a data-dcnode-id="806" name="thoma426"><span data-dcnode-id="807" instrument_node=""> Page 426</span></a><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">



or intelligent venality. Mere natural advantages, such as a great area of land, an equable climate, and dense population, do not in themselves make a great and strong people. On the contrary, civic aptitude and national growth depend on that degree of energy and intelligent judgment which is inherent in and exercised by the aggregated units of a given organism, great or small. In this respect the little Swiss Republic, with its diverse races, languages, and ethical beliefs, furnishes a conspicuous object-lesson in national assimilation and civic integrity; and one which might be studied with profit by governments of greater pretensions in dealing with complex questions affecting their internal economy.</span></p><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;It has been said that all nations are opportunists, and that all democratic governments are experimental and largely based on questions of self-interest. In this republic we have come to the parting of the ways. We have choice of being either the evangel of universal humanity, or the blind destroyer of ourselves and the ideas for which our country stands. The greatest danger which awaits our future existence is the growth and political corruption of our cities. Was it not cities that destroyed Rome and Greece, and is it improbable that they may here undermine and uproot American civil liberty? Have we not ample evidence of the existence and effect of civic corruption in the lawlessness that reigned in the South during and after the war, when many people plundered, murdered, and pillaged for private

</span></p><hr data-dcnode-id="800"><a data-dcnode-id="798" name="thoma427"><span data-dcnode-id="799" instrument_node=""> Page 427</span></a><p data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">



gain? Is there not conclusive proof of widespread official corruption during the reconstructive period, when crafty Northern white men and Southern impoverished aristocrats joined hands in piratical plunder, and through a conspiracy of theft and a carnival of felonies wrought reckless havoc with the credit of states and the property of citizens? Nor shall we be rid of these evils so long as integrity is derided, and mammon reigns and dominates social and civic life.</span></p><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The freedman is an American citizen and an element of a civilization which, in its higher reaches and loftier moods, stands for personal purity, truth, character, and righteousness. But the fact that unqualified negroes are deprived of the elective franchise is not to be taken as an expression of race prejudice; nor have they a right to put such exclusion on the ground of color. A notable example of disfranchised citizens obtains in the District of Columbia, whose white and black inhabitants are both denied the right to vote or exercise the least function of local self-government, and where, of all places in the United States, the negroes are best qualified for the exercise of civic functions. What we desire to emphasize is that in no organism is there such a thing as unrestricted universal suffrage; for not only is enfranchisement a matter of expediency, but suffrage is not essential to citizenship. The right of universal suffrage is not granted by the Constitution of the United States, and the subjection of inferior

</span></p><hr data-dcnode-id="792"><a data-dcnode-id="790" name="thoma428"><span data-dcnode-id="791" instrument_node=""> Page 428</span></a><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">



races or individuals to government jurisdiction, while not permitting them to exercise electoral functions, is no denial of inherent rights. It would be well for those who dissent from these conclusions to bear in mind that this nation is honestly striving to solve the problem of human self-government, with manhood and character as its established ideals of sovereign equality.</span></p><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;There is no doubt but that some very beneficent changes might be wrought in our administrative policy, especially in the matter of suffrage. Our negro people are enfranchised citizens, who, when competent to exercise such functions, should neither evade their civic duty nor permit any interference with their political obligations; but otherwise they and all other persons, without regard to past conferred privileges, who are clearly unfit rightly to discharge their electoral functions should be disfranchised. Such a step would be no novel infringement on the liberties of citizens. Just here we may note that both Pennsylvania and North Carolina, in the latter part of the thirties, disfranchised their free negro inhabitants, though they had previously enjoyed the privilege of voting in common with their white fellow-citizens. There were also, at an early age, many free negroes in Virginia and the other colonies who, as late as 1723, had all the rights and privileges of freemen, including the right of the franchise. There is every evidence, however, to show that a lack of thrift and moral sobriety characterized the freedmen of the seventeenth

</span></p><hr data-dcnode-id="784"><a data-dcnode-id="782" name="thoma429"><span data-dcnode-id="783" instrument_node=""> Page 429</span></a><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">



century as completely as it does his descendants of the nineteenth century. These facts are stated in order to emphasize our conviction that none of the essential rights of the freedman are imperilled by withholding from him franchise functions. What is it that makes for good government, other than a love of order, decency, and the ability to subordinate self and self-interest for the common welfare?--a thing the negro has not yet done. Citizen suffrage is in our judgment a matter of national interest, and the right to exercise it should be conferred by national authority.</span></p><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;What are the facts? All men are not equal in intelligence and capacity, and the larger number of them are unfit to be intrusted with self-governing functions in a highly organized government. No citizen, therefore, of this republic should be permitted to exercise the privilege of the franchise who cannot read and write the English language, and who has not read and fairly understood the Constitution of the state wherein he resides, and the Constitution of the United States. Suffrage, rightly viewed, is a trust as well as a duty. Every voter should regard himself as a responsible member of a civil corporation, a stockholder in the body politic, a trustee for the disfranchised, a delegated custodian of the rights, interests, and welfare of every non-participant in municipal government. Now, as the inaptitude of the negro for self-government has been demonstrated, the illiterate and debased

</span></p><hr data-dcnode-id="776"><a data-dcnode-id="774" name="thoma430"><span data-dcnode-id="775" instrument_node=""> Page 430</span></a><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">



freedman should not be permitted to vote. Further than that, the incapables of every race and color should be irrevocably disfranchised. There is no need, however, that the Fifteenth Amendment should be repealed, but there is absolute need of its modification. Vague and ambiguous as it now is, it ought to be made clear, definite, and conclusive in application. Hence as the Fourteenth Constitutional Amendment fixed the status of American citizenship, so the Fifteenth Amendment should decree the qualification of voters, with enfranchisement based solely on character, intelligence, and a capable identification with public affairs. American citizenship then would know no distinction in color, race, creed, or section, in its determination for capable and efficient administrative control. While suffrage, in our judgment, is a matter of national interest, and its right of exercise should be conferred by national authority, it is evident, in view of existing conditions in public affairs, that, whatever need there may be for revising suffrage legislation, the several states will not, of their own volition, adjust the question of suffrage on any equitable and uniform basis. We may suggest then, that, by making the individual voter directly amenable to the Federal government, we shall have taken a long stride toward making society homogeneous; besides, it will then be no idle aphorism to say that a crime against citizenship is a crime against the nation.</span></p><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We conclude a discussion in which we have sought

</span></p><hr data-dcnode-id="768"><a data-dcnode-id="766" name="thoma431"><span data-dcnode-id="767" instrument_node=""> Page 431</span></a><p data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">



to solve complex problems,--not in the depths of racial bigotry, but elevated by fraternal patriotism,--by observing that our indigenous toilers, the brawny blacks, have both place and duty in American development. Their increasing millions will yet prove strength or weakness to our composite civilization in exact proportion as we are wise or foolish in our treatment of them. Wisely viewed, negro efficiency is bound up with transformation of the race,--a mental and social evolution, wherein dreams will be tossed aside for realities, death for life, and empty speech for ideas aflame with immortality. In a word, a radical regeneration, not in color, but in conduct, is the absolute need of our freedmen.</span></p><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The future American negro will part, undoubtedly, with many of his racial characteristics as he approximates in color and conduct the white race. Even now many persons of negroid ancestry are so fair in color that they readily pass for white people, and marry among that class without exciting the slightest suspicion as to their mixed race identity. Furthermore, white American marriages are constantly contracted with every variety of the colored races, and the fruit of such unions is certain to exert, hereafter, a considerable influence upon many existing social perplexities. The inevitable outcome of a perfect blending of our heterogeneous peoples would be the development of a composite type of American people of incomparable strength and beauty, who, if they clung fast to their best ethical instincts,

</span></p><hr data-dcnode-id="760"><a data-dcnode-id="758" name="thoma432"><span data-dcnode-id="759" instrument_node=""> Page 432</span></a><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">
