</span><p data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;This hybrid republic, a mendicant by birth and beggar by profession, has had a precarious existence for more than three quarters of a century. It has a disease-breeding climate, and for form of government a crude and grotesque copy of American institutions. Its makeshifts for churches are supported by American charity; its nondescript schools, by contributions from beyond the sea. Its capital, Monrovia, is made up of a collection of rude dwellings; its designated streets are open spaces, overgrown with grass and bushes, with not the slightest pretence of sidewalks,

</span></p><hr data-dcnode-id="1448"><a data-dcnode-id="1446" name="thoma353"><span data-dcnode-id="1447" instrument_node=""> Page 353</span></a><p data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">



street illumination, sewerage, or the least of those sanitary precautions which characterize the most inferior municipality of England or America. Outside of Monrovia, there are neither roads nor even passable footpaths; no bridges swing over its turbulent streams; no railway or other means of travel by land exists; and, save primitive canoes, crafts for water transportation are unknown. This section of Africa has a soil of tropical fertility, but no agricultural interest flourishes. It has rich and varied mineral deposits, but no mines are operated; no mill machinery is in motion or existence; no manufacturing has been started and no industrial activity is visible. Squalor, nakedness, indolence, and want riot and revel under a government of absurd pretensions steadily sinking into decrepitude. Of the people themselves, all trustworthy authorities are agreed that the American-Liberian negroes are an overbearing class, who have not exerted the slightest elevating influence on the native population, many of whom are in a state of industrial bondage to these colonists, and subjected by them to a rigor of authority and brutality of usage which the traditions of their former American servitude do not fail to suggest.</span></p><span data-dcnode-id="1443" instrument_node="">
</span><p data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;What a striking contrast the early settlers of our own country offer to those Liberian negroes. Our American colonists were poor in worldly goods, but rich in men and women surcharged with brain, brawn, and godly determination,--a people imbued with

</span></p><hr data-dcnode-id="1440"><a data-dcnode-id="1438" name="thoma354"><span data-dcnode-id="1439" instrument_node=""> Page 354</span></a><p data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">



prophetic inspirations and conscious faith in themselves. With saw and axe they subdued the forest, planted fields, built log cabins, and through sheer energy and intelligent foresight transformed a bleak wilderness into an inviting paradise. But while Saxon industry and courage are achieving their purpose, negro lethargy, Micawber-like, stands "waiting for something to turn up" in the way of donated relief. Herein lies the fundamental distinction between the races. This African-American republic is a visible type of that which any imported negro government is likely to be in that country. It is also an undeniable fact that Liberia is vastly inferior in every essential respect to many native negro governments. The probabilities are that it will eventually pass under English control. In that case its future will be more hopeful. But under present management, all the wealth of the British empire would not avail to make it a great or prosperous nation, so thoroughly is it honeycombed with ignorance and inefficiency.</span></p><span data-dcnode-id="1435" instrument_node="">
</span><p data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We believe this inquiry has gone far enough to show that no negro government exists, or has existed within the knowledge of man, whose national character and inherent endowments are such as would justify its perpetuity or render it worthy of imitation. Nor have negro people, here or elsewhere, ever created an institution, devised a law, promulgated a science, formulated a philosophy, developed a literature, or instituted conditions of social betterment

</span></p><hr data-dcnode-id="1432"><a data-dcnode-id="1430" name="thoma355"><span data-dcnode-id="1431" instrument_node=""> Page 355</span></a><p data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">



that had the approval of contemporaries, or the respect of posterity. Negroes have been slaves in all quarters of the globe, and physical bondage is not a school which qualifies its subjects for the exercise of irresponsible power. At any rate, a people but one generation removed from personal chattelism are neither fit for self-government nor capable custodians of the rights of others.</span></p><span data-dcnode-id="1427" instrument_node="">
</span><p data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;There are some persons who are disposed to regard the sporadic migrations of the freedmen as evidence of deep-seated unrest among them and desire to change their abode. The negro is discontented. He is, however, wanting in the migratory instincts of other races, for, despite occasional roamings, he is content only in aggregated racial habitations of fixed locality and defined bounds. It is this characteristic which interposes a fundamental barrier to any scheme for African colonization, and to it is due the neglect of the negroes after their emancipation to settle on the public lands of the general government, of which, in the South alone, there were millions of acres open to public entry under the homestead laws of the United States.</span></p><span data-dcnode-id="1424" instrument_node="">
</span><p data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The negro, however, is not without some experience in colonization in the Western world. We do not allude to fugitive slave settlement in Canada, for that form of migration was mainly individual, and in no instance rose to the dignity and importance of concerted community settlements carried on under organized methods. He has, however, made several abortive attempts at colonial migration. He has

</span></p><hr data-dcnode-id="1421"><a data-dcnode-id="1419" name="thoma356"><span data-dcnode-id="1420" instrument_node=""> Page 356</span></a><p data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">



gone to Mexico under the most illusive promises, only to meet disappointment and beggary. He has emigrated to the West, empty-handed and ignorant of the conditions of life which obtain there, only to find himself stranded and drifting back to his former abode. In each instance he failed to better his condition, because common-sense methods were left out of his reckoning. To both localities he went, not as a land-seeker and home-builder, or to become a creative factor in a permanent community, but as a crude laborer to a market already overcrowded with untrained forces. His migration was made impulsively and ignorantly, without one sane element entering into his calculations. That he should fail was, from every rational standpoint, a foregone conclusion.</span></p><span data-dcnode-id="1416" instrument_node="">
</span><p data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Perhaps his most futile attempt at colonial settlement was that of the Haytian migration scheme which had its rise during the closing years of the fifties. This was a movement which duped thousands of negroes North and South with delusive tales of wealth and freedom, and led them to cast their lot with a people with whom they had no affinity, and from whom they could receive no succor when subsequent poverty and illness had reduced them to dire distress. Most of the negroes who went to Hayti afterward found their way back to the United States; and it is trustworthy opinion that ninety per cent of all negroes who leave the United States for Liberia would return could they find the means to do so.</span></p><span data-dcnode-id="1413" instrument_node="">
</span><hr data-dcnode-id="1412"><a data-dcnode-id="1410" name="thoma357"><span data-dcnode-id="1411" instrument_node=""> Page 357</span></a><p data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">
</span></p><p data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We contend that the negro has not the capacity for any extensive scheme of migration. If he had, abundant opportunities involving little risk lie all about him. For instance, what better opening can be conceived than for a few like-minded and well-equipped freedmen to get together and lease land in some suitable Southern section and build up a community after their own liking? If there really exists any deep-seated desire among these people for self-government, such a settlement ought to be reckoned by hundreds and even thousands of families. An experiment of this sort, if successful, would naturally fit them for exercising greater civic responsibilities, besides exerting a profound influence on the political condition of freedmen elsewhere. In the end it might open the way for a widespread recognition of a desire to better themselves.</span></p><span data-dcnode-id="1405" instrument_node="">
</span><p data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The dark-hued races of the Western continent, though of negroid ancestry, are in every essential respect Americans, and at best can have but sentimental attachment for a severed and obliterated lineage. It may be well doubted if unmixed negro blood exists here to any considerable degree. If so, it is unlike the African stock. Another fact to be considered is that, not only does emigration to Africa by American negroes sever perpetually those social relations and personal ties which bind them here, but it effects their individual expatriation. In event of their emigrating they will be no longer citizens of this country, and their maintenance abroad will

</span></p><hr data-dcnode-id="1402"><a data-dcnode-id="1400" name="thoma358"><span data-dcnode-id="1401" instrument_node=""> Page 358</span></a><p data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">



depend on their degree of adaptation to untried conditions in an unknown environment. Their civic relations in Africa will be determined in one of two ways: either by giving their allegiance to an alien government with a consequent subjection to foreign methods of control, or the creation and development of a distinctly negro autonomy. The latter event implies the existence of a considerable body of negro colonists on African soil, a concession of territory of advantageous location, with a government likely to be exempt from internal feuds or entangling complications with external forces. Since in Africa there are no indigenous civilizations or nations capable of contracting and enforcing treaties of reciprocal amity, the matter of extermination or perpetuation of any projected negro government would be decided by the strongest forces, whether it was confronted by native belligerence or foreign greed.</span></p><span data-dcnode-id="1397" instrument_node="">
</span><p data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;There is a well-founded impression that the work of race-uplifting among us has scarcely begun. That the freedmen are in sore straits, that universal poverty and universal ignorance are their chief possessions, no wise person denies. But, as a remedy for these conditions, the American-African colonial movement, as set forth by its negro promoters, is narrow in conception, crude in plan, and defective in detail, and in no particular invites public confidence. It conspicuously indicates on the part of its zealous advocates such meagreness of investigation and paucity of thought as to impugn the motives and discredit the statement of

</span></p><hr data-dcnode-id="1394"><a data-dcnode-id="1392" name="thoma359"><span data-dcnode-id="1393" instrument_node=""> Page 359</span></a><p data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">



those who invite a badly worsted people to so despicable an evasion of inherent duty. We are led to believe that negro colonization is led by selfishness and vain ambition; that its advocates are engaged in fomenting a spirit of unrest among the freed people in the hope of securing for themselves notoriety and pecuniary profit, and lasting escape from that wholesome development which American environment imposes and barbarous isolation annuls.</span></p><span data-dcnode-id="1389" instrument_node="">
</span><p data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We are at the threshold of tremendous and far-reaching changes in our public polity, and at a point where no observant person can fail to see an approaching crisis in the problem of negro social and civic adjustment to American institutions. It is needful that the freedman should wisely bestir himself, if he would catch the spirit of the hour and share in its final fruits. However, lest there should get abroad in the public mind an exaggerated notion of the importance and magnitude of African colonization to the American negro, it is becoming now to say that the common people--the bone and sinew of the present, and the hope of all future race achievement in or out of church relations--are not moved by its lurid hyperboles and ranting fallacy, but plod on, minding their own business. Some of them are already absorbed--and in that lies the clew and key to the solution of the negro problem here or in Africa--in getting knowledge, buying homes, enlarging their resources, building up better lives, acquiring clearer perceptions of right-doing, and becoming

</span></p><hr data-dcnode-id="1386"><a data-dcnode-id="1384" name="thoma360"><span data-dcnode-id="1385" instrument_node=""> Page 360</span></a><p data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">



more closely identified in touch and bearing with the best expressions of modern civilization. They believe, despite the negro's degradation and oppression, that he is here to right his wrongs, to correct his mistakes, to train his intellect, to discipline his courage,--not for alien sequestration, but to the end that he may take and hold his rightful place in American citizenship.</span></p><span data-dcnode-id="1381" instrument_node="">
</span><p data-dcnode-id="1380"></p><hr data-dcnode-id="1379"><a data-dcnode-id="1377" name="thoma361"><span data-dcnode-id="1378" instrument_node=""> Page 361</span></a><p data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">
</span></p><h3 align="center" data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">CHAPTER XIII</span></h3><span data-dcnode-id="1372" instrument_node="">
</span><h3 align="center" data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">FEASIBLE REGENERATION</span></h3><span data-dcnode-id="1369" instrument_node="">
</span><p data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;THERE is a widespread conviction in the public
mind, that in morals, intelligence, industry, and
thrift the freed people are not what they ought to
be. A difference of opinion exists as to the causes
which have wrought the negro's present condition
and the influences which perpetuate his degradation; nevertheless, all sensible people are agreed that we have, in the case of the freedman, a complex and grave problem. We have carefully sought to ascertain what the negro was and is, before determining what he may become, and in so doing his miserable conditions have become apparent. The American negro is in a low state of social development, with no clear sense of his degradation or of progress from it. He is self-content; with ideals grounded in his
senses and excited to activity by physical causes.
The negro is also in subjection to an inheritance,
wherein the mental disposition, vocal expression, and physical action of parents are largely transmitted to their children, and in which there is a visibly entailed ancestral instinct for what is coarse, vulgar, and vicious in life. He is lawless by nature, and renders at best but perfunctory obedience to lawful requirements.

</span></p><hr data-dcnode-id="1366"><a data-dcnode-id="1364" name="thoma362"><span data-dcnode-id="1365" instrument_node=""> Page 362</span></a><p data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">



His persistence in resisting transformation has developed a negro social status as distinctly distasteful as it is antagonistic to sound American aims and ideals. Therefore, with the degradation of the freedmen beyond dispute, and his redemption an unaccomplished fact, the question of his regeneration requires honest and direct treatment through sincere and well-intentioned methods.</span></p><span data-dcnode-id="1361" instrument_node="">
</span><p data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The presence of negroes in the United States creates social conditions of importance to the present and future well-being of American ethical, economic, and political existence. That such conditions may in certain states eventually precipitate questions of supremacy between African savagery and English civilization is no idle surmise. Hence a question of immediate concern to the nation is, Shall the culture and achievement of the country be materially lessened through the continued indolence and imbecility of the negro? All historical experience shows that superior and inferior civilization cannot for a long time exist in the same social organism and be perpetuated in harmonious conjunction; one or the other will be overthrown and exterminated. The negro has nothing, in word or act, worthy of preservation. Each attribute of his being is obstinately and implacably arrayed against every influence that parts him from sensuous excitement; and when he gives to any uplifting movement verbal assent, he rarely translates speech into action. Wise judgment, therefore, decrees that negro pretensions ought to be suppressed,

</span></p><hr data-dcnode-id="1358"><a data-dcnode-id="1356" name="thoma363"><span data-dcnode-id="1357" instrument_node=""> Page 363</span></a><p data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">



and his evil propensities eradicated by every available means at command, even though such efforts should end in his virtual extermination.</span></p><span data-dcnode-id="1353" instrument_node="">
</span><p data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Now, in voicing these sober convictions we are fully aware of the opportunities the negro enjoys in the way of intellectual culture and ethical training, his carelessness of which shows how improbable it is that negroes, brought up in low conditions of life, will voluntarily rid themselves of the promptings of their inheritance. We have ample corroboration of this conclusion in the condition of the three quarters of a million of negro people who live in the North, in the very heart of its civilization, and overshadowed by its Christianity. Many of these people reside in communities where they and their ancestors have dwelt for two centuries, and where they have enjoyed unrestricted access to the best schools, churches, libraries, and the other social and civic institutions of unsurpassed worth. We therefore have a right to expect to find in these people the highest and best examples of negro development that the race affords. As a matter of fact, some of the most ignorant and degraded of the American freedmen are among them.</span></p><span data-dcnode-id="1350" instrument_node="">
</span><p data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;No more conclusive test of racial incapacity could be applied to the negro than that furnished by the conditions cited. The recognized agencies of public improvement apparently furnish neither example nor inspiration to this people, who, contrary to every sense or reason, obviously shrink from contact with

</span></p><hr data-dcnode-id="1347"><a data-dcnode-id="1345" name="thoma364"><span data-dcnode-id="1346" instrument_node=""> Page 364</span></a><p data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">



strong, uplifting forces, and to every intent and purpose are wholly unconscious of the existence of any environment higher than their own. Nevertheless, for any sound determination of this matter, the examples furnished by Northern negroes are inconclusive. Not only have they been invested with qualities and credited with capacities they do not possess, but the essential fact has been overlooked, that they are not a self-governing people, and are as incapable of rational self-direction as children. There are those among both the black and the white people who spurn all past experience, and wilfully ignore present conditions in professing to believe that time will develop strong and stalwart virtues in the negroes--though time, in itself, does nothing but bring men to dissolution and decay. There is no surer way to perpetuate the freedman's degradation than by giving credence to such beliefs. All change and growth must have a beginning. The law of human regeneration is inexorable. Now--is the dividing line betwixt life and death.</span></p><span data-dcnode-id="1342" instrument_node="">
</span><p data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;No fact is more strongly attested than that of
human flexibility in mental and spiritual states: a
truth to which the sober conscience of every man
bears witness. There is in each person a force that
moulds and determines the characteristic bent of any and all individual life. By choice and will, any man can pass from inferior to superior groups, and the reverse as well. It therefore lies within the power of the weakest of human races to acquire strong

</span></p><hr data-dcnode-id="1339"><a data-dcnode-id="1337" name="thoma365"><span data-dcnode-id="1338" instrument_node=""> Page 365</span></a><p data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">



characters, broad-mindedness, and the courage to have intelligent convictions concerning truth and duty. The negro can be a man if he will. But in order to do so he must cease being the creature of credulous instincts that he is; he must lay aside at once and forever those habits of mind and character which justly brand him as an inferior creature.</span></p><span data-dcnode-id="1334" instrument_node="">
</span><p data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The freedman, then, regardless of poverty or affluence, can begin at once to live an awakened and elevated life. He can be a man of truth and worth, by doing the best that in him lies, and when he has done that, an angel could do no more. There are, to be sure, a multitude of negroes who have neither ears to hear nor mind to heed these suggestions; but to the intelligent, the mere thought of such transforming possibilities ought to quicken the pulse and send the blood tingling through the veins. What amazing changes in human character will be wrought when men are brought to realize that all human regeneration,--moral, mental, physical,--is an internal process, begun and completed within the individual himself; or that other fact, that any man who yearns for a higher life can be true and do right if he so wills to do. But whether the freedmen heed these admonitions or not, the one evident fact is, that they will never atone for the past or bring light to the future until they cut off all ignoble ties and flee from all mendacious shams, and by a steadfast worship of truth and righteousness, trample

</span></p><hr data-dcnode-id="1331"><a data-dcnode-id="1329" name="thoma366"><span data-dcnode-id="1330" instrument_node=""> Page 366</span></a><p data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">



under foot every racial delusion that blocks the way to their social and spiritual elevation.</span></p><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The ability to conform to the requirements of enveloping conditions is the highest test of evolution for individuals or races. It is therefore evident that the first duty of the negro is to see with unequivocal rightmindedness his place and his relation and obligations to society and himself. The second, to discern with unerring instinct true men and women and true things. The third, to eschew, without evasion or subterfuge, vicious race besetments, and instead thereof plant within himself such impulses for right-doing as shall weave desire into principle, and knowledge into action. That the negro is not irrevocably bound by hereditary forms of thought and action is attested by substantial proofs within the race of personal culture and regenerative growth. So convincing is the evidence which these examples furnish, that there need be no longer any question as to the ability of the freedman to change his attitude in any respect that he wills.</span></p><span data-dcnode-id="1323" instrument_node="">
</span><p data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;It is to this end that we shall again and again, throughout this discussion, insist that man may will himself into any regenerative attitude that he pleases. What we mean by willing is identifying one's self with an object to the extent that one assimilates one's self with it. Of course we are conscious that before the negro can acquire any adequate comprehension of the essential qualities of character a complete transformation of his mental capacity, ethical

</span></p><hr data-dcnode-id="1320"><a data-dcnode-id="1318" name="thoma367"><span data-dcnode-id="1319" instrument_node=""> Page 367</span></a><p data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">



ideas, social relations, and civic notions must first take place. He himself must sow the seeds of self-regeneration. But assuming a desire for regeneration, the first duty of the negro is to know himself--that is, to comprehend in an elementary sense all essential weaknesses of his nature. As it is, he is mentally dense and sensually enthralled; he has in him no indwelling spirit of self-dependence, self-help, and self-government, and he stands greatly in need of simplicity of manners as well as severity of morals. The awakened negro, who would be free from inherited degradation, needs to realize the loathsomeness of his nature. He must acquire a wholesome aversion for physical weaknesses, a deep abhorrence of hypocrisies, and a sense of the mockery of a religion that enslaves the body and corrupts the highest instincts of his soul. When he realizes such virtues of action he will emerge out of racial sloth and ignorance into character and purity, as easily as the lotus plant rises out of the Nile mud into fragrance and beauty.</span></p><span data-dcnode-id="1315" instrument_node="">
</span><p data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The doctrine is current that human improvement is of necessity a slow process; such is, however, a pernicious fallacy. Human progress, social or material, may be set in motion instantaneously and continued indefinitely, so long as the laws of justice, of intelligence, and of equal opportunity are allowed full play, and man wills to grow. Man is the arbiter of his own destiny, with infinite possibilities of development, and as a self-determining being dwells of

</span></p><hr data-dcnode-id="1312"><a data-dcnode-id="1310" name="thoma368"><span data-dcnode-id="1311" instrument_node=""> Page 368</span></a><p data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">



choice in sunshine or shadow, light or darkness. Speaking now in a fundamental sense, men are in that state in which they prefer to exist; they may, to be sure, have impulsive longings for other conditions of living, but so long as these are not concreted into facts, the presumption must be that they are content where they are. What is more obvious than that regeneration is an awakening to needs of which there was no previous sense of want, together with ability to supply the remedy. The groundwork of human growth is a recognized want, a concentration of desire, a formulation of conviction, an organized purpose, an energized action. Upon these characteristics rest the distinctions which separate men into doers and non-doers. Where inefficiency exists among individuals of a superior people, the fact that such persons belong to a race of energy and capacity for achievement gives them a tremendous advantage over members of races who, even though their equals in other respects, have no background of honorable achievement to incite them to action.</span></p><span data-dcnode-id="1307" instrument_node="">
</span><p data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;These conditions have been fully realized in the case of the negro, whose mental and manual inefficiency has been such as to excite the contempt of superiors in letters and arouse the hostility of labor in every skilled industry. The lesson taught him is, that while inequalities occur in every variety of life, like and unlike seek affinitive groups; that nature remorselessly assorts and classifies mankind into

</span></p><hr data-dcnode-id="1304"><a data-dcnode-id="1302" name="thoma369"><span data-dcnode-id="1303" instrument_node=""> Page 369</span></a><p data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">



capables and incapables, and that by such inexorable and infallible methods are individual worth and racial worth attested. Racial sentiment may extenuate the fact that so far the freedman has shown no serious purpose either for social or industrial betterment. But let us have done with the folly of saying that the negro has had but three decades of opportunity for self-culture, when, as a matter of fact, he has had an equal chance with the rest of mankind from the dawn of creation. In truth, he has enjoyed superior advantages, because, had he possessed superior endowment to start with, his unimpaired identity throughout the changing cycles of time placed him in a position to hold firmly to ancestral traditions, and profit by the accumulated experience of millenniums.</span></p><span data-dcnode-id="1299" instrument_node="">
</span><p data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The first step in social evolution is obedience to law; for even with many disadvantages on his side, a law-abiding man is always stronger than a lawless one. Coherent and capable action is unattainable without discipline; success is impossible for any people who revolt at systematic training. The second step is to discover the full measure of individual endowment, and to limit activities to such lines of endeavor as personal fitness justifies; otherwise the intensest effort becomes merely a waste of energy--a fruitless folly. Conscious endowment is the prelude to capable achievement, though there may be in races or individuals a wealth of strong qualities of which they have but dim notions, and which are only brought to light in actual

</span></p><hr data-dcnode-id="1296"><a data-dcnode-id="1294" name="thoma370"><span data-dcnode-id="1295" instrument_node=""> Page 370</span></a><p data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">



endeavor. Such cases however, are rare; and where they exist, efficiency is crippled for want of previous knowledge of the essential things which make for recognition and proficiency in the industrial world. The sole discernible difference between men is their capacity for capable doing, and on that foundation the whole superstructure of individual and racial differentiation rests. The whole of humanity, therefore, regardless of color or race, may be divided into efficient and non-efficient groups.</span></p><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The successful race represents the most energetic people, and racial efficiency exhibits its highest development in that class who have acquired the greatest command over themselves and the most intelligent control over the forces of nature. The latter achievement, by the way, gives to any race an immeasurable superiority over inferior types. Strong convictions make strong men, and develop strong characters. The strongest individuals within a race are those who give character to its endeavor, so in a larger sense the strong races are the triumphant nations of the world. In the highest civilization two motives lead mankind to the conflict of life: the struggle to live; the struggle to enjoy. Inferior peoples, however, whether aggregated by tribal barbarism or submerged by modern civilization, merely exist; and existence is not living. The negro has not reached the stage of prudent living nor rational enjoyment. This simple statement shows opportunities for some wisely directed activities in his behalf.</span></p><span data-dcnode-id="1288" instrument_node="">
</span><hr data-dcnode-id="1287"><a data-dcnode-id="1285" name="thoma371"><span data-dcnode-id="1286" instrument_node=""> Page 371</span></a><p data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">
</span></p><p data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;There is a recognized vital difference in men; but while there are degrees of difference in inherent aptitudes, it is evident that no man lives up to the full measure of his actual ability. In the main, self-content is the chief characteristic of all submerged classes. We find this conclusion confirmed by that interminable sameness which obtains in savage life; for savagery, disdaining everything but its own ideals, and intolerant of any deviation therefrom, spurns every innovation that embodies typical changes. Obviously, then, where a condition of low social development obtains, rigid adherence to ancestral customs and aversion to change will perpetuate them. Where there is no discernible progress, there is instead retrogression. Such are the actual disclosures of negro life; for while he is a creature of unspeakable pretensions within his own segregated enclosure, yet when brought into contact with a superior civilization, and compelled to abide by its mandates, he shrinks into insignificance as his racial inferiority and unfitness to find the place and discharge the functions of a responsible factor in the social organism are made manifest. The negro is the waste product of American civilization, but as a ward of humanity he ought to be utilized and made a valuable member of society. A duty so obvious should not be evaded.</span></p><span data-dcnode-id="1280" instrument_node="">
</span><p data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The freedman is essentially a helpless being, with an inbred disposition to lean on somebody or something. He has always waited for others to right his wrongs,

</span></p><hr data-dcnode-id="1277"><a data-dcnode-id="1275" name="thoma372"><span data-dcnode-id="1276" instrument_node=""> Page 372</span></a><p data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">



redress his injuries, open his understanding, outline his faith, point out his duty, direct his labors, provide for his support, and bear the brunt of all that concerns his welfare. He has never evinced a self-kindled creative aptitude; he has neither trained faculties of understanding nor an awakened mind, and possesses neither the energy nor ability to tread voluntarily the avenues of human knowledge, under the processes that require exact and steady application for his development. Every semblance of that power of endurance inherent in the Saxon race is conspicuously wanting in the freed people. So lacking have they seemed in every element of serious, self-compelling determination that they have yet to evince capacity for undergoing the stress and strain of intelligent strife under the institutions of our country.</span></p><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;That the negro never fairly comprehends the ends of life is fully substantiated by the evidence that when called upon to deal with vital questions he is superficial and chimerical. He lays stress on showy pretensions and parades his childish inexactness in doing as example of capable endeavor, regardless of the fact that eagerness to be rid of manly duties does not evidence fitness for them. That physical, moral, and mental degradation obtains where such conditions exist is evident. The negro people, however, are in a transition state, wherein they have suffered much from the intoxication of irresponsible freedom and undiscerned duty. Steadfast, sober living is not their heritage, and possibly may never be acquired to

</span></p><hr data-dcnode-id="1269"><a data-dcnode-id="1267" name="thoma373"><span data-dcnode-id="1268" instrument_node=""> Page 373</span></a><p data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">



the extent of thoroughly assimilating them with our civilization. Nevertheless, for all negroes who sincerely desire to exchange their evil besetments for character, sobriety, and intelligence, the way is open to them to acquire and apply sound and practical common-sense methods to every act of life.</span></p><span data-dcnode-id="1264" instrument_node="">
</span><p data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The recalcitrant attitude of the negro is open to well-deserved criticism. It is obvious that he is wanting in that conscious ardor of integrity, that cool valor of truth, that undismayed courage, so characteristic of the best expressions of American manhood. And besides needing wholesome instruction concerning the duties of citizenship, his obligations to society, and relations to his fellow-men, there is a pressing need of the negro's revolt against inherent barbarous impulses and superstitious follies, and against mental apathy and spiritual levity. There is unquestioned need, as we have said, of the race acquiring that divine function, common sense, as well as healthy convictions of truth and righteousness. But true development of the freedman is impossible without the utter extermination, root and branch, of all negroid beliefs and practices. They must be replaced with the best expressions of Christian thought,--truth, courage, honesty, self-respect, reverence, and aspiration for what is noble and good. Each of these virtues is pregnant with divine vitality, and represents a substantial element in human character. No character is complete which does not embrace these qualities, and in so far as negroes are lacking

</span></p><hr data-dcnode-id="1261"><a data-dcnode-id="1259" name="thoma374"><span data-dcnode-id="1260" instrument_node=""> Page 374</span></a><p data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">



in them they are less than men and women. On the other hand, in so far as these virtues are in the ascendant, they are growing in true strength.</span></p><span data-dcnode-id="1256" instrument_node="">
</span><p data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The worth and utility of a race depend on its aptitude for intelligent civilization,--that is, for scientific as well as ethical evolution. Now, while we do not doubt the capacity of the freedmen for acquiring a higher standard of living, evidence shows that they fail to comprehend the true motive for racial regeneration. There is no hard and fast rule governing social elevation. Nevertheless, the primary requisite in the case of the freedman is to raise the average racial aptitude for intelligent development. This cannot be done other than through self-knowledge, derived by accurate and painstaking analysis and observation. The negro needs, with a full and adequate endowment of practical moral and spiritual qualities, a wholesome and larger vision of life and its realities; in short, such an outlook as will sweep away from before his mental gaze inbred delusions and shams, and lead him to comprehend and realize in the completest sense the need and worth of truth.</span></p><span data-dcnode-id="1253" instrument_node="">
</span><p data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;From the trend of current events we are led to believe that the American people have fully decided that the negro is not to be further propped or prompted for the performance of duties, though the disposition is growing in every section to accord him full and fair play in a common struggle for existence. As we see it, friend and foe are alike determined that hereafter capacity shall fix and maintain his place in

</span></p><hr data-dcnode-id="1250"><a data-dcnode-id="1248" name="thoma375"><span data-dcnode-id="1249" instrument_node=""> Page 375</span></a><p data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">



the ranks of civilization and industry,--an attitude furnishing no just cause of complaint to the conscious capables of the race, to whom opportunity and achievement are thereby decreed. To be sure, the incapables are bound to be thrust aside in competitive strife, but the law of life is that every man shall bear his own burden and work out his own salvation. It is evidently the duty of the negro to recognize fully that social inequalities exist, and to understand thoroughly that all he can reasonably ask is that the door be left open, so that, filled by aspirations and achievement, he may pass from inferior to superior grades of living.</span></p><span data-dcnode-id="1245" instrument_node="">
</span><p data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;One unfortunate feature confronting us is that the negro isolates and segregates himself in racial organizations, not for self-help, but to escape from an environment to whose exactions his feeble abilities cannot respond. The oppressions of slavery established a sort of federation among the enthralled which freedom instantly dissolved. There are now no sound reasons why negroes should band together except to develop themselves, --a thing they do not do in their associations. So long as the freedmen continue to be a willingly submerged class, they will remain incapable of self-direction and self-government, that is, incapable of self-regeneration. We suspect that negro passion for revelling in words and rioting in emotions has as much to do with his studied avoidance of contact with the white race as any innate sense of actual inferiority. Personal vanity is a potent factor in self-exclusion.</span></p><span data-dcnode-id="1242" instrument_node="">
</span><hr data-dcnode-id="1241"><a data-dcnode-id="1239" name="thoma376"><span data-dcnode-id="1240" instrument_node=""> Page 376</span></a><p data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">
</span></p><p data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;For the negro as for other phases of ill-conditioned humanity all sorts of fads have been exploited. The college settlement scheme has been one of them, but each and all ignore the basis on which all wholesome and permanent human development is erected,--that is, by first making adequate provision for the physical wants of man. Ethical teachings have no show in the presence of cold and hunger. Notwithstanding this we persist in undertaking the impossible. A far different result would be achieved were it realized that sense and sympathy are potent factors in successful reformatory work. The one fatal defect in all undertakings whose aim is to uplift the submerged is the assumption, on the part of those set to lead, of their personal superiority and all-knowingness; or else that which is equally offensive,--a sentimental tolerance of evil conditions. In either case, a latent hostility is encountered at the outset, for many an unlearned person is not only keen-witted, but a shrewd reader of human nature; and down deep in the hearts of such people is recorded a subtle analysis of motives and character that would not discredit the profoundest scholarship. What the intelligent poor and needy want, therefore, is sympathy, understanding, fellowship, and kinship in human suffering. He or she, who, while representing the highest and best of everything above them, is one with them in sympathetic helpfulness, will always succeed as a teacher, and none other need attempt it with any hope of success.</span></p><span data-dcnode-id="1234" instrument_node="">
</span><hr data-dcnode-id="1233"><a data-dcnode-id="1231" name="thoma377"><span data-dcnode-id="1232" instrument_node=""> Page 377</span></a><p data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">
</span></p><p data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The primary and fundamental mistake made by American educators is the assumption that all negroes are capable of moral development by mental culture. Culture gives to the mind dexterity and efficiency, but never forceful strength; that is an inheritance, and intellectual hardihood is an endowment that cannot be hid. The negro mind, however, is wanting in strength; it is weak and foolish, and instigated to action by whatever caprice or credulity may inspire. We unreservedly assert that there is no value to the freedman in mere intellectual development. Mental training without sound moral character will not make a great man or good woman; nor will individual mental training and manual training combined regenerate the negro people. The whole scheme of their training, in our conception, is self-support in the highest sense; that is, the acquirement of character, capacity, in other words, the ability to do honest, capable work for God and humanity. These conclusions can
not be dismissed as vagaries. So eminent an authority as the late Doctor Arnold of Rugby has said that, from his experience in school and teaching he had come to believe that the difference between one man and another was not so much mere intellectual ability, as moral energy. To the omission to note that fact, is due much of the failure which has attended attempts at negro regeneration.</span></p><span data-dcnode-id="1226" instrument_node="">
</span><p data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;In justification of negro illiteracy it has been urged that it is only the few among all races who think, and are moved to action by the grandeur of

</span></p><hr data-dcnode-id="1223"><a data-dcnode-id="1221" name="thoma378"><span data-dcnode-id="1222" instrument_node=""> Page 378</span></a><p data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">



thought and inspiration of lofty ideals. That may be true in the highest sense. However, all of mankind think to some extent, and we have the highest authority for the statement, that "as a man thinks in his heart, so he is,"--that is, as material causes create and perpetuate physical characteristics, so, to a greater degree, ideas and thoughts mould and fashion the mental and spiritual nature of men.</span></p><span data-dcnode-id="1218" instrument_node="">
</span><p data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Aryan thought is mercilessly encompassing the negro, and driving him to the alternative of annihilation or regeneration. He has reached a stage in his career where he should choose between truth and falsehood, right and wrong, growth and decay, life and death. Nor do we doubt that under wise guidance the freedmen may come to realize that to know the truth, and to be true, is the greatest of human achievement. Truth alone has the genius of universal emancipation, the power to create vital and responsive transformation in the human heart, to sink humanity in self-forgetful service to God and man.</span></p><span data-dcnode-id="1215" instrument_node="">
</span><p data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;There is among negroes themselves no agreement as to what constitutes racial disabilities, no uniform recognition of their grievances, and no agreement as to their needs. The reason for such an anomalous state of affairs lies in the fact that negro society is rent asunder and torn into innumerable factions by its senseless jealousies and petty strivings. It follows that not only is it impossible to institute coherent methods of race policy, but that no negro can speak

</span></p><hr data-dcnode-id="1212"><a data-dcnode-id="1210" name="thoma379"><span data-dcnode-id="1211" instrument_node=""> Page 379</span></a><p data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">



with the authority that comes from universally recognized leadership. There are those who assume to represent the freed people, but when their pretensions are examined it will be found that they have no tangible following. Those who pose as race leaders are intolerant of all criticism or suggestion within their own ranks, and are implacably arrayed against all innovations that make for public good. In their efforts to maintain a precarious supremacy over deluded subjects they have grown as brutal in official bearing as were the negro drivers during the days of African chattelism. They are constantly striving to shut out from the freed people all genuine light and knowledge, though at the same time fostering every despoiling scheme that adds to their private gain.</span></p><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;With its accredited leaders sitting in darkness and revelling in abasement, with each conception, impulse, and aspiration centred in dreams of sensuous indulgence, is it any wonder that the race refuses to awaken and will not be aroused? The negro pulpit is dumb on all vital issues, even though all of its best discourses are purloined from white preachers. The negro press is equally impotent in helpful suggestion, though not wanting in obsequious flattery and ill-advised contentions. The truth is that no American negro has ever planned or instituted a broadly beneficent movement in morals, letters, or material affairs for racial welfare. The freedman, we grant, has set up some crude

</span></p><hr data-dcnode-id="1204"><a data-dcnode-id="1202" name="thoma380"><span data-dcnode-id="1203" instrument_node=""> Page 380</span></a><p data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">



imitations of worthy agencies on poverty-stricken foundations, and essayed to evolve self-sustaining institutions from illiterate mendicancy, but no one will be foolish enough to say that he has either evinced wisdom or shown success in what he has attempted.</span></p><span data-dcnode-id="1199" instrument_node="">
</span><p data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Aside from its self-promoting schemes, negro leadership has apparently neither motive nor object in view, and, so far as we can observe, is blind to the significance of every passing event. For proof we need only call attention to the case of the rural freedman, whose condition, no one denies, is an appalling example of hopeless subjection to industrial bondage. This patient, simple-hearted, muscular animal, whose crude industries create Southern affluence, inhabits a one-roomed log cabin. His wife, children, and himself are perennially clad in tatters and beclouded with ignorance. On the one hand, he is hopelessly chained to poverty, and on the other, perpetually overshadowed by mountains of mental darkness. As he has no foresight in management and lives from hand to mouth, he is systematically despoiled by white and black knavery.</span></p><span data-dcnode-id="1196" instrument_node="">
</span><p data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Notwithstanding that the physical poverty and helpless servitude of the rural freedman constitute one of the problems of our age, and in spite of the boasted scholarship of the American negroes, there is not to be found a single member of the more fortunate class who has suggested, devised, or set in motion any feasible and helpful movement in behalf of the plantation negro. On the contrary, the educated

</span></p><hr data-dcnode-id="1193"><a data-dcnode-id="1191" name="thoma381"><span data-dcnode-id="1192" instrument_node=""> Page 381</span></a><p data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">



negro, so far, has not only evinced no capacity for wise methods affecting the redemption of the freedmen, but apart from his craven submission and fault-findings, he is wholly at sea on all of the fundamental issues of racial sociology. His fiery denunciations of social ostracisms are marvels of rhetorical rhapsody, and his fervid prophecies of the achievements of his people a hundred years hence reach the topmost wave of hysterical ecstasy; but as to how the race, with its millenniums of sensuous burdens, can attain the one or eliminate the other he is portentously silent, because he obviously has no suggestion to make.</span></p><span data-dcnode-id="1188" instrument_node="">
</span><p data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;It may be said that negro ecclesiastical organizations have been potent factors in furthering the regeneration of the freedman. In what respect? Our convictions are that negro churches, as now directed, are not of the slightest value in race redemption. While they might be helpful and efficient in many ways, they are steadily withdrawing from contact with white associations, thus leaving behind them their only incentive to awakening. Furthermore, notwithstanding the multiplication of such churches, the morality of the freedman continues to be scarified with carnal indulgences, and both his pulpit and pew overshadowed by sensual depravity. Nor can we shut our eyes to the fact that negro religion, as a factor in racial regeneration, has lost its grip on the masses of the freed people, who have been largely driven by its shameful weaknesses and pretentious arrogance to break away from all ethical restraints.

</span></p><hr data-dcnode-id="1185"><a data-dcnode-id="1183" name="thoma382"><span data-dcnode-id="1184" instrument_node=""> Page 382</span></a><p data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">



In consequence, negro churches have become merely social rendezvous for the young and places of fetich worship for the old. To be sure, the freedman, no matter what his degree of turpitude, is a religious enthusiast: nevertheless, his religion is not founded on approved ethical principles, nor does it possess such features as commend themselves to the sober judgment of mankind.</span></p><span data-dcnode-id="1180" instrument_node="">
</span><p data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;It is vain to ask the negro what is his practical belief regarding himself, his relations to society, his duties to God and man, and what his sincerity of purpose. He never questions himself as to what he is, what he believes, or what he ought to do; and should he, in his faint-hearted way, hesitantly ponder on the great issues of life and death, he never goes to the primal source of all knowledge, the God-inspired light within his own soul. The freedman neither has relish nor zest for realities, and confines his notion of religion wholly to physical emotions. We are justified in saying, then, that so long as the negro priesthood is neither actuated by righteous earnestness for race redemption nor animated by a sense of disinterested service to mankind, but chiefly concerned about idle support, ostentatious personal display, and revelry in that prolific field of turbid licentiousness which the pastoral care of such people affords, there will be but slight help rendered from that body.</span></p><span data-dcnode-id="1177" instrument_node="">
</span><p data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Existing conditions are all the more regrettable since the opportunities of the past in every department of industrial activity were golden, and have

</span></p><hr data-dcnode-id="1174"><a data-dcnode-id="1172" name="thoma383"><span data-dcnode-id="1173" instrument_node=""> Page 383</span></a><p data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">



gone beyond recall. There awaits the negro of to-day and the future only the hard conditions that accompany fierce competitive strife. It is true that the negro social organizations, as represented by their churches and fraternal societies, have in them germs of coöperation, which, if properly developed, might effect the unification of the race and its material and intellectual growth. But since they show no progress, there is ground for believing that the negro has no disposition to help himself. Besides, any inbred desire for self-help is out of the question so long as he is the recipient of indiscriminate aid. Such has been his absolute dependence on others that we seriously doubt his capacity for realizing the need of self-help, or the necessity of wisely devised energetic action in his own behalf. Were he once awakened to reasonable diligence and endowed with practical sagacity, he could do much to help himself. Nothing, however, is more obvious than that so long as the illiterate freedman is without rational guidance, he will be hopelessly enslaved by every sensuous folly.</span></p><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;A discreet and worthy race leadership could be built up and feasible results achieved, were the good and true of the race to band together and work in unison for the eradication of negro weaknesses. In no more effectual way could this be begun than for the preachers and laymen of the freedman's fraternal societies and churches to secure for guidance and instruction for each county in the South a fearless,

</span></p><hr data-dcnode-id="1166"><a data-dcnode-id="1164" name="thoma384"><span data-dcnode-id="1165" instrument_node=""> Page 384</span></a><p data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">



God-ordained minister, doctor, and lawyer, and give to them, when found, a loyal and wholehearted support along every line that makes for truth and righteous action. A mighty transformation might be wrought in the freed people if the professionally trained but poverty-stricken negroes struggling in Northern cities, endowed with courage and desire for serving their race, were to go South in such an undertaking. We believe that the most rational and effective progress will be made in racial regeneration only when the negro takes the lead in his redemption, not in isolation, but in cordial coöperation with every feasible agency. We may, moreover, express the hope that the impulsive and sorely tossed freedman may not only realize the actual obstacles which impede his advancement, but also the need of beginning anew the process of self-regeneration.</span></p><span data-dcnode-id="1161" instrument_node="">
</span><p data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We have constantly emphasized the need of the regeneration of the negro; some may therefore ask, What are his chief besetments? A frank answer shows him to be immersed in poverty, steeped in ignorance, stifled with immorality, inherently lazy, and a born pilferer. These are undoubtedly his chief defects. To shed a sidelight on some other pronounced phases of racial character we shall further ask, Are not many of the injuries which he suffers in the way of assault and repression due to his crafty pretensions and offensive interference in affairs of which he has no knowledge, and which are none of his business? We have said that the first and

</span></p><hr data-dcnode-id="1158"><a data-dcnode-id="1156" name="thoma385"><span data-dcnode-id="1157" instrument_node=""> Page 385</span></a><p data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">



essential thing for the negro to do is to realize fully what he is. Until that is brought about it is sheer nonsense to talk about racial regeneration. But when once he is made to understand the poverty of his endowments, the absurdity of his pretensions, the folly of his credulity, the futility of his attitude, it will then be possible for him to cease lying, stealing, loitering, and with these things abandoned for good, he may become diligent and trustworthy in speech and action. There is evidence that racial discontent is in the air; and with revolt struggling to its feet to express in coherent speech a renunciation of the shams, delusions, and falsehoods of priestly and scholastic trumperies, a conflict is inevitable. In fact, a single true bugle blast would precipitate immediate action. And what more righteous strife has ever been waged than that would be against the criminal ignorance and social depravity of the freedman? Inasmuch, then, as relentless contest for social betterment will come, it behooves negro manhood and womanhood at once to bestir itself in preparation for the impending change.</span></p><span data-dcnode-id="1153" instrument_node="">
</span><p data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The inference that the negro people are not wholly bad is evidenced by a certain affectionate demeanor observable in their young children, and which is wholly unlike the masterful, self-conscious attitude of white children of the same age. In fact, such children, when apart from vicious companionship, are attractive, and evince such a wealth of tenderness in feeling and sweetness of disposition that no

</span></p><hr data-dcnode-id="1150"><a data-dcnode-id="1148" name="thoma386"><span data-dcnode-id="1149" instrument_node=""> Page 386</span></a><p data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">



one who gazes into their liquid eyes and notes their eager, wistful glances of desire for approbation, or their shy humility when reproved, would ever dream of linking them with the repulsive examples of negro adult viciousness. Whatever possibilities there may be in negro awakening, it is the child that to-day
represents the "promise and potency" of racial achievement--the may or may not be of actual regeneration, the trend and the status of the future man or woman. All rational faith, then, working toward the awakening and uplifting of the freed people, should centre in child culture. Of course, the ideal process for negro regeneration would be to take its
boys and girls under five years of age and train them to maturity in complete severance from all racial contact. As matters now stand, this would be largely impracticable. It could be done, however, in a partial way, by the establishment of orphanages, and immeasurable gain would come to the future representatives of the race, were the multitude of orphan children so taken in hand and trained apart from all connection with the negro people. We could develop in that way a very superior type of negro citizens. Meanwhile, in order to deal wisely with the great body of the freedmen, the only feasible way is to train the children in conjunction with their parents, in the manner we have fully indicated elsewhere.</span></p><span data-dcnode-id="1145" instrument_node="">
</span><p data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;No sober-minded person will dissent from the proposition that the value of family life is social

</span></p><hr data-dcnode-id="1142"><a data-dcnode-id="1140" name="thoma387"><span data-dcnode-id="1141" instrument_node=""> Page 387</span></a><p data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">



efficiency; that is, the ability to convert each of its members into a capable, efficient, and respectable member of the community. It may well be said, that where sound and wholesome family training ceases, downward tendencies predominate in individual lives, and social degeneracy begins. Moral qualities are the foundation of social efficiency, which is but another name for fraternal service; but moral qualities need to be inculcated with discriminate care. The duties of motherhood, needless to say, require an eminent degree of fitness and adaptability for discharging obligations that cannot be turned aside. Motherhood, we insist, is the responsible teacher and custodian of the manners, character, and morals of the home, and such responsibility cannot be evaded or shirked; and the mother who does not inculcate the essential elements of manhood and womanhood in child life and living is an absolute failure. Moreover, less social degeneracy would exist were mothers to inculcate early in their children, and plant in every fibre of their beings, the great primary truth that sex neither exempts from nor increases moral responsibility; that what is wrong for a girl is wrong for a boy; that what is infamous for one is infamous for the other.</span></p><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Speaking now in a fundamental sense, what the men and women of the race, as well as all others of our submerged classes, need to realize, is that home living is the God-ordained school for human propagation, growth, and discipline in ethical and industrial

</span></p><hr data-dcnode-id="1134"><a data-dcnode-id="1132" name="thoma388"><span data-dcnode-id="1133" instrument_node=""> Page 388</span></a><p data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">



virtues. No one, therefore, has a right to become a husband and father or a wife and mother who lacks the essential knowledge of home-making, or is wanting in ability or disposition to keep a home; and we regard it as the culmination of social immorality for any couple to bring a child into being in an environment divested of every element requisite for its sound development. It matters not what may be their inherent qualities, there will be no wholesome development of the young until we have regenerated fathers and mothers to nurture and guide them into paths of right living. We make no mistake here in saying that negro family life is the rock-bed of truth, virtue, and righteousness, or the breeding spot of falsehood, iniquity, and crime. Obviously, then, what negro men and women need to acquire more than anything else is the knowledge of what constitutes a home and the capacity to make one, and, when made, to keep it in cleanliness, sobriety, and privacy. No greater social virtue can be acquired by the American freedwoman than the ability to do the things accounted drudgery in domestic life without discontent with herself or complaint to others, and, in so doing, manage her affairs with discretion and order, and rear her children in a healthy and wholesome fashion.</span></p><span data-dcnode-id="1129" instrument_node="">
</span><p data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;All who are interested in the freedman need to realize that ancestral habits and the daily speech, manners, and acts of parents exert a far greater influence on the lives of their children, and outweigh

</span></p><hr data-dcnode-id="1126"><a data-dcnode-id="1124" name="thoma389"><span data-dcnode-id="1125" instrument_node=""> Page 389</span></a><p data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">



all the superimposed instruction of schoolroom precept and example. Educated ability, as we know, is the result of impressions received, mastered, and assimilated in the brain, and carried out in action. This, unfortunately, is not at present the result of negro mental training, and it never will be, so long as the home-life of the freedman is the antipode of the schoolroom. He will not give up cherished habits and inbred follies, unless that which is tangibly better is substituted in their stead. Nevertheless, while negroes are largely culpable for their social degradation, the most slovenly woman in dense negro settlements will develop into an industrious and orderly housekeeper when isolated from her class and surrounded by thrifty associates. Many a solitary negro family in our Northern communities may be cited, whose industrial regeneration was achieved under social pressure. It will be seen, therefore, that we have substantial ground for the belief that, were negroes persistently drilled for a reasonable time in habits of thoughtfulness, rectitude, and veracity, they would in due course, from sheer force of acquired character, instinctively prefer the saner side of human attitude.</span></p><span data-dcnode-id="1121" instrument_node="">
</span><p data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Our duty here is to state facts concerning a very unique type of humanity, in whom millenniums of ancestral physical and psychical traits have been interminably transmitted and unchangingly reproduced, but many of which were held in repressive abeyance by the rigorous supervision exercised by slavery.

</span></p><hr data-dcnode-id="1118"><a data-dcnode-id="1116" name="thoma390"><span data-dcnode-id="1117" instrument_node=""> Page 390</span></a><p data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">



While we have persistently pointed out causes of racial degradation, we have been equally insistent that the one fundamental remedy is the eradication, root and branch, of negro ideals, characteristics, and other inherited idiosyncrasies. This cannot be accomplished by merely imposing a veneer of American civilization. It can only be brought about by such transforming methods as will make him a new creature in thought, speech, habit, and character. But at this time the negro has neither the intellect nor will to institute self-redemptive measures, and obviously where there is no such desire there will be no regeneration. In such cases, talk does no good; advice is wasted, rebuke
hardens, and pleading from a superior is accepted as a sign of weakness. Under such conditions, then, the only effective and efficient agencies are the shalls and shall-nots of command, backed up by imperative force. There will never come such a thing as racial awakening to a higher life and living unless there shall be instituted by the superior environment, a standard that permits neither excuse nor relaxation in demands of capable negro performance, and this must be supplemented on the part of the negro himself by a determination to part company with every phase of racial degradation. The one inexorable fact that the freedman ought to know is, that he cannot and will not succeed in any line until he shall stand erect, braced and poised for heroic endeavor.</span></p><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;As to what shall be the particular nature and character of the force employed to uproot the negro's

</span></p><hr data-dcnode-id="1110"><a data-dcnode-id="1108" name="thoma391"><span data-dcnode-id="1109" instrument_node=""> Page 391</span></a><p data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">



contempt for decency and order, we do not stipulate, other than that it shall fitly apply to those whom it undertakes to coerce, and be of such inexorable and all-pervading efficiency as to implant in them ethical and mental vigor. We speak advisedly when we suggest the employment of restraining and compelling force, and in the full knowledge that the unresponsive negro will not be regenerated by persuasion. There may be those who will object to the use of force in dealing with those who have no faith in our ideals. But may we not ask, What feasible and effective substitute would they propose in its stead? Assuredly tentative experiments of sentiment are not to be seriously considered, and certainly not to the extent of displacing tested practical measures. Therefore, until some effective self-governing scheme is devised, which shall animate our submerged and subject classes with desire for higher living, the exponents and custodians of our civilization have a right to say to them: "You evince neither capacity for rational self-government nor intelligent conformity to our standards of civic social polity. Hence, while we have no right to force our methods of life on people beyond the bounds of our own domain, we have a God-ordained right to insist that all who are within the limits of our custody shall accept and conform to the standards which we have set up, and if they fail therein, we will exercise the right to force them into submission or extermination."</span></p><span data-dcnode-id="1105" instrument_node="">
</span><p data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;What is more obvious than that the primary and

</span></p><hr data-dcnode-id="1102"><a data-dcnode-id="1100" name="thoma392"><span data-dcnode-id="1101" instrument_node=""> Page 392</span></a><p data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">



controlling factors in human government are faith and force? A prerequisite of faith is reason, the capable exercise of which implies a degree of intelligent development. On the other hand, force is the chosen instrument of awakened faith to carry into effect its purposes, especially in so far as these relate to its subjects. In a larger sense, force is the universal agent relied upon to correct refractoriness. So long, then, as coercive discipline is required, there should never be any relaxation of wisely exercised force in dealing with predisposing types of turpitude in the management of the family and civic society. When individuals or races are amenable solely to sensuous impulses, admonitions are vain and reproof futile. Especially are we convinced that negro nature requires the employment of compulsory force to induce its conformity to our standards of living.</span></p><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Sentiment aside, what are the recurring facts relating to the social development of submerged classes intermingled with or apart from a higher civilization? We note first, that no inferior people evince an aptitude for rational self-guidance; and second, that they always mistake conciliation for weakness, and magnanimity for cowardice. Since the negro is at best nothing more than a domesticated savage, the plain duty
of those in authority is to treat him under all circumstances with fairness and justice, but without entering into any parley, concession, or compromise, because
nothing less than a fearless and steadfast determination to enforce lawful respect and obedience will bring

</span></p><hr data-dcnode-id="1094"><a data-dcnode-id="1092" name="thoma393"><span data-dcnode-id="1093" instrument_node=""> Page 393</span></a><p data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">



him to a proper understanding of place and duty. He should be controlled in a spirit of benefaction as well as of protection, and in this respect we can profitably take a leaf out of the experience of the English-speaking people who are the leaders of the world in colonization, commerce, civilization, and Christianity.</span></p><span data-dcnode-id="1089" instrument_node="">
</span><p data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;We have candidly undertaken to ascertain facts and suggest remedies, in what has preceded; but above all, our aim has been to construct a simple and feasible way out of the quagmire of race degradation, and present it in such a manner as would appeal to every best instinct in the negro's breast. This, we believe has been done, yet we are met with such whimpering queries as, "What can we do?" or such despicable fatuity as asserts that a century hence the negro will surpass the white man in wealth and intelligence. Confronted by such imbecile vacuity, what hope is there that a vain, pompous, self-seeking racial leadership will ever see the facts which make for negro regeneration or adequately realize that it is not necessary to manhood or womanhood that the freedman should first acquire wealth, or revel in material luxuries, or even be enfranchised with the liberty to sell his vote, or hold an office he cannot fill. But not content with antagonizing every sane movement for
