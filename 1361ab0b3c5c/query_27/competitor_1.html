</span><div class="thumb tright" data-dcnode-id="1474"><div class="thumbinner" data-dcnode-id="1475" style="width:246px;"><a class="image" data-dcnode-id="1481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/File%3ABurne-jones-love-among-the-ruins.jpg"><img alt="" class="thumbimage" data-dcnode-id="1482" data-file-height="2048" data-file-width="3199" decoding="async" height="156" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/43/Burne-jones-love-among-the-ruins.jpg/244px-Burne-jones-love-among-the-ruins.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/43/Burne-jones-love-among-the-ruins.jpg/366px-Burne-jones-love-among-the-ruins.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/43/Burne-jones-love-among-the-ruins.jpg/488px-Burne-jones-love-among-the-ruins.jpg 2x" width="244"></a><span data-dcnode-id="1480" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1476"><div class="magnify" data-dcnode-id="1478"><a class="internal" data-dcnode-id="1479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/File%3ABurne-jones-love-among-the-ruins.jpg" title="Enlarge"></a></div><span data-dcnode-id="1477" instrument_node="">Live on, for Love liveth...</span></div></div></div><span data-dcnode-id="1473" instrument_node="">
</span><ul data-dcnode-id="1458"><li data-dcnode-id="1459"><b data-dcnode-id="1465"><span data-dcnode-id="1472" instrument_node="">Love is enough: cherish life that abideth, </span><br data-dcnode-id="1471"><span data-dcnode-id="1470" instrument_node=""> Lest ye die ere ye know him, and curse and misname him; </span><br data-dcnode-id="1469"><span data-dcnode-id="1468" instrument_node=""> For who knows in what ruin of all hope he hideth, </span><br data-dcnode-id="1467"><span data-dcnode-id="1466" instrument_node=""> On what wings of the terror of darkness he rideth?</span></b><span data-dcnode-id="1464" instrument_node=""> </span><br data-dcnode-id="1463"><span data-dcnode-id="1462" instrument_node=""> And what is the joy of man's life that ye blame him </span><br data-dcnode-id="1461"><span data-dcnode-id="1460" instrument_node=""> For his bliss grown a sword, and his rest grown a fire?</span></li></ul><span data-dcnode-id="1457" instrument_node="">
</span><ul data-dcnode-id="1438"><li data-dcnode-id="1439"><b data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Live on, for Love liveth</span></b><span data-dcnode-id="1454" instrument_node="">, and earth shall be shaken </span><br data-dcnode-id="1453"><span data-dcnode-id="1452" instrument_node=""> By the wind of his wings on the triumphing morning, </span><br data-dcnode-id="1451"><span data-dcnode-id="1450" instrument_node=""> </span><b data-dcnode-id="1440"><span data-dcnode-id="1449" instrument_node="">When the dead, and their deeds that die not shall awaken, </span><br data-dcnode-id="1448"><span data-dcnode-id="1447" instrument_node=""> And the world's tale shall sound in your trumpet of warning, </span><br data-dcnode-id="1446"><span data-dcnode-id="1445" instrument_node=""> And the sun smite the banner called Scorn of the Scorning, </span><br data-dcnode-id="1444"><span data-dcnode-id="1443" instrument_node=""> And dead pain ye shall trample, dead fruitless desire, </span><br data-dcnode-id="1442"><span data-dcnode-id="1441" instrument_node=""> As ye wend to pluck out the new world from the fire.</span></b></li></ul><span data-dcnode-id="1437" instrument_node="">
</span><h4 data-dcnode-id="1427"><span class="mw-headline" data-dcnode-id="1435" id="Song_VII:_Dawn_Talks_to_Day"><span data-dcnode-id="1436" instrument_node="">Song VII: Dawn Talks to Day</span></span><span class="mw-editsection" data-dcnode-id="1428"><span class="mw-editsection-bracket" data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">[</span></span><a data-dcnode-id="1431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/w/index.php%3Ftitle%3DWilliam_Morris%26action%3Dedit%26section%3D12" title="Edit section: Song VII: Dawn Talks to Day"><span data-dcnode-id="1432" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1426" instrument_node="">
</span><ul data-dcnode-id="1398"><li data-dcnode-id="1399"><b data-dcnode-id="1422"><span data-dcnode-id="1425" instrument_node="">Dawn talks to Day </span><br data-dcnode-id="1424"><span data-dcnode-id="1423" instrument_node=""> Over dew-gleaming flowers</span></b><span data-dcnode-id="1421" instrument_node="">, </span><br data-dcnode-id="1420"><span data-dcnode-id="1419" instrument_node=""> Night flies away </span><br data-dcnode-id="1418"><span data-dcnode-id="1417" instrument_node=""> Till the resting of hours: </span><br data-dcnode-id="1416"><span data-dcnode-id="1415" instrument_node=""> Fresh are thy feet </span><br data-dcnode-id="1414"><span data-dcnode-id="1413" instrument_node=""> And with dreams thine eyes glistening, </span><br data-dcnode-id="1412"><span data-dcnode-id="1411" instrument_node=""> Thy still lips are sweet </span><br data-dcnode-id="1410"><span data-dcnode-id="1409" instrument_node=""> Though the world is a-listening. </span><br data-dcnode-id="1408"><span data-dcnode-id="1407" instrument_node=""> </span><b data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">O Love, set a word in my mouth for our meeting</span></b><span data-dcnode-id="1404" instrument_node="">, </span><br data-dcnode-id="1403"><span data-dcnode-id="1402" instrument_node=""> Cast thine arms round about me to stay my heart's beating! </span><br data-dcnode-id="1401"><span data-dcnode-id="1400" instrument_node=""> O fresh day, O fair day, O long day made ours!</span></li></ul><span data-dcnode-id="1397" instrument_node="">
</span><ul data-dcnode-id="1372"><li data-dcnode-id="1373"><b data-dcnode-id="1389"><span data-dcnode-id="1396" instrument_node="">Morn shall meet noon </span><br data-dcnode-id="1395"><span data-dcnode-id="1394" instrument_node=""> While the flower-stems yet move, </span><br data-dcnode-id="1393"><span data-dcnode-id="1392" instrument_node=""> Though the wind dieth soon </span><br data-dcnode-id="1391"><span data-dcnode-id="1390" instrument_node=""> And the clouds fade above.</span></b><span data-dcnode-id="1388" instrument_node=""> </span><br data-dcnode-id="1387"><span data-dcnode-id="1386" instrument_node=""> Loved lips are thine </span><br data-dcnode-id="1385"><span data-dcnode-id="1384" instrument_node=""> As I tremble and hearken; </span><br data-dcnode-id="1383"><span data-dcnode-id="1382" instrument_node=""> Bright thine eyes shine, </span><br data-dcnode-id="1381"><span data-dcnode-id="1380" instrument_node=""> Though the leaves thy brow darken. </span><br data-dcnode-id="1379"><span data-dcnode-id="1378" instrument_node=""> O Love, kiss me into silence, lest no word avail me, </span><br data-dcnode-id="1377"><span data-dcnode-id="1376" instrument_node=""> Stay my head with thy bosom lest breath and life fail me! </span><br data-dcnode-id="1375"><span data-dcnode-id="1374" instrument_node=""> O sweet day, O rich day, made long for our love!</span></li></ul><span data-dcnode-id="1371" instrument_node="">
</span><ul data-dcnode-id="1362"><li data-dcnode-id="1363"><b data-dcnode-id="1367"><span data-dcnode-id="1370" instrument_node="">Let us speak, love, together some words of our story, </span><br data-dcnode-id="1369"><span data-dcnode-id="1368" instrument_node=""> That our lips as they part may remember the glory!</span></b><span data-dcnode-id="1366" instrument_node=""> </span><br data-dcnode-id="1365"><span data-dcnode-id="1364" instrument_node=""> O soft day, O calm day, made clear for our sake!</span></li></ul><span data-dcnode-id="1361" instrument_node="">
</span><ul data-dcnode-id="1342"><li data-dcnode-id="1343"><b data-dcnode-id="1353"><span data-dcnode-id="1360" instrument_node="">Eve shall kiss night, </span><br data-dcnode-id="1359"><span data-dcnode-id="1358" instrument_node=""> And the leaves stir like rain </span><br data-dcnode-id="1357"><span data-dcnode-id="1356" instrument_node=""> As the wind stealeth light </span><br data-dcnode-id="1355"><span data-dcnode-id="1354" instrument_node=""> O'er the grass of the plain.</span></b><span data-dcnode-id="1352" instrument_node=""> </span><br data-dcnode-id="1351"><span data-dcnode-id="1350" instrument_node=""> Unseen are thine eyes </span><br data-dcnode-id="1349"><span data-dcnode-id="1348" instrument_node=""> Mid the dreamy night's sleeping, </span><br data-dcnode-id="1347"><span data-dcnode-id="1346" instrument_node=""> And on my mouth there lies </span><br data-dcnode-id="1345"><span data-dcnode-id="1344" instrument_node=""> The dear rain of thy weeping.</span></li></ul><span data-dcnode-id="1341" instrument_node="">
</span><h4 data-dcnode-id="1331"><span class="mw-headline" data-dcnode-id="1339" id="Song_VIII:_While_Ye_Deemed_Him_A-Sleeping"><span data-dcnode-id="1340" instrument_node="">Song VIII: While Ye Deemed Him A-Sleeping</span></span><span class="mw-editsection" data-dcnode-id="1332"><span class="mw-editsection-bracket" data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">[</span></span><a data-dcnode-id="1335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/w/index.php%3Ftitle%3DWilliam_Morris%26action%3Dedit%26section%3D13" title="Edit section: Song VIII: While Ye Deemed Him A-Sleeping"><span data-dcnode-id="1336" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1330" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1319"><div class="thumbinner" data-dcnode-id="1320" style="width:246px;"><a class="image" data-dcnode-id="1328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/File%3ABurnejones1.jpg"><img alt="" class="thumbimage" data-dcnode-id="1329" data-file-height="434" data-file-width="800" decoding="async" height="132" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/93/Burnejones1.jpg/244px-Burnejones1.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/93/Burnejones1.jpg/366px-Burnejones1.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/93/Burnejones1.jpg/488px-Burnejones1.jpg 2x" width="244"></a><span data-dcnode-id="1327" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1321"><div class="magnify" data-dcnode-id="1325"><a class="internal" data-dcnode-id="1326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/File%3ABurnejones1.jpg" title="Enlarge"></a></div><span data-dcnode-id="1324" instrument_node="">Love is enough: while ye deemed him a-sleeping, </span><br data-dcnode-id="1323"><span data-dcnode-id="1322" instrument_node=""> There were signs of his coming and sounds of his feet.</span></div></div></div><span data-dcnode-id="1318" instrument_node="">
</span><ul data-dcnode-id="1307"><li data-dcnode-id="1308"><b data-dcnode-id="1314"><span data-dcnode-id="1317" instrument_node="">Love is enough: while ye deemed him a-sleeping, </span><br data-dcnode-id="1316"><span data-dcnode-id="1315" instrument_node=""> There were signs of his coming and sounds of his feet</span></b><span data-dcnode-id="1313" instrument_node="">; </span><br data-dcnode-id="1312"><span data-dcnode-id="1311" instrument_node=""> His touch it was that would bring you to weeping, </span><br data-dcnode-id="1310"><span data-dcnode-id="1309" instrument_node=""> When the summer was deepest and music most sweet...</span></li></ul><span data-dcnode-id="1306" instrument_node="">
</span><ul data-dcnode-id="1285"><li data-dcnode-id="1286"><b data-dcnode-id="1302"><span data-dcnode-id="1305" instrument_node="">All wonder of pleasure, all doubt of desire, </span><br data-dcnode-id="1304"><span data-dcnode-id="1303" instrument_node=""> All blindness, are ended</span></b><span data-dcnode-id="1301" instrument_node="">, and no more ye feel </span><br data-dcnode-id="1300"><span data-dcnode-id="1299" instrument_node=""> If your feet treat his flowers or the flames of his fire, </span><br data-dcnode-id="1298"><span data-dcnode-id="1297" instrument_node=""> If your breast meet his balms or the edge of his steel. </span><br data-dcnode-id="1296"><span data-dcnode-id="1295" instrument_node=""> </span><b data-dcnode-id="1287"><span data-dcnode-id="1294" instrument_node="">Change is come, and past over, no more strife, no more learning: </span><br data-dcnode-id="1293"><span data-dcnode-id="1292" instrument_node=""> Now your lips and your forehead are sealed with his seal, </span><br data-dcnode-id="1291"><span data-dcnode-id="1290" instrument_node=""> Look backward and smile at the thorns and the burning. </span><br data-dcnode-id="1289"><span data-dcnode-id="1288" instrument_node=""> — Sweet rest, O my soul, and no fear of returning!</span></b></li></ul><span data-dcnode-id="1284" instrument_node="">
</span><h4 data-dcnode-id="1274"><span class="mw-headline" data-dcnode-id="1282" id="Song_IX:_Ho_Ye_Who_Seek_Saving"><span data-dcnode-id="1283" instrument_node="">Song IX: Ho Ye Who Seek Saving</span></span><span class="mw-editsection" data-dcnode-id="1275"><span class="mw-editsection-bracket" data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">[</span></span><a data-dcnode-id="1278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/w/index.php%3Ftitle%3DWilliam_Morris%26action%3Dedit%26section%3D14" title="Edit section: Song IX: Ho Ye Who Seek Saving"><span data-dcnode-id="1279" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1273" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1256"><div class="thumbinner" data-dcnode-id="1257" style="width:222px;"><a class="image" data-dcnode-id="1271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/File%3AThe_Godhead_Fires%2C_Pygmalion_%28Burne-Jones%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="1272" data-file-height="583" data-file-width="450" decoding="async" height="285" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/18/The_Godhead_Fires%252C_Pygmalion_%2528Burne-Jones%2529.jpg/220px-The_Godhead_Fires%252C_Pygmalion_%2528Burne-Jones%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/18/The_Godhead_Fires%2C_Pygmalion_%28Burne-Jones%29.jpg/330px-The_Godhead_Fires%2C_Pygmalion_%28Burne-Jones%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/18/The_Godhead_Fires%2C_Pygmalion_%28Burne-Jones%29.jpg/440px-The_Godhead_Fires%2C_Pygmalion_%28Burne-Jones%29.jpg 2x" width="220"></a><span data-dcnode-id="1270" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1258"><div class="magnify" data-dcnode-id="1268"><a class="internal" data-dcnode-id="1269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/File%3AThe_Godhead_Fires%2C_Pygmalion_%28Burne-Jones%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="1267" instrument_node="">Surely within you some </span><a data-dcnode-id="1265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/Godhead" title="Godhead"><span data-dcnode-id="1266" instrument_node="">Godhead</span></a><span data-dcnode-id="1264" instrument_node=""> doth quicken, </span><br data-dcnode-id="1263"><span data-dcnode-id="1262" instrument_node=""> As ye cry to me heeding, and leading you </span><a data-dcnode-id="1260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/Home" title="Home"><span data-dcnode-id="1261" instrument_node="">home</span></a><span data-dcnode-id="1259" instrument_node="">...</span></div></div></div><span data-dcnode-id="1255" instrument_node="">
</span><ul data-dcnode-id="1237"><li data-dcnode-id="1238"><b data-dcnode-id="1251"><span data-dcnode-id="1254" instrument_node="">Love is enough: ho ye who seek saving, </span><br data-dcnode-id="1253"><span data-dcnode-id="1252" instrument_node=""> Go no further; come hither; there have been who have found it</span></b><span data-dcnode-id="1250" instrument_node="">, </span><br data-dcnode-id="1249"><span data-dcnode-id="1248" instrument_node=""> And these know the House of Fulfilment of Craving; </span><br data-dcnode-id="1247"><span data-dcnode-id="1246" instrument_node=""> These know the Cup with the roses around it; </span><br data-dcnode-id="1245"><span data-dcnode-id="1244" instrument_node=""> These know the World's Wound and the balm that hath bound it: </span><br data-dcnode-id="1243"><span data-dcnode-id="1242" instrument_node=""> Cry out, the World heedeth not, "</span><b data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">Love, lead us home!</span></b><span data-dcnode-id="1239" instrument_node="">"</span></li></ul><span data-dcnode-id="1236" instrument_node="">
</span><ul data-dcnode-id="1217"><li data-dcnode-id="1218"><span data-dcnode-id="1235" instrument_node="">O hearken the words of his voice of compassion: </span><br data-dcnode-id="1234"><span data-dcnode-id="1233" instrument_node=""> "Come cling round about me, ye faithful who sicken </span><br data-dcnode-id="1232"><span data-dcnode-id="1231" instrument_node=""> Of the weary unrest and the world's passing fashions! </span><br data-dcnode-id="1230"><span data-dcnode-id="1229" instrument_node=""> As the rain in mid-morning your troubles shall thicken, </span><br data-dcnode-id="1228"><span data-dcnode-id="1227" instrument_node=""> But </span><b data-dcnode-id="1220"><span data-dcnode-id="1226" instrument_node="">surely within you some </span><a data-dcnode-id="1224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/Godhead" title="Godhead"><span data-dcnode-id="1225" instrument_node="">Godhead</span></a><span data-dcnode-id="1223" instrument_node=""> doth quicken, </span><br data-dcnode-id="1222"><span data-dcnode-id="1221" instrument_node=""> As ye cry to me heeding, and leading you home.</span></b><span data-dcnode-id="1219" instrument_node="">"</span></li></ul><span data-dcnode-id="1216" instrument_node="">
</span><ul data-dcnode-id="1197"><li data-dcnode-id="1198"><span data-dcnode-id="1215" instrument_node="">"Come — pain ye shall have, and be blind to the ending! </span><br data-dcnode-id="1214"><span data-dcnode-id="1213" instrument_node=""> Come — fear ye shall have, mid the sky's overcasting! </span><br data-dcnode-id="1212"><span data-dcnode-id="1211" instrument_node=""> </span><b data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">Come — change ye shall have, for far are ye wending!</span></b><span data-dcnode-id="1208" instrument_node=""> </span><br data-dcnode-id="1207"><span data-dcnode-id="1206" instrument_node=""> Come — no crown ye shall have for your thirst and your fasting, </span><br data-dcnode-id="1205"><span data-dcnode-id="1204" instrument_node=""> </span><b data-dcnode-id="1200"><span data-dcnode-id="1203" instrument_node="">But the kissed lips of Love and fair life everlasting! </span><br data-dcnode-id="1202"><span data-dcnode-id="1201" instrument_node=""> Cry out, for one heedeth, who leadeth you home!</span></b><span data-dcnode-id="1199" instrument_node="">"</span></li></ul><span data-dcnode-id="1196" instrument_node="">
</span><h3 data-dcnode-id="1185"><span data-dcnode-id="1195" id="The_Decorative_Arts_.281877.29"></span><span class="mw-headline" data-dcnode-id="1193" id="The_Decorative_Arts_(1877)"><span data-dcnode-id="1194" instrument_node="">The Decorative Arts (1877)</span></span><span class="mw-editsection" data-dcnode-id="1186"><span class="mw-editsection-bracket" data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">[</span></span><a data-dcnode-id="1189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/w/index.php%3Ftitle%3DWilliam_Morris%26action%3Dedit%26section%3D15" title="Edit section: The Decorative Arts (1877)"><span data-dcnode-id="1190" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1184" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1175"><div class="thumbinner" data-dcnode-id="1176" style="width:222px;"><a class="image" data-dcnode-id="1182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/File%3AMorris-william.jpg"><img alt="" class="thumbimage" data-dcnode-id="1183" data-file-height="1189" data-file-width="1063" decoding="async" height="246" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/45/Morris-william.jpg/220px-Morris-william.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/45/Morris-william.jpg/330px-Morris-william.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/45/Morris-william.jpg/440px-Morris-william.jpg 2x" width="220"></a><span data-dcnode-id="1181" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1177"><div class="magnify" data-dcnode-id="1179"><a class="internal" data-dcnode-id="1180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/File%3AMorris-william.jpg" title="Enlarge"></a></div><span data-dcnode-id="1178" instrument_node="">I do not want art for a few, any more than education for a few, or freedom for a few.</span></div></div></div><span data-dcnode-id="1174" instrument_node="">
</span><dl data-dcnode-id="1165"><dd data-dcnode-id="1166"><small data-dcnode-id="1167"><a class="external text" data-dcnode-id="1172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.burrows.com/dec.html" rel="nofollow"><span data-dcnode-id="1173" instrument_node="">"The Decorative Arts: Their Relation to Modern Life and Progress" (1877)</span></a><span data-dcnode-id="1171" instrument_node=""> Morris's first public lecture, later published as "The Lesser Arts" in </span><i data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">Hopes and Fears for Art</span></i><span data-dcnode-id="1168" instrument_node=""> (1882)</span></small></dd></dl><span data-dcnode-id="1164" instrument_node="">
</span><ul data-dcnode-id="1157"><li data-dcnode-id="1158"><b data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">To give people pleasure in the things they must perforce use, that is one great office of decoration; to give people pleasure in the things they must perforce make, that is the other use of it.</span></b><span data-dcnode-id="1161" instrument_node=""> </span><br data-dcnode-id="1160"><span data-dcnode-id="1159" instrument_node=""> Does not our subject look important enough now? I say that without these arts, our rest would be vacant and uninteresting, our labour mere endurance, mere wearing away of body and mind.</span></li></ul><span data-dcnode-id="1156" instrument_node="">
</span><ul data-dcnode-id="1153"><li data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">When we can get beyond that smoky world, there, out in the country we may still see the works of our fathers yet alive amidst the very nature they were wrought into, and of which they are so completely a part: for there indeed if anywhere, in the English country, in the days when people cared about such things, was there a full sympathy between the works of man, and the land they were made for: — the land is a little land; too much shut up within the narrow seas, as it seems, to have much space for swelling into hugeness: there are no great wastes overwhelming in their dreariness, no great solitudes of forests, no terrible untrodden mountain-walls: all is measured, mingled, varied, gliding easily one thing into another: little rivers, little plains, swelling, speedily- changing uplands, all beset with handsome orderly trees; little hills, little mountains, netted over with the walls of sheep- walks: all is little; yet not foolish and blank, but serious rather, and abundant of meaning for such as choose to seek it: it is neither prison nor palace, but a decent home.</span></li></ul><span data-dcnode-id="1152" instrument_node="">
</span><ul data-dcnode-id="1148"><li data-dcnode-id="1149"><b data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">I do not want art for a few, any more than education for a few, or freedom for a few.</span></b></li></ul><span data-dcnode-id="1147" instrument_node="">
</span><h3 data-dcnode-id="1136"><span data-dcnode-id="1146" id="Art_and_Socialism_.281884.29"></span><span class="mw-headline" data-dcnode-id="1144" id="Art_and_Socialism_(1884)"><span data-dcnode-id="1145" instrument_node="">Art and Socialism (1884)</span></span><span class="mw-editsection" data-dcnode-id="1137"><span class="mw-editsection-bracket" data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">[</span></span><a data-dcnode-id="1140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/w/index.php%3Ftitle%3DWilliam_Morris%26action%3Dedit%26section%3D16" title="Edit section: Art and Socialism (1884)"><span data-dcnode-id="1141" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1135" instrument_node="">
</span><dl data-dcnode-id="1129"><dd data-dcnode-id="1130"><small data-dcnode-id="1131"><a class="external text" data-dcnode-id="1133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxists.org/archive/morris/works/1884/as/as.htm" rel="nofollow"><span data-dcnode-id="1134" instrument_node="">On line text at marxists.org</span></a><span data-dcnode-id="1132" instrument_node=""> </span></small></dd></dl><span data-dcnode-id="1128" instrument_node="">
</span><ul data-dcnode-id="1124"><li data-dcnode-id="1125"><b data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">It is right and necessary that all men should have work to do which shall be worth doing, and be of itself pleasant to do; and which should be done under such conditions as would make it neither over-wearisome nor over-anxious.</span></b></li></ul><span data-dcnode-id="1123" instrument_node="">
</span><ul data-dcnode-id="1119"><li data-dcnode-id="1120"><b data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Nothing should be made by man's labour which is not worth making; or which must be made by labour degrading to the makers.</span></b></li></ul><span data-dcnode-id="1118" instrument_node="">

</span><div class="thumb tright" data-dcnode-id="1067"><div class="thumbinner" data-dcnode-id="1068" style="width:222px;"><a class="image" data-dcnode-id="1074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/File%3AAdoration_of_the_Magi_Tapestry.png"><img alt="" class="thumbimage" data-dcnode-id="1075" data-file-height="1465" data-file-width="2157" decoding="async" height="149" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/31/Adoration_of_the_Magi_Tapestry.png/220px-Adoration_of_the_Magi_Tapestry.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/31/Adoration_of_the_Magi_Tapestry.png/330px-Adoration_of_the_Magi_Tapestry.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/31/Adoration_of_the_Magi_Tapestry.png/440px-Adoration_of_the_Magi_Tapestry.png 2x" width="220"></a><span data-dcnode-id="1073" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1069"><div class="magnify" data-dcnode-id="1071"><a class="internal" data-dcnode-id="1072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/File%3AAdoration_of_the_Magi_Tapestry.png" title="Enlarge"></a></div><span data-dcnode-id="1070" instrument_node="">I bid you not dwell in hell but in heaven, or while ye must, upon earth, which is a part of heaven, and forsooth no foul part.</span></div></div></div><span data-dcnode-id="1066" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1057"><div class="thumbinner" data-dcnode-id="1058" style="width:222px;"><a class="image" data-dcnode-id="1064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/File%3AUSA_Massachusetts_Boston_Trinity_Nativity-window.jpg"><img alt="" class="thumbimage" data-dcnode-id="1065" data-file-height="764" data-file-width="343" decoding="async" height="490" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/ae/USA_Massachusetts_Boston_Trinity_Nativity-window.jpg/220px-USA_Massachusetts_Boston_Trinity_Nativity-window.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/ae/USA_Massachusetts_Boston_Trinity_Nativity-window.jpg/330px-USA_Massachusetts_Boston_Trinity_Nativity-window.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/a/ae/USA_Massachusetts_Boston_Trinity_Nativity-window.jpg 2x" width="220"></a><span data-dcnode-id="1063" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1059"><div class="magnify" data-dcnode-id="1061"><a class="internal" data-dcnode-id="1062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/File%3AUSA_Massachusetts_Boston_Trinity_Nativity-window.jpg" title="Enlarge"></a></div><span data-dcnode-id="1060" instrument_node="">I pondered all these things, and how men fight and lose the battle, and the thing that they fought for comes about in spite of their defeat, and when it comes turns out not to be what they meant, and other men have to fight for what they meant under another name.</span></div></div></div><span data-dcnode-id="1056" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1047"><div class="thumbinner" data-dcnode-id="1048" style="width:222px;"><a class="image" data-dcnode-id="1054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/File%3AHoly_Grail_Tapestry_-The_Arming_and_Departure_of_the_Kniights.jpg"><img alt="" class="thumbimage" data-dcnode-id="1055" data-file-height="1727" data-file-width="2659" decoding="async" height="143" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Holy_Grail_Tapestry_-The_Arming_and_Departure_of_the_Kniights.jpg/220px-Holy_Grail_Tapestry_-The_Arming_and_Departure_of_the_Kniights.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Holy_Grail_Tapestry_-The_Arming_and_Departure_of_the_Kniights.jpg/330px-Holy_Grail_Tapestry_-The_Arming_and_Departure_of_the_Kniights.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Holy_Grail_Tapestry_-The_Arming_and_Departure_of_the_Kniights.jpg/440px-Holy_Grail_Tapestry_-The_Arming_and_Departure_of_the_Kniights.jpg 2x" width="220"></a><span data-dcnode-id="1053" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1049"><div class="magnify" data-dcnode-id="1051"><a class="internal" data-dcnode-id="1052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/File%3AHoly_Grail_Tapestry_-The_Arming_and_Departure_of_the_Kniights.jpg" title="Enlarge"></a></div><span data-dcnode-id="1050" instrument_node="">It is for him that is lonely or in prison to dream of fellowship, but for him that is of a fellowship to do and not to dream.</span></div></div></div><span data-dcnode-id="1046" instrument_node="">
</span><ul data-dcnode-id="1035"><li data-dcnode-id="1036"><b data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">When I was journeying (in a dream of the night)</span></b><span data-dcnode-id="1043" instrument_node=""> down the well-remembered reaches of the Thames betwixt Streatley and Wallingford, where the foothills of the White Horse fall back from the broad stream, I came upon a clear-seen mediæval town standing up with roof and tower and spire within its walls, grey and ancient, but untouched from the days of its builders of old. </span><b data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">All this I have seen in the dreams of the night clearer than I can force myself to see them in dreams of the day. So that it would have been nothing new to me the other night to fall into an architectural dream if that were all, and yet I have to tell of things strange and new that befell me after I had fallen asleep.</span></b><span data-dcnode-id="1040" instrument_node="">
</span><ul data-dcnode-id="1037"><li data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">Ch. 1: The Men of Kent</span></li></ul></li></ul><span data-dcnode-id="1034" instrument_node="">
</span><ul data-dcnode-id="1025"><li data-dcnode-id="1026"><span data-dcnode-id="1033" instrument_node="">Forsooth, ye have heard it said that ye shall do well in this world that in the world to come ye may live happily for ever; do ye well then, and have your reward both on earth and in heaven; for </span><b data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">I say to you that earth and heaven are not two but one; and this one is that which ye know, and are each one of you a part of, to wit, the Holy Church, and in each one of you dwelleth the life of the Church, unless ye slay it.</span></b><span data-dcnode-id="1030" instrument_node="">
</span><ul data-dcnode-id="1027"><li data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Ch. 4: The Voice of John Ball</span></li></ul></li></ul><span data-dcnode-id="1024" instrument_node="">
</span><ul data-dcnode-id="1011"><li data-dcnode-id="1012"><b data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Forsooth, brothers, fellowship is heaven, and lack of fellowship is hell</span></b><span data-dcnode-id="1021" instrument_node="">: fellowship is life, and lack of fellowship is death: and the deeds that ye do upon the earth, it is for fellowship's sake that ye do them, and the life that is in it, that shall live on and on for ever, and each one of you part of it, while many a man's life upon the earth from the earth shall wane. </span><br data-dcnode-id="1020"><span data-dcnode-id="1019" instrument_node=""> </span><b data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">Therefore, I bid you not dwell in hell but in heaven, or while ye must, upon earth, which is a part of heaven, and forsooth no foul part.</span></b><span data-dcnode-id="1016" instrument_node="">
</span><ul data-dcnode-id="1013"><li data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Ch. 4: The Voice of John Ball</span></li></ul></li></ul><span data-dcnode-id="1010" instrument_node="">
</span><ul data-dcnode-id="1001"><li data-dcnode-id="1002"><span data-dcnode-id="1009" instrument_node="">Forsooth, he that waketh in hell and feeleth his heart fail him, shall have memory of the merry days of earth, and how that when his heart failed him there, he cried on his fellow, were it his wife or his son or his brother or his gossip or his brother sworn in arms, and how that his fellow heard him and came and they mourned together under the sun, till again they laughed together and were but half sorry between them. </span><b data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">This shall he think on in hell, and cry on his fellow to help him, and shall find that therein is no help because there is no fellowship, but every man for himself.</span></b><span data-dcnode-id="1006" instrument_node="">

</span><ul data-dcnode-id="971"><li data-dcnode-id="972"><b data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">Mastership hath many shifts whereby it striveth to keep itself alive in the world.</span></b><span data-dcnode-id="979" instrument_node=""> And now hear a marvel: whereas thou sayest these two times that out of one man ye may get but one man's work, </span><b data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">in days to come one man shall do the work of a hundred men — yea, of a thousand or more: and this is the shift of mastership that shall make many masters and many rich men.</span></b><span data-dcnode-id="976" instrument_node="">
</span><ul data-dcnode-id="973"><li data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Ch. 12: Ill Would Change Be At Whiles Were It Not For The Change Beyond The Change.</span></li></ul></li></ul><span data-dcnode-id="970" instrument_node="">
</span><ul data-dcnode-id="959"><li data-dcnode-id="960"><b data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">To thee, when thou didst try to conceive of them, the ways of the days to come seemed follies scarce to be thought of; yet shall they come to be familiar things</span></b><span data-dcnode-id="967" instrument_node="">, and an order by which every man liveth, ill as he liveth, so that men shall deem of them, that thus it hath been since the beginning of the world, and that thus it shall be while the world endureth... Yet in time shall this also grow old, and doubt shall creep in, because men shall scarce be able to live by that order, and the complaint of the poor shall be hearkened, no longer as a tale not utterly grievous, but as a threat of ruin, and a fear. Then shall these things, which to thee seem follies, and to the men between thee and me mere wisdom and the bond of stability, seem follies once again; yet, whereas men have so long lived by them, they shall cling to them yet from blindness and from fear; and those that see, and that have thus much conquered fear that they are furthering the real time that cometh and not the dream that faileth, these men shall the blind and the fearful mock and missay, and torment and murder: and great and grievous shall be the strife in those days, and many the failures of the wise, and too oft sore shall be the despair of the valiant; and back-sliding, and doubt, and contest between friends and fellows lacking time in the hubbub to understand each other, shall grieve many hearts and hinder the Host of the Fellowship: </span><b data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">yet shall all bring about the end, till thy deeming of folly and ours shall be one, and thy hope and our hope; and then — the Day will have come.</span></b><span data-dcnode-id="964" instrument_node="">
</span><ul data-dcnode-id="961"><li data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Ch. 12: Ill Would Change Be At Whiles Were It Not For The Change Beyond The Change.</span></li></ul></li></ul><span data-dcnode-id="958" instrument_node="">
</span><h3 data-dcnode-id="945"><span data-dcnode-id="957" id="Signs_of_Change_.281888.29"></span><span class="mw-headline" data-dcnode-id="953" id="Signs_of_Change_(1888)"><i data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Signs of Change</span></i><span data-dcnode-id="954" instrument_node=""> (1888)</span></span><span class="mw-editsection" data-dcnode-id="946"><span class="mw-editsection-bracket" data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">[</span></span><a data-dcnode-id="949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/w/index.php%3Ftitle%3DWilliam_Morris%26action%3Dedit%26section%3D18" title="Edit section: Signs of Change (1888)"><span data-dcnode-id="950" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">]</span></span></span></h3><span data-dcnode-id="944" instrument_node="">
</span><dl data-dcnode-id="939"><dd data-dcnode-id="940"><small data-dcnode-id="941"><a class="external text" data-dcnode-id="942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//etext.library.adelaide.edu.au/m/morris/william/m87sc/" rel="nofollow"><span data-dcnode-id="943" instrument_node="">Online text at The University of Adelaide</span></a></small></dd></dl><span data-dcnode-id="938" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="929"><div class="thumbinner" data-dcnode-id="930" style="width:222px;"><a class="image" data-dcnode-id="936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/File%3AEdward_Burne-Jones_-_The_Wheel_of_Fortune.jpg"><img alt="" class="thumbimage" data-dcnode-id="937" data-file-height="3780" data-file-width="1919" decoding="async" height="433" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Edward_Burne-Jones_-_The_Wheel_of_Fortune.jpg/220px-Edward_Burne-Jones_-_The_Wheel_of_Fortune.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Edward_Burne-Jones_-_The_Wheel_of_Fortune.jpg/330px-Edward_Burne-Jones_-_The_Wheel_of_Fortune.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Edward_Burne-Jones_-_The_Wheel_of_Fortune.jpg/440px-Edward_Burne-Jones_-_The_Wheel_of_Fortune.jpg 2x" width="220"></a><span data-dcnode-id="935" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="931"><div class="magnify" data-dcnode-id="933"><a class="internal" data-dcnode-id="934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/File%3AEdward_Burne-Jones_-_The_Wheel_of_Fortune.jpg" title="Enlarge"></a></div><span data-dcnode-id="932" instrument_node="">We will stick to our word, which means a change of the basis of society … it may encourage some people, and will mean to them at least not a fear, but a hope.</span></div></div></div><span data-dcnode-id="928" instrument_node="">
</span><h4 data-dcnode-id="918"><span class="mw-headline" data-dcnode-id="926" id="How_We_Live_And_How_We_Might_Live"><span data-dcnode-id="927" instrument_node="">How We Live And How We Might Live</span></span><span class="mw-editsection" data-dcnode-id="919"><span class="mw-editsection-bracket" data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">[</span></span><a data-dcnode-id="922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/w/index.php%3Ftitle%3DWilliam_Morris%26action%3Dedit%26section%3D19" title="Edit section: How We Live And How We Might Live"><span data-dcnode-id="923" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">]</span></span></span></h4><span data-dcnode-id="917" instrument_node="">
</span><ul data-dcnode-id="910"><li data-dcnode-id="911"><b data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">The word Revolution, which we Socialists are so often forced to use, has a terrible sound in most people's ears, even when we have explained to them that it does not necessarily mean a change accompanied by riot and all kinds of violence, and cannot mean a change made mechanically and in the teeth of opinion by a group of men who have somehow managed to seize on the executive power for the moment.</span></b><span data-dcnode-id="914" instrument_node=""> Even when we explain that we use the word revolution in its etymological sense, and mean by it a change in the basis of society, people are scared at the idea of such a vast change, and beg that you will speak of reform and not revolution. As, however, we Socialists do not at all mean by our word revolution what these worthy people mean by their word reform, I can't help thinking that it would be a mistake to use it, whatever projects we might conceal beneath its harmless envelope. </span><b data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">So we will stick to our word, which means a change of the basis of society; it may frighten people, but it will at least warn them that there is something to be frightened about, which will be no less dangerous for being ignored; and also it may encourage some people, and will mean to them at least not a fear, but a hope.</span></b></li></ul><span data-dcnode-id="909" instrument_node="">
</span><ul data-dcnode-id="899"><li data-dcnode-id="900"><b data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Fear and Hope — those are the names of the two great passions which rule the race of man, and with which revolutionists have to deal; to give hope to the many oppressed and fear to the few oppressors, that is our business</span></b><span data-dcnode-id="906" instrument_node="">; if we do the first and give hope to the many, the few </span><i data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">must</span></i><span data-dcnode-id="903" instrument_node=""> be frightened by their hope; otherwise we do not want to frighten them; </span><b data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">it is not revenge we want for poor people, but happiness; indeed, what revenge can be taken for all the thousands of years of the sufferings of the poor?</span></b></li></ul><span data-dcnode-id="898" instrument_node="">
</span><h4 data-dcnode-id="888"><span class="mw-headline" data-dcnode-id="896" id="The_Aims_of_Art"><span data-dcnode-id="897" instrument_node="">The Aims of Art</span></span><span class="mw-editsection" data-dcnode-id="889"><span class="mw-editsection-bracket" data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">[</span></span><a data-dcnode-id="892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/w/index.php%3Ftitle%3DWilliam_Morris%26action%3Dedit%26section%3D20" title="Edit section: The Aims of Art"><span data-dcnode-id="893" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">]</span></span></span></h4><span data-dcnode-id="887" instrument_node="">
</span><ul data-dcnode-id="884"><li data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Soon there will be nothing left except the lying dreams of history, the miserable wreckage of our museums and picture-galleries, and the carefully guarded interiors of our aesthetic drawing-rooms, unreal and foolish, fitting witnesses of the life of corruption that goes on there, so pinched and meagre and cowardly, with its concealment and ignoring, rather than restraint of, natural longings; which does not forbid the greedy indulgence in them if it can but be decently hidden.</span></li></ul><span data-dcnode-id="883" instrument_node="">
</span><ul data-dcnode-id="875"><li data-dcnode-id="876"><b data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">I have said as much as that the aim of art was to destroy the curse of labour by making work the pleasurable satisfaction of our impulse towards energy, and giving to that energy hope of producing something worth its exercise.</span></b><span data-dcnode-id="880" instrument_node="">
</span><ul data-dcnode-id="877"><li data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">This has sometimes appeared in paraphrased form as: "The aim of art is to destroy the curse of labour by making work the pleasurable satisfaction of our impulse towards energy, and giving to that energy hope of producing something worth the exercise".</span></li></ul></li></ul><span data-dcnode-id="874" instrument_node="">
</span><h4 data-dcnode-id="864"><span class="mw-headline" data-dcnode-id="872" id="Useful_Work_versus_Useless_Toil"><span data-dcnode-id="873" instrument_node="">Useful Work versus Useless Toil</span></span><span class="mw-editsection" data-dcnode-id="865"><span class="mw-editsection-bracket" data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">[</span></span><a data-dcnode-id="868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/w/index.php%3Ftitle%3DWilliam_Morris%26action%3Dedit%26section%3D21" title="Edit section: Useful Work versus Useless Toil"><span data-dcnode-id="869" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">]</span></span></span></h4><span data-dcnode-id="863" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="854"><div class="thumbinner" data-dcnode-id="855" style="width:222px;"><a class="image" data-dcnode-id="861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/File%3AUSA_Massachusetts_Boston_Trinity_Nativity-detail-1.jpg"><img alt="" class="thumbimage" data-dcnode-id="862" data-file-height="512" data-file-width="600" decoding="async" height="188" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/ba/USA_Massachusetts_Boston_Trinity_Nativity-detail-1.jpg/220px-USA_Massachusetts_Boston_Trinity_Nativity-detail-1.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/ba/USA_Massachusetts_Boston_Trinity_Nativity-detail-1.jpg/330px-USA_Massachusetts_Boston_Trinity_Nativity-detail-1.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/ba/USA_Massachusetts_Boston_Trinity_Nativity-detail-1.jpg/440px-USA_Massachusetts_Boston_Trinity_Nativity-detail-1.jpg 2x" width="220"></a><span data-dcnode-id="860" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="856"><div class="magnify" data-dcnode-id="858"><a class="internal" data-dcnode-id="859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/File%3AUSA_Massachusetts_Boston_Trinity_Nativity-detail-1.jpg" title="Enlarge"></a></div><span data-dcnode-id="857" instrument_node="">A man at work, making something which he feels will exist because he is working at it and wills it, is exercising the energies of his mind and soul as well as of his body. Memory and imagination help him as he works. Not only his own thoughts, but the thoughts of the men of past ages guide his hands; and, as a part of the human race, he creates. If we work thus we shall be men, and our days will be happy and eventful.</span></div></div></div><span data-dcnode-id="853" instrument_node="">
</span><ul data-dcnode-id="849"><li data-dcnode-id="850"><b data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">I think that to all living things there is a pleasure in the exercise of their energies, and that even beasts rejoice in being lithe and swift and strong. But a man at work, making something which he feels will exist because he is working at it and wills it, is exercising the energies of his mind and soul as well as of his body. Memory and imagination help him as he works. Not only his own thoughts, but the thoughts of the men of past ages guide his hands; and, as a part of the human race, he creates. If we work thus we shall be men, and our days will be happy and eventful.</span></b></li></ul><span data-dcnode-id="848" instrument_node="">
</span><ul data-dcnode-id="841"><li data-dcnode-id="842"><span data-dcnode-id="847" instrument_node="">Worthy work carries with it the hope of pleasure in rest, the hope of the pleasure in our using what it makes, and the hope of pleasure in our daily creative skill. </span><br data-dcnode-id="846"><span data-dcnode-id="845" instrument_node=""> </span><b data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">All other work but this is worthless; it is slaves' work — mere toiling to live, that we may live to toil.</span></b></li></ul><span data-dcnode-id="840" instrument_node="">
</span><h3 data-dcnode-id="826"><span data-dcnode-id="839" id="News_from_Nowhere_.281890.29"></span><span class="mw-headline" data-dcnode-id="834" id="News_from_Nowhere_(1890)"><i data-dcnode-id="836"><a class="extiw" data-dcnode-id="837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/News_from_Nowhere" title="w:News from Nowhere"><span data-dcnode-id="838" instrument_node="">News from Nowhere</span></a></i><span data-dcnode-id="835" instrument_node=""> (1890)</span></span><span class="mw-editsection" data-dcnode-id="827"><span class="mw-editsection-bracket" data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">[</span></span><a data-dcnode-id="830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/w/index.php%3Ftitle%3DWilliam_Morris%26action%3Dedit%26section%3D22" title="Edit section: News from Nowhere (1890)"><span data-dcnode-id="831" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">]</span></span></span></h3><span data-dcnode-id="825" instrument_node="">
</span><ul data-dcnode-id="818"><li data-dcnode-id="819"><b data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Go back again, now you have seen us, and your outward eyes have learned that in spite of all the infallible maxims of your day there is yet a time of rest in store for the world, when mastery has changed into fellowship — but not before.</span></b><span data-dcnode-id="822" instrument_node=""> Go back again, then, and while you live you will see all round you people engaged in making others live lives which are not their own, while they themselves care nothing for their own real lives — men who hate life though they fear death. </span><b data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Go back and be the happier for having seen us, for having added a little hope to your struggle. Go on living while you may, striving, with whatsoever pain and labour needs must be, to build up little by little the new day of fellowship, and rest, and happiness.</span></b></li></ul><span data-dcnode-id="817" instrument_node="">
</span><ul data-dcnode-id="813"><li data-dcnode-id="814"><b data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">If others can see it as I have seen it, then it may be called a vision rather than a dream.</span></b></li></ul><span data-dcnode-id="812" instrument_node="">
</span><h2 data-dcnode-id="802"><span class="mw-headline" data-dcnode-id="810" id="Quotes_about_Morris"><span data-dcnode-id="811" instrument_node="">Quotes about Morris</span></span><span class="mw-editsection" data-dcnode-id="803"><span class="mw-editsection-bracket" data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">[</span></span><a data-dcnode-id="806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/w/index.php%3Ftitle%3DWilliam_Morris%26action%3Dedit%26section%3D23" title="Edit section: Quotes about Morris"><span data-dcnode-id="807" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">]</span></span></span></h2><span data-dcnode-id="801" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="787"><div class="thumbinner" data-dcnode-id="788" style="width:222px;"><a class="image" data-dcnode-id="799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/File%3AWilliam_Morris_by_Vallotton.jpg"><img alt="" class="thumbimage" data-dcnode-id="800" data-file-height="684" data-file-width="557" decoding="async" height="270" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/74/William_Morris_by_Vallotton.jpg/220px-William_Morris_by_Vallotton.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/74/William_Morris_by_Vallotton.jpg/330px-William_Morris_by_Vallotton.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/74/William_Morris_by_Vallotton.jpg/440px-William_Morris_by_Vallotton.jpg 2x" width="220"></a><span data-dcnode-id="798" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="789"><div class="magnify" data-dcnode-id="796"><a class="internal" data-dcnode-id="797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/File%3AWilliam_Morris_by_Vallotton.jpg" title="Enlarge"></a></div><span data-dcnode-id="795" instrument_node="">Morris was not only a genius, he was a </span><i data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">man</span></i><span data-dcnode-id="792" instrument_node="">. Strike at him where you would, he rang true … He was our best man. ~ </span><a class="extiw" data-dcnode-id="790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Blatchford" title="w:Robert Blatchford"><span data-dcnode-id="791" instrument_node="">Robert Blatchford</span></a></div></div></div><span data-dcnode-id="786" instrument_node="">
</span><ul data-dcnode-id="750"><li data-dcnode-id="751"><b data-dcnode-id="781"><span data-dcnode-id="785" instrument_node="">I cannot help thinking that it does not matter what goes into the </span><i data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Clarion</span></i><span data-dcnode-id="782" instrument_node=""> this week, because William Morris is dead.</span></b><span data-dcnode-id="780" instrument_node=""> And what socialist will care for any other news this week, beyond that one sad fact? … </span><br data-dcnode-id="779"><span data-dcnode-id="778" instrument_node=""> </span><b data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">William Morris was our best man; and he is dead.</span></b><span data-dcnode-id="775" instrument_node=""> It is true that much of his work still lives, and will live. But we have lost him, and, great as was his work, he himself was greater. Many a man of genius is dwarfed by his creations. We could all name men whose personalities seem unworthy of their own words and actions; men who resemble mean jars filled with honey, or foul lamps emitting brilliant beams. </span><b data-dcnode-id="770"><span data-dcnode-id="774" instrument_node="">Morris was of a nobler kind. He was better than his best. Though his words fell like sword strokes, one always felt that the warrior was stronger than the sword. For Morris was not only a genius, he was a </span><i data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">man</span></i><span data-dcnode-id="771" instrument_node="">. Strike at him where you would, he rang true.</span></b><span data-dcnode-id="769" instrument_node=""> … His face was as honest as a lion's and you accepted his word as you accept a date from the almanac. This is a censorious world, and as a rule, let a man be chaste as ice, pure as snow, he shall not escape calumny. Yet I have never heard a single word of detraction or dislike spoken of William Morris. Nor is there a Socialist to-day in England but will feel that he has lost a friend. </span><br data-dcnode-id="768"><span data-dcnode-id="767" instrument_node=""> </span><b data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">He was our best man.</span></b><span data-dcnode-id="764" instrument_node=""> We cannot spare him; we cannot replace him. </span><b data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">In all England there lives no braver, kinder, honester, cleverer, heartier man than William Morris. He is dead, and we cannot help feeling for a while that nothing else matters.</span></b><span data-dcnode-id="761" instrument_node="">
</span><ul data-dcnode-id="752"><li data-dcnode-id="753"><a class="extiw" data-dcnode-id="759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Blatchford" title="w:Robert Blatchford"><span data-dcnode-id="760" instrument_node="">Robert Blatchford</span></a><span data-dcnode-id="758" instrument_node=""> in </span><i data-dcnode-id="755"><a class="extiw" data-dcnode-id="756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Clarion" title="w:The Clarion"><span data-dcnode-id="757" instrument_node="">The Clarion</span></a></i><span data-dcnode-id="754" instrument_node=""> (October 1896).</span></li></ul></li></ul><span data-dcnode-id="749" instrument_node="">
</span><ul data-dcnode-id="724"><li data-dcnode-id="725"><span data-dcnode-id="748" instrument_node="">When I first knew Morris nothing would content him but being a monk, and getting to Rome, and then he must be an architect, and apprenticed himself to </span><a class="extiw" data-dcnode-id="746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Edmund_Street" title="w:George Edmund Street"><span data-dcnode-id="747" instrument_node="">Street</span></a><span data-dcnode-id="745" instrument_node="">, and worked for two years, but when I came to London and began to paint he threw it all up, and must paint too, and then he must give it up and make poems, and then he must give it up and make window hangings and pretty things, and when he had achieved that, he must be a poet again, and then after two or three years of Earthly Paradise time, he must learn dyeing, and lived in a vat, and learned weaving, and knew all about looms, and then made more books, and learned tapestry, and then wanted to smash everything up and begin the world anew, and now it is printing he cares for, and to make wonderful rich-looking books — and </span><b data-dcnode-id="735"><span data-dcnode-id="744" instrument_node="">all things he does splendidly — and if he lives the printing will have an end — but not I hope, before </span><i data-dcnode-id="741"><a data-dcnode-id="742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/Geoffrey_Chaucer" title="Geoffrey Chaucer"><span data-dcnode-id="743" instrument_node="">Chaucer</span></a></i><span data-dcnode-id="740" instrument_node=""> and the </span><i data-dcnode-id="737"><a class="extiw" data-dcnode-id="738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Morte_d%2527Arthur" title="w:Morte d'Arthur"><span data-dcnode-id="739" instrument_node="">Morte d'Arthur</span></a></i><span data-dcnode-id="736" instrument_node=""> are done; then he'll do I don't know what, but every minute will be alive.</span></b><span data-dcnode-id="734" instrument_node="">
</span><ul data-dcnode-id="726"><li data-dcnode-id="727"><a class="extiw" data-dcnode-id="732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_Burne-Jones" title="w:Edward Burne-Jones"><span data-dcnode-id="733" instrument_node="">Edward Burne-Jones</span></a><span data-dcnode-id="731" instrument_node="">, as quoted in </span><i data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Time Remembered‎</span></i><span data-dcnode-id="728" instrument_node=""> (1933) by Frances Horner,  p. 14.</span></li></ul></li></ul><span data-dcnode-id="723" instrument_node="">
</span><ul data-dcnode-id="712"><li data-dcnode-id="713"><span data-dcnode-id="722" instrument_node="">We need a return to the William Morris broad conception of art in relation to life, in terms of colours and designs and craftsmanship, and windows opening on to Heaven, instead of narrowing it down to the preciosities of cliques and coteries who seek through their obscurities to keep art esoteric.
</span><ul data-dcnode-id="714"><li data-dcnode-id="715"><a class="extiw" data-dcnode-id="720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethel_Mannin" title="w:Ethel Mannin"><span data-dcnode-id="721" instrument_node="">Ethel Mannin</span></a><span data-dcnode-id="719" instrument_node="">, in </span><i data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Privileged Spectator</span></i><span data-dcnode-id="716" instrument_node="">, 1939.</span></li></ul></li></ul><span data-dcnode-id="711" instrument_node="">
</span><ul data-dcnode-id="700"><li data-dcnode-id="701"><span data-dcnode-id="710" instrument_node="">It is Morris... who can properly be called the first English Marxist. This truth has been but slowly recognised, not only by the reformists and anarchists who each, in their own fashion, have tried to annex him, but also by Marxists.
</span><ul data-dcnode-id="702"><li data-dcnode-id="703"><a class="extiw" data-dcnode-id="708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/A._L._Morton" title="w:A. L. Morton"><span data-dcnode-id="709" instrument_node="">Arthur Leslie Morton</span></a><span data-dcnode-id="707" instrument_node="">, in </span><i data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Political Writings of William Morris</span></i><span data-dcnode-id="704" instrument_node=""> (1973), p. 21.</span></li></ul></li></ul><span data-dcnode-id="699" instrument_node="">
</span><ul data-dcnode-id="685"><li data-dcnode-id="686"><span data-dcnode-id="698" instrument_node="">So far Morris is the true prophet of the 20th century. </span><b data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">We owe it to him that an ordinary man's dwelling-house has once more become a worthy object of the architect's thought, and a chair, a wallpaper, or a vase, a worthy object of the artist's imagination.</span></b><span data-dcnode-id="695" instrument_node="">
</span><ul data-dcnode-id="687"><li data-dcnode-id="688"><a class="extiw" data-dcnode-id="693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nikolaus_Pevsner" title="w:Nikolaus Pevsner"><span data-dcnode-id="694" instrument_node="">Nikolaus Pevsner</span></a><span data-dcnode-id="692" instrument_node="">, in </span><i data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Pioneers of Modern Design</span></i><span data-dcnode-id="689" instrument_node=""> (1936).</span></li></ul></li></ul><span data-dcnode-id="684" instrument_node="">
</span><ul data-dcnode-id="660"><li data-dcnode-id="661"><b data-dcnode-id="679"><span data-dcnode-id="683" instrument_node="">Hence has arisen that exaltation of the defective, of which </span><a data-dcnode-id="681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/John_Ruskin" title="John Ruskin"><span data-dcnode-id="682" instrument_node="">John Ruskin</span></a><span data-dcnode-id="680" instrument_node=""> and William Morris</span></b><span data-dcnode-id="678" instrument_node=""> were such eager spokesmen in their time; and on this ground their propaganda of crudity and wasted effort has been taken up and carried forward since their time. And hence also the propaganda for a return to handicraft and household industry. </span><b data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">So much of the work and speculations of this group</span></b><span data-dcnode-id="675" instrument_node=""> of men as fairly comes under the characterization here given </span><b data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">would have been impossible at a time when the visibly more perfect goods were not the cheaper.</span></b><span data-dcnode-id="672" instrument_node="">
</span><ul data-dcnode-id="662"><li data-dcnode-id="663"><a data-dcnode-id="670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/Thorstein_Veblen" title="Thorstein Veblen"><span data-dcnode-id="671" instrument_node="">Thorstein Veblen</span></a><span data-dcnode-id="669" instrument_node="">, </span><i data-dcnode-id="665"><a data-dcnode-id="667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/The_Theory_of_the_Leisure_Class" title="The Theory of the Leisure Class"><span data-dcnode-id="668" instrument_node="">The Theory of the Leisure Class</span></a><span data-dcnode-id="666" instrument_node="">: An Economic Study of Institutions</span></i><span data-dcnode-id="664" instrument_node=""> (1899).</span></li></ul></li></ul><span data-dcnode-id="659" instrument_node="">
</span><ul data-dcnode-id="649"><li data-dcnode-id="650"><b data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">William Morris pleaded well for simplicity as the basis of all true art.</span></b><span data-dcnode-id="656" instrument_node=""> Let us understand the significance to art of that word — SIMPLICITY — for it is vital to the Art of the Machine.
</span><ul data-dcnode-id="651"><li data-dcnode-id="652"><a data-dcnode-id="654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/Frank_Lloyd_Wright" title="Frank Lloyd Wright"><span data-dcnode-id="655" instrument_node="">Frank Lloyd Wright</span></a><span data-dcnode-id="653" instrument_node="">, in "The Art and Craft of the Machine", a lecture to the Chicago Arts &amp; Crafts Society (6 March 1901).</span></li></ul></li></ul><span data-dcnode-id="648" instrument_node="">
