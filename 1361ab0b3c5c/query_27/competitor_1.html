ntent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/Knowing" title="Knowing"><span data-dcnode-id="2989" instrument_node="">knowing</span></a><span data-dcnode-id="2987" instrument_node=""> thee for such…</span></div></div></div><span data-dcnode-id="2983" instrument_node="">

/span><a class="mw-redirect" data-dcnode-id="2969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/Dies" title="Dies"><span data-dcnode-id="2970" instrument_node="">dies</span></a><span data-dcnode-id="2968" instrument_node="">.</span></div></div></div><span data-dcnode-id="2964" instrument_node="">
</span><ul data-dcnode-id="2938"><li data-dcnode-id="2939"><b data-dcnode-id="2947"><span data-dcnode-id="2963" instrument_node="">If you want a golden </span><a class="mw-disambig" data-dcnode-id="2961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/Rule" title="Rule"><span data-dcnode-id="2962" instrument_node="">rule</span></a><span data-dcnode-id="2960" instrument_node=""> that will fit everybody, this is it: Have </span><a class="mw-redirect" data-dcnode-id="2958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/Nothing" title="Nothing"><span data-dcnode-id="2959" instrument_node="">nothing</span></a><span data-dcnode-id="2957" instrument_node=""> in your houses that you do not </span><a class="mw-redirect" data-dcnode-id="2955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/Know" title="Know"><span data-dcnode-id="2956" instrument_node="">know</span></a><span data-dcnode-id="2954" instrument_node=""> to be useful, or </span><a class="mw-redirect" data-dcnode-id="2952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/Believe" title="Believe"><span data-dcnode-id="2953" instrument_node="">believe</span></a><span data-dcnode-id="2951" instrument_node=""> to be </span><a class="mw-redirect" data-dcnode-id="2949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/Beautiful" title="Beautiful"><span data-dcnode-id="2950" instrument_node="">beautiful</span></a><span data-dcnode-id="2948" instrument_node="">.</span></b><span data-dcnode-id="2946" instrument_node="">
</span><ul data-dcnode-id="2940"><li data-dcnode-id="2941"><span data-dcnode-id="2945" instrument_node="">"The Beauty of Life," a lecture before the Birmingham Society of Arts and School of Design (19 February 1880), later published in </span><i data-dcnode-id="2943"><span data-dcnode-id="2944" instrument_node="">Hopes and Fears for Art: Five Lectures Delivered in Birmingham, London, and Nottingham, 1878 - 1881</span></i><span data-dcnode-id="2942" instrument_node=""> (1882).</span></li></ul></li></ul><span data-dcnode-id="2937" instrument_node="">
</span><ul data-dcnode-id="2912"><li data-dcnode-id="2913"><b data-dcnode-id="2920"><span data-dcnode-id="2936" instrument_node="">Beauty, which is what is meant by </span><a data-dcnode-id="2934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/Art" title="Art"><span data-dcnode-id="2935" instrument_node="">art</span></a><span data-dcnode-id="2933" instrument_node="">, using the </span><a class="mw-redirect" data-dcnode-id="2931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/Word" title="Word"><span data-dcnode-id="2932" instrument_node="">word</span></a><span data-dcnode-id="2930" instrument_node=""> in its widest sense, is, I contend, no mere accident to </span><a data-dcnode-id="2928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/Human" title="Human"><span data-dcnode-id="2929" instrument_node="">human</span></a><span data-dcnode-id="2927" instrument_node=""> </span><a data-dcnode-id="2925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/Life" title="Life"><span data-dcnode-id="2926" instrument_node="">life</span></a><span data-dcnode-id="2924" instrument_node="">, which people can take or leave as they choose, but a positive </span><a data-dcnode-id="2922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/Necessity" title="Necessity"><span data-dcnode-id="2923" instrument_node="">necessity</span></a><span data-dcnode-id="2921" instrument_node=""> of life.</span></b><span data-dcnode-id="2919" instrument_node="">
</span><ul data-dcnode-id="2914"><li data-dcnode-id="2915"><i data-dcnode-id="2917"><span data-dcnode-id="2918" instrument_node="">The Beauty of Life</span></i><span data-dcnode-id="2916" instrument_node=""> (1880).</span></li></ul></li></ul><span data-dcnode-id="2911" instrument_node="">
</span><ul data-dcnode-id="2903"><li data-dcnode-id="2904"><span data-dcnode-id="2910" instrument_node="">The greatest foe to art is luxury, art cannot live in its atmosphere.
</span><ul data-dcnode-id="2905"><li data-dcnode-id="2906"><i data-dcnode-id="2908"><span data-dcnode-id="2909" instrument_node="">The Beauty of Life</span></i><span data-dcnode-id="2907" instrument_node=""> (1880).</span></li></ul></li></ul><span data-dcnode-id="2902" instrument_node="">
</span><ul data-dcnode-id="2884"><li data-dcnode-id="2885"><b data-dcnode-id="2895"><a data-dcnode-id="2900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/Simplicity" title="Simplicity"><span data-dcnode-id="2901" instrument_node="">Simplicity</span></a><span data-dcnode-id="2899" instrument_node=""> of life, even the barest, is not a </span><a data-dcnode-id="2897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/Misery" title="Misery"><span data-dcnode-id="2898" instrument_node="">misery</span></a><span data-dcnode-id="2896" instrument_node="">, but the very foundation of refinement</span></b><span data-dcnode-id="2894" instrument_node="">: a sanded floor and whitewashed walls, and the green trees, and flowery meads, and living waters outside; or a grimy palace amid the smoke with a regiment of housemaids always working to smear the dirt together so that it may be unnoticed; which, think you, is the most refined, the most fit for a gentleman of those two dwellings? </span><br data-dcnode-id="2893"><span data-dcnode-id="2892" instrument_node=""> </span><b data-dcnode-id="2890"><span data-dcnode-id="2891" instrument_node="">So I say, if you cannot learn to love real art; at least learn to hate sham art and reject it.</span></b><span data-dcnode-id="2889" instrument_node=""> It is not because the wretched thing is so ugly and silly and useless that I ask you to cast it from you; it is much more because these are but the outward symbols of the poison that lies within them; look through them and see all that has gone to their fashioning, and you will see how vain labour, and sorrow, and disgrace have been their companions from the first — and all this for trifles that no man really needs!
</span><ul data-dcnode-id="2886"><li data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">Speech, London (10 March 1880)</span></li></ul></li></ul><span data-dcnode-id="2883" instrument_node="">
</span><ul data-dcnode-id="2872"><li data-dcnode-id="2873"><b data-dcnode-id="2881"><span data-dcnode-id="2882" instrument_node="">I love art, and I love history, but it is living art and living history that I love...</span></b><span data-dcnode-id="2880" instrument_node=""> It is in the interest of living art and living history that I oppose so-called restoration. What history can there be in a building bedaubed with ornament, which cannot at the best be anything but a hopeless and lifeless imitation of the hope and vigour of the earlier world?
</span><ul data-dcnode-id="2874"><li data-dcnode-id="2875"><span data-dcnode-id="2879" instrument_node="">"The History of Pattern-Designing" lecture (1882) </span><i data-dcnode-id="2877"><span data-dcnode-id="2878" instrument_node="">The Collected Works of William Morris</span></i><span data-dcnode-id="2876" instrument_node=""> (1910 - 1915) Vol. 22</span></li></ul></li></ul><span data-dcnode-id="2871" instrument_node="">
</span><ul data-dcnode-id="2857"><li data-dcnode-id="2858"><b data-dcnode-id="2863"><span data-dcnode-id="2870" instrument_node="">So long as the </span><a data-dcnode-id="2868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/System" title="System"><span data-dcnode-id="2869" instrument_node="">system</span></a><span data-dcnode-id="2867" instrument_node=""> of </span><a data-dcnode-id="2865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/Competition" title="Competition"><span data-dcnode-id="2866" instrument_node="">competition</span></a><span data-dcnode-id="2864" instrument_node=""> in the production and exchange of the means of life goes on, the degradation of the arts will go on</span></b><span data-dcnode-id="2862" instrument_node="">; and if that system is to last for ever, then art is doomed, and will surely die; that is to say, civilization will die.
</span><ul data-dcnode-id="2859"><li data-dcnode-id="2860"><span data-dcnode-id="2861" instrument_node="">"Art Under Plutocracy" (1883)</span></li></ul></li></ul><span data-dcnode-id="2856" instrument_node="">
</span><ul data-dcnode-id="2842"><li data-dcnode-id="2843"><span data-dcnode-id="2855" instrument_node="">What shall I say concerning its mastery of and its waste of mechanical power, its commonwealth so poor, its enemies of the commonwealth so rich, its stupendous organization — for the misery of life! </span><b data-dcnode-id="2853"><span data-dcnode-id="2854" instrument_node="">Its contempt of simple pleasures which everyone could enjoy but for its folly? Its eyeless vulgarity which has destroyed art, the one certain solace of labour?</span></b><span data-dcnode-id="2852" instrument_node=""> All this I felt then as now, but I did not know why it was so. </span><b data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">The hope of the past times was gone, the struggles of mankind for many ages had produced nothing but this sordid, aimless, ugly confusion.</span></b><span data-dcnode-id="2849" instrument_node="">
</span><ul data-dcnode-id="2844"><li data-dcnode-id="2845"><i data-dcnode-id="2847"><span data-dcnode-id="2848" instrument_node="">Why I Am A Socialist</span></i><span data-dcnode-id="2846" instrument_node=""> (1884)</span></li></ul></li></ul><span data-dcnode-id="2841" instrument_node="">
</span><ul data-dcnode-id="2830"><li data-dcnode-id="2831"><span data-dcnode-id="2840" instrument_node="">...what I mean by Socialism is a condition of society in which there should be neither rich nor poor, neither master nor master's man, neither idle nor overworked, neither brain­slack brain workers, nor heart­sick hand workers, in a word, in which all men would be living in equality of condition, and would manage their affairs unwastefully, and with the full consciousness that harm to one would mean harm to all—the realisation at last of the meaning of the word </span><i data-dcnode-id="2838"><span data-dcnode-id="2839" instrument_node="">commonwealth</span></i><span data-dcnode-id="2837" instrument_node="">.
</span><ul data-dcnode-id="2832"><li data-dcnode-id="2833"><i data-dcnode-id="2835"><span data-dcnode-id="2836" instrument_node="">Why I Am A Socialist</span></i><span data-dcnode-id="2834" instrument_node=""> (1884)</span></li></ul></li></ul><span data-dcnode-id="2829" instrument_node="">
</span><ul data-dcnode-id="2815"><li data-dcnode-id="2816"><span data-dcnode-id="2828" instrument_node="">On the fall of </span><a class="extiw" data-dcnode-id="2826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chartism" title="w:Chartism"><span data-dcnode-id="2827" instrument_node="">Chartism</span></a><span data-dcnode-id="2825" instrument_node="">, the </span><a class="extiw" data-dcnode-id="2823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberal_Party_%28UK%29" title="w:Liberal Party (UK)"><span data-dcnode-id="2824" instrument_node="">Liberal party</span></a><span data-dcnode-id="2822" instrument_node="">—which as an engine of progress was a party without principles or definition, but has been used as a thoroughly adequate expression of English middle-class hypocrisy, cowardice, and short-sightedness—engrossed the whole of the political progressive movement in England, and dragged the working classes along with it, blind as they were to their own interests and the solidarity of labour.
</span><ul data-dcnode-id="2817"><li data-dcnode-id="2818"><i data-dcnode-id="2820"><span data-dcnode-id="2821" instrument_node="">Socialism: Its Growth &amp; Outcome</span></i><span data-dcnode-id="2819" instrument_node="">, co-authored with E. Belfort Bax (1893), pp. 182-183</span></li></ul></li></ul><span data-dcnode-id="2814" instrument_node="">
</span><ul data-dcnode-id="2803"><li data-dcnode-id="2804"><b data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">With the arrogance of youth, I determined to do no less than to transform the world with Beauty. If I have succeeded in some small way, if only in one small corner of the world, amongst the men and women I love, then I shall count myself blessed, and blessed, and blessed, and the work goes on.</span></b><span data-dcnode-id="2811" instrument_node="">
</span><ul data-dcnode-id="2805"><li data-dcnode-id="2806"><span data-dcnode-id="2810" instrument_node="">As quoted in </span><i data-dcnode-id="2808"><span data-dcnode-id="2809" instrument_node="">William Morris &amp; Red House</span></i><span data-dcnode-id="2807" instrument_node=""> (2005) by Jan Marsh, p. 65.</span></li></ul></li></ul><span data-dcnode-id="2802" instrument_node="">
</span><ul data-dcnode-id="2794"><li data-dcnode-id="2795"><span data-dcnode-id="2801" instrument_node="">Pray but one prayer for me 'twixt thy closed lips, </span><br data-dcnode-id="2800"><span data-dcnode-id="2799" instrument_node=""> Think but one thought of me up in the stars.

</span><ul data-dcnode-id="2477"><li data-dcnode-id="2478"><span data-dcnode-id="2479" instrument_node="">"The Hill of Venus".</span></li></ul></li></ul><span data-dcnode-id="2474" instrument_node="">
</span><h4 data-dcnode-id="2464"><span class="mw-headline" data-dcnode-id="2472" id="Apology"><span data-dcnode-id="2473" instrument_node="">Apology</span></span><span class="mw-editsection" data-dcnode-id="2465"><span class="mw-editsection-bracket" data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">[</span></span><a data-dcnode-id="2468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/w/index.php%3Ftitle%3DWilliam_Morris%26action%3Dedit%26section%3D3" title="Edit section: Apology"><span data-dcnode-id="2469" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2466"><span data-dcnode-id="2467" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2463" instrument_node="">
</span><ul data-dcnode-id="2417"><li data-dcnode-id="2418"><b data-dcnode-id="2419"><span data-dcnode-id="2462" instrument_node="">Of </span><a data-dcnode-id="2460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/Heaven" title="Heaven"><span data-dcnode-id="2461" instrument_node="">Heaven</span></a><span data-dcnode-id="2459" instrument_node=""> or </span><a data-dcnode-id="2457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/Hell" title="Hell"><span data-dcnode-id="2458" instrument_node="">Hell</span></a><span data-dcnode-id="2456" instrument_node=""> I have no </span><a data-dcnode-id="2454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/Power" title="Power"><span data-dcnode-id="2455" instrument_node="">power</span></a><span data-dcnode-id="2453" instrument_node=""> to </span><a class="mw-redirect" data-dcnode-id="2451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/Sing" title="Sing"><span data-dcnode-id="2452" instrument_node="">sing</span></a><span data-dcnode-id="2450" instrument_node="">, </span><br data-dcnode-id="2449"><span data-dcnode-id="2448" instrument_node=""> I cannot ease the burden of your fears, </span><br data-dcnode-id="2447"><span data-dcnode-id="2446" instrument_node=""> Or make quick-coming </span><a data-dcnode-id="2444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/Death" title="Death"><span data-dcnode-id="2445" instrument_node="">death</span></a><span data-dcnode-id="2443" instrument_node=""> a little thing, </span><br data-dcnode-id="2442"><span data-dcnode-id="2441" instrument_node=""> Or bring again the </span><a data-dcnode-id="2439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/Pleasure" title="Pleasure"><span data-dcnode-id="2440" instrument_node="">pleasure</span></a><span data-dcnode-id="2438" instrument_node=""> of past years, </span><br data-dcnode-id="2437"><span data-dcnode-id="2436" instrument_node=""> Nor for my </span><a data-dcnode-id="2434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/Words" title="Words"><span data-dcnode-id="2435" instrument_node="">words</span></a><span data-dcnode-id="2433" instrument_node=""> shall ye forget your </span><a data-dcnode-id="2431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/Tears" title="Tears"><span data-dcnode-id="2432" instrument_node="">tears</span></a><span data-dcnode-id="2430" instrument_node="">, </span><br data-dcnode-id="2429"><span data-dcnode-id="2428" instrument_node=""> Or </span><a data-dcnode-id="2426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/Hope" title="Hope"><span data-dcnode-id="2427" instrument_node="">hope</span></a><span data-dcnode-id="2425" instrument_node=""> again for aught that I can say, </span><br data-dcnode-id="2424"><span data-dcnode-id="2423" instrument_node=""> The idle </span><a class="mw-redirect" data-dcnode-id="2421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/Singer" title="Singer"><span data-dcnode-id="2422" instrument_node="">singer</span></a><span data-dcnode-id="2420" instrument_node=""> of an empty day.</span></b></li></ul><span data-dcnode-id="2416" instrument_node="">
</span><ul data-dcnode-id="2401"><li data-dcnode-id="2402"><span data-dcnode-id="2415" instrument_node="">The heavy trouble, the bewildering care </span><br data-dcnode-id="2414"><span data-dcnode-id="2413" instrument_node=""> That weighs us down who live and earn our bread, </span><br data-dcnode-id="2412"><span data-dcnode-id="2411" instrument_node=""> These idle verses have no power to bear; </span><br data-dcnode-id="2410"><span data-dcnode-id="2409" instrument_node=""> So let em sing of names rememberèd, </span><br data-dcnode-id="2408"><span data-dcnode-id="2407" instrument_node=""> Because they, living not, can ne'er be dead, </span><br data-dcnode-id="2406"><span data-dcnode-id="2405" instrument_node=""> Or long time take their memory quite away </span><br data-dcnode-id="2404"><span data-dcnode-id="2403" instrument_node=""> From us poor singers of an empty day.</span></li></ul><span data-dcnode-id="2400" instrument_node="">
</span><ul data-dcnode-id="2377"><li data-dcnode-id="2378"><b data-dcnode-id="2390"><span data-dcnode-id="2399" instrument_node="">Dreamer of </span><a data-dcnode-id="2397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/Dreams" title="Dreams"><span data-dcnode-id="2398" instrument_node="">dreams</span></a><span data-dcnode-id="2396" instrument_node="">, born out of my due </span><a data-dcnode-id="2394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/Time" title="Time"><span data-dcnode-id="2395" instrument_node="">time</span></a><span data-dcnode-id="2393" instrument_node="">, </span><br data-dcnode-id="2392"><span data-dcnode-id="2391" instrument_node=""> Why should I strive to set the crooked straight?</span></b><span data-dcnode-id="2389" instrument_node=""> </span><br data-dcnode-id="2388"><span data-dcnode-id="2387" instrument_node=""> Let it suffice me that my murmuring rhyme </span><br data-dcnode-id="2386"><span data-dcnode-id="2385" instrument_node=""> Beats with light wing against the ivory gate, </span><br data-dcnode-id="2384"><span data-dcnode-id="2383" instrument_node=""> Telling a tale not too importunate </span><br data-dcnode-id="2382"><span data-dcnode-id="2381" instrument_node=""> To those who in the sleepy region stay, </span><br data-dcnode-id="2380"><span data-dcnode-id="2379" instrument_node=""> Lulled by the singer of an empty day.</span></li></ul><span data-dcnode-id="2376" instrument_node="">
</span><ul data-dcnode-id="2345"><li data-dcnode-id="2346"><span data-dcnode-id="2375" instrument_node="">Folk say, a wizard to a northern king </span><br data-dcnode-id="2374"><span data-dcnode-id="2373" instrument_node=""> At Christmas-tide such wondrous things did show, </span><br data-dcnode-id="2372"><span data-dcnode-id="2371" instrument_node=""> That through one window men beheld the spring, </span><br data-dcnode-id="2370"><span data-dcnode-id="2369" instrument_node=""> And through another saw the summer glow, </span><br data-dcnode-id="2368"><span data-dcnode-id="2367" instrument_node=""> And through a third the fruited vines a-row, </span><br data-dcnode-id="2366"><span data-dcnode-id="2365" instrument_node=""> While still, unheard, but in its wonted way, </span><br data-dcnode-id="2364"><span data-dcnode-id="2363" instrument_node=""> Piped the drear wind of that December day. </span><br data-dcnode-id="2362"><span data-dcnode-id="2361" instrument_node=""> </span><b data-dcnode-id="2347"><span data-dcnode-id="2360" instrument_node="">So with this Earthly Paradise it is, </span><br data-dcnode-id="2359"><span data-dcnode-id="2358" instrument_node=""> If ye will read aright, and pardon me, </span><br data-dcnode-id="2357"><span data-dcnode-id="2356" instrument_node=""> Who strive to build a shadowy isle of bliss </span><br data-dcnode-id="2355"><span data-dcnode-id="2354" instrument_node=""> Midmost the beating of the steely sea, </span><br data-dcnode-id="2353"><span data-dcnode-id="2352" instrument_node=""> Where tossed about all hearts of men must be; </span><br data-dcnode-id="2351"><span data-dcnode-id="2350" instrument_node=""> Whose ravening monsters mighty men shall slay, </span><br data-dcnode-id="2349"><span data-dcnode-id="2348" instrument_node=""> Not the poor singer of an empty day.</span></b></li></ul><span data-dcnode-id="2344" instrument_node="">
</span><h4 data-dcnode-id="2334"><span class="mw-headline" data-dcnode-id="2342" id="The_Lady_of_the_Land"><span data-dcnode-id="2343" instrument_node="">The Lady of the Land</span></span><span class="mw-editsection" data-dcnode-id="2335"><span class="mw-editsection-bracket" data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">[</span></span><a data-dcnode-id="2338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/w/index.php%3Ftitle%3DWilliam_Morris%26action%3Dedit%26section%3D4" title="Edit section: The Lady of the Land"><span data-dcnode-id="2339" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2336"><span data-dcnode-id="2337" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2333" instrument_node="">
</span><ul data-dcnode-id="2316"><li data-dcnode-id="2317"><b data-dcnode-id="2327"><span data-dcnode-id="2332" instrument_node="">It happened once, some men of Italy </span><br data-dcnode-id="2331"><span data-dcnode-id="2330" instrument_node=""> Midst the Greek Islands went a sea-roving, </span><br data-dcnode-id="2329"><span data-dcnode-id="2328" instrument_node=""> And much good fortune had they on the sea</span></b><span data-dcnode-id="2326" instrument_node="">: </span><br data-dcnode-id="2325"><span data-dcnode-id="2324" instrument_node=""> Of many a man they had the ransoming, </span><br data-dcnode-id="2323"><span data-dcnode-id="2322" instrument_node=""> And many a chain they gat and goodly thing; </span><br data-dcnode-id="2321"><span data-dcnode-id="2320" instrument_node=""> And midst their voyage to an isle they came, </span><br data-dcnode-id="2319"><span data-dcnode-id="2318" instrument_node=""> Whereof my story keepeth not the name.</span></li></ul><span data-dcnode-id="2315" instrument_node="">
</span><ul data-dcnode-id="2302"><li data-dcnode-id="2303"><span data-dcnode-id="2314" instrument_node="">One was there who left all his friends behind; </span><br data-dcnode-id="2313"><span data-dcnode-id="2312" instrument_node=""> Who going inland ever more and more, </span><br data-dcnode-id="2311"><span data-dcnode-id="2310" instrument_node=""> And being left quite alone, at last did find </span><br data-dcnode-id="2309"><span data-dcnode-id="2308" instrument_node=""> A lonely valley sheltered from the wind, </span><br data-dcnode-id="2307"><span data-dcnode-id="2306" instrument_node=""> Wherein, amidst an ancient cypress wood, </span><br data-dcnode-id="2305"><span data-dcnode-id="2304" instrument_node=""> A long-deserted ruined castle stood.</span></li></ul><span data-dcnode-id="2301" instrument_node="">
</span><ul data-dcnode-id="2284"><li data-dcnode-id="2285"><span data-dcnode-id="2300" instrument_node="">Noble the house was, nor seemed built for war, </span><br data-dcnode-id="2299"><span data-dcnode-id="2298" instrument_node=""> But rather like the work of other days, </span><br data-dcnode-id="2297"><span data-dcnode-id="2296" instrument_node=""> When men, in better peace than now they are, </span><br data-dcnode-id="2295"><span data-dcnode-id="2294" instrument_node=""> Had leisure on the world around to gaze, </span><br data-dcnode-id="2293"><span data-dcnode-id="2292" instrument_node=""> And noted well the past times' changing ways; </span><br data-dcnode-id="2291"><span data-dcnode-id="2290" instrument_node=""> </span><b data-dcnode-id="2286"><span data-dcnode-id="2289" instrument_node="">And fair with sculptured stories it was wrought, </span><br data-dcnode-id="2288"><span data-dcnode-id="2287" instrument_node=""> By lapse of time unto dim ruin brought.</span></b></li></ul><span data-dcnode-id="2283" instrument_node="">
</span><ul data-dcnode-id="2247"><li data-dcnode-id="2248"><span data-dcnode-id="2282" instrument_node="">But taking note of these things, at the last </span><br data-dcnode-id="2281"><span data-dcnode-id="2280" instrument_node=""> The mariner beneath the gateway passed. </span><br data-dcnode-id="2279"><span data-dcnode-id="2278" instrument_node=""> And there a lovely cloistered court he found, </span><br data-dcnode-id="2277"><span data-dcnode-id="2276" instrument_node=""> A fountain in the mist o'erthrown and dry, </span><br data-dcnode-id="2275"><span data-dcnode-id="2274" instrument_node=""> And in the cloister briers twining round </span><br data-dcnode-id="2273"><span data-dcnode-id="2272" instrument_node=""> The slender shafts; the wondrous imagery </span><br data-dcnode-id="2271"><span data-dcnode-id="2270" instrument_node=""> Outworn by more than many years gone by; </span><br data-dcnode-id="2269"><span data-dcnode-id="2268" instrument_node=""> Because </span><b data-dcnode-id="2262"><span data-dcnode-id="2267" instrument_node="">the country people, in their fear </span><br data-dcnode-id="2266"><span data-dcnode-id="2265" instrument_node=""> Of wizardry, had wrought destruction here, </span><br data-dcnode-id="2264"><span data-dcnode-id="2263" instrument_node=""> And piteously these fair things had been maimed</span></b><span data-dcnode-id="2261" instrument_node="">; </span><br data-dcnode-id="2260"><span data-dcnode-id="2259" instrument_node=""> There stood great Jove, lacking his head of might; </span><br data-dcnode-id="2258"><span data-dcnode-id="2257" instrument_node=""> Here was the archer, swift Apollo, lamed; </span><br data-dcnode-id="2256"><span data-dcnode-id="2255" instrument_node=""> The shapely limbs of Venus hid from sight </span><br data-dcnode-id="2254"><span data-dcnode-id="2253" instrument_node=""> By weeds and shards; Diana's ankles light </span><br data-dcnode-id="2252"><span data-dcnode-id="2251" instrument_node=""> Bound with the cable of some coasting ship; </span><br data-dcnode-id="2250"><span data-dcnode-id="2249" instrument_node=""> And rusty nails through Helen's maddening lip.</span></li></ul><span data-dcnode-id="2246" instrument_node="">
</span><ul data-dcnode-id="2226"><li data-dcnode-id="2227"><span data-dcnode-id="2245" instrument_node="">And there he saw a door within the wall, </span><br data-dcnode-id="2244"><span data-dcnode-id="2243" instrument_node=""> Well-hinged, close shut; nor was there in that place </span><br data-dcnode-id="2242"><span data-dcnode-id="2241" instrument_node=""> Another on its hinges, therefore he </span><br data-dcnode-id="2240"><span data-dcnode-id="2239" instrument_node=""> Stood there and pondered for a little space </span><br data-dcnode-id="2238"><span data-dcnode-id="2237" instrument_node=""> And thought: "</span><b data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">Perchance some marvel I shall see</span></b><span data-dcnode-id="2234" instrument_node="">, </span><br data-dcnode-id="2233"><span data-dcnode-id="2232" instrument_node=""> For surely here some dweller there must be, </span><br data-dcnode-id="2231"><span data-dcnode-id="2230" instrument_node=""> Because this door seems whole and new and sound, </span><br data-dcnode-id="2229"><span data-dcnode-id="2228" instrument_node=""> While nought but ruin I can see around".</span></li></ul><span data-dcnode-id="2225" instrument_node="">
</span><ul data-dcnode-id="2216"><li data-dcnode-id="2217"><span data-dcnode-id="2224" instrument_node="">No pillager or wrecker had been there; </span><br data-dcnode-id="2223"><span data-dcnode-id="2222" instrument_node=""> It seemed that time had passed on otherwhere, </span><br data-dcnode-id="2221"><span data-dcnode-id="2220" instrument_node=""> Nor laid a finger on this hidden place </span><br data-dcnode-id="2219"><span data-dcnode-id="2218" instrument_node=""> Rich with the wealth of some forgotten race.</span></li></ul><span data-dcnode-id="2215" instrument_node="">
</span><ul data-dcnode-id="2200"><li data-dcnode-id="2201"><span data-dcnode-id="2214" instrument_node="">The wanderer trembled when he saw all this, </span><br data-dcnode-id="2213"><span data-dcnode-id="2212" instrument_node=""> Because he deemed by magic it was wrought; </span><br data-dcnode-id="2211"><span data-dcnode-id="2210" instrument_node=""> Yet in his heart a longing for some bliss </span><br data-dcnode-id="2209"><span data-dcnode-id="2208" instrument_node=""> Whereof the hard and changing world knows nought, </span><br data-dcnode-id="2207"><span data-dcnode-id="2206" instrument_node=""> Arose and urged him on, and dimmed the thought </span><br data-dcnode-id="2205"><span data-dcnode-id="2204" instrument_node=""> That there perchance some devil lurked to slay </span><br data-dcnode-id="2203"><span data-dcnode-id="2202" instrument_node=""> The heedless wanderer from the light of day</span></li></ul><span data-dcnode-id="2199" instrument_node="">
</span><ul data-dcnode-id="2182"><li data-dcnode-id="2183"><b data-dcnode-id="2195"><span data-dcnode-id="2198" instrument_node="">Upon the floor uncounted medals lay </span><br data-dcnode-id="2197"><span data-dcnode-id="2196" instrument_node=""> Like things of little value</span></b><span data-dcnode-id="2194" instrument_node="">; here and there </span><br data-dcnode-id="2193"><span data-dcnode-id="2192" instrument_node=""> Stood golden caldrons, that might well outweigh </span><br data-dcnode-id="2191"><span data-dcnode-id="2190" instrument_node=""> The biggest midst an emperor's copper-ware, </span><br data-dcnode-id="2189"><span data-dcnode-id="2188" instrument_node=""> And golden cups were set on tables fair, </span><br data-dcnode-id="2187"><span data-dcnode-id="2186" instrument_node=""> Themselves of gold; and in all hollow things </span><br data-dcnode-id="2185"><span data-dcnode-id="2184" instrument_node=""> Were stored great gems, worthy the crowns of kings.</span></li></ul><span data-dcnode-id="2181" instrument_node="">
</span><ul data-dcnode-id="2170"><li data-dcnode-id="2171"><span data-dcnode-id="2180" instrument_node="">And then the image, that well-nigh erased </span><br data-dcnode-id="2179"><span data-dcnode-id="2178" instrument_node=""> Over the castle-gate he did behold, </span><br data-dcnode-id="2177"><span data-dcnode-id="2176" instrument_node=""> Above a door well wrought in coloured gold </span><br data-dcnode-id="2175"><span data-dcnode-id="2174" instrument_node=""> Again he saw; a naked girl with wings </span><br data-dcnode-id="2173"><span data-dcnode-id="2172" instrument_node=""> Enfolded in a serpent's scaly rings.</span></li></ul><span data-dcnode-id="2169" instrument_node="">
</span><ul data-dcnode-id="2160"><li data-dcnode-id="2161"><span data-dcnode-id="2168" instrument_node="">There sat a woman, whose wet tresses rolled </span><br data-dcnode-id="2167"><span data-dcnode-id="2166" instrument_node=""> On to the floor in waves of gleaming gold, </span><br data-dcnode-id="2165"><span data-dcnode-id="2164" instrument_node=""> Cast back from such a form as, erewhile shown </span><br data-dcnode-id="2163"><span data-dcnode-id="2162" instrument_node=""> To one poor shepherd, lighted up Troy town.</span></li></ul><span data-dcnode-id="2159" instrument_node="">
</span><ul data-dcnode-id="2145"><li data-dcnode-id="2146"><span data-dcnode-id="2158" instrument_node="">"</span><b data-dcnode-id="2154"><span data-dcnode-id="2157" instrument_node="">Alas, alas! another day gone by, </span><br data-dcnode-id="2156"><span data-dcnode-id="2155" instrument_node=""> Another day and no soul come</span></b><span data-dcnode-id="2153" instrument_node="">," she said; </span><br data-dcnode-id="2152"><span data-dcnode-id="2151" instrument_node=""> "Another year, and still I am not dead!" </span><br data-dcnode-id="2150"><span data-dcnode-id="2149" instrument_node=""> And with that word once more her head she raised, </span><br data-dcnode-id="2148"><span data-dcnode-id="2147" instrument_node=""> And on the trembling man with great eyes gazed.</span></li></ul><span data-dcnode-id="2144" instrument_node="">
</span><ul data-dcnode-id="2113"><li data-dcnode-id="2114"><span data-dcnode-id="2143" instrument_node="">"What man art thou that thus hast wandered here, </span><br data-dcnode-id="2142"><span data-dcnode-id="2141" instrument_node=""> And found this lonely chamber where I dwell? </span><br data-dcnode-id="2140"><span data-dcnode-id="2139" instrument_node=""> </span><b data-dcnode-id="2133"><span data-dcnode-id="2138" instrument_node="">Beware, beware! for I have many a spell; </span><br data-dcnode-id="2137"><span data-dcnode-id="2136" instrument_node=""> If greed of power and gold have led thee on, </span><br data-dcnode-id="2135"><span data-dcnode-id="2134" instrument_node=""> Not lightly shall this untold wealth be won.</span></b><span data-dcnode-id="2132" instrument_node=""> </span><br data-dcnode-id="2131"><span data-dcnode-id="2130" instrument_node=""> But if thou com'st here knowing of my tale, </span><br data-dcnode-id="2129"><span data-dcnode-id="2128" instrument_node=""> In hope to bear away my body fair, </span><br data-dcnode-id="2127"><span data-dcnode-id="2126" instrument_node=""> </span><b data-dcnode-id="2116"><span data-dcnode-id="2125" instrument_node="">Stout must thine heart be, nor shall that avail </span><br data-dcnode-id="2124"><span data-dcnode-id="2123" instrument_node=""> If thou a wicked soul in thee dost bear; </span><br data-dcnode-id="2122"><span data-dcnode-id="2121" instrument_node=""> So once again I bid thee to beware, </span><br data-dcnode-id="2120"><span data-dcnode-id="2119" instrument_node=""> Because no base man things like this may see, </span><br data-dcnode-id="2118"><span data-dcnode-id="2117" instrument_node=""> And live thereafter long and happily.</span></b><span data-dcnode-id="2115" instrument_node="">"</span></li></ul><span data-dcnode-id="2112" instrument_node="">
</span><ul data-dcnode-id="2085"><li data-dcnode-id="2086"><span data-dcnode-id="2111" instrument_node="">From those thy words, I deem from some distress </span><br data-dcnode-id="2110"><span data-dcnode-id="2109" instrument_node=""> By deeds of mine thy dear life I might save; </span><br data-dcnode-id="2108"><span data-dcnode-id="2107" instrument_node=""> O then, delay not! if one ever gave </span><br data-dcnode-id="2106"><span data-dcnode-id="2105" instrument_node=""> His life to any, mine I give to thee; </span><br data-dcnode-id="2104"><span data-dcnode-id="2103" instrument_node=""> Come, tell me what the price of love must be? </span><br data-dcnode-id="2102"><span data-dcnode-id="2101" instrument_node=""> Swift death, to be with thee a day and night </span><br data-dcnode-id="2100"><span data-dcnode-id="2099" instrument_node=""> And with the earliest dawning to be slain? </span><br data-dcnode-id="2098"><span data-dcnode-id="2097" instrument_node=""> Or better, a long year of great delight, </span><br data-dcnode-id="2096"><span data-dcnode-id="2095" instrument_node=""> And many years of misery and pain? </span><br data-dcnode-id="2094"><span data-dcnode-id="2093" instrument_node=""> Or worse, and this poor hour for all my gain? </span><br data-dcnode-id="2092"><span data-dcnode-id="2091" instrument_node=""> </span><b data-dcnode-id="2087"><span data-dcnode-id="2090" instrument_node="">A sorry merchant am I on this day, </span><br data-dcnode-id="2089"><span data-dcnode-id="2088" instrument_node=""> E'en as thou willest so must I obey.</span></b></li></ul><span data-dcnode-id="2084" instrument_node="">
</span><ul data-dcnode-id="2069"><li data-dcnode-id="2070"><span data-dcnode-id="2083" instrument_node="">"God grant indeed thy words are not for nought! </span><br data-dcnode-id="2082"><span data-dcnode-id="2081" instrument_node=""> Then shalt thou save me, since for many a day </span><br data-dcnode-id="2080"><span data-dcnode-id="2079" instrument_node=""> To such a dreadful life I have been brought: </span><br data-dcnode-id="2078"><span data-dcnode-id="2077" instrument_node=""> Nor will I spare with all my heart to pay </span><br data-dcnode-id="2076"><span data-dcnode-id="2075" instrument_node=""> What man soever takes my grief away; </span><br data-dcnode-id="2074"><span data-dcnode-id="2073" instrument_node=""> Ah! I will love thee, if thou lovest me </span><br data-dcnode-id="2072"><span data-dcnode-id="2071" instrument_node=""> But well enough my saviour now to be.</span></li></ul><span data-dcnode-id="2068" instrument_node="">
</span><ul data-dcnode-id="2051"><li data-dcnode-id="2052"><span data-dcnode-id="2067" instrument_node="">A queen I was, what Gods I knew I loved, </span><br data-dcnode-id="2066"><span data-dcnode-id="2065" instrument_node=""> And nothing evil was there in my thought, </span><br data-dcnode-id="2064"><span data-dcnode-id="2063" instrument_node=""> And yet by love my wretched heart was moved </span><br data-dcnode-id="2062"><span data-dcnode-id="2061" instrument_node=""> Until to utter ruin I was brought! </span><br data-dcnode-id="2060"><span data-dcnode-id="2059" instrument_node=""> Alas! thou sayest our gods were vain and nought, </span><br data-dcnode-id="2058"><span data-dcnode-id="2057" instrument_node=""> </span><b data-dcnode-id="2053"><span data-dcnode-id="2056" instrument_node="">Wait, wait, till thou hast heard this tale of mine, </span><br data-dcnode-id="2055"><span data-dcnode-id="2054" instrument_node=""> Then shalt thou think them devilish or divine.</span></b></li></ul><span data-dcnode-id="2050" instrument_node="">
</span><ul data-dcnode-id="2037"><li data-dcnode-id="2038"><span data-dcnode-id="2049" instrument_node="">For Queen Diana did my body change </span><br data-dcnode-id="2048"><span data-dcnode-id="2047" instrument_node=""> Into a fork-tongued dragon flesh and fell, </span><br data-dcnode-id="2046"><span data-dcnode-id="2045" instrument_node=""> And through the island nightly do I range, </span><br data-dcnode-id="2044"><span data-dcnode-id="2043" instrument_node=""> Or in the green sea mate with monsters strange, </span><br data-dcnode-id="2042"><span data-dcnode-id="2041" instrument_node=""> When in the middle of the moonlit night </span><br data-dcnode-id="2040"><span data-dcnode-id="2039" instrument_node=""> The sleepy mariner I do affright.</span></li></ul><span data-dcnode-id="2036" instrument_node="">
</span><ul data-dcnode-id="2027"><li data-dcnode-id="2028"><span data-dcnode-id="2035" instrument_node="">Drowsy I lie, no folk at my command, </span><br data-dcnode-id="2034"><span data-dcnode-id="2033" instrument_node=""> Who once was called the Lady of the Land; </span><br data-dcnode-id="2032"><span data-dcnode-id="2031" instrument_node=""> Who might have bought a kingdom with a kiss, </span><br data-dcnode-id="2030"><span data-dcnode-id="2029" instrument_node=""> Yea, half the world with such a sight as this.</span></li></ul><span data-dcnode-id="2026" instrument_node="">
</span><ul data-dcnode-id="2011"><li data-dcnode-id="2012"><span data-dcnode-id="2025" instrument_node="">"Wilt thou not save me? once in every year </span><br data-dcnode-id="2024"><span data-dcnode-id="2023" instrument_node=""> This rightful form of mine that thou dost see </span><br data-dcnode-id="2022"><span data-dcnode-id="2021" instrument_node=""> By favour of the Goddess have I here </span><br data-dcnode-id="2020"><span data-dcnode-id="2019" instrument_node=""> From sunrise unto sunset given me, </span><br data-dcnode-id="2018"><span data-dcnode-id="2017" instrument_node=""> That some brave man may end my misery. </span><br data-dcnode-id="2016"><span data-dcnode-id="2015" instrument_node=""> And thou — art thou not brave? can thy heart fail, </span><br data-dcnode-id="2014"><span data-dcnode-id="2013" instrument_node=""> Whose eyes e'en now are weeping at my tale?</span></li></ul><span data-dcnode-id="2010" instrument_node="">
</span><ul data-dcnode-id="1951"><li data-dcnode-id="1952"><span data-dcnode-id="2009" instrument_node="">Then listen! when this day is overpast, </span><br data-dcnode-id="2008"><span data-dcnode-id="2007" instrument_node=""> A fearful monster shall I be again, </span><br data-dcnode-id="2006"><span data-dcnode-id="2005" instrument_node=""> And thou mayst be my saviour at the last, </span><br data-dcnode-id="2004"><span data-dcnode-id="2003" instrument_node=""> Unless, once more, thy words are nought and vain. </span><br data-dcnode-id="2002"><span data-dcnode-id="2001" instrument_node=""> If thou of love and sovereignty art fain, </span><br data-dcnode-id="2000"><span data-dcnode-id="1999" instrument_node=""> Come thou next morn, and when thou seest here </span><br data-dcnode-id="1998"><span data-dcnode-id="1997" instrument_node=""> A hideous dragon, have thereof no fear, </span><br data-dcnode-id="1996"><span data-dcnode-id="1995" instrument_node=""> But take the loathsome head up in thine hands </span><br data-dcnode-id="1994"><span data-dcnode-id="1993" instrument_node=""> And kiss it, and be master presently </span><br data-dcnode-id="1992"><span data-dcnode-id="1991" instrument_node=""> Of twice the wealth that is in all the lands </span><br data-dcnode-id="1990"><span data-dcnode-id="1989" instrument_node=""> From Cathay to the head of Italy; </span><br data-dcnode-id="1988"><span data-dcnode-id="1987" instrument_node=""> And master also, if it pleaseth thee, </span><br data-dcnode-id="1986"><span data-dcnode-id="1985" instrument_node=""> Of all thou praisest as so fresh and bright, </span><br data-dcnode-id="1984"><span data-dcnode-id="1983" instrument_node=""> Of what thou callest crown of all delight. </span><br data-dcnode-id="1982"><span data-dcnode-id="1981" instrument_node=""> Ah! with what joy then shall I see again </span><br data-dcnode-id="1980"><span data-dcnode-id="1979" instrument_node=""> The sunlight on the green grass and the trees, </span><br data-dcnode-id="1978"><span data-dcnode-id="1977" instrument_node=""> And hear the clatter of the summer rain, </span><br data-dcnode-id="1976"><span data-dcnode-id="1975" instrument_node=""> And see the joyous folk beyond the seas. </span><br data-dcnode-id="1974"><span data-dcnode-id="1973" instrument_node=""> Ah, me! to hold my child upon my knees </span><br data-dcnode-id="1972"><span data-dcnode-id="1971" instrument_node=""> After the weeping of unkindly tears </span><br data-dcnode-id="1970"><span data-dcnode-id="1969" instrument_node=""> And all the wrongs of these four hundred years. </span><br data-dcnode-id="1968"><span data-dcnode-id="1967" instrument_node=""> Go now, go quick! leave this grey heap of stone; </span><br data-dcnode-id="1966"><span data-dcnode-id="1965" instrument_node=""> And from thy glad heart think upon thy way, </span><br data-dcnode-id="1964"><span data-dcnode-id="1963" instrument_node=""> How I shall love thee — yea, love thee alone, </span><br data-dcnode-id="1962"><span data-dcnode-id="1961" instrument_node=""> That bringest me from dark death unto day; </span><br data-dcnode-id="1960"><span data-dcnode-id="1959" instrument_node=""> For this shall be thy wages and thy pay; </span><br data-dcnode-id="1958"><span data-dcnode-id="1957" instrument_node=""> </span><b data-dcnode-id="1953"><span data-dcnode-id="1956" instrument_node="">Unheard-of wealth, unheard-of love is near, </span><br data-dcnode-id="1955"><span data-dcnode-id="1954" instrument_node=""> If thou hast heart a little dread to bear.</span></b></li></ul><span data-dcnode-id="1950" instrument_node="">
</span><ul data-dcnode-id="1934"><li data-dcnode-id="1935"><span data-dcnode-id="1949" instrument_node="">"</span><b data-dcnode-id="1943"><span data-dcnode-id="1948" instrument_node="">Ah! wilt thou leave me then without one kiss, </span><br data-dcnode-id="1947"><span data-dcnode-id="1946" instrument_node=""> To slay the very seeds of fear and doubt, </span><br data-dcnode-id="1945"><span data-dcnode-id="1944" instrument_node=""> That glad to-morrow may bring certain bliss?</span></b><span data-dcnode-id="1942" instrument_node=""> </span><br data-dcnode-id="1941"><span data-dcnode-id="1940" instrument_node=""> Hast thou forgotten how love lives by this, </span><br data-dcnode-id="1939"><span data-dcnode-id="1938" instrument_node=""> The memory of some hopeful close embrace, </span><br data-dcnode-id="1937"><span data-dcnode-id="1936" instrument_node=""> Low whispered words within some lonely place?"</span></li></ul><span data-dcnode-id="1933" instrument_node="">
</span><ul data-dcnode-id="1915"><li data-dcnode-id="1916"><span data-dcnode-id="1932" instrument_node="">So on he went, and on the way he thought </span><br data-dcnode-id="1931"><span data-dcnode-id="1930" instrument_node=""> Of all the glorious things of yesterday, </span><br data-dcnode-id="1929"><span data-dcnode-id="1928" instrument_node=""> Nought of the price whereat they must be bought, </span><br data-dcnode-id="1927"><span data-dcnode-id="1926" instrument_node=""> But ever to himself did softly say </span><br data-dcnode-id="1925"><span data-dcnode-id="1924" instrument_node=""> "</span><b data-dcnode-id="1918"><span data-dcnode-id="1923" instrument_node="">No roaming now, my wars are passed away, </span><br data-dcnode-id="1922"><span data-dcnode-id="1921" instrument_node=""> No long dull days devoid of happiness, </span><br data-dcnode-id="1920"><span data-dcnode-id="1919" instrument_node=""> When such a love my yearning heart shall bless.</span></b><span data-dcnode-id="1917" instrument_node="">"</span></li></ul><span data-dcnode-id="1914" instrument_node="">
</span><ul data-dcnode-id="1877"><li data-dcnode-id="1878"><span data-dcnode-id="1913" instrument_node="">A fearful thing stood at the cloister's end </span><br data-dcnode-id="1912"><span data-dcnode-id="1911" instrument_node=""> And eyed him for a while, then 'gan to wend </span><br data-dcnode-id="1910"><span data-dcnode-id="1909" instrument_node=""> Adown the cloisters, and began again </span><br data-dcnode-id="1908"><span data-dcnode-id="1907" instrument_node=""> That rattling, and the moan like fiends in pain. </span><br data-dcnode-id="1906"><span data-dcnode-id="1905" instrument_node=""> And as it came on towards him, with its teeth </span><br data-dcnode-id="1904"><span data-dcnode-id="1903" instrument_node=""> The body of a slain goat did it tear, </span><br data-dcnode-id="1902"><span data-dcnode-id="1901" instrument_node=""> The blood whereof in its hot jaws did seethe, </span><br data-dcnode-id="1900"><span data-dcnode-id="1899" instrument_node=""> And on its tongue he saw the smoking hair; </span><br data-dcnode-id="1898"><span data-dcnode-id="1897" instrument_node=""> Then his heart sank, and standing trembling there, </span><br data-dcnode-id="1896"><span data-dcnode-id="1895" instrument_node=""> Throughout his mind wild thoughts and fearful ran: </span><br data-dcnode-id="1894"><span data-dcnode-id="1893" instrument_node=""> "Some fiend she was," he said, "the bane of man." </span><br data-dcnode-id="1892"><span data-dcnode-id="1891" instrument_node=""> Yet he abode her still, although his blood </span><br data-dcnode-id="1890"><span data-dcnode-id="1889" instrument_node=""> Curdled within him: the thing dropped the goat, </span><br data-dcnode-id="1888"><span data-dcnode-id="1887" instrument_node=""> And creeping on, came close to where he stood, </span><br data-dcnode-id="1886"><span data-dcnode-id="1885" instrument_node=""> And raised its head to him and wrinkled throat. </span><br data-dcnode-id="1884"><span data-dcnode-id="1883" instrument_node=""> Then he cried out and wildly at her smote, </span><br data-dcnode-id="1882"><span data-dcnode-id="1881" instrument_node=""> Shutting his eyes, and turned and from the place </span><br data-dcnode-id="1880"><span data-dcnode-id="1879" instrument_node=""> Ran swiftly, with a white and ghastly face.</span></li></ul><span data-dcnode-id="1876" instrument_node="">
</span><ul data-dcnode-id="1860"><li data-dcnode-id="1861"><b data-dcnode-id="1862"><span data-dcnode-id="1875" instrument_node="">Meanwhile the dragon, seeing him clean gone, </span><br data-dcnode-id="1874"><span data-dcnode-id="1873" instrument_node=""> Followed him not, but crying horribly, </span><br data-dcnode-id="1872"><span data-dcnode-id="1871" instrument_node=""> Caught up within her jaws a block of stone </span><br data-dcnode-id="1870"><span data-dcnode-id="1869" instrument_node=""> And ground it into powder, then turned she, </span><br data-dcnode-id="1868"><span data-dcnode-id="1867" instrument_node=""> With cries that folk could hear far out at sea, </span><br data-dcnode-id="1866"><span data-dcnode-id="1865" instrument_node=""> And reached the treasure set apart of old, </span><br data-dcnode-id="1864"><span data-dcnode-id="1863" instrument_node=""> To brood above the hidden heaps of gold.</span></b></li></ul><span data-dcnode-id="1859" instrument_node="">
</span><h3 data-dcnode-id="1846"><span data-dcnode-id="1858" id="Love_is_Enough_.281872.29"></span><span class="mw-headline" data-dcnode-id="1854" id="Love_is_Enough_(1872)"><i data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">Love is Enough</span></i><span data-dcnode-id="1855" instrument_node=""> (1872)</span></span><span class="mw-editsection" data-dcnode-id="1847"><span class="mw-editsection-bracket" data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">[</span></span><a data-dcnode-id="1850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/w/index.php%3Ftitle%3DWilliam_Morris%26action%3Dedit%26section%3D5" title="Edit section: Love is Enough (1872)"><span data-dcnode-id="1851" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1845" instrument_node="">
</span><dl data-dcnode-id="1836"><dd data-dcnode-id="1837"><small data-dcnode-id="1838"><i data-dcnode-id="1840"><span data-dcnode-id="1844" instrument_node="">Love is Enough; or, The Freeing of </span><a class="extiw" data-dcnode-id="1842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pharamond" title="w:Pharamond"><span data-dcnode-id="1843" instrument_node="">Pharamond </span></a><span data-dcnode-id="1841" instrument_node="">, A Morality</span></i><span data-dcnode-id="1839" instrument_node=""> (1872)</span></small></dd></dl><span data-dcnode-id="1835" instrument_node="">
</span><h4 data-dcnode-id="1825"><span class="mw-headline" data-dcnode-id="1833" id="Song_I_:_Though_the_World_Be_A-Waning"><span data-dcnode-id="1834" instrument_node="">Song I&nbsp;: Though the World Be A-Waning</span></span><span class="mw-editsection" data-dcnode-id="1826"><span class="mw-editsection-bracket" data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">[</span></span><a data-dcnode-id="1829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/w/index.php%3Ftitle%3DWilliam_Morris%26action%3Dedit%26section%3D6" title="Edit section: Song I&nbsp;: Though the World Be A-Waning"><span data-dcnode-id="1830" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1824" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1813"><div class="thumbinner" data-dcnode-id="1814" style="width:222px;"><a class="image" data-dcnode-id="1822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/File%3ADickseeRomeoandJuliet.jpg"><img alt="" class="thumbimage" data-dcnode-id="1823" data-file-height="1449" data-file-width="1000" decoding="async" height="319" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/a3/DickseeRomeoandJuliet.jpg/220px-DickseeRomeoandJuliet.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/a3/DickseeRomeoandJuliet.jpg/330px-DickseeRomeoandJuliet.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/a3/DickseeRomeoandJuliet.jpg/440px-DickseeRomeoandJuliet.jpg 2x" width="220"></a><span data-dcnode-id="1821" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1815"><div class="magnify" data-dcnode-id="1819"><a class="internal" data-dcnode-id="1820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/File%3ADickseeRomeoandJuliet.jpg" title="Enlarge"></a></div><span data-dcnode-id="1818" instrument_node="">Love is enough: though the World be a-waning </span><br data-dcnode-id="1817"><span data-dcnode-id="1816" instrument_node=""> And the woods have no voice but the voice of complaining...</span></div></div></div><span data-dcnode-id="1812" instrument_node="">
</span><ul data-dcnode-id="1789"><li data-dcnode-id="1790"><b data-dcnode-id="1808"><span data-dcnode-id="1811" instrument_node="">Love is enough: though the World be a-waning </span><br data-dcnode-id="1810"><span data-dcnode-id="1809" instrument_node=""> And the woods have no voice but the voice of complaining</span></b><span data-dcnode-id="1807" instrument_node="">, </span><br data-dcnode-id="1806"><span data-dcnode-id="1805" instrument_node=""> Though the sky be too dark for dim eyes to discover </span><br data-dcnode-id="1804"><span data-dcnode-id="1803" instrument_node=""> The gold-cups and daisies fair blooming thereunder, </span><br data-dcnode-id="1802"><span data-dcnode-id="1801" instrument_node=""> Though the hills be held shadows, and the sea a dark wonder, </span><br data-dcnode-id="1800"><span data-dcnode-id="1799" instrument_node=""> And this day draw a veil over all deeds passed over, </span><br data-dcnode-id="1798"><span data-dcnode-id="1797" instrument_node=""> </span><b data-dcnode-id="1791"><span data-dcnode-id="1796" instrument_node="">Yet their hands shall not tremble, their feet shall not falter; </span><br data-dcnode-id="1795"><span data-dcnode-id="1794" instrument_node=""> The void shall not weary, the fear shall not alter </span><br data-dcnode-id="1793"><span data-dcnode-id="1792" instrument_node=""> These lips and these eyes of the loved and the lover.</span></b></li></ul><span data-dcnode-id="1788" instrument_node="">
</span><h4 data-dcnode-id="1778"><span class="mw-headline" data-dcnode-id="1786" id="Song_II:_Have_No_Thought_for_Tomorrow"><span data-dcnode-id="1787" instrument_node="">Song II: Have No Thought for Tomorrow</span></span><span class="mw-editsection" data-dcnode-id="1779"><span class="mw-editsection-bracket" data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">[</span></span><a data-dcnode-id="1782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/w/index.php%3Ftitle%3DWilliam_Morris%26action%3Dedit%26section%3D7" title="Edit section: Song II: Have No Thought for Tomorrow"><span data-dcnode-id="1783" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1777" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1766"><div class="thumbinner" data-dcnode-id="1767" style="width:222px;"><a class="image" data-dcnode-id="1775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/File%3AMorris_Tapestry_Summer.jpg"><img alt="" class="thumbimage" data-dcnode-id="1776" data-file-height="1479" data-file-width="979" decoding="async" height="332" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Morris_Tapestry_Summer.jpg/220px-Morris_Tapestry_Summer.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Morris_Tapestry_Summer.jpg/330px-Morris_Tapestry_Summer.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Morris_Tapestry_Summer.jpg/440px-Morris_Tapestry_Summer.jpg 2x" width="220"></a><span data-dcnode-id="1774" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1768"><div class="magnify" data-dcnode-id="1772"><a class="internal" data-dcnode-id="1773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/File%3AMorris_Tapestry_Summer.jpg" title="Enlarge"></a></div><span data-dcnode-id="1771" instrument_node="">Your hearts make all plain in the best wise they would </span><br data-dcnode-id="1770"><span data-dcnode-id="1769" instrument_node=""> And the world ye thought waning is glorious and good...</span></div></div></div><span data-dcnode-id="1765" instrument_node="">
</span><ul data-dcnode-id="1756"><li data-dcnode-id="1757"><b data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">Love is enough: have no thought for to-morrow</span></b><span data-dcnode-id="1762" instrument_node=""> </span><br data-dcnode-id="1761"><span data-dcnode-id="1760" instrument_node=""> If ye lie down this even in rest from your pain, </span><br data-dcnode-id="1759"><span data-dcnode-id="1758" instrument_node=""> Ye who have paid for your bliss with great sorrow...</span></li></ul><span data-dcnode-id="1755" instrument_node="">
</span><ul data-dcnode-id="1746"><li data-dcnode-id="1747"><span data-dcnode-id="1754" instrument_node="">Till again shall the change come, and words your lips say not </span><br data-dcnode-id="1753"><span data-dcnode-id="1752" instrument_node=""> </span><b data-dcnode-id="1748"><span data-dcnode-id="1751" instrument_node="">Your hearts make all plain in the best wise they would </span><br data-dcnode-id="1750"><span data-dcnode-id="1749" instrument_node=""> And the world ye thought waning is glorious and good...</span></b></li></ul><span data-dcnode-id="1745" instrument_node="">
</span><ul data-dcnode-id="1739"><li data-dcnode-id="1740"><b data-dcnode-id="1741"><span data-dcnode-id="1744" instrument_node="">The wind is not helpless for any man's need, </span><br data-dcnode-id="1743"><span data-dcnode-id="1742" instrument_node=""> Nor falleth the rain but for thistle and weed.</span></b></li></ul><span data-dcnode-id="1738" instrument_node="">
</span><ul data-dcnode-id="1727"><li data-dcnode-id="1728"><span data-dcnode-id="1737" instrument_node="">O surely this morning all sorrow is hidden, </span><br data-dcnode-id="1736"><span data-dcnode-id="1735" instrument_node=""> All battle is hushed for this even at least; </span><br data-dcnode-id="1734"><span data-dcnode-id="1733" instrument_node=""> And no one this noontide may hunger, unbidden </span><br data-dcnode-id="1732"><span data-dcnode-id="1731" instrument_node=""> To the flowers and the singing and the joy of your feast </span><br data-dcnode-id="1730"><span data-dcnode-id="1729" instrument_node=""> Where silent ye sit midst the world's tale increased.</span></li></ul><span data-dcnode-id="1726" instrument_node="">
</span><ul data-dcnode-id="1713"><li data-dcnode-id="1714"><span data-dcnode-id="1725" instrument_node="">Lo, the lovers unloved that draw nigh for your blessing! </span><br data-dcnode-id="1724"><span data-dcnode-id="1723" instrument_node=""> For your tale makes the dreaming whereby yet they live </span><br data-dcnode-id="1722"><span data-dcnode-id="1721" instrument_node=""> The dreams of the day with their hopes of redressing, </span><br data-dcnode-id="1720"><span data-dcnode-id="1719" instrument_node=""> The dreams of the night with the kisses they give, </span><br data-dcnode-id="1718"><span data-dcnode-id="1717" instrument_node=""> </span><b data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">The dreams of the dawn wherein death and hope strive.</span></b></li></ul><span data-dcnode-id="1712" instrument_node="">
</span><ul data-dcnode-id="1701"><li data-dcnode-id="1702"><span data-dcnode-id="1711" instrument_node="">Ah, what shall we say then, but that earth threatened often </span><br data-dcnode-id="1710"><span data-dcnode-id="1709" instrument_node=""> Shall live on for ever that such things may be, </span><br data-dcnode-id="1708"><span data-dcnode-id="1707" instrument_node=""> That the dry seed shall quicken, the hard earth shall soften, </span><br data-dcnode-id="1706"><span data-dcnode-id="1705" instrument_node=""> And the spring-bearing birds flutter north o'er the sea, </span><br data-dcnode-id="1704"><span data-dcnode-id="1703" instrument_node=""> That earth's garden may bloom round my love's feet and me?</span></li></ul><span data-dcnode-id="1700" instrument_node="">
</span><h4 data-dcnode-id="1690"><span class="mw-headline" data-dcnode-id="1698" id="Song_III:_It_Grew_Up_Without_Heeding"><span data-dcnode-id="1699" instrument_node="">Song III: It Grew Up Without Heeding</span></span><span class="mw-editsection" data-dcnode-id="1691"><span class="mw-editsection-bracket" data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">[</span></span><a data-dcnode-id="1694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/w/index.php%3Ftitle%3DWilliam_Morris%26action%3Dedit%26section%3D8" title="Edit section: Song III: It Grew Up Without Heeding"><span data-dcnode-id="1695" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1689" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1672"><div class="thumbinner" data-dcnode-id="1673" style="width:222px;"><a class="image" data-dcnode-id="1687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/File%3AArtichoke_wallpaper_Morris_and_Co_J_H_Dearle_no_borders.jpg"><img alt="" class="thumbimage" data-dcnode-id="1688" data-file-height="340" data-file-width="255" decoding="async" height="293" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/09/Artichoke_wallpaper_Morris_and_Co_J_H_Dearle_no_borders.jpg/220px-Artichoke_wallpaper_Morris_and_Co_J_H_Dearle_no_borders.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/0/09/Artichoke_wallpaper_Morris_and_Co_J_H_Dearle_no_borders.jpg 1.5x" width="220"></a><span data-dcnode-id="1686" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1674"><div class="magnify" data-dcnode-id="1684"><a class="internal" data-dcnode-id="1685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/File%3AArtichoke_wallpaper_Morris_and_Co_J_H_Dearle_no_borders.jpg" title="Enlarge"></a></div><span data-dcnode-id="1683" instrument_node="">Love is enough: it grew up without heeding </span><br data-dcnode-id="1682"><span data-dcnode-id="1681" instrument_node=""> In the days when ye knew not its name nor its measure, </span><br data-dcnode-id="1680"><span data-dcnode-id="1679" instrument_node=""> And its leaflets untrodden by the light feet of pleasure </span><br data-dcnode-id="1678"><span data-dcnode-id="1677" instrument_node=""> Had no boast of the blossom, no sign of the seeding, </span><br data-dcnode-id="1676"><span data-dcnode-id="1675" instrument_node=""> As the morning and evening passed over its treasure.</span></div></div></div><span data-dcnode-id="1671" instrument_node="">
</span><ul data-dcnode-id="1658"><li data-dcnode-id="1659"><b data-dcnode-id="1667"><span data-dcnode-id="1670" instrument_node="">Love is enough: it grew up without heeding </span><br data-dcnode-id="1669"><span data-dcnode-id="1668" instrument_node=""> In the days when ye knew not its name nor its measure</span></b><span data-dcnode-id="1666" instrument_node="">, </span><br data-dcnode-id="1665"><span data-dcnode-id="1664" instrument_node=""> And its leaflets untrodden by the light feet of pleasure </span><br data-dcnode-id="1663"><span data-dcnode-id="1662" instrument_node=""> Had no boast of the blossom, no sign of the seeding, </span><br data-dcnode-id="1661"><span data-dcnode-id="1660" instrument_node=""> As the morning and evening passed over its treasure.</span></li></ul><span data-dcnode-id="1657" instrument_node="">
</span><ul data-dcnode-id="1646"><li data-dcnode-id="1647"><span data-dcnode-id="1656" instrument_node="">And what do ye say then? — That Spring long departed </span><br data-dcnode-id="1655"><span data-dcnode-id="1654" instrument_node=""> Has brought forth no child to the softness and showers; </span><br data-dcnode-id="1653"><span data-dcnode-id="1652" instrument_node=""> — That we slept and we dreamed through the Summer of flowers; </span><br data-dcnode-id="1651"><span data-dcnode-id="1650" instrument_node=""> We dreamed of the Winter, and waking dead-hearted </span><br data-dcnode-id="1649"><span data-dcnode-id="1648" instrument_node=""> Found Winter upon us and waste of dull hours.</span></li></ul><span data-dcnode-id="1645" instrument_node="">
</span><ul data-dcnode-id="1632"><li data-dcnode-id="1633"><span data-dcnode-id="1644" instrument_node="">Nay, Spring was o'er-happy and knew not the reason, </span><br data-dcnode-id="1643"><span data-dcnode-id="1642" instrument_node=""> And Summer dreamed sadly, for she thought all was ended </span><br data-dcnode-id="1641"><span data-dcnode-id="1640" instrument_node=""> In her fulness of wealth that might not be amended; </span><br data-dcnode-id="1639"><span data-dcnode-id="1638" instrument_node=""> But </span><b data-dcnode-id="1634"><span data-dcnode-id="1637" instrument_node="">this is the harvest and the garnering season, </span><br data-dcnode-id="1636"><span data-dcnode-id="1635" instrument_node=""> And the leaf and the blossom in the ripe fruit are blended.</span></b></li></ul><span data-dcnode-id="1631" instrument_node="">
</span><ul data-dcnode-id="1619"><li data-dcnode-id="1620"><b data-dcnode-id="1621"><span data-dcnode-id="1630" instrument_node="">It sprang without sowing, it grew without heeding, </span><br data-dcnode-id="1629"><span data-dcnode-id="1628" instrument_node=""> Ye knew not its name and ye knew not its measure, </span><br data-dcnode-id="1627"><span data-dcnode-id="1626" instrument_node=""> Ye noted it not mid your hope and your pleasure; </span><br data-dcnode-id="1625"><span data-dcnode-id="1624" instrument_node=""> There was pain in its blossom, despair in its seeding, </span><br data-dcnode-id="1623"><span data-dcnode-id="1622" instrument_node=""> But daylong your bosom now nurseth its treasure.</span></b></li></ul><span data-dcnode-id="1618" instrument_node="">
</span><h4 data-dcnode-id="1608"><span class="mw-headline" data-dcnode-id="1616" id="Song_IV:_Draw_Near_and_Behold_Me"><span data-dcnode-id="1617" instrument_node="">Song IV: Draw Near and Behold Me</span></span><span class="mw-editsection" data-dcnode-id="1609"><span class="mw-editsection-bracket" data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">[</span></span><a data-dcnode-id="1612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/w/index.php%3Ftitle%3DWilliam_Morris%26action%3Dedit%26section%3D9" title="Edit section: Song IV: Draw Near and Behold Me"><span data-dcnode-id="1613" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1607" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1596"><div class="thumbinner" data-dcnode-id="1597" style="width:222px;"><a class="image" data-dcnode-id="1605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/File%3AWoodpeckerTapestry-van-William-Morris.jpg"><img alt="" class="thumbimage" data-dcnode-id="1606" data-file-height="1327" data-file-width="636" decoding="async" height="459" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/45/WoodpeckerTapestry-van-William-Morris.jpg/220px-WoodpeckerTapestry-van-William-Morris.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/45/WoodpeckerTapestry-van-William-Morris.jpg/330px-WoodpeckerTapestry-van-William-Morris.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/45/WoodpeckerTapestry-van-William-Morris.jpg/440px-WoodpeckerTapestry-van-William-Morris.jpg 2x" width="220"></a><span data-dcnode-id="1604" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1598"><div class="magnify" data-dcnode-id="1602"><a class="internal" data-dcnode-id="1603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/File%3AWoodpeckerTapestry-van-William-Morris.jpg" title="Enlarge"></a></div><span data-dcnode-id="1601" instrument_node="">Ye know not how void is your hope and your living: </span><br data-dcnode-id="1600"><span data-dcnode-id="1599" instrument_node=""> Depart with your helping lest yet ye undo me!</span></div></div></div><span data-dcnode-id="1595" instrument_node="">
</span><ul data-dcnode-id="1578"><li data-dcnode-id="1579"><b data-dcnode-id="1591"><span data-dcnode-id="1594" instrument_node="">Love is enough: draw near and behold me </span><br data-dcnode-id="1593"><span data-dcnode-id="1592" instrument_node=""> Ye who pass by the way to your rest and your laughter</span></b><span data-dcnode-id="1590" instrument_node="">, </span><br data-dcnode-id="1589"><span data-dcnode-id="1588" instrument_node=""> And are full of the hope of the dawn coming after; </span><br data-dcnode-id="1587"><span data-dcnode-id="1586" instrument_node=""> For the strong of the world have bought me and sold me </span><br data-dcnode-id="1585"><span data-dcnode-id="1584" instrument_node=""> And my house is all wasted from threshold to rafter. </span><br data-dcnode-id="1583"><span data-dcnode-id="1582" instrument_node=""> — </span><b data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">Pass by me, and hearken, and think of me not!</span></b></li></ul><span data-dcnode-id="1577" instrument_node="">
</span><ul data-dcnode-id="1562"><li data-dcnode-id="1563"><b data-dcnode-id="1573"><span data-dcnode-id="1576" instrument_node="">Ye know not how void is your hope and your living: </span><br data-dcnode-id="1575"><span data-dcnode-id="1574" instrument_node=""> Depart with your helping lest yet ye undo me!</span></b><span data-dcnode-id="1572" instrument_node=""> </span><br data-dcnode-id="1571"><span data-dcnode-id="1570" instrument_node=""> Ye know not that at nightfall she draweth near to me, </span><br data-dcnode-id="1569"><span data-dcnode-id="1568" instrument_node=""> There is soft speech between us and words of forgiving </span><br data-dcnode-id="1567"><span data-dcnode-id="1566" instrument_node=""> Till in dead of the midnight her kisses thrill through me. </span><br data-dcnode-id="1565"><span data-dcnode-id="1564" instrument_node=""> — Pass by me and harken, and waken me not!</span></li></ul><span data-dcnode-id="1561" instrument_node="">
</span><ul data-dcnode-id="1546"><li data-dcnode-id="1547"><span data-dcnode-id="1560" instrument_node="">Wherewith will ye buy it, ye rich who behold me? </span><br data-dcnode-id="1559"><span data-dcnode-id="1558" instrument_node=""> Draw out from your coffers your rest and your laughter, </span><br data-dcnode-id="1557"><span data-dcnode-id="1556" instrument_node=""> And the fair gilded hope of the dawn coming after! </span><br data-dcnode-id="1555"><span data-dcnode-id="1554" instrument_node=""> Nay this I sell not, — though ye bought me and sold me, — </span><br data-dcnode-id="1553"><span data-dcnode-id="1552" instrument_node=""> For your house stored with such things from threshold to rafter. </span><br data-dcnode-id="1551"><span data-dcnode-id="1550" instrument_node=""> — </span><b data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">Pass by me, I hearken, and think of you not!</span></b></li></ul><span data-dcnode-id="1545" instrument_node="">
</span><h4 data-dcnode-id="1535"><span class="mw-headline" data-dcnode-id="1543" id="Song_V:_Through_the_Trouble_and_Tangle"><span data-dcnode-id="1544" instrument_node="">Song V: Through the Trouble and Tangle</span></span><span class="mw-editsection" data-dcnode-id="1536"><span class="mw-editsection-bracket" data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">[</span></span><a data-dcnode-id="1539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/w/index.php%3Ftitle%3DWilliam_Morris%26action%3Dedit%26section%3D10" title="Edit section: Song V: Through the Trouble and Tangle"><span data-dcnode-id="1540" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1534" instrument_node="">
</span><ul data-dcnode-id="1521"><li data-dcnode-id="1522"><b data-dcnode-id="1530"><span data-dcnode-id="1533" instrument_node="">Love is enough: through the trouble and tangle </span><br data-dcnode-id="1532"><span data-dcnode-id="1531" instrument_node=""> From yesterday's dawning to yesterday's night</span></b><span data-dcnode-id="1529" instrument_node=""> </span><br data-dcnode-id="1528"><span data-dcnode-id="1527" instrument_node=""> I sought through the vales where the prisoned winds wrangle, </span><br data-dcnode-id="1526"><span data-dcnode-id="1525" instrument_node=""> Till, wearied and bleeding, at end of the light </span><br data-dcnode-id="1524"><span data-dcnode-id="1523" instrument_node=""> I met him, and we wrestled, and great was my might.</span></li></ul><span data-dcnode-id="1520" instrument_node="">
</span><ul data-dcnode-id="1509"><li data-dcnode-id="1510"><span data-dcnode-id="1519" instrument_node="">And the Shadow of the Night and not Love was departed; </span><br data-dcnode-id="1518"><span data-dcnode-id="1517" instrument_node=""> I was sore, I was weary, yet Love lived to seek; </span><br data-dcnode-id="1516"><span data-dcnode-id="1515" instrument_node=""> So I scaled the dark mountains, and wandered sad-hearted </span><br data-dcnode-id="1514"><span data-dcnode-id="1513" instrument_node=""> Over wearier wastes, where e'en sunlight was bleak, </span><br data-dcnode-id="1512"><span data-dcnode-id="1511" instrument_node=""> With no rest of the night for my soul waxen weak.</span></li></ul><span data-dcnode-id="1508" instrument_node="">
</span><ul data-dcnode-id="1495"><li data-dcnode-id="1496"><span data-dcnode-id="1507" instrument_node="">With no rest of the night; for </span><b data-dcnode-id="1497"><span data-dcnode-id="1506" instrument_node="">I waked mid a story </span><br data-dcnode-id="1505"><span data-dcnode-id="1504" instrument_node=""> Of a land wherein Love is the light and the lord, </span><br data-dcnode-id="1503"><span data-dcnode-id="1502" instrument_node=""> Where my tale shall be heard, and my wounds gain a glory, </span><br data-dcnode-id="1501"><span data-dcnode-id="1500" instrument_node=""> And my tears be a treasure to add to the hoard </span><br data-dcnode-id="1499"><span data-dcnode-id="1498" instrument_node=""> Of pleasure laid up for his people's reward.</span></b></li></ul><span data-dcnode-id="1494" instrument_node="">
</span><h4 data-dcnode-id="1484"><span class="mw-headline" data-dcnode-id="1492" id="Song_VI:_Cherish_Life_that_Abideth"><span data-dcnode-id="1493" instrument_node="">Song VI: Cherish Life that Abideth</span></span><span class="mw-editsection" data-dcnode-id="1485"><span class="mw-editsection-bracket" data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">[</span></span><a data-dcnode-id="1488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/w/index.php%3Ftitle%3DWilliam_Morris%26action%3Dedit%26section%3D11" title="Edit section: Song VI: Cherish Life that Abideth"><span data-dcnode-id="1489" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1483" instrument_node="">
