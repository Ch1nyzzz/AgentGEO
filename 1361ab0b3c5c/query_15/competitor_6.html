</span><div class="a-expander-collapsed-height a-row a-expander-container a-spacing-base a-expander-partial-collapse-container" data-a-expander-collapsed-height="140" data-a-expander-name="book_description_expander" data-dcnode-id="3857" style="max-height: none; height: 140px;"><span data-dcnode-id="3904" instrument_node=""> </span><div aria-expanded="false" class="a-expander-content a-expander-partial-collapse-content" data-dcnode-id="3866" style="padding-bottom: 20px;"><span data-dcnode-id="3903" instrument_node=""> </span><p data-dcnode-id="3868"><span class="a-text-bold" data-dcnode-id="3901"><span data-dcnode-id="3902" instrument_node="">WINNER OF THE 2002 EUDORA WELTY PRIZE</span></span><span data-dcnode-id="3888"><br data-dcnode-id="3900"><br data-dcnode-id="3899"><span data-dcnode-id="3898" instrument_node="">For a biographer Shelby Foote is a famously reluctant subject. In writing this biography, however, C. Stuart Chapman gained valuable access through interviews and shared correspondence, an advantage Foote rarely has granted to others.</span><br data-dcnode-id="3897"><br data-dcnode-id="3896"><span data-dcnode-id="3895" instrument_node=""> Born into Mississippi Delta gentry in 1916, Foote has engaged in a lifelong struggle with the realities behind his persona, the classic image of the southern gentleman. His polished civil graces mask a conflict deep within. Foote's beloved South is a changing region, and even progressive change, of which Foote approves, can be unsettling. In letters and interviews, and in his writings, he often waxes nostalgic as he grapples to recover the grace of an earlier time, particularly the era of the Civil War. Indeed, Chapman reveals that the whole of Foote's novels and historical narratives serves as a refuge from deeply ambiguous feelings. As Foote has struggled to understand the radical shifts brought to his native land by modernization and the region's integration into the nation, his personal history has been clouded by ideological conflict.</span><br data-dcnode-id="3894"><br data-dcnode-id="3893"><span data-dcnode-id="3892" instrument_node=""> This biography shows him pining for aristocratic, antebellum culture while rejecting the practices that made possible the injustices of that era. Privately and vehemently, Foote opposed George C. Wallace's and Ross Barnett's untenable segregationist stance. Yet publicly during the 1960s and '70s he skirted the explosive race issue.</span><br data-dcnode-id="3891"><br data-dcnode-id="3890"><span data-dcnode-id="3889" instrument_node=""> Foote is best known for his dazzling and definitive </span></span><span class="a-text-italic" data-dcnode-id="3886"><span data-dcnode-id="3887" instrument_node="">The Civil War: A Narrative</span></span><span data-dcnode-id="3884"><span data-dcnode-id="3885" instrument_node="">. Written from 1954 to 1974, the three-volume opus was published during years when the South exploded with racial and political tensions and was forever changed. This biography recognizes that nowhere are Foote's personal conflicts, ambivalence, and outright contradictions more on display than in his fiction. Although </span></span><span class="a-text-italic" data-dcnode-id="3882"><span data-dcnode-id="3883" instrument_node="">Love in a Dry Season</span></span><span data-dcnode-id="3880"><span data-dcnode-id="3881" instrument_node="">, </span></span><span class="a-text-italic" data-dcnode-id="3878"><span data-dcnode-id="3879" instrument_node="">Jordan County</span></span><span data-dcnode-id="3876"><span data-dcnode-id="3877" instrument_node="">, and </span></span><span class="a-text-italic" data-dcnode-id="3874"><span data-dcnode-id="3875" instrument_node="">September, September</span></span><span data-dcnode-id="3869"><span data-dcnode-id="3873" instrument_node=""> are set in the contemporary South, they reach no firm social resolutions. Instead, they entertain, dramatize, and come to grips with the social, gender, and racial barriers of the southern life he experienced.</span><br data-dcnode-id="3872"><br data-dcnode-id="3871"><span data-dcnode-id="3870" instrument_node=""> While showing how Foote's guarded embrace of the South's past and present characterizes his identity as a thinker, a historian, and a writer of fiction, Chapman discloses Foote's reluctance to address burning contemporary issues and his veiled desire to recall more gracious times.</span></span></p><span data-dcnode-id="3867" instrument_node=""> </span></div><span data-dcnode-id="3865" instrument_node=""> </span><div class="a-expander-header a-expander-partial-collapse-header" data-dcnode-id="3859" style="opacity: 1; display: block;"><div class="a-expander-content-fade" data-dcnode-id="3864"></div><a aria-expanded="false" class="a-declarative" data-a-expander-toggle="{&quot;allowLinkDefault&quot;:true, &quot;expand_prompt&quot;:&quot;Read more&quot;, &quot;collapse_prompt&quot;:&quot;Read less&quot;}" data-action="a-expander-toggle" data-csa-c-func-deps="aui-da-a-expander-toggle" data-csa-c-type="widget" data-csa-interaction-events="click" data-dcnode-id="3860" href="javascript:void(0)" role="button"><i class="a-icon a-icon-extender-expand" data-dcnode-id="3863"></i><span class="a-expander-prompt" data-dcnode-id="3861"><span data-dcnode-id="3862" instrument_node="">Read more</span></span></a></div><span data-dcnode-id="3858" instrument_node=""> </span></div><span data-dcnode-id="3856" instrument_node=""> </span></div><span data-dcnode-id="3854" instrument_node="">

</span><div class="a-divider a-divider-section" data-dcnode-id="2979"><div class="a-divider-inner" data-dcnode-id="2980"></div></div><span data-dcnode-id="2978" instrument_node=""> </span><h2 data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node=""> Editorial Reviews </span></h2><span data-dcnode-id="2975" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-base" data-dcnode-id="2838"><span data-dcnode-id="2974" instrument_node=""> </span><div class="a-row a-expander-container a-expander-extend-container" data-dcnode-id="2840"><span data-dcnode-id="2973" instrument_node=""> </span><h3 data-dcnode-id="2970"><span data-dcnode-id="2971"><span data-dcnode-id="2972" instrument_node="">Review</span></span></h3><span data-dcnode-id="2969" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-small" data-dcnode-id="2925"><span data-dcnode-id="2968" instrument_node=""> </span><span data-dcnode-id="2966"><span data-dcnode-id="2967" instrument_node="">Chapman's . . . colorful biography gives a frank, full-bodied portrait of the man and agile examination of Foote's development as a writer. ― </span></span><span class="a-text-italic" data-dcnode-id="2964"><span data-dcnode-id="2965" instrument_node="">The New York Times</span></span><span data-dcnode-id="2960"><br data-dcnode-id="2963"><br data-dcnode-id="2962"><span data-dcnode-id="2961" instrument_node="">It is indeed a literary biography in which the processes and politics of writing are paramount. ― </span></span><span class="a-text-italic" data-dcnode-id="2958"><span data-dcnode-id="2959" instrument_node="">The Washington Post</span></span><span data-dcnode-id="2954"><br data-dcnode-id="2957"><br data-dcnode-id="2956"><span data-dcnode-id="2955" instrument_node="">Chapman see[s] a man torn between his fondness of southern gentility while aware of how women and blacks suffered. ― </span></span><span class="a-text-italic" data-dcnode-id="2952"><span data-dcnode-id="2953" instrument_node="">Memphis Business Journal</span></span><span data-dcnode-id="2948"><br data-dcnode-id="2951"><br data-dcnode-id="2950"><span data-dcnode-id="2949" instrument_node="">A portrait of Foote that is honest and more troubling than . . . hero-worshippers . . . or Foote himself would have us believe. ― </span></span><span class="a-text-italic" data-dcnode-id="2946"><span data-dcnode-id="2947" instrument_node="">Memphis Magazine</span></span><span data-dcnode-id="2942"><br data-dcnode-id="2945"><br data-dcnode-id="2944"><span data-dcnode-id="2943" instrument_node="">A fuller, complex portrait than we have had before ― </span></span><span class="a-text-italic" data-dcnode-id="2940"><span data-dcnode-id="2941" instrument_node="">The State</span></span><span data-dcnode-id="2937"><br data-dcnode-id="2939"><br data-dcnode-id="2938"></span><span class="a-text-italic" data-dcnode-id="2935"><span data-dcnode-id="2936" instrument_node="">Shelby Foote: A Writer’s Life</span></span><span data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node=""> gives us a commendable profile of the man who wrote the massive </span></span><span class="a-text-italic" data-dcnode-id="2931"><span data-dcnode-id="2932" instrument_node="">The Civil War: A Narrative </span></span><span data-dcnode-id="2929"><span data-dcnode-id="2930" instrument_node="">and who became a cultural icon―the prototype of a southern gentleman―by his appearances in Ken Burns’s PBS series on the Civil War. -- Jeff Mimick ― </span></span><span class="a-text-italic" data-dcnode-id="2927"><span data-dcnode-id="2928" instrument_node="">Smoky Mountain News</span></span><span data-dcnode-id="2926" instrument_node=""> </span></div><span data-dcnode-id="2924" instrument_node=""> </span><h3 data-dcnode-id="2921"><span data-dcnode-id="2922"><span data-dcnode-id="2923" instrument_node="">Review</span></span></h3><span data-dcnode-id="2920" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-small" data-dcnode-id="2915"><span data-dcnode-id="2919" instrument_node=""> </span><span data-dcnode-id="2917"><span data-dcnode-id="2918" instrument_node="">Shelby Foote is an American treasure, and this wonderful biography captures the complexities and struggles of the novelist who gave up most of his adult life to creating one of our greatest works of nonfiction. Bravo. -- Ken Burns</span></span><span data-dcnode-id="2916" instrument_node=""> </span></div><span data-dcnode-id="2914" instrument_node=""> </span><div aria-expanded="false" class="a-expander-content a-expander-extend-content" data-dcnode-id="2850" style="display:none"><span data-dcnode-id="2913" instrument_node=""> </span><h3 data-dcnode-id="2910"><span data-dcnode-id="2911"><span data-dcnode-id="2912" instrument_node="">Book Description</span></span></h3><span data-dcnode-id="2909" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-small" data-dcnode-id="2904"><span data-dcnode-id="2908" instrument_node=""> </span><span data-dcnode-id="2906"><span data-dcnode-id="2907" instrument_node="">Shelby Foote is an American treasure, and this wonderful biography captures the complexities and struggles of the novelist who gave up most of his adult life to creating one of our greatest works of nonfiction. Bravo. -- Ken Burns</span></span><span data-dcnode-id="2905" instrument_node=""> </span></div><span data-dcnode-id="2903" instrument_node=""> </span><h3 data-dcnode-id="2900"><span data-dcnode-id="2901"><span data-dcnode-id="2902" instrument_node="">From the Inside Flap</span></span></h3><span data-dcnode-id="2899" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-small" data-dcnode-id="2894"><span data-dcnode-id="2898" instrument_node=""> </span><span data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node="">A biography that plumbs the ambiguous life of the gentlemanly novelist and historian</span></span><span data-dcnode-id="2895" instrument_node </span><span data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">Well written, interesting, enlightening</span></span><span data-dcnode-id="2089" instrument_node="">
</span></a></div><span class="a-size-base a-color-secondary review-date" data-dcnode-id="2085" data-hook="review-date"><span data-dcnode-id="2086" instrument_node="">Reviewed in the United States on February 27, 2008</span></span><div class="a-row a-spacing-mini review-data review-format-strip" data-dcnode-id="2082"><span class="a-size-mini a-color-state a-text-bold" data-dcnode-id="2083" data-hook="avp-badge-linkless"><span data-dcnode-id="2084" instrument_node="">Verified Purchase</span></span></div><div class="a-row a-spacing-small review-data" data-dcnode-id="2050"><span class="a-size-base review-text" data-dcnode-id="2051" data-hook="review-body"><div class="a-expander-collapsed-height a-row a-expander-container a-expander-partial-collapse-container" data-a-expander-collapsed-height="300" data-a-expander-name="review_text_read_more" data-dcnode-id="2052" style="max-height: none; height: 300px;"><div aria-expanded="false" class="a-expander-content reviewText review-text-content a-expander-partial-collapse-content" data-dcnode-id="2059" data-hook="review-collapsed" style="padding-bottom: 20px;"><span data-dcnode-id="2081" instrument_node="">
</span><span data-dcnode-id="2061"><span data-dcnode-id="2080" instrument_node="">
  Confession - I have been a Shelby Foote fan since reading his novel "Shiloh". I was first exposed to his "Civil War: A Narrative" trilogy while in college. Volume three came was released fall of my senior year. I have read the first two volumes and am about 125 pages into volume three at this writing.</span><br data-dcnode-id="2079"><br data-dcnode-id="2078"><span data-dcnode-id="2077" instrument_node="">C. Stuart Chapman has written an enlightening and well-written book that conveys an impartial message. His writing lets you know he is a Foote admirer.</span><br data-dcnode-id="2076"><br data-dcnode-id="2075"><span data-dcnode-id="2074" instrument_node="">What I like best about the book is it tells a good story. Foote came from Greenville, Mississippi. His family was a wealthy, plantation owning family who had lost their money before his birth. His mother was Jewish - a Rosenstock. His boyhood and lifelong friend was Walker Percy, who later became a celebrated novelist. Percy's influence and friendship cover most of Foote life. Percy Walker died in the late 1980's.</span><br data-dcnode-id="2073"><br data-dcnode-id="2072"><span data-dcnode-id="2071" instrument_node="">Shelby Foote had his faults. They were clearly pointed out by Chapman. They included his womanizing, dropping out of the University of North Carolina, getting a court martial and booted out of the Army with initially a dishonorable discharge, later commuted to a "other than honorable" discharge. He has two failed marriages. His getting future wife number two pregnant before marriage. It took an intellectual woman who was a classmate of Jackie Kennedy to finally tame Shelby Foote. She abandoned her medical doctor first husband and two children to marry and become Mrs. Shelby Foote number three. He exaggerated the depth of his friendship with the man he idolized, Nobel winner William Faulkner. Percy Walker frequently floated a loan to Foote in the early years which allowed him to keep writing.</span><br data-dcnode-id="2070"><br data-dcnode-id="2069"><span data-dcnode-id="2068" instrument_node="">I found it interesting that when Foote moved to Memphis he lived in the inner city and did not seem to have issue living in a transitional neighborhood. Foote contempt for academics was interesting. I felt at times he wished he was one, but he knew he lacked the sheepskin credential.</span><br data-dcnode-id="2067"><br data-dcnode-id="2066"><span data-dcnode-id="2065" instrument_node="">The roll of the Ken Burns series on "The Civil War" to make Foote a national name, providing the fame he longed for, and to make him financially solvent with the record sales of his books after the airing of the PBS mini-series was enlightening. A star was born.</span><br data-dcnode-id="2064"><br data-dcnode-id="2063"><span data-dcnode-id="2062" instrument_node="">This is a good book, well written, interesting, and won the 2002 Eudora Welty Prize. The author C. Stuart Chapman received his Ph.D. from Boston University, where he studied American literature with an emphasis in Southern literature. He earned an M.A. at the University of Georgia in 1994, where his thesis was "Locating the Other in New Orleans: Southern Post-World War I Cultural Representation in William Faulkner's Absalom, Absalom!, Katherine Anne Porter's Old Mortality, and Tennessee Williams' A Streetcar Named Desire." His doctoral dissertation was a biography of Shelby Foote. His undergraduate work was at Rhodes College in Memphis. Read and reviewed by Jimmie A. Kepler in February 2008.

</span><span data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">The Life That Late He Led</span></span><span data-dcnode-id="1592" instrument_node="">

</span><span data-dcnode-id="1578"><span data-dcnode-id="1585" instrument_node="">
  I have to disagree with the earlier, anonymous reviewer who says this book is drivel.  I found it an enlightening and well-written book that delivers a non-partisan message, but it is written by someone who truly admires Shelby Foote.  What's wrong with that?  Foote is a wonderful historian, even though as many have said his volumes on the Civil War tell the story almost entirely as one of big battles and great men.</span><br data-dcnode-id="1584"><br data-dcnode-id="1583"><span data-dcnode-id="1582" instrument_node="">Chapman does not let his reverence for Foote's writings get in the way of telling a good story.  And what a story!  He came from the long-ago vanished South of the aristocrats, and along with his boyhood friend Walker Percy, who later became a celebrated novelist, the two of them tracked the changes in Southern society in their novels and other writings.  Foote had his faults too, as Chapman notes ruefully: he exaggerated the depth of his friendship with the man he idolized, Nobel winner William Faulkner, who lived but a hundred miles away; he was a womanizer who just couldn't keep it in his pants; his relationship with his daughter Margaret, who became attached to the Seattle rock guitarist Jimi Hendrix, was troubled to the point that he denied they were related; and his position on race relations wasn't a very activist one.  Even his relationship with Percy was strained by the two men's seesawing careers and who was up. who was down, at any given moment.  The Ken Burns thing happened at exactly the right time for Shelby Foote, and from now on, people would no longer be confusing him with Horton Foote--no relation.</span><br data-dcnode-id="1581"><br data-dcnode-id="1580"><span data-dcnode-id="1579" instrument_node="">Chapman's "LIFE" makes me curious to see the publication of "TWO GATES TO THE CITY," the novel on which Shelby Foote again and again dashed his hopes, an unconquerable manuscript that was worth its weight in tears.  Maybe someday we will see some version of it.  Until then, we have all his other books to read and re-read at leisure.
