</span><p data-dcnode-id="3779"><b data-dcnode-id="3819"><span data-dcnode-id="3820" instrument_node="">Glenn Edgar Morris</span></b><span data-dcnode-id="3818" instrument_node=""> (June 18, 1912 – January 31, 1974) was a </span><a class="mw-redirect" data-dcnode-id="3816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_of_America" title="United States of America"><span data-dcnode-id="3817" instrument_node="">U.S.</span></a><span data-dcnode-id="3815" instrument_node=""> </span><a data-dcnode-id="3813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Track_and_field" title="Track and field"><span data-dcnode-id="3814" instrument_node="">track and field</span></a><span data-dcnode-id="3812" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="3810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Athletics_%28sport%29" title="Athletics (sport)"><span data-dcnode-id="3811" instrument_node="">athlete</span></a><span data-dcnode-id="3809" instrument_node="">. He won a </span><a data-dcnode-id="3807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gold_medal" title="Gold medal"><span data-dcnode-id="3808" instrument_node="">gold medal</span></a><span data-dcnode-id="3806" instrument_node=""> in the Olympic </span><a data-dcnode-id="3804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Decathlon" title="Decathlon"><span data-dcnode-id="3805" instrument_node="">decathlon</span></a><span data-dcnode-id="3803" instrument_node=""> in </span><a data-dcnode-id="3801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Athletics_at_the_1936_Summer_Olympics_%25E2%2580%2593_Men%27s_decathlon" title="Athletics at the 1936 Summer Olympics – Men's decathlon"><span data-dcnode-id="3802" instrument_node="">1936</span></a><span data-dcnode-id="3800" instrument_node="">, setting new world and Olympic records.</span><sup class="reference" data-dcnode-id="3797" id="cite_ref-doria_3-0"><a data-dcnode-id="3798" href="#cite_note-doria-3"><span data-dcnode-id="3799" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3796" instrument_node=""> He attended Colorado A&amp;M 
— now known as </span><a data-dcnode-id="3794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colorado_State_University" title="Colorado State University"><span data-dcnode-id="3795" instrument_node="">Colorado State University</span></a><span data-dcnode-id="3793" instrument_node=""> — and played </span><a data-dcnode-id="3791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_football" title="American football"><span data-dcnode-id="3792" instrument_node="">football</span></a><span data-dcnode-id="3790" instrument_node=""> as well as </span><a data-dcnode-id="3788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Track_and_field" title="Track and field"><span data-dcnode-id="3789" instrument_node="">track and field</span></a><span data-dcnode-id="3787" instrument_node="">. He was also an occasional actor, he portrayed </span><a data-dcnode-id="3785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tarzan" title="Tarzan"><span data-dcnode-id="3786" instrument_node="">Tarzan</span></a><span data-dcnode-id="3784" instrument_node=""> in </span><i data-dcnode-id="3781"><a data-dcnode-id="3782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tarzan%2527s_Revenge" title="Tarzan's Revenge"><span data-dcnode-id="3783" instrument_node="">Tarzan's Revenge</span></a></i><span data-dcnode-id="3780" instrument_node="">.

</span><li class="toclevel-1 tocsection-6" data-dcnode-id="3723"><a data-dcnode-id="3724" href="#External_links"><span class="tocnumber" data-dcnode-id="3728"><span data-dcnode-id="3729" instrument_node="">6</span></span><span data-dcnode-id="3727" instrument_node=""> </span><span class="toctext" data-dcnode-id="3725"><span data-dcnode-id="3726" instrument_node="">External links</span></span></a></li><span data-dcnode-id="3722" instrument_node="">

</span></div><span data-dcnode-id="3718" instrument_node="">
</span><h2 data-dcnode-id="3708"><span class="mw-headline" data-dcnode-id="3716" id="Biography"><span data-dcnode-id="3717" instrument_node="">Biography</span></span><span class="mw-editsection" data-dcnode-id="3709"><span class="mw-editsection-bracket" data-dcnode-id="3714"><span data-dcnode-id="3715" instrument_node="">[</span></span><a data-dcnode-id="3712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGlenn_Morris%26action%3Dedit%26section%3D1" title="Edit section: Biography"><span data-dcnode-id="3713" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3710"><span data-dcnode-id="3711" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3707" instrument_node="">
</span><p data-dcnode-id="3685"><span data-dcnode-id="3706" instrument_node="">Born on his family's homestead farm near </span><a data-dcnode-id="3704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Simla%2C_Colorado" title="Simla, Colorado"><span data-dcnode-id="3705" instrument_node="">Simla, Colorado</span></a><span data-dcnode-id="3703" instrument_node="">, Morris was the second of seven children. A natural athlete whose record in the 220-yard (201&nbsp;m) hurdles stood for forty years at his high school, Morris entered Colorado Agricultural College (now </span><a data-dcnode-id="3701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colorado_State_University" title="Colorado State University"><span data-dcnode-id="3702" instrument_node="">Colorado State University</span></a><span data-dcnode-id="3700" instrument_node="">) at </span><a data-dcnode-id="3698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fort_Collins%2C_Colorado" title="Fort Collins, Colorado"><span data-dcnode-id="3699" instrument_node="">Fort Collins</span></a><span data-dcnode-id="3697" instrument_node=""> in 1930, and became a star athlete, excelling in several sports and being named </span><a data-dcnode-id="3695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/All-America" title="All-America"><span data-dcnode-id="3696" instrument_node="">All-American</span></a><span data-dcnode-id="3694" instrument_node=""> in track and field. Working as an assistant coach and automobile salesman after graduation in 1934 (with degrees in economics and sociology),</span><sup class="reference" data-dcnode-id="3691" id="cite_ref-r2_4-0"><a data-dcnode-id="3692" href="#cite_note-r2-4"><span data-dcnode-id="3693" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3690" instrument_node=""> Morris began training as a decathlon athlete in hopes of competing in the 1936 Olympics.</span><sup class="reference" data-dcnode-id="3687" id="cite_ref-doria_3-1"><a data-dcnode-id="3688" href="#cite_note-doria-3"><span data-dcnode-id="3689" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3686" instrument_node="">
</span></p><p data-dcnode-id="3657"><span data-dcnode-id="3684" instrument_node="">In the </span><a class="mw-redirect" data-dcnode-id="3682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1936_United_States_Olympic_Trials_%28track_and_field%29" title="1936 United States Olympic Trials (track and field)"><span data-dcnode-id="3683" instrument_node="">U.S. Olympic track and field trials</span></a><span data-dcnode-id="3681" instrument_node=""> for </span><a data-dcnode-id="3679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Athletics_at_the_1936_Summer_Olympics" title="Athletics at the 1936 Summer Olympics"><span data-dcnode-id="3680" instrument_node="">1936</span></a><span data-dcnode-id="3678" instrument_node="">, Morris scored a new world record of 7,880 points, earning him </span><a data-dcnode-id="3676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Newsweek" title="Newsweek"><span data-dcnode-id="3677" instrument_node="">Newsweek</span></a><span data-dcnode-id="3675" instrument_node="">'s sobriquet "the nation's new Iron Man." Morris broke his own world record, and the Olympic record, in the </span><a data-dcnode-id="3673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1936_Summer_Olympics" title="1936 Summer Olympics"><span data-dcnode-id="3674" instrument_node="">Berlin games</span></a><span data-dcnode-id="3672" instrument_node="">, with a decathlon score of 7,900 points.</span><sup class="reference" data-dcnode-id="3669" id="cite_ref-doria_3-2"><a data-dcnode-id="3670" href="#cite_note-doria-3"><span data-dcnode-id="3671" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3668" instrument_node=""> It was said that </span><a data-dcnode-id="3666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adolf_Hitler" title="Adolf Hitler"><span data-dcnode-id="3667" instrument_node="">Adolf Hitler</span></a><span data-dcnode-id="3665" instrument_node=""> never left his seat while Morris was competing, and that the </span><a data-dcnode-id="3663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Germany" title="Germany"><span data-dcnode-id="3664" instrument_node="">Germans</span></a><span data-dcnode-id="3662" instrument_node=""> thereafter offered Morris $50,000 to stay in Germany and appear in sports films, an offer Morris refused.</span><sup class="reference" data-dcnode-id="3659" id="cite_ref-r2_4-1"><a data-dcnode-id="3660" href="#cite_note-r2-4"><span data-dcnode-id="3661" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3658" instrument_node="">
</span></p><p data-dcnode-id="3622"><span data-dcnode-id="3656" instrument_node="">German </span><a data-dcnode-id="3654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Film_director" title="Film director"><span data-dcnode-id="3655" instrument_node="">filmmaker</span></a><span data-dcnode-id="3653" instrument_node=""> and </span><a data-dcnode-id="3651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Documentary_film" title="Documentary film"><span data-dcnode-id="3652" instrument_node="">documentarian</span></a><span data-dcnode-id="3650" instrument_node=""> </span><a data-dcnode-id="3648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leni_Riefenstahl" title="Leni Riefenstahl"><span data-dcnode-id="3649" instrument_node="">Leni Riefenstahl</span></a><span data-dcnode-id="3647" instrument_node=""> </span><span class="nowrap" data-dcnode-id="3645"><span data-dcnode-id="3646" instrument_node="">(1902–2003)</span></span><span data-dcnode-id="3644" instrument_node=""> claimed in her memoirs that during and after the 1936 Olympics, she had an affair with Morris, which she ended because of a very disparaging report about him that was given to her by a </span><a data-dcnode-id="3642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Graphology" title="Graphology"><span data-dcnode-id="3643" instrument_node="">graphologist</span></a><span data-dcnode-id="3641" instrument_node="">.</span><sup class="reference" data-dcnode-id="3638" id="cite_ref-5"><a data-dcnode-id="3639" href="#cite_note-5"><span data-dcnode-id="3640" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3637" instrument_node=""> Riefenstahl also claimed that the affair began when, after winning the </span><a data-dcnode-id="3635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gold_medal" title="Gold medal"><span data-dcnode-id="3636" instrument_node="">gold medal</span></a><span data-dcnode-id="3634" instrument_node="">, he tore off her blouse and kissed her breasts, in front of the audience of 100,000 people.</span><sup class="reference" data-dcnode-id="3631" id="cite_ref-6"><a data-dcnode-id="3632" href="#cite_note-6"><span data-dcnode-id="3633" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3630" instrument_node=""> In reality, Morris merely received his medal and laurel from Hitler's mistress </span><a data-dcnode-id="3628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eva_Braun" title="Eva Braun"><span data-dcnode-id="3629" instrument_node="">Eva Braun</span></a><span data-dcnode-id="3627" instrument_node=""> in an otherwise standard ceremony.</span><sup class="reference" data-dcnode-id="3624" id="cite_ref-chapman_7-0"><a data-dcnode-id="3625" href="#cite_note-chapman-7"><span data-dcnode-id="3626" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3623" instrument_node="">
</span></p><p data-dcnode-id="3604"><span data-dcnode-id="3621" instrument_node="">Morris' success at the 1936 Olympics resulted in a brief flurry of fame, including a </span><a data-dcnode-id="3619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_York_City" title="New York City"><span data-dcnode-id="3620" instrument_node="">New York City</span></a><span data-dcnode-id="3618" instrument_node=""> ticker-tape parade and a statewide Colorado celebration. He received the 1936 </span><a data-dcnode-id="3616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_E._Sullivan_Award" title="James E. Sullivan Award"><span data-dcnode-id="3617" instrument_node="">James E. Sullivan Award</span></a><span data-dcnode-id="3615" instrument_node=""> as the top amateur athlete in the United States, and he had a short stint as an </span><a data-dcnode-id="3613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NBC" title="NBC"><span data-dcnode-id="3614" instrument_node="">NBC</span></a><span data-dcnode-id="3612" instrument_node=""> radio commentator.</span><sup class="reference" data-dcnode-id="3609" id="cite_ref-r1_1-1"><a data-dcnode-id="3610" href="#cite_note-r1-1"><span data-dcnode-id="3611" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="3606" id="cite_ref-doria_3-3"><a data-dcnode-id="3607" href="#cite_note-doria-3"><span data-dcnode-id="3608" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3605" instrument_node="">
</span></p><p data-dcnode-id="3582"><span data-dcnode-id="3603" instrument_node="">In November 1937, </span><a data-dcnode-id="3601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Metro-Goldwyn-Mayer" title="Metro-Goldwyn-Mayer"><span data-dcnode-id="3602" instrument_node="">Metro-Goldwyn-Mayer</span></a><span data-dcnode-id="3600" instrument_node=""> released the ten-minute short film "Decathlon Champion: The Story of Glenn Morris," depicting how he trained for and won the decathlon event. Morris portrayed himself in the film, before becoming the fourth Olympic athlete to play </span><a data-dcnode-id="3598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tarzan" title="Tarzan"><span data-dcnode-id="3599" instrument_node="">Tarzan</span></a><span data-dcnode-id="3597" instrument_node="">. He appeared in only one Tarzan film, </span><i data-dcnode-id="3594"><a data-dcnode-id="3595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tarzan%2527s_Revenge" title="Tarzan's Revenge"><span data-dcnode-id="3596" instrument_node="">Tarzan's Revenge</span></a></i><span data-dcnode-id="3593" instrument_node=""> (1938), an inexpensive independent film produced by </span><a data-dcnode-id="3591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sol_Lesser" title="Sol Lesser"><span data-dcnode-id="3592" instrument_node="">Sol Lesser</span></a><span data-dcnode-id="3590" instrument_node=""> and released by </span><a class="mw-redirect" data-dcnode-id="3588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Twentieth_Century_Fox" title="Twentieth Century Fox"><span data-dcnode-id="3589" instrument_node="">Twentieth Century Fox</span></a><span data-dcnode-id="3587" instrument_node="">. Reviews for the film cited both the silliness of the production and the exaggerated acting of the theatrically untrained Morris (though Variety called him "a highly acceptable Tarzan").</span><sup class="reference" data-dcnode-id="3584" id="cite_ref-8"><a data-dcnode-id="3585" href="#cite_note-8"><span data-dcnode-id="3586" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3583" instrument_node="">  After only one minor additional film role, in the 1938 comedy "Hold That Co-ed," Morris left the movie business forever.
</span></p><p data-dcnode-id="3534"><span data-dcnode-id="3581" instrument_node="">Morris played four games with the </span><a data-dcnode-id="3579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Detroit_Lions" title="Detroit Lions"><span data-dcnode-id="3580" instrument_node="">Detroit Lions</span></a><span data-dcnode-id="3578" instrument_node=""> of the </span><a data-dcnode-id="3576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Football_League" title="National Football League"><span data-dcnode-id="3577" instrument_node="">National Football League</span></a><span data-dcnode-id="3575" instrument_node=""> (NFL) in </span><a data-dcnode-id="3573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1940_Detroit_Lions_season" title="1940 Detroit Lions season"><span data-dcnode-id="3574" instrument_node="">1940</span></a><span data-dcnode-id="3572" instrument_node=""> before injury curtailed this new career,</span><sup class="reference" data-dcnode-id="3569" id="cite_ref-chapman_7-1"><a data-dcnode-id="3570" href="#cite_note-chapman-7"><span data-dcnode-id="3571" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="3566" id="cite_ref-9"><a data-dcnode-id="3567" href="#cite_note-9"><span data-dcnode-id="3568" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3565" instrument_node=""> then worked as an insurance agent.</span><sup class="reference" data-dcnode-id="3562" id="cite_ref-10"><a data-dcnode-id="3563" href="#cite_note-10"><span data-dcnode-id="3564" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3561" instrument_node=""> During </span><a data-dcnode-id="3559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="3560" instrument_node="">World War II</span></a><span data-dcnode-id="3558" instrument_node="">, he served as an </span><a data-dcnode-id="3556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Officer_%28armed_forces%29" title="Officer (armed forces)"><span data-dcnode-id="3557" instrument_node="">officer</span></a><span data-dcnode-id="3555" instrument_node=""> in the </span><a data-dcnode-id="3553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Navy" title="United States Navy"><span data-dcnode-id="3554" instrument_node="">U.S. Navy</span></a><span data-dcnode-id="3552" instrument_node=""> and was stationed in </span><a data-dcnode-id="3550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pacific_War" title="Pacific War"><span data-dcnode-id="3551" instrument_node="">the Pacific</span></a><span data-dcnode-id="3549" instrument_node="">, commanding amphibious-assault </span><a data-dcnode-id="3547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Landing_craft" title="Landing craft"><span data-dcnode-id="3548" instrument_node="">landing craft</span></a><span data-dcnode-id="3546" instrument_node="">.</span><sup class="reference" data-dcnode-id="3543" id="cite_ref-chapman_7-2"><a data-dcnode-id="3544" href="#cite_note-chapman-7"><span data-dcnode-id="3545" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3542" instrument_node=""> Reportedly wounded, Morris was treated for </span><a class="mw-redirect" data-dcnode-id="3540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/PTSD" title="PTSD"><span data-dcnode-id="3541" instrument_node="">psychological-trauma</span></a><span data-dcnode-id="3539" instrument_node=""> issues and spent several months in a naval hospital.</span><sup class="reference" data-dcnode-id="3536" id="cite_ref-doria_3-4"><a data-dcnode-id="3537" href="#cite_note-doria-3"><span data-dcnode-id="3538" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3535" instrument_node="">
</span></p><span data-dcnode-id="3533" instrument_node="">
</span><h2 data-dcnode-id="3523"><span class="mw-headline" data-dcnode-id="3531" id="Later_life"><span data-dcnode-id="3532" instrument_node="">Later life</span></span><span class="mw-editsection" data-dcnode-id="3524"><span class="mw-editsection-bracket" data-dcnode-id="3529"><span data-dcnode-id="3530" instrument_node="">[</span></span><a data-dcnode-id="3527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGlenn_Morris%26action%3Dedit%26section%3D2" title="Edit section: Later life"><span data-dcnode-id="3528" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3525"><span data-dcnode-id="3526" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3522" instrument_node="">
</span><p data-dcnode-id="3489"><span data-dcnode-id="3521" instrument_node="">Following his release from duty, Morris worked for a dozen years in construction and as a steel rigger for the </span><a data-dcnode-id="3519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Atomic_Energy_Commission" title="United States Atomic Energy Commission"><span data-dcnode-id="3520" instrument_node="">Atomic Energy Commission</span></a><span data-dcnode-id="3518" instrument_node="">. Subsequently, he may have worked off and on as a parking lot attendant, and he was rumored to have been an alcoholic.</span><sup class="reference" data-dcnode-id="3515" id="cite_ref-doria_3-5"><a data-dcnode-id="3516" href="#cite_note-doria-3"><span data-dcnode-id="3517" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3514" instrument_node=""> He lived out his last years mostly in </span><a data-dcnode-id="3512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Menlo_Park%2C_California" title="Menlo Park, California"><span data-dcnode-id="3513" instrument_node="">Menlo Park, California</span></a><span data-dcnode-id="3511" instrument_node="">, and as a patient in </span><a data-dcnode-id="3509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Veterans_Health_Administration" title="Veterans Health Administration"><span data-dcnode-id="3510" instrument_node="">veterans hospitals</span></a><span data-dcnode-id="3508" instrument_node="">. Too ill to attend his induction into the </span><a data-dcnode-id="3506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colorado_Sports_Hall_of_Fame" title="Colorado Sports Hall of Fame"><span data-dcnode-id="3507" instrument_node="">Colorado Sports Hall of Fame</span></a><span data-dcnode-id="3505" instrument_node=""> in 1967, where he was proclaimed "the world's greatest athlete," Morris nevertheless donated his Olympic gold medal to the Hall.</span><sup class="reference" data-dcnode-id="3502" id="cite_ref-doria_3-6"><a data-dcnode-id="3503" href="#cite_note-doria-3"><span data-dcnode-id="3504" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3501" instrument_node=""> The medal was subsequently given, along with Morris's other memorabilia, to Simla High School, which gives an annual Glenn Morris Award for athletic and academic excellence;</span><sup class="reference" data-dcnode-id="3498" id="cite_ref-chapman_7-3"><a data-dcnode-id="3499" href="#cite_note-chapman-7"><span data-dcnode-id="3500" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3497" instrument_node=""> the school, in turn, donated the medal in April 2011 to Colorado State University, the successor to Morris' college alma mater, where it is displayed in the 1926 field house named in his honor.</span><sup class="reference" data-dcnode-id="3494" id="cite_ref-11"><a data-dcnode-id="3495" href="#cite_note-11"><span data-dcnode-id="3496" instrument_node="">[11]</span></a></sup><sup class="reference" data-dcnode-id="3491" id="cite_ref-csugfh_12-0"><a data-dcnode-id="3492" href="#cite_note-csugfh-12"><span data-dcnode-id="3493" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3490" instrument_node="">
</span></p><p data-dcnode-id="3470"><span data-dcnode-id="3488" instrument_node="">At age 61 in 1974, Morris died of congestive heart failure "and other complications" at the veterans hospital in </span><a data-dcnode-id="3486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Palo_Alto%2C_California" title="Palo Alto, California"><span data-dcnode-id="3487" instrument_node="">Palo Alto, California</span></a><span data-dcnode-id="3485" instrument_node="">,</span><sup class="reference" data-dcnode-id="3482" id="cite_ref-xtrzap_13-0"><a data-dcnode-id="3483" href="#cite_note-xtrzap-13"><span data-dcnode-id="3484" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3481" instrument_node=""> and was buried in </span><a data-dcnode-id="3479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Skylawn_Memorial_Park_%28San_Mateo%2C_California%29" title="Skylawn Memorial Park (San Mateo, California)"><span data-dcnode-id="3480" instrument_node="">Skylawn Memorial Park</span></a><span data-dcnode-id="3478" instrument_node=""> in nearby </span><a data-dcnode-id="3476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/San_Mateo%2C_California" title="San Mateo, California"><span data-dcnode-id="3477" instrument_node="">San Mateo</span></a><span data-dcnode-id="3475" instrument_node="">.</span><sup class="reference" data-dcnode-id="3472" id="cite_ref-14"><a data-dcnode-id="3473" href="#cite_note-14"><span data-dcnode-id="3474" instrument_node="">[14]</span></a></sup><span data-dcnode-id="3471" instrument_node="">
</span></p><p data-dcnode-id="3461"><span data-dcnode-id="3469" instrument_node="">He was married from 1937 to 1940 to Charlotte Edwards, whom he had met in college.</span><sup class="reference" data-dcnode-id="3466" id="cite_ref-doria_3-7"><a data-dcnode-id="3467" href="#cite_note-doria-3"><span data-dcnode-id="3468" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="3463" id="cite_ref-chapman_7-4"><a data-dcnode-id="3464" href="#cite_note-chapman-7"><span data-dcnode-id="3465" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3462" instrument_node="">
</span></p><span data-dcnode-id="3460" instrument_node="">

</span><ul data-dcnode-id="3428"><li data-dcnode-id="3444"><span data-dcnode-id="3448" instrument_node="">In 2003, author Mike Chapman wrote “The Gold and The Glory: The Amazing True Story of Glenn Morris, Olympic Champion and Movie Tarzan”. The foreword was written by Bob Mathias, Olympic decathlon champion in 1948 and 1952, and the book has over 120 photos, ranging from Morris's high school days up through college, the Olympics, Hollywood and his service as a Naval officer in World War II.</span><sup class="reference" data-dcnode-id="3445" id="cite_ref-chapman_7-5"><a data-dcnode-id="3446" href="#cite_note-chapman-7"><span data-dcnode-id="3447" instrument_node="">[7]</span></a></sup></li><span data-dcnode-id="3443" instrument_node="">
</span><li data-dcnode-id="3429"><span data-dcnode-id="3442" instrument_node="">A 2013 novel </span><i data-dcnode-id="3440"><span data-dcnode-id="3441" instrument_node="">Olympic Affair</span></i><span data-dcnode-id="3439" instrument_node=""> was published by Terry Frei which he depicts the life of Morris, and Frei imagines what the affair with </span><a data-dcnode-id="3437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leni_Riefenstahl" title="Leni Riefenstahl"><span data-dcnode-id="3438" instrument_node="">Leni Riefenstahl</span></a><span data-dcnode-id="3436" instrument_node=""> was like.</span><sup class="reference" data-dcnode-id="3433" id="cite_ref-gzdzzy_15-0"><a data-dcnode-id="3434" href="#cite_note-gzdzzy-15"><span data-dcnode-id="3435" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="3430" id="cite_ref-tfdpds_16-0"><a data-dcnode-id="3431" href="#cite_note-tfdpds-16"><span data-dcnode-id="3432" instrument_node="">[16]</span></a></sup></li></ul><span data-dcnode-id="3427" instrument_node="">
