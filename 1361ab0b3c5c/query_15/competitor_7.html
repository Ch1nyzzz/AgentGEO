ed from the original!!!</span></strong></p><p data-dcnode-id="7131"><strong data-dcnode-id="7133"><span data-dcnode-id="7134" instrument_node="">Excerpt:&nbsp; </span></strong><span data-dcnode-id="7132" instrument_node="">How does this word ‘Father’ help a man to call on God by Prayer?</span></p><p data-dcnode-id="7126"><span data-dcnode-id="7130" instrument_node="">When we conceive of God as a Father, it puts us in mind of his mercy, that he will pity us as a Father. A man will be reconciled unto his son easily, and will spare his son, though he be a prodigal; yet a father will pass by and cover all. So I pray to a Father; did I pray to a Judge that will condemn me, or an enemy that would not be reconciled to me, little hope I had to speed because I have wronged him? Yet I will arise and go to my Father, and say, “Father, I have sinned.” Psa 103.13. </span><em data-dcnode-id="7128"><span data-dcnode-id="7129" instrument_node="">As a father pities his son, so God pities them that fear him</span></em><span data-dcnode-id="7127" instrument_node="">. He is my child, says God, though stubborn, and I must look to him. When a man’s rebellions witness against him, and Satan vexes him, and says, “What, do you think to have mercy, and are so vile?” True, says the soul, I am nothing, but I go to a father. If a child but aims at a thing, the father accepts him. If he speaks but half a sentence, the father interprets it. So this is the great encouragement of the faithful to go to God, that notwithstanding so many failings, and though so dead and so barren, yet a father bears all. The Lord interprets all, though but broken speeches, he accepts all, and regards all. We have a Father [5] to go to, that is willing to pass by many failings.</span></p><p data-dcnode-id="7124"><span data-dcnode-id="7125" instrument_node="">-----</span></p><p data-dcnode-id="7089"><strong data-dcnode-id="7122"><span data-dcnode-id="7123" instrument_node="">TABLE OF CONTENTS</span></strong><br data-dcnode-id="7121"><span data-dcnode-id="7120" instrument_node="">Overview</span><br data-dcnode-id="7119"><span data-dcnode-id="7118" instrument_node="">&nbsp;&nbsp; &nbsp;Preface: Our Father.</span><br data-dcnode-id="7117"><span data-dcnode-id="7116" instrument_node="">&nbsp;&nbsp; &nbsp;&nbsp;&nbsp; &nbsp;Which art in Heaven, etc.</span><br data-dcnode-id="7115"><span data-dcnode-id="7114" instrument_node="">&nbsp;&nbsp; &nbsp;Petition 1: Hallowed be Thy Name</span><br data-dcnode-id="7113"><span data-dcnode-id="7112" instrument_node="">&nbsp;&nbsp; &nbsp;Petition 2: Thy Kingdom come</span><br data-dcnode-id="7111"><span data-dcnode-id="7110" instrument_node="">&nbsp;&nbsp; &nbsp;Petition 3: Thy will be done in Earth as it is in Heaven.</span><br data-dcnode-id="7109"><span data-dcnode-id="7108" instrument_node="">&nbsp;&nbsp; &nbsp;Petition 4: Give us this day our daily bread.</span><br data-dcnode-id="7107"><span data-dcnode-id="7106" instrument_node="">&nbsp;&nbsp; &nbsp;Petition 5: And forgive us our trespasses, etc.</span><br data-dcnode-id="7105"><span data-dcnode-id="7104" instrument_node="">&nbsp;&nbsp; &nbsp;&nbsp;&nbsp; &nbsp;For we forgive others.</span><br data-dcnode-id="7103"><span data-dcnode-id="7102" instrument_node="">&nbsp;&nbsp; &nbsp;Petition 6: And lead us not into temptation.</span><br data-dcnode-id="7101"><span data-dcnode-id="7100" instrument_node="">&nbsp;&nbsp; &nbsp;&nbsp;&nbsp; &nbsp;But deliver us from evil.</span><br data-dcnode-id="7099"><span data-dcnode-id="7098" instrument_node="">&nbsp;&nbsp; &nbsp;For thine is the Kingdom</span><br data-dcnode-id="7097"><span data-dcnode-id="7096" instrument_node="">&nbsp;&nbsp; &nbsp;&nbsp;&nbsp; &nbsp;And the glory.</span><br data-dcnode-id="7095"><span data-dcnode-id="7094" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; &nbsp;&nbsp;&nbsp; &nbsp;Thine.</span><br data-dcnode-id="7093"><span data-dcnode-id="7092" instrument_node="">&nbsp;&nbsp; &nbsp;&nbsp;&nbsp; &nbsp;Forever and ever, etc.</span><br data-dcnode-id="7091"><span data-dcnode-id="7090" instrument_node="">&nbsp;&nbsp; &nbsp;&nbsp;&nbsp; &nbsp;Amen.</span></p></div></div></div><span data-dcnode-id="7085" instrument_node=""> </span></div><span data-dcnode-id="7083" instrument_node="">
