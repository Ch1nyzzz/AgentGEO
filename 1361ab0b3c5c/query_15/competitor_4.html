1890 - Publication of </span><i data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">The Principles of Psychology</span></i><span data-dcnode-id="1064" instrument_node="">.</span><br data-dcnode-id="1063"><span data-dcnode-id="1062" instrument_node="">
1890 - Birth of his fifth child and fourth son, Alexander Robertson ["Tweedie"; "Francois"].</span></b><span data-dcnode-id="1060" instrument_node="">
</span><blockquote data-dcnode-id="1043"><span data-dcnode-id="1059" instrument_node="">On September 25 of 1890, Holt began distribution of </span><i data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">The Principles of Psychology</span></i><span data-dcnode-id="1056" instrument_node=""> at $6 for the 2-volume set ($5 after dealer discount). In many ways, the two-volume work was as much psychology as it was philosophy. It was also literature, autobiography, self-help manual, and confessional tale. It was widely admired and generally positively reviewed, although a number of readers found it too personal in tone and substance. The literary tone that James used in this and future works earned for him the accolade that he was actually the real novelist of the James brothers, a novelist who wrote about psychology. Henry, on the other hand, was the real psychologist who wrote novels. But it was not an accolade typically given by members of his discipline. "It is literature," the renown psychologist Wilhelm Wundt said of the </span><i data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">Principles</span></i><span data-dcnode-id="1053" instrument_node="">, "it is beautiful, but it is not psychology." At the urging of his publisher to create a more digestible book with greater classroom appeal, James later condensed the two volumes into one, </span><i data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">Psychology: The Briefer Course</span></i><span data-dcnode-id="1050" instrument_node="">. Soon the complete work came to be known as </span><i data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">The James</span></i><span data-dcnode-id="1047" instrument_node="">, and the abridged tome as </span><i data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">The Jimmy</span></i><span data-dcnode-id="1044" instrument_node="">.</span></blockquote><p data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">
</span></p><div align="center" data-dcnode-id="1022"><span data-dcnode-id="1040" instrument_node="">
</span><span data-dcnode-id="1036" instrument_node="">
</span><span data-dcnode-id="1026" instrument_node="">
</span><table data-dcnode-id="1023"><tbody data-dcnode-id="1024"><tr data-dcnode-id="1025"><td data-dcnode-id="1037"><a data-dcnode-id="1038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/jamesh.html"><img align="top" border="2" data-dcnode-id="1039" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_jamesh.jpg&amp;raw"></a></td><td data-dcnode-id="1027"><i data-dcnode-id="1028"><span data-dcnode-id="1035" instrument_node="">Photographic portrait.</span><br data-dcnode-id="1034"><span data-dcnode-id="1033" instrument_node="">Shortly after publication</span><br data-dcnode-id="1032"><span data-dcnode-id="1031" instrument_node=""> of </span><i data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Principles</span></i></i></td></tr></tbody></table></div><br data-dcnode-id="1021"><span data-dcnode-id="1020" instrument_node="">
</span><a data-dcnode-id="1019" name="JamesSeance"></a><span data-dcnode-id="1018" instrument_node="">
</span><blockquote data-dcnode-id="960"><span data-dcnode-id="1017" instrument_node="">
There were no boundaries to James's interest in psychological processes, and no areas to which his mind would not travel. He was criticized broadly for his interest in psychical research, and he was known to have attended seances. In the </span><i data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">Principles</span></i><span data-dcnode-id="1014" instrument_node="">, he devoted chapters to habit, attention, perception, association, memory, reasoning, instinct, emotion, imagination, psychological methods, and even hypnotism. Of all psychological processes, however, one was clearly central to a Jamesian psychology—the </span><i data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">self</span></i><span data-dcnode-id="1011" instrument_node="">. </span><p data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">
</span></p><div align="center" data-dcnode-id="994"><span data-dcnode-id="1008" instrument_node="">
</span><span data-dcnode-id="1004" instrument_node="">
</span><span data-dcnode-id="998" instrument_node="">
</span><table data-dcnode-id="995"><tbody data-dcnode-id="996"><tr data-dcnode-id="997"><td data-dcnode-id="1005"><a data-dcnode-id="1006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/JamesSeance.html"><img align="top" border="2" data-dcnode-id="1007" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_JamesSeance.jpg&amp;raw"></a></td><td data-dcnode-id="999"><i data-dcnode-id="1000"><span data-dcnode-id="1003" instrument_node="">James and a Mrs. Walden</span><br data-dcnode-id="1002"><span data-dcnode-id="1001" instrument_node="">at a seance</span></i></td></tr></tbody></table></div><br data-dcnode-id="993"><span data-dcnode-id="992" instrument_node="">

It bears noting that "The Consciousness of Self" is the longest chapter in the two volumes of the </span><i data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Principles</span></i><span data-dcnode-id="989" instrument_node="">. In it, James described an individual's sense of self as "duplex," composed of objective and subjective selves. He differentiated between the self as knower, or the </span><i data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">I</span></i><span data-dcnode-id="986" instrument_node="">, and the self as known, or </span><i data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">me</span></i><span data-dcnode-id="983" instrument_node="">. The </span><i data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">I</span></i><span data-dcnode-id="980" instrument_node=""> is pure ego, consciousness itself. The </span><i data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">me</span></i><span data-dcnode-id="977" instrument_node=""> is one of the many things that the </span><i data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">I</span></i><span data-dcnode-id="974" instrument_node=""> may be conscious of, and it consists of three components, one physical or material, one social, and one spiritual. James was careful to point out that the two selves are discriminated aspects of self rather than "separate things." The self is also purposive, dynamic, and active. James was also one of the first writers to use the term </span><i data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">self-esteem</span></i><span data-dcnode-id="971" instrument_node="">, which he described as a self-feeling that depends on what one decides to be and to accomplish. Self-esteem may be raised, James argued, either by succeeding in our endeavors or, in the face of incessant disappointments, by lowering our sights and surrendering certain pretensions. James' belief in God permeates his psychology and plays an important role in his understanding of self (particularly of the </span><i data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">I</span></i><span data-dcnode-id="968" instrument_node="">).  For example, his discussion of the soul as a combining medium of thought or consciousness is permeated with references to a spiritual being and the role that such a being may play in understanding an individual's self. He argued that psychology must "admit" the Soul.</span><p data-dcnode-id="963"><span data-dcnode-id="967" instrument_node="">

By the time that William James published </span><i data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">The Principles of Psychology</span></i><span data-dcnode-id="964" instrument_node=""> in 1890, Rousseau's doctrine of innate ideas was under attack in the field of psychology from associationists who favored Locke's model of the human mind as a tabula rasa. The Russian school of reflexology, known today to psychology students primarily through the work of Ivan Pavlov and his discovery of the principle of conditioned reflexes, was having a profound influence on European elementist psychologists such as Wilhelm Wundt. Theirs was an antimentalist view of human functioning in which only observable experience was deemed worthy of scientific scrutiny. This decidedly positivist perspective would travel to the United States by way of structuralist Edward Titchener and others. The intellectual precursors of John Watson's and B. F. Skinner's brand of radical behaviorism were well on their way to capturing the discipline, and they wanted a discipline in which self-perceptions and other internal mental states played no meaningful role in a scientific psychology. Moreover, notions of mind-body dualism were still well entrenched within the discipline.</span></p><p data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">

These were not ideas that sat well with James, a man who had come to psychology by way of art and philosophy and who believed that a psychology without introspection could not aspire to explain the complexities of human functioning. It was by looking into his own conscious mind that he made sense of his own psychology, and it was primarily through this method that he developed the principles of psychology that governed others. After all, he argued, "introspective observation is what we have to rely on first and foremost and always."
</span></p></blockquote><span data-dcnode-id="959" instrument_node="">
</span><b data-dcnode-id="951"><span data-dcnode-id="958" instrument_node="">1892 - Death of sister Alice in London. Publishes </span><i data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Psychology, Briefer Course</span></i><span data-dcnode-id="955" instrument_node="">, later known as </span><i data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">The Jimmy</span></i><span data-dcnode-id="952" instrument_node="">.</span></b><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">
</span></p><div align="center" data-dcnode-id="925"><span data-dcnode-id="948" instrument_node="">
</span><span data-dcnode-id="942" instrument_node="">
</span><span data-dcnode-id="938" instrument_node="">
</span><span data-dcnode-id="934" instrument_node="">
</span><span data-dcnode-id="929" instrument_node="">
</span><table data-dcnode-id="926"><tbody data-dcnode-id="927"><tr data-dcnode-id="928"><td data-dcnode-id="943"><i data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Alice James.</span></i><br data-dcnode-id="945"><span data-dcnode-id="944" instrument_node="">William's sister.</span></td><td data-dcnode-id="939"><a data-dcnode-id="940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/JamesSisterAlice1891.html"><img align="top" border="2" data-dcnode-id="941" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_JamesSisterAlice1891.jpg&amp;raw"></a></td><td data-dcnode-id="935"><a data-dcnode-id="936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/jamesxy.html"><img align="top" border="2" data-dcnode-id="937" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_jamesxy.gif&amp;raw"></a></td><td data-dcnode-id="930"><i data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Early 1890s.</span></i><span data-dcnode-id="931" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></td></tr></tbody></table></div><br data-dcnode-id="924"><span data-dcnode-id="923" instrument_node="">
</span><b data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">1892 - In July, James begins his talks to Cambridge teachers.</span></b><br data-dcnode-id="920"><span data-dcnode-id="919" instrument_node="">
</span><blockquote data-dcnode-id="902"><span data-dcnode-id="918" instrument_node="">
The year 1892 should be an auspicious one to students of education and educational psychology because it was on July of that year that William James delivered the first of a series of lectures on psychology to teachers in Cambridge. With the appointment of Paul Henry Hanus as assistant professor of the History and Art of Teaching in 1891, only a year after the debut of the </span><i data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">Principles</span></i><span data-dcnode-id="915" instrument_node="">, Harvard University began a process that culminated in the creation of a Division of Education in 1906 and a Graduate School of Education in 1920. At the time of the appointment, the Harvard administration also proposed to its instructors that they address issues of concern to teaching from the perspectives of their own disciplines.  James did so and incorporated the fruits of his labors into his own teaching (James was perhaps the first university professor ever to elicit evaluations of his teaching from his students). It is safe to say that William James was the first American psychologist to directly address educational issues.</span><p data-dcnode-id="910"><span data-dcnode-id="914" instrument_node="">

When Harvard also suggested to James that a series of lectures to classroom teachers on the relationship between psychology and teaching would be well-received, James saw the opportunity to promote attention to his newly published </span><i data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Principles</span></i><span data-dcnode-id="911" instrument_node=""> and to increase his university income. On July of 1892, he delivered the first lecture to a group of Cambridge teachers under the title of "Talks on Psychology of Interest to Teachers." According to Harvard's university calendar, the first lecture was delivered on a Tuesday evening; lectures then followed every Thursday. He would subsequently deliver the lectures throughout the country.</span></p><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">

James began his talks by declaring to the teachers in his audience that they held the future of the country in their hands. Shrewdly, he went on to lower their expectations of what they could hope to take from his lectures. He cautioned them that knowledge of psychology does not ensure effective teaching. Indeed, they would make a "great, very great" mistake if they believed that scientific psychology could offer them teaching strategies or instructional methods they could readily incorporate into their teaching. After all, "psychology is a science, and teaching is an art; and sciences never generate arts directly out of themselves." Moreover, knowledge of psychology cannot help anyone develop ingenuity or tact, and these are skills central to the art of teaching. He went even further: The amount of psychology necessary to effective teaching "might almost be written on the palm of one's hand." What psychology can do is to "save us from mistakes. It makes us, moreover, more clear as to what we are about. We gain confidence in respect to any method which we are using as soon as we believe that it has theory as well as practice."</span></p><p data-dcnode-id="903"><span data-dcnode-id="907" instrument_node="">

James's speaker's fee was $50. Such was his eloquence and appeal that the size of his audiences increased after each lecture. After the success of </span><i data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Principles</span></i><span data-dcnode-id="904" instrument_node=""> and of the lectures, James was exhilarated but exhausted, and an exhausted James always turned to travel. He obtained a year's sabbatical from Harvard, turned his laboratory over to Hugo Münsterberg, and, as had his father before him, he took the entire family to Europe, where he enrolled his boys in an English school in Florence. 
</span></p></blockquote><span data-dcnode-id="901" instrument_node="">
</span><b data-dcnode-id="895"><span data-dcnode-id="900" instrument_node="">
1892-1893 - Travels to Europe with wife and children. </span><br data-dcnode-id="899"><span data-dcnode-id="898" instrument_node="">
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Turns lab over to Hugo Münsterberg.</span><br data-dcnode-id="897"><span data-dcnode-id="896" instrument_node="">
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Receives Ph.D. and Litt. D. from University of Padua.

</span></b><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">
</span></p><div align="center" data-dcnode-id="862"><span data-dcnode-id="892" instrument_node="">
</span><span data-dcnode-id="884" instrument_node="">
</span><span data-dcnode-id="880" instrument_node="">
</span><span data-dcnode-id="876" instrument_node="">
</span><span data-dcnode-id="872" instrument_node="">
</span><span data-dcnode-id="866" instrument_node="">
</span><table data-dcnode-id="863"><tbody data-dcnode-id="864"><tr data-dcnode-id="865"><td data-dcnode-id="885"><i data-dcnode-id="886"><span data-dcnode-id="891" instrument_node="">William and </span><br data-dcnode-id="890"><span data-dcnode-id="889" instrument_node="">Margaret Mary ["Peggy"],</span><br data-dcnode-id="888"><span data-dcnode-id="887" instrument_node="">
 March 1892.</span></i></td><td data-dcnode-id="881"><a data-dcnode-id="882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/jamess.html"><img align="top" border="2" data-dcnode-id="883" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_jamess.jpg&amp;raw"></a></td><td data-dcnode-id="877"><a data-dcnode-id="878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/jamesee.html"><img align="top" border="2" data-dcnode-id="879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_jamesee.jpg&amp;raw"></a></td><td data-dcnode-id="873"><a data-dcnode-id="874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/jamesee.html"><img align="top" border="2" data-dcnode-id="875" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/THUMB_jamesee.jpg&amp;raw"></a></td><td data-dcnode-id="867"><i data-dcnode-id="868"><span data-dcnode-id="871" instrument_node="">Photographic portrait,</span><br data-dcnode-id="870"><span data-dcnode-id="869" instrument_node=""> 1892.</span></i></td></tr></tbody></table></div><br data-dcnode-id="861"><span data-dcnode-id="860" instrument_node="">
</span><blockquote data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">
When the family returned from Europe in 1893, James found an America ravaged by a financial depression that had severely depleted his savings. Moreover, he feared he was losing touch with his own national identity. "One should not be a cosmopolitan," he wrote, "one's soul becomes 'disaggregated'" and "one's land seems foreign." He determined to reclaim his cultural identity and began a period of intense activity in social and political causes. The increase in political activism was also marked by decreased interest in psychology–"I wish to get relieved of psychology as soon as possible," he wrote to a friend. European experimental psychology, spearheaded by Wundt, was now in full bloom in American psychology. It emphasized an objectivist view of human functioning in which only observable experience merited scientific interest. James found it trivial, mindless, and intellectually indigestible. Though disheartened by the growing success of the behaviorist movement, he continued throughout his life to fight for his introspective view of psychology, and he remained an active member both of the American Philosophical Association and of the American Psychological Association, even serving as President of each organization.
</span></blockquote><span data-dcnode-id="857" instrument_node="">
</span><b data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">
1894-1899 - Intense activity in social and political causes.</span></b><p data-dcnode-id="851"><span data-dcnode-id="854" instrument_node="">
</span><a data-dcnode-id="853" name="mid1890s"></a><span data-dcnode-id="852" instrument_node="">
</span></p><blockquote data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">
["In 1894 he was the first American to call attention to the work of the then obscure Viennese physician Sigmund Freud, and in 1909, though ailing, he went to Clark University to meet Freud on his only visit to the United States and to hear him speak."]
</span></blockquote><span data-dcnode-id="848" instrument_node="">
</span><div align="center" data-dcnode-id="831"><span data-dcnode-id="847" instrument_node="">
</span><span data-dcnode-id="843" instrument_node="">
</span><span data-dcnode-id="839" instrument_node="">
</span><span data-dcnode-id="835" instrument_node="">
</span><table data-dcnode-id="832"><tbody data-dcnode-id="833"><tr data-dcnode-id="834"><td data-dcnode-id="844"><a data-dcnode-id="845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/JamesMid1890s2.html"><img align="top" border="2" data-dcnode-id="846" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_JamesMid1890s2.jpg&amp;raw"></a></td><td data-dcnode-id="840"><a data-dcnode-id="841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/jamesy.html"><img align="top" border="2" data-dcnode-id="842" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_jamesy1.gif&amp;raw"></a></td><td data-dcnode-id="836"><i data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">circa 1895.</span></i></td></tr></tbody></table></div><br data-dcnode-id="830"><span data-dcnode-id="829" instrument_node="">
</span><b data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">
1896-1897 - Lowell Institute Lectures on "Exceptional Mental States."</span></b><br data-dcnode-id="826"><span data-dcnode-id="825" instrument_node="">
</span><blockquote data-dcnode-id="817"><span data-dcnode-id="824" instrument_node="">
During the closing years of the century, James lectured widely, remained politically active, and published </span><i data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">The Will to Believe and Other Essays in Popular Philosophy</span></i><span data-dcnode-id="821" instrument_node="">, a book more in keeping with his growing spiritual and philosophical concerns. His lectures to teachers were collected and published in </span><i data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Talks to Teachers on Psychology: And to Students on Some of Life's Ideals</span></i><span data-dcnode-id="818" instrument_node="">. At a lecture delivered at the University of California, Berkeley, entitled "Philosophical Conceptions and Practical Results," he put forth his first explanation of the method of pragmatism, an idea that he credited to Charles Sanders Peirce but which James appropriated and transformed. In 1896, he was named Doctor of Laws by Princeton University.
</span></blockquote><span data-dcnode-id="816" instrument_node="">
</span><b data-dcnode-id="811"><span data-dcnode-id="815" instrument_node="">
1897 - Publication of </span><i data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Will to Believe and Other Essays</span></i><span data-dcnode-id="812" instrument_node="">.</span></b><span data-dcnode-id="810" instrument_node="">
</span><a data-dcnode-id="809" name="1897"></a><span data-dcnode-id="808" instrument_node="">
</span><blockquote data-dcnode-id="792"><span data-dcnode-id="807" instrument_node="">
The ten essays that James included in </span><i data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">The Will to Believe</span></i><span data-dcnode-id="804" instrument_node=""> contain some of his most eloquent statements on the intellectual and emotional risks of religious belief; the philosopher's contribution to a society's moral life; the genesis and importance of genius; and the accomplishments of psychical research. Although all of the essays had been published before, some as early as 1879, and delivered as talks to colleagues, students, and religious groups, together they sum up the issues that concerned James during the first twenty years of his professional career and stand as preface to the writings on pragmatism and pluralism that earned him enduring fame.</span><p data-dcnode-id="793"><span data-dcnode-id="803" instrument_node="">

The most compelling piece in the collection is the title essay, James's response to Pascal's wager, and his defense of faith. At one point, he considered calling the essay "The Duty to Believe," but that title implied an obligation—perhaps to self, perhaps to society—that James did not intend. Then he thought he might call the essay "The Right to Believe," but that title could imply a right </span><i data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">bestowed</span></i><span data-dcnode-id="800" instrument_node="">—and by whom? James meant something else: All human beings, he wrote, </span><i data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">want</span></i><span data-dcnode-id="797" instrument_node=""> to believe in a universe in which truth can be apprehended and, as Royce had persuaded him, in which goodness exists. Without the possibility of finding truth and achieving goodness, moral decisions would be futile exercises. Such a universe, however, cannot be defended by reason nor logic; it may exist for us only if we have faith, only if we show "a passionate affirmation of desire" for both truth and goodness, only if we will to believe that those qualities exist. [from </span><i data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Genuine Reality</span></i><span data-dcnode-id="794" instrument_node="">]
</span></p></blockquote><span data-dcnode-id="791" instrument_node="">
</span><div align="center" data-dcnode-id="757"><span data-dcnode-id="790" instrument_node="">
</span><span data-dcnode-id="780" instrument_node="">
</span><span data-dcnode-id="776" instrument_node="">
</span><span data-dcnode-id="766" instrument_node="">
</span><span data-dcnode-id="761" instrument_node="">
</span><table data-dcnode-id="758"><tbody data-dcnode-id="759"><tr data-dcnode-id="760"><td data-dcnode-id="781"><i data-dcnode-id="782"><span data-dcnode-id="789" instrument_node="">With his wife, Alice, </span><br data-dcnode-id="788"><span data-dcnode-id="787" instrument_node="">at Lamb House</span><br data-dcnode-id="786"><span data-dcnode-id="785" instrument_node="">[brother Henry's home]</span><br data-dcnode-id="784"><span data-dcnode-id="783" instrument_node="">1890s.</span></i></td><td data-dcnode-id="777"><a data-dcnode-id="778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/jamesbb.html"><img align="top" border="2" data-dcnode-id="779" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_jamesbb.jpg&amp;raw"></a></td><td data-dcnode-id="767"><a data-dcnode-id="774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/JamesMid1890s.html"><img align="top" border="2" data-dcnode-id="775" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_JamesMid1890s.jpg&amp;raw"></a><span data-dcnode-id="773" instrument_node="">&nbsp;
</span><a data-dcnode-id="771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/james3.html"><img align="top" border="2" data-dcnode-id="772" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_james3.jpg&amp;raw"></a><span data-dcnode-id="770" instrument_node="">&nbsp;
</span><a data-dcnode-id="768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/james33.html"><img align="top" border="2" data-dcnode-id="769" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_james33.GIF&amp;raw"></a></td><td data-dcnode-id="762"><i data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">late 1890s.</span></i><span data-dcnode-id="763" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></td></tr></tbody></table></div><br data-dcnode-id="756"><span data-dcnode-id="755" instrument_node="">
</span><b data-dcnode-id="749"><span data-dcnode-id="754" instrument_node="">1898 - Injury to heart.</span><br data-dcnode-id="753"><span data-dcnode-id="752" instrument_node="">
1898 - Lecture on "Philosophical Conceptions and Practical Results" (pragmatism) - Berkeley, CA.</span><br data-dcnode-id="751"><span data-dcnode-id="750" instrument_node="">
</span></b><span data-dcnode-id="748" instrument_node="">
</span><blockquote data-dcnode-id="744"><span data-dcnode-id="747" instrument_node="">As the 19th century came to a close, it was primarily James's functionalism that stood in opposition to prevailing notions of mind-body dualism and to the growing positivist theories that would rule American psychology during the better part of the 20th century. Initially influenced by Darwin's evolutionary thought that established a connection between structure and function, functionalism emphasized the interactive nature of mind and body and the unity and dynamic nature of what James would describe as "the stream of consciousness." According to James, mental processes are functional in the sense that they aid individuals in their attempts to adapt themselves to their world and their environments—"Man, whatever else he may be, is primarily a practical being, whose mind is given him to aid in adapting him to this world's life."</span><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">

Perhaps the most identifiable feature of functionalism is its claim that mental states are characterized by their interactions with and causal relations to other mental states. Moreover, because mental events must be understood in terms of their relation to the sensory inputs from which they emanate and to the behavioral outputs that they produce, functionalists argued that elements of mental functioning and rules for the association of ideas cannot be investigated in isolation. These elements are but a function of a continuous stream of thought that can only be understood in relation to the conscious actions of human beings as they go about the business of day-to-day living. Consciousness itself, argued James, is adaptive and functional and makes it possible for individuals to engage in self-regulation.
</span></p></blockquote><b data-dcnode-id="739"><span data-dcnode-id="743" instrument_node="">

1899 - Publication of </span><i data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Talks to Teachers</span></i><span data-dcnode-id="740" instrument_node="">.</span></b><br data-dcnode-id="738"><span data-dcnode-id="737" instrument_node="">
</span><blockquote data-dcnode-id="712"><span data-dcnode-id="736" instrument_node="">
After being published in installments in the </span><i data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Atlantic Monthly</span></i><span data-dcnode-id="733" instrument_node="">, his lectures to the teachers of Cambridge were collected and published in 1899 as </span><i data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Talks to Teachers on Psychology and to Students on Some of Life's Ideals</span></i><span data-dcnode-id="730" instrument_node="">. </span><i data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Talks</span></i><span data-dcnode-id="727" instrument_node=""> became popular with teacher educators, who used it prominently in teacher training programs throughout the nation for the next thirty years. By 1929 it had been reprinted 23 times.</span><p data-dcnode-id="713"><span data-dcnode-id="726" instrument_node="">

Most readers familiar with the </span><i data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Principles</span></i><span data-dcnode-id="723" instrument_node=""> quickly realize that, had William James had access to a personal computer, he would have made frequent use of the cut and paste feature to compose the lectures. As he had done for the </span><i data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Jimmy</span></i><span data-dcnode-id="720" instrument_node="">, James used scissors and paste to produce the bulk of the text, adding where appropriate exemplars, aphorisms, and instructive maxims relevant to education. Some have argued that both the lectures and book may have been prompted more by financial considerations than by an abiding interest in teaching and in education. Indeed, in his private correspondence James revealed that he had little patience with or admiration for teachers as a whole, and he could be dismissive both of the lectures and the subsequent book—"Pray do not wade through the </span><i data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Teacher</span></i><span data-dcnode-id="717" instrument_node=""> part, which is incarnate boredom," he wrote to a friend about </span><i data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">Talks</span></i><span data-dcnode-id="714" instrument_node="">. Others contend that James was genuinely interested in the work of teachers and in the workings of education. His essays related to university education (such as "The Ph.D. Octopus") attest to the fact that he was interested in how American students were educated, at least at the university level.
</span></p></blockquote><span data-dcnode-id="711" instrument_node="">
</span><b data-dcnode-id="707"><span data-dcnode-id="710" instrument_node="">1899-1901 - Sabbatical and convalescence in Europe, especially Nauheim.</span><br data-dcnode-id="709"><span data-dcnode-id="708" instrument_node="">
1901-1902 - Gifford Lectures at Edinburgh.</span></b><span data-dcnode-id="706" instrument_node="">
</span><blockquote data-dcnode-id="699"><span data-dcnode-id="705" instrument_node="">
James ended the college year in the spring of 1899 feeling hopeful and energetic, but ill-health again beset him in the form of a heart condition, and he welcomed the new century convalescing in Europe, where he remained for two years. Proclaiming himself a "piecemeal supernaturalist," his interest in spirituality and religion deepened during this time. He spent his sabbatical in Europe, where he wrote and delivered the Gifford lectures and then set to work on a new book, his philosophical "message to the world."  At fifty-seven, James did not want to face the regret of "postponed achievements."  However, his "slight cardiac trouble" severely worsened. By the time he landed in Hamburg, his condition had declined. He could not walk more than a few feet without pain; he could not concentrate on his work; he was irritable and depressed.  [from </span><i data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Genuine Reality</span></i><span data-dcnode-id="702" instrument_node="">]</span><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">
</span></p></blockquote><span data-dcnode-id="698" instrument_node="">
</span><div align="center" data-dcnode-id="667"><span data-dcnode-id="697" instrument_node="">
</span><span data-dcnode-id="689" instrument_node="">
</span><span data-dcnode-id="685" instrument_node="">
</span><span data-dcnode-id="681" instrument_node="">
</span><span data-dcnode-id="671" instrument_node="">
</span><table data-dcnode-id="668"><tbody data-dcnode-id="669"><tr data-dcnode-id="670"><td data-dcnode-id="690"><i data-dcnode-id="691"><span data-dcnode-id="696" instrument_node="">At Chateau Carqueiranne,</span><br data-dcnode-id="695"><span data-dcnode-id="694" instrument_node=""> home of French philosopher</span><br data-dcnode-id="693"><span data-dcnode-id="692" instrument_node=""> Charles Richet, 1900.</span></i></td><td data-dcnode-id="686"><a data-dcnode-id="687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/jamesaa.html"><img align="top" border="2" data-dcnode-id="688" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_jamesaa.jpg&amp;raw"></a></td><td data-dcnode-id="682"><a data-dcnode-id="683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/jamest.html"><img align="top" border="2" data-dcnode-id="684" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_jamest.jpg&amp;raw"></a></td><td data-dcnode-id="672"><i data-dcnode-id="673"><span data-dcnode-id="680" instrument_node="">Henry James and William</span><br data-dcnode-id="679"><span data-dcnode-id="678" instrument_node=""> at Henry's Lamb House,</span><br data-dcnode-id="677"><span data-dcnode-id="676" instrument_node="">Rye, England</span><br data-dcnode-id="675"><span data-dcnode-id="674" instrument_node=""> September 1900.</span></i></td></tr></tbody></table></div><br data-dcnode-id="666"><span data-dcnode-id="665" instrument_node="">
</span><a data-dcnode-id="664" name="williamandhenry"></a><span data-dcnode-id="663" instrument_node="">
</span><blockquote data-dcnode-id="656"><span data-dcnode-id="662" instrument_node="">
James was appointed a lecturer on Natural Religion at the University of Edinburgh. He originally planned to deliver ten lectures on two topics. He got involved in "Man's Religious Appetites" and postponed the second part on "Their Satisfaction through Philosophy." He then delivered all twenty lectures on man's religious constitution.</span><p data-dcnode-id="657"><span data-dcnode-id="661" instrument_node="">

In June 1902, James returned from Europe exhausted. Despite an effusive reception in Edinburgh—a hearty rendition of "He's a jolly good fellow" followed him from the hall at the conclusion of his last talk—he ended the trip in low spirits. The intellectual strain of writing, the emotional strain of self-analysis, and the physical strain of travel took a serious toll on his energies. "I was less well than I tho't I was when I started," he wrote to Pauline Goldmark, "having consumed my margin of improvement by writing that terrible book, so I rather went to pieces when I tried to plunge into social actitivies over there [in England] . . . But a sexagenarian is no longer a boy, no longer an expansionist . . . " [from </span><i data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Genuine Reality</span></i><span data-dcnode-id="658" instrument_node="">]
</span></p></blockquote><span data-dcnode-id="655" instrument_node="">
</span><div align="center" data-dcnode-id="636"><span data-dcnode-id="654" instrument_node="">
</span><span data-dcnode-id="650" instrument_node="">
</span><span data-dcnode-id="646" instrument_node="">
</span><span data-dcnode-id="640" instrument_node="">
</span><table data-dcnode-id="637"><tbody data-dcnode-id="638"><tr data-dcnode-id="639"><td data-dcnode-id="651"><a data-dcnode-id="652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/jamesi3.html"><img align="top" border="2" data-dcnode-id="653" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_jamesi3.jpg&amp;raw"></a></td><td data-dcnode-id="647"><a data-dcnode-id="648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/jamesi.html"><img align="top" border="2" data-dcnode-id="649" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_jamesi.jpg&amp;raw"></a></td><td data-dcnode-id="641"><i data-dcnode-id="642"><span data-dcnode-id="645" instrument_node="">Henry and William</span><br data-dcnode-id="644"><span data-dcnode-id="643" instrument_node="">in England. 1901.</span></i></td></tr></tbody></table></div><br data-dcnode-id="635"><span data-dcnode-id="634" instrument_node="">
</span><b data-dcnode-id="629"><span data-dcnode-id="633" instrument_node="">1902 - Publication of </span><i data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Varieties of Religious Experiences</span></i><span data-dcnode-id="630" instrument_node="">. LL.D.  from from Edinburgh University.</span></b><span data-dcnode-id="628" instrument_node="">
</span><blockquote data-dcnode-id="607"><span data-dcnode-id="627" instrument_node="">
The Gifford lectures delivered in Scotland formed the basis for a new book entitled </span><i data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">The Varieties of Religious Experience</span></i><span data-dcnode-id="624" instrument_node="">. Back on home soil, his social activism continued, and he wrote a series of pieces against what he perceived to be America's growing aggression and imperialism. But intellectual expansion was his goal: he was tired, he said, of the "squashy, popular-lecture style" of the books he had produced for the last ten years. Even the </span><i data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Varieties</span></i><span data-dcnode-id="621" instrument_node=""> was not, in his estimation, a "serious, systematic, and syllogistic" contribution to the field of philosophy. "I am convinced that the desire to formulate truths is a virulent disease," he told Sarah Whitman. "It has contracted an alliance lately in me with a feverish personal ambition, which I never had before, and which I recognize as an unholy thing in such a connection. I actually dread to die until I have settled the Universe's hash in one more book." And, he hoped, a book that was nothing less than "epoch making."</span><p data-dcnode-id="613"><span data-dcnode-id="620" instrument_node="">

In the </span><i data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">Varieties</span></i><span data-dcnode-id="617" instrument_node="">, James expanded upon the thesis of his </span><i data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Will to Believe</span></i><span data-dcnode-id="614" instrument_node="">, essentially for the same readers. As usual, he mined his own life and experiences for anecdotes and conclusions; supplementing this material, he drew upon a huge cache of data—amassed by one of his students, who, for a research project of his own, had circulated throughout the Harvard community a questionnaire about religious practices. The sheer weight of these sources made the book appear, James said, "objective" and even superficially "scientific."</span></p><p data-dcnode-id="608"><span data-dcnode-id="612" instrument_node="">

His aim, however, was not to defend religion by scientific proof but to serve a volley in his long "battle of the Absolute" with such philosophical antagonists as Royce. In that battle, against naturalists, on the one hand, and philosophers whom James called "refined supernaturalists," on the other, James created for himself a special position. He was a "piecemeal supernaturalist," he said, one who "admits miracles and providential leadings, and finds no intellectual difficulty in mixing the ideal and the real worlds together." As a piecemeal supernaturalist, he set himself the task of locating those places where the "ideal region" forced itself into "the real world's details" to cause experiences—prayer, epiphany, or visions, for examples—that generated faith. [from </span><i data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Genuine Reality</span></i><span data-dcnode-id="609" instrument_node="">]
</span></p></blockquote><span data-dcnode-id="606" instrument_node="">
</span><a data-dcnode-id="605" name="JamesRoyce"></a><span data-dcnode-id="604" instrument_node="">
</span><b data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">1903 - LL.D.  from Harvard University.</span></b><p data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">

</span><b data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">1904 - Henry James returns to the USA after 20 year absence.</span></b><p data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">
</span></p><blockquote data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">
James was delighted when in 1903 Harvard conferred on him an honorary doctorate, but soon after that he was back on a European sabbatical with brother Henry.</span></blockquote><span data-dcnode-id="558" instrument_node="">

</span><table data-dcnode-id="532"><tbody data-dcnode-id="533"><tr data-dcnode-id="534"><td data-dcnode-id="552"><i data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Alice, 1890s.</span></i></td><td data-dcnode-id="548"><a data-dcnode-id="549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/JamesAlice1890s.html"><img align="top" border="2" data-dcnode-id="550" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_JamesAlice1890s.jpg&amp;raw"></a></td><td data-dcnode-id="544"><a data-dcnode-id="545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/jamesu.html"><img align="top" border="2" data-dcnode-id="546" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_jamesu.jpg&amp;raw"></a></td><td data-dcnode-id="536"><i data-dcnode-id="537"><span data-dcnode-id="542" instrument_node="">Alice and William,</span><br data-dcnode-id="541"><span data-dcnode-id="540" instrument_node=""> in Farmington, Connecticut,</span><br data-dcnode-id="539"><span data-dcnode-id="538" instrument_node="">1904.</span></i></td></tr></tbody></table></div><br data-dcnode-id="530"><span data-dcnode-id="529" instrument_node="">
</span><b data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">1905 - Trip to Mediterranean (with Henry).  Congress at Rome.</span></b><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">
</span></p><blockquote data-dcnode-id="520"><span data-dcnode-id="524" instrument_node="">
James received a welcome boost during a three-month trip to Europe in the spring of 1905. At the end of April, in Rome for the Fifth International Congress of Psychology, he went to the conference hall to register, "and when I gave my name," he told Alice, "the lady who was taking them almost fainted, saying that all Italy loved me, or words to that effect." His effusive admirer called in one of the officers of the congress, who, just as impressed, implored James to give a talk at one of the general meetings. "So I'm in for it again," James admitted with delight, "having no power to resist flattery." [from </span><i data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">Genuine Reality</span></i><span data-dcnode-id="521" instrument_node="">]
</span></blockquote><span data-dcnode-id="519" instrument_node="">

Cambridge, circa 1905.</span></i></td></tr></tbody></table></div><span data-dcnode-id="499" instrument_node="">

</span><table data-dcnode-id="473"><tbody data-dcnode-id="474"><tr data-dcnode-id="475"><td data-dcnode-id="495"><i data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">James circa 1905.</span></i></td><td data-dcnode-id="491"><a data-dcnode-id="492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/jamesz.html"><img align="top" border="2" data-dcnode-id="493" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_jamesz.jpg&amp;raw"></a></td><td data-dcnode-id="487"><a data-dcnode-id="488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/jamesz3.html"><img align="top" border="2" data-dcnode-id="489" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_jamesz3.jpg&amp;raw"></a></td><td data-dcnode-id="483"><a data-dcnode-id="484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/jamesn.html"><img align="top" border="2" data-dcnode-id="485" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_jamesn.jpg&amp;raw"></a></td><td data-dcnode-id="477"><i data-dcnode-id="478"><span data-dcnode-id="481" instrument_node="">James and Theodore Flournoy,&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span><br data-dcnode-id="480"><span data-dcnode-id="479" instrument_node="">May 18, 1905.</span></i></td></tr></tbody></table></div><br data-dcnode-id="471"><span data-dcnode-id="470" instrument_node="">
</span><b data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">
1906 - Acting professor for half term at Stanford University. Experiences the San Francisco earthquake.</span></b><br data-dcnode-id="467"><span data-dcnode-id="466" instrument_node="">
</span><blockquote data-dcnode-id="461"><span data-dcnode-id="465" instrument_node="">
In 1906, James accepted an invitation to spend a term at Stanford University ad, while there, he experienced the earthquake that very nearly destroyed San Francisco. James and Alice survived unscathed, losing only some pottery to the calamity. Later that year he delivered the Lowell Lectures in Boston—lectures which subsequently served as the foundation for </span><i data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Pragmatism: A New Name for Old Ways of Thinking.</span></i><span data-dcnode-id="462" instrument_node=""> James was now at the height of his eminence both in philosophy and psychology. Although pragmatism had more than its share of detractors, it was also promoted by powerful allies such as the up and coming English philosopher Canning Schiller and the American educator, philosopher, and psychologist John Dewey. But James was the preeminent voice.
</span></blockquote><span data-dcnode-id="460" instrument_node="">
</span><div align="center" data-dcnode-id="438"><span data-dcnode-id="459" instrument_node="">
</span><span data-dcnode-id="455" instrument_node="">
</span><span data-dcnode-id="451" instrument_node="">
</span><span data-dcnode-id="447" instrument_node="">
</span><span data-dcnode-id="443" instrument_node="">
</span><table data-dcnode-id="440"><tbody data-dcnode-id="441"><tr data-dcnode-id="442"><td data-dcnode-id="456"><i data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Canning Schiller</span></i></td><td data-dcnode-id="452"><a data-dcnode-id="453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/Schiller.html"><img align="top" border="2" data-dcnode-id="454" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_Schiller.jpg&amp;raw"></a></td><td data-dcnode-id="448"><a data-dcnode-id="449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/Dewey1885.html"><img align="top" border="2" data-dcnode-id="450" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_Dewey1885.jpg&amp;raw"></a></td><td data-dcnode-id="444"><i data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">John Dewey, c. 1885&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></i></td></tr></tbody></table><span data-dcnode-id="439" instrument_node="">
</span></div><p data-dcnode-id="429"><span data-dcnode-id="437" instrument_node="">
</span><b data-dcnode-id="432"><span data-dcnode-id="436" instrument_node="">
1906-1907 - Lectures on </span><i data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Pragmatism</span></i><span data-dcnode-id="433" instrument_node="">, Lowell Institute and Columbia.</span></b><br data-dcnode-id="431"><span data-dcnode-id="430" instrument_node="">
</span></p><blockquote data-dcnode-id="417"><span data-dcnode-id="428" instrument_node="">
When James returned to Cambridge at the end of September, he set to work, finally, on a series of Lowell lectures scheduled for early November, to be repeated at Columbia University in January. Although he complained, as usual, that the lectures demanded nothing more than a popularized version of his ideas, he found himself newly inspired by this effort to write a coherent exposition about pragmatism. "I didn't know, until I came to prepare them," he told Flournoy, "how full of power to found a 'school' and to become a 'cause,' the pragmatistic idea was. But now I am all aflame with it, as displacing all rationalistic systems . . . and I mean to turn the lectures into a solid little cube of a book . . . which will, I am confident, make the pragmatic method appear, to you also, as the philosophy of the future.</span><p data-dcnode-id="423"><span data-dcnode-id="427" instrument_node="">

"Pragmatism," he said, was nothing more than a new name for aold ways of thinking, ways of thinking that preceded the separation of science from its origins in philosophy. This attempt to ensure the status of philosophy by drawing it closer to its scientific origins was, as Charles Peirce observed, trendy scholarship, and not unique to James. "Today," Peirce remarked, "the animating endeavor of the younger philosophers is to bring their queen within the circle of the genuine sciences." Certainly James, even at the age of sixty-four, saw himself among those "younger" philosophers (he was "eternally young," Royce said enviously) who argued that philosophy and science essentially rely on the same methods: "observing, comparing, classifying, tracing analogies, making hypotheses." But philosophy, for at least three hundred years, had been focused on developing "closed systems" that increasingly divorced it from the vicious, tangled, painful" exigencies of real life. "Philosophy," James insisted, "</span><i data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">should</span></i><span data-dcnode-id="424" instrument_node=""> become as empirical as any science.</span></p><p data-dcnode-id="418"><span data-dcnode-id="422" instrument_node="">

For James, pragmatism tempered empiricism with humanism; the observer, the thinker, the seeker after truth, was necessarily implicated in the process of inquiry and experimentation. Pragmatism, then, invested each individual with the authority to determine truths; privileged what James called "percepts" over abstract concepts; and linked philosophical decisions to moral actions. [from </span><i data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">Genuine Reality</span></i><span data-dcnode-id="419" instrument_node="">]
</span></p></blockquote><span data-dcnode-id="416" instrument_node="">
</span><a data-dcnode-id="415" name="pragmatism"></a><span data-dcnode-id="414" instrument_node="">
</span><b data-dcnode-id="409"><span data-dcnode-id="413" instrument_node="">1907 - Publication of </span><i data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Pragmatism</span></i><span data-dcnode-id="410" instrument_node="">.</span></b><p data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">
</span></p><div align="center" data-dcnode-id="390"><span data-dcnode-id="406" instrument_node="">
</span><span data-dcnode-id="402" instrument_node="">
</span><span data-dcnode-id="398" instrument_node="">
</span><span data-dcnode-id="394" instrument_node="">
</span><table data-dcnode-id="391"><tbody data-dcnode-id="392"><tr data-dcnode-id="393"><td data-dcnode-id="403"><a data-dcnode-id="404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/James1905-1910.html"><img align="top" border="2" data-dcnode-id="405" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_James1905-1910.jpg&amp;raw"></a></td><td data-dcnode-id="399"><a data-dcnode-id="400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/jamesb.html"><img align="top" border="2" data-dcnode-id="401" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_jamesb.jpg&amp;raw"></a></td><td data-dcnode-id="395"><i data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">William James 1905-1910.</span></i></td></tr></tbody></table></div><br data-dcnode-id="389"><span data-dcnode-id="388" instrument_node="">
</span><blockquote data-dcnode-id="378"><span data-dcnode-id="387" instrument_node="">
Just as he is acknowledged as the father of American psychology, William James is also recognized as the father of American pragmatism, an idea that he credited to Charles Sanders Peirce but which, in James's hands, became one of the prevailing philosophical movements of the 20th century. It became also one of the most criticized, misinterpreted, and ill-used philosophical movements of the 20th century to the point where, in modern parlance, being "pragmatic" has become synonymous with being practical, expedient, and relativistic, each independent of moral and ethical ramifications.</span><p data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">

Of course, that is not how James viewed or expounded pragmatism, which was for him more method than philosophy, a method for resolving philosophical disputes, for arriving at the meaning and truth of ideas. Originally expounded by Peirce in 1878 in an article entitled "How to Make Our Ideas Clear," the pragmatic method, as James came to define it, aimed to discover the truth of an idea by determining its agreement with reality, "be such realities concrete or abstract." Ideas, argued James, are ultimately functional. They do not possess innate or fixed qualities. Rather, "truth happens to an idea," and it happens when "we can assimilate, validate, corroborate, and verify" it. Pragmatism also asks its practitioners to consider the value of an idea in terms of its personal utility—"Grant an idea or belief to be true, it says, what concrete difference will its being true make in anyone's actual life? How will the truth be realized? What experiences will be different from those which would obtain if the belief were false? What, in short, is the truth's cash-value in experiential terms?" But determining the cash value of an idea also involves determining its practical, ethical/moral, and intellectual consequences.</span></p><p data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">

When Jamesian passages are lifted out of their contextual moorings, they can be used to illustrate and defend the view that pragmatism asks nothing of truth but that it be practical, useful, and personally self-serving. James wrote that "truth in our ideas means their power to work"; "A new opinion counts as 'true' just in proportion as it gratifies the individual's desire to assimilate the novel in his experience to his beliefs in stock"; "The true is the name of whatever proves itself to be good in the way of belief, and good, too, for definite, assignable reasons"; "'What would be better for us to believe!' This sounds very like a definition of truth."</span></p><p data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">

James himself was aware of "how odd it must seem to some of you to hear me say that an idea is 'true' so long as to believe it is profitable to our lives," and he worked both to clarify his definition of pragmatism and to emphasize the moral element that accompanies it. But it was not James's pragmatism that caught the fancy of America as it turned into a new century. The land of the individual, of the entrepreneur, and of the competitive marketplace preferred the wrongly understood, self-oriented, practical, expedient approach. James would struggle through his remaining years both against critics whom he believed misinterpreted his pragmatism and against admirers who sang its praises and used a mutated form to defend and promulgate their political or philosophical agendas.</span></p><p data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">

He  would also struggle against the growing atomistic and mechanistic tendencies in psychology. He dreaded the encroachment of this "microscopic psychology" that was "carried on by experimental methods, asking of course every moment for introspective data, but eliminating their uncertainty by operating on a large scale and taking statistical means. This method taxes patience at the utmost, and could hardly have arisen in a country whose natives could be bored" (Perry, 1935b, p. 114). Nonetheless, the growing successes of behaviorist psychology, which was turning the new experimental laboratories into laboratories geared at discovering the roots of animal learning, isolated James from many of his colleagues and from the discipline. In time, he began to lose interest in formal psychology and turned his attention to philosophical pursuits. He developed as well a curiosity for unusual states of consciousness, psychic phenomena, and religious experience. He began also to apply the principles of his psychology and the fruits of his philosophical thinking to other areas of human endeavor. </span></p></blockquote><span data-dcnode-id="377" instrument_node="">
</span><a data-dcnode-id="376" name="emerson"></a><span data-dcnode-id="375" instrument_node="">
</span><b data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">
1907 - Final resignation from Harvard.</span></b><span data-dcnode-id="372" instrument_node="">
</span><blockquote data-dcnode-id="367"><span data-dcnode-id="371" instrument_node="">
William James taught his last class at Harvard on Tuesday, January 22, 1907. On that day his </span><a data-dcnode-id="369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/JamesEmersonHall.html"><span data-dcnode-id="370" instrument_node="">classroom in Emerson Hall</span></a><span data-dcnode-id="368" instrument_node=""> overflowed with his own students, former students, colleagues, and Harvard administrators. Even Alice snuck in to view the proceedings. A committee of his graduate students and teaching assistants presented him with a silver-mounted inkwell. His undergraduates gave him a loving cup. Sigmund Freud would have deemed it most appropriate. The gifts represented an acknowledgment by his students of the quality of their professor's work and the appreciation for his love. James was genuinely touched and surprised, remarking on "how warm-hearted the world around one is." 
</span></blockquote><span data-dcnode-id="366" instrument_node="">
</span><div align="center" data-dcnode-id="333"><span data-dcnode-id="365" instrument_node="">
</span><span data-dcnode-id="361" instrument_node="">

br data-dcnode-id="341"><span data-dcnode-id="340" instrument_node="">1907.</span></i></td></tr></tbody></table></div><br data-dcnode-id="332"><span data-dcnode-id="331" instrument_node="">
