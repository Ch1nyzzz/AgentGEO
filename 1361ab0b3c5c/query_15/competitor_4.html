1908-1909 - Hibbert Lectures at Oxford.</span></b><p data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">
</span></p><div align="center" data-dcnode-id="310"><span data-dcnode-id="326" instrument_node="">
</span><span data-dcnode-id="322" instrument_node="">
</span><span data-dcnode-id="314" instrument_node="">
</span><table data-dcnode-id="311"><tbody data-dcnode-id="312"><tr data-dcnode-id="313"><td data-dcnode-id="323"><a data-dcnode-id="324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/jamesv.html"><img align="top" border="2" data-dcnode-id="325" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_jamesv.jpg&amp;raw"></a></td><td data-dcnode-id="315"><i data-dcnode-id="316"><span data-dcnode-id="321" instrument_node="">in the garden at Lamb House,</span><br data-dcnode-id="320"><span data-dcnode-id="319" instrument_node="">Henry James's home in England</span><br data-dcnode-id="318"><span data-dcnode-id="317" instrument_node="">July 1908.</span></i></td></tr></tbody></table></div><br data-dcnode-id="309"><span data-dcnode-id="308" instrument_node="">
</span><blockquote data-dcnode-id="287"><span data-dcnode-id="307" instrument_node="">By the Spring of 1909, James's cardiac symptoms had returned, and he became "tormented by desire to go to Nauheim." The usually reliable Hawley Lymph Compound provided no improvement, and by fall he had descended to "a state of nervous prostration like that which I fell into after Nauheim 10 years ago." One physician prescribed laxatives, but they only made the symptoms worse.</span><p data-dcnode-id="296"><span data-dcnode-id="306" instrument_node="">

It is no surprise that James's collapse coincided with the publication of the Hibbert lectures and the hostile reaction the book [</span><i data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">A Pluralistic Universe</span></i><span data-dcnode-id="303" instrument_node="">] received. James tried to convince himself that the criticism really indicated the significance of his work. "It is already evident from the letters I am getting about the 'Pluralistic Universe,'" he informed Flournoy, "that the book will 1) be </span><i data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">read</span></i><span data-dcnode-id="300" instrument_node="">; 2) be </span><i data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">rejected</span></i><span data-dcnode-id="297" instrument_node=""> almost unanimously at first, and for very diverse reasons; but 3) will continue to be bought and referred to, and will end by strongly influencing english philosophy."</span></p><p data-dcnode-id="288"><span data-dcnode-id="295" instrument_node="">

Henry understood immediately that his brother needed praise and more praise. "t may sustain &amp; inspire you a little to know that I'm </span><i data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">with</span></i><span data-dcnode-id="292" instrument_node=""> you, all along the line—&amp; can conceive of no sense in any philosophy that is not yours!" he told William. "As an artist &amp; a 'creator' I can catch on, hold on, to pragmatism, &amp; can work in the light of it &amp; apply it." [from </span><i data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">Genuine Reality</span></i><span data-dcnode-id="289" instrument_node="">]
</span></p></blockquote><span data-dcnode-id="286" instrument_node="">
</span><b data-dcnode-id="281"><span data-dcnode-id="285" instrument_node="">
1909 - Publication of </span><i data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">A Pluralistic Universe</span></i><span data-dcnode-id="282" instrument_node="">.</span></b><br data-dcnode-id="280"><span data-dcnode-id="279" instrument_node="">
</span><div align="center" data-dcnode-id="266"><span data-dcnode-id="278" instrument_node="">
</span><span data-dcnode-id="274" instrument_node="">
</span><span data-dcnode-id="270" instrument_node="">
</span><table data-dcnode-id="267"><tbody data-dcnode-id="268"><tr data-dcnode-id="269"><td data-dcnode-id="275"><a data-dcnode-id="276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/jamesvv.html"><img align="top" border="2" data-dcnode-id="277" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_jamesvv.JPG&amp;raw"></a></td><td data-dcnode-id="271"><i data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">1909, age 67.</span></i></td></tr></tbody></table></div><br data-dcnode-id="265"><span data-dcnode-id="264" instrument_node="">
</span><blockquote data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">
It is consistent with James's interdisciplinary mind, his "catholicity of spirit," that he should view the solution to each question in psychology from a variety of perspectives and that he should urge others to do likewise. He had wrestled with the problem of monism, the view that reality represents a unified whole, and found it deficient for a number of reasons. It violated the dynamic nature of personal experience, constrained the character and expression of reality, and resulted in mechanistic and absolute conceptions of the world. This was for James "the most central of all philosophical problems," and one he had resolved by proposing a pluralistic view of the universe—"the world of concrete personal experiences . . . is multitudinous beyond imagination, tangled, muddy, painful, and perplexed."  How could understandings of these experiences be otherwise? Pluralism represented for James a belief in concert with his brand of radical empiricism and with the pragmatist philosophy he would adopt. It represented also his conviction that the facts of the world can be understood only when they are embedded in their local conditions.
</span></blockquote><span data-dcnode-id="261" instrument_node="">
</span><b data-dcnode-id="256"><span data-dcnode-id="260" instrument_node="">1909 - Publication of </span><i data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">The Meaning of Truth</span></i><span data-dcnode-id="257" instrument_node="">.</span></b><span data-dcnode-id="255" instrument_node="">
</span><blockquote data-dcnode-id="235"><span data-dcnode-id="254" instrument_node="">
James wanted praise for his work from all quarters. That praise, however, did not come after the publication of </span><i data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">A Pluralistic Universe</span></i><span data-dcnode-id="251" instrument_node="">. Nor did it come the following September, when James published a sequel to his maligned </span><i data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">Pragmatism</span></i><span data-dcnode-id="248" instrument_node="">. He hoped </span><i data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">The Meaning of Truth</span></i><span data-dcnode-id="245" instrument_node=""> would "keep the pot of public interest in the subject boiling." Perhaps the pot was boiling, but James felt scorched by some critics, notably his former student Dickinson Miller; the young American philosopher Boyd Henry Bode, who aired his objections to James in the </span><i data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">Journal of Philosophy</span></i><span data-dcnode-id="242" instrument_node="">; and the brilliant, thirty-six-year-old British philosopher Bertrand Russell, who had met James during a visit to America in 1896, and whose </span><i data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">Principles of Mathematics</span></i><span data-dcnode-id="239" instrument_node="">, when it appeared in 1902, established him as a logician of formidable stature. [from </span><i data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">Genuine Reality</span></i><span data-dcnode-id="236" instrument_node="">]
</span></blockquote><p data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">
</span></p><blockquote data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">On July 8, James startled the scientific community by announcing that he had communicated with the spirit of Richard Hodgson. James  wrote a 100-page account of this communication in the "Proceedings of the American for Psychical Research," including verbatim records of the conversation.</span></blockquote><span data-dcnode-id="230" instrument_node="">
</span><div align="center" data-dcnode-id="215"><span data-dcnode-id="229" instrument_node="">
</span><span data-dcnode-id="225" instrument_node="">
</span><span data-dcnode-id="219" instrument_node="">
</span><table data-dcnode-id="216"><tbody data-dcnode-id="217"><tr data-dcnode-id="218"><td data-dcnode-id="226"><a data-dcnode-id="227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/jamesx.html"><img align="top" border="2" data-dcnode-id="228" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_jamesx.jpg&amp;raw"></a></td><td data-dcnode-id="220"><i data-dcnode-id="221"><span data-dcnode-id="224" instrument_node="">William James's library and study </span><br data-dcnode-id="223"><span data-dcnode-id="222" instrument_node="">at 95 Irving Street.</span></i></td></tr></tbody></table></div><br data-dcnode-id="214"><span data-dcnode-id="213" instrument_node="">
</span><b data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">
1910 - In Europe, March to August.</span></b><p data-dcnode-id="209"><span data-dcnode-id="210" instrument_node="">
</span></p><div align="center" data-dcnode-id="192"><span data-dcnode-id="208" instrument_node="">
</span><span data-dcnode-id="204" instrument_node="">
</span><span data-dcnode-id="196" instrument_node="">
</span><table data-dcnode-id="193"><tbody data-dcnode-id="194"><tr data-dcnode-id="195"><td data-dcnode-id="205"><a data-dcnode-id="206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/jamesm.html"><img align="top" border="2" data-dcnode-id="207" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_jamesm.jpg&amp;raw"></a></td><td data-dcnode-id="197"><i data-dcnode-id="198"><span data-dcnode-id="203" instrument_node="">Portrait by Ellen Emmet Rand.</span><br data-dcnode-id="202"><span data-dcnode-id="201" instrument_node=""> Hung in Faculty Room, </span><br data-dcnode-id="200"><span data-dcnode-id="199" instrument_node="">University Hall, Harvard.</span></i></td></tr></tbody></table></div><br data-dcnode-id="191"><span data-dcnode-id="190" instrument_node="">
</span><blockquote data-dcnode-id="185"><span data-dcnode-id="189" instrument_node="">
But James was not well, and his health was deteriorating. He made one final, brief trip to Europe to look in on an ailing Henry and take the baths at Nauheim before he returned to his country home in Chocoura, New Hampshire. There, just before 2:30 in the afternoon of August 26 of 1910, William James passed away cradled in the arms of his wife Alice. He was 68. An autopsy revealed that he had died of an enlarged heart. Two years after his death, a number of his articles were collected and posthumously published as </span><i data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">Essays in Radical Empiricism</span></i><span data-dcnode-id="186" instrument_node="">.
</span></blockquote><span data-dcnode-id="184" instrument_node="">
</span><b data-dcnode-id="182"><span data-dcnode-id="183" instrument_node="">1910 - Died.  Chocorua, August 26, at the age of 68.</span></b><p data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">
</span></p><blockquote data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">
Alice and Henry knew that William was dying: "he suffered so &amp; only wanted, wanted more &amp; more, to go," Henry said. The next day, he was worse. He told Alice he longed to die and asked her to rejoice for him. Early in the afternoon of August 26, Alice came into William's bedroom with some milk, the only sustenance he had been able to take since he came home. At first she thought he was alseep, but suddenly she realized that something had changed: he was unconscious. She cradled his head in her arms, listening to his quiet breathing. Just before 2:30, still lying in Alice's arms, he died.</span></blockquote><span data-dcnode-id="177" instrument_node="">
</span><div align="center" data-dcnode-id="159"><span data-dcnode-id="176" instrument_node="">
</span><span data-dcnode-id="174" instrument_node="">
</span><span data-dcnode-id="170" instrument_node="">
</span><span data-dcnode-id="166" instrument_node="">
</span><span data-dcnode-id="164" instrument_node="">
</span><table data-dcnode-id="161"><tbody data-dcnode-id="162"><tr data-dcnode-id="163"><td data-dcnode-id="175"></td><td data-dcnode-id="171"><a data-dcnode-id="172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/jameslast1.html"><img align="top" border="2" data-dcnode-id="173" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_jameslast3.jpg&amp;raw"></a></td><td data-dcnode-id="167"><a data-dcnode-id="168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/jameslast2.html"><img align="top" border="2" data-dcnode-id="169" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_jameslast2.jpg&amp;raw"></a></td><td data-dcnode-id="165"></td></tr></tbody></table><span data-dcnode-id="160" instrument_node="">
</span></div><p data-dcnode-id="157"><span data-dcnode-id="158" instrument_node="">
</span></p><blockquote data-dcnode-id="152"><span data-dcnode-id="156" instrument_node="">
Billy photographed his father's body as it lay in rumpled white sheets on the iron bed; he made a death mask, and then the body was removed for the autopsy that Alice had requested. "Acute enlargement of the heart," she recorded in her diary. "He had worn himself out." [from </span><i data-dcnode-id="154"><span data-dcnode-id="155" instrument_node="">Genuine Reality</span></i><span data-dcnode-id="153" instrument_node="">]
</span></blockquote><span data-dcnode-id="151" instrument_node="">
</span><div align="center" data-dcnode-id="139"><span data-dcnode-id="150" instrument_node="">
</span><span data-dcnode-id="148" instrument_node="">
</span><span data-dcnode-id="144" instrument_node="">
</span><table data-dcnode-id="141"><tbody data-dcnode-id="142"><tr data-dcnode-id="143"><td data-dcnode-id="149"></td><td data-dcnode-id="145"><a data-dcnode-id="146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/JamesDeathNotice.html"><img align="top" border="2" data-dcnode-id="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_JamesDeathNotice.jpg&amp;raw"></a></td></tr></tbody></table><span data-dcnode-id="140" instrument_node="">
</span></div><p data-dcnode-id="132"><span data-dcnode-id="138" instrument_node="">
</span><b data-dcnode-id="133"><span data-dcnode-id="137" instrument_node="">1912 - Posthumous publication of </span><i data-dcnode-id="135"><span data-dcnode-id="136" instrument_node="">Essays in Radical Empiricism</span></i><span data-dcnode-id="134" instrument_node="">.</span></b></p><p data-dcnode-id="130"><span data-dcnode-id="131" instrument_node="">
</span></p><blockquote data-dcnode-id="126"><span data-dcnode-id="129" instrument_node="">
As did John Locke's empiricism, James's radical empiricism represented a break with Cartesian notions that the real world is an extension of a larger world that exists within the mind. Whereas Locke's empiricism became foundational to positivist views that would focus exclusively on an individuals' experienced reality as the fons et origo of their psychologies, James's "radical" view of reality had a pronounced phenomenological bent. For James, mental events stood on an equal footing with observable events as representations of reality. Consequently, "ideas, feelings, sensations, perceptions, concepts, art, science, faith, conscious, unconscious, objects, and so-called illusions" each merited attention and investigation (Barzun, 1983, p. 111). James believed that an individual's immediate experience represented the essence of psychological truth. Moreover, the mental and physical events—the immediate experiences—that an individual uses both for self-understanding and to understand others are selected and interpreted by the individual.</span><p data-dcnode-id="127"><span data-dcnode-id="128" instrument_node="">

Radical empiricism represented a break with Cartesian notions of mind-body duality. According to James, whether mental events were or were not simply a function of the external world, they could influence human functioning independently of that world and so merited attention on their own terms. Although the dominance of positivist psychology throughout many of the decades that followed James resulted in a large part of the discipline eschewing his brand of radical empiricism, James's argument that mental states were appropriate subjects of investigation won the day in a number of areas within psychology. It was, of course, a basic staple in Freud's psychodynamic theories, and it has adherents in personality research; social, clinical, and child psychology; abnormal psychology; and educational and school psychology.
</span></p></blockquote><span data-dcnode-id="125" instrument_node="">
