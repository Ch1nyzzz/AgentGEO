</span></div><span data-dcnode-id="1839" instrument_node="">
</span><blockquote data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">William's father, Henry James Sr., was one of 13 children born to an Irish immigrant. By the time his own children were born, Henry had inherited wealth from his father. At the time of William's birth, Henry and his wife Mary  lived in New York City, where Henry studied theology, philosophy, and mysticism. Having rejected his fathe's Presbyterianism, he followed the teachings of Swedish Christian mystic Emanuel Swedenborg. </span></blockquote><span data-dcnode-id="1836" instrument_node="">
</span><blockquote data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">
["Born in New York City in 1842, William James was a child of privilege and by all odds should have become a playboy or, at best, a dilettante."]
</span></blockquote><span data-dcnode-id="1833" instrument_node="">
</span><blockquote data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">William James was born in New York City on January 11, 1842, to an affluent, cosmopolitan, and deeply religious family. His father Henry dabbled in theology, doted on his five children, was well connected to literary and philosophical luminaries of the day, and often took the family for extended stays in Europe. His journeys to the continent were primarily theological and philosophical odysseys intended to resolve his conflicting spiritual bouts. His right leg had been amputated after burns suffered in a boyhood accident failed to heal. His spirit never quite recovered. A devoted father, he sought to provide his children with the sort of education that might enable them some day to outdistance their countrymen both in erudition and in breadth of knowledge. To this end, he enrolled them in fine schools, obtained for them gifted tutors, and saw to it that they frequented museums and attended lectures and the theater with regularity. William and two of his siblings would give fruit to their father's liberal educational efforts. Brother Henry became one of America's most famed novelists, and sister Alice acquired a literary reputation of her own after her diaries were posthumously published. 
</span></blockquote><span data-dcnode-id="1830" instrument_node="">
</span><b data-dcnode-id="1822"><span data-dcnode-id="1829" instrument_node="">
1843 - His brother Henry is born. New York City, April 15.</span><br data-dcnode-id="1828"><span data-dcnode-id="1827" instrument_node="">
1843-1845 - Father Henry Sr. takes the family to Europe.</span><br data-dcnode-id="1826"><span data-dcnode-id="1825" instrument_node="">
1845 - Brother Garth Wilkinson is born.</span><br data-dcnode-id="1824"><span data-dcnode-id="1823" instrument_node="">
1846 - Brother Robertson is born.</span></b><span data-dcnode-id="1821" instrument_node="">
</span><blockquote data-dcnode-id="1811"><span data-dcnode-id="1820" instrument_node="">
Whenever Henry became deeply troubled, his immediate environment became intolerable, and his first move was flight. He not only needed to get out of the house, he needed to get out of New York City. In May, 1843, a month after Harry was born, Henry put his house up for sale. The profit on the transaction, he decided, would finance a radical change for the Jameses. At first, he thought he might move to the country, separating himself physically from the intellectual centers that he found so hostile, and "communicate with my </span><i data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">living</span></i><span data-dcnode-id="1817" instrument_node=""> kind, not my talking kind—by life only." But he realized that living an exemplary life, unheralded, would not satisfy him.</span><p data-dcnode-id="1812"><span data-dcnode-id="1816" instrument_node="">

There was, of course, another route, one sanctioned by many Americans of his class: settling in Europe. By the summer of 1843, he decided to leave America. "Mr. James talks of going to Germany soon with his wife—to learn the language," Thoreau told Emerson. "He says he must know it—can never learn it here—there he may absorb it and is very anxious to learn beforehand where he had best locate himself, to enjoy the advantage of the highest culture, learn the language in its purity, and not exceed his limited means." But by the of the summer, Henry had changed his mind about the destination. It would not be Germany, where without the language, he would be at a serious disadvantage in participating in "the highest culture"; instead, he would take his family to England. [from Linda Simon's </span><i data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">Genuine Reality</span></i><span data-dcnode-id="1813" instrument_node="">]
</span></p></blockquote><span data-dcnode-id="1810" instrument_node="">
</span><b data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">1847 - The James family rents a house at 11 Fifth Avenue in Manhattan.</span></b><span data-dcnode-id="1807" instrument_node="">
</span><blockquote data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">
By late autumn, Mary was pregnant with her fifth child, and the Jameses finally decided to settle in New York City. Their long visits to Albany had been crucial for Henry: at last, he had proved to his many relatives that he was  not the ne'er-do-well who had shamed his father, but the respectable head of a quickly growing family and an industrious writer and lecturer.
</span></blockquote><span data-dcnode-id="1804" instrument_node="">
</span><b data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">1848 - Sister Alice is born August 7.</span></b><br data-dcnode-id="1801"><span data-dcnode-id="1800" instrument_node="">
</span><b data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">1852-1855 - William attends school in New York.</span></b><span data-dcnode-id="1797" instrument_node="">
</span><blockquote data-dcnode-id="1788"><span data-dcnode-id="1796" instrument_node="">
In 1852, Henry decided that the boys should learn languages more systematically than they did with one or another of their tutors, and to that end sent them, finally, to the Institution Vergnes, not far from the Jameses' home. The school was presided over by Vergnes himself, and elderly, irritable schoolmaster who set a rigid curriculum for his charges, mostly boys from well-to-do Mexican and Cuban families. Harry [Henry Jr.] remembered a "complete failure of blondness" in the generally gloomy atmosphere. The boys learned some French, but Henry, dissatisfied as usual, allowed them to attend only for one year.</span><p data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">

Richard Pulling Jenks ran a smaller school nearby, with only a few rooms, staffed by only a few teachers. A Mr. Dolmidge, lean, beardless, and mild mannered, taught writing; a Mr. Coe, drawing. Coe, a large man with a shock of thick white hair and a commanding presence, was a talented teacher, inspiring by encouragement and by involving the students in his own work, which ranged from tiny "drawing cards" to larger oils on panel boards. At eleven, William discovered that he loved to draw. Now, anyone looking for him at home could be sure to find him in the back parlor, bent over his pad, drawing for hours on end, absorbed and totally content.</span></p><p data-dcnode-id="1789"><span data-dcnode-id="1793" instrument_node="">

The boys had attended the Pulling Jenks school for a year when Henry again decided to withdraw them and try another school. At the ages of ten and eleven, Harry and William began to inquire about why they were taken away from a school they so much enjoyed. Their parents gave them no reason, however, and the boys were left to draw their own conclusions. But if we look at later patterns of Henry's separating William from schools and mentors, it is likely that William's enthusiasm for art and for Mr. Coe frightened his father. If Coe gave William the emotional support that he needed, if he affirmed the child's talents, he threatened to supplant Henry's influence over his son. Henry could not allow that to happen. [from </span><i data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">Genuine Reality</span></i><span data-dcnode-id="1790" instrument_node="">]
</span></p></blockquote><span data-dcnode-id="1787" instrument_node="">
</span><b data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">1855-1858 - School and private tutors in England and France.</span></b><p data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">
</span></p><div align="center" data-dcnode-id="1768"><span data-dcnode-id="1782" instrument_node="">
</span><span data-dcnode-id="1778" instrument_node="">
</span><span data-dcnode-id="1772" instrument_node="">
</span><table data-dcnode-id="1769"><tbody data-dcnode-id="1770"><tr data-dcnode-id="1771"><td data-dcnode-id="1779"><a data-dcnode-id="1780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/jameso.html"><img align="top" border="2" data-dcnode-id="1781" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_jameso.jpg&amp;raw"></a></td><td data-dcnode-id="1773"><i data-dcnode-id="1774"><span data-dcnode-id="1777" instrument_node="">William James in 1858, </span><br data-dcnode-id="1776"><span data-dcnode-id="1775" instrument_node="">age 16.</span></i></td></tr></tbody></table></div><span data-dcnode-id="1767" instrument_node="">
</span><blockquote data-dcnode-id="1757"><span data-dcnode-id="1766" instrument_node="">
When William departed on the </span><i data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">Atlantic</span></i><span data-dcnode-id="1763" instrument_node=""> with his family in the summer of 1855, he left not only his friends and the home where he had spent most of his childhood, but a sense of independence that he would not recapture in Europe. [from </span><i data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">Genuine Reality</span></i><span data-dcnode-id="1760" instrument_node="">]</span><p data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">

During 1857-58 he attended school in Boulogne.
</span></p></blockquote><span data-dcnode-id="1756" instrument_node="">
</span><a data-dcnode-id="1755" name="1859"></a><span data-dcnode-id="1754" instrument_node="">
</span><b data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">1858-1859 - Family to Newport, Rhode Island. James attends school in Newport.</span></b><br data-dcnode-id="1751"><span data-dcnode-id="1750" instrument_node="">
</span><blockquote data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">
William was exuberant when his father decided that instead of leaving London at the end of July, the family would depart six weeks earlier. On June 30, 1858, he was back in America at last. The family spent July reunited with their many relatives in Albany.</span></blockquote><span data-dcnode-id="1747" instrument_node="">
</span><div align="center" data-dcnode-id="1720"><span data-dcnode-id="1746" instrument_node="">
</span><span data-dcnode-id="1738" instrument_node="">
</span><span data-dcnode-id="1734" instrument_node="">
</span><span data-dcnode-id="1730" instrument_node="">
</span><span data-dcnode-id="1724" instrument_node="">
</span><table data-dcnode-id="1721"><tbody data-dcnode-id="1722"><tr data-dcnode-id="1723"><td data-dcnode-id="1739"><i data-dcnode-id="1740"><span data-dcnode-id="1745" instrument_node="">William James</span><br data-dcnode-id="1744"><span data-dcnode-id="1743" instrument_node="">circa 1859</span><br data-dcnode-id="1742"><span data-dcnode-id="1741" instrument_node="">age 17.</span></i></td><td data-dcnode-id="1735"><a data-dcnode-id="1736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/jamesoo.html"><img align="top" border="2" data-dcnode-id="1737" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_jamesoo.JPG&amp;raw"></a></td><td data-dcnode-id="1731"><a data-dcnode-id="1732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/JamesHenryByLafarge.html"><img align="top" border="2" data-dcnode-id="1733" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_JamesHenryByLafarge.jpg&amp;raw"></a></td><td data-dcnode-id="1725"><i data-dcnode-id="1726"><span data-dcnode-id="1729" instrument_node="">Henry James</span><br data-dcnode-id="1728"><span data-dcnode-id="1727" instrument_node="">
portrait by John La Farge, 1862.</span></i></td></tr></tbody></table></div><span data-dcnode-id="1719" instrument_node="">
</span><blockquote data-dcnode-id="1714"><span data-dcnode-id="1718" instrument_node="">James had toyed with the idea of becoming a painter, and while taking lessons in the Newport, Rhode Island, studio of William Morris 
Hunt in 1859 and 1860, he and his younger brother and fellow student Henry met John La Farge, who had recently returned from studying art in Paris. ["He was seventeen when Darwin's </span><i data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">Origin of Species</span></i><span data-dcnode-id="1715" instrument_node=""> appeared (1859)."]
</span></blockquote><span data-dcnode-id="1713" instrument_node="">
</span><b data-dcnode-id="1709"><span data-dcnode-id="1712" instrument_node="">1859-1860 - Back overseas.  School and private tutors in Switerland and Germany.</span><br data-dcnode-id="1711"><span data-dcnode-id="1710" instrument_node="">
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Attends Geneva Academy (a European university)</span></b><span data-dcnode-id="1708" instrument_node="">
</span><blockquote data-dcnode-id="1699"><span data-dcnode-id="1707" instrument_node="">
By early September of 1858 Henry Sr. was so irritated that he decided he had made a mistake to come back to America at all. "I have grown so discouraged about the education of my children here, and dread so those inevitable habits of extravagance and insubordination which appear to be the characteristics of American youth," he wrote to his friend Samuel Ward, "that I have come to the conclusion to retrace my steps to Europe, and keep them there a few years longer." Keeping his children isolated from a world that offered them choices, temptations, and satisfactions had become a consuming struggle.</span><p data-dcnode-id="1702"><span data-dcnode-id="1706" instrument_node="">

A day after landing at Le Havre, the family went to Paris and then on to Geneva, this time to try different schools from the one the children had attended during their last educational experiment. William went to the Academy, precursor of the University of Geneva. Of the four children, William had the best match: he studied science and mathematics with as much success as he had before and by spring had been invited to join the Societe des Zoffingues, a social club for Swiss students.  Although William later complained that during his entire stay in Switzerland, he had never seen the inside of a Swiss home ("the aristocratic and respectable Genevese are very exclusive and reserved in their demeanor towards strangers," he wrote), the club afforded him the experience of informal student life. When William found out that he could invite a friend to one of the society's festivals, he chose Harry, who remembered a rowdy gathering where "drinking, smoking big German pipes and singing" were the main activities." [from </span><i data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">Genuine Reality</span></i><span data-dcnode-id="1703" instrument_node="">]</span></p><p data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">

["William James attended schools in the United States, England, France, Switzerland, and Germany, and was also privately tutored; became familiar with the major museums and galleries in every city the family visited; acquired fluency in five languages, met, listened to, and talked to such frequenters of the James household as Thoreau, Emerson, Greeley, Hawthorne, Carlyle, Tennyson, and J. S. Mill; and through his father's influence became widely read and well versed in philosophy. Not that Henry James, Sr., was a taskmaster or disciplinarian; for his time, he was an unusually permissive and loving father, who encouraged dinner table arguments by the children about every kind of issue and, to his friends' horror, allowed his children to attend theater."]
</span></p></blockquote><p data-dcnode-id="1695"><span data-dcnode-id="1698" instrument_node="">
</span><a data-dcnode-id="1697" name="1860"></a><span data-dcnode-id="1696" instrument_node="">
</span></p><div align="center" data-dcnode-id="1668"><span data-dcnode-id="1694" instrument_node="">
</span><span data-dcnode-id="1688" instrument_node="">
</span><span data-dcnode-id="1684" instrument_node="">
</span><span data-dcnode-id="1680" instrument_node="">
</span><span data-dcnode-id="1672" instrument_node="">

</span><a data-dcnode-id="1538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/JamesInBrazil1865.html"><img align="top" border="2" data-dcnode-id="1539" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_JamesInBrazil1865.jpg&amp;raw"></a></td><td data-dcnode-id="1533"><i data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">in Brazil, June 1865.</span></i></td></tr></tbody></table></div><span data-dcnode-id="1527" instrument_node="">
</span><blockquote data-dcnode-id="1517"><span data-dcnode-id="1526" instrument_node="">
As James began his second year in medical school, he was offered another chance to test his interest in becoming a naturalist: Agassiz was recruiting volunteers to join him on an expedition to Brazil to collect specimens. The trip would cost James some six hundred dollars, but the expense, he decided, would be worth it. "W.J.," he said to himself, "in this excursion you will learn to know yourself and your resources somewhat more intimately than you do now, and will come back with your character considerably evolved and established." His family agreed—at the very least, James would be participating in research with one of the greatest living naturalists—and his father and Aunt Kate came up with the necessry funds to make the trip possible.</span><p data-dcnode-id="1518"><span data-dcnode-id="1525" instrument_node="">

The Thayer Expedition would take James the farthest he ever had been from his family. As soon as the </span><i data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">Colorado</span></i><span data-dcnode-id="1522" instrument_node=""> departed from New York on April 1, 1865, James found himself in "isolated circumstances" that sent him spiraling into depression. The passage was rough, he reported home, but he did not suffer nausea, only homesickness. "For twelve mortal days," he wrote, "I was, body and soul, in a more indescribably hopeless, homeless and friendless tate than I ever want to be in again." [from </span><i data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">Genuine Reality</span></i><span data-dcnode-id="1519" instrument_node="">]
</span></p></blockquote><span data-dcnode-id="1516" instrument_node="">
</span><b data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">1866 - James family moves to Cambridge (20 Quincy Street).</span></b><br data-dcnode-id="1513"><span data-dcnode-id="1512" instrument_node="">
</span><blockquote data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">
["He resumed medical school but was beset by assorted ailments—back pain, weak vision, digestive disorders, and thoughts of suicide—some or most of which were exacerbated by his indecision about his future. Seeking relief, he went to France and Germany for nearly two years, took the baths, studied under Helmholtz and other leading physiologists, and became thoroughly conversant with the New Psychology."]
</span></blockquote><span data-dcnode-id="1509" instrument_node="">
</span><a data-dcnode-id="1508" name="james25"></a><span data-dcnode-id="1507" instrument_node="">

</span><b data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">
1867-1868 - James in Europe, mainly Germany. Studies medicine.</span></b><span data-dcnode-id="1502" instrument_node="">
</span><div align="center" data-dcnode-id="1483"><span data-dcnode-id="1492" instrument_node="">
</span><span data-dcnode-id="1487" instrument_node="">
</span><table data-dcnode-id="1484"><tbody data-dcnode-id="1485"><tr data-dcnode-id="1486"><td data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">James in 1868</span></td><td data-dcnode-id="1493"><span data-dcnode-id="1499" instrument_node="">
</span><a data-dcnode-id="1497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/James1868.html"><img align="top" border="2" data-dcnode-id="1498" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_James1868.jpg&amp;raw"></a><span data-dcnode-id="1496" instrument_node="">
</span><a data-dcnode-id="1494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/james25.html"><img align="top" border="2" data-dcnode-id="1495" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_james25.jpg&amp;raw"></a></td><td data-dcnode-id="1488"><i data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">James at age 25.</span></i><span data-dcnode-id="1489" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></td></tr></tbody></table></div><span data-dcnode-id="1482" instrument_node="">
</span><blockquote data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">
On Tuesday, April 16, 1867, James sailed for Europe. Because he swore his family to secrecy about his latest collapse, hardly anyone knew why he left. Never as adventuresome a traveler as his brother Harry, William searched for safe places: he preferred small provincial cities to European capitals, and homey pensions run by grandmotherly women to any kind of hotel. After a few days in Paris, he went to Dresden, where he spent the summer of 1867.
</span></blockquote><span data-dcnode-id="1479" instrument_node="">
</span><a data-dcnode-id="1478" name="James1869"></a><span data-dcnode-id="1477" instrument_node="">
</span><b data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">1869 - James receives his MD from Harvard.</span></b><p data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">
</span></p><div align="center" data-dcnode-id="1450"><span data-dcnode-id="1462" instrument_node="">
</span><span data-dcnode-id="1454" instrument_node="">
</span><table data-dcnode-id="1451"><tbody data-dcnode-id="1452"><tr data-dcnode-id="1453"><td data-dcnode-id="1463"><span data-dcnode-id="1472" instrument_node="">
</span><a data-dcnode-id="1470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/James1869.html"><img align="top" border="2" data-dcnode-id="1471" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_James1869.jpg&amp;raw"></a><span data-dcnode-id="1469" instrument_node="">
</span><a data-dcnode-id="1467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/jamese.html"><img align="top" border="2" data-dcnode-id="1468" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_jamese.jpg&amp;raw"></a><span data-dcnode-id="1466" instrument_node="">
</span><a data-dcnode-id="1464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/James1869-b.html"><img align="top" border="2" data-dcnode-id="1465" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_James1869-b.jpg&amp;raw"></a></td><td data-dcnode-id="1455"><i data-dcnode-id="1456"><span data-dcnode-id="1461" instrument_node="">circa 1869,</span><br data-dcnode-id="1460"><span data-dcnode-id="1459" instrument_node=""> age 27. </span><br data-dcnode-id="1458"><span data-dcnode-id="1457" instrument_node=""> In ill-health.</span></i></td></tr></tbody></table></div><span data-dcnode-id="1449" instrument_node="">
</span><blockquote data-dcnode-id="1444"><span data-dcnode-id="1448" instrument_node="">
In June, when at last he earned his degree, James became a member of what he acknowledge was "an important profession." But the achievement had little impact on the volatility of his emotional life. He was left, he said, with "a good deal of intellectual hunger" that he did not know how to satisfy. Still, he believed that he had not found a way to reconcile his essential nature with his contribution to humanity. First, of course, he needed to define that essential nature, a daunting task. [from </span><i data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">Genuine Reality</span></i><span data-dcnode-id="1445" instrument_node="">]
</span></blockquote><span data-dcnode-id="1443" instrument_node="">
</span><b data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">1869-1872 - Ill-health and recovery. </span></b><span data-dcnode-id="1440" instrument_node="">
</span><blockquote data-dcnode-id="1436"><span data-dcnode-id="1439" instrument_node="">
["Finally he returned and at twenty-seven completed medical school. He made no effort to practice because of his poor health, but spent his time studying psychology, sunk in gloom about his prospects and troubled by the profound differences between his scientific views of the mind and the world and his father's mystical and spiritual ones. In 1870, at twenty-eight, after nearly a year in these doldrums, he had an abrupt emotional crisis very much like his father's."
</span><p data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">

For almost three years after graduation, James lived in the family home. His bouts of depression increased after a young woman whom he had befriended died following a prolonged illness. He would later describe his depression as a descent into a profound crisis—of spirituality, of being, of meaning, of will. He suffered panic attacks and even hallucinations that left him mentally crippled. His father had suffered similar attacks and had sought refuge from them in spiritual quests. William feared that his infirmity was rooted in a biological destiny he would be unable to overcome. He also shrouded his angst with secrecy and used only his reading and journal writing to deal with the mental anguish. One day in April of 1870, the psychological fever began to brake. He recorded in his journal that, after reading an essay by Charles Renouvier, he had come to believe that free will was no illusion and that he could use his will to alter his mental state. He need not be a slave to a presumed biological destiny. "My first act of free will," he wrote, "shall be to believe in free will."</span></p></blockquote><span data-dcnode-id="1435" instrument_node="">
</span><div align="center" data-dcnode-id="1413"><span data-dcnode-id="1431" instrument_node="">
</span><span data-dcnode-id="1422" instrument_node="">
</span><span data-dcnode-id="1417" instrument_node="">
</span><table data-dcnode-id="1414"><tbody data-dcnode-id="1415"><tr data-dcnode-id="1416"><td data-dcnode-id="1432"><i data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">Charles Renouvier</span></i></td><td data-dcnode-id="1427"><a data-dcnode-id="1429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/RenouvierCharles.html"><img align="top" border="2" data-dcnode-id="1430" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_RenouvierCharles.jpg&amp;raw"></a><span data-dcnode-id="1428" instrument_node="">
</span></td><td data-dcnode-id="1423"><span data-dcnode-id="1426" instrument_node="">
</span><a data-dcnode-id="1424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/CharlesEliot.html"><img align="top" border="2" data-dcnode-id="1425" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_CharlesEliot.jpg&amp;raw"></a></td><td data-dcnode-id="1418"><i data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">Charles Eliot</span></i><span data-dcnode-id="1419" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></td></tr></tbody></table></div><p data-dcnode-id="1407"><span data-dcnode-id="1412" instrument_node="">
</span><b data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">
1872 - James accepts position as instructor of comparative anatomy and physiology at Harvard College.</span></b><br data-dcnode-id="1409"><span data-dcnode-id="1408" instrument_node="">
</span></p><blockquote data-dcnode-id="1402"><span data-dcnode-id="1406" instrument_node="">
James was now 30, three years out of medical school, still financially dependent on his father, and with no career prospects or plans except for a vague desire to devote himself to philosophy in some fashion. It was at this propitious time that Harvard president Charles Eliot, a neighbor and former teacher of James, offered him a post at Harvard teaching  physiology for the modest sum of $600 per year. His acceptance signaled the start of a prestigious career, for James was to become a gifted teacher, a skilled orator, and, of course, a prodigious thinker and writer. It signaled also the renewal of his spirit. James took to teaching. He began teaching in Fall of 1872 (August). His students described him as a rigorous instructor, a lively and humorous lecturer, and a caring soul mate. As it does to most new teachers, however, the first year left him utterly exhausted. [see </span><a data-dcnode-id="1404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/JamesTeachingSchedule.html" target="_blank"><span data-dcnode-id="1405" instrument_node="">James's schedule of courses during his 34 years at Harvard</span></a><span data-dcnode-id="1403" instrument_node="">]
</span></blockquote><span data-dcnode-id="1401" instrument_node="">
</span><div align="center" data-dcnode-id="1391"><table data-dcnode-id="1392"><tbody data-dcnode-id="1393"><tr data-dcnode-id="1394"><td data-dcnode-id="1398"><a data-dcnode-id="1399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/jamescorr.html"><img align="top" border="2" data-dcnode-id="1400" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_jamescorr.jpg&amp;raw"></a></td><td data-dcnode-id="1395"><i data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">James as a young man.</span></i></td></tr></tbody></table></div><span data-dcnode-id="1390" instrument_node="">
</span><blockquote data-dcnode-id="1383"><span data-dcnode-id="1389" instrument_node="">
"Lack of confidence in his own authority generated anxiety about his ability to succeed as a teacher. He was, however, pleasantly surprised. Even by his own high standrds, he performed successfully in the classroom; performing, after all, was one of his most impressive skills. While he complained that he could not excite some of his dull students, he managed to engage the attention of many others. 'So far,' he reported to Harry, 'I seem to have succeeded in interesting them ... and I hear expressions of satisfaction on their part.' Teaching was stimulating for James, as well: 'I should think it not unpleasant as a permanent thing,' he admitted. 'The authority is at first rather flattering to one.'" [from Linda Simon's </span><i data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">A Genuine Reality</span></i><span data-dcnode-id="1386" instrument_node="">]
</span><p data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">
["Within three years of arriving at Harvard, he began offering courses in physiological psychology and performing demonstrations for students in his little laboratory in Lawrence Hall."]</span></p></blockquote><span data-dcnode-id="1382" instrument_node="">
</span><b data-dcnode-id="1376"><span data-dcnode-id="1381" instrument_node="">
1873-1874 - Depression returns. Recuperating in Europe, primarily Italy. Traveling with Henry.</span><br data-dcnode-id="1380"><span data-dcnode-id="1379" instrument_node="">
1874 - Returns to teaching at Harvard for Fall term.</span><br data-dcnode-id="1378"><span data-dcnode-id="1377" instrument_node="">
1875 - Establishes first laboratory of experimental psychology.</span></b><br data-dcnode-id="1375"><span data-dcnode-id="1374" instrument_node="">
</span><blockquote data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">
["There were no professors of psychology in American universities before James began teaching the subject in 1875. The only forms of psychology then taught in the United States were phrenology and Scottish mental philosophy, an offshoot of associationism used chiefly as a defense of revealed religion. James himself had never taken a course in the New Psychology because none was available; as he once jested, 'The first lecture in psychology that I ever heard was the first I ever gave.'"]
</span></blockquote><span data-dcnode-id="1371" instrument_node="">
</span><a data-dcnode-id="1370" name="Alice"></a><span data-dcnode-id="1369" instrument_node="">
</span><b data-dcnode-id="1363"><span data-dcnode-id="1368" instrument_node="">
1876 - Assistant professor of physiology.</span><br data-dcnode-id="1367"><span data-dcnode-id="1366" instrument_node="">
1878 - Undertakes treatise on psychology.</span><br data-dcnode-id="1365"><span data-dcnode-id="1364" instrument_node="">
1878 - Marries Alice Howe Gibbens, Boston, July 20.</span></b><p data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">
</span></p><div align="center" data-dcnode-id="1342"><span data-dcnode-id="1360" instrument_node="">
</span><span data-dcnode-id="1353" instrument_node="">
</span><table data-dcnode-id="1343"><tbody data-dcnode-id="1344"><tr data-dcnode-id="1345"><td data-dcnode-id="1357"><i data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">Alice at age 16.</span></i></td><td data-dcnode-id="1354"><a data-dcnode-id="1355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/JamesAliceGibbens2.html"><img align="top" border="2" data-dcnode-id="1356" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_JamesAliceGibbens2.jpg&amp;raw"></a></td><td data-dcnode-id="1350"><a data-dcnode-id="1351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/JamesAliceGibbens.html"><img align="top" border="2" data-dcnode-id="1352" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_JamesAliceGibbens.jpg&amp;raw"></a></td><td data-dcnode-id="1346"><i data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">Alice in the mid-1870s.</span></i><span data-dcnode-id="1347" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></td></tr></tbody></table></div><p data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">
</span></p><blockquote data-dcnode-id="1333"><span data-dcnode-id="1339" instrument_node="">
["The year James began the [</span><i data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">Principles</span></i><span data-dcnode-id="1336" instrument_node="">], 1878, was a landmark in another way. At thirty-six, he married. Despite his belief in free will, he seems to have been something less than a free agent in his choice of mate. Two years earlier his father had come home from a meeting of the Radical Club in Boston and announced that he had met William's future wife, Alice Gibbens, a Boston schoolteacher and accomplished pianist. Although William dragged his feet about meeting her, once he did so the die was cast. After a prolonged courtship, Alice became his dutiful, strong wife and helpmeet, mother of his five children, amanuensis, and lifelong intellectual companion."]</span><p data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">

James had warned Alice that, should she deign to accept his proposal of marriage, she should be well aware of his mental condition. He confessed to her his neurasthenia, his bouts of deep depression, his thoughts of suicide, his lingering spiritual crisis. He cautioned her that he could as easily get worse as better. Alice threw caution to the wind and married William on July 20 of 1878. His neurasthenia got better very quickly. 
</span></p></blockquote><span data-dcnode-id="1332" instrument_node="">
</span><b data-dcnode-id="1329"><span data-dcnode-id="1331" instrument_node="">
1879 - Begins teaching philosophy.</span><br data-dcnode-id="1330"></b><span data-dcnode-id="1328" instrument_node="">
</span><blockquote data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">
No academic field could easily contain James's interests. He had switched from teaching physiology to psychology and, in 1879, he shifted to philosophy. The following year he was made assistant professor of philosophy. He saw the new decade in with the birth of the first of his five children. It was a decade devoted to teaching, writing numerous articles for the best journals, and meeting with the finest minds at home and in Europe. But it was also a decade marked by personal tragedy. He lost his mother early in 1882 and his father before that year was out. Three years later, his third child Herman, less than a year old, died of bronchial pneumonia.  At decade's end, the family moved to a new home in Cambridge.</span></blockquote><span data-dcnode-id="1325" instrument_node="">
</span><b data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">
1879 - Birth of his first son, Henry ["Harry"].</span></b><span data-dcnode-id="1322" instrument_node="">
</span><blockquote data-dcnode-id="1314"><span data-dcnode-id="1321" instrument_node="">
James's sense of independence and manliness were affirmed by the birth of his first child, Henry III, on May 18, 1879, which elicited this description to his brother Bob:
</span><blockquote data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">
My domestic catastrophe is now a week old. Babe and Mar [mother] both doing very well indeed. The former has a rich orange complexion, a black head of hair, weight 8 1/2 lbs keeps his eyes tight shut on the wicked world and is of a musical, but not too musical disposition . . . I find  I have strong affection for the little animal—and tho' I say it who should not, he has a very lovely and benignant little expression on his face.
</span></blockquote><span data-dcnode-id="1318" instrument_node="">
James, genuinely enchanted by his offspring, told Alice that he hoped "little Embry," as they called their infant son, soon might have a sibling. [from </span><i data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Genuine Reality</span></i><span data-dcnode-id="1315" instrument_node="">]
</span></blockquote><span data-dcnode-id="1313" instrument_node="">
</span><b data-dcnode-id="1285"><span data-dcnode-id="1312" instrument_node="">1880 - Assistant professor of philosophy.</span><p data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">
</span></p><div align="center" data-dcnode-id="1286"><span data-dcnode-id="1309" instrument_node="">
</span><span data-dcnode-id="1303" instrument_node="">
</span><span data-dcnode-id="1299" instrument_node="">
</span><span data-dcnode-id="1295" instrument_node="">
</span><span data-dcnode-id="1291" instrument_node="">
</span><table data-dcnode-id="1288"><tbody data-dcnode-id="1289"><tr data-dcnode-id="1290"><td data-dcnode-id="1304"><i data-dcnode-id="1305"><span data-dcnode-id="1308" instrument_node="">Henry James, Sr.</span><br data-dcnode-id="1307"><span data-dcnode-id="1306" instrument_node="">
about 1880</span></i></td><td data-dcnode-id="1300"><a data-dcnode-id="1301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/jamessr2.html"><img align="top" border="2" data-dcnode-id="1302" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_jamessr2.jpg&amp;raw"></a></td><td data-dcnode-id="1296"><a data-dcnode-id="1297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/jamesmary2.html"><img align="top" border="2" data-dcnode-id="1298" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_jamesmary2.jpg&amp;raw"></a></td><td data-dcnode-id="1292"><i data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Mary James, also 1880&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></i></td></tr></tbody></table><span data-dcnode-id="1287" instrument_node="">
</span></div></b><p data-dcnode-id="1281"><b data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">

1882 - Death of mother in January.</span></b><span data-dcnode-id="1282" instrument_node="">
</span></p><blockquote data-dcnode-id="1274"><span data-dcnode-id="1280" instrument_node="">

Mary James died in January 1882, after a brief bout with bronchitis. During her illness, she was nursed by her daughter, her sister, and her husband. "It has been a severe loss to all of us," William remarked, "but father and my sister, the two who presumably might suffer most from it, are bearing it very well." If the two who grieved most deeply were very well, one can only surmise that William himself suffered little. Mary's death elicited a response from her son that would be repeated after many future losses: a sudden sentimental epiphany about the value of the person lost, regret over the quality of their relationship, and a promise to treat others with more generosity. Years later, James admitted that after Mary's death "every thing about her seemed so different to me from what it ever had before, that I was indignant at my blindness, and resolved as far as possible to feel my human relations during life as I should after death, in order to feel them after death more as I did during life." [from </span><i data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">Genuine Reality</span></i><span data-dcnode-id="1277" instrument_node="">]</span><p data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">


["He drew upon all his reading in both philosophical and physiological psychology; spent half a year in Europe in 1882-1883 visiting universities, attending laboratory sessions and lectures, and meeting and talking to dozens of leading psychologists and other scientists; corresponded regularly with many of them; and gathered reports and clinical studies of abnormal minds, and of normal ones under hypnosis, drugs, or stress.
</span></p></blockquote><span data-dcnode-id="1273" instrument_node="">
</span><b data-dcnode-id="1269"><span data-dcnode-id="1272" instrument_node="">1882 - Birth of second son, William ["Billy"].</span><br data-dcnode-id="1271"><span data-dcnode-id="1270" instrument_node="">
1882-1883 - Sabbatical in Europe. Visits European universities and colleges.</span></b><span data-dcnode-id="1268" instrument_node="">
</span><blockquote data-dcnode-id="1261"><span data-dcnode-id="1267" instrument_node="">
William again sailed to Europe in September 1882, leaving Alice at home with four-year-old Harry and three-month-old Billy. Finally taking the sabbatical that had been refused him the year before, James told his friends and family that he was going abroad to confer again with his European colleagues, learn more about their work and ideas, and especially to make progress on </span><i data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">The Principles of Psychology</span></i><span data-dcnode-id="1264" instrument_node="">, already years behind its due date. As in the past, however, the threat of a nervous collapse figured significantly in his decision to go to Europe.</span><p data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">
</span></p></blockquote><span data-dcnode-id="1260" instrument_node="">
</span><b data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">1882 - Father dies in December, while William is in London.</span></b><span data-dcnode-id="1257" instrument_node="">
</span><blockquote data-dcnode-id="1244"><span data-dcnode-id="1256" instrument_node="">
On Sunday, December 10, a short time after William arrived in London to visit with Harry [Henry James], they received an ominous telegram: "Brain softening possibly live months all insist Wm. shall not come." Although William admitted that he and Harry had long anticipated their father's final heart attack or stroke, they were not prepared for this sudden news with its frightening diagnosis. Worrying as much about Alice's reaction as about their father's deterioration, Harry quickly booked passage home. Despite the admonition that William stay in London, his first impulse was to return, as well. "I wanted to get to see him if possible before the end, &amp; to let him see me and get a ray of pleasure from the thought that I had come," he said. But on quick reflection, he changed his mind: his father, after all, might not even recognize him; and his father's recognition was essential for William. </span><p data-dcnode-id="1245"><span data-dcnode-id="1255" instrument_node="">

Henry Sr. never saw his son's farewell. At the end, according to Aunt Kate, he murmured, "Oh, I have such good boys—</span><i data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">such</span></i><span data-dcnode-id="1252" instrument_node=""> good boys!" Those were his last recorded words. He died, more peacefully than his boys imagined he would, on December 18. William, who learned of his father's death from an announcement in the London </span><i data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Standard</span></i><span data-dcnode-id="1249" instrument_node="">, felt momentary shock and an initial reaction of grief "more, much more than I expected." But the grief was not enough to keep him from lunching and dining with friends. In the next days, sadness gave way to a new sense of power and freedom. His father, whose admonitions echoed in his mind each time he made a decision, whose censure he had feared and whose praise he so coveted, became transformed at once from a looming presence to an image "smaller, less potent, more pathetic." [from </span><i data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">Genuine Reality</span></i><span data-dcnode-id="1246" instrument_node="">]
</span></p></blockquote><span data-dcnode-id="1243" instrument_node="">
</span><div align="center" data-dcnode-id="1216"><span data-dcnode-id="1242" instrument_node="">
</span><span data-dcnode-id="1236" instrument_node="">
</span><span data-dcnode-id="1232" instrument_node="">
</span><span data-dcnode-id="1228" instrument_node="">
</span><span data-dcnode-id="1220" instrument_node="">
</span><table data-dcnode-id="1217"><tbody data-dcnode-id="1218"><tr data-dcnode-id="1219"><td data-dcnode-id="1237"><i data-dcnode-id="1238"><span data-dcnode-id="1241" instrument_node="">Photographic portrait,</span><br data-dcnode-id="1240"><span data-dcnode-id="1239" instrument_node="">circa 1885.</span></i></td><td data-dcnode-id="1233"><a data-dcnode-id="1234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/jamesl.html"><img align="top" border="2" data-dcnode-id="1235" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_jamesl.jpg&amp;raw"></a></td><td data-dcnode-id="1229"><a data-dcnode-id="1230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/jastroll2.html"><img align="top" border="2" data-dcnode-id="1231" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uky.edu/~eushe2/Pajares/TH_jastroll2.jpg&amp;raw"></a></td><td data-dcnode-id="1221"><i data-dcnode-id="1222"><span data-dcnode-id="1227" instrument_node="">Photographic portrait</span><br data-dcnode-id="1226"><span data-dcnode-id="1225" instrument_node=""> National Portrait Gallery&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span><br data-dcnode-id="1224"><span data-dcnode-id="1223" instrument_node="">
 Smithsonian Institution</span></i></td></tr></tbody></table></div><br data-dcnode-id="1215"><span data-dcnode-id="1214" instrument_node="">
