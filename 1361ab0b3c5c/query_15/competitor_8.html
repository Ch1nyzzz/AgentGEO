</span><span data-dcnode-id="2470" id="freeTextContainer15435320661220941496"><span data-dcnode-id="2474" instrument_node="">"Magisterial," "erudite," and yes, "definitive" are a few of the words I would use to describe "The Rise of Theodore Roosevelt." Morris effectively captures just what a force of nature Roosevelt was and makes a strong case for Roosevelt as the most interesting president Americans have ever elected. At the same time, Morris does not cover up Roosevelt's warts: He was a racist and a war monger who found solace and joy in killing animals for sport. </span><br data-dcnode-id="2473"><br data-dcnode-id="2472"><span data-dcnode-id="2471" instrument_node="">One of the best ways to take a measure of the man </span></span><span data-dcnode-id="2469" instrument_node="">
</span><span data-dcnode-id="2455" id="freeText15435320661220941496" style="display:none"><span data-dcnode-id="2468" instrument_node="">"Magisterial," "erudite," and yes, "definitive" are a few of the words I would use to describe "The Rise of Theodore Roosevelt." Morris effectively captures just what a force of nature Roosevelt was and makes a strong case for Roosevelt as the most interesting president Americans have ever elected. At the same time, Morris does not cover up Roosevelt's warts: He was a racist and a war monger who found solace and joy in killing animals for sport. </span><br data-dcnode-id="2467"><br data-dcnode-id="2466"><span data-dcnode-id="2465" instrument_node="">One of the best ways to take a measure of the man and this biography is to look at the chapters that focus on Roosevelt's most seemingly mundane jobs, rather than his most colorful exploits in North Dakota and Cuba. How can you get more boring than serving as a member of civil service and police oversight commissions? Yet, it is in these roles that T.R. establishes himself as America's premier crusader for good government. He transforms the policing of New York in a matter of weeks by forcing the corrupt police chief and most vicious beat cop to resign. He then starts walking every corner of the city late at night to see which officers are actually doing their jobs. The person I was left most wanting to learn more about after reading about Teddy's police exploits was the photographer-writer Jacob Riis. </span><br data-dcnode-id="2464"><br data-dcnode-id="2463"><span data-dcnode-id="2462" instrument_node="">Ironically, it is the last third of the book when Roosevelt has increasingly important positions where Morris falters a bit. Morris does a superb job of showing T.R.'s relationships with his parents, siblings and first wife Alice, but after his remarriage and the suicide of his brother Elliot, the mentions of his family are minimal. Teddy remained close to his sisters, but there is no mention of his oldest sister's marriage in 1895, even though Morris leads us to assume that she will never marry. We also get not a hint of how his first child, Alice, would go on to become the most colorful first daughter in American history (my source for this is the book I read to my daughter, "What to Do About Alice?"). Chapter 20 "The Snake in the Grass" could easily be summarized in a few paragraphs in the previous chapter to make more room for T.R.'s family.</span><br data-dcnode-id="2461"><br data-dcnode-id="2460"><span data-dcnode-id="2459" instrument_node="">Three final points. One of the coolest literary devices Morris employs is to have the epigraph for each chapter be quotes from T.R.'s favorite poem, "The Saga of King Olaf." It is amazing how fitting each one is. Second, I can almost guarantee you will be looking up obscure words every ten pages or so. Finally, be sure to review Morris's copious footnotes. You will find many a fascinating tidbit (like the Dutch meaning of "Roosevelt"), and Teddy's most racist remarks. </span><br data-dcnode-id="2458"><br data-dcnode-id="2457"><span data-dcnode-id="2456" instrument_node="">I am all set to read "Theodore Rex" and "Alice" (by Stacy Cordery). I haven't decided if I will read Vol. III or "Edith Kermit Roosevelt" (by Morris's wife). </span></span><span data-dcnode-id="2454" instrument_node="">

</span><span data-dcnode-id="2328" id="freeTextContainer2840161913985211581"><span data-dcnode-id="2332" instrument_node="">I'm not really a fan of politics or presidential biographies, so was a little wary going into this one, but out of all the presidents, Theodore Roosevelt has been my favorite to learn about. In middle school I did a somewhat long report about Teddy and I have been a fan of his since. Reading this book took me back to that report, but with more knowledge and far better writing.</span><br data-dcnode-id="2331"><br data-dcnode-id="2330"><span data-dcnode-id="2329" instrument_node="">At times this book read like a great American novel, except this isn't a novel. Roosevelt's life is so rich and a times a</span></span><span data-dcnode-id="2327" instrument_node="">
</span><span data-dcnode-id="2313" id="freeText2840161913985211581" style="display:none"><span data-dcnode-id="2326" instrument_node="">I'm not really a fan of politics or presidential biographies, so was a little wary going into this one, but out of all the presidents, Theodore Roosevelt has been my favorite to learn about. In middle school I did a somewhat long report about Teddy and I have been a fan of his since. Reading this book took me back to that report, but with more knowledge and far better writing.</span><br data-dcnode-id="2325"><br data-dcnode-id="2324"><span data-dcnode-id="2323" instrument_node="">At times this book read like a great American novel, except this isn't a novel. Roosevelt's life is so rich and a times adventurous it's no wonder this biography is split into three volumes. This only covers the years 1858 to 1901. Roosevelt doesn't even become president yet, that's the second book for another time.</span><br data-dcnode-id="2322"><br data-dcnode-id="2321"><span data-dcnode-id="2320" instrument_node="">You don't have to be interested in politics or TR's politics to like this either. This book isn't really focusing on him as a president. This is about life in America using Teddy as the main character. I would argue this is more of a biography of America during Roosevelt's life. It does a great job setting the time with lush descriptions and some great photographs.</span><br data-dcnode-id="2319"><br data-dcnode-id="2318"><span data-dcnode-id="2317" instrument_node="">One criticism I do have isn't the story, but the extras. There should be more extras. I would have add a genealogical chart or a list of who's who. I would have also added a timeline. Both would have made this book better and easier to follow. Every now and then, I was checking online for that stuff or I'd forget to look it up before me next sitting.</span><br data-dcnode-id="2316"><br data-dcnode-id="2315"><span data-dcnode-id="2314" instrument_node="">I recommended this book to most American who are interested in various topics about Theodore Roosevelt, the time of his life, or presidential politics. I'll admit there were some chapters that got a little boring for my taste, but I liked this book for the most part. I'll be checking out the other two book at some point for sure.</span></span><span data-dcnode-id="2312" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="1982" title="it was amazing"><span class="staticStar p10" data-dcnode-id="1987" size="15x15"><span data-dcnode-id="1988" instrument_node="">it was amazing</span></span><span class="staticStar p10" data-dcnode-id="1986" size="15x15"></span><span class="staticStar p10" data-dcnode-id="1985" size="15x15"></span><span class="staticStar p10" data-dcnode-id="1984" size="15x15"></span><span class="staticStar p10" data-dcnode-id="1983" size="15x15"></span></span><span data-dcnode-id="1981" instrument_node="">

</span><span data-dcnode-id="1975" id="freeTextContainer1215763146639258264"><span data-dcnode-id="1976" instrument_node="">This is a forty-year-old biography that is as fresh today as it was in the 1970s. "The Rise of Theodore Roosevelt" is the best-known of modern biographies of Theodore Roosevelt, although it only covers his life up to his accession to the Presidency, in 1901. It wholly warrants its reputation—the writing is clear and compelling, the facts are relevant and interesting, and the author, Edmund Morris, treats the man through the lens of his time, not with any jarring ideological overlay imported from</span></span><span data-dcnode-id="1974" instrument_node="">
</span><span data-dcnode-id="1924" id="freeText1215763146639258264" style="display:none"><span data-dcnode-id="1973" instrument_node="">This is a forty-year-old biography that is as fresh today as it was in the 1970s. "The Rise of Theodore Roosevelt" is the best-known of modern biographies of Theodore Roosevelt, although it only covers his life up to his accession to the Presidency, in 1901. It wholly warrants its reputation—the writing is clear and compelling, the facts are relevant and interesting, and the author, Edmund Morris, treats the man through the lens of his time, not with any jarring ideological overlay imported from today. The reader feels like he is practically living in the time, and that is a hard trick to pull off, especially for eight hundred pages.</span><br data-dcnode-id="1972"><br data-dcnode-id="1971"><span data-dcnode-id="1970" instrument_node="">Roosevelt was born in 1858, and was therefore a small boy during the Civil War. He grew up in New York, but his mother was a southern belle and an active supporter of the Confederacy, which created some tense marital moments in an otherwise happy marriage. The family was very wealthy and very established, and Roosevelt’s father (also Theodore) was a dominating presence within it, a benevolent patriarch. Morris follows Roosevelt from birth, through education, early politics, time spent in the West, more politics, yet more politics, Cuba, and, finally, his brief time as Vice President. The focus, though, is on Roosevelt the person in the context of his times, not on his times—thus, there is a vast amount of information about Roosevelt’s personal life, which makes him a much more compelling figure than would a focus on, say, the politics of his time as Governor of New York (though that is covered too).</span><br data-dcnode-id="1969"><br data-dcnode-id="1968"><span data-dcnode-id="1967" instrument_node="">One thing that comes through very clearly in the book is the old American expectation of the wealthy, where the rich hewed closely to the Biblical injunction, “For unto whomsoever much is given, of him shall be much required.” In those days, as shown by Roosevelt’s father, great wealth carried with it great expectations, an obligation that, while it was not always honored at that time, has almost totally disappeared in the liquid modernity of today, where the idea that rigid social expectations should constrain anyone at all is anathema to the modern belief in total and continual personal autonomy. Putatively the elder Theodore was a businessman, but not only did he devote much of his working life to philanthropy (among other things founding the New York Orthopedic Hospital), during the Civil War (although he paid another man as a substitute to serve in the Army, to the later dismay of his son) he designed a system to allow soldiers to authorize payroll deductions to support their families, and then, at his own expense, travelled all over for months selling the program to soldiers, sitting on a horse in the open air and pouring rain persuading soldiers to sign up. The idea of a rich man undertaking risks and pain to make a charity he had conceived of real, rather than donating money and then going to dinners so can people can suck up to and admire him, seems bizarre today.</span><br data-dcnode-id="1966"><br data-dcnode-id="1965"><span data-dcnode-id="1964" instrument_node="">Unsurprisingly, his father had a great influence on our Theodore Roosevelt, not least because his father died of colon cancer just as he came of age, thus forming an abstract model to which Roosevelt could aspire, but which was fixed and did not comment further on his life. Roosevelt inherited quite a bit of money, but not enough to live lavishly, and until later life he didn’t make much money himself (which is why his father told him that if he was not going to earn money, he “must even things up by not spending it”). He didn’t, therefore, live lavishly, but he did spend more than he should have, resulting in (like Winston Churchill) the frequent need to support his family in part by writing for the popular market.</span><br data-dcnode-id="1963"><br data-dcnode-id="1962"><span data-dcnode-id="1961" instrument_node="">Still, despite not oozing money, Roosevelt was able to afford benefits to his work that are essentially incomprehensible today. Chief among those was continual attention by servants and other servitors, allowing him to focus on his work. He had preternatural drive and discipline, and worked long hours, but turning that into his volume of output was only made possible by being relieved by others of having to do anything that might distract him. (Of course, it’s a good thing he lived before the Internet, the telephone, and other such diversions.) Morris does not emphasize this benefit to Roosevelt, perhaps figuring it’s obvious, but it shows up on nearly every page, and was continual from Roosevelt’s earliest life. For example, in a letter home during his freshman year at Harvard (where he snobbily refused to associate with any but the upper-crust students), Roosevelt casually refers to how his “scout” had “made the fire and blacked the boots,” and then called him to breakfast, prepared, naturally, by others. The rest of each day went the same. Glimpses of how other, less monied peers lived show up occasionally—Morris quotes “an old friend, separated from the Roosevelts by lesser means,” when he sees Roosevelt leaving the opera, “I remember thinking what an enormous start he had over youths like myself, whose daily bread depended on their daily effort.” Yes, Roosevelt accomplished an enormous amount, starting at an early age, but that was made possible by his circumstances as well as by his character—and even the rich today don’t have those same advantages, even if they are internally compelled to produce value, rather than spending their days posting on the Rich Kids of Instagram. I sometimes look at myself, now well into my forties, and wonder what I would have done with my life if I had not spent the past twenty-five years grinding away to become wealthy, only then turning my mind, somewhat, to other possible productive pursuits. Of course, maybe what I have done is enough, and presumably I still have a month or two left in which to do something maximally useful, plus maybe I just would have been a druggie if born rich and served hand and foot. Who’s to say? As Aslan told Lucy, “Child, no one is ever told what would have been.”</span><br data-dcnode-id="1960"><br data-dcnode-id="1959"><span data-dcnode-id="1958" instrument_node="">Speaking of output, I did not know that the first book Roosevelt wrote is still regarded as a classic and relevant—"The Naval War of 1812", which he published when he was twenty-three. It is exhaustive, and I found most relevant of all his stated reason for writing it: “[T]o learn anything from the past it is necessary to know, as near as may be, the exact truth—if only from the narrowest motives.” Given that most of what we are offered today is mutated histories, in which ideology is served at the expense of the exact truth, such a philosophy is something that would be well worth recapturing as the general rule. His later books, though, are regarded mostly as hackwork, not false but fairly pedestrian and bombastic. Morris read and commented on them all, coming to the charitable conclusion that their main worth is illuminating Roosevelt himself, given his frequent habit of really talking about himself when he’s supposedly commenting on his biographical object.</span><br data-dcnode-id="1957"><br data-dcnode-id="1956"><span data-dcnode-id="1955" instrument_node="">Roosevelt was a constant risk-taker, who exemplified (and pushed) masculinity, something that everyone knows what it is, since it’s primarily biological, but today our cultural elite denies exists other than as a social construct, usually termed pernicious. Roosevelt’s life, in many ways, refutes the silly idea of masculinity (and femininity) being a construct in the same way that Samuel Johnson, when told that one could not prove matter existed, vigorously kicked a rock and exclaimed “I refute it thus!” Examples of Roosevelt’s over-the-top masculinity abound, including his repeatedly risking his life by riding scores of miles through blizzards in the Badlands, chasing for weeks down an icy river in the Dakota Territory cutthroats who had stolen his small boat, and his pushing through frequent severe ailments. But my favorite example is when, during his Dakota Territory career, he had a business dispute with a local man named Paddock, a known killer who had shot several men. Roosevelt was told that Paddock was threatening him behind his back. So he rode to Paddock’s house, knocked on the door, and when Paddock appeared, rasped “I understand that you have threatened to kill me on sight. I have come over to see when you want to begin the killing.” Paddock backed down—but really, who among us would be so manly today? Not me, even in my younger, more aggressive days. Still, we could use a lot more of this masculinity today, rather than Pajama Boy and an effeminate, lift-up-your-skirts-and-shriek terror of mythical “toxic masculinity,” which is a contradiction in terms, when masculinity is properly defined—though the deliberate conflation of masculinity with what, in an earlier time, would simply have been called “vice” or “evil” is the entire point of the myth, if you think about it.</span><br data-dcnode-id="1954"><br data-dcnode-id="1953"><span data-dcnode-id="1952" instrument_node="">And Roosevelt constantly pushed masculinity as a tonic for others and society, too, as well as exemplifying it nearly to the point of caricature. Not everybody responded favorably. It certainly didn’t raise Henry James’s already low opinion of Roosevelt that Roosevelt thought he had “delicate, effeminate sensitivities” and was a “miserable little snob” who, “because he finds he cannot play a man’s part among men, goes [to England] where he will be sheltered from the winds that harden stouter souls.” (On balance, though, Roosevelt was right, as you will discover if you subject yourself today to any of James’s novels.) Roosevelt was only too happy to prescribe a heaping dose of masculinity for anything that ailed any man, but it seems unlikely anyone took him up on it to the degree he probably thought necessary.</span><br data-dcnode-id="1951"><br data-dcnode-id="1950"><span data-dcnode-id="1949" instrument_node="">While I hesitate to make the comparison, because it is grossly unfair to Roosevelt and implies a wholly undeserved elevation of Trump, it is fascinating to see that the chattering classes often saw Roosevelt in the same way as Trump is viewed. Woodrow Wilson called Roosevelt “the most dangerous man of the age.” Mark Twain called him “clearly insane.” Luminaries like Henry Adams and Henry James regarded him with distaste. A prominent newspaper editor said “he is the most dangerous foe to human liberty that has ever set foot on American soil.” But like Trump, Roosevelt simply ignored these criticisms, and charged forward, his default stance for his entire life. He was blessed by good luck, he had discipline (even if he was very quirky in his personality), and he did not face the unified opposition of the dominant classes like Trump does, so my guess is that Roosevelt’s strategy worked a lot better for him than its rough analogue will work for Trump (though early returns are looking pretty good for Trump). Nonetheless, it’s worth noting that men of action do best when ignoring the caviling of effete intellectuals, who wish they were men of action, as every man does, but just can never seem to manage it.</span><br data-dcnode-id="1948"><br data-dcnode-id="1947"><span data-dcnode-id="1946" instrument_node="">The only truly odd thing I noted about this book is that there are repeated glancing references not only to the large, extended Roosevelt family, but to its great power, and to its influence over Theodore Roosevelt at important junctures. The family had been wealthy and prominent for generations, so its relevance to New York society is not surprising. What is surprising is that we never get any remotely clear picture of the extended family. We don’t get any details at all, not even how many people were considered to be “in” the family. I suppose that would have made the book longer, but the reader is mystified by the occasional references to “rich uncles” or “cousins” who have important opinions and whose good offices need to be solicited, or to the “resentment of family elders against Theodore” when the scandal of his drunken, adulterous brother became public, where neither the “uncles” nor the “elders” are ever specified, and no further mention is made of them.</span><br data-dcnode-id="1945"><br data-dcnode-id="1944"><span data-dcnode-id="1943" instrument_node="">Roosevelt was not an ideologue; he was too close to real humans for that. He criticized utopians from Marx to Tolstoy to Henry George—anyone who “believes that at this stage of the world’s progress it is possible to make everyone happy by an immense social revolution, just as other enthusiasts of a similar mental caliber believe in the possibility of constructing a perpetual-motion machine.” Not that raw populism was any better. The vox populi was “the voice of the devil, or what is still worse, the voice of a fool.” He was an populist elitist, in a sense—he was all for the people, if they were first suitably led and guided, with their wants and choices channeled, if and to the extent their wants and choices lacked objective merit when rated on universal standards. But Roosevelt was all about the merit—other than limitations caused by merit, he wanted no limitations at all on people’s ability to participate and achieve. Thus, he wanted to extend the franchise to women, when that was not a popular position. And, rarely for his time. he was strongly opposed to racial discrimination in America, and more broadly opposed to the belief that other races, in America or anywhere, were biologically inferior, again when the opposite was received wisdom. He certainly thought, with good reason, that other cultures were inferior, but firmly believed that any culture, in any place, in time, with guidance, could climb up to be just as good as American culture, and probably would, given time.</span><br data-dcnode-id="1942"><br data-dcnode-id="1941"><span data-dcnode-id="1940" instrument_node="">This approach led, usually, to a clear-eyed grasp of the realities of cultural clashes. Roosevelt described the result of frontier warfare as “where brutal and reckless frontiersmen are brought into contact with a set of treacherous, vengeful, and fiendishly cruel savages a long series of outrages by both sides is sure to follow.” James Cozzens, in "The Earth is Weeping," describes the Indian Wars with more detail and less overt judgment, but really, both men see those wars the same. As Morris summarizes Roosevelt’s thought, “Any black or red man who could win admission to ‘the fellowship of the doers’ was superior to the white man who failed.” By the same token, any culture, if it tried hard enough, could be “as intellectual as the Athenian.” Accustomed as we are to the stupid idea that oppression, real or imagined, dictates outcome regardless of “doing,” rather than merit and hard work overcoming any real oppression just as it can overcome any of the other limitations every person faces, as reality tells us, this approach is a breath of fresh air. On the other hand, Roosevelt’s cultural diagnoses were not perfect—he also thought that the aristocratic class in America would decline in relative numbers, but standards would be maintained, because of the “transmission of acquired characters” to the rest of America. Looking around, it hasn’t exactly worked out that way, as Charles Murray will be happy to detail for you, or J. D. Vance.</span><br data-dcnode-id="1939"><br data-dcnode-id="1938"><span data-dcnode-id="1937" instrument_node="">Roosevelt was primarily, by choice, a politician. Being a national politician was very different back then, not because the issues were different (they are in every time), nor because the political class was more virtuous (it’s always been dumb and vicious—it’s the ruling class that’s deteriorated), but because the whole country was relevant. To take one of many examples, Roosevelt assiduously cultivated William Allen White, “editor of a powerful Midwestern newspaper.” Today, to say those words is to snicker at the oxymoron embedded in them. Similarly, at every political convention, many kingmakers were men from places like Cleveland and Indianapolis. It was true in less obvious ways, too—senators were still elected by their state legislatures, rather than by popular vote, so their election was not subject, as it is today and increasingly so, to corrupting influence from outside the state. Our modern system, where only wealthy people on the coasts are relevant to most national political decisions, is much less healthy than the system Roosevelt worked in, where the national political ecosystem was composed of people in every sizeable community in the entire nation.</span><br data-dcnode-id="1936"><br data-dcnode-id="1935"><span data-dcnode-id="1934" instrument_node="">In any case, in his political life, Roosevelt had two main political obsessions, only one of which is really associated in the public mind with Roosevelt today. That one was American expansionism—a variety of Manifest Destiny, but since the frontier was closed during Roosevelt’s youth, a Manifest Destiny focused outward, to Cuba and the Philippines, with Canada and Mexico occasionally getting a baleful glance. I imagine that the average educated person, if asked to characterize Roosevelt in one word, would probably say something like “imperialist” or “jingo,” being quite familiar with that aspect of the Rooseveltian program.</span><br data-dcnode-id="1933"><br data-dcnode-id="1932"><span data-dcnode-id="1931" instrument_node="">But the second obsession, and one which dominated Roosevelt’s early career, was so-called civil service reform, and that is largely forgotten today. At the time, this meant improving the quality of government workers by various changes to the system by which they were hired, chief among them ending the spoils system, whereby government jobs at all levels were handed out to political supporters upon a change in administration, and those who held those jobs under a prior administration were shown the door. The proposed alternatives mostly involved competitive examinations for place, as well as permanent appointments—i.e., choosing on objective merit and breaking the tie to a particular political party that turnover permitted. Roosevelt referred to his view, and of his allies, as those “whose only care is to secure a pure and honest government.” This optimistic view made sense at the time, for no doubt the unseemly scramble by untalented men for sinecures was an affront to those seeking efficient and impartial government. At that time, legislative bribery was extremely common, and the idea of bureaucrats who would be immune to bribery was also attractive. This was long before the explosion of bureaucracy detonated by Woodrow Wilson and the Progressives, and long before the corruptions of leftist ideology took hold in the imagination of the ruling classes, to be implemented by the unaccountable agents of those ruling classes, with ill effects far exceeding mere bribery.</span><br data-dcnode-id="1930"><br data-dcnode-id="1929"><span data-dcnode-id="1928" instrument_node="">Roosevelt was very successful in making great strides toward his goals, which were then furthered by others. Unfortunately, however, the ultimate result is the opposite of “pure and honest government.” What we have today is a monstrous federal bureaucracy, the administrative state, wholly an aggressive wing of the most leftist elements of the Democratic Party, permanently entrenched and ever-expanding, with no accountability to anyone at all except their ideological trench mates. And that bureaucracy is ever increasing, not only in numbers, but in power, in the grip it has on ordinary Americans, and in the gloating enjoyment it takes in grinding those Americans, in general and in particular those who oppose its leftist dictates, into the dirt. Roosevelt would be appalled and dismayed at the horror to which his idealism contributed (though, certainly, Wilson and the Progressives bear more of the responsibility).</span><br data-dcnode-id="1927"><br data-dcnode-id="1926"><span data-dcnode-id="1925" instrument_node="">[Review continues as first comment.]</span></span><span data-dcnode-id="1923" instrument_node="">

</span><span data-dcnode-id="1839" id="freeTextContainer13230470618552267154"><span data-dcnode-id="1840" instrument_node="">I had wanted to read this book for some time and finally grabbed the audiobook from my library. It was not until I was on the second disc that I realized with disappointment that it was an abridgment. But I got over my disappointment because the narrator was superb and the pacing perfect. I always prefer the full work, but I see now why an abridgment is appealing. Still, I'd like to read or listen to the next two in the trilogy unabridged going forward.</span></span><span data-dcnode-id="1838" instrument_node="">

</span><span data-dcnode-id="1754" id="freeText10076993135996260656" style="display:none"><span data-dcnode-id="1758" instrument_node="">It's hard to separate my admiration for Theodore Roosevelt from my appreciation for Edmund Morris's great biography. Theodore is an unexpectedly remarkable and fascinating individual. Edmund paints a compelling picture of Teddy with his boyish enthusiasms, boundless energy, magnetic personality, odd speaking style (at least for much of his early career), and top flight intellect. Roosevelt was a committed amateur biologist who wrote one of his many books on the big game animals of the west. He wrote a number of biographies of political figures emphasizing his own theory of manifest destiny for America. Teddy could knock out a book in a few months -- with his photographic memory he remembered everything he read and could synthesize that information and dictate a manuscript without slowing to consult his notes. This same intellect made him a formidable raconteur and dinner table conversationalist. He was known for inviting experts on history, philosophy, religion, or science to dinner and then dominating the conversation by telling his guest all about the area of his guest's specialty. (But the favorable impression left by so much knowledge was probably somewhat tarnished by his inability to pause and listen). Roosevelt's eastern "dude" image was softened by his cowboy status having been a deputy sheriff in North Dakota and bringing three desperados to justice. His one unsuccessful attempt at business (at least financially, he had a great time doing it), was establishing a cattle ranch near Dickinson, ND, where Janie once taught school. He led his cowboy rough riders regiment in the Spanish American War and almost won the congressional medal of honor for leading the charge up San Juan Hill. By the way, as the Assistant Secretary of the Navy, he did more than almost anyone (with the possible exception of the Spanish) to trigger the Spanish American War.</span><br data-dcnode-id="1757"><br data-dcnode-id="1756"><span data-dcnode-id="1755" instrument_node="">This is the best book I have read this year. And maybe last year, too.</span></span><span data-dcnode-id="1753" instrument_node="">

</span><span data-dcnode-id="1660" id="freeTextContainer15153303666567888832"><span data-dcnode-id="1661" instrument_node="">In the early afternoon of September 13, 1901, Vice President Theodore Roosevelt was eating lunch on his descent from the top of Mount Marcy where he no doubt had contemplated his future not only in politics but in life. Now just hours after possibly concluding that his political fortunes would descend as he would from the mountain top, a ranger baring a yellow telegram message came into view that would mark the end of "The Rise of Theodore Roosevelt" not in political obscurity but it's mountain </span></span><span data-dcnode-id="1659" instrument_node="">
</span><span data-dcnode-id="1648" id="freeText15153303666567888832" style="display:none"><span data-dcnode-id="1658" instrument_node="">In the early afternoon of September 13, 1901, Vice President Theodore Roosevelt was eating lunch on his descent from the top of Mount Marcy where he no doubt had contemplated his future not only in politics but in life. Now just hours after possibly concluding that his political fortunes would descend as he would from the mountain top, a ranger baring a yellow telegram message came into view that would mark the end of "The Rise of Theodore Roosevelt" not in political obscurity but it's mountain top.</span><br data-dcnode-id="1657"><br data-dcnode-id="1656"><span data-dcnode-id="1655" instrument_node="">Edmund Morris ended the first volume of his biography of Theodore Roosevelt on the cusp of becoming President of the United States after detailing Roosevelt's life to that point from his birth in October 1858. Along the way, Morris shows the development of Roosevelt's views from youth to maturity, in life and in politics. While descriptive and showing fascination with his subject, Morris does not gush upon Roosevelt forgiveness when confronted with demeaning views, speeches, and writings that to the 21st century would raise our eyebrows.</span><br data-dcnode-id="1654"><br data-dcnode-id="1653"><span data-dcnode-id="1652" instrument_node="">The detail Morris shows in this biography on almost a daily basis bring Roosevelt to life, first as a unhealthy child who fascination for learning about the natural world was cultivated by his father who also encourage him to build up his body as well as his mind. Roosevelt's transformation from a fashionable dandy undergraduate at Harvard yearn for reform in politics into the political Rough Rider that was about to assume the Presidency is a long process that Morris shows the reader so well, the reader doesn't realize it until almost the end of the volume.</span><br data-dcnode-id="1651"><br data-dcnode-id="1650"><span data-dcnode-id="1649" instrument_node="">From seeing Roosevelt at the height of his power in the prologue then see his rise, both slow and meteoric, through the epilogue, Morris hooks the reader in and makes them eagerly anticipate what will be seen on the next page. I can not recommend enough "The Rise of Theodore Roosevelt" by Edmund Morris to every student of history and to anyone who loves political biographies.</span></span><span data-dcnode-id="1647" instrument_node="">

</span><span data-dcnode-id="1545" id="freeText5783071627311646424" style="display:none"><span data-dcnode-id="1546" instrument_node="">With apologies to Robert E. Howard: "Hither came Teddy Roosevelt, the President, blonde-haired, four-eyed, gun in hand, a politician, a reaver, a slayer, with gigantic melancholies and gigantic mirth, to tread the jeweled thrones of the Earth under his boot-clad feet." Theodore Roosevelt was not without his flaws, but he was a truly incredible man. This man led a life which can only be described as "unbelievable". It is literally hard to believe. Morris does an incredible job of contextualizing the important, contemporary political and social issues which Roosevelt encountered, shaped and created leading up to Pres. Mc Kinley's assasination and Roosevelt's receipt of the presidency -- issues which most Americans today cannot truly understand, and about which most Americans today know nothing. This is the kind of book I wish I'd been assigned in High School, the kind of book which I would have devoured as a boy. It ends, powerfully, with the delivery of the letter indicating that the President Mc Kinley had died. I cannot wait to read the next two volumes! </span></span><span data-dcnode-id="1544" instrument_node="">

</span><span data-dcnode-id="1275" id="freeTextContainer4466204217121331967"><span data-dcnode-id="1279" instrument_node="">"Mistah SPEEK-AH! Mistah SPEE-KAH!"</span><br data-dcnode-id="1278"><br data-dcnode-id="1277"><span data-dcnode-id="1276" instrument_node="">A very well-written and engaging biography. Roosevelt, pre-presidency, was a man of boundless energy and ambition. A cross between his privileged, millionaire, Harvard-educated East society, and his rugged, colloquial, rancher Western crowd, Roosevelt embodied his idea of what he thought it meant to be American. While at times the narrative felt like it was written by an old white dude (some cringeworthy moments with women and Native Americans), Morris does a f</span></span><span data-dcnode-id="1274" instrument_node="">
</span><span data-dcnode-id="1269" id="freeText4466204217121331967" style="display:none"><span data-dcnode-id="1273" instrument_node="">"Mistah SPEEK-AH! Mistah SPEE-KAH!"</span><br data-dcnode-id="1272"><br data-dcnode-id="1271"><span data-dcnode-id="1270" instrument_node="">A very well-written and engaging biography. Roosevelt, pre-presidency, was a man of boundless energy and ambition. A cross between his privileged, millionaire, Harvard-educated East society, and his rugged, colloquial, rancher Western crowd, Roosevelt embodied his idea of what he thought it meant to be American. While at times the narrative felt like it was written by an old white dude (some cringeworthy moments with women and Native Americans), Morris does a fine job of documenting the life of a man who has worn "many hats." I think the only thing I wanted to know more about was Roosevelt the husband, the family man. For someone who embodies a lot of core WASP values, I was pretty surprised we didn't see more about Roosevelt the husband, Roosevelt the father. At 800 pages the book's already pretty long, but it seemed more like Morris wanted to focus on the political and historical. Other than that, it was a fine read and I'm looking forward to the next two. </span></span><span data-dcnode-id="1268" instrument_node="">

</span><span data-dcnode-id="481" id="freeTextContainer5245971622675779905"><i data-dcnode-id="494"><span data-dcnode-id="498" instrument_node="">Librarian Note: There is more than one author in the Goodreads database with this name. This profile may contain books from multiple authors of this name. </span><br data-dcnode-id="497"><br data-dcnode-id="496"><span data-dcnode-id="495" instrument_node="">Other authors with this name:</span></i><br data-dcnode-id="493"><br data-dcnode-id="492"><a data-dcnode-id="490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/author/show/5024578.Edmund_Morris" rel="nofollow noopener" title="Edmund Morris"><span data-dcnode-id="491" instrument_node="">Edmund Morris</span></a><span data-dcnode-id="489" instrument_node=""> (1804-1874)</span><br data-dcnode-id="488"><a data-dcnode-id="486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/author/show/5024583.Edmund_Morris" rel="nofollow noopener" title="Edmund Morris"><span data-dcnode-id="487" instrument_node="">Edmund Morris</span></a><span data-dcnode-id="485" instrument_node="">, actor, playwright, author of screenplays</span><br data-dcnode-id="484"><br data-dcnode-id="483"><span data-dcnode-id="482" instrument_node="">Edmund Morris was a writer best known for his biographies of United States presidents Theodore Roosevelt and Ronald Reagan. Morris recei</span></span><span data-dcnode-id="480" instrument_node="">
</span><span data-dcnode-id="424" id="freeText5245971622675779905" style="display:none"><i data-dcnode-id="475"><span data-dcnode-id="479" instrument_node="">Librarian Note: There is more than one author in the Goodreads database with this name. This profile may contain books from multiple authors of this name. </span><br data-dcnode-id="478"><br data-dcnode-id="477"><span data-dcnode-id="476" instrument_node="">Other authors with this name:</span></i><br data-dcnode-id="474"><br data-dcnode-id="473"><a data-dcnode-id="471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/author/show/5024578.Edmund_Morris" rel="nofollow noopener" title="Edmund Morris"><span data-dcnode-id="472" instrument_node="">Edmund Morris</span></a><span data-dcnode-id="470" instrument_node=""> (1804-1874)</span><br data-dcnode-id="469"><a data-dcnode-id="467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/author/show/5024583.Edmund_Morris" rel="nofollow noopener" title="Edmund Morris"><span data-dcnode-id="468" instrument_node="">Edmund Morris</span></a><span data-dcnode-id="466" instrument_node="">, actor, playwright, author of screenplays</span><br data-dcnode-id="465"><br data-dcnode-id="464"><span data-dcnode-id="463" instrument_node="">Edmund Morris was a writer best known for his biographies of United States presidents Theodore Roosevelt and Ronald Reagan. Morris received his early education in Kenya after which he attended Rhodes University in South Africa. He worked as an advertising copywriter in London before emigrating to the United States in 1968.</span><br data-dcnode-id="462"><br data-dcnode-id="461"><span data-dcnode-id="460" instrument_node="">His biography </span><a data-dcnode-id="458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/40929.The_Rise_of_Theodore_Roosevelt" rel="nofollow noopener" title="The Rise of Theodore Roosevelt"><span data-dcnode-id="459" instrument_node="">The Rise of Theodore Roosevelt</span></a><span data-dcnode-id="457" instrument_node=""> won the Pulitzer Prize and National Book Award in 1980. After spending 14 years as President Reagan's authorized biographer, he published the national bestseller </span><a data-dcnode-id="455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/376589.Dutch__A_Memoir_of_Ronald_Reagan" rel="nofollow noopener" title="Dutch: A Memoir of Ronald Reagan"><span data-dcnode-id="456" instrument_node="">Dutch: A Memoir of Ronald Reagan</span></a><span data-dcnode-id="454" instrument_node=""> in 1999.</span><br data-dcnode-id="453"><br data-dcnode-id="452"><span data-dcnode-id="451" instrument_node="">Morris's other books include </span><a data-dcnode-id="449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/40923.Theodore_Rex" rel="nofollow noopener" title="Theodore Rex"><span data-dcnode-id="450" instrument_node="">Theodore Rex</span></a><span data-dcnode-id="448" instrument_node="">, the second in a projected three-volume chronicle of the life of Theodore Roosevelt, and </span><a data-dcnode-id="446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/126666.Beethoven__The_Universal_Composer" rel="nofollow noopener" title="Beethoven: The Universal Composer"><span data-dcnode-id="447" instrument_node="">Beethoven: The Universal Composer</span></a><span data-dcnode-id="445" instrument_node="">. Mr. Morris wrote extensively on travel and the arts for such publications as </span><i data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">The New Yorker</span></i><span data-dcnode-id="442" instrument_node="">, the </span><i data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">New York Times</span></i><span data-dcnode-id="439" instrument_node="">, and </span><i data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Harper's Magazine</span></i><span data-dcnode-id="436" instrument_node="">.</span><br data-dcnode-id="435"><br data-dcnode-id="434"><span data-dcnode-id="433" instrument_node="">Edmund Morris lived in New York City and Kent, Connecticut with his wife and fellow biographer, </span><a data-dcnode-id="431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/author/show/4146302.Sylvia_Jukes_Morris" rel="nofollow noopener" title="Sylvia Jukes Morris"><span data-dcnode-id="432" instrument_node="">Sylvia Jukes Morris</span></a><span data-dcnode-id="430" instrument_node="">.</span><br data-dcnode-id="429"><br data-dcnode-id="428"><span data-dcnode-id="427" instrument_node="">Morris died on May 24, 2019 at a hospital in Kent, from a stroke at the age of 78.</span><br data-dcnode-id="426"><br data-dcnode-id="425"></span><span data-dcnode-id="423" instrument_node="">
