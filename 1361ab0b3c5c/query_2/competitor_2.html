" data-image-caption="" data-medium-file="https://i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Kelmscott_Manor_News_from_Nowhere-1.jpg?fit=215%2C300&amp;amp;ssl=1" data-large-file="https://i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Kelmscott_Manor_News_from_Nowhere-1.jpg?fit=732%2C1024&amp;amp;ssl=1" loading="lazy" class="alignleft wp-image-2896" src="https://i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Kelmscott_Manor_News_from_Nowhere-1.jpg?resize=160%2C224&amp;#038;ssl=1" alt="William Morris, These Fantasic Worlds, News from Nowhere" width="160" height="224" srcset="https://i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Kelmscott_Manor_News_from_Nowhere-1.jpg?resize=215%2C300&amp;amp;ssl=1 215w, https://i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Kelmscott_Manor_News_from_Nowhere-1.jpg?resize=768%2C1074&amp;amp;ssl=1 768w, https://i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Kelmscott_Manor_News_from_Nowhere-1.jpg?resize=732%2C1024&amp;amp;ssl=1 732w, https://i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Kelmscott_Manor_News_from_Nowhere-1.jpg?resize=680%2C951&amp;amp;ssl=1 680w, https://i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Kelmscott_Manor_News_from_Nowhere-1.jpg?resize=920%2C1287&amp;amp;ssl=1 920w, https://i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Kelmscott_Manor_News_from_Nowhere-1.jpg?w=1054&amp;amp;ssl=1 1054w" sizes="(max-width: 160px) 100vw, 160px" data-recalc-dims="1" /&gt;</span></noscript></a></p><span data-dcnode-id="1170" instrument_node="">
</span><p data-dcnode-id="1167"><strong data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">The works of William Morris pulsate with energy, passion and inventiveness. His appeal, still strong today through the medium of his designs for wallpapers and fabrics, derives from the breadth of his achievements, a concern for his fellow man and the powerfully sympathetic response to nature which fed the swirling patterns of his decorative designs.</span></strong></p><span data-dcnode-id="1166" instrument_node="">
</span><p data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">Poet, painter, designer, typographer, polemicist, manufacturer and Socialist, Morris leapt from one enthusiasm to another, living his life with a restless energy that led him constantly to seek and solve new challenges. At his core was the commitment to a basic philosophy that good design came from a good society. He was a warm, generous man prone to enraged frustrations, a sensitive man who could be brutal in his constant grip on quality. His mastery over one craft after another ensured his absolute dominance in the field of the decorative arts where he is still regarded as the greatest British pattern designer.</span></p><span data-dcnode-id="1163" instrument_node="">
</span><p data-dcnode-id="1149"><span data-dcnode-id="1162" instrument_node="">His contemporaries viewed him with a mixture of reverence and affection. The designer and teacher </span><strong data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">William</span></strong><span data-dcnode-id="1159" instrument_node="">&nbsp;</span><strong data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Letharby</span></strong><span data-dcnode-id="1156" instrument_node="">, a prodigious talent himself, declared that Morris was the ‘…greatest pattern designer we have had or ever can have, for a man of scale will not again be working in the minor arts’. </span><strong data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">W.B. Yeats</span></strong><span data-dcnode-id="1153" instrument_node="">, in </span><em data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">Autobiographies</span></em><span data-dcnode-id="1150" instrument_node=""> 1955, said that</span></p><span data-dcnode-id="1148" instrument_node="">
</span><blockquote data-dcnode-id="1145"><p data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">‘…if some angel offered me the choice, I would rather live his life, poetry and all rather than my own or any other man’s.’</span></p></blockquote><span data-dcnode-id="1144" instrument_node="">
</span><p data-dcnode-id="1140"><strong data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">Bernard Shaw</span></strong><span data-dcnode-id="1141" instrument_node=""> wrote that Morris was</span></p><span data-dcnode-id="1139" instrument_node="">
</span><blockquote data-dcnode-id="1136"><p data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">‘…great not only among little men but among great ones’.</span></p></blockquote><span data-dcnode-id="1135" instrument_node="">
</span><p data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">These observations, from men of very different disciplines reveal the strengths of Morris. To all appearances the scale of his interests and achievements can be daunting if taken methodically, one at a time. To do so would undermine the essential diversity and range of a man whose doctor reported that the cause of death was ‘simply being William Morris, and having done more work than most ten men.’ Morris toiled with a rumbustuous joy that drove his broad creative energies hard.</span></p><span data-dcnode-id="1132" instrument_node="">
</span><p data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">To many he&nbsp;seemed like a Renaissance Man, which was ironic because he detested the period and all it stood for, and yet he was straightforward in his motivations, above all a designer, signing himself as such when he joined the Democratic Federation in 1883. This essentially simple vocation informed his thinking and absorbed his attention : for Morris there was a strong moral association between the artist and his work. He believed that true artists were people who could express themselves completely through the material they worked with, benefiting from the full value of their labours. He did not, however, fully express himself in any one activity, settling instead for a complex vortex of crafts, arts, literature and politics as though no single medium could contain the passionate committed turmoil of his imagination.</span></p><span data-dcnode-id="1129" instrument_node="">
</span><h2 data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">Morris and The Victorians</span></h2><span data-dcnode-id="1126" instrument_node="">
</span><p data-dcnode-id="1121"><a data-dcnode-id="1122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Honeysuckle-William-Morris.jpg%3Fssl%3D1" rel="attachment wp-att-2898"><img alt="William Morris, Honeysuckle design" class="alignleft wp-image-2898 jetpack-lazy-image jetpack-lazy-image--handled" data-attachment-id="2898" data-comments-opened="1" data-dcnode-id="1125" data-image-caption="" data-image-description="<p>William Morris’ Honeysuckle design, 1876</p>
" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;William Morris' Honeysuckle design&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;William Morris' Honeysuckle design&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="William Morris’ Honeysuckle design" data-large-file="https://i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Honeysuckle-William-Morris.jpg?fit=634%2C682&amp;ssl=1" data-lazy-loaded="1" data-medium-file="https://i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Honeysuckle-William-Morris.jpg?fit=279%2C300&amp;ssl=1" data-orig-file="https://i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Honeysuckle-William-Morris.jpg?fit=634%2C682&amp;ssl=1" data-orig-size="634,682" data-permalink="https://thesefantasticworlds.com/william-morris-utopia-industry-art/william-morris-honeysuckle-design/" data-recalc-dims="1" height="172" loading="eager" sizes="(max-width: 160px) 100vw, 160px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Honeysuckle-William-Morris.jpg%3Fresize%3D160%252C172%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Honeysuckle-William-Morris.jpg?resize=160%2C172&amp;ssl=1 160w, https://i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Honeysuckle-William-Morris.jpg?resize=279%2C300&amp;ssl=1 279w, https://i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Honeysuckle-William-Morris.jpg?w=634&amp;ssl=1 634w" title="William Morris' Honeysuckle design" width="160"><noscript data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">&lt;img data-attachment-id="2898" data-permalink="https://thesefantasticworlds.com/william-morris-utopia-industry-art/william-morris-honeysuckle-design/" data-orig-file="https://i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Honeysuckle-William-Morris.jpg?fit=634%2C682&amp;amp;ssl=1" data-orig-size="634,682" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"William Morris&amp;#039; Honeysuckle design","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"William Morris&amp;#039; Honeysuckle design","orientation":"1"}" data-image-title="William Morris&amp;#8217; Honeysuckle design" data-image-description="&amp;lt;p&amp;gt;William Morris&amp;#8217; Honeysuckle design, 1876&amp;lt;/p&amp;gt;
" data-image-caption="" data-medium-file="https://i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Honeysuckle-William-Morris.jpg?fit=279%2C300&amp;amp;ssl=1" data-large-file="https://i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Honeysuckle-William-Morris.jpg?fit=634%2C682&amp;amp;ssl=1" loading="lazy" class="alignleft wp-image-2898" title="William Morris' Honeysuckle design" src="https://i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Honeysuckle-William-Morris.jpg?resize=160%2C172&amp;#038;ssl=1" alt="William Morris, Honeysuckle design" width="160" height="172" srcset="https://i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Honeysuckle-William-Morris.jpg?resize=160%2C172&amp;amp;ssl=1 160w, https://i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Honeysuckle-William-Morris.jpg?resize=279%2C300&amp;amp;ssl=1 279w, https://i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Honeysuckle-William-Morris.jpg?w=634&amp;amp;ssl=1 634w" sizes="(max-width: 160px) 100vw, 160px" data-recalc-dims="1" /&gt;</span></noscript></a></p><span data-dcnode-id="1120" instrument_node="">
</span><p data-dcnode-id="1111"><span data-dcnode-id="1119" instrument_node="">It is ironic that the name William Morris is linked with the notion of Victorian design. This would have enraged Morris. His philosophies on the rightness of art, the value of human endeavour and the corrupting nature of manufacturing from profit runs in direct opposition to Victorian society. The artifice, indulgence and shoddy workmanship represented by industrial advances were anathema to him. He preferred sentiment to sentimentality, natural simplicity to artificial profusion. Such tensions gave rise to much of his greatest work, ranging from the beauty of the Kelmscott edition of Chaucer’s </span><em data-dcnode-id="1116"><strong data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">Canterbury Tales</span></strong></em><span data-dcnode-id="1115" instrument_node="">, the burgeoning tendrils of the wallpaper design </span><strong data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">Honeysuckle</span></strong><span data-dcnode-id="1112" instrument_node=""> and his&nbsp;strident lectures on art and democracy in the 1880s.</span></p><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Morris fulminated against the dehumanising industrialisation that fuelled the economy of the British Empire. He did not object to the machines themselves but their use by some to produce profits through the exploitation others. This was part of an holistic world view which saw art as a litmus test for the health of the nation. ‘Unless people care about carrying on their business without making the world hideous, how can they care about art?’ he declared. The production of shoddy goods for the express purpose of making only profit led to a decline in the moral standing of those who were forced to produce them. Only by making, for instance, furniture, honestly with a true joy in the craftsmanship and a share in the benefits in making it, could people become true to themselves.</span></p><span data-dcnode-id="1107" instrument_node="">
</span><h2 data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Medieval&nbsp;Authenticity</span></h2><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1099"><a data-dcnode-id="1100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Chaucer-Canterbury-Tales-William-Morris.jpg%3Fssl%3D1" rel="attachment wp-att-2899"><img alt="William Morris, Chaucer, Canterbury Tales, These Fantastic Worlds" class="alignleft wp-image-2899 jetpack-lazy-image jetpack-lazy-image--handled" data-attachment-id="2899" data-comments-opened="1" data-dcnode-id="1103" data-image-caption="" data-image-description="<p>William Morris’ magnificent Kelmscott edition of Chaucer’s Canterbury Tales.</p>
" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;William Morris' magnificent Kelmscott edition of Chaucer's Canterbury Tales.&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;William Morris' magnificent Kelmscott edition of Chaucer's Canterbury Tales.&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="William Morris’ magnificent Kelmscott edition of Chaucer’s Canterbury Tales." data-large-file="https://i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Chaucer-Canterbury-Tales-William-Morris.jpg?fit=576%2C425&amp;ssl=1" data-lazy-loaded="1" data-medium-file="https://i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Chaucer-Canterbury-Tales-William-Morris.jpg?fit=300%2C221&amp;ssl=1" data-orig-file="https://i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Chaucer-Canterbury-Tales-William-Morris.jpg?fit=576%2C425&amp;ssl=1" data-orig-size="576,425" data-permalink="https://thesefantasticworlds.com/william-morris-utopia-industry-art/william-morris-magnificent-kelmscott-edition-of-chaucers-canterbury-tales/" data-recalc-dims="1" height="148" loading="eager" sizes="(max-width: 200px) 100vw, 200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Chaucer-Canterbury-Tales-William-Morris.jpg%3Fresize%3D200%252C148%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Chaucer-Canterbury-Tales-William-Morris.jpg?resize=300%2C221&amp;ssl=1 300w, https://i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Chaucer-Canterbury-Tales-William-Morris.jpg?w=576&amp;ssl=1 576w" title="William Morris' magnificent Kelmscott edition of Chaucer's Canterbury Tales." width="200"><noscript data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">&lt;img data-attachment-id="2899" data-permalink="https://thesefantasticworlds.com/william-morris-utopia-industry-art/william-morris-magnificent-kelmscott-edition-of-chaucers-canterbury-tales/" data-orig-file="https://i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Chaucer-Canterbury-Tales-William-Morris.jpg?fit=576%2C425&amp;amp;ssl=1" data-orig-size="576,425" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"William Morris&amp;#039; magnificent Kelmscott edition of Chaucer&amp;#039;s Canterbury Tales.","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"William Morris&amp;#039; magnificent Kelmscott edition of Chaucer&amp;#039;s Canterbury Tales.","orientation":"1"}" data-image-title="William Morris&amp;#8217; magnificent Kelmscott edition of Chaucer&amp;#8217;s Canterbury Tales." data-image-description="&amp;lt;p&amp;gt;William Morris&amp;#8217; magnificent Kelmscott edition of Chaucer&amp;#8217;s Canterbury Tales.&amp;lt;/p&amp;gt;
" data-image-caption="" data-medium-file="https://i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Chaucer-Canterbury-Tales-William-Morris.jpg?fit=300%2C221&amp;amp;ssl=1" data-large-file="https://i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Chaucer-Canterbury-Tales-William-Morris.jpg?fit=576%2C425&amp;amp;ssl=1" loading="lazy" class="alignleft wp-image-2899" title="William Morris' magnificent Kelmscott edition of Chaucer's Canterbury Tales." src="https://i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Chaucer-Canterbury-Tales-William-Morris.jpg?resize=200%2C148&amp;#038;ssl=1" alt="William Morris, Chaucer, Canterbury Tales, These Fantastic Worlds" width="200" height="148" srcset="https://i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Chaucer-Canterbury-Tales-William-Morris.jpg?resize=300%2C221&amp;amp;ssl=1 300w, https://i0.wp.com/thesefantasticworlds.com/wp-content/uploads/2016/03/Chaucer-Canterbury-Tales-William-Morris.jpg?w=576&amp;amp;ssl=1 576w" sizes="(max-width: 200px) 100vw, 200px" data-recalc-dims="1" /&gt;</span></noscript></a></p><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1087"><span data-dcnode-id="1097" instrument_node="">Morris, like many of the thinkers and artists of the day, looked back to the pre-industrial middle ages where a sense of natural order prevailed, where there was respect for the countryside and an understanding of the value in a craftsman’s work. Like the poetry of </span><strong data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">Tennyson</span></strong><span data-dcnode-id="1094" instrument_node="">, the music of </span><strong data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Wagner</span></strong><span data-dcnode-id="1091" instrument_node=""> and the paintings of </span><strong data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Millais</span></strong><span data-dcnode-id="1088" instrument_node="">, Morris sought to express his vision of the world through an ideal medieval landscape, turning, initially, from the squalor of the nineteenth century to an escape into romance, mythology and chivalry.</span></p><span data-dcnode-id="1086" instrument_node="">
</span><p data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Later, equipped with the experiences of his exceptional life he sought to change the world he lived in rather than seek a temporary escape from it. He harnessed the lessons of the past into a unified vision of society where art was intrinsic to everyday life. This was a search for a better life through constructive criticism, positive action and by example. Morris saw no difference between the maker and the thinker, the artist and the politician because he was all of these things himself and he understood that relative values were false, that the skills of one contributor to society such as a thinker like Thomas Carlyle or John Ruskin were no greater than those human skills of making a chair or a painting. He rarely compromised on his strong sense of vision, which included the requirement to think and feel through the raw materials:</span></p><span data-dcnode-id="1083" instrument_node="">
</span><blockquote data-dcnode-id="1080"><p data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">‘Never forget the material you are working with, and always try to use it for what it can do best.’</span></p></blockquote><span data-dcnode-id="1079" instrument_node="">
</span><p data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">This came partly from a desire to reflect the flowing lines and rough fluidity of the natural world. He drew a precise and lyrical pleasure from the whole process of designing his patterns, ranging from the research of natural and historical references to the physical mixing of the colour for the cloth.</span></p><span data-dcnode-id="1076" instrument_node="">
</span><h2 data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">Morris &amp; Co</span></h2><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1052"><span data-dcnode-id="1072" instrument_node="">William Morris was a rare and genuine force of cultural change, a central figure in the development of modern culture. He&nbsp;was an entrepreneur of unusual creativity, surrounding himself with a cauldron of talented people both as friends and memebers of his company Morris &amp; C;&nbsp;</span><strong data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Edward Burne-Jones</span></strong><span data-dcnode-id="1069" instrument_node="">, </span><strong data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">Dante Gabriel Rossetti</span></strong><span data-dcnode-id="1066" instrument_node="">, </span><strong data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Ford Madox Brown</span></strong><span data-dcnode-id="1063" instrument_node="">, </span><strong data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Philip Webb</span></strong><span data-dcnode-id="1060" instrument_node=""> and </span><strong data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Arthur Mackmurdo</span></strong><span data-dcnode-id="1057" instrument_node="">&nbsp;were all drawn to and sympathetic with his rebellion against Victorian values. The clarity and honesty of his approach enabled these men and many others to define their own revolt against the Age and turn it&nbsp;to a more worthy future. Morris’ own fiction, including the influential&nbsp;</span><em data-dcnode-id="1054"><strong data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">News from Nowhere</span></strong></em><span data-dcnode-id="1053" instrument_node=""> (1890), and his achingly difficult epic poetry brought his ideals, and Utopian instincts for hard work, honesty and creativity to an audience which was probably more interested in the beautiful designs of his wallpaper!</span></p><span data-dcnode-id="1051" instrument_node="">
