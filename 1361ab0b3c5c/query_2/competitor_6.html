</span><p data-dcnode-id="731"><font data-dcnode-id="732" face="Verdana" size="2"><b data-dcnode-id="733"><a data-dcnode-id="735" name="design"></a><span data-dcnode-id="734" instrument_node="">What is Design?</span></b></font></p><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="724"><font data-dcnode-id="725" face="Verdana" size="2"><span data-dcnode-id="729" instrument_node="">Although there is no universal definition 
        of the word "design", we will define it for our purposes as 
        meaning: "the plan involved in creating something according to a 
        set of aesthetics." Key aspects of this definition include: the element 
        of a plan; the idea of creation (art) rather than production (science); 
        the criteria of </span><a data-dcnode-id="727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/definitions/aesthetics.htm"><span data-dcnode-id="728" instrument_node="">aesthetics</span></a><span data-dcnode-id="726" instrument_node=""> (a 
        style of beauty). Other factors may be involved in the design process, 
        such as functionality or cost, but we are concerned here mainly with artistic 
        design or - to put it crudely - "how to make something beautiful".</span></font></p><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="718"><font data-dcnode-id="719" face="Verdana" size="2"><b data-dcnode-id="720"><a data-dcnode-id="722" name="types"></a><span data-dcnode-id="721" instrument_node="">What Types of Objects 
        Can be Designed Artistically?</span></b></font></p><span data-dcnode-id="717" instrument_node="">
</span><p data-dcnode-id="711"><font data-dcnode-id="712" face="Verdana" size="2"><span data-dcnode-id="716" instrument_node="">Almost everything that is made, can be 
        designed in an artistic or aesthetic way. This includes highly specialized 
        engineering products as well as run-of-the-mill mass-produced objects, 
        although the present article examines only the latter category. Even so, 
        it still includes a wide variety of products, from a tea-cup, lamp, or 
        staircase, to the roof of a railway station or concert hall, a duvet cover, 
        a company logo, or computer mouse. Note however, that artistic design 
        is restricted to the </span><i data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">prettification</span></i><span data-dcnode-id="713" instrument_node=""> of objects, rather than the 
        improvement of functionality, performance, cost or other non-aesthetic 
        criteria.</span></font></p><span data-dcnode-id="710" instrument_node="">

</span><p data-dcnode-id="628"><font data-dcnode-id="629" face="Arial" size="1"><b data-dcnode-id="630"><font color="#FF0000" data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">RENAISSANCE DESIGN</span></font><br data-dcnode-id="637"><span data-dcnode-id="636" instrument_node="">

        artistic design, see: </span><a data-dcnode-id="632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/drawing/disegno.htm"><span data-dcnode-id="633" instrument_node="">Disegno</span></a><span data-dcnode-id="631" instrument_node="">.</span></b></font></p><span data-dcnode-id="627" instrument_node="">
</span></td><td data-dcnode-id="581" valign="top" width="524"><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="619"><font data-dcnode-id="620" face="Verdana" size="2"><b data-dcnode-id="621"><a data-dcnode-id="623" name="artistic"></a><span data-dcnode-id="622" instrument_node="">Artistic Design 
        Disciplines</span></b></font></p><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="612"><font data-dcnode-id="613" face="Verdana" size="2"><span data-dcnode-id="617" instrument_node="">Design science as a whole has been expanding 
        rapidly, ever since the 1960s. Today, there is an ever-increasing number 
        of design disciplines in which aesthetics play an important part, including: 
        architecture, book illustration, interior design, lighting design, furniture 
        design, kitchenware design, textile design, fashion design, retail design, 
        graphic design, computer design, and web design. Moreover, within a range 
        of IT-related areas - like web design and software design - the concept 
        of "look-and-feel" is becoming increasingly important to consumers 
        and designers, while graphic and layout design is also critical in the 
        area of online social media outlets, including </span><i data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Facebook</span></i><span data-dcnode-id="614" instrument_node="">.</span></font></p><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="606"><font data-dcnode-id="607" face="Verdana" size="2"><b data-dcnode-id="608"><a data-dcnode-id="610" name="art"></a><span data-dcnode-id="609" instrument_node="">What Types of Art 
        are involved in Artistic Designwork?</span></b></font></p><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="587"><font data-dcnode-id="588" face="Verdana" size="2"><span data-dcnode-id="604" instrument_node="">Artistic skills which are valuable in the 
        creation of beautiful designs for individual items, include: </span><a data-dcnode-id="602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/fine-art-painting.htm"><span data-dcnode-id="603" instrument_node="">painting</span></a><span data-dcnode-id="601" instrument_node=""> 
        (eg. chinaware, book illumination), </span><a data-dcnode-id="599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/sculpture/wood-carving.htm"><span data-dcnode-id="600" instrument_node="">wood-carving</span></a><span data-dcnode-id="598" instrument_node=""> 
        (furniture), weaving (tapestry, embroidery), </span><a data-dcnode-id="596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/ceramics.htm"><span data-dcnode-id="597" instrument_node="">ceramics</span></a><span data-dcnode-id="595" instrument_node=""> 
        (sculpture as well as </span><a data-dcnode-id="593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/pottery.htm"><span data-dcnode-id="594" instrument_node="">ancient pottery</span></a><span data-dcnode-id="592" instrument_node="">), metalwork 
        (lamps, jewellery), glass art (mosaic art, stained glass), </span><a data-dcnode-id="590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/graphic-art.htm"><span data-dcnode-id="591" instrument_node="">graphic 
        art</span></a><span data-dcnode-id="589" instrument_node=""> (printwork, illustration, fabrics, clothes), to name but a few.</span></font></p><span data-dcnode-id="586" instrument_node="">
</span><p data-dcnode-id="583"><font data-dcnode-id="584" face="Verdana" size="2"><span data-dcnode-id="585" instrument_node="">For mass-produced items, design is an integral 
        part of the product development process. If car design, white-goods design 
        and fabric design represented peaks of innovation in the 1970s and 80s, 
        today it is IT-design, as exemplified by Apple Corporation's computer 
        products, which represent the touchstone of 21st century consumer aesthetics. 
        In addition, almost all household objects are initiated and manufactured 
        with aesthetics in mind, as are cars, office equipment and sports goods.</span></font></p><span data-dcnode-id="582" instrument_node="">

</span><table align="center" border="0" cellpadding="5" cellspacing="2" data-dcnode-id="42" width="750"><tbody data-dcnode-id="43"><tr data-dcnode-id="45"><td data-dcnode-id="513" valign="top" width="200"><span data-dcnode-id="542" instrument_node="">
</span><p data-dcnode-id="528"><b data-dcnode-id="529"><font color="#FF0000" data-dcnode-id="540" face="Arial" size="1"><span data-dcnode-id="541" instrument_node="">WHAT IS VISUAL ART?</span></font><font data-dcnode-id="530" face="Arial" size="1"><br data-dcnode-id="539"><span data-dcnode-id="538" instrument_node="">
        For an explanation of the</span><br data-dcnode-id="537"><span data-dcnode-id="536" instrument_node="">
        terminology, see:</span><br data-dcnode-id="535"><span data-dcnode-id="534" instrument_node="">
</span><a data-dcnode-id="532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/art-definition.htm"><span data-dcnode-id="533" instrument_node="">Art: Definition and Meaning</span></a><span data-dcnode-id="531" instrument_node="">.</span></font></b></p><span data-dcnode-id="527" instrument_node="">
</span><p data-dcnode-id="515"><font data-dcnode-id="516" face="Arial" size="1"><b data-dcnode-id="517"><font color="#FF0000" data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">VISUAL ARTS CATEGORIES</span></font><br data-dcnode-id="524"><span data-dcnode-id="523" instrument_node="">
        Definitions, styles, genres,</span><br data-dcnode-id="522"><span data-dcnode-id="521" instrument_node="">
        periods, see: </span><a data-dcnode-id="519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/art-types.htm"><span data-dcnode-id="520" instrument_node="">Types of Art</span></a><span data-dcnode-id="518" instrument_node="">.</span></b></font></p><span data-dcnode-id="514" instrument_node="">
</span></td><td data-dcnode-id="47" valign="top" width="524"><span data-dcnode-id="511" instrument_node="">
</span><p data-dcnode-id="506"><font data-dcnode-id="507" face="Verdana" size="2"><b data-dcnode-id="508"><a data-dcnode-id="510" name="commerce"></a><span data-dcnode-id="509" instrument_node="">The Role of Commercial 
        Design</span></b></font></p><span data-dcnode-id="505" instrument_node="">
</span><p data-dcnode-id="499"><font data-dcnode-id="500" face="Verdana" size="2"><span data-dcnode-id="504" instrument_node="">In the early days of mass production, when 
        you could buy a Ford motor car in any colour as long as it was black, 
        design was seen as an optional extra. Not any more. Today, designers are 
        heavy-hitters. Armed with an array of digital design software, they can 
        make all the difference to the commercial success of a product. (See also: 
        </span><a data-dcnode-id="502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/computer-art.htm"><span data-dcnode-id="503" instrument_node="">Computer Art</span></a><span data-dcnode-id="501" instrument_node="">.) Furthermore, creative design 
        plays an important role throughout the entire process of making, marketing, 
        selling and retailing a product. And why not? Don't we all want to possess 
        or surround ourselves with beautiful things?</span></font></p><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="493"><font data-dcnode-id="494" face="Verdana" size="2"><b data-dcnode-id="495"><a data-dcnode-id="497" name="manufacturing"></a><span data-dcnode-id="496" instrument_node="">Manufacturing</span></b></font></p><span data-dcnode-id="492" instrument_node="">
</span><p data-dcnode-id="489"><font data-dcnode-id="490" face="Verdana" size="2"><span data-dcnode-id="491" instrument_node="">Because the design properties and features 
        of a product have such an important role to play in its commercial success, 
        designers are typically involved at the earliest stage of the manufacturing 
        process. In very crude terms, we have seen at least three phases of manufacturing. 
        At the beginning of the mass-production era, company scientific staff 
        would produce a product which was then given to the marketing department 
        to sell. By the 1960s, it was the marketing experts who told the scientists 
        what to produce. But today, it is the marketeers and designers who discuss 
        the specifications of a product, before involving production staff.</span></font></p><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="483"><font data-dcnode-id="484" face="Verdana" size="2"><b data-dcnode-id="485"><a data-dcnode-id="487" name="graphic"></a><span data-dcnode-id="486" instrument_node="">Graphic Design: 
        Marketing, Advertising, Branding</span></b></font></p><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="476"><font data-dcnode-id="477" face="Verdana" size="2"><span data-dcnode-id="481" instrument_node="">The skills of graphic designers are in 
        evidence almost everywhere we look: the opening and closing credits sequences 
        of films, </span><a data-dcnode-id="479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/animation-art.htm"><span data-dcnode-id="480" instrument_node="">animation</span></a><span data-dcnode-id="478" instrument_node="">, TV programs and product 
        commercials, corporate websites, computer screen layouts, newspapers, 
        magazines, advertisements, posters, brand motifs and company logos, product 
        packaging, road signs, and so on. And it includes colours as well as typography, 
        visual arts and page/screen layout techniques, and product packaging materials. 
        In fact, graphics design plays a crucial role wherever pictures, symbols, 
        or text are used to communicate a visual message - from hi-tech cockpit 
        displays in military or commercial planes, to TV commercials, travel brochures, 
        shopping catalogues, and supermarket point-of-sales product-wrappers.</span></font></p><span data-dcnode-id="475" instrument_node="">
</span><p data-dcnode-id="470"><font data-dcnode-id="471" face="Verdana" size="2"><b data-dcnode-id="472"><a data-dcnode-id="474" name="retail"></a><span data-dcnode-id="473" instrument_node="">Retailing</span></b></font></p><span data-dcnode-id="469" instrument_node="">
</span><p data-dcnode-id="466"><font data-dcnode-id="467" face="Verdana" size="2"><span data-dcnode-id="468" instrument_node="">Not only are products themselves the subject 
        of intensive design research, thought, modeling, interactive adjustment 
        and re-design, but the retailing environment in which they are introduced 
        to consumers is itself the subject of careful study. Retail design (shop-design) 
        plays a huge role in determining how the consumer feels when they encounter 
        and interact with products, and thus the ultimate success of those products.</span></font></p><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="460"><font data-dcnode-id="461" face="Verdana" size="2"><b data-dcnode-id="462"><a data-dcnode-id="464" name="interior"></a><span data-dcnode-id="463" instrument_node="">Interior Design</span></b></font></p><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="456"><font data-dcnode-id="457" face="Verdana" size="2"><span data-dcnode-id="458" instrument_node="">A major factor in retail designing is the 
        layout of the shop. This in turn is heavily dependent on the interior 
        design of the building in question, which in turn involves the utilization 
        of carefully selected colour-schemes and background music, purpose-built 
        lighting and flooring systems, as well as extras such as specially designed 
        entrances, walkways, and so on.</span></font></p><span data-dcnode-id="455" instrument_node="">
</span><p data-dcnode-id="450"><font data-dcnode-id="451" face="Verdana" size="2"><b data-dcnode-id="452"><a data-dcnode-id="454" name="architectural"></a><span data-dcnode-id="453" instrument_node="">Architectural 
        Design</span></b></font></p><span data-dcnode-id="449" instrument_node="">
</span><p data-dcnode-id="424"><font data-dcnode-id="425" face="Verdana" size="2"><span data-dcnode-id="448" instrument_node="">Of course interior design goes hand in 
        glove with architecture, including landscaping. If main street retailers, 
        or their landlords, typically exploit all the architectural possibilities 
        of their property, so do large suburban retailers whose shops may occupy 
        an area of 100 acres or more. Aesthetically designed buildings, parking 
        lots, entrances and exits, all add to the feel-good factor of the shopping 
        experience, which can play a crucial part in the success of the retail 
        unit involved. See also, the </span><a data-dcnode-id="446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/architecture/chicago-school.htm"><span data-dcnode-id="447" instrument_node="">Chicago 
        School of Architecture</span></a><span data-dcnode-id="445" instrument_node=""> (c.1880-1910), which had a huge impact on urban 
        design in the United States, as did the </span><a data-dcnode-id="443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/architecture/second-chicago-school.htm"><span data-dcnode-id="444" instrument_node="">Second 
        Chicago School of Architecture</span></a><span data-dcnode-id="442" instrument_node=""> (c.1940-75), led by </span><a data-dcnode-id="440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/architecture/mies-van-der-rohe.htm"><span data-dcnode-id="441" instrument_node="">Mies 
        van der Rohe</span></a><span data-dcnode-id="439" instrument_node="">. The world's leading firm involved in architectural design 
        is </span><i data-dcnode-id="436"><a data-dcnode-id="437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/architecture/skidmore-owings-merrill.htm"><span data-dcnode-id="438" instrument_node="">Skidmore, Owings 
        &amp; Merrill</span></a></i><span data-dcnode-id="435" instrument_node="">, whose architects - such as </span><a data-dcnode-id="433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/architecture/fazlur-khan.htm"><span data-dcnode-id="434" instrument_node="">Fazlur 
        Khan</span></a><span data-dcnode-id="432" instrument_node=""> (1929-82) - continue to dominate the global skyscraper market. 
        Historically, the greatest influence on building design has been </span><a data-dcnode-id="430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/architecture/greek.htm"><span data-dcnode-id="431" instrument_node="">Greek 
        architecture</span></a><span data-dcnode-id="429" instrument_node="">, followed by </span><a data-dcnode-id="427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/architecture/roman.htm"><span data-dcnode-id="428" instrument_node="">Roman architecture</span></a><span data-dcnode-id="426" instrument_node=""> 
        and numerous neoclassicist schools.</span></font></p><span data-dcnode-id="423" instrument_node="">
</span><p data-dcnode-id="418"><font data-dcnode-id="419" face="Verdana" size="2"><b data-dcnode-id="420"><a data-dcnode-id="422" name="history"></a><span data-dcnode-id="421" instrument_node="">History of Artistic 
        Design</span></b></font></p><span data-dcnode-id="417" instrument_node="">
</span><p data-dcnode-id="411"><font data-dcnode-id="412" face="Verdana" size="2"><span data-dcnode-id="416" instrument_node="">Artistic design during the era of </span><a data-dcnode-id="414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/modern-art.htm"><span data-dcnode-id="415" instrument_node="">modern 
        art</span></a><span data-dcnode-id="413" instrument_node=""> (1850 onwards) has evolved in line with the Industrial Revolution, 
        although design movements with an international impact have been few and 
        far between. We shall briefly examine eight important movements, as follows: 
        French Interior Design (1640-1792); Arts and Crafts Movement (c.1862-1914); 
        Art Nouveau (c.1890-1914); Bauhaus (1919-33); De Stijl (1917-31); Art 
        Deco (c.1925-40); Ulm School (HfG Ulm) (1953–1968); and Postmodernism 
        (after 1970).</span></font></p><span data-dcnode-id="410" instrument_node="">
</span><p data-dcnode-id="405"><font data-dcnode-id="406" face="Verdana" size="2"><b data-dcnode-id="407"><a data-dcnode-id="409" name="french"></a><span data-dcnode-id="408" instrument_node="">Louis XIV, XV, 
        XVI Styles of French Interior Design (1640-1792)</span></b></font></p><span data-dcnode-id="404" instrument_node="">
</span><p data-dcnode-id="389"><font data-dcnode-id="390" face="Verdana" size="2"><span data-dcnode-id="403" instrument_node="">Arguably the greatest era of interior design 
        in the history of art, the 17th and 18th centuries in France witnessed 
        an upsurge of </span><a data-dcnode-id="401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/french-decorative-arts.htm"><span data-dcnode-id="402" instrument_node="">French 
        Decorative art</span></a><span data-dcnode-id="400" instrument_node=""> at the </span><a data-dcnode-id="398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/versailles-palace.htm"><span data-dcnode-id="399" instrument_node="">Palace 
        of Versailles</span></a><span data-dcnode-id="397" instrument_node=""> and other Royal Chateaux. Led by </span><a data-dcnode-id="395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/french-designers.htm"><span data-dcnode-id="396" instrument_node="">French 
        Designers</span></a><span data-dcnode-id="394" instrument_node=""> like Charles Le Brun, Andre Le Notre and others, it produced 
        some of the finest </span><a data-dcnode-id="392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/french-furniture.htm"><span data-dcnode-id="393" instrument_node="">French 
        Furniture</span></a><span data-dcnode-id="391" instrument_node=""> ever seen, usually classified into Louis Quatorze, Regency, 
        Louis Quinze and Louis Seize styles.</span></font></p><span data-dcnode-id="388" instrument_node="">
</span><p data-dcnode-id="383"><font data-dcnode-id="384" face="Verdana" size="2"><b data-dcnode-id="385"><a data-dcnode-id="387" name="crafts"></a><span data-dcnode-id="386" instrument_node="">Arts and Crafts 
        Movement (c.1862-1914)</span></b></font></p><span data-dcnode-id="382" instrument_node="">
</span><p data-dcnode-id="325"><font data-dcnode-id="326" face="Verdana" size="2"><span data-dcnode-id="381" instrument_node="">This British movement in design and decorative 
        art, led by </span><a data-dcnode-id="379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/william-morris.htm"><span data-dcnode-id="380" instrument_node="">William Morris</span></a><span data-dcnode-id="378" instrument_node=""> 
        (1834-96), promoted the revitalization of craftsmanship, and the moral, 
        social and aesthetic virtues of honest craft work over industrial mass 
        production. Concerned primarily with architecture and </span><a data-dcnode-id="376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/definitions/decorative-art.htm"><span data-dcnode-id="377" instrument_node="">decorative 
        art</span></a><span data-dcnode-id="375" instrument_node="">, including </span><a data-dcnode-id="373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/stained-glass-art.htm"><span data-dcnode-id="374" instrument_node="">stained glass</span></a><span data-dcnode-id="372" instrument_node="">, 
        textiles, furnishings, printed fabrics (chintzes), </span><a data-dcnode-id="370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/tapestry-art.htm"><span data-dcnode-id="371" instrument_node="">tapestry 
        art</span></a><span data-dcnode-id="369" instrument_node="">, wallpaper, furniture, </span><a data-dcnode-id="367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/jewellery-art.htm"><span data-dcnode-id="368" instrument_node="">jewellery</span></a><span data-dcnode-id="366" instrument_node="">, 
        wood carving, </span><a data-dcnode-id="364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/metalwork.htm"><span data-dcnode-id="365" instrument_node="">metalwork</span></a><span data-dcnode-id="363" instrument_node="">, ceramics and </span><a data-dcnode-id="361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/mosaic-art.htm"><span data-dcnode-id="362" instrument_node="">mosaic 
        art</span></a><span data-dcnode-id="360" instrument_node="">. It was inspired by Medieval craftwork, rural </span><a data-dcnode-id="358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/definitions/folk-art.htm"><span data-dcnode-id="359" instrument_node="">folk 
        art</span></a><span data-dcnode-id="357" instrument_node="">, and </span><a data-dcnode-id="355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/east-asian-art/japanese-art.htm"><span data-dcnode-id="356" instrument_node="">Japanese art</span></a><span data-dcnode-id="354" instrument_node=""> 
        (including </span><a data-dcnode-id="352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/east-asian-art/ukiyo.htm"><span data-dcnode-id="353" instrument_node="">Ukiyo-e woodblock prints</span></a><span data-dcnode-id="351" instrument_node="">), 
        although its advocates were united not so much by a particular style than 
        by a common goal - a desire to revive honest craftsmanship, eliminate 
        the prejudice of the arts hierarchy (who revered </span><a data-dcnode-id="349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/definitions/fine-art.htm"><span data-dcnode-id="350" instrument_node="">fine 
        art</span></a><span data-dcnode-id="348" instrument_node=""> but disparaged </span><a data-dcnode-id="346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/definitions/applied-art.htm"><span data-dcnode-id="347" instrument_node="">applied art</span></a><span data-dcnode-id="345" instrument_node="">), 
        and to create art that was affordable for all. The Movement spawned like-minded 
        groups in America, and had a strong influence on the </span><i data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">Wiener Workstatte</span></i><span data-dcnode-id="342" instrument_node=""> 
        - the crafts workshops established by the </span><a data-dcnode-id="340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/vienna-secession.htm"><span data-dcnode-id="341" instrument_node="">Vienna 
        Secession</span></a><span data-dcnode-id="339" instrument_node=""> in 1903 - the </span><a data-dcnode-id="337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/munich-secession.htm"><span data-dcnode-id="338" instrument_node="">Munich 
        Secession</span></a><span data-dcnode-id="336" instrument_node=""> (1892), the </span><a data-dcnode-id="334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/berlin-secession.htm"><span data-dcnode-id="335" instrument_node="">Berlin 
        Secession</span></a><span data-dcnode-id="333" instrument_node=""> (1898), and the </span><a data-dcnode-id="331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/architecture/deutscher-werkbund.htm"><span data-dcnode-id="332" instrument_node="">Deutscher 
        Werkbund</span></a><span data-dcnode-id="330" instrument_node="">, in Germany. For more information, please see: </span><a data-dcnode-id="328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/arts-and-crafts.htm"><span data-dcnode-id="329" instrument_node="">Arts 
        and Crafts Movement</span></a><span data-dcnode-id="327" instrument_node="">.</span></font></p><span data-dcnode-id="324" instrument_node="">
</span><p data-dcnode-id="319"><font data-dcnode-id="320" face="Verdana" size="2"><b data-dcnode-id="321"><a data-dcnode-id="323" name="nouveau"></a><span data-dcnode-id="322" instrument_node="">Art Nouveau (c.1890-1914)</span></b></font></p><span data-dcnode-id="318" instrument_node="">
</span><p data-dcnode-id="263"><font data-dcnode-id="264" face="Verdana" size="2"><span data-dcnode-id="317" instrument_node="">The highly decorative idiom known as </span><a data-dcnode-id="315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/art-nouveau.htm"><span data-dcnode-id="316" instrument_node="">Art 
        Nouveau</span></a><span data-dcnode-id="314" instrument_node="">, was the first major international design style to promulgate 
        the notion that art should be part of everyday life. Henceforth, it insisted, 
        no everyday object, no matter how functional it might be, should be overlooked 
        as a source of aesthetic value. It also promoted the idea of bringing 
        all design into one idiom. Characterized by curvilinear shapes and patterns 
        taken from organic structures, from </span><a data-dcnode-id="312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/cultural-history-of-ireland/celtic-designs.htm"><span data-dcnode-id="313" instrument_node="">Celtic 
        designs</span></a><span data-dcnode-id="311" instrument_node=""> and also from simple geometrical forms, the style was applied 
        to architecture, interior design, glassware, jewellery, </span><a data-dcnode-id="309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/poster-art.htm"><span data-dcnode-id="310" instrument_node="">poster 
        art</span></a><span data-dcnode-id="308" instrument_node=""> and </span><a data-dcnode-id="306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/illustration.htm"><span data-dcnode-id="307" instrument_node="">illustration</span></a><span data-dcnode-id="305" instrument_node="">, (see, in particular, 
        </span><a data-dcnode-id="303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/aubrey-beardsley.htm"><span data-dcnode-id="304" instrument_node="">Aubrey Beardsley</span></a><span data-dcnode-id="302" instrument_node="">) as 
        well as painting and sculpture. Art Nouveau was boosted by the </span><a data-dcnode-id="300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/cultural-history-of-ireland/celtic-art-revival-movement.htm"><span data-dcnode-id="301" instrument_node="">Celtic 
        Art Revival movement</span></a><span data-dcnode-id="299" instrument_node=""> and the 1900 </span><i data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">Exposition Universelle</span></i><span data-dcnode-id="296" instrument_node=""> held 
        in Paris, after which it spread throughout Europe and overseas to America 
        and Australia. An explicitly modern style, it was called by different 
        names in different countries: </span><a data-dcnode-id="293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/jugendstil.htm"><i data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">Jugendstil</span></i></a><span data-dcnode-id="292" instrument_node=""> 
        in Germany; </span><i data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">Sezessionstil</span></i><span data-dcnode-id="289" instrument_node=""> in Austria; </span><i data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">Modernisme</span></i><span data-dcnode-id="286" instrument_node=""> in Catalonia; 
        </span><i data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">Paling Stijl</span></i><span data-dcnode-id="283" instrument_node=""> or </span><i data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">Style des Vingt</span></i><span data-dcnode-id="280" instrument_node="">; in Belgium; </span><i data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">Stile Liberty</span></i><span data-dcnode-id="277" instrument_node=""> 
        in Italy; </span><i data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">Stil Modern</span></i><span data-dcnode-id="274" instrument_node=""> in Russia; and </span><i data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">Tiffany style</span></i><span data-dcnode-id="271" instrument_node=""> in America. 
        Its foray into </span><a data-dcnode-id="269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/abstract-art.htm"><span data-dcnode-id="270" instrument_node="">abstract art</span></a><span data-dcnode-id="268" instrument_node=""> were taken 
        further by 20th century artists and architects, such as </span><a data-dcnode-id="266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/architecture/hector-guimard.htm"><span data-dcnode-id="267" instrument_node="">Hector 
        Guimard</span></a><span data-dcnode-id="265" instrument_node=""> (1867-1942). The movement was superceded in the 1920s by Art 
        Deco.</span></font></p><span data-dcnode-id="262" instrument_node="">
</span><blockquote data-dcnode-id="221"><span data-dcnode-id="261" instrument_node="">
</span><p data-dcnode-id="243"><font data-dcnode-id="244" face="Verdana" size="2"><b data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">Art Nouveau's Famous Graphic Designs</span></b><br data-dcnode-id="258"><span data-dcnode-id="257" instrument_node="">
          For more about the movement's celebrated poster graphics, made possible 
          by the the "three stone lithographic process" invented by 
          </span><a data-dcnode-id="255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/jules-cheret.htm"><span data-dcnode-id="256" instrument_node="">Jules Cheret</span></a><span data-dcnode-id="254" instrument_node=""> (1836-1932) 
          and advanced by </span><a data-dcnode-id="252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/alphonse-mucha.htm"><span data-dcnode-id="253" instrument_node="">Alphonse 
          Mucha</span></a><span data-dcnode-id="251" instrument_node=""> (1860-1939) and </span><a data-dcnode-id="249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/leonetto-cappiello.htm"><span data-dcnode-id="250" instrument_node="">Leonetto 
          Cappiello</span></a><span data-dcnode-id="248" instrument_node=""> (1875-1942), see: </span><a data-dcnode-id="246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/poster-art-history.htm"><span data-dcnode-id="247" instrument_node="">Poster 
          Art History</span></a><span data-dcnode-id="245" instrument_node="">.</span></font></p><span data-dcnode-id="242" instrument_node="">
</span><p data-dcnode-id="223"><font data-dcnode-id="224" face="Verdana" size="2"><b data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">Diaghilev's Ballets Russes</span></b><br data-dcnode-id="239"><span data-dcnode-id="238" instrument_node="">
          In 1909 </span><a data-dcnode-id="236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/diaghilev.htm"><span data-dcnode-id="237" instrument_node="">Sergei Diaghilev</span></a><span data-dcnode-id="235" instrument_node=""> 
          took Paris by storm when he launched the first season of his </span><i data-dcnode-id="232"><a data-dcnode-id="233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/ballets-russes.htm"><span data-dcnode-id="234" instrument_node="">Ballets 
          Russes</span></a></i><span data-dcnode-id="231" instrument_node=""> touring ballet company. In addition to the dancing of 
          Nijinsky and Pavlova, its success was due to the sumptuous designs of 
          its exotic sets and costumes, overseen by </span><a data-dcnode-id="229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/leon-bakst.htm"><span data-dcnode-id="230" instrument_node="">Leon 
          Bakst</span></a><span data-dcnode-id="228" instrument_node=""> (1866-1924) and </span><a data-dcnode-id="226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/alexander-benois.htm"><span data-dcnode-id="227" instrument_node="">Alexander 
          Benois</span></a><span data-dcnode-id="225" instrument_node=""> (1870-1960).</span></font></p><span data-dcnode-id="222" instrument_node="">
</span></blockquote><span data-dcnode-id="220" instrument_node="">
</span><p data-dcnode-id="215"><font data-dcnode-id="216" face="Verdana" size="2"><b data-dcnode-id="217"><a data-dcnode-id="219" name="bauhaus"></a><span data-dcnode-id="218" instrument_node="">Bauhaus Design 
        School (1919-33)</span></b></font></p><span data-dcnode-id="214" instrument_node="">
</span><p data-dcnode-id="181"><font data-dcnode-id="182" face="Verdana" size="2"><span data-dcnode-id="213" instrument_node="">A hugely influential German school of </span><a data-dcnode-id="211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/architecture/twentieth-century.htm"><span data-dcnode-id="212" instrument_node="">20th 
        century architecture</span></a><span data-dcnode-id="210" instrument_node=""> and other forms of design, including </span><a data-dcnode-id="208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/crafts-history-types.htm"><span data-dcnode-id="209" instrument_node="">crafts</span></a><span data-dcnode-id="207" instrument_node="">, 
        the Bauhaus (German for "house of building") was established 
        in Weimar by </span><a data-dcnode-id="205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/architecture/walter-gropius.htm"><span data-dcnode-id="206" instrument_node="">Walter Gropius</span></a><span data-dcnode-id="204" instrument_node=""> 
        (1883-1969). Famous for its modern approach to art education, which eliminated 
        the usual divide between "fine" and "applied" arts 
        and redefined the relationship between design and industrial production 
        methods, it hoped to create products that were both artistic and commercial. 
        In particular, it aimed to train students to be equally comfortable with 
        design, craft and methods of mass production. The </span><a data-dcnode-id="202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/bauhaus-design-school.htm"><span data-dcnode-id="203" instrument_node="">Bauhaus 
        design school</span></a><span data-dcnode-id="201" instrument_node=""> lasted until 1933, in three locations - Weimar, Dessau 
        and Berlin - and under three directors - Gropius 1919-1927, Hannes Meyer 
        1927-1930 and Ludwig Mies van der Rohe 1930-1933 - until forced to close 
        by the Nazi government. Itself influenced by the simplicity and functionality 
        of the 19th century </span><a data-dcnode-id="199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/biedermeier.htm"><span data-dcnode-id="200" instrument_node="">Biedermeier 
        style</span></a><span data-dcnode-id="198" instrument_node="">, Bauhaus exercised a wide influence on artistic design, notably 
        in the areas of architecture, graphic design, interior design, industrial 
        design and handicrafts. Upon closure, many of its instructors dispersed 
        around the world: for example, </span><a data-dcnode-id="196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/moholy-nagy.htm"><span data-dcnode-id="197" instrument_node="">Laszlo 
        Moholy-Nagy</span></a><span data-dcnode-id="195" instrument_node=""> (1895-1946) opened a New Bauhaus and then his own Institute 
        of Design in Chicago; </span><a data-dcnode-id="193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/josef-albers.htm"><span data-dcnode-id="194" instrument_node="">Joseph 
        Albers</span></a><span data-dcnode-id="192" instrument_node=""> (1888-1976) lectured at Black Mountain College for advanced 
        arts, in North Carolina; Max Bill (1908-94) went to teach at the Zurich 
        School of Applied Art, before becoming the first director of the High 
        School of Design in Ulm (in charge of architecture and industrial design), 
        regarded as the successor to the Bauhaus. Mies van der Rohe went to Chicago 
        where he influenced a generation of </span><a data-dcnode-id="190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/architecture/american-architects.htm"><span data-dcnode-id="191" instrument_node="">American 
        architects</span></a><span data-dcnode-id="189" instrument_node=""> with his modernist </span><a data-dcnode-id="187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/architecture/skyscraper.htm"><span data-dcnode-id="188" instrument_node="">skyscraper 
        architecture</span></a><span data-dcnode-id="186" instrument_node="">. Gropius also emigrated to the United States, where he 
        became head of the architecture department at Harvard University, before 
        setting up </span><i data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">The Architects Collaborative</span></i><span data-dcnode-id="183" instrument_node=""> in 1952.</span></font></p><span data-dcnode-id="180" instrument_node="">
</span><p data-dcnode-id="175"><font data-dcnode-id="176" face="Verdana" size="2"><b data-dcnode-id="177"><a data-dcnode-id="179" name="destijl"></a><span data-dcnode-id="178" instrument_node="">De Stijl (1917-31)</span></b></font></p><span data-dcnode-id="174" instrument_node="">
</span><p data-dcnode-id="136"><font data-dcnode-id="137" face="Verdana" size="2"><a data-dcnode-id="172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/de-stijl.htm"><span data-dcnode-id="173" instrument_node="">De 
        Stijl</span></a><span data-dcnode-id="171" instrument_node=""> (Dutch for "the style") was a loose alliance of architects, 
        artists and designers - many of whom came from a Dutch Calvinist background 
        - who coalesced around the painter and architect </span><a data-dcnode-id="169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/theo-van-doesburg.htm"><span data-dcnode-id="170" instrument_node="">Theo 
        van Doesburg</span></a><span data-dcnode-id="168" instrument_node=""> (1883-1931), during the period 1917-31. The group's aesthetic 
        principles were published (Nov 1918) in the De Stijl periodical, which 
        was used to propagate their ideas on </span><a data-dcnode-id="166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/definitions/concrete-art.htm"><span data-dcnode-id="167" instrument_node="">concrete 
        art</span></a><span data-dcnode-id="165" instrument_node=""> and design. Believing that the war had undermined all traditional 
        values, De Stijl advocated a cleaner, more ethical, type of artistic design 
        - one which was reduced to its basic essentials of form, colour and line 
        - which could influence all culture and lead to a renewal of society. 
        Influenced by the Soviet Constructivism of </span><a data-dcnode-id="163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/tatlin.htm"><span data-dcnode-id="164" instrument_node="">Vladimir 
        Tatlin</span></a><span data-dcnode-id="162" instrument_node=""> (1885-1953), the group was associated with both </span><a data-dcnode-id="160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/neo-plasticism.htm"><span data-dcnode-id="161" instrument_node="">Neo-Plasticism</span></a><span data-dcnode-id="159" instrument_node=""> 
        (Mondrian) and its revised form of </span><a data-dcnode-id="157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/elementarism.htm"><span data-dcnode-id="158" instrument_node="">Elementarism</span></a><span data-dcnode-id="156" instrument_node=""> 
        (Van Doesburg). The group's leading members included Van Doesburg, </span><a data-dcnode-id="154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/piet-mondrian.htm"><span data-dcnode-id="155" instrument_node="">Piet 
        Mondrian</span></a><span data-dcnode-id="153" instrument_node=""> (1872-1944), Bart van der Leck (1876-1958), Georges Vantongerloo 
        (1886-1965) and Friedrich Vordemberge-Gildewart (1899-1962), along with 
        the architects Gerrit Rietveld (1888-1964) and J.J.P. Oud (1890–1963). 
        In addition, De Stijl architects drew inspiration from the building designs 
        of the Dutch designer Hendrick Petrus Berlage (1856-1934), and </span><a data-dcnode-id="151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/architecture/frank-lloyd-wright.htm"><span data-dcnode-id="152" instrument_node="">Frank 
        Lloyd Wright</span></a><span data-dcnode-id="150" instrument_node=""> (1867-1959), whose idea of the home being the product 
        of "total design" (</span><i data-dcnode-id="148"><span data-dcnode-id="149" instrument_node="">gesamtkunstwerk</span></i><span data-dcnode-id="147" instrument_node="">) was in close alignment 
        with their own ideas, as exemplified by Rietveld's </span><i data-dcnode-id="145"><span data-dcnode-id="146" instrument_node="">Schroder House</span></i><span data-dcnode-id="144" instrument_node=""> 
        in Utrecht. Overall, De Stijl was most influential in the fields of architectural 
        design and the applied arts, notably typographical art and furniture design. 
        Although already in decline when Doesburg died, De Stijl had an important 
        impact on Bauhaus designs and various other movements involved in </span><a data-dcnode-id="142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/definitions/non-objective-art.htm"><span data-dcnode-id="143" instrument_node="">non-objective 
        art</span></a><span data-dcnode-id="141" instrument_node="">, such as Abstract-Creation and CIAM, as well as other modernists 
        like </span><a data-dcnode-id="139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/architecture/le-corbusier.htm"><span data-dcnode-id="140" instrument_node="">Le Corbusier</span></a><span data-dcnode-id="138" instrument_node=""> (1887-1965) 
        the influential Swiss-French architect.</span></font></p><span data-dcnode-id="135" instrument_node="">
</span><p data-dcnode-id="130"><font data-dcnode-id="131" face="Verdana" size="2"><b data-dcnode-id="132"><a data-dcnode-id="134" name="deco"></a><span data-dcnode-id="133" instrument_node="">Art Deco (c.1925-40)</span></b></font></p><span data-dcnode-id="129" instrument_node="">
</span><p data-dcnode-id="90"><font data-dcnode-id="91" face="Verdana" size="2"><span data-dcnode-id="128" instrument_node="">The </span><a data-dcnode-id="126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/art-deco.htm"><span data-dcnode-id="127" instrument_node="">Art 
        Deco</span></a><span data-dcnode-id="125" instrument_node=""> style was the leading fashion in both design and decoration of 
        the 1920s and 1930s: see in particular </span><a data-dcnode-id="123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/architecture/american.htm"><span data-dcnode-id="124" instrument_node="">American 
        Architecture</span></a><span data-dcnode-id="122" instrument_node=""> of the time, notably involving New York skyscrapers. 
        Featuring sleek geometrical forms, it depicted the urban landscape and 
        the new range of leisure activities and social pursuits of the "Roaring 
        20s"; it injected ordinary objects with real character by making 
        them look smooth and cool. Art Deco owed a noticeable debt to several 
        of the major artistic styles of the 1900s and 1910s, borrowing bold </span><a data-dcnode-id="120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/colour-in-painting.htm"><span data-dcnode-id="121" instrument_node="">colour</span></a><span data-dcnode-id="119" instrument_node=""> 
        from </span><a data-dcnode-id="117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/fauvism.htm"><span data-dcnode-id="118" instrument_node="">Fauvism</span></a><span data-dcnode-id="116" instrument_node="">, geometric patterns 
        from </span><a data-dcnode-id="114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/cubism.htm"><span data-dcnode-id="115" instrument_node="">Cubism</span></a><span data-dcnode-id="113" instrument_node="">, machine-like shapes 
        from </span><a data-dcnode-id="111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/constructivism.htm"><span data-dcnode-id="112" instrument_node="">Constructivism</span></a><span data-dcnode-id="110" instrument_node=""> and 
        </span><a data-dcnode-id="108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/futurism.htm"><span data-dcnode-id="109" instrument_node="">Futurism</span></a><span data-dcnode-id="107" instrument_node="">, and a unifying approach 
        from Art Nouveau. Art Deco was also inspired by Aztec, Egyptian art, and 
        Classical Antiquity. However, unlike its predecessor Art Nouveau, Art 
        Deco had no philosophical pretensions - it was purely decorative. Although 
        it mainly describes a style for interior and graphic designers, notably 
        in the area of furniture, metalwork, ceramics, glassware and bookbinding, 
        it also applied to architecture, fashion design, sculpture and painting: 
        see, for instance, </span><a data-dcnode-id="105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/tamara-de-lempicka.htm"><span data-dcnode-id="106" instrument_node="">Tamara 
        Lempicka</span></a><span data-dcnode-id="104" instrument_node=""> (1898-1980), and classical-style works (1918-24) by </span><a data-dcnode-id="102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/picasso.htm"><span data-dcnode-id="103" instrument_node="">Picasso</span></a><span data-dcnode-id="101" instrument_node=""> 
        (1881-1973). The idiom spawned sub-movements such as </span><i data-dcnode-id="99"><span data-dcnode-id="100" instrument_node="">Novecento Italiano</span></i><span data-dcnode-id="98" instrument_node=""> 
        and </span><i data-dcnode-id="96"><span data-dcnode-id="97" instrument_node="">Corrente</span></i><span data-dcnode-id="95" instrument_node=""> (Italy), and </span><a data-dcnode-id="93" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/precisionism.htm"><span data-dcnode-id="94" instrument_node="">Precisionism</span></a><span data-dcnode-id="92" instrument_node=""> 
        (America). A revival of Art Deco occurred in the 1960s, when the name 
        was first coined.</span></font></p><span data-dcnode-id="89" instrument_node="">
</span><p data-dcnode-id="84"><font data-dcnode-id="85" face="Verdana" size="2"><b data-dcnode-id="86"><a data-dcnode-id="88" name="ulm"></a><span data-dcnode-id="87" instrument_node="">Ulm School of Design 
        (Hochschule fur Gestaltung) (1953–1968)</span></b></font></p><span data-dcnode-id="83" instrument_node="">
</span><p data-dcnode-id="80"><font data-dcnode-id="81" face="Verdana" size="2"><span data-dcnode-id="82" instrument_node="">Established in 1953 by Max Bill (1908-94), 
        Inge Aicher-Scholl and Otl Aicher, the Ulm School of Design achieved rapid 
        international recognition and was seen as the natural successor to the 
        Bauhaus. During its 15-year existence, it excelled in the study of semiotics 
        (signs and symbols), product design, industrialized building, and filmmaking. 
        In the process it pioneered a teaching of design based on a structured 
        problem-solving approach, and a blend of science and art. Starting life 
        at the Ulm Volkshochschule (institute for adult education) its teaching 
        staff included the ex-Bauhaus instructors Josef Albers, Johannes Itten 
        and Walter Peterhans, and the Bauhaus graduate Helene Nonne-Schmidt, joined 
        later by Hans Gugelot, Walter Zeischegg, Otl Aicher, Friedrich Vordemberge-Gildewart 
        and Tomas Maldonado. Visiting lecturers included: Mies van der Rohe, Walter 
        Gropius, Ray Eames, Josef Muller-Brockmann, Herbert Bayer, Reyner Banham, 
        Hugo Haring, Konrad Wachsmann, Buckminister Fuller, Theodor Heuss, Norbert 
        Weiner and Mia Seeger. In 1957 Max Bill quit Ulm when it was decided that 
        aesthetic considerations were no longer the primary conceptual basis of 
        design. Under the new directorship of Tomas Maldonado, the design school 
        dropped the earlier "artist" focus in favour of a new philosophy 
        of design which embodied both art (aesthetics) and science (materials, 
        manufacturing and product usage critera). At the same time, the school 
        set up a number of development groups to create links with industry. This 
        resulted in several successful design collaborations with companies such 
        as Braun, Lufthansa and the Hamburg Railroad company. Ultimately, however, 
        continuing disagreements between the school's teaching staff, the administrative 
        hierarchy and its government sponsors, led to its closure.</span></font></p><span data-dcnode-id="79" instrument_node="">
</span><p data-dcnode-id="74"><font data-dcnode-id="75" face="Verdana" size="2"><b data-dcnode-id="76"><a data-dcnode-id="78" name="postmodernism"></a><span data-dcnode-id="77" instrument_node="">Postmodernism 
        (After 1970)</span></b></font></p><span data-dcnode-id="73" instrument_node="">
</span><p data-dcnode-id="49"><font data-dcnode-id="50" face="Verdana" size="2"><span data-dcnode-id="72" instrument_node="">Like </span><a data-dcnode-id="70" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/postmodernism.htm"><span data-dcnode-id="71" instrument_node="">Postmodernist 
        art</span></a><span data-dcnode-id="69" instrument_node="">, postmodernist design is characterized by: a deliberate blend 
        of differing styles, often laced with humour, egocentric superficiality, 
        increased ornamentation and contemporary cultural or symbolic references. 
        Postmodernist architectural designs were a revolt against the super-functionalism 
        of post-war architecture, thus we see the appearance of such weird, non-functional 
        but highly ornamented structures as the Pompidou Centre in Paris. See 
        also the titanium-clad </span><a data-dcnode-id="67" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/museums/guggenheim-bilbao.htm"><span data-dcnode-id="68" instrument_node="">Guggenheim 
        Museum Bilbao</span></a><span data-dcnode-id="66" instrument_node="">, designed by </span><a data-dcnode-id="64" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/architecture/frank-gehry.htm"><span data-dcnode-id="65" instrument_node="">Frank 
        O. Gehry</span></a><span data-dcnode-id="63" instrument_node=""> (b.1929), as well as the 1990s style of </span><i data-dcnode-id="61"><span data-dcnode-id="62" instrument_node="">Blobs</span></i><span data-dcnode-id="60" instrument_node=""> or </span><i data-dcnode-id="58"><span data-dcnode-id="59" instrument_node="">Blobitecture</span></i><span data-dcnode-id="57" instrument_node="">, 
        exemplified by the Bus Station at Spaarne Hospital in Hoofddorp, the Netherlands. 
        Typically, artistic designs by </span><a data-dcnode-id="55" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/postmodernist-artists.htm"><span data-dcnode-id="56" instrument_node="">postmodernist 
        artists</span></a><span data-dcnode-id="54" instrument_node=""> are marked by a lack of uniformity (greater fragmentation, 
        greater pluralism) and the novel use of popular imagery, unusual materials 
        and colours. (For more about postmodernism, see: </span><a data-dcnode-id="52" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/contemporary-art.htm"><span data-dcnode-id="53" instrument_node="">Contemporary 
        Art</span></a><span data-dcnode-id="51" instrument_node="">.)</span></font></p><span data-dcnode-id="48" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="41" instrument_node="">
