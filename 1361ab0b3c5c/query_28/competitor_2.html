am Morris Signature" data-dcnode-id="1257" height="44" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/images20/chart/signature_morris_william.png%3F3&amp;raw" width="142"></div></div></div><div class="quote" data-dcnode-id="1246" id="q2"><div class="q-text" data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">"I do not want art for a few, any more than education for a few, or freedom for a few."</span></div><div class="q-info" data-dcnode-id="1247"><div class="q-inline-counter" data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node=""> 2 of 7							</span></div><div class="q-author" data-dcnode-id="1248"><img alt="William Morris Signature" data-dcnode-id="1249" height="44" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/images20/chart/signature_morris_william.png%3F3&amp;raw" width="142"></div></div></div><div class="quote" data-dcnode-id="1238" id="q3"><div class="q-text" data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">"That thing which I understand by real art is the expression by man of his pleasure in labour."</span></div><div class="q-info" data-dcnode-id="1239"><div class="q-inline-counter" data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node=""> 3 of 7							</span></div><div class="q-author" data-dcnode-id="1240"><img alt="William Morris Signature" data-dcnode-id="1241" height="44" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/images20/chart/signature_morris_william.png%3F3&amp;raw" width="142"></div></div></div><div class="quote" data-dcnode-id="1230" id="q4"><div class="q-text" data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">"Have nothing in your house that you do not know to be useful, or believe to be beautiful."</span></div><div class="q-info" data-dcnode-id="1231"><div class="q-inline-counter" data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node=""> 4 of 7							</span></div><div class="q-author" data-dcnode-id="1232"><img alt="William Morris Signature" data-dcnode-id="1233" height="44" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/images20/chart/signature_morris_william.png%3F3&amp;raw" width="142"></div></div></div><div class="quote" data-dcnode-id="1222" id="q5"><div class="q-text" data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">"Apart from the desire to produce beautiful things, the leading passion of my life has been and is hatred of modern civilisation."</span></div><div class="q-info" data-dcnode-id="1223"><div class="q-inline-counter" data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node=""> 5 of 7							</span></div><div class="q-author" data-dcnode-id="1224"><img alt="William Morris Signature" data-dcnode-id="1225" height="44" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/images20/chart/signature_morris_william.png%3F3&amp;raw" width="142"></div></div></div><div class="quote" data-dcnode-id="1214" id="q6"><div class="q-text" data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">"Tomorrow, when the civilised world shall have a new art, a glorious art, made by the people and for the people."</span></div><div class="q-info" data-dcnode-id="1215"><div class="q-inline-counter" data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node=""> 6 of 7							</span></div><div class="q-author" data-dcnode-id="1216"><img alt="William Morris Signature" data-dcnode-id="1217" height="44" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/images20/chart/signature_morris_william.png%3F3&amp;raw" width="142"></div></div></div><div class="quote" data-dcnode-id="1206" id="q7"><div class="q-text" data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">"Nothing which is made by man will be ugly, but will have its due form, and its due ornament, and will tell the tale of its making and the tale of its use."</span></div><div class="q-info" data-dcnode-id="1207"><div class="q-inline-counter" data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node=""> 7 of 7							</span></div><div class="q-author" data-dcnode-id="1208"><img alt="William Morris Signature" data-dcnode-id="1209" height="44" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/images20/chart/signature_morris_william.png%3F3&amp;raw" width="142"></div></div></div></div><div class="quote-next" data-dcnode-id="1204"></div><span data-dcnode-id="1203" instrument_node=""> </span></div><div class="article" data-dcnode-id="1137"><h2 class="article-header summary-header" data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">Summary of William Morris</span></h2><p class="article-text summary-text" data-dcnode-id="1192"><span data-dcnode-id="1199" instrument_node="">Few artists left such a wide and indelible mark on the art, culture, and politics of their era as William Morris did on the second half of the nineteenth century. Training first as a priest and then as an architect before abandoning both to realize his visions of medieval arcadia in the company of the </span><span class="marked_text chart-tooltip-target-top tooltip_id-pre-raphaelites" data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Pre-Raphaelites</span></span><span data-dcnode-id="1196" instrument_node="">, he moved between artistic and literary media throughout his life. Initially producing paintings in the sweet Quattrocento style of his Pre-Raphaelite contemporaries, most notably </span><a data-dcnode-id="1194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/artist/rossetti-dante-gabriel/"><span data-dcnode-id="1195" instrument_node="">Dante Gabriel Rossetti</span></a><span data-dcnode-id="1193" instrument_node="">, he soon branched out into architecture and interior design, creating some of the most commercially successful and enduringly admired textile patterns and furnishings in British art history. Towards the end of his life, Morris focused with increasing singularity on the radical political ambitions which had always underpinned his practice, publishing utopian socialist fantasy literature, and consolidating his lifelong work as a poet. When he died in 1896, he had not only left a deep imprint on the century he had lived through, but also laid the groundwork for many of the artistic, architectural and political projects which defined the next.</span></p><h2 class="article-header key-ideas-header" data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node=""> Accomplishments </span></h2><ul class="key-ideas" data-dcnode-id="1159"><li data-dcnode-id="1173"><span data-dcnode-id="1189" instrument_node="">William Morris is often seen as the grandfather of the international </span><a data-dcnode-id="1187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/movement/arts-and-crafts/"><span data-dcnode-id="1188" instrument_node="">Arts and Crafts Movement</span></a><span data-dcnode-id="1186" instrument_node="">. In an era of increasing industrialism and urbanization, he embraced an idealized vision of the artisanship and cottage industries of the Middle Ages. For Morris, art was nothing if it was not a product of craftsmanship: a collaborative, spiritually imbued activity by which human beings grew together in kinship, and in connection to their natural environment. Inspired partly by the art historian </span><a data-dcnode-id="1184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/influencer/ruskin-john/"><span data-dcnode-id="1185" instrument_node="">John Ruskin</span></a><span data-dcnode-id="1183" instrument_node="">, Morris's Arts and Crafts aesthetic directly or indirectly influenced a huge swath of artistic and literary movements over the coming decades, from </span><a data-dcnode-id="1181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/movement/art-nouveau/"><span data-dcnode-id="1182" instrument_node="">Art Nouveau</span></a><span data-dcnode-id="1180" instrument_node=""> to the artists' books of the </span><a data-dcnode-id="1178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/movement/futurism/"><span data-dcnode-id="1179" instrument_node="">Futurists</span></a><span data-dcnode-id="1177" instrument_node=""> and </span><a data-dcnode-id="1175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/movement/dada/"><span data-dcnode-id="1176" instrument_node="">Dadaists</span></a><span data-dcnode-id="1174" instrument_node="">.</span></li><li data-dcnode-id="1165"><span data-dcnode-id="1172" instrument_node="">William Morris was the first artist of the modern era to combine word and image in the expression of his vision. Following in the footsteps of that other great London-born radical and luminary </span><a data-dcnode-id="1170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/artist/blake-william/"><span data-dcnode-id="1171" instrument_node="">William Blake</span></a><span data-dcnode-id="1169" instrument_node="">, Morris developed an aesthetic in which the words printed on a hanging tapestry, for example, or in a hand-printed manuscript, were as reliant on their surrounding pattern-work for meaning as the images were on the text. This notion of a multi-media art practice, though realized in the context of a nostalgic medievalism, pre-empted the more overtly radical art-and-language experiments of the twentieth century, from </span><a data-dcnode-id="1167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/movement/constructivism/"><span data-dcnode-id="1168" instrument_node="">Constructivist</span></a><span data-dcnode-id="1166" instrument_node=""> book design to Concrete Poetry.</span></li><li data-dcnode-id="1160"><span data-dcnode-id="1164" instrument_node="">Like his mentor Rossetti, William Morris preferred to work in the company of friends, creative collaborators with whom he shared an artistic and spiritual worldview. It has often been argued that these collective endeavors, like those of the Pre-Raphaelite Brotherhood to which Morris was partially connected, pre-empt the notion of the </span><a data-dcnode-id="1162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/definition/avant-garde/"><span data-dcnode-id="1163" instrument_node="">avant-garde</span></a><span data-dcnode-id="1161" instrument_node=""> which held sway over radical artistic culture for much of the following century. If the definition of the avant-garde involves a radical, collective aesthetic vision infused with utopian political aims, then Morris's and his companions' activities certainly fit the bill.</span></li></ul><h2 class="article-header" data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Biography of William Morris</span></h2><div class="grey-box" data-dcnode-id="1139"><div class="short-bio-container" data-dcnode-id="1140"><div class="bio-img-container" data-dcnode-id="1153"><div class="img-btn-holder" data-dcnode-id="1154"><img alt="William Morris Photo" class="lazyloaded" data-dcnode-id="1156" data-initial-src="/images20/new_design/c/c_morris_william.jpg" data-src="/images20/new_design/c/c_morris_william.jpg?3" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/images20/new_design/c/c_morris_william.jpg%3F3&amp;raw"><div class="btn c-info-button" data-dcnode-id="1155"></div></div></div><div class="short-bio" data-dcnode-id="1141"><p class="article-text" data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">William Morris was born in 1834 in Walthamstow, Essex, the third of nine children. William's father, after whom he was named, was a self-made business man, who was able to provide an upper-middle-class lifestyle for his family because of a shrewd investment in a Devonshire mine. Although William Morris Senior died when his son was just thirteen, the wealth he had accumulated provided a generous income for the artist well into his adult life.</span></p><div class="buttons-container" data-dcnode-id="1142"><div class="blue-button" data-dcnode-id="1147"><a data-dcnode-id="1148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/artist/morris-william/life-and-legacy/%23biography_header"><div data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">Read full biography</span></div></a></div><div class="blue-button" data-dcnode-id="1143"><a data-dcnode-id="1144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/artist/morris-william/life-and-legacy/%23legacy_header"><div data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Read artistic legacy</span></div></a></div></div></div></div></div><span data-dcnode-id="1138" instrument_node=""> </span></div></div><div class="right-column" data-dcnode-id="1135"></div><span data-dcnode-id="1134" instrument_node=""> </span></div><div class="main-column" data-dcnode-id="266"><div class="article-anchor" data-dcnode-id="1132" id="artworks"></div><h2 class="article-header artworks-header" data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node=""> Important Art by William Morris					</span></h2><div class="progression-art" data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">Progression of Art</span></div><div class="artworks-box progression-artworks-box" data-dcnode-id="934"><div class="article-anchor" data-dcnode-id="1127" id="pnt_1"></div><div class="important-art-element important-art-element-work important-art-element-first" data-dcnode-id="1101"><div class="arwrork-img-container" data-dcnode-id="1121"><div class="artwork-img lazy-box" data-dcnode-id="1122"><div class="img-btn-holder" data-dcnode-id="1123"><img alt="La Belle Iseult (1858)" class="lazyloaded" data-dcnode-id="1126" data-src="/images20/works/morris_william_1.jpg?3" height="400" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/images20/works/morris_william_1.jpg%3F3&amp;raw" width="284"><div class="btn c-info-button" data-dcnode-id="1125"></div><div class="btn zoom-button" data-dcnode-id="1124"></div></div></div></div><div class="artwork-data-container" data-dcnode-id="1102"><div class="year-line" data-dcnode-id="1120"></div><div class="artwork-year" data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">1858</span></div><h3 class="artwork-title" data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">La Belle Iseult</span></h3><p class="artwork-description" data-dcnode-id="1105"><span data-dcnode-id="1115" instrument_node="">Although this painting has been listed since its creation as 'unfinished', it is the only easel painting by Morris to reach this level of near-completion, and a quintessential work of Pre-Raphaelite-era portraiture. The model for the painting was Jane Burden, Morris's soon-to-be wife, and it is believed that he started work on it very early during their courtship. The artist reportedly struggled during the composition process with the proportions of the human body, which he was never able to execute as effectively as his peers. It is rumored that when he stopped working on the painting, he scribbled a note on the back to Jane: "I cannot paint you, but I love you". </span><br data-dcnode-id="1114"><br data-dcnode-id="1113"><span data-dcnode-id="1112" instrument_node=""> Jane poses as the female protagonist of the story of Tristram and Iseult (Tristan and Isolde), a legend of Celtic origin made popular during the medieval period by the treatment of Thomas Mallory, on which Morris based his composition. The narrative of doomed lovers contains all the aspects of Medieval romance - thwarted desire, chastity, honor, chivalry - that attracted the Pre-Raphaelites to the literature and art of the period. In the scene depicted, Iseult is mourning the exile of Tristram - a knight sent to fetch her from Ireland to marry King Mark of Cornwall, only for the two to fall in love </span><i data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">en route</span></i><span data-dcnode-id="1109" instrument_node=""> - from her husband's court. The tale was one that Morris had previously represented in the Oxford Union Murals, and the influence of the Pre-Raphaelite artists with whom he undertook that project, particularly Rossetti, is obvious. At the same time, we might trace a thread of affinity with the nascent Symbolist movement in continental Europe, given the heavily allegorical nature of the composition. The dog on the bed, given to Iseult by Tristram in Mallory's story, stands for loyalty, the rosemary in her crown for remembrance. </span><br data-dcnode-id="1108"><br data-dcnode-id="1107"><span data-dcnode-id="1106" instrument_node=""> The painting also alludes in various ways to Morris's artistic and personal biography. Whilst figural painting would never be his true calling, we can sense clues as to his future endeavors as a designer and craftsman in the finer details of the scene. On the bed is an illuminated manuscript similar to those Morris would produce with Kelmscott Press, while the lavish textiles and tapestries are reminiscent of those Morris would spend most of his career creating. As for his model, Jane's strong, striking features, which epitomized the Pre-Raphaelite ideal of beauty, also caught the attention of Morris's friend and mentor Rossetti, with whom Jane embarked on a lifelong affair, grudgingly tolerated by her husband.</span></p><p class="artwork-materilas-location" data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node=""> Oil on Canvas - Collection of the Tate, United Kingdom				</span></p></div></div><div class="article-anchor" data-dcnode-id="1100" id="pnt_2"></div><div class="important-art-element important-art-element-even important-art-element-work" data-dcnode-id="1074"><div class="arwrork-img-container" data-dcnode-id="1094"><div class="artwork-img lazy-box" data-dcnode-id="1095"><div class="img-btn-holder" data-dcnode-id="1096"><img alt="Red House (1860)" class="lazyloaded" data-dcnode-id="1099" data-src="/images20/works/morris_william_2.jpg?3" height="400" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/images20/works/morris_william_2.jpg%3F3&amp;raw" width="665"><div class="btn c-info-button" data-dcnode-id="1098"></div><div class="btn zoom-button" data-dcnode-id="1097"></div></div></div></div><div class="artwork-data-container" data-dcnode-id="1075"><div class="year-line" data-dcnode-id="1093"></div><div class="artwork-year" data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">1860</span></div><h3 class="artwork-title" data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Red House</span></h3><p class="artwork-description" data-dcnode-id="1078"><span data-dcnode-id="1088" instrument_node="">Created in collaboration with the architect Philip Webb, many consider this building the jewel in Morris's crown. After his marriage to Jane, Morris longed for a country home for the family, a place where he could live out his visions of medieval romance and collaborative creativity. The result was a strange and magnificent red brick construction which brought together the pointed arches of Gothic religious architecture, the gabled roofs of a Tudor mansion, and turrets from a medieval fairytale. This was not just a house to be lived in, but to be explored and experienced: for Rossetti, it was "more a poem than a house". </span><br data-dcnode-id="1087"><br data-dcnode-id="1086"><span data-dcnode-id="1085" instrument_node=""> Everything in the creation and decoration of Red House was carefully considered. Perhaps in a nod to Morris's growing socialist principles, the red bricks of working-class housing were favored over the stone blocks that would have befitted his class status. He also abandoned bourgeoise taste by filling the garden with native British trees and flowers - those which inspired his decorative designs - rather than the exotic plants favored by the upper classes. </span><br data-dcnode-id="1084"><br data-dcnode-id="1083"><span data-dcnode-id="1082" instrument_node=""> The decoration of the house has become as famous as its architecture, a collaborative endeavor involving not just Morris and Webb, but all of their artistic friends as well. Apparently, whenever a guest arrived to view the completed building, they would be invited to assist with its decoration. Morris would even prick out his designs in plaster, for less creatively inclined friends. The result is a work of interior decoration which showcases the talents of some of the best-known artists of the era. Murals, painted panels and chests, stained-glass windows and textiles: all were created in the spirit of collective joy and industry that Morris so valued. </span><br data-dcnode-id="1081"><br data-dcnode-id="1080"><span data-dcnode-id="1079" instrument_node=""> Red House has been seen as the ancestral home of the Arts and Crafts Movement in Britain. Its construction also marked a decisive shift in architectural aesthetics, one whose effects were still playing out in the early twentieth century. In 1904, the German critic Hermann Muthesius described Red House as "the first house to be conceived and built as a unified whole, inside and out, the very first example in the history of the modern home". This concept would be hugely influential on architects of the Art Nouveau era such as Charles Rennie Mackintosh, and modernists such as Walter Gropius. 150 years after its construction, the building, now owned by the National Trust, continues to fascinate and excite visitors.</span></p><p class="artwork-materilas-location" data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node=""> Bexleyheath, England				</span></p></div></div><div class="article-anchor" data-dcnode-id="1073" id="pnt_3"></div><div class="important-art-element important-art-element-work" data-dcnode-id="1050"><div class="arwrork-img-container" data-dcnode-id="1067"><div class="artwork-img lazy-box" data-dcnode-id="1068"><div class="img-btn-holder" data-dcnode-id="1069"><img alt="Green Dining Room (1868)" class="lazyloaded" data-dcnode-id="1072" data-src="/images20/works/morris_william_3.jpg?3" height="400" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/images20/works/morris_william_3.jpg%3F3&amp;raw" width="600"><div class="btn c-info-button" data-dcnode-id="1071"></div><div class="btn zoom-button" data-dcnode-id="1070"></div></div></div></div><div class="artwork-data-container" data-dcnode-id="1051"><div class="year-line" data-dcnode-id="1066"></div><div class="artwork-year" data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">1868</span></div><h3 class="artwork-title" data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">Green Dining Room</span></h3><p class="artwork-description" data-dcnode-id="1054"><span data-dcnode-id="1061" instrument_node="">This Green Dining Room (also knonw as the Morris Room) is one of three refreshment rooms created for the South Kensington Museum (now the Victoria and Albert Museum) during the 1860s. This commission was not given to Morris alone, but to Morris, Marshall, Faulkner &amp; Co., the company known as The Firm. The prestige of this commission was a testament to the critical and commercial success that Morris and his collaborators had been enjoying since establishing The Firm in 1861. The individuals chiefly involved in this project were Morris, Philip Webb, and Edward Burne-Jones. As with their other joint-endeavors, each worked on the sections of the room that best suited their skills. The Green Dining Room thus embodies the spirit of collaborative artisanship which the company championed. </span><br data-dcnode-id="1060"><br data-dcnode-id="1059"><span data-dcnode-id="1058" instrument_node=""> As the resident architect of the group, Webb designed the window frames, working with Morris on the floral and geometric designs pricked into the plaster of the ceiling. Burne-Jones painted the paneled frieze along the walls of the room, and, as an accomplished stained-glass designer, filled the window panels with scenes of medieval domestic bliss, including the ubiquitous, lissome Pre-Raphaelite beauties. The patterns inscribed into the green-painted plaster walls were the work of Morris alone, however. Olive boughs, raised up in the plaster, wrap around the room in an endless pattern, punctuated by the splashes of color introduced by flowers and berries. While these walls were created as reliefs, the designs pre-empt those Morris would later create for wallpapers and furnishing fabrics, particularly </span><i data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">Willow</span></i><span data-dcnode-id="1055" instrument_node="">. The latter is one of Morris's best-known designs, a simple pattern of intertwined willow leaves that gives the "unmistakable suggestions of gardens and fields" within a domestic setting.</span></p><p class="artwork-materilas-location" data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node=""> Plaster, paint, wooden panel, and stained glass - Victoria and Albert Museum, London				</span></p></div></div><div class="article-anchor" data-dcnode-id="1049" id="pnt_4"></div><div class="important-art-element important-art-element-even important-art-element-work" data-dcnode-id="1015"><div class="arwrork-img-container" data-dcnode-id="1043"><div class="artwork-img lazy-box" data-dcnode-id="1044"><div class="img-btn-holder" data-dcnode-id="1045"><img alt="Strawberry Thief (1883)" class="lazyload" data-dcnode-id="1048" data-src="/images20/works/morris_william_4.jpg?3" height="400" width="632"><div class="btn c-info-button" data-dcnode-id="1047"></div><div class="btn zoom-button" data-dcnode-id="1046"></div></div></div></div><div class="artwork-data-container" data-dcnode-id="1016"><div class="year-line" data-dcnode-id="1042"></div><div class="artwork-year" data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">1883</span></div><h3 class="artwork-title" data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">Strawberry Thief</span></h3><p class="artwork-description" data-dcnode-id="1019"><i data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Strawberry Thief</span></i><span data-dcnode-id="1035" instrument_node=""> is the best known of Morris's decorative textile designs, one on which he worked for several months before finding a way of printing it successfully. The fabric was intended to be used for curtains or hung along walls, a medieval style of decoration which the artist advocated. The pattern, meanwhile, was based on the thrushes that would steal strawberries from the kitchen in his country home at Kelmscott Manner, and was therefore imbued with nostalgic sentiment. Whilst the foliate designs are complex and eye-catching, and the design provides little depth between foreground and background, the birds remain a focal point due to their light color and the naturalism of their rendering. They also create an element of narrative interest, as the mischievous protagonists of a story that plays out across the surface of the fabric, entertaining with their song while they make away with the precious berries. </span><br data-dcnode-id="1034"><br data-dcnode-id="1033"><span data-dcnode-id="1032" instrument_node=""> These themes are redolent of the </span><i data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">natura naturans</span></i><span data-dcnode-id="1029" instrument_node=""> spirit of much medieval textile art, and loosely evocative of the romance and fantasy narratives of the same era. In practical terms, Morris took a great deal of interest in the practical craftsmanship of the </span><i data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Strawberry Thief</span></i><span data-dcnode-id="1026" instrument_node=""> design, learning the theory of fabric-dyeing and block-printing in order to create a pattern amenable to his chosen production process. Eventually, he settled on the ancient technique of indigo discharge, in spite of its costly and laborious nature, applying bleached blocks to dyed fabric. His main concern was the depth of color in the finished product, and the artisanal authenticity of the creative process. </span><br data-dcnode-id="1025"><br data-dcnode-id="1024"><span data-dcnode-id="1023" instrument_node=""> This design has attained extraordinary commercial success since its release in the late nineteenth century, and continues to sell widely, with English department stores having featured it in several high-end fashion collaborations. Its popularity has recently led the Victoria and Albert Museum's designer-in-residence to create a digital game based on the design, while contemporary artists continue to look back to it. The conceptual and video artist Jeremy Deller, for example, has named an exhibition after the work, and created the piece </span><i data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Strawberry Thief</span></i><span data-dcnode-id="1020" instrument_node=""> (2014), a neon light depicting one of the birds with a captured berry, in homage to it.</span></p><p class="artwork-materilas-location" data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node=""> Indigo-discharged and block-printed cotton - Victoria and Albert Museum, London				</span></p></div></div><div class="article-anchor" data-dcnode-id="1014" id="pnt_5"></div><div class="important-art-element important-art-element-work" data-dcnode-id="982"><div class="arwrork-img-container" data-dcnode-id="1008"><div class="artwork-img lazy-box" data-dcnode-id="1009"><div class="img-btn-holder" data-dcnode-id="1010"><img alt="Woodpecker Tapestry (1885)" class="lazyload" data-dcnode-id="1013" data-src="/images20/works/morris_william_5.jpg?3" height="400" width="192"><div class="btn c-info-button" data-dcnode-id="1012"></div><div class="btn zoom-button" data-dcnode-id="1011"></div></div></div></div><div class="artwork-data-container" data-dcnode-id="983"><div class="year-line" data-dcnode-id="1007"></div><div class="artwork-year" data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">1885</span></div><h3 class="artwork-title" data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Woodpecker Tapestry</span></h3><p class="artwork-description" data-dcnode-id="986"><span data-dcnode-id="1002" instrument_node="">Most of Morris's best-known tapestry designs were created in collaboration with artists, such as Philip Webb and Edward Burne-Jones. The classic design for </span><i data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Woodpecker Tapestry</span></i><span data-dcnode-id="999" instrument_node="">, however, is the product of his imagination and technical skill alone. Standing at three meters high, the work was devised on a grand scale, originally intended to be hung in a billiard room in London. It depicts a woodpecker and songbird in a tree; above and below are two scrolls, bearing an inscription that would later be published as one of a series of "Verses for Pictures" in Morris's </span><i data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Poems By the Way</span></i><span data-dcnode-id="996" instrument_node=""> (1891): "I once a king and chief/ now am the tree bar's thief/ ever twixt trunk and leaf/ chasing the prey". This playful little poem is based on a tale from the Roman poet Ovid's </span><i data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Metamorphoses</span></i><span data-dcnode-id="993" instrument_node="">, in which the sorceress Circe curses King Picus to become a woodpecker, after he spurns her sexual advances. </span><br data-dcnode-id="992"><br data-dcnode-id="991"><span data-dcnode-id="990" instrument_node=""> The extent to which Morris drew from medieval sources is abundantly clear from the design of this work: not only in its gothic lettering and busy pattern-work, but from the decision to employ tapestry as an artistic medium. Whilst hand-woven textiles had lined the halls of royal courts in the Middle Ages, by the nineteenth century tapestry had fallen far from fashionable taste. Morris remedied this not only by creating various modern takes on medieval tapestry patterns, but also by learning the craft himself. Synthesizing these ancient sources of inspiration with a modern attitude to nature, he created a decorative design that is as complex in thematic association as it is beautiful. </span><br data-dcnode-id="989"><br data-dcnode-id="988"><span data-dcnode-id="987" instrument_node=""> The combination of words and image, that is, means that the viewer is not only invited to follow the curves of trunk and branch, but also to contemplate the allegorical value of the illustration. Perhaps the poem contains a kernel of Morris's socialist worldview. The king appears to mourn his fall from power, but it is easy to question the validity of his lament: how can he mourn in such a beautiful natural setting?</span></p><p class="artwork-materilas-location" data-dcnode-id="984"><span data-dcnode-id="985" instrument_node=""> Wool on Cotton - William Morris Gallery, London				</span></p></div></div><div class="article-anchor" data-dcnode-id="981" id="pnt_6"></div><div class="important-art-element important-art-element-even important-art-element-last important-art-element-work" data-dcnode-id="935"><div class="arwrork-img-container" data-dcnode-id="975"><div class="artwork-img lazy-box" data-dcnode-id="976"><div class="img-btn-holder" data-dcnode-id="977"><img alt="The Works of Geoffrey Chaucer now Newly Imprinted (1896)" class="lazyload" data-dcnode-id="980" data-src="/images20/works/morris_william_6.jpg?3" height="400" width="526"><div class="btn c-info-button" data-dcnode-id="979"></div><div class="btn zoom-button" data-dcnode-id="978"></div></div></div></div><div class="artwork-data-container" data-dcnode-id="936"><div class="year-line" data-dcnode-id="974"></div><div class="artwork-year" data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">1896</span></div><h3 class="artwork-title" data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">The Works of Geoffrey Chaucer now Newly Imprinted</span></h3><p class="artwork-description" data-dcnode-id="939"><i data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">The Kelmscott Chaucer</span></i><span data-dcnode-id="967" instrument_node="">, as it is widely known, is one of the defining achievements of the last great artistic project of Morris's life, the Kelmscott Press. For over two decades, Morris had enjoyed translating and illustrating medieval narratives, and he had gifted several hand-made manuscripts to family and friends. In 1891, he decided to set up a business that would produce beautiful handprinted books, spending months sourcing the correct handmade papers, woodblock carvers, and typefaces for the Kelmscott Press to use. In the case of the </span><i data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Kelmscott Chaucer</span></i><span data-dcnode-id="964" instrument_node="">, the medieval-style typeface originally chosen did not create the desired visual effect, and so an entirely new typeface, "Chaucer", was created solely for the project. </span><br data-dcnode-id="963"><br data-dcnode-id="962"><span data-dcnode-id="961" instrument_node=""> The </span><i data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">Kelmscott Chaucer</span></i><span data-dcnode-id="958" instrument_node=""> was the result of several years' labor involving Morris and his close friend Edward Burne-Jones. Morris designed foliate patterns for the pages, whilst Burne-Jones lent his decorative skills to the illustrated panels. The two then collaborated on the overall format and design of the book, while the artist and engraver William Harcourt Hooper etched the pages for printing. Less than 500 copies were made, each costly to produce and buy. They turned reading into a luxurious experience, to be appreciated visually as well as intellectually. Each page was to be savored, the words of the fourteenth-century poet placed in an aesthetic space inspired by the world in which they were written. Burne-Jones described </span><i data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">The Kelmscott Chaucer</span></i><span data-dcnode-id="955" instrument_node=""> as the culmination of the ideas that he and Morris had shared since they were students, finally brought to fruition "at the end of our days". Morris only just lived to see the release of the book, dying just a few months later in 1896. </span><br data-dcnode-id="954"><br data-dcnode-id="953"><span data-dcnode-id="952" instrument_node=""> The pages of the </span><i data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Kelmscott Chaucer</span></i><span data-dcnode-id="949" instrument_node=""> have provided enjoyment and inspiration for artists and craftsmen ever since they were published. For his 2015 installation work </span><i data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Announcer</span></i><span data-dcnode-id="946" instrument_node="">, the contemporary artist David Mabb covered the walls of a gallery space with facsimiles of the </span><i data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Kelmscott Chaucer</span></i><span data-dcnode-id="943" instrument_node=""> and the Russian Constructivist artist El Lissitzky's edition of the revolutionary poet Vladimir Mayakovsky's </span><i data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">For the Voice</span></i><span data-dcnode-id="940" instrument_node="">. Both books are the product of utopian socialist ideals, and of an approach to book-making that was both artisanal and avant-garde.</span></p><p class="artwork-materilas-location" data-dcnode-id="937"><span data-dcnode-id="938" instrument_node=""> Woodblock-printed pages - British Library, London				</span></p></div></div></div><h2 class="article-header influences-header" data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Influences and Connections</span></h2><div class="influences influences-closed" data-dcnode-id="689"><div class="influences-head" data-dcnode-id="922"><div class="influences-on" data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">Influences on Artist</span></div><div class="influences-card" data-dcnode-id="925"><div class="green" data-dcnode-id="929"></div><div class="red" data-dcnode-id="928"></div><img alt="William Morris" class="lazyload" data-dcnode-id="927" data-src="/images20/ttip/morris_william.jpg"><div class="sep" data-dcnode-id="926"></div></div><div class="influenced-by" data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Influenced by Artist</span></div></div><div class="influences-data" data-dcnode-id="696"><div class="influences-data-holder" data-dcnode-id="697"><div class="influences-on" data-dcnode-id="813"><div class="influences-half" data-dcnode-id="814"><div class="influences-part" data-dcnode-id="888"><div class="influences-part-header" data-dcnode-id="920"><span data-dcnode-id="921" instrument_node=""
