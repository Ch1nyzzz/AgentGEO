      a good fashion has been attained, and a love of beautiful things for other own
      sakes and not because they are novelties, is both human, reasonable, and civilized,
      and will help the makers of wares, both master and man, and give them also time to
      think of beautiful things, and thus to raise their lives to a higher level.
    </span></p><span data-dcnode-id="93" instrument_node="">
</span><p data-dcnode-id="91"><span data-dcnode-id="92" instrument_node="">
      This I have named a certain number of the lesser arts, which I must ask you to take
      as representing the whole mass of them. Now all these arts, since they at all
      events make a show of life, one may suppose civilization considers desirable, if
      not necessary; but if they are to go on existing and to occupy in one way or other
      the lives of millions of men, it seems to me that their life should be read, that
      the necessity for them should be felt by those that allow them to be carried on;
      for surely wasted labour is a heavy burden for the world to bear.
    </span></p><span data-dcnode-id="90" instrument_node="">
</span><p data-dcnode-id="88"><span data-dcnode-id="89" instrument_node="">
      I have said that, on the other hand, I am ready to accept the conclusion that these
      arts are vain and should not be carried on at all; that we should do nothing that
      we can help doing beyond what is barely necessary to keep ourselves alive, that we
      may contemplate the mystery of life, and be ready to accept the mystery of death.
      Yes, that might be agreed to, if the world would; but, you see, it will not: man's
      life is too complex, too unmanageable at the hands of any unit of the race for such
      a conclusion to be come to except by a very few, better, or it may be worse, than
      their fellows; and even they will be driven to it by noting the contrast between
      their aspirations and the busy and inconsistent lives of other men. I mean, if most
      men lived reasonably, and with justice to their fellows, no men would be drawn
      towards asceticism. No, the lesser arts of life must be practised, that is clear.
      It only remains therefore for us to determine whether they shall but minister to
      our material needs, receiving no help and no stimulus from the cravings of our
      souls, or whether they shall really form part of our lives material and spiritual,
      and be so helpful and natural, that even the sternest philosopher may look upon
      them kindly and feel helped by them.
    </span></p><span data-dcnode-id="87" instrument_node="">
</span><p data-dcnode-id="85"><span data-dcnode-id="86" instrument_node="">
      Is it possible that civilization can determine to brutalize the crafts of life by
      cutting them off from the intellectual part of us? Surely not in the long run; and
      yet I know that the progress of the race from barbarism to civilization has
      hitherto had a tendency to make our lives more and more complex; to make us more
      dependent one upon the other, and to destroy individuality, which is the breath of
      life to art. But swiftly and without check as this tendency has grown, I know I
      cannot be alone in doubting if it has been an unmixed good to us, or in believing
      that a change will come, perhaps after some great disaster has chilled us into
      pausing, and so given us time for reflection: anyhow, in some way or other, I
      believe the day is not so far distant when the best of men will set to work trying
      to simplify life on a new basis; when the organization of labour will mean
      something else than the struggle of the strong to use each one to his best
      advantage the necessities and miseries of the weak.
    </span></p><span data-dcnode-id="84" instrument_node="">
</span><p data-dcnode-id="82"><span data-dcnode-id="83" instrument_node="">
      Meanwhile I believe that it will speed the coming of that day if we do but look at
      art open-eyed and with all sincerity; I want an end of believing that we believe in
      art-bogies; I want the democracy of the arts established: I want every one to think
      for himself about them, and not to take things for granted from hearsay; every man
      to do what he thinks right, not in anarchical fashion, but feeling that he is
      responsible to his fellows for what he feels, thinks, and has determined. In these
      lesser arts every one should say: I have such or such an ornamental matter, not
      because I am told to like it, but because I like it myself, and I will have nothing
      that I don't like, nothing; and I can give you my reasons for rejecting this, and
      accepting that, and am ready to abide by them, and to take the consequences of my
      being right or wrong. Of course such independence must spring from knowledge, not
      from ignorance, and you may be sure that this kind of independence would be far
      from destroying the respect due to the higher intellects that busy themselves with
      the arts. On the contrary, it would make that respect the stronger, since those who
      had themselves got to think seriously about the arts would understand the better
      what difficulties beset the greatest men in their struggles to express what is in
      them. Anyhow, if this intelligent, sympathetic, and serious independence of thought
      about the arts does not become general among cultivated men (and all men ought to
      be cultivated), it is a matter of course that the practice of the arts must fall
      into the hands of a degraded and despised class, degraded and despised at least as
      far as its daily work goes - that is to say, the greater part of its waking hours.
    </span></p><span data-dcnode-id="81" instrument_node="">
</span><p data-dcnode-id="79"><span data-dcnode-id="80" instrument_node="">
      Surely this is a serious danger to our political and social advancement, to our
      cultivation, to our civilization in short; surely we can none of us be content to
      accept the responsibility of creating such a class of pariahs, or to sit quiet
      under the burden of its existence, if it exist at present, as indeed it does.
      Therefore I ask you to apply the remedy of refusing to be ignorant and nose-led
      about the arts; I ask you to learn what you want and to ask for it; in which case
      you will both get it and will breed intelligent and worthy citizens for the common
      weal; defenders of society, friends for yourselves.
    </span></p><span data-dcnode-id="78" instrument_node="">
</span><p data-dcnode-id="76"><span data-dcnode-id="77" instrument_node="">
      Is not this worth doing? It will add to the troubles of life? Maybe; I will not say
      nay. Yet consider after all that the life of a man is more troublous than that of a
      swine, and the life of a freeman than the life of a slave; and take your choice
      accordingly. Moreover, if I am right in these matters, your trouble will be
      shifted, not increased: we shall take pains indeed concerning things which we care
      about, hard and bitter pains, maybe, yet with an end in view; but the confused,
      aimless, and for ever unrewarded pains which we now so plentifully take about
      things we do not care about, we shall sweep all that away, and so shall win calmer
      rest and more strenuous, less entangled work.
    </span></p><span data-dcnode-id="75" instrument_node="">
</span><p data-dcnode-id="73"><span data-dcnode-id="74" instrument_node="">
      What other blessings are there in life save these two, fearless rest and hopeful
      work? Troublous as life is, it has surely given to each one of us here some times
      and seasons when, surrounded by simple and beautiful things, we have really felt at
      rest; when the earth and all its plenteous growth, and the tokens of the varied
      life of men, and the very sky and waste of air above us, have seemed all to
      conspire together to make us calm and happy, not slothful but restful. Still
      oftener belike it has given us those other times, when at last, after many a
      struggle with incongruous hindrances, our own chosen work has lain before us
      disentangled from all encumbrances and unrealities, and we have felt that nothing
      could withhold us, not even ourselves, from doing the work we were born to do, and
      that we were men and worthy of life. Such rest, and such work, I earnestly wish for
      myself and for you, and for all men: to have space and freedom to gain such rest
      and such work is the end of politics; to learn how best to gain it is the end of
      education; to learn its inmost meaning is the end of religion.
    </span></p><span data-dcnode-id="72" instrument_node="">
