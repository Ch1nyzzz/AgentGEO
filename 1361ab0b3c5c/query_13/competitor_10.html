</span><div data-dcnode-id="377" data-reactroot="" id="app"><div class="sc-1w0nzjj-0 jdyNiL" data-dcnode-id="378" itemscope="" itemtype="http://schema.org/CreativeWork"><div class="sc-10ju8ow-0 ezCmjc" data-dcnode-id="451"><h1 class="ProductHeading__product-heading__wGhnq__0-0-946 ProductHeading__product-heading--step-3__ctHmI__0-0-946" data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">Victorian Footprints: Exploring Bethnal Green in the 19th Century</span></h1><div data-dcnode-id="1641" itemscope="" itemtype="http://schema.org/ImageObject"><meta content="true" data-dcnode-id="1646" itemprop="representativeOfPage"><p class="content" data-dcnode-id="1642"><img alt="Page 1" data-dcnode-id="1645" itemprop="image" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.isu.pub/191010091941-4c75ebf6bd68f20891d95010923389d9/jpg/page_1_thumb_large.jpg&amp;raw"><meta content="Page 1 of Victorian Footprints: Exploring Bethnal Green in the 19th Century by Walk East" data-dcnode-id="1644" itemprop="caption"><meta content="https://image.isu.pub/191010091941-4c75ebf6bd68f20891d95010923389d9/jpg/page_1_thumb_large.jpg" data-dcnode-id="1643" itemprop="contentUrl"></p></div><main data-dcnode-id="646" itemprop="text" style="overflow-wrap:break-word;max-width:100%"><section aria-label="Page 1" data-dcnode-id="1638"><p data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">eXplORinG BetHnal GReen in tHe 19tH centuRY</span></p></section><hr data-dcnode-id="1637"><section aria-label="Page 2" data-dcnode-id="1614"><p data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">Step Back in Time
Bethnal Green was transformed during
Victorian times. The landscape evolved
– as new housing, schools, churches
and parks were created – and social
reformers made their mark too, seeking
to improve education, healthcare and
living conditions. Missions, museums
and music halls all played their part.</span></p><p data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">At School, At Work, At Hom</span></p><p data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">The setting up of Oxford House in
1884 was part of this transformation.
So, when Oxford House’s building
underwent a major redevelopment in
2019, we were keen to find out more
about the context in which it first
started out.</span></p><p data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">6</span></p><p data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">Health and Faith – see how</span></p><p data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">We brought together a group of local
residents to track down stories of
Victorian Bethnal Green. This booklet
shares their remarkable discoveries. We
hope you enjoy it. Please share it with
your neighbours, and spread the word
online: www.issuu.com/walkeast

And this 2012 view shows how
the shops have evolved: two
jewellers, two womenâ&amp;amp;#x20AC;&amp;amp;#x2122;s fashion
shops, a pharmacy, shoe shop,
and a fried chicken express.</span></p><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">61</span></p></section><hr data-dcnode-id="663"><section aria-label="Page 62" data-dcnode-id="658"><p data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">About Our Project
Over ten weeks in early 2019, a group
of local residents came together on the
Victorian Footprints project to investigate
Bethnal Green in the 19th century. Some
of us were first-time archive users, and
others were more experienced researchers.
Together, we delved into old maps, photos,
trade directories and other historical
resources in search of stories. We tracked
down newspaper cuttings and census
returns online. And we explored the local
streets in search of Victorian buildings,
large and small.
Our impetus was the redevelopment
of Oxford House in 2019. Could we
understand the context in which Oxford
House was first established in 1884? This
booklet pulls together our discoveries and
shares some of the remarkable stories of
Bethnal Green, past and present.</span></p><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Photo &amp;amp; IMAGE credits

Bethnal Green was transformed during Victorian
times; new housing, schools and churches were built,
businesses expanded, and social reformers made their
mark – at missions, settlements, hospitals and parks.
To celebrate Oxford House’s redevelopment in 2019,
and understand why it was first set up in 1884, a group
of local residents came together to research life in
Victorian Bethnal Green. This booklet – developed
with Tower Hamlets Local History Library and
Archives – shares their remarkable discoveries.
Step back in time with VICTORIAN FOOTPRINTS.</span></p></section><hr data-dcnode-id="647"></main><nav data-dcnode-id="452"><ul data-dcnode-id="453"><li data-dcnode-id="643" style="display:inline-block;text-align:right;min-width:2.5rem;min-height:1.5rem;padding:0.75rem"><a data-dcnode-id="644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//issuu.com/walkeast/docs/victorian_footprints_issuu/1"><span data-dcnode-id="645" instrument_node="">1</span></a></li><li data-dcnode-id="640" style="display:inline-block;text-align:right;min-width:2.5rem;min-height:1.5rem;padding:0.75rem"><a data-dcnode-id="641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//issuu.com/walkeast/docs/victorian_footprints_issuu/2"><span data-dcnode-id="642" instrument_node="">2</span></a></li><li data-dcnode-id="637" style="display:inline-block;text-align:right;min-width:2.5rem;min-height:1.5rem;padding:0.75rem"><a data-dcnode-id="638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//issuu.com/walkeast/docs/victorian_footprints_issuu/3"><span data-dcnode-id="639" instrument_node="">3</span></a></li><li data-dcnode-id="634" style="display:inline-block;text-align:right;min-width:2.5rem;min-height:1.5rem;padding:0.75rem"><a data-dcnode-id="635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//issuu.com/walkeast/docs/victorian_footprints_issuu/4"><span data-dcnode-id="636" instrument_node="">4</span></a></li><li data-dcnode-id="631" style="display:inline-block;text-align:right;min-width:2.5rem;min-height:1.5rem;padding:0.75rem"><a data-dcnode-id="632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//issuu.com/walkeast/docs/victorian_footprints_issuu/5"><span data-dcnode-id="633" instrument_node="">5</span></a></li><li data-dcnode-id="628" style="display:inline-block;text-align:right;min-width:2.5rem;min-height:1.5rem;padding:0.75rem"><a data-dcnode-id="629" href="https
