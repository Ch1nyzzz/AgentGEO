This original design optical illusion Pineapple Log Cabin, with a crazy quilt border, dates from 
c.1880. A Pineapple or Windmill Log Cabin quilt shows motion and this quilt carries it to an 
extreme due to the placement of colors. The effect is also due to the huge contrast between 
the black and deep red in the center of the spokes and the windmill spokes themselves. 
Normally all of the 10 centers of the Log Cabin blocks would be red chimneys. In this case 
many of the centers of the pinwheels are actually miniature Crazy Quilts.
</span><br data-dcnode-id="4523"><span data-dcnode-id="4522" instrument_node="">
The blocks measure 11-3/4 inches square, the border 5-1/4 inches in width. The center chimneys, 
which in this case are mostly miniature Crazy Quilts, measure 4 inches square. 
The edge is finished with a black silk binding.

This Log Cabin Quilt has one of the smallest chimneys I have ever seen, measuring 
less than 5/8 inch square. The logs on this quilt measure from 1/2 inch in width up to 3/4 inch in width. 
There is a brown 3 inch border of which 1/4 inch is a hand applied wool challis binding. 
The quilt is completely comprised of wools and wool challis. It appears never to have been used. 
It has a yummy warm brown wool backing with a few moth holes in the backing. 
Some of the fabric on the back appears to have been home dyed.
</span><br data-dcnode-id="4381"><span data-dcnode-id="4380" instrument_node="">
It is definitely a Mennonite quilt.  I know this because the quilt has a strip pieced backing. 
Mennonites strip pieced their backings as a symbol of their work. It wasn't because they 
lacked the fabric and had to piece it, it was a symbol of their creativity. Graphically 
wonderful, the straight furrows cabin is the original log cabin pattern that came to us from England.
</span><br data-dcnode-id="4379"><span data-dcnode-id="4378" instrument_node="">
These blocks measure roughly 7 inches square. I see fabrics on here back to about 1840, 1850. 
There is one fabric pattern here that I have never seen before. It is graphically wonderful. 
This quilt can be used either for your bed, or as a stunning wall hanging. 
The colors are magnificent, deep and rich.
</span><br data-dcnode-id="4377"><span data-dcnode-id="4376" instrument_node="">
This quilt is ready to be sent to you for your approval in your home.

Presented here is a pre-civil war wool and wool challis Log Cabin Straight Furrows quilt 
with blue chimneys. The pattern used here originated in England; the blue chimneys are 
uniquely American. This quilt has it all. It has history, graphics, great colors and condition.
</span><br data-dcnode-id="4333"><span data-dcnode-id="4332" instrument_node="">
Blue chimneys were a signal for a safe house during the era of the underground railroad. 
These quilts are very rare, very hard to find, and this one is 100% authentic as is everything 
that I sell. The fabrics are wools and wool challis, some of these fabrics dating back to the 1830s. 
Instead of a wool binding there is a pillowcase edging. This quilt is in perfect unused condition. 
As a bonus there is added warmpth from the addition of a wonderful blue and brown plaid flannel backing.
</span><br data-dcnode-id="4331"><span data-dcnode-id="4330" instrument_node="">
The quilt displayed here is a historical and visual piece of textile art c.1862.  
The condition is wonderful, the graphics are wonderful. You can use it on a bed or you 
can display it on a wall. As a wall hanging piece of textile art it is captivating.

If you like an optical illusion quilt, here is one for you. 
If you are looking for the sought after gray color used in decorating today this quilt is 
strictly gray, a burgundy brown and white. The windmill and pineapple log cabin pattern shows motion. 
The blocks are hard to execute, and the resulting effect is to look stunning as this quilt does. 
There are approximately 12 different log cabin patterns. This pattern is one of them. 
Joining these blocks together is very intricate work, and if not done properly, 
the quilt will just look haphazard, but this one is stunning!
</span><br data-dcnode-id="4285"><span data-dcnode-id="4284" instrument_node="">
The design is made in individual blocks that are sewn together using a New England method.  
A summer coverlet, which means you can use it in the summer as there is no batting inside, 
and in the winter you can put it over a blanket for warmth, the bonus being it is stunning. 
For a great room, or a wall hanging, it would be absolutely gorgeous. 
This quilt could also be folded in different ways to hang showing a fourth or half of it.  
Because of the pattern this quilt is easy to display in that manner. 
Also because it is light in weight, it would be easy to put over a pole and just hang a quarter 
of it in a small space. So you could use this quilt as art in a small space or a large space 
or for your queen size bed. A queen size bed measures 60 inches across, providing you with 7 
inches over each side. This quilt appears to be in unused condition.

a staff of wheat for life and a cross for religion. The embroidery and embelishments are outstanding. 
They include 3D ribbon work, gold metallic thread embellishment around the border and silk chenille work. 
The Victorian era symbols were so important to Victorian women: flora and fauna and the love of animals. 
All of these symbols are represented on this quilt. The silk velvet border measures 4” with each corner 
having a sophisticated 4” block. These corner blocks are usually seen on Amish Quilts, not Victorian Crazy Quilts.  
Most of the ribbons, chenille and threads are silk. 
Two sleeves have been hand sewn onto the back short ends making this quilt ready to hang.

Simplicity can be so graphic as we see here in this wonderful mid 19th century Youth quilt. 
This early quilt measures approximately 58 X 60 inches and contains over sixty 4-1/2 inch blocks on point and approximately 
25 half blocks surrounding the outer edge of this quilt. 
There is a 2-1/2 inch border with a 3/8 inch separate binding finishing the quilt. 
There is a vast array of mid to early 19th century cotton prints creating a wonderful piece of art work. 
The binding frames this quilt perfectly. The backing is a gorgeous c.1845 print.
Completely pieced and quilted by hand in the Brewer, Maine area....a New England textile treasure.
In my possession are 2 youth quilts believed to be made by the same woman. 
The other one was started in 1828 and finished many years later.
There is a hand written note on the back of the other quilt.. 
I would like these two to stay together and will offer a discount for keeping both together.
Organically hand washed and ready for your at home viewing.
Please ask for more information.

The best way for me to describe the color of this quilt is by calling it 
orange sherbet. I cannot find any other quilt like it. This entire quilt 
was pieced and quilted by hand. All blocks are 10” square on point with 
the sashing between the blocks measuring 6”. The horizontal quilting on 
the sashing was created in triple lines, an 1840's style. The 
horizontal sashing angled in the opposite direction is quilted in a rope 
pattern design. 
</span></p><span data-dcnode-id="4065" instrument_node="">
</span><p data-dcnode-id="4063"><span data-dcnode-id="4064" instrument_node="">
Every diamond throughout the quilt is outline quilted. 
The double border of this wonderful quilt measures 4-1/4” which includes 
the 3/8” binding. The innermost border is a sawtooth pattern border in 
alternating white and sherbet colors. The outside border is 2-1/2” and 
created from an orange and white gingham. This section is also quilted 
in a herringbone pattern. The binding is also an orange calico. The 
blocks are white with a few varieties of c.1840’s double pinks and 
various early brown calicos, a black and white gingham, and a brown and 
white gingham. The creator of this quilt was both an amazing graphic 
artist and a fabulous quilter. This quilt appears to be unused or hardly 
used.

Amazing quilting! Graphically wonderful and perfectly executed, this unusual quilt has a 
folksy feel to it even though executed by a premier sewer and quilter. 
Completely hand sewn and hand appliquéd, this quilt was made before the 
sewing machine was in public use. Showing 30 indigo and white pieced 
Bayleaf blocks, on point, the work has been executed with minuscule 
stitches. There is double line quilting in the blue, white and yellow 
calico blocks fabric pieced and appliqued Bay leaf blocks. All the indigo 
blocks are on point. Joining them are white blocks containing wreath 
medallions with cross-hatch quilting in the center and completely 
surrounded by stippling. The massive amount of quilting used in stippling 
makes these areas of the quilt look stuffed.
A client purchased this quilt from me,20 years ago. The owner has had 
this wonderful quilt hanging on his wall as major art. Since he's now 
downsizing, his quilt is ready to go to another home.

A beautifully executed combination of the early New England Garden Maze 
pattern and the New York Beauty pattern. The inside blocks measure 10” 
square with all applique work pieced onto linen fabric. Joining blocks 
of the Garden Maze have a 3/4” border with a 3” white linen joining 
section. The same double raspberry print is used in the outline of the 
Garden Maze as is used in constructing the 9 patch blocks of the New 
York Beauty pattern. The triangles that make up the New York Beauty 
measure 1-3/8 x 1-3/8 x 1/2”. Created around 1860, this exquisite quilt 
has been completely executed by hand. The joining blocks have wave 
quilting, a New England and or Eastern style. The New York Beauty blocks 
are diagonally quilted in 3/8” grids. The backing is linen and the seams 
are joined by using a minuscule stitch. A 1/4” binding finishes the 
edge. A spectacular piece of art for your bed or wall.
Organically hand washed and now ready to be sent for your viewing and 
approval.

</span><p data-dcnode-id="3867"><span data-dcnode-id="3870" instrument_node="">
Many Victorian women were resourceful, creative and loved embellishing.  
In the homes of today, when we have stopped embellishing, Victorian 
women have just begun...I like to say that these women embellished the 
embellishment. However, in addition Victorian women loved to be creative 
and excelled in needlework of all kinds.
As a trendy habit most Victorian men smoked cigars. These cigars, in 
clusters, were wrapped in beautiful silk ribbons denoting the 
manufacturer. This advertiser design resulted in exquisite silk ribbons 
waiting to be creatively assembled in a piece of textile art.
  This Massachusetts woman, whose husband may have attended Harvard, has 
taken the silk cigar bands and created a version of the log cabin 
completely from these ribbons.
  The reason why I date this mid 1880’s is because of the vibrant 
colors. Later, the colors (mostly blue, orange and red) faded more 
easily due to a change in dyeing techniques.  These miniature quiltx are rare 
not only because of their scarcity, but because of the rarity of the 
colors and the manufacturers, notably Harvard. 
There are numerous ribbons from Massachusetts companies and over a 
dozen crimson Harvard University ribbons. One ribbon includes a 
patriotic golden American eagle holding an arrow. What an amazing piece 
of textile art for your home or office.
  In perfect original condition and ready to be sent for your approval.

Meticulously hand quilted, this pieced quilt is one of my favorites. The 
small triangles measure apx 1-1/2 x 1-1/2 x 2", the large triangles 
measure 5 x 5 x 7”. If this quilt did not have a split center...two 
triangles..one white and one blue..the name of the pattern would be 
ocean waves, but with the split squares the name changes to Martha 
Washington. The applied binding appears to be put on by machine and 
finished by hand. This 19th century blue is a wonderful mid century 
shade of indigo; sought after by many people. Actually blue is the most 
popular color in our country. This graphic quilt will fit perfectly on  
a twin, double or the top of a queen size bed. A beautifully graphic 
quilt it can also hang as an art piece for your wall. Made in Lebanon, 
Maine, the family name will be given upon sale.

This amazing early quilt has as much of an array of early prints as any 
quilt I’ve ever owned. This stunning and very sophisticated quilt is 
comprised of an 18th century Toile, 18th and early 19th century block 
prints and many hand painted prints. All of the early vegetable dye 
colors are represented here. Hand carving of the block prints requires a 
high level of skill. When I stand back from the quilt I see another 
pattern emerging. Its the Irish Chain. Therefore, we call this quilt an 
Extended 9 Patch Irish Chain. The blocks measure 7” square with 3-1/4” 
square centers. The smaller corner squares measure 1-3/4". If you don’t 
have a four post bed for this quilt, you can place the tail under the 
pillows. Even though we can consider this quilt partially a scrap bag 
quilt (because of the many fabrics) the high cost of these fabrics tells 
us that the creator was probably from an affluent family. The fabrics on 
this quilt are so spectacular that it needs to be seen to be 
appreciated. It is a masterpiece created from early fabrics.

This mint condition ...perfect unused condition....miniature Variable 
Star pattern will make a perfect addition to a fabric junkie’s 
collection. This Variable Star quilt has early mint condition chintz, 
very early block print Turkey red calicos and wonderful madder dyed 
prints...all rare and unusual fabrics.  Pieced and calico blocks measure 
7 inches square and are all hand pieced. Much later the blocks were 
machine pieced together with a brown calico. There are a very few, very 
slight spots on this quilt, but it has never been washed. The back is a 
wonderful large size calico. Started around c.1825 and finished c.1875, 
it was a work in progress. Ready to hang in your home or to adorn a 
guest bed.

This wonderful quilt is comprised of two fabrics...a vegetable dyed 
calico and an off white.
The signature blocks, on point, measure apx 12” square and are then 
joined with a 2” sashing from the same fabric. All work was completely 
hand executed, as this was created before the sewing machine was 
invented. The separate applied binding measures 1/4” in width and is the 
same fabric as the sashing and the blocks. The backing is a home spun 
linen indicative of the era. There are various quilting designs executed 
on this quilt from outline quilting to straight line quilting to V 
quilting. The colors may be hard to discern on any computer, which is 
why I like to send all quilts out for approval. The colors are a gold on 
yellow and a beige, black and white on chocolate calico. Mint condition. 
This is a perfect size as art on the wall and will also fit a double 
size bed. A quilt that can also be used as throw for a sofa or queen 
bed. These two fabrics have created a sophisticated and graphic piece of 
early New England art. Two early NE vegetable colors.
</span><br data-dcnode-id="3667"><span data-dcnode-id="3666" instrument_node="">
We always send for your approval...

This 200 year old mint condition four post bed quilt was originally made for an early New England bed 
with posts, and may heve even adorned a canopy. The family that created this quilt would have been affluent 
enough to deacorate their bed chamber in such a manner. Due to the quilt's enormity it will fit today's queen 
size bed. The geese pattern will cover the top of the bed and the bar border overhang will look like a dust 
ruffle. During this time period of an original early four post bed there could have been a child’s trundle bed underneath.
</span><br data-dcnode-id="3623"><span data-dcnode-id="3622" instrument_node="">
The three borders are 19-3/4” wide; the rectangles are 9 x 4-1/2” and are comprised of two triangles. 
The middle triangle is 9 x 6 x 6” and the side triangles are 4 x 4 x 6-1/2”.
</span><br data-dcnode-id="3621"><span data-dcnode-id="3620" instrument_node="">
The borders are a wonderful over-dyed green and yellow calico linen and a cotton red and white squiggly design. 
The geese are comprised of two fabrics, an early block print stripe and a black, red and white unusual print. 
The quilt has cross hatch and outline quilting and the bars have unusual 4“ quilted circles. The back is a 
homespun linen, then quilted with linen thread, both typical of an affluent family's quilt of this era. 
All piecing was executed by hand as it was made many years before the private use of the sewing machine.
</span><br data-dcnode-id="3619"><span data-dcnode-id="3618" instrument_node="">
The quilt is in perfect unused condition and ready to be sent on approval. 
It has been in my private collection for almost 34 years and it’s now time for a new home.
</span></p><span data-dcnode-id="3616" instrument_node="">

Have you ever seen a 19th century quilt with bunnies ? I have not ....
The circular starburst blocks have a diameter of 10”. This starburst 
block is one of the hardest patterns to piece because of the teeny tiny 
elongated triangle points. There are 20 of these very sophisticated 
blocks. Changing the sophistication of this entire piece are appliqué 
bunny rabbits in a basket. This is a combination that I have never seen. 
One way to know that this was made in New England is the fact that there 
are two borders instead of three. The mentality was, why do something 
extra if no one is going to see it.  It appears to be a work in progress 
as someone added  two borders to fit a child’s bed. We have done  some 
restoration work on this piece as well. The pre 1850 purple is a very 
hard color to find, as a result you can see where some are a different 
print. This is a happy quilt made by premier textile artist.

</span><p data-dcnode-id="3532"><span data-dcnode-id="3533" instrument_node="">
This graphic Turkey Red and white quilt has been pieced by machine and 
quilted by hand.   Created with c.1865 Turkey red, the most popular 
fabric for affluent women between 1835 and 1865.  A two color quilt is 
the easiest to become part of ones home....this quilt is simply Turkey 
Red and white cotton. I believe that this quilt may have been made at a later 
date because the quilt was machine pieced. Coming from Erie, the 
symbolism of the quilt may be related to the maker's husband’s work on 
the railroad. Created with apx 14” square blocks with the blocks joined 
with a  5-1/2” sashing. The binding was created by turning the back 
fabric to the front and machine stitching the fabric down. The quilting 
design indicates to me that this quilt was made later than the 
fabric which is pre 1865  Also appearing is that this fabric was 
previously used, which is indicated by the white striations on the 
red..only caused by wear. This clue added to the fact that the quilt 
was hardly used.

apx 8” and are on point while the triangles measure 2 x 1-1/2 x  1-1/2".

1/4” apart. The corner sections around the wreath are quilted in the 
same manner. The cactus basket is quilted in 1/2” grids. The entire 
double border measuring 5” in width is quilted in an apx 1/2” grid. The 
outside border is finished with a 3/8” binding. All piecing and quilting 
has been executed by hand. The workmanship on this quilt is exquisite 
and shows beautifully on a queen size bed with 9” over on each side. The 
white fabric used on the front and back of this is piece is a fine 
cotton. The binding, inner border, 1/2" sashing and baskets are the same 
19th century pink.
Organically hand washed and ready to be seen on approval in the privacy

After looking at and researching dozens of Crazy quilts to the best of 
my ability, I believe that this Maine quilt has definite Native American 
influence and symbolism. This original piece of art is comprised of 20 
blocks, each measuring apx 16” square. A Victorian crazy quilt that is 
totally unique. There is Native American symbolism thoughout the quilt. 
This quilt has embroidered names, auld lang syne, staffs of wheat and 
ears of corn and planted rows in a field.
Wonderful colors with wonderful motion and one of a kind. The front 
fabrics are wool, wool challis, wool silk and heavy cotton. The backing 
is all wool. This piece would provide great warmth as a quilt on a bed. 
As a piece of art,on a wall, this quilt would be artistically wonderful 
and soothing to the eyes.

liquor. This pristine quilt is comprised of 20 blocks, each measuring 
12” square and all joined by strips of white with red dot 3-1/2” 
sashing. The backing is a very similar whole cloth fabric creating a 
reversible quilt. Another fabric used in the construction of the block 
is an indigo calico. The 1/4” binding is turned over from the back and 
  finished by hand. All blocks are pieced by hand then joined to the 
sashing by machine and finished with hand quilting.
  This mint condition quilt certainly fits a description of patriotic. 
Around two sides of the  outer edge of there is a 6-1/2” border. The 
fabric on the other two sides is a red with white polka dots.
  I am happy to send this mint condition quilt for your viewing and 
approval.

Do you have either an original or reproduction early American bed? This 
textile is usually only found in historic books, museums or antique 
homes that one would tour....maybe even earlier than I am dating it.
This extraordinary and rare Candlewick Spread is almost 200 years old. 
Because of the age, one can understand why there are so few of these in 
existence. Created with cotton thread on a very fine linen fabric; the 
handwork is breathtakingly beautiful. The body of the spread is in 
perfect condition. The fishnet edging needs some restoration, which we 
can do. At this point I have only hand washed it. The seams are joined 
with a running back stitch which is so tiny that at first glance it 
appears to be done on a sewing machine. Early hand work such as this 
was never meant to come apart...hence the running back stitch that can 
easily be mistaken for machine work. I needed to use a magnifying glass to 
verify this stitch. This incredible bed covering was made 30 years 
prior to the invention of the sewing machine. When quilts and spreads 
were made from this era, this sturdy stitch was used to join seams. We 
were not a throw away society back then and things were made to last 
forever. This stitch holds seams firmly together. I have taken clothing 
apart to use for restoration and sometimes come across this stitch. This 
early New England Spread has been organically hand washed and is ready 
for viewing in your home.
</span><br data-dcnode-id="3280"><br data-dcnode-id="3279"></p><span data-dcnode-id="3277" instrument_node="">

</span><p data-dcnode-id="3230"><span data-dcnode-id="3239" instrument_node="">
This woman not only excelled as an amazing creater of a graphic quilt, 
but she was indeed a quilting expert. She seems to have loved quilting 
so much that instead of using one pattern throughout the joining 
sections of the Steeplechase blocks...she used 3 completely different, 
yet complimentary patterns. I have never before seen this execute on a 
quilt. Some areas are quilted in a tiny shell pattern, while others are 
quilted using a c.1840's double row quilting technique in a small grid 
fashion. The third quilting pattern is an exquisite medallion. There is 
so much quilting that it looks stippled. A wide 7" triple border 
surrounds this exquisite quilt. Narrow indigo blue, wide white, narrow 
indigo blue borders are are heavily quilted 1/2" apart, on the diagonal 
with opposite sides quilted in the same direction.
</span><br data-dcnode-id="3238"><span data-dcnode-id="3237" instrument_node="">
The fabrics are wonderful early indigo and white calicoes, a rare 
unusual red and black very dense print and a very fine white cotton.  
Linen is seen here for the backing as seen many times on pre 1865 quilts.
</span><br data-dcnode-id="3236"><span data-dcnode-id="3235" instrument_node="">
One probably notices that I refer to quilters as "she"....the reason 
being that in 34 years and many hundreds of quilts, I have only been 
able to document three quilts that were made by a man. Today, we are 
fortunate that there are many marvelous male quilters!
</span><br data-dcnode-id="3234"><span data-dcnode-id="3233" instrument_node="">
This quilt appears to have been such a treasure that it was saved for 
generations. Now organically hand washed and ready to be sent for your 
approval.

This artistically designed and perfectly constructed Log Cabin Streak of 
Lightening is made up of 100 blocks each measuring apx 7-1/2” square. 
The logs used for the construction are apx 1” in width. All logs are 
outline quilted and there is an 3/8” hand applied binding. This 
exquisite quilt is completely pieced by hand.  Am dating this c.1880 
because of one horseshoe conversation fabric that I have found on this 
quilt. There are many more c.1880’s fabrics used, and also fabrics 
dating from c.1850 to c.1880. The backing fabrics date from c.1840. When 
I purchased this it was a mint quilt. Mint meaning never washed, never 
used. I have organically washed it so now it is an unused quilt. This 
one quilt can appear to be three different quilts. The streak of 
lightening design can be used in either direction and the back of this 
quilt is actually a pieced Bars pattern. Strip pieced backings are a 
signature of Mennonite quilts. Because of the quality of the fabrics, 
one can see that this Mennonite family would have been of affluent 
means. Ready to see at home on approval.

Only in New England were quilts made specifically for 4 poster beds...usually with cut outs to go around 2 posts at the foot of the bed. When you see this style, you may not know which state it’s from, but it’s definitely from New England.

The main body of this quilt is comprised of an all over pattern consisting of 9” diamond in a square blocks created from fabrics with dates of c.1780s to c.1840. This perfect condition quilt is hand pieced and hand quilted. We are able to assume this because the quilt pre-dates home use of the treadle machine. The center square in each block has 6-1/2” sides with the block on point. The base of the corner triangles measures 6-1/2“ and the sides are 4-3/4". The huge variety of fabrics used in this piecing could lead someone to call it a scrap quilt, a term from later years. In this case, these  pieces of fabrics must have come from an affluent family as they are so expensive.  The backing used is homespun linen, and the thread is linen. The edge of the quilt has been pillowcase sewn and then outline stitched to give the impression of a separate binding. One of the photos shown here is the quilt on a queen size bed with a 15” mattress. This was originally made for a very high double bed that would have been 54” wide, but today we can easily use this on a 60" wide queen size bed.
Ready to see on approval.

This early quilt is a statement of affluence and good taste. 
These Turkey Red calico fabrics are truly amazing! The front of the quilt is in excellent, excellent condition. 
The backing was created from an 18th century home dyed linen that may pre-date the front by 40-50 years. 
Due to the acidic dye from the walnut hulls used in the dyeing process, there are places where the fabric is split on the back. 
There are also water stains on the back which must have been there before the quilt was made because no staining came through to the front. 
Naturally, when hung or on a bed you won’t see the backing at all. 
We can take an early linen and cover up the few areas of the back where there are splits if desired. 
There is slight wear on the binding, which is unnoticeable, but could be restored if someone desires.
The blocks measure apx 11 inches square. 
The sashing, which joins the blocks, measures 4 inches and the large connecting triangles around the edge of the quilt measure 11 x 11 x 16 inches. 
When the triangles are combined with the sashing - it appears as a triangle with 17" sides. 
Naturally, everything on this quilt is hand sewn as it pre-dates the sewing machine. 
The binding is 3/8 inch hand applied created from the same fabric as the sashing. 
The triangles in the basket measure 2 x 2 x 3 inches.

The overall appearance is pure beauty and sophistication!

The quilt has been organically washed by Betsey.

The price reflects the area on the back that has some splitting.

</span><p data-dcnode-id="2918"><span data-dcnode-id="2919" instrument_node="">
Stunningly simple, this Amish Quilt is called the center square.  In this case antique in age while being modern in design.

The center square measures 55” in width and encompasses most of the quilt. Surrounding the center square are three borders: the first is 3-1/8” in width, the second 3-1/4, and the outer border or third border measures 9” in width which includes the 3/4” hand closed binding. As with most all Amish quilts, the quilt pieces are machine joined and exquisitely hand quilted. The center of the center square is quilted with a diamond shaped medallion.... one which I have never previously seen. Radiating from there are angular 1-1/2” cross hatch quilting with meandering wreaths throughout this design. The outer most borders are quilted with chains and shells.  One chain stitch resembles a nautical chain...and then a shell design...both unusual for Amish quilting designs.

The Center Square pattern represents an early stage in Lancaster County quilt design. Afterwards Amish started creating the Diamond in a Square pattern. I have read that few center squares were made after the 19th century. From that information I would put this one at the tail end of the 19th century. Even though named a Center Square, it is not actually square in formation or size.

This is one of the most important doll quilts I have ever had in 31 years of collecting!

A diminutive quilt, which has been created to replicate an adult quilt, was obviously a learning tool or one of her first quilts of a child. 
The irregularity of some of the pieces and stitching along with the rough English piecing are the clues to the age of the girl making this quilt. 
In the late seventeen hundreds and well into the nineteenth century it was very common for a Mother to start a child, as early as four, sewing. 
The Mother teaching here may have come from England as the piecing method is "English ".
This doll quilt has a very rare piece of apx 1-3/8” George Washington Commemorative fabric. 
I had never seen this fabric before, however I finally located it in a museum reference book.
 All of the measurements on this piece are approximate and varying because it was made by a child and irregular in nature. What great character this little quilt has! :-) 
The hand sewn binding measures apx 1/4”. 
The backing and binding are made from an early 19th century home spun linen. 
The more I study this piece, the more I love it.

A rare and very special doll quilt...

I found this rare, and what appears to be unused, child's quilt in Maine where it originated from the Bethel area. 
The fabrics used in making this child’s quilt are from the very early 1800s with one fabric possibly from the 1700s. 
It contains 4" and 5” alternating strips, 3-1/2” square diamonds.
There is a handwritten note on the back where this quilt has been signed and dated 1828.  
A wonderful, rare child's quilt appearing to be in unused condition. 
This quilt has fabrics that I have never seen in my 31 years of business. 
The back is an amazing and rare whole cloth backing of a very early block print calico. 
The rarity and yardage of these fabrics point to the fact that the creator's family must have been very well off.

This special quilt has been organically hand washed by Betsey and is ready to be sent on approval.

A very hard to find, mint condition, child's quilt. This c.1870 "H" block Log Cabin design 
is comprised of mint fabrics dating back to c.1840.  Upon very close examination one can 
discern some very early treadle machine stitching along with the tiny hand stitching. 
The Apx. 10" blocks are comprised of 1" width "logs". The configuration of the colors 
have created the "H" block pattern...There is a tiny 1/4" applied off white binding 
finishing this stunning, calming and graphic quilt.
</span><br data-dcnode-id="2748"><span data-dcnode-id="2747" instrument_node="">
Created in Maine using a method indicative of New England....the way the individual blocks 
are joined on the back. Because this quilt was foundation pieced the sewer negated the 
need for quilting and as a result created a summer weight quilt. 
The colors that seem the most prominent are red, white and blues. There are dozens of 
different calicoes and prints. This perfectly executed quilt is a perfect wall art 
size for many homes.....or a great size to use as a summer "throw".
</span><br data-dcnode-id="2746"><span data-dcnode-id="2745" instrument_node="">
Ready to be sent for your at home approval.

Not only a perfect Christmas quilt, this Touching Stars with tulip 
and leaves border is graphically wonderful, perfectly executed with 
quilting, on a scale of one to ten being a fifteen!
</span><br data-dcnode-id="2700"><br data-dcnode-id="2699"><span data-dcnode-id="2698" instrument_node="">
Constructed in the 1840s we see one technique that is definitely 
indicative of that era: triple line quilting. Tripple line quilting is 
three rows of quilting that are very close together, with 1" spacing to 
the next three lines of quilting. The quilting stitches are some of the 
tiniest that I have ever seen.
</span><br data-dcnode-id="2697"><br data-dcnode-id="2696"><span data-dcnode-id="2695" instrument_node="">
Each white on point joining block is embellished with an exquisitely 
quilted wreath, filled in and outlined with triple line quilting. Even 
the small connecting blocks on point have a wonderfully quilted 
medallion with the centers and corners triple line quilted. Triple line 
quilting has been executed through all of the stars. The four outside 
corners are quilted in the same pattern as the inside white squares on 
point. The border is exquisitily quilted with half wreath medallions 
perfectly executed in every open space around the stars. There are 
dozens of diamonds with approximately 2-1/2" sides. The 6" border with 
appliqued tulips and leaves has triple line diagonal quilting spaced 
approximately 1" apart. The quilt is finished with a 1/4" hand applied 
separate binding.
</span><br data-dcnode-id="2694"><br data-dcnode-id="2693"><span data-dcnode-id="2692" instrument_node="">
We have overdyed green, a rare Turkey Red calico with faux quilting 
lines and pale yellow dots. The outside border was appliqued using a 
Turkey Red calico with miniatute pale yellow three leaf clovers. The 
pale yellow on each fabric is basicly the same shade.
</span><br data-dcnode-id="2691"><br data-dcnode-id="2690"><span data-dcnode-id="2689" instrument_node="">
All piecing and applique work is perfectly executed by hand.
</span><br data-dcnode-id="2688"><br data-dcnode-id="2687"><span data-dcnode-id="2686" instrument_node="">
This exquisite quilt would be an amazing piece of art to enjoy in your

</span><p data-dcnode-id="2642"><span data-dcnode-id="2643" instrument_node="">
Many of my very favorite quilts are made from wool challis. 
This Wool Challis Log Cabin Barn Raising with a  Diagonal Bar or piano key border measures 85 x 85 inches and was created prior to 1860. 
The pattern was constructed from 9-1/2 inch square blocks comprised of logs measuring approximately 1-1/8 inches in width and of various lengths. 
The 5-3/4 inch border is beautifully executed using a piano key diagonal bar pattern. 
The outside edge of the border has a 3/8 inch hand-applied binding. 
</span></p><span data-dcnode-id="2641" instrument_node="">
</span><p data-dcnode-id="2637"><span data-dcnode-id="2640" instrument_node="">
Most unusual for a quilt of this age is the fact that the quilt squares were assembled by machine. 
The bars overlap on the border and the blocks are used in a design where you don’t see any of the stitching on the front of the quilt, only on the back. 
The center four patch of each block, also known as a chimney, measures 1-1/2 inches square. 
The chimneys are comprised of four tiny squares, two red and two blue. 
Usually when you see a blue center square on a log cabin it signifies that the home is a safe house for runaway slaves. 
The date of this quilt works for that, however, I can’t definitively attest to that fact. 
This quilt would fit perfectly on a queen or double sized bed or become a dynamite piece of art for your wall. 
The color palate is seen in many Pennsylvania quilts. In unused condition, ready for your home.
</span><br data-dcnode-id="2639"><br data-dcnode-id="2638"></p><span data-dcnode-id="2636" instrument_node="">

at sewing. The 12 circles measure 15” around, the inner circles 5-3/4”. 
The large triangles measure 5 x 5 x 2-1/4” and the small 3-1/2 x 3-1/2 x

and beautifully hand quilted, this would look spectacular on a wall and

This simple yet sophisticated stunning quilt has been hand pieced and hand quilted. There are 4” borders on three sides, a Yankee tradition - why put on a forth side if that was to be the top of the bed? The border was applied by machine. The entire quilt has been quilted on the diagonal and double line quilted, which is indicative of 1840’s style. However, I feel this quilt was finished in the 1860’s due to the fact that the 4” border was applied by machine. 
</span></p><span data-dcnode-id="2553" instrument_node="">
</span><p data-dcnode-id="2549"><span data-dcnode-id="2552" instrument_node="">
The woman who created this used a style that she learned at an earlier age. This has an 1/8” turned over edge creating the binding, seen only on the back, which is closed with minuscule stitches. The greens, which appear now as slightly different shades, where probably all one shade when this was made. All green is over dyed, which means putting yellow over blue or blue over yellow. The top of a queen size bed is 60". This would cover a queen bed, or be a wonderful throw at the end of the bed. The quilting stitches are very small and even. This quilt has been beautifully made and appears to be in unused condition.

Silks and silk velvets were the fabrics of well to do families prior to the 1890’s. This Victorian crazy quilt, having been made in the 1880’s is comprised of wonderfully made silks and silk velvets. The mark of excellence for a v c q is 100 different stitches 
This quilt not only reaches this, but surpasses the level of embellishment. These quilts were created using the block formation. Created with apx 10 1/2” blocks, the edge of each block being embellished with various stitches. My feeling is that this quilt was made near the ocean as it was embellished with anchors and fish. Other Victorian symbols used include Japanese fans, as a symbol of the origin of these quilts, owls for their wisdom and of course beautifully painted oil and adorned flowers. The silk velvet border appears to have been used prior to the edging of this quilt. Because of its size, this is a wonderful quilt to hang in the home.

This stunning early garden maze quilt comes from Massachusetts. The story that the fabric is telling us is that it was created by a very affluent family. The turkey red calico fabric dates back to apx 1780-1815 and was one of the most expensive fabrics to purchase. The garden maze pattern is one of the earliest known patterns. Because of the size of this quilt, it can be used on a queen or king size bed. If you choose to hang this amazing textile as an incredible piece of art, it may be hung in either direction because there’s no specific top or bottom. Not only is this quilt stupendous for the holidays, but it would be an amazing focal point on a wall or bed throughout the year. 
</span></p><span data-dcnode-id="2296" instrument_node="">
</span><p data-dcnode-id="2294"><span data-dcnode-id="2295" instrument_node="">
All of the sewing is by hand due to the fact that the quilt was made apx 20 to 30 years prior to the sewing machine being available for public use. The diamonds in the Lamoyne stars are 2-1/4 inches with 2 inch sides. It has a 2-1/4 in border, 1/4 inch applied binding and the border triangles measure apx 3x2x2. The garden maze strips are 7/8 in wide. Unbelievable quilting with tiny tiny stitches. Strips, stars and triangles are all outline quilted. The white areas have cross hatch quilting in 1/2 inch grids. The Lamoyne stars have an early 19th century madder root dyed calico and early 19th century block print. Professionally hand washed by Betsey. This quilt appears to be in barely used condition.

Foundation pieced in a manner used only in New England.  Each square was separately foundation pieced, and the edges were turned under and joined on the back.  There is no batting in this child's quilt (youth bed), therefore it can also be called a summer quilt. However it is perfect to use this over a warm blanket in winter. The creation of each block results in the quilting that you see on the back.  The turkey red floral binding is much older and can date from the 1850s.  The array of fabric used to create this sunshine and shadows quilt dates from 1850 to 1880.  Graphically wonderful, this is the perfect size quilt ot use for a wall hanging, on your couch, or s throw on a bed.  It was meant for a youth, so is a perfect size for a youth bed.  Found in Maine.  Professionally hand washed by Betsey.  One piece of the binding has been restored with the identical fabric.  The rest of the quilt is in original condition.

Orange is a color that is hard to find as a major part of an antique 
quilt. This stunning optical illusion quilt is comprised of a rarely 
seen color combination...orange,red and taupe. There are actually two 
shades of red...a Turkey red is used in the bricks and a red red 
is used for the border. The color combination is wonderful. The blocks 
seem to stand upon one another. The simplicity of the colors, due to the 
fact that they are all solids and not calicoes, lets this graphic piece 
of art easily complement other designs that are in your home.
</span><br data-dcnode-id="2041"><span data-dcnode-id="2040" instrument_node="">
This quilt is all hand pieced and hand quilted. Each diamond has 
straight line quilting in the longest direction of the diamond. This 
quilting design adds to the optical illusion effect by accenting the 
direction of each diamond. The innermost border, in Taupe, has a unique 
wave design, while the outermost red border is quilted with an arc 
design. The binding is a dark Taupe woven tape. The backing is a 
wholecloth in red. This fabric was obviously purchased for this quilt 
and points to the fact that the family was of comfortable means.
</span><br data-dcnode-id="2039"><span data-dcnode-id="2038" instrument_node="">
An amazingly graphic quilt which appears to be unused...now organically 
washed by Betsey and ready to be sent for your in home viewing and approval.

The quilt came from an 1820 house, but the quilt pre-dates the house.
This quilt talks to me. Have you ever seen a quilt that is comprised of numerous other quilts sewn together in order to make a very graphic quilt to keep you warm? The fabric used in this quilt is early New England homespun. I feel that most of this fabric is from the 18th century. Before the Revolutionary War England would not allow us to raise Moreno sheep, which produce soft wool. We could only have sheep for mutton, which produce coarse wool. The majority of the homespun on this quilt is made from such sheep that produced coarse wool. Back in the 18th century and early 19th century in New England we were concerned with staying warm. Such fabrics would achieve this purpose.
</span></p><span data-dcnode-id="1952" instrument_node="">
</span><p data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">
One of the strips has blue woolen fabric that appears to be of a finer quality. I am not sure if this was purchased from England or if it was spun by the family. We also took a picture of the back to show you where strips of another quilt were added to make this larger. Creating such fabric often took as much as 2 years from start to finish. This fabric would have been loomed at home, usually on the third floor of old New England colonials. After the fabric was woven the last process before creating a textile was to dye the fabric different colors. All the colors were from vegetable dyes. There were approximately seven different vegetable dye colors available to New Englanders.
</span></p><span data-dcnode-id="1949" instrument_node="">
</span><p data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">
This quilt was made in Fall River, MA by a Quaker family. The name is available on the sale of the quilt. The house it came from was built in 1820. I wonder if their previous home burned, which was not unusual in those days, and they salvaged what they could from the quilts that survived, putting them together to create a fabulous early textile. History absolutely jumps out of this quilt. The red and black star, the only pieced part of the quilt, would have been the newest addition. This also goes along with the fact that it is in the row with blue fabric that is from a newer wool fabric. The diamonds on point in this row are also from early homespun linsey.
This is a quilt I could study and study and never get tired of looking at it. The fabric used in this quilt is wool and/or a combination of wool and linen, sewn and quilted with linen thread. You will find moth holes on the early piece, and my advice to anyone thinking of buying an early wool quilt is that if it has no moth holes, then it is probably not an early piece.
</span></p><span data-dcnode-id="1946" instrument_node="">
</span><p data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">
Looking at the back, one piece 37" wide, two strips to the left, one 22" the other 14" On the left side of the 22" piece they actually left the outside binding on. The right hand side, a 15" piece has been attached. The batting is wool, which you can see through some wear in the quilt. The plaid piece on the bottom was added after this quilt had been put together and re-quilted. This is truly an amazing piece of history. The family name is available on sale.applied binding is 1/4 inch. &lt;\p&gt;
</span></p><span data-dcnode-id="1943" instrument_node="">
</span><p data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">
We are not surprised that this is hand sewn since it was created 20 years before the sewing machine. The backing, binding and border surrounding the edge are Prussian blue. In the late 20th century, one would call it cobalt blue. Quilting was a woman’s mark of excellence and this piece surpasses 
all expectations. The quilt has applied sleeves sewn on by Rocky Mountain Quilts and is ready to hang. Call Betsey for more details.

This wonderful indigo and white double nine patch steeplechase is 
comprised of the most sought after color combination in America, blue 
and white. The 15 inch blocks on point are comprised of nine five inch 
squares; five of these squares are comprised of 1-3/4 inch squares. 
When you join nine of the larger blocks turned on point, you have a 
double nine patch steeplechase. The smaller 5 inch blocks are completely 
hand pieced. Nine of these blocks are then assembled together by 
machine. The quilting which is both diagonal and vertical in design is 
all executed by hand. The quarter inch binding is turned over from the 
back to the front and then stitched down. The size of this quilt makes it 
perfect as a wall hanging, or a wonderful throw for a queen or king 
sized bed. There are borders on three sides of the quilt. Many quilters 
felt there was no need to put on a fourth border, as that fourth side 
would be under the pillows.

</span><p data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">An amazing find, this quilt's focus is the 1893 Chicago World's Fair, also known as The World's Columbian Exposition, which was designed to commemorate the landing of Columbus in America.  Executed using lengths of printed fabric made specifically for the Exposition for use as bunting, handkerchiefs, and other memorabilia.</span></p><span data-dcnode-id="1694" instrument_node="">
</span><p data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">The front of the quilt is wholecloth; three vertical lengths of printed fabric hand pieced together to create the quilt's top.  The 5 ¼ inch burgundy striped border is also hand pieced and folds to the back forming a 1/2 inch hand stitched binding.  The quilt has a puffy batting that is smooth and without any shifting, lumps or bumps.  The quilt is top tied using, of all things, thin hemp-like ties that add to the uniqueness and overall design of the quilt.  The backing is a great black and red cotton calico-see detail images. Stitched to the back of the quilt is a hand written note on cotton stating the maker's and recipient's names along with the date of the gift: December 25, 1893.</span></p><span data-dcnode-id="1691" instrument_node="">
</span><p data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">There is an interesting side note regarding the history of the 1893 Chicago World's Fair itself.</span></p><span data-dcnode-id="1688" instrument_node="">
</span><p data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">, by Erik Larsen, is a nonfiction novel published in 2003 that spans the years surrounding the building of the 1893 Chicago World's Fair. One plot line centers on Daniel Burnham, the architect who built the 1893 Chicago World's Fair. The other plot line focuses on character H.H. Holmes, the serial killer who exploited the fair to find his victims. Dr. Holmes built a hotel for exposition guests which he named</span></p><span data-dcnode-id="1685" instrument_node="">
</span><p data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">, and then preyed on his hotel guests, mostly young women.  He was convicted of 27 murders, but they expect he had up to 200 victims most of whom were disposed of in the kiln in the basement of the hotel.  Good grief.</span></p><span data-dcnode-id="1682" instrument_node="">
</span><p data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">As mentioned, an interesting side note to the 1893 Exposition and its history!  Our lovely quilt remains unmarred by any connection to the more gruesome aspects of a marvelous and historical exposition.  We can assume our talented quilt maker, whose name will go to the buyer upon sale, chose other accommodations during her visit to the 1893 Chicago World's Fair.</span></p><span data-dcnode-id="1679" instrument_node="">
</span><p data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">This unique quilt has been professionally hand washed by Betsey, is in excellent condition, and can be shipped to you on approval for private viewing.  Please ask Betsey for more details.
This quilt already has sleeves sewn on the back in case you would like to hang it as art on a wall.

Both elegant and fun, this gorgeous Folk Art floral applique quilt is in unused condition.
The various shades of blue of the vine have occurred naturally.
The whimsical floral with twining vine is an original pattern skillfully executed by an accomplished needlewoman.  The interpretive and naïve representation of the naturalistic motifs gives this quilt wonderful Folk Art appeal.  Floral 'bouquets' are enclosed by a freeform meandering vine of buds and leaves.</span></p><span data-dcnode-id="1597" instrument_node="">
</span><p data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">The needlework on this quilt is exquisite.  The maker used tiny, perfect stitches for both the applique work and hand quilting.  The applique tulips and roses in solid cheddar and Turkey red, respectively, have solid blue vegetable dyed stems and leaves.  The Turkey red buds between the flowers are reverse appliqued.</span></p><span data-dcnode-id="1594" instrument_node="">
</span><p data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">Hand quilting is magnificent and consists of additional leaves on branches quilted throughout the fine white linen ground between the appliqued bouquets.  The meandering vine has quilted leaves completely filling the space between the appliqued leaves and buds.</span></p><span data-dcnode-id="1591" instrument_node="">
</span><p data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">The backing is fine white linen as is the 1/4 inch applied binding.  The quilt is entirely hand stitched and of original design by its maker.  The fine execution and great palette contribute greatly to an already elegant Folk Art piece.  This quilt can be shipped to you on approval for private viewing.</span></p><span data-dcnode-id="1588" instrument_node="">

This quilt contains a plethora of beautiful early fabrics in an elegant palette. The flash of mustard was a brilliant artistic choice by the maker and makes for a sophisticated work of art. Professionally hand washed by Betsey, ask her for more details and to have this quilt shipped to you on approval for private viewing.

</span><p data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">A quilt for lovers of early fabrics, this lovely piece contains many block prints and copper plates from circa 1800, along with a wide variety of early prints, plaids, stripes and calicoes.  The 10 inch outer border was created from a beautiful block print in rose and brown tones on an ecru background, and the inner border is comprised of pieced Variable Stars showcasing more of this quilt´s wonderful wealth of fabrics.  Hexagons measuring 1 inch per side make up the body of the quilt, and have been arranged in a center medallion format.  Entirely hand pieced and hand quilted with chevrons in the outer border, diagonal lines in the inner border, and outlining in the hexagons.  Much of the outlining has been lost in time, but does not interfere with the graphics or function of this quilt.  Four ties have been applied to secure the quilt in place around the bedposts, and the quilt was finished with a ¼ inch separately applied binding on the top and bottom and pillowcase edging on the sides.  The backing is a homespun ecru linen.</span></p><span data-dcnode-id="1434" instrument_node="">
</span><p data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">Four post quilts are indigenous to New England, and this particular quilt was made to fit a high four post double bed measuring 51 inches wide.  If you are fortunate to have an antique bed from this era, then the addition of this quilt would definitely make your bed the focal point of your room!   In used condition, and professionally hand washed by Betsey.</span></p><span data-dcnode-id="1431" instrument_node="">

</span><p data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">Truly a collector´s quilt, this fabulous piece tells of its early New England history through its orange peel pattern and poster bed cut-outs.  This quilt was originally made for a low poster bed.  The fabrics are wonderful; with very early double pinks on the front and a homespun linen backing.  Created before the sewing machine was commercially available to the public, this quilt is entirely hand pieced and diagonally quilted.  The quilting lines alternate direction from row to row, creating a zig-zag pattern over the entire piece.  Professionally hand washed by Betsey.</span></p><span data-dcnode-id="1394" instrument_node="">

</span><p data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">In excellent condition and in its original hired man's bed size, this soft wool challis quilt is both snuggly warm and graphically wonderful - perfect for use as a sophisticated crib quilt or as wall art. Arranged as a 4 x 7 array of fans this wool challis quilt has a 4 inch solid blackish green border and 28 fans made up of alternating red and green blades and finished with grayish brown fan handles. A small and very even outline track stitch is used as the embroidery embellishment throughout. The backing is a solid red challis with a 3/8 inch applied black green binding the same fabric as the border.</span></p><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">A beautiful, warm and sophisticated piece for your child's room...or for any room in your home.  Use as either a small bed cover, throw or it would be stunning as graphic art on your wall.  Ask us about sleeves for hanging, and to see this quilt on approval in the privacy of your home.</span></p><span data-dcnode-id="1355" instrument_node="">

</span><p data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">What a spectacular Turkey red and white cotton applique bassinet quilt.  This early quilt has a very graphic and gothic star papercut applique measuring 20 1/2 inches in diameter as its central focus.  Within the large star is a smaller 5 inch in diameter white star hand appliqued in tiny stitches.  The red center of this star is reverse appliqued.  Lovely 3/4 inch wide borders surround the inner design in solid Turkey red and white strips.  Miniature 5/8 inch split squares  form the corner blocks joining the triple border. The fourth and outermost border is white and is a generous 7 inches wide. A beautifully scaled design.</span></p><span data-dcnode-id="1319" instrument_node="">
</span><p data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">Hand quilting in this diminutive beauty includes herringbone stitching for the outsideborder; outline stitching in the triple inner border; and 5/8 inch diagonal cross hatch in the center white ground.  Echo outline hand quilting accentuates the central gothic star shape.  The backing is white cotton, and the front folds to the back to form the 1/4 inch wide hand stitched binding.</span></p><span data-dcnode-id="1316" instrument_node="">
</span><p data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">A wonderful work of textile art made for a special child's bassinet.  It was carefully used and is in lovingly cared for perfect condition.  This softly muted Turkey red and white beauty would be a spectacular piece of art on your wall, or a very special crib quilt for that special baby. Professionally hand washed by Betsey it is ready to send to you on approval for private viewing in your home.</span></p><span data-dcnode-id="1313" instrument_node="">

</span><p data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">All latticework strips in solid Turkey red fabric measure 1 ½ inches wide. The backing is turned to the front and hand stitched down to form the ¼ inch white binding. In excellent condition this crisp and beautiful quilt also has lovely quilting with outline stitching in the Turkey red, 1 ½ inch cross hatching in the white squares and diagonal parallel lines in the oblongs.</span></p><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">Red and white is always a favorite and can fit into any decor from modern to traditional.  It would be perfect for use on a bed or as art for your wall.  Professionally hand washed by Betsey this quilt can be sent to you on approval for private viewing.</span></p><span data-dcnode-id="1269" instrument_node="">

</span><p data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">Pyramids measure approximately 6" per side with 7/8" wide bars in alternating solid colors of brown, ecru and red homespun linsey-woolseys and wool challis.  Solid pyramids are homespun brown linsey-woolsey woven using two colors - brown and gold. Gorgeous.</span></p><span data-dcnode-id="1227" instrument_node="">
</span><p data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">Hand quilting in outline and diagonal lines is executed in brown and black threads.  The backing is a c.1885 large scale floral challis in soft mauve, palest blue and ecru on solid brown.  See detail image.  The hand applied solid red binding is the same wool used in the pieced top.  One of Betsey's personal favorites this wonderful quilt can be sent to you on approval for private viewing in your home. Ask her for more details.</span></p><span data-dcnode-id="1224" instrument_node="">

</span><p data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">This wonderful pre Civil War bassinet quilt is in mint condition.  The Sunshine &amp; Shadow Log Cabin pattern is beautifully rendered in madder dye, over dyed green, chrome yellow and double pink calico cottons.  Logs are one inch wide with cabin blocks measuring approximately 11 inches square.  The 3 1/2" outer border in an over dyed green calico has corner blocks in a great madder dyed plaid. The fabrics on the front are from 1850 to 1860.</span></p><span data-dcnode-id="1187" instrument_node="">
</span><p data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">Hand quilting on this little gem includes outline stitching in all logs with Herringbone in the green borders and a large cross hatch stitched in each corner block.  The backing is a c.1840 beige and white chain pattern with a miniature floral overlay in brown, taupe, black and red - lovely.  Please see detail image.</span></p><span data-dcnode-id="1184" instrument_node="">
</span><p data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">What a beautiful work of art in mint condition and the perfect size for hanging on your wall or a spectacular and special quilt for your baby's crib.  Professionally hand washed by Betsey and ready to ship to you on approval for private viewing in your home.</span></p><span data-dcnode-id="1181" instrument_node="">

This gorgeous baskets quilt has an unusual color palette of teal green with red and white.  
All solid colored cotton fabrics were used in this completely hand pieced and hand quilted textile.  
Variations in the teals due to the early dyes make it interesting as well as beautiful.  
See detail image.  Pieced basket blocks, with hand appliqued handles on the baskets, measure 10" x 9-3/4".  
Lovely wide borders frame the baskets; 2-1/8" for the inner red border, 3-1/4" for the white, and 3" for the outer red border.
</span></p><span data-dcnode-id="1144" instrument_node="">

12 blocks have the inside and outside of the handles stippled.  5 are cross hatched.  Different quilters
or less energy?  I also think 2 different quilters.

Hand quilting consists of tiny, even stitches in a 3/4" x 1" diagonal cross hatch pattern throughout 
with outline quilting in the baskets.  The backing is the same white cotton used on the front with a 3/8" 
applied binding in solid teal green.
</span></p><span data-dcnode-id="1138" instrument_node="">
</span><p data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">
Professionally hand washed by Betsey, this is a beautiful and very graphic baskets quilt that would be 
perfect on a bed or as art on your wall.  Ask us to see this lovely antique on approval in the privacy of your home.

</span><p data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">A very striking bassinet/crib quilt in an original design. This wonderful piece of art with high graphic appeal draws your eye despite its diminutive size.  It is in excellent condition and is comprised of twelve 5 ¾ inch pieced blocks each with a 1 ¼ inch double pink center square surrounded by radiating solid white bars and four indigo blue and white patterned triangles. The bright, 5 ¾ inch orange joining blocks pop out at the viewer and the 3 ½ inch flying geese border adds constant movement to this mini masterpiece. Hand quilting was used throughout with 1 inch cross hatch in the joining blocks, outlining and cross hatch in the pieced blocks and parallel lines in the border.</span></p><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">The varied white on indigo blue fabric patterns add yet another dimension to this quilt. The quilt maker used one patterned fabric within each pieced block but chose to alternate the patterns used in the blocks in the flying geese border which include: moons, stars, daisy-like flowers, fans with swirls, flowers with rings and clover. The separately applied ½ inch binding is in a tiny chambray blue dot on white. Professionally hand washed by Betsey and ready to send to you on approval for private viewing in your home.</span></p><span data-dcnode-id="1095" instrument_node="">

</span><p data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">A wonderful little quilt using two terrific cheater cloth fabrics from c.1880.  The center red, ecru and ivory fabric has images of sailors and their sweethearts on the decks of ships within each four pointed star.  Although it looks pieced, it is wholecloth fabric giving the illusion of pieced work, thus the name 'cheater' cloth.</span></p><span data-dcnode-id="1058" instrument_node="">
</span><p data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">Borders measuring 8 inches wide on each side are in another cheater cloth design - whimsical cats framed by 'pieced' borders.  A unique and rare piece in original condition this little quilt is backed in off white linen and has some 'original' weaves in the backing fabric done long ago.  The 3/8 inch binding is in a pale gray, red and white calico and is topstitched by treadle machine.  There are a few areas where the backing has come away from the stitching which we haven't touched</span></p><span data-dcnode-id="1055" instrument_node="">
</span><p data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">Original cotton ties are knotted on the front side.  Used but lovingly cared for and in wonderful original condition.  Professionally hand washed by Betsey, it can be sent on approval for private viewing in your home.</span></p><span data-dcnode-id="1052" instrument_node="">

</span><p data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">The Log Cabin Straight Furrows pattern originated in England and was created to emulate rows of crops in the field.  In America we have used and developed this pattern to the extent that most think it originated here.  In this piece the feeling of structure and order common to most log cabins is found along with a delightful freshness and vitality with the use of red and blue chimneys.</span></p><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Cabin blocks measure 8 x 8 inches with the logs ranging from 3/8 to 5/8 inches wide in a variety of wool challis and cotton fabrics in geometrics, florals, solids, calicoes, and some wonderful conversation and mourning prints. Center chimneys measure approximately 2 1/2 inches square in both solid blue and solid red challis and cottons.</span></p><span data-dcnode-id="1012" instrument_node="">
</span><p data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">This diminutive quilt is backed with a lovely burgundy and white floral sprigs print (see detail image) and has a 3/8 inch applied black wool challis binding.  Reverse tied using black cotton floss.  The perfect size for a wall hanging, we show it with the furrows leading up and to the left – very good energy!  Please ask us about viewing this antique quilt in the privacy of your home on approval.</span></p><span data-dcnode-id="1009" instrument_node="">

</span><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">A fabulous 9 Patch antique quilt in pristine, unused condition with wonderful early fabrics.  This fine example of one of the earliest pieced patterns contains fabrics dating from 1780 through 1840 in the pieced top.  Vegetable dyed fabrics make up the many different calicoes and small patterned fabrics which include madders, indigo, early violets in a variety of patterns and a number of red, pink and white calicoes placed strategically in the nine patch configurations.  This strategic placement gives a visual pop for the viewer and an overall energy to the design.</span></p><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Nine patch blocks measure approximately 6 1/2 x 6 1/2 inches and are set on point with joining blocks in a gorgeous deep brown miniature vining print on russet.  The extraordinary 7 3/4 inch border fabric dates to c.1780-1815 and is a very small scale brown, white and red floral vine pattern.  The backing is a c.1870 floral striped cotton in brown and white. Hand quilting, executed c.1870, includes four cable stitching in the border; herringbone in the triangle joining blocks and 9 patch blocks; and floral wreaths in the square joining blocks.  An early over dyed green calico is used for the 1/4 inch applied binding which has been treadle machine top stitched.</span></p><span data-dcnode-id="969" instrument_node="">
</span><p data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">This is a wonderful example of one of the earliest pieced patterns containing gorgeous early fabrics in pristine condition.  Professionally hand washed by Betsey and ready to send to you on approval for private viewing in your home.</span></p><span data-dcnode-id="966" instrument_node="">

</span><p data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Surrounding the inner design is a 1 1/2 inch wide brick border comprised of various silks used in the interior design forming a lovely frame.   The inner seam is embellished with embroidered silk stars.  A 1/4 inch hand applied wine silk binding finishes the edge.  The backing on this quilt is a medium blue cotton twill.</span></p><span data-dcnode-id="926" instrument_node="">

</span><p data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">This spectacular unused quilt in mint condition is from the late 19th century, but is executed in the early 19th century center medallion format. The center medallion measures 21 inches square and is appliquéd, reverse appliquéd, and pieced in an oak leaf pattern. The oak leaf is created from a pristine over dyed green calico and appliquéd using tiny, precise stitches onto a solid orange ground. Deep red cotton with mini white dots is used for half of the appliquéd wave border, with a gorgeous sea coral and star patterned fabric in greens, black and white for the other half.</span></p><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">There are eight rows of various pieced patterns extending out from the center medallion, and these rows are both hand and machine pieced. The fabrics on this piece are unusual! There are three “cheater cloth” fabrics: the fourth and seventh rows from the center are of cheater cloth, and the backing is another cheater cloth in an abstract pattern. Please see detail images. All three are companion fabrics in the same colorway. Additionally, the fabrics on the quilt date from the c.1860´s-90´s. Two rows of 2 inch triangles surround the center medallion in a medley of plaids and prints in colors ranging from deep greens and browns to wines, ecru and black. Two additional 3 1/2 inch wide rows of triangles in chrome yellow and large black on white dots surround the inner cheater cloth border. The outer cheater cloth border is surrounded by 3 1/2 inch wide blocks in multiple prints and hues in strip formation.</span></p><span data-dcnode-id="883" instrument_node="">
</span><p data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">This unique quilt is hand quilted using dark thread in cross-hatch stitching across the entire quilt. It has a separately applied binding in a gorgeous print of brown, teal, gold and ecru. This quilt is in mint condition, and is an incredible graphic piece of art for wall or bed. Please contact us if you´d like to see this quilt in your home on approval. We´re happy to ship it to you.</span></p><span data-dcnode-id="880" instrument_node="">

</span><p data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">A gorgeous pre-Civil War era quilt in madder dyed red, over dyed green, and chrome yellow calicoes. This antique textile is also completely hand pieced and quilted which adds another dimension of excellence to a beautifully executed quilt.  Graphic over dyed green maple leaves on yellow dominate the central design and alternate with double madder dyed red calico joining blocks. Each block measures approximately 5 1/2 inches square.  The inner 1 1/2 inch sawtooth border is in the same over dyed green and yellow calicoes with the outer 5 1/2 inch border in a madder dyed red calico.  Four blocks executed in the Maid´s Puzzle pattern with 3/4 inch borders of their own accent the corners of the outer border.  Wonderful!</span></p><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">Beautiful quilting in brown, white and green threads showcase double parallel line quilting, double line cross hatch and intersecting double line circles.  A circa 1840 madder dyed geometric and brown floral stripe fabric provides a gorgeous backing for this amazing piece.  This quilt is also beautifully framed by a 3/8” hand applied chrome yellow and red calico binding.</span></p><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">A stunning early quilt by an expert quilt maker, this would be an excellent addition to an early American quilt collection and a joy to display in any room.  In excellent condition it has been professionally hand washed by Betsey and is ready to be sent to your home for review on approval.  Please ask Betsey for more details.</span></p><span data-dcnode-id="836" instrument_node="">

</span><p data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Entirely hand quilted with four strand cables in the borders, parallel lines in the 9 patch blocks and chevrons in the joining squares.  The backing is a terrific medium scale olive-brown and white homewoven plaid.  The 3/8 inch applied binding uses multiple fabrics from the top of the quilt – charming.</span></p><span data-dcnode-id="798" instrument_node="">

</span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Beautiful quilting by an experienced hand showcases an undulating feather vine in the 8" outer white border, double parallel lines in the sawtooth border,  feathered wreaths in the white areas between the two-color feathers, and double line quilting in all appliques.   Backed in the same white as used on the front, this quilt is also beautifully framed by a 3/8” applied solid brown binding.</span></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">A stunning early quilt by an expert quilt maker, this would be an excellent addition to an early American quilt collection and a joy to display in any room.  In excellent condition it has been professionally hand washed by Betsey and is ready to be sent to you on approval.</span></p><span data-dcnode-id="750" instrument_node="">

</span><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">What a wonderful variation on the traditional Fan quilt design!  Special care was taken by the maker evidenced by the added touches to her fanciful and rather lively quilt.  Lovely and varied wools and wool challis in a multi-hued palette make up the fans which are each hand embellished with a combination of gold and ecru silk floss in the featherstitch pattern.   Fans are arranged in an almost ‘snail trail´ pattern which adds movement for the eye and injects a sense of fun to an already beautiful quilt.  Each fan block measures 6 ¾ inches with the spokes a mere 3 inches long.  A fancy pattern of long and short blanket stitches in gold and ecru silk floss is an added decoration for the pillowcase edging.</span></p><span data-dcnode-id="711" instrument_node="">
</span><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">The backing on this piece is a soft and lovely confederate blue with amusing and very puffy pom-pom reverse ties in white wool yarn.  A few original moth holes here and there on the backing attest to it being all wool.</span></p><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">This is a fantastic fan quilt just filled with positive energy.  It´s a great size to use as art on that special wall or use it as a throw on the couch for those cool evenings.  One of Betsey´s favorite finds.  Remember, it can be sent to you on approval.</span></p><span data-dcnode-id="705" instrument_node="">

</span><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">This lovely quilt is designed in a 6 x 6 array of window panes which gives a nice sense of order within the crazy cutting of the silks.  Framing the interior design is a lush, burgundy silk velvet border 3 ½” wide.  The backing is a stunning quilted burgundy silk which is pillowcase edged by hand to the front design for an elegant finish.  A beautiful, silk velvet creation that would be gorgeous as artwork on a wall or as an accent piece in any room.  Remember, our quilts are always sent on approval.</span></p><span data-dcnode-id="665" instrument_node="">

This quilt already has sleeves sewn on the back in case you would like to hang it as art on a wall.

What a stunningly graphic quilt!  This hand pieced, hand quilted creation contains fabrics dating from 1815 to 1865.  
It gives the impression of a double border, with the use of the wide, overdyed green calico binding followed by a 
section heavily quilted in a wave pattern and finished with a matching overdyed green calico inner Streak of Lightning.  
The Double Irish Chain interior is quilted in outlines and crosshatching.  
The border measures 12", allowing this quilt to fit a queen size 
bed with borders on each side and the foot. The double line quilting was 
a signature of the 1840's and carried on afterwards by some quilters. 
There are dozens of different early calicoes along with this wonderful 
early overdyed green calico.
</span><br data-dcnode-id="378"><span data-dcnode-id="377" instrument_node="">

</span><p data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">This quilt is comprised of just two fabrics: a natural ground calico with madder-dyed leaves and a madder ground calico with black and white circles.  The backing is a stripe in madder, beige and natural; the backing is turned to the front to form the binding.  All work on this quilt is by hand.  The quilting is diagonal quilting in the opposite direction of the connecting blocks.  This quilt has terrific graphics! This quilt has been professionally hand washed by Betsey.</span></p><span data-dcnode-id="301" instrument_node="">
