</span><h2 class="book__title" data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">
											The Science of Cheese										</span></h2><span data-dcnode-id="1234" instrument_node="">
</span></div><span data-dcnode-id="1232" instrument_node="">
</span><div class="book__links cf" data-dcnode-id="1227"><span data-dcnode-id="1231" instrument_node="">
</span><a class="btn" data-dcnode-id="1229" data-title="The Science of Cheese" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//global.oup.com/academic/product/the-science-of-cheese-9780199922307" id="buyNowLink" target="_blank"><span data-dcnode-id="1230" instrument_node="">Buy Now</span></a><span data-dcnode-id="1228" instrument_node="">
</span></div><span data-dcnode-id="1226" instrument_node="">
</span></div><span data-dcnode-id="1224" instrument_node="">
</span></div><span data-dcnode-id="1222" instrument_node="">
</span><div class="article__body" data-dcnode-id="1166"><span data-dcnode-id="1221" instrument_node="">
</span><ul class="article__meta list--inline" data-dcnode-id="1204"><span data-dcnode-id="1220" instrument_node="">
</span><li class="left" data-dcnode-id="1215"><span data-dcnode-id="1219" instrument_node="">
										By </span><a data-dcnode-id="1217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.oup.com/authors/michael-h-tunick/"><span data-dcnode-id="1218" instrument_node="">Michael H. Tunick</span></a><span data-dcnode-id="1216" instrument_node=""> </span></li><span data-dcnode-id="1214" instrument_node="">
</span><li class="right" data-dcnode-id="1206"><span data-dcnode-id="1213" instrument_node="">
</span><time data-dcnode-id="1208" datetime="2015-03-25"><span data-dcnode-id="1212" instrument_node="">March 25</span><sup data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">th</span></sup><span data-dcnode-id="1209" instrument_node=""> 2015</span></time><span data-dcnode-id="1207" instrument_node=""> </span></li><span data-dcnode-id="1205" instrument_node="">
</span></ul><span data-dcnode-id="1203" instrument_node="">
</span><div class="article__the-content article__the-content--single" data-dcnode-id="1168"><span data-dcnode-id="1202" instrument_node="">
</span><p data-dcnode-id="1197"><span data-dcnode-id="1201" instrument_node="">American consumers have increased their purchases of artisanal foods in recent years. Grant McCracken, </span><a data-dcnode-id="1199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cultureby.com/" target="_blank"><span data-dcnode-id="1200" instrument_node="">an anthropologist who reports on American culture and business</span></a><span data-dcnode-id="1198" instrument_node="">, identifies ten concepts that the artisanal movement is composed of and driven by. These include preferences for things that are handmade, on the human scale, relatively raw and untransformed, unbranded, personalized (you can meet the person who produced the food), “authentic”, and marked by locality. The other concepts are preferences for transparency (you know where the food has been), connoisseurship, and simplification. Suzanne Cope, who teaches food studies at Manhattan College, feels that artisanal food production is expanding because more people are getting into the food business for themselves and that they are satisfying a need by some consumers for nonconformity.</span></p><span data-dcnode-id="1196" instrument_node="">
</span><p data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">What is the difference between artisanal and mass-produced food? In most cases, the artisan will take extra steps to insure a better-tasting product. This is especially true with fermented products such as cheese. Industrial cheesemakers pasteurize milk from cows confined in barns, have computer-controlled operations, use large mechanical presses to quickly expel whey from the cheese curd, vacuum-package the product, and ship it out as quickly as practical to avoid tying up their storage facilities. In contrast, artisanal cheesemakers make their cheese by hand in small batches from cow, goat, or sheep milk. They obtain a wider range of volatile flavor compounds by using milk from animals that feed on pasture plants. (If the milk comes from the cheesemaker’s herd, it can also be called farmstead cheese). Some make cheese from raw milk, thus preserving indigenous microflora that would be inactivated by pasteurization. These bacteria cause additional flavors to be generated through enzymatic breakdown of protein, fat, and lactose. Pressing of the curd is frequently done overnight under relatively low pressure, which results in a texture not quite the same as that of mass-produced cheese. Many artisanal producers do not vacuum-package cheese, instead using permeable wrapping that admits oxygen and lets bacteria survive longer. Most artisanal cheese is aged on wooden boards, which impart additional flavors. Raw milk cheese must legally be aged at least 60 days to insure that any pathogens die off, allowing further texture and flavor development to take place. Artisanal cheese may be stored in a “cheese cave” that is either natural or dug from a hillside, which eliminates the costly need for temperature control and permits longer aging times.</span></p><span data-dcnode-id="1193" instrument_node="">
</span><div class="pull" data-dcnode-id="1183"><span data-dcnode-id="1192" instrument_node="">
</span><figure aria-describedby="caption-attachment-91845" class="wp-caption aligncenter" data-dcnode-id="1185" id="attachment_91845" style="width: 744px"><img alt="Lancashire Cheese. Image Credit: Jon Sullivan, Public Domain." class="size-large wp-image-91845" data-attachment-id="91845" data-comments-opened="1" data-dcnode-id="1191" data-image-caption="<p>Lancashire Cheese. Image Credit: Jon Sullivan, Public Domain.</p>
" data-image-description="<p>www.public-domain-image.com (public domain image)</p>
" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;http:\/\/www.pdphoto.org&quot;,&quot;camera&quot;:&quot;www.public-domain-image.com&quot;,&quot;caption&quot;:&quot;www.public-domain-image.com (public domain image)&quot;,&quot;created_timestamp&quot;:&quot;1231648805&quot;,&quot;copyright&quot;:&quot;Public domain image, not copyrighted, no rights reserved, royalty free stock photo, free for any use including commercial.&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;Public domain image, royalty free stock photo from www.public-domain-image.com&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Public domain image, royalty free stock photo from www.public-domain-image.com" data-large-file="https://42796r1ctbz645bo223zkcdl-wpengine.netdna-ssl.com/wp-content/uploads/2015/03/lancashire-cheese-744x558.jpg" data-medium-file="https://42796r1ctbz645bo223zkcdl-wpengine.netdna-ssl.com/wp-content/uploads/2015/03/lancashire-cheese-180x135.jpg" data-orig-file="https://42796r1ctbz645bo223zkcdl-wpengine.netdna-ssl.com/wp-content/uploads/2015/03/lancashire-cheese.jpg" data-orig-size="1024,768" data-permalink="https://blog.oup.com/2015/03/artisanal-cheese-chemistry/public-domain-image-royalty-free-stock-photo-from-www-public-domain-image-com/" height="558" loading="lazy" sizes="(max-width: 744px) 100vw, 744px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//42796r1ctbz645bo223zkcdl-wpengine.netdna-ssl.com/wp-content/uploads/2015/03/lancashire-cheese-744x558.jpg&amp;raw" srcset="https://42796r1ctbz645bo223zkcdl-wpengine.netdna-ssl.com/wp-content/uploads/2015/03/lancashire-cheese-744x558.jpg 744w, https://42796r1ctbz645bo223zkcdl-wpengine.netdna-ssl.com/wp-content/uploads/2015/03/lancashire-cheese-120x90.jpg 120w, https://42796r1ctbz645bo223zkcdl-wpengine.netdna-ssl.com/wp-content/uploads/2015/03/lancashire-cheese-180x135.jpg 180w, https://42796r1ctbz645bo223zkcdl-wpengine.netdna-ssl.com/wp-content/uploads/2015/03/lancashire-cheese-128x96.jpg 128w, https://42796r1ctbz645bo223zkcdl-wpengine.netdna-ssl.com/wp-content/uploads/2015/03/lancashire-cheese-184x138.jpg 184w, https://42796r1ctbz645bo223zkcdl-wpengine.netdna-ssl.com/wp-content/uploads/2015/03/lancashire-cheese-31x23.jpg 31w, https://42796r1ctbz645bo223zkcdl-wpengine.netdna-ssl.com/wp-content/uploads/2015/03/lancashire-cheese.jpg 1024w" width="744"><figcaption class="wp-caption-text" data-dcnode-id="1186" id="caption-attachment-91845"><span data-dcnode-id="1190" instrument_node="">Lancashire Cheese bu Jon Sullivan. Public Domain via </span><a data-dcnode-id="1188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.public-domain-image.com/food-and-drink/cheese/slides/lancashire-cheese.html" target="_blank"><span data-dcnode-id="1189" instrument_node="">Public Domain Image</span></a><span data-dcnode-id="1187" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="1184" instrument_node="">
</span></div><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">Another distinction between mass-produced and artisanal cheese is in the variability of the product. The components in milk are concentrated by a factor of ten in cheese, so an apparently minor difference in the milk may create a major difference later on. Artisanal producers take advantage of the fact that milk varies with feed, stage of lactation, and season. The food that the animals eat affects the resulting cheese, so grazing on different pastures will lead to changes in flavor. The fat and protein contents of bovine milk are at their lowest levels during the warmest months, decrease during the first 25-50 days of lactation, and increase thereafter. Artisanal cheesemakers will often switch varieties or alter their procedures depending on the time of year. Large-scale companies in the United States try to have a uniform product at all times, so their milk suppliers have their cows on the same diet with staggered lactation periods. In Europe and other places, even mass-produced cheeses are made to “suit the season” and lactation periods are not placed on a schedule.</span></p><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">None of this is to imply that artisanal cheese is better for you than cheese produced on a large scale. The nutritional profiles are similar, though more research is needed on health effects of components such as omega-3 fatty acids, which are more plentiful in milk from grazing animals. Many shoppers are happy to pay less for cheese made on an industrial scale, and with knowing that they will get the same flavor and texture every time. But with a growing number of consumers who are more selective about their food choices, artisanal cheese can’t be surpassed.</span></p><span data-dcnode-id="1176" instrument_node="">
</span><p data-dcnode-id="1170"><em data-dcnode-id="1171"><span data-dcnode-id="1175" instrument_node="">Feature Image: Aging cheese by PublicDomainPictures. CC0 via </span><a data-dcnode-id="1173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pixabay.com/en/cheese-circle-circular-dairy-dutch-2785/" target="_blank"><span data-dcnode-id="1174" instrument_node="">Pixabay</span></a><span data-dcnode-id="1172" instrument_node="">.</span></em></p><span data-dcnode-id="1169" instrument_node="">

</span><p data-dcnode-id="1154"><strong data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Michael Tunick</span></strong><span data-dcnode-id="1159" instrument_node=""> is a research chemist with the Dairy and Functional Foods Research Unit of the US Department of Agriculture's Agricultural Research Service. He is the author of </span><a data-dcnode-id="1156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//global.oup.com/academic/product/the-science-of-cheese-9780199922307" target="_blank"><em data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">The Science of Cheese</span></em></a><span data-dcnode-id="1155" instrument_node="">.</span></p><span data-dcnode-id="1153" instrument_node="">
