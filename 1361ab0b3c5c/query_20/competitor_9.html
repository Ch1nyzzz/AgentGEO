                                  </span></td><td class="textbold" data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Example product</span></td></tr><tr align="left" class="text" data-dcnode-id="382" valign="top"><td bgcolor="#F4F5F5" data-dcnode-id="387"><span class="textbold" data-dcnode-id="395"><br data-dcnode-id="397"><span data-dcnode-id="396" instrument_node="">
                                    One off production</span></span><span data-dcnode-id="394" instrument_node=""> </span><p data-dcnode-id="388"><span data-dcnode-id="393" instrument_node="">This is when 
                                      only one product is made at a particular 
                                      time. This one off product could be a prototype 
                                      a one off object or a hand made object. 
                                      Prototypes are made to see if a product 
                                      works before it goes into large scale production. 
                                      One off production takes a long time and 
                                      often means it is expensive. A classic product 
                                      could be a mobile phone prototype, a one 
                                      off specialist product, handmade items, 
                                      etc.</span><br data-dcnode-id="392"><span data-dcnode-id="391" instrument_node="">
</span><br data-dcnode-id="390"><span data-dcnode-id="389" instrument_node="">
</span></p></td><td align="center" bgcolor="#F4F5F5" data-dcnode-id="384" valign="middle"><img data-dcnode-id="385" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mr-dt.com/images/mobile.gif&amp;raw" width="100"></td></tr><tr align="left" class="text" data-dcnode-id="363" valign="top"><td bgcolor="#F4F5F5" data-dcnode-id="368"><br data-dcnode-id="379"><span data-dcnode-id="378" instrument_node=""> </span><span class="textbold" data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">Batch 
                                    production </span></span><span data-dcnode-id="375" instrument_node=""> </span><p data-dcnode-id="369"><span data-dcnode-id="374" instrument_node="">This is when a series 
                                      of products which are all identical are 
                                      made jointly in either large or small numbers. 
                                      Once these have products have been made 
                                      once more of the same products may be made 
                                      using the same equipment. This equipment 
                                      includes tools, moulds, machinery and labour. 
                                      A classic product could be a chair, newspapers, 
                                      books, electrical products, etc.</span><br data-dcnode-id="373"><span data-dcnode-id="372" instrument_node="">
</span><br data-dcnode-id="371"><span data-dcnode-id="370" instrument_node="">
</span></p></td><td align="center" bgcolor="#F4F5F5" data-dcnode-id="365" valign="middle"><img data-dcnode-id="366" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mr-dt.com/images/chair.gif&amp;raw" width="100"></td></tr><tr align="left" class="text" data-dcnode-id="344" valign="top"><td bgcolor="#F4F5F5" data-dcnode-id="349"><br data-dcnode-id="360"><span data-dcnode-id="359" instrument_node=""> </span><span class="textbold" data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">Mass 
                                    production </span></span><span data-dcnode-id="356" instrument_node=""> </span><p data-dcnode-id="350"><span data-dcnode-id="355" instrument_node="">Mass production involves 
                                      the product going through many stages of 
                                      a production line. There are workers and 
                                      machines at certain stages along the line 
                                      that are responsible for making certain 
                                      parts of the product. This means the product 
                                      is often made over days or even weeks depending 
                                      how complicated it is. This product is often 
                                      quite reasonably priced due to the large 
                                      scale production techniques used. However 
                                      if a problem occurs it will stop the whole 
                                      line of production. A classic product could 
                                      be a car. The technique was first implemented 
                                      by US automobile pioneer Henry Ford in 1908, 
                                      for the manufacture of the Model T Ford 
                                      automobile.</span><br data-dcnode-id="354"><span data-dcnode-id="353" instrument_node="">
</span><br data-dcnode-id="352"><span data-dcnode-id="351" instrument_node="">
</span></p></td><td align="center" bgcolor="#F4F5F5" data-dcnode-id="346" valign="middle"><img data-dcnode-id="347" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mr-dt.com/images/modelt.gif&amp;raw" width="100"></td></tr><tr align="left" class="text" data-dcnode-id="324" valign="top"><td bgcolor="#F4F5F5" data-dcnode-id="329"><strong data-dcnode-id="339"><br data-dcnode-id="341"><span data-dcnode-id="340" instrument_node="">
                                    Continuous production</span></strong><span data-dcnode-id="338" instrument_node=""> </span><p data-dcnode-id="334"><span data-dcnode-id="337" instrument_node="">This is 
                                      where a product is continuously produced 
                                      over a period of hours, days, weeks or even 
                                      years. This kind of production means the 
                                      product will often be quite reasonably priced. 
                                      A classic product could be screws, bricks, 
                                      food products, etc</span><br data-dcnode-id="336"><span data-dcnode-id="335" instrument_node="">
</span></p><span data-dcnode-id="333" instrument_node="">
</span><p data-dcnode-id="330"><br data-dcnode-id="332"><span data-dcnode-id="331" instrument_node="">
</span></p></td><td align="center" bgcolor="#F4F5F5" data-dcnode-id="326" valign="middle"><img data-dcnode-id="327" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mr-dt.com/images/screws.gif&amp;raw" width="100"></td></tr><tr align="left" class="text" data-dcnode-id="302" valign="top"><td bgcolor="#F4F5F5" data-dcnode-id="307"><span data-dcnode-id="321" instrument_node=""> </span><br data-dcnode-id="320"><span data-dcnode-id="319" instrument_node=""> </span><p class="textbold" data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Just 
                                      in time production.</span></p><span data-dcnode-id="316" instrument_node="">
</span><p data-dcnode-id="312"><span data-dcnode-id="315" instrument_node="">Just in time production means just that. 
                                      This involves the arrival of parts at just 
                                      the exact time that they are required in 
                                      the factory. This means that less storage 
                                      space is needed at the factory, so saving 
                                      space at the factory. If the flow of parts 
                                      is stopped or is late the line will stop 
                                      and this production technique could then 
                                      become very costly.</span><br data-dcnode-id="314"><span data-dcnode-id="313" instrument_node="">
</span></p><span data-dcnode-id="311" instrument_node="">
