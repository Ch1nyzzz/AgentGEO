ment_node="">Satisfactory Essays</span></span></div><ul class="weight-700 padding-left-1 share-block" data-dcnode-id="371"><li data-dcnode-id="375"><span class="text-s" data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">1081 Words</span></span></li><li data-dcnode-id="372"><span class="text-s" data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">5 Pages</span></span></li></ul><div class="margin-top-auto" data-dcnode-id="368"><a class="button button--orange button--squarish text-m" data-dcnode-id="369" data-href="/document/FJZC6MWJNFU" href="javascript:void(0);" id="ShowMoreButtonExtra" rel="nofollow"><span data-dcnode-id="370" instrument_node="">Open Document</span></a></div></div></div></div><div class="columns small-12 medium-4 large-4 rhino-slot" data-dcnode-id="364" id="AdPreviewRowSidebar"></div></div><div class="row columns padding-bottom-1 menu-essay-writing" data-dcnode-id="354" id="rowNavLinkComponent"><div class="columns large-8" data-dcnode-id="355"><div data-dcnode-id="356" style="float:right"><a class="brand-secondary preview-active-menu" data-dcnode-id="359" href="javascript:void(0);" id="btnShowEssayPreview" rel="nofollow"><span data-dcnode-id="360" instrument_node="">Essay Sample</span></a><a class="brand-secondary" data-dcnode-id="357" href="javascript:void(0);" id="btnShowWritingTool" rel="nofollow"><span data-dcnode-id="358" instrument_node="">Check Writing Quality</span></a></div></div></div><div aria-label="loading.." class="display-none loader-writing" data-dcnode-id="351" id="wrtLoading" role="alert"><div class="loader-writing--bg" data-dcnode-id="353"></div><div class="loader-writing--spinner" data-dcnode-id="352"></div></div><div class="row essay-preview-block" data-dcnode-id="96" id="divPreviewBlock"><div class="columns large-8 paper-container paper-container--with-sidebar position-relative border-box-shadow margin-4 padding-2" data-dcnode-id="173"><div class="" data-dcnode-id="323"><div class="position-relative margin-4 text-xl" data-dcnode-id="324"><div data-dcnode-id="350" id="essay-body-heading-details"></div><div class="document__body white-space--break-spaces text-ellipsis-after break-word" data-dcnode-id="332"><span class="document__preview text-l source-serif" data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">The differences between craft and design has been an arguing topic to most. “Craft” means how well the artwork is made and it implies skill with techniques and materials. Something that is considered well crafted usually means that the crafter has a true mastery over the resources and the process in which to create the object. However, craft does not always mean beautiful. Objects could be well crafted, but in a roughly created way, or something could be crafted to intentionally look “ugly” therefore the level and type of craft needs to match the concept or idea of the artwork. “Design” often refers to the building arts such as architecture. Part of the meaning involves a functional or structural component, but it also includes aesthetics,</span></span><a class="document__middle cursor-pointer source-serif text-l" data-dcnode-id="342" data-href="/document/FJZC6MWJNFU" rel="nofollow" style="color:#3174a3"><i data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">…show more content…</span></i></a><br data-dcnode-id="341"><span class="document__preview text-l source-serif" data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">The new fascination with handmade signifies a rejection of the synthetic world. This new group of artists concern themselves with the age-old techniques and focuses on detail, technique and tactility similar to that of figure 3.
The great difference between craft and design is that while the craftsman ends up with a finished, functioning object, the designer does not. They end up with a drawing or some other type of conceptual idea that may, later, be made into an actual object. Until then, it remains an abstract sign from which the Latin meaning of design is sign. Therefore, a second stage needs to take place where the actual object is made. 
Another difference is that the craftsman engages material in the process of giving it form. In doing this, a craftsman always ends with a finished original, one of a kind object. Craft is physical whereas design is visual idea or concept. While the making of an original or set of originals is the goal of the craftsman, it is not the goal of the designer because of the nature of the design process. Designers are compelled to consider objects for mass production, so even though a design concept may be unique, the industrial production does not allow them to</span></span><a class="document__middle cursor-pointer source-serif text-l" data-dcnode-id="336" data-href="/document/FJZC6MWJNFU" rel="nofollow" style="color:#3174a3"><i data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">…show more content…</span></i></a><br data-dcnode-id="335"><span class="document__preview text-l source-serif" data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">Craft, therefore, is a slower, originality, attention to quality and materials, to handcraft a functional object. Whereas, through defining how available resources may best serve this purpose, designers are charged with designing products that could be made with the use of automated machinery. An aspect of this process is defining a problem or question prior to the idea and planning stages relating to a solution. Design, once finished, is a quick industrial process and that has a loss of individuality through mass</span></span></div><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="331"></div><div class="center paper__cta" data-dcnode-id="325"><a class="button text-m" data-dcnode-id="329" data-href="/document/FJZC6MWJNFU" id="ShowMoreButton" rel="nofollow"><span data-dcnode-id="330" instrument_node="">Get Access</span></a><br data-dcnode-id="328"><a class="button text-m dark-green-bg" data-dcnode-id="326" href="javascript:void(0);" id="btnWtng" rel="nofollow"><span data-dcnode-id="327" instrument_node="">Check Writing Quality</span></a></div></div></div><div class="rhino-slot center" data-dcnode-id="322" id="AdCenterMiddle"></div><div class="paper--related-separator" data-dcnode-id="319"><span class="paper--related-separator-word" data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">Related</span></span></div><section class="" data-dcnode-id="174"><ul class="unstyled" data-dcnode-id="175" id="RelatedDocumentCenter"><li data-dcnode-id="306"><div class="paper paper--related" data-dcnode-id="307"><a data-dcnode-id="316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Mischer-Traxler-Collective-Works-Summary-PJVJA6VTYVG"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Collective Works Summary</span></h2></a><span class="paper--related__details" data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">1514 Words &nbsp;|&nbsp;7 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">In thecase of l’Artisan Electronique the question is about the indirect connection to the material. Still its not about the alienation from the materialbut how can digital dseign made to be more tangible
Not in the case of Collective Works nor in l’artisan Electronique clear the role of skill. None of these conceptions demands us to have the knowledge of how we can make a pot or basket in the old, tradition way, the object shapes without it. Skill is still needed, but as time goes it changes just like technology does. 
</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="311"></div><div class="center paper__cta" data-dcnode-id="308"><a class="button text-m" data-dcnode-id="309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Mischer-Traxler-Collective-Works-Summary-PJVJA6VTYVG"><span data-dcnode-id="310" instrument_node="">Read More</span></a></div></div></li><li data-dcnode-id="293"><div class="paper paper--related" data-dcnode-id="294"><a data-dcnode-id="303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Case-Study-8-2-The-Outsourced-Work-F3VEQ8QMUXFV"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Case Study 8-2: The Outsourced Work</span></h2></a><span class="paper--related__details" data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">564 Words &nbsp;|&nbsp;3 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">2. Was the project labor agreement meant to apply only to work preformed on the job site as BE contends, or could the terms of the project labor agreement also be applied off-site work as the union contends? 

 The project labor agreement was not written out anywhere through out the case study, so it hard to confirm where the work was meant to be done. However I believe that the project labor agreement was meant to apply to only work preformed on onsite because I believe that the only place they wanted work to take place.</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="298"></div><div class="center paper__cta" data-dcnode-id="295"><a class="button text-m" data-dcnode-id="296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Case-Study-8-2-The-Outsourced-Work-F3VEQ8QMUXFV"><span data-dcnode-id="297" instrument_node="">Read More</span></a></div></div></li><li data-dcnode-id="280"><div class="paper paper--related" data-dcnode-id="281"><a data-dcnode-id="290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Pollocks-Lavender-Mist-Analysis-PCC2ZUY35U"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">Analysis Of Jackson Pollock's Lavender Mist</span></h2></a><span class="paper--related__details" data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">1457 Words &nbsp;|&nbsp;6 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="286"><span data-dcnode-id="287" instrument_node=""> Lavender Mist defines this concept.  Unlike earlier traditional paintings, Lavender Mist is not representing a real life image.  It is the rebellious process in which this painting was made that makes this “beautiful art.”    Rather than showing a picture, Lavender Mist illustrates the complex process of producing such a piece of artwork.</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="285"></div><div class="center paper__cta" data-dcnode-id="282"><a class="button text-m" data-dcnode-id="283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Pollocks-Lavender-Mist-Analysis-PCC2ZUY35U"><span data-dcnode-id="284" instrument_node="">Read More</span></a></div></div></li><li data-dcnode-id="267"><div class="paper paper--related" data-dcnode-id="268"><a data-dcnode-id="277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Charles-Umlauf-The-Family-Group-Analysis-F3V7TNWMUXPT"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">Charles Umlauf The Family Group Analysis</span></h2></a><span class="paper--related__details" data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">1470 Words &nbsp;|&nbsp;6 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Art was meant to be looked at and the work was delegated to the art piece to make an impression in your mind in the short time you were together. However, this assignment allowed to me realize that it is not the art’s duty to engage but the viewers want to be engaged. Staring at a piece of art, not analyzing for a short time period would not give the art or you a meaningful amount of time to make an impact. To make an impression, the art piece must be understood and that only comes with spending time with the art. Another observation I made was that no sculpture is ever complete being looked at.</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="272"></div><div class="center paper__cta" data-dcnode-id="269"><a class="button text-m" data-dcnode-id="270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Charles-Umlauf-The-Family-Group-Analysis-F3V7TNWMUXPT"><span data-dcnode-id="271" instrument_node="">Read More</span></a></div></div></li><li data-dcnode-id="254"><div class="paper paper--related" data-dcnode-id="255"><a data-dcnode-id="264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Analysis-Of-Plagiarism-In-Malcolm-Gladwells-Something-PJ8QDT7NAG"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">Analysis Of Plagiarism In Malcolm Gladwell's Something Borrowed</span></h2></a><span class="paper--related__details" data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">1107 Words &nbsp;|&nbsp;5 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">In any school you have attended, plagiarism is a situation that a writer should not put themselves in under any circumstances. When reading the essay “Something Borrowed,” Malcolm Gladwell gave insight into the flaws of plagiarism that writers may not have thought about before. The first being that plagiarism is never acceptable (927). The second issue with plagiarism is recognizing the differences that can or cannot “inhibit creativity” (931). Being inspired by another person's work can help and guide you to build your own ideas, but simply taking their work and claiming it as yours is not permitted.</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="259"></div><div class="center paper__cta" data-dcnode-id="256"><a class="button text-m" data-dcnode-id="257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Analysis-Of-Plagiarism-In-Malcolm-Gladwells-Something-PJ8QDT7NAG"><span data-dcnode-id="258" instrument_node="">Read More</span></a></div></div></li><li data-dcnode-id="241"><div class="paper paper--related" data-dcnode-id="242"><a data-dcnode-id="251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Nothing-Is-Art-Essay-PJUCBARAYNR"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">Margo Buccini: What Is Art?</span></h2></a><span class="paper--related__details" data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">727 Words &nbsp;|&nbsp;3 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">Many of these experts and critics believe that a painting, a sculpture, or a musical piece must reach specific quality standards to be works of art. What these people consider as actual art can usually be put under the category of “fine arts”. Moreover, the fact that more and more things are considered art does not diminish its impact on society. While not many people can appreciate a good painting nowadays, other forms of art are taking its place, such as drawing and music. 
</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="246"></div><div class="center paper__cta" data-dcnode-id="243"><a class="button text-m" data-dcnode-id="244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Nothing-Is-Art-Essay-PJUCBARAYNR"><span data-dcnode-id="245" instrument_node="">Read More</span></a></div></div></li><li data-dcnode-id="228"><div class="paper paper--related" data-dcnode-id="229"><a data-dcnode-id="238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Architect-Client-Relationship-FJADC7QSQU"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">Architect-Client Relationship</span></h2></a><span class="paper--related__details" data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">723 Words &nbsp;|&nbsp;3 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">The Architect working on a project is not only responsible for the design but is also expected to work as a link between different parties in involved in the process, most importantly the client and others for successful outcomes and to achieve client’s satisfaction in a project.  With so many factors affecting the process, Architects find it difficult to explain the nature of their professional activities and their deliverables for successful project (Bali, 2009).

	This does not mean that science is engineering. Engineering is about creating something that required by society. Whereas science is not like that, science is that you find something that already exists in nature, then you find out more about what you find. So, that is the difference between science and engineering.

 With</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="194"></div><div class="center paper__cta" data-dcnode-id="191"><a class="button text-m" data-dcnode-id="192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Importance-Of-Value-Analysis-P3X3EP7EAJF6"><span data-dcnode-id="193" instrument_node="">Read More</span></a></div></div></li><li data-dcnode-id="176"><div class="paper paper--related" data-dcnode-id="177"><a data-dcnode-id="186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipl.org/essay/Schwalbes-Reification-Essay-F3ANC4BE2DTV"><h2 class="heading-m weight-700 brand-secondary" data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">Schwalbe's Reification Essay</span></h2></a><span class="paper--related__details" data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">556 Words &nbsp;|&nbsp;3 Pages</span></span><p class="text-l source-serif break-word text-ellipsis-after" data-dcnode-id="182"><span data-dcnode-id="183" instrument_node="">Reification takes away individual responsibility making it harder for people to realize they are the ones in charge of the social world. One should always remember that although the social world seems to have always existed, humans are the ones responsible for making it and maintaining it (Schwalbe, pg.20). The problem with not seeing the social world as “humanly made” is that the people who did the building are not given the credit for their attributions (Schwalbe, pg.21). Using the example of technology Schwalbe insists, “Reification keeps us from seeing that the force attributed to technology comes from people choosing to do things together in certain ways” (Schwalbe, pg. 21). Not being able to see the social world as humanly made, makes</span></p><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="181"></div><div class="center paper__cta" data-dcnode-id="178"><a class="butto
