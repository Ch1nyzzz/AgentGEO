</span><p data-dcnode-id="1193"><span data-dcnode-id="1197" instrument_node="">William Morris designs and patterns have had a recent resurgence in popularity.&nbsp; This is not surprising with the current popular </span><a data-dcnode-id="1195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cottagecore" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1196" instrument_node="">Cottagecore</span></a><span data-dcnode-id="1194" instrument_node=""> aesthetic and maximalist interior trend.</span></p><span data-dcnode-id="1192" instrument_node="">
</span><p data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">If you are wondering what a Cottagecore aesthetic is, think of the trappings associated with traditional cottage living.  Stuff such as flowing floral dresses, crafting, homemade sour bread dough and growing your own vegetables.</span></p><span data-dcnode-id="1189" instrument_node="">
</span><p data-dcnode-id="1184"><span data-dcnode-id="1188" instrument_node="">This renaissance of William Morris designs and patterns is just part of the usual fashion cycles.&nbsp; I remember his prints and wallpapers being popular in the 1980s, along with </span><a data-dcnode-id="1186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pictureboxblue.com/vintage-floral-pattern-designs/"><span data-dcnode-id="1187" instrument_node="">floral chintz patterns</span></a><span data-dcnode-id="1185" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="1183" instrument_node="">
</span><p data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">Many of William Morris’s patterns are over 150 years old.  They are such good designs they stand the test of time.&nbsp; The Morris &amp; Co company Still sell his wallpapers, textiles and homewares today.</span></p><span data-dcnode-id="1180" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1179" style="height:42px"></div><span data-dcnode-id="1178" instrument_node="">

</span><h2 data-dcnode-id="1164" id="who-was-william-morris"><span data-dcnode-id="1165" instrument_node="">Who was William Morris</span></h2><span data-dcnode-id="1163" instrument_node="">
</span><p data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">William Morris&nbsp;(1834&nbsp;– 1896) was a very accomplished Victorian British gentleman.  He was a  gifted textile designer, poet, novelist, translator and socialist activist.  These days we admire him for his interior design. But when he was alive, he was more famous as an author and poet.</span></p><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1155"><span data-dcnode-id="1159" instrument_node="">Morris was closely associated with the British&nbsp;</span><a data-dcnode-id="1157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arts_and_Crafts_Movement"><span data-dcnode-id="1158" instrument_node="">Arts and Crafts Movement</span></a><span data-dcnode-id="1156" instrument_node="">. He was a major contributor to the revival of traditional British&nbsp;textile arts&nbsp;and methods of production.</span></p><span data-dcnode-id="1154" instrument_node="">
</span><p data-dcnode-id="1149"><span data-dcnode-id="1153" instrument_node="">The Arts and Crafts movement was a reaction to the industrial revolution at the time.&nbsp;William Morris wanted people to have beautiful things in their homes to improve their quality of life.&nbsp; However, ironically most of his products were unaffordable to the </span><em data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">everyman</span></em><span data-dcnode-id="1150" instrument_node="">.  This was mainly due to their laborious craftsmanship.  Morris liked to use traditional methods and natural dyes with his designs.</span></p><span data-dcnode-id="1148" instrument_node="">
</span><p data-dcnode-id="1143"><span data-dcnode-id="1147" instrument_node="">From looking at William Morris’s patterns and designs, it’s obvious that he was inspired by nature.   Many of his textile patterns and wallpapers incorporate plants, fruits flowers, and leaves.  Very much like the</span><a data-dcnode-id="1145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pictureboxblue.com/art-nouveau-flower-prints/"><span data-dcnode-id="1146" instrument_node=""> art nouveau prints of Maurice Verneuil.</span></a><span data-dcnode-id="1144" instrument_node=""> </span></p><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1137"><span data-dcnode-id="1141" instrument_node="">Probably the most famous Willaim Morris quote is “</span><em data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">Have nothing in your house that you do not know to be useful, or believe to be beautiful.</span></em><span data-dcnode-id="1138" instrument_node="">”</span></p><span data-dcnode-id="1136" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1135" style="height:49px"></div><span data-dcnode-id="1134" instrument_node="">
</span><h3 data-dcnode-id="1132" id="the-designs-and-patterns"><span data-dcnode-id="1133" instrument_node="">The Designs and Patterns</span></h3><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">William Morris produced a wide range of designs for interiors and home furnishings.  These included over 600 patterns for wallpaper, textiles, embroideries and over 150 stained glass windows.  </span></p><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1123"><span data-dcnode-id="1127" instrument_node="">He also created three typefaces and about 650 borders and ornamentation for his private </span><a data-dcnode-id="1125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gla.ac.uk/myglasgow/library/files/special/teach/privatepress/kelmscott.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1126" instrument_node=""> Kelmscott Printing Press</span></a><span data-dcnode-id="1124" instrument_node="">. </span></p><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1114"><span data-dcnode-id="1121" instrument_node="">If you want to see the wallpapers and patterns of William Morris in situ, I recommend a visit to the </span><a data-dcnode-id="1119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vam.ac.uk/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1120" instrument_node="">V&amp;A museum</span></a><span data-dcnode-id="1118" instrument_node=""> in London.  His designs are not only part of the museum’s collection but the décor in the dining room too! Just like the </span><a data-dcnode-id="1116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pictureboxblue.com/owen-jones-grammar-of-ornament/"><span data-dcnode-id="1117" instrument_node="">grammar of ornament designs of Owen Jones</span></a><span data-dcnode-id="1115" instrument_node="">.</span></p><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">To download the William Morris pattern that you want, click on the title above that image.  A higher resolution image will open in a new window in your browser.  Right-click on the image with your mouse, the menu option to save the image to your device will appear.</span></p><span data-dcnode-id="1110" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1109" style="height:50px"></div><span data-dcnode-id="1108" instrument_node="">
</span><h4 class="has-text-align-center" data-dcnode-id="1105" id="1-blackthorn-wallpaper-design"><a data-dcnode-id="1106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pictureboxblue.com/pbb-cont/pbb-up/2021/02/Blackthorn_-wallpaper.jpg" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1107" instrument_node="">1. Blackthorn Wallpaper Design</span></a></h4><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">This William Morris wallpaper pattern features&nbsp;pretty meadow flowers of fritillary, viola &amp; daisy, overlain with the white blossoms of hedge blackthorn.  This wallpaper is still available to buy today.&nbsp;</span></p><span data-dcnode-id="1101" instrument_node="">

</span><h4 class="has-text-align-center" data-dcnode-id="887" id="11-strawberry-thief"><a data-dcnode-id="888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pictureboxblue.com/pbb-cont/pbb-up/2021/02/strawberry-theif.jpg" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="889" instrument_node="">11.  Strawberry Thief</span></a></h4><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="881"><span data-dcnode-id="885" instrument_node="">Perhaps the most recognizable of Morris’s textiles,&nbsp;</span><em data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Strawberry Thief</span></em><span data-dcnode-id="882" instrument_node="">&nbsp;celebrates the thrushes in his house, Kelmscott Manor’s garden. </span></p><span data-dcnode-id="880" instrument_node="">
</span><p data-dcnode-id="875"><span data-dcnode-id="879" instrument_node="">His daughter May Morris remarked, “</span><em data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">You can picture my Father going out in the early morning and watching the rascally thrushes at work on the fruit beds and telling the gardener who growls, ‘I’d like to wring their necks!’ that no bird in the garden must be touched</span></em><span data-dcnode-id="876" instrument_node="">.” </span></p><span data-dcnode-id="874" instrument_node="">
</span><p data-dcnode-id="869"><span data-dcnode-id="873" instrument_node="">With&nbsp;</span><em data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">Strawberry Thief,&nbsp;</span></em><span data-dcnode-id="870" instrument_node="">Morris perfected the indigo-discharge process, which required the entire cloth to be dyed blue before it was bleached and block printed, in this case with more colors than any of his other textiles.</span></p><span data-dcnode-id="868" instrument_node="">

</span><h4 class="has-text-align-center" data-dcnode-id="849" id="12-snakeshead"><a data-dcnode-id="850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pictureboxblue.com/pbb-cont/pbb-up/2021/02/snakes-head.jpg" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="851" instrument_node="">12. Snakeshead</span></a></h4><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="843"><span data-dcnode-id="847" instrument_node="">When Morris designed&nbsp;</span><em data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">Snakeshead</span></em><span data-dcnode-id="844" instrument_node="">&nbsp;in 1877, Indian silks were in style and widely imported from British India. This design stands out for its diminutive motifs and the strong red and black colors, which were fashionable only for a short time before paler hues regained favor with clients. </span></p><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">While its color scheme suggests distant lands with warmer climates, the pattern showcases one of Morris’s favorite flowers: the fritillary, a wildflower that he remembered growing in the meadows near Oxford.</span></p><span data-dcnode-id="839" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="838" style="height:45px"></div><span data-dcnode-id="837" instrument_node="">

</span><h4 class="has-text-align-center" data-dcnode-id="820" id="13-chintz-the-wandle-design-1884"><a data-dcnode-id="821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pictureboxblue.com/pbb-cont/pbb-up/2021/02/chintz-the-wandle-design.jpg" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="822" instrument_node="">13. Chintz The Wandle Design 1884</span></a></h4><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">The design was inspired by historic textiles, especially fifteenth-century velvets that often featured a strong diagonal or meandering branch from which various flowers emanated. </span></p><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">The title of the design refers to the river on which the Merton Abbey textile mill was situated. The river was a crucial source of power and clean water for textile processing.</span></p><span data-dcnode-id="813" instrument_node="">

</span><h4 class="has-text-align-center" data-dcnode-id="652" id="21-greenery-tapestry"><a data-dcnode-id="653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pictureboxblue.com/pbb-cont/pbb-up/2021/02/John_Henry_Dearle_for_Morris__Co._-_Tapestry-_Greenery_-_t.jpg" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="654" instrument_node="">21.  Greenery Tapestry</span></a></h4><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">A Morris &amp; Co tapestry. Designed by John Henry Dearle in 1892, imitating William Morris’s style in the trees. Dearle was a British&nbsp;textile&nbsp;and&nbsp;stained-glass&nbsp;designer&nbsp;trained by &nbsp;William Morris.&nbsp; I thought I’d still include it here as it is so beautiful.</span></p><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">This tapestry was woven at the Merton Abbey Tapestry Works. William Morris had founded the workshop at Merton, in Surrey, near London, in 1881 as part of his vision to use traditional craftsmanship to revitalize the art and design of postindustrial Britain.</span></p><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="637"><span data-dcnode-id="644" instrument_node=""> (</span><em data-dcnode-id="639"><span data-dcnode-id="643" instrument_node="">This image was used for the</span><a data-dcnode-id="641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pictureboxblue.com/diy-tea-light-lanterns/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="642" instrument_node=""> DIY tea light lanterns</span></a><span data-dcnode-id="640" instrument_node=""> craft) </span></em><span data-dcnode-id="638" instrument_node=""> </span></p><span data-dcnode-id="636" instrument_node="">

</span><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">‘Fruit’ is one of the most enduringly popular of William Morris’s designs. It was used in many artistic homes of the period. It is still available from Morris &amp; Co.</span></p><span data-dcnode-id="588" instrument_node="">

</span><p data-dcnode-id="549"><span data-dcnode-id="559" instrument_node="">If you enjoyed these beautiful patterns and designs of William Morris check out some of these design collections on Pictureboxblue.  Such as </span><a data-dcnode-id="557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pictureboxblue.com/traditional-chinese-patterns/"><span data-dcnode-id="558" instrument_node="">Traditional Chinese Patterns</span></a><span data-dcnode-id="556" instrument_node=""> and </span><a data-dcnode-id="554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pictureboxblue.com/japanese-art-prints-shin-bijutsukai/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="555" instrument_node="">Japanese Art and Design From the SHIN-BIJUTSUKAI.</span></a><span data-dcnode-id="553" instrument_node="">  Morris was influenced by Japanese art and design, you might want to check out the </span><a data-dcnode-id="551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pictureboxblue.com/japanese-vintage-prints-images/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="552" instrument_node="">Japanese vintage collection</span></a><span data-dcnode-id="550" instrument_node=""> on the site too.</span></p><span data-dcnode-id="548" instrument_node="">

</span><p data-dcnode-id="534"><span data-dcnode-id="538" instrument_node="">These William Morris patterns would be great for home decor crafts, such as these </span><a data-dcnode-id="536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pictureboxblue.com/diy-tile-coasters/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="537" instrument_node="">DIY tile coasters</span></a><span data-dcnode-id="535" instrument_node="">.</span></p><span data-dcnode-id="533" instrument_node="">
