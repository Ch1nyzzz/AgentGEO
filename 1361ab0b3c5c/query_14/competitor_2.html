</span><p data-dcnode-id="500"><font data-dcnode-id="501" face="Verdana" size="2"><b data-dcnode-id="502"><a data-dcnode-id="504" name="history"></a><span data-dcnode-id="503" instrument_node="">Origins, History, 
        Members</span></b></font></p><span data-dcnode-id="499" instrument_node="">
</span><p data-dcnode-id="418"><font data-dcnode-id="419" face="Verdana" size="2"><span data-dcnode-id="498" instrument_node="">One of the most influential of </span><a data-dcnode-id="496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/modern-art-movements.htm"><span data-dcnode-id="497" instrument_node="">modern 
        art movements</span></a><span data-dcnode-id="495" instrument_node="">, the Arts and Crafts Movement was established in Britain 
        about 1862 by the artist and medievalist </span><a data-dcnode-id="493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/william-morris.htm"><span data-dcnode-id="494" instrument_node="">William 
        Morris</span></a><span data-dcnode-id="492" instrument_node=""> (1834-96), in response to the negative social and aesthetic 
        consequences of the Industrial Revolution. The movement took its name 
        from the </span><i data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Arts and Crafts Exhibition Society</span></i><span data-dcnode-id="489" instrument_node="">, set up in 1888, although 
        its origins went back to the negative sentiment generated by the </span><i data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">Great 
        Exhibition</span></i><span data-dcnode-id="486" instrument_node=""> of 1851, which was ably articulated by the art critic </span><a data-dcnode-id="484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/critics/john-ruskin.htm"><span data-dcnode-id="485" instrument_node="">John 
        Ruskin</span></a><span data-dcnode-id="483" instrument_node=""> (1819-1900). His ideas on the need to preserve individual craftsmanship 
        and </span><a data-dcnode-id="481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/design.htm"><span data-dcnode-id="482" instrument_node="">design</span></a><span data-dcnode-id="480" instrument_node=""> had a major impact on William Morris, 
        who founded the design firm of </span><i data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Morris, Marshall, Faulkner &amp; Co</span></i><span data-dcnode-id="477" instrument_node=""> 
        to recreate manual craftsmanship in the era of mass production. Although 
        Morris's firm was a commercial success, only rich people could afford 
        his designs. Even so, his ideas had a strong impact on numerous designers, 
        manufacturers and practitioners of </span><a data-dcnode-id="475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/victorian.htm"><span data-dcnode-id="476" instrument_node="">Victorian art</span></a><span data-dcnode-id="474" instrument_node="">, 
        and led to the creation of several organizations to promote Arts and Crafts 
        ideas, such as the Art Workers Guild (1884). The Arts and Crafts Movement 
        was primarily concerned with </span><a data-dcnode-id="472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/architecture-history.htm"><span data-dcnode-id="473" instrument_node="">architecture</span></a><span data-dcnode-id="471" instrument_node=""> 
        and the </span><a data-dcnode-id="469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/definitions/decorative-art.htm"><span data-dcnode-id="470" instrument_node="">decorative arts</span></a><span data-dcnode-id="468" instrument_node="">, 
        including </span><a data-dcnode-id="466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/stained-glass-art.htm"><span data-dcnode-id="467" instrument_node="">stained glass</span></a><span data-dcnode-id="465" instrument_node="">, wallpaper, 
        textiles, furnishings, printed fabrics (chintzes), </span><a data-dcnode-id="463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/tapestry-art.htm"><span data-dcnode-id="464" instrument_node="">tapestry 
        art</span></a><span data-dcnode-id="462" instrument_node="">, furniture, </span><a data-dcnode-id="460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/sculpture/wood-carving.htm"><span data-dcnode-id="461" instrument_node="">wood carving</span></a><span data-dcnode-id="459" instrument_node="">, 
        metalwork, </span><a data-dcnode-id="457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/ceramics.htm"><span data-dcnode-id="458" instrument_node="">ceramics</span></a><span data-dcnode-id="456" instrument_node="">, jewellery and </span><a data-dcnode-id="454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/mosaic-art.htm"><span data-dcnode-id="455" instrument_node="">mosaic 
        art</span></a><span data-dcnode-id="453" instrument_node="">. Other artists and designers associated with the Arts and Crafts 
        Movement include the painters </span><a data-dcnode-id="451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/edward-burne-jones.htm"><span data-dcnode-id="452" instrument_node="">Edward 
        Burne-Jones</span></a><span data-dcnode-id="450" instrument_node=""> (1833-98), </span><a data-dcnode-id="448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/dante-gabriel-rossetti.htm"><span data-dcnode-id="449" instrument_node="">Dante 
        Gabriel Rossetti</span></a><span data-dcnode-id="447" instrument_node=""> (1828-82), </span><a data-dcnode-id="445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/ford-madox-brown.htm"><span data-dcnode-id="446" instrument_node="">Ford 
        Madox Brown</span></a><span data-dcnode-id="444" instrument_node=""> (1821-93) and the Scottish muralist John Duncan (1866-1945), 
        the ceramicist William de Morgan (1839-1917), the illustrator </span><a data-dcnode-id="442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/famous-artists/aubrey-beardsley.htm"><span data-dcnode-id="443" instrument_node="">Aubrey 
        Beardsley</span></a><span data-dcnode-id="441" instrument_node=""> (1872-98), the designers Philip Webb (1831-1915), Charles 
        Francis Annesley Voysey (1857-1941) and Charles Ashbee (1863-1942), the 
        architects Richard Norman Shaw (1831-1912), Edward William Godwin (1833-86), 
        and WR Lethaby (1857-1931). The Arts &amp; Crafts Movement opened the 
        door for </span><a data-dcnode-id="439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/art-nouveau.htm"><span data-dcnode-id="440" instrument_node="">Art Nouveau</span></a><span data-dcnode-id="438" instrument_node=""> in Europe (1890-1905), 
        the modernist designs of Swiss architect </span><a data-dcnode-id="436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/architecture/le-corbusier.htm"><span data-dcnode-id="437" instrument_node="">Le 
        Corbusier</span></a><span data-dcnode-id="435" instrument_node=""> (1887-1965), </span><a data-dcnode-id="433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/architecture/walter-gropius.htm"><span data-dcnode-id="434" instrument_node="">Walter 
        Gropius</span></a><span data-dcnode-id="432" instrument_node=""> (1883-1969) and his </span><a data-dcnode-id="430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/bauhaus-design-school.htm"><span data-dcnode-id="431" instrument_node="">Bauhaus 
        Design School</span></a><span data-dcnode-id="429" instrument_node=""> in Germany (1919-33) and the </span><i data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Union des Artistes Modernes</span></i><span data-dcnode-id="426" instrument_node=""> 
        (UAM) in France. It als influenced C.R.Mackintosh and the </span><a data-dcnode-id="424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/glasgow-school.htm"><span data-dcnode-id="425" instrument_node="">Glasgow 
        School of Painting</span></a><span data-dcnode-id="423" instrument_node="">: 1880-1915. (See also </span><a data-dcnode-id="421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/crafts-history-types.htm"><span data-dcnode-id="422" instrument_node="">Crafts: 
        History, Types</span></a><span data-dcnode-id="420" instrument_node="">.)</span></font></p><span data-dcnode-id="417" instrument_node="">

</span><p data-dcnode-id="329"><font data-dcnode-id="330" face="Verdana" size="2"><b data-dcnode-id="331"><a data-dcnode-id="333" name="ideals"></a><span data-dcnode-id="332" instrument_node="">Aims, Aesthetics 
        and Ideals</span></b></font></p><span data-dcnode-id="328" instrument_node="">
</span><p data-dcnode-id="316"><font data-dcnode-id="317" face="Verdana" size="2"><span data-dcnode-id="327" instrument_node="">The Arts and Crafts movement was a social/artistic 
        movement of </span><a data-dcnode-id="325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/modern-art.htm"><span data-dcnode-id="326" instrument_node="">modern art</span></a><span data-dcnode-id="324" instrument_node="">, which began in 
        Britain in the second half of the nineteenth century and continued into 
        the twentieth, spreading to continental Europe and the USA. Its adherents 
        - artists, architects, designers, writers, craftsmen and philanthropists 
        - were united by a common set of aesthetics, that sought to reassert the 
        importance of design and craftsmanship in all the arts in the face of 
        increasing industrialization, which they felt was sacrificing quality 
        in the pursuit of quantity. Its supporters and practitioners were united 
        not so much by a style than by a common goal - a desire to break down 
        the hierarchy of the arts (which elevated </span><a data-dcnode-id="322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/definitions/fine-art.htm"><span data-dcnode-id="323" instrument_node="">fine 
        art</span></a><span data-dcnode-id="321" instrument_node=""> like painting and sculpture, but looked down on </span><a data-dcnode-id="319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/definitions/applied-art.htm"><span data-dcnode-id="320" instrument_node="">applied 
        art</span></a><span data-dcnode-id="318" instrument_node="">), to revive and restore dignity to traditional handicrafts and 
        to make art that could be affordable for all.</span></font></p><span data-dcnode-id="315" instrument_node="">
</span><p data-dcnode-id="310"><font data-dcnode-id="311" face="Verdana" size="2"><b data-dcnode-id="312"><a data-dcnode-id="314" name="morris"></a><span data-dcnode-id="313" instrument_node="">William Morris</span></b></font></p><span data-dcnode-id="309" instrument_node="">
</span><p data-dcnode-id="297"><font data-dcnode-id="298" face="Verdana" size="2"><span data-dcnode-id="308" instrument_node="">The leading champion of the Arts and Crafts 
        movement was the designer, painter, poet and social reformer William Morris. 
        A passionate Socialist, Morris proclaimed, "I do not want art for 
        a few, any more than I want freedom for a few." Drawing on the ideas 
        of the architect Augustus W.N. Pugin (1812-52), who proselytized the moral 
        superiority of the art of the Middle Ages, and the art critic and writer 
        John Ruskin (1819-1900), who denounced the greed and self-interest of 
        contemporary capitalist society, Morris developed the view that art should 
        be both beautiful and functional. His ideal, the pure and simple beauty 
        of medieval craftsmanship, was further strengthened by his friendships 
        with members of the </span><a data-dcnode-id="306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/pre-raphaelite-brotherhood.htm"><span data-dcnode-id="307" instrument_node="">Pre-Raphaelite 
        Brotherhood</span></a><span data-dcnode-id="305" instrument_node=""> like Edward Burne-Jones and Dante Gabriel Rossetti, who 
        also looked to the Middle Ages (hence the term 'Pre-Raphaelite') for aesthetic 
        inspiration and moral guidance. See also: </span><a data-dcnode-id="303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/sculpture/medieval.htm"><span data-dcnode-id="304" instrument_node="">Medieval 
        Sculpture</span></a><span data-dcnode-id="302" instrument_node=""> and </span><a data-dcnode-id="300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/medieval-artists.htm"><span data-dcnode-id="301" instrument_node="">Medieval Artists</span></a><span data-dcnode-id="299" instrument_node="">.</span></font></p><span data-dcnode-id="296" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="289" instrument_node="">
</span><span data-dcnode-id="288" instrument_node="">

</span><span data-dcnode-id="71" instrument_node="">
</span><table align="center" border="0" cellpadding="5" cellspacing="2" data-dcnode-id="69" width="750"><tbody data-dcnode-id="70"><tr data-dcnode-id="72"><td data-dcnode-id="283" valign="top" width="200"><span data-dcnode-id="286" instrument_node="">
</span><p data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">
</span></p></td><td data-dcnode-id="74" valign="top" width="524"><span data-dcnode-id="281" instrument_node="">
</span><p data-dcnode-id="276"><font data-dcnode-id="277" face="Verdana" size="2"><b data-dcnode-id="278"><a data-dcnode-id="280" name="redhouse"></a><span data-dcnode-id="279" instrument_node="">The Red House</span></b></font></p><span data-dcnode-id="275" instrument_node="">
</span><p data-dcnode-id="263"><font data-dcnode-id="264" face="Verdana" size="2"><span data-dcnode-id="274" instrument_node="">The Red House (1859), Morris's home in 
        Bexley Heath, Kent, marked the emblematic start of the movement. Morris 
        commissioned it from his friend, the architect Philip Webb, for himself 
        and his new bride. The red brick house (hence the name), with its free-flowing 
        design, the absence of pretentious facades, the concern for structure 
        and sensitivity to local materials, traditional building methods and the 
        particularities of location, is a landmark in the domestic revival movement 
        in </span><a data-dcnode-id="272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/architecture/victorian.htm"><span data-dcnode-id="273" instrument_node="">Victorian architecture</span></a><span data-dcnode-id="271" instrument_node=""> 
        (1840-1900). Morris himself designed the garden, and the interior was 
        fitted and decorated by Webb, the Morrises, Rossetti and Burne-Jones, 
        resulting in what Rossetti described as 'more a poem than a house'. It 
        is, in fact, the earliest example of the concept of a 'total work of art' 
        (</span><i data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">gesamtkunstwerk</span></i><span data-dcnode-id="268" instrument_node="">) that would become central not only to the Arts 
        and Crafts philosophy, but to many other movements, among them Art Nouveau, 
        the Bauhaus and </span><a data-dcnode-id="266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/art-deco.htm"><span data-dcnode-id="267" instrument_node="">Art Deco</span></a><span data-dcnode-id="265" instrument_node="">.</span></font></p><span data-dcnode-id="262" instrument_node="">
</span><p data-dcnode-id="257"><font data-dcnode-id="258" face="Verdana" size="2"><b data-dcnode-id="259"><a data-dcnode-id="261" name="firm"></a><span data-dcnode-id="260" instrument_node="">Morris, Marshall, 
        Faulkner &amp; Co</span></b></font></p><span data-dcnode-id="256" instrument_node="">
</span><p data-dcnode-id="244"><font data-dcnode-id="245" face="Verdana" size="2"><span data-dcnode-id="255" instrument_node="">The Red House project amongst friends soon 
        led to a commercial venture. In 1861 Morris, Webb, Rossetti, Burne-Jones, 
        painter Ford Madox Brown, surveyor P P Marshall and accountant Charles 
        Faulkner founded the manufacturing and decorating firm of </span><i data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Morris, Marshall, 
        Faulkner &amp; Co</span></i><span data-dcnode-id="252" instrument_node=""> (later </span><i data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">Morris &amp; Co</span></i><span data-dcnode-id="249" instrument_node="">.). The anti-industrial 
        structure of the firm was based on the concept of medieval guilds, in 
        which craftsmen both designed and executed the work. Its aim was to create 
        beautiful, useful, affordable, applied-art objects, so that art would 
        be a lived experience for all, not just the affluent. The members of the 
        company turned their hands to designing and producing domestic objects, 
        including furniture, tapestry, stained glass, </span><a data-dcnode-id="247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/jewellery-art.htm"><span data-dcnode-id="248" instrument_node="">jewellery</span></a><span data-dcnode-id="246" instrument_node="">, 
        furnishing fabrics, carpets, tiles and wallpaper.</span></font></p><span data-dcnode-id="243" instrument_node="">
</span><p data-dcnode-id="238"><font data-dcnode-id="239" face="Verdana" size="2"><b data-dcnode-id="240"><a data-dcnode-id="242" name="design"></a><span data-dcnode-id="241" instrument_node="">Ideology Not Design</span></b></font></p><span data-dcnode-id="237" instrument_node="">
</span><p data-dcnode-id="222"><font data-dcnode-id="223" face="Verdana" size="2"><span data-dcnode-id="236" instrument_node="">However, the major innovation of the Arts 
        and Craft movement was in their </span><i data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">ideology</span></i><span data-dcnode-id="233" instrument_node="">, not in their style or 
        design, which harked back to medieval architecture and tapestries, </span><a data-dcnode-id="231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/cultural-history-of-ireland/illuminated-manuscripts.htm"><span data-dcnode-id="232" instrument_node="">illuminated 
        manuscripts</span></a><span data-dcnode-id="230" instrument_node=""> and rustic styles of decoration and furniture. Tellingly, 
        their themes and subjects were often drawn from Arthurian legend or the 
        poetry of 14th-century poet Geoffrey Chaucer. Moreover, though the movement 
        was successful in raising the status of the craftsman and promoting respect 
        for native materials and traditions, it failed to produce art for the 
        masses: its handmade products were expensive. By the 1880s one could live 
        in a house designed by Webb, decorated with Morris wallpaper, with ceramics 
        by William de Morgan and paintings by Burne-Jones, while wearing clothing 
        based on Pre-Raphaelite dress - but </span><i data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">only</span></i><span data-dcnode-id="227" instrument_node=""> if one was wealthy. Morris 
        himself is best known for his use of flat, formal pattern designs for 
        wallpaper and tiles characterized by a richness of colour and complexity 
        of design. The flowing, dynamic line of such designs, particularly those 
        of second-generation designers Arthur Heygate Mackmurdo (1851-1942) and 
        Charles Voysey (1857-1941), would later influence the international Art 
        Nouveau, in which designers would develop the look </span><i data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">without</span></i><span data-dcnode-id="224" instrument_node=""> its 
        social program.</span></font></p><span data-dcnode-id="221" instrument_node="">
</span><p data-dcnode-id="216"><font data-dcnode-id="217" face="Verdana" size="2"><b data-dcnode-id="218"><a data-dcnode-id="220" name="architecture"></a><span data-dcnode-id="219" instrument_node="">Architecture</span></b></font></p><span data-dcnode-id="215" instrument_node="">
</span><p data-dcnode-id="203"><font data-dcnode-id="204" face="Verdana" size="2"><span data-dcnode-id="214" instrument_node="">The architecture of the Arts and Crafts 
        Movement was its most radical and influential aspect, and architects such 
        as Webb, Voysey, M. H. Baillie Scott (1865-1945), Norman Shaw (1831-1912) 
        and Charles Rennie Mackintosh, developed principles which not only influenced 
        </span><a data-dcnode-id="212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/nineteenth-century-architecture.htm"><span data-dcnode-id="213" instrument_node="">19th century architecture</span></a><span data-dcnode-id="211" instrument_node=""> 
        but would later become the touchstones of twentieth-century architects. 
        These included the belief that design should be dictated by function, 
        that vernacular styles of architecture and local materials should be respected, 
        that new buildings should integrate with the surrounding landscape, and 
        that freedom from historicist styles was essential. The result was a number 
        of buildings - especially houses for the middle class - that architectural 
        historian Nikolaus Pevsner called 'fresher and more aesthetically adventurous 
        than anything done at the same time abroad'. These architectural canons 
        fed the growing Garden City movement in Britain in the early twentieth 
        century, which brought together on a large scale Arts and Crafts design 
        and Morris's social reform ideals. The Garden City movement was based 
        on the theories of Ebenezer Howard (1850-1928), as put forward in his 
        highly influential book, </span><i data-dcnode-id="209"><span data-dcnode-id="210" instrument_node="">Tomorrow: a Peaceful Path to Real Reform</span></i><span data-dcnode-id="208" instrument_node="">, 
        1898 (later revised as </span><i data-dcnode-id="206"><span data-dcnode-id="207" instrument_node="">Garden Cities of Tomorrow</span></i><span data-dcnode-id="205" instrument_node=""> in 1902). Howard's 
        social policies advocated the creation of small, economically self-sufficient 
        cities throughout the country, with the aim of halting urban sprawl and 
        overcrowding. Numerous such cities were built, with varying degrees of 
        success, and the ordinary home became the focal point of progressive architects 
        throughout the country.</span></font></p><span data-dcnode-id="202" instrument_node="">
</span><p data-dcnode-id="197"><font data-dcnode-id="198" face="Verdana" size="2"><b data-dcnode-id="199"><a data-dcnode-id="201" name="organizations"></a><span data-dcnode-id="200" instrument_node="">Arts and 
        Crafts Organizations</span></b></font></p><span data-dcnode-id="196" instrument_node="">
</span><p data-dcnode-id="169"><font data-dcnode-id="170" face="Verdana" size="2"><span data-dcnode-id="195" instrument_node="">The Arts and Crafts movement encompassed 
        other English guilds of architects and designers. The </span><i data-dcnode-id="193"><span data-dcnode-id="194" instrument_node="">Century Guild</span></i><span data-dcnode-id="192" instrument_node=""> 
        (founded in 1882 as a democratic collective) included as its members Mackmurdo 
        and Selwyn Image (1849-1930), who also produced a journal, </span><i data-dcnode-id="190"><span data-dcnode-id="191" instrument_node="">The Hobby 
        Horse</span></i><span data-dcnode-id="189" instrument_node=""> (1884-92). </span><i data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">The Art Workers' Guild</span></i><span data-dcnode-id="186" instrument_node=""> (founded 1884) included 
        William Lethaby (1857-1931) and Voysey among its members; its aims were 
        'to advance education in all the visual arts and to foster and maintain 
        high standards of design and craftsmanship'. The recognition that public 
        exposure was essential to achieve their educational goals and commercial 
        survival (the </span><a data-dcnode-id="184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/royal-academy-arts-london.htm"><span data-dcnode-id="185" instrument_node="">London Royal Academy</span></a><span data-dcnode-id="183" instrument_node=""> 
        did not exhibit decorative arts) prompted the establishment of the </span><i data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">Arts 
        and Crafts Exhibition Society</span></i><span data-dcnode-id="180" instrument_node=""> in 1888 by a number of second-generation 
        practitioners, with Walter Crane (1845-1915) as its first president. One 
        of its members, T. J. Cobden-Sanderson (1840-1922), who coined the name 
        for the movement in 1887, defined its core aim as bringing 'all the activities 
        of the human spirit under the influence of one idea, the idea that life 
        is creation'. In 1893 the magazine </span><i data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">The Studio</span></i><span data-dcnode-id="177" instrument_node=""> was launched to spread 
        the message and the designs of the Arts and Crafts movement throughout 
        Britain, Europe, and the USA. Arts and Crafts workshops based on their 
        British counterparts were formed in the USA in the late nineteenth century. 
        The aesthetic of simple, unadorned furniture designs of Gustav Stickley 
        (1857-1942) and his workshop, promoted through the periodical </span><i data-dcnode-id="175"><span data-dcnode-id="176" instrument_node="">The Craftsman</span></i><span data-dcnode-id="174" instrument_node=""> 
        (1901-16), remains popular today. Simplicity, utility and 'honest' construction 
        were the key concepts behind the designs. Unlike Morris, Stickley did 
        not reject mass production. His products, more accessible and affordable 
        than Morris's, were available in department stores or by mail order from 
        catalogues, and could even be made at home from designs and instructions 
        published in </span><i data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">The Craftsman</span></i><span data-dcnode-id="171" instrument_node="">.</span></font></p><span data-dcnode-id="168" instrument_node="">
</span><p data-dcnode-id="163"><font data-dcnode-id="164" face="Verdana" size="2"><b data-dcnode-id="165"><a data-dcnode-id="167" name="america"></a><span data-dcnode-id="166" instrument_node="">Arts and Crafts 
        in America</span></b></font></p><span data-dcnode-id="162" instrument_node="">
</span><p data-dcnode-id="150"><font data-dcnode-id="151" face="Verdana" size="2"><span data-dcnode-id="161" instrument_node="">Arts and Crafts architectural guidelines 
        - use of the vernacular, local materials and craft traditions - also flourished 
        in America, encouraging a variety of regional domestic architecture. The 
        exquisitely crafted homes and accompanying furniture designed by the brothers 
        Charles (1868-1957) and Henry (1870-1954) Greene in Pasadena and Los Angeles, 
        California, epitomize the refined West Coast variant of American Arts 
        and Crafts architecture. But the dominant figure in American domestic 
        architecture of the early twentieth century was </span><a data-dcnode-id="159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/architecture/frank-lloyd-wright.htm"><span data-dcnode-id="160" instrument_node="">Frank 
        Lloyd Wright</span></a><span data-dcnode-id="158" instrument_node=""> (1867-1959). His </span><i data-dcnode-id="156"><span data-dcnode-id="157" instrument_node="">Prairie Houses</span></i><span data-dcnode-id="155" instrument_node="">, situated outside 
        Chicago, featuring their distinctive horizontality, overhanging roofs 
        and free-flowing rooms around a central chimney, show a strong Arts and 
        Crafts influence. Wright, like many other Arts and Crafts architects embraced 
        the concept of 'total design' and often designed built-in furniture to 
        control the interiors. Other popular </span><i data-dcnode-id="153"><span data-dcnode-id="154" instrument_node="">Prairie School</span></i><span data-dcnode-id="152" instrument_node=""> architects 
        included William Gray Purcell (1880-1965) and George Grant Elmslie (1871-1952).</span></font></p><span data-dcnode-id="149" instrument_node="">
</span><p data-dcnode-id="144"><font data-dcnode-id="145" face="Verdana" size="2"><b data-dcnode-id="146"><a data-dcnode-id="148" name="europe"></a><span data-dcnode-id="147" instrument_node="">Arts and Crafts 
        across Europe</span></b></font></p><span data-dcnode-id="143" instrument_node="">
</span><p data-dcnode-id="101"><font data-dcnode-id="102" face="Verdana" size="2"><span data-dcnode-id="142" instrument_node="">Arts and Crafts </span><a data-dcnode-id="140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/definitions/aesthetics.htm"><span data-dcnode-id="141" instrument_node="">aesthetics</span></a><span data-dcnode-id="139" instrument_node=""> 
        and ideals were also particularly successful in Germany, Austria, Hungary 
        and Scandinavia with their strong craft traditions which continue today. 
        Arts and Crafts principles were allied to machine production and used 
        as an expression of national identity. </span><a data-dcnode-id="137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/definitions/folk-art.htm"><span data-dcnode-id="138" instrument_node="">Folk 
        art</span></a><span data-dcnode-id="136" instrument_node=""> was revived, as were native types of medieval architecture. The 
        Arts and Crafts-inspired revival of interest in domestic architecture, 
        later spread to Europe. The </span><i data-dcnode-id="134"><span data-dcnode-id="135" instrument_node="">English House</span></i><span data-dcnode-id="133" instrument_node=""> (1904-5) by German architect 
        Hermann Muthesius (1861-1927), also associated with the </span><i data-dcnode-id="130"><a data-dcnode-id="131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/architecture/deutscher-werkbund.htm"><span data-dcnode-id="132" instrument_node="">Deutscher 
        Werkbund</span></a></i><span data-dcnode-id="129" instrument_node="">, and exhibitions hosted by </span><i data-dcnode-id="126"><a data-dcnode-id="127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/les-vingt.htm"><span data-dcnode-id="128" instrument_node="">Les 
        Vingt</span></a></i><span data-dcnode-id="125" instrument_node=""> and its successor, </span><i data-dcnode-id="123"><span data-dcnode-id="124" instrument_node="">La Libre Estherique</span></i><span data-dcnode-id="122" instrument_node="">, in Brussels, 
        introduced the new British style to a Continental public. The major figures 
        in Finland included the artist Akseli Gallen-Kallela (1865-1931) and the 
        architect Eliel Saarinen (1873-1950); in Sweden the artist Carl Larsson 
        (1853-1919); in Hungary Aladar Korosfoi-Kriesch (1863-1920); and in Austria, 
        Josef Hoffmann (1870-1956, see also </span><a data-dcnode-id="120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/vienna-secession.htm"><span data-dcnode-id="121" instrument_node="">Vienna 
        Secession</span></a><span data-dcnode-id="119" instrument_node="">) and Koloman Moser (1868-1918). The ideals of the Arts and 
        Crafts movement were also the basis of many German </span><i data-dcnode-id="116"><a data-dcnode-id="117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/jugendstil.htm"><span data-dcnode-id="118" instrument_node="">Jugendstil</span></a></i><span data-dcnode-id="115" instrument_node=""> 
        workshops, the </span><a data-dcnode-id="113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/munich-secession.htm"><span data-dcnode-id="114" instrument_node="">Munich Secession</span></a><span data-dcnode-id="112" instrument_node=""> movement 
        (1892), and the </span><a data-dcnode-id="110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/berlin-secession.htm"><span data-dcnode-id="111" instrument_node="">Berlin Secession</span></a><span data-dcnode-id="109" instrument_node=""> (1898). 
        and eventually the </span><a data-dcnode-id="107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/history-of-art/bauhaus-design-school.htm"><span data-dcnode-id="108" instrument_node="">Bauhaus design 
        school</span></a><span data-dcnode-id="106" instrument_node="">, which would also strive to unite fine and applied arts in 
        a principle of total design. When the Arts and Crafts movement began to 
        lose impetus, around the time of World War I, the precepts 'fitness for 
        purpose' and 'truth to materials' continued to be influential. More recently 
        the craft ideal of the Arts and Crafts movement lies behind the rise of 
        the designer-maker, and since the 1950s, the </span><i data-dcnode-id="104"><span data-dcnode-id="105" instrument_node="">Crafts Revival</span></i><span data-dcnode-id="103" instrument_node=""> in 
        Britain, the USA and Scandinavia.</span></font></p><span data-dcnode-id="100" instrument_node="">
</span><p data-dcnode-id="95"><font data-dcnode-id="96" face="Verdana" size="2"><b data-dcnode-id="97"><a data-dcnode-id="99" name="collections"></a><span data-dcnode-id="98" instrument_node="">Collections</span></b></font></p><span data-dcnode-id="94" instrument_node="">
</span><p data-dcnode-id="82"><font data-dcnode-id="83" face="Verdana" size="2"><span data-dcnode-id="93" instrument_node="">Artworks associated with the Arts and Crafts 
        Movement Arts can be found in several of the </span><a data-dcnode-id="91" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/art-museums.htm"><span data-dcnode-id="92" instrument_node="">best 
        art museums</span></a><span data-dcnode-id="90" instrument_node=""> in Europe and America, notably the </span><i data-dcnode-id="88"><span data-dcnode-id="89" instrument_node="">Musee d'Orsay</span></i><span data-dcnode-id="87" instrument_node=""> 
        (Paris); the Tate Gallery, the </span><a data-dcnode-id="85" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.visual-arts-cork.com/museums/victoria-and-albert-museum.htm"><span data-dcnode-id="86" instrument_node="">Victoria 
        &amp; Albert Museum</span></a><span data-dcnode-id="84" instrument_node=""> and the William Morris Gallery (all in London), 
        the Metropolitan Museum of Art (New York) and the Virginia Museum of Fine 
        Arts (Richmond).</span></font></p><span data-dcnode-id="81" instrument_node="">
</span><p data-dcnode-id="76"><font data-dcnode-id="77" face="Arial" size="1"><span data-dcnode-id="80" instrument_node="">REFERENCES</span><br data-dcnode-id="79"><span data-dcnode-id="78" instrument_node="">

        Hudson, 2007), a publication we strongly recommend for any serious students 
        of art history during the modern era.</span></font></p><span data-dcnode-id="75" instrument_node="">
