</span><div class="wp-caption alignnone" data-dcnode-id="1609" id="attachment_132958" style="width: 760px"><img alt="Arts and Crafts Movement Revival" aria-describedby="caption-attachment-132958" class="size-full wp-image-132958" data-dcnode-id="1614" decoding="async" height="500" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mymodernmet.com/wp/wp-content/uploads/2018/03/arts-craft-movement-revival-0.jpeg&amp;raw" srcset="https://mymodernmet.com/wp/wp-content/uploads/2018/03/arts-craft-movement-revival-0.jpeg 750w, https://mymodernmet.com/wp/wp-content/uploads/2018/03/arts-craft-movement-revival-0-300x200.jpeg 300w" width="750"><p class="wp-caption-text" data-dcnode-id="1610" id="caption-attachment-132958"><span data-dcnode-id="1613" instrument_node="">Photo: </span><a data-dcnode-id="1611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pexels.com/photo/craftsman-craftsmanship-creative-handmade-175760/%25E2%2580%259D%2520target%3D"><span data-dcnode-id="1612" instrument_node="">Clem Onojeghuo </span></a></p></div><span data-dcnode-id="1608" instrument_node="">
</span><p class="first-letter-styles" data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">Today, in the era of smartphones, social media, virtual reality, and 3D printing, technology is evolving faster than ever. And although new technological advancements can be exciting, they can also become overwhelming. In the last few decades, increasingly sophisticated mass production methods have led to an abundance of choices for consumers, but with that sometimes comes a loss of individuality and quality. For example, many of us can relate to visiting a friend’s house and noticing that they have the same IKEA rug/picture frame/throw pillows as you.</span></p><div class="desktop-blog-ad desktop-ad" data-dcnode-id="1605"></div><span data-dcnode-id="1604" instrument_node="">
</span><p data-dcnode-id="1593"><span data-dcnode-id="1603" instrument_node="">More and more people are therefore rejecting machine-produced products in favor of </span><a data-dcnode-id="1601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.handshake.com/blog/gift-industry-trends-handmade/" rel="noopener" target="_blank"><span data-dcnode-id="1602" instrument_node="">handmade items from independent retailers</span></a><span data-dcnode-id="1600" instrument_node="">, crafters, and artists. This social trend mirrors the original </span><strong data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">Arts and Crafts Movement</span></strong><span data-dcnode-id="1597" instrument_node=""> of the 19th century, when people advocated a return to traditional craftsmanship during the industrial revolution. Today, rather than completely reject modern technology, artists and consumers alike can use the Internet in their favor. Online stores like </span><a data-dcnode-id="1595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tidd.ly/c00d266" rel="nofollow" target="_blank"><span data-dcnode-id="1596" instrument_node="">Etsy</span></a><span data-dcnode-id="1594" instrument_node=""> allow people easy access high quality craftsmanship and one-of-a-kind pieces. This in turn allows many contemporary artists and designers to make a living from their craft—an option that may not have been possible pre-Internet.</span></p><span data-dcnode-id="1592" instrument_node="">
</span><p data-dcnode-id="1584"><span data-dcnode-id="1591" instrument_node="">Not only this, but living in the </span><a data-dcnode-id="1589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Information_Age" rel="noopener" target="_blank"><span data-dcnode-id="1590" instrument_node="">Information Age</span></a><span data-dcnode-id="1588" instrument_node="">&nbsp;gives creatives the opportunity to thrive, share ideas, and learn new skills. Many online communities exist where artists and crafters willingly share their knowledge by giving workshops, </span><a data-dcnode-id="1586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mymodernmet.com/best-online-art-classes/" rel="noopener" target="_blank"><span data-dcnode-id="1587" instrument_node="">online classes</span></a><span data-dcnode-id="1585" instrument_node="">, and spread their love of traditional craft.</span></p><span data-dcnode-id="1583" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="1574" id="attachment_132940" style="width: 760px"><img alt="Arts and Crafts Movement Revival" aria-describedby="caption-attachment-132940" class="size-full wp-image-132940 lazyloaded" data-dcnode-id="1582" data-src="https://mymodernmet.com/wp/wp-content/uploads/2018/03/arts-craft-movement-revival-1.jpg" data-srcset="https://mymodernmet.com/wp/wp-content/uploads/2018/03/arts-craft-movement-revival-1.jpg 750w, https://mymodernmet.com/wp/wp-content/uploads/2018/03/arts-craft-movement-revival-1-300x196.jpg 300w" decoding="async" height="489" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mymodernmet.com/wp/wp-content/uploads/2018/03/arts-craft-movement-revival-1.jpg&amp;raw" srcset="https://mymodernmet.com/wp/wp-content/uploads/2018/03/arts-craft-movement-revival-1.jpg 750w, https://mymodernmet.com/wp/wp-content/uploads/2018/03/arts-craft-movement-revival-1-300x196.jpg 300w" width="750"><noscript data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">&lt;img aria-describedby="caption-attachment-132940" class="lazyload size-full wp-image-132940" decoding="async" src="https://mymodernmet.com/wp/wp-content/uploads/2018/03/arts-craft-movement-revival-1.jpg" alt="Arts and Crafts Movement Revival" width="750" height="489" srcset="https://mymodernmet.com/wp/wp-content/uploads/2018/03/arts-craft-movement-revival-1.jpg 750w, https://mymodernmet.com/wp/wp-content/uploads/2018/03/arts-craft-movement-revival-1-300x196.jpg 300w" sizes="(max-width: 750px) 100vw, 750px" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="1575" id="caption-attachment-132940"><span data-dcnode-id="1579" instrument_node="">Printing at Merton Abbey c. 1890. (Photo: By Anonymous for Morris &amp; Co. via </span><a data-dcnode-id="1577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AMorris_and_Company_Textile_Printing_Merton_Abbey.jpg" rel="noopener" target="_blank"><span data-dcnode-id="1578" instrument_node="">Wikimedia Commons</span></a><span data-dcnode-id="1576" instrument_node=""> {{PD-US}})</span></p></div><span data-dcnode-id="1573" instrument_node="">
</span><h2 data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">What was the Arts and Crafts movement?</span></h2><span data-dcnode-id="1570" instrument_node="">
</span><p data-dcnode-id="1565"><span data-dcnode-id="1569" instrument_node="">One of the more influential design movements in history, The Arts and Crafts movement began in Britain around 1880, and spread quickly across Europe, America, and Japan. Born out of concern for the effects of industrialization on traditional crafts, it was led by English textile designer </span><a data-dcnode-id="1567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mymodernmet.com/arts-and-crafts-movement-william-morris/" rel="noopener" target="_blank"><span data-dcnode-id="1568" instrument_node="">William Morris</span></a><span data-dcnode-id="1566" instrument_node="">—along with a group of architects, designers, craftsmen, and artists— who united to protect their processes in decorative art.</span></p><span data-dcnode-id="1564" instrument_node="">
</span><p data-dcnode-id="1559"><span data-dcnode-id="1563" instrument_node="">Morris famously once said, “Have nothing in your houses that you do not know to be useful or believe to be beautiful.” Realizing the only way he could have the beautiful home he wanted, he decided to design every part himself. Having enjoyed the process so much, he decided to set up his own design firm, and by the 1880s, Morris had become an internationally renowned designer. Built in 1860, his home—known as </span><a data-dcnode-id="1561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red_House%2C_Bexleyheath" rel="noopener" target="_blank"><span data-dcnode-id="1562" instrument_node="">the Red House</span></a><span data-dcnode-id="1560" instrument_node="">—is now one of the most significant buildings of the Arts and Crafts era, and his woodblock-printed fabric and wallpaper designs are still in high demand.</span></p><div class="desktop-blog-ad desktop-ad" data-dcnode-id="1558"></div><span data-dcnode-id="1557" instrument_node="">
</span><h2 data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">The Revival</span></h2><span data-dcnode-id="1554" instrument_node="">
</span><p data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">In opposition to mass consumerism and copy-cat products, today there are many communities of craftspeople who are working to create unique, hand-crafted ceramics, textiles, and furniture. Each with their own unique approach, and materials, they value the traditional crafts of the past, but often add a modern twist.</span></p><span data-dcnode-id="1551" instrument_node="">
</span><p data-dcnode-id="1543"><span data-dcnode-id="1550" instrument_node="">From </span><a data-dcnode-id="1548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mymodernmet.com/contemporary-ceramic-artists/" rel="noopener" target="_blank"><span data-dcnode-id="1549" instrument_node="">innovative ceramic artists</span></a><span data-dcnode-id="1547" instrument_node=""> and furniture designers, to </span><a data-dcnode-id="1545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mymodernmet.com/contemporary-textile-art-history/" rel="noopener" target="_blank"><span data-dcnode-id="1546" instrument_node="">textile artists</span></a><span data-dcnode-id="1544" instrument_node=""> who are creatively pushing the boundaries of an age-old art, here’s just some of those contemporary artisans who are masters of their craft.</span></p><span data-dcnode-id="1542" instrument_node="">
</span><h2 data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">Ceramic Art</span></h2><span data-dcnode-id="1539" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="1531" id="attachment_132941" style="width: 760px"><img alt="Arts and Crafts Movement Revival" aria-describedby="caption-attachment-132941" class="size-full wp-image-132941 lazyloaded" data-dcnode-id="1538" data-src="https://mymodernmet.com/wp/wp-content/uploads/2018/03/arts-craft-movement-revival-2.jpeg" data-srcset="https://mymodernmet.com/wp/wp-content/uploads/2018/03/arts-craft-movement-revival-2.jpeg 750w, https://mymodernmet.com/wp/wp-content/uploads/2018/03/arts-craft-movement-revival-2-300x196.jpeg 300w" decoding="async" height="490" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mymodernmet.com/wp/wp-content/uploads/2018/03/arts-craft-movement-revival-2.jpeg&amp;raw" srcset="https://mymodernmet.com/wp/wp-content/uploads/2018/03/arts-craft-movement-revival-2.jpeg 750w, https://mymodernmet.com/wp/wp-content/uploads/2018/03/arts-craft-movement-revival-2-300x196.jpeg 300w" width="750"><noscript data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">&lt;img aria-describedby="caption-attachment-132941" class="lazyload size-full wp-image-132941" decoding="async" src="https://mymodernmet.com/wp/wp-content/uploads/2018/03/arts-craft-movement-revival-2.jpeg" alt="Arts and Crafts Movement Revival" width="750" height="490" srcset="https://mymodernmet.com/wp/wp-content/uploads/2018/03/arts-craft-movement-revival-2.jpeg 750w, https://mymodernmet.com/wp/wp-content/uploads/2018/03/arts-craft-movement-revival-2-300x196.jpeg 300w" sizes="(max-width: 750px) 100vw, 750px" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="1532" id="caption-attachment-132941"><span data-dcnode-id="1535" instrument_node="">Photo: </span><a data-dcnode-id="1533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pexels.com/photo/adult-arts-and-crafts-clay-dirty-357428/%25E2%2580%259D%2520target%3D"><span data-dcnode-id="1534" instrument_node="">Pixabay</span></a></p></div><span data-dcnode-id="1530" instrument_node="">
</span><p data-dcnode-id="1513"><span data-dcnode-id="1529" instrument_node="">During the original Arts and Crafts movement, pottery was produced by companies such as </span><a data-dcnode-id="1527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grueby_Faience_Company" rel="noopener" target="_blank"><span data-dcnode-id="1528" instrument_node="">Grueby</span></a><span data-dcnode-id="1526" instrument_node="">, </span><a data-dcnode-id="1524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.marbleheadpottery.net/marblehead_pottery_site/WELCOME.html" rel="noopener" target="_blank"><span data-dcnode-id="1525" instrument_node="">Marblehead</span></a><span data-dcnode-id="1523" instrument_node="">, </span><a data-dcnode-id="1521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.arts-crafts.com/archive/pottery/newcomb.shtml" rel="noopener" target="_blank"><span data-dcnode-id="1522" instrument_node="">Newcomb College</span></a><span data-dcnode-id="1520" instrument_node="">, </span><a data-dcnode-id="1518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Teco_pottery" rel="noopener" target="_blank"><span data-dcnode-id="1519" instrument_node="">Teco</span></a><span data-dcnode-id="1517" instrument_node="">, and </span><a data-dcnode-id="1515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shop.rookwoodpottery.com/" rel="noopener" target="_blank"><span data-dcnode-id="1516" instrument_node="">Rookwood</span></a><span data-dcnode-id="1514" instrument_node="">. Their production methods usually relied on the preference of just one individual, who would have crafted the works by hand using a pottery wheel. Today, many small studio potters are rejecting mass production techniques and returning to traditional roots, working by hand to produce limited edition, or one-of-a-kind ceramics.</span></p><span data-dcnode-id="1512" instrument_node="">
</span><p data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1509" instrument_node="">

</span><p data-dcnode-id="1092"><span data-dcnode-id="1099" instrument_node="">Texas-based potter </span><a data-dcnode-id="1097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.angeloloshove.com/" rel="noopener" target="_blank"><span data-dcnode-id="1098" instrument_node="">Angel Oloshove</span></a><span data-dcnode-id="1096" instrument_node=""> creates mesmerizing, wheel-spun vessels that feature rainbow-coloured glazes in soft gradients. She’s currently an artist-in-resident at Houston’s </span><a data-dcnode-id="1094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.crafthouston.org/" rel="noopener" target="_blank"><span data-dcnode-id="1095" instrument_node="">Center for Contemporary Craft</span></a><span data-dcnode-id="1093" instrument_node="">, where they’re “Dedicated exclusively to craft at the highest level.”</span></p><span data-dcnode-id="1091" instrument_node="">

</span><h3 data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Emma Taggart</span></h3><span data-dcnode-id="1063" instrument_node="">
</span><div class="author-description-contents" data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">
                            Emma Taggart is a Contributing Writer at My Modern Met. Originally from Northern Ireland, she is an artist now based in Berlin. After graduating with a BA in Fashion and Textile Design in 2013, Emma decided to combine her love of art with her passion for writing. Emma has contributed to various art and culture publications, with an aim to promote and share the work of inspiring modern creatives. While she writes every day, she’s also devoted to her own creative outlet—Emma hand-draws illustrations and is currently learning 2D animation.                        </span></div><span data-dcnode-id="1060" instrument_node="">
