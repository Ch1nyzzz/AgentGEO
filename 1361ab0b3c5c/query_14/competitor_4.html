</span><h1 class="entry-title entry-title-page" data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">Arts and Crafts</span></h1><span data-dcnode-id="1558" instrument_node="">
</span></header><span data-dcnode-id="1556" instrument_node="">
</span><div class="entry-content page-content" data-dcnode-id="426"><span data-dcnode-id="1555" instrument_node="">
</span><div class="no_bullets" data-dcnode-id="1509" id="toc_container"><p class="toc_title" data-dcnode-id="1547"><span data-dcnode-id="1554" instrument_node="">Contents</span><span data-dcnode-id="1553" instrument_node=""> </span><span class="toc_toggle" data-dcnode-id="1548"><span data-dcnode-id="1552" instrument_node="">[</span><a data-dcnode-id="1550" href="#"><span data-dcnode-id="1551" instrument_node="">hide</span></a><span data-dcnode-id="1549" instrument_node="">]</span></span></p><ul class="toc_list" data-dcnode-id="1510"><li data-dcnode-id="1511"><a data-dcnode-id="1545" href="#Your_Guide_to_Collecting_Arts_Crafts_antiques_and_the_Arts_and_Crafts_Style"><span data-dcnode-id="1546" instrument_node="">Your Guide to Collecting Arts &amp; Crafts antiques and the Arts and Crafts Style</span></a><ul data-dcnode-id="1512"><li data-dcnode-id="1538"><ul data-dcnode-id="1539"><li data-dcnode-id="1540"><ul data-dcnode-id="1541"><li data-dcnode-id="1542"><a data-dcnode-id="1543" href="#The_arts_and_crafts_movement_was_the_parent_of_art_nouveau_but_it_persisted_into_the_new_period_and_after_1900_merged_into_the_mainstream_of_the_newer_style"><span data-dcnode-id="1544" instrument_node="">The arts and crafts movement was the parent of art nouveau, but it persisted into the new period and after 1900 merged into the mainstream of the newer style.</span></a></li></ul></li></ul></li><li data-dcnode-id="1535"><a data-dcnode-id="1536" href="#The_art_and_architectural_criticism_of_Ruskin_laid_the_foundation_of_the_arts_and_crafts_movement"><span data-dcnode-id="1537" instrument_node="">The art and architectural criticism of Ruskin, laid the foundation of the arts and crafts movement</span></a></li><li data-dcnode-id="1528"><a data-dcnode-id="1533" href="#The_Arts_Crafts_Movement_also_shaped_American_architecture"><span data-dcnode-id="1534" instrument_node="">The Arts &amp; Crafts Movement also shaped American architecture</span></a><ul data-dcnode-id="1529"><li data-dcnode-id="1530"><a data-dcnode-id="1531" href="#Arts_Crafts_Movement_ideas_were_given_an_even_wider_audience_during_the_1882_American_tour_of_Oscar_Wilde"><span data-dcnode-id="1532" instrument_node="">Arts &amp; Crafts Movement ideas were given an even wider audience during the 1882 American tour of Oscar Wilde.</span></a></li></ul></li><li data-dcnode-id="1516"><a data-dcnode-id="1526" href="#What_to_look_for_when_designing_your_authentic_arts_crafts_interior"><span data-dcnode-id="1527" instrument_node="">What to look for when designing your authentic arts &amp; crafts interior.</span></a><ul data-dcnode-id="1517"><li data-dcnode-id="1518"><ul data-dcnode-id="1519"><li data-dcnode-id="1523"><a data-dcnode-id="1524" href="#Oriental_Influences_should_feature_and_add_a_sense_of_the_Orient_by_adding_blue_and_white_china_palm_leaf_fans_screens_and_oriental_rugs"><span data-dcnode-id="1525" instrument_node="">Oriental Influences should feature and add a sense of the Orient by adding blue and white china, palm leaf fans, screens and oriental rugs.</span></a></li><li data-dcnode-id="1520"><a data-dcnode-id="1521" href="#Follow_the_William_Morris_Codex_8211"><span data-dcnode-id="1522" instrument_node="">Follow the William Morris Codex –</span></a></li></ul></li></ul></li><li data-dcnode-id="1513"><a data-dcnode-id="1514" href="#A_chronological_history_of_the_arts_and_crafts_movement"><span data-dcnode-id="1515" instrument_node="">A chronological history of the arts and crafts movement.</span></a></li></ul></li></ul></div><span data-dcnode-id="1508" instrument_node="">
</span><h2 data-dcnode-id="1505"><span data-dcnode-id="1506" id="Your_Guide_to_Collecting_Arts_Crafts_antiques_and_the_Arts_and_Crafts_Style"><span data-dcnode-id="1507" instrument_node="">Your Guide to Collecting Arts &amp; Crafts antiques and the Arts and Crafts Style</span></span></h2><span data-dcnode-id="1504" instrument_node="">
</span><p data-dcnode-id="1501"><strong data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">The Arts and Crafts movement, its style and its influences, from William Morris to Gustav Stickley and William de Morgan.</span></strong></p><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1495"><span data-dcnode-id="1499" instrument_node="">In 1861 the english designer William Morris started the </span><a data-dcnode-id="1497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//antique-marks.com/antique-terms.html%23arts-and-crafts"><span data-dcnode-id="1498" instrument_node="">arts and crafts </span></a><span data-dcnode-id="1496" instrument_node=""> movement in an effort to improve the tastes of the victorian public.</span></p><span data-dcnode-id="1494" instrument_node="">
</span><p data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">William Morris hoped to overcome the banality and inferior quality of industrially produced decorative arts by promoting a return to medieval style craftsmanship.</span></p><span data-dcnode-id="1491" instrument_node="">
</span><h5 data-dcnode-id="1488"><span data-dcnode-id="1489" id="The_arts_and_crafts_movement_was_the_parent_of_art_nouveau_but_it_persisted_into_the_new_period_and_after_1900_merged_into_the_mainstream_of_the_newer_style"><span data-dcnode-id="1490" instrument_node="">The arts and crafts movement was the parent of art nouveau, but it persisted into the new period and after 1900 merged into the mainstream of the newer style.</span></span></h5><span data-dcnode-id="1487" instrument_node="">
</span><p data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Another development that influenced art nouveau was the aesthetic movement, an english decorative arts style created by followers of william morris during the 1880s.&lt;/p.</span></p><span data-dcnode-id="1484" instrument_node="">
</span><p data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">The aesthetic movement took its sources from medieval art, as did its arts and crafts counterpart, but it adapted the newly discovered arts of Japan as well. It survived for only a decade, and much of the style was absorbed into Art Nouveau.</span></p><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1477"><img alt="arts and crafts hare tile by william de morgan c1872" class="frame alignright entered lazyloaded" data-dcnode-id="1480" data-lazy-src="https://antique-marks.com/image-files/arts-and-crafts-hare-tile.jpg" data-ll-status="loaded" height="35%" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//antique-marks.com/image-files/arts-and-crafts-hare-tile.jpg&amp;raw" width="35%"><noscript data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">&lt;img class="frame alignright" src="https://antique-marks.com/image-files/arts-and-crafts-hare-tile.jpg" alt="arts and crafts hare tile by william de morgan c1872" width="35%" height="35%" /&gt;</span></noscript></p><span data-dcnode-id="1476" instrument_node="">
</span><p data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">Some of the William Morris inspired fabrics and wallpapers of Walter Crane, Charles Voysey, and Arthur Macmurdo (1851-1942), designed in 1882, could easily be mistaken for Art Nouveau circa 1895.</span></p><span data-dcnode-id="1473" instrument_node="">
</span><h3 data-dcnode-id="1470"><span data-dcnode-id="1471" id="The_art_and_architectural_criticism_of_Ruskin_laid_the_foundation_of_the_arts_and_crafts_movement"><span data-dcnode-id="1472" instrument_node="">The art and architectural criticism of Ruskin, laid the foundation of the arts and crafts movement</span></span></h3><span data-dcnode-id="1469" instrument_node="">
</span><p data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">And lectures on the decorative arts of William Morris were available at the Boston Athenaeum and other American libraries as soon as they were published in London.</span></p><span data-dcnode-id="1466" instrument_node="">
</span><p data-dcnode-id="1463"><strong data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">In 1873 William Morris &amp; Company began to sell their wallpapers in Boston and by the mid-1870s had representatives for their growing line of wallpaper, fabric and carpet, in many major American cities.</span></strong></p><span data-dcnode-id="1462" instrument_node="">
</span><div class="hr hr-dotted" data-dcnode-id="1461"></div><span data-dcnode-id="1460" instrument_node="">
</span><h3 data-dcnode-id="1457"><span data-dcnode-id="1458" id="The_Arts_Crafts_Movement_also_shaped_American_architecture"><span data-dcnode-id="1459" instrument_node="">The Arts &amp; Crafts Movement also shaped American architecture</span></span></h3><span data-dcnode-id="1456" instrument_node="">
</span><p data-dcnode-id="1452"><img alt="arts and crafts chandelier - hammered brass fixture with three brackets supporting gold glass shades with copper overlay design" class="alignright entered lazyloaded" data-dcnode-id="1455" data-lazy-src="https://antique-marks.com/image-files/arts-and-crafts-chandelier.jpg" data-ll-status="loaded" height="368" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//antique-marks.com/image-files/arts-and-crafts-chandelier.jpg&amp;raw" width="180"><noscript data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">&lt;img class="alignright" src="https://antique-marks.com/image-files/arts-and-crafts-chandelier.jpg" alt="arts and crafts chandelier - hammered brass fixture with three brackets supporting gold glass shades with copper overlay design" width="180" height="368" /&gt;</span></noscript></p><span data-dcnode-id="1451" instrument_node="">
</span><p data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Especially with the development of the Queen Anne Revival, and with emerging styles that were based on the “old-fashioned homes” of the American Colonial period: the Shingle Style and the Old Colony Style.</span></p><span data-dcnode-id="1448" instrument_node="">
</span><p data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">The first generation of arts &amp; crafts employed a diverse expression of styles, which drew inspiration from England, but also from Japan and from the regional crafts and architecture of America</span></p><span data-dcnode-id="1445" instrument_node="">
</span><h4 data-dcnode-id="1442"><span data-dcnode-id="1443" id="Arts_Crafts_Movement_ideas_were_given_an_even_wider_audience_during_the_1882_American_tour_of_Oscar_Wilde"><span data-dcnode-id="1444" instrument_node="">Arts &amp; Crafts Movement ideas were given an even wider audience during the 1882 American tour of Oscar Wilde.</span></span></h4><span data-dcnode-id="1441" instrument_node="">
</span><p data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">He championed Morris, the Pre-Raphaelites and the design and art-manufacturing philosophy in lectures presented in over 120 North American towns and cities.</span></p><span data-dcnode-id="1438" instrument_node="">
</span><p data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">By the mid-1880’s, English designs and locally made Arts &amp; Crafts products were specified by trendsetting American architects and selected by affluent homeowners for the most stylish and fashionable American townhouses, suburban cottages and country villas.</span></p><span data-dcnode-id="1435" instrument_node="">
</span><p data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">It was the children who grew up in these artistic homes of the 1880s who became patrons of Gustav Stickley, who subscribed to the Craftsman Magazine, and who built bungalows for their first homes.</span></p><span data-dcnode-id="1432" instrument_node="">
</span><div class="hr hr-dotted" data-dcnode-id="1431"></div><span data-dcnode-id="1430" instrument_node="">
</span><h3 data-dcnode-id="1427"><span data-dcnode-id="1428" id="What_to_look_for_when_designing_your_authentic_arts_crafts_interior"><span data-dcnode-id="1429" instrument_node="">What to look for when designing your authentic arts &amp; crafts interior.</span></span></h3><span data-dcnode-id="1426" instrument_node="">
</span><p data-dcnode-id="1422"><strong data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">Colour schemes</span></strong><span data-dcnode-id="1423" instrument_node=""> – Use natural creams, terracotta, mustard yellow, olive green, deep blue and a deep crimson.</span></p><span data-dcnode-id="1421" instrument_node="">
</span><p data-dcnode-id="1417"><img alt="modern arts and crafts interior" class="frame alignright entered lazyloaded" data-dcnode-id="1420" data-lazy-src="https://antique-marks.com/image-files/arts-crafts-modern-interior.jpg" data-ll-status="loaded" height="287" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//antique-marks.com/image-files/arts-crafts-modern-interior.jpg&amp;raw" width="294"><noscript data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">&lt;img class="frame alignright" src="https://antique-marks.com/image-files/arts-crafts-modern-interior.jpg" alt="modern arts and crafts interior" width="294" height="287" /&gt;</span></noscript></p><span data-dcnode-id="1416" instrument_node="">
</span><p data-dcnode-id="1412"><strong data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">Walls</span></strong><span data-dcnode-id="1413" instrument_node=""> – Wood panelling to be truly authentic and it should be painted a muted green or greeny-blue. Sherwin-Williams have a range of historic palettes, including an arts &amp; crafts range that shows good combinations of colours.</span></p><span data-dcnode-id="1411" instrument_node="">
</span><p data-dcnode-id="1407"><strong data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">Wallpaper</span></strong><span data-dcnode-id="1408" instrument_node=""> – was the key decoration. Original patterns used vegetable dyes and wood blocks. However, hundreds of original William Morris designs are still manufactured by the major companies like Sanderson. Patterns should be on a large-scale with repeats. Sanderson bought the original printing blocks from Morris’s firm when it closed down.</span></p><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1402"><strong data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">Floors</span></strong><span data-dcnode-id="1403" instrument_node=""> – Should be natural wood in either parquet or boards in oak and give a rustic feel. They should be polished or stained to a dark gloss finish that reflects the light.</span></p><span data-dcnode-id="1401" instrument_node="">
</span><p data-dcnode-id="1397"><strong data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">Furniture</span></strong><span data-dcnode-id="1398" instrument_node=""> – Handmade natural wood furniture. Oak is the wood to look for. Decoration should feature cut-outs of upside down hearts; pieces with copper inlays and leather straps. Chairs should have rush or leather seats.</span></p><span data-dcnode-id="1396" instrument_node="">
</span><p data-dcnode-id="1392"><strong data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">Fireplaces</span></strong><span data-dcnode-id="1393" instrument_node=""> – An original arts and crafts fireplace should dominate a room with huge wide hearths set in an inglenook or recess. The mantelpiece should be carved oak, often with a motto above it.</span></p><span data-dcnode-id="1391" instrument_node="">
</span><p data-dcnode-id="1387"><strong data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">Tiling</span></strong><span data-dcnode-id="1388" instrument_node=""> – should be art nouveau in style with brighter colours – cobalt blue, turquoise, greens and reds. Typical motifs include galleons and stylised flowers. Originals are available in salvage yards. Reproductions are available from large outlets.</span></p><span data-dcnode-id="1386" instrument_node="">
</span><h5 data-dcnode-id="1383"><span data-dcnode-id="1384" id="Oriental_Influences_should_feature_and_add_a_sense_of_the_Orient_by_adding_blue_and_white_china_palm_leaf_fans_screens_and_oriental_rugs"><span data-dcnode-id="1385" instrument_node="">Oriental Influences should feature and add a sense of the Orient by adding blue and white china, palm leaf fans, screens and oriental rugs.</span></span></h5><span data-dcnode-id="1382" instrument_node="">
</span><p data-dcnode-id="1378"><strong data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">Stained glass</span></strong><span data-dcnode-id="1379" instrument_node=""> – was a very popular addition and enhanced the medieval feel. There are still stained glass designers around or the modern equivalent is available as an option from double glazing companies.</span></p><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1373"><strong data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">Curtains</span></strong><span data-dcnode-id="1374" instrument_node=""> – Should be supported by plain wooden or brass curtain poles. Curtains shouldn’t have any frills or flounces.</span></p><span data-dcnode-id="1372" instrument_node="">
</span><p data-dcnode-id="1368"><strong data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">Lighting</span></strong><span data-dcnode-id="1369" instrument_node=""> – Well made plain wall sconces with good lines and well formed glass shades. Nothing dangling or overly ornate.</span></p><span data-dcnode-id="1367" instrument_node="">
</span><p data-dcnode-id="1363"><strong data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">Flowers</span></strong><span data-dcnode-id="1364" instrument_node=""> – Enhance the decoration using simple flower arrangements or use green house plants such as potted palms or cheese plants.</span></p><span data-dcnode-id="1362" instrument_node="">
</span><h5 data-dcnode-id="1359"><span data-dcnode-id="1360" id="Follow_the_William_Morris_Codex_8211"><span data-dcnode-id="1361" instrument_node="">Follow the William Morris Codex –</span></span></h5><span data-dcnode-id="1358" instrument_node="">
</span><blockquote data-dcnode-id="1355"><p data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">Have nothing in your house that you do not know to be useful or believe to be beautiful</span></p></blockquote><span data-dcnode-id="1354" instrument_node="">
</span><div class="hr hr-dotted" data-dcnode-id="1353"></div><span data-dcnode-id="1352" instrument_node="">
</span><h3 data-dcnode-id="1349"><span data-dcnode-id="1350" id="A_chronological_history_of_the_arts_and_crafts_movement"><span data-dcnode-id="1351" instrument_node="">A chronological history of the arts and crafts movement.</span></span></h3><span data-dcnode-id="1348" instrument_node="">
</span><p data-dcnode-id="1344"><strong data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">1819</span></strong><span data-dcnode-id="1345" instrument_node=""> – Birth of John Ruskin.</span></p><span data-dcnode-id="1343" instrument_node="">
</span><p data-dcnode-id="1336"><strong data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">1834</span></strong><span data-dcnode-id="1340" instrument_node=""> – </span><a data-dcnode-id="1338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//antique-marks.com/william-morris.html"><span data-dcnode-id="1339" instrument_node="">Birth of William Morris</span></a><span data-dcnode-id="1337" instrument_node="">.</span></p><span data-dcnode-id="1335" instrument_node="">
</span><p data-dcnode-id="1331"><strong data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">1848</span></strong><span data-dcnode-id="1332" instrument_node=""> – Pre-Raphaelite Brotherhood formed and first Pre-Raphaelite works exhibited.</span></p><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1326"><strong data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">1849</span></strong><span data-dcnode-id="1327" instrument_node=""> – Paris: 11th Trade Exhibition. Visited by Henry Cole, and Matthew Digby Wyatt, who had been asked to prepare a report on the Exhibition for the Society of Arts. It was this exhibition which was the inspiration for the Great Exhibition organized by Henry Cole and Prince Albert.</span></p><span data-dcnode-id="1325" instrument_node="">
</span><p data-dcnode-id="1321"><strong data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">1851</span></strong><span data-dcnode-id="1322" instrument_node="">– London: the ‘Great Exhibition’ (the Great Exhibition of the Works of Industry of All Nations), held under the direction of the Prince Consort and Sir Henry Cole. Allegedly visited by Morris, then aged 17, who was nauseated by the tasteless and materialistic display.</span></p><span data-dcnode-id="1320" instrument_node="">
</span><p data-dcnode-id="1316"><strong data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">1853</span></strong><span data-dcnode-id="1317" instrument_node=""> – Great Industrial Exhibition, Dublin.</span></p><span data-dcnode-id="1315" instrument_node="">
</span><ul data-dcnode-id="1310"><span data-dcnode-id="1314" instrument_node="">
</span><li data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">World’s Fair of the works of Industry of all Nations, New York.</span></li><span data-dcnode-id="1311" instrument_node="">
</span></ul><span data-dcnode-id="1309" instrument_node="">
</span><p data-dcnode-id="1305"><strong data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">1854</span></strong><span data-dcnode-id="1306" instrument_node=""> – Working Men’s college started in London by F.D. Maurice</span></p><span data-dcnode-id="1304" instrument_node="">
</span><p data-dcnode-id="1300"><strong data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">1855</span></strong><span data-dcnode-id="1301" instrument_node=""> – Paris: L’Exposition Universelles des Produits de l’Industrie de toutes les Nations, included the works of the Pre-Raphaelites which had a considerable influence on the French Realist School.</span></p><span data-dcnode-id="1299" instrument_node="">
</span><p data-dcnode-id="1295"><strong data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">1856</span></strong><span data-dcnode-id="1296" instrument_node=""> – Owen Jones’ ‘The Grammar of Ornament’ published, the first book to have full colour plates coloured by chromolithography.</span></p><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1290"><strong data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">1857</span></strong><span data-dcnode-id="1291" instrument_node=""> – American Institute of Architects founded in New York.</span></p><span data-dcnode-id="1289" instrument_node="">
</span><ul data-dcnode-id="1281"><span data-dcnode-id="1288" instrument_node="">
</span><li data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">October: An exhibition of British painting opened in New York, going on to Washington, Philadelphia and Boston, including Pre-Raphaelite works assembled by Ernest Gambart.</span></li><span data-dcnode-id="1285" instrument_node="">
</span><li data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Rossetti undertook the decoration of the Oxford Union Library with the assistance of William Morris and other members of the pre-Raphaelite circle.</span></li><span data-dcnode-id="1282" instrument_node="">
</span></ul><span data-dcnode-id="1280" instrument_node="">
</span><p data-dcnode-id="1276"><strong data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">1859</span></strong><span data-dcnode-id="1277" instrument_node=""> – Planning and building of Morris’ Red House by Philip Webb at Upton in Kent.</span></p><span data-dcnode-id="1275" instrument_node="">
</span><ul data-dcnode-id="1270"><span data-dcnode-id="1274" instrument_node="">
</span><li data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">Furniture designed, especially made and decorated for the house by Morris, Web, Rossetti and Burne-Jones. The interior was decorated with fresco painting.</span></li><span data-dcnode-id="1271" instrument_node="">
</span></ul><span data-dcnode-id="1269" instrument_node="">
</span><p data-dcnode-id="1265"><strong data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">1861</span></strong><span data-dcnode-id="1266" instrument_node=""> – Morris, Marshall, Faulkner &amp; Co. founded to provide the type of furniture so conspicuously lacking in the mid nineteenth century – solidly constructed and without superfluous ornament. Madox Brown, Rossetti and Burne-Jones all worked for the firm, as did Arthur Hughes, another Pre-Raphaelite, albeit briefly. The foreman glass worker was George Campfield, a recruit from the Working Men’s College.</span></p><span data-dcnode-id="1264" instrument_node="">
</span><p data-dcnode-id="1260"><img alt="antique marks - arts and crafts morris wallpaper" class="frame alignright entered lazyloaded" data-dcnode-id="1263" data-lazy-src="https://antique-marks.com/image-files/arts-crafts-wallpaper.jpg" data-ll-status="loaded" height="45%" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//antique-marks.com/image-files/arts-crafts-wallpaper.jpg&amp;raw" width="45%"><noscript data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">&lt;img class="frame alignright" src="https://antique-marks.com/image-files/arts-crafts-wallpaper.jpg" alt="antique marks - arts and crafts morris wallpaper" width="45%" height="45%" /&gt;</span></noscript></p><span data-dcnode-id="1259" instrument_node="">
</span><p data-dcnode-id="1255"><strong data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">1862</span></strong><span data-dcnode-id="1256" instrument_node=""> – London: International Exhibition. Included a stand furnished by Morris &amp; Co. which was praised for archaeological exactness of their imitation of the style of the Middle Ages, and the first Japanese art and crafts works to be widely seen, which had an immediate and widespread effect on the design of the period.</span></p><span data-dcnode-id="1254" instrument_node="">
</span><p data-dcnode-id="1250"><strong data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">1866</span></strong><span data-dcnode-id="1251" instrument_node=""> – Morris &amp; Co. undertook two important commissions; the decoration of the Green Dining Room at the South Kensington Museum and of the Armoury and Tapestry Room at St. James’s Palace.</span></p><span data-dcnode-id="1249" instrument_node="">
</span><p data-dcnode-id="1245"><strong data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">1867</span></strong><span data-dcnode-id="1246" instrument_node=""> – Paris: L’Exposition Universelle</span></p><span data-dcnode-id="1244" instrument_node="">
</span><p data-dcnode-id="1240"><strong data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">1871</span></strong><span data-dcnode-id="1241" instrument_node=""> – 1st South Kensington Exhibition.</span></p><span data-dcnode-id="1239" instrument_node="">
</span><ul data-dcnode-id="1234"><span data-dcnode-id="1238" instrument_node="">
</span><li data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">Ruskin’s ‘Fors Clavigera’ began to appear in instalments and was eagerly read by A.H. Mackmurdo, amongst others.</span></li><span data-dcnode-id="1235" instrument_node="">
</span></ul><span data-dcnode-id="1233" instrument_node="">
</span><p data-dcnode-id="1229"><strong data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">1872</span></strong><span data-dcnode-id="1230" instrument_node=""> – 2nd South Kensington Exhibition.</span></p><span data-dcnode-id="1228" instrument_node="">
</span><ul data-dcnode-id="1221"><span data-dcnode-id="1227" instrument_node="">
</span><li data-dcnode-id="1223"><a data-dcnode-id="1225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//antique-marks.com/william-de-morgan.html"><span data-dcnode-id="1226" instrument_node="">William De Morgan</span></a><span data-dcnode-id="1224" instrument_node="">, who had been working since the early days of the firm for Morris &amp; Co., set up his own pottery in Chelsea.</span></li><span data-dcnode-id="1222" instrument_node="">
</span></ul><span data-dcnode-id="1220" instrument_node="">
</span><p data-dcnode-id="1213"><strong data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">1873</span></strong><span data-dcnode-id="1217" instrument_node=""> – ‘</span><a data-dcnode-id="1215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//antique-marks.com/martin-brothers.html"><span data-dcnode-id="1216" instrument_node="">Martin Brothers</span></a><span data-dcnode-id="1214" instrument_node="">‘ pottery established by the brothers Robert, Wallace, Edwin and Charles Martin in Fulham.</span></p><span data-dcnode-id="1212" instrument_node="">
</span><ul data-dcnode-id="1204"><span data-dcnode-id="1211" instrument_node="">
</span><li data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">Vienna: Universal Exhibition.</span></li><span data-dcnode-id="1208" instrument_node="">
</span><li data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">3rd South Kensington Exhibition.</span></li><span data-dcnode-id="1205" instrument_node="">
</span></ul><span data-dcnode-id="1203" instrument_node="">
</span><p data-dcnode-id="1199"><strong data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">1874</span></strong><span data-dcnode-id="1200" instrument_node=""> – Morris began his experiments with fabric design.</span></p><span data-dcnode-id="1198" instrument_node="">
</span><ul data-dcnode-id="1193"><span data-dcnode-id="1197" instrument_node="">
</span><li data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">4th South Kensington Exhibition.</span></li><span data-dcnode-id="1194" instrument_node="">
</span></ul><span data-dcnode-id="1192" instrument_node="">
</span><p data-dcnode-id="1185"><strong data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">1875</span></strong><span data-dcnode-id="1189" instrument_node=""> – Formation of </span><a data-dcnode-id="1187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//antique-marks.com/art-nouveau-liberty.html"><span data-dcnode-id="1188" instrument_node="">‘Liberty &amp; Co</span></a><span data-dcnode-id="1186" instrument_node="">.’, a shop specializing in Oriental art and artifacts. Patrons of the new shop included E.W. Godwin, D.G. Rossetti, Burne-Jones and Whistler.</span></p><span data-dcnode-id="1184" instrument_node="">
</span><ul data-dcnode-id="1174"><span data-dcnode-id="1183" instrument_node="">
</span><li data-dcnode-id="1179"><a data-dcnode-id="1181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//antique-marks.com/arts-and-crafts-artists.html%23dresser"><span data-dcnode-id="1182" instrument_node="">Christopher Dresser</span></a><span data-dcnode-id="1180" instrument_node="">, after his visit to Japan, attempted to open a business selling Oriental goods (Dresser and Holme set up in 1878 in Farringdon Road) and in 1880 was appointed Art Manager of the Art Furnishers’ Alliance. Both businesses failed. Dresser’s son Louis, however, later worked for Liberty &amp; Co.</span></li><span data-dcnode-id="1178" instrument_node="">
</span><li data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">Jonathan T. Carr began the building of Bedford Park, Chiswick, employing E.W. Godwin and Norman Shaw as architects. Completed in 1881, it was an attempt to create a colony of artistic interiors. W.B. Yeats was among the first to live there.</span></li><span data-dcnode-id="1175" instrument_node="">
</span></ul><span data-dcnode-id="1173" instrument_node="">
</span><p data-dcnode-id="1169"><strong data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">1876</span></strong><span data-dcnode-id="1170" instrument_node=""> – Philadelphia: Centennial Exposition. The displays of both Oriental pottery and E. Chaplet’s ‘Limoges’ glazes influenced studio potters in America, especially Hugh C. Robertson and M. Louise McLaughlin.</span></p><span data-dcnode-id="1168" instrument_node="">
</span><ul data-dcnode-id="1160"><span data-dcnode-id="1167" instrument_node="">
</span><li data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Christopher Dresser lectured in Philadelphia and his influence can clearly be seen in the change of style of Daniel Pabst’s work, which had been exhibited that year.</span></li><span data-dcnode-id="1164" instrument_node="">
</span><li data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">Dresser was commissioned to make a collection of Japanese artifacts, including glass, for Tiffany &amp; Co. while he was in Japan in 1877.</span></li><span data-dcnode-id="1161" instrument_node="">
</span></ul><span data-dcnode-id="1159" instrument_node="">
</span><p data-dcnode-id="1152"><strong data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">1877</span></strong><span data-dcnode-id="1156" instrument_node=""> – M. Louise McLaughlin developed </span><a data-dcnode-id="1154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//antique-marks.com/antique-terms-l.html%23limoges"><span data-dcnode-id="1155" instrument_node="">‘Limoges’</span></a><span data-dcnode-id="1153" instrument_node=""> underglaze painting.</span></p><span data-dcnode-id="1151" instrument_node="">
</span><ul data-dcnode-id="1140"><span data-dcnode-id="1150" instrument_node="">
</span><li data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">New York Society of Decorative art founded 24th February.</span></li><span data-dcnode-id="1147" instrument_node="">
</span><li data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Martin Bros. Move from Fulham to Southall.</span></li><span data-dcnode-id="1144" instrument_node="">
</span><li data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">Morris founded ‘Anti-Scrape’, the ‘Society for the Protection of Ancient Buildings’</span></li><span data-dcnode-id="1141" instrument_node="">
</span></ul><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1135"><strong data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">1878</span></strong><span data-dcnode-id="1136" instrument_node=""> – Herter Brothers of New York designed the interior of the Mark Hopkins House in San Francisco, to which the California School of Design moved in 1893.</span></p><span data-dcnode-id="1134" instrument_node="">
</span><ul data-dcnode-id="1126"><span data-dcnode-id="1133" instrument_node="">
</span><li data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Paris: L’Exposition Universelle.</span></li><span data-dcnode-id="1130" instrument_node="">
</span><li data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">London: International Exhibition at South Kensington.</span></li><span data-dcnode-id="1127" instrument_node="">
</span></ul><span data-dcnode-id="1125" instrument_node="">
</span><p data-dcnode-id="1121"><strong data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">1879</span></strong><span data-dcnode-id="1122" instrument_node=""> – C.H. Brannam Ltd. Established in Barnstable, Devon by Charles Brannam for the production of art pottery, known as ‘Barum Ware’, which was featured in later Liberty &amp; Co. catalogues.</span></p><span data-dcnode-id="1120" instrument_node="">
</span><ul data-dcnode-id="1105"><span data-dcnode-id="1119" instrument_node="">
</span><li data-dcnode-id="1113"><a data-dcnode-id="1117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//antique-marks.com/tiffany.html"><span data-dcnode-id="1118" instrument_node="">Louis C. Tiffany &amp; Co</span></a><span data-dcnode-id="1116" instrument_node="">., Associated Artists, founded in New York with the co-operation of Candace</span><br data-dcnode-id="1115"><span data-dcnode-id="1114" instrument_node="">
Wheeler and the Society of Decorative Art.</span></li><span data-dcnode-id="1112" instrument_node="">
</span><li data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">Women’s Pottery Club founded in Cincinnati to provide useful and artistic means of gaining an income for women.</span></li><span data-dcnode-id="1109" instrument_node="">
</span><li data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">London: International Exhibition at South Kensington.</span></li><span data-dcnode-id="1106" instrument_node="">
</span></ul><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1097"><strong data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">1880</span></strong><span data-dcnode-id="1101" instrument_node=""> – </span><a data-dcnode-id="1099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//antique-marks.com/rookwood-pottery.html" title="Rookwood Pottery History &amp; Rookwood Marks"><span data-dcnode-id="1100" instrument_node="">Rookwood pottery</span></a><span data-dcnode-id="1098" instrument_node=""> founded in Cincinnati.</span></p><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1092"><strong data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">1881</span></strong><span data-dcnode-id="1093" instrument_node=""> – Fourth American edition of Eastlake’s ‘Hints on Household Taste’ published. It was first serialised in ‘Queen’, 1865-6 and proved incredibly successful in America, giving rise to the ‘Eastlake Style’.</span></p><span data-dcnode-id="1091" instrument_node="">
</span><ul data-dcnode-id="1086"><span data-dcnode-id="1090" instrument_node="">
</span><li data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Aller Vale Pottery re-organised for the production of art pottery after a fire had destroyed the old factory.</span></li><span data-dcnode-id="1087" instrument_node="">
</span></ul><span data-dcnode-id="1085" instrument_node="">
</span><p data-dcnode-id="1081"><strong data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">1882</span></strong><span data-dcnode-id="1082" instrument_node=""> – Partnership of Henry Tooth and William Ault established the Bretby Art Pottery.</span></p><span data-dcnode-id="1080" instrument_node="">
</span><ul data-dcnode-id="1066"><span data-dcnode-id="1079" instrument_node="">
</span><li data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Messrs Wilcox of Leeds began the manufacture of Burmantofts Faience which continued until 1904.</span></li><span data-dcnode-id="1076" instrument_node="">
</span><li data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">Oscar Wilde, undertook a wildly successful eighteen months lecture tour of America, preaching the Aesthetic ideal of art and decoration.</span></li><span data-dcnode-id="1073" instrument_node="">
</span><li data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">Century Guild founded by A.H. Mackmurdo, Selwyn Image and Herbert P. Horne.</span></li><span data-dcnode-id="1070" instrument_node="">
</span><li data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">The architect H.H. Richardson traveled to Europe and visited Morris at Merton Abbey and here he met Burne-Jones and showed ‘unbounded enthusiasm’ for De Morgan’s work.</span></li><span data-dcnode-id="1067" instrument_node="">
</span></ul><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1061"><strong data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">1882/3</span></strong><span data-dcnode-id="1062" instrument_node=""> – L.C. Tiffany &amp; Co., Associated Artists, decorated the White House.</span></p><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1056"><strong data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">1883</span></strong><span data-dcnode-id="1057" instrument_node=""> – Mackmurdo’s book on ‘Wren’s City Churches’ published with the famous title page, now seen as a seminal influence on Art Nouveau.</span></p><span data-dcnode-id="1055" instrument_node="">
</span><ul data-dcnode-id="1047"><span data-dcnode-id="1054" instrument_node="">
</span><li data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">The Ladies Home Journal founded in America: it was later to contain articles on Art and Crafts design.</span></li><span data-dcnode-id="1051" instrument_node="">
</span><li data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">The American Exhibition of the Products, Arts and Manufactures of Foreign Nations in Boston, U.S.A.</span></li><span data-dcnode-id="1048" instrument_node="">
</span></ul><span data-dcnode-id="1046" instrument_node="">
</span><p data-dcnode-id="1042"><strong data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">1884</span></strong><span data-dcnode-id="1043" instrument_node=""> – First appearance of ‘The Hobby Horse’, a quarterly magazine of the Century Guild. Printed on hand made paper with the advice and assistance of Emery Walker it is a precursor of Morris’ experiments with fine printing at the Kelmscott Press.</span></p><span data-dcnode-id="1041" instrument_node="">
</span><ul data-dcnode-id="1031"><span data-dcnode-id="1040" instrument_node="">
</span><li data-dcnode-id="1036"><a data-dcnode-id="1038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//antique-marks.com/arts-and-crafts-guilds.html"><span data-dcnode-id="1039" instrument_node="">Art Workers Guild</span></a><span data-dcnode-id="1037" instrument_node=""> formed by the pupils and assistants of Richard Norman Shaw joining together with the ‘Fifteen’, a group launched some four years earlier on the initiative of Lewis F. Day.</span></li><span data-dcnode-id="1035" instrument_node="">
</span><li data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Keswick School of Industrial Arts founded as an evening institute by Canon and Mrs. Rawnsley.</span></li><span data-dcnode-id="1032" instrument_node="">
</span></ul><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1023"><strong data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">1885</span></strong><span data-dcnode-id="1027" instrument_node=""> – Home Arts and Industries Association established by Mrs. Jebb with the support of </span><a data-dcnode-id="1025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//antique-marks.com/art-nouveau-artists.html"><span data-dcnode-id="1026" instrument_node="">A.H. Mackmurdo</span></a><span data-dcnode-id="1024" instrument_node="">.</span></p><span data-dcnode-id="1022" instrument_node="">
</span><ul data-dcnode-id="1017"><span data-dcnode-id="1021" instrument_node="">
</span><li data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">The annual exhibitions held at the Royal Albert Hall show work of all the local classes and guilds.</span></li><span data-dcnode-id="1018" instrument_node="">
</span></ul><span data-dcnode-id="1016" instrument_node="">
</span><p data-dcnode-id="1012"><strong data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">1886</span></strong><span data-dcnode-id="1013" instrument_node=""> – Liverpool Exhibition. Mackmurdo’s stand provided yet more inspiration for the Art Nouveau artists of the ‘fin de siecle’. The elongated roof supports ending in wide flat ornamental finials are the prototypes of many later architectural decorative features.</span></p><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1004"><strong data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">1886/7</span></strong><span data-dcnode-id="1008" instrument_node=""> – </span><a data-dcnode-id="1006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//antique-marks.com/charles-robert-ashbee.html"><span data-dcnode-id="1007" instrument_node="">Charles Robert Ashbee</span></a><span data-dcnode-id="1005" instrument_node=""> went to live at Toynbee Hall, the pioneer University Settlement in the East End of London. He lectured at places such as Deptford or Beckton, ‘of Gas Works fame’ to recruit men for Toynbee Hall. There he started a Ruskin reading class which he expended into a class of drawing and decoration. He supervised the decoration of the Toynbee Hall dining room by members of his own class, and it was from these pupils that the nucleus of his Guild of Handicraft was drawn.</span></p><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="996"><strong data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">1888</span></strong><span data-dcnode-id="1000" instrument_node=""> – </span><a data-dcnode-id="998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//antique-marks.com/arts-and-crafts-guilds.html"><span data-dcnode-id="999" instrument_node="">Guild of Handicraft</span></a><span data-dcnode-id="997" instrument_node=""> founded with three members and a working capital of fifty pounds. Despite Morris’ doubts, he met Ashbee’s plans with a great deal of cold water, the Guild was remarkable successful for many years, only running into financial difficulty in 1907.</span></p><span data-dcnode-id="995" instrument_node="">
</span><ul data-dcnode-id="984"><span data-dcnode-id="994" instrument_node="">
</span><li data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Arts and Crafts Society founded by splinter group from the Art Workers’ Guild. The founder members included Walter Crane, Heywood Sumner, W.A.S. Benson, William De Morgan, Lewis F. Day and W.R. Lethaby. It was another of their number, T. Cobden Sanderson that coined the felicitous phrase ‘Arts and Crafts’ to replace the clumsy title originally used of ‘The Combined Arts Society’. The first exhibition was held at the New Gallery in October.</span></li><span data-dcnode-id="991" instrument_node="">
</span><li data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">National Association for the Advancement of Art in Relation to Industry formed. At both the first Congress in Liverpool, and at Edinburgh the following year, Morris and Crane spoke on socialist issues and were said to have spoiled the Congress.</span></li><span data-dcnode-id="988" instrument_node="">
</span><li data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Glasgow International Exhibition.</span></li><span data-dcnode-id="985" instrument_node="">
</span></ul><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="979"><strong data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">1889</span></strong><span data-dcnode-id="980" instrument_node=""> – Paris: Exposition Universelle Internationale.</span></p><span data-dcnode-id="978" instrument_node="">
</span><ul data-dcnode-id="973"><span data-dcnode-id="977" instrument_node="">
</span><li data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">An exhibition of American work was held at Johnstone, Norman &amp; Co. Galleries in New Bond Street; it included decorative designs by John La Farge and Rookwood Faience.</span></li><span data-dcnode-id="974" instrument_node="">
</span></ul><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="968"><strong data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">1890</span></strong><span data-dcnode-id="969" instrument_node=""> – Establishment of the Kelmscott Press, the venture that was to dominate Morris’ last years.</span></p><span data-dcnode-id="967" instrument_node="">
</span><ul data-dcnode-id="947"><span data-dcnode-id="966" instrument_node="">
</span><li data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">Birmingham Guild of Handicraft founded with Montague Fordham as first director.</span></li><span data-dcnode-id="963" instrument_node="">
</span><li data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Vittoria Street School for jewelers and silversmiths opened in Birmingham.</span></li><span data-dcnode-id="960" instrument_node="">
</span><li data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Kenton &amp; Co., the furniture firm, founded by Ernest Gimson, Sidney Barnsley, Alfred Powell, Mervyn Macartney, W.R Lethaby and Reginald Blomfield.</span></li><span data-dcnode-id="957" instrument_node="">
</span><li data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Charles Rohlfs opened his furniture workshop in Buffalo, USA</span></li><span data-dcnode-id="954" instrument_node="">
</span><li data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Walter Crane visited America.</span></li><span data-dcnode-id="951" instrument_node="">
</span><li data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">The work of C.F.A. Voysey first began appearing in American journals.</span></li><span data-dcnode-id="948" instrument_node="">
</span></ul><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="942"><strong data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">1891</span></strong><span data-dcnode-id="943" instrument_node=""> – Kenton &amp; Co. exhibition at Barnard’s Inn, the premises of the Art Workers Guild. The Company failed in 1892.</span></p><span data-dcnode-id="941" instrument_node="">
</span><ul data-dcnode-id="927"><span data-dcnode-id="940" instrument_node="">
</span><li data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Arts and Crafts exhibition held in Brussels, inspired the foundation of ‘ L’Association Pour L’Art’.</span></li><span data-dcnode-id="937" instrument_node="">
</span><li data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Chelsea Pottery opened in Chelsea, Mass, by Hugh C. Robertson.</span></li><span data-dcnode-id="934" instrument_node="">
</span><li data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">George and Albert Stickley established Stickley Bros. Co. in Grand Rapids.</span></li><span data-dcnode-id="931" instrument_node="">
</span><li data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Voysey’s work exhibited at the Boston Architectural Club.</span></li><span data-dcnode-id="928" instrument_node="">
</span></ul><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="919"><strong data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">1892</span></strong><span data-dcnode-id="923" instrument_node=""> – </span><a data-dcnode-id="921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//antique-marks.com/arts-and-crafts-artists.html"><span data-dcnode-id="922" instrument_node="">Walter Crane</span></a><span data-dcnode-id="920" instrument_node=""> lectured at the Art Institute of Chicago.</span></p><span data-dcnode-id="918" instrument_node="">
</span><ul data-dcnode-id="913"><span data-dcnode-id="917" instrument_node="">
</span><li data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Elbert Hubbard, the founder of the Roycrofters, visited Morris at Hammersmith and saw the Kelmscott Press which was to inspire his own experiments in fine printing.</span></li><span data-dcnode-id="914" instrument_node="">
</span></ul><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="908"><strong data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">1893</span></strong><span data-dcnode-id="909" instrument_node=""> – Chicago: World’s Columbian Exposition; World’s Fair. Included exhibits by Tiffany &amp; Co.</span></p><span data-dcnode-id="907" instrument_node="">
</span><ul data-dcnode-id="896"><span data-dcnode-id="906" instrument_node="">
</span><li data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">The first number of ‘The Studio’ was published in April, including an interview with C.F.A. Voysey, articles on Morris’ decoration at Stanmore Hall, the work by students at Birmingham Town Hall, and work by Walter Crane, A.H. Mackmurdo and Frank Brangwyn. It was this propagandist magazine which disseminated the activities and ideals of the Arts and Crafts movement.</span></li><span data-dcnode-id="903" instrument_node="">
</span><li data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Frank Lloyd Wright set up his own architectural practice in Chicago.</span></li><span data-dcnode-id="900" instrument_node="">
</span><li data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Voysey’s work first appeared in the ‘International Studio’ and was also exhibited at the Chicago World’s Fair.</span></li><span data-dcnode-id="897" instrument_node="">
</span></ul><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="891"><strong data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">1894</span></strong><span data-dcnode-id="892" instrument_node=""> – Della Robbia pottery established by Harold Rathbone in Birkenhead.</span></p><span data-dcnode-id="890" instrument_node="">
</span><ul data-dcnode-id="879"><span data-dcnode-id="889" instrument_node="">
</span><li data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Grueby Faience Co. started in Boston.</span></li><span data-dcnode-id="886" instrument_node="">
</span><li data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">First Arts &amp; Crafts society founded in San Francisco; it was called the Guild of Arts &amp; Crafts of San Francisco or the San Francisco Guild of Arts &amp; Crafts.</span></li><span data-dcnode-id="883" instrument_node="">
</span><li data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">The First mission style furniture was made in San Francisco; the first item was a chair for the Swedenborgian Church in San Francisco, followed by a rocker and probably other furniture made by Forbes Co.</span></li><span data-dcnode-id="880" instrument_node="">
</span></ul><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="874"><strong data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">1895</span></strong><span data-dcnode-id="875" instrument_node=""> – Samuel Bing published his ‘La Culture Artistique en Amerique’, the result of his observations made during a trip to the United States in 1893 to visit the Chicago World’s Fair. At the end of the same year he altered his shop which had previously concentrated on the sale of objects imported from the Far East, into a showcase for modern designers and craftsmen; now known as the ‘Galeries de l’Art Nouveau’</span></p><span data-dcnode-id="873" instrument_node="">

</span><p data-dcnode-id="503"><strong data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">1911</span></strong><span data-dcnode-id="504" instrument_node=""> – Turin: International exhibition. University City pottery won the Grand Prize of Europe for Mrs. Robineau’s ‘scarab’ vase.</span></p><span data-dcnode-id="502" instrument_node="">
</span><ul data-dcnode-id="497"><span data-dcnode-id="501" instrument_node="">
</span><li data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">In August 1911 and November 1912 articles on and by Voysey appeared in ‘The Craftsman’.</span></li><span data-dcnode-id="498" instrument_node="">
</span></ul><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="492"><strong data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">1912</span></strong><span data-dcnode-id="493" instrument_node=""> – Archibald Knox visited Philadelphia and New York.</span></p><span data-dcnode-id="491" instrument_node="">
</span><ul data-dcnode-id="486"><span data-dcnode-id="490" instrument_node="">
</span><li data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">‘Imprint’ Founded by Gerald Meynell, with Edward Johnston, Ernest Jackson and J.H. Mason as editors. W.R. Lethaby contributed to it. This magazine only survived for a year, but demonstrated Britain’s lead in printing and typography, following on form the Kelmscott Press.</span></li><span data-dcnode-id="487" instrument_node="">
</span></ul><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="481"><strong data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">1913</span></strong><span data-dcnode-id="482" instrument_node=""> – Omega Workshops opened in Fitzroy Square by Roger Fry with work by Duncan Grant, Vanessa bell, Wyndham Lewis, Frederick Etchells and Cuthbert Hamilton. They specialized in interior decoration with murals, painted furniture, pottery and rugs. The venture, influenced by Poiret’s Paris workshops survived until 1919.</span></p><span data-dcnode-id="480" instrument_node="">
</span><ul data-dcnode-id="475"><span data-dcnode-id="479" instrument_node="">
</span><li data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">Ghent: Exposition Universelle et Internationale.</span></li><span data-dcnode-id="476" instrument_node="">
</span></ul><span data-dcnode-id="474" instrument_node="">
</span><p data-dcnode-id="470"><strong data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">1914</span></strong><span data-dcnode-id="471" instrument_node=""> – Deutsche Werkbund exhibition in Cologne.</span></p><span data-dcnode-id="469" instrument_node="">
</span><ul data-dcnode-id="464"><span data-dcnode-id="468" instrument_node="">
</span><li data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">Paris: Exposition de l’Art Decoratif de la Grand-Bretagne et d’Irlande. Held at the Louvre, and organised by the Board of Trade, the exhibition featured work of all the leading arts and crafts artists.</span></li><span data-dcnode-id="465" instrument_node="">
</span></ul><span data-dcnode-id="463" instrument_node="">
</span><p data-dcnode-id="459"><strong data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">1915</span></strong><span data-dcnode-id="460" instrument_node=""> – Gustav Stickley enterprises declared bankrupt.</span></p><span data-dcnode-id="458" instrument_node="">
</span><ul data-dcnode-id="444"><span data-dcnode-id="457" instrument_node="">
</span><li data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Alice and Elbert Hubbard perish on the Lusitania, 7th May.</span></li><span data-dcnode-id="454" instrument_node="">
</span><li data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">Founding of the Design and Industries Association. Many of the leading Arts and Crafts figures were instrumental in its formation, including Harry Peach of the Dryad Workshops, Harold Stabler, Selwyn Image, W.A.S. Benson, W.R. Lethaby and Ambrose Heal.</span></li><span data-dcnode-id="451" instrument_node="">
</span><li data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">San Francisco: Panama-Pacific International Exposition.</span></li><span data-dcnode-id="448" instrument_node="">
</span><li data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">San Diego: Panama-Californian Exposition.</span></li><span data-dcnode-id="445" instrument_node="">
</span></ul><span data-dcnode-id="443" instrument_node="">
</span><p data-dcnode-id="439"><strong data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">1916</span></strong><span data-dcnode-id="440" instrument_node=""> – Last issue of ‘Philopolis’, September.</span></p><span data-dcnode-id="438" instrument_node="">
</span><ul data-dcnode-id="433"><span data-dcnode-id="437" instrument_node="">
</span><li data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">Last issue of ‘The Craftsman’, December.</span></li><span data-dcnode-id="434" instrument_node="">
</span></ul><span data-dcnode-id="432" instrument_node="">
</span><p data-dcnode-id="428"><strong data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">1919</span></strong><span data-dcnode-id="429" instrument_node=""> – The Bauhaus founded in April in Weimar by Walter Gropius, who had studied architecture under Peter Behrens.</span></p><span data-dcnode-id="427" instrument_node="">
