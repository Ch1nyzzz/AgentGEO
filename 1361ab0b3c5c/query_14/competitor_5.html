</span><div class="part-title" data-dcnode-id="225"><p data-dcnode-id="226"><small data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">Chapter 1. Design History</span></small></p></div><span data-dcnode-id="224" instrument_node=""> </span><section <header="" class="standard post-1395 chapter type-chapter status-publish hentry contributor-alex-hass focusable" data-dcnode-id="177" data-type="chapter" tabindex="-1"><span data-dcnode-id="223" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">
			1.2 William Morris and the Arts &amp; Crafts Movement		</span></h1><span data-dcnode-id="220" instrument_node="">
</span><p data-dcnode-id="218" data-type="author"><span data-dcnode-id="219" instrument_node="">Alex Hass</span></p><span data-dcnode-id="217" instrument_node="">
</span><h1 data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">Conditions and Products of the Industrial Age</span></h1><span data-dcnode-id="214" instrument_node="">
</span><p data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">The Arts &amp; Crafts movement emerged in the second half of the 19th century in reaction to the social, moral, and aesthetic chaos created by the Industrial Revolution. William Morris was its founder and leader. He abhorred the cheap and cheerful products of manufacturing, the terrible working and living conditions of the poor, and the lack of guiding moral principles of the times. Morris “called for a fitness of purpose, truth to the nature of the materials and methods of production, and individual expression by both artist and worker”&nbsp;(Meggs &amp; Purvis, 2011, p. 160). These philosophical points are still pivotal to the expression of design style and practice to this day. Design styles from the Arts &amp; Crafts movement and on have emphasized, in varying degrees, either fitness of purpose and material integrity, or individual expression and the need for visual subjectivity. Morris based his philosophy on the writings of John Ruskin, a critic of the Industrial Age, and a man who felt that society should work toward promoting the happiness and well-being of every one of its members, by creating a union of art and labour in the service of society. Ruskin admired the medieval Gothic style for these qualities, as well as&nbsp;the Italian aesthetic of medieval art because of its direct and uncomplicated depiction of nature.</span></p><span data-dcnode-id="211" instrument_node="">
</span><p data-dcnode-id="209"><span data-dcnode-id="210" instrument_node="">Many artists, architects, and designers were attracted to Ruskin’s philosophy and began to integrate components of them into their work. Morris, influenced by his upbringing in an agrarian countryside, was profoundly moved by Ruskin’s stance on fusing work and creativity, and became determined to find a way to make it a reality for society. This path became his life’s work.</span></p><span data-dcnode-id="208" instrument_node="">
</span><h1 data-dcnode-id="206"><span data-dcnode-id="207" instrument_node="">Pre-Raphealite Brotherhood</span></h1><span data-dcnode-id="205" instrument_node="">
</span><p data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">Morris met Edward Burne-Jones at Exeter College when both were studying there. They both read extensively the medieval history, chronicles, and poetry available to them and wrote every day. Morris published his first volume of poetry when he was 24, and continued to write and publish for the rest of his life. After graduation, Morris and Burne-Jones tried a few occupations, and eventually decided to become artists. Both became followers of Dante Gabriel Rossetti who founded the Pre-Raphealite brotherhood that was based on many of Ruskin’s principles. Morris did not last long as a painter, eventually finding his design vocation while creating a home for himself and his new wife (Rosetti’s muse and model).</span></p><span data-dcnode-id="202" instrument_node="">
</span><p data-dcnode-id="200"><span data-dcnode-id="201" instrument_node="">Discovering the lack of design integrity in Victorian home furnishings and various additional deficiencies in other aspects of home products, he chose to not only design his home, but all its furniture, tapestries, and stained glass.</span></p><span data-dcnode-id="199" instrument_node="">
</span><h1 data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">Morris &amp; Co.</span></h1><span data-dcnode-id="196" instrument_node="">
</span><p data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">In 1860, Morris established an interior design firm with friends based on the knowledge and experiences he had in crafting and building his home. He began transforming not only the look of home interiors but also the design studio. He brought together craftsmen of all kinds under the umbrella of his studio and began to implement Ruskin’s philosophy of combining art and craft. In Morris’s case, this was focused on making beautiful objects for the home. The craftsmen were encouraged to study principles of art and design, not just production, so they could reintegrate design principles into the production of their products. The objects they created were made and designed with an integrity a craftsman could feel proud of and find joy in creating, while the eventual owner would consider these products on par with works of art (an existing example is the Morris chair). The look of the work coming out of the Morris studio was based specifically on an English medieval aesthetic that the British public could connect to. The English look and its integrity of production made Morris’s work very successful and sought after. His organizational innovations and principled approach gained attention with craftsmen and artisans, and became a model for a number of craft guilds and art societies, which eventually changed the British design landscape.</span></p><span data-dcnode-id="193" instrument_node="">
</span><h1 data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">William Morris and the Kelmscott Press</span></h1><span data-dcnode-id="190" instrument_node="">
</span><p data-dcnode-id="188"><span data-dcnode-id="189" instrument_node="">Morris’s interest in writing never waned and made him acutely aware of how the book publishing industry had been negatively affected by industrialization. One of his many pursuits included the revitalization of the book form and its design components through the establishment of the Kelmscott Press. The press was created in 1888 after Morris, inspired by a lecture about medieval manuscripts and incunabula publications, began the design of his first font, Golden, which was based on the Venetian roman face created originally by Nicolas Jenson.</span></p><span data-dcnode-id="187" instrument_node="">
</span><p data-dcnode-id="182"><span data-dcnode-id="186" instrument_node="">In his reinterpretation of this earlier font, Morris strove to optimize readability while retaining aesthetic integrity — in the process reviving interest in font design of earlier periods. Morris used this font in his first book, </span><i data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">The Story of Glittering Plain</span></i><span data-dcnode-id="183" instrument_node="">, which he illustrated, printed, and bound at his press. The design approach of this publication and all others Kelmscott produced in its eight years was based on recreating the integrated approach and beauty of the incunabula books and manuscripts of the medieval period. All aspects of the publication were considered and carefully determined to create a cohesive whole. The press itself used hand-operated machinery, the paper was handmade, and the illustrations, fonts, and page design were all created and unified by the same person to make the book a cohesive, beautiful object of design. Morris did not wholly reject mechanization, however, as he recognized the advantages of mechanical process. He considered, redesigned, and improved all aspects of design and production to increase physical and aesthetic quality.</span></p><span data-dcnode-id="181" instrument_node="">
</span><p data-dcnode-id="179"><span data-dcnode-id="180" instrument_node="">Kelmscott Press produced over 18,000 volumes in the eight years of its existence and inspired a revival of book design on two continents. In addition, Morris inspired a reinterpretation of design and design practice with his steadfast commitment to Ruskin’s principles. Future generations of designers held to Morris’s goals of material integrity — striving for beautiful utilitarian object design and carefully considered functionality.</span></p><span data-dcnode-id="178" instrument_node="">
</span></section><span data-dcnode-id="176" instrument_node="">
