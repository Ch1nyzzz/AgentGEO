</span><header class="entry-header" data-dcnode-id="878"><span data-dcnode-id="896" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">William Morris: Art Nouveau Style</span></h1><span data-dcnode-id="893" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="881"><span data-dcnode-id="892" instrument_node="">
</span><div class="date" data-dcnode-id="888"><a data-dcnode-id="890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//graphic-design.com/2011/08/05/william-morris-art-nouveau-style/" title="William Morris: Art Nouveau Style"><span data-dcnode-id="891" instrument_node="">August 5, 2011</span></a><span data-dcnode-id="889" instrument_node=""> </span></div><span data-dcnode-id="887" instrument_node=""> </span><div class="by-author vcard author" data-dcnode-id="883"><a data-dcnode-id="885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//graphic-design.com/author/fred-showker/"><span data-dcnode-id="886" instrument_node="">Fred Showker</span></a><span data-dcnode-id="884" instrument_node=""> </span></div><span data-dcnode-id="882" instrument_node=""> </span></div><span data-dcnode-id="879" instrument_node="">
</span></header><span data-dcnode-id="877" instrument_node="">
</span><div class="entry-content" data-dcnode-id="701"><span data-dcnode-id="876" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="875" instrument_node="">William Morris is probably the most recognized individual in the entire Art Nouveau movement — but what most people don’t know is that he also contributed his style and art vision to type and typography as well.</span><br data-dcnode-id="874"><span data-dcnode-id="873" instrument_node="">
</span><span data-dcnode-id="872" id="more-133"></span></p><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="866"><img alt="William Morris Art Nouveau movement" class="lazyloaded" data-dcnode-id="869" data-src="https://graphic-design.com/wp-content/uploads/graphic-design.com/Gallery/morris/MORRIS_head.jpg" height="258" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//graphic-design.com/wp-content/uploads/graphic-design.com/Gallery/morris/MORRIS_head.jpg&amp;raw" title="William Morris Art Nouveau movement" width="600"><noscript data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">&lt;img loading="lazy" src="https://graphic-design.com/wp-content/uploads/graphic-design.com/Gallery/morris/MORRIS_head.jpg" alt="William Morris Art Nouveau movement" title="William Morris Art Nouveau movement" width="600" height="258"&gt;</span></noscript></p><span data-dcnode-id="865" instrument_node="">
</span><p data-dcnode-id="859"><span data-dcnode-id="864" instrument_node="">
</span><img alt="T" class="imglf lazyloaded" data-dcnode-id="863" data-src="https://graphic-design.com/wp-content/uploads/graphic-design.com/Gallery/morris/initial_cap.png" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//graphic-design.com/wp-content/uploads/graphic-design.com/Gallery/morris/initial_cap.png&amp;raw" title="T" width="100"><noscript data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">&lt;img  class="imglf" src="https://graphic-design.com/wp-content/uploads/graphic-design.com/Gallery/morris/initial_cap.png" alt="T" title="T" width="100"&gt;</span></noscript><span data-dcnode-id="860" instrument_node="">HE ART NOUVEAU MOVEMENT would never have been the same without William Morris. A true Renaissance man, William Morris mastered every art and craft to which he set his hand, revelling in designs, patterns, colours and textures, and placing his stamp on sumptuous books, rugs, embroidery, wallpaper, stained glass, tapestries, curtains and furniture.</span></p><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="853"><span data-dcnode-id="857" instrument_node="">ART NOUVEAU {ahr noo-voh’}, a French term meaning new art, refers to a style of architecture, of commercial and decorative art, and, to some extent, a style of painting and sculpture that was popular about 1900. Although the style was then thought of as modern and was given the title </span><em data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">“new art,”</span></em><span data-dcnode-id="854" instrument_node=""> it was adapted from older styles and art forms. Much was derived from the Gothic and rococo and from the arts of Java and Japan. </span></p><span data-dcnode-id="852" instrument_node="">
</span><p data-dcnode-id="848"><img alt="Etchings by William Morris black and white clip art" class="lazyloaded" data-dcnode-id="851" data-src="https://graphic-design.com/wp-content/uploads/graphic-design.com/Gallery/morris/etching_break.png" height="86" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//graphic-design.com/wp-content/uploads/graphic-design.com/Gallery/morris/etching_break.png&amp;raw" title="Etchings by William Morris black and white clip art" width="600"><noscript data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">&lt;img loading="lazy" src="https://graphic-design.com/wp-content/uploads/graphic-design.com/Gallery/morris/etching_break.png" alt="Etchings by William Morris black and white clip art" title="Etchings by William Morris black and white clip art" width="600" height="86"&gt;</span></noscript></p><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">The Art Nouveau movement was also inspired by Celtic manuscripts and the drawings of William Blake. Persian pottery and ancient Roman glass also served as models for some Art Nouveau craftsmen.*</span></p><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">WILLIAM MORRIS was the founder of the Art Nouveau Arts and Crafts Movement in England. Employed by the  renaissance of decorative arts, Morris studied medieval architecture at Oxford, but under the influence of Edward Burne-Jones and Dante Gabriele Rossetti, leaders of the Pre-Raphaelite movement, he turned toward painting and writing. </span></p><span data-dcnode-id="841" instrument_node="">
</span><p data-dcnode-id="837"><img alt="Floral tapestry design influenced most fabric produced in the late 1800s" class="lazyloaded" data-dcnode-id="840" data-src="https://graphic-design.com/wp-content/uploads/graphic-design.com/Gallery/morris/floral_break.png" height="86" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//graphic-design.com/wp-content/uploads/graphic-design.com/Gallery/morris/floral_break.png&amp;raw" title="Floral tapestry design influenced most fabric produced in the late 1800s" width="600"><noscript data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">&lt;img loading="lazy" src="https://graphic-design.com/wp-content/uploads/graphic-design.com/Gallery/morris/floral_break.png" alt="Floral tapestry design influenced most fabric produced in the late 1800s" title="Floral tapestry design influenced most fabric produced in the late 1800s" width="600" height="86"&gt;</span></noscript></p><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">In 1861, Morris, Burne-Jones and Rossetti founded a guild of fine arts craftsmen and began to produce furniture, tapestry, stained glass, tiles, fabrics and the most famous wallpaper designs. They also explored the total vision of art and craft for Red House, in South London countryside, where every detail of architecture, furnishing and decorative elements were completed as a whole artwork.*</span></p><span data-dcnode-id="833" instrument_node="">
</span><p data-dcnode-id="829"><img alt="Ornate, decorative lettering became part of Morris's manuscripts" class="lazyloaded" data-dcnode-id="832" data-src="https://graphic-design.com/wp-content/uploads/graphic-design.com/Gallery/morris/lettering_break.png" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//graphic-design.com/wp-content/uploads/graphic-design.com/Gallery/morris/lettering_break.png&amp;raw" title="Ornate, decorative lettering became part of Morris's manuscripts" width="600"><noscript data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">&lt;img loading="lazy" src="https://graphic-design.com/wp-content/uploads/graphic-design.com/Gallery/morris/lettering_break.png" alt="Ornate, decorative lettering became part of Morris's manuscripts" title="Ornate, decorative lettering became part of Morris's manuscripts" width="600" height="100"&gt;</span></noscript></p><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">
Morris’ art was emotional and mythical. His love of country-garden nature and medieval ideals of chivalry as well as the romantic attachment to forests, gardens, flowers and birds has inspired artists for a century. But Morris also designed illuminated typography!</span></p><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="814"><img alt="B Initial Cap" class="imgrt lazyloaded" data-dcnode-id="824" data-src="https://graphic-design.com/wp-content/uploads/graphic-design.com/Gallery/morris/initial_B.png" height="189" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//graphic-design.com/wp-content/uploads/graphic-design.com/Gallery/morris/initial_B.png&amp;raw" width="200"><noscript data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">&lt;img loading="lazy"  class="imgrt" src="https://graphic-design.com/wp-content/uploads/graphic-design.com/Gallery/morris/initial_B.png" alt="B Initial Cap" width="200" height="189"&gt;</span></noscript><span data-dcnode-id="821" instrument_node="">Along with the artistic endeavours, Morris was also a writer and poet. His manuscripts would be decorated with lavish illuminations, borders and cartouches. He became so well known for the art that printers and publishers began to seek him out to illustrate. Popular publications began to see Morris works in both illustration and lettering. Again, the style’s patterns and motifs were taken primarily from nature and were often carried out with unrestrained exuberance of form, color, and especially line. The characteristic line, a flowing curvilinear, was to give Art Nouveau the descriptive nicknames </span><em data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">“noodle,” “whiplash,” “tapeworm,”</span></em><span data-dcnode-id="818" instrument_node=""> and </span><em data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">“cigarette-smoke style.”</span></em><span data-dcnode-id="815" instrument_node="">*</span></p><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="808"><span data-dcnode-id="812" instrument_node="">Anyone interested in learning more, or in actually using the works of Morris should take a look at </span><a data-dcnode-id="810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/exec/obidos/ASIN/0486997332/ref%3Dase_thedesignpublish" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="811" instrument_node="">William Morris Designs</span></a><span data-dcnode-id="809" instrument_node=""> (CD-ROM and Book) This is a collection of Morris’s work, contained in a print book and then as clip art on CD ROM — which also happens to include some spectacular illuminated lettering and scroll mortised borders. This copyright-free collection offers countless idea starters and actual art you can use. </span></p><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="803"><span data-dcnode-id="806" instrument_node="">We offer here, a look at just some of the plates and art files included in the collection: </span><a data-dcnode-id="804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//graphic-design.com/wp-content/uploads/graphic-design.com/Gallery/morris/exhibit/index.html" title="William Morris Designs (CD-ROM and Book)"><span data-dcnode-id="805" instrument_node="">William Morris Designs</span></a></p><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="798"><img alt="another William Morris Etching" class="lazyloaded" data-dcnode-id="801" data-src="https://graphic-design.com/wp-content/uploads/graphic-design.com/Gallery/morris/knight_break.png" height="86" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//graphic-design.com/wp-content/uploads/graphic-design.com/Gallery/morris/knight_break.png&amp;raw" title="another William Morris Etching in black and white clip art" width="600"><noscript data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">&lt;img loading="lazy" src="https://graphic-design.com/wp-content/uploads/graphic-design.com/Gallery/morris/knight_break.png" alt="another William Morris Etching" title="another William Morris Etching in black and white clip art" width="600" height="86"&gt;</span></noscript></p><span data-dcnode-id="797" instrument_node="">
</span><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">One can never have enough visual reference material. This book among many of the others in the Dover Pictorial Archives not only offer sound art for graphic design solutions, but also provide a lot of visuals for perusing. I’ve owned a number of the books for years, and they always suggest the spark of an idea for projects — whether a starting point on my own art, and interpretive exploration or used literally right out of the book.</span></p><span data-dcnode-id="794" instrument_node="">
</span><p data-dcnode-id="790"><em data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Thanks for reading</span></em></p><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="783"><span data-dcnode-id="788" instrument_node="">
</span><a data-dcnode-id="784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//graphic-design.com/wp-content/uploads/graphic-design.com/Showker/"><img align="top" alt="Fred Showker" class="lazyloaded" data-dcnode-id="787" data-src="https://graphic-design.com/wp-content/uploads/graphic-design.com/Showker/fred.gif" height="38" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//graphic-design.com/wp-content/uploads/graphic-design.com/Showker/fred.gif&amp;raw" title="Click to find out more about Fred Showker, Editor of 60-Second Windows and DTG Magazine" width="213"><noscript data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">&lt;img loading="lazy" src="https://graphic-design.com/wp-content/uploads/graphic-design.com/Showker/fred.gif" alt="Fred Showker" title="Click to find out more about Fred Showker, Editor of 60-Second Windows and DTG Magazine" width="213" height="38" align="top" /&gt;</span></noscript></a></p><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="781" instrument_node="">
Don’t forget … we encourage you to share your discoveries about favorite or famous graphic designers and illustrators with other readers. Just </span><a data-dcnode-id="779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//graphic-design.com/wp-content/uploads/graphic-design.com/content/contact-graphic-design-center" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="780" instrument_node="">contact me here</span></a><span data-dcnode-id="778" instrument_node="">, or just give me a tweet at </span><a data-dcnode-id="776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//twitter.com/DTG_Magazine" rel="noopener noreferrer" target="_blank" title="Give me a tweet on Twitter - search for DTG Magazine or Fred Showker"><span data-dcnode-id="777" instrument_node="">Twitter/DTG_Magazine</span></a></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="772"></p><span data-dcnode-id="771" instrument_node="">
</span><h3 data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">Further Reading:</span></h3><span data-dcnode-id="768" instrument_node="">
</span><ol data-dcnode-id="715"><span data-dcnode-id="767" instrument_node="">
</span><li data-dcnode-id="763"><span data-dcnode-id="766" instrument_node="">
Art Nouveau reference: </span><a data-dcnode-id="764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.discoverfrance.net/France/Art/nouveau.shtml" rel="noopener noreferrer" target="_blank" title="ART NOUVEAU means new art, refers to a style of architecture, and decorative art popular about 1900"><span data-dcnode-id="765" instrument_node="">discoverfrance.net</span></a></li><span data-dcnode-id="762" instrument_node="">
</span><li data-dcnode-id="756"><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="757"><span data-dcnode-id="760" instrument_node="">More about William Morris : </span><a data-dcnode-id="758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.senses-artnouveau.com/biography.php%3Fartist%3Darts_crafts" rel="noopener noreferrer" target="_blank" title="William Morris mastered every art and craft"><span data-dcnode-id="759" instrument_node="">www.senses-artnouveau.com</span></a></p></li><span data-dcnode-id="755" instrument_node="">
</span><li data-dcnode-id="749"><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="750"><span data-dcnode-id="753" instrument_node="">More about the “Styles” of the Art Nouveau movement</span><a data-dcnode-id="751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.artchive.com/artchive/art_nouveau.html" rel="noopener noreferrer" target="_blank" title="Background and history on Art Nouveau"><span data-dcnode-id="752" instrument_node="">artchive.com</span></a></p></li><span data-dcnode-id="748" instrument_node="">
</span><li data-dcnode-id="742"><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="743"><a data-dcnode-id="745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.britainexpress.com/History/morris.htm" rel="noopener noreferrer" target="_blank" title=""><span data-dcnode-id="746" instrument_node="">More historic information</span></a><span data-dcnode-id="744" instrument_node=""> about the Art Nouveau movement</span></p></li><span data-dcnode-id="741" instrument_node="">

</span><li data-dcnode-id="732"><a data-dcnode-id="734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/exec/obidos/ASIN/0880451505/ref%3Dase_thedesignpublish" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="735" instrument_node="">William Morris: Patterns &amp; Designs</span></a><span data-dcnode-id="733" instrument_node=""> (International Design Library) by Phoebe A. Erb – William Morris’s visions, combining intricacy and simplicity; alternatingly dramatic and demure, dark and light, curved and angular, in a virtual dance of superb interwoven shapes.</span></li><span data-dcnode-id="731" instrument_node="">
</span><li data-dcnode-id="727"><a data-dcnode-id="729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/exec/obidos/ASIN/0486256456/ref%3Dase_thedesignpublish" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="730" instrument_node="">William Morris Full-Color Patterns and Designs</span></a><span data-dcnode-id="728" instrument_node=""> by William Morris – beautiful designs by one of Victorian era’s most influential designers. Modestly priced, copyright-free collection of richly detailed patterns, faithfully reproduced from rare 1890s publication. Superb designs for wallpapers, chintzes, velveteens, tapestries, tiles, carpets, more.</span></li><span data-dcnode-id="726" instrument_node="">
</span><li data-dcnode-id="722"><a data-dcnode-id="724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/exec/obidos/ASIN/0714834653/ref%3Dase_thedesignpublish" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="725" instrument_node="">Designs of William Morris</span></a><span data-dcnode-id="723" instrument_node=""> by Editors of Phaidon Press — William Morris designed some of the finest wallpapers and fabrics of the 19th century, many of which are still in use today. This collection of beautiful drawings and designs evokes Morris’ charm and genius, revealing how his ideas on the nature of art and its importance in everyday life have had a far-reaching impact on art and design. 104 illustrations, 99 in color. (Phaidon Miniature Editions) </span></li><span data-dcnode-id="721" instrument_node="">
</span><li data-dcnode-id="717"><a data-dcnode-id="719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/exec/obidos/ASIN/0486410420/ref%3Dase_thedesignpublish" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="720" instrument_node="">William Morris Stained Glass Coloring Book</span></a><span data-dcnode-id="718" instrument_node=""> – Just for fun, and inspiration, see these  sixteen handsome renderings based on projects by one of Victorian England’s foremost leaders of the Arts and Crafts movement. Includes adaptations of wallpaper and textile designs as well as scenes of Adam Naming the Beasts, Sleeping Apostles, Angel and Woman, and many more. Add color and place translucent illustrations near a source of bright light for brilliant stained glass effects. (Dover Pictorial Archives)</span></li><span data-dcnode-id="716" instrument_node="">
