</span><p data-dcnode-id="2368"><a data-dcnode-id="2376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Morris" title="William Morris"><span data-dcnode-id="2377" instrument_node="">William Morris</span></a><span data-dcnode-id="2375" instrument_node=""> (1834-1898), a  founder of the British </span><a data-dcnode-id="2373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arts_and_Crafts_movement" title="Arts and Crafts movement"><span data-dcnode-id="2374" instrument_node="">Arts and Crafts movement</span></a><span data-dcnode-id="2372" instrument_node="">, sought to restore the prestige and methods of hand-made crafts, including </span><a class="mw-redirect" data-dcnode-id="2370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Textiles" title="Textiles"><span data-dcnode-id="2371" instrument_node="">textiles</span></a><span data-dcnode-id="2369" instrument_node="">, in opposition to the 19th century tendency toward factory-produced textiles. With this goal in mind, he created his own workshop and designed dozens of patterns for hand-produced woven and printed cloth, upholstery, and other textiles.

</span><h2 data-dcnode-id="2257"><span class="mw-headline" data-dcnode-id="2265" id="Embroidered_textiles"><span data-dcnode-id="2266" instrument_node="">Embroidered textiles</span></span><span class="mw-editsection" data-dcnode-id="2258"><span class="mw-editsection-bracket" data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node="">[</span></span><a data-dcnode-id="2261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWilliam_Morris_textile_designs%26action%3Dedit%26section%3D1" title="Edit section: Embroidered textiles"><span data-dcnode-id="2262" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2256" instrument_node="">
</span><p data-dcnode-id="2243"><span data-dcnode-id="2255" instrument_node="">The first textile designs Morris made were created in the 1860s and were for </span><a class="mw-redirect" data-dcnode-id="2253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Embroideries" title="Embroideries"><span data-dcnode-id="2254" instrument_node="">embroideries</span></a><span data-dcnode-id="2252" instrument_node="">, expressing his interest in medieval arts and crafts, particularly the medieval wall hangings that he admired as a child.</span><sup class="reference" data-dcnode-id="2249" id="cite_ref-1"><a data-dcnode-id="2250" href="#cite_note-1"><span data-dcnode-id="2251" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2248" instrument_node=""> In a collection of essays by members of the Arts and Crafts movement published in 1893, he wrote that one of the aims of embroidery should be simply "The exhibition of beautiful material.  Furthermore, it is not worth doing unless it is either very copious and rich, or very delicate - or both."  </span><sup class="reference" data-dcnode-id="2245" id="cite_ref-2"><a data-dcnode-id="2246" href="#cite_note-2"><span data-dcnode-id="2247" instrument_node="">[2]</span></a></sup><span data-dcnode-id="2244" instrument_node="">
</span></p><p data-dcnode-id="2228"><span data-dcnode-id="2242" instrument_node="">His first embroidery designs were primitive, but later, working with his wife Jane, he created a set of wall hangings for his residence in the London suburbs, </span><a data-dcnode-id="2240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red_House%2C_Bexleyheath" title="Red House, Bexleyheath"><span data-dcnode-id="2241" instrument_node="">Red House</span></a><span data-dcnode-id="2239" instrument_node="">.  One of his designs in this historical style, stitched by Jane Morris, won the Morris company an award in an international competition in 1862.  Morris and his workshop began making embroideries for the households of his friends as well as larger panels for some of the many new churches being constructed in England.   In these designs, Morris created the decorative elements, while his friend </span><a data-dcnode-id="2237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_Burne-Jones" title="Edward Burne-Jones"><span data-dcnode-id="2238" instrument_node="">Edward Burne-Jones</span></a><span data-dcnode-id="2236" instrument_node=""> drew the figures, and a team of embroiderers manufactured the work by hand. Other wall hangings were designed to be sold off the shelf of the new Morris and Company shop on </span><a data-dcnode-id="2234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oxford_Street" title="Oxford Street"><span data-dcnode-id="2235" instrument_node="">Oxford Street</span></a><span data-dcnode-id="2233" instrument_node=""> which owned in 1877.   Later, he and his daughter May made designs for panels for "embroider yourself" kits for cushion covers, fireplace screens, doorway curtains, bedcovers and other household objects.  In 1885, Morris turned production of embroidery entirely over to his daughter.</span><sup class="reference" data-dcnode-id="2230" id="cite_ref-3"><a data-dcnode-id="2231" href="#cite_note-3"><span data-dcnode-id="2232" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2229" instrument_node="">
</span></p><span data-dcnode-id="2227" instrument_node="">

</span><h2 data-dcnode-id="2133"><span class="mw-headline" data-dcnode-id="2141" id="Furnishing_textiles_and_woven_fabrics"><span data-dcnode-id="2142" instrument_node="">Furnishing textiles and woven fabrics</span></span><span class="mw-editsection" data-dcnode-id="2134"><span class="mw-editsection-bracket" data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">[</span></span><a data-dcnode-id="2137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWilliam_Morris_textile_designs%26action%3Dedit%26section%3D2" title="Edit section: Furnishing textiles and woven fabrics"><span data-dcnode-id="2138" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2132" instrument_node="">
</span><p data-dcnode-id="2116"><span data-dcnode-id="2131" instrument_node="">In the late 1860s Morris began to experiment with a genre, textiles for furnishing or upholstery. His first design was </span><i data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">jasmine trail</span></i><span data-dcnode-id="2128" instrument_node=""> or </span><i data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">jasmine trellis</span></i><span data-dcnode-id="2125" instrument_node=""> (1868–70), based on a similar wallpaper design he had made in 1862.</span><sup class="reference" data-dcnode-id="2122" id="cite_ref-FOOTNOTEBeecroft201952–54_4-0"><a data-dcnode-id="2123" href="#cite_note-FOOTNOTEBeecroft201952%E2%80%9354-4"><span data-dcnode-id="2124" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2121" instrument_node=""> In the 1870s, he expanded his activity in woven furnishing textiles. IN 1877, he brought a skilled French silk weaver, Jacques Bazin, from Lyon to London, rented a studio at Great Esmond Yard, and established Bazin and his mechanical Jacquard loom there to make woven wooden fabrics.</span><sup class="reference" data-dcnode-id="2118" id="cite_ref-FOOTNOTEBeecroft201952–54_4-1"><a data-dcnode-id="2119" href="#cite_note-FOOTNOTEBeecroft201952%E2%80%9354-4"><span data-dcnode-id="2120" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2117" instrument_node="">
</span></p><p data-dcnode-id="2108"><span data-dcnode-id="2115" instrument_node="">In 1881, he opened new workshops at </span><a data-dcnode-id="2113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Merton_Abbey%2C_London" title="Merton Abbey, London"><span data-dcnode-id="2114" instrument_node="">Merton Abbey</span></a><span data-dcnode-id="2112" instrument_node="">, seven miles southwest of London, for manufacturing printed and woven textiles.  The workshops were next to the </span><a data-dcnode-id="2110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/River_Wandle" title="River Wandle"><span data-dcnode-id="2111" instrument_node="">River Wandle</span></a><span data-dcnode-id="2109" instrument_node="">, providing a source of abundant clean water, and also had a grassy meadow where dyed clothes could be dried in the open air.  He produced a number of furnishing fabrics there, including the Wey and Wandle designs. 
</span></p><span data-dcnode-id="2107" instrument_node="">

</span><h2 data-dcnode-id="2016"><span class="mw-headline" data-dcnode-id="2024" id="Printed_textiles"><span data-dcnode-id="2025" instrument_node="">Printed textiles</span></span><span class="mw-editsection" data-dcnode-id="2017"><span class="mw-editsection-bracket" data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">[</span></span><a data-dcnode-id="2020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWilliam_Morris_textile_designs%26action%3Dedit%26section%3D3" title="Edit section: Printed textiles"><span data-dcnode-id="2021" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2015" instrument_node="">
</span><p data-dcnode-id="1990"><span data-dcnode-id="2014" instrument_node="">Morris made his first experiments with printed textiles for his company </span><a class="mw-redirect" data-dcnode-id="2012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Morris%2C_Marshall%2C_Faulkner_and_Co." title="Morris, Marshall, Faulkner and Co."><span data-dcnode-id="2013" instrument_node="">Morris, Marshall, Faulkner and Co.</span></a><span data-dcnode-id="2011" instrument_node=""> beginning in 1868, at about the same time he was starting to make printed wallpaper (see </span><a data-dcnode-id="2009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Morris_wallpaper_designs" title="William Morris wallpaper designs"><span data-dcnode-id="2010" instrument_node="">William Morris wallpaper designs</span></a><span data-dcnode-id="2008" instrument_node="">).  These first textiles were recreations of earlier designs he had made from the 1830s, and were printed for Morris by the workshop  of Thomas Clarkson of Bannister Hall, in </span><a data-dcnode-id="2006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lancaster%2C_Lancashire" title="Lancaster, Lancashire"><span data-dcnode-id="2007" instrument_node="">Lancaster</span></a><span data-dcnode-id="2005" instrument_node="">.</span><sup class="reference" data-dcnode-id="2002" id="cite_ref-FOOTNOTEFiell201773_5-0"><a data-dcnode-id="2003" href="#cite_note-FOOTNOTEFiell201773-5"><span data-dcnode-id="2004" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2001" instrument_node=""> His next textile was </span><i data-dcnode-id="1999"><span data-dcnode-id="2000" instrument_node="">Trellis with jasmine</span></i><span data-dcnode-id="1998" instrument_node=""> (1868–70).  This was printed with synthetic analine dyes.  Next he made </span><i data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">Tulip and Willow</span></i><span data-dcnode-id="1995" instrument_node="">, a design he made in 1873, but he was very disappointed by the result.  He blamed the problem on the artificial dyes, and began doing research into the natural dyes which had been used in the 16th century.</span><sup class="reference" data-dcnode-id="1992" id="cite_ref-FOOTNOTEFiell201773_5-1"><a data-dcnode-id="1993" href="#cite_note-FOOTNOTEFiell201773-5"><span data-dcnode-id="1994" instrument_node="">[5]</span></a></sup><span data-dcnode-id="1991" instrument_node="">
</span></p><p data-dcnode-id="1982"><span data-dcnode-id="1989" instrument_node="">The </span><i data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">Strawberry Thief</span></i><span data-dcnode-id="1986" instrument_node=""> became one of Morris's best-known designs. It depicted a scene from his own garden, where </span><a class="mw-redirect" data-dcnode-id="1984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thrushes" title="Thrushes"><span data-dcnode-id="1985" instrument_node="">thrushes</span></a><span data-dcnode-id="1983" instrument_node=""> came to dine upon the ripe strawberries.
</span></p><span data-dcnode-id="1981" instrument_node="">

</span><p data-dcnode-id="1831"><span data-dcnode-id="1842" instrument_node="">Morris moved with his family to Turham Green in 1872, which created greater space in his house at </span><a data-dcnode-id="1840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Queen_Square%2C_London" title="Queen Square, London"><span data-dcnode-id="1841" instrument_node="">Queen Square</span></a><span data-dcnode-id="1839" instrument_node=""> in London where Morris had his workshop.  Morris and his assistant John Smith made a series of experiments with </span><a data-dcnode-id="1837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indigo" title="Indigo"><span data-dcnode-id="1838" instrument_node="">indigo</span></a><span data-dcnode-id="1836" instrument_node=""> and other natural dyes,  but were unable to attain colours that satisfied Morris.  In 1875, Morris tried working with a commercial printer, Wardle and Company, using wood blocks with a reduced number of colours and modern chemical dyes, This time he was dissatisfied with the lack of quality control by the workers, and the uneven results.  He therefore decided to establish his own workshop, where he could control everything.</span><sup class="reference" data-dcnode-id="1833" id="cite_ref-FOOTNOTEFiell201773_5-2"><a data-dcnode-id="1834" href="#cite_note-FOOTNOTEFiell201773-5"><span data-dcnode-id="1835" instrument_node="">[5]</span></a></sup><span data-dcnode-id="1832" instrument_node="">
</span></p><p data-dcnode-id="1822"><span data-dcnode-id="1830" instrument_node="">He moved his printing workshop to </span><a data-dcnode-id="1828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Merton_Abbey_Mills" title="Merton Abbey Mills"><span data-dcnode-id="1829" instrument_node="">Merton Abbey Mills</span></a><span data-dcnode-id="1827" instrument_node="">, near the Merton Abbey Priory.  For printed textiles, the design was traced onto a block of pear wood, and then the wood was sculpted  so only the desired surface would touch the fabric. Thin strips of brass were pounded edge-first into the block to make the fine lines.  One block was used for each colour of the final fabric, The block was inked by placing into a vat of colorant, and then carefully placed onto the fabric on the table in front of the craftsman. He pounded it with a mallet to impress the colour, then he lifted the block  carefully, moved the fabric, re-inked the block, and printed the next section with the same colour.  When the first colour was finished, the finished fabric was set aside to dry.  If more than one colour was used, once the fabric was dry, a block with the next colour would be inked and carefully impressed over the image left by the first.   The same process and the same blocks could be used for making both fabrics and wallpaper.  Since fifteen or more colours might be used, It was an extremely laborious and long  process, sometimes lasting several weeks, and the cost was higher than that of mechanical printing methods.</span><sup class="reference" data-dcnode-id="1824" id="cite_ref-FOOTNOTEFiell201774–75_6-0"><a data-dcnode-id="1825" href="#cite_note-FOOTNOTEFiell201774%E2%80%9375-6"><span data-dcnode-id="1826" instrument_node="">[6]</span></a></sup><span data-dcnode-id="1823" instrument_node="">
</span></p><span data-dcnode-id="1821" instrument_node="">

</span><h2 data-dcnode-id="1778"><span class="mw-headline" data-dcnode-id="1786" id="Tapestries"><span data-dcnode-id="1787" instrument_node="">Tapestries</span></span><span class="mw-editsection" data-dcnode-id="1779"><span class="mw-editsection-bracket" data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">[</span></span><a data-dcnode-id="1782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWilliam_Morris_textile_designs%26action%3Dedit%26section%3D4" title="Edit section: Tapestries"><span data-dcnode-id="1783" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1777" instrument_node="">
</span><p data-dcnode-id="1768"><span data-dcnode-id="1776" instrument_node="">Morris wrote that making tapestries was 'the noblest of all the weaving arts', and most suitable for his interest in reviving medieval arts and crafts. He set up his first tapestry loom in 1877, and made completed his first tapestry, was 'Acanthus and Vine' in (1879).  He wove the tapestry himself, often getting up at dawn to work on a loom in his bedroom at </span><a data-dcnode-id="1774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kelmscott_House" title="Kelmscott House"><span data-dcnode-id="1775" instrument_node="">Kelmscott House</span></a><span data-dcnode-id="1773" instrument_node="">.  His design was modelled after the "large leaf" tapestries woven in France and Flanders in the 16th century, and he deliberately gave them a faded appearance to make them look two centuries old. He recorded that it took him five hundred sixteen and one half hours to complete. 
</span><sup class="reference" data-dcnode-id="1770" id="cite_ref-7"><a data-dcnode-id="1771" href="#cite_note-7"><span data-dcnode-id="1772" instrument_node="">[7]</span></a></sup><span data-dcnode-id="1769" instrument_node="">
</span></p><p data-dcnode-id="1752"><span data-dcnode-id="1767" instrument_node="">Once he had mastered the technique, he created a full-time tapestry workshop at the Morris and Company house on Queen Square. For most of his tapestries, Morris worked with other artists, particularly </span><a data-dcnode-id="1765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_Burne-Jones" title="Edward Burne-Jones"><span data-dcnode-id="1766" instrument_node="">Edward Burne-Jones</span></a><span data-dcnode-id="1764" instrument_node="">, who designed the figures, Philip Webb, who designed birds and animals, and with his primary assistant and successor as chief designer,  </span><a data-dcnode-id="1762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Henry_Dearle" title="John Henry Dearle"><span data-dcnode-id="1763" instrument_node="">John Henry Dearle</span></a><span data-dcnode-id="1761" instrument_node="">.</span><sup class="reference" data-dcnode-id="1758" id="cite_ref-FOOTNOTEFiell201988–82_8-0"><a data-dcnode-id="1759" href="#cite_note-FOOTNOTEFiell201988%E2%80%9382-8"><span data-dcnode-id="1760" instrument_node="">[8]</span></a></sup><span data-dcnode-id="1757" instrument_node=""> Burne-Jones made a drawing of the figures first, which was transformed into a color design by Morris or Dearle.  A photographic image was made of he design with figures, to which Morris or Dearle added a floral background, and a border equally filled with designs of trees and flowers. The full scale image was transferred onto cloth  by rubbing with a piece of ivory, and then woven on a loom.  Large-scale tapestries were made in this way at Merton, mostly by the employment of boys ages thirteen and fourteen, who received shelter, board and a daily wage.</span><sup class="reference" data-dcnode-id="1754" id="cite_ref-FOOTNOTEFiell201780–82_9-0"><a data-dcnode-id="1755" href="#cite_note-FOOTNOTEFiell201780%E2%80%9382-9"><span data-dcnode-id="1756" instrument_node="">[9]</span></a></sup><span data-dcnode-id="1753" instrument_node="">
</span></p><p data-dcnode-id="1740"><span data-dcnode-id="1751" instrument_node="">The most famous tapestries made by Burne-Jones and Morris were </span><a data-dcnode-id="1749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Holy_Grail_tapestries" title="Holy Grail tapestries"><span data-dcnode-id="1750" instrument_node="">Holy Grail tapestries</span></a><span data-dcnode-id="1748" instrument_node=""> made for  </span><a data-dcnode-id="1746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Knox_D%2527Arcy" title="William Knox D'Arcy"><span data-dcnode-id="1747" instrument_node="">William Knox D'Arcy</span></a><span data-dcnode-id="1745" instrument_node=""> in 1890 for his dining room at Stanmore Hall </span><sup class="reference" data-dcnode-id="1742" id="cite_ref-10"><a data-dcnode-id="1743" href="#cite_note-10"><span data-dcnode-id="1744" instrument_node="">[10]</span></a></sup><span data-dcnode-id="1741" instrument_node=""> Additional versions of the tapestries with minor variations were woven on commission by Morris &amp; Co. over the next decade.
</span></p><p data-dcnode-id="1731"><span data-dcnode-id="1739" instrument_node="">In addition to full-scale tapestries, the Merton Abbey workshop produced smaller works, designed as coverings for cushions and furniture. Multiple copies were made of some popular tapestries.  Ten copies were made of  </span><i data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">The Adoration</span></i><span data-dcnode-id="1736" instrument_node=""> between 1890 and 1907.  </span><sup class="reference" data-dcnode-id="1733" id="cite_ref-FOOTNOTEFiell201780–82_9-1"><a data-dcnode-id="1734" href="#cite_note-FOOTNOTEFiell201780%E2%80%9382-9"><span data-dcnode-id="1735" instrument_node="">[9]</span></a></sup><span data-dcnode-id="1732" instrument_node="">
</span></p><span data-dcnode-id="1730" instrument_node="">

</span><h2 data-dcnode-id="1642"><span class="mw-headline" data-dcnode-id="1650" id="Carpets"><span data-dcnode-id="1651" instrument_node="">Carpets</span></span><span class="mw-editsection" data-dcnode-id="1643"><span class="mw-editsection-bracket" data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">[</span></span><a data-dcnode-id="1646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWilliam_Morris_textile_designs%26action%3Dedit%26section%3D5" title="Edit section: Carpets"><span data-dcnode-id="1647" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1641" instrument_node="">
</span><p data-dcnode-id="1632"><span data-dcnode-id="1640" instrument_node="">In March, 1875, Morris became the sole owner of what became William Morris Company, buying out the shares of his partners.  He decided to diverify the products by adding carpets, a market that was almost totally dominated by original or imitation oriental carpets.  Within three months, he had registered his first design for the Cataline floor cloth, a decorative covering for </span><a data-dcnode-id="1638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Linoleum" title="Linoleum"><span data-dcnode-id="1639" instrument_node="">linoleum</span></a><span data-dcnode-id="1637" instrument_node=""> floors, a material which had been invented in 1855.  By December had registered two designs for machine-woven carpets which he had made by the Wilton Royal Carpet Factory.</span><sup class="reference" data-dcnode-id="1634" id="cite_ref-FOOTNOTEFiell201784_11-0"><a data-dcnode-id="1635" href="#cite_note-FOOTNOTEFiell201784-11"><span data-dcnode-id="1636" instrument_node="">[11]</span></a></sup><span data-dcnode-id="1633" instrument_node="">
</span></p><p data-dcnode-id="1623"><span data-dcnode-id="1631" instrument_node="">As usual, Morris set a high goal for himself.  His aim, he declared, was to make England independent of the Orient for the provision of hand-make carpets which aspire to the status of art.  He made a careful study of techniques and materials, and made a series of experiments.  When he moved to </span><a data-dcnode-id="1629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kelmscott_House" title="Kelmscott House"><span data-dcnode-id="1630" instrument_node="">Kelmscott House</span></a><span data-dcnode-id="1628" instrument_node=""> in 1879 he began  to produce a series of carpets called Hammersmith.  He hired a labor force of young women to work on looms he  set up in the former stables and garage of  his London residence.  He also revived the art of hand-knotting for making small carpets.</span><sup class="reference" data-dcnode-id="1625" id="cite_ref-12"><a data-dcnode-id="1626" href="#cite_note-12"><span data-dcnode-id="1627" instrument_node="">[12]</span></a></sup><span data-dcnode-id="1624" instrument_node="">
</span></p><p data-dcnode-id="1608"><span data-dcnode-id="1622" instrument_node="">In the 1880s, in addition to the Hammersmith carpets, Morris created series of designs for machine-made </span><a data-dcnode-id="1620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Axminster" title="Axminster"><span data-dcnode-id="1621" instrument_node="">Axminster</span></a><span data-dcnode-id="1619" instrument_node=""> and Kidderminister carpets, made at the Wilton factory or at </span><a data-dcnode-id="1617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heckmondwike" title="Heckmondwike"><span data-dcnode-id="1618" instrument_node="">Heckmondwike</span></a><span data-dcnode-id="1616" instrument_node=""> Manufacturing company in </span><a data-dcnode-id="1614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yorkshire" title="Yorkshire"><span data-dcnode-id="1615" instrument_node="">Yorkshire</span></a><span data-dcnode-id="1613" instrument_node="">.  Many of the carpets he designed used the patterns he had invented for  printed fabrics, but others, particularly the Hammersmith carpets, resembled the designs he made for his woven textiles. His early carpets sometimes borrowed popular oriental motifs.   The designs he made for Axminister and Wilton carpets were less lavish in their ornament and more geometrical, to make them more affordable.</span><sup class="reference" data-dcnode-id="1610" id="cite_ref-FOOTNOTEFiell201780–82_9-2"><a data-dcnode-id="1611" href="#cite_note-FOOTNOTEFiell201780%E2%80%9382-9"><span data-dcnode-id="1612" instrument_node="">[9]</span></a></sup><span data-dcnode-id="1609" instrument_node="">
</span></p><p data-dcnode-id="1602"><span data-dcnode-id="1607" instrument_node="">In 1881 he moved the workshop to Merton Abbey, where there was space to weave much larger carpets commissioned by his clients.  His designs for these large Hammersmith carpets moved farther away from the Oriental influence, and took on a more specifically English style.  As with his wallpapers other textiles,  his inspirations were most often flowers, plants and animals found in English gardens.</span><sup class="reference" data-dcnode-id="1604" id="cite_ref-FOOTNOTEFiell201780–86_13-0"><a data-dcnode-id="1605" href="#cite_note-FOOTNOTEFiell201780%E2%80%9386-13"><span data-dcnode-id="1606" instrument_node="">[13]</span></a></sup><span data-dcnode-id="1603" instrument_node="">
</span></p><p data-dcnode-id="1583"><span data-dcnode-id="1601" instrument_node="">One particularly notable design was the Bullerswood carpet, was made in 1889 for the wool trader John Sanderson, who had a country residence called Bullerswood in </span><a data-dcnode-id="1599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chislehurst" title="Chislehurst"><span data-dcnode-id="1600" instrument_node="">Chislehurst</span></a><span data-dcnode-id="1598" instrument_node="">, </span><a data-dcnode-id="1596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kent" title="Kent"><span data-dcnode-id="1597" instrument_node="">Kent</span></a><span data-dcnode-id="1595" instrument_node="">. Morris made two versions of the carpet for the house, in collaboration with his assistant </span><a data-dcnode-id="1593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Henry_Dearle" title="John Henry Dearle"><span data-dcnode-id="1594" instrument_node="">John Henry Dearle</span></a><span data-dcnode-id="1592" instrument_node="">. Extremely complex, they were virtual anthologies of all of the motifs of Morris.</span><sup class="reference" data-dcnode-id="1589" id="cite_ref-14"><a data-dcnode-id="1590" href="#cite_note-14"><span data-dcnode-id="1591" instrument_node="">[14]</span></a></sup><span data-dcnode-id="1588" instrument_node=""> Morris made one carpet for the living room and another for the front hallway. He also strictly supervised the decoration of these rooms, so it would be in harmony with the carpet.</span><sup class="reference" data-dcnode-id="1585" id="cite_ref-FOOTNOTEBeecroft2019300_15-0"><a data-dcnode-id="1586" href="#cite_note-FOOTNOTEBeecroft2019300-15"><span data-dcnode-id="1587" instrument_node="">[15]</span></a></sup><span data-dcnode-id="1584" instrument_node="">
</span></p><span data-dcnode-id="1582" instrument_node="">

</span><h2 data-dcnode-id="1509"><span class="mw-headline" data-dcnode-id="1517" id="The_William_Morris_style"><span data-dcnode-id="1518" instrument_node="">The William Morris style</span></span><span class="mw-editsection" data-dcnode-id="1510"><span class="mw-editsection-bracket" data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">[</span></span><a data-dcnode-id="1513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWilliam_Morris_textile_designs%26action%3Dedit%26section%3D6" title="Edit section: The William Morris style"><span data-dcnode-id="1514" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1508" instrument_node="">
</span><p data-dcnode-id="1502"><span data-dcnode-id="1507" instrument_node="">Morris explained his ideas about textile designs  in a group of essays by members of the Arts and Crafts movement published in 1893.  In his essay on textiles, Morris wrote: "The aim should be to combine clearness of form and firmness of structure with the mystery which comes of abundance and richness of detail...Do not introduce any lines or objects which cannot be explained by the structure of the pattern; it is just this logical sequence of form, this growth which looks as if, under the circumstances, it could not have been otherwise, which prevents he eye wearying of he repetition of the pattern.</span><sup class="reference" data-dcnode-id="1504" id="cite_ref-16"><a data-dcnode-id="1505" href="#cite_note-16"><span data-dcnode-id="1506" instrument_node="">[16]</span></a></sup><span data-dcnode-id="1503" instrument_node="">
</span></p><p data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">"...Do not be afraid of large patterns; if properly designed they are more restful to the eye than small ones...Very small rooms, as well as very large ones, look best ornamented with large patterns."
</span></p><p data-dcnode-id="1494"><span data-dcnode-id="1499" instrument_node="">"...As final maxims, never forget the material you are working with, and try always to use it for doing what it can do best: if you feel yourself hampered by the material in which you are working, instead of being helped by it, you have so far not learned your business, any more than a would-be poet has, who complains of the hardship of writing in measure and rhyme."</span><sup class="reference" data-dcnode-id="1496" id="cite_ref-17"><a data-dcnode-id="1497" href="#cite_note-17"><span data-dcnode-id="1498" instrument_node="">[17]</span></a></sup><span data-dcnode-id="1495" instrument_node="">
</span></p><p data-dcnode-id="1488"><span data-dcnode-id="1493" instrument_node="">In the same group of 1893 essays, he expressed his views of tapestry designs. He wrote:  "As in all wall decoration, the first thing to be considered in designing of Tapestry is the force, purity and elegance of the silhouette of the objects represented, and nothing vague or indeterminate is admissible. But special excellencies can be expected from it.  Depth of tone, richness of colour, and exquisite gradation of tints are easily to be obtained in Tapestry; and it also demands that crispness and abundance of beautiful detail which was the especial characteristic of fully developed Medieval Art.  The style of even the best period of the Renaissance is wholly unfit for Tapestry; accordingly, we find that Tapestry retained its Gothic character longer than any other of the pictorial arts."</span><sup class="reference" data-dcnode-id="1490" id="cite_ref-FOOTNOTEBeecroft2019336_18-0"><a data-dcnode-id="1491" href="#cite_note-FOOTNOTEBeecroft2019336-18"><span data-dcnode-id="1492" instrument_node="">[18]</span></a></sup><span data-dcnode-id="1489" instrument_node="">
</span></p><p data-dcnode-id="1482"><span data-dcnode-id="1487" instrument_node="">In writing about textiles, Morris emphasised the importance of using natural dyes and colours. "These colours in fading still remain beautiful,"  he wrote, "and even after long wear, never pass into nothingness, through that stage which of livid ugliness which distinguishes the commercial dyes as nuisances, even more than their short and by no means merry life."</span><sup class="reference" data-dcnode-id="1484" id="cite_ref-19"><a data-dcnode-id="1485" href="#cite_note-19"><span data-dcnode-id="1486" instrument_node="">[19]</span></a></sup><span data-dcnode-id="1483" instrument_node="">
</span></p><p data-dcnode-id="1473"><span data-dcnode-id="1481" instrument_node="">As to colours for carpets, he wrote in his essay on textiles;  "The soft gradations of tint to which Tapestry lends itself are unfit for Carpet-weaving; beauty and variety of colour must be obtained bh harmonious juxtaposition of tints, bounded by judiciously chosen outlines, and the pattern should lie absolutely flat on the ground. On the whole, in designing carpets the method of </span><b data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">contrast</span></b><span data-dcnode-id="1478" instrument_node=""> should is the best one to employ, and blue and red, quit frankly used, with white or very light outlines on a dark ground, and black or some very dark colour on a light ground, are the main colours on which the designer should depend."</span><sup class="reference" data-dcnode-id="1475" id="cite_ref-20"><a data-dcnode-id="1476" href="#cite_note-20"><span data-dcnode-id="1477" instrument_node="">[20]</span></a></sup><span data-dcnode-id="1474" instrument_node="">
</span></p><span data-dcnode-id="1472" instrument_node="">
</span><ul class="gallery mw-gallery-packed" data-dcnode-id="1413"><span data-dcnode-id="1471" instrument_node="">
</span><li class="gallerybox" data-dcnode-id="1451" style="width: 139.396px;"><div data-dcnode-id="1452" style="width: 139.396px;"><span data-dcnode-id="1470" instrument_node="">

</span><h2 data-dcnode-id="1402"><span class="mw-headline" data-dcnode-id="1410" id="Legacy"><span data-dcnode-id="1411" instrument_node="">Legacy</span></span><span class="mw-editsection" data-dcnode-id="1403"><span class="mw-editsection-bracket" data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">[</span></span><a data-dcnode-id="1406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWilliam_Morris_textile_designs%26action%3Dedit%26section%3D7" title="Edit section: Legacy"><span data-dcnode-id="1407" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1401" instrument_node="">
</span><p data-dcnode-id="1384"><span data-dcnode-id="1400" instrument_node="">William Morris died on October 3, 1896, but the </span><a data-dcnode-id="1398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Morris_%2526_Co." title="Morris &amp; Co."><span data-dcnode-id="1399" instrument_node="">Morris &amp; Co.</span></a><span data-dcnode-id="1397" instrument_node=""> continued to design and produce textiles he had designed or planned, under the supervision of his chief assistant and Art Director </span><a data-dcnode-id="1395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Henry_Dearle" title="John Henry Dearle"><span data-dcnode-id="1396" instrument_node="">John Henry Dearle</span></a><span data-dcnode-id="1394" instrument_node="">. Dearle managed the company's textile works at Merton Abbey until his own death in 1932.  The firm was finally dissolved in 1940, but his designs continue to be produced and marketed by other textile firms, including </span><a class="mw-redirect" data-dcnode-id="1392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sanderson_and_Sons" title="Sanderson and Sons"><span data-dcnode-id="1393" instrument_node="">Sanderson and Sons</span></a><span data-dcnode-id="1391" instrument_node="">, part of the </span><a data-dcnode-id="1389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Walker_Greenbank" title="Walker Greenbank"><span data-dcnode-id="1390" instrument_node="">Walker Greenbank</span></a><span data-dcnode-id="1388" instrument_node=""> wallpaper and fabrics business, which now owns the. "Morris and Co." brand name, and by the department store </span><a data-dcnode-id="1386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberty_%28department_store%29" title="Liberty (department store)"><span data-dcnode-id="1387" instrument_node="">Liberty of London</span></a><span data-dcnode-id="1385" instrument_node="">.
</span></p><span data-dcnode-id="1383" instrument_node="">
