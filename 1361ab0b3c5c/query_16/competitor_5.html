</span><div class="testimonials" data-dcnode-id="755" id="text_link"><span data-dcnode-id="825" instrument_node="">
</span><h2 class="testi" data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">The History of the Persian Rugs</span></h2><span data-dcnode-id="822" instrument_node="">
</span><p class="testi" data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">&nbsp;</span></p><span data-dcnode-id="819" instrument_node="">
</span><p class="testimonials" data-dcnode-id="815"><a data-dcnode-id="816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.little-persia.com/rug-guides"><em data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Back to Rug Guides</span></em></a></p><span data-dcnode-id="814" instrument_node="">
</span><p class="testi" data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">&nbsp;</span></p><span data-dcnode-id="811" instrument_node="">
</span><p class="testimonials" data-dcnode-id="805"><span data-dcnode-id="810" instrument_node="">The art of carpet weaving in Iran originated  more than 2,500 years ago. Persian carpets and rugs were initially woven as  articles of necessity to cover the floors of nomadic tribesmen, giving them  protection from the cold and damp. The natural progression of the skill and  craft involved in the creation of these works of art has been passed down from  generation to generation over the centuries throughout periods of peace,  invasion and war. As international trade developed, the variety of patterns and  designs grew. </span><br data-dcnode-id="809"><span data-dcnode-id="808" instrument_node="">
</span><br data-dcnode-id="807"><span data-dcnode-id="806" instrument_node="">
    Much of the  progression of the Persian carpet lies in conjunction with the various rulers  of the country throughout time. When Cyrus the Great conquered Babylon  in 539 BC, he was struck by its splendour and many historians credit him for  introducing the art of carpet making into Persia. It is said that the tomb of  Cyrus, who was buried at Pasargadae near Persepolis, was covered  with precious carpets. Even before his time, it is very likely that Persian  nomads created at least very simple designs for their own homes. Their herds of  sheep and goats provided them with high quality and durable wool for this  purpose. </span></p><span data-dcnode-id="804" instrument_node="">
</span><p class="testimonials" data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">In 1949 Russian  archaeologists discovered the oldest known knotted carpet in the  Pazyryk valley, on the Altai Mountains of Siberia.  Dating back to the 5th century BC the Pazyryk carpet is a fine example of the  skill which existed and has been developed and refined over the centuries. The  carpet survived over two millennium preserved in the frozen  tombs of Scythian nobles, and is now the showpiece of the Hermitage Museum of  Leningrad (St. Petersburg). The intricacy of this rug suggests that even at this early  date, the art of carpet weaving had progressed well beyond simple rugs designed  for practical purposes.  </span></p><span data-dcnode-id="801" instrument_node="">
</span><p class="testimonials" data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">The first  documented evidence on the existence of carpets came from Chinese texts dating  back to the Sassanid Dynasty (224 - 641 AD). In 628 AD, the Emperor Heraclius  brought back a variety of carpets from the conquest of Ctesiphon, the Sassanian capital. The Arabs  also conquered Ctesiphon  in 637 AD, and among the spoils brought back were said to be many carpets, one  of which was the famous garden carpet, the "Springtime of Khosro".  This carpet has passed into history as the most precious of all time. Made  during the reign of Khosro I (531 - 579 AD) the carpet was enormous, measuring  400’ x 100’ and weighing several tonnes. Historians describe the silk based rug as follows: "The border was a magnificent flower bed of blue, red,  white, yellow and green stones; in the background the colour of the earth was  imitated with gold; clear stones like crystals gave the illusion of water; the  plants were in silk and the fruits were formed by colour stones". The king  is said to have strolled along the carpet in winter to remind him of the beauty  of spring. &nbsp;However, when the Arabs  invaded they cut the magnificent carpet into many pieces, selling each piece  separately. </span></p><span data-dcnode-id="798" instrument_node="">
</span><p align="center" data-dcnode-id="795"><img alt="Picture of the Pazyryk carpet" data-dcnode-id="797" height="200" hspace="30" id="pazyryk" name="pazyryk" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.little-persia.com/images/Pazyrykfull.jpg&amp;raw" vspace="5" width="210"><img alt="The centre-piece of the ArdabilRug" data-dcnode-id="796" height="200" hspace="30" id="ardabil" name="ardabil" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.little-persia.com/images/Ardabil%2520persian%2520rug.jpg&amp;raw" vspace="5" width="210"></p><span data-dcnode-id="794" instrument_node="">
</span><p align="center" data-dcnode-id="791"><em data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">The Pazyryk Rug (left) and Ardabil Carpet (right).</span></em></p><span data-dcnode-id="790" instrument_node="">
</span><p align="center" data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">&nbsp;</span></p><span data-dcnode-id="787" instrument_node="">
</span><p class="testimonials" data-dcnode-id="783"><span data-dcnode-id="786" instrument_node="">After the  period of domination by the Arab Caliphates, a Turkish tribe, named after their  founder, Seljok conquered Persia.  Their domination (1038 - 1194 AD) was of great importance in the history of  Persian carpets. The Seljuk women were skillful carpet makers using Turkish  knots. In the provinces of Azerbaijan  and Hamadan  where Seljuk influence was strongest and longest lasting, the Turkish knot is  used to this day. </span><br data-dcnode-id="785"><span data-dcnode-id="784" instrument_node="">
    The Mongol  conquest and control of Persia  (1220 – 1449) was initially brutal. However, they soon came under the influence  of the Persians. The palace   of Tabriz, belonging to  the Ilkhan leader, Ghazan Khan (1295 - 1304) had paved floors covered with  precious carpets. The Mongol ruler Shah Rokh (1409 - 1446) contributed to the  reconstruction of much that was destroyed by the Mongols and encouraged all the  artistic activities of the region. However, the carpets in this period were  decorated with simple motifs, which were mainly geometric in style. </span></p><span data-dcnode-id="782" instrument_node="">
</span><p class="testimonials" data-dcnode-id="771"><span data-dcnode-id="781" instrument_node="">The Persian carpet reached its zenith  during the reign of the Safavid Dynasty in the 16th century AD. Approximately  1500 examples are preserved in various museums and in private collections  worldwide. During the reign of Shah Abbas (1587 - 1629), commerce and crafts  prospered in Persia.  Shah Abbas encouraged contacts and trade with Europe and transformed his new  capital, </span><a data-dcnode-id="779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.little-persia.com/rug-guides/rug-origins/isfahan"><span data-dcnode-id="780" instrument_node="">Isfahan</span></a><span data-dcnode-id="778" instrument_node="">, into one of the most glorious  cities of Persia.  He also built workshops for carpets where skilled designers and craftsmen set  to work to create splendid specimens. Most of these carpets were made of silk,  with gold and silver threads adding even more embellishment. Two of the best  know carpets of the Safavid period; dated 1539 come from the mosque of Ardabil. Many experts believe that these carpets  represent the culmination of achievement in carpet design. The larger of the  two carpets is now a centrepiece in London's </span><a data-dcnode-id="775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.vam.ac.uk/page/a/ardabil-carpet/" target="_blank"><strong data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Victoria and Albert Museum</span></strong></a><span data-dcnode-id="774" instrument_node="">.</span><br data-dcnode-id="773"><span data-dcnode-id="772" instrument_node="">
</span></p><span data-dcnode-id="770" instrument_node="">
</span><p class="testimonials" data-dcnode-id="757"><span data-dcnode-id="769" instrument_node="">The court period of the Persian carpet  ended with the Afghan invasion in 1722. The Afghans destroyed Isfahan, yet their domination lasted for only  a short period and in 1736, a young Chieftain from Khorasan, Nader Khan became  the Shah of Persia. Through the whole course of his reign, all the country's  forces were utilized in campaigns against the Afghans, the Turks, and the  Russians. During this period, and for several turbulent years after his death  in 1747, no carpets of any great value were made; solely nomads and craftsmen  in small villages continued the tradition of their craft. </span><br data-dcnode-id="768"><span data-dcnode-id="767" instrument_node="">
</span><br data-dcnode-id="766"><span data-dcnode-id="765" instrument_node="">
    In the last quarter of the 19th Century and during the reign of Qajar, trade  and craftsmanship regained their importance. Carpet making flourished once more  with Tabriz merchants exporting carpets to  Europe through Istanbul.  By the end of the 19th Century some European and American companies even set up  businesses in Persia  and organised craft production destined for western markets. Through this  development new designs were made with Western tastes in mind. An example of  this is the Manchester based German company  Ziegler &amp; Co. moving to Iran  to develop new carpets for export, their work with the master weavers of Iran led to the  development of carpets suited to Western interiors such as the </span><a data-dcnode-id="763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.little-persia.com/rug-guides/rug-origins/ziegler"><span data-dcnode-id="764" instrument_node="">Ziegler rug</span></a><span data-dcnode-id="762" instrument_node="">  which is currently one of the most popular rugs in production. </span><br data-dcnode-id="761"><span data-dcnode-id="760" instrument_node="">
</span><br data-dcnode-id="759"><span data-dcnode-id="758" instrument_node="">
    Today, carpet weaving is by far the most widespread handicraft in Iran. Persian  carpets are renowned for their richness of colour, variety of spectacular  artistic patterns and quality of design. In palaces, famous buildings, mansions  and museums the world over, a Persian carpet is amongst the most treasured of  possessions.</span></p><span data-dcnode-id="756" instrument_node="">
</span></div><span data-dcnode-id="754" instrument_node="">
