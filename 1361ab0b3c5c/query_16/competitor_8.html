    Pila, Justine --- "Works of Artistic Craftsmanship in the High Court of Australia: The Exception as Paradigm Copyright Work" [2008] FedLawRw 15; (2008) 36(3) Federal Law Review 363
  </span></h2><span data-dcnode-id="2122" instrument_node="">
</span><span data-dcnode-id="2120" instrument_node="">
</span><span data-dcnode-id="2118" instrument_node="">
</span><span data-dcnode-id="2116" instrument_node="">
</span><ul data-dcnode-id="2076"><span data-dcnode-id="2115" instrument_node="">
</span><li data-dcnode-id="2112"><a data-dcnode-id="2113" href="#Heading3"><span data-dcnode-id="2114" instrument_node="">WORKS OF ARTISTIC CRAFTSMANSHIP IN THE HIGH COURT OF AUSTRALIA: THE EXCEPTION AS PARADIGM COPYRIGHT WORK
</span></a></li><span data-dcnode-id="2111" instrument_node="">

</span><li data-dcnode-id="2107"><a data-dcnode-id="2108" href="#Heading17"><span data-dcnode-id="2109" instrument_node="">I	THE DECISION IN BURGE AND REASONS FOR IT
</span></a></li><span data-dcnode-id="2106" instrument_node="">
</span><li data-dcnode-id="2103"><a data-dcnode-id="2104" href="#Heading36"><span data-dcnode-id="2105" instrument_node="">II	THE CONSTITUENT PROPERTIES OF WORKS OF ARTISTIC CRAFTSMANSHIP
</span></a></li><span data-dcnode-id="2102" instrument_node="">
</span><ul data-dcnode-id="2092"><span data-dcnode-id="2101" instrument_node="">
</span><li data-dcnode-id="2098"><a data-dcnode-id="2099" href="#Heading38"><span data-dcnode-id="2100" instrument_node="">A	The legislative place of works of artistic craftsmanship
</span></a></li><span data-dcnode-id="2097" instrument_node="">
</span><li data-dcnode-id="2094"><a data-dcnode-id="2095" href="#Heading76"><span data-dcnode-id="2096" instrument_node="">B	Works of artistic craftsmanship and the requirements for artistic form and quality
</span></a></li><span data-dcnode-id="2093" instrument_node="">
</span></ul><span data-dcnode-id="2091" instrument_node="">
</span><li data-dcnode-id="2088"><a data-dcnode-id="2089" href="#Heading152"><span data-dcnode-id="2090" instrument_node="">III	WORKS OF ARTISTIC CRAFTSMANSHIP AS PARADIGM (NOT EXCEPTIONAL) COPYRIGHT WORKS
</span></a></li><span data-dcnode-id="2087" instrument_node="">
</span><li data-dcnode-id="2084"><a data-dcnode-id="2085" href="#Heading171"><span data-dcnode-id="2086" instrument_node="">IV	FUNCTIONAL AND COMMERCIAL CONSIDERATIONS AND COPYRIGHT PROTECTION
</span></a></li><span data-dcnode-id="2083" instrument_node="">

</span><h1 align="center" data-dcnode-id="2067"><span data-dcnode-id="2074" instrument_node="">
</span><a data-dcnode-id="2073" name="Heading3"></a><b data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">WORKS OF ARTISTIC CRAFTSMANSHIP IN THE HIGH COURT OF
AUSTRALIA: </span></b><br data-dcnode-id="2070"><b data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">THE EXCEPTION AS PARADIGM COPYRIGHT WORK</span></b></h1><span data-dcnode-id="2066" instrument_node="">
</span><p align="center" data-dcnode-id="2059"><b data-dcnode-id="2060"><i data-dcnode-id="2061"><span data-dcnode-id="2065" instrument_node="">Justine
Pila</span><sup data-dcnode-id="2062"><a data-dcnode-id="2063" href="#fn1" name="fnB1"><span data-dcnode-id="2064" instrument_node="">[*]</span></a></sup></i></b></p><span data-dcnode-id="2058" instrument_node="">
</span><p data-dcnode-id="2033"><span data-dcnode-id="2057" instrument_node="">In </span><i data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">Burge v Swarbrick</span></i><span data-dcnode-id="2054" instrument_node="">,</span><sup data-dcnode-id="2051"><a data-dcnode-id="2052" href="#fn2" name="fnB2"><span data-dcnode-id="2053" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2050" instrument_node=""> the
High Court of Australia delivered an important decision on the most elusive of
works protected by copyright: the work of artistic
craftsmanship ('WAC').
Drawing on the history and reasons for that protection, and adopting the
analysis of Lord Simon in </span><i data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">George Hensher Ltd v Restawile Upholstery (Lancs)
Ltd</span></i><span data-dcnode-id="2047" instrument_node="">,</span><sup data-dcnode-id="2044"><a data-dcnode-id="2045" href="#fn3" name="fnB3"><span data-dcnode-id="2046" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2043" instrument_node=""> the Court affirmed the
orthodox view that such works have 'special status' in law on account of their
'real artistic
quality'.</span><a data-dcnode-id="2042" name="_Ref80716653"></a><sup data-dcnode-id="2039"><a data-dcnode-id="2040" href="#fn4" name="fnB4"><span data-dcnode-id="2041" instrument_node="">[2]</span></a></sup><span data-dcnode-id="2038" instrument_node="">
In its judgment, whether a work has that quality depends on whether it is a work
of craftsmanship the artistic form of expression
of which is sufficiently
'unconstrained by functional
considerations'.</span><a data-dcnode-id="2037" name="_Ref80632486"></a><sup data-dcnode-id="2034"><a data-dcnode-id="2035" href="#fn5" name="fnB5"><span data-dcnode-id="2036" instrument_node="">[3]</span></a></sup></p><span data-dcnode-id="2032" instrument_node="">
</span><p data-dcnode-id="2009"><span data-dcnode-id="2031" instrument_node="">In the discussion below I consider that view, and other aspects of the
Court's decision. I suggest the requirement for artistic quality
is simply a
requirement for a WAC 'not imaginary, unreal or apparent
only'.</span><a data-dcnode-id="2030" name="_Ref81305681"></a><sup data-dcnode-id="2027"><a data-dcnode-id="2028" href="#fn6" name="fnB6"><span data-dcnode-id="2029" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2026" instrument_node="">
Further, the properties of this type of work are better conceived in historical
terms than the formal aesthetic terms of the Court.
On this view, whether an
object is a WAC depends on both its properties of form and the history of its
individual production, meaning
the (subjective) intent of its individual author
and view of society with respect to its nature. The same view finds support in
the
reasoning in </span><i data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">Burge</span></i><span data-dcnode-id="2023" instrument_node="">, and is consistent, too, with the judgment in
</span><i data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">Hensher</span></i><span data-dcnode-id="2020" instrument_node="">, as well as more recent United Kingdom ('UK') cases. As those
cases reflect, even conceived in historical terms, WACs are not exceptional
works but rather </span><i data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">paradigmatic</span></i><span data-dcnode-id="2017" instrument_node=""> works, contrary to the orthodox view above.
The fact that they are functional too does not lessen their need for artistic
quality,
undermining the support of previous cases, including </span><i data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">Desktop
Marketing Systems Pty Ltd v Telstra Corporation
Ltd</span></i><span data-dcnode-id="2014" instrument_node="">,</span><sup data-dcnode-id="2011"><a data-dcnode-id="2012" href="#fn7" name="fnB7"><span data-dcnode-id="2013" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2010" instrument_node=""> for extending the
statutory categories of works to ensure that functional considerations do not
constrain the scope for legal protection.</span></p><span data-dcnode-id="2008" instrument_node="">
</span><p data-dcnode-id="2001"><span data-dcnode-id="2007" instrument_node="">Running through this discussion are general themes, also explored in other
papers,</span><a data-dcnode-id="2006" name="_Ref81480357"></a><a data-dcnode-id="2005" name="_Ref87951322"></a><sup data-dcnode-id="2002"><a data-dcnode-id="2003" href="#fn8" name="fnB8"><span data-dcnode-id="2004" instrument_node="">[6]</span></a></sup></p><span data-dcnode-id="2000" instrument_node="">
</span><p data-dcnode-id="1986"><span data-dcnode-id="1999" instrument_node=""> of the role of history (including intent) and categories of works in
copyright law. My suggestion has been that categories matter,
not only on
account of their statutory use, but also their impact on judicial perceptions</span><i data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">
</span></i><span data-dcnode-id="1996" instrument_node="">(and sometimes conceptions) of individual works. Similarly with respect to
history itself: the specific origins of an expressive object
are part of what
constitutes the object </span><i data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node="">qua</span></i><span data-dcnode-id="1993" instrument_node=""> work, while that which the statutory
categories denote are different authorial (expressive) traditions. The same
view, it is submitted,
is central to </span><i data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">Hensher</span></i><span data-dcnode-id="1990" instrument_node="">, and also to the High
Court's decision in </span><i data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">Burge</span></i><span data-dcnode-id="1987" instrument_node="">.</span></p><span data-dcnode-id="1985" instrument_node="">
</span><h2 data-dcnode-id="1980"><span data-dcnode-id="1984" instrument_node="">
</span><a data-dcnode-id="1983" name="Heading17"></a><b data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">I	THE DECISION IN BURGE AND REASONS FOR IT</span></b></h2><span data-dcnode-id="1979" instrument_node="">
</span><p data-dcnode-id="1954"><span data-dcnode-id="1978" instrument_node="">The respondent in </span><i data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">Burge</span></i><span data-dcnode-id="1975" instrument_node="">, Mr Swarbrick, was the designer of the 'JS
9000' yacht, and principal of a company that manufactured the yacht for sale in
Australia
and elsewhere.</span><sup data-dcnode-id="1972"><a data-dcnode-id="1973" href="#fn9" name="fnB9"><span data-dcnode-id="1974" instrument_node="">[7]</span></a></sup><span data-dcnode-id="1971" instrument_node=""> The
litigation concerned an allegation of copyright infringement arising from the
unauthorised copying by the appellants of 'a hand-crafted
full scale model' of
the hull and deck sections of the yacht ('the Plug'), and inverted copies of the
Plug in the form of hull and
deck
moulds.</span><sup data-dcnode-id="1968"><a data-dcnode-id="1969" href="#fn10" name="fnB10"><span data-dcnode-id="1970" instrument_node="">[8]</span></a></sup><span data-dcnode-id="1967" instrument_node=""> According to the
respondent, the Plug and moulds were works of artistic craftsmanship and
sculptures in which copyright subsisted
under the </span><i data-dcnode-id="1964"><a class="autolink_findacts" data-dcnode-id="1965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.austlii.edu.au/au/legis/cth/consol_act/ca1968133/"><span data-dcnode-id="1966" instrument_node="">Copyright Act 1968</span></a></i><span data-dcnode-id="1963" instrument_node="">
(Cth) ('the Act'). The appellants denied this, and further defended the claim
with reference to the copyright/design overlap provisions
contained in </span><a class="autolink_findacts" data-dcnode-id="1961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.austlii.edu.au/au/legis/cth/consol_act/ca1968133/s77.html"><span data-dcnode-id="1962" instrument_node="">s 77</span></a><span data-dcnode-id="1960" instrument_node=""> of
the Act. According to that section, copyright in an artistic work other than a
building, model of a building, or work of artistic
craftsmanship, is not
infringed where a corresponding design of the work is or has been applied
industrially by or with the licence
of the copyright owner in the place of
industrial application, and products to which that design has been applied are
sold, let for
hire, offered or exposed for sale or hire in Australia or
elsewhere, at a time at which the corresponding design is not itself registrable
under the </span><i data-dcnode-id="1956"><a class="autolink_findacts" data-dcnode-id="1958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.austlii.edu.au/au/legis/cth/consol_act/da200391/"><span data-dcnode-id="1959" instrument_node="">Designs Act 2003</span></a><span data-dcnode-id="1957" instrument_node=""> </span></i><span data-dcnode-id="1955" instrument_node="">(Cth) or has not been registered under that or
its predecessor (1906) legislation.</span></p><span data-dcnode-id="1953" instrument_node="">
</span><p data-dcnode-id="1948"><span data-dcnode-id="1952" instrument_node="">At first instance Carr J rejected the appellants' </span><a class="autolink_findacts" data-dcnode-id="1950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.austlii.edu.au/au/legis/cth/consol_act/da200391/s77.html"><span data-dcnode-id="1951" instrument_node="">s 77</span></a><span data-dcnode-id="1949" instrument_node=""> defence and found them
to have infringed the respondent's copyright. An appeal to the Full Federal
Court was unsuccessful, resulting
in a further appeal to the High Court. That
appeal was allowed, with the Court finding that neither the Plug nor moulds were
works
of artistic copyright at all.</span></p><span data-dcnode-id="1947" instrument_node="">
</span><p data-dcnode-id="1939"><span data-dcnode-id="1946" instrument_node="">The main issue in </span><i data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">Burge</span></i><span data-dcnode-id="1943" instrument_node="">, and the issue focused on here,</span><i data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node=""> </span></i><span data-dcnode-id="1940" instrument_node="">was
whether the model of the JS 9000 yacht was a work of artistic craftsmanship in
law. The Court held it was not, for it manifested
insufficient concern for
'matters of visual and aesthetic appeal':</span></p><span data-dcnode-id="1938" instrument_node="">
</span><blockquote data-dcnode-id="1933"><span data-dcnode-id="1937" instrument_node="">
Taken as a whole and considered objectively, the evidence, at best, shows that
matters of visual and aesthetic appeal were but one
of a range of considerations
in the design of the Plug [model]. Matters of visual and aesthetic appeal
necessarily were subordinated
to achievement of the purely functional aspects
required for a successfully marketed 'sports boat' and thus for the commercial
objective
in
view.</span><sup data-dcnode-id="1934"><a data-dcnode-id="1935" href="#fn11" name="fnB11"><span data-dcnode-id="1936" instrument_node="">[9]</span></a></sup></blockquote><p data-dcnode-id="1903"><span data-dcnode-id="1932" instrument_node="">The
implication of the Court's reasoning is that for a work to be one of artistic
craftsmanship it must reflect the values of the
expressive tradition which that
statutory category of work
denotes.</span><a data-dcnode-id="1931" name="_Ref80632428"></a><sup data-dcnode-id="1928"><a data-dcnode-id="1929" href="#fn12" name="fnB12"><span data-dcnode-id="1930" instrument_node="">[10]</span></a></sup><span data-dcnode-id="1927" instrument_node="">
Specifically, it must defy the antithesis of function and art in furtherance of
the utilitarian aesthetic that distinguishes the
aim of the Arts and Crafts
movement from the aim of other artistic
traditions.</span><sup data-dcnode-id="1924"><a data-dcnode-id="1925" href="#fn13" name="fnB13"><span data-dcnode-id="1926" instrument_node="">[11]</span></a></sup><span data-dcnode-id="1923" instrument_node=""> On the evidence of
the author and witness,</span><i data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node=""> </span></i><span data-dcnode-id="1920" instrument_node="">the model of the yacht failed that test; for
while accepted as a work of craftsmanship, it was neither intended by Mr
Swarbrick, nor
understood by the expert witness Mr Warwick Hood, to possess the
quality of </span><i data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">artistic
</span></i><span data-dcnode-id="1917" instrument_node="">craftsmanship.</span><sup data-dcnode-id="1914"><a data-dcnode-id="1915" href="#fn14" name="fnB14"><span data-dcnode-id="1916" instrument_node="">[12]</span></a></sup><span data-dcnode-id="1913" instrument_node=""> Indeed, under
cross-examination Mr Swarbrick agreed that his aim in creating the model of the
yacht was to design '[a fast and] well
mannered, easily balanced
boat'.</span><sup data-dcnode-id="1910"><a data-dcnode-id="1911" href="#fn15" name="fnB15"><span data-dcnode-id="1912" instrument_node="">[13]</span></a></sup><span data-dcnode-id="1909" instrument_node=""> The result was confirmed
by the evidence of Mr Hood, that artistic effort was
contra-standard</span><a data-dcnode-id="1908" name="_Ref81490058"></a><sup data-dcnode-id="1905"><a data-dcnode-id="1906" href="#fn16" name="fnB16"><span data-dcnode-id="1907" instrument_node="">[14]</span></a></sup><span data-dcnode-id="1904" instrument_node="">
to this particular category of boat:</span></p><span data-dcnode-id="1902" instrument_node="">
</span><blockquote data-dcnode-id="1897"><span data-dcnode-id="1901" instrument_node="">
[The yacht is] an example of a popular class of yacht, known as a 'sports boat',
designed to sail as fast as possible within the
constraints of an overall length
of about 9 metres. Speed was said to be the overriding consideration in the
design of 'sports boats'
and all other factors were of secondary importance. Mr
Hood said the design of 'sports boats' was not substantially or mainly governed
by considerations of appearance or pleasing
aesthetics.</span><sup data-dcnode-id="1898"><a data-dcnode-id="1899" href="#fn17" name="fnB17"><span data-dcnode-id="1900" instrument_node="">[15]</span></a></sup></blockquote><p data-dcnode-id="1889"><span data-dcnode-id="1896" instrument_node="">For
these reasons, the model was not a work of artistic craftsmanship:</span><i data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node=""> </span></i><span data-dcnode-id="1893" instrument_node="">its
artistic expression, in its form, was excessively constrained by functional
considerations.</span><sup data-dcnode-id="1890"><a data-dcnode-id="1891" href="#fn18" name="fnB18"><span data-dcnode-id="1892" instrument_node="">[16]</span></a></sup></p><span data-dcnode-id="1888" instrument_node="">
</span><p data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">Two questions arise from this decision. First, what constitutes works of
artistic craftsmanship, and how do they differ from other
works? And second,
what were the reasons given by the Court for conceiving the work in the way that
it did?</span></p><span data-dcnode-id="1885" instrument_node="">
</span><h2 data-dcnode-id="1880"><span data-dcnode-id="1884" instrument_node="">
</span><a data-dcnode-id="1883" name="Heading36"></a><b data-dcnode-id="1881"><span data-dcnode-id="1882" instrument_node="">II	THE CONSTITUENT PROPERTIES OF WORKS OF ARTISTIC
CRAFTSMANSHIP</span></b></h2><span data-dcnode-id="1879" instrument_node="">
</span><p data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">In order properly to answer these questions it is necessary to consider the
Court's understanding of the place of the relevant category
of work in the
applicable copyright legislation; both in its copyright/design overlap
provisions, and its definition of 'artistic
work'.</span></p><span data-dcnode-id="1876" instrument_node="">
</span><h3 data-dcnode-id="1871"><span data-dcnode-id="1875" instrument_node="">
</span><a data-dcnode-id="1874" name="Heading38"></a><b data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">A	The legislative place of works of artistic
craftsmanship</span></b></h3><span data-dcnode-id="1870" instrument_node="">
</span><p data-dcnode-id="1854"><span data-dcnode-id="1869" instrument_node="">Under the Act as it stood at the time of the
suit,</span><sup data-dcnode-id="1866"><a data-dcnode-id="1867" href="#fn19" name="fnB19"><span data-dcnode-id="1868" instrument_node="">[17]</span></a></sup><span data-dcnode-id="1865" instrument_node=""> the protection given by
copyright law was limited for certain industrial products with an exemption for
works of artistic craftsmanship.</span><sup data-dcnode-id="1862"><a data-dcnode-id="1863" href="#fn20" name="fnB20"><span data-dcnode-id="1864" instrument_node="">[18]</span></a></sup><span data-dcnode-id="1861" instrument_node="">
In considering the reasons for that exemption, the Court traced its history
through UK law, starting with the provisions of the </span><i data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">Copyright Act</span></i><span data-dcnode-id="1858" instrument_node="">
</span><i data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">1911</span></i><span data-dcnode-id="1855" instrument_node=""> (Imp) and focusing on the following main events.</span></p><span data-dcnode-id="1853" instrument_node="">
</span><p data-dcnode-id="1839"><span data-dcnode-id="1852" instrument_node="">i.	The interpretation of the 1911 provisions by the House of Lords in </span><i data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">King
Features Syndicate Inc v O&amp;M Kleeman
Ltd</span></i><sup data-dcnode-id="1847"><a data-dcnode-id="1848" href="#fn21" name="fnB21"><span data-dcnode-id="1849" instrument_node="">[19]</span></a></sup><span data-dcnode-id="1846" instrument_node=""> (the '</span><i data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">Popeye
Case</span></i><span data-dcnode-id="1843" instrument_node="">'), as denying protection to works of design on the basis in part of
their authors' intent.</span><sup data-dcnode-id="1840"><a data-dcnode-id="1841" href="#fn22" name="fnB22"><span data-dcnode-id="1842" instrument_node="">[20]</span></a></sup></p><span data-dcnode-id="1838" instrument_node="">
</span><p data-dcnode-id="1832"><span data-dcnode-id="1837" instrument_node="">ii.	The later suggestion by the Gregory Committee that the 1911 provisions be
amended to remove the reference to authorial intent;
the reason being the
Committee's view that intent-based tests of copyright protection encourage
'subterfuge' by authors and others,
and discourage the creation of artistic
designs.</span><a data-dcnode-id="1836" name="_Ref81354252"></a><sup data-dcnode-id="1833"><a data-dcnode-id="1834" href="#fn23" name="fnB23"><span data-dcnode-id="1835" instrument_node="">[21]</span></a></sup></p><span data-dcnode-id="1831" instrument_node="">
</span><p data-dcnode-id="1820"><span data-dcnode-id="1830" instrument_node="">iii.	The legislature's action on that suggestion in the </span><i data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">Copyright Act
1956</span></i><span data-dcnode-id="1827" instrument_node=""> (UK), and subsequent amendment of the new provisions (in the
</span><i data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">Copyright, Designs and Patents Act 1988</span></i><span data-dcnode-id="1824" instrument_node=""> (UK)) so as to deny copyright
protection to 'ordinary functional commercial'
works.</span><sup data-dcnode-id="1821"><a data-dcnode-id="1822" href="#fn24" name="fnB24"><span data-dcnode-id="1823" instrument_node="">[22]</span></a></sup></p><span data-dcnode-id="1819" instrument_node="">
</span><p data-dcnode-id="1807"><span data-dcnode-id="1818" instrument_node="">iv.	The decision by Australia in 1989 to amend its own overlap provisions in
a manner consistent with UK reform, </span><i data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">viz</span></i><span data-dcnode-id="1815" instrument_node="">, 'to remove copyright protection
for essentially "industrial
products"',</span><sup data-dcnode-id="1812"><a data-dcnode-id="1813" href="#fn25" name="fnB25"><span data-dcnode-id="1814" instrument_node="">[23]</span></a></sup><span data-dcnode-id="1811" instrument_node=""> with an exemption
for certain categories of works 'more appropriately protected' by copyright law,
whether or not industrially
applied.</span><sup data-dcnode-id="1808"><a data-dcnode-id="1809" href="#fn26" name="fnB26"><span data-dcnode-id="1810" instrument_node="">[24]</span></a></sup></p><span data-dcnode-id="1806" instrument_node="">
</span><p data-dcnode-id="1795"><span data-dcnode-id="1805" instrument_node="">In </span><i data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">Burge</span></i><span data-dcnode-id="1802" instrument_node="">, two points were drawn from these events. The first was that
authorial intent is an inappropriate basis for determining copyright;
and the
second was that the exemption of WACs from copyright/design overlap exclusion
was due to their special status in law, as
works of real artistic quality. The
latter was consistent with the following observations of Drummond J in
</span><i data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">Coogi</span></i><span data-dcnode-id="1799" instrument_node="">:</span><sup data-dcnode-id="1796"><a data-dcnode-id="1797" href="#fn27" name="fnB27"><span data-dcnode-id="1798" instrument_node="">[25]</span></a></sup></p><span data-dcnode-id="1794" instrument_node="">
</span><blockquote data-dcnode-id="1789"><span data-dcnode-id="1793" instrument_node="">
What may justify the special status conferred on works of artistic craftsmanship
… is recognition that the real artistic quality
that is an essential
feature of such works and the desirability of encouraging real artistic effort
directed to industrial design
is sufficient to warrant the greater protection
and the accompanying stifling effect on manufacturing development that long
copyright
gives, in contrast to relatively short
design-protection.</span><sup data-dcnode-id="1790"><a data-dcnode-id="1791" href="#fn28" name="fnB28"><span data-dcnode-id="1792" instrument_node="">[26]</span></a></sup></blockquote><p data-dcnode-id="1783"><span data-dcnode-id="1788" instrument_node="">In
the view of the Court this passage was right, and explained the reason for the
works' special status, namely, that while any work
might have artistic quality,
that quality will not be what constitutes it specifically as an 'artistic
work';</span><sup data-dcnode-id="1785"><a data-dcnode-id="1786" href="#fn29" name="fnB29"><span data-dcnode-id="1787" instrument_node="">[27]</span></a></sup><span data-dcnode-id="1784" instrument_node=""> a point confirmed by the
statutory text:</span></p><span data-dcnode-id="1782" instrument_node="">
</span><blockquote data-dcnode-id="1766"><span data-dcnode-id="1781" instrument_node="">
Artistic work means:</span><br data-dcnode-id="1780"><span data-dcnode-id="1779" instrument_node="">
(a)	a painting, sculpture, drawing, engraving or photograph, whether the work is
of artistic quality or not; </span><br data-dcnode-id="1778"><span data-dcnode-id="1777" instrument_node="">
(b)	a building or a model of a building, whether the building or model is of
artistic quality or not; or </span><br data-dcnode-id="1776"><span data-dcnode-id="1775" instrument_node="">
(c)	a work of artistic craftsmanship to which neither of the last two preceding
paragraphs applies; </span><br data-dcnode-id="1774"><span data-dcnode-id="1773" instrument_node="">
but … not … a circuit layout within the meaning of the </span><a class="autolink_findacts" data-dcnode-id="1771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.austlii.edu.au/au/legis/cth/consol_act/cla1989203/"><span data-dcnode-id="1772" instrument_node="">Circuit
Layouts Act 1989</span></a><span data-dcnode-id="1770" instrument_node="">
(Cth).</span><sup data-dcnode-id="1767"><a data-dcnode-id="1768" href="#fn30" name="fnB30"><span data-dcnode-id="1769" instrument_node="">[28]</span></a></sup></blockquote><p data-dcnode-id="1760"><span data-dcnode-id="1765" instrument_node="">The
express neutrality of paragraphs (a) and (b) with respect to the works' artistic
quality — and omission in paragraph (c)
of the phrase 'whether the work is
of artistic quality or not' — distinguishes clearly the categories of
works, and evinces,
too, a legislative intent that works of artistic
craftsmanship be conceived as having artistic
quality.</span><sup data-dcnode-id="1762"><a data-dcnode-id="1763" href="#fn31" name="fnB31"><span data-dcnode-id="1764" instrument_node="">[29]</span></a></sup><span data-dcnode-id="1761" instrument_node=""> In support of this the
Court relied on the following passage by the Gregory Committee recommending
insertion of an essentially identical
paragraph (c) in the 1956 UK Act:</span></p><span data-dcnode-id="1759" instrument_node="">
</span><blockquote data-dcnode-id="1754"><span data-dcnode-id="1758" instrument_node="">
It is clear that some protection of this kind is required to cover works of art
other than such things as works of painting, drawing
and sculpture, which are
mentioned by name. We are here concerned not with articles manufactured under
conditions of ordinary industrial
production (artistically meritorious as many
of these are) … but with the works of craftsmen working in many media
(silversmiths,
potters, woodworkers, hand-embroiderers and many others) in
circumstances for which that Act does not provide appropriate protection.
We do
not think it will be questioned that original works of the kind we have in mind
are fully entitled to protection and but for
[the 1911 Act] this would be
lacking. We believe that copyright provides the proper basis for protecting
these works and to ensure
this protection we believe that it is necessary to
retain the term 'works of artistic craftsmanship' in the
Act.</span><sup data-dcnode-id="1755"><a data-dcnode-id="1756" href="#fn32" name="fnB32"><span data-dcnode-id="1757" instrument_node="">[30]</span></a></sup></blockquote><p data-dcnode-id="1749"><span data-dcnode-id="1753" instrument_node="">In the
Court's view, the reference here to inadequate protection anticipated the
passage in </span><i data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">Coogi </span></i><span data-dcnode-id="1750" instrument_node="">above. Hence its conclusion, that</span></p><span data-dcnode-id="1748" instrument_node="">
</span><blockquote data-dcnode-id="1739"><span data-dcnode-id="1747" instrument_node="">
the phrase 'a work of artistic craftsmanship' was introduced by the 1989 Act
into the 'overlap' provisions of … the Copyright
Act upon a particular
legislative view of the purpose it would serve. That view, as Drummond J
indicated in </span><i data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">Coogi</span></i><span data-dcnode-id="1744" instrument_node="">, was the encouragement of 'real artistic effort' in
industrial
design.</span><a data-dcnode-id="1743" name="_Ref80826504"></a><sup data-dcnode-id="1740"><a data-dcnode-id="1741" href="#fn33" name="fnB33"><span data-dcnode-id="1742" instrument_node="">[31]</span></a></sup></blockquote><p data-dcnode-id="1717"><span data-dcnode-id="1738" instrument_node="">Several
results flowed from this.</span><sup data-dcnode-id="1735"><a data-dcnode-id="1736" href="#fn34" name="fnB34"><span data-dcnode-id="1737" instrument_node="">[32]</span></a></sup><span data-dcnode-id="1734" instrument_node=""> One
was that encouraging 'real artistic effort' might be constrained by an object's
functionality and the marketing imperatives for
its
production.</span><a data-dcnode-id="1733" name="_Ref80826511"></a><sup data-dcnode-id="1730"><a data-dcnode-id="1731" href="#fn35" name="fnB35"><span data-dcnode-id="1732" instrument_node="">[33]</span></a></sup><span data-dcnode-id="1729" instrument_node="">
Another was the need to be cautious when reading the Act, 'lest too little
weight be given to the need for a real or substantial
artistic element' in
establishing the existence of a
WAC.</span><a data-dcnode-id="1728" name="_Ref80826513"></a><sup data-dcnode-id="1725"><a data-dcnode-id="1726" href="#fn36" name="fnB36"><span data-dcnode-id="1727" instrument_node="">[34]</span></a></sup><span data-dcnode-id="1724" instrument_node="">
And a third was the need for the Court, in light of the Act, to qualify
acceptance of Lord Simon's speech in 'the most significant
judicial treatment'
of WACs; the case of
</span><i data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">Hensher</span></i><span data-dcnode-id="1721" instrument_node="">.</span><sup data-dcnode-id="1718"><a data-dcnode-id="1719" href="#fn37" name="fnB37"><span data-dcnode-id="1720" instrument_node="">[35]</span></a></sup></p><span data-dcnode-id="1716" instrument_node="">
</span><h3 data-dcnode-id="1711"><span data-dcnode-id="1715" instrument_node="">
</span><a data-dcnode-id="1714" name="Heading76"></a><b data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">B	Works of artistic craftsmanship and the
requirements for artistic form and quality</span></b></h3><span data-dcnode-id="1710" instrument_node="">
</span><p data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">In emphasizing each of these three results, the Court underlined the point
above that works of artistic craftsmanship in law are a
unique category of
copyright work by reason of their essential artistic quality:</span></p><span data-dcnode-id="1707" instrument_node="">
</span><blockquote data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">
The genesis of the phrase 'irrespective of artistic quality' in the 1956 UK Act
was explained at the time as follows:</span></blockquote><p data-dcnode-id="1692"><span data-dcnode-id="1704" instrument_node="">'It was generally
considered under [the 1911 Act] that the word "artistic" was merely used as a
generic term to include the different
processes of creating works set out in the
definition section and that provided that a work was produced by one of such
processes,
and that its creation involved some skill or labour on the part of
the artist, it was protected. The use of the word "artistic" was
thought to be
akin to that of the word "literary" which ... was held to refer only to the
nature of the material being written or
printed
matter.</span><sup data-dcnode-id="1699"><span data-dcnode-id="1703" instrument_node="">[</span><a data-dcnode-id="1701" href="#fn38" name="fnB38"><span data-dcnode-id="1702" instrument_node="">[36]</span></a><span data-dcnode-id="1700" instrument_node="">]</span></sup><span data-dcnode-id="1698" instrument_node=""> In fact, under [the
1911 Act] merely commercial designs were protected. This matter is now
clarified, as above
mentioned.'</span><sup data-dcnode-id="1693"><span data-dcnode-id="1697" instrument_node="">[</span><a data-dcnode-id="1695" href="#fn39" name="fnB39"><span data-dcnode-id="1696" instrument_node="">[37]</span></a><span data-dcnode-id="1694" instrument_node="">]</span></sup></p><span data-dcnode-id="1691" instrument_node="">
</span><blockquote data-dcnode-id="1682"><span data-dcnode-id="1690" instrument_node="">
In </span><i data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">Cuisenaire v Reed</span></i><span data-dcnode-id="1687" instrument_node="">, which turned upon the 1911 Act, Pape J said that
the phrase "artistic work" was "a generic term or label"; this included subject
matters not necessarily possessing any element of artistic quality at all, and
so had a wider meaning than the word "artistic" in
the phrase "works of artistic
craftsmanship". But the circumstance that a work falling within para (a) or para
(b) of the definition
of "artistic work" now found in the Australian legislation
need not be of artistic quality does not deny that a particular work to
which
para (a) or para (b) applies may be of such
quality.</span><a data-dcnode-id="1686" name="_Ref80631004"></a><sup data-dcnode-id="1683"><a data-dcnode-id="1684" href="#fn40" name="fnB40"><span data-dcnode-id="1685" instrument_node="">[38]</span></a></sup></blockquote><p data-dcnode-id="1676"><span data-dcnode-id="1681" instrument_node="">According
to this passage, what constitutes a work as an artistic work is its creation by
one of the statutory methods, while what
constitutes a work as a literary work
is its presentation in writing or other
notation.</span><a data-dcnode-id="1680" name="_Ref80632556"></a><sup data-dcnode-id="1677"><a data-dcnode-id="1678" href="#fn41" name="fnB41"><span data-dcnode-id="1679" instrument_node="">[39]</span></a></sup></p><span data-dcnode-id="1675" instrument_node="">
</span><p data-dcnode-id="1670"><span data-dcnode-id="1674" instrument_node=""> Thus, literary and artistic copyright works are constituted entirely by
properties of form: in the case of the former, a mode of
presentation; and in
the case of the latter, a mode of creation, or more specifically, a combination
of features of visual distinction
added to raw (pre-existing) material by means
of a statutory artistic
method.</span><sup data-dcnode-id="1671"><a data-dcnode-id="1672" href="#fn42" name="fnB42"><span data-dcnode-id="1673" instrument_node="">[40]</span></a></sup></p><span data-dcnode-id="1669" instrument_node="">
</span><p data-dcnode-id="1654"><span data-dcnode-id="1668" instrument_node="">In </span><i data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">Burge</span></i><span data-dcnode-id="1665" instrument_node="">, it seems to have been accepted by the Court that works of
artistic craftsmanship also possess this 'generic' form, consistent with
them
being 'artistic works'. Hence the reference to their form of expression,
including their combination of visual features and
particular mode of artistic
creation.</span><sup data-dcnode-id="1662"><a data-dcnode-id="1663" href="#fn43" name="fnB43"><span data-dcnode-id="1664" instrument_node="">[41]</span></a></sup><span data-dcnode-id="1661" instrument_node=""> Indeed, according to
the Court, a work of artistic craftsmanship in law is at base a work of
craftsmanship in the following sense
of Lord Simon in
</span><i data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">Hensher</span></i><span data-dcnode-id="1658" instrument_node="">:</span><sup data-dcnode-id="1655"><a data-dcnode-id="1656" href="#fn44" name="fnB44"><span data-dcnode-id="1657" instrument_node="">[42]</span></a></sup></p><span data-dcnode-id="1653" instrument_node="">
</span><blockquote data-dcnode-id="1648"><span data-dcnode-id="1652" instrument_node="">
A work of craftsmanship, even though it cannot be confined to handicraft, at
least presupposes special training, skill and knowledge
for its production
… 'Craftsmanship', particularly when considered in its historical context,
implies a manifestation of pride
in sound workmanship — a rejection of the
shoddy, the meretricious, the
facile.</span><sup data-dcnode-id="1649"><a data-dcnode-id="1650" href="#fn45" name="fnB45"><span data-dcnode-id="1651" instrument_node="">[43]</span></a></sup></blockquote><p data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">The
question remains what else it is; when does a work of craftsmanship become a
work of artistic craftsmanship? According to Lord
Simon, the answer lies in the
author's intent, and the general history of the work's production. Specifically,
for a work of craftsmanship
to be a WAC it must manifest an artist's aim and
impact:</span></p><span data-dcnode-id="1645" instrument_node="">
</span><blockquote data-dcnode-id="1640"><span data-dcnode-id="1644" instrument_node="">
It is probably enough that common experience tells us that artists have
vocationally an aim and impact which differ from those of
the ordinary run of
humankind. Given the craftsmanship, it is the presence of such aim and impact
— what Stewart J called 'the
intent of the creator and its result' —
which will determine that the work is one of artistic
craftsmanship.</span><sup data-dcnode-id="1641"><a data-dcnode-id="1642" href="#fn46" name="fnB46"><span data-dcnode-id="1643" instrument_node="">[44]</span></a></sup></blockquote><p data-dcnode-id="1631"><span data-dcnode-id="1639" instrument_node="">In
</span><i data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">Burge</span></i><span data-dcnode-id="1636" instrument_node=""> the Court accepted this view, replacing the emphasis on artistic
intent with an emphasis on artistic quality instead. The result
was the
following two-stage test: is there a work of craftsmanship; and does it possess
the artistic quality essential for a work
of artistic craftsmanship, ie, is its
'artistic expression, in its form, [sufficiently] unconstrained by functional
considerations'?</span><a data-dcnode-id="1635" name="_Ref81353686"></a><sup data-dcnode-id="1632"><a data-dcnode-id="1633" href="#fn47" name="fnB47"><span data-dcnode-id="1634" instrument_node="">[45]</span></a></sup></p><span data-dcnode-id="1630" instrument_node="">
</span><p data-dcnode-id="1624"><span data-dcnode-id="1629" instrument_node=""> By locating the quality of a work in its properties of artistic form, the
Court supported a formalistic conception consistent with
the statutory
definitions above.</span><sup data-dcnode-id="1626"><a data-dcnode-id="1627" href="#fn48" name="fnB48"><span data-dcnode-id="1628" instrument_node="">[46]</span></a></sup><span data-dcnode-id="1625" instrument_node=""> Its method
for determining that quality, however, reveals a very different conception in
keeping with that of Lord Simon himself:</span></p><span data-dcnode-id="1623" instrument_node="">
</span><blockquote data-dcnode-id="1607"><span data-dcnode-id="1622" instrument_node="">
The thread running through [Lord Simon's] discussion [in </span><i data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">Hensher</span></i><span data-dcnode-id="1619" instrument_node="">] is the
significance of functional constraints, extreme for a dental mechanic, less so
for a glazier or blacksmith, and depending
upon the nature of the particular
design brief. A horseshoe is one task; the Tijou gates, screens and grilles
wrought for St Paul's
Cathedral, Hampton Court and Chatsworth by the French
Huguenot ironmaster were in a very different category.</span><br data-dcnode-id="1618"><span data-dcnode-id="1617" instrument_node="">
It may be impossible, and certainly would be unwise, to attempt any exhaustive
and fully predictive identification of what can and
cannot amount to 'a work of
artistic craftsmanship' within the meaning of the </span><i data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">Copyright Act</span></i><span data-dcnode-id="1614" instrument_node=""> as it
stood after the 1989 Act. However, determining whether a work is 'a work of
artistic craftsmanship' does not turn on assessing
the beauty or aesthetic
appeal of work or on assessing any harmony between its visual appeal and its
utility. The determination turns
on assessing the extent to which the particular
work's artistic expression, in its form, is unconstrained by functional
considerations.
To decide this appeal it is sufficient to indicate the
following.</span><br data-dcnode-id="1613"><span data-dcnode-id="1612" instrument_node="">
The more substantial the requirements in a design brief to satisfy utilitarian
considerations of the kind indicated with the design
of the [yacht], the less
the scope for that encouragement of real or substantial artistic effort. It is
that encouragement which
underpins the favourable treatment by the 1989 Act of
certain artistic works which are applied as industrial designs but without
design
registration.</span><a data-dcnode-id="1611" name="_Ref81309128"></a><sup data-dcnode-id="1608"><a data-dcnode-id="1609" href="#fn49" name="fnB49"><span data-dcnode-id="1610" instrument_node="">[47]</span></a></sup></blockquote><p data-dcnode-id="1587"><span data-dcnode-id="1606" instrument_node="">This
passage betrays an important assumption, namely, that works are perceived
— in law as in
art</span><a data-dcnode-id="1605" name="_Ref81309753"></a><sup data-dcnode-id="1602"><a data-dcnode-id="1603" href="#fn50" name="fnB50"><span data-dcnode-id="1604" instrument_node="">[48]</span></a></sup><span data-dcnode-id="1601" instrument_node="">
— in relation to a category of work. This explains the approach of the
Court in </span><i data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">Burge</span></i><span data-dcnode-id="1598" instrument_node="">, following the approach of Lord Simon in </span><i data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">Hensher</span></i><span data-dcnode-id="1595" instrument_node="">,
of anchoring its analysis to 'works of craftsmanship', and the sub-categories of
works of glaziers, etc.</span><sup data-dcnode-id="1592"><a data-dcnode-id="1593" href="#fn51" name="fnB51"><span data-dcnode-id="1594" instrument_node="">[49]</span></a></sup><span data-dcnode-id="1591" instrument_node=""> The
result was a division of the statutory phrase to support the two-stage test
above, focused on identifying a work of craftsmanship,
and determining, then,
its artistic quality.</span><sup data-dcnode-id="1588"><a data-dcnode-id="1589" href="#fn52" name="fnB52"><span data-dcnode-id="1590" instrument_node="">[50]</span></a></sup></p><span data-dcnode-id="1586" instrument_node="">
</span><p data-dcnode-id="1580"><span data-dcnode-id="1585" instrument_node=""> That this division contradicted the Court's own view, that 'work of artistic
craftsmanship' is a composite phrase supporting a single
legal
enquiry,</span><sup data-dcnode-id="1582"><a data-dcnode-id="1583" href="#fn53" name="fnB53"><span data-dcnode-id="1584" instrument_node="">[51]</span></a></sup><span data-dcnode-id="1581" instrument_node=""> speaks, it is
submitted, to the importance of categories in judicial (and other) perceptions
of works.</span></p><span data-dcnode-id="1579" instrument_node="">
</span><p data-dcnode-id="1574"><span data-dcnode-id="1578" instrument_node="">Outside of law that importance has been noted, and made the basis for a
theory of art.</span><sup data-dcnode-id="1575"><a data-dcnode-id="1576" href="#fn54" name="fnB54"><span data-dcnode-id="1577" instrument_node="">[52]</span></a></sup></p><span data-dcnode-id="1573" instrument_node="">
</span><p data-dcnode-id="1557"><span data-dcnode-id="1572" instrument_node=""> According to that theory, one cannot correctly perceive a work without
perceiving it in relation to a category of work, meaning perceiving
the gestalt
of the category in the work.</span><sup data-dcnode-id="1569"><a data-dcnode-id="1570" href="#fn55" name="fnB55"><span data-dcnode-id="1571" instrument_node="">[53]</span></a></sup><span data-dcnode-id="1568" instrument_node=""> The
same is supported by the judgment in </span><i data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">Burge</span></i><span data-dcnode-id="1565" instrument_node="">, not only in its reasoning
from categories themselves, but also in its emphasis on the gestalt of WACs: the
harmonious combination
of function and beauty in the form of the works' artistic
expression. That this is the aesthetic of the Arts and Crafts movement
underlines another point about categories: they denote a particular authorial
tradition, of sculpture, painting, architecture, etc.
The same can be seen from
the judgment in </span><i data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">Burge</span></i><span data-dcnode-id="1562" instrument_node="">, not only in its view that the Arts and Crafts
movement defines the boundaries of the category of WACs, but also its acceptance
that
those boundaries change, reflecting change in the movement
itself.</span><sup data-dcnode-id="1559"><a data-dcnode-id="1560" href="#fn56" name="fnB56"><span data-dcnode-id="1561" instrument_node="">[54]</span></a></sup><span data-dcnode-id="1558" instrument_node=""> </span></p><span data-dcnode-id="1556" instrument_node="">
</span><p data-dcnode-id="1543"><span data-dcnode-id="1555" instrument_node="">Recognition of that which the categories denote, at least in the context of
copyright law, is important for a variety of further reasons.
Above all, it
underlines the importance of history in copyright, in conceiving and identifying
individual works. As Walton says,
while what ultimately matters about a work may
be its particular form of expression, it is nonetheless true that perceptions of
works
are affected by their specific
origins.</span><sup data-dcnode-id="1552"><a data-dcnode-id="1553" href="#fn57" name="fnB57"><span data-dcnode-id="1554" instrument_node="">[55]</span></a></sup><span data-dcnode-id="1551" instrument_node=""> Given this, what
constitutes a work as a work of art is best conceived in non-formalistic terms
— as including its properties
of artistic form, but also the history of
its production: the intent and expectation of its author, and view of society
with respect
to its nature. That the same is true in copyright law is apparent
from the method of the Court in </span><i data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">Burge</span></i><span data-dcnode-id="1548" instrument_node="">. According to that method, whether
a work of craftsmanship has the quality of a work of artistic craftsmanship
depends on two central
things: whether the category into which it falls allows
for 'real or substantial artistic effort' on the part of the work's
author;</span><sup data-dcnode-id="1545"><a data-dcnode-id="1546" href="#fn58" name="fnB58"><span data-dcnode-id="1547" instrument_node="">[56]</span></a></sup><span data-dcnode-id="1544" instrument_node=""> and whether the
admissible evidence as a whole shows that such effort was in fact expended.</span></p><span data-dcnode-id="1542" instrument_node="">
</span><p data-dcnode-id="1535"><span data-dcnode-id="1541" instrument_node="">This method is compatible with the method of Walton for categorizing
correctly artistic works. In his theory, the correct categorization
of a work of
art depends on assessing the following
factors:</span><a data-dcnode-id="1540" name="_Ref81346120"></a><sup data-dcnode-id="1537"><a data-dcnode-id="1538" href="#fn59" name="fnB59"><span data-dcnode-id="1539" instrument_node="">[57]</span></a></sup><span data-dcnode-id="1536" instrument_node="">
</span></p><span data-dcnode-id="1534" instrument_node="">
</span><p data-dcnode-id="1529"><span data-dcnode-id="1533" instrument_node="">i.	The presence in the work of a relatively large number of features standard
with respect to the relevant category. (In </span><i data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">Burge</span></i><span data-dcnode-id="1530" instrument_node="">, the model of the yacht
contained several features standard with respect to works of artistic
craftsmanship, in particular, the addition
of properties of visual distinction
to raw (pre-existing) material by means of a method of craftsmanship. The fact
that the model
was not made entirely by hand, and was a prototype for mass
production, was not relevant, for such matters are variable with respect
to
works of artistic craftsmanship.)</span></p><span data-dcnode-id="1528" instrument_node="">
</span><p data-dcnode-id="1523"><span data-dcnode-id="1527" instrument_node="">ii.	The fact that the work is better or more interesting when perceived in
the relevant category of work than when perceived in alternative
ways. (In
</span><i data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">Burge</span></i><span data-dcnode-id="1524" instrument_node="">, the Court clearly regarded the model as better perceived as a work
of design than as a work of artistic craftsmanship because of
the predominance
of function in its combination of functional and artistic features.)</span></p><span data-dcnode-id="1522" instrument_node="">
</span><p data-dcnode-id="1517"><span data-dcnode-id="1521" instrument_node="">iii.	The fact that the work is recognised by the society in which it was
created as falling within the relevant category. (In </span><i data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">Burge</span></i><span data-dcnode-id="1518" instrument_node="">, the
suggestion of the expert, Mr Hood, was that the model was not recognised by
art-regarding society as a work of artistic craftsmanship.)
</span></p><span data-dcnode-id="1516" instrument_node="">
</span><p data-dcnode-id="1511"><span data-dcnode-id="1515" instrument_node="">iv.	The fact that the author of the work intended or expected it to be
perceived within the relevant category of work. (In </span><i data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">Burge</span></i><span data-dcnode-id="1512" instrument_node="">, the evidence
of the yacht's promotional material and Mr Swarbrick's business plan suggested
that Mr Swarbrick neither intended nor
expected that the model would be
perceived as a work of artistic craftsmanship.)</span></p><span data-dcnode-id="1510" instrument_node="">
</span><p data-dcnode-id="1505"><span data-dcnode-id="1509" instrument_node="">It is submitted that presenting the reasoning of the Court in this way
coheres and clarifies its disparate strands, and grounds those
strands in a
theory of the work convincing on normative and analytical
grounds.</span><sup data-dcnode-id="1506"><a data-dcnode-id="1507" href="#fn60" name="fnB60"><span data-dcnode-id="1508" instrument_node="">[58]</span></a></sup></p><span data-dcnode-id="1504" instrument_node="">
</span><p data-dcnode-id="1503"></p><span data-dcnode-id="1502" instrument_node="">
</span><p data-dcnode-id="1494"><span data-dcnode-id="1501" instrument_node="">One question that remains is the reason for the shift from intent to quality
in the judgment in </span><i data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">Burge</span></i><span data-dcnode-id="1498" instrument_node="">. The reason suggested by the Court itself was
the need to be mindful of the legislative aim of encouraging artistic effort in
industrial
design.</span><sup data-dcnode-id="1495"><a data-dcnode-id="1496" href="#fn61" name="fnB61"><span data-dcnode-id="1497" instrument_node="">[59]</span></a></sup></p><span data-dcnode-id="1493" instrument_node="">
</span><p data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node=""> However, a more compelling explanation is the Court's own view with respect
to the inappropriateness of authorial intent as a determinant
of artistic
copyright protection:</span></p><span data-dcnode-id="1490" instrument_node="">
</span><blockquote data-dcnode-id="1473"><span data-dcnode-id="1489" instrument_node="">
The answer to the question whether the Plug is a 'work of artistic
craftsmanship' cannot be controlled by evidence from Mr Swarbrick
of his
aspirations or intentions when designing and constructing the Plug. His evidence
was admissible. But the operation of the
statute does not turn upon the presence
or absence of evidence of that nature from the author of the work in question.
The matter,
like many other issues calling for care and discrimination, is one
for objective determination by the court, assisted by admissible
evidence, and
not unduly weighed down by the supposed terrors for judicial assessment of
matters involving aesthetics.</span><br data-dcnode-id="1488"><span data-dcnode-id="1487" instrument_node="">
The statute does not give to the opinion of the person who claims to be the
author of 'a work of artistic craftsmanship' the determination
of whether that
result was obtained; still less, whether it was obtained because he or she
intended that result. Given the long period
of copyright protection, the author
at the stage when there is litigation, may be unavailable. Indeed, as Pape J
noted in </span><i data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Cuisenaire</span></i><span data-dcnode-id="1484" instrument_node="">, the author may be dead. Again, intentions may fail
to be realised. Further, just as few alleged inventors are heard to deny the
presence of an inventive step on their part, so, it may be expected, will few
alleged authors of works of artistic craftsmanship
be heard readily to admit the
absence of any necessary aesthetic element in their endeavours.</span><br data-dcnode-id="1483"><span data-dcnode-id="1482" instrument_node="">
This is not to deny the admissibility of such evidence, nor to disparage the
good character of such witnesses, and certainly not
that of Mr Swarbrick; it is
to reaffirm the well-recognised dangers of hindsight which are present in
various fields of intellectual
property law, as in many other disputes that come
to litigation.</span><br data-dcnode-id="1481"><span data-dcnode-id="1480" instrument_node="">
The various aspects of the definition of 'a work of artistic craftsmanship'
which are discussed above with reference to </span><i data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">Hensher</span></i><span data-dcnode-id="1477" instrument_node=""> have particular
significance here
...</span><sup data-dcnode-id="1474"><a data-dcnode-id="1475" href="#fn62" name="fnB62"><span data-dcnode-id="1476" instrument_node="">[60]</span></a></sup></blockquote><p data-dcnode-id="1467"><span data-dcnode-id="1472" instrument_node="">It could be
said that the Court's comments here sit uneasily with its reliance on Mr
Swarbrick's evidence in deciding his model was
not an artistic work. As seen
above, that evidence established his paramount concern with function and
commerce over beauty and art,
and was central to the conclusion of the Court
that the model lacked artistic
quality.</span><sup data-dcnode-id="1469"><a data-dcnode-id="1470" href="#fn63" name="fnB63"><span data-dcnode-id="1471" instrument_node="">[61]</span></a></sup><span data-dcnode-id="1468" instrument_node=""> Nonetheless, it clearly
did not 'control' the issue, for the evidence of the expert was also important,
and the Court in any case
described the question as one for 'objective
determination' on the basis of all the admissible evidence.</span></p><span data-dcnode-id="1466" instrument_node="">
</span><p data-dcnode-id="1457"><span data-dcnode-id="1465" instrument_node="">There are two ways of interpreting this description: as a statement that the
subjective intent of an author is relevant (not determinative)
of the existence
of a work; or as a statement that the only intent which counts is the intent
which the Court attributes to an author
on the basis of all the admissible
evidence. The latter seems to be what the High Court meant. It is certainly what
Lord Simon meant,
along with Lord Morris and Viscount Dilhorne in
</span><i data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">Hensher</span></i><span data-dcnode-id="1462" instrument_node="">.</span><sup data-dcnode-id="1459"><a data-dcnode-id="1460" href="#fn64" name="fnB64"><span data-dcnode-id="1461" instrument_node="">[62]</span></a></sup><span data-dcnode-id="1458" instrument_node=""> </span></p><span data-dcnode-id="1456" instrument_node="">
</span><p data-dcnode-id="1451"><span data-dcnode-id="1455" instrument_node="">In contrast is the approach of Lord Kilbrandon, whose reasoning is worth
extracting at length:</span><sup data-dcnode-id="1452"><a data-dcnode-id="1453" href="#fn65" name="fnB65"><span data-dcnode-id="1454" instrument_node="">[63]</span></a></sup></p><span data-dcnode-id="1450" instrument_node="">
</span><blockquote data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">
In my opinion, the first essential of a work of art (which I think an artistic
work must be) if it is to be distinguished from a
work of craftsmanship –
a distinction upon which Parliament insists – is that it shall have come
into existence as the
product of an author who is consciously concerned to
produce a work of art. The work either is or is not a work of art before anyone
except the author has seen it; it does not depend for its artistic character
upon the criticism, whether favourable or unfavourable,
of other people who may
make value judgments about it. It must be possible to deduce the conscious
purpose of artistic creation from
the work itself or from the circumstances of
its creation, but this act arises only when the question whether it is a work of
art
becomes one for discussion or decision by others than the author.
</span></blockquote><blockquote data-dcnode-id="1443"><span data-dcnode-id="1447" instrument_node="">
Merit is another matter altogether. It has been said that the courts will be
reluctant to make aesthetic appreciations, and that
is right, not because so to
do is for a judge difficult or unseemly, but because it is a decision which, in
this context, is not
required. I do not think it is possible to add, as it were,
some artistic character to an object, and by so doing to justify a conclusion
that the object is not only a work of craftsmanship but artistic to boot. To do
so is almost certainly to make an aesthetic value
judgment. An example was given
in the course of the argument – the five-barred gate made by a craftsman,
blacksmith or carpenter.
It was suggested that a gate might be regarded as an
artistic work if its proportions were right. But what does 'right' mean? It
only
means 'I like them,' unless it means no more than that the gate will be
effective for controlling stock, which is the requirement
demanded of the 'mere'
craftsman. The conscious intention of the craftsman will be the primary test of
whether his product is artistic
or not; the fact that many of us like looking at
a piece of honest work, especially in the traditional trades, is not enough to
make
it a work of
art.</span><sup data-dcnode-id="1444"><a data-dcnode-id="1445" href="#fn66" name="fnB66"><span data-dcnode-id="1446" instrument_node="">[64]</span></a></sup></blockquote><p data-dcnode-id="1434"><span data-dcnode-id="1442" instrument_node="">The tension
in this passage between the intent of the author in creating the work, the view
of society with respect to the work, the
formal dimensions or properties of the
work, and the judgment of the Court on the merits of the work, is, it is
submitted, an unnecessary
one; for as the analysis above has sought to make
clear, all are (or ought to be) essential to the enquiry into the existence of
a
copyright work. Once this is recognised, the concerns in </span><i data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">Burge</span></i><span data-dcnode-id="1439" instrument_node=""> ought to
dissipate, along with the concerns of the Gregory
Committee.</span><a data-dcnode-id="1438" name="_Ref81483476"></a><sup data-dcnode-id="1435"><a data-dcnode-id="1436" href="#fn67" name="fnB67"><span data-dcnode-id="1437" instrument_node="">[65]</span></a></sup></p><span data-dcnode-id="1433" instrument_node="">
</span><p data-dcnode-id="1424"><span data-dcnode-id="1432" instrument_node=""> If they do not — ie, if the well-known problems created for law by
rights that depend on subjective intent are thought to outweigh
the virtues of a
test that properly reflects the nature of works — then one must settle for
the proxy of </span><i data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">objective</span></i><span data-dcnode-id="1429" instrument_node=""> intent. In that case, however, it is particularly
important for the law's coherence, as well as the integrity of its future
development,
that methods of determining the existence of a work be articulated
clearly, as suggested above. The risk otherwise is that authorial
intent will
eclipse all else, and become a euphemism in copyright law for a general
discretion on the part of the courts to decide
whether a work deserves copyright
protection.</span><a data-dcnode-id="1428" name="_Ref81480521"></a><sup data-dcnode-id="1425"><a data-dcnode-id="1426" href="#fn68" name="fnB68"><span data-dcnode-id="1427" instrument_node="">[66]</span></a></sup></p><span data-dcnode-id="1423" instrument_node="">
</span><h2 data-dcnode-id="1418"><span data-dcnode-id="1422" instrument_node="">
</span><a data-dcnode-id="1421" name="Heading152"></a><b data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">III	WORKS OF ARTISTIC CRAFTSMANSHIP AS PARADIGM (NOT
EXCEPTIONAL) COPYRIGHT WORKS</span></b></h2><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1409"><span data-dcnode-id="1416" instrument_node="">The High Court in </span><i data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">Burge</span></i><span data-dcnode-id="1413" instrument_node=""> affirmed the exceptional nature of works of
artistic craftsmanship by reason of their real artistic quality. It is submitted
however
that while the category of WACs is unique, it is only in the way that
all categories are unique: they denote a different expressive
tradition. On this
view, the particular 'quality' of the work of artistic craftsmanship is only the
quality of being such a work.
If this sits uneasily with Anglo-Australian
legislation, on account of its formalistic definitions of works, then that, it
is submitted,
serves only to underline the inadequacy of those definitions
themselves.</span><sup data-dcnode-id="1410"><a data-dcnode-id="1411" href="#fn69" name="fnB69"><span data-dcnode-id="1412" instrument_node="">[67]</span></a></sup></p><span data-dcnode-id="1408" instrument_node="">
</span><p data-dcnode-id="1390"><span data-dcnode-id="1407" instrument_node=""> The same is recognised by the courts, in refusing to concede the existence
of a work on the basis entirely of properties of
form.</span><a data-dcnode-id="1406" name="_Ref81483479"></a><sup data-dcnode-id="1403"><a data-dcnode-id="1404" href="#fn70" name="fnB70"><span data-dcnode-id="1405" instrument_node="">[68]</span></a></sup><span data-dcnode-id="1402" instrument_node="">
However, recognising that things such as collections of letters, cartridge
moulds and combinations of noises, are not literary, artistic
and musical works
despite possessing the form of those
works,</span><sup data-dcnode-id="1399"><a data-dcnode-id="1400" href="#fn71" name="fnB71"><span data-dcnode-id="1401" instrument_node="">[69]</span></a></sup><span data-dcnode-id="1398" instrument_node=""> has been easier than
explaining why they are not. A case in point is </span><i data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">Merchandising Corp of America
v Harpbond</span></i><span data-dcnode-id="1395" instrument_node="">,</span><sup data-dcnode-id="1392"><a data-dcnode-id="1393" href="#fn72" name="fnB72"><span data-dcnode-id="1394" instrument_node="">[70]</span></a></sup><span data-dcnode-id="1391" instrument_node=""> where the Court
denied copyright in makeup on the basis it was not 'a painting' in law. The
Court said: a painting requires paint
on a surface; paint on a face is paint
without a surface; and paint without a surface is an idea and not a work. Cases
such as this
are problematic for law, for while the end result has intuitive
force — it is difficult to think of makeup as painting, and
of people
having rights in respect of their look — it is based on the entirely
unconvincing reasoning that a painting is any
image fixed in paint, and a body
incapable of supporting such an image.</span></p><span data-dcnode-id="1389" instrument_node="">
</span><p data-dcnode-id="1376"><span data-dcnode-id="1388" instrument_node="">In effect, my suggestion is that any exegesis of the copyright work must
explain why the decision in </span><i data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">Harpbond</span></i><span data-dcnode-id="1385" instrument_node=""> above may have been right, but
may equally have been wrong on different facts, for example, had the maquillage
been on the body of
an indigenous
dancer.</span><a data-dcnode-id="1384" name="_Ref81483482"></a><sup data-dcnode-id="1381"><a data-dcnode-id="1382" href="#fn73" name="fnB73"><span data-dcnode-id="1383" instrument_node="">[71]</span></a></sup><span data-dcnode-id="1380" instrument_node="">
The reason is not that the body of the latter qualifies as a surface where the
body of Adam Ant did not, but that paintings are not
constituted entirely by
their form, but also by the history of their individual production. It follows
that that history ought to
be part of what constitutes 'a painting'. As already
suggested,</span><sup data-dcnode-id="1377"><a data-dcnode-id="1378" href="#fn74" name="fnB74"><span data-dcnode-id="1379" instrument_node="">[72]</span></a></sup></p><span data-dcnode-id="1375" instrument_node="">
</span><p data-dcnode-id="1370"><span data-dcnode-id="1374" instrument_node=""> the premise of this view is an understanding of authorship as a shared and
evolving expressive tradition; a socially and institutionally
situated practice
that informs the way in which works are perceived without detracting from their
expressive significance per se,
including as forms of autonomous
expression.</span><sup data-dcnode-id="1371"><a data-dcnode-id="1372" href="#fn75" name="fnB75"><span data-dcnode-id="1373" instrument_node="">[73]</span></a></sup></p><span data-dcnode-id="1369" instrument_node="">
</span><p data-dcnode-id="1361"><span data-dcnode-id="1368" instrument_node=""> The same understanding, it is submitted, motivates
</span><i data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">Burge</span></i><span data-dcnode-id="1365" instrument_node="">.</span><sup data-dcnode-id="1362"><a data-dcnode-id="1363" href="#fn76" name="fnB76"><span data-dcnode-id="1364" instrument_node="">[74]</span></a></sup></p><span data-dcnode-id="1360" instrument_node="">
</span><p data-dcnode-id="1359"></p><span data-dcnode-id="1358" instrument_node="">
</span><h2 data-dcnode-id="1353"><span data-dcnode-id="1357" instrument_node="">
</span><a data-dcnode-id="1356" name="Heading171"></a><b data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">IV	FUNCTIONAL AND COMMERCIAL CONSIDERATIONS AND
COPYRIGHT PROTECTION</span></b></h2><span data-dcnode-id="1352" instrument_node="">
</span><p data-dcnode-id="1347"><span data-dcnode-id="1351" instrument_node="">The last aspect of </span><i data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">Burge </span></i><span data-dcnode-id="1348" instrument_node="">to be considered here is its suggestion that
functional and commercial considerations might legitimately constrain the
ability of
an object to fulfil the requirements of copyright protection.</span></p><span data-dcnode-id="1346" instrument_node="">
</span><p data-dcnode-id="1333"><span data-dcnode-id="1345" instrument_node="">This suggestion contradicts the decision in </span><i data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">Desktop Marketing
Systems</span></i><span data-dcnode-id="1342" instrument_node="">,</span><sup data-dcnode-id="1339"><a data-dcnode-id="1340" href="#fn77" name="fnB77"><span data-dcnode-id="1341" instrument_node="">[75]</span></a></sup><span data-dcnode-id="1338" instrument_node=""> that the statutory
category of compilations extends beyond compilations proper to include
industrious collections of
facts.</span><sup data-dcnode-id="1335"><a data-dcnode-id="1336" href="#fn78" name="fnB78"><span data-dcnode-id="1337" instrument_node="">[76]</span></a></sup><span data-dcnode-id="1334" instrument_node=""> In explaining the reasons
for that decision, Finkelstein J of the Federal Court, with whom the Full Court
later agreed, appealed
to constraints of commerce and function on a work's
entitlement to copyright protection:</span></p><span data-dcnode-id="1332" instrument_node="">
</span><blockquote data-dcnode-id="1315"><span data-dcnode-id="1331" instrument_node="">
It is by no means clear that O'Connor J [in </span><i data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">Feist Publications Inc v Rural
Telephone Service Co Inc</span></i><sup data-dcnode-id="1326"><a data-dcnode-id="1327" href="#fn79" name="fnB79"><span data-dcnode-id="1328" instrument_node="">[77]</span></a></sup><span data-dcnode-id="1325" instrument_node="">]
was correct when she said that limiting the copyright in compilations to those
where there has been an exercise of judgment will
not affect many publications.
So far as selection is concerned, there will be difficulty whenever the amount
of data available for
selection is small because necessarily there will be
little selection. So also if the volume of data that is selected is small, for
the doctrine </span><i data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">de minimis non curat lex</span></i><span data-dcnode-id="1322" instrument_node=""> may apply. More significant will be
cases where functional considerations or commercial reasons limit the area of
discretion. For
example, where all facts of a particular kind have been
recorded, there will be no 'selection' at all. So far as arrangement is
concerned,
</span><i data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">Feist</span></i><span data-dcnode-id="1319" instrument_node=""> would seem to deny originality to obvious methods of
grouping or listing data, such as alphabetically, chronologically, or
sequentially.</span><sup data-dcnode-id="1316"><a data-dcnode-id="1317" href="#fn80" name="fnB80"><span data-dcnode-id="1318" instrument_node="">[78]</span></a></sup></blockquote><p data-dcnode-id="1310"><span data-dcnode-id="1314" instrument_node="">The
implication of this passage is that where functional and/or commercial
considerations constrain a work's eligibility for protection,
legal standards
ought to be relaxed lest they discourage the creation of valuable works. This
view is undermined by the reasoning
in </span><i data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">Burge</span></i><span data-dcnode-id="1311" instrument_node="">:</span></p><span data-dcnode-id="1309" instrument_node="">
</span><blockquote data-dcnode-id="1304"><span data-dcnode-id="1308" instrument_node="">
[A]s the facts of this case demonstrate, encouragement of 'real artistic effort'
to industrial design may be constrained by the nature
of the functional purposes
to be served by the object to which industrial design is applied and by the
marketing imperatives for
mass production. The evidence of the marketing of the
JS 9000 class of racing yacht, described in the first part of these reasons,
is
illustrative of these constraints. It is these constraints which make it
difficult to support the Plug as a 'work of artistic
craftsmanship'.</span><sup data-dcnode-id="1305"><a data-dcnode-id="1306" href="#fn81" name="fnB81"><span data-dcnode-id="1307" instrument_node="">[79]</span></a></sup></blockquote><p data-dcnode-id="1286"><span data-dcnode-id="1303" instrument_node="">The
idea that copyright might encourage 'real artistic effort' to the detriment of
functionality was not considered problematic by
the Court. Whether the reason
was the High Court's understanding that the question </span><i data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">what ought copyright to
encourage?</span></i><span data-dcnode-id="1300" instrument_node=""> is a question for the legislature responding through the
categories of works, or its understanding that copyright is not concerned
with
encouraging functionality per se, is unclear. Whatever the case, the Court's
view seems to have been that the constraints on
copyright subsistence deriving
from the nature of a particular category of work are just that, constraints, and
not to be gotten
around by extending the category in the manner above. While</span><i data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">
</span></i><span data-dcnode-id="1297" instrument_node="">such extensions are not new in copyright — Anglo-Australian courts
have long been prepared to redraw the boundaries of a category
of work in order
to ensure an object protection, particularly in the absence of non-copyright
protection</span><sup data-dcnode-id="1294"><a data-dcnode-id="1295" href="#fn82" name="fnB82"><span data-dcnode-id="1296" instrument_node="">[80]</span></a></sup><span data-dcnode-id="1293" instrument_node=""> — they are
counter to the approach of the Court in </span><i data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">Burge</span></i><span data-dcnode-id="1290" instrument_node="">, which recalls the decision
in </span><i data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">Feist</span></i><span data-dcnode-id="1287" instrument_node=""> above, expressly rejected by the Federal Court:</span></p><span data-dcnode-id="1285" instrument_node="">
</span><blockquote data-dcnode-id="1280"><span data-dcnode-id="1284" instrument_node="">
Originality is a constitutional requirement. … It is this bedrock
principle of copyright that mandates the law's seemingly
disparate treatment of
facts and factual compilations. 'No one may claim originality as to facts'
… because facts do not owe
their origin to an act of authorship. The
distinction is one between creation and discovery … Factual compilations,
on the
other hand, may possess the requisite originality [if they involve
choices as to the facts' selection and arrangement that are] made
independently
by the compiler and entail a minimal degree of creativity … This
inevitably means that the copyright in a compilation
is thin. Notwithstanding a
valid copyright, a subsequent compiler remains free to use the facts contained
in another's publication
to aid in preparing a competing work, so long as the
competing work does not feature the same selection and arrangement … It
may seem unfair that the fruit of the compiler's labour may be used by others
without compensation. As Justice Brennan has correctly
observed, however, this
is not 'some unforeseen byproduct of a statutory scheme' [but] rather, 'the
essence of copyright' [which]
assures authors the right to their original
expression, but encourages others to build freely upon the ideas and information
conveyed
by a work. This principle, known as the idea/expression or
fact/expression dichotomy, applies to all works of authorship. …
The
result is neither unfair nor unfortunate. It is the means by which copyright
advances the progress of science and
art.</span><sup data-dcnode-id="1281"><a data-dcnode-id="1282" href="#fn83" name="fnB83"><span data-dcnode-id="1283" instrument_node="">[81]</span></a></sup></blockquote><h2 data-dcnode-id="1275"><span data-dcnode-id="1279" instrument_node="">
</span><a data-dcnode-id="1278" name="Heading186"></a><b data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">V	CONCLUSION</span></b></h2><span data-dcnode-id="1274" instrument_node="">
</span><p data-dcnode-id="1269"><span data-dcnode-id="1273" instrument_node="">In </span><i data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">Burge</span></i><span data-dcnode-id="1270" instrument_node="">, the High Court of Australia affirmed the orthodox view that
works of artistic craftsmanship are exceptional in law by virtue of
their
requirement for artistic quality. My suggestion is that this is not right, that
what constitutes a work of artistic craftsmanship
is the same as what
constitutes other works — their properties of form and the history of
their individual production. It follows
that rather than being exceptional,
works of artistic craftsmanship are paradigmatic of the Anglo-Australian
copyright work.</span></p><span data-dcnode-id="1268" instrument_node="">
