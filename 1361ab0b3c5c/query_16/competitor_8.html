</span><p data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">In a similar vein of legal orthodoxy, the Court affirmed that the functional
nature of an object might legitimately constrain its
entitlement to copyright.
This is important, for it suggests that it is not appropriate for the courts to
re-conceive categories
of copyright works to ensure protection for an individual
object it regards as deserving of copyright. Indeed, it is precisely the
risk of
such judicial pragmatism that leads to my caution on conflating the two aspects
of a work's history into a single requirement
for objective intent. </span></p><span data-dcnode-id="1265" instrument_node="">
</span><p data-dcnode-id="1260"><span data-dcnode-id="1264" instrument_node="">The premise of my analysis here is the same non-formalistic theory of the
work developed in earlier
papers.</span><sup data-dcnode-id="1261"><a data-dcnode-id="1262" href="#fn84" name="fnB84"><span data-dcnode-id="1263" instrument_node="">[82]</span></a></sup></p><span data-dcnode-id="1259" instrument_node="">
</span><p data-dcnode-id="1254"><span data-dcnode-id="1258" instrument_node=""> That theory builds on the insights of Kendall Walton regarding the
psychology of art appreciation, and the role of categories in
perceptions of
works. The decision in </span><i data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">Burge</span></i><span data-dcnode-id="1255" instrument_node=""> is further evidence that that theory holds
in law. This is important, not only in suggesting the value of the theory in the
particular
context of copyright jurisprudence, but also in underlining the need
to ensure that statutory conceptions of copyright works properly
account for the
realities of perception: the way in which works are perceived by the courts.</span></p><span data-dcnode-id="1253" instrument_node="">
</span><p data-dcnode-id="1252"></p><span data-dcnode-id="1251" instrument_node="">
</span><hr data-dcnode-id="1250"><p data-dcnode-id="1245"><sup data-dcnode-id="1247"><a data-dcnode-id="1248" href="#fnB1" name="fn1"><span data-dcnode-id="1249" instrument_node="">[*]</span></a></sup><span data-dcnode-id="1246" instrument_node=""> 	University Lecturer in
Intellectual Property, University of Oxford Faculty of Law; Fellow and Tutor, St
Catherine's College, Oxford;
Senior Research Associate (and Interim Director),
Oxford Intellectual Property Research Centre. Email:
justine.pila@law.ox.ac.uk.</span></p><span data-dcnode-id="1244" instrument_node="">
</span><p data-dcnode-id="1230"><sup data-dcnode-id="1241"><a data-dcnode-id="1242" href="#fnB2" name="fn2"><span data-dcnode-id="1243" instrument_node="">[1]</span></a></sup><span data-dcnode-id="1240" instrument_node=""> </span><a class="autolink_findcases_inserted" data-dcnode-id="1238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.austlii.edu.au/au/cases/cth/HCA/2007/17.html" title="View Case"><span data-dcnode-id="1239" instrument_node="">[2007] HCA 17</span></a><span data-dcnode-id="1237" instrument_node="">;  </span><a class="autolink_findcases" data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//classic.austlii.edu.au/cgi-bin/LawCite%3Fcit%3D%25282007%2529%2520232%2520CLR%2520336" title="View LawCiteRecord"><span data-dcnode-id="1236" instrument_node="">(2007) 232 CLR 336</span></a><span data-dcnode-id="1234" instrument_node="">
('</span><i data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">Burge</span></i><span data-dcnode-id="1231" instrument_node="">').</span></p><span data-dcnode-id="1229" instrument_node="">

of literary copyright the court will not concern itself with literary
merit…
Since the tribunal will not attempt a personal aesthetic judgment
… it follows, again, that whether the subject is or is not
a work of
artistic craftsmanship is a matter of evidence; and the most cogent evidence is
likely to be from those who are either
themselves acknowledged artist-craftsmen

expert evidence.
