text_heading" data-dcnode-id="572"><span data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">From Our Customers</span></span></h4></div><div class="flexslider testimonials-slider content-slider" data-animation="fade" data-autoplay="yes" data-dcnode-id="521" style="height: 181.033px; overflow: hidden;"><ul class="slides" data-dcnode-id="529"><li class="testimonial flex-active-slide" data-dcnode-id="563" style="width: 100%; float: left; margin-right: -100%; position: relative; opacity: 0.101667; display: block; z-index: 2;"><div class="testimonial-text text-normal" data-dcnode-id="566"><h3 data-dcnode-id="568"><a data-dcnode-id="569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zevfisher.com/"><span data-dcnode-id="570" instrument_node="">Zev Fisher Photography</span></a></h3><span data-dcnode-id="567" instrument_node=""> I've working with Renaissance Albums for over ten years and I cannot recommend them enough. The quality of the albums is second to none, and they have a wide range of materials and products. My clients are always impressed with their finished albums! I also appreciate that when I call the office, someone always answers the phone-this is truly a family run business and not a corporate machine! The customer service is fantastic and I look forward to Working with Renaissance for many more years.</span></div><cite data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">Zev Fisher</span></cite></li><li class="testimonial" data-dcnode-id="554" style="width: 100%; float: left; margin-right: -100%; position: relative; opacity: 0; display: block; z-index: 1;"><div class="testimonial-text text-normal" data-dcnode-id="557"><h3 data-dcnode-id="562"></h3><h3 data-dcnode-id="559"><a data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//julianalaury.com/"><span data-dcnode-id="561" instrument_node="">Juliana Laury Photography</span></a></h3><span data-dcnode-id="558" instrument_node=""> My name is Juliana Laury, and I've been working with Renaissance Albums for 6 years now! I have nothing but great things to say about their customer service and quality products. Albums are a huge cornerstone to my business and my mission, so having a working relationship with the PEOPLE behind those albums is everything to me. I need to know that each piece will stand the test of time and be something I am truly proud to deliver. I have ordered almost every type of album that Renaissance offers and I haven't been let down by them. Every single question or concern I have has been met with a swift and helpful response. I know that I am a valued customer and they make my priorities their priorities, and that is exactly what I was looking for when I began my extensive search for the right album company for me. I am happy to refer them to all of my photographer friends, and I have done exactly that throughout my time with them.</span></div><cite data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Juliana Laury</span></cite></li><li class="testimonial" data-dcnode-id="546" style="width: 100%; float: left; margin-right: -100%; position: relative; opacity: 0; display: block; z-index: 1;"><div class="testimonial-text text-normal" data-dcnode-id="549"><h3 data-dcnode-id="551"><a data-dcnode-id="552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thekenneys.net/"><span data-dcnode-id="553" instrument_node="">The Kenneys Photography</span></a></h3><span data-dcnode-id="550" instrument_node=""> When we started our company then and a half years ago we knew that we only wanted to offer the very best albums to our couples. We saw their wedding album as the first heirloom of their family and we wanted something that would stand the test of time. Renaissance Albums shares our values of unmatched quality and top notch customer service. They have been there to help us dream up unique designs for couples as well as find any way possible to help us make our client happy! They are not just an album company - they are part of our team! We love the size of the company because they know us personally and take great care to make sure our clients get the very very best!! Our clients rave over the quality and are thrilled to showcase their wedding in such a beautiful way. Because of Renaissance's fabulous customer service&nbsp; we are able to get most of&nbsp; our client's their wedding album within 5 weeks of their wedding which blows our couples' mind! Simply put our business wouldn't be the same without Renaissance.</span></div><cite data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Savannah &amp; Philip Kenney</span></cite></li><li class="testimonial" data-dcnode-id="538" style="width: 100%; float: left; margin-right: -100%; position: relative; opacity: 0; display: block; z-index: 1;"><div class="testimonial-text text-normal" data-dcnode-id="541"><h3 data-dcnode-id="543"><a data-dcnode-id="544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//callawaygable.com/"><span data-dcnode-id="545" instrument_node="">Callaway Gable</span></a></h3><span data-dcnode-id="542" instrument_node=""> For over five years we have exclusively and very happily used Renaissance albums for our Fine Art wedding book deliverables. These handmade books are unmatched when it comes to print and material quality, workmanship and attention to detail. This family run business excels in rapid-response customer service, quick turnaround and their willingness to collaborate on book ideas. If you are looking for a real partner, a wedding book company that consistently and truly delivers works of art - books that will elevate your brand, look no further.</span></div><cite data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Brian &amp; Allison Callaway</span></cite></li><li class="testimonial" data-dcnode-id="530" style="width: 100%; float: left; margin-right: -100%; position: relative; opacity: 0.895; display: block; z-index: 1;"><div class="testimonial-text text-normal" data-dcnode-id="533"><h3 data-dcnode-id="535"><a data-dcnode-id="536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anniebang.com/"><span data-dcnode-id="537" instrument_node="">Annie Bang Photography</span></a></h3><span data-dcnode-id="534" instrument_node=""> I honestly don't know what I would do without Renaissance Albums. They offer top-of-the-line products with a huge range of customization options, and I'm always blown away by their care and attention to details. I want to offer only the best products for my clients, and Renaissance's handcrafted albums are simply stunning and are the absolute best way to revisit, keep and showcase all of life's moments I capture.</span></div><cite data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Annie Bang</span></cite></li></ul><ul class="flex-direction-nav" data-dcnode-id="522"><li class="flex-nav-prev" data-dcnode-id="526"><a class="flex-prev" data-dcnode-id="527" href="#" tabindex="-1"><span data-dcnode-id="528" instrument_node="">Previous</span></a></li><li class="flex-nav-next" data-dcnode-id="523"><a class="flex-next" data-dcnode-id="524" href="#" tabindex="-1"><span data-dcnode-id="525" instrument_node="">Next</span></a></li></ul></div></div></div></div></div></section><section class="row fw-row content-width asset-bg" data-dcnode-id="512"><div class="container" data-dcnode-id="513"><div class="row" data-dcnode-id="514"><div class="blank_spacer span12" data-dcnode-id="515" style="height:30px;"></div></div></div></section><section class="container" data-dcnode-id="366"><div class="row" data-dcnode-id="367"><div class="spb_blog_widget spb_content_element span12" data-dcnode-id="368"><div class="spb_wrapper blog-wrap" data-dcnode-id="369"><h4 class="spb_heading" data-dcnode-id="509"><span data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">
