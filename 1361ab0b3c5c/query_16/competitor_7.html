</span><p data-dcnode-id="1047" style="text-align: center;"><span data-dcnode-id="1048" instrument_node="">From hand beaten copper and silver holloware to finely woven silk dressing gowns, meticulous eggshell inlay, straw marquetry and lacquerware to silk lampshades and cotton table napkins. The common theme is artisans. Artisans with whom we collaborate in design, taking delight in their talents, to produce remarkable, individually made pieces.</span></p><p data-dcnode-id="1045" style="text-align: center;"><span data-dcnode-id="1046" instrument_node="">With our close artisan relationships, regional and product expertise, we are able to offer many of our products designed to your specification as well as being able to source specific products from the regions in which we operate. If you have any design ideas or specific items you’d like to discuss please get in touch</span></p><span data-dcnode-id="1044" instrument_node=""> </span></div><span data-dcnode-id="1042" instrument_node="">

</span><div aria-labelledby="elementor-tab-title-2204" class="elementor-tab-content elementor-clearfix" data-dcnode-id="925" data-tab="4" id="elementor-tab-content-2204" role="tabpanel"><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">There are many aspects to sustainability. One of the main elements that we take on is the importance of longevity – we create products that are made to last, to be loved, passed on to future generations and treasured throughout. This is our definition of an heirloom piece. We are fighting the throw away culture and promoting the slow movement. We also consider sustainability wherever possible throughout production – from using recycled copper as the base of our jugs to choosing the most ethically responsible dyes with our fabrics.</span></p></div><span data-dcnode-id="924" instrument_node="">
