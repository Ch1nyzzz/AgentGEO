</span><img alt="Takumi - A 60,000-hour story on the survival of human craft" data-dcnode-id="2230" data-pc="https://global.toyota/pages/news/images/2019/03/05/0900/001.jpg" data-sp="https://global.toyota/pages/news/images/2019/03/05/0900/001.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//global.toyota/pages/news/images/2019/03/05/0900/001.jpg&amp;raw"><span data-dcnode-id="2229" instrument_node="">

</span><div class="y-wrap youtubedata" data-dcnode-id="2226" data-url="https://www.youtube.com/embed/b3cV8M7zrqg?rel=0&amp;autoplay=1&amp;showinfo=0&amp;wmode=transparent&amp;enablejsapi=1" style="display:none;"></div><span data-dcnode-id="2225" instrument_node="">

</span><div class="section html" data-dcnode-id="2137" id=""><span data-dcnode-id="2209" instrument_node="">
</span><div data-dcnode-id="2139"><p data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">In the West it's often considered that it takes 10,000 hours of study for the average person to become an expert in their subject. But in Japan you're not considered a master of your craft until you've spent 60,000 hours refining your skills. That's the equivalent of working 8 hours a day, 250-days a year for 30 years.</span></p><span data-dcnode-id="2206" instrument_node="">
</span><p data-dcnode-id="2201"><span data-dcnode-id="2205" instrument_node="">A fascinating documentary unveils the world of the Takumi―the highest level of artisan in Japan. The visually-stunning character-driven portrait, made by </span><span class="font_b" data-dcnode-id="2203"><span data-dcnode-id="2204" instrument_node="">Chef's Table Director, Clay Jeter</span></span><span data-dcnode-id="2202" instrument_node=""> for luxury automotive brand Lexus, is due for release on Prime Video, through the Prime Video Direct self-publishing service, on 19th March 2019 globally.</span></p><span data-dcnode-id="2200" instrument_node="">
</span><p data-dcnode-id="2196"><span class="lexus_bold_italic" data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">Takumi - A 60,000-hour story on the survival of human craft</span></span><span data-dcnode-id="2197" instrument_node="">―follows four Japanese artisans who are dedicating their lives to their crafts, including a double Michelin starred chef, a traditional paper cutting artist, an automotive master craftsman and a carpenter for one of the oldest construction companies in the world.</span></p><span data-dcnode-id="2195" instrument_node="">
</span><p data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">The documentary, which premiered at the DOC NYC film festival in New York, is unique in that the medium is also the message. There will be a feature length version plus a '60,000' hour cut which loops scenes of each Takumi's essential skills of their craft they repeat over and over again to highlight the hours, days and years of practice involved.</span></p><span data-dcnode-id="2192" instrument_node="">
</span><p data-dcnode-id="2187"><span data-dcnode-id="2191" instrument_node="">Narrated by Former </span><span class="font_b" data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node="">British Museum Director Neil Macgregor</span></span><span data-dcnode-id="2188" instrument_node=""> and including interviews from world experts in craft and AI, it asks how we will honor and preserve human craft as simultaneously we design machines to act more precisely and faster than humans ever can.</span></p><span data-dcnode-id="2186" instrument_node="">
</span><p data-dcnode-id="2177"><span class="text_italic" data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">"In the time period we live in, which is so attention-deficit, we all feel like we don't have enough time."</span></span><span data-dcnode-id="2183" instrument_node=""> says </span><span class="font_b" data-dcnode-id="2181"><span data-dcnode-id="2182" instrument_node="">Nora Atkinson Curator of Craft at the Smithsonian American Art Museum.</span></span><span data-dcnode-id="2180" instrument_node=""> </span><span class="text_italic" data-dcnode-id="2178"><span data-dcnode-id="2179" instrument_node="">"So, the thousands of hours it really takes to become a skilled craftsman is something that a smaller sphere of artists will experience."</span></span></p><span data-dcnode-id="2176" instrument_node="">
</span><p data-dcnode-id="2166"><span data-dcnode-id="2175" instrument_node="">By 2050, it's estimated that machines will be capable of surpassing human performance in virtually every field </span><span class="text_italic" data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">"We're in the midst of exponential progress,"</span></span><span data-dcnode-id="2172" instrument_node=""> says Martin Ford </span><span class="font_b" data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">Rise of The Robots: Technology and The Threat of a Jobless Future author</span></span><span data-dcnode-id="2169" instrument_node="">. He adds that this rate of transformation hasn't been seen before. </span><span class="text_italic" data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">"In the next 10 years, we're going to see 10,000 years of progress."</span></span></p><span data-dcnode-id="2165" instrument_node="">
</span><p data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">Will human craft disappear as artificial intelligence reaches beyond our limits? Or will this cornerstone of our culture survive and become more valuable than ever? This documentary looks at how to take the long road to excellence in a world that's constantly striving for shortcuts.</span></p><span data-dcnode-id="2162" instrument_node="">
</span><p data-dcnode-id="2156"><span class="text_italic" data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">"The essence of Takumi is to gain a sublime understanding of the nuances of a particular art."</span></span><span data-dcnode-id="2159" instrument_node=""> Says Nahoko Kojima, the paper cut artist who appears in the documentary. </span><span class="text_italic" data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">"To be focused and spend countless hours on one thing, and to carry on. It requires one to empty the mind and focus in a way that is simply not possible when still acquiring a skill."</span></span></p><span data-dcnode-id="2155" instrument_node="">
</span><p data-dcnode-id="2149"><span class="text_italic" data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">"The concept of Takumi has physically and philosophically been at the core of the Lexus brand since it started 30 years ago."</span></span><span data-dcnode-id="2152" instrument_node=""> Said Spiros Fotinos, Head of Global Brand at Lexus International. </span><span class="text_italic" data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">"Our Takumi masters have over 60,000 hours (30+ working years) of experience developing their craft. To celebrate the brand's anniversary year, we wanted to capture the essence of Takumi―and their 60,000-hour journey―on film."</span></span></p><span data-dcnode-id="2148" instrument_node="">
</span><p data-dcnode-id="2143"><span data-dcnode-id="2147" instrument_node="">Viewers can enjoy the 54-minute version or sit and watch the 60,000-hour version on </span><a data-dcnode-id="2145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.takumi-craft.com/" target="_blank"><span data-dcnode-id="2146" instrument_node="">www.takumi-craft.com</span></a><span data-dcnode-id="2144" instrument_node=""> that allows them to soak up the level of dedication and commitment it takes to achieve a special kind of mastery.</span></p><span data-dcnode-id="2142" instrument_node="">
</span><p data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">The documentary, created by The&amp;Partnership London, will be available on Amazon Prime Video, Amazon Instant, Google Play and iTunes.</span></p></div><span data-dcnode-id="2138" instrument_node="">
</span></div><span data-dcnode-id="2136" instrument_node="">
</span><div class="section html" data-dcnode-id="2085" id=""><span data-dcnode-id="2135" instrument_node="">
</span><div data-dcnode-id="2087"><h2 class="title marginb_half" data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">ABOUT THE FILMMAKERS</span></h2><span data-dcnode-id="2132" instrument_node="">
</span><dl data-dcnode-id="2122"><span data-dcnode-id="2131" instrument_node="">
</span><dt class="font_b" data-dcnode-id="2127"><span data-dcnode-id="2130" instrument_node="">CLAY JETER</span><span class="lexus_bold_italic disp_ib" data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">―Writer / Director</span></span></dt><span data-dcnode-id="2126" instrument_node="">
</span><dd data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">American director Clay Jeter has worked on projects such as the Emmy-nominated Chef's Table, the first original Netflix documentary series. Having produced six episodes from 2015 to 2018, he has developed a unique and visually engaging style which is clear throughout his work. Another of his works, film 'Jess + Moss', made its debut at the Sundance Film Festival in 2011 and since then he has continued to grow as 'one to watch'.</span></dd><span data-dcnode-id="2123" instrument_node="">
</span></dl><span data-dcnode-id="2121" instrument_node="">
</span><dl class="margint1" data-dcnode-id="2111"><span data-dcnode-id="2120" instrument_node="">
</span><dt class="font_b" data-dcnode-id="2116"><span data-dcnode-id="2119" instrument_node="">DAVE BEDWOOD</span><span class="lexus_bold_italic disp_ib" data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">―Writer</span></span></dt><span data-dcnode-id="2115" instrument_node="">
</span><dd data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">Dave Bedwood started his copywriting career in 1998. In 2004, after working for several London Ad agencies he and three colleagues set up their own called Lean Mean Fighting Machine. Within four years, they had won 'Agency of the year' at the Cannes International Advertising Awards. Dave has worked and won awards on clients such as Emirates, Virgin, Samsung, The Guardian and Lexus.</span></dd><span data-dcnode-id="2112" instrument_node="">
</span></dl><span data-dcnode-id="2110" instrument_node="">
</span><dl class="margint1" data-dcnode-id="2088"><span data-dcnode-id="2109" instrument_node="">
</span><dt class="font_b" data-dcnode-id="2105"><span data-dcnode-id="2108" instrument_node="">RUPERT MACONICK</span><span class="lexus_bold_italic disp_ib" data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">―Producer</span></span></dt><span data-dcnode-id="2104" instrument_node="">
</span><dd data-dcnode-id="2090"><span data-dcnode-id="2103" instrument_node="">
</span><div class="marginb_half" data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">Rupert has a long track record of producing content with major feature film and documentary directors.</span></div><span data-dcnode-id="2100" instrument_node="">
</span><div class="marginb_half" data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">In 1994, Rupert founded Saville Productions, which has produced projects with some of the most widely acclaimed, prominent award-winning documentary and feature filmmakers including: Martin Campbell (Casino Royale), Fernando Meirelles (City of God), Stephen Daldry (The Reader), James McTeigue (V For Vendetta), Gavin O'Connor (Warrior), Barry Levinson (Rain Man), Bryan Singer (The Usual Suspects), Spike Lee (Inside Man), and Paul Haggis (Crash), Wim Wenders (Paris Texas), Morgan Neville (20 Feet from Stardom), and Werner Herzog (Cave of Forgotten Dreams).</span></div><span data-dcnode-id="2097" instrument_node="">
</span><div class="marginb_half" data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">Saville produced a Global World Cup short film with Adidas directed by Fernando Meirelles (City Of God). He also produced a Werner Herzog directed 35-minute film for AT&amp;T "From One Second to the Next" was a huge web and PR success. The film is now being shown in over 40,000 schools and colleges.</span></div><span data-dcnode-id="2094" instrument_node="">
</span><div data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">Other notable projects include Bending the Light, a Michael Apted (The Up series) directed project about the art of photography through the lens of photographers.</span></div><span data-dcnode-id="2091" instrument_node="">
</span></dd><span data-dcnode-id="2089" instrument_node="">
</span></dl></div><span data-dcnode-id="2086" instrument_node="">
</span></div><span data-dcnode-id="2084" instrument_node="">
</span><div class="section html" data-dcnode-id="1946" id=""><span data-dcnode-id="2083" instrument_node="">
</span><div data-dcnode-id="1948"><h2 class="title marginb_half" data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">ABOUT THE TALENT</span></h2><span data-dcnode-id="2080" instrument_node="">
</span><h3 class="title marginb_half" data-dcnode-id="2077"><span class="text_underline" data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">SUBJECTS</span></span></h3><span data-dcnode-id="2076" instrument_node="">
</span><dl data-dcnode-id="2059"><span data-dcnode-id="2075" instrument_node="">
</span><dt class="font_b" data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">SHIGEO KIUCHI</span></dt><span data-dcnode-id="2072" instrument_node="">
</span><dd data-dcnode-id="2061"><span data-dcnode-id="2071" instrument_node="">
</span><div class="marginb_half" data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">The first subject of the documentary, carpenter Shigeo Kiuchi, 67, was trained by his father in the art of 'Miyadaiku'―an ancient form of carpentry founded in Japan. "I see myself as like a custodian," explains Kiuchi. "I learned from my father who worked here before me, and now I'm passing on the skills to future generations."</span></div><span data-dcnode-id="2068" instrument_node="">
</span><div class="marginb_half" data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">Kiuchi works at Kongō Gumi in Osaka, a temple-making company started in 578AD that he joined as a teenage apprentice. Kiuchi plans to continue his career indefinitely―"carpenters don't retire" he says. However, in contrast, he describes his lifelong contribution to the company as "like a blink of an eye" in comparison to its history.</span></div><span data-dcnode-id="2065" instrument_node="">
</span><div data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">Kongō Gumi is the world's oldest existing company, founded when Prince Shotoku commissioned Japan's first Buddhist temple. It's been in the hands of the same family ever since, and today a 41st generation family member sits on the Kongō Gumi board.</span></div><span data-dcnode-id="2062" instrument_node="">
</span></dd><span data-dcnode-id="2060" instrument_node="">
</span></dl><span data-dcnode-id="2058" instrument_node="">
</span><dl class="margint1" data-dcnode-id="2044"><span data-dcnode-id="2057" instrument_node="">
</span><dt class="font_b" data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">HISATO NAKAHIGASHI</span></dt><span data-dcnode-id="2054" instrument_node="">
</span><dd data-dcnode-id="2046"><span data-dcnode-id="2053" instrument_node="">
</span><div class="marginb_half" data-dcnode-id="2051"><span data-dcnode-id="2052" instrument_node="">Hisato Nakahigashi runs Miyamasou, a two-Michelin star restaurant in Kyoto. He is a fourth generation Kaiseki chef whose great grandfather founded Miyamasou, an inn for pilgrims to stay when visiting the 12th century temple on which the restaurant shares its grounds. "For Hisato, his turning point came when he was 20,000 hours into his Takumi journey," says the documentary's director Clay Jeter. "His father died unexpectedly at the age of 55, and Hisato had been finessing his craft working in fine dining restaurants overseas. However [at this pivotal point in his life] he made the decision to come home and continue the legacy and he's really elevated the restaurant to something extraordinary"</span></div><span data-dcnode-id="2050" instrument_node="">
</span><div data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">Every morning, to source his ingredients for his honoured guests, Hisato fishes in the local river and forages for local herbs and mountain vegetables―and says he "gives thanks" to nature for supplying his food. This dedication is all part of Kaiseki―a traditional Japanese multi-course dinner with a time honoured tradition of going above and beyond for your guests.</span></div><span data-dcnode-id="2047" instrument_node="">
</span></dd><span data-dcnode-id="2045" instrument_node="">
</span></dl><span data-dcnode-id="2043" instrument_node="">
</span><dl class="margint1" data-dcnode-id="2026"><span data-dcnode-id="2042" instrument_node="">
</span><dt class="font_b" data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">NAHOKO KOJIMA</span></dt><span data-dcnode-id="2039" instrument_node="">
</span><dd data-dcnode-id="2028"><span data-dcnode-id="2038" instrument_node="">
</span><div class="marginb_half" data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">The third subject of the documentary, artist Nahoko Kojima is 37 years old, but already has dedicated 60,000 hours to her craft. Kojima began 'Kirie' (Japanese papercutting) under private tutelage when she was only five years old and continued throughout her formative years. At 18, she moved to Tokyo, and in 2004 she graduated with a degree in Design from Kuwasawa Institute. She briefly pursued a career in Graphic Design in Tokyo, but ultimately moved to London to study arts further, and within a few years exhibited her first solo paper-cutting show. Then in 2012, her piece 'Cloud Leopard' was unveiled at the Saatchi Gallery. It is a sculpture that took five months to complete, cut entirely of one sheet of black paper. Kojima's process begins with careful sketches and tests using much smaller pieces of paper. Her practice "is labor-intensive in the extreme, and demands tremendous concentration; if she makes a mistake there is no way to repair it. She uses scalpel blades that are half the thickness of normal blades and are replaced every three minutes".</span></div><span data-dcnode-id="2035" instrument_node="">
</span><div class="marginb_half" data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">In 2013 she won the Jerwood Makers Open award for which she created 'Byaku', the swimming polar bear. In 2018 she faced her biggest challenge by creating a 32m life sized sculpture of a blue whale, Shiro. This sculpture was shown being cut in the film.</span></div><span data-dcnode-id="2032" instrument_node="">
</span><div data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">Though she primarily lives in London now, in 2016 at a ceremony in Tokyo, Kojima accepted the coveted Kuwasawa Award for her contribution to the arts.</span></div><span data-dcnode-id="2029" instrument_node="">
</span></dd><span data-dcnode-id="2027" instrument_node="">
</span></dl><span data-dcnode-id="2025" instrument_node="">
</span><dl class="margint1" data-dcnode-id="2005"><span data-dcnode-id="2024" instrument_node="">
</span><dt class="font_b" data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">KATSUAKI SUGANUMA</span></dt><span data-dcnode-id="2021" instrument_node="">
</span><dd data-dcnode-id="2007"><span data-dcnode-id="2020" instrument_node="">
</span><div class="marginb_half" data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">The documentary also introduces us one of the Takumis at Lexus―Katsuaki Suganuma, who has worked at the company for 32 years. Katsuaki, who's a Takumi in charge of the final inspection line at Lexus, has seen big changes in terms of technology, with the introduction of artificial intelligence and robots. But he's proof that humans still play a vital role in car manufacturing. The documentary takes us behind the scenes at the 4 million square meter plant at Tahara in Aichi, Japan, which is regarded as one of the world's most high-tech factories.</span></div><span data-dcnode-id="2017" instrument_node="">
</span><div class="marginb_half" data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">Katsuaki is one of a handful of extraordinarily dedicated individuals with the quarter of a century of practice required to become a Takumi Master Craftsman. That's 60,000 hours practice.</span></div><span data-dcnode-id="2014" instrument_node="">
</span><div class="marginb_half" data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">This extensive time is spent practicing and refining with minute precision. The result is a group of superhuman Craftsmen with razor sharp senses. They are seen and see themselves as the guardians of Lexus craft at every stage of production.</span></div><span data-dcnode-id="2011" instrument_node="">
</span><div data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">This approach to craft is a philosophy that runs throughout the business, which the Takumi are responsible for passing onto the new generations. Each Takumi will train their youngers to ensure that their expertise, their tradition, and the Takumi spirit develop in all the new talent. This is why we know that nothing is crafted like a Lexus.</span></div><span data-dcnode-id="2008" instrument_node="">
</span></dd><span data-dcnode-id="2006" instrument_node="">
</span></dl><span data-dcnode-id="2004" instrument_node="">
</span><h3 class="title marginb_half margint1_half" data-dcnode-id="2001"><span class="text_underline" data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">ADDITIONAL EXPERTS</span></span></h3><span data-dcnode-id="2000" instrument_node="">
</span><dl data-dcnode-id="1986"><span data-dcnode-id="1999" instrument_node="">
</span><dt class="font_b" data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">NORA ATKINSON</span></dt><span data-dcnode-id="1996" instrument_node="">
</span><dd data-dcnode-id="1988"><span data-dcnode-id="1995" instrument_node="">
</span><div class="marginb_half" data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">Nora Atkinson is a prominent American expert on craft, with a specific focus on the role and importance of handmade in modern culture. Her current role is a Curator of Craft at the Smithsonian American Art Museum in Washington DC. She was recently named Washingtonian Magazine's 2018 "Best Boundary-Pushing Curator" for her work on a number of critically-acclaimed shows.</span></div><span data-dcnode-id="1992" instrument_node="">
</span><div data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">Earlier this year Atkinson spoke at TED event called 'The Age of Amazement'―a future focused event exploring AI and new forms of creativity and social change. We have filmed Atkinson in Washington. Her commentary was about craft in general and its role in the digital age. Importantly for us, she linked craft to luxury in terms of real handmade objects and their value in the future.</span></div><span data-dcnode-id="1989" instrument_node="">
</span></dd><span data-dcnode-id="1987" instrument_node="">
</span></dl><span data-dcnode-id="1985" instrument_node="">
</span><dl class="margint1" data-dcnode-id="1971"><span data-dcnode-id="1984" instrument_node="">
</span><dt class="font_b" data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">MARTIN FORD</span></dt><span data-dcnode-id="1981" instrument_node="">
</span><dd data-dcnode-id="1973"><span data-dcnode-id="1980" instrument_node="">
</span><div class="marginb_half" data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">Martin Ford is a futurist and author focusing on the impact of artificial intelligence and robotics on society and the economy. He has written two books on technology. His most recent book, Rise of the Robots: Technology and the Threat of a Jobless Future (2015), was a New York Times bestseller and won the Financial Times and McKinsey Business Book of the Year Award in 2015.</span></div><span data-dcnode-id="1977" instrument_node="">
</span><div data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">Martin's TED Talk on 'How AI could cause job loss' discusses the dichotomy between the negative effect on industries that AI could have, versus the undeniable progress it can cause and the new industries it could inspire. He has a loyal following on Twitter, with 42.3k followers and had actively engaged in the discussion on Japan and Technology, tweeting on the 31st of July about 'Why Westerners Fear Robots and the Japanese do not'.</span></div><span data-dcnode-id="1974" instrument_node="">
</span></dd><span data-dcnode-id="1972" instrument_node="">
</span></dl><span data-dcnode-id="1970" instrument_node="">
</span><dl class="margint1" data-dcnode-id="1962"><span data-dcnode-id="1969" instrument_node="">
</span><dt class="font_b" data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">JON BRUNER</span></dt><span data-dcnode-id="1966" instrument_node="">
</span><dd data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">Jon Bruner is a journalist and programmer who runs the Digital Factory program at Formlabs, a company that builds professional-grade 3D printers. Before joining Formlabs, he oversaw publications on data, artificial intelligence, hardware, the Internet of Things, manufacturing, and electronics, and was program chair, along with Joi Ito, focused on the intersection between software and the physical world. He is a prolific contributor online with articles such as 'Making AI Transparent' and 'Integrating Data with AI' where he talks about the relationship between 'human experts' and algorithms. Jon has been interviewed by The Economist's own Podcast on the subject of the ability of machine to mimic man. He asks if 'computers can create beautiful music; can 3D printers adopt traditional techniques to give us reinforced floors?' In fascinating contrast to Martina Ford, Jon Bruner is an optimist. He's the kind of futurist who is excited about the opportunities that are opened to humans when AI replaces certain tasks and jobs. He speaks to the beauty of the man working side-by-side with a machine.</span></dd><span data-dcnode-id="1963" instrument_node="">
</span></dl><span data-dcnode-id="1961" instrument_node="">
</span><h3 class="title marginb_half margint1_half" data-dcnode-id="1958"><span class="text_underline" data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">NARRATOR</span></span></h3><span data-dcnode-id="1957" instrument_node="">
</span><dl data-dcnode-id="1949"><span data-dcnode-id="1956" instrument_node="">
</span><dt class="font_b" data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">NEIL MACGREGOR</span></dt><span data-dcnode-id="1953" instrument_node="">
</span><dd data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">Neil is a highly regarded expert in the history of humankind, having been director of the National Gallery and British Museum for many years, and now as a director of the soon to open Humbolt Forum in Berlin (Germany's answer to The Met). Neil has used the lens of human made objects and craft, to tell the history of the world. His bestselling book, exhibition and podcast―A History of the World in 100 Objects, is his most famous work in this area. He is a globally renowned expert in this field and a highly respected author and broadcaster.</span></dd><span data-dcnode-id="1950" instrument_node="">
</span></dl></div><span data-dcnode-id="1947" instrument_node="">
</span></div><span data-dcnode-id="1945" instrument_node="">
</span><div class="section html" data-dcnode-id="1930" id=""><span data-dcnode-id="1944" instrument_node="">
</span><div data-dcnode-id="1932"><h2 class="title marginb_half" data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">ABOUT LEXUS</span></h2><span data-dcnode-id="1941" instrument_node="">
</span><p data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node="">Lexus launched in 1989 with a flagship sedan and a guest experience that helped define the premium automotive industry. In 1998, Lexus introduced the luxury crossover category with the launch of the Lexus RX. The luxury hybrid sales leader, Lexus delivered the world's first luxury hybrid and has since sold over 1.45 million hybrid vehicles.</span></p><span data-dcnode-id="1938" instrument_node="">
</span><p data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">A global luxury automotive brand with an unwavering commitment to bold, uncompromising design, exceptional craftsmanship, and exhilarating performance, Lexus has developed its lineup to meet the needs of the next generation of global luxury guests, and is currently available in over 90 countries worldwide.</span></p><span data-dcnode-id="1935" instrument_node="">
</span><p data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">Lexus associates/team members across the world are dedicated to crafting amazing experiences that are uniquely Lexus, and that excite and change the world.</span></p></div><span data-dcnode-id="1931" instrument_node="">
</span></div><span data-dcnode-id="1929" instrument_node="">
</span><div class="section html" data-dcnode-id="1920" id=""><span data-dcnode-id="1928" instrument_node="">
</span><div data-dcnode-id="1922"><h2 class="title marginb_half" data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">ABOUT THE&amp;PARTNERSHIP LONDON</span></h2><span data-dcnode-id="1925" instrument_node="">
</span><p data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">The&amp;Partnership London is a future-focused creative agency whose mission is to bring together creativity, technology and data in new, exciting and effective ways. Originally founded in 2001 as CHI, the agency rebranded in 2018 as The&amp;Partnership London, underlining its position as the creative and strategic heart of WPP-backed The&amp;Partnership, which is both the UK's largest and Europe's fastest-growing independent agency network. The&amp;Partnership London believes the future of the creative industries lies in big, bold and bionic ideas which blend world-class creativity with smart data, progressive technology and artificial intelligence.</span></p></div><span data-dcnode-id="1921" instrument_node="">
