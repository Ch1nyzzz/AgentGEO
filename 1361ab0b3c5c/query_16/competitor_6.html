</span><p data-dcnode-id="4183" style="text-align: center;"><span data-dcnode-id="4184" instrument_node="">Discover the beautiful world of Italian ceramics. Artemest walks you through a unique journey between tradition and contemporary ceramics: from splendid Maiolica vases created by talented masters in their local artisanal workshops, to innovative pieces designed by world&nbsp;renowned designers.</span></p><p data-dcnode-id="4181" style="text-align: center;"><span data-dcnode-id="4182" instrument_node="">Having a long history and a rich&nbsp;ceramic tradition, the&nbsp;Italian ceramics&nbsp;production is one of the world's most important ones. Handmade and hand-painted, each creation is truly unique and representative of a specific tradition. As artistic expression that has been fundamental in Italian culture, pottery is today an important proof of unique heritage and traditions that are handed down from generation to generation.&nbsp;</span></p><span data-dcnode-id="4180" instrument_node="">

</span><h2 data-dcnode-id="4158"><span data-dcnode-id="4159" instrument_node="">The Maiolica</span></h2><span data-dcnode-id="4157" instrument_node="">
</span></div><span data-dcnode-id="4155" instrument_node="">
</span><div class="grid-collection js-product-list" data-dcnode-id="4153"><span data-dcnode-id="4154" instrument_node="">
</span></div><div class="layout single" data-dcnode-id="4127"><span data-dcnode-id="4152" instrument_node="">
</span><div class="text-block module" data-dcnode-id="4129"><span data-dcnode-id="4151" instrument_node="">
</span><p data-dcnode-id="4131" style="text-align: center;"><strong data-dcnode-id="4149"><span data-dcnode-id="4150" instrument_node="">​</span></strong><inline data-dcnode-id="4132" style="background-color: initial;"><strong data-dcnode-id="4147"><span data-dcnode-id="4148" instrument_node="">Maiolica</span></strong><span data-dcnode-id="4146" instrument_node=""> is a form of Italian pottery made of tin-glazed earthenware that was popular from the 1400s to the 1600s. Maiolica can be distinguished by a white background that contrasts with the brilliant earth-tone pigments painted onto it. The tin glaze is a chemical mixture that acts as a base for paint by fixing it to the surface, giving maiolica pottery its unique white background. The presence of tin in a glaze makes the glaze less likely to run or blur when the painted ceramic piece is heated in a kiln. The tin glaze preserves colors incredibly well over time, so maiolica is unique in that its brilliant colors may appear just as they did when they were originally painted hundreds of years ago. Italian maiolica was developed during the Renaissance, beginning in the 1400s. The use of a tin glaze on ceramics was an innovation introduced to Italian artists via pottery imported from Spain. At the time, Spain was predominantly under Moorish rule, and much of the pottery being exported was what is referred to as Hispano-Moresque in style.&nbsp;</span><br data-dcnode-id="4145"><span data-dcnode-id="4144" instrument_node="">​There are different techniques employed in the decoration of Maiolica: the</span><em data-dcnode-id="4142"><span data-dcnode-id="4143" instrument_node=""> lustro </span></em><span data-dcnode-id="4141" instrument_node="">technique was developed during the Renaissance period and it consisted of iridescent effects obtained applaying precious silver or copper on a previously&nbsp;glazed maiolica. The final result are beautiful, polychromatic objects that only few artisans in Italy could be able to create.&nbsp;</span><br data-dcnode-id="4140"><span data-dcnode-id="4139" instrument_node="">​The </span><em data-dcnode-id="4137"><span data-dcnode-id="4138" instrument_node="">spolve</span></em><em data-dcnode-id="4135"><span data-dcnode-id="4136" instrument_node="">r</span></em><span data-dcnode-id="4134" instrument_node="">o, which means "dusting",&nbsp;is used by ceramists to paint patterns by hand. They would outline the design by dusting powdered charcoal through pinpricks made on a thin paper with the original pattern, in order to keep uniformity of the design which is always hand painted to ensure the highest quality.&nbsp;</span><br data-dcnode-id="4133"></inline></p><span data-dcnode-id="4130" instrument_node="">
</span></div><span data-dcnode-id="4128" instrument_node="">

</span><h2 data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">Italian Ceramic Tradition</span></h2><span data-dcnode-id="309" instrument_node="">
</span></div><span data-dcnode-id="307" instrument_node="">
</span><div class="grid-collection js-product-list" data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">
</span></div><div class="layout double cf" data-dcnode-id="235"><span data-dcnode-id="304" instrument_node="">
</span><div class="col" data-dcnode-id="270"><span data-dcnode-id="303" instrument_node="">
</span><div class="text-block module" data-dcnode-id="272"><span data-dcnode-id="302" instrument_node="">
</span><p data-dcnode-id="297"><span data-dcnode-id="301" instrument_node="">The Norther Italian region of </span><strong data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">Piedmont</span></strong><span data-dcnode-id="298" instrument_node=""> has developed over time a ceramic tradition based on the production of everyday objects. Mugs, jars, plates, vases and more all decorated with splendid landscapes, colorful fruits, romantic floral elements, geometric decorations and domestic animals, painted with rapid strokes and touches of bright color. Along with this, Piedmont is renowned for the refined neriage technique, that consists in mixing two or more clays of contrasting colors to create pottery with extraordinary surfaces and obtain polychrome effects. The original Italian name of this fantastic ceramic crafting technique is called “millefiori” from a decorative glass-forming process meaning “a thousand flowers.” </span></p><p data-dcnode-id="292"><span data-dcnode-id="296" instrument_node="">The Italian region of </span><strong data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">Veneto</span></strong><span data-dcnode-id="293" instrument_node="">, in the north-east of Italy, is home to two of the most interesting Italian ceramic production centers: Nove and Este, both located in the province of the city of Padua. Nove, a city bordered to the east by the Brenta river, has become the center of ceramics manufacturing since the eighteenth century. Nove's ceramic production distinguishes itself for the richness of its floral decorations and the brilliance of the enamel, applied to a great variety of objects. The ceramic district of Este also has a very important ceramic tradition and unique characteristics, such as their yellowish color. Here the ceramic traditions has been alive since the prehistory and proof is exhibited at the local Museo Nazionale Atestino, where the history and evolution of Este ceramics craft and look are documented.</span></p><p data-dcnode-id="281"><span data-dcnode-id="291" instrument_node="">In </span><strong data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">Liguria</span></strong><span data-dcnode-id="288" instrument_node="">, since 1400s&nbsp;the town of Albissola began producing hand-made ceramics, creating a tradition of working and decorating clay that is still thriving today. The ceramics of Albisola have been distinguished by the use of the color blue on white, which became known as </span><em data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">Antico Savona</span></em><span data-dcnode-id="285" instrument_node=""> or </span><em data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">Bianco Blu</span></em><span data-dcnode-id="282" instrument_node="">. Through the centuries, other styles and color variations have been integrated to the production, like the Black Ceramic and the Yellow Ceramic.&nbsp;The scenes pictured in the splendid Ligurian ceramics production are biblical, mythological or literary episodes, which were used as models by the artisans. Other decorations consisted in the representation of cherubs or beautiful landscapes, always realized on white and light blue, and, more rarely, in polychromy. &nbsp;</span></p><p data-dcnode-id="274"><span data-dcnode-id="280" instrument_node="">The history of ceramics production&nbsp;In </span><strong data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">Tuscany</span></strong><span data-dcnode-id="277" instrument_node=""> boasts a long tradition, since the ancient Etruscan epoch. Pottery tradition has always been&nbsp;very flourishing, and many production centers were established, such as Arezzo, Siena, Sesto Fiorentino, Florence and so on. Montelupo Fiorentino, located only a few miles away from the beautiful city of Florence, is one of the most active pottery centers since the 1300s producing not only everyday items, but also luxury ceramic pieces featuring beautiful and unique Renaissance motifs, Gothic flowers and poetic natural elements.&nbsp;</span><br data-dcnode-id="276"><span data-dcnode-id="275" instrument_node="">​In Montelupo there is the new Ceramics Museum, a spacious building where are showcased evocative reconstructions as well as itinerary through the history of the city's ceramics.&nbsp;</span></p><span data-dcnode-id="273" instrument_node="">
</span></div><span data-dcnode-id="271" instrument_node="">
</span></div><span data-dcnode-id="269" instrument_node="">
</span><div class="col" data-dcnode-id="237"><span data-dcnode-id="268" instrument_node="">
</span><div class="text-block module" data-dcnode-id="239"><span data-dcnode-id="267" instrument_node="">
</span><p data-dcnode-id="262"><span data-dcnode-id="266" instrument_node="">In the region of </span><strong data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">Emilia Romagna</span></strong><span data-dcnode-id="263" instrument_node="">, the main site for ceramic production is the city of Faenza. Ceramics is and always been in the DNA of this small city: the term faience comes from Faenza and was originally applied only to ceramic pieces produced in Faenza. In the 14th century, Faenza was already famous for its artwork and has been ever since. The importance of ceramics to this city is also reflected from the presence of the MIC or Museo Internazionale delle Ceramiche, in English ‘International Museum of Ceramics’; where visitors can walk through wonderful rooms full of Greek, Roman and Etruscan ceramics, Renaissance majolica, exotic pottery from Africa and from the Far East, and wares from faraway lost cultures, such as pre-Colombian America.</span></p><p data-dcnode-id="260"><inline data-dcnode-id="261" style="background-color: initial;"></inline></p><p data-dcnode-id="255"><span data-dcnode-id="259" instrument_node="">The entire region of </span><strong data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">Umbria</span></strong><span data-dcnode-id="256" instrument_node=""> is known for a production of excellent terracotta ware; however, its ancients ceramics tradition is particularly evident in four towns: Deruta, Gualdo Tadino, Gubbio and Orvieto. Umbria’s ceramic tradition is defined by the “lustro” technique that characterizes the pottery productions of the region. This specific decorative technique is used to obtain iridescent shades of golden or ruby color on the ceramic surface of decorative pieces.</span></p><p data-dcnode-id="250"><span data-dcnode-id="254" instrument_node="">In </span><strong data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">Campania</span></strong><span data-dcnode-id="251" instrument_node="">, Vietri Sul Mare is a center of ancient Etruscan origins, where its tradition of artistic craftsmanship was expressed in the production of tiles. The glossy terracotta was decorated with motifs inspired by the pastoral world and characterized by warm colors. Later, the decorations become more elaborated, starting a flourishing production of floor tiles, called "riggiole".</span></p><p data-dcnode-id="246"><strong data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">Apulia</span></strong><span data-dcnode-id="247" instrument_node=""> is famous for its majolica productions, defined by white enamel enriched by touches of green, yellow and with a glossy finish. The artistic majolica, that is possible to find as decoration in the churches, is the perfect example to confirm the refined manufacturing techniques. One of the most important cities in Apulia for the production of ceramic is Grottaglie, which is part of the 28 Italian cities that have the D.O.C. brand for original Italian ceramic art. What makes the ceramics of Grottaglie particularly famous, are the different phases of the working process: each piece is individually decorated by hand, and the secrets of these handcrafted work of art are passed on through generations.&nbsp;</span></p><p data-dcnode-id="241"><span data-dcnode-id="245" instrument_node="">In</span><strong data-dcnode-id="243"><span data-dcnode-id="244" instrument_node=""> Sicily</span></strong><span data-dcnode-id="242" instrument_node="">, the most famous production center is Caltagirone. Being rich in clay and wood, Caltagirone has its own production since ancient times. Particularly significant is the development of ceramics applied to the architecture and to the floor decorations shown in several points of the city. A great development in the eighteenth century saw the creation of ceramics of the most varied and bright colors, along with the creation of sculptural elements.&nbsp;</span></p><span data-dcnode-id="240" instrument_node="">
