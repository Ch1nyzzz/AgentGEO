</span><div class="vc_row wpb_row vc_row-fluid" data-dcnode-id="2182"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="2183"><div class="vc_column-inner" data-dcnode-id="2184"><div class="wpb_wrapper" data-dcnode-id="2185"><div class="vc_empty_space responsive_js_composer_custom_css_1139622574" data-dcnode-id="2204" style="height: 32px"><span class="vc_empty_space_inner" data-dcnode-id="2205"></span></div><span data-dcnode-id="2203" instrument_node="">

</span><div class="wpb_wrapper" data-dcnode-id="2191"><span data-dcnode-id="2201" instrument_node="">
</span><p data-dcnode-id="2199"><span data-dcnode-id="2200" instrument_node="">Some of you may wonder why our shoes are handmade in Portugal. There are plenty of shoe artisans everywhere in the world capable of excellent work. However, just a handful are ready to go out of their comfort zones.</span></p><span data-dcnode-id="2198" instrument_node="">
</span><p data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">We need a flexible and brave collaborator willing to experiment with us. Artisans that help us create unique shoes,&nbsp;different from the regular leather shoe in most stores.</span></p><span data-dcnode-id="2195" instrument_node="">
</span><p data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">We found these wonderful people in Portugal.</span></p><span data-dcnode-id="2192" instrument_node="">
</span></div><span data-dcnode-id="2190" instrument_node="">

</span><p data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">Our designs are challenging to make for many artisans, because they require textiles and leather to be combined with expertise. After all, we want to create something special and unique – a limited-edition&nbsp;shoe&nbsp;or&nbsp;bag&nbsp;that is not far from a piece of art.</span></p><span data-dcnode-id="2149" instrument_node="">
</span><p data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">Each Liebre Style design is unique because it has it’s own story. One particular model is inspired by the&nbsp;low-tide of Scotland&nbsp;and features a hand-woven tweed that resembles this land. Another is inspired by the gentlemen ties, and features a unique silk from Como, Italy.</span></p><span data-dcnode-id="2146" instrument_node="">
</span><p data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">Our shoe artisans in Portugal understand the importance of each of our individual designs. They make our shoes by hand with extreme care and respect to the story of each of our models</span></p><span data-dcnode-id="2143" instrument_node="">

</span><p data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">The term Made in Portugal has long been a guarantee of quality craftsmanship in the field.</span></p><span data-dcnode-id="1871" instrument_node="">
</span><p data-dcnode-id="1867"><span class="JsGRdQ" data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">When you hold a Liebre Style design in your hands, you immediately notice the perfection of its finishing. The quality of the materials, the detail in the stitching. You realise that our products are&nbsp;</span></span><span data-dcnode-id="1868" instrument_node="">made to last for decades, especially if you&nbsp;care for them properly.</span></p><span data-dcnode-id="1866" instrument_node="">
</span><p data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">This is all thanks to the passionate work of our Portuguese artisans. You can visit the inside of our Portuguese atelier in the video below.</span></p><span data-dcnode-id="1863" instrument_node="">

</span><p data-dcnode-id="1269"><span data-dcnode-id="1275" instrument_node="">In Liebre Style w</span><span class="JsGRdQ" data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">e want to make accessories that you will love and will become part of your life and who you are. A piece that is cherished and&nbsp;</span></span><span data-dcnode-id="1272" instrument_node="">treated with care&nbsp;</span><span class="JsGRdQ" data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">to last. Therefore, it does not make sense that hundreds of other people will have the exact same shoes as you.&nbsp;</span></span></p><span data-dcnode-id="1268" instrument_node="">
</span><p data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">However, during our search for artisans, the majority of them were only interested in huge quantities. It did not matter how unique our designs were, or what we wanted to achieve with Liebre Style. Many would not talk to us further, if we were not making hundreds, if not thousands, of shoes.</span></p><span data-dcnode-id="1265" instrument_node="">
</span><p data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">Luckily, our artisan in Portugal agree with our vision of making the world unique and diverse. They create for us small batches of each design, because it’s not the quantity what matters, but the meaning of each design and their quality.</span></p><span data-dcnode-id="1262" instrument_node="">
</span><p data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">Our shoes are handmade in Portugal, and we are proud of it!</span></p><span data-dcnode-id="1259" instrument_node="">
