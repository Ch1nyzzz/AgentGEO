d="683"><span data-dcnode-id="684" instrument_node="">Started:</span></span><span data-dcnode-id="682" instrument_node=""> 1860 </span></div><div class="sep" data-dcnode-id="680"></div><div class="start-end" data-dcnode-id="676"><span class="bold" data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Ended:</span></span><span data-dcnode-id="677" instrument_node=""> 1920 </span></div></div><div class="timeline" data-dcnode-id="673"><img alt="The Arts &amp; Crafts Movement Timeline" data-dcnode-id="674" height="86" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/images20/new_design/tl/tl_arts_and_crafts.png&amp;raw" width="430"></div></div></div></div></div><div class="nav-anchor" data-dcnode-id="668" id="nav"></div><div class="nav-bar" data-dcnode-id="651"><div class="main-bio-art" data-dcnode-id="652"><div class="page-title" data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">The Arts &amp; Crafts Movement</span></div><div class="page-nav" data-dcnode-id="653"><div class="element" data-dcnode-id="663"><a data-dcnode-id="664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/movement/arts-and-crafts/%23nav"><span data-dcnode-id="665" instrument_node="">Main</span></a></div><div class="element" data-dcnode-id="656"><span data-dcnode-id="662" instrument_node=""> </span><a data-dcnode-id="658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/movement/arts-and-crafts/history-and-concepts/%23nav"><span data-dcnode-id="661" instrument_node="">History</span><span class="mobile-hidden" data-dcnode-id="659"><span data-dcnode-id="660" instrument_node=""> &amp; Concepts</span></span></a><span data-dcnode-id="657" instrument_node=""> </span></div><div class="selected element" data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Artworks</span></div></div></div></div><span data-dcnode-id="650" instrument_node=""> </span><div class="content-container" data-dcnode-id="193"><div class="content" data-dcnode-id="194"><div class="main-column" data-dcnode-id="265"><div class="article-anchor" data-dcnode-id="649" id="artworks"></div><h2 class="article-header artworks-header" data-dcnode-id="647"><span data-dcnode-id="648" instrument_node=""> Artworks and Artists of The Arts &amp; Crafts Movement					</span></h2><div class="progression-art" data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Progression of Art</span></div><div class="artworks-box progression-artworks-box" data-dcnode-id="464"><div class="article-anchor" data-dcnode-id="644" id="pnt_1"></div><div class="important-art-element important-art-element-work important-art-element-first" data-dcnode-id="624"><div class="arwrork-img-container" data-dcnode-id="638"><div class="artwork-img lazy-box" data-dcnode-id="639"><div class="img-btn-holder" data-dcnode-id="640"><img alt="Philip Webb and William Morris: Red House (1859-60)" class="lazyloaded" data-dcnode-id="643" data-src="/images20/works/arts_and_crafts_1.jpg" height="400" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/images20/works/arts_and_crafts_1.jpg&amp;raw" width="700"><div class="btn c-info-button" data-dcnode-id="642"></div><div class="btn zoom-button" data-dcnode-id="641"></div></div></div></div><div class="artwork-data-container" data-dcnode-id="625"><div class="year-line" data-dcnode-id="637"></div><div class="artwork-year" data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">1859-60</span></div><h3 class="artwork-title" data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Red House</span></h3><p class="artwork-author" data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Artist: Philip Webb and William Morris</span></p><span data-dcnode-id="630" instrument_node=""> </span><p class="artwork-description" data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Often called the first Arts &amp; Crafts building, Red House was appropriately the residence of William Morris and his family, built within commuting distance of central London but at the time still in the countryside. It was the first house designed by Webb as an independent architect, and the only house that Morris built for himself. Its asymmetrical, L-shaped plan, pointed arches and picturesque set of masses with steep rooflines recall the Gothic style, while its tile roof and brick construction, largely devoid of ornament speak to the simplicity that Morris preached and its function as a mere residence, though the interiors were in places richly decorated with murals by Edward Burne-Jones. The house represented a sharp contrast to suburban or country Victorian residences, most of which were elaborately and pretentiously decorated. Its location allowed Morris to remain in touch with nature, away from London's dirty, polluted core. The design, which included unusually large servants' quarters, spoke to Morris and Webb's budding Socialist inclinations towards erasing class distinctions. Unfortunately, the long hours that Morris spent commuting proved too burdensome for his productivity, and after only five years in the house he sold it and moved his family into London above the shop for his firm.</span></p><p class="artwork-materilas-location" data-dcnode-id="626"><span data-dcnode-id="627" instrument_node=""> Red Brick, Wood, and Glass - Bexleyheath, London				</span></p></div></div><div class="article-anchor" data-dcnode-id="623" id="pnt_2"></div><div class="important-art-element important-art-element-even important-art-element-work" data-dcnode-id="594"><div class="arwrork-img-container" data-dcnode-id="617"><div class="artwork-img lazy-box" data-dcnode-id="618"><div class="img-btn-holder" data-dcnode-id="619"><img alt="Morris &amp; Co.: Tulip and Rose (1876)" class="lazyloaded" data-dcnode-id="622" data-src="/images20/works/arts_and_crafts_2.jpg" height="400" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/images20/works/arts_and_crafts_2.jpg&amp;raw" width="400"><div class="btn c-info-button" data-dcnode-id="621"></div><div class="btn zoom-button" data-dcnode-id="620"></div></div></div></div><div class="artwork-data-container" data-dcnode-id="595"><div class="year-line" data-dcnode-id="616"></div><div class="artwork-year" data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">1876</span></div><h3 class="artwork-title" data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Tulip and Rose</span></h3><p class="artwork-author" data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Artist: Morris &amp; Co.</span></p><span data-dcnode-id="609" instrument_node=""> </span><p class="artwork-description" data-dcnode-id="598"><span data-dcnode-id="608" instrument_node="">The </span><i data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Tulip and Rose</span></i><span data-dcnode-id="605" instrument_node=""> curtain exemplifies the kinds of textiles and wallpaper designs produced by Morris' firm beginning in the 1860s. The dense, precisely interlocking pattern of the wool fabric, using curved and exaggerated forms of plants, flora (and sometimes fauna) became a hallmark of Morris &amp; Company's fabric and wallpaper products in the 1870s and '80s. </span><br data-dcnode-id="604"><br data-dcnode-id="603"><span data-dcnode-id="602" instrument_node=""> Unlike Morris' earlier designs, which featured more naturalistic imagery, this textile demonstrates his move beyond emulation towards a sense of abstraction during his mature career. The flattened forms and the emphasis on line anticipate the stylization of nature later used by Art Nouveau, and calls attention to the nature of the wool's rough surface texture, thereby revealing the honesty in materials. Furthermore, the "hanging" quality of the imagery of plants and flowers speaks to the way vines cover an entire exterior wall surface - much like the curtain is supposed to cover the entire plane of a window, creating a consonance between the natural elements and man-made articles, in effect bridging or blurring the boundary between the natural world outside and the interior, even when the curtain is completely closed. </span><br data-dcnode-id="601"><br data-dcnode-id="600"><span data-dcnode-id="599" instrument_node=""> As much as the forms here look forward towards Art Nouveau, their flattened quality also looks backwards towards the forms of plants and living elements as depicted in Gothic stained-glass windows, and the curved linearity of the plants could also be said to mimic the forms of Gothic tracery. In this sense, the textile is as much revelatory of Morris' background and love of the Gothic as it is a forward-looking formal experiment.</span></p><p class="artwork-materilas-location" data-dcnode-id="596"><span data-dcnode-id="597" instrument_node=""> Wool curtain, triple-cloth weave - Cooper-Hewitt Museum, New York City				</span></p></div></div><div class="article-anchor" data-dcnode-id="593" id="pnt_3"></div><div class="important-art-element important-art-element-work" data-dcnode-id="568"><div class="arwrork-img-container" data-dcnode-id="587"><div class="artwork-img lazy-box" data-dcnode-id="588"><div class="img-btn-holder" data-dcnode-id="589"><img alt="William Morris: Geoffrey Chaucer's Canterbury Tales (1896)" class="lazyloaded" data-dcnode-id="592" data-src="/images20/works/arts_and_crafts_3.jpg" height="400" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/images20/works/arts_and_crafts_3.jpg&amp;raw" width="535"><div class="btn c-info-button" data-dcnode-id="591"></div><div class="btn zoom-button" data-dcnode-id="590"></div></div></div></div><div class="artwork-data-container" data-dcnode-id="569"><div class="year-line" data-dcnode-id="586"></div><div class="artwork-year" data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">1896</span></div><h3 class="artwork-title" data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Geoffrey Chaucer's Canterbury Tales</span></h3><p class="artwork-author" data-dcnode-id="578"><span data-dcnode-id="581" instrument_node="">Artist: </span><a data-dcnode-id="579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/artist/morris-william/"><span data-dcnode-id="580" instrument_node="">William Morris</span></a></p><span data-dcnode-id="577" instrument_node=""> </span><p class="artwork-description" data-dcnode-id="572"><span data-dcnode-id="576" instrument_node="">The tomes that William Morris produced during the last six years of his life were the epitome of the luxurious pieces manufactured by his firm. They were designed as art objects to be experienced as much as books to be perused, so much so that it is difficult to read them straight through like an ordinary text. The decoration is so lavish and elaborate, overwhelming the printed text to such a degree that one is compelled to stop at every pair of pages and examine it with care before attempting to continue with the narrative (put forth in generally small type). One is immediately struck by the sheer amount of labor involved in creating the plates for printing, the typesetting, the process of making the paper and the binding, along with the cover decoration. The Chaucer, which was the jewel of Morris' volumes made at the Kelmscott Press in an edition of only 425 copies, resembles the ancient medieval colophons with painted calligraphic script and thick binding. </span><br data-dcnode-id="575"><br data-dcnode-id="574"><span data-dcnode-id="573" instrument_node=""> The binding is secured when the book is closed with latches, suggesting that the process of reading the work is akin to opening a kind of sacred tome or a treasure chest and that what is contained inside is extremely valuable. The choice of Chaucer, a medieval English author, for the text, is representative of both the connections of the Arts &amp; Crafts with the Middle Ages and Morris' own deep appreciation of literature (he was offered the post of Poet Laureate of Britain the following year but turned it down). Ironically, despite Morris' desire that a book like this would produce joy and pleasure in an ordinary reader, it paradoxically was never accessible to any but the wealthiest of his clients, and arguably its overwrought design renders it difficult to comfortably handle or digest for simple legibility.</span></p><p class="artwork-materilas-location" data-dcnode-id="570"><span data-dcnode-id="571" instrument_node=""> Engraved, woodcut prints, paper, and ink - The British Library - Boston Spa, Wetherby, West Yorkshire, UK				</span></p></div></div><div class="article-anchor" data-dcnode-id="567" id="pnt_4"></div><div class="important-art-element important-art-element-even important-art-element-work" data-dcnode-id="544"><div class="arwrork-img-container" data-dcnode-id="561"><div class="artwork-img lazy-box" data-dcnode-id="562"><div class="img-btn-holder" data-dcnode-id="563"><img alt="Grueby Faience Company: Beaver (1904)" class="lazyloaded" data-dcnode-id="566" data-src="/images20/works/arts_and_crafts_4.jpg" height="400" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/images20/works/arts_and_crafts_4.jpg&amp;raw" width="331"><div class="btn c-info-button" data-dcnode-id="565"></div><div class="btn zoom-button" data-dcnode-id="564"></div></div></div></div><div class="artwork-data-container" data-dcnode-id="545"><div class="year-line" data-dcnode-id="560"></div><div class="artwork-year" data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">1904</span></div><h3 class="artwork-title" data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Beaver</span></h3><p class="artwork-author" data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Artist: Grueby Faience Company</span></p><span data-dcnode-id="553" instrument_node=""> </span><p class="artwork-description" data-dcnode-id="548"><span data-dcnode-id="552" instrument_node="">The subway tile here represents the way mass production became a hallmark of the Arts &amp; Crafts movement in the United States and ultimately put an end to the large-scale use of handcraft by most design firms. Grueby, founded in 1894 in Revere, Massachusetts, was known primarily for its production of art pottery vases, often using the matte cucumber green glaze that can be seen here as well. But the company was also renowned for its architectural tiles, which it instead produced in molds. In 1904 the company, which had built a name for itself by earning several gold medals at international fairs, was awarded the contract for the pictorial tile revetments in the stations of the new Interborough Rapid Transit lines of the New York Subway. This was not enough, however: Grueby's mass-production competition forced it into bankruptcy in 1909, and after a decade of instability, the company closed for good in 1920. </span><br data-dcnode-id="551"><br data-dcnode-id="550"><span data-dcnode-id="549" instrument_node=""> The tile is significant for the Arts &amp; Crafts in many respects. The beaver, like most of the other stations' tiles produced by Grueby, recalls the naturalistic or rural imagery characteristic of the movement and provides a softer antidote to the otherwise industrial character of the stations (emphasized by the natural colors). Here, the beaver has a double meaning, as Astor Place was named for the Astor family, who had built their fortune in part through fur trapping of beavers in the Pacific Northwest; on the other hand, "Astor" itself is nearly synonymous with the Latin word for beaver, "castor." A simple frame with a geometric design and low garland relief surrounds the beaver, emphasizing the flatness of the surface.</span></p><p class="artwork-materilas-location" data-dcnode-id="546"><span data-dcnode-id="547" instrument_node=""> Ceramic tile - Astor Place Subway Station, New York City				</span></p></div></div><div class="article-anchor" data-dcnode-id="543" id="pnt_5"></div><div class="important-art-element important-art-element-work" data-dcnode-id="520"><div class="arwrork-img-container" data-dcnode-id="537"><div class="artwork-img lazy-box" data-dcnode-id="538"><div class="img-btn-holder" data-dcnode-id="539"><img alt="Greene &amp; Greene: Gamble House (1908-09)" class="lazyloaded" data-dcnode-id="542" data-src="/images20/works/arts_and_crafts_5.jpg" height="400" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/images20/works/arts_and_crafts_5.jpg&amp;raw" width="718"><div class="btn c-info-button" data-dcnode-id="541"></div><div class="btn zoom-button" data-dcnode-id="540"></div></div></div></div><div class="artwork-data-container" data-dcnode-id="521"><div class="year-line" data-dcnode-id="536"></div><div class="artwork-year" data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">1908-09</span></div><h3 class="artwork-title" data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Gamble House</span></h3><p class="artwork-author" data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Artist: Greene &amp; Greene</span></p><span data-dcnode-id="529" instrument_node=""> </span><p class="artwork-description" data-dcnode-id="524"><span data-dcnode-id="528" instrument_node="">If the bungalow is the quintessential Arts &amp; Crafts house, the Gamble House could be described as the perfect "overgrown" example. Designed by the architectural firm of the brothers Greene &amp; Greene, Massachusetts transplants to southern California, for the eponymous executive of Procter &amp; Gamble, the house demonstrates the way that the movement's notions of simplicity and homeliness were transformed into the preserves of the upper classes. It remains the best example of the Greenes' architectural work and is sometimes described as an exemplar of the Western Stick Style. </span><br data-dcnode-id="527"><br data-dcnode-id="526"><span data-dcnode-id="525" instrument_node=""> The Gamble house exhibits consonance with nature in nearly every respect. Its low, horizontal profile is exemplified by the covered second-floor porch and wraparound terrace extending from the front entrance to the back garden. The painted olive hue of the shingle siding almost seems to blend with the verdant trees and is offset by the stained wood of the frames for the doors and windows. This brown hue extends to the interior and multiplies with inlays in various surfaces, thus creating a sense of continuity between outside and inside. Such harmony is finally reinforced by the stained glass of the front door, which features imagery of a Japanese black pine, acknowledging the house's location on the Pacific Rim. The interior, meanwhile, exudes a gentle warmth and sense of informal comfort despite not being brightly lit, a quality highly desired in an Arts &amp; Crafts residence. Finally, the Greenes designed the house with a painstaking attention to structural honesty, extending the rafters underneath the roof to the ends of the eaves and exposing the joinery on staircases, beams, and posts on the interior.</span></p><p class="artwork-materilas-location" data-dcnode-id="522"><span data-dcnode-id="523" instrument_node=""> Pasadena, California				</span></p></div></div><div class="article-anchor" data-dcnode-id="519" id="pnt_6"></div><div class="important-art-element important-art-element-even important-art-element-pnt" data-dcnode-id="489"><div class="arwrork-img-container" data-dcnode-id="506"><div class="arwrork-pnt-container" data-dcnode-id="507"><div class="artwork-img lazy-box" data-dcnode-id="516"><div class="img-btn-holder" data-dcnode-id="517"><img alt="Sarah Agnes Estelle Irvine, and Joseph Meyer: Vase (1922)" class="lazyloaded" data-dcnode-id="518" data-src="/images20/pnt/pnt_arts_and_crafts_6.jpg" height="95" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/images20/pnt/pnt_arts_and_crafts_6.jpg&amp;raw" width="95"></div></div><div class="google-images" data-dcnode-id="508"><span data-dcnode-id="515" instrument_node=""> </span><a data-dcnode-id="510" href="#" onclick="return openGoogleImage('Sarah Agnes Estelle Irvine, and Joseph Meyer Vase (1922)')"><span data-dcnode-id="514" instrument_node=""> </span><span data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Artwork Images</span></span><span data-dcnode-id="511" instrument_node=""> </span></a><span data-dcnode-id="509" instrument_node=""> </span></div></div></div><div class="artwork-data-container" data-dcnode-id="490"><div class="year-line" data-dcnode-id="505"></div><div class="artwork-year" data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">1922</span></div><h3 class="artwork-title" data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Vase</span></h3><p class="artwork-author" data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">Artist: Sarah Agnes Estelle Irvine, and Joseph Meyer</span></p><span data-dcnode-id="498" instrument_node=""> </span><p class="artwork-description" data-dcnode-id="493"><span data-dcnode-id="497" instrument_node="">Newcomb College Pottery is emblematic of a well-known regional strain of the Arts &amp; Crafts movement, and the most famous of those located in the American South. It also bears the distinction of being one of the few Arts &amp; Crafts centers that was directly attached to an institution of higher education, the women's college of Tulane University. This vase, painted by Sarah ("Sadie") Irvine, the best-known of the Newcomb Pottery designers, shows the most popular theme for the vessels they produced: the "Moonlight and Magnolias" imagery of broad-canopy live oak or magnolia trees, adorned with moss drooping from their branches, silhouetted against a night sky with a full moon. The most naturalistic and least stylized of the various Newcomb Pottery designs, this imagery clearly roots the piece in the region of the lower Mississippi River valley, where magnolias are abundant, as if to advertise directly its origin. </span><br data-dcnode-id="496"><br data-dcnode-id="495"><span data-dcnode-id="494" instrument_node=""> But as much as the vase reveals about the region where it was made, it also discloses how the large artistic American Arts &amp; Crafts enterprises created a brand for their products that simultaneously diminished the identities of their individual artists. Although Irvine was one of the most important painters of Newcomb vessels, working there from 1908 to 1929 before serving as a studio art instructor until 1952, the institution did not publicly promote her talents. And while her painted vessels are often marked and she was able to sell individual pieces, women were barred from the initial stages of the work's creation: school policy was that a "male potter would be needed to work the clay, throw the pots, fire the kiln and handle the glazing." It was Joseph Meyer's job to create the unfinished vessels and plates for the women to decorate; he in turn received the credit for Newcomb Pottery when it won awards at major international expositions.</span></p><p class="artwork-materilas-location" data-dcnode-id="491"><span data-dcnode-id="492" instrument_node=""> Glazed Ceramic - The Metropolitan Museum of Art, New York				</span></p></div></div><div class="article-anchor" data-dcnode-id="488" id="pnt_7"></div><div class="important-art-element important-art-element-last important-art-element-work" data-dcnode-id="465"><div class="arwrork-img-container" data-dcnode-id="482"><div class="artwork-img lazy-box" data-dcnode-id="483"><div class="img-btn-holder" data-dcnode-id="484"><img alt="Charles F. A. Voysey: Sideboard (1897)" class="lazyloaded" data-dcnode-id="487" data-src="/images20/works/arts_and_crafts_7.jpg" height="400" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/images20/works/arts_and_crafts_7.jpg&amp;raw" width="327"><div class="btn c-info-button" data-dcnode-id="486"></div><div class="btn zoom-button" data-dcnode-id="485"></div></div></div></div><div class="artwork-data-container" data-dcnode-id="466"><div class="year-line" data-dcnode-id="481"></div><div class="artwork-year" data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">1897</span></div><h3 class="artwork-title" data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">Sideboard</span></h3><p class="artwork-author" data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">Artist: Charles F. A. Voysey</span></p><span data-dcnode-id="474" instrument_node=""> </span><p class="artwork-description" data-dcnode-id="469"><span data-dcnode-id="473" instrument_node="">Voysey's sideboard illustrates well many of the tenets of Arts &amp; Crafts furniture. The straightforward design appears so homely that one might almost mistake it for a piece of folk art. The sideboard rests on four posts that appear almost to be too thin to carry its mass; they are extremely plain, as not even the feet include fittings, and terminate in shallow circular platforms that may have been intended to hold candles, underscoring the anti-modern tenor of the environment this piece was meant to occupy. The wood, fittingly, is oak, a very common selection for Arts &amp; Crafts furniture, which has been hewn in order to expose the grain, and stained to visually emphasize the material's texture. The organization of the sideboard's storage is honest and simplistic: a cabinet containing possibly a shelf, a counter, and a shelf above attached to the back. Virtually nothing about the piece is hidden or complicated. </span><br data-dcnode-id="472"><br data-dcnode-id="471"><span data-dcnode-id="470" instrument_node=""> The only ornament attached to the sideboard consists of the prominent dark brass hinges on the cabinet doors, which terminate in heart-shaped cutouts. They appear in some sense to be the only part of the sideboard that holds the piece together, bolstering the sense of solidity and sturdiness, while their curves provide an antidote to the otherwise severe straight lines. The hinges appear almost as if they were stolen from a Gothic cathedral door and repurposed, giving the sideboard a deceptive air that it is older than it really is and underscoring the connection with the Middle Ages, from whose aesthetics the Arts &amp; Crafts was derived.</span></p><p class="artwork-materilas-location" data-dcnode-id="467"><span data-dcnode-id="468" instrument_node=""> Oak and brass - Los Angeles County Museum of Art				</span></p></div></div></div><div data-dcnode-id="371" id="related-artists"><h2 class="article-header" data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Related Artists</span></h2><div class="related-artists-block" data-dcnode-id="372"><ul class="related-artists" data-dcnode-id="373"><li data-dcnode-id="440"><div class="artist-row" data-dcnode-id="441"><span data-dcnode-id="461" instrument_node=""> </span><a data-dcnode-id="459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/artist/morris-william/"><img alt="William Morris Biography, Art &amp; Analysis" class="lazyloaded" data-dcnode-id="460" data-src="/images20/ttip/morris_william.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/images20/ttip/morris_william.jpg&amp;raw"></a><span data-dcnode-id="458" instrument_node=""> </span><div class="artist-info" data-dcnode-id="442"><span data-dcnode-id="457" instrument_node=""> </span><a data-dcnode-id="452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/art
