</span><h1 class="firstHeading" data-dcnode-id="578" id="firstHeading"><span data-dcnode-id="579" instrument_node="">Arts and Crafts Movement</span></h1><span data-dcnode-id="577" instrument_node="">

</span><div class="mw-content-ltr" data-dcnode-id="102" dir="ltr" id="mw-content-text" lang="en"><div class="mw-backforth-prev" data-dcnode-id="561"><a data-dcnode-id="562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Artillery" title="Artillery"><span data-dcnode-id="563" instrument_node="">Previous (Artillery)</span></a></div><div class="mw-backforth-next" data-dcnode-id="558"><a data-dcnode-id="559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Arturo_Toscanini" title="Arturo Toscanini"><span data-dcnode-id="560" instrument_node="">Next (Arturo Toscanini)</span></a></div><div data-dcnode-id="557" style="clear: both;"></div><div class="mw-parser-output" data-dcnode-id="103"><p data-dcnode-id="555"><br data-dcnode-id="556"></p><span data-dcnode-id="554" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="542"><div class="thumbinner" data-dcnode-id="543" style="width:227px;"><a class="image" data-dcnode-id="552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/File%3AWilliam_Morris_design_for_Trellis_wallpaper_1862.jpg"><img alt="" class="thumbimage" data-dcnode-id="553" decoding="async" height="236" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/d/images/thumb/b/b4/William_Morris_design_for_Trellis_wallpaper_1862.jpg/225px-William_Morris_design_for_Trellis_wallpaper_1862.jpg&amp;raw" srcset="/d/images/thumb/b/b4/William_Morris_design_for_Trellis_wallpaper_1862.jpg/338px-William_Morris_design_for_Trellis_wallpaper_1862.jpg 1.5x, /d/images/thumb/b/b4/William_Morris_design_for_Trellis_wallpaper_1862.jpg/450px-William_Morris_design_for_Trellis_wallpaper_1862.jpg 2x" width="225"></a><span data-dcnode-id="551" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="544"><div class="magnify" data-dcnode-id="549"><a class="internal" data-dcnode-id="550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/File%3AWilliam_Morris_design_for_Trellis_wallpaper_1862.jpg" title="Enlarge"></a></div><span data-dcnode-id="548" instrument_node="">"Artichoke" wallpaper, by John Henry Dearle for William Morris &amp; Co., </span><i data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">circa</span></i><span data-dcnode-id="545" instrument_node=""> 1897 (Victoria and Albert Museum).</span></div></div></div><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="521"><span data-dcnode-id="540" instrument_node="">The </span><b data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Arts and Crafts movement</span></b><span data-dcnode-id="537" instrument_node=""> was a </span><a data-dcnode-id="535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/United_Kingdom" title="United Kingdom"><span data-dcnode-id="536" instrument_node="">British</span></a><span data-dcnode-id="534" instrument_node=""> and </span><a data-dcnode-id="532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/United_States" title="United States"><span data-dcnode-id="533" instrument_node="">American</span></a><span data-dcnode-id="531" instrument_node=""> aesthetic movement occurring in the last years of the nineteenth century and the early years of the twentieth century. In part a reaction to the mechanization of the </span><a data-dcnode-id="529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Industrial_Revolution" title="Industrial Revolution"><span data-dcnode-id="530" instrument_node="">Industrial Revolution</span></a><span data-dcnode-id="528" instrument_node="">, the movement was inspired by the writings of </span><a data-dcnode-id="526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/John_Ruskin" title="John Ruskin"><span data-dcnode-id="527" instrument_node="">John Ruskin</span></a><span data-dcnode-id="525" instrument_node=""> and his </span><a data-dcnode-id="523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Romanticism" title="Romanticism"><span data-dcnode-id="524" instrument_node="">romantic</span></a><span data-dcnode-id="522" instrument_node=""> idealization of the craftsman taking pride in his personal handiwork. The zenith for the movement was between approximately 1880 and 1910.
</span></p><p data-dcnode-id="501"><span data-dcnode-id="520" instrument_node="">It was a reformist movement that influenced </span><a data-dcnode-id="518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/United_Kingdom" title="United Kingdom"><span data-dcnode-id="519" instrument_node="">British</span></a><span data-dcnode-id="517" instrument_node=""> and American architecture, decorative arts, cabinet making, crafts, and even the "cottage" garden designs of William Robinson or Gertrude Jekyll. Its best-known practitioners were </span><a data-dcnode-id="515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/William_Morris" title="William Morris"><span data-dcnode-id="516" instrument_node="">William Morris</span></a><span data-dcnode-id="514" instrument_node="">, Charles Robert Ashbee, T. J. Cobden Sanderson, Walter Crane, Nelson Dawson, Phoebe Anna Traquair, Herbert Tudor Buckland, </span><a data-dcnode-id="512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Charles_Rennie_Mackintosh" title="Charles Rennie Mackintosh"><span data-dcnode-id="513" instrument_node="">Charles Rennie Mackintosh</span></a><span data-dcnode-id="511" instrument_node="">, Christopher Dresser, Edwin Lutyens, Ernest Gimson, William Lethaby, Edward Schroeder Prior, </span><a data-dcnode-id="509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Frank_Lloyd_Wright" title="Frank Lloyd Wright"><span data-dcnode-id="510" instrument_node="">Frank Lloyd Wright</span></a><span data-dcnode-id="508" instrument_node="">, </span><a data-dcnode-id="506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Gustav_Stickley" title="Gustav Stickley"><span data-dcnode-id="507" instrument_node="">Gustav Stickley</span></a><span data-dcnode-id="505" instrument_node="">, Christopher Whall and </span><a data-dcnode-id="503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Pre-Raphaelite_Brotherhood" title="Pre-Raphaelite Brotherhood"><span data-dcnode-id="504" instrument_node="">artists in the Pre-Raphaelite movement</span></a><span data-dcnode-id="502" instrument_node="">.
</span></p><span data-dcnode-id="500" instrument_node="">

</span><p data-dcnode-id="390"><span data-dcnode-id="406" instrument_node="">In the United States, the terms </span><i data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">Arts and Crafts movement,</span></i><span data-dcnode-id="403" instrument_node=""> </span><i data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">American Craftsman,</span></i><span data-dcnode-id="400" instrument_node=""> or </span><i data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">Craftsman style</span></i><span data-dcnode-id="397" instrument_node=""> are often used to denote the style of architecture, interior design, and decorative arts that prevailed between the dominant eras of </span><a data-dcnode-id="395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Art_Nouveau" title="Art Nouveau"><span data-dcnode-id="396" instrument_node="">Art Nouveau</span></a><span data-dcnode-id="394" instrument_node=""> and </span><a data-dcnode-id="392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Art_Deco" title="Art Deco"><span data-dcnode-id="393" instrument_node="">Art Deco</span></a><span data-dcnode-id="391" instrument_node="">, or roughly the period from 1910 to 1925.
</span></p><span data-dcnode-id="389" instrument_node="">
</span><h2 data-dcnode-id="386"><span class="mw-headline" data-dcnode-id="387" id="Origins_and_key_principles"><span data-dcnode-id="388" instrument_node="">Origins and key principles</span></span></h2><span data-dcnode-id="385" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="376"><div class="thumbinner" data-dcnode-id="377" style="width:252px;"><a class="image" data-dcnode-id="383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/File%3AOgle_County_Oregon_Public_Library_Oregon_Il1.jpg"><img alt="" class="thumbimage" data-dcnode-id="384" decoding="async" height="188" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/d/images/thumb/e/e6/Ogle_County_Oregon_Public_Library_Oregon_Il1.jpg/250px-Ogle_County_Oregon_Public_Library_Oregon_Il1.jpg&amp;raw" srcset="/d/images/thumb/e/e6/Ogle_County_Oregon_Public_Library_Oregon_Il1.jpg/375px-Ogle_County_Oregon_Public_Library_Oregon_Il1.jpg 1.5x, /d/images/thumb/e/e6/Ogle_County_Oregon_Public_Library_Oregon_Il1.jpg/500px-Ogle_County_Oregon_Public_Library_Oregon_Il1.jpg 2x" width="250"></a><span data-dcnode-id="382" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="378"><div class="magnify" data-dcnode-id="380"><a class="internal" data-dcnode-id="381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/File%3AOgle_County_Oregon_Public_Library_Oregon_Il1.jpg" title="Enlarge"></a></div><span data-dcnode-id="379" instrument_node="">The Oregon Public Library in Oregon, Illinois, U.S.A. is an example of Arts and Crafts in a Carnegie Library.</span></div></div></div><span data-dcnode-id="375" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="363"><div class="thumbinner" data-dcnode-id="364" style="width:252px;"><a class="image" data-dcnode-id="373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/File%3AMyersKindergartenNZ.jpg"><img alt="" class="thumbimage" data-dcnode-id="374" decoding="async" height="190" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/d/images/thumb/a/ab/MyersKindergartenNZ.jpg/250px-MyersKindergartenNZ.jpg&amp;raw" srcset="/d/images/thumb/a/ab/MyersKindergartenNZ.jpg/375px-MyersKindergartenNZ.jpg 1.5x, /d/images/thumb/a/ab/MyersKindergartenNZ.jpg/500px-MyersKindergartenNZ.jpg 2x" width="250"></a><span data-dcnode-id="372" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="365"><div class="magnify" data-dcnode-id="370"><a class="internal" data-dcnode-id="371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/File%3AMyersKindergartenNZ.jpg" title="Enlarge"></a></div><span data-dcnode-id="369" instrument_node="">Myers Free Kindergarten building in Auckland, </span><a data-dcnode-id="367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/New_Zealand" title="New Zealand"><span data-dcnode-id="368" instrument_node="">New Zealand</span></a><span data-dcnode-id="366" instrument_node="">.</span></div></div></div><span data-dcnode-id="362" instrument_node="">
</span><p data-dcnode-id="354"><span data-dcnode-id="361" instrument_node="">The Arts and Crafts Movement began primarily as a search for authentic and meaningful styles for the nineteenth century and as a reaction to the eclectic revival of historic styles of the </span><a data-dcnode-id="359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Victorian_era" title="Victorian era"><span data-dcnode-id="360" instrument_node="">Victorian era</span></a><span data-dcnode-id="358" instrument_node=""> and to "soulless" machine-made production as a consequence of the technological shift brought on by the </span><a data-dcnode-id="356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Industrial_Revolution" title="Industrial Revolution"><span data-dcnode-id="357" instrument_node="">Industrial Revolution</span></a><span data-dcnode-id="355" instrument_node="">. Considering the machine to be the root cause of all repetitive and mundane evils, some of the protagonists of this movement turned entirely away from the use of machines and towards handcraft, which tended to concentrate their productions in the hands of sensitive but well-heeled patrons.
</span></p><p data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">Yet, while the Arts and Crafts movement was in large part inspired by a reaction to industrialization, if looked at on the whole, it was neither anti-industrial nor anti-modern. Some of the European factions believed that machines were in fact necessary, but they should only be used to relieve the tedium of mundane, repetitive tasks. At the same time, some Arts and Crafts leaders felt that objects should also be affordable. The conflict between quality production and 'demo' design, and the attempt to reconcile the two, dominated design debate at the turn of the twentieth century.
</span></p><p data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">Those who sought compromise between the efficiency of the machine and the skill of the craftsman thought it a useful endeavor to seek the means through which a true craftsman could master a machine to do his bidding, in opposition to the reality which was much more prevalent during the Industrial Age, name that humans had become virtual extensions of the industrial machine.
</span></p><p data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">The need to reverse the human subservience to the unquenchable machine was a point on which everyone agreed. Yet the extent to which the machine was ostracized from the process was a point of contention debated by many different factions within the Arts and Crafts movement throughout Europe. This conflict was exemplified in the German Arts and Crafts movement, by the clash between two leading figures of the Deutscher Werkbund (DWB), Hermann Muthesius and Henry Van de Velde. Muthesius, also head of design education for German Government, was a champion of standardization. He believed in mass production, in affordable democratic art. Van de Velde, on the other hand, saw mass production as threat to creativity and individuality.
</span></p><p data-dcnode-id="343"><span data-dcnode-id="347" instrument_node="">Though the spontaneous personality of the designer became more central than the historical "style" of a design, certain tendencies stood out: reformist neo-Gothic influences, rustic and "cottagey" surfaces, repeating designs, vertical and elongated forms. In order to express the beauty inherent in craft, some products were deliberately left slightly unfinished, resulting in a certain rustic and robust effect. There were also </span><a data-dcnode-id="345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Socialism" title="Socialism"><span data-dcnode-id="346" instrument_node="">socialist</span></a><span data-dcnode-id="344" instrument_node=""> undertones to this movement, in that another primary aim was for craftspeople to derive satisfaction from what they did. This satisfaction, the proponents of this movement felt, was totally denied in the industrialized processes inherent in compartmentalized machine production.
</span></p><p data-dcnode-id="338"><span data-dcnode-id="342" instrument_node="">In fact, the proponents of the Arts and Crafts movement were against the principle of a </span><a data-dcnode-id="340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Division_of_labor" title="Division of labor"><span data-dcnode-id="341" instrument_node="">division of labor</span></a><span data-dcnode-id="339" instrument_node="">, which in some cases could be independent of the presence or absence of machines. They were in favor of the idea of the master craftsman, creating all the parts of an item of furniture, for instance, and also taking a part in its assembly and finishing, with some possible help by apprentices. This was in contrast to work environments such as the French Manufactories, where everything was oriented towards the fastest production possible. For example, one person or team would handle all the legs of a piece of furniture, another all the panels, another assembled the parts and yet another painted and varnished or handled other finishing work, all according to a plan laid out by a furniture designer who would never actually work on the item during its creation.
</span></p><p data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">The Arts and Crafts movement sought to reunite what had been ripped asunder in the nature of human work, having the designer work with his hands at every step of creation. Some of the most famous apostles of the movement, such as Morris, were more than willing to design products for machine production, when this did not involve the wretched division of labor and loss of craft talent, which they denounced. Morris designed numerous carpets for machine production in series.
</span></p><span data-dcnode-id="335" instrument_node="">
</span><h2 data-dcnode-id="332"><span class="mw-headline" data-dcnode-id="333" id="History_of_the_movement"><span data-dcnode-id="334" instrument_node="">History of the movement</span></span></h2><span data-dcnode-id="331" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="322"><div class="thumbinner" data-dcnode-id="323" style="width:252px;"><a class="image" data-dcnode-id="329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/File%3AThe_Red_House%2C_Bexleyheath.JPG"><img alt="" class="thumbimage" data-dcnode-id="330" decoding="async" height="188" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/d/images/thumb/0/03/The_Red_House%252C_Bexleyheath.JPG/250px-The_Red_House%252C_Bexleyheath.JPG&amp;raw" srcset="/d/images/thumb/0/03/The_Red_House%2C_Bexleyheath.JPG/375px-The_Red_House%2C_Bexleyheath.JPG 1.5x, /d/images/thumb/0/03/The_Red_House%2C_Bexleyheath.JPG/500px-The_Red_House%2C_Bexleyheath.JPG 2x" width="250"></a><span data-dcnode-id="328" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="324"><div class="magnify" data-dcnode-id="326"><a class="internal" data-dcnode-id="327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/File%3AThe_Red_House%2C_Bexleyheath.JPG" title="Enlarge"></a></div><span data-dcnode-id="325" instrument_node="">Red House in London.</span></div></div></div><p data-dcnode-id="305"><span data-dcnode-id="321" instrument_node="">Red House, Bexleyheath, </span><a data-dcnode-id="319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/London" title="London"><span data-dcnode-id="320" instrument_node="">London</span></a><span data-dcnode-id="318" instrument_node=""> (1859), by architect Philip Webb for Morris himself, is an exemplary work of this movement in its early stages. There is a deliberate attempt at expressing surface textures of ordinary materials, such as stone and tiles, with an asymmetrical and quaint building composition. Morris later formed the </span><a data-dcnode-id="316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/William_Morris" title="William Morris"><span data-dcnode-id="317" instrument_node="">Kelmscott Press</span></a><span data-dcnode-id="315" instrument_node=""> and also had a shop where he designed and sold products such as wallpaper, textiles, furniture, etc. Morris's own ideas emerged from the thinking that had informed </span><a data-dcnode-id="313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Pre-Raphaelite_Brotherhood" title="Pre-Raphaelite Brotherhood"><span data-dcnode-id="314" instrument_node="">Pre-Raphaelitism</span></a><span data-dcnode-id="312" instrument_node="">, especially following the publication of Ruskin's book </span><i data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">The Stones of Venice</span></i><span data-dcnode-id="309" instrument_node=""> and </span><i data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">Unto this Last,</span></i><span data-dcnode-id="306" instrument_node=""> both of which sought to relate the moral and social health of a nation to the qualities of its architecture and designs. The decline of rural handicrafts, corresponding to the rise of industrialized society, was a cause for concern for many designers and social reformers, who feared the loss of traditional skills and creativity. For Ruskin, a healthy society depended on skilled and creative workers. Morris and other socialist designers such as Crane and Ashbee looked forward to a future society of free craftspeople. The aesthetic movement, which emerged at the same period, fed into these ideas. In 1881 the Home Arts and Industries Association was set up by Eglantyne Louisa Jebb in collaboration with Mary Fraser Tytler (later Mary Watts) and others to promote and protect rural handicrafts. A group of reformist architects, followers of Arthur Mackmurdo, later established the Art Workers Guild to promote their vision of the integration of designing and making. Crane was elected as its president.
</span></p><p data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">In America in the late 1890s, a group of Boston's most influential architects, designers, and educators, determined to bring to this country the design reforms begun in Britain by William Morris, met to organize an exhibition of contemporary craft objects. The first meeting was held on January 4, 1897, at the Museum of Fine Arts (MFA) to organize an exhibition of contemporary crafts. When craftsmen, consumers, and manufacturers realized the aesthetic and technical potential of the applied arts, the process of design reform in Boston started. Present at this meeting were General Charles Loring, Chairman of the Trustees of the MFA; William Sturgis Bigelow and Denman Ross, collectors, writers and MFA trustees; Ross Turner, painter; Sylvester Baxter, art critic for the Boston Transcript; Howard Baker, A.W. Longfellow, Jr.; and Ralph Clipson Sturgis, architect.
</span></p><p data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">The first American Arts and Crafts Exhibition opened on April 5, 1897 at Copley Hall, featuring over 1,000 objects made by 160 craftsmen, half of whom were women. Some of the supporters for the exhibit were Langford Warren, founder of Harvard's School of Architecture; Mrs. Richard Morris Hunt; Arthur Astor Carey and Edwin Mead, social reformers; and Will Bradley, graphic designer.
</span></p><p data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">The huge success of this exhibition led to the incorporation of The Society of Arts and Crafts, on June 28, 1897, with a mandate to "develop and encourage higher standards in the handicrafts." The 21 founders were interested in more than sales, and focused on the relationship of designers within the commercial world, encouraging artists to produce work with the highest quality of workmanship and design.
</span></p><p data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">This mandate was soon expanded into a credo, possibly written by the SAC's first president, Charles Eliot Norton, which read:
</span></p><span data-dcnode-id="296" instrument_node="">
</span><blockquote data-dcnode-id="293"><p data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">This Society was incorporated for the purpose of promoting artistic work in all branches of handicraft. It hopes to bring Designers and Workmen into mutually helpful relations, and to encourage workmen to execute designs of their own. It endeavors to stimulate in workmen an appreciation of the dignity and value of good design; to counteract the popular impatience of Law and Form, and the desire for over-ornamentation and specious originality. It will insist upon the necessity of sobriety and restraint, or ordered arrangement, of due regard for the relation between the form of an object and its use, and of harmony and fitness in the decoration put upon it.</span></p></blockquote><span data-dcnode-id="292" instrument_node="">
</span><h2 data-dcnode-id="289"><span class="mw-headline" data-dcnode-id="290" id="Influences_on_later_art"><span data-dcnode-id="291" instrument_node="">Influences on later art</span></span></h2><span data-dcnode-id="288" instrument_node="">
</span><h3 data-dcnode-id="285"><span class="mw-headline" data-dcnode-id="286" id="Europe"><span data-dcnode-id="287" instrument_node="">Europe</span></span></h3><span data-dcnode-id="284" instrument_node="">
</span><p data-dcnode-id="270"><span data-dcnode-id="283" instrument_node="">Widely exhibited in Europe, the Arts and Crafts movement's qualities of simplicity and honest use of materials negating historicism inspired designers like Henry van de Velde and movements such as </span><a data-dcnode-id="281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Art_Nouveau" title="Art Nouveau"><span data-dcnode-id="282" instrument_node="">Art Nouveau</span></a><span data-dcnode-id="280" instrument_node="">, the Dutch </span><a data-dcnode-id="278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/De_Stijl" title="De Stijl"><span data-dcnode-id="279" instrument_node="">De Stijl</span></a><span data-dcnode-id="277" instrument_node=""> group, Viennese Secessionstil and eventually the </span><a data-dcnode-id="275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Bauhaus" title="Bauhaus"><span data-dcnode-id="276" instrument_node="">Bauhaus</span></a><span data-dcnode-id="274" instrument_node="">. The movement can be assessed as a prelude to </span><a data-dcnode-id="272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Modernism" title="Modernism"><span data-dcnode-id="273" instrument_node="">Modernism</span></a><span data-dcnode-id="271" instrument_node="">, where pure forms, stripped of historical associations, would be once again applied to industrial production.
</span></p><p data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">In Russia, Viktor Hartmann, Viktor Vasnetsov and other artists associated with Abramtsevo Colony sought to revive the spirit and quality of medieval Russian decorative arts in the movement quite independent from that flourishing in Great Britain.
</span></p><p data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">The Wiener Werkstätte, (Vienna Workshop) founded in 1903 by Josef Hoffmann and Koloman Moser, played an independent role in the development of Modernism, with its Wiener Werkstätte Style.
</span></p><p data-dcnode-id="258"><span data-dcnode-id="265" instrument_node="">The British Utility furniture of </span><a data-dcnode-id="263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/World_War_II" title="World War II"><span data-dcnode-id="264" instrument_node="">World War II</span></a><span data-dcnode-id="262" instrument_node=""> was simple in design and based on </span><i data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">Arts and Crafts</span></i><span data-dcnode-id="259" instrument_node=""> ideas.
</span></p><span data-dcnode-id="257" instrument_node="">
</span><h3 data-dcnode-id="254"><span class="mw-headline" data-dcnode-id="255" id="United_States"><span data-dcnode-id="256" instrument_node="">United States</span></span></h3><span data-dcnode-id="253" instrument_node="">
</span><p data-dcnode-id="248"><span data-dcnode-id="252" instrument_node="">In the </span><a data-dcnode-id="250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/United_States" title="United States"><span data-dcnode-id="251" instrument_node="">United States</span></a><span data-dcnode-id="249" instrument_node="">, the Arts and Crafts Movement took on a distinctively more bourgeois flavor. While the European movement tried to recreate the virtuous world of craft labor that was being destroyed by industrialization, Americans tried to establish a new source of virtue to replace heroic craft production: the tasteful middle-class home. They thought that the simple but refined aesthetics of Arts and Crafts decorative arts would ennoble the new experience of industrial consumerism, making individuals more rational and society more harmonious. In short, the American Arts and Crafts Movement was the aesthetic counterpart of its contemporary political movement: Progressivism.
</span></p><p data-dcnode-id="234"><span data-dcnode-id="247" instrument_node="">In the United States, the Arts and Crafts Movement spawned a wide variety of attempts to reinterpret European Arts and Crafts ideals for Americans. These included the "Craftsman"-style architecture, furniture, and other decorative arts such as the designs promoted by </span><a data-dcnode-id="245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Gustav_Stickley" title="Gustav Stickley"><span data-dcnode-id="246" instrument_node="">Gustav Stickley</span></a><span data-dcnode-id="244" instrument_node=""> in his magazine, </span><i data-dcnode-id="242"><span data-dcnode-id="243" instrument_node="">The Craftsman.</span></i><span data-dcnode-id="241" instrument_node=""> A host of imitators of Stickley's furniture (the designs of which are often mislabeled the "Mission Style") included three companies formed by his brothers, the Roycroft community founded by Elbert Hubbard, the "Prairie School" of </span><a data-dcnode-id="239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Frank_Lloyd_Wright" title="Frank Lloyd Wright"><span data-dcnode-id="240" instrument_node="">Frank Lloyd Wright</span></a><span data-dcnode-id="238" instrument_node="">, the Country Day School movement, the bungalow style of houses popularized by Greene and Greene, utopian communities like Byrdcliffe and Rose Valley, and the contemporary studio craft movement. Studio pottery—exemplified by Grueby, Newcomb, Teco, Overbeck and Rookwood pottery, Bernard Leach in Britain, and Pewabic Pottery in </span><a data-dcnode-id="236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/Detroit%2C_Michigan" title="Detroit, Michigan"><span data-dcnode-id="237" instrument_node="">Detroit</span></a><span data-dcnode-id="235" instrument_node="">—as well as the art tiles by Ernest A. Batchelder in Pasadena, California, and idiosyncratic furniture of Charles Rohlfs also demonstrate the clear influence of Arts and Crafts Movement. Mission, Prairie, and the California Craftsman styles of homebuilding remain tremendously popular in the United States today.
</span></p><span data-dcnode-id="233" instrument_node="">
</span><h3 data-dcnode-id="230"><span class="mw-headline" data-dcnode-id="231" id="Elsewhere"><span data-dcnode-id="232" instrument_node="">Elsewhere</span></span></h3><span data-dcnode-id="229" instrument_node="">
</span><p data-dcnode-id="224"><span data-dcnode-id="228" instrument_node="">The </span><a data-dcnode-id="226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newworldencyclopedia.org/entry/New_Zealand" title="New Zealand"><span data-dcnode-id="227" instrument_node="">New Zealand</span></a><span data-dcnode-id="225" instrument_node=""> architect James Walter Chapman-Taylor was a follower of the Arts and Crafts Movement.
</span></p><span data-dcnode-id="223" instrument_node="">
