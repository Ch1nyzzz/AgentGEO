</span><h2 data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">William Morris – A History</span></h2><span data-dcnode-id="300" instrument_node="">
</span><p data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">© Stuart Stark, Heritage Consultant</span></p><span data-dcnode-id="297" instrument_node="">
</span><p data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">The talents and many accomplishments of William Morris (1834 – 1896) defy easy summary. He was a remarkable designer of home furnishings, and he is generally acknowledged as the father of the Arts &amp; Crafts movement in both Britain and America. His designs are still in production over 100 years after his death and they still influence people today.</span></p><span data-dcnode-id="294" instrument_node="">
</span><hr data-dcnode-id="293"><span data-dcnode-id="292" instrument_node="">
</span><h3 data-dcnode-id="289"><span data-dcnode-id="290" style="color: #800000"><span data-dcnode-id="291" instrument_node="">Beginnings:</span></span></h3><span data-dcnode-id="288" instrument_node="">
</span><p data-dcnode-id="283"><span data-dcnode-id="287" instrument_node="">William Morris was born into a well-off family on March 24, 1834, at </span><em data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">Elm House</span></em><span data-dcnode-id="284" instrument_node="">, Walthamstow, England.</span></p><span data-dcnode-id="282" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="278" id="attachment_70" style="width: 510px"><img alt="Water House, William Morris’ boyhood home which has housed the William Morris Gallery since 1950. Image courtesy of “Keep Our Museums Open” www.keepourmuseumsopen.org.uk" class="size-full wp-image-70" data-dcnode-id="281" height="335" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//william-morris.com/files/2008/10/image0051.jpg&amp;raw" srcset="http://william-morris.com/files/2008/10/image0051.jpg 576w, http://william-morris.com/files/2008/10/image0051-300x201.jpg 300w" title="image005" width="500"><p class="wp-caption-text" data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">Water House, William Morris’ boyhood home which has housed the William Morris Gallery since 1950. Image courtesy of “Keep Our Museums Open” www.keepourmuseumsopen.org.uk</span></p></div><span data-dcnode-id="277" instrument_node="">
</span><p data-dcnode-id="266"><span data-dcnode-id="276" instrument_node="">In September 1848 The Morris family moved to&nbsp;</span><em data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">Water House</span></em><span data-dcnode-id="273" instrument_node="">, in what is now Forest Road, Walthamstow, Essex. Since 1950 </span><em data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">Water House</span></em><span data-dcnode-id="270" instrument_node=""> has housed the </span><em data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">William Morris Gallery</span></em><span data-dcnode-id="267" instrument_node="">.</span></p><span data-dcnode-id="265" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="261" id="attachment_71" style="width: 307px"><img alt="Morris as a young man" class="size-full wp-image-71" data-dcnode-id="264" height="359" sizes="(max-width: 297px) 100vw, 297px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//william-morris.com/files/2008/10/image00611.png&amp;raw" srcset="http://william-morris.com/files/2008/10/image00611.png 297w, http://william-morris.com/files/2008/10/image00611-248x300.png 248w" title="image0061" width="297"><p class="wp-caption-text" data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">Morris as a young man</span></p></div><span data-dcnode-id="260" instrument_node="">
</span><h3 data-dcnode-id="257"><span data-dcnode-id="258" style="color: #800000"><span data-dcnode-id="259" instrument_node="">Meeting Edward Burne-Jones and Dante Gabriel Rosetti</span></span></h3><span data-dcnode-id="256" instrument_node="">
</span><p data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">In January 1853 Morris went to Exeter College, Oxford, to study theology. He met Edward Burne-Jones who became a life-long friend and design collaborator in many design projects.</span></p><span data-dcnode-id="253" instrument_node="">
</span><p data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">The two of them, with another friend, traveled in 1855 to France visiting cathedrals and enjoying French life.</span></p><span data-dcnode-id="250" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="246" id="attachment_72" style="width: 510px"><img alt="17 Red Lion Square, London, where William Morris lived as a young man with his friend Edward Burne-Jones from 1856 to 1859. Their house was the left of the pair of houses seen in the picture." class="size-full wp-image-72" data-dcnode-id="249" height="482" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//william-morris.com/files/2008/10/image0091.jpg&amp;raw" srcset="http://william-morris.com/files/2008/10/image0091.jpg 521w, http://william-morris.com/files/2008/10/image0091-300x290.jpg 300w" title="image009" width="500"><p class="wp-caption-text" data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">17 Red Lion Square, London, where William Morris lived as a young man with his friend Edward Burne-Jones from 1856 to 1859. Their house was the left of the pair of houses seen in the picture.</span></p></div><span data-dcnode-id="245" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="241" id="attachment_73" style="width: 510px"><img alt="In November of 1856 Morris and Burne-Jones moved to three unfurnished rooms on the first floor of 17 Red Lion Square. Morris occupied the small room at the rear of the building." class="size-full wp-image-73" data-dcnode-id="244" height="380" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//william-morris.com/files/2008/10/image0111.jpg&amp;raw" srcset="http://william-morris.com/files/2008/10/image0111.jpg 569w, http://william-morris.com/files/2008/10/image0111-300x228.jpg 300w" title="image011" width="500"><p class="wp-caption-text" data-dcnode-id="242"><span data-dcnode-id="243" instrument_node="">In November of 1856 Morris and Burne-Jones moved to three unfurnished rooms on the first floor of 17 Red Lion Square. Morris occupied the small room at the rear of the building.</span></p></div><span data-dcnode-id="240" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="236" id="attachment_74" style="width: 295px"><img alt="William Morris and Edward Burne-Jones" class="size-full wp-image-74" data-dcnode-id="239" height="387" sizes="(max-width: 285px) 100vw, 285px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//william-morris.com/files/2008/10/image01311.jpg&amp;raw" srcset="http://william-morris.com/files/2008/10/image01311.jpg 285w, http://william-morris.com/files/2008/10/image01311-221x300.jpg 221w" title="image0131" width="285"><p class="wp-caption-text" data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">William Morris and Edward Burne-Jones</span></p></div><span data-dcnode-id="235" instrument_node="">
</span><p data-dcnode-id="230"><span data-dcnode-id="234" instrument_node="">Dante Gabriel Rossetti had occupied the same rooms in the days of the </span><em data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">Pre-Raphaelite Brotherhood</span></em><span data-dcnode-id="231" instrument_node="">. Morris and Burne-Jones later designed – and had made – their own furniture for their lodgings. This endeavor presaged the two friends’ later collaborations.</span></p><span data-dcnode-id="229" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="225" id="attachment_75" style="width: 223px"><img alt="Daniel Gabriel Rosetti" class="size-full wp-image-75" data-dcnode-id="228" height="276" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//william-morris.com/files/2008/10/image0141.jpg&amp;raw" title="image014" width="213"><p class="wp-caption-text" data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">Daniel Gabriel Rosetti</span></p></div><span data-dcnode-id="224" instrument_node="">
</span><p data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">Shortly after they moved in Rossetti wrote:</span></p><span data-dcnode-id="221" instrument_node="">
</span><blockquote data-dcnode-id="215"><span data-dcnode-id="220" instrument_node="">
</span><p data-dcnode-id="217" style="text-align: left"><em data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">“Morris is rather doing the magnificent there, and is having some intensely medieval furniture made – tables and chairs like incubi and succubi. He and I have painted the back of a chair with figures and inscriptions in gules and vert and azure, and we are all three going to cover a cabinet with pictures.”</span></em></p><span data-dcnode-id="216" instrument_node="">
</span></blockquote><span data-dcnode-id="214" instrument_node="">
</span><p data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">Burne-Jones wrote (in November):</span></p><span data-dcnode-id="211" instrument_node="">
</span><blockquote data-dcnode-id="203"><span data-dcnode-id="210" instrument_node="">
</span><p data-dcnode-id="207" style="text-align: left"><em data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">“Topsy [Morris] has had some furniture (chairs and table) made after his own design; they are as beautiful as medieval work, and when we have painted designs of knights and ladies upon them they will be perfect marvels.”</span></em></p><span data-dcnode-id="206" instrument_node="">
</span><p data-dcnode-id="204" style="text-align: left"><span data-dcnode-id="205" instrument_node="">
</span></p></blockquote><span data-dcnode-id="202" instrument_node="">
</span><h3 data-dcnode-id="199"><span data-dcnode-id="200" style="color: #800000"><span data-dcnode-id="201" instrument_node="">Marrying Jane Burden</span></span></h3><span data-dcnode-id="198" instrument_node="">
</span><p data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">In 1858, Morris proposed to Jane Burden, the daughter of a local stableman, They married on April 26, 1859 and embarked on a six week honeymoon. At the time of their marriage, Morris was living at 13 George Street.</span></p><span data-dcnode-id="195" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="190" id="attachment_77" style="width: 226px"><a data-dcnode-id="193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//william-morris.com/files/2008/10/image0161.png" rel="lightbox[67]"><img alt="Jane Morris (nee Burden)" class="size-full wp-image-77" data-dcnode-id="194" height="274" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//william-morris.com/files/2008/10/image0161.png&amp;raw" width="216"></a><p class="wp-caption-text" data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">Jane Morris (nee Burden)</span></p></div><span data-dcnode-id="189" instrument_node="">
</span><h3 data-dcnode-id="186"><span data-dcnode-id="187" style="color: #800000"><span data-dcnode-id="188" instrument_node="">Red House</span></span></h3><span data-dcnode-id="185" instrument_node="">
</span><p data-dcnode-id="180"><span data-dcnode-id="184" instrument_node="">In 1859, Phillip Webb, friend and architect designed </span><em data-dcnode-id="182"><span data-dcnode-id="183" instrument_node="">Red House</span></em><span data-dcnode-id="181" instrument_node=""> for the Morris family. They moved into the house at Bexleyheath, Kent in June of 1860. Only ten miles from London, the house was built on an acre in a rural setting, and cost £ 4,000. to build.</span></p><span data-dcnode-id="179" instrument_node="">
</span><p data-dcnode-id="175"><em data-dcnode-id="177"><span data-dcnode-id="178" instrument_node="">Red House</span></em><span data-dcnode-id="176" instrument_node="">, due to its innovative design, became a starting point for the Arts &amp; Crafts movement in England.</span></p><span data-dcnode-id="174" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="168" id="attachment_78" style="width: 510px"><img alt="Red House. Entering from the drive." class="size-full wp-image-78" data-dcnode-id="173" height="375" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//william-morris.com/files/2008/10/image01811.jpg&amp;raw" srcset="http://william-morris.com/files/2008/10/image01811.jpg 569w, http://william-morris.com/files/2008/10/image01811-300x225.jpg 300w" title="image0181" width="500"><p class="wp-caption-text" data-dcnode-id="169"><em data-dcnode-id="171"><span data-dcnode-id="172" instrument_node="">Red House</span></em><span data-dcnode-id="170" instrument_node="">. Entering from the drive.</span></p></div><span data-dcnode-id="167" instrument_node="">
</span><p data-dcnode-id="161"><img alt="The front door at Red House.  Over the door is a painted Latin inscription:“Dominus custodiat exitum tuum et introitum tuum&quot; which is a verse from the Psalms 128:8.  It translates as follows: The Lord shall preserve thy going out and thy coming in." class="size-full wp-image-79 aligncenter" data-dcnode-id="166" height="375" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//william-morris.com/files/2008/10/image02011.jpg&amp;raw" srcset="http://william-morris.com/files/2008/10/image02011.jpg 569w, http://william-morris.com/files/2008/10/image02011-300x225.jpg 300w" title="image0201" width="500"><br data-dcnode-id="165"><span data-dcnode-id="164" instrument_node="">
</span><em data-dcnode-id="162"><span data-dcnode-id="163" instrument_node="">The front door at Red House. Over the door is a painted Latin inscription: “Dominus custodiat exitum tuum et introitum tuum” &nbsp;which is a verse from the Psalms 128:8. It translates as follows: The Lord shall preserve thy going out and thy coming in.</span></em></p><span data-dcnode-id="160" instrument_node="">
</span><p data-dcnode-id="155"><span data-dcnode-id="159" instrument_node="">The few years that the Morris’ lived at&nbsp;</span><em data-dcnode-id="157"><span data-dcnode-id="158" instrument_node="">Red House</span></em><span data-dcnode-id="156" instrument_node="">&nbsp;were busy and productive. It was the time for the cooperation of friends in what became one of the major and most influential design firms in the world.</span></p><span data-dcnode-id="154" instrument_node="">
</span><h3 data-dcnode-id="151"><span data-dcnode-id="152" style="color: #993300"><span data-dcnode-id="153" instrument_node="">Morris, Marshall, Faulkner &amp; Co.</span></span></h3><span data-dcnode-id="150" instrument_node="">
</span><p data-dcnode-id="148"><span data-dcnode-id="149" instrument_node="">In January of 1861, Rossetti wrote to William Allingham:</span></p><span data-dcnode-id="147" instrument_node="">
</span><blockquote data-dcnode-id="141"><span data-dcnode-id="146" instrument_node="">
</span><p data-dcnode-id="143" style="text-align: left"><em data-dcnode-id="144"><span data-dcnode-id="145" instrument_node="">“We are organising … a company for the production of furniture and decoration of all kinds, for the sale of which we are going to open an actual shop! The men concerned are Madox Brown, Jones, Topsy [William Morris], Webb (the architect of T[opsy]’s house), P P Marshall, Faulkner, and myself…. We expect to start in some shape about May or June, but not to go to any expense in premises at first.”</span></em></p><span data-dcnode-id="142" instrument_node="">
</span></blockquote><span data-dcnode-id="140" instrument_node="">
</span><p data-dcnode-id="135"><span data-dcnode-id="139" instrument_node="">Burne-Jones, in Mackail’s </span><em data-dcnode-id="137"><span data-dcnode-id="138" instrument_node="">Notebooks</span></em><span data-dcnode-id="136" instrument_node="">, is recorded as saying</span></p><span data-dcnode-id="134" instrument_node="">
</span><blockquote data-dcnode-id="128"><span data-dcnode-id="133" instrument_node="">
</span><p data-dcnode-id="130" style="text-align: left"><em data-dcnode-id="131"><span data-dcnode-id="132" instrument_node="">“It was DGR’s [Rosetti’s] idea; he saw money in it.”</span></em></p><span data-dcnode-id="129" instrument_node="">
</span></blockquote><span data-dcnode-id="127" instrument_node="">
</span><p data-dcnode-id="122"><span data-dcnode-id="126" instrument_node="">On April 11, 1861 </span><em data-dcnode-id="124"><span data-dcnode-id="125" instrument_node="">Morris, Marshall, Faulkner &amp; Co.</span></em><span data-dcnode-id="123" instrument_node=""> opened for business.</span></p><span data-dcnode-id="121" instrument_node="">
</span><p data-dcnode-id="116"><span data-dcnode-id="120" instrument_node="">In 1862 The Firm took two stands at the International Exhibition held at the South Kensington Museum. They exhibited stained-glass at one stand, and furniture, tapestries and embroideries at the other, in </span><em data-dcnode-id="118"><span data-dcnode-id="119" instrument_node="">“the style of the Middle Ages”</span></em><span data-dcnode-id="117" instrument_node="">, a harbinger for the direction of the future direction of the Firm</span></p><span data-dcnode-id="115" instrument_node="">
</span><p data-dcnode-id="107"><span data-dcnode-id="114" instrument_node="">By early 1864 Morris’ contribution and leadership was becoming evident. He was suggesting that the Firm could move from Red Lion Square to&nbsp;</span><em data-dcnode-id="112"><span data-dcnode-id="113" instrument_node="">Red House</span></em><span data-dcnode-id="111" instrument_node="">. He also planned to build an extension to </span><em data-dcnode-id="109"><span data-dcnode-id="110" instrument_node="">Red House</span></em><span data-dcnode-id="108" instrument_node=""> for the Burne-Joneses to live in.</span></p><span data-dcnode-id="106" instrument_node="">
</span><h3 data-dcnode-id="103"><span data-dcnode-id="104" style="color: #993300"><span data-dcnode-id="105" instrument_node="">The First Wallpapers</span></span></h3><span data-dcnode-id="102" instrument_node="">
</span><p data-dcnode-id="88"><span data-dcnode-id="101" instrument_node="">Shortly afterwards, in February of 1864, the designs for the first Morris wallpapers were registered. </span><em data-dcnode-id="99"><span data-dcnode-id="100" instrument_node="">Trellis</span></em><span data-dcnode-id="98" instrument_node="">&nbsp;was based on the rose trellis at </span><em data-dcnode-id="96"><span data-dcnode-id="97" instrument_node="">Red House</span></em><span data-dcnode-id="95" instrument_node="">, with Burne-Jones supplying the drawings for the birds, and </span><em data-dcnode-id="93"><span data-dcnode-id="94" instrument_node="">Daisy</span></em><span data-dcnode-id="92" instrument_node="">, undoubtedly influenced by the flowers in the surrounding fields. </span><em data-dcnode-id="90"><span data-dcnode-id="91" instrument_node="">Jeffery &amp; Co.</span></em><span data-dcnode-id="89" instrument_node="">&nbsp;of Islington in London were contracted to print these wallpapers.</span></p><span data-dcnode-id="87" instrument_node="">
</span><span data-dcnode-id="84" instrument_node="">
</span><div class="gallery galleryid-67 gallery-columns-2 gallery-size-medium" data-dcnode-id="63" id="gallery-1"><dl class="gallery-item" data-dcnode-id="75"><span data-dcnode-id="83" instrument_node="">
</span><dt class="gallery-icon portrait" data-dcnode-id="79"><span data-dcnode-id="82" instrument_node="">
</span><img alt="" aria-describedby="gallery-1-82" class="attachment-medium size-medium" data-dcnode-id="81" height="300" sizes="(max-width: 244px) 100vw, 244px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//william-morris.com/files/2008/10/image0231-244x300.png&amp;raw" srcset="http://william-morris.com/files/2008/10/image0231-244x300.png 244w, http://william-morris.com/files/2008/10/image0231.png 370w" width="244"><span data-dcnode-id="80" instrument_node="">
</span></dt><span data-dcnode-id="78" instrument_node="">
</span><dd class="wp-caption-text gallery-caption" data-dcnode-id="76" id="gallery-1-82"><span data-dcnode-id="77" instrument_node="">
				Daisy wallpaper Detail 1864
				</span></dd></dl><dl class="gallery-item" data-dcnode-id="66"><span data-dcnode-id="74" instrument_node="">

</span></div><span data-dcnode-id="62" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="56" id="attachment_83" style="width: 510px"><img alt="Red House. The rear garden with the well, designed by Philip Webb in 1859 as part of the overall design. Now owned by The National Trust, Red House is being restored, and is open for visiting." class="size-full wp-image-83" data-dcnode-id="61" height="376" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//william-morris.com/files/2008/10/image02611.jpg&amp;raw" srcset="http://william-morris.com/files/2008/10/image02611.jpg 557w, http://william-morris.com/files/2008/10/image02611-300x226.jpg 300w" title="image0261" width="500"><p class="wp-caption-text" data-dcnode-id="57"><em data-dcnode-id="59"><span data-dcnode-id="60" instrument_node="">Red House.</span></em><span data-dcnode-id="58" instrument_node=""> The rear garden with the well, designed by Philip Webb in 1859 as part of the overall design.</span></p></div><span data-dcnode-id="55" instrument_node="">
</span><p data-dcnode-id="44"><span data-dcnode-id="45" style="color: #000000"><em data-dcnode-id="53"><span data-dcnode-id="54" instrument_node="">Red House</span></em><span data-dcnode-id="52" instrument_node=""> is now owned by </span><em data-dcnode-id="50"><span data-dcnode-id="51" instrument_node="">The National Trust.&nbsp;</span></em><span data-dcnode-id="49" instrument_node="">&nbsp;</span><em data-dcnode-id="47"><span data-dcnode-id="48" instrument_node="">Red House</span></em><span data-dcnode-id="46" instrument_node=""> is being restored, and is open for visiting.</span></span></p><span data-dcnode-id="43" instrument_node="">
