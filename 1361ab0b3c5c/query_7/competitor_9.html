ht" data-dcnode-id="1287"></i></span><a data-dcnode-id="1284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecollector.com/art/"><span data-dcnode-id="1285" instrument_node="">Art</span></a><span class="arrowc" data-dcnode-id="1282"><i class="fas fa-angle-right" data-dcnode-id="1283"></i></span><a class="btitle" data-dcnode-id="1280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecollector.com/industrial-revolution-arts-and-crafts/"><span data-dcnode-id="1281" instrument_node="">The Effects Of The Industrial Revolution vs. Arts &amp; Crafts Movement</span></a></div></div><div class="container" data-dcnode-id="226"><div data-dcnode-id="227"><div class="article-head" data-dcnode-id="228"><div data-dcnode-id="229"><div class="row pt-4 pb-4" data-dcnode-id="230"><div class="col article-col" data-dcnode-id="288"><div class="row" data-dcnode-id="1258"><div class="col-md-12 pb-3 align-self-center" data-dcnode-id="1260"><h1 class="display-4 secondfont mb-3" data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">The Effects Of The Industrial Revolution vs. Arts &amp; Crafts Movement</span></h1><p class="mb-3" data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">The significant technological advancements of the Industrial Revolution changed production in Europe and North America. Find out how Arts and Crafts artists faced the competition of mass production with craftsmanship.</span></p><div class="author-top" data-dcnode-id="1261"><span data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">Jul 24, 2020</span></span><span data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node=""> • </span></span><span data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">By </span></span><a data-dcnode-id="1266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecollector.com/author/mariemadeleinerenauld/"><span data-dcnode-id="1267" instrument_node="">Marie-Madeleine Renauld</span></a><span class="education" data-dcnode-id="1262"><span data-dcnode-id="1265" instrument_node="">, </span><span data-dcnode-id="1263" instrument_node="">MA &amp; BA Art History and Archaeology</span></span></div></div><div class="col-md-12 d-md-block" data-dcnode-id="1259"></div></div><article class="article-post" data-dcnode-id="421"><figure aria-describedby="caption-attachment-28799" class="figure" data-dcnode-id="1242" id="attachment_28799" style="margin:0 0 1rem 0"><center data-dcnode-id="1254"><span data-dcnode-id="1255" style="box-sizing:border-box;display:block;overflow:hidden;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;position:relative"><span data-dcnode-id="1257" style="box-sizing:border-box;display:block;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;padding-top:57.49999999999999%"></span><img alt="william morris strawberry thief" class="figure-img img-fluid" data-dcnode-id="1256" data-nimg="responsive" decoding="async" sizes="(max-width: 992px) 100vw, 66vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.thecollector.com/wp-content/uploads/2020/07/william-morris-strawberry-thief-fabric-industrial-revolution.jpg%3Fwidth%3D1400%26quality%3D70&amp;raw" srcset="https://cdn.thecollector.com/wp-content/uploads/2020/07/william-morris-strawberry-thief-fabric-industrial-revolution.jpg?width=480&amp;quality=70 480w, https://cdn.thecollector.com/wp-content/uploads/2020/07/william-morris-strawberry-thief-fabric-industrial-revolution.jpg?width=600&amp;quality=70 600w, https://cdn.thecollector.com/wp-content/uploads/2020/07/william-morris-strawberry-thief-fabric-industrial-revolution.jpg?width=640&amp;quality=70 640w, https://cdn.thecollector.com/wp-content/uploads/2020/07/william-morris-strawberry-thief-fabric-industrial-revolution.jpg?width=750&amp;quality=70 750w, https://cdn.thecollector.com/wp-content/uploads/2020/07/william-morris-strawberry-thief-fabric-industrial-revolution.jpg?width=828&amp;quality=70 828w, https://cdn.thecollector.com/wp-content/uploads/2020/07/william-morris-strawberry-thief-fabric-industrial-revolution.jpg?width=1080&amp;quality=70 1080w, https://cdn.thecollector.com/wp-content/uploads/2020/07/william-morris-strawberry-thief-fabric-industrial-revolution.jpg?width=1200&amp;quality=70 1200w, https://cdn.thecollector.com/wp-content/uploads/2020/07/william-morris-strawberry-thief-fabric-industrial-revolution.jpg?width=1400&amp;quality=70 1400w" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%"></span></center><figcaption class="figure-caption" data-dcnode-id="1243" id="caption-attachment-28799"><span data-dcnode-id="1252" style="font-weight:400"><span data-dcnode-id="1253" instrument_node="">Close-up of </span></span><a data-dcnode-id="1246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//collections.vam.ac.uk/item/O78889/strawberry-thief-furnishing-fabric-morris-william/"><i data-dcnode-id="1249"><span data-dcnode-id="1250" style="font-weight:400"><span data-dcnode-id="1251" instrument_node="">Strawberry Thief</span></span></i><span data-dcnode-id="1247" style="font-weight:400"><span data-dcnode-id="1248" instrument_node=""> by William Morris</span></span></a><span data-dcnode-id="1244" style="font-weight:400"><span data-dcnode-id="1245" instrument_node="">, 1883, via Victoria &amp; Albert Museum, London</span></span></figcaption></figure><span data-dcnode-id="1241" instrument_node="">
</span><p class="firstL" data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1238" instrument_node="">
</span><p data-dcnode-id="1232"><a data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/industrial-revolution"><span data-dcnode-id="1236" style="font-weight:400"><span data-dcnode-id="1237" instrument_node="">The Industrial Revolution</span></span></a><span data-dcnode-id="1233" style="font-weight:400"><span data-dcnode-id="1234" instrument_node=""> (also called the First Industrial Revolution) took off at the end of the 18th century and expanded during the 19th century into a second Industrial Revolution in Europe and North America. It was a time of transition marked by significant changes in society and industry. With technological and scientific advancements and new materials available, machines progressively replaced men in factories. It was possible to produce faster and cheaper merchandise, leading to mass production. These changes caused considerable questioning in art. What was the place of the artist or the craftsman if machines replaced them? The Arts and Crafts is an artistic movement that developed from these interrogations.</span></span></p><span data-dcnode-id="1231" instrument_node="">

</span><div data-dcnode-id="932"><center data-dcnode-id="936"><div class="collector-adthrive-contentads" data-dcnode-id="937"></div></center><h2 data-dcnode-id="933" style="padding-top:20px;padding-bottom:30px"><b data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">The Industrial Revolution And Architectural Advancement</span></b></h2></div><span data-dcnode-id="931" instrument_node="">
</span><figure aria-describedby="caption-attachment-28787" class="figure" data-dcnode-id="914" id="attachment_28787" style="margin:0 0 1rem 0"><center data-dcnode-id="924"><span data-dcnode-id="925" style="box-sizing:border-box;display:inline-block;overflow:hidden;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;position:relative;max-width:100%"><span data-dcnode-id="929" style="box-sizing:border-box;display:block;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;max-width:100%"><img alt="" aria-hidden="true" data-dcnode-id="930" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTIwMCIgaGVpZ2h0PSI2MTciIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyIgdmVyc2lvbj0iMS4xIi8+" style="display:block;max-width:100%;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0"></span><img alt="iron bridge abraham darby" class="figure-img img-fluid" data-dcnode-id="928" data-nimg="intrinsic" decoding="async" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.thecollector.com/wp-content/uploads/2020/07/abraham-darby-iron-bridge-photo.jpg%3Fwidth%3D1400%26quality%3D55&amp;raw" srcset="https://cdn.thecollector.com/wp-content/uploads/2020/07/abraham-darby-iron-bridge-photo.jpg?width=1200&amp;quality=55 1x, https://cdn.thecollector.com/wp-content/uploads/2020/07/abraham-darby-iron-bridge-photo.jpg?width=1400&amp;quality=55 2x" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%"><noscript data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">&lt;img alt="iron bridge abraham darby" srcSet="https://cdn.thecollector.com/wp-content/uploads/2020/07/abraham-darby-iron-bridge-photo.jpg?width=1200&amp;amp;quality=55 1x, https://cdn.thecollector.com/wp-content/uploads/2020/07/abraham-darby-iron-bridge-photo.jpg?width=1400&amp;amp;quality=55 2x" class="figure-img img-fluid" src="https://cdn.thecollector.com/wp-content/uploads/2020/07/abraham-darby-iron-bridge-photo.jpg?width=1400&amp;amp;quality=55" decoding="async" data-nimg="intrinsic" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%" loading="lazy"/&gt;</span></noscript></span></center><figcaption class="figure-caption" data-dcnode-id="915" id="caption-attachment-28787"><a data-dcnode-id="918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.historic-uk.com/HistoryMagazine/DestinationsUK/Ironbridge/" rel="noopener noreferrer" target="_blank"><i data-dcnode-id="921"><span data-dcnode-id="922" style="font-weight:400"><span data-dcnode-id="923" instrument_node="">The Iron Bridge</span></span></i><span data-dcnode-id="919" style="font-weight:400"><span data-dcnode-id="920" instrument_node=""> by Abraham Darby III</span></span></a><span data-dcnode-id="916" style="font-weight:400"><span data-dcnode-id="917" instrument_node="">, 1779, via Historic UK</span></span></figcaption></figure><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">&nbsp;</span></p><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="907"><span data-dcnode-id="908" style="font-weight:400"><span data-dcnode-id="909" instrument_node="">Important 19th-century inventions such as the train or the telephone enabled a faster lifestyle. The technological changes induced by the Industrial Revolution also brought novelty to 19th-century architecture with increased iron production. It made it possible to build in a new way. Until then, monuments were built in stone, wood, or bricks. Yet, with the help of steam and water power engines, industries produced glass and iron at a large scale. These new materials contributed to raising higher and lighter buildings and to developing new architectural forms.</span></span></p><span data-dcnode-id="906" instrument_node="">
</span><p data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">&nbsp;</span></p><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="895"><span data-dcnode-id="901" style="font-weight:400"><span data-dcnode-id="902" instrument_node="">Architects initially used iron to strengthen walls and roofs, however always hidden inside stonework. The world’s first example of visible iron architecture is the </span></span><a data-dcnode-id="898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ironbridge.org.uk/our-story/the-iron-bridge/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="899" style="font-weight:400"><span data-dcnode-id="900" instrument_node="">Iron Bridge</span></span></a><span data-dcnode-id="896" style="font-weight:400"><span data-dcnode-id="897" instrument_node=""> built in Shropshire, England, in 1779, by architect Thomas Farnolls Pritchard and ironmaster Abraham Darby.&nbsp;</span></span></p><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">&nbsp;</span></p><span data-dcnode-id="891" instrument_node="">
</span><figure aria-describedby="caption-attachment-28794" class="figure" data-dcnode-id="874" id="attachment_28794" style="margin:0 0 1rem 0"><center data-dcnode-id="884"><span data-dcnode-id="885" style="box-sizing:border-box;display:inline-block;overflow:hidden;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;position:relative;max-width:100%"><span data-dcnode-id="889" style="box-sizing:border-box;display:block;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;max-width:100%"><img alt="" aria-hidden="true" data-dcnode-id="890" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTIwMCIgaGVpZ2h0PSI2NDkiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyIgdmVyc2lvbj0iMS4xIi8+" style="display:block;max-width:100%;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0"></span><img alt="crystal palace joseph paxton" class="figure-img img-fluid" data-dcnode-id="888" data-nimg="intrinsic" decoding="async" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.thecollector.com/wp-content/uploads/2020/07/joseph-paxton-crystal-palace-engraving.jpg%3Fwidth%3D1400%26quality%3D55&amp;raw" srcset="https://cdn.thecollector.com/wp-content/uploads/2020/07/joseph-paxton-crystal-palace-engraving.jpg?width=1200&amp;quality=55 1x, https://cdn.thecollector.com/wp-content/uploads/2020/07/joseph-paxton-crystal-palace-engraving.jpg?width=1400&amp;quality=55 2x" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%"><noscript data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">&lt;img alt="crystal palace joseph paxton" srcSet="https://cdn.thecollector.com/wp-content/uploads/2020/07/joseph-paxton-crystal-palace-engraving.jpg?width=1200&amp;amp;quality=55 1x, https://cdn.thecollector.com/wp-content/uploads/2020/07/joseph-paxton-crystal-palace-engraving.jpg?width=1400&amp;amp;quality=55 2x" class="figure-img img-fluid" src="https://cdn.thecollector.com/wp-content/uploads/2020/07/joseph-paxton-crystal-palace-engraving.jpg?width=1400&amp;amp;quality=55" decoding="async" data-nimg="intrinsic" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%" loading="lazy"/&gt;</span></noscript></span></center><figcaption class="figure-caption" data-dcnode-id="875" id="caption-attachment-28794"><a data-dcnode-id="878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//archive.org/stream/Dickinsonscompr1%23page/n19/mode/2up" rel="noopener noreferrer" target="_blank"><i data-dcnode-id="881"><span data-dcnode-id="882" style="font-weight:400"><span data-dcnode-id="883" instrument_node="">The Crystal Palace</span></span></i><span data-dcnode-id="879" style="font-weight:400"><span data-dcnode-id="880" instrument_node=""> by Joseph Paxton</span></span></a><span data-dcnode-id="876" style="font-weight:400"><span data-dcnode-id="877" instrument_node="">, 1851, via archive.org</span></span></figcaption></figure><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">&nbsp;</span></p><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="859"><span data-dcnode-id="868" style="font-weight:400"><span data-dcnode-id="869" instrument_node="">Later, the use of iron became increasingly common in architecture. Train stations, bridges, factories, featured iron and glass structures. The </span></span><a data-dcnode-id="865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.seymourlerhn.com/royalparks/greatexhibition/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="866" style="font-weight:400"><span data-dcnode-id="867" instrument_node="">Crystal Palace</span></span></a><span data-dcnode-id="863" style="font-weight:400"><span data-dcnode-id="864" instrument_node="">, built in Hyde Park for the 1851 Great Exhibition in London, is probably one of the best-known examples of Industrial Revolution architecture. The Crystal Palace’s scope was mainly symbolic, built halfway through the century of the Industrial Revolution. The Great Exhibition drew millions of visitors from all over the world who could admire the endless possibilities of glass and iron architecture.</span></span><span data-dcnode-id="862" instrument_node=""> </span><span data-dcnode-id="860" style="font-weight:400"><span data-dcnode-id="861" instrument_node="">The palace, designed by Joseph Paxton, displayed the finest inventions of the Industrial Revolution for several months.</span></span></p><span data-dcnode-id="858" instrument_node="">
</span><div data-dcnode-id="805"><div class="CTA" data-dcnode-id="808" id="testid" style="margin-bottom:20px"><div class="container" data-dcnode-id="809"><div class="row justify-content-between" data-dcnode-id="810"><div class="col-md-6 mb-2 mb-md-0 CTA-text" data-dcnode-id="853"><h3 class="secondfont" data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Are you enjoying this article?</span></h3><span data-dcnode-id="854"><span data-dcnode-id="855" instrument_node=""> Sign up to our Free Weekly Newsletter</span></span></div><div class="col-md-6 CTA-input" data-dcnode-id="817"><div data-dcnode-id="818"><div class="ml-form-embedContainer ml-subscribe-form ml-subscribe-form-4044109" data-dcnode-id="819" id="mlb2-4044109"><div data-dcnode-id="820"><div class="ml-form-embedWrapper embedForm" data-dcnode-id="821"><div class="ml-form-embedBody ml-form-embedBodyHorizontal row-form" data-dcnode-id="822"><div class="ml-form-embedContent" data-dcnode-id="852" style="margin-bottom:0px"></div><form action="https://static.mailerlite.com/webforms/submit/y7g7k4" class="ml-block-form" data-code="y7g7k4" data-dcnode-id="823" method="post" target="_blank"><div class="ml-form-formContent horozintalForm" data-dcnode-id="836"><div class="ml-form-horizontalRow" data-dcnode-id="837"><div class="ml-input-horizontal" data-dcnode-id="848"><div class="horizontal-fields" data-dcnode-id="849" style="width:100%"><div class="ml-field-group ml-field-email ml-validate-email ml-validate-required" data-dcnode-id="850"><input aria-invalid="false" autocomplete="email" class="form-control" data-dcnode-id="851" data-inputmask="" name="fields[email]" placeholder="Email Address" type="email"></div></div></div><div class="ml-button-horizontal primary" data-dcnode-id="838"><button class="primary" data-dcnode-id="846" type="submit"><span data-dcnode-id="847" instrument_node="">Join!</span></button><button class="loading" data-dcnode-id="839" disabled="" style="display:none" type="button"><span data-dcnode-id="845" instrument_node=""> </span><div class="ml-form-embedSubmitLoad" data-dcnode-id="844"></div><span data-dcnode-id="843" instrument_node=""> </span><span class="sr-only" data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Loading...</span></span><span data-dcnode-id="840" instrument_node=""> </span></button></div></div></div><input aria-invalid="false" data-dcnode-id="835" name="ml-submit" type="hidden" value="1"><div class="ml-mobileButton-horizontal" data-dcnode-id="825"><button class="primary" data-dcnode-id="833" type="submit"><span data-dcnode-id="834" instrument_node="">Join!</span></button><button class="loading" data-dcnode-id="826" disabled="" style="display:none" type="button"><span data-dcnode-id="832" instrument_node=""> </span><div class="ml-form-embedSubmitLoad" data-dcnode-id="831"></div><span data-dcnode-id="830" instrument_node=""> </span><span class="sr-only" data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Loading...</span></span><span data-dcnode-id="827" instrument_node=""> </span></button></div><input aria-invalid="false" data-dcnode-id="824" name="anticsrf" type="hidden" value="true"></form></div></div></div></div></div></div><div class="ml-form-successBody row-success col-md-12 text-center" data-dcnode-id="811" style="display:none"><div class="ml-form-successContent" data-dcnode-id="812"><h3 data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Please check your inbox to activate your subscription</span></h3><span data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Thank you!</span></span></div></div></div></div></div><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">&nbsp;</span></p></div><span data-dcnode-id="804" instrument_node="">
</span><h2 data-dcnode-id="801"><b data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">An Opposition Between Art And Industry</span></b></h2><span data-dcnode-id="800" instrument_node="">
</span><figure aria-describedby="caption-attachment-28795" class="figure" data-dcnode-id="783" id="attachment_28795" style="margin:0 0 1rem 0"><center data-dcnode-id="793"><span data-dcnode-id="794" style="box-sizing:border-box;display:inline-block;overflow:hidden;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;position:relative;max-width:100%"><span data-dcnode-id="798" style="box-sizing:border-box;display:block;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;max-width:100%"><img alt="" aria-hidden="true" data-dcnode-id="799" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTIwMCIgaGVpZ2h0PSI2NTgiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyIgdmVyc2lvbj0iMS4xIi8+" style="display:block;max-width:100%;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0"></span><img alt="south wales industrial landscape" class="figure-img img-fluid" data-dcnode-id="797" data-nimg="intrinsic" decoding="async" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.thecollector.com/wp-content/uploads/2020/07/penry-williams-south-wales-industrial-landscape.jpg%3Fwidth%3D1400%26quality%3D55&amp;raw" srcset="https://cdn.thecollector.com/wp-content/uploads/2020/07/penry-williams-south-wales-industrial-landscape.jpg?width=1200&amp;quality=55 1x, https://cdn.thecollector.com/wp-content/uploads/2020/07/penry-williams-south-wales-industrial-landscape.jpg?width=1400&amp;quality=55 2x" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%"><noscript data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">&lt;img alt="south wales industrial landscape" srcSet="https://cdn.thecollector.com/wp-content/uploads/2020/07/penry-williams-south-wales-industrial-landscape.jpg?width=1200&amp;amp;quality=55 1x, https://cdn.thecollector.com/wp-content/uploads/2020/07/penry-williams-south-wales-industrial-landscape.jpg?width=1400&amp;amp;quality=55 2x" class="figure-img img-fluid" src="https://cdn.thecollector.com/wp-content/uploads/2020/07/penry-williams-south-wales-industrial-landscape.jpg?width=1400&amp;amp;quality=55" decoding="async" data-nimg="intrinsic" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%" loading="lazy"/&gt;</span></noscript></span></center><figcaption class="figure-caption" data-dcnode-id="784" id="caption-attachment-28795"><a data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ageofrevolution.org/200-object/south-wales-industrial-landscape/" rel="noopener noreferrer" target="_blank"><i data-dcnode-id="790"><span data-dcnode-id="791" style="font-weight:400"><span data-dcnode-id="792" instrument_node="">South Wales Industrial Landscape</span></span></i><span data-dcnode-id="788" style="font-weight:400"><span data-dcnode-id="789" instrument_node=""> by Penry Williams</span></span></a><span data-dcnode-id="785" style="font-weight:400"><span data-dcnode-id="786" instrument_node="">, 1825, via The National Library of Wales</span></span></figcaption></figure><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">&nbsp;</span></p><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="777" style="font-weight:400"><span data-dcnode-id="778" instrument_node="">Yet, not all advances of the Industrial Revolution were favorable to society. Countries, </span></span><a data-dcnode-id="774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bl.uk/georgian-britain/articles/the-industrial-revolution" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="775" style="font-weight:400"><span data-dcnode-id="776" instrument_node="">once mainly rural and agriculture-driven, evolved into urban nations</span></span></a><span data-dcnode-id="772" style="font-weight:400"><span data-dcnode-id="773" instrument_node="">. Rural communities seemed then outdated. While cities developed, the growing number of charcoal fueled factories hissed heavy smoke in the air, deteriorating the atmosphere. Several people, including artists and architects, chose to escape busy cities to move to the countryside. The Cotswolds School gathered artists wanting to live a simpler life. They relocated to a rural location in the Cotswolds and used traditional furniture-making hand techniques in their workshops.</span></span></p><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">&nbsp;</span></p><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="764"><span data-dcnode-id="765" style="font-weight:400"><span data-dcnode-id="766" instrument_node="">Industrial progress went on. In 1845, T. B. Jordan invented the first wood-carving machine. Instead of long hours needed to carve decorative elements in wood, one man was enough to produce identical pieces of furniture quickly. This invention, and the use of low-cost materials, made it possible to manufacture cheaper furniture on a large scale. High-street shops displayed plenty of those ready-made furniture pieces, and custom-made production became scarce. As machines replaced men and handwork, the quality of craftsmanship and the decorative arts declined. Several skilled artisans lost their position.</span></span></p><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">&nbsp;</span></p><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="757"><span data-dcnode-id="758" style="font-weight:400"><span data-dcnode-id="759" instrument_node="">During the second half of the 19th-century, some leading British personalities rose against the impoverishment of craftsmanship. John Ruskin, a writer and art expert, and William Morris, a designer, poet, and novelist, criticized the low quality work produced by mechanized production. This resistance led to the birth of the Arts and Crafts movement.</span></span></p><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">&nbsp;</span></p><span data-dcnode-id="753" instrument_node="">
</span><div data-dcnode-id="747"><center data-dcnode-id="751"><div class="collector-adthrive-contentads" data-dcnode-id="752"></div></center><h2 data-dcnode-id="748" style="padding-top:20px;padding-bottom:30px"><b data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">The Arts And Crafts Movement: Origins And Characteristics</span></b></h2></div><span data-dcnode-id="746" instrument_node="">
</span><figure aria-describedby="caption-attachment-28789" class="figure" data-dcnode-id="729" id="attachment_28789" style="margin:0 0 1rem 0"><center data-dcnode-id="739"><span data-dcnode-id="740" style="box-sizing:border-box;display:inline-block;overflow:hidden;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;position:relative;max-width:100%"><span data-dcnode-id="744" style="box-sizing:border-box;display:block;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;max-width:100%"><img alt="" aria-hidden="true" data-dcnode-id="745" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTQ1MCIgaGVpZ2h0PSI4MDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyIgdmVyc2lvbj0iMS4xIi8+" style="display:block;max-width:100%;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0"></span><img alt="wightwick manor" class="figure-img img-fluid" data-dcnode-id="743" data-nimg="intrinsic" decoding="async" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.thecollector.com/wp-content/uploads/2020/07/edward-ould-wightwick-manor-interior.jpg%3Fwidth%3D1400%26quality%3D55&amp;raw" srcset="https://cdn.thecollector.com/wp-content/uploads/2020/07/edward-ould-wightwick-manor-interior.jpg?width=1400&amp;quality=55 1x" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%"><noscript data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">&lt;img alt="wightwick manor" srcSet="https://cdn.thecollector.com/wp-content/uploads/2020/07/edward-ould-wightwick-manor-interior.jpg?width=1400&amp;amp;quality=55 1x" class="figure-img img-fluid" src="https://cdn.thecollector.com/wp-content/uploads/2020/07/edward-ould-wightwick-manor-interior.jpg?width=1400&amp;amp;quality=55" decoding="async" data-nimg="intrinsic" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%" loading="lazy"/&gt;</span></noscript></span></center><figcaption class="figure-caption" data-dcnode-id="730" id="caption-attachment-28789"><a data-dcnode-id="733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nationaltrust.org.uk/wightwick-manor-and-gardens/features/special-interest-talks-in-2016" rel="noopener noreferrer" target="_blank"><i data-dcnode-id="736"><span data-dcnode-id="737" style="font-weight:400"><span data-dcnode-id="738" instrument_node="">Wightwick Manor</span></span></i><span data-dcnode-id="734" style="font-weight:400"><span data-dcnode-id="735" instrument_node=""> by Edward Ould</span></span></a><span data-dcnode-id="731" style="font-weight:400"><span data-dcnode-id="732" instrument_node="">, 1887-1893, via UK National Trust Images</span></span></figcaption></figure><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">&nbsp;</span></p><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="719"><a data-dcnode-id="722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vam.ac.uk/articles/arts-and-crafts-an-introduction" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="723" style="font-weight:400"><span data-dcnode-id="724" instrument_node="">The Arts and Crafts movement</span></span></a><span data-dcnode-id="720" style="font-weight:400"><span data-dcnode-id="721" instrument_node=""> developed in Britain in the 1860s onwards, and is named after the “Arts and Crafts Exhibition Society.” Created in 1887, the society aimed to promote handicrafts and the decorative arts. It encouraged handwork over industrial work.</span></span></p><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">&nbsp;</span></p><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="707"><span data-dcnode-id="713" style="font-weight:400"><span data-dcnode-id="714" instrument_node="">Arts and Crafts artists drew inspiration from medieval times, a time they believed to be an example for honest craftsmanship. They used and adapted </span></span><a data-dcnode-id="710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecollector.com/top-30-art-movements/"><span data-dcnode-id="711" style="font-weight:400"><span data-dcnode-id="712" instrument_node="">medieval decorative elements</span></span></a><span data-dcnode-id="708" style="font-weight:400"><span data-dcnode-id="709" instrument_node=""> to create not mere copies of older pieces, but simpler designs with modern lines. Geometrically shaped furniture pieces displayed little decorative elements. Mortise and tenon joineries that used to be hidden were now highlighted. Craftsman left tool marks in wood or stone, as proof of handwork. Some of the Arts and Crafts decorators were also architects, enabling them to have a global vision of their work.</span></span></p><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">&nbsp;</span></p><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="700"><span data-dcnode-id="701" style="font-weight:400"><span data-dcnode-id="702" instrument_node="">Other influences of the Arts and Crafts movement come from vernacular traditions and the import of wares from Asian countries. Japanese engravings served as wrapping paper and soon attracted the artists’ interest.</span></span></p><span data-dcnode-id="699" instrument_node="">
</span><p data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">&nbsp;</span></p><span data-dcnode-id="696" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="694" style="font-weight:400"><span data-dcnode-id="695" instrument_node="">Although originating from Britain, the Arts and Crafts influence widely spread across Europe and North America.</span></span></p><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">&nbsp;</span></p><span data-dcnode-id="689" instrument_node="">
</span><h2 data-dcnode-id="686"><b data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Arts And Crafts In Europe</span></b></h2><span data-dcnode-id="685" instrument_node="">
</span><figure aria-describedby="caption-attachment-28796" class="figure" data-dcnode-id="660" id="attachment_28796" style="margin:0 0 1rem 0"><center data-dcnode-id="678"><span data-dcnode-id="679" style="box-sizing:border-box;display:inline-block;overflow:hidden;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;position:relative;max-width:100%"><span data-dcnode-id="683" style="box-sizing:border-box;display:block;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;max-width:100%"><img alt="" aria-hidden="true" data-dcnode-id="684" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTI5NiIgaGVpZ2h0PSI4MDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyIgdmVyc2lvbj0iMS4xIi8+" style="display:block;max-width:100%;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0"></span><img alt="william morris ascanthus" class="figure-img img-fluid" data-dcnode-id="682" data-nimg="intrinsic" decoding="async" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%"><noscript data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">&lt;img alt="william morris ascanthus" srcSet="https://cdn.thecollector.com/wp-content/uploads/2020/07/william-morris-acanthus-wallpaper-sir-emery-walker.jpg?width=1400&amp;amp;quality=55 1x" class="figure-img img-fluid" src="https://cdn.thecollector.com/wp-content/uploads/2020/07/william-morris-acanthus-wallpaper-sir-emery-walker.jpg?width=1400&amp;amp;quality=55" decoding="async" data-nimg="intrinsic" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%" loading="lazy"/&gt;</span></noscript></span></center><figcaption class="figure-caption" data-dcnode-id="661" id="caption-attachment-28796"><a class="broken_link" data-dcnode-id="672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.npg.org.uk/collections/search/portrait/mw133948/William-Morris" rel="noopener noreferrer" target="_blank"><i data-dcnode-id="675"><span data-dcnode-id="676" style="font-weight:400"><span data-dcnode-id="677" instrument_node="">William Morris</span></span></i><span data-dcnode-id="673" style="font-weight:400"><span data-dcnode-id="674" instrument_node=""> by Sir Emery Walker</span></span></a><span data-dcnode-id="670" style="font-weight:400"><span data-dcnode-id="671" instrument_node="">, 1880, National Portrait Gallery London (left), with </span></span><a data-dcnode-id="664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//collections.vam.ac.uk/item/O119047/acanthus-wallpaper-morris-william/" rel="noopener noreferrer" target="_blank"><i data-dcnode-id="667"><span data-dcnode-id="668" style="font-weight:400"><span data-dcnode-id="669" instrument_node="">Acanthus wallpaper</span></span></i><span data-dcnode-id="665" style="font-weight:400"><span data-dcnode-id="666" instrument_node=""> by William Morris</span></span></a><span data-dcnode-id="662" style="font-weight:400"><span data-dcnode-id="663" instrument_node="">, 1875, Victoria &amp; Albert Museum London (right)</span></span></figcaption></figure><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="657" style="font-weight:400"><span data-dcnode-id="658" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="647"><span data-dcnode-id="653" style="font-weight:400"><span data-dcnode-id="654" instrument_node="">Considered today as the Father of the Arts and Crafts, </span></span><a data-dcnode-id="650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vam.ac.uk/articles/introducing-william-morris" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="651" style="font-weight:400"><span data-dcnode-id="652" instrument_node="">William Morris</span></span></a><span data-dcnode-id="648" style="font-weight:400"><span data-dcnode-id="649" instrument_node=""> contributed to the development of this new artistic movement in Britain. In 1861, William Morris and some friends founded the firm of Morris, Marshall, Faulkner &amp; Co. This firm produced high-quality, handmade furniture, textiles, books, and wallpapers. Its fabric and wallpaper designs are still well-known today. Morris emphasized the necessity to manufacture both useful and beautiful objects. Like other Arts and Crafts artists who were also architects, Morris created his designs as entities. It included objects, wallpapers, and pieces of furniture, as well as the architecture of the building itself.</span></span></p><span data-dcnode-id="646" instrument_node="">
</span><p data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">&nbsp;</span></p><span data-dcnode-id="643" instrument_node="">
</span><figure aria-describedby="caption-attachment-28798" class="figure" data-dcnode-id="626" id="attachment_28798" style="margin:0 0 1rem 0"><center data-dcnode-id="636"><span data-dcnode-id="637" style="box-sizing:border-box;display:inline-block;overflow:hidden;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;position:relative;max-width:100%"><span data-dcnode-id="641" style="box-sizing:border-box;display:block;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;max-width:100%"><img alt="" aria-hidden="true" data-dcnode-id="642" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTIwMCIgaGVpZ2h0PSI2NzUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyIgdmVyc2lvbj0iMS4xIi8+" style="display:block;max-width:100%;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0"></span><img alt="the red house william morris" class="figure-img img-fluid" data-dcnode-id="640" data-nimg="intrinsic" decoding="async" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%"><noscript data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">&lt;img alt="the red house william morris" srcSet="https://cdn.thecollector.com/wp-content/uploads/2020/07/william-morris-red-house-industrial-revolution.jpg?width=1200&amp;amp;quality=55 1x, https://cdn.thecollector.com/wp-content/uploads/2020/07/william-morris-red-house-industrial-revolution.jpg?width=1400&amp;amp;quality=55 2x" class="figure-img img-fluid" src="https://cdn.thecollector.com/wp-content/uploads/2020/07/william-morris-red-house-industrial-revolution.jpg?width=1400&amp;amp;quality=55" decoding="async" data-nimg="intrinsic" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%" loading="lazy"/&gt;</span></noscript></span></center><figcaption class="figure-caption" data-dcnode-id="627" id="caption-attachment-28798"><a data-dcnode-id="630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nationaltrustcollections.org.uk/place/red-house" rel="noopener noreferrer" target="_blank"><i data-dcnode-id="633"><span data-dcnode-id="634" style="font-weight:400"><span data-dcnode-id="635" instrument_node="">The Red House</span></span></i><span data-dcnode-id="631" style="font-weight:400"><span data-dcnode-id="632" instrument_node=""> by William Morris and Philip Webb</span></span></a><span data-dcnode-id="628" style="font-weight:400"><span data-dcnode-id="629" instrument_node="">, 1860, via UK National Trust Images</span></span></figcaption></figure><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">&nbsp;</span></p><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="619"><span data-dcnode-id="620" style="font-weight:400"><span data-dcnode-id="621" instrument_node="">In the late 1850s, William Morris and architect Philip Webb, his chief furniture designer, joined efforts to design the Red House. This Arts and Crafts family house located near London inspired future works. Morris used this project to develop and apply his theories to create suitable dwellings for the working class. Unlike gothic revival movement architects, he did not adopt medieval forms and ornaments to imitate the past but to serve the needs of his time. This rupture with the tradition constitutes a decisive revolution in the way architects and artists envisioned their work.</span></span></p><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">&nbsp;</span></p><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="612"><span data-dcnode-id="613" style="font-weight:400"><span data-dcnode-id="614" instrument_node="">British Arts and Crafts architects and designers gathered in societies like medieval craftsmen guilds. Arthur Heygate Mackmurdo created in 1883 the Century Guild of Artists, which inspired the creation of many others. The Art Workers’ Guild, for example, reunited architects, artists, and designers to elaborate unified ensembles.</span></span></p><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">&nbsp;</span></p><span data-dcnode-id="608" instrument_node="">
</span><figure aria-describedby="caption-attachment-28788" class="figure" data-dcnode-id="591" id="attachment_28788" style="margin:0 0 1rem 0"><center data-dcnode-id="601"><span data-dcnode-id="602" style="box-sizing:border-box;display:inline-block;overflow:hidden;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;position:relative;max-width:100%"><span data-dcnode-id="606" style="box-sizing:border-box;display:block;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;max-width:100%"><img alt="" aria-hidden="true" data-dcnode-id="607" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTIwMCIgaGVpZ2h0PSI4MDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyIgdmVyc2lvbj0iMS4xIi8+" style="display:block;max-width:100%;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0"></span><img alt="carl larsson house interior" class="figure-img img-fluid" data-dcnode-id="605" data-nimg="intrinsic" decoding="async" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%"><noscript data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">&lt;img alt="carl larsson house interior" srcSet="https://cdn.thecollector.com/wp-content/uploads/2020/07/carl-larsson-house-interior-industrial-revolution.jpg?width=1200&amp;amp;quality=55 1x, https://cdn.thecollector.com/wp-content/uploads/2020/07/carl-larsson-house-interior-industrial-revolution.jpg?width=1400&amp;amp;quality=55 2x" class="figure-img img-fluid" src="https://cdn.thecollector.com/wp-content/uploads/2020/07/carl-larsson-house-interior-industrial-revolution.jpg?width=1400&amp;amp;quality=55" decoding="async" data-nimg="intrinsic" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%" loading="lazy"/&gt;</span></noscript></span></center><figcaption class="figure-caption" data-dcnode-id="592" id="caption-attachment-28788"><a data-dcnode-id="595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.carllarsson.se/presskontakt/press-carl-larsson-garden/" rel="noopener noreferrer" target="_blank"><i data-dcnode-id="598"><span data-dcnode-id="599" style="font-weight:400"><span data-dcnode-id="600" instrument_node="">Carl Larsson House Interior</span></span></i><span data-dcnode-id="596" style="font-weight:400"><span data-dcnode-id="597" instrument_node=""> by Carl and Karin Larsson</span></span></a><span data-dcnode-id="593" style="font-weight:400"><span data-dcnode-id="594" instrument_node="">, 1888, via Carl Larsson House Sweden</span></span></figcaption></figure><span data-dcnode-id="590" instrument_node="">
</span><p data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">&nbsp;</span></p><span data-dcnode-id="587" instrument_node="">
</span><p data-dcnode-id="579"><span data-dcnode-id="585" style="font-weight:400"><span data-dcnode-id="586" instrument_node="">The Arts and Crafts movement developed later through the rest of Europe, adapting as it met local traditions. Yet the foundations of the movement remained and led to a sharp turn in European taste. Artists stopped solely imitating antique styles in their works. Nations rediscovered and glorified vernacular styles. Designers, for example, used Celtic patterns in Ireland and Viking inspirations in Scandinavia. These adaptations led to regional styles and the various forms of the </span></span><a data-dcnode-id="582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecollector.com/many-faces-art-nouveaus-themes-and-influences/"><span data-dcnode-id="583" style="font-weight:400"><span data-dcnode-id="584" instrument_node="">Art Nouveau movement</span></span></a><span data-dcnode-id="580" style="font-weight:400"><span data-dcnode-id="581" instrument_node="">.</span></span></p><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">&nbsp;</span></p><span data-dcnode-id="575" instrument_node="">
</span><div data-dcnode-id="569"><center data-dcnode-id="573"><div class="collector-adthrive-contentads" data-dcnode-id="574"></div></center><h2 data-dcnode-id="570" style="padding-top:20px;padding-bottom:30px"><b data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">The United States: Merging Arts And Crafts And Industry</span></b></h2></div><span data-dcnode-id="568" instrument_node="">
</span><figure aria-describedby="caption-attachment-28791" class="figure" data-dcnode-id="547" id="attachment_28791" style="margin:0 0 1rem 0"><center data-dcnode-id="561"><span data-dcnode-id="562" style="box-sizing:border-box;display:inline-block;overflow:hidden;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;position:relative;max-width:100%"><span data-dcnode-id="566" style="box-sizing:border-box;display:block;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;max-width:100%"><img alt="" aria-hidden="true" data-dcnode-id="567" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTA2NyIgaGVpZ2h0PSI4MDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyIgdmVyc2lvbj0iMS4xIi8+" style="display:block;max-width:100%;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0"></span><img alt="gamble house interior" class="figure-img img-fluid" data-dcnode-id="565" data-nimg="intrinsic" decoding="async" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%"><noscript data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">&lt;img alt="gamble house interior" class="figure-img img-fluid" srcSet="https://cdn.thecollector.com/wp-content/uploads/2020/07/greene-brothers-gamble-house-interior-e1595002016157.jpg?width=1080&amp;amp;quality=55 1x, https://cdn.thecollector.com/wp-content/uploads/2020/07/greene-brothers-gamble-house-interior-e1595002016157.jpg?width=1400&amp;amp;quality=55 2x" src="https://cdn.thecollector.com/wp-content/uploads/2020/07/greene-brothers-gamble-house-interior-e1595002016157.jpg?width=1400&amp;amp;quality=55" decoding="async" data-nimg="intrinsic" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%" loading="lazy"/&gt;</span></noscript></span></center><figcaption class="figure-caption" data-dcnode-id="548" id="caption-attachment-28791"><a data-dcnode-id="551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//altaonline.com/arts-and-crafts-icon/" rel="noopener noreferrer" target="_blank"><i data-dcnode-id="558"><span data-dcnode-id="559" style="font-weight:400"><span data-dcnode-id="560" instrument_node="">Gamble House</span></span></i><span data-dcnode-id="557" instrument_node=""> </span><i data-dcnode-id="554"><span data-dcnode-id="555" style="font-weight:400"><span data-dcnode-id="556" instrument_node="">Interior </span></span></i><span data-dcnode-id="552" style="font-weight:400"><span data-dcnode-id="553" instrument_node="">by Charles Greene and Henry Greene</span></span></a><span data-dcnode-id="549" style="font-weight:400"><span data-dcnode-id="550" instrument_node="">, 1908, via Alta Online</span></span></figcaption></figure><span data-dcnode-id="546" instrument_node="">
</span><p data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">&nbsp;</span></p><span data-dcnode-id="543" instrument_node="">
</span><p data-dcnode-id="535"><span data-dcnode-id="541" style="font-weight:400"><span data-dcnode-id="542" instrument_node="">From the end of the 18th century onward, Britain and other European countries such as France, Belgium, and Switzerland experienced the First Industrial Revolution. The United States underwent those tremendous changes a few decades later. Also known as the </span></span><a data-dcnode-id="538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/news/second-industrial-revolution-advances" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="539" style="font-weight:400"><span data-dcnode-id="540" instrument_node="">Second Industrial Revolution</span></span></a><span data-dcnode-id="536" style="font-weight:400"><span data-dcnode-id="537" instrument_node="">, this period started in the second half of the 19th century.</span></span></p><span data-dcnode-id="534" instrument_node="">
</span><p data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">&nbsp;</span></p><span data-dcnode-id="531" instrument_node="">
</span><p data-dcnode-id="528"><span data-dcnode-id="529" style="font-weight:400"><span data-dcnode-id="530" instrument_node="">Around 1870-80, the Arts and Crafts movement reached and widely spread throughout the United States. The first exhibition of this new style in Boston in 1897 contributed to its growth in North America. The movement flourished between 1900 and 1925. American artists reinterpreted the style in their own way and adopted an opposite attitude towards mechanized work. They designed robust and rustic pieces of furniture using local materials such as oak. The use of machines to cut wood and carve decorative elements enabled them to associate aesthetic designs at an affordable price. The alliance of Arts and Crafts philosophy and the use of the Industrial Revolution contributions allowed a large diffusion of their work.</span></span></p><span data-dcnode-id="527" instrument_node="">
</span><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">&nbsp;</span></p><span data-dcnode-id="524" instrument_node="">
</span><figure aria-describedby="caption-attachment-28793" class="figure" data-dcnode-id="514" id="attachment_28793" style="margin:0 0 1rem 0"><center data-dcnode-id="517"><span data-dcnode-id="518" style="box-sizing:border-box;display:inline-block;overflow:hidden;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;position:relative;max-width:100%"><span data-dcnode-id="522" style="box-sizing:border-box;display:block;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;max-width:100%"><img alt="" aria-hidden="true" data-dcnode-id="523" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNzIxIiBoZWlnaHQ9IjgwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIiB2ZXJzaW9uPSIxLjEiLz4=" style="display:block;max-width:100%;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0"></span><img alt="adjustable back chair" class="figure-img img-fluid" data-dcnode-id="521" data-nimg="intrinsic" decoding="async" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%"><noscript data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">&lt;img alt="adjustable back chair" class="figure-img img-fluid" srcSet="https://cdn.thecollector.com/wp-content/uploads/2020/07/gustav-stickley-adjustable-back-chair-e1595002047776.jpg?width=750&amp;amp;quality=55 1x, https://cdn.thecollector.com/wp-content/uploads/2020/07/gustav-stickley-adjustable-back-chair-e1595002047776.jpg?width=1400&amp;amp;quality=55 2x" src="https://cdn.thecollector.com/wp-content/uploads/2020/07/gustav-stickley-adjustable-back-chair-e1595002047776.jpg?width=1400&amp;amp;quality=55" decoding="async" data-nimg="intrinsic" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%" loading="lazy"/&gt;</span></noscript></span></center><figcaption class="figure-caption" data-dcnode-id="515" id="caption-attachment-28793"><span data-dcnode-id="516" instrument_node="">Adjustable-back chair, No. 2342 by Gustav Stickley, 1905, via Museum of Fine Arts Boston</span></figcaption></figure><span data-dcnode-id="513" instrument_node="">
</span><p data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">&nbsp;</span></p><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="504"><a class="broken_link" data-dcnode-id="507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stickleymuseum.org/learn-more/gustav-stickley.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="508" style="font-weight:400"><span data-dcnode-id="509" instrument_node="">Gustav Stickley</span></span></a><span data-dcnode-id="505" style="font-weight:400"><span data-dcnode-id="506" instrument_node=""> is an important representative of the Arts and Crafts movement in the United States. Stickley was an American furniture designer and maker known to have associated the Arts and Crafts style with rural furniture. It is called the ‘Mission-style’ as it resembles simple furniture pieces of Spanish missions in California. After learning furniture-making craft in his uncle’s factory and a tour in Europe where he discovered Arts and Crafts designs, he opened his own furniture factory: the Craftsman Workshops. </span></span></p><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">&nbsp;</span></p><span data-dcnode-id="500" instrument_node="">
</span><p data-dcnode-id="497"><span data-dcnode-id="498" style="font-weight:400"><span data-dcnode-id="499" instrument_node="">Stickley drew inspiration from the designs of William Morris. He used American white oak for his designs, magnified by a light stain to accentuate the wood grain. The adjustable-back chair is a fine example of his work. He conceived it as a comfortable and sturdy chair, using handmade techniques as well as electrical and steam engines to prepare the wood before hand-finishing. In 1901, Stickley launched The Craftsman, an illustrated monthly magazine printed to promote his work and his beliefs regarding furniture production. The magazine helped to circulate the importance of the craftsman status.</span></span></p><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">&nbsp;</span></p><span data-dcnode-id="493" instrument_node="">
</span><p data-dcnode-id="487"><a data-dcnode-id="490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//flwright.org/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="491" style="font-weight:400"><span data-dcnode-id="492" instrument_node="">Frank Lloyd Wright</span></span></a><span data-dcnode-id="488" style="font-weight:400"><span data-dcnode-id="489" instrument_node="">, one of the founders of modern architecture, fully developed the Arts and Crafts philosophy in association with industrial techniques. In his publication “The Art and Craft of the Machine” (1901), Wright advocates the advantages of machine work for the future of arts and crafts. He believes the machine capable of serving the arts’ ideals.</span></span></p><span data-dcnode-id="486" instrument_node="">
</span><p data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">&nbsp;</span></p><span data-dcnode-id="483" instrument_node="">
</span><div data-dcnode-id="477"><center data-dcnode-id="481"><div class="collector-adthrive-contentads" data-dcnode-id="482"></div></center><h2 data-dcnode-id="478" style="padding-top:20px;padding-bottom:30px"><b data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">Legacy Of The Industrial Revolution And Arts And Crafts&nbsp;</span></b></h2></div><span data-dcnode-id="476" instrument_node="">
</span><figure aria-describedby="caption-attachment-28790" class="figure" data-dcnode-id="459" id="attachment_28790" style="margin:0 0 1rem 0"><center data-dcnode-id="469"><span data-dcnode-id="470" style="box-sizing:border-box;display:inline-block;overflow:hidden;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;position:relative;max-width:100%"><span data-dcnode-id="474" style="box-sizing:border-box;display:block;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0;max-width:100%"><img alt="" aria-hidden="true" data-dcnode-id="475" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTUwMCIgaGVpZ2h0PSI1MjkiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyIgdmVyc2lvbj0iMS4xIi8+" style="display:block;max-width:100%;width:initial;height:initial;background:none;opacity:1;border:0;margin:0;padding:0"></span><img alt="dining table six side chairs" class="figure-img img-fluid" data-dcnode-id="473" data-nimg="intrinsic" decoding="async" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%"><noscript data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">&lt;img alt="dining table six side chairs" srcSet="https://cdn.thecollector.com/wp-content/uploads/2020/07/frank-lloyd-wright-table-and-chairs.jpg?width=1400&amp;amp;quality=55 1x" class="figure-img img-fluid" src="https://cdn.thecollector.com/wp-content/uploads/2020/07/frank-lloyd-wright-table-and-chairs.jpg?width=1400&amp;amp;quality=55" decoding="async" data-nimg="intrinsic" style="position:absolute;top:0;left:0;bottom:0;right:0;box-sizing:border-box;padding:0;border:none;margin:auto;display:block;width:0;height:0;min-width:100%;max-width:100%;min-height:100%;max-height:100%" loading="lazy"/&gt;</span></noscript></span></center><figcaption class="figure-caption" data-dcnode-id="460" id="caption-attachment-28790"><a data-dcnode-id="463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//smartcollection.uchicago.edu/objects/112/dining-table-and-six-side-chairs%3Fctx%3D68a00497-f103-4aca-ab2a-4d35a31635f1%26idx%3D8" rel="noopener noreferrer" target="_blank"><i data-dcnode-id="466"><span data-dcnode-id="467" style="font-weight:400"><span data-dcnode-id="468" instrument_node="">Dining Table and Six Side Chairs</span></span></i><span data-dcnode-id="464" style="font-weight:400"><span data-dcnode-id="465" instrument_node=""> by Frank Lloyd Wright</span></span></a><span data-dcnode-id="461" style="font-weight:400"><span data-dcnode-id="462" instrument_node="">, 1907-1910, via Smart Museum of Art, University of Chicago</span></span></figcaption></figure><span data-dcnode-id="458" instrument_node="">
</span><p data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">&nbsp;</span></p><span data-dcnode-id="455" instrument_node="">
</span><p data-dcnode-id="452"><span data-dcnode-id="453" style="font-weight:400"><span data-dcnode-id="454" instrument_node="">The Arts and Crafts movement as it developed in Britain could not durably trump technical and social advances of the industrial era. Arts and Crafts furniture proved to be too expensive for average families to buy, making a large scale diffusion impossible. However, the movement contributed to creating public awareness of the appreciation of authentic and handmade crafts. Ironically, the fashionable Arts and Crafts designs became an inspiration for mechanized, mass-produced furniture pieces. Liberty, the still renowned London store, produced from 1883 in his workshops affordable furniture inspired by Arts and Crafts designs.</span></span></p><span data-dcnode-id="451" instrument_node="">
</span><p data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">&nbsp;</span></p><span data-dcnode-id="448" instrument_node="">
</span><p data-dcnode-id="445"><span data-dcnode-id="446" style="font-weight:400"><span data-dcnode-id="447" instrument_node="">In the United States, we have seen that designers and furniture makers adopted a more inclined position towards the Industrial Revolution’s technical advances. They tried to take advantage of machine work to simplify materials preparation, then manually finishing the job. This approach enabled them to produce cheaper, yet good quality objects and to diffuse their work.</span></span></p><span data-dcnode-id="444" instrument_node="">
</span><p data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">&nbsp;</span></p><span data-dcnode-id="441" instrument_node="">
</span><p data-dcnode-id="423"><span data-dcnode-id="439" style="font-weight:400"><span data-dcnode-id="440" instrument_node="">Several characteristics of Arts and Crafts designs inspired later styles: simplicity of the form, adequation with the function. Arts and Crafts philosophy constitute the premises of several </span></span><a data-dcnode-id="436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecollector.com/a-brief-timeline-of-20th-century-visual-art-movements/"><span data-dcnode-id="437" style="font-weight:400"><span data-dcnode-id="438" instrument_node="">20th-century artistic movements</span></span></a><span data-dcnode-id="434" style="font-weight:400"><span data-dcnode-id="435" instrument_node="">, from the </span></span><a data-dcnode-id="431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecollector.com/many-faces-art-nouveaus-themes-and-influences/"><span data-dcnode-id="432" style="font-weight:400"><span data-dcnode-id="433" instrument_node="">Art Nouveau</span></span></a><span data-dcnode-id="429" style="font-weight:400"><span data-dcnode-id="430" instrument_node=""> movement to </span></span><a data-dcnode-id="426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecollector.com/group-seven-artists/"><span data-dcnode-id="427" style="font-weight:400"><span data-dcnode-id="428" instrument_node="">Modernism</span></span></a><span data-dcnode-id="424" style="font-weight:400"><span data-dcnode-id="425" instrument_node="">.</span></span></p><span data-dcnode-id="422" instrument_node="">
