</span><p class="post-meta" data-dcnode-id="327"><span data-dcnode-id="346" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="343"><a data-dcnode-id="344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoryunstuffed.com/author/jeanne/" rel="author" title="Posts by Jeanne Willette"><span data-dcnode-id="345" instrument_node="">Jeanne Willette</span></a></span><span data-dcnode-id="342" instrument_node=""> | </span><span class="published" data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">Apr 29, 2011</span></span><span data-dcnode-id="339" instrument_node=""> | </span><a data-dcnode-id="337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoryunstuffed.com/category/modern/" rel="category tag"><span data-dcnode-id="338" instrument_node="">Modern</span></a><span data-dcnode-id="336" instrument_node="">, </span><a data-dcnode-id="334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoryunstuffed.com/category/modern/modern-aesthetics/" rel="category tag"><span data-dcnode-id="335" instrument_node="">Modern Aesthetics</span></a><span data-dcnode-id="333" instrument_node="">, </span><a data-dcnode-id="331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoryunstuffed.com/category/modern/modern-art/" rel="category tag"><span data-dcnode-id="332" instrument_node="">Modern Art</span></a><span data-dcnode-id="330" instrument_node="">, </span><a data-dcnode-id="328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arthistoryunstuffed.com/category/modern/modern-culture/" rel="category tag"><span data-dcnode-id="329" instrument_node="">Modern Culture</span></a></p><span data-dcnode-id="326" instrument_node="">
</span></div><span data-dcnode-id="324" instrument_node="">
</span><div class="entry-content" data-dcnode-id="223"><span data-dcnode-id="323" instrument_node="">
</span><p data-dcnode-id="318" style="text-align: center;"><strong data-dcnode-id="319"><span data-dcnode-id="322" instrument_node="">The Search for the Absolute: The Architecture of&nbsp;</span><strong data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">De Stijl</span></strong></strong></p><span data-dcnode-id="317" instrument_node="">
</span><p data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">Beyond the paintings of Piet Mondrian, the other manifestation of De Stijl that has imprinted the memory of the art world is its distinctive architecture. Indeed, it was architecture that caused the most disagreement among the artists.&nbsp; From 1922 on Theo van Doesburg devoted himself to the cause of a modern architecture appropriate to modern times.&nbsp;&nbsp; With the primary painters, Bart Van Der Leek and Mondrian, drifting away, van Doesburg sought to promote De Stijl primarily in terms of the built environment. In fact it was through architecture that De Stilj finally became known in Europe through exhibitions in Paris and Berlin.&nbsp; Associated with the Bauhaus, van Doesburg made sure that his architects were presented as part of a wider effort in Germany and in Russia to revolutionize architecture.&nbsp; Sadly, the efforts of all of these architects would be halted by the Second World War.&nbsp; Still the De Stijl architects managed to build a few private homes and two notable attempts at small public buildings.</span></p><span data-dcnode-id="314" instrument_node="">
</span><p data-dcnode-id="309"><span data-dcnode-id="313" instrument_node="">The absolutism inherent in De Stijl could be linked to the practical in architecture, that is, mass-produced elements &nbsp;allowed architecture to achieve a uniform, stripped-down reduced look. The idea of a modern architecture, or what we would call “modernist architecture,” was already in the wind.&nbsp;&nbsp; In his book, </span><em data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">Art in Vienna, </span></em><span data-dcnode-id="310" instrument_node="">Peter Vergo stated, “Only in the buildings of Adolf Loos, with his disdain of elaborate ornament, does one find he beginnings of a wholly modern style in architecture…” Loos himself insisted in his famous 1908 manifesto, “Ornament and Crime,”</span></p><span data-dcnode-id="308" instrument_node="">
</span><blockquote data-dcnode-id="305"><p data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">It is easy to reconcile ourselves to the great damage and depredations the revival of ornament had done to our aesthetic development, since no one and nothing, not even the power of the state, can hold up the evolution of mankind. It can only be slowed down. We can afford to wait. But in economic respects it is a crime, in that it leads to the waste of human labor, money, and materials. That is damage time cannot repair. The speed of cultural development is hampered by the stragglers. I am living, say, in 1912, my neighbor around 1900, and that man over there in 1880.</span></p></blockquote><span data-dcnode-id="304" instrument_node="">
</span><p data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">Loos, as Le Corbusier remarked, “…swept the path before us.&nbsp; It was a Homeric cleansing: precise, philosophical, logical.&nbsp; He has influenced the architectural destiny of us all.”&nbsp; From Vienna to Paris, Loos waged war on architectural eclecticism and the baroque assemblage of meaningless ornamentation torn from its original context and piled into a mass of decoration.&nbsp; Clearly, architecture in the nineteenth century was mired in the past and it was the task of modern architects to define modernist architecture. Van Doesburg had long been concerned with relationship between painting and architecture.</span></p><span data-dcnode-id="301" instrument_node="">
</span><blockquote data-dcnode-id="298"><p data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">“When everything has been expressed on the present level of painting, new aesthetic potential will emerge therefrom for extending the scope of expressive possibilities,” he stated and continued, “…a monumental cooperative art is what the future holds.&nbsp; In this new form, various spiritual means of expression (architecture, sculpture, painting, music and literature) will be universally realized…”</span></p></blockquote><span data-dcnode-id="297" instrument_node="">
</span><p data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">While Van Der Leek rejected any such connection between painting and architecture, the idea of applying absolutism to both art forms seems logical.&nbsp; In fact, although he insisted that painting had to be an independent medium, Mondrian could envision that with NeoPlasticism “…the abstract real…or picture will disappear as son as we transfer its plastic beauty to the space around us through the organization of the room into color areas…” Van der Leek made the distinction between the powers of NeoPlaticism in painting to dissolve the materiality of “naturalism” and architecture, which was characterized by “the space-restricting flatness…” Without debating whether or not the characteristics of the De Stijl style could be applied to architecture or not, it is more helpful to understand that the artists were trying to create a new form of architecture for a new world.</span></p><span data-dcnode-id="294" instrument_node="">
</span><p data-dcnode-id="289"><span data-dcnode-id="293" instrument_node="">Like Adolf Loos, who had traveled to New York, the De Stijl architects were impacted by architecture in America, a new country that was erecting new kinds of buildings. Some of the architects associated with De Stijl were followers of Frank Lloyd Wright. Anti-monumental anti-ornamental architecture had to be in keeping with character of city streets and new building materials, both of which were geometric for the sake of efficiency.&nbsp; Architects such as Van’t Hoff were inspired by the work of Frank Lloyd Wright in America.&nbsp; In fact, Robert van’ t Hoff had worked for Wright and his </span><em data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">Huis-ter-Heide, </span></em><span data-dcnode-id="290" instrument_node="">in its turn,&nbsp;inspired Gerrit Rietveld. Wright’s Prairie Style of flat roofs over long low structures seemed especially suitable for the flat landscapes of Holland. &nbsp;But, most importantly, Wright opened up the closed spaces of the Victorian structure into what is called today “the open plan.”&nbsp; He also made sure that his early work was responsive to the surroundings and this is where Wright and De Stijl would ultimately separate.&nbsp; De Stijl sought, not the local, but the absolute, and its buildings make no concession to their environment.</span></p><span data-dcnode-id="288" instrument_node="">
</span><p data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">As architect J.P.P. Oud said, “Though the importance of a work of art can only be judged from an absolute point of view, the significance of an act can only be appreciated according to a relative standard.”&nbsp; For his part, Oud proposed use of mass production for limited number of standard types that would be a new urban architecture with a “form follows function” philosophy.&nbsp; However, the most famous De Stijl work of architecture was the well-known Schröder House by cabinetmaker Gerrit Rietveld, and this home was thoroughly individual.&nbsp; Still, the Schroder House uses certain elements of mass architecture to its advantage: reinforced concrete over steel.&nbsp; Rietveld collaborated with his client, Madame Truus Schöder-Schrader and completed her Utrecht home in 1924.&nbsp; Thanks to modern construction, this house could fulfill van Doesburg’s 1924 Manifesto on architecture, demanding the “elementary, economic, functional, formless, unmonumental, asymmetry, afrontality, and anti-decorative.”&nbsp; According to van Doesburg,</span></p><span data-dcnode-id="285" instrument_node="">
</span><blockquote data-dcnode-id="282"><p data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">“The new architecture has broken through the wall and in so doing has completely eliminated the divorce of inside and out.&nbsp; The walls are non-load-bearing; they are reduced to points of support.&nbsp; And as a result there is generated a new open plan, totally different from the classic because inside and outside space interpenetrate.”</span></p></blockquote><span data-dcnode-id="281" instrument_node="">
</span><p data-dcnode-id="276"><span data-dcnode-id="280" instrument_node="">Therefore, architecture is anti-cubic, anti-symmetrical and anti-gravitational, the elements float and hover. Despite the connections between van Doesburg and the attempts in Russia and Germany to rebuild the world, De Stijl architecture is uniquely Dutch, ironically, because it translated Mondrian’s principles into architecture. In distinction to the uniformly whiteness of </span><em data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">Weisenhofsiedlung</span></em><span data-dcnode-id="277" instrument_node="">, De Stijl buildings were white, with the floating exterior white planes augmented with red, yellow, blue and black trim.&nbsp; The weightlessness of the floating sections is countered by the grey stucco on other segments. The bold use of blocks of color is even clearer inside the Schröder House compared to the all-white interior of its contemporary, the Villa Savoye by Le Corbusiner.&nbsp; Rietveld, the furniture maker, absorbed furniture into the house with built-ins and fashioned sliding panels to close off the open spaces into “rooms.”&nbsp; Walls, floors, furniture—all were dissolved into disconnected sections of red, blue, yellow, or black that mobilized the space.&nbsp; Daringly, in this cold climate, the walls were opened to expanses of glass, making the house seem even lighter weight.</span></p><span data-dcnode-id="275" instrument_node="">
</span><p data-dcnode-id="267"><span data-dcnode-id="274" instrument_node="">In keeping with the idea of an interior space being a total work of art, Rietveld invented new furniture for his new design.&nbsp; Wright had seen the necessity of such control, if only because of the unsuitability of existing furniture for the modern interior.&nbsp; The most famous of Rietveld’s furniture for the Schröder House is the </span><em data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">Red/blue Chair,</span></em><span data-dcnode-id="271" instrument_node=""> which had yellow tips, like full stop periods, on the blunt wooden ends.&nbsp; Utterly without padding or comfort, countering Victorian upholstery, this chair is a pair of floating planes, red and blue, held together by black posts and lintels.&nbsp; Inspired by William Morris’s groundbreaking recliner, the bare wood design became the </span><em data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">Red/blue Chair </span></em><span data-dcnode-id="268" instrument_node="">of 1918 and fit beautifully into its new home, where it became one of the most famous chairs of all time.</span></p><span data-dcnode-id="266" instrument_node="">
</span><p data-dcnode-id="249"><span data-dcnode-id="265" instrument_node="">In his article, “The Furniture of Gerrit Rietveld. Manifestoes for a New Revolution,” Martin Filler showed a number of illustrations that showed the designer’s evolution and struggle to keep his furniture simple.&nbsp; His </span><em data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Beachwood Sideboard</span></em><span data-dcnode-id="262" instrument_node=""> of 1919 anticipates Art Deco, but it is fussy compared to his </span><em data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">Berlin Chair </span></em><span data-dcnode-id="259" instrument_node="">and his </span><em data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">Side Table</span></em><span data-dcnode-id="256" instrument_node=""> of 1923.&nbsp; Filler made the case that the </span><em data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">Red/blue Chair</span></em><span data-dcnode-id="253" instrument_node=""> was more sculpture than furniture and one could also add, more painting than chair. Indeed, other examples of De Stijl architecture indicate how tempting it is to devolve into decoration.&nbsp; As seen in Café de Unie of 1925 and Café Aubette of 1927, when the De Stijl colors are used in small planes, rather than for large architectural areas, then the interiors become irritating and betray a certain nostalgia for </span><em data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">fin-de-siecle </span></em><span data-dcnode-id="250" instrument_node="">Art nouveau.&nbsp; Destroyed in the Nazi bombing of Rotterdam, Oud’s design (now restored) was far more successful than the collaborative work of van Doesburg and the Arps, Jean and Sophie-Taeuber.&nbsp; Although the Café is considered today (by some) to be a success, van Doesburg’s architectural statement and the artists’ interior was unpopular with the clients and was wiped out in 1928, perhaps because of the rather dizzying array of blocks of bright color.&nbsp; De Stijl architecture would come fully into its own after World War II as a kind of national style of Holland.</span></p><span data-dcnode-id="248" instrument_node="">
</span><p data-dcnode-id="245" style="text-align: center;"><strong data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">If you have found this material useful, please give credit to</span></strong></p><span data-dcnode-id="244" instrument_node="">
</span><p data-dcnode-id="238" style="text-align: center;"><strong data-dcnode-id="239"><span data-dcnode-id="243" instrument_node="">Dr. Jeanne S. M. Willette and&nbsp;</span><em data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">Art History Unstuffed.</span></em><span data-dcnode-id="240" instrument_node=""> Thank you.</span></strong></p><span data-dcnode-id="237" instrument_node="">
