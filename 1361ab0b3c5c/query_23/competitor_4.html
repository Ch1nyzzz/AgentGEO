f    The anti-art mood in Britain was to be memorialized by an enig-
matic suitcase, a distant relation to Duchamp's Boite-en-Valise.
Produced by John Latham, an assemblage artist who achieved brief
international success early in the 19605 with his sprayed book ensem-
bles, it contained the physical remains, and the documented
consequences, of a strange ritual entitled 'Still and Chew'. Latham's
students from St Martin's School of Art in London were invited to his
home in August 1966 to communally chew up the pages of Clement
Greenberg's Art and Culture (1961), borrowed from the college library.
The resultant pulp was then 'brewed' and bottled before being
returned to the library, after which, unsurprisingly, Latham lost his
job. Anti-social or not, the gesture clearly made a point, not least in
relation to the Modernist aesthetics then embodied at St Martin's in
the works of Anthony Caro's successors (see Chapter 5). Art and
 Culture contained essays by Greenberg such as 'Avant-Garde and
 Kitsch' which, as explained earlier, endorsed aesthetic exclusivity. By
parodically testing it against bodily needs, Latham encapsulated a
generational shift towards inclusiveness.
     An ally of Latham, the German-born Jewish immigrant Gustav
Metzger, followed this up a month later with his 'Destruction in Art
 Symposium', attracting nearly one hundred international iconoclasts
 to London, many with Fluxus links. However, histories have tended
 to ignore British iconoclasm in favour of a single orgy of destruction,
Jean Tinguely's Homage to New York. This massive agglomeration of
 comically auto-destructive machinery, set up in the sculpture garden
 of MOMA in March 1960 as the French New Realist's dramatic entree
 into New York's 'Happenings' scene, consumed itself in flames before
 being extinguished by the city's fire brigade. However, compared with
 subsequent Fluxus gestures and their British counterparts, it now
 appears overblown and socially detached.

    In 1962 Warhol embarked on his iconography of consumerism—the
screen-printed rows of dollar bills and Coca-Cola bottles on large
canvases or the paintings of individual Campbell's soup cans that were
shown at his first solo exhibition at Los Angeles's Ferus Gallery (see
Chapter 3). The 'stacking' of his 'products' in rows implied a submis-
sion to the routinization of supermarket-era shopping as well as
mimicking the techniques of mass-production. In line with this, he
turned mechanization's threat to artistic autonomy into an aesthetic
rationale, talking of wanting to be a machine, and pursuing the indus-
trial metaphor to the extent of employing assistants to print his
silkscreens in his 'Factory'. This essentially 'masculine' managerial
stance, which updated art-historical workshop practices (e.g. Rubens),
sat oddly alongside his 'camp' position.
     Through aligning himself with 'female' consumption, Warhol
came close to Duchamp, who had represented himself in drag on a
perfume bottle [25], but Warhol's taste was more flamboyantly vulgar,
especially when it came to opposing Abstract Expressionism's 'virility'.
His Cow Wallpaper [55], its ungainly bovine profiles appearing incon-
gruously rural alongside his urban subjects, repudiated a whole lineage
of 'bullish' imagery in twentieth-century art ranging from Picasso's
Guernica to Motherwell's Elegies [12]. At the same time, in producing
'wallpaper'—the very incarnation of the domestic and decorative—he
parodied the broodings of Modernists over where abstract paintings
ended compositionally, revelling in the philistine perception of such
works as 'wallpaper'. (The American critic Harold Rosenberg once
denigrated certain forms of Abstract Expressionist art as 'apocalyptic
wallpaper'.)14
    Warhol's anti-Modernist position informed his most celebrated
subjects, Marilyn Monroe and Elizabeth Taylor. These celebrities
were as much gay icons as objects of male heterosexual desire, not
least because of their publicized sufferings in heterosexual relation-
ships, and in his silkscreen-printed 'portraits' of 1962—3 the garish
inks virtually functioned as make-up, creating 'drag-queen' connota-
tions. Warhol was plagued by personal cosmetic insecurities. An
early painting called Before and After (1960) was adapted from a
newspaper advertisement dramatizing the transformation of a
woman's nose from 'aqualine' to 'ski-slope' via plastic surgery;
Warhol himself had had a 'nose job' in 1957. Applying silkscreen inks
like cosmetics, he ironically attended to Modernist painting's
'complexion'—its concern, in Greenberg's terms, with maintaining
surface integrity. Warhol famously asserted that to 'know' him, his
 audience simply needed to look at the 'surface' of himself or his work;
there was nothing more.

                        POP ART IN AMERICA: LICHTENSTEIN AND WARHOL 115
f    In cosmeticizing Modernism Warhol brilliantly replayed certain
conditions surrounding the foundational construction of the 'modern-
ist' artist (for the two usages of the term see Chapter i). In his essay
'The Painter of Modern Life' (1863), the French art critic Charles
Baudelaire had argued that what distinguished the (male) artistic
advocate of'modernity' was a marrying of the aristocratic spirit of the
'dandy' with that of the flaneur in the desire to 'distil the eternal from
the transitory' out of urban flux. In a section entitled 'In Praise of
Cosmetics' he extolled the artifice of make-up as an analogue for his
aesthetic credo. Its ability to 'create an abstract unity in the colour and
texture of the skin' was said to approximate 'the human being to the
statue, that is to something superior and divine'.15 Warhol's Marilyn
was turned into a divinity in precisely these terms, although his Gold
Marilyn of 1962, consisting of a solo head placed on a gold-painted
field, also evoked Byzantine icons. The fact that Warhol was a fervent
Catholic suggests a mobilization of fetishistic religious impulses equal
to Klein's or Manzoni's. Certainly Warhol's carefully distanced pers-
ona and the voyeuristic establishment of a 'freak show' of hangers-on at
his 'Factory' positioned him as Pop's 'dandy'/vzr excellence.
     Warhol's voyeuristic tendencies surfaced most clearly in the
Disasters series (1962—4). The Marilyns, produced shortly after her
 suicide, anticipated these works in dramatizing how mass culture
 threads private tragedy through its machinery. (The repeated 'frames'
 of the Marilyn Dyptich [1962], some with the image over-inked or
virtually invisible, connoted film, a medium to which Warhol turned in
 1963.) Deriving initially from a stark newspaper headline '129 die in Jet'
 (the subject of a 1962 painting) the Disasters series ironically revived an
 important genre of Neoclassical 'history painting': the heroic death.
Warhol, however, programmatically placed allusions to 'celebrity'
 deaths, such as Monroe's or President Kennedy's registered through
 the grief on his wife Jackie Kennedy's face, on a par with those of
 'unknowns'—the harrowing Suicide Jumps and Car Crashes [56]. The
 latter constituted dystopian reflections on the symbol of American
 affluence in the wake of Jim Dine's earlier 'Happening' [50]. Other
 works in the series, the Electric Chairs and the Tunafish Disasters, dealt
 with 'unknowns' who momentarily achieved fame precisely through
 death. All in all, death was presented as a social leveller.
     Democratizing processes were often the subject of Warhol's fey
 pronouncements. He noted approvingly that when Elizabeth II drank
 the Coca-Cola offered by President Eisenhower it tasted the same to
 her as to the man in the street. In a famous utterance he conflated the
 conformities of commodity culture with an alien political credo: 'I want
 everybody to think alike ... Russia is doing it under government ...
  Everybody looks alike and thinks alike, and we're getting more and
 more that way'.16 The conflation reflected the way American media

Pop and politics: the US and West Germany

shallowness. He had trained commercially as a billboard artist,
working close-up on enormous advertising hoardings which later
predisposed him towards the use of abstracted fragments of imagery.

    Recalling the start of this chapter, Greenberg's horror of 'kitsch'—
the principle which Pop so fervently embraced—had initially been
bound up with an abhorrence of the aesthetic consequences of
 Stalinism, namely propagandist art for the masses: 'Socialist Realism'.
In a sense, then, Richter's eventual response to Pop was to retreat from
its embrace of kitsch, recovering the historical conditions from which
it, as the antithesis of Greenberg's Modernism, had grown. In doing
this he, and Polke also, return us to the central premises of postwar
 avant-gardism, discussed in Chapter i. However daring Pop's levelling
of'high' and 'low' cultural distinctions, its aesthetics were ideologically
 rooted: it was as 'American' as Greenberg's Modernism. In that sense,
 it constituted 'Capitalist Realism', as far as Polke and Richter were
 concerned; a form of propaganda, as the case of Rosenquist demon-
 strates, for values it was not always comfortable with.

fYork, such as Don Judd, Sol LeWitt, and Frank Stella, prized in
Reinhardt. Stella's own 'black paintings' of 1958-60, which set his
career in motion, were almost calculated to confirm Greenberg in his
critical reorientation.
    Stella's works took the critic's earlier dogma of formal self-contain-
ment to a deadpan conclusion. Expunging any residues of Abstract
Expressionist emotionalism and seizing on Johns's use of systematic
pictorial rationales [29], Stella deduced the internal logic of paintings
such as 'Die Fahne Hochf [65] from their nature as objects. The
unvarying 2-inch-wide bands of black that filled the canvases were
thus derived from the width of their stretchers. The slivers of bare
canvas that were left behind paradoxically functioned as 'drawing',
echoing the framing edges of the supports and setting up centrifugal or
centripetal 'ripples'. Such images seemed to obey structural necessity
rather than aesthetic whim. But Stella, of course, made minimal deci-
sions as to how to extract necessity from his formats. This flew in the
face of the Modernist idea that painting imposes a fixed set of aesthetic
limitations.
    In subsequent sequences of work Stella dramatically moved from
'painting' in a Modernist sense towards 'objecthood' (to pre-empt
Michael Fried's later terminology). In the aluminium-coated 'shaped
canvases' of 1960 the paintings' reverberative internal patterns were
dictated by notches cut into the corners or sides of the supports, or by
holes puncturing the centres. Their aluminium surfaces encouraged
the art historian Robert Rosenblum to characterize them as 'irrevo-
cably shut metal doors',3 an association underlining both their
self-containment and the artist's stated desire to 'repel' attempts to
'enter them' visually.
    In the face of such drastic metamorphoses, the Modernist critic
Michael Fried, torn between loyalties to Greenberg and to Stella (he
was a close friend of the latter), attempted to cast such works in
Modernist terms. He claimed, for instance, that the reflected light
from the aluminium canvases counterbalanced their tendency to
function as objects by creating an optical shimmer.4 He and other
Modernist commentators such as William Rubin were spared further
explanatory acrobatics when, having pursued his end-game with
painting to the extent of producing polygonally shaped canvases in
1963, in which the redundant centres of the paintings were completely
removed, Stella changed direction. His enormous Profractor paintings
of 1967—8 now reintroduced complex internal relationships between
arcing bands of colour. For a time at least he appeared to have entered
the Modernist fold, alongside other 19605 exponents of 'hard-edge'
abstract colour painting such as Ellsworth Kelly. However, in the
19705 his surprising turn to a kind of parodic or baroque gestural
painting established him as terminally ambivalent.

                                 Minimalism and anti-rationalism
                                 The 'Minimalist' tag was derived from the title of a 1965 essay on the
                                 withdrawal of manual effort from aesthetic output by the British
                                 philosopher Richard Wollheim.10 Its connotations of reductive 'paring
                                 down', however, were rejected by all of the key figures who came to be
                                 identified with it after a spate of solo shows in 1963—4: Don Judd,
                                 Robert Morris, Carl Andre, and Dan Flavin. Other labels such as
                                 'Literalism' or 'Primary Structures', the latter the title of the key exhi-
                                 bition of these artists at New York's Jewish Museum in 1966, were no

                                 138 MODERNISM IN RETREAT: MINIMALIST AESTHETICS AND BEYOND
fmore helpful. As Judd asserted, the reductionist interpretation of
Minimalist art was predicated on what was thought to be missing from
the objects when works such as his were kept uncomplicated precisely
in order to isolate specific and positive qualities. Reduction alterna-
tively implies a calculated attempt to reach an essential 'core'. In this
respect the work of many Minimalists implicitly denied any 'ratio-
nalist' or 'idealist' accession to 'meaning'. Judd's ordering systems were
anti-rationalist, he claimed, because the logic of 'one thing after
another' obviated the need for aesthetic 'decisions'. In the case of
Robert Morris, though, the principle of anti-idealism went deeper.
    In the early 19605 Morris had been involved with the moves towards
a simplified, task-oriented style of dance which his then wife, Simone
Forti, and dancers such as Trisha Brown and Yvonne Rainer developed
at New York's Judson Memorial Theatre. In its openness towards
interdisciplinarity this tendency paralleled contemporaneous Merce
Cunningham/Rauschenberg and Fluxus performances. In sculptures
of the period Morris explored Duchampian preoccupations with the
body and gendered identity [27], as noted earlier. These concerns
naturally found their way into the fairly elaborate dance events he
organized between 1962 and 1965 such as Site (1964, with Carolee
Schneeman) and Waterman Switch (1965), but the convergence
between sculpture and dance had been economically suggested in
Morris's first performance, Column, at the Living Theatre in New York
in 1961. The 'performer' in the piece was a grey-painted 8-foot plywood
column which stood on an empty stage for three and a half minutes.
Manipulated externally by strings, it then fell to the floor, where it
remained for the same period before the performance ended. The piece
conflated anthropomorphic allusions to male sexuality (as subse-
quently explored in I-Box] and current moves in sculpture from a
(virile) verticality to a stress on horizontality [67,68]. In 1964-5, Morris
began to use such geometrical forms in the context of Minimalism, but
his sense of their metaphorical possibilities clearly separated him from
Judd.
    This is not to say that Morris was unconcerned with the problem of
maintaining the sense of the 'wholeness' of his geometrical forms.
However, in his contemporaneous Notes on Sculpture he evinced an
interest in how such 'whole objects' were actually perceived by specta-
tors, playing off the concept of the 'good gestalt' (a term used by
psychologists to designate the 'whole' or regular structures we are
predisposed to search for in visual configurations) against the fact that
our bodily based experience of objects, even the most regular ones, is
inevitably partial or contingent. We may be able to conceptualize
'cubeness', but we can only experience actual cubes in time from certain
angles and distances. We oscillate, as Morris put it, between the
'known constant and the experienced variable'.11

fsuch objects defined by their ambient conditions.13 The latter position,
which Morris partly inherited from the Duchampian emphasis on the
role of the spectator, constitutes a radical break with Modernist
assumptions, undermining the autonomy previously claimed for works
of art. Minimalism here becomes deeply relativistic, supportive of the
view that 'art' can only acquire value or worth in relation to external
factors, such as its social or institutional setting. Such a view sets
distinct limits on the artist's ability to control meaning, recalling
Barthes's theorization of the loss of authorial agency.
    This issue of loss of agency can be differently exemplified in the art
historian Rosalind Krauss's reading of the anti-rationalism of another
artist associated with Minimalism, Sol LeWitt. Discussing his
 Variations of Incomplete Open Cubes (1974), a modular structure
composed of 122 wooden units demonstrating all the permutations
produced by systematically removing the various sides of a cube, she
shows how an apparent logicality flips into obsessive compulsion.14
Although LeWitt's productions clearly responded to Minimalist
preoccupations, such that this project echoes Morris's play on the
'known constant' discussed above, he was to present himself as one of
the first practitioners of Conceptual Art in articles of 1967 and 1969
with statements such as 'The idea becomes a machine that makes the
art'.15 This principle informs the 'wall drawings' that LeWitt
embarked on from 1968 onwards. Revealing a Minimalist predilection
for impersonality, they were designed for specific locations but were
frequently carried out by draughtsmen on the basis of succinct instruc-
tions from LeWitt—for instance 'circles, grids, arcs from four corners
and sides' [70]. Strict adhesion to such prescriptions, with no clear
sense of how they would unravel in situ, led the interpreters to produce
unexpectedly labyrinthine or eccentric visual structures. Again, the
strange co-existence within Minimalism of authorial removal and
aesthetic autonomy is touched upon.
    LeWitt's abandonment of control, his deployment of pragmatic
systems to undermine rationality, would appear to argue against the
earlier points made about Minimalism's tacit complicity with
America's power base. However, the loss of agency which he seems
glad to submit to may be read as the symptomatic underside of that
coin. In this sense, Minimalism emerges as the autistic child of
booming industry and mass production, its fixations on strong
 Gestalts and repetitive systems bespeaking a pragmatism internalized
and, in many cases, gone awry. Forcing Modernist aesthetics to
breaking point, Minimalism vacillated between an awe for the totality
of power and a sense of powerlessness. In the latter respect it was
 closer to America's disaffected countercultures of the mid-1960s than
 might be supposed.

Anti Form and body metaphors: Hesse and Bourgeois
In the mid-1960s Minimalism functioned as a kind of purgative,
ridding sculpture of surplus aesthetic and metaphorical baggage, but
its austerity almost begged to be challenged. In 1968, therefore, Robert
Morris published a text, titled 'Anti Form', which was widely taken to
signal a refutation of Minimalism's assumptions. That a short artic</span><span data-dcnode-id="451" instrument_node="">le
by an artist possessed such clout is symptomatic of a widespread accep-
tance of artists as theoretical legislators in the later 19605. This went
hand in hand with a changing sense of art's academic status. Artists
increasingly moved between humanities disciplines. Morris, for
example, had studied psychology and philosophy in the early 19505;
Don Judd, who published extensively as an art critic, had studied
philosophy at Columbia University.
    In Anti Form' Morris argued that rather than being preconceived,
sculpture should follow the dictates of process. Seriality should be
abandoned in favour of randomness and materials should be allowed to
find their own forms in response to principles such as gravity.24
Renouncing geometry, he himself scattered materials such as threads
or metal scraps in amorphous masses on gallery floors or, having cut
strips into large sheets of felt, hung them from hooks so that the strips
cascaded to the floor. Given that he and Carl Andre had regarded their
practices as imbued with anti-virile metaphors, this change of tack
might be interpreted as a means of softening Minimalism's hard
masculinist edges. (It is far from coincidental that Morris illustrated
Anti Form' with one of Oldenburg's 'soft sculptures'.) Dissolution was
a cultural condition in 1968. As we shall see, the gallery system was
under attack, and Morris was pledged to undermining its rigidities, as
well as his own. However, if Morris 'feminized' his practice, it is ironic
that a female curator, Lucy Lippard, had already set the 'desublimation'
of Minimalism in motion.
    In 1966 Lippard had curated an important exhibition entitled
'Eccentric Abstraction' at New York's Fischbach Gallery, dedicated to
work which addressed the tactile or the visceral rather than the cere-
bral. Under this rubric she particularly promoted the work of the
German-born artist Eva Hesse. Familiar with Minimalist ideas
through her friendship with Sol LeWitt, Hesse had recently begun

    The troubled early history that informed Bourgeois's work involved
the fact that her father had installed his mistress in the family home,
systematically undermining the self-esteem of his wife and daughter.
Bourgeois's intensely ambivalent feelings towards him would be given
expression in disturbingly direct works such as the installation
Destruction of the Father (1974), a conglomeration of globular forms
both sprouting from and overhanging a long 'table', based on a canni-
balistic patricidal fantasy. In smaller carved or modelled sculptures she
developed a lexicon of mutating 'part objects'—split-off parts of the
body, neither securely male nor female, active or passive, onto which
feelings of seduction or repulsion, pain or pleasure, could be projected.
 Her persistence in using a relatively anachronistic sculptural language,
partly rooted in Surrealist reworkings of 'primitivist' sources, seemed
 increasingly pointed in the 19805 and 19905 as the Modernist impera-
 tive towards formal innovation lost its grip. She was understood as
 speaking in the subversively unsublimated bodily terms which (mascu-
 line) Modernism, with its abhorrence of Surrealist eroticism, deemed
 extra-aesthetic.

Minimalist legacies: sculpture, film, public art
In December 1968 Robert Morris organized an important exhibition
under the Anti Form' aegis called '9 at Castelli's' in the warehouse of Leo
Castelli's gallery. Although Hesse was included, the successes of this
exhibition were Richard Serra and Bruce Nauman, whose works
explored relationships to their bodies that were more mechanistic and
cerebral. Serra's use of industrial materials to carry out actions such as
rolling, folding, and splashing drew on the working-class industrial
roots he shared with Carl Andre, exhibiting a pronounced masculinist
ethos. In Casting, carried out in situ at Castelli's, Serra threw molten lead
into the angled junction between the floor and wall of the space, pulling
the resultant castings away when they hardened and repeating the action
to produce a series of'waves'. This concern with physical operations led
him to examine the way forces were brought into equilibrium by rudi-

expressive resources of sculpture and painting, whilst the logic of
Morris's Minimalism pointed beyond traditional forms. Breathing-

situation persisted until well into the 19705, and sculptural metaphor,
as investigated by the likes of Hesse and Bourgeois, would be revisited

indicated by looking at British sculpture.

defying all that Caro stood for, had been Barry Flanagan, who produced
quirky ensembles of rope and sand-filled hessian sacks. In the 19705

informal placement of stones or sticks in landscape locations. In an
earlier work, A Line Made for Walking (1967), which was recorded in a

escape aesthetic confinement. It was not until the end of the 19703, in
the work of a new generation of sculptors including Tony Cragg,
Richard Deacon, Anish Kapoor, and Bill Woodrow, that the sculptural

Institutional critique: Broodthaers and Haacke
Marcel Broodthaers, based in Belgium, took up visual art in 1964
having previously been a poet. His relations to it were to be profoundly
ambivalent. He had been involved in a spin-off group from CoBrA
and the Belgian Communist Party in the 19405 and 19505 and was crit-
ical of the commercial motivations of much 19605 avant-gardism,
particularly American Pop. For him the Marxist notion of'reification'
(the illusory sense that social relations or values are immutable, which
extends to capitalism's implantation of abstract values in material
goods) was art's defining principle. His characteristic works involved
esoteric exposes of the arbitrary relationships between objects and
signs, in the tradition of the Belgian Surrealist Rene Magritte's famous
depiction of a pipe with the words 'This is not a Pipe' inscribed
beneath. In 1965, for instance, he took two human femur bones, one
male and one female, and painted them the colours of the Belgian and
French flags respectively, obliquely commenting on the way national
characteristics are thought, like gender, to be innate.
    In 1968 Broodthaers participated in a sit-in by artists at the Palais
des Beaux-Arts in Brussels. This inspired his most explicitly political
project—a sardonic dismantling of the notion of the museum and its
functions. It took place between 1968 and 1972 in a series of enigmatic
events and installations manifesting different 'sections' of a fictitious
museum. Possibly the most elaborate 'section', the 'Department of
Eagles', displayed in the Kunsthalle in Diisseldorf in 1972, consisted of
vitrines containing diverse representations of eagles, produced in art,
craft, or commercial contexts and dating 'from the Oligocene to the
present' [84]. The objects were accompanied by signs asserting 'This is
not a work of art'. Acknowledging Magritte as well as Duchamp's
readymades, the declarations implied that museums obscure the ideo-
logical functioning of images via the imposition of spurious value
judgements or taxonomies. Eagles have often symbolized the transcen-
dence of material reality but, like certain museum collections, they have
also signified imperial might.

In 1971 it staged the sixth in a series of international exhibitions
designed to demonstrate a liberal responsiveness to avant-garde devel-
opments. Daniel Buren was invited to exhibit. Part of his contribution
consisted of a huge stripe painting hung from the skylight inside the
building so that it plunged down the central well encircled by the
famous spiral ramp of the gallery. It thereby drew attention to what
Buren perceived to be the peculiarly coercive and mesmerizing effects
of the architecture, which he felt diverted people's attention from the
works on display. On this occasion it was necessary to compete with
the museum itself to make his work Visible'. In the event the
Guggenheim's administration physically removed the work. This was
ostensibly because it impeded the viewing of other site-specific work
by American Minimalists, but given that New York's press had started
to buzz with conservative fears about the anti-institutionalism
condoned by liberal arts organizations, the museum probably simply
used this as a pretext. Buren had touched a sensitive nerve.4
    This was confirmed when Haacke's forthcoming exhibition was
cancelled. It was to have included documentation that the artist had
unearthed in the New York County Clerk's Office relating to the
corrupt dealings of the Shapolsky family, slum landlords who owned
large quantities of Manhattan real estate. Although Haacke's exhibition
was subsequently shown elsewhere, its cancellation provoked Marcel
Broodthaers to withdraw from a Guggenheim show of European artists
in 1972 and to send an elliptical 'open letter' to fellow contributor Joseph
Beuys criticizing him for continuing to participate.5 In 1974 Haacke
delivered a parting shot. He exhibited listings of the corporate and busi-
ness interests of the Guggenheim Board and Trustees in a group
exhibition held in the Stefanotty Gallery, New York. As with much of
his future output, the interests underpinning art's supposedly 'neutral'
institutions were systematically exposed in a dry, pseudo-bureaucratic
presentational style. All in all, this amounted to open warfare. In the
revealing words of the Guggenheim's director Thomas Messer,
Haacke's Shapolsky project had represented 'an alien substance that had
 entered the art museum organism'.6 Perhaps what was at stake was a
'return of the repressed'. The European refusal to separate art from poli-

Primordial returns: Smithson, Land Art, and language
As already stated, many exponents of Arte Povera eyed American
Minimalism with suspicion. However, one US artist schooled in
Minimalist principles shared their concerns with organic meta-
mophoses and the interrelations of landscape and history, namely
Robert Smithson. As one of the first exponents of Land or Earth Art,
he was committed to working with the spaces, materials, and fluctu-
ating conditions of the physical world. In this he represented the
apotheosis of all that the Modernist critic Michael Fried, with his
warnings of art's surrender to 'theatricality', had feared.
     Smithson had strong political motivations and, in line with Haacke
or Buren, he talked in 1972 of wishing to explore the 'apparatus' he was
'threaded through'.11 By this he meant the gallery system with its
hunger for artistic 'commodities', but he saw this as merely an exten-
sion of the larger post-industrial phase of capitalism. Whilst he fell in
with American sculpture's orientation towards 'anti-form' or process,
in dialogue with Minimalism's fixed structures, his synoptic viewpoint
prevented him from perceiving this as simply another aesthetic step
'forward'. If anything, it represented a move backward. Process for him
was annexed to entropy, the principle whereby ordered systems
undergo exponential deterioration or unravelling. Minimalism's
geometries were thus placed under an ecological spotlight. In order to
feed the needs of increasing consumer turnover, the industrial order
that Minimalism had fetishized sanctioned the despoliation of more
and more land. Smithson's response was to create impermanent earth-
works in sites blighted by industrial waste, drawing attention to
cyclical interactions of order and disorder. Reversing Arte Poverds
 alchemical logic, he nurtured a vision of a return to base matter, a
reassertion of nature's rights over man's.
     His most famous work, Spiral Jetty (1970), embodies these entropic
principles. It grew out of wasteland at the edge of the Great Salt Lake
 in Utah where unsuccessful attempts had been made to extract oil from
 tar deposits. At a cost of about 9,000 dollars, provided by New York's
 Dwan Gallery, a crew of workmen with trucks extended a strip of the
 mainland into the lake's pinkish water, forming a spiral measuring
 1,500 by 15 feet. Photographs foster the impression that the structure
 still exists, but it is now submerged. In any case its location was never
 physically accessible to spectators.
     This was a paradox which Smithson exploited. He underlined the
 fictive dimension of the piece by reconstituting it in various registers
 ranging from written and photographic documentation to a film [88].

approximately one square mile near Quemado, New Mexico, a loca-

fDematerialization: Conceptual Art
Walter De Maria's Vertical'Earth Kilometertypifies a conviction, perva-
sive by the mid-ig/os, that thought was as much an artistic material as
any other. Critics certainly perceived the 'conceptual' to be the domi-
nant Zeitgeist. In her important chronicle of the period 1966-72, Lucy
Lippard saw it as unifying practices such as Land Art and 'anti-form' in
a wave of 'dematerialization', predicated on resistance to galleries and
the market.15 Wholesale applicability aside, the term 'Conceptual Art'
had been specifically employed by the Fluxus artist Henry Flynt in 1961
and by Sol LeWitt (see Chapter 5). Its full ratification came, however,
in an essay of 1969 by the American Joseph Kosuth entitled 'Art After
Philosophy'. Here Kosuth identified Duchamp as a historical pivot.
Art before him, he claimed, had been hampered by its physical embod-
iment. After the Duchampian readymade, advanced art's quest
consisted in posing 'analytic propositions' as to what art might be. Its
essential nature was therefore conceptual.16
    Kosuth was making a bid to raise the theoretical stakes in the after-
math of Minimalism. He also took the opportunity to place himself,
alongside the British artists Terry Atkinson and Michael Baldwin, as
the first producer of authentically 'analytic' Conceptual Art in 1966.
Certainly his Art as Idea as Idea series (1966-8), comprising photo-
graphically enlarged dictionary definitions of words such as 'meaning',
were among the first works of the 19603 to assert a strict identity
between verbal concept and artistic form. However, his reading of
Duchamp was narrowly focused on the issue of nomination (the
conferral of art status). It might be argued that, in reducing artworks to
tautologies (self-definitions), he was simply reiterating a Modernist
credo of formal autonomy. Conceptual purity now stood in for optical
refinement.17 He thus ignored questions of art's relations to spectators,
institutions, or dominant modes of production that had led to a more
politicized post-Duchamp sensibility elsewhere. As will be shown, it
was not until the early to mid-1970s that Anglo-American
Conceptualism fully caught up with the political mood of 1968.
    This should not detract from the uncompromising nature of many
of the 'propositions', whether strictly analytic or not, generated by late
19605 American Conceptualists. The dethroning of the art object bred
a kind of puritan iconophobia. Written declarations or documentary
information were offered to audiences in lieu of sensual pleasures.
Lawrence Weiner's short statements gave open-ended instructions for
sculptures that did not require actual realization; A square removed
from a rug in use' (1969) is one example. In certain instances, literal
'dematerialization' was practised. Douglas Huebler announced, in the
catalogue to an exhibition curated by Seth Siegelaub to be discussed
below, that since the world was full of objects, to which he pointed his
audience using maps and diagrams, he would not add more. The same

ffelt that the increasingly discursive nature of art obviated the need to
produce objects. Theory about art could in itself be considered art.
They therefore produced a journal, Art-Language, first published in
1968, which set about dismantling Modernist rhetoric. Its vocabulary
was perversely obscure in order to resist cultural commodification and
to test the 'competencies' of readers rendered intellectually flabby by a
surfeit of'opticality'. But to whom exactly was it addressed? An air of
intellectual sanctimony clung to it. Information theory was newly in
vogue around this time and avant-garde art naturally experimented
with its idioms. In the summer of 1968, while Paris was witnessing the
return of barricades, the ICA gallery in London put on a show entitled
'Cybernetic Serendipity' which explored computer applications within
the arts. The year 1972 saw Art &amp; Language, now expanded to include
a New York contingent, install a computational system of sorts entitled
Index 01 as their contribution to the Kassel Documenta exhibition. It
consisted of eight metal filing cabinets on four grey blocks surrounded
by walls papered with an index. Spectators were invited to cross-refer-
ence some 350 texts assembled by group members to detemine levels of
logical congruence or discrepancy. They thus participated in the
group's sifting of ideological cant.
    It could be argued that Index 01 was insufficiently ironic in its repli-
cation of the structures of state administration. The art historian
Benjamin Buchloh has detected a kind of double-think at work in such
projects. Whatever their working-class roots and Marxist sympathies,
he argues that artists such as Art &amp; Language were unwittingly estab-
lishing their radical kudos using the signifiers of the (middle)
managerial class to which they had in fact acceded.20 On the alternative
view, as cultural producers Art 8c Language dissolved their status as
individual artist-geniuses in a model of collectivity, while radicalizing
an audience habituated to passive contemplation.21 In the latter respect
Art &amp;, Language were particularly influential in placing theory on the
agenda in Britain's notoriously conservative art schools, having
pioneered a controversial course at Lanchester Polytechnic, Coventry,
in 1969-71. From this point on, few self-respecting art tutors or
students could persist in seeing art as unmediated expression.

The rise of semiotics: Burgin and Conceptualism
Other British Conceptualists saw Art &amp; Language's allegiance to
analytic philosophical procedures as verging, like Kosuth, on covert
formalism. Victor Burgin in particular saw photography as a means to
a more productive social engagement. He was aided in this by the
French writer Roland Barthes's Elements of Semio/ogy, published in
English in 1967. Barthes's contribution to literary theory had partly
consisted in adapting the findings of the Swiss linguist Ferdinand de
Saussure whereby, in language, the relation between 'signified (word or

f   The assimilation of such ideas led to an easing of the Conceptualist
embargo on visual imagery, and 'representations' now stood to be
investigated as repositories of social information. In this respect,
Burgin partly conceived his role in educational terms. Along with
theorists from disciplines such as film studies and sociology, he helped
pioneer 'cultural studies' as an alternative to 'art history' in British
polytechnics. The prevailing assumption was that 'Fine Art' produc-
tions were no more worthy of analysis than other cultural artefacts.
Burgiri gave such principles practical emodiment. Possession of 1976
[92] was a mock advertisement, produced in an edition of 500 and fly-
posted around Newcastle-upon-Tyne. It deftly redeployed the genre's
linguistic and photographic tropes to show how the longing for
'possession', on which advertising plays, assumes incompatible eco-
nomic and gender relations.

whose operations needed to be 'exposed'. This attitude was shared by
the Californian Conceptualist John Baldessari, who, having gradually
moved from text- to photo-based work through the 19705, produced
photo-assemblages in the mid-1980s which disrupted the integrity of
photographic space or narrative by recombining or reshaping images
from sources such as films or newspapers, deleting areas, and adding
colour overlays. Such active inroads into visual currency echo the
Situationist-style institutional interventions that were discussed
earlier. Baldessari was not overtly political, but other Conceptualists
based in California in the early 19705, such as Martha Rosier and Allan
Sekula, eventually embarked on stringent critiques of photographic
reportage conventions from a left-wing standpoint. Burgin's practice

                                  Gender positions: feminism and art
                                  Victor Burgin's male self-questioning paralleled the rise of radical
                                  feminism. As the 19705 progressed, women powerfully contested the
                                  cultural stereotypes attached to traditional childbearing or domestic

                                  American artist based in Britain, whose work systematically used
                                  Conceptualist devices to probe the social foundations of gender condi-
                                  tioning. However, Kelly's work departed significantly from overtly
                                  separatist feminist practices. These, as exemplified by the Californian
                                  Judy Chicago, celebrated the rediscovery of an essential 'feminine'
                                  consciousness. To understand first what Chicago stood for it is worth
                                  examining The Dinner Party [94].
                                     This enormous installation, which drew record crowds when first
                                  exhibited at San Francisco's Museum of Modern Art in 1979, consisted
                                  of a triangular table with places set with ceramic vulvas and embroi-

                                  The work had two central functions. It rehabilitated talents overlooked

freorientation of art history in the 19705 associated with writers such as
Linda Nochlin in America and Griselda Pollock in Britain. At the
same time its emphasis on 'applied arts' productions drew attention to
women's frequently anonymous cultural participation, questioning
aesthetic hierarchies.
     Male critics responded rather predictably. Robert Hughes, for
instance, described the work as 'mainly cliche ... with colours worthy
of a Taiwanese souvenir factory'.24 The point was that decorative
excess, bordering on kitsch, was being deliberately flaunted in the face
of a renunciative 'masculinist' modernism. 'Sisterhood' replaced the
image of the alienated male outsider. Along with the artist Miriam
Schapiro, Chicago set up a Feminist Art Program at the University of
California in 1971, which led to 'Womanhouse', a collaborative project
in which teachers and students occupied an abandoned house,
creating environmental works exploring domestic creativity. At the
same time artists such as Faith Ringgold, a black American whose
feminism was also informed by racial marginalization, contributed to
the continuity of folk practices such as quilt-making. However, it
should be noted that, although The Dinner Party was realized with the
aid of numerous helpers, Chicago retained sole authorship of it. She
diligently displayed her co-workers' names, but kept certain hierar-
chies in place.
     A controversial aspect of the work was its vulvic iconography. This
was part of a genre of 'central-core' imagery, promoted by critics such as
Lucy Lippard, which aimed to dislodge the cultural primacy of the
phallus, rehabilitating the sign of women's biological 'lack' (to invoke
Freud's discredited terms) as the symbol of their creativity. The work
possibly echoes Louise Bourgeois's cannabilistic installation Destruction
 of the Father, discussed in Chapter 5, which was shown in New York in
 1974, the year The Dinner Party was begun. But there is a sense in which
 Chicago turns Bourgeois's symbolic consumption of the patriarch into
 celebratory female self-consumption, which clearly has erotic under-
 currents. The nature of the work's address thus becomes ambiguous.
 Indeed, many women found it reductive, implicitly returning them to
 biology.
     This was certainly Mary Kelly's view. Her Post-Partum Document,
 produced between 1973 and 1979, was concerned with recording her
 relationship with her son during his weaning, but pointedly
 renounced corporeal imagery in favour of 135 framed items such as
 diagrams, texts, and traces from the body (faecal smears on nappy
 liners) [95]. Polemically countering the 'essentialist' view that gender
 is biologically determined, Post-Partum Document grew out of Kelly's
 participation in a London women's group dedicated to examining the
 sexual division of labour. With child-rearing as her theme, she
 became deeply affected by Juliet Mitchell's book Psychoanalysis and

184 THE DEATH OF THE OBJECT: THE MOVE TO CONCEPTUALISM
fFeminism (1974), which introduced English speakers to post-Freudian
accounts of the dawning of gendered subjectivity. Most influentially it
explained how the French psychoanalyst Jacques Lacan had reinter-
preted Freud's unconscious 'rite of passage', the Oedipus complex, as
allegorizing the unequal accession of boys and girls to patriarchal
language. He had thus made socializing forces of Freud's notorious
anatomical markers of sexual identity—penile 'possession' and 'lack'.
The phallus became symbolic rather than literal. Using such ideas,
Kelly produced a painstaking record of maternal separation. After a
pre-Oedipal phase during which mother and child were united, her
son's linguistic initiation gave him a 'positive' relation to the phallus
while she was returned to the condition of 'lack' originally inscribed
by her gender.
    Kelly's work brilliantly tracked gender's linguistic basis. One of the
six sections of the work records early 'conversations' between mother
and child. Shown his own reflection in the mirror, the child introjects
the paternal position: 'da/da-/da-da'. Elsewhere the work raises fasci-
nating questions about the relation between creativity and
procreativity. Interrogating the psychoanalytic platitude that, in
raising babies, women compensate for their phallic lack, Kelly hypoth-
esized a form of female fetishism, turning her child's imprints, clothes,
or gifts into compensatory tokens which were exhibited in taxonomic
style. These fetishes asserted that, far from succumbing to imaginary
identifications, women could attain symbolic distance from procre-
ation, becoming cultural as well as natural producers.
    Apart from provoking feminist objections that it capitulated to
male-centred theory, Kelly's work was considered dauntingly abstruse.
Her defenders appealed to the Brechtian ideas promoted in Britain in
the 19705 by Screen, a politicized journal dedicated to film theory. In the
19305 Bertold Brecht had mounted Marxist arguments for an anti-
realist art which, rather than 'naturalizing' societal norms, which were
profoundly 'unnatural', made its audience conscious of its devices.25
However the Kelly-inspired 'scripto-visual' art that followed such
precepts, showcased most prominently in the exhibition 'Difference:
On Representation and Sexuality' at New York's New Museum of
 Contemporary Art in 1984, could be seen as having a moralizing
undercurrent. Visual pleasure, associatively linked to a world where
men traditionally did the looking whilst women's bodies were 'objecti-
fied', was considered suspect.26 This 'politically correct' attitude tied in
with Kelly's moritorium on bodily depictions.

uralist philosopher Jacques Derrida.27 Derrida saw a 'metaphysics of
presence' as endemic to Western thought. His 'deconstructive' stra-
tegy, aimed at eroding the bourgeois certainties bound up with this,

with the 19705 music industry, they were antagonistic towards the mass

 mimicked the 'Voice of Authority'. The elliptical anecdotes it

194 THE DEATH OF THE OBJECT: THE MOVE TO CONCEPTUALISM
f   In other areas of 19805 art the longstanding dialogue between
photography and performance tilted decisively in favour of the former,
prioritizing performance's fictive nature over its capacity for 'presence'.
This 'postmodern' turn is exemplified by Cindy Sherman, to be
contextualized more fully later, who 'performed' herself acting out
other female personae in photographs. Both 'Cindy Sherman' as
author and the existence of any originary 'performances' were opened
up to doubt [101]. A similar concern with 'masquerade' came to
permeate much photography of the 19905. A notable example is the
work of Matthew Barney, whose persona, in terms of not just gender
but also species identity, was shown to be manifestly 'constructed'
[130].
    If Mary Kelly had worried that Body and Performance Art would
summon up a new artist-subject to gratify bourgeois needs, it seems
that much of it succeeded in rendering this subject elusive and unfixed.
However, whether the work mounted any real challenge to the artist's
status within commodity culture remains open to debate. Much
Performance Art of the 19705, in line with the other tendencies
discussed in this chapter, implicitly repudiated the art object's position
within capitalism. But, as will be shown, rather than dematerializing
itself further, art at the turn of the 19803 largely underwent a 'remateri-
alization'. It might be concluded from this that the post-1968
avant-garde project, however innovatory its forms, simply failed. In
fact, as the next chapter explains, it had to weather a political and
cultural sea-change.

ff                Postmodernism:
                Theory and Practice
                in the 1980s

                Historians generally regard the years 1973-4 as a turning-point in the

 7              postwar economic fortunes of Europe and America. After a 'golden
                age' which had lasted from 1950, an era of instability set in. Rising oil
                prices, in the aftermath of the Arab-Israeli war, caused Europe's
                economies to become inflated and to go into recession in 1973-4 and
                again in 1979—83. Different financial conditions led to changes in
                industrial organization. The previous Fordist model of integrated
                production began to give way to flexible (e.g. short-term) contracts,
                the decentring of output ('outsourcing' of plants), and increased
                mobility of capital across international markets. Companies expanded
                globally as service industries such as computing replaced the old
                manufacturing concerns. All in all, a phase of 'late capitalism' appeared
                to be underway. Whereas previous monopoly or imperialist phases of
                capitalism had been linked to cultural modernism, late capitalism was
                to be seen as synonymous with a 'postmodern' epoch.1
                    One of art's key changes was the loss of any overall sense of an avant-
                garde project. If this book has taken the self- referring Modernist
                aesthetics of Greenberg and Fried to be the horizon against which
                postwar avant-gardes defined themselves, the social and economic
                changes of 'postmodernity' bred a pluralist cultural ethos in which
                artistic practices proliferated without any agreed goals. Art objects
                became cultural products among others, rather than catalysts for social
                or aesthetic values. Some practices certainly maintained the opposi-
                tional stances of the period around 1968. But it became harder for art to
                achieve any adversarial distance from the social mechanisms into which
                it was merged. This chapter will frequently return to that struggle.

                Theories of the postmodern
                The notion of the postmodern had had some currency among cultural
                theorists in the early 19705. The American-based literary critic Ihab
                Hassan applied the term to a swathe of artistic experimentalists
                ranging from Duchamp and Cage to writers such as Thomas Pynchon.
Detail of 117

fernist' works from their 'modernist' counterparts. For instance, the
latter were said to privilege depth and determinacy whilst the former
prioritized surface and indeterminacy.2 Such crude oppositions are far
from watertight. Recalling the dual definitions of modernism outlined
in Chapter i, indeterminacy could easily be seen as a 'modernist'
concern, indicative of responses to social modernization. By the same
token, it is 'Modernism' (capital M), as denned by Greenberg, which
most clearly privileged origins or 'essences', whereas late 'modernists',
such as Yves Klein, often undermined authorial presence. Whilst
certain opponents of Modernism may certainly have been proto-post-
modernists (Rauschenberg, as noted earlier, was perceived as such by
Leo Steinberg in 1972), a more sophisticated model of cultural change
is required to make the term meaningful.
    Another early exponent of the notion was the British architectural
critic Charles Jencks. In The Language of Post-Modern Architecture
(1977) he announced grandly that modern architecture had 'died' in St
Louis, Missouri, on 15 July 1972 at 3.32 p.m., when much of the noto-
rious Pruitt Igoe housing scheme was dynamited.3 Celebrating the
demise of the austere 'functionalist' ethos of modernist architecture, he
argued polemically for an eclectically 'postmodern' play of stylistic
quotations cross-fertilizing modernist forms with previous historical
idioms. His model was primarily aesthetic but by the 19805 it was
linked to a neo-conservative rhetoric which trumpeted the virtues of
incr</span><span data-dcnode-id="449" instrument_node="">eased choice in a less socially stratified society. The crucial shift
from an aesthetic to a societal model of the postmodern came, however
with the French philosopher Jean-Francois Lyotard's The Postmodern
 Condition, first published in I979-4
     Lyotard's book replaced the play of styles with a thoroughgoing
 cultural relativism. According to Lyotard, the 'grand narratives' that
 had informed Western societies since the Enlightenment (in other
words since the eighteenth century, when European philosophers such
 as Kant and Rousseau had laid the intellectual foundations for
 modernism) could no longer sustain credibility. These abstract systems
 of thought, by which social institutions validated themselves, were
 infused with ideals of'social perfectibility' or 'progress'. (In terms of
 modern art, Greenberg's aesthetic Modernism might be considered a
 'grand narrative' of sorts.) Societies now generated a profusion of
 'language games'. Institutions and businesses spoke to differing social
 interests, differing desires and concerns.
     These ideas chimed in with the political changes of the period. The
 year 1979 saw Margaret Thatcher accede to power in Britain, followed,
 in 1981, by Ronald Reagan in America. This sharp swing to the polit-
 ical right heralded policies of economic deregulation and an allied
 relativization of values. Thatcherism, for instance, promoted the idea
 of an 'enterprise culture' predicated on personal (and entrepreneurial)

198 POSTMODERNISM: THEORY AND PRACTICE IN THE 19805
finitiative rather than social cohesion. These were hardly Lyotard's
politics. His philosophies derived from Marxist roots. Yet the bitter
lessons learnt from 1968 and post-Stalinist repression had suggested to
him. that Marxism was unworkable. It was another unwieldy 'grand
narrative'. Like the French philosopher Michel Foucault, he welcomed
the dissolution of the Enlightenment legacy. The 'micro-polities' of
groups such as ecologists or feminists seemed preferable to monolithic
causes.
    Lyotard's views ran counter to those of another influential philoso-
pher of the Left, the German Jiirgen Habermas. In a lecture of 1980
Habermas acknowledged that modernist ideals seemed unsustainable
but argued nevertheless for a continuation of the Enlightenment
project. For him, art, science, and morality had to remain as specialized
'narratives' while last-ditch efforts were made to create bridges
between them.5 In so far as the notion of avant-garde opposition to
normative culture persisted in the years to come, Lyotard's and
Habermas's positions broadly underpinned differences of standpoint.
But if artists were to endorse either 'postmodernist' pluralism or
'modernist' totality, how were they to separate themselves from the
historical process? If culture is in a 'postmodern phase', then art must
inevitably be symptomatic of this. The American literary critic Fredric
Jameson certainly thought so. His highly influential essay of 1984,
'Postmodernism, or the Cultural Logic of Late Capitalism', argued
that culture's destiny was inextricably bound to capitalism's.6
    Jameson asserted that aesthetic and commodity production had
become indistinguishable. Technologies of reproduction (such as tele-
vision) had replaced technologies of production. Art was increasingly
 sponsored by commercial companies, leading to a new interdepen-
 dence of art and advertising. Subsequent commentators noted that
 avant-gardism was now a commercial signifier rather than a deeply
 rooted position. Social levelling had caused shifts in class values. The
 refined cultivation of the aristocracy or the principled militancy of the
working classes, to which the avant-garde had once appealed, had
 become absorbed into an undifferentiated consumerist philistinism.
 Since enshrined academic principles and moral pieties also no longer
 posed any opposition, to whom could the avant-garde speak? As we
 shall see, gender and identity politics continued to be key issues for
 artists, but such concerns were socially decentred.
     The main thrust of Jameson's analysis, however, was an account of
 the mind-set underlying the cultural products of postmodernism.
 Using Warhol as an early example, he talked of an emotional numbing
 or 'waning of affect' as characterizing postmodern subjectivity.
 Whereas modernism had frequently invoked the artist's inner 'depths'
 as a bulwark against an alienating external world, a 'new depthlessness'
 seemed to haunt recent art. Artists now manipulated visual surfaces

                                         T H E O R I E S OF THE P O S T M O D E R N   199
fand codes, assuming that their sensiblities were formed out of repre-
sentations rather than 'prior' to them in any sense. Most dramatically,
Jameson adapted the thought of the French social theorist Jean
Baudrillard to evoke the 'schizophrenic' effects of an autonomous
sphere of social sign production where signiners had become detached
from their referents and existed in 'free play' as de-realized 'simulacra'.7
Artists were left with a 'rubble of distinct and unrelated signiners' and
an accompanying loss of temporal coordinates.8 A culture of 'retro'
styles confirmed the loss of'authentic' historical awareness. Similarly,
whilst parody had been a weapon of the beleagured modernist,
'pastiche', described by Jameson as 'speech in a dead language', was
now the order of the day.
    This is apocalyptic stuff, more applicable perhaps to the experience
of Los Angeles than large areas of Europe. When, slightly later, the
theorist David Harvey related such effects to insidious forms of'space-
time compression', brought on, for instance, by the way global
communications collapse space into an accelerated temporal dimen-
sion, they seemed slightly more feasible.9 However, one way of testing
Jameson's theories is to measure them against the art that directly
preceded them.
    The American artist Cindy Sherman, earlier described as 'post-
modern', is relevant here. Emerging in New York in the late 19705 with
Pop, Conceptualism, and Body Art as her expressive resources, her first
important works, a sequence of 69 Unfitted Film Stills, were produced
between 1977 and 1980 [101 ]. Ideally they should be seen en masse since
 she appears in all of them, threading her persona through codes of
clothing, lighting, setting, and composition filched from 19505
American B-movies. Appearing as a film-star lookalike, a flirtatious
 college student, a defiant housewife, she tips her hat to feminist
 debates, establishing femininity as a 'construct' rather than something
 'innate'. But it is Sherman's assertion that representation itself is
 already pre-coded (via cinematic tropes in this instance) that seems to
 gel with Jameson's talk of pastiche, surface effects, and disconnected
 signifiers. Sherman's images are uncannily simulacra!, referrable to no
 external 'origins'. Photography thus becomes the ideal postmodernist
 medium, freezing the ostensibly real as a sign.

f     From 1982 onwards Holzer periodically paid to have messages
flashed across electronic billboards. Hence, in 1985-6 the message
'Protect me from what I want' (part of her Survival series) hovered

     Another American artist, Barbara Kruger, used similar strategies,
recapitulating Victor Burgin's parodic advertisements with striking
juxtapositions of photography and text echoing 19205 and 19305 polit-

Alexander Rodchenko. Like Holzer's, her texts hijacked an authori-
tarian voice but levelled accusations at nameless adversaries from the
vieAvpoint of the oppressed or marginalized. In Unfitted (1981) a
photograph of a carved female bust is captioned 'Your gaze hits the

immobilization of women in social spaces dominated by male
looking. As this work implies, as Kruger took possession of the voice
of power, so she, at some level, became 'possessed'. She inevitably
became entrapped both in representation and in the mass media's

 to other Voices', ironically fell prey to Jameson's postmodern merging
 of art into commerce.

fThe 'postmodern sublime': permutations of photo-painting
If attempts to assert the moral superiority of photo-related practices
over painting rang hollow, it was arguably when photography and
painting converged that the most challenging forms of postmodern art
resulted. In 1981 the artist and critic Thomas Lawson asserted that,
whereas the art promoted by the journal October sometimes appeared
smug in its marginality, painting, with its greater public visibility,
perversely held out greater critical potential. Demanding a kind of
blind faith, it could attain a degree of irony that photography's more
straightforwardly declarative imagery lacked.21 Lawson mainly cited
the work of the American David Salle, but may easily have had in mind
artists such as Malcolm Morley, Eric Fischl, and Gerhard Richter. In
their different ways, they continued to affirm a discredited medium.
However, rather than reviving past rhetorical strategies in the manner
of the Neo-Expressionists, they acknowledged that painting had to
interface directly with photography and its conventions.
    This applies almost literally to Malcolm Morley. A British-born
painter who had worked in America since 1958, Morley had pioneered
a form of 'photorealism' (also dubbed 'hyper'- or 'super-realism') in
America in the mid-1960s, producing images such as SS Amsterdam in
Front of Rotterdam (1966) which were painstakingly transposed from
photographs. In the early 19703 other artists achieved critical and
commercial success from related practices. Painters such as Philip
Pearlstein, Chuck Close, and Richard Estes translated the pictorial
plenitude of photographs into glossy painted surfaces, densely encoded
with visual information. At the same time the sculptor Duane Hanson
made uncanny direct-cast replicas of live figures, painting them illu-
sionistically and dressing them in actual clothes.
    As photorealism became fashionable, however, Morley grew frus-
trated with his seamless surfaces. This is dramatized in The Ultimate
Anxiety (1978 ) [109], in which a depiction of a train cuts incongruously
across an image transposed from a postcard reproduction of a painting
by the Venetian master Francesco Guardi. This work relates to other
'catastrophe' pictures Morley produced at this time such as The Day of
the Locust (1977), in which a Pop-like replication of the cover of the Los
Angeles Yellow Pages appears to be eaten away from the inside by
swarms of imagery. Morley produces a refreshingly direct response to
the cutural relativism of his times. But he also dramatizes the peculiar
sense of dislocation which arises as different orders of representation
intrude upon one another.
    The American artist Eric Fischl's painterly realism might appear
anachronistically descriptive but his works were also riven internally by
divergent modes of representation linked to photography and film.
The flat literalness of Fischl's paint handling, along with certain
 compositional devices, partly derived from the 19205 and 19305

Art and difference
The above suggests that, even at its most self-consciously historicist,
painting of the 19805 sometimes succumbed to an apocalyptic sense of
the postmodern (or what Jameson called an 'inverted millenarianism').
In this it ran the risk of appearing to languish, symptomatically, in a
putative 'postmodern crisis'. This was compounded by the status of
artists such as Morley or Richter, who, being male, white, and finan-
cially secure, could be interpreted as relatively immune from more
pressing crises such as social marginalization or deprivation. This once
more raises the question: to what extent could postmodern art claim
any critical distance?
    Among certain commentators, many of whom questioned the
'totalizing' tenor of Jameson-style theory, there was a tendency to
identify the theme of difference as grounds for a more ethically
oriented art practice. It is important to remember that, as far back as
the 19605, post-Structuralist conceptions of an internally divided,
gendered human subject had undermined modernist assumptions that
it is possible to invoke a 'universal' human nature. Theorists such as
Barthes, and later Derrida, had demonstrated that verbal structures in
occidental cultures are built around binary oppositions: positive/nega-
tive, presence/absence, masculine/feminine, black/white. Since, in
each case, one term is privileged in contrast to its negatively tinged
'other', difference becomes something inscribed both linguistically and
ideologically. We have seen how this realization informed the feminist
art of, say, Mary Kelly or Barbara Kruger. But further permutations of
difference affect people's subject-positions in European and North
American cultures, notably class and race.26 'Identity polities' therefore
constituted an arena for less self-referential forms of art.
    Having parted company with the British Art &amp; Language group in
the early 19705, Terry Atkinson had, by the mid-ig/os, moved away
from their stringent Conceptualism to explore his working-class
heritage in a set of 'history paintings'. In his First World War series
(£.1974—81) he reinterpreted photographs of troops taken during the
Great War, using a strategically 'botched' drawing style and satirical
captions. He thereby encoded a critique of the way working-class
labour was mobilized for capitalist warfare. By 1984-5 such explo-

works the critical appraisal of such permutations became an ethical
prerequisite.

Simulation and abjection: the late 1980s
If identity-related art inherited something of the modernist avant-
garde's claims to moral authority, an entirely antithetical tendency
emerged in New York during the 19805. Encompassing artists such as
Ashley Bickerton, Haim Steinbach, and Jeff Koons,</span><span data-dcnode-id="448" instrument_node=""> its forms relied
heavily on Duchampian and post-Pop mergers between art objects and
commodities. The label it acquired around 1986, 'Neo-Geo', was only
really applicable to Peter Halley, a painter who coolly readjusted formal
devices from Modernist abstractions to reveal latent technocratic
metaphors. Halley, however, took it upon himself to theorize the
tendency, partly placing it under the aegis of the French sociologist
Jean Baudrillard, who, as noted earlier, perceived the ominous collapse
of distinctions between 'reality' and 'simulation' as intrinsic to the
market-led world of late capitalism.27 With 'simulation' as its core
principle, therefore, this art was bound to antagonize artists and critics
concerned with the 'authenticity' of identity struggles.
    Of all the simulationists Jeff Koons most offended against 'politi-
cally correct' proprieties. His blithe acquiescence to consumerism was
first manifested in 1980 with the presentation of off-the-shelf vacuum
cleaners, in Plexiglas vitrines, as seductive items of display in the
window of New York's New Museum of Contemporary Art. After a
period working, appropriately enough, as a broker on Wall Street, he
achieved notoriety, and considerable market success, with a series of
exhibitions showing batches of work with unmistakably ironic titles;
'Equilibrium' (1985), 'Luxury and Degradation' (1986), and 'Banality'

f   Although nothing directly comparable could be found in Europe,
the British artist Helen Chadwick echoed American concerns with the
body's integrity and boundaries. Chadwick came to prominence in
1986 with the installation Of Mutability at London's ICA. Its main
component was the 'Oval Court', a low, centrally-placed platform on
which blue photocopies of parts of Chadwick's body, animal cadavers,
and vegetable matter were jigsawed together to produce a representa-
tion of a 'pool' containing floating and swimming bodies. Chadwick
made complex allusions to Vanitas' emblems and Baroque iconog-
raphy, showing herself, in multiple emanations, engaged in a sensual
immersion in nature's cycles of fruition and decay.31 By the early 19908
she was producing works such as Loop My Loop, a back-lit cibachrome
photograph of a sow's intestines intertwined with braids of blonde hair
[121]. Such works challenged conventional dualisms such as bestial
and human, base and ideal, body and mind. Ultimately, the body's
internal economy superseded the external, consumer-driven one. The
impulse was perhaps solipsistic, or narcissistic, but it answered a
yearning for experiential authenticity in the face of an increasingly
mediated reality.

Installation as a paradigm
Many key works by Gober, Kelley, and Chadwick were installations.
At the turn of the 19905 no one medium dominated Western art
production, but installations were made by many practitioners at one
time or another. The medium's history has been threaded through this
book, with Duchamp's EtantDonnes and Robert Morris's Minimalist
shift from a stress on the self-containment of the art object to its phys-
ical location as defining points [69]. Between 1987 and 1991 it served
the needs of varying agendas. In 1987 the British artist Richard Wilson,
who specialized in the medium, produced 20/50 [122], now perma-
nently installed in London's Saatchi Collection, in which the viewer
walks along a kind of enclosed jetty surrounded, at waist height, by an
immense steel trough containing an expanse of impenetrable, gluti-
nous sump oil. The effect is profoundly disorientating.
    By contrast to Wilson's late modernist exploration of phenomeno-
logical paradox, 1991 saw a younger British artist named Damien Hirst
produce a striking analogue for the relationship between aesthetic and
lived experience. Wilson's installation had been designed for its loca-
tion (site-specific), but Hirst's In and Out of Love [123], located in a
makeshift gallery space in Woodstock Road, London, temporarily
brought together a variety of disparate 'materials'. It also required the
spectator's physical movement. In an upper room the cocoons of exotic
butterflies were attached to large white canvases. Heat from radiators
and plants in 'window boxes' at the bases of the canvases encouraged
them to hatch and flourish briefly. In a lower room a myriad of

                decline of the Soviet Union, whose unsuccessful involvement in
                Afghanistan echoed America's failed intervention in Vietnam, but also
                Europe's growing susceptiblity to religious or atavistic tendencies.1
                Whilst the Cold War opposition between capitalism and Communism
                had previously set the terms for post-1945 Europe, Russia's decline
                heralded the emergence of new historical forces.
                    In 1989 the Eastern bloc began splintering, reconfiguring Europe's
                political structure and opening the floodgates for factional struggles
                which are still underway. The most potent symbol of all was the
                dismantling of the Berlin Wall in November, presaging German reuni-
                fication. Suddenly Eastern European artists became visible in the
                West, commenting on regimes they had left and underlining the
                West's complacencies. A leading figure here is Ilya Kabakov. One of an
                influential group of Moscow Conceptualists working in the 19705 and
                19805, he quickly gained notoriety in Western Europe for his installa-
                tions. These included The Toilet, installed as an outbuilding at Kassel's
                Documenta 9 exhibition of 1992. It consisted of a full-scale replica of
                the dingy public toilets found in the Russian provinces, with the adja-
                cent men's and women's sections turned into the living-room and
                bedroom of a typical Soviet two-room apartment. It thus commented
                sardonically on the way collectivism in Russia was giving way to priva-
                tization and on the dislocations of 'public' and 'private' involved for
                ordinary people.

                art audiences. This was true also of Zofia Kulik, a Polish artist who
                received widespread exposure in the West. In elaborately constructed
                photo-works she explored images of masculinity, fetishistically juxta-
                posing naked men in heroic or martyr-like poses with military and
                religious emblems, and thereby interrogating the peculiar gender arche-

The British art revival
Paradoxically, Britain's traditional public indifference towards the
visual arts had, at the start of the 19905, provided the impetus for an
artistic revival. In the face of limited outlets for their work, a group of
students then studying at Goldsmiths College, London, decided to
turn the entrepreneurial ethos of Thatcherism to their advantage. Late
in 1988 Damien Hirst persuaded the London Docklands Development
Corporation to allow him and his friends to use an abandoned building
to stage a three-part exhibition titled 'Freeze'. As with later Hirst
initiatives, such as In and Out of Love [123], this pragmatic bypassing of
the regular professional procedures quickly attracted commercial

    By contrast to many among the critical intelligentsia, the critic John
Roberts argued that the new British art, or at least the more localized
working-class variants which he supported, possessed a number of
distinctively new attributes. Most significantly it represented a reac-
tion against the intellectual obscurantism of critical postmodernism,
promoting strains of strategic 'philistinism' and proletarian 'disaffir-
mation'.6 All in all, Roberts argued, a generation seemed to be
emerging which, rather than forging worthy links between 'high' and
'low' cultural spheres like their postmodernist forebears, unselfcon-
sciously accepted the pleasures of the demotic.
    Whatever its street credibility, British art of the early 19903 often
possessed a curiously anachronistic sensibility. Although Hirst's art,
like that of his contemporaries Dinos and Jake Chapman, cultivated a
deliberately 'laddish' disrespect for the politically correct attitudes of
the 19803, it simultaneously harboured a quasi-Victorian fascination
with death and taxonomic specimens. Hirst's 'Victorianism' is empha-
 sized in Away'from the Flock (1994), where the single sheep preserved in
formaldehyde is a distant cousin to the straying sheep in the British
Pre-Raphaelite painter Henry Holman Hunt's The Hireling Shepherd
 (1851). This suggests that, like its nineteenth-century predecessor, the
 art of this fin de siecle had a rather morbid, backward-looking streak.
 Even the prevalence of video in the 19905, which might suggest an
openness to mass-media forms or technological adaptability, partly
 supports this.
