</span><p data-dcnode-id="4716"><span data-dcnode-id="4738" instrument_node="">Medieval religious </span><a data-dcnode-id="4736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Illuminated_manuscript" title="Illuminated manuscript"><span data-dcnode-id="4737" instrument_node="">illuminated manuscripts</span></a><span data-dcnode-id="4735" instrument_node=""> combine text and images. Among these books are the </span><a class="mw-redirect" data-dcnode-id="4733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gospel_book" title="Gospel book"><span data-dcnode-id="4734" instrument_node="">Gospel books</span></a><span data-dcnode-id="4732" instrument_node=""> of </span><a data-dcnode-id="4730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Insular_art" title="Insular art"><span data-dcnode-id="4731" instrument_node="">Insular art</span></a><span data-dcnode-id="4729" instrument_node="">, created in the monasteries of the </span><a data-dcnode-id="4727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British_Isles" title="British Isles"><span data-dcnode-id="4728" instrument_node="">British Isles</span></a><span data-dcnode-id="4726" instrument_node="">.  The graphics in these books reflect the influence of the </span><a data-dcnode-id="4724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Animal_style" title="Animal style"><span data-dcnode-id="4725" instrument_node="">Animal style</span></a><span data-dcnode-id="4723" instrument_node=""> associated with the "</span><a data-dcnode-id="4721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barbarian" title="Barbarian"><span data-dcnode-id="4722" instrument_node="">barbarian</span></a><span data-dcnode-id="4720" instrument_node="">" peoples of Northern Europe, with much use of </span><a class="mw-redirect" data-dcnode-id="4718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Interlace_%28visual_arts%29" title="Interlace (visual arts)"><span data-dcnode-id="4719" instrument_node="">interlace</span></a><span data-dcnode-id="4717" instrument_node=""> and geometric decoration.
</span></p><span data-dcnode-id="4715" instrument_node="">

</span><h2 data-dcnode-id="4617"><span data-dcnode-id="4627" id="The_Qur.27an"></span><span class="mw-headline" data-dcnode-id="4625" id="The_Qur'an"><span data-dcnode-id="4626" instrument_node="">The Qur'an</span></span><span class="mw-editsection" data-dcnode-id="4618"><span class="mw-editsection-bracket" data-dcnode-id="4623"><span data-dcnode-id="4624" instrument_node="">[</span></span><a data-dcnode-id="4621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_graphic_design%26action%3Dedit%26section%3D3" title="Edit section: The Qur'an"><span data-dcnode-id="4622" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4619"><span data-dcnode-id="4620" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4616" instrument_node="">
</span><p data-dcnode-id="4607"><span data-dcnode-id="4615" instrument_node="">In Islamic countries, calligraphy was a sacred aspect of the holy book of Islam, the </span><a class="mw-redirect" data-dcnode-id="4613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Qur%2527an" title="Qur'an"><span data-dcnode-id="4614" instrument_node="">Qur'an</span></a><span data-dcnode-id="4612" instrument_node="">. Muslim scribes used black ink and golden paper to write and draw, using an angled alphabet called Kuffi, or Kufi. Such writings appeared in the 8th century and reached their apex in the 10th century. Later, decorations of the margins of pages, displaying a variety of graphic techniques, were added in order to beautify the book. In the 12th century, the Naskh alphabet was invented; it featured curves instead of the angled lines of Kufi script. Other styles, such as Mohaghegh, Reyhan, Sols, Reghaa, and Toghii, appeared later on.</span><sup class="reference" data-dcnode-id="4609" id="cite_ref-4"><a data-dcnode-id="4610" href="#cite_note-4"><span data-dcnode-id="4611" instrument_node="">[4]</span></a></sup><span data-dcnode-id="4608" instrument_node="">
</span></p><span data-dcnode-id="4606" instrument_node="">

</span><h2 data-dcnode-id="4533"><span class="mw-headline" data-dcnode-id="4541" id="Calligraphy"><span data-dcnode-id="4542" instrument_node="">Calligraphy</span></span><span class="mw-editsection" data-dcnode-id="4534"><span class="mw-editsection-bracket" data-dcnode-id="4539"><span data-dcnode-id="4540" instrument_node="">[</span></span><a data-dcnode-id="4537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_graphic_design%26action%3Dedit%26section%3D4" title="Edit section: Calligraphy"><span data-dcnode-id="4538" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4535"><span data-dcnode-id="4536" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4532" instrument_node="">
</span><ul class="gallery mw-gallery-traditional" data-dcnode-id="4464"><span data-dcnode-id="4531" instrument_node="">
</span><li class="gallerybox" data-dcnode-id="4509" style="width: 215px"><div data-dcnode-id="4510" style="width: 215px"><span data-dcnode-id="4530" instrument_node="">
</span><div class="thumb" data-dcnode-id="4526" style="width: 210px;"><div data-dcnode-id="4527" style="margin:15px auto;"><a class="image" data-dcnode-id="4528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASchedel_register.jpg"><img alt="" data-dcnode-id="4529" data-file-height="713" data-file-width="500" decoding="async" height="180" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/a0/Schedel_register.jpg/126px-Schedel_register.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/a0/Schedel_register.jpg/189px-Schedel_register.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/a0/Schedel_register.jpg/252px-Schedel_register.jpg 2x" width="126"></a></div></div><span data-dcnode-id="4525" instrument_node="">
</span><div class="gallerytext" data-dcnode-id="4512"><span data-dcnode-id="4524" instrument_node="">
</span><p data-dcnode-id="4514"><span data-dcnode-id="4523" instrument_node="">It has been suggested that calligraphy adds a mystical dimension to a text. Such mysticism appears to be consistent with the feeling that a religious text tries to convey. Many religious texts therefore have appeared in calligraphic editions, in order to evoke a spiritual feeling in the reader.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4516" style="white-space:nowrap;"><span data-dcnode-id="4522" instrument_node="">[</span><i data-dcnode-id="4518"><a data-dcnode-id="4519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4520" title="This claim needs references to reliable sources. (September 2014)"><span data-dcnode-id="4521" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4517" instrument_node="">]</span></sup><span data-dcnode-id="4515" instrument_node="">
</span></p><span data-dcnode-id="4513" instrument_node="">
</span></div><span data-dcnode-id="4511" instrument_node="">
</span></div></li><span data-dcnode-id="4508" instrument_node="">
</span><li class="gallerybox" data-dcnode-id="4484" style="width: 215px"><div data-dcnode-id="4485" style="width: 215px"><span data-dcnode-id="4507" instrument_node="">
</span><div class="thumb" data-dcnode-id="4503" style="width: 210px;"><div data-dcnode-id="4504" style="margin:100px auto;"><a class="image" data-dcnode-id="4505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A2a_Zhao_Mengfu_Autumn_Colors_on_the_Qiao_and_Hua_Mountains_%28central_part%29Handscroll%2C_ink_and_colors_on_paper%2C_28.4_x_93.2_cm_National_Palace_Museum%2C_Taipei.jpg"><img alt="" data-dcnode-id="4506" data-file-height="800" data-file-width="14329" decoding="async" height="10" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/9a/2a_Zhao_Mengfu_Autumn_Colors_on_the_Qiao_and_Hua_Mountains_%2528central_part%2529Handscroll%252C_ink_and_colors_on_paper%252C_28.4_x_93.2_cm_National_Palace_Museum%252C_Taipei.jpg/180px-2a_Zhao_Mengfu_Autumn_Colors_on_the_Qiao_and_Hua_Mountains_%2528central_part%2529Handscroll%252C_ink_and_colors_on_paper%252C_28.4_x_93.2_cm_National_Palace_Museum%252C_Taipei.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/9a/2a_Zhao_Mengfu_Autumn_Colors_on_the_Qiao_and_Hua_Mountains_%28central_part%29Handscroll%2C_ink_and_colors_on_paper%2C_28.4_x_93.2_cm_National_Palace_Museum%2C_Taipei.jpg/270px-2a_Zhao_Mengfu_Autumn_Colors_on_the_Qiao_and_Hua_Mountains_%28central_part%29Handscroll%2C_ink_and_colors_on_paper%2C_28.4_x_93.2_cm_National_Palace_Museum%2C_Taipei.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/9a/2a_Zhao_Mengfu_Autumn_Colors_on_the_Qiao_and_Hua_Mountains_%28central_part%29Handscroll%2C_ink_and_colors_on_paper%2C_28.4_x_93.2_cm_National_Palace_Museum%2C_Taipei.jpg/360px-2a_Zhao_Mengfu_Autumn_Colors_on_the_Qiao_and_Hua_Mountains_%28central_part%29Handscroll%2C_ink_and_colors_on_paper%2C_28.4_x_93.2_cm_National_Palace_Museum%2C_Taipei.jpg 2x" width="180"></a></div></div><span data-dcnode-id="4502" instrument_node="">
</span><div class="gallerytext" data-dcnode-id="4487"><span data-dcnode-id="4501" instrument_node="">
</span><p data-dcnode-id="4489"><span data-dcnode-id="4500" instrument_node="">The art of calligraphy in China goes back to 2000 BCE. Chinese calligraphy was used to communicate the philosophical ideas of </span><a data-dcnode-id="4498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Confucius" title="Confucius"><span data-dcnode-id="4499" instrument_node="">Confucius</span></a><span data-dcnode-id="4497" instrument_node=""> and the </span><a data-dcnode-id="4495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hundred_Schools_of_Thought" title="Hundred Schools of Thought"><span data-dcnode-id="4496" instrument_node="">Hundred Schools of Thought</span></a><span data-dcnode-id="4494" instrument_node=""> (諸子百家; zhūzǐ bǎijiā")</span><sup class="reference" data-dcnode-id="4491" id="cite_ref-5"><a data-dcnode-id="4492" href="#cite_note-5"><span data-dcnode-id="4493" instrument_node="">[5]</span></a></sup><span data-dcnode-id="4490" instrument_node="">
</span></p><span data-dcnode-id="4488" instrument_node="">
</span></div><span data-dcnode-id="4486" instrument_node="">
</span></div></li><span data-dcnode-id="4483" instrument_node="">
</span><li class="gallerybox" data-dcnode-id="4466" style="width: 215px"><div data-dcnode-id="4467" style="width: 215px"><span data-dcnode-id="4482" instrument_node="">
</span><div class="thumb" data-dcnode-id="4478" style="width: 210px;"><div data-dcnode-id="4479" style="margin:37.5px auto;"><a class="image" data-dcnode-id="4480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATaigado_gafu0.jpg"><img alt="" data-dcnode-id="4481" data-file-height="510" data-file-width="680" decoding="async" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/80/Taigado_gafu0.jpg/180px-Taigado_gafu0.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/80/Taigado_gafu0.jpg/270px-Taigado_gafu0.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/80/Taigado_gafu0.jpg/360px-Taigado_gafu0.jpg 2x" width="180"></a></div></div><span data-dcnode-id="4477" instrument_node="">
</span><div class="gallerytext" data-dcnode-id="4469"><span data-dcnode-id="4476" instrument_node="">
</span><p data-dcnode-id="4471"><span data-dcnode-id="4475" instrument_node="">Calligraphy entered Japan from China in the 3rd century BCE, during its states wars. The Japanese used calligraphy to write their </span><a data-dcnode-id="4473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Haiku" title="Haiku"><span data-dcnode-id="4474" instrument_node="">haiku</span></a><span data-dcnode-id="4472" instrument_node=""> on decorative banners.
</span></p><span data-dcnode-id="4470" instrument_node="">
</span></div><span data-dcnode-id="4468" instrument_node="">
</span></div></li><span data-dcnode-id="4465" instrument_node="">
</span></ul><span data-dcnode-id="4463" instrument_node="">
</span><h3 data-dcnode-id="4453"><span class="mw-headline" data-dcnode-id="4461" id="Playing_cards"><span data-dcnode-id="4462" instrument_node="">Playing cards</span></span><span class="mw-editsection" data-dcnode-id="4454"><span class="mw-editsection-bracket" data-dcnode-id="4459"><span data-dcnode-id="4460" instrument_node="">[</span></span><a data-dcnode-id="4457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_graphic_design%26action%3Dedit%26section%3D5" title="Edit section: Playing cards"><span data-dcnode-id="4458" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4455"><span data-dcnode-id="4456" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4452" instrument_node="">
</span><p data-dcnode-id="4411"><span data-dcnode-id="4451" instrument_node="">It is believed that playing cards were invented in China.</span><sup class="reference" data-dcnode-id="4448" id="cite_ref-6"><a data-dcnode-id="4449" href="#cite_note-6"><span data-dcnode-id="4450" instrument_node="">[6]</span></a></sup><span data-dcnode-id="4447" instrument_node=""> </span><a data-dcnode-id="4445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_playing_cards" title="Chinese playing cards"><span data-dcnode-id="4446" instrument_node="">Chinese playing cards</span></a><span data-dcnode-id="4444" instrument_node="">, as we understand the term today, date from at least 1294, when Yen Sengzhu and Zheng Pig-Dog were apparently caught gambling in </span><a class="new" data-dcnode-id="4442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEnzhou%26action%3Dedit%26redlink%3D1" title="Enzhou (page does not exist)"><span data-dcnode-id="4443" instrument_node="">Enzhou</span></a><span data-dcnode-id="4441" instrument_node=""> (in modern </span><a data-dcnode-id="4439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shandong" title="Shandong"><span data-dcnode-id="4440" instrument_node="">Shandong</span></a><span data-dcnode-id="4438" instrument_node=""> Province).</span><sup class="reference" data-dcnode-id="4435" id="cite_ref-7"><a data-dcnode-id="4436" href="#cite_note-7"><span data-dcnode-id="4437" instrument_node="">[7]</span></a></sup><span data-dcnode-id="4434" instrument_node=""> Cards entered Europe from the Islamic empire.</span><sup class="reference" data-dcnode-id="4431" id="cite_ref-8"><a data-dcnode-id="4432" href="#cite_note-8"><span data-dcnode-id="4433" instrument_node="">[8]</span></a></sup><span data-dcnode-id="4430" instrument_node=""> The earliest authentic references to playing cards in Europe date from 1377.</span><sup class="reference" data-dcnode-id="4427" id="cite_ref-9"><a data-dcnode-id="4428" href="#cite_note-9"><span data-dcnode-id="4429" instrument_node="">[9]</span></a></sup><span data-dcnode-id="4426" instrument_node=""> Europe changed the Islamic symbols such as scimitars and cups into graphical representations of kings, queens, knights and jesters. Different European countries adopted different suit systems. For instance, some Italian, Spanish and German decks of cards even today do not have queens.</span><sup class="reference" data-dcnode-id="4423" id="cite_ref-10"><a data-dcnode-id="4424" href="#cite_note-10"><span data-dcnode-id="4425" instrument_node="">[10]</span></a></sup><sup class="reference" data-dcnode-id="4420" id="cite_ref-11"><a data-dcnode-id="4421" href="#cite_note-11"><span data-dcnode-id="4422" instrument_node="">[11]</span></a></sup><sup class="reference" data-dcnode-id="4417" id="cite_ref-12"><a data-dcnode-id="4418" href="#cite_note-12"><span data-dcnode-id="4419" instrument_node="">[12]</span></a></sup><span data-dcnode-id="4416" instrument_node=""> During the 15th century, German printers introduced a woodblock printing technique to produce playing cards. Lower production costs enabled the printed playing cards' quick exportation throughout Europe. The substitution of wood-block printing and hand coloring with copper-plate engraving during the 16th century was the next significant innovation in the manufacture of playing cards. The mass printing of playing cards was revolutionized by the introduction of color lithography in the early 19th century.</span><sup class="reference" data-dcnode-id="4413" id="cite_ref-13"><a data-dcnode-id="4414" href="#cite_note-13"><span data-dcnode-id="4415" instrument_node="">[13]</span></a></sup><span data-dcnode-id="4412" instrument_node="">
</span></p><span data-dcnode-id="4410" instrument_node="">
</span><ul class="gallery mw-gallery-traditional" data-dcnode-id="4368"><span data-dcnode-id="4409" instrument_node="">
</span><li class="gallerybox" data-dcnode-id="4385" style="width: 215px"><div data-dcnode-id="4386" style="width: 215px"><span data-dcnode-id="4408" instrument_node="">
</span><div class="thumb" data-dcnode-id="4404" style="width: 210px;"><div data-dcnode-id="4405" style="margin:27px auto;"><a class="image" data-dcnode-id="4406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACard_designs_from_the_Mamluk_Sultanate_of_Egypt_c._1500.jpg"><img alt="" data-dcnode-id="4407" data-file-height="346" data-file-width="400" decoding="async" height="156" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/e/ec/Card_designs_from_the_Mamluk_Sultanate_of_Egypt_c._1500.jpg/180px-Card_designs_from_the_Mamluk_Sultanate_of_Egypt_c._1500.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/e/ec/Card_designs_from_the_Mamluk_Sultanate_of_Egypt_c._1500.jpg/270px-Card_designs_from_the_Mamluk_Sultanate_of_Egypt_c._1500.jpg 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/e/ec/Card_designs_from_the_Mamluk_Sultanate_of_Egypt_c._1500.jpg/360px-Card_designs_from_the_Mamluk_Sultanate_of_Egypt_c._1500.jpg 2x" width="180"></a></div></div><span data-dcnode-id="4403" instrument_node="">
</span><div class="gallerytext" data-dcnode-id="4388"><span data-dcnode-id="4402" instrument_node="">
</span><p data-dcnode-id="4390"><span data-dcnode-id="4401" instrument_node="">These are Card designs from the </span><a data-dcnode-id="4399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mamluk" title="Mamluk"><span data-dcnode-id="4400" instrument_node="">Mamluk</span></a><span data-dcnode-id="4398" instrument_node=""> Sultanate of Egypt. c. 1500. According to a passage in Ibn Taghri Birdi's </span><i data-dcnode-id="4396"><span data-dcnode-id="4397" instrument_node="">HISTORY OF EGYPT, 1382-1469 A.D.</span></i><span data-dcnode-id="4395" instrument_node="">, the future sultan al-Malik al-Mu'ayyad won a large sum of money in a game of cards.</span><sup class="reference" data-dcnode-id="4392" id="cite_ref-14"><a data-dcnode-id="4393" href="#cite_note-14"><span data-dcnode-id="4394" instrument_node="">[14]</span></a></sup><span data-dcnode-id="4391" instrument_node=""> In the Islamic empire playing cards the suits were coins, cups, swords, and polo sticks.

</span><div class="thumb" data-dcnode-id="4346" style="width: 210px;"><div data-dcnode-id="4347" style="margin:15px auto;"><a class="image" data-dcnode-id="4348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEsculaap.svg"><img alt="" data-dcnode-id="4349" data-file-height="676" data-file-width="677" decoding="async" height="180" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/45/Esculaap.svg/180px-Esculaap.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/45/Esculaap.svg/270px-Esculaap.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/45/Esculaap.svg/360px-Esculaap.svg.png 2x" width="180"></a></div></div><span data-dcnode-id="4345" instrument_node="">
</span><div class="gallerytext" data-dcnode-id="4324"><span data-dcnode-id="4344" instrument_node="">
</span><p data-dcnode-id="4326"><span data-dcnode-id="4343" instrument_node="">Many medical organizations use the </span><a data-dcnode-id="4341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rod_of_Asclepius" title="Rod of Asclepius"><span data-dcnode-id="4342" instrument_node="">rod of Asclepius</span></a><span data-dcnode-id="4340" instrument_node=""> as their logo, since it symbolizes the healing arts. This kind of sign is called </span><a data-dcnode-id="4338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pictogram" title="Pictogram"><span data-dcnode-id="4339" instrument_node="">pictogram</span></a><sup class="reference" data-dcnode-id="4335" id="cite_ref-15"><a data-dcnode-id="4336" href="#cite_note-15"><span data-dcnode-id="4337" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="4332" id="cite_ref-16"><a data-dcnode-id="4333" href="#cite_note-16"><span data-dcnode-id="4334" instrument_node="">[16]</span></a></sup><span data-dcnode-id="4331" instrument_node=""> The main advantage of a pictogram is that one does not need to be able to read or to understand a particular language in order to be able to understand the information it conveys.</span><sup class="reference" data-dcnode-id="4328" id="cite_ref-17"><a data-dcnode-id="4329" href="#cite_note-17"><span data-dcnode-id="4330" instrument_node="">[17]</span></a></sup><span data-dcnode-id="4327" instrument_node="">
</span></p><span data-dcnode-id="4325" instrument_node="">
</span></div><span data-dcnode-id="4323" instrument_node="">
</span></div></li><span data-dcnode-id="4320" instrument_node="">

</span><div class="thumb" data-dcnode-id="4315" style="width: 210px;"><div data-dcnode-id="4316" style="margin:15px auto;"><a class="image" data-dcnode-id="4317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASweden_road_sign_E20-1.svg"><img alt="" data-dcnode-id="4318" data-file-height="900" data-file-width="900" decoding="async" height="180" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/0a/Sweden_road_sign_E20-1.svg/180px-Sweden_road_sign_E20-1.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/0a/Sweden_road_sign_E20-1.svg/270px-Sweden_road_sign_E20-1.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/0a/Sweden_road_sign_E20-1.svg/360px-Sweden_road_sign_E20-1.svg.png 2x" width="180"></a></div></div><span data-dcnode-id="4314" instrument_node="">
</span><div class="gallerytext" data-dcnode-id="4303"><span data-dcnode-id="4313" instrument_node="">
</span><p data-dcnode-id="4305"><span data-dcnode-id="4312" instrument_node="">This is the Swedish traffic sign for </span><i data-dcnode-id="4310"><span data-dcnode-id="4311" instrument_node=""> no parking zone </span></i><span data-dcnode-id="4309" instrument_node="">. The red circle with a diagonal line crossing it coveys the idea of "Not Allowed", and is called an </span><a data-dcnode-id="4307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ideogram" title="Ideogram"><span data-dcnode-id="4308" instrument_node="">ideogram</span></a><span data-dcnode-id="4306" instrument_node="">.
</span></p><span data-dcnode-id="4304" instrument_node="">
</span></div><span data-dcnode-id="4302" instrument_node="">
</span></div></li><span data-dcnode-id="4299" instrument_node="">
</span></ul><span data-dcnode-id="4297" instrument_node="">
</span><p data-dcnode-id="4271"><span data-dcnode-id="4296" instrument_node="">A </span><a data-dcnode-id="4294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rebus" title="Rebus"><span data-dcnode-id="4295" instrument_node="">rebus</span></a><span data-dcnode-id="4293" instrument_node=""> (</span><a data-dcnode-id="4291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Latin" title="Latin"><span data-dcnode-id="4292" instrument_node="">Latin</span></a><span data-dcnode-id="4290" instrument_node="">: "by things") is a kind of word puzzle which uses pictures to represent words or parts of words, such as "T,4,2" instead of "tea for two". In 1977, the </span><a class="mw-redirect" data-dcnode-id="4288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_York_State" title="New York State"><span data-dcnode-id="4289" instrument_node="">New York State</span></a><span data-dcnode-id="4287" instrument_node=""> Department of Commerce recruited </span><a data-dcnode-id="4285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Milton_Glaser" title="Milton Glaser"><span data-dcnode-id="4286" instrument_node="">Milton Glaser</span></a><span data-dcnode-id="4284" instrument_node="">, a productive graphic designer to work on a marketing campaign for New York State. Glaser created </span><a data-dcnode-id="4276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/I_Love_New_York" title="I Love New York"><span data-dcnode-id="4283" instrument_node="">the rebus-style icon </span><span class="nowrap" data-dcnode-id="4277"><b data-dcnode-id="4278"><span data-dcnode-id="4282" instrument_node="">I </span><span data-dcnode-id="4280" style="color:red;"><span data-dcnode-id="4281" instrument_node="">❤</span></span><span data-dcnode-id="4279" instrument_node=""> NY</span></b></span></a><sup class="reference" data-dcnode-id="4273" id="cite_ref-18"><a data-dcnode-id="4274" href="#cite_note-18"><span data-dcnode-id="4275" instrument_node="">[18]</span></a></sup><span data-dcnode-id="4272" instrument_node=""> which became a major success and has continued to be sold for years. Rebus has played an important role in creation of alphabets.
</span></p><span data-dcnode-id="4270" instrument_node="">
</span><h3 data-dcnode-id="4260"><span class="mw-headline" data-dcnode-id="4268" id="Heraldry"><span data-dcnode-id="4269" instrument_node="">Heraldry</span></span><span class="mw-editsection" data-dcnode-id="4261"><span class="mw-editsection-bracket" data-dcnode-id="4266"><span data-dcnode-id="4267" instrument_node="">[</span></span><a data-dcnode-id="4264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_graphic_design%26action%3Dedit%26section%3D7" title="Edit section: Heraldry"><span data-dcnode-id="4265" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4262"><span data-dcnode-id="4263" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4259" instrument_node="">
</span><p data-dcnode-id="4225"><span data-dcnode-id="4258" instrument_node="">Heraldry is the practice of designing and displaying </span><a data-dcnode-id="4256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coat_of_arms" title="Coat of arms"><span data-dcnode-id="4257" instrument_node="">coat of arms</span></a><span data-dcnode-id="4255" instrument_node=""> and </span><a data-dcnode-id="4253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heraldic_badge" title="Heraldic badge"><span data-dcnode-id="4254" instrument_node="">heraldic badge</span></a><span data-dcnode-id="4252" instrument_node=""> and is rather common among all nations. For example, Romans used eagle as their coat of arms, French used fleur de lis, and Persians used the sign of their god, Ahura Mazda. Historically, it has been variously described as "the shorthand of history"</span><sup class="reference" data-dcnode-id="4249" id="cite_ref-19"><a data-dcnode-id="4250" href="#cite_note-19"><span data-dcnode-id="4251" instrument_node="">[19]</span></a></sup><span data-dcnode-id="4248" instrument_node=""> and "the floral border in the garden of history.".</span><sup class="reference" data-dcnode-id="4245" id="cite_ref-20"><a data-dcnode-id="4246" href="#cite_note-20"><span data-dcnode-id="4247" instrument_node="">[20]</span></a></sup><span data-dcnode-id="4244" instrument_node=""> It comes from the Germanic compound </span><i data-dcnode-id="4242"><span data-dcnode-id="4243" instrument_node="">*harja-waldaz</span></i><span data-dcnode-id="4241" instrument_node="">, "army commander".</span><sup class="reference" data-dcnode-id="4238" id="cite_ref-AHD_21-0"><a data-dcnode-id="4239" href="#cite_note-AHD-21"><span data-dcnode-id="4240" instrument_node="">[21]</span></a></sup><span data-dcnode-id="4237" instrument_node="">  The origins of heraldry lie in the need to distinguish participants in combat when their faces were hidden by iron and steel </span><a data-dcnode-id="4235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Helmet" title="Helmet"><span data-dcnode-id="4236" instrument_node="">helmets</span></a><span data-dcnode-id="4234" instrument_node="">.</span><sup class="reference" data-dcnode-id="4231" id="cite_ref-22"><a data-dcnode-id="4232" href="#cite_note-22"><span data-dcnode-id="4233" instrument_node="">[22]</span></a></sup><span data-dcnode-id="4230" instrument_node=""> Eventually a formal system of rules developed into ever more complex forms of heraldry.</span><sup class="reference" data-dcnode-id="4227" id="cite_ref-23"><a data-dcnode-id="4228" href="#cite_note-23"><span data-dcnode-id="4229" instrument_node="">[23]</span></a></sup><span data-dcnode-id="4226" instrument_node="">
</span></p><span data-dcnode-id="4224" instrument_node="">
</span><ul class="gallery mw-gallery-traditional" data-dcnode-id="4108"><span data-dcnode-id="4223" instrument_node="">
</span><li class="gallerybox" data-dcnode-id="4203" style="width: 215px"><div data-dcnode-id="4204" style="width: 215px"><span data-dcnode-id="4222" instrument_node="">
</span><div class="thumb" data-dcnode-id="4218" style="width: 210px;"><div data-dcnode-id="4219" style="margin:15px auto;"><a class="image" data-dcnode-id="4220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACharles_V_Arms-imperial.svg"><img alt="" data-dcnode-id="4221" data-file-height="659" data-file-width="550" decoding="async" height="180" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/19/Charles_V_Arms-imperial.svg/150px-Charles_V_Arms-imperial.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/19/Charles_V_Arms-imperial.svg/225px-Charles_V_Arms-imperial.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/19/Charles_V_Arms-imperial.svg/300px-Charles_V_Arms-imperial.svg.png 2x" width="150"></a></div></div><span data-dcnode-id="4217" instrument_node="">
</span><div class="gallerytext" data-dcnode-id="4206"><span data-dcnode-id="4216" instrument_node="">
</span><p data-dcnode-id="4208"><span data-dcnode-id="4215" instrument_node="">This is the imperial Coat of arms of </span><a data-dcnode-id="4213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_V%2C_Holy_Roman_Emperor" title="Charles V, Holy Roman Emperor"><span data-dcnode-id="4214" instrument_node="">Charles V, Holy Roman Emperor</span></a><span data-dcnode-id="4212" instrument_node="">. From the time of </span><a data-dcnode-id="4210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Otto_the_Great" title="Otto the Great"><span data-dcnode-id="4211" instrument_node="">Otto the Great</span></a><span data-dcnode-id="4209" instrument_node=""> onward, the various German princes elected one of their peers as King of the Germans, after which he would be crowned as emperor by the Pope. The last emperor to be crowned by the pope was Charles V; all emperors after him were technically emperors-elect, but were universally referred to as Emperor.
</span></p><span data-dcnode-id="4207" instrument_node="">
</span></div><span data-dcnode-id="4205" instrument_node="">
</span></div></li><span data-dcnode-id="4202" instrument_node="">
</span><li class="gallerybox" data-dcnode-id="4185" style="width: 215px"><div data-dcnode-id="4186" style="width: 215px"><span data-dcnode-id="4201" instrument_node="">
</span><div class="thumb" data-dcnode-id="4197" style="width: 210px;"><div data-dcnode-id="4198" style="margin:15px auto;"><a class="image" data-dcnode-id="4199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABlason_Albert_de_Mecklembourg_%28selon_Gelre%29.svg"><img alt="" data-dcnode-id="4200" data-file-height="660" data-file-width="600" decoding="async" height="180" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/d5/Blason_Albert_de_Mecklembourg_%2528selon_Gelre%2529.svg/164px-Blason_Albert_de_Mecklembourg_%2528selon_Gelre%2529.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/d5/Blason_Albert_de_Mecklembourg_%28selon_Gelre%29.svg/245px-Blason_Albert_de_Mecklembourg_%28selon_Gelre%29.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/d5/Blason_Albert_de_Mecklembourg_%28selon_Gelre%29.svg/327px-Blason_Albert_de_Mecklembourg_%28selon_Gelre%29.svg.png 2x" width="164"></a></div></div><span data-dcnode-id="4196" instrument_node="">
</span><div class="gallerytext" data-dcnode-id="4188"><span data-dcnode-id="4195" instrument_node="">
</span><p data-dcnode-id="4190"><span data-dcnode-id="4194" instrument_node="">This the coat of arm of </span><a class="mw-redirect" data-dcnode-id="4192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Albert_of_Sweden" title="Albert of Sweden"><span data-dcnode-id="4193" instrument_node="">Albert of Sweden</span></a><span data-dcnode-id="4191" instrument_node="">. He was the King of Sweden from 1364, and in 1384 he inherited the ducal title of Mecklenburg and united the two countries in a personal union.
</span></p><span data-dcnode-id="4189" instrument_node="">
</span></div><span data-dcnode-id="4187" instrument_node="">
</span></div></li><span data-dcnode-id="4184" instrument_node="">
</span><li class="gallerybox" data-dcnode-id="4160" style="width: 215px"><div data-dcnode-id="4161" style="width: 215px"><span data-dcnode-id="4183" instrument_node="">
</span><div class="thumb" data-dcnode-id="4179" style="width: 210px;"><div data-dcnode-id="4180" style="margin:15px auto;"><a class="image" data-dcnode-id="4181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGion_Mamori.svg"><img alt="" data-dcnode-id="4182" data-file-height="169" data-file-width="167" decoding="async" height="180" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Gion_Mamori.svg/178px-Gion_Mamori.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Gion_Mamori.svg/267px-Gion_Mamori.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Gion_Mamori.svg/356px-Gion_Mamori.svg.png 2x" width="178"></a></div></div><span data-dcnode-id="4178" instrument_node="">
</span><div class="gallerytext" data-dcnode-id="4163"><span data-dcnode-id="4177" instrument_node="">
</span><p data-dcnode-id="4165"><span data-dcnode-id="4176" instrument_node="">Like Western heraldry, Japanese </span><i data-dcnode-id="4173"><a data-dcnode-id="4174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mon_%28emblem%29" title="Mon (emblem)"><span data-dcnode-id="4175" instrument_node="">mon</span></a></i><span data-dcnode-id="4172" instrument_node="">s were initially held only by aristocratic families, and were gradually adapted by commoners. Japanese traditional formal attire generally displays the mon of the wearer. Commoners without </span><i data-dcnode-id="4170"><span data-dcnode-id="4171" instrument_node="">mon</span></i><span data-dcnode-id="4169" instrument_node=""> often used that of their patron or the organization they belonged to. This the coat of arm of </span><i data-dcnode-id="4167"><span data-dcnode-id="4168" instrument_node="">Gion Mamori</span></i><span data-dcnode-id="4166" instrument_node=""> of Japan.
</span></p><span data-dcnode-id="4164" instrument_node="">
</span></div><span data-dcnode-id="4162" instrument_node="">
</span></div></li><span data-dcnode-id="4159" instrument_node="">
</span><li class="gallerybox" data-dcnode-id="4110" style="width: 215px"><div data-dcnode-id="4111" style="width: 215px"><span data-dcnode-id="4158" instrument_node="">
</span><div class="thumb" data-dcnode-id="4154" style="width: 210px;"><div data-dcnode-id="4155" style="margin:19px auto;"><a class="image" data-dcnode-id="4156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AYorkshire_rose.svg"><img alt="" data-dcnode-id="4157" data-file-height="264" data-file-width="276" decoding="async" height="172" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/0a/Yorkshire_rose.svg/180px-Yorkshire_rose.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/0a/Yorkshire_rose.svg/270px-Yorkshire_rose.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/0a/Yorkshire_rose.svg/360px-Yorkshire_rose.svg.png 2x" width="180"></a></div></div><span data-dcnode-id="4153" instrument_node="">
</span><div class="gallerytext" data-dcnode-id="4113"><span data-dcnode-id="4152" instrument_node="">
</span><p data-dcnode-id="4115"><span data-dcnode-id="4151" instrument_node="">This is the </span><a data-dcnode-id="4149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/White_Rose_of_York" title="White Rose of York"><span data-dcnode-id="4150" instrument_node="">White Rose of York</span></a><span data-dcnode-id="4148" instrument_node="">, a white heraldic rose, which is the symbol of the House of York. Traditionally the origins of the emblem are said to go back to </span><a class="mw-redirect" data-dcnode-id="4146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edmund_of_Langley" title="Edmund of Langley"><span data-dcnode-id="4147" instrument_node="">Edmund of Langley</span></a><span data-dcnode-id="4145" instrument_node=""> in the 14th century, the first </span><a data-dcnode-id="4143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Duke_of_York" title="Duke of York"><span data-dcnode-id="4144" instrument_node="">Duke of York</span></a><span data-dcnode-id="4142" instrument_node=""> and the founder of the </span><a data-dcnode-id="4140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/House_of_York" title="House of York"><span data-dcnode-id="4141" instrument_node="">House of York</span></a><span data-dcnode-id="4139" instrument_node=""> as a </span><a data-dcnode-id="4137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cadet_branch" title="Cadet branch"><span data-dcnode-id="4138" instrument_node="">Cadet branch</span></a><span data-dcnode-id="4136" instrument_node=""> of the then ruling </span><a data-dcnode-id="4134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/House_of_Plantagenet" title="House of Plantagenet"><span data-dcnode-id="4135" instrument_node="">House of Plantagenet</span></a><span data-dcnode-id="4133" instrument_node="">.</span><sup class="reference" data-dcnode-id="4130" id="cite_ref-history_24-0"><a data-dcnode-id="4131" href="#cite_note-history-24"><span data-dcnode-id="4132" instrument_node="">[24]</span></a></sup><span data-dcnode-id="4129" instrument_node=""> The actual symbolism behind the rose has religious connotations as it represents the </span><a data-dcnode-id="4127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mary%2C_mother_of_Jesus" title="Mary, mother of Jesus"><span data-dcnode-id="4128" instrument_node="">Virgin Mary</span></a><span data-dcnode-id="4126" instrument_node="">, who was often called the </span><i data-dcnode-id="4124"><span data-dcnode-id="4125" instrument_node="">Mystical Rose of Heaven</span></i><span data-dcnode-id="4123" instrument_node="">.</span><sup class="reference" data-dcnode-id="4120" id="cite_ref-history_24-1"><a data-dcnode-id="4121" href="#cite_note-history-24"><span data-dcnode-id="4122" instrument_node="">[24]</span></a></sup><sup class="reference" data-dcnode-id="4117" id="cite_ref-25"><a data-dcnode-id="4118" href="#cite_note-25"><span data-dcnode-id="4119" instrument_node="">[25]</span></a></sup><span data-dcnode-id="4116" instrument_node="">
</span></p><span data-dcnode-id="4114" instrument_node="">
</span></div><span data-dcnode-id="4112" instrument_node="">
</span></div></li><span data-dcnode-id="4109" instrument_node="">
</span></ul><span data-dcnode-id="4107" instrument_node="">
</span><h3 data-dcnode-id="4097"><span class="mw-headline" data-dcnode-id="4105" id="Logos_and_trademarks"><span data-dcnode-id="4106" instrument_node="">Logos and trademarks</span></span><span class="mw-editsection" data-dcnode-id="4098"><span class="mw-editsection-bracket" data-dcnode-id="4103"><span data-dcnode-id="4104" instrument_node="">[</span></span><a data-dcnode-id="4101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_graphic_design%26action%3Dedit%26section%3D8" title="Edit section: Logos and trademarks"><span data-dcnode-id="4102" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4099"><span data-dcnode-id="4100" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4096" instrument_node="">
</span><p data-dcnode-id="4081"><span data-dcnode-id="4095" instrument_node="">A </span><a data-dcnode-id="4093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trademark" title="Trademark"><span data-dcnode-id="4094" instrument_node="">trademark</span></a><span data-dcnode-id="4092" instrument_node=""> is a distinctive sign or indicator used by an individual, company or other entity to identify its products or services and to distinguish them from those of other producers. A trademark is a type of intellectual property, and typically a name, word, phrase, </span><a data-dcnode-id="4090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Logo" title="Logo"><span data-dcnode-id="4091" instrument_node="">logo</span></a><span data-dcnode-id="4089" instrument_node="">, </span><a data-dcnode-id="4087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Symbol" title="Symbol"><span data-dcnode-id="4088" instrument_node="">symbol</span></a><span data-dcnode-id="4086" instrument_node="">, design, image, or a combination of these elements.</span><sup class="reference" data-dcnode-id="4083" id="cite_ref-26"><a data-dcnode-id="4084" href="#cite_note-26"><span data-dcnode-id="4085" instrument_node="">[26]</span></a></sup><span data-dcnode-id="4082" instrument_node="">
</span></p><span data-dcnode-id="4080" instrument_node="">
</span><ul class="gallery mw-gallery-traditional" data-dcnode-id="4033"><span data-dcnode-id="4079" instrument_node="">
</span><li class="gallerybox" data-dcnode-id="4057" style="width: 215px"><div data-dcnode-id="4058" style="width: 215px"><span data-dcnode-id="4078" instrument_node="">
</span><div class="thumb" data-dcnode-id="4074" style="width: 210px;"><div data-dcnode-id="4075" style="margin:75.5px auto;"><a class="image" data-dcnode-id="4076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACoca-Cola_logo.svg"><img alt="" data-dcnode-id="4077" data-file-height="327" data-file-width="1000" decoding="async" height="59" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/ce/Coca-Cola_logo.svg/180px-Coca-Cola_logo.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/ce/Coca-Cola_logo.svg/270px-Coca-Cola_logo.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/ce/Coca-Cola_logo.svg/360px-Coca-Cola_logo.svg.png 2x" width="180"></a></div></div><span data-dcnode-id="4073" instrument_node="">
</span><div class="gallerytext" data-dcnode-id="4060"><span data-dcnode-id="4072" instrument_node="">
</span><p data-dcnode-id="4062"><span data-dcnode-id="4071" instrument_node="">This graphic design of the Coca-Cola logo is the works of Frank Mason Robinson who created it in 1885.</span><sup class="reference" data-dcnode-id="4068" id="cite_ref-27"><a data-dcnode-id="4069" href="#cite_note-27"><span data-dcnode-id="4070" instrument_node="">[27]</span></a></sup><span data-dcnode-id="4067" instrument_node=""> This old Logotype has been around more than a century, which could be regarded as a measure of its success. A successful logotype will create a sense of loyalty among the clienteles.</span><sup class="reference" data-dcnode-id="4064" id="cite_ref-28"><a data-dcnode-id="4065" href="#cite_note-28"><span data-dcnode-id="4066" instrument_node="">[28]</span></a></sup><span data-dcnode-id="4063" instrument_node="">
</span></p><span data-dcnode-id="4061" instrument_node="">
</span></div><span data-dcnode-id="4059" instrument_node="">
</span></div></li><span data-dcnode-id="4056" instrument_node="">
</span><li class="gallerybox" data-dcnode-id="4035" style="width: 215px"><div data-dcnode-id="4036" style="width: 215px"><span data-dcnode-id="4055" instrument_node="">
</span><div class="thumb" data-dcnode-id="4051" style="width: 210px;"><div data-dcnode-id="4052" style="margin:74px auto;"><a class="image" data-dcnode-id="4053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGoogle_2011_logo.png"><img alt="" data-dcnode-id="4054" data-file-height="469" data-file-width="1368" decoding="async" height="62" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Google_2011_logo.png/180px-Google_2011_logo.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Google_2011_logo.png/270px-Google_2011_logo.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Google_2011_logo.png/360px-Google_2011_logo.png 2x" width="180"></a></div></div><span data-dcnode-id="4050" instrument_node="">
</span><div class="gallerytext" data-dcnode-id="4038"><span data-dcnode-id="4049" instrument_node="">
</span><p data-dcnode-id="4040"><span data-dcnode-id="4048" instrument_node="">Google is a young high-tech company, and its logotype created by </span><a data-dcnode-id="4046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ruth_Kedar" title="Ruth Kedar"><span data-dcnode-id="4047" instrument_node="">Ruth Kedar</span></a><span data-dcnode-id="4045" instrument_node=""> reminds us of the Mondrian minimalism. Kedar has emphasized the playfulness of her design, and its simplicity that conveys an illusion of non-design. According to her, "the colors evoke memories of child play, but deftly stray from the color wheel strictures so as to hint to the inherent element of serendipity creeping into any search results page ... The texture and shading of each letter is done in an unobtrusive way resulting in lifting it from the page while giving it both weight and lightness."</span><sup class="reference" data-dcnode-id="4042" id="cite_ref-29"><a data-dcnode-id="4043" href="#cite_note-29"><span data-dcnode-id="4044" instrument_node="">[29]</span></a></sup><span data-dcnode-id="4041" instrument_node="">
</span></p><span data-dcnode-id="4039" instrument_node="">
</span></div><span data-dcnode-id="4037" instrument_node="">
</span></div></li><span data-dcnode-id="4034" instrument_node="">
</span></ul><span data-dcnode-id="4032" instrument_node="">
</span><h4 data-dcnode-id="4022"><span class="mw-headline" data-dcnode-id="4030" id="Rebranding"><span data-dcnode-id="4031" instrument_node="">Rebranding</span></span><span class="mw-editsection" data-dcnode-id="4023"><span class="mw-editsection-bracket" data-dcnode-id="4028"><span data-dcnode-id="4029" instrument_node="">[</span></span><a data-dcnode-id="4026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_graphic_design%26action%3Dedit%26section%3D9" title="Edit section: Rebranding"><span data-dcnode-id="4027" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4024"><span data-dcnode-id="4025" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4021" instrument_node="">
</span><p data-dcnode-id="4015"><span data-dcnode-id="4020" instrument_node="">Rebranding means staying relevant as competition heats up and sales start to stagnate. In such circumstances companies often seek to breathe new life into the brand through rebranding. The idea behind it is that the assumptions made when the brand was established may no longer hold true.</span><sup class="reference" data-dcnode-id="4017" id="cite_ref-30"><a data-dcnode-id="4018" href="#cite_note-30"><span data-dcnode-id="4019" instrument_node="">[30]</span></a></sup><span data-dcnode-id="4016" instrument_node="">
</span></p><span data-dcnode-id="4014" instrument_node="">
</span><h3 data-dcnode-id="4004"><span class="mw-headline" data-dcnode-id="4012" id="Signage_of_culture_and_peace"><span data-dcnode-id="4013" instrument_node="">Signage of culture and peace</span></span><span class="mw-editsection" data-dcnode-id="4005"><span class="mw-editsection-bracket" data-dcnode-id="4010"><span data-dcnode-id="4011" instrument_node="">[</span></span><a data-dcnode-id="4008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_graphic_design%26action%3Dedit%26section%3D10" title="Edit section: Signage of culture and peace"><span data-dcnode-id="4009" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4006"><span data-dcnode-id="4007" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4003" instrument_node="">
</span><ul class="gallery mw-gallery-traditional" data-dcnode-id="3976"><span data-dcnode-id="4002" instrument_node="">
</span><li class="gallerybox" data-dcnode-id="3978" style="width: 215px"><div data-dcnode-id="3979" style="width: 215px"><span data-dcnode-id="4001" instrument_node="">
</span><div class="thumb" data-dcnode-id="3997" style="width: 210px;"><div data-dcnode-id="3998" style="margin:45px auto;"><a class="image" data-dcnode-id="3999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOlympic_flag.svg"><img alt="" data-dcnode-id="4000" data-file-height="600" data-file-width="900" decoding="async" height="120" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/a7/Olympic_flag.svg/180px-Olympic_flag.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/a7/Olympic_flag.svg/270px-Olympic_flag.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/a7/Olympic_flag.svg/360px-Olympic_flag.svg.png 2x" width="180"></a></div></div><span data-dcnode-id="3996" instrument_node="">
</span><div class="gallerytext" data-dcnode-id="3981"><span data-dcnode-id="3995" instrument_node="">
</span><p data-dcnode-id="3983"><span data-dcnode-id="3994" instrument_node="">This flag of the </span><a data-dcnode-id="3992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Olympic_Games" title="Olympic Games"><span data-dcnode-id="3993" instrument_node="">Olympic Games</span></a><span data-dcnode-id="3991" instrument_node=""> that has been designed by </span><a data-dcnode-id="3989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pierre_de_Coubertin" title="Pierre de Coubertin"><span data-dcnode-id="3990" instrument_node="">Pierre de Coubertin</span></a><span data-dcnode-id="3988" instrument_node=""> reminds the viewer of the minimalism of Mondrian. According to Coubertin "This design is symbolic; it represents the five continents of the world, united by Olympism, while the six colours are those that appear on all the national flags of the world at the present time"</span><sup class="reference" data-dcnode-id="3985" id="cite_ref-31"><a data-dcnode-id="3986" href="#cite_note-31"><span data-dcnode-id="3987" instrument_node="">[31]</span></a></sup><span data-dcnode-id="3984" instrument_node="">
</span></p><span data-dcnode-id="3982" instrument_node="">
</span></div><span data-dcnode-id="3980" instrument_node="">
</span></div></li><span data-dcnode-id="3977" instrument_node="">
</span></ul><span data-dcnode-id="3975" instrument_node="">
</span><p data-dcnode-id="3963"><span data-dcnode-id="3974" instrument_node="">The logo of the </span><a data-dcnode-id="3972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialist_Party_%28France%29" title="Socialist Party (France)"><span data-dcnode-id="3973" instrument_node="">Socialist Party (France)</span></a><span data-dcnode-id="3971" instrument_node="">. The rose symbol represents; community (the flower's petals), socialism (its red color), taking care of those who are less able to compete (the fragility), the struggle (the thorns), cultural life (beauty). Historically, the red rose became the party's emblem during the nineteen-seventies. The fist symbol was a sign of resistance. Although the </span><a data-dcnode-id="3969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fran%25C3%25A7ois_Mitterrand" title="François Mitterrand"><span data-dcnode-id="3970" instrument_node="">Mitterrand</span></a><span data-dcnode-id="3968" instrument_node=""> Socialists turned the fist into a graphic holding a rose.</span><sup class="reference" data-dcnode-id="3965" id="cite_ref-32"><a data-dcnode-id="3966" href="#cite_note-32"><span data-dcnode-id="3967" instrument_node="">[32]</span></a></sup><span data-dcnode-id="3964" instrument_node="">
</span></p><p data-dcnode-id="3957"><span data-dcnode-id="3962" instrument_node="">Known worldwide by its panda logo, the Switzerland-based World Wildlife Fund (WWF) participates in international efforts to protect endangered species and their habitats.</span><sup class="reference" data-dcnode-id="3959" id="cite_ref-33"><a data-dcnode-id="3960" href="#cite_note-33"><span data-dcnode-id="3961" instrument_node="">[33]</span></a></sup><span data-dcnode-id="3958" instrument_node="">
</span></p><p data-dcnode-id="3949"><a data-dcnode-id="3955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/M%25C3%25A9decins_Sans_Fronti%25C3%25A8res" title="Médecins Sans Frontières"><span data-dcnode-id="3956" instrument_node="">Médecins Sans Frontières</span></a><span data-dcnode-id="3954" instrument_node="">, or Doctors Without Borders, is best known for its humanitarian projects in war-torn regions and developing countries facing endemic disease. Their logo using a minimalist approach creates its visual impact.</span><sup class="reference" data-dcnode-id="3951" id="cite_ref-34"><a data-dcnode-id="3952" href="#cite_note-34"><span data-dcnode-id="3953" instrument_node="">[34]</span></a></sup><span data-dcnode-id="3950" instrument_node="">
</span></p><span data-dcnode-id="3948" instrument_node="">
</span><h2 data-dcnode-id="3938"><span class="mw-headline" data-dcnode-id="3946" id="Information_signs:_ISOTYPE"><span data-dcnode-id="3947" instrument_node="">Information signs: ISOTYPE</span></span><span class="mw-editsection" data-dcnode-id="3939"><span class="mw-editsection-bracket" data-dcnode-id="3944"><span data-dcnode-id="3945" instrument_node="">[</span></span><a data-dcnode-id="3942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_graphic_design%26action%3Dedit%26section%3D11" title="Edit section: Information signs: ISOTYPE"><span data-dcnode-id="3943" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3940"><span data-dcnode-id="3941" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3937" instrument_node="">
</span><p data-dcnode-id="3925"><span data-dcnode-id="3936" instrument_node="">In 1921, </span><a data-dcnode-id="3934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Otto_Neurath" title="Otto Neurath"><span data-dcnode-id="3935" instrument_node="">Otto Neurath</span></a><span data-dcnode-id="3933" instrument_node="">, an Austrian social scientist, introduced graphic design in order to facilitate the understanding of various social and economic trends through the creative use of statistical charts. In 1924, Neurath advocated the establishment of the Museum of Economy and Society, an institution for public education and social information. In May 1925, the Museum's first graphical displays was opened to the public. The exhibition showed various complicated social and economic trends. By using charts which were to be intuitive and interesting the attempt was to make those concepts easy to grasp. This style of presentation at the time was called the Viennese method, but now it is known as </span><a class="mw-redirect" data-dcnode-id="3931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Isotype_%28pictograms%29" title="Isotype (pictograms)"><span data-dcnode-id="3932" instrument_node="">ISOTYPE</span></a><span data-dcnode-id="3930" instrument_node=""> charts (International System of Typographic Picture Education).</span><sup class="reference" data-dcnode-id="3927" id="cite_ref-35"><a data-dcnode-id="3928" href="#cite_note-35"><span data-dcnode-id="3929" instrument_node="">[35]</span></a></sup><span data-dcnode-id="3926" instrument_node="">
</span></p><p data-dcnode-id="3908"><a data-dcnode-id="3923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Otto_Neurath" title="Otto Neurath"><span data-dcnode-id="3924" instrument_node="">Otto Neurath</span></a><span data-dcnode-id="3922" instrument_node=""> (1882–1945) was an enthusiast of sociology. After obtaining his PhD he worked on planning the war economy of the </span><a class="mw-redirect" data-dcnode-id="3920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Austro-Hungarian_empire" title="Austro-Hungarian empire"><span data-dcnode-id="3921" instrument_node="">Austro-Hungarian empire</span></a><span data-dcnode-id="3919" instrument_node="">. However, by 1919 he was engaged in the planning for a wholly new economic system of the chaotic and short-lived Bavarian Soviet Republic. He proposed for the abolition of money, but before this could be implemented, the republic was bloodily overthrown by </span><a data-dcnode-id="3917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Weimar" title="Weimar"><span data-dcnode-id="3918" instrument_node="">Weimar</span></a><span data-dcnode-id="3916" instrument_node="">'s Social Democrats. Neurath escaped to Vienna, where he became an activist for the self-help squatters' movement. In the 1920s he joined the </span><a data-dcnode-id="3914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vienna_Circle" title="Vienna Circle"><span data-dcnode-id="3915" instrument_node="">Vienna Circle</span></a><span data-dcnode-id="3913" instrument_node=""> of Logical Positivists, who attempted to establish a scientific foundation for philosophy; and at the same time he pioneered the graphic methods that became Isotype and were shown in the "Museum of Society and Economy". He fled Vienna after the collapse of its social democratic city government in 1934. Neurath's final years were spent in Britain, as postwar planner for the Midlands town of Bilston.</span><sup class="reference" data-dcnode-id="3910" id="cite_ref-36"><a data-dcnode-id="3911" href="#cite_note-36"><span data-dcnode-id="3912" instrument_node="">[36]</span></a></sup><span data-dcnode-id="3909" instrument_node="">
</span></p><p data-dcnode-id="3899"><span data-dcnode-id="3907" instrument_node="">As Lupton argues: Neurath suggested "two central rules for generating the vocabulary of international pictures: reduction, for determining the style of individual signs; and consistency, for giving a group of signs the appearance of a coherent system". Reduction means finding the simplest expression of an object. For instance, silouette is a basic technique for reduction. It emulates the shadow of the image without any human intervention. Thus, it is a natural cast rather than a cultural interpretation. The sign as geometric representation of reality is both a rhetorical connotation and a practical technique for many symbol designers. </span><a data-dcnode-id="3905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martin_Krampen" title="Martin Krampen"><span data-dcnode-id="3906" instrument_node="">Martin Krampen</span></a><span data-dcnode-id="3904" instrument_node=""> suggested "simplified realism;" he urged designers to "start from silhouette photographs of objects...and then by subtraction...obtain silouette pictographs."</span><sup class="reference" data-dcnode-id="3901" id="cite_ref-37"><a data-dcnode-id="3902" href="#cite_note-37"><span data-dcnode-id="3903" instrument_node="">[37]</span></a></sup><span data-dcnode-id="3900" instrument_node="">
</span></p><p data-dcnode-id="3888"><a data-dcnode-id="3897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gerd_Arntz" title="Gerd Arntz"><span data-dcnode-id="3898" instrument_node="">Gerd Arntz</span></a><span data-dcnode-id="3896" instrument_node=""> (1900–1988) was born in a German family of traders and manufacturers. He was a socio-political activist in </span><a data-dcnode-id="3894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/D%25C3%25BCsseldorf" title="Düsseldorf"><span data-dcnode-id="3895" instrument_node="">Düsseldorf</span></a><span data-dcnode-id="3893" instrument_node="">, where he joined a movement that aimed to turn Germany into a radical-socialist state form. As a revolutionary artist, Arntz was connected to the Cologne-based ‘progressive artists group’ (Gruppe progressiver Künstler Köln) and depicted the life of workers and the class struggle in abstracted figures on woodcuts. Published in leftist magazines, his work was noticed by Otto Neurath who for his ‘Vienna method of visual statistics’ needed a designer of pictograms that could summarize a subject at a glance. Neurath invited the young artists to come to Vienna in 1928, and work on further developing his ISOTYPE. Arntz designed around 4000 different pictograms and abstracted illustrations for this system.</span><sup class="reference" data-dcnode-id="3890" id="cite_ref-38"><a data-dcnode-id="3891" href="#cite_note-38"><span data-dcnode-id="3892" instrument_node="">[38]</span></a></sup><span data-dcnode-id="3889" instrument_node="">
</span></p><p data-dcnode-id="3879"><span data-dcnode-id="3887" instrument_node="">Neurath's motto was ‘words divide, images unite’. Many of his designs together with those of his protégé </span><a data-dcnode-id="3885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gerd_Arntz" title="Gerd Arntz"><span data-dcnode-id="3886" instrument_node="">Gerd Arntz</span></a><span data-dcnode-id="3884" instrument_node=""> were the forebears of pictograms we now encounter everywhere, such as the man and woman on toilet doors. As Marina Vishmidt suggests: "Neurath's pictograms owe much to the Modernist belief that reality may be modified by being codified – standardised, easy-to-grasp templates as a revolution in human affairs.</span><sup class="reference" data-dcnode-id="3881" id="cite_ref-39"><a data-dcnode-id="3882" href="#cite_note-39"><span data-dcnode-id="3883" instrument_node="">[39]</span></a></sup><span data-dcnode-id="3880" instrument_node="">
</span></p><span data-dcnode-id="3878" instrument_node="">
</span><h3 data-dcnode-id="3868"><span class="mw-headline" data-dcnode-id="3876" id="Olympic_pictograms"><span data-dcnode-id="3877" instrument_node="">Olympic pictograms</span></span><span class="mw-editsection" data-dcnode-id="3869"><span class="mw-editsection-bracket" data-dcnode-id="3874"><span data-dcnode-id="3875" instrument_node="">[</span></span><a data-dcnode-id="3872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_graphic_design%26action%3Dedit%26section%3D12" title="Edit section: Olympic pictograms"><span data-dcnode-id="3873" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3870"><span data-dcnode-id="3871" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3867" instrument_node="">
</span><p data-dcnode-id="3861"><span data-dcnode-id="3866" instrument_node="">The logos and pictograms for Olympic Games change every four years and the sponsoring city develops its own logos. Pictograms first appeared at the Olympics in London in 1948. They came into wide use, since they simultaneously communicate a message to a large number of people who speak different languages. In the absence of such signs in venues such as Olympic village there would be a need for many written signs in different languages, for example for rowing such as; Roning، Κωπηλασία، Aviron, قایق رانی،  and ボート競技 which not only would be costly but also may confuse the viewers. Symbols for individual sports developed by Masasa Katzoumie and Yoshiro Yamashita in Tokyo Olympics in 1964.</span><sup class="reference" data-dcnode-id="3863" id="cite_ref-40"><a data-dcnode-id="3864" href="#cite_note-40"><span data-dcnode-id="3865" instrument_node="">[40]</span></a></sup><span data-dcnode-id="3862" instrument_node="">
</span></p><p data-dcnode-id="3855"><span data-dcnode-id="3860" instrument_node="">Pictograms in Mexico Olympic Games, 1968. A group of Olympic identity program designers collaborated on the creation of these symbols, which were employed to designate the events and installations for both the sports program and the Cultural Olympiad.</span><sup class="reference" data-dcnode-id="3857" id="cite_ref-41"><a data-dcnode-id="3858" href="#cite_note-41"><span data-dcnode-id="3859" instrument_node="">[41]</span></a></sup><span data-dcnode-id="3856" instrument_node="">
</span></p><p data-dcnode-id="3840"><span data-dcnode-id="3854" instrument_node="">Inspired by the pictograms of </span><a data-dcnode-id="3852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gerd_Arntz" title="Gerd Arntz"><span data-dcnode-id="3853" instrument_node="">Gerd Arntz</span></a><span data-dcnode-id="3851" instrument_node="">, </span><a data-dcnode-id="3849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Otl_Aicher" title="Otl Aicher"><span data-dcnode-id="3850" instrument_node="">Otl Aicher</span></a><span data-dcnode-id="3848" instrument_node="">, design director for the Munich 1972 games, in the words of </span><a data-dcnode-id="3846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Michael_Bierut" title="Michael Bierut"><span data-dcnode-id="3847" instrument_node="">Michael Bierut</span></a><span data-dcnode-id="3845" instrument_node=""> "developed a set of pictograms of such breathtaking elegance and clarity that they would never be topped. Aicher (1922-1991), founder of the Ulm design school and consultant to Braun and Lufthansa, was the quintessential German designer: precise, cool and logical".</span><sup class="reference" data-dcnode-id="3842" id="cite_ref-42"><a data-dcnode-id="3843" href="#cite_note-42"><span data-dcnode-id="3844" instrument_node="">[42]</span></a></sup><span data-dcnode-id="3841" instrument_node="">
</span></p><p data-dcnode-id="3834"><span data-dcnode-id="3839" instrument_node="">Olympic Games pictograms of Barcelona in 1992 were influenced by Aicher's work. However, the geometric shapes were abandoned in favour of the characteristic line of the emblem created by Josep. M. Trias and its stylized simplification of the human body in three parts.</span><sup class="reference" data-dcnode-id="3836" id="cite_ref-43"><a data-dcnode-id="3837" href="#cite_note-43"><span data-dcnode-id="3838" instrument_node="">[43]</span></a></sup><span data-dcnode-id="3835" instrument_node="">
</span></p><p data-dcnode-id="3832"><span data-dcnode-id="3833" instrument_node="">Twenty-four sport pictograms and a series of sport illustrations for the 2010 Winter Games are created by Dutch illustrator Irene Jacobs of I'm JAC Design.
</span></p><span data-dcnode-id="3831" instrument_node="">
</span><h3 data-dcnode-id="3820"><span data-dcnode-id="3830" id="Astronomical.2C_statistical_and_scientific_charts"></span><span class="mw-headline" data-dcnode-id="3828" id="Astronomical,_statistical_and_scientific_charts"><span data-dcnode-id="3829" instrument_node="">Astronomical, statistical and scientific charts</span></span><span class="mw-editsection" data-dcnode-id="3821"><span class="mw-editsection-bracket" data-dcnode-id="3826"><span data-dcnode-id="3827" instrument_node="">[</span></span><a data-dcnode-id="3824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_graphic_design%26action%3Dedit%26section%3D13" title="Edit section: Astronomical, statistical and scientific charts"><span data-dcnode-id="3825" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3822"><span data-dcnode-id="3823" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3819" instrument_node="">
</span><ul class="gallery mw-gallery-traditional" data-dcnode-id="3751"><span data-dcnode-id="3818" instrument_node="">
</span><li class="gallerybox" data-dcnode-id="3794" style="width: 215px"><div data-dcnode-id="3795" style="width: 215px"><span data-dcnode-id="3817" instrument_node="">
</span><div class="thumb" data-dcnode-id="3813" style="width: 210px;"><div data-dcnode-id="3814" style="margin:29px auto;"><a class="image" data-dcnode-id="3815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAn_astronomical_chart_of_the_sky_drawn_by_Nicholas_Copernicus_in_1543.jpg"><img alt="" data-dcnode-id="3816" data-file-height="337" data-file-width="400" decoding="async" height="152" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/6/65/An_astronomical_chart_of_the_sky_drawn_by_Nicholas_Copernicus_in_1543.jpg/180px-An_astronomical_chart_of_the_sky_drawn_by_Nicholas_Copernicus_in_1543.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/6/65/An_astronomical_chart_of_the_sky_drawn_by_Nicholas_Copernicus_in_1543.jpg/270px-An_astronomical_chart_of_the_sky_drawn_by_Nicholas_Copernicus_in_1543.jpg 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/6/65/An_astronomical_chart_of_the_sky_drawn_by_Nicholas_Copernicus_in_1543.jpg/360px-An_astronomical_chart_of_the_sky_drawn_by_Nicholas_Copernicus_in_1543.jpg 2x" width="180"></a></div></div><span data-dcnode-id="3812" instrument_node="">
</span><div class="gallerytext" data-dcnode-id="3797"><span data-dcnode-id="3811" instrument_node="">
</span><p data-dcnode-id="3799"><span data-dcnode-id="3810" instrument_node="">Astronomical charts have a long history. For instance, an engraving of an ancient Egyptian diagram of the heavens from the Temple of </span><a class="mw-redirect" data-dcnode-id="3808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dendara" title="Dendara"><span data-dcnode-id="3809" instrument_node="">Dendara</span></a><span data-dcnode-id="3807" instrument_node="">, depicts the sky on the date of the founding of the temple in 54 BC. The above chart is an astronomical map of the sky drawn by </span><a class="mw-redirect" data-dcnode-id="3805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nicholas_Copernicus" title="Nicholas Copernicus"><span data-dcnode-id="3806" instrument_node="">Nicholas Copernicus</span></a><span data-dcnode-id="3804" instrument_node=""> in 1543 that replaced an earlier chart by Cellarius showing the Earth centred universe.</span><sup class="reference" data-dcnode-id="3801" id="cite_ref-44"><a data-dcnode-id="3802" href="#cite_note-44"><span data-dcnode-id="3803" instrument_node="">[44]</span></a></sup><span data-dcnode-id="3800" instrument_node="">
</span></p><span data-dcnode-id="3798" instrument_node="">
</span></div><span data-dcnode-id="3796" instrument_node="">
</span></div></li><span data-dcnode-id="3793" instrument_node="">
</span><li class="gallerybox" data-dcnode-id="3775" style="width: 215px"><div data-dcnode-id="3776" style="width: 215px"><span data-dcnode-id="3792" instrument_node="">
</span><div class="thumb" data-dcnode-id="3788" style="width: 210px;"><div data-dcnode-id="3789" style="margin:15px auto;"><a class="image" data-dcnode-id="3790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AScene-render.svg"><img alt="" data-dcnode-id="3791" data-file-height="600" data-file-width="432" decoding="async" height="180" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Scene-render.svg/129px-Scene-render.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Scene-render.svg/194px-Scene-render.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Scene-render.svg/259px-Scene-render.svg.png 2x" width="129"></a></div></div><span data-dcnode-id="3787" instrument_node="">
</span><div class="gallerytext" data-dcnode-id="3778"><span data-dcnode-id="3786" instrument_node="">
</span><p data-dcnode-id="3780"><span data-dcnode-id="3785" instrument_node="">In this graphic chart the position of two planets in relation to a viewer, and their position as they appear to a specific viewer is shown. These types of charts are used in various textbooks to describe various scientific phenomena. They are used as well by manufacturers for their manuals in order to help the buyers to become familiar with the working of a gadget.</span><sup class="reference" data-dcnode-id="3782" id="cite_ref-45"><a data-dcnode-id="3783" href="#cite_note-45"><span data-dcnode-id="3784" instrument_node="">[45]</span></a></sup><span data-dcnode-id="3781" instrument_node="">
</span></p><span data-dcnode-id="3779" instrument_node="">
</span></div><span data-dcnode-id="3777" instrument_node="">
</span></div></li><span data-dcnode-id="3774" instrument_node="">
</span><li class="gallerybox" data-dcnode-id="3753" style="width: 215px"><div data-dcnode-id="3754" style="width: 215px"><span data-dcnode-id="3773" instrument_node="">
</span><div class="thumb" data-dcnode-id="3769" style="width: 210px;"><div data-dcnode-id="3770" style="margin:15px auto;"><a class="image" data-dcnode-id="3771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A3Variable_BubbleChart.svg"><img alt="" data-dcnode-id="3772" data-file-height="320" data-file-width="320" decoding="async" height="180" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/83/3Variable_BubbleChart.svg/180px-3Variable_BubbleChart.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/83/3Variable_BubbleChart.svg/270px-3Variable_BubbleChart.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/83/3Variable_BubbleChart.svg/360px-3Variable_BubbleChart.svg.png 2x" width="180"></a></div></div><span data-dcnode-id="3768" instrument_node="">
</span><div class="gallerytext" data-dcnode-id="3756"><span data-dcnode-id="3767" instrument_node="">
</span><p data-dcnode-id="3758"><span data-dcnode-id="3766" instrument_node="">This is a </span><a data-dcnode-id="3764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bubble_chart" title="Bubble chart"><span data-dcnode-id="3765" instrument_node="">bubble chart</span></a><span data-dcnode-id="3763" instrument_node="">, which can show the relationship between three variables. These charts facilitate the understanding of the social, economical, medical, and other scientific relationships.</span><sup class="reference" data-dcnode-id="3760" id="cite_ref-46"><a data-dcnode-id="3761" href="#cite_note-46"><span data-dcnode-id="3762" instrument_node="">[46]</span></a></sup><span data-dcnode-id="3759" instrument_node="">
</span></p><span data-dcnode-id="3757" instrument_node="">
</span></div><span data-dcnode-id="3755" instrument_node="">
</span></div></li><span data-dcnode-id="3752" instrument_node="">
</span></ul><span data-dcnode-id="3750" instrument_node="">
