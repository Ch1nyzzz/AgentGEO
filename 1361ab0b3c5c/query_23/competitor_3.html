</span><p data-dcnode-id="3744"><span data-dcnode-id="3749" instrument_node="">Statistics is becoming increasingly more important in modern society. Various computer software can easily transform a large set of data into charts, graphs, and statistics of various types in an attempt to provide us with succinct information to make decisions.</span><sup class="reference" data-dcnode-id="3746" id="cite_ref-47"><a data-dcnode-id="3747" href="#cite_note-47"><span data-dcnode-id="3748" instrument_node="">[47]</span></a></sup><span data-dcnode-id="3745" instrument_node="">
</span></p><span data-dcnode-id="3743" instrument_node="">
</span><h2 data-dcnode-id="3733"><span class="mw-headline" data-dcnode-id="3741" id="Dynamic_designs_and_computer_animation"><span data-dcnode-id="3742" instrument_node="">Dynamic designs and computer animation</span></span><span class="mw-editsection" data-dcnode-id="3734"><span class="mw-editsection-bracket" data-dcnode-id="3739"><span data-dcnode-id="3740" instrument_node="">[</span></span><a data-dcnode-id="3737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_graphic_design%26action%3Dedit%26section%3D14" title="Edit section: Dynamic designs and computer animation"><span data-dcnode-id="3738" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3735"><span data-dcnode-id="3736" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3732" instrument_node="">
</span><ul class="gallery mw-gallery-traditional" data-dcnode-id="3658"><span data-dcnode-id="3731" instrument_node="">
</span><li class="gallerybox" data-dcnode-id="3713" style="width: 215px"><div data-dcnode-id="3714" style="width: 215px"><span data-dcnode-id="3730" instrument_node="">
</span><div class="thumb" data-dcnode-id="3726" style="width: 210px;"><div data-dcnode-id="3727" style="margin:45px auto;"><a class="image" data-dcnode-id="3728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMuybridge_race_horse_animated.gif"><img alt="" data-dcnode-id="3729" data-file-height="200" data-file-width="300" decoding="async" height="120" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/dd/Muybridge_race_horse_animated.gif/180px-Muybridge_race_horse_animated.gif&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/dd/Muybridge_race_horse_animated.gif/270px-Muybridge_race_horse_animated.gif 1.5x, //upload.wikimedia.org/wikipedia/commons/d/dd/Muybridge_race_horse_animated.gif 2x" width="180"></a></div></div><span data-dcnode-id="3725" instrument_node="">
</span><div class="gallerytext" data-dcnode-id="3716"><span data-dcnode-id="3724" instrument_node="">
</span><p data-dcnode-id="3718"><span data-dcnode-id="3723" instrument_node="">Computer animation creates the illusion of motion by viewing a succession of computer-generated still images. In the past, animation was produced by filming painted sequences on plastic or paper cels. The above animation was created from photos by Eadweard Muybridge in 1887. Computer animation can be used to produce special effects for educational purposes, such as the study of planetary motions, particle collisions, or fluid dynamics.</span><sup class="reference" data-dcnode-id="3720" id="cite_ref-48"><a data-dcnode-id="3721" href="#cite_note-48"><span data-dcnode-id="3722" instrument_node="">[48]</span></a></sup><span data-dcnode-id="3719" instrument_node="">
</span></p><span data-dcnode-id="3717" instrument_node="">
</span></div><span data-dcnode-id="3715" instrument_node="">
</span></div></li><span data-dcnode-id="3712" instrument_node="">
</span><li class="gallerybox" data-dcnode-id="3694" style="width: 215px"><div data-dcnode-id="3695" style="width: 215px"><span data-dcnode-id="3711" instrument_node="">
</span><div class="thumb" data-dcnode-id="3707" style="width: 210px;"><div data-dcnode-id="3708" style="margin:40px auto;"><a class="image" data-dcnode-id="3709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AArchimedes-screw_one-screw-threads_with-ball_3D-view_animated_small.gif"><img alt="" data-dcnode-id="3710" data-file-height="365" data-file-width="505" decoding="async" height="130" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/22/Archimedes-screw_one-screw-threads_with-ball_3D-view_animated_small.gif/180px-Archimedes-screw_one-screw-threads_with-ball_3D-view_animated_small.gif&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/22/Archimedes-screw_one-screw-threads_with-ball_3D-view_animated_small.gif/270px-Archimedes-screw_one-screw-threads_with-ball_3D-view_animated_small.gif 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/22/Archimedes-screw_one-screw-threads_with-ball_3D-view_animated_small.gif/360px-Archimedes-screw_one-screw-threads_with-ball_3D-view_animated_small.gif 2x" width="180"></a></div></div><span data-dcnode-id="3706" instrument_node="">
</span><div class="gallerytext" data-dcnode-id="3697"><span data-dcnode-id="3705" instrument_node="">
</span><p data-dcnode-id="3699"><span data-dcnode-id="3704" instrument_node="">Dynamic graphics are used to facilitate understanding of concepts in science, engineering, medicine, education, and business. Computer graphics facilitates the production of images that range in complexity from simple line drawings to three-dimensional reconstructions of data. The evolution of a phenomenon through time and its interactions with other elements can be shown through animation.</span><sup class="reference" data-dcnode-id="3701" id="cite_ref-49"><a data-dcnode-id="3702" href="#cite_note-49"><span data-dcnode-id="3703" instrument_node="">[49]</span></a></sup><span data-dcnode-id="3700" instrument_node="">
</span></p><span data-dcnode-id="3698" instrument_node="">
</span></div><span data-dcnode-id="3696" instrument_node="">
</span></div></li><span data-dcnode-id="3693" instrument_node="">
</span><li class="gallerybox" data-dcnode-id="3675" style="width: 215px"><div data-dcnode-id="3676" style="width: 215px"><span data-dcnode-id="3692" instrument_node="">
</span><div class="thumb" data-dcnode-id="3688" style="width: 210px;"><div data-dcnode-id="3689" style="margin:15px auto;"><a class="image" data-dcnode-id="3690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACamera_focal_length_distance_house_animation.gif"><img alt="" data-dcnode-id="3691" data-file-height="512" data-file-width="512" decoding="async" height="180" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Camera_focal_length_distance_house_animation.gif/180px-Camera_focal_length_distance_house_animation.gif&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Camera_focal_length_distance_house_animation.gif/270px-Camera_focal_length_distance_house_animation.gif 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Camera_focal_length_distance_house_animation.gif/360px-Camera_focal_length_distance_house_animation.gif 2x" width="180"></a></div></div><span data-dcnode-id="3687" instrument_node="">
</span><div class="gallerytext" data-dcnode-id="3678"><span data-dcnode-id="3686" instrument_node="">
</span><p data-dcnode-id="3680"><span data-dcnode-id="3685" instrument_node="">In this 3-D dynamic design a house is studied from various angles. These types of animations can be very useful in the study of various objects. They can also be used to study the evolution of a process through time.:</span><sup class="reference" data-dcnode-id="3682" id="cite_ref-50"><a data-dcnode-id="3683" href="#cite_note-50"><span data-dcnode-id="3684" instrument_node="">[50]</span></a></sup><span data-dcnode-id="3681" instrument_node="">
</span></p><span data-dcnode-id="3679" instrument_node="">
</span></div><span data-dcnode-id="3677" instrument_node="">
</span></div></li><span data-dcnode-id="3674" instrument_node="">
</span><li class="gallerybox" data-dcnode-id="3660" style="width: 215px"><div data-dcnode-id="3661" style="width: 215px"><span data-dcnode-id="3673" instrument_node="">
</span><div class="thumb" data-dcnode-id="3669" style="width: 210px;"><div data-dcnode-id="3670" style="margin:15px auto;"><a class="image" data-dcnode-id="3671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A5-cell.gif"><img alt="" data-dcnode-id="3672" data-file-height="252" data-file-width="252" decoding="async" height="180" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/d8/5-cell.gif/180px-5-cell.gif&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/d/d8/5-cell.gif 1.5x" width="180"></a></div></div><span data-dcnode-id="3668" instrument_node="">
</span><div class="gallerytext" data-dcnode-id="3663"><span data-dcnode-id="3667" instrument_node="">
</span><p data-dcnode-id="3665"><span data-dcnode-id="3666" instrument_node="">The art of dynamic designs is still in its infancy. With the availability of sophisticated computer graphics techniques the horizon has been expanded enormously for graphic designers.
</span></p><span data-dcnode-id="3664" instrument_node="">
</span></div><span data-dcnode-id="3662" instrument_node="">
</span></div></li><span data-dcnode-id="3659" instrument_node="">
</span></ul><span data-dcnode-id="3657" instrument_node="">
</span><h2 data-dcnode-id="3647"><span class="mw-headline" data-dcnode-id="3655" id="Pioneers_of_modern_graphics_and_industrial_design"><span data-dcnode-id="3656" instrument_node="">Pioneers of modern graphics and industrial design</span></span><span class="mw-editsection" data-dcnode-id="3648"><span class="mw-editsection-bracket" data-dcnode-id="3653"><span data-dcnode-id="3654" instrument_node="">[</span></span><a data-dcnode-id="3651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_graphic_design%26action%3Dedit%26section%3D15" title="Edit section: Pioneers of modern graphics and industrial design"><span data-dcnode-id="3652" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3649"><span data-dcnode-id="3650" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3646" instrument_node="">
</span><ul class="gallery mw-gallery-traditional" data-dcnode-id="3588"><span data-dcnode-id="3645" instrument_node="">
</span><li class="gallerybox" data-dcnode-id="3621" style="width: 215px"><div data-dcnode-id="3622" style="width: 215px"><span data-dcnode-id="3644" instrument_node="">
</span><div class="thumb" data-dcnode-id="3640" style="width: 210px;"><div data-dcnode-id="3641" style="margin:78px auto;"><a class="image" data-dcnode-id="3642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAllgemeine_Elektricit%25C3%25A4ts-Gesellschaft_%28logo%29.svg"><img alt="" data-dcnode-id="3643" data-file-height="241" data-file-width="800" decoding="async" height="54" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Allgemeine_Elektricit%25C3%25A4ts-Gesellschaft_%28logo%29.svg/180px-Allgemeine_Elektricit%25C3%25A4ts-Gesellschaft_%28logo%29.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Allgemeine_Elektricit%C3%A4ts-Gesellschaft_%28logo%29.svg/270px-Allgemeine_Elektricit%C3%A4ts-Gesellschaft_%28logo%29.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Allgemeine_Elektricit%C3%A4ts-Gesellschaft_%28logo%29.svg/360px-Allgemeine_Elektricit%C3%A4ts-Gesellschaft_%28logo%29.svg.png 2x" width="180"></a></div></div><span data-dcnode-id="3639" instrument_node="">
</span><div class="gallerytext" data-dcnode-id="3624"><span data-dcnode-id="3638" instrument_node="">
</span><p data-dcnode-id="3626"><span data-dcnode-id="3637" instrument_node="">In 1907, </span><a data-dcnode-id="3635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/AEG" title="AEG"><span data-dcnode-id="3636" instrument_node="">AEG</span></a><span data-dcnode-id="3634" instrument_node=""> (Allgemeine Elektricitäts-Gesellschaft) retained </span><a data-dcnode-id="3632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peter_Behrens" title="Peter Behrens"><span data-dcnode-id="3633" instrument_node="">Peter Behrens</span></a><span data-dcnode-id="3631" instrument_node="">, a German architect and designer,   as artistic consultant. He designed the entire corporate identity (logotype, product design, publicity, etc.) and for that he is considered the first industrial designer in history. He never became an employee of AEG, but worked as an artistic consultant.</span><sup class="reference" data-dcnode-id="3628" id="cite_ref-51"><a data-dcnode-id="3629" href="#cite_note-51"><span data-dcnode-id="3630" instrument_node="">[51]</span></a></sup><span data-dcnode-id="3627" instrument_node="">
</span></p><span data-dcnode-id="3625" instrument_node="">
</span></div><span data-dcnode-id="3623" instrument_node="">
</span></div></li><span data-dcnode-id="3620" instrument_node="">
</span><li class="gallerybox" data-dcnode-id="3590" style="width: 215px"><div data-dcnode-id="3591" style="width: 215px"><span data-dcnode-id="3619" instrument_node="">
</span><div class="thumb" data-dcnode-id="3615" style="width: 210px;"><div data-dcnode-id="3616" style="margin:69px auto;"><a class="image" data-dcnode-id="3617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AIBM_logo.svg"><img alt="" data-dcnode-id="3618" data-file-height="401" data-file-width="1000" decoding="async" height="72" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/51/IBM_logo.svg/180px-IBM_logo.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/51/IBM_logo.svg/270px-IBM_logo.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/51/IBM_logo.svg/360px-IBM_logo.svg.png 2x" width="180"></a></div></div><span data-dcnode-id="3614" instrument_node="">
</span><div class="gallerytext" data-dcnode-id="3593"><span data-dcnode-id="3613" instrument_node="">
</span><p data-dcnode-id="3595"><a data-dcnode-id="3611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_Rand" title="Paul Rand"><span data-dcnode-id="3612" instrument_node="">Paul Rand</span></a><span data-dcnode-id="3610" instrument_node="">, an American graphic designer, is best known for his corporate </span><a class="external text" data-dcnode-id="3608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.grafitive.com/" rel="nofollow"><span data-dcnode-id="3609" instrument_node="">logo designs</span></a><span data-dcnode-id="3607" instrument_node="">. His career began with a part-time position creating </span><a data-dcnode-id="3605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stock_photography" title="Stock photography"><span data-dcnode-id="3606" instrument_node="">stock images</span></a><span data-dcnode-id="3604" instrument_node=""> for a syndicate that supplied graphics to various newspapers and magazines.</span><sup class="reference" data-dcnode-id="3601" id="cite_ref-52"><a data-dcnode-id="3602" href="#cite_note-52"><span data-dcnode-id="3603" instrument_node="">[52]</span></a></sup><span data-dcnode-id="3600" instrument_node=""> Between his class assignments and his work, Rand was able to amass a fairly large portfolio, largely influenced by the German advertising style Sachplakat (object poster) as well as the works of Gustav Jensen.</span><sup class="reference" data-dcnode-id="3597" id="cite_ref-53"><a data-dcnode-id="3598" href="#cite_note-53"><span data-dcnode-id="3599" instrument_node="">[53]</span></a></sup><span data-dcnode-id="3596" instrument_node="">
</span></p><span data-dcnode-id="3594" instrument_node="">
</span></div><span data-dcnode-id="3592" instrument_node="">
</span></div></li><span data-dcnode-id="3589" instrument_node="">
</span></ul><span data-dcnode-id="3587" instrument_node="">
</span><p data-dcnode-id="3579"><a data-dcnode-id="3585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Raymond_Loewy" title="Raymond Loewy"><span data-dcnode-id="3586" instrument_node="">Raymond Loewy</span></a><span data-dcnode-id="3584" instrument_node=""> was one of the best known industrial designers of the 20th century. Born in France, he spent most of his professional career in the United States. Among his many contributions were the Shell logo, the Greyhound bus, the S-1 locomotive, the Lucky Strike package, Coldspot refrigerators and the Studebaker Avanti. Loewy was first approached by the greyhound corporation to redesign its logo. The company's logo looked like a 'fat mongrel' he said. So, he created a slimmed-down version that is still used today.</span><sup class="reference" data-dcnode-id="3581" id="cite_ref-54"><a data-dcnode-id="3582" href="#cite_note-54"><span data-dcnode-id="3583" instrument_node="">[54]</span></a></sup><span data-dcnode-id="3580" instrument_node="">
</span></p><p data-dcnode-id="3562"><a data-dcnode-id="3577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Golden_%28graphic_designer%29" title="William Golden (graphic designer)"><span data-dcnode-id="3578" instrument_node="">William Golden</span></a><span data-dcnode-id="3576" instrument_node=""> is one of the pioneers of American graphic design. He was born in lower Manhattan, the youngest of twelve children. His only formal schooling was at the Vocational School for Boys, where he learned photoengraving and the basics of commercial design. In conjunction with the Didot typeface, Golden developed the famous CBS Eye logo. It has been suggested that the eye was inspired by an article in </span><a data-dcnode-id="3574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alexey_Brodovitch" title="Alexey Brodovitch"><span data-dcnode-id="3575" instrument_node="">Alexey Brodovitch</span></a><span data-dcnode-id="3573" instrument_node="">'s </span><i data-dcnode-id="3571"><span data-dcnode-id="3572" instrument_node="">Portfolio</span></i><span data-dcnode-id="3570" instrument_node=""> about the subject of </span><a data-dcnode-id="3568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shakers" title="Shakers"><span data-dcnode-id="3569" instrument_node="">Shaker</span></a><span data-dcnode-id="3567" instrument_node=""> design.</span><sup class="reference" data-dcnode-id="3564" id="cite_ref-55"><a data-dcnode-id="3565" href="#cite_note-55"><span data-dcnode-id="3566" instrument_node="">[55]</span></a></sup><span data-dcnode-id="3563" instrument_node="">
</span></p><span data-dcnode-id="3561" instrument_node="">
</span><h2 data-dcnode-id="3551"><span class="mw-headline" data-dcnode-id="3559" id="Placards_and_posters"><span data-dcnode-id="3560" instrument_node="">Placards and posters</span></span><span class="mw-editsection" data-dcnode-id="3552"><span class="mw-editsection-bracket" data-dcnode-id="3557"><span data-dcnode-id="3558" instrument_node="">[</span></span><a data-dcnode-id="3555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_graphic_design%26action%3Dedit%26section%3D16" title="Edit section: Placards and posters"><span data-dcnode-id="3556" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3553"><span data-dcnode-id="3554" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3550" instrument_node="">
</span><p data-dcnode-id="3538"><span data-dcnode-id="3549" instrument_node="">Placard and posters existed from the ancient times. The Persian reliefs that depicted the important historical events; and the Greek </span><i data-dcnode-id="3547"><span data-dcnode-id="3548" instrument_node="">axons</span></i><span data-dcnode-id="3546" instrument_node=""> and the Roman </span><i data-dcnode-id="3544"><span data-dcnode-id="3545" instrument_node="">Albums</span></i><span data-dcnode-id="3543" instrument_node="">, with their decorative designs and announcements, were quite similar to today's posters. In ancient Greece the name of athletes, and games schedules were written on columns that were slowly turning on an axis. Romans used whitewashed walls in their markets in which sellers, money lenders, and slave traders wrote their announcements and advertised for their products, and to attract the attention of customers they added attractive designs to their announcements.</span><sup class="reference" data-dcnode-id="3540" id="cite_ref-56"><a data-dcnode-id="3541" href="#cite_note-56"><span data-dcnode-id="3542" instrument_node="">[56]</span></a></sup><span data-dcnode-id="3539" instrument_node="">
</span></p><span data-dcnode-id="3537" instrument_node="">
</span><h3 data-dcnode-id="3527"><span class="mw-headline" data-dcnode-id="3535" id="Ancient_reliefs"><span data-dcnode-id="3536" instrument_node="">Ancient reliefs</span></span><span class="mw-editsection" data-dcnode-id="3528"><span class="mw-editsection-bracket" data-dcnode-id="3533"><span data-dcnode-id="3534" instrument_node="">[</span></span><a data-dcnode-id="3531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_graphic_design%26action%3Dedit%26section%3D17" title="Edit section: Ancient reliefs"><span data-dcnode-id="3532" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3529"><span data-dcnode-id="3530" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3526" instrument_node="">
</span><h3 data-dcnode-id="3516"><span class="mw-headline" data-dcnode-id="3524" id="Emergence_of_the_print_and_design_industry"><span data-dcnode-id="3525" instrument_node="">Emergence of the print and design industry</span></span><span class="mw-editsection" data-dcnode-id="3517"><span class="mw-editsection-bracket" data-dcnode-id="3522"><span data-dcnode-id="3523" instrument_node="">[</span></span><a data-dcnode-id="3520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_graphic_design%26action%3Dedit%26section%3D18" title="Edit section: Emergence of the print and design industry"><span data-dcnode-id="3521" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3518"><span data-dcnode-id="3519" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3515" instrument_node="">
</span><p data-dcnode-id="3490"><span data-dcnode-id="3514" instrument_node="">Around 1450, </span><a class="mw-redirect" data-dcnode-id="3512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Johann_Gutenberg" title="Johann Gutenberg"><span data-dcnode-id="3513" instrument_node="">Johann Gutenberg</span></a><span data-dcnode-id="3511" instrument_node="">'s printing press made books widely available in Europe. The book design of </span><a data-dcnode-id="3509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aldus_Manutius" title="Aldus Manutius"><span data-dcnode-id="3510" instrument_node="">Aldus Manutius</span></a><span data-dcnode-id="3508" instrument_node=""> developed the book structure which would become the foundation of western publication design. With the development of the lithographic process, invented by a Czech named </span><a data-dcnode-id="3506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alois_Senefelder" title="Alois Senefelder"><span data-dcnode-id="3507" instrument_node="">Alois Senefelder</span></a><span data-dcnode-id="3505" instrument_node=""> in 1798 in Austria, the creation of posters become feasible. Although handmade posters existed before, they were mainly used for government announcements. </span><a data-dcnode-id="3503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Caxton" title="William Caxton"><span data-dcnode-id="3504" instrument_node="">William Caxton</span></a><span data-dcnode-id="3502" instrument_node="">, who in 1477 started a printing company in England, produced the first printed poster.</span><sup class="reference" data-dcnode-id="3499" id="cite_ref-57"><a data-dcnode-id="3500" href="#cite_note-57"><span data-dcnode-id="3501" instrument_node="">[57]</span></a></sup><span data-dcnode-id="3498" instrument_node="">
In 1870, the advertising poster emerged.</span><sup class="reference" data-dcnode-id="3495" id="cite_ref-58"><a data-dcnode-id="3496" href="#cite_note-58"><span data-dcnode-id="3497" instrument_node="">[58]</span></a></sup><sup class="reference" data-dcnode-id="3492" id="cite_ref-59"><a data-dcnode-id="3493" href="#cite_note-59"><span data-dcnode-id="3494" instrument_node="">[59]</span></a></sup><span data-dcnode-id="3491" instrument_node="">
</span></p><span data-dcnode-id="3489" instrument_node="">

</span><p data-dcnode-id="3406"><span data-dcnode-id="3414" instrument_node="">Engraving is the practice of incising a design onto a hard, usually flat surface, by cutting grooves into it. The process was developed in Germany in the 1430s from the engraving used by goldsmiths to decorate metalwork. Engravers use a hardened steel tool called a </span><a data-dcnode-id="3412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Burin_%28engraving%29" title="Burin (engraving)"><span data-dcnode-id="3413" instrument_node="">burin</span></a><span data-dcnode-id="3411" instrument_node=""> to cut the design into the surface, most traditionally a copper plate.</span><sup class="reference" data-dcnode-id="3408" id="cite_ref-60"><a data-dcnode-id="3409" href="#cite_note-60"><span data-dcnode-id="3410" instrument_node="">[60]</span></a></sup><span data-dcnode-id="3407" instrument_node=""> Gravers come in a variety of shapes and sizes that yield different line types.
</span></p><span data-dcnode-id="3405" instrument_node="">

</span><h4 data-dcnode-id="3323"><span class="mw-headline" data-dcnode-id="3331" id="Etching"><span data-dcnode-id="3332" instrument_node="">Etching</span></span><span class="mw-editsection" data-dcnode-id="3324"><span class="mw-editsection-bracket" data-dcnode-id="3329"><span data-dcnode-id="3330" instrument_node="">[</span></span><a data-dcnode-id="3327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_graphic_design%26action%3Dedit%26section%3D20" title="Edit section: Etching"><span data-dcnode-id="3328" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3325"><span data-dcnode-id="3326" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3322" instrument_node="">
</span><p data-dcnode-id="3315"><a data-dcnode-id="3320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Etching" title="Etching"><span data-dcnode-id="3321" instrument_node="">Etching</span></a><span data-dcnode-id="3319" instrument_node=""> is the process of using strong acid or mordant to cut into the unprotected parts of a metal surface to create a design in intaglio in the metal. This technique is believed to have been invented by </span><a data-dcnode-id="3317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Daniel_Hopfer" title="Daniel Hopfer"><span data-dcnode-id="3318" instrument_node="">Daniel Hopfer</span></a><span data-dcnode-id="3316" instrument_node=""> (c. 1470-1536) of Augsburg, Germany, who decorated armour in this way, and applied the method to printmaking. Etching soon came to challenge engraving as the most popular printmaking medium. Its great advantage was that, unlike engraving which requires special skill in metalworking, etching is relatively easy to learn for an artist trained in drawing.
</span></p><span data-dcnode-id="3314" instrument_node="">

</span><h2 data-dcnode-id="3219"><span class="mw-headline" data-dcnode-id="3227" id="Modern_graphic_design"><span data-dcnode-id="3228" instrument_node="">Modern graphic design</span></span><span class="mw-editsection" data-dcnode-id="3220"><span class="mw-editsection-bracket" data-dcnode-id="3225"><span data-dcnode-id="3226" instrument_node="">[</span></span><a data-dcnode-id="3223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_graphic_design%26action%3Dedit%26section%3D21" title="Edit section: Modern graphic design"><span data-dcnode-id="3224" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3221"><span data-dcnode-id="3222" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3218" instrument_node="">
</span><p data-dcnode-id="3206"><span data-dcnode-id="3217" instrument_node="">In the second half of the 19th century </span><a data-dcnode-id="3215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Morris" title="William Morris"><span data-dcnode-id="3216" instrument_node="">William Morris</span></a><span data-dcnode-id="3214" instrument_node="">'s Kelmscott Press produced many historicist graphic designs, and created a collectors market for this kind of art. In Oxford he associated with artists like Burne-Jones, and Dante Gabriel Rossetti. Together they formed the Pre-Raphaelites group, and their ideas influenced the modern graphic design considerably.</span><sup class="reference" data-dcnode-id="3211" id="cite_ref-61"><a data-dcnode-id="3212" href="#cite_note-61"><span data-dcnode-id="3213" instrument_node="">[61]</span></a></sup><sup class="reference" data-dcnode-id="3208" id="cite_ref-62"><a data-dcnode-id="3209" href="#cite_note-62"><span data-dcnode-id="3210" instrument_node="">[62]</span></a></sup><span data-dcnode-id="3207" instrument_node="">
</span></p><span data-dcnode-id="3205" instrument_node="">
</span><ul class="gallery mw-gallery-traditional" data-dcnode-id="3143"><span data-dcnode-id="3204" instrument_node="">
</span><li class="gallerybox" data-dcnode-id="3190" style="width: 215px"><div data-dcnode-id="3191" style="width: 215px"><span data-dcnode-id="3203" instrument_node="">
</span><div class="thumb" data-dcnode-id="3199" style="width: 210px;"><div data-dcnode-id="3200" style="margin:15px auto;"><a class="image" data-dcnode-id="3201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMorris_Peacock_and_Dragon_Fabric_1878_v2.jpg"><img alt="" data-dcnode-id="3202" data-file-height="1468" data-file-width="968" decoding="async" height="180" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/05/Morris_Peacock_and_Dragon_Fabric_1878_v2.jpg/119px-Morris_Peacock_and_Dragon_Fabric_1878_v2.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/05/Morris_Peacock_and_Dragon_Fabric_1878_v2.jpg/178px-Morris_Peacock_and_Dragon_Fabric_1878_v2.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/05/Morris_Peacock_and_Dragon_Fabric_1878_v2.jpg/237px-Morris_Peacock_and_Dragon_Fabric_1878_v2.jpg 2x" width="119"></a></div></div><span data-dcnode-id="3198" instrument_node="">
</span><div class="gallerytext" data-dcnode-id="3193"><span data-dcnode-id="3197" instrument_node="">
</span><p data-dcnode-id="3195"><span data-dcnode-id="3196" instrument_node="">This fabric design called Peacock and Dragon, which is the work of William Morris (1878) is an example of decorative graphic design. Such designs was revived during the 1960s with the emergence of the hippie movement.
</span></p><span data-dcnode-id="3194" instrument_node="">
</span></div><span data-dcnode-id="3192" instrument_node="">

</span><div class="thumb" data-dcnode-id="3184" style="width: 210px;"><div data-dcnode-id="3185" style="margin:46.5px auto;"><a class="image" data-dcnode-id="3186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMorris_Tulip_and_Willow_design_1873.jpg"><img alt="" data-dcnode-id="3187" data-file-height="960" data-file-width="1476" decoding="async" height="117" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/44/Morris_Tulip_and_Willow_design_1873.jpg/180px-Morris_Tulip_and_Willow_design_1873.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/44/Morris_Tulip_and_Willow_design_1873.jpg/270px-Morris_Tulip_and_Willow_design_1873.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/44/Morris_Tulip_and_Willow_design_1873.jpg/360px-Morris_Tulip_and_Willow_design_1873.jpg 2x" width="180"></a></div></div><span data-dcnode-id="3183" instrument_node="">
</span><div class="gallerytext" data-dcnode-id="3178"><span data-dcnode-id="3182" instrument_node="">
</span><p data-dcnode-id="3180"><span data-dcnode-id="3181" instrument_node="">This Morris Tulip and Willow design (1873) is another example of decorative graphics. By using a diagonal blue, with only some suggestion of orange the artist tries to create a harmonious color scheme that could be used effectively in the design of a poster or other graphic design media.
</span></p><span data-dcnode-id="3179" instrument_node="">
</span></div><span data-dcnode-id="3177" instrument_node="">
</span></div></li><span data-dcnode-id="3174" instrument_node="">

</span><div class="thumb" data-dcnode-id="3169" style="width: 210px;"><div data-dcnode-id="3170" style="margin:15px auto;"><a class="image" data-dcnode-id="3171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKelmscott_Press_-_The_Nature_of_Gothic_by_John_Ruskin_%28first_page%29.jpg"><img alt="" data-dcnode-id="3172" data-file-height="768" data-file-width="528" decoding="async" height="180" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/79/Kelmscott_Press_-_The_Nature_of_Gothic_by_John_Ruskin_%2528first_page%2529.jpg/124px-Kelmscott_Press_-_The_Nature_of_Gothic_by_John_Ruskin_%2528first_page%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/79/Kelmscott_Press_-_The_Nature_of_Gothic_by_John_Ruskin_%28first_page%29.jpg/185px-Kelmscott_Press_-_The_Nature_of_Gothic_by_John_Ruskin_%28first_page%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/79/Kelmscott_Press_-_The_Nature_of_Gothic_by_John_Ruskin_%28first_page%29.jpg/247px-Kelmscott_Press_-_The_Nature_of_Gothic_by_John_Ruskin_%28first_page%29.jpg 2x" width="124"></a></div></div><span data-dcnode-id="3168" instrument_node="">
</span><div class="gallerytext" data-dcnode-id="3163"><span data-dcnode-id="3167" instrument_node="">
</span><p data-dcnode-id="3165"><span data-dcnode-id="3166" instrument_node="">This is the first page of The Nature of Gothic by John Ruskin which was published by Kelmscott Press of William Morris. The decorative design was the revival of the Gothic style in graphic design.
</span></p><span data-dcnode-id="3164" instrument_node="">
</span></div><span data-dcnode-id="3162" instrument_node="">

</span><div class="thumb" data-dcnode-id="3154" style="width: 210px;"><div data-dcnode-id="3155" style="margin:15px auto;"><a class="image" data-dcnode-id="3156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARubaiyat_Morris_Burne-Jones_Manuscript.jpg"><img alt="" data-dcnode-id="3157" data-file-height="2260" data-file-width="1537" decoding="async" height="180" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Rubaiyat_Morris_Burne-Jones_Manuscript.jpg/122px-Rubaiyat_Morris_Burne-Jones_Manuscript.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Rubaiyat_Morris_Burne-Jones_Manuscript.jpg/183px-Rubaiyat_Morris_Burne-Jones_Manuscript.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Rubaiyat_Morris_Burne-Jones_Manuscript.jpg/245px-Rubaiyat_Morris_Burne-Jones_Manuscript.jpg 2x" width="122"></a></div></div><span data-dcnode-id="3153" instrument_node="">
</span><div class="gallerytext" data-dcnode-id="3148"><span data-dcnode-id="3152" instrument_node="">
</span><p data-dcnode-id="3150"><span data-dcnode-id="3151" instrument_node="">This book of poetry, called Rubaiyat, by the famous Persian poet Omar Khayyam, is an example of early modern graphic design cooperation. The graphic composition of calligraphy and its decorative design are by Morris and the painting is by Burne-Jones.
</span></p><span data-dcnode-id="3149" instrument_node="">
</span></div><span data-dcnode-id="3147" instrument_node="">
</span></div></li><span data-dcnode-id="3144" instrument_node="">
</span></ul><span data-dcnode-id="3142" instrument_node="">
</span><p data-dcnode-id="3130"><span data-dcnode-id="3141" instrument_node="">In 1917, </span><a class="mw-redirect" data-dcnode-id="3139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frederick_H._Meyer" title="Frederick H. Meyer"><span data-dcnode-id="3140" instrument_node="">Frederick H. Meyer</span></a><span data-dcnode-id="3138" instrument_node="">, director and instructor at the </span><a class="mw-redirect" data-dcnode-id="3136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/California_School_of_Arts_and_Crafts" title="California School of Arts and Crafts"><span data-dcnode-id="3137" instrument_node="">California School of Arts and Crafts</span></a><span data-dcnode-id="3135" instrument_node="">, taught a class entitled “Graphic Design and Lettering”.</span><sup class="reference" data-dcnode-id="3132" id="cite_ref-63"><a data-dcnode-id="3133" href="#cite_note-63"><span data-dcnode-id="3134" instrument_node="">[63]</span></a></sup><span data-dcnode-id="3131" instrument_node="">
</span></p><span data-dcnode-id="3129" instrument_node="">
</span><h2 data-dcnode-id="3119"><span class="mw-headline" data-dcnode-id="3127" id="Posters_Post-World_War_II"><span data-dcnode-id="3128" instrument_node="">Posters Post-World War II</span></span><span class="mw-editsection" data-dcnode-id="3120"><span class="mw-editsection-bracket" data-dcnode-id="3125"><span data-dcnode-id="3126" instrument_node="">[</span></span><a data-dcnode-id="3123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_graphic_design%26action%3Dedit%26section%3D22" title="Edit section: Posters Post-World War II"><span data-dcnode-id="3124" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3121"><span data-dcnode-id="3122" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3118" instrument_node="">
</span><p data-dcnode-id="3116"><span data-dcnode-id="3117" instrument_node="">After the Second World War, with the emergence new color printing technology and particularly appearance of computers the art of posters underwent a new revolutionary phase. People can create color poster on their laptop computers and create color prints at a very low cost. Unfortunately, the high cost sophisticated printing processes can only be afforded mostly by the government entities and large corporations. With the emergence of internet the role of posters in conveying information has greatly diminished. However, some artist still use the chromolithography in order to create works of arts in the form of print. In this regard the difference between painting and print has been narrowed considerably.
</span></p><span data-dcnode-id="3115" instrument_node="">
</span><h3 data-dcnode-id="3105"><span class="mw-headline" data-dcnode-id="3113" id="Psychedelic_design"><span data-dcnode-id="3114" instrument_node="">Psychedelic design</span></span><span class="mw-editsection" data-dcnode-id="3106"><span class="mw-editsection-bracket" data-dcnode-id="3111"><span data-dcnode-id="3112" instrument_node="">[</span></span><a data-dcnode-id="3109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_graphic_design%26action%3Dedit%26section%3D23" title="Edit section: Psychedelic design"><span data-dcnode-id="3110" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3107"><span data-dcnode-id="3108" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3104" instrument_node="">
</span><p data-dcnode-id="3095"><span data-dcnode-id="3103" instrument_node="">The word "psychedelic"  means "mind manifesting". </span><a data-dcnode-id="3101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Psychedelic_art" title="Psychedelic art"><span data-dcnode-id="3102" instrument_node="">Psychedelic art</span></a><span data-dcnode-id="3100" instrument_node=""> is art inspired by the psychedelic experience induced by drugs, and refers above all to the art movement of the 1960s counterculture. Psychedelic visual arts were a counterpart to psychedelic rock music. Concert posters, album covers, lightshows, murals, comic books, underground newspapers and more reflected revolutionary political, social and spiritual sentiments inspired by psychedelic states of consciousness.</span><sup class="reference" data-dcnode-id="3097" id="cite_ref-64"><a data-dcnode-id="3098" href="#cite_note-64"><span data-dcnode-id="3099" instrument_node="">[64]</span></a></sup><span data-dcnode-id="3096" instrument_node="">
</span></p><p data-dcnode-id="3087"><span data-dcnode-id="3094" instrument_node="">Although San Francisco remained the hub of psychedelic art into the early 1970s, the style also developed internationally. Pink Floyd worked extensively with London-based designers, Hipgnosis to create graphics to support the concepts in their albums like this cover of </span><i data-dcnode-id="3092"><span data-dcnode-id="3093" instrument_node="">Soundtrack from the Film 'More'</span></i><span data-dcnode-id="3091" instrument_node="">. </span><i data-dcnode-id="3089"><span data-dcnode-id="3090" instrument_node="">Life</span></i><span data-dcnode-id="3088" instrument_node=""> magazine's cover and lead article for the September 1, 1967 issue at the height of the Summer of Love focused on the explosion of psychedelic art on posters and the artists as leaders in the hippie counterculture community.
</span></p><p data-dcnode-id="3081"><span data-dcnode-id="3086" instrument_node="">Yellow Submarine was a milestone in graphic design, inspired by the new trends in art, it sits alongside the dazzling Pop Art styles of Andy Warhol, Martin Sharp, Alan Aldridge and Peter Blake. Heinz Edelman was hired by TVC as the art director for this film. Before making Yellow Submarine, TVC had produced The Beatles, a 39 episode TV series "produced" by Al Brodax and King Features. Despite the critical acclaim of his design work for the film, Edelman never worked on another animated feature.</span><sup class="reference" data-dcnode-id="3083" id="cite_ref-Robert_R_2002_65-0"><a data-dcnode-id="3084" href="#cite_note-Robert_R_2002-65"><span data-dcnode-id="3085" instrument_node="">[65]</span></a></sup><span data-dcnode-id="3082" instrument_node="">
</span></p><p data-dcnode-id="3064"><a data-dcnode-id="3079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peter_Max" title="Peter Max"><span data-dcnode-id="3080" instrument_node="">Peter Max</span></a><span data-dcnode-id="3078" instrument_node="">'s art work was a part of the psychedelic movement in graphic design. His work was much imitated in commercial illustration in the late 1960s and early 1970s. In 1970, many of Max's products and posters were featured in the exhibition "The World of Peter Max" which opened at the M.H. de Young Memorial Museum in San Francisco. He appeared on the cover of </span><i data-dcnode-id="3076"><span data-dcnode-id="3077" instrument_node="">Life</span></i><span data-dcnode-id="3075" instrument_node=""> magazine with an eight-page feature article as well as </span><i data-dcnode-id="3073"><span data-dcnode-id="3074" instrument_node="">The Tonight Show Starring Johnny Carson</span></i><span data-dcnode-id="3072" instrument_node=""> and </span><i data-dcnode-id="3070"><span data-dcnode-id="3071" instrument_node="">The Ed Sullivan Show</span></i><span data-dcnode-id="3069" instrument_node="">.</span><sup class="reference" data-dcnode-id="3066" id="cite_ref-Robert_R_2002_65-1"><a data-dcnode-id="3067" href="#cite_note-Robert_R_2002-65"><span data-dcnode-id="3068" instrument_node="">[65]</span></a></sup><span data-dcnode-id="3065" instrument_node="">
</span></p><span data-dcnode-id="3063" instrument_node="">
</span><h3 data-dcnode-id="3053"><span class="mw-headline" data-dcnode-id="3061" id="Poster_design_in_Japan"><span data-dcnode-id="3062" instrument_node="">Poster design in Japan</span></span><span class="mw-editsection" data-dcnode-id="3054"><span class="mw-editsection-bracket" data-dcnode-id="3059"><span data-dcnode-id="3060" instrument_node="">[</span></span><a data-dcnode-id="3057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_graphic_design%26action%3Dedit%26section%3D24" title="Edit section: Poster design in Japan"><span data-dcnode-id="3058" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3055"><span data-dcnode-id="3056" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3052" instrument_node="">
</span><p data-dcnode-id="3046"><span data-dcnode-id="3051" instrument_node="">The distinctive aesthetics of Japanese graphic design have been admired over many decades, winning awards at prestigious international venues.</span><sup class="reference" data-dcnode-id="3048" id="cite_ref-66"><a data-dcnode-id="3049" href="#cite_note-66"><span data-dcnode-id="3050" instrument_node="">[66]</span></a></sup><span data-dcnode-id="3047" instrument_node="">
</span></p><p data-dcnode-id="3040"><span data-dcnode-id="3045" instrument_node="">The works of Japanese graphic designers are noted for their resourcefulness, powerful visual expression and extraordinary technical quality of print.</span><sup class="reference" data-dcnode-id="3042" id="cite_ref-67"><a data-dcnode-id="3043" href="#cite_note-67"><span data-dcnode-id="3044" instrument_node="">[67]</span></a></sup><span data-dcnode-id="3041" instrument_node="">
</span></p><p data-dcnode-id="3027"><span data-dcnode-id="3039" instrument_node="">The distinctive artistic language and typographic </span><a data-dcnode-id="3037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sophistication" title="Sophistication"><span data-dcnode-id="3038" instrument_node="">sophistication</span></a><span data-dcnode-id="3036" instrument_node=""> show particularly in Japanese poster-design. The Japanese poster is a compelling pictorial medium and an original work of art, reflecting in full the designer's creative talent.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3029" style="white-space:nowrap;"><span data-dcnode-id="3035" instrument_node="">[</span><i data-dcnode-id="3031"><a data-dcnode-id="3032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3033" title="This claim needs references to reliable sources. (February 2011)"><span data-dcnode-id="3034" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3030" instrument_node="">]</span></sup><span data-dcnode-id="3028" instrument_node="">
</span></p><span data-dcnode-id="3026" instrument_node="">
</span><h3 data-dcnode-id="3016"><span class="mw-headline" data-dcnode-id="3024" id="Chinese_cultural_revolution"><span data-dcnode-id="3025" instrument_node="">Chinese cultural revolution</span></span><span class="mw-editsection" data-dcnode-id="3017"><span class="mw-editsection-bracket" data-dcnode-id="3022"><span data-dcnode-id="3023" instrument_node="">[</span></span><a data-dcnode-id="3020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_graphic_design%26action%3Dedit%26section%3D25" title="Edit section: Chinese cultural revolution"><span data-dcnode-id="3021" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3018"><span data-dcnode-id="3019" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3015" instrument_node="">
</span><p data-dcnode-id="3006"><span data-dcnode-id="3014" instrument_node="">The poster "Revolution promotes production", created by He Shuxui, celebrates traditional </span><a class="mw-redirect" data-dcnode-id="3012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ceramic_painting" title="Ceramic painting"><span data-dcnode-id="3013" instrument_node="">ceramic painting</span></a><span data-dcnode-id="3011" instrument_node=""> techniques. A plaque in the background commemorates a group of ceramic workers as an outstanding productive unit, 1974.</span><sup class="reference" data-dcnode-id="3008" id="cite_ref-68"><a data-dcnode-id="3009" href="#cite_note-68"><span data-dcnode-id="3010" instrument_node="">[68]</span></a></sup><span data-dcnode-id="3007" instrument_node="">
</span></p><p data-dcnode-id="3000"><span data-dcnode-id="3005" instrument_node="">A worker named Wang Qing Cang created the poster "The three countries of Indo Zhina (Lao, Cambodia, Vietnam) will win!". On the upper left side, it says "Enemies are getting sicker and sicker every day, and we are getting better and better every day." (The U.S. supported Indo Zhina (Indochina) governments while China supported their communist guerilla forces.) October 1964.</span><sup class="reference" data-dcnode-id="3002" id="cite_ref-69"><a data-dcnode-id="3003" href="#cite_note-69"><span data-dcnode-id="3004" instrument_node="">[69]</span></a></sup><span data-dcnode-id="3001" instrument_node="">
</span></p><p data-dcnode-id="2991"><span data-dcnode-id="2999" instrument_node="">The poster "</span><a class="mw-redirect" data-dcnode-id="2997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mao_Ze_Dong" title="Mao Ze Dong"><span data-dcnode-id="2998" instrument_node="">Mao Ze Dong</span></a><span data-dcnode-id="2996" instrument_node=""> at Jing Gang Mountain" depicts a young Mao Ze Dong sitting against a background of Mount Jing Gang. Jing Gang Shan (Jing Gang Mountain) symbolizes the Mao Ze Dong leadership and his vision to unite the oppressed masses to fight against and fight against the ruling class. Created by Liu Chun Hua and Wang Hui, October 1969.</span><sup class="reference" data-dcnode-id="2993" id="cite_ref-70"><a data-dcnode-id="2994" href="#cite_note-70"><span data-dcnode-id="2995" instrument_node="">[70]</span></a></sup><span data-dcnode-id="2992" instrument_node="">
</span></p><p data-dcnode-id="2982"><span data-dcnode-id="2990" instrument_node="">The poster, "Time is Money", features the famous Canadian doctor </span><a data-dcnode-id="2988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Norman_Bethune" title="Norman Bethune"><span data-dcnode-id="2989" instrument_node="">Norman Bethune</span></a><span data-dcnode-id="2987" instrument_node=""> (Dr. Bai Qiuen in Chinese), racing to rescue another patient. Bethune became an early proponent of universal health care, the success of which he observed during a visit to the Soviet Union. As a doctor in Montreal, Bethune frequently sought out the poor and gave them free medical care. As a thoracic surgeon, he traveled to Spain (1936–1937) and to China (1938–1939) to perform battlefield surgical operations on war casualties. Created by Zhang Xin Gua. Hebei People's Publishing House.</span><sup class="reference" data-dcnode-id="2984" id="cite_ref-71"><a data-dcnode-id="2985" href="#cite_note-71"><span data-dcnode-id="2986" instrument_node="">[71]</span></a></sup><span data-dcnode-id="2983" instrument_node="">
</span></p><span data-dcnode-id="2981" instrument_node="">
</span><h3 data-dcnode-id="2971"><span class="mw-headline" data-dcnode-id="2979" id="Culture_and_politics"><span data-dcnode-id="2980" instrument_node="">Culture and politics</span></span><span class="mw-editsection" data-dcnode-id="2972"><span class="mw-editsection-bracket" data-dcnode-id="2977"><span data-dcnode-id="2978" instrument_node="">[</span></span><a data-dcnode-id="2975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_graphic_design%26action%3Dedit%26section%3D26" title="Edit section: Culture and politics"><span data-dcnode-id="2976" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2973"><span data-dcnode-id="2974" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2970" instrument_node="">
</span><p data-dcnode-id="2959"><a data-dcnode-id="2968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_Avedon" title="Richard Avedon"><span data-dcnode-id="2969" instrument_node="">Richard Avedon</span></a><span data-dcnode-id="2967" instrument_node=""> was an American photographer. Avedon capitalized on his early success in fashion photography and expanded into the realm of fine art. This is a solarised poster portraits of the </span><a class="mw-redirect" data-dcnode-id="2965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beatles" title="Beatles"><span data-dcnode-id="2966" instrument_node="">Beatles</span></a><span data-dcnode-id="2964" instrument_node="">, originally produced for 9 January 1967 edition of the American magazine </span><i data-dcnode-id="2961"><a data-dcnode-id="2962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Look_%28American_magazine%29" title="Look (American magazine)"><span data-dcnode-id="2963" instrument_node="">Look</span></a></i><span data-dcnode-id="2960" instrument_node="">.
</span></p><p data-dcnode-id="2954"><span data-dcnode-id="2958" instrument_node="">The </span><a data-dcnode-id="2956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barack_Obama" title="Barack Obama"><span data-dcnode-id="2957" instrument_node="">Barack Obama</span></a><span data-dcnode-id="2955" instrument_node=""> "hope" poster is an iconic image of Barack Obama designed by artist Shepard Fairey. The image became one of the most widely recognized symbols of Obama's campaign message, spawning many variations and imitations, including some commissioned by the Obama campaign. In January 2009, after Obama had won the election, Fairey's mixed-media stenciled portrait version of the image was acquired by the Smithsonian Institution for its National Portrait Gallery.
</span></p><span data-dcnode-id="2953" instrument_node="">

</span><p data-dcnode-id="2917"><a data-dcnode-id="2925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andrew_Pavlovsky" title="Andrew Pavlovsky"><span data-dcnode-id="2926" instrument_node="">Andrew Pavlovsky</span></a><span data-dcnode-id="2924" instrument_node=""> poster of Poet </span><a data-dcnode-id="2922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vladimir_Mayakovsky" title="Vladimir Mayakovsky"><span data-dcnode-id="2923" instrument_node="">MAYAKOVSKIY</span></a><span data-dcnode-id="2921" instrument_node=""> (2003). This poster is a graphic illustration of a true interest to </span><a data-dcnode-id="2919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constructivism_%28art%29" title="Constructivism (art)"><span data-dcnode-id="2920" instrument_node="">Constructivism</span></a><span data-dcnode-id="2918" instrument_node=""> in Russia today. This Art Movement (Constructivism) was almost always in demand in Russia and it can become one of principal trends now. Some of the contemporary Russian artists and art historians have already suggested the new term  - Additive Constructivism. It emphasizes the return to modernism, which starts to significantly push out the postmodern art practices. It's not a postmodern performance. The Constructivist color solution proves that so it is.

</span><h3 data-dcnode-id="2896"><span class="mw-headline" data-dcnode-id="2904" id="Computer_aided_graphic_design_in_posters"><span data-dcnode-id="2905" instrument_node="">Computer aided graphic design in posters</span></span><span class="mw-editsection" data-dcnode-id="2897"><span class="mw-editsection-bracket" data-dcnode-id="2902"><span data-dcnode-id="2903" instrument_node="">[</span></span><a data-dcnode-id="2900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_graphic_design%26action%3Dedit%26section%3D27" title="Edit section: Computer aided graphic design in posters"><span data-dcnode-id="2901" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2898"><span data-dcnode-id="2899" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2895" instrument_node="">
</span><p data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">With the arrival of computer aided graphic design an assortment of novel effects, digital techniques, and innovative styles have been emerged in poster designs. With software such as Adobe Photoshop, Corel and Windows' Paint program, image editing has become very cheap, and artists can experiment easily with a variety of color schemes, filters and special effects. For instance, utilizing various filters of Photoshop, many artists have created "vectored" designs in posters where a photographic image is solarized, sharpened, rendered into watercolor or stained glass effects or converted into bare lines with block colors. Other designs created soft or blurry styles, ripple or cascade effects and other special filters.
</span></p><span data-dcnode-id="2892" instrument_node="">
</span><h2 data-dcnode-id="2882"><span class="mw-headline" data-dcnode-id="2890" id="Advertising"><span data-dcnode-id="2891" instrument_node="">Advertising</span></span><span class="mw-editsection" data-dcnode-id="2883"><span class="mw-editsection-bracket" data-dcnode-id="2888"><span data-dcnode-id="2889" instrument_node="">[</span></span><a data-dcnode-id="2886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_graphic_design%26action%3Dedit%26section%3D28" title="Edit section: Advertising"><span data-dcnode-id="2887" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2884"><span data-dcnode-id="2885" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2881" instrument_node="">
</span><p data-dcnode-id="2875"><span data-dcnode-id="2880" instrument_node="">Graphic design is used in advertising to announce a persuasive message by an identified sponsor; or a promotion by a firm of its products to its existing and potential customers. Egyptians used papyrus to make sales messages and wall posters. Commercial messages and political campaign displays have been found in the ruins of Pompeii and ancient Arabia. Lost and found advertising on papyrus was common in Ancient Greece and Ancient Rome. Wall or rock painting for commercial advertising is another manifestation of an ancient advertising form, which is present to this day in many parts of Asia, Africa, and South America.</span><sup class="reference" data-dcnode-id="2877" id="cite_ref-72"><a data-dcnode-id="2878" href="#cite_note-72"><span data-dcnode-id="2879" instrument_node="">[72]</span></a></sup><span data-dcnode-id="2876" instrument_node="">
</span></p><span data-dcnode-id="2874" instrument_node="">

</span><h4 data-dcnode-id="2730"><span data-dcnode-id="2740" id="German_Plakatstil.2C_.22Poster_style.22"></span><span class="mw-headline" data-dcnode-id="2738" id="German_Plakatstil,_&quot;Poster_style&quot;"><span data-dcnode-id="2739" instrument_node="">German Plakatstil, "Poster style"</span></span><span class="mw-editsection" data-dcnode-id="2731"><span class="mw-editsection-bracket" data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">[</span></span><a data-dcnode-id="2734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_graphic_design%26action%3Dedit%26section%3D31" title="Edit section: German Plakatstil, &quot;Poster style&quot;"><span data-dcnode-id="2735" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2732"><span data-dcnode-id="2733" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2729" instrument_node="">
</span><p data-dcnode-id="2723"><span data-dcnode-id="2728" instrument_node="">In the early 20th century, Germany became the cradle of many of the avant-garde art movements particularly for posters. This created the "Plakatstil" or "Poster style" movement. This movement became very influential and had a considerable impact on the graphic design for posters. Posters in this style would feature few but strong colours, a sharp, non-cluttered, minimal composition and bold, clear types.</span><sup class="reference" data-dcnode-id="2725" id="cite_ref-73"><a data-dcnode-id="2726" href="#cite_note-73"><span data-dcnode-id="2727" instrument_node="">[73]</span></a></sup><span data-dcnode-id="2724" instrument_node="">
</span></p><span data-dcnode-id="2722" instrument_node="">
</span><h5 data-dcnode-id="2712"><span class="mw-headline" data-dcnode-id="2720" id="Ludwig_Hohlwein"><span data-dcnode-id="2721" instrument_node="">Ludwig Hohlwein</span></span><span class="mw-editsection" data-dcnode-id="2713"><span class="mw-editsection-bracket" data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">[</span></span><a data-dcnode-id="2716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_graphic_design%26action%3Dedit%26section%3D32" title="Edit section: Ludwig Hohlwein"><span data-dcnode-id="2717" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2714"><span data-dcnode-id="2715" instrument_node="">]</span></span></span></h5><span data-dcnode-id="2711" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2703"><div class="thumbinner" data-dcnode-id="2704" style="width:222px;"><a class="image" data-dcnode-id="2709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AHohlwein_Karte_1913.JPG"><img alt="Hohlwein Karte 1913.JPG" class="thumbimage" data-dcnode-id="2710" data-file-height="448" data-file-width="318" decoding="async" height="310" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/8b/Hohlwein_Karte_1913.JPG/220px-Hohlwein_Karte_1913.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/8/8b/Hohlwein_Karte_1913.JPG 1.5x" width="220"></a><span data-dcnode-id="2708" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2705"><div class="magnify" data-dcnode-id="2706"><a class="internal" data-dcnode-id="2707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AHohlwein_Karte_1913.JPG" title="Enlarge"></a></div></div></div></div><span data-dcnode-id="2702" instrument_node="">
</span><p data-dcnode-id="2698"><a data-dcnode-id="2700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ludwig_Hohlwein" title="Ludwig Hohlwein"><span data-dcnode-id="2701" instrument_node="">Ludwig Hohlwein</span></a><span data-dcnode-id="2699" instrument_node=""> was born in Germany in 1874. He was trained and practiced as an architect until 1906 when he switched to poster design. Hohlwein's adaptations of photographic images was based on a deep and intuitive understanding of graphical principles. His creative use of color and architectural compositions dispels any suggestion that he uses photos as a substitute for creative design.
</span></p><p data-dcnode-id="2696"><span data-dcnode-id="2697" instrument_node="">for Riquet Pralinen Tea c. 1920–1926. Hohlwein was born in the Rhine-Main region of Germany, though he and his work are associated with Munich and Bavaria in southern Germany. There were two schools of Gebrauchsgrafik in Germany at the time, North and South. Hohlwein's high tonal contrasts and a network of interlocking shapes made his work instantly recognizable.
</span></p><p data-dcnode-id="2687"><span data-dcnode-id="2695" instrument_node="">Poster historian Alain Weill comments that "</span><i data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node="">Hohlwein was the most prolific and brilliant German posterist of the 20th century... Beginning with his first efforts, Hohlwein found his style with disconcerting facility. It would vary little for the next forty years. The drawing was perfect from the start, nothing seemed alien to him, and in any case, nothing posed a problem for him. His figures are full of touches of color and a play of light and shade that brings them out of their background and gives them substance</span></i><span data-dcnode-id="2692" instrument_node="">"</span><sup class="reference" data-dcnode-id="2689" id="cite_ref-74"><a data-dcnode-id="2690" href="#cite_note-74"><span data-dcnode-id="2691" instrument_node="">[74]</span></a></sup><span data-dcnode-id="2688" instrument_node="">
</span></p><span data-dcnode-id="2686" instrument_node="">
</span><h5 data-dcnode-id="2676"><span class="mw-headline" data-dcnode-id="2684" id="Lucian_Bernhard"><span data-dcnode-id="2685" instrument_node="">Lucian Bernhard</span></span><span class="mw-editsection" data-dcnode-id="2677"><span class="mw-editsection-bracket" data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">[</span></span><a data-dcnode-id="2680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_graphic_design%26action%3Dedit%26section%3D33" title="Edit section: Lucian Bernhard"><span data-dcnode-id="2681" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">]</span></span></span></h5><span data-dcnode-id="2675" instrument_node="">
</span><p data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">Over the course of his career, which lasted well into the 1950s, Lucian Bernhard became a prolific designer not only of innovative posters but of trademarks, packaging, type, textiles, furniture, and interior design.
