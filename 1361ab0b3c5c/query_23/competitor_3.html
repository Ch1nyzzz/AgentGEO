</span><h4 data-dcnode-id="2600"><span class="mw-headline" data-dcnode-id="2608" id="1972_Olympics_and_Otl_Aicher_posters"><span data-dcnode-id="2609" instrument_node="">1972 Olympics and Otl Aicher posters</span></span><span class="mw-editsection" data-dcnode-id="2601"><span class="mw-editsection-bracket" data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">[</span></span><a data-dcnode-id="2604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_graphic_design%26action%3Dedit%26section%3D35" title="Edit section: 1972 Olympics and Otl Aicher posters"><span data-dcnode-id="2605" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2599" instrument_node="">
</span><p data-dcnode-id="2590"><span data-dcnode-id="2598" instrument_node="">The internationally recognized artist </span><a data-dcnode-id="2596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Otl_Aicher" title="Otl Aicher"><span data-dcnode-id="2597" instrument_node="">Otl Aicher</span></a><span data-dcnode-id="2595" instrument_node=""> was a graphic designer, urban planner, photographer, and the mastermind behind the imagery for the 1972 Munich Olympics and the Rotis typeface. Growing as a child in Nazi Germany, Aicher, along with his friends Hans and Sophie Scholl, organized the anti-Nazi political organization Die Weisse Rose (the White Rose). In 1943, the Scholls and Aicher were arrested by the Nazi party. While Aicher was released, the Scholls went to trial where they were found guilty of treason and executed. After the war Aicher went on to help rebuild his ravaged city of Ulm and to found the influential international school of design, Hochschule für Gestaltung (HfG).</span><sup class="reference" data-dcnode-id="2592" id="cite_ref-75"><a data-dcnode-id="2593" href="#cite_note-75"><span data-dcnode-id="2594" instrument_node="">[75]</span></a></sup><span data-dcnode-id="2591" instrument_node="">
</span></p><p data-dcnode-id="2584"><span data-dcnode-id="2589" instrument_node="">In Munich's original bid for 1972 Olympic one of the main promises was to create a synthesis between sport and art. Otl Aicher was appointed as the head of the committee's visual design group, and his mandate was to deploy art in a relatively new role of promoting this global public event. From the start, posters were high on the agenda of the organizing committee, and ideas were discussed as early as September 1967 to publish a series of art posters that would ‘relate artistic activity to the Olympic Games and engage the best artists to collaborate’, and also to commission an internationally known artist for the official poster.</span><sup class="reference" data-dcnode-id="2586" id="cite_ref-76"><a data-dcnode-id="2587" href="#cite_note-76"><span data-dcnode-id="2588" instrument_node="">[76]</span></a></sup><span data-dcnode-id="2585" instrument_node="">
</span></p><p data-dcnode-id="2574"><span data-dcnode-id="2583" instrument_node="">Otl Aicher created the official posters for the 1972 Olympic Games in Munich. As he pointed out in his essay "Entwurf der Moderne"</span><sup class="reference" data-dcnode-id="2580" id="cite_ref-77"><a data-dcnode-id="2581" href="#cite_note-77"><span data-dcnode-id="2582" instrument_node="">[77]</span></a></sup><span data-dcnode-id="2579" instrument_node=""> (Designing the Modern Era), the German word entwerfen, meaning "to draft "or "design", also contains the verb werfen, meaning "to throw". But where? To whom? What? And with what intention? As Benjamin Secher writes: "He devised an invigorating, almost Day-glo palette for the Olympics that was utterly free of red and black - banned for their association with the German flag. Athletes depicted in the official posters for each sport had their uniforms stripped of any national identifier, leaving the emphasis firmly on individual effort. Even the logo for the Games, a graphic of a radiant sun, hammered home the message of universality and, above all, optimism."</span><sup class="reference" data-dcnode-id="2576" id="cite_ref-78"><a data-dcnode-id="2577" href="#cite_note-78"><span data-dcnode-id="2578" instrument_node="">[78]</span></a></sup><span data-dcnode-id="2575" instrument_node="">
</span></p><p data-dcnode-id="2566"><span data-dcnode-id="2573" instrument_node="">Aicher developed a comprehensive system to articulate the games' character across a wide range of materials, from signage to printed pieces and even staff uniforms. As the introduction to his exhibition at </span><a class="external text" data-dcnode-id="2571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sfmoma.org/exhibitions/389" rel="nofollow"><span data-dcnode-id="2572" instrument_node="">San Francisco Museum of Modern Art</span></a><span data-dcnode-id="2570" instrument_node=""> states: "His works including official posters and sporting event tickets, demonstrate the </span><a data-dcnode-id="2568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Design_tool" title="Design tool"><span data-dcnode-id="2569" instrument_node="">design tools</span></a><span data-dcnode-id="2567" instrument_node=""> Aicher used to join individual elements to the collective: structural grids, a bold and animating color palette, and ingenious pictograms. Aicher's orderly and pleasant design nimbly carried the weight of modern German history as it repositioned the nation's hospitality on the world stage".
</span></p><p data-dcnode-id="2561"><span data-dcnode-id="2565" instrument_node="">This is a poster of 1972 Olympics Yachting in Germany designed by </span><a data-dcnode-id="2563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Otl_Aicher" title="Otl Aicher"><span data-dcnode-id="2564" instrument_node="">Otl Aicher</span></a><span data-dcnode-id="2562" instrument_node="">. Using a bright color scheme, borrowed from 60s pop art and psychedelic art, and combining it with German modernism Aicher creates this visual graphic program.
</span></p><span data-dcnode-id="2560" instrument_node="">
</span><h3 data-dcnode-id="2550"><span class="mw-headline" data-dcnode-id="2558" id="Current_advertising"><span data-dcnode-id="2559" instrument_node="">Current advertising</span></span><span class="mw-editsection" data-dcnode-id="2551"><span class="mw-editsection-bracket" data-dcnode-id="2556"><span data-dcnode-id="2557" instrument_node="">[</span></span><a data-dcnode-id="2554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_graphic_design%26action%3Dedit%26section%3D36" title="Edit section: Current advertising"><span data-dcnode-id="2555" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2552"><span data-dcnode-id="2553" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2549" instrument_node="">
</span><p data-dcnode-id="2542"><a data-dcnode-id="2547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nike%2C_Inc." title="Nike, Inc."><span data-dcnode-id="2548" instrument_node="">Nike</span></a><span data-dcnode-id="2546" instrument_node="">'s </span><i data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">My Butt is Big poster</span></i><span data-dcnode-id="2543" instrument_node="">  appears to convey a bold and honest statement. The only part of a body in the picture is a butt. The text of a poem on the right repeats the curved form of the woman's bottom which is repeated again with some vividly colored splosh of red and purple dots in the background. The background is white, which contrasts with the darker skin of the model. The statement, "My butt is big" is red and larger than the rest of the poem.
Image:Courvoisier Cognac.jpg | This is a modern advertisement poster for Courvoisier Cognac. A balanced composition of the hands, feet, and face of the figure on a black background appear to convey the message of this poster.
</span></p><p data-dcnode-id="2528"><span data-dcnode-id="2541" instrument_node="">This is a look alike poster advertisement for </span><a data-dcnode-id="2539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wendy%2527s" title="Wendy's"><span data-dcnode-id="2540" instrument_node="">Wendy's</span></a><span data-dcnode-id="2538" instrument_node=""> "where's the Beef?" campaign. In the TV version of this ad, </span><a data-dcnode-id="2536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Clara_Peller" title="Clara Peller"><span data-dcnode-id="2537" instrument_node="">Clara Peller</span></a><span data-dcnode-id="2535" instrument_node="">, a gray-haired actress, stared at an unimpressive looking hamburger and asked, "Where's the beef?" This simple message was so sharp that by asking the same question about his rival's program Vice President </span><a data-dcnode-id="2533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Walter_Mondale" title="Walter Mondale"><span data-dcnode-id="2534" instrument_node="">Walter Mondale</span></a><span data-dcnode-id="2532" instrument_node=""> effectively neutralized Colorado Senator </span><a data-dcnode-id="2530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gary_Hart" title="Gary Hart"><span data-dcnode-id="2531" instrument_node="">Gary Hart</span></a><span data-dcnode-id="2529" instrument_node="">'s momentum in the 1984 presidential campaign.
</span></p><p data-dcnode-id="2523"><span data-dcnode-id="2527" instrument_node="">This is a perfume advertisement for </span><a class="mw-redirect" data-dcnode-id="2525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chanel_No_5" title="Chanel No 5"><span data-dcnode-id="2526" instrument_node="">Chanel No 5</span></a><span data-dcnode-id="2524" instrument_node="">. The combination of the female figure with the number 5, together with the striking color of dress have resulted in creation of its visual graphic impact.
</span></p><span data-dcnode-id="2522" instrument_node="">
</span><h2 data-dcnode-id="2512"><span class="mw-headline" data-dcnode-id="2520" id="Comics_and_graphic_novels"><span data-dcnode-id="2521" instrument_node="">Comics and graphic novels</span></span><span class="mw-editsection" data-dcnode-id="2513"><span class="mw-editsection-bracket" data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">[</span></span><a data-dcnode-id="2516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_graphic_design%26action%3Dedit%26section%3D37" title="Edit section: Comics and graphic novels"><span data-dcnode-id="2517" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2514"><span data-dcnode-id="2515" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2511" instrument_node="">
</span><p data-dcnode-id="2505"><span data-dcnode-id="2510" instrument_node="">A comic refers to a magazine or book of narrative artwork and, virtually always, dialog and descriptive prose. Despite the term, the subject matter in comic is not necessarily humorous; in fact, it is often serious and action-oriented. Due to the fact that graphic design constitutes the main foundation of comics it plays a crucial role in conveying various narratives through its compositional devices, line drawings and colouring scheme.</span><sup class="reference" data-dcnode-id="2507" id="cite_ref-79"><a data-dcnode-id="2508" href="#cite_note-79"><span data-dcnode-id="2509" instrument_node="">[79]</span></a></sup><span data-dcnode-id="2506" instrument_node="">
</span></p><span data-dcnode-id="2504" instrument_node="">
</span><h3 data-dcnode-id="2494"><span class="mw-headline" data-dcnode-id="2502" id="Conventional_comics_and_pop_art"><span data-dcnode-id="2503" instrument_node="">Conventional comics and pop art</span></span><span class="mw-editsection" data-dcnode-id="2495"><span class="mw-editsection-bracket" data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">[</span></span><a data-dcnode-id="2498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_graphic_design%26action%3Dedit%26section%3D38" title="Edit section: Conventional comics and pop art"><span data-dcnode-id="2499" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2493" instrument_node="">
</span><p data-dcnode-id="2447"><a data-dcnode-id="2491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Superman" title="Superman"><span data-dcnode-id="2492" instrument_node="">Superman</span></a><span data-dcnode-id="2490" instrument_node="">, from the cover art of Superman, issue 204 (April 2004). Art by </span><a data-dcnode-id="2488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jim_Lee" title="Jim Lee"><span data-dcnode-id="2489" instrument_node="">Jim Lee</span></a><span data-dcnode-id="2487" instrument_node=""> and </span><a data-dcnode-id="2485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scott_Williams_%28artist%29" title="Scott Williams (artist)"><span data-dcnode-id="2486" instrument_node="">Scott Williams</span></a><span data-dcnode-id="2484" instrument_node="">. Superman is widely considered to be an American </span><a data-dcnode-id="2482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_icon" title="Cultural icon"><span data-dcnode-id="2483" instrument_node="">cultural icon</span></a><span data-dcnode-id="2481" instrument_node="">.</span><sup class="reference" data-dcnode-id="2478" id="cite_ref-TCS11_80-0"><a data-dcnode-id="2479" href="#cite_note-TCS11-80"><span data-dcnode-id="2480" instrument_node="">[80]</span></a></sup><sup class="reference" data-dcnode-id="2475" id="cite_ref-81"><a data-dcnode-id="2476" href="#cite_note-81"><span data-dcnode-id="2477" instrument_node="">[81]</span></a></sup><sup class="reference" data-dcnode-id="2472" id="cite_ref-82"><a data-dcnode-id="2473" href="#cite_note-82"><span data-dcnode-id="2474" instrument_node="">[82]</span></a></sup><sup class="reference" data-dcnode-id="2469" id="cite_ref-83"><a data-dcnode-id="2470" href="#cite_note-83"><span data-dcnode-id="2471" instrument_node="">[83]</span></a></sup><span data-dcnode-id="2468" instrument_node=""> Created by American writer </span><a data-dcnode-id="2466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jerry_Siegel" title="Jerry Siegel"><span data-dcnode-id="2467" instrument_node="">Jerry Siegel</span></a><span data-dcnode-id="2465" instrument_node=""> and Canadian-born artist </span><a data-dcnode-id="2463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joe_Shuster" title="Joe Shuster"><span data-dcnode-id="2464" instrument_node="">Joe Shuster</span></a><span data-dcnode-id="2462" instrument_node=""> in 1932. The character first appeared in </span><i data-dcnode-id="2459"><a data-dcnode-id="2460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Action_Comics" title="Action Comics"><span data-dcnode-id="2461" instrument_node="">Action Comics</span></a></i><span data-dcnode-id="2458" instrument_node=""> in 1938. The character's appearance is distinctive and iconic: a red, blue and yellow costume, complete with cape and with a stylized "S" shield on his chest.</span><sup class="reference" data-dcnode-id="2455" id="cite_ref-TCS18_84-0"><a data-dcnode-id="2456" href="#cite_note-TCS18-84"><span data-dcnode-id="2457" instrument_node="">[84]</span></a></sup><sup class="reference" data-dcnode-id="2452" id="cite_ref-85"><a data-dcnode-id="2453" href="#cite_note-85"><span data-dcnode-id="2454" instrument_node="">[85]</span></a></sup><sup class="reference" data-dcnode-id="2449" id="cite_ref-86"><a data-dcnode-id="2450" href="#cite_note-86"><span data-dcnode-id="2451" instrument_node="">[86]</span></a></sup><span data-dcnode-id="2448" instrument_node="">
</span></p><p data-dcnode-id="2445"><span data-dcnode-id="2446" instrument_node="">Shang-Chi was created by writer Steve Englehart and artist Jim Starlin. He has no special superpowers, but he exhibits extraordinary skills in the martial arts. 1972
</span></p><p data-dcnode-id="2440"><span data-dcnode-id="2444" instrument_node="">This is Steranko's Contessa Valentina Allegra di Fontaine, from </span><i data-dcnode-id="2442"><span data-dcnode-id="2443" instrument_node="">Strange Tales</span></i><span data-dcnode-id="2441" instrument_node="">, (Volume 168, May 1968). Lichtenstein's Drowning Girl, and its word balloon appears to have been inspired by a comic similar to this work.
</span></p><p data-dcnode-id="2428"><span data-dcnode-id="2439" instrument_node="">Selecting the old-fashioned comic strip as subject matter, </span><a data-dcnode-id="2437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roy_Lichtenstein" title="Roy Lichtenstein"><span data-dcnode-id="2438" instrument_node="">Roy Lichtenstein</span></a><span data-dcnode-id="2436" instrument_node=""> used the splash page of a romance story lettered by </span><a data-dcnode-id="2434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ira_Schnapp" title="Ira Schnapp"><span data-dcnode-id="2435" instrument_node="">Ira Schnapp</span></a><span data-dcnode-id="2433" instrument_node=""> in Secret Hearts, (volume 83, November 1962), and slightly reworked the art and dialogue by re-lettering Schnapp's original word balloon. This precise composition, titled Drowning Girl (1963) is now part of the permanent collection of the Museum of Modern Art, New York.</span><sup class="reference" data-dcnode-id="2430" id="cite_ref-87"><a data-dcnode-id="2431" href="#cite_note-87"><span data-dcnode-id="2432" instrument_node="">[87]</span></a></sup><span data-dcnode-id="2429" instrument_node="">

</span><p data-dcnode-id="2279"><span data-dcnode-id="2309" instrument_node="">Graphic design is used to make a </span><a class="mw-redirect" data-dcnode-id="2307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Web_site" title="Web site"><span data-dcnode-id="2308" instrument_node="">web site</span></a><span data-dcnode-id="2306" instrument_node=""> understandable, memorable and attractive to the end user as well to present its content in a user friendly fashion.</span><sup class="reference" data-dcnode-id="2303" id="cite_ref-88"><a data-dcnode-id="2304" href="#cite_note-88"><span data-dcnode-id="2305" instrument_node="">[88]</span></a></sup><sup class="reference" data-dcnode-id="2300" id="cite_ref-WordArc_89-0"><a data-dcnode-id="2301" href="#cite_note-WordArc-89"><span data-dcnode-id="2302" instrument_node="">[89]</span></a></sup><span data-dcnode-id="2299" instrument_node=""> Graphic design ties in closely to </span><a data-dcnode-id="2297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/User_interface_design" title="User interface design"><span data-dcnode-id="2298" instrument_node="">user interface design</span></a><span data-dcnode-id="2296" instrument_node=""> and </span><a data-dcnode-id="2294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/User_experience_design" title="User experience design"><span data-dcnode-id="2295" instrument_node="">user experience design</span></a><span data-dcnode-id="2293" instrument_node=""> for the web, since aesthetics can impact how well people are able to interact with web content. The web dates back to the early 1980s at </span><a data-dcnode-id="2291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/CERN" title="CERN"><span data-dcnode-id="2292" instrument_node="">CERN</span></a><span data-dcnode-id="2290" instrument_node="">, a European high energy physics research facility. </span><a data-dcnode-id="2288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tim_Berners-Lee" title="Tim Berners-Lee"><span data-dcnode-id="2289" instrument_node="">Tim Berners-Lee</span></a><sup class="reference" data-dcnode-id="2285" id="cite_ref-90"><a data-dcnode-id="2286" href="#cite_note-90"><span data-dcnode-id="2287" instrument_node="">[90]</span></a></sup><span data-dcnode-id="2284" instrument_node=""> who did the initial development stage was interested in the ability to link academic papers electronically and to utilize the internet in order to correspond with people in other laboratories around the world. He is credited with the construction of the first website in August 1991.</span><sup class="reference" data-dcnode-id="2281" id="cite_ref-91"><a data-dcnode-id="2282" href="#cite_note-91"><span data-dcnode-id="2283" instrument_node="">[91]</span></a></sup><span data-dcnode-id="2280" instrument_node="">
</span></p><span data-dcnode-id="2278" instrument_node="">
