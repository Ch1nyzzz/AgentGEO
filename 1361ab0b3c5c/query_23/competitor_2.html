Louis Kahn In the work of Louis Kahn (1901–74) the critique of mainstream Modernism was both more subtle and more radical than that of the architects so far mentioned. Nonetheless, Kahn’s work can best be approached in the context of the New Monumentality movement promoted by Sigfried Giedion, Josep Lluis Sert, and Kahn’s mentor, George Howe.18 From his early years as an architect Kahn was actively involved in the housing reform movement and spent the years from 1940 to 1947 as the chief designer in successive partnerships with George Howe and Oskar Stonorov, working on government housing projects. He was deeply sympathetic to the communitarian ideas of writers like Lewis Mumford, Paul and Percival Goodman, and Hannah Arendt, and shared their belief in the need for a civic architec248 pax americana: architecture in america 1945‒65</span><br data-dcnode-id="2637"><span data-dcnode-id="2636" instrument_node="">
</span><br data-dcnode-id="2635"><span data-dcnode-id="2634" instrument_node="">
174 Louis Kahn</span><br data-dcnode-id="2633"><span data-dcnode-id="2632" instrument_node="">
</span><br data-dcnode-id="2631"><span data-dcnode-id="2630" instrument_node="">
Jewish Community Center, 1954-9, Trenton Here the structural aedicules are organized on a binary grid. There are two kinds of space: primary (served) and secondary (servant). Partitions may occur only on grid lines and are optional, depending on distribution requirements. For extra-large spaces columns are omitted but the roof pattern remains constant.</span><br data-dcnode-id="2629"><span data-dcnode-id="2628" instrument_node="">
</span><br data-dcnode-id="2627"><span data-dcnode-id="2626" instrument_node="">
ture that would inspire people with a sense of common purpose and democratic participation. A few years after he started practising on his own in 1947, Kahn s work began to depart radically from the received Modernist tradition. In his new work there seems to have been a fusion of the ideas of Viollet-le-Duc and those of neoclassicism (traceable, in particular, to the writings of the early-nineteenth-century theoretician Quatremere de Quincy), both available to Kahn through the Beaux-Arts tradition in which he was formed. On the one hand he was drawn to Viollet's structural rationalism. On the other hand he believed in the concept of unchanging forms or types.19 For Kahn, a convergence between the two traditions was suggested by the Platonic geometries found in nature, as demonstrated in the books of Ernst Haeckel and D'Arcy Wentworth Thompson.20 A similar interest in these geometries was shown by Buckminster Fuller, Robert Le Ricolais (1897-1977), and Konrad Wachsmann (1901-80),</span><br data-dcnode-id="2625"><span data-dcnode-id="2624" instrument_node="">

175 Louis Kahn Richards Medical Research Laboratories, University of Pennsylvania, 1957–65, Philadelphia Here the served–servant principle is adapted to a multi-storey building. It proved difﬁcult to reconcile the demanding technical requirements of the laboratories with Kahn’s formal system.</span><br data-dcnode-id="2617"><span data-dcnode-id="2616" instrument_node="">
</span><br data-dcnode-id="2615"><span data-dcnode-id="2614" instrument_node="">
whose polyhedral space-frame structures strongly inﬂuenced Kahn’s architecture in the early 1950s (Kahn referred to space-frames as ‘hollow stones’). Kahn’s critique of Modernism started with a rejection of the ‘free plan’. He believed that in uncoupling form from structure the free plan as variously interpreted by Mies van der Rohe and Le Corbusier had opened up a void that could only be ﬁlled by subjective intuition. ‘Mies’s sensitivities’, he said, ‘react to imposed structural order with little inspiration . . . Le Corbusier . . . passes through order impatiently and hurries to form’.21 Kahn’s breakthrough to a different ordering principle came with his Adler and DeVore house projects (1954–5) [173] and the Trenton Bath House (1957), where the aggregation of identical ‘rooms’ reduced architecture to its most primitive unit of meaning. In subsequent projects these units were organized in a number of ways: as close-packed agglomerations, as strings, as random clusters, or as small spaces grouped round a central space. The signiﬁcant element is always 250 pax americana: architecture in america 1945‒65</span><br data-dcnode-id="2613"><span data-dcnode-id="2612" instrument_node="">
</span><br data-dcnode-id="2611"><span data-dcnode-id="2610" instrument_node="">
the room-space itself. As Kahn expressed it: ‘Space made by a dome and then divided by walls is not the same space . . . a room should be a constructed entity or an ordered segment of a construction system.’22 Kahn’s double allegiance to structural organicism and classicism— to a whole that has not yet appeared and a whole that has been lost—cuts across this generalized schema. The unbuilt project for a Jewish Community Center at Trenton (1954–9) [174] exhibits both these tendencies. A new arbitrary relation between form and function appears. Architectural forms no longer correspond to immutable causal relationships as they are supposed to do in functionalism. A binary grid is set up in which the only ﬁxed hierarchy is that between positive (served) and negative (servant) spaces. Apart from this, any combination of functions can be inserted. In the adaptation of an architectural programme to this a priori system a new tension arises between Platonic and circumstantial orders.23 In the Richards Medical Research Laboratories at the University of Pennsylvania (1957–65) [175] Kahn had difﬁculty in reconciling a highly technical programme to the system.24 In the Salk Institute for Biological Sciences in La Jolla (1959–65) he solved the problem by relegating the bulk of the programme to two enormous, ﬂexible sheds and restricting symbolic expression to ﬁxed administrative pavilions facing the plaza (there is an analogy here to the exhibition pavilions in the Chicago World’s Fair). At the other extreme lie projects like the First Unitarian Church in Rochester (1961) [176] and the National Assembly Building at Dhaka, 176 Louis Kahn Plan, First Unitarian Church, 1961, Rochester, New York In this building the secondary rooms are clustered according to empirical needs around the church hall. Kahn avoids strict classical symmetry.</span><br data-dcnode-id="2609"><span data-dcnode-id="2608" instrument_node="">

pax americana: architecture in america 1945‒65 251</span><br data-dcnode-id="2605"><span data-dcnode-id="2604" instrument_node="">
</span><br data-dcnode-id="2603"><span data-dcnode-id="2602" instrument_node="">
Bangladesh (1962–83) [177, 178],25 where secondary spaces are grouped round a central volume, as in Byzantine and centralized Renaissance churches. In the ﬁnal version of the Rochester building, the symmetry is distorted by circumstantial, ‘secular’ pressures. But in the Dhaka Assembly the geometrical expression of unity is unremitting; nothing circumstantial disturbs the rigidly hieratic order. It is clear that for Kahn the Dhaka Assembly had taken on strong religious connotations. We no longer ﬁnd the connection between democratic social practices and symbolic forms that were characteristic of his early civic designs. From the very outset of the Modern Movement a ﬁssure had opened up between two dominant and opposed concepts—organic expression 177 Louis Kahn National Assembly Building, 1962–83, Dhaka The Platonic volumes are punctured by geometrical openings that avoid stylistic reference. The building is monumental and hermetic, suggesting a religious rather than secular purpose.</span><br data-dcnode-id="2601"><span data-dcnode-id="2600" instrument_node="">
</span><br data-dcnode-id="2599"><span data-dcnode-id="2598" instrument_node="">
252 pax americana: architecture in america 1945‒65</span><br data-dcnode-id="2597"><span data-dcnode-id="2596" instrument_node="">
</span><br data-dcnode-id="2595"><span data-dcnode-id="2594" instrument_node="">
178 Louis Kahn National Assembly Building, 1962–83, Dhaka The plan shows how the servant spaces are symmetrically grouped round the assembly chamber.</span><br data-dcnode-id="2593"><span data-dcnode-id="2592" instrument_node="">
</span><br data-dcnode-id="2591"><span data-dcnode-id="2590" instrument_node="">
on the one hand and the normative and standardized on the other. Adolf Behne’s distinction between ‘functionalism’ and ‘rationalism’, Le Corbusier’s concept of the free plan, and the dislocation in Mies van der Rohe’s American phase between the regular building envelope and its variable content, were merely particular, working formulations of a more general problem of disjunction. Louis Kahn, whether we see his work as derived from Viollet-leDuc or the classical tradition, started from the same problem, but moved in a different direction. This direction was being explored at the same time by Team X, and had been adumbrated by Le Corbusier in his accentuation of each living cell in the Unité d’Habitation and other post-war projects. For Kahn—going much further than Le Corbusier in this direction—architecture only took on meaning when a unit of structure coincided with a unit of habitable space. This made the free plan inoperative and gave rise to a new problem: instead of being free to pax americana: architecture in america 1945‒65 253</span><br data-dcnode-id="2589"><span data-dcnode-id="2588" instrument_node="">
</span><br data-dcnode-id="2587"><span data-dcnode-id="2586" instrument_node="">
develop independently, as they were according to the logic of the free plan, ideal and circumstantial orders were now locked in a dialectic, directing attention to the conﬂict between transcendent architectural values and the contingencies of the modern economy. Louis Kahn belonged ﬁrmly to the Modernist tradition in at least one respect: he wanted to create an architecture that would embody a new politico-moral order. In his attempt to achieve this he arrived at a surprising new formulation of an old problem—how to achieve an architecture that would be absolutely new but at the same time would reafﬁrm timeless architectural truths. The effect of this effort was to bring to a head and accelerate the existing crisis within the Modern Movement. Rational functionalism had seemed to take on a new lease of life in post-war America, but by the 1960s its principles seemed incapable of dealing with the web-like complexities of late capitalism. The Utopian promise of a new, uniﬁed, and universal architecture was becoming increasingly implausible. If there could still be said to be a ‘spirit of the epoch’, a Zeitgeist, it was now the self-contradictory one of pluralism. Modernism was to survive, but only after abandoning its totalizing claims and by a process of continual self-cancellation. Paradoxically, the work of Louis Kahn—anchored as it was in a belief in a transcendent order—was one of the chief propelling agents in this emerging regime of uncertainty.</span><br data-dcnode-id="2585"><span data-dcnode-id="2584" instrument_node="">
