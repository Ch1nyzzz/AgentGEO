Introduction</span><br data-dcnode-id="4961"><span data-dcnode-id="4960" instrument_node="">
</span><br data-dcnode-id="4959"><span data-dcnode-id="4958" instrument_node="">
The term ‘modern architecture’ is ambiguous. It can be understood to refer to all buildings of the modern period regardless of their ideological basis, or it can be understood more speciﬁcally as an architecture conscious of its own modernity and striving for change. It is in the latter sense that it has generally been deﬁned in histories of contemporary architecture, and the present book follows this tradition. Already in the early nineteenth century, there was wide dissatisfaction with eclecticism among architects, historians, and critics. This welldocumented attitude justiﬁes a history of modern architecture concerned primarily with reformist, ‘avant-garde’ tendencies, rather than one that attempts to deal with the whole of architectural production as if it operated within a non-ideological, neutral ﬁeld. It is in the space between the idealist utopias of the historical avantgardes and the resistances, complexities, and pluralities of capitalist culture that this book seeks to situate itself. Though not attempting to be in any way encyclopedic, the narrative follows an overall chronological sequence, and tries to be, perhaps, less certain in its outcome and less triumphalist than those of most previous histories of modernism. The book consists of a number of essays that can be read either as selfcontained narratives or as part of a larger whole, each dealing with a cluster of related themes reﬂecting an important moment in the confrontation of architecture with the external conditions of modernity. If it is still largely a history of the masters, that is because that was the nature of modernism itself, despite its many claims to anonymity. A word on terminology: I use—more or less interchangeably—the terms ‘modern architecture’, ‘Modernism’, ‘the avant-garde’, to mean the progressive movements of the 1910s and 1920s as a whole. I also occasionally use the term ‘historical avant-garde’, which has the effect of historicizing the movement and distinguishing it from contemporary practice. I do not follow Peter Bürger (Theory of the Avant-Garde, 1984), who, in the context of Dada photomontage, distinguishes between an avant-garde that sought to change the status of art within the relations of production and a Modernism that sought only to change its forms. That these two polar positions can be applied to architecture is undeniable. But the line between them is hard to deﬁne, 9</span><br data-dcnode-id="4957"><span data-dcnode-id="4956" instrument_node="">
</span><br data-dcnode-id="4955"><span data-dcnode-id="4954" instrument_node="">
and even the work of the Left Constructivists and Marxists like Hannes Meyer does not, in my opinion, escape aestheticism. This is hardly surprising, since, before it could be separated from the classical–academic theory of the arts, aesthetics had ﬁrst to become an autonomous category. Apart from the general terms mentioned above—which are useful precisely because of their semantic vagueness—other terms are used, either to deﬁne well-attested sub-movements, such as Futurism, Constructivism, De Stijl, L’Esprit Nouveau, and the Neue Sachlichkeit (New Objectivity), or migratory tendencies within the overall phenomenon of modernism, such as organicism, neoclassicism, Expressionism, functionalism, and rationalism. I have tried to explain what I mean by these slippery terms in the appropriate chapters. From a certain perspective, general terms such as ‘modernism’ can also be applied to Art Nouveau—as, indeed, the temporal span of this book implies. To try to avoid such ambiguities would be to make unsustainable claims for logic. Art Nouveau was both the end and the beginning of an era, and its achievements as well as its limitations were the result of this Janus-like perspective. Many aspects of Modernist theory still seem valid today. But much in it belongs to the realm of myth, and is impossible to accept at face value. The myth itself has now become history, and demands critical interpretation. One of the main ideas motivating the protagonists of the Modern Movement was the Hegelian notion that the study of history made it possible to predict its future course. But it is scarcely possible any longer to believe—as the Modernist architects appear to have believed—that the architect is a kind of seer, uniquely gifted with the power of discerning the spirit of the age and its symbolic forms. Such a belief was predicated on the possibility of projecting the conditions of the past onto the present. For progressive-minded architects of the nineteenth century and their twentieth-century successors, it seemed essential to create a uniﬁed architectural style that would reﬂect its age, just as previous styles had reﬂected theirs. This meant the rejection of an academic tradition that had degenerated into eclecticism, imprisoned in a history that had come to an end and whose forms could only be endlessly recycled. It did not imply a rejection of tradition as such. The architecture of the future would return to the true tradition, in which, it was believed, a harmonious and organic unity had existed between all the cultural phenomena of each age. In the great historical periods artists had not been free to choose the style in which they worked. Their mental and creative horizons had been circumscribed by a range of forms that constituted their entire universe. The artist came into a world already formed. The study of history seemed to reveal that these periods constituted indivisible totalities. On the one hand, there were elements unique to each period; on the other, the organic unity that bound these elements together was itself a universal. The new age 10 introduction</span><br data-dcnode-id="4953"><span data-dcnode-id="4952" instrument_node="">
</span><br data-dcnode-id="4951"><span data-dcnode-id="4950" instrument_node="">
must exhibit the cultural totality characteristic of all historical periods. The question was never asked how a cultural totality, which by deﬁnition had depended on an involuntary collective will, could now be achieved voluntarily by a number of individuals. Nor did it ever seem to have occurred to those who held this view that what separated the past from the present might be precisely the absence of this inferred organic unity. According to the model of the organic unity of culture, the task of the architect was ﬁrst to uncover and then create the unique forms of the age. But the possibility of such an architecture depended on a deﬁnition of modernity that ﬁltered out the very factors that differentiated it most strongly from earlier traditions: capitalism and industrialization. William Morris, the founder of the Arts and Crafts movement, had rejected both capitalism and machine production, a position that was at least consistent. But the theorists of the German Werkbund, while they rejected capitalism, wanted to retain industrialization. They condemned what they saw as the materialistic values of both Marxism and Western liberal democracy, but sought an alternative that would combine the beneﬁts of modern technology with a return to the preindustrial community values that capitalism was in the process of destroying. The Modern Movement was both an act of resistance to social modernity and an enthusiastic acceptance of an open technological future. It longed for a world of territorial and social ﬁxity, while at the same time embracing, incompatibly, an economy and technology in ﬂux. It shared this belief in a mythical ‘third way’ between capitalism and communism with the Fascist movements of the 1930s, and though it would be completely wrong to brand it with the crimes of Fascism, it is surely no accident that the period of its greatest intensity coincided with the anti-democratic, totalitarian political movements that were such a dominant feature of the ﬁrst half of the twentieth century. The conclusion would seem inescapable that the cultural unity and shared artistic standards—whether deriving from folk or from aristocratic traditions—demanded by the modern movement from its inception were increasingly out of step with the political and economic realities of the twentieth century. Based on an idealist and teleological conception of history, modernist theory seems radically to have misread the very Zeitgeist it had itself invoked, ignoring the complex and indeterminate nature of modern capitalism, with its dispersal of power and its constant state of movement. The revolution of modernism—partly voluntary, partly involuntary—has irrevocably changed the course of architecture. But in the process it has itself become transformed. Its totalizing ambitions can no longer be sustained. Yet, the adventure of the Modern Movement is still capable of acting as an inspiration for a present whose ideals are so much less clearly deﬁned. It is the aim of this book to sharpen our image of that adventure. introduction 11</span><br data-dcnode-id="4949"><span data-dcnode-id="4948" instrument_node="">

In 1892 the short-lived but vigorous Art Nouveau movement was launched in Belgium and quickly spread, first to France and then to the rest of Europe. Its inspiration came from the English Arts and Crafts movement and developments in wrought iron technology, particularly as interpreted by the French architect and theorist, Eugene-Emmanuel Violletle-Duc (1814—79). The movement was closely associated with the rise of a new industrial bourgeoisie on the one hand and, on the other, with the many movements for political independence mfin-de-siecle Europe. It spread rapidly by means of journals such as The Studio, which included high-quality, mass-produced images, made possible by the new printing techniques of offset lithography and photolithography which came into commercial use in the i88os and 18908. Art Nouveau was the first systematic attempt to replace the classical system of architecture and the decorative arts that had been handed down from the seventeenth century and was enshrined in the teaching of the Beaux-Arts academies. The new movement abandoned the post-Renaissance convention of realism, drawing inspiration from styles outside the classical canon—from Japan, from the Middle Ages, and even from Rococo. Though it lasted barely 15 years, many of its precepts were incorporated into the avant-garde movements that followed. Like all progressive movements of the late nineteenth and early twentieth centuries, Art Nouveau was caught in an inherent dilemma—how to preserve the historical values of art under conditions of industrial capitalism. The Industrial Revolution had radically altered both the individual and the collective conditions of artistic production. In the face of this situation Art Nouveau artists and architects reacted in a way that would become typical of later avantgardes: they leapt over recent history to a remote and idealized past in order to find an art that could be historically justified and yet be absolutely new. Although Art Nouveau was preceded and profoundly influenced by the Arts and Crafts movement, the two continued in parallel, each modifying the other. In Austria, and to some extent in England, there was a fusion of the two movements. In Germany the influence of the 13</span><br data-dcnode-id="4929"><span data-dcnode-id="4928" instrument_node="">
</span><br data-dcnode-id="4927"><span data-dcnode-id="4926" instrument_node="">
Arts and Crafts proved the stronger of the two, leading to the Deutscher Werkbund and the alliance between industry and the decorative arts.</span><br data-dcnode-id="4925"><span data-dcnode-id="4924" instrument_node="">

The reform of the industrial arts Art Nouveau was the outcome of a transformation in the industrial, or decorative, arts that had been initiated in England and France earlier in the nineteenth century. As early as 1835 a parliamentary commission had been set up in England to study the problem of the decline in artistic quality of machine-made objects and the consequent damage to the export market. In 1851 a Great Exhibition of Industry of all Nations was organized in London, following a similar but abortive project in France. (France had led the way in industrial exhibitions but these had been exclusively national.) The Great Exhibition was a huge commercial and political success, but it conﬁrmed the low quality of decorative products not only in England but in all the industrial countries, compared to those of the East. This realization prompted a succession of initiatives both in England and France . In England, the Victoria and Albert Museum and the Department of Practical Art were founded in 1852, and a spate of books on the decorative arts appeared, including the inﬂuential Grammar of Ornament (1856) by Owen Jones (1809–74). In France, the Comité central des beaux-arts appliqués à l’industrie was founded (also in 1852), followed by the Union centrale des beauxarts appliqués à l’ndustrie (1864), which later became the Union centrale des arts décoratifs. Though originating from the same concerns, these institutional reforms resulted in a different development in each country. In England, after the government initiatives of the 1830s, the reform of the arts became a private affair, dominated by a single individual, the artist and poet William Morris (1834–96). For Morris, as for the philosopher-critic John Ruskin (1819–1900), the reform of the industrial arts was impossible under the present conditions of industrial capitalism by which the artist was alienated from the product of his labour. In 1861, he set up the ﬁrm of Morris, Marshall, and Faulkner to create a context for artists to relearn the various crafts under conditions as near as possible to those of the medieval guilds. Morris’s initiative was followed up by others, creating what was to become known as the Arts and Crafts movement. The situation in France was different. First there was a politically inﬂuential art establishment, based on the Academy, fundamentally conservative, but aware of the need for reform and eager to promote it.1 Secondly, the abolition of the guilds during the French Revolution had 14 art nouveau 1890‒1910</span><br data-dcnode-id="4917"><span data-dcnode-id="4916" instrument_node="">
</span><br data-dcnode-id="4915"><span data-dcnode-id="4914" instrument_node="">
not destroyed artisanal traditions in France as thoroughly as the Industrial Revolution had those of England. When they began experimenting with new techniques and forms in the 1870s, artists and craftsmen working in the decorative arts such as Eugène Rousseau (1827–91), Felix Bracquemond (1833–1914), and Emile Gallé (1846–1904) were able to build upon existing craft traditions. The ultimate model for both English and French artists was the medieval guild, but in France this model was combined with the more recent domestic tradition of Rococo.</span><br data-dcnode-id="4913"><span data-dcnode-id="4912" instrument_node="">

Viollet-le-Duc and structural rationalism The Arts and Crafts movement and its off-shoot, the English ‘freestyle’ house were to have a considerable inﬂuence on the development of Art Nouveau. But there was another inﬂuence at work as well—the use of iron as an expressive architectural medium. The role of iron in architecture had been central to the debates between traditionalist and progressive–positivist architects in France throughout the nineteenth century. The debate was stimulated by the projects of the SaintSimonian engineers and entrepreneurs who were largely responsible for laying down the French technical infrastructure in the 1840s and 1850s, and by discussions in the progressive magazine Revue de l’Architecture under the editorship of César-Denis Daly (1811–93). But it was chieﬂy through the theories and designs of Viollet-le-Duc that iron became associated with the reform of the decorative arts, and that an idealist decorative movement became grafted onto the positivist structural tradition. The career of Viollet-le-Duc had been devoted to the distillation of the rational and vitalistic core of Gothic architecture, which he saw as the only true basis for a modern architecture. The main precepts Viollet bequeathed to the Art Nouveau movement were: the exposure of the armature of a building as a visually logical system; the spatial organization of its parts according to function rather than to rules of symmetry and proportion; the importance of materials and their properties as generators of form; the concept of organic form, deriving from the Romantic movement; and the study of vernacular domestic architecture. Through two of his many books, Entretiens sur l’Architecture (Lectures on Architecture) and the Dictionnaire Raisonné de l’Architecture Française (Dictionary of French Architecture), Viollet-le-Duc became the rallying point for all those opposed to the Beaux-Arts. This was true not only in France, where ‘alternative ateliers’ were set up (though these were soon reabsorbed into the Beaux-Arts system),2 but also elsewhere in Europe and in North America. His inﬂuence on the Art Nouveau movement came from both his theory and his designs. art nouveau 1890‒1910 15</span><br data-dcnode-id="4909"><span data-dcnode-id="4908" instrument_node="">
</span><br data-dcnode-id="4907"><span data-dcnode-id="4906" instrument_node="">
Symbolism Most historians3 agree that important changes took place in the intellectual climate of Western Europe in the last two decades of the nineteenth century. The century had been dominated by a belief in progress made possible by science and technology, a belief that found its philosophical formulation in the movement known as Positivism founded by Auguste Comte (1798–1857). In literature and art it was Naturalism that corresponded most closely to the prevailing Positivist frame of mind. But by the 1880s belief in Positivism had begun to erode, together with the faith in liberal politics that had supported it. Several political events no doubt contributed to this phenomenon, including the terrible European economic depression that began in 1873. In France, the home of Positivism, the change of intellectual climate was especially noticeable, and it was accompanied by a signiﬁcant increase in the inﬂuence of German philosophy. In literature, the Symbolist movement led the attack. The Symbolists held that art should not imitate appearances but should reveal an essential underlying reality. This idea had been anticipated by Baudelaire, whose poem Correspondences (which incorporated Emanuel Swedenborg’s theory of synaesthesia, though probably unknowingly), gives voice to the idea that the arts are intimately related to each other at a profound level: ‘like long echoes which from afar become confused . . . Perfumes, colours, and sounds respond to each other.’ In describing the movement, the Belgian Symbolist poet Emile Verhaeren compared German to French thought, to the detriment of the latter: ‘In Naturalism [is found] the French philosophy of the Comtes and the Littrés; in [Symbolism] the German philosophy of Kant and Fichte . . . In the latter, the fact and the world become a mere pretext for the idea; they are treated as appearance, condemned to incessant variability, appearing ultimately as dreams in our mind.’4 The Symbolists did not reject the natural sciences, but looked on science as the veriﬁcation of subjective states of mind. As one contributor (probably Verhaeren) to the Symbolist journal L’Art Moderne said: ‘Since the methods that were formerly instinctive have become scientiﬁc . . . a change has been produced in the personality of artists.’5</span><br data-dcnode-id="4905"><span data-dcnode-id="4904" instrument_node="">

work of the 1870s and 1880s [2].6 Common to these proto-Art Nouveau works was the principle that in ornament the imitation of nature should be subordinated to the organization of the plane surface. In his book Du dessin et de la couleur (Drawing and Colour), published in 1885, the ceramicist Felix Bracquemond deﬁned the new concept in the following terms: ‘Ornament does not necessarily copy nature even when it borrows from her . . . Its inﬁdelity to her . . . [is] due to the fact that it is solely concerned with embellishing surfaces, that it depends on the materials it has to adorn, on the forms it has to follow without altering them.’7 In Art Nouveau, this ‘functional’ dependency of ornament led to a paradoxical reversal. Instead of merely obeying the form of the object, ornament began to merge with the object, animating it with new life. This had two effects: ﬁrst, the object became thought of as a single organic entity rather than as an aggregation of separate parts, as in the classical tradition; second, ornament was no longer thought of as ‘space ﬁlling’, and a dialogue was set up between two positive values—ornament and empty space. The discovery of what might be called ‘spatial silence’—probably mainly derived from Japanese prints—was one of Art Nouveau’s chief contributions to modern Western aesthetics. In this redeﬁnition, the accepted boundary between ornament and form became blurred. The classical attitude had been that ornament was a supplementary form of beauty. It was the German archaeologist Karl Bötticher (1806–89) who ﬁrst suggested that ornament (Kunstform) was organically related to the underlying substance of the object, giving the inert mechanical structure (Kernform) the semblance of organic life—an idea later used by Gottfried Semper (1803–79) in his book Der Stil.8 Though Art Nouveau was obviously not the direct result art nouveau 1890‒1910 17</span><br data-dcnode-id="4889"><span data-dcnode-id="4888" instrument_node="">

designed between 1892 and 1895, present an ingenious range of solutions to typical narrow Brussels sites. In each, the plan was divided from front to back into three sections, the central section containing a top-lit staircase which became the visual and social hub of the house. In each, the piano nobile consisted of a suite of reception rooms and conservatories with a spatial ﬂuidity that was accentuated by extensive use of glass and mirror, somewhat recalling the theatre foyers built in Brussels in the 1880s by Alban Chambon (1847–1928).11 The houses were intended for social display. In his memoirs Horta described the Hôtel Solvay as ‘a dwelling like any other . . . but with an interior characterized by an exposed metal structure and a series of glass screens giving an extended perspective . . . for evening receptions’.12 But this description gives no idea of the sensuous and intimate language in which this social function was embodied, spreading a veil over the ‘architectural-real’, dissolving structure into ornament. An imaginary world—half mineral, half vegetal—is created, with an air of unreality enhanced by the timeless, subaqueous light ﬁltering down from the roof. Horta’s most important public building was the new Maison du Peuple in Brussels of 1896–9 (demolished 1965). He received this commission through his domestic clients, whose social milieu and socialist ideals he shared. As in the houses, the Beaux-Arts symmetry of the plan is carefully undermined by asymmetrical programmatic elements. The façade, though it appears to be a smooth undulating skin following an irregular site boundary, is in fact a classical composition arranged round a shallow exhedra. Nonetheless, because of its continuous glazing (and in spite of its allusion to the heavily glazed Flemish Renaissance buildings to be found in Brussels) it must have had a shocking effect when it was built. If architecture was a passion for Horta, for Van de Velde (who was trained as a painter) it was more the logical culmination of the ‘household of the arts’ (the phrase is Rumohr’s).13 Starting from 1896, he exhibited a number of interiors at the Libre Esthétique salon, inﬂuenced by Serrurier’s rooms. In 1895 he built a house called ‘Bloemenwerf ’ for his family, in Uccle, a suburb of Brussels, in which he set out to create a domestic environment where daily life could be infused with art—he even designed his wife’s clothes. This house was a prototype for the villas built in the Utopian artists’ colonies that sprang up, mostly in the German-speaking countries, around 1900. It represents a sort of suburban Bohemianism very different from the elegant urban lifestyle catered for by Horta.</span><br data-dcnode-id="4845"><span data-dcnode-id="4844" instrument_node="">

In a lecture entitled ‘Modern Architecture’, delivered in Schenectady on 9 March 1884, the New York journalist and architectural critic Montgomery Schuyler set out what he saw to be the problem facing American architecture. Schuyler presented his argument in the form of thesis and antithesis. He asserted the need for a universal culture of architecture such as existed in Europe but was lacking in America due to the absence of good models. The Beaux-Arts system, he said, might provide the basis for such a culture, one that would inculcate the qualities of ‘sobriety, measure, and discretion’, were it not for the fact that it failed to produce an architecture appropriate to modern life. Architecture, he says, is the most reactionary of the arts: ‘Whereas in literature the classical rules are used, in architecture they are copied . . . in architecture alone does an archaeological study pass for a work of art . . . It is not the training that I am depreciating, but the resting in the training as not a preparation but an attainment.’ He went on to describe a confusion between language and architecture: ‘A word is a conventional symbol, whereas a true architectural form is a direct expression of a mechanical fact.’ Schuyler praised American architects, particularly those of Chicago, for attempting to adapt architecture to such technical problems as the elevator and the steel frame, unhampered by too many scruples about stylistic purity. Yet he felt that the problem had not been fully solved. ‘The real structure of these towering buildings—the “Chicago construction”—is a structure of steel and baked clay, and when we look for the architectural expression of it, we look in vain.’ Such an articulated structure, ‘being the ultimate expression of a structural arrangement, cannot be foreseen, and the form . . . comes as a surprise to the author’. Schuyler thus came out in favour of a direct and expressive modern architecture. Yet he never explicitly rejected the Beaux-Arts tradition. Does he think that ‘sobriety, measure, and discretion’ should be sacriﬁced on the altar of verisimilitude? That Europe should be rejected? We are not told, and, in spite of his preference for the second alternative, one has the impression that the ﬁrst has not been completely abandoned. Schuyler’s writings drew attention to a conﬂict between the 35</span><br data-dcnode-id="4689"><span data-dcnode-id="4688" instrument_node="">
</span><br data-dcnode-id="4687"><span data-dcnode-id="4686" instrument_node="">
architect as manipulator of a visual 'language' (classicist) and as exponent of a changing technology (organicist). This can be broken down into a series of further oppositions: collectivism versus individualism; identity (nation) versus difference (region); the normative versus the unique; representation versus expression; the recognizable versus the unexpected. These oppositions constantly reappeared in the architectural debates of the early twentieth century. But in America, more transparently than in Europe, they tended to be connected with problems of high national policy. It is in Chicago that this tendency manifested itself most dramatically.</span><br data-dcnode-id="4685"><span data-dcnode-id="4684" instrument_node="">

The Chicago School After the fire of 1871 and the subsequent economic depression, Chicago experienced an extraordinary boom in commercial real estate. The architects who flocked to the city to profit from this situation brought with them a strong professional sense of mission. They saw their task as the creation of a new architectural culture, believing that architecture should express regional character and be based on modern techniques. The situation in Chicago seemed to offer the possibility of a new synthesis of technology and aesthetics and of the creation of an architecture that symbolized the energy of the Mid-west. The term 'Chicago School' was first used in 1908 by Thomas Tallmadge to refer to the group of domestic architects, active between 1893 and I 9 I 7&gt; to which both he and Frank Lloyd Wright (1867-1959) belonged. It was not until 1929 that it was also used for the commercial architects of the i88os and 18908 by the architectural critic Henry Russell Hitchcock (1903-87) in his book Modern Architecture: Romanticism and Reintegration. Hitchcock associated both groups of architects with 'pre-modern' Symbolists such as Victor Horta. In the 19408 he made a new distinction between a commercial and a domestic phase of the school. But in contemporary usage, a complete reversal has taken place and 'Chicago School' now generally refers to the commercial architecture of the i88os and 18908, while the work of Frank Lloyd Wright and his colleagues is referred to as the Trairie School'. This is the terminology that will be adopted here. The importance of the Chicago School was recognized during the 19208 and 19303, as the writings of Hitchcock, Fiske Kimball (American Architecture, 1928) and Lewis Mumford (The Brown Decades, 1931) testify. But it was given a quite new claim to modernity by the Swiss art historian Sigfried Giedion (1888—1968) in Space, Time and Architecture (1941), where he presented the Chicago School in Hegelian terms as a stage in the progressive march of history. In rejecting the Beaux-Arts eclecticism of the East Coast, the 36 ORGANICISM VERSUS CLASSICISM! CHICAGO 1890-1910</span><br data-dcnode-id="4681"><span data-dcnode-id="4680" instrument_node="">

ed—the classical–Baroque aesthetic enshrined in Beaux-Arts teaching. In ‘correcting’ the Chicago architects’ mistaken interpretation of this tradition, he was, in fact, returning to the classical principle they had discarded: the need for the façade to have a tripartite hierarchy corresponding to the functional distribution of the interior. The Wainwright Building can certainly be called a ‘solution’ to the problem of the Chicago ofﬁce façade. But its very brilliance brought with it certain problems. The ‘impure’ solutions of the Chicago School, including Sullivan’s own Auditorium Building, had the merit of presenting to the street a complex, contrapuntal texture capable of being read as part of a continuous urban fabric. The Wainwright Building, with its vertical emphasis and strongly marked corner pilasters, isolated itself from its context and became a self-sufﬁcient entity, emphasizing the individuality of the business it both housed and represented. In this, it anticipated later developments in organicism versus classicism: chicago 1890‒1910 41</span><br data-dcnode-id="4645"><span data-dcnode-id="4644" instrument_node="">

The World's Columbian Exposition The turn towards classicism inaugurated by the Chicago World s Exposition of 1893 was related to a number of contemporary political and economic events in America. The most important of these were the change from laissez-faire to monopoly capitalism, the inauguration of the 'open-door' trade policy for a country now ready to take its place on the world stage, and the rise of a collectivist politics both mirroring and challenging the emerging corporatism of industry and finance. In The Autobiography of an Idea, Louis Sullivan was to recall these developments: 'During this period [the 18908] there was well under way the formation of mergers, corporations, and trusts in the industrial world . . . speculation became rampant, credit was leaving terra firma . . . monopoly was in the air/ According to Sullivan, Daniel Burnham was the only architect in Chicago to catch this movement, because, 'in its tendency towards bigness, organization, delegation, and intense commercialism, he sensed the reciprocal workings of his own mind'. These developments were responsible for sounding the death knell of the philosophy of individualism that had inspired the Chicago School and been the basis of Sullivan's theory. Despite his own generalizing and typological propensities, Sullivan resisted the emerging tendency towards collectivism, standardization, and massification that Burnham welcomed so avidly. Although Chicago was chosen as the site for the World's Fair because it was seen to represent the dynamism of the Mid-west, the fair's promoters were more interested in the creation of a national mythology than a regional one. They were looking for a ready-formed architectural language that could allegorically represent the United States as a unified, culturally mature, imperial power. According to Henry Adams, 'Chicago was the first expression of America thought of as a unity: one must start from there.'7 Planning for the World's Fair started in 1890, under the joint direction of Frederick Law Olmsted (1822-1903) (landscape) and Daniel Burnham (buildings). The site chosen was that of Olmsted's unbuilt project for the South Park System. It consisted of two parks—Jackson Park on the lake shore and Washington Park to the west—linked by a ORGANICISM VERSUS CLASSICISM: CHICAGO 1890-1910 43</span><br data-dcnode-id="4629"><span data-dcnode-id="4628" instrument_node="">

The City Beautiful movement The World’s Fair initiated a wave of classical architecture in America. As the historian Fiske Kimball was to write in 1928: ‘The issue whether function should determine form or whether an ideal form might be imposed from without, had been decided for a generation by a sweeping victory for the formal idea.’9 One of the consequences of the fair was that, after the turn of the century, tall commercial buildings in America began to show increased Beaux-Arts inﬂuence. This can be seen in the evolution of Burnham’s work. In his Conway Building in Chicago (1912) [27], and in many other examples, he followed Sullivan’s clear tripartite division, but ornamented it with a classical syntax, often treating the attic as a classical colonnade, reducing the size of the windows in the middle section of the façade and playing down the expression of structure. The World’s Fair had a great effect on the ‘City Beautiful’ movement. The movement was triggered by the Senate Park Commission plan for Washington (the ‘Macmillan Plan’), which was exhibited in 1902. Both Burnham and Charles McKim (1847–1909) were on the commission, and they were responsible for the design, which envisaged the completion and extension of Pierre Charles L’Enfant’s plan of the 1790s. After this Burnham was asked to prepare many city plans, only a few of which—the plan for the centre of Cleveland, for example—were executed. The most spectacular of these was his plan for Chicago, prepared in collaboration with E. H. Bennett (1874–1945) [28].10 The plan was ﬁnanced and managed by a group of private citizens, and was the subject of an elaborate public relations campaign. Its most characteristic feature was a network of wide, diagonal avenues superimposed on the existing road grid in the manner of Washington and of Haussmann’s Paris. At the centre of this network, there was to be a new city hall of gigantic proportions. Though never executed, the plan was to some extent used as a guide for the future development of the city. One enthusiastic critic, Charles Eliot, called it a representation of ‘democratic, enlightened collectivism coming in to repair the 46 organicism versus classicism: chicago 1890‒1910</span><br data-dcnode-id="4597"><span data-dcnode-id="4596" instrument_node="">

ly because Veblen taught at the University of Chicago in the 18905, but also because his book advanced the theory that there was a conflict in capitalism between the production of money and the production of goods.12 Chicago was the centre of a vigorous social reform movement which reflected this anti-laissez-faire mood. Whereas the Transcendentalists had rejected the city as a corrupting influence, the Chicago reformists saw it as an essential instrument of industrialization, but one that needed to be domesticated. The Department of Social Sciences and Anthropology, which opened in 1892 in the University of Chicago under the leadership of Albion Small, became an important centre of urban sociology, its wide influence continuing into the 19205.</span><br data-dcnode-id="4581"><span data-dcnode-id="4580" instrument_node="">

Frank Lloyd Wright and the Prairie School The Prairie School was a closely knit group of young Chicago architects continuing to design houses in the organicist tradition under the spiritual leadership of Louis Sullivan, and active between 1896 and 1917. The group included, among others, Robert C. Spencer, Dwight H. Perkins, and Myron Hunt. The group was closely associated with Hull House and the Arts and Crafts Society. Some of the original group later reverted to eclecticism—notably Howard Van Doren Shaw (1869-1926), whose work resembles that of the English architect Edwin Lutyens in its simultaneous allegiance to the Arts and Crafts and to eclectic classicism.15 The most brilliant member of the group was Frank Lloyd Wright. He, more than any of the others, was able to forge a personal style that embodied the group's common ambitions. Wright's natural talent was stimulated and guided by the theory of 'pure design', which was the subject of lectures and discussions at the Chicago branch of the Architectural League of America around 1901.16 This concept was promoted by the architect and teacher Emil Lorch, who had transferred to architecture the geometrical principles of painting and design taught by Arthur Wesley Dow at the Museum of Fine Arts in Boston. According to this theory, there were fundamental ahistorical principles of composition, and these principles should be taught in schools of architecture.17 This idea was a commonplace of late-nineteenthcentury and early-twentieth-century art and architectural theory in Europe in academic as well as avant-garde circles.18 Although it was antagonistic to eclecticism, its promotion of systematic design theory in architectural schools was probably due to the example of the Beaux-Arts. Wright's houses show the influence of this theory [29, 30]. Their plans are geometrically more rigorous than anything being built in Europe at the time. They also share with the work of Mackintosh, Olbrich, and Hoffmann (see pages 28-9) a roof, which lose their conventional associations and are reduced to a system of intersecting and overlapping planes. The plans of Wright’s houses consist of an additive system of simple volumes interlocking with or relating freely to each other in a way that resembles the Arts and Crafts tradition. However, not only is there greater continuity between one space and another than can be found in the English movement, in which the traditional room remains dominant, but the plans exhibit a geometrical order which stems from Beaux-Arts rather than English sources. At the macro scale, the plans tend to develop along the two orthogonal axes, crossing at a central hearth and reaching out into the surrounding landscape, while at the micro scale there are carefully controlled local symmetries and sub-axes, showing the inﬂuence of the Beaux-Arts-trained H. H. Richardson. Internally, as in the houses of Voysey, Mackintosh, and Hoffmann, the rooms are uniﬁed by low cornices at door-head level. But in Wright’s work these have the effect of compressing the vertical dimension, producing a primitive, cave-like sensation [31]. The system of ornament consists of dark-stained wood trim, recalling that of Mackintosh and Hoffmann. Electric light and ventilation ﬁttings are absorbed into the general ornamental unity. ‘Art’ still dominates, but it is now produced by the machine, not by the craftsman, and is totally controlled by the architect working at his drawing-board [32]: ‘The machine . . . has placed in artist hands the means of idealizing the true nature of wood . . . without waste, within reach of all.’19 In fact, Wright came early on to the conclusion that mass production was necessary if good design was to be democratically enjoyed. In 1901 he gave a lecture at Hull House entitled ‘The Art and Craft of the Machine’ in which he argued that the alienation of the craftsman due to machine production would be outweighed by the artist’s ability to create beauty with the machine—an anti-Ruskinian argument that would soon be taken up within the Deutscher Werkbund in its support of machine work as opposed to handwork. This philosophy was completely consistent with Wright’s search for universal laws of design, with its privileging of the artist over the craftsman. Yet Wright’s position on industrialization was ultimately ambivalent. It was poised between an endorsement of ‘that greatest of machines’, as he called the industrial city, and a nostalgic image of the American suburb as a new Arcadia uncontaminated by industrialism. This conﬂict was reﬂected in his daily life, divided between his radical friends at Hull House and the suburb of Oak Park where he practised and lived with his young family, and where his neighbours were the practical-minded businessmen who commissioned his houses.20 This enormously creative and inﬂuential phase of Wright’s life came to an abrupt end when in 1909, at the age of 42, he abandoned Oak Park, organicism versus classicism: chicago 1890‒1910 53</span><br data-dcnode-id="4541"><span data-dcnode-id="4540" instrument_node="">

his family and his architectural practice, having concluded that the unity between art and life that he craved was not possible in the suburb. Montgomery Schuyler, in his anticipation of an American architecture, had been concerned with public and urban buildings, whether they took the form of cultural representation or organic expression. Frank Lloyd Wright, working within the tradition of the Arts and Crafts movement, turned away from such problems to concentrate mostly on the private house, the nuclear family, and the small community. Reviving dreams of the frontier, he sought, more passionately than any of his colleagues, to create a regional Mid-western domestic architecture of rural innocence. It was the formal skill with which Wright deployed an abstract and astylar architecture that impressed the European avant-garde architects when his work was published in Germany by Wasmuth in 1910, at the moment when they were searching for a formula that would free them from traditional forms. But with this abstraction came an architecture that was primitivist, regionalist, and anti-metropolitan. Through the inﬂuence of Frank Lloyd Wright, international Modernism had at least one of its roots in the regional and democratic concerns of the American Mid-west and in the organicist theories of its architects.</span><br data-dcnode-id="4529"><span data-dcnode-id="4528" instrument_node="">

The international reform movement in architecture and the industrial arts was accompanied in Germany by special historical circumstances. In the German-speaking world, a self-image had begun to take shape in the second half of the eighteenth century in opposition to French cultural hegemony and Enlightenment universalism. The consciousness of a speciﬁcally German Kultur, as distinct from French-derived Zivilisation, was reinforced during the Napoleonic wars. The effect of this was to intensify the search for cultural identity, but at the same time to act as a powerful incentive to modernization. Romanticism and Rationalism coexisted, sometimes in mutual reinforcement, sometimes in opposition. Modernization increased its pace after the uniﬁcation of Germany’s many states into the German Empire in 1871. But by the 1890s there was already widespread disappointment with its cultural results, and the beginning of an anti-liberal, anti-positivist backlash. This tendency mirrored similar tendencies in Europe as a whole, but in Germany it brought to the surface a latent ideology of the Volk.1 According to the writer Julius Langbehn (1851–1907) modern civilization, especially that of America, was without roots. In his bestselling book Rembrandt als Erzieher (Rembrandt as Educator, Leipzig, 1903), he argued for a return to the rooted culture of the German Volk, the spirit of which he saw as embodied in the paintings of Rembrandt. The social philosopher Ferdinand Tönnies (1856–1936), in his book Gemeinschaft und Gesellschaft (roughly: Community and Society, Leipzig, 1887), drew attention to the ancient German forms of association, which were being replaced by modern industrial forms of association or ‘companies’. In fact, the movement for artistic reform in Germany was, from the start, deeply involved in the question of national identity. Those participating in the movement were caught between a desire to return to their pre-industrial roots and an equally strong impulse towards modernization as the necessary condition of competing commercially with the Western nations. 57</span><br data-dcnode-id="4505"><span data-dcnode-id="4504" instrument_node="">
</span><br data-dcnode-id="4503"><span data-dcnode-id="4502" instrument_node="">
The Deutscher Werkbund At the beginning of the twentieth century in Germany, the chief agent of artistic and cultural reform was the Deutscher Werkbund, which grew out of the German Arts and Crafts (Kunstgewerbe) movement. Many local reform groups had emerged since the onset of the Arts and Crafts movement in the late 1890s, including Alfred Lichtwark’s Art Education Movement (1897), Ferdinand Avenarius’s Dürerbund (1902), and the Bund Heimatschutz (1904).2 In addition, a number of workshops modelled on the English guilds had been founded, the most successful of which were the Munich-based Vereinigten Werkstätte (see page 62) and the Dresdner Werkstätte, both of which, unlike their English counterparts, were making semi-mass-produced furniture from their inception. The Deutscher Werkbund was founded in Munich in 1907 to consolidate these separate initiatives and accelerate the integration of art and industry at a national level. The chief moving spirits behind its foundation were the Christian Socialist politician Friedrich Naumann (1860–1919), the director of the Dresdner Werkstätte Karl Schmidt, and the architect–bureaucrat Hermann Muthesius (1861–1927). Initially 12 architects and 12 companies were invited to join. The architects included Peter Behrens (1868–1940), Theodor Fischer (1862–1938), Josef Hoffmann, Joseph Maria Olbrich, Paul SchultzeNaumburg (1869–1949), and Fritz Schumacher (1869–1947). Most of the companies were manufacturers of domestic furniture and equipment, but two printers, a type founder, and a publisher were also included. All these ﬁrms withdrew from the existing conservative and commercially motivated Alliance for German Applied Arts to join the new organization and in so doing committed themselves to working with named architects. The Werkbund’s orientation towards high-quality goods for mass consumption is clear from a speech given by Naumann in 1906: ‘Many people do not have the money to hire artists, and, consequently, many products are going to be mass produced; for this great problem, the only solution is to infuse mass-production with meaning and spirit by artistic means.’3 Speaking at the inaugural meeting of the Werkbund in Munich, Fritz Schumacher, professor of architecture at the Dresden Technische Hochschule and director of a highly successful Arts and Crafts exhibition in Dresden in 1906, stressed the need to bridge the gap between artists and producers that had developed with machine production: The time has come when Germany should cease to look on the artist as a man who . . . follows his inclination, and rather see him as one of the important powers for the ennobling of work and therefore for the ennobling of the entire 58 culture and industry: germany 1907‒14</span><br data-dcnode-id="4501"><span data-dcnode-id="4500" instrument_node="">
</span><br data-dcnode-id="4499"><span data-dcnode-id="4498" instrument_node="">
life of the nation, and to make it victorious in the competition among peoples . . . there is in aesthetic power a higher economic value.4</span><br data-dcnode-id="4497"><span data-dcnode-id="4496" instrument_node="">
</span><br data-dcnode-id="4495"><span data-dcnode-id="4494" instrument_node="">
Despite this well-deﬁned programme, the membership of the Werkbund represented a wide range of opinion. The organization’s main areas of activity were: general propaganda (publishing, exhibitions, congresses); the education of the consumer (lectures, window dressing competitions, and so on); and the reform of product design (for example, persuading industrialists to employ artists).5</span><br data-dcnode-id="4493"><span data-dcnode-id="4492" instrument_node="">

Form or Gestalt The need to assimilate the machine to the artistic principles of the Arts and Crafts movement entailed a reconceptualization of the role of the artist. Morris’s conception of the artist–craftsman as someone physically involved with materials and functions gave way to that of the artist as ‘form giver’. The new concept was put forward at the Werkbund congress of 1908 by the sculptor Rudolf Bosselt, and reafﬁrmed by Muthesius in 1911.6 Both asserted that, in the design of machine products, ‘form’ or Gestalt7 should take precedence over function, material, and technique, which had been stressed by the Arts and Crafts and Jugendstil movements. Curiously enough, this idea did not originate in the context of the debate on art and industry, but in the ﬁeld of aesthetics. It was the product of a century-long history of aesthetic thought, beginning with Immanuel Kant’s isolation of art as an autonomous system, and culminating in the theory of ‘pure visibility’ (Sichtbarkeit) propounded by the philosopher of aesthetics Conrad Fiedler.8 Muthesius and the notion of type Closely connected with the idea of Gestalt was Muthesius’s concept of Typisierung (typiﬁcation)—a word he coined to denote the establishment of standard or typical forms.9 His argument was the apparently trivial one that mass production entails standardization. But, relying on the ambiguity inherent in the word ‘type’, Muthesius conﬂated a pragmatic notion of standardization with the idea of the ‘type’ as a Platonic universal. Only through typiﬁcation, he said, ‘can architecture recover that universal signiﬁcance which was characteristic of it in times of harmonious culture’.10 Muthesius’s concept of a uniﬁed culture was an attack on laissezfaire capitalism, though not on monopoly capitalism. For him, and for many within the Werkbund who shared his views, the degeneration of modern taste was due not, as Ruskin had thought, to the machine as such, but to the cultural disorder caused by the operation of the market, and the destabilizing effect of fashion. If the middle-man who manipulated the market could be eliminated it would be possible to culture and industry: germany 1907‒14 59</span><br data-dcnode-id="4489"><span data-dcnode-id="4488" instrument_node="">
</span><br data-dcnode-id="4487"><span data-dcnode-id="4486" instrument_node="">
recover the direct relationship between producer and consumer and between technique and culture, that had existed in pre-capitalist societies. Muthesius foresaw the emergence of large factories for the production of consumer goods similar to the trusts and cartels that were becoming increasingly characteristic of German heavy industry. These ﬁrms, producing goods of standardized artistic quality, would be able to dominate the market and act as the sole arbiters of taste, operating as the modern equivalent of the medieval guilds.11 When Muthesius presented his notion of Typisierung at the Werkbund congress of 1914 at Cologne it was strongly criticized by a group of artists, architects, and critics which included Van de Velde, Bruno Taut (1880–1938) and Walter Gropius (1883–1969). Van de Velde, though a passionate disciple of William Morris, did not question the need for machine production, nor did he disagree with the notion of a uniﬁed culture. But he disagreed with the bureaucratic methods proposed by Muthesius. For him and his supporters, culture could not be created by the imposition of typical forms. High artistic quality depended on the freedom of the individual artist. Fixed types did indeed emerge in all artistic cultures, but they were the end-products of an evolutionary process of artistic development, not its initial condition. Muthesius had simply reversed the order of cause and effect. This celebrated conﬂict has usually been interpreted as a battle between the avant-garde supporters of a new machine culture and the regressive supporters of an outdated handicraft tradition. The truth is more complex, and to understand the situation it is necessary to disentangle the confusion that reigned at the time as to the status of the ‘artist’ in the modern industrial arts. The debate between Van de Velde and Muthesius cannot be seen merely as the conﬂict between handicraft and the machine (though it was this as well) since the ambiguous ﬁgure of the ‘artist’ appears as chief protagonist on both sides. Both groups believed that, under conditions of machine production, division of labour had separated technique from art and that it was necessary to reintroduce the artist into the production process. They differed, however, in their interpretation of role that the artist would now play. Insofar as he saw the artist as a specialist in ‘pure form’, divorced from the mechanics of craft (now the domain of the machine), Muthesius’s position seems ‘progressive’, seeking to adapt the artist to the abstract processes of capitalism. But Van de Velde’s concept of the evolutionary process of style formation was more compatible with the conditions of market capitalism, and in that sense more ‘modern’ than Muthesius’s bureaucratic model. To what extent Van de Velde, with his strongly held socialist views, grasped the connection between the artistic freedom he was proposing and the marketplace is an intriguing question, but the connection is clearly reﬂected in the writings of his patron and supporter, Karl Ernst Osthaus.12 60 culture and industry: germany 1907‒14</span><br data-dcnode-id="4485"><span data-dcnode-id="4484" instrument_node="">
</span><br data-dcnode-id="4483"><span data-dcnode-id="4482" instrument_node="">
Originally Muthesius had also held to this concept of the individualistic artist. For example, he had been in favour of the law of 1907 which gave the applied artist the copyright protection that was already enjoyed by the ﬁne artist.13 But some time between 1907 and 1910 he seems to have moved towards the idea that the artist should not seek originality, but should be the conduit for universal aesthetic laws, a view that was in line with the prevalent neo-Kantian aesthetic philosophy. Muthesius now argued that there was a kinship between the law-like stability and anonymity of the classical and vernacular traditions on the one hand, and the repetitiveness, regularity, and simplicity of machined forms on the other. Machined forms were the modern, historical instance of a universal law. Though this idea did not exclude the artist, it did demand that the personality of the artist should be controlled.14 Muthesius sought to implement these ideas by creating an organizational framework within which future artists would have to work, thus reverting to archaic processes similar to those that Karl Friedrich Schinkel had adopted when commissioned to ‘normalize’ the rural architecture of Prussia a century earlier. In Muthesius, therefore, we see the fusion of two ideologies, the one bureaucratic and nationalistic, the other classicizing and normative. Though it is difﬁcult to say at what level these ideologies are, in fact, connected, they appear to have been inseparable within the context of architectural discourse in the years leading up to the First World War in Germany. It was a combination that took a particularly explosive form in Germany, but it was also present, in differing regional forms, in America, England, and France.</span><br data-dcnode-id="4481"><span data-dcnode-id="4480" instrument_node="">

Style and ideology Another aspect of the battle between Muthesius’s concept of type and the spontaneity demanded by Van de Velde must now be addressed. The standardization required by machine production was seen to reconcile modernity with classical humanism. But the demand for the freedom of the artist was also associated with a Nietzschian, Dionysian, anarchistic urge not to try to tame the disorder of modernity but to plunge into its terrifying and nihilistic stream. These different attitudes correspond to two groups of architects. Among the classicizing group, two will be discussed here—Heinrich Tessenow (1876–1950) and Peter Behrens—and their work will be compared to that of the young Walter Gropius, who was poised between the two groups. Discussion of the opposite camp, the Expressionists, belongs to a later chapter. Heinrich Tessenow One of Heinrich Tessenow’s major concerns was mass housing and the problem of repetition. He studied this issue in the context of the culture and industry: germany 1907‒14 61</span><br data-dcnode-id="4477"><span data-dcnode-id="4476" instrument_node="">

34 Heinrich Tessenow Houses designed for the Garden City of Hohensalza, 1911–14 This courtyard scheme suggests an idyllic community. The drawing technique is reminiscent of Schinkel’s drawings for the Garden House at Charlottenhof in Potsdam and, as with Schinkel’s design, a pergola gives a slightly Mediterranean ﬂavour to the project.</span><br data-dcnode-id="4473"><span data-dcnode-id="4472" instrument_node="">
</span><br data-dcnode-id="4471"><span data-dcnode-id="4470" instrument_node="">

Peter Behrens Behrens began as a painter associated with the Munich Secession of 1893. He was a founding member of the Darmstadt artists’ colony where in 1901 he built the only house not designed by Olbrich (see page 30). His approach to art and architecture was deeply tinged with the Symbolism that characterized the German secessionist movements. His mystical leanings had already shown themselves when he collaborated in organizing a highly ritualistic inaugural ceremony at the Darmstadt colony with Georg Fuchs, one of the leaders of theatrical reform in Germany. One of the crucial turning points in Behrens’s architectural career came during his directorship of the School of Arts and Crafts at Düsseldorf between 1903 and 1907, where he was inﬂuenced by the Dutch architect J. L. M. Lauweriks and became interested in the mystical–symbolic implications of geometry.16 This marked his rejection of Jugendstil in favour of classicism in a move that paralleled the emergence of the idea of Gestalt within the Werkbund. 37 Peter Behrens AEG Pavilion, Shipbuilding Exposition, 1908, Berlin This octagonal pavilion was a fusion of neo-Grecian and Tuscan proto-Renaissance stylistic elements. Its centralized, baptistery-like plan is often found in German exhibitions before the First World War.</span><br data-dcnode-id="4449"><span data-dcnode-id="4448" instrument_node="">

Walter Gropius and the Fagus Factory Gropius had worked for Behrens between 1910 and 1911 and had absorbed many of his ideas, but he was 15 years younger—a gap large enough to explain certain ideological differences. For example he was more concerned than Behrens with the social implications of machine production, realizing that it meant the irretrievable separation of artistic conceptualization and the production process, and that the relationship between the craftsman and his own products would henceforth be that of consumer not producer. In an address entitled 'Kunst und Industriebau' given at the Volkwang Museum at Hagen in 1911, Gropius tried to suggest a socially acceptable solution to this problem: Work must be established in palaces that give the workman, now a slave to industrial labour, not only light, air, and hygiene, but also an indication of the great common idea that drives everything. Only then can the individual submit to the impersonal without losing the joy of working together for that common good previously unattainable by a single individual.</span><br data-dcnode-id="4413"><span data-dcnode-id="4412" instrument_node="">
</span><br data-dcnode-id="4411"><span data-dcnode-id="4410" instrument_node="">
In exchange for being alienated from the end product of their work, workers, as consumers, are offered a transcendental collective experience. This idea, which had been aired a few years earlier by Frank Lloyd Wright (see page 53) was to be given a philosophically more sophisticated formulation by the architect and critic Adolf Behne in the 1920s.22 But through the mists of a rather confused rhetoric one glimpses the troubled social Utopianism that was to throw Gropius into the camp of the anti-technological Expressionists at the end of the First World War. For the moment, however, Gropius did not doubt that the machine could be spiritualized by means of art, and advocated an architecture of technical rationalism, even presenting to Emil Rathenau, director of AEG,23 a memorandum on the rationalization of the housing industry.24 Why, then, was Gropius the most implacable of all Muthesius's critics at the Cologne congress? The answer must lie in the ambiguous nature of the concept of'totalization' to which both he and Muthesius subscribed. Both believed that the artist (or the architect-as-artist) was now an intellectual charged with the task of inventing the forms of the machine age, considered as a cultural totality. But for Gropius it was precisely this totalizing, legislative, quasi-ethical role that demanded that the artist should remain free of political interference. Only the best and the most original ideas would be worthy of mechanical reproduction. In this, Gropius was at one with Van de Velde. He violently rejected the idea of the control of artistic conceptualization by the state bureaucracy or its proxy, big business, which was being promoted by Muthesius. But at the level of theory Gropius's position 68 CULTURE AND INDUSTRY: GERMANY 1907-14</span><br data-dcnode-id="4409"><span data-dcnode-id="4408" instrument_node="">
</span><br data-dcnode-id="4407"><span data-dcnode-id="4406" instrument_node="">
was no different from that of Behrens in its postulation of two realms, one of which—nature–technology—would be transﬁgured by the other—spirit (Geist). In Gropius’s architecture, however, there is something new, and we can get some idea of it if we compare his Fagus Factory (1911–12) [42, 43] at Alfeld an der Leine, built in collaboration with Adolf Meyer (1881–1929), with Behrens’s Turbine Factory. Much of the difference between the two buildings can be attributed to their radically different programmes. Gropius and Meyer’s small, provincial shoe-last factory—or rather its administrative wing, which was the only part of the factory complex over which the architects had full control—could hardly be said to invoke the world-historical themes of Behrens’s factory, built in the nation’s capital for one of Germany’s most important cartels. Yet it was precisely the Fagus Factory’s modesty and lack of symbolic charge that enabled Gropius to follow his more down-toearth agenda and to produce a work which would come to be seen as prophetic of the ‘objective’ (Sachlich) Modern Movement of the 1920s. Not that the building lacks optical tricks. But it no longer makes any of Behrens’s grandiose symbolic claims. Gropius starts with Behrens’s projecting bay window and recessed, tilted masonry as his main motifs, but transforms them. The tilt is now, it seems, a pragmatic (though probably expensive) solution, by means of which the brick piers can appear to be recessed without the glazing unit having to be cantilevered out at its sill. Whereas Behrens rhetoricizes his repeating columns, giving them maximum corporeality to create the effect of classical monumentality, Gropius tries to make his necessarily massive brick piers disappear, so that the main façade of his building looks as if it is made entirely of glass. Whereas Behrens strengthens his corners with illusionistic buttresses, Gropius voids his with real transparency. Whereas Behrens impressionistically rounds his corners, Gropius sharpens his with the precision of a surgeon’s knife-cut. Finally, whereas the Turbine Factory abounds in overt classical references, the classicism of the Fagus Factory is discreet and abstract—a matter of geometry. But though the Fagus Factory can thus be read off against the Turbine Factory, it is not simply a mannerist inversion; it has its own agenda. Its illusionism, though still owing something to Behrens, is a matter of bringing out the transcendent qualities of materials—particularly glass with its mystical connotations (see the discussion of glass symbolism on page 92)—rather than working against the nature of materials as Behrens often did. In this Gropius was truer to the ‘functional’ tradition of Jugendstil, even though he jettisoned most (if not all) of its craftsman-like individualism. In the Fagus factory, materiality and form are synthesized in a new way—a way that seems to show the inﬂuence of the American factories that Gropius had illustrated culture and industry: germany 1907‒14 69</span><br data-dcnode-id="4405"><span data-dcnode-id="4404" instrument_node="">
</span><br data-dcnode-id="4403"><span data-dcnode-id="4402" instrument_node="">

Adolf Loos (1870-1933) occupies a unique place in the history of modern architecture. A maverick who refused to join any 'club', he was not only a powerful thinker able to expose the contradictions of contemporary theory but an architect whose work, though small in output, was provocative and highly original. His influence on the succeeding generation of architects, particularly Le Corbusier, was enormous, and his ideas have, through successive reinterpretations, maintained their relevance to the present day. The son of a stonemason, Loos was born in Brno, Moravia (at the time part of the Austro-Hungarian empire, now in the Czech Republic) and studied at the Imperial State Technical College in Vienna, and the Dresden College of technology. In 1893 he travelled to America, where his uncle had emigrated, visiting the Columbia World s Fair and eventually starting a small practice in New York before returning to Austria in 1896. As a result of this experience, he was to retain a lifelong admiration for Anglo-American culture. Although he belonged to the same generation as the main figures of the Art Nouveau and Jugendstil movements, Loos reacted strongly against their attempt to replace Beaux-Arts eclecticism with what he saw as a superficial system of ornament. He was not, of course, alone in his rejection of Jugendstil and its ideology of the Gesamtkunstwerk. In Germany by 1902, as we have seen, designers like Richard Riemerschmid and Bruno Paul had abandoned this style, and in Austria Josef Hoffmann, the founder of the Wiener Werkstatte, had drastically simplified the Secessionist vocabulary. But Loos s critique was more fundamental than theirs; it was based on a rejection of the very concept of'art' when applied to the design of objects for everyday use. Whereas Van de Velde and the Jugendstil movement had wanted to eliminate the distinction between the craftsman and the artist, Loos saw the split between them as irreversible. Far from believing in a unified culture in which the craftsman and the artist would be reunited, he readily accepted the distinction between the objects of everyday life and imaginative works of art. But for Loos that distinction was not based on the division of hand-work and machine-work or of mental conception and execution—the issue that was so important for the ideologues of the Werkbund. What defined the useful object 73</span><br data-dcnode-id="4365"><span data-dcnode-id="4364" instrument_node="">
</span><br data-dcnode-id="4363"><span data-dcnode-id="4362" instrument_node="">
was not its mode of manufacture but its purpose. Perfection of execution should be the aim of hand-work and machine-work alike. In both cases the maker should not express individuality but should be the transmitter of impersonal cultural values. Loos’s enthusiasm for the English Arts and Crafts movement was based not only on the quality of its workmanship, but also on the fact that it did not strive for the wilfully new, but respected tradition and custom. It was as a writer of polemical articles that Loos ﬁrst became known. His aphoristic, witty, and sarcastic pieces, which gained him as many enemies as friends, resembled the writings of his close friend, the poet Karl Kraus (1874–1936), editor and sole writer of the satirical journal Die Fackel (The Torch), published from 1899 to 1936. In this journal Kraus pursued a relentless campaign against the Austrian cultural and political establishment and its journalists, whose abuse of language he saw as betraying unfathomable depths of hypocrisy and moral degradation.1 Loos himself started a journal—Das Andere (The Other)—which, however, appeared in only two numbers in 1903, as supplements in Peter Altenberg’s journal Die Kunst. This publication, subtitled A Journal for the Introduction of Western Civilization into Austria, paralleled Die Fackel’s cultural critique in the sphere of the useful arts, comparing Austrian culture unfavourably with that of England and America. Loos’s articles attacked not only Austrian middle-class culture, but also the very ‘avant-garde’ culture that aimed to supersede it.2 Loos’s writings shifted the debate on the reform of the applied arts into a new register—one that was eventually to turn him into the unwitting father ﬁgure of the 1920s Modern Movement. In his essay ‘Ornament and Crime’ (1908), he claimed that the elimination of ornament from useful objects was the result of a cultural evolution leading to the abolition of waste and superﬂuity from human labour. This process was not harmful but beneﬁcial to culture, reducing the time spent on manual labour and releasing energy for the life of the mind. The essay was not merely an attack on the Viennese Secession and Jugendstil, it was also an attack on the Werkbund, founded a year earlier. As we have seen, Muthesius’s aim for the Werkbund was to give the artist a form-giving role within industry, and thus to establish the Gestalt of the machine age. To Loos, this was unacceptable—not, as for Van de Velde and Gropius, because it would destroy the freedom of the artist but precisely because it envisaged the artist as the primary agent in the creation of everyday objects. Loos believed that the ‘style of an epoch’ was always the result of multiple economic and cultural forces. It was not something which the producer, aided by the artist, should try to impose on the consumer: ‘Germany makes, the world takes. At least it should. But it does not want to. It wants to create its own forms 74 the urn and the chamberpot: adolf loos 1900‒30</span><br data-dcnode-id="4361"><span data-dcnode-id="4360" instrument_node="">
</span><br data-dcnode-id="4359"><span data-dcnode-id="4358" instrument_node="">
for its own life rather than have them imposed by some arbitrary producers’ association.’3 With his aim of involving the artist in industry, Muthesius (Loos’s argument implied) was merely substituting form for ornament in an attempt to add a ﬁctitious ‘spiritual’ quality to the social economy and to bind Kultur and Zivilisation together in a new organic synthesis. But such a synthesis was neither possible nor necessary. An ineradicable gap had opened up between art-value and use-value. In tearing them apart, capitalism had liberated them both. Art and the design of useobjects now existed as independent and autonomous practices: ‘We are grateful to [the nineteenth century] for the magniﬁcent accomplishment of having separated the arts and the crafts once and for all.’4 The search for the ‘style of the time’ that Muthesius’s types were intended to express was still based on a nostalgia for the pre-industrial ‘organic’ society. In fact, a style of the modern age already existed—in industrial products without any artistic pretensions: All those trades which have managed to keep this superﬂuous creature [the artist] out of their workshops are at present at the peak of their ability . . . [their] products . . . capture the style of our time so well that we do not even look on them as having style. They have become entwined with our thoughts and feelings. Our carriage construction, our glasses, our optical instruments, our umbrellas and canes, our luggage and saddlery, our silver cigarette cases, our jewellery . . . and clothes—they are all modern.5</span><br data-dcnode-id="4357"><span data-dcnode-id="4356" instrument_node="">
</span><br data-dcnode-id="4355"><span data-dcnode-id="4354" instrument_node="">
The attempt consciously to create the formal ‘types’ of the new age was doomed to fail, just as Van de Velde’s attempt to create a new ornament had failed: ‘No one has tried to put his podgy ﬁnger into the turning wheel of time without having his hand torn off.’6 According to Loos, art could now survive in only two (absolutely antithetical) forms: ﬁrstly as the free creation of works of art that no longer had any social responsibility and were therefore able to project ideas into the future and criticize contemporary society; and secondly in the design of buildings which embodied the collective memory. Loos schematized these buildings as Denkmal (the monument) and Grabmal (the tomb).7 For Loos, the private house belonged to the category of the useful, not to that of the monument, hence the rarity in his houses of a fully developed classical language, except for a brief period between 1919 and 1923 (see page 83).</span><br data-dcnode-id="4353"><span data-dcnode-id="4352" instrument_node="">
</span><br data-dcnode-id="4351"><span data-dcnode-id="4350" instrument_node="">
Decorum Loos identiﬁed the surviving realm of the monument with the antique: ‘The architect’, he said, ‘is a stonemason who has learned Latin,’8 echoing Vitruvius’s statement that knowledge of building grows equally out of fabrica (material) and ratio (reason).9 His attitude to the the urn and the chamberpot: adolf loos 1900‒30 75</span><br data-dcnode-id="4349"><span data-dcnode-id="4348" instrument_node="">
</span><br data-dcnode-id="4347"><span data-dcnode-id="4346" instrument_node="">
classical tradition differed from that of Otto Wagner or Behrens, for whom a synthesis between art (spirit, soul) and rationality was still possible, and who wanted to adapt classicism to modern conditions. For Loos, as for Kraus, the antique had preserved in language the search for a ‘lost image of the primordial’.10 Its syntax should either be imitated to the letter, even if made with modern materials, or not at all: ‘Modern architects seem more like Esperantists. Drawing instruction needs to proceed from classical ornament.’11 By the same token, both he and Kraus believed in the importance of the tradition of rhetoric, particularly its distinction between genres and its concept of decorum, which divides the continuum of lived experience into discrete units. As Kraus wrote: Adolf Loos and I, he in reality, I in words, have done nothing else than show that there is a difference between an urn and a chamberpot and that this difference is necessary because it guarantees the game of culture. The others, on the contrary, the defenders of ‘positive’ values, are divided between those who mistake the urn for a chamberpot and those who mistake the chamberpot for an urn.12</span><br data-dcnode-id="4345"><span data-dcnode-id="4344" instrument_node="">
</span><br data-dcnode-id="4343"><span data-dcnode-id="4342" instrument_node="">
For Loos, this sensibility of ‘difference’ was exacerbated, not eliminated, by the dislocations brought about by industrialization. As Massimo Cacciari has pointed out, modernity, for Loos, was constituted by different and mutually intransitive ‘language games’.13 Loos thought in terms of art and industry, art and handicraft, music and drama, never in terms of a Gesamtkunstwerk that would synthesize these different genres in a modern ‘community of the arts’. In his designs for the War Ministry in Vienna (1907) and the monument to the Emperor Franz Josef (1917), Loos adopted a neoclassicism which, though clearly mediated by the Beaux-Arts, was more literal than the classicizing work of Wagner or Behrens. These types of building belonged to the category of Denkmal. But what about those buildings in the public realm which could make, at best, only weak claims to monumentality—commercial buildings? In the latter part of his career Loos designed several large ofﬁce blocks and hotels, none of which were built. The only realized project in which Loos addressed the problem of inserting a large commercial building in a historical urban context was the ‘Looshaus’ in Michaelerplatz of 1909–11 [45]. The ground ﬂoor and mezzanine of this building were to be occupied by the fashionable gentlemen’s outﬁtters, Goldman and Salatsch, and the upper ﬂoors by apartments. The problem faced by Loos was that of designing a modern commercial building in a fashionable shopping street close to the Imperial Palace. Here, Loos’s idea of decorum came into full play; he decorated the lower ﬂoors, which belonged to the public realm, with a Tuscan order faced in marble, and stripped the apartment ﬂoors, with 76 the urn and the chamberpot: adolf loos 1900‒30</span><br data-dcnode-id="4341"><span data-dcnode-id="4340" instrument_node="">
</span><br data-dcnode-id="4339"><span data-dcnode-id="4338" instrument_node="">
45 Adolf Loos The Looshaus, 1909–11, Michaelerplatz, Vienna The lack of resolution between the ornamented main ﬂoor and the stripped upper ﬂoors is intentional and must be seen in relation to the architectural debates of the time, not in terms of a future Modernist discourse.</span><br data-dcnode-id="4337"><span data-dcnode-id="4336" instrument_node="">
</span><br data-dcnode-id="4335"><span data-dcnode-id="4334" instrument_node="">
their purely private connotations, of all ornament. In creating a hiatus between two parts of the same structure, Loos turned the building into a provocation—an illustration of his article ‘Potemkin City’,14 in which he had attacked the bourgeois apartment blocks on the Ringstrasse for using false façades to look like Italian palazzi. Instead of creating a uniﬁed classical ‘palace’, Loos treated each part of the building in a way appropriate to its function, the building’s disjunctive parts reﬂecting the disjunctions of modern capitalism. Whereas Behrens in his Turbine Factory carefully masked his distortions of the classical syntax in order to create an apparently seamless fusion of the classical and the modern, Loos drew attention to them, presenting them in terms of an ‘impossible’ juxtaposition.</span><br data-dcnode-id="4333"><span data-dcnode-id="4332" instrument_node="">
