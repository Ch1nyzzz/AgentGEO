Commissariat for Heavy Industry of 1934, appear in his work with increasing frequency in the 1930s and probably reﬂect the ofﬁcial demand for a Social Realist architecture. But since Melnikov used them as additional weapons in his armoury of shock tactics—bringing to mind the critic Viktor Shklovsky’s theory of the ‘making strange’ of traditional practices27—rather than aiming at a reconciliation with tradition, his work suffered the same ofﬁcial neglect in the 1930s as that of the Constructivists and Rationalists. Ivan Leonidov, 12 years younger than Melnikov, was a product of OSA and Ginsburg’s formalist–functionalist wing of Constructivism. In complete contrast to the physicality and drama of Melnikov’s work, Leonidov’s designs seem to exist in a disembodied Neoplatonic world in which technology has been converted into pure Idea. His reputation rests largely on a series of Utopian projects designed between 1927 and 1930. The ﬁrst and most signiﬁcant of these was a project for the Lenin Institute of Librarianship [88], which was shown at the ﬁrst Exhibition of Contemporary Architecture at Moscow in 1927. This project resembles a Suprematist composition. It is dominated by a slender glazed tower and a translucent sphere (the auditorium), the latter apparently prevented by tension cables from ﬂoating off into space. A second project, for a Palace of Culture (1930), was a transformation of the typical workers’ club into an institution for proletarian education on a national scale. Unlike that of the Lenin Monument, which expands dynamically from a central point, the plan of the Palace 88 Ivan Leonidov The Lenin Institute of Librarianship, 1927 The metaphor of transparency and weightlessness is here combined with Platonic forms, synthesizing Suprematism and Constructivism and symbolizing a socialism in which the ideal and real, the spiritual and the material, have become fused.</span><br data-dcnode-id="3789"><span data-dcnode-id="3788" instrument_node="">

The end of the Russian avant-garde Throughout the 1920s Russian avant-garde architects struggled to hold onto their freedom of action, which usually meant the freedom to put forward ideas that were more radical, both socially and artistically, than those of the Communist Party. But towards the end of the 1920s the gap between the avant-garde and the political establishment increased. As the Stalin government became increasingly authoritarian and culturally conservative, so the architects became more Utopian— as the work of Leonidov demonstrates. The same was true at the level of urbanism. While the architects of OSA condemned the traditional city, the Communist Party saw it as a cultural heritage that was understood by the masses and should therefore be preserved, extended, and improved. The plan for Moscow of 1935 (architect: V. N. Semenov), though based on the city’s unique medieval structure, followed the general principles of such nineteenth and early-twentieth-century city plans as Haussmann’s Paris, the Ringstrasse in Vienna, and Burnham’s Chicago. The ofﬁcial view was summed up in the slogan: ‘The people have a right to columns.’ With Stalin’s ﬁrst Five Year Plan of 1928, the government embarked on a ruthless programme of industrial development and agricultural collectivization. This programme included the construction of a number of new industrial cities sited near sources of raw material. The solutions that Ginsburg and Milyutin proposed for Magnitogorsk were ignored in favour of conventional centralized cities. Showing little faith in Russian architects with their lack of practical experience and preoccupation with long-term, Utopian ideas, the new city managers hired foreign architects with experience in the techniques and management of new settlements. These included the German architect Ernst May and the Swiss Hannes Meyer (who moved to Russia in 1930 after losing hope that socialism might be established in western Europe). Such architects, however, completely misjudging the true situation in Russia, were disappointed when they discovered that their clients were more interested in their technical skills than their Modernist aesthetics—which in any case could hardly be realized under the primitive conditions of the Russian building industry. Two events symbolize the ﬁnal death of the avant-garde in Soviet Russia. The ﬁrst was the dissolution in 1932 of all autonomous the avant-gardes in holland and russia 133</span><br data-dcnode-id="3777"><span data-dcnode-id="3776" instrument_node="">

89 Boris Iofan Palace of the Soviets, 1931–3 This project represents the Stalinist concept of a bourgeois architecture inherited by the masses. It marked the death knell of modern architecture in the USSR. The project was never executed.</span><br data-dcnode-id="3773"><span data-dcnode-id="3772" instrument_node="">

architectural professional groups except the Stalinist-dominated All Union Society of Proletarian Architects (VOPRA),28 which resulted in increased government control over the profession. The second event was the result of the prestigious Palace of the Soviets competition, held between 1931 and 1933. After a long drawn-out procedure a young ‘centrist’ architect—Boris Iofan—was awarded ﬁrst prize from a list of entrants that included many of the stars of European Modernism, among them Gropius, Mendelsohn, and Poelzig from Germany, Brasini from Italy, Lamb and Urban from America, and Auguste Perret and Le Corbusier from France [89]. Henceforth the state maintained a ﬁrm grip on architectural policy. The architects of the avant-garde either vainly attempted to adapt their style to the approved monumentalism or became bureaucrats (for example, Ginsburg), working for technical improvement within a cultural policy of Socialist Realism that contradicted all that they had lived for in the 1920s.</span><br data-dcnode-id="3765"><span data-dcnode-id="3764" instrument_node="">

After the war of 1914-18 there was a strong reaction in artistic circles in France against the anarchy and uncontrolled experimentalism of the pre-war avant-gardes. A 'return to order' was seen to be necessary. But while for some this meant a return to conservative values and a rejection of modernity, for others it meant embracing the imperatives of modern technology. What further complicated the situation was that both cultural pessimists like the poet Paul Valery and technological Utopians like Le Corbusier invoked the spirit of classicism and geometry. In the aftermath of the war, there was little architectural activity in France until 1923, and architects were largely restricted to the design of private dwellings. This chapter will discuss the development of the French avant-garde as it emerged from this situation, with Le Corbusier as its most creative and energetic representative.</span><br data-dcnode-id="3749"><span data-dcnode-id="3748" instrument_node="">

Charles Eduard Jeanneret (1887-1965), later known as Le Corbusier, received his training in the school of arts and crafts at La Chaux-deFonds in French Switzerland, where he learned a trade—watch engraving—before taking the Cours Superieur with Charles L'Eplattenier, who persuaded him to become an architect. He worked for a few months with Auguste Ferret in Paris in 1908 and from 1910 to 1911 he spent several months in Germany preparing a report on German applied art commissioned by UEplattenier. While in Germany he met Theodor Fischer, Heinrich Tessenow, and Bruno Paul, worked briefly in the office of Peter Behrens, and attended an important Deutscher Werkbund conference sponsored by the cement industry at which most of the luminaries of the German avant-garde were present. He then travelled to the Balkans, Istanbul, and Athens. The journal and letters that Jeanneret wrote during this</span><br data-dcnode-id="3737"><span data-dcnode-id="3736" instrument_node="">
</span><br data-dcnode-id="3735"><span data-dcnode-id="3734" instrument_node="">

</span><br data-dcnode-id="3727"><span data-dcnode-id="3726" instrument_node="">
voyage show that he was caught between his love of the ‘feminine’ vernacular arts of Eastern Europe and Istanbul, and his admiration for the ‘masculine’ classicism of ancient Greece, which he identiﬁed with the spirit of modern rationalism. The effect of the Parthenon, combined with the teaching of Perret and Behrens, converted him to classicism, and he renounced the medievalizing Jugendstil tradition in which he had been trained. In his report on German applied art, which was entitled ‘Etude sur le Mouvement de l’Art Décoratif en Allemagne’ (‘Study on the Decorative Art Movement in Germany’), Jeanneret eulogized the tradition of the French decorative arts, which he saw to be threatened by German commercial competition. He was full of praise for the organizational skill of the Germans, but denigrated their artistic taste. Somewhat inconsistently, however, he admitted his admiration for the new German neoclassical movement, claiming that ‘Empire’ was the progressive style of the day, being at once ‘aristocratic, sober, and serious’. Jeanneret’s early work already shows the desire to reconcile architectural tradition with modern technology that was to characterize his entire career. While practising in La Chaux-de-Fonds between 1911 and 1917 he was engaged in three types of project: research into the application of industrial techniques to mass housing within a Sitteesque Garden Suburb framework; bourgeois interiors in the Empire and Directoire styles; and the design of neoclassical villas. Of the three villas that he built in the vicinity of La Chaux-de-Fonds—the Villa Jeanneret (1912), the Villa Favre-Jacot (1912), and the Villa Schwob (1916)—the ﬁrst two were strongly inﬂuenced by Behrens’s neoclassical houses and the third by Perret’s use of the reinforced-concrete frame. During this period, frequent visits to Paris kept him in touch with both Perret and French decorative art circles, in which his ‘Etude’ had enjoyed something of a succès d’estime.1 In 1917 Jeanneret moved permanently to Paris, where he was able to set up an ofﬁce within the business ramiﬁcations of an old friend, the engineer and entrepreneur Max Dubois. He also began to paint in oils under the guidance of the artist Amédée Ozenfant, whom he met in 1918. Calling themselves ‘Purists’, the two immediately collaborated on a book, Après le Cubisme, and with the poet Paul Dermée founded the magazine L’Esprit Nouveau in 1920.</span><br data-dcnode-id="3725"><span data-dcnode-id="3724" instrument_node="">

L’Esprit Nouveau The review (from which Dermée was soon ejected on account of his Dada tendencies) was published between October 1920 and January 1925 in 28 editions. Its original subtitle, Revue Internationale d’Esthétique, was soon changed to Revue Internationale Illustrée de l’Activité Contemporaine, and the following list of subjects was announced: 138 le corbusier and modern architecture in france 1920‒35</span><br data-dcnode-id="3721"><span data-dcnode-id="3720" instrument_node="">
</span><br data-dcnode-id="3719"><span data-dcnode-id="3718" instrument_node="">
literature, architecture, painting, sculpture, music, pure and applied science, experimental aesthetics, the aesthetic of the engineer, urbanism, philosophy, sociology, economics, politics, modern life, theatre, spectacles, and sports. Most of the articles were written by Ozenfant and Jeanneret themselves under various pseudonyms.2 (At this point, Jeanneret adopted the name of Le Corbusier, though he continued to sign his paintings with his family name until 1928.) The principal theme of L’Esprit Nouveau, already developed in Après le Cubisme, was the problematic relation between art and industrial society. The review shared with De Stijl the idea that the modern industrialized world implied a change from individualism to collectivism. Both also agreed that art and science were not opposed to each other, even if they used different means, and that their union would result in a new aesthetic. What differentiated L’Esprit Nouveau from De Stijl was the belief that this new aesthetic would be classical in spirit. This idea was underlined by the constant juxtaposition of old and new: monographs on such French classical ‘masters’ as Poussin and Ingres were interleaved with articles by Charles Henry on the science of aesthetics;3 the Parthenon was compared to a modern automobile, and so on. The afﬁnity between art and science was seen to be based on their common approximation to a condition of stasis, harmony, and invariability. Science and technology had reached a state of perfection of which the Greeks had only dreamed. Reason could now create machines of extreme precision; feeling, allied to reason, could create works of art of an equally precise plastic beauty: ‘No one today denies the aesthetic that emanates from the constructions of modern industry . . . machines display such proportions, plays of volume and materiality that many are true works of art, because they embody number, which is to say order.’4 There was nothing new in the identiﬁcation of modern technology with classicism—it had been an essential part of Muthesius’s post-Arts and Crafts aesthetic doctrine (see page 58). But Cubism had opened the way to a more abstract, Platonic idea of classicism, and it was in this form that the equation technology–classicism reappeared in L’Esprit Nouveau. The connection between science and Platonic forms depended on a highly selective view of modern science. It tended to ignore such nineteenth-century developments as the life sciences and non-Euclidean geometries with their counterintuitive, often destabilizing, models of reality. Even more problematic was the fact that in the new world of objectivity and collectivism anticipated by L’Esprit Nouveau the position of the artist remained untouched. De Stijl and the Constructivists, arguing from similar principles to L’Esprit Nouveau, had foreseen a time when the artist would become redundant. But for L’Esprit Nouveau, the artist played an essential role within a modern society dominated by science and technology—that of making visible the le corbusier and modern architecture in france 1920‒35 139</span><br data-dcnode-id="3717"><span data-dcnode-id="3716" instrument_node="">
</span><br data-dcnode-id="3715"><span data-dcnode-id="3714" instrument_node="">
unity of the age. Françoise Will-Levaillant’s judgement is difﬁcult to dispute: ‘The positivism applied by L’Esprit Nouveau founders on the contradiction between materialism, to which it leans a priori, and idealism, which completely overdetermines all reasoning and choice.’5 An unresolved dualism was, indeed, at the very core of Le Corbusier’s system of ideas. ‘The ﬁrst goal of architecture’, he wrote, ‘ is to create organisms that are perfectly viable. The second, where modern architecture really begins, is to move our senses with harmonized forms and our minds by the perception of the mathematical relationships which unify them.’6 In such statements the connection between technical viability and aesthetic form is merely asserted, never argued. Although forms became ‘lawful’ only through technique, they were nonetheless somehow self-validating. This unresolved contradiction between materialism and idealism was not, however, restricted to the pages of L’Esprit Nouveau; to one degree or another it characterized the Modern Movement of the 1920s as a whole.</span><br data-dcnode-id="3713"><span data-dcnode-id="3712" instrument_node="">

The objet-type It was in formulating an ideology of modern painting that Ozenfant and Jeanneret developed many of the architectural ideas that later appeared in L’Esprit Nouveau. In Après le Cubisme (1918) and in the essay ‘Le Purisme’7 an idea that was to play an important part in Le Corbusier’s architectural theory was introduced: that of the objet-type. In these texts, the authors praise Cubism for its abolition of narrative, its simpliﬁcation of forms, its compression of pictorial depth, and its method of selecting certain objects as emblems of modern life. But they condemn it for its ‘decorative’ deformation and fragmentation of the object and demand the object’s reinstatement. ‘Of all the recent schools of painting, only Cubism foresaw the advantages of choosing selected objects . . . But by a paradoxical error, instead of sifting out the general laws of these objects, Cubism showed their accidental aspects.’8 By virtue of these general laws, the object would become an objet-type, its Platonic forms resulting from a process analogous to natural selection, becoming ‘banal’, susceptible to inﬁnite duplication, the stuff of everyday life [90].9</span><br data-dcnode-id="3709"><span data-dcnode-id="3708" instrument_node="">
</span><br data-dcnode-id="3707"><span data-dcnode-id="3706" instrument_node="">
The Pavillon de L’Esprit Nouveau Although he had continued to design neoclassical interiors and furniture until his move to Paris in 1917, Jeanneret had been having doubts about his use of this style since 1913. In 1914 he wrote a report in which he said that, to be in tune with the spirit of the age, designers would have to look at ‘domains abandoned by the artist and left to their natural evolution’,10 an idea patently derived from Adolf Loos. (Loos’s 140 le corbusier and modern architecture in france 1920‒35</span><br data-dcnode-id="3705"><span data-dcnode-id="3704" instrument_node="">
</span><br data-dcnode-id="3703"><span data-dcnode-id="3702" instrument_node="">
90 Jeanneret/Le Corbusier Still Life, 1919 This typical Purist work takes from Cubism its ﬂattening of pictorial depth and overlapping of planes, but the object has now been reinstated in its integrity, acquiring solidity and weight. It has become an objet-type, representing unchanging values and resisting the relativistic fragmentation of reality that had been the hallmark of Cubism.</span><br data-dcnode-id="3701"><span data-dcnode-id="3700" instrument_node="">

essays ‘Ornament and Crime’ and ‘Architecture’ had been translated into French two years earlier in the anarchist journal Les Cahiers d’Aujourd’hui). The year before, Jeanneret had written to the architect Francis Jourdain (a follower of Loos) expressing his admiration for a room Jourdain had exhibited in the Salon d’Automne.11 This room contained solid, astylar, rather peasant-like furniture—a far cry from the Empire style with its high-bourgeois overtones.12 Le Corbusier resolved these years of doubt in a series of articles in L’Esprit Nouveau, published in 1925 as L’Art Décoratif d’Aujourd’hui, and his new ideas received their ﬁrst practical demonstration in the Pavillon de L’Esprit Nouveau that he and his cousin and new partner, Pierre Jeanneret, built at the Exposition des Arts Décoratifs in Paris in 1925. The aim of the exposition, which had been planned before the First World War, was to reassert French dominance in the decorative arts, and most of the work was a ‘modernized’ form of the French artisanal tradition.13 In his pavilion Le Corbusier designed an interior that fundamentally challenged this tradition, ﬂying in the face of the French art establishment to which he had so eagerly sought an entrée only a few years before. The pavilion proposed nothing less than the abolition of the decorative arts as such. Far from being a tastefully le corbusier and modern architecture in france 1920‒35 141</span><br data-dcnode-id="3697"><span data-dcnode-id="3696" instrument_node="">

91 Le Corbusier and Pierre Jeanneret Pavillon de L’Esprit Nouveau at the Exposition des Arts Décoratifs, 1925, Paris The pavilion is the adaptation of the typical Parisian artist’s studio to a family dwelling. The furnishing is a montage of anonymous, off-the-peg objets-type but at the same time a carefully contrived, if austere, Gesamtkunstwerk.</span><br data-dcnode-id="3693"><span data-dcnode-id="3692" instrument_node="">
</span><br data-dcnode-id="3691"><span data-dcnode-id="3690" instrument_node="">
designed middle-class home, it was an apartment for a kind of generic ‘man without qualities’ living in a post-war economy dominated by mass consumption and mass production. Arthur Rüegg has called the pavilion a ‘curious mixture of Spartan simplicity and the heterogeneous deployment of objects’.14 The furniture was of two kinds: ﬁxed and mobile. The ﬁxed elements—modular storage units or cassiers standard—were integrated into the architectural background, while the free-standing furniture was chosen from products available in the market—for example, leather chairs from Maples and bentwood dining chairs by Thonet. While the other exhibitors presented rooms which were ‘artistic wholes’, the Pavillon de L’Esprit Nouveau was a montage of found objets-type lacking any ﬁxed formal relation to each other [91]. Of the objects that laconically littered this carefully arranged space, Le Corbusier later wrote: ‘[They] were instantaneously readable, recognizable, avoiding the dispersal of attention brought about by particular things not well understood.’15 Le Corbusier’s ideas of ﬁxed and mobile furniture came directly from Loos. What was quite un-Loosian, however, was the return of the Gesamtkunstwerk in a new form—the aesthetically uniﬁed expression of the industrial age.</span><br data-dcnode-id="3689"><span data-dcnode-id="3688" instrument_node="">

The aesthetics of the reinforced-concrete frame The modern architecture of the 1920s was born under the sign of reinforced concrete, even though much of the work made limited use of this material.16 To the ‘naive observer’, ‘concrete architecture’ meant architecture that looked monolithic and cubic. It was from Auguste 142 le corbusier and modern architecture in france 1920‒35</span><br data-dcnode-id="3685"><span data-dcnode-id="3684" instrument_node="">
</span><br data-dcnode-id="3683"><span data-dcnode-id="3682" instrument_node="">
Perret that Le Corbusier learned to regard reinforced concrete as the modern structural material par excellence, but his view of it became very different from that of his teacher. Perret adhered to the academically enshrined principles of French structural rationalism, according to which the structure of a building should be legible on the façade. For Perret, the advent of reinforced concrete modiﬁed but did not invalidate this tradition; he looked on concrete as a new kind of stone [92]. Unlike Perret, Le Corbusier saw reinforced concrete as a means towards the industrialization of the building process.17 His ﬁrst embodiment of this idea was the Dom-ino frame (1914), designed with the help of Max Dubois, in which the columns and the ﬂoorplate constituted a prefabricated system independent of walls and partitions [93]. In the earliest projects for which this system was proposed, the external walls, though structurally redundant, still looked as if they were of masonry construction.18 But starting with the Citrohan House 92 Auguste Perret Musée des Travaux Publics, 1936–46, Paris Perret reinterpreted the French neoclassical– rationalist masonry tradition in terms of reinforced concrete. In this case there is both a detached peristyle and a structural wall with revetment. The structure, whether free-standing or embedded in the wall, is perfectly legible.</span><br data-dcnode-id="3681"><span data-dcnode-id="3680" instrument_node="">

93LeCorbusier Dom-ino Frame, 1914 In this building the concrete frame is conceived as being independent of the spatial planning, and as a means towards the industrialization of the build ing process, not as a linguistic element as it was for his teacher Perret. Its logical independence frees artistic form from its traditional dependence on tectonics. The building is now presented as an industrial product.</span><br data-dcnode-id="3673"><span data-dcnode-id="3672" instrument_node="">
</span><br data-dcnode-id="3671"><span data-dcnode-id="3670" instrument_node="">
project of 1920, such features disappear and the building becomes an abstract prism. In all Le Corbusier s mature work, even where the external wall is an infill between columns, the columns are suppressed, and the entire surface is covered with a uniform coat of white or coloured plaster. In becoming homogenized and dematerialized the walls of the building lose, as it were, their tectonic memory, just as in Cubism the painting, becoming fragmented, loses its narrative memory. As in Cubist painting, architecture no longer reiterates history: it becomes reflexive. Although the structure of the proposed Citrohan House is suppressed, its presence is indicated by a number of devices. In this subtle revealing of a hidden frame structure, the work of Le Corbusier differs from that of his Modernist colleagues in France such as Robert Mallet-Stevens (1886-1945), Andre Lur$at (1894-1970), and Gabriel Guevrekian (1900-70), who like him exhibited at the Salons d'Automne of 1922 and 1924, in which the new 'cubic' style became known to the public. If we compare, for example, Le Corbusier's Citrohan House of 1925-7 [94] with Mallet-Stevens's 'Project for a Villa' of 1924 [95] the difference is particularly striking. The Citrohan House is a single cubic volume. Its window openings extend to the corner reinforced-concrete column, leaving only the 144 LE CORBUSIER AND MODERN ARCHITECTURE IN FRANCE 1920-35</span><br data-dcnode-id="3669"><span data-dcnode-id="3668" instrument_node="">

94 Le Corbusier Citrohan House, 1925–7, Weissenhofsiedlung, Stuttgart This was the last in the series of Citrohan-type houses begun in 1920. The house is a pure prism, an expression of volume rather than mass, the walls reading as thin membranes, the frame invisible though palpable.</span><br data-dcnode-id="3665"><span data-dcnode-id="3664" instrument_node="">

95 Rob Mallet-Stevens Project for a Villa, 1924 In contrast to the Citrohan House, the building appears to have thick walls, suggesting masonry construction. It is a pyramidal composition of cubes owing much to van Doesburg.</span><br data-dcnode-id="3661"><span data-dcnode-id="3660" instrument_node="">

96 Le Corbusier Housing, 1928, Pessac The use of colour probably indicates the inﬂuence of van Doesburg, but Le Corbusier applies a single colour to whole façades or buildings, resisting van Doesburg’s isolation of the plane, just as he had rejected Cubist fragmentation. In the 1920s, unlike van Doesburg, Le Corbusier preferred earth and pastel colours but in the 1950s—for example at the Unité d’Habitation at Marseilles—he was to adopt the De Stijl palette of primary colours.</span><br data-dcnode-id="3653"><span data-dcnode-id="3652" instrument_node="">

thickness of this column separating the window opening from the circumambient air, destroying the building’s apparent mass. This effect is accentuated by the bringing forward of the windows almost to the wall planes so that the walls appear as a thin diaphragm. Furthermore, because the entire weight of the building is carried on widely spaced columns, the window openings can be of any size or shape and their relationship to the wall is no longer that of ﬁgure to ground. In contrast, Mallet-Stevens’s villa consists of a pyramidal aggregation of cubes, their thick walls pierced with windows surrounded by substantial areas of wall. Whatever the structure was intended to be, it gives the impression of having been carved out of a solid block. Indeed, Mallet-Stevens himself, in an article of 1922, claimed that, in modern architecture, the concepts of the architect and the sculptor are identical: ‘It is the house itself that becomes the decorative motif, like a beautiful piece of sculpture . . . thousands of forms are possible and unexpected silhouettes are created.’19 The villa, in fact, seems to be derived from van Doesburg’s studies in Weimar in 1922, which were equally ambiguous structurally. In both cases an irregular set of rooms dances round a vertical stair shaft, generating an asymmetrical, pyramidal composition of cubes. Ornament has been replaced by picturesque sculptural form. The Citrohan House was the antithesis of this type of fragmented object which exhibited on its exterior the volumes out of which it was made. Such a building was ‘a hirsute agglomeration of cubes; an uncontrolled phenomenon’.20 ‘We have got used’, Le Corbusier wrote to a client, ‘to compositions which are so complicated that they give the impression of men carrying their intestines outside their bodies. We claim that these should remain inside . . . and that the outside of the house should appear in all its limpidity.’21 These remarks reveal Le Corbusier’s conception of the relation between modern technology and the laws of architecture. Technology, continuously changing, makes the building functionally efﬁcient, satisfying, and giving rise to needs. But like the machinery of a car, the technology of the house should be invisible. Both house and car are objets-type—complex sets of functions sheathed in Platonic membranes. Although Le Corbusier rejected van Doesburg’s literal fragmentation of the envelope of the building, his interiors show the inﬂuence of van Doesburg’s composition by planes,22 and he sometimes adopts the Dutch architect’s external use of polychromy [96].</span><br data-dcnode-id="3649"><span data-dcnode-id="3648" instrument_node="">

The ‘Five Points of a New Architecture’ The Citrohan House referred to above was one of a pair of houses Le Corbusier built for the Deutscher Werkbund-sponsored exhibition at the Weissenhofsiedlung in Stuttgart of 1927. It was in the context of 146 le corbusier and modern architecture in france 1920‒35</span><br data-dcnode-id="3645"><span data-dcnode-id="3644" instrument_node="">

this building that he published his ‘Five Points for a New Architecture’, in which he prescribed the rules of a new architectural system. These were: pilotis; the roof garden; the free plan; the horizontal window; and the free façade. Each point, inverting a speciﬁc element of the academic tradition, is presented as a freedom achieved by means of modern technology, a decoding of the conventions of a supposedly ‘natural’ architecture. But this declaration of freedom can also be read as a series of displacements within a broader set of architectural rules. It does not accept the absolute licence of Expressionism or the mystical Utopia of van Doesburg. It is the puriﬁcation of the architectural tradition, not its abandonment. Implicit in the Five Points is an opposition between the rectangular enclosure and the free plan, each of which presupposes the other [97]. Le Corbusier underlined this opposition when, describing the Villa Stein, he wrote: ‘On the exterior an architectural will is afﬁrmed, in the interior all the functional needs are satisﬁed.’23 But he went beyond the functionalism implied by this statement, exploiting the aesthetic possibilities inherent in the free plan. The interior becomes a ﬁeld of plastic improvisation triggered by the contingencies of domestic life and giving rise to a new kind of promenade architecturale. Le Corbusier compares this ‘disorderly order’ to the chaos of a dining table after a convivial dinner, which becomes an allegory of the occasion of which it is the trace.24 According to Francesco Passanti, Le Corbusier owed this concept of ‘life art’ to the poet Pierre Reverdy.25 The tension between the free interior and the ‘limpid’ exterior in Le Corbusier’s work of the 1920s reaches a climax with the Villa Savoye at 97 Le Corbusier Four House Types, 1929 Le Corbusier’s brilliant typological analysis of his own houses clearly reveals his concept of the dialectical relationship between a Platonic exterior and a functional interior—two incommensurate forms of ‘order’ existing side by side.</span><br data-dcnode-id="3637"><span data-dcnode-id="3636" instrument_node="">

Poissy (1929-31). The house is raised on pilotis and appears as a pure white prism hovering above the convex surface of the field in which it is sited [98]. The arriving car drives under the house and a ramp takes the visitor from the entrance lobby to the main floor—a walled enclosure occupied partly by the accommodation and partly by a terrace garden. Within the geometrical purity of the enclosing cube, the interior is free and asymmetrical, obeying its own dynamic logic [99]. Yet the wall separating the two worlds of inside and outside is only a thin membrane, cut by a continuous horizontal window. The inhabitant having first been separated from the Virgilian landscape is re-presented with its framed image. The cube is first established and then burst open [100]. Writing of Le Corbusier s houses of the 19208, Sigfried Giedion said: 'Like no one before him, Corbusier had the ability to make resonate the ferro-concrete skeleton that had been presented by science... the solid volume is opened up whenever possible by cubes of air, strip windows, immediate transitions to the sky . . . Corbusier s houses are neither spatial nor plastic... air flows through them/26</span><br data-dcnode-id="3629"><span data-dcnode-id="3628" instrument_node="">

Urbanism As we have seen, Le Corbusier's earliest urban projects in Chaux-deFonds were related to the Garden City movement. But in 1920, he turned his attention to the problem of the modern metropolis, addressing issues of circulation and hygiene with which the urbanists in Paris had been concerned for some time.27 The first such project—the Ville Contemporaine, shown at the Salon d'Automne of 1922—was a schematic proposal for a city of 3 million people on an ideal site [101]. The project is based on the belief that the metropolis is valuable a priori. Its efficiency as a node of culture depends on its historical association with a particular location. But to be preserved it has first to be destroyed. To counter the city s increasing congestion and the consequent flight of its inhabitants to the suburbs, it will be necessary both to increase its density and to decrease the area covered by buildings. Using American skyscraper technology, the project proposes widely spaced office towers 200 metres high, and continuous residential superblocks of 12 storeys, the rest of the space being turned into parkland traversed by a rectilinear network of high-speed roads. Modern technology makes it possible to combine the advantages of the Garden City with those of the traditional city. Instead of the population moving to the suburbs, the suburbs move into the city. The linear superblocks in the Ville Contemporaine are arranged in a pattern of 'setbacks'—'a redents. This idea had two sources: the boulevards a redans proposed by Eugene Henard in I9O3,28 and Le Corbusier's own studies of Dom-ino housing around I9i4-29 In the LE CORBUSIER AND MODERN ARCHITECTURE IN FRANCE 1920-35 149</span><br data-dcnode-id="3625"><span data-dcnode-id="3624" instrument_node="">

Ville Contemporaine, as in these studies, the housing blocks do not align with the road system but are arranged in counterpoint to it. In the later Ville Radieuse (1933) the blocks are raised on pilotis, and pedestrian movement at ground level is unobstructed. The urban space becomes isotropic; there are no ‘fronts’ and ‘backs’ and the spatial distinction between public and private is abolished. Although Le Corbusier modiﬁed these ﬁrst urban models in various ways, their basic form remained unaltered, even after he had developed completely different systems of urbanism for Rio de Janeiro, Algiers, and Chandigarh (see page 210). In the Ville Contemporaine and the Ville Radieuse, two absolute values are juxtaposed: nature and technology. Work and domestic life take place in high-rise structures; cultivation of the spirit and the body takes place in parkland. As a result of this disjunction, the element of chance is eliminated from urban experience. The social problems connected with this separation of living from the spontaneous and random aspects of city life have become increasingly obvious in the intervening years. Despite its faults, however, the Corbusian city drew attention to the division of labour inherent in industrialized society by creating an urban image in which technology and nature become separated. We may quarrel with Le Corbusier’s Cartesian interpretation of this separation, but hardly with its underlying truth.</span><br data-dcnode-id="3597"><span data-dcnode-id="3596" instrument_node="">

Regional Syndicalism In the late 1920s Le Corbusier became a militant member of the NeoSyndicalist group led by Hubert Lagardelle (1874–1958) and Philippe Lamour (1903–1992). The group was anti-liberal and anti-Marxist and ideologically aligned with contemporary Fascist movements in France and Italy. Le Corbusier became an editor and major contributor to the group’s journal Plans and its successor Prélude. Inﬂuenced by PierreJoseph Proudhon and Georges Sorel, the group called for the abolition of parliamentary democracy, and for the creation of a government of technical elites, on the Saint-Simonian principle of the ‘administration of things, not the government of people’, dedicated to a planned economy. It believed that the alienation of modern social life could be alleviated not by socialism, with its concept of abstract man, but by a return to l’homme réel and to the spirit of community characteristic of pre-industrial societies.31 This anti-Enlightenment, anti-materialist position was the equivalent of the Volkisch movement in Germany, and had the same tolerance for a technological Modernism on condition that it was not dominated by ﬁnance capital.32 Le Corbusier’s new journalistic activities coincided with a revival of his earlier interest in vernacular architecture—an interest which had been submerged but never destroyed by his concern for new systems of architectural production. In his book Une Maison, un Palais he wrote in lyrical if somewhat patronizing terms of the ﬁshermen’s cottages at Le Piquey near La Rochelle where he spent his summer vacations 154 le corbusier and modern architecture in france 1920‒35</span><br data-dcnode-id="3573"><span data-dcnode-id="3572" instrument_node="">

between 1928 and 1932.33 In building their huts, he says, ‘the ﬁshermen are very attentive to what they do. When deciding where to place something, they turn round and round like a cat deciding where to lie down; they weigh up the situation, unconsciously calculating the point of equilibrium . . . intuition proposes, reason reasons.’34 Between 1930 and 1935, vernacular forms make their appearance in several small rural houses by Le Corbusier and Jeanneret in which the pitched roof and the masonry wall, outlawed in the 1920s, reappear [104]. Yet these houses are no mere return to vernacular models; natural materials are reinterpreted in terms of Modernist aesthetics. Vernacular references are less evident in the Radiant Farm and a Village Coopératif (1934–38) [105]—two linked (unrealized) projects in which modern building technologies and Modernist aesthetics were applied to agriculture.35 These projects originated in an issue of Prélude devoted to regional reform, edited by a radical peasant-farmer, Norbert Bézard, who commissioned Le Corbusier to design a model farming community. The grass-covered Catalan vaults of these projects have rural overtones, but with their montage à sec (dry) construction and their clean, white, geometrical forms, they were clearly intended to make the greatest possible contrast with existing rural conditions. The rather surprising six-storey block of apartments in the cooperative village was justiﬁed by Le Corbusier in semiological rather than functional or social terms—it was, he said, ‘a new architectural sign</span><br data-dcnode-id="3565"><span data-dcnode-id="3564" instrument_node="">

In Germany, as in France, there was a 'return to order* after the First World War, though it was delayed by political and economic crisis. When it came it rejected not just Expressionism but the values of the Wilhelmine culture that Expressionism had attacked. Whereas in France the return to order, even its progressive form, could be seen as re-affirming an established and triumphant national tradition, in Germany, defeated in the war, it implied a radical break with the national past and a search for alternative principles. The architecture that began to emerge in Germany around 1922 reflected a dramatic change of orientation in the visual arts as a whole. The movement known as 'Neue Sachlichkeit' ('New Objectivity' or more accurately4 Fact-like-ness'),1 was indicative of a new realism. The term was first used in 1923 in the context of painting by museum director Gustav Hartlaub, who defined it as 'realism with a socialist flavour'. The movement was sometimes interpreted as a form of cynicism—a reaction to the horrors of a disastrous war—and sometimes as a 'magic realism'. The art critic Franz Roh expressed the situation thus: 'The Expressionist generation had rightly opposed Impressionism with the man of ethical principles . . . The most recent artist corresponds to a third type, one who shares Expressionisms far-sighted aims, but is more down-to-earth and knows how to enjoy the present.'2 In architecture, the change was registered by Adolf Behne. As chief spokesman of Expressionism and a key figure in the Arbeitsrat fur Kunst (AFK), Behne had held strongly anti-technological views, as is clear from his essay 'Die Wiederkehr der Kunst' ('The Restoration of Art') of 1919. But by 1922 he had completely reversed his position. In his essay of that year, 'Kunst, Handwerk, Technik' (Art, Craft, and Technology')3 he renounced his earlier views, claiming that the division of labour inaugurated by the machine was an improvement on the old 'organic' relation between the individual craftsman and his products, since it brought into play a 'higher awareness'. After a transitional period, the worker would come to understand his role within the totality of industrialized society. Zivilisation and Gesellschaft were now embraced at the expense of the old paradigms of Kultur and Gemeinschaft. Behne's new concept of the relation between the worker 159</span><br data-dcnode-id="3521"><span data-dcnode-id="3520" instrument_node="">
</span><br data-dcnode-id="3519"><span data-dcnode-id="3518" instrument_node="">
and his work was similar to the view that Gropius had already expressed in his 'Kunst und Industriebau' speech of 1911 in an earlier 'return to order' (see page 68).</span><br data-dcnode-id="3517"><span data-dcnode-id="3516" instrument_node="">

The Bauhaus: from Expressionism to Neue Sachlichkeit When Gropius was appointed to succeed Henry van de Velde as director of the Academy of Fine Art at Weimar in 1919, he was given the task of creating a new School of Architecture and Applied Art which would unify the Hochshule fur Bildende Kunst with the recently disbanded Kunstgewerbeshule. The integration of fine arts with crafts was standard policy in German art schools at the time.4 But as we have seen Gropius had grander ambitions: he wanted the academy (which he now) renamed the Bauhaus) to become the spearhead of the AFKs programme for the transformation of German artistic culture under the wing of architecture (see page 96). This programme was predicated on the belief that artistic culture was threatened by the materialism of industrial capitalism and could only be saved by a spiritual revolution. In the 'Bauhaus Manifesto* of 1919, Gropius wrote, in Expressionist vein, 'Let us conceive a new building of the future . . . architecture, painting, and sculpture rising to Heaven out of the hands of a million craftsmen, the crystal symbol of the new in the future' [107].5 Between 1919 and 1923, however, the Bauhaus abandoned its Expressionist ideology and began to absorb the ideas of Neue Sachlichkeit, De Stijl, and UEsprit Nouveau. The initial impulse for this change came in 1921 when van Doesburg set himself up in Weimar in opposition to the Bauhaus, giving a series of lectures attended by many Bauhaus students in which he advocated an approach to design diametrically opposed to the ideology of craftsmanship and artistic 'intuition' that still dominated the Bauhaus curriculum. A second influx of ideas came from Russian Constructivism. During the early 19205 there was considerable cultural interchange between Germany and Soviet Russia. In 1922 the first Exhibition of Soviet Art was shown at the Grosse Berliner Kunstausstellung. This coincided with the publication of El Lissitzky's journal Veshch (see page 128). In 1921 the Constructivist-based Congress of International Progressive Artists was held in Diisseldorf, and this was followed by a Constructivist Congress in Weimar in 1922, organized by a splinter group from the Diisseldorf congress, including van Doesburg, the Hungarian artist and photographer Laszlo Moholy-Nagy, El Lissitzky, and the Dada artists Hans Richter, Hans Arp, and Tristan Tzara. These events greatly affected the climate of opinion within the Bauhaus. The first institutional change within the school took place in 1922, when the Swiss painter Johannes Itten was replaced by Moholy-Nagy 160 WEIMAR GERMANY: THE DIALECTIC OF THE MODERN 1920-33</span><br data-dcnode-id="3513"><span data-dcnode-id="3512" instrument_node="">

</span><br data-dcnode-id="3507"><span data-dcnode-id="3506" instrument_node="">
as head of the Vorkurs (Preliminary Course). In contrast to Itten, whose mystical approach to art teaching was based on psychological– formalist principles,6 Moholy-Nagy (1895–1946) introduced into the school an ‘objective’ Constructivist approach involving the manipulation of industrial materials such as steel and glass and mechanical techniques of assembly. The difference between Itten’s and MoholyNagy’s ideas roughly corresponded to that between the Rationalists and the Constructivists within the Russian avant-garde (see page 122). The change in the Vorkurs was later described rather laconically by Moholy-Nagy’s fellow teacher Josef Albers: ‘[The course] aimed at the development of a new, contemporary visual idiom . . . and this—over time—led from an emphasis on personal expression . . . to a more rational, economic, and structural use of material itself . . . in pictorial terms, from collage to montage’.7 As Reyner Banham pointed out, however, the move from subjectivity to machine rationalism did not eliminate the concept of ideal beauty. Moholy-Nagy, no less than Le Corbusier, believed in the connection between machines and Platonic forms.8 The real turning point came in 1923, when the Bauhaus organized its ﬁrst exhibition. In line with the new technical emphasis, the stated weimar germany: the dialectic of the modern 1920‒33 161</span><br data-dcnode-id="3505"><span data-dcnode-id="3504" instrument_node="">

theme of the exhibition was to be Art and Technology: a New Unity'. But Gropius also had a more purely architectural agenda—one which would present, as he said, 'international architecture from a completely pre-determined point of view, namely the development of modern architecture in the dynamic functional direction, without ornament or mouldings/9 A model house—the 'Haus am Horn'—was built, containing furniture designed and produced by the Bauhaus workshops as prototypes for mass production. Elementarist wooden furniture, based on that of Gerrit Rietveld, was designed by Bauhaus student Marcel Breuer (1902-81), who three years later—after he had joined the Bauhaus staff—was to design the tubular-steel, Constructivist * Wassily' chair. In 1925, the Thuringian State government withdrew its financial support and the Bauhaus moved to the town of Dessau, where the municipality funded a new school building, incorporating an existing trade school and new staff houses. With the move, several of the existing staff resigned and their places were taken by a new generation of Bauhaus-trained teachers—including Marcel Breuer, Josef Albers, and Herbert Bayer—who had acquired from the Bauhaus a new aesthetic theory and a new set of technical skills. That same year, Gropius wrote, 'The Bauhaus workshops are essentially laboratories in which prototypes of products suitable for mass production and typical of our time are carefully developed and improved/ triumphantly celebrating the union of art and technology. Writing in the Bauhaus journal in 1926, however, Bauhaus teacher Georg Muche struck a discordant note, advancing the rather Loosian view that the laws of fine art and those of technical design were fundamentally different. While Muche clearly underestimated the importance of the new relation between art and technology, his critique does suggest that the change to more machine-oriented design might be better explained as a 'paradigm shift' on the part of the artist, than as the fusion of artist and technician that Gropius implied. The designs that became commercially successful after the move to Dessau were in fact the result of the collaboration between industry and Bauhaus artists such as Marianne Brandt and Christian Dell [108].10 The school building and the masters' houses at Dessau were the first major structures realized by Gropius in the new 'dynamic functional' manner. The body of the school building was broken down into programmatic elements and reassembled to form an open, centrifugal form that was possibly inspired by Mies van der Rohe s project for a Concrete Country House [117]. The school building [109, 110], with its bridge to the new trade school, and the masters' houses with their interlocking prisms, show the influence of both Constructivism and De Stijl. The pure cubes which form these buildings reflect the work of Oud in Holland and Le Corbusier and Lur$at in France. The school 162 WEIMAR GERMANY: THE DIALECTIC OF THE MODERN 1920-33</span><br data-dcnode-id="3501"><span data-dcnode-id="3500" instrument_node="">

housing shortage caused by several years without building activity and considerable wartime migration to the cities.11 During the second half of the nineteenth century there had been increasing concern among reformist groups in all the industrial countries over the lack of affordable housing for unskilled and semiskilled workers. By 1914 the housing reform movement in Germany had gathered considerable momentum and non-proﬁt building societies were widespread—even if the results so far were meagre. In 1924, therefore, when the Social Democratic Party municipal authorities put in place their housing programmes, they were able to beneﬁt from institutions and powers already in place.12 A remarkable characteristic of this housing campaign was the extent to which it was 164 weimar germany: the dialectic of the modern 1920‒33</span><br data-dcnode-id="3481"><span data-dcnode-id="3480" instrument_node="">

dominated by the avant-garde, though a precedent for this had been set in Holland, where both Berlage and Oud had also received official city appointments.13 After the First World War Germany was rich in technically competent, ideologically progressive architects, and many of these were put in charge of city housing programmes between 1924 and 1931, including Otto Haesler (1880-1962) in Celle, Max Berg (1870-1947) in Breslau, Fritz Schumacher (1869-1947) in Hamburg, Ernst May (1886-1970) in Frankfurt-am-Main, and Martin Wagner (1885-1957) in Berlin. Like the Garden Suburbs before the First World War, the post-war Siedlungen consisted of enclaves of new housing on the outskirts of existing cities. But they differed from the Garden Suburb model in several respects. They were, for example, built to higher densities and consisted mostly (though not exclusively) of apartment blocks of up to five storeys (considered the maximum walk-up height). These were generally laid out on the Zeilenbau principle of parallel blocks aligned north-south at right angles to the access street (a system that had already been proposed before the war).14 This gave to each apartment the fresh air and sunlight that had been conspicuously absent in the late-nineteenth-century tenements—the so-called Mietkasernen ('rental barracks')—with their dark courtyards. At the aesthetic and symbolic level, they followed the rules of Neue Sachlichkeit—that is to say they were stripped of all ornament and had flat roofs. Ornament was replaced by the fairly extensive use of coloured surfaces. Some of the larger Siedlungen included public buildings such as schools and hospitals, and the housing was generally provided with public facilities such as central heating and laundries. The design of the individual apartments reflected the influence of new concepts of domestic management, strongly promoted by the women's movement, which drew their inspiration largely from America where, as we have seen, they had been discussed since the 18908 (see page 50). Erna Meyers highly successful DerNeueHaushalt (The New Household, 1926) and Crete Schutte-Lihotzky's Frankfurt Kitchen design were based on Christine Frederick's Scientific Management in the Home of 1915. The new minimum dwelling affected the middle classes even more than the workers.15 Except for the use of reinforced concrete for floors, roofs, and occasionally columns, and for some experiments in prefabricated concrete wall panels, the materials and techniques used in the Siedlungen were traditional. Walls were of plastered brick or clinker block. The windows had wooden frames and tended to be small. These small windows, large, smooth wall surfaces, and heavy attic floors often gave an almost cosy, vernacular effect to the blocks.16 The ruthlessly 'rational', Zei/enbau-type layouts, like that of Gropius and Haesler for Dammerstock Estate at Karlsruhe (1927—8) WEIMAR GERMANY: THE DIALECTIC OF THE MODERN 1920-33 165</span><br data-dcnode-id="3477"><span data-dcnode-id="3476" instrument_node="">

designed for Breslau in 1921. The whole design, which was developed between 1925 and 1931, consisted of a number of small Siedlungen, most of which were set slightly apart from the city in unspoilt meadowland. Of all the Siedlungen, those of Frankfurt, with their semi-rural setting and high proportion of single family houses, were perhaps the closest to the Garden Suburb ideals of Raymond Unwin, for whom May had worked before the war. Most of the ‘satellites’ were designed in May’s ofﬁce, but some were farmed out, including that of Hellerhof by the 112 Walter Gropius Apartment Block, 1928, Siemensstadt, Berlin This is one of the short parallel blocks at Siemensstadt. Note the use of brick to give the impression of longer spans in windows and balconies. These kinds of trompe-l’oeil effects are typical of Gropius, a man of compromise, both aesthetic and political.</span><br data-dcnode-id="3465"><span data-dcnode-id="3464" instrument_node="">

Functionalists versus rationalists One of the main conﬂicts within the German avant-garde of the 1920s was that between the ‘functionalists’ and ‘rationalists’. In one of the ﬁrst attempts to deﬁne the Neue Sachlichkeit movement, Der Moderne Zweckbau (The Modern Functional Building, written in 1923 but not published until 1926), Adolf Behne drew attention to this conﬂict and analysed the ideological differences which underlay it. According to Behne, the functionalists (whom he might more accurately have called ‘organicists’) created unique, non-repeatable buildings whose forms were shaped round their functions, whereas the rationalists looked for typical and repeatable forms that were able to fulﬁl generalized needs. Behne equated the functionalists with the ex-Expressionist architects, who, under the guise of being true to the laws of nature, in fact created singular buildings that were unable to become parts of a greater whole: ‘As the functionalist looks for the greatest possible adaptation to the most specialized purpose, the rationalist looks for the most appropriate solution for many cases.’20 The functionalists are individualists, while the rationalists accept a responsibility to society. Theo van Doesburg, in one of his articles in the journal Het Bouwbedrijf,21 made the same distinction as Behne, though he put greater stress than Behne on problems of aesthetics. For van Doesburg the functionalists, in their search for a close ﬁt between forms and functions, ignored the psychological need for ‘spare space’ in buildings, and he cited Henri Poincaré’s concept of ‘tactile space’ to support this idea.22 Looking at the problem today, it seems clear that these critics were putting forward two ‘ideal types’, and that actual buildings seldom conformed completely to one or the other: the Neue Sachlichkeit tendency was, by deﬁnition, concerned with generic rather than individual problems; and even the most extreme Expressionists had, by 1924, accepted rationalist principles. However, although the work of the Luckhardt brothers, Hans (1890–1954) and Wassili (1889–1972), and of Erich Mendelsohn (1887–1953) after the Einstein Tower of 1920–4, can weimar germany: the dialectic of the modern 1920‒33 169</span><br data-dcnode-id="3445"><span data-dcnode-id="3444" instrument_node="">

Constructivist or Neoplasticist logic, neutral forms could create systems ﬂexible enough to respond to any imaginable life situation, every building taking on a unique conﬁguration while being made from similar elements. It was such a process that Mies adopted when he abandoned the house as a single pavilion and broke it up into its basic elements. I will discuss here the houses Mies produced between the wars, in which he attempted to reconcile these conﬂicting ideas— neoclassical objectiﬁcation on the one hand and Neoplasticist fragmentation on the other.23 Mies’s architectural formation was remarkably similar to Le Corbusier’s, though their response to the conditions of modernity that they both recognized could hardly have been more different. Both had been trained in craft schools and had climbed into the professionally and socially higher sphere of architecture and the ‘ﬁne arts’; both changed their names;24 both worked their way through a formative period of neoclassicism (in the design of furniture as well as that of houses) based on the example of the same two masters—Bruno Paul and Peter Behrens; in both cases, their Modernist work followed on without interruption from their neoclassical work and was strongly inﬂuenced by it. But, whereas Le Corbusier designed only two neoclassical houses before moving on to other explorations (though he continued to design Empire style interiors for several years), Mies’s ‘Biedermeier’ period lasted from 1907 to 1926 and was the basis of a successful architectural practice. He was over 40 when he completed his ﬁrst Modernist–Constructivist building, the Wolf House in Guben (1925–7). All Mies’s neoclassical houses are symmetrical two-storey prisms, sometimes with minor appendages. These houses, especially the Riehl House (1907) [116], borrowed heavily from the illustrations of eighteenth-century vernacular–classical houses in Paul Mebes’s book Um 1800 of 1905. The Riehl House differs from the others in its siting. Like Le Co According to a common misconception, Mies’s minimalist distillation of architecture was the result of a deep engagement with the craft of building. Certainly, Mies was obsessed by certain craft-like aspects of architecture, but he was more concerned with idealizing and mediating techniques of graphic representation than with construction. As is clear from his writings, Mies realized that the traditional relationship between the craftsman and his product had been destroyed by the machine. His criteria were ideal and visual, not constructional—not even ‘visual–constructional’. It is true that unlike, for instance, Le Corbusier, Mies displays the materiality of his building elements, but he assembles these elements like montages; their connections are never visible. Even more than that of the other Modernists, Mies’s work runs counter to the ‘tectonic’ tradition. Recently, in a justiﬁed reaction against the myth of Mies-theconstructor, critics have invented a Post-Modern Mies—one who primarily operated with surfaces and effects, within the endless play of the signiﬁer.29 But this interpretation errs in the opposite direction. It ignores Mies’s fear of post-Nietzschean chaos and it also assumes that an aesthetic of materials and their ephemeral appearance (as signiﬁed by the German word Schein) is incompatible with a belief in foundational values. Mies’s conception of architecture followed the dialectical tendency of German Idealism to think in terms of opposites. According to the Neoplatonic aesthetics that inﬂuenced his thinking, the transcendental world is reﬂected in the world of the senses (Mies was fond of quoting St Augustine’s dictum: ‘Beauty is the radiance of truth’). When modiﬁed by the concept of the ‘will of the epoch’, this became the basis of his belief that the spiritual could only become active in the world in a historicized form, that is to say in the form of technology.30 Such problems of surface and depth, the contingent and the ideal, also lay behind the anti-formalism of Mies’s articles in G in 1923. These did not represent a ‘materialist’ phase (later to be abjured) as most commentators claim; they reﬂected a topos of Modernist aesthetics derived from German Romanticism, according to which the forms of art should, like those of nature, reveal an inner essence and not be imposed from the outside.31 To enquire into Mies’s philosophical background is, of course, in no way to suggest that his architecture was an ‘expression’ of philosophical ideas. For Mies, it was precisely the auto-referentiality of the work of architecture that gave it access to the world of spiritual meaning. Mies’s Modernism and his idealism were perfectly compatible.</span><br data-dcnode-id="3349"><span data-dcnode-id="3348" instrument_node="">

Materialism versus idealism: the Swiss contribution The Swiss journal ABC represents the extreme ‘materialist’ wing of the New Objectivity movement within the German speaking world.32 weimar germany: the dialectic of the modern 1920‒33 179</span><br data-dcnode-id="3345"><span data-dcnode-id="3344" instrument_node="">

Published in nine issues between 1924 and 1928, the journal was edited by an international group of architects, including the Swiss Hans Schmidt (1893–1972) and Emil Roth (1893–1980), the Dutch Mart Stam, and the Russian El Lissitzky (who ceased to be an editor when he was expelled from Switzerland in 1925). The Swiss architect Hannes Meyer (1889–1954) was also closely connected with ABC. The original impetus for the group’s formation came from Swiss–Dutch connections that had been forged by two architects of the older generation, Karl Moser (1860–1936) and H. P. Berlage, and the interest on the part of young Swiss architects in Berlage’s plan for South Amsterdam. The group was strongly opposed to De Stijl’s idealist and aesthetic approach. As Jacques Gubler has observed: ‘Where De Stijl postulated the absolute of art and elementary form, ABC postulated the absolute of technique and material.’33 ABC believed that only a ‘dictatorship’ of science and technology would be able to satisfy the collective needs of society.34 There are obvious connections between this philosophy and that of the Constructivist First Working Group in Soviet Russia (see pages 123‒5). In their projects, Mart Stam and Hans Schmidt were primarily interested in systems of prefabrication, particularly in reinforced concrete. Despite their anti-art stand, their main concern was to develop an architectural ‘language’ which reﬂected serial production. Their discourse was not essentially different from that of Neue Sachlichkeit as a whole but it claimed to be more scientiﬁcally rigorous. Stam’s researches into prefabrication included ‘reinterpretations’ of Mies van der Rohe’s glass skyscraper of 1921–2 and Concrete Ofﬁce Building of 1922 [125].35 Stam adapted Mies’s ideas to the needs of mass production; for example the curvilinear plan of the glass skyscraper was transformed into a circle, and the two-way structure of the ofﬁce building into a linear, additive structure. Hannes Meyer’s theoretical position was also close to that of the Constructivist Left. He claimed that architecture was merely one instance of the technical–productive process: ‘The depreciation of all 125 Mart Stam Reinterpretation of Mies van der Rohe’s Concrete Ofﬁce Building of 1922 In this illustration in the journal ABC (1925), Mies’s structure has been ‘improved’ to make it suitable for prefabrication. Form is seen to follow process.</span><br data-dcnode-id="3341"><span data-dcnode-id="3340" instrument_node="">

art works is an indisputable fact, and there is no doubt that their replacement with a new exact science is merely a matter of time . . . art is becoming invention and controlled reality.’36 His early work—particularly the Freidorf-Siedlung near Basel (1919–21)—was in the neoclassical style typical of the Swiss Garden City movement, in which he played an active part. After his rather late conversion to Modernism in 1924, the projects he undertook with Hans Wittwer varied between a rhetorical, mechanistic Constructivism (the projects for the League of Nations competition of 1927 and the Petersschule in Basel of 1926) and a dry rationalism (the Trade Union League School in Bernau, Germany of 1928–30). When he succeeded Gropius as director of the Bauhaus in 1928, Meyer introduced a rigorously ‘productivist’ and anti-aesthetic regime which reversed Gropius’s assiduously apolitical policy.</span><br data-dcnode-id="3333"><span data-dcnode-id="3332" instrument_node="">

The strong connection between the architectural avant-garde and Fascism in Italy during the 'heroic' period of modern architecture has always been an embarrassment to architectural historians. Yet in their support for Fascism Italian modern architects reflected an anti-liberal, anti-democratic attitude that was far from uncommon within the European avant-gardes from the 19105 to the 19308. The search for a 'third way' between Marxism and capitalism that would combine precapitalist communitarian values with modernization became translated into political reality only in Nazi Germany and Fascist Italy. The Germans made a distinction between 'modernization' and 'Modernism', embracing the first but restricting the second to specific building types such as factories. The Italian Fascist Party was split: the right wing was opposed to Modernism; the left wing supported it. The Modernist architects, for their part, sympathized wholeheartedly with a movement that shared their dislike of nineteenth-century liberalism and their desire simultaneously to modernize and return to ancient roots.</span><br data-dcnode-id="3313"><span data-dcnode-id="3312" instrument_node="">

Two progressive movements in architecture made their appearance in Italy after the First World War. Both rejected what they saw as the individualism and nihilism of the Futurists and promised a 'return to order'. This found expression in all the arts, for example in the Valori Plastici movement in painting, which took its point of departure from the metaphysical realism of Giorgio de Chirico. The first of the movements was the 'Novecento', which emerged towards the end of the war. This was a 'moderate' avant-garde that had much in common with the German Biedermeier movement of a few years earlier. It promoted an architecture which, though 'modern', would restore its links with an anonymous classical tradition. The leading architect of this movement was Giovanni Muzio (1893-1983), 183</span><br data-dcnode-id="3301"><span data-dcnode-id="3300" instrument_node="">
</span><br data-dcnode-id="3299"><span data-dcnode-id="3298" instrument_node="">
whose Ca' Brutta apartment building in Milan (1919-22) was typical of a style that emphasized the surface of the building and took pleasure in mannerist, ironic deformations of conventional classical motifs. Rationalism The second progressive post-war movement was born in 1926 with the formation of Gruppo 7. The members of this group, which included Adalberto Libera (1903-63), Luigi Figini (1903-84), and Gino Pollini (1903-91), were all students at the Milan Polytechnic and belonged to a new, post-war generation. Their aims were summarized thus in the journal Rassegna Italiana: 'The hallmark of the previous avant-garde was . . . a vain aesthetic fury . . . that of today's youth is a desire for lucidity and wisdom... we do not intend to break with tradition... the new architecture should be the result of a close association between logic and rationality/1 The rationalists' programme, with its fusion of functionalism and the classical spirit, was largely borrowed from Le Corbusier s articles in L'Esprit Nouveau. The intellectual leaders of the movement were the art critic Edoardo Persico (1900-36) and the architect Giuseppe Pagano (1896-1945), respectively the director and chief editor of the journal Casabella from the late 19205. During the first half of the 19308 the political fortunes of the rationalists were in the ascendant following their successful participation in a number of public projects. The most important of these were: • the University of Rome (1932-5)—although the traditionalist Marcello Piacentini (1881-1960) was the architect in charge, several individual buildings were assigned to rationalists, including the Physics Building by Pagano. • work for the Ministry of Communications, including a new railway station in Florence by the Gruppo Toscana. • the new towns built on the reclaimed Pontine marshes south of Rome, the most celebrated of which was Sabaudia, designed by a group led by Luigi Piccinato (1899—1983), in which equal attention was paid to socio-economic and symbolic-aesthetic issues. In the north (beyond the immediate influence of Rome), rationalism was also relatively successful despite the indifference and sometimes the hostility of the Fascist Party. Important rationalist projects, both private and public, were carried out by, among others, Figini and Pollini (for example Figini's own house in Milan of 1934-5), and by Giuseppe Terragni (1904-43) whose Casa del Fascio in Como (1932-6) was a fusion of classical monumentalism and Modernist abstraction [127]. Terragni was the most gifted of the Gruppo 7 architects. His work is notable for, among other things, its complex interplay of 184 ARCHITECTURE IN ITALY 1920-65</span><br data-dcnode-id="3297"><span data-dcnode-id="3296" instrument_node="">
</span><br data-dcnode-id="3295"><span data-dcnode-id="3294" instrument_node="">
127 Giuseppe Terragni Casa del Fascio, 1932–6, Como For Terragni the open structural frame signiﬁed Fascist transparency and public accessibility. But the building also has a dreamlike, timeless quality reminiscent of the paintings of Giorgio de Chirico.</span><br data-dcnode-id="3293"><span data-dcnode-id="3292" instrument_node="">
</span><br data-dcnode-id="3291"><span data-dcnode-id="3290" instrument_node="">
surface and structural frame, as in the east façade of the Casa del Fascio and in the Casa Giuliani-Figerio in Como (1939). Although Terragni justiﬁed the Casa del Fascio in terms of ‘the Mussolinian concept that Fascism is a glass house into which all can enter’,2 the classicizing aspects of the building prompted Pagano to condemn it as formalist and as representing an ‘aristocratic sensibility’.3 The conﬂict between Pagano and Terragni was not political (they were both ardent Fascists); it was the same conﬂict that had divided Hannes Meyer and Le Corbusier—that between a moralistic rigour on the one hand and an idealist aestheticism on the other. In 1934 Mussolini himself belatedly announced his support of the rationalists.4 But with the increase of patriotic sentiment at the outbreak of the Abyssinian War, the party veered to the right, and towards the end of the 1930s the traditionalists, under the leadership of Piacentini, became the dominant architectural faction. In the E42 Exposition near Rome of 1942 (now called EUR) most of the rationalists abandoned their Modernist position in favour of a stripped, monumental classicism.</span><br data-dcnode-id="3289"><span data-dcnode-id="3288" instrument_node="">

Post-war reconstruction Under Fascism the development of an international Modernism had been relatively free of political interference, despite antagonistic elements within the Fascist Party. Therefore there was considerable continuity between pre-war and post-war architecture in Italy. But paradoxically there were also strong revisionist pressures. Since most Modernist architects in Italy had been keen supporters of Fascism, the profession was driven, after the defeat of Fascism, to search for a new architectural identity. Architects became engaged in a succession of ideological debates which opened up the Modernist tradition to new architecture in italy 1920‒65 185</span><br data-dcnode-id="3285"><span data-dcnode-id="3284" instrument_node="">

interpretations.5 In these debates Milan and Rome represented opposite poles. The Milanese architects continued the pre-war rationalist programme established by Persico and Pagano, associating rationalism with leftist politics.6 In Rome, where rationalism had never been a strong force, a critique of the rationalists was mounted by the architect-critic Bruno Zevi (1918—2000). In two books, Towards an Organic Architecture (1945) and A History of Modern Architecture (1950), he called for a more humane architecture that would follow the examples of Frank Lloyd Wright and Alvar Aalto. Zevi's Association for Organic Architecture announced the promotion of'an architecture for the human being . .. shaped to the human scale and satisfying the spiritual and psychological needs of man in society . . . organic architecture is therefore the antithesis of a monumental architecture used to create official myths'.7 In its attack on the architecture of the Fascist era, Zevi s critique was aimed at both neoclassicism and rationalism. But he shared most of the ideals of the rationalists, particularly that of creating a genuinely modern architecture in which social progress and technical innovation would go hand in hand. These hopes were shattered when, in 1948, at the beginning of the Cold War, the centre-right Christian Democrats were returned to power. Far from inaugurating a programme of social reform and technical modernization, the government concentrated on shoring up the tangle of existing interest groups within the construction industry. In 1949 it created INA Casa (the Institute of Home Insurance), with the aim of making 'provisions for increasing worker employment, facilitating the construction of workers' housing'.8 The priority given to reducing unemployment had the effect of inhibiting technical advance in an industry still largely at a pre-industrial level.9</span><br data-dcnode-id="3281"><span data-dcnode-id="3280" instrument_node="">
</span><br data-dcnode-id="3279"><span data-dcnode-id="3278" instrument_node="">
Neorealism The artisanal state of the construction industry was also behind the 'Neorealist' movement, which was closely involved with INA Casa. The movement was initiated by the architects Mario Ridolfi (1904-84) and Ludovico Quaroni (1911-87) in a series of housing projects. These included the Tiburtino Housing Estate (1944-54) by Ridolfi and Quaroni [128], and housing in the Viale Etiopia (1950-4) by Ridolfi, both in Rome. The projects made use of a constructional vocabulary based on Ridolfi s \yoo\aManualedeirarchitetto (The Architect's Manual) &gt; published by the National Research Council in 1946, which aimed to create a vernacular Esperanto that would be understood by ordinary people.10 Ridolfi and Quaroni's projects were influenced by Swedish housing and had much in common with the populist aims of Backstrom and Reinius. Another Neorealist project—the unbuilt community centre for the Falchera housing estate in Turin (1950) by l86 ARCHITECTURE IN ITALY 1920-65</span><br data-dcnode-id="3277"><span data-dcnode-id="3276" instrument_node="">

128 Mario Ridolfi and Ludovico Quaroni Tiburtino Housing Estate 1944-54, Rome The self-consciously vernacular quality in this Neorealist project owed much to the'New Empiricism' of the Swedish architects Backstrom and Reinius.</span><br data-dcnode-id="3273"><span data-dcnode-id="3272" instrument_node="">
</span><br data-dcnode-id="3271"><span data-dcnode-id="3270" instrument_node="">
Giovanni Astengo (1915-90)—seems to have been directly influenced by the Arsta Social Centre in Stockholm by the Ahlsen brothers (see page 197).</span><br data-dcnode-id="3269"><span data-dcnode-id="3268" instrument_node="">

129 Ernesto Rogers, Lodovico Belgiojoso, and Enrico Peressutti (BPR) Off ice Bui Id ing, 1958-69, Piazza Meda, Milan An explicitly modern technology is combined with classical references, so that the build ing accommodates itself in scale to its urban context—a deliberate critique of the Modernist tabula rasa.</span><br data-dcnode-id="3261"><span data-dcnode-id="3260" instrument_node="">
</span><br data-dcnode-id="3259"><span data-dcnode-id="3258" instrument_node="">
This concept had already been broached in practical design before it was theorized by Rogers. Two projects may be singled out as representing contrasting solutions to the same problem. In the INA Casa offices in Parma (1950) by Franco Albini (1905-77) a visible concrete frame provides a grid through which a play of vertically stressed solids and voids is threaded. The complexities of daily life and the patterns of the existing street fa$ade are suggested without disturbing the underlying rationality of the idealized grid. In contrast to this, Rogers and his partners Lodovico Belgiojoso (1909-2004) and Enrico Peressutti (1908-75) (BPR), in their office building in the Piazza Meda in Milan (1958-69), deform the rational structural grid to create a classical hierarchy of different floors [129]. In the first example two 'orders' are dialectically superimposed; in the second a hybrid is created, not attempting to imitate its context but creating its analogue. A more literal interpretation of 'context' can be seen in the work of the Roman architect and theorist Saverio Muratori (1910-73). For Muratori, in his headquarters for the Christian Democratic Party in the EUR quarter of Rome (1955), 'response to context' meant communicating with the public by way of familiar signs and reasserting tradition. Muratori, like Ridolfi and Quaroni, was influenced by Swedish architecture, but in its earlier, neoclassical phase. A more superficial nostalgia for the past was characteristic of the 'Neoliberty' movement which emerged in the mid-1950s, as exemplified by the villa on Via XX Settembre in Milan (1954-5) by Luigi Caccia-Dominioni (b. 1913). Neoliberty was concerned neither with the immediate context nor with an eternal classicism; it believed that Jugendstil was still capable of representing a culturally unfulfilled urban bourgeoisie. Many Italian architects rejected contextualism—including Giancarlo de Carlo (b. 1919) who, after a brief flirtation with Neorealism in his early housing project at Matera in the 19505, reverted to a rationall88 ARCHITECTURE IN ITALY 1920-65</span><br data-dcnode-id="3257"><span data-dcnode-id="3256" instrument_node="">

ist-Brutalist style in his student housing at the University of Urbino (1963-6). But the main criticism came from abroad, particularly from the newly formed 'Team X*, at the 1959 CIAM congress in Otterlo (see page 218). The chief objects of this attack were BPR's Torre Velasca in Milan (1954-8), the Zattere apartments in Venice (1954-8) by Ignazio Gardella (1905-99), and de Carlo's Matera scheme.</span><br data-dcnode-id="3253"><span data-dcnode-id="3252" instrument_node="">
