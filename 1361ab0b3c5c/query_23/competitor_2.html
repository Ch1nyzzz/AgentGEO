The interior Nearly all of Loos’s early projects were for interior remodellings, and he continued to do this kind of work for the rest of his career. His domestic interiors resemble those of Bruno Paul and Richard Riemerschmid in their rejection of the ‘total design’ philosophy of Jugendstil in favour of separate, matching pieces of furniture (see pages the urn and the chamberpot: adolf loos 1900‒30 77</span><br data-dcnode-id="4329"><span data-dcnode-id="4328" instrument_node="">
</span><br data-dcnode-id="4327"><span data-dcnode-id="4326" instrument_node="">
32‒3). But Loos’s critique of the Gesamtkunstwerk went further than theirs. Unlike Bruno Paul’s rooms, where the recognizably classical furnishings were uniﬁed by the architect’s personal style, Loos’s interiors were made up of found objects. ‘The walls’, Loos said, ‘belong to the architects . . . all mobile items are made by our craftsmen in the modern idiom (never by architects)—everyone may buy these for himself according to his own taste and inclination.’ Loos designed very few pieces of furniture himself [46]. He usually speciﬁed eighteenthcentury English furniture, which he had copied by the cabinet-maker Joseph Veillach. If his interiors had unity, it derived more from a selective taste than from originality of design. In this, Loos’s work also differed from that of Josef Hoffmann. Although Hoffmann had abandoned curvilinear Art Nouveau for a severely rectilinear style in 1901 (a fact that Loos acknowledged, attributing it, with customary modesty, to his own inﬂuence), his furniture and ﬁttings were still covered with decorative ‘inventions’. Loos only used natural surfaces such as marble facings or wood panelling.15 In his interior architecture, Loos often combined classical motifs with a vernacular style directly indebted to M. H. Baillie Scott, whose interiors for the Grand Ducal Palace in Darmstadt (1897) had acted as a stimulant to the anti-Jugendstil reaction in Germany.16 The living rooms in Loos’s apartments are frequently a central space with lowceilinged alcoves. The room becomes a miniature social space surrounded by private sub-spaces. As in the work of Scott, considerable use is made of exposed, dark-stained beams (as purely semantic elements; they are usually false), high timber wainscoting, and brick46 Adolf Loos Chest of drawers, c.1900 Loos’s removal of applied ornament from objects of everyday use was as much an attack on Jugendstil and the Viennese Secession as it was on ‘ornament’ in the general nineteenth-century sense. It was a return to faced ﬁreplaces [47]. Loos later adapted this apartment typology to the demands of the multi-storey house. Loos’s commercial interiors have the same anonymous quality as his apartments. The journal Das Interieur described Loos’s ﬁrst shop for Goldman and Salatsch (1898) as follows: ‘The Viennese gentlemen’s outﬁtters shows unmistakably that the creator was aiming at English elegance, without reference to any particular model. Smooth reﬂecting surfaces, narrow shapes, shining metal—these are the main elements from which this impeccably fashionable interior is composed.’17 The decor included built-in storage units, glazed or mirrored, with close verticals which recall Wagner’s work, as well as reﬁned and geometrical ornament reminiscent of the Wiener Werkstätte. In addition to shops, Loos designed several cafés. For the Museum Café in Vienna (1899)— which, to Loos’s delight, acquired the nickname Café Nihilismus because of its iconoclasm—Loos used specially designed Thonet chairs and marble tables. By contrast, in the Kärntner Bar in Vienna (1907) Loos exploits the intimacy of a small room at the same time as he extends the space to inﬁnity by the use of uninterrupted mirror on the upper part of the wall [44 (see page 72)].</span><br data-dcnode-id="4313"><span data-dcnode-id="4312" instrument_node="">

</span><br data-dcnode-id="4299"><span data-dcnode-id="4298" instrument_node="">
purpose and character. The parts dominated the whole. In the French house, on the contrary, the ruling principle was the family unit. The rooms were thinly partitioned subdivisions of a cubic volume, ensuring constant social contact. It was the English type that became increasingly popular in the late nineteenth century, responding to the prevailing spirit of bourgeois individualism. What Viollet did not mention was that, under the influence of neo-medieval ideas of social harmony, this individualism was modified by the appearance of a large central hall, based on the traditional English manor house. Originating with Norman Shaw in the i86os, this double-height space became a prominent feature of the houses of Baillie Scott (Blackwell, Bowness, 1898), Van de Velde (Bloemenwerf, 1895), H. P. Berlage (Villa Henny, 1898), Josef Hoffmann (Palais Stoclet, 1905-11), and countless other houses of the period. This evolution culminated in the series of large suburban villas that Loos built between 1910 and 1930. In these Loos converted the central hall into an open staircase and compressed a number of highly individualized rooms into a cube, thus synthesizing Viollet-le-Ducs two models. The greatest differentiation between the rooms occurred on the piano nobiley where reception rooms at different levels and with different ceiling heights were connected to each other by short flights of stairs, their increments forming a kind of irregular spiral ascending through the house [48]. Loos described this spatial organization in somewhat apocalyptic terms: This is architecture s great revolutionary moment—the transformation of the floor plan into volume. Before Immanuel Kant, men could not think in terms of volume; architects were forced to make the bathroom the same height as the great hall. The only way of creating lower ceilings . . . was to divide them in half. But [as] with the invention of three-dimensional chess, future architects will now be able to expand floor plans into s Loos's Raumplan (as he called it) turned the experience of the house into a spatio-temporal labyrinth, making it difficult to form a mental image of the whole. The way the inhabitant moved from one space to another was highly controlled (though sometimes there were alternative routes), but no a priori system of expectation was established, as it would be in a classical plan. In the late Moller and Muller houses an intimate Ladies' Boudoir was added to the set of reception rooms and placed at the highest point of the sequence, so that it acted simultaneously as a command post and an inner sanctum.20 Often, diagonal views were opened up through sequences of rooms [49]. In the spatial ordering of these houses, the walls played an essential role, both phenomenally and structurally. The variability of floor levels demanded that the walls (or at least their geometrical traces—sometimes they are replaced by beams resting on piers) continued vertically THE URN AND THE CHAMBERPOT: ADOLF LOOS 1900-30 8l</span><br data-dcnode-id="4293"><span data-dcnode-id="4292" instrument_node="">

The critical reception of Loos Until the 1970s, architectural historians tended to cast Loos as a protoModernist and to attribute the apparent contradictions in his writings and work to his position as a ‘transitory’ historical ﬁgure. The chief problem for these critics lay in what seemed to be Loos’s ambivalence towards conﬂicting values of tradition and modernity. On the one hand, his harsh rejection of ornament and the applied arts and his belief in the implacable forces of history suggested that he had settled for a new technical culture, devoid of the ‘aura’ of the pre-industrial 84 the urn and the chamberpot: adolf loos 1900‒30</span><br data-dcnode-id="4265"><span data-dcnode-id="4264" instrument_node="">
</span><br data-dcnode-id="4263"><span data-dcnode-id="4262" instrument_node="">
world but still somehow heir to an anonymous craft tradition. On the other hand he appeared as the defender of this tradition against the encroachments of Modernism. However, certain critics of the 1970s argued that beneath the ‘contradictions’ of Loos’s thought lay a more profound consistency and the possibility of an architecture (and by extension a culture) in which tradition would continue to coexist in unresolved tension with a dominant technology.27 It is undeniable that in Loos’s architecture there is a resistance to the Hegelian idea of history as a process of overcoming (Aufhebung) and a tendency to create montages of different ‘languages’. Yet, Loos’s most persistent idea—that the forms of use-objects, including those of non-monumental architecture, should owe nothing to artistic intention—seems to contradict his own practice. The removal of ornament from the façades of his houses was a deliberate ‘artistic’ gesture. Certainly it was taken as such by the next generation of architects, who sought by this means to create precisely the resolution between technology and art that Loos said was impossible. For Loos the unadorned façade concealed individuality, for Le Corbusier it revealed Platonic beauty.</span><br data-dcnode-id="4261"><span data-dcnode-id="4260" instrument_node="">

Around 1910, the visual arts reached a new level of abstraction, going further in the rejection of the concept of art as imitation than ever before. These new developments originated in French Post-impressionist and Fauve painting and quickly spread to other European countries, taking the form of Expressionism in Germany and Futurism in Italy. In France, progressive art movements and conservative art institutions were to a large extent capable of coexistence, but when the new formal experiments spread to Germany and Italy, they became associated with movements that were diametrically opposed to the academic establishment. As a result the architectural avant-gardes were increasingly assimilated into the sphere of the visual arts and detached from a speciﬁcally tectonic tradition. Both German Expressionism and Italian Futurism started as movements in the visual arts and literature, though they soon attracted architects dissatisﬁed both with a moribund Jugendstil and its neoclassical alternative. The Expressionists and Futurists were in close touch with each other: the Futurists’ various manifestos were published in the Expressionist magazine Der Sturm and in 1912 the Futurists exhibited their work in Der Sturm gallery. But although their artistic roots were the same, the two movements differed in at least one crucial respect: while the Expressionists were torn between a Utopian view of modern technology and a Romantic nostalgia for the Volk, the Futurists totally rejected tradition, seeing in technology the basis for a new culture of the masses.</span><br data-dcnode-id="4241"><span data-dcnode-id="4240" instrument_node="">
</span><br data-dcnode-id="4239"><span data-dcnode-id="4238" instrument_node="">
Expressionism The word ‘Expressionism’ was originally coined in France in 1901 to describe the paintings of the circle of artists around Henri Matisse, who modiﬁed their representations of nature according to their own subjective vision. But the word did not enter international critical discourse until 1911, when it was adopted by German critics to denote Modernist art in general and then—almost immediately afterwards— a speciﬁcally German variant.1 Expressionism was centred on three secessionist groups: the artists’ 87</span><br data-dcnode-id="4237"><span data-dcnode-id="4236" instrument_node="">
</span><br data-dcnode-id="4235"><span data-dcnode-id="4234" instrument_node="">
54 Oskar Kokoschka Murderer, Hope of Women, 1909 This was Kokoschka’s poster for his own one-act play of this title, ﬁrst performed in Vienna in 1909 and published by Der Sturm in 1910. Kokoschka, returning to the themes of the Romantic movement, based his play on Heinrich von Kleist’s tragedy Penthesilia.</span><br data-dcnode-id="4233"><span data-dcnode-id="4232" instrument_node="">
</span><br data-dcnode-id="4231"><span data-dcnode-id="4230" instrument_node="">
groups Die Brücke (founded in 1905 in Dresden) and Der Blaue Reiter (founded in 1911 in Munich); and Der Sturm, a magazine and art gallery founded in Berlin in 1910 which published poetry, drama, and ﬁction as well as visual art. Expressionist painting was characterized by a tone of extreme agonism and pathos, quite alien to the French movements from which it sprang [54]. Independently of its derivation from French painting, Expressionism was inﬂuenced by late-nineteenthcentury German aesthetic philosophy. Particularly important were Conrad Fiedler and Adolf Hildebrand’s theory of pure visibility (Sichtbarkeit), and Robert Vischer’s theory of empathy (Einfühlung), both of which challenged the classical concept of mimesis. But it was the more popular writings of the art historian Wilhelm Worringer that exercised the most direct inﬂuence on Expressionist painters and architects. In an essay published in Der Sturm in 1911, Worringer attributed all Modernist painting to a primitive, Teutonic ‘will to expression’ (Ausdruckswollen).2 In his earlier and extremely inﬂuential book Abstraction and Empathy, Worringer had foreshadowed a nascent Expressionist movement, describing the Gothic architecture which would inspire it in the following emotional terms: No organic harmony surrounds a feeling of reverence toward the world, but an ever-growing, self-intensifying, restless striving without deliverance, which 88 expressionism and futurism</span><br data-dcnode-id="4229"><span data-dcnode-id="4228" instrument_node="">
</span><br data-dcnode-id="4227"><span data-dcnode-id="4226" instrument_node="">
sweeps the inharmonious psyche away with it in an extravagant ecstasy . . . The relatively calm proportions between verticals and horizontals which prevail in Romanesque architecture are conspicuously abandoned.</span><br data-dcnode-id="4225"><span data-dcnode-id="4224" instrument_node="">
</span><br data-dcnode-id="4223"><span data-dcnode-id="4222" instrument_node="">
Basing his argument on Riegl’s relativistic doctrine of the Kunstwollen (will to art) Worringer claimed that people failed to appreciate the Gothic because they were trapped within a classical horizon. He believed that by escaping from this, ‘we perceive the great beyond . . . the road that lies behind us suddenly seems small and insigniﬁcant in comparison with the inﬁnitude that is now unfolded to our gaze’.3</span><br data-dcnode-id="4221"><span data-dcnode-id="4220" instrument_node="">

Expressionist architecture Expressionist architecture is notoriously difﬁcult to deﬁne. As Iain Boyd Whyte has observed, the movement has usually been deﬁned in terms of what it is not (rationalism, functionalism, and so on) rather than what it is,4 and there is some truth in the opinion that Expressionism is a permanent and recurrent tendency in modern architecture. Buildings which are commonly classiﬁed as Expressionist include such divergent groups as the early work of Hans Poelzig, the Jugendstil ‘Amsterdam School’, and architects of the 1920s such as Erich Mendelsohn and Hugo Häring; but these are also often more fruitfully discussed in other contexts. Here, we will concentrate on what is generally recognized as the crowning period of Expressionism as a multi-genre and politically involved movement between 1914 and 1921. The focus will be on the group that formed round the architect Bruno Taut (1880–1930) during this period, the most important members of which—beside Taut himself—were Walter Gropius and the critic and art historian Adolf Behne (1885–1948). Although Adolf Behne was the ﬁrst to use the term ‘Expressionist’ in connection with architecture (in an article in Der Sturm of 1915), it is probably an article by Taut of February 1914 in the same journal—entitled ‘A Necessity’—which has a more legitimate claim to being the ﬁrst ‘manifesto’ of Expressionist architecture.5 This article repeats several of Worringer’s ideas. Taut notes that painting is becoming more abstract, synthetic, and structural and sees this as heralding a new unity of the arts. ‘Architecture wants to assist in this aspiration.’ It should develop a new ‘structural intensity’ based on expression, rhythm, and dynamics, as well as on new materials such as glass, steel, and concrete. This intensity will go ‘far beyond the classical ideal of harmony’. He proposes that a stupendous structure be built in which architecture shall once again become the home of the arts as it was in medieval times. One of the most striking features of this article is the view it presents of architecture as following the lead of painting. In spite of its use of the Romantic image of the cathedral as a Gesamtkunstwerk, there is expressionism and futurism 89</span><br data-dcnode-id="4217"><span data-dcnode-id="4216" instrument_node="">
</span><br data-dcnode-id="4215"><span data-dcnode-id="4214" instrument_node="">
no mention of the crafts. And, where Loos had seen architecture as bound either to the antique or to the vernacular, Taut saw it as belonging to the free, Utopian realm that Loos had reserved exclusively for painting (see page 75).</span><br data-dcnode-id="4213"><span data-dcnode-id="4212" instrument_node="">
</span><br data-dcnode-id="4211"><span data-dcnode-id="4210" instrument_node="">
Bruno Taut Bruno Taut was the leading architect associated with the Berlin wing of the Expressionist movement. After studying with Theodor Fischer in Munich from 1904 to 1908, Taut opened a practice in Berlin with Franz Hoffmann. Later his brother Max joined him, but although they shared the same architectural ideals, they never collaborated on projects. Bruno Taut appears to have conceived of architecture as operating between two extreme poles: practical individual dwellings and symbolic public buildings6 binding the individual and the Volk in a transcendental unity. Throughout the early part of his career Taut worked simultaneously at both these poles, emphasizing one or the other according to what he saw to be the objective needs of the moment. Much of the early work of his practice consisted of low-cost housing within a Garden City context. One of the most original features of this work was the use of colour on the external surfaces of 55 Bruno Taut HausdesHimmels, 1919 This drawing appeared in Taut's magazine Fruhlicht. It was one of his many representations of the Stadtkrone, which here appears as a star-shaped light-emitting crystal.</span><br data-dcnode-id="4209"><span data-dcnode-id="4208" instrument_node="">

anticipated the Volkhaus in miniature [57]. Financed by a group of glass manufacturers, it was at once an exhibition of glass products, a ‘house of art’, and a sort of allegory. The visitor was guided through a sequence of sensuously calibrated spaces in which the effects of coloured glass and cascading water predominated, experiencing an ascent from telluric darkness to Apollonian clarity. Both the Glass Pavilion and the two wartime books owed much to the ideas of Taut’s friend, the novelist Paul Scheerbart (1836–1915), described by Herwarth Walden, editor of Der Sturm, as ‘the ﬁrst Expressionist’. In a series of proto-science-ﬁction novels, culminating in Glasarchitektur of 1914, Scheerbart described, sometimes in great technical detail, a universal architecture of glass and steel—transparent, colourful, and mobile—that would usher in a new age of social harmony. Scheerbart’s Utopia was largely derived from writers of the Romantic period, particularly Novalis, who had revived the light and crystal symbolism of Judeo-Christian and Islamic mysticism (Scheerbart himself had studied Suﬁ mysticism).9 Taut’s ideas on urbanism should also be seen in another context— that of the contemporary international movement in town planning, which ﬂourished in both Europe and America. This movement, which has been brieﬂy discussed on page 49, was an outgrowth of both the Garden City and the City Beautiful movements. Taut’s Utopian city with its central symbolic building has a family resemblance to such visionary projects as the World City dedicated to world peace, pro92 expressionism and futurism</span><br data-dcnode-id="4189"><span data-dcnode-id="4188" instrument_node="">

58 Hans Poelzig Grosses Schauspielhaus, 1919, Berlin (demolished c.1980) This building was notable for its colour: burgundy red externally and yellow in the auditorium. Colour was an important aspect of Expressionism’s populist philosophy and Taut was not its only exponent.</span><br data-dcnode-id="4185"><span data-dcnode-id="4184" instrument_node="">

Besides the Grosses Schauspielhaus, several other contemporary projects were inspired by the idea of a public building able to focus the life of the Volk. Three of these may be mentioned because of their use of the new Expressionist manner to communicate directly with the public on an emotional level: a People’s Theatre project (1921) by Wassili Luckhardt (1889–1972) [59], the Sternkirche project (1922) by Otto Bartning (1883–1959) [60], and a Goetheanum at Dornach (1924–8) by Rudolf Steiner (1861–1925) [61]. All these structures were intended as the symbols and instruments of a dawning age of mass culture, serving commercial, festive, recreational or religious purposes.</span><br data-dcnode-id="4161"><span data-dcnode-id="4160" instrument_node="">

Expressionism and politics Taut’s city crown was an attempt to give artistic form to Pyotr Kropotkin’s anarchism.14 Based on the idea of dispersed Garden Cities as the alternatives to the modern metropolis, it represented an antiurban ideology which—for all their ideological differences—was shared by the radical conservatives.15 But, despite his antagonism to many aspects of Marxism, Taut supported workers’ councils and, like many other Expressionists, became involved with the revolution that swept Germany in 1918. With Gropius and Behne, he founded the Arbeitsrat fur Kunst (AFK). This was a trade union of artists modelled on the workers’ soviets that were a feature of the revolution, and more particularly on the Proletarian Council of Intellectual Workers, an outgrowth of Kurt Hiller’s Activist literary movement. Taking his cue from the political ambitions of that movement, Taut envisaged a group of architects within the AFK who would take control of every aspect of the visual environment. In an open letter of November 1918 addressed ‘To the Socialist Government’, he wrote: Art and life must form a unity. Art should no longer be the delight of the few, but the good fortune of the life of the masses. The aim is the fusion of the arts under the wing of a great architecture . . . From now on, the artist alone will be the modeller of the sensibilities of the Volk, responsible for the visible fabric of the new state. He must determine the form-giving process from the statue right down to coin and the postage stamp.16 expressionism and futurism 95</span><br data-dcnode-id="4157"><span data-dcnode-id="4156" instrument_node="">
</span><br data-dcnode-id="4155"><span data-dcnode-id="4154" instrument_node="">
61 Rudolf Steiner Goetheanum, 1924–8, Dornach In this building exposed reinforced concrete is used as both structure and skin. Curved and planar forms merge to form a continuous surface.</span><br data-dcnode-id="4153"><span data-dcnode-id="4152" instrument_node="">
</span><br data-dcnode-id="4151"><span data-dcnode-id="4150" instrument_node="">
When the AFK failed to interest the government in these proposals, Taut conceived the idea of an ‘Exhibition for Unknown Architects’ which would appeal directly to the people, but he resigned the chairmanship before it came to fruition, being succeeded by Walter Gropius. Gropius agreed with Taut’s reformist aims but not with his provocative methods. With his accession to the chairmanship, the AFK abandoned its revolutionary programme, moving ‘to the right politically and to the left artistically’.17 Gropius’s aim was to turn the AFK into a small group of radical architects, painters, and sculptors, concerned only with artistic matters—a ‘conspiratorial brotherhood’ working secretly and avoiding a head-on collision with the art establishment. But even these plans evaporated when, in December 1919, the AFK ran out of money and was absorbed by the Novembergruppe. Gropius had meanwhile become the director of the Bauhaus (Spring 1919) and this now became the centre of his longterm plans to unify the arts under the leadership of architecture within a social-democratic framework. During the following year Taut himself abandoned revolutionary politics and began to concentrate on the design of social housing.</span><br data-dcnode-id="4149"><span data-dcnode-id="4148" instrument_node="">
</span><br data-dcnode-id="4147"><span data-dcnode-id="4146" instrument_node="">
The Exhibition for Unknown Architects The most important event during Gropius’s leadership of the AFK was the Exhibition for Unknown Architects, mounted in April 1919. As already mentioned, the exhibition had been proposed by Taut before his resignation. Entry was not restricted to architects, and entrants were encouraged to submit visionary schemes unrestricted by 96 expressionism and futurism</span><br data-dcnode-id="4145"><span data-dcnode-id="4144" instrument_node="">
</span><br data-dcnode-id="4143"><span data-dcnode-id="4142" instrument_node="">
62 Hermann Finsterlin Traum aus Glas, 1920 Although Finsterlin’s drawings were enthusiastically accepted for the Exhibition for Unknown Architects by Gropius and Behne, Taut was less enthusiastic, criticizing them as formalistic, though he probably disliked the overtly sexual imagery.</span><br data-dcnode-id="4141"><span data-dcnode-id="4140" instrument_node="">
</span><br data-dcnode-id="4139"><span data-dcnode-id="4138" instrument_node="">

second category consisted of pictorial fantasies that made use of architectural subject matter [64]. Whereas the ﬁrst category represented objects naturalistically, the second tended to be anti-naturalistic: even when implying depth the images were two-dimensional in a way that suggested primitive or child art, and were often deliberately fantastic, even absurd. Images similar to those shown at the exhibition appear in the letters of the Gläserne Kette (Glass Chain)—a group of architects and artists close to Taut, who began a correspondence in 1919 (on Taut’s initiative) for the purpose of exchanging architectural ideas and fantasies. Many of the drawings originating in the Glass Chain were subsequently published by Taut in his magazine Frühlicht (Dawn) (1920–2).</span><br data-dcnode-id="4125"><span data-dcnode-id="4124" instrument_node="">

Dada and Expressionism Some of the pictorial fantasies exhibited in the Exhibition for Unknown Architects were by artists associated with the Berlin Dada movement— for example Jeﬁm Golyscheff and Raoul Hausmann. The work of this group stands somewhat apart from that of the main group of Expressionists, not only in terms of artistic technique but also in terms of ideology. The Berlin Dada movement had emerged from Expressionist cabaret, but its rhetoric was often activist in tone and it rejected the Expressionist belief that ethical and cultural change could be effected by a ‘spiritual’ revolution. ‘It is a false notion’, wrote Dadaist Richard Hülsenbeck in 1917, ‘that an improvement in the world can be achieved via the power of intellectuals’.18 Two years later Hausmann, Hülsenbeck, and Golyscheff wrote a satirical manifesto calling for a ‘battle most brutal against all schools of so-called Geistige Arbeiter [spiritual 98 expressionism and futurism</span><br data-dcnode-id="4121"><span data-dcnode-id="4120" instrument_node="">
</span><br data-dcnode-id="4119"><span data-dcnode-id="4118" instrument_node="">
worker] . . . against their concealed middle-classness and against Expressionism and neoclassical culture as represented by Der Sturm.19 The Dadaists belonged to the extreme Left and had supported the Communist Spartacus League which led a workers' uprising in January 1919. In contrast to the earnestness of the AFK, they used the weapons of mockery and ridicule to discredit the Expressionist movement, which in their opinion had betrayed the revolution of 1918 by siding with the Social Democrats rather than the Communists. In the style of their rhetoric and in some of their formal techniques, though not in their ideology, the Dadaists owed a great debt to Marinetti and the Futurists. It is to this movement that we will now turn. Futurism The last quarter of the nineteenth century had seen an unprecedented development of new technologies, including electric light, the telephone, and the automobile. Futurism was the first artistic movement to see these developments as necessarily implying a total revolution in everyday culture. Whereas previous avant-gardes, from Art Nouveau to Expressionism, had sought to rescue tradition by means of the very modernity that threatened to destroy it, Futurism advocated the obliteration of all traces of traditional culture and the creation of a totally new, machine-based culture of the masses. The movement, based in Milan, was 'founded' when the writer Filippo Tommaso Marinetti (1876-1944) published 'The Foundation and Manifesto of Futurism'20 on the front page of the Parisian daily newspaper Le Figaro in 1909. The manifesto was a hymn of praise to the total mechanization of life. Marinetti's ideas were strongly influenced not only by Henri Bergson, with his concept of reality as process, but also by Georges Sorel who, in his book Reflections on Violence (1908), had promoted the idea of a spontaneous activism based on myth, arguing that violence was a necessary and purifying force in the political life of the proletariat. Combining two apparently contradictory ideas, anarchism and nationalism, Marinetti believed that the spontaneous vitality of the masses had to be harnessed by an elite to the interests of the state. As he was to write in the 19208: 'We should aspire to the creation of a type of man who is not human, from whom will have been eliminated moral pain, goodness, and love, the passions that alone can corrode inexhaustible vital energy.'21 Marinetti deliberately aimed at a mass audience. In attacking humanist values he made use of a wide range of rhetorical devices, including burlesque, parody, and hyperbole, as well as of sheer buffoonery. In his use of new grammatical and typographical forms he transformed the medium of the manifesto into a literary genre in its own right—one that was to exert a strong influence on Dada and the Russian avant-garde.22 EXPRESSIONISM AND FUTURISM</span><br data-dcnode-id="4117"><span data-dcnode-id="4116" instrument_node="">
</span><br data-dcnode-id="4115"><span data-dcnode-id="4114" instrument_node="">
99</span><br data-dcnode-id="4113"><span data-dcnode-id="4112" instrument_node="">
</span><br data-dcnode-id="4111"><span data-dcnode-id="4110" instrument_node="">
Between 1909 and 1914 Marinetti and a small group of writers, painters, and musicians published about 50 manifestos on every conceivable aspect of cultural life, deliberately mixing high and low art forms. These manifestos contained ideas that have remained important sources for all subsequent avant-gardes and neo-avant-gardes. The chief theoretical statement of the movement was ‘The Technical Manifesto of Futurist Painting’,23 published in April 1910 and signed by the painters Umberto Boccioni (1882–1916), Carlo Carrà, Luigi Russolo, Giacomo Balla, and Gino Severini. The manifesto sought to adapt the mimetic practices of art to epistemological changes implied by nineteenth-century mathematics and physics, especially in the representation of change and movement. The theory that it presented was a kind of subjective realism, strongly inﬂuenced, as was Expressionism, by late-nineteenth-century German aesthetic philosophy, much of which had been translated into Italian,24 as well as by non-Euclidean geometry and Einsteinian physics. The painting, it was argued, should no longer be conceived as the imitation of an external scene but as the registration of the mental states caused by the scene. Both painter and object were seen to occupy a uniﬁed spatio-temporal ﬁeld: ‘The gesture that we would reproduce will no longer be a ﬁxed moment in a universal dynamism, it will be the dynamism itself.’25 Later, Boccioni gave this idea more precision: This synthesis—given the tendency to render the concrete in terms of the abstract—can be expressed only . . . by precisely dimensioned geometrical forms, instead of by traditional methods (now devalued by the mechanical media) . . . If we thus make use of mathematical objects, it is the relation between them that will provide the rhythm and the emotion.26</span><br data-dcnode-id="4109"><span data-dcnode-id="4108" instrument_node="">
</span><br data-dcnode-id="4107"><span data-dcnode-id="4106" instrument_node="">
The Futurists became aware of Cubism in 1911 and quickly assimilated its techniques. Boccioni’s susceptibility to Cubism and collage is shown in his description of his own subsequent practice: ‘The dislocation and dismemberment of objects . . . freed from accepted logic and independent from each other.’27 Yet the contradiction between Cubism’s demand for the autonomy of art and the Futurists’ desire to fuse art and life was never fully resolved. This was to remain one of the main doctrinal conﬂicts in the history of Modernism, as we shall see when we consider the development of Modernist architecture after the First World War.</span><br data-dcnode-id="4105"><span data-dcnode-id="4104" instrument_node="">
</span><br data-dcnode-id="4103"><span data-dcnode-id="4102" instrument_node="">
Futurism and architecture Two manifestos of Futurist architecture were written early in 1914. The ﬁrst was by 20-year-old Enrico Prampolini, who belonged to the Roman branch of the movement, and the second was by Boccioni (although it was not published until 1960). Boccioni’s manifesto bears a 100 expressionism and futurism</span><br data-dcnode-id="4101"><span data-dcnode-id="4100" instrument_node="">
</span><br data-dcnode-id="4099"><span data-dcnode-id="4098" instrument_node="">
65 Umberto Boccioni Dynamism of a Speeding Horse + Houses, 1914–15 In this sculpture the artist conformed to the programme of the ‘Technical Manifesto of Futurist Sculpture’, published in 1910. The ﬁgure is an assemblage of material forms which are related metonymically to the object they represent. It corresponds to Marinetti’s description of Futurist poetry as being a ‘spontaneous current of analogies’, replacing traditional mimesis.</span><br data-dcnode-id="4097"><span data-dcnode-id="4096" instrument_node="">
</span><br data-dcnode-id="4095"><span data-dcnode-id="4094" instrument_node="">
deﬁnite relationship to his ‘Technical Manifesto of Futurist Sculpture’ (1910).28 In the latter text, Boccioni saw the sculptural ﬁgure as no longer isolated from its surrounding space: ‘We must split open the ﬁgure and place the environment inside it’ [65]. In his ‘Technical Manifesto of Futurist Architecture’,29 he arrives at the same idea. The modern city can no longer be thought of as a series of static panoramas as in the past, but as an enveloping environment in a constant state of ﬂux. He sees the outside of the individual building, analogously, as broken up in response to the pressures of the interior. In both sculpture and architecture, therefore, Boccioni proposes to absorb the art work back into the world, so that it will become an intensiﬁcation of the environment, not something idealistically set against it.</span><br data-dcnode-id="4093"><span data-dcnode-id="4092" instrument_node="">

drawings representing his idea of the architecture of the future. The relationship between these drawings and the Futurist movement has long been the subject of controversy. The ideas expressed in Sant'Elia's 'Manifesto of Futurist Architecture'30 and in the slightly shorter version of it published in the exhibition catalogue (the 'Messaggio'31), correspond closely with the ideology of the movement, but the drawings themselves seem to contradict it in important ways. It is likely that Sant'Elia had been in contact with the Futurists for some time, and that behind the manifesto and the 'Messaggio' there existed an urtext written in part by Marinetti or Boccioni or both, so as to provide the appropriate stylistic (if not intellectual) credentials. This may explain the reason for the discrepancies between the drawings and the text, but the discrepancies themselves need further elucidation.32 Except for three very small structures, Sant'Elia's legacy consists exclusively of architectural drawings. These are either for actual but unbuilt projects, mostly fa9ade studies, or perspectives of an imaginary architecture. The fafades are in a highly ornamented Liberty-Secessionist style and Sant'Elia continued to produce such work until his death. The perspectives are of three kinds. The first are totally unornamented, astylar compositions with generic titles such as 'Modern building', 'Monument', and 'Industrial building', dated 1913 [66]. Almost certainly these drawings were influenced by the photographs of North American grain silos illustrated by Gropius in the Jahrbuch des Deutschen Werkbundes of 1913, and quite possibly by the stage designs of Gordon Craig and Adolfe Appia.33 The second kind is a set of drawings in which similarly abstract forms are adapted to one particular industrial building type: the hydroelectric power station—a type of building almost synonymous with the rapid industrialization of the Po Valley in the first years of the twentieth century [53 (see page 86) and 67]. Finally there is a set of drawings entitled La Citta Nuova (The New City). These are very detailed and their technique is harsher and less atmospheric [68]. Stepped-back floors of multi-storey apartment blocks (resembling the powerful sloping walls of the hydroelectric dams) are contrasted with vertical elevator towers, to which they are connected by bridges. The ground is completely eroded with a multilevel network of transport viaducts. The drawings depict a city from which all traces of nature have been removed, a city dominated by a plethora of horizontal and vertical distribution systems, against which the fa$ades of the apartment units seem to play a passive and secondary role. Sant'Elia took elements of his city from various sources, including popular illustrations of the New York City of the future, Henri Sauvage's Maison a Gradins in Paris (1912), and above all Otto Wagner's drawings of his new transport infrastructure for Vienna EXPRESSIONISM AND FUTURISM 103</span><br data-dcnode-id="4073"><span data-dcnode-id="4072" instrument_node="">
</span><br data-dcnode-id="4071"><span data-dcnode-id="4070" instrument_node="">
68 Antonio Sant’Elia La Città Nuova, 1914 In the set to which this drawing belongs, the elements of the two previous sets are transformed into a mechanized urban landscape. The multi-level transport viaducts and their attendant pylons are derived from Otto Wagner’s Vienna Stadtbahn. Although human beings are absent, the pylons stand around like calciﬁed giants.</span><br data-dcnode-id="4069"><span data-dcnode-id="4068" instrument_node="">
</span><br data-dcnode-id="4067"><span data-dcnode-id="4066" instrument_node="">
[69]. Out of such ‘found’ elements Sant’Elia created a synthesis which was, from a pictorial point of view, utterly convincing. But, impressive as Sant’Elia’s drawings are in their dramatic representation of the city of the future, their forms and technique contradict many of the ideas put forward in the Futurist manifestos. While the manifestos stress lightness, permeability, and practicality, the drawings express mass and monumentality; while the manifestos place the spectator within the work, the drawings imply that the viewer is an external observer by providing a panoramic and perspectival view of the world; while the manifestos condemn static, pyramidal forms, the drawings abound in them. In fact, Sant’Elia’s drawings are also derived from the work of students of the Austrian Academy of Fine Arts (the Wagnerschule) at 104 expressionism and futurism</span><br data-dcnode-id="4065"><span data-dcnode-id="4064" instrument_node="">

69 Otto Wagner Project for the Ferdinandsbrucke, 1905, Vienna</span><br data-dcnode-id="4061"><span data-dcnode-id="4060" instrument_node="">

the turn of the twentieth century [70]. The truncated, abstract forms of these designs, set at an oblique angle and seen from a low level, reappear in most of Sant'Elia's drawings. Sant'Elia's technique of representation had been developed during his studies at the Brera Academy under Giuseppe Mentessi, by whom he was introduced to late Baroque theatre design with its system of oblique perspective (scena per ango/o).34 Indeed, Sant'Elias drawings are less those of an architect than of a vedutista in the tradition of Piranesi and the Bibienas. They offer an objectified spectacle far removed from Boccioni's conception of the spiritualized and transparent object, and present a striking contrast with Futurist images such as Boccioni's 'XRay'-like axonometric drawing Table + bottle + houses [71]. Sant'Elia's drawings are not the only contemporary avant-garde works that betray Jugendstil and Secessionist influences. Most of the architecture usually characterized as Expressionist is close to the same source. In fact, in Expressionism and Futurism alike, there exists an unresolved tension between emotional and analytical approaches— between an attitude towards the modern in which feelings are projected onto technology (just as the Romantics had projected theirs onto nature), and an attitude that seeks to engage with technology on its own terms—from within, as it were.35 For all his use of scientific and EXPRESSIONISM AND FUTURISM 105</span><br data-dcnode-id="4057"><span data-dcnode-id="4056" instrument_node="">

</span><br data-dcnode-id="4051"><span data-dcnode-id="4050" instrument_node="">
71 Umberto Boccioni Table + Bottle + Houses, 1912 In this axonometric drawing, the solid objects have become transparent as in an X-ray. For Boccioni, axonometric projection was associated with the fourth dimension and space–time— as it would be for van Doesburg.</span><br data-dcnode-id="4049"><span data-dcnode-id="4048" instrument_node="">

106 expressionism and futurism</span><br data-dcnode-id="4045"><span data-dcnode-id="4044" instrument_node="">
</span><br data-dcnode-id="4043"><span data-dcnode-id="4042" instrument_node="">
mathematical analogies, Boccioni himself resisted in many ways the onset of the age of mechanical reproduction which he himself had announced, stressing the act by which the artist’s hand transforms the material and rejecting—for example—photography, with its impersonal and mechanical procedures. In the end, therefore, Sant’Elia’s ‘excitable’ reaction to technology may not be so far removed from that of Boccioni, whose work seems so much more ‘modern’. The fact remains, however, that Sant’Elia’s vision of the future was that of a late Romantic, and that his inﬂuence on the next generation of architects was limited. By contrast, the inﬂuence of Futurism in the other genres—sculpture, graphics, theatre, music, and photography—was very considerable. In trying to place Expressionism and Futurism in a historical perspective, a salient fact emerges: both movements, whatever their other differences, rejected the Enlightenment tradition of reason and stressed the importance of myth and instinct in the social life of nations. They denounced a rationalistic civilization which they believed had sown discord in a previously uniﬁed and organic society. They espoused a set of ideas—anti-materialist, anti-liberal-democratic and anti-Marxist—which became increasingly inﬂuential in the countries of western Europe in the years leading up to the First World War and which, in their extreme form, found political expression in the Fascism and National Socialism of the inter-war years.</span><br data-dcnode-id="4041"><span data-dcnode-id="4040" instrument_node="">

The Avant-gardes in Holland and Russia</span><br data-dcnode-id="4033"><span data-dcnode-id="4032" instrument_node="">
</span><br data-dcnode-id="4031"><span data-dcnode-id="4030" instrument_node="">

Detail of 77 Theo van Doesburg Counter-construction (Construction de l’EspaceTemps II), 1924</span><br data-dcnode-id="4025"><span data-dcnode-id="4024" instrument_node="">
</span><br data-dcnode-id="4023"><span data-dcnode-id="4022" instrument_node="">
As in the case of Expressionism and Futurism, the architectural avantgardes in Holland and Russia were at ﬁrst dominated by painting and sculpture. In both countries formal experiments that were possible in theoretical or small-scale projects met with considerable resistance when applied to the constructional and programmatic needs of buildings. After the First World War, as soon as the economic and political situation allowed building to resume, architectural projects in both countries began to take on the characteristics of a more sober, international architecture and to lose national traits which had originated largely from interpretations of Cubism, Expressionism, and Futurism. This chapter will describe these national movements—De Stijl in Holland; Suprematism, Rationalism, and Constructivism in Russia— and their transition to a Europe-wide ‘Modern Movement’ (also known as ‘Neue Sachlichkeit’, ‘Functionalism’, ‘Rationalism’, or ‘Neues Bauen’). In both the Dutch and the Russian avant-gardes, the logic of the machine became the model for art and architecture; the mind was considered to be able to create form independently of traditional craft, implying a new alliance between painting, architecture, and mathematical reason. Art and architecture were seen as impersonal and objective and not based on individual ‘taste’.</span><br data-dcnode-id="4021"><span data-dcnode-id="4020" instrument_node="">
</span><br data-dcnode-id="4019"><span data-dcnode-id="4018" instrument_node="">
The avant-garde in Holland Two opposed movements in architecture and the decorative arts ﬂourished in Holland during and immediately after the First World War—the Amsterdam School and De Stijl. Both these movements were related to Art Nouveau and the Arts and Crafts movement as well as to German Expressionism; both believed in a uniﬁed style reﬂecting the spirit of the age; both inherited the Morrisian idea that society could be transformed by art; and both rejected the eclectic use of past styles, striving for a new, uncoded architecture. But each inherited a different strand of the earlier movements—the vitalistic, individualistic strand in the case of the Amsterdam School and the rationalist, 109</span><br data-dcnode-id="4017"><span data-dcnode-id="4016" instrument_node="">
</span><br data-dcnode-id="4015"><span data-dcnode-id="4014" instrument_node="">
impersonal strand in the case of De Stijl. Each movement condemned the other, ignoring their shared aims and origins.1 The work of the Amsterdam School—whose chief exponent was Michel de Klerk (1884–1923)—was characterized by the use of traditional materials, in particular brick, and the free, fantastical but craftsman-like working of these materials. The forms of traditional architecture were not so much abandoned as transformed and made strange. Much of the most important work of the Amsterdam School was built between 1914 and 1923 and is to be found in the many public housing projects that were part of the vast urban renewal programme being undertaken in Amsterdam at the time under the direction of Berlage.</span><br data-dcnode-id="4013"><span data-dcnode-id="4012" instrument_node="">
</span><br data-dcnode-id="4011"><span data-dcnode-id="4010" instrument_node="">
De Stijl The De Stijl movement, though its origins lay, like those of the Amsterdam School, in the decorative arts, developed an ornamentation that reﬂected the inﬂuence of Cubism and rejected craftsmanship in favour of a geometrical anti-naturalism. In 1917 the painter Theo van Doesburg (1883–1931) published the ﬁrst issue of De Stijl, a magazine promoting modern art. The term ‘De Stijl’ is normally applied to both the magazine and the movement to which it gave its name. The original group included the painters Piet Mondrian (1872–1944), van Doesburg, Vilmos Huszar (1884–1960), and Bart van der Leck (1876–1958), the sculptor Georges Vantongerloo (1886–1965), and the architects Jan Wils (1891–1927), Robert van’t Hoff (1887–1979), Gerrit Rietveld (1888–1964), and J. J. P. Oud (1890–1963). The group’s identity, however, had less to do with its speciﬁc membership, which was highly volatile, than with its doctrine as deﬁned in the ﬁrst De Stijl Manifesto of 1918 and in later issues of the magazine. De Stijl was edited and dominated by van Doesburg and became an important organ of the international avant-garde until it ceased publication in 1932.</span><br data-dcnode-id="4009"><span data-dcnode-id="4008" instrument_node="">
</span><br data-dcnode-id="4007"><span data-dcnode-id="4006" instrument_node="">
Theory The theoretical apparatus of De Stijl was a variant of existing (mostly Symbolist and Futurist-derived) doctrine, and the movement saw itself as a crusade in the common cause of Modernism. It maintained close ties with avant-garde movements in the different arts abroad, including Dada (van Doesburg himself, under the pseudonym Aldo Camini, published Dada poetry in De Stijl). The three main postulates of the movement can be roughly summarized as follows: each art form must realize its own nature based on its materials and codes—only then can the generative principles governing all the visual arts (indeed, all art) be revealed; as the spiritual awareness of society increases, so will art fulﬁl its historical (Hegelian) 110 the avant-gardes in holland and russia</span><br data-dcnode-id="4005"><span data-dcnode-id="4004" instrument_node="">
</span><br data-dcnode-id="4003"><span data-dcnode-id="4002" instrument_node="">
destiny and become reabsorbed into daily life; art is not opposed to science and technology—both art and science are concerned with the discovery and demonstration of the underlying laws of nature and not with nature’s superﬁcial and transient appearance (the theory, however, did not take into account the possibility art could still be a form of imitation). De Stijl belonged to the millennialist tradition of Expressionism and Futurism. Although it lacked any obvious political dimension, it was nonetheless Utopian; it imagined a future in which social divisions would be dissolved and power dispersed. It combined a commitment to modernity with an idealism that associated scientiﬁc and technical change with spiritual as well as material progress. The metaphysics of the movement were to a large extent taken from the Theosophist and Neoplatonist M. J. H. Schoenmaeker, whose book The Principles of Plastic Mathematics (1916) claimed that plastic mathematics was a ‘positive mysticism’ in which ‘we translate reality into constructions controlled by our reason, later to recover these constructions in nature, thus penetrating matter with plastic vision’. Schoenmaeker believed that the new plastic expression (‘Neoplasticism’), born of light and sound, would create a heaven on earth.2 The two main theorists of the movement were Mondrian and van Doesburg, but they by no means agreed on all points of doctrine. Mondrian’s concept of Neoplasticism, based partly on Schoenmaeker and partly on Kandinsky’s inﬂuential book Uber das Geistige in der Kunst (Concerning the Spiritual in Art) of 1911, was restricted to painting, whereas van Doesburg attempted to apply it to architecture as well. Although both Huszar and Van der Leck made important contributions to the early development of Neoplasticism, it was Mondrian who worked out its logical implications. The system that he eventually arrived at was based on a radical process of reduction in which the complex, accidental appearance of nature was reﬁned to the variations of an irregular orthogonal grid, partly ﬁlled in with rectangles of primary colour [72]. According to Yve-Alain Bois, Mondrian organizes the picture surface in such a way that the traditional hierarchy between ﬁgural objects and an illusionistic ground is abolished. In Mondrian, ‘no element is more important than any other, and none must escape integration’.3 These structural principles of non-redundancy and non-hierarchy are similar to those underlying Schoenberg’s atonal and serial music.4 In traditional painting it is the ﬁgural object that conveys the symbolic or lyrical content (as does melody in music);5 in Mondrian’s paintings the meaning is transposed from the represented object to the abstract organization of the two-dimensional surface—an effect analogous to Boccioni’s idea that it was no longer objects (reduced to lines, planes, and so on) that provided rhythm and emotion, but the relations between them (see page 100). the avant-gardes in holland and russia 111</span><br data-dcnode-id="4001"><span data-dcnode-id="4000" instrument_node="">

The relation between architecture and painting In the early phase of the De Stijl movement, there was an emphasis on the collaboration between architecture and painting. The following remarks by Van der Leck are typical of this position: Modern painting has now arrived at the point at which it may enter into collaboration with architecture. It has arrived at this point because its means of expression have been puriﬁed. The description of time and space by means of perspective has been abandoned; it is the ﬂat surface itself that transmits spatial continuity . . . Painting today is architectural because in itself and by its own means it serves the same concept as architecture.6</span><br data-dcnode-id="3993"><span data-dcnode-id="3992" instrument_node="">
</span><br data-dcnode-id="3991"><span data-dcnode-id="3990" instrument_node="">
This statement is in many ways unclear. For example, if it is true that painting and architecture are becoming increasingly indistinguishable, what sense does it make to say that they should enter into a collaboration? Collaboration can only take place between things that are different—as in the Wagnerian concept of the Gesamtkunstwerk. During the 1920s, a split between painters and architects developed, epitomized by a correspondence that took place between J. J. P. Oud and Mondrian. In this correspondence, Mondrian claimed that 112 the avant-gardes in holland and russia</span><br data-dcnode-id="3989"><span data-dcnode-id="3988" instrument_node="">

73 Vilmos Huszar Spatial Colour Composition for a Stairwell, 1918 While in traditional architecture decoration was considered supplementary to the constructed surfaces of a building, in De Stijl the rectangles of primary colour applied to the walls were thought of as an integral part of the architecture itself, modifying the space deﬁned by the walls.</span><br data-dcnode-id="3985"><span data-dcnode-id="3984" instrument_node="">

painting was able to anticipate the desired merging of art and life precisely because it remained on the level of representation, and was not, like architecture, compromised by its immersion in reality. Until architecture freed itself from this condition, it could not participate in the movement towards the uniﬁcation of art and life. For Oud, on the other hand, if art was eventually to merge with life, it could only be at the level of existing reality. Far from being antagonistic to the puriﬁcation of artistic form, the principles of utility and function were inseparable from it (in this Oud’s position was the same as that of Le Corbusier). Mondrian’s extreme idealism and Oud’s aesthetic materialism were incapable of ﬁnding common ground.7 Van Doesburg’s position differed from that of both Oud and Mondrian. He accepted Mondrian’s idealist resistance to the pragmatics of architecture, but he believed that architecture, by the very fact that it existed in real as opposed to virtual three-dimensional space, would play a privileged role in achieving the union of life and art. The ideal (which he shared with the Futurists) of an observer no longer separated from that which was observed, was already immanent in architecture and needed only to be brought out.</span><br data-dcnode-id="3981"><span data-dcnode-id="3980" instrument_node="">

the avant-gardes in holland and russia 113</span><br data-dcnode-id="3973"><span data-dcnode-id="3972" instrument_node="">
</span><br data-dcnode-id="3971"><span data-dcnode-id="3970" instrument_node="">
the aims of the De Stijl artists was to occupy the void created by the demise of this artist–craftsman, but to occupy it as painters. In 1918, van Doesburg decorated the interiors of a house by J. J. P. Oud (The De Vonk House, 1917–18) with coloured ﬂoor tiles and stained-glass windows which were simply added to the architectural framework. But in the same year, both Van der Leck and Huszar took a more holistic approach, either by designing and colouring all the tectonic elements of a room—doors, cupboards, furniture—so as to create a unity of rhyming rectangular forms, or by applying colour patches to walls and ceilings, often ‘against the grain’ of the architectural structure [73]. The effect of these interventions was to merge structure, ornament, and furniture in a new unity. The difference between ground (architecture) and ﬁgure (ornament, furniture, etc.) was erased, reversing the trend initiated by the interiors exhibited in Germany around 1910 by, for example, Bruno Paul, and reverting to the Jugendstil practice of treating the interior as an indivisible, abstract unity—as in Van de Velde and Wright. 74 Jan Wils De Dubbele Sleutel, 1918 Here the building mass is broken up into cubic volumes roughly in the form of a pyramid. The horizontal and vertical planes are accentuated by cornices, string courses, chimneys, in the manner of Frank Lloyd Wright.</span><br data-dcnode-id="3969"><span data-dcnode-id="3968" instrument_node="">

Van Doesburg and architecture In external form, the inﬂuence of De Stijl as well as that of Wright can already be seen in several architectural projects in Holland in the period immediately after the First World War. In these the geometrical, horizontal, and vertical elements that emphasized the main forms still looked like ornamental additions to the structure—for example in the work of Jan Wils and Robert van’t Hoff [74]. Van Doesburg also experimented in external architectural forms, but his</span><br data-dcnode-id="3965"><span data-dcnode-id="3964" instrument_node="">

the early ﬁgural works which show the transformation of a tree into a binary system of vertical and horizontal dashes. Because of its centrifugal, stem-like structure the house has no front or back and seems to defy gravity. It is a self-referential and self-generated object with a form that is not ‘composed’ from the outside but results from an internal principle of growth. The Maison d’une Artiste can be seen as an allegory of nature, in which an initial, unitary principle exfoliates into an inﬁnity of individuated forms. Primary colours are added to the planes to differentiate between them. In van Doesburg’s Counter-constructions of a year later [77], the whole composition is reduced to</span><br data-dcnode-id="3933"><span data-dcnode-id="3932" instrument_node="">

In these drawings, axonometry is more than a useful graphic tool. It is the only method of representation that does not privilege one part of the building over another (for example, the façade over the interior). In ‘real life’, the only way to recall such a house in its totality would be to trace and retrace its interior spaces in time, as in the case of Loos’s Raumplan houses. Axonometry converts this temporal, semi-conscious process into an experience that is instantaneous and conscious. For van Doesburg these drawings seem to have symbolized his technomystical vision of an architecture identical with the ﬂow of lived experience. They were idealized representations of the ineffable. Axonometry was also fundamental to van Doesburg’s attempts to represent four-dimensional space.10 The only building in which van Doesburg’s formal principles were applied was the Schroeder House in Utrecht (1924) by Gerrit Rietveld. Externally the house appears as a montage of elementary forms, but its fragmentation turns out to be a purely surface effect. It is in the interior that the house comes to life. Rietveld has reinterpreted van Doesburg’s Counter-constructions in terms of the earlier experiments of Van der Leck and Huszar, and the furniture and equipment of the house is transformed into a vibrant composition of rectilinear forms and primary colours.</span><br data-dcnode-id="3921"><span data-dcnode-id="3920" instrument_node="">

Architecture beyond De Stijl But apart from Rietveld, modern architecture in Holland developed in a different direction from De Stijl, sharing only a certain number of principles such as formal abstraction, immateriality, and the avoidance of symmetries. The emerging architecture rejected De Stijl’s rigorous reduction and fragmentation and returned to closed forms and frontality. The work of J. J. P. Oud in the 1920s is hardly touched by De Stijl [78], while that of Johannes Brinkman (1902–49) and Leendert Cornelis van der Vlugt (1894–1936) shows De Stijl’s inﬂuence in a rather ad hoc use of interlocking volumes, cantilevered ﬂoors, and ﬂoating vertical planes. By the early 1930s, in such works as the Van Nelle Factory (1927–9) and the Sonneveld House (1928) [79], both in Rotterdam, De Stijl forms have been totally assimilated into a 118 the avant-gardes in holland and russia</span><br data-dcnode-id="3917"><span data-dcnode-id="3916" instrument_node="">

Constructivist architecture of smooth, machine-like surfaces and extensive glazing. Van Doesburg himself, in the studio house he built in Paris in 1931, abandoned his earlier Neoplasticism and built a relatively simple, functional box. The tension that developed between De Stijl and the new architecture of the 19205 is revealed by J. J. P. Oud in the book Nieuwe Bouwkunst in Holland en Europe published in 1935: Remarkable as it may sound the Nieuwe Zakelijheid (New Objectivity) developed in large part from the initial development of the liberal arts—above all painting. The origins of its forms lay much more in the aesthetic domain than in the domain of the objective... Horizontal and vertical intersections of parts of buildings, suspended floors, corner windows, etc ... were for a time very much in vogue. Their derivation from painting and sculpture can be easily demonstrated and they have been continually used with or without any practical aim.11</span><br data-dcnode-id="3901"><span data-dcnode-id="3900" instrument_node="">

Oud s play on the word 'objective' in opposition to 'aesthetic' and his disapproval of the 'unpractical' influence of painting and sculpture, clearly indicate the emergence of the new 'functional' parameters. Despite this, the idealism and formalism of van Doesburg's work made it a catalyst for Modernist architects seeking a new formal language, just as Frank Lloyd Wright's work had been a few years earlier. As a result of van Doesburg's exhibitions in Weimar and Paris in 1922 and 1923 respectively, and his presence 'off-stage' at the Bauhaus in 1921, Neoplasticism exerted a considerable influence on architects like Le Corbusier, Walter Gropius, and Mies van der Rohe at critical moments in their careers.</span><br data-dcnode-id="3897"><span data-dcnode-id="3896" instrument_node="">

The Russian avant-garde The reform movement in the arts followed much the same trajectory in Russia as in Western Europe. A revival of the vernacular arts and crafts inspired, as elsewhere, by William Morris, was initiated at two centres: the estate of the railway magnate Sawa Mamontov near Moscow (in the 18705) and the estate of Princess Tenisheva at Smolensk (in 1890). Both were closely associated with the Pan-Slav movement. But in 1906 this movement itself underwent a transformation with the founding of the Organization for Proletarian Culture ('Proletkult'), by Alexandr Malinovsky, self-styled 'Bogdanov' (God-gifted). Bogdanov had abandoned the Social Democrats for the Bolsheviks in 1903, and his new organization initiated a shift from the concept of the folk to that of the proletariat, and from handicraft to science and technology. According to Bogdanov the progress of the proletariat towards socialism would have to take place simultaneously on the political, economic, and cultural planes. These ideas were in fact closer to those 120 THE AVANT-GARDES IN HOLLAND AND RUSSIA</span><br data-dcnode-id="3893"><span data-dcnode-id="3892" instrument_node="">
</span><br data-dcnode-id="3891"><span data-dcnode-id="3890" instrument_node="">
of Saint-Simon than those of Marx, particularly in their call for a new ‘religion’ of positivism. A common pattern in Russia and the West can be found not only in the change of emphasis from handicraft to machine-work, but also in the re-emergence of the ﬁne arts as the most important site of experiment, linked to the concept of Gestalt. The only substantial difference was that in Russia the industrial art and ﬁne art movements occurred simultaneously and became locked in a destructive ideological battle, whereas in the West, though they overlapped, they occurred sequentially. The diversity of artistic movements that characterized the pre-revolutionary avant-gardes in Russia, especially those deriving from Cubism and Futurism, persisted in the post-revolutionary period, presenting the historian with a bewildering array of acronyms. Support for the revolution came from all artistic factions, including the most conservative, each faction identifying with its aims. For those avant-garde artists and architects who joined the revolution, the Utopian fantasies of the period before the First World War seemed about to become a historical reality.12 The revolution released an explosion of creative energy, in which the paths opened up by the pre-war European avantgardes were redirected towards the achievement of socialism.</span><br data-dcnode-id="3889"><span data-dcnode-id="3888" instrument_node="">
</span><br data-dcnode-id="3887"><span data-dcnode-id="3886" instrument_node="">
Art institutions The Ministry of Enlightenment that was set up after the revolution under Commissar Lunacharski, who had been associated with Proletkult, was more tolerant of Modernist art than was the party establishment as a whole. Under the new ministry, there was a general reform of the art institutions. The Free Workshops, founded in Moscow in 1918 and renamed the Higher State Artistic and Technical Workshops (Vkhutemas) in 1920, were the successors of the two main pre-revolutionary Moscow art schools—the Stroganov School of Industrial Design and the Moscow School of Painting, Sculpture, and Architecture. The fusion of the old school of art with a craft school which, since 1914, had been training students for industry, created a fundamental institutional break with the past—similar to that which occurred at the same time in the Weimar Bauhaus—a change epitomized by the introductory design course or ‘Basic Section’, which was shared by all departments. The progressives in the school were divided into two ideological camps: the Rationalists, led by the architect Nikolai Ladovsky (1881–1941) and his United Workshops of the Left (Obmas), and the Constructivists, whose members included the architect Alexander Vesnin (1883–1959) and the artists Varvara Stepanova (1894–1958), Alexander Rodchenko (1891–1956), and Alexei Gan (1889–1940). Another important institution was the Moscow Institute the avant-gardes in holland and russia 121</span><br data-dcnode-id="3885"><span data-dcnode-id="3884" instrument_node="">
</span><br data-dcnode-id="3883"><span data-dcnode-id="3882" instrument_node="">
of Artistic Culture (Inkhuk). It was within Inkhuk that the leftist First Working Group of Constructivists was formed in 1921, and that a signiﬁcant debate took place between this group and the Rationalists over the question of ‘construction’ versus ‘composition’.13</span><br data-dcnode-id="3881"><span data-dcnode-id="3880" instrument_node="">
</span><br data-dcnode-id="3879"><span data-dcnode-id="3878" instrument_node="">
Rationalism versus Constructivism Though in their forms the Rationalists and Constructivists were often similar, they were ideologically fundamentally opposed to each other. According to the Rationalists, the ﬁrst task in the renewal of art was its puriﬁcation and the discovery of its psychological, formal laws; according to the Constructivists, art, being an intrinsically social phenomenon, could not be isolated as a purely formal practice. The Rationalists, starting from the architectural fantasies of Expressionism, elaborated a system of formal analysis based on Gestaltpsychologie [80]. Ladovsky’s course at the Vkhutemas was the core of the Basic Section until the school was reshaped on more conservative lines in 1930. In 1923 Ladovsky founded the Association of New Architects (ASNOVA) to counteract the growing inﬂuence of the utilitarian Constructivists within Inkhuk. Another essentially formalist group must be mentioned here: the Suprematists. Founded by the painter Kasimir Malevich (1878–1935) in 1913, this movement had much in common with Dutch Neoplasticism, including its geometrical reductivism and its involvement with Theosophy—in the case of Malevich, with the writings of P. D. Ouspensky.14 Unlike Mondrian’s paintings, the Suprematist work of Malevich still relied on a ﬁgure-ground relationship between represented objects and illusionistic space—even if this space was now featureless and Newtonian. Also unlike Mondrian, but like van Doesburg, Malevich extended his system of ideas to architecture. In a series of prismatic, quasi-architectural sculptures (which he called ‘Arkhitektons’) he sought to demonstrate the timeless laws of architecture underlying the ever80 Nikolai Ladovsky Design for a Commune, 1920 Such early products of Ladovsky’s Rationalism continued the tradition of Dada and Expressionism, which Ladovsky was to supply with a pseudo-scientiﬁc system of rules.</span><br data-dcnode-id="3877"><span data-dcnode-id="3876" instrument_node="">

changing demands of function [81]. The Darmstadt-trained architect El Lissitzky (1890–1941) was associated with Malevich at the art school in Vitebsk in the early 1920s. The paintings which he grouped under the name ‘Proun’ (‘Project for the afﬁrmation of the new’) explored the common ground between architecture, painting, and sculpture. Many of them consisted of Arkhitekton-like objects ﬂoating in a gravity-free space, represented in spatially ambiguous axonometric projections. Like van Doesburg, Lissitzky was interested in the possibility of representing four-dimensional space, though he later repudiated this idea. In contrast to the Rationalists, the Constructivist group held that what constituted the essence of modern art was not the principle of form, but that of construction. The First Working Group of Constructivists (founded by Rodchenko, Stepanova, and Gan) represented the group’s most radical wing. The group extended the Futurist concept of the work of art as a ‘construction’—a real object among real objects—rather than a ‘composition’ of represented objects, maintaining that this necessarily entailed the total elimination of ﬁne art in the avant-gardes in holland and russia 123</span><br data-dcnode-id="3865"><span data-dcnode-id="3864" instrument_node="">

mixed state and privately financed corporate buildings. After 1922 numerous competitions were launched. Though few resulted in built projects, it was from these competitions that the first permanent, largescale Constructivist architecture emerged. Its chief characteristics were the elimination of all ornament and the external expression of the structural frame, showing the influence of American factory design, and of Walter Gropius's and Ludwig Hilberseimer's separate entries for the Chicago Tribune competition of 1922. Although the Proletkult movement had been suspended in 1923, some of these ponderous monoliths were enlivened with written signs and mechanical or electrical iconography reminiscent of the agitprop kiosks of the early years of the revolution and connected with Lenin's Plan of Monumental Propaganda of 1918. Vesnin's design for the Moscow headquarters of the Leningrad Pravda (1924) was little more than an oversized and regularized kiosk, with its transparent frame and pithead imagery, and its icons of communication—and it had some of the playfulness of his and Popova's stage-sets [85]. In other cases, such as Vesnin's competition entry for the Palace of Labour (1922-3) and Ilya Golosov's Workers' Club in Moscow (1926), the building mass is broken up into huge Platonic volumes containing the main programmatic elements.</span><br data-dcnode-id="3833"><span data-dcnode-id="3832" instrument_node="">

OSA In 1925 a new professional group was formed within the Constructivist faction under the intellectual leadership of Moisei Ginsburg (1892-1946) and the patronage of Alexander Vesnin, called The Union of Contemporary Architects (OSA). This group was opposed to both the Rationalists and the First Working Group. It sought to steer the avant-garde away from the Utopian rhetoric of the Proletkult tradition, towards an architecture grounded in scientific method and social engineering. The group's aims reflected a trend in the Russian avantgarde towards reintegration and synthesis. As Leon Trotsky pointed out in his book Literature and Revolution (1923): If Futurism was attracted to the chaotic dynamics of the revolution . . . then neoclassicism expressed the need for peace, for stable forms.' This was equally true of avant-gardes in the West, where—as we shall see— there was a turn to neoclassical calm and precision as a reaction against the irrationalism of Expressionism, Futurism, and Dada. The group published a journal—Contemporary Architecture™—and established close ties with avant-garde architects in Western Europe. Ginsburg's book Style and Epoque (1924) was closely modelled on Le Corbusier's Vers une Architecture (though opposed to the idea of Platonic constants), and was influenced by Riegl's concept of the Kunsfwol/en. OSA posited an architecture of equilibrium in which aesthetic and technical-material forces would be reconciled. It was THE AVANT-GARDES IN HOLLAND AND RUSSIA I2/</span><br data-dcnode-id="3829"><span data-dcnode-id="3828" instrument_node="">

fiercely opposed by Ladovsky s ASNOVA for its positivist attitude and its emphasis on technology.20 An earlier manifestation of such internationalist ideas had been the short-lived journal Veshch (Object) published in Berlin in 1922 by El Lissitzky—spokesman of the Russian avant-garde in Germany—and the poet Ilya Ehrenburg. The main purpose of this journal, which was mostly written in Russian, was to acquaint Russian readers with 128 THE AVANT-GARDES IN HOLLAND AND RUSSIA</span><br data-dcnode-id="3821"><span data-dcnode-id="3820" instrument_node="">

European developments.21 The journal emphasized the autonomy of the aesthetic object: ‘We do not wish to see artistic creation restricted to useful objects alone. Every organized piece of work—be it a house, a poem or a painting—is a practical object. Basic utilitarianism is far from our thoughts.’22 Though ostensibly promoting the latest Constructivist ideas, the magazine completely ignored the anti-aesthetic doctrine of the First Working Group. OSA architects concentrated on housing and urbanism as the main instruments of socialist development. Ginsburg was not an advocate of communal living in its more doctrinaire form, according to which a strict Taylorism should be applied to both work and leisure time and family life should be virtually abolished. But despite the importance Ginsburg attached to the opinions of ordinary people, the types of apartment that he provided in his Narkomﬁn Housing in Moscow (1928–9) were unpopular because, with their minimal surface area, they did not allow for the kind of untidy extended family life to which people were accustomed.23 The building reﬂects the inﬂuence of Le Corbusier in its plastic and sectional organization and its combination of family dwellings and communal facilities [86].24 In the ﬁeld of urbanism, OSA was caught up in the controversy between the urbanists and the disurbanists. In this debate, the urbanists proposed the moderate decentralization of existing cities, preserving them in their substance, and the creation of Garden Suburbs along the lines of Raymond Unwin’s Letchworth and Hampstead Garden Suburb in Britain. The disurbanists, on the contrary, called for the progressive demolition of existing cities, except for their historical cores, and the dispersal of the population over the whole countryside. Ginsburg’s disurbanist views are evident from his competition projects for the Green City (a leisure city to be built near Moscow), and for the steel city of Magnitogorsk in the Urals, one of the new cities planned as part of the ﬁrst Five Year Plan of 1928. For Magnitogorsk, Ginsburg designed light, wooden houses on pilotis, suitable for a new kind of nomadic life. These plans were based on the theories of the sociologist Mikhail Okhitovitch (1896–1937),25 who proposed the dispersal of industry and a balanced relationship between urban and rural life, predicated on the Fordist model of universal automobile ownership.26 In their projects OSA adopted the concept of the linear city as proposed by the Spanish urbanist Soria y Mata (1844–1920) and his Russian disciple Nikolai Milyutin (1889–1942), who was also the client for Ginsburg’s Narkomﬁn Housing.</span><br data-dcnode-id="3817"><span data-dcnode-id="3816" instrument_node="">
