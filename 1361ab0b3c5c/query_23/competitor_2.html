For a number of architects, breaking with the straitjacket of the rationalist tradition did not entail any stylistic negotiations with history. Like Zevi, these architects accepted the abstract language of Modernism but sought to extend it to freer realms of metaphor and expression. The work of Giovanni Michelucci (1891-1991) developed from a rationalism that made some attempt to harmonize with its urban context (for example at the Savings Bank in Pistoia of 1950) to a pure Expressionism. In the Church of S. Giovanni overlooking the Autostrada del Sole near Florence (1960-4) [130], he created an isolated Expressionist monument of pure German provenance (though it also makes an oblique reference to Le Corbusier's chapel at Ronchamp). The hermetic and intensely private work of Carlo Scarpa (1902-78) contrasts sharply with Michelucci s public rhetoric. Scarpa's subtle museum designs, such as the Gipsoteca Canoviana in Possagno, Treviso (1956-7) [126 (see page 182)] and the Castelvecchio Museum in Verona (1964), make a unique contribution to a genre which Italian architects after the Second World War—including also Albini and BPR—made their own.</span><br data-dcnode-id="3241"><span data-dcnode-id="3240" instrument_node="">

A harder, less precious tendency emerged in the mid-1950s characterized by the use of exposed-face concrete structures, for example in the Marchiondi Spaghiari Institute in Milan (1953–7) by Vittoriano Viganò (1919–96). Sometimes—as in the apartment building in the Via Campania, Rome (1963–5) by the Passerelli brothers (Vincenzo, b. 1904; Fausto, b. 1910; and Lucio, b. 1922) and an ofﬁce building in the Via Leopardi, Milan (1959–60) by Ludovico Magistretti (b. 1920)— the structure is clearly differentiated from a lighter inﬁll. These projects are related to international ‘Brutalist’ currents deriving from the late work of Le Corbusier.</span><br data-dcnode-id="3233"><span data-dcnode-id="3232" instrument_node="">

A new urban dimension At the end of the 1950s the attitude of Italian architect-planners to the problem of the city underwent an important shift. Demographic movements due to south-north migration as well as technical developments in the building industry led to a redeﬁnition of the scope of urban planning, now seen to embrace larger ‘city regions’. According to Manfredo Tafuri: Italian intellectuals were becoming aware of a new reality; convulsive urbanization and the diffusion of mass communication had effected profound transformations in society. These changes, along with rapid economic growth, encouraged the formation of interpretative models that quickly replaced those of the preceding decade . . . Neorealist myths were replaced by technological ones . . . The entire concept of urban planning would be overhauled in the early 1960s.12</span><br data-dcnode-id="3229"><span data-dcnode-id="3228" instrument_node="">
</span><br data-dcnode-id="3227"><span data-dcnode-id="3226" instrument_node="">
The concept of the ‘city region’, seen as a set of dynamic relations in a state of constant change, took the place of the ﬁxed model.13 An essential precondition of this concept was the revalidation of the city as such. In 1959 the architect Giuseppe Samonà (1898–1983) published a book entitled Urbanism and the Future of the City in which he defended the big city and attacked the social assumptions of the Garden City movement and the Anglo-American concept of the small-town neighbourhood that had dominated Italian urban theory since the war. At the same time a number of competitions were held for the design of new business and administrative centres to be inserted within existing cities. The ﬁrst and most inﬂuential of such projects was Quaroni’s design for the Quartiere Cepalle Barene di S. Giuliano in Mestre (1959) [131], in which the city fabric, free to develop with the minimum of planning constraints, was given focus by a monumental group of buildings facing the lagoon. In this and similar projects, the city was conceived as two parts, one ﬁxed and symbolic, the other continuously changing and essentially uncontrollable.14 In other contemporaneous projects, this dualistic concept was given 190 architecture in italy 1920‒65</span><br data-dcnode-id="3225"><span data-dcnode-id="3224" instrument_node="">

After the Second World War, the Modern Movement became identified with the victorious democracies and was adopted by the professional establishments in Europe and America. With the emergence of the welfare state in Western Europe, a new concept of 'planning' took shape—one compatible with liberal democracy and based on Keynesian economic doctrine.1 The chief model for this combination of planning and capitalism was to be found in the Scandinavian countries. Sweden in particular became a role model for many architects in Western Europe and America. In order to understand the nature of this influence it will be necessary to trace the development of architecture in Scandinavia since just before the First World War.</span><br data-dcnode-id="3197"><span data-dcnode-id="3196" instrument_node="">

The European neoclassical movement of the first decade of the twentieth century had a strong impact in Scandinavia, whose architects came under the spell of the German Biedermeier revival disseminated by Paul Mebes, Paul Schultze-Naumburg, and Heinrich Tessenow. The initial impulse for this tendency came from Denmark, where architects had been studying such neoclassical predecessors as H. C. Hansen since the i88os.2 Danish and Swedish architects became fascinated by their own vernacular and classical traditions as exemplified in sixteenth-century castles, Baroque palaces, and early-nineteenthcentury neoclassical buildings. An eclectic neoclassicism that borrowed from local traditions, German eighteenth-century vernacular classicism, Friedrich Gilly (1772-1800), Claude-Nicolas Ledoux, and the Tuscan Renaissance, dominated Scandinavian architecture 193</span><br data-dcnode-id="3181"><span data-dcnode-id="3180" instrument_node="">
</span><br data-dcnode-id="3179"><span data-dcnode-id="3178" instrument_node="">
from the First World War to the late 1920s. The severe Doricist museum in Fäborg (1912–15) by Carl Petersen (1874–1923) set the tone of the entire movement. In Germany, Expressionism intervened between neoclassicism and the New Objectivity, but in Scandinavia there was a direct transition from one to the other, revealing their similarities rather than their differences. Both Denmark and Sweden inaugurated programmes of state-sponsored housing during the First World War to meet a housing shortage that had been particularly acute in Scandinavia. At that time the model being used for urban housing was that of eighteenth-century perimeter blocks. The clearest examples of the transition from this model to Modernism can be seen in Denmark, in the Hans Tavsensgade project in Norrebro (1919) by Paul Baumann (1887–1963), where perimeter housing encloses a central communal garden.3 With the new ideology of science and hygiene, there was a progressive opening up of the courtyard to the outside, as in the Ved Classens Have project in Copenhagen (1924–9) by Carl Petersen and Paul Baumann.4 Eventually, as in Blidah Park (1932–4) by Ivar Bentsen (1876–1943), the perimeter block disappeared altogether, to be replaced by linear bars set in parkland.5 At the same time the regularly pierced classical wall surface gave way to the free façade, even when loadbearing wall construction was still in use. Unlike Germany in the 1920s, however, hybrid, semi-enclosed layouts immediately appeared, as in the Bellavista Estate at Klampenborg near Copenhagen (1934–7) by Arne Jacobsen (1902–71).6 In Sweden, the arrival of the New Objectivity was announced by two public projects: the student hostel in the Royal Institute of Technology by Sven Markelius (1889–1972) and the Stockholm Industrial Arts Exhibition buildings by Erik Gunnar Asplund (1885–1940) with a team of other architects, both completed in 1930. Whereas Markelius’s building was a competent work in the manner of Oud or Dudok, Asplund’s lakeside exhibition buildings brilliantly exploited the lightness and transparency of modern materials in an architecture that was popular, carnivalesque, and nautical [132]. By 1930 Asplund already had a distinguished neoclassical œuvre to his credit, including the rustic–classical Woodland Chapel at the Cemetery of Enskede in Stockholm (1918–20)7 and the Ledoux-like Stockholm Public Library (1920–8). His successive designs for the addition to the Courthouse at Gothenburg (1913–36) show the evolution of his style from the national romanticism of the original competition design, through neoclassicism, to Modernism. It is probable that Asplund, though undoubtedly a genuine convert to the New Objectivity, never fully accepted the rigorous schematism of the French and German movements and that for him the eighteenthcentury categories of bienscéance (propriety) and ‘character’ still had 194 architecture in scandinavia 1910‒65</span><br data-dcnode-id="3177"><span data-dcnode-id="3176" instrument_node="">

some meaning. His last completed building, the Woodland Crematorium (1935–40), with its clever fusion of Modernist and classical elements, would seem to bear this out.</span><br data-dcnode-id="3169"><span data-dcnode-id="3168" instrument_node="">

Social reform and housing In Sweden, the new architecture was, from the start, closely identiﬁed with the social reform movement—just as it had been some ten years before in Germany. In 1932 the Social Democrats came to power and instituted a series of reforms inspired by Prime Minister Per Albin Hansen’s slogan comparing the state to ‘the house of the people’ (Folkhemmet).8 These reforms were carried out within a liberal democracy, but facilitated by a long tradition of state interventionism. At their core was the housing programme. During the 1920s a vigorous cooperative movement had paved the way for legislation which was to result, after 1945, in a fully ﬂedged welfare state. Housing built by the cooperatives (which often had their own architectural departments) was extremely inﬂuential in the spread of Modernist architecture in Sweden—for example the layout of the Kvarnholmen Company housing project by the architects of the KV cooperative9 was to be widely imitated abroad. Because of the success of the housing programme and the comparative lack of public opposition to the new architecture, the Modern Movement in Sweden was completely lacking in the Jacobinism of the French and German movements. Swedish critics found Le Corbusier’s ideas too theoretical and those of the German Modernists too dogmatic, believing that the new should be reconciled with the existing. This attitude was summed up in the words of the critic Hans architecture in scandinavia 1910‒65 195</span><br data-dcnode-id="3161"><span data-dcnode-id="3160" instrument_node="">

Eliot when he wrote: ‘It seems to me that in Sweden—unlike for Le Corbusier in a France weighed down by style—there exists a culture of dwelling that is both suited to modern purposes and derived from tradition.’10</span><br data-dcnode-id="3153"><span data-dcnode-id="3152" instrument_node="">

The New Empiricism The architects Sven Backström (1903–92) and Lief Reinius (1907–95) led the way in a Swedish revisionist movement after the Second World War. They mixed Modernist macro-typologies with familiar constructional techniques and decorative forms still in the repertoire of ordinary builders and within the taste range of ordinary users [133], seeking a more popular architecture that would acknowledge ‘psychological and irrational factors that please us—and—why not?— beauty’.11 This ideology—enthusiastically dubbed ‘The New Empiricism’ by the British journal Architectural Review in 1947—was not in fact universally accepted in Sweden. The Swedish journal Bÿggmästeren—which had ‘gone modern’ in 1928—ran a debate on the relative merits of a rational ‘Apollonian’ and an irrational ‘Dionysian’ architecture,12 reviving, in the post-war context, a controversy that had smouldered beneath the surface of the avant-garde since the 1920s. 196 architecture in scandinavia 1910‒65</span><br data-dcnode-id="3149"><span data-dcnode-id="3148" instrument_node="">
</span><br data-dcnode-id="3147"><span data-dcnode-id="3146" instrument_node="">
Backström and Reinius’s housing estates at Danvikskippan, Gröndal, and Rosta were widely published in the international architectural press. Their ‘honeycomb’ layout, breaking with the rectilinearity of rationalism (in fact, borrowed from a 1928 project by the German architect Alexander Klein)13 was adopted in the New Town of Cumbernauld in Scotland and the Valco san Paulo housing estate in Rome in the 1950s. British interest in the New Empiricism was reciprocated by Swedish planners and architects who were inﬂuenced by British urban planning theory as laid out in Patrick Abercrombie’s Greater London Plan of 1944. The concept of neighbourhood community planning was adopted in the Ärsta Social Centre (1943–53) built by Eric and Tore Ahlsén (1901–88 and 1906–91), in the suburbs of Stockholm as a pilot scheme intended to correct what was perceived as the principal defect of Swedish housing—its lack of social facilities.14</span><br data-dcnode-id="3145"><span data-dcnode-id="3144" instrument_node="">

Systems design During the 1960s and 1970s there was a dramatic increase in housing production in Sweden. A programme was instituted which aimed at providing one million dwellings between 1965 and 1974.15 Within this programme, 40 per cent of dwellings took the form of high-rise, highdensity projects, using a ‘Systems’ approach to planning and construction. This approach maximized the use of standardized parts and large-scale prefabrication, and was modelled on the technique of Systems engineering used by the United States defence industry.16 The approach was not restricted to Sweden. In Denmark—to speak of Scandinavia alone—there was also a technically driven development in mass housing which resulted in dense, high-rise projects such as that of Hoje Gladsaxe (1960–70).17 In the late 1960s there was growing public opposition to this kind of development, which was often unsatisfactory even at a purely technical level. This reaction, which was exacerbated by the fall-out from the French student revolt of 1968, was to lead to revisions in government policy in both housing and urban renewal. Meanwhile, faced with increasing exclusion by the building industry, architects tended to react in one of two ways: either by accepting technological developments and trying to take control of them; or by retreating into a world of oneoff projects of modest scale, where the economics of mass production and mass consumption did not apply.</span><br data-dcnode-id="3141"><span data-dcnode-id="3140" instrument_node="">

Rationalism and neoclassicism In 1904 the critic–architects Sigurd Frosterus and Gustav Strengell published a pamphlet entitled ‘Architecture: a Challenge to our Opponents’, criticizing the result of the competition for Helsinki Railway Station (1906–16), which had been won by Eliel Saarinen with a late-Jugendstil design. The pamphlet attacked national romanticism—which had been closely associated with Finnish national liberation—proposing in its place an architecture that was rationalist and internationalist. In response to this criticism the ﬁnal versions of Saarinen’s design for the station and Lars Sonck’s design for the Stock Exchange (1911) were both modiﬁed. This turn to a structurally expressive rationalism based on the teachings of Viollet-le-Duc was, however, short-lived. It was soon overtaken by the Swedish-inspired neoclassical movement. Like rationalism, this movement was opposed to the individualism of national romanticism, but the norms it proposed were formal and classical rather than structural.</span><br data-dcnode-id="3101"><span data-dcnode-id="3100" instrument_node="">
</span><br data-dcnode-id="3099"><span data-dcnode-id="3098" instrument_node="">
Alvar Aalto and the New Objectivity Both the rationalist and the neoclassical interludes paved the way for the reception in Finland of the New Objectivity. Among the group of young architects who turned to the new movement, Erik Bryggman (1891–1955) and Alvar Aalto (1898–1976) stand out. Their joint entry for the Turku Fair competition of 1929 is widely seen as having introduced the new movement to the Finnish public. Alvar Aalto soon emerged as the leader of the group with his competition-winning designs for the Public Library in Viipuri (1927–35) and the Tuberculosis Sanatorium in Paimio (1929–33) [136, 137]. The original entry for the Viipuri Library competition was neoclassical, but during the prolonged design development it was transformed into a Modernist scheme. The ﬁnal version, with its two hermetically sealed bars sliding against each other in echelon, skewered by a transverse entry system, was Constructivist in its dynamic asymmetry, though it retained the ghost of its original Beaux-Arts plan. Paimio Sanatorium, on the contrary, was Modernist from the start, with 200 architecture in scandinavia 1910‒65</span><br data-dcnode-id="3097"><span data-dcnode-id="3096" instrument_node="">
</span><br data-dcnode-id="3095"><span data-dcnode-id="3094" instrument_node="">
136 Alvar Aalto Tuberculosis Sanatorium, 1929–33, Paimio View of entrance courtyard. The wing on the right contains the wards.</span><br data-dcnode-id="3093"><span data-dcnode-id="3092" instrument_node="">
</span><br data-dcnode-id="3091"><span data-dcnode-id="3090" instrument_node="">

Regionalists and organicists In the late 1930s, Finnish Modernist architects followed the European trend in questioning the mechanistic premises of the New Objectivity, returning to natural materials and traditional details. This is true of both Bryggman and Aalto; but whereas Bryggman, in the Resurrection Funerary Chapel in Turku (1938–41), introduced direct quotations from tradition in the form of vaults and arches, Aalto, like architecture in scandinavia 1910‒65 201</span><br data-dcnode-id="3085"><span data-dcnode-id="3084" instrument_node="">

Aalto's enjoyment of the Gullichsens' patronage kept his exploration of mechanical techniques within a certain Jugendstil tradition. After the war, Aalto began to receive many commissions for public buildings, including urban projects such as the Pensions Institute in Helsinki, and rural projects such as the Town Hall in Saynatsalo (1949-52) [140] and the Jyvaskyla University Campus (1950-7). These projects constitute a well-defined middle period in Aalto s work, characterized typologically by semi-enclosed courtyards reminiscent of vernacular farm buildings, and materially by the extensive use of handmade brick and clear-varnished wood. The return to picturesque compositions dominated by volumes signifying community, indicates a partial revival of the spirit of national romanticism. In the late 19508, beginning with the Vuoksenniska Church in Imatra (1957-9) [141], another change takes place in Aalto s work. Rustic brickwork is replaced by white plaster or marble facings, while at the same time the forms become increasingly complex. This elaboration—which many critics (using a risky analogy) have called 'Baroque'—can to some extent be attributed to a change in the type of programme, from buildings providing the post-war infrastructure of the modern welfare state (universities, administrative buildings) to those with a more symbolic function (cultural centres, concert halls, libraries, churches). But in spite of these changes, what remains constant in Aalto's work is its drawing on the forms of the natural world to express growth and movement as a metaphor of human life. In this it has certain affinities with the work of Frank Lloyd Wright.</span><br data-dcnode-id="3057"><span data-dcnode-id="3056" instrument_node="">

</span><br data-dcnode-id="3043"><span data-dcnode-id="3042" instrument_node="">

Movement ideal of collaboration between the architect, the engineer, and the building industry. But after they had realized some interesting small-scale industrial buildings, it became apparent that in the larger ﬁeld the building industry was not prepared to operate on their terms. In a later book, Kirmo Mikkola (1934–86), who was himself an inﬂuential member of the Constructivist faction, put the matter thus: ‘The truth [of a technology-based architecture] was more difﬁcult than the ideal. The sought-after collaboration with industry did not materialize. The big construction companies stuck to their rigid unit system created in the 1960s without any assistance from the architects.’27 At the same time Mikkola acknowledged that the Constructivists had excluded ‘plastic and symbolic means of expression’ from their buildings. As in Sweden, the Systems-based approach described by Mikkola had its greatest impact in the ﬁeld of public housing. Since the 1930s low-cost social housing in Finland had consisted largely of dormitory suburbs with few social facilities. (A notable exception to this was the Garden City of Tapiola, begun in 1953 to the master plan of Arne Ervi, which was conceived as a self-contained community.) One of the chief 206 architecture in scandinavia 1910‒65</span><br data-dcnode-id="3033"><span data-dcnode-id="3032" instrument_node="">

Urbanism and housing in late Le Corbusier After his 1929 lecture tour of South America, Le Corbusier became involved in a series of urban projects that were very different from his previous city plans. Whereas the Ville Radieuse had been a schematic design for an ideal site, the projects for Rio de Janeiro (1929) and the ‘Obus’ (‘explosive shell’) plans for the city of Algiers (1932–42) were intended for actual sites. They were also closely linked to Le Corbusier’s new-found interest in l’homme réel and regional cultures based on local customs and geographies. In these projects modern architecture and engineering extend their reach to vast colonial and post-colonial territories and assume a new cosmological signiﬁcance in their struggle with primordial nature. In Rio and Algiers Le Corbusier did not abandon his earlier urbanism, but its forms became more sensitive to local topographies, and there is a greater absorption of private life by monumental, collective forms. Already in 1922, the Ville Contemporaine had envisaged a new integration of private and collective life. For example, public circulation was seen as a single system, with the corridors serving the ﬂats becoming streets-in-the-air replacing access roads. In the Rio and Algiers plans the integration of circulation and housing became the dominant theme. Housing was slung under a viaduct carrying the main highway, recalling the ‘Roadtown’ project of 1910 by the American architect Edgar Chambless [144]. In Algiers, the housing viaduct followed a long sinuous route along the coast, while a separate group of apartments—through which another road was cut at mid-level—was sited further inland on the Fort de l’Empereur hills, connected by a high-level viaduct to the business centre at the port, the ‘cité d’affaires’. Roads and housing were treated as a single, integrated system. One of the most interesting aspects of the project is the separation of infrastructure and inﬁll, allowing the inhabitants to build their own houses 209</span><br data-dcnode-id="3009"><span data-dcnode-id="3008" instrument_node="">
</span><br data-dcnode-id="3007"><span data-dcnode-id="3006" instrument_node="">

within the structure as if on suburban lots—the adaptation the Domino idea of 1914 (see page 143) to a multi-storey building [145]. A publicly ﬁnanced highway provides the framework for privately ﬁnanced housing. Le Corbusier’s Algiers project coincided with growing public pressure for a development plan for the rapidly growing city. At the same time that he was designing his unsolicited schemes, other proposals of a more conventional kind were being pursued by the Algiers authorities themselves. Le Corbusier’s ﬁrst plan was submitted in 1933 and was immediately followed by two further proposals (1933–4) in which the housing component was progressively eliminated. The project was deﬁnitively rejected in 1934, but Le Corbusier continued to submit— with equal lack of success—further proposals for the cité d’affaires for several years.1 It was while working on these that Le Corbusier developed the idea of the sun-breaker (brise-soleil), ﬁrst proposed for the Durand project in Algiers in 1933. This ‘invention’ had enormous consequences in his later style. Much more than a means of solar protection, the sunbreaker was an expressive device giving back to the Corbusian façade the plasticity and play of scale that had been sacriﬁced with the suppression of structure. Nothing shows more clearly the similarities and differences between Le Corbusier and the Beaux-Arts. In his ﬁnal version of the Algiers ofﬁce tower Le Corbusier reverts to a primitive 210 from le corbusier to megastructures: urban visions 1930‒65</span><br data-dcnode-id="3001"><span data-dcnode-id="3000" instrument_node="">

Fourier's ideal collective palace, \htphalanstere (which similarly had a population of 1,800), a Carthusian monastery, or a transatlantic liner— all of them self-contained communities. Internally, Le Corbusier used a modified version of the interlocking duplex apartments first proposed for the Ville Contemporaine in 1922. Externally a system of concrete sun-breakers, doubling as loggias and derived from the Algiers office tower, made legible the internal spaces. Le Corbusier described the Algiers office tower as 'a palace, no longer a box—a palace worthy of reigning over the landscape'.5 He could equally well have been describing the Unite. Comparing Le Corbusier's Unite d'Habitation with his housing at Algiers we see that they represent two very different concepts. While the Unite is a discrete whole, designed to the last detail by the architect, Algiers is an endless infrastructure with random infill. A similar difference existed between two new urban concepts that emerged during and after the Second World War, both of which challenged the orthodoxies of the rationalist tradition. The first was that of the New Monumentality, the second the rather complex urban philosophy of Team X. The New Monumentality The idea of a New Monumentality was formulated by the older generation of modern architects in Europe and America in the 19405. Already, in the mid-i93os, there had been a call by architects to reintroduce the concept of the monument into the Modernist canon. By 'monument' they did not mean 'memorial' in the strict etymological sense, but the broader idea, introduced around the turn of the twentieth century, of representative as opposed to utilitarian buildings. In Europe the concept was certainly influenced by the return to classicism in Nazi Germany and Stalinist Russia, but for the Modernists a return to monumentality meant a return to underlying principles not to a specific style, and the debate remained at a somewhat abstract level.6 One of the most striking post-war examples of such a nonhistoricist monumentality was Le Corbusier's Pilgrimage Church of Notre-Dame-du-Haut at Ronchamp (1951-5). It was only in the 19408 that the proponents of a New Monumentality began to connect it with a specific set of social and political ideas. This happened when American Modernists re-identified the monument with democracy—just as their predecessors had at the time of the City Beautiful movement. The context of this reevaluation was the American government's New Deal building programme, which included the Tennessee Valley Authority. In 1941, the architect George Howe declared: 'The power plants and living</span><br data-dcnode-id="2981"><span data-dcnode-id="2980" instrument_node="">

centres of TVA are an effort to carve a new pattern of life out of earth, air, and water ... and make the land the likeness of the people so that the people can come to be a likeness of the land.'7 Three years later, Elizabeth Mock, a curator of architecture at the Museum of Modern Art in New York, wrote: A democracy needs monuments, even though its requirements are not those of a dictatorship. There must be occasional buildings which raise the everyday casualness of living to a higher and more ceremonial plane, buildings which give dignified and coherent form to that interdependence of the individual and the social group which is the very nature of democracy.8</span><br data-dcnode-id="2973"><span data-dcnode-id="2972" instrument_node="">

In 1943, Sigfried Giedion—then in exile in the United States—entered the debate. In collaboration with the French painter Fernand Leger and the Catalan architect Josep Lluis Sert (1902-83) he wrote a manifesto entitled 'Nine Points on Monumentality',9 and followed it up with an essay called 'The Need for a New Monumentality'.10 In this essay, Giedion focused on the need for civic centres symbolizing the idea of 'community' in which all the visual arts would collaborate, creating a new Gesamtkunstwerk. His concept of 'community' is different from that of Howe and Mock. It does not invoke the idea of democracy, but rather—at least by implication—the German concept of Volk. His description of the civic centre reminds one of Taut s Volkhausy though his more immediate source is Le Corbusier. According to Giedion: 'Only the imagination of real creators is suited to building the lacking civic centres, to instil once more in the public the old love of festivals, and to incorporate all the new materials, movement, colour, and technical possibilities. Who else could utilize them for opening up new ways to invigorate the masses?' In Le Corbusier's work, the civic centre makes its first tentative appearance in 1934 with the projects for the Radiant Farm and the city of Nemours in North Africa. One year earlier Sert had planned the new industrial town of Cidade dos Motores near Rio de Janeiro. The distinctly Corbusian buildings of its civic centre are arranged to form a semi-enclosed square reminiscent of an Iberian Plaza Mayor. As if in response Le Corbusier, in his civic centre for St. Die of 1946, included a loosely defined square. In this project the group of buildings forming the civic centre includes a unite ^habitation, clearly indicating Le Corbusier's intention of giving monumental status to housing.</span><br data-dcnode-id="2969"><span data-dcnode-id="2968" instrument_node="">

The original plan for Chandigarh—the capital of the new state of East Punjab—was prepared by the American planner Albert Mayer. After the untimely death of his Polish-American associate Matthew Nowicki in 1950, Mayer was replaced by the team of Jane Drew, Maxwell Fry, and Pierre Jeanneret, with Le Corbusier as consultant and sole architect of the Capitol (state government buildings). For the overall plan Le Corbusier merely regularized Mayer's Garden City layout, but for the Capitol he started again from the beginning. Nowicki's first scheme for the Capitol (which he later modified) was a rectangular walled 'city' based on the seventeenth-century Mogul forts of Agra and Delhi. Le Corbusier rejected any such model. The three elements of the programme—the High Court, the Assembly, and the Secretariat—were designed as a vast acropolis of separate monumental structures, set against the backdrop of the Himalayan foothills [147]. These buildings have the strong GestaltofLe Corbusier's late style, and in addition they are invested with a symbolism which, although partly based on a private, associative language, has an immediately felt power [148]. Le Corbusier's primitive, classical Esperanto reflected his concept of a universal modern architecture modified by regional traditions.13 It fitted well with Prime Minister Jawarhalal Nehru's aspirations to make India into a modern secular state. The city of Brasilia has to be seen in the context of the unique development of Modernism in Brazil. The Modern Movement was embraced almost overnight by the younger generation of Brazilian architects in 1930—the year that the future dictator Getulio Vargas was elected president. Above all, it was Le Corbusier's rhetorical language that appealed to the Brazilian architects. It was as if the force of an idea could give instant birth to the new architecture and charge it with popular symbolism. Among the many impressive public buildings in which the language of Le Corbusier was adapted to Brazilian conditions, the Ministry of Education and Public Health in Rio (1936-45) is outstanding [149]. Designed by a team which included Lucio Costa (1902-98), Jorge Moreira (1904-92), Affonso Reidy (1909-64), and Oscar Niemeyer (b. 1907) working in close collaboration with Le Corbusier himself, the building broke with the universal perimeter block pattern of the Rio street grid, becoming an objet-type in the centre of the block. In its diagrammatic separation of offices and collective functions this building seemed to many—even in Europe—a more perfect realization of Corbusian ideas than Le Corbusier's own public buildings, constrained as they often were by odd-shaped urban sites. The idea for a new capital city of Brazil on the central plateau, which had been envisaged ever since the eighteenth century, was finally realized by President J. Kubitschek de Oliveira in 1956. The competition for the masterplan was won by Lucio Costa, and Oscar 214 FROM LE CORBUSIER TO MEGASTRUCTURES: URBAN VISIONS 1930-65</span><br data-dcnode-id="2949"><span data-dcnode-id="2948" instrument_node="">

allowed to squat in the interstices of the city;14 in Brasilia, they are banished to unplanned satellite towns from which they commute daily to work [150]. The two cities, despite their Modernist and universalist pretensions, owe much to the persistent traditions of their respective countries. CIAM and Team X After the Second World War the urban doctrine tacitly accepted by architects of the Modern Movement was that promoted by the Congres Internationaux d'Architecture Moderne (CIAM). CIAM had been founded in 1928 as the international platform of the Modern Movement, which at that time was still opposed by large sections of the profession. Branches were quickly formed in the different countries of Western Europe and America. The first meeting was held at La Sarraz, Switzerland, in the chateau of Helene de Mandrot, a wealthy patroness of the arts who had been a keen supporter of Art Deco until persuaded by Le Corbusier and Sigfried Giedion to take up the cause of modern architecture (and who was to commission a house from Le Corbusier at Le Pradet near Toulon the following year).15 Four further meetings were to take place before the Second World War. Housing and urbanism soon became the main focus of discussion at these congresses. The early debates reflected the conflict between the leftists, who saw the movement as an arm of the socialist revolution, and the liberals for whom the aims of the movement were primarily cultural and technical. After 1930, when most of the leftists moved to Russia, CIAM became increasingly dominated by Le Corbusier and the general secretary of the organization, Sigfried Giedion. 150 Lucio Costa Brasilia Masterplan, 1957 The plan shows the original concept entirely engulfed by unplanned satellite development.</span><br data-dcnode-id="2933"><span data-dcnode-id="2932" instrument_node="">

CIAM urban doctrine became enshrined in the 'Charte d'Athenes' (Athens Charter'). Published by Le Corbusier in 1942, while France was under German occupation, this document was Le Corbusier's heavily edited version of the unpublished proceedings of the fourth CIAM meeting, which had taken place on the SS Patris en route from Marseilles to Athens in 1933. Most of the book was a restatement of commonplaces so general as to be acceptable to almost anyone, but it was strictly rationalistic and analytical in tone and was based on a classificatory system that divided the city into four watertight functions: living, working, recreation, and circulation. This Cartesian and formalistic approach to the complex problems of the city was unacceptable to younger members of CIAM who joined after the war. In spite of the ideas reflected in the Athens Charter, Le Corbusier himself, as we have seen, had been moving steadily away from his earlier rationalism, although he had never fully disavowed it. It was this ambiguity that allowed him to remain an important figure for the post-war generation, who felt that his ideas had been trivialized by most of the second generation of modern architects—those born in the first decade of the twentieth century. A sort of alliance was formed between Le Corbusier and the young members, who began—with Le Corbusier's complicity—to play a dominant role in CIAM discussions from the ninth congress at Aix-en-Provence (1953) onwards. In 1954, after the Dutch 'Doom Group' had explicitly repudiated the Athens Charter, the CIAM council entrusted an enlarged Doom Group with the organization of the tenth CIAM meeting, to be held in Dubrovnik in 1956. At this point, the Doom-based group started calling itself TeamX'.16 Dubrovnik was to be the last meeting of CIAM in its old form. As a result of the irresolvable conflict that arose during the meeting between the middle and the younger generations, CIAM, which had clearly ceased to represent a monolithic Modern Movement, was dissolved and replaced by a new 'CIAM research group for social and visual relationships'. The first and only congress under the new aegis took place at Otterlo, Holland, in 1959. It was at this meeting that the British architects Alison and Peter Smithson (Alison 1928—93; Peter 1923-2003) and the Dutch Aldo van Eyck (1918-99) attacked the Italian 'contextualists' (see page 187). Team X was opposed not only to the Athens Charter but also to the New Monumentality. It is true that both wanted to reintroduce into modern architecture the experience of 'community', but while the New Monumentality aimed at creating the symbols of community within an urban framework that was still rationalistic, Team X wanted an architecture that was the expression of community. Whereas one accepted architecture as a mediated representation, the other sought a primal language in which form and meaning would be one. In attack2l8 FROM LE CORBUSIER TO MEGASTRUCTURES: URBAN VISIONS 1930-65</span><br data-dcnode-id="2925"><span data-dcnode-id="2924" instrument_node="">
</span><br data-dcnode-id="2923"><span data-dcnode-id="2922" instrument_node="">
151 Alison and Peter Smithson Urban Reidentification, 1959 This drawing, similar in concept to Golden Lane, is an adaptation of Le Corbusier's a redent housing to local contingencies, giving an impression of organic growth.</span><br data-dcnode-id="2921"><span data-dcnode-id="2920" instrument_node="">

ing the Athens Charter, the Smithsons claimed: 'Our hierarchy of associations is woven into a modified continuum representing the true complexity of human association ... we are of the opinion that a hierarchy of human association should replace the functional hierarchy of the Charte d'Athenes.'17 For them the key to community in the city did not lie in a separate 'city core' consisting of representative public buildings, but within the realm of dwelling itself, where a more immediate relationship between the nuclear family and the community could be established. It is important to realize, however, that in spite of Team X's manifest opposition to Le Corbusier's rationalist urban theory, it was from Le Corbusier that they drew an important part of their inspiration. This was particularly true of the Smithsons and of Georges Candilis (1913-95), Alexis Josic (b. 1921), and Shadrach Woods (1923-73) (who had formed part of the design team working on the Marseilles Unite d'Habitation). The Smithsons' Golden Lane workers' housing competition project of 1952 was essentially a modification of Le Corbusier's a redents housing project for Hot no. 6 in Paris of 1936, with its supple adaptation to the contingencies of progressive slum clearance and its 'streets in the air'[151]. According to the Smithsons, infrastructure should do more than facilitate spontaneous community formation—it was needed to give 'coherence' to the urban structure: 'The aim of urbanism is comprehensibility, i.e. clarity of organization.'18 In this, they seemed to acknowledge that there was a gap between spontaneous human association and its formal representation.19 For the Smithsons, however, this problem could be overcome by means of a dualistic planning strategy that developed 'road and communication systems as the urban infrastructure . . . [using] the possibilities offered by "throw-away" FROM LE CORBUSIER TO MEGASTRUCTURES: URBAN VISIONS 1930-65 219</span><br data-dcnode-id="2917"><span data-dcnode technology to create a new sort of environment with different cycles of change for the different functions'.20 These ideas were developed in a series of projects in the early 19605. For example, the partnership of Candilis, Josic, and Woods developed schemes with circulation networks to which different functional volumes were randomly attached. These networks were either treelike (as in the Toulouse-le-Mirail or Caen Herouville projects, both 1961) or grid-like (as in the Free University of Berlin, 1964-79) [152]. The same concept of a defining network of circulation lay behind an earlier project: the Orphanage in Amsterdam (1957-60) by Aldo van Eyck [153]. Anticipating the Free University in some respects, the orphanage is a 'mat' building, isomorphous with the space it occupies. But here, instead of a dialectic between a fixed infrastructure and a random infill, we find a dialectic between repeating external forms and interior spaces that move freely across their borders, creating—in Van Eyck's terminology—'in-between spaces' and 'thresholds' by which private and public spaces are connected.</span><br data-dcnode-id="2909"><span data-dcnode-id="2908" instrument_node="">

Systems theory By the end of the 19505 there existed two conceptual models for the kind of urban ideas being explored by Team X. The first model was a conflation of social theories based on the concept of 'community' (Gemeinschaff) and the psychology of perception.21 These ideas often seem to lie behind the 'tree' and 'threshold' metaphors used by Woods, the Smithsons, and Van Eyck. But latent in much of the work of Team X there was another model that had been gaining ground in the human sciences since the Second World War: 'Systems theory'. This seeks to apply the common principle of self-regulation to machines, psychology, and society—in fact to all 'organized' wholes. Founding itself on the belief that instrumental technology now replaces all other 220 FROM LE CORBUSIER TO MEGASTRUCTURESI URBAN VISIONS 1930-65</span><br data-dcnode-id="2905"><span data-dcnode-id="2904" instrument_node="">

tendencies, it sees societies as information systems designed to maintain 'homeostasis'—decentralized wholes in which no one level is 'in control'.22 Though both models differ from rationalism in being organic and holistic (i.e. they cannot be mechanically broken down into separate parts), they are nonetheless in conflict with each other. The first looks back to the lost 'wholeness' of craft-based communities and cultures: the second looks forward to a capitalist world of open structures within which democracy, individualism, commodification, and an ethos of consumption are unimpeded by any a priori set of cultural codes. That this contradiction may have affected the Smithsons never to be fully FROM LE CORBUSIER TO MEGASTRUCTURESI URBAN VISIONS 1930-65 221</span><br data-dcnode-id="2897"><span data-dcnode-id="2896" instrument_node="">

resolved seems to be reflected in the somewhat indecisive quality of their later work. Aspects of Systems theory, particularly cybernetics, found their way into architectural discourse in the late 19505. Swedish and Dutch Structuralism and the Megastructure movement all saw them as applicable to the complex problems of design in modern mass society. A 'cybernetic', self-regulating element was introduced into the way cities and large buildings were conceptualized. Instead of users being presented with predetermined spatial patterns, they were now—at least in theory—offered the means to alter their own micro-environment and decide their own patterns of behaviour. Dutch Structuralism In 1952 the Dutch architect Wim van Bodegraven underlined the need for architects to create a structure of forms that could change with time yet retain its coherence and 'meaning'.23 This demand, as well as the example of Van Eyck's orphanage with its superimposition of centralized order and local freedom, were the inspiration behind a new tendency in Holland known as 'Structuralism'. This was initiated by Piet Blom (b. 1934) and Joop van Stigt in their 1962 Prix de Rome design for a 'Village of Children', in which the combination of order and flexibility, centrality and dispersal, was achieved in terms of a prefabricated system which allowed identical, 'recognizable' units to be combined according to a set of rules [154]. This basic idea was further developed by Herman Hertzberger (b. 1932) and others in Holland, where its application became rather widespread in the 19608 and i97os.24 154 Piet Blom and Joop van Stigt Village of Children, 1962 In this opening salvo of Dutch Structuralism, Van Eyck's concept of additive 'houses' form ing a higher-order community is systematized in three dimensions.</span><br data-dcnode-id="2893"><span data-dcnode-id="2892" instrument_node="">

Megastructures The Megastructural movement, which was contemporaneous with Dutch Structuralism, was not concerned with fixed, recognizable units. It was posited on a built environment without cultural norms and in a continuous state of flux. In a publication of 1964, the architect Fumihiko Maki (b. 1928), one of the original members of the Japanese Metabolists, distinguished between three types of what he called 'collective form': firstly, Compositional form—in which there is a fixed relation between different pre-formed buildings (this is the classical way of achieving collective form and includes the civic centre at St. Die by Le Corbusier and that of Brasilia by Niemeyer); secondly, Megastructural form—a large frame in which all the functions of a city are housed (this involves the coexistence of structures with different rates of obsolescence); and thirdly, Group form—an additive collection of typologically similar building units (characteristic of 'unplanned' vernacular villages).25 Within this broad classification, 'Megastructural form' presents an array of different approaches. A very broad distinction can be made between projects which stress the long-term elements and those which stress the variable elements—a matter of emphasis, since examples of flexible and fixed elements occur in both groups. Within the first cate gory the Japanese Metabolists and the British Archigram will be discussed.</span><br data-dcnode-id="2885"><span data-dcnode-id="2884" instrument_node="">

industrial production, to have vanished into a state of automated perfection. It pictures a lobotomized world from which power and conﬂict have been eradicated. Whether Megastructures emphasize a relatively ﬁxed infrastructure or its self-regulating, responsive inﬁll, they are all predicated on a dominant idea—that of the city as an open web or network, the contents of which can develop according to an internal dynamic. In contrast to the traditional Cartesian schema promoted by the Athens Charter, according to which the city consists of a closed hierarchy of discrete parts controlled by a centre, the Megastructural city is presented as an indivisible, organic, self-regulating whole. Problems seem to arise when this abstract concept is hypostasized and given form as an architectural image. The idea immediately takes on the clothing of a Utopia or a dystopia, depending on whether the hidden mechanism of the system is read as benign or sinister. It is all too easy to see Constant’s New Babylon, for example, as an allegory for a post-industrial, capitalist world, in which an invisible network, though able to maintain and reproduce itself efﬁciently, is no longer guided by any rational telos.</span><br data-dcnode-id="2809"><span data-dcnode-id="2808" instrument_node="">

The deﬁning moment for the introduction of the Modern Movement into America is usually seen to have been the exhibition at the New York Museum of Modern Art (MoMA) of 1932 and the accompanying book, The International Style, by Philip Johnson and Henry Russell Hitchcock. This book presented the Modern Movement as an incident in the evolution of style, and downplayed its progressive social content. The explanation for this can probably be found in the different cultural and political conditions prevailing in America and Europe at the time. In Europe, the period between 1910 and 1930 was one of unprecedented social and cultural upheaval. Sweeping social reforms were being initiated by liberal governments, particularly in the realm of public housing. At the same time there was a powerful avant-garde movement in all the arts supported by a small but inﬂuential minority of the cultural elite. During the same period in America this parallelism between socially progressive ideas and the artistic avant-garde was largely lacking. Garden City settlements of the 1920s and 1930s, like Sunnyside Gardens in New York, Radburn in New Jersey, and Greenbelt near Washington, DC, all by Clarence Stein and Henry Wright, were still basically within the Arts and Crafts tradition. Projects derived from the 1920s European avant-garde, such as Stonorov and Kastner’s Carl Mackley Houses in Philadelphia, were rare. Given the lack of commonly perceived connection between the avant-garde and social reform it is hardly surprising that Hitchcock and Johnson should have emphasized the purely stylistic aspects of the Modern Movement. Yet there were other voices; for example, in parallel with the ‘International Style’ exhibit, MoMA mounted an exhibition of social housing curated by the architectural critic Lewis Mumford (1895–1990) and his assistant Catherine Bauer, which included examples of the Arts and Crafts movement and Neue Sachlichkeit in Germany. Lewis Mumford’s writings in the 1920s still carried the imprint of William Morris’s rejection of modern technology. But towards the end of the decade he came increasingly under the inﬂuence of the optimistic evolutionism of the Scottish urbanist Patrick Geddes. According to 231</span><br data-dcnode-id="2789"><span data-dcnode-id="2788" instrument_node="">
</span><br data-dcnode-id="2787"><span data-dcnode-id="2786" instrument_node="">
Geddes, the present ‘paleotechnic’ phase in civilization would give way to a ‘neotechnic’ phase in which electricity would succeed coal as a source of power, and biological principles would replace mechanistic ones. After visiting the new housing in Weimar Germany in 1932, Mumford became convinced that such a neotechnic phase was in the making. His books Technics and Civilization (1934) and The Culture of Cities (1938) contained the essence of his new philosophy.1 Mumford’s partner on the German tour was Catherine Bauer—a young writer whose visit to Ernst May’s New Frankfurt two years earlier had, in her own words, transformed her ‘from an aesthete into a housing reformer’. After turning the research material collected on the German tour into a book, Modern Housing, she became acknowledged as the foremost American expert on social housing. Bauer realized (unlike Mumford) that the success of social housing in America depended on grass-roots political action. In 1934, she became director of the Philadelphia Labor Housing Conference, founded by the architect Oskar Stonorov and John Edelman of the Hosiery Workers Union, whose purpose—ultimately abortive—was to create a laboursponsored housing cooperative. Mumford and Bauer’s enthusiasm for the German housing movement must be seen against the background of the general openness to European social ideas that characterized the New Deal, as the Roosevelt administration searched for ways to alleviate the effects of the Depression. But the ﬂow of ideas across the Atlantic in the interwar period was not only from east to west. Especially during the early 1920s, European reformers, both in Western Europe and in Soviet Russia, envious of the high living standards of American workers, sought to harness American ideas to their various programmes of reconstruction and reform. American technology and production management were emulated by European industry and became important early points of reference for the Modern Movement.2 After the Second World War the situation changed radically. America emerged from the war as the dominant power and as the creditor of an impoverished and ruined Europe. Though some of the welfare programmes inaugurated by the New Deal remained intact, there was now unbounded conﬁdence in American capitalism. Modern architecture became accepted worldwide by the architectural profession, but it was pursued under totally different political conditions in America and Europe. In the welfare state economies of post-war Europe modern architecture, whether orthodox or revisionist, became the norm for public projects. Within this ethos architects, working either in government or private ofﬁces, began to study problems of large-scale architectural production. In England in the late 1940s, for example, Hertfordshire County Council implemented a school programme based on a modular system of prefabrication.3 In 232 pax americana: architecture in america 1945‒65</span><br data-dcnode-id="2785"><span data-dcnode-id="2784" instrument_node="">
</span><br data-dcnode-id="2783"><span data-dcnode-id="2782" instrument_node="">
Europe as a whole the many points of connection between modern architecture and the welfare state encouraged the experimental work of Team X and the Megastructuralist movements (see pages 217 and 223). During the same period in America the most vital developments in modern architecture were in the private sector. Even public projects were ﬁnanced by private agencies (albeit with federal or state help) and this tended to inhibit, though it did not altogether eliminate, the development of an ideology-driven Modernism. Precisely because of the different conditions of architectural production in America and Europe, however, the mutual inﬂuence was still strong. In Europe this inﬂuence was chieﬂy felt in two areas: the ﬁrst, technology, reinforced the tradition of Modernist rationalism; the second, popular and rapidly changing cultural forms, ran counter to it. In this chapter three major themes will be examined: ﬁrstly, the individual house—in particular, the Case Study House Program; secondly, corporate ofﬁce building; and thirdly, critiques of Modernist rationalism, the pressures of consumerism, and the search for an architecture of public symbolism.</span><br data-dcnode-id="2781"><span data-dcnode-id="2780" instrument_node="">

The Case Study House Program In the 1920s in Western Europe, the individual house had played an important role in the birth of the Modern Movement. But in the two decades after the Second World War, European domestic building was largely conﬁned to government housing programmes, which consisted mostly of high-rise apartments or row houses in the cities or the new towns. In America, by contrast, most new housing took the form of large suburban settlements, made necessary by the accelerated migration of white middle-class families from the cities to the outer suburbs and carried out by private developers.4 At the same time there was a large market in one-off family houses, extending from the modest and pre-designed to the lavish and purpose-designed. The stylistic tendencies within the housing market were the result of a complex interplay between various interested parties, including the loan agencies, the building industry, and professional and cultural pressure groups. Museums such as the Museum of Modern Art in New York and progressive journals such as Architectural Record tried to popularize modern house design, but with only modest success. In 1951 Architectural Record, commenting on a House of Ideas sponsored by the journal House and Garden, described it as a fusion of the ‘crisp, clean lines of the International Style and the rambling openness of the Ranch House Style’. The design typiﬁed a ‘no-nonsense’ Modernism unencumbered by theory which gained some popularity in the United States in the 1950s.5 In this encounter between Modernism and the housing market, the pax americana: architecture in america 1945‒65 233</span><br data-dcnode-id="2777"><span data-dcnode-id="2776" instrument_node="">
</span><br data-dcnode-id="2775"><span data-dcnode-id="2774" instrument_node="">
example of southern California played a crucial role. Ever since the early years of the twentieth century, with such buildings as the Gamble House by Greene and Greene (1907–8) and Dodge House by Irving Gill (1914–16), Los Angeles had shown itself to be receptive to an innovative domestic architecture. This tradition had been continued in the 1920s with the Los Angeles houses of Frank Lloyd Wright and the work of Austrian immigrants Rudolph Schindler (1887–1953) and Richard Neutra (1892–1970)—for example, the justly admired houses that each of them built for Dr Phillip Lovell (1923–5 and 1927–9 respectively). It was in Los Angeles after the Second World War that a vigorous attempt was made to inﬂuence the more expensive end of the post-war house market in the direction of modern architecture: the Case Study House Program. This was initiated by John Entenza, an amateur of modern art and architecture who became owner–editor of the magazine Arts and Architecture in 1938, turning it into a mouthpiece of the avant-garde. In the July issue of 1944 Entenza—together with photographer and graphic artist Herbert Matter and architects and designers Ray and Charles Eames (1912–88 and 1907–78), Eero Saarinen (1910–61), and Richard Buckminster Fuller (1895–1983)—published a manifesto calling for the application of wartime technology to the post-war housing problem. The montages by Herbert Matter announcing the manifesto showed a familiarity with Futurist and Constructivist graphics, but they placed a new emphasis on the analogy between machines, the human nervous system, and molecular structures. The manifesto recast Bauhaus and Corbusian ideology in terms of post-war American technology. In deﬁning the principles on which the post-war house should be based, it declared: The house is an instrument of service. Degrees of service are real and can be measured. They are not dependent on taste. The house should not assert itself by its architectural design. In fact, the better integrated the services of the house become, the less one is apt to be conscious of the physical way in which it has been done. The kitchen, bathroom, bedroom, utilities, and storage will proﬁt most by an industrialized system of prefabrication. In the living–recreational areas variation becomes a valid personal preference. A designer must know what the house must supply to meet the physiological and psychological needs of the members of the family.6</span><br data-dcnode-id="2773"><span data-dcnode-id="2772" instrument_node="">
</span><br data-dcnode-id="2771"><span data-dcnode-id="2770" instrument_node="">
Optimistic and positivistic in tone, the manifesto promoted the belief that an art based on psychological laws and an architecture based on scientiﬁc method would lead to a uniﬁed culture in tune with the modern age. The aim of the manifesto was not social revolution but a revolution in aesthetics, starting with the enlightened bourgeoisie and ﬁltering down to the masses. Nonetheless, the manifesto had a moral and social as well as an aesthetic agenda: the particular aesthetic it pro234 pax americana: architecture in america 1945‒65</span><br data-dcnode-id="2769"><span data-dcnode-id="2768" instrument_node="">
</span><br data-dcnode-id="2767"><span data-dcnode-id="2766" instrument_node="">
moted was one of transparency and ‘authenticity’, inseparable, it was thought, from the ideals of a rational and just social order. Prefabrication techniques, combining standardization and choice, would make the new aesthetic principles available to everyone. Where it differed from the European Modern Movement and from social reformers like Lewis Mumford and Catherine Bauer was in its assumption that the uniform culture it envisaged was compatible with a market-based capitalism. To carry out this ambitious agenda Entenza commissioned or adopted a series of suburban houses in southern California by Modernist architects, including among others William Wurster (1895–1973), Ralph Rapson (b. 1914), and Richard Neutra, in order to build up a ‘case study’ of the new domestic architecture. In spite of their differences these houses had many features in common, not all of which were derived from the theory presented in the manifesto. They were, for a start, nearly all of one storey with ﬂat roofs. The plans were open and informal but tended to be bi-nuclear, the living rooms and bedrooms being remote from each other. The inside was opened up to the outside by means of large areas of glazing. A tendency towards picturesque dispersal was counteracted by the economic need for cubic simplicity. Nearly all the houses had unrendered brick ﬁreplaces—a reassuring reference to the pre-industrial past. The layouts reﬂected a somewhat ritualized suburban life style—non-rational and conformist rather than rational and free as the theory claimed. Despite the use of forms connoting prefabrication and mechanization most of the houses were built of blockwork with wood framing, and the ﬂexibility of the plans owed as much to traditional American building techniques as they did to new technology and materials. Around 1950, the Case Study houses underwent a marked change, which ﬁrst becomes noticeable in those by Raphael Soriano (1907–88), Craig Ellwood (1922–92), and Pierre Koenig (b. 1925) [161]. In these houses there was a new concentration on modular construction and prefabrication. The houses were thought of more as assembled systems than as ‘designs’ in the traditional sense. It became possible to talk of an architecture of steel and glass. Nearly all the houses now had steel frames and the structure and method of assembly became clearly visible while the plans became simpler and less picturesque. Discussing Craig Ellwood’s House 17 of 1954–5, the Italian journal Domus wrote: ‘In fact, we do not ﬁnd here innovations in the scheme of composition, in the treatment of space, structure or materials, but solutions of details, perfections of equipment and materials, which make this architecture more profound and more concrete.’7 Two Case Study houses built between 1945 and 1949 stand somewhat apart from the other houses of the earlier phase, though they foreshadow the second phase in many ways: Case Study House 9, built pax americana: architecture in america 1945‒65 235</span><br data-dcnode-id="2765"><span data-dcnode-id="2764" instrument_node="">

Case Study House 21,1958, Los Angeles This house, with its panoramic view, unites inside and outside space, private life and the infinite-sublime. Although largely prefabricated, it is highly site-specific.</span><br data-dcnode-id="2757"><span data-dcnode-id="2756" instrument_node="">

for Jophn Entenza, designed by Charles Eames and Eero Saarinen, and House 8 designed by Charles Eames and his wife Ray for their own use.8 The two houses shared the same site in Pacific Palisades. Charles Eames and Eero Saarinen had met in 1937 when Eames was on a fellowship at Cranbrook Academy of Art, of which Eero's father Eliel was both designer and director. During the early 19408 they frequently collaborated, particularly in the design of moulded plywood furniture, in which Eames was an important pioneer. The Entenza House is a single-storey volume compressed within a square perimeter. Externally the house is enigmatically neutral; its qualities lie entirely in its interior, ingeniously calibrated to the needs of a bachelor-aesthete. The Eames House is altogether more remarkable [162]. It is almost unique among case study houses in being organized on two storeys. It consists of a steel and glass cage with one long side built close up against a steep embankment and the other sides open to the undulating, eucalyptus-strewn site. Its proportions are roughly those of Le Corbusier s Maison Citrohan—both have a double-height living room at one end overlooked by a bedroom balcony—but in relation to the Maison Citrohan the Eames House is rotated through 90 degrees and the blank flank wall has become a front. Instead of being monolithic, 236 PAX AMERICANA: ARCHITECTURE IN AMERICA 1945-65</span><br data-dcnode-id="2753"><span data-dcnode-id="2752" instrument_node="">

162 Charles and Ray Eames Case Study House 8, 1945–9, Paciﬁc Palisades This house is assembled from standard industrial elements and is non-site-speciﬁc. Its light, nomadic quality relates it more to the ideas of Le Corbusier, Ginsburg, or Buckminster Fuller, than to the typical ground-hungry American house of the period.</span><br data-dcnode-id="2749"><span data-dcnode-id="2748" instrument_node="">

The corporate ofﬁce building Perhaps the greatest single achievement of American architecture after the Second World War was the establishment of the modern corporate ofﬁce building as a type, imitated all over the world. Skidmore, Owings, and Merrill (SOM) were the leaders of this development. Founded in Chicago in 1933 by Nathaniel Owings (1903–84) and Louis Skidmore (1897–1962), the ﬁrm came to prominence during the war with the commission to build the city of Oak Ridge in Tennessee for the Manhattan Project for the development of the atomic bomb. After the war, the ﬁrm grew into a huge multi-partner organization with pax americana: architecture in america 1945‒65 237</span><br data-dcnode-id="2741"><span data-dcnode-id="2740" instrument_node="">
</span><br data-dcnode-id="2739"><span data-dcnode-id="2738" instrument_node="">
163 Skidmore, Owings, and Merrill Lever House, 1951–2, New York This was the ﬁrst of SOM’s skyscraper ofﬁce blocks. Its curtain wall was widely imitated throughout the world.</span><br data-dcnode-id="2737"><span data-dcnode-id="2736" instrument_node="">
</span><br data-dcnode-id="2735"><span data-dcnode-id="2734" instrument_node="">
ofﬁces in Chicago and New York and later in San Francisco and Portland, Oregon. The ﬁrst high-rise ofﬁce building by SOM was Lever House in New York (1951–2) [163]. This was one of four American buildings which were the ﬁrst to realize Mies van der Rohe’s and Le Corbusier’s pre-war visions of the glass skyscraper. The other three were: the Equitable Life Assurance Building in Portland, Oregon (1944–7) by Pietro Belluschi (1899–1994); the United Nations Secretariat in New York (1947–50) by Wallace Harrison (1895–1981) with Le Corbusier as consultant; and Lake Shore Drive Apartments, Chicago (1948–51) by Mies van der Rohe.9 To this list should be added the pre-war Ministry of Education building in Rio de Janeiro (1936–45) by a team including Lúcio Costa and Oscar Niemeyer, with Le Corbusier as consultant (see page 216). In its site organization Lever House is similar to, and probably derived from, the Rio building.10 It was the ﬁrst building in Manhattan to be set back from the plot boundary, though unlike the Rio building the tower rises up from a three-storey perimeter courtyard block on pilotis. But in its use of a uniform curtain wall on all surfaces it followed a Miesian rather than a Corbusian prototype. From 1952, indeed, Mies became the dominant inﬂuence on SOM. Due to the ﬁrm’s decentralized ofﬁce organization and its somewhat empirical approach to design, its work showed considerable variation in detail, but these variations occurred within a strict set of functional parameters: maximum ﬂexibility of spatial planning; maximum standardization of parts and modular coordination of all systems;11 air conditioning; fully glazed and sealed curtain walls; all-day artiﬁcial lighting; and deep ofﬁce space. The ﬁrm of SOM was a new phenomenon in the history of Modernism. For the ﬁrst time the anonymity that had been aimed at by the rationalist wing of the Modern Movement appeared to have been achieved. Thanks to technical and professional efﬁciency combined with a simple and consistent aesthetic, SOM were able to marry the ambitions of Modernist rationalism with those of advanced capitalism and corporate bureaucracy [164, 165]. In their work modern architecture—or at least a convincing version of it—became normalized within the political structures of the Cold War and the ‘military–industrial complex’. SOM may have been unique in its size and in the anonymity of its organization but it was part of a general post-war expansion of corporate ofﬁce building in which many architects took part. Among these the work of Eero Saarinen is of particular interest. Eero was the partner of his father Eliel until the latter’s death in 1950, and he had inherited from his father a belief in the high mission of the individual creative architect. He also adhered to the Beaux-Arts maxim that a building’s pax americana: architecture in america 1945‒65 239</span><br data-dcnode-id="2733"><span data-dcnode-id="2732" instrument_node="">

form should express its character. This led him, in the design of the General Motors Technical Center in Warren, Michigan (1948–56) [166], which he took over on the death of his father, to develop an architecture that embraced and promoted GM’s technical, stylistic, and corporate ideas. The design was highly inventive—for example, in its adaptation of the neoprene gasket from car to building design, in the ‘luminous ceiling’ of the dome of the sales hall, and in its use of bright, glazed-tile colour-coding on the gable walls of each department building. At the level of organization, the design both facilitated and represented GM’s corporate policy of decentralized control and ﬂexibility. A universal grid of 5 feet allowed for interchangeability of parts and ﬂexibility of planning, while on the façades the module was endlessly repeated in the window mullions at the expense of any expression of structure. The ofﬁce campus, grouped round an artiﬁcial lake, was designed to be seen from a moving car. Thus, a predisposition towards expressive functionalism inherited from his father’s Jugendstil 240 pax americana: architecture in america 1945‒65</span><br data-dcnode-id="2721"><span data-dcnode-id="2720" instrument_node="">

Mies van der Rohe in America The American work of Mies van der Rohe occupies a position that is both central and peripheral to the development of the corporate ofﬁce building: central in the sense that Mies’s designs for the Illinois Institute of Technology in Chicago (1940–56) and Lake Shore Drive Apartments provided the basic formal syntax for the corporate buildings of SOM and Saarinen; peripheral in the sense that Mies maintained a certain detachment from the immediate needs of his clients. Mies’s ﬁrst scheme for the IIT campus was classical with two identical, symmetrically placed auditoria [167], continuing the compositional characteristics of his German work—for instance, the Silk Industry Ofﬁces in Krefeld of 1937. When it was discovered that the existing road grid could not be altered, Mies changed the layout, turning an articulated composition into an assemblage of rectangular pavilions in a way that conformed to the abstract conditions of the American grid [168]. All Mies’s energy went into discovering and perfecting the types corresponding to what he saw as the ‘will of the epoch’, and once he had arrived at a typical solution he simply repeated it. Whereas in the work of SOM the same rational schema would often vary in detail from project to project, for Mies there was no difference between the personal solution and the type. A case in point is his use of 242 pax americana: architecture in america 1945‒65</span><br data-dcnode-id="2701"><span data-dcnode-id="2700" instrument_node="">
</span><br data-dcnode-id="2699"><span data-dcnode-id="2698" instrument_node="">
168 Mies van der Rohe Alumni Hall, Illinois Institute of Technology, 1945–6 The abstract yet neoclassical severity of Mies’s IIT pavilions had an enormous inﬂuence on American architecture in the 1950s, particularly that of the corporate ofﬁce block and the work of SOM and Eero Saarinen.</span><br data-dcnode-id="2697"><span data-dcnode-id="2696" instrument_node="">

I-beams in his curtain wall façades. First adopted in Lake Shore Drive Apartments, these elements—which among other functions provide stiffening for the window sections—read ambiguously as both mullions and columns, recalling the equally ambiguous vertical elements of Sullivan’s Wainwright Building (see page 243) and Eliel Saarinen’s Chicago Tribune ofﬁces. Mies’s I-beam is an as-found element with deﬁnite structural connotations, but at the same time it is explicitly decorative, being welded to the surface of a pre-existent structure [160 (see page 230), 169, 170]. Mies claimed to be creating an anonymous vernacular and repudiated Le Corbusier’s ‘individualism’,13 but his minimal forms are still rhetorical and speak of the remnants of a high art tradition even as they reject any reconciliation between history and modernity.</span><br data-dcnode-id="2693"><span data-dcnode-id="2692" instrument_node="">

The critique of corporatism Mies’s carefully worked out idealist philosophy and his disdain for the trivia of everyday life in favour of a puriﬁed expression of the Zeitgeist coincided exactly with the worldly demands of corporate discipline—a discipline that was accepted by SOM uncritically and on its own terms. It was precisely this corporate discipline that was attacked by writers like David Riesman (The Lonely Crowd, 1950) and William H. Whyte (The Organisation Man, 1956), who saw the corporation as a dehumanized collective producing a new type of ‘other-directed’ character, nervously conforming to the opinions of (corporate) peers. These criticisms were markedly different from those of late-nineteenth-century German sociologists like Georg Simmel. Whereas for Simmel individualism (the blasé type) was a defensive mechanism developed to deal with the loss of community in an economy based on money, for pax americana: architecture in america 1945‒65 245</span><br data-dcnode-id="2673"><span data-dcnode-id="2672" instrument_node="">
</span><br data-dcnode-id="2671"><span data-dcnode-id="2670" instrument_node="">
Reisman and Whyte individualism was a primary American virtue, threatened by corporate conformism. The critique of corporatism was also mounted on a more political level. C. Wright Mills (The Power Elite, 1956) saw the signs of a new, insidious kind of totalitarianism in the very dispersal of power that was the essence of corporate capitalism—evident in the multiple links between the corporations, the military, and government. Mills’s pessimism was not shared, however, by fellow sociologist Talcott Parsons, for whom the web-like structure of modern political power was symptomatic of a well-performing, self-regulating social system that necessarily resulted in the sacriﬁce of the individual to the organic whole (see Systems theory, page 220).</span><br data-dcnode-id="2669"><span data-dcnode-id="2668" instrument_node="">

Beyond rationalism: desire and community The Case Study houses and the corporate architecture of SOM can be seen to have represented a sort of ideal moment when post-war political and technical optimism in America coincided with the cultural philosophy of a normative Modernist architecture. But there were commercial and industrial currents that threatened this ideology. A challenge to the cultural assumptions of mainstream Modernism had already been laid down in the late 1920s when the General Motors Corporation, breaking with the Fordist tradition, adapted their production cycle to allow for different rates of obsolescence: a slow one for the chassis, following the laws of technical evolution; a fast one for the body, following those of fashion.14 The introduction of ‘styling’ into the automobile industry set the pace for a whole generation of American industrial designers like Norman Bel Geddes, Raymond Loewy, and Henry Dreyfus, who sought to reconcile the Bauhaus principles of ‘good design’ with the demands of the market. Art theorist and teacher Georgy Kepes recommended applying the principles of Gestalt psychology to advertising to counteract the formlessness of modern life.15 Ernst Dichter in his book The Strategy of Desire (1960), spoke of the dual responsibility of the designer to understand the sociology and psychology of the public, and to uphold public taste.16 However, once the market had been accepted as a player in the culture of modernity it was obvious that the Werkbund–Bauhaus ideal of universal norms of taste for the whole design ﬁeld, from the commodity to the building, could not be sustained. This was abundantly clear to British Pop Artists such as Richard Hamilton who assimilated advertising to high art, making ironic use of the unconscious drives that champions of the Bauhaus tradition like Kepes sought to sublimate. At the architectural end of the spectrum, there were attempts to reintroduce into architecture the monumentality outlawed by main246 pax americana: architecture in america 1945‒65</span><br data-dcnode-id="2665"><span data-dcnode-id="2664" instrument_node="">

stream rationalism. The corporate work of SOM and Eero Saarinen was clearly rationalist in spirit, yet this did not prevent them introducing ‘symbolic’ buildings at the appropriate moment, as in SOM’s Expressionist chapel for the US Air Force Academy at Colorado Springs (1954–62). Indeed Saarinen became increasingly obsessed with the expression of the ‘character’ of each building. This can be seen in his auditorium and chapel at MIT (1950–5), in the dormitories at Yale University (1958–62), and in the TWA terminal at Idlewild (now JFK) Airport (1956–62) [171]. In the late 1950s many Modernist architects turned to neoPalladianism, including TAC (Gropius’s ﬁrm), Philip Johnson, John Johansen, Edward Durrell Stone [172], and Minoru Yamasaki. This often took the form of symmetrical plans and a ‘Pompeian’17 reading of</span><br data-dcnode-id="2653"><span data-dcnode-id="2652" instrument_node="">
