;url=https%3A//en.wikipedia.org/wiki/South_Kensington" title="South Kensington"><span data-dcnode-id="4553" instrument_node="">South Kensington</span></a><span data-dcnode-id="4551" instrument_node="">, where they received press attention and medals of commendation.</span><sup class="reference" data-dcnode-id="4548" id="cite_ref-FOOTNOTEMackail1901154–155Thompson195596–97MacCarthy1994179–181_68-0"><a data-dcnode-id="4549" href="#cite_note-FOOTNOTEMackail1901154%E2%80%93155Thompson195596%E2%80%9397MacCarthy1994179%E2%80%93181-68"><span data-dcnode-id="4550" instrument_node="">[68]</span></a></sup><span data-dcnode-id="4547" instrument_node=""> However, they faced much opposition from established design companies, particularly those belonging to the </span><a data-dcnode-id="4545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neoclassical_architecture" title="Neoclassical architecture"><span data-dcnode-id="4546" instrument_node="">Neo-Classical</span></a><span data-dcnode-id="4544" instrument_node=""> school.</span><sup class="reference" data-dcnode-id="4541" id="cite_ref-FOOTNOTEThompson195596_69-0"><a data-dcnode-id="4542" href="#cite_note-FOOTNOTEThompson195596-69"><span data-dcnode-id="4543" instrument_node="">[69]</span></a></sup><span data-dcnode-id="4540" instrument_node="">
</span></p><p data-dcnode-id="4515"><span data-dcnode-id="4538" instrument_node="">Although the Firm was becoming more successful, it did not generate large profits in its early years. Mackail suggests that as a result, the Morris family were placed under increasing financial strain as they attempted to retain the lavish lifestyle to which they had become accustomed.</span><sup class="reference" data-dcnode-id="4535" id="cite_ref-FOOTNOTEMackail1901162_70-0"><a data-dcnode-id="4536" href="#cite_note-FOOTNOTEMackail1901162-70"><span data-dcnode-id="4537" instrument_node="">[70]</span></a></sup><span data-dcnode-id="4534" instrument_node=""> Morris was also considering expanding operations at Upton by moving the Firm's workshops to the village. As part of this, he formulated a plan for a second wing of Red House to be constructed, to house the Burne-Jones family. Although Burne-Jones agreed and together they began to organise the design of the new house, these were disrupted when Georgiana contracted </span><a data-dcnode-id="4532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scarlet_fever" title="Scarlet fever"><span data-dcnode-id="4533" instrument_node="">scarlet fever</span></a><span data-dcnode-id="4531" instrument_node="">, resulting in the </span><a data-dcnode-id="4529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Miscarriage" title="Miscarriage"><span data-dcnode-id="4530" instrument_node="">miscarriage</span></a><span data-dcnode-id="4528" instrument_node=""> of her second child. The plans were subsequently scrapped.</span><sup class="reference" data-dcnode-id="4525" id="cite_ref-FOOTNOTEMackail1901162–163MacCarthy1994193–194Allen200122–23_71-0"><a data-dcnode-id="4526" href="#cite_note-FOOTNOTEMackail1901162%E2%80%93163MacCarthy1994193%E2%80%93194Allen200122%E2%80%9323-71"><span data-dcnode-id="4527" instrument_node="">[71]</span></a></sup><span data-dcnode-id="4524" instrument_node=""> It has been suggested that Burne-Jones may also have been loath to move from London at the time because his artistic career was becoming increasingly successful, and most of his contacts within the art world were in the city.</span><sup class="reference" data-dcnode-id="4521" id="cite_ref-FOOTNOTEAllen200123_72-0"><a data-dcnode-id="4522" href="#cite_note-FOOTNOTEAllen200123-72"><span data-dcnode-id="4523" instrument_node="">[72]</span></a></sup><span data-dcnode-id="4520" instrument_node=""> Morris was deeply disappointed with this, writing to Burne-Jones: "As to our palace of art, I confess your letter was a blow to me at first, though hardly an unexpected one: in short I cried, but I have got over it now; of course I see it from your point of view".</span><sup class="reference" data-dcnode-id="4517" id="cite_ref-FOOTNOTEMackail1901164MacCarthy1994195_73-0"><a data-dcnode-id="4518" href="#cite_note-FOOTNOTEMackail1901164MacCarthy1994195-73"><span data-dcnode-id="4519" instrument_node="">[73]</span></a></sup><span data-dcnode-id="4516" instrument_node="">
</span></p><span data-dcnode-id="4514" instrument_node="">
</span><h3 data-dcnode-id="4504"><span class="mw-headline" data-dcnode-id="4512" id="Leaving_Red_House:_1865"><span data-dcnode-id="4513" instrument_node="">Leaving Red House: 1865</span></span><span class="mw-editsection" data-dcnode-id="4505"><span class="mw-editsection-bracket" data-dcnode-id="4510"><span data-dcnode-id="4511" instrument_node="">[</span></span><a data-dcnode-id="4508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRed_House%2C_Bexleyheath%26action%3Dedit%26section%3D4" title="Edit section: Leaving Red House: 1865"><span data-dcnode-id="4509" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4506"><span data-dcnode-id="4507" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4503" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4494"><div class="thumbinner" data-dcnode-id="4495" style="width:202px;"><a class="image" data-dcnode-id="4501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AStained_glass_window_of_Love_at_Red_House.jpg"><img alt="" class="thumbimage" data-dcnode-id="4502" data-file-height="1865" data-file-width="1552" decoding="async" height="240" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/ae/Stained_glass_window_of_Love_at_Red_House.jpg/200px-Stained_glass_window_of_Love_at_Red_House.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/ae/Stained_glass_window_of_Love_at_Red_House.jpg/300px-Stained_glass_window_of_Love_at_Red_House.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/ae/Stained_glass_window_of_Love_at_Red_House.jpg/400px-Stained_glass_window_of_Love_at_Red_House.jpg 2x" width="200"></a><span data-dcnode-id="4500" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4496"><div class="magnify" data-dcnode-id="4498"><a class="internal" data-dcnode-id="4499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AStained_glass_window_of_Love_at_Red_House.jpg" title="Enlarge"></a></div><span data-dcnode-id="4497" instrument_node="">Stained-glass window on the theme of "Love" at Red House</span></div></div></div><span data-dcnode-id="4493" instrument_node="">
</span><p data-dcnode-id="4468"><span data-dcnode-id="4492" instrument_node="">With the collapse of his ideas regarding Upton becoming the base for the Firm's operations, Morris began to recognise various problems with the property.</span><sup class="reference" data-dcnode-id="4489" id="cite_ref-FOOTNOTEAllen200123_72-1"><a data-dcnode-id="4490" href="#cite_note-FOOTNOTEAllen200123-72"><span data-dcnode-id="4491" instrument_node="">[72]</span></a></sup><span data-dcnode-id="4488" instrument_node=""> Being north-facing, the interior of the house was cold during winter, which aggravated Morris' various medical conditions, and its isolated location made it difficult for doctors to visit.</span><sup class="reference" data-dcnode-id="4485" id="cite_ref-FOOTNOTEMackail1901163Allen200122_74-0"><a data-dcnode-id="4486" href="#cite_note-FOOTNOTEMackail1901163Allen200122-74"><span data-dcnode-id="4487" instrument_node="">[74]</span></a></sup><span data-dcnode-id="4484" instrument_node=""> The three-mile commute by carriage from the house to Abbey Wood railway station over an exposed and windy plateau further aggravated him,</span><sup class="reference" data-dcnode-id="4481" id="cite_ref-FOOTNOTEMackail1901164_75-0"><a data-dcnode-id="4482" href="#cite_note-FOOTNOTEMackail1901164-75"><span data-dcnode-id="4483" instrument_node="">[75]</span></a></sup><span data-dcnode-id="4480" instrument_node=""> as did the daily commute from Abbey Wood to the Firm's offices in Bloomsbury, which took up three to four hours a day.</span><sup class="reference" data-dcnode-id="4477" id="cite_ref-FOOTNOTEMacCarthy1994193Allen200122_76-0"><a data-dcnode-id="4478" href="#cite_note-FOOTNOTEMacCarthy1994193Allen200122-76"><span data-dcnode-id="4479" instrument_node="">[76]</span></a></sup><span data-dcnode-id="4476" instrument_node="">
Although various authors on the subject have asserted that there were financial considerations encouraging Morris to leave, it has been established that in 1865 Morris' </span><a class="mw-redirect" data-dcnode-id="4474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dividends" title="Dividends"><span data-dcnode-id="4475" instrument_node="">dividends</span></a><span data-dcnode-id="4473" instrument_node=""> from his shares were higher than at any point since 1857.</span><sup class="reference" data-dcnode-id="4470" id="cite_ref-FOOTNOTEAllen200121_77-0"><a data-dcnode-id="4471" href="#cite_note-FOOTNOTEAllen200121-77"><span data-dcnode-id="4472" instrument_node="">[77]</span></a></sup><span data-dcnode-id="4469" instrument_node="">
</span></p><p data-dcnode-id="4443"><span data-dcnode-id="4467" instrument_node="">Morris decided to move out of Red House and sell the property rather than rent it out, although no immediate purchaser appeared.</span><sup class="reference" data-dcnode-id="4464" id="cite_ref-FOOTNOTEMackail1901165MacCarthy1994196_78-0"><a data-dcnode-id="4465" href="#cite_note-FOOTNOTEMackail1901165MacCarthy1994196-78"><span data-dcnode-id="4466" instrument_node="">[78]</span></a></sup><span data-dcnode-id="4463" instrument_node=""> He moved with his family to </span><a class="mw-redirect" data-dcnode-id="4461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Queen_Square%2C_Bloomsbury" title="Queen Square, Bloomsbury"><span data-dcnode-id="4462" instrument_node="">Queen Square</span></a><span data-dcnode-id="4460" instrument_node=""> in Bloomsbury in autumn 1865.</span><sup class="reference" data-dcnode-id="4457" id="cite_ref-FOOTNOTEMacCarthy1994197_79-0"><a data-dcnode-id="4458" href="#cite_note-FOOTNOTEMacCarthy1994197-79"><span data-dcnode-id="4459" instrument_node="">[79]</span></a></sup><span data-dcnode-id="4456" instrument_node=""> Those pieces of furniture which proved too difficult to move to their new abode were left in Red House, where some of them are still present.</span><sup class="reference" data-dcnode-id="4453" id="cite_ref-FOOTNOTEMackail1901165_80-0"><a data-dcnode-id="4454" href="#cite_note-FOOTNOTEMackail1901165-80"><span data-dcnode-id="4455" instrument_node="">[80]</span></a></sup><span data-dcnode-id="4452" instrument_node="">  Morris never returned to visit the Red House, commenting that the sight of it would be too emotional for him.</span><sup class="reference" data-dcnode-id="4449" id="cite_ref-FOOTNOTEMackail1901165_80-1"><a data-dcnode-id="4450" href="#cite_note-FOOTNOTEMackail1901165-80"><span data-dcnode-id="4451" instrument_node="">[80]</span></a></sup><span data-dcnode-id="4448" instrument_node=""> Nevertheless, Mackail described the five years that Morris lived at Red House as being "probably the happiest and not the least fruitful of his life."</span><sup class="reference" data-dcnode-id="4445" id="cite_ref-FOOTNOTEMackail1901144_47-1"><a data-dcnode-id="4446" href="#cite_note-FOOTNOTEMackail1901144-47"><span data-dcnode-id="4447" instrument_node="">[47]</span></a></sup><span data-dcnode-id="4444" instrument_node="">
</span></p><span data-dcnode-id="4442" instrument_node="">
</span><h2 data-dcnode-id="4432"><span class="mw-headline" data-dcnode-id="4440" id="After_Morris"><span data-dcnode-id="4441" instrument_node="">After Morris</span></span><span class="mw-editsection" data-dcnode-id="4433"><span class="mw-editsection-bracket" data-dcnode-id="4438"><span data-dcnode-id="4439" instrument_node="">[</span></span><a data-dcnode-id="4436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRed_House%2C_Bexleyheath%26action%3Dedit%26section%3D5" title="Edit section: After Morris"><span data-dcnode-id="4437" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4434"><span data-dcnode-id="4435" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4431" instrument_node="">
</span><p data-dcnode-id="4409"><span data-dcnode-id="4430" instrument_node="">Morris had been unable to find a buyer for Red House, and agreed to let it for £95 per annum to a retired commander in the Indian Navy named James Arnold Heathcote (1827–1877), who moved into the house in spring 1866. Having served at the siege of </span><a data-dcnode-id="4428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Multan" title="Multan"><span data-dcnode-id="4429" instrument_node="">Multan</span></a><span data-dcnode-id="4427" instrument_node="">, Heathcote had gone on to become a specialist in maritime surveying, marrying Eliza Margarita Burton and with her having two children, Marion and Rennie. After retirement he returned to England, moving to Red House with two servants. They also purchased pieces of Morris' furniture that were in the house; two of Morris' chairs remained in the Heathcote family until 1997, when they were sold at </span><a data-dcnode-id="4425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christie%2527s" title="Christie's"><span data-dcnode-id="4426" instrument_node="">Christie's</span></a><span data-dcnode-id="4424" instrument_node=""> auction house in London to the </span><a data-dcnode-id="4422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Delaware_Art_Museum" title="Delaware Art Museum"><span data-dcnode-id="4423" instrument_node="">Delaware Art Museum</span></a><span data-dcnode-id="4421" instrument_node=""> in </span><a data-dcnode-id="4419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wilmington%2C_Delaware" title="Wilmington, Delaware"><span data-dcnode-id="4420" instrument_node="">Wilmington</span></a><span data-dcnode-id="4418" instrument_node="">.</span><sup class="reference" data-dcnode-id="4415" id="cite_ref-FOOTNOTEYoungs20111–5_81-0"><a data-dcnode-id="4416" href="#cite_note-FOOTNOTEYoungs20111%E2%80%935-81"><span data-dcnode-id="4417" instrument_node="">[81]</span></a></sup><span data-dcnode-id="4414" instrument_node=""> After Heathcote's death at the House, it was purchased from Morris by a wealthy stockbroker, Edmund Charlesworth (1831–1890), who lived there from 1879 to 1889 with his wife Marta and daughter Laura. The Charlesworth family decorated the house's studio with Morris' "Daisy" wallpaper, which remains in place to the present.</span><sup class="reference" data-dcnode-id="4411" id="cite_ref-FOOTNOTEYoungs20116–10_82-0"><a data-dcnode-id="4412" href="#cite_note-FOOTNOTEYoungs20116%E2%80%9310-82"><span data-dcnode-id="4413" instrument_node="">[82]</span></a></sup><span data-dcnode-id="4410" instrument_node="">
</span></p><span data-dcnode-id="4408" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="4399"><div class="thumbinner" data-dcnode-id="4400" style="width:222px;"><a class="image" data-dcnode-id="4406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUpstairs_at_the_Red_House%2C_Bexleyheath.jpg"><img alt="" class="thumbimage" data-dcnode-id="4407" data-file-height="2592" data-file-width="1552" decoding="async" height="367" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/01/Upstairs_at_the_Red_House%252C_Bexleyheath.jpg/220px-Upstairs_at_the_Red_House%252C_Bexleyheath.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/01/Upstairs_at_the_Red_House%2C_Bexleyheath.jpg/330px-Upstairs_at_the_Red_House%2C_Bexleyheath.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/01/Upstairs_at_the_Red_House%2C_Bexleyheath.jpg/440px-Upstairs_at_the_Red_House%2C_Bexleyheath.jpg 2x" width="220"></a><span data-dcnode-id="4405" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4401"><div class="magnify" data-dcnode-id="4403"><a class="internal" data-dcnode-id="4404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUpstairs_at_the_Red_House%2C_Bexleyheath.jpg" title="Enlarge"></a></div><span data-dcnode-id="4402" instrument_node="">The upstairs hallway at Red House</span></div></div></div><span data-dcnode-id="4398" instrument_node="">
</span><p data-dcnode-id="4365"><span data-dcnode-id="4397" instrument_node="">In 1889 Charlesworth sold the Red House for £2,900 to </span><a data-dcnode-id="4395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Holme" title="Charles Holme"><span data-dcnode-id="4396" instrument_node="">Charles Holme</span></a><span data-dcnode-id="4394" instrument_node=""> (1848–1923), who remained owner until 1903. Holme had become prosperous through a woollen business in </span><a data-dcnode-id="4392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bradford" title="Bradford"><span data-dcnode-id="4393" instrument_node="">Bradford</span></a><span data-dcnode-id="4391" instrument_node=""> before expanding into the Asian goods trade and by the 1880s he was employed as a buyer for the </span><a data-dcnode-id="4389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberty_%28department_store%29" title="Liberty (department store)"><span data-dcnode-id="4390" instrument_node="">Liberty</span></a><span data-dcnode-id="4388" instrument_node=""> department store. Married to Clara Benton, they had three daughters and a son, who moved with him to the House. Holme admired Morris, and it was here in 1893 that he founded the arts magazine, </span><a data-dcnode-id="4385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Studio_%28magazine%29" title="The Studio (magazine)"><i data-dcnode-id="4386"><span data-dcnode-id="4387" instrument_node="">The Studio</span></i></a><span data-dcnode-id="4384" instrument_node="">, which gave importance to the Arts and Crafts movement.</span><sup class="reference" data-dcnode-id="4381" id="cite_ref-FOOTNOTENational_Trust200313MercerEvans200835Youngs201111–18_83-0"><a data-dcnode-id="4382" href="#cite_note-FOOTNOTENational_Trust200313MercerEvans200835Youngs201111%E2%80%9318-83"><span data-dcnode-id="4383" instrument_node="">[83]</span></a></sup><span data-dcnode-id="4380" instrument_node=""> The earliest photographs of Red House date from the period in which it was occupied by Holme.</span><sup class="reference" data-dcnode-id="4377" id="cite_ref-FOOTNOTEYoungs201116_84-0"><a data-dcnode-id="4378" href="#cite_note-FOOTNOTEYoungs201116-84"><span data-dcnode-id="4379" instrument_node="">[84]</span></a></sup><span data-dcnode-id="4376" instrument_node=""> He also contributed to the development of the building by encouraging visitors to scratch their signatures into the window panes on the screen dividing the entrance hall from the gallery with either a diamond ring or glass-scratching implement. He collected over one hundred signatures here, from family members, friends, and visitors. Notable names include those of May Morris and Georgina Burne-Jones on their visit in 1897, and the names of Japanese visitors who were in London to collect a battleship docked on the </span><a data-dcnode-id="4374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/River_Thames" title="River Thames"><span data-dcnode-id="4375" instrument_node="">River Thames</span></a><span data-dcnode-id="4373" instrument_node="">; among the latter was the future Japanese Prime Minister </span><a data-dcnode-id="4371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sait%25C5%258D_Makoto" title="Saitō Makoto"><span data-dcnode-id="4372" instrument_node="">Saitō Makoto</span></a><span data-dcnode-id="4370" instrument_node="">. This would be a tradition continued by some of the later owners, with the latest engraving dating to 1952.</span><sup class="reference" data-dcnode-id="4367" id="cite_ref-FOOTNOTEMercerEvans200833–47Youngs201115–16_85-0"><a data-dcnode-id="4368" href="#cite_note-FOOTNOTEMercerEvans200833%E2%80%9347Youngs201115%E2%80%9316-85"><span data-dcnode-id="4369" instrument_node="">[85]</span></a></sup><span data-dcnode-id="4366" instrument_node="">
</span></p><p data-dcnode-id="4334"><span data-dcnode-id="4364" instrument_node="">In 1903 the House was purchased by Henry Muff (1850–1910), a draper from Bradford who lived there with his wife Maude and their son </span><a data-dcnode-id="4362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_Maufe" title="Edward Maufe"><span data-dcnode-id="4363" instrument_node="">Edward</span></a><span data-dcnode-id="4361" instrument_node="">, who later became a noted architect. The Muffs were social activists involved in a number of </span><a data-dcnode-id="4359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Progressivism" title="Progressivism"><span data-dcnode-id="4360" instrument_node="">progressive</span></a><span data-dcnode-id="4358" instrument_node=""> causes, with Maude being elected to Bexley Urban District Council in 1907, being the second woman in England to have been elected to a district council. In keeping with the fashions of the time, they introduced a lighter colour scheme throughout much of the House. Henry died at the house in 1910, although Maude continued to live there for another decade.</span><sup class="reference" data-dcnode-id="4355" id="cite_ref-FOOTNOTEYoungs201121–25National_Trust200313_86-0"><a data-dcnode-id="4356" href="#cite_note-FOOTNOTEYoungs201121%E2%80%9325National_Trust200313-86"><span data-dcnode-id="4357" instrument_node="">[86]</span></a></sup><span data-dcnode-id="4354" instrument_node=""> In 1920, she began renting the property to </span><a data-dcnode-id="4352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arthur_Sherwell" title="Arthur Sherwell"><span data-dcnode-id="4353" instrument_node="">Arthur James Sherwell</span></a><span data-dcnode-id="4351" instrument_node=""> (1863–1942), who had previously served as a </span><a data-dcnode-id="4349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberal_Party_%28UK%29" title="Liberal Party (UK)"><span data-dcnode-id="4350" instrument_node="">Liberal Party</span></a><span data-dcnode-id="4348" instrument_node=""> </span><a data-dcnode-id="4346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Member_of_parliament" title="Member of parliament"><span data-dcnode-id="4347" instrument_node="">Member of Parliament</span></a><span data-dcnode-id="4345" instrument_node=""> for </span><a data-dcnode-id="4343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Huddersfield_%28UK_Parliament_constituency%29" title="Huddersfield (UK Parliament constituency)"><span data-dcnode-id="4344" instrument_node="">Huddersfield</span></a><span data-dcnode-id="4342" instrument_node=""> from 1906 to 1918, positioning himself on the </span><a class="mw-redirect" data-dcnode-id="4340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radicalism_%28historical%29" title="Radicalism (historical)"><span data-dcnode-id="4341" instrument_node="">radical</span></a><span data-dcnode-id="4339" instrument_node=""> wing of the party. He moved to the House with his wife Amy Whadcoat, which they later purchased off of Maude Muff.</span><sup class="reference" data-dcnode-id="4336" id="cite_ref-FOOTNOTEYoungs201129–33_87-0"><a data-dcnode-id="4337" href="#cite_note-FOOTNOTEYoungs201129%E2%80%9333-87"><span data-dcnode-id="4338" instrument_node="">[87]</span></a></sup><span data-dcnode-id="4335" instrument_node="">
</span></p><p data-dcnode-id="4306"><span data-dcnode-id="4333" instrument_node="">In 1924, Sherwell sold Red House to Walter Scott Godfrey (1855–1936), the director of a wine and spirits merchant and an author on </span><a class="mw-redirect" data-dcnode-id="4331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anti-theism" title="Anti-theism"><span data-dcnode-id="4332" instrument_node="">anti-theism</span></a><span data-dcnode-id="4330" instrument_node=""> who had been widowed two years previously. Of all the property's residents, he would live there for the shortest time, although he carried out one of the largest alterations, by removing the dividing wall between the downstairs waiting room and bedroom to create a study-cum-library and inserted a porthole window between this library and the Pilgrims' Rest, which was designed by his son, the architect </span><a class="mw-redirect" data-dcnode-id="4328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Walter_Hindes_Godfrey" title="Walter Hindes Godfrey"><span data-dcnode-id="4329" instrument_node="">Walter Hindes Godfrey</span></a><span data-dcnode-id="4327" instrument_node="">. He lived at the house with his youngest daughter and three domestic servants, however he felt lonely at Red House and found its upkeep too expensive.</span><sup class="reference" data-dcnode-id="4324" id="cite_ref-FOOTNOTEYoungs201134–41_88-0"><a data-dcnode-id="4325" href="#cite_note-FOOTNOTEYoungs201134%E2%80%9341-88"><span data-dcnode-id="4326" instrument_node="">[88]</span></a></sup><span data-dcnode-id="4323" instrument_node=""> In 1927 an Australian, </span><a data-dcnode-id="4321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alfred_Horsfall" title="Alfred Horsfall"><span data-dcnode-id="4322" instrument_node="">Alfred Herbert Horsfall</span></a><span data-dcnode-id="4320" instrument_node=""> (1871–1944), purchased the house. A medical doctor, Horsfall had served as a medic in the British Army during the </span><a class="mw-redirect" data-dcnode-id="4318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_African_War" title="South African War"><span data-dcnode-id="4319" instrument_node="">South African War</span></a><span data-dcnode-id="4317" instrument_node="">, before moving to Britain and becoming a lecturer for the </span><a data-dcnode-id="4315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_and_Political_Education_League" title="Social and Political Education League"><span data-dcnode-id="4316" instrument_node="">Social and Political Education League</span></a><span data-dcnode-id="4314" instrument_node=""> and staunch apologist for the </span><a data-dcnode-id="4312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British_Empire" title="British Empire"><span data-dcnode-id="4313" instrument_node="">British Empire</span></a><span data-dcnode-id="4311" instrument_node="">. In the stock market crash of the early 1930s, Horsfall lost much of his money. He was unsuccessful in selling the House in 1932.</span><sup class="reference" data-dcnode-id="4308" id="cite_ref-FOOTNOTEYoungs201142–45_89-0"><a data-dcnode-id="4309" href="#cite_note-FOOTNOTEYoungs201142%E2%80%9345-89"><span data-dcnode-id="4310" instrument_node="">[89]</span></a></sup><span data-dcnode-id="4307" instrument_node="">
</span></p><span data-dcnode-id="4305" instrument_node="">
</span><h3 data-dcnode-id="4294"><span data-dcnode-id="4304" id="Threats_and_the_Hollambys:_1934.E2.80.932002"></span><span class="mw-headline" data-dcnode-id="4302" id="Threats_and_the_Hollambys:_1934–2002"><span data-dcnode-id="4303" instrument_node="">Threats and the Hollambys: 1934–2002</span></span><span class="mw-editsection" data-dcnode-id="4295"><span class="mw-editsection-bracket" data-dcnode-id="4300"><span data-dcnode-id="4301" instrument_node="">[</span></span><a data-dcnode-id="4298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRed_House%2C_Bexleyheath%26action%3Dedit%26section%3D6" title="Edit section: Threats and the Hollambys: 1934–2002"><span data-dcnode-id="4299" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4296"><span data-dcnode-id="4297" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4293" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4284"><div class="thumbinner" data-dcnode-id="4285" style="width:222px;"><a class="image" data-dcnode-id="4291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARed_House_window_detail.JPG"><img alt="" class="thumbimage" data-dcnode-id="4292" data-file-height="960" data-file-width="1365" decoding="async" height="155" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/00/Red_House_window_detail.JPG/220px-Red_House_window_detail.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/00/Red_House_window_detail.JPG/330px-Red_House_window_detail.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/00/Red_House_window_detail.JPG/440px-Red_House_window_detail.JPG 2x" width="220"></a><span data-dcnode-id="4290" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4286"><div class="magnify" data-dcnode-id="4288"><a class="internal" data-dcnode-id="4289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARed_House_window_detail.JPG" title="Enlarge"></a></div><span data-dcnode-id="4287" instrument_node="">Window detail in Red House</span></div></div></div><span data-dcnode-id="4283" instrument_node="">
</span><p data-dcnode-id="4231"><span data-dcnode-id="4282" instrument_node="">Horsfall attempted to sell the house again in 1934, this time with </span><a class="mw-redirect" data-dcnode-id="4280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harrod%2527s" title="Harrod's"><span data-dcnode-id="4281" instrument_node="">Harrod's</span></a><span data-dcnode-id="4279" instrument_node="">; he put forward an asking price of £4,000.</span><sup class="reference" data-dcnode-id="4276" id="cite_ref-FOOTNOTEMarsh20057Youngs201145_90-0"><a data-dcnode-id="4277" href="#cite_note-FOOTNOTEMarsh20057Youngs201145-90"><span data-dcnode-id="4278" instrument_node="">[90]</span></a></sup><span data-dcnode-id="4275" instrument_node=""> Many believed that the house would be demolished to make way for encroaching suburban development, so a campaign group emerged with the hope of preserving the house and donating it to The National Trust; founding a preservation committee, they launched an appeal to purchase the property, with Horsfall agreeing that he would be willing to sell it to them for £3,100. The group sought to raise this amount, gaining the support of writers like </span><a data-dcnode-id="4273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rudyard_Kipling" title="Rudyard Kipling"><span data-dcnode-id="4274" instrument_node="">Rudyard Kipling</span></a><span data-dcnode-id="4272" instrument_node="">, </span><a data-dcnode-id="4270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Bernard_Shaw" title="George Bernard Shaw"><span data-dcnode-id="4271" instrument_node="">George Bernard Shaw</span></a><span data-dcnode-id="4269" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/H.G._Wells" title="H.G. Wells"><span data-dcnode-id="4268" instrument_node="">H.G. Wells</span></a><span data-dcnode-id="4266" instrument_node="">, and </span><a data-dcnode-id="4264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Masefield" title="John Masefield"><span data-dcnode-id="4265" instrument_node="">John Masefield</span></a><span data-dcnode-id="4263" instrument_node="">, and architects </span><a data-dcnode-id="4261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edwin_Lutyens" title="Edwin Lutyens"><span data-dcnode-id="4262" instrument_node="">Edwin Lutyens</span></a><span data-dcnode-id="4260" instrument_node="">, </span><a data-dcnode-id="4258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Giles_Gilbert_Scott" title="Giles Gilbert Scott"><span data-dcnode-id="4259" instrument_node="">Giles Gilbert Scott</span></a><span data-dcnode-id="4257" instrument_node="">, </span><a data-dcnode-id="4255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Herbert_Baker" title="Herbert Baker"><span data-dcnode-id="4256" instrument_node="">Herbert Baker</span></a><span data-dcnode-id="4254" instrument_node="">, and </span><a data-dcnode-id="4252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Raymond_Unwin" title="Raymond Unwin"><span data-dcnode-id="4253" instrument_node="">Raymond Unwin</span></a><span data-dcnode-id="4251" instrument_node="">, as well as the former Prime Minister </span><a data-dcnode-id="4249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ramsay_MacDonald" title="Ramsay MacDonald"><span data-dcnode-id="4250" instrument_node="">Ramsay MacDonald</span></a><span data-dcnode-id="4248" instrument_node="">.</span><sup class="reference" data-dcnode-id="4245" id="cite_ref-FOOTNOTEMarsh20057,_9Youngs201145_91-0"><a data-dcnode-id="4246" href="#cite_note-FOOTNOTEMarsh20057,_9Youngs201145-91"><span data-dcnode-id="4247" instrument_node="">[91]</span></a></sup><span data-dcnode-id="4244" instrument_node="">
They asserted that "We realise that at the present time the public are interested in other and very different movements in architecture and industrial art. We are however confident that, for the sake of its association with the work of William Morris and his group, the importance of this house will be appreciated in the future, and its loss in this regard will be recognised as irreparable."</span><sup class="reference" data-dcnode-id="4241" id="cite_ref-FOOTNOTEMarsh20057,_9_92-0"><a data-dcnode-id="4242" href="#cite_note-FOOTNOTEMarsh20057,_9-92"><span data-dcnode-id="4243" instrument_node="">[92]</span></a></sup><span data-dcnode-id="4240" instrument_node=""> By December 1934, the committee's appeal had only raised £550 and the Trust were unwilling to foot the rest of the bill. The committee returned the donations that had been offered.</span><sup class="reference" data-dcnode-id="4237" id="cite_ref-FOOTNOTEMarsh20059Youngs201145_93-0"><a data-dcnode-id="4238" href="#cite_note-FOOTNOTEMarsh20059Youngs201145-93"><span data-dcnode-id="4239" instrument_node="">[93]</span></a></sup><span data-dcnode-id="4236" instrument_node=""> On learning of this, May Morris commented that "That beautiful house is fated to have bad luck, it seems!"</span><sup class="reference" data-dcnode-id="4233" id="cite_ref-FOOTNOTEMarsh20059_94-0"><a data-dcnode-id="4234" href="#cite_note-FOOTNOTEMarsh20059-94"><span data-dcnode-id="4235" instrument_node="">[94]</span></a></sup><span data-dcnode-id="4232" instrument_node="">
</span></p><p data-dcnode-id="4180"><span data-dcnode-id="4230" instrument_node="">The House was purchased by a local estate agent, Thomas Curtis Hills (c.1883–1957), in 1935. Aware of the threats posed to the house, he moved into it with his wife, Beatrice Nellie Foster.</span><sup class="reference" data-dcnode-id="4227" id="cite_ref-FOOTNOTEYoungs201149–52_95-0"><a data-dcnode-id="4228" href="#cite_note-FOOTNOTEYoungs201149%E2%80%9352-95"><span data-dcnode-id="4229" instrument_node="">[95]</span></a></sup><span data-dcnode-id="4226" instrument_node=""> In 1941, amid the </span><a class="mw-redirect" data-dcnode-id="4224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_World_War" title="Second World War"><span data-dcnode-id="4225" instrument_node="">Second World War</span></a><span data-dcnode-id="4223" instrument_node="">, the government's </span><a class="mw-redirect" data-dcnode-id="4221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Assistance_Board" title="Assistance Board"><span data-dcnode-id="4222" instrument_node="">Assistance Board</span></a><span data-dcnode-id="4220" instrument_node=""> took control of the house's ground floor, using it as an office to aid those left homeless by </span><a data-dcnode-id="4218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Blitz" title="The Blitz"><span data-dcnode-id="4219" instrument_node="">The Blitz</span></a><span data-dcnode-id="4217" instrument_node="">.</span><sup class="reference" data-dcnode-id="4214" id="cite_ref-FOOTNOTEYoungs201150National_Trust200313_96-0"><a data-dcnode-id="4215" href="#cite_note-FOOTNOTEYoungs201150National_Trust200313-96"><span data-dcnode-id="4216" instrument_node="">[96]</span></a></sup><span data-dcnode-id="4213" instrument_node=""> Commenting on this situation, a visitor to the building, Prime Minister of New Zealand </span><a data-dcnode-id="4211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peter_Fraser" title="Peter Fraser"><span data-dcnode-id="4212" instrument_node="">Peter Fraser</span></a><span data-dcnode-id="4210" instrument_node="">, stated that "I think Morris would be pleased to know that a house of his is being used for such a purpose. The house is being devoted to the service of the people and Morris was for the people all the time."</span><sup class="reference" data-dcnode-id="4207" id="cite_ref-FOOTNOTEYoungs201150–51_97-0"><a data-dcnode-id="4208" href="#cite_note-FOOTNOTEYoungs201150%E2%80%9351-97"><span data-dcnode-id="4209" instrument_node="">[97]</span></a></sup><span data-dcnode-id="4206" instrument_node=""> An </span><a data-dcnode-id="4204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Air_raid_shelter" title="Air raid shelter"><span data-dcnode-id="4205" instrument_node="">air raid shelter</span></a><span data-dcnode-id="4203" instrument_node=""> was constructed in the House's gardens for the use of the Assistance Board's staff.</span><sup class="reference" data-dcnode-id="4200" id="cite_ref-FOOTNOTEYoungs201152_98-0"><a data-dcnode-id="4201" href="#cite_note-FOOTNOTEYoungs201152-98"><span data-dcnode-id="4202" instrument_node="">[98]</span></a></sup><span data-dcnode-id="4199" instrument_node=""> After the war, the House had fallen into a poor state and the Hills were keen to sell it. In 1950, they unsuccessfully attempted to sell it to the National Trust and then the </span><a data-dcnode-id="4197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Labour_Party_%28UK%29" title="Labour Party (UK)"><span data-dcnode-id="4198" instrument_node="">Labour Party</span></a><span data-dcnode-id="4196" instrument_node="">, before offering it for £5,000 to anyone "willing to preserve it for the nation".</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4189" style="white-space:nowrap;"><span data-dcnode-id="4195" instrument_node="">[</span><i data-dcnode-id="4191"><a data-dcnode-id="4192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4193" title="This claim needs references to reliable sources. (May 2017)"><span data-dcnode-id="4194" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4190" instrument_node="">]</span></sup><span data-dcnode-id="4188" instrument_node=""> The same year, it was designated a Grade I [listed building] by </span><a data-dcnode-id="4186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Historic_England" title="Historic England"><span data-dcnode-id="4187" instrument_node="">English Heritage</span></a><span data-dcnode-id="4185" instrument_node="">.</span><sup class="reference" data-dcnode-id="4182" id="cite_ref-99"><a data-dcnode-id="4183" href="#cite_note-99"><span data-dcnode-id="4184" instrument_node="">[99]</span></a></sup><span data-dcnode-id="4181" instrument_node="">
</span></p><p data-dcnode-id="4171"><span data-dcnode-id="4179" instrument_node="">The couple moved out of the building in early 1951, and it was left empty for over a year; it was purchased for £3,500 by Richard "Dick" Toms (1914–2005) and </span><a data-dcnode-id="4177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_Hollamby" title="Edward Hollamby"><span data-dcnode-id="4178" instrument_node="">Edward "Ted" Hollamby</span></a><span data-dcnode-id="4176" instrument_node=""> (1921–1999) in 1952.</span><sup class="reference" data-dcnode-id="4173" id="cite_ref-FOOTNOTEYoungs201152–53_100-0"><a data-dcnode-id="4174" href="#cite_note-FOOTNOTEYoungs201152%E2%80%9353-100"><span data-dcnode-id="4175" instrument_node="">[100]</span></a></sup><span data-dcnode-id="4172" instrument_node="">
</span></p><span data-dcnode-id="4170" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="4158"><div class="thumbinner" data-dcnode-id="4159" style="width:222px;"><a class="image" data-dcnode-id="4168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABlue_plaque_outside_Red_House.jpg"><img alt="" class="thumbimage" data-dcnode-id="4169" data-file-height="739" data-file-width="855" decoding="async" height="190" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/19/Blue_plaque_outside_Red_House.jpg/220px-Blue_plaque_outside_Red_House.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/19/Blue_plaque_outside_Red_House.jpg/330px-Blue_plaque_outside_Red_House.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/19/Blue_plaque_outside_Red_House.jpg/440px-Blue_plaque_outside_Red_House.jpg 2x" width="220"></a><span data-dcnode-id="4167" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4160"><div class="magnify" data-dcnode-id="4165"><a class="internal" data-dcnode-id="4166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABlue_plaque_outside_Red_House.jpg" title="Enlarge"></a></div><span data-dcnode-id="4164" instrument_node="">The </span><a data-dcnode-id="4162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blue_plaque" title="Blue plaque"><span data-dcnode-id="4163" instrument_node="">blue plaque</span></a><span data-dcnode-id="4161" instrument_node=""> erected outside the House</span></div></div></div><span data-dcnode-id="4157" instrument_node="">
</span><p data-dcnode-id="4135"><span data-dcnode-id="4156" instrument_node="">Both architects working for the </span><a data-dcnode-id="4154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/London_County_Council" title="London County Council"><span data-dcnode-id="4155" instrument_node="">London County Council</span></a><span data-dcnode-id="4153" instrument_node="">, Toms and Hollamby had a keen interest in Morris and embraced his socialist ideals, being members of the </span><a data-dcnode-id="4151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Campaign_for_Nuclear_Disarmament" title="Campaign for Nuclear Disarmament"><span data-dcnode-id="4152" instrument_node="">Campaign for Nuclear Disarmament</span></a><span data-dcnode-id="4150" instrument_node=""> and the </span><a data-dcnode-id="4148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British-Soviet_Friendship_Society" title="British-Soviet Friendship Society"><span data-dcnode-id="4149" instrument_node="">British-Soviet Friendship Society</span></a><span data-dcnode-id="4147" instrument_node="">. Deciding to share the property between themselves, they were only able to afford a </span><a class="mw-redirect" data-dcnode-id="4145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mortgage" title="Mortgage"><span data-dcnode-id="4146" instrument_node="">mortgage</span></a><span data-dcnode-id="4144" instrument_node=""> with the aid of a loan from Toms' father-in-law; he only agreed to provide the loan if the house was owned in Toms' name, and thus Hollamby became Toms' tenant. Both architects had wives – Mary Toms and Doris Hollamby – and children, and thus both families moved into the building in 1952, dividing the rooms among themselves, with the old kitchen being used as a communal dining room. In 1954, a third architect, David Gregory Jones, joined them at the House, and together they set about renovating much of the property.</span><sup class="reference" data-dcnode-id="4141" id="cite_ref-FOOTNOTEYoungs201153–55National_Trust200313_101-0"><a data-dcnode-id="4142" href="#cite_note-FOOTNOTEYoungs201153%E2%80%9355National_Trust200313-101"><span data-dcnode-id="4143" instrument_node="">[101]</span></a></sup><span data-dcnode-id="4140" instrument_node=""> In 1957 the Toms moved out, desiring to live closer to central London, and they were replaced by Jean and David Macdonald; Jean was an architect who worked alongside Ted Hollamby, while David was an accountant and woodworker. Rearranging the former ownership arrangements, the Macdonalds and Hollambys agreed to legally own half of the property each. However, in 1964 the Macdonalds left and the Hollambys assumed sole ownership of the House.</span><sup class="reference" data-dcnode-id="4137" id="cite_ref-FOOTNOTEYoungs201156–57National_Trust200313_102-0"><a data-dcnode-id="4138" href="#cite_note-FOOTNOTEYoungs201156%E2%80%9357National_Trust200313-102"><span data-dcnode-id="4139" instrument_node="">[102]</span></a></sup><span data-dcnode-id="4136" instrument_node="">
</span></p><p data-dcnode-id="4115"><span data-dcnode-id="4134" instrument_node="">In 1953, the newly founded </span><a data-dcnode-id="4132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Morris_Society" title="William Morris Society"><span data-dcnode-id="4133" instrument_node="">William Morris Society</span></a><span data-dcnode-id="4131" instrument_node=""> held its inaugural meeting at Red House, subsequently holding a garden party there in 1960 to commemorate its centenary.</span><sup class="reference" data-dcnode-id="4128" id="cite_ref-FOOTNOTEYoungs201156_103-0"><a data-dcnode-id="4129" href="#cite_note-FOOTNOTEYoungs201156-103"><span data-dcnode-id="4130" instrument_node="">[103]</span></a></sup><span data-dcnode-id="4127" instrument_node=""> After his retirement in 1985, Ted Hollamby decided to open the House up to visitors, offering guided tours on one Sunday per month. As the number of those attending such tours grew, especially in the 1996 centenary of Morris' death, Hollamby began to search for a way of securing future public access. In 1998 he helped to establish the Friends of Red House, a group of individuals who were largely members of the </span><a class="new" data-dcnode-id="4125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DBexley_Civic_Society%26action%3Dedit%26redlink%3D1" title="Bexley Civic Society (page does not exist)"><span data-dcnode-id="4126" instrument_node="">Bexley Civic Society</span></a><span data-dcnode-id="4124" instrument_node="">, and who helped to maintain the House and its gardens as well as give tours to visitors.</span><sup class="reference" data-dcnode-id="4121" id="cite_ref-FOOTNOTEYoungs201158–59_104-0"><a data-dcnode-id="4122" href="#cite_note-FOOTNOTEYoungs201158%E2%80%9359-104"><span data-dcnode-id="4123" instrument_node="">[104]</span></a></sup><span data-dcnode-id="4120" instrument_node=""> Hollamby died in 1999, and his wife left Red House to move to a care home in 2002. </span><sup class="reference" data-dcnode-id="4117" id="cite_ref-FOOTNOTEYoungs201159–60_105-0"><a data-dcnode-id="4118" href="#cite_note-FOOTNOTEYoungs201159%E2%80%9360-105"><span data-dcnode-id="4119" instrument_node="">[105]</span></a></sup><span data-dcnode-id="4116" instrument_node="">
</span></p><span data-dcnode-id="4114" instrument_node="">
</span><h3 data-dcnode-id="4104"><span class="mw-headline" data-dcnode-id="4112" id="The_National_Trust"><span data-dcnode-id="4113" instrument_node="">The National Trust</span></span><span class="mw-editsection" data-dcnode-id="4105"><span class="mw-editsection-bracket" data-dcnode-id="4110"><span data-dcnode-id="4111" instrument_node="">[</span></span><a data-dcnode-id="4108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRed_House%2C_Bexleyheath%26action%3Dedit%26section%3D7" title="Edit section: The National Trust"><span data-dcnode-id="4109" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4106"><span data-dcnode-id="4107" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4103" instrument_node="">
</span><p data-dcnode-id="4074"><span data-dcnode-id="4102" instrument_node="">After Doris Hollamby put the house up for sale, an anonymous benefactor purchased it and donated it to The National Trust, who completed the purchase in 2003, with the Friends of Red House continuing to organise tours.</span><sup class="reference" data-dcnode-id="4099" id="cite_ref-FOOTNOTEYoungs201159–60National_Trust200313_106-0"><a data-dcnode-id="4100" href="#cite_note-FOOTNOTEYoungs201159%E2%80%9360National_Trust200313-106"><span data-dcnode-id="4101" instrument_node="">[106]</span></a></sup><span data-dcnode-id="4098" instrument_node=""> Contributions from the William Morris Society and </span><a data-dcnode-id="4096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bexley_London_Borough_Council" title="Bexley London Borough Council"><span data-dcnode-id="4097" instrument_node="">Bexley Council</span></a><span data-dcnode-id="4095" instrument_node=""> also aided the Trust in purchasing the building.</span><sup class="reference" data-dcnode-id="4092" id="cite_ref-FOOTNOTENational_Trust200313_107-0"><a data-dcnode-id="4093" href="#cite_note-FOOTNOTENational_Trust200313-107"><span data-dcnode-id="4094" instrument_node="">[107]</span></a></sup><span data-dcnode-id="4091" instrument_node=""> It has since performed further restoration and research to restore the house as much as possible to its original condition.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4084" style="white-space:nowrap;"><span data-dcnode-id="4090" instrument_node="">[</span><i data-dcnode-id="4086"><a data-dcnode-id="4087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4088" title="This claim needs references to reliable sources. (July 2014)"><span data-dcnode-id="4089" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4085" instrument_node="">]</span></sup><span data-dcnode-id="4083" instrument_node=""> The house is open to the public, but not every day; guided tours must be advance-booked and unguided visits are available for limited periods. There is a tea room with a gift shop.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4076" style="white-space:nowrap;"><span data-dcnode-id="4082" instrument_node="">[</span><i data-dcnode-id="4078"><a data-dcnode-id="4079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4080" title="This claim needs references to reliable sources. (June 2014)"><span data-dcnode-id="4081" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4077" instrument_node="">]</span></sup><span data-dcnode-id="4075" instrument_node="">
</span></p><p data-dcnode-id="4065"><span data-dcnode-id="4073" instrument_node="">In November 2004, the National Trust organised a seminar titled "Red House: Past and Future Lives" at the </span><a data-dcnode-id="4071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Art_Workers%2527_Guild" title="Art Workers' Guild"><span data-dcnode-id="4072" instrument_node="">Art Workers' Guild</span></a><span data-dcnode-id="4070" instrument_node=""> at which various specialists in the house presented papers on the subject.</span><sup class="reference" data-dcnode-id="4067" id="cite_ref-FOOTNOTEParry200686–87_108-0"><a data-dcnode-id="4068" href="#cite_note-FOOTNOTEParry200686%E2%80%9387-108"><span data-dcnode-id="4069" instrument_node="">[108]</span></a></sup><span data-dcnode-id="4066" instrument_node="">
</span></p><p data-dcnode-id="4056"><span data-dcnode-id="4064" instrument_node="">In 2013, a previously unknown mural depicting five figures from the </span><a data-dcnode-id="4062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Book_of_Genesis" title="Book of Genesis"><span data-dcnode-id="4063" instrument_node="">Book of Genesis</span></a><span data-dcnode-id="4061" instrument_node=""> was discovered in Morris' bedroom at the house. It was believed that it resembled the joint work of Morris, Burne-Jones, Rossetti, Siddal, and Ford Madox Brown; as a result, the building's property manager James Breslin described the mural as being "of international significance".</span><sup class="reference" data-dcnode-id="4058" id="cite_ref-FOOTNOTEKennedy2013Legge2013_109-0"><a data-dcnode-id="4059" href="#cite_note-FOOTNOTEKennedy2013Legge2013-109"><span data-dcnode-id="4060" instrument_node="">[109]</span></a></sup><span data-dcnode-id="4057" instrument_node="">
</span></p><span data-dcnode-id="4055" instrument_node="">
