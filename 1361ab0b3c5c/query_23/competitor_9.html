cnode-id="5452" style="background-color:#ededed"><span data-dcnode-id="5453" instrument_node="">Design and construction</span></th></tr><tr data-dcnode-id="5436"><th class="infobox-label" data-dcnode-id="5449" scope="row"><span data-dcnode-id="5450" instrument_node="">Architect</span></th><td class="infobox-data" data-dcnode-id="5437"><div class="plainlist" data-dcnode-id="5438"><span data-dcnode-id="5448" instrument_node="">

</span><p data-dcnode-id="5395"><b data-dcnode-id="5409"><span data-dcnode-id="5410" instrument_node="">Red House</span></b><span data-dcnode-id="5408" instrument_node=""> is a significant </span><a data-dcnode-id="5406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arts_and_Crafts_movement" title="Arts and Crafts movement"><span data-dcnode-id="5407" instrument_node="">Arts and Crafts</span></a><span data-dcnode-id="5405" instrument_node=""> building located in </span><a data-dcnode-id="5403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bexleyheath" title="Bexleyheath"><span data-dcnode-id="5404" instrument_node="">Bexleyheath</span></a><span data-dcnode-id="5402" instrument_node="">, south-east London, England. Co-designed in 1859 by the architect </span><a data-dcnode-id="5400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philip_Webb" title="Philip Webb"><span data-dcnode-id="5401" instrument_node="">Philip Webb</span></a><span data-dcnode-id="5399" instrument_node=""> and the designer </span><a data-dcnode-id="5397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Morris" title="William Morris"><span data-dcnode-id="5398" instrument_node="">William Morris</span></a><span data-dcnode-id="5396" instrument_node="">, it was created to serve as a family home for Morris. Construction was completed in 1860.
</span></p><p data-dcnode-id="5378"><span data-dcnode-id="5394" instrument_node="">Following an education at the </span><a data-dcnode-id="5392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/University_of_Oxford" title="University of Oxford"><span data-dcnode-id="5393" instrument_node="">University of Oxford</span></a><span data-dcnode-id="5391" instrument_node="">, Morris decided to construct a rural house for himself and his new wife, </span><a data-dcnode-id="5389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jane_Morris" title="Jane Morris"><span data-dcnode-id="5390" instrument_node="">Jane Morris</span></a><span data-dcnode-id="5388" instrument_node="">, within a commuting distance of central London. Purchasing a plot of land in what at the time was the village of Upton in </span><a data-dcnode-id="5386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kent" title="Kent"><span data-dcnode-id="5387" instrument_node="">Kent</span></a><span data-dcnode-id="5385" instrument_node="">, he employed his friend Webb to help him design and construct the house, financing the project with money inherited from his wealthy family. Morris was deeply influenced by </span><a data-dcnode-id="5383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Medievalism" title="Medievalism"><span data-dcnode-id="5384" instrument_node="">Medievalism</span></a><span data-dcnode-id="5382" instrument_node=""> and Medieval-inspired </span><a data-dcnode-id="5380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gothic_Revival_architecture" title="Gothic Revival architecture"><span data-dcnode-id="5381" instrument_node="">Neo-Gothic</span></a><span data-dcnode-id="5379" instrument_node=""> styles are reflected throughout the building's design. It was constructed using Morris' ethos of craftsmanship and artisan skills and is an early example of what came to be known as the Arts and Crafts movement.
</span></p><p data-dcnode-id="5358"><span data-dcnode-id="5377" instrument_node="">A number of Morris' friends visited, most notably the </span><a class="mw-redirect" data-dcnode-id="5375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pre-Raphaelite" title="Pre-Raphaelite"><span data-dcnode-id="5376" instrument_node="">Pre-Raphaelite</span></a><span data-dcnode-id="5374" instrument_node=""> painters </span><a data-dcnode-id="5372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_Burne-Jones" title="Edward Burne-Jones"><span data-dcnode-id="5373" instrument_node="">Edward Burne-Jones</span></a><span data-dcnode-id="5371" instrument_node=""> and </span><a data-dcnode-id="5369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dante_Gabriel_Rossetti" title="Dante Gabriel Rossetti"><span data-dcnode-id="5370" instrument_node="">Dante Gabriel Rossetti</span></a><span data-dcnode-id="5368" instrument_node="">, both of whom aided him in decorating the House; various Burne-Jones wall murals remain. While at Red House, Morris was involved in the formation of his design company, </span><a data-dcnode-id="5366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Morris_%2526_Co." title="Morris &amp; Co."><span data-dcnode-id="5367" instrument_node="">Morris, Marshall, Faulkner &amp; Co.</span></a><span data-dcnode-id="5365" instrument_node="">, and embarked on his earliest wallpaper designs. It was also here that his two daughters, Jenny and May, were born. Although initially intending to live there for the rest of his life, Morris found that the house proved too expensive to run and did not suit his lifestyle. After five years, he moved his family to a flat in </span><a data-dcnode-id="5363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Queen_Square%2C_London" title="Queen Square, London"><span data-dcnode-id="5364" instrument_node="">Queen Square</span></a><span data-dcnode-id="5362" instrument_node="">, </span><a data-dcnode-id="5360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bloomsbury" title="Bloomsbury"><span data-dcnode-id="5361" instrument_node="">Bloomsbury</span></a><span data-dcnode-id="5359" instrument_node=""> and sold the property. 
</span></p><p data-dcnode-id="5344"><span data-dcnode-id="5357" instrument_node="">Red House remained a private residence for various individuals from 1866 until 2002, during which period various alterations were made to the interior design. In 1950 it was designated a Grade I </span><a data-dcnode-id="5355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Listed_building" title="Listed building"><span data-dcnode-id="5356" instrument_node="">listed building</span></a><span data-dcnode-id="5354" instrument_node=""> by </span><a data-dcnode-id="5352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Historic_England" title="Historic England"><span data-dcnode-id="5353" instrument_node="">English Heritage</span></a><span data-dcnode-id="5351" instrument_node="">. From 1952 to 1999 the architect </span><a data-dcnode-id="5349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_Hollamby" title="Edward Hollamby"><span data-dcnode-id="5350" instrument_node="">Edward Hollamby</span></a><span data-dcnode-id="5348" instrument_node=""> lived at the House, initiating attempts at preservation and establishing the Friends of Red House charity in 1998. In 2003, the </span><a data-dcnode-id="5346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Trust" title="National Trust"><span data-dcnode-id="5347" instrument_node="">National Trust</span></a><span data-dcnode-id="5345" instrument_node=""> purchased the property, undertaking a project of conservation and maintaining it as a visitor attraction with an accompanying tea room and gift shop.
</span></p><span data-dcnode-id="5343" instrument_node="">

</span><table class="box-Expand_section plainlinks metadata ambox mbox-small-left ambox-content" data-dcnode-id="5191" role="presentation"><tbody data-dcnode-id="5192"><tr data-dcnode-id="5193"><td class="mbox-image" data-dcnode-id="5209"><a class="image" data-dcnode-id="5210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWiki_letter_w_cropped.svg"><img alt="[icon]" data-dcnode-id="5211" data-file-height="31" data-file-width="44" decoding="async" height="14" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/1c/Wiki_letter_w_cropped.svg/20px-Wiki_letter_w_cropped.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/1c/Wiki_letter_w_cropped.svg/30px-Wiki_letter_w_cropped.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/1c/Wiki_letter_w_cropped.svg/40px-Wiki_letter_w_cropped.svg.png 2x" width="20"></a></td><td class="mbox-text" data-dcnode-id="5194"><div class="mbox-text-span" data-dcnode-id="5195"><span data-dcnode-id="5208" instrument_node="">This section </span><b data-dcnode-id="5206"><span data-dcnode-id="5207" instrument_node="">needs expansion</span></b><span data-dcnode-id="5205" instrument_node=""> with: biographical information on the early life of Philip Webb. You can help by </span><a class="external text" data-dcnode-id="5203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRed_House%2C_Bexleyheath%26action%3Dedit%26section%3D"><span data-dcnode-id="5204" instrument_node="">adding to it</span></a><span data-dcnode-id="5202" instrument_node="">.  </span><span class="date-container" data-dcnode-id="5196"><i data-dcnode-id="5197"><span data-dcnode-id="5201" instrument_node="">(</span><span class="date" data-dcnode-id="5199"><span data-dcnode-id="5200" instrument_node="">July 2014</span></span><span data-dcnode-id="5198" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="5190" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5181"><div class="thumbinner" data-dcnode-id="5182" style="width:222px;"><a class="image" data-dcnode-id="5188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWmmorris3248.jpg"><img alt="" class="thumbimage" data-dcnode-id="5189" data-file-height="585" data-file-width="416" decoding="async" height="309" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/fa/Wmmorris3248.jpg/220px-Wmmorris3248.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/fa/Wmmorris3248.jpg/330px-Wmmorris3248.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/f/fa/Wmmorris3248.jpg 2x" width="220"></a><span data-dcnode-id="5187" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5183"><div class="magnify" data-dcnode-id="5185"><a class="internal" data-dcnode-id="5186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWmmorris3248.jpg" title="Enlarge"></a></div><span data-dcnode-id="5184" instrument_node="">Photograph of William Morris</span></div></div></div><span data-dcnode-id="5180" instrument_node="">
</span><p data-dcnode-id="5105"><span data-dcnode-id="5179" instrument_node="">William Morris was born in </span><a data-dcnode-id="5177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Walthamstow" title="Walthamstow"><span data-dcnode-id="5178" instrument_node="">Walthamstow</span></a><span data-dcnode-id="5176" instrument_node="">, </span><a data-dcnode-id="5174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Essex" title="Essex"><span data-dcnode-id="5175" instrument_node="">Essex</span></a><span data-dcnode-id="5173" instrument_node="">, on 24 March 1834,</span><sup class="reference" data-dcnode-id="5170" id="cite_ref-FOOTNOTEMackail19011–2Thompson19551–2MacCarthy19941–2_1-0"><a data-dcnode-id="5171" href="#cite_note-FOOTNOTEMackail19011%E2%80%932Thompson19551%E2%80%932MacCarthy19941%E2%80%932-1"><span data-dcnode-id="5172" instrument_node="">[1]</span></a></sup><span data-dcnode-id="5169" instrument_node=""> and raised in a wealthy middle-class family.</span><sup class="reference" data-dcnode-id="5166" id="cite_ref-FOOTNOTEMackail19012–3MacCarthy19941–2,_7_2-0"><a data-dcnode-id="5167" href="#cite_note-FOOTNOTEMackail19012%E2%80%933MacCarthy19941%E2%80%932,_7-2"><span data-dcnode-id="5168" instrument_node="">[2]</span></a></sup><span data-dcnode-id="5165" instrument_node=""> Although his father died in 1847, the Morris family remained affluent as a result of shares in the </span><a data-dcnode-id="5163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Devon_Great_Consols" title="Devon Great Consols"><span data-dcnode-id="5164" instrument_node="">Devon Great Consols</span></a><span data-dcnode-id="5162" instrument_node=""> copper mines.</span><sup class="reference" data-dcnode-id="5159" id="cite_ref-FOOTNOTEMackail190111,_14,_18Thompson195522MacCarthy199426–27_3-0"><a data-dcnode-id="5160" href="#cite_note-FOOTNOTEMackail190111,_14,_18Thompson195522MacCarthy199426%E2%80%9327-3"><span data-dcnode-id="5161" instrument_node="">[3]</span></a></sup><span data-dcnode-id="5158" instrument_node=""> In 1853 Morris began university studies at </span><a class="mw-redirect" data-dcnode-id="5156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oxford_University" title="Oxford University"><span data-dcnode-id="5157" instrument_node="">Oxford University</span></a><span data-dcnode-id="5155" instrument_node="">'s </span><a data-dcnode-id="5153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exeter_College%2C_Oxford" title="Exeter College, Oxford"><span data-dcnode-id="5154" instrument_node="">Exeter College</span></a><span data-dcnode-id="5152" instrument_node="">, focusing on </span><a data-dcnode-id="5150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Classics" title="Classics"><span data-dcnode-id="5151" instrument_node="">Classics</span></a><span data-dcnode-id="5149" instrument_node="">.</span><sup class="reference" data-dcnode-id="5146" id="cite_ref-FOOTNOTEMackail190125–26MacCarthy199452–55_4-0"><a data-dcnode-id="5147" href="#cite_note-FOOTNOTEMackail190125%E2%80%9326MacCarthy199452%E2%80%9355-4"><span data-dcnode-id="5148" instrument_node="">[4]</span></a></sup><span data-dcnode-id="5145" instrument_node=""> There, he developed a keen interest in Medieval history and Medieval architecture, inspired by Oxford's many medieval buildings.</span><sup class="reference" data-dcnode-id="5142" id="cite_ref-FOOTNOTEThompson19556MacCarthy199453–55,_60–61_5-0"><a data-dcnode-id="5143" href="#cite_note-FOOTNOTEThompson19556MacCarthy199453%E2%80%9355,_60%E2%80%9361-5"><span data-dcnode-id="5144" instrument_node="">[5]</span></a></sup><span data-dcnode-id="5141" instrument_node=""> This interest was tied to Britain's growing </span><a data-dcnode-id="5139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Medievalism" title="Medievalism"><span data-dcnode-id="5140" instrument_node="">Medievalist</span></a><span data-dcnode-id="5138" instrument_node=""> movement, a form of </span><a data-dcnode-id="5136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Romanticism" title="Romanticism"><span data-dcnode-id="5137" instrument_node="">Romanticism</span></a><span data-dcnode-id="5135" instrument_node=""> that rejected many of the values of Victorian </span><a class="mw-redirect" data-dcnode-id="5133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Industrial_capitalism" title="Industrial capitalism"><span data-dcnode-id="5134" instrument_node="">industrial capitalism</span></a><span data-dcnode-id="5132" instrument_node="">.</span><sup class="reference" data-dcnode-id="5129" id="cite_ref-FOOTNOTEThompson19559–10_6-0"><a data-dcnode-id="5130" href="#cite_note-FOOTNOTEThompson19559%E2%80%9310-6"><span data-dcnode-id="5131" instrument_node="">[6]</span></a></sup><span data-dcnode-id="5128" instrument_node=""> For Morris, the Middle Ages represented an era with strong chivalric values and an organic, pre-capitalist sense of community, both of which he deemed preferable to his own period.</span><sup class="reference" data-dcnode-id="5125" id="cite_ref-FOOTNOTEThompson195528_7-0"><a data-dcnode-id="5126" href="#cite_note-FOOTNOTEThompson195528-7"><span data-dcnode-id="5127" instrument_node="">[7]</span></a></sup><span data-dcnode-id="5124" instrument_node=""> He was heavily influenced by the writings of art critic </span><a data-dcnode-id="5122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Ruskin" title="John Ruskin"><span data-dcnode-id="5123" instrument_node="">John Ruskin</span></a><span data-dcnode-id="5121" instrument_node="">, being particularly inspired by his chapter "On the Nature of Gothic Architecture" in the second volume of </span><i data-dcnode-id="5118"><a data-dcnode-id="5119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Stones_of_Venice_%28book%29" title="The Stones of Venice (book)"><span data-dcnode-id="5120" instrument_node="">The Stones of Venice</span></a></i><span data-dcnode-id="5117" instrument_node="">.</span><sup class="reference" data-dcnode-id="5114" id="cite_ref-FOOTNOTEMackail190138Thompson195532–35MacCarthy199469–71_8-0"><a data-dcnode-id="5115" href="#cite_note-FOOTNOTEMackail190138Thompson195532%E2%80%9335MacCarthy199469%E2%80%9371-8"><span data-dcnode-id="5116" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5113" instrument_node=""> Morris adopted Ruskin's philosophy of rejecting the tawdry industrial manufacture of decorative arts and architecture in favour of a return to hand-craftsmanship, raising </span><a data-dcnode-id="5111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Artisan" title="Artisan"><span data-dcnode-id="5112" instrument_node="">artisans</span></a><span data-dcnode-id="5110" instrument_node=""> to the status of artists, and creating art that should be affordable and hand-made, with no hierarchy of artistic mediums.</span><sup class="reference" data-dcnode-id="5107" id="cite_ref-FOOTNOTEThompson195535–38_9-0"><a data-dcnode-id="5108" href="#cite_note-FOOTNOTEThompson195535%E2%80%9338-9"><span data-dcnode-id="5109" instrument_node="">[9]</span></a></sup><span data-dcnode-id="5106" instrument_node="">
</span></p><p data-dcnode-id="5036"><span data-dcnode-id="5104" instrument_node="">At Oxford, Morris became the best friend of fellow undergraduate </span><a data-dcnode-id="5102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_Burne-Jones" title="Edward Burne-Jones"><span data-dcnode-id="5103" instrument_node="">Edward Burne-Jones</span></a><span data-dcnode-id="5101" instrument_node="">; they had a shared attitude to life and a keen mutual interest in </span><a data-dcnode-id="5099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/King_Arthur" title="King Arthur"><span data-dcnode-id="5100" instrument_node="">Arthurianism</span></a><span data-dcnode-id="5098" instrument_node="">.</span><sup class="reference" data-dcnode-id="5095" id="cite_ref-FOOTNOTEMackail190134–35MacCarthy199452,_56–58_10-0"><a data-dcnode-id="5096" href="#cite_note-FOOTNOTEMackail190134%E2%80%9335MacCarthy199452,_56%E2%80%9358-10"><span data-dcnode-id="5097" instrument_node="">[10]</span></a></sup><span data-dcnode-id="5094" instrument_node=""> Having passed his finals and been awarded a BA in 1856, Morris began an apprenticeship with the Oxford-based </span><a data-dcnode-id="5092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gothic_Revival_architecture" title="Gothic Revival architecture"><span data-dcnode-id="5093" instrument_node="">Gothic revival</span></a><span data-dcnode-id="5091" instrument_node=""> architect </span><a class="mw-redirect" data-dcnode-id="5089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/G._E._Street" title="G. E. Street"><span data-dcnode-id="5090" instrument_node="">George Edmund Street</span></a><span data-dcnode-id="5088" instrument_node=""> in January 1856. There he was placed under the supervision of </span><a data-dcnode-id="5086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philip_Webb" title="Philip Webb"><span data-dcnode-id="5087" instrument_node="">Philip Webb</span></a><span data-dcnode-id="5085" instrument_node="">, who became a close friend.</span><sup class="reference" data-dcnode-id="5082" id="cite_ref-FOOTNOTEMackail190182,_87,_102Thompson195543MacCarthy1994102–108_11-0"><a data-dcnode-id="5083" href="#cite_note-FOOTNOTEMackail190182,_87,_102Thompson195543MacCarthy1994102%E2%80%93108-11"><span data-dcnode-id="5084" instrument_node="">[11]</span></a></sup><span data-dcnode-id="5081" instrument_node=""> He soon relocated to Street's London office, in August 1856 moving into a flat in </span><a data-dcnode-id="5079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bloomsbury" title="Bloomsbury"><span data-dcnode-id="5080" instrument_node="">Bloomsbury</span></a><span data-dcnode-id="5078" instrument_node="">, </span><a data-dcnode-id="5076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Central_London" title="Central London"><span data-dcnode-id="5077" instrument_node="">Central London</span></a><span data-dcnode-id="5075" instrument_node=""> with Burne-Jones.</span><sup class="reference" data-dcnode-id="5072" id="cite_ref-FOOTNOTEMackail1901102MacCarthy1994108–110_12-0"><a data-dcnode-id="5073" href="#cite_note-FOOTNOTEMackail1901102MacCarthy1994108%E2%80%93110-12"><span data-dcnode-id="5074" instrument_node="">[12]</span></a></sup><span data-dcnode-id="5071" instrument_node=""> Morris was fascinated by London but dismayed at its pollution and rapid expansion into neighbouring countryside, describing it as "the spreading sore".</span><sup class="reference" data-dcnode-id="5068" id="cite_ref-FOOTNOTEMacCarthy1994111–112_13-0"><a data-dcnode-id="5069" href="#cite_note-FOOTNOTEMacCarthy1994111%E2%80%93112-13"><span data-dcnode-id="5070" instrument_node="">[13]</span></a></sup><span data-dcnode-id="5067" instrument_node=""> Preferring rural life, Morris became increasingly fascinated with the Pre-Raphaelites and soon met one of the foremost Pre-Raphaelite painters, </span><a data-dcnode-id="5065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dante_Gabriel_Rossetti" title="Dante Gabriel Rossetti"><span data-dcnode-id="5066" instrument_node="">Dante Gabriel Rossetti</span></a><span data-dcnode-id="5064" instrument_node="">, after Burne-Jones became Rossetti's disciple; the three soon became close friends.</span><sup class="reference" data-dcnode-id="5061" id="cite_ref-FOOTNOTEMackail1901100–102,_105Thompson195542–44MacCarthy1994113–115_14-0"><a data-dcnode-id="5062" href="#cite_note-FOOTNOTEMackail1901100%E2%80%93102,_105Thompson195542%E2%80%9344MacCarthy1994113%E2%80%93115-14"><span data-dcnode-id="5063" instrument_node="">[14]</span></a></sup><span data-dcnode-id="5060" instrument_node=""> Through Rossetti, Morris came to associate with poet </span><a data-dcnode-id="5058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Browning" title="Robert Browning"><span data-dcnode-id="5059" instrument_node="">Robert Browning</span></a><span data-dcnode-id="5057" instrument_node="">, and the artists </span><a data-dcnode-id="5055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arthur_Hughes_%28artist%29" title="Arthur Hughes (artist)"><span data-dcnode-id="5056" instrument_node="">Arthur Hughes</span></a><span data-dcnode-id="5054" instrument_node="">, </span><a data-dcnode-id="5052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Woolner" title="Thomas Woolner"><span data-dcnode-id="5053" instrument_node="">Thomas Woolner</span></a><span data-dcnode-id="5051" instrument_node="">, and </span><a data-dcnode-id="5049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ford_Madox_Brown" title="Ford Madox Brown"><span data-dcnode-id="5050" instrument_node="">Ford Madox Brown</span></a><span data-dcnode-id="5048" instrument_node="">.</span><sup class="reference" data-dcnode-id="5045" id="cite_ref-FOOTNOTEMackail1901106MacCarthy1994116_15-0"><a data-dcnode-id="5046" href="#cite_note-FOOTNOTEMackail1901106MacCarthy1994116-15"><span data-dcnode-id="5047" instrument_node="">[15]</span></a></sup><span data-dcnode-id="5044" instrument_node=""> At Rossetti's recommendation, Morris and Burne-Jones moved in together to a flat at No. 17 </span><a data-dcnode-id="5042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red_Lion_Square" title="Red Lion Square"><span data-dcnode-id="5043" instrument_node="">Red Lion Square</span></a><span data-dcnode-id="5041" instrument_node=""> in Bloomsbury by November 1856. Morris designed and commissioned furniture for the flat in a Medieval style, much of which he painted with Arthurian scenes in a direct rejection of mainstream artistic tastes.</span><sup class="reference" data-dcnode-id="5038" id="cite_ref-FOOTNOTEMackail1901112–114Thompson195545MacCarthy1994117–122_16-0"><a data-dcnode-id="5039" href="#cite_note-FOOTNOTEMackail1901112%E2%80%93114Thompson195545MacCarthy1994117%E2%80%93122-16"><span data-dcnode-id="5040" instrument_node="">[16]</span></a></sup><span data-dcnode-id="5037" instrument_node="">
</span></p><p data-dcnode-id="5013"><span data-dcnode-id="5035" instrument_node="">In October 1857 Morris met </span><a data-dcnode-id="5033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jane_Morris" title="Jane Morris"><span data-dcnode-id="5034" instrument_node="">Jane Burden</span></a><span data-dcnode-id="5032" instrument_node="">, a woman from a working-class background, at a theatre performance and asked her to model for him. Smitten with her, they entered into a relationship and were engaged in spring 1858; Burden would later admit, however, that she never loved Morris.</span><sup class="reference" data-dcnode-id="5029" id="cite_ref-FOOTNOTEThompson195548,_74–76MacCarthy1994135–141_17-0"><a data-dcnode-id="5030" href="#cite_note-FOOTNOTEThompson195548,_74%E2%80%9376MacCarthy1994135%E2%80%93141-17"><span data-dcnode-id="5031" instrument_node="">[17]</span></a></sup><span data-dcnode-id="5028" instrument_node=""> They were married in a simple ceremony held at </span><a data-dcnode-id="5026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/St_Michael_at_the_North_Gate" title="St Michael at the North Gate"><span data-dcnode-id="5027" instrument_node="">St Michael at the North Gate</span></a><span data-dcnode-id="5025" instrument_node=""> church in Oxford on 26 April 1859, before honeymooning in </span><a data-dcnode-id="5023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bruges" title="Bruges"><span data-dcnode-id="5024" instrument_node="">Bruges</span></a><span data-dcnode-id="5022" instrument_node="">, Belgium.</span><sup class="reference" data-dcnode-id="5019" id="cite_ref-FOOTNOTEMackail1901138–139Thompson195576MacCarthy1994151–152_18-0"><a data-dcnode-id="5020" href="#cite_note-FOOTNOTEMackail1901138%E2%80%93139Thompson195576MacCarthy1994151%E2%80%93152-18"><span data-dcnode-id="5021" instrument_node="">[18]</span></a></sup><span data-dcnode-id="5018" instrument_node=""> Newly married, Morris decided to construct a house for himself and his bride. He commissioned Webb, who was then setting out as and architect independent of Street, to help him design it.</span><sup class="reference" data-dcnode-id="5015" id="cite_ref-FOOTNOTEMackail1901139_19-0"><a data-dcnode-id="5016" href="#cite_note-FOOTNOTEMackail1901139-19"><span data-dcnode-id="5017" instrument_node="">[19]</span></a></sup><span data-dcnode-id="5014" instrument_node="">
</span></p><span data-dcnode-id="5012" instrument_node="">
</span><h3 data-dcnode-id="5001"><span data-dcnode-id="5011" id="Origins_and_construction:_1859.E2.80.9360"></span><span class="mw-headline" data-dcnode-id="5009" id="Origins_and_construction:_1859–60"><span data-dcnode-id="5010" instrument_node="">Origins and construction: 1859–60</span></span><span class="mw-editsection" data-dcnode-id="5002"><span class="mw-editsection-bracket" data-dcnode-id="5007"><span data-dcnode-id="5008" instrument_node="">[</span></span><a data-dcnode-id="5005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRed_House%2C_Bexleyheath%26action%3Dedit%26section%3D2" title="Edit section: Origins and construction: 1859–60"><span data-dcnode-id="5006" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5003"><span data-dcnode-id="5004" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5000" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4991"><div class="thumbinner" data-dcnode-id="4992" style="width:352px;"><a class="image" data-dcnode-id="4998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASide_view_of_Red_House.jpg"><img alt="" class="thumbimage" data-dcnode-id="4999" data-file-height="768" data-file-width="1280" decoding="async" height="210" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/13/Side_view_of_Red_House.jpg/350px-Side_view_of_Red_House.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/13/Side_view_of_Red_House.jpg/525px-Side_view_of_Red_House.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/13/Side_view_of_Red_House.jpg/700px-Side_view_of_Red_House.jpg 2x" width="350"></a><span data-dcnode-id="4997" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4993"><div class="magnify" data-dcnode-id="4995"><a class="internal" data-dcnode-id="4996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASide_view_of_Red_House.jpg" title="Enlarge"></a></div><span data-dcnode-id="4994" instrument_node="">Side of Red House</span></div></div></div><span data-dcnode-id="4990" instrument_node="">
</span><p data-dcnode-id="4952"><span data-dcnode-id="4989" instrument_node="">Morris envisioned Red House as being not only a family home, but also a background to his ongoing artistic work.</span><sup class="reference" data-dcnode-id="4986" id="cite_ref-FOOTNOTEMackail1901139_19-1"><a data-dcnode-id="4987" href="#cite_note-FOOTNOTEMackail1901139-19"><span data-dcnode-id="4988" instrument_node="">[19]</span></a></sup><span data-dcnode-id="4985" instrument_node=""> He wanted it to be situated in a rural area that was not far from London,</span><sup class="reference" data-dcnode-id="4982" id="cite_ref-FOOTNOTEMackail1901140_20-0"><a data-dcnode-id="4983" href="#cite_note-FOOTNOTEMackail1901140-20"><span data-dcnode-id="4984" instrument_node="">[20]</span></a></sup><span data-dcnode-id="4981" instrument_node=""> and chose to search in Kent because it was his favourite county; he particularly enjoyed its geographical mix of large open spaces with small hills and rivers, favourably contrasting it to the flat expanse of his native </span><a data-dcnode-id="4979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Essex" title="Essex"><span data-dcnode-id="4980" instrument_node="">Essex</span></a><span data-dcnode-id="4978" instrument_node="">.</span><sup class="reference" data-dcnode-id="4975" id="cite_ref-FOOTNOTEMackail1901140–141MacCarthy1994154_21-0"><a data-dcnode-id="4976" href="#cite_note-FOOTNOTEMackail1901140%E2%80%93141MacCarthy1994154-21"><span data-dcnode-id="4977" instrument_node="">[21]</span></a></sup><span data-dcnode-id="4974" instrument_node=""> After looking at various locations for sale in the area, he settled on a plot of land in the village of Upton in West Kent; although ten miles to London by road, it was situated three miles from the nearest railway station, </span><a data-dcnode-id="4972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abbey_Wood_railway_station" title="Abbey Wood railway station"><span data-dcnode-id="4973" instrument_node="">Abbey Wood railway station</span></a><span data-dcnode-id="4971" instrument_node="">.</span><sup class="reference" data-dcnode-id="4968" id="cite_ref-FOOTNOTEMackail1901140MacCarthy1994154_22-0"><a data-dcnode-id="4969" href="#cite_note-FOOTNOTEMackail1901140MacCarthy1994154-22"><span data-dcnode-id="4970" instrument_node="">[22]</span></a></sup><span data-dcnode-id="4967" instrument_node=""> At Upton, Morris purchased an orchard and a meadow, wanting his new home to be surrounded by an apple and cherry orchard.</span><sup class="reference" data-dcnode-id="4964" id="cite_ref-FOOTNOTEMackail1901140MacCarthy1994154–155_23-0"><a data-dcnode-id="4965" href="#cite_note-FOOTNOTEMackail1901140MacCarthy1994154%E2%80%93155-23"><span data-dcnode-id="4966" instrument_node="">[23]</span></a></sup><span data-dcnode-id="4963" instrument_node=""> Morris would likely have been pleased that Upton was close to the track that pilgrims followed to </span><a data-dcnode-id="4961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canterbury_Cathedral" title="Canterbury Cathedral"><span data-dcnode-id="4962" instrument_node="">Canterbury Cathedral</span></a><span data-dcnode-id="4960" instrument_node=""> during the Middle Ages, and would also have had the opportunity to visit the ruins of the Medieval </span><a data-dcnode-id="4958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lesnes_Abbey" title="Lesnes Abbey"><span data-dcnode-id="4959" instrument_node="">Lesnes Abbey</span></a><span data-dcnode-id="4957" instrument_node=""> which were around three miles away.</span><sup class="reference" data-dcnode-id="4954" id="cite_ref-FOOTNOTEMackail1901141MacCarthy1994154National_Trust20037_24-0"><a data-dcnode-id="4955" href="#cite_note-FOOTNOTEMackail1901141MacCarthy1994154National_Trust20037-24"><span data-dcnode-id="4956" instrument_node="">[24]</span></a></sup><span data-dcnode-id="4953" instrument_node="">
</span></p><p data-dcnode-id="4911"><span data-dcnode-id="4951" instrument_node="">While Red House was under construction, Morris and his wife lived in rented accommodations at 41 </span><a class="mw-redirect" data-dcnode-id="4949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Ormond_Street" title="Great Ormond Street"><span data-dcnode-id="4950" instrument_node="">Great Ormond Street</span></a><span data-dcnode-id="4948" instrument_node="">, just along the road from Webb's office, at 7 Great Ormond Street.</span><sup class="reference" data-dcnode-id="4945" id="cite_ref-FOOTNOTEMackail1901139MacCarthy1994156_25-0"><a data-dcnode-id="4946" href="#cite_note-FOOTNOTEMackail1901139MacCarthy1994156-25"><span data-dcnode-id="4947" instrument_node="">[25]</span></a></sup><span data-dcnode-id="4944" instrument_node=""> However, as the project neared completion, the Morrises moved to Amberley Lodge, close to the site, so that Morris could monitor the builder's progress.</span><sup class="reference" data-dcnode-id="4941" id="cite_ref-FOOTNOTEMacCarthy1994157_26-0"><a data-dcnode-id="4942" href="#cite_note-FOOTNOTEMacCarthy1994157-26"><span data-dcnode-id="4943" instrument_node="">[26]</span></a></sup><span data-dcnode-id="4940" instrument_node=""> Webb and Morris would work on the design of the house together.</span><sup class="reference" data-dcnode-id="4937" id="cite_ref-FOOTNOTEMackail1901139_19-2"><a data-dcnode-id="4938" href="#cite_note-FOOTNOTEMackail1901139-19"><span data-dcnode-id="4939" instrument_node="">[19]</span></a></sup><span data-dcnode-id="4936" instrument_node=""> Thus, the National Trust have described it as "a complex fusion of Morris's romantic utopianism and Webb's practical common sense",</span><sup class="reference" data-dcnode-id="4933" id="cite_ref-FOOTNOTENational_Trust20037_27-0"><a data-dcnode-id="4934" href="#cite_note-FOOTNOTENational_Trust20037-27"><span data-dcnode-id="4935" instrument_node="">[27]</span></a></sup><span data-dcnode-id="4932" instrument_node=""> while Edward and Doris Hollamby described it as "a collaborative effort in which we cannot separate one from the other".</span><sup class="reference" data-dcnode-id="4929" id="cite_ref-FOOTNOTEHollambyHollamby19932_28-0"><a data-dcnode-id="4930" href="#cite_note-FOOTNOTEHollambyHollamby19932-28"><span data-dcnode-id="4931" instrument_node="">[28]</span></a></sup><span data-dcnode-id="4928" instrument_node=""> Red House would be Webb's first project as an independent architect,</span><sup class="reference" data-dcnode-id="4925" id="cite_ref-FOOTNOTEMacCarthy1994155_29-0"><a data-dcnode-id="4926" href="#cite_note-FOOTNOTEMacCarthy1994155-29"><span data-dcnode-id="4927" instrument_node="">[29]</span></a></sup><span data-dcnode-id="4924" instrument_node=""> while it remained the only house that Morris ever built.</span><sup class="reference" data-dcnode-id="4921" id="cite_ref-FOOTNOTEMacCarthy1994156National_Trust20033_30-0"><a data-dcnode-id="4922" href="#cite_note-FOOTNOTEMacCarthy1994156National_Trust20033-30"><span data-dcnode-id="4923" instrument_node="">[30]</span></a></sup><span data-dcnode-id="4920" instrument_node="">  The actual construction was given to a contractor, and the structure took a year to build.</span><sup class="reference" data-dcnode-id="4917" id="cite_ref-FOOTNOTEMacCarthy1994157_26-1"><a data-dcnode-id="4918" href="#cite_note-FOOTNOTEMacCarthy1994157-26"><span data-dcnode-id="4919" instrument_node="">[26]</span></a></sup><span data-dcnode-id="4916" instrument_node=""> It cost Morris approximately £4,000, at a time when the value of his shares was dropping.</span><sup class="reference" data-dcnode-id="4913" id="cite_ref-FOOTNOTEMacCarthy1994171National_Trust20037_31-0"><a data-dcnode-id="4914" href="#cite_note-FOOTNOTEMacCarthy1994171National_Trust20037-31"><span data-dcnode-id="4915" instrument_node="">[31]</span></a></sup><span data-dcnode-id="4912" instrument_node="">
</span></p><p data-dcnode-id="4864"><span data-dcnode-id="4910" instrument_node="">Unique in its design, Red House was designed to an L-shaped plan, with two stories and a high-pitched roof made of red tile.</span><sup class="reference" data-dcnode-id="4907" id="cite_ref-FOOTNOTEMackail1901141MacCarthy1994155_32-0"><a data-dcnode-id="4908" href="#cite_note-FOOTNOTEMackail1901141MacCarthy1994155-32"><span data-dcnode-id="4909" instrument_node="">[32]</span></a></sup><span data-dcnode-id="4906" instrument_node=""> The large hall, dining room, library, morning room, and kitchen were located on the ground floor, while on the first floor were situated the main living rooms, the drawing room, the studio, and the bedrooms.</span><sup class="reference" data-dcnode-id="4903" id="cite_ref-FOOTNOTEMacCarthy1994155_29-1"><a data-dcnode-id="4904" href="#cite_note-FOOTNOTEMacCarthy1994155-29"><span data-dcnode-id="4905" instrument_node="">[29]</span></a></sup><span data-dcnode-id="4902" instrument_node=""> The servants' quarters were larger than in most contemporary buildings, reflecting the embryonic ideas regarding working class conditions which would lead Morris and Webb to become </span><a data-dcnode-id="4900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialism" title="Socialism"><span data-dcnode-id="4901" instrument_node="">socialists</span></a><span data-dcnode-id="4899" instrument_node=""> in later life.</span><sup class="reference" data-dcnode-id="4896" id="cite_ref-FOOTNOTEMacCarthy1994155_29-2"><a data-dcnode-id="4897" href="#cite_note-FOOTNOTEMacCarthy1994155-29"><span data-dcnode-id="4898" instrument_node="">[29]</span></a></sup><span data-dcnode-id="4895" instrument_node=""> Windows were positioned to suit the design of the rooms rather than to fit an external symmetry; thus a variety of different window types are present, including tall </span><a data-dcnode-id="4893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Casement_window" title="Casement window"><span data-dcnode-id="4894" instrument_node="">casements</span></a><span data-dcnode-id="4892" instrument_node="">, hipped dormers, round-headed sash-windows, and bull's eye windows.</span><sup class="reference" data-dcnode-id="4889" id="cite_ref-FOOTNOTENational_Trust20037_27-1"><a data-dcnode-id="4890" href="#cite_note-FOOTNOTENational_Trust20037-27"><span data-dcnode-id="4891" instrument_node="">[27]</span></a></sup><span data-dcnode-id="4888" instrument_node=""> The house lacked any applied ornamentation, with its decorative features instead serving constructional purposes, such as the arches over the windows, and the louvre in the open roof over the staircase.</span><sup class="reference" data-dcnode-id="4885" id="cite_ref-FOOTNOTEMackail1901142_33-0"><a data-dcnode-id="4886" href="#cite_note-FOOTNOTEMackail1901142-33"><span data-dcnode-id="4887" instrument_node="">[33]</span></a></sup><span data-dcnode-id="4884" instrument_node=""> According to Morris' biographer J.W. Mackail, the external design of the house was "plain almost to severity, and depended for its effect on its solidity and fine proportion."</span><sup class="reference" data-dcnode-id="4881" id="cite_ref-FOOTNOTEMackail1901142_33-1"><a data-dcnode-id="4882" href="#cite_note-FOOTNOTEMackail1901142-33"><span data-dcnode-id="4883" instrument_node="">[33]</span></a></sup><span data-dcnode-id="4880" instrument_node=""> This was somewhat radical at the time, as most contemporary buildings were heavily furnished with ornamentation.</span><sup class="reference" data-dcnode-id="4877" id="cite_ref-FOOTNOTEThompson195591_34-0"><a data-dcnode-id="4878" href="#cite_note-FOOTNOTEThompson195591-34"><span data-dcnode-id="4879" instrument_node="">[34]</span></a></sup><span data-dcnode-id="4876" instrument_node=""> Rosseti termed it "a real wonder of the age&nbsp;... which baffles all description",</span><sup class="reference" data-dcnode-id="4873" id="cite_ref-FOOTNOTENational_Trust20033_35-0"><a data-dcnode-id="4874" href="#cite_note-FOOTNOTENational_Trust20033-35"><span data-dcnode-id="4875" instrument_node="">[35]</span></a></sup><span data-dcnode-id="4872" instrument_node=""> while Morris biographer </span><a data-dcnode-id="4870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fiona_MacCarthy" title="Fiona MacCarthy"><span data-dcnode-id="4871" instrument_node="">Fiona MacCarthy</span></a><span data-dcnode-id="4869" instrument_node=""> described it as "the ultimate Pre-Raphaelite building".</span><sup class="reference" data-dcnode-id="4866" id="cite_ref-FOOTNOTEMacCarthy1994154_36-0"><a data-dcnode-id="4867" href="#cite_note-FOOTNOTEMacCarthy1994154-36"><span data-dcnode-id="4868" instrument_node="">[36]</span></a></sup><span data-dcnode-id="4865" instrument_node="">
</span></p><span data-dcnode-id="4863" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="4854"><div class="thumbinner" data-dcnode-id="4855" style="width:302px;"><a class="image" data-dcnode-id="4861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AHallway_at_Red_House.jpg"><img alt="" class="thumbimage" data-dcnode-id="4862" data-file-height="1552" data-file-width="2592" decoding="async" height="180" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b2/Hallway_at_Red_House.jpg/300px-Hallway_at_Red_House.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b2/Hallway_at_Red_House.jpg/450px-Hallway_at_Red_House.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b2/Hallway_at_Red_House.jpg/600px-Hallway_at_Red_House.jpg 2x" width="300"></a><span data-dcnode-id="4860" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4856"><div class="magnify" data-dcnode-id="4858"><a class="internal" data-dcnode-id="4859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AHallway_at_Red_House.jpg" title="Enlarge"></a></div><span data-dcnode-id="4857" instrument_node="">Red House's hallway and Neo-Gothic staircase</span></div></div></div><span data-dcnode-id="4853" instrument_node="">
</span><p data-dcnode-id="4829"><span data-dcnode-id="4852" instrument_node="">The architecture of Red House was inspired by styles of British design from the thirteenth century, and Morris described the building as being "very mediaeval in spirit".</span><sup class="reference" data-dcnode-id="4849" id="cite_ref-FOOTNOTEMacCarthy1994154_36-1"><a data-dcnode-id="4850" href="#cite_note-FOOTNOTEMacCarthy1994154-36"><span data-dcnode-id="4851" instrument_node="">[36]</span></a></sup><span data-dcnode-id="4848" instrument_node=""> Historian </span><a class="mw-redirect" data-dcnode-id="4846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/E.P._Thompson" title="E.P. Thompson"><span data-dcnode-id="4847" instrument_node="">E.P. Thompson</span></a><span data-dcnode-id="4845" instrument_node=""> asserted that the house "was built, not–as in previous Gothic revivals–in an attempt to combine a number of superficial medieval characteristics which pleased the taste of the architect, but in a definite attempt to adapt late Gothic methods of building to the needs of the nineteenth century."</span><sup class="reference" data-dcnode-id="4842" id="cite_ref-FOOTNOTEThompson195591_34-1"><a data-dcnode-id="4843" href="#cite_note-FOOTNOTEThompson195591-34"><span data-dcnode-id="4844" instrument_node="">[34]</span></a></sup><span data-dcnode-id="4841" instrument_node="">
Later owners of the property, Edward and Doris Hollamby, described Red House as Webb and Morris' attempt to "apply Gothic principles to domestic architecture without archaeological imitation".</span><sup class="reference" data-dcnode-id="4838" id="cite_ref-FOOTNOTEHollambyHollamby19932_28-1"><a data-dcnode-id="4839" href="#cite_note-FOOTNOTEHollambyHollamby19932-28"><span data-dcnode-id="4840" instrument_node="">[28]</span></a></sup><span data-dcnode-id="4837" instrument_node=""> While asserting that it was certainly "a far cry from the Victorian bourgeois norm", MacCarthy stated that it was "by no means a revolutionary building", having much in common with other Neo-Gothic buildings of the period, comparing its "complicated dense" interiors to those of the architect </span><a data-dcnode-id="4835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Augustus_Pugin" title="Augustus Pugin"><span data-dcnode-id="4836" instrument_node="">Augustus Pugin</span></a><span data-dcnode-id="4834" instrument_node="">.</span><sup class="reference" data-dcnode-id="4831" id="cite_ref-FOOTNOTEMacCarthy1994161_37-0"><a data-dcnode-id="4832" href="#cite_note-FOOTNOTEMacCarthy1994161-37"><span data-dcnode-id="4833" instrument_node="">[37]</span></a></sup><span data-dcnode-id="4830" instrument_node="">
</span></p><p data-dcnode-id="4787"><span data-dcnode-id="4828" instrument_node="">When the building itself had been constructed, Morris set about decorating the interior, however specifically chose to design and create almost everything himself. Only a few pieces of decor were pre-bought as ready-made items, namely the Persian carpets, and blue china or delft.</span><sup class="reference" data-dcnode-id="4825" id="cite_ref-FOOTNOTEMackail1901142,_144_38-0"><a data-dcnode-id="4826" href="#cite_note-FOOTNOTEMackail1901142,_144-38"><span data-dcnode-id="4827" instrument_node="">[38]</span></a></sup><span data-dcnode-id="4824" instrument_node=""> Morris took his painted settle from the Red Lion Square flat and had it transported in pieces to Red House, where it was reassembled in the drawing room.</span><sup class="reference" data-dcnode-id="4821" id="cite_ref-FOOTNOTEMackail1901143_39-0"><a data-dcnode-id="4822" href="#cite_note-FOOTNOTEMackail1901143-39"><span data-dcnode-id="4823" instrument_node="">[39]</span></a></sup><span data-dcnode-id="4820" instrument_node=""> Many other items of furniture were specially designed by Webb, including the oak dining table, other tables, chairs, cupboards, copper candlesticks, fire dogs, and glass tableware.</span><sup class="reference" data-dcnode-id="4817" id="cite_ref-FOOTNOTEMackail1901143Thompson195593_40-0"><a data-dcnode-id="4818" href="#cite_note-FOOTNOTEMackail1901143Thompson195593-40"><span data-dcnode-id="4819" instrument_node="">[40]</span></a></sup><span data-dcnode-id="4816" instrument_node=""> The plastered walls and ceilings were given simple designs in tempera, although more complex designs were planned for the hall and main living rooms.</span><sup class="reference" data-dcnode-id="4813" id="cite_ref-FOOTNOTEMackail1901143_39-1"><a data-dcnode-id="4814" href="#cite_note-FOOTNOTEMackail1901143-39"><span data-dcnode-id="4815" instrument_node="">[39]</span></a></sup><span data-dcnode-id="4812" instrument_node=""> Stained glass windows were installed in the house, with designs created by Burne-Jones and Webb.</span><sup class="reference" data-dcnode-id="4809" id="cite_ref-FOOTNOTENational_Trust20038_41-0"><a data-dcnode-id="4810" href="#cite_note-FOOTNOTENational_Trust20038-41"><span data-dcnode-id="4811" instrument_node="">[41]</span></a></sup><span data-dcnode-id="4808" instrument_node=""> In reference to the route taken by Medieval pilgrims headed to Canterbury, Morris termed the passage which connects the main hallway to the house's rear entrance, "The Pilgrim's Rest".</span><sup class="reference" data-dcnode-id="4805" id="cite_ref-FOOTNOTEMercerEvans20083National_Trust20037_42-0"><a data-dcnode-id="4806" href="#cite_note-FOOTNOTEMercerEvans20083National_Trust20037-42"><span data-dcnode-id="4807" instrument_node="">[42]</span></a></sup><span data-dcnode-id="4804" instrument_node=""> The garden was similarly unique in its design,</span><sup class="reference" data-dcnode-id="4801" id="cite_ref-FOOTNOTEMackail1901143_39-2"><a data-dcnode-id="4802" href="#cite_note-FOOTNOTEMackail1901143-39"><span data-dcnode-id="4803" instrument_node="">[39]</span></a></sup><span data-dcnode-id="4800" instrument_node=""> with Morris insisting on integration of the design of the house and garden; the latter was divided into four small square gardens by trellises on which roses grew.</span><sup class="reference" data-dcnode-id="4797" id="cite_ref-FOOTNOTEMacCarthy1994165_43-0"><a data-dcnode-id="4798" href="#cite_note-FOOTNOTEMacCarthy1994165-43"><span data-dcnode-id="4799" instrument_node="">[43]</span></a></sup><span data-dcnode-id="4796" instrument_node=""> The flower beds were bordered with lavender and rosemary while lilies and sunflowers had also been planted in the garden.</span><sup class="reference" data-dcnode-id="4793" id="cite_ref-FOOTNOTEMacCarthy1994164–165_44-0"><a data-dcnode-id="4794" href="#cite_note-FOOTNOTEMacCarthy1994164%E2%80%93165-44"><span data-dcnode-id="4795" instrument_node="">[44]</span></a></sup><span data-dcnode-id="4792" instrument_node=""> White jasmine, roses, honeysuckle and passion flower were planted to climb up the walls of the house.</span><sup class="reference" data-dcnode-id="4789" id="cite_ref-FOOTNOTEMacCarthy1994164_45-0"><a data-dcnode-id="4790" href="#cite_note-FOOTNOTEMacCarthy1994164-45"><span data-dcnode-id="4791" instrument_node="">[45]</span></a></sup><span data-dcnode-id="4788" instrument_node="">
</span></p><span data-dcnode-id="4786" instrument_node="">
</span><h3 data-dcnode-id="4775"><span data-dcnode-id="4785" id="Morris.27_life_at_Red_House:_1860.E2.80.931865"></span><span class="mw-headline" data-dcnode-id="4783" id="Morris'_life_at_Red_House:_1860–1865"><span data-dcnode-id="4784" instrument_node="">Morris' life at Red House: 1860–1865</span></span><span class="mw-editsection" data-dcnode-id="4776"><span class="mw-editsection-bracket" data-dcnode-id="4781"><span data-dcnode-id="4782" instrument_node="">[</span></span><a data-dcnode-id="4779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRed_House%2C_Bexleyheath%26action%3Dedit%26section%3D3" title="Edit section: Morris' life at Red House: 1860–1865"><span data-dcnode-id="4780" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4777"><span data-dcnode-id="4778" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4774" instrument_node="">
</span><div class="thumb tmulti tright" data-dcnode-id="4754"><div class="thumbinner" data-dcnode-id="4755" style="width:346px;max-width:346px"><div class="trow" data-dcnode-id="4763"><div class="tsingle" data-dcnode-id="4768" style="width:177px;max-width:177px"><div class="thumbimage" data-dcnode-id="4769"><a class="image" data-dcnode-id="4770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADrawing_Room_at_Red_House%2C_Lonson.jpg"><img alt="" data-dcnode-id="4771" data-file-height="2592" data-file-width="1552" decoding="async" height="292" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/51/Drawing_Room_at_Red_House%252C_Lonson.jpg/175px-Drawing_Room_at_Red_House%252C_Lonson.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/51/Drawing_Room_at_Red_House%2C_Lonson.jpg/263px-Drawing_Room_at_Red_House%2C_Lonson.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/51/Drawing_Room_at_Red_House%2C_Lonson.jpg/350px-Drawing_Room_at_Red_House%2C_Lonson.jpg 2x" width="175"></a></div></div><div class="tsingle" data-dcnode-id="4764" style="width:165px;max-width:165px"><div class="thumbimage" data-dcnode-id="4765"><a class="image" data-dcnode-id="4766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABurne-Jones_mural_at_Red_House.jpg"><img alt="" data-dcnode-id="4767" data-file-height="2299" data-file-width="1284" decoding="async" height="292" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/95/Burne-Jones_mural_at_Red_House.jpg/163px-Burne-Jones_mural_at_Red_House.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/95/Burne-Jones_mural_at_Red_House.jpg/245px-Burne-Jones_mural_at_Red_House.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/95/Burne-Jones_mural_at_Red_House.jpg/326px-Burne-Jones_mural_at_Red_House.jpg 2x" width="163"></a></div></div></div><div class="trow" data-dcnode-id="4756" style="display:flex"><div class="thumbcaption" data-dcnode-id="4757"><span data-dcnode-id="4762" instrument_node="">Left: the settle in the drawing room, with Burne-Jones murals to either side. Right: the Burne-Jones memorial depicting the marriage feast of </span><i data-dcnode-id="4759"><a data-dcnode-id="4760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sir_Degrevant" title="Sir Degrevant"><span data-dcnode-id="4761" instrument_node="">Sir Degrevant</span></a></i><span data-dcnode-id="4758" instrument_node="">.</span></div></div></div></div><span data-dcnode-id="4753" instrument_node="">
</span><p data-dcnode-id="4725"><span data-dcnode-id="4752" instrument_node="">Morris and his wife moved into Red House at the end of the summer of 1860.</span><sup class="reference" data-dcnode-id="4749" id="cite_ref-FOOTNOTEMackail1901144,_159_46-0"><a data-dcnode-id="4750" href="#cite_note-FOOTNOTEMackail1901144,_159-46"><span data-dcnode-id="4751" instrument_node="">[46]</span></a></sup><span data-dcnode-id="4748" instrument_node=""> At the time, he envisioned living there for the rest of his life, although ultimately would only stay there for five years.</span><sup class="reference" data-dcnode-id="4745" id="cite_ref-FOOTNOTEMackail1901144_47-0"><a data-dcnode-id="4746" href="#cite_note-FOOTNOTEMackail1901144-47"><span data-dcnode-id="4747" instrument_node="">[47]</span></a></sup><span data-dcnode-id="4744" instrument_node=""> Morris' friends regularly came to visit; Burne-Jones and his new bride, </span><a data-dcnode-id="4742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Georgiana_Burne-Jones" title="Georgiana Burne-Jones"><span data-dcnode-id="4743" instrument_node="">Georgiana Burne-Jones</span></a><span data-dcnode-id="4741" instrument_node="">, would often spend their Sundays at Red House, while other regular visitors included Rossetti, Faulkner and his two sisters, Webb, Swinburne, Madox Brown, and Arthur Hughes.</span><sup class="reference" data-dcnode-id="4738" id="cite_ref-FOOTNOTEMackail1901159–160MacCarthy1994157_48-0"><a data-dcnode-id="4739" href="#cite_note-FOOTNOTEMackail1901159%E2%80%93160MacCarthy1994157-48"><span data-dcnode-id="4740" instrument_node="">[48]</span></a></sup><span data-dcnode-id="4737" instrument_node=""> Here, Burne-Jones and Faulkner often played practical jokes on Morris, for instance, doctoring a pack of playing cards or sewing up his clothing to make it feel much tighter.</span><sup class="reference" data-dcnode-id="4734" id="cite_ref-FOOTNOTEMacCarthy1994162_49-0"><a data-dcnode-id="4735" href="#cite_note-FOOTNOTEMacCarthy1994162-49"><span data-dcnode-id="4736" instrument_node="">[49]</span></a></sup><span data-dcnode-id="4733" instrument_node=""> The group of friends liked to play </span><a class="mw-redirect" data-dcnode-id="4731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hide_and_seek" title="Hide and seek"><span data-dcnode-id="4732" instrument_node="">hide and seek</span></a><span data-dcnode-id="4730" instrument_node=""> at the house, and in the evenings would gather around the piano to sing songs.</span><sup class="reference" data-dcnode-id="4727" id="cite_ref-FOOTNOTEMacCarthy1994162–163_50-0"><a data-dcnode-id="4728" href="#cite_note-FOOTNOTEMacCarthy1994162%E2%80%93163-50"><span data-dcnode-id="4729" instrument_node="">[50]</span></a></sup><span data-dcnode-id="4726" instrument_node="">
</span></p><p data-dcnode-id="4703"><span data-dcnode-id="4724" instrument_node="">It was at Red House that Morris and Janey's two children were born; in January 1861, a daughter named Jane Alice Morris, who would come to be known as "Jenny".</span><sup class="reference" data-dcnode-id="4721" id="cite_ref-FOOTNOTEMackail1901160–161MacCarthy1994185–186_51-0"><a data-dcnode-id="4722" href="#cite_note-FOOTNOTEMackail1901160%E2%80%93161MacCarthy1994185%E2%80%93186-51"><span data-dcnode-id="4723" instrument_node="">[51]</span></a></sup><span data-dcnode-id="4720" instrument_node=""> Jenny was followed in March 1862 by the birth of their second daughter, Mary "May" Morris.</span><sup class="reference" data-dcnode-id="4717" id="cite_ref-FOOTNOTEMackail1901161MacCarthy1994187_52-0"><a data-dcnode-id="4718" href="#cite_note-FOOTNOTEMackail1901161MacCarthy1994187-52"><span data-dcnode-id="4719" instrument_node="">[52]</span></a></sup><span data-dcnode-id="4716" instrument_node=""> Morris was a caring father to his daughters, and years later they both recounted having had idyllic childhoods.</span><sup class="reference" data-dcnode-id="4713" id="cite_ref-FOOTNOTEMacCarthy1994192–193_53-0"><a data-dcnode-id="4714" href="#cite_note-FOOTNOTEMacCarthy1994192%E2%80%93193-53"><span data-dcnode-id="4715" instrument_node="">[53]</span></a></sup><span data-dcnode-id="4712" instrument_node=""> However, there were problems in Morris's marriage as Janey became increasingly close to Rossetti, who often painted her. It is unknown if their affair was ever sexual, although by this point other members of the group were noticing Rossetti and Janey's closeness.</span><sup class="reference" data-dcnode-id="4709" id="cite_ref-FOOTNOTEMacCarthy1994221–223_54-0"><a data-dcnode-id="4710" href="#cite_note-FOOTNOTEMacCarthy1994221%E2%80%93223-54"><span data-dcnode-id="4711" instrument_node="">[54]</span></a></sup><span data-dcnode-id="4708" instrument_node=""> Morris also hired various servants, four of whom were cited as living in the house in the 1861 census; the cook Charlotte Cooper, the housemaid Jane Chapman, the nanny Elizabeth Reynolds, and the groom Thomas Reynolds.</span><sup class="reference" data-dcnode-id="4705" id="cite_ref-FOOTNOTENational_Trust200311_55-0"><a data-dcnode-id="4706" href="#cite_note-FOOTNOTENational_Trust200311-55"><span data-dcnode-id="4707" instrument_node="">[55]</span></a></sup><span data-dcnode-id="4704" instrument_node="">
</span></p><p data-dcnode-id="4653"><span data-dcnode-id="4702" instrument_node="">Morris added to both the house's interior and the design of the garden intermittently over the years, aided by his various friends.</span><sup class="reference" data-dcnode-id="4699" id="cite_ref-FOOTNOTEMackail1901158_56-0"><a data-dcnode-id="4700" href="#cite_note-FOOTNOTEMackail1901158-56"><span data-dcnode-id="4701" instrument_node="">[56]</span></a></sup><span data-dcnode-id="4698" instrument_node=""> There was to be no </span><a data-dcnode-id="4696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wallpaper" title="Wallpaper"><span data-dcnode-id="4697" instrument_node="">wallpaper</span></a><span data-dcnode-id="4695" instrument_node=""> anywhere in the house, with the walls instead being painted or covered by tapestries.</span><sup class="reference" data-dcnode-id="4692" id="cite_ref-FOOTNOTEMackail1901159_57-0"><a data-dcnode-id="4693" href="#cite_note-FOOTNOTEMackail1901159-57"><span data-dcnode-id="4694" instrument_node="">[57]</span></a></sup><span data-dcnode-id="4691" instrument_node=""> The walls of the staircase were intended to feature a painted mural by Burne-Jones depicting scenes from the </span><a data-dcnode-id="4689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trojan_War" title="Trojan War"><span data-dcnode-id="4690" instrument_node="">Trojan War</span></a><span data-dcnode-id="4688" instrument_node="">, while on the wall of the hall beneath was intended to be a picture of warships carrying the ancient Greek soldiers to Troy. Although depicting scenes from Classical mythology, Morris had wanted the designs to be Medieval in style, with the warships being based on those of the fourteenth century.</span><sup class="reference" data-dcnode-id="4685" id="cite_ref-FOOTNOTEMackail1901158_56-1"><a data-dcnode-id="4686" href="#cite_note-FOOTNOTEMackail1901158-56"><span data-dcnode-id="4687" instrument_node="">[56]</span></a></sup><span data-dcnode-id="4684" instrument_node=""> On the hallway cupboard, Morris began (although never finished) a painting based on </span><a data-dcnode-id="4682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Malory" title="Thomas Malory"><span data-dcnode-id="4683" instrument_node="">Thomas Malory</span></a><span data-dcnode-id="4681" instrument_node="">'s tale of how </span><a class="mw-redirect" data-dcnode-id="4679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sir_Lancelot" title="Sir Lancelot"><span data-dcnode-id="4680" instrument_node="">Sir Lancelot</span></a><span data-dcnode-id="4678" instrument_node=""> brought </span><a data-dcnode-id="4676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tristan" title="Tristan"><span data-dcnode-id="4677" instrument_node="">Sir Tristram</span></a><span data-dcnode-id="4675" instrument_node=""> and </span><a data-dcnode-id="4673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iseult" title="Iseult"><span data-dcnode-id="4674" instrument_node="">La Belle Iseult</span></a><span data-dcnode-id="4672" instrument_node=""> to the castle of the </span><a class="mw-redirect" data-dcnode-id="4670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joyous_Garde" title="Joyous Garde"><span data-dcnode-id="4671" instrument_node="">Joyous Garde</span></a><span data-dcnode-id="4669" instrument_node="">. The figures themselves are depictions of some of Morris' friends, among them Jane, Faulkner, the Burne-Joneses, and Lizzie Siddel.</span><sup class="reference" data-dcnode-id="4666" id="cite_ref-FOOTNOTEMacCarthy1994159Allen200127_58-0"><a data-dcnode-id="4667" href="#cite_note-FOOTNOTEMacCarthy1994159Allen200127-58"><span data-dcnode-id="4668" instrument_node="">[58]</span></a></sup><span data-dcnode-id="4665" instrument_node=""> In the dining room, Morris planned to decorate the walls with a series of embroidered female heroines, based in </span><a data-dcnode-id="4663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Geoffrey_Chaucer" title="Geoffrey Chaucer"><span data-dcnode-id="4664" instrument_node="">Geoffrey Chaucer</span></a><span data-dcnode-id="4662" instrument_node="">'s </span><i data-dcnode-id="4659"><a data-dcnode-id="4660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Legend_of_Good_Women" title="The Legend of Good Women"><span data-dcnode-id="4661" instrument_node="">The Legend of Good Women</span></a></i><span data-dcnode-id="4658" instrument_node="">. Produced by Jane and her sister Bessie, only seven or eight were completed.</span><sup class="reference" data-dcnode-id="4655" id="cite_ref-FOOTNOTEMacCarthy1994160–_59-0"><a data-dcnode-id="4656" href="#cite_note-FOOTNOTEMacCarthy1994160%E2%80%93-59"><span data-dcnode-id="4657" instrument_node="">[59]</span></a></sup><span data-dcnode-id="4654" instrument_node="">
</span></p><p data-dcnode-id="4615"><span data-dcnode-id="4652" instrument_node="">Around the walls of the drawing room, Morris had wanted a mural featuring a series of scenes from the fifteenth-century </span><a data-dcnode-id="4650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Middle_English" title="Middle English"><span data-dcnode-id="4651" instrument_node="">Middle English</span></a><span data-dcnode-id="4649" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="4647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Romance_%28heroic_literature%29" title="Romance (heroic literature)"><span data-dcnode-id="4648" instrument_node="">romance</span></a><span data-dcnode-id="4646" instrument_node=""> of </span><i data-dcnode-id="4643"><a data-dcnode-id="4644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sir_Degrevant" title="Sir Degrevant"><span data-dcnode-id="4645" instrument_node="">Sir Degrevant</span></a></i><span data-dcnode-id="4642" instrument_node="">. Ultimately, three were executed by Burne-Jones, and survive today; they feature Morris as king and Jane as queen.</span><sup class="reference" data-dcnode-id="4639" id="cite_ref-FOOTNOTEMackail1901158–159MacCarthy1994158_60-0"><a data-dcnode-id="4640" href="#cite_note-FOOTNOTEMackail1901158%E2%80%93159MacCarthy1994158-60"><span data-dcnode-id="4641" instrument_node="">[60]</span></a></sup><span data-dcnode-id="4638" instrument_node=""> Over the fireplace, Morris had inscribed a Latin motto, "</span><i data-dcnode-id="4636"><span data-dcnode-id="4637" instrument_node="">Ars longa vita brevis</span></i><span data-dcnode-id="4635" instrument_node="">", meaning "Life is short, but art endures."</span><sup class="reference" data-dcnode-id="4632" id="cite_ref-FOOTNOTEMacCarthy1994158–159National_Trust20033_61-0"><a data-dcnode-id="4633" href="#cite_note-FOOTNOTEMacCarthy1994158%E2%80%93159National_Trust20033-61"><span data-dcnode-id="4634" instrument_node="">[61]</span></a></sup><span data-dcnode-id="4631" instrument_node=""> The settle from Red Lion Square was installed here, on top of which was fashioned a minstrels' gallery designed for </span><a data-dcnode-id="4629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christmas" title="Christmas"><span data-dcnode-id="4630" instrument_node="">Christmas</span></a><span data-dcnode-id="4628" instrument_node=""> concerts.</span><sup class="reference" data-dcnode-id="4625" id="cite_ref-FOOTNOTEMacCarthy1994159_62-0"><a data-dcnode-id="4626" href="#cite_note-FOOTNOTEMacCarthy1994159-62"><span data-dcnode-id="4627" instrument_node="">[62]</span></a></sup><span data-dcnode-id="4624" instrument_node="">
Designs were pricked into the ceilings and then painted with simple, bold patterns.</span><sup class="reference" data-dcnode-id="4621" id="cite_ref-FOOTNOTEMackail1901159_57-1"><a data-dcnode-id="4622" href="#cite_note-FOOTNOTEMackail1901159-57"><span data-dcnode-id="4623" instrument_node="">[57]</span></a></sup><span data-dcnode-id="4620" instrument_node=""> Commenting on the designs being introduced by his friend, in February 1862 Burne-Jones wrote that "Top [i.e. Morris] thrives through bandy, and is slowly making Red House the beautifullest place on Earth."</span><sup class="reference" data-dcnode-id="4617" id="cite_ref-FOOTNOTEMackail1901159_57-2"><a data-dcnode-id="4618" href="#cite_note-FOOTNOTEMackail1901159-57"><span data-dcnode-id="4619" instrument_node="">[57]</span></a></sup><span data-dcnode-id="4616" instrument_node="">
</span></p><span data-dcnode-id="4614" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="4605"><div class="thumbinner" data-dcnode-id="4606" style="width:222px;"><a class="image" data-dcnode-id="4612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThe_well_at_William_Morris%2527_Red_House.jpg"><img alt="" class="thumbimage" data-dcnode-id="4613" data-file-height="2237" data-file-width="1552" decoding="async" height="317" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/cb/The_well_at_William_Morris%2527_Red_House.jpg/220px-The_well_at_William_Morris%2527_Red_House.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/cb/The_well_at_William_Morris%27_Red_House.jpg/330px-The_well_at_William_Morris%27_Red_House.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/cb/The_well_at_William_Morris%27_Red_House.jpg/440px-The_well_at_William_Morris%27_Red_House.jpg 2x" width="220"></a><span data-dcnode-id="4611" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4607"><div class="magnify" data-dcnode-id="4609"><a class="internal" data-dcnode-id="4610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThe_well_at_William_Morris%2527_Red_House.jpg" title="Enlarge"></a></div><span data-dcnode-id="4608" instrument_node="">The well in the grounds of Red House</span></div></div></div><span data-dcnode-id="4604" instrument_node="">
</span><p data-dcnode-id="4569"><span data-dcnode-id="4603" instrument_node="">It was while living at Red House, in April 1861, that Morris co-founded a </span><a data-dcnode-id="4601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Decorative_arts" title="Decorative arts"><span data-dcnode-id="4602" instrument_node="">decorative arts</span></a><span data-dcnode-id="4600" instrument_node=""> company, </span><a data-dcnode-id="4598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Morris_%2526_Co." title="Morris &amp; Co."><span data-dcnode-id="4599" instrument_node="">Morris, Marshall, Faulkner &amp; Co.</span></a><span data-dcnode-id="4597" instrument_node="">, with six other partners: Burne-Jones, Rossetti, Webb, Ford Madox Brown, Charles Faulkner, and </span><a data-dcnode-id="4595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peter_Paul_Marshall" title="Peter Paul Marshall"><span data-dcnode-id="4596" instrument_node="">Peter Paul Marshall</span></a><span data-dcnode-id="4594" instrument_node="">. Operating from a premises at No. 6 </span><a data-dcnode-id="4592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red_Lion_Square" title="Red Lion Square"><span data-dcnode-id="4593" instrument_node="">Red Lion Square</span></a><span data-dcnode-id="4591" instrument_node="">, they referred to themselves as "the Firm" and were intent on adopting Ruskin's ideas of reforming British attitudes to production. They hoped to reinstate decoration as one of the fine arts and adopted an ethos of affordability and anti-elitism.</span><sup class="reference" data-dcnode-id="4588" id="cite_ref-FOOTNOTEMackail1901144–148Thompson195592–93MacCarthy1994166–169_63-0"><a data-dcnode-id="4589" href="#cite_note-FOOTNOTEMackail1901144%E2%80%93148Thompson195592%E2%80%9393MacCarthy1994166%E2%80%93169-63"><span data-dcnode-id="4590" instrument_node="">[63]</span></a></sup><span data-dcnode-id="4587" instrument_node=""> For additional staff, they employed boys from the </span><a class="new" data-dcnode-id="4585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DIndustrial_Home_for_Destitute_Boys%26action%3Dedit%26redlink%3D1" title="Industrial Home for Destitute Boys (page does not exist)"><span data-dcnode-id="4586" instrument_node="">Industrial Home for Destitute Boys</span></a><span data-dcnode-id="4584" instrument_node=""> in </span><a data-dcnode-id="4582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Euston_Road" title="Euston Road"><span data-dcnode-id="4583" instrument_node="">Euston</span></a><span data-dcnode-id="4581" instrument_node="">, central London, many of whom were trained as apprentices.</span><sup class="reference" data-dcnode-id="4578" id="cite_ref-FOOTNOTEMacCarthy1994175_64-0"><a data-dcnode-id="4579" href="#cite_note-FOOTNOTEMacCarthy1994175-64"><span data-dcnode-id="4580" instrument_node="">[64]</span></a></sup><span data-dcnode-id="4577" instrument_node=""> Although working within the Neo-Gothic school of design, they differed from Neo-Gothic architects like </span><a data-dcnode-id="4575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Gilbert_Scott" title="George Gilbert Scott"><span data-dcnode-id="4576" instrument_node="">Gilbert Scott</span></a><span data-dcnode-id="4574" instrument_node=""> who simply included certain Gothic features on modern styles of building; instead they sought to return completely to Medieval Gothic methods of craftmanship.</span><sup class="reference" data-dcnode-id="4571" id="cite_ref-FOOTNOTEThompson195599–100_65-0"><a data-dcnode-id="4572" href="#cite_note-FOOTNOTEThompson195599%E2%80%93100-65"><span data-dcnode-id="4573" instrument_node="">[65]</span></a></sup><span data-dcnode-id="4570" instrument_node="">
</span></p><p data-dcnode-id="4539"><span data-dcnode-id="4568" instrument_node="">The products created by the Firm included furniture, architectural carving, metalwork, stained glass windows, and murals.</span><sup class="reference" data-dcnode-id="4565" id="cite_ref-FOOTNOTEMackail1901151–152Thompson195594MacCarthy1994172_66-0"><a data-dcnode-id="4566" href="#cite_note-FOOTNOTEMackail1901151%E2%80%93152Thompson195594MacCarthy1994172-66"><span data-dcnode-id="4567" instrument_node="">[66]</span></a></sup><span data-dcnode-id="4564" instrument_node=""> Their stained glass windows proved a particular success in the firm's early years as they were in high demand for the surge in the Neo-Gothic construction and refurbishment of churches, many of which were commissioned by the architect </span><a data-dcnode-id="4562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Frederick_Bodley" title="George Frederick Bodley"><span data-dcnode-id="4563" instrument_node="">George Frederick Bodley</span></a><span data-dcnode-id="4561" instrument_node="">.</span><sup class="reference" data-dcnode-id="4558" id="cite_ref-FOOTNOTEMacCarthy1994176–177_67-0"><a data-dcnode-id="4559" href="#cite_note-FOOTNOTEMacCarthy1994176%E2%80%93177-67"><span data-dcnode-id="4560" instrument_node="">[67]</span></a></sup><span data-dcnode-id="4557" instrument_node=""> Despite Morris's anti-elitist ethos, the Firm soon became increasingly popular and fashionable with the bourgeoisie, particularly following their exhibit at the </span><a data-dcnode-id="4555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1862_International_Exhibition" title="1862 International Exhibition"><span data-dcnode-id="4556" instrument_node="">1862 International Exhibition</span></a><span data-dcnode-id="4554" instrument_node=""> in </span><a data-dcnode-id="4552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp
