</span><article class="post-893 post type-post status-publish format-standard hentry category-uncategorized" data-dcnode-id="385" id="post-893" itemscope="" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="540" instrument_node="">
</span><div class="inside-article" data-dcnode-id="388"><span data-dcnode-id="539" instrument_node="">
</span><header class="entry-header" data-dcnode-id="523"><span data-dcnode-id="538" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="536" itemprop="headline"><span data-dcnode-id="537" instrument_node="">James Monroe</span></h1><span data-dcnode-id="535" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="526"><span data-dcnode-id="534" instrument_node="">
</span><span class="posted-on" data-dcnode-id="528"><a data-dcnode-id="529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.revolutionary-war.net/james-monroe/" rel="bookmark" title="10:33 am"><time class="updated" data-dcnode-id="532" datetime="2020-03-04T14:16:14+00:00" itemprop="dateModified"><span data-dcnode-id="533" instrument_node="">March 4, 2020</span></time><time class="entry-date published" data-dcnode-id="530" datetime="2020-02-14T10:33:45+00:00" itemprop="datePublished"><span data-dcnode-id="531" instrument_node="">February 14, 2020</span></time></a></span><span data-dcnode-id="527" instrument_node=""> </span></div><span data-dcnode-id="524" instrument_node="">
</span></header><span data-dcnode-id="521" instrument_node="">
</span><div class="entry-content" data-dcnode-id="411" itemprop="text"><span data-dcnode-id="520" instrument_node="">
</span><p data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">James Monroe is a lesser-known Founding Father and the fifth president of the United States.</span></p><span data-dcnode-id="517" instrument_node="">
</span><h3 data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Early Life &amp; Education</span></h3><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="511"><span data-dcnode-id="513" instrument_node="">James Monroe was born on April 28, 1758 in Virginia. He was first educated by his mother between the ages of 11 and 16, and then was sent to study at Cambellton Academy. When Monroe was sixteen years old, his father died leaving him their plantation and slaves. At that time, he began forming a close relationship with his Uncle, Judge Joseph Jones. That same year, Monroe enrolled in the College of William and Mary. In 1768, he married Elizabeth Kortright.</span><br data-dcnode-id="512"></p><span data-dcnode-id="510" instrument_node="">
</span><h3 data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">The Continental Army</span></h3><span data-dcnode-id="507" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="498"><figure class="alignleft size-large" data-dcnode-id="499"><img alt="" class="wp-image-1006" data-dcnode-id="506" sizes="(max-width: 400px) 100vw, 400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.revolutionary-war.net/wp-content/uploads/2020/02/monroe-trenton.jpg&amp;raw" srcset="https://www.revolutionary-war.net/wp-content/uploads/2020/02/monroe-trenton.jpg 400w, https://www.revolutionary-war.net/wp-content/uploads/2020/02/monroe-trenton-300x199.jpg 300w"><figcaption data-dcnode-id="500"><span data-dcnode-id="505" instrument_node=""> </span><strong data-dcnode-id="502"><em data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">“The Capture of the Hessians at the Battle of Trenton” by John Trumbull | Public domain image.</span></em></strong><span data-dcnode-id="501" instrument_node=""> </span></figcaption></figure></div><span data-dcnode-id="497" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="496" instrument_node="">In the Spring of 1775 (Monroe was 17) he dropped out of college and joined the Continental Army. Upon his arrival, due to his status as a plantation owner, he was positioned as an officer. In June that year, he and 24 men (all older than himself) raided the arsenal at Governor’s Palace. They successfully walked away with 300 swords and 200 muskets which were used to arm the Williamsburg Militia.</span><br data-dcnode-id="495"></p><span data-dcnode-id="493" instrument_node="">
</span><p data-dcnode-id="484"><span data-dcnode-id="492" instrument_node="">Monroe served as a military officer until he was shot in the shoulder in the&nbsp;</span><a data-dcnode-id="490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.revolutionary-war.net/the-battle-of-trenton-new-jersey/"><span data-dcnode-id="491" instrument_node="">Battle of Trenton</span></a><span data-dcnode-id="489" instrument_node="">&nbsp;in 1776. In the famous painting “Capture of the Hessians at the Battle of Trenton” by John Trumbull, James Monroe is lying on the ground wounded in the left center area. Later in the famous painting “Washington Crossing the Delaware”, Monroe is seen carrying the flag right behind&nbsp;</span><a data-dcnode-id="487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.revolutionary-war.net/george-washington/"><span data-dcnode-id="488" instrument_node="">George Washington</span></a><span data-dcnode-id="486" instrument_node="">.</span><br data-dcnode-id="485"></p><span data-dcnode-id="483" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="481"><img alt="" class="wp-image-985" data-dcnode-id="482" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.revolutionary-war.net/wp-content/uploads/2020/02/george-washington-crosses-the-delaware-by-emanuel-leutze-wcpd.jpg&amp;raw" srcset="https://www.revolutionary-war.net/wp-content/uploads/2020/02/george-washington-crosses-the-delaware-by-emanuel-leutze-wcpd.jpg 500w, https://www.revolutionary-war.net/wp-content/uploads/2020/02/george-washington-crosses-the-delaware-by-emanuel-leutze-wcpd-300x179.jpg 300w"></figure><span data-dcnode-id="480" instrument_node="">
</span><p data-dcnode-id="472"><strong data-dcnode-id="473"><em data-dcnode-id="474"><span data-dcnode-id="479" instrument_node="">“Washington Crossing the Delaware”, by Emanuel Leutze.</span><br data-dcnode-id="478"><span data-dcnode-id="477" instrument_node="">Monroe is behind Washington with the flag</span><br data-dcnode-id="476"><span data-dcnode-id="475" instrument_node="">Public domain image.</span></em></strong></p><span data-dcnode-id="471" instrument_node="">
</span><h3 data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Law Career</span></h3><span data-dcnode-id="468" instrument_node="">
</span><p data-dcnode-id="463"><span data-dcnode-id="467" instrument_node="">James never fully recovered from his shoulder injury, at least not well enough to continue his fighting career. In 1780 – 1783, he studied law as&nbsp;</span><a data-dcnode-id="465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.revolutionary-war.net/thomas-jefferson/"><span data-dcnode-id="466" instrument_node="">Thomas Jefferson</span></a><span data-dcnode-id="464" instrument_node="">‘s apprentice. When he passed the foo, he secured a job practicing law in Fredericksburg VA. In 1782, he was elected to the Virginia House of Delegates, and soon after was elected to the Fourth – Sixth Continental Congress.</span></p><span data-dcnode-id="462" instrument_node="">
</span><p data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">In 1786, his wife gave birth to their first child, Eliza. In 1799, came their first boy child, James Spence, and finally Maria Hester in 1803. All of their children were loved and provided for very well by their parents. Maria was the first president’s child to have her wedding in the White House.</span></p><span data-dcnode-id="459" instrument_node="">
</span><h3 data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Political Positions</span></h3><span data-dcnode-id="456" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="444"><img alt="" class="wp-image-1004" data-dcnode-id="455" height="347" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.revolutionary-war.net/wp-content/uploads/2020/02/james-monroe.gif&amp;raw" width="288"><figcaption data-dcnode-id="445"><span data-dcnode-id="454" instrument_node=""> </span><strong data-dcnode-id="447"><em data-dcnode-id="448"><span data-dcnode-id="453" instrument_node="">President James Monroe</span><br data-dcnode-id="452"><a data-dcnode-id="450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/File%3AJames_Monroe_White_House_portrait_1819.gif" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="451" instrument_node="">Public domain image</span></a><span data-dcnode-id="449" instrument_node="">.</span></em></strong><span data-dcnode-id="446" instrument_node=""> </span></figcaption></figure><span data-dcnode-id="443" instrument_node="">
</span><p data-dcnode-id="435"><span data-dcnode-id="442" instrument_node="">In 1790, Monroe was elected as United States Senator, by the Virginia Legislature. Soon after his election, he joined the political party led by Jefferson and&nbsp;</span><a data-dcnode-id="440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.revolutionary-war.net/james-madison/"><span data-dcnode-id="441" instrument_node="">James Madison</span></a><span data-dcnode-id="439" instrument_node="">; “Democratic-Republican” faction. By 1791, he was the leader of that party in the Senate. In 1794, he was appointed minister to France, and resigned his seat in the senate to focus on that. In this position, he was able to arrange the release of all American citizens being held prisoner in France during the French Revolution (including&nbsp;</span><a data-dcnode-id="437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.revolutionary-war.net/thomas-paine/"><span data-dcnode-id="438" instrument_node="">Thomas Paine</span></a><span data-dcnode-id="436" instrument_node="">), under the circumstances that they be deported to the United States. When Monroe and Washington had differences of opinion over whether or not the United States was favoring Britain over France even though they had a strict “neutrality” policy, Washington relieved Monroe of his position as Ambassador to France.</span></p><span data-dcnode-id="434" instrument_node="">
</span><p data-dcnode-id="426"><span data-dcnode-id="433" instrument_node="">After that Monroe was elected governor of VA for a few terms, but still dipped his toes in French affairs every so often, more so during Jefferson’s presidency. Monroe largely opposed&nbsp;</span><em data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">the Federalist Papers</span></em><span data-dcnode-id="430" instrument_node="">, and the Federalist Party’s collapse in 1816 left him almost no political opposition. When he ran for president in 1816, only one person cast their vote for&nbsp;</span><a data-dcnode-id="428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.revolutionary-war.net/john-quincy-adams/"><span data-dcnode-id="429" instrument_node="">John Quincy Adams</span></a><span data-dcnode-id="427" instrument_node="">, leaving James Monroe almost unanimously voted for as the fifth president of the United States.</span></p><span data-dcnode-id="425" instrument_node="">
</span><h3 data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Presidency and Later Life</span></h3><span data-dcnode-id="422" instrument_node="">
</span><p data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">Monroe was a popular president, who went out of his way to promote good feeling with Americans. His mostly uneventful presidency was called “the Era of Good Feelings”, partly because of the euphoria following the success of the Battle of 1812, partly because the American people loved Monroe, but partly in sarcasm since the political parties were still at war with each other.</span></p><span data-dcnode-id="419" instrument_node="">
</span><p data-dcnode-id="413"><span data-dcnode-id="418" instrument_node="">While he was good with the people, his politics were not very disciplined and after his two terms, he retired to Monroe Hill. James Monroe died on July 4, 1831, on the 5-year anniversary of the deaths of Thomas Jefferson and&nbsp;</span><a data-dcnode-id="416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.revolutionary-war.net/john-adams/"><span data-dcnode-id="417" instrument_node="">John Adams</span></a><span data-dcnode-id="415" instrument_node="">, becoming the third president and Founding Father to pass on Independence Day. There are at least 5 landmarks that bear Monroe’s name including cities and towns including a West African country named “Monrovia”.</span><br data-dcnode-id="414"></p><span data-dcnode-id="412" instrument_node="">
</span></div><span data-dcnode-id="409" instrument_node="">
