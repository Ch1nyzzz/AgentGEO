</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1197" id="mntl-sc-block_1-0"><span data-dcnode-id="1201" instrument_node="">
William Morris (March 24, 1834–Oct. 3, 1896) was an artist, designer, poet, craftsman, and political writer who had a major impact on the fashions and ideologies of Victorian Britain and the English </span><a data-component="link" data-dcnode-id="1199" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/craftsman-farms-beauty-harmony-simplicity-178055"><span data-dcnode-id="1200" instrument_node="">Arts and Crafts Movement</span></a><span data-dcnode-id="1198" instrument_node="">. He also had a profound influence on building design, but he's better known today for his textile designs, which have been repurposed as wallpaper and wrapping paper.
</span></p><span data-dcnode-id="1196" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1185" id="mntl-sc-block_1-0-1"><div class="comp mntl-block" data-dcnode-id="1186" id="mntl-block_4-0"><span data-dcnode-id="1195" instrument_node="">

</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1139" id="mntl-sc-block-callout-body_1-0"><span data-dcnode-id="1179" instrument_node="">
</span><ul data-dcnode-id="1140"><li data-dcnode-id="1175"><strong data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">Known For</span></strong><span data-dcnode-id="1176" instrument_node="">: Leader of Arts and Crafts Movement</span></li><li data-dcnode-id="1171"><strong data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">Born</span></strong><span data-dcnode-id="1172" instrument_node="">: March 24, 1834 in Walthamstow, England</span></li><li data-dcnode-id="1167"><strong data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">Parents</span></strong><span data-dcnode-id="1168" instrument_node="">: William Morris Sr., Emma Shelton Morris</span></li><li data-dcnode-id="1163"><strong data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Died</span></strong><span data-dcnode-id="1164" instrument_node="">: Oct. 3, 1896 in Hammersmith, England</span></li><li data-dcnode-id="1159"><strong data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">Education</span></strong><span data-dcnode-id="1160" instrument_node="">: Marlborough and Exeter colleges</span></li><li data-dcnode-id="1153"><strong data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Published Works</span></strong><span data-dcnode-id="1156" instrument_node="">: </span><em data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">The Defence of Guenevere and Other Poems, The Life and Death of Jason, The Earthly Paradise</span></em></li><li data-dcnode-id="1149"><strong data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">Spouse</span></strong><span data-dcnode-id="1150" instrument_node="">: Jane Burden Morris</span></li><li data-dcnode-id="1145"><strong data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Children</span></strong><span data-dcnode-id="1146" instrument_node="">: Jenny Morris, May Morris</span></li><li data-dcnode-id="1141"><strong data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">Notable Quote</span></strong><span data-dcnode-id="1142" instrument_node="">: "If you want a golden rule that will fit everything, this is it: Have nothing in your houses that you do not know to be useful or believe to be beautiful."</span></li></ul></div><span data-dcnode-id="1138" instrument_node="">

</span><span class="heading-toc" data-dcnode-id="1135" id="toc-early-life"></span><span data-dcnode-id="1134" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1129" id="mntl-sc-block_1-0-3"><span data-dcnode-id="1133" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node=""> Early Life </span></span><span data-dcnode-id="1130" instrument_node=""> </span></h2><span data-dcnode-id="1128" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1126" id="mntl-sc-block_1-0-4"><span data-dcnode-id="1127" instrument_node="">
William Morris was born on March 24, 1834, in Walthamstow, England. He was the third child of William Morris Sr. and Emma Shelton Morris, though his two older siblings died in infancy, leaving him the eldest. Eight survived into adulthood. William Sr. was a successful senior partner at brokers firm.
</span></p><span data-dcnode-id="1125" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1114" id="mntl-sc-block_1-0-5"><div class="comp mntl-block" data-dcnode-id="1115" id="mntl-block_5-0"><span data-dcnode-id="1124" instrument_node="">

He enjoyed an idyllic childhood in the countryside, playing with his siblings, reading books, writing, and showing an early interest in nature and storytelling.&nbsp;His love of the natural world would have a growing influence on his later work.

</span><span class="heading-toc" data-dcnode-id="1082" id="toc-college"></span><span data-dcnode-id="1081" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1076" id="mntl-sc-block_1-0-10"><span data-dcnode-id="1080" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node=""> College </span></span><span data-dcnode-id="1077" instrument_node=""> </span></h2><span data-dcnode-id="1075" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1067" id="mntl-sc-block_1-0-11"><span data-dcnode-id="1074" instrument_node="">
Morris attended Marlborough and Exeter colleges, where he met painter Edward Burne-Jones and poet Dante Gabriel Rossetti, forming a group known as the Brotherhood, or the Pre-Raphaelite Brotherhood. They shared a love of poetry, the Middle Ages, and Gothic architecture, and they read the works of philosopher </span><a data-component="link" data-dcnode-id="1072" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/john-ruskin-philosopher-for-today-177872"><span data-dcnode-id="1073" instrument_node="">John Ruskin</span></a><span data-dcnode-id="1071" instrument_node="">. They also developed an interest in the </span><a data-component="link" data-dcnode-id="1069" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/victorian-gothic-house-styles-178207"><span data-dcnode-id="1070" instrument_node="">Gothic Revival</span></a><span data-dcnode-id="1068" instrument_node=""> architectural style.
</span></p><span data-dcnode-id="1066" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1055" id="mntl-sc-block_1-0-12"><div class="comp mntl-block" data-dcnode-id="1056" id="mntl-block_8-0"><span data-dcnode-id="1065" instrument_node="">
</span><div class="comp scads-to-load right-rail__item ref-billboard4-sticky-dynamic mntl-sc-sticky-billboard scads-stick-in-parent scads-ad-placed" data-dcnode-id="1058" data-height="600" id="ref-billboard4-sticky-dynamic_2-0" style="height: 600px; top: 2746px;"><span data-dcnode-id="1064" instrument_node="">
</span><div class="comp mntl-billboard mntl-sc-sticky-billboard-ad mntl-dynamic-billboard mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt billboard dynamic js-lazy-ad" data-dcnode-id="1060" id="mntl-sc-sticky-billboard-ad_10-0"><span data-dcnode-id="1063" instrument_node="">
</span><div class="wrapper" data-auction-floor-id="f56ba304b0aa4001be9d9d25fd6a91e9" data-auction-floor-value="105" data-dcnode-id="1062" data-pos="btf3" data-priority="6" data-rtb="true" data-sizes="[[300, 250],[300, 600],[300, 253],[250, 250],[200, 200],[180, 150],[4, 1],&quot;fluid&quot;]" data-targeting="{}" data-type="billboard" id="billboard4"></div><span data-dcnode-id="1061" instrument_node="">
</span></div><span data-dcnode-id="1059" instrument_node="">
</span></div><span data-dcnode-id="1057" instrument_node="">
</span></div></div><span data-dcnode-id="1054" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1046" id="mntl-sc-block_1-0-13"><span data-dcnode-id="1053" instrument_node="">
This wasn't entirely an academic or social brotherhood; they were inspired by Ruskin's writings. </span><a data-component="link" data-dcnode-id="1051" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/guide-to-the-industrial-revolution-1221914"><span data-dcnode-id="1052" instrument_node="">The Industrial Revolution</span></a><span data-dcnode-id="1050" instrument_node=""> that began in Britain had turned the country into something unrecognizable to the young men. Ruskin wrote about society's ills in books such as "The Seven Lamps of Architecture" and "The Stones of Venice." The group discussed </span><a data-component="link" data-dcnode-id="1048" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/themes-in-works-of-john-ruskin-177883"><span data-dcnode-id="1049" instrument_node="">Ruskin's themes</span></a><span data-dcnode-id="1047" instrument_node=""> about the impacts of industrialization: how machines dehumanize, how industrialization ruins the environment, and how mass production creates shoddy, unnatural objects.
</span></p><span data-dcnode-id="1045" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1044" id="mntl-sc-block_1-0-14"></div><span data-dcnode-id="1043" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1041" id="mntl-sc-block_1-0-15"><span data-dcnode-id="1042" instrument_node="">
The group believed that the artistry and honesty in handcrafted materials were missing in British machine-made goods. They longed for an earlier time.
</span></p><span data-dcnode-id="1040" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1039" id="mntl-sc-block_1-0-16"></div><span data-dcnode-id="1038" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1037" id="toc-painting"></span><span data-dcnode-id="1036" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1031" id="mntl-sc-block_1-0-17"><span data-dcnode-id="1035" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node=""> Painting </span></span><span data-dcnode-id="1032" instrument_node=""> </span></h2><span data-dcnode-id="1030" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1022" id="mntl-sc-block_1-0-18"><span data-dcnode-id="1029" instrument_node="">
Visits to the continent spent touring cathedrals and museums solidified Morris' love of medieval art. Rossetti persuaded him to give up architecture for painting, and they joined a band of friends decorating the walls of the Oxford Union with scenes from the&nbsp;</span><a data-component="link" data-dcnode-id="1027" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/what-is-arthurian-romance-740354"><span data-dcnode-id="1028" instrument_node="">Arthurian legend</span></a><span data-dcnode-id="1026" instrument_node="">&nbsp;based on&nbsp;"Le Morte d'Arthur"&nbsp;by 15th century English writer&nbsp;</span><a data-component="link" data-dcnode-id="1024" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/the-medieval-chivalric-romance-740720"><span data-dcnode-id="1025" instrument_node="">Sir Thomas Malory</span></a><span data-dcnode-id="1023" instrument_node="">. Morris also wrote much poetry during this time.
</span></p><span data-dcnode-id="1021" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1010" id="mntl-sc-block_1-0-19"><div class="comp mntl-block" data-dcnode-id="1011" id="mntl-block_9-0"><span data-dcnode-id="1020" instrument_node="">
</span><div class="comp scads-to-load right-rail__item ref-billboard5-sticky-dynamic mntl-sc-sticky-billboard scads-stick-in-parent scads-ad-placed" data-dcnode-id="1013" data-height="600" id="ref-billboard5-sticky-dynamic_2-0" style="height: 600px; top: 3446px;"><span data-dcnode-id="1019" instrument_node="">
</span><div class="comp mntl-billboard mntl-sc-sticky-billboard-ad mntl-dynamic-billboard mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt billboard dynamic js-lazy-ad" data-dcnode-id="1015" id="mntl-sc-sticky-billboard-ad_12-0"><span data-dcnode-id="1018" instrument_node="">
</span><div class="wrapper" data-auction-floor-id="10ba6b0f121548579b01537d8368aa14" data-auction-floor-value="55" data-dcnode-id="1017" data-pos="btf4" data-priority="7" data-rtb="true" data-sizes="[[300, 250],[300, 254],[250, 250],[200, 200],[180, 150],[6, 1],&quot;fluid&quot;]" data-targeting="{}" data-type="billboard" id="billboard5"></div><span data-dcnode-id="1016" instrument_node="">
</span></div><span data-dcnode-id="1014" instrument_node="">
</span></div><span data-dcnode-id="1012" instrument_node="">
</span></div></div><span data-dcnode-id="1009" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1007" id="mntl-sc-block_1-0-20"><span data-dcnode-id="1008" instrument_node="">
For a painting of Guinevere, he used as his model Jane Burden, the daughter of an Oxford groom. They married in 1859.
</span></p><span data-dcnode-id="1006" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1005" id="mntl-sc-block_1-0-21"></div><span data-dcnode-id="1004" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1003" id="toc-architecture-and-design"></span><span data-dcnode-id="1002" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="997" id="mntl-sc-block_1-0-22"><span data-dcnode-id="1001" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node=""> Architecture and Design </span></span><span data-dcnode-id="998" instrument_node=""> </span></h2><span data-dcnode-id="996" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="994" id="mntl-sc-block_1-0-23"><span data-dcnode-id="995" instrument_node="">
After receiving his degree in 1856, Morris took a job in the Oxford office of G.E. Street, a Gothic Revivalist architect. That year he financed the first 12 monthly issues of&nbsp;The Oxford and Cambridge Magazine, where a number of his poems were printed. Two years later, many of these poems were reprinted in his first published work&nbsp;"The Defence of Guenevere and Other Poems."
</span></p><span data-dcnode-id="993" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="992" id="mntl-sc-block_1-0-24"></div><span data-dcnode-id="991" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="986" id="mntl-sc-block_1-0-25"><span data-dcnode-id="990" instrument_node="">
Morris commissioned </span><a data-component="link" data-dcnode-id="988" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/philip-webb-architect-and-designer-177879"><span data-dcnode-id="989" instrument_node="">Philip Webb</span></a><span data-dcnode-id="987" instrument_node="">, an architect he had met in Street’s office, to build a home for him and his wife. It was called the&nbsp;Red House because it was to be built of red brick instead of the more fashionable stucco. They lived there from 1860 to 1865.
</span></p><span data-dcnode-id="985" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="974" id="mntl-sc-block_1-0-26"><div class="comp mntl-block" data-dcnode-id="975" id="mntl-block_10-0"><span data-dcnode-id="984" instrument_node="">
</span><div class="comp scads-to-load right-rail__item ref-billboard6-sticky-dynamic mntl-sc-sticky-billboard scads-stick-in-parent scads-ad-placed" data-dcnode-id="977" data-height="600" id="ref-billboard6-sticky-dynamic_1-0" style="height: 600px; top: 4146px;"><span data-dcnode-id="983" instrument_node="">
</span><div class="comp mntl-billboard mntl-sc-sticky-billboard-ad mntl-dynamic-billboard mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt billboard dynamic js-lazy-ad" data-dcnode-id="979" id="mntl-sc-sticky-billboard-ad_13-0"><span data-dcnode-id="982" instrument_node="">
</span><div class="wrapper" data-auction-floor-id="0caa42cf7280481ebb9c69581524920b" data-auction-floor-value="40" data-dcnode-id="981" data-pos="btf5" data-priority="8" data-rtb="true" data-sizes="[[300, 250],[300, 255],[250, 250],[200, 200],[180, 150],[7, 1],&quot;fluid&quot;]" data-targeting="{}" data-type="billboard" id="billboard6"></div><span data-dcnode-id="980" instrument_node="">
</span></div><span data-dcnode-id="978" instrument_node="">
</span></div><span data-dcnode-id="976" instrument_node="">
</span></div></div><span data-dcnode-id="973" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="971" id="mntl-sc-block_1-0-27"><span data-dcnode-id="972" instrument_node="">
The house, a grand yet simple structure, exemplified the Arts and Crafts philosophy inside and out, with craftsman-like workmanship and traditional, unornamented design. Other notable interiors by Morris include the 1866 Armoury and Tapestry Room at St. James' Palace and the 1867 Green Dining Room at the Victoria and Albert Museum.
</span></p><span data-dcnode-id="970" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="969" id="mntl-sc-block_1-0-28"></div><span data-dcnode-id="968" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="967" id="toc-fine-art-workmen"></span><span data-dcnode-id="966" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="961" id="mntl-sc-block_1-0-29"><span data-dcnode-id="965" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="963"><span data-dcnode-id="964" instrument_node=""> 'Fine Art Workmen' </span></span><span data-dcnode-id="962" instrument_node=""> </span></h2><span data-dcnode-id="960" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="958" id="mntl-sc-block_1-0-30"><span data-dcnode-id="959" instrument_node="">
As Morris and his friends were furnishing and decorating the house, they decided to start an association of “fine art workmen,” which in April 1861 became the firm of&nbsp;Morris, Marshall, Faulkner &amp; Co. Other members of the firm were painter&nbsp;Ford Madox Brown, Rossetti, Webb, and Burne-Jones.
</span></p><span data-dcnode-id="957" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="956" id="mntl-sc-block_1-0-31"></div><span data-dcnode-id="955" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="953" id="mntl-sc-block_1-0-32"><span data-dcnode-id="954" instrument_node="">
The group of like-minded artists and craftsmen responding to the shoddy practices of Victorian manufacturing became highly fashionable and much in demand, profoundly influencing interior decoration throughout the Victorian period.
</span></p><span data-dcnode-id="952" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="941" id="mntl-sc-block_1-0-33"><div class="comp mntl-block" data-dcnode-id="942" id="mntl-block_11-0"><span data-dcnode-id="951" instrument_node="">
</span><div class="comp scads-to-load right-rail__item ref-billboard7-sticky-dynamic mntl-sc-sticky-billboard is-hidden" data-dcnode-id="944" data-height="600" id="ref-billboard7-sticky-dynamic_1-0" style="height: 600px;"><span data-dcnode-id="950" instrument_node="">
</span><div class="comp mntl-billboard mntl-sc-sticky-billboard-ad mntl-dynamic-billboard mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt billboard dynamic" data-dcnode-id="946" id="mntl-sc-sticky-billboard-ad_14-0"><span data-dcnode-id="949" instrument_node="">
</span><div class="wrapper" data-auction-floor-id="daa077095a294d2ca303ee5b1463de4c" data-auction-floor-value="30" data-dcnode-id="948" data-pos="btf6" data-priority="9" data-rtb="true" data-sizes="[[300, 250],[300, 256],[250, 250],[200, 200],[180, 150],[8, 1],&quot;fluid&quot;]" data-targeting="{}" data-type="billboard" id="billboard7"></div><span data-dcnode-id="947" instrument_node="">
</span></div><span data-dcnode-id="945" instrument_node="">
</span></div><span data-dcnode-id="943" instrument_node="">
</span></div></div><span data-dcnode-id="940" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="938" id="mntl-sc-block_1-0-34"><span data-dcnode-id="939" instrument_node="">
At the International Exhibition of 1862, the group exhibited stained glass, furniture, and embroideries, leading to commissions to decorate several new churches. The pinnacle&nbsp;of the firm’s decorative work was a series of stained-glass windows designed by Burne-Jones for Jesus College Chapel, Cambridge, with the ceiling painted by Morris and Webb. Morris designed many other windows, for domestic and&nbsp;ecclesiastical&nbsp;use, as well as tapestries, wallpaper, fabrics, and furniture.
</span></p><span data-dcnode-id="937" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="936" id="mntl-sc-block_1-0-35"></div><span data-dcnode-id="935" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="934" id="toc-other-pursuits"></span><span data-dcnode-id="933" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="928" id="mntl-sc-block_1-0-36"><span data-dcnode-id="932" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="930"><span data-dcnode-id="931" instrument_node=""> Other Pursuits </span></span><span data-dcnode-id="929" instrument_node=""> </span></h2><span data-dcnode-id="927" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="922" id="mntl-sc-block_1-0-37"><span data-dcnode-id="926" instrument_node="">
He hadn't given up on poetry. Morris' first fame as a poet came with the romantic narrative&nbsp;"The Life and Death of Jason"&nbsp;(1867), followed by&nbsp;"The Earthly Paradise"</span><em data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">&nbsp;</span></em><span data-dcnode-id="923" instrument_node="">(1868-1870), a series of narrative poems based on classical and medieval sources.
</span></p><span data-dcnode-id="921" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="920" id="mntl-sc-block_1-0-38"></div><span data-dcnode-id="919" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="917" id="mntl-sc-block_1-0-39"><span data-dcnode-id="918" instrument_node="">
In 1875, Morris assumed total control of the "fine art workmen" company, which was renamed Morris &amp; Co. It remained in business until 1940, its longevity a testament to the success of Morris’ designs.
</span></p><span data-dcnode-id="916" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="915" id="mntl-sc-block_1-0-40"></div><span data-dcnode-id="914" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="912" id="mntl-sc-block_1-0-41"><span data-dcnode-id="913" instrument_node="">
By 1877, Morris and Webb had also established the Society for the Protection of Ancient Buildings (SPAB), a historic preservation organization. Morris explained its purposes in the SPAB Manifesto: "to put Protection in the place of Restoration...to treat our ancient buildings as monuments of a bygone art."
</span></p><span data-dcnode-id="911" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="910" id="mntl-sc-block_1-0-42"></div><span data-dcnode-id="909" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="907" id="mntl-sc-block_1-0-43"><span data-dcnode-id="908" instrument_node="">
One of the most exquisite tapestries produced by Morris' company was The Woodpecker, designed entirely by Morris. The tapestry, woven by William Knight and William Sleath, was shown at the Arts and Crafts Society Exhibition in 1888. Other patterns by Morris include Tulip and Willow Pattern, 1873, and Acanthus Pattern, 1879–81.
</span></p><span data-dcnode-id="906" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="905" id="mntl-sc-block_1-0-44"></div><span data-dcnode-id="904" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="899" id="mntl-sc-block_1-0-45"><span data-dcnode-id="903" instrument_node="">
Later in his life, Morris poured his energies into political writing. He was initially against the aggressive foreign policy of Conservative </span><a data-component="link" data-dcnode-id="901" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/benjamin-disraeli-novelist-and-british-statesman-1774009"><span data-dcnode-id="902" instrument_node="">Prime Minister Benjamin Disraeli</span></a><span data-dcnode-id="900" instrument_node="">, supporting Liberal Party leader William Gladstone. However, Morris became disillusioned after the 1880 election. He began writing for the Socialist Party and participated in socialist demonstrations.
</span></p><span data-dcnode-id="898" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="897" id="mntl-sc-block_1-0-46"></div><span data-dcnode-id="896" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="895" id="toc-death"></span><span data-dcnode-id="894" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="889" id="mntl-sc-block_1-0-47"><span data-dcnode-id="893" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="891"><span data-dcnode-id="892" instrument_node=""> Death </span></span><span data-dcnode-id="890" instrument_node=""> </span></h2><span data-dcnode-id="888" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="886" id="mntl-sc-block_1-0-48"><span data-dcnode-id="887" instrument_node="">
Morris and his wife were happiest together during the first 10 years of their marriage, but since a divorce was inconceivable at the time, they lived together until his death.
</span></p><span data-dcnode-id="885" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="884" id="mntl-sc-block_1-0-49"></div><span data-dcnode-id="883" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="881" id="mntl-sc-block_1-0-50"><span data-dcnode-id="882" instrument_node="">
Exhausted by his many activities, Morris bean to feel his energy waning. A voyage to Norway in the summer of 1896 failed to revive him, and he died shortly after returning home, in Hammersmith, England, on Oct. 3, 1896. He was buried under a simple gravestone designed by Webb.
</span></p><span data-dcnode-id="880" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="879" id="mntl-sc-block_1-0-51"></div><span data-dcnode-id="878" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="877" id="toc-legacy"></span><span data-dcnode-id="876" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="871" id="mntl-sc-block_1-0-52"><span data-dcnode-id="875" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="873"><span data-dcnode-id="874" instrument_node=""> Legacy </span></span><span data-dcnode-id="872" instrument_node=""> </span></h2><span data-dcnode-id="870" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="868" id="mntl-sc-block_1-0-53"><span data-dcnode-id="869" instrument_node="">
Morris is now regarded as a modern visionary thinker, though he turned from what he called “the dull squalor of civilization” to historical romance,&nbsp;myth, and epic. Following Ruskin, Morris defined beauty in art as the result of man’s pleasure in his work. To Morris, art included the whole man-made&nbsp;environment.
</span></p><span data-dcnode-id="867" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="866" id="mntl-sc-block_1-0-54"></div><span data-dcnode-id="865" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="863" id="mntl-sc-block_1-0-55"><span data-dcnode-id="864" instrument_node="">
In his own time he&nbsp;was best known as the author of&nbsp;"The Earthly Paradise"&nbsp;and for his designs for wallpapers, textiles, and carpets. Since the mid-20th century, Morris has been celebrated as a designer and craftsman. Future generations may esteem him more as a social and moral critic, a pioneer of the society of equality.
</span></p><span data-dcnode-id="862" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="861" id="mntl-sc-block_1-0-56"></div><span data-dcnode-id="860" instrument_node="">
