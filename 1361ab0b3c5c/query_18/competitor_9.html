p;url=https%3A//kidadl.com/authors/persis-love"><span data-dcnode-id="380" instrument_node="">Persis Love</span></a></div><p class="Text-mqm5am-0 jFaOBK" color="#B10020" data-dcnode-id="374" font-size="16px" font-weight="400" style="white-space:nowrap"><span data-dcnode-id="377" instrument_node="">Updated on </span><span data-dcnode-id="375" instrument_node="">Apr 18, 2022</span></p><p class="Text-mqm5am-0 jFaOBK" color="#B10020" data-dcnode-id="370" font-size="16px" font-weight="400" style="white-space:nowrap"><span data-dcnode-id="373" instrument_node="">Published on </span><span data-dcnode-id="371" instrument_node="">Jun 26, 2021</span></p><p class="Text-mqm5am-0 jFaOBK" color="#B10020" data-dcnode-id="365" font-size="16px" font-weight="400"><span data-dcnode-id="369" instrument_node="">5</span><span data-dcnode-id="368" instrument_node=""> </span><span data-dcnode-id="367" instrument_node="">mins</span><span data-dcnode-id="366" instrument_node=""> to read</span></p></div></div></div></div><div class="Box-sup55n-0 gQPbTc" data-dcnode-id="105" width="100%"><div class="Box-sup55n-0 euuAJC" data-dcnode-id="106"><div class="Flex-sc-11xujgn-0 eWvaLi" data-dcnode-id="107"><div class="Flex-sc-11xujgn-0 izcXUV" data-dcnode-id="108" width="100%"><div class="Grid-djwx7w-0 jEkWnE" data-dcnode-id="109" width="100%"><div class="Flex-sc-11xujgn-0 bXFXc container-article-text" data-dcnode-id="111" width="auto,,,620px"><div class="mediavine-hoist" data-dcnode-id="358"><div class="mv-custom-video-hoist" data-dcnode-id="359"><div class="mv-video-target mv-video__featured mv-video__optimized mv-video__embedded" data-autoinsert="true" data-autoplay="false" data-dcnode-id="360" data-disable-jsonld="true" data-video-id="e4bzytgqouekybvqeo7z"></div></div></div><div class="Box-sup55n-0 ArticleBody__BaseArticleBody-yq0zjv-0 ArticleBody__ArticlesBody-yq0zjv-1 gzqKZH jxtqVj edNru rich-text-article-body" data-dcnode-id="194" font-size="18px"><p data-dcnode-id="355"><i data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">Image © Birmingham Museums Trust.</span></i></p><p data-dcnode-id="350"><span data-dcnode-id="354" instrument_node="">One of the most famous </span><a data-dcnode-id="352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kidadl.com/articles/queen-victoria-facts-for-ks2-everything-you-need-to-know"><span data-dcnode-id="353" instrument_node="">Victorian</span></a><span data-dcnode-id="351" instrument_node=""> artists, William Morris' work went far beyond just fine art - to architecture, poetry and wallpaper among many other things.</span></p><p data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">The Victorian era is a big part of the KS2 history syllabus and the William Morris topic is taught mainly in Year 6 as an art module. With his leafy wallpaper designs, repeating patterns of grapes, birds and other animals, there are loads of fun creative projects to help children learn about William Morris art at home.</span></p><div data-dcnode-id="347" id="ntvart1"></div><p data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">With his focus on art within the home - furniture, fabric and wallpaper among other things - this is a great opportunity for the whole family to make some beautiful pieces of art to fill your home with.</span></p><h2 data-dcnode-id="343" id="who-was-william-morris"><span data-dcnode-id="344" instrument_node="">Who Was William Morris?</span></h2><figure class="image" data-dcnode-id="341"><img alt="Black and white picture of William Morris." data-dcnode-id="342" sizes="100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.kidadl.com/5f492702d66e1d48230c6794-photo-william-morris.jpeg.webp&amp;raw" srcset="https://media.kidadl.com/thumbnail_5f492702d66e1d48230c6794-photo-william-morris.jpeg.webp 245w,https://media.kidadl.com/small_5f492702d66e1d48230c6794-photo-william-morris.jpeg.webp 500w,https://media.kidadl.com/medium_5f492702d66e1d48230c6794-photo-william-morris.jpeg.webp 750w,https://media.kidadl.com/5f492702d66e1d48230c6794-photo-william-morris.jpeg.webp 800w" width="800"></figure><p data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">Image © Frederick Hollyer</span></p><p data-dcnode-id="334"><span data-dcnode-id="338" instrument_node="">William Morris was an artist, architect, furniture and fabric designer, writer, translator and socialist who founded the </span><a data-dcnode-id="336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kidadl.com/fun-facts/here-are-arts-and-crafts-movement-facts-for-you"><span data-dcnode-id="337" instrument_node="">arts and crafts movement</span></a><span data-dcnode-id="335" instrument_node="">. He believed that art should be present in everyday objects like textiles and homeware, and everyone should be able to have arts and crafts in their life.</span></p><p data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Over the course of his life, he had a huge impact on art and design and many of his wallpapers and textiles are still being made today.</span></p><p data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">He was born in 1834 and died aged 62 in 1896. The Victorian era went from 1837 to 1901 so William Morris was truly a Victorian artist.</span></p><h2 data-dcnode-id="328" id="facts-about-william-morris"><span data-dcnode-id="329" instrument_node="">Facts About William Morris</span></h2><p data-dcnode-id="324"><strong data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">He was born in 1834:</span></strong><span data-dcnode-id="325" instrument_node=""> William Morris was born in Walthamstow in East London. He had one sister eight years younger than him.</span></p><p data-dcnode-id="320"><strong data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">His nickname was Topsy: </span></strong><span data-dcnode-id="321" instrument_node="">He was known as Topsy because his curly hair was like a character in Uncle Tom's Cabin.</span></p><p data-dcnode-id="316"><strong data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">He originally wanted to be a priest: </span></strong><span data-dcnode-id="317" instrument_node="">Morris and his friend Edward Burne-Jones originally wanted to be clergymen, thinking that they could live in a monastery and dedicate their lives to Christianity and to art. However, Morris became critical of some of the Church's teachings and gave up on the idea.</span></p><p data-dcnode-id="312"><strong data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">Morris preferred historical handcraft techniques over machines: </span></strong><span data-dcnode-id="313" instrument_node="">He was born towards the end of the industrial revolution and didn't like the fact that machines were taking over from traditional craft techniques.</span></p><p data-dcnode-id="305"><strong data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">He studied at Exeter College, Oxford: </span></strong><span data-dcnode-id="309" instrument_node="">He studied Classics at Oxford University. He found he wasn't that interested in the course but instead became strongly inspired by medieval history,</span><strong data-dcnode-id="307"><span data-dcnode-id="308" instrument_node=""> </span></strong><span data-dcnode-id="306" instrument_node="">style and craft techniques.</span></p><p data-dcnode-id="301"><strong data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">He was part of the Pre-Raphaelite art movement: </span></strong><span data-dcnode-id="302" instrument_node="">William Morris and his friend Edward Burne-Jones were inspired by the paintings of the Pre-Raphaelites (a group of English artists established in 1848). After leaving university, the two friends began working for one of the leading Pre-Raphaelite artists, Dante Gabriel Rossetti and the three of them became good friends.</span></p><p data-dcnode-id="297"><strong data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">He was married with two children: </span></strong><span data-dcnode-id="298" instrument_node="">He married his wife, Jane Burden in 1858 and they went on to have two daughters called May Morris and Jane Alice Morris. He and Burden met at a theatre performance the year before. She became a model for Rossetti's paintings and the two friends reportedly fell in love with her.</span></p><p data-dcnode-id="293"><strong data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">He was heavily influenced by the Romantic movement: </span></strong><span data-dcnode-id="294" instrument_node="">Romanticism was a European art and literature movement that began in the late 1700s and continued to the late 1800s.</span></p><p data-dcnode-id="289"><strong data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">He was an architect and built his own house: </span></strong><span data-dcnode-id="290" instrument_node="">After university Morris trained as an architect, specialising in the Gothic style. The William Morris home in London is still open to visit. It is called the Red House and is in Bexleyheath, Kent, just outside Southeast London. It is called the Red House because of the red bricks it is made from. &nbsp;Another of the famous William Morris houses (but one that he did not build) is called Kelmscott Manor, located in Oxfordshire. He and his family shared it with his friend Dante Gabriel Rossetti. He wanted to move further away from the city so that his daughters could get away from the pollution.</span></p><p data-dcnode-id="285"><strong data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">He started his own design firm making decorative homeware: </span></strong><span data-dcnode-id="286" instrument_node="">With fellow Pre-Raphaelite artists Edward Burne-Jones and Dante Gabriel Rossetti, as well as other friends, William Morris started a decorative design firm. The company was called Morris, Marshall, Faulkner &amp; Co. and was based in Bloomsbury, London. They wanted the firm to use completely medieval craft methods to make its products, being against the use of industrial machinery. It had an ethos of equality and they gave jobs to boys from a school for the destitute. Here, William Morris began to focus on his wallpaper designs, taking inspiration from nature. Later in his life, he made lots of stained glass.</span></p><p data-dcnode-id="281"><strong data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">He spoke Icelandic: </span></strong><span data-dcnode-id="282" instrument_node="">William Morris travelled a lot in Iceland, learnt Icelandic and even translated books from Icelandic to English.</span></p><p data-dcnode-id="277"><strong data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">He founded a press making books: </span></strong><span data-dcnode-id="278" instrument_node="">He founded the Kelmscott Press, which published 23 of Morris' books.</span></p><p data-dcnode-id="273"><strong data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">He was very political: </span></strong><span data-dcnode-id="274" instrument_node="">William Morris was a socialist activist and campaigned for equality in Victorian society, founding his own socialist party.</span></p><p data-dcnode-id="269"><strong data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">He died in 1896: </span></strong><span data-dcnode-id="270" instrument_node="">When William Morris died aged 62, his doctor said he died of 'simply being William Morris and having done more work than most ten men'.</span></p><h2 data-dcnode-id="267" id="victorian-art-project-ideas-inspired-by-william-morris"><span data-dcnode-id="268" instrument_node="">Victorian Art Project Ideas Inspired By William Morris</span></h2><figure class="image" data-dcnode-id="265"><img alt="Stained glass window art of two women." data-dcnode-id="266" sizes="100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.kidadl.com/5f4927785151ed42fb6113b3-william-morris-art.jpeg.webp&amp;raw" srcset="https://media.kidadl.com/thumbnail_5f4927785151ed42fb6113b3-william-morris-art.jpeg.webp 208w,https://media.kidadl.com/small_5f4927785151ed42fb6113b3-william-morris-art.jpeg.webp 500w,https://media.kidadl.com/medium_5f4927785151ed42fb6113b3-william-morris-art.jpeg.webp 750w,https://media.kidadl.com/5f4927785151ed42fb6113b3-william-morris-art.jpeg.webp 800w" width="800"></figure><p data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Image © Birmingham Museums Trust</span></p><p data-dcnode-id="260"><strong data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">Easy Morris Printmaking For Kids</span></strong></p><p data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">Inspired by William Morris wallpapers, this is a really easy way for the whole family to make a repeated print.</span></p><p data-dcnode-id="254"><strong data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">Ages: </span></strong><span data-dcnode-id="255" instrument_node="">3+</span></p><p data-dcnode-id="250"><strong data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">Materials: </span></strong><span data-dcnode-id="251" instrument_node="">Foam Board, cocktail stick or biro, paint and sponge or roller, paper.</span></p><p data-dcnode-id="246"><strong data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">Method: </span></strong><span data-dcnode-id="247" instrument_node="">Simply use the cocktail stick or biro to draw a Morris-inspired design onto the foam board (think grapes, flowers, birds). Then use the sponge or roller to cover the foam board with paint and press hard onto paper. See if you can make the pattern repeat.</span></p><p data-dcnode-id="243"><strong data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">Stained Glass Activity</span></strong></p><p data-dcnode-id="239"><strong data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">Ages: </span></strong><span data-dcnode-id="240" instrument_node="">6+</span></p><p data-dcnode-id="235"><strong data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">Materials: &nbsp;</span></strong><span data-dcnode-id="236" instrument_node="">Coloured cellophane, cardboard, scissors, sticky tape or glue.</span></p><p data-dcnode-id="231"><strong data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">Method: </span></strong><span data-dcnode-id="232" instrument_node="">Draw different shapes onto the card then cut out the gaps so it looks like a window. Next, stick the coloured cellophane onto the back of the card, using different colours for different panes of the window.</span></p><p data-dcnode-id="228"><strong data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">William Morris Tiles</span></strong></p><p data-dcnode-id="224"><strong data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">Ages: </span></strong><span data-dcnode-id="225" instrument_node="">5+</span></p><p data-dcnode-id="220"><strong data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">Materials: &nbsp;</span></strong><span data-dcnode-id="221" instrument_node="">Card cut into squares, coloured pencils, pens, paints.</span></p><p data-dcnode-id="216"><strong data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">Method: </span></strong><span data-dcnode-id="217" instrument_node="">Take a look at Morris' floral tiles and then try doing your own on your squares of card. Encourage your children to think about how the pattern would continue from one tile to the next.</span></p><h2 data-dcnode-id="214" id="some-questions-thatll-get-your-child-thinking-about-william-morris"><span data-dcnode-id="215" instrument_node="">Some Questions That'll Get Your Child Thinking About William Morris</span></h2><figure class="image" data-dcnode-id="212"><img alt="Young boy dressed smartly wearing glasses, looking pensive." data-dcnode-id="213" sizes="100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.kidadl.com/5f3e824fc040ba45a27d0a1e-smart-boy-wearing-glasses-thinking-up-corny-riddles.jpeg.webp&amp;raw" srcset="https://media.kidadl.com/thumbnail_5f3e824fc040ba45a27d0a1e-smart-boy-wearing-glasses-thinking-up-corny-riddles.jpeg.webp 234w,https://media.kidadl.com/small_5f3e824fc040ba45a27d0a1e-smart-boy-wearing-glasses-thinking-up-corny-riddles.jpeg.webp 500w,https://media.kidadl.com/medium_5f3e824fc040ba45a27d0a1e-smart-boy-wearing-glasses-thinking-up-corny-riddles.jpeg.webp 750w,https://media.kidadl.com/large_5f3e824fc040ba45a27d0a1e-smart-boy-wearing-glasses-thinking-up-corny-riddles.jpeg.webp 1000w,https://media.kidadl.com/5f3e824fc040ba45a27d0a1e-smart-boy-wearing-glasses-thinking-up-corny-riddles.jpeg.webp 1024w" width="1024"></figure><p data-dcnode-id="210"><span data-dcnode-id="211" instrument_node="">Image © iStock</span></p><p data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">Why don't you ask your kids these questions to start an education discussion surrounding William Morris' art?</span></p><p data-dcnode-id="203"><span data-dcnode-id="207" instrument_node="">1. What didn't </span><a data-dcnode-id="205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kidadl.com/quotes/best-william-morris-quotes-from-the-influential-textile-designer"><span data-dcnode-id="206" instrument_node="">William Morris </span></a><span data-dcnode-id="204" instrument_node="">like about the Victorian era?</span></p><p data-dcnode-id="201"><span data-dcnode-id="202" instrument_node="">2. How did his work react to the industrial revolution?</span></p><p data-dcnode-id="199"><span data-dcnode-id="200" instrument_node="">3. Does his art reflect his political views?</span></p><p data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">4. Can everyday objects be art?</span></p><span data-dcnode-id="195" instrument_node="">
