d="589"><span data-dcnode-id="590" instrument_node="">Childhood</span></h3><span data-dcnode-id="588" instrument_node=""> </span><p class="article-text" data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">William Morris was born in 1834 in Walthamstow, Essex, the third of nine children. William's father, after whom he was named, was a self-made business man, who was able to provide an upper-middle-class lifestyle for his family because of a shrewd investment in a Devonshire mine. Although William Morris Senior died when his son was just thirteen, the wealth he had accumulated provided a generous income for the artist well into his adult life.</span></p><p class="article-text" data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">As a child, Morris lived something of an idyllic lifestyle in his family's large country house near Epping Forest in Essex, surrounded by ancient woodland scattered with medieval architecture. He was sent to school at the prestigious Marlborough College in Wiltshire, where he claimed to have "learned next to nothing". Shirking his schoolwork, Morris spent his time reading, following his own interests, and exploring the landscape surrounding the school, including medieval churches and Neolithic monuments. Surviving letters from this period, written when Morris was as young as fourteen, reveal a deep love and critical appreciation of architecture. The sites and hobbies of his childhood would be carried with Morris for the rest of his life, influencing his design-work, and standing as points of repeated, nostalgic return in his writing.</span></p><h3 class="article-subheader" data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Education and Early Training</span></h3><span data-dcnode-id="581" instrument_node=""> </span><p class="article-text" data-dcnode-id="576"><span data-dcnode-id="580" instrument_node="">In 1853, Morris began his studies in Theology at Exeter College, Oxford, planning to become a priest in line with his mother's wishes. However, within less than a year, his outlook on life had changed drastically: his reading in the library shifted from religious matters to history and ecclesiastical architecture, and eventually to the art criticism of John Ruskin. Soon, he discovered his lifelong passion for writing poetry, and his fate as a creative was sealed when he met fellow student </span><span class="marked_text chart-tooltip-target-top tooltip_id-burne_jones_edward" data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Edward Burne-Jones</span></span><span data-dcnode-id="577" instrument_node="">, a budding artist and designer with whom he would remain friends for the rest of his life. Morris was connected to a group of students at Oxford known as the Birmingham Set, also including the mathematician Charles Faulkner and the poet Richard Watson Dixon, with shared interests in theology, medievalism, and the poetry of Alfred Lord Tennyson.</span></p><p class="article-text" data-dcnode-id="571"><span data-dcnode-id="575" instrument_node="">On graduating in 1856, Morris and Burne-Jones moved to London: Burne-Jones to work as a painter and designer of stained-glass, Morris to become an architect, a change of direction that was badly received by his family. Following his passions nonetheless, Morris started an apprenticeship. However, his career soon took another turn when he made the acquaintance of </span><a data-dcnode-id="573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/artist/rossetti-dante-gabriel/"><span data-dcnode-id="574" instrument_node="">Dante Gabriel Rossetti</span></a><span data-dcnode-id="572" instrument_node="">, a founding member of the Pre-Raphaelite Brotherhood. This close-knit group, established by Rossetti, William Holman Hunt and John Everett Millais in 1948, had actually disbanded two years previously. But the influence of the Pre-Raphaelite aesthetic on British art would radiate across the following decades, thanks in part to the new creative triumvirate forged by the meeting of Rossetti, Morris, and Burne-Jones. Morris was swept up in a wave of artistic creativity, in the company of artists whose work focused on nature, and the romantic chivalry of the medieval past. These ideals were ones that Morris himself had championed since his childhood, and at last he found himself in company where he was free to explore them. Encouraged by Rossetti and Burne-Jones, Morris abandoned his architectural career and began painting in the Pre-Raphaelite style.</span></p><h3 class="article-subheader" data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Mature Period</span></h3><span data-dcnode-id="568" instrument_node=""> </span><p class="article-text" data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Morris threw himself into the bohemian lifestyle of the group, painting long-haired medieval women in natural landscapes similar to those found in Rossetti's watercolors - though Morris's paintings never received quite the same critical acclaim as those of his Pre-Raphaelite peers. In 1857, Morris, Rossetti, and Burne-Jones returned to Oxford to paint murals on the walls of the Union Library. The same year, Morris met Jane Burden, a beautiful, working-class girl who began to model for his and Rossetti's paintings. Morris fell in love with her, and by 1859 they were married.</span></p><p class="article-text" data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">Around this period, Morris's creative imagination was leading him beyond painting. He was interested in how the aesthetics and ethics of the Pre-Raphaelites - a love of nature, medieval aesthetics and Gothic architecture, a hatred of mechanization - might be applied across a wide range of artforms and applied crafts. At the same time, the artist yearned for a home outside the city in which he could raise a family. These ambitions converged in the design of "Red House", completed in 1860 in collaboration with the Gothic architect Philip Webb. Red House is an architectural masterpiece, encapsulating what became known as the Arts and Crafts aesthetic. Its sloping gabled roofs, painted brick fireplaces, and rambling cottage garden epitomized the new paradigm of beauty which the Pre-Raphaelites had defined in their paintings, but realized those ideals in three dimensions: this, in a nutshell, defined the Arts and Crafts philosophy. Situated close to London, Red House would become the country get-away of Morris's artistic acquaintances for the next five years.</span></p><p class="article-text" data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">After the house was built, Morris and his friends decided to decorate the interiors themselves, establishing through creative collaboration many of the principles of Arts-and-Crafts interior design. Burne-Jones designed the stained-glass windows, while Morris created the murals with help from Rossetti and other members of the wider Pre-Raphaelite circle. Around this time, Morris began to focus his attention on the wallpaper and textile designs which made him famous, some of which still survive in the house. This collaborative effort led to the founding of Morris, Marshall, Faulkner &amp; Co., known as 'The Firm', an art and design company that championed hand-craftsmanship and traditional techniques with a strongly medievalist aesthetic. Members included Rossetti, Webb, and Burne-Jones, as well as P.P. Marshall, Charles Faulkner, and Ford Madox Brown.</span></p><div class="article-img article-img-left lazy-box" data-dcnode-id="557"><div class="img-btn-holder" data-dcnode-id="558"><img alt="The Morris and Burne-Jones families at The Grange, the West London home of Burne-Jones. Morris stands to the right behind his wife and two daughters, while Burne-Jones sits at center-left with his wife, children, and father to the far left. The photograph by Frederick Hollyer (1874) is held at the National Portrait Gallery." class="lazyloaded" data-dcnode-id="561" data-initial-src="/images20/photo/photo_morris_william_1.jpg" data-src="/images20/photo/photo_morris_william_1.jpg?3" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/images20/photo/photo_morris_william_1.jpg%3F3&amp;raw" width="269"><div class="btn c-info-button" data-dcnode-id="560"></div><div class="btn info-button" data-dcnode-id="559"></div></div></div><p class="article-text" data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">The Firm set up offices in London, and began to gain great commercial success. However, around this time, Morris's personal fortunes took a turn for the worst, and in 1865 he was forced to give up Red House, which was, in any case, inconveniently far from the Firm's headquarters in London. His marriage was also disintegrating: though he had lived happily with Jane and their two daughters at Red House for a time, she had recently struck up what became a long-term affair with Morris's friend and mentor Rossetti. Morris took solace in hard work and metered verse, and by the 1860s he had become one of the most famous poets in England. In 1871, he moved to a country house in Kelmscott in Oxfordshire with his wife, children, and, strangely enough, Rossetti. It has been surmised that Morris reluctantly allowed Rossetti to join them at Kelmscott for his wife's sake, but in spite of this remarkably magnanimous gesture, the domestic situation created tension between the pair, and Rossetti eventually left in 1874.</span></p><h3 class="article-subheader" data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Late Period</span></h3><span data-dcnode-id="552" instrument_node=""> </span><p class="article-text" data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">In 1875, Morris dissolved The Firm and set up Morris &amp; Co, a company that continued trading for almost 50 years after his death. Although the company was liquidated in 1940, the British fabric and wallpaper manufacturer Sanderson &amp; Sons purchased the design licenses, and so Morris's designs are still sold under his name today. He expanded the stylistic repertoire of floral wallpaper and fabric designs to an unprecedented degree, a mercurial inventiveness on which the commercial success of the company rested. Throwing himself into the theory and practicalities of the design process, he spent many hours learning how to print woodblocks and weave tapestries. Favoring medieval, artisanal techniques of dyeing and printing, his passion for the art of the past was also expressed through his co-founding of the Society for the Protection of Ancient Buildings, which protested against the restoration of historical buildings using modern methods. The society remains active today, and the ideas underpinning it - characterized by Morris as "anti-scrape" - are now widely accepted.</span></p><div class="article-img article-img-left lazy-box" data-dcnode-id="545"><div class="img-btn-holder" data-dcnode-id="546"><img alt="Portrait of William Morris, aged 46, on a cabinet card, by Abel Lewis, printed by James Edward Bruton (1880), National Portrait Gallery." class="lazyloaded" data-dcnode-id="549" data-initial-src="/images20/photo/photo_morris_william_2.jpg" data-src="/images20/photo/photo_morris_william_2.jpg?3" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/images20/photo/photo_morris_william_2.jpg%3F3&amp;raw" width="204"><div class="btn c-info-button" data-dcnode-id="548"></div><div class="btn info-button" data-dcnode-id="547"></div></div></div><p class="article-text" data-dcnode-id="540"><span data-dcnode-id="544" instrument_node="">This was also a time of increased social consciousness for Morris. His views on craftsmanship, and his opposition to modern industrial methods, had already drawn him towards progressive causes. However, upon witnessing stark class inequalities across Europe, and becoming more well-versed in contemporary politics, Morris became a radical socialist. He wrote several popular books related to his cause, including the utopian socialist fantasy travelogue </span><i data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">News From Nowhere</span></i><span data-dcnode-id="541" instrument_node=""> (1890), and in 1874 founded a Socialist League in Hammersmith, West London, where the family had resettled in 1879. Like his undergraduate hero John Ruskin, Morris's political views were inseparable from his aesthetics. He believed that art should be produced and enjoyed by all; that the products of artistic labor should be offered back to the working classes.</span></p><div class="article-img article-img-left lazy-box" data-dcnode-id="535"><div class="img-btn-holder" data-dcnode-id="536"><img alt="The grave of William Morris, where his wife was later buried. Morris was buried in Kelmscott, near his previous country home, beneath a tombstone designed by his friend and collaborator Philip Webb." class="lazyloaded" data-dcnode-id="539" data-initial-src="/images20/photo/photo_morris_william_3.jpg" data-src="/images20/photo/photo_morris_william_3.jpg?3" height="279" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/images20/photo/photo_morris_william_3.jpg%3F3&amp;raw" width="373"><div class="btn c-info-button" data-dcnode-id="538"></div><div class="btn info-button" data-dcnode-id="537"></div></div></div><p class="article-text" data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Morris spent the final years of his life in his new house in West London, affectionately referred to as Kelmscott House, in honor of his earlier country residence. In 1891, he launched the last of his many creative ventures, Kelmscott Press. He had long enjoyed creating intricately illustrated volumes of stories and myths, and he decided to set up a press which would produce beautiful illustrated books inspired by medieval ecclesiastical manuscripts. From that point onwards until his death in 1896, he divided his time between Kelmscott Press, his design work, and his socialist activism.</span></p><div class="article-anchor" data-dcnode-id="532" id="legacy_header"></div><span data-dcnode-id="531" instrument_node=""> </span><h3 class="article-subheader" data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">The Legacy of William Morris</span></h3><span data-dcnode-id="528" instrument_node=""> </span><p class="article-text" data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">The legacy of William Morris is as extensive as it is difficult to trace. His artistic and poetic skill, along with the radical new ethos on art and society that he espoused, sent shockwaves through the worlds of art, architecture, design, poetry, and political thought.</span></p><p class="article-text" data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">His most obvious impact was on the Arts and Crafts Movement, of which he is generally considered a founding father. Several of his friends and acquaintances, including his daughter May Morris, took up his mantle in the field of craft and design, while his work also resonated internationally, inspiring the development of Art Nouveau in France, as well as the North-American Arts and Crafts Movement.</span></p><p class="article-text" data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">His ideal of collaborative, artisanal community, exemplified by 'The Firm' and the construction of Red House, would inspire artists across the next century. Eric Gill would soon set up his own Catholic arts circle in Sussex, carrying forwards Morris's ideals of combining beauty and function through design and decorative lettering. Some decades later, the 1951 Festival of Britain took inspiration from Morris's socialist beliefs, and from his sense of the role of the community in artistic production, introducing these principles to a new generation of creatives including Terence Conran and Lucienne Day. The early-twentieth-century heyday of the artistic avant-garde was also in a very real sense preceded by the utopian collectivism of Morris's ventures.</span></p><p class="article-text" data-dcnode-id="511"><span data-dcnode-id="521" instrument_node="">The unity of architecture and decoration embodied in Red House also had an irrevocable effect on architectural philosophy across the coming decades, fundamentally influencing the way in which buildings were conceived and designed. </span><a data-dcnode-id="519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/artist/mackintosh-charles-rennie/"><span data-dcnode-id="520" instrument_node="">Charles Rennie Mackintosh</span></a><span data-dcnode-id="518" instrument_node=""> would expand on Morris's ideas by devising each of his buildings as a 'total work of art', in which décor, furniture, and architectural elements all fitted around each other. Even </span><a data-dcnode-id="516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/artist/wright-frank-lloyd/"><span data-dcnode-id="517" instrument_node="">Frank Lloyd Wright</span></a><span data-dcnode-id="515" instrument_node=""> and </span><a data-dcnode-id="513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/artist/gropius-walter/"><span data-dcnode-id="514" instrument_node="">Walter Gropius</span></a><span data-dcnode-id="512" instrument_node="">, architects who produced sleek and refined modernist masterpieces, freely admitted the impact of Morris's work on their early development. Morris's thoughts on the relationship between country and city, meanwhile, and how the two might be combined, can be sensed in the socially egalitarian concept of the Garden City, borne out in early-twentieth-century project such as Welwyn Garden City.</span></p><p class="article-text" data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">Many contemporary artists still look back to Morris as an inspirational figure. Jeremy Deller and David Mabb, for example, have both commented on how Morris's work contrasts with and compliments the production methods and political ethos of much twentieth-century art.</span></p></div></div><div class="right-column" data-dcnode-id="506"></div><span data-dcnode-id="505" instrument_node=""> </span></div><div class="main-column" data-dcnode-id="263"><h2 class="article-header" data-dcnode-id="502"><span data-dcnode-id="503" instrument_node=""> Important Art by William Morris				</span></h2><div class="grey-box" data-dcnode-id="441"><div class="more-important-art" data-dcnode-id="442"><span data-dcnode-id="501" instrument_node=""> </span><button class="scroll-btn scroll-left" data-dcnode-id="500" onclick="carouselMoveLeft();" style="display: none;"></button><span data-dcnode-id="499" instrument_node=""> </span><button class="scroll-btn scroll-right" data-dcnode-id="498" onclick="carouselMoveRight();"></button><span data-dcnode-id="497" instrument_node=""> </span><div class="horizontal-carousel" data-dcnode-id="451"><div class="carousel-view-box" data-dcnode-id="452"><div class="carousel-holder" data-dcnode-id="453"><span data-dcnode-id="496" instrument_node=""> </span><a data-dcnode-id="490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/artist/morris-william/%23pnt_1"><span data-dcnode-id="495" instrument_node=""> </span><div class="carousel-item" data-dcnode-id="492"><div class="img-btn-holder" data-dcnode-id="493"><img alt="La Belle Iseult (1858)" class="lazyloaded" data-dcnode-id="494" data-src="/images20/works/morris_william_1.jpg?3" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/images20/works/morris_w
