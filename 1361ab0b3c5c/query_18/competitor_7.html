</span><h4 data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">About William Morris</span></h4><span data-dcnode-id="1712" instrument_node="">
</span></div><span data-dcnode-id="1710" instrument_node="">
</span><div class="basic_bd wiki_container force_break" data-dcnode-id="484" id="about"><span data-dcnode-id="1709" instrument_node="">
</span><p data-dcnode-id="1705"><strong data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">William Morris</span></strong><span data-dcnode-id="1706" instrument_node=""> </span></p><span data-dcnode-id="1704" instrument_node="">
</span><p data-dcnode-id="1687"><span data-dcnode-id="1703" instrument_node="">(24 March 1834 – 3 October 1896) was an English textile designer, artist, writer, and socialist associated with the Pre-Raphaelite Brotherhood and the English Arts and Crafts Movement. He founded a design firm in partnership with the artist Edward Burne-Jones, and the poet and artist Dante Gabriel Rossetti which profoundly influenced the decoration of churches and houses into the early 20th century. He was also a major contributor to reviving traditional textile arts and methods of production, and one of the founders of the SPAB, now a statutory element in the preservation of historic buildings in the UK. Morris wrote and published poetry, fiction, and translations of ancient and medieval texts throughout his life. His best-known works include </span><em data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">The Defence of Guenevere and Other Poems</span></em><span data-dcnode-id="1700" instrument_node=""> (1858), </span><em data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">The Earthly Paradise</span></em><span data-dcnode-id="1697" instrument_node=""> (1868–1870), </span><em data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">A Dream of John Ball</span></em><span data-dcnode-id="1694" instrument_node=""> (1888) and the utopian </span><em data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">News from Nowhere</span></em><span data-dcnode-id="1691" instrument_node=""> (1890). He was an important figure in the emergence of socialism in Britain, founding the Socialist League in 1884, but breaking with that organization over goals and methods by the end of the decade. He devoted much of the rest of his life to the Kelmscott Press, which he founded in 1891. The 1896 Kelmscott edition of the </span><em data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Works of Geoffrey Chaucer</span></em><span data-dcnode-id="1688" instrument_node=""> is considered a masterpiece of book design.</span></p><span data-dcnode-id="1686" instrument_node="">

</span><h3 data-dcnode-id="1570" id="Life"><span data-dcnode-id="1571" instrument_node="">Life</span></h3><span data-dcnode-id="1569" instrument_node="">
</span><h3 data-dcnode-id="1567" id="Early-life-and-education"><span data-dcnode-id="1568" instrument_node="">Early life and education</span></h3><span data-dcnode-id="1566" instrument_node="">
</span><p data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">William Morris was born in Walthamstow on 24 March 1834, the third child and the eldest son of William Morris, a partner in the firm of Sanderson &amp; Co., bill brokers in the City of London. His mother was Emma Morris née Shelton, daughter of Joseph Shelton, a teacher of music in Worcester.[1] As a child Morris was delicate but studious. He learned to read early, and by the time he was four years old he was familiar with most of the Waverley novels. When he was six the family moved to Woodford Hall, where new opportunities for an out-of-door life brought the boy health and vigour. He rode about Epping Forest, sometimes in a toy suit of armour, where he became a close observer of animal nature and was able to recognize any bird upon the wing.[2][3]</span></p><span data-dcnode-id="1563" instrument_node="">
</span><p data-dcnode-id="1555"><span data-dcnode-id="1562" instrument_node="">[image:] Morris's painting </span><em data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">La belle Iseult</span></em><span data-dcnode-id="1559" instrument_node="">, also inaccurately called </span><em data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">Queen Guinevere</span></em><span data-dcnode-id="1556" instrument_node="">, is his only surviving easel painting, now in the Tate Gallery.</span></p><span data-dcnode-id="1554" instrument_node="">
</span><p data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">At the same time he continued to read whatever came in his way and was particularly attracted by the stories in the Arabian Nights and by the designs in Gerard's Herbal. He studied with his sisters' governess until he was nine, when he was sent to a school at Walthamstow. In 1842, his sister Isabella was born. She grew to be the churchwoman who oversaw the revival of the Deaconess Order in the Anglican Communion.[4] In his thirteenth year their father died, leaving the family well-to-do. The home at Woodford was broken up, as being unnecessarily large, and in 1848 the family relocated to Water House and William Morris entered Marlborough School, where his father had bought him a nomination. Morris was at the school for three years, but gained little from attending it beyond a taste for architecture, fostered by the school library, and an attraction towards the Anglo-Catholic movement.[5] He made but slow progress in school work and at Christmas 1851 was removed and sent to live as a private pupil with the Rev. F. B. Guy, Assistant Master at Forest School and later Canon of St. Alban's, for a year to prepare him for University.[2][6] The Forest School archives still contain many items of correspondence from Morris, and the School boasts a Morris stained glass window in the Chapel.</span></p><span data-dcnode-id="1551" instrument_node="">
</span><h3 data-dcnode-id="1549" id="Oxford-apprenticeship-and-artistic-influences"><span data-dcnode-id="1550" instrument_node="">Oxford, apprenticeship, and artistic influences</span></h3><span data-dcnode-id="1548" instrument_node="">
</span><p data-dcnode-id="1540"><span data-dcnode-id="1547" instrument_node="">In June 1852 Morris entered Exeter College, Oxford, though since the college was full, he was unable to go into residence until January 1853. At Exeter, Morris met Edward Burne-Jones, also a first year undergraduate, who became his life-long friend and collaborator. Morris also joined a Birmingham group at Pembroke College, known among themselves as the "Brotherhood" and to historians as the "Pembroke set".[2][7] Together, they read theology, ecclesiastical history, and medieval poetry; studied art, and during the long vacations visited English churches and the Continental cathedrals. They became strongly influenced by the paintings of the Pre-Raphaelites, John Ruskin's essay "The Nature of Gothic" from the second volume of </span><em data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">The Stones of Venice</span></em><span data-dcnode-id="1544" instrument_node="">, Thomas Malory's </span><em data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">Morte d'Arthur</span></em><span data-dcnode-id="1541" instrument_node=""> and the poetry of Alfred, Lord Tennyson. Morris began to adopt Ruskin's philosophy of rejecting the tawdry industrial manufacture of decorative arts and architecture in favour of a return to hand-craftsmanship, raising artisans to the status of artists, creating art that should be affordable and hand-made, with no hierarchy of artistic mediums.[2]</span></p><span data-dcnode-id="1539" instrument_node="">
</span><p data-dcnode-id="1534"><span data-dcnode-id="1538" instrument_node="">Moreover, Morris began at this time to write poetry and many of his first pieces, afterwards destroyed, were held by sound judges to be equal to anything else he ever worked on. Both Morris and Burne-Jones had come to Oxford with the intention of taking holy orders, but as they felt their way, both decided their energies were best spent on social reform. Morris decided to become an architect and for the better propagation of the views of the new brotherhood a magazine was at the same time projected, which was to make a specialty of social articles, besides poems and short stories. At the beginning of 1856 the two schemes came to a head together. Morris, having passed his finals in the previous term, was entered as a pupil at the office of George Edmund Street, one of the leading English Gothic revival architects who had his headquarters in Oxford as architect to the diocese;[1] and on New Year's Day the first issue of the </span><em data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">Oxford and Cambridge Magazine</span></em><span data-dcnode-id="1535" instrument_node=""> appeared. The expenses of publishing were borne entirely by Morris, but he resigned the formal editorship after the first issue. Many distinguished compositions appeared in its pages, but it gradually languished and was given up after a year's experiment. The chief immediate result was the friendship between Morris and Dante Gabriel Rossetti, a contributor.[2]</span></p><span data-dcnode-id="1533" instrument_node="">
</span><p data-dcnode-id="1528"><span data-dcnode-id="1532" instrument_node="">In Street’s office Morris formed an intimate and lifelong friendship with the senior clerk, Philip Webb, which had an important influence over the development taken by English domestic architecture during the next generation. He worked in Street’s office for nine months, first at Oxford and afterwards in London when Street removed there in the autumn.[1] Morris worked hard both in and out of office hours at architecture and painting, and he studied architectural drawing under Webb.[8] Rossetti persuaded him that he was better suited for a painter, and after a while he devoted himself exclusively to that branch of art. That summer the two friends visited Oxford and finding the new Oxford Union debating-hall under construction, pursued a commission to paint the upper walls with scenes from </span><em data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">Le Morte d'Arthur</span></em><span data-dcnode-id="1529" instrument_node=""> and to decorate the roof between the open timbers. Seven artists were recruited, among them Valentine Prinsep and Arthur Hughes,[9] and the work was hastily begun. Morris worked with feverish energy and on finishing the portion assigned to him, proceeded to decorate the roof. The frescoes, done too soon and too fast, began to fade at once and now are barely decipherable.</span></p><span data-dcnode-id="1527" instrument_node="">
</span><h3 data-dcnode-id="1525" id="Marriage-and-family"><span data-dcnode-id="1526" instrument_node="">Marriage and family</span></h3><span data-dcnode-id="1524" instrument_node="">
</span><p data-dcnode-id="1519"><span data-dcnode-id="1523" instrument_node="">Rossetti had seen Jane Burden at a theatre performance and recruited her to model as Guinevere for the Oxford Union murals. Morris was smitten with Jane from the start.[10] They became engaged in 1858 and married at St Michael at the Northgate, Oxford, on 26 April 1859, settling temporarily at 41 Great Ormond Street, London. Morris's only surviving painting in oils is of Jane Burden as </span><em data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">La Belle Iseult</span></em><span data-dcnode-id="1520" instrument_node="">. William and Jane had two daughters, Jane Alice (Jenny), born January 1861, who developed epilepsy in her teens, and Mary (May) (March 1862–1938), who became the editor of her father's works, a prominent socialist, and an accomplished designer and craftswoman.[11]</span></p><span data-dcnode-id="1518" instrument_node="">
</span><p data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">Although of humble origins and unschooled in her youth,[10] Jane Morris underwent a remarkable self-education after her marriage. A striking beauty, she mixed freely with the Pre-Raphaelites and posed many times for Dante Gabriel Rossetti, with whom Jane sustained a long affair. The Morrises' initial happiness together did not survive the first ten years of their marriage, but divorce was unthinkable, and they remained together until Morris's death.[11]</span></p><span data-dcnode-id="1515" instrument_node="">
</span><h3 data-dcnode-id="1513" id="Red-House"><span data-dcnode-id="1514" instrument_node="">Red House</span></h3><span data-dcnode-id="1512" instrument_node="">
</span><p data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">[image:] Red House, Bexleyheath</span></p><span data-dcnode-id="1509" instrument_node="">
</span><p data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">For several years after his marriage Morris was absorbed in two connected occupations: the building and decoration of a house for himself and Jane, and the foundation of a firm of decorators who were also artists, with the view of reinstating decoration, down to its smallest details, as one of the fine arts. Meanwhile he was slowly abandoning painting; none of his paintings are dated later than 1862.[1]</span></p><span data-dcnode-id="1506" instrument_node="">
</span><p data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">Red House at Bexleyheath in Kent, so named when the use of red brick without stucco was still unusual in domestic architecture, was built for Morris to designs by Webb; it was Webb's first building as an independent architect[12] Red House featured ceiling paintings by Morris, wall-hangings designed by Morris and worked by himself and Jane; furniture painted by Morris and Rossetti, and wall-paintings and stained- and painted glass designed by Burne-Jones.[12] However it contained no wallpaper, printed or woven fabrics, or carpets by the firm, these being manufactured from 1864, 1868 and 1875 respectively.</span></p><span data-dcnode-id="1503" instrument_node="">
</span><h3 data-dcnode-id="1501" id="Morris-Marshall-Faulkner-amp-Co"><span data-dcnode-id="1502" instrument_node="">Morris, Marshall, Faulkner &amp; Co.</span></h3><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">[also see:] Main article: Morris &amp; Co.</span></p><span data-dcnode-id="1497" instrument_node="">
</span><p data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">In 1861, the decorative arts firm of Morris, Marshall, Faulkner &amp; Co.(later described by Nicholas Pevsner as the 'beginning of a new era in Western art ')[13] was founded with Morris, Rossetti, Burne-Jones, Ford Madox Brown and Philip Webb as partners, together with Charles Faulkner and Peter Paul Marshall, the former of whom was a member of the Oxford Brotherhood, and the latter a friend of Brown and Rossetti.[1] The prospectus set forth that the firm would undertake carving, stained glass, metal-work, paper-hangings, chintzes (printed fabrics), and carpets.[2] The decoration of churches was from the first an important part of the business. On its non-ecclesiastical side it gradually was extended to include, besides painted windows and mural decoration, furniture, metal and glass wares, cloth and paper wall-hangings, embroideries, jewellery, woven and knotted carpets, silk damasks, and tapestries. The first headquarters of the firm were at 8 Red Lion Square.</span></p><span data-dcnode-id="1494" instrument_node="">
</span><p data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">The work shown by the firm at the 1862 International Exhibition attracted much notice, and from 1866 began to make a profit. In the autumn of 1864, a severe illness obliged Morris to choose between giving up his home at Red House in Kent and giving up his work in London. With great reluctance he gave up Red House, and in 1865 established himself under the same roof with his workshops, now relocated to Queen Square, Bloomsbury.[1]</span></p><span data-dcnode-id="1491" instrument_node="">
</span><p data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">An important commission of 1867[14] was the "green dining room" at the South Kensington Museum (now the Morris Room of the Victoria and Albert), featuring stained glass windows and panel figures by Burne-Jones, panels with branches of fruit or flowers by Morris, and olive branches and a frieze by Philip Webb.</span></p><span data-dcnode-id="1488" instrument_node="">
</span><p data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">Although already the firms paid manager, in 1874 Morris wished to take sole control of the now profitable firm, but, unsurprisingly, had to buy out other shareholders. This venture into capitalism was a severe test of friendship with Rossetti and Ford Maddox Brown. Throughout his life, Morris continued as principal owner and design director, although the company changed names. Its most famous incarnation was as Morris &amp; Co. The firm's designs are still sold today under licenses given to Sanderson and Sons (which markets the "Morris &amp; Co." brand) and Liberty of London.</span></p><span data-dcnode-id="1485" instrument_node="">
</span><h3 data-dcnode-id="1483" id="Kelmscott-Manor"><span data-dcnode-id="1484" instrument_node="">Kelmscott Manor</span></h3><span data-dcnode-id="1482" instrument_node="">
</span><p data-dcnode-id="1477"><span data-dcnode-id="1481" instrument_node="">In 1869, Morris and Rossetti rented a country house, Kelmscott Manor at Kelmscott, Oxfordshire, as a summer retreat, but it soon became a retreat for Rossetti and Jane Morris to have a long-lasting and complicated liaison. The two spent summers there, with the Morris children, while Morris himself traveled to Iceland in 1871 and 1873. Kelmscott Manor remained an important retreat and symbol of simple country life for Morris in later years. It was the model for "the old house by the Thames" in Morris's </span><em data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">News from Nowhere</span></em><span data-dcnode-id="1478" instrument_node="">.[15]</span></p><span data-dcnode-id="1476" instrument_node="">
</span><h3 data-dcnode-id="1474" id="Socialism"><span data-dcnode-id="1475" instrument_node="">Socialism</span></h3><span data-dcnode-id="1473" instrument_node="">
</span><p data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">In the 1870s, Morris had begun to take an active interest in politics. He became treasurer of the National Liberal League in 1879; but after the Irish coercive measures of 1881, he finally abandoned the Liberal Party and advanced into socialist politics.</span></p><span data-dcnode-id="1470" instrument_node="">
</span><p data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">In January 1883, Morris was enrolled among the members of the Democratic Federation, forerunner of the Social Democratic Federation. Over the next two years, Morris and party founder Henry Hyndman worked together as the best-known leaders of the fledgling organisation.[16] For the rest of the decade, his creative efforts sprang from his socialist politics.</span></p><span data-dcnode-id="1467" instrument_node="">
</span><p data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">In March 1883 he gave an address at Manchester on "Art, Wealth and Riches"; in May he was elected upon the executive of the federation. In September he wrote the first of his "Chants for Socialists." About the same time he shocked the authorities by pleading in University Hall for the wholesale support of socialism among the undergraduates at Oxford. To the surprise of many who saw him as a respectable poet and decorator from that point on he threw himself wholeheartedly into the nascent Socialist movement, becoming co-author of the Social Democratic Federation manifesto.</span></p><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1456"><span data-dcnode-id="1463" instrument_node="">Disagreements with Hyndman over Irish Home Rule and a generalized mistrust of Hyndman's personal motives led to the foundation of the breakaway Socialist League in December 1884, encouraged by Friedrich Engels and Eleanor Marx. As the leading figure in the organization Morris embarked on a relentless series of speeches and talks on street corners, in working men's clubs and lecture theatres across England and Scotland. Eventual repression of street corner meetings by the police meant that free speech, rather than economic working-class causes, became the practical focus of the League. Morris also became both editor and principal contributor to the League's monthly - soon to become weekly - newspaper, Commonweal, which became the first place where his published essays, poems, and other works appeared. His best known prose works, the utopian </span><em data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">News from Nowhere</span></em><span data-dcnode-id="1460" instrument_node=""> and </span><em data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">A Dream of John Ball</span></em><span data-dcnode-id="1457" instrument_node=""> were first printed here in serialized form.</span></p><span data-dcnode-id="1455" instrument_node="">
</span><p data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">From 1887, anarchists began to outnumber socialists in the Socialist League.[17] The 3rd Annual Conference of the League, held in London on 29 May 1887 marked the change, with a majority of the 24 branch delegates voting in favor of an anarchist-sponsored resolution declaring that "This conference endorses the policy of abstention from parliamentary action, hitherto pursued by the League, and sees no sufficient reason for altering it."[18] Morris played peacemaker but sided with the anti-Parliamentarians, who won control of the League, which consequently lost the support of Engels and saw the departure of Eleanor Marx and her partner Edward Aveling to form the separate Bloomsbury Socialist Society.</span></p><span data-dcnode-id="1452" instrument_node="">
</span><p data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">[image:] William Morris (right) with artist Edward Burne-Jones, 1890.</span></p><span data-dcnode-id="1449" instrument_node="">
</span><p data-dcnode-id="1444"><span data-dcnode-id="1448" instrument_node="">By 1889, the anarchist wing had completely captured the organisation. William Morris was stripped of the editorship of </span><em data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">Commonweal</span></em><span data-dcnode-id="1445" instrument_node=""> in favor of Frank Kitz, an anarchist workman. Morris was left to foot the ongoing operating deficit of the publication, approximately £4 per week[17] — this at a time when £150 per year was the average annual family income in the kingdom.[19] By the autumn of 1890, Morris had had enough and he, too, withdrew from the Socialist League.</span></p><span data-dcnode-id="1443" instrument_node="">
</span><p data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">The following years have been described as a time of disillusionment for Morris, but he continued to write articles and give public lectures in active support of the Socialist cause. Morris himself being perhaps the greatest British representative of what has come to be called libertarian socialism. Liberated from internal factional struggles, he retracted his anti-Parliamentary position and worked for Socialist unity, giving his last public lecture in January 1896 on the subject of "One Socialist Party."[2]</span></p><span data-dcnode-id="1440" instrument_node="">
</span><h3 data-dcnode-id="1438" id="Historic-preservation"><span data-dcnode-id="1439" instrument_node="">Historic preservation</span></h3><span data-dcnode-id="1437" instrument_node="">
</span><p data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">Although Morris never became a practising architect, his interest in architecture continued throughout his life. In 1877 he founded the Society for the Protection of Ancient Buildings (sometimes known as "Anti-Scrape"), which sprang into being as a practical protest against a scheme for restoring and reviving Tewkesbury Abbey.[2][20] His preservation work resulted indirectly in the founding of the National Trust. Combined with the inspiration of John Ruskin — in particular his essay "The Nature of Gothic" — architecture played an important symbolic part in Morris's approach to socialism.</span></p><span data-dcnode-id="1434" instrument_node="">
</span><p data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">Another aspect of Morris' preservationism was his desire to protect the natural world from the ravages of pollution and industrialism, causing some historians of the green movement to regard Morris as an important forerunner of modern environmentalism. [21] [22]</span></p><span data-dcnode-id="1431" instrument_node="">
</span><h3 data-dcnode-id="1429" id="Later-years"><span data-dcnode-id="1430" instrument_node="">Later years</span></h3><span data-dcnode-id="1428" instrument_node="">
</span><p data-dcnode-id="1420"><span data-dcnode-id="1427" instrument_node="">In his later years, Morris returned to the paramount interests of his life, art and literature. When his business was enlarged in 1881 by the establishment of a tapestry industry at Merton Abbey Mills, in Surrey, Morris found yet another means for expressing the medievalism that inspired all his work, whether on paper or at the loom. He then added another to his many activities; he assumed a direct interest in typography. In the early seventies he had devoted much attention to the arts of manuscript illumination and calligraphy. He himself wrote several manuscripts, with illuminations of his own devising. From this to attempts to beautify the art of modern printing was but a short step. </span><em data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">The House of the Wolfings</span></em><span data-dcnode-id="1424" instrument_node="">, printed in 1889 at the Chiswick Press, was the first essay in this direction; and in the same year, in </span><em data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">The Roots of the Mountains</span></em><span data-dcnode-id="1421" instrument_node="">, he carried his theory a step further. Some fifteen months later he added a private printing-press to his multifarious occupations and started upon the first volume issued from the Kelmscott Press. For the last few years of his life this new interest remained the absorbing one.[2]</span></p><span data-dcnode-id="1419" instrument_node="">
</span><p data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">After his departure from the Socialist League, Morris divided his time between the Firm, then relocated to Merton Abbey,[23] Kelmscott House in Hammersmith, the Kelmscott Press, and Kelmscott Manor. At his death at Kelmscott House in 1896 he was interred in the Kelmscott village churchyard.</span></p><span data-dcnode-id="1416" instrument_node="">
</span><h3 data-dcnode-id="1414" id="Writings"><span data-dcnode-id="1415" instrument_node="">Writings</span></h3><span data-dcnode-id="1413" instrument_node="">
</span><p data-dcnode-id="1405"><span data-dcnode-id="1412" instrument_node="">William Morris was a prolific writer of poetry, fiction, essays, and translations of ancient and medieval texts. His first poems were published when he was 24 years old, and he was polishing his final novel, </span><em data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">The Sundering Flood</span></em><span data-dcnode-id="1409" instrument_node="">, at the time of his death. His daughter May's edition of </span><em data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">Morris's Collected Works</span></em><span data-dcnode-id="1406" instrument_node=""> (1910–1915) runs to 24 volumes, and two more were published in 1936.[24]</span></p><span data-dcnode-id="1404" instrument_node="">
</span><h3 data-dcnode-id="1402" id="Poetry"><span data-dcnode-id="1403" instrument_node="">Poetry</span></h3><span data-dcnode-id="1401" instrument_node="">
</span><p data-dcnode-id="1393"><span data-dcnode-id="1400" instrument_node="">Morris began publishing poetry and short stories in 1856 through the </span><em data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">Oxford and Cambridge Magazine</span></em><span data-dcnode-id="1397" instrument_node=""> which he founded with his friends and financed while at university. His first volume, </span><em data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">The Defence of Guenevere and Other Poems</span></em><span data-dcnode-id="1394" instrument_node=""> (1858), was the first book of Pre-Raphaelite poetry to be published.[24] The dark poems, set in a sombre world of violence, were coolly received by the critics, and he was discouraged from publishing more for a number of years. "The Haystack in the Floods", one of the poems in that collection, is probably now one of his better-known poems. It is a grimly realistic piece set during the Hundred Years War in which the doomed lovers Jehane and Robert have a last parting in a convincingly portrayed rain-swept countryside.[24] One early minor poem was "Masters in this Hall" (1860), a Christmas carol written to an old French tune.[25] Another Christmas-themed poem is "The Snow in the Street", adapted from "The Land East of the Sun and West of the Moon" in The Earthly Paradise.[26]</span></p><span data-dcnode-id="1392" instrument_node="">
</span><p data-dcnode-id="1381"><span data-dcnode-id="1391" instrument_node="">When he returned to poetry in the late 1860s it was with </span><em data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">The Life and Death of Jason</span></em><span data-dcnode-id="1388" instrument_node="">,[27] which was published with great success in 1867.[24] Jason was followed by </span><em data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">The Earthly Paradise</span></em><span data-dcnode-id="1385" instrument_node="">, a huge collection of poems loosely bound together in what he called a leather strapbound book. The theme was of a group of medieval wanderers who set out to search for a land of everlasting life; after much disillusion, they discover a surviving colony of Greeks with whom they exchange stories. The collection brought him almost immediate fame and popularity (all of his books thereafter were published as "by the author of </span><em data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">The Earthly Paradise</span></em><span data-dcnode-id="1382" instrument_node="">").[24] The last-written stories in the collection are retellings of Icelandic sagas. From then until his Socialist period Morris's fascination with the ancient Germanic and Norse peoples dominated his writing. Together with his Icelandic friend Eiríkr Magnússon he was the first to translate many of the Icelandic sagas into English, and his own epic retelling of the story of Sigurd the Volsung was his favourite among his poems.[1] Due to his wide poetic acclaim, Morris was quietly approached with an offer of the Poet Laureateship after the death of Tennyson in 1892, but declined.</span></p><span data-dcnode-id="1380" instrument_node="">
</span><h3 data-dcnode-id="1378" id="Translations"><span data-dcnode-id="1379" instrument_node="">Translations</span></h3><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1363"><span data-dcnode-id="1376" instrument_node="">Morris had met Eiríkr Magnússon in 1868, and together they began to learn the Icelandic language. Morris published translations of </span><em data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">The Saga of Gunnlaug Worm-Tongue</span></em><span data-dcnode-id="1373" instrument_node=""> and </span><em data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">Grettis Saga</span></em><span data-dcnode-id="1370" instrument_node=""> in 1869, and the </span><em data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">Story of the Volsungs and Niblungs</span></em><span data-dcnode-id="1367" instrument_node=""> in 1870. An additional volume was published under the title of </span><em data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">Three Northern Love Stories</span></em><span data-dcnode-id="1364" instrument_node=""> in 1873.[1][24]</span></p><span data-dcnode-id="1362" instrument_node="">
</span><p data-dcnode-id="1351"><span data-dcnode-id="1361" instrument_node="">In the mid-1870s, Morris's leisure was mainly occupied by work as a scribe and illuminator; to this period belong, among other works, two manuscripts of Fitzgerald’s </span><em data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">Rubaiyat of Omar Khayyam</span></em><span data-dcnode-id="1358" instrument_node=""> with illustrations by Burne-Jones. He was for some time engaged in the production of a magnificent folio manuscript of Virgil's Aeneid, and in the course of that work had begun to translate the poem into English verse. The manuscript was finally laid aside for the translation, and the </span><em data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">Eneids</span></em><span data-dcnode-id="1355" instrument_node=""> of Virgil was published in November 1875. Morris also translated large numbers of medieval and classical works, including Homer's </span><em data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Odyssey</span></em><span data-dcnode-id="1352" instrument_node=""> in 1887.</span></p><span data-dcnode-id="1350" instrument_node="">
</span><h3 data-dcnode-id="1348" id="Prose-romances"><span data-dcnode-id="1349" instrument_node="">Prose romances</span></h3><span data-dcnode-id="1347" instrument_node="">
</span><p data-dcnode-id="1336"><span data-dcnode-id="1346" instrument_node="">In the last nine years of his life, Morris wrote a series of imaginative fictions usually referred to as the "prose romances".[28] These novels — including </span><em data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">The Wood Beyond the World</span></em><span data-dcnode-id="1343" instrument_node=""> and </span><em data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">The Well at the World's End</span></em><span data-dcnode-id="1340" instrument_node=""> — have been credited as important milestones in the history of fantasy fiction, because, while other writers wrote of foreign lands, or of dream worlds, or the future (as Morris did in </span><em data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">News from Nowhere</span></em><span data-dcnode-id="1337" instrument_node="">), Morris's works were the first to be set in an entirely invented fantasy world.[29] These were attempts to revive the genre of medieval romance, and written in imitation of medieval prose. Morris' prose style in these novels has been praised by Edward James, who described them as "among the most lyrical and enchanting fantasies in the English language."[30]</span></p><span data-dcnode-id="1335" instrument_node="">
</span><p data-dcnode-id="1315"><span data-dcnode-id="1334" instrument_node="">On the other hand, L. Sprague de Camp considered Morris' fantasies to be not wholly successful, partly because Morris eschewed many literary techniques from later eras.[31] In particular, De Camp argued the plots of the novels are heavily driven by coincidence; while many things just happened in the romances, the novels are still weakened by the dependence on it.[32] Nevertheless, large subgenres of the field of fantasy have sprung from the romance genre, but indirectly, through their writers' imitation of William Morris.[33] Early fantasy writers like Lord Dunsany, E. R. Eddison [34] and James Branch Cabell [35] were familiar with Morris' romances. The Wood Beyond the World is considered to have heavily influenced C. S. Lewis' </span><em data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">Narnia</span></em><span data-dcnode-id="1331" instrument_node=""> series, while J.R. R. Tolkien was inspired by Morris's reconstructions of early Germanic life in </span><em data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">The House of the Wolfings</span></em><span data-dcnode-id="1328" instrument_node=""> and </span><em data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">The Roots of the Mountains</span></em><span data-dcnode-id="1325" instrument_node="">. (The young Tolkien attempted a retelling of the story of Kullervo from the </span><em data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">Kalevala</span></em><span data-dcnode-id="1322" instrument_node=""> in the style of </span><em data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">The House of the Wolfings</span></em><span data-dcnode-id="1319" instrument_node="">[36]). Sir Henry Newbolt's medieval allegorical novel, </span><em data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">Aladore</span></em><span data-dcnode-id="1316" instrument_node="">, was influenced by Morris' fantasies. [37] James Joyce also drew inspiration from his work.[38]</span></p><span data-dcnode-id="1314" instrument_node="">
</span><h3 data-dcnode-id="1312" id="Textiles"><span data-dcnode-id="1313" instrument_node="">Textiles</span></h3><span data-dcnode-id="1311" instrument_node="">
</span><p data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">[image:] Cabbage and vine tapestry, 1879</span></p><span data-dcnode-id="1308" instrument_node="">
</span><p data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">Furnishing textiles were an important offering of the firm in all its incarnations. By 1883, Morris wrote "Almost all the designs we use for surface decoration, wallpapers, textiles, and the like, I design myself. I have had to learn the theory and to some extent the practice of weaving, dyeing and textile printing: all of which I must admit has given me and still gives me a great deal of enjoyment."[39]</span></p><span data-dcnode-id="1305" instrument_node="">
</span><p data-dcnode-id="1300"><span data-dcnode-id="1304" instrument_node="">Morris's preference for flat use of line and colour and abhorrence of "realistic" three-dimensional shading was marked; in this he followed the propositions of Owen Jones as set out in his </span><em data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">The Grammar of Ornament</span></em><span data-dcnode-id="1301" instrument_node=""> of 1856, a copy of which Morris owned. Writing on tapestry weaving, Morris said:</span></p><span data-dcnode-id="1299" instrument_node="">
</span><blockquote data-dcnode-id="1291"><span data-dcnode-id="1298" instrument_node="">
</span><p data-dcnode-id="1293"><span data-dcnode-id="1297" instrument_node="">As in all wall-decoration, the first thing to be considered in the designing of Tapestry is the force, purity, and elegance of the silhouette of the objects represented, and nothing vague or indeterminate is admissible. But special excellences can be expected from it. Depth of tone, richness of colour, and exquisite gradation of tints are easily to be obtained in Tapestry; and it also demands that crispness and abundance of beautiful detail which was the especial characteristic of fully developed Mediæval Art. - </span><em data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">Of the Revival of Design and Handicraft</span></em><br class="wikitext-br" data-dcnode-id="1294"></p><span data-dcnode-id="1292" instrument_node="">
</span></blockquote><span data-dcnode-id="1290" instrument_node="">
</span><p data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">It is likely that much of Morris's preference for medieval textiles was formed — or crystallised — during his brief apprenticeship with G. E. Street. Street had co-written a book on Ecclesiastical Embroidery in 1848, and was a staunch advocate of abandoning faddish woolen work on canvas in favour of more expressive embroidery techniques based on Opus Anglicanum, a surface embroidery technique popular in medieval England.[40]</span></p><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">He was also very fond of hand knotted Persian carpets[41] and advised the South Kensington Museum in the acquisition of fine Kerman carpets.[42]</span></p><span data-dcnode-id="1284" instrument_node="">
</span><h3 data-dcnode-id="1282" id="Embroidery"><span data-dcnode-id="1283" instrument_node="">Embroidery</span></h3><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">[also see:] Main article: Art needlework</span></p><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">Morris taught himself embroidery, working with wool on a frame custom-built from an old example, and once he had mastered the technique he trained his wife Jane and her sister Bessie Burden and others to execute designs to his specifications. "Embroideries of all kinds" were offered through Morris, Marshall, Faulkner &amp; Co. catalogues, and church embroidery became and remained an important line of business for its successor companies into the twentieth century.[43] By the 1870s, the firm was offering both designs for embroideries and finished works. Following in Street's footsteps, Morris became active in the growing movement to return originality and mastery of technique to embroidery, and was one of the first designers associated with the Royal School of Art Needlework with its aim to "restore Ornamental Needlework for secular purposes to the high place it once held among decorative arts." [44]</span></p><span data-dcnode-id="1275" instrument_node="">
</span><h3 data-dcnode-id="1273" id="Printed-and-woven-textiles"><span data-dcnode-id="1274" instrument_node="">Printed and woven textiles</span></h3><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">[image:] Design for "Tulip and Willow" indigo-discharge wood-block printed fabric, 1873</span></p><span data-dcnode-id="1269" instrument_node="">
</span><p data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">Morris's first repeating pattern for wallpaper is dated 1862, but was not manufactured until 1864. All his wallpaper designs were manufactured for him by Jeffrey &amp; Co, a commercial wallpaper maker. In 1868 he designed his first pattern specifically for fabric printing. As in so many other areas that interested him, Morris chose to work with the ancient technique of hand woodblock printing in preference to the roller printing which had almost completely replaced it for commercial uses.</span></p><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Morris took up the practical art of dyeing as a necessary adjunct of his manufacturing business. He spent much of his time at Staffordshire dye works mastering the processes of that art and making experiments in the revival of old or discovery of new methods. One result of these experiments was to reinstate indigo dyeing as a practical industry and generally to renew the use of those vegetable dyes, like madder, which had been driven almost out of use by the anilines. Dyeing of wools, silks, and cottons was the necessary preliminary to what he had much at heart, the production of woven and printed fabrics of the highest excellence; and the period of incessant work at the dye-vat (1875–76) was followed by a period during which he was absorbed in the production of textiles (1877–78), and more especially in the revival of carpet-weaving as a fine art.[1][45] However, his first carpet designs of 1875, were made for him industrially by commercial firms using machinery.</span></p><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">Morris's patterns for woven textiles, some of which were also machine made under ordinary commercial conditions, included intricate double-woven furnishing fabrics in which two sets of warps and wefts are interlinked to create complex gradations of colour and texture.[46] His textile designs are still popular today, sometimes recoloured for modern sensibilities, but also in the original colourways.</span></p><span data-dcnode-id="1260" instrument_node="">
</span><h3 data-dcnode-id="1258" id="Tapestry"><span data-dcnode-id="1259" instrument_node="">Tapestry</span></h3><span data-dcnode-id="1257" instrument_node="">
</span><p data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">Morris long dreamed of weaving tapestries in the medieval manner, which he called "the noblest of the weaving arts." In September 1879 he finished his first solo effort, a small piece called "Cabbage and Vine".[47][48] Shortly thereafter Morris trained his employee John Henry Dearle in the technique, setting up a tapestry loom at Queen Square and later a large tapestry works at Merton Abbey.</span></p><span data-dcnode-id="1254" instrument_node="">
</span><h3 data-dcnode-id="1252" id="The-Kelmscott-Press"><span data-dcnode-id="1253" instrument_node="">The Kelmscott Press</span></h3><span data-dcnode-id="1251" instrument_node="">
</span><p data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">[image:] Trademark of the Kelmscott Press</span></p><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">In January 1891, Morris founded the Kelmscott Press at Hammersmith, London, in order to produce books by traditional methods, using, as far as possible, the printing technology and typographical style of the fifteenth century. In this he was reflecting the tenets of the Arts and Crafts movement, and responding to the mechanisation and mass-production of contemporary book-production methods and to the rise of lithography, particularly those lithographic prints designed to look like woodcuts.</span></p><span data-dcnode-id="1245" instrument_node="">
</span><p data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">He designed two typefaces based on fifteenth-century models, the Roman "Golden" type (inspired by the type of the early Venetian printer Nicolaus Jenson) and the black letter "Troy" type; a third type, the "Chaucer" was a smaller version of the Troy type. He also designed floriated borders and initials for the books, drawing inspiration from incunabula and their woodcut illustrations. Selection of paper and ink, and concerns for the overall integration of type and decorations on the page, made the Kelmscott Press the most famous of the private presses of the Arts and Crafts movement, and the main inspiration for what became known as the "Private Press Movement". It operated until 1898, producing more than 18,000 copies of 53 different works, comprising 69 volumes, and inspired numerous other private presses, notably the Vale Press, Caradoc Press, Ashendene Press and Doves Press.[49]</span></p><span data-dcnode-id="1242" instrument_node="">
</span><h3 data-dcnode-id="1240" id="Publications"><span data-dcnode-id="1241" instrument_node="">Publications</span></h3><span data-dcnode-id="1239" instrument_node="">
</span><p data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Kelmscott Manor depicted in the frontispiece to the 1893 Kelmscott Press edition of News from Nowhere.</span></p><span data-dcnode-id="1236" instrument_node="">
</span><p data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">Among the works issued by the Kelmscott Press were:[49][50][51]</span></p><span data-dcnode-id="1233" instrument_node="">
</span><ul data-dcnode-id="1162"><span data-dcnode-id="1232" instrument_node="">
</span><li data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">William Morris, The Story of the Glittering Plain (1891)</span></li><span data-dcnode-id="1229" instrument_node="">
</span><li data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">William Morris, The Defence of Guenevere and other Poems (1892)</span></li><span data-dcnode-id="1226" instrument_node="">
</span><li data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">William Morris, A Dream of John Ball and A King's Lesson (1892)</span></li><span data-dcnode-id="1223" instrument_node="">
</span><li data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Raoul Lafevre, The Recuyell of the Historyes of Troye (1892)</span></li><span data-dcnode-id="1220" instrument_node="">

</span><p data-dcnode-id="1156"><span data-dcnode-id="1160" instrument_node="">The Kelmscott Press edition of </span><em data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">The Works of Geoffrey Chaucer</span></em><span data-dcnode-id="1157" instrument_node="">, with decorations by Morris and illustrations by Burne-Jones, is sometimes counted among the most beautiful books ever produced. Full-scale facsimiles of the Kelmscott Chaucer were published by the Basilisk Press in 1974 and by the Folio Society in 2002. More modest facsimiles were published by World Publishing in 1964 and Omega Books in 1985.</span></p><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">[image:] Morris family tombstone at Kelmscott, designed by Philip Webb</span></p><span data-dcnode-id="1152" instrument_node="">
</span><h3 data-dcnode-id="1150" id="Legacy"><span data-dcnode-id="1151" instrument_node="">Legacy</span></h3><span data-dcnode-id="1149" instrument_node="">
</span><h3 data-dcnode-id="1147" id="Assessment"><span data-dcnode-id="1148" instrument_node="">Assessment</span></h3><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1141"><span data-dcnode-id="1145" instrument_node="">Three years after his death, Morris's biographer John William Mackail (the husband of Burne-Jones's daughter Margaret and so a member of his immediate circle) summed up his career for the </span><em data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">Dictionary of National Biography</span></em><span data-dcnode-id="1142" instrument_node=""> in a quote that is markedly prescient in its assessment:</span></p><span data-dcnode-id="1140" instrument_node="">
</span><blockquote data-dcnode-id="1134"><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1136"><span data-dcnode-id="1138" instrument_node="">The fame of Morris during his life was probably somewhat obscured by the variety of his accomplishments. In all his work after he reached mature life there is a marked absence of extravagance, of display, of superficial cleverness or effectiveness, and an equally marked sense of composition and subordination. Thus his poetry is singularly devoid of striking lines or phrases, and his wall-papers and chintzes only reveal their full excellence by the lastingness of the satisfaction they give. His genius as a pattern-designer is allowed by all qualified judges to have been unequalled. This, if anything, he himself regarded as his specific profession; it was under the designation of "designer" that he enrolled himself in the socialist ranks and claimed a position as one of the working class. And it is the quality of design which, together with a certain fluent ease, distinguishes his work in literature as well as in industrial art. It is yet too early to forecast what permanent place he may hold among English poets. "The Defence of Guenevere" had a deep influence on a limited audience. With "Jason" and the "Earthly Paradise" he attained a wide popularity: and these poems, appearing as they did at a time when the poetic art in England seemed narrowing into mere labour on a thrice-ploughed field, not only gave a new scope, range, and flexibility to English rhymed verse, but recovered for narrative poetry a place among the foremost kinds of the art. A certain diffuseness of style may seem to be against their permanent life, so far as it is not compensated by a uniform wholesomeness and sweetness which indeed marks all Morris’s work. In "Sigurd the Volsung" Morris appears to have aimed higher than in his other poems, but not to have reached his aim with the same certainty; and his own return afterwards from epic to romance may indicate that the latter was the ground on which he was most at home. The prose romances of his later years have so far proved less popular in themselves than in the dilutions they have suggested to other writers. Here as elsewhere Morris’s great effect was to stimulate the artistic sense and initiate movements. So likewise it was with his political and social work. Much of it was not practical in the ordinary sense; but it was based on principles and directed towards ideals which have had a wide and profound influence over thought and practice.[1]</span><br class="wikitext-br" data-dcnode-id="1137"></p><span data-dcnode-id="1135" instrument_node="">
</span></blockquote><span data-dcnode-id="1133" instrument_node="">
</span><p data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">From a later perspective, Stansky concludes that:</span></p><span data-dcnode-id="1130" instrument_node="">
</span><blockquote data-dcnode-id="1124"><span data-dcnode-id="1129" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1128" instrument_node="">Morris's views on the environment, on preserving what is of value in both the natural and "built" worlds, on decentralising bloated government, are as significant now as they were in Morris's own time, or even more so. Earlier in the twentieth century, much of his thinking, particularly its political side, was dismissed as sheer romanticism. After the Second World War, it appeared that modernisation, centralisation, industrialism, rationalism – all the faceless movements of the time – were in control and would take care of the world. Today, when we have a keen sense of the shambles of their efforts, the suggestions which Morris made in his designs, his writings, his actions and his politics have new power and relevance.[52]</span><br class="wikitext-br" data-dcnode-id="1127"></p><span data-dcnode-id="1125" instrument_node="">
</span></blockquote><span data-dcnode-id="1123" instrument_node="">
</span><p data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Today, Morris's poetry is little-read. His fantasy romances languished out of print for decades until their rediscovery amid the great fantasy revival of the late 1960s following the phenomenal success of Tolkien's The Lord of the Rings. But his textile and wallpaper designs remain a staple of the Arts and Crafts Revival of the turn of the 21st century, and the reproduction of Morris designs as fabric, wrapping paper, and craft kits of all sorts is testament to the enduring appeal of his work. The William Morris Societies in Britain, the US, and Canada are active in preserving Morris's work and ideas.</span></p><span data-dcnode-id="1120" instrument_node="">
</span><p data-dcnode-id="1116"><em data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Notable collections and house museums</span></em><span data-dcnode-id="1117" instrument_node=""> [image:] Main Entrance to Kelmscott Manor</span></p><span data-dcnode-id="1115" instrument_node="">
</span><p data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">A number of galleries and museums house important collections of Morris's work and decorative items commissioned from Morris &amp; Co. The William Morris Gallery in Walthamstow, England, is a public museum devoted to Morris' life, work and influence. There are permanent displays of printed, woven and embroidered fabrics, rugs, carpets, wallpapers, furniture, stained glass and painted tiles by Morris and his associates. In April 2007, The Guardian newspaper reported that funding for the Gallery was threatened by cost cutting by the London borough of Waltham Forest. A campaign to avoid the reduction in opening times and dismissal of key staff is underway.[53] The former "green dining room" at the Victoria and Albert Museum is now its "Morris Room". The V&amp;A's British Galleries house other decorative works by Morris and his associates.[54]</span></p><span data-dcnode-id="1112" instrument_node="">
</span><p data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">Wightwick Manor in the West Midlands, England, is a notable example of the Morris &amp; Co. style, with original Morris wallpapers and fabrics, De Morgan tiles, and Pre-Raphaelite works of art, managed by the National Trust. Standen in West Sussex, England, was designed by Webb between 1892 and 1894 and decorated with Morris carpets, fabrics and wallpapers. Morris's homes Red House and Kelmscott Manor have been preserved. Red House was acquired by the National Trust in 2003 and is open to the public by advanced reservation. Kelmscott Manor is owned by the Society of Antiquaries of London and is open to the public.</span></p><span data-dcnode-id="1109" instrument_node="">
</span><p data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">The Art Gallery of South Australia is "fortunate in holding the most comprehensive collection of Morris &amp; Co. furnishings outside Britain".[55] The collection includes books, embroideries, tapestries, fabrics, wallpapers, drawings &amp; sketches, furniture and stained glass, and forms the focus of two published works (produced to accompany special exhibitions).[55][56]</span></p><span data-dcnode-id="1106" instrument_node="">
</span><p data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">The Huntington Library, Art Collections and Botanical Gardens in San Marino, California acquired the collection of Morris materials amassed by Sanford and Helen Berger in 1999. The collection includes stained glass, wallpaper, textiles, embroidery, drawings, ceramics, more than 2000 books, original woodblocks, and the complete archives of both Morris, Marshall, Faulkner &amp; Co. and Morris &amp; Co.[57] These materials formed the foundation for the 2002 exhibition William Morris: Creating the Useful and the Beautiful and 2003 exhibition The Beauty of Life: William Morris and the Art of Design and accompanying publication.[58]</span></p><span data-dcnode-id="1103" instrument_node="">
</span><h3 data-dcnode-id="1101" id="Monuments"><span data-dcnode-id="1102" instrument_node="">Monuments</span></h3><span data-dcnode-id="1100" instrument_node="">
</span><p data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">A fountain located in Bexleyheath town centre, named the Morris Fountain, was created in his honour and unveiled on the anniversary of his birth. Also in Bexleyheath, Morris' home Red House was opened up to the public by the National Trust in 2004. Also, Walthamstow Central tube station has William Morris inspired motifs (by Julia Black) in regularly spaced alcoves along the platform walls.</span></p><span data-dcnode-id="1097" instrument_node="">
