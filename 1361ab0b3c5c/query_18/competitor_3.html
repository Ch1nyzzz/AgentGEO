</span><strong data-dcnode-id="1696"><span class="word-size-increase" data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">William Morris</span></span></strong><span data-dcnode-id="1695" instrument_node=""> was one of the most influential Pre-Raphaelite artists, textile designer and writer of his time during the English Arts and Crafts Movement. As an author and medievalist, he helped establish the modern fantasy genre that has gone to inspire contemporary authors of today including J.R.R. Tolkien and J.K. Rowling. Some of his notable works include ‘News from Nowhere’ and ‘The Well at the World’s End’. He also contributed in refreshing traditional fabric arts and methods of production. One of the founders of the Society for Protection of Ancient Buildings, Morris’s name has gone down in history as the iconic figure who changed the face of ancient buildings conservation in the United Kingdom. Some of his best-written works include ‘A Dream of John Ball’, and ‘The Earthly Paradise’. He was an important figure in the advent of socialism in Britain, founding the Socialist League, but leaving the organization due to differences in goals and means. He devoted much of his later life to the Kelmscott Press, which was involved in the production of illuminated-style print books. </span></div><span data-dcnode-id="1693" instrument_node="">

</span><div class="fpf-block" data-dcnode-id="524"><div data-dcnode-id="775" id="childhood-&amp;-early-life"><div class="sec_heading" data-dcnode-id="859"><strong data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Childhood &amp; Early Life</span></strong></div><div class="newpara" data-dcnode-id="856"><div class="newpara_desc" data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">William Morris was born on March 24, 1834, in Waltamstow, England, to William Morris and Emma Morris Shelton. He was the third child of his parents, but his earlier two siblings had died in infancy, hence effectively he was the eldest child in the family.</span></div></div><div class="newpara" data-dcnode-id="853"><div class="newpara_desc" data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">He was an extremely studious child and learned to read from a very early age. By the age of four, he was a child prodigy and had already read most of the Waverly novels.</span></div></div><div class="newpara" data-dcnode-id="850"><div class="newpara_desc" data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">He was particularly influenced by ‘Arabian Nights’ stories and by the designs in ‘Gerard’s Herbal’. By the time he was 13 years old, his father died; he left behind a wealthy legacy.</span></div></div><div class="newpara" data-dcnode-id="847"><div class="newpara_desc" data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">In 1848, the family relocated and soon, Morris attended Marlborough College, where he studied for three years. He never showed much interest in academics here and developed a taste only for architecture. He was eventually removed from this school.</span></div></div><div class="newpara" data-dcnode-id="844"><div class="newpara_desc" data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">He was sent to be tutored by Rev. F. B. Guy, who prepared him for Exeter College, Oxford; an institution he attended in 1852. Here, he studied theology, ecclesiastical history, medieval poetry and art, along with his friend, Edward Burne-Jones.</span></div></div><div class="newpara" data-dcnode-id="841"><div class="newpara_desc" data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">It was during his time in college that he became heavily influenced by Pre-Raphaelite paintings and he also began to write poetry. Despite his creative pursuits, he decided to become an architect.</span></div></div><div class="col-md-12 col-xs-12 col-sm-12 display-quotes-img" data-dcnode-id="824" style="text-align:center;"><img alt="william-morris-57882.jpg" class="img-responsive left_nav_sicons quotes-img loader_image1" data-dcnode-id="840" data-src="https://quotes.thefamouspeople.com/images/quotes/william-morris-57882.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefamouspeople.com/profiles&amp;raw" style="margin-bottom:0px;"><div class="clear" data-dcnode-id="839"></div><div class="combi_links" data-dcnode-id="825" style="float:right!important;margin-right:32px!important;margin-top: 5px;margin-bottom: 5px;"><span data-dcnode-id="837" style="color: #999;"><span data-dcnode-id="838" instrument_node="">Quotes: </span></span><a data-dcnode-id="835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//quotes.thefamouspeople.com/you-18.php"><span data-dcnode-id="836" instrument_node="">You</span></a><span data-dcnode-id="834" instrument_node="">, </span><a data-dcnode-id="832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//quotes.thefamouspeople.com/will-238.php"><span data-dcnode-id="833" instrument_node="">Will</span></a><span data-dcnode-id="831" instrument_node="">, </span><a data-dcnode-id="829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//quotes.thefamouspeople.com/beautiful-271.php"><span data-dcnode-id="830" instrument_node="">Beautiful</span></a><span data-dcnode-id ht:100%;"></a><div class="clear" data-dcnode-id="793"></div><a class="llink" data-dcnode-id="791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lists.thefamouspeople.com/2021-most-beautiful-women-ranked.php"><span data-dcnode-id="792" instrument_node="">The Most Beautiful Women Of 2021</span></a></div><div class="mobile_ad clear" data-dcnode-id="789"></div><div class="col-lg-3 col-md-3 col-sm-6 col-xs-6 catprofiles1 catprofilesbottom1" data-dcnode-id="783"><a class="tileLink1" data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lists.thefamouspeople.com/the-best-black-actresses-of-all-time.php" onclick="_gaq.push(['_trackEvent', 'Lists', 'Click', 'The Best Black Actresses Of All Time']);"><img alt="The Best Black Actresses Of All Time" class="img-responsive" data-dcnode-id="788" data-src="https://lists.thefamouspeople.com/images/lists_thumbs_og_images/lid_31_1584424853.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefamouspeople.com/profiles&amp;raw" style="width:320px;max-width:100%;max-height:100%;"></a><div class="clear" data-dcnode-id="786"></div><a class="llink" data-dcnode-id="784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lists.thefamouspeople.com/the-best-black-actresses-of-all-time.php"><span data-dcnode-id="785" instrument_node="">The Best Black Actresses Of All Time</span></a></div><div class="col-lg-3 col-md-3 col-sm-6 col-xs-6 catprofiles1 catprofilesbottom1" data-dcnode-id="777"><a class="tileLink1" data-dcnode-id="781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lists.thefamouspeople.com/who-is-the-most-popular-bts-member.php" onclick="_gaq.push(['_trackEvent', 'Lists', 'Click', 'Who Is The Most Popular BTS Member?']);"><img alt="Who Is The Most Popular BTS Member?" class="img-responsive" data-dcnode-id="782" data-src="https://lists.thefamouspeople.com/images/lists_thumbs_og_images/lid_21_1583234266.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefamouspeople.com/profiles&amp;raw" style="width:320px;max-width:100%;max-height:100%;"></a><div class="clear" data-dcnode-id="780"></div><a class="llink" data-dcnode-id="778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lists.thefamouspeople.com/who-is-the-most-popular-bts-member.php"><span data-dcnode-id="779" instrument_node="">Who Is The Most Popular BTS Member?</span></a></div><div class="mobile_ad clear" data-dcnode-id="776"></div></div><div class="clear" data-dcnode-id="774"></div><div class="dl" data-dcnode-id="758" style="font-weight:700;color:#2b2b2b;"><span data-dcnode-id="773" instrument_node="">
</span><span' data-dcnode-id="759"><span data-dcnode-id="772" instrument_node="">Recommended Lists:</span><div class="combi_links" data-dcnode-id="769" style=""><a class="also_listed_bottom" data-dcnode-id="770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefamouspeople.com/male-poets.php"><span data-dcnode-id="771" instrument_node="">Male Poets</span></a></div><div class="combi_links" data-dcnode-id="766" style=""><a class="also_listed_bottom" data-dcnode-id="767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefamouspeople.com/male-writers.php"><span data-dcnode-id="768" instrument_node="">Male Writers</span></a></div><div class="combi_links" data-dcnode-id="763" style=""><a class="also_listed_bottom" data-dcnode-id="764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefamouspeople.com/aries-writers.php"><span data-dcnode-id="765" instrument_node="">Aries Writers</span></a></div><div class="combi_links" data-dcnode-id="760" style=""><a class="also_listed_bottom" data-dcnode-id="761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefamouspeople.com/briton-poets.php"><span data-dcnode-id="762" instrument_node="">British Poets</span></a></div></span'></div><div class="clear" data-dcnode-id="757"></div><div data-dcnode-id="624" id="career"><div class="sec_heading" data-dcnode-id="754"><strong data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Career</span></strong></div><div class="newpara" data-dcnode-id="751"><div class="newpara_desc" data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">After passing his exams, he interned as a pupil at the office of George Edmund Street, a leading architect. It was there that he became lifelong friends with the senior clerk, Philipp Webb.</span></div></div><div class="newpara" data-dcnode-id="748"><div class="newpara_desc" data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">However, during the course of his time, he also took up art and devoted himself to working for an art commission; one which involved him to decorate a roof, depicting one of the scenes from ‘Le Morte D’Arthur’, along with several other artists.</span></div></div><div class="newpara" data-dcnode-id="745"><div class="newpara_desc" data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Following his marriage, he concentrated on building a house for his wife and himself.</span></div></div><div class="newpara" data-dcnode-id="742"><div class="newpara_desc" data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">In 1861, he built an organization with other artists called ‘Morris, Marshall, Faulkner &amp; Co’. The firm would assume carving, stained glass works, paper-hangings, carpets, metal-works, embroideries, tapestries and printed fabrics works.</span></div></div><div class="newpara" data-dcnode-id="739"><div class="newpara_desc" data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">After his marriage, he gradually began to lose interest in painting the last of his paintings are dated no longer than 1862. The same year, the works done by the firm was showcased at the 1862 International Exhibition, and within four years of this exhibit, the company began making huge profits.</span></div></div><div class="newpara" data-dcnode-id="736"><div class="newpara_desc" data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">In 1867, he was ordered to decorate a ‘green dining room’ at the South Kensington Museum. The works included stained glass windows, panel figures, olive branches and a frieze.</span></div></div><div class="newpara" data-dcnode-id="733"><div class="newpara_desc" data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">In 1874, Morris wanted to take sole control of the firm and had to acquire the other shareholders in the process. Around this time, he started to take an active interest in politics and soon, became a member of the ‘National Liberal League’.</span></div></div><div class="newpara" data-dcnode-id="730"><div class="newpara_desc" data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">In 1876, he composed one of his greatest poems, which was of 10,000 lines titled, ‘The Story of Sigurd the Volsung and the Fall of the Niblungs’.</span></div></div><div class="newpara" data-dcnode-id="727"><div class="newpara_desc" data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Apart from writing and designing, Morris was extremely fond of medieval tapestries. In 1879, he finished his first tapestry solo works titled, ‘Cabbage and Vine’.</span></div></div><div class="crb hide_on_bs" data-dcnode-id="725" style="font-size: 10px!important;"><span data-dcnode-id="726" instrument_node="">Continue Reading Below</span></div><div class="clear" data-dcnode-id="697"><div class="center-ad desktop_ad" data-dcnode-id="717"><span data-dcnode-id="724" instrument_node="">
</span><div class="_ap_apex_ad" data-dcnode-id="719" id="de2ae61f-9611-4944-9235-d0bff4983a6c"><span data-dcnode-id="723" instrument_node="">

</span><div class="_ap_apex_ad" data-dcnode-id="710" id="de2ae61f-9611-4944-9235-d0bff4983a6c"><span data-dcnode-id="714" instrument_node="">

</span><span data-dcnode-id="702" instrument_node="">
</span></div><span data-dcnode-id="700" instrument_node="">
</span></div><span data-dcnode-id="698" instrument_node="">
</span></div><div class="newpara" data-dcnode-id="694"><div class="newpara_desc" data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">In 1882, he authored ‘Hopes and Fears of Art’. By the next year, he was made a member of the Democratic Federation and during the course of this time his creative energies grew manifold, influenced by socialist politics. It was during this time he read Marx’s ‘Das Kapital’, which greatly influenced his ideologies.</span></div></div><div class="newpara" data-dcnode-id="691"><div class="newpara_desc" data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">By 1884, he was actively advocating and writing on socialism and lecturing at street corners in England and Scotland. The same year, he authored ‘Art and Socialism’ and ‘A Summary of the Principles of Socialism’. He grew to become weary of the Democratic Federation and resigned from the group, establishing the ‘Socialist League’.</span></div></div><div class="newpara" data-dcnode-id="688"><div class="newpara_desc" data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">In 1885, he authored ‘Useful Work versus Useless Toil’ and ‘Chants for Socialists’. He also edited the Socialist League’s journal, ‘Commonweal’ and was detained in association with ‘free speech demonstration’.</span></div></div><div class="newpara" data-dcnode-id="685"><div class="newpara_desc" data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">He published a series of lectures titled, ‘Signs of Change’, in 1888. In the same year, he wrote ‘The House of the Wolfings’—which was his first work in the ‘prose-romance’ category—and he also authored ‘A Dream of John Ball’.</span></div></div><div class="newpara" data-dcnode-id="682"><div class="newpara_desc" data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">In 1889, he left the Socialist League and founded the ‘Hammersmith Socialist Society’ along with his disciples and two years later, he founded the ‘Kelmscott Press’ at Hammersmith.</span></div></div><div class="newpara" data-dcnode-id="679"><div class="newpara_desc" data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">In 1891, he authored a fantasy novel, ‘The Story of the Glittering Plain’, published by Kelmscott Press.</span></div></div><div class="newpara" data-dcnode-id="676"><div class="newpara_desc" data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">In 1894, he published ‘The Wood Beyond the World’, a prose fantasy, which is regarded as one of his finest works till date.</span></div></div><div class="newpara" data-dcnode-id="673"><div class="newpara_desc" data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">His last works include’ Child Christopher and Goldilind the Fair’, ‘The Sundering Flood’ and ‘The Well at the World’s End’.</span></div></div><div class="col-md-12 col-xs-12 col-sm-12 display-quotes-img" data-dcnode-id="656" style="text-align:center;"><img alt="william-morris-57883.jpg" class="img-responsive left_nav_sicons quotes-img loader_image1" data-dcnode-id="672" data-src="https://quotes.thefamouspeople.com/images/quotes/william-morris-57883.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefamouspeople.com/profiles&amp;raw" style="margin-bottom:0px;"><div class="clear" data-dcnode-id="671"></div><div class="combi_links" data-dcnode-id="657" style="float:right!important;margin-right:32px!important;margin-top: 5px;margin-bottom: 5px;"><span data-dcnode-id="669" style="color: #999;"><span data-dcnode-id="670" instrument_node="">Quotes: </span></span><a data-dcnode-id="667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//quotes.thefamouspeople.com/you-18.php"><span data-dcnode-id="668" instrument_node="">You</span></a><span data-dcnode-id="666" instrument_node="">, </span><a data-dcnode-id="664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//quotes.thefamouspeople.com/home-187.php"><span data-dcnode-id="665" instrument_node="">Home</span></a><span data-dcnode-id="663" instrument_node="">, </span><a data-dcnode-id="661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//quotes.thefamouspeople.com/beautiful-271.php"><span data-dcnode-id="662" instrument_node="">Beautiful</span></a><span data-dcnode-id="660" instrument_node="">, </span><a data-dcnode-id="658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//quotes.thefamouspeople.com/believe-354.php"><span data-dcnode-id="659" instrument_node="">Believe</span></a></div></div><div class="clear" data-dcnode-id="655"></div><div class="crb hide_on_bs" data-dcnode-id="653" style="font-size: 10px!important;"><span data-dcnode-id="654" instrument_node="">Continue Reading Below</span></div><div class="clear" data-dcnode-id="625"><div class="center-ad desktop_ad" data-dcnode-id="645"><span data-dcnode-id="652" instrument_node="">

</span><span' data-dcnode-id="611"><span data-dcnode-id="621" instrument_node="">Recommended Lists:</span><div class="combi_links" data-dcnode-id="618" style=""><a class="also_listed_bottom" data-dcnode-id="619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefamouspeople.com/briton-writers.php"><span data-dcnode-id="620" instrument_node="">British Writers</span></a></div><div class="combi_links" data-dcnode-id="615" style=""><a class="also_listed_bottom" data-dcnode-id="616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefamouspeople.com/briton-non-fiction-writers.php"><span data-dcnode-id="617" instrument_node="">British Non-Fiction Writers</span></a></div><div class="combi_links" data-dcnode-id="612" style=""><a class="also_listed_bottom1" data-dcnode-id="613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefamouspeople.com/aries-men.php"><span data-dcnode-id="614" instrument_node="">Aries Men</span></a></div></span'></div><div class="clear" data-dcnode-id="609"></div><div data-dcnode-id="599" id="major-works"><div class="sec_heading" data-dcnode-id="606"><strong data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Major Works</span></strong></div><div class="newpara" data-dcnode-id="603"><div class="newpara_desc" data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">In 1876, he penned a 10,000 line poem titled, ‘The Story of Sigurd the Volsung and the Fall of the Niblungs’. The poem was heartily received by critics and eminent personalities including George Bernard Shaw and T.E. Lawrence. Although it never received wide readership, it is largely considered one of his greatest works and has gone on to inspire fantasy writers of today including J.R.R. Tolkien and Kevin Crossley-Holland.</span></div></div><div class="newpara" data-dcnode-id="600"><div class="newpara_desc" data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">‘The Wood Beyond the World’, published by Kelmscott Press in 1894 is regarded as one of the greatest works in ‘fantasy literature’. The novel was reissued by Ballantine Adult Fantasy Series and is believed to be one of the few works that has gone on to inspire modern-day fantasy novels.</span></div></div></div><div class="clear" data-dcnode-id="598"></div><div class="clear" data-dcnode-id="597"></div><div data-dcnode-id="566" id="personal-life-&amp;-legacy"><div class="sec_heading" data-dcnode-id="594"><strong data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">Personal Life &amp; Legacy</span></strong></div><div class="newpara" data-dcnode-id="591"><div class="newpara_desc" data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">He fell in love with Jane Burden and married her on April 26, 1858. They went on to have two daughters, one of whom developed epilepsy during her teens. His wife also had a long affair with Morris’ friend, Dante Gabriel Rossetti.</span></div></div><div class="newpara" data-dcnode-id="588"><div class="newpara_desc" data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">Both Jane and Morris were extremely happy together for the first 10 years of their marriage, but since a divorce was inconceivable at the time, they lived together until his death.</span></div></div><div class="newpara" data-dcnode-id="585"><div class="newpara_desc" data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">He died on October 3, 1896, at the age of 62, in London. </span></div></div><div class="newpara" data-dcnode-id="582"><div class="newpara_desc" data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">A number of galleries and museums house important collections of Morris’s work including The ‘Art Gallery of South Australia’, which holds a number of his furnishings and art works. Other galleries include, ‘The Huntington Library, Art Collections and Botanical Gardens’, located in California.</span></div></div><div class="newpara" data-dcnode-id="579"><div class="newpara_desc" data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">A monument called the 'Morris Fountain’ is located in the Bexleyheath town center. There is also a hall of residence named in his honor at the Loughborough University.</span></div></div><div class="col-md-12 col-xs-12 col-sm-12 display-quotes-img" data-dcnode-id="568" style="text-align:center;"><img alt="william-morris-87782.jpg" class="img-responsive left_nav_sicons quotes-img loader_image1" data-dcnode-id="578" data-src="https://quotes.thefamouspeople.com/images/quotes/william-morris-87782.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thefamouspeople.com/profiles&amp;raw" style="margin-bottom:0px;"><div class="clear" data-dcnode-id="577"></div><div class="combi_links" data-dcnode-id="569" style="float:right!important;margin-right:32px!important;margin-top: 5px;margin-bottom: 5px;"><span data-dcnode-id="575" style="color: #999;"><span data-dcnode-id="576" instrument_node="">Quotes: </span></span><a data-dcnode-id="573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//quotes.thefamouspeople.com/life-34.php"><span data-dcnode-id="574" instrument_node="">Life</span></a><span data-dcnode-id="572" instrument_node="">, </span><a data-dcnode-id="570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//quotes.thefamouspeople.com/happiness-417.php"><span data-dcnode-id="571" instrument_node="">Happiness</span></a></div></div><div class="clear" data-dcnode-id="567"></div></div><div class="clear" data-dcnode-id="565"></div><div class="clear" data-dcnode-id="564"></div><div data-dcnode-id="527" id="trivia"><div class="sec_heading" data-dcnode-id="561"><strong data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Trivia</span></strong></div><div class="newpara" data-dcnode-id="558"><div class="newpara_desc" data-dcnode-id="559"><span
