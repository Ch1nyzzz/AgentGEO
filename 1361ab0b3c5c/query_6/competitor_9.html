</span><p data-dcnode-id="1427"><span data-dcnode-id="1449" instrument_node="">This book was launched with great fanfare, a high number of editorial reviews from prominent academics, interviews, invited talks, web commentaries, and reviews in the mainstream media, including the </span><em data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">Guardian</span></em><span data-dcnode-id="1446" instrument_node="">, </span><em data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">New</span></em><span data-dcnode-id="1443" instrument_node=""> </span><em data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">Statesman</span></em><span data-dcnode-id="1440" instrument_node="">, </span><em data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">New York Times</span></em><span data-dcnode-id="1437" instrument_node="">, </span><em data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">The Scotsman</span></em><span data-dcnode-id="1434" instrument_node="">, </span><em data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">Economist</span></em><span data-dcnode-id="1431" instrument_node="">, and </span><em data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">Foreign Affairs</span></em><span data-dcnode-id="1428" instrument_node="">. The reviews were for the most part agreeable, though not by comparison with the editorial endorsements, which abound in laudable adjectives: ‘formidable,’ ‘awesome,’ ‘dazzling,’ ‘extraordinary,’ ‘breathtaking,’ ‘thought-provoking,’ ‘engrossing’.</span></p><span data-dcnode-id="1426" instrument_node="">
</span><p data-dcnode-id="1415"><span data-dcnode-id="1425" instrument_node=""> ‘Astonishing’ words were penned even by David Landes, the respected author of </span><em data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">The Wealth and Poverty of Nations </span></em><span data-dcnode-id="1422" instrument_node="">(1998), a work regularly cited in opprobrium for its uncompromising Eurocentric stand. Landes muses over the book's contents: ‘Will Europe undergo a major change? Will the millions of immigrants impose a new set of rules on the rest? There was a time when Europe could absorb any and all newcomers. Now the newcomers may dictate the terms’. Oh dear, Landes may well have been writing an editorial for Walter Lacqueur's </span><em data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">The Last Days of Europe </span></em><span data-dcnode-id="1419" instrument_node="">(2007), which is certainly about ‘what happens when a falling native birthrate collides with uncontrolled immigration’. </span><em data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">Why the West Rules</span></em><span data-dcnode-id="1416" instrument_node="">, despite its title, is scarcely about Europe.</span></p><span data-dcnode-id="1414" instrument_node="">
</span><p data-dcnode-id="1407"><span data-dcnode-id="1413" instrument_node="">As of page 433, in a narrative which runs for 645 pages, no more than 20 pages are dedicated to European history. Pages 385 to 433 cover a chapter, ‘Going Global’, which discusses the Portuguese expeditions and Columbus, but the focus is mostly on the Mongols and Zheng's Treasure Fleets. Drawing on Gavin Menzies’s discredited book, </span><em data-dcnode-id="1409"><a data-dcnode-id="1411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.maritimeasia.ws/topic/1421bunkum.html"><span data-dcnode-id="1412" instrument_node="">1421: The Year China Discovered America</span></a><span data-dcnode-id="1410" instrument_node=""> </span></em><span data-dcnode-id="1408" instrument_node="">(2002), Morris carefully speculates over the possibilities of the ‘even more astonishing voyages that took Zheng's subordinates to the Atlantic Ocean, the North Pole, Antarctica, Australia and Italy’ (p. 410). While he calls the Italian Renaissance ‘one of the most astonishing episodes in history’ (p. 419), his preoccupation is with the renaissance which the Chinese ‘already’ had ‘in the eleventh century’ (p. 419). This renaissance was no less remarkable than the Italian one: ‘Was Leonardo's breath really more astonishing than that of Shen Kuo?’</span></p><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">Shen Kuo (1031–95 AD), a polymath scientist and statesman of the Song Dynasty, was a rather impressive figure. Morris may well be pairing Leonardo with the most formidable scientist in the whole of East Asia's history before 1800. Kuo’s greatest achievements and discoveries include geomorphology, climate change, spherical celestial bodies (not flat), and the compass, camera obscura, fixing the position of the pole star, and correcting solar and lunar errors (the latter including motion and orbital path).</span></p><span data-dcnode-id="1403" instrument_node="">
</span><p data-dcnode-id="1396"><span data-dcnode-id="1402" instrument_node="">What Morris fails to note is that Italy’s Renaissance – which he also identifies as ‘reactionary’ (p. 418) – was populated with not one but many outstanding figures. In the field of painting alone there was Botticelli, Brunelleschi, Donatello, Giotto, Ghiberti, Michelangelo, Raphael, Vasari, and Titian. These painters were associated with the development of a radically new method of perspective painting, which was influenced in turn by the work of a noteworthy group of 15th-century mathematicians who discovered algebraic solutions and trigonometric computations well beyond the achievements of the Greeks and Arabs. Their names are recognized in the annals of mathematics: Scipio del Ferro, Nicolo Tartaglia, Johann Muller Regiomonanus, Giralamo Cardano – not to forget Luca Pacioli (1446/7–1517), the ‘father’ of the first known accounting textbook, </span><em data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">Everything about Arithmetic, Geometry, and proportions</span></em><span data-dcnode-id="1399" instrument_node="">.</span><a data-dcnode-id="1397" href="#f1" id="t1"><span data-dcnode-id="1398" instrument_node="">(1)</span></a></p><span data-dcnode-id="1395" instrument_node="">
</span><p data-dcnode-id="1390"><span data-dcnode-id="1394" instrument_node="">The meagre two pages Morris reserves for the European Renaissance bring up in passing Machiavelli, Michelangelo, and Leon Batista, but it is Zhu Xi, a Confucian ‘theorist’ of the 12th century, who takes center stage in this chapter, along with the admiral Zheng (and the historian Menzies). What was Zhu's achievement? Other than his emphasis on Confucian family values, we learn from Morris that Zhu’s ‘extraordinary’ pupil and ‘new Renaissance man’, Wang, ‘spent a week contemplating a bamboo stalk, as Zhu had recommended, instead of providing insight it made him ill’ (p. 426). I don't blame Wang, bamboo stalks seem innocent enough, but staring at them for a week would have made anyone </span><a data-dcnode-id="1392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.google.ca/images%3Fsourceid%3Dnavclient%26ie%3DUTF-8%26rlz%3D1T4ADBF_enCA281CA292%26q%3Dbamboo%26oi%3Dimage_result_group%26sa%3DX"><span data-dcnode-id="1393" instrument_node="">unwell</span></a><span data-dcnode-id="1391" instrument_node="">.</span></p><span data-dcnode-id="1389" instrument_node="">
</span><p data-dcnode-id="1379"><span data-dcnode-id="1388" instrument_node="">Seriously, what is this book about if it is not about Europe? There is a striking similarity between the opening paragraphs of </span><em data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">Why the West Rules</span></em><span data-dcnode-id="1385" instrument_node=""> and Jared Diamond’s commonly read </span><em data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">Guns, Germs, and Steel</span></em><span data-dcnode-id="1382" instrument_node=""> (1997). Morris asks: ‘Why did British boats shoot their way up the Yangtze in 1842, rather than Chinese ones up the Thames?’ (p. 11) – which is basically the same question the local politician in the island of New Guinea, Yali, asked Diamond: ‘Why is it that you white people developed so much cargo and brought it to New Guinea, but we black people had little cargo of our own?’</span><a data-dcnode-id="1380" href="#f2" id="t2"><span data-dcnode-id="1381" instrument_node="">(2)</span></a></p><span data-dcnode-id="1378" instrument_node="">
</span><p data-dcnode-id="1373"><span data-dcnode-id="1377" instrument_node="">Just as Diamond rejects explanations framed ‘in terms of natural selection and of evolutionary descent,’ and asserts that ‘many (perhaps most) Westerners continue to accept racist explanations’ </span><a data-dcnode-id="1375" href="#f3" id="t3"><span data-dcnode-id="1376" instrument_node="">(3)</span></a><span data-dcnode-id="1374" instrument_node="">, Morris rejects the idea that ‘the West rules today because modern Europeans are the heirs of a genetically superior Neanderthal stock, while Asians descend from the more primitive Homo erectus’ (p. 60). He says point-blank that explanations which rely on biological factors are ‘racist’ (p. 73).</span></p><span data-dcnode-id="1372" instrument_node="">
</span><p data-dcnode-id="1361"><span data-dcnode-id="1371" instrument_node="">Who is currently offering a theory to the effect that such genetic variations as ‘the color of skin, eyes, or hair’ are </span><em data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">more than</span></em><span data-dcnode-id="1368" instrument_node=""> ‘only skin deep’ with an ‘obvious connection to why the West rules’?</span><a data-dcnode-id="1366" href="#f4" id="t4"><span data-dcnode-id="1367" instrument_node="">(4)</span></a><span data-dcnode-id="1365" instrument_node=""> Neither Diamond nor Morris mentions a single author or source in connection to these ‘theories’. Why, then, this persistent need to challenge ‘racist theories of western rule’? I take this as an indirect warning against anyone inclined to think that Western </span><em data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">culture</span></em><span data-dcnode-id="1362" instrument_node=""> has been uniquely creative and superior. Is it a coincidence that at the same time that he dismisses biological explanations, Morris castigates explanations that point to the ‘cultural superiority’ (p. 73) of Europe, and the ‘old long term theory that the culture of the ancient Greeks ... forged a distinctive Western way of life’ (p. 22)? He once believed this, but during his graduate studies in classical archaeology at Cambridge he met some anthropologists of primitive cultures who ‘openly laughed at the quaint notion that Greek culture was unique’. Studying ‘broader and broader slices of the human past’ he came to realize ‘how strong the parallels were between the supposedly unique Western experience and the history of other parts of the world’ (p. 23).</span></p><span data-dcnode-id="1360" instrument_node="">
</span><p data-dcnode-id="1356"><span data-dcnode-id="1359" instrument_node="">This is, of course, what multiculturalists have been propagating for decades. All cultures should be celebrated in their diversity because no culture is more gifted than any other. Diverse cultures are equally the same in achievements. Questioning this diversity doctrine is bigoted. As Roger Scruton has pointed out recently, ‘anybody who publicly disagreed with that [multicultural] claim invited the attentions of the thought police, always ready with the charge of racism, and never so scrupulous as to think it a sin to destroy the career of someone, provided he was white, indigenous, and male.’</span><a data-dcnode-id="1357" href="#f5" id="t5"><span data-dcnode-id="1358" instrument_node="">(5)</span></a></p><span data-dcnode-id="1355" instrument_node="">
</span><p data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">This enforcement of diversity on university campuses, as Scruton adds, is based on a false premise, for ‘culture and race have nothing to do with each other’, and ‘not all cultures are equally admirable’. Morris thinks otherwise; all cultures are so admirable as to be essentially the same: ‘Eastern thought was just as rational and liberal as Western, and Western thought was just as mystical and authoritarian as Eastern’ (p. 261).</span></p><span data-dcnode-id="1352" instrument_node="">
</span><p data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">But some cultures, apparently, are more equal than others. In a ten-page section on ‘The classics,’ Morris consigns both Greek and Roman thought to just about one page (p. 260), while giving Chinese thought the other nine pages (pp. 254–9, 261–3).</span></p><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1335"><span data-dcnode-id="1348" instrument_node="">‘Socrates was part of a huge pattern’, Morris teaches us, ‘not a unique giant who sent the West down a superior path’.</span><a data-dcnode-id="1346" href="#f6" id="t6"><span data-dcnode-id="1347" instrument_node="">(6)</span></a><span data-dcnode-id="1345" instrument_node=""> This line of reasoning is less than inadequate. Not one or two giants set the West apart; rather, it was the </span><em data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">continuous</span></em><span data-dcnode-id="1342" instrument_node=""> sequence of original giants in Greece and in Rome, in medieval Europe, and throughout the modern era. The West was always filled with individuals persistently searching for new worlds, new visions, and new styles of painting, architecture, music, science, philosophy, and literature – in comparative contrast, for example, to the intellectual traditions set down in ancient China – Confucianism, Legalism, Taoism (and later Buddhism) – which persisted in their essentials until the impact of the West occasioned some novelties. This is one of the arguments I make in my recent book, </span><em data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">The Uniqueness of Western Civilization</span></em><span data-dcnode-id="1339" instrument_node=""> (2011). The ultimate basis of Greek civic and cultural life was the aristocratic ethos of individualism and competitive conflict which pervaded Indo-European culture. Ionian literature was far from the world of the barbarian Indo-European warriors who occupied Greece and founded Mycenaean civilization, but it was nonetheless just as intensively competitive. New works of drama, philosophy, and music were expounded in the first-person form as an adversarial or athletic contest in the pursuit of truth.&nbsp;While Thales, Anaximander, Anaxagoras, Empedocles, Heraclitus, Parmenides, Leucippus, and Democritus each had a common interest in the hidden causes of things, each came up with their own radically new explanations. There were no Possessors of the Way in aristocratic Greece; no Chinese Sages decorously deferential to their superiors and expecting appropriate deference from their inferiors. The search for the truth was a free-for-all, each philosopher competing for intellectual prestige, in a polemical tone which sought to discredit the theories of others and to promote one's own.</span><a data-dcnode-id="1337" href="#f7" id="t7"><span data-dcnode-id="1338" instrument_node="">(7)</span></a><span data-dcnode-id="1336" instrument_node=""> </span></p><span data-dcnode-id="1334" instrument_node="">
</span><p data-dcnode-id="1329"><span data-dcnode-id="1333" instrument_node=""> In this environment the Greeks were singular in inventing naturalistic philosophy (the Ionians), tragedy (Aeschylus, Sophocles, Euripides), comedy (Aristophanes, Menander), history (Herodotus, Thucydides), rhetoric (Isocrates), oratory (the Sophists), and dialectical inquiry (Socrates, Plato, Aristotle). Each of these innovative fields was animated by a sceptical and independent disposition. Each artist and intellectual was driven by a desire for originality and fame. Homer may have remained the main schoolbook of the Greeks, but there were always challengers. Early in the 7th century,&nbsp;Archilochus, for instance, broke with the dominance of the hexameter in Homer and Hesiod, and also with the traditional demands of heroic honour, admitting (in a still very warlike culture) that he had thrown away his shield in a flight – ‘I can get another just as good’.&nbsp;Simonides soon followed with a new hedonistic poetry which vindicated the individual's right to sensual happiness, lamented the shortness of human life, and consequently challenged the ideal of a short heroic life.</span><a data-dcnode-id="1331" href="#f8" id="t8"><span data-dcnode-id="1332" instrument_node="">(8)</span></a><span data-dcnode-id="1330" instrument_node=""> </span></p><span data-dcnode-id="1328" instrument_node="">
</span><p data-dcnode-id="1323"><span data-dcnode-id="1327" instrument_node=""> This competitive desire on the part of individuals to stand out from others was ingrained in the whole social outlook of classical Greece: in the Olympic Games, in the perpetual warring of the city-states, in the pursuit of a political career and in the competition among orators for the admiration of the citizens, in the Athenian theatre festivals, where huge numbers of poets would take part in Dionysian competitions amid high civic splendour and religious ritual.</span><a data-dcnode-id="1325" href="#f9" id="t9"><span data-dcnode-id="1326" instrument_node="">(9)</span></a><span data-dcnode-id="1324" instrument_node=""> It was this agonistic temperament which found expression in the Sophistic-Socratic ethos of dialogic argument – in the pursuit of knowledge by comparing and criticizing individual speeches, evaluating contradictory claims, collecting out evidence, cross-questioning and arguing by means of open persuasion and refutation. This aristocratic/individualist ethos was the basis of the West’s unsurpassed originality and restless expansionism.</span></p><span data-dcnode-id="1322" instrument_node="">
</span><p data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node=""> To Morris, like Diamond, the West is simply a geographical category; the ultimate origins of the West’s primacy are to be found in geographical factors. Geography shaped the development and the distribution of power and wealth in the world over the last 15,000 years. Morris pays more attention than Diamond to the way technological and social changes in turn changed the way geography came to determine the advantages and disadvantages of geographical location. Then again, this emphasis is evident in Diamond’s effort to account for why the Near East, for example, was unable to sustain its initial advantages in terms of its eventual ecological degradation and the new opportunities which arose with the coming of iron in the exploitation of the colder lands of Europe. Morris notes likewise how thousands of years ago the geographical location of an Atlantic Europe facing an impassable ocean was a great disadvantage, but when new kinds of ships appeared in the 15th and 16th centuries that could cross this ocean, being close to the Atlantic and nearer to the Americas became a great advantage.</span></p><span data-dcnode-id="1319" instrument_node="">
</span><p data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">What Morris adds to the school of geographical determinism is a grid to measure progress, an ‘index of social development’ comprising energy capture, organization/urbanization, information technology, and war-making capacity, which he employs to determine the precise dates when the West and the East took their respective leads. His grand narrative also pays particular attention to the patterns of human history and the way actual political regimes developed and populations moved in response to environmental challenges. Major sections of the book are dedicated to the way cultures, in varying places in the globe, underwent regular crises brought on by Malthusian pressures, disease, famine, and war. World history, in Morris’s narrative, is essentially characterized by a cyclical mechanism wherein dynasties, governments, or civilizations rise and fall at repeated intervals: 2200 BC, 1750 BC, 1200 BC, 800 BC, 540 AD, 1250 AD, and 1645 AD – all of which makes for a repetitive narrative. In his words, ‘history is the same old same old’ (p. 560).</span></p><span data-dcnode-id="1316" instrument_node="">
</span><p data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">Perhaps the one atypical contribution Morris makes is his claim that the ‘original core’ of the West was in the Near East. He brushes aside all prior identifications of the West with the European continent, with Christianity, Greek democracy, Galilean science, or the Enlightenment. These are purely arbitrary designations which should be abandoned. He cites approvingly Norman Davies’s alleged argument that the term ‘Western civilization’ is a mere ideological construct which has been defined ‘by its advocates in almost any way that they think fit’ (p. 41). Morris reasons that all the societies which descended from the Fertile Crescent, including Rome, Byzantium, the Islamic world, and the Americas, should be deemed ‘Western’.</span></p><span data-dcnode-id="1313" instrument_node="">
</span><p data-dcnode-id="1300"><span data-dcnode-id="1312" instrument_node="">But this geographical definition is far more arbitrary than any prior definition, starting with the fact that Morris completely misconstrues Davies’s argument. Davies writes, in his massive </span><em data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">Europe, A History</span></em><span data-dcnode-id="1309" instrument_node="">, that ‘Western civilization is essentially an amalgam of intellectual constructs which were designed to further the interests of authors’ </span><a data-dcnode-id="1307" href="#f10" id="t10"><span data-dcnode-id="1308" instrument_node="">(10)</span></a><span data-dcnode-id="1306" instrument_node=""> (as Morris points out), but he does so only in reference to the divide between Western and Eastern Europe, not to the Near East or any other area of the world. Each of the 12 ways Davies lists (in which academics have defined the West) addresses some cultural aspect of the European and American continent (e.g. Christianity, the Roman Empire, Protestantism, the ‘WASP variant’, the ‘Cold War-variant’). What Davies faults is the exclusion of Eastern Europe by some authors, but in the end he concludes that ‘for purposes of comprehensive treatment, however, the important thing about all these definitions is that </span><em data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">each and everyone</span></em><span data-dcnode-id="1303" instrument_node=""> contains a variety of regional aspects ... Despite their differences, all the regions of Europe hold a very great deal in common. They are inhabited by peoples of predominantly Indo-European culture and related kin. They are co-heirs of Christendom...’.</span><a data-dcnode-id="1301" href="#f11" id="t11"><span data-dcnode-id="1302" instrument_node="">(11)</span></a></p><span data-dcnode-id="1299" instrument_node="">
</span><p data-dcnode-id="1291"><span data-dcnode-id="1298" instrument_node="">With his new definition of the West, Morris gladly limits the history of </span><em data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">Europe</span></em><span data-dcnode-id="1295" instrument_node=""> to a rather insignificant role until the 18th century. Meanwhile, ‘the birth of the West’&nbsp;in the Tigris, Euphrates and Jordan valleys, gets his loyal attention, in a long chapter which runs from page 81 to 134. From the beginnings of agriculture around 10,000 BC until 550 AD, this was the “most developed region” of the world. Afterwards, the Eastern world takes the lead. From about 550 through 1775 AD, the Eastern regions move ahead of ‘the West’. Europe proper thus becomes significant </span><em data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">only after 1775</span></em><span data-dcnode-id="1292" instrument_node="">. Ancient Greece, Rome, medieval Christendom, the Renaissance, Reformation, the Cartographic Revolution, the Scientific Era, the French Revolution are all summarily treated as local affairs, if not ignored completely. In fact, the ‘core’ within Western civilization barely shifts away from the Near East, Islamic Africa, and Ottoman Turkey before the 1770s. The Roman Empire is not even given the status of ‘core’ region.</span></p><span data-dcnode-id="1290" instrument_node="">
</span><p data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">Morris never uses the words ‘distinctive’ or ‘uniquely’ in reference to Europe except in a sardonic way (pp. 23, 261). Only in reference to Iraq and Syria does he write with conviction of ‘a distinctive Western world’, (p. 97) and ‘a distinctive Western way of living’ (p. 99).</span></p><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">Chapter six, which covers the period from 100 BC to 500 AD, and which, accordingly, covers an era before China takes the lead after 500 AD, is nevertheless about China rather than Rome. Once the ‘Eastern Age’ arrives, it is for the most part China which holds Morris’s obliging attention. History is so pleasant now; Tang China’s cultural ‘openness to foreign ideas and ability to blend them into something new’ (p. 342), ‘the rise of a kind of “protofeminism”’ (p. 339), the ‘extraordinary’ achievements of the Neo-Confucians (p. 376).</span></p><span data-dcnode-id="1284" instrument_node="">
</span><p data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">In all fairness, the early medieval ‘West’ does get an honourable mention: ‘by 700 the Islamic world more or less was the Western core, and Christendom was merely a periphery along its northern edge’ (p. 354). Islam is even portrayed as more significant to Europe’s history than Christianity; the Arabs ‘came not to bury the West but to perfect it’ (p. 353). He rebukes the ‘plenty of political pundits’ today who ‘find it convenient ... to imagine Islamic civilization as being outside of and opposed to Western’ civilization’ (p. 353). Saudi Arabia was a ‘core’ region of the West far longer than Europe. Now we see what a rather innocent call for unbiased ‘geographical labels, not value judgements’ (p. 41) essentially amount to: Welcome to Eurabia!</span></p><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1277"><span data-dcnode-id="1280" instrument_node="">Without the slightest equivocation, Morris writes that all monotheistic religions, including Buddhism, speak ‘the same truth’ (p. 325), though he enjoys attacking Christianity’s ‘extremist’ positions and atrocities while carefully managing with soft gloves the ‘pragmatic,’ ‘rational’, and ‘perfected’ beliefs of the Eastern and Islamic worlds (pp. 324, 362, 372–3, 472–3). The reader should have been made aware, at the least, of a growing scholarly literature pointing to some rather dramatic contrasts between Christianity and Islam. Christianity has exhibited a far richer intellectual tradition visible in the immediate fusion of Greek philosophy, Roman law, and the development of a Christian theology in the first centuries AD, not to mention the scholastic legacy of the Middle Ages.</span><a data-dcnode-id="1278" href="#f12" id="t12"><span data-dcnode-id="1279" instrument_node="">(12)</span></a></p><span data-dcnode-id="1276" instrument_node="">
</span><p data-dcnode-id="1271"><span data-dcnode-id="1275" instrument_node="">For Christianity the authority of the earthly rulers is limited by God's law, which both grants rights to every person and holds that God is conterminous with reason, whereas in Islam the idea that Allah has limits to his own powers, by making an everlasting covenant with human beings, is unthinkable, in that Allah is viewed as absolutely transcendent. There is no self-limitation to the sovereignty of Islamic rulers, and this is one reason Islamic cultures have faced great difficulties producing a secular political order subject to extra-religious checks and balances. As Robert Reilly argues in </span><em data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">The Closing of the Muslim Mind: How Intellectual Suicide Created the Modern Islamist Crisis </span></em><span data-dcnode-id="1272" instrument_node="">(2010), Islam was at first engaged with Aristotle but eventually rejected his reasoning when Abu Hamid al-Ghazali established a theology in which Allah came to be portrayed as the personal and immediate director of the movement of every molecule in the universe through his sheer incomprehensible wilfulness. In contrast, with St Anselm, Aquinas and others, Christianity went on to conceptualize the movement of material bodies in terms of natural laws.</span></p><span data-dcnode-id="1270" instrument_node="">
</span><p data-dcnode-id="1255"><span data-dcnode-id="1269" instrument_node="">Reilly cites Pope Benedict XVI's 2006 address at Regensburg, according to which the Muslim theologian Ahmad Ibn Hazm (11th century) asserted that Allah was not limited by any natural order, not even by his own word. The assertion that Christianity is just one more religion among many others may be comforting to Eurocrats wishing to bring Turkey into the European Union and achieve their goal of extirpating Christianity from Europe’s heritage, but it is clearly out of step with a fascinating literature on the comparative study of religions, which includes such recent work as James Gauss’s </span><em data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">Islam &amp; Christianity, A Revealing Contrast</span></em><span data-dcnode-id="1266" instrument_node=""> (2009), Christopher’s Catherwood’s </span><em data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">A God Divided: Understanding the Differences Between Islam, Christianity, and Judaism</span></em><span data-dcnode-id="1263" instrument_node=""> (2007), and </span><a data-dcnode-id="1261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/David-Goldmann/e/B001KHMC4E/ref%3Dsr_ntt_srch_lnk_4%3Fqid%3D1301582674%26sr%3D1-4"><span data-dcnode-id="1262" instrument_node="">David Goldmann</span></a><span data-dcnode-id="1260" instrument_node="">'s </span><em data-dcnode-id="1257"><a data-dcnode-id="1258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/s/ref%3Ddp_srsubj_allbutton%23/ref%3Dnb_sb_noss%3Furl%3Dsearch-alias%253Dstripbooks%26field-keywords%3DComparing%2BIslam%2Band%2BChristianity%26rh%3Dn%253A283155%252Ck%253AComparing%2BIslam%2Band%2BChristianity"><span data-dcnode-id="1259" instrument_node="">Islam and the Bible</span></a></em><span data-dcnode-id="1256" instrument_node=""> (2004).</span></p><span data-dcnode-id="1254" instrument_node="">
</span><p data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">The Cathedrals, Peter Abelard, and Aquinas are mentioned in the two pages Morris allocates to the High Middle Ages, along with the observation that this period saw ‘the formation of a persecution society’ which defined itself ‘against what they were not – pariahs such as Jews, homosexuals, lepers, and heretics, who, for the first time ... were terrorized’ (p. 370). Despite the Renaissance, and their voyages across the oceans of the world, Europeans ‘still counted for little,’ they ‘had destroyed the Aztecs and shot their way into the markets of the Indian Ocean, but it took more than that to impress the gatekeepers of All Under Heaven. Eastern social development remained far ahead of Western ... in 1521 there was little to suggest that the West would narrow the gap significantly’ (p. 433).</span></p><span data-dcnode-id="1251" instrument_node="">
</span><p data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">Europe does not look too impressive even ‘in 1773,’ when it finally catches up with China (and surpasses the ‘old Western core’ regions of Iraq, Iran, Saudi Arabia and Turkey). The rise of Newtonian science and the Enlightenment still count for little in Morris’s estimation. ‘Newton’s Principia came out just five years after England’s last witch-hanging and five years before the Salem witch trials in Massachusetts. Newton himself ... was as enthusiastic about alchemy as about gravity ...’ (p. 470). Locke may have proposed a new theory of government based on natural rights, but ‘Voltaire knew exactly where Europeans should be looking for more enlightened models: China’. Confucianism, ‘unlike Christianity, was a faith of reason, free from superstition and foolish legends.’ Indeed, ‘Chinese intellectuals had already been challenging absolutism for a century before he [Voltaire] was born’ (pp. 472–3).</span></p><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">As if this were not enough, Morris adds that an intellectual movement in 17th to 18th century China known as Kaozheng, ‘paralleled western Europe's scientific revolution in every way – except one: it did not develop a mechanical model of nature’ (p. 473). What evidence does Morris adduce for this claim? None – except one: a brief statement on the travels of a civil servant named Gu Yanwu, who filled some notebooks with detailed descriptions of farming, mining, and banking; and these writings, apparently, heralded a new empirically based vision of nature. Future Chinese scholars imitated Gu-Yanwu's call for concrete facts over speculation, and this produced a scientific method.</span></p><span data-dcnode-id="1245" instrument_node="">
</span><p data-dcnode-id="1240"><span data-dcnode-id="1244" instrument_node="">The Chinese could have even chosen to develop a mechanical vision of the universe but they were ‘still as excited about ancient inscriptions [the texts of the Han dynasty] as about mining or agriculture.’ They were not as mechanical as the Europeans who, by contrast, were not the wilful choosers of their Newtonian orientation, but were led to it as a result of their transoceanic explorations; ‘the new frontier across the oceans </span><em data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">needed</span></em><span data-dcnode-id="1241" instrument_node=""> precise measurements of standardized space, money, and time ... [It] would have been obtuse not to wonder whether nature itself was a mechanism’ (p. 476).</span></p><span data-dcnode-id="1239" instrument_node="">
</span><p data-dcnode-id="1231"><span data-dcnode-id="1238" instrument_node="">There is nothing else I can cite from Morris that would substantiate these claims. Searching for the sources he relied on, I was led to Benjamin Elman's </span><em data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">From Philosophy to Philology: Intellectual and Social Aspects of</span></em><span data-dcnode-id="1235" instrument_node=""> </span><em data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">Change in Late Imperial China</span></em><span data-dcnode-id="1232" instrument_node=""> (1984). For Elman the intellectual changes in 17th-18th century China constituted a veritable ‘epistemological revolution’. Chinese scholars began to speak and promote ‘evidential research’, as opposed to mere bookish speculations. But Elman never says there was a comparable scientific revolution in China. The conquest of the Manchus and the collapse of the Ming in 1644 led some Chinese scholars to find new ways to restore China's greatness by bringing attention to the ideas of the Warring States period and the Han dynasty. The comparison Elman makes is with the Italian Renaissance scholars who rediscovered the Greeks and Romans. Chinese scholars, in their search for ancient texts, cultivated a philological reading of texts to determine which of many editions of the classics were really original and which copied or forged additions of later centuries.</span></p><span data-dcnode-id="1230" instrument_node="">
</span><p data-dcnode-id="1225"><span data-dcnode-id="1229" instrument_node="">Elman, in a subsequent book</span><em data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">, In Their Own Terms</span></em><span data-dcnode-id="1226" instrument_node=""> (2005), went on to argue that the Chinese failed to adopt the basics of Western science, despite, I would add, a huge amount of tutoring of the Chinese by Jesuit scholars. He showed that, by 1600, Europe was ahead of Asia in producing basic machines, such as clocks, levers, and pulleys, which would constitute the basis for the mechanization of agriculture and industry. There were some consumer-related techniques that Europeans sought to learn from the Chinese, such as the secrets of producing silk, fine textiles, and porcelain, as well as tea cultivation. Elman does not argue that this philological movement contained the elements of modern Western science.</span></p><span data-dcnode-id="1224" instrument_node="">
</span><p data-dcnode-id="1216"><span data-dcnode-id="1223" instrument_node="">Wing-Tsit Chan says that Gu Yanwu (Ku Yen-wu, 1613–82) and the scholars associated with the kaozheng movement ‘refused to accept anything without evidence,’ which is why this movement was called “Investigations Based on Evidence”.’</span><a data-dcnode-id="1221" href="#f13" id="t13"><span data-dcnode-id="1222" instrument_node="">(13)</span></a><span data-dcnode-id="1220" instrument_node=""> But Chan does not read into these statements a Baconian program for the investigation of nature and the development of useful technologies for the improvement of the human condition. These scholars were tired of the bookish Sung and Ming Neo-Confucians, their endless ‘rationalistic’ commentaries on books, and thus they called for the study of "concrete subjects", philology, history, astronomy, geography, and the like. As is clear in the writings of Yen Yuan (1635–1704), who also criticized the purely pedantic approach of the Neo-Confucians, the call was for a practical attitude to life, knowledge connected to action.</span><a data-dcnode-id="1218" href="#f14" id="t14"><span data-dcnode-id="1219" instrument_node="">(14)</span></a><span data-dcnode-id="1217" instrument_node=""> The Han ancients were practical men engaged in archery, chariot-driving; and it was from this perspective (not any parallel Western-like perspective) that Yuan advocated manual work and contact with concrete realities, against an effeminate bookish education.</span></p><span data-dcnode-id="1215" instrument_node="">
</span><p data-dcnode-id="1208"><span data-dcnode-id="1214" instrument_node="">Beyond Elman, and in direct contradistinction to Morris, Kai-wing Chow (1994) argues that Late Imperial China witnessed not a philological revolution but the ‘rise of Classicism, ritualism, and purism’.</span><a data-dcnode-id="1212" href="#f15" id="t15"><span data-dcnode-id="1213" instrument_node="">(15)</span></a><span data-dcnode-id="1211" instrument_node=""> The so-called ‘evidential’ (k'ao-cheng) movement was a response to the threatened position of the Chinese gentry, an effort to restore an elite culture which had been considerably weakened by Ming commercialization. The philological scholarship was a subsidiary component of a broader socio-cultural movement by a class seeking to preserve its status. The vision of this movement was conservative, recovery of the ‘original’ or ‘pure’ Confucian norms and language. They were dedicated to philological precision in their efforts to achieve or recover the pure classical traditions. They rejected the Ming Neo-Confucian appeal to the innate capacities of the common people, and instead stressed the distinction between the elite gentry and the commoners. ‘Filial devotion, loyalty to the monarch, and wifely fidelity’ – these were their mottoes combined with ‘punctilious observance of hierarchical relationship, and the exaltation of the ritual authority of the Classics.’</span><a data-dcnode-id="1209" href="#f16" id="t16"><span data-dcnode-id="1210" instrument_node="">(16)</span></a></p><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1196"><span data-dcnode-id="1206" instrument_node="">Chow even challenges Elman's comparison of this movement with the Renaissance, emphasizing that ‘the Ch'ing scholar's abhorrence of personal opinions and divergent patterns of behaviour contrasts markedly with the attitudes of Renaissance humanists’.</span><a data-dcnode-id="1204" href="#f17" id="t17"><span data-dcnode-id="1205" instrument_node="">(17)</span></a><span data-dcnode-id="1203" instrument_node=""> Let me add, in fact, that the ‘philological revolution’ Elman saw in 17th–18th-century China had already been pioneered by 14th–century Italian humanists in their ‘rediscovery’ of lost ancient Roman classics, which was more important to the humanists than recovering the classical Greek past. Starting with Petrarch (1304–74), who discovered several texts of Cicero, including letters, and verified that these were actually written by him, Lorenzo Valla (1407–54) carried to maturity this philological program by developing sophisticated methods of linguistic analysis to determine age and authenticity. The best known example of this textual analysis was his determination that the Donation of Constantine, a testament in which Constantine bequeathed his power and wealth to the Church, was actually a forgery. The humanistic education program of the </span><em data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">artes liberales </span></em><span data-dcnode-id="1200" instrument_node="">emphasized as well the importance of a practical education that would prepare young men for a civic life. The ideal gentleman epitomized in Baldassare Castiglione’s, </span><em data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">The Book of the Courtier</span></em><span data-dcnode-id="1197" instrument_node=""> (composed between 1508 and 1528) was that of a citizen who performed all kinds of services, such as taking care of the prince’s household, managing servants, educating children, providing entertainment, keeping accounts, administering estates, going on diplomatic missions, training in horsemanship, swordplay, and fighting battles.</span></p><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1188"><span data-dcnode-id="1194" instrument_node="">By the 18th century, Europe had moved well beyond the study of ancient texts, examining the origins of language itself (Dugald Steward wrote in 1761 his </span><em data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">Dissertation on the Origin of Language</span></em><span data-dcnode-id="1191" instrument_node="">), the etymology of the Bible from a ’naturalistic‘ standpoint, the bio-social evolution of the human species, and the ethnographic study of language groups. Besides, while Morris writes of Chinese ‘renaissances’, it has long been well established that the Renaissance spearheaded by Italy was preceded by what Charles Homer Haskins called ‘the Renaissance of the 12th Century’, which saw the culmination of Romanesque art and the beginnings of the Gothic, the emergence of vernacular languages, the revival of Latin classics, poetry, and Roman law, as well as the recovery of Greek science and philosophy, the origins of universities, towns and the sovereign state.</span><a data-dcnode-id="1189" href="#f18" id="t18"><span data-dcnode-id="1190" instrument_node="">(18)</span></a></p><span data-dcnode-id="1187" instrument_node="">
</span><p data-dcnode-id="1174"><span data-dcnode-id="1186" instrument_node="">Every epoch in European history has seen major innovations and original giants. The medieval invention of eye glasses and mechanical clocks were part and parcel of what Norman Cantor has called ‘a starting point for new directions and dimensions in all facets of civilized life’.</span><a data-dcnode-id="1184" href="#f19" id="t19"><span data-dcnode-id="1185" instrument_node="">(19)</span></a><span data-dcnode-id="1183" instrument_node=""> May I offer a rough, and rather incomplete, catalogue of these immense achievements: i) the investiture controversy and the emergence of a distinctive legal system of canon law which led to the rise of whole new systems of law – urban law, merchant law, royal law, natural law, divine law – that served to create a civil society composed of kingdoms, baronies, bishoprics, urban communes, guilds, and universities, each empowered to enact its own ordinances as well as to adjudicate internal disputes </span><a data-dcnode-id="1181" href="#f20" id="t20"><span data-dcnode-id="1182" instrument_node="">(20)</span></a><span data-dcnode-id="1180" instrument_node="">; ii) the institutionalization of a university curriculum ‘overwhelmingly oriented toward analytical subjects: logic, science, mathematics, and natural philosophy,’ which gave birth to a unique synthesis of reason and revelation, and made Catholicism the most scholarly religion of the world </span><a data-dcnode-id="1178" href="#f21" id="t21"><span data-dcnode-id="1179" instrument_node="">(21)</span></a><span data-dcnode-id="1177" instrument_node="">; iii) an ‘epochal shift from qualitative to quantitative perception’ which led to a new conception of time as a succession of quanta, and a new polyphonic music where sounds could be seen as a phenomena moving through time, written on a paper using a codified and standardized system of notation for all sounds and rests.</span><a data-dcnode-id="1175" href="#f22" id="t22"><span data-dcnode-id="1176" instrument_node="">(22)</span></a></p><span data-dcnode-id="1173" instrument_node="">
</span><p data-dcnode-id="1169"><span data-dcnode-id="1172" instrument_node="">Morris cavalierly remarks that ‘printing [in late Imperial China] had created an even broader readership for new ideas than in western Europe’ in the 1700s (p. 473). Morris seems to be claiming that black is white in denial of the plain facts. The investigations of one of the foremost experts in this area, Cynthia Brokaw, point to a book publishing and reading culture spreading throughout south China from the late 17th century through the early 20th century. But nowhere does Brokaw claim that China witnessed a proliferation of new ideas. Her research simply traces the networks of itinerant book-selling and bookstores through south-Western China; the spread of primers and textbooks, ritual handbooks, medical manuals, fortune-telling guides, poetry collections, and novels from the past. Through the dissemination of these books, publisher-booksellers were acting as agents of cultural integration, disseminating the core ancient texts of Chinese culture to poor county seats, interior market towns, and isolated peasant villages.</span><a data-dcnode-id="1170" href="#f23" id="t23"><span data-dcnode-id="1171" instrument_node="">(23)</span></a></p><span data-dcnode-id="1168" instrument_node="">
</span><p data-dcnode-id="1161"><span data-dcnode-id="1167" instrument_node="">Manchu emperors, it is true, became great patrons of literature and sponsored enormous projects of compilation and publications, including a vast encyclopedia in 5,020 chapters, and a project which resulted in the collection and reproduction of 3,697 classic works under the title </span><em data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Complete Library of the Four Treasuries</span></em><span data-dcnode-id="1164" instrument_node="">. But the same Manchu (or Qing) advocates of these projects conducted the well-known ‘literary inquisitions’ of 1774-89, against books which reflected badly on the alien Manchu rule. Over 10,000 works were placed on the index of prohibited works, and some 2,320 works were completely destroyed. The Manchu rulers also imposed strict controls over teaching and the academies, and carried out punishments against thousands of authors and their families, executions, enslavements, exiles, and tortures.</span><a data-dcnode-id="1162" href="#f24" id="t24"><span data-dcnode-id="1163" instrument_node="">(24)</span></a></p><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1144"><span data-dcnode-id="1159" instrument_node="">In the meantime, a rather small region of Europe, England, was being flooded with print materials: </span><em data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">belles letters</span></em><span data-dcnode-id="1156" instrument_node="">, novels, magazines, newspapers, philosophical treatises, scientific manuals, pulp fiction, periodicals, and the like – as we learn from Roy Porter’s learned and vivacious book, </span><em data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">Enlightenment, Britain and the Creation of the Modern World</span></em><span data-dcnode-id="1153" instrument_node=""> (2001). During the 1620s about 6,000 printed titles had appeared in England, increasing to almost 21,000 during the 1710s, and to about 56,000 by the 1790s. The total in separate book and pamphlet titles published between 1660 and 1800 was over 300,000, with an estimated 200 million copies sold. These numbers are all the more exceptional when we consider that the population in Britain in 1750 was only about 6.5 million, whereas in China it was around 210 million in 1700. By the 1770s, the total annual sale of newspapers </span><a data-dcnode-id="1151" href="#f25" id="t25"><span data-dcnode-id="1152" instrument_node="">(25)</span></a><span data-dcnode-id="1150" instrument_node="">, when there were nine dailies in London and 50 provincial weeklies, was over 12 million. ‘By 1800, a staggering 250 periodicals had been launched in England’, including magazines written by and for women, dealing with love, marriage and the family, education, etiquette and health. Ten thousand copies were printed of the third edition (1787-97) of the </span><em data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">Encyclopaedia Britannica</span></em><span data-dcnode-id="1147" instrument_node="">.</span><a data-dcnode-id="1145" href="#f26" id="t26"><span data-dcnode-id="1146" instrument_node="">(26)</span></a></p><span data-dcnode-id="1143" instrument_node="">
</span><p data-dcnode-id="1061"><span data-dcnode-id="1142" instrument_node="">Morris is not thinking of economic indices merely when he writes that ‘as late as 1750, the similarities between the Eastern and Western cores were still striking’ (p. 503). ‘It is hard not to see’, he reflects a few sentences down, ‘a certain kinship between sprawling eighteenth-century novels of manners such as Samuel Richardson’s </span><em data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Clarissa</span></em><span data-dcnode-id="1139" instrument_node=""> and Cao Xueqin’s </span><em data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">Dream of the Red Chamber</span></em><span data-dcnode-id="1136" instrument_node="">’ (p. 503). I cannot see a single similarity.</span><em data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node=""> </span></em><em data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">Dream of the Red Chamber</span></em><span data-dcnode-id="1131" instrument_node="">, first printed in the late 1700s, is known as one of ‘The Four Great Classical Novels’ of Chinese literature. Many other tales were written, satirical, edifying, criminal, and sentimental stories, but today they are generally not seen as having the status of great books of the world. Strictly speaking, none of the Great Classical Novels were novels. The word ‘novel’ came into use only at the end of the 18th century in England as a transliteration of the Italian word ‘novella. The roots of the novel can be traced back to i) Spanish picaresque tales (1500s) with their strings of episodic adventures held together by the personality of the central figure; ii) Elizabethan prose fiction and the translation of ancient Greek romances into the vernacular, iii) French heroic romance with its huge baroque narratives about thinly veiled contemporaries (mid-17th century) who always acted nobly and spoke high-flown sentiments. What British novelists added in the 1700s was a more unified and plausible (down-to-earth) plot structure, with sharply individualized and believable characters, and a less aristocratic (or more ‘middle class’) style of writing. The novel, in these respects, was invented in Europe, particularly after 1750.</span><a data-dcnode-id="1129" href="#f27" id="t27"><span data-dcnode-id="1130" instrument_node="">(27)</span></a><span data-dcnode-id="1128" instrument_node=""> It was ‘associated from its inception,’ in the words of Porter, ‘with individualism and a certain political liberalism’.</span><a data-dcnode-id="1126" href="#f28" id="t28"><span data-dcnode-id="1127" instrument_node="">(28)</span></a><span data-dcnode-id="1125" instrument_node=""> England played the leading role in this genre, cultivating a new sensibility for authenticity, personal experience and feeling, a spirit of non-conformity towards rigid and ‘insincere’ conventions, a fascination with the inner depths of the affective self. </span><em data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Clarissa</span></em><span data-dcnode-id="1122" instrument_node=""> was just one of such novels; consider </span><em data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">Pamela</span></em><span data-dcnode-id="1119" instrument_node=""> and </span><em data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">Sir Charles Grandison</span></em><span data-dcnode-id="1116" instrument_node=""> by the same author; Sarah Fielding’s </span><em data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">The Adventures of</span></em><span data-dcnode-id="1113" instrument_node=""> </span><em data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">David Simple</span></em><span data-dcnode-id="1110" instrument_node=""> (1744), Henry Brooke’s </span><em data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">The Fool of Quality</span></em><span data-dcnode-id="1107" instrument_node=""> (1765), Daniel Defoe’s </span><em data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Robinson Crusoe </span></em><span data-dcnode-id="1104" instrument_node="">(1719), and </span><em data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">Moll Flanders</span></em><span data-dcnode-id="1101" instrument_node=""> (1722), Oliver Goldsmith’s </span><em data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">The Vicar of Wakefield</span></em><span data-dcnode-id="1098" instrument_node=""> (1764), Lawrence Sterne’s </span><em data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Tristram Shandy</span></em><span data-dcnode-id="1095" instrument_node=""> (1759-67) and </span><em data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">A Sentimental Journey</span></em><span data-dcnode-id="1092" instrument_node=""> (1767), and more popularly Charlotte Smith’s </span><em data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Emmeline</span></em><span data-dcnode-id="1089" instrument_node=""> (1788), </span><em data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">Ethelinde</span></em><span data-dcnode-id="1086" instrument_node=""> (1789),</span><em data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node=""> Celestina</span></em><span data-dcnode-id="1083" instrument_node=""> (1791), </span><em data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Desmond</span></em><span data-dcnode-id="1080" instrument_node=""> (1792), </span><em data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">The Old Manor House </span></em><span data-dcnode-id="1077" instrument_node="">(1793), </span><em data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">The Wandering of Warwick</span></em><span data-dcnode-id="1074" instrument_node=""> (1794), </span><em data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">The Banished Man</span></em><span data-dcnode-id="1071" instrument_node=""> (1794),</span><em data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node=""> Montalbert</span></em><span data-dcnode-id="1068" instrument_node=""> (1795), </span><em data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Marchmont</span></em><span data-dcnode-id="1065" instrument_node=""> (1796), </span><em data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">The Young Philosopher</span></em><span data-dcnode-id="1062" instrument_node=""> (1798).</span></p><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1050"><span data-dcnode-id="1059" instrument_node="">There were numerous heterodox publications associated with the British Enlightenment. How can Morris state in all seriousness that there was a ‘broader readership for </span><em data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">new ideas</span></em><span data-dcnode-id="1056" instrument_node="">’ in China? The point is not that China was lacking in eminent thinkers such as Ku Yen-wu, Tai Chen (1723–77), and Chang Hsueh-ch’eng (1736–96) – all three viewed by Gernet as the ‘most profound and original thinkers’ of their time.</span><a data-dcnode-id="1054" href="#f29" id="t29"><span data-dcnode-id="1055" instrument_node="">(29)</span></a><span data-dcnode-id="1053" instrument_node=""> It is that these scholars were always preoccupied with the Classics, commenting on them, debating, challenging, or re-evaluating past interpretations. Looking at England alone, during the same period, we find a fundamentally different list: Edmund Burke, Adam Smith, David Hume, John Locke, Bernard Mandeville, Adam Ferguson, Isaac Newton, Jeremy Bentham, Thomas Reid, Samuel Clarke, Erasmus Darwin, Edward Gibbon, William Godwin, Francis Hutcheson, Samuel Johnson, Alexander Pope, Jonathan Swift and, if we need to add a woman, Mary Wollstonecraft.</span><a data-dcnode-id="1051" href="#f30" id="t30"><span data-dcnode-id="1052" instrument_node="">(30)</span></a></p><span data-dcnode-id="1049" instrument_node="">
</span><p data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">Morris, called a ‘polymath’ by at least two reviewers, must surely know that he is playing tricks with historical facts, but somehow as a Party intellectual who knows in which direction the evidence must be altered to fit with the multicultural line, he has satisfied himself, through the exercise of Orwellian doublethink, that the actual historical evidence was not violated.</span></p><span data-dcnode-id="1046" instrument_node="">
</span><p data-dcnode-id="1039"><span data-dcnode-id="1045" instrument_node="">He follows closely Kenneth Pomeranz’s claim that the industrial revolution was initiated in England ‘more by accident than design’. He emphasizes colonial resources, easy access to coal mines, and especially England’s proximity to the Atlantic and the opportune emergence of ocean-crossing navigational technologies.</span><a data-dcnode-id="1043" href="#f31" id="t31"><span data-dcnode-id="1044" instrument_node="">(31)</span></a><span data-dcnode-id="1042" instrument_node=""> By combining Diamond’s long term argument on the domestication of plants and animals and Pomeranz’s short term emphasis on England’s geographical good luck, Morris believes he has solved the enigma of human history. It never occurs to him to pay some attention to the devastating criticisms mounted against every major empirical claim made by Pomeranz.</span><a data-dcnode-id="1040" href="#f32" id="t32"><span data-dcnode-id="1041" instrument_node="">(32)</span></a></p><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">The actual history of Europe’s industrialization hardly gets more attention than ‘what-ifs’ questions about China’s non-industrialization. In a chapter entitled ‘The Western age,’ which starts on page 503, Morris finally focuses on Europe – mind you, through the prism of Marx’s condemnation of England’s capitalism, and only until page 515, as he returns to the East, the ‘defeat, humiliation, and exploitation’ it suffered ‘at Western hands’ (p. 520). From here on, the rest of the book is almost entirely about the ‘astonishing’ speed with which Easterners assimilated Western modernization, and the faster rate of development exhibited by China after the 1990s, until we are led to a conclusion in which he explores the future.</span></p><span data-dcnode-id="1035" instrument_node="">
</span><p data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Morris’s consideration of the future seems to be purely technological and unconcerned with cultural matters. This is how reviewers have invariably read his concluding chapter. Influenced by the New Age futurist Ray Kurzweil’s idea of ‘singularity’, Morris proposes that human life will be transformed by technology at an expanding speed. The human species is approaching ‘a massive discontinuity’ via the fusion of humans with computers and robots and the emergence of genetically engineered life forms.</span></p><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1027"><span data-dcnode-id="1031" instrument_node="">But this ostensibly scientifically neutral vision is essentially a continuation of Morris’s disparaging attitude towards everything Western and European. These new technologies, in the long run, will ‘obliterate the old geography’, including any distinction between east and west; we will come together ‘in a global village’. But before that happens, China will ‘rule and the world will be Easternized’ (pp. 589–90). What I find arresting, or perhaps not, since this is a view commonly endorsed in academia and supported by the progressive globalist billionaire George Soros, is the defeatist way Morris welcomes the decline of the West. ‘The patterns established in the past suggest that the shift of wealth and power from West to East is inexorable’ (p. 614). He finds it a bit alarming that Americans speak of decline as if it were a terrible thing; after all, ‘if you just substitute America and China, you get really remarkably similar kinds of things’. Perhaps this is better than what Soros said not long ago: ‘I have to say that today China has a more, not only a more vigorous economy, but actually a better functioning government than the United States’.</span><a data-dcnode-id="1029" href="#f33" id="t33"><span data-dcnode-id="1030" instrument_node="">(33)</span></a><span data-dcnode-id="1028" instrument_node=""> There are many who believe this and look at the rise of China and the decline of the West with great enthusiasm. This way of thinking, including talk of a global village, is conterminous with Morris's geographical determinism and his claim that humans are all the same regardless of cultural background, religious beliefs and intellectual life.</span></p><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1019"><span data-dcnode-id="1025" instrument_node="">Morris writes: ‘If we think about culture in a broader, more anthropological sense, the West's history again seems to be one example of a larger pattern rather than a unique story.’ The key word here is ‘anthropological’. Anthropology studies the repeatable behaviours of large numbers of faceless people, and, as such, it is a discipline which has been effectively set against the elite culture of the West. From the perspective of what thousands and millions of humans do routinely to survive – the energy they consume, the tools they have, the fertility of the land – the achievements of singular individuals seem trivial. ‘Humans are all much the same wherever we find them; and, because of this, human societies have all followed much the </span><em data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">same sequence</span></em><span data-dcnode-id="1022" instrument_node=""> of cultural development. There is nothing special about the West’.</span><a data-dcnode-id="1020" href="#f34" id="t34"><span data-dcnode-id="1021" instrument_node="">(34)</span></a></p><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1013"><span data-dcnode-id="1017" instrument_node="">This emphasis on a common cultural humanity is consistent with the officially established academic ideology of ‘diversity’ </span><a data-dcnode-id="1015" href="#f35" id="t35"><span data-dcnode-id="1016" instrument_node="">(35)</span></a><span data-dcnode-id="1014" instrument_node=""> which is intended precisely to do away with the notion that Western nations have a distinctive, particular identity. Not only is there no such thing as a pan-European identity but such things as Britishness or Germanness are dismissed as ethnocentric and even dangerous. &nbsp;The humans who inhabited the British Isles for millennia developed a culture no different from the ones who inhabited Tasmania; humans are all the same, interchangeable and malleable. The British national culture does not really exist (by which multiculturalists mean that it should not exist). Americans and the Chinese are practically (in terms of economic growth and biological longevity) the same, or at least similarly enough that their differences don't really make much of a difference. The American Declaration of Rights with its peculiar imposition of strict limits on the ends of the federal government, and its protection of individual liberty, is akin to the ideals of the Communist Party in China.</span></p><span data-dcnode-id="1012" instrument_node="">
</span><p data-dcnode-id="1005"><span data-dcnode-id="1011" instrument_node="">If only one could find in Morris a common human nature with some redeeming qualities; but that is not the case. The ‘bottom line’, he writes, is that all humans are equally ‘lazy, greedy, and fearful’ (p. 194). These dispositions are the driving forces of social development, and since they are the same everywhere, it is ‘the maps rather than the chaps’ that account for the differences in the rates of innovation. He repeats this phrase – ‘history is made by lazy, greedy, and fearful’ people – throughout the book (pp. 99, 112, 26, 359, 467, 557, 559, 571,618). Towards the end, at the same time as he is hyping up fears about the ‘shocking scale of environmental degradation’, Morris becomes more dismissive, even contemptuous, of ordinary people, regularly calling them ‘bungling idiots’ (pp. 565, 568, two times in 578, 616). Absent here is the social ethic that was distinctive of the British Enlightenment, according to which humans generally were endowed with a ‘moral sense,’ a ‘fellow-feeling’ that inspired in them sympathy, benevolence and compassion for others. Morris is far closer to the French Enlightenment’s mistrust of the common people, the ‘imbecility’, the ‘idiocy’ of the ‘multitude’, of the ‘rabble’, as Voltaire, Diderot, Holbach, Helvetius, Lamettrie, and Rousseau were wont to write.</span><a data-dcnode-id="1009" href="#f36" id="t36"><span data-dcnode-id="1010" instrument_node="">(36)</span></a><span data-dcnode-id="1008" instrument_node=""> The difference is that Morris is contemptuous of great men as well: ‘I have argued throughout this book that great men/women and bungling idiots have never played as big a part in shaping history as they have believed they did’ (p. 616).</span><a data-dcnode-id="1006" href="#f37" id="t37"><span data-dcnode-id="1007" instrument_node="">(37)</span></a></p><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">By the same token, Morris credits himself with proposing a ‘Morris Theorem’: ‘to explain the entire course of history ... I hope that the evidence presented in Chapters 2–10 has borne this out’ (p. 559). Then he warns us that the ‘next forty years will be the most important in history’ &nbsp;– that is, the remaining years of his life. Disrespectful of the Western past, mistrustful of the democratic will of the unlettered masses, but looking forward to a more enlightened future, Morris closes with these final words: ‘only historians can draw together the grand narrative of social development , only historians can explain the differences that divide humanity and how we can prevent them from destroying us’ (p. 622). He claims in the introduction to be the only historian to have put together a grand narrative of history unifying long-term and short term theories of development. In other words, only Morris can prevent humanity from destroying itself. Astonishing indeed!</span></p><span data-dcnode-id="1001" instrument_node="">
</span><h2 class="footn" data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">Notes</span></h2><span data-dcnode-id="998" instrument_node="">

</span><li data-dcnode-id="967" id="f4"><span data-dcnode-id="976" instrument_node="">These words are taken from Morris’s article, ‘Latitudes, not attitudes: how geography explains history’, </span><em data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">History Today</span></em><span data-dcnode-id="973" instrument_node="">, 60, 11 (2010). Similar expressions can be found in </span><em data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Why the West Rules</span></em><span data-dcnode-id="970" instrument_node="">, pp. 60–1.</span><a data-dcnode-id="968" href="#t4"><span data-dcnode-id="969" instrument_node="">Back to (4)</span></a></li><span data-dcnode-id="966" instrument_node="">

</span><li data-dcnode-id="954" id="f6"><span data-dcnode-id="957" instrument_node="">Ian Morris, ‘Latitudes, not attitudes: how geography explains history.’</span><a data-dcnode-id="955" href="#t6"><span data-dcnode-id="956" instrument_node="">Back to (6)</span></a></li><span data-dcnode-id="953" instrument_node="">
</span><li data-dcnode-id="946" id="f7"><span data-dcnode-id="952" instrument_node="">G. E. R&nbsp; Lloyd makes this observation as well in </span><em data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">The Way and the Word.&nbsp; Science and Medicine in Early China and Greece</span></em><span data-dcnode-id="949" instrument_node=""> (New Haven, CT, 2002), co-authored with Nathan Sivin, who writes chapter on ancient Chinese science. Lloyd does not connect this competitive spirit to the aristocratic character of ancient Greece, arguing instead that it was somehow generated out of the argumentative atmosphere of the democratic assemblies.</span><a data-dcnode-id="947" href="#t7"><span data-dcnode-id="948" instrument_node="">Back to (7)</span></a></li><span data-dcnode-id="945" instrument_node="">
</span><li data-dcnode-id="935" id="f8"><span data-dcnode-id="944" instrument_node="">Werner Jaeger, </span><em data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Paideia. The Ideals of Greek Culture</span></em><span data-dcnode-id="941" instrument_node="">. Vol. I: </span><em data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Archaic Greece: The Mind of Athens</span></em><span data-dcnode-id="938" instrument_node=""> (Oxford, 1986 [1939]), pp. 114–35.</span><a data-dcnode-id="936" href="#t8"><span data-dcnode-id="937" instrument_node="">Back to (8)</span></a></li><span data-dcnode-id="934" instrument_node="">
</span><li data-dcnode-id="922" id="f9"><span data-dcnode-id="933" instrument_node="">G. E. R Lloyd describes this agonistic atmosphere well:</span><br data-dcnode-id="932"><span data-dcnode-id="931" instrument_node=""> ‘Far more than their counterparts in most other ancient civilizations, Greek doctors, philosophers, sophists, even mathematicians, were alike faced with an openly competitive situation of great intensity. While the modalities of their rivalries varied, in each the premium, to a greater or less degree, was on skills of self-justification and self-advertisement, and this had far-reaching consequences for the way they practiced their investigations as well as on how they presented their results’.

</span><li data-dcnode-id="824" id="f22"><span data-dcnode-id="830" instrument_node="">Alfred Crosby, </span><em data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Measure of Reality: Quantification and Western Society, 1250–1600</span></em><span data-dcnode-id="827" instrument_node=""> (Cambridge, 1997). We could go on writing about medieval creativity in literature, for example: Capellanus and a vernacular literature dealing with love, romance, seduction, and adulterous affairs; El Cid and a vernacular poetry dealing with the epic; Dante and the placement of vernacular literature on a par with biblical and classical literature; Chaucer and the freeing of poetic diction and the use of participial constructions and a wider vocabulary that includes more polysyllabic words; Guibert de Nogent, Pierre Abelard and the discovery of the human persona, of privacy and the need to be ‘on one’s own’, not to mention the proliferation of heterodox religious movements, Cistercians, Victorines, Franciscans, Dominicans,&nbsp; and the ‘democratization’ and ‘laicization’ of mystical experience – all symbolized in a Gothic architecture with a new dynamic spirit of movement upward, soaring spires and extended vaulted arches.</span><a data-dcnode-id="825" href="#t22"><span data-dcnode-id="826" instrument_node="">Back to (22)</span></a></li><span data-dcnode-id="823" instrument_node="">

</span><li data-dcnode-id="789" id="f25"><span data-dcnode-id="798" instrument_node="">Newspapers, a major medium in the creation of a mass readership, were invented in Europe in the seventeenth century. It has been said that the regular Chinese </span><em data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">pao</span></em><span data-dcnode-id="795" instrument_node=""> (or reports of court affairs) circulated among the educated civil servants for more than a thousand years (AD 618-1911) was the forerunner of the modern newspaper. But if we define the term ‘newspaper’as denoting, in the words of Johannes Weber, ‘printed medium appearing at regular short intervals of at least once a week, produced in relatively large print runs, sold to the public at a moderate price and providing information to a sizable number of readers about important current events and developments around the world’, the first newspaper sheet appeared in Strassburg in 1605. By the 1620s a variety of newspapers were circulating in central Europe. Speaking of a broad readership for new ideas, let it be said that by the mid-seventeeth to eighteenth century, newspapers ‘were the most widely read secular material’ in Europe. ‘They provided a seedbed for the broadening political education which fostered the development of the Enlightenment’. See Johannes Weber, ‘Strassburg, 1605&nbsp;: The origins of the newspaper in Europe’, </span><em data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">German History</span></em><span data-dcnode-id="792" instrument_node="">, 24, 3 (2006).</span><a data-dcnode-id="790" href="#t25"><span data-dcnode-id="791" instrument_node="">Back to (25)</span></a></li><span data-dcnode-id="788" instrument_node="">
