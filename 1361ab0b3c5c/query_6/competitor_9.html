dley North’s </span><em data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Discourses Upon Trade</span></em><span data-dcnode-id="728" instrument_node=""> (1691), Francis Hutcheson’s </span><em data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Inquiry concerning Beauty, Order, Harmony, Design</span></em><span data-dcnode-id="725" instrument_node=""> (1725), David Hartley’s </span><em data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Observations On Man, His Frame, His Duty, and His Expectations</span></em><span data-dcnode-id="722" instrument_node=""> (1749), William Bollan’s </span><em data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">The Freedom of Speech and Writing upon Public Affairs Considered</span></em><span data-dcnode-id="719" instrument_node=""> (1766), William Buchan’s </span><em data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Domestic Medicine</span></em><span data-dcnode-id="716" instrument_node=""> (1769), Edmund Hoyle’s </span><em data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">The Polite Gamester, Containing Short Treatises on the Games of Whist, Quadrille, Backgammon and Chess</span></em><span data-dcnode-id="713" instrument_node=""> (1744), James Usher’s </span><em data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Clio or, Discourse on Taste</span></em><span data-dcnode-id="710" instrument_node=""> (1769), William Howell’s </span><em data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">History of the World</span></em><span data-dcnode-id="707" instrument_node=""> (1680-85), Gilbert Burnet’s </span><em data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">History of the Reformation</span></em><span data-dcnode-id="704" instrument_node=""> (1679-1715), John Toland’s </span><em data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Christianity Not Mysterious</span></em><span data-dcnode-id="701" instrument_node=""> (1696), John Wilke’s </span><em data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Essay on Woman</span></em><span data-dcnode-id="698" instrument_node=""> (1763), John Wilmot’s </span><em data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">A Modest Defence of the Public Stews; or An Essay Upon Whoring </span></em><span data-dcnode-id="695" instrument_node="">(1724), Henry Kames’s </span><em data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">The Gentleman Farmer; Being an Attempt to Improve Agriculture by Subjecting it to the Test of Rational Principles</span></em><span data-dcnode-id="692" instrument_node=""> (1776), William Alexander’s </span><em data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">History of Women</span></em><span data-dcnode-id="689" instrument_node=""> (1779), Hannah More’s </span><em data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Strictures on the Modern System of Female Education</span></em><span data-dcnode-id="686" instrument_node=""> (1779), Judith Drake’s </span><em data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Essay in Defence of the Female Sex</span></em><span data-dcnode-id="683" instrument_node=""> (1696), Richard Steele’s </span><em data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">The Tender Husband</span></em><span data-dcnode-id="680" instrument_node=""> (1705), Mary Astell, </span><em data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Some Reflections upon Marriage</span></em><span data-dcnode-id="677" instrument_node=""> (1700), John Clarke’s </span><em data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Essay upon the Education of Youth in Grammar-schools</span></em><span data-dcnode-id="674" instrument_node=""> (1720), Sarah Trimmer’s </span><em data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Fabulous Histories Designed for the Amusemen </span><li data-dcnode-id="639" id="f31"><span data-dcnode-id="654" instrument_node="">In a lecture he gave at the Carnegie Council, October 28, 2010, Morris said the following regarding the arrival of Europeans in the Americas: ‘There are other factors as well involved of course, but the Europeans are the ones who settle in the Americas, take it over, and kill the enormous majority of the native population with their </span><em data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">disgusting European germs</span></em><span data-dcnode-id="651" instrument_node="">’ &lt;</span><a data-dcnode-id="649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.carnegiecouncil.org/resources/transcripts/0331.html%231"><span data-dcnode-id="650" instrument_node="">http://www.carnegiecouncil.org/resources/transcripts/0331.html#1</span></a><span data-dcnode-id="648" instrument_node="">&gt; [accessed 18 April 2011].
</span><p data-dcnode-id="641"><span data-dcnode-id="647" instrument_node="">Not long ago, </span><em data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">The New York Times</span></em><span data-dcnode-id="644" instrument_node=""> (October 31 2010) reported some new findings indicating ‘that all three of the great waves of plague originated from China’, including the so-called ‘Black Death’ which killed about 30 per cent of the European population. I wonder what the reaction of an audience would be if someone had stated that there is now confirmation that the Black Death was brought on by ‘disgusting Chinese germs’.Westerners are so used to this ethno-masochistic way of speaking (Morris was born in England), that the audience let it passed with a compliant, if unsatisfied, laughter.</span><a data-dcnode-id="642" href="#t31"><span data-dcnode-id="643" instrument_node="">Back to (31)</span></a></p><span data-dcnode-id="640" instrument_node="">

</span><div class="field field-name-field-review-publication-date field-type-date field-label-hidden" data-dcnode-id="578"><div class="field-items" data-dcnode-id="579"><div class="field-item even" data-dcnode-id="580"><span class="date-display-single" data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">June 2011</span></span></div></div></div><div class="view view-book-summary view-id-book_summary view-display-id-block_5 view-dom-id-27d6735c0f5f2e39b2e9996648a0f577" data-dcnode-id="327"><span data-dcnode-id="577" instrument_node="">
</span><div class="view-content" data-dcnode-id="329"><span data-dcnode-id="576" instrument_node="">
</span><div class="views-row views-row-1 views-row-odd views-row-first views-row-last" data-dcnode-id="331"><span data-dcnode-id="575" instrument_node="">
</span><section class="block collapsible collapsed" data-dcnode-id="333" id="author-response"><span data-dcnode-id="574" instrument_node="">
</span><h2 class="block-title clickable" data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">Author's Response</span></h2><span data-dcnode-id="571" instrument_node="">
</span><div class="content" data-dcnode-id="335" style="display: none;"><span data-dcnode-id="570" instrument_node="">
</span><div class="title" data-dcnode-id="567"><strong data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Ian Morris</span></strong></div><span data-dcnode-id="566" instrument_node="">
</span><div class="timestamp" data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">Posted: Thu, 09/06/2011 - 16:21</span></div><span data-dcnode-id="563" instrument_node="">
</span><p data-dcnode-id="558"><span data-dcnode-id="562" instrument_node="">In our age of soundbites and tweets, an e-journal that can accommodate not only a 9,000-word book review like Professor Duchesne’s but also a 3,500-word response from the author is a wonderful thing. Historians, after all, are supposed to make progress through the cut-and-thrust of public debate, and it is hard to imagine a better way to accomplish this than in the virtual pages of</span><em data-dcnode-id="560"><span data-dcnode-id="561" instrument_node=""> Reviews in History</span></em><span data-dcnode-id="559" instrument_node="">.</span></p><span data-dcnode-id="557" instrument_node="">
</span><p data-dcnode-id="549"><span data-dcnode-id="556" instrument_node="">Last autumn, Farrar, Straus and Giroux (in the US) and Profile (in Britain) published my book </span><em data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Why the West Rules—For Now: The Patterns of History and What they Reveal About the Future</span></em><span data-dcnode-id="553" instrument_node="">. For reasons I will come to in a moment, I would like to take advantage of the scope provided by </span><em data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Reviews in History</span></em><span data-dcnode-id="550" instrument_node=""> by starting with a summary of the book’s argument, and only then turning to the criticisms that Professor Duchesne levels at it.</span></p><span data-dcnode-id="548" instrument_node="">
</span><p data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">The main idea in my book is that we need three sets of tools to explain why the West rules (for now). These tools, I suggest, come form biology, sociology, and geography. Biology is fundamental. The lessons I draw from it are: (a) that humans are animals; (b) that – as animals – we have fairly predictable characteristics; and (c) that these human animals are much the same wherever we find them. Sociology, by contrast, teaches us how these animals behave in groups; and when we put biology and sociology together, they provide a universalizing biosocial science, applicable to all people in all times and places.</span></p><span data-dcnode-id="545" instrument_node="">
</span><p data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">This biosocial theory does not, though, explain why history has unfolded differently in different parts of the world, let alone why the West rose to dominance in the last few centuries. To explain that, we need geography. People are all much the same; their societies all develop along much the same lines; but the places human societies develop in are different, and these differences generate different outcomes. It is geography that explains why the West came to dominate the world – and why that domination may soon end.</span></p><span data-dcnode-id="542" instrument_node="">
</span><p data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">This is a very simple theory, and a very old one, which in a sense goes back to Herodotus. Yet it has big implications: it means that the attention historians lavish on great men and women, bungling idiots, culture, religion, politics, identity, and so on is misplaced. These subjects are usually interesting, but they are rarely important. They are noise, and we should not allow them to mask the real signal.</span></p><span data-dcnode-id="539" instrument_node="">
</span><p data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">The reason there is so much noise – or, to put it another way, why history is so messy – is that the signal, geography, is also messy. Geography is, in fact, a two-way street. On the one hand, geography determines how societies develop; on the other, the ways that societies develop determine what geography means. I spend most of the book tracing the back-and-forth interaction between social development and geography across the 15,000 years since the end of the ice age, showing how this produced the world we live in, and where it may take us in the 21st century.</span></p><span data-dcnode-id="536" instrument_node="">
</span><p data-dcnode-id="531"><span data-dcnode-id="535" instrument_node="">I begin at the end of the ice age because that is the first point since behaviorally modern </span><em data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Homo sapiens</span></em><span data-dcnode-id="532" instrument_node=""> evolved (which now seems to have been around 75,000 years ago, ± 25,000 years) that we can see really distinct ways of life emerging in different parts of the world. Geography was very clearly the reason that these distinct ways of life took shape: it determined that in roughly half a dozen places in the same band of latitudes across the Old and New Worlds, plants and animals evolved that could be domesticated by humans as the postglacial world warmed up.</span></p><span data-dcnode-id="530" instrument_node="">
</span><p data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">The earliest, biggest, and most richly endowed of these core areas was in Southwest Asia. Across the last ten millennia BCE its population boomed, and complex societies, eventually organized around cities and states, spread from the original Southwest Asian core across Europe and toward central Asia. The Roman Empire, Renaissance Italy, industrial England – all ultimately descend (via many transformations) from this original Southwest Asian core of complex societies, and following what seems to me commonsense, I call all these societies ‘Western’. The book’s central question is why it has been societies that descend from the original Western core, rather than societies that descend from one of the other cores, or no societies at all, that have dominated the planet for the last 200 years.</span></p><span data-dcnode-id="527" instrument_node="">
</span><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">The only way to answer that question is comparatively, setting the Western historical record alongside evidence from other parts of the world. For reasons I go into in the book (particularly on p. 32), rather than doing a blanket, global-level comparison between the West and the rest, it seemed more productive to focus on just the West and one other regional tradition, the complex societies that developed out of the easternmost core in Eurasia, between what are now the Yellow and Yangzi Rivers. Again following what I think is commonsense, I call all these societies ‘Eastern’.</span></p><span data-dcnode-id="524" instrument_node="">
</span><p data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">I suggest that one reason why there is so little consensus on the reasons for Western domination is that comparisons have not been systematic, and I try to deal with that by creating a numerical index of social development, which basically measures societies’ abilities to impose their will on the world around them. This index suggests that the societies with the highest social development scores have been in the West for 90 per cent of the time since the end of the last ice age. Anyone who thinks that all cultures are the same, and that the West is no different from the rest of the world, has to explain this fact.</span></p><span data-dcnode-id="521" instrument_node="">
</span><p data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">That said, Western social development has not been the highest in the world for the whole period since the end of the last ice age; between roughly 550 and 1750 CE Eastern societies pulled ahead on the index, interrupting the West’s lead in social development for 1,200 years. Anyone who thinks that Western dominance is the product of a long cultural tradition, stretching back to the ancient Greeks, has to explain this fact. And anyone who really wants to explain why the West rules has to account for both of these facts.</span></p><span data-dcnode-id="518" instrument_node="">
</span><p data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">The best explanation, I conclude, is that geography gave Western development a head start at the end of the ice age, but that as social development rose (and sometimes fell), geography kept changing its meanings. This, I argue across the 768 pages of my book, is why the East caught up with Western development levels in the 6th century, the West regained its lead in the 18th, and the East looks set to catch up again by the end of the 21st … unless, of course, something happens to prevent that outcome—or to make it irrelevant.</span></p><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Professor Duchesne vigorously disputes my claims. What ‘set the West apart’, he says,</span></p><span data-dcnode-id="512" instrument_node="">
</span><blockquote data-dcnode-id="505"><p data-dcnode-id="507"><span data-dcnode-id="511" instrument_node="">was the </span><em data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">continuous</span></em><span data-dcnode-id="508" instrument_node=""> sequence of original giants in Greece and in Rome, in medieval Europe, and throughout the modern era. The West was always filled with individuals persistently searching for new worlds, new visions, and new styles of painting, architecture, music, science, philosophy, and literature—in comparative contrast, for example, to the intellectual traditions set down in ancient China—Confucianism, Legalism, Taoism (and later Buddhism)—which persisted in their essentials until the impact of the West occasioned some novelties.</span></p><span data-dcnode-id="506" instrument_node="">
</span></blockquote><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">My explanation of the shape of history is consistently materialist; Professor Duchesne’s consistently emphasizes culture. This is a fundamental disagreement, and, to my mind, one that fully justifies a 9,000-word review and an author’s response.</span></p><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">That said, the way Professor Duchesne pursues the debate strikes me as extremely odd. Despite his review’s length, rather little of it takes on my book’s central thesis, which is why I spent so long summarizing my argument at the beginning of this response.</span></p><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Instead of beginning by summarizing my arguments, Professor Duchesne opens his review by complaining that the blurbs on my book’s dust jacket are too positive. It’s normal practice for trade presses (and increasingly for academic presses too) to employ publicists, who badger prominent authors into saying glowing things about a new book. The whole point of the exercise is that the blurbs should be more positive than the reviews the book gets in newspapers and journals; if they’re not, the press may as well fire the publicist and save itself a paycheck.</span></p><span data-dcnode-id="495" instrument_node="">
</span><p data-dcnode-id="484"><span data-dcnode-id="494" instrument_node="">Personally, I think that some of the published reviews of my book (especially in the </span><em data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Financial Times</span></em><span data-dcnode-id="491" instrument_node="">, </span><em data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Literary Review</span></em><span data-dcnode-id="488" instrument_node="">, and </span><em data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Foreign Affairs</span></em><span data-dcnode-id="485" instrument_node="">) use nicer adjectives than the solicited blurbs. But that is perhaps beside the point, which is that a book review should be about a book, not about what other people have said about a book. Grumbling about blurbs is at best a distraction and at worst downright odd. And taking a whole paragraph to imply that David Landes – who very generously took the time, despite a serious illness, to comment on the manuscript of a book that disagrees with his own work at many points – blurbed this book without reading it is, I would say, even odder.</span></p><span data-dcnode-id="483" instrument_node="">
</span><p data-dcnode-id="478"><span data-dcnode-id="482" instrument_node="">Professor Duchesne then jumps straight into the middle of my book, dismissing my account of 15th-century intercontinental travel as ‘Drawing on Gavin Menzies’ discredited book, </span><em data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">1421: The Year China Discovered America</span></em><span data-dcnode-id="479" instrument_node="">’. This, again, strikes me as odd.</span></p><span data-dcnode-id="477" instrument_node="">
</span><p data-dcnode-id="469"><span data-dcnode-id="476" instrument_node="">Commander Menzies’ </span><em data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">1421 </span></em><span data-dcnode-id="473" instrument_node="">argues that in that year, sailors from Zheng He’s Treasure Fleets explored the coasts of America, Australia, the Atlantic, and Antarctica. It is an unorthodox piece of historical writing, drawing more on Commander Menzies’ experience as a submariner than on conventional historical documentation, but it is also the most widely read book on Ming dynasty exploration ever published in English – which means that no historian writing on why the West rules can afford to ignore it (I’ve found that roughly every third or fourth time I give a public lecture on </span><em data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Why the West Rules</span></em><span data-dcnode-id="470" instrument_node="">, someone asks me about Commander Menzies’ thesis).</span></p><span data-dcnode-id="468" instrument_node="">
</span><p data-dcnode-id="442"><span data-dcnode-id="467" instrument_node="">But what I actually say in my book about </span><em data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">1421</span></em><span data-dcnode-id="464" instrument_node=""> is very different from what Professor Duchesne implies that I say. On p. 410, after explaining why pretty much no professional historians believe the arguments in </span><em data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">1421</span></em><span data-dcnode-id="461" instrument_node="">, I add that ‘to my mind Menzies’s </span><em data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">1421</span></em><span data-dcnode-id="458" instrument_node=""> is on a par with von Däniken’s </span><em data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">Chariots of the Gods?</span></em><span data-dcnode-id="455" instrument_node="">’ (p. 410). Just in case anyone should interpret this as meaning that I am in fact drawing on Menzies’ work, I turn on p. 420 to his </span><em data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">1434: The Year a Magnificent Chinese Fleet Sailed to Italy and Ignited the Renaissance</span></em><span data-dcnode-id="452" instrument_node="">, the sequel to </span><em data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">1421</span></em><span data-dcnode-id="449" instrument_node="">. ‘Menzies’s </span><em data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">1434</span></em><span data-dcnode-id="446" instrument_node="">’, I say there, ‘calls for even more suspension of disbelief than his </span><em data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">1421</span></em><span data-dcnode-id="443" instrument_node=""> … and once again I must confess that this is more suspension than I can muster’. I then state categorically (especially on p. 413) that Zheng He’s fleets did not sail to the Americas (let alone to the North Pole, Antarctica, and Italy). How anyone could read these statements and then conclude that I am ‘Drawing on Gavin Menzies’ discredited book’ is a mystery to me. So far as I know, Professor Duchesne is the only reader to have reached such a conclusion.</span></p><span data-dcnode-id="441" instrument_node="">
</span><p data-dcnode-id="436"><span data-dcnode-id="440" instrument_node="">If I were to reply in this much detail to each one of Professor Duchesne’s criticisms this response would end up being even longer than his review, but I would like to touch on a couple more examples. Professor Duchesne says that ‘Morris gladly limits the history of </span><em data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">Europe</span></em><span data-dcnode-id="437" instrument_node=""> to a rather insignificant role until the 18th century … Ancient Greece, Rome, medieval Christendom, the Renaissance, Reformation, the Cartographic Revolution, the Scientific Era, the French Revolution are all summarily treated as local affairs, if not ignored completely’.</span></p><span data-dcnode-id="435" instrument_node="">
</span><p data-dcnode-id="430"><span data-dcnode-id="434" instrument_node="">This judgment surprised me on several counts, but most of all because one of my main arguments is that Gibbon was right: the Roman Empire of the first two centuries CE was the richest, most sophisticated, and frankly most important society in the whole of preindustrial history, and that its fall was an ‘awful revolution … which will ever be remembered, and is still felt by the nations of the earth’.</span><a data-dcnode-id="432" href="#f1" id="t1"><span data-dcnode-id="433" instrument_node="">(1)</span></a><span data-dcnode-id="431" instrument_node=""> Between about 500 BCE and 200 CE, I argue, southern Europe was the most developed place on earth. Its history was not insignificant, was not a local affair, and is not something I ignore completely. Contrary to the consensus that has emerged since the 1970s, that late antiquity saw not the fall of the Roman Empire but its transformation into an Early Medieval world, it seems to me (as it does to many archaeologists) that the empire’s collapse was a catastrophe. I dwell on this theme particularly in chapter 11.</span></p><span data-dcnode-id="429" instrument_node="">
</span><p data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Professor Duchesne grumbles that ‘Morris never uses the words ‘distinctive’ or ‘uniquely’ in reference to Europe except in a sardonic way.’ Since I have an electronic text of my book, I was able to do a word search, and found that Professor Duchesne is mistaken. It turned out that I didn’t use either of these words very often in the book (perhaps a telling detail about my view of history!). On p. 449, though, I do observe that 16th-century Western Europe was distinct from the other complex societies of Eurasia in remaining free of domination by great empires (to my mind, a good thing). On p. 498, I comment that Britain’s ‘industrial revolution was unique in how much and how fast it drove up social development’ (in my book, also good thing). I argue on p. 506 that Victorian social reformers were revolutionaries (although admittedly I don’t use the words distinctive or unique) in thinking that it was a good idea to ban child labor from factories, restrict working hours for the under-13s, and give all children some schooling. I contrast this explicitly with 19th-century China, where none of these things happened. There’s also no shortage of passages where I scatter around words like ‘first’ and ‘original’ with reference to Europe. These passages are concentrated in chapters five, six, and eight to ten, but that’s because these were the periods (basically, the classical, early-modern, and modern) when Europeans really were being first and original.</span></p><span data-dcnode-id="426" instrument_node="">
</span><p data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">Professor Duchesne seems unhappy that the man he rather dismissively calls ‘Zhu Xi, a Confucian ‘theorist’ of the 12th century’, gets more space in chapter eight than Machiavelli or Michelangelo. But how else could it be in a book comparing Western and Eastern history? I’m not sure how people calculate such things, but it’s commonly said that Zhu is the second most influential thinker in Chinese history, behind Confucius but ahead of Mao. Zhu is regularly either praised for perfecting Confucian thought or blamed for condemning China to stagnation (or both at once). Machiavelli was a great man, and so was Michelangelo, but I’ve never heard it suggested that either of them was the second most influential thinker in European history.</span></p><span data-dcnode-id="423" instrument_node="">
</span><p data-dcnode-id="406"><span data-dcnode-id="422" instrument_node="">I could go on, but that would quickly get repetitive. I will limit myself to one last example, to which Professor Duchesne devotes seven paragraphs. He quotes my comment (p. 473) that the 18th-century Chinese intellectual trend known as </span><em data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">kaozheng</span></em><span data-dcnode-id="419" instrument_node=""> (‘evidential research’) ‘paralleled Western Europe's scientific revolution in every way – except one: it did not develop a mechanical model of nature’. Professor Duchesne says that he disagrees strongly. ‘Searching for the sources [Morris] relied on,’ he says, ‘I was led to Benjamin Elman's </span><em data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">From Philosophy to Philology: Intellectual and Social Aspects of</span></em><span data-dcnode-id="416" instrument_node=""> </span><em data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">Change in Late Imperial China</span></em><span data-dcnode-id="413" instrument_node=""> (1984)’, and then to the same author’s </span><em data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">In Their Own Terms</span></em><span data-dcnode-id="410" instrument_node="">. Professor Elman is indeed the scholar whose works I found most helpful when I was thinking about early-modern Chinese science; and, after reading these books, Professor Duchesne concluded that ‘Elman does not argue that this philological movement [i.e., </span><em data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">kaozheng</span></em><span data-dcnode-id="407" instrument_node="">] contained the elements of modern Western science.’</span></p><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">And neither do I. My point on pp. 473–4 is that despite formal similarities between Chinese and European interest in emphasizing facts over speculation, testing theories against data, and rejecting arbitrary authority, Chinese thinkers in the 17th and 18th centuries did not even begin moving toward modern natural science. The reason for this, I argue, is that despite all their learning, Chinese scientists did not develop mechanical models of nature. And the reason for that was that unlike Europeans, whose involvement with burgeoning empires of trade around the Atlantic kept thrusting new questions about nature onto them, Chinese thinkers went on refining their answers to old questions. The apparently small fact that European thinkers came up with a mechanical model of nature while Chinese thinkers did not is the key to understanding the East-West scientific divergence of the last four centuries; and Professor Duchesne’s discussion of recent books on early-modern Chinese science, while it is interesting, has nothing to do with the argument in my book.</span></p><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">I am sure I am not the first author who, on confronting a negative review, has wondered what could have inspired a fellow-professional to come to such peculiar conclusions. If I might be permitted a little speculation, my guess is that the root problem is that Professor Duchesne is not very interested in what my book actually says.</span></p><span data-dcnode-id="399" instrument_node="">
</span><p data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">My suspicion (again, I am necessarily guessing here) is that having just published a book of his own about the Western cultural tradition, Professor Duchesne was looking for a relativistic, multiculturalist, and anti-Western diatribe to serve as a whipping boy.</span></p><span data-dcnode-id="396" instrument_node="">
</span><p data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">There is certainly no shortage of such diatribes out there, but my book is not one of them. My book did, though, have the word ‘West’ in the title, appear at the right moment, offer a different analysis of Western history from Professor Duchesne’s, and garner some media attention. So, I suspect, Professor Duchesne decided to turn a review of my book into a vehicle for denouncing relativism, multiculturalism, and the enemies of the West.</span></p><span data-dcnode-id="393" instrument_node="">
</span><p data-dcnode-id="385"><span data-dcnode-id="392" instrument_node="">This, I concede again, is just speculation, but to my mind it would explain why Professor Duchesne begins his review not with a summary of my arguments but with complaints about what other people think about my book, why he consistently concludes that my words mean the opposite of what they say, and why he descends so often to </span><em data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">ad hominem</span></em><span data-dcnode-id="389" instrument_node=""> attacks. I am, he says, ‘defeatist’, ‘ethno-masochistic’, ‘dismissive, even contemptuous, of ordinary people’, and ‘a Party intellectual who knows in which direction the evidence must be altered to fit with the multicultural line’.</span><a data-dcnode-id="387" href="#f2" id="t2"><span data-dcnode-id="388" instrument_node="">(2)</span></a><span data-dcnode-id="386" instrument_node=""> I am also a megalomaniac: the ultimate message I am trying to convey, Professor Duchesne concludes, is that ‘only Morris can prevent humanity from destroying itself’.</span></p><span data-dcnode-id="384" instrument_node="">
</span><p data-dcnode-id="379"><span data-dcnode-id="383" instrument_node="">If an undergraduate handed me an essay containing statements like these, I would strike them out and return the paper with a little lecture about professionalism. I have to confess to some disappointment that the editors of </span><em data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Reviews in History</span></em><span data-dcnode-id="380" instrument_node=""> did not apply similar standards. A serious issue does distinguish Professor Duchesne’s thinking about the West from mine, but it is not defeatism, masochism, or megalomania; it is whether material or cultural explanations fit better with the facts. If the editors had encouraged Professor Duchesne to write a 9,000-word review focusing on this serious question, it would have been well worth reading.</span></p><span data-dcnode-id="378" instrument_node="">
</span><p data-dcnode-id="373"><span data-dcnode-id="377" instrument_node="">I’d like to close with a few words about what I would have said if Professor Duchesne had in fact written a more serious review. My main point, I think, would have been that any explanation of why the West rules has to be comparative. We can only answer the question by thinking about how, and how much, the West differs from other societies. This is why I think Professor Duchesne is misguided when he keeps saying that I devoted too much space to China and should have focused more on Europe. Focusing on Europe is fine if the only thing we want to do is to celebrate European accomplishments, but comparisons are necessary to </span><em data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">explain</span></em><span data-dcnode-id="374" instrument_node=""> European accomplishments.</span></p><span data-dcnode-id="372" instrument_node="">
</span><p data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">But comparison is only the first step. A debate about why the West rules also needs to be structured around an explicit analytical framework. This is why I remain unmoved by the lists of eminent Greek philosophers, Renaissance men, and 18th-century novelists that stud Professor Duchesne’s review. The lists certainly display his erudition, but they are analytically pointless. It would be easy to make lists of eminent Persian, Indian, or East Asian thinkers, or to make lists of villains, bunglers, and monsters from the same regions of the world. If the listing is to serve any purpose, there must first be an explicit framework that compels rival analysts either to confront each other on the same ground, using the same terms, or to argue directly about what the appropriate ground for confrontation might be.</span></p><span data-dcnode-id="369" instrument_node="">
</span><p data-dcnode-id="358"><span data-dcnode-id="368" instrument_node="">This is why I proposed an index of social development in </span><em data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">Why the West Rules – For Now</span></em><span data-dcnode-id="365" instrument_node="">. The index does not make discussions more objective – far too many assumptions are involved in calculating each of the scores for that – but it does make the discussion more explicit. Designing the index forced me to define exactly what I was measuring and how I measured it, which I explain in an 80,000-word technical appendix called </span><em data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">Social Development</span></em><span data-dcnode-id="362" instrument_node=""> that can be downloaded as a pdf from my web site </span><a data-dcnode-id="360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ianmorris.org/"><span data-dcnode-id="361" instrument_node="">http://www.ianmorris.org</span></a><span data-dcnode-id="359" instrument_node="">. Critics who find my definitions and methods unconvincing can then use my explicit definitions to show what I have done wrong and to improve on it.</span></p><span data-dcnode-id="357" instrument_node="">
</span><p data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">My explanation for why the West rules may be mistaken, but these methods are the only ones that will produce progress on the question. As I see it, taking a comparative perspective and setting the results within an explicit analytical framework forces us to conclude that neither the focus on European culture that Professor Duchesne recommends nor the multicultural relativism that he tries to find in my book explains why the West rules. The answers lie in the sensible middle ground.</span></p><span data-dcnode-id="354" instrument_node="">
</span><h2 class="footn" data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">Notes</span></h2><span data-dcnode-id="351" instrument_node="">

</span><li data-dcnode-id="339" id="f2"><span data-dcnode-id="342" instrument_node="">Fighting talk; when I migrated to the United States I solemnly swore that I was not, and had never been, a member of the Communist Party (I am assuming, of course, that that the communists are the party to which Professor Duchesne thinks I belong). My grandfather, however, had been a long-time card-carrying member of the Communist Party of Great Britain. He was a steelworker rather than an intellectual cadre, but all the same, I heard more than enough from him about the Party to last me a lifetime.</span><a data-dcnode-id="340" href="#t2"><span data-dcnode-id="341" instrument_node="">Back to (2)</span></a></li><span data-dcnode-id="338" instrument_node="">
