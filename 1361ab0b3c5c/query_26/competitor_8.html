</span><p data-dcnode-id="4349"><span data-dcnode-id="4369" instrument_node="">Britain’s </span><a data-dcnode-id="4367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Illustration"><span data-dcnode-id="4368" instrument_node="">Golden Age of illustration</span></a><span data-dcnode-id="4366" instrument_node="">, the illustration of children’s literature in particular, was ushered in,&nbsp;at least in part,&nbsp;by Japonism. Other factors contributed to the flourishing of children’s literature adorned with exquisite illustrations, but the beauty of&nbsp;the Japanese prints that flooded Europe after the </span><a data-dcnode-id="4364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sakoku"><span data-dcnode-id="4365" instrument_node="">Sakoku</span></a><span data-dcnode-id="4363" instrument_node=""> period elevated the status of illustrators whose art was engraved and printed. Moreover,&nbsp;the illustration of&nbsp;children’s literature&nbsp;allowed and sometimes required substantial creativity on the part of illustrators. For instance, as discussed in a previous post,&nbsp;</span><a data-dcnode-id="4361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lewis_Carroll"><span data-dcnode-id="4362" instrument_node="">Lewis Carroll</span></a><span data-dcnode-id="4360" instrument_node="">’s </span><span data-dcnode-id="4357" style="color:#800000;"><a data-dcnode-id="4358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alice%2527s_Adventures_in_Wonderland"><span data-dcnode-id="4359" instrument_node="">Alice’s Adventures in Wonderland</span></a></span><span data-dcnode-id="4356" instrument_node=""> (1865) and its sequel, </span><a data-dcnode-id="4354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Through_the_Looking-Glass"><span data-dcnode-id="4355" instrument_node="">Through the Looking-Glass</span></a><span data-dcnode-id="4353" instrument_node="">&nbsp;(1871), featured </span><a data-dcnode-id="4351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Literary_nonsense"><span data-dcnode-id="4352" instrument_node="">literary nonsense</span></a><span data-dcnode-id="4350" instrument_node="">.</span></p><span data-dcnode-id="4348" instrument_node="">
</span><p data-dcnode-id="4346"><span data-dcnode-id="4347" instrument_node="">But there is more to tell. We will now&nbsp;introduce Britain’s following&nbsp; movements or style:</span></p><span data-dcnode-id="4345" instrument_node="">
</span><ol data-dcnode-id="4314"><span data-dcnode-id="4344" instrument_node="">
</span><li data-dcnode-id="4338"><span data-dcnode-id="4343" instrument_node="">the </span><span data-dcnode-id="4340" style="color:#800000;"><a data-dcnode-id="4341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pre-Raphaelite_Brotherhood" style="color:#800000;"><span data-dcnode-id="4342" instrument_node="">Pre-Raphaelite Brotherhood</span></a></span><span data-dcnode-id="4339" instrument_node=""> (1848)</span></li><span data-dcnode-id="4337" instrument_node="">
</span><li data-dcnode-id="4331"><span data-dcnode-id="4336" instrument_node="">the </span><span data-dcnode-id="4333" style="color:#800000;"><a data-dcnode-id="4334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arts_and_Crafts_movement" style="color:#800000;"><span data-dcnode-id="4335" instrument_node="">Arts and Crafts Movement</span></a></span><span data-dcnode-id="4332" instrument_node=""> (1880-1910)</span></li><span data-dcnode-id="4330" instrument_node="">
</span><li data-dcnode-id="4324"><span data-dcnode-id="4329" instrument_node="">the </span><span data-dcnode-id="4326" style="color:#800000;"><a data-dcnode-id="4327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anglo-Japanese_style" style="color:#800000;"><span data-dcnode-id="4328" instrument_node="">Anglo-Japanese style</span></a></span><span data-dcnode-id="4325" instrument_node=""> (c. 1850)</span></li><span data-dcnode-id="4323" instrument_node="">
</span><li data-dcnode-id="4316"><span data-dcnode-id="4322" instrument_node="">the </span><span data-dcnode-id="4318" style="color:#800000;"><a data-dcnode-id="4320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aestheticism" style="color:#800000;"><span data-dcnode-id="4321" instrument_node="">Aesthetic Movement</span></a><span data-dcnode-id="4319" instrument_node="">&nbsp;</span></span><span data-dcnode-id="4317" instrument_node="">(c. 1850)</span></li><span data-dcnode-id="4315" instrument_node="">
</span></ol><span data-dcnode-id="4313" instrument_node="">
</span><p data-dcnode-id="4299"><span data-dcnode-id="4312" instrument_node="">I will also refer to the curvilinear and very popular and influential&nbsp;</span><a data-dcnode-id="4310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Art_Nouveau"><span data-dcnode-id="4311" instrument_node="">Art Nouveau</span></a><span data-dcnode-id="4309" instrument_node="">. British illustrator </span><a data-dcnode-id="4307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aubrey_Beardsley"><span data-dcnode-id="4308" instrument_node="">Aubrey Beardsley</span></a><span data-dcnode-id="4306" instrument_node=""> (21 August 1872 – 16 March 1898; aged 25) is a representative of the style, but </span><strong data-dcnode-id="4304"><span data-dcnode-id="4305" instrument_node="">Art Nouveau</span></strong><span data-dcnode-id="4303" instrument_node=""> is usually associated with Czech artist </span><a data-dcnode-id="4301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alphonse_Mucha"><span data-dcnode-id="4302" instrument_node="">Alfons Mucha</span></a><span data-dcnode-id="4300" instrument_node="">. It is a characteristic of art produced in the last decade of the 19th century and in the years preceding World War I.</span></p><span data-dcnode-id="4298" instrument_node="">
</span><h3 data-dcnode-id="4296"><span data-dcnode-id="4297" instrument_node="">The Anglo-Japanese Style</span></h3><span data-dcnode-id="4295" instrument_node="">
</span><p data-dcnode-id="4280"><span data-dcnode-id="4294" instrument_node="">In Britain, </span><em data-dcnode-id="4292"><span data-dcnode-id="4293" instrument_node="">Japonisme</span></em><span data-dcnode-id="4291" instrument_node="">&nbsp;was&nbsp;applied to furniture making and was referred to as the </span><strong data-dcnode-id="4289"><span data-dcnode-id="4290" instrument_node="">Anglo-Japanese style</span></strong><span data-dcnode-id="4288" instrument_node="">. The Anglo-Japanese style&nbsp;was true to&nbsp;the idealism of the </span><strong data-dcnode-id="4286"><span data-dcnode-id="4287" instrument_node="">Pre-Raphaelites</span></strong><span data-dcnode-id="4285" instrument_node=""> in that it rejected the depiction of “any thing [sic]&nbsp;or any person of&nbsp;a commonplace or conventional kind.” (See </span><span data-dcnode-id="4282" style="color:#800000;"><a data-dcnode-id="4283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pre-Raphaelite_Brotherhood" style="color:#800000;"><span data-dcnode-id="4284" instrument_node="">Pre-Raphaelite Brotherhood</span></a></span><span data-dcnode-id="4281" instrument_node="">, Wikipedia.)</span></p><span data-dcnode-id="4279" instrument_node="">
</span><p data-dcnode-id="4230"><span data-dcnode-id="4278" instrument_node="">For instance, the sideboard shown below, designed&nbsp;in the </span><strong data-dcnode-id="4276"><span data-dcnode-id="4277" instrument_node="">Anglo-Japanese style</span></strong><span data-dcnode-id="4275" instrument_node=""> by </span><span data-dcnode-id="4271" style="color:#800000;"><a data-dcnode-id="4272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_William_Godwin" style="color:#800000;"><u data-dcnode-id="4273"><span data-dcnode-id="4274" instrument_node="">Arthur William Godwin</span></u></a></span><span data-dcnode-id="4270" instrument_node=""> (26 May 1833 – 6 October 1886),&nbsp;cannot be considered &nbsp;“conventional”. It may reflect Japanese furniture, but it is also consistent with the concept of art for art’s sake,&nbsp;</span><span data-dcnode-id="4265" style="color:#800000;"><a data-dcnode-id="4266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Art_for_art%2527s_sake" style="color:#800000;"><em data-dcnode-id="4267"><u data-dcnode-id="4268"><span data-dcnode-id="4269" instrument_node="">l’art pour l’art</span></u></em></a></span><em data-dcnode-id="4263"><span data-dcnode-id="4264" instrument_node="">,</span></em><span data-dcnode-id="4262" instrument_node=""> advocated by French poet&nbsp;</span><span data-dcnode-id="4258" style="color:#800000;"><a data-dcnode-id="4259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Th%25C3%25A9ophile_Gautier" style="color:#800000;"><u data-dcnode-id="4260"><span data-dcnode-id="4261" instrument_node="">Théophile Gautier</span></u></a></span><span data-dcnode-id="4257" instrument_node=""> (30 August 1811 – 23 October 1872) and shared by&nbsp;certain members of the&nbsp;</span><span data-dcnode-id="4253" style="color:#800000;"><a data-dcnode-id="4254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aestheticism" style="color:#800000;"><u data-dcnode-id="4255"><span data-dcnode-id="4256" instrument_node="">Aesthetic Movement</span></u></a></span><span data-dcnode-id="4252" instrument_node="">, such as </span><a data-dcnode-id="4249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Abbott_McNeill_Whistler"><span data-dcnode-id="4250" style="color:#800000;"><span data-dcnode-id="4251" instrument_node="">James Abbott McNeil Whistler</span></span></a><span data-dcnode-id="4248" instrument_node="">. Yet, as noted above,&nbsp;the </span><strong data-dcnode-id="4246"><span data-dcnode-id="4247" instrument_node="">Anglo-Japanese style </span></strong><span data-dcnode-id="4245" instrument_node="">is&nbsp;partly rooted in the&nbsp;creed of members of the </span><span data-dcnode-id="4242" style="color:#800000;"><a data-dcnode-id="4243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pre-Raphaelite_Brotherhood" style="color:#800000;"><span data-dcnode-id="4244" instrument_node="">Pre-Raphaelite Brotherhood</span></a></span><span data-dcnode-id="4241" instrument_node="">.</span><strong data-dcnode-id="4239"><span data-dcnode-id="4240" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="4238" instrument_node="">It is innovative, </span><span data-dcnode-id="4235" style="color:#800000;"><a data-dcnode-id="4236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Baudelaire" style="color:#800000;"><span data-dcnode-id="4237" instrument_node="">Charles Baudelaire</span></a></span><span data-dcnode-id="4234" instrument_node="">‘s&nbsp;“</span><em data-dcnode-id="4232"><span data-dcnode-id="4233" instrument_node="">du nouveau,</span></em><span data-dcnode-id="4231" instrument_node="">” newness.</span></p><span data-dcnode-id="4229" instrument_node="">
</span><p data-dcnode-id="4222" style="text-align:center;"><em data-dcnode-id="4227"><span data-dcnode-id="4228" instrument_node="">Plonger au fond du gouffre, Enfer ou Ciel, qu’importe?</span></em><br data-dcnode-id="4226"><span data-dcnode-id="4225" instrument_node="">
</span><em data-dcnode-id="4223"><span data-dcnode-id="4224" instrument_node=""> Au fond de l’Inconnu pour trouver du nouveau!</span></em></p><span data-dcnode-id="4221" instrument_node="">
</span><p data-dcnode-id="4207" style="text-align:center;"><span data-dcnode-id="4220" instrument_node="">(See “</span><span data-dcnode-id="4216" style="color:#800000;"><em data-dcnode-id="4217"><a data-dcnode-id="4218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//poesie.webnet.fr/lesgrandsclassiques/poemes/charles_baudelaire/le_voyage.html" style="color:#800000;"><span data-dcnode-id="4219" instrument_node="">Le Voyage</span></a></em></span><span data-dcnode-id="4215" instrument_node="">” VIII, </span><em data-dcnode-id="4209"><span data-dcnode-id="4214" instrument_node="">Les Fleurs du mal [</span><span data-dcnode-id="4211" style="color:#800000;"><a data-dcnode-id="4212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Les_Fleurs_du_mal" style="color:#800000;"><span data-dcnode-id="4213" instrument_node="">The Flowers of Evil</span></a></span><span data-dcnode-id="4210" instrument_node="">]</span></em><span data-dcnode-id="4208" instrument_node="">.)</span></p><span data-dcnode-id="4206" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="4195" data-shortcode="caption" id="attachment_55559" style="width: 539px"><img alt="Sideboard by Arthur Godwin (Photo credit: Wikipedia)" aria-describedby="caption-attachment-55559" class="wp-image-55559 size-large" data-attachment-id="55559" data-comments-opened="1" data-dcnode-id="4205" data-image-caption="<p>Sideboard by Arthur Godwin (Photo credit: Wikipedia)</p>
" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="Godwinsideboard" data-large-file="https://michelinewalker.files.wordpress.com/2015/11/godwinsideboard.jpg?w=529" data-medium-file="https://michelinewalker.files.wordpress.com/2015/11/godwinsideboard.jpg?w=300" data-orig-file="https://michelinewalker.files.wordpress.com/2015/11/godwinsideboard.jpg" data-orig-size="748,573" data-permalink="https://michelinewalker.com/2015/11/06/word-and-art/godwinsideboard/" height="405" loading="lazy" sizes="(max-width: 529px) 100vw, 529px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//michelinewalker.files.wordpress.com/2015/11/godwinsideboard.jpg%3Fw%3D529%26h%3D405&amp;raw" srcset="https://michelinewalker.files.wordpress.com/2015/11/godwinsideboard.jpg?w=529&amp;h=405 529w, https://michelinewalker.files.wordpress.com/2015/11/godwinsideboard.jpg?w=150&amp;h=115 150w, https://michelinewalker.files.wordpress.com/2015/11/godwinsideboard.jpg?w=300&amp;h=230 300w, https://michelinewalker.files.wordpress.com/2015/11/godwinsideboard.jpg 748w" width="529"><p class="wp-caption-text" data-dcnode-id="4196" id="caption-attachment-55559"><strong data-dcnode-id="4203"><span data-dcnode-id="4204" instrument_node="">Sideboard</span></strong><span data-dcnode-id="4202" instrument_node=""> by </span><a data-dcnode-id="4200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_William_Godwin"><span data-dcnode-id="4201" instrument_node="">Arthur William Godwin</span></a><span data-dcnode-id="4199" instrument_node=""> </span><span data-dcnode-id="4197" style="color:#999999;"><span data-dcnode-id="4198" instrument_node="">(Photo credit: Wikipedia)</span></span></p></div><span data-dcnode-id="4194" instrument_node="">
</span><h3 data-dcnode-id="4192"><span data-dcnode-id="4193" instrument_node="">The Pre-Raphaelite Brotherhood</span></h3><span data-dcnode-id="4191" instrument_node="">
</span><p data-dcnode-id="4174"><span data-dcnode-id="4190" instrument_node="">The </span><strong data-dcnode-id="4188"><span data-dcnode-id="4189" instrument_node="">Pre-Raphaelite Brotherhood</span></strong><span data-dcnode-id="4187" instrument_node=""> was founded in 1848 by&nbsp;British artists </span><a data-dcnode-id="4184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Holman_Hunt"><u data-dcnode-id="4185"><span data-dcnode-id="4186" instrument_node="">William Hunt</span></u></a><span data-dcnode-id="4183" instrument_node="">&nbsp;(2 April 1827 – 7 September 1910), </span><a data-dcnode-id="4180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Everett_Millais"><u data-dcnode-id="4181"><span data-dcnode-id="4182" instrument_node="">John Everett Millais</span></u></a><span data-dcnode-id="4179" instrument_node=""> (8 June 1829 – 13 August 1896) and </span><a data-dcnode-id="4176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dante_Gabriel_Rossetti"><u data-dcnode-id="4177"><span data-dcnode-id="4178" instrument_node="">Dante Gabriel Rossetti</span></u></a><span data-dcnode-id="4175" instrument_node="">&nbsp;(12 May 1828&nbsp;– 9 April 1882). As noted below (see 3), it would not allow any thing [sic] or person “of a commonplace or conventional kind.”</span></p><span data-dcnode-id="4173" instrument_node="">
</span><ol data-dcnode-id="4089"><span data-dcnode-id="4172" instrument_node="">
</span><li data-dcnode-id="4156"><span data-dcnode-id="4171" instrument_node="">The movement&nbsp;was called brotherhood, which could suggest equality and fraternity, but members of the brotherhood were brothers in that they&nbsp;rejected </span><a data-dcnode-id="4163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sir_Joshua_Reynolds"><u data-dcnode-id="4164"><span data-dcnode-id="4165" style="color:#0066cc;"><span data-dcnode-id="4169" style="color:#800000;"><span data-dcnode-id="4170" instrument_node="">Sir Joshua</span></span><span data-dcnode-id="4168" instrument_node=""> </span><span data-dcnode-id="4166" style="color:#800000;"><span data-dcnode-id="4167" instrument_node="">Reynolds</span></span></span></u></a><span data-dcnode-id="4162" instrument_node="">, (16 July 1723 -23 February 1792), renamed Sir ‘Sloshua’,&nbsp;the founder of the English </span><span data-dcnode-id="4158" style="color:#800000;"><a data-dcnode-id="4159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Royal_Academy_of_Arts" style="color:#800000;"><u data-dcnode-id="4160"><span data-dcnode-id="4161" instrument_node="">Royal Academy of Arts</span></u></a></span><span data-dcnode-id="4157" instrument_node="">.</span></li><span data-dcnode-id="4155" instrument_node="">
</span><li data-dcnode-id="4148"><span data-dcnode-id="4154" instrument_node="">Pre-Raphaelites also wished to return to the art preceding the High Renaissance&nbsp; paintings of </span><span data-dcnode-id="4150" style="color:#800000;"><a data-dcnode-id="4151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Raphael" style="color:#800000;"><u data-dcnode-id="4152"><span data-dcnode-id="4153" instrument_node="">Raphael</span></u></a></span><span data-dcnode-id="4149" instrument_node="">&nbsp;(6 April or 28 March 1483 – 6 April 1520).</span></li><span data-dcnode-id="4147" instrument_node="">
</span><li data-dcnode-id="4136"><span data-dcnode-id="4146" instrument_node="">Pre-Raphaelites would not allow “anything lax or scamped in the process of painting … and hence … any thing [sic] or person of a commonplace or conventional kind.”</span><span data-dcnode-id="4143" style="color:#800000;"><strong data-dcnode-id="4144"><span data-dcnode-id="4145" instrument_node="">[1] </span></strong></span><span data-dcnode-id="4142" instrument_node="">(See </span><span data-dcnode-id="4138" style="color:#800000;"><a data-dcnode-id="4139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pre-Raphaelite_Brotherhood" style="color:#800000;"><u data-dcnode-id="4140"><span data-dcnode-id="4141" instrument_node="">Pre-Raphaelite Brotherhood</span></u></a></span><span data-dcnode-id="4137" instrument_node="">, Wikipedia.)</span></li><span data-dcnode-id="4135" instrument_node="">
</span><li data-dcnode-id="4117"><span data-dcnode-id="4134" instrument_node="">But the group&nbsp;“continued to accept the concepts of&nbsp;</span><span data-dcnode-id="4124" style="color:#800000;"><a data-dcnode-id="4131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_painting" style="color:#800000;"><u data-dcnode-id="4132"><span data-dcnode-id="4133" instrument_node="">history painting</span></u></a><span data-dcnode-id="4130" instrument_node="">, </span><a data-dcnode-id="4127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mimesis" style="color:#800000;"><u data-dcnode-id="4128"><span data-dcnode-id="4129" instrument_node="">mimesis</span></u></a><span data-dcnode-id="4125" style="color:#333333;"><span data-dcnode-id="4126" instrument_node="">, </span></span></span><span data-dcnode-id="4123" instrument_node="">imitation of nature as central to the purpose of art.”&nbsp;(See </span><span data-dcnode-id="4119" style="color:#800000;"><a data-dcnode-id="4120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pre-Raphaelite_Brotherhood" style="color:#800000;"><u data-dcnode-id="4121"><span data-dcnode-id="4122" instrument_node="">Pre-Raphaelite Brotherhood</span></u></a></span><span data-dcnode-id="4118" instrument_node="">, Wikipedia.)</span></li><span data-dcnode-id="4116" instrument_node="">
</span><li data-dcnode-id="4109"><span data-dcnode-id="4115" instrument_node="">The Pre-Raphaelites’ mentor was </span><span data-dcnode-id="4111" style="color:#800000;"><a data-dcnode-id="4112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Ruskin" style="color:#800000;"><u data-dcnode-id="4113"><span data-dcnode-id="4114" instrument_node="">John Ruskin</span></u></a></span><span data-dcnode-id="4110" instrument_node=""> (8 February 1819&nbsp;– 20 January 1900), the&nbsp;most prominent art critic of the Victorian era who advocated “truth to nature.”</span></li><span data-dcnode-id="4108" instrument_node="">
</span><li data-dcnode-id="4091"><span data-dcnode-id="4107" instrument_node="">It would be joined by other artists.</span><span data-dcnode-id="4092" style="color:#00ccff;"><strong data-dcnode-id="4093"><span data-dcnode-id="4105" style="color:#800000;"><span data-dcnode-id="4106" instrument_node="">[2]</span></span><br data-dcnode-id="4104"><span data-dcnode-id="4103" instrument_node="">
</span><span data-dcnode-id="4096" style="color:#333333;"><span data-dcnode-id="4102" instrument_node="">(See </span><span data-dcnode-id="4098" style="color:#800000;"><a data-dcnode-id="4099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pre-Raphaelite_Brotherhood" style="color:#800000;"><u data-dcnode-id="4100"><span data-dcnode-id="4101" instrument_node="">Pre-Raphaelite Brotherhood</span></u></a></span><span data-dcnode-id="4097" instrument_node="">, Wikipedia.)</span></span><br data-dcnode-id="4095"><span data-dcnode-id="4094" instrument_node="">
</span></strong></span></li><span data-dcnode-id="4090" instrument_node="">
</span></ol><span data-dcnode-id="4088" instrument_node="">

cnode-id="4084" instrument_node=""> by John William Waterhouse, 1903 </span><span data-dcnode-id="4082" style="color:#999999;"><span data-dcnode-id="4083" instrument_node="">(Photo</span></span><span data-dcnode-id="4081" instrument_node=""> </span><span data-dcnode-id="4079" style="color:#999999;"><span data-dcnode-id="4080" instrument_node="">credit:</span></span><span data-dcnode-id="4078" instrument_node=""> </span><a data-dcnode-id="4076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wikiart.org/en/john-william-waterhouse/echo-and-narcissus-1903"><span data-dcnode-id="4077" instrument_node="">WikiArt.org</span></a><span data-dcnode-id="4074" style="color:#999999;"><span data-dcnode-id="4075" instrument_node="">)</span></span></p></div><span data-dcnode-id="4071" instrument_node="">
</span><h3 data-dcnode-id="4069"><span data-dcnode-id="4070" instrument_node="">The Aesthetic Movement</span></h3><span data-dcnode-id="4068" instrument_node="">
</span><ul data-dcnode-id="4057"><span data-dcnode-id="4067" instrument_node="">
</span><li data-dcnode-id="4065"><span data-dcnode-id="4066" instrument_node="">roots in the Pre-Raphaelite Brotherhood</span></li><span data-dcnode-id="4064" instrument_node="">
</span><li data-dcnode-id="4062"><span data-dcnode-id="4063" instrument_node="">roots in the Gothic (William Morris &amp; Edward Burne-Jones)</span></li><span data-dcnode-id="4061" instrument_node="">
</span><li data-dcnode-id="4059"><span data-dcnode-id="4060" instrument_node="">roots in Japonism (Impressionism)</span></li><span data-dcnode-id="4058" instrument_node="">
</span></ul><span data-dcnode-id="4056" instrument_node="">
</span><p data-dcnode-id="4026"><span data-dcnode-id="4055" instrument_node="">The </span><strong data-dcnode-id="4053"><span data-dcnode-id="4054" instrument_node="">Aesthetic Movement</span></strong><span data-dcnode-id="4052" instrument_node=""> promoted the concept of&nbsp;art for art’s sake, </span><em data-dcnode-id="4050"><span data-dcnode-id="4051" instrument_node="">l’art pour l’art.&nbsp;</span></em><span data-dcnode-id="4049" instrument_node="">Consequently, there&nbsp;are&nbsp;affinities between the </span><strong data-dcnode-id="4047"><span data-dcnode-id="4048" instrument_node="">Pre-Raphaelite Brotherhood</span></strong><span data-dcnode-id="4046" instrument_node="">&nbsp;and the </span><strong data-dcnode-id="4044"><span data-dcnode-id="4045" instrument_node="">Aesthetic Movement</span></strong><span data-dcnode-id="4043" instrument_node="">. They may differ however in that the Pre-Raphaelites “continued to accept the concepts of&nbsp;</span><span data-dcnode-id="4033" style="color:#800000;"><a data-dcnode-id="4040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_painting" style="color:#800000;"><u data-dcnode-id="4041"><span data-dcnode-id="4042" instrument_node="">history painting</span></u></a><span data-dcnode-id="4039" instrument_node="">, </span><a data-dcnode-id="4036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mimesis" style="color:#800000;"><u data-dcnode-id="4037"><span data-dcnode-id="4038" instrument_node="">mimesis</span></u></a><span data-dcnode-id="4034" style="color:#333333;"><span data-dcnode-id="4035" instrument_node="">, </span></span></span><span data-dcnode-id="4032" instrument_node="">imitation of nature as central to the purpose of art.” This&nbsp;could explain why </span><span data-dcnode-id="4028" style="color:#800000;"><a data-dcnode-id="4029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Ruskin" style="color:#800000;"><u data-dcnode-id="4030"><span data-dcnode-id="4031" instrument_node="">John Ruskin</span></u></a></span><span data-dcnode-id="4027" instrument_node=""> (8 February 1819&nbsp;– 20 January 1900)&nbsp;praised the movement (see 5). He advocated “truth to nature”.</span></p><span data-dcnode-id="4025" instrument_node="">
</span><p data-dcnode-id="3992"><span data-dcnode-id="4024" instrument_node="">For Ruskin “truth to nature”&nbsp;did not seem&nbsp;consistent with&nbsp;the allusive nature of McNeill’s </span><span data-dcnode-id="4021" style="color:#800000;"><a data-dcnode-id="4022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//michelinewalker.com/2015/11/19/art-in-19th-century-england/Impressionism" style="color:#800000;"><span data-dcnode-id="4023" instrument_node="">Impressionism</span></a></span><span data-dcnode-id="4020" instrument_node="">.&nbsp;John Ruskin&nbsp;therefore criticized American, but London-based artist James McNeill Whistler stating that&nbsp;Whistler was a “</span><span data-dcnode-id="4017" style="color:#800000;"><a data-dcnode-id="4018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coxcomb" style="color:#800000;"><span data-dcnode-id="4019" instrument_node="">coxcomb</span></a></span><span data-dcnode-id="4016" instrument_node="">” who “asked two hundred </span><span data-dcnode-id="4012" style="color:#800000;"><a data-dcnode-id="4013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guinea_%28British_coin%29" style="color:#800000;" title="Guinea (British coin)"><u data-dcnode-id="4014"><span data-dcnode-id="4015" instrument_node="">guineas</span></u></a></span><span data-dcnode-id="4011" instrument_node=""> for flinging a pot of paint in the public’s face.” (See </span><span data-dcnode-id="4008" style="color:#800000;"><a data-dcnode-id="4009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Abbott_McNeill_Whistler" style="color:#800000;"><span data-dcnode-id="4010" instrument_node="">James Abbott McNeil Whistler</span></a></span><span data-dcnode-id="4007" instrument_node="">, Wikipedia.) Such was John Ruskin’s description of Whistler’s “</span><span data-dcnode-id="4003" style="color:#800000;"><a data-dcnode-id="4004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nocturne_in_Black_and_Gold_%25E2%2580%2593_The_Falling_Rocket" style="color:#800000;"><u data-dcnode-id="4005"><span data-dcnode-id="4006" instrument_node="">Nocture in Black and Gold, the Falling Rocket</span></u></a></span><span data-dcnode-id="4002" instrument_node="">”. Whistler sued and won, but he had to declare bankruptcy and lost the “</span><span data-dcnode-id="3999" style="color:#800000;"><a data-dcnode-id="4000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.ca/search%3Fq%3Dwhistler%2Bwhite%2Bhouse%26tbm%3Disch%26tbo%3Du%26source%3Duniv%26sa%3DX%26ved%3D0ahUKEwi9u7LGmp_JAhWJXR4KHXWaCaEQsAQIIQ%26biw%3D1366%26bih%3D673" style="color:#800000;"><span data-dcnode-id="4001" instrument_node="">White House</span></a></span><span data-dcnode-id="3998" instrument_node="">” designed for him by&nbsp;</span><span data-dcnode-id="3994" style="color:#800000;"><a data-dcnode-id="3995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_William_Godwin" style="color:#800000;"><u data-dcnode-id="3996"><span data-dcnode-id="3997" instrument_node="">Arthur William Godwin</span></u></a></span><span data-dcnode-id="3993" instrument_node="">, the cabinet-maker who created the “sideboard” shown above.</span></p><span data-dcnode-id="3991" instrument_node="">
</span><p data-dcnode-id="3966"><span data-dcnode-id="3990" instrument_node="">Yet if the Pre-Raphaelites are to be linked to another&nbsp;19th-century British art movement,&nbsp;it would be the&nbsp;art for art’s sake&nbsp;</span><a data-dcnode-id="3988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//michelinewalker.com/2015/11/19/art-in-19th-century-england/Aesthetic%2520Movement"><span data-dcnode-id="3989" instrument_node="">Aesthetic Movement</span></a><span data-dcnode-id="3987" instrument_node=""> </span><span data-dcnode-id="3984" style="color:#800000;"><span data-dcnode-id="3985" style="color:#333333;"><span data-dcnode-id="3986" instrument_node="">w</span></span></span><span data-dcnode-id="3983" instrument_node="">hich paralleled, albeit to a lesser&nbsp;extent, the decadence of French poets and artists of the second half of 19th-century. French poets were drinking </span><span data-dcnode-id="3980" style="color:#800000;"><a data-dcnode-id="3981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Absinthe" style="color:#800000;"><span data-dcnode-id="3982" instrument_node="">absinthe</span></a></span><span data-dcnode-id="3979" instrument_node="">, which contained an </span><span data-dcnode-id="3976" style="color:#800000;"><a data-dcnode-id="3977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hallucinogen" style="color:#800000;"><span data-dcnode-id="3978" instrument_node="">hallucinogen</span></a></span><span data-dcnode-id="3975" instrument_node="">, </span><span data-dcnode-id="3972" style="color:#800000;"><a data-dcnode-id="3973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thujone" style="color:#800000;"><span data-dcnode-id="3974" instrument_node="">thujone</span></a></span><span data-dcnode-id="3971" instrument_node="">. For his part, Dante Gabriel Rossetti took </span><span data-dcnode-id="3968" style="color:#800000;"><a data-dcnode-id="3969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chloral" style="color:#800000;"><span data-dcnode-id="3970" instrument_node="">chloral</span></a></span><span data-dcnode-id="3967" instrument_node="">.</span></p><span data-dcnode-id="3965" instrument_node="">
</span><p data-dcnode-id="3952"><span data-dcnode-id="3964" instrument_node="">Although James McNeill Whistler introduced Dante Gabriel Rossetti to Japonism in 1860, the </span><strong data-dcnode-id="3962"><span data-dcnode-id="3963" instrument_node="">Pre-Raphaelite Brotherhood</span></strong><span data-dcnode-id="3961" instrument_node="">&nbsp;is not related to Japonism. It remains however&nbsp;that if the Aesthetic movement could accommodate&nbsp;“Ruskinian Gothic,” not to mention the medievalism of such devotees as </span><span data-dcnode-id="3958" style="color:#800000;"><a data-dcnode-id="3959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Morris" style="color:#800000;"><span data-dcnode-id="3960" instrument_node="">William Morris</span></a></span><span data-dcnode-id="3957" instrument_node=""> and </span><span data-dcnode-id="3954" style="color:#800000;"><a data-dcnode-id="3955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_Burne-Jones" style="color:#800000;"><span data-dcnode-id="3956" instrument_node="">Sir Edward Burne-Jones</span></a></span><span data-dcnode-id="3953" instrument_node="">, one wonders why it would reject Ruskinian “truth to nature”.</span></p><span data-dcnode-id="3951" instrument_node="">
</span><h3 data-dcnode-id="3949"><span data-dcnode-id="3950" instrument_node="">The Gothic</span></h3><span data-dcnode-id="3948" instrument_node="">
</span><ul data-dcnode-id="3940"><span data-dcnode-id="3947" instrument_node="">
</span><li data-dcnode-id="3945"><span data-dcnode-id="3946" instrument_node="">William Morris</span></li><span data-dcnode-id="3944" instrument_node="">
</span><li data-dcnode-id="3942"><span data-dcnode-id="3943" instrument_node="">Edward Burne-Jones</span></li><span data-dcnode-id="3941" instrument_node="">
</span></ul><span data-dcnode-id="3939" instrument_node="">
</span><p data-dcnode-id="3904"><span data-dcnode-id="3936" style="color:#800000;"><a data-dcnode-id="3937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_William_Godwin" style="color:#800000;"><span data-dcnode-id="3938" instrument_node="">Arthur William Godwin</span></a></span><span data-dcnode-id="3935" instrument_node="">‘s “sideboard” is in the </span><strong data-dcnode-id="3933"><span data-dcnode-id="3934" instrument_node="">Anglo-Japanese style</span></strong><span data-dcnode-id="3932" instrument_node="">,&nbsp; which, as is the case with all the movements listed above, is a forerunner of Aestheticism. As an architect-designer,&nbsp;Godwin, who designed the&nbsp;desk displayed above,&nbsp;also drew his inspiration from “</span><span data-dcnode-id="3929" style="color:#800000;"><a data-dcnode-id="3930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Ruskin" style="color:#800000;"><span data-dcnode-id="3931" instrument_node="">Ruskinian Gothic</span></a></span><span data-dcnode-id="3928" instrument_node="">”. Although exotic </span><strong data-dcnode-id="3926"><span data-dcnode-id="3927" instrument_node="">Japonism</span></strong><span data-dcnode-id="3925" instrument_node=""> helped shape the art of 19th-century Britain, the stained-glass pieces of </span><span data-dcnode-id="3921" style="color:#800000;"><a data-dcnode-id="3922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_Burne-Jones" style="color:#800000;"><u data-dcnode-id="3923"><span data-dcnode-id="3924" instrument_node="">Sir Edward Burne-Jones</span></u></a></span><span data-dcnode-id="3920" instrument_node="">&nbsp;(28 August 1833 – 17 June 1898) reached into the Medieval era, as did Arthur William Godwin’s gothic Northampton Guildhall.&nbsp;Morris and Burne-Jones&nbsp;met as students at Oxford and both were attracted&nbsp;to the&nbsp;</span><span data-dcnode-id="3916" style="color:#800000;"><a data-dcnode-id="3917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Middle_Ages" style="color:#800000;"><u data-dcnode-id="3918"><span data-dcnode-id="3919" instrument_node="">Middle Ages</span></u></a></span><span data-dcnode-id="3915" instrument_node="">, or Gothic, praised by </span><span data-dcnode-id="3911" style="color:#800000;"><a data-dcnode-id="3912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Ruskin" style="color:#800000;"><u data-dcnode-id="3913"><span data-dcnode-id="3914" instrument_node="">John Ruskin</span></u></a></span><span data-dcnode-id="3910" instrument_node=""> (8 February 1819&nbsp;– 20 January 1900) who&nbsp;was&nbsp;not only the most prominent art historian and critic of the </span><span data-dcnode-id="3906" style="color:#800000;"><a data-dcnode-id="3907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Victorian_era" style="color:#800000;"><u data-dcnode-id="3908"><span data-dcnode-id="3909" instrument_node="">Victorian era</span></u></a></span><span data-dcnode-id="3905" instrument_node="">,&nbsp;but also&nbsp;a fine artist.</span></p><span data-dcnode-id="3903" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="3895" data-shortcode="caption" id="attachment_61739" style="width: 1034px"><img alt="5439074743_7a7c500cd2_b" aria-describedby="caption-attachment-61739" class="alignnone size-full wp-image-61739" data-attachment-id="61739" data-comments-opened="1" data-dcnode-id="3902" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="5439074743_7a7c500cd2_b" data-large-file="https://michelinewalker.files.wordpress.com/2015/11/5439074743_7a7c500cd2_b.jpg?w=529" data-medium-file="https://michelinewalker.files.wordpress.com/2015/11/5439074743_7a7c500cd2_b.jpg?w=300" data-orig-file="https://michelinewalker.files.wordpress.com/2015/11/5439074743_7a7c500cd2_b.jpg" data-orig-size="1024,768" data-permalink="https://michelinewalker.com/2015/11/19/art-in-19th-century-england/5439074743_7a7c500cd2_b/" sizes="(max-width: 529px) 100vw, 529px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//michelinewalker.files.wordpress.com/2015/11/5439074743_7a7c500cd2_b.jpg%3Fw%3D529&amp;raw" srcset="https://michelinewalker.files.wordpress.com/2015/11/5439074743_7a7c500cd2_b.jpg?w=529 529w, https://michelinewalker.files.wordpress.com/2015/11/5439074743_7a7c500cd2_b.jpg?w=150 150w, https://michelinewalker.files.wordpress.com/2015/11/5439074743_7a7c500cd2_b.jpg?w=300 300w, https://michelinewalker.files.wordpress.com/2015/11/5439074743_7a7c500cd2_b.jpg?w=768 768w, https://michelinewalker.files.wordpress.com/2015/11/5439074743_7a7c500cd2_b.jpg 1024w"><p class="wp-caption-text" data-dcnode-id="3896" id="caption-attachment-61739"><strong data-dcnode-id="3900"><span data-dcnode-id="3901" instrument_node="">Northampton Guildhall</span></strong><span data-dcnode-id="3899" instrument_node="">, built 1861-64, displays Godwin’s &nbsp;“Ruskinian Gothic” Style </span><span data-dcnode-id="3897" style="color:#999999;"><span data-dcnode-id="3898" instrument_node="">(Photo credit: Flicker)</span></span></p></div><span data-dcnode-id="3894" instrument_node="">
</span><h3 data-dcnode-id="3890"><span data-dcnode-id="3893" instrument_node="">John Ruskin: </span><em data-dcnode-id="3891"><span data-dcnode-id="3892" instrument_node="">The Stones of Venice</span></em></h3><span data-dcnode-id="3889" instrument_node="">
</span><p data-dcnode-id="3854"><span data-dcnode-id="3888" instrument_node="">John Ruskin is the author of&nbsp;the </span><em data-dcnode-id="3883"><span data-dcnode-id="3884" style="color:#800000;"><a data-dcnode-id="3885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Stones_of_Venice_%28book%29" style="color:#800000;"><u data-dcnode-id="3886"><span data-dcnode-id="3887" instrument_node="">Stones of Venice</span></u></a></span></em><span data-dcnode-id="3882" instrument_node="">, published in three volumes between 1851 and 1853. William Morris was so impressed by a chapter entitled “On the Nature of the Gothic”, that he had it printed separately by Kelmscott Press, the </span><strong data-dcnode-id="3880"><span data-dcnode-id="3881" instrument_node="">Arts and Crafts</span></strong><span data-dcnode-id="3879" instrument_node=""> press, named after </span><span data-dcnode-id="3875" style="color:#800000;"><a data-dcnode-id="3876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kelmscott_Manor" style="color:#800000;"><u data-dcnode-id="3877"><span data-dcnode-id="3878" instrument_node="">Kelmscott Manor</span></u></a></span><span data-dcnode-id="3874" instrument_node="">, the Morris family’s country residence. (See </span><span data-dcnode-id="3870" style="color:#800000;"><a data-dcnode-id="3871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.victorianweb.org/authors/morris/kelmscott.html" style="color:#800000;"><u data-dcnode-id="3872"><span data-dcnode-id="3873" instrument_node="">Morris and the Kelmscott Press</span></u></a></span><span data-dcnode-id="3869" instrument_node="">, the Victorian Web.) In 1861, William Morris founded a firm, the </span><span data-dcnode-id="3866" style="color:#800000;"><a data-dcnode-id="3867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Morris_%2526_Co." style="color:#800000;"><span data-dcnode-id="3868" instrument_node="">Morris, Marshall, Faulkner &amp;&nbsp;Co</span></a></span><span data-dcnode-id="3865" instrument_node="">. (See </span><span data-dcnode-id="3861" style="color:#800000;"><a data-dcnode-id="3862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peter_Paul_Marshall" style="color:#800000;"><u data-dcnode-id="3863"><span data-dcnode-id="3864" instrument_node="">Peter Paul Marschall</span></u></a></span><span data-dcnode-id="3860" instrument_node=""> and </span><span data-dcnode-id="3856" style="color:#800000;"><a data-dcnode-id="3857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Joseph_Faulkner" style="color:#800000;"><u data-dcnode-id="3858"><span data-dcnode-id="3859" instrument_node="">Charles Joseph Faulkner</span></u></a></span><span data-dcnode-id="3855" instrument_node="">, Wikipedia.)</span></p><span data-dcnode-id="3853" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="3842" data-shortcode="caption" id="attachment_55831" style="width: 439px"><img alt="The Peacock room, The Princess from the land of porcelain by William McNeill Whistler (Photo credit: Wikipedia)" aria-describedby="caption-attachment-55831" class="wp-image-55831" data-attachment-id="55831" data-comments-opened="1" data-dcnode-id="3852" data-image-caption="<p>The Peacock room, The Princess from the land of porcelain by William McNeill Whistler (Photo credit: Wikipedia)</p>

3850"><span data-dcnode-id="3851" instrument_node="">The Peacock room, The Princess from the Land of</span></strong><span data-dcnode-id="3849" instrument_node=""> </span><strong data-dcnode-id="3847"><span data-dcnode-id="3848" instrument_node="">Porcelain</span></strong><span data-dcnode-id="3846" instrument_node=""> by William McNeill Whistler</span><span data-dcnode-id="3844" style="color:#999999;"><span data-dcnode-id="3845" instrument_node=""> (Photo credit: Wikipedia)</span></span></p></div><span data-dcnode-id="3841" instrument_node="">
</span><h3 data-dcnode-id="3837"><strong data-dcnode-id="3839"><span data-dcnode-id="3840" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="3838" instrument_node="">Japonism and the Aesthetic Movement</span></h3><span data-dcnode-id="3836" instrument_node="">
</span><p data-dcnode-id="3829" style="padding-left:30px;"><em data-dcnode-id="3834"><span data-dcnode-id="3835" instrument_node="">Whistler was one&nbsp;of the first to appreciate the true significance of the Japanese prints which had begun to appear in the West after Japan’s centuries of isolation ended in the 1850s, and to see that such works, whose subject matter was generally unknown or without much meaning even when it was ascertainable, forced people to think and to see entirely in terms of pictorial qualities, of line and pattern and color; to adapt them as demonstrations of the principle that Reality in painting is intrinsic, not a matter of copying anything outside itself.</span></em><strong data-dcnode-id="3830"><span data-dcnode-id="3832" style="color:#800000;"><span data-dcnode-id="3833" instrument_node="">[3]</span></span><span data-dcnode-id="3831" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="3828" instrument_node="">
</span><p data-dcnode-id="3799"><span data-dcnode-id="3827" instrument_node="">Japonism, however, would characterize the art&nbsp;of American but London-based </span><span data-dcnode-id="3823" style="color:#800000;"><a data-dcnode-id="3824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Abbott_McNeill_Whistler" style="color:#800000;"><u data-dcnode-id="3825"><span data-dcnode-id="3826" instrument_node="">James McNeill Whistler</span></u></a></span><span data-dcnode-id="3822" instrument_node=""> and American impressionist </span><a data-dcnode-id="3815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Merritt_Chase"><u data-dcnode-id="3816"><span data-dcnode-id="3820" style="color:#800000;"><span data-dcnode-id="3821" instrument_node="">William Merritt</span></span><span data-dcnode-id="3819" instrument_node=""> </span><span data-dcnode-id="3817" style="color:#800000;"><span data-dcnode-id="3818" instrument_node="">Chase</span></span></u></a><span data-dcnode-id="3814" instrument_node="">&nbsp;(1 November 1849 – 25 October 1916). Their Japonism is one of subject matter mainly, but exotic subject matter depicted in&nbsp;the rather allusive manner of </span><span data-dcnode-id="3811" style="color:#800000;"><a data-dcnode-id="3812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Impressionism" style="color:#800000;"><span data-dcnode-id="3813" instrument_node="">Impressionism</span></a></span><span data-dcnode-id="3810" instrument_node="">. Both showed blue and white porcelain, fans, screens and ladies wearing </span><span data-dcnode-id="3806" style="color:#800000;"><a data-dcnode-id="3807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kimono" style="color:#800000;"><u data-dcnode-id="3808"><span data-dcnode-id="3809" instrument_node="">kimonos</span></u></a></span><span data-dcnode-id="3805" instrument_node=""> that displayed an oriental&nbsp;motif. “The Blue Kimono,” featured below, is one of the finest paintings created by </span><span data-dcnode-id="3801" style="color:#800000;"><a data-dcnode-id="3802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Merritt_Chase" style="color:#800000;"><u data-dcnode-id="3803"><span data-dcnode-id="3804" instrument_node="">William Merritt Chase</span></u></a></span><span data-dcnode-id="3800" instrument_node="">.</span></p><span data-dcnode-id="3798" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="3785" data-shortcode="caption" id="attachment_55981" style="width: 539px"><img alt="The Blue Kimono by William Meritt Chase, 1898 (Photo credit: WikiArt.org)" aria-describedby="caption-attachment-55981" class="size-large wp-image-55981" data-attachment-id="55981" data-comments-opened="1" data-dcnode-id="3797" data-image-caption="<p>The Blue Kimono by William Meritt Chase, 1898 (Photo credit: WikiArt.org)</p>

</span><li data-dcnode-id="3766"><span data-dcnode-id="3767" instrument_node="">studios copied</span></li><span data-dcnode-id="3765" instrument_node="">
</span></ul><span data-dcnode-id="3763" instrument_node="">
</span><p data-dcnode-id="3747"><span data-dcnode-id="3762" instrument_node="">Ironically, it could be said of both Whistler and Chase that their Japonism was of a decorative nature. The rooms they showed became fashionable and so did the clothes worn by the ladies they portrayed. Whistler’s “Peacock Room” is not altogether consistent with the domestication&nbsp;of the arts advocated by the </span><strong data-dcnode-id="3760"><span data-dcnode-id="3761" instrument_node="">Arts and Crafts Movement</span></strong><span data-dcnode-id="3759" instrument_node="">, founded by William Morris.&nbsp;Whistler’s “</span><span data-dcnode-id="3756" style="color:#800000;"><a data-dcnode-id="3757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Peacock_Room" style="color:#800000;"><span data-dcnode-id="3758" instrument_node="">Peacock Room</span></a></span><span data-dcnode-id="3755" instrument_node="">” is a room,&nbsp;but it borders on art for art’s sake. It was designed in the </span><strong data-dcnode-id="3753"><span data-dcnode-id="3754" instrument_node="">Anglo-Japanese style</span></strong><span data-dcnode-id="3752" instrument_node=""> and&nbsp;is housed in the </span><span data-dcnode-id="3749" style="color:#800000;"><a data-dcnode-id="3750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freer_Gallery_of_Art" style="color:#800000;"><span data-dcnode-id="3751" instrument_node="">Freer Gallery of Art</span></a></span><span data-dcnode-id="3748" instrument_node="">, in Washington D.C..</span></p><span data-dcnode-id="3746" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="3735" data-shortcode="caption" id="attachment_57094" style="width: 310px"><img alt="The Teenth Street Studio by William Merrit Chase http://www.wikiart.org/en/william-merritt-chase/the-tenth-street-studio-1915" aria-describedby="caption-attachment-57094" class="size-medium wp-image-57094" data-attachment-id="57094" data-comments-opened="1" data-dcnode-id="3745" data-image-caption="<p>The Teenth Street Studio by William Merrit Chase http://www.wikiart.org/en/william-merritt-chase/the-tenth-street-studio-1915</p>

(Photo credit: </span><a data-dcnode-id="3739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wikiart.org/en/william-merritt-chase/the-tenth-street-studio-1915"><span data-dcnode-id="3740" instrument_node="">WikiArt.org</span></a><span data-dcnode-id="3738" instrument_node="">)</span></span></p></div><span data-dcnode-id="3734" instrument_node="">
</span><h3 data-dcnode-id="3732"><span data-dcnode-id="3733" instrument_node="">Conclusion</span></h3><span data-dcnode-id="3731" instrument_node="">
</span><ul data-dcnode-id="3723"><span data-dcnode-id="3730" instrument_node="">
</span><li data-dcnode-id="3728"><span data-dcnode-id="3729" instrument_node="">the broadening of the arts</span></li><span data-dcnode-id="3727" instrument_node="">
</span><li data-dcnode-id="3725"><span data-dcnode-id="3726" instrument_node="">the versatility of artists</span></li><span data-dcnode-id="3724" instrument_node="">
</span></ul><span data-dcnode-id="3722" instrument_node="">
</span><p data-dcnode-id="3698"><a data-dcnode-id="3717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anglo-Japanese_style"><u data-dcnode-id="3718"><span data-dcnode-id="3719" style="color:#0066cc;"><span data-dcnode-id="3720" style="color:#800000;"><span data-dcnode-id="3721" instrument_node="">Anglo-Japanese Style</span></span></span></u></a><span data-dcnode-id="3716" instrument_node="">&nbsp;was applied to cabinet-making. However, the 19th-century British art movement we tend to associate&nbsp;with interior design and the decorative arts is the </span><span data-dcnode-id="3712" style="color:#800000;"><a data-dcnode-id="3713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arts_and_Crafts_movement" style="color:#800000;"><u data-dcnode-id="3714"><span data-dcnode-id="3715" instrument_node="">Arts and Crafts Movement</span></u></a></span><span data-dcnode-id="3711" instrument_node="">, founded by </span><span data-dcnode-id="3706" style="color:#800000;"><a data-dcnode-id="3708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Morris" style="color:#800000;"><u data-dcnode-id="3709"><span data-dcnode-id="3710" instrument_node="">William Morris</span></u></a><span data-dcnode-id="3707" instrument_node="">&nbsp;</span></span><span data-dcnode-id="3705" instrument_node="">(24 March 1834 – 3 October 1896). The </span><strong data-dcnode-id="3703"><span data-dcnode-id="3704" instrument_node="">Arts and Crafts Movement</span></strong><span data-dcnode-id="3702" instrument_node=""> will be discussed in a&nbsp;separate post, but we have already witnessed a certain domestication of the art and a broadening of the field of art. Henceforth, it will include applied&nbsp;arts and such artists as&nbsp;William Morris and Sir Edward Burne-Jones&nbsp;will be extremely&nbsp;</span><strong data-dcnode-id="3700"><span data-dcnode-id="3701" instrument_node="">versatile.</span></strong><span data-dcnode-id="3699" instrument_node=""> Whistler, who designed the luxurious “Peacock Room” and sued revered Ruskin, was&nbsp;an interior designer, a painter, and&nbsp;a printmaker.</span></p><span data-dcnode-id="3697" instrument_node="">
