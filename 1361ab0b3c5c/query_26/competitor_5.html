span data-dcnode-id="7672" instrument_node="">
</span><p data-dcnode-id="7652"><span data-dcnode-id="7671" instrument_node="">In the United States, the Arts and Crafts style initiated a variety of attempts to reinterpret European Arts and Crafts ideals for Americans. These included the "Craftsman"-style architecture, furniture, and other decorative arts such as designs promoted by </span><a data-dcnode-id="7669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gustav_Stickley" title="Gustav Stickley"><span data-dcnode-id="7670" instrument_node="">Gustav Stickley</span></a><span data-dcnode-id="7668" instrument_node=""> in his magazine, </span><i data-dcnode-id="7666"><span data-dcnode-id="7667" instrument_node="">The Craftsman</span></i><span data-dcnode-id="7665" instrument_node=""> and designs produced on the Roycroft campus as publicized in Elbert Hubbard's </span><i data-dcnode-id="7663"><span data-dcnode-id="7664" instrument_node="">The Fra</span></i><span data-dcnode-id="7662" instrument_node="">.  Both men used their magazines as a vehicle to promote the goods produced with the Craftsman workshop in Eastwood, NY and Elbert Hubbard's </span><a data-dcnode-id="7660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roycroft" title="Roycroft"><span data-dcnode-id="7661" instrument_node="">Roycroft</span></a><span data-dcnode-id="7659" instrument_node=""> campus in </span><a class="mw-redirect" data-dcnode-id="7657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/East_Aurora%2C_NY" title="East Aurora, NY"><span data-dcnode-id="7658" instrument_node="">East Aurora, NY</span></a><span data-dcnode-id="7656" instrument_node="">. A host of imitators of Stickley's furniture (the designs of which are often mislabelled the "</span><a data-dcnode-id="7654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Craftsman" title="American Craftsman"><span data-dcnode-id="7655" instrument_node="">Mission Style</span></a><span data-dcnode-id="7653" instrument_node="">") included three companies established by his brothers.
</span></p><p data-dcnode-id="7615"><span data-dcnode-id="7651" instrument_node="">The terms </span><i data-dcnode-id="7648"><a data-dcnode-id="7649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Craftsman" title="American Craftsman"><span data-dcnode-id="7650" instrument_node="">American Craftsman</span></a></i><span data-dcnode-id="7647" instrument_node=""> or </span><i data-dcnode-id="7645"><span data-dcnode-id="7646" instrument_node="">Craftsman style</span></i><span data-dcnode-id="7644" instrument_node=""> are often used to denote the style of architecture, interior design, and decorative arts that prevailed between the dominant eras of </span><a data-dcnode-id="7642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Art_Nouveau" title="Art Nouveau"><span data-dcnode-id="7643" instrument_node="">Art Nouveau</span></a><span data-dcnode-id="7641" instrument_node=""> and </span><a data-dcnode-id="7639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Art_Deco" title="Art Deco"><span data-dcnode-id="7640" instrument_node="">Art Deco</span></a><span data-dcnode-id="7638" instrument_node=""> in the US, or approximately the period from 1910 to 1925.  The movement was particularly notable for the professional opportunities it opened up for women as artisans, designers and entrepreneurs who founded and ran, or were employed by, such successful enterprises as the </span><a data-dcnode-id="7636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kalo_Shops" title="Kalo Shops"><span data-dcnode-id="7637" instrument_node="">Kalo Shops</span></a><span data-dcnode-id="7635" instrument_node="">, </span><a data-dcnode-id="7633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pewabic_Pottery" title="Pewabic Pottery"><span data-dcnode-id="7634" instrument_node="">Pewabic Pottery</span></a><span data-dcnode-id="7632" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="7630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rookwood_Pottery" title="Rookwood Pottery"><span data-dcnode-id="7631" instrument_node="">Rookwood Pottery</span></a><span data-dcnode-id="7629" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="7627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tiffany_Studios" title="Tiffany Studios"><span data-dcnode-id="7628" instrument_node="">Tiffany Studios</span></a><span data-dcnode-id="7626" instrument_node="">. In Canada, the term </span><i data-dcnode-id="7624"><span data-dcnode-id="7625" instrument_node="">Arts and Crafts</span></i><span data-dcnode-id="7623" instrument_node=""> predominates, but </span><i data-dcnode-id="7621"><span data-dcnode-id="7622" instrument_node="">Craftsman</span></i><span data-dcnode-id="7620" instrument_node=""> is also recognized.</span><sup class="reference" data-dcnode-id="7617" id="cite_ref-75"><a data-dcnode-id="7618" href="#cite_note-75"><span data-dcnode-id="7619" instrument_node="">[75]</span></a></sup><span data-dcnode-id="7616" instrument_node="">
</span></p><p data-dcnode-id="7600"><span data-dcnode-id="7614" instrument_node="">While the Europeans tried to recreate the virtuous crafts being replaced by industrialisation, Americans tried to establish a new type of virtue to replace heroic craft production: well-decorated middle-class homes. They claimed that the simple but refined aesthetics of Arts and Crafts decorative arts would ennoble the new experience of industrial consumerism, making individuals more rational and society more harmonious. The American Arts and Crafts movement was the aesthetic counterpart of its contemporary political philosophy, </span><a data-dcnode-id="7612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Progressivism" title="Progressivism"><span data-dcnode-id="7613" instrument_node="">progressivism</span></a><span data-dcnode-id="7611" instrument_node="">. Characteristically, when the Arts and Crafts Society began in October 1897 in Chicago, it was at </span><a data-dcnode-id="7609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hull_House" title="Hull House"><span data-dcnode-id="7610" instrument_node="">Hull House</span></a><span data-dcnode-id="7608" instrument_node="">, one of the first American </span><a class="mw-redirect" data-dcnode-id="7606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Settlement_house" title="Settlement house"><span data-dcnode-id="7607" instrument_node="">settlement houses</span></a><span data-dcnode-id="7605" instrument_node=""> for social reform.</span><sup class="reference" data-dcnode-id="7602" id="cite_ref-Obniski_76-0"><a data-dcnode-id="7603" href="#cite_note-Obniski-76"><span data-dcnode-id="7604" instrument_node="">[76]</span></a></sup><span data-dcnode-id="7601" instrument_node="">
</span></p><p data-dcnode-id="7576"><span data-dcnode-id="7599" instrument_node="">Arts and Crafts ideals disseminated in America through journal and newspaper writing were supplemented by societies that sponsored lectures.</span><sup class="reference" data-dcnode-id="7596" id="cite_ref-Obniski_76-1"><a data-dcnode-id="7597" href="#cite_note-Obniski-76"><span data-dcnode-id="7598" instrument_node="">[76]</span></a></sup><span data-dcnode-id="7595" instrument_node=""> The first was organized in Boston in the late 1890s, when a group of influential architects, designers, and educators determined to bring to America the design reforms begun in Britain by William Morris; they met to organize an exhibition of contemporary craft objects. The first meeting was held on January 4, 1897, at the </span><a data-dcnode-id="7593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Museum_of_Fine_Arts%2C_Boston" title="Museum of Fine Arts, Boston"><span data-dcnode-id="7594" instrument_node="">Museum of Fine Arts</span></a><span data-dcnode-id="7592" instrument_node=""> (MFA) in Boston to organize an exhibition of contemporary crafts. When craftsmen, consumers, and manufacturers realised the aesthetic and technical potential of the applied arts, the process of design reform in Boston started. Present at this meeting were General Charles Loring, Chairman of the Trustees of the MFA; </span><a data-dcnode-id="7590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Sturgis_Bigelow" title="William Sturgis Bigelow"><span data-dcnode-id="7591" instrument_node="">William Sturgis Bigelow</span></a><span data-dcnode-id="7589" instrument_node=""> and </span><a data-dcnode-id="7587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Denman_Ross" title="Denman Ross"><span data-dcnode-id="7588" instrument_node="">Denman Ross</span></a><span data-dcnode-id="7586" instrument_node="">, collectors, writers and MFA trustees; Ross Turner, painter; </span><a data-dcnode-id="7584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sylvester_Baxter" title="Sylvester Baxter"><span data-dcnode-id="7585" instrument_node="">Sylvester Baxter</span></a><span data-dcnode-id="7583" instrument_node="">, art critic for the </span><i data-dcnode-id="7581"><span data-dcnode-id="7582" instrument_node="">Boston Transcript</span></i><span data-dcnode-id="7580" instrument_node="">; Howard Baker, </span><a data-dcnode-id="7578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alexander_Wadsworth_Longfellow_Jr." title="Alexander Wadsworth Longfellow Jr."><span data-dcnode-id="7579" instrument_node="">A.W. Longfellow Jr.</span></a><span data-dcnode-id="7577" instrument_node="">; and Ralph Clipson Sturgis, architect.
</span></p><p data-dcnode-id="7561"><span data-dcnode-id="7575" instrument_node="">The first American Arts and Crafts Exhibition began on April 5, 1897, at </span><a class="mw-redirect" data-dcnode-id="7573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Copley_Hall%2C_Boston" title="Copley Hall, Boston"><span data-dcnode-id="7574" instrument_node="">Copley Hall, Boston</span></a><span data-dcnode-id="7572" instrument_node=""> featuring more than 1000 objects made by 160 craftsmen, half of whom were women.</span><sup class="reference" data-dcnode-id="7569" id="cite_ref-77"><a data-dcnode-id="7570" href="#cite_note-77"><span data-dcnode-id="7571" instrument_node="">[77]</span></a></sup><span data-dcnode-id="7568" instrument_node=""> Some of the advocates of the exhibit were Langford Warren, founder of Harvard's School of Architecture; Mrs. Richard Morris Hunt; Arthur Astor Carey and Edwin Mead, social reformers; and </span><a data-dcnode-id="7566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Will_H._Bradley" title="Will H. Bradley"><span data-dcnode-id="7567" instrument_node="">Will H. Bradley</span></a><span data-dcnode-id="7565" instrument_node="">, graphic designer. The success of this exhibition resulted in the incorporation of The Society of Arts and Crafts (SAC), on June 28, 1897, with a mandate to "develop and encourage higher standards in the handicrafts." The 21 founders claimed to be interested in more than sales, and emphasized encouragement of artists to produce work with the best quality of workmanship and design. This mandate was soon expanded into a credo, possibly written by the SAC's first president, </span><a data-dcnode-id="7563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Eliot_Norton" title="Charles Eliot Norton"><span data-dcnode-id="7564" instrument_node="">Charles Eliot Norton</span></a><span data-dcnode-id="7562" instrument_node="">, which read:
</span></p><span data-dcnode-id="7560" instrument_node="">
</span><blockquote data-dcnode-id="7554"><p data-dcnode-id="7555"><span data-dcnode-id="7559" instrument_node="">This Society was incorporated for the purpose of promoting artistic work in all branches of handicraft. It hopes to bring Designers and Workmen into mutually helpful relations, and to encourage workmen to execute designs of their own. It endeavors to stimulate in workmen an appreciation of the dignity and value of good design; to counteract the popular impatience of Law and Form, and the desire for over-ornamentation and specious originality. It will insist upon the necessity of sobriety and restraint, or ordered arrangement, of due regard for the relation between the form of an object and its use, and of harmony and fitness in the decoration put upon it.</span><sup class="reference" data-dcnode-id="7556" id="cite_ref-78"><a data-dcnode-id="7557" href="#cite_note-78"><span data-dcnode-id="7558" instrument_node="">[78]</span></a></sup></p></blockquote><span data-dcnode-id="7553" instrument_node="">
</span><p data-dcnode-id="7529"><span data-dcnode-id="7552" instrument_node="">Built in 1913–14 by the Boston architect </span><a data-dcnode-id="7550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/J._Williams_Beal" title="J. Williams Beal"><span data-dcnode-id="7551" instrument_node="">J. Williams Beal</span></a><span data-dcnode-id="7549" instrument_node=""> in the </span><a data-dcnode-id="7547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ossipee_Mountains" title="Ossipee Mountains"><span data-dcnode-id="7548" instrument_node="">Ossipee Mountains</span></a><span data-dcnode-id="7546" instrument_node=""> of </span><a data-dcnode-id="7544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Hampshire" title="New Hampshire"><span data-dcnode-id="7545" instrument_node="">New Hampshire</span></a><span data-dcnode-id="7543" instrument_node="">, </span><a data-dcnode-id="7541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Gustave_Plant" title="Thomas Gustave Plant"><span data-dcnode-id="7542" instrument_node="">Tom and Olive Plant's</span></a><span data-dcnode-id="7540" instrument_node=""> mountaintop estate, </span><a data-dcnode-id="7538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Castle_in_the_Clouds" title="Castle in the Clouds"><span data-dcnode-id="7539" instrument_node="">Castle in the Clouds</span></a><span data-dcnode-id="7537" instrument_node=""> also known as </span><i data-dcnode-id="7535"><span data-dcnode-id="7536" instrument_node="">Lucknow</span></i><span data-dcnode-id="7534" instrument_node="">, is an excellent example of the American Craftsman style in New England.</span><sup class="reference" data-dcnode-id="7531" id="cite_ref-79"><a data-dcnode-id="7532" href="#cite_note-79"><span data-dcnode-id="7533" instrument_node="">[79]</span></a></sup><span data-dcnode-id="7530" instrument_node="">
</span></p><p data-dcnode-id="7449"><span data-dcnode-id="7528" instrument_node="">Also influential were the </span><a data-dcnode-id="7526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roycroft" title="Roycroft"><span data-dcnode-id="7527" instrument_node="">Roycroft</span></a><span data-dcnode-id="7525" instrument_node=""> community initiated by </span><a data-dcnode-id="7523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elbert_Hubbard" title="Elbert Hubbard"><span data-dcnode-id="7524" instrument_node="">Elbert Hubbard</span></a><span data-dcnode-id="7522" instrument_node=""> in </span><a data-dcnode-id="7520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Buffalo%2C_New_York" title="Buffalo, New York"><span data-dcnode-id="7521" instrument_node="">Buffalo</span></a><span data-dcnode-id="7519" instrument_node=""> and </span><a data-dcnode-id="7517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/East_Aurora%2C_New_York" title="East Aurora, New York"><span data-dcnode-id="7518" instrument_node="">East Aurora, New York</span></a><span data-dcnode-id="7516" instrument_node="">, </span><a class="new" data-dcnode-id="7514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DJoseph_Marbella%26action%3Dedit%26redlink%3D1" title="Joseph Marbella (page does not exist)"><span data-dcnode-id="7515" instrument_node="">Joseph Marbella</span></a><span data-dcnode-id="7513" instrument_node="">,  utopian communities like </span><a data-dcnode-id="7511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Byrdcliffe_Colony" title="Byrdcliffe Colony"><span data-dcnode-id="7512" instrument_node="">Byrdcliffe Colony</span></a><span data-dcnode-id="7510" instrument_node=""> in </span><a data-dcnode-id="7508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Woodstock%2C_New_York" title="Woodstock, New York"><span data-dcnode-id="7509" instrument_node="">Woodstock, New York</span></a><span data-dcnode-id="7507" instrument_node="">, and </span><a data-dcnode-id="7505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rose_Valley%2C_Pennsylvania" title="Rose Valley, Pennsylvania"><span data-dcnode-id="7506" instrument_node="">Rose Valley, Pennsylvania</span></a><span data-dcnode-id="7504" instrument_node="">, developments such as </span><a data-dcnode-id="7502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mountain_Lakes%2C_New_Jersey" title="Mountain Lakes, New Jersey"><span data-dcnode-id="7503" instrument_node="">Mountain Lakes, New Jersey</span></a><span data-dcnode-id="7501" instrument_node="">, featuring clusters of bungalow and chateau homes built by Herbert J. Hapgood, and the contemporary studio craft style. </span><a data-dcnode-id="7499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Studio_pottery" title="Studio pottery"><span data-dcnode-id="7500" instrument_node="">Studio pottery</span></a><span data-dcnode-id="7498" instrument_node=""> – exemplified by the </span><a data-dcnode-id="7496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grueby_Faience_Company" title="Grueby Faience Company"><span data-dcnode-id="7497" instrument_node="">Grueby Faience Company</span></a><span data-dcnode-id="7495" instrument_node="">, </span><a data-dcnode-id="7493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Newcomb_Pottery" title="Newcomb Pottery"><span data-dcnode-id="7494" instrument_node="">Newcomb Pottery</span></a><span data-dcnode-id="7492" instrument_node=""> in </span><a data-dcnode-id="7490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Orleans" title="New Orleans"><span data-dcnode-id="7491" instrument_node="">New Orleans</span></a><span data-dcnode-id="7489" instrument_node="">, </span><a class="new" data-dcnode-id="7487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMarblehead_Pottery%26action%3Dedit%26redlink%3D1" title="Marblehead Pottery (page does not exist)"><span data-dcnode-id="7488" instrument_node="">Marblehead Pottery</span></a><span data-dcnode-id="7486" instrument_node="">, </span><a data-dcnode-id="7484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Teco_pottery" title="Teco pottery"><span data-dcnode-id="7485" instrument_node="">Teco pottery</span></a><span data-dcnode-id="7483" instrument_node="">, </span><a data-dcnode-id="7481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Overbeck_Sisters" title="Overbeck Sisters"><span data-dcnode-id="7482" instrument_node="">Overbeck</span></a><span data-dcnode-id="7480" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="7478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rookwood_pottery" title="Rookwood pottery"><span data-dcnode-id="7479" instrument_node="">Rookwood pottery</span></a><span data-dcnode-id="7477" instrument_node=""> and </span><a data-dcnode-id="7475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mary_Chase_Perry_Stratton" title="Mary Chase Perry Stratton"><span data-dcnode-id="7476" instrument_node="">Mary Chase Perry Stratton</span></a><span data-dcnode-id="7474" instrument_node="">'s </span><a data-dcnode-id="7472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pewabic_Pottery" title="Pewabic Pottery"><span data-dcnode-id="7473" instrument_node="">Pewabic Pottery</span></a><span data-dcnode-id="7471" instrument_node=""> in </span><a class="mw-redirect" data-dcnode-id="7469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Detroit%2C_Michigan" title="Detroit, Michigan"><span data-dcnode-id="7470" instrument_node="">Detroit</span></a><span data-dcnode-id="7468" instrument_node="">, the </span><a data-dcnode-id="7466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Van_Briggle_Pottery" title="Van Briggle Pottery"><span data-dcnode-id="7467" instrument_node="">Van Briggle Pottery</span></a><span data-dcnode-id="7465" instrument_node=""> company in </span><a data-dcnode-id="7463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colorado_Springs%2C_Colorado" title="Colorado Springs, Colorado"><span data-dcnode-id="7464" instrument_node="">Colorado Springs, Colorado</span></a><span data-dcnode-id="7462" instrument_node="">,  as well as the art </span><a data-dcnode-id="7460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tile" title="Tile"><span data-dcnode-id="7461" instrument_node="">tiles</span></a><span data-dcnode-id="7459" instrument_node=""> made by </span><a data-dcnode-id="7457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ernest_A._Batchelder" title="Ernest A. Batchelder"><span data-dcnode-id="7458" instrument_node="">Ernest A. Batchelder</span></a><span data-dcnode-id="7456" instrument_node=""> in </span><a data-dcnode-id="7454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pasadena%2C_California" title="Pasadena, California"><span data-dcnode-id="7455" instrument_node="">Pasadena, California</span></a><span data-dcnode-id="7453" instrument_node="">, and idiosyncratic furniture of </span><a data-dcnode-id="7451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Rohlfs" title="Charles Rohlfs"><span data-dcnode-id="7452" instrument_node="">Charles Rohlfs</span></a><span data-dcnode-id="7450" instrument_node=""> all demonstrate the influence of Arts and Crafts.
</span></p><span data-dcnode-id="7448" instrument_node="">
</span><h4 data-dcnode-id="7438"><span class="mw-headline" data-dcnode-id="7446" id="Architecture_and_Art"><span data-dcnode-id="7447" instrument_node="">Architecture and Art</span></span><span class="mw-editsection" data-dcnode-id="7439"><span class="mw-editsection-bracket" data-dcnode-id="7444"><span data-dcnode-id="7445" instrument_node="">[</span></span><a data-dcnode-id="7442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DArts_and_Crafts_movement%26action%3Dedit%26section%3D19" title="Edit section: Architecture and Art"><span data-dcnode-id="7443" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7440"><span data-dcnode-id="7441" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7437" instrument_node="">
</span><p data-dcnode-id="7393"><span data-dcnode-id="7436" instrument_node="">The "</span><a data-dcnode-id="7434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prairie_School" title="Prairie School"><span data-dcnode-id="7435" instrument_node="">Prairie School</span></a><span data-dcnode-id="7433" instrument_node="">" of </span><a data-dcnode-id="7431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frank_Lloyd_Wright" title="Frank Lloyd Wright"><span data-dcnode-id="7432" instrument_node="">Frank Lloyd Wright</span></a><span data-dcnode-id="7430" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="7428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Washington_Maher" title="George Washington Maher"><span data-dcnode-id="7429" instrument_node="">George Washington Maher</span></a><span data-dcnode-id="7427" instrument_node=""> and other architects in Chicago, the </span><a data-dcnode-id="7425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Country_Day_School_movement" title="Country Day School movement"><span data-dcnode-id="7426" instrument_node="">Country Day School movement</span></a><span data-dcnode-id="7424" instrument_node="">, the </span><a data-dcnode-id="7422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bungalow" title="Bungalow"><span data-dcnode-id="7423" instrument_node="">bungalow</span></a><span data-dcnode-id="7421" instrument_node=""> and </span><a data-dcnode-id="7419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ultimate_bungalow" title="Ultimate bungalow"><span data-dcnode-id="7420" instrument_node="">ultimate bungalow</span></a><span data-dcnode-id="7418" instrument_node=""> style of houses popularized by </span><a data-dcnode-id="7416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greene_and_Greene" title="Greene and Greene"><span data-dcnode-id="7417" instrument_node="">Greene and Greene</span></a><span data-dcnode-id="7415" instrument_node="">, </span><a data-dcnode-id="7413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Julia_Morgan" title="Julia Morgan"><span data-dcnode-id="7414" instrument_node="">Julia Morgan</span></a><span data-dcnode-id="7412" instrument_node="">, and </span><a data-dcnode-id="7410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bernard_Maybeck" title="Bernard Maybeck"><span data-dcnode-id="7411" instrument_node="">Bernard Maybeck</span></a><span data-dcnode-id="7409" instrument_node=""> are some examples of the American Arts and Crafts and </span><a data-dcnode-id="7407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Craftsman" title="American Craftsman"><span data-dcnode-id="7408" instrument_node="">American Craftsman</span></a><span data-dcnode-id="7406" instrument_node=""> style of architecture. Restored and landmark-protected examples are still present in America, especially in California in </span><a data-dcnode-id="7404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Berkeley%2C_California" title="Berkeley, California"><span data-dcnode-id="7405" instrument_node="">Berkeley</span></a><span data-dcnode-id="7403" instrument_node=""> and </span><a data-dcnode-id="7401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pasadena%2C_California" title="Pasadena, California"><span data-dcnode-id="7402" instrument_node="">Pasadena</span></a><span data-dcnode-id="7400" instrument_node="">, and the sections of other towns originally developed during the era and not experiencing post-war urban renewal. </span><a class="mw-redirect" data-dcnode-id="7398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mission_Revival_Style_architecture" title="Mission Revival Style architecture"><span data-dcnode-id="7399" instrument_node="">Mission Revival</span></a><span data-dcnode-id="7397" instrument_node="">, Prairie School, and the '</span><a data-dcnode-id="7395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/California_bungalow" title="California bungalow"><span data-dcnode-id="7396" instrument_node="">California bungalow</span></a><span data-dcnode-id="7394" instrument_node="">' styles of residential building remain popular in the United States today.
</span></p><p data-dcnode-id="7362"><span data-dcnode-id="7392" instrument_node="">As theoreticians, educators, and prolific artists in mediums from printmaking to pottery and pastel, two of the most influential figures were </span><a data-dcnode-id="7390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arthur_Wesley_Dow" title="Arthur Wesley Dow"><span data-dcnode-id="7391" instrument_node="">Arthur Wesley Dow</span></a><span data-dcnode-id="7389" instrument_node=""> (1857–1922) on the East Coast and </span><a data-dcnode-id="7387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pedro_Joseph_de_Lemos" title="Pedro Joseph de Lemos"><span data-dcnode-id="7388" instrument_node="">Pedro Joseph de Lemos</span></a><span data-dcnode-id="7386" instrument_node=""> (1882–1954) in California.  Dow, who taught at </span><a data-dcnode-id="7384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Columbia_University" title="Columbia University"><span data-dcnode-id="7385" instrument_node="">Columbia University</span></a><span data-dcnode-id="7383" instrument_node=""> and founded the Ipswich Summer School of Art, published in 1899 his landmark </span><i data-dcnode-id="7381"><span data-dcnode-id="7382" instrument_node="">Composition</span></i><span data-dcnode-id="7380" instrument_node="">, which distilled into a distinctly American approach the essence of Japanese composition, combining into a decorative harmonious amalgam three elements: simplicity of line, "notan" (the balance of light and dark areas), and symmetry of color.</span><sup class="reference" data-dcnode-id="7377" id="cite_ref-green_80-0"><a data-dcnode-id="7378" href="#cite_note-green-80"><span data-dcnode-id="7379" instrument_node="">[80]</span></a></sup><span data-dcnode-id="7376" instrument_node="">  His purpose was to create objects that were finely crafted and beautifully rendered.  His student de Lemos, who became head of the </span><a data-dcnode-id="7374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/San_Francisco_Art_Institute" title="San Francisco Art Institute"><span data-dcnode-id="7375" instrument_node="">San Francisco Art Institute</span></a><span data-dcnode-id="7373" instrument_node="">, Director of the </span><a data-dcnode-id="7371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stanford_University" title="Stanford University"><span data-dcnode-id="7372" instrument_node="">Stanford University</span></a><span data-dcnode-id="7370" instrument_node=""> Museum and Art Gallery, and Editor-in-Chief of the </span><i data-dcnode-id="7368"><span data-dcnode-id="7369" instrument_node="">School Arts Magazine</span></i><span data-dcnode-id="7367" instrument_node="">, expanded and substantially revised Dow's ideas in over 150 monographs and articles for art schools in the United States and Britain.</span><sup class="reference" data-dcnode-id="7364" id="cite_ref-edwardsrw_81-0"><a data-dcnode-id="7365" href="#cite_note-edwardsrw-81"><span data-dcnode-id="7366" instrument_node="">[81]</span></a></sup><span data-dcnode-id="7363" instrument_node="">  Among his many unorthodox teachings was his belief that manufactured products could express "the sublime beauty" and that great insight was to be found in the abstract "design forms" of pre-Columbian civilizations.
</span></p><span data-dcnode-id="7361" instrument_node="">
</span><h4 data-dcnode-id="7351"><span class="mw-headline" data-dcnode-id="7359" id="Museums"><span data-dcnode-id="7360" instrument_node="">Museums</span></span><span class="mw-editsection" data-dcnode-id="7352"><span class="mw-editsection-bracket" data-dcnode-id="7357"><span data-dcnode-id="7358" instrument_node="">[</span></span><a data-dcnode-id="7355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DArts_and_Crafts_movement%26action%3Dedit%26section%3D20" title="Edit section: Museums"><span data-dcnode-id="7356" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7353"><span data-dcnode-id="7354" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7350" instrument_node="">
</span><p data-dcnode-id="7335"><span data-dcnode-id="7349" instrument_node="">The </span><a data-dcnode-id="7347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Museum_of_the_American_Arts_and_Crafts_Movement" title="Museum of the American Arts and Crafts Movement"><span data-dcnode-id="7348" instrument_node="">Museum of the American Arts and Crafts Movement</span></a><span data-dcnode-id="7346" instrument_node=""> in </span><a data-dcnode-id="7344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/St._Petersburg%2C_Florida" title="St. Petersburg, Florida"><span data-dcnode-id="7345" instrument_node="">St. Petersburg, Florida</span></a><span data-dcnode-id="7343" instrument_node="">, opened its doors in 2019.</span><sup class="reference" data-dcnode-id="7340" id="cite_ref-Construction_82-0"><a data-dcnode-id="7341" href="#cite_note-Construction-82"><span data-dcnode-id="7342" instrument_node="">[82]</span></a></sup><sup class="reference" data-dcnode-id="7337" id="cite_ref-Nichols_83-0"><a data-dcnode-id="7338" href="#cite_note-Nichols-83"><span data-dcnode-id="7339" instrument_node="">[83]</span></a></sup><span data-dcnode-id="7336" instrument_node="">
</span></p><span data-dcnode-id="7334" instrument_node="">
</span><h3 data-dcnode-id="7324"><span class="mw-headline" data-dcnode-id="7332" id="Asia"><span data-dcnode-id="7333" instrument_node="">Asia</span></span><span class="mw-editsection" data-dcnode-id="7325"><span class="mw-editsection-bracket" data-dcnode-id="7330"><span data-dcnode-id="7331" instrument_node="">[</span></span><a data-dcnode-id="7328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DArts_and_Crafts_movement%26action%3Dedit%26section%3D21" title="Edit section: Asia"><span data-dcnode-id="7329" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7326"><span data-dcnode-id="7327" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7323" instrument_node="">
</span><p data-dcnode-id="7311"><span data-dcnode-id="7322" instrument_node="">In Japan, </span><a data-dcnode-id="7320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yanagi_S%25C5%258Detsu" title="Yanagi Sōetsu"><span data-dcnode-id="7321" instrument_node="">Yanagi Sōetsu</span></a><span data-dcnode-id="7319" instrument_node="">, creator of the </span><a data-dcnode-id="7317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mingei" title="Mingei"><span data-dcnode-id="7318" instrument_node="">Mingei</span></a><span data-dcnode-id="7316" instrument_node=""> movement which promoted folk art from the 1920s onwards, was influenced by the writings of Morris and Ruskin.</span><sup class="reference" data-dcnode-id="7313" id="cite_ref-mingei_33-1"><a data-dcnode-id="7314" href="#cite_note-mingei-33"><span data-dcnode-id="7315" instrument_node="">[33]</span></a></sup><span data-dcnode-id="7312" instrument_node=""> Like the Arts and Crafts movement in Europe, Mingei sought to preserve traditional crafts in the face of modernising industry.
</span></p><span data-dcnode-id="7310" instrument_node="">
</span><h2 data-dcnode-id="7300"><span class="mw-headline" data-dcnode-id="7308" id="Architecture"><span data-dcnode-id="7309" instrument_node="">Architecture</span></span><span class="mw-editsection" data-dcnode-id="7301"><span class="mw-editsection-bracket" data-dcnode-id="7306"><span data-dcnode-id="7307" instrument_node="">[</span></span><a data-dcnode-id="7304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DArts_and_Crafts_movement%26action%3Dedit%26section%3D22" title="Edit section: Architecture"><span data-dcnode-id="7305" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7302"><span data-dcnode-id="7303" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7299" instrument_node="">
</span><span data-dcnode-id="7298" instrument_node="">
</span><span data-dcnode-id="7297" instrument_node="">
</span><table cellspacing="1" class="toccolours" data-dcnode-id="7282" style="float: right; margin-left: 1em; margin-right: 1em; font-size: 85%; background:#c6dbf7; color:black; width:30em; max-width: 40%;"><tbody data-dcnode-id="7283"><tr data-dcnode-id="7284"><td data-dcnode-id="7285" style="text-align: left;"><span data-dcnode-id="7296" instrument_node="">
</span><p data-dcnode-id="7294"><span data-dcnode-id="7295" instrument_node="">The movement ... represents in some sense a revolt against the hard mechanical conventional life and its insensibility to beauty (quite another thing to ornament). It is a protest against that so-called industrial progress which produces shoddy wares, the cheapness of which is paid for by the lives of their producers and the degradation of their users. It is a protest against the turning of men into machines, against artificial distinctions in art, and against making the immediate market value, or possibility of profit, the chief test of artistic merit. It also advances the claim of all and each to the common possession of beauty in things common and familiar, and would awaken the sense of this beauty, deadened and depressed as it now too often is, either on the one hand by luxurious superfluities, or on the other by the absence of the commonest necessities and the gnawing anxiety for the means of livelihood; not to speak of the everyday uglinesses to which we have accustomed our eyes, confused by the flood of false taste, or darkened by the hurried life of modern towns in which huge aggregations of humanity exist, equally removed from both art and nature and their kindly and refining influences.
</span></p><p data-dcnode-id="7287"><a class="extiw" data-dcnode-id="7289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikisource.org/wiki/Arts_and_Crafts_Essays/Of_the_Revival_of_Design_and_Handicraft" title="wikisource:Arts and Crafts Essays/Of the Revival of Design and Handicraft"><span data-dcnode-id="7293" instrument_node="">-- Walter Crane, "Of The Revival of Design and Handicraft", in </span><i data-dcnode-id="7291"><span data-dcnode-id="7292" instrument_node="">Arts and Crafts Essays</span></i><span data-dcnode-id="7290" instrument_node="">, by Members of the Arts and Crafts Exhibition Society, 1893</span></a><span data-dcnode-id="7288" instrument_node="">
</span></p><span data-dcnode-id="7286" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="7281" instrument_node="">
</span><p data-dcnode-id="7279"><span data-dcnode-id="7280" instrument_node="">Many of the leaders of the Arts and Crafts movement were trained as architects (e.g. William Morris, A. H. Mackmurdo, C. R. Ashbee, W. R. Lethaby) and it was on building that the movement had its most visible and lasting influence.
</span></p><p data-dcnode-id="7262"><a class="mw-redirect" data-dcnode-id="7277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red_House_%28London%29" title="Red House (London)"><span data-dcnode-id="7278" instrument_node="">Red House</span></a><span data-dcnode-id="7276" instrument_node="">, in </span><a data-dcnode-id="7274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bexleyheath" title="Bexleyheath"><span data-dcnode-id="7275" instrument_node="">Bexleyheath</span></a><span data-dcnode-id="7273" instrument_node="">, London, designed for Morris in 1859 by architect </span><a data-dcnode-id="7271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philip_Webb" title="Philip Webb"><span data-dcnode-id="7272" instrument_node="">Philip Webb</span></a><span data-dcnode-id="7270" instrument_node="">, exemplifies the early Arts and Crafts style, with its well-proportioned solid forms, wide porches, steep roof, pointed window arches, brick fireplaces and wooden fittings.  Webb rejected classical and other revivals of historical styles based on grand buildings, and based his design on British </span><a data-dcnode-id="7268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vernacular_architecture" title="Vernacular architecture"><span data-dcnode-id="7269" instrument_node="">vernacular architecture</span></a><span data-dcnode-id="7267" instrument_node="">, expressing the texture of ordinary materials, such as stone and tiles, with an asymmetrical and picturesque building composition.</span><sup class="reference" data-dcnode-id="7264" id="cite_ref-V&amp;A_16-3"><a data-dcnode-id="7265" href="#cite_note-V&amp;A-16"><span data-dcnode-id="7266" instrument_node="">[16]</span></a></sup><span data-dcnode-id="7263" instrument_node="">
</span></p><p data-dcnode-id="7219"><span data-dcnode-id="7261" instrument_node="">The London suburb of </span><a data-dcnode-id="7259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bedford_Park%2C_London" title="Bedford Park, London"><span data-dcnode-id="7260" instrument_node="">Bedford Park</span></a><span data-dcnode-id="7258" instrument_node="">, built mainly in the 1880s and 1890s, has about 360 Arts and Crafts style houses and was once famous for its </span><a data-dcnode-id="7256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aestheticism" title="Aestheticism"><span data-dcnode-id="7257" instrument_node="">Aesthetic</span></a><span data-dcnode-id="7255" instrument_node=""> residents. Several </span><a data-dcnode-id="7253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Almshouse" title="Almshouse"><span data-dcnode-id="7254" instrument_node="">Almshouses</span></a><span data-dcnode-id="7252" instrument_node=""> were built in the Arts and Crafts style, for example, </span><a data-dcnode-id="7250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Whiteley_Village" title="Whiteley Village"><span data-dcnode-id="7251" instrument_node="">Whiteley Village</span></a><span data-dcnode-id="7249" instrument_node="">, Surrey, built between 1914 and 1917, with over 280 buildings, and the </span><a data-dcnode-id="7247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dyers_Almshouses" title="Dyers Almshouses"><span data-dcnode-id="7248" instrument_node="">Dyers Almshouses</span></a><span data-dcnode-id="7246" instrument_node="">, Sussex, built between 1939 and 1971. </span><a class="mw-redirect" data-dcnode-id="7244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Letchworth_Garden_City" title="Letchworth Garden City"><span data-dcnode-id="7245" instrument_node="">Letchworth Garden City</span></a><span data-dcnode-id="7243" instrument_node="">, the first garden city, was inspired by Arts and Crafts ideals.</span><sup class="reference" data-dcnode-id="7240" id="cite_ref-maccarthy2014_6-3"><a data-dcnode-id="7241" href="#cite_note-maccarthy2014-6"><span data-dcnode-id="7242" instrument_node="">[6]</span></a></sup><span data-dcnode-id="7239" instrument_node=""> The first houses were designed by </span><a data-dcnode-id="7237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_Barry_Parker" title="Richard Barry Parker"><span data-dcnode-id="7238" instrument_node="">Barry Parker</span></a><span data-dcnode-id="7236" instrument_node=""> and </span><a data-dcnode-id="7234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Raymond_Unwin" title="Raymond Unwin"><span data-dcnode-id="7235" instrument_node="">Raymond Unwin</span></a><span data-dcnode-id="7233" instrument_node=""> in the </span><a data-dcnode-id="7231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vernacular" title="Vernacular"><span data-dcnode-id="7232" instrument_node="">vernacular</span></a><span data-dcnode-id="7230" instrument_node=""> style popularized by the movement and the town became associated with high-mindedness and simple living. The sandal-making workshop set up by </span><a data-dcnode-id="7228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_Carpenter" title="Edward Carpenter"><span data-dcnode-id="7229" instrument_node="">Edward Carpenter</span></a><span data-dcnode-id="7227" instrument_node=""> moved from Yorkshire to Letchworth Garden City and </span><a data-dcnode-id="7225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Orwell" title="George Orwell"><span data-dcnode-id="7226" instrument_node="">George Orwell</span></a><span data-dcnode-id="7224" instrument_node="">'s jibe about "every fruit-juice drinker, nudist, sandal-wearer, sex-maniac, Quaker, 'Nature Cure' quack, pacifist, and feminist in England" going to a socialist conference in Letchworth has become famous.</span><sup class="reference" data-dcnode-id="7221" id="cite_ref-84"><a data-dcnode-id="7222" href="#cite_note-84"><span data-dcnode-id="7223" instrument_node="">[84]</span></a></sup><span data-dcnode-id="7220" instrument_node="">

</span><h2 data-dcnode-id="7018"><span class="mw-headline" data-dcnode-id="7026" id="Garden_design"><span data-dcnode-id="7027" instrument_node="">Garden design</span></span><span class="mw-editsection" data-dcnode-id="7019"><span class="mw-editsection-bracket" data-dcnode-id="7024"><span data-dcnode-id="7025" instrument_node="">[</span></span><a data-dcnode-id="7022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DArts_and_Crafts_movement%26action%3Dedit%26section%3D24" title="Edit section: Garden design"><span data-dcnode-id="7023" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7020"><span data-dcnode-id="7021" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7017" instrument_node="">
</span><p data-dcnode-id="6956"><a data-dcnode-id="7015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gertrude_Jekyll" title="Gertrude Jekyll"><span data-dcnode-id="7016" instrument_node="">Gertrude Jekyll</span></a><span data-dcnode-id="7014" instrument_node=""> applied Arts and Crafts principles to garden design. She worked with the English architect, Sir </span><a data-dcnode-id="7012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edwin_Lutyens" title="Edwin Lutyens"><span data-dcnode-id="7013" instrument_node="">Edwin Lutyens</span></a><span data-dcnode-id="7011" instrument_node="">, for whose projects she created numerous landscapes, and who designed her home </span><a data-dcnode-id="7009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Munstead_Wood" title="Munstead Wood"><span data-dcnode-id="7010" instrument_node="">Munstead Wood</span></a><span data-dcnode-id="7008" instrument_node="">, near Godalming in Surrey.</span><sup class="reference" data-dcnode-id="7005" id="cite_ref-85"><a data-dcnode-id="7006" href="#cite_note-85"><span data-dcnode-id="7007" instrument_node="">[85]</span></a></sup><span data-dcnode-id="7004" instrument_node=""> Jekyll created the gardens for Bishopsbarns,</span><sup class="reference" data-dcnode-id="7001" id="cite_ref-HEBishopsbarns_86-0"><a data-dcnode-id="7002" href="#cite_note-HEBishopsbarns-86"><span data-dcnode-id="7003" instrument_node="">[86]</span></a></sup><span data-dcnode-id="7000" instrument_node=""> the home of York architect </span><a data-dcnode-id="6998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Walter_Brierley" title="Walter Brierley"><span data-dcnode-id="6999" instrument_node="">Walter Brierley</span></a><span data-dcnode-id="6997" instrument_node="">, an exponent of the Arts and Crafts movement and known as the "Lutyens of the North".</span><sup class="reference" data-dcnode-id="6994" id="cite_ref-87"><a data-dcnode-id="6995" href="#cite_note-87"><span data-dcnode-id="6996" instrument_node="">[87]</span></a></sup><span data-dcnode-id="6993" instrument_node=""> The garden for Brierley's final project, </span><a data-dcnode-id="6991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Goddards_House_and_Garden" title="Goddards House and Garden"><span data-dcnode-id="6992" instrument_node="">Goddards</span></a><span data-dcnode-id="6990" instrument_node=""> in York, was the work of George Dillistone, a gardener who worked with Lutyens and Jekyll at </span><a data-dcnode-id="6988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Castle_Drogo" title="Castle Drogo"><span data-dcnode-id="6989" instrument_node="">Castle Drogo</span></a><span data-dcnode-id="6987" instrument_node="">.</span><sup class="reference" data-dcnode-id="6984" id="cite_ref-HE1000452_88-0"><a data-dcnode-id="6985" href="#cite_note-HE1000452-88"><span data-dcnode-id="6986" instrument_node="">[88]</span></a></sup><span data-dcnode-id="6983" instrument_node=""> At </span><a data-dcnode-id="6981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Goddards_House_and_Garden" title="Goddards House and Garden"><span data-dcnode-id="6982" instrument_node="">Goddards</span></a><span data-dcnode-id="6980" instrument_node=""> the garden incorporated a number of features that reflected the arts and crafts style of the house, such as the use of hedges and </span><a data-dcnode-id="6978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Herbaceous_border" title="Herbaceous border"><span data-dcnode-id="6979" instrument_node="">herbaceous borders</span></a><span data-dcnode-id="6977" instrument_node=""> to divide the garden into a series of outdoor rooms.</span><sup class="reference" data-dcnode-id="6974" id="cite_ref-89"><a data-dcnode-id="6975" href="#cite_note-89"><span data-dcnode-id="6976" instrument_node="">[89]</span></a></sup><span data-dcnode-id="6973" instrument_node=""> Another notable Arts and Crafts garden is </span><a data-dcnode-id="6971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hidcote_Manor_Garden" title="Hidcote Manor Garden"><span data-dcnode-id="6972" instrument_node="">Hidcote Manor Garden</span></a><span data-dcnode-id="6970" instrument_node=""> designed by </span><a class="mw-redirect" data-dcnode-id="6968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lawrence_Waterbury_Johnston" title="Lawrence Waterbury Johnston"><span data-dcnode-id="6969" instrument_node="">Lawrence Johnston</span></a><span data-dcnode-id="6967" instrument_node=""> which is also laid out in a series of outdoor rooms and where, like Goddards, the landscaping becomes less formal further away from the house.</span><sup class="reference" data-dcnode-id="6964" id="cite_ref-90"><a data-dcnode-id="6965" href="#cite_note-90"><span data-dcnode-id="6966" instrument_node="">[90]</span></a></sup><span data-dcnode-id="6963" instrument_node=""> Other examples of Arts and Crafts gardens include </span><a data-dcnode-id="6961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hestercombe_House" title="Hestercombe House"><span data-dcnode-id="6962" instrument_node="">Hestercombe Gardens</span></a><span data-dcnode-id="6960" instrument_node="">, </span><a data-dcnode-id="6958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lytes_Cary" title="Lytes Cary"><span data-dcnode-id="6959" instrument_node="">Lytes Cary Manor</span></a><span data-dcnode-id="6957" instrument_node=""> and the gardens of some of the architectural examples of arts and crafts buildings (listed above).
</span></p><span data-dcnode-id="6955" instrument_node="">
</span><h2 data-dcnode-id="6945"><span class="mw-headline" data-dcnode-id="6953" id="Art_education"><span data-dcnode-id="6954" instrument_node="">Art education</span></span><span class="mw-editsection" data-dcnode-id="6946"><span class="mw-editsection-bracket" data-dcnode-id="6951"><span data-dcnode-id="6952" instrument_node="">[</span></span><a data-dcnode-id="6949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DArts_and_Crafts_movement%26action%3Dedit%26section%3D25" title="Edit section: Art education"><span data-dcnode-id="6950" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6947"><span data-dcnode-id="6948" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6944" instrument_node="">
</span><p data-dcnode-id="6929"><span data-dcnode-id="6943" instrument_node="">Morris's ideas were adopted by the </span><a data-dcnode-id="6941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Education_Movement" title="New Education Movement"><span data-dcnode-id="6942" instrument_node="">New Education Movement</span></a><span data-dcnode-id="6940" instrument_node=""> in the late 1880s, which incorporated handicraft teaching in schools at Abbotsholme (1889) and </span><a class="mw-redirect" data-dcnode-id="6938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bedales" title="Bedales"><span data-dcnode-id="6939" instrument_node="">Bedales</span></a><span data-dcnode-id="6937" instrument_node=""> (1892), and his influence has been noted in the social experiments of </span><a data-dcnode-id="6935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dartington_Hall" title="Dartington Hall"><span data-dcnode-id="6936" instrument_node="">Dartington Hall</span></a><span data-dcnode-id="6934" instrument_node=""> during the mid-20th century.</span><sup class="reference" data-dcnode-id="6931" id="cite_ref-FOOTNOTEMacCarthy1994603_61-1"><a data-dcnode-id="6932" href="#cite_note-FOOTNOTEMacCarthy1994603-61"><span data-dcnode-id="6933" instrument_node="">[61]</span></a></sup><span data-dcnode-id="6930" instrument_node="">
</span></p><p data-dcnode-id="6906"><span data-dcnode-id="6928" instrument_node="">Arts and Crafts practitioners in Britain were critical of the government system of art education based on design in the abstract with little teaching of practical craft. This lack of craft training also caused concern in industrial and official circles, and in 1884 a Royal Commission (accepting the advice of William Morris) recommended that art education should pay more attention to the suitability of design to the material in which it was to be executed.</span><sup class="reference" data-dcnode-id="6925" id="cite_ref-91"><a data-dcnode-id="6926" href="#cite_note-91"><span data-dcnode-id="6927" instrument_node="">[91]</span></a></sup><span data-dcnode-id="6924" instrument_node=""> The first school to make this change was the </span><a class="mw-redirect" data-dcnode-id="6922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Birmingham_Art_School" title="Birmingham Art School"><span data-dcnode-id="6923" instrument_node="">Birmingham School of Arts and Crafts</span></a><span data-dcnode-id="6921" instrument_node="">, which "led the way in introducing executed design to the teaching of art and design nationally (working in the material for which the design was intended rather than designing on paper). In his external examiner's report of 1889, Walter Crane praised Birmingham School of Art in that it 'considered design in relationship to materials and usage.'"</span><sup class="reference" data-dcnode-id="6918" id="cite_ref-92"><a data-dcnode-id="6919" href="#cite_note-92"><span data-dcnode-id="6920" instrument_node="">[92]</span></a></sup><span data-dcnode-id="6917" instrument_node=""> Under the direction of Edward Taylor, its headmaster from 1877 to 1903, and with the help of </span><a data-dcnode-id="6915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henry_Payne_%28artist%29" title="Henry Payne (artist)"><span data-dcnode-id="6916" instrument_node="">Henry Payne</span></a><span data-dcnode-id="6914" instrument_node=""> and </span><a data-dcnode-id="6912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joseph_Southall" title="Joseph Southall"><span data-dcnode-id="6913" instrument_node="">Joseph Southall</span></a><span data-dcnode-id="6911" instrument_node="">, the Birmingham School became a leading Arts-and-Crafts centre.</span><sup class="reference" data-dcnode-id="6908" id="cite_ref-93"><a data-dcnode-id="6909" href="#cite_note-93"><span data-dcnode-id="6910" instrument_node="">[93]</span></a></sup><span data-dcnode-id="6907" instrument_node="">
</span></p><span data-dcnode-id="6905" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6894"><div class="thumbinner" data-dcnode-id="6895" style="width:222px;"><a class="image" data-dcnode-id="6903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFrampton_1890.jpg"><img alt="" class="thumbimage" data-dcnode-id="6904" data-file-height="1769" data-file-width="3125" decoding="async" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/35/Frampton_1890.jpg/220px-Frampton_1890.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/35/Frampton_1890.jpg/330px-Frampton_1890.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/35/Frampton_1890.jpg/440px-Frampton_1890.jpg 2x" width="220"></a><span data-dcnode-id="6902" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6896"><div class="magnify" data-dcnode-id="6900"><a class="internal" data-dcnode-id="6901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFrampton_1890.jpg" title="Enlarge"></a></div><a data-dcnode-id="6898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Frampton" title="George Frampton"><span data-dcnode-id="6899" instrument_node="">George Frampton</span></a><span data-dcnode-id="6897" instrument_node="">. Season ticket to The Arts and Craft Exhibition Society 1890.</span></div></div></div><span data-dcnode-id="6893" instrument_node="">
</span><p data-dcnode-id="6856"><span data-dcnode-id="6892" instrument_node="">Other local authority schools also began to introduce more practical teaching of crafts, and by the 1890s Arts and Crafts ideals were being disseminated by members of the Art Workers Guild into art schools throughout the country. Members of the Guild held influential positions: Walter Crane was director of the </span><a data-dcnode-id="6890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manchester_School_of_Art" title="Manchester School of Art"><span data-dcnode-id="6891" instrument_node="">Manchester School of Art</span></a><span data-dcnode-id="6889" instrument_node=""> and subsequently the </span><a data-dcnode-id="6887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Royal_College_of_Art" title="Royal College of Art"><span data-dcnode-id="6888" instrument_node="">Royal College of Art</span></a><span data-dcnode-id="6886" instrument_node="">; F.M. Simpson, </span><a data-dcnode-id="6884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Anning_Bell" title="Robert Anning Bell"><span data-dcnode-id="6885" instrument_node="">Robert Anning Bell</span></a><span data-dcnode-id="6883" instrument_node=""> and C.J.Allen were respectively professor of architecture, instructor in painting and design, and instructor in sculpture at </span><a class="mw-redirect" data-dcnode-id="6881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liverpool_School_of_Art" title="Liverpool School of Art"><span data-dcnode-id="6882" instrument_node="">Liverpool School of Art</span></a><span data-dcnode-id="6880" instrument_node="">; Robert Catterson-Smith, the headmaster of the Birmingham Art School from 1902 to 1920, was also an AWG member; </span><a class="mw-redirect" data-dcnode-id="6878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/W._R._Lethaby" title="W. R. Lethaby"><span data-dcnode-id="6879" instrument_node="">W. R. Lethaby</span></a><span data-dcnode-id="6877" instrument_node=""> and </span><a data-dcnode-id="6875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Frampton" title="George Frampton"><span data-dcnode-id="6876" instrument_node="">George Frampton</span></a><span data-dcnode-id="6874" instrument_node=""> were inspectors and advisors to the </span><a data-dcnode-id="6872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/London_County_Council" title="London County Council"><span data-dcnode-id="6873" instrument_node="">London County Council</span></a><span data-dcnode-id="6871" instrument_node="">'s (LCC) education board and in 1896, largely as a result of their work, the LCC set up the </span><a class="mw-redirect" data-dcnode-id="6869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Central_School_of_Arts_and_Crafts" title="Central School of Arts and Crafts"><span data-dcnode-id="6870" instrument_node="">Central School of Arts and Crafts</span></a><span data-dcnode-id="6868" instrument_node=""> and made them joint principals.</span><sup class="reference" data-dcnode-id="6865" id="cite_ref-macdonald_94-0"><a data-dcnode-id="6866" href="#cite_note-macdonald-94"><span data-dcnode-id="6867" instrument_node="">[94]</span></a></sup><span data-dcnode-id="6864" instrument_node=""> Until the formation of the Bauhaus in Germany, the Central School was regarded as the most progressive art school in Europe.</span><sup class="reference" data-dcnode-id="6861" id="cite_ref-FOOTNOTENaylor1971179_95-0"><a data-dcnode-id="6862" href="#cite_note-FOOTNOTENaylor1971179-95"><span data-dcnode-id="6863" instrument_node="">[95]</span></a></sup><span data-dcnode-id="6860" instrument_node=""> Shortly after its foundation, the </span><a class="mw-redirect" data-dcnode-id="6858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Camberwell_School_of_Arts_and_Crafts" title="Camberwell School of Arts and Crafts"><span data-dcnode-id="6859" instrument_node="">Camberwell School of Arts and Crafts</span></a><span data-dcnode-id="6857" instrument_node=""> was set up on Arts and Crafts lines by the local borough council.
</span></p><p data-dcnode-id="6829"><span data-dcnode-id="6855" instrument_node="">As head of the Royal College of Art in 1898, Crane tried to reform it along more practical lines, but resigned after a year, defeated by the bureaucracy of the </span><a class="mw-redirect" data-dcnode-id="6853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Board_of_Education_%28United_Kingdom%29" title="Board of Education (United Kingdom)"><span data-dcnode-id="6854" instrument_node="">Board of Education</span></a><span data-dcnode-id="6852" instrument_node="">, who then appointed Augustus Spencer to implement his plan. Spencer brought in Lethaby to head its school of design and several members of the Art Workers' Guild as teachers.</span><sup class="reference" data-dcnode-id="6849" id="cite_ref-macdonald_94-1"><a data-dcnode-id="6850" href="#cite_note-macdonald-94"><span data-dcnode-id="6851" instrument_node="">[94]</span></a></sup><span data-dcnode-id="6848" instrument_node=""> Ten years after reform, a committee of inquiry reviewed the RCA and found that it was still not adequately training students for industry.</span><sup class="reference" data-dcnode-id="6845" id="cite_ref-96"><a data-dcnode-id="6846" href="#cite_note-96"><span data-dcnode-id="6847" instrument_node="">[96]</span></a></sup><span data-dcnode-id="6844" instrument_node=""> In the debate that followed the publication of the committee's report, C.R.Ashbee published a highly critical essay, </span><i data-dcnode-id="6842"><span data-dcnode-id="6843" instrument_node="">Should We Stop Teaching Art</span></i><span data-dcnode-id="6841" instrument_node="">, in which he called for the system of art education to be completely dismantled and for the crafts to be learned in state-subsidised workshops instead.</span><sup class="reference" data-dcnode-id="6838" id="cite_ref-97"><a data-dcnode-id="6839" href="#cite_note-97"><span data-dcnode-id="6840" instrument_node="">[97]</span></a></sup><span data-dcnode-id="6837" instrument_node=""> </span><a data-dcnode-id="6835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lewis_Foreman_Day" title="Lewis Foreman Day"><span data-dcnode-id="6836" instrument_node="">Lewis Foreman Day</span></a><span data-dcnode-id="6834" instrument_node="">, an important figure in the Arts and Crafts movement, took a different view in his dissenting report to the committee of inquiry, arguing for greater emphasis on principles of design against the growing orthodoxy of teaching design by direct working in materials. Nevertheless, the Arts and Crafts ethos thoroughly pervaded British art schools and persisted, in the view of the historian of art education, Stuart MacDonald, until after the Second World War.</span><sup class="reference" data-dcnode-id="6831" id="cite_ref-macdonald_94-2"><a data-dcnode-id="6832" href="#cite_note-macdonald-94"><span data-dcnode-id="6833" instrument_node="">[94]</span></a></sup><span data-dcnode-id="6830" instrument_node="">
</span></p><span data-dcnode-id="6828" instrument_node="">
</span><h2 data-dcnode-id="6818"><span class="mw-headline" data-dcnode-id="6826" id="Leading_practitioners"><span data-dcnode-id="6827" instrument_node="">Leading practitioners</span></span><span class="mw-editsection" data-dcnode-id="6819"><span class="mw-editsection-bracket" data-dcnode-id="6824"><span data-dcnode-id="6825" instrument_node="">[</span></span><a data-dcnode-id="6822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DArts_and_Crafts_movement%26action%3Dedit%26section%3D26" title="Edit section: Leading practitioners"><span data-dcnode-id="6823" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6820"><span data-dcnode-id="6821" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6817" instrument_node="">

</span><ul data-dcnode-id="6622"><li data-dcnode-id="6811"><a data-dcnode-id="6812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Robert_Ashbee" title="Charles Robert Ashbee"><span data-dcnode-id="6813" instrument_node="">Charles Robert Ashbee</span></a></li><span data-dcnode-id="6810" instrument_node="">
</span><li data-dcnode-id="6807"><a data-dcnode-id="6808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Swinden_Barber" title="William Swinden Barber"><span data-dcnode-id="6809" instrument_node="">William Swinden Barber</span></a></li><span data-dcnode-id="6806" instrument_node="">
