</span><div class="hatnote navigation-not-searchable" data-dcnode-id="9453" role="note"><span data-dcnode-id="9460" instrument_node="">This article is about the art and design movement. For handicrafts generally, see </span><a data-dcnode-id="9458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Handicraft" title="Handicraft"><span data-dcnode-id="9459" instrument_node="">Handicraft</span></a><span data-dcnode-id="9457" instrument_node="">. For other uses, see </span><a class="mw-redirect mw-disambig" data-dcnode-id="9455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arts_%2526_Crafts_%28disambiguation%29" title="Arts &amp; Crafts (disambiguation)"><span data-dcnode-id="9456" instrument_node="">Arts &amp; Crafts (disambiguation)</span></a><span data-dcnode-id="9454" instrument_node="">.</span></div><span data-dcnode-id="9452" instrument_node="">
</span><p class="mw-empty-elt" data-dcnode-id="9450"><span data-dcnode-id="9451" instrument_node="">
</span></p><span data-dcnode-id="9449" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="9438"><div class="thumbinner" data-dcnode-id="9439" style="width:302px;"><a class="image" data-dcnode-id="9447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWilliam_Morris_design_for_Trellis_wallpaper_1862.jpg"><img alt="" class="thumbimage" data-dcnode-id="9448" data-file-height="1184" data-file-width="1131" decoding="async" height="314" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b4/William_Morris_design_for_Trellis_wallpaper_1862.jpg/300px-William_Morris_design_for_Trellis_wallpaper_1862.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b4/William_Morris_design_for_Trellis_wallpaper_1862.jpg/450px-William_Morris_design_for_Trellis_wallpaper_1862.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b4/William_Morris_design_for_Trellis_wallpaper_1862.jpg/600px-William_Morris_design_for_Trellis_wallpaper_1862.jpg 2x" width="300"></a><span data-dcnode-id="9446" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9440"><div class="magnify" data-dcnode-id="9444"><a class="internal" data-dcnode-id="9445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWilliam_Morris_design_for_Trellis_wallpaper_1862.jpg" title="Enlarge"></a></div><a data-dcnode-id="9442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Morris" title="William Morris"><span data-dcnode-id="9443" instrument_node="">William Morris</span></a><span data-dcnode-id="9441" instrument_node=""> design for "Trellis" wallpaper, 1862</span></div></div></div><span data-dcnode-id="9437" instrument_node="">
</span><p data-dcnode-id="9418"><span data-dcnode-id="9436" instrument_node="">The </span><b data-dcnode-id="9434"><span data-dcnode-id="9435" instrument_node="">Arts and Crafts movement</span></b><span data-dcnode-id="9433" instrument_node=""> was an international trend in the </span><a data-dcnode-id="9431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Decorative_arts" title="Decorative arts"><span data-dcnode-id="9432" instrument_node="">decorative</span></a><span data-dcnode-id="9430" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="9428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fine_arts" title="Fine arts"><span data-dcnode-id="9429" instrument_node="">fine arts</span></a><span data-dcnode-id="9427" instrument_node=""> that developed earliest and most fully in the British Isles</span><sup class="reference" data-dcnode-id="9424" id="cite_ref-grove_1-0"><a data-dcnode-id="9425" href="#cite_note-grove-1"><span data-dcnode-id="9426" instrument_node="">[1]</span></a></sup><span data-dcnode-id="9423" instrument_node=""> and subsequently spread across the British Empire and to the rest of Europe and America.</span><sup class="reference" data-dcnode-id="9420" id="cite_ref-2"><a data-dcnode-id="9421" href="#cite_note-2"><span data-dcnode-id="9422" instrument_node="">[2]</span></a></sup><span data-dcnode-id="9419" instrument_node="">
</span></p><p data-dcnode-id="9372"><span data-dcnode-id="9417" instrument_node="">Initiated in reaction against the perceived impoverishment of the decorative arts and the conditions in which they were produced,</span><sup class="reference" data-dcnode-id="9414" id="cite_ref-king_3-0"><a data-dcnode-id="9415" href="#cite_note-king-3"><span data-dcnode-id="9416" instrument_node="">[3]</span></a></sup><span data-dcnode-id="9413" instrument_node=""> the movement flourished in Europe and North America between about 1880 and 1920. It is the root of the </span><a data-dcnode-id="9411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Modern_Style_%28British_Art_Nouveau_style%29" title="Modern Style (British Art Nouveau style)"><span data-dcnode-id="9412" instrument_node="">Modern Style</span></a><span data-dcnode-id="9410" instrument_node="">, the British expression of what later came to be called the </span><a data-dcnode-id="9408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Art_Nouveau" title="Art Nouveau"><span data-dcnode-id="9409" instrument_node="">Art Nouveau</span></a><span data-dcnode-id="9407" instrument_node=""> movement, which it strongly influenced.</span><sup class="reference" data-dcnode-id="9404" id="cite_ref-4"><a data-dcnode-id="9405" href="#cite_note-4"><span data-dcnode-id="9406" instrument_node="">[4]</span></a></sup><span data-dcnode-id="9403" instrument_node="">
In Japan it emerged in the 1920s as the </span><a data-dcnode-id="9401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mingei" title="Mingei"><span data-dcnode-id="9402" instrument_node="">Mingei</span></a><span data-dcnode-id="9400" instrument_node=""> movement. It stood for traditional craftsmanship, and often used </span><a data-dcnode-id="9398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Medievalism" title="Medievalism"><span data-dcnode-id="9399" instrument_node="">medieval</span></a><span data-dcnode-id="9397" instrument_node="">, </span><a data-dcnode-id="9395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Romanticism" title="Romanticism"><span data-dcnode-id="9396" instrument_node="">romantic</span></a><span data-dcnode-id="9394" instrument_node="">, or </span><a data-dcnode-id="9392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Folk_art" title="Folk art"><span data-dcnode-id="9393" instrument_node="">folk</span></a><span data-dcnode-id="9391" instrument_node=""> styles of decoration. It advocated economic and social reform and was anti-industrial in its orientation.</span><sup class="reference" data-dcnode-id="9388" id="cite_ref-king_3-1"><a data-dcnode-id="9389" href="#cite_note-king-3"><span data-dcnode-id="9390" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="9385" id="cite_ref-5"><a data-dcnode-id="9386" href="#cite_note-5"><span data-dcnode-id="9387" instrument_node="">[5]</span></a></sup><span data-dcnode-id="9384" instrument_node=""> It had a strong influence on the arts in Europe until it was displaced by </span><a data-dcnode-id="9382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Modernism" title="Modernism"><span data-dcnode-id="9383" instrument_node="">Modernism</span></a><span data-dcnode-id="9381" instrument_node=""> in the 1930s,</span><sup class="reference" data-dcnode-id="9378" id="cite_ref-grove_1-1"><a data-dcnode-id="9379" href="#cite_note-grove-1"><span data-dcnode-id="9380" instrument_node="">[1]</span></a></sup><span data-dcnode-id="9377" instrument_node=""> and its influence continued among craft makers, designers, and town planners long afterwards.</span><sup class="reference" data-dcnode-id="9374" id="cite_ref-maccarthy2014_6-0"><a data-dcnode-id="9375" href="#cite_note-maccarthy2014-6"><span data-dcnode-id="9376" instrument_node="">[6]</span></a></sup><span data-dcnode-id="9373" instrument_node="">
</span></p><p data-dcnode-id="9340"><span data-dcnode-id="9371" instrument_node="">The term was first used by </span><a data-dcnode-id="9369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/T._J._Cobden-Sanderson" title="T. J. Cobden-Sanderson"><span data-dcnode-id="9370" instrument_node="">T. J. Cobden-Sanderson</span></a><span data-dcnode-id="9368" instrument_node=""> at a meeting of the </span><a data-dcnode-id="9366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arts_and_Crafts_Exhibition_Society" title="Arts and Crafts Exhibition Society"><span data-dcnode-id="9367" instrument_node="">Arts and Crafts Exhibition Society</span></a><span data-dcnode-id="9365" instrument_node=""> in 1887,</span><sup class="reference" data-dcnode-id="9362" id="cite_ref-crawford_7-0"><a data-dcnode-id="9363" href="#cite_note-crawford-7"><span data-dcnode-id="9364" instrument_node="">[7]</span></a></sup><span data-dcnode-id="9361" instrument_node=""> although the principles and style on which it was based had been developing in England for at least 20 years. It was inspired by the ideas of architect </span><a data-dcnode-id="9359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Augustus_Pugin" title="Augustus Pugin"><span data-dcnode-id="9360" instrument_node="">Augustus Pugin</span></a><span data-dcnode-id="9358" instrument_node="">, writer </span><a data-dcnode-id="9356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Ruskin" title="John Ruskin"><span data-dcnode-id="9357" instrument_node="">John Ruskin</span></a><span data-dcnode-id="9355" instrument_node="">, and designer </span><a data-dcnode-id="9353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Morris" title="William Morris"><span data-dcnode-id="9354" instrument_node="">William Morris</span></a><span data-dcnode-id="9352" instrument_node="">.</span><sup class="reference" data-dcnode-id="9349" id="cite_ref-triggs_8-0"><a data-dcnode-id="9350" href="#cite_note-triggs-8"><span data-dcnode-id="9351" instrument_node="">[8]</span></a></sup><span data-dcnode-id="9348" instrument_node=""> In Scotland it is associated with key figures such as </span><a data-dcnode-id="9346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Rennie_Mackintosh" title="Charles Rennie Mackintosh"><span data-dcnode-id="9347" instrument_node="">Charles Rennie Mackintosh</span></a><span data-dcnode-id="9345" instrument_node="">.</span><sup class="reference" data-dcnode-id="9342" id="cite_ref-9"><a data-dcnode-id="9343" href="#cite_note-9"><span data-dcnode-id="9344" instrument_node="">[9]</span></a></sup><span data-dcnode-id="9341" instrument_node="">

</span><h3 data-dcnode-id="9030"><span class="mw-headline" data-dcnode-id="9038" id="Design_reform"><span data-dcnode-id="9039" instrument_node="">Design reform</span></span><span class="mw-editsection" data-dcnode-id="9031"><span class="mw-editsection-bracket" data-dcnode-id="9036"><span data-dcnode-id="9037" instrument_node="">[</span></span><a data-dcnode-id="9034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DArts_and_Crafts_movement%26action%3Dedit%26section%3D2" title="Edit section: Design reform"><span data-dcnode-id="9035" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9032"><span data-dcnode-id="9033" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9029" instrument_node="">
</span><p data-dcnode-id="8947"><span data-dcnode-id="9028" instrument_node="">The Arts and Crafts movement emerged from the attempt to reform design and decoration in mid-19th century Britain. It was a reaction against a perceived decline in standards that the reformers associated with machinery and factory production. Their critique was sharpened by the items that they saw in </span><a class="mw-redirect" data-dcnode-id="9026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Great_Exhibition_of_1851" title="The Great Exhibition of 1851"><span data-dcnode-id="9027" instrument_node="">the Great Exhibition of 1851</span></a><span data-dcnode-id="9025" instrument_node="">, which they considered to be excessively </span><a class="extiw" data-dcnode-id="9023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wiktionary.org/wiki/ornate" title="wiktionary:ornate"><span data-dcnode-id="9024" instrument_node="">ornate</span></a><span data-dcnode-id="9022" instrument_node="">, artificial, and ignorant of the qualities of the materials used. Art historian </span><a data-dcnode-id="9020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nikolaus_Pevsner" title="Nikolaus Pevsner"><span data-dcnode-id="9021" instrument_node="">Nikolaus Pevsner</span></a><span data-dcnode-id="9019" instrument_node=""> writes that the exhibits showed "ignorance of that basic need in creating patterns, the integrity of the surface", as well as displaying "vulgarity in detail".</span><sup class="reference" data-dcnode-id="9016" id="cite_ref-pevsner_10-0"><a data-dcnode-id="9017" href="#cite_note-pevsner-10"><span data-dcnode-id="9018" instrument_node="">[10]</span></a></sup><span data-dcnode-id="9015" instrument_node=""> Design reform began with Exhibition organizers </span><a data-dcnode-id="9013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henry_Cole" title="Henry Cole"><span data-dcnode-id="9014" instrument_node="">Henry Cole</span></a><span data-dcnode-id="9012" instrument_node=""> (1808–1882), </span><a data-dcnode-id="9010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Owen_Jones_%28architect%29" title="Owen Jones (architect)"><span data-dcnode-id="9011" instrument_node="">Owen Jones</span></a><span data-dcnode-id="9009" instrument_node=""> (1809–1874), </span><a data-dcnode-id="9007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Matthew_Digby_Wyatt" title="Matthew Digby Wyatt"><span data-dcnode-id="9008" instrument_node="">Matthew Digby Wyatt</span></a><span data-dcnode-id="9006" instrument_node=""> (1820–1877), and </span><a data-dcnode-id="9004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_Redgrave" title="Richard Redgrave"><span data-dcnode-id="9005" instrument_node="">Richard Redgrave</span></a><span data-dcnode-id="9003" instrument_node=""> (1804–1888),</span><sup class="reference" data-dcnode-id="9000" id="cite_ref-11"><a data-dcnode-id="9001" href="#cite_note-11"><span data-dcnode-id="9002" instrument_node="">[11]</span></a></sup><span data-dcnode-id="8999" instrument_node=""> all of whom deprecated excessive ornament and impractical or badly made things.</span><sup class="reference" data-dcnode-id="8996" id="cite_ref-FOOTNOTENaylor197121_12-0"><a data-dcnode-id="8997" href="#cite_note-FOOTNOTENaylor197121-12"><span data-dcnode-id="8998" instrument_node="">[12]</span></a></sup><span data-dcnode-id="8995" instrument_node=""> The organizers were "unanimous in their condemnation of the exhibits."</span><sup class="reference" data-dcnode-id="8992" id="cite_ref-FOOTNOTENaylor197120_13-0"><a data-dcnode-id="8993" href="#cite_note-FOOTNOTENaylor197120-13"><span data-dcnode-id="8994" instrument_node="">[13]</span></a></sup><span data-dcnode-id="8991" instrument_node=""> Owen Jones, for example, complained that "the architect, the upholsterer, the paper-stainer, the weaver, the calico-printer, and the potter" produced "novelty without beauty, or beauty without intelligence."</span><sup class="reference" data-dcnode-id="8988" id="cite_ref-FOOTNOTENaylor197120_13-1"><a data-dcnode-id="8989" href="#cite_note-FOOTNOTENaylor197120-13"><span data-dcnode-id="8990" instrument_node="">[13]</span></a></sup><span data-dcnode-id="8987" instrument_node=""> From these criticisms of manufactured goods emerged several publications which set out what the writers considered to be the correct principles of design. Richard Redgrave's </span><i data-dcnode-id="8985"><span data-dcnode-id="8986" instrument_node="">Supplementary Report on Design</span></i><span data-dcnode-id="8984" instrument_node=""> (1852) analysed the principles of design and ornament and pleaded for "more logic in the application of decoration."</span><sup class="reference" data-dcnode-id="8981" id="cite_ref-FOOTNOTENaylor197121_12-1"><a data-dcnode-id="8982" href="#cite_note-FOOTNOTENaylor197121-12"><span data-dcnode-id="8983" instrument_node="">[12]</span></a></sup><span data-dcnode-id="8980" instrument_node=""> Other works followed in a similar vein, such as Wyatt's </span><i data-dcnode-id="8978"><span data-dcnode-id="8979" instrument_node="">Industrial Arts of the Nineteenth Century</span></i><span data-dcnode-id="8977" instrument_node=""> (1853), </span><a data-dcnode-id="8975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gottfried_Semper" title="Gottfried Semper"><span data-dcnode-id="8976" instrument_node="">Gottfried Semper</span></a><span data-dcnode-id="8974" instrument_node="">'s </span><i data-dcnode-id="8972"><span data-dcnode-id="8973" instrument_node="">Wissenschaft, Industrie und Kunst</span></i><span data-dcnode-id="8971" instrument_node=""> ("Science, Industry and Art") (1852), </span><a class="mw-redirect" data-dcnode-id="8969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ralph_Wornum" title="Ralph Wornum"><span data-dcnode-id="8970" instrument_node="">Ralph Wornum</span></a><span data-dcnode-id="8968" instrument_node="">'s </span><i data-dcnode-id="8966"><span data-dcnode-id="8967" instrument_node="">Analysis of Ornament</span></i><span data-dcnode-id="8965" instrument_node=""> (1856), Redgrave's </span><i data-dcnode-id="8963"><span data-dcnode-id="8964" instrument_node="">Manual of Design</span></i><span data-dcnode-id="8962" instrument_node=""> (1876), and Jones's </span><i data-dcnode-id="8960"><span data-dcnode-id="8961" instrument_node="">Grammar of Ornament</span></i><span data-dcnode-id="8959" instrument_node=""> (1856).</span><sup class="reference" data-dcnode-id="8956" id="cite_ref-FOOTNOTENaylor197121_12-2"><a data-dcnode-id="8957" href="#cite_note-FOOTNOTENaylor197121-12"><span data-dcnode-id="8958" instrument_node="">[12]</span></a></sup><span data-dcnode-id="8955" instrument_node=""> The </span><i data-dcnode-id="8953"><span data-dcnode-id="8954" instrument_node="">Grammar of Ornament</span></i><span data-dcnode-id="8952" instrument_node=""> was particularly influential, liberally distributed as a student prize and running into nine reprints by 1910.</span><sup class="reference" data-dcnode-id="8949" id="cite_ref-FOOTNOTENaylor197121_12-3"><a data-dcnode-id="8950" href="#cite_note-FOOTNOTENaylor197121-12"><span data-dcnode-id="8951" instrument_node="">[12]</span></a></sup><span data-dcnode-id="8948" instrument_node="">
</span></p><p data-dcnode-id="8934"><span data-dcnode-id="8946" instrument_node="">Jones declared that ornament "must be secondary to the thing decorated", that there must be "fitness in the ornament to the thing ornamented", and that wallpapers and carpets must not have any patterns "suggestive of anything but a level or plain".</span><sup class="reference" data-dcnode-id="8943" id="cite_ref-14"><a data-dcnode-id="8944" href="#cite_note-14"><span data-dcnode-id="8945" instrument_node="">[14]</span></a></sup><span data-dcnode-id="8942" instrument_node=""> A fabric or wallpaper in the Great Exhibition might be decorated with a natural motif made to look as real as possible, whereas these writers advocated flat and simplified natural motifs. Redgrave insisted that "style" demanded sound construction before ornamentation, and a proper awareness of the quality of materials used. "</span><i data-dcnode-id="8940"><span data-dcnode-id="8941" instrument_node="">Utility</span></i><span data-dcnode-id="8939" instrument_node=""> must have precedence over ornamentation."</span><sup class="reference" data-dcnode-id="8936" id="cite_ref-FOOTNOTENaylor197122_15-0"><a data-dcnode-id="8937" href="#cite_note-FOOTNOTENaylor197122-15"><span data-dcnode-id="8938" instrument_node="">[15]</span></a></sup><span data-dcnode-id="8935" instrument_node="">
</span></p><span data-dcnode-id="8933" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8912"><div class="thumbinner" data-dcnode-id="8913" style="width:172px;"><a class="image" data-dcnode-id="8931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKelmscott_Press_-_The_Nature_of_Gothic_by_John_Ruskin_%28first_page%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="8932" data-file-height="768" data-file-width="528" decoding="async" height="247" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/79/Kelmscott_Press_-_The_Nature_of_Gothic_by_John_Ruskin_%2528first_page%2529.jpg/170px-Kelmscott_Press_-_The_Nature_of_Gothic_by_John_Ruskin_%2528first_page%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/79/Kelmscott_Press_-_The_Nature_of_Gothic_by_John_Ruskin_%28first_page%29.jpg/255px-Kelmscott_Press_-_The_Nature_of_Gothic_by_John_Ruskin_%28first_page%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/79/Kelmscott_Press_-_The_Nature_of_Gothic_by_John_Ruskin_%28first_page%29.jpg/340px-Kelmscott_Press_-_The_Nature_of_Gothic_by_John_Ruskin_%28first_page%29.jpg 2x" width="170"></a><span data-dcnode-id="8930" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8914"><div class="magnify" data-dcnode-id="8928"><a class="internal" data-dcnode-id="8929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKelmscott_Press_-_The_Nature_of_Gothic_by_John_Ruskin_%28first_page%29.jpg" title="Enlarge"></a></div><i data-dcnode-id="8926"><span data-dcnode-id="8927" instrument_node="">The Nature of Gothic</span></i><span data-dcnode-id="8925" instrument_node=""> by John Ruskin, printed by William Morris at the Kelmscott Press in 1892 in his </span><a data-dcnode-id="8923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Golden_Type" title="Golden Type"><span data-dcnode-id="8924" instrument_node="">Golden Type</span></a><span data-dcnode-id="8922" instrument_node=""> inspired by 15th century printer </span><a data-dcnode-id="8920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nicolas_Jenson" title="Nicolas Jenson"><span data-dcnode-id="8921" instrument_node="">Nicolas Jenson</span></a><span data-dcnode-id="8919" instrument_node="">. This chapter from </span><i data-dcnode-id="8916"><a data-dcnode-id="8917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Stones_of_Venice_%28book%29" title="The Stones of Venice (book)"><span data-dcnode-id="8918" instrument_node="">The Stones of Venice (book)</span></a></i><span data-dcnode-id="8915" instrument_node=""> was a sort of manifesto for the Arts and Crafts movement.</span></div></div></div><span data-dcnode-id="8911" instrument_node="">
</span><p data-dcnode-id="8905"><span data-dcnode-id="8910" instrument_node="">However, the design reformers of the mid-19th century did not go as far as the designers of the Arts and Crafts movement. They were more concerned with ornamentation than construction, they had an incomplete understanding of methods of manufacture,</span><sup class="reference" data-dcnode-id="8907" id="cite_ref-FOOTNOTENaylor197122_15-1"><a data-dcnode-id="8908" href="#cite_note-FOOTNOTENaylor197122-15"><span data-dcnode-id="8909" instrument_node="">[15]</span></a></sup><span data-dcnode-id="8906" instrument_node=""> and they did not criticise industrial methods as such. By contrast, the Arts and Crafts movement was as much a movement of social reform as design reform, and its leading practitioners did not separate the two.
</span></p><span data-dcnode-id="8904" instrument_node="">
</span><h3 data-dcnode-id="8894"><span class="mw-headline" data-dcnode-id="8902" id="A._W._N._Pugin"><span data-dcnode-id="8903" instrument_node="">A. W. N. Pugin</span></span><span class="mw-editsection" data-dcnode-id="8895"><span class="mw-editsection-bracket" data-dcnode-id="8900"><span data-dcnode-id="8901" instrument_node="">[</span></span><a data-dcnode-id="8898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DArts_and_Crafts_movement%26action%3Dedit%26section%3D3" title="Edit section: A. W. N. Pugin"><span data-dcnode-id="8899" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8896"><span data-dcnode-id="8897" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8893" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8884"><div class="thumbinner" data-dcnode-id="8885" style="width:222px;"><a class="image" data-dcnode-id="8891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThe_Grange%2C_Ramsgate_1.jpg"><img alt="" class="thumbimage" data-dcnode-id="8892" data-file-height="2112" data-file-width="2832" decoding="async" height="164" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/d6/The_Grange%252C_Ramsgate_1.jpg/220px-The_Grange%252C_Ramsgate_1.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/d6/The_Grange%2C_Ramsgate_1.jpg/330px-The_Grange%2C_Ramsgate_1.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/d6/The_Grange%2C_Ramsgate_1.jpg/440px-The_Grange%2C_Ramsgate_1.jpg 2x" width="220"></a><span data-dcnode-id="8890" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8886"><div class="magnify" data-dcnode-id="8888"><a class="internal" data-dcnode-id="8889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThe_Grange%2C_Ramsgate_1.jpg" title="Enlarge"></a></div><span data-dcnode-id="8887" instrument_node="">Pugin's house "The Grange" in Ramsgate, 1843. Its simplified Gothic style, adapted to domestic building, helped shape the architecture of the Arts and Crafts movement.</span></div></div></div><span data-dcnode-id="8883" instrument_node="">
</span><p data-dcnode-id="8857"><span data-dcnode-id="8882" instrument_node="">Some of the ideas of the movement were anticipated by </span><a class="mw-redirect" data-dcnode-id="8880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/A._W._N._Pugin" title="A. W. N. Pugin"><span data-dcnode-id="8881" instrument_node="">A. W. N. Pugin</span></a><span data-dcnode-id="8879" instrument_node=""> (1812–1852), a leader in the </span><a class="mw-redirect" data-dcnode-id="8877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gothic_revival_architecture" title="Gothic revival architecture"><span data-dcnode-id="8878" instrument_node="">Gothic revival in architecture</span></a><span data-dcnode-id="8876" instrument_node="">. For example, he advocated truth to material, structure, and function, as did the Arts and Crafts artists.</span><sup class="reference" data-dcnode-id="8873" id="cite_ref-V&amp;A_16-0"><a data-dcnode-id="8874" href="#cite_note-V&amp;A-16"><span data-dcnode-id="8875" instrument_node="">[16]</span></a></sup><span data-dcnode-id="8872" instrument_node=""> Pugin articulated the tendency of social critics to compare the faults of modern society with the Middle Ages,</span><sup class="reference" data-dcnode-id="8869" id="cite_ref-hill_17-0"><a data-dcnode-id="8870" href="#cite_note-hill-17"><span data-dcnode-id="8871" instrument_node="">[17]</span></a></sup><span data-dcnode-id="8868" instrument_node=""> such as the sprawling growth of cities and the treatment of the poor – a tendency that became routine with Ruskin, Morris, and the Arts and Crafts movement. His book </span><i data-dcnode-id="8866"><span data-dcnode-id="8867" instrument_node="">Contrasts</span></i><span data-dcnode-id="8865" instrument_node=""> (1836) drew examples of bad modern buildings and town planning in contrast with good medieval examples, and his biographer </span><a data-dcnode-id="8863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rosemary_Hill" title="Rosemary Hill"><span data-dcnode-id="8864" instrument_node="">Rosemary Hill</span></a><span data-dcnode-id="8862" instrument_node=""> notes that he "reached conclusions, almost in passing, about the importance of craftsmanship and tradition in architecture that it would take the rest of the century and the combined efforts of Ruskin and Morris to work out in detail." She describes the spare furnishings which he specified for a building in 1841, "rush chairs, oak tables", as "the Arts and Crafts interior in embryo."</span><sup class="reference" data-dcnode-id="8859" id="cite_ref-hill_17-1"><a data-dcnode-id="8860" href="#cite_note-hill-17"><span data-dcnode-id="8861" instrument_node="">[17]</span></a></sup><span data-dcnode-id="8858" instrument_node="">
</span></p><span data-dcnode-id="8856" instrument_node="">
</span><h3 data-dcnode-id="8846"><span class="mw-headline" data-dcnode-id="8854" id="John_Ruskin"><span data-dcnode-id="8855" instrument_node="">John Ruskin</span></span><span class="mw-editsection" data-dcnode-id="8847"><span class="mw-editsection-bracket" data-dcnode-id="8852"><span data-dcnode-id="8853" instrument_node="">[</span></span><a data-dcnode-id="8850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DArts_and_Crafts_movement%26action%3Dedit%26section%3D4" title="Edit section: John Ruskin"><span data-dcnode-id="8851" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8848"><span data-dcnode-id="8849" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8845" instrument_node="">
</span><p data-dcnode-id="8815"><span data-dcnode-id="8844" instrument_node="">The Arts and Crafts philosophy was derived in large measure from </span><a data-dcnode-id="8842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Ruskin" title="John Ruskin"><span data-dcnode-id="8843" instrument_node="">John Ruskin</span></a><span data-dcnode-id="8841" instrument_node="">'s social criticism, deeply influenced by the work of </span><a data-dcnode-id="8839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Carlyle" title="Thomas Carlyle"><span data-dcnode-id="8840" instrument_node="">Thomas Carlyle</span></a><span data-dcnode-id="8838" instrument_node="">.</span><sup class="reference" data-dcnode-id="8835" id="cite_ref-18"><a data-dcnode-id="8836" href="#cite_note-18"><span data-dcnode-id="8837" instrument_node="">[18]</span></a></sup><span data-dcnode-id="8834" instrument_node=""> Ruskin related the moral and social health of a nation to the qualities of its architecture and to the nature of its work. Ruskin considered the sort of mechanized production and division of labour that had been created in the </span><a class="mw-redirect" data-dcnode-id="8832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Industrial_revolution" title="Industrial revolution"><span data-dcnode-id="8833" instrument_node="">industrial revolution</span></a><span data-dcnode-id="8831" instrument_node=""> to be "servile labour", and he thought that a healthy and moral society required independent workers who designed the things that they made. He believed factory-made works to be "dishonest," and that handwork and craftsmanship merged dignity with labour.</span><sup class="reference" data-dcnode-id="8828" id="cite_ref-19"><a data-dcnode-id="8829" href="#cite_note-19"><span data-dcnode-id="8830" instrument_node="">[19]</span></a></sup><span data-dcnode-id="8827" instrument_node=""> His followers favoured craft production over industrial manufacture and were concerned about the loss of traditional skills, but they were more troubled by the effects of the </span><a data-dcnode-id="8825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Factory_system" title="Factory system"><span data-dcnode-id="8826" instrument_node="">factory system</span></a><span data-dcnode-id="8824" instrument_node=""> than by machinery itself.</span><sup class="reference" data-dcnode-id="8821" id="cite_ref-sarsby_20-0"><a data-dcnode-id="8822" href="#cite_note-sarsby-20"><span data-dcnode-id="8823" instrument_node="">[20]</span></a></sup><span data-dcnode-id="8820" instrument_node=""> William Morris's idea of "handicraft" was essentially work without any division of labour rather than work without any sort of machinery.</span><sup class="reference" data-dcnode-id="8817" id="cite_ref-pye_21-0"><a data-dcnode-id="8818" href="#cite_note-pye-21"><span data-dcnode-id="8819" instrument_node="">[21]</span></a></sup><span data-dcnode-id="8816" instrument_node="">
</span></p><span data-dcnode-id="8814" instrument_node="">
</span><h3 data-dcnode-id="8804"><span class="mw-headline" data-dcnode-id="8812" id="William_Morris"><span data-dcnode-id="8813" instrument_node="">William Morris</span></span><span class="mw-editsection" data-dcnode-id="8805"><span class="mw-editsection-bracket" data-dcnode-id="8810"><span data-dcnode-id="8811" instrument_node="">[</span></span><a data-dcnode-id="8808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DArts_and_Crafts_movement%26action%3Dedit%26section%3D5" title="Edit section: William Morris"><span data-dcnode-id="8809" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8806"><span data-dcnode-id="8807" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8803" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8794"><div class="thumbinner" data-dcnode-id="8795" style="width:172px;"><a class="image" data-dcnode-id="8801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWilliam_Morris_age_53.jpg"><img alt="" class="thumbimage" data-dcnode-id="8802" data-file-height="1767" data-file-width="1404" decoding="async" height="214" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/8a/William_Morris_age_53.jpg/170px-William_Morris_age_53.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/8a/William_Morris_age_53.jpg/255px-William_Morris_age_53.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/8a/William_Morris_age_53.jpg/340px-William_Morris_age_53.jpg 2x" width="170"></a><span data-dcnode-id="8800" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8796"><div class="magnify" data-dcnode-id="8798"><a class="internal" data-dcnode-id="8799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWilliam_Morris_age_53.jpg" title="Enlarge"></a></div><span data-dcnode-id="8797" instrument_node="">William Morris, a textile designer who was a key influence on the Arts and Crafts movement</span></div></div></div><span data-dcnode-id="8793" instrument_node="">
</span><p data-dcnode-id="8743"><a data-dcnode-id="8791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Morris" title="William Morris"><span data-dcnode-id="8792" instrument_node="">William Morris</span></a><span data-dcnode-id="8790" instrument_node=""> (1834–1896) was the towering figure in late 19th-century design and the main influence on the Arts and Crafts movement. The aesthetic and social vision of the movement grew out of ideas that he developed in the 1850s with the </span><a data-dcnode-id="8788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Birmingham_Set" title="Birmingham Set"><span data-dcnode-id="8789" instrument_node="">Birmingham Set</span></a><span data-dcnode-id="8787" instrument_node=""> – a group of students at the </span><a data-dcnode-id="8785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/University_of_Oxford" title="University of Oxford"><span data-dcnode-id="8786" instrument_node="">University of Oxford</span></a><span data-dcnode-id="8784" instrument_node=""> including </span><a data-dcnode-id="8782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_Burne-Jones" title="Edward Burne-Jones"><span data-dcnode-id="8783" instrument_node="">Edward Burne-Jones</span></a><span data-dcnode-id="8781" instrument_node="">, who combined a love of </span><a class="mw-redirect" data-dcnode-id="8779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Romantic_literature" title="Romantic literature"><span data-dcnode-id="8780" instrument_node="">Romantic literature</span></a><span data-dcnode-id="8778" instrument_node=""> with a commitment to social reform.</span><sup class="reference" data-dcnode-id="8775" id="cite_ref-FOOTNOTENaylor197196–97_22-0"><a data-dcnode-id="8776" href="#cite_note-FOOTNOTENaylor197196%E2%80%9397-22"><span data-dcnode-id="8777" instrument_node="">[22]</span></a></sup><span data-dcnode-id="8774" instrument_node=""> </span><a data-dcnode-id="8772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_William_Mackail" title="John William Mackail"><span data-dcnode-id="8773" instrument_node="">John William Mackail</span></a><span data-dcnode-id="8771" instrument_node=""> notes that "Carlyle's </span><i data-dcnode-id="8768"><a data-dcnode-id="8769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Past_and_Present_%28book%29" title="Past and Present (book)"><span data-dcnode-id="8770" instrument_node="">Past and Present</span></a></i><span data-dcnode-id="8767" instrument_node=""> stood alongside of [Ruskin's] </span><i data-dcnode-id="8764"><a data-dcnode-id="8765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Modern_Painters" title="Modern Painters"><span data-dcnode-id="8766" instrument_node="">Modern Painters</span></a></i><span data-dcnode-id="8763" instrument_node=""> as inspired and absolute truth."</span><sup class="reference" data-dcnode-id="8760" id="cite_ref-23"><a data-dcnode-id="8761" href="#cite_note-23"><span data-dcnode-id="8762" instrument_node="">[23]</span></a></sup><span data-dcnode-id="8759" instrument_node=""> The medievalism of </span><a data-dcnode-id="8757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Malory" title="Thomas Malory"><span data-dcnode-id="8758" instrument_node="">Malory</span></a><span data-dcnode-id="8756" instrument_node="">'s </span><i data-dcnode-id="8753"><a class="mw-redirect" data-dcnode-id="8754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Morte_d%2527Arthur" title="Morte d'Arthur"><span data-dcnode-id="8755" instrument_node="">Morte d'Arthur</span></a></i><span data-dcnode-id="8752" instrument_node=""> set the standard for their early style.</span><sup class="reference" data-dcnode-id="8749" id="cite_ref-FOOTNOTEWildman199849_24-0"><a data-dcnode-id="8750" href="#cite_note-FOOTNOTEWildman199849-24"><span data-dcnode-id="8751" instrument_node="">[24]</span></a></sup><span data-dcnode-id="8748" instrument_node=""> In Burne-Jones' words, they intended to "wage Holy warfare against the age".</span><sup class="reference" data-dcnode-id="8745" id="cite_ref-FOOTNOTENaylor197197_25-0"><a data-dcnode-id="8746" href="#cite_note-FOOTNOTENaylor197197-25"><span data-dcnode-id="8747" instrument_node="">[25]</span></a></sup><span data-dcnode-id="8744" instrument_node="">
</span></p><span data-dcnode-id="8742" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8727"><div class="thumbinner" data-dcnode-id="8728" style="width:222px;"><a class="image" data-dcnode-id="8740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThe_Red_House%2C_Bexleyheath.JPG"><img alt="" class="thumbimage" data-dcnode-id="8741" data-file-height="972" data-file-width="1296" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/03/The_Red_House%252C_Bexleyheath.JPG/220px-The_Red_House%252C_Bexleyheath.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/03/The_Red_House%2C_Bexleyheath.JPG/330px-The_Red_House%2C_Bexleyheath.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/03/The_Red_House%2C_Bexleyheath.JPG/440px-The_Red_House%2C_Bexleyheath.JPG 2x" width="220"></a><span data-dcnode-id="8739" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8729"><div class="magnify" data-dcnode-id="8737"><a class="internal" data-dcnode-id="8738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThe_Red_House%2C_Bexleyheath.JPG" title="Enlarge"></a></div><span data-dcnode-id="8736" instrument_node="">William Morris's </span><a class="mw-redirect" data-dcnode-id="8734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red_House_%28London%29" title="Red House (London)"><span data-dcnode-id="8735" instrument_node="">Red House</span></a><span data-dcnode-id="8733" instrument_node=""> in Bexleyheath, designed by Philip Webb and completed in 1860; one of the most significant buildings of the Arts and Crafts movement</span><sup class="reference" data-dcnode-id="8730" id="cite_ref-26"><a data-dcnode-id="8731" href="#cite_note-26"><span data-dcnode-id="8732" instrument_node="">[26]</span></a></sup></div></div></div><span data-dcnode-id="8726" instrument_node="">
</span><p data-dcnode-id="8712"><span data-dcnode-id="8725" instrument_node="">Morris began experimenting with various crafts and designing furniture and interiors.</span><sup class="reference" data-dcnode-id="8722" id="cite_ref-FOOTNOTEMacCarthy2009_27-0"><a data-dcnode-id="8723" href="#cite_note-FOOTNOTEMacCarthy2009-27"><span data-dcnode-id="8724" instrument_node="">[27]</span></a></sup><span data-dcnode-id="8721" instrument_node=""> He was personally involved in manufacture as well as design,</span><sup class="reference" data-dcnode-id="8718" id="cite_ref-FOOTNOTEMacCarthy2009_27-1"><a data-dcnode-id="8719" href="#cite_note-FOOTNOTEMacCarthy2009-27"><span data-dcnode-id="8720" instrument_node="">[27]</span></a></sup><span data-dcnode-id="8717" instrument_node=""> which was the hallmark of the Arts and Crafts movement. Ruskin had argued that the separation of the intellectual act of design from the manual act of physical creation was both socially and aesthetically damaging. Morris further developed this idea, insisting that no work should be carried out in his workshops before he had personally mastered the appropriate techniques and materials, arguing that "without dignified, creative human occupation people became disconnected from life".</span><sup class="reference" data-dcnode-id="8714" id="cite_ref-FOOTNOTEMacCarthy2009_27-2"><a data-dcnode-id="8715" href="#cite_note-FOOTNOTEMacCarthy2009-27"><span data-dcnode-id="8716" instrument_node="">[27]</span></a></sup><span data-dcnode-id="8713" instrument_node="">
</span></p><span data-dcnode-id="8711" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8699"><div class="thumbinner" data-dcnode-id="8700" style="width:222px;"><a class="image" data-dcnode-id="8709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMorris_and_Company_Weaving_at_Merton_Abbey.jpg"><img alt="" class="thumbimage" data-dcnode-id="8710" data-file-height="1383" data-file-width="1880" decoding="async" height="162" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/0a/Morris_and_Company_Weaving_at_Merton_Abbey.jpg/220px-Morris_and_Company_Weaving_at_Merton_Abbey.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/0a/Morris_and_Company_Weaving_at_Merton_Abbey.jpg/330px-Morris_and_Company_Weaving_at_Merton_Abbey.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/0a/Morris_and_Company_Weaving_at_Merton_Abbey.jpg/440px-Morris_and_Company_Weaving_at_Merton_Abbey.jpg 2x" width="220"></a><span data-dcnode-id="8708" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8701"><div class="magnify" data-dcnode-id="8706"><a class="internal" data-dcnode-id="8707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMorris_and_Company_Weaving_at_Merton_Abbey.jpg" title="Enlarge"></a></div><span data-dcnode-id="8705" instrument_node="">The weaving shed in Morris &amp; Co's factory at </span><a data-dcnode-id="8703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Merton%2C_London_%28parish%29" title="Merton, London (parish)"><span data-dcnode-id="8704" instrument_node="">Merton</span></a><span data-dcnode-id="8702" instrument_node="">, which opened in the 1880s</span></div></div></div><span data-dcnode-id="8698" instrument_node="">
</span><p data-dcnode-id="8692"><span data-dcnode-id="8697" instrument_node="">In 1861, Morris began making furniture and decorative objects commercially, modelling his designs on medieval styles and using bold forms and strong colours. His patterns were based on flora and fauna, and his products were inspired by the vernacular or domestic traditions of the British countryside. Some were deliberately left unfinished in order to display the beauty of the materials and the work of the craftsman, thus creating a rustic appearance. Morris strove to unite all the arts within the decoration of the home, emphasizing nature and simplicity of form.</span><sup class="reference" data-dcnode-id="8694" id="cite_ref-28"><a data-dcnode-id="8695" href="#cite_note-28"><span data-dcnode-id="8696" instrument_node="">[28]</span></a></sup><span data-dcnode-id="8693" instrument_node="">
</span></p><span data-dcnode-id="8691" instrument_node="">
</span><h2 data-dcnode-id="8681"><span class="mw-headline" data-dcnode-id="8689" id="Social_and_design_principles"><span data-dcnode-id="8690" instrument_node="">Social and design principles</span></span><span class="mw-editsection" data-dcnode-id="8682"><span class="mw-editsection-bracket" data-dcnode-id="8687"><span data-dcnode-id="8688" instrument_node="">[</span></span><a data-dcnode-id="8685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DArts_and_Crafts_movement%26action%3Dedit%26section%3D6" title="Edit section: Social and design principles"><span data-dcnode-id="8686" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8683"><span data-dcnode-id="8684" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8680" instrument_node="">
</span><span data-dcnode-id="8679" instrument_node="">
</span><span data-dcnode-id="8678" instrument_node="">
</span><table cellspacing="1" class="toccolours" data-dcnode-id="8658" style="float: right; margin-left: 1em; margin-right: 1em; font-size: 85%; background:#c6dbf7; color:black; width:30em; max-width: 40%;"><tbody data-dcnode-id="8659"><tr data-dcnode-id="8660"><td data-dcnode-id="8661" style="text-align: left;"><span data-dcnode-id="8677" instrument_node="">
</span><p data-dcnode-id="8672"><span data-dcnode-id="8676" instrument_node="">Unlike their counterparts in the United States, most Arts and Crafts practitioners in Britain had strong, slightly incoherent, negative feelings about machinery. They thought of 'the craftsman' as free, creative, and working with his hands, 'the machine' as soulless, repetitive, and inhuman. These contrasting images derive in part from John Ruskin's (1819–1900) </span><i data-dcnode-id="8674"><span data-dcnode-id="8675" instrument_node="">The Stones of Venice</span></i><span data-dcnode-id="8673" instrument_node="">, an architectural history of Venice that contains a powerful denunciation of modern industrialism to which Arts and Crafts designers returned again and again. Distrust for the machine lay behind the many little workshops that turned their backs on the industrial world around 1900, using preindustrial techniques to create what they called 'crafts.'
</span></p><p data-dcnode-id="8663"><span data-dcnode-id="8671" instrument_node="">— Alan Crawford, "</span><a data-dcnode-id="8669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Arthur_Smith_Benson" title="William Arthur Smith Benson"><span data-dcnode-id="8670" instrument_node="">W. A. S. Benson</span></a><span data-dcnode-id="8668" instrument_node="">, Machinery, and the Arts and Crafts Movement in Britain"</span><sup class="reference" data-dcnode-id="8665" id="cite_ref-29"><a data-dcnode-id="8666" href="#cite_note-29"><span data-dcnode-id="8667" instrument_node="">[29]</span></a></sup><span data-dcnode-id="8664" instrument_node="">
</span></p><span data-dcnode-id="8662" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="8657" instrument_node="">
</span><h3 data-dcnode-id="8647"><span class="mw-headline" data-dcnode-id="8655" id="Critique_of_industry"><span data-dcnode-id="8656" instrument_node="">Critique of industry</span></span><span class="mw-editsection" data-dcnode-id="8648"><span class="mw-editsection-bracket" data-dcnode-id="8653"><span data-dcnode-id="8654" instrument_node="">[</span></span><a data-dcnode-id="8651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DArts_and_Crafts_movement%26action%3Dedit%26section%3D7" title="Edit section: Critique of industry"><span data-dcnode-id="8652" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8649"><span data-dcnode-id="8650" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8646" instrument_node="">
</span><p data-dcnode-id="8622"><span data-dcnode-id="8645" instrument_node="">William Morris shared Ruskin's critique of industrial society and at one time or another attacked the modern factory, the use of machinery, the division of labour, capitalism and the loss of traditional craft methods. But his attitude to machinery was inconsistent. He said at one point that production by machinery was "altogether an evil",</span><sup class="reference" data-dcnode-id="8642" id="cite_ref-pevsner_10-1"><a data-dcnode-id="8643" href="#cite_note-pevsner-10"><span data-dcnode-id="8644" instrument_node="">[10]</span></a></sup><span data-dcnode-id="8641" instrument_node=""> but at others times, he was willing to commission work from manufacturers who were able to meet his standards with the aid of machines.</span><sup class="reference" data-dcnode-id="8638" id="cite_ref-30"><a data-dcnode-id="8639" href="#cite_note-30"><span data-dcnode-id="8640" instrument_node="">[30]</span></a></sup><span data-dcnode-id="8637" instrument_node=""> Morris said that in a "true society", where neither luxuries nor cheap trash were made, machinery could be improved and used to reduce the hours of labour.</span><sup class="reference" data-dcnode-id="8634" id="cite_ref-31"><a data-dcnode-id="8635" href="#cite_note-31"><span data-dcnode-id="8636" instrument_node="">[31]</span></a></sup><span data-dcnode-id="8633" instrument_node=""> Fiona MacCarthy says that "unlike later zealots like </span><a data-dcnode-id="8631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mahatma_Gandhi" title="Mahatma Gandhi"><span data-dcnode-id="8632" instrument_node="">Gandhi</span></a><span data-dcnode-id="8630" instrument_node="">, William Morris had no practical objections to the use of machinery </span><i data-dcnode-id="8628"><span data-dcnode-id="8629" instrument_node="">per se</span></i><span data-dcnode-id="8627" instrument_node=""> so long as the machines produced the quality he needed."</span><sup class="reference" data-dcnode-id="8624" id="cite_ref-FOOTNOTEMacCarthy1994351_32-0"><a data-dcnode-id="8625" href="#cite_note-FOOTNOTEMacCarthy1994351-32"><span data-dcnode-id="8626" instrument_node="">[32]</span></a></sup><span data-dcnode-id="8623" instrument_node="">
</span></p><p data-dcnode-id="8612"><span data-dcnode-id="8621" instrument_node="">Morris insisted that the artist should be a craftsman-designer working by hand</span><sup class="reference" data-dcnode-id="8618" id="cite_ref-pevsner_10-2"><a data-dcnode-id="8619" href="#cite_note-pevsner-10"><span data-dcnode-id="8620" instrument_node="">[10]</span></a></sup><span data-dcnode-id="8617" instrument_node=""> and advocated a society of free craftspeople, such as he believed had existed during the Middle Ages. "Because craftsmen took pleasure in their work", he wrote, "the Middle Ages was a period of greatness in the art of the common people. ... The treasures in our museums now are only the common utensils used in households of that age, when hundreds of medieval churches&nbsp;– each one a masterpiece&nbsp;– were built by unsophisticated peasants."</span><sup class="reference" data-dcnode-id="8614" id="cite_ref-mingei_33-0"><a data-dcnode-id="8615" href="#cite_note-mingei-33"><span data-dcnode-id="8616" instrument_node="">[33]</span></a></sup><span data-dcnode-id="8613" instrument_node=""> Medieval art was the model for much of Arts and Crafts design, and medieval life, literature and building was idealised by the movement.
</span></p><p data-dcnode-id="8589"><span data-dcnode-id="8611" instrument_node="">Morris's followers also had differing views about machinery and the factory system. For example, </span><a data-dcnode-id="8609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Robert_Ashbee" title="Charles Robert Ashbee"><span data-dcnode-id="8610" instrument_node="">C.&nbsp;R. Ashbee</span></a><span data-dcnode-id="8608" instrument_node="">, a central figure in the Arts and Crafts movement, said in 1888, that, "We do not reject the machine, we welcome it. But we would desire to see it mastered."</span><sup class="reference" data-dcnode-id="8605" id="cite_ref-pevsner_10-3"><a data-dcnode-id="8606" href="#cite_note-pevsner-10"><span data-dcnode-id="8607" instrument_node="">[10]</span></a></sup><sup class="reference" data-dcnode-id="8602" id="cite_ref-34"><a data-dcnode-id="8603" href="#cite_note-34"><span data-dcnode-id="8604" instrument_node="">[34]</span></a></sup><span data-dcnode-id="8601" instrument_node=""> After unsuccessfully pitting his Guild and School of Handicraft guild against modern methods of manufacture, he acknowledged that "Modern civilisation rests on machinery",</span><sup class="reference" data-dcnode-id="8598" id="cite_ref-pevsner_10-4"><a data-dcnode-id="8599" href="#cite_note-pevsner-10"><span data-dcnode-id="8600" instrument_node="">[10]</span></a></sup><span data-dcnode-id="8597" instrument_node=""> but he continued to criticise the deleterious effects of what he called "mechanism", saying that "the production of certain mechanical commodities is as bad for the national health as is the production of slave-grown cane or child-sweated wares."</span><sup class="reference" data-dcnode-id="8594" id="cite_ref-35"><a data-dcnode-id="8595" href="#cite_note-35"><span data-dcnode-id="8596" instrument_node="">[35]</span></a></sup><span data-dcnode-id="8593" instrument_node=""> </span><a data-dcnode-id="8591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Arthur_Smith_Benson" title="William Arthur Smith Benson"><span data-dcnode-id="8592" instrument_node="">William Arthur Smith Benson</span></a><span data-dcnode-id="8590" instrument_node="">, on the other hand, had no qualms about adapting the Arts and Crafts style to metalwork produced under industrial conditions. (See quotation box.)
</span></p><p data-dcnode-id="8569"><span data-dcnode-id="8588" instrument_node="">Morris and his followers believed the division of labour on which modern industry depended was undesirable, but the extent to which every design should be carried out by the designer was a matter for debate and disagreement. Not all Arts and Crafts artists carried out every stage in the making of goods themselves, and it was only in the twentieth century that that became essential to the definition of craftsmanship. Although Morris was famous for getting hands-on experience himself of many crafts (including weaving, dying, printing, calligraphy and embroidery), he did not regard the separation of designer and executant in his factory as problematic. Walter Crane, a close political associate of Morris's, took an unsympathetic view of the division of labour on both moral and artistic grounds, and strongly advocated that designing and making should come from the same hand. Lewis Foreman Day, a friend and contemporary of Crane's, as unstinting as Crane in his admiration of Morris, disagreed strongly with Crane. He thought that the separation of design and execution was not only inevitable in the modern world, but also that only that sort of specialisation allowed the best in design and the best in making.</span><sup class="reference" data-dcnode-id="8585" id="cite_ref-36"><a data-dcnode-id="8586" href="#cite_note-36"><span data-dcnode-id="8587" instrument_node="">[36]</span></a></sup><span data-dcnode-id="8584" instrument_node="">  Few of the founders of the </span><a data-dcnode-id="8582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arts_and_Crafts_Exhibition_Society" title="Arts and Crafts Exhibition Society"><span data-dcnode-id="8583" instrument_node="">Arts and Crafts Exhibition Society</span></a><span data-dcnode-id="8581" instrument_node=""> insisted that the designer should also be the maker. Peter Floud, writing in the 1950s, said that "The founders of the Society ... never executed their own designs, but invariably turned them over to commercial firms."</span><sup class="reference" data-dcnode-id="8578" id="cite_ref-floud_37-0"><a data-dcnode-id="8579" href="#cite_note-floud-37"><span data-dcnode-id="8580" instrument_node="">[37]</span></a></sup><span data-dcnode-id="8577" instrument_node=""> The idea that the designer should be the maker and the maker the designer derived "not from Morris or early Arts and Crafts teaching, but rather from the second-generation elaboration doctrine worked out in the first decade of [the twentieth] century by men such as </span><a class="mw-redirect" data-dcnode-id="8575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/W._R._Lethaby" title="W. R. Lethaby"><span data-dcnode-id="8576" instrument_node="">W. R. Lethaby</span></a><span data-dcnode-id="8574" instrument_node="">".</span><sup class="reference" data-dcnode-id="8571" id="cite_ref-floud_37-1"><a data-dcnode-id="8572" href="#cite_note-floud-37"><span data-dcnode-id="8573" instrument_node="">[37]</span></a></sup><span data-dcnode-id="8570" instrument_node="">
</span></p><span data-dcnode-id="8568" instrument_node="">
</span><h3 data-dcnode-id="8558"><span class="mw-headline" data-dcnode-id="8566" id="Socialism"><span data-dcnode-id="8567" instrument_node="">Socialism</span></span><span class="mw-editsection" data-dcnode-id="8559"><span class="mw-editsection-bracket" data-dcnode-id="8564"><span data-dcnode-id="8565" instrument_node="">[</span></span><a data-dcnode-id="8562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DArts_and_Crafts_movement%26action%3Dedit%26section%3D8" title="Edit section: Socialism"><span data-dcnode-id="8563" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8560"><span data-dcnode-id="8561" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8557" instrument_node="">
</span><p data-dcnode-id="8512"><span data-dcnode-id="8556" instrument_node="">Many of the Arts and Crafts movement designers were socialists, including Morris, </span><a class="mw-redirect" data-dcnode-id="8554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/T._J._Cobden_Sanderson" title="T. J. Cobden Sanderson"><span data-dcnode-id="8555" instrument_node="">T. J. Cobden Sanderson</span></a><span data-dcnode-id="8553" instrument_node="">, </span><a data-dcnode-id="8551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Walter_Crane" title="Walter Crane"><span data-dcnode-id="8552" instrument_node="">Walter Crane</span></a><span data-dcnode-id="8550" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="8548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/C.R._Ashbee" title="C.R. Ashbee"><span data-dcnode-id="8549" instrument_node="">C.R. Ashbee</span></a><span data-dcnode-id="8547" instrument_node="">, </span><a data-dcnode-id="8545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philip_Webb" title="Philip Webb"><span data-dcnode-id="8546" instrument_node="">Philip Webb</span></a><span data-dcnode-id="8544" instrument_node="">, </span><a data-dcnode-id="8542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Joseph_Faulkner" title="Charles Joseph Faulkner"><span data-dcnode-id="8543" instrument_node="">Charles Faulkner</span></a><span data-dcnode-id="8541" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="8539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/A._H._Mackmurdo" title="A. H. Mackmurdo"><span data-dcnode-id="8540" instrument_node="">A. H. Mackmurdo</span></a><span data-dcnode-id="8538" instrument_node="">.</span><sup class="reference" data-dcnode-id="8535" id="cite_ref-FOOTNOTENaylor1971109_38-0"><a data-dcnode-id="8536" href="#cite_note-FOOTNOTENaylor1971109-38"><span data-dcnode-id="8537" instrument_node="">[38]</span></a></sup><span data-dcnode-id="8534" instrument_node=""> In the early 1880s, Morris was spending more of his time on promoting socialism than on designing and making.</span><sup class="reference" data-dcnode-id="8531" id="cite_ref-FOOTNOTEMacCarthy1994640-663_39-0"><a data-dcnode-id="8532" href="#cite_note-FOOTNOTEMacCarthy1994640-663-39"><span data-dcnode-id="8533" instrument_node="">[39]</span></a></sup><span data-dcnode-id="8530" instrument_node=""> Ashbee established a community of craftsmen called the Guild of Handicraft in east London, later moving to </span><a data-dcnode-id="8528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chipping_Campden" title="Chipping Campden"><span data-dcnode-id="8529" instrument_node="">Chipping Campden</span></a><span data-dcnode-id="8527" instrument_node="">.</span><sup class="reference" data-dcnode-id="8524" id="cite_ref-crawford_7-1"><a data-dcnode-id="8525" href="#cite_note-crawford-7"><span data-dcnode-id="8526" instrument_node="">[7]</span></a></sup><span data-dcnode-id="8523" instrument_node=""> Those adherents who were not socialists, such as </span><a data-dcnode-id="8521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alfred_Hoare_Powell" title="Alfred Hoare Powell"><span data-dcnode-id="8522" instrument_node="">Alfred Hoare Powell</span></a><span data-dcnode-id="8520" instrument_node="">,</span><sup class="reference" data-dcnode-id="8517" id="cite_ref-sarsby_20-1"><a data-dcnode-id="8518" href="#cite_note-sarsby-20"><span data-dcnode-id="8519" instrument_node="">[20]</span></a></sup><span data-dcnode-id="8516" instrument_node=""> advocated a more humane and personal relationship between employer and employee. </span><a data-dcnode-id="8514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lewis_Foreman_Day" title="Lewis Foreman Day"><span data-dcnode-id="8515" instrument_node="">Lewis Foreman Day</span></a><span data-dcnode-id="8513" instrument_node=""> was another successful and influential Arts and Crafts designer who was not a socialist, despite his long friendship with Crane.
</span></p><span data-dcnode-id="8511" instrument_node="">
</span><h3 data-dcnode-id="8501"><span class="mw-headline" data-dcnode-id="8509" id="Association_with_other_reform_movements"><span data-dcnode-id="8510" instrument_node="">Association with other reform movements</span></span><span class="mw-editsection" data-dcnode-id="8502"><span class="mw-editsection-bracket" data-dcnode-id="8507"><span data-dcnode-id="8508" instrument_node="">[</span></span><a data-dcnode-id="8505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DArts_and_Crafts_movement%26action%3Dedit%26section%3D9" title="Edit section: Association with other reform movements"><span data-dcnode-id="8506" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8503"><span data-dcnode-id="8504" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8500" instrument_node="">
</span><p data-dcnode-id="8471"><span data-dcnode-id="8499" instrument_node="">In Britain, the movement was associated with </span><a class="mw-redirect" data-dcnode-id="8497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dress_reform" title="Dress reform"><span data-dcnode-id="8498" instrument_node="">dress reform</span></a><span data-dcnode-id="8496" instrument_node="">,</span><sup class="reference" data-dcnode-id="8493" id="cite_ref-40"><a data-dcnode-id="8494" href="#cite_note-40"><span data-dcnode-id="8495" instrument_node="">[40]</span></a></sup><span data-dcnode-id="8492" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="8490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ruralism" title="Ruralism"><span data-dcnode-id="8491" instrument_node="">ruralism</span></a><span data-dcnode-id="8489" instrument_node="">, the </span><a data-dcnode-id="8487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Garden_city_movement" title="Garden city movement"><span data-dcnode-id="8488" instrument_node="">garden city movement</span></a><sup class="reference" data-dcnode-id="8484" id="cite_ref-maccarthy2014_6-1"><a data-dcnode-id="8485" href="#cite_note-maccarthy2014-6"><span data-dcnode-id="8486" instrument_node="">[6]</span></a></sup><span data-dcnode-id="8483" instrument_node=""> and </span><a data-dcnode-id="8481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cecil_Sharp" title="Cecil Sharp"><span data-dcnode-id="8482" instrument_node="">the folk-song revival</span></a><span data-dcnode-id="8480" instrument_node="">. All were linked, in some degree, by the ideal of "the Simple Life".</span><sup class="reference" data-dcnode-id="8477" id="cite_ref-41"><a data-dcnode-id="8478" href="#cite_note-41"><span data-dcnode-id="8479" instrument_node="">[41]</span></a></sup><span data-dcnode-id="8476" instrument_node=""> In continental Europe the movement was associated with the preservation of national traditions in building, the applied arts, domestic design and costume.</span><sup class="reference" data-dcnode-id="8473" id="cite_ref-42"><a data-dcnode-id="8474" href="#cite_note-42"><span data-dcnode-id="8475" instrument_node="">[42]</span></a></sup><span data-dcnode-id="8472" instrument_node="">
</span></p><span data-dcnode-id="8470" instrument_node="">
</span><h2 data-dcnode-id="8460"><span class="mw-headline" data-dcnode-id="8468" id="Development"><span data-dcnode-id="8469" instrument_node="">Development</span></span><span class="mw-editsection" data-dcnode-id="8461"><span class="mw-editsection-bracket" data-dcnode-id="8466"><span data-dcnode-id="8467" instrument_node="">[</span></span><a data-dcnode-id="8464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DArts_and_Crafts_movement%26action%3Dedit%26section%3D10" title="Edit section: Development"><span data-dcnode-id="8465" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8462"><span data-dcnode-id="8463" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8459" instrument_node="">
</span><p data-dcnode-id="8448"><span data-dcnode-id="8458" instrument_node="">Morris's designs quickly became popular, attracting interest when his company's work was exhibited at the </span><a data-dcnode-id="8456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1862_International_Exhibition" title="1862 International Exhibition"><span data-dcnode-id="8457" instrument_node="">1862 International Exhibition</span></a><span data-dcnode-id="8455" instrument_node=""> in London. Much of Morris &amp; Co's early work was for churches and Morris won important interior design commissions at </span><a data-dcnode-id="8453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/St_James%2527s_Palace" title="St James's Palace"><span data-dcnode-id="8454" instrument_node="">St James's Palace</span></a><span data-dcnode-id="8452" instrument_node=""> and the </span><a class="mw-redirect" data-dcnode-id="8450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Kensington_Museum" title="South Kensington Museum"><span data-dcnode-id="8451" instrument_node="">South Kensington Museum</span></a><span data-dcnode-id="8449" instrument_node=""> (now the Victoria and Albert Museum). Later his work became popular with the middle and upper classes, despite his wish to create a democratic art, and by the end of the 19th century, Arts and Crafts design in houses and domestic interiors was the dominant style in Britain, copied in products made by conventional industrial methods.
</span></p><p data-dcnode-id="8442"><span data-dcnode-id="8447" instrument_node="">The spread of Arts and Crafts ideas during the late 19th and early 20th centuries resulted in the establishment of many associations and craft communities, although Morris had little to do with them because of his preoccupation with socialism at the time. A hundred and thirty Arts and Crafts organisations were formed in Britain, most between 1895 and 1905.</span><sup class="reference" data-dcnode-id="8444" id="cite_ref-FOOTNOTEMacCarthy1994602_43-0"><a data-dcnode-id="8445" href="#cite_note-FOOTNOTEMacCarthy1994602-43"><span data-dcnode-id="8446" instrument_node="">[43]</span></a></sup><span data-dcnode-id="8443" instrument_node="">
</span></p><p data-dcnode-id="8427"><span data-dcnode-id="8441" instrument_node="">In 1881, </span><a data-dcnode-id="8439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eglantyne_Louisa_Jebb" title="Eglantyne Louisa Jebb"><span data-dcnode-id="8440" instrument_node="">Eglantyne Louisa Jebb</span></a><span data-dcnode-id="8438" instrument_node="">, </span><a data-dcnode-id="8436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mary_Fraser_Tytler" title="Mary Fraser Tytler"><span data-dcnode-id="8437" instrument_node="">Mary Fraser Tytler</span></a><span data-dcnode-id="8435" instrument_node=""> and others initiated the </span><a data-dcnode-id="8433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Home_Arts_and_Industries_Association" title="Home Arts and Industries Association"><span data-dcnode-id="8434" instrument_node="">Home Arts and Industries Association</span></a><span data-dcnode-id="8432" instrument_node=""> to encourage the working classes, especially those in rural areas, to take up handicrafts under supervision, not for profit, but in order to provide them with useful occupations and to improve their taste. By 1889 it had 450 classes, 1,000 teachers and 5,000 students.</span><sup class="reference" data-dcnode-id="8429" id="cite_ref-FOOTNOTENaylor1971120_44-0"><a data-dcnode-id="8430" href="#cite_note-FOOTNOTENaylor1971120-44"><span data-dcnode-id="8431" instrument_node="">[44]</span></a></sup><span data-dcnode-id="8428" instrument_node="">
</span></p><p data-dcnode-id="8403"><span data-dcnode-id="8426" instrument_node="">In 1882, architect </span><a class="mw-redirect" data-dcnode-id="8424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/A.H.Mackmurdo" title="A.H.Mackmurdo"><span data-dcnode-id="8425" instrument_node="">A.H.Mackmurdo</span></a><span data-dcnode-id="8423" instrument_node=""> formed the </span><a data-dcnode-id="8421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Century_Guild_of_Artists" title="Century Guild of Artists"><span data-dcnode-id="8422" instrument_node="">Century Guild</span></a><span data-dcnode-id="8420" instrument_node="">, a partnership of designers including </span><a data-dcnode-id="8418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Selwyn_Image" title="Selwyn Image"><span data-dcnode-id="8419" instrument_node="">Selwyn Image</span></a><span data-dcnode-id="8417" instrument_node="">, </span><a data-dcnode-id="8415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Herbert_Horne" title="Herbert Horne"><span data-dcnode-id="8416" instrument_node="">Herbert Horne</span></a><span data-dcnode-id="8414" instrument_node="">, Clement Heaton and </span><a data-dcnode-id="8412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Benjamin_Creswick" title="Benjamin Creswick"><span data-dcnode-id="8413" instrument_node="">Benjamin Creswick</span></a><span data-dcnode-id="8411" instrument_node="">.</span><sup class="reference" data-dcnode-id="8408" id="cite_ref-FOOTNOTEMacCarthy1994591_45-0"><a data-dcnode-id="8409" href="#cite_note-FOOTNOTEMacCarthy1994591-45"><span data-dcnode-id="8410" instrument_node="">[45]</span></a></sup><sup class="reference" data-dcnode-id="8405" id="cite_ref-FOOTNOTENaylor1971115_46-0"><a data-dcnode-id="8406" href="#cite_note-FOOTNOTENaylor1971115-46"><span data-dcnode-id="8407" instrument_node="">[46]</span></a></sup><span data-dcnode-id="8404" instrument_node="">
</span></p><p data-dcnode-id="8379"><span data-dcnode-id="8402" instrument_node="">In 1884, the </span><a class="mw-redirect" data-dcnode-id="8400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Art_Workers_Guild" title="Art Workers Guild"><span data-dcnode-id="8401" instrument_node="">Art Workers Guild</span></a><span data-dcnode-id="8399" instrument_node=""> was initiated by five young architects, </span><a data-dcnode-id="8397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Lethaby" title="William Lethaby"><span data-dcnode-id="8398" instrument_node="">William Lethaby</span></a><span data-dcnode-id="8396" instrument_node="">, </span><a data-dcnode-id="8394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_Schroeder_Prior" title="Edward Schroeder Prior"><span data-dcnode-id="8395" instrument_node="">Edward Prior</span></a><span data-dcnode-id="8393" instrument_node="">, </span><a data-dcnode-id="8391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ernest_Newton" title="Ernest Newton"><span data-dcnode-id="8392" instrument_node="">Ernest Newton</span></a><span data-dcnode-id="8390" instrument_node="">, Mervyn Macartney and </span><a class="mw-redirect" data-dcnode-id="8388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gerald_C._Horsley" title="Gerald C. Horsley"><span data-dcnode-id="8389" instrument_node="">Gerald C. Horsley</span></a><span data-dcnode-id="8387" instrument_node="">, with the goal of bringing together fine and applied arts and raising the status of the latter. It was directed originally by </span><a data-dcnode-id="8385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Blackall_Simonds" title="George Blackall Simonds"><span data-dcnode-id="8386" instrument_node="">George Blackall Simonds</span></a><span data-dcnode-id="8384" instrument_node="">. By 1890 the Guild had 150 members, representing the increasing number of practitioners of the Arts and Crafts style.</span><sup class="reference" data-dcnode-id="8381" id="cite_ref-FOOTNOTEMacCarthy1994593_47-0"><a data-dcnode-id="8382" href="#cite_note-FOOTNOTEMacCarthy1994593-47"><span data-dcnode-id="8383" instrument_node="">[47]</span></a></sup><span data-dcnode-id="8380" instrument_node=""> It still exists.
