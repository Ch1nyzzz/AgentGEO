</span></p><p data-dcnode-id="8371"><span data-dcnode-id="8378" instrument_node="">The London department store </span><a class="mw-redirect" data-dcnode-id="8376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberty_%2526_Co." title="Liberty &amp; Co."><span data-dcnode-id="8377" instrument_node="">Liberty &amp; Co.</span></a><span data-dcnode-id="8375" instrument_node="">, founded in 1875, was a prominent retailer of goods in the style and of the "</span><a class="mw-redirect" data-dcnode-id="8373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Artistic_dress" title="Artistic dress"><span data-dcnode-id="8374" instrument_node="">artistic dress</span></a><span data-dcnode-id="8372" instrument_node="">" favoured by followers of the Arts and Crafts movement.
</span></p><p data-dcnode-id="8335"><span data-dcnode-id="8370" instrument_node="">In 1887 the </span><a data-dcnode-id="8368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arts_and_Crafts_Exhibition_Society" title="Arts and Crafts Exhibition Society"><span data-dcnode-id="8369" instrument_node="">Arts and Crafts Exhibition Society</span></a><span data-dcnode-id="8367" instrument_node="">, which gave its name to the movement, was formed with </span><a data-dcnode-id="8365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Walter_Crane" title="Walter Crane"><span data-dcnode-id="8366" instrument_node="">Walter Crane</span></a><span data-dcnode-id="8364" instrument_node=""> as president, holding its first exhibition in the </span><a data-dcnode-id="8362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Gallery_%28London%29" title="New Gallery (London)"><span data-dcnode-id="8363" instrument_node="">New Gallery</span></a><span data-dcnode-id="8361" instrument_node="">, London, in November 1888.</span><sup class="reference" data-dcnode-id="8358" id="cite_ref-48"><a data-dcnode-id="8359" href="#cite_note-48"><span data-dcnode-id="8360" instrument_node="">[48]</span></a></sup><span data-dcnode-id="8357" instrument_node=""> It was the first show of contemporary decorative arts in London since the </span><a data-dcnode-id="8355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grosvenor_Gallery" title="Grosvenor Gallery"><span data-dcnode-id="8356" instrument_node="">Grosvenor Gallery</span></a><span data-dcnode-id="8354" instrument_node="">'s Winter Exhibition of 1881.</span><sup class="reference" data-dcnode-id="8351" id="cite_ref-49"><a data-dcnode-id="8352" href="#cite_note-49"><span data-dcnode-id="8353" instrument_node="">[49]</span></a></sup><span data-dcnode-id="8350" instrument_node=""> </span><a data-dcnode-id="8348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Morris_%2526_Co." title="Morris &amp; Co."><span data-dcnode-id="8349" instrument_node="">Morris &amp; Co.</span></a><span data-dcnode-id="8347" instrument_node=""> was well represented in the exhibition with furniture, fabrics, carpets and embroideries. </span><a data-dcnode-id="8345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_Burne-Jones" title="Edward Burne-Jones"><span data-dcnode-id="8346" instrument_node="">Edward Burne-Jones</span></a><span data-dcnode-id="8344" instrument_node=""> observed, "here for the first time one can measure a bit the change that has happened in the last twenty years".</span><sup class="reference" data-dcnode-id="8341" id="cite_ref-FOOTNOTEMacCarthy1994596_50-0"><a data-dcnode-id="8342" href="#cite_note-FOOTNOTEMacCarthy1994596-50"><span data-dcnode-id="8343" instrument_node="">[50]</span></a></sup><span data-dcnode-id="8340" instrument_node=""> The society still exists as the Society of Designer Craftsmen.</span><sup class="reference" data-dcnode-id="8337" id="cite_ref-51"><a data-dcnode-id="8338" href="#cite_note-51"><span data-dcnode-id="8339" instrument_node="">[51]</span></a></sup><span data-dcnode-id="8336" instrument_node="">
</span></p><p data-dcnode-id="8308"><span data-dcnode-id="8334" instrument_node="">In 1888, </span><a data-dcnode-id="8332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Robert_Ashbee" title="Charles Robert Ashbee"><span data-dcnode-id="8333" instrument_node="">C.R.Ashbee</span></a><span data-dcnode-id="8331" instrument_node="">, a major late practitioner of the style in England, founded the </span><a data-dcnode-id="8329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guild_and_School_of_Handicraft" title="Guild and School of Handicraft"><span data-dcnode-id="8330" instrument_node="">Guild and School of Handicraft</span></a><span data-dcnode-id="8328" instrument_node=""> in the East End of London. The guild was a craft co-operative modelled on the medieval guilds and intended to give working men satisfaction in their craftsmanship. Skilled craftsmen, working on the principles of Ruskin and Morris, were to produce hand-crafted goods and manage a school for apprentices. The idea was greeted with enthusiasm by almost everyone except Morris, who was by now involved with promoting </span><a data-dcnode-id="8326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialism" title="Socialism"><span data-dcnode-id="8327" instrument_node="">socialism</span></a><span data-dcnode-id="8325" instrument_node=""> and thought Ashbee's scheme trivial. From 1888 to 1902 the guild prospered, employing about 50 men. In 1902 Ashbee relocated the guild out of London to begin an experimental community in </span><a data-dcnode-id="8323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chipping_Campden" title="Chipping Campden"><span data-dcnode-id="8324" instrument_node="">Chipping Campden</span></a><span data-dcnode-id="8322" instrument_node=""> in the </span><a data-dcnode-id="8320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cotswolds" title="Cotswolds"><span data-dcnode-id="8321" instrument_node="">Cotswolds</span></a><span data-dcnode-id="8319" instrument_node="">. The guild's work is characterised by plain surfaces of hammered silver, flowing wirework and colored stones in simple settings. Ashbee designed jewellery and silver tableware. The guild flourished at Chipping Camden but did not prosper and was liquidated in 1908. Some craftsmen stayed, contributing to the tradition of modern craftsmanship in the area.</span><sup class="reference" data-dcnode-id="8316" id="cite_ref-V&amp;A_16-1"><a data-dcnode-id="8317" href="#cite_note-V&amp;A-16"><span data-dcnode-id="8318" instrument_node="">[16]</span></a></sup><sup class="reference" data-dcnode-id="8313" id="cite_ref-52"><a data-dcnode-id="8314" href="#cite_note-52"><span data-dcnode-id="8315" instrument_node="">[52]</span></a></sup><sup class="reference" data-dcnode-id="8310" id="cite_ref-53"><a data-dcnode-id="8311" href="#cite_note-53"><span data-dcnode-id="8312" instrument_node="">[53]</span></a></sup><span data-dcnode-id="8309" instrument_node="">
</span></p><p data-dcnode-id="8300"><a class="mw-redirect" data-dcnode-id="8306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/C.F.A._Voysey" title="C.F.A. Voysey"><span data-dcnode-id="8307" instrument_node="">C.F.A. Voysey</span></a><span data-dcnode-id="8305" instrument_node=""> (1857–1941) was an Arts and Crafts architect who also designed fabrics, tiles, ceramics, furniture and metalwork.  His style combined simplicity with sophistication. His wallpapers and textiles, featuring stylised bird and plant forms in bold outlines with flat colors, were used widely.</span><sup class="reference" data-dcnode-id="8302" id="cite_ref-V&amp;A_16-2"><a data-dcnode-id="8303" href="#cite_note-V&amp;A-16"><span data-dcnode-id="8304" instrument_node="">[16]</span></a></sup><span data-dcnode-id="8301" instrument_node="">
</span></p><p data-dcnode-id="8285"><span data-dcnode-id="8299" instrument_node="">Morris's thought influenced the </span><a data-dcnode-id="8297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Distributism" title="Distributism"><span data-dcnode-id="8298" instrument_node="">distributism</span></a><span data-dcnode-id="8296" instrument_node=""> of </span><a data-dcnode-id="8294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/G._K._Chesterton" title="G. K. Chesterton"><span data-dcnode-id="8295" instrument_node="">G. K. Chesterton</span></a><span data-dcnode-id="8293" instrument_node=""> and </span><a data-dcnode-id="8291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hilaire_Belloc" title="Hilaire Belloc"><span data-dcnode-id="8292" instrument_node="">Hilaire Belloc</span></a><span data-dcnode-id="8290" instrument_node="">.</span><sup class="reference" data-dcnode-id="8287" id="cite_ref-54"><a data-dcnode-id="8288" href="#cite_note-54"><span data-dcnode-id="8289" instrument_node="">[54]</span></a></sup><span data-dcnode-id="8286" instrument_node="">
</span></p><span data-dcnode-id="8284" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="8273"><div class="thumbinner" data-dcnode-id="8274" style="width:222px;"><a class="image" data-dcnode-id="8282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AColeton_Fishacre_-_geograph.org.uk_-_928003.jpg"><img alt="" class="thumbimage" data-dcnode-id="8283" data-file-height="480" data-file-width="640" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Coleton_Fishacre_-_geograph.org.uk_-_928003.jpg/220px-Coleton_Fishacre_-_geograph.org.uk_-_928003.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Coleton_Fishacre_-_geograph.org.uk_-_928003.jpg/330px-Coleton_Fishacre_-_geograph.org.uk_-_928003.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Coleton_Fishacre_-_geograph.org.uk_-_928003.jpg/440px-Coleton_Fishacre_-_geograph.org.uk_-_928003.jpg 2x" width="220"></a><span data-dcnode-id="8281" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8275"><div class="magnify" data-dcnode-id="8279"><a class="internal" data-dcnode-id="8280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AColeton_Fishacre_-_geograph.org.uk_-_928003.jpg" title="Enlarge"></a></div><a data-dcnode-id="8277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coleton_Fishacre" title="Coleton Fishacre"><span data-dcnode-id="8278" instrument_node="">Coleton Fishacre</span></a><span data-dcnode-id="8276" instrument_node=""> was designed in 1925 as a holiday home in Kingswear, Devon, England, in the Arts and Crafts tradition.</span></div></div></div><span data-dcnode-id="8272" instrument_node="">
</span><p data-dcnode-id="8251"><span data-dcnode-id="8271" instrument_node="">By the end of the nineteenth century, Arts and Crafts ideals had influenced architecture, painting, sculpture, graphics, illustration, book making and photography, domestic design and the decorative arts, including furniture and woodwork, stained glass,</span><sup class="reference" data-dcnode-id="8268" id="cite_ref-55"><a data-dcnode-id="8269" href="#cite_note-55"><span data-dcnode-id="8270" instrument_node="">[55]</span></a></sup><span data-dcnode-id="8267" instrument_node=""> leatherwork, lacemaking, embroidery, rug making and weaving, jewelry and metalwork, </span><a data-dcnode-id="8265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vitreous_enamel" title="Vitreous enamel"><span data-dcnode-id="8266" instrument_node="">enameling</span></a><span data-dcnode-id="8264" instrument_node=""> and ceramics.</span><sup class="reference" data-dcnode-id="8261" id="cite_ref-dublin_56-0"><a data-dcnode-id="8262" href="#cite_note-dublin-56"><span data-dcnode-id="8263" instrument_node="">[56]</span></a></sup><span data-dcnode-id="8260" instrument_node=""> By 1910, there was a fashion for "Arts and Crafts" and all things hand-made. There was a proliferation of amateur handicrafts of variable quality</span><sup class="reference" data-dcnode-id="8257" id="cite_ref-57"><a data-dcnode-id="8258" href="#cite_note-57"><span data-dcnode-id="8259" instrument_node="">[57]</span></a></sup><span data-dcnode-id="8256" instrument_node=""> and of incompetent imitators who caused the public to regard Arts and Crafts as "something less, instead of more, competent and fit for purpose than an ordinary mass produced article."</span><sup class="reference" data-dcnode-id="8253" id="cite_ref-58"><a data-dcnode-id="8254" href="#cite_note-58"><span data-dcnode-id="8255" instrument_node="">[58]</span></a></sup><span data-dcnode-id="8252" instrument_node="">
</span></p><p data-dcnode-id="8221"><span data-dcnode-id="8250" instrument_node="">The Arts and Crafts Exhibition Society held eleven exhibitions between 1888 and 1916. By the outbreak of war in 1914 it was in decline and faced a crisis. Its 1912 exhibition had been a financial failure.</span><sup class="reference" data-dcnode-id="8247" id="cite_ref-harrod_59-0"><a data-dcnode-id="8248" href="#cite_note-harrod-59"><span data-dcnode-id="8249" instrument_node="">[59]</span></a></sup><span data-dcnode-id="8246" instrument_node=""> While designers in continental Europe were making innovations in design and alliances with industry through initiatives such as the </span><a class="mw-redirect" data-dcnode-id="8244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deutsche_Werkbund" title="Deutsche Werkbund"><span data-dcnode-id="8245" instrument_node="">Deutsche Werkbund</span></a><span data-dcnode-id="8243" instrument_node=""> and new initiatives were being taken in Britain by the </span><a data-dcnode-id="8241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Omega_Workshops" title="Omega Workshops"><span data-dcnode-id="8242" instrument_node="">Omega Workshops</span></a><span data-dcnode-id="8240" instrument_node=""> and the </span><a class="new" data-dcnode-id="8238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDesign_in_Industries_Association%26action%3Dedit%26redlink%3D1" title="Design in Industries Association (page does not exist)"><span data-dcnode-id="8239" instrument_node="">Design in Industries Association</span></a><span data-dcnode-id="8237" instrument_node="">, the Arts and Crafts Exhibition Society, now under the control of an old guard, was withdrawing from commerce and collaboration with manufacturers into purist handwork and what Tania Harrod describes as "decommoditisation"</span><sup class="reference" data-dcnode-id="8234" id="cite_ref-harrod_59-1"><a data-dcnode-id="8235" href="#cite_note-harrod-59"><span data-dcnode-id="8236" instrument_node="">[59]</span></a></sup><span data-dcnode-id="8233" instrument_node=""> Its rejection of a commercial role has been seen as a turning point in its fortunes.</span><sup class="reference" data-dcnode-id="8230" id="cite_ref-harrod_59-2"><a data-dcnode-id="8231" href="#cite_note-harrod-59"><span data-dcnode-id="8232" instrument_node="">[59]</span></a></sup><span data-dcnode-id="8229" instrument_node=""> Nikolaus Pevsner in his book </span><i data-dcnode-id="8227"><span data-dcnode-id="8228" instrument_node="">Pioneers of Modern Design</span></i><span data-dcnode-id="8226" instrument_node=""> presents the Arts and Crafts movement as design radicals who influenced the modern movement, but failed to change and were eventually superseded by it.</span><sup class="reference" data-dcnode-id="8223" id="cite_ref-pevsner_10-5"><a data-dcnode-id="8224" href="#cite_note-pevsner-10"><span data-dcnode-id="8225" instrument_node="">[10]</span></a></sup><span data-dcnode-id="8222" instrument_node="">
</span></p><span data-dcnode-id="8220" instrument_node="">
</span><h3 data-dcnode-id="8210"><span class="mw-headline" data-dcnode-id="8218" id="Later_influences"><span data-dcnode-id="8219" instrument_node="">Later influences</span></span><span class="mw-editsection" data-dcnode-id="8211"><span class="mw-editsection-bracket" data-dcnode-id="8216"><span data-dcnode-id="8217" instrument_node="">[</span></span><a data-dcnode-id="8214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DArts_and_Crafts_movement%26action%3Dedit%26section%3D11" title="Edit section: Later influences"><span data-dcnode-id="8215" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8212"><span data-dcnode-id="8213" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8209" instrument_node="">
</span><p data-dcnode-id="8168"><span data-dcnode-id="8208" instrument_node="">The British artist potter </span><a data-dcnode-id="8206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bernard_Leach" title="Bernard Leach"><span data-dcnode-id="8207" instrument_node="">Bernard Leach</span></a><span data-dcnode-id="8205" instrument_node=""> brought to England many ideas he had developed in Japan with the social critic </span><a class="mw-redirect" data-dcnode-id="8203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yanagi_Soetsu" title="Yanagi Soetsu"><span data-dcnode-id="8204" instrument_node="">Yanagi Soetsu</span></a><span data-dcnode-id="8202" instrument_node=""> about the moral and social value of simple crafts; both were enthusiastic readers of Ruskin. Leach was an active propagandist for these ideas, which struck a chord with practitioners of the crafts in the inter-war years, and he expounded them in </span><i data-dcnode-id="8200"><span data-dcnode-id="8201" instrument_node="">A Potter's Book</span></i><span data-dcnode-id="8199" instrument_node="">, published in 1940, which denounced industrial society in terms as vehement as those of Ruskin and Morris. Thus the Arts and Crafts philosophy was perpetuated among British craft workers in the 1950s and 1960s, long after the demise of the Arts and Crafts movement and at the high tide of Modernism. British </span><a data-dcnode-id="8197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Utility_furniture" title="Utility furniture"><span data-dcnode-id="8198" instrument_node="">Utility furniture</span></a><span data-dcnode-id="8196" instrument_node=""> of the 1940s also derived from Arts and Crafts principles.</span><sup class="reference" data-dcnode-id="8193" id="cite_ref-60"><a data-dcnode-id="8194" href="#cite_note-60"><span data-dcnode-id="8195" instrument_node="">[60]</span></a></sup><span data-dcnode-id="8192" instrument_node=""> One of its main promoters, </span><a class="mw-redirect" data-dcnode-id="8190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sydney_Gordon_Russell" title="Sydney Gordon Russell"><span data-dcnode-id="8191" instrument_node="">Gordon Russell</span></a><span data-dcnode-id="8189" instrument_node="">, chairman of the Utility Furniture Design Panel, was imbued with Arts and Crafts ideas. He manufactured furniture in the Cotswold Hills, a region of Arts and Crafts furniture-making since Ashbee, and he was a member of the Arts and Crafts Exhibition Society. William Morris's biographer, </span><a data-dcnode-id="8187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fiona_MacCarthy" title="Fiona MacCarthy"><span data-dcnode-id="8188" instrument_node="">Fiona MacCarthy</span></a><span data-dcnode-id="8186" instrument_node="">, detected the Arts and Crafts philosophy even behind the </span><a data-dcnode-id="8184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Festival_of_Britain" title="Festival of Britain"><span data-dcnode-id="8185" instrument_node="">Festival of Britain</span></a><span data-dcnode-id="8183" instrument_node=""> (1951), the work of the designer </span><a data-dcnode-id="8181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Terence_Conran" title="Terence Conran"><span data-dcnode-id="8182" instrument_node="">Terence Conran</span></a><span data-dcnode-id="8180" instrument_node=""> (b. 1931)</span><sup class="reference" data-dcnode-id="8177" id="cite_ref-maccarthy2014_6-2"><a data-dcnode-id="8178" href="#cite_note-maccarthy2014-6"><span data-dcnode-id="8179" instrument_node="">[6]</span></a></sup><span data-dcnode-id="8176" instrument_node=""> and the founding of the British </span><a data-dcnode-id="8174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crafts_Council" title="Crafts Council"><span data-dcnode-id="8175" instrument_node="">Crafts Council</span></a><span data-dcnode-id="8173" instrument_node=""> in the 1970s.</span><sup class="reference" data-dcnode-id="8170" id="cite_ref-FOOTNOTEMacCarthy1994603_61-0"><a data-dcnode-id="8171" href="#cite_note-FOOTNOTEMacCarthy1994603-61"><span data-dcnode-id="8172" instrument_node="">[61]</span></a></sup><span data-dcnode-id="8169" instrument_node="">
</span></p><span data-dcnode-id="8167" instrument_node="">
</span><h2 data-dcnode-id="8157"><span class="mw-headline" data-dcnode-id="8165" id="By_region"><span data-dcnode-id="8166" instrument_node="">By region</span></span><span class="mw-editsection" data-dcnode-id="8158"><span class="mw-editsection-bracket" data-dcnode-id="8163"><span data-dcnode-id="8164" instrument_node="">[</span></span><a data-dcnode-id="8161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DArts_and_Crafts_movement%26action%3Dedit%26section%3D12" title="Edit section: By region"><span data-dcnode-id="8162" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8159"><span data-dcnode-id="8160" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8156" instrument_node="">
</span><h3 data-dcnode-id="8146"><span class="mw-headline" data-dcnode-id="8154" id="The_British_Isles"><span data-dcnode-id="8155" instrument_node="">The British Isles</span></span><span class="mw-editsection" data-dcnode-id="8147"><span class="mw-editsection-bracket" data-dcnode-id="8152"><span data-dcnode-id="8153" instrument_node="">[</span></span><a data-dcnode-id="8150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DArts_and_Crafts_movement%26action%3Dedit%26section%3D13" title="Edit section: The British Isles"><span data-dcnode-id="8151" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8148"><span data-dcnode-id="8149" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8145" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8136"><div class="thumbinner" data-dcnode-id="8137" style="width:222px;"><a class="image" data-dcnode-id="8143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMackintosh_Window_%28304516308%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="8144" data-file-height="2004" data-file-width="1935" decoding="async" height="228" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/51/Mackintosh_Window_%2528304516308%2529.jpg/220px-Mackintosh_Window_%2528304516308%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/51/Mackintosh_Window_%28304516308%29.jpg/330px-Mackintosh_Window_%28304516308%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/51/Mackintosh_Window_%28304516308%29.jpg/440px-Mackintosh_Window_%28304516308%29.jpg 2x" width="220"></a><span data-dcnode-id="8142" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8138"><div class="magnify" data-dcnode-id="8140"><a class="internal" data-dcnode-id="8141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMackintosh_Window_%28304516308%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="8139" instrument_node="">Stained glass window, The Hill House, Helensburgh, Argyll and Bute</span></div></div></div><span data-dcnode-id="8135" instrument_node="">
</span><h4 data-dcnode-id="8125"><span class="mw-headline" data-dcnode-id="8133" id="Scotland"><span data-dcnode-id="8134" instrument_node="">Scotland</span></span><span class="mw-editsection" data-dcnode-id="8126"><span class="mw-editsection-bracket" data-dcnode-id="8131"><span data-dcnode-id="8132" instrument_node="">[</span></span><a data-dcnode-id="8129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DArts_and_Crafts_movement%26action%3Dedit%26section%3D14" title="Edit section: Scotland"><span data-dcnode-id="8130" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8127"><span data-dcnode-id="8128" instrument_node="">]</span></span></span></h4><p data-dcnode-id="8064"><span data-dcnode-id="8124" instrument_node="">
The beginnings of the Arts and Crafts movement in Scotland were in the stained glass revival of the 1850s, pioneered by </span><a data-dcnode-id="8122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Ballantine" title="James Ballantine"><span data-dcnode-id="8123" instrument_node="">James Ballantine</span></a><span data-dcnode-id="8121" instrument_node=""> (1808–1877). His major works included the great west window of </span><a data-dcnode-id="8119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dunfermline_Abbey" title="Dunfermline Abbey"><span data-dcnode-id="8120" instrument_node="">Dunfermline Abbey</span></a><span data-dcnode-id="8118" instrument_node=""> and the scheme for </span><a class="mw-redirect" data-dcnode-id="8116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/St._Giles_Cathedral" title="St. Giles Cathedral"><span data-dcnode-id="8117" instrument_node="">St. Giles Cathedral</span></a><span data-dcnode-id="8115" instrument_node="">, Edinburgh. In Glasgow it was pioneered by </span><a data-dcnode-id="8113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Daniel_Cottier" title="Daniel Cottier"><span data-dcnode-id="8114" instrument_node="">Daniel Cottier</span></a><span data-dcnode-id="8112" instrument_node=""> (1838–1891), who had probably studied with Ballantine, and was directly influenced by </span><a data-dcnode-id="8110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Morris" title="William Morris"><span data-dcnode-id="8111" instrument_node="">William Morris</span></a><span data-dcnode-id="8109" instrument_node="">, </span><a data-dcnode-id="8107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ford_Madox_Brown" title="Ford Madox Brown"><span data-dcnode-id="8108" instrument_node="">Ford Madox Brown</span></a><span data-dcnode-id="8106" instrument_node=""> and </span><a data-dcnode-id="8104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Ruskin" title="John Ruskin"><span data-dcnode-id="8105" instrument_node="">John Ruskin</span></a><span data-dcnode-id="8103" instrument_node="">. His key works included the </span><i data-dcnode-id="8101"><span data-dcnode-id="8102" instrument_node="">Baptism of Christ</span></i><span data-dcnode-id="8100" instrument_node=""> in </span><a data-dcnode-id="8098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paisley_Abbey" title="Paisley Abbey"><span data-dcnode-id="8099" instrument_node="">Paisley Abbey</span></a><span data-dcnode-id="8097" instrument_node="">, (c. 1880). His followers included Stephen Adam and his son of the same name.</span><sup class="reference" data-dcnode-id="8094" id="cite_ref-62"><a data-dcnode-id="8095" href="#cite_note-62"><span data-dcnode-id="8096" instrument_node="">[62]</span></a></sup><span data-dcnode-id="8093" instrument_node=""> The Glasgow-born designer and theorist </span><a data-dcnode-id="8091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christopher_Dresser" title="Christopher Dresser"><span data-dcnode-id="8092" instrument_node="">Christopher Dresser</span></a><span data-dcnode-id="8090" instrument_node=""> (1834–1904) was one of the first, and most important, independent designers, a pivotal figure in the </span><a class="mw-redirect" data-dcnode-id="8088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aesthetic_Movement" title="Aesthetic Movement"><span data-dcnode-id="8089" instrument_node="">Aesthetic Movement</span></a><span data-dcnode-id="8087" instrument_node=""> and a major contributor to the allied </span><a class="mw-redirect" data-dcnode-id="8085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anglo-Japanese" title="Anglo-Japanese"><span data-dcnode-id="8086" instrument_node="">Anglo-Japanese</span></a><span data-dcnode-id="8084" instrument_node=""> movement.</span><sup class="reference" data-dcnode-id="8081" id="cite_ref-63"><a data-dcnode-id="8082" href="#cite_note-63"><span data-dcnode-id="8083" instrument_node="">[63]</span></a></sup><span data-dcnode-id="8080" instrument_node=""> The movement had an "extraordinary flowering" in Scotland where it was represented by the development of the '</span><a class="mw-redirect" data-dcnode-id="8078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glasgow_Style" title="Glasgow Style"><span data-dcnode-id="8079" instrument_node="">Glasgow Style</span></a><span data-dcnode-id="8077" instrument_node="">' which was based on the talent of the </span><a data-dcnode-id="8075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glasgow_School_of_Art" title="Glasgow School of Art"><span data-dcnode-id="8076" instrument_node="">Glasgow School of Art</span></a><span data-dcnode-id="8074" instrument_node="">.  Celtic revival took hold here, and motifs such as the Glasgow rose became popularised. </span><a data-dcnode-id="8072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Rennie_Mackintosh" title="Charles Rennie Mackintosh"><span data-dcnode-id="8073" instrument_node="">Charles Rennie Mackintosh</span></a><span data-dcnode-id="8071" instrument_node=""> (1868–1928) and the Glasgow School of Art were to influence others worldwide.</span><sup class="reference" data-dcnode-id="8068" id="cite_ref-grove_1-2"><a data-dcnode-id="8069" href="#cite_note-grove-1"><span data-dcnode-id="8070" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="8065" id="cite_ref-dublin_56-1"><a data-dcnode-id="8066" href="#cite_note-dublin-56"><span data-dcnode-id="8067" instrument_node="">[56]</span></a></sup></p><div class="thumb tleft" data-dcnode-id="8052"><div class="thumbinner" data-dcnode-id="8053" style="width:222px;"><a class="image" data-dcnode-id="8062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThe_Robert_Owen_Museum%2C_Newtown.jpg"><img alt="" class="thumbimage" data-dcnode-id="8063" data-file-height="627" data-file-width="636" decoding="async" height="217" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/9f/The_Robert_Owen_Museum%252C_Newtown.jpg/220px-The_Robert_Owen_Museum%252C_Newtown.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/9f/The_Robert_Owen_Museum%2C_Newtown.jpg/330px-The_Robert_Owen_Museum%2C_Newtown.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/9f/The_Robert_Owen_Museum%2C_Newtown.jpg/440px-The_Robert_Owen_Museum%2C_Newtown.jpg 2x" width="220"></a><span data-dcnode-id="8061" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8054"><div class="magnify" data-dcnode-id="8059"><a class="internal" data-dcnode-id="8060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThe_Robert_Owen_Museum%2C_Newtown.jpg" title="Enlarge"></a></div><span data-dcnode-id="8058" instrument_node="">The Robert Owen Museum, Newtown, by </span><a data-dcnode-id="8056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frank_Shayler" title="Frank Shayler"><span data-dcnode-id="8057" instrument_node="">Frank Shayler</span></a><span data-dcnode-id="8055" instrument_node="">.</span></div></div></div><span data-dcnode-id="8051" instrument_node="">
</span><h4 data-dcnode-id="8041"><span class="mw-headline" data-dcnode-id="8049" id="Wales"><span data-dcnode-id="8050" instrument_node="">Wales</span></span><span class="mw-editsection" data-dcnode-id="8042"><span class="mw-editsection-bracket" data-dcnode-id="8047"><span data-dcnode-id="8048" instrument_node="">[</span></span><a data-dcnode-id="8045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DArts_and_Crafts_movement%26action%3Dedit%26section%3D15" title="Edit section: Wales"><span data-dcnode-id="8046" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8043"><span data-dcnode-id="8044" instrument_node="">]</span></span></span></h4><span data-dcnode-id="8040" instrument_node="">
</span><p data-dcnode-id="8028"><span data-dcnode-id="8039" instrument_node="">The situation in Wales was different than elsewhere in the UK. Insofar as craftsmanship was concerned, Arts and Crafts was a </span><i data-dcnode-id="8037"><span data-dcnode-id="8038" instrument_node="">revivalist</span></i><span data-dcnode-id="8036" instrument_node=""> campaign. But in Wales, at least until </span><a data-dcnode-id="8034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_I" title="World War I"><span data-dcnode-id="8035" instrument_node="">World War I</span></a><span data-dcnode-id="8033" instrument_node="">, a genuine craft tradition still existed. Local materials, stone or clay, continued to be used as a matter of course.</span><sup class="reference" data-dcnode-id="8030" id="cite_ref-64"><a data-dcnode-id="8031" href="#cite_note-64"><span data-dcnode-id="8032" instrument_node="">[64]</span></a></sup><span data-dcnode-id="8029" instrument_node="">
</span></p><p data-dcnode-id="8019"><span data-dcnode-id="8027" instrument_node="">Scotland become known in the Arts and Crafts movement for its stained glass; Wales would become known for its pottery. By the mid 19th century, the heavy, salt glazes used for generations by local craftsmen had gone out of fashion, not least as mass-produced ceramics undercut prices. But the Arts and Crafts Movement  brought new appreciation to their work. Horace W Elliot, an English gallerist, visited the </span><a data-dcnode-id="8025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ewenny_Pottery" title="Ewenny Pottery"><span data-dcnode-id="8026" instrument_node="">Ewenny Pottery</span></a><span data-dcnode-id="8024" instrument_node=""> (which dated back to the 17th century) in 1885, to both find local pieces and encourage a style compatible with the movement.</span><sup class="reference" data-dcnode-id="8021" id="cite_ref-65"><a data-dcnode-id="8022" href="#cite_note-65"><span data-dcnode-id="8023" instrument_node="">[65]</span></a></sup><span data-dcnode-id="8020" instrument_node=""> The pieces he brought back to London for the next twenty years revivified interest in Welsh pottery work.
</span></p><p data-dcnode-id="8006"><span data-dcnode-id="8018" instrument_node="">A key promoter of the Arts and Crafts movement in Wales was </span><a data-dcnode-id="8016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Owen_Morgan_Edwards" title="Owen Morgan Edwards"><span data-dcnode-id="8017" instrument_node="">Owen Morgan Edwards</span></a><span data-dcnode-id="8015" instrument_node="">. Edwards was a reforming politician dedicated to renewing Welsh pride by exposing its people to their own language and history. For Edwards, "There is nothing that Wales requires more than an education in the arts and crafts."</span><sup class="reference" data-dcnode-id="8012" id="cite_ref-66"><a data-dcnode-id="8013" href="#cite_note-66"><span data-dcnode-id="8014" instrument_node="">[66]</span></a></sup><span data-dcnode-id="8011" instrument_node=""> – though Edwards was more inclined to resurrecting Welsh Nationalism than admiring glazes or rustic integrity.</span><sup class="reference" data-dcnode-id="8008" id="cite_ref-67"><a data-dcnode-id="8009" href="#cite_note-67"><span data-dcnode-id="8010" instrument_node="">[67]</span></a></sup><span data-dcnode-id="8007" instrument_node="">
</span></p><p data-dcnode-id="7996"><span data-dcnode-id="8005" instrument_node="">In architecture, </span><a data-dcnode-id="8003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Clough_Williams-Ellis" title="Clough Williams-Ellis"><span data-dcnode-id="8004" instrument_node="">Clough Williams-Ellis</span></a><span data-dcnode-id="8002" instrument_node=""> sought to renew interest in ancient building, reviving "rammed earth" or </span><a data-dcnode-id="8000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rammed_earth" title="Rammed earth"><span data-dcnode-id="8001" instrument_node="">pisé</span></a><a class="external autonumber" data-dcnode-id="7998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.arct.cam.ac.uk/Downloads/chs/final-chs-vol.19/chs-vol.19-pp.107-to-126.pdf" rel="nofollow"><span data-dcnode-id="7999" instrument_node="">[1]</span></a><span data-dcnode-id="7997" instrument_node=""> construction in Britain.
</span></p><span data-dcnode-id="7995" instrument_node="">
</span><h4 data-dcnode-id="7985"><span class="mw-headline" data-dcnode-id="7993" id="Ireland"><span data-dcnode-id="7994" instrument_node="">Ireland</span></span><span class="mw-editsection" data-dcnode-id="7986"><span class="mw-editsection-bracket" data-dcnode-id="7991"><span data-dcnode-id="7992" instrument_node="">[</span></span><a data-dcnode-id="7989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DArts_and_Crafts_movement%26action%3Dedit%26section%3D16" title="Edit section: Ireland"><span data-dcnode-id="7990" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7987"><span data-dcnode-id="7988" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7984" instrument_node="">
</span><p data-dcnode-id="7950"><span data-dcnode-id="7983" instrument_node="">The movement spread to Ireland, representing an important time for the nation's cultural development, a visual counterpart to the literary revival of the same time</span><sup class="reference" data-dcnode-id="7980" id="cite_ref-68"><a data-dcnode-id="7981" href="#cite_note-68"><span data-dcnode-id="7982" instrument_node="">[68]</span></a></sup><span data-dcnode-id="7979" instrument_node=""> and was a publication of Irish nationalism. The Arts and Crafts use of stained glass was popular in Ireland, with </span><a data-dcnode-id="7977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harry_Clarke" title="Harry Clarke"><span data-dcnode-id="7978" instrument_node="">Harry Clarke</span></a><span data-dcnode-id="7976" instrument_node=""> the best-known artist and also with </span><a data-dcnode-id="7974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Evie_Hone" title="Evie Hone"><span data-dcnode-id="7975" instrument_node="">Evie Hone</span></a><span data-dcnode-id="7973" instrument_node="">. The architecture of the style is represented by the </span><a data-dcnode-id="7971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Honan_Chapel" title="Honan Chapel"><span data-dcnode-id="7972" instrument_node="">Honan Chapel</span></a><span data-dcnode-id="7970" instrument_node=""> (1916) in </span><a data-dcnode-id="7968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cork_%28city%29" title="Cork (city)"><span data-dcnode-id="7969" instrument_node="">Cork city</span></a><span data-dcnode-id="7967" instrument_node=""> in the grounds of </span><a data-dcnode-id="7965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/University_College_Cork" title="University College Cork"><span data-dcnode-id="7966" instrument_node="">University College Cork</span></a><span data-dcnode-id="7964" instrument_node="">.</span><sup class="reference" data-dcnode-id="7961" id="cite_ref-FOOTNOTETeehanHeckett2005163_69-0"><a data-dcnode-id="7962" href="#cite_note-FOOTNOTETeehanHeckett2005163-69"><span data-dcnode-id="7963" instrument_node="">[69]</span></a></sup><span data-dcnode-id="7960" instrument_node=""> Other architects practicing in Ireland included Sir </span><a data-dcnode-id="7958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edwin_Lutyens" title="Edwin Lutyens"><span data-dcnode-id="7959" instrument_node="">Edwin Lutyens</span></a><span data-dcnode-id="7957" instrument_node=""> (Heywood House in Co. Laois, Lambay Island and the </span><a data-dcnode-id="7955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Irish_National_War_Memorial_Gardens" title="Irish National War Memorial Gardens"><span data-dcnode-id="7956" instrument_node="">Irish National War Memorial Gardens</span></a><span data-dcnode-id="7954" instrument_node=""> in Dublin) and Frederick 'Pa' Hicks (</span><a data-dcnode-id="7952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malahide_Castle" title="Malahide Castle"><span data-dcnode-id="7953" instrument_node="">Malahide Castle</span></a><span data-dcnode-id="7951" instrument_node=""> estate buildings and round tower). Irish Celtic motifs were popular with the movement in silvercraft, carpet design, book illustrations and hand-carved furniture.
</span></p><span data-dcnode-id="7949" instrument_node="">
</span><h3 data-dcnode-id="7939"><span class="mw-headline" data-dcnode-id="7947" id="Continental_Europe"><span data-dcnode-id="7948" instrument_node="">Continental Europe</span></span><span class="mw-editsection" data-dcnode-id="7940"><span class="mw-editsection-bracket" data-dcnode-id="7945"><span data-dcnode-id="7946" instrument_node="">[</span></span><a data-dcnode-id="7943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DArts_and_Crafts_movement%26action%3Dedit%26section%3D17" title="Edit section: Continental Europe"><span data-dcnode-id="7944" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7941"><span data-dcnode-id="7942" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7938" instrument_node="">
</span><p data-dcnode-id="7916"><span data-dcnode-id="7937" instrument_node="">In continental Europe, the revival and preservation of national styles was an important motive of Arts and Crafts designers; for example, in Germany, after unification in 1871 under the encouragement of the </span><i data-dcnode-id="7935"><span data-dcnode-id="7936" instrument_node="">Bund für Heimatschutz</span></i><span data-dcnode-id="7934" instrument_node=""> (1897)</span><sup class="reference" data-dcnode-id="7931" id="cite_ref-70"><a data-dcnode-id="7932" href="#cite_note-70"><span data-dcnode-id="7933" instrument_node="">[70]</span></a></sup><span data-dcnode-id="7930" instrument_node=""> and the </span><i data-dcnode-id="7928"><span data-dcnode-id="7929" instrument_node="">Vereinigte Werkstätten für Kunst im Handwerk</span></i><span data-dcnode-id="7927" instrument_node=""> founded in 1898 by Karl Schmidt; and in Hungary </span><a data-dcnode-id="7925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/K%25C3%25A1roly_K%25C3%25B3s" title="Károly Kós"><span data-dcnode-id="7926" instrument_node="">Károly Kós</span></a><span data-dcnode-id="7924" instrument_node=""> revived the vernacular style of </span><a data-dcnode-id="7922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Transylvania" title="Transylvania"><span data-dcnode-id="7923" instrument_node="">Transylvanian</span></a><span data-dcnode-id="7921" instrument_node=""> building. In central Europe, where several diverse nationalities lived under powerful empires (Germany, Austria-Hungary and Russia), the discovery of the vernacular was associated with the assertion of national pride and the striving for independence, and, whereas for Arts and Crafts practitioners in Britain the ideal style was to be found in the medieval, in central Europe it was sought in remote peasant villages.</span><sup class="reference" data-dcnode-id="7918" id="cite_ref-71"><a data-dcnode-id="7919" href="#cite_note-71"><span data-dcnode-id="7920" instrument_node="">[71]</span></a></sup><span data-dcnode-id="7917" instrument_node="">
</span></p><span data-dcnode-id="7915" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7900"><div class="thumbinner" data-dcnode-id="7901" style="width:222px;"><a class="image" data-dcnode-id="7913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATill_en_liten_vira.jpg"><img alt="" class="thumbimage" data-dcnode-id="7914" data-file-height="2586" data-file-width="3517" decoding="async" height="162" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/27/Till_en_liten_vira.jpg/220px-Till_en_liten_vira.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/27/Till_en_liten_vira.jpg/330px-Till_en_liten_vira.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/27/Till_en_liten_vira.jpg/440px-Till_en_liten_vira.jpg 2x" width="220"></a><span data-dcnode-id="7912" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7902"><div class="magnify" data-dcnode-id="7910"><a class="internal" data-dcnode-id="7911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATill_en_liten_vira.jpg" title="Enlarge"></a></div><span data-dcnode-id="7909" instrument_node="">The Swedish artists </span><a data-dcnode-id="7907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carl_Larsson" title="Carl Larsson"><span data-dcnode-id="7908" instrument_node="">Carl Larsson</span></a><span data-dcnode-id="7906" instrument_node=""> and </span><a data-dcnode-id="7904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karin_Berg%25C3%25B6%25C3%25B6_Larsson" title="Karin Bergöö Larsson"><span data-dcnode-id="7905" instrument_node="">Karin Bergöö Larsson</span></a><span data-dcnode-id="7903" instrument_node=""> were inspired by the Arts and Crafts movement when designing their home.</span></div></div></div><span data-dcnode-id="7899" instrument_node="">
</span><p data-dcnode-id="7875"><span data-dcnode-id="7898" instrument_node="">Widely exhibited in Europe, the Arts and Crafts style's simplicity inspired designers like </span><a data-dcnode-id="7896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henry_van_de_Velde" title="Henry van de Velde"><span data-dcnode-id="7897" instrument_node="">Henry van de Velde</span></a><span data-dcnode-id="7895" instrument_node=""> and styles such as </span><a data-dcnode-id="7893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Art_Nouveau" title="Art Nouveau"><span data-dcnode-id="7894" instrument_node="">Art Nouveau</span></a><span data-dcnode-id="7892" instrument_node="">, the Dutch </span><a data-dcnode-id="7890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/De_Stijl" title="De Stijl"><span data-dcnode-id="7891" instrument_node="">De Stijl</span></a><span data-dcnode-id="7889" instrument_node=""> group, </span><a data-dcnode-id="7887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vienna_Secession" title="Vienna Secession"><span data-dcnode-id="7888" instrument_node="">Vienna Secession</span></a><span data-dcnode-id="7886" instrument_node="">, and eventually the </span><a data-dcnode-id="7884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bauhaus" title="Bauhaus"><span data-dcnode-id="7885" instrument_node="">Bauhaus</span></a><span data-dcnode-id="7883" instrument_node=""> style. Pevsner regarded the style as a prelude to </span><a data-dcnode-id="7881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Modernism" title="Modernism"><span data-dcnode-id="7882" instrument_node="">Modernism</span></a><span data-dcnode-id="7880" instrument_node="">, which used simple forms without ornamentation.</span><sup class="reference" data-dcnode-id="7877" id="cite_ref-pevsner_10-6"><a data-dcnode-id="7878" href="#cite_note-pevsner-10"><span data-dcnode-id="7879" instrument_node="">[10]</span></a></sup><span data-dcnode-id="7876" instrument_node="">
</span></p><p data-dcnode-id="7857"><span data-dcnode-id="7874" instrument_node="">The earliest Arts and Crafts activity in continental Europe was in </span><a data-dcnode-id="7872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Belgium" title="Belgium"><span data-dcnode-id="7873" instrument_node="">Belgium</span></a><span data-dcnode-id="7871" instrument_node=""> in about 1890, where the English style inspired artists and architects including </span><a class="mw-redirect" data-dcnode-id="7869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henry_Van_de_Velde" title="Henry Van de Velde"><span data-dcnode-id="7870" instrument_node="">Henry Van de Velde</span></a><span data-dcnode-id="7868" instrument_node="">, </span><a data-dcnode-id="7866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gabriel_Van_Dievoet" title="Gabriel Van Dievoet"><span data-dcnode-id="7867" instrument_node="">Gabriel Van Dievoet</span></a><span data-dcnode-id="7865" instrument_node="">, </span><a data-dcnode-id="7863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gustave_Serrurier-Bovy" title="Gustave Serrurier-Bovy"><span data-dcnode-id="7864" instrument_node="">Gustave Serrurier-Bovy</span></a><span data-dcnode-id="7862" instrument_node=""> and a group known as </span><i data-dcnode-id="7859"><a data-dcnode-id="7860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/La_Libre_Esth%25C3%25A9tique" title="La Libre Esthétique"><span data-dcnode-id="7861" instrument_node="">La Libre Esthétique</span></a></i><span data-dcnode-id="7858" instrument_node=""> (Free Aesthetic).
</span></p><p data-dcnode-id="7829"><span data-dcnode-id="7856" instrument_node="">Arts and Crafts products were admired in Austria and Germany in the early 20th century, and under their inspiration design moved rapidly forward while it stagnated in Britain.</span><sup class="reference" data-dcnode-id="7853" id="cite_ref-FOOTNOTENaylor1971183_72-0"><a data-dcnode-id="7854" href="#cite_note-FOOTNOTENaylor1971183-72"><span data-dcnode-id="7855" instrument_node="">[72]</span></a></sup><span data-dcnode-id="7852" instrument_node=""> The </span><a data-dcnode-id="7850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wiener_Werkst%25C3%25A4tte" title="Wiener Werkstätte"><span data-dcnode-id="7851" instrument_node="">Wiener Werkstätte</span></a><span data-dcnode-id="7849" instrument_node="">, founded in 1903 by </span><a data-dcnode-id="7847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Josef_Hoffmann" title="Josef Hoffmann"><span data-dcnode-id="7848" instrument_node="">Josef Hoffmann</span></a><span data-dcnode-id="7846" instrument_node=""> and </span><a data-dcnode-id="7844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Koloman_Moser" title="Koloman Moser"><span data-dcnode-id="7845" instrument_node="">Koloman Moser</span></a><span data-dcnode-id="7843" instrument_node="">, was influenced by the Arts and Crafts principles of the "unity of the arts" and the hand-made. The </span><a data-dcnode-id="7841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deutscher_Werkbund" title="Deutscher Werkbund"><span data-dcnode-id="7842" instrument_node="">Deutscher Werkbund</span></a><span data-dcnode-id="7840" instrument_node=""> (German Association of Craftsmen) was formed in 1907 as an association of artists, architects, designers, and industrialists to improve the global competitiveness of German businesses and became an important element in the development of </span><a data-dcnode-id="7838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Modern_architecture" title="Modern architecture"><span data-dcnode-id="7839" instrument_node="">modern architecture</span></a><span data-dcnode-id="7837" instrument_node=""> and industrial design through its advocacy of standardized production. However, its leading members, van de Velde and </span><a data-dcnode-id="7835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hermann_Muthesius" title="Hermann Muthesius"><span data-dcnode-id="7836" instrument_node="">Hermann Muthesius</span></a><span data-dcnode-id="7834" instrument_node="">, had conflicting opinions about standardization. Muthesius believed that it was essential were Germany to become a leading nation in trade and culture. Van de Velde, representing a more traditional Arts and Crafts attitude, believed that artists would forever "protest against the imposition of orders or standardization," and that "The artist ... will never, of his own accord, submit to a discipline which imposes on him a canon or a type." </span><sup class="reference" data-dcnode-id="7831" id="cite_ref-FOOTNOTENaylor1971189_73-0"><a data-dcnode-id="7832" href="#cite_note-FOOTNOTENaylor1971189-73"><span data-dcnode-id="7833" instrument_node="">[73]</span></a></sup><span data-dcnode-id="7830" instrument_node="">
</span></p><p data-dcnode-id="7805"><span data-dcnode-id="7828" instrument_node="">In Finland, an idealistic artists' colony in </span><a data-dcnode-id="7826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Helsinki" title="Helsinki"><span data-dcnode-id="7827" instrument_node="">Helsinki</span></a><span data-dcnode-id="7825" instrument_node=""> was designed by </span><a data-dcnode-id="7823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Herman_Gesellius" title="Herman Gesellius"><span data-dcnode-id="7824" instrument_node="">Herman Gesellius</span></a><span data-dcnode-id="7822" instrument_node="">, </span><a data-dcnode-id="7820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Armas_Lindgren" title="Armas Lindgren"><span data-dcnode-id="7821" instrument_node="">Armas Lindgren</span></a><span data-dcnode-id="7819" instrument_node=""> and </span><a data-dcnode-id="7817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eliel_Saarinen" title="Eliel Saarinen"><span data-dcnode-id="7818" instrument_node="">Eliel Saarinen</span></a><span data-dcnode-id="7816" instrument_node="">,</span><sup class="reference" data-dcnode-id="7813" id="cite_ref-grove_1-3"><a data-dcnode-id="7814" href="#cite_note-grove-1"><span data-dcnode-id="7815" instrument_node="">[1]</span></a></sup><span data-dcnode-id="7812" instrument_node=""> who worked in the </span><a data-dcnode-id="7810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Romantic_style" title="National Romantic style"><span data-dcnode-id="7811" instrument_node="">National Romantic style</span></a><span data-dcnode-id="7809" instrument_node="">, akin to the British </span><a class="mw-redirect" data-dcnode-id="7807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gothic_Revival" title="Gothic Revival"><span data-dcnode-id="7808" instrument_node="">Gothic Revival</span></a><span data-dcnode-id="7806" instrument_node="">.
</span></p><p data-dcnode-id="7778"><span data-dcnode-id="7804" instrument_node="">In </span><a data-dcnode-id="7802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hungary" title="Hungary"><span data-dcnode-id="7803" instrument_node="">Hungary</span></a><span data-dcnode-id="7801" instrument_node="">, under the influence of Ruskin and Morris, a group of artists and architects, including </span><a data-dcnode-id="7799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/K%25C3%25A1roly_K%25C3%25B3s" title="Károly Kós"><span data-dcnode-id="7800" instrument_node="">Károly Kós</span></a><span data-dcnode-id="7798" instrument_node="">, </span><a data-dcnode-id="7796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alad%25C3%25A1r_K%25C3%25B6r%25C3%25B6sf%25C5%2591i-Kriesch" title="Aladár Körösfői-Kriesch"><span data-dcnode-id="7797" instrument_node="">Aladár Körösfői-Kriesch</span></a><span data-dcnode-id="7795" instrument_node=""> and Ede Toroczkai Wigand, discovered the </span><a data-dcnode-id="7793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Folk_art" title="Folk art"><span data-dcnode-id="7794" instrument_node="">folk art</span></a><span data-dcnode-id="7792" instrument_node=""> and vernacular architecture of </span><a data-dcnode-id="7790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Transylvania" title="Transylvania"><span data-dcnode-id="7791" instrument_node="">Transylvania</span></a><span data-dcnode-id="7789" instrument_node="">. Many of Kós's buildings, including those in the </span><a class="mw-redirect" data-dcnode-id="7787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Budapest_Zoo_%2526_Botanical_Garden" title="Budapest Zoo &amp; Botanical Garden"><span data-dcnode-id="7788" instrument_node="">Budapest zoo</span></a><span data-dcnode-id="7786" instrument_node=""> and the </span><a class="mw-redirect" data-dcnode-id="7784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wekerle_estate" title="Wekerle estate"><span data-dcnode-id="7785" instrument_node="">Wekerle estate</span></a><span data-dcnode-id="7783" instrument_node=""> in the same city, show this influence.</span><sup class="reference" data-dcnode-id="7780" id="cite_ref-74"><a data-dcnode-id="7781" href="#cite_note-74"><span data-dcnode-id="7782" instrument_node="">[74]</span></a></sup><span data-dcnode-id="7779" instrument_node="">
</span></p><p data-dcnode-id="7761"><span data-dcnode-id="7777" instrument_node="">In Russia, </span><a data-dcnode-id="7775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Viktor_Hartmann" title="Viktor Hartmann"><span data-dcnode-id="7776" instrument_node="">Viktor Hartmann</span></a><span data-dcnode-id="7774" instrument_node="">, </span><a data-dcnode-id="7772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Viktor_Vasnetsov" title="Viktor Vasnetsov"><span data-dcnode-id="7773" instrument_node="">Viktor Vasnetsov</span></a><span data-dcnode-id="7771" instrument_node="">, </span><a data-dcnode-id="7769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yelena_Polenova" title="Yelena Polenova"><span data-dcnode-id="7770" instrument_node="">Yelena Polenova</span></a><span data-dcnode-id="7768" instrument_node=""> and other artists associated with </span><a data-dcnode-id="7766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abramtsevo_Colony" title="Abramtsevo Colony"><span data-dcnode-id="7767" instrument_node="">Abramtsevo Colony</span></a><span data-dcnode-id="7765" instrument_node=""> sought to revive the quality of medieval Russian </span><a data-dcnode-id="7763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Decorative_arts" title="Decorative arts"><span data-dcnode-id="7764" instrument_node="">decorative arts</span></a><span data-dcnode-id="7762" instrument_node=""> quite independently from the movement in Great Britain.
</span></p><p data-dcnode-id="7756"><span data-dcnode-id="7760" instrument_node="">In Iceland, </span><a data-dcnode-id="7758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/S%25C3%25B6lvi_Helgason" title="Sölvi Helgason"><span data-dcnode-id="7759" instrument_node="">Sölvi Helgason</span></a><span data-dcnode-id="7757" instrument_node="">'s work shows Arts and Crafts influence.
