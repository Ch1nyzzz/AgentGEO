</span><h1 class="firstHeading" data-dcnode-id="1066" id="firstHeading"><span data-dcnode-id="1067" instrument_node="">Arts and craft movement</span></h1><span data-dcnode-id="1065" instrument_node="">
</span></div><span data-dcnode-id="1063" instrument_node="">
</span><div data-dcnode-id="538" id="bodyText"><span data-dcnode-id="1062" instrument_node="">
</span><p data-dcnode-id="1039"><span data-dcnode-id="1061" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="1059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Arts_and_crafts_movement" title="Arts and crafts movement"><span data-dcnode-id="1060" instrument_node="">Arts and Craft Movement</span></a><span data-dcnode-id="1058" instrument_node=""> developed in </span><a class="mw-redirect" data-dcnode-id="1056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Britain" title="Britain"><span data-dcnode-id="1057" instrument_node="">Britain</span></a><span data-dcnode-id="1055" instrument_node=""> in the 19th Century and </span><a class="mw-redirect" data-dcnode-id="1053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Spread" title="Spread"><span data-dcnode-id="1054" instrument_node="">spread</span></a><span data-dcnode-id="1052" instrument_node=""> across America and </span><a data-dcnode-id="1050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Europe" title="Europe"><span data-dcnode-id="1051" instrument_node="">Europe</span></a><span data-dcnode-id="1049" instrument_node=""> before it reached Japan where it emerged as the Mingei (Folk Movement). It led to the reformation of </span><a class="mw-redirect" data-dcnode-id="1047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Art" title="Art"><span data-dcnode-id="1048" instrument_node="">art</span></a><span data-dcnode-id="1046" instrument_node=""> at all </span><a class="mw-redirect" data-dcnode-id="1044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Level" title="Level"><span data-dcnode-id="1045" instrument_node="">levels</span></a><span data-dcnode-id="1043" instrument_node=""> across a wide social </span><a class="mw-redirect" data-dcnode-id="1041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Spectrum" title="Spectrum"><span data-dcnode-id="1042" instrument_node="">spectrum</span></a><span data-dcnode-id="1040" instrument_node="">.
</span></p><p data-dcnode-id="1025"><span data-dcnode-id="1038" instrument_node="">Its basis lies in simple </span><a data-dcnode-id="1036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Form" title="Form"><span data-dcnode-id="1037" instrument_node="">forms</span></a><span data-dcnode-id="1035" instrument_node="">, </span><a data-dcnode-id="1033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Truth_to_materials" title="Truth to materials"><span data-dcnode-id="1034" instrument_node="">truth to materials</span></a><span data-dcnode-id="1032" instrument_node=""> and the </span><a data-dcnode-id="1030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Consideration" title="Consideration"><span data-dcnode-id="1031" instrument_node="">consideration</span></a><span data-dcnode-id="1029" instrument_node=""> of nature as a source for patterns. The main characteristics of the </span><a class="mw-redirect" data-dcnode-id="1027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Arts_and_crafts_movement" title="Arts and crafts movement"><span data-dcnode-id="1028" instrument_node="">Arts and Craft Movement</span></a><span data-dcnode-id="1026" instrument_node=""> are:
</span></p><span data-dcnode-id="1024" instrument_node="">
</span><ul data-dcnode-id="1000"><li data-dcnode-id="1019"><span data-dcnode-id="1023" instrument_node=""> Truth to materials: A focus on the natural </span><a data-dcnode-id="1021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Quality" title="Quality"><span data-dcnode-id="1022" instrument_node="">qualities</span></a><span data-dcnode-id="1020" instrument_node=""> of the materials to make the objects.
</span></li><li data-dcnode-id="1008"><span data-dcnode-id="1018" instrument_node=""> Simple </span><a data-dcnode-id="1016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Form" title="Form"><span data-dcnode-id="1017" instrument_node="">forms</span></a><span data-dcnode-id="1015" instrument_node="">: </span><a data-dcnode-id="1013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Design" title="Design"><span data-dcnode-id="1014" instrument_node="">Design</span></a><span data-dcnode-id="1012" instrument_node=""> often focused on the actual </span><a data-dcnode-id="1010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Construction" title="Construction"><span data-dcnode-id="1011" instrument_node="">construction</span></a><span data-dcnode-id="1009" instrument_node=""> of the object.
</span></li><li data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node=""> Natural motifs: Patterns were often inspired by nature.
</span></li><li data-dcnode-id="1001"><span data-dcnode-id="1005" instrument_node=""> The vernacular: </span><a class="mw-redirect" data-dcnode-id="1003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Dome" title="Dome"><span data-dcnode-id="1004" instrument_node="">Domestic</span></a><span data-dcnode-id="1002" instrument_node=""> traditions and the vernacular provided inspiration.
</span></li></ul><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="998" instrument_node="">During the 1860s and 1870s, </span><a class="mw-redirect" data-dcnode-id="996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Architects" title="Architects"><span data-dcnode-id="997" instrument_node="">architects</span></a><span data-dcnode-id="995" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Designers" title="Designers"><span data-dcnode-id="994" instrument_node="">designers</span></a><span data-dcnode-id="992" instrument_node=""> and artists started to consider </span><a class="mw-redirect" data-dcnode-id="990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Innovative" title="Innovative"><span data-dcnode-id="991" instrument_node="">innovative</span></a><span data-dcnode-id="989" instrument_node=""> approaches to </span><a data-dcnode-id="987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Design" title="Design"><span data-dcnode-id="988" instrument_node="">design</span></a><span data-dcnode-id="986" instrument_node=""> and the </span><a class="mw-redirect" data-dcnode-id="984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Art" title="Art"><span data-dcnode-id="985" instrument_node="">arts</span></a><span data-dcnode-id="983" instrument_node=""> which led to the formation of the </span><a class="mw-redirect" data-dcnode-id="981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Arts_and_crafts_movement" title="Arts and crafts movement"><span data-dcnode-id="982" instrument_node="">Arts and Crafts Movement</span></a><span data-dcnode-id="980" instrument_node="">.
</span></p><p data-dcnode-id="947"><span data-dcnode-id="978" instrument_node="">Two key figures in the movement were the theorist and critic John Ruskin and the </span><a class="mw-redirect" data-dcnode-id="976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Designers" title="Designers"><span data-dcnode-id="977" instrument_node="">designer</span></a><span data-dcnode-id="975" instrument_node="">, writer and activist William Morris. Ruskin focused on the relationship between </span><a class="mw-redirect" data-dcnode-id="973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Art" title="Art"><span data-dcnode-id="974" instrument_node="">art</span></a><span data-dcnode-id="972" instrument_node="">, </span><a data-dcnode-id="970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Labour" title="Labour"><span data-dcnode-id="971" instrument_node="">labour</span></a><span data-dcnode-id="969" instrument_node=""> and </span><a data-dcnode-id="967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Society" title="Society"><span data-dcnode-id="968" instrument_node="">society</span></a><span data-dcnode-id="966" instrument_node=""> and Morris put Ruskin’s theories into </span><a data-dcnode-id="964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Practice" title="Practice"><span data-dcnode-id="965" instrument_node="">practice</span></a><span data-dcnode-id="963" instrument_node="">, placing a high </span><a class="mw-redirect" data-dcnode-id="961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Value" title="Value"><span data-dcnode-id="962" instrument_node="">value</span></a><span data-dcnode-id="960" instrument_node=""> on </span><a class="mw-redirect" data-dcnode-id="958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Works" title="Works"><span data-dcnode-id="959" instrument_node="">work</span></a><span data-dcnode-id="957" instrument_node="">, the pleasure derived from high-</span><a data-dcnode-id="955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Quality" title="Quality"><span data-dcnode-id="956" instrument_node="">quality</span></a><span data-dcnode-id="954" instrument_node=""> craftsmanship and the </span><a data-dcnode-id="952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Natural_beauty" title="Natural beauty"><span data-dcnode-id="953" instrument_node="">natural beauty</span></a><span data-dcnode-id="951" instrument_node=""> of </span><a data-dcnode-id="949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Materials" title="Materials"><span data-dcnode-id="950" instrument_node="">materials</span></a><span data-dcnode-id="948" instrument_node="">.
</span></p><p data-dcnode-id="921"><span data-dcnode-id="946" instrument_node="">By the 1880s Morris was internationally-renowned as a commercially-successful </span><a class="mw-redirect" data-dcnode-id="944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Designers" title="Designers"><span data-dcnode-id="945" instrument_node="">designer</span></a><span data-dcnode-id="943" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Manufacturer" title="Manufacturer"><span data-dcnode-id="942" instrument_node="">manufacturer</span></a><span data-dcnode-id="940" instrument_node="">. His ideas were taken on </span><a data-dcnode-id="938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Board" title="Board"><span data-dcnode-id="939" instrument_node="">board</span></a><span data-dcnode-id="937" instrument_node=""> by new guilds and </span><a data-dcnode-id="935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Society" title="Society"><span data-dcnode-id="936" instrument_node="">societies</span></a><span data-dcnode-id="934" instrument_node="">, who for the first time presented a unified approach among painters, </span><a class="mw-redirect" data-dcnode-id="932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Architects" title="Architects"><span data-dcnode-id="933" instrument_node="">architects</span></a><span data-dcnode-id="931" instrument_node="">, sculptors and </span><a class="mw-redirect" data-dcnode-id="929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Designers" title="Designers"><span data-dcnode-id="930" instrument_node="">designers</span></a><span data-dcnode-id="928" instrument_node="">. This in turn took the </span><a class="mw-redirect" data-dcnode-id="926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Arts_and_craft" title="Arts and craft"><span data-dcnode-id="927" instrument_node="">Arts and Crafts</span></a><span data-dcnode-id="925" instrument_node=""> ideals to the </span><a class="mw-redirect" data-dcnode-id="923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Public" title="Public"><span data-dcnode-id="924" instrument_node="">public</span></a><span data-dcnode-id="922" instrument_node="">.
</span></p><p data-dcnode-id="910"><span data-dcnode-id="920" instrument_node="">The term '</span><a class="mw-redirect" data-dcnode-id="918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Art" title="Art"><span data-dcnode-id="919" instrument_node="">Arts</span></a><span data-dcnode-id="917" instrument_node=""> &amp; Crafts' was first used at the suggestion of the bookbinder T J Cobden-Sanderson for its offshoot, the </span><a class="mw-redirect" data-dcnode-id="915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Art" title="Art"><span data-dcnode-id="916" instrument_node="">Arts</span></a><span data-dcnode-id="914" instrument_node=""> &amp; Crafts Exhibition </span><a data-dcnode-id="912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Society" title="Society"><span data-dcnode-id="913" instrument_node="">Society</span></a><span data-dcnode-id="911" instrument_node=""> which was set up in 1888.
</span></p><p data-dcnode-id="884"><span data-dcnode-id="909" instrument_node="">Early </span><a data-dcnode-id="907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Design" title="Design"><span data-dcnode-id="908" instrument_node="">designs</span></a><span data-dcnode-id="906" instrument_node=""> were often highly decorated but quite plain, however most </span><a class="mw-redirect" data-dcnode-id="904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Works" title="Works"><span data-dcnode-id="905" instrument_node="">work</span></a><span data-dcnode-id="903" instrument_node=""> showed a concern for, and understanding of craftsmanship with stunning bright </span><a class="mw-redirect" data-dcnode-id="901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Colour" title="Colour"><span data-dcnode-id="902" instrument_node="">colours</span></a><span data-dcnode-id="900" instrument_node="">, rich patterns and textures. Central to the </span><a class="mw-redirect" data-dcnode-id="898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Arts_and_crafts_movement" title="Arts and crafts movement"><span data-dcnode-id="899" instrument_node="">Arts and Crafts Movement</span></a><span data-dcnode-id="897" instrument_node=""> were ideas about </span><a class="mw-redirect" data-dcnode-id="895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Art" title="Art"><span data-dcnode-id="896" instrument_node="">art</span></a><span data-dcnode-id="894" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Works" title="Works"><span data-dcnode-id="893" instrument_node="">work</span></a><span data-dcnode-id="891" instrument_node=""> and </span><a data-dcnode-id="889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Society" title="Society"><span data-dcnode-id="890" instrument_node="">society</span></a><span data-dcnode-id="888" instrument_node=""> which meant that the </span><a class="mw-redirect" data-dcnode-id="886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Art" title="Art"><span data-dcnode-id="887" instrument_node="">arts</span></a><span data-dcnode-id="885" instrument_node=""> of the book, including calligraphy, typography, and book binding were highly valued.
</span></p><p data-dcnode-id="870"><span data-dcnode-id="883" instrument_node="">A key role in the </span><a data-dcnode-id="881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Development" title="Development"><span data-dcnode-id="882" instrument_node="">development</span></a><span data-dcnode-id="880" instrument_node=""> of the movement was played by </span><a class="mw-redirect" data-dcnode-id="878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Art" title="Art"><span data-dcnode-id="879" instrument_node="">art</span></a><span data-dcnode-id="877" instrument_node=""> </span><a data-dcnode-id="875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/School" title="School"><span data-dcnode-id="876" instrument_node="">schools</span></a><span data-dcnode-id="874" instrument_node=""> and technical colleges in </span><a data-dcnode-id="872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/London" title="London"><span data-dcnode-id="873" instrument_node="">London</span></a><span data-dcnode-id="871" instrument_node="">, Glasgow, and Birmingham.
</span></p><p data-dcnode-id="850"><span data-dcnode-id="869" instrument_node="">For the first time women took a leading role in a major </span><a class="mw-redirect" data-dcnode-id="867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Art" title="Art"><span data-dcnode-id="868" instrument_node="">art</span></a><span data-dcnode-id="866" instrument_node=""> movement as </span><a class="mw-redirect" data-dcnode-id="864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Designers" title="Designers"><span data-dcnode-id="865" instrument_node="">designers</span></a><span data-dcnode-id="863" instrument_node="">, makers and </span><a data-dcnode-id="861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Consumer" title="Consumer"><span data-dcnode-id="862" instrument_node="">consumers</span></a><span data-dcnode-id="860" instrument_node="">. Both the home and women's role brought a fresh approach to </span><a data-dcnode-id="858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Architecture" title="Architecture"><span data-dcnode-id="859" instrument_node="">architecture</span></a><span data-dcnode-id="857" instrument_node=""> and </span><a data-dcnode-id="855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Interior" title="Interior"><span data-dcnode-id="856" instrument_node="">interior</span></a><span data-dcnode-id="854" instrument_node=""> </span><a data-dcnode-id="852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Decoration" title="Decoration"><span data-dcnode-id="853" instrument_node="">decoration</span></a><span data-dcnode-id="851" instrument_node="">.
</span></p><p data-dcnode-id="813"><a class="mw-redirect" data-dcnode-id="848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Arts_and_craft" title="Arts and craft"><span data-dcnode-id="849" instrument_node="">Arts and Craft</span></a><span data-dcnode-id="847" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Styles" title="Styles"><span data-dcnode-id="846" instrument_node="">style</span></a><span data-dcnode-id="844" instrument_node=""> homes are typically made up of </span><a class="mw-redirect" data-dcnode-id="842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Element" title="Element"><span data-dcnode-id="843" instrument_node="">elements</span></a><span data-dcnode-id="841" instrument_node=""> with </span><a class="mw-redirect" data-dcnode-id="839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Traditional" title="Traditional"><span data-dcnode-id="840" instrument_node="">traditional</span></a><span data-dcnode-id="838" instrument_node=""> proportions. The </span><a data-dcnode-id="836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Pitched_roof" title="Pitched roof"><span data-dcnode-id="837" instrument_node="">pitched roof</span></a><span data-dcnode-id="835" instrument_node=""> </span><a data-dcnode-id="833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Span" title="Span"><span data-dcnode-id="834" instrument_node="">span</span></a><span data-dcnode-id="832" instrument_node=""> is no greater than 4.5m to 6m with pitches of 47.5-55°. </span><a data-dcnode-id="830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Eaves" title="Eaves"><span data-dcnode-id="831" instrument_node="">Eaves</span></a><span data-dcnode-id="829" instrument_node=""> are low, often reaching down to first </span><a class="mw-redirect" data-dcnode-id="827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Floor" title="Floor"><span data-dcnode-id="828" instrument_node="">floor</span></a><span data-dcnode-id="826" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Level" title="Level"><span data-dcnode-id="825" instrument_node="">level</span></a><span data-dcnode-id="823" instrument_node=""> in many </span><a data-dcnode-id="821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Part" title="Part"><span data-dcnode-id="822" instrument_node="">parts</span></a><span data-dcnode-id="820" instrument_node="">, often with a catslide </span><a class="mw-redirect" data-dcnode-id="818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Roof" title="Roof"><span data-dcnode-id="819" instrument_node="">roof</span></a><span data-dcnode-id="817" instrument_node=""> on at least one </span><a data-dcnode-id="815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Elevations" title="Elevations"><span data-dcnode-id="816" instrument_node="">elevation</span></a><span data-dcnode-id="814" instrument_node="">.
</span></p><p data-dcnode-id="760"><span data-dcnode-id="812" instrument_node="">Typically an important </span><a data-dcnode-id="810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Part" title="Part"><span data-dcnode-id="811" instrument_node="">part</span></a><span data-dcnode-id="809" instrument_node=""> of a </span><a data-dcnode-id="807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Building" title="Building"><span data-dcnode-id="808" instrument_node="">building</span></a><span data-dcnode-id="806" instrument_node=""> is the large </span><a class="mw-redirect" data-dcnode-id="804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Chimney" title="Chimney"><span data-dcnode-id="805" instrument_node="">chimney</span></a><span data-dcnode-id="803" instrument_node=""> which is often tall and wide with ornately decorated stacks with </span><a class="mw-redirect" data-dcnode-id="801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Traditional" title="Traditional"><span data-dcnode-id="802" instrument_node="">traditional</span></a><span data-dcnode-id="800" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Brickwork" title="Brickwork"><span data-dcnode-id="799" instrument_node="">brickwork</span></a><span data-dcnode-id="797" instrument_node=""> or </span><a class="mw-redirect" data-dcnode-id="795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/Stonework" title="Stonework"><span data-dcnode-id="796" instrument_node="">stonework</span></a><span data-dcnode-id="794" instrument_node="">. The </span><a data-dcnode-id="792" href="https://
