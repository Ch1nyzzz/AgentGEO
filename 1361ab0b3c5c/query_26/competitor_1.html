</span><p class="first-letter-styles" data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Elegant swirls of vines, flowers, and leaves in perfect symmetry, William Morris’ iconic patterns are instantly recognizable. Designed during the 1800s, Morris’ woodblock-printed wallpaper designs were revolutionary for their time, and can still be found all over the world, printed for furniture upholstery, curtains, ceramics, and even fashion accessories. But do you know the history of how they came to be?
</span></p><div class="desktop-blog-ad desktop-ad" data-dcnode-id="1236"></div><span data-dcnode-id="1235" instrument_node="">
</span><h2 data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">The Arts and Crafts Movement</span></h2><span data-dcnode-id="1232" instrument_node="">
</span><p data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">Beginning in Britain around 1880, the Arts and Crafts movement was born from the values of people concerned about the effects of industrialization on design and traditional craft. In response, architects, designers, craftsmen, and artists turned to new ways of living and working, pioneering new approaches to create decorative arts.</span></p><span data-dcnode-id="1229" instrument_node="">
</span><p data-dcnode-id="1224"><span data-dcnode-id="1228" instrument_node="">One of the most influential figures during this time was William Morris, who actively promoted the joy of craftsmanship and the beauty of the nature. Having produced over 50 wallpaper designs throughout his career, Morris became an internationally renowned designer and manufacturer. Other creatives such as architects, painters, sculptors and designers began to take up his ideas. They began a unified art and craft approach to design, which soon spread across Europe and America, and eventually Japan, emerging as its own folk crafts movement called </span><em data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">Mingei</span></em><span data-dcnode-id="1225" instrument_node="">.</span></p><span data-dcnode-id="1223" instrument_node="">
</span><h2 data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Who was William Morris?</span></h2><span data-dcnode-id="1220" instrument_node="">
</span><p data-dcnode-id="1215"><span data-dcnode-id="1219" instrument_node="">Born in Walthamstow, East London in March 1834, William Morris was a poet, artist, philosopher, typographer, political theorist, and arguably the most celebrated designer of the Arts &amp; Crafts movement. He strived to protect and revive the traditional techniques of handmade production that were being replaced by machines during the Victorian era's Industrial Revolution. Although he dabbled in embroidery, carpet-making, poetry and literature, he mastered the art of </span><a data-dcnode-id="1217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mymodernmet.com/japanese-woodblock-ukiyo-e-online-database/" rel="noopener" target="_blank"><span data-dcnode-id="1218" instrument_node="">woodblock printing</span></a><span data-dcnode-id="1216" instrument_node="">, and created some of the most recognizable textile patterns of the 19th century.</span></p><span data-dcnode-id="1214" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="1206" id="attachment_125804" style="width: 760px"><img alt="The Arts and Crafts Movement and William Morris" aria-describedby="caption-attachment-125804" class="size-full wp-image-125804 lazyloaded" data-dcnode-id="1213" data-src="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-1.jpg" data-srcset="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-1.jpg 750w, https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-1-238x300.jpg 238w" decoding="async" height="944" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-1.jpg&amp;raw" srcset="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-1.jpg 750w, https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-1-238x300.jpg 238w" width="750"><noscript data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">&lt;img aria-describedby="caption-attachment-125804" class="lazyload size-full wp-image-125804" decoding="async" src="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-1.jpg" alt="The Arts and Crafts Movement and William Morris" width="750" height="944" srcset="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-1.jpg 750w, https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-1-238x300.jpg 238w" sizes="(max-width: 750px) 100vw, 750px" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="1207" id="caption-attachment-125804"><span data-dcnode-id="1210" instrument_node="">Portrait of William Morris by Frederick Hollyer via </span><a data-dcnode-id="1208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/William_Morris%23/media/File%3AWilliam_Morris_age_53.jpg" rel="noopener" target="_blank"><span data-dcnode-id="1209" instrument_node="">Wikimedia Commons</span></a></p></div><span data-dcnode-id="1205" instrument_node="">
</span><p data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">&nbsp;</span></p><div class="desktop-blog-ad desktop-ad" data-dcnode-id="1202"></div><span data-dcnode-id="1201" instrument_node="">
</span><p data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Born into a wealthy middle-class family, Morris enjoyed a privileged childhood, as well as a sizable inheritance, meaning he would never struggle to earn his own income. He spent his childhood drawing, reading, and exploring forests and grand buildings, which triggered his fascination with natural landscapes and architecture.</span></p><span data-dcnode-id="1198" instrument_node="">
</span><p data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">Having developed his own particular taste from a young age, he began to realize the only way he could have the beautiful home he wanted was if he designed every part of it himself. As he famously once said, “Have nothing in your houses that you do not know to be useful or believe to be beautiful.”</span></p><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1192" instrument_node="">
</span><h2 data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">The Red House</span></h2><span data-dcnode-id="1189" instrument_node="">
</span><p data-dcnode-id="1181"><span data-dcnode-id="1188" instrument_node="">While studying at Oxford, Morris met his lifelong friend, architect Philip Webb. His dear friend helped him design and construct his Medieval-inspired, Neo-Gothic style family home in Bexleyheath, where he lived with his wife, Jane Morris, and his two children, Jane “Jenny” Alice Morris and Mary “May” Morris. Built in 1860, it became known as the </span><em data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">Red House</span></em><span data-dcnode-id="1185" instrument_node="">, and is now one of the most significant buildings of the Arts and Crafts era. Today, the house is owned by the </span><a data-dcnode-id="1183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nationaltrust.org.uk/red-house" rel="noopener" target="_blank"><span data-dcnode-id="1184" instrument_node="">National Trust</span></a><span data-dcnode-id="1182" instrument_node=""> and is open to visitors.</span></p><span data-dcnode-id="1180" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="1172" id="attachment_125805" style="width: 760px"><img alt="The Arts and Crafts Movement and William Morris" aria-describedby="caption-attachment-125805" class="size-full wp-image-125805 lazyloaded" data-dcnode-id="1179" data-src="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-9.jpg" data-srcset="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-9.jpg 750w, https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-9-300x213.jpg 300w" decoding="async" height="532" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-9.jpg&amp;raw" srcset="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-9.jpg 750w, https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-9-300x213.jpg 300w" width="750"><noscript data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">&lt;img aria-describedby="caption-attachment-125805" class="lazyload size-full wp-image-125805" decoding="async" src="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-9.jpg" alt="The Arts and Crafts Movement and William Morris" width="750" height="532" srcset="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-9.jpg 750w, https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-9-300x213.jpg 300w" sizes="(max-width: 750px) 100vw, 750px" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="1173" id="caption-attachment-125805"><span data-dcnode-id="1176" instrument_node="">The “Red House,” home of William Morris. via </span><a data-dcnode-id="1174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ARed_House_home_of_William_Morris.jpg" rel="noopener" target="_blank"><span data-dcnode-id="1175" instrument_node="">Wikimedia Commons</span></a></p></div><span data-dcnode-id="1171" instrument_node="">
</span><p data-dcnode-id="1166"><span data-dcnode-id="1170" instrument_node="">A number of Morris’ creative friends spent a lot of time at the </span><em data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">Red House</span></em><span data-dcnode-id="1167" instrument_node="">, including Pre-Raphaelite painters Edward Burne-Jones and Dante Gabriel Rossetti, who both helped him elaborately decorate the abode. While he envisioned living there for the rest of his life, Morris’ perfectionism caused him to move on after only five years. Over the course of his short stay, he discovered a number problems with the property. However, he enjoyed the process so much that he decided to set up his own design company, with a desire to create affordable “art for all.”</span></p><span data-dcnode-id="1165" instrument_node="">
</span><p data-dcnode-id="1158"><em data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Morris, Marshall, Faulkner &amp; Co.</span></em><span data-dcnode-id="1162" instrument_node=""> which was later known as simply </span><em data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Morris &amp; Co.</span></em><span data-dcnode-id="1159" instrument_node="">, was incredibly successful, and produced reams of fabric and wallpaper designs for over 150 years.</span></p><span data-dcnode-id="1157" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="1149" id="attachment_125806" style="width: 760px"><img alt="The Arts and Crafts Movement and William Morris" aria-describedby="caption-attachment-125806" class="size-full wp-image-125806 lazyloaded" data-dcnode-id="1156" data-src="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-10.jpg" data-srcset="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-10.jpg 750w, https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-10-230x300.jpg 230w" decoding="async" height="977" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-10.jpg&amp;raw" srcset="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-10.jpg 750w, https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-10-230x300.jpg 230w" width="750"><noscript data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">&lt;img aria-describedby="caption-attachment-125806" class="lazyload size-full wp-image-125806" decoding="async" src="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-10.jpg" alt="The Arts and Crafts Movement and William Morris" width="750" height="977" srcset="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-10.jpg 750w, https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-10-230x300.jpg 230w" sizes="(max-width: 750px) 100vw, 750px" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="1150" id="caption-attachment-125806"><span data-dcnode-id="1153" instrument_node="">The Red House front door from inside. Photo: Tony Hisgett (CC BY 2.0) via </span><a data-dcnode-id="1151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ARed_House_home_of_William_Morris_%286%29.jpg" rel="noopener" target="_blank"><span data-dcnode-id="1152" instrument_node="">Wikimedia Commons</span></a></p></div><span data-dcnode-id="1148" instrument_node="">
</span><p data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1145" instrument_node="">
</span><h2 data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">Morris’ Wallpaper Designs</span></h2><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Featuring swirling leaves, thieving birds, rose-filled trellises, and fruit tree branches, the designs of William Morris have a unique timeless quality. He began designing wallpapers in 1862, but their sale was delayed by several years while he experimented with printing from zinc plates.</span></p><span data-dcnode-id="1139" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="1131" id="attachment_125803" style="width: 760px"><img alt="The Arts and Crafts Movement and William Morris" aria-describedby="caption-attachment-125803" class="wp-image-125803 size-full lazyloaded" data-dcnode-id="1138" data-src="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-13.jpg" data-srcset="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-13.jpg 750w, https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-13-300x148.jpg 300w" decoding="async" height="371" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-13.jpg&amp;raw" srcset="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-13.jpg 750w, https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-13-300x148.jpg 300w" width="750"><noscript data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">&lt;img aria-describedby="caption-attachment-125803" class="lazyload wp-image-125803 size-full" decoding="async" src="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-13.jpg" alt="The Arts and Crafts Movement and William Morris" width="750" height="371" srcset="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-13.jpg 750w, https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-13-300x148.jpg 300w" sizes="(max-width: 750px) 100vw, 750px" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="1132" id="caption-attachment-125803"><span data-dcnode-id="1135" instrument_node="">Morris &amp; Co. sample book via </span><a data-dcnode-id="1133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AMorris_%2526_Co._-_Morris_and_Co._-_Google_Art_Project.jpg" rel="noopener" target="_blank"><span data-dcnode-id="1134" instrument_node="">Wikimedia Commons</span></a></p></div><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1125"><span data-dcnode-id="1129" instrument_node="">Inspired by nature, Morris’ designs feature leaves, vines, and flowers that he observed in his gardens or on walks in the countryside. Rather than life-like illustrations, his drawings are subtly stylized versions. </span><em data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">Daisy</span></em><span data-dcnode-id="1126" instrument_node="">, a simple design featuring meadow flowers, was the first of Morris’ wallpaper designs to go on sale in 1864.</span></p><span data-dcnode-id="1124" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="1116" id="attachment_125808" style="width: 760px"><img alt="The Arts and Crafts Movement and William Morris" aria-describedby="caption-attachment-125808" class="size-full wp-image-125808 lazyloaded" data-dcnode-id="1123" data-src="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-12.jpg" data-srcset="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-12.jpg 750w, https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-12-242x300.jpg 242w" decoding="async" height="930" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-12.jpg&amp;raw" srcset="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-12.jpg 750w, https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-12-242x300.jpg 242w" width="750"><noscript data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">&lt;img aria-describedby="caption-attachment-125808" class="lazyload size-full wp-image-125808" decoding="async" src="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-12.jpg" alt="The Arts and Crafts Movement and William Morris" width="750" height="930" srcset="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-12.jpg 750w, https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-12-242x300.jpg 242w" sizes="(max-width: 750px) 100vw, 750px" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="1117" id="caption-attachment-125808"><span data-dcnode-id="1120" instrument_node="">“Diasy” 1864 via </span><a data-dcnode-id="1118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ADaisy_MET_DP306732.jpg" rel="noopener" target="_blank"><span data-dcnode-id="1119" instrument_node="">Wikimedia Commons</span></a></p></div><span data-dcnode-id="1115" instrument_node="">
</span><p data-dcnode-id="1110"><span data-dcnode-id="1114" instrument_node="">Morris designed </span><em data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">Trellis</span></em><span data-dcnode-id="1111" instrument_node=""> after being unable to find a wallpaper that he liked enough for his own home. Inspired by the rose trellis in the garden of the Red House, Morris designed the pattern which went on sale in 1864. Interestingly, Morris could not draw birds, and the birds for this design were actually sketched by Philip Webb, the same friend and architect who designed the Red House.</span></p><span data-dcnode-id="1109" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="1101" id="attachment_125809" style="width: 760px"><img alt="The Arts and Crafts Movement and William Morris" aria-describedby="caption-attachment-125809" class="size-full wp-image-125809 lazyloaded" data-dcnode-id="1108" data-src="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-2.jpg" data-srcset="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-2.jpg 750w, https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-2-287x300.jpg 287w" decoding="async" height="785" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-2.jpg&amp;raw" srcset="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-2.jpg 750w, https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-2-287x300.jpg 287w" width="750"><noscript data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">&lt;img aria-describedby="caption-attachment-125809" class="lazyload size-full wp-image-125809" decoding="async" src="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-2.jpg" alt="The Arts and Crafts Movement and William Morris" width="750" height="785" srcset="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-2.jpg 750w, https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-2-287x300.jpg 287w" sizes="(max-width: 750px) 100vw, 750px" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="1102" id="caption-attachment-125809"><span data-dcnode-id="1105" instrument_node="">William Morris design for “Trellis” wallpaper 1862 via </span><a data-dcnode-id="1103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AWilliam_Morris_design_for_Trellis_wallpaper_1862.jpg" rel="noopener" target="_blank"><span data-dcnode-id="1104" instrument_node="">Wikimedia Commons</span></a></p></div><span data-dcnode-id="1100" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="1092" id="attachment_125810" style="width: 760px"><img alt="The Arts and Crafts Movement and William Morris" aria-describedby="caption-attachment-125810" class="size-full wp-image-125810 lazyloaded" data-dcnode-id="1099" data-src="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-3.jpg" data-srcset="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-3.jpg 750w, https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-3-243x300.jpg 243w" decoding="async" height="926" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-3.jpg&amp;raw" srcset="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-3.jpg 750w, https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-3-243x300.jpg 243w" width="750"><noscript data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">&lt;img aria-describedby="caption-attachment-125810" class="lazyload size-full wp-image-125810" decoding="async" src="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-3.jpg" alt="The Arts and Crafts Movement and William Morris" width="750" height="926" srcset="https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-3.jpg 750w, https://mymodernmet.com/wp/wp-content/uploads/2018/01/arts-craft-movement-william-morris-3-243x300.jpg 243w" sizes="(max-width: 750px) 100vw, 750px" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="1093" id="caption-attachment-125810"><span data-dcnode-id="1096" instrument_node="">“Trellis” wallpaper designed by William Morris 1862 and first produced in 1864. Via </span><a data-dcnode-id="1094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ATrellis_MET_DT255077.jpg" rel="noopener" target="_blank"><span data-dcnode-id="1095" instrument_node="">Wikimedia Commons</span></a></p></div><span data-dcnode-id="1091" instrument_node="">
</span><p data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Morris had his wallpapers printed by hand, using carved, pear woodblocks loaded with natural, mineral-based dyes, and pressed down with the aid of a foot-operated weight. Each design was made by carefully lining up and printing the woodblock motifs again and again to create a seamless repeat. Morris once spoke about the precise process, saying, “Remember that a pattern is either right or wrong. It cannot be forgiven for blundering, as a picture may be which has otherwise great qualities in it. It is with a pattern as with a fortress, it is no stronger than its weakest point.”</span></p><span data-dcnode-id="1088" instrument_node="">
</span><p data-dcnode-id="1083"><span data-dcnode-id="1087" instrument_node="">He employed the printers </span><em data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Jeffrey &amp; Co.</span></em><span data-dcnode-id="1084" instrument_node=""> to print his wallpapers up until his death in 1896, when the Merton factory took over production until the company’s voluntary liquidation in 1940.</span></p><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1077"><iframe allowfullscreen="" class="flickr-embed-frame lazyloaded" data-dcnode-id="1081" data-loaded="true" data-natural-height="396" data-natural-width="800" frameborder="0" height="305" mozallowfullscreen="" msallowfullscreen="" oallowfullscreen="" style="overflow: hidden; padding: 0px; margin: 0px 0px 25px; width: 617px; height: 305px; max-width: none;" webkitallowfullscreen="" width="617"></iframe><iframe allowfullscreen="" class="flickr-embed-frame lazyloaded" data-dcnode-id="1079" data-loaded="true" data-natural-height="534" data-natural-width="800" frameborder="0" height="412" mozallowfullscreen="" msallowfullscreen="" oallowfullscreen="" style="overflow: hidden; padding: 0px; margin: 0px 0px 25px; width: 617px; height: 412px; max-width: none;" webkitallowfullscreen="" width="617"></iframe></p><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1075"></p><span data-dcnode-id="1074" instrument_node=""> </span></article><span data-dcnode-id="1072" instrument_node="">

</span><div class="author-description-contents" data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">
