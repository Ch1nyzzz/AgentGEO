 with her and are able to touch with your hands a real </span><a data-dcnode-id="678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.luxury-lighting-pataviumart.com/chandelier-luxury-handmade-italian-decorative-artistic-high-end/" rel="noopener" target="_blank"><strong data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">luxury Italian chandelier</span></strong></a><span data-dcnode-id="677" instrument_node=""> taking shape day by day, exclusively for you.</span></p></div><span data-dcnode-id="674" instrument_node="">

</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="653"><p data-dcnode-id="654"><span data-dcnode-id="658" instrument_node="">In more then 60 years dedicated to make exclusive the projects of those who trusted us, we can proudly confirm you that we have completely satisfied our customers…..and believe us, amongst our Italian and International clients with often impossible requests to fulfill…we know very well what it means and we assume full responsability when we claim: </span><strong data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">“ Satisfy a client at all costs”</span></strong><span data-dcnode-id="655" instrument_node="">!</span></p></div><span data-dcnode-id="652" instrument_node="">

</span></div><span data-dcnode-id="639" instrument_node="">
</span><div class="elementor-element elementor-element-f2e08b3 elementor-widget elementor-widget-text-editor" data-dcnode-id="618" data-element_type="widget" data-id="f2e08b3" data-widget_type="text-editor.default"><span data-dcnode-id="638" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="620"><span data-dcnode-id="637" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="622"><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">The post sale of a lighting object is an important phase, which often is neglected by the producer but also by the client. Each piece, even the most sturdy, needs a specific cleaning and maintenance to remain beautiful for a long time. Sometimes, it is at these moments that accidentally a piece can break or can be ruined by inappropriate cleaning.</span></p><p data-dcnode-id="631"><span data-dcnode-id="634" instrument_node="">And it is in these moments that the client realises that the producer does not provide an efficient post-sales ( or that he hasn’t provided any!) or hasn’t provided any spare parts!</span><br data-dcnode-id="633"><span data-dcnode-id="632" instrument_node="">Is it not a shame to invest in a piece of art and then leave it damaged, unable to recuperate the damage?</span></p><p data-dcnode-id="623"><span data-dcnode-id="630" instrument_node="">In Pataviumart this kind of problem is inadmissible: we have chosen not to make any serial production, only creating </span><strong data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">luxury</span></strong><span data-dcnode-id="627" instrument_node="">, </span><strong data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">handmade chandeliers</span></strong><span data-dcnode-id="624" instrument_node="">, making their components one by one by hand, so that is possible to reproduce a spare part even after many years, assuring a long life to your investment, that will increase in value over time.</span></p></div><span data-dcnode-id="621" instrument_node="">
