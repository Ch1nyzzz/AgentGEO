ky9785/saparator.jpg&amp;raw" style="display: block; margin-left: auto; margin-right: auto;" width="150"></p><p data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">&nbsp;</span></p><h1 data-dcnode-id="1123" style="text-align: left;"><a data-dcnode-id="1124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jenonleather.com/yeans1"><img alt="" data-dcnode-id="1125" height="67" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jenonleather.com/fotky9785/fotos/Boty/yeans/Brown%2520Live2.jpg&amp;raw" width="100%"></a></h1><h2 data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Leather ankle boots in an award-winning design</span></h2><p data-dcnode-id="1114" style="text-align: left;"><span data-dcnode-id="1120" instrument_node="">Yeans are shoes for everyday wear, whatever the weather. They are made of genuine, top-quality leather and a </span><strong data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">6mm Vibram</span></strong><span data-dcnode-id="1117" instrument_node=""> sole. </span><a data-dcnode-id="1115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jenonleather.com/yeans1"><span data-dcnode-id="1116" instrument_node="">I want to know more&gt;</span></a></p><p data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1110"><img alt="" data-dcnode-id="1111" height="35" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jenonleather.com/fotky9785/saparator.jpg&amp;raw" style="display: block; margin-left: auto; margin-right: auto;" width="150"></p><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1105"><a data-dcnode-id="1106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jenonleather.com/snow"><img alt="" data-dcnode-id="1107" height="63" src="https://chatnoi
