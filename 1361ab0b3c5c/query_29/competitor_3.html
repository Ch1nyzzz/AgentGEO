</span><a data-dcnode-id="840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//babuhandmadeleather.com/what-is-shell-cordovan-leather/" rel="bookmark"><span data-dcnode-id="841" instrument_node="">What is Shell Cordovan leather?</span></a><span data-dcnode-id="839" instrument_node="">
</span></h2><span data-dcnode-id="837" instrument_node="">
</span></div><span data-dcnode-id="835" instrument_node="">
</span><div class="post-header font-alt" data-dcnode-id="823"><span data-dcnode-id="834" instrument_node="">
</span><div class="post-meta" data-dcnode-id="825"><a data-dcnode-id="832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//babuhandmadeleather.com/2019/12/21/" rel="bookmark"><time class="entry-date published updated date" data-dcnode-id="833" datetime=""></time></a><span data-dcnode-id="831" instrument_node=""> | </span><a data-dcnode-id="829" href="#respond"><span data-dcnode-id="830" instrument_node="">No Comments</span></a><span data-dcnode-id="828" instrument_node=""> | </span><a data-dcnode-id="826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//babuhandmadeleather.com/category/blog/" title="View all posts in Blog"><span data-dcnode-id="827" instrument_node="">Blog</span></a></div><span data-dcnode-id="824" instrument_node="">
</span></div><span data-dcnode-id="822" instrument_node="">
</span><div class="post-entry entry-content" data-dcnode-id="723"><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Many people may ask themselves a question “Is it worthy to spend a huge amount of money buying a set of watch strap, wallet or even a pair of shoes made from shell Cordovan leather?”. It is essential for you to gain more knowledge on this type of leather before you spend a great deal of money on leather goods made from Shell Cordovan as a saying “Get one’s money’s worth”.</span></p><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="816"><img alt="" class="size-medium wp-image-5978 aligncenter" data-dcnode-id="817" height="226" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//babuhandmadeleather.com/wp-content/uploads/2019/12/xoE1kEA-300x226.jpg&amp;raw" srcset="https://babuhandmadeleather.com/wp-content/uploads/2019/12/xoE1kEA-300x226.jpg 300w, https://babuhandmadeleather.com/wp-content/uploads/2019/12/xoE1kEA-555x419.jpg 555w, https://babuhandmadeleather.com/wp-content/uploads/2019/12/xoE1kEA.jpg 640w" width="300"></p><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="812" style="text-align: center"><em data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Photo: Shell Cordovan is known as “get one’s money’s worth”</span></em></p><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="807"><a data-dcnode-id="809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//babuhandmadeleather.com/product-category/collection/handmade-leather-watch-bands/shell-cordovan-bands/"><span data-dcnode-id="810" instrument_node="">Shell Cordovan leather</span></a><span data-dcnode-id="808" instrument_node=""> (also known as horse butt hide) is one the world’s most expensive leather types and commonly used to produce high-end shoes.</span></p><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">The main source of material of Shell Cordovan is horse butt part. However, the original material is goat leather, not horse leather.</span></p><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Shell Cordovan is not full grain leather type, but it is the leather layer below the top grain layer. This leather layer has the structure of collagen fibers derived from flesh and cartilage. Separated from this, Shell Cordovan leather has a very smooth and flawless surface without pores.</span></p><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="798"><img alt="" class="size-medium wp-image-5979 aligncenter" data-dcnode-id="799" height="200" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//babuhandmadeleather.com/wp-content/uploads/2019/12/EIzI2zh-300x200.jpg&amp;raw" srcset="https://babuhandmadeleather.com/wp-content/uploads/2019/12/EIzI2zh-300x200.jpg 300w, https://babuhandmadeleather.com/wp-content/uploads/2019/12/EIzI2zh-555x370.jpg 555w, https://babuhandmadeleather.com/wp-content/uploads/2019/12/EIzI2zh-768x512.jpg 768w, https://babuhandmadeleather.com/wp-content/uploads/2019/12/EIzI2zh-750x500.jpg 750w, https://babuhandmadeleather.com/wp-content/uploads/2019/12/EIzI2zh.jpg 960w" width="300"></p><span data-dcnode-id="797" instrument_node="">
</span><p data-dcnode-id="794" style="text-align: center"><em data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Photo: Smooth and flawless surface of Shell Cordovan</span></em></p><span data-dcnode-id="793" instrument_node="">
</span><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">The “shell” refers to the hindquarter part of the hide once it has been split horizontally to remove the grain. The name “cordovan” derives from the city of Cordoba, and means “from Cordoba”; together the terms refer to this specific type of horse leather.</span></p><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="788"><img alt="" class="size-medium wp-image-5980 aligncenter" data-dcnode-id="789" height="149" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//babuhandmadeleather.com/wp-content/uploads/2019/12/Va7uWxk-300x149.jpg&amp;raw" srcset="https://babuhandmadeleather.com/wp-content/uploads/2019/12/Va7uWxk-300x149.jpg 300w, https://babuhandmadeleather.com/wp-content/uploads/2019/12/Va7uWxk-555x276.jpg 555w, https://babuhandmadeleather.com/wp-content/uploads/2019/12/Va7uWxk-1024x509.jpg 1024w, https://babuhandmadeleather.com/wp-content/uploads/2019/12/Va7uWxk-768x382.jpg 768w, https://babuhandmadeleather.com/wp-content/uploads/2019/12/Va7uWxk-1536x764.jpg 1536w, https://babuhandmadeleather.com/wp-content/uploads/2019/12/Va7uWxk.jpg 1600w" width="300"></p><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">Unlike other leather, the shell is a membrane in the middle of two epidermis layers in the rear portion of a horse butt. The hindquarter portion of the hide used for shell cordovan begins at about 24″ from the tail and extending 24-28″ on either side of the horse. The exact size depends on the particular horse.</span></p><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Shell cordovan is exceptionally durable. The pores are so dense on the hindquarters of a horse that they are not visible to the naked eye. The hide is naturally resistant to water (though not impervious) as well as stretching. Instead of creasing, shell cordovan ripples.</span></p><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="779"><img alt="" class="size-medium wp-image-5981 aligncenter" data-dcnode-id="780" height="300" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//babuhandmadeleather.com/wp-content/uploads/2019/12/EEreV3h-300x300.jpg&amp;raw" srcset="https://babuhandmadeleather.com/wp-content/uploads/2019/12/EEreV3h-300x300.jpg 300w, https://babuhandmadeleather.com/wp-content/uploads/2019/12/EEreV3h-160x160.jpg 160w, https://babuhandmadeleather.com/wp-content/uploads/2019/12/EEreV3h-555x555.jpg 555w, https://babuhandmadeleather.com/wp-content/uploads/2019/12/EEreV3h-150x150.jpg 150w, https://babuhandmadeleather.com/wp-content/uploads/2019/12/EEreV3h-768x768.jpg 768w, https://babuhandmadeleather.com/wp-content/uploads/2019/12/EEreV3h-500x500.jpg 500w, https://babuhandmadeleather.com/wp-content/uploads/2019/12/EEreV3h.jpg 960w" width="300"></p><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="775" style="text-align: center"><em data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Photo: The characteristic of this type of leather is thick and polished, perfectly durable.</span></em></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="771"><strong data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">The history of Shell Cordovan</span></strong></p><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Firstly, the name of this type of leather is derived from Córdaba – a city in Spain, and documented use of horse leather was in 17th century by the Visigoths and eventually by the Moors. However, an American made Shell Cordovan become the king of leather of all types. He was Isadore Hoorween – the founder of Horween leather company.</span></p><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="765"><img alt="" class="size-medium wp-image-5982 aligncenter" data-dcnode-id="766" height="204" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//babuhandmadeleather.com/wp-content/uploads/2019/12/800gj82-300x204.jpg&amp;raw" srcset="https://babuhandmadeleather.com/wp-content/uploads/2019/12/800gj82-300x204.jpg 300w, https://babuhandmadeleather.com/wp-content/uploads/2019/12/800gj82-555x377.jpg 555w, https://babuhandmadeleather.com/wp-content/uploads/2019/12/800gj82-768x522.jpg 768w, https://babuhandmadeleather.com/wp-content/uploads/2019/12/800gj82.jpg 873w" width="300"></p><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="761" style="text-align: center"><em data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Horween Company</span></em></p><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">In addition, Cordovan also refers to the color of dark red with purple light.</span></p><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">The process of producing Shell Cordovan requires a lot of techniques and expenses, so until the end of 19th and early 20th century, they only use this method to make razor sharpener for barbershops.</span></p><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Recently, Shell Cordovan is commonly used to make shoes, wallets and watch straps due to its high aesthetics, perfect quality, and absolute durability. Shell Cordovan is also famous for its&nbsp; unique anti-wrinkle characteristic.</span></p><span data-dcnode-id="751" instrument_node="">
</span><p data-dcnode-id="749"><img alt="" class="size-medium wp-image-5983 aligncenter" data-dcnode-id="750" height="300" loading="lazy" sizes="(max-width: 240px) 100vw, 240px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//babuhandmadeleather.com/wp-content/uploads/2019/12/fz4sF0P-240x300.jpg&amp;raw" srcset="https://babuhandmadeleather.com/wp-content/uploads/2019/12/fz4sF0P-240x300.jpg 240w, https://babuhandmadeleather.com/wp-content/uploads/2019/12/fz4sF0P-555x695.jpg 555w, https://babuhandmadeleather.com/wp-content/uploads/2019/12/fz4sF0P-58x72.jpg 58w, https://babuhandmadeleather.com/wp-content/uploads/2019/12/fz4sF0P.jpg 767w" width="240"></p><span data-dcnode-id="748" instrument_node="">
</span><p data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">The dyeing process of cordovan is incredibly complex, so there are only limited colors available for this type of leather. Normally, it takes about six months (Horween) and even 10 months (Shinki Hikaku) to finish the tanning and leather treatment. Meanwhile, industrial leather only takes 24 to 28 hours.</span></p><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="743"><img alt="" class="size-medium wp-image-5984 aligncenter" data-dcnode-id="744" height="300" loading="lazy" sizes="(max-width: 240px) 100vw, 240px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//babuhandmadeleather.com/wp-content/uploads/2019/12/uPbLyYP-240x300.jpg&amp;raw" srcset="https://babuhandmadeleather.com/wp-content/uploads/2019/12/uPbLyYP-240x300.jpg 240w, https://babuhandmadeleather.com/wp-content/uploads/2019/12/uPbLyYP-555x694.jpg 555w, https://babuhandmadeleather.com/wp-content/uploads/2019/12/uPbLyYP-58x72.jpg 58w, https://babuhandmadeleather.com/wp-content/uploads/2019/12/uPbLyYP.jpg 768w" width="240"></p><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Using the herbal tanning formula and handmade finish process, after deeply absorbing the soft, supple and durable tanning substance, Shell Cordovan is polished and smooth. Shell Cordovan was born for the traditional leather craftsmen. The method of mass production and short cuts cannot completely present the quality and beauty of this premium leather.</span></p><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="737"><img alt="" class="size-medium wp-image-5985 aligncenter" data-dcnode-id="738" height="300" loading="lazy" sizes="(max-width: 240px) 100vw, 240px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//babuhandmadeleather.com/wp-content/uploads/2019/12/yjYQTdi-240x300.jpg&amp;raw" srcset="https://babuhandmadeleather.com/wp-content/uploads/2019/12/yjYQTdi-240x300.jpg 240w, https://babuhandmadeleather.com/wp-content/uploads/2019/12/yjYQTdi-555x694.jpg 555w, https://babuhandmadeleather.com/wp-content/uploads/2019/12/yjYQTdi-58x72.jpg 58w, https://babuhandmadeleather.com/wp-content/uploads/2019/12/yjYQTdi.jpg 768w" width="240"></p><span data-dcnode-id="736" instrument_node="">
</span><p data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Raw Shell Cordovan is valued by the sizes of leather, including: 1, X, 2, 3, 4, 5 or chips. On average, it costs about 1,000 USD/ m2, but normally it is sold in sheets.</span></p><span data-dcnode-id="733" instrument_node="">
</span><p data-dcnode-id="731"><img alt="" class="size-medium wp-image-5986 aligncenter" data-dcnode-id="732" height="300" loading="lazy" sizes="(max-width: 240px) 100vw, 240px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//babuhandmadeleather.com/wp-content/uploads/2019/12/NuAQTAM-240x300.jpg&amp;raw" srcset="https://babuhandmadeleather.com/wp-content/uploads/2019/12/NuAQTAM-240x300.jpg 240w, https://babuhandmadeleather.com/wp-content/uploads/2019/12/NuAQTAM-555x694.jpg 555w, https://babuhandmadeleather.com/wp-content/uploads/2019/12/NuAQTAM-58x72.jpg 58w, https://babuhandmadeleather.com/wp-content/uploads/2019/12/NuAQTAM.jpg 768w" width="240"></p><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Shell Cordovan’s special qualities aren’t for every person’s closet or budget, but they are a cornerstone of classic men’s accessories. What shell cordovan accessories do you wanna own?</span></p><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="725"><img alt="" class="size-medium wp-image-5643 aligncenter" data-dcnode-id="726" height="200" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//babuhandmadeleather.com/wp-content/uploads/2019/10/brown-shell-cordovan-leather-watch-bands-8-300x200.jpg&amp;raw" srcset="https://babuhandmadeleather.com/wp-content/uploads/2019/10/brown-shell-cordovan-leather-watch-bands-8-300x200.jpg 300w, https://babuhandmadeleather.com/wp-content/uploads/2019/10/brown-shell-cordovan-leather-watch-bands-8-555x370.jpg 555w, https://babuhandmadeleather.com/wp-content/uploads/2019/10/brown-shell-cordovan-leather-watch-bands-8-768x512.jpg 768w, https://babuhandmadeleather.com/wp-content/uploads/2019/10/brown-shell-cordovan-leather-watch-bands-8-1024x682.jpg 1024w, https://babuhandmadeleather.com/wp-content/uploads/2019/10/brown-shell-cordovan-leather-watch-bands-8-750x500.jpg 750w, https://babuhandmadeleather.com/wp-content/uploads/2019/10/brown-shell-cordovan-leather-watch-bands-8.jpg 1600w" width="300"></p><span data-dcnode-id="724" instrument_node="">
</span></div><span data-dcnode-id="721" instrument_node="">
