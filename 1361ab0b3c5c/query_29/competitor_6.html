</span><h1 data-dcnode-id="4914"><span data-dcnode-id="4915" style="font-size: 120%;"><span data-dcnode-id="4916" instrument_node="">WHAT WE DO</span></span></h1><span data-dcnode-id="4913" instrument_node="">
</span></div><span data-dcnode-id="4911" instrument_node="">
</span></div><span data-dcnode-id="4909" instrument_node="">

</span><h3 data-dcnode-id="4893" style="text-align: left;"><span data-dcnode-id="4894" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="4892" instrument_node="">
</span><h3 class="western" data-dcnode-id="4889" style="text-align: center;"><span data-dcnode-id="4890" style="font-family: Arial, serif; font-size: 100%;"><span data-dcnode-id="4891" instrument_node="">We bring people together to co-create wonderful art and spectacular events that animate spaces, connecting people to places and telling stories that reflect people’s lives.</span></span></h3><span data-dcnode-id="4888" instrument_node="">
</span><p data-dcnode-id="4886" style="text-align: left;"><span data-dcnode-id="4887" instrument_node="">We work with people to create amazing spectacles that break down the distance between audience and performer, creating powerful memories. We take our work&nbsp; into the street, reclaiming public spaces for people and art. We uphold a social change agenda and prioritise opportunities that work to change society and people’s lives for the better</span></p><span data-dcnode-id="4885" instrument_node="">
</span><h3 data-dcnode-id="4883" style="text-align: center;"><span data-dcnode-id="4884" instrument_node="">AS MANY PEOPLE AS POSSIBLE MAKING THE BEST ART POSSIBLE</span></h3><span data-dcnode-id="4882" instrument_node="">
</span><p data-dcnode-id="4880" style="text-align: left;"><span data-dcnode-id="4881" instrument_node="">We run two signature events locally, the Hebden Bridge Handmade Parade, and the Lamplighter festival in Todmorden.</span></p><span data-dcnode-id="4879" instrument_node="">
</span><p data-dcnode-id="4877" style="text-align: left;"><span data-dcnode-id="4878" instrument_node="">We’re busy all year round working with other communities, from all around the UK and across the world. If you want to make something magical happen in your community, we’d love to get creative with you!</span></p><span data-dcnode-id="4876" instrument_node="">
</span><p data-dcnode-id="4871" style="text-align: left;"><span data-dcnode-id="4875" instrument_node="">To talk about how we can work together, </span><a data-dcnode-id="4873" href="mailto:info@handmadeparade.co.uk"><span data-dcnode-id="4874" instrument_node="">email</span></a><span data-dcnode-id="4872" instrument_node=""> us, or call 01422 844154.</span></p><span data-dcnode-id="4870" instrument_node="">
</span><p data-dcnode-id="4868" style="text-align: left;"><span data-dcnode-id="4869" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4867" instrument_node="">

</span><h1 data-dcnode-id="4844"><span data-dcnode-id="4845" style="font-size: 120%;"><span data-dcnode-id="4846" instrument_node="">HANDMADE PARADE</span></span></h1><span data-dcnode-id="4843" instrument_node="">
</span><p data-dcnode-id="4841"><span data-dcnode-id="4842" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4840" instrument_node="">
</span></div><span data-dcnode-id="4838" instrument_node="">

</span><section class="section" data-dcnode-id="4033" id="section_1831894806"><span data-dcnode-id="4821" instrument_node="">
</span><div class="bg section-bg fill bg-fill bg-loaded" data-dcnode-id="4819"><span data-dcnode-id="4820" instrument_node="">
</span></div><span data-dcnode-id="4818" instrument_node="">
</span><div class="section-content relative" data-dcnode-id="4038"><span data-dcnode-id="4817" instrument_node="">
</span><div class="row" data-dcnode-id="4040" id="row-1236756397"><span data-dcnode-id="4816" instrument_node="">
</span><div class="col small-12 large-12" data-dcnode-id="4042" id="col-2055080761"><span data-dcnode-id="4815" instrument_node="">
</span><div class="col-inner" data-dcnode-id="4044"><span data-dcnode-id="4814" instrument_node="">
</span><h1 class="p1" data-dcnode-id="4810"><b data-dcnode-id="4811"><span data-dcnode-id="4812" style="color: #f99b1c;"><span data-dcnode-id="4813" instrument_node="">The Hebden Bridge Handmade Parade is an annual celebration of funkiness, the art of the handmade and is a LOT of fun!</span></span></b></h1><span data-dcnode-id="4809" instrument_node="">
</span><p data-dcnode-id="4806"><span data-dcnode-id="4807" style="font-size: 14.4px; text-align: center; color: #282828;"><span data-dcnode-id="4808" instrument_node="">The magic happens in three weeks of workshops, open to anyone who wants to make costumes, parade art or help create giant puppets. With a crack team of local professional carnival artists, volunteers, guest artists and some amazing street bands, we create a spectacle where up to a thousand people dance their way down the streets of Hebden Bridge, watched by thousands.</span></span></p><span data-dcnode-id="4805" instrument_node="">
</span><h3 data-dcnode-id="4802"><span data-dcnode-id="4803" style="color: #282828;"><span data-dcnode-id="4804" instrument_node="">Outreach Workshops</span></span></h3><span data-dcnode-id="4801" instrument_node="">
</span><p data-dcnode-id="4795"><span data-dcnode-id="4796" style="color: #282828;"><span data-dcnode-id="4800" instrument_node="">Our artists can come to you! If you’re a community centre or organisation, or a school, our artists would love to work with you at a time and place that suits you. We’ll bring all the materials you’ll need for a couple of hours or a day of fun and new experiences. To set up outreach workshops and find out about cost, contact&nbsp;</span><a data-dcnode-id="4798" href="mailto:jude@handmadeparade.co.uk" style="color: #282828;"><span data-dcnode-id="4799" instrument_node="">jude@handmadeparade.co.uk</span></a><span data-dcnode-id="4797" instrument_node="">.</span></span></p><span data-dcnode-id="4794" instrument_node="">
</span><p data-dcnode-id="4789"><span data-dcnode-id="4790" style="color: #282828;"><span data-dcnode-id="4793" instrument_node="">If you’d like to make your own costumes at home, school (or even work!) and join us on parade day, please remember our two rules:&nbsp;</span><em data-dcnode-id="4791"><span data-dcnode-id="4792" instrument_node="">No words or logos. No motorised vehicles.</span></em></span></p><span data-dcnode-id="4788" instrument_node="">
</span><div class="row show-for-small" data-dcnode-id="4735" id="row-2052907169"><span data-dcnode-id="4787" instrument_node="">

</span><h2 data-dcnode-id="3975"><span data-dcnode-id="3976" style="color: #f99b1c;"><span data-dcnode-id="3977" instrument_node="">The Lamplighter guides us through the darkest months of the year.</span></span></h2><span data-dcnode-id="3974" instrument_node="">
</span><p data-dcnode-id="3968"><span data-dcnode-id="3969" style="font-size: 120%;"><span data-dcnode-id="3973" instrument_node="">Led by the beautiful Lamplighter puppet, we light up Todmorden with a lantern parade, fire performers, street bands, illuminated installations and great food, and hundreds of lanterns made by you! Building on the huge success of the 2012&nbsp;</span><a data-dcnode-id="3971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/handmadeparade/sets/72157641341611853/" rel="noopener noreferrer" target="_blank" title="Valley of Lights 2012"><span data-dcnode-id="3972" instrument_node="">Valley of Lights</span></a><span data-dcnode-id="3970" instrument_node="">, it’s become an annual ritual that guides us through the dark times.</span></span></p><span data-dcnode-id="3967" instrument_node="">

</span><p data-dcnode-id="2968"><span data-dcnode-id="2969" instrument_node="">In celebration of the Tour de France in&nbsp;Yorkshire, the Fantastical Cycle Parade&nbsp;was a glorious ride through the&nbsp;streets of Todmorden with bicycles,&nbsp;tricycles, scooters, prams and&nbsp;wheelchairs transformed into all&nbsp;manner of strange and wonderful&nbsp;creatures, bugs and beasts.</span></p><span data-dcnode-id="2967" instrument_node="">
</span><p data-dcnode-id="2950"><span data-dcnode-id="2966" instrument_node="">Street performers and some&nbsp;surprising pedal-powered contraptions&nbsp;popped up throughout Todmorden&nbsp;town centre&nbsp;including art, performance and music by&nbsp;</span><a data-dcnode-id="2964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//theskiband.org/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2965" instrument_node="">Skiband</span></a><span data-dcnode-id="2963" instrument_node="">,&nbsp;</span><a data-dcnode-id="2961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//handmadeparade.co.uk/samba/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2962" instrument_node="">Handmade Samba Band</span></a><span data-dcnode-id="2960" instrument_node="">,&nbsp;</span><a data-dcnode-id="2958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thingumajig.info/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2959" instrument_node="">Thingumajig Theatre</span></a><span data-dcnode-id="2957" instrument_node="">,&nbsp;</span><a data-dcnode-id="2955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//spacecadets.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2956" instrument_node="">Spacecadets</span></a><span data-dcnode-id="2954" instrument_node="">&nbsp;and&nbsp;</span><a data-dcnode-id="2952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.grannyturismo.net/grannyturismo/granny_home.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2953" instrument_node="">Granny Turismo</span></a><span data-dcnode-id="2951" instrument_node="">!</span></p><span data-dcnode-id="2949" instrument_node="">

</span><div class="eapps-instagram-feed-posts-item-text" data-dcnode-id="1753" eapps-link="text"><span data-dcnode-id="1754" instrument_node="">It's #Throwbackthursday again... Wow, these are coming up quickly... next up, Stilting! .  Starting in 2009 with a gaggle of 12 Canada geese taught by Andrew Kim, over the years, we've taught hundreds of children, young people and adults to perform on stilts. In 2019 we had over 50 stilters in the parade, from ten-year old beginners, to seasoned adult professionals. For the last couple of years demand has been so high that we've run year-round stilting workshops, and there are several people who started when they were ten, and are now involved in teaching the beginners. .  Watching them first put on their stilts and transform from nervous and wobbly beginners to dancing down the street in a parade - which is REALLY, REALLY HARD work- is totally amazing, like watching baby animals getting up on their feet, it's lovely! It's really impressive seeing them parade down the street, and having colour and movement and people interacting with the audience from height, adds so much to the experience for our audience. .  The costumes are designed by our artists to fit in with the theme of each section and  there's a lot of practical and safety considerations. Some have definitely been more successful than others, and I suspect some of our volunteers never want to hear the words 'stilting trousers' ever again! .  A big shout out to our stilting teachers past and present - Andrew Kim, Maisha Kungu, Jess Woodhead and Lily Crowther, and to George Kidd, stilt-maker extraordinaire.  #hebdenbridge #creativity #throwbackthursday #artscouncilengland #arts #outdoorarts #stilting</span></div><span data-dcnode-id="1752" instrument_node="">
</span><div class="eapps-instagram-feed-posts-item-text eapps-instagram-feed-posts-item-text-clone" data-dcnode-id="1750" eapps-link="text"><span data-dcnode-id="1751" instrument_node="">It's #Throwbackthursday again... Wow, these are coming up quickly... next up, Stilting! .  Starting in 2009 with a gaggle of 12 Canada geese taught by Andrew Kim, over the years, we've taught hundreds of children, young people and adults to perform on stilts. In 2019 we had over 50 stilters in the parade, from ten-year old beginners, to seasoned adult professionals. For the last couple of years demand has been so high that we've run year-round stilting workshops, and there are several people who started when they were ten, and are now involved in teaching the beginners. .  Watching them first put on their stilts and transform from nervous and wobbly beginners to dancing down the street in a parade - which is REALLY, REALLY HARD work- is totally amazing, like watching baby animals getting up on their feet, it's lovely! It's really impressive seeing them parade down the street, and having colour and movement and people interacting with the audience from height, adds so much to the experience for our audience. .  The costumes are designed by our artists to fit in with the theme of each section and  there's a lot of practical and safety considerations. Some have definitely been more successful than others, and I suspect some of our volunteers never want to hear the words 'stilting trousers' ever again! .  A big shout out to our stilting teachers past and present - Andrew Kim, Maisha Kungu, Jess Woodhead and Lily Crowther, and to George Kidd, stilt-maker extraordinaire.  #hebdenbridge #creativity #throwbackthursday #artscouncilengland #arts #outdoorarts #stilting</span></div></div><span data-dcnode-id="1748" instrument_node="">

</span><div class="eapps-instagram-feed-posts-item-text" data-dcnode-id="1680" eapps-link="text"><span data-dcnode-id="1681" instrument_node="">'Throwback Thursday' this week, takes us back to the public workshops which we absolutely love (and think you do too!). .  This weekend would normally be when we open the big, rattly doors to our amazing workshop for the public. This means 3 weeks of full-on creativity, running about 25 workshops with over a thousand people taking part. It is BUSY! .  Our building turns into a busy, colourful hive with hundreds of people - public, artists and volunteers - building, painting, dancing, drumming, laughing, making lists, losing tools (and the plot), finding inspiration and new friends. It really is an amazing place, we LOVE IT. .  We make giant puppets and wheeled contraptions, costumes and props, little games and performances, flags and banners, and many, many ridiculous hats.  We will always say YES to people's ideas and are completely happy for folk to go off-piste... (random massive woodlouse? Yep, that'll work :) .  As well as the public making workshops we have a concurrent programme of stilting, dancing and Samba drumming workshops and also an outreach programme working with specific groups who are unable to participate in the public workshops - there'll be more about these later. .  It's completely amazing. Did I say we're going to miss it this year? .  #hebdenbridge #artscouncilengland #arts #outdoorarts #creativity #throwbackthursday</span></div><span data-dcnode-id="1679" instrument_node="">

</span><div class="eapps-instagram-feed-posts-item-text" data-dcnode-id="1607" eapps-link="text"><span data-dcnode-id="1608" instrument_node="">This week we are focusing on the next stage of the Handmade Parade process, which is the 'Big May Make.' This is a making camp which happens before the public workshops start and is primarily about our AMAZING volunteers without whom the parade would not happen. .  We value our volunteers extremely highly and we try our hardest to make sure that the time and the skills that they offer are never taken for granted. We like to think that if you walk through our door you're very much part of the crew. .  We'll make band and dancer's costumes,  stilting trousers (a seemingly never ending task!) and make a good start on prep for the public workshops; there's a LOT to do! .  There's also a good chance some folk will get carried away, decide they want to make a massive puppet and won't leave the building for a month (I LOVE THIS!) .  It also means when the workshops start we've got a team who know each other, with skills they need to help out and most importantly know where the biscuits are hidden! .  #hebdenbridge #creativity #artscouncilengland #arts #volunteer #outdoorarts</span></div><span data-dcnode-id="1606" instrument_node="">

</span><div class="eapps-instagram-feed-posts-item-text" data-dcnode-id="1534" eapps-link="text"><span data-dcnode-id="1535" instrument_node="">Normally, at this time of year we'd be just on the run up to our main event, the Hebden Bridge Handmade Parade. It's where we started and is an event we're all very, very proud of. .  The next few Throwback Thursdays will show you the process of how this comes together and will include some fabulous pictures from previous events. We're all going to really miss it this year! .  First up, the design process. .  Our artists, alongside the Artistic Director,  will have been working  for a while on the design for the public makes and big builds - we start out with the theme, which comes directly from a public consultation that we have in February. .  We build a narrative around this, which is then split up into clear sections- each with it's own title, artist team, and distinct colour scheme. .  Each section team will design several things -  makes for public workshops, band and dancer's costumes, stilter's costumes and big puppets and structures. .  This process, after MUCH wrangling (it takes a lot more work than you might think!) ends up as the storyboards which you see when you come to the public workshops - here are some from previous years, they are lovely things! #hebdenbridge #calderdale #creativity #artscouncilengland #outdoorarts #throwbackthursday</span></div><span data-dcnode-id="1533" instrument_node="">

</span><div class="eapps-instagram-feed-posts-item-text" data-dcnode-id="1472" eapps-link="text"><span data-dcnode-id="1473" instrument_node="">Can you help us? . We would love to hear about your experience of being involved with Handmade Parade, whatever the capacity - participant, steward, volunteer, audience member, vendor etc. . It's really important to us to know the impact that our work has for the people we work with. . Maybe you've made new friends, learnt a new skill, increased your confidence or just had a truly memorable day out! . It also helps us when we are communicating with funders and allows us to demonstrate what we have achieved with their investment. . Would you be willing to answer a few questions about your involvement with us? Or do you know someone who might? It can be anonymous if you'd prefer. . We can email questions to you for you to type your answers or we can do a relaxed phone interview if you would rather speak instead of write. . If you think you might be able to help us out, please contact jude@handmadeparade.co.uk #volunteer #hebdenbridge #creativity #calderdale #artscouncilengland #arts</span></div><span data-dcnode-id="1471" instrument_node="">

</span><div class="eapps-instagram-feed-posts-item-text" data-dcnode-id="1399" eapps-link="text"><span data-dcnode-id="1400" instrument_node="">This week our 'Throwback Thursday' is from six years ago when in Yorkshire it was all about the bike, spots and the colour yellow! . In celebration of the Tour de France in Yorkshire, the Fantastical Cycle Parade was a glorious ride through the streets of Todmorden with bicycles, tricycles, scooters, prams and wheelchairs transformed into all manner of strange and wonderful creatures, bugs and beasts. . Produced by Handmade Parade with Tour de Tod; supported by the Yorkshire Festival and Todmorden Town Council. . Photos by Ian Hodgson and Craig Shaw. . Artwork by Alison Duddle, Jonny Quick (flowers) Sue Walpole (fish) and Kerith Ogden (beetle), cycle structure and engineering by Noah Rose, Richard Dawson and Ian Broscomb. . #todmorden #outdoorarts #arts #creativity #throwbackthursday #artscouncilengland #hebdenbridge</span></div><span data-dcnode-id="1398" instrument_node="">
</span><div class="eapps-instagram-feed-posts-item-text eapps-instagram-feed-posts-item-text-clone" data-dcnode-id="1396" eapps-link="text"><span data-dcnode-id="1397" instrument_node="">This week our 'Throwback Thursday' is from six years ago when in Yorkshire it was all about the bike, spots and the colour yellow! . In celebration of the Tour de France in Yorkshire, the Fantastical Cycle Parade was a glorious ride through the streets of Todmorden with bicycles, tricycles, scooters, prams and wheelchairs transformed into all manner of strange and wonderful creatures, bugs and beasts. . Produced by Handmade Parade with Tour de Tod; supported by the Yorkshire Festival and Todmorden Town Council. . Photos by Ian Hodgson and Craig Shaw. . Artwork by Alison Duddle, Jonny Quick (flowers) Sue Walpole (fish) and Kerith Ogden (beetle), cycle structure and engineering by Noah Rose, Richard Dawson and Ian Broscomb. . #todmorden #outdoorarts #arts #creativity #throwbackthursday #artscouncilengland #hebdenbridge</span></div></div><span data-dcnode-id="1394" instrument_node="">

</span><div class="eapps-instagram-feed-posts-item-text" data-dcnode-id="1326" eapps-link="text"><span data-dcnode-id="1327" instrument_node="">Although we may be known for creating fabulous parades (and maybe now for Fran's fabulous coffee!), did you know we also take commissions from other organisations to make puppets and other artworks?⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ The tallest puppet we have ever made was commissioned for Bolton Octagon Theatre and their production of 'Gulliver.' ⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ He was built by Kerith, Fran, Govi and Jonny and stood an incredible 8m tall with an inside leg measurement of 4m and size 65 shoes!⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ He has been re-costumed, re-hatted and illuminated to appear as a ringmaster puppet in the Paisley Halloween festival. Who knows what his next re-incarnation may be? Does anyone need an 8m high Elvis..... #outdoorarts ⠀⠀⠀⠀⠀⠀⠀⠀⠀ #hebdenbridge#creativity#calderdale#arts#octagontheatre#puppets</span></div><span data-dcnode-id="1325" instrument_node="">
</span><div class="eapps-instagram-feed-posts-item-text eapps-instagram-feed-posts-item-text-clone" data-dcnode-id="1323" eapps-link="text"><span data-dcnode-id="1324" instrument_node="">Although we may be known for creating fabulous parades (and maybe now for Fran's fabulous coffee!), did you know we also take commissions from other organisations to make puppets and other artworks?⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ The tallest puppet we have ever made was commissioned for Bolton Octagon Theatre and their production of 'Gulliver.' ⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ He was built by Kerith, Fran, Govi and Jonny and stood an incredible 8m tall with an inside leg measurement of 4m and size 65 shoes!⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ He has been re-costumed, re-hatted and illuminated to appear as a ringmaster puppet in the Paisley Halloween festival. Who knows what his next re-incarnation may be? Does anyone need an 8m high Elvis..... #outdoorarts ⠀⠀⠀⠀⠀⠀⠀⠀⠀ #hebdenbridge#creativity#calderdale#arts#octagontheatre#puppets</span></div></div><span data-dcnode-id="1321" instrument_node="">

</span><div class="eapps-instagram-feed-posts-item-text" data-dcnode-id="1264" eapps-link="text"><span data-dcnode-id="1265" instrument_node="">This 'Throwback Thursday' feels particularly special as the masterclass we ran this time last year was led by Andrew Kim, our founder. ⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ Andrew is a hugely skilled mask maker, performer and director, who has created and performed puppet and mask plays, parades and pageants internationally for over 20 years, and created the first Handmade Parade in Hebden Bridge in 2008!⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ Andrew shared his skills in puppet making, sculpting first in clay and then building with layers of papier mache. ⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ #outdoorarts #hebdenbridge #creativity #calderdale⠀⠀⠀⠀⠀⠀⠀⠀⠀ #arts  #throwbackthursday #puppets</span></div><span data-dcnode-id="1263" instrument_node="">

</span><div class="eapps-instagram-feed-posts-item-text" data-dcnode-id="1202" eapps-link="text"><span data-dcnode-id="1203" instrument_node="">What a 'Throwback Thursday' we have for you this week!⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ A year ago we were extremely lucky to be able to spend an amazing three days with the talented and very lovely Jimmy Grimes and Andy Brunskill @brunskillandgrimes⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ We learnt tons and had the most brilliant time. As Associate Director and Puppet Director of 'War Horse' in the West End, they apply lots of anatomical research to their designs, which they then shared with us.⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ The masterclass showed us how to design, make and refine a mechanism to give puppets sensitivity of control. ⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ Who knew making a dog's leg could be so much fun!⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ #outdoorarts #hebdenbridge #creativity #calderdale⠀⠀⠀⠀⠀⠀⠀⠀⠀ #arts #artscouncilengland</span></div><span data-dcnode-id="1201" instrument_node="">

</span><div class="eapps-instagram-feed-posts-item-text" data-dcnode-id="1005" eapps-link="text"><span data-dcnode-id="1006" instrument_node="">Welcome to 'Throw Back Thursday', a chance to have a look at what we were up to this time last year!⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ We kicked off with a series of masterclasses, the first one run by our Artistic Director Kerith on how to create giant, lightweight puppets. ⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ Our talented participants were tasked with making monsters with at least three different engineered moving parts and three different types of decoration from anything they could find in the workshop. ⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ These fabulous puppets were then taken for a walk in the sunshine. Look at this amazing creation! ⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ #outdoorarts #hebdenbridge #creativity #calderdale #arts #artscouncilengland #throwbackthursday</span></div><span data-dcnode-id="1004" instrument_node="">
</span><div class="eapps-instagram-feed-posts-item-text eapps-instagram-feed-posts-item-text-clone" data-dcnode-id="1002" eapps-link="text"><span data-dcnode-id="1003" instrument_node="">Welcome to 'Throw Back Thursday', a chance to have a look at what we were up to this time last year!⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ We kicked off with a series of masterclasses, the first one run by our Artistic Director Kerith on how to create giant, lightweight puppets. ⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ Our talented participants were tasked with making monsters with at least three different engineered moving parts and three different types of decoration from anything they could find in the workshop. ⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ These fabulous puppets were then taken for a walk in the sunshine. Look at this amazing creation! ⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ #outdoorarts #hebdenbridge #creativity #calderdale #arts #artscouncilengland #throwbackthursday</span></div></div><span data-dcnode-id="1000" instrument_node="">

</span><div class="eapps-instagram-feed-posts-item-text" data-dcnode-id="932" eapps-link="text"><span data-dcnode-id="933" instrument_node="">Thank you Frank Garland, what a gorgeous tribute! ⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ It is so uplifting to hear that the work we do with our community is so inspiring to others.⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ Here's what Frank had to say recently:⠀⠀⠀⠀⠀⠀⠀⠀⠀ ⠀⠀⠀⠀⠀⠀⠀⠀⠀ I want to tell you a story. Not one of my silly fairtales, but a real life tale that inspires me. A tale of a community in the North of England surviving a crisis. Perhaps a model of how we will eventually emerge.⠀⠀⠀⠀⠀⠀⠀⠀⠀ Four years ago, the Calder Valley was hit by a devastating flood at Christmas. To go into details is unnecessary, as we have seen every year bring more floods to more communities. I won't dwell on the factors which cause this, as this tale is not strictly about the floods, but about how we face a crisis.⠀⠀⠀⠀⠀⠀⠀⠀⠀ The following pictures tell the story of how the Pennine town of Hebden Bridge faced a crisis which reshaped them. They call this The Handmade Parade.⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ .⠀⠀⠀⠀⠀⠀⠀⠀⠀ #outdoorarts #hebdenbridge #creativity #calderdale⠀⠀⠀⠀⠀⠀⠀⠀⠀ #arts #artscouncilengland</span></div><span data-dcnode-id="931" instrument_node="">

</span><div class="eapps-instagram-feed-posts-item-text" data-dcnode-id="859" eapps-link="text"><span data-dcnode-id="860" instrument_node="">In light of the ever-changing news we’re reviewing our position here at Handmade, and we’ve been thinking hard about our immediate future.  It’s going to be a really tough summer for everyone in our sector, and we’re going to do our very best to support our staff, freelance team and our wider community through this, and talking to our funding partners and clients to secure our income.  Our first priority is to keep everyone safe, and so for the foreseeable future our team will be working from home as much as possible, and we’ve made some decisions regarding our immediate upcoming events - -  Hebden Bridge Handmade Parade, due to go ahead in June, will be postponed.  It’s very much a postponement, not a cancellation, but at this point there are so many unknowns we can’t speculate as to when it will happen- we’ll let everyone know what’s happening when we do. - Our Easter stilting courses will be postponed and any monies will be refunded, we’ll get in touch individually with participants. -The Lamplighter community consultation meeting due to take place on Sunday 29th March has been cancelled. When this is all over, we’re fully intending to be out there on the street with you all, wearing ridiculous hats, and dancing our hearts out, I think we’ll all need it more than ever. Love to everyone, all at HMP xx</span></div><span data-dcnode-id="858" instrument_node="">
</span><div class="eapps-instagram-feed-posts-item-text eapps-instagram-feed-posts-item-text-clone" data-dcnode-id="856" eapps-link="text"><span data-dcnode-id="857" instrument_node="">In light of the ever-changing news we’re reviewing our position here at Handmade, and we’ve been thinking hard about our immediate future.  It’s going to be a really tough summer for everyone in our sector, and we’re going to do our very best to support our staff, freelance team and our wider community through this, and talking to our funding partners and clients to secure our income.  Our first priority is to keep everyone safe, and so for the foreseeable future our team will be working from home as much as possible, and we’ve made some decisions regarding our immediate upcoming events - -  Hebden Bridge Handmade Parade, due to go ahead in June, will be postponed.  It’s very much a postponement, not a cancellation, but at this point there are so many unknowns we can’t speculate as to when it will happen- we’ll let everyone know what’s happening when we do. - Our Easter stilting courses will be postponed and any monies will be refunded, we’ll get in touch individually with participants. -The Lamplighter community consultation meeting due to take place on Sunday 29th March has been cancelled. When this is all over, we’re fully intending to be out there on the street with you all, wearing ridiculous hats, and dancing our hearts out, I think we’ll all need it more than ever. Love to everyone, all at HMP xx</span></div></div><span data-dcnode-id="854" instrument_node="">
