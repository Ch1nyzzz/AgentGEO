</span><span class="author-italic author vcard" data-dcnode-id="1627"><span data-dcnode-id="1630" instrument_node="">by </span><a class="url fn n" data-dcnode-id="1628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.folksy.com/author/folksy-friday-guest-blogger"><span data-dcnode-id="1629" instrument_node="">Guest Blogger</span></a></span><span data-dcnode-id="1626" instrument_node="">

</span><input class="jpibfi" data-dcnode-id="1587" type="hidden"><h2 data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">Why&nbsp;I think buying handmade is so special…</span></h2><span data-dcnode-id="1584" instrument_node="">
</span><h4 data-dcnode-id="1580" dir="ltr"><span data-dcnode-id="1583" instrument_node="">By </span><a data-dcnode-id="1581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bletheringcrafts.blogspot.co.uk/" title="Blethering Crafts"><span data-dcnode-id="1582" instrument_node="">Tash Goswami</span></a></h4><span data-dcnode-id="1579" instrument_node="">
</span><p data-dcnode-id="1577" dir="ltr"><span data-dcnode-id="1578" instrument_node="">I love handmade, I buy handmade, I make handmade and I sell handmade. Yet often when I’m asked why handmade is so special, why each piece costs more than a similar item in the high street shops or why I bother making in the first place, in the face of such hostility I am often stumped as to what to answer. So I decided to do my research, get myself prepared for the next negative comment and be ready to stand up for what I believe in.</span></p><span data-dcnode-id="1576" instrument_node="">
</span><p data-dcnode-id="1573" dir="ltr"><strong data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">So what really is so special about handmade?</span></strong></p><span data-dcnode-id="1572" instrument_node="">
</span><p data-dcnode-id="1570" dir="ltr"><span data-dcnode-id="1571" instrument_node="">Well, firstly it’s a mistake to compare handmade with the large corporations – there really there is no comparison. We don’t sell it in the same way. We don’t buy it in the same way or even receive it in the same way. &nbsp;How do you compare a jar of mass-produced jam with a homemade preserve using locally grown fruit presented in a beautiful recycled jar with a cheerful label? It’s impossible.</span></p><span data-dcnode-id="1569" instrument_node="">
</span><p data-dcnode-id="1567" dir="ltr"><img alt="why buy handmade, handmade is sustainable, shopping with soul, eco shopping " class="alignnone size-full wp-image-35472 lazyloaded" data-dcnode-id="1568" data-jpibfi-caption="" data-jpibfi-post-excerpt="Why choose handmade? When we're shopping for presents, our house or ourselves, why should we consider buying handmade rather than heading to the high street for something mass-produced? What makes handmade special and is it a more sustainable, better option?" data-jpibfi-post-title="Choose handmade – why buying handmade is better" data-jpibfi-post-url="https://blog.folksy.com/2011/07/14/buying-handmade" data-jpibfi-src="http://blog.folksy.com/wp-content/uploads/2011/07/why-handmade-more-sustainable.jpg" data-src="http://blog.folksy.com/wp-content/uploads/2011/07/why-handmade-more-sustainable.jpg" data-srcset="https://blog.folksy.com/wp-content/uploads/2011/07/why-handmade-more-sustainable.jpg 1024w, https://blog.folksy.com/wp-content/uploads/2011/07/why-handmade-more-sustainable-300x150.jpg 300w, https://blog.folksy.com/wp-content/uploads/2011/07/why-handmade-more-sustainable-768x384.jpg 768w, https://blog.folksy.com/wp-content/uploads/2011/07/why-handmade-more-sustainable-500x250.jpg 500w, https://blog.folksy.com/wp-content/uploads/2011/07/why-handmade-more-sustainable-600x300.jpg 600w" height="512" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//blog.folksy.com/wp-content/uploads/2011/07/why-handmade-more-sustainable.jpg&amp;raw" srcset="https://blog.folksy.com/wp-content/uploads/2011/07/why-handmade-more-sustainable.jpg 1024w, https://blog.folksy.com/wp-content/uploads/2011/07/why-handmade-more-sustainable-300x150.jpg 300w, https://blog.folksy.com/wp-content/uploads/2011/07/why-handmade-more-sustainable-768x384.jpg 768w, https://blog.folksy.com/wp-content/uploads/2011/07/why-handmade-more-sustainable-500x250.jpg 500w, https://blog.folksy.com/wp-content/uploads/2011/07/why-handmade-more-sustainable-600x300.jpg 600w" width="1024"></p><span data-dcnode-id="1566" instrument_node="">
</span><h2 data-dcnode-id="1564" dir="ltr"><span data-dcnode-id="1565" instrument_node="">Buying handmade is more sustainable</span></h2><span data-dcnode-id="1563" instrument_node="">
</span><blockquote data-dcnode-id="1558"><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1560" dir="ltr"><span data-dcnode-id="1561" instrument_node="">Mass production means bulk buying and this forces the lowering of prices down the line, mainly in the production of raw materials.</span></p><span data-dcnode-id="1559" instrument_node="">
</span></blockquote><span data-dcnode-id="1557" instrument_node="">
</span><p data-dcnode-id="1555" dir="ltr"><span data-dcnode-id="1556" instrument_node="">I would argue that handmade is more sustainable than mass production. Mass production means bulk buying and this forces the lowering of prices down the line, mainly in the production of raw materials. Lower production costs ensure that the large-scale companies can make more profit while selling, at what first appears to be, a low price – a bargain price.</span></p><span data-dcnode-id="1554" instrument_node="">
</span><p data-dcnode-id="1552" dir="ltr"><span data-dcnode-id="1553" instrument_node="">Dig a bit deeper and what this really means, is that many people worldwide are forced into jobs with little pay and this has a knock-on effect for those countries, in so far as they cannot develop, cannot sustain their environments and any adverse condition, such as a drought, has a far more adverse impact upon them than if they were wealthier.</span></p><span data-dcnode-id="1551" instrument_node="">
</span><p data-dcnode-id="1549" dir="ltr"><span data-dcnode-id="1550" instrument_node="">The wealthier nations, such as our own, then have to subsidise these poorer countries with loans, rescue aid, charitable giving etc. That money comes from you. It’s a false economy; it’s a profit on a page but not profit in reality because if you had paid the real price in the first place there would be no need to pay up in another way.</span></p><span data-dcnode-id="1548" instrument_node="">
</span><p data-dcnode-id="1546" dir="ltr"><span data-dcnode-id="1547" instrument_node="">So when you look at that £1 mug from your local supermarket, it’s not a bargain. It will cost you more in hidden charges than what you initially paid for it.</span></p><span data-dcnode-id="1545" instrument_node="">
</span><p data-dcnode-id="1543" dir="ltr"><img alt="why buy handmade, handmade is better, shopping with soul, buy craft uk" class="alignnone size-full wp-image-35473 lazyloaded" data-dcnode-id="1544" data-jpibfi-caption="" data-jpibfi-post-excerpt="Why choose handmade? When we're shopping for presents, our house or ourselves, why should we consider buying handmade rather than heading to the high street for something mass-produced? What makes handmade special and is it a more sustainable, better option?" data-jpibfi-post-title="Choose handmade – why buying handmade is better" data-jpibfi-post-url="https://blog.folksy.com/2011/07/14/buying-handmade" data-jpibfi-src="http://blog.folksy.com/wp-content/uploads/2011/07/why-buy-handmade-forever.jpg" data-src="http://blog.folksy.com/wp-content/uploads/2011/07/why-buy-handmade-forever.jpg" data-srcset="https://blog.folksy.com/wp-content/uploads/2011/07/why-buy-handmade-forever.jpg 1024w, https://blog.folksy.com/wp-content/uploads/2011/07/why-buy-handmade-forever-300x150.jpg 300w, https://blog.folksy.com/wp-content/uploads/2011/07/why-buy-handmade-forever-768x384.jpg 768w, https://blog.folksy.com/wp-content/uploads/2011/07/why-buy-handmade-forever-500x250.jpg 500w, https://blog.folksy.com/wp-content/uploads/2011/07/why-buy-handmade-forever-600x300.jpg 600w" height="512" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//blog.folksy.com/wp-content/uploads/2011/07/why-buy-handmade-forever.jpg&amp;raw" srcset="https://blog.folksy.com/wp-content/uploads/2011/07/why-buy-handmade-forever.jpg 1024w, https://blog.folksy.com/wp-content/uploads/2011/07/why-buy-handmade-forever-300x150.jpg 300w, https://blog.folksy.com/wp-content/uploads/2011/07/why-buy-handmade-forever-768x384.jpg 768w, https://blog.folksy.com/wp-content/uploads/2011/07/why-buy-handmade-forever-500x250.jpg 500w, https://blog.folksy.com/wp-content/uploads/2011/07/why-buy-handmade-forever-600x300.jpg 600w" width="1024"></p><span data-dcnode-id="1542" instrument_node="">
</span><h2 data-dcnode-id="1540" dir="ltr"><span data-dcnode-id="1541" instrument_node="">Handmade&nbsp;is forever not for just now</span></h2><span data-dcnode-id="1539" instrument_node="">
</span><blockquote data-dcnode-id="1534"><span data-dcnode-id="1538" instrument_node="">
</span><p data-dcnode-id="1536" dir="ltr"><span data-dcnode-id="1537" instrument_node="">Each handmade piece of work is as unique as each person in the world… and there’s no need for an upgrade if it’s already perfect.</span></p><span data-dcnode-id="1535" instrument_node="">
</span></blockquote><span data-dcnode-id="1533" instrument_node="">
</span><p data-dcnode-id="1531" dir="ltr"><span data-dcnode-id="1532" instrument_node="">Mass-produced items are perceived as or actually are, ‘throw away’. A horrible culture of ‘if it’s broken, don’t fix it – just chuck it out’ is now so prevalent that we throw away things that are perfectly fine. We want an upgrade, the latest version, the next best thing… we want to be noticed. However, what we are failing to notice is our rubbish piles are growing higher and higher!</span></p><span data-dcnode-id="1530" instrument_node="">
</span><p data-dcnode-id="1528" dir="ltr"><span data-dcnode-id="1529" instrument_node="">Here is where handmade excels – there’s no need for an upgrade as it is perfect already. There is no need to keep up with the Jones’s as a handmade object is unique. Even if it’s one of a series, each one will be slightly different from the next. It’s the minute imperfections that make it so desirable. Why, I hear you ask?&nbsp;Well, if you own a handmade, unique piece of work then only you in the whole world own it. That’s over 7 billion people who will never get to have it because you have it and if you keep it until 2050, then it will be nearer 10 million people who don’t have it. How’s that for having the edge on everyone else? Each handmade piece of work is as unique as each person in the world.</span></p><span data-dcnode-id="1527" instrument_node="">
</span><p data-dcnode-id="1525" dir="ltr"><img alt="why buy handmade, authentic, eco shopping, " class="alignnone size-full wp-image-35474 lazyloaded" data-dcnode-id="1526" data-jpibfi-caption="" data-jpibfi-post-excerpt="Why choose handmade? When we're shopping for presents, our house or ourselves, why should we consider buying handmade rather than heading to the high street for something mass-produced? What makes handmade special and is it a more sustainable, better option?" data-jpibfi-post-title="Choose handmade – why buying handmade is better" data-jpibfi-post-url="https://blog.folksy.com/2011/07/14/buying-handmade" data-jpibfi-src="http://blog.folksy.com/wp-content/uploads/2011/07/why-buy-handmade-real-thing-authentic.jpg" data-src="http://blog.folksy.com/wp-content/uploads/2011/07/why-buy-handmade-real-thing-authentic.jpg" data-srcset="https://blog.folksy.com/wp-content/uploads/2011/07/why-buy-handmade-real-thing-authentic.jpg 1024w, https://blog.folksy.com/wp-content/uploads/2011/07/why-buy-handmade-real-thing-authentic-300x150.jpg 300w, https://blog.folksy.com/wp-content/uploads/2011/07/why-buy-handmade-real-thing-authentic-768x384.jpg 768w, https://blog.folksy.com/wp-content/uploads/2011/07/why-buy-handmade-real-thing-authentic-500x250.jpg 500w, https://blog.folksy.com/wp-content/uploads/2011/07/why-buy-handmade-real-thing-authentic-600x300.jpg 600w" height="512" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//blog.folksy.com/wp-content/uploads/2011/07/why-buy-handmade-real-thing-authentic.jpg&amp;raw" srcset="https://blog.folksy.com/wp-content/uploads/2011/07/why-buy-handmade-real-thing-authentic.jpg 1024w, https://blog.folksy.com/wp-content/uploads/2011/07/why-buy-handmade-real-thing-authentic-300x150.jpg 300w, https://blog.folksy.com/wp-content/uploads/2011/07/why-buy-handmade-real-thing-authentic-768x384.jpg 768w, https://blog.folksy.com/wp-content/uploads/2011/07/why-buy-handmade-real-thing-authentic-500x250.jpg 500w, https://blog.folksy.com/wp-content/uploads/2011/07/why-buy-handmade-real-thing-authentic-600x300.jpg 600w" width="1024"></p><span data-dcnode-id="1524" instrument_node="">
</span><h2 data-dcnode-id="1522" dir="ltr"><span data-dcnode-id="1523" instrument_node="">Buying handmade is&nbsp;the real thing</span></h2><span data-dcnode-id="1521" instrument_node="">
</span><blockquote data-dcnode-id="1516"><span data-dcnode-id="1520" instrument_node="">
</span><p data-dcnode-id="1518" dir="ltr"><span data-dcnode-id="1519" instrument_node="">High Street shops&nbsp;want their product to replicate the handmade feel, but it’s&nbsp;a fake.</span></p><span data-dcnode-id="1517" instrument_node="">
</span></blockquote><span data-dcnode-id="1515" instrument_node="">
</span><p data-dcnode-id="1513" dir="ltr"><span data-dcnode-id="1514" instrument_node="">Mass production is now turning to small crafters for help. High Street shops&nbsp;want their product to replicate the handmade feel, but it’s&nbsp;a fake. It’s not the real McCoy! However, they also recognise that people don’t want to live in bland, off-the-shelf environments. But rather than give you the real handmade object, they want to sell you a machine-produced copy. The difference can be likened to that between a diamond and a cubic zirconium. Both are good, but I know which one I would cherish a whole lot more.</span></p><span data-dcnode-id="1512" instrument_node="">
</span><p data-dcnode-id="1510" dir="ltr"><img alt="shop handmade, support local makers, small business, why buy handmade" class="alignnone size-full wp-image-35475 lazyloaded" data-dcnode-id="1511" data-jpibfi-caption="" data-jpibfi-post-excerpt="Why choose handmade? When we're shopping for presents, our house or ourselves, why should we consider buying handmade rather than heading to the high street for something mass-produced? What makes handmade special and is it a more sustainable, better option?" data-jpibfi-post-title="Choose handmade – why buying handmade is better" data-jpibfi-post-url="https://blog.folksy.com/2011/07/14/buying-handmade" data-jpibfi-src="http://blog.folksy.com/wp-content/uploads/2011/07/shop-handmade-support-local-makers.jpg" data-src="http://blog.folksy.com/wp-content/uploads/2011/07/shop-handmade-support-local-makers.jpg" data-srcset="https://blog.folksy.com/wp-content/uploads/2011/07/shop-handmade-support-local-makers.jpg 1024w, https://blog.folksy.com/wp-content/uploads/2011/07/shop-handmade-support-local-makers-300x150.jpg 300w, https://blog.folksy.com/wp-content/uploads/2011/07/shop-handmade-support-local-makers-768x384.jpg 768w, https://blog.folksy.com/wp-content/uploads/2011/07/shop-handmade-support-local-makers-500x250.jpg 500w, https://blog.folksy.com/wp-content/uploads/2011/07/shop-handmade-support-local-makers-600x300.jpg 600w" height="512" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//blog.folksy.com/wp-content/uploads/2011/07/shop-handmade-support-local-makers.jpg&amp;raw" srcset="https://blog.folksy.com/wp-content/uploads/2011/07/shop-handmade-support-local-makers.jpg 1024w, https://blog.folksy.com/wp-content/uploads/2011/07/shop-handmade-support-local-makers-300x150.jpg 300w, https://blog.folksy.com/wp-content/uploads/2011/07/shop-handmade-support-local-makers-768x384.jpg 768w, https://blog.folksy.com/wp-content/uploads/2011/07/shop-handmade-support-local-makers-500x250.jpg 500w, https://blog.folksy.com/wp-content/uploads/2011/07/shop-handmade-support-local-makers-600x300.jpg 600w" width="1024"></p><span data-dcnode-id="1509" instrument_node="">
</span><h2 data-dcnode-id="1507" dir="ltr"><span data-dcnode-id="1508" instrument_node="">Buying handmade supports local people</span></h2><span data-dcnode-id="1506" instrument_node="">
</span><blockquote data-dcnode-id="1501"><span data-dcnode-id="1505" instrument_node="">
</span><p data-dcnode-id="1503" dir="ltr"><span data-dcnode-id="1504" instrument_node="">Buy handmade from local people and the revenue stays within the country, taxes are paid, money is generated and the overall impact on our economy is huge.</span></p><span data-dcnode-id="1502" instrument_node="">
</span></blockquote><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1498" dir="ltr"><span data-dcnode-id="1499" instrument_node="">Buying handmade supports local craft industries and people, wherever you buy it. The price you pay for it is exactly what you see – there are no hidden costs. The revenue stays within the country and people are not out of work but working in their business either as individuals or groups. Taxes are paid, money is generated and the overall impact on our economy is huge.</span></p><span data-dcnode-id="1497" instrument_node="">
</span><p data-dcnode-id="1495" dir="ltr"><span data-dcnode-id="1496" instrument_node="">In the UK, the creative industries account for about 7% of the GDP and each artwork (and I include the handmade mug in this) contributes to this. Furthermore, government investment in the arts sees an amazing return of £2 for every £1 invested. Does it make sense to cut this investment? I think not.</span></p><span data-dcnode-id="1494" instrument_node="">
</span><p data-dcnode-id="1492" dir="ltr"><img alt="shop handmade, keep craft skills alive" class="alignnone size-full wp-image-35478 lazyloaded" data-dcnode-id="1493" data-jpibfi-caption="" data-jpibfi-post-excerpt="Why choose handmade? When we're shopping for presents, our house or ourselves, why should we consider buying handmade rather than heading to the high street for something mass-produced? What makes handmade special and is it a more sustainable, better option?" data-jpibfi-post-title="Choose handmade – why buying handmade is better" data-jpibfi-post-url="https://blog.folksy.com/2011/07/14/buying-handmade" data-jpibfi-src="http://blog.folksy.com/wp-content/uploads/2011/07/shop-handmade-keep-craft-skills-alive-2.jpg" data-src="http://blog.folksy.com/wp-content/uploads/2011/07/shop-handmade-keep-craft-skills-alive-2.jpg" data-srcset="https://blog.folksy.com/wp-content/uploads/2011/07/shop-handmade-keep-craft-skills-alive-2.jpg 1024w, https://blog.folksy.com/wp-content/uploads/2011/07/shop-handmade-keep-craft-skills-alive-2-300x150.jpg 300w, https://blog.folksy.com/wp-content/uploads/2011/07/shop-handmade-keep-craft-skills-alive-2-768x384.jpg 768w, https://blog.folksy.com/wp-content/uploads/2011/07/shop-handmade-keep-craft-skills-alive-2-500x250.jpg 500w, https://blog.folksy.com/wp-content/uploads/2011/07/shop-handmade-keep-craft-skills-alive-2-600x300.jpg 600w" height="512" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//blog.folksy.com/wp-content/uploads/2011/07/shop-handmade-keep-craft-skills-alive-2.jpg&amp;raw" srcset="https://blog.folksy.com/wp-content/uploads/2011/07/shop-handmade-keep-craft-skills-alive-2.jpg 1024w, https://blog.folksy.com/wp-content/uploads/2011/07/shop-handmade-keep-craft-skills-alive-2-300x150.jpg 300w, https://blog.folksy.com/wp-content/uploads/2011/07/shop-handmade-keep-craft-skills-alive-2-768x384.jpg 768w, https://blog.folksy.com/wp-content/uploads/2011/07/shop-handmade-keep-craft-skills-alive-2-500x250.jpg 500w, https://blog.folksy.com/wp-content/uploads/2011/07/shop-handmade-keep-craft-skills-alive-2-600x300.jpg 600w" width="1024"></p><span data-dcnode-id="1491" instrument_node="">
</span><h2 data-dcnode-id="1489" dir="ltr"><span data-dcnode-id="1490" instrument_node="">Buying handmade keeps craft skills alive</span></h2><span data-dcnode-id="1488" instrument_node="">
</span><blockquote data-dcnode-id="1483"><span data-dcnode-id="1487" instrument_node="">
</span><p data-dcnode-id="1485" dir="ltr"><span data-dcnode-id="1486" instrument_node="">We are facing&nbsp;lost skills, the demise of handcrafts and a real loss of our cultural identity.&nbsp;Buying handmade ensures traditional craft&nbsp;skills are kept alive and creates a demand for education in these skills.</span></p><span data-dcnode-id="1484" instrument_node="">
</span></blockquote><span data-dcnode-id="1482" instrument_node="">
</span><p data-dcnode-id="1480" dir="ltr"><span data-dcnode-id="1481" instrument_node="">When&nbsp;we buy&nbsp;handmade we are helping to ensure traditional making&nbsp;skills are kept alive and creating&nbsp;a demand for education in these skills. At the moment the powers that be are busy replacing skills-based training in the crafts with less labour-intensive or material-rich courses – more often than not, offering courses conducted on a computer and easily stored on a pen drive. The outcome of this is potentially lost skills, the demise of handcrafts and a real loss of our cultural identity. Students can be herded through the system quickly, without a huge investment and now can be charged a small fortune for it.</span></p><span data-dcnode-id="1479" instrument_node="">
</span><p data-dcnode-id="1477" dir="ltr"><span data-dcnode-id="1478" instrument_node="">But what happens if the machines can no longer be run – for example, when our petrol supplies run out? How will we as a nation reinstate these lost skills? The economy is so fragile because we’ve already lost so many of our skilled industries and we’re now playing catch up again. Would it not be better to maintain and increase a skilled artisan base, rather than scramble around at some future date to rediscover it?</span></p><span data-dcnode-id="1476" instrument_node="">
</span><p data-dcnode-id="1474" dir="ltr"><img alt="why buy handmade" class="alignnone size-full wp-image-35479 lazyloaded" data-dcnode-id="1475" data-jpibfi-caption="" data-jpibfi-post-excerpt="Why choose handmade? When we're shopping for presents, our house or ourselves, why should we consider buying handmade rather than heading to the high street for something mass-produced? What makes handmade special and is it a more sustainable, better option?" data-jpibfi-post-title="Choose handmade – why buying handmade is better" data-jpibfi-post-url="https://blog.folksy.com/2011/07/14/buying-handmade" data-jpibfi-src="http://blog.folksy.com/wp-content/uploads/2011/07/handmade-is-about-people-and-the-magic-of-their-imagination.jpg" data-src="http://blog.folksy.com/wp-content/uploads/2011/07/handmade-is-about-people-and-the-magic-of-their-imagination.jpg" data-srcset="https://blog.folksy.com/wp-content/uploads/2011/07/handmade-is-about-people-and-the-magic-of-their-imagination.jpg 1024w, https://blog.folksy.com/wp-content/uploads/2011/07/handmade-is-about-people-and-the-magic-of-their-imagination-300x150.jpg 300w, https://blog.folksy.com/wp-content/uploads/2011/07/handmade-is-about-people-and-the-magic-of-their-imagination-768x384.jpg 768w, https://blog.folksy.com/wp-content/uploads/2011/07/handmade-is-about-people-and-the-magic-of-their-imagination-500x250.jpg 500w, https://blog.folksy.com/wp-content/uploads/2011/07/handmade-is-about-people-and-the-magic-of-their-imagination-600x300.jpg 600w" height="512" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//blog.folksy.com/wp-content/uploads/2011/07/handmade-is-about-people-and-the-magic-of-their-imagination.jpg&amp;raw" srcset="https://blog.folksy.com/wp-content/uploads/2011/07/handmade-is-about-people-and-the-magic-of-their-imagination.jpg 1024w, https://blog.folksy.com/wp-content/uploads/2011/07/handmade-is-about-people-and-the-magic-of-their-imagination-300x150.jpg 300w, https://blog.folksy.com/wp-content/uploads/2011/07/handmade-is-about-people-and-the-magic-of-their-imagination-768x384.jpg 768w, https://blog.folksy.com/wp-content/uploads/2011/07/handmade-is-about-people-and-the-magic-of-their-imagination-500x250.jpg 500w, https://blog.folksy.com/wp-content/uploads/2011/07/handmade-is-about-people-and-the-magic-of-their-imagination-600x300.jpg 600w" width="1024"></p><span data-dcnode-id="1473" instrument_node="">
</span><h2 data-dcnode-id="1471" dir="ltr"><span data-dcnode-id="1472" instrument_node="">Buying handmade celebrates who we are</span></h2><span data-dcnode-id="1470" instrument_node="">
</span><blockquote data-dcnode-id="1465"><span data-dcnode-id="1469" instrument_node="">
</span><p data-dcnode-id="1467" dir="ltr"><span data-dcnode-id="1468" instrument_node="">Each handmade item is about people, not machines. It’s about the skill of each maker and the magic of their&nbsp;imagination.</span></p><span data-dcnode-id="1466" instrument_node="">
</span></blockquote><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1462" dir="ltr"><span data-dcnode-id="1463" instrument_node="">Handmade is a celebration of our contemporary lives and our living culture – not a&nbsp;mass-imposed, one-size-fits-all consumer culture where everything looks the same and is easily boxed up. Each handmade item is about people and not machines. It’s about the time and effort that goes into each piece of work. It’s about the skill of each maker, the technical ingenuity of the maker, the magic of an individual’s imagination, and it’s a treasure on a beach of throwaway machine-made tat!</span></p><span data-dcnode-id="1461" instrument_node="">
</span><p data-dcnode-id="1459" dir="ltr"><span data-dcnode-id="1460" instrument_node="">Call me biased. Say I am a ranting maker on my handmade soap box! But don’t deny the facts – buying handmade is far better than some people&nbsp;have ever given it credit for!</span></p><span data-dcnode-id="1458" instrument_node="">
</span><hr data-dcnode-id="1457"><span data-dcnode-id="1456" instrument_node="">
</span><p data-dcnode-id="1448" dir="ltr"><span data-dcnode-id="1450" style="color: #888888;"><em data-dcnode-id="1451"><span data-dcnode-id="1455" instrument_node="">This post was kindly written for Folksy by </span><a data-dcnode-id="1453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bletheringcrafts.blogspot.co.uk/"><span data-dcnode-id="1454" instrument_node="">Tash Goswami of Blethering Crafts</span></a><span data-dcnode-id="1452" instrument_node="">. Blethering Crafts has regular interviews with interesting artists and makers from all over the world</span></em></span><span data-dcnode-id="1449" instrument_node="">.</span></p><span data-dcnode-id="1447" instrument_node="">
</span><p data-dcnode-id="1445" dir="ltr"><span data-dcnode-id="1446" instrument_node="">Do you agree with all of Tash’s points – we’d love to hear about why buying handmade is important from you, so please add a comment! Thank you :)</span></p><span data-dcnode-id="1444" instrument_node="">

</span><div class="comment-text" data-dcnode-id="963"><span data-dcnode-id="982" instrument_node="">
</span><span class="author" data-dcnode-id="979" itemprop="creator" itemtype="https://schema.org/Person"><span data-dcnode-id="980" itemprop="name"><span data-dcnode-id="981" instrument_node="">Arlene McGinness</span></span></span><span data-dcnode-id="978" instrument_node="">
</span><span class="date" data-dcnode-id="975" datetime="2011-07-14T06:56:48+01:00" itemprop="commentTime" title="Thursday, July 14, 2011, 6:56 am"><i class="penci-faicon fa fa-clock-o" data-dcnode-id="977"></i><span data-dcnode-id="976" instrument_node="">July 14, 2011 - 6:56 am</span></span><span data-dcnode-id="974" instrument_node="">
</span><div class="comment-content" data-dcnode-id="968" itemprop="commentText"><p data-dcnode-id="970"><span data-dcnode-id="973" instrument_node="">This is a great article and I couldn’t agree more with it.  The uniqueness and ‘flaws’ of handmade things are so special.  I wish more people, particularly those who feel they have no talent in art or crafts, would realise that it’s the process and thought behind it that matters, not so much the end process.  So many people don’t make things because they think they have to look perfect in order to be ‘good enough’, but if it looks perfect then it doesn’t look handmade.</span><br data-dcnode-id="972"><span data-dcnode-id="971" instrument_node="">
The first thing my partner ever gave me was a handmade card.  He hadn’t made cards before but knew I liked handmade things.  He bought supplies and spent ages putting together a card with various things I like in it, even including an origami swan.  It’s one of my most prized possessions now.</span></p><span data-dcnode-id="969" instrument_node="">
</span></div><span data-dcnode-id="967" instrument_node="">

</span><div class="comment-content" data-dcnode-id="932" itemprop="commentText"><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Thank you, Tash, for a timely and well-argued piece. I very much see one of our duties as handmade artists and makers to educate the public in the advantages of buying handmade and local – we can do that by articles like this, by running local workshops to show people what’s involved, and by being more visible with craft events, etc. There’s been no better time to raise the handmade flag (or bunting?!) because of the economic times – I’ve noticed that people are more willing to buy something unique and personal, rather than generic and cheap – something which lasts and is more meaningful. So it’s just a case of getting the message out there, and we can all do our bit on that score!</span></p><span data-dcnode-id="933" instrument_node="">

</span><div class="comment-content" data-dcnode-id="897" itemprop="commentText"><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">What an intersteing read, and so true. I make, buy and love handmade. When recieving a gift I would rather it was handmade. More time and thought has gone into a handmade item than something bought off the shelf. I feel that mass produced has the advantage of being able to  reach far more people than one artist can alone. It is important for artists to work together to compete with the mass producers and then this way our voice will be heard as loud as theirs. It is also paramount for artists to pass on their skills to the younger generations so that the skills are not lost or their understanding of what is involved in creating one-off artwork. The internets ability to bring artists together is the way forward to compete with the mass producers.</span></p><span data-dcnode-id="898" instrument_node="">

</span><span class="author" data-dcnode-id="870" itemprop="creator" itemtype="https://schema.org/Person"><span data-dcnode-id="871" itemprop="name"><a class="url" data-dcnode-id="872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.threebedsemi.blogspot.com/" rel="external nofollow ugc"><span data-dcnode-id="873" instrument_node="">Steff</span></a></span></span><span data-dcnode-id="869" instrument_node="">
</span><span class="date" data-dcnode-id="866" datetime="2011-07-14T11:25:36+01:00" itemprop="commentTime" title="Thursday, July 14, 2011, 11:25 am"><i class="penci-faicon fa fa-clock-o" data-dcnode-id="868"></i><span data-dcnode-id="867" instrument_node="">July 14, 2011 - 11:25 am</span></span><span data-dcnode-id="865" instrument_node="">
</span><div class="comment-content" data-dcnode-id="855" itemprop="commentText"><p data-dcnode-id="857"><span data-dcnode-id="864" instrument_node="">A rant from your soap box it is- and what a well- researched and altogether very true one!</span><br data-dcnode-id="863"><span data-dcnode-id="862" instrument_node="">
Our throwaway culture gets me ranting, too. The economy is going downhill, people are losing their jobs and homes and the future is looking bleak- yet big companies still see fit to tell us that everything will look a lot brighter if we wear this pair of shoes, that lipstick and those bracelets to drive around town in car A with a little stop at fast food palace B… sorry, but I’m out of it. What I buy for myself is either second hand or handmade, and what I give as gifts is ALWAYS handmade (by me or others). Only stuff that is genuinely broken gets thrown (like that poor old kettle this week- it pained me, but it had lasted for years and years, what can you do…) and the only fancy gadget other than our laptops and my “came to me by miracle” camera is a PS2 we found in the charity shop. The less you have, the less stands around being ignored, right?</span><br data-dcnode-id="861"><span data-dcnode-id="860" instrument_node="">
We are not on a huge income, but I am most happy to shell out £20 for a handmade little gift, whereas it wouldn’t occur to me to spend £20 on any, say, new item of clothing. Value for money is what I want, and handmade value is a lot more than just monetary. A little conversation with the seller, a thank- you note in the lovingly wrapped parcel, maybe even a connection via facebook, all those are things you are not very likely to get from Sony, Pandora, Hallmark or Pottery Barn.</span><br data-dcnode-id="859"><span data-dcnode-id="858" instrument_node="">
And if you will excuse me now, I have a little folksy gift shopping to do – there are a few birthdays coming up and all I have so far is a card (handmade with a driftwood beach hut and bunting, take THAT, Hallmark!).</span></p><span data-dcnode-id="856" instrument_node="">

</span><div class="comment-content" data-dcnode-id="712" itemprop="commentText"><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">I am so much in agreement with everything you have said. I said something very similar on the forum this week. Homemade things are wonderful because so much love and care goes into them and, when done well, are so beautifully made. When I think about it, all of my special things that I want to treasure forever are all made by craftspeople. Mass produced, cheap and throwaway items mean nothing to anyone and just make life hard for the poor people who produce them, who earn a pittance of a wage, and make life meaningless to those who are surrouded by them. Go and stand in the middle of one of those cheaper than cheap wearhouses surrounded by nasty plastic things and you’ll soon feel depressed. Handmade is the way to go to help everyone’s ecconomy and quality of life. I’m completely with you on all of this.  Martine</span></p><span data-dcnode-id="713" instrument_node="">

</span><span class="date" data-dcnode-id="608" datetime="2011-07-17T08:17:28+01:00" itemprop="commentTime" title="Sunday, July 17, 2011, 8:17 am"><i class="penci-faicon fa fa-clock-o" data-dcnode-id="610"></i><span data-dcnode-id="609" instrument_node="">July 17, 2011 - 8:17 am</span></span><span data-dcnode-id="607" instrument_node="">
</span><div class="comment-content" data-dcnode-id="603" itemprop="commentText"><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Brilliant Tash. So refreshing to read a serious, political article within a craft arena. We get carried away so much with the beauty, cuteness, even genius of handmade products that we often forget the bigger picture, that a handmade life can positively contribute to society in many ways. But you’re preaching to the converted here and though I applaud you for it, I can’t help feeling depressed that in this country, the majority, the people buying clothes at ‘primarni’, art from IKEA, cards from Hallmark or feeding their families at McDonalds, are the same people who bought the News of the World and who are still buying The Sun or The Daily Mail. More interested in celebrity culture and sleazy gossip than real issues at home and around the world. Unless there is a huge social/cultural shift, I’m afraid the people with money and power will just carry on feeding the public ‘what we want’ – mass produced crap. It is up to all of us to get on our soap boxes and get the word out.</span></p><span data-dcnode-id="604" instrument_node="">
</span></div><span data-dcnode-id="602" instrument_node="">

</span><div class="comment-content" data-dcnode-id="560" itemprop="commentText"><p data-dcnode-id="562"><span data-dcnode-id="571" instrument_node="">Wow what a fabulous article – I couldn’t agree more.  You need to get into politics girl!!  no maybe not….</span><br data-dcnode-id="570"><span data-dcnode-id="569" instrument_node="">
I’ve seen for many years that people (in this country) are unwilling to pay for skilled labour and craftsmanship.  My father battled most of his working life as a carpenter and joiner making bespoke joinery (window frames, staircases etc) and clients would come to him for his expertise but rarely be willing to pay a fair price for it – knowing that door frames are readily available in the ‘big sheds’ at a fraction of the price.  People rarely want to see the big picture though.</span><br data-dcnode-id="568"><span data-dcnode-id="567" instrument_node="">
We live in a Primark culture and we need to stand up against it.</span><br data-dcnode-id="566"><span data-dcnode-id="565" instrument_node="">
Fair Trade gets my support every time.</span><br data-dcnode-id="564"><span data-dcnode-id="563" instrument_node="">
Great blog.</span></p><span data-dcnode-id="561" instrument_node="">

</span><div class="comment-content" data-dcnode-id="505" itemprop="commentText"><p data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">You know what, it really is difficult to keep on plodding along making handmade items. It’s difficult because we feel we should compete, we feel we should look polished and finished and perfect. </span></p><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="519"><span data-dcnode-id="524" instrument_node="">But perfect= imperfections.</span><br data-dcnode-id="523"><span data-dcnode-id="522" instrument_node="">
A tatty looking potato covered in mud that’s just been dug up from your back garden, or a symetrical, clean potato, bagged up in plastic, imported in from goodness-knows-where and available in the supermarket?</span><br data-dcnode-id="521"><span data-dcnode-id="520" instrument_node="">
I know which one i’d choose. </span></p><span data-dcnode-id="518" instrument_node="">
</span><p data-dcnode-id="514"><span data-dcnode-id="517" instrument_node="">Thankyou for writing this article- i’m going to re-post it on my facebook site, as i think it needs to be shared… it’s so easy to feel down and upset that you’re not running 15 stores and employing 100s of people yet, when your products are better quality and more lovingly made than those big stores… but that’s the beauty of it- it’s made by you, it’s wrapped up and sent by you, and I guarantee the person opening it feels happy and special just from receiving it. Nothing beats a Folksy package in the post :)</span><br data-dcnode-id="516"><span data-dcnode-id="515" instrument_node="">
keep plodding on people! Because happiness is handmade…</span></p><span data-dcnode-id="513" instrument_node="">
