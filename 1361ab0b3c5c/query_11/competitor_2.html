</span><svg class="social-icon__icon themed--color" data-dcnode-id="822" viewBox="0 0 100 100"><path d="M81.596 93.723V78.792s-8.077 4.041-14.134 4.041c-10.097 0-12.116-4.041-12.116-14.146v-24.25h22.212V26.25H55.346V2H41.212C39.192 20.187 31.115 26.25 19 30.292v14.145h14.135V74.75c0 16.167 8.077 24.25 26.25 24.25 14.134 0 22.211-5.277 22.211-5.277z" data-dcnode-id="823" fill="currentColor" fill-rule="nonzero"></path></svg><span data-dcnode-id="821" instrument_node="">

</span><p class="article__leadparagraph" data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">
      Appalled by what he saw as the crude ugliness of contemporary machine-age goods, William Morris looked backwards into history for alternatives. He focused on producing what he saw as more 'honest' work, often making objects that relied on the revival of craft-based styles and techniques from the past.

    </span></p><span data-dcnode-id="808" instrument_node="">
</span><div class="st__content-block st__content-block--quote" data-dcnode-id="790"><span data-dcnode-id="807" instrument_node="">
</span><div class="quote" data-dcnode-id="792"><span data-dcnode-id="806" instrument_node="">
</span><blockquote class="quote__content" data-dcnode-id="800"><span data-dcnode-id="805" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="802"><i data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Apart from the desire to produce beautiful things, the leading passion of my life has been and is hatred of modern civilisation.</span></i></p><span data-dcnode-id="801" instrument_node="">
</span></blockquote><span data-dcnode-id="799" instrument_node="">
</span><div class="quote__cite" data-dcnode-id="794"><span data-dcnode-id="798" instrument_node="">
</span><cite class="quote__cite-text" data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">William Morris</span></cite><span data-dcnode-id="795" instrument_node="">
</span></div><span data-dcnode-id="793" instrument_node="">
</span></div><span data-dcnode-id="791" instrument_node="">
</span></div><span data-dcnode-id="789" instrument_node="">
</span><div class="sir-trevor-text" data-dcnode-id="784"><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">William Morris nurtured a romantic enthusiasm for historical design from childhood. This was fully ignited while he was at Oxford, when a tour of the Gothic cathedrals of northern France led him to realise that he wanted a 'life of art' not a career in the Church. Morris was enthusiastic not only about the 'crispness and abundance of detail' of medieval art but also the collaborative, craft-based system that produced it. A passionate critic of, as he saw it, the ugliness of contemporary life, he was inspired throughout his career by the ideal of trying to make more beautiful and more 'honest' products with the help of like-minded associates.</span></p><span data-dcnode-id="785" instrument_node="">
</span></div><span data-dcnode-id="783" instrument_node="">
</span><div class="sir-trevor-text" data-dcnode-id="778"><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">To a large extent, Morris was a product of his times. The Gothic Revival had made medieval style fashionable in Victorian high society, and Morris would no doubt have seen and been influenced by the cultural promotion of this particular period. What made Morris unusual, however, were his exacting standards and his passionate commitment to research. He spent many hours studying objects in both his own and museum collections, looking for stylistic ideas or an understanding of how to recreate particular effects that he admired. The following items from our collections demonstrate just some of the ways in which Morris (and his collaborators) found inspiration in the design of previous eras.</span></p><span data-dcnode-id="779" instrument_node="">
</span></div><span data-dcnode-id="777" instrument_node="">
</span><div class="sir-trevor-text" data-dcnode-id="771"><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="773"><b data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Stained Glass</span></b></p><span data-dcnode-id="772" instrument_node="">
</span></div><span data-dcnode-id="770" instrument_node="">
</span><div class="sir-trevor-text" data-dcnode-id="765"><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Some of the first commissions won by Morris, Marshall, Faulkner &amp; Co., were for church clients, and the firm went on to create interiors schemes – including stained-glass windows – for a number of Britain's new ecclesiastical buildings. The popularity of this work led the firm to produce a repertoire of glass adapted for the domestic sphere. These stained-glass designs demonstrate Morris and his collaborators' romantic enthusiasm for the past, and their particular interest in the narrative themes and style of medieval stained glass. Although their designs were reserved only for the richest clients, the influence of these pieces was significant, making Morris's firm instrumental in the reintroduction of stained glass into domestic design. </span></p><span data-dcnode-id="766" instrument_node="">
</span></div><span data-dcnode-id="764" instrument_node="">
</span><figure class="sir-trevor-image sir-trevor-image--showcase" data-dcnode-id="757"><span data-dcnode-id="763" instrument_node="">
</span><img alt="" class="sir-trevor-image__source" data-dcnode-id="762" sizes="(min-width: 1250px) 1130px, (min-width: 800px) calc(100vw - 144px), 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanda-production-assets.s3.amazonaws.com/2017/11/08/12/52/30/729ee19f-e8ac-420d-9c9a-c7275bb00bfa/Stained-glass.jpg&amp;raw" srcset="https://vanda-production-assets.s3.amazonaws.com/2017/11/08/12/52/30/729ee19f-e8ac-420d-9c9a-c7275bb00bfa/Stained-glass.jpg 320w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/12/52/30/f6c01e9e-b0b7-498b-ae7c-4e1ed3f1ef12/Stained-glass.jpg 640w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/12/52/30/1a76a0e5-c043-4036-b98b-f4ad30cc4d8f/Stained-glass.jpg 960w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/12/52/31/f6397d57-483f-40dd-8a88-5ad76ec521e2/Stained-glass.jpg 1280w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/12/52/31/7c918718-0e48-4909-801f-36afdd7b0251/Stained-glass.jpg 1920w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/12/52/31/fd2d7ad6-8f31-45b2-93e1-c715c3c2184e/Stained-glass.jpg 2560w"><span data-dcnode-id="761" instrument_node="">
</span><figcaption class="sir-trevor-image__caption" data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">
        Stained glass panels, designed by William Morris, made by Morris &amp; Co., 1872 – 1874, England. Museum no. C.677-1923. © Victoria and Albert Museum, London
      </span></figcaption><span data-dcnode-id="758" instrument_node="">
</span></figure><span data-dcnode-id="756" instrument_node="">
</span><div class="sir-trevor-text" data-dcnode-id="751"><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">As a young man Morris showed real enthusiasm for stained glass and later created window schemes for Morris, Marshall, Faulkner &amp; Co., but the firm relied mainly on the figurative talents of Edward Burne-Jones. Morris did however offer a detailed understanding of process, overseeing the recreation of the simple spirit of medieval originals without falling into pastiche. As Burne-Jones explained, 'All his life (Morris) hated the copying of ancient work as unfair to the old and stupid for the new.'</span></p><span data-dcnode-id="752" instrument_node="">
</span></div><span data-dcnode-id="750" instrument_node="">
</span><figure class="sir-trevor-image sir-trevor-image--inline" data-dcnode-id="743"><span data-dcnode-id="749" instrument_node="">
</span><img alt="" class="sir-trevor-image__source" data-dcnode-id="748" sizes="(min-width: 689px) 689px, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanda-production-assets.s3.amazonaws.com/2017/11/08/12/56/30/d43c4bbd-ac55-4688-bcc5-8d0a5e133c2c/2006AT6995_2500.jpg&amp;raw" srcset="https://vanda-production-assets.s3.amazonaws.com/2017/11/08/12/56/30/d43c4bbd-ac55-4688-bcc5-8d0a5e133c2c/2006AT6995_2500.jpg 320w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/12/56/30/e753c21f-6d15-488e-9bf1-77f29001200a/2006AT6995_2500.jpg 640w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/12/56/30/3c771bdf-9694-402c-935e-cebfc4df5287/2006AT6995_2500.jpg 960w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/12/56/30/5a4a4a12-a041-4526-9fff-16221b4c7707/2006AT6995_2500.jpg 1280w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/12/56/31/41cfb36e-7a9c-4e53-bed0-87065fa9f2ed/2006AT6995_2500.jpg 1920w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/12/56/31/241e6feb-1dc1-4973-bfd5-965c4e940e69/2006AT6995_2500.jpg 2560w"><span data-dcnode-id="747" instrument_node="">
</span><figcaption class="sir-trevor-image__caption" data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">
        Baptism of Christ, panel, designed by Edward Burne-Jones, made by Morris, Marshall, Faulkner &amp; Co., about 1862, England. Museum no. C.440-1940. © Victoria and Albert Museum, London
      </span></figcaption><span data-dcnode-id="744" instrument_node="">
</span></figure><span data-dcnode-id="742" instrument_node="">
</span><div class="sir-trevor-text" data-dcnode-id="736"><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="738"><b data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Tiles</span></b></p><span data-dcnode-id="737" instrument_node="">
</span></div><span data-dcnode-id="735" instrument_node="">
</span><div class="sir-trevor-text" data-dcnode-id="730"><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Soon after 1862 Morris wrote to prospective clients and mentioned his firm's 'revival of the art of painting on china tiles'. By this date the collections in the South Kensington Museum (later the V&amp;A) were already rich in historical Italian ceramics, and as frequent visitors there, Morris and his collaborator Philip Webb would probably have been well aware of the technique. Patterns for Dutch Delftware – a type of tin-gazed earthenware first developed in the 17th century – were another influential tradition. These hand-painted decorations feature simple scenes and patterns, often flowers, reduced to stylised elements, and are often painted in a distinctive vibrant blue on a white background. </span></p><span data-dcnode-id="731" instrument_node="">
</span></div><span data-dcnode-id="729" instrument_node="">
</span><figure class="sir-trevor-image sir-trevor-image--inline" data-dcnode-id="722"><span data-dcnode-id="728" instrument_node="">
</span><img alt="" class="sir-trevor-image__source" data-dcnode-id="727" sizes="(min-width: 689px) 689px, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanda-production-assets.s3.amazonaws.com/2017/11/08/13/10/07/2d2a2806-cb77-4fac-9e67-0dad1d1f273e/2006AT7331_2500.jpg&amp;raw" srcset="https://vanda-production-assets.s3.amazonaws.com/2017/11/08/13/10/07/2d2a2806-cb77-4fac-9e67-0dad1d1f273e/2006AT7331_2500.jpg 320w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/13/10/07/fa4782a8-aa3b-4980-a4c6-4e34b994bbdf/2006AT7331_2500.jpg 640w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/13/10/07/74df5a63-3ce9-43c4-9482-35d23d4b6f00/2006AT7331_2500.jpg 960w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/13/10/07/b7ee3492-2f0c-42cc-bf96-752937de22bc/2006AT7331_2500.jpg 1280w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/13/10/07/4108bb69-cb79-43ca-b8a9-76306235c828/2006AT7331_2500.jpg 1920w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/13/10/08/1f5e01b1-0a2d-4e0c-9bb5-9bae85612de7/2006AT7331_2500.jpg 2560w"><span data-dcnode-id="726" instrument_node="">
</span><figcaption class="sir-trevor-image__caption" data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">
        Tile, designed by William Morris, decorated by Morris, Marshall, Faulkner &amp; Co., 1862, England. Museum no. C.58-1931. © Victoria and Albert Museum, London
      </span></figcaption><span data-dcnode-id="723" instrument_node="">
</span></figure><span data-dcnode-id="721" instrument_node="">
</span><div class="sir-trevor-text" data-dcnode-id="716"><span data-dcnode-id="720" instrument_node="">
</span><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Tiles were the least expensive of Morris's firm's products and were used to decorate fireplaces, furniture and walls. Designs were painted onto plain blanks produced by other firms and then fired in a stained-glass kiln. Work such as Morris's 'Primrose' and 'Daisy' tiles both show his early preoccupation with repeat patterns of small clumps of flowers, and the visual influence of medieval herbals (manuscripts illustrating botanical specimens). There is also a particular historical influence notable in the firm's tile panels, in which paintings of figures sit on a flat-pattern background, as they do in many medieval manuscripts. Morris often designed these backgrounds, as in a panel from 1862–65 depicting Sleeping Beauty sitting on a background of swans.</span></p><span data-dcnode-id="717" instrument_node="">
</span></div><span data-dcnode-id="715" instrument_node="">
</span><figure class="sir-trevor-image sir-trevor-image--showcase" data-dcnode-id="708"><span data-dcnode-id="714" instrument_node="">
</span><img alt="" class="sir-trevor-image__source" data-dcnode-id="713" sizes="(min-width: 1250px) 1130px, (min-width: 800px) calc(100vw - 144px), 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanda-production-assets.s3.amazonaws.com/2017/11/08/13/07/01/245c98c6-5496-4314-b19e-769483bb120c/2006AV6616_sleeping-beauty.jpg&amp;raw" srcset="https://vanda-production-assets.s3.amazonaws.com/2017/11/08/13/07/01/245c98c6-5496-4314-b19e-769483bb120c/2006AV6616_sleeping-beauty.jpg 320w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/13/07/01/4bf46858-391a-4604-9ade-afbd1f139b02/2006AV6616_sleeping-beauty.jpg 640w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/13/07/01/fdc9f23c-8419-46ff-a56f-bfc25107dcef/2006AV6616_sleeping-beauty.jpg 960w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/13/07/01/d9fab155-1907-485a-9b09-73eba6f6ef1f/2006AV6616_sleeping-beauty.jpg 1280w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/13/07/01/2abd34ce-cd69-4df2-8701-8703318c4177/2006AV6616_sleeping-beauty.jpg 1920w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/13/07/01/c67c4eba-3289-443e-99df-610a7fa5f7b1/2006AV6616_sleeping-beauty.jpg 2560w"><span data-dcnode-id="712" instrument_node="">
</span><figcaption class="sir-trevor-image__caption" data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">
        Tile panel, designed by Edward Burne-Jones and William Morris, painted by Lucy Faulkner, made by Morris, Marshall, Faulkner &amp; Co., 1862 – 1865, England. Museum no. CIRC.520-1953. © Victoria and Albert Museum, London
      </span></figcaption><span data-dcnode-id="709" instrument_node="">
</span></figure><span data-dcnode-id="707" instrument_node="">
</span><div class="sir-trevor-text" data-dcnode-id="701"><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="703"><b data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Pattern</span></b></p><span data-dcnode-id="702" instrument_node="">
</span></div><span data-dcnode-id="700" instrument_node="">
</span><div class="sir-trevor-text" data-dcnode-id="683"><span data-dcnode-id="699" instrument_node="">
</span><p data-dcnode-id="685"><span data-dcnode-id="698" instrument_node="">The main source of the patterns for Morris's famous wallpapers was the plants he had observed since childhood. But he also took inspiration from the images of plants he found in illuminated manuscripts, tapestries, woodcuts and historical books (he owned copies of several 16th- and 17th-century herbals, including John Gerarde's famous </span><i data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">The</span></i><span data-dcnode-id="695" instrument_node=""> </span><i data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Herball</span></i><span data-dcnode-id="692" instrument_node=""> </span><i data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">or Generall Historie of Plantes</span></i><span data-dcnode-id="689" instrument_node=""> (1597)). Morris's 'Daisy' design, the first wallpaper issued by Morris, Faulkner, Marshall &amp; Co., in 1864, was a very simple flat motif printed on a neutral ground suggestive of grass. The source of this central flower image can be seen in a wall hanging illustrated in a 15th-century illuminated version of Froissart's </span><i data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Chronicles</span></i><span data-dcnode-id="686" instrument_node=""> (a prose narrative about the Hundred Years War) that is held at the British Museum. </span></p><span data-dcnode-id="684" instrument_node="">
</span></div><span data-dcnode-id="682" instrument_node="">
</span><figure class="sir-trevor-image sir-trevor-image--inline" data-dcnode-id="675"><span data-dcnode-id="681" instrument_node="">
</span><img alt="" class="sir-trevor-image__source" data-dcnode-id="680" sizes="(min-width: 689px) 689px, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanda-production-assets.s3.amazonaws.com/2017/11/08/14/42/07/658ad71c-a611-4668-a039-5f0068aae24e/2006AT7306_2500.jpg&amp;raw" srcset="https://vanda-production-assets.s3.amazonaws.com/2017/11/08/14/42/07/658ad71c-a611-4668-a039-5f0068aae24e/2006AT7306_2500.jpg 320w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/14/42/08/47718d02-dbd8-44b1-ba6d-d58991601935/2006AT7306_2500.jpg 640w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/14/42/08/043cdb76-2b78-411a-8a07-83c63f2335e8/2006AT7306_2500.jpg 960w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/14/42/08/7e45442a-e0cc-4fc5-8a49-41e8dc264d59/2006AT7306_2500.jpg 1280w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/14/42/08/ebfa59a8-f561-451e-8df6-9dc8d1fa0ea2/2006AT7306_2500.jpg 1920w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/14/42/08/132705a0-949a-4514-945a-1f692d885a0a/2006AT7306_2500.jpg 2560w"><span data-dcnode-id="679" instrument_node="">
</span><figcaption class="sir-trevor-image__caption" data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">
        'Wandle', furnishing fabric, William Morris, 1884, England. Museum no. T.425-1934. © Victoria and Albert Museum, London
      </span></figcaption><span data-dcnode-id="676" instrument_node="">
</span></figure><span data-dcnode-id="674" instrument_node="">
</span><div class="sir-trevor-text" data-dcnode-id="669"><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Direct historical references can also be traced in examples from Morris's later pattern design. For example, in the striking textile design 'Wandle' of 1884 – Morris's most ambitious repeat in terms of scale – the striped 'barber's pole' motif has definite medieval origins. The main source of inspiration here was a 16th-century Italian brocaded velvet acquired by the South Kensington Museum (later the V&amp;A) in 1883 (a year when Morris was helping the museum select pieces to purchase). Clearly using the winding vine and rhythmic pattern as a foundation for 'Wandle', Morris substituted large stylised chrysanthemum heads for the crowns used in the original pattern.</span></p><span data-dcnode-id="670" instrument_node="">
</span></div><span data-dcnode-id="668" instrument_node="">
</span><figure class="sir-trevor-image sir-trevor-image--inline" data-dcnode-id="661"><span data-dcnode-id="667" instrument_node="">
</span><img alt="" class="sir-trevor-image__source" data-dcnode-id="666" sizes="(min-width: 689px) 689px, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanda-production-assets.s3.amazonaws.com/2017/11/08/14/48/42/dbf791cf-71c2-4086-b4fb-c47856f37379/2006AT7284_2500.jpg&amp;raw" srcset="https://vanda-production-assets.s3.amazonaws.com/2017/11/08/14/48/42/dbf791cf-71c2-4086-b4fb-c47856f37379/2006AT7284_2500.jpg 320w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/14/48/42/ec6bc01c-7fa5-4b75-bc77-c8e96aaaf1d3/2006AT7284_2500.jpg 640w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/14/48/42/04746919-76b4-4ada-a137-cfdf127a2f29/2006AT7284_2500.jpg 960w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/14/48/42/f950817f-3c12-4f23-b659-b9cc65fd1764/2006AT7284_2500.jpg 1280w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/14/48/43/b776678c-2d39-4ac5-998f-3ab9208cd7d3/2006AT7284_2500.jpg 1920w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/14/48/43/08b5b3b3-4cc5-4e34-bcf5-20c94de71111/2006AT7284_2500.jpg 2560w"><span data-dcnode-id="665" instrument_node="">
</span><figcaption class="sir-trevor-image__caption" data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">
        Furnishing fabric, 1500 – 1600, Italy. Museum no. 442A-1883. © Victoria and Albert Museum, London
      </span></figcaption><span data-dcnode-id="662" instrument_node="">
</span></figure><span data-dcnode-id="660" instrument_node="">
</span><div class="sir-trevor-text" data-dcnode-id="654"><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="656"><b data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Furniture</span></b></p><span data-dcnode-id="655" instrument_node="">
</span></div><span data-dcnode-id="653" instrument_node="">
</span><div class="sir-trevor-text" data-dcnode-id="648"><span data-dcnode-id="652" instrument_node="">
</span><p data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Morris's brief apprenticeship in the offices of Neo-Gothic architect G.E. Street after graduation had fed his interest in the decorative style of the medieval period, as well as introduced him to Philip Webb, a designer who went on to be responsible for the majority of the furniture produced by Morris, Marshall, Faulkner &amp; Co. Influenced not only by its staff's personal interest but also by the dominance of Gothic Revival in contemporary decorative fashion, most of the firm's early furniture was medieval in style. The solid outlines of this period spoke to Morris's aesthetic taste. Everyday pieces in heavy wood were sometimes formed almost crudely, with decoration reserved for grander items designed to occupy more prominent positions.</span></p><span data-dcnode-id="649" instrument_node="">
</span></div><span data-dcnode-id="647" instrument_node="">
</span><figure class="sir-trevor-image sir-trevor-image--showcase" data-dcnode-id="640"><span data-dcnode-id="646" instrument_node="">
</span><img alt="" class="sir-trevor-image__source" data-dcnode-id="645" sizes="(min-width: 1250px) 1130px, (min-width: 800px) calc(100vw - 144px), 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanda-production-assets.s3.amazonaws.com/2017/11/08/14/57/32/c0a4d5c0-456c-4189-8a23-6325835b2618/2006AF6593_2500.jpg&amp;raw" srcset="https://vanda-production-assets.s3.amazonaws.com/2017/11/08/14/57/32/c0a4d5c0-456c-4189-8a23-6325835b2618/2006AF6593_2500.jpg 320w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/14/57/32/91ce56bf-aa5c-4bc0-ba8e-f7ade5c1a7b9/2006AF6593_2500.jpg 640w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/14/57/32/3fd4ac9c-d48b-45da-8d8c-97a856274424/2006AF6593_2500.jpg 960w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/14/57/32/0d636f79-abbb-4dbe-bc13-ad439a9f8a33/2006AF6593_2500.jpg 1280w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/14/57/32/ee855209-95d0-40e3-ac9c-ec538e32d960/2006AF6593_2500.jpg 1920w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/14/57/32/897ee26a-7c6f-433d-95e9-185cc5a70202/2006AF6593_2500.jpg 2560w"><span data-dcnode-id="644" instrument_node="">
</span><figcaption class="sir-trevor-image__caption" data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">
        Table, designed by Phillip Webb, made by Morris, Marshall, Faulkner &amp; Co., about 1865, England. Museum no. W.45-1926. © Victoria and Albert Museum, London
      </span></figcaption><span data-dcnode-id="641" instrument_node="">
</span></figure><span data-dcnode-id="639" instrument_node="">
</span><div class="sir-trevor-text" data-dcnode-id="634"><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Painted furniture was already fashionable. Morris and his collaborators were significantly influenced in their decorative tastes by the work of William Bruges, a designer who in the late 1850s had begun using a medieval technique for decorating furniture with varnish that he had sourced from a 12th-century manuscript. In 1861 Morris began painting a cabinet designed by Philip Webb for the 1862 International Exhibition. Morris attempted a figurative scheme (based on the Legend of St George) that was similar to those often used to decorate cassones (bridal chests) in the Middle Ages. </span></p><span data-dcnode-id="635" instrument_node="">
</span></div><span data-dcnode-id="633" instrument_node="">
</span><figure class="sir-trevor-image sir-trevor-image--showcase" data-dcnode-id="626"><span data-dcnode-id="632" instrument_node="">
</span><img alt="" class="sir-trevor-image__source" data-dcnode-id="631" sizes="(min-width: 1250px) 1130px, (min-width: 800px) calc(100vw - 144px), 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanda-production-assets.s3.amazonaws.com/2017/11/08/15/34/36/ca64c58f-2bfc-4e3a-b5a2-a24615818fce/2006AH8812_2500.jpg&amp;raw" srcset="https://vanda-production-assets.s3.amazonaws.com/2017/11/08/15/34/36/ca64c58f-2bfc-4e3a-b5a2-a24615818fce/2006AH8812_2500.jpg 320w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/15/34/36/106d90dd-0fed-43e8-883a-5a6c920b6ae8/2006AH8812_2500.jpg 640w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/15/34/36/d149c445-fac6-4e4a-9b00-bdd013c50a8c/2006AH8812_2500.jpg 960w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/15/34/37/5c545067-2b39-4c59-afdd-d0604541c35d/2006AH8812_2500.jpg 1280w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/15/34/37/a4cc41d3-17b7-42f7-8065-b523df135a80/2006AH8812_2500.jpg 1920w, https://vanda-production-assets.s3.amazonaws.com/2017/11/08/15/34/37/56a0b9ad-f4b8-4512-9c3a-e52edc2d47b1/2006AH8812_2500.jpg 2560w"><span data-dcnode-id="630" instrument_node="">
</span><figcaption class="sir-trevor-image__caption" data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">
        St George Cabinet, designed by Philip Webb, painted by William Morris, manufactured by Morris, Marshall, Faulkner &amp; Co., 1861 – 2, England. Museum no. 341:1 to 8-1906. © Victoria and Albert Museum, London
      </span></figcaption><span data-dcnode-id="627" instrument_node="">
</span></figure><span data-dcnode-id="625" instrument_node="">
</span><div class="sir-trevor-text" data-dcnode-id="620"><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">The interior decoration of the cabinet demonstrates not only Morris's early interest in pattern, but also his use of Bruge's borrowed decorative technique: layering tinted varnish on a ground of silver leaf. Although the press praised its 'true medieval spirit', some people criticised the cabinet for the lack of coordination between its decoration and its construction (ironwork ran up the middle of some of the painted panels). As time went on, it was Burne-Jones who painted most of Morris, Marshall, Faulkner &amp; Co.'s pieces – buoyed by the success of his wallpaper and textile designs, Morris soon realized that his talents lay more in pattern than figuration.</span></p><span data-dcnode-id="621" instrument_node="">
</span></div><span data-dcnode-id="619" instrument_node="">
</span><div class="sir-trevor-text" data-dcnode-id="610"><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="612"><span data-dcnode-id="617" instrument_node="">Find out more about William Morris with </span><a data-dcnode-id="615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vam.ac.uk/shop/books/all-books/william-morris-162203.html"><span data-dcnode-id="616" instrument_node="">our book</span></a><span data-dcnode-id="614" instrument_node="">. </span><br data-dcnode-id="613"></p><span data-dcnode-id="611" instrument_node="">
</span></div><span data-dcnode-id="609" instrument_node="">
