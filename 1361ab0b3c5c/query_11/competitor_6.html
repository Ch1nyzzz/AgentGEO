</span><div class="wiki-layout-artist-info-tab selected" data-dcnode-id="1456" id="info-tab-description"><span data-dcnode-id="1529" instrument_node="">
</span><p data-dcnode-id="1461" itemprop="description"><span data-dcnode-id="1528" instrument_node="">William Morris is best known as the 19th century's most celebrated designer, but he was also a driven polymath who spent much of his life fighting the consensus. A key figure in the </span><a data-dcnode-id="1526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikiart.org/en/artists-by-art-movement/arts-and-crafts%23%21%2523resultType%3Amasonry" target="_blank"><span data-dcnode-id="1527" instrument_node="">Arts &amp; Crafts Movement</span></a><span data-dcnode-id="1525" instrument_node="">, Morris championed a principle of handmade production that didn't chime with the Victorian era's focus on industrial 'progress.' </span><br data-dcnode-id="1524"><br data-dcnode-id="1523"><span data-dcnode-id="1522" instrument_node="">Morris was born in Walthamstow, east London, in 1834. The financial success of his broker father gave Morris a privileged childhood in Woodford Hall (a country house in Essex), as well as an inheritance large enough to mean he would never need to earn an income. Time spent exploring local parkland, forest, and churches, and an enthusiasm for the stories of Walter Scott, helped Morris develop an early affinity with landscape, buildings and historical romance. He also had precociously strong opinions on design. On a family trip to London in 1851, Morris (aged 16) demonstrated his loyalty to craft principles by refusing to enter the Great Exhibition – which championed Machine Age design – on the grounds of taste.</span><br data-dcnode-id="1521"><br data-dcnode-id="1520"><span data-dcnode-id="1519" instrument_node="">After school, Morris went to Oxford University to study for the Church. It was there that he met </span><a data-dcnode-id="1517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikiart.org/en/edward-burne-jones" target="_blank"><span data-dcnode-id="1518" instrument_node="">Edward Burne-Jones</span></a><span data-dcnode-id="1516" instrument_node="">, who was to become one of the era's most famous painters, and Morris's life-long friend. Burne-Jones introduced him to a group of students who became known as 'The Set' or '</span><a data-dcnode-id="1514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikiart.org/en/artists-by-painting-school/pre-raphaelite-brotherhood" target="_blank"><span data-dcnode-id="1515" instrument_node="">The Brotherhood</span></a><span data-dcnode-id="1513" instrument_node="">' and who enjoyed romantic stories of medieval chivalry and self-sacrifice. They also read books by contemporary reformers such as </span><a data-dcnode-id="1511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikiart.org/en/john-ruskin" target="_blank"><span data-dcnode-id="1512" instrument_node="">John Ruskin</span></a><span data-dcnode-id="1510" instrument_node="">, Charles Kingsley, and Thomas Carlyle. Belonging to this group gave Morris an awareness of the deep divisions in modern society. It sparked his interest in trying to create an alternative to the dehumanizing industrial systems that produced poor-quality, 'unnatural' objects.</span><br data-dcnode-id="1509"><br data-dcnode-id="1508"><span data-dcnode-id="1507" instrument_node="">In 1855, Morris and Burne-Jones went on an architectural tour of northern France that made both men realize that they were more committed to art than the Church. Soon after, Morris began work in the office of George Edmund Street, the era's leading Neo-Gothic architect. Morris showed little talent for architecture and spent most of his time setting up Oxford and Cambridge Magazine, a vehicle both for his writing and that of other members of The Brotherhood. Morris left Street's office after only eight months, to begin a career as an artist. Burne-Jones's connection with the artist </span><a data-dcnode-id="1505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikiart.org/en/dante-gabriel-rossetti" target="_blank"><span data-dcnode-id="1506" instrument_node="">Dante Gabriel Rossetti</span></a><span data-dcnode-id="1504" instrument_node=""> – a central figure in the Pre-Raphaelite group – soon led to Morris working with Rossetti as part of a team painting murals at the Oxford Union.</span><br data-dcnode-id="1503"><br data-dcnode-id="1502"><span data-dcnode-id="1501" instrument_node="">While working in Oxford, Morris had a chance meeting with a local stableman's daughter, Jane Burden. Consciously flouting the rules of class, Morris married Jane in 1859 (and her striking looks were to make her a model of idealized beauty for members of the Pre-Raphaelite group for the next 30 years). Morris commissioned architect Philip Webb – whom he had met during his time at Street's – to design and build a home for himself and his wife in rural Kent. In part, Morris wanted to realize the idea of a craft-based artistic community that he and Burne-Jones had been talking about since they were students. The result was Red House, a property that would be 'medieval in spirit' and, eventually, able to accommodate more than one family.</span><br data-dcnode-id="1500"><br data-dcnode-id="1499"><span data-dcnode-id="1498" instrument_node="">Morris and Jane moved into Red House in 1860 and, unhappy with what was on offer commercially, spent the next two years furnishing and decorating the interior with help from members of their artistic circle. Huge murals and hand-embroidered fabrics decorated the walls, creating the feel of a historic manor house. Prompted by the success of their efforts (and the experience of 'joy in collective labor'), Morris and his friends decided in 1861 to set up their own interiors company: Morris, Marshall, Faulkner &amp; Co. Everything was to be created by hand, a principle that set the company firmly against the mainstream focus on industrialized 'progress.'</span><br data-dcnode-id="1497"><br data-dcnode-id="1496"><span data-dcnode-id="1495" instrument_node="">Initially, Morris, Marshall, Faulkner &amp; Co. specialized in the kind of wall paintings and embroidered hangings that had been produced for Red House. Although in its first few years the company didn't make much money, it did win a series of commissions to decorate newly built churches and became well known for work in stained glass. Morris had always wanted the firm to be based at Red House, but the practical restrictions of a small, rural workshop (as well as the death of Burne-Jones's young son) meant that the idea of a medieval-style craft-based community was abandoned. Morris sold Red House in 1865, and the family moved back to London.</span><br data-dcnode-id="1494"><br data-dcnode-id="1493"><span data-dcnode-id="1492" instrument_node="">In the late 1860s, two prestigious decorating commissions helped establish Morris, Marshall, Faulkner &amp; Co.'s reputation: one for a new dining room at the South Kensington Museum (later the V&amp;A), and another at St James's Palace. During this period, Morris was also working on </span><i data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">The Earthly Paradise</span></i><span data-dcnode-id="1489" instrument_node="">, an epic poem with an anti-industrial message that established Morris as one of the foremost poets of his day. He was also busy producing his first wallpapers, whose designs were inspired by English gardens and hedgerows. To make them, he researched and revived historical printing and dyeing methods. This insistence on establishing a 'from scratch' understanding of the process was to become a hallmark of Morris's career.</span><br data-dcnode-id="1488"><br data-dcnode-id="1487"><span data-dcnode-id="1486" instrument_node="">In 1875 Morris became the sole director of the renamed and restructured Morris &amp; Company. Over the next decade, he continued to design at an impressive rate, adding at least 32 printed fabrics, 23 woven fabrics, and 21 wallpapers – as well as more designs for carpets and rugs, embroidery, and tapestry – to the company's range of goods. All of these were sold in the shop that Morris opened on Oxford Street in 1877, in a fashionable space that offered a new kind of 'all under one roof' retail experience. By 1881 Morris had built up enough capital to acquire Merton Abbey Mills, a textile factory in south London. This allowed him to bring all the company's workshops together in one place, and to have closer control overproduction.</span><br data-dcnode-id="1485"><br data-dcnode-id="1484"><span data-dcnode-id="1483" instrument_node="">In his political life, Morris became increasingly disillusioned with parliamentary politics as a means of ending class division, and in 1884 he helped set up a new group called the Socialist League. He made frequent street-corner speeches and went on marches, but his fame protected him against the sanctions of a disapproving establishment. Increasingly, Morris began to leave matters at Merton Abbey in charge of his assistant Henry Dearle and other senior members of the firm, including his daughter, May. He did however continue his interest in tapestry, and for the last five years of his life was involved with Burne-Jones and Dearle on the design of a set of panels based on the </span><i data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">Search for the Holy Grail</span></i><span data-dcnode-id="1480" instrument_node="">.</span><br data-dcnode-id="1479"><br data-dcnode-id="1478"><span data-dcnode-id="1477" instrument_node="">Towards the end of his career, Morris began to focus increasingly on his writing, publishing several prose narratives, including his most celebrated: </span><i data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">News from Nowhere</span></i><span data-dcnode-id="1474" instrument_node=""> (1890). Infused with his socialist ideas and romantic utopianism, this book offers Morris's vision of a simple world in which art or 'work-pleasure' is demanded of and enjoyed by all. In 1891 Morris set up the Kelmscott Press. The books the Press produced – eventually, a total of 66 – were printed and bound in a medieval style, with Morris designing their typefaces, initial letters, and borders. The most famous of these is an illustrated edition of the works of Geoffrey Chaucer, which was published in 1896, a few months before Morris's death.</span><br data-dcnode-id="1473"><br data-dcnode-id="1472"><span data-dcnode-id="1471" instrument_node="">William Morris was the first artist of the modern era to combine word and image in the expression of his vision. Following in the footsteps of that other great London-born radical and luminary </span><a data-dcnode-id="1469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikiart.org/en/william-blake" target="_blank"><span data-dcnode-id="1470" instrument_node="">William Blake</span></a><span data-dcnode-id="1468" instrument_node="">, Morris developed an aesthetic in which the words printed on a hanging tapestry, for example, or in a hand-printed manuscript, were as reliant on their surrounding pattern-work for meaning as the images were on the text. This notion of multi-media art practice, though realized in the context of nostalgic medievalism, pre-empted the more overtly radical art-and-language experiments of the 20th century, from </span><a data-dcnode-id="1466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikiart.org/en/artists-by-art-movement/constructivism" target="_blank"><span data-dcnode-id="1467" instrument_node="">Constructivist</span></a><span data-dcnode-id="1465" instrument_node=""> book design to </span><a data-dcnode-id="1463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikiart.org/en/artists-by-art-movement/concrete-art-concretism" target="_blank"><span data-dcnode-id="1464" instrument_node="">Concrete</span></a><span data-dcnode-id="1462" instrument_node=""> Poetry.</span></p><span data-dcnode-id="1460" instrument_node="">
</span><a class="wiki-layout-artist-info-expand event-attached" data-dcnode-id="1458" href="javascript:;" style="display: inline-block;"><span data-dcnode-id="1459" instrument_node="">More ...</span></a><span data-dcnode-id="1457" instrument_node="">
</span></div><span data-dcnode-id="1455" instrument_node="">
</span><div class="wiki-layout-artist-info-tab" data-dcnode-id="1413" id="info-tab-wikipediaArticle"><span data-dcnode-id="1454" instrument_node="">
</span><p data-dcnode-id="1427"><span data-dcnode-id="1453" instrument_node="">William Morris (24 March 1834 – 3 October 1896) was an English textile designer, poet, novelist, translator, and socialist activist. Associated with the British </span><a data-dcnode-id="1451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikiart.org/en/artists-by-art-movement/arts-and-crafts" target="_blank"><span data-dcnode-id="1452" instrument_node="">Arts and Crafts Movement</span></a><span data-dcnode-id="1450" instrument_node="">, he was a major contributor to the revival of traditional British textile arts and methods of production. His literary contributions helped to establish the modern fantasy genre, while he played a significant role in propagating the early socialist movement in Britain.
</span><br data-dcnode-id="1449"><span data-dcnode-id="1448" instrument_node="">
</span><br data-dcnode-id="1447"><span data-dcnode-id="1446" instrument_node="">Born in Walthamstow, Essex, to a wealthy middle-class family, Morris came under the strong influence of medievalism while studying Classics at Oxford University, there joining the Birmingham Set. After university, he trained as an architect, married Jane Burden, and developed close friendships with the Pre-Raphaelite artists </span><a data-dcnode-id="1444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikiart.org/en/edward-burne-jones" target="_blank"><span data-dcnode-id="1445" instrument_node="">Edward Burne-Jones</span></a><span data-dcnode-id="1443" instrument_node=""> and </span><a data-dcnode-id="1441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikiart.org/en/dante-gabriel-rossetti" target="_blank"><span data-dcnode-id="1442" instrument_node="">Dante Gabriel Rossetti</span></a><span data-dcnode-id="1440" instrument_node=""> and with the Neo-Gothic architect Philip Webb. Webb and Morris designed a family home, Red House, then in Kent, where the latter lived from 1859 to 1865, before moving to Bloomsbury, central London. In 1861, Morris founded a decorative arts firm with Burne-Jones, Rossetti, Webb, and others: the Morris, Marshall, Faulkner &amp; Co. Becoming highly fashionable and much in demand, the firm profoundly influenced interior decoration throughout the Victorian period, with Morris designing tapestries, wallpaper, fabrics, furniture, and stained glass windows. In 1875, Morris assumed total control of the company, which was renamed Morris &amp; Co.
</span><br data-dcnode-id="1439"><span data-dcnode-id="1438" instrument_node="">
</span><br data-dcnode-id="1437"><span data-dcnode-id="1436" instrument_node="">Although retaining a main home in London, from 1871 Morris rented the rural retreat of Kelmscott Manor, Oxfordshire. Greatly influenced by visits to Iceland, with Eiríkr Magnússon he produced a series of English-language translations of Icelandic Sagas. He also achieved success with the publication of his epic poems and novels, namely The Earthly Paradise (1868–1870), A Dream of John Ball (1888), the Utopian News from Nowhere (1890), and the fantasy romance The Well at the World's End (1896). In 1877 he founded the Society for the Protection of Ancient Buildings to campaign against the damage caused by architectural restoration. Embracing Marxism and influenced by anarchism, in the 1880s Morris became a committed revolutionary socialist activist; after an involvement in the Social Democratic Federation (SDF), he founded the Socialist League in 1884, but broke with that organization in 1890. In 1891 he founded the Kelmscott Press to publish limited-edition, illuminated-style print books, a cause to which he devoted his final years.
</span><br data-dcnode-id="1435"><span data-dcnode-id="1434" instrument_node="">
</span><br data-dcnode-id="1433"><span data-dcnode-id="1432" instrument_node="">Morris is recognised as one of the most significant cultural figures of Victorian Britain; though best known in his lifetime as a poet, he posthumously became better known for his designs. Founded in 1955, the William Morris Society is devoted to his legacy, while multiple biographies and studies of his work have seen publication. Many of the buildings associated with his life are open to visitors, much of his work can be found in art galleries and museums, and his designs are still in production.
</span><br data-dcnode-id="1431"><span data-dcnode-id="1430" instrument_node="">
</span><br data-dcnode-id="1429"><span data-dcnode-id="1428" instrument_node="">Morris was born at Elm House in Walthamstow, Essex, on 24 March 1834. Raised into a wealthy middle-class family, he was named after his father, a financier who worked as a partner in the Sanderson &amp; Co. firm, bill brokers in the City of London. His mother was Emma Morris (née Shelton), who descended from a wealthy bourgeois family from Worcester. Morris was the third of his parents' surviving children; their first child, Charles, had been born in 1827 but died four days later. Charles had been followed by the birth of two girls, Emma in 1829 and Henrietta in 1833, before William's birth. These children were followed by the birth of siblings Stanley in 1837, Rendall in 1839, Arthur in 1840, Isabella in 1842, Edgar in 1844, and Alice in 1846. The Morris family were followers of the evangelical Protestant form of Christianity, and William was baptised four months after his birth at St. Mary's Church, Walthamstow.</span></p><span data-dcnode-id="1426" instrument_node="">
</span><p class="wikipedia-licence" data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">
