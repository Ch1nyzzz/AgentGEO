id="5518" id="cite_ref-Works_18-4"><a data-dcnode-id="5519" href="#cite_note-Works-18"><span data-dcnode-id="5520" instrument_node="">[18]</span></a></sup><sup class="reference" data-dcnode-id="5515" id="cite_ref-Ham_19-1"><a data-dcnode-id="5516" href="#cite_note-Ham-19"><span data-dcnode-id="5517" instrument_node="">[19]</span></a></sup><sup class="reference" data-dcnode-id="5512" id="cite_ref-Grunenberg_2005_156_25-0"><a data-dcnode-id="5513" href="#cite_note-Grunenberg_2005_156-25"><span data-dcnode-id="5514" instrument_node="">[25]</span></a></sup><span data-dcnode-id="5511" instrument_node="">
</span></p><p data-dcnode-id="5498"><span data-dcnode-id="5509" instrument_node="">When San Francisco's Fox Theater went out of business, hippies bought up its costume stock, reveling in the freedom to dress up for weekly musical performances at their favorite ballrooms.  As </span><i data-dcnode-id="5507"><span data-dcnode-id="5508" instrument_node="">San Francisco Chronicle</span></i><span data-dcnode-id="5506" instrument_node=""> music columnist </span><a data-dcnode-id="5504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ralph_J._Gleason" title="Ralph J. Gleason"><span data-dcnode-id="5505" instrument_node="">Ralph J. Gleason</span></a><span data-dcnode-id="5503" instrument_node=""> put it, "They danced all night long, orgiastic, spontaneous and completely free form."</span><sup class="reference" data-dcnode-id="5500" id="cite_ref-Works_18-5"><a data-dcnode-id="5501" href="#cite_note-Works-18"><span data-dcnode-id="5502" instrument_node="">[18]</span></a></sup><span data-dcnode-id="5499" instrument_node="">
</span></p><span data-dcnode-id="5497" instrument_node="">
</span><h3 data-dcnode-id="5487"><span class="mw-headline" data-dcnode-id="5495" id="Haight-Ashbury"><span data-dcnode-id="5496" instrument_node="">Haight-Ashbury</span></span><span class="mw-editsection" data-dcnode-id="5488"><span class="mw-editsection-bracket" data-dcnode-id="5493"><span data-dcnode-id="5494" instrument_node="">[</span></span><a data-dcnode-id="5491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_hippie_movement%26action%3Dedit%26section%3D13" title="Edit section: Haight-Ashbury"><span data-dcnode-id="5492" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5489"><span data-dcnode-id="5490" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5486" instrument_node="">
</span><link data-dcnode-id="5485" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5481" role="note"><span data-dcnode-id="5484" instrument_node="">Main article: </span><a data-dcnode-id="5482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Haight-Ashbury" title="Haight-Ashbury"><span data-dcnode-id="5483" instrument_node="">Haight-Ashbury</span></a></div><span data-dcnode-id="5480" instrument_node=""> </span><link data-dcnode-id="5479" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5475" role="note"><span data-dcnode-id="5478" instrument_node="">See also: </span><a class="mw-redirect" data-dcnode-id="5476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_San_Francisco%2C_California" title="History of San Francisco, California"><span data-dcnode-id="5477" instrument_node="">History of San Francisco, California</span></a></div><span data-dcnode-id="5474" instrument_node="">
</span><p data-dcnode-id="5439"><span data-dcnode-id="5473" instrument_node="">Some of the earliest San Francisco hippies were former students at </span><a data-dcnode-id="5471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/San_Francisco_State_University" title="San Francisco State University"><span data-dcnode-id="5472" instrument_node="">San Francisco State College</span></a><span data-dcnode-id="5470" instrument_node=""> (later renamed San Francisco State University) who were intrigued by the developing psychedelic hippie music scene and left school after they started taking psychedelic drugs.</span><sup class="reference" data-dcnode-id="5467" id="cite_ref-Works_18-6"><a data-dcnode-id="5468" href="#cite_note-Works-18"><span data-dcnode-id="5469" instrument_node="">[18]</span></a></sup><span data-dcnode-id="5466" instrument_node=""> These students joined the bands they loved and began living communally in the large, inexpensive </span><a data-dcnode-id="5464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Victorian_architecture" title="Victorian architecture"><span data-dcnode-id="5465" instrument_node="">Victorian</span></a><span data-dcnode-id="5463" instrument_node=""> apartments in the Haight.</span><sup class="reference" data-dcnode-id="5460" id="cite_ref-Perry_2005_57_26-0"><a data-dcnode-id="5461" href="#cite_note-Perry_2005_57-26"><span data-dcnode-id="5462" instrument_node="">[26]</span></a></sup><span data-dcnode-id="5459" instrument_node="">  Young Americans around the country began moving to San Francisco, and by June 1966, around 15,000 hippies had moved into the Haight.</span><sup class="reference" data-dcnode-id="5456" id="cite_ref-Tompkins_2001b_57_27-0"><a data-dcnode-id="5457" href="#cite_note-Tompkins_2001b_57-27"><span data-dcnode-id="5458" instrument_node="">[27]</span></a></sup><span data-dcnode-id="5455" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="5453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Charlatans_%28U.S._band%29" title="The Charlatans (U.S. band)"><span data-dcnode-id="5454" instrument_node="">The Charlatans</span></a><span data-dcnode-id="5452" instrument_node="">, </span><a data-dcnode-id="5450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jefferson_Airplane" title="Jefferson Airplane"><span data-dcnode-id="5451" instrument_node="">Jefferson Airplane</span></a><span data-dcnode-id="5449" instrument_node="">, </span><a data-dcnode-id="5447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Big_Brother_and_the_Holding_Company" title="Big Brother and the Holding Company"><span data-dcnode-id="5448" instrument_node="">Big Brother and the Holding Company</span></a><span data-dcnode-id="5446" instrument_node="">, and the </span><a data-dcnode-id="5444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grateful_Dead" title="Grateful Dead"><span data-dcnode-id="5445" instrument_node="">Grateful Dead</span></a><span data-dcnode-id="5443" instrument_node=""> all moved to San Francisco's </span><a data-dcnode-id="5441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Haight-Ashbury" title="Haight-Ashbury"><span data-dcnode-id="5442" instrument_node="">Haight-Ashbury</span></a><span data-dcnode-id="5440" instrument_node=""> neighborhood during this period.
</span></p><p data-dcnode-id="5435"><b data-dcnode-id="5437"><span data-dcnode-id="5438" instrument_node="">Love Pageant Rally</span></b><span data-dcnode-id="5436" instrument_node="">
</span></p><span data-dcnode-id="5434" instrument_node="">
</span><link data-dcnode-id="5433" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5429" role="note"><span data-dcnode-id="5432" instrument_node="">Main article: </span><a data-dcnode-id="5430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Love_Pageant_Rally" title="Love Pageant Rally"><span data-dcnode-id="5431" instrument_node="">Love Pageant Rally</span></a></div><span data-dcnode-id="5428" instrument_node="">
</span><p data-dcnode-id="5396"><span data-dcnode-id="5427" instrument_node="">On October 6, 1966, the state of California made LSD a controlled substance, making the drug illegal.</span><sup class="reference" data-dcnode-id="5424" id="cite_ref-Columbia_28-0"><a data-dcnode-id="5425" href="#cite_note-Columbia-28"><span data-dcnode-id="5426" instrument_node="">[28]</span></a></sup><span data-dcnode-id="5423" instrument_node=""> In response to the criminalization of psychedelics, San Francisco hippies staged a gathering in the </span><a data-dcnode-id="5421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Panhandle_%28San_Francisco%29" title="Panhandle (San Francisco)"><span data-dcnode-id="5422" instrument_node="">Golden Gate Park panhandle</span></a><span data-dcnode-id="5420" instrument_node="">, called "The Love Pageant Rally",</span><sup class="reference" data-dcnode-id="5417" id="cite_ref-Columbia_28-1"><a data-dcnode-id="5418" href="#cite_note-Columbia-28"><span data-dcnode-id="5419" instrument_node="">[28]</span></a></sup><span data-dcnode-id="5416" instrument_node=""> attracting an estimated 700-800 people.</span><sup class="reference" data-dcnode-id="5413" id="cite_ref-29"><a data-dcnode-id="5414" href="#cite_note-29"><span data-dcnode-id="5415" instrument_node="">[29]</span></a></sup><span data-dcnode-id="5412" instrument_node="">  As explained by Allan Cohen, co-founder of the </span><a data-dcnode-id="5410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/San_Francisco_Oracle" title="San Francisco Oracle"><span data-dcnode-id="5411" instrument_node="">San Francisco Oracle</span></a><span data-dcnode-id="5409" instrument_node="">, the purpose of the rally was twofold — to draw attention to the fact that LSD had just been made illegal, and to demonstrate that people who used LSD were not criminals, nor were they mentally ill.  According to Cohen, those who took LSD were mostly idealistic people who wanted to learn more about themselves and their place in the universe, and they used LSD as an aid to meditation and to creative, artistic expression.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5402" style="white-space:nowrap;"><span data-dcnode-id="5408" instrument_node="">[</span><i data-dcnode-id="5404"><a data-dcnode-id="5405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5406" title="This claim needs references to reliable sources. (June 2007)"><span data-dcnode-id="5407" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5403" instrument_node="">]</span></sup><span data-dcnode-id="5401" instrument_node="">  The Grateful Dead played, and some sources claim that LSD was consumed at the rally.</span><sup class="reference" data-dcnode-id="5398" id="cite_ref-30"><a data-dcnode-id="5399" href="#cite_note-30"><span data-dcnode-id="5400" instrument_node="">[30]</span></a></sup><span data-dcnode-id="5397" instrument_node="">
</span></p><p data-dcnode-id="5392"><b data-dcnode-id="5394"><span data-dcnode-id="5395" instrument_node="">Mantra-Rock Dance</span></b><span data-dcnode-id="5393" instrument_node="">
</span></p><span data-dcnode-id="5391" instrument_node="">
</span><link data-dcnode-id="5390" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5386" role="note"><span data-dcnode-id="5389" instrument_node="">Main article: </span><a data-dcnode-id="5387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mantra-Rock_Dance" title="Mantra-Rock Dance"><span data-dcnode-id="5388" instrument_node="">Mantra-Rock Dance</span></a></div><span data-dcnode-id="5385" instrument_node="">
</span><p data-dcnode-id="5377"><span data-dcnode-id="5384" instrument_node="">One frequently encountered theme was Asian spirituality, and Zen, dharma, "nirvana", karma and yoga were "buzzwords" of the counterculture. For most this infatuation with Asia was somewhat superficial, limited to their wearing colourful and inexpensive clothing from India and burning Indian made incense. One more substantive event in this connection was The Mantra-Rock Dance, January 29, 1967. An audience of nearly 3,000 gathered at the Avalon Ballroom in San Francisco, filling the hall to its capacity for a fundraising effort for the first </span><a data-dcnode-id="5382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Society_for_Krishna_Consciousness" title="International Society for Krishna Consciousness"><span data-dcnode-id="5383" instrument_node="">Hare Krishna</span></a><span data-dcnode-id="5381" instrument_node=""> center on the West Coast of the United States. The Mantra-Rock Dance featured some of the most prominent Californian rock groups of the time, such as the Grateful Dead and Big Brother and the Holding Company. The bands performed for free and countercultural leaders boosted the event's popularity; among them were LSD promoters Timothy Leary and Augustus Owsley Stanley III. Poet Allen Ginsberg led the singing of the Hare Krishna mantra onstage along with the founder acarya of the Krishna Consciousness movement, </span><a data-dcnode-id="5379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/A._C._Bhaktivedanta_Swami_Prabhupada" title="A. C. Bhaktivedanta Swami Prabhupada"><span data-dcnode-id="5380" instrument_node="">A.C. Bhaktivedanta Swami Prabhupada</span></a><span data-dcnode-id="5378" instrument_node="">. Strobe lights and a psychedelic liquid light show along with pictures of Krishna and the words of the Hare Krishna mantra were projected onto the walls of the venue. Later Ginsberg called the Mantra-Rock Dance "the height of Haight-Ashbury spiritual enthusiasm ..."
</span></p><p data-dcnode-id="5373"><b data-dcnode-id="5375"><span data-dcnode-id="5376" instrument_node="">Diggers</span></b><span data-dcnode-id="5374" instrument_node="">
</span></p><span data-dcnode-id="5372" instrument_node="">
</span><link data-dcnode-id="5371" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5367" role="note"><span data-dcnode-id="5370" instrument_node="">Main article: </span><a data-dcnode-id="5368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diggers_%28theater%29" title="Diggers (theater)"><span data-dcnode-id="5369" instrument_node="">Diggers (theater)</span></a></div><span data-dcnode-id="5366" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="5348"><p data-dcnode-id="5356"><span data-dcnode-id="5363" instrument_node="">It is nothing new. We have a private revolution going on. A revolution of individuality and diversity that can only be private.  Upon becoming a group movement, such a revolution ends up with imitators rather than participants ... It is essentially a striving for </span><i data-dcnode-id="5361"><span data-dcnode-id="5362" instrument_node="">realization</span></i><span data-dcnode-id="5360" instrument_node=""> of one's </span><i data-dcnode-id="5358"><span data-dcnode-id="5359" instrument_node="">relationship</span></i><span data-dcnode-id="5357" instrument_node=""> to life and other people ...</span></p><div class="templatequotecite" data-dcnode-id="5349"><span data-dcnode-id="5355" instrument_node="">— </span><cite data-dcnode-id="5350"><span data-dcnode-id="5354" instrument_node="">Bob Stubbs, "Unicorn Philosophy"</span><sup class="reference" data-dcnode-id="5351" id="cite_ref-Perry_2005_18_31-0"><a data-dcnode-id="5352" href="#cite_note-Perry_2005_18-31"><span data-dcnode-id="5353" instrument_node="">[31]</span></a></sup></cite></div></blockquote><span data-dcnode-id="5347" instrument_node="">
</span><p data-dcnode-id="5324"><span data-dcnode-id="5346" instrument_node="">Hippie action in the Haight centered on the Diggers, a guerrilla street </span><a data-dcnode-id="5344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Theatre" title="Theatre"><span data-dcnode-id="5345" instrument_node="">theatre</span></a><span data-dcnode-id="5343" instrument_node=""> group that combined spontaneous street theatre, anarchistic action, and </span><a data-dcnode-id="5341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Happening" title="Happening"><span data-dcnode-id="5342" instrument_node="">art happenings</span></a><span data-dcnode-id="5340" instrument_node=""> in their agenda to create a "free city". By late 1966, the Diggers opened </span><a data-dcnode-id="5338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Give-away_shop" title="Give-away shop"><span data-dcnode-id="5339" instrument_node="">stores which simply gave away their stock</span></a><span data-dcnode-id="5337" instrument_node="">; provided free food, medical care, transport and temporary housing; they also organized free music concerts and works of political art.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5330" style="white-space:nowrap;"><span data-dcnode-id="5336" instrument_node="">[</span><i data-dcnode-id="5332"><a data-dcnode-id="5333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5334" title="This claim needs references to reliable sources. (June 2007)"><span data-dcnode-id="5335" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5331" instrument_node="">]</span></sup><span data-dcnode-id="5329" instrument_node="">  The Diggers criticized the term 'hippie' with their October 1967, 'Death of Hippie' event.</span><sup class="reference" data-dcnode-id="5326" id="cite_ref-32"><a data-dcnode-id="5327" href="#cite_note-32"><span data-dcnode-id="5328" instrument_node="">[32]</span></a></sup><span data-dcnode-id="5325" instrument_node="">
</span></p><p data-dcnode-id="5317"><span data-dcnode-id="5323" instrument_node="">Celebrating both that and the end of the </span><a data-dcnode-id="5321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Summer_of_Love" title="Summer of Love"><span data-dcnode-id="5322" instrument_node="">Summer of Love</span></a><span data-dcnode-id="5320" instrument_node=""> the Death of Hippie event was intended to signal to the rest of the country that ``it was over in San Francisco and that people needed to bring the revolution to their own locales from now on.</span><i data-dcnode-id="5319"></i><span data-dcnode-id="5318" instrument_node="">
</span></p><p data-dcnode-id="5312"><span data-dcnode-id="5316" instrument_node="">In late September 1967, many of the shops in the district began to display a stack of 4x5 cards on their counters proclaiming "Funeral Notice for Hippie". "Friends are invited to attend services beginning at sunrise, October 6, 1967, at Buena Vista Park". An organization known as the </span><a class="mw-redirect" data-dcnode-id="5314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Haight_Ashbury_Switchboard" title="Haight Ashbury Switchboard"><span data-dcnode-id="5315" instrument_node="">Haight Ashbury Switchboard</span></a><span data-dcnode-id="5313" instrument_node=""> actively supported the Digger's funeral concept. A funeral procession went from the park down Haight St and ended in the Panhandle with supporters carrying a trinket filled casket. It was emblematic of the fate of the hippie movement in San Francisco.
</span></p><p data-dcnode-id="5306"><span data-dcnode-id="5311" instrument_node="">By mid-1968, it was widely noted that most of the original "Flower Children" had long since departed the Haight Ashbury district, having gone on to agrarian/back to the earth movements, returned to their studies or embarking on their careers. These were subsequently replaced by a more cynical and exploitative crowd.</span><sup class="reference" data-dcnode-id="5308" id="cite_ref-33"><a data-dcnode-id="5309" href="#cite_note-33"><span data-dcnode-id="5310" instrument_node="">[33]</span></a></sup><span data-dcnode-id="5307" instrument_node="">
</span></p><span data-dcnode-id="5305" instrument_node="">
</span><h3 data-dcnode-id="5295"><span class="mw-headline" data-dcnode-id="5303" id="Los_Angeles"><span data-dcnode-id="5304" instrument_node="">Los Angeles</span></span><span class="mw-editsection" data-dcnode-id="5296"><span class="mw-editsection-bracket" data-dcnode-id="5301"><span data-dcnode-id="5302" instrument_node="">[</span></span><a data-dcnode-id="5299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_hippie_movement%26action%3Dedit%26section%3D14" title="Edit section: Los Angeles"><span data-dcnode-id="5300" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5297"><span data-dcnode-id="5298" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5294" instrument_node="">
</span><p data-dcnode-id="5265"><span data-dcnode-id="5293" instrument_node="">Los Angeles also had a vibrant hippie scene during the mid-1960s. The  </span><a class="mw-redirect" data-dcnode-id="5291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Venice%2C_Los_Angeles%2C_California" title="Venice, Los Angeles, California"><span data-dcnode-id="5292" instrument_node="">Venice</span></a><span data-dcnode-id="5290" instrument_node=""> coffeehouses and beat culture sustained the hippies, giving birth to bands like </span><a data-dcnode-id="5288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Doors" title="The Doors"><span data-dcnode-id="5289" instrument_node="">The Doors</span></a><span data-dcnode-id="5287" instrument_node="">. </span><a class="mw-redirect" data-dcnode-id="5285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/West_Hollywood" title="West Hollywood"><span data-dcnode-id="5286" instrument_node="">West Hollywood</span></a><span data-dcnode-id="5284" instrument_node=""> became the quintessential L.A. hippie gathering area, particularly on the </span><a data-dcnode-id="5282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sunset_Strip" title="Sunset Strip"><span data-dcnode-id="5283" instrument_node="">Sunset Strip</span></a><span data-dcnode-id="5281" instrument_node=""> where the </span><a data-dcnode-id="5279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Whisky_a_Go_Go" title="Whisky a Go Go"><span data-dcnode-id="5280" instrument_node="">Whisky a Go Go</span></a><span data-dcnode-id="5278" instrument_node=""> was located, and </span><a class="mw-redirect" data-dcnode-id="5276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Troubadour_%28Los_Angeles%29" title="The Troubadour (Los Angeles)"><span data-dcnode-id="5277" instrument_node="">The Troubadour</span></a><span data-dcnode-id="5275" instrument_node=""> on Santa Monica Boulevard. The Strip was the location of the protest described in </span><a data-dcnode-id="5273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Buffalo_Springfield" title="Buffalo Springfield"><span data-dcnode-id="5274" instrument_node="">Buffalo Springfield</span></a><span data-dcnode-id="5272" instrument_node="">'s early 1967 hippie anthem, "</span><a class="mw-redirect" data-dcnode-id="5270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/For_What_It%2527s_Worth_%28Stephen_Stills_song%29" title="For What It's Worth (Stephen Stills song)"><span data-dcnode-id="5271" instrument_node="">For What It's Worth</span></a><span data-dcnode-id="5269" instrument_node="">" by </span><a data-dcnode-id="5267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stephen_Stills" title="Stephen Stills"><span data-dcnode-id="5268" instrument_node="">Stephen Stills</span></a><span data-dcnode-id="5266" instrument_node="">.  One of the first "Love Ins" took place in Elysian Park and spread from there. Many hippies lived in that portion of Los Angeles known as East Hollywood as well as Laurel Canyon.
</span></p><span data-dcnode-id="5264" instrument_node="">
</span><h3 data-dcnode-id="5254"><span class="mw-headline" data-dcnode-id="5262" id="Millbrook"><span data-dcnode-id="5263" instrument_node="">Millbrook</span></span><span class="mw-editsection" data-dcnode-id="5255"><span class="mw-editsection-bracket" data-dcnode-id="5260"><span data-dcnode-id="5261" instrument_node="">[</span></span><a data-dcnode-id="5258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_hippie_movement%26action%3Dedit%26section%3D15" title="Edit section: Millbrook"><span data-dcnode-id="5259" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5256"><span data-dcnode-id="5257" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5253" instrument_node="">
</span><p data-dcnode-id="5235"><span data-dcnode-id="5252" instrument_node="">Before the Summer of Love, </span><a data-dcnode-id="5250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Timothy_Leary" title="Timothy Leary"><span data-dcnode-id="5251" instrument_node="">Timothy Leary</span></a><span data-dcnode-id="5249" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="5247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_Alpert" title="Richard Alpert"><span data-dcnode-id="5248" instrument_node="">Richard Alpert</span></a><span data-dcnode-id="5246" instrument_node=""> formed the  International Foundation for Internal Freedom in </span><a data-dcnode-id="5244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Newton%2C_Massachusetts" title="Newton, Massachusetts"><span data-dcnode-id="5245" instrument_node="">Newton, Massachusetts</span></a><span data-dcnode-id="5243" instrument_node="">, inhabiting two houses but later moving to a 64-room mansion at </span><a data-dcnode-id="5241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Millbrook%2C_New_York" title="Millbrook, New York"><span data-dcnode-id="5242" instrument_node="">Millbrook, New York</span></a><span data-dcnode-id="5240" instrument_node="">, with a communal group of about 25–30 people in residence until they were shut down in 1967.</span><sup class="reference" data-dcnode-id="5237" id="cite_ref-CaliCommunes_34-0"><a data-dcnode-id="5238" href="#cite_note-CaliCommunes-34"><span data-dcnode-id="5239" instrument_node="">[34]</span></a></sup><span data-dcnode-id="5236" instrument_node="">
</span></p><span data-dcnode-id="5234" instrument_node="">
</span><h3 data-dcnode-id="5224"><span class="mw-headline" data-dcnode-id="5232" id="Drop_City"><span data-dcnode-id="5233" instrument_node="">Drop City</span></span><span class="mw-editsection" data-dcnode-id="5225"><span class="mw-editsection-bracket" data-dcnode-id="5230"><span data-dcnode-id="5231" instrument_node="">[</span></span><a data-dcnode-id="5228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_hippie_movement%26action%3Dedit%26section%3D16" title="Edit section: Drop City"><span data-dcnode-id="5229" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5226"><span data-dcnode-id="5227" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5223" instrument_node="">
</span><link data-dcnode-id="5222" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5218" role="note"><span data-dcnode-id="5221" instrument_node="">Main article: </span><a data-dcnode-id="5219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Drop_City" title="Drop City"><span data-dcnode-id="5220" instrument_node="">Drop City</span></a></div><span data-dcnode-id="5217" instrument_node="">
</span><p data-dcnode-id="5197"><span data-dcnode-id="5216" instrument_node="">In 1965, four art students and filmmakers, Gene Bernofsky, JoAnn Bernofsky, Richard Kallweit and Clark Richert, moved to a 7-acre (28,000&nbsp;m</span><sup data-dcnode-id="5214"><span data-dcnode-id="5215" instrument_node="">2</span></sup><span data-dcnode-id="5213" instrument_node="">) tract of land near Trinidad, Colorado. Their intention was to create a live-in work of Drop Art, continuing an art concept they had developed earlier, and informed by "</span><a class="mw-redirect" data-dcnode-id="5211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Happenings" title="Happenings"><span data-dcnode-id="5212" instrument_node="">happenings</span></a><span data-dcnode-id="5210" instrument_node="">".  As Drop City gained notoriety in the 1960s underground, people from around the world came to stay and work on the construction projects. Inspired by the architectural ideas of </span><a data-dcnode-id="5208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Buckminster_Fuller" title="Buckminster Fuller"><span data-dcnode-id="5209" instrument_node="">Buckminster Fuller</span></a><span data-dcnode-id="5207" instrument_node=""> and </span><a data-dcnode-id="5205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Steve_Baer" title="Steve Baer"><span data-dcnode-id="5206" instrument_node="">Steve Baer</span></a><span data-dcnode-id="5204" instrument_node="">, residents constructed </span><a class="mw-redirect" data-dcnode-id="5202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Geodesic_domes" title="Geodesic domes"><span data-dcnode-id="5203" instrument_node="">geodesic domes</span></a><span data-dcnode-id="5201" instrument_node=""> and </span><a data-dcnode-id="5199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zonohedron" title="Zonohedron"><span data-dcnode-id="5200" instrument_node="">zonahedra</span></a><span data-dcnode-id="5198" instrument_node=""> to house themselves, using geometric panels made from the metal of automobile roofs and other inexpensive materials. In 1967 the group, consisting of 10 core people and many contributors, won Buckminster Fuller's Dymaxion award for their constructions.
</span></p><span data-dcnode-id="5196" instrument_node="">
</span><h2 data-dcnode-id="5186"><span class="mw-headline" data-dcnode-id="5194" id="1967"><span data-dcnode-id="5195" instrument_node="">1967</span></span><span class="mw-editsection" data-dcnode-id="5187"><span class="mw-editsection-bracket" data-dcnode-id="5192"><span data-dcnode-id="5193" instrument_node="">[</span></span><a data-dcnode-id="5190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_hippie_movement%26action%3Dedit%26section%3D17" title="Edit section: 1967"><span data-dcnode-id="5191" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5188"><span data-dcnode-id="5189" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5185" instrument_node="">
</span><h3 data-dcnode-id="5175"><span class="mw-headline" data-dcnode-id="5183" id="Summer_of_Love"><span data-dcnode-id="5184" instrument_node="">Summer of Love</span></span><span class="mw-editsection" data-dcnode-id="5176"><span class="mw-editsection-bracket" data-dcnode-id="5181"><span data-dcnode-id="5182" instrument_node="">[</span></span><a data-dcnode-id="5179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_hippie_movement%26action%3Dedit%26section%3D18" title="Edit section: Summer of Love"><span data-dcnode-id="5180" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5177"><span data-dcnode-id="5178" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5174" instrument_node="">
</span><link data-dcnode-id="5173" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5169" role="note"><span data-dcnode-id="5172" instrument_node="">Main article: </span><a data-dcnode-id="5170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Summer_of_Love" title="Summer of Love"><span data-dcnode-id="5171" instrument_node="">Summer of Love</span></a></div><span data-dcnode-id="5168" instrument_node="">
</span><p data-dcnode-id="5141"><span data-dcnode-id="5167" instrument_node="">On January 14, 1967, the outdoor </span><a data-dcnode-id="5165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_Be-In" title="Human Be-In"><span data-dcnode-id="5166" instrument_node="">Human Be-In</span></a><span data-dcnode-id="5164" instrument_node=""> in San Francisco popularized hippie culture across the United States, with 30,000 hippies gathering in </span><a data-dcnode-id="5162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Golden_Gate_Park" title="Golden Gate Park"><span data-dcnode-id="5163" instrument_node="">Golden Gate Park</span></a><span data-dcnode-id="5161" instrument_node="">.  The </span><a class="mw-redirect" data-dcnode-id="5159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monterey_Pop_Festival" title="Monterey Pop Festival"><span data-dcnode-id="5160" instrument_node="">Monterey Pop Festival</span></a><span data-dcnode-id="5158" instrument_node=""> from June 16 to June 18 introduced the rock music of the counterculture to a wide audience and marked the start of the "Summer of Love".</span><sup class="reference" data-dcnode-id="5155" id="cite_ref-Dudley_2000_254_35-0"><a data-dcnode-id="5156" href="#cite_note-Dudley_2000_254-35"><span data-dcnode-id="5157" instrument_node="">[35]</span></a></sup><span data-dcnode-id="5154" instrument_node=""> </span><a data-dcnode-id="5152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scott_McKenzie" title="Scott McKenzie"><span data-dcnode-id="5153" instrument_node="">Scott McKenzie</span></a><span data-dcnode-id="5151" instrument_node="">'s rendition of </span><a data-dcnode-id="5149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Phillips_%28musician%29" title="John Phillips (musician)"><span data-dcnode-id="5150" instrument_node="">John Phillips</span></a><span data-dcnode-id="5148" instrument_node="">' song, "</span><a data-dcnode-id="5146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/San_Francisco_%28Be_Sure_to_Wear_Flowers_in_Your_Hair%29" title="San Francisco (Be Sure to Wear Flowers in Your Hair)"><span data-dcnode-id="5147" instrument_node="">San Francisco</span></a><span data-dcnode-id="5145" instrument_node="">", became a hit in the United States and  Europe.  The lyrics, "If you're going to San Francisco, be sure to wear some flowers in your hair", inspired thousands of young people from all over the world to  travel to San Francisco, sometimes wearing flowers in their hair and distributing flowers to passersby, earning them the name, "</span><a data-dcnode-id="5143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Flower_child" title="Flower child"><span data-dcnode-id="5144" instrument_node="">Flower Children</span></a><span data-dcnode-id="5142" instrument_node="">".
</span></p><p data-dcnode-id="5116"><span data-dcnode-id="5140" instrument_node="">Bands like the </span><a data-dcnode-id="5138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grateful_Dead" title="Grateful Dead"><span data-dcnode-id="5139" instrument_node="">Grateful Dead</span></a><span data-dcnode-id="5137" instrument_node="">, </span><a data-dcnode-id="5135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Big_Brother_and_the_Holding_Company" title="Big Brother and the Holding Company"><span data-dcnode-id="5136" instrument_node="">Big Brother and the Holding Company</span></a><span data-dcnode-id="5134" instrument_node=""> (with </span><a data-dcnode-id="5132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Janis_Joplin" title="Janis Joplin"><span data-dcnode-id="5133" instrument_node="">Janis Joplin</span></a><span data-dcnode-id="5131" instrument_node="">), and </span><a data-dcnode-id="5129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jefferson_Airplane" title="Jefferson Airplane"><span data-dcnode-id="5130" instrument_node="">Jefferson Airplane</span></a><span data-dcnode-id="5128" instrument_node=""> continued to live in the Haight, but by the end of the summer, the incessant media coverage led the Diggers to declare the "death" of the hippie with a parade.  According to the late poet Stormi Chambless, the hippies buried an effigy of a hippie in the </span><a data-dcnode-id="5126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Panhandle_%28San_Francisco%29" title="Panhandle (San Francisco)"><span data-dcnode-id="5127" instrument_node="">Panhandle</span></a><span data-dcnode-id="5125" instrument_node=""> to demonstrate the end of his/her reign.  Regarding this period of history, the July 7, 1967, </span><i data-dcnode-id="5122"><a class="mw-redirect" data-dcnode-id="5123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/TIME" title="TIME"><span data-dcnode-id="5124" instrument_node="">TIME</span></a></i><span data-dcnode-id="5121" instrument_node=""> magazine featured a cover story entitled, "The Hippies: The Philosophy of a Subculture". The article described the guidelines of the hippie code: "Do your own thing, wherever you have to do it and whenever you want.  Drop out.  Leave society as you have known it.  Leave it utterly.  Blow the mind of every straight person you can reach.  Turn them on, if not to drugs, then to beauty, love, honesty, fun."</span><sup class="reference" data-dcnode-id="5118" id="cite_ref-Marty_1997_125_36-0"><a data-dcnode-id="5119" href="#cite_note-Marty_1997_125-36"><span data-dcnode-id="5120" instrument_node="">[36]</span></a></sup><span data-dcnode-id="5117" instrument_node="">
</span></p><p data-dcnode-id="5104"><span data-dcnode-id="5115" instrument_node="">It is estimated that around 100,000 people traveled to San Francisco in the summer of 1967. The media was right behind them, casting a spotlight on the Haight-Ashbury district and popularizing the "hippie" label.  With this increased attention, hippies found support for their ideals of love and peace but were also criticized for their anti-work, pro-drug, and permissive ethos.  Misgivings about the hippie culture, particularly with regard to </span><a class="mw-redirect" data-dcnode-id="5113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Drug_abuse" title="Drug abuse"><span data-dcnode-id="5114" instrument_node="">drug abuse</span></a><span data-dcnode-id="5112" instrument_node=""> and lenient morality, fueled the </span><a data-dcnode-id="5110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moral_panic" title="Moral panic"><span data-dcnode-id="5111" instrument_node="">moral panics</span></a><span data-dcnode-id="5109" instrument_node=""> of the late 1960s.</span><sup class="reference" data-dcnode-id="5106" id="cite_ref-37"><a data-dcnode-id="5107" href="#cite_note-37"><span data-dcnode-id="5108" instrument_node="">[37]</span></a></sup><span data-dcnode-id="5105" instrument_node="">
</span></p><span data-dcnode-id="5103" instrument_node="">
</span><h3 data-dcnode-id="5093"><span class="mw-headline" data-dcnode-id="5101" id="New_Communalism"><span data-dcnode-id="5102" instrument_node="">New Communalism</span></span><span class="mw-editsection" data-dcnode-id="5094"><span class="mw-editsection-bracket" data-dcnode-id="5099"><span data-dcnode-id="5100" instrument_node="">[</span></span><a data-dcnode-id="5097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_hippie_movement%26action%3Dedit%26section%3D19" title="Edit section: New Communalism"><span data-dcnode-id="5098" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5095"><span data-dcnode-id="5096" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5092" instrument_node="">
</span><link data-dcnode-id="5091" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5087" role="note"><span data-dcnode-id="5090" instrument_node="">See also: </span><a data-dcnode-id="5088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Back-to-the-land_movement" title="Back-to-the-land movement"><span data-dcnode-id="5089" instrument_node="">Back-to-the-land movement</span></a></div><span data-dcnode-id="5086" instrument_node="">
</span><p data-dcnode-id="5074"><span data-dcnode-id="5085" instrument_node="">When the  Summer of Love finally ended, thousands of hippies left San Francisco, a large minority of them heading "back to the land".  These hippies created the largest number of </span><a class="mw-redirect" data-dcnode-id="5083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intentional_communities" title="Intentional communities"><span data-dcnode-id="5084" instrument_node="">intentional communities</span></a><span data-dcnode-id="5082" instrument_node=""> or communes in the history of the United States, forming alternative, egalitarian farms and homesteads in Northern California, Colorado, New Mexico, New York, Tennessee and other states.  According to Timothy Miller, communes were organized in many different ways, some along religious, political, and even sexual orientation.  Poet and writer </span><a data-dcnode-id="5080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Judson_Jerome" title="Judson Jerome"><span data-dcnode-id="5081" instrument_node="">Judson Jerome</span></a><span data-dcnode-id="5079" instrument_node="">, who studied the American commune movement, estimates that by the early 1970s, about 750,000 people lived in more than ten thousand communes across the United States.</span><sup class="reference" data-dcnode-id="5076" id="cite_ref-Turner_2006_3239_38-0"><a data-dcnode-id="5077" href="#cite_note-Turner_2006_3239-38"><span data-dcnode-id="5078" instrument_node="">[38]</span></a></sup><span data-dcnode-id="5075" instrument_node="">
</span></p><span data-dcnode-id="5073" instrument_node="">
</span><dl data-dcnode-id="5070"><dt data-dcnode-id="5071"><span data-dcnode-id="5072" instrument_node="">The Farm</span></dt></dl><span data-dcnode-id="5069" instrument_node="">
</span><link data-dcnode-id="5068" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5064" role="note"><span data-dcnode-id="5067" instrument_node="">Main article: </span><a data-dcnode-id="5065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Farm_%28Tennessee%29" title="The Farm (Tennessee)"><span data-dcnode-id="5066" instrument_node="">The Farm (Tennessee)</span></a></div><span data-dcnode-id="5063" instrument_node="">
</span><p data-dcnode-id="5036"><span data-dcnode-id="5062" instrument_node="">In 1967, </span><a data-dcnode-id="5060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stephen_Gaskin" title="Stephen Gaskin"><span data-dcnode-id="5061" instrument_node="">Stephen Gaskin</span></a><span data-dcnode-id="5059" instrument_node=""> began to develop a philosophy of hippie  perspectives at San Francisco State College, where he taught English, creative writing, and </span><a class="mw-redirect" data-dcnode-id="5057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/General_Semantics" title="General Semantics"><span data-dcnode-id="5058" instrument_node="">General Semantics</span></a><span data-dcnode-id="5056" instrument_node="">. Gaskin's "Monday Night Class" became a broad, open discussion group involving up to 1,500 students and other participants from the San Francisco Bay Area. In 1970, Gaskin and his wife, </span><a data-dcnode-id="5054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ina_May_Gaskin" title="Ina May Gaskin"><span data-dcnode-id="5055" instrument_node="">Ina May Gaskin</span></a><span data-dcnode-id="5053" instrument_node="">, led a caravan of 60 buses, vans and trucks on a cross country speaking tour.  Along the way, they checked out various places that might be suitable for settlement.  When they got back to San Francisco, they decided to return to </span><a data-dcnode-id="5051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Summertown%2C_Tennessee" title="Summertown, Tennessee"><span data-dcnode-id="5052" instrument_node="">Summertown, Tennessee</span></a><span data-dcnode-id="5050" instrument_node="">, where they bought 1,700 acres (688 hectares) and created an intentional community called "</span><a data-dcnode-id="5048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Farm_%28Tennessee%29" title="The Farm (Tennessee)"><span data-dcnode-id="5049" instrument_node="">The Farm</span></a><span data-dcnode-id="5047" instrument_node="">". The Farm became a widely respected, </span><a data-dcnode-id="5045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spirituality" title="Spirituality"><span data-dcnode-id="5046" instrument_node="">spiritually based</span></a><span data-dcnode-id="5044" instrument_node=""> hippie community that still thrives, although it is now more a hip village of 300 than a commune of 1,200. The Farm continues in many public-service and philanthropic enterprises through the Farm Midwifery Center, </span><a data-dcnode-id="5042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plenty_International" title="Plenty International"><span data-dcnode-id="5043" instrument_node="">Plenty International</span></a><span data-dcnode-id="5041" instrument_node="">, and other sub-organizations.</span><sup class="reference" data-dcnode-id="5038" id="cite_ref-39"><a data-dcnode-id="5039" href="#cite_note-39"><span data-dcnode-id="5040" instrument_node="">[39]</span></a></sup><span data-dcnode-id="5037" instrument_node="">
</span></p><span data-dcnode-id="5035" instrument_node="">
</span><dl data-dcnode-id="5032"><dt data-dcnode-id="5033"><span data-dcnode-id="5034" instrument_node="">Strawberry Fields</span></dt></dl><span data-dcnode-id="5031" instrument_node="">
</span><p data-dcnode-id="5027"><i data-dcnode-id="5029"><span data-dcnode-id="5030" instrument_node="">The second commune on the west coast</span></i><span data-dcnode-id="5028" instrument_node="">
</span></p><p data-dcnode-id="5009"><span data-dcnode-id="5026" instrument_node="">Started by former Boston stockbroker and later probation officer </span><a class="new" data-dcnode-id="5024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGridley_Wright%26action%3Dedit%26redlink%3D1" title="Gridley Wright (page does not exist)"><span data-dcnode-id="5025" instrument_node="">Gridley Wright</span></a><span data-dcnode-id="5023" instrument_node="">, Strawberry Fields, named after the </span><a data-dcnode-id="5021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Strawberry_Fields_Forever" title="Strawberry Fields Forever"><span data-dcnode-id="5022" instrument_node="">song</span></a><span data-dcnode-id="5020" instrument_node=""> by the Beatles, occupied forty four acres of land in Decker Canyon, in the arid hills above </span><a data-dcnode-id="5018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malibu%2C_California" title="Malibu, California"><span data-dcnode-id="5019" instrument_node="">Malibu, California</span></a><span data-dcnode-id="5017" instrument_node="">.  Nine adults and six children made up the original community, housed in two old houses and a barn.  Over fifty people ended up there during its five months of existence.  It was a stopping off place for </span><a data-dcnode-id="5015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Timothy_Leary" title="Timothy Leary"><span data-dcnode-id="5016" instrument_node="">Timothy Leary</span></a><span data-dcnode-id="5014" instrument_node=""> as well as other well known figures in the psychedelic movement. Annie and the Family were one of the original families to take up residence there; they later went on to take part in the magical mystery tour and to live in a number of other communes in Europe.</span><sup class="reference" data-dcnode-id="5011" id="cite_ref-40"><a data-dcnode-id="5012" href="#cite_note-40"><span data-dcnode-id="5013" instrument_node="">[40]</span></a></sup><span data-dcnode-id="5010" instrument_node="">
</span></p><span data-dcnode-id="5008" instrument_node="">
</span><h2 data-dcnode-id="4998"><span class="mw-headline" data-dcnode-id="5006" id="1968"><span data-dcnode-id="5007" instrument_node="">1968</span></span><span class="mw-editsection" data-dcnode-id="4999"><span class="mw-editsection-bracket" data-dcnode-id="5004"><span data-dcnode-id="5005" instrument_node="">[</span></span><a data-dcnode-id="5002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_hippie_movement%26action%3Dedit%26section%3D20" title="Edit section: 1968"><span data-dcnode-id="5003" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5000"><span data-dcnode-id="5001" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4997" instrument_node="">
</span><p data-dcnode-id="4989"><span data-dcnode-id="4996" instrument_node="">By 1968,  hippie-influenced fashions were beginning to take off in the mainstream, especially for youths and younger adults of the populous "</span><a class="mw-redirect" data-dcnode-id="4994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baby_Boomer" title="Baby Boomer"><span data-dcnode-id="4995" instrument_node="">Baby Boomer</span></a><span data-dcnode-id="4993" instrument_node="">" generation, many of whom may have aspired to emulate the hardcore movements now living in tribalistic communes, but had no overt connections to them. This was noticed not only in terms of clothes and also longer hair for men, but also in music, film, art, and literature, and not just in the US, but around the world. </span><a data-dcnode-id="4991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eugene_McCarthy" title="Eugene McCarthy"><span data-dcnode-id="4992" instrument_node="">Eugene McCarthy</span></a><span data-dcnode-id="4990" instrument_node="">'s brief presidential campaign successfully persuaded a significant minority of young adults to "get clean for Gene" by shaving their beards or wearing lower miniskirts; however the "Clean Genes" had little impact on the popular image in the media spotlight, of the hirsute hippie adorned in beads, feathers, flowers and bells.
</span></p><p data-dcnode-id="4970"><span data-dcnode-id="4988" instrument_node="">The year 1968 also saw the development of two new, but dissimilar, </span><i data-dcnode-id="4986"><span data-dcnode-id="4987" instrument_node="">genres</span></i><span data-dcnode-id="4985" instrument_node=""> of music that each exerted some influence on, and were influenced by, the hippie movements: </span><a data-dcnode-id="4983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heavy_metal_music" title="Heavy metal music"><span data-dcnode-id="4984" instrument_node="">Heavy metal</span></a><span data-dcnode-id="4982" instrument_node="">,</span><sup class="reference" data-dcnode-id="4979" id="cite_ref-41"><a data-dcnode-id="4980" href="#cite_note-41"><span data-dcnode-id="4981" instrument_node="">[41]</span></a></sup><span data-dcnode-id="4978" instrument_node=""> and </span><a data-dcnode-id="4976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reggae" title="Reggae"><span data-dcnode-id="4977" instrument_node="">reggae</span></a><span data-dcnode-id="4975" instrument_node="">.</span><sup class="reference" data-dcnode-id="4972" id="cite_ref-42"><a data-dcnode-id="4973" href="#cite_note-42"><span data-dcnode-id="4974" instrument_node="">[42]</span></a></sup><span data-dcnode-id="4971" instrument_node="">
</span></p><span data-dcnode-id="4969" instrument_node="">
</span><h3 data-dcnode-id="4959"><span class="mw-headline" data-dcnode-id="4967" id="Yippies"><span data-dcnode-id="4968" instrument_node="">Yippies</span></span><span class="mw-editsection" data-dcnode-id="4960"><span class="mw-editsection-bracket" data-dcnode-id="4965"><span data-dcnode-id="4966" instrument_node="">[</span></span><a data-dcnode-id="4963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_hippie_movement%26action%3Dedit%26section%3D21" title="Edit section: Yippies"><span data-dcnode-id="4964" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4961"><span data-dcnode-id="4962" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4958" instrument_node="">
</span><link data-dcnode-id="4957" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4953" role="note"><span data-dcnode-id="4956" instrument_node="">Main article: </span><a data-dcnode-id="4954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Youth_International_Party" title="Youth International Party"><span data-dcnode-id="4955" instrument_node="">Youth International Party</span></a></div><span data-dcnode-id="4952" instrument_node="">
</span><p data-dcnode-id="4931"><span data-dcnode-id="4951" instrument_node="">The Yippies, who were seen as an offshoot of the hippie movements parodying as a political party, came to national attention during their celebration of the 1968 spring equinox, when some 3,000 of them took over </span><a data-dcnode-id="4949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grand_Central_Terminal" title="Grand Central Terminal"><span data-dcnode-id="4950" instrument_node="">Grand Central Station</span></a><span data-dcnode-id="4948" instrument_node=""> in New York — eventually resulting in 61 arrests. The Yippies, especially their leaders </span><a data-dcnode-id="4946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abbie_Hoffman" title="Abbie Hoffman"><span data-dcnode-id="4947" instrument_node="">Abbie Hoffman</span></a><span data-dcnode-id="4945" instrument_node=""> and </span><a data-dcnode-id="4943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jerry_Rubin" title="Jerry Rubin"><span data-dcnode-id="4944" instrument_node="">Jerry Rubin</span></a><span data-dcnode-id="4942" instrument_node="">, became notorious for their theatrics, such as trying to levitate the Pentagon at the October 1967 war protest, and such slogans as "Rise up and abandon the creeping meatball!" Their stated intention to protest the </span><a data-dcnode-id="4940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1968_Democratic_National_Convention" title="1968 Democratic National Convention"><span data-dcnode-id="4941" instrument_node="">1968 Democratic National Convention</span></a><span data-dcnode-id="4939" instrument_node=""> in Chicago in August, including nominating their own candidate, "</span><a data-dcnode-id="4937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pigasus_%28politics%29" title="Pigasus (politics)"><span data-dcnode-id="4938" instrument_node="">Lyndon Pigasus Pig</span></a><span data-dcnode-id="4936" instrument_node="">" (an actual pig), was also widely publicized in the media at this time.</span><sup class="reference" data-dcnode-id="4933" id="cite_ref-43"><a data-dcnode-id="4934" href="#cite_note-43"><span data-dcnode-id="4935" instrument_node="">[43]</span></a></sup><span data-dcnode-id="4932" instrument_node="">
</span></p><p data-dcnode-id="4913"><span data-dcnode-id="4930" instrument_node="">By the time of the convention, city officials were prepared for the worst, with 23,000 police, National Guard, and Federal troops. Following the pig's nomination on the first day, Rubin and 6 others were arrested, but protests and music concerts were allowed to continue in Lincoln Park for two days, albeit an 11:00 PM curfew was enforced. On the convention's second night, poet Allan Ginsberg led protesters out of the park, thus avoiding confrontation, by chanting "</span><i data-dcnode-id="4927"><a data-dcnode-id="4928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Om" title="Om"><span data-dcnode-id="4929" instrument_node="">Om</span></a></i><span data-dcnode-id="4926" instrument_node="">". On the third night, riots erupted in response to the curfew, causing police to indiscriminately attack protesters and innocent bystanders alike, including journalists from around the world and even visiting dignitaries, throughout the streets of Chicago.  The violence suffered by the journalists present, even including </span><a data-dcnode-id="4924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mike_Wallace" title="Mike Wallace"><span data-dcnode-id="4925" instrument_node="">Mike Wallace</span></a><span data-dcnode-id="4923" instrument_node="">, </span><a data-dcnode-id="4921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dan_Rather" title="Dan Rather"><span data-dcnode-id="4922" instrument_node="">Dan Rather</span></a><span data-dcnode-id="4920" instrument_node=""> and </span><a data-dcnode-id="4918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hugh_Hefner" title="Hugh Hefner"><span data-dcnode-id="4919" instrument_node="">Hugh Hefner</span></a><span data-dcnode-id="4917" instrument_node="">, resulted in a mainstream media that was more sympathetic to certain hippie ideals, and less so to politicians, for several years. However, this galvanized the protest movement, and the following year, the trial of Hoffman, Rubin, and others as the "</span><a data-dcnode-id="4915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chicago_Seven" title="Chicago Seven"><span data-dcnode-id="4916" instrument_node="">Chicago Seven</span></a><span data-dcnode-id="4914" instrument_node="">" (originally Eight) generated significant interest.
</span></p><span data-dcnode-id="4912" instrument_node="">
</span><h3 data-dcnode-id="4902"><span class="mw-headline" data-dcnode-id="4910" id="Resurrection_City"><span data-dcnode-id="4911" instrument_node="">Resurrection City</span></span><span class="mw-editsection" data-dcnode-id="4903"><span class="mw-editsection-bracket" data-dcnode-id="4908"><span data-dcnode-id="4909" instrument_node="">[</span></span><a data-dcnode-id="4906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_hippie_movement%26action%3Dedit%26section%3D22" title="Edit section: Resurrection City"><span data-dcnode-id="4907" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4904"><span data-dcnode-id="4905" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4901" instrument_node="">
</span><p data-dcnode-id="4884"><span data-dcnode-id="4900" instrument_node="">Beginning May 12, 1968, the newly formed </span><a data-dcnode-id="4898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Poor_People%2527s_Campaign" title="Poor People's Campaign"><span data-dcnode-id="4899" instrument_node="">Poor People's Campaign</span></a><span data-dcnode-id="4897" instrument_node="">, started by the recently (April 4) </span><a data-dcnode-id="4895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Assassination_of_Martin_Luther_King_Jr." title="Assassination of Martin Luther King Jr."><span data-dcnode-id="4896" instrument_node="">assassinated Martin Luther King Jr.</span></a><span data-dcnode-id="4894" instrument_node="">, organized a </span><a class="mw-redirect" data-dcnode-id="4892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shantytown" title="Shantytown"><span data-dcnode-id="4893" instrument_node="">shantytown</span></a><span data-dcnode-id="4891" instrument_node=""> known as </span><i data-dcnode-id="4889"><span data-dcnode-id="4890" instrument_node="">Resurrection City</span></i><span data-dcnode-id="4888" instrument_node="">, composed of around 3,000 black, native, and Latino militants, along with a significant contingent of hippies and diggers, encamped on the </span><a data-dcnode-id="4886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Mall" title="National Mall"><span data-dcnode-id="4887" instrument_node="">National Mall</span></a><span data-dcnode-id="4885" instrument_node=""> in Washington, DC. This culminated in the June 19 "Solidarity Day" protest which drew 55,000 protesters, after which the tent settlements' population dwindled to around 300. It was finally razed, after almost 6 weeks, on June 24, 1968, by 1,000 riot police using tear gas.
</span></p><span data-dcnode-id="4883" instrument_node="">
</span><h2 data-dcnode-id="4873"><span class="mw-headline" data-dcnode-id="4881" id="1969"><span data-dcnode-id="4882" instrument_node="">1969</span></span><span class="mw-editsection" data-dcnode-id="4874"><span class="mw-editsection-bracket" data-dcnode-id="4879"><span data-dcnode-id="4880" instrument_node="">[</span></span><a data-dcnode-id="4877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_hippie_movement%26action%3Dedit%26section%3D23" title="Edit section: 1969"><span data-dcnode-id="4878" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4875"><span data-dcnode-id="4876" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4872" instrument_node="">
</span><h3 data-dcnode-id="4861"><span data-dcnode-id="4871" id="People.27s_Park"></span><span class="mw-headline" data-dcnode-id="4869" id="People's_Park"><span data-dcnode-id="4870" instrument_node="">People's Park</span></span><span class="mw-editsection" data-dcnode-id="4862"><span class="mw-editsection-bracket" data-dcnode-id="4867"><span data-dcnode-id="4868" instrument_node="">[</span></span><a data-dcnode-id="4865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_hippie_movement%26action%3Dedit%26section%3D24" title="Edit section: People's Park"><span data-dcnode-id="4866" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4863"><span data-dcnode-id="4864" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4860" instrument_node="">
</span><link data-dcnode-id="4859" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4855" role="note"><span data-dcnode-id="4858" instrument_node="">Main article: </span><a data-dcnode-id="4856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/People%2527s_Park_%28Berkeley%29" title="People's Park (Berkeley)"><span data-dcnode-id="4857" instrument_node="">People's Park (Berkeley)</span></a></div><span data-dcnode-id="4854" instrument_node="">
</span><p data-dcnode-id="4834"><span data-dcnode-id="4853" instrument_node="">In April 1969, the building of People's Park in Berkeley, California received international attention.  The </span><a data-dcnode-id="4851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/University_of_California%2C_Berkeley" title="University of California, Berkeley"><span data-dcnode-id="4852" instrument_node="">University of California, Berkeley</span></a><span data-dcnode-id="4850" instrument_node=""> had demolished all the buildings on a 2.8-acre (11,000&nbsp;m</span><sup data-dcnode-id="4848"><span data-dcnode-id="4849" instrument_node="">2</span></sup><span data-dcnode-id="4847" instrument_node="">) parcel near campus, intending to use the land to build playing fields and a parking lot. After a long delay, during which the site became a dangerous eyesore, thousands of ordinary Berkeley citizens, merchants, students, and hippies took matters into their own hands, planting trees, shrubs, flowers and grass to convert the land into a park.  A major confrontation ensued on May 15, 1969, and Governor </span><a data-dcnode-id="4845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ronald_Reagan" title="Ronald Reagan"><span data-dcnode-id="4846" instrument_node="">Ronald Reagan</span></a><span data-dcnode-id="4844" instrument_node=""> ordered a two-week occupation of the city of Berkeley by the </span><a class="mw-redirect" data-dcnode-id="4842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_National_Guard" title="United States National Guard"><span data-dcnode-id="4843" instrument_node="">United States National Guard</span></a><span data-dcnode-id="4841" instrument_node="">. </span><a data-dcnode-id="4839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Flower_power" title="Flower power"><span data-dcnode-id="4840" instrument_node="">Flower power</span></a><span data-dcnode-id="4838" instrument_node=""> came into its own during this occupation as hippies engaged in acts of </span><a data-dcnode-id="4836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_disobedience" title="Civil disobedience"><span data-dcnode-id="4837" instrument_node="">civil disobedience</span></a><span data-dcnode-id="4835" instrument_node=""> to plant flowers in empty lots all over Berkeley under the slogan "Let A Thousand Parks Bloom."
</span></p><span data-dcnode-id="4833" instrument_node="">
</span><h3 data-dcnode-id="4823"><span class="mw-headline" data-dcnode-id="4831" id="Woodstock"><span data-dcnode-id="4832" instrument_node="">Woodstock</span></span><span class="mw-editsection" data-dcnode-id="4824"><span class="mw-editsection-bracket" data-dcnode-id="4829"><span data-dcnode-id="4830" instrument_node="">[</span></span><a data-dcnode-id="4827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_hippie_movement%26action%3Dedit%26section%3D25" title="Edit section: Woodstock"><span data-dcnode-id="4828" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4825"><span data-dcnode-id="4826" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4822" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4813"><div class="thumbinner" data-dcnode-id="4814" style="width:222px;"><a class="image" data-dcnode-id="4820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWoodstock_redmond_cocker.JPG"><img alt="" class="thumbimage" data-dcnode-id="4821" data-file-height="480" data-file-width="700" decoding="async" height="151" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Woodstock_redmond_cocker.JPG/220px-Woodstock_redmond_cocker.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Woodstock_redmond_cocker.JPG/330px-Woodstock_redmond_cocker.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Woodstock_redmond_cocker.JPG/440px-Woodstock_redmond_cocker.JPG 2x" width="220"></a><span data-dcnode-id="4819" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4815"><div class="magnify" data-dcnode-id="4817"><a class="internal" data-dcnode-id="4818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWoodstock_redmond_cocker.JPG" title="Enlarge"></a></div><span data-dcnode-id="4816" instrument_node="">Joe Cocker at Woodstock 1969</span></div></div></div><span data-dcnode-id="4812" instrument_node="">
</span><link data-dcnode-id="4811" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4807" role="note"><span data-dcnode-id="4810" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="4808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Woodstock_Festival" title="Woodstock Festival"><span data-dcnode-id="4809" instrument_node="">Woodstock Festival</span></a></div><span data-dcnode-id="4806" instrument_node="">
</span><p data-dcnode-id="4765"><span data-dcnode-id="4805" instrument_node="">In August 1969, the Woodstock Music and Art Festival took place in </span><a data-dcnode-id="4803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bethel%2C_New_York" title="Bethel, New York"><span data-dcnode-id="4804" instrument_node="">Bethel, New York</span></a><span data-dcnode-id="4802" instrument_node="">, which for many, exemplified the best of hippie counterculture. Over 500,000 people arrived to hear the most notable  musicians and bands of the era, among them </span><a data-dcnode-id="4800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richie_Havens" title="Richie Havens"><span data-dcnode-id="4801" instrument_node="">Richie Havens</span></a><span data-dcnode-id="4799" instrument_node="">, </span><a data-dcnode-id="4797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joan_Baez" title="Joan Baez"><span data-dcnode-id="4798" instrument_node="">Joan Baez</span></a><span data-dcnode-id="4796" instrument_node="">, </span><a data-dcnode-id="4794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Janis_Joplin" title="Janis Joplin"><span data-dcnode-id="4795" instrument_node="">Janis Joplin</span></a><span data-dcnode-id="4793" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Grateful_Dead" title="The Grateful Dead"><span data-dcnode-id="4792" instrument_node="">The Grateful Dead</span></a><span data-dcnode-id="4790" instrument_node="">, </span><a data-dcnode-id="4788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Creedence_Clearwater_Revival" title="Creedence Clearwater Revival"><span data-dcnode-id="4789" instrument_node="">Creedence Clearwater Revival</span></a><span data-dcnode-id="4787" instrument_node="">, </span><a data-dcnode-id="4785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crosby%2C_Stills%2C_Nash_%2526_Young" title="Crosby, Stills, Nash &amp; Young"><span data-dcnode-id="4786" instrument_node="">Crosby, Stills, Nash &amp; Young</span></a><span data-dcnode-id="4784" instrument_node="">, </span><a data-dcnode-id="4782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Santana_%28band%29" title="Santana (band)"><span data-dcnode-id="4783" instrument_node="">Santana</span></a><span data-dcnode-id="4781" instrument_node="">, </span><a data-dcnode-id="4779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Who" title="The Who"><span data-dcnode-id="4780" instrument_node="">The Who</span></a><span data-dcnode-id="4778" instrument_node="">, </span><a data-dcnode-id="4776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jefferson_Airplane" title="Jefferson Airplane"><span data-dcnode-id="4777" instrument_node="">Jefferson Airplane</span></a><span data-dcnode-id="4775" instrument_node="">, and </span><a data-dcnode-id="4773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jimi_Hendrix" title="Jimi Hendrix"><span data-dcnode-id="4774" instrument_node="">Jimi Hendrix</span></a><span data-dcnode-id="4772" instrument_node="">.  </span><a data-dcnode-id="4770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wavy_Gravy" title="Wavy Gravy"><span data-dcnode-id="4771" instrument_node="">Wavy Gravy's</span></a><span data-dcnode-id="4769" instrument_node=""> </span><a data-dcnode-id="4767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hog_Farm" title="Hog Farm"><span data-dcnode-id="4768" instrument_node="">Hog Farm</span></a><span data-dcnode-id="4766" instrument_node=""> provided security and attended to practical needs, and the hippie ideals of love and human fellowship seemed to have gained real-world expression.
</span></p><span data-dcnode-id="4764" instrument_node="">
</span><h3 data-dcnode-id="4754"><span class="mw-headline" data-dcnode-id="4762" id="Altamont"><span data-dcnode-id="4763" instrument_node="">Altamont</span></span><span class="mw-editsection" data-dcnode-id="4755"><span class="mw-editsection-bracket" data-dcnode-id="4760"><span data-dcnode-id="4761" instrument_node="">[</span></span><a data-dcnode-id="4758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_hippie_movement%26action%3Dedit%26section%3D26" title="Edit section: Altamont"><span data-dcnode-id="4759" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4756"><span data-dcnode-id="4757" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4753" instrument_node="">
</span><link data-dcnode-id="4752" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4748" role="note"><span data-dcnode-id="4751" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="4749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Altamont_Music_Festival" title="Altamont Music Festival"><span data-dcnode-id="4750" instrument_node="">Altamont Music Festival</span></a></div><span data-dcnode-id="4747" instrument_node="">
