</span><div class="thumb tright" data-dcnode-id="3975"><div class="thumbinner" data-dcnode-id="3976" style="width:222px;"><a class="image" data-dcnode-id="3988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A1981_festival_joins_for_World_Peace.jpg"><img alt="" class="thumbimage" data-dcnode-id="3989" data-file-height="1056" data-file-width="704" decoding="async" height="330" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/0a/1981_festival_joins_for_World_Peace.jpg/220px-1981_festival_joins_for_World_Peace.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/0a/1981_festival_joins_for_World_Peace.jpg/330px-1981_festival_joins_for_World_Peace.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/0a/1981_festival_joins_for_World_Peace.jpg/440px-1981_festival_joins_for_World_Peace.jpg 2x" width="220"></a><span data-dcnode-id="3987" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3977"><div class="magnify" data-dcnode-id="3985"><a class="internal" data-dcnode-id="3986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A1981_festival_joins_for_World_Peace.jpg" title="Enlarge"></a></div><span data-dcnode-id="3984" instrument_node="">1981 - 10,000 </span><a data-dcnode-id="3982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nambassa" title="Nambassa"><span data-dcnode-id="3983" instrument_node="">Nambassa</span></a><span data-dcnode-id="3981" instrument_node=""> hippies join for world </span><a data-dcnode-id="3979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peace" title="Peace"><span data-dcnode-id="3980" instrument_node="">peace</span></a><span data-dcnode-id="3978" instrument_node="">.</span></div></div></div><span data-dcnode-id="3974" instrument_node="">
</span><p data-dcnode-id="3962"><span data-dcnode-id="3973" instrument_node="">Since the 1960s, many aspects of the hippie </span><a data-dcnode-id="3971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Counterculture" title="Counterculture"><span data-dcnode-id="3972" instrument_node="">counterculture</span></a><span data-dcnode-id="3970" instrument_node=""> have been assimilated by the mainstream.</span><sup class="reference" data-dcnode-id="3967" id="cite_ref-MorfordM_55-0"><a data-dcnode-id="3968" href="#cite_note-MorfordM-55"><span data-dcnode-id="3969" instrument_node="">[55]</span></a></sup><sup class="reference" data-dcnode-id="3964" id="cite_ref-56"><a data-dcnode-id="3965" href="#cite_note-56"><span data-dcnode-id="3966" instrument_node="">[56]</span></a></sup><span data-dcnode-id="3963" instrument_node="">
</span></p><p data-dcnode-id="3940"><span data-dcnode-id="3961" instrument_node="">Religious and cultural diversity has gained greater acceptance.  Eastern religions and spiritual concepts, </span><a data-dcnode-id="3959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karma" title="Karma"><span data-dcnode-id="3960" instrument_node="">karma</span></a><span data-dcnode-id="3958" instrument_node=""> and </span><a data-dcnode-id="3956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reincarnation" title="Reincarnation"><span data-dcnode-id="3957" instrument_node="">reincarnation</span></a><span data-dcnode-id="3955" instrument_node=""> in particular, have reached a wider audience with around 20% of Americans espousing some </span><a data-dcnode-id="3953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Age" title="New Age"><span data-dcnode-id="3954" instrument_node="">New Age</span></a><span data-dcnode-id="3952" instrument_node=""> belief.</span><sup class="reference" data-dcnode-id="3949" id="cite_ref-57"><a data-dcnode-id="3950" href="#cite_note-57"><span data-dcnode-id="3951" instrument_node="">[57]</span></a></sup><span data-dcnode-id="3948" instrument_node="">  A wide range of personal appearance options and clothing styles have become acceptable, all of which were uncommon before the hippie era.</span><sup class="reference" data-dcnode-id="3945" id="cite_ref-Connikie_58-0"><a data-dcnode-id="3946" href="#cite_note-Connikie-58"><span data-dcnode-id="3947" instrument_node="">[58]</span></a></sup><sup class="reference" data-dcnode-id="3942" id="cite_ref-Pendergast_59-0"><a data-dcnode-id="3943" href="#cite_note-Pendergast-59"><span data-dcnode-id="3944" instrument_node="">[59]</span></a></sup><span data-dcnode-id="3941" instrument_node=""> Co-operative business enterprises and creative community living arrangements are widely accepted. Interest in natural food, herbal remedies and vitamins is widespread, and the little hippie "health food stores" of the 1960s and 1970s are now large-scale, profitable businesses.
</span></p><span data-dcnode-id="3939" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="3928"><div class="thumbinner" data-dcnode-id="3929" style="width:172px;"><a class="image" data-dcnode-id="3937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADirkvdM_Rainbow_Gathering-1.jpg"><img alt="" class="thumbimage" data-dcnode-id="3938" data-file-height="852" data-file-width="1136" decoding="async" height="128" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/0f/DirkvdM_Rainbow_Gathering-1.jpg/170px-DirkvdM_Rainbow_Gathering-1.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/0f/DirkvdM_Rainbow_Gathering-1.jpg/255px-DirkvdM_Rainbow_Gathering-1.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/0f/DirkvdM_Rainbow_Gathering-1.jpg/340px-DirkvdM_Rainbow_Gathering-1.jpg 2x" width="170"></a><span data-dcnode-id="3936" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3930"><div class="magnify" data-dcnode-id="3934"><a class="internal" data-dcnode-id="3935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADirkvdM_Rainbow_Gathering-1.jpg" title="Enlarge"></a></div><span data-dcnode-id="3933" instrument_node="">At the Rainbow World Gathering 2006 in </span><a data-dcnode-id="3931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Costa_Rica" title="Costa Rica"><span data-dcnode-id="3932" instrument_node="">Costa Rica</span></a></div></div></div><span data-dcnode-id="3927" instrument_node="">
</span><p data-dcnode-id="3855"><span data-dcnode-id="3926" instrument_node="">The immediate legacy of the hippies included: in fashion, the decline in popularity of the </span><a data-dcnode-id="3924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Necktie" title="Necktie"><span data-dcnode-id="3925" instrument_node="">necktie</span></a><span data-dcnode-id="3923" instrument_node=""> which had been everyday wear during the 1950s and early 1960s, and generally longer hairstyles, even for politicians such as </span><a data-dcnode-id="3921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pierre_Trudeau" title="Pierre Trudeau"><span data-dcnode-id="3922" instrument_node="">Pierre Trudeau</span></a><span data-dcnode-id="3920" instrument_node="">; in literature, books like </span><i data-dcnode-id="3917"><a data-dcnode-id="3918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Electric_Kool-Aid_Acid_Test" title="The Electric Kool-Aid Acid Test"><span data-dcnode-id="3919" instrument_node="">The Electric Kool-Aid Acid Test</span></a></i><span data-dcnode-id="3916" instrument_node="">;</span><sup class="reference" data-dcnode-id="3913" id="cite_ref-60"><a data-dcnode-id="3914" href="#cite_note-60"><span data-dcnode-id="3915" instrument_node="">[60]</span></a></sup><span data-dcnode-id="3912" instrument_node="">  in music, the blending of </span><a data-dcnode-id="3910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Folk_rock" title="Folk rock"><span data-dcnode-id="3911" instrument_node="">folk rock</span></a><span data-dcnode-id="3909" instrument_node=""> into newer forms including </span><a data-dcnode-id="3907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Acid_rock" title="Acid rock"><span data-dcnode-id="3908" instrument_node="">acid rock</span></a><span data-dcnode-id="3906" instrument_node=""> and </span><a data-dcnode-id="3904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heavy_metal_music" title="Heavy metal music"><span data-dcnode-id="3905" instrument_node="">heavy metal</span></a><span data-dcnode-id="3903" instrument_node="">; in television and film, far greater visibility and influence, with some films depicting the hippie ethos and lifestyle, such as </span><i data-dcnode-id="3900"><a data-dcnode-id="3901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Woodstock_%28film%29" title="Woodstock (film)"><span data-dcnode-id="3902" instrument_node="">Woodstock</span></a></i><span data-dcnode-id="3899" instrument_node="">, </span><i data-dcnode-id="3896"><a data-dcnode-id="3897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Easy_Rider" title="Easy Rider"><span data-dcnode-id="3898" instrument_node="">Easy Rider</span></a></i><span data-dcnode-id="3895" instrument_node="">, </span><i data-dcnode-id="3892"><a data-dcnode-id="3893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hair_%28film%29" title="Hair (film)"><span data-dcnode-id="3894" instrument_node="">Hair</span></a></i><span data-dcnode-id="3891" instrument_node="">, </span><i data-dcnode-id="3888"><a data-dcnode-id="3889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Doors_%28film%29" title="The Doors (film)"><span data-dcnode-id="3890" instrument_node="">The Doors</span></a></i><span data-dcnode-id="3887" instrument_node="">, and </span><i data-dcnode-id="3884"><a data-dcnode-id="3885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crumb_%28film%29" title="Crumb (film)"><span data-dcnode-id="3886" instrument_node="">Crumb</span></a></i><span data-dcnode-id="3883" instrument_node="">.  Hippies were frequently parodied on popular television series of the time like </span><i data-dcnode-id="3880"><a data-dcnode-id="3881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Star_Trek" title="Star Trek"><span data-dcnode-id="3882" instrument_node="">Star Trek</span></a></i><span data-dcnode-id="3879" instrument_node="">, while shows like </span><i data-dcnode-id="3876"><a class="mw-redirect" data-dcnode-id="3877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dragnet_%28series%29" title="Dragnet (series)"><span data-dcnode-id="3878" instrument_node="">Dragnet</span></a></i><span data-dcnode-id="3875" instrument_node=""> regularly portrayed them in a negative light as drug-crazed hedonists. Even children's television shows like </span><i data-dcnode-id="3872"><a data-dcnode-id="3873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/H.R._Pufnstuf" title="H.R. Pufnstuf"><span data-dcnode-id="3874" instrument_node="">H.R. Pufnstuf</span></a></i><span data-dcnode-id="3871" instrument_node="">,</span><sup class="reference" data-dcnode-id="3868" id="cite_ref-61"><a data-dcnode-id="3869" href="#cite_note-61"><span data-dcnode-id="3870" instrument_node="">[61]</span></a></sup><span data-dcnode-id="3867" instrument_node=""> and educational shows such as </span><i data-dcnode-id="3864"><a data-dcnode-id="3865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Electric_Company" title="The Electric Company"><span data-dcnode-id="3866" instrument_node="">The Electric Company</span></a></i><sup class="reference" data-dcnode-id="3861" id="cite_ref-62"><a data-dcnode-id="3862" href="#cite_note-62"><span data-dcnode-id="3863" instrument_node="">[62]</span></a></sup><span data-dcnode-id="3860" instrument_node=""> and </span><i data-dcnode-id="3857"><a data-dcnode-id="3858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mulligan_Stew_%28TV_series%29" title="Mulligan Stew (TV series)"><span data-dcnode-id="3859" instrument_node="">Mulligan Stew</span></a></i><span data-dcnode-id="3856" instrument_node=""> were influenced by the hippies.
</span></p><span data-dcnode-id="3854" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3842"><div class="thumbinner" data-dcnode-id="3843" style="width:172px;"><a class="image" data-dcnode-id="3852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOld_Hippies_at_the_Washington_Monument_with_Sign_-_Martin_Luther_King_Jr.%2527s_Dream_-_Non-Violence_-_50th_Anniversary_of_the_March_on_Washington_for_Jobs_and_Freedom.jpg"><img alt="" class="thumbimage" data-dcnode-id="3853" data-file-height="5184" data-file-width="3456" decoding="async" height="255" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/12/Old_Hippies_at_the_Washington_Monument_with_Sign_-_Martin_Luther_King_Jr.%2527s_Dream_-_Non-Violence_-_50th_Anniversary_of_the_March_on_Washington_for_Jobs_and_Freedom.jpg/170px-thumbnail.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/12/Old_Hippies_at_the_Washington_Monument_with_Sign_-_Martin_Luther_King_Jr.%27s_Dream_-_Non-Violence_-_50th_Anniversary_of_the_March_on_Washington_for_Jobs_and_Freedom.jpg/255px-thumbnail.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/12/Old_Hippies_at_the_Washington_Monument_with_Sign_-_Martin_Luther_King_Jr.%27s_Dream_-_Non-Violence_-_50th_Anniversary_of_the_March_on_Washington_for_Jobs_and_Freedom.jpg/340px-thumbnail.jpg 2x" width="170"></a><span data-dcnode-id="3851" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3844"><div class="magnify" data-dcnode-id="3849"><a class="internal" data-dcnode-id="3850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOld_Hippies_at_the_Washington_Monument_with_Sign_-_Martin_Luther_King_Jr.%2527s_Dream_-_Non-Violence_-_50th_Anniversary_of_the_March_on_Washington_for_Jobs_and_Freedom.jpg" title="Enlarge"></a></div><span data-dcnode-id="3848" instrument_node="">Old hippies celebrating the 50th anniversary of the </span><a data-dcnode-id="3846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/March_on_Washington_for_Jobs_and_Freedom" title="March on Washington for Jobs and Freedom"><span data-dcnode-id="3847" instrument_node="">March on Washington for Jobs and Freedom</span></a><span data-dcnode-id="3845" instrument_node="">, 2013</span></div></div></div><span data-dcnode-id="3841" instrument_node="">
</span><p data-dcnode-id="3835"><span data-dcnode-id="3840" instrument_node="">While many hippies made a long-term commitment to the lifestyle, some younger people argue that hippies "sold out" during the 1980s and became part of the materialist, consumer culture.</span><sup class="reference" data-dcnode-id="3837" id="cite_ref-Heath_Potter_2004_54-1"><a data-dcnode-id="3838" href="#cite_note-Heath_Potter_2004-54"><span data-dcnode-id="3839" instrument_node="">[54]</span></a></sup><span data-dcnode-id="3836" instrument_node="">
</span></p><p data-dcnode-id="3811"><span data-dcnode-id="3834" instrument_node="">Hippies who did not "sell out" have been featured in the press as recently as April 2014. Forty years after founding the "Hippie Kitchen" in </span><a data-dcnode-id="3832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Skid_Row%2C_Los_Angeles" title="Skid Row, Los Angeles"><span data-dcnode-id="3833" instrument_node="">Los Angeles' Skid Row</span></a><span data-dcnode-id="3831" instrument_node=""> in the back of a van, </span><a data-dcnode-id="3829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catholic_Worker_Movement" title="Catholic Worker Movement"><span data-dcnode-id="3830" instrument_node="">Catholic Workers</span></a><span data-dcnode-id="3828" instrument_node=""> Jeff Dietrich, a </span><a data-dcnode-id="3826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Draft_evasion" title="Draft evasion"><span data-dcnode-id="3827" instrument_node="">draft resister</span></a><span data-dcnode-id="3825" instrument_node="">, and Catherine Morris, a </span><a data-dcnode-id="3823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_former_Roman_Catholic_nuns" title="List of former Roman Catholic nuns"><span data-dcnode-id="3824" instrument_node="">former nun</span></a><span data-dcnode-id="3822" instrument_node="">, remained active in their work feeding Skid Row residents and </span><a data-dcnode-id="3820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peace_movement" title="Peace movement"><span data-dcnode-id="3821" instrument_node="">protesting wars</span></a><span data-dcnode-id="3819" instrument_node="">, especially in front of the local </span><a data-dcnode-id="3817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wilshire_Federal_Building" title="Wilshire Federal Building"><span data-dcnode-id="3818" instrument_node="">Federal Building</span></a><span data-dcnode-id="3816" instrument_node="">.</span><sup class="reference" data-dcnode-id="3813" id="cite_ref-63"><a data-dcnode-id="3814" href="#cite_note-63"><span data-dcnode-id="3815" instrument_node="">[63]</span></a></sup><span data-dcnode-id="3812" instrument_node="">
</span></p><p data-dcnode-id="3802"><span data-dcnode-id="3810" instrument_node="">Hippies may still be found in </span><a data-dcnode-id="3808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bohemianism" title="Bohemianism"><span data-dcnode-id="3809" instrument_node="">bohemian</span></a><span data-dcnode-id="3807" instrument_node=""> enclaves around the world.</span><sup class="reference" data-dcnode-id="3804" id="cite_ref-Stone_1994_64-0"><a data-dcnode-id="3805" href="#cite_note-Stone_1994-64"><span data-dcnode-id="3806" instrument_node="">[64]</span></a></sup><span data-dcnode-id="3803" instrument_node="">
</span></p><p data-dcnode-id="3778"><span data-dcnode-id="3801" instrument_node="">Contemporary hippies have made use of the </span><a data-dcnode-id="3799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Wide_Web" title="World Wide Web"><span data-dcnode-id="3800" instrument_node="">World Wide Web</span></a><span data-dcnode-id="3798" instrument_node=""> and can be found on virtual communities. In the </span><a data-dcnode-id="3796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Kingdom" title="United Kingdom"><span data-dcnode-id="3797" instrument_node="">United Kingdom</span></a><span data-dcnode-id="3795" instrument_node="">, the </span><a class="mw-redirect" data-dcnode-id="3793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_age_travellers" title="New age travellers"><span data-dcnode-id="3794" instrument_node="">New age travellers</span></a><span data-dcnode-id="3792" instrument_node=""> movement, while eschewing the label 'hippie', nevertheless revived many hippie traditions into the 1980s and 1990s.  Current events, </span><a class="mw-redirect" data-dcnode-id="3790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Festivals" title="Festivals"><span data-dcnode-id="3791" instrument_node="">festivals</span></a><span data-dcnode-id="3789" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="3787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parties" title="Parties"><span data-dcnode-id="3788" instrument_node="">parties</span></a><span data-dcnode-id="3786" instrument_node=""> continue to promote the hippie lifestyle and values. The "</span><a data-dcnode-id="3784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boho-chic" title="Boho-chic"><span data-dcnode-id="3785" instrument_node="">boho-chic</span></a><span data-dcnode-id="3783" instrument_node="">" fashion style of 2003-2007 had a number of hippie features and the London </span><i data-dcnode-id="3780"><a data-dcnode-id="3781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Evening_Standard" title="Evening Standard"><span data-dcnode-id="3782" instrument_node="">Evening Standard</span></a></i><span data-dcnode-id="3779" instrument_node=""> even used the term "hippie chic" (March 11, 2005).
</span></p><span data-dcnode-id="3777" instrument_node="">
</span><h3 data-dcnode-id="3767"><span class="mw-headline" data-dcnode-id="3775" id="Neo-hippies"><span data-dcnode-id="3776" instrument_node="">Neo-hippies</span></span><span class="mw-editsection" data-dcnode-id="3768"><span class="mw-editsection-bracket" data-dcnode-id="3773"><span data-dcnode-id="3774" instrument_node="">[</span></span><a data-dcnode-id="3771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_hippie_movement%26action%3Dedit%26section%3D33" title="Edit section: Neo-hippies"><span data-dcnode-id="3772" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3769"><span data-dcnode-id="3770" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3766" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3755"><div class="thumbinner" data-dcnode-id="3756" style="width:222px;"><a class="image" data-dcnode-id="3764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFreespiritartcar.jpg"><img alt="" class="thumbimage" data-dcnode-id="3765" data-file-height="374" data-file-width="500" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/23/Freespiritartcar.jpg/220px-Freespiritartcar.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/23/Freespiritartcar.jpg/330px-Freespiritartcar.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/23/Freespiritartcar.jpg/440px-Freespiritartcar.jpg 2x" width="220"></a><span data-dcnode-id="3763" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3757"><div class="magnify" data-dcnode-id="3761"><a class="internal" data-dcnode-id="3762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFreespiritartcar.jpg" title="Enlarge"></a></div><a data-dcnode-id="3759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Art_car" title="Art car"><span data-dcnode-id="3760" instrument_node="">Art car</span></a><span data-dcnode-id="3758" instrument_node=""> seen in Northern California</span></div></div></div><span data-dcnode-id="3754" instrument_node="">
</span><p data-dcnode-id="3752"><span data-dcnode-id="3753" instrument_node="">Neo-hippies, some of whom are children and grandchildren of the original hippies, advocate many of the same beliefs of their 1960s counterparts.
Drug use is just as accepted as in the "original" hippie days, although some neo-hippies do not consider it necessary to take drugs in order to be part of the lifestyle, and others reject drug use in favor of alternative methods of reaching higher or altered consciousness such as drumming circles, community singing, meditation, yoga and dance. On April 20 (4/20) many neo-hippies gather at "Hippie Hill" in Golden Gate Park, San Francisco.
</span></p><p data-dcnode-id="3744"><span data-dcnode-id="3751" instrument_node="">In the United States, some hippies refer to themselves as "Rainbows", a name derived from their tie-dyed T-shirts, and for some, from their participation in the hippie group, "</span><a data-dcnode-id="3749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rainbow_Family" title="Rainbow Family"><span data-dcnode-id="3750" instrument_node="">Rainbow Family</span></a><span data-dcnode-id="3748" instrument_node=""> of Living Light".  Since the early 1970s, the Rainbows meet informally  at </span><a data-dcnode-id="3746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rainbow_Gathering" title="Rainbow Gathering"><span data-dcnode-id="3747" instrument_node="">Rainbow Gatherings</span></a><span data-dcnode-id="3745" instrument_node=""> on U.S. National Forest Land  as well as internationally.  "Peace, love, harmony, freedom, and community" is their motto.
</span></p><span data-dcnode-id="3743" instrument_node="">
</span><h3 data-dcnode-id="3733"><span class="mw-headline" data-dcnode-id="3741" id="Activism"><span data-dcnode-id="3742" instrument_node="">Activism</span></span><span class="mw-editsection" data-dcnode-id="3734"><span class="mw-editsection-bracket" data-dcnode-id="3739"><span data-dcnode-id="3740" instrument_node="">[</span></span><a data-dcnode-id="3737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_hippie_movement%26action%3Dedit%26section%3D34" title="Edit section: Activism"><span data-dcnode-id="3738" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3735"><span data-dcnode-id="3736" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3732" instrument_node="">
</span><link data-dcnode-id="3731" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3727" role="note"><span data-dcnode-id="3730" instrument_node="">Main article: </span><a data-dcnode-id="3728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Occupy_movement" title="Occupy movement"><span data-dcnode-id="3729" instrument_node="">Occupy movement</span></a></div><span data-dcnode-id="3726" instrument_node="">
</span><p data-dcnode-id="3717"><span data-dcnode-id="3725" instrument_node="">Hippies have maintained activist activities after the 1960s. Heavy hippie presence has been noted at the </span><a data-dcnode-id="3723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Occupy_Wall_Street" title="Occupy Wall Street"><span data-dcnode-id="3724" instrument_node="">Occupy Wall Street</span></a><span data-dcnode-id="3722" instrument_node=""> protests and has at times been ridiculed.</span><sup class="reference" data-dcnode-id="3719" id="cite_ref-occupy_hippies_65-0"><a data-dcnode-id="3720" href="#cite_note-occupy_hippies-65"><span data-dcnode-id="3721" instrument_node="">[65]</span></a></sup><span data-dcnode-id="3718" instrument_node="">
</span></p><span data-dcnode-id="3716" instrument_node="">
</span><h3 data-dcnode-id="3706"><span class="mw-headline" data-dcnode-id="3714" id="Festivals"><span data-dcnode-id="3715" instrument_node="">Festivals</span></span><span class="mw-editsection" data-dcnode-id="3707"><span class="mw-editsection-bracket" data-dcnode-id="3712"><span data-dcnode-id="3713" instrument_node="">[</span></span><a data-dcnode-id="3710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_hippie_movement%26action%3Dedit%26section%3D35" title="Edit section: Festivals"><span data-dcnode-id="3711" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3708"><span data-dcnode-id="3709" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3705" instrument_node="">
</span><table class="box-Original_research plainlinks metadata ambox ambox-content ambox-Original_research" data-dcnode-id="3666" role="presentation"><tbody data-dcnode-id="3667"><tr data-dcnode-id="3668"><td class="mbox-image" data-dcnode-id="3702"><div data-dcnode-id="3703" style="width:52px"><img alt="" data-dcnode-id="3704" data-file-height="40" data-file-width="40" decoding="async" height="40" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/b/b4/Ambox_important.svg/40px-Ambox_important.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/b/b4/Ambox_important.svg/60px-Ambox_important.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/b/b4/Ambox_important.svg/80px-Ambox_important.svg.png 2x" width="40"></div></td><td class="mbox-text" data-dcnode-id="3669"><div class="mbox-text-span" data-dcnode-id="3670"><span data-dcnode-id="3701" instrument_node="">This article </span><b data-dcnode-id="3697"><span data-dcnode-id="3700" instrument_node="">possibly contains </span><a data-dcnode-id="3698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ANo_original_research" title="Wikipedia:No original research"><span data-dcnode-id="3699" instrument_node="">original research</span></a></b><span data-dcnode-id="3696" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="3685"><span data-dcnode-id="3695" instrument_node=""> Please </span><a class="external text" data-dcnode-id="3693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_hippie_movement%26action%3Dedit"><span data-dcnode-id="3694" instrument_node="">improve it</span></a><span data-dcnode-id="3692" instrument_node=""> by </span><a data-dcnode-id="3690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="3691" instrument_node="">verifying</span></a><span data-dcnode-id="3689" instrument_node=""> the claims made and adding </span><a data-dcnode-id="3687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACiting_sources%23Inline_citations" title="Wikipedia:Citing sources"><span data-dcnode-id="3688" instrument_node="">inline citations</span></a><span data-dcnode-id="3686" instrument_node="">. Statements consisting only of original research should be removed.</span></span><span data-dcnode-id="3684" instrument_node=""> </span><span class="date-container" data-dcnode-id="3678"><i data-dcnode-id="3679"><span data-dcnode-id="3683" instrument_node="">(</span><span class="date" data-dcnode-id="3681"><span data-dcnode-id="3682" instrument_node="">October 2007</span></span><span data-dcnode-id="3680" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="3671"><i data-dcnode-id="3672"><span data-dcnode-id="3677" instrument_node=""> (</span><small data-dcnode-id="3674"><a data-dcnode-id="3675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="3676" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="3673" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="3665" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3656"><div class="thumbinner" data-dcnode-id="3657" style="width:222px;"><a class="image" data-dcnode-id="3663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGlastonmud_85.jpg"><img alt="" class="thumbimage" data-dcnode-id="3664" data-file-height="660" data-file-width="1024" decoding="async" height="142" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/13/Glastonmud_85.jpg/220px-Glastonmud_85.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/13/Glastonmud_85.jpg/330px-Glastonmud_85.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/13/Glastonmud_85.jpg/440px-Glastonmud_85.jpg 2x" width="220"></a><span data-dcnode-id="3662" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3658"><div class="magnify" data-dcnode-id="3660"><a class="internal" data-dcnode-id="3661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGlastonmud_85.jpg" title="Enlarge"></a></div><span data-dcnode-id="3659" instrument_node="">Glastonbury Festival in 1985</span></div></div></div><span data-dcnode-id="3655" instrument_node="">
</span><p data-dcnode-id="3623"><span data-dcnode-id="3654" instrument_node="">The tradition of hippie festivals began in the United States in 1965 with Ken Kesey's </span><a data-dcnode-id="3652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Acid_Tests" title="Acid Tests"><span data-dcnode-id="3653" instrument_node="">Acid Tests</span></a><span data-dcnode-id="3651" instrument_node="">, where the </span><a data-dcnode-id="3649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grateful_Dead" title="Grateful Dead"><span data-dcnode-id="3650" instrument_node="">Grateful Dead</span></a><span data-dcnode-id="3648" instrument_node=""> played under the influence of </span><a class="mw-redirect" data-dcnode-id="3646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/LSD" title="LSD"><span data-dcnode-id="3647" instrument_node="">LSD</span></a><span data-dcnode-id="3645" instrument_node=""> and initiated psychedelic jamming.  For the next several decades, many hippies and neo-hippies became part of the </span><a data-dcnode-id="3643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deadhead" title="Deadhead"><span data-dcnode-id="3644" instrument_node="">Deadhead</span></a><span data-dcnode-id="3642" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="3640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phish_Head" title="Phish Head"><span data-dcnode-id="3641" instrument_node="">Phish Head</span></a><span data-dcnode-id="3639" instrument_node=""> communities, attending  music and art festivals held around the country.  The </span><a data-dcnode-id="3637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grateful_Dead" title="Grateful Dead"><span data-dcnode-id="3638" instrument_node="">Grateful Dead</span></a><span data-dcnode-id="3636" instrument_node=""> toured continuously, with few interruptions between 1965 and 1995. </span><a data-dcnode-id="3634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phish" title="Phish"><span data-dcnode-id="3635" instrument_node="">Phish</span></a><span data-dcnode-id="3633" instrument_node=""> toured sporadically between 1983 and 2004.  With the demise of the </span><a data-dcnode-id="3631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grateful_Dead" title="Grateful Dead"><span data-dcnode-id="3632" instrument_node="">Grateful Dead</span></a><span data-dcnode-id="3630" instrument_node=""> and </span><a data-dcnode-id="3628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phish" title="Phish"><span data-dcnode-id="3629" instrument_node="">Phish</span></a><span data-dcnode-id="3627" instrument_node="">, the nomadic touring hippies have been left without a main jam band to follow.  Instead, they attend a growing series of summer festivals, the largest of which is called the </span><a data-dcnode-id="3625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bonnaroo_Music_Festival" title="Bonnaroo Music Festival"><span data-dcnode-id="3626" instrument_node="">Bonnaroo Music &amp; Arts Festival</span></a><span data-dcnode-id="3624" instrument_node="">, which premiered in 2002.
</span></p><p data-dcnode-id="3612"><span data-dcnode-id="3622" instrument_node="">The </span><a data-dcnode-id="3620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oregon_Country_Fair" title="Oregon Country Fair"><span data-dcnode-id="3621" instrument_node="">Oregon Country Fair</span></a><span data-dcnode-id="3619" instrument_node=""> began in 1969 as a benefit for an alternative school.  Currently, the three-day festival features handmade crafts, educational displays and costumed entertainment in a wooded setting near </span><a data-dcnode-id="3617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Veneta%2C_Oregon" title="Veneta, Oregon"><span data-dcnode-id="3618" instrument_node="">Veneta, Oregon</span></a><span data-dcnode-id="3616" instrument_node="">, just west of </span><a data-dcnode-id="3614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eugene%2C_Oregon" title="Eugene, Oregon"><span data-dcnode-id="3615" instrument_node="">Eugene</span></a><span data-dcnode-id="3613" instrument_node="">. Each year the festival becomes the third largest city in Lane County.
</span></p><p data-dcnode-id="3571"><span data-dcnode-id="3611" instrument_node="">The annual </span><a data-dcnode-id="3609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Starwood_Festival" title="Starwood Festival"><span data-dcnode-id="3610" instrument_node="">Starwood Festival</span></a><span data-dcnode-id="3608" instrument_node="">, founded in 1981, is a six-day event held in </span><a data-dcnode-id="3606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pomeroy%2C_Ohio" title="Pomeroy, Ohio"><span data-dcnode-id="3607" instrument_node="">Pomeroy, Ohio</span></a><sup class="reference" data-dcnode-id="3603" id="cite_ref-66"><a data-dcnode-id="3604" href="#cite_note-66"><span data-dcnode-id="3605" instrument_node="">[66]</span></a></sup><span data-dcnode-id="3602" instrument_node=""> indicative of the spiritual quest of hippies through an exploration of non-mainstream religions and world-views. It has offered performances and classes by a variety of hippie and counter-culture icons, from musical guests like </span><a data-dcnode-id="3600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Big_Brother_and_the_Holding_Company" title="Big Brother and the Holding Company"><span data-dcnode-id="3601" instrument_node="">Big Brother and the Holding Company</span></a><span data-dcnode-id="3599" instrument_node="">, </span><a data-dcnode-id="3597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Merl_Saunders" title="Merl Saunders"><span data-dcnode-id="3598" instrument_node="">Merl Saunders</span></a><span data-dcnode-id="3596" instrument_node=""> and </span><a data-dcnode-id="3594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Babatunde_Olatunji" title="Babatunde Olatunji"><span data-dcnode-id="3595" instrument_node="">Babatunde Olatunji</span></a><span data-dcnode-id="3593" instrument_node=""> to speakers such as </span><a data-dcnode-id="3591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Timothy_Leary" title="Timothy Leary"><span data-dcnode-id="3592" instrument_node="">Timothy Leary</span></a><span data-dcnode-id="3590" instrument_node="">, </span><a data-dcnode-id="3588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Terence_McKenna" title="Terence McKenna"><span data-dcnode-id="3589" instrument_node="">Terence McKenna</span></a><span data-dcnode-id="3587" instrument_node="">, </span><a data-dcnode-id="3585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_Krassner" title="Paul Krassner"><span data-dcnode-id="3586" instrument_node="">Paul Krassner</span></a><span data-dcnode-id="3584" instrument_node="">, </span><a data-dcnode-id="3582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stephen_Gaskin" title="Stephen Gaskin"><span data-dcnode-id="3583" instrument_node="">Stephen Gaskin</span></a><span data-dcnode-id="3581" instrument_node="">, </span><a data-dcnode-id="3579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Anton_Wilson" title="Robert Anton Wilson"><span data-dcnode-id="3580" instrument_node="">Robert Anton Wilson</span></a><span data-dcnode-id="3578" instrument_node="">, </span><a data-dcnode-id="3576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harvey_Wasserman" title="Harvey Wasserman"><span data-dcnode-id="3577" instrument_node="">Harvey Wasserman</span></a><span data-dcnode-id="3575" instrument_node=""> and </span><a data-dcnode-id="3573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ralph_Metzner" title="Ralph Metzner"><span data-dcnode-id="3574" instrument_node="">Ralph Metzner</span></a><span data-dcnode-id="3572" instrument_node="">.
</span></p><p data-dcnode-id="3557"><span data-dcnode-id="3570" instrument_node="">The </span><a data-dcnode-id="3568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Burning_Man" title="Burning Man"><span data-dcnode-id="3569" instrument_node="">Burning Man</span></a><span data-dcnode-id="3567" instrument_node=""> festival began in 1986 at a San Francisco beach party.  Now an annual gathering, the event is held in the </span><a data-dcnode-id="3565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Black_Rock_Desert" title="Black Rock Desert"><span data-dcnode-id="3566" instrument_node="">Black Rock Desert</span></a><span data-dcnode-id="3564" instrument_node=""> northeast of </span><a data-dcnode-id="3562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reno%2C_Nevada" title="Reno, Nevada"><span data-dcnode-id="3563" instrument_node="">Reno, Nevada</span></a><span data-dcnode-id="3561" instrument_node="">.  Though few participants would accept the "hippie" label, Burning Man is a contemporary expression of alternative community in the same spirit as early hippie events.  The gathering becomes a temporary city (36,500 occupants in 2005), with  elaborate encampments, displays and many </span><a class="mw-redirect" data-dcnode-id="3559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Art_cars" title="Art cars"><span data-dcnode-id="3560" instrument_node="">art cars</span></a><span data-dcnode-id="3558" instrument_node="">.
</span></p><p data-dcnode-id="3552"><span data-dcnode-id="3556" instrument_node="">Held annually in Manchester, Tennessee, the </span><a data-dcnode-id="3554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bonnaroo_Music_Festival" title="Bonnaroo Music Festival"><span data-dcnode-id="3555" instrument_node="">Bonnaroo Music and Arts Festival</span></a><span data-dcnode-id="3553" instrument_node=""> has become a tradition for many music fans, since its sold-out premiere in 2002.  Approximately 70–80,000 attend Bonnaroo yearly.  The festival producers have made investments in their property, constructing vast telecommunications networks, potable water supplies, sanitation facilities, and safety features such as first aid shelters for every 200-300 fans.
</span></p><p data-dcnode-id="3540"><span data-dcnode-id="3551" instrument_node="">The </span><a data-dcnode-id="3549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/10%2C000_Lakes_Festival" title="10,000 Lakes Festival"><span data-dcnode-id="3550" instrument_node="">10,000 Lakes Festival</span></a><span data-dcnode-id="3548" instrument_node=""> is an annual three-day music festival in </span><a data-dcnode-id="3546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Detroit_Lakes%2C_Minnesota" title="Detroit Lakes, Minnesota"><span data-dcnode-id="3547" instrument_node="">Detroit Lakes, Minnesota</span></a><span data-dcnode-id="3545" instrument_node="">. Also referred to as '10KLF' (K for thousand, LF for Lakes Festival), the festival began in 2003. Attendance in 2006 was around 18,000.</span><sup class="reference" data-dcnode-id="3542" id="cite_ref-67"><a data-dcnode-id="3543" href="#cite_note-67"><span data-dcnode-id="3544" instrument_node="">[67]</span></a></sup><span data-dcnode-id="3541" instrument_node="">
</span></p><span data-dcnode-id="3539" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3525"><div class="thumbinner" data-dcnode-id="3526" style="width:222px;"><a class="image" data-dcnode-id="3537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A1981_People_Pix.jpg"><img alt="" class="thumbimage" data-dcnode-id="3538" data-file-height="511" data-file-width="800" decoding="async" height="141" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/3a/1981_People_Pix.jpg/220px-1981_People_Pix.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/3a/1981_People_Pix.jpg/330px-1981_People_Pix.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/3a/1981_People_Pix.jpg/440px-1981_People_Pix.jpg 2x" width="220"></a><span data-dcnode-id="3536" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3527"><div class="magnify" data-dcnode-id="3534"><a class="internal" data-dcnode-id="3535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A1981_People_Pix.jpg" title="Enlarge"></a></div><span data-dcnode-id="3533" instrument_node="">Hippies at the </span><a data-dcnode-id="3531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nambassa" title="Nambassa"><span data-dcnode-id="3532" instrument_node="">Nambassa</span></a><span data-dcnode-id="3530" instrument_node=""> 1981 Festival </span><a data-dcnode-id="3528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand" title="New Zealand"><span data-dcnode-id="3529" instrument_node="">New Zealand</span></a></div></div></div><span data-dcnode-id="3524" instrument_node="">
</span><p data-dcnode-id="3489"><span data-dcnode-id="3523" instrument_node="">In the UK, there are many </span><a class="mw-redirect" data-dcnode-id="3521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_age_travellers" title="New age travellers"><span data-dcnode-id="3522" instrument_node="">new age travellers</span></a><span data-dcnode-id="3520" instrument_node=""> who are known as hippies to outsiders, but prefer to call themselves the </span><a class="mw-redirect" data-dcnode-id="3518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peace_Convoy" title="Peace Convoy"><span data-dcnode-id="3519" instrument_node="">Peace Convoy</span></a><span data-dcnode-id="3517" instrument_node="">. They started the </span><a data-dcnode-id="3515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stonehenge_Free_Festival" title="Stonehenge Free Festival"><span data-dcnode-id="3516" instrument_node="">Stonehenge Free Festival</span></a><span data-dcnode-id="3514" instrument_node=""> in 1974, especially </span><a data-dcnode-id="3512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wally_Hope" title="Wally Hope"><span data-dcnode-id="3513" instrument_node="">Wally Hope</span></a><span data-dcnode-id="3511" instrument_node="">, until the </span><a data-dcnode-id="3509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/English_Heritage" title="English Heritage"><span data-dcnode-id="3510" instrument_node="">English Heritage</span></a><span data-dcnode-id="3508" instrument_node=""> legally banned the festival, resulting in the </span><a data-dcnode-id="3506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Battle_of_the_Beanfield" title="Battle of the Beanfield"><span data-dcnode-id="3507" instrument_node="">Battle of the Beanfield</span></a><span data-dcnode-id="3505" instrument_node=""> in 1985. With Stonehenge banned as a festival site new age travellers gather at the annual </span><a data-dcnode-id="3503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glastonbury_Festival" title="Glastonbury Festival"><span data-dcnode-id="3504" instrument_node="">Glastonbury Festival</span></a><span data-dcnode-id="3502" instrument_node=""> to see hundreds of live dance, comedy, theatre, circus, cabaret and other performances. Others  argue that it has now become too much of a commercial event, and instead opt for smaller festivals such as </span><a data-dcnode-id="3500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beautiful_Days_%28festival%29" title="Beautiful Days (festival)"><span data-dcnode-id="3501" instrument_node="">Beautiful Days</span></a><span data-dcnode-id="3499" instrument_node="">, </span><a data-dcnode-id="3497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sunrise_Celebration" title="Sunrise Celebration"><span data-dcnode-id="3498" instrument_node="">Sunrise Celebration</span></a><span data-dcnode-id="3496" instrument_node="">, or the </span><a class="mw-redirect" data-dcnode-id="3494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Big_Green_Gathering" title="Big Green Gathering"><span data-dcnode-id="3495" instrument_node="">Big Green Gathering</span></a><span data-dcnode-id="3493" instrument_node="">. In 2005, Glastonbury festival covered 900 acres (3.6&nbsp;km</span><sup data-dcnode-id="3491"><span data-dcnode-id="3492" instrument_node="">2</span></sup><span data-dcnode-id="3490" instrument_node="">) and attracted 150,000 people.
</span></p><p data-dcnode-id="3461"><span data-dcnode-id="3488" instrument_node="">In Australia, the hippie movement began to emerge in the mid to late 60's with the subculture being showcased at the </span><a class="new" data-dcnode-id="3486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPilgrimage_for_Pop_Festival%26action%3Dedit%26redlink%3D1" title="Pilgrimage for Pop Festival (page does not exist)"><span data-dcnode-id="3487" instrument_node="">Pilgrimage for Pop Festival</span></a><span data-dcnode-id="3485" instrument_node=""> held in </span><a data-dcnode-id="3483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ourimbah%2C_New_South_Wales" title="Ourimbah, New South Wales"><span data-dcnode-id="3484" instrument_node="">Ourimbah, New South Wales</span></a><span data-dcnode-id="3482" instrument_node=""> on 24 and 25 Jan 1970.</span><sup class="reference" data-dcnode-id="3479" id="cite_ref-68"><a data-dcnode-id="3480" href="#cite_note-68"><span data-dcnode-id="3481" instrument_node="">[68]</span></a></sup><span data-dcnode-id="3478" instrument_node="">| The scene continued to evolve through the </span><a data-dcnode-id="3476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aquarius_Festival" title="Aquarius Festival"><span data-dcnode-id="3477" instrument_node="">Aquarius Festival</span></a><span data-dcnode-id="3475" instrument_node=""> held in 1971 in </span><a data-dcnode-id="3473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canberra" title="Canberra"><span data-dcnode-id="3474" instrument_node="">Canberra</span></a><span data-dcnode-id="3472" instrument_node=""> and again in </span><a data-dcnode-id="3470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nimbin%2C_New_South_Wales" title="Nimbin, New South Wales"><span data-dcnode-id="3471" instrument_node="">Nimbin</span></a><span data-dcnode-id="3469" instrument_node=""> two years later.</span><sup class="reference" data-dcnode-id="3466" id="cite_ref-bt_69-0"><a data-dcnode-id="3467" href="#cite_note-bt-69"><span data-dcnode-id="3468" instrument_node="">[69]</span></a></sup><span data-dcnode-id="3465" instrument_node=""> Many festival goers stayed in Nimbin, transforming the town and local area. It also resulted in the formation of one of Australia's largest and most successful </span><a class="mw-redirect" data-dcnode-id="3463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Commune_%28intentional_community%29" title="Commune (intentional community)"><span data-dcnode-id="3464" instrument_node="">communes</span></a><span data-dcnode-id="3462" instrument_node="">.
</span></p><p data-dcnode-id="3418"><span data-dcnode-id="3460" instrument_node="">Between 1976 and 1981, hippie music festivals were held on large farms around </span><a data-dcnode-id="3458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Waihi" title="Waihi"><span data-dcnode-id="3459" instrument_node="">Waihi</span></a><span data-dcnode-id="3457" instrument_node=""> and </span><a data-dcnode-id="3455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Waikino" title="Waikino"><span data-dcnode-id="3456" instrument_node="">Waikino</span></a><span data-dcnode-id="3454" instrument_node=""> in </span><a data-dcnode-id="3452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand" title="New Zealand"><span data-dcnode-id="3453" instrument_node="">New Zealand</span></a><span data-dcnode-id="3451" instrument_node="">- </span><a data-dcnode-id="3449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aotearoa" title="Aotearoa"><span data-dcnode-id="3450" instrument_node="">Aotearoa</span></a><span data-dcnode-id="3448" instrument_node="">.  Named </span><i data-dcnode-id="3445"><a data-dcnode-id="3446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nambassa" title="Nambassa"><span data-dcnode-id="3447" instrument_node="">Nambassa</span></a></i><span data-dcnode-id="3444" instrument_node="">, the festivals focused on </span><a data-dcnode-id="3442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peace" title="Peace"><span data-dcnode-id="3443" instrument_node="">peace</span></a><span data-dcnode-id="3441" instrument_node="">, </span><a data-dcnode-id="3439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Love" title="Love"><span data-dcnode-id="3440" instrument_node="">love</span></a><span data-dcnode-id="3438" instrument_node="">, and a balanced lifestyle, featuring </span><a class="mw-redirect" data-dcnode-id="3436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Workshops" title="Workshops"><span data-dcnode-id="3437" instrument_node="">workshops</span></a><span data-dcnode-id="3435" instrument_node=""> and displays advocating </span><a class="mw-redirect" data-dcnode-id="3433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alternative_lifestyles" title="Alternative lifestyles"><span data-dcnode-id="3434" instrument_node="">alternative lifestyles</span></a><span data-dcnode-id="3432" instrument_node="">, clean and </span><a data-dcnode-id="3430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sustainable_energy" title="Sustainable energy"><span data-dcnode-id="3431" instrument_node="">sustainable energy</span></a><span data-dcnode-id="3429" instrument_node="">, and unadulterated foods.  Nambassa is also the tribal name of a trust that has championed sustainable ideas and demonstrated practical </span><a data-dcnode-id="3427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Counterculture" title="Counterculture"><span data-dcnode-id="3428" instrument_node="">counterculture</span></a><span data-dcnode-id="3426" instrument_node=""> and </span><a data-dcnode-id="3424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alternative_lifestyle" title="Alternative lifestyle"><span data-dcnode-id="3425" instrument_node="">alternative lifestyle</span></a><span data-dcnode-id="3423" instrument_node=""> methods since the early 1970s.</span><sup class="reference" data-dcnode-id="3420" id="cite_ref-70"><a data-dcnode-id="3421" href="#cite_note-70"><span data-dcnode-id="3422" instrument_node="">[70]</span></a></sup><span data-dcnode-id="3419" instrument_node="">
</span></p><p data-dcnode-id="3401"><span data-dcnode-id="3417" instrument_node="">Many of the bands performing at hippie festivals, and their derivatives, are called </span><a data-dcnode-id="3415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jam_band" title="Jam band"><span data-dcnode-id="3416" instrument_node="">jam bands</span></a><span data-dcnode-id="3414" instrument_node="">, since they play songs that contain long instrumentals similar to the original hippie bands of the 1960s. </span><a data-dcnode-id="3412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Psychedelic_trance" title="Psychedelic trance"><span data-dcnode-id="3413" instrument_node="">Psychedelic trance</span></a><span data-dcnode-id="3411" instrument_node=""> or "</span><a class="mw-redirect" data-dcnode-id="3409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Psytrance" title="Psytrance"><span data-dcnode-id="3410" instrument_node="">psytrance</span></a><span data-dcnode-id="3408" instrument_node="">", a type of </span><a data-dcnode-id="3406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Techno" title="Techno"><span data-dcnode-id="3407" instrument_node="">techno</span></a><span data-dcnode-id="3405" instrument_node=""> music influenced by 1960s </span><a data-dcnode-id="3403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Psychedelic_rock" title="Psychedelic rock"><span data-dcnode-id="3404" instrument_node="">psychedelic rock</span></a><span data-dcnode-id="3402" instrument_node=""> and hippie culture is also popular among neo-hippies worldwide.  Psytrance hippies usually attend separate festivals where only electronic music is played.
</span></p><span data-dcnode-id="3400" instrument_node="">
