</span><p data-dcnode-id="4727"><span data-dcnode-id="4746" instrument_node="">In December 1969, a similar event took place in </span><a data-dcnode-id="4744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Altamont%2C_California" title="Altamont, California"><span data-dcnode-id="4745" instrument_node="">Altamont, California</span></a><span data-dcnode-id="4743" instrument_node="">, about 30 miles (45&nbsp;km) east of San Francisco.  Initially billed as "Woodstock West", its official name was The Altamont Free Concert.  About 300,000 people gathered to hear </span><a data-dcnode-id="4741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Rolling_Stones" title="The Rolling Stones"><span data-dcnode-id="4742" instrument_node="">The Rolling Stones</span></a><span data-dcnode-id="4740" instrument_node="">; </span><a class="mw-redirect" data-dcnode-id="4738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crosby%2C_Stills%2C_Nash%2C_%2526_Young" title="Crosby, Stills, Nash, &amp; Young"><span data-dcnode-id="4739" instrument_node="">Crosby, Stills, Nash and Young</span></a><span data-dcnode-id="4737" instrument_node="">; </span><a data-dcnode-id="4735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jefferson_Airplane" title="Jefferson Airplane"><span data-dcnode-id="4736" instrument_node="">Jefferson Airplane</span></a><span data-dcnode-id="4734" instrument_node=""> and other bands.  The </span><a class="mw-redirect" data-dcnode-id="4732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hells_Angels" title="Hells Angels"><span data-dcnode-id="4733" instrument_node="">Hells Angels</span></a><span data-dcnode-id="4731" instrument_node=""> provided security that proved far less beneficent than the security provided at the Woodstock event:  18-year-old </span><a class="mw-redirect" data-dcnode-id="4729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Meredith_Curly_Hunter%2C_Jr." title="Meredith Curly Hunter, Jr."><span data-dcnode-id="4730" instrument_node="">Meredith Hunter</span></a><span data-dcnode-id="4728" instrument_node=""> was stabbed and killed while drawing a gun in front of the stage during The Rolling Stones performance, and four accidental deaths occurred.  There were also four births at the concert.
</span></p><span data-dcnode-id="4726" instrument_node="">
</span><h2 data-dcnode-id="4716"><span class="mw-headline" data-dcnode-id="4724" id="1970_to_present"><span data-dcnode-id="4725" instrument_node="">1970 to present</span></span><span class="mw-editsection" data-dcnode-id="4717"><span class="mw-editsection-bracket" data-dcnode-id="4722"><span data-dcnode-id="4723" instrument_node="">[</span></span><a data-dcnode-id="4720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_hippie_movement%26action%3Dedit%26section%3D27" title="Edit section: 1970 to present"><span data-dcnode-id="4721" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4718"><span data-dcnode-id="4719" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4715" instrument_node="">
</span><p data-dcnode-id="4694"><span data-dcnode-id="4714" instrument_node="">By 1970, the 1960s </span><a data-dcnode-id="4712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zeitgeist" title="Zeitgeist"><span data-dcnode-id="4713" instrument_node="">zeitgeist</span></a><span data-dcnode-id="4711" instrument_node=""> that had spawned hippie culture seemed to be on the wane,</span><sup class="reference" data-dcnode-id="4708" id="cite_ref-Bugliosi_1994_44-0"><a data-dcnode-id="4709" href="#cite_note-Bugliosi_1994-44"><span data-dcnode-id="4710" instrument_node="">[44]</span></a></sup><sup class="reference" data-dcnode-id="4705" id="cite_ref-45"><a data-dcnode-id="4706" href="#cite_note-45"><span data-dcnode-id="4707" instrument_node="">[45]</span></a></sup><span data-dcnode-id="4704" instrument_node=""> at least in the US. The events at Altamont shocked many Americans, including those who had strongly identified with hippie culture. Another shock came in the form of the </span><a data-dcnode-id="4702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sharon_Tate" title="Sharon Tate"><span data-dcnode-id="4703" instrument_node="">Sharon Tate</span></a><span data-dcnode-id="4701" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="4699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leno_and_Rosemary_LaBianca" title="Leno and Rosemary LaBianca"><span data-dcnode-id="4700" instrument_node="">Leno and Rosemary LaBianca</span></a><span data-dcnode-id="4698" instrument_node=""> murders committed in August 1969 by </span><a data-dcnode-id="4696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Manson" title="Charles Manson"><span data-dcnode-id="4697" instrument_node="">Charles Manson</span></a><span data-dcnode-id="4695" instrument_node=""> and his "family" of followers.
</span></p><p data-dcnode-id="4674"><span data-dcnode-id="4693" instrument_node="">Nevertheless, the oppressive political atmosphere that featured the bombing of </span><a data-dcnode-id="4691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cambodia" title="Cambodia"><span data-dcnode-id="4692" instrument_node="">Cambodia</span></a><span data-dcnode-id="4690" instrument_node=""> and shootings by </span><a class="mw-redirect" data-dcnode-id="4688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Guard_of_the_United_States" title="National Guard of the United States"><span data-dcnode-id="4689" instrument_node="">National Guardsmen</span></a><span data-dcnode-id="4687" instrument_node=""> at </span><a data-dcnode-id="4685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jackson_State_University" title="Jackson State University"><span data-dcnode-id="4686" instrument_node="">Jackson State University</span></a><span data-dcnode-id="4684" instrument_node=""> and </span><a data-dcnode-id="4682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kent_State_University" title="Kent State University"><span data-dcnode-id="4683" instrument_node="">Kent State University</span></a><span data-dcnode-id="4681" instrument_node=""> still brought people together. These shootings inspired the May 1970 songs by </span><a data-dcnode-id="4679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quicksilver_Messenger_Service" title="Quicksilver Messenger Service"><span data-dcnode-id="4680" instrument_node="">Quicksilver Messenger Service</span></a><span data-dcnode-id="4678" instrument_node=""> "What About Me?", where they sang "You keep adding to my numbers as you shoot my people down" and </span><a class="mw-redirect" data-dcnode-id="4676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crosby%2C_Stills%2C_Nash_and_Young" title="Crosby, Stills, Nash and Young"><span data-dcnode-id="4677" instrument_node="">Crosby, Stills, Nash and Young</span></a><span data-dcnode-id="4675" instrument_node="">'s protest song "Ohio".
</span></p><p data-dcnode-id="4666"><span data-dcnode-id="4673" instrument_node="">Meanwhile, in England, the </span><a data-dcnode-id="4671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Isle_of_Wight_Festival_1970" title="Isle of Wight Festival 1970"><span data-dcnode-id="4672" instrument_node="">Isle of Wight Festival 1970</span></a><span data-dcnode-id="4670" instrument_node=""> (August) drew an even bigger attendance than Woodstock, and was a major gathering of the hippie movement (as well as one of the last major concert appearances for a few prominent musicians of the time, such as </span><a data-dcnode-id="4668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jimi_Hendrix" title="Jimi Hendrix"><span data-dcnode-id="4669" instrument_node="">Jimi Hendrix</span></a><span data-dcnode-id="4667" instrument_node="">).
</span></p><p data-dcnode-id="4648"><span data-dcnode-id="4665" instrument_node="">Also in 1970, coverage of the </span><a data-dcnode-id="4663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chicago_Seven" title="Chicago Seven"><span data-dcnode-id="4664" instrument_node="">Chicago Seven</span></a><span data-dcnode-id="4662" instrument_node=""> trials provided the mainstream media an opportunity to highlight the most radical aspects of the movement.  Yippie leader </span><a data-dcnode-id="4660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jerry_Rubin" title="Jerry Rubin"><span data-dcnode-id="4661" instrument_node="">Jerry Rubin</span></a><span data-dcnode-id="4659" instrument_node="">'s guest appearance on the </span><i data-dcnode-id="4656"><a class="mw-redirect" data-dcnode-id="4657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phil_Donahue_Show" title="Phil Donahue Show"><span data-dcnode-id="4658" instrument_node="">Phil Donahue Show</span></a></i><span data-dcnode-id="4655" instrument_node=""> in that year (April 1) represents the virtual apex of such publicity — surpassed only by his appearance November 7 that same year on </span><i data-dcnode-id="4650"><span data-dcnode-id="4654" instrument_node="">The </span><a data-dcnode-id="4652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_Frost" title="David Frost"><span data-dcnode-id="4653" instrument_node="">David Frost</span></a><span data-dcnode-id="4651" instrument_node=""> Show</span></i><span data-dcnode-id="4649" instrument_node="">, where he lit a joint and tried to pass it to Frost, then summoned an army of expletive-using hippies planted in the audience to swarm the stage, all on live television.
</span></p><span data-dcnode-id="4647" instrument_node="">
</span><h3 data-dcnode-id="4637"><span class="mw-headline" data-dcnode-id="4645" id="Charles_Manson"><span data-dcnode-id="4646" instrument_node="">Charles Manson</span></span><span class="mw-editsection" data-dcnode-id="4638"><span class="mw-editsection-bracket" data-dcnode-id="4643"><span data-dcnode-id="4644" instrument_node="">[</span></span><a data-dcnode-id="4641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_hippie_movement%26action%3Dedit%26section%3D28" title="Edit section: Charles Manson"><span data-dcnode-id="4642" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4639"><span data-dcnode-id="4640" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4636" instrument_node="">
</span><link data-dcnode-id="4635" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4631" role="note"><span data-dcnode-id="4634" instrument_node="">Main article: </span><a data-dcnode-id="4632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Manson" title="Charles Manson"><span data-dcnode-id="4633" instrument_node="">Charles Manson</span></a></div><span data-dcnode-id="4630" instrument_node="">
</span><p data-dcnode-id="4612"><span data-dcnode-id="4629" instrument_node="">Charles Manson was a lifelong criminal who had been released from prison just in time for San Francisco's Summer of Love.  With his long hair, </span><a data-dcnode-id="4627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charisma" title="Charisma"><span data-dcnode-id="4628" instrument_node="">charisma</span></a><span data-dcnode-id="4626" instrument_node=""> and the ability to charm a crowd with his </span><a data-dcnode-id="4624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guitar" title="Guitar"><span data-dcnode-id="4625" instrument_node="">guitar</span></a><span data-dcnode-id="4623" instrument_node=""> playing, his singing and rhetoric, Manson exhibited many of the outward manifestations of hippie identity.  Yet he hardly exemplified the hippie ideals of peace, love, compassion and human fellowship; through twisted logic, </span><a class="mw-redirect" data-dcnode-id="4621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hallucinogenic_drugs" title="Hallucinogenic drugs"><span data-dcnode-id="4622" instrument_node="">hallucinogenic drugs</span></a><span data-dcnode-id="4620" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="4618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Psychological_manipulation" title="Psychological manipulation"><span data-dcnode-id="4619" instrument_node="">psychological manipulation</span></a><span data-dcnode-id="4617" instrument_node="">, he inspired his followers to commit murder. Manson's highly publicized 1970 trial and subsequent conviction in January 1971 irrevocably tarnished the hippie image in the eyes of many Americans.</span><sup class="reference" data-dcnode-id="4614" id="cite_ref-Bugliosi_1994_44-1"><a data-dcnode-id="4615" href="#cite_note-Bugliosi_1994-44"><span data-dcnode-id="4616" instrument_node="">[44]</span></a></sup><span data-dcnode-id="4613" instrument_node="">
</span></p><span data-dcnode-id="4611" instrument_node="">
</span><h3 data-dcnode-id="4601"><span class="mw-headline" data-dcnode-id="4609" id="John_Lennon"><span data-dcnode-id="4610" instrument_node="">John Lennon</span></span><span class="mw-editsection" data-dcnode-id="4602"><span class="mw-editsection-bracket" data-dcnode-id="4607"><span data-dcnode-id="4608" instrument_node="">[</span></span><a data-dcnode-id="4605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_hippie_movement%26action%3Dedit%26section%3D29" title="Edit section: John Lennon"><span data-dcnode-id="4606" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4603"><span data-dcnode-id="4604" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4600" instrument_node="">
</span><link data-dcnode-id="4599" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4595" role="note"><span data-dcnode-id="4598" instrument_node="">Main article: </span><a data-dcnode-id="4596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Lennon%23Political_activism" title="John Lennon"><span data-dcnode-id="4597" instrument_node="">John Lennon §&nbsp;Political activism</span></a></div><span data-dcnode-id="4594" instrument_node="">
</span><p data-dcnode-id="4574"><span data-dcnode-id="4593" instrument_node="">Also around this time, John Lennon of the Beatles and his wife </span><a data-dcnode-id="4591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yoko_Ono" title="Yoko Ono"><span data-dcnode-id="4592" instrument_node="">Yoko Ono</span></a><span data-dcnode-id="4590" instrument_node=""> took up the mantle of a more prominent media role, as a force for continuing the 'humane revolution' that was politically opposed to the 'establishment'. As early as March 1969 the couple had conducted their first "Bed-In for Peace"; in August 1971 they moved to New York City and joined up with the Chicago Trial "Yippie" defendants and other notable activists.  In December 1971, Lennon sang at the </span><a data-dcnode-id="4588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Sinclair_Freedom_Rally" title="John Sinclair Freedom Rally"><span data-dcnode-id="4589" instrument_node="">John Sinclair Freedom Rally</span></a><span data-dcnode-id="4587" instrument_node=""> in </span><a data-dcnode-id="4585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Michigan" title="Michigan"><span data-dcnode-id="4586" instrument_node="">Michigan</span></a><span data-dcnode-id="4584" instrument_node="">, calling attention to </span><a data-dcnode-id="4582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Sinclair_%28poet%29" title="John Sinclair (poet)"><span data-dcnode-id="4583" instrument_node="">Sinclair</span></a><span data-dcnode-id="4581" instrument_node="">'s ten-year prison sentence for giving two </span><a class="mw-redirect" data-dcnode-id="4579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joints" title="Joints"><span data-dcnode-id="4580" instrument_node="">joints</span></a><span data-dcnode-id="4578" instrument_node=""> to an undercover policewoman. Sinclair's release was suddenly approved by the state's authorities three days later, a testimony to the potential force of popular pressure; however, soon thereafter, the Nixon administration responded by seeking to have Lennon deported, on the pretext of a 1968 marijuana conviction in London. This dragged on through half of 1973, only increasing their status as anti-war and counterculture celebrities; by June 1973, the Watergate hearings had begun in earnest, and the famous pair made their final political statement by attending one of them.  In 1975, the deportation case was dropped, and Lennon and Yoko attended the Inaugural Ball of president </span><a data-dcnode-id="4576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jimmy_Carter" title="Jimmy Carter"><span data-dcnode-id="4577" instrument_node="">Jimmy Carter</span></a><span data-dcnode-id="4575" instrument_node=""> in January 1977.
</span></p><span data-dcnode-id="4573" instrument_node="">
</span><h3 data-dcnode-id="4563"><span class="mw-headline" data-dcnode-id="4571" id="Mainstream"><span data-dcnode-id="4572" instrument_node="">Mainstream</span></span><span class="mw-editsection" data-dcnode-id="4564"><span class="mw-editsection-bracket" data-dcnode-id="4569"><span data-dcnode-id="4570" instrument_node="">[</span></span><a data-dcnode-id="4567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_hippie_movement%26action%3Dedit%26section%3D30" title="Edit section: Mainstream"><span data-dcnode-id="4568" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4565"><span data-dcnode-id="4566" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4562" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4550"><div class="thumbinner" data-dcnode-id="4551" style="width:222px;"><a class="image" data-dcnode-id="4560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKen_Westerfield_1977.jpg"><img alt="" class="thumbimage" data-dcnode-id="4561" data-file-height="1116" data-file-width="1696" decoding="async" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/bb/Ken_Westerfield_1977.jpg/220px-Ken_Westerfield_1977.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/bb/Ken_Westerfield_1977.jpg/330px-Ken_Westerfield_1977.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/bb/Ken_Westerfield_1977.jpg/440px-Ken_Westerfield_1977.jpg 2x" width="220"></a><span data-dcnode-id="4559" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4552"><div class="magnify" data-dcnode-id="4557"><a class="internal" data-dcnode-id="4558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKen_Westerfield_1977.jpg" title="Enlarge"></a></div><span data-dcnode-id="4556" instrument_node="">As a hippie </span><a data-dcnode-id="4554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ken_Westerfield" title="Ken Westerfield"><span data-dcnode-id="4555" instrument_node="">Ken Westerfield</span></a><span data-dcnode-id="4553" instrument_node=""> helped to popularize Frisbee as an alternative sport in the 1960s and 1970s</span></div></div></div><span data-dcnode-id="4549" instrument_node="">
</span><p data-dcnode-id="4528"><span data-dcnode-id="4548" instrument_node="">Much of hippie style had been integrated into </span><a data-dcnode-id="4546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mainstream" title="Mainstream"><span data-dcnode-id="4547" instrument_node="">mainstream</span></a><span data-dcnode-id="4545" instrument_node=""> American society by the early 1970s.</span><sup class="reference" data-dcnode-id="4542" id="cite_ref-Tompkins_2001a_46-0"><a data-dcnode-id="4543" href="#cite_note-Tompkins_2001a-46"><span data-dcnode-id="4544" instrument_node="">[46]</span></a></sup><sup class="reference" data-dcnode-id="4539" id="cite_ref-Morford_47-0"><a data-dcnode-id="4540" href="#cite_note-Morford-47"><span data-dcnode-id="4541" instrument_node="">[47]</span></a></sup><sup class="reference" data-dcnode-id="4536" id="cite_ref-48"><a data-dcnode-id="4537" href="#cite_note-48"><span data-dcnode-id="4538" instrument_node="">[48]</span></a></sup><span data-dcnode-id="4535" instrument_node="">  Large rock concerts that originated with the 1967 </span><a class="mw-redirect" data-dcnode-id="4533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monterey_Pop_Festival" title="Monterey Pop Festival"><span data-dcnode-id="4534" instrument_node="">Monterey Pop Festival</span></a><span data-dcnode-id="4532" instrument_node=""> and the 1968 </span><a data-dcnode-id="4530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Isle_of_Wight_Festival" title="Isle of Wight Festival"><span data-dcnode-id="4531" instrument_node="">Isle of Wight Festival</span></a><span data-dcnode-id="4529" instrument_node=""> became the norm. Mustaches, beards, sideburns, and longer hair became mainstream, and colorful, multi-ethnic clothing dominated the fashion world.
</span></p><p data-dcnode-id="4485"><span data-dcnode-id="4527" instrument_node="">Starting in the late 1960s, some working class </span><a data-dcnode-id="4525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Skinhead" title="Skinhead"><span data-dcnode-id="4526" instrument_node="">skinheads</span></a><span data-dcnode-id="4524" instrument_node=""> have attacked hippies.</span><sup class="reference" data-dcnode-id="4521" id="cite_ref-49"><a data-dcnode-id="4522" href="#cite_note-49"><span data-dcnode-id="4523" instrument_node="">[49]</span></a></sup><sup class="reference" data-dcnode-id="4518" id="cite_ref-50"><a data-dcnode-id="4519" href="#cite_note-50"><span data-dcnode-id="4520" instrument_node="">[50]</span></a></sup><sup class="reference" data-dcnode-id="4515" id="cite_ref-51"><a data-dcnode-id="4516" href="#cite_note-51"><span data-dcnode-id="4517" instrument_node="">[51]</span></a></sup><span data-dcnode-id="4514" instrument_node=""> Hippies were also vilified and sometimes attacked by </span><a data-dcnode-id="4512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Punk_subculture" title="Punk subculture"><span data-dcnode-id="4513" instrument_node="">punks</span></a><span data-dcnode-id="4511" instrument_node="">,</span><sup class="reference" data-dcnode-id="4508" id="cite_ref-52"><a data-dcnode-id="4509" href="#cite_note-52"><span data-dcnode-id="4510" instrument_node="">[52]</span></a></sup><span data-dcnode-id="4507" instrument_node=""> </span><a data-dcnode-id="4505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mod_revival" title="Mod revival"><span data-dcnode-id="4506" instrument_node="">revivalist mods</span></a><span data-dcnode-id="4504" instrument_node="">, </span><a data-dcnode-id="4502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greaser_%28subculture%29" title="Greaser (subculture)"><span data-dcnode-id="4503" instrument_node="">greasers</span></a><span data-dcnode-id="4501" instrument_node="">, </span><a data-dcnode-id="4499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Casual_%28subculture%29" title="Casual (subculture)"><span data-dcnode-id="4500" instrument_node="">football casuals</span></a><span data-dcnode-id="4498" instrument_node="">, </span><a data-dcnode-id="4496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Teddy_Boy" title="Teddy Boy"><span data-dcnode-id="4497" instrument_node="">Teddy Boys</span></a><span data-dcnode-id="4495" instrument_node=""> and members of other American and European youth cultures in the 1970s and 1980s. Hippie ideals were a marked influence on </span><a data-dcnode-id="4493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anarcho-punk" title="Anarcho-punk"><span data-dcnode-id="4494" instrument_node="">anarcho-punk</span></a><span data-dcnode-id="4492" instrument_node=""> and some </span><a data-dcnode-id="4490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Post-punk" title="Post-punk"><span data-dcnode-id="4491" instrument_node="">post-punk</span></a><span data-dcnode-id="4489" instrument_node=""> youth cultures, such as the </span><a data-dcnode-id="4487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_Summer_of_Love" title="Second Summer of Love"><span data-dcnode-id="4488" instrument_node="">Second Summer of Love</span></a><span data-dcnode-id="4486" instrument_node="">.
</span></p><p data-dcnode-id="4453"><span data-dcnode-id="4484" instrument_node="">In the mid-1970s, with the end of the draft and the </span><a data-dcnode-id="4482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vietnam_War" title="Vietnam War"><span data-dcnode-id="4483" instrument_node="">Vietnam War</span></a><span data-dcnode-id="4481" instrument_node="">, and a renewal of </span><a data-dcnode-id="4479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Patriotism" title="Patriotism"><span data-dcnode-id="4480" instrument_node="">patriotic</span></a><span data-dcnode-id="4478" instrument_node=""> sentiment associated with the approach of the </span><a data-dcnode-id="4476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Bicentennial" title="United States Bicentennial"><span data-dcnode-id="4477" instrument_node="">United States Bicentennial</span></a><span data-dcnode-id="4475" instrument_node="">, the mainstream media lost interest in the hippie counterculture, and hippies became targets for ridicule, coinciding with the advent of </span><a data-dcnode-id="4473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Punk_rock" title="Punk rock"><span data-dcnode-id="4474" instrument_node="">punk rock</span></a><span data-dcnode-id="4472" instrument_node=""> and </span><a data-dcnode-id="4470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Disco" title="Disco"><span data-dcnode-id="4471" instrument_node="">disco</span></a><span data-dcnode-id="4469" instrument_node="">.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4462" style="white-space:nowrap;"><span data-dcnode-id="4468" instrument_node="">[</span><i data-dcnode-id="4464"><a data-dcnode-id="4465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4466" title="This claim needs references to reliable sources. (September 2016)"><span data-dcnode-id="4467" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4463" instrument_node="">]</span></sup><span data-dcnode-id="4461" instrument_node=""> Although not as visible as it once was, hippie culture has never died out completely: hippies and neo-hippies can still be found on college campuses, on communes and at festivals; while many still embrace the hippie values of peace, love and community. Although many of the original hippies and those who were core to the movement remained (or remain) dedicated to the values they originally espoused, many of those who played more peripheral roles are often seen as having "sold out" during the 1980s by becoming a part of the corporate, materialist culture they initially rejected.</span><sup class="reference" data-dcnode-id="4458" id="cite_ref-Lattin_2004_53-0"><a data-dcnode-id="4459" href="#cite_note-Lattin_2004-53"><span data-dcnode-id="4460" instrument_node="">[53]</span></a></sup><sup class="reference" data-dcnode-id="4455" id="cite_ref-Heath_Potter_2004_54-0"><a data-dcnode-id="4456" href="#cite_note-Heath_Potter_2004-54"><span data-dcnode-id="4457" instrument_node="">[54]</span></a></sup><span data-dcnode-id="4454" instrument_node="">
</span></p><span data-dcnode-id="4452" instrument_node="">
</span><h4 data-dcnode-id="4442"><span class="mw-headline" data-dcnode-id="4450" id="Mainstream_popularity_of_psychedelic_music"><span data-dcnode-id="4451" instrument_node="">Mainstream popularity of psychedelic music</span></span><span class="mw-editsection" data-dcnode-id="4443"><span class="mw-editsection-bracket" data-dcnode-id="4448"><span data-dcnode-id="4449" instrument_node="">[</span></span><a data-dcnode-id="4446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_hippie_movement%26action%3Dedit%26section%3D31" title="Edit section: Mainstream popularity of psychedelic music"><span data-dcnode-id="4447" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4444"><span data-dcnode-id="4445" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4441" instrument_node="">
</span><p data-dcnode-id="4388"><span data-dcnode-id="4440" instrument_node="">Psychedelic hard rock was the first of the psychedelic subgenres to reach the top of the U.S. Billboard Hot 100 songs in June 1966 with "</span><a data-dcnode-id="4438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paint_It_Black" title="Paint It Black"><span data-dcnode-id="4439" instrument_node="">Paint It Black</span></a><span data-dcnode-id="4437" instrument_node="">" by </span><a data-dcnode-id="4435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Rolling_Stones" title="The Rolling Stones"><span data-dcnode-id="4436" instrument_node="">the Rolling Stones</span></a><span data-dcnode-id="4434" instrument_node="">. The Stones had previously had </span><a data-dcnode-id="4432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hard_rock" title="Hard rock"><span data-dcnode-id="4433" instrument_node="">hard rock</span></a><span data-dcnode-id="4431" instrument_node=""> hits such as "</span><a data-dcnode-id="4429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/%28I_Can%2527t_Get_No%29_Satisfaction" title="(I Can't Get No) Satisfaction"><span data-dcnode-id="4430" instrument_node="">(I Can't Get No) Satisfaction</span></a><span data-dcnode-id="4428" instrument_node="">" (1965), and with "Paint It Black", they now combined hard rock with psychedelia. Other psychedelic rock #1 hits over the years were: 1967 - "</span><a data-dcnode-id="4426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ruby_Tuesday_%28song%29" title="Ruby Tuesday (song)"><span data-dcnode-id="4427" instrument_node="">Ruby Tuesday</span></a><span data-dcnode-id="4425" instrument_node="">" (The Rolling Stones), "</span><a data-dcnode-id="4423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Light_My_Fire" title="Light My Fire"><span data-dcnode-id="4424" instrument_node="">Light My Fire</span></a><span data-dcnode-id="4422" instrument_node="">" (</span><a data-dcnode-id="4420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Doors" title="The Doors"><span data-dcnode-id="4421" instrument_node="">The Doors</span></a><span data-dcnode-id="4419" instrument_node="">), "</span><a class="mw-redirect" data-dcnode-id="4417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Letter_%28The_Box_Tops_song%29" title="The Letter (The Box Tops song)"><span data-dcnode-id="4418" instrument_node="">The Letter</span></a><span data-dcnode-id="4416" instrument_node="">" (</span><a data-dcnode-id="4414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Box_Tops" title="The Box Tops"><span data-dcnode-id="4415" instrument_node="">The Box Tops</span></a><span data-dcnode-id="4413" instrument_node="">); 1968 - "</span><a data-dcnode-id="4411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hello%2C_I_Love_You" title="Hello, I Love You"><span data-dcnode-id="4412" instrument_node="">Hello, I Love You</span></a><span data-dcnode-id="4410" instrument_node="">" (The Doors), "</span><a data-dcnode-id="4408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/People_Got_to_Be_Free" title="People Got to Be Free"><span data-dcnode-id="4409" instrument_node="">People Got to Be Free</span></a><span data-dcnode-id="4407" instrument_node="">" (</span><a data-dcnode-id="4405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Rascals" title="The Rascals"><span data-dcnode-id="4406" instrument_node="">The Rascals</span></a><span data-dcnode-id="4404" instrument_node="">); 1969 - "</span><a data-dcnode-id="4402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crimson_and_Clover" title="Crimson and Clover"><span data-dcnode-id="4403" instrument_node="">Crimson and Clover</span></a><span data-dcnode-id="4401" instrument_node="">" (</span><a data-dcnode-id="4399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tommy_James_and_the_Shondells" title="Tommy James and the Shondells"><span data-dcnode-id="4400" instrument_node="">Tommy James and the Shondells</span></a><span data-dcnode-id="4398" instrument_node="">, psychedelic </span><a data-dcnode-id="4396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Garage_rock" title="Garage rock"><span data-dcnode-id="4397" instrument_node="">garage rock</span></a><span data-dcnode-id="4395" instrument_node="">); 1970 - "</span><a data-dcnode-id="4393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Venus_%28Shocking_Blue_song%29" title="Venus (Shocking Blue song)"><span data-dcnode-id="4394" instrument_node="">Venus</span></a><span data-dcnode-id="4392" instrument_node="">" (</span><a data-dcnode-id="4390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shocking_Blue" title="Shocking Blue"><span data-dcnode-id="4391" instrument_node="">Shocking Blue</span></a><span data-dcnode-id="4389" instrument_node="">).
</span></p><p data-dcnode-id="4386"><span data-dcnode-id="4387" instrument_node="">For the next several years, as new psychedelic subgenres began to mushroom, combining with other styles, the charts saw numerous #1 hits reflecting their level of popularity with young music listeners. These subgenres included:
</span></p><span data-dcnode-id="4385" instrument_node="">
