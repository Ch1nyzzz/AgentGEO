</span><div class="hatnote navigation-not-searchable" data-dcnode-id="6690" role="note"><span data-dcnode-id="6696" instrument_node="">See also: </span><a class="mw-redirect" data-dcnode-id="6694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_subcultures_in_the_20th_century" title="History of subcultures in the 20th century"><span data-dcnode-id="6695" instrument_node="">History of subcultures in the 20th century</span></a><span data-dcnode-id="6693" instrument_node=""> and </span><a data-dcnode-id="6691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_the_United_States_%281964%25E2%2580%25931980%29" title="History of the United States (1964–1980)"><span data-dcnode-id="6692" instrument_node="">History of the United States (1964–1980)</span></a></div><span data-dcnode-id="6689" instrument_node="">
</span><p data-dcnode-id="6678"><span data-dcnode-id="6688" instrument_node="">The </span><a data-dcnode-id="6686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hippie" title="Hippie"><span data-dcnode-id="6687" instrument_node="">hippie</span></a><span data-dcnode-id="6685" instrument_node=""> </span><a data-dcnode-id="6683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Subculture" title="Subculture"><span data-dcnode-id="6684" instrument_node="">subculture</span></a><span data-dcnode-id="6682" instrument_node=""> began its development as a </span><a class="mw-redirect" data-dcnode-id="6680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Youth_movement" title="Youth movement"><span data-dcnode-id="6681" instrument_node="">youth movement</span></a><span data-dcnode-id="6679" instrument_node=""> in the United States during the early 1960s and then developed around the world.
</span></p><p data-dcnode-id="6657"><span data-dcnode-id="6677" instrument_node="">Its origins may be traced to European social movements in the 19th and early 20th century such as </span><a data-dcnode-id="6675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bohemianism" title="Bohemianism"><span data-dcnode-id="6676" instrument_node="">Bohemians</span></a><span data-dcnode-id="6674" instrument_node="">, the influence of </span><a class="mw-redirect" data-dcnode-id="6672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_religion" title="Eastern religion"><span data-dcnode-id="6673" instrument_node="">Eastern religion</span></a><span data-dcnode-id="6671" instrument_node=""> and spirituality. It is directly influenced and inspired by the </span><a data-dcnode-id="6669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beat_Generation" title="Beat Generation"><span data-dcnode-id="6670" instrument_node="">Beat Generation</span></a><span data-dcnode-id="6668" instrument_node="">, and American involvement in the </span><a data-dcnode-id="6666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vietnam_War" title="Vietnam War"><span data-dcnode-id="6667" instrument_node="">Vietnam War</span></a><span data-dcnode-id="6665" instrument_node="">.</span><sup class="reference" data-dcnode-id="6662" id="cite_ref-1"><a data-dcnode-id="6663" href="#cite_note-1"><span data-dcnode-id="6664" instrument_node="">[1]</span></a></sup><span data-dcnode-id="6661" instrument_node=""> From around 1967, its fundamental ethos — including harmony with nature, communal living, artistic experimentation particularly in music, sexual experimentation, and the widespread use of recreational drugs — spread around the world during the </span><a data-dcnode-id="6659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Counterculture_of_the_1960s" title="Counterculture of the 1960s"><span data-dcnode-id="6660" instrument_node="">counterculture of the 1960s</span></a><span data-dcnode-id="6658" instrument_node="">, which has become closely associated with the subculture.
</span></p><span data-dcnode-id="6656" instrument_node="">

</span><link data-dcnode-id="6292" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6285" role="note"><span data-dcnode-id="6291" instrument_node="">Main articles: </span><a data-dcnode-id="6289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Counterculture" title="Counterculture"><span data-dcnode-id="6290" instrument_node="">Counterculture</span></a><span data-dcnode-id="6288" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="6286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Flappers" title="Flappers"><span data-dcnode-id="6287" instrument_node="">Flappers</span></a></div><span data-dcnode-id="6284" instrument_node="">
</span><h3 data-dcnode-id="6274"><span class="mw-headline" data-dcnode-id="6282" id="Classical_culture"><span data-dcnode-id="6283" instrument_node="">Classical culture</span></span><span class="mw-editsection" data-dcnode-id="6275"><span class="mw-editsection-bracket" data-dcnode-id="6280"><span data-dcnode-id="6281" instrument_node="">[</span></span><a data-dcnode-id="6278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_hippie_movement%26action%3Dedit%26section%3D2" title="Edit section: Classical culture"><span data-dcnode-id="6279" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6276"><span data-dcnode-id="6277" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6273" instrument_node="">
</span><p data-dcnode-id="6203"><span data-dcnode-id="6272" instrument_node="">The hippie movement has found historical precedents as far back as the </span><a data-dcnode-id="6270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mazdak" title="Mazdak"><span data-dcnode-id="6271" instrument_node="">Mazdakist</span></a><span data-dcnode-id="6269" instrument_node=""> movement in </span><a class="mw-redirect" data-dcnode-id="6267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Persia" title="Persia"><span data-dcnode-id="6268" instrument_node="">Persia</span></a><span data-dcnode-id="6266" instrument_node="">, whose leader the Persian reformer Mazdak, advocated communal living, the sharing of resources, </span><a data-dcnode-id="6264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vegetarianism" title="Vegetarianism"><span data-dcnode-id="6265" instrument_node="">vegetarianism</span></a><span data-dcnode-id="6263" instrument_node="">, and </span><a data-dcnode-id="6261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Free_love" title="Free love"><span data-dcnode-id="6262" instrument_node="">free love</span></a><span data-dcnode-id="6260" instrument_node="">.</span><sup class="reference" data-dcnode-id="6257" id="cite_ref-2"><a data-dcnode-id="6258" href="#cite_note-2"><span data-dcnode-id="6259" instrument_node="">[2]</span></a></sup><span data-dcnode-id="6256" instrument_node=""> A 1967 article in </span><i data-dcnode-id="6254"><span data-dcnode-id="6255" instrument_node="">Time Magazine</span></i><span data-dcnode-id="6253" instrument_node=""> asserted that the hippie movement has a historical precedent in the counterculture of the </span><a data-dcnode-id="6251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ancient_Greece" title="Ancient Greece"><span data-dcnode-id="6252" instrument_node="">Ancient Greeks</span></a><span data-dcnode-id="6250" instrument_node="">, espoused by philosophers like </span><a class="mw-redirect" data-dcnode-id="6248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diogenes_of_Sinope" title="Diogenes of Sinope"><span data-dcnode-id="6249" instrument_node="">Diogenes of Sinope</span></a><span data-dcnode-id="6247" instrument_node=""> and the </span><a data-dcnode-id="6245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cynicism_%28philosophy%29" title="Cynicism (philosophy)"><span data-dcnode-id="6246" instrument_node="">Cynics</span></a><span data-dcnode-id="6244" instrument_node="">.</span><sup class="reference" data-dcnode-id="6241" id="cite_ref-Time_1968_3-0"><a data-dcnode-id="6242" href="#cite_note-Time_1968-3"><span data-dcnode-id="6243" instrument_node="">[3]</span></a></sup><span data-dcnode-id="6240" instrument_node=""> The article also claimed that the hippies were influenced by the ideals  of </span><a class="mw-redirect" data-dcnode-id="6238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jesus_Christ" title="Jesus Christ"><span data-dcnode-id="6239" instrument_node="">Jesus Christ</span></a><span data-dcnode-id="6237" instrument_node="">, </span><a data-dcnode-id="6235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hillel_the_Elder" title="Hillel the Elder"><span data-dcnode-id="6236" instrument_node="">Hillel the Elder</span></a><span data-dcnode-id="6234" instrument_node="">, </span><a data-dcnode-id="6232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gautama_Buddha" title="Gautama Buddha"><span data-dcnode-id="6233" instrument_node="">Buddha</span></a><span data-dcnode-id="6231" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="6229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/St._Francis_of_Assisi" title="St. Francis of Assisi"><span data-dcnode-id="6230" instrument_node="">St. Francis of Assisi</span></a><span data-dcnode-id="6228" instrument_node="">, </span><a data-dcnode-id="6226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henry_David_Thoreau" title="Henry David Thoreau"><span data-dcnode-id="6227" instrument_node="">Henry David Thoreau</span></a><span data-dcnode-id="6225" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="6223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gandhi" title="Gandhi"><span data-dcnode-id="6224" instrument_node="">Gandhi</span></a><span data-dcnode-id="6222" instrument_node="">, and others.</span><sup class="reference" data-dcnode-id="6219" id="cite_ref-Time_1968_3-1"><a data-dcnode-id="6220" href="#cite_note-Time_1968-3"><span data-dcnode-id="6221" instrument_node="">[3]</span></a></sup><span data-dcnode-id="6218" instrument_node=""> Some</span><sup class="noprint Inline-Template" data-dcnode-id="6211" style="white-space:nowrap;"><span data-dcnode-id="6217" instrument_node="">[</span><i data-dcnode-id="6213"><a data-dcnode-id="6214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AManual_of_Style/Words_to_watch%23Unsupported_attributions" title="Wikipedia:Manual of Style/Words to watch"><span data-dcnode-id="6215" title="The material near this tag possibly uses too-vague attribution or weasel words. (July 2010)"><span data-dcnode-id="6216" instrument_node="">who?</span></span></a></i><span data-dcnode-id="6212" instrument_node="">]</span></sup><span data-dcnode-id="6210" instrument_node=""> have pointed to the short-lived Merrymount colony in 1625 (allegorically portrayed by </span><a data-dcnode-id="6208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nathaniel_Hawthorne" title="Nathaniel Hawthorne"><span data-dcnode-id="6209" instrument_node="">Nathaniel Hawthorne</span></a><span data-dcnode-id="6207" instrument_node=""> in "</span><a class="mw-redirect" data-dcnode-id="6205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Maypole_of_Merry_Mount" title="The Maypole of Merry Mount"><span data-dcnode-id="6206" instrument_node="">The Maypole of Merry Mount</span></a><span data-dcnode-id="6204" instrument_node="">)" as the first hippie experience on the American continent.
</span></p><span data-dcnode-id="6202" instrument_node="">
</span><h3 data-dcnode-id="6192"><span class="mw-headline" data-dcnode-id="6200" id="19th-_and_early_20th-century_Europe"><span data-dcnode-id="6201" instrument_node="">19th- and early 20th-century Europe</span></span><span class="mw-editsection" data-dcnode-id="6193"><span class="mw-editsection-bracket" data-dcnode-id="6198"><span data-dcnode-id="6199" instrument_node="">[</span></span><a data-dcnode-id="6196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_hippie_movement%26action%3Dedit%26section%3D3" title="Edit section: 19th- and early 20th-century Europe"><span data-dcnode-id="6197" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6194"><span data-dcnode-id="6195" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6191" instrument_node="">
</span><link data-dcnode-id="6190" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6186" role="note"><span data-dcnode-id="6189" instrument_node="">Main article: </span><a data-dcnode-id="6187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lebensreform" title="Lebensreform"><span data-dcnode-id="6188" instrument_node="">Lebensreform</span></a></div><span data-dcnode-id="6185" instrument_node="">
</span><p data-dcnode-id="6139"><span data-dcnode-id="6184" instrument_node="">In the late 1800s and early 1900s the German </span><i data-dcnode-id="6181"><a data-dcnode-id="6182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lebensreform" title="Lebensreform"><span data-dcnode-id="6183" instrument_node="">Lebensreform</span></a></i><span data-dcnode-id="6180" instrument_node=""> movement emphasized the goodness of nature, the harms to society, people, and to nature caused by industrialization, the importance of the whole person, body and mind, and the goodness of "the old ways".</span><sup class="reference" data-dcnode-id="6177" id="cite_ref-Williams2007_4-0"><a data-dcnode-id="6178" href="#cite_note-Williams2007-4"><span data-dcnode-id="6179" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="6174" id="cite_ref-5"><a data-dcnode-id="6175" href="#cite_note-5"><span data-dcnode-id="6176" instrument_node="">[5]</span></a></sup><sup class="reference" data-dcnode-id="6171" id="cite_ref-fitz_6-0"><a data-dcnode-id="6172" href="#cite_note-fitz-6"><span data-dcnode-id="6173" instrument_node="">[6]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6168"><span data-dcnode-id="6169" title="Page / location: 32–33"><span data-dcnode-id="6170" instrument_node="">: 32–33 </span></span></sup><sup class="reference" data-dcnode-id="6165" id="cite_ref-7"><a data-dcnode-id="6166" href="#cite_note-7"><span data-dcnode-id="6167" instrument_node="">[7]</span></a></sup><span data-dcnode-id="6164" instrument_node=""> The German youth movement known as </span><i data-dcnode-id="6161"><a data-dcnode-id="6162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wandervogel" title="Wandervogel"><span data-dcnode-id="6163" instrument_node="">Der Wandervogel</span></a></i><span data-dcnode-id="6160" instrument_node=""> grew out of </span><i data-dcnode-id="6158"><span data-dcnode-id="6159" instrument_node="">Lebensreform</span></i><span data-dcnode-id="6157" instrument_node=""> as a countercultural reaction to the organized social and cultural clubs that centered on German folk music. In contrast to these formal clubs, Wandervogel emphasized amateur music and singing, creative dress, and communal outings involving hiking and camping.</span><sup class="reference" data-dcnode-id="6154" id="cite_ref-8"><a data-dcnode-id="6155" href="#cite_note-8"><span data-dcnode-id="6156" instrument_node="">[8]</span></a></sup><span data-dcnode-id="6153" instrument_node="">  Inspired by the works of </span><a data-dcnode-id="6151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Friedrich_Nietzsche" title="Friedrich Nietzsche"><span data-dcnode-id="6152" instrument_node="">Friedrich Nietzsche</span></a><span data-dcnode-id="6150" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="6148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Goethe" title="Goethe"><span data-dcnode-id="6149" instrument_node="">Goethe</span></a><span data-dcnode-id="6147" instrument_node="">, </span><a data-dcnode-id="6145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hermann_Hesse" title="Hermann Hesse"><span data-dcnode-id="6146" instrument_node="">Hermann Hesse</span></a><span data-dcnode-id="6144" instrument_node="">, and Eduard Baltzer, Wandervogel attracted thousands of young Germans who rejected the rapid trend toward urbanization and yearned for the pagan, back-to-nature spiritual life of their ancestors.</span><sup class="reference" data-dcnode-id="6141" id="cite_ref-Kennedy_Ryan_9-0"><a data-dcnode-id="6142" href="#cite_note-Kennedy_Ryan-9"><span data-dcnode-id="6143" instrument_node="">[9]</span></a></sup><span data-dcnode-id="6140" instrument_node="">
</span></p><span data-dcnode-id="6138" instrument_node="">
</span><h3 data-dcnode-id="6128"><span class="mw-headline" data-dcnode-id="6136" id="Nature_Boys_of_Southern_California"><span data-dcnode-id="6137" instrument_node="">Nature Boys of Southern California</span></span><span class="mw-editsection" data-dcnode-id="6129"><span class="mw-editsection-bracket" data-dcnode-id="6134"><span data-dcnode-id="6135" instrument_node="">[</span></span><a data-dcnode-id="6132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_hippie_movement%26action%3Dedit%26section%3D4" title="Edit section: Nature Boys of Southern California"><span data-dcnode-id="6133" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6130"><span data-dcnode-id="6131" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6127" instrument_node="">
</span><p data-dcnode-id="6078"><span data-dcnode-id="6126" instrument_node="">During the first several decades of the 20th century, these beliefs were introduced to the United States as </span><a data-dcnode-id="6124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/German_Americans" title="German Americans"><span data-dcnode-id="6125" instrument_node="">Germans settled around the country</span></a><span data-dcnode-id="6123" instrument_node="">, some opening the first </span><a data-dcnode-id="6121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Health_food_store" title="Health food store"><span data-dcnode-id="6122" instrument_node="">health food stores</span></a><span data-dcnode-id="6120" instrument_node="">. (For example, </span><a data-dcnode-id="6118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Santa_Barbara%2C_California" title="Santa Barbara, California"><span data-dcnode-id="6119" instrument_node="">Santa Barbara</span></a><span data-dcnode-id="6117" instrument_node="">'s first health food store was opened in 1934 by </span><a class="new" data-dcnode-id="6115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHermann_Sexauer%26action%3Dedit%26redlink%3D1" title="Hermann Sexauer (page does not exist)"><span data-dcnode-id="6116" instrument_node="">Hermann Sexauer</span></a><span data-dcnode-id="6114" instrument_node="">, who was born in </span><a data-dcnode-id="6112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Teningen" title="Teningen"><span data-dcnode-id="6113" instrument_node="">Teningen</span></a><span data-dcnode-id="6111" instrument_node="">, Germany on 4 March 1883 and died in December 1971; he left Germany in 1906, arrived in New York, ended up in California and lived a </span><a class="mw-redirect" data-dcnode-id="6109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pacifist" title="Pacifist"><span data-dcnode-id="6110" instrument_node="">pacifist</span></a><span data-dcnode-id="6108" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="6106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Raw_vegan" title="Raw vegan"><span data-dcnode-id="6107" instrument_node="">raw vegan</span></a><span data-dcnode-id="6105" instrument_node="">, non-conformist lifestyle.)</span><sup class="reference" data-dcnode-id="6102" id="cite_ref-10"><a data-dcnode-id="6103" href="#cite_note-10"><span data-dcnode-id="6104" instrument_node="">[10]</span></a></sup><span data-dcnode-id="6101" instrument_node=""> Many moved to Southern California, where they could practice an alternative lifestyle in a warm climate. In turn, young Americans adopted the beliefs and practices of the new immigrants. One group, called the Nature Boys, who included </span><a data-dcnode-id="6099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Pester" title="William Pester"><span data-dcnode-id="6100" instrument_node="">William Pester</span></a><span data-dcnode-id="6098" instrument_node="">, took to the California desert, raised organic food, and espoused a back-to-nature lifestyle. </span><a data-dcnode-id="6096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eden_ahbez" title="Eden ahbez"><span data-dcnode-id="6097" instrument_node="">eden ahbez</span></a><span data-dcnode-id="6095" instrument_node="">, a member of this group, wrote a hit song, "</span><a data-dcnode-id="6093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nature_Boy" title="Nature Boy"><span data-dcnode-id="6094" instrument_node="">Nature Boy</span></a><span data-dcnode-id="6092" instrument_node="">'", which was recorded in 1947 by </span><a data-dcnode-id="6090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nat_King_Cole" title="Nat King Cole"><span data-dcnode-id="6091" instrument_node="">Nat King Cole</span></a><span data-dcnode-id="6089" instrument_node="">, popularizing the homegrown back-to-nature movement to mainstream America. Eventually, a few of these Nature Boys, including the famous </span><a data-dcnode-id="6087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gypsy_Boots" title="Gypsy Boots"><span data-dcnode-id="6088" instrument_node="">Gypsy Boots</span></a><span data-dcnode-id="6086" instrument_node="">, made their way to Northern California in 1967, just in time for the </span><a data-dcnode-id="6084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Summer_of_Love" title="Summer of Love"><span data-dcnode-id="6085" instrument_node="">Summer of Love</span></a><span data-dcnode-id="6083" instrument_node=""> in San Francisco.</span><sup class="reference" data-dcnode-id="6080" id="cite_ref-11"><a data-dcnode-id="6081" href="#cite_note-11"><span data-dcnode-id="6082" instrument_node="">[11]</span></a></sup><span data-dcnode-id="6079" instrument_node="">
</span></p><span data-dcnode-id="6077" instrument_node="">
</span><h3 data-dcnode-id="6067"><span class="mw-headline" data-dcnode-id="6075" id="Beat_Generation"><span data-dcnode-id="6076" instrument_node="">Beat Generation</span></span><span class="mw-editsection" data-dcnode-id="6068"><span class="mw-editsection-bracket" data-dcnode-id="6073"><span data-dcnode-id="6074" instrument_node="">[</span></span><a data-dcnode-id="6071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_hippie_movement%26action%3Dedit%26section%3D5" title="Edit section: Beat Generation"><span data-dcnode-id="6072" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6069"><span data-dcnode-id="6070" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6066" instrument_node="">
</span><link data-dcnode-id="6065" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6061" role="note"><span data-dcnode-id="6064" instrument_node="">Further information: </span><a data-dcnode-id="6062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/San_Francisco_Renaissance" title="San Francisco Renaissance"><span data-dcnode-id="6063" instrument_node="">San Francisco Renaissance</span></a></div><span data-dcnode-id="6060" instrument_node="">
</span><p data-dcnode-id="6025"><span data-dcnode-id="6059" instrument_node="">The </span><a data-dcnode-id="6057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beat_Generation" title="Beat Generation"><span data-dcnode-id="6058" instrument_node="">Beat Generation</span></a><span data-dcnode-id="6056" instrument_node="">, especially those associated with the </span><a data-dcnode-id="6054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/San_Francisco_Renaissance" title="San Francisco Renaissance"><span data-dcnode-id="6055" instrument_node="">San Francisco Renaissance</span></a><span data-dcnode-id="6053" instrument_node="">, gradually gave way to the </span><a data-dcnode-id="6051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Counterculture_of_the_1960s" title="Counterculture of the 1960s"><span data-dcnode-id="6052" instrument_node="">1960s era counterculture</span></a><span data-dcnode-id="6050" instrument_node="">, accompanied by a shift in terminology from "beatnik" to "</span><a data-dcnode-id="6048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freak_scene" title="Freak scene"><span data-dcnode-id="6049" instrument_node="">freak</span></a><span data-dcnode-id="6047" instrument_node="">" and "hippie". Many of the original Beats remained active participants, notably </span><a data-dcnode-id="6045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allen_Ginsberg" title="Allen Ginsberg"><span data-dcnode-id="6046" instrument_node="">Allen Ginsberg</span></a><span data-dcnode-id="6044" instrument_node="">, who became a fixture of the </span><a data-dcnode-id="6042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anti-war_movement" title="Anti-war movement"><span data-dcnode-id="6043" instrument_node="">anti-war movement</span></a><span data-dcnode-id="6041" instrument_node="">. On the other hand, </span><a data-dcnode-id="6039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jack_Kerouac" title="Jack Kerouac"><span data-dcnode-id="6040" instrument_node="">Jack Kerouac</span></a><span data-dcnode-id="6038" instrument_node=""> broke with Ginsberg and criticized the 1960s protest movements as an "excuse for spitefulness". </span><a data-dcnode-id="6036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bob_Dylan" title="Bob Dylan"><span data-dcnode-id="6037" instrument_node="">Bob Dylan</span></a><span data-dcnode-id="6035" instrument_node=""> became close friends with Allen Ginsberg, and Ginsberg became close friends with </span><a data-dcnode-id="6033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Timothy_Leary" title="Timothy Leary"><span data-dcnode-id="6034" instrument_node="">Timothy Leary</span></a><span data-dcnode-id="6032" instrument_node="">. Both Leary and Ginsberg were introduced to </span><a class="mw-redirect" data-dcnode-id="6030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/LSD" title="LSD"><span data-dcnode-id="6031" instrument_node="">LSD</span></a><span data-dcnode-id="6029" instrument_node=""> by </span><a data-dcnode-id="6027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Michael_Hollingshead" title="Michael Hollingshead"><span data-dcnode-id="6028" instrument_node="">Michael Hollingshead</span></a><span data-dcnode-id="6026" instrument_node=""> in the early 1960s, and both became instrumental in popularizing psychedelic substances to the hippie movement.
</span></p><p data-dcnode-id="5972"><span data-dcnode-id="6024" instrument_node="">In 1963, Ginsberg was living in San Francisco with </span><a data-dcnode-id="6022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neal_Cassady" title="Neal Cassady"><span data-dcnode-id="6023" instrument_node="">Neal Cassady</span></a><span data-dcnode-id="6021" instrument_node=""> and </span><a data-dcnode-id="6019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Plymell" title="Charles Plymell"><span data-dcnode-id="6020" instrument_node="">Charles Plymell</span></a><span data-dcnode-id="6018" instrument_node="">.</span><sup class="reference" data-dcnode-id="6015" id="cite_ref-12"><a data-dcnode-id="6016" href="#cite_note-12"><span data-dcnode-id="6017" instrument_node="">[12]</span></a></sup><span data-dcnode-id="6014" instrument_node=""> Around that time, Ginsberg connected with </span><a data-dcnode-id="6012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ken_Kesey" title="Ken Kesey"><span data-dcnode-id="6013" instrument_node="">Ken Kesey</span></a><span data-dcnode-id="6011" instrument_node="">, who was participating in </span><a class="mw-redirect" data-dcnode-id="6009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/CIA" title="CIA"><span data-dcnode-id="6010" instrument_node="">CIA</span></a><span data-dcnode-id="6008" instrument_node=""> sponsored </span><a class="mw-redirect" data-dcnode-id="6006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/MKULTRA" title="MKULTRA"><span data-dcnode-id="6007" instrument_node="">LSD trials</span></a><span data-dcnode-id="6005" instrument_node="">, at the </span><a data-dcnode-id="6003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Menlo_Park%2C_California" title="Menlo Park, California"><span data-dcnode-id="6004" instrument_node="">Menlo Park</span></a><span data-dcnode-id="6002" instrument_node=""> Veterans' Hospital</span><sup class="reference" data-dcnode-id="5999" id="cite_ref-13"><a data-dcnode-id="6000" href="#cite_note-13"><span data-dcnode-id="6001" instrument_node="">[13]</span></a></sup><span data-dcnode-id="5998" instrument_node=""> where he worked as a night aide.</span><sup class="reference" data-dcnode-id="5995" id="cite_ref-14"><a data-dcnode-id="5996" href="#cite_note-14"><span data-dcnode-id="5997" instrument_node="">[14]</span></a></sup><sup class="reference" data-dcnode-id="5992" id="cite_ref-15"><a data-dcnode-id="5993" href="#cite_note-15"><span data-dcnode-id="5994" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="5989" id="cite_ref-16"><a data-dcnode-id="5990" href="#cite_note-16"><span data-dcnode-id="5991" instrument_node="">[16]</span></a></sup><span data-dcnode-id="5988" instrument_node=""> while a student at Stanford.</span><sup class="reference" data-dcnode-id="5985" id="cite_ref-17"><a data-dcnode-id="5986" href="#cite_note-17"><span data-dcnode-id="5987" instrument_node="">[17]</span></a></sup><span data-dcnode-id="5984" instrument_node=""> Cassady drove the bus for Ken Kesey's </span><a data-dcnode-id="5982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Merry_Pranksters" title="Merry Pranksters"><span data-dcnode-id="5983" instrument_node="">Merry Pranksters</span></a><span data-dcnode-id="5981" instrument_node="">, and he attempted to recruit Kerouac into their group, but Kerouac angrily rejected the invitation and accused them of attempting to destroy the American culture he celebrated.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5974" style="white-space:nowrap;"><span data-dcnode-id="5980" instrument_node="">[</span><i data-dcnode-id="5976"><a data-dcnode-id="5977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5978" title="This claim needs references to reliable sources. (June 2007)"><span data-dcnode-id="5979" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5975" instrument_node="">]</span></sup><span data-dcnode-id="5973" instrument_node="">
</span></p><p data-dcnode-id="5946"><span data-dcnode-id="5971" instrument_node="">According to </span><a data-dcnode-id="5969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ed_Sanders" title="Ed Sanders"><span data-dcnode-id="5970" instrument_node="">Ed Sanders</span></a><span data-dcnode-id="5968" instrument_node="">, the change in the public label from "beatnik" to "hippie" occurred after the 1967 </span><a data-dcnode-id="5966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_Be-In" title="Human Be-In"><span data-dcnode-id="5967" instrument_node="">Human Be-In</span></a><span data-dcnode-id="5965" instrument_node=""> in San Francisco's Golden Gate Park, where Ginsberg, </span><a data-dcnode-id="5963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gary_Snyder" title="Gary Snyder"><span data-dcnode-id="5964" instrument_node="">Gary Snyder</span></a><span data-dcnode-id="5962" instrument_node="">, and </span><a data-dcnode-id="5960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Michael_McClure" title="Michael McClure"><span data-dcnode-id="5961" instrument_node="">Michael McClure</span></a><span data-dcnode-id="5959" instrument_node=""> led the crowd in chanting "</span><a data-dcnode-id="5957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Om" title="Om"><span data-dcnode-id="5958" instrument_node="">Om</span></a><span data-dcnode-id="5956" instrument_node="">". Ginsberg was also at the infamous </span><a data-dcnode-id="5954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1968_Democratic_National_Convention" title="1968 Democratic National Convention"><span data-dcnode-id="5955" instrument_node="">1968 Democratic National Convention</span></a><span data-dcnode-id="5953" instrument_node="">, and was friends with </span><a data-dcnode-id="5951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abbie_Hoffman" title="Abbie Hoffman"><span data-dcnode-id="5952" instrument_node="">Abbie Hoffman</span></a><span data-dcnode-id="5950" instrument_node=""> and other members of the </span><a data-dcnode-id="5948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chicago_Seven" title="Chicago Seven"><span data-dcnode-id="5949" instrument_node="">Chicago Seven</span></a><span data-dcnode-id="5947" instrument_node="">. Stylistic differences between beatniks, marked by somber colors, dark shades and goatees, gave way to colorful psychedelic clothing and long hair worn by hippies. While the beats were known for "playing it cool" and keeping a low profile, hippies became known for  displaying their individuality.
</span></p><p data-dcnode-id="5934"><span data-dcnode-id="5945" instrument_node="">One early book hailed as evidencing the transition from "beatnik" to "hippie" culture was </span><i data-dcnode-id="5942"><a data-dcnode-id="5943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Been_Down_So_Long_It_Looks_Like_Up_to_Me" title="Been Down So Long It Looks Like Up to Me"><span data-dcnode-id="5944" instrument_node="">Been Down So Long It Looks Like Up to Me</span></a></i><span data-dcnode-id="5941" instrument_node=""> by </span><a data-dcnode-id="5939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_Fari%25C3%25B1a" title="Richard Fariña"><span data-dcnode-id="5940" instrument_node="">Richard Fariña</span></a><span data-dcnode-id="5938" instrument_node="">, brother-in-law of </span><a data-dcnode-id="5936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joan_Baez" title="Joan Baez"><span data-dcnode-id="5937" instrument_node="">Joan Baez</span></a><span data-dcnode-id="5935" instrument_node="">. Written in 1963, it was published April 28, 1966, two days before its author was killed in a motorcycle crash.
</span></p><span data-dcnode-id="5933" instrument_node="">
</span><h2 data-dcnode-id="5923"><span class="mw-headline" data-dcnode-id="5931" id="1960_to_1966"><span data-dcnode-id="5932" instrument_node="">1960 to 1966</span></span><span class="mw-editsection" data-dcnode-id="5924"><span class="mw-editsection-bracket" data-dcnode-id="5929"><span data-dcnode-id="5930" instrument_node="">[</span></span><a data-dcnode-id="5927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_hippie_movement%26action%3Dedit%26section%3D6" title="Edit section: 1960 to 1966"><span data-dcnode-id="5928" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5925"><span data-dcnode-id="5926" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5922" instrument_node="">
</span><h3 data-dcnode-id="5912"><span class="mw-headline" data-dcnode-id="5920" id="Ken_Kesey_and_the_Merry_Pranksters"><span data-dcnode-id="5921" instrument_node="">Ken Kesey and the Merry Pranksters</span></span><span class="mw-editsection" data-dcnode-id="5913"><span class="mw-editsection-bracket" data-dcnode-id="5918"><span data-dcnode-id="5919" instrument_node="">[</span></span><a data-dcnode-id="5916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_hippie_movement%26action%3Dedit%26section%3D7" title="Edit section: Ken Kesey and the Merry Pranksters"><span data-dcnode-id="5917" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5914"><span data-dcnode-id="5915" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5911" instrument_node="">
</span><p data-dcnode-id="5869"><span data-dcnode-id="5910" instrument_node="">The </span><a data-dcnode-id="5908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Merry_Pranksters" title="Merry Pranksters"><span data-dcnode-id="5909" instrument_node="">Merry Pranksters</span></a><span data-dcnode-id="5907" instrument_node=""> were a group who originally formed around American </span><a data-dcnode-id="5905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Novelist" title="Novelist"><span data-dcnode-id="5906" instrument_node="">novelist</span></a><span data-dcnode-id="5904" instrument_node=""> </span><a data-dcnode-id="5902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ken_Kesey" title="Ken Kesey"><span data-dcnode-id="5903" instrument_node="">Ken Kesey</span></a><span data-dcnode-id="5901" instrument_node="">, considered one of the most prominent figures in the psychedelic movement, and sometimes lived communally at his homes in California and Oregon. Notable members include Kesey's best friend </span><a data-dcnode-id="5899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ken_Babbs" title="Ken Babbs"><span data-dcnode-id="5900" instrument_node="">Ken Babbs</span></a><span data-dcnode-id="5898" instrument_node="">, </span><a data-dcnode-id="5896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neal_Cassady" title="Neal Cassady"><span data-dcnode-id="5897" instrument_node="">Neal Cassady</span></a><span data-dcnode-id="5895" instrument_node="">, </span><a data-dcnode-id="5893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carolyn_Garcia" title="Carolyn Garcia"><span data-dcnode-id="5894" instrument_node="">Mountain Girl</span></a><span data-dcnode-id="5892" instrument_node=""> (born Carolyn Adams but best known as Mrs. Jerry Garcia), </span><a data-dcnode-id="5890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wavy_Gravy" title="Wavy Gravy"><span data-dcnode-id="5891" instrument_node="">Wavy Gravy</span></a><span data-dcnode-id="5889" instrument_node="">, </span><a data-dcnode-id="5887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_Krassner" title="Paul Krassner"><span data-dcnode-id="5888" instrument_node="">Paul Krassner</span></a><span data-dcnode-id="5886" instrument_node="">, </span><a data-dcnode-id="5884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stewart_Brand" title="Stewart Brand"><span data-dcnode-id="5885" instrument_node="">Stewart Brand</span></a><span data-dcnode-id="5883" instrument_node="">, </span><a data-dcnode-id="5881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Del_Close" title="Del Close"><span data-dcnode-id="5882" instrument_node="">Del Close</span></a><span data-dcnode-id="5880" instrument_node="">, </span><a data-dcnode-id="5878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_Foster_%28cartoonist%29" title="Paul Foster (cartoonist)"><span data-dcnode-id="5879" instrument_node="">Paul Foster</span></a><span data-dcnode-id="5877" instrument_node="">, George Walker, and others. Their early escapades were chronicled by </span><a data-dcnode-id="5875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tom_Wolfe" title="Tom Wolfe"><span data-dcnode-id="5876" instrument_node="">Tom Wolfe</span></a><span data-dcnode-id="5874" instrument_node=""> in </span><i data-dcnode-id="5871"><a data-dcnode-id="5872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Electric_Kool-Aid_Acid_Test" title="The Electric Kool-Aid Acid Test"><span data-dcnode-id="5873" instrument_node="">The Electric Kool-Aid Acid Test</span></a></i><span data-dcnode-id="5870" instrument_node="">.
</span></p><p data-dcnode-id="5846"><span data-dcnode-id="5868" instrument_node="">Ken Kesey and the Merry Pranksters are remembered chiefly for the sociological significance of a lengthy roadtrip they took in 1964, traveling across the </span><a data-dcnode-id="5866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States" title="United States"><span data-dcnode-id="5867" instrument_node="">United States</span></a><span data-dcnode-id="5865" instrument_node=""> in a </span><a data-dcnode-id="5863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Psychedelia" title="Psychedelia"><span data-dcnode-id="5864" instrument_node="">psychedelically</span></a><span data-dcnode-id="5862" instrument_node=""> painted school </span><a data-dcnode-id="5860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bus" title="Bus"><span data-dcnode-id="5861" instrument_node="">bus</span></a><span data-dcnode-id="5859" instrument_node=""> enigmatically labeled </span><a class="mw-redirect" data-dcnode-id="5857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Further_%28bus%29" title="Further (bus)"><span data-dcnode-id="5858" instrument_node="">Further</span></a><span data-dcnode-id="5856" instrument_node="">, and for the "Acid Tests". Kesey believed that psychedelics were best used as a tool for transforming society as a whole, and believed that if a sufficient percentage of the population had the psychedelic experience then revolutionary social and political changes would occur. Therefore, they made LSD available to anyone interested in partaking - most famously through the "electric kool-aid" made available at a series of "Acid Tests"; musical and multi-media events where participants were given "acid", the street name for LSD. The tests were held at various venues in California, and were sometimes advertised with colorful crayoned signs asking "Can you pass the acid test?" The first Acid Test was held in </span><a data-dcnode-id="5854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Palo_Alto%2C_California" title="Palo Alto, California"><span data-dcnode-id="5855" instrument_node="">Palo Alto, California</span></a><span data-dcnode-id="5853" instrument_node=""> in November 1965. (LSD was legal in the United States until October 6, 1966.) The young </span><a data-dcnode-id="5851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Psychedelic_music" title="Psychedelic music"><span data-dcnode-id="5852" instrument_node="">psychedelic music</span></a><span data-dcnode-id="5850" instrument_node=""> band the </span><a data-dcnode-id="5848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grateful_Dead" title="Grateful Dead"><span data-dcnode-id="5849" instrument_node="">Grateful Dead</span></a><span data-dcnode-id="5847" instrument_node=""> supplied the music during these events.
</span></p><span data-dcnode-id="5845" instrument_node="">
</span><h3 data-dcnode-id="5835"><span class="mw-headline" data-dcnode-id="5843" id="Red_Dog_Experience"><span data-dcnode-id="5844" instrument_node="">Red Dog Experience</span></span><span class="mw-editsection" data-dcnode-id="5836"><span class="mw-editsection-bracket" data-dcnode-id="5841"><span data-dcnode-id="5842" instrument_node="">[</span></span><a data-dcnode-id="5839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_hippie_movement%26action%3Dedit%26section%3D8" title="Edit section: Red Dog Experience"><span data-dcnode-id="5840" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5837"><span data-dcnode-id="5838" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5834" instrument_node="">
</span><link data-dcnode-id="5833" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5829" role="note"><span data-dcnode-id="5832" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="5830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red_Dog_Experience" title="Red Dog Experience"><span data-dcnode-id="5831" instrument_node="">Red Dog Experience</span></a></div><span data-dcnode-id="5828" instrument_node="">
</span><p data-dcnode-id="5811"><a data-dcnode-id="5826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red_Dog_Saloon_%28Virginia_City%2C_Nevada%29" title="Red Dog Saloon (Virginia City, Nevada)"><span data-dcnode-id="5827" instrument_node="">The Red Dog Saloon</span></a><span data-dcnode-id="5825" instrument_node=""> was a bar and music venue located in the isolated, old-time mining town of </span><a data-dcnode-id="5823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Virginia_City%2C_Nevada" title="Virginia City, Nevada"><span data-dcnode-id="5824" instrument_node="">Virginia City, Nevada</span></a><span data-dcnode-id="5822" instrument_node="">. In April 1963, Chandler A. Laughlin III established a kind of tribal, family identity among approximately 50 people who attended a traditional, all-night </span><a data-dcnode-id="5820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peyote" title="Peyote"><span data-dcnode-id="5821" instrument_node="">peyote</span></a><span data-dcnode-id="5819" instrument_node=""> ceremony which combined a psychedelic experience with traditional </span><a data-dcnode-id="5817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Native_Americans_in_the_United_States" title="Native Americans in the United States"><span data-dcnode-id="5818" instrument_node="">Native American</span></a><span data-dcnode-id="5816" instrument_node=""> spiritual values.</span><sup class="reference" data-dcnode-id="5813" id="cite_ref-Works_18-0"><a data-dcnode-id="5814" href="#cite_note-Works-18"><span data-dcnode-id="5815" instrument_node="">[18]</span></a></sup><span data-dcnode-id="5812" instrument_node="">
</span></p><p data-dcnode-id="5786"><span data-dcnode-id="5810" instrument_node="">During the summer of 1965, Laughlin recruited much of the original talent that led to a unique amalgam of traditional folk music and the developing psychedelic rock scene.</span><sup class="reference" data-dcnode-id="5807" id="cite_ref-Works_18-1"><a data-dcnode-id="5808" href="#cite_note-Works-18"><span data-dcnode-id="5809" instrument_node="">[18]</span></a></sup><span data-dcnode-id="5806" instrument_node=""> He and his cohorts created what became known as The Red Dog Experience, featuring previously unknown musical acts - </span><a data-dcnode-id="5804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Big_Brother_and_the_Holding_Company" title="Big Brother and the Holding Company"><span data-dcnode-id="5805" instrument_node="">Big Brother and the Holding Company</span></a><span data-dcnode-id="5803" instrument_node="">, </span><a data-dcnode-id="5801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jefferson_Airplane" title="Jefferson Airplane"><span data-dcnode-id="5802" instrument_node="">Jefferson Airplane</span></a><span data-dcnode-id="5800" instrument_node="">, </span><a data-dcnode-id="5798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quicksilver_Messenger_Service" title="Quicksilver Messenger Service"><span data-dcnode-id="5799" instrument_node="">Quicksilver Messenger Service</span></a><span data-dcnode-id="5797" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="5795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Charlatans_%28U.S._band%29" title="The Charlatans (U.S. band)"><span data-dcnode-id="5796" instrument_node="">The Charlatans</span></a><span data-dcnode-id="5794" instrument_node="">, </span><a data-dcnode-id="5792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grateful_Dead" title="Grateful Dead"><span data-dcnode-id="5793" instrument_node="">Grateful Dead</span></a><span data-dcnode-id="5791" instrument_node=""> and others. There was no clear delineation between "performers" and "audience" and the music, psychedelic experimentation, unique sense of personal style, and Bill Ham's first primitive light shows combined to create a new sense of community.</span><sup class="reference" data-dcnode-id="5788" id="cite_ref-Ham_19-0"><a data-dcnode-id="5789" href="#cite_note-Ham-19"><span data-dcnode-id="5790" instrument_node="">[19]</span></a></sup><span data-dcnode-id="5787" instrument_node="">
</span></p><span data-dcnode-id="5785" instrument_node="">
</span><h3 data-dcnode-id="5775"><span class="mw-headline" data-dcnode-id="5783" id="Anti-war_protests"><span data-dcnode-id="5784" instrument_node="">Anti-war protests</span></span><span class="mw-editsection" data-dcnode-id="5776"><span class="mw-editsection-bracket" data-dcnode-id="5781"><span data-dcnode-id="5782" instrument_node="">[</span></span><a data-dcnode-id="5779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_hippie_movement%26action%3Dedit%26section%3D9" title="Edit section: Anti-war protests"><span data-dcnode-id="5780" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5777"><span data-dcnode-id="5778" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5774" instrument_node="">
</span><link data-dcnode-id="5773" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5769" role="note"><span data-dcnode-id="5772" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="5770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Opposition_to_the_Vietnam_War" title="Opposition to the Vietnam War"><span data-dcnode-id="5771" instrument_node="">Opposition to the Vietnam War</span></a></div><span data-dcnode-id="5768" instrument_node="">
</span><p data-dcnode-id="5745"><span data-dcnode-id="5767" instrument_node="">Although there were many diverse groups and elements protesting the US military involvement in Vietnam as it began to escalate, many of the protesters, rightly or wrongly, came to be associated with aspects of the "hippie" movement in the popular view. A number of them had been highly active in the </span><a class="mw-redirect" data-dcnode-id="5765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_Rights_Movement" title="Civil Rights Movement"><span data-dcnode-id="5766" instrument_node="">Civil Rights Movement</span></a><span data-dcnode-id="5764" instrument_node=""> in the first half of the 1960s, traveling across the country to take part in sit-ins and marches against </span><a data-dcnode-id="5762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Racial_segregation" title="Racial segregation"><span data-dcnode-id="5763" instrument_node="">segregation</span></a><span data-dcnode-id="5761" instrument_node=""> in the South. The first </span><a class="mw-redirect" data-dcnode-id="5759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Draft_card_burning" title="Draft card burning"><span data-dcnode-id="5760" instrument_node="">draft card burnings</span></a><span data-dcnode-id="5758" instrument_node=""> took place May 12, 1964, in New York City. Others followed, including more draft-card burnings in May 1965 at the </span><a data-dcnode-id="5756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/University_of_California%2C_Berkeley" title="University of California, Berkeley"><span data-dcnode-id="5757" instrument_node="">University of California, Berkeley</span></a><span data-dcnode-id="5755" instrument_node=""> (which had already seen a precedent to the subsequent social turmoil, in form of the </span><a data-dcnode-id="5753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Free_Speech_Movement" title="Free Speech Movement"><span data-dcnode-id="5754" instrument_node="">Free Speech Movement</span></a><span data-dcnode-id="5752" instrument_node="">), and a coffin was marched to the Berkeley draft board. As similar protests continued through the summer, President </span><a class="mw-redirect" data-dcnode-id="5750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lyndon_Johnson" title="Lyndon Johnson"><span data-dcnode-id="5751" instrument_node="">Lyndon Johnson</span></a><span data-dcnode-id="5749" instrument_node=""> responded by signing a new law on August 31, 1965, penalizing the burning of draft cards with up to 5 years in prison and a $1,000 fine, although such burnings went on regardless. In later years, the </span><a data-dcnode-id="5747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Viet_Cong" title="Viet Cong"><span data-dcnode-id="5748" instrument_node="">Viet Cong</span></a><span data-dcnode-id="5746" instrument_node=""> flag of the "enemy" was even adopted as a symbol by more radical anti-war protesters. However, the core "hippie" philosophy remained staunchly aloof to politics, and politicians, throughout this time.
</span></p><span data-dcnode-id="5744" instrument_node="">
</span><h3 data-dcnode-id="5734"><span class="mw-headline" data-dcnode-id="5742" id="Generation"><span data-dcnode-id="5743" instrument_node="">Generation</span></span><span class="mw-editsection" data-dcnode-id="5735"><span class="mw-editsection-bracket" data-dcnode-id="5740"><span data-dcnode-id="5741" instrument_node="">[</span></span><a data-dcnode-id="5738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_hippie_movement%26action%3Dedit%26section%3D10" title="Edit section: Generation"><span data-dcnode-id="5739" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5736"><span data-dcnode-id="5737" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5733" instrument_node="">
</span><p data-dcnode-id="5688"><span data-dcnode-id="5732" instrument_node="">The new "hippie" values, e.g. </span><a data-dcnode-id="5730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Natural_childbirth" title="Natural childbirth"><span data-dcnode-id="5731" instrument_node="">natural childbirth</span></a><span data-dcnode-id="5729" instrument_node="">, made an early Broadway appearance October 6, 1965, with the opening of a popular new play, </span><i data-dcnode-id="5727"><span data-dcnode-id="5728" instrument_node="">Generation</span></i><span data-dcnode-id="5726" instrument_node=""> by US playwright William Goodhart, starring </span><a data-dcnode-id="5724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henry_Fonda" title="Henry Fonda"><span data-dcnode-id="5725" instrument_node="">Henry Fonda</span></a><span data-dcnode-id="5723" instrument_node=""> (as Jim Bolton), which, according to one of its reviews in </span><i data-dcnode-id="5721"><span data-dcnode-id="5722" instrument_node="">Time</span></i><span data-dcnode-id="5720" instrument_node="">,</span><sup class="reference" data-dcnode-id="5717" id="cite_ref-20"><a data-dcnode-id="5718" href="#cite_note-20"><span data-dcnode-id="5719" instrument_node="">[20]</span></a></sup><span data-dcnode-id="5716" instrument_node=""> "converts a </span><a data-dcnode-id="5714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greenwich_Village" title="Greenwich Village"><span data-dcnode-id="5715" instrument_node="">Greenwich Village</span></a><span data-dcnode-id="5713" instrument_node=""> loft into a sparring ground for </span><a data-dcnode-id="5711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Establishment" title="The Establishment"><span data-dcnode-id="5712" instrument_node="">the Establishment</span></a><span data-dcnode-id="5710" instrument_node=""> and the hippie, the parent and the child."  Owing to the success of this play, it went on to be made into a 1969 film, entitled </span><i data-dcnode-id="5708"><span data-dcnode-id="5709" instrument_node="">Generation</span></i><span data-dcnode-id="5707" instrument_node=""> (also released under the title </span><i data-dcnode-id="5705"><span data-dcnode-id="5706" instrument_node="">A Time for Giving and A Time for Caring</span></i><span data-dcnode-id="5704" instrument_node="">) with </span><a data-dcnode-id="5702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_Janssen" title="David Janssen"><span data-dcnode-id="5703" instrument_node="">David Janssen</span></a><span data-dcnode-id="5701" instrument_node=""> in the role of Jim Bolton (also featuring </span><a data-dcnode-id="5699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kim_Darby" title="Kim Darby"><span data-dcnode-id="5700" instrument_node="">Kim Darby</span></a><span data-dcnode-id="5698" instrument_node="">, </span><a data-dcnode-id="5696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carl_Reiner" title="Carl Reiner"><span data-dcnode-id="5697" instrument_node="">Carl Reiner</span></a><span data-dcnode-id="5695" instrument_node="">, </span><a data-dcnode-id="5693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Coco" title="James Coco"><span data-dcnode-id="5694" instrument_node="">James Coco</span></a><span data-dcnode-id="5692" instrument_node=""> and </span><a data-dcnode-id="5690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sam_Waterston" title="Sam Waterston"><span data-dcnode-id="5691" instrument_node="">Sam Waterston</span></a><span data-dcnode-id="5689" instrument_node="">).
</span></p><span data-dcnode-id="5687" instrument_node="">
</span><h3 data-dcnode-id="5677"><span class="mw-headline" data-dcnode-id="5685" id="Underground_press"><span data-dcnode-id="5686" instrument_node="">Underground press</span></span><span class="mw-editsection" data-dcnode-id="5678"><span class="mw-editsection-bracket" data-dcnode-id="5683"><span data-dcnode-id="5684" instrument_node="">[</span></span><a data-dcnode-id="5681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_hippie_movement%26action%3Dedit%26section%3D11" title="Edit section: Underground press"><span data-dcnode-id="5682" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5679"><span data-dcnode-id="5680" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5676" instrument_node="">
</span><p data-dcnode-id="5645"><span data-dcnode-id="5675" instrument_node="">Another signal of the rising movement was the sudden appearance of an underground hippie press in several US cities.  Among the first of these was the </span><i data-dcnode-id="5672"><a data-dcnode-id="5673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Los_Angeles_Free_Press" title="Los Angeles Free Press"><span data-dcnode-id="5674" instrument_node="">Los Angeles Free Press</span></a></i><span data-dcnode-id="5671" instrument_node="">, which began in May 1964 as a broadside entitled </span><i data-dcnode-id="5669"><span data-dcnode-id="5670" instrument_node="">The Faire Free Press</span></i><span data-dcnode-id="5668" instrument_node="">. This was soon followed by the </span><i data-dcnode-id="5665"><a data-dcnode-id="5666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Berkeley_Barb" title="Berkeley Barb"><span data-dcnode-id="5667" instrument_node="">Berkeley Barb</span></a></i><span data-dcnode-id="5664" instrument_node=""> in August 1965, the </span><i data-dcnode-id="5661"><a data-dcnode-id="5662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/East_Village_Other" title="East Village Other"><span data-dcnode-id="5663" instrument_node="">East Village Other</span></a></i><span data-dcnode-id="5660" instrument_node=""> of New York, in October 1965, </span><i data-dcnode-id="5657"><a data-dcnode-id="5658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fifth_Estate_%28periodical%29" title="Fifth Estate (periodical)"><span data-dcnode-id="5659" instrument_node="">The Fifth Estate</span></a></i><span data-dcnode-id="5656" instrument_node="">, in Detroit in November 1965, and </span><a class="mw-redirect" data-dcnode-id="5654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/East_Lansing" title="East Lansing"><span data-dcnode-id="5655" instrument_node="">East Lansing</span></a><span data-dcnode-id="5653" instrument_node="">'s </span><i data-dcnode-id="5650"><a data-dcnode-id="5651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Paper_%28American_newspaper%29" title="The Paper (American newspaper)"><span data-dcnode-id="5652" instrument_node="">The Paper</span></a></i><span data-dcnode-id="5649" instrument_node=""> in December 1965. By 1966 the Underground Press Syndicate had been organized; 80 presses of U.S. and Canada came to a conference sponsored by </span><a data-dcnode-id="5647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Middle_Earth_%28newspaper%29" title="Middle Earth (newspaper)"><span data-dcnode-id="5648" instrument_node="">Middle Earth</span></a><span data-dcnode-id="5646" instrument_node=""> in Iowa City. Liberation News Service, located in Washington DC, then New York, then split between New York and a commune in rural Massachusetts, served up alternative stories to the underground press world.
</span></p><span data-dcnode-id="5644" instrument_node="">
</span><h3 data-dcnode-id="5634"><span class="mw-headline" data-dcnode-id="5642" id="Psychedelic_rock"><span data-dcnode-id="5643" instrument_node="">Psychedelic rock</span></span><span class="mw-editsection" data-dcnode-id="5635"><span class="mw-editsection-bracket" data-dcnode-id="5640"><span data-dcnode-id="5641" instrument_node="">[</span></span><a data-dcnode-id="5638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_the_hippie_movement%26action%3Dedit%26section%3D12" title="Edit section: Psychedelic rock"><span data-dcnode-id="5639" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5636"><span data-dcnode-id="5637" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5633" instrument_node="">
</span><link data-dcnode-id="5632" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5628" role="note"><span data-dcnode-id="5631" instrument_node="">Main article: </span><a data-dcnode-id="5629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Psychedelic_rock" title="Psychedelic rock"><span data-dcnode-id="5630" instrument_node="">Psychedelic rock</span></a></div><link data-dcnode-id="5627" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5623" role="note"><span data-dcnode-id="5626" instrument_node="">See also: </span><a class="mw-redirect" data-dcnode-id="5624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/San_Francisco_Sound" title="San Francisco Sound"><span data-dcnode-id="5625" instrument_node="">San Francisco Sound</span></a></div><span data-dcnode-id="5622" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5607"><div class="thumbinner" data-dcnode-id="5608" style="width:222px;"><a class="image" data-dcnode-id="5620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATieDyeShirtMpegMan.jpg"><img alt="" class="thumbimage" data-dcnode-id="5621" data-file-height="906" data-file-width="1083" decoding="async" height="184" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/02/TieDyeShirtMpegMan.jpg/220px-TieDyeShirtMpegMan.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/02/TieDyeShirtMpegMan.jpg/330px-TieDyeShirtMpegMan.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/02/TieDyeShirtMpegMan.jpg/440px-TieDyeShirtMpegMan.jpg 2x" width="220"></a><span data-dcnode-id="5619" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5609"><div class="magnify" data-dcnode-id="5617"><a class="internal" data-dcnode-id="5618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATieDyeShirtMpegMan.jpg" title="Enlarge"></a></div><span data-dcnode-id="5616" instrument_node="">An example of a </span><a class="mw-redirect" data-dcnode-id="5614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tie_dye" title="Tie dye"><span data-dcnode-id="5615" instrument_node="">tie dyed</span></a><span data-dcnode-id="5613" instrument_node=""> </span><a data-dcnode-id="5611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/T-shirt" title="T-shirt"><span data-dcnode-id="5612" instrument_node="">t-shirt</span></a><span data-dcnode-id="5610" instrument_node="">. Tie dying in the late 1960s and early 1970s is considered part of the psychedelic movement.</span></div></div></div><span data-dcnode-id="5606" instrument_node="">
</span><p data-dcnode-id="5602"><b data-dcnode-id="5604"><span data-dcnode-id="5605" instrument_node="">A Tribute to Dr. Strange</span></b><span data-dcnode-id="5603" instrument_node="">
</span></p><p data-dcnode-id="5573"><span data-dcnode-id="5601" instrument_node="">When they returned to San Francisco at the end of Summer 1965, Red Dog participants Luria Castell, Ellen Harman and Alton Kelley created a collective called "The Family Dog".</span><sup class="reference" data-dcnode-id="5598" id="cite_ref-Works_18-2"><a data-dcnode-id="5599" href="#cite_note-Works-18"><span data-dcnode-id="5600" instrument_node="">[18]</span></a></sup><span data-dcnode-id="5597" instrument_node=""> Modeled on their Red Dog experiences, on October 16, 1965, The Family Dog hosted "A Tribute to </span><a data-dcnode-id="5595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Doctor_Strange" title="Doctor Strange"><span data-dcnode-id="5596" instrument_node="">Dr. Strange</span></a><span data-dcnode-id="5594" instrument_node="">" at Longshoreman's Hall.</span><sup class="reference" data-dcnode-id="5591" id="cite_ref-21"><a data-dcnode-id="5592" href="#cite_note-21"><span data-dcnode-id="5593" instrument_node="">[21]</span></a></sup><sup class="reference" data-dcnode-id="5588" id="cite_ref-Grunenberg_2005_325_22-0"><a data-dcnode-id="5589" href="#cite_note-Grunenberg_2005_325-22"><span data-dcnode-id="5590" instrument_node="">[22]</span></a></sup><span data-dcnode-id="5587" instrument_node="">  Attended by approximately 1,000 of the Bay Area's original "hippies", this was San Francisco's first </span><a data-dcnode-id="5585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Psychedelic_rock" title="Psychedelic rock"><span data-dcnode-id="5586" instrument_node="">psychedelic rock</span></a><span data-dcnode-id="5584" instrument_node=""> performance, a costumed dance and light show featuring </span><a data-dcnode-id="5582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jefferson_Airplane" title="Jefferson Airplane"><span data-dcnode-id="5583" instrument_node="">Jefferson Airplane</span></a><span data-dcnode-id="5581" instrument_node="">, </span><a data-dcnode-id="5579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Great_Society_%28band%29" title="The Great Society (band)"><span data-dcnode-id="5580" instrument_node="">The Great Society</span></a><span data-dcnode-id="5578" instrument_node="">, and The Marbles.  Two other events followed before year's end, one at California Hall and one at the Matrix.</span><sup class="reference" data-dcnode-id="5575" id="cite_ref-Works_18-3"><a data-dcnode-id="5576" href="#cite_note-Works-18"><span data-dcnode-id="5577" instrument_node="">[18]</span></a></sup><span data-dcnode-id="5574" instrument_node="">
</span></p><p data-dcnode-id="5569"><b data-dcnode-id="5571"><span data-dcnode-id="5572" instrument_node="">Trips Festival</span></b><span data-dcnode-id="5570" instrument_node="">
</span></p><p data-dcnode-id="5541"><span data-dcnode-id="5568" instrument_node="">A much larger psychedelic event, "The </span><a class="mw-redirect" data-dcnode-id="5566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trips_Festival" title="Trips Festival"><span data-dcnode-id="5567" instrument_node="">Trips Festival</span></a><span data-dcnode-id="5565" instrument_node="">", took place on January 21–23, 1966, at Longshoreman's Hall, organized by </span><a data-dcnode-id="5563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stewart_Brand" title="Stewart Brand"><span data-dcnode-id="5564" instrument_node="">Stewart Brand</span></a><span data-dcnode-id="5562" instrument_node="">, </span><a data-dcnode-id="5560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ken_Kesey" title="Ken Kesey"><span data-dcnode-id="5561" instrument_node="">Ken Kesey</span></a><span data-dcnode-id="5559" instrument_node="">, </span><a data-dcnode-id="5557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Owsley_Stanley" title="Owsley Stanley"><span data-dcnode-id="5558" instrument_node="">Owsley Stanley</span></a><span data-dcnode-id="5556" instrument_node="">, Zach Stewart and others.  Ten thousand people attended this sold-out event, with a thousand more turned away each night.</span><sup class="reference" data-dcnode-id="5553" id="cite_ref-23"><a data-dcnode-id="5554" href="#cite_note-23"><span data-dcnode-id="5555" instrument_node="">[23]</span></a></sup><span data-dcnode-id="5552" instrument_node=""> On Saturday January 22, the </span><a data-dcnode-id="5550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grateful_Dead" title="Grateful Dead"><span data-dcnode-id="5551" instrument_node="">Grateful Dead</span></a><span data-dcnode-id="5549" instrument_node=""> and </span><a data-dcnode-id="5547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Big_Brother_and_the_Holding_Company" title="Big Brother and the Holding Company"><span data-dcnode-id="5548" instrument_node="">Big Brother and the Holding Company</span></a><span data-dcnode-id="5546" instrument_node=""> came on stage, and 6,000 people arrived to imbibe punch spiked with LSD and to witness one of the first fully developed light shows of the era.</span><sup class="reference" data-dcnode-id="5543" id="cite_ref-24"><a data-dcnode-id="5544" href="#cite_note-24"><span data-dcnode-id="5545" instrument_node="">[24]</span></a></sup><span data-dcnode-id="5542" instrument_node="">
</span></p><p data-dcnode-id="5537"><b data-dcnode-id="5539"><span data-dcnode-id="5540" instrument_node="">Fillmore Auditorium and Avalon Ballroom</span></b><span data-dcnode-id="5538" instrument_node="">
</span></p><p data-dcnode-id="5510"><span data-dcnode-id="5536" instrument_node="">By February 1966, the Family Dog became </span><a data-dcnode-id="5534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chet_Helms%23Family_Dog_Productions" title="Chet Helms"><span data-dcnode-id="5535" instrument_node="">Family Dog Productions</span></a><span data-dcnode-id="5533" instrument_node=""> under organizer </span><a data-dcnode-id="5531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chet_Helms" title="Chet Helms"><span data-dcnode-id="5532" instrument_node="">Chet Helms</span></a><span data-dcnode-id="5530" instrument_node="">, promoting happenings at the </span><a data-dcnode-id="5528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Avalon_Ballroom" title="Avalon Ballroom"><span data-dcnode-id="5529" instrument_node="">Avalon Ballroom</span></a><span data-dcnode-id="5527" instrument_node=""> and the </span><a data-dcnode-id="5525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Fillmore" title="The Fillmore"><span data-dcnode-id="5526" instrument_node="">Fillmore Auditorium</span></a><span data-dcnode-id="5524" instrument_node=""> in initial cooperation with </span><a data-dcnode-id="5522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bill_Graham_%28promoter%29" title="Bill Graham (promoter)"><span data-dcnode-id="5523" instrument_node="">Bill Graham</span></a><span data-dcnode-id="5521" instrument_node="">.  These and other venues provided settings where participants could partake in the full psychedelic music experience.  Bill Ham perfected his liquid light projection shows which, combined with film projection, and became synonymous with the San Francisco ballroom experience.</span><sup class="reference" data-dcnode-
