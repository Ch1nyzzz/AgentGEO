enceLinks u-font-sans" data-dcnode-id="393"><span data-dcnode-id="396" instrument_node=""></span><a aria-describedby="ref-id-rf0500" class="link" data-dcnode-id="394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DThe%2520Cultures%2520of%2520Cities%26publication_year%3D1995%26author%3DS.%2520Zukin" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="395" instrument_node="">Google Scholar</span></a></div></dd></dl></section></section><div data-dcnode-id="243" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="244"><div class="PageDivider" data-dcnode-id="388"></div><header data-dcnode-id="385" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">Cited by (30)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="245"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="246"><ul data-dcnode-id="252"><li class="ListArticleItem" data-dcnode-id="358"><div class="sub-heading" data-dcnode-id="379"><a data-dcnode-id="382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0264837721005433" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="383" id="citing-articles-article0-title"><span data-dcnode-id="384" instrument_node="">Integrating support groups, an effective approach to regenerate historic neighborhoods of Iran Case study: Oudlajan Neighborhood, Tehran</span></h3></a><div class="article-source ellipsis" data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">2022, Land Use Policy</span></div></div><div class="buttons" data-dcnode-id="373"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="374" type="button"><span class="button-link-text" data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="375" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="376"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="359"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="360" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="361"><p data-dcnode-id="362" id="sp0050"><span data-dcnode-id="372" instrument_node="">Despite recent revitalization efforts, many of Iran’s historic neighborhoods have been gradually damaged and lagged behind the development of cities. The historical neighborhood of </span><em data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">Oudlajan</span></em><span data-dcnode-id="369" instrument_node=""> serves as a case in point. Using participant observation, in-depth interviews, focus group discussion, and content analysis, this case study explores the neighborhood changes in Oudlajan both pre- and post- the implementation of revitalization plans. The results demonstrate a crucial need for sustainable and integrated urban regeneration through </span><em data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">Oudlajan</span></em><span data-dcnode-id="366" instrument_node=""> support groups—integrating their actions through the establishment of a local management entity as a part of the municipality, and placing them at the heart of policy-making, planning, and monitoring for </span><em data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">Oudlajan</span></em><span data-dcnode-id="363" instrument_node="">. The proposed local management entity will coordinate the activities of NGOs, stakeholders, upper-level governmental organizations, and upstream managerial organizations needed for regenerating the neighborhood, as well as being involved in formulating, executing, monitoring, and revising the neighborhood regeneration plans based on the neighborhood’s social and economic capacities, and its values.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="337"><div class="sub-heading" data-dcnode-id="352"><a data-dcnode-id="355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0264275121003589" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="356" id="citing-articles-article1-title"><span data-dcnode-id="357" instrument_node="">Identifying sources of innovation: Building a conceptual framework of the Smart City through a social innovation perspective</span></h3></a><div class="article-source ellipsis" data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">2022, Cities</span></div></div><div class="buttons" data-dcnode-id="346"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="347" type="button"><span class="button-link-text" data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="348" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="349"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="338"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="339" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="340"><p data-dcnode-id="341" id="sp0025"><span data-dcnode-id="345" instrument_node="">A Comprehensive theory of Smart Cities continues to elude scholars. This seems to result from ontological uncertainty surrounding the Smart City and who it serves. Such uncertainty has led to the techno-centric versus human-centric debate currently dominating the Smart City discussion. This paper adopts a systems approach to stratify society into three strata: the individual (micro), organizational (</span><em data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">meso</span></em><span data-dcnode-id="342" instrument_node="">), and system (macro). I implement a systematic review of the Smart City literature to examine how Smart Cities are conceptualized. From an analysis of 41 papers, this research identifies a dualistic phenomenon occurring at all points in the stratified city system: sources of innovation (SOI) and Loci of change (LOC). Here, SOI refers to the perceptions of deficiencies which initiate the learning curve of innovation, while LOC refers to the structures which allow the learning curve to disseminate through the system. This analysis highlights an overemphasis on the organizational stratum and insufficient attention to the individual and system strata. To address this shortfall, I introduce the Social Innovation Cycle. This multi-level social innovation framework incorporates the interdependencies of SOI and LOC to link all strata, mitigate power asymmetries, and reduce marginalization. In so doing, I delineate where policy implementation can be directed for holistically developing the Smart City. I recommend that Smart City policy should target the intersection of SOI and LOC in pursuit of human-centricity.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="319"><div class="sub-heading" data-dcnode-id="331"><a data-dcnode-id="334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0264275121001438" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="335" id="citing-articles-article2-title"><span data-dcnode-id="336" instrument_node="">Race/ethnicity, place, and art and culture entrepreneurship in underserved communities</span></h3></a><div class="article-source ellipsis" data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">2021, Cities</span></div></div><div class="buttons" data-dcnode-id="325"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="326" type="button"><span class="button-link-text" data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="327" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="328"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="320"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="321" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="322"><p data-dcnode-id="323" id="sp0015"><span data-dcnode-id="324" instrument_node="">Few studies of entrepreneurship and creative industries have investigated the role of race/ethnicity, gender, and poverty. This study investigates the impacts of art and culture entrepreneurship in a traditionally underserved community. The findings demonstrate that, using their business ventures as both economic and social enterprises, art and culture entrepreneurs engage in a continuous process of adaptation, learning, and innovation and seek opportunities to serve their business goals. Through artistic placemaking, race/ethnicity and entrepreneurship in creative industries interact with each other as agents of change in the local community and in social entrepreneurship. Our findings call for a social impact approach that emphasizes the importance of locally formed cultural production and a socially inclusive entrepreneurship ecosystem.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="301"><div class="sub-heading" data-dcnode-id="313"><a data-dcnode-id="316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0160738320300669" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="317" id="citing-articles-article3-title"><span data-dcnode-id="318" instrument_node="">Designing creative places: The role of creative tourism</span></h3></a><div class="article-source ellipsis" data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">2020, Annals of Tourism Research</span></div></div><div class="buttons" data-dcnode-id="307"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="308" type="button"><span class="button-link-text" data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="309" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="310"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="302"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="303" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="304"><p data-dcnode-id="305" id="sp0010"><span data-dcnode-id="306" instrument_node="">Creativity has become a strategy in the making of places, with cities and regions seeking to increase their attractiveness to the creative class, support the creative industries or to become ‘creative cities’. We examine how creativity has been utilised in placemaking in tourism destinations through different design strategies. A shift in theoretical focus from creative individuals towards creative districts or places is noted, in line with the developing field of creative placemaking. Case studies of creative development indicate strategies need to be sensitive to local context, and follow some basic design principles. Creative placemaking includes consideration of resources, meaning and creativity, driven by clear vision, enabling participation, leaving space for creative expression and developing a coherent narrative.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="277"><div class="sub-heading" data-dcnode-id="289"><a data-dcnode-id="298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0197397519302589" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="299" id="citing-articles-article4-title"><span data-dcnode-id="300" instrument_node="">Inheritance or variation? Spatial regeneration and acculturation via implantation of cultural and creative industries in Beijing's traditional compounds</span></h3></a><div class="article-source ellipsis" data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">2020, Habitat International</span></div><div class="CitedSection" data-dcnode-id="290"><div class="snippet" data-dcnode-id="291"><div class="cite-header" data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">Citation Excerpt :</span></div><p data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">In the regeneration, the entrepreneurs of the newly-implanted industries are the agency between locality and globalization, especially when a shift from top-down to bottom-up approach is being advocated. Consequently, the entrepreneurs of these newly-implanted industries are thought to be the key to hybridizing cultural heritage with creativity (Lucia &amp; Trunfio, 2018), in terms of their entrepreneurship, artisanship, and the combination of these two aspects as cultural entrepreneurship (Scott &amp; Szili, 2018). Nevertheless, even with their recognized role in identity creation, the complexity of their identity and its impact lacks research.</span></p></div></div></div><div class="buttons" data-dcnode-id="283"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="284" type="button"><span class="button-link-text" data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="285" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="286"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="278"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="279" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="280"><p data-dcnode-id="281" id="abspara0010"><span data-dcnode-id="282" instrument_node="">Nowadays, the implantation of cultural and creative industries into the historic blocks of inner cities is widely accepted. With controversial impacts on heritage, the sustainability of culture-led regeneration has got increased research attention. This study focuses on cultural impact of the regeneration, as the creation of identity is the core of these new industries and might be the internal source of sustainability. Originally, it considers historical heritage as a production and marketing resource, while the regeneration process may have a negative impact on the former local identity and image. Responding to this paradox, we emphasize that the evaluation of the cultural impact of the implantation of new industries into historic blocks must consider multicultural backgrounds, because the culture-led regeneration actually hybridizes the conservation of former local identity and expression of contemporary identity. It can be stimulated by multiculturalism and is realized through the work of cultural entrepreneur with enhanced mobility, transcultural experience, and cultural sensitivity. Therefore, the identity of these new entrepreneurs and their spatial preferences may directly influence the regeneration results. Thus, this study not only demonstrates the physical regeneration results but also explores the relation between physical transformation and complexity of cultural identity, through the case study of Wudaoying Hutong in Beijing, a regenerated historic block with multicultural imprints. First, space syntax was used to investigate spatial transformation. Next, a bilinear measurement model of acculturation was used through a combination of questionnaires and in-depth interviews, and the corresponding acculturation conditions of new entrepreneurs were observed. Finally, the correlation between the spatial results and the acculturation measurements was verified and the implicit dynamics between acculturation conditions and the regeneration strategy was interpreted.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="253"><div class="sub-heading" data-dcnode-id="265"><a data-dcnode-id="274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0264275119306432" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="275" id="citing-articles-article5-title"><span data-dcnode-id="276" instrument_node="">Understanding orchestrated participatory cultural initiatives: Mapping the dynamics of governance and participation</span></h3></a><div class="article-source ellipsis" data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">2020, Cities</span></div><div class="CitedSection" data-dcnode-id="266"><div class="snippet" data-dcnode-id="267"><div class="cite-header" data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">Citation Excerpt :</span></div><p data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">A key issue is to transform the individual visions of single actors and, specifically, their means and ends into a joint understanding. As Della Lucia &amp; Trunfio (2018: 36) argue, “In the creation of a shared vision of urban development, the greatest challenge is to overcome the significant barriers that inevitably arise when a wide variety of stakeholders are involved, all with different backgrounds, power agendas, aims, roles and competencies.” Participatory initiatives involve a plurality of actors and aim at a variety of objectives, thus these projects are usually complex (Dinardi, 2015; Pollock &amp; Sharp, 2012).</span></p></div></div></div><div class="buttons" data-dcnode-id="259"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="260" type="button"><span class="button-link-text" data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="261" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="262"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="254"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="255" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="256"><p data-dcnode-id="257" id="sp0010"><span data-dcnode-id="258" instrument_node="">This study investigates Participatory Cultural Initiatives (i.e., cultural and creative projects, events, and experiences that involve civic engagement), shedding light on how participation unfolds and what elements best explain its dynamics. Based on a sound literature review in the field, the paper focuses on four European case studies: the MuseumsQuartier in Vienna, Matera as a European Capital of Culture, Big City Life in Tor Marancia and Rome City of Film as part of the UNESCO network of creative cities. The findings highlight the dynamics of the governance and the significant role of the orchestrator(s) in shaping the vision and enabling participation of all relevant stakeholders. From a theoretical perspective, this study contributes to the literature and debate on culture as a driver for local regeneration and development. Furthermore, cultural professionals, urban and regional planners, policy makers, institutions and citizens get new insights for designing and managing cultural projects.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-85047421349%26md5%3D415ecd4d2491197690d9aaadc3dc51" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="250" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="251"></path></svg><span class="button-alternative-text" data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><a class="anchor abstract-link" data-dcnode-id="240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S0264275117313975"><span class="anchor-text" data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">View Abstract</span></span></a><div class="Copyright" data-dcnode-id="237"><span class="copyright-line" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">© 2018 Elsevier Ltd. All rights reserved.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="127"><aside aria-label="Related content" class="RelatedContent" data-dcnode-id="128"><section class="SidePanel u-margin-s-bottom" data-dcnode-id="140"><header class="side-panel-header u-margin-s-bottom" data-dcnode-id="229" id="recommended-articles-header"><button aria-expanded="true" class="button-link side-panel-toggle is-up button-link-primary" data-aa-button="sd:product:journal:article:location=recommended-articles:type=close" data-dcnode-id="230" type="button"><span class="button-link-text" data-dcnode-id="233"><h2 class="section-title u-h4" data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Recommended articles</span></h2></span><svg class="icon icon-navigate-down" data-dcnode-id="231" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="232"></path></svg></button></header><div aria-describedby="recommended-articles-header" aria-hidden="false" class="" data-dcnode-id="141"><div data-dcnode-id="155" id="recommended-articles"><ul data-dcnode-id="156"><li class="SidePanelItem" data-dcnode-id="205"><div class="sub-heading" data-dcnode-id="221"><a data-dcnode-id="225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0197397515301235"><h3 class="article-title ellipsis text-s" data-dcnode-id="226" id="recommended-articles-article0-title"><span data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">Struggling for an adaptive strategy? Discourse analysis of urban regeneration processes – A case study of Enning Road in Guangzhou City</span></span></h3></a><div class="article-source ellipsis" data-dcnode-id="222"><div class="source" data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">Habitat International, Volume 56, 2016, pp. 245-257</span></div></div></div><div class="buttons" data-dcnode-id="207"><a class="anchor side-panel-pdf-link" data-dcnode-id="213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0197397515301235/pdfft%3Fmd5%3D747fbfc1f0ddbc7720af9c3f28800c02%26pid%3D1-s2.0-S0197397515301235-main.pdf" rel="nofollow" target="_blank"><svg class="icon icon-pdf-multicolor" data-dcnode-id="216" focusable="false" height="24" viewBox="0 0 32 32" width="24"><path d="M7 .362h17.875l6.763 6.1V31.64H6.948V16z" data-dcnode-id="220" fill="#fff" stroke="#000" stroke-width=".703"></path><path d="M.167 2.592H22.39V9.72H.166z" data-dcnode-id="219" fill="#da0000" stroke="#aaa" stroke-width=".315"></path><path d="M5.97 3.638h1.62c1.053 0 1.483.677 1.488 1.564.008.96-.6 1.564-1.492 1.564h-.644v1.66h-.977V3.64m.977.897v1.34h.542c.27 0 .596-.068.596-.673-.002-.6-.32-.667-.596-.667h-.542m3.8.036v2.92h.35c.933 0 1.223-.448 1.228-1.462.008-1.06-.316-1.45-1.23-1.45h-.347m-.977-.94h1.03c1.68 0 2.523.586 2.534 2.39.01 1.688-.607 2.4-2.534 2.4h-1.03V3.64m4.305 0h2.63v.934h-1.657v.894H16.6V6.4h-1.56v2.026h-.97V3.638" data-dcnode-id="218" fill="#fff9f9"></path><path d="M19.462 13.46c.348 4.274-6.59 16.72-8.508 15.792-1.82-.85 1.53-3.317 2.92-4.366-2.864.894-5.394 3.252-3.837 3.93 2.113.895 7.048-9.25 9.41-15.394zM14.32 24.874c4.767-1.526 14.735-2.974 15.152-1.407.824-3.157-13.72-.37-1
