</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;ab0005&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;as0005&quot;><p id=&quot;sp0020&quot;>Building on the most relevant literature on cultural regeneration and creative cities, this paper provides an integrated framework to investigate the factors exploited by private actors to stimulate the hybridization of urban cultural heritage with creativity and the strategies adopted to engage stakeholders in bottom-up cultural regeneration processes. Two recent Italian cases of cultural regeneration driven by private actors, which exemplify two sharply contrasting urban extremes, have been chosen to validate this integrated theoretical framework of cultural regeneration in the city. Both have been recognized nationally and internationally as examples of best practice: IlCartastorie Museum in Naples and the Farm Cultural Park, Favara. Our results show that private actors mainly draw upon the innovative thinking of the creative class and innovative approaches to stimulate cultural regeneration. The evolutionary processes, and the resulting models of cultural regeneration, are shaped by the visions of these private actors, which are, in turn, influenced by specific urban conditions. In Naples&amp;#x27; highly touristic inner city, the managerial innovation of the IlCartastorie Museum is fostered by the Foundation&amp;#x27;s pro-tourism growth strategy aimed at increasing both social inclusion and the organizational value of the actual museum. In Sicily, Favara&amp;#x27;s socio-economic marginalization means that its transformation into a creative city has to be supported by a strategy conducive to social inclusion and sustainability, which conjoins the explicit strategy of the private actor with an implicit emerging community strategy. Preliminary managerial recommendations and suggestions for effective private engagement and community involvement in cultural regeneration and creative city building are given.</p></div></div></div>" data-dcnode-id="6722" lang="en" name="citation_abstract"><span data-dcnode-id="6721" instrument_node="">

ument_node="">Cite</span></span></button></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="6166" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="6169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.cities.2018.05.003" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="6170" instrument_node="">https://doi.org/10.1016/j.cities.2018.05.003</span></a><a class="rights-and-content" data-dcnode-id="6167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS0264275117313975%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="6168" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="6165"></section><section class="ReferencedArticles" data-dcnode-id="6164"></section><div class="PageDivider" data-dcnode-id="6163"></div><div class="Abstracts u-font-serif" data-dcnode-id="6125" id="abstracts"><div class="abstract author-highlights" data-dcnode-id="6132" id="ab0010" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6161"><span data-dcnode-id="6162" instrument_node="">Highlights</span></h2><div data-dcnode-id="6133" id="as0010"><p data-dcnode-id="6134" id="sp0025"></p><dl class="list" data-dcnode-id="6135"><dt class="list-label" data-dcnode-id="6159"><span data-dcnode-id="6160" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="6156"><p data-dcnode-id="6157" id="p0005"><span data-dcnode-id="6158" instrument_node="">Private actors draw upon the creative class to stimulate cultural regeneration.</span></p></dd><dt class="list-label" data-dcnode-id="6154"><span data-dcnode-id="6155" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="6151"><p data-dcnode-id="6152" id="p0010"><span data-dcnode-id="6153" instrument_node="">Cultural regeneration is shaped by the visions of private actors and specific urban conditions.</span></p></dd><dt class="list-label" data-dcnode-id="6149"><span data-dcnode-id="6150" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="6146"><p data-dcnode-id="6147" id="p0015"><span data-dcnode-id="6148" instrument_node="">Managerial innovation is fostered by the investor's pro-tourism growth strategy.</span></p></dd><dt class="list-label" data-dcnode-id="6144"><span data-dcnode-id="6145" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="6141"><p data-dcnode-id="6142" id="p0020"><span data-dcnode-id="6143" instrument_node="">Creative city building is supported by a strategy conducive to social sustainability.</span></p></dd><dt class="list-label" data-dcnode-id="6139"><span data-dcnode-id="6140" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="6136"><p data-dcnode-id="6137" id="p0025"><span data-dcnode-id="6138" instrument_node="">A semi-explicit bottom-up strategy enables creativity to flourish.</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="6126" id="ab0005" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6130"><span data-dcnode-id="6131" instrument_node="">Abstract</span></h2><div data-dcnode-id="6127" id="as0005"><p data-dcnode-id="6128" id="sp0020"><span data-dcnode-id="6129" instrument_node="">Building on the most relevant literature on cultural regeneration and creative cities, this paper provides an integrated framework to investigate the factors exploited by private actors to stimulate the hybridization of urban cultural heritage with creativity and the strategies adopted to engage stakeholders in bottom-up cultural regeneration processes. Two recent Italian cases of cultural regeneration driven by private actors, which exemplify two sharply contrasting urban extremes, have been chosen to validate this integrated theoretical framework of cultural regeneration in the city. Both have been recognized nationally and internationally as examples of best practice: IlCartastorie Museum in Naples and the Farm Cultural Park, Favara. Our results show that private actors mainly draw upon the innovative thinking of the creative class and innovative approaches to stimulate cultural regeneration. The evolutionary processes, and the resulting models of cultural regeneration, are shaped by the visions of these private actors, which are, in turn, influenced by specific urban conditions. In Naples' highly touristic inner city, the managerial innovation of the IlCartastorie Museum is fostered by the Foundation's pro-tourism growth strategy aimed at increasing both social inclusion and the organizational value of the actual museum. In Sicily, Favara's socio-economic marginalization means that its transformation into a creative city has to be supported by a strategy conducive to social inclusion and sustainability, which conjoins the explicit strategy of the private actor with an implicit emerging community strategy. Preliminary managerial recommendations and suggestions for effective private engagement and community involvement in cultural regeneration and creative city building are given.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="6102" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="6114"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="6115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0264275117313379"><svg class="icon icon-navigate-left" data-dcnode-id="6123" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="6124"></path></svg><span class="button-alternative-text" data-dcnode-id="6116"><strong data-dcnode-id="6121"><span data-dcnode-id="6122" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="6119"><span data-dcnode-id="6120" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="6117"><span data-dcnode-id="6118" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="6103"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="6104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0264275117314051"><span class="button-alternative-text" data-dcnode-id="6107"><strong data-dcnode-id="6112"><span data-dcnode-id="6113" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="6110"><span data-dcnode-id="6111" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="6108"><span data-dcnode-id="6109" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="6105" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="6106"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="6080"><div class="keywords-section" data-dcnode-id="6081" id="ks0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6100"><span data-dcnode-id="6101" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="6097" id="kw0005"><span data-dcnode-id="6098" id="tx0010"><span data-dcnode-id="6099" instrument_node="">Private actor</span></span></div><div class="keyword" data-dcnode-id="6094" id="kw0010"><span data-dcnode-id="6095" id="tx0015"><span data-dcnode-id="6096" instrument_node="">Cultural heritage hybridization</span></span></div><div class="keyword" data-dcnode-id="6091" id="kw0015"><span data-dcnode-id="6092" id="tx0020"><span data-dcnode-id="6093" instrument_node="">Creativity</span></span></div><div class="keyword" data-dcnode-id="6088" id="kw0020"><span data-dcnode-id="6089" id="tx0025"><span data-dcnode-id="6090" instrument_node="">Cultural regeneration model</span></span></div><div class="keyword" data-dcnode-id="6085" id="kw0025"><span data-dcnode-id="6086" id="tx0030"><span data-dcnode-id="6087" instrument_node="">Managerial innovation</span></span></div><div class="keyword" data-dcnode-id="6082" id="kw0030"><span data-dcnode-id="6083" id="tx0035"><span data-dcnode-id="6084" instrument_node="">Creative city</span></span></div></div></div><span data-dcnode-id="6079" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="4987" id="body"><div data-dcnode-id="4993"><section data-dcnode-id="5957" id="s0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6075" id="st0020"><span data-dcnode-id="6078" instrument_node="">1</span><span data-dcnode-id="6077" instrument_node="">. </span><span data-dcnode-id="6076" instrument_node="">Introduction</span></h2><p data-dcnode-id="6034" id="p0030"><span data-dcnode-id="6074" instrument_node="">The shift of post-industrial societies towards the symbolic economy (</span><a class="workspace-trigger" data-dcnode-id="6072" href="#bb0500" name="bbb0500"><span data-dcnode-id="6073" instrument_node="">Zukin, 1995</span></a><span data-dcnode-id="6071" instrument_node="">) has accelerated the repositioning of heritage, culture and creativity as engines of social innovation, economic development and regeneration (</span><a class="workspace-trigger" data-dcnode-id="6069" href="#bb0115" name="bbb0115"><span data-dcnode-id="6070" instrument_node="">Della Lucia &amp; Franch, 2015</span></a><span data-dcnode-id="6068" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6066" href="#bb0170" name="bbb0170"><span data-dcnode-id="6067" instrument_node="">Go &amp; Trunfio, 2014</span></a><span data-dcnode-id="6065" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6063" href="#bb0190" name="bbb0190"><span data-dcnode-id="6064" instrument_node="">Hall, 2004</span></a><span data-dcnode-id="6062" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6060" href="#bb0250" name="bbb0250"><span data-dcnode-id="6061" instrument_node="">Lazzeretti, 2004</span></a><span data-dcnode-id="6059" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6057" href="#bb0365" name="bbb0365"><span data-dcnode-id="6058" instrument_node="">Sacco, Ferilli, &amp; Tavano Blessi, 2014</span></a><span data-dcnode-id="6056" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6054" href="#bb0390" name="bbb0390"><span data-dcnode-id="6055" instrument_node="">Scott, 2010</span></a><span data-dcnode-id="6053" instrument_node="">) and catalysts of new forms of urban tourism (</span><a class="workspace-trigger" data-dcnode-id="6051" href="#bb0030" name="bbb0030"><span data-dcnode-id="6052" instrument_node="">Bellini &amp; Pasquinelli, 2017</span></a><span data-dcnode-id="6050" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6048" href="#bb0270" name="bbb0270"><span data-dcnode-id="6049" instrument_node="">Long &amp; Morpeth, 2016</span></a><span data-dcnode-id="6047" instrument_node="">). According to most research in this field, creativity seems to selectively concentrate in cities and we find most clusters of cultural heritage in inner cities (</span><a class="workspace-trigger" data-dcnode-id="6045" href="#bb0020" name="bbb0020"><span data-dcnode-id="6046" instrument_node="">Barnes &amp; Hutton, 2009</span></a><span data-dcnode-id="6044" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6042" href="#bb0235" name="bbb0235"><span data-dcnode-id="6043" instrument_node="">Landry, 2000</span></a><span data-dcnode-id="6041" instrument_node="">). </span><em data-dcnode-id="6039"><span data-dcnode-id="6040" instrument_node="">Creative cities</span></em><span data-dcnode-id="6038" instrument_node=""> are dynamic contexts where creativity flourishes and traditional urban development models are reconfigured (</span><a class="workspace-trigger" data-dcnode-id="6036" href="#bb0240" name="bbb0240"><span data-dcnode-id="6037" instrument_node="">Landry &amp; Bianchini, 1995</span></a><span data-dcnode-id="6035" instrument_node="">).</span></p><p data-dcnode-id="6004" id="p0035"><span data-dcnode-id="6033" instrument_node="">Although these issues have been extensively dealt with in the social sciences literature, the questions of how cities can capitalise on culture and creativity to stimulate effective, sustainable urban regeneration, and who should lead these processes, have still not been fully answered (</span><a class="workspace-trigger" data-dcnode-id="6031" href="#bb0130" name="bbb0130"><span data-dcnode-id="6032" instrument_node="">Della Lucia, Trunfio, &amp; Go, 2017</span></a><span data-dcnode-id="6030" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6028" href="#bb0265" name="bbb0265"><span data-dcnode-id="6029" instrument_node="">Lidegaard, Nuccio, &amp; Bille, 2017</span></a><span data-dcnode-id="6027" instrument_node="">). Cultural regeneration can become an empty buzzword, particularly if cities assume that cultural and creative industries are a panacea for urban socio-economic crises without giving due consideration to their own particular historical-geographical and socio-political conditions (</span><a class="workspace-trigger" data-dcnode-id="6025" href="#bb0085" name="bbb0085"><span data-dcnode-id="6026" instrument_node="">Cox &amp; O'Brien, 2012</span></a><span data-dcnode-id="6024" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6022" href="#bb0140" name="bbb0140"><span data-dcnode-id="6023" instrument_node="">Evans, 2001</span></a><span data-dcnode-id="6021" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6019" href="#bb0450" name="bbb0450"><span data-dcnode-id="6020" instrument_node="">Vanolo, 2013</span></a><span data-dcnode-id="6014"><span data-dcnode-id="6018" instrument_node="">), or if cities lever mainly on traditional (mass) </span><a class="topic-link" data-dcnode-id="6016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/cultural-tourism" title="Learn more about cultural tourism from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6017" instrument_node="">cultural tourism</span></a><span data-dcnode-id="6015" instrument_node=""> to exploit their cultural heritage (</span></span><a class="workspace-trigger" data-dcnode-id="6012" href="#bb0120" name="bbb0120"><span data-dcnode-id="6013" instrument_node="">Della Lucia &amp; Segre, 2017</span></a><span data-dcnode-id="6011" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6009" href="#bb0355" name="bbb0355"><span data-dcnode-id="6010" instrument_node="">Sacco, 2011</span></a><span data-dcnode-id="6008" instrument_node="">) without giving due consideration to creative sources of value generation in the city. Scepticism about hybridizing cultural legacy with the creative economy is higher where cities are particularly richly culturally endowed, as are many in Italy (</span><a class="workspace-trigger" data-dcnode-id="6006" href="#bb0360" name="bbb0360"><span data-dcnode-id="6007" instrument_node="">Sacco, 2012</span></a><span data-dcnode-id="6005" instrument_node="">).</span></p><p data-dcnode-id="5981" id="p0040"><span data-dcnode-id="6003" instrument_node="">Public actors – inspired by best practices of urban transformation (</span><a class="workspace-trigger" data-dcnode-id="6001" href="#bb0195" name="bbb0195"><span data-dcnode-id="6002" instrument_node="">Hazime, 2011</span></a><span data-dcnode-id="6000" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5998" href="#bb0320" name="bbb0320"><span data-dcnode-id="5999" instrument_node="">Plaza &amp; Haarich, 2010</span></a><span data-dcnode-id="5997" instrument_node="">) – have had a significant role in urban cultural regeneration, fulfilling social and physical needs and investing in cultural catalysts and consumption-led and experience-based strategies (</span><a class="workspace-trigger" data-dcnode-id="5995" href="#bb0100" name="bbb0100"><span data-dcnode-id="5996" instrument_node="">DCMS, 2004</span></a><span data-dcnode-id="5994" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5992" href="#bb0415" name="bbb0415"><span data-dcnode-id="5993" instrument_node="">Tang, 2016</span></a><span data-dcnode-id="5991" instrument_node="">). Private actors thus manage to largely avoid both the responsibility and the financial risk of major investments (</span><a class="workspace-trigger" data-dcnode-id="5989" href="#bb0265" name="bbb0265"><span data-dcnode-id="5990" instrument_node="">Lidegaard et al., 2017</span></a><span data-dcnode-id="5988" instrument_node="">). A shift from top-down to bottom-up approaches to urban transformation has long been advocated (</span><a class="workspace-trigger" data-dcnode-id="5986" href="#bb0040" name="bbb0040"><span data-dcnode-id="5987" instrument_node="">Bianchini, 1993</span></a><span data-dcnode-id="5985" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5983" href="#bb0300" name="bbb0300"><span data-dcnode-id="5984" instrument_node="">Mommaas, 2004</span></a><span data-dcnode-id="5982" instrument_node="">), but the potential for private actors to complement, or even replace, public actors in this debt-burdened period of recession, and to foster community engagement, has not yet been fully recognized.</span></p><p data-dcnode-id="5966" id="p0045"><span data-dcnode-id="5980" instrument_node="">This paper investigates the role of private actors in urban cultural regeneration processes, and particularly the factors levered on to stimulate the hybridization of cities' cultural heritage with creativity, and the strategies adopted to engage stakeholders in cultural regeneration processes. Following a review of the most relevant literature on both culture-led development and regeneration and the creative city, we offer a conceptual framework which integrates issues which are still unexplored in combination: the drivers shaping cultural regeneration models (</span><a class="workspace-trigger" data-dcnode-id="5978" href="#bb0130" name="bbb0130"><span data-dcnode-id="5979" instrument_node="">Della Lucia et al., 2017</span></a><span data-dcnode-id="5977" instrument_node="">), the factors facilitating creative city building (</span><a class="workspace-trigger" data-dcnode-id="5975" href="#bb0045" name="bbb0045"><span data-dcnode-id="5976" instrument_node="">Borseková, Vaňová, &amp; Vitálišová, 2017</span></a><span data-dcnode-id="5970"><span data-dcnode-id="5974" instrument_node="">) and the strategies used to engage stakeholders in the </span><a class="topic-link" data-dcnode-id="5972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/governance" title="Learn more about governance from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5973" instrument_node="">governance</span></a><span data-dcnode-id="5971" instrument_node=""> of a creative city (</span></span><a class="workspace-trigger" data-dcnode-id="5968" href="#bb0265" name="bbb0265"><span data-dcnode-id="5969" instrument_node="">Lidegaard et al., 2017</span></a><span data-dcnode-id="5967" instrument_node="">).</span></p><p data-dcnode-id="5958" id="p0050"><span data-dcnode-id="5965" instrument_node="">Two Italian cultural regeneration cases which exemplify two sharply contrasting urban extremes have been chosen to validate this integrated theoretical framework of cultural regeneration in the city (</span><a class="workspace-trigger" data-dcnode-id="5963" href="#bb0135" name="bbb0135"><span data-dcnode-id="5964" instrument_node="">Eisenhardt, 1989</span></a><span data-dcnode-id="5962" instrument_node="">). The Banco di Napoli Foundation, in the large and developed city of Naples, has turned its historical archives into the – immersive and interactive – IlCartastorie Museum; two resident patrons of the arts have restored old buildings in the Sicilian marginal town of Favara and turned them into the ‘Farm Cultural Park’, a creative and modern cultural centre. Both these projects – whose aim is sustainable development – have adopted innovative approaches to enhance and extract value from cultural heritage through its cross-fertilization with intangible assets. In both cases, the projects have received national and international awards for best practice. We compared the two cases in order to identify their similarities and differences and to ascertain the interpretative capacity of the conceptual framework provided (</span><a class="workspace-trigger" data-dcnode-id="5960" href="#bb0135" name="bbb0135"><span data-dcnode-id="5961" instrument_node="">Eisenhardt, 1989</span></a><span data-dcnode-id="5959" instrument_node="">). Qualitative methods and tools were used to collect case evidence. The discussion and conclusion outline some preliminary managerial recommendations and suggestions for effective private engagement and community involvement in urban cultural regeneration and creative city building.</span></p></section><section data-dcnode-id="5587" id="s0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5953" id="st0025"><span data-dcnode-id="5956" instrument_node="">2</span><span data-dcnode-id="5955" instrument_node="">. </span><span data-dcnode-id="5954" instrument_node="">Theoretical background</span></h2><section data-dcnode-id="5777" id="s0015"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5949" id="st0030"><span data-dcnode-id="5952" instrument_node="">2.1</span><span data-dcnode-id="5951" instrument_node="">. </span><span data-dcnode-id="5950" instrument_node="">Cultural regeneration in the city</span></h3><p data-dcnode-id="5910" id="p0055"><span data-dcnode-id="5948" instrument_node="">Regeneration has been defined as the transformation of a place that has shown symptoms of marginalization or whose previous development models are in crisis (</span><a class="workspace-trigger" data-dcnode-id="5946" href="#bb0210" name="bbb0210"><span data-dcnode-id="5947" instrument_node="">Impact 08, 2007</span></a><span data-dcnode-id="5945" instrument_node="">). Urban cultural regeneration occurs when culture drives the requalification of urban areas, the development of infrastructure and services and the attraction of investment, talents, new residents, and visitor flows. Culture (</span><a class="workspace-trigger" data-dcnode-id="5943" href="#bb0225" name="bbb0225"><span data-dcnode-id="5944" instrument_node="">KEA, 2006</span></a><span data-dcnode-id="5942" instrument_node="">) involves an array of sectors producing both cultural (cultural industries) and non-cultural goods (creative industries) which are constantly evolving and are country and place specific (</span><a class="workspace-trigger" data-dcnode-id="5940" href="#bb0105" name="bbb0105"><span data-dcnode-id="5941" instrument_node="">DCMS, 2013</span></a><span data-dcnode-id="5939" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5937" href="#bb0375" name="bbb0375"><span data-dcnode-id="5938" instrument_node="">Santagata, 2009</span></a><span data-dcnode-id="5936" instrument_node="">). </span><em data-dcnode-id="5934"><span data-dcnode-id="5935" instrument_node="">Cultural heritage</span></em><span data-dcnode-id="5933" instrument_node=""> is the more valuable </span><em data-dcnode-id="5931"><span data-dcnode-id="5932" instrument_node="">Cultural Core</span></em><span data-dcnode-id="5926"><span data-dcnode-id="5930" instrument_node=""> as it relies on irreproducible material (e.g. museum, </span><a class="topic-link" data-dcnode-id="5928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/archaeological-sites" title="Learn more about archeological sites from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5929" instrument_node="">archeological sites</span></a><span data-dcnode-id="5927" instrument_node="">, archives, etc.) and immaterial cultural endowment (values, know how, knowledge, etc.) – both artistic-cultural and professional-productive (</span></span><a class="workspace-trigger" data-dcnode-id="5924" href="#bb0190" name="bbb0190"><span data-dcnode-id="5925" instrument_node="">Hall, 2004</span></a><span data-dcnode-id="5923" instrument_node="">). Reproducible and tradable cultural (industrial) goods are part of the </span><em data-dcnode-id="5921"><span data-dcnode-id="5922" instrument_node="">Cultural Industry</span></em><span data-dcnode-id="5920" instrument_node=""> (film, publishing, music, etc.), while non-cultural goods with high symbolic and experiential value are produced by the </span><em data-dcnode-id="5918"><span data-dcnode-id="5919" instrument_node="">Creative Industry</span></em><span data-dcnode-id="5917" instrument_node="">. The latter levers on </span><em data-dcnode-id="5915"><span data-dcnode-id="5916" instrument_node="">intangible assets</span></em><span data-dcnode-id="5914" instrument_node="">, including knowledge rooted in local contexts, people's creative skills and thinking and information and communication technology (ICT) solutions (</span><em data-dcnode-id="5912"><span data-dcnode-id="5913" instrument_node="">Related Industry</span></em><span data-dcnode-id="5911" instrument_node="">), to generate value within the knowledge, experience and digital economy.</span></p><p data-dcnode-id="5878" id="p0060"><span data-dcnode-id="5909" instrument_node="">The models chosen to regenerate a city and the type of cultural asset incorporated into the process shape the nature and scale of culture-based transformation (</span><a class="workspace-trigger" data-dcnode-id="5907" href="#bb0245" name="bbb0245"><span data-dcnode-id="5908" instrument_node="">Langen &amp; García, 2009</span></a><span data-dcnode-id="5906" instrument_node="">), which can range from close continuity with the past to profound change (</span><a class="workspace-trigger" data-dcnode-id="5904" href="#bb0125" name="bbb0125"><span data-dcnode-id="5905" instrument_node="">Della Lucia, Trunfio, &amp; Go, 2016</span></a><span data-dcnode-id="5903" instrument_node="">). Capturing value through cultural heritage maintains a strong link with a city's identity and authenticity (</span><a class="workspace-trigger" data-dcnode-id="5901" href="#bb0190" name="bbb0190"><span data-dcnode-id="5902" instrument_node="">Hall, 2004</span></a><span data-dcnode-id="5900" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5898" href="#bb0385" name="bbb0385"><span data-dcnode-id="5899" instrument_node="">Scott, 2006</span></a><span data-dcnode-id="5897" instrument_node="">), but may not fully address emerging scenarios and evolving needs. As globalized inter-urban competition is forcing cities to be creative, flexible in targeting markets, and effective innovators of their own image (</span><a class="workspace-trigger" data-dcnode-id="5895" href="#bb0430" name="bbb0430"><span data-dcnode-id="5896" instrument_node="">Trueman, Cook, &amp; Cornelius, 2008</span></a><span data-dcnode-id="5894" instrument_node="">), urban genetic codes may be transformed to complement cultural heritage – or compensate for its paucity – and thus successfully put a city on the global map (</span><a class="workspace-trigger" data-dcnode-id="5892" href="#bb0305" name="bbb0305"><span data-dcnode-id="5893" instrument_node="">Noordmann, 2004</span></a><span data-dcnode-id="5891" instrument_node="">). Iconic architecture and events are currently among the most important cultural catalysts used to revamp urban identity, increase vibrancy and attract creative people and tourists (</span><a class="workspace-trigger" data-dcnode-id="5889" href="#bb0145" name="bbb0145"><span data-dcnode-id="5890" instrument_node="">Evans, 2003</span></a><span data-dcnode-id="5888" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5886" href="#bb0165" name="bbb0165"><span data-dcnode-id="5887" instrument_node="">Getz, 2008</span></a><span data-dcnode-id="5885" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5883" href="#bb0465" name="bbb0465"><span data-dcnode-id="5884" instrument_node="">Zenker, 2009</span></a><span data-dcnode-id="5882" instrument_node="">). However, their development may also entail the risk of the loss of a city's authenticity, and serial reproduction of urban landscapes (</span><a class="workspace-trigger" data-dcnode-id="5880" href="#bb0405" name="bbb0405"><span data-dcnode-id="5881" instrument_node="">Smith, 2007</span></a><span data-dcnode-id="5879" instrument_node="">).</span></p><p data-dcnode-id="5858" id="p0065"><span data-dcnode-id="5877" instrument_node="">The more tradition/past is reconciled with innovation/future (</span><a class="workspace-trigger" data-dcnode-id="5875" href="#bb0235" name="bbb0235"><span data-dcnode-id="5876" instrument_node="">Landry, 2000</span></a><span data-dcnode-id="5874" instrument_node="">), the more pervasive and sustainable is urban cultural regeneration (</span><a class="workspace-trigger" data-dcnode-id="5872" href="#bb0370" name="bbb0370"><span data-dcnode-id="5873" instrument_node="">Sacco, Ferilli, Tavano Blessi, &amp; Nuccio, 2013</span></a><span data-dcnode-id="5871" instrument_node="">), thus allowing cities to remain faithful to their sense of place while enhancing opportunities for generating and extracting value in post-industrial societies (</span><a class="workspace-trigger" data-dcnode-id="5869" href="#bb0450" name="bbb0450"><span data-dcnode-id="5870" instrument_node="">Vanolo, 2013</span></a><span data-dcnode-id="5868" instrument_node="">). Ensuring continuity in tandem with innovation requires complementarities, interactions and sharing between sectors and actors throughout the economy and society (</span><a class="workspace-trigger" data-dcnode-id="5866" href="#bb0355" name="bbb0355"><span data-dcnode-id="5867" instrument_node="">Sacco, 2011</span></a><span data-dcnode-id="5865" instrument_node="">). Hybridization characterizes the processes which innovate sectors and their outputs through their cross-fertilization with the creative economy (</span><a class="workspace-trigger" data-dcnode-id="5863" href="#bb0400" name="bbb0400"><span data-dcnode-id="5864" instrument_node="">Smart Specialisation Platform, 2012</span></a><span data-dcnode-id="5862" instrument_node="">); cultural heritage hybridization with creativity, knowledge and </span><em data-dcnode-id="5860"><span data-dcnode-id="5861" instrument_node="">intangibles</span></em><span data-dcnode-id="5859" instrument_node=""> is a manifestation of these processes.</span></p><p data-dcnode-id="5838" id="p0070"><span data-dcnode-id="5857" instrument_node="">Fostering pervasive hybridization in order to achieve sustainable, innovative and competitive urban development implies the involvement of a wide variety of stakeholders who – to a greater or lesser extent – share authority and responsibility for envisioning and implementing culture-based development and regeneration paths (</span><a class="workspace-trigger" data-dcnode-id="5855" href="#bb0160" name="bbb0160"><span data-dcnode-id="5856" instrument_node="">García, 2005</span></a><span data-dcnode-id="5854" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5852" href="#bb0380" name="bbb0380"><span data-dcnode-id="5853" instrument_node="">Scott, 2004</span></a><span data-dcnode-id="5851" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5849" href="#bb0420" name="bbb0420"><span data-dcnode-id="5850" instrument_node="">Tavano Blessi, Grossi, Sacco, Pieretti, &amp; Ferilli, 2015</span></a><span data-dcnode-id="5848" instrument_node="">). In the creation of a shared vision of urban development, the greatest challenge is to overcome the significant barriers that inevitably arise when a wide variety of stakeholders are involved, all with different backgrounds, power agendas, aims, roles and competences. This diversity shapes both the material (structures, systems, services) and intangible urban transformation (symbols, values, identity and image) that urban stakeholders will allow, or accept, over time (</span><a class="workspace-trigger" data-dcnode-id="5846" href="#bb0305" name="bbb0305"><span data-dcnode-id="5847" instrument_node="">Noordmann, 2004</span></a><span data-dcnode-id="5845" instrument_node="">); urban image-making, (re)positioning and (re)branding can all be problematic (</span><a class="workspace-trigger" data-dcnode-id="5843" href="#bb0010" name="bbb0010"><span data-dcnode-id="5844" instrument_node="">Anholt, 2003</span></a><span data-dcnode-id="5842" instrument_node="">). Overcoming these barriers and achieving a shared vision requires a shift from top-down to bottom-up approaches to urban transformation in order to enable broad community involvement (</span><a class="workspace-trigger" data-dcnode-id="5840" href="#bb0040" name="bbb0040"><span data-dcnode-id="5841" instrument_node="">Bianchini, 1993</span></a><span data-dcnode-id="5839" instrument_node="">).</span></p><p data-dcnode-id="5797" id="p0075"><span data-dcnode-id="5837" instrument_node="">By combining </span><em data-dcnode-id="5835"><span data-dcnode-id="5836" instrument_node="">cultural heritage hybridization with creativity</span></em><span data-dcnode-id="5834" instrument_node=""> and </span><span data-dcnode-id="5830"><em data-dcnode-id="5831"><a class="topic-link" data-dcnode-id="5832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/stakeholder-engagement" title="Learn more about stakeholder engagement from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5833" instrument_node="">stakeholder engagement</span></a></em></span><span data-dcnode-id="5829" instrument_node=""> – both low and high – </span><a class="workspace-trigger" data-dcnode-id="5827" href="#bb0130" name="bbb0130"><span data-dcnode-id="5828" instrument_node="">Della Lucia et al. (2017)</span></a><span data-dcnode-id="5826" instrument_node=""> have identified a conceptual framework depicting four cultural regeneration models, lying along two perpendicular axes. In the </span><span data-dcnode-id="5818"><em data-dcnode-id="5824"><span data-dcnode-id="5825" instrument_node="">public </span></em><em data-dcnode-id="5821"><a class="topic-link" data-dcnode-id="5822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/patronage" title="Learn more about patronage from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5823" instrument_node="">patronage</span></a></em><em data-dcnode-id="5819"><span data-dcnode-id="5820" instrument_node=""> model</span></em></span><span data-dcnode-id="5813"><span data-dcnode-id="5817" instrument_node=""> policy makers lever on heritage conservation through top-down approaches and value creation occurs through traditional </span><a class="topic-link" data-dcnode-id="5815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/cultural-tourism" title="Learn more about cultural tourism from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5816" instrument_node="">cultural tourism</span></a><span data-dcnode-id="5814" instrument_node="">. Public patronage is a model of both inner city cultural regeneration – heritage tends to cluster in the historical core (</span></span><a class="workspace-trigger" data-dcnode-id="5811" href="#bb0300" name="bbb0300"><span data-dcnode-id="5812" instrument_node="">Mommaas, 2004</span></a><span data-dcnode-id="5810" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5808" href="#bb0330" name="bbb0330"><span data-dcnode-id="5809" instrument_node="">Pratt, 2008</span></a><span data-dcnode-id="5807" instrument_node="">) – and of public cultural organization management, conserving urban cultural heritage. In the </span><em data-dcnode-id="5805"><span data-dcnode-id="5806" instrument_node="">socio-cultural innovation model</span></em><span data-dcnode-id="5804" instrument_node="">, on the other hand, urban stakeholders are involved in pervasive processes, which enhance and extract value from the innovation of the city's material and immaterial endowment through hybridizing these resources with intangible assets; creative tourism is a sector-specific manifestation of these processes (</span><a class="workspace-trigger" data-dcnode-id="5802" href="#bb0310" name="bbb0310"><span data-dcnode-id="5803" instrument_node="">OECD, 2014</span></a><span data-dcnode-id="5801" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5799" href="#bb0345" name="bbb0345"><span data-dcnode-id="5800" instrument_node="">Richards, 2014</span></a><span data-dcnode-id="5798" instrument_node="">). Bottom-up approaches, which balance a variety of interests and possible conflicts, best foster this model.</span></p><p data-dcnode-id="5778" id="p0080"><span data-dcnode-id="5796" instrument_node="">The conceptual framework of cultural regeneration models (</span><a class="workspace-trigger" data-dcnode-id="5794" href="#bb0130" name="bbb0130"><span data-dcnode-id="5795" instrument_node="">Della Lucia et al., 2017</span></a><span data-dcnode-id="5789"><span data-dcnode-id="5793" instrument_node="">) may be linked to the nature and range of stakeholder participation in decision-making connected to urban transformation through the mechanisms of </span><a class="topic-link" data-dcnode-id="5791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/urban-governance" title="Learn more about urban governance from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5792" instrument_node="">urban governance</span></a><span data-dcnode-id="5790" instrument_node="">. Recognizing the need for both private and public investments and participative urban decision making (</span></span><a class="workspace-trigger" data-dcnode-id="5787" href="#bb0445" name="bbb0445"><span data-dcnode-id="5788" instrument_node="">Van Boxmeer &amp; Van Beckhoven, 2005</span></a><span data-dcnode-id="5786" instrument_node="">), </span><a class="workspace-trigger" data-dcnode-id="5784" href="#bb0265" name="bbb0265"><span data-dcnode-id="5785" instrument_node="">Lidegaard et al. (2017)</span></a><span data-dcnode-id="5779"><span data-dcnode-id="5783" instrument_node=""> have developed a conceptual matrix for examining creative city </span><a class="topic-link" data-dcnode-id="5781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/governance" title="Learn more about governance from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5782" instrument_node="">governance</span></a><span data-dcnode-id="5780" instrument_node="">, entailing two main governance types and related strategies, which can be applied to describe the cultural regeneration model more broadly. Top-down governance promotes urban regeneration by funding and controlling publicly dominated agencies. Bottom-up governance includes private initiatives emerging from the willingness and capability of independent local actors to participate – to a greater or lesser extent – in the process of urban transformation. These governance models may use both explicit and implicit strategies – the former dominated by well-defined objectives, the latter more laissez-faire and experimental.</span></span></p></section><section data-dcnode-id="5588" id="s0020"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5773" id="st0035"><span data-dcnode-id="5776" instrument_node="">2.2</span><span data-dcnode-id="5775" instrument_node="">. </span><span data-dcnode-id="5774" instrument_node="">Creative cities</span></h3><p data-dcnode-id="5756" id="p0085"><span data-dcnode-id="5772" instrument_node="">A creative urban atmosphere (</span><a class="workspace-trigger" data-dcnode-id="5770" href="#bb0035" name="bbb0035"><span data-dcnode-id="5771" instrument_node="">Bertacchini &amp; Santagata, 2012</span></a><span data-dcnode-id="5769" instrument_node="">) results from the pervasive extraction and enhancing of the city's value through cross-fertilization processes that lead to creative city building (</span><a class="workspace-trigger" data-dcnode-id="5767" href="#bb0120" name="bbb0120"><span data-dcnode-id="5768" instrument_node="">Della Lucia &amp; Segre, 2017</span></a><span data-dcnode-id="5766" instrument_node="">). Creative cities are dynamic urban contexts which lever on intellectual turbulence, experimentation and innovation to make their communities better places to live, work, and play (</span><a class="workspace-trigger" data-dcnode-id="5764" href="#bb0015" name="bbb0015"><span data-dcnode-id="5765" instrument_node="">Ballas, 2013</span></a><span data-dcnode-id="5763" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5761" href="#bb0055" name="bbb0055"><span data-dcnode-id="5762" instrument_node="">Bradford, 2004</span></a><span data-dcnode-id="5760" instrument_node="">), due to their authenticity, uniqueness, ‘coolness’ and human and cultural diversity (</span><a class="workspace-trigger" data-dcnode-id="5758" href="#bb0045" name="bbb0045"><span data-dcnode-id="5759" instrument_node="">Borseková et al., 2017</span></a><span data-dcnode-id="5757" instrument_node="">).</span></p><p data-dcnode-id="5668" id="p0090"><span data-dcnode-id="5755" instrument_node="">The specific processes leading to creative city building lever on different sources of creativity (</span><a class="workspace-trigger" data-dcnode-id="5753" href="#bb0110" name="bbb0110"><span data-dcnode-id="5754" instrument_node="">Della Lucia, 2015</span></a><span data-dcnode-id="5752" instrument_node="">). A city's </span><em data-dcnode-id="5750"><span data-dcnode-id="5751" instrument_node="">socio-cultural context</span></em><span data-dcnode-id="5749" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="5747" href="#bb0080" name="bbb0080"><span data-dcnode-id="5748" instrument_node="">Cooke &amp; Lazzeretti, 2008</span></a><span data-dcnode-id="5746" instrument_node="">) – shaped over time by its </span><em data-dcnode-id="5744"><span data-dcnode-id="5745" instrument_node="">history</span></em><span data-dcnode-id="5743" instrument_node="">, </span><em data-dcnode-id="5741"><span data-dcnode-id="5742" instrument_node="">cultural capital</span></em><span data-dcnode-id="5740" instrument_node=""> and </span><em data-dcnode-id="5738"><span data-dcnode-id="5739" instrument_node="">creative institutions</span></em><span data-dcnode-id="5737" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="5735" href="#bb0385" name="bbb0385"><span data-dcnode-id="5736" instrument_node="">Scott, 2006</span></a><span data-dcnode-id="5734" instrument_node="">) – is key. Urban </span><em data-dcnode-id="5732"><span data-dcnode-id="5733" instrument_node="">history</span></em><span data-dcnode-id="5727"><span data-dcnode-id="5731" instrument_node=""> bequeaths both a tangible and an </span><a class="topic-link" data-dcnode-id="5729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/intangible-cultural-heritage" title="Learn more about intangible cultural heritage from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5730" instrument_node="">intangible cultural heritage</span></a><span data-dcnode-id="5728" instrument_node="">; a city's </span></span><em data-dcnode-id="5725"><span data-dcnode-id="5726" instrument_node="">cultural capital</span></em><span data-dcnode-id="5724" instrument_node=""> is a form of social capital (</span><a class="workspace-trigger" data-dcnode-id="5722" href="#bb0215" name="bbb0215"><span data-dcnode-id="5723" instrument_node="">Inkpen &amp; Tsang, 2005</span></a><span data-dcnode-id="5721" instrument_node="">) created through interdependencies and the trade within and between urban communities of creative workers; </span><em data-dcnode-id="5719"><span data-dcnode-id="5720" instrument_node="">creative institutions</span></em><span data-dcnode-id="5718" instrument_node=""> include scientific and cultural organizations which can be assimilated to formal and informal spaces for social interaction (</span><a class="workspace-trigger" data-dcnode-id="5716" href="#bb0075" name="bbb0075"><span data-dcnode-id="5717" instrument_node="">Cohendet, Grandadama, &amp; Simon, 2010</span></a><span data-dcnode-id="5715" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5713" href="#bb0205" name="bbb0205"><span data-dcnode-id="5714" instrument_node="">Hutton, 2009</span></a><span data-dcnode-id="5712" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5710" href="#bb0425" name="bbb0425"><span data-dcnode-id="5711" instrument_node="">Tavano Blessi, Tremblay, Sandri, &amp; Pilati, 2012</span></a><span data-dcnode-id="5709" instrument_node="">). Other sources of creativity include the </span><em data-dcnode-id="5707"><span data-dcnode-id="5708" instrument_node="">innovative thinking</span></em><span data-dcnode-id="5706" instrument_node=""> of the </span><em data-dcnode-id="5704"><span data-dcnode-id="5705" instrument_node="">creative class</span></em><span data-dcnode-id="5703" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="5701" href="#bb0155" name="bbb0155"><span data-dcnode-id="5702" instrument_node="">Florida, 2002</span></a><span data-dcnode-id="5700" instrument_node="">) – talents attracted to the city by urban amenities and tolerance – and the urban clustering of </span><em data-dcnode-id="5698"><span data-dcnode-id="5699" instrument_node="">cultural and creative industries</span></em><span data-dcnode-id="5697" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="5695" href="#bb0280" name="bbb0280"><span data-dcnode-id="5696" instrument_node="">Maskell &amp; Lorenzen, 2004</span></a><span data-dcnode-id="5690"><span data-dcnode-id="5694" instrument_node="">). The concentration and the interaction between the different talents and </span><a class="topic-link" data-dcnode-id="5692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/economic-sector" title="Learn more about economic sectors from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5693" instrument_node="">economic sectors</span></a><span data-dcnode-id="5691" instrument_node=""> that </span></span><em data-dcnode-id="5688"><span data-dcnode-id="5689" instrument_node="">cultural and creative industries</span></em><span data-dcnode-id="5687" instrument_node=""> encompass (</span><a class="workspace-trigger" data-dcnode-id="5685" href="#bb0275" name="bbb0275"><span data-dcnode-id="5686" instrument_node="">Lorenzen &amp; Frederiksen, 2008</span></a><span data-dcnode-id="5684" instrument_node="">) allow the creativity embedded in the urban context to be extracted and enhanced, and goods and services with high cultural and symbolic value to be produced (</span><a class="workspace-trigger" data-dcnode-id="5682" href="#bb0095" name="bbb0095"><span data-dcnode-id="5683" instrument_node="">Currid, 2007</span></a><span data-dcnode-id="5681" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5679" href="#bb0425" name="bbb0425"><span data-dcnode-id="5680" instrument_node="">Tavano Blessi et al., 2012</span></a><span data-dcnode-id="5678" instrument_node="">). This process, in turn, fosters the development of a creative atmosphere (</span><a class="workspace-trigger" data-dcnode-id="5676" href="#bb0035" name="bbb0035"><span data-dcnode-id="5677" instrument_node="">Bertacchini &amp; Santagata, 2012</span></a><span data-dcnode-id="5675" instrument_node="">), which allows innovation and cross-fertilization to flourish (</span><a class="workspace-trigger" data-dcnode-id="5673" href="#bb0185" name="bbb0185"><span data-dcnode-id="5674" instrument_node="">Hall, 2000</span></a><span data-dcnode-id="5672" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5670" href="#bb0230" name="bbb0230"><span data-dcnode-id="5671" instrument_node="">KEA, 2009</span></a><span data-dcnode-id="5669" instrument_node="">).</span></p><p data-dcnode-id="5642" id="p0095"><span data-dcnode-id="5667" instrument_node="">Knowledge and technology-intensive businesses, which develop synergies and interdependencies at local and global levels (</span><a class="workspace-trigger" data-dcnode-id="5665" href="#bb0065" name="bbb0065"><span data-dcnode-id="5666" instrument_node="">Castells, 2004</span></a><span data-dcnode-id="5664" instrument_node="">), and the advanced immaterial products and leisure opportunities which result from these sources of urban creativity (</span><a class="workspace-trigger" data-dcnode-id="5662" href="#bb0200" name="bbb0200"><span data-dcnode-id="5663" instrument_node="">Hubbard, 2006</span></a><span data-dcnode-id="5661" instrument_node="">), define the creative city as a </span><em data-dcnode-id="5659"><span data-dcnode-id="5660" instrument_node="">knowledge city</span></em><span data-dcnode-id="5658" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="5656" href="#bb0435" name="bbb0435"><span data-dcnode-id="5657" instrument_node="">Trullen &amp; Boix, 2008</span></a><span data-dcnode-id="5655" instrument_node="">) and a </span><em data-dcnode-id="5653"><span data-dcnode-id="5654" instrument_node="">leisure and entertainment machine</span></em><span data-dcnode-id="5652" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="5650" href="#bb0070" name="bbb0070"><span data-dcnode-id="5651" instrument_node="">Clark, Lloyd, Wong, &amp; Jain, 2002</span></a><span data-dcnode-id="5649" instrument_node="">). The public sector has played a leading role in creative city building by levering factors such as human resources attraction and training (artists, talents, knowledge workers, etc.) and the development of hard and soft infrastructures (public spaces, amenities, cultural events, leisure time infrastructure, ITC infrastructures, etc.) (</span><a class="workspace-trigger" data-dcnode-id="5647" href="#bb0045" name="bbb0045"><span data-dcnode-id="5648" instrument_node="">Borseková et al., 2017</span></a><span data-dcnode-id="5646" instrument_node="">). These social and physical factors should create a supportive environment which inspires private creative and economic initiatives (</span><a class="workspace-trigger" data-dcnode-id="5644" href="#bb0325" name="bbb0325"><span data-dcnode-id="5645" instrument_node="">Ponzini &amp; Rossi, 2010</span></a><span data-dcnode-id="5643" instrument_node="">), rather than imposing rigid templates for urban development and regeneration.</span></p><p data-dcnode-id="5589" id="p0100"><span data-dcnode-id="5641" instrument_node="">Although it has been suggested that transforming urban centres all over the world into creative cities could offer real possibilities for innovative, sustainable development, the model is not without its contradictions. The complex diversity of social, economic and political urban stakeholders requires the development of relative and situational concepts (</span><a class="workspace-trigger" data-dcnode-id="5639" href="#bb0340" name="bbb0340"><span data-dcnode-id="5640" instrument_node="">Pratt, 2011</span></a><span data-dcnode-id="5638" instrument_node="">). The migration of the creative class into cities has led to the relocation of residents and the reordering of urban social and cultural priorities (</span><a class="workspace-trigger" data-dcnode-id="5636" href="#bb0260" name="bbb0260"><span data-dcnode-id="5637" instrument_node="">Lees, 2000</span></a><span data-dcnode-id="5631"><span data-dcnode-id="5635" instrument_node="">). </span><a class="topic-link" data-dcnode-id="5633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/gentrification" title="Learn more about Gentrification from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5634" instrument_node="">Gentrification</span></a><span data-dcnode-id="5632" instrument_node=""> has become a much debated issue internationally, in cities such as New York (</span></span><a class="workspace-trigger" data-dcnode-id="5629" href="#bb0470" name="bbb0470"><span data-dcnode-id="5630" instrument_node="">Zukin, 1982</span></a><span data-dcnode-id="5628" instrument_node="">), London (</span><a class="workspace-trigger" data-dcnode-id="5626" href="#bb0335" name="bbb0335"><span data-dcnode-id="5627" instrument_node="">Pratt, 2009</span></a><span data-dcnode-id="5625" instrument_node="">), Bilbao (</span><a class="workspace-trigger" data-dcnode-id="5623" href="#bb0315" name="bbb0315"><span data-dcnode-id="5624" instrument_node="">Plaza, 2000</span></a><span data-dcnode-id="5622" instrument_node="">), and Sydney (</span><a class="workspace-trigger" data-dcnode-id="5620" href="#bb0050" name="bbb0050"><span data-dcnode-id="5621" instrument_node="">Bounds &amp; Morris, 2006</span></a><span data-dcnode-id="5615"><span data-dcnode-id="5619" instrument_node="">), all generally considered to be creative cities. Other contradictions come into play in the cultural </span><a class="topic-link" data-dcnode-id="5617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/consumerism" title="Learn more about consumerism from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5618" instrument_node="">consumerism</span></a><span data-dcnode-id="5616" instrument_node=""> that can lead to the commodification of urban landscapes – criticized as McGuggenization (</span></span><a class="workspace-trigger" data-dcnode-id="5613" href="#bb0170" name="bbb0170"><span data-dcnode-id="5614" instrument_node="">Go &amp; Trunfio, 2014</span></a><span data-dcnode-id="5612" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5610" href="#bb0285" name="bbb0285"><span data-dcnode-id="5611" instrument_node="">McNeill, 2000</span></a><span data-dcnode-id="5609" instrument_node="">), Dubaisation (</span><a class="workspace-trigger" data-dcnode-id="5607" href="#bb0005" name="bbb0005"><span data-dcnode-id="5608" instrument_node="">Al Rabadya, 2012</span></a><span data-dcnode-id="5606" instrument_node="">); and eventification (</span><a class="workspace-trigger" data-dcnode-id="5604" href="#bb0220" name="bbb0220"><span data-dcnode-id="5605" instrument_node="">Jakob, 2012</span></a><span data-dcnode-id="5603" instrument_node="">) – which occurs when the </span><em data-dcnode-id="5601"><span data-dcnode-id="5602" instrument_node="">leisure and entertainment</span></em><span data-dcnode-id="5600" instrument_node=""> city comes to dominate the </span><em data-dcnode-id="5598"><span data-dcnode-id="5599" instrument_node="">knowledge</span></em><span data-dcnode-id="5593"><span data-dcnode-id="5597" instrument_node=""> city, the actual-producer of the goods and services which define the city's high cultural and symbolic value. Finally, the firms operating in the cultural and creative economy are usually small and short-lived; they hire independent workers and offer precarious work which does not necessarily contribute to </span><a class="topic-link" data-dcnode-id="5595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/sustainable-urban-development" title="Learn more about sustainable urban development from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5596" instrument_node="">sustainable urban development</span></a><span data-dcnode-id="5594" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="5591" href="#bb0340" name="bbb0340"><span data-dcnode-id="5592" instrument_node="">Pratt, 2011</span></a><span data-dcnode-id="5590" instrument_node="">).</span></p></section></section><section data-dcnode-id="5466" id="s0025"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5583" id="st0040"><span data-dcnode-id="5586" instrument_node="">3</span><span data-dcnode-id="5585" instrument_node="">. </span><span data-dcnode-id="5584" instrument_node="">Case study</span></h2><p data-dcnode-id="5565" id="p0105"><span data-dcnode-id="5582" instrument_node="">Italy has a rich artistic and cultural heritage (</span><a class="workspace-trigger" data-dcnode-id="5580" href="#bb0290" name="bbb0290"><span data-dcnode-id="5581" instrument_node="">MIBACT, 2016</span></a><span data-dcnode-id="5575"><span data-dcnode-id="5579" instrument_node="">), and is one of the top ten world </span><a class="topic-link" data-dcnode-id="5577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/cultural-tourism" title="Learn more about tourism cultural from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5578" instrument_node="">tourism cultural</span></a><span data-dcnode-id="5576" instrument_node=""> destinations in terms of international tourist arrivals and receipts (</span></span><a class="workspace-trigger" data-dcnode-id="5573" href="#bb0440" name="bbb0440"><span data-dcnode-id="5574" instrument_node="">UNWTO, 2017</span></a><span data-dcnode-id="5572" instrument_node="">). Its cultural and creative industries are among the biggest in Europe and some sectors enjoy a strong international position (</span><a class="workspace-trigger" data-dcnode-id="5570" href="#bb0375" name="bbb0375"><span data-dcnode-id="5571" instrument_node="">Santagata, 2009</span></a><span data-dcnode-id="5569" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5567" href="#bb0410" name="bbb0410"><span data-dcnode-id="5568" instrument_node="">Symbola, 2016</span></a><span data-dcnode-id="5566" instrument_node="">).</span></p><p data-dcnode-id="5538" id="p0110"><span data-dcnode-id="5564" instrument_node="">Studies on the Italian cultural and creative economy and tourism carried out at the local/urban level (</span><a class="workspace-trigger" data-dcnode-id="5562" href="#bb0120" name="bbb0120"><span data-dcnode-id="5563" instrument_node="">Della Lucia &amp; Segre, 2017</span></a><span data-dcnode-id="5561" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5559" href="#bb0255" name="bbb0255"><span data-dcnode-id="5560" instrument_node="">Lazzeretti, Boix, &amp; Capone, 2008</span></a><span data-dcnode-id="5554"><span data-dcnode-id="5558" instrument_node="">) show that most small-and-medium-sized cities still specialize in </span><a class="topic-link" data-dcnode-id="5556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/manufacturing-sector" title="Learn more about manufacturing sectors from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5557" instrument_node="">manufacturing sectors</span></a><span data-dcnode-id="5555" instrument_node="">, including made-in-Italy (fashion, design, etc.) (</span></span><a class="workspace-trigger" data-dcnode-id="5552" href="#bb0395" name="bbb0395"><span data-dcnode-id="5553" instrument_node="">Sforzi &amp; Lorenzini, 2002</span></a><span data-dcnode-id="5551" instrument_node="">), or have a strong tourist monoculture (</span><a class="workspace-trigger" data-dcnode-id="5549" href="#bb0060" name="bbb0060"><span data-dcnode-id="5550" instrument_node="">Capone, 2016</span></a><span data-dcnode-id="5548" instrument_node="">). Cultural tourism is the biggest generator of value, exploiting Italy's rich cultural heritage (</span><a class="workspace-trigger" data-dcnode-id="5546" href="#bb0360" name="bbb0360"><span data-dcnode-id="5547" instrument_node="">Sacco, 2012</span></a><span data-dcnode-id="5545" instrument_node="">). The sustainability and competitiveness of Italian cities would undoubtedly benefit from complementarities of sectoral policies and projects/investments that cross-fertilize cultural heritage (</span><a class="workspace-trigger" data-dcnode-id="5543" href="#bb0310" name="bbb0310"><span data-dcnode-id="5544" instrument_node="">OECD, 2014</span></a><span data-dcnode-id="5542" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5540" href="#bb0360" name="bbb0360"><span data-dcnode-id="5541" instrument_node="">Sacco, 2012</span></a><span data-dcnode-id="5539" instrument_node="">).</span></p><p data-dcnode-id="5530" id="p0115"><span data-dcnode-id="5537" instrument_node="">Value creation in Italian cities through culture-based processes outside the cultural tourism mainstream can occur in a number of ways: original, effective combinations of cultural heritage and creative content, knowledge, or ICTs, for example, or the linking of intangible professional-productive Italian traditions – fashion and design in particular – and tourism (</span><a class="workspace-trigger" data-dcnode-id="5535" href="#bb0120" name="bbb0120"><span data-dcnode-id="5536" instrument_node="">Della Lucia &amp; Segre, 2017</span></a><span data-dcnode-id="5534" instrument_node="">). Projects that, while fitting into the traditional tourism-oriented approach, also achieve results in terms of sustainable design, innovation, social inclusion, learning programs and new entrepreneurship are equally of great interest (</span><a class="workspace-trigger" data-dcnode-id="5532" href="#bb0360" name="bbb0360"><span data-dcnode-id="5533" instrument_node="">Sacco, 2012</span></a><span data-dcnode-id="5531" instrument_node="">).</span></p><p data-dcnode-id="5518" id="p0120"><span data-dcnode-id="5529" instrument_node="">In Italy today, there are some cases of best practice, which, while they may only partially achieve these different goals, nevertheless may actually contain the potential to shape innovative urban transformations in very different urban contexts (</span><a class="workspace-trigger" data-dcnode-id="5527" href="#bb0135" name="bbb0135"><span data-dcnode-id="5528" instrument_node="">Eisenhardt, 1989</span></a><span data-dcnode-id="5526" instrument_node="">): developed urban areas facing changing market conditions </span><em data-dcnode-id="5524"><span data-dcnode-id="5525" instrument_node="">and</span></em><span data-dcnode-id="5519"><span data-dcnode-id="5523" instrument_node=""> marginal urban areas struggling with economic, social, geographical and infrastructural challenges. Our case studies were primarily selected because they: are </span><a class="topic-link" data-dcnode-id="5521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/cultural-programmes" title="Learn more about cultural projects from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5522" instrument_node="">cultural projects</span></a><span data-dcnode-id="5520" instrument_node=""> driven by private actors; involve contrasting urban contexts; exploit the cities' historical endowment; introduce social, organizational and technological innovation; are intended to foster sustainable development; have been recognized nationally and internationally as examples of best practice.</span></span></p><p data-dcnode-id="5506" id="p0125"><span data-dcnode-id="5517" instrument_node="">The two cases we chose are IlCartastorie Museum (</span><a class="workspace-trigger" data-dcnode-id="5515" href="#bb0295" name="bbb0295"><span data-dcnode-id="5516" instrument_node="">Minguzzi &amp; Riolo, 2016</span></a><span data-dcnode-id="5514" instrument_node="">) in Naples (Campania Region) and the Farm Cultural Park in Favara (Sicily). The urban contexts are sharply contrasting (</span><a class="workspace-trigger" data-dcnode-id="5512" href="#bb0135" name="bbb0135"><span data-dcnode-id="5513" instrument_node="">Eisenhardt, 1989</span></a><span data-dcnode-id="5507"><span data-dcnode-id="5511" instrument_node="">): Naples is a large, developed city, Favara a small, marginal town; Naples already has urban </span><a class="topic-link" data-dcnode-id="5509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/development-policy" title="Learn more about development policies from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5510" instrument_node="">development policies</span></a><span data-dcnode-id="5508" instrument_node=""> in place (including an integrated strategic tourism plan), in Favara there have been very few public interventions; Naples possesses a significant cultural heritage (as testified by its historical archive), Favara is a nondescript, semi-abandoned town. The cases analysed are cultural regeneration projects driven by private actors who have found ways to enhance and extract the economic and social value latent in the cultural endowment of their cities; these paths provide an alternative to traditional cultural tourism and involve the use of intangible factors to cross-fertilize the cultural heritage.</span></span></p><section data-dcnode-id="5491" id="s0030"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5502" id="st0045"><span data-dcnode-id="5505" instrument_node="">3.1</span><span data-dcnode-id="5504" instrument_node="">. </span><span data-dcnode-id="5503" instrument_node="">The IlCartastorie in Naples</span></h3><p data-dcnode-id="5500" id="p0130"><span data-dcnode-id="5501" instrument_node="">Located in the south of Italy, Naples – Italy's third-largest city (pop. c. 1 million) and fourth-largest urban economy – has the most extensive inner city in Europe (1700 ha), which has been a UNESCO cultural World Heritage Site since 1995. Founded in the 9th century BCE, it has been a cultural centre since Magna Grecia and the Western Roman Empire and a cultural destination since the years of the ‘Grand Tour’. The city's cultural heritage, cultural and creative initiatives and contemporary urban fabric have made it an important urban destination (1 million tourists in 2016). Culture has been prioritized in the 2017 participative strategic tourism plan – Napoli 2020 – which aims to attract 2 million tourists in 2020 and to develop diverse forms of cultural and creative tourism. Naples – along with Florence, Milan, Rome and Venice – has adopted Italy's new national urban policies for sustainable and smart tourism.</span></p><p data-dcnode-id="5492" id="p0135"><span data-dcnode-id="5499" instrument_node="">IlCartastorie (</span><a data-dcnode-id="5497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ilcartastorie.it/en" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5498" instrument_node="">http://www.ilcartastorie.it/en/</span></a><span data-dcnode-id="5496" instrument_node="">) is an interactive, immersive museum housed in the former historical archives of the Banco di Napoli Foundation in inner-city Naples; it is funded by a non-profit, private foundation with social goals which include the sustainable development of southern Italy (</span><a class="workspace-trigger" data-dcnode-id="5494" href="#bb0295" name="bbb0295"><span data-dcnode-id="5495" instrument_node="">Minguzzi &amp; Riolo, 2016</span></a><span data-dcnode-id="5493" instrument_node="">). In recognition of its capacity to draw audiences into a specific cultural heritage in unusual ways, the IlCartastorie Museum has received the highest European honour in the area of Cultural Heritage (2017) (at the European Union Prize for Cultural Heritage/Europa Nostra Awards), as well as the Financial Cultural Heritage (FCH) Prize and the Italian Culture + Enterprise Prize.</span></p></section><section data-dcnode-id="5467" id="s0035"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5487" id="st0050"><span data-dcnode-id="5490" instrument_node="">3.2</span><span data-dcnode-id="5489" instrument_node="">. </span><span data-dcnode-id="5488" instrument_node="">The Farm Cultural Park in Favara</span></h3><p data-dcnode-id="5482" id="p0140"><span data-dcnode-id="5486" instrument_node="">Favara is a small municipality (pop. c. 33,000) which has now been subsumed into the nearby city of Agrigento, Sicily (southern Italy). Until 2010, the town was on the economic margins, and socially very conservative. Agriculture and mining – its primary industries – were in decline, tourism had not been developed, the population was dwindling, and the inner city was plagued by widespread structural instability. As was the case throughout the country, after the Second World War many people moved out of the old town into modern suburbs, and the historic centre became almost like a ghost town – its streets deserted and the buildings neglected (</span><a class="workspace-trigger" data-dcnode-id="5484" href="#bb0150" name="bbb0150"><span data-dcnode-id="5485" instrument_node="">Faraci, 2017</span></a><span data-dcnode-id="5483" instrument_node="">). Originally a Greek colony founded in the 2nd century BCE, Favara has lived under Roman, Byzantine, Saracen, Arab and Norman domination. The town's cultural heritage still retains clear traces of its Arab roots in its historic centre, manifested in the intricate network of streets and alleys, communal yards and extensive courtyard housing, old palaces and the ancient Arab fortress, which, rebuilt, became the Chiaromonte castle.</span></p><p data-dcnode-id="5468" id="p0145"><span data-dcnode-id="5481" instrument_node="">In 2010, a notary, Andrea Bartoli, and his wife, Florinda Saieva, who lived in Favara, decided to buy and restore old buildings – earmarked for demolition by the local authorities, for safety reasons - in the centre of the town, and to turn them into The Farm Cultural Park (</span><a data-dcnode-id="5479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.farmculturalpark.com/EN/index.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5480" instrument_node="">http://www.farmculturalpark.com/EN/index.html</span></a><span data-dcnode-id="5478" instrument_node="">), a dynamic contemporary art centre (</span><a class="workspace-trigger" data-dcnode-id="5476" href="#bb0150" name="bbb0150"><span data-dcnode-id="5477" instrument_node="">Faraci, 2017</span></a><span data-dcnode-id="5475" instrument_node="">). Federculture's Culture of Management Prize – the Italian association of public and private actors in the cultural field – recognized the role of the Farm Cultural Park in the innovative urban regeneration and tourism development of Favara. The English newspaper, </span><em data-dcnode-id="5473"><span data-dcnode-id="5474" instrument_node="">The Guardian</span></em><span data-dcnode-id="5472" instrument_node="">, celebrated Favara's contemporary art and urban regeneration project, placing it 6th in </span><em data-dcnode-id="5470"><span data-dcnode-id="5471" instrument_node="">Purple 10</span></em><span data-dcnode-id="5469" instrument_node="">, the paper's international ranking of holidays for art lovers.</span></p></section></section><section data-dcnode-id="5285" id="s0040"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5462" id="st0055"><span data-dcnode-id="5465" instrument_node="">4</span><span data-dcnode-id="5464" instrument_node="">. </span><span data-dcnode-id="5463" instrument_node="">Methodology</span></h2><p data-dcnode-id="5439" id="p0150"><span data-dcnode-id="5461" instrument_node="">These two Italian examples of best practice in cultural regeneration, both of which have been achieved in extremely challenging and contrasting urban contexts, provide our preliminary insights (</span><a class="workspace-trigger" data-dcnode-id="5459" href="#bb0135" name="bbb0135"><span data-dcnode-id="5460" instrument_node="">Eisenhardt, 1989</span></a><span data-dcnode-id="5458" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5456" href="#bb0460" name="bbb0460"><span data-dcnode-id="5457" instrument_node="">Yin, 2014</span></a><span data-dcnode-id="5455" instrument_node="">). They reveal the factors levered on by private actors to stimulate the hybridization of urban cultural heritage with creativity and the strategies adopted to engage stakeholders in a bottom-up cultural regeneration process. The study of these complex issues – which have never before been unexplored in combination (</span><a class="workspace-trigger" data-dcnode-id="5453" href="#bb0090" name="bbb0090"><span data-dcnode-id="5454" instrument_node="">Creswell, 2007</span></a><span data-dcnode-id="5452" instrument_node="">) –draws on a conceptual framework which integrates the theoretical constructs that we consider best suited to the analysis (</span><a class="workspace-trigger" data-dcnode-id="5450" href="#bb0025" name="bbb0025"><span data-dcnode-id="5451" instrument_node="">Baxter &amp; Jack, 2008</span></a><span data-dcnode-id="5449" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5447" href="#bb0135" name="bbb0135"><span data-dcnode-id="5448" instrument_node="">Eisenhardt, 1989</span></a><span data-dcnode-id="5446" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5444" href="#bb0455" name="bbb0455"><span data-dcnode-id="5445" instrument_node="">Xiao &amp; Smith, 2006</span></a><span data-dcnode-id="5443" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5441" href="#bb0460" name="bbb0460"><span data-dcnode-id="5442" instrument_node="">Yin, 2014</span></a><span data-dcnode-id="5440" instrument_node="">), and which we use to collect empirical evidence from different sources. The contrasting urban contexts in which these projects take place allows for a cross-case comparison of similarities and differences aimed at validating the interpretative capacity of the conceptual framework provided.</span></p><section data-dcnode-id="5308" id="s0045"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5435" id="st0060"><span data-dcnode-id="5438" instrument_node="">4.1</span><span data-dcnode-id="5437" instrument_node="">. </span><span data-dcnode-id="5436" instrument_node="">The research design</span></h3><p data-dcnode-id="5420" id="p0155"><span data-dcnode-id="5434" instrument_node="">Our research investigates the role of private actors in a city's cultural regeneration process by building an integrated framework which connects the conceptual framework of cultural regeneration models (</span><a class="workspace-trigger" data-dcnode-id="5432" href="#bb0130" name="bbb0130"><span data-dcnode-id="5433" instrument_node="">Della Lucia et al., 2017</span></a><span data-dcnode-id="5431" instrument_node="">) both with the factors facilitating creative city buildin
