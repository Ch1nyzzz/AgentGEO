g (</span><a class="workspace-trigger" data-dcnode-id="5429" href="#bb0045" name="bbb0045"><span data-dcnode-id="5430" instrument_node="">Borseková et al., 2017</span></a><span data-dcnode-id="5424"><span data-dcnode-id="5428" instrument_node="">) and with the conceptual matrix of creative city </span><a class="topic-link" data-dcnode-id="5426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/governance" title="Learn more about governance from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5427" instrument_node="">governance</span></a><span data-dcnode-id="5425" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="5422" href="#bb0265" name="bbb0265"><span data-dcnode-id="5423" instrument_node="">Lidegaard et al., 2017)</span></a><span data-dcnode-id="5421" instrument_node="">.</span></p><div data-dcnode-id="5309"><p data-dcnode-id="5334" id="p0160"><span data-dcnode-id="5419" instrument_node="">Our hypothesis is that both drivers shaping the matrix of cultural regeneration models (</span><a class="workspace-trigger" data-dcnode-id="5417" href="#bb0130" name="bbb0130"><span data-dcnode-id="5418" instrument_node="">Della Lucia et al., 2017</span></a><span data-dcnode-id="5412"><span data-dcnode-id="5416" instrument_node="">) – the hybridization of cultural heritage with creativity and the engagement of community stakeholders in the regeneration process itself – may more readily find their facilitators in the private – rather than the public – sector. The matrix identifies levels (low to high) of hybridization between culture and creativity and </span><a class="topic-link" data-dcnode-id="5414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/stakeholder-engagement" title="Learn more about stakeholder engagement from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5415" instrument_node="">stakeholder engagement</span></a><span data-dcnode-id="5413" instrument_node="">, but not how such processes occur. Its integration with theoretical constructs connected to the creation and governance of creative cities (</span></span><a class="workspace-trigger" data-dcnode-id="5410" href="#bb0045" name="bbb0045"><span data-dcnode-id="5411" instrument_node="">Borseková et al., 2017</span></a><span data-dcnode-id="5409" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5407" href="#bb0265" name="bbb0265"><span data-dcnode-id="5408" instrument_node="">Lidegaard et al., 2017</span></a><span data-dcnode-id="5406" instrument_node="">) allows us to trace the evolutionary course of the cultural regeneration model. The </span><em data-dcnode-id="5404"><span data-dcnode-id="5405" instrument_node="">factors</span></em><span data-dcnode-id="5403" instrument_node=""> used to foster the pervasive cross-fertilization processes that produce a creative city (</span><a class="workspace-trigger" data-dcnode-id="5401" href="#bb0045" name="bbb0045"><span data-dcnode-id="5402" instrument_node="">Borseková et al., 2017</span></a><span data-dcnode-id="5400" instrument_node="">) may be assumed to be key stimuli for </span><em data-dcnode-id="5398"><span data-dcnode-id="5399" instrument_node="">heritage-creativity hybridization</span></em><span data-dcnode-id="5397" instrument_node=""> from the </span><em data-dcnode-id="5395"><span data-dcnode-id="5396" instrument_node="">bottom-up</span></em><span data-dcnode-id="5394" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="5392" href="#bb0325" name="bbb0325"><span data-dcnode-id="5393" instrument_node="">Ponzini &amp; Rossi, 2010</span></a><span data-dcnode-id="5391" instrument_node="">). Both implicit or explicit governance strategies of bottom-up stakeholder engagement (</span><a class="workspace-trigger" data-dcnode-id="5389" href="#bb0265" name="bbb0265"><span data-dcnode-id="5390" instrument_node="">Lidegaard et al., 2017</span></a><span data-dcnode-id="5388" instrument_node="">) (from now on </span><em data-dcnode-id="5386"><span data-dcnode-id="5387" instrument_node="">community engagement</span></em><span data-dcnode-id="5385" instrument_node="">) may shape the nature and range of </span><em data-dcnode-id="5383"><span data-dcnode-id="5384" instrument_node="">community engagement</span></em><span data-dcnode-id="5382" instrument_node=""> in cultural regeneration. The adaptation of the cultural regeneration matrix (</span><a class="workspace-trigger" data-dcnode-id="5380" href="#bb0130" name="bbb0130"><span data-dcnode-id="5381" instrument_node="">Della Lucia et al., 2017</span></a><span data-dcnode-id="5379" instrument_node="">) to the private sector activation of the drivers shaping the evolutionary process of cultural regeneration is at the centre of our integrated framework (</span><a class="workspace-trigger" data-dcnode-id="5377" href="#f0005" name="bf0005"><span data-dcnode-id="5378" instrument_node="">Fig. 1</span></a><span data-dcnode-id="5376" instrument_node="">):</span></p><dl class="list" data-dcnode-id="5335"><dt class="list-label" data-dcnode-id="5374"><span data-dcnode-id="5375" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="5355"><p data-dcnode-id="5356" id="p0165"><span data-dcnode-id="5370"><em data-dcnode-id="5371"><a class="topic-link" data-dcnode-id="5372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/patronage" title="Learn more about Patronage from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5373" instrument_node="">Patronage</span></a></em></span><span data-dcnode-id="5369" instrument_node=""> and </span><em data-dcnode-id="5367"><span data-dcnode-id="5368" instrument_node="">Social Innovation</span></em><span data-dcnode-id="5366" instrument_node=""> models entail a low level of cultural heritage hybridization with creativity in private initiatives. In the </span><em data-dcnode-id="5364"><span data-dcnode-id="5365" instrument_node="">Patronage</span></em><span data-dcnode-id="5363" instrument_node=""> model the collection/restoration/preservation of the cultural heritage (buildings, archives, etc.) is focussed upon to pursue private aims and to increase the status, power and reputation of the person or people involved (</span><a class="workspace-trigger" data-dcnode-id="5361" href="#bb0355" name="bbb0355"><span data-dcnode-id="5362" instrument_node="">Sacco, 2011</span></a><span data-dcnode-id="5360" instrument_node="">); urban community engagement is not encouraged. By contrast, in </span><em data-dcnode-id="5358"><span data-dcnode-id="5359" instrument_node="">Social Innovation</span></em><span data-dcnode-id="5357" instrument_node=""> models a number of private initiatives renew historical/industrial urban areas/quarters and site basic functions and services (residential and green areas, education, entertainment, etc.) within the community, thus decreasing social marginalization, fostering relationships, and improving living standards.</span></p></dd><dt class="list-label" data-dcnode-id="5353"><span data-dcnode-id="5354" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="5336"><p data-dcnode-id="5337" id="p0170"><em data-dcnode-id="5351"><span data-dcnode-id="5352" instrument_node="">Managerial Innovation</span></em><span data-dcnode-id="5350" instrument_node=""> and </span><em data-dcnode-id="5348"><span data-dcnode-id="5349" instrument_node="">Creative City</span></em><span data-dcnode-id="5347" instrument_node=""> models involve high levels of cultural heritage hybridization with creativity. In </span><em data-dcnode-id="5345"><span data-dcnode-id="5346" instrument_node="">Managerial innovation</span></em><span data-dcnode-id="5344" instrument_node=""> models, organizational models, marketing and managerial competencies, dynamic capabilities and ICTs are exploited to enhance and extract value from the innovation and the effective management of cultural heritage </span><em data-dcnode-id="5342"><span data-dcnode-id="5343" instrument_node="">but</span></em><span data-dcnode-id="5341" instrument_node=""> other urban stakeholders do not participate. In the </span><em data-dcnode-id="5339"><span data-dcnode-id="5340" instrument_node="">Creative City</span></em><span data-dcnode-id="5338" instrument_node=""> model, a number of private cultural initiatives entailing heritage-creativity hybridization flourish in the city and the engagement of the urban community becomes the engine of widespread social change and economic transformation, and reshapes the city's spaces, social capital and image.</span></p></dd></dl><p></p><figure class="figure text-xs" data-dcnode-id="5310" id="f0005"><span data-dcnode-id="5318"><img alt="Fig. 1" aria-describedby="ca0005" data-dcnode-id="5333" height="353" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0264275117313975-gr1.jpg&amp;raw"><span data-dcnode-id="5332" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5319"><li data-dcnode-id="5326"><a class="anchor download-link u-font-sans" data-dcnode-id="5327" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0264275117313975-gr1_lrg.jpg" target="_blank" title="Download high-res image (178KB)"><span class="anchor-text" data-dcnode-id="5328"><span data-dcnode-id="5331" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5329"><span data-dcnode-id="5330" instrument_node="">Download high-res image (178KB)</span></span></span></a></li><li data-dcnode-id="5320"><a class="anchor download-link u-font-sans" data-dcnode-id="5321" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0264275117313975-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5322"><span data-dcnode-id="5325" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5323"><span data-dcnode-id="5324" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5311"><span data-dcnode-id="5312" id="ca0005"><p data-dcnode-id="5313" id="sp0005"><span class="label" data-dcnode-id="5316"><span data-dcnode-id="5317" instrument_node="">Fig. 1</span></span><span data-dcnode-id="5315" instrument_node="">. </span><span data-dcnode-id="5314" instrument_node="">The models of cultural regeneration.</span></p></span></span></figure></div></section><section data-dcnode-id="5286" id="s0050"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5304" id="st0065"><span data-dcnode-id="5307" instrument_node="">4.2</span><span data-dcnode-id="5306" instrument_node="">. </span><span data-dcnode-id="5305" instrument_node="">The collection and analysis of case study evidence</span></h3><p data-dcnode-id="5287" id="p0175"><span data-dcnode-id="5303" instrument_node="">Qualitative methods and tools were used to collect secondary and primary data from multiple sources of case evidence (</span><a class="workspace-trigger" data-dcnode-id="5301" href="#bb0135" name="bbb0135"><span data-dcnode-id="5302" instrument_node="">Eisenhardt, 1989</span></a><span data-dcnode-id="5300" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5298" href="#bb0505" name="bbb0505"><span data-dcnode-id="5299" instrument_node="">Knafl &amp; Breitmayer, 1989</span></a><span data-dcnode-id="5297" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5295" href="#bb0460" name="bbb0460"><span data-dcnode-id="5296" instrument_node="">Yin, 2014</span></a><span data-dcnode-id="5294" instrument_node="">) in March–October 2017. Secondary data included archival and official documents, website information, newspapers and magazine articles; primary data were collected through in depth semi-structured interviews with project leaders and managers – Sergio Riolo for the IlCartastorie and Andrea Bartoli for the Farm Cultural Park – and direct observations. Interview protocol and questionnaires were defined to investigate the main constructs and multiple investigators conducted interviews. Multiple data sources were triangulated in order to integrate our lines of inquiry; an analytic method of the explanation building was applied in an iterative way to analyse case study evidence, studying how and why they describe the evolutionary process of cultural regeneration, and strengthening internal validity (</span><a class="workspace-trigger" data-dcnode-id="5292" href="#bb0135" name="bbb0135"><span data-dcnode-id="5293" instrument_node="">Eisenhardt, 1989</span></a><span data-dcnode-id="5291" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5289" href="#bb0460" name="bbb0460"><span data-dcnode-id="5290" instrument_node="">Yin, 2014</span></a><span data-dcnode-id="5288" instrument_node="">).</span></p></section></section><section data-dcnode-id="5164" id="s0055"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5281" id="st0070"><span data-dcnode-id="5284" instrument_node="">5</span><span data-dcnode-id="5283" instrument_node="">. </span><span data-dcnode-id="5282" instrument_node="">Results</span></h2><p data-dcnode-id="5276" id="p0180"><span data-dcnode-id="5280" instrument_node="">Insights into the drivers of cultural regeneration, the factors facilitating heritage-creativity hybridization and the strategies used to (eventually) involve the community in the cultural regeneration were the principal results obtained in both of the cases. Using these insights, we identified the model of cultural regeneration currently being followed in each case (</span><a class="workspace-trigger" data-dcnode-id="5278" href="#bb0130" name="bbb0130"><span data-dcnode-id="5279" instrument_node="">Della Lucia et al., 2017</span></a><span data-dcnode-id="5277" instrument_node="">), and the evolutionary process out of which each developed.</span></p><section data-dcnode-id="5221" id="s0060"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5272" id="st0075"><span data-dcnode-id="5275" instrument_node="">5.1</span><span data-dcnode-id="5274" instrument_node="">. </span><span data-dcnode-id="5273" instrument_node="">The IlCartastorie Museum: a model of managerial innovation</span></h3><p data-dcnode-id="5264" id="p0185"><span data-dcnode-id="5271" instrument_node="">In 2016 the Banco di Napoli Foundation invested in the renovation of its historical archive, the world's most important historical bank archive (</span><a class="workspace-trigger" data-dcnode-id="5269" href="#bb0295" name="bbb0295"><span data-dcnode-id="5270" instrument_node="">Minguzzi &amp; Riolo, 2016</span></a><span data-dcnode-id="5268" instrument_node="">). Documents dating back to 1539 record the activities of the city's ancient public banks: volumes and ‘polizze’ (orders of payment) – the precursors of modern cashier's checks (</span><a class="workspace-trigger" data-dcnode-id="5266" href="#bb0510" name="bbb0510"><span data-dcnode-id="5267" instrument_node="">Demarco &amp; Nappi, 1987</span></a><span data-dcnode-id="5265" instrument_node="">); ledgers listing (ordinary) bank clients' names, deposit and withdrawal entries for each client account; credit certificates. As Sergio Riolo, the director of the museum, observed: “The archive preserves 80 km of paper in 330 rooms describing the economic, social, political anthropological and artistic history of the south of Italy”.</span></p><p data-dcnode-id="5262" id="p0190"><span data-dcnode-id="5263" instrument_node="">Rather than mounting a traditional exhibition of a material cultural legacy, this tangible heritage has been turned into an immersive and experiential museum named “IlCartastorie”, which in Italian means stories on paper: the museum uses storytelling to explore the history of Naples and Southern Italy. The driver of this transformation has been the hybridization of cultural legacy with intangible factors including managerial competences, ICT infrastructure and digital storytelling, and the expressive modalities and languages of the performing arts and cultural industries. Through the innovative use of ICT, this unusual place offers an immersive and interactive experience in which voices, sounds and augmented reality bring the historical documents to life. In the words of Sergio Riolo: “IlCartastorie introduces a new idea of innovation that facilitate social benefits allowing us to bring the organization close to the people. This choice is intended to increase the number and variety of people aware of, and interested and involved in, the archives and their content, thus facilitating audience development and engagement. The semiotic of innovation combined with a civic leadership move towards democracy, openness and inclusiveness contribute to sustainable development”.</span></p><p data-dcnode-id="5260" id="p0195"><span data-dcnode-id="5261" instrument_node="">The resulting interactive experiences are manifold. They include digital storytelling about important Neapolitan historical moments and celebrities – the Caravaggio masterpieces in Naples, the plague of 1656, the intuitions and torments of the Prince of Sansevero – cultural productions based on historical themes, creative writing workshops, and innovative projects, such as a collection of stories – “Tales from the Archives” – written by journalists inspired by documents held in the Historical Archives, and originally published in the Italian daily newspaper “Il Mattino”. Another innovative project created multimedia areas (The Music Rooms) where virtual historical figures tell stories and interact with visitors through touch-screens, videos and evocative multimedia systems. A social media game involving these tales from history, published on the museum's website, hopes to involve diverse stakeholders in creating new narratives for the Museum.</span></p><p data-dcnode-id="5258" id="p0200"><span data-dcnode-id="5259" instrument_node="">Although the visionary perspective of the Banco di Napoli Foundation manifests civic leadership and the wish for sustainable development, the cultural regeneration of the historical archive has no spillover effect on either urban community participation or urban area regeneration. The cultural regeneration of the historical archive stops at the Museum gate and has not stimulated urban community participation, other than that of the creative people directly involved in the Museum's activities. The Foundation is currently trying to address this issue with the ‘CO.RE Mercato’ project, which complements the museum's offer by encouraging local entrepreneurs to restart traditional activities in the inner-city market place (e.g. textile and gold-working, other handicrafts, design, food), and to develop forms of creative tourism.</span></p><div data-dcnode-id="5222"><p data-dcnode-id="5247" id="p0205"><span data-dcnode-id="5257" instrument_node="">These drivers of cultural regeneration – a high level of heritage-creativity hybridization, but little urban community engagement – reveal IlCartastorie as a </span><em data-dcnode-id="5255"><span data-dcnode-id="5256" instrument_node="">managerial innovation model</span></em><span data-dcnode-id="5254" instrument_node=""> of cultural regeneration (</span><a class="workspace-trigger" data-dcnode-id="5252" href="#bb0130" name="bbb0130"><span data-dcnode-id="5253" instrument_node="">Della Lucia et al., 2017</span></a><span data-dcnode-id="5251" instrument_node="">). The two-step evolutionary process leading to IlCartastorie's current position in the cultural regeneration matrix is summarized in </span><a class="workspace-trigger" data-dcnode-id="5249" href="#f0010" name="bf0010"><span data-dcnode-id="5250" instrument_node="">Fig. 2</span></a><span data-dcnode-id="5248" instrument_node="">.</span></p><figure class="figure text-xs" data-dcnode-id="5223" id="f0010"><span data-dcnode-id="5231"><img alt="Fig. 2" aria-describedby="ca0010" data-dcnode-id="5246" height="268" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0264275117313975-gr2.jpg&amp;raw"><span data-dcnode-id="5245" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5232"><li data-dcnode-id="5239"><a class="anchor download-link u-font-sans" data-dcnode-id="5240" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0264275117313975-gr2_lrg.jpg" target="_blank" title="Download high-res image (170KB)"><span class="anchor-text" data-dcnode-id="5241"><span data-dcnode-id="5244" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5242"><span data-dcnode-id="5243" instrument_node="">Download high-res image (170KB)</span></span></span></a></li><li data-dcnode-id="5233"><a class="anchor download-link u-font-sans" data-dcnode-id="5234" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0264275117313975-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5235"><span data-dcnode-id="5238" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5236"><span data-dcnode-id="5237" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5224"><span data-dcnode-id="5225" id="ca0010"><p data-dcnode-id="5226" id="sp0010"><span class="label" data-dcnode-id="5229"><span data-dcnode-id="5230" instrument_node="">Fig. 2</span></span><span data-dcnode-id="5228" instrument_node="">. </span><span data-dcnode-id="5227" instrument_node="">The evolutionary cultural regeneration process of the Banco di Napoli Foundation's historical archive.</span></p></span></span></figure></div></section><section data-dcnode-id="5165" id="s0065"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5217" id="st0080"><span data-dcnode-id="5220" instrument_node="">5.2</span><span data-dcnode-id="5219" instrument_node="">. </span><span data-dcnode-id="5218" instrument_node="">The Farm Cultural Park in Favara: towards a creative city</span></h3><p data-dcnode-id="5199" id="p0210"><span data-dcnode-id="5216" instrument_node="">In 2010, a couple of philanthropists from Favara, Andrea Bartoli and his wife Florinda Saieva, bought and restored old buildings, known as the </span><em data-dcnode-id="5214"><span data-dcnode-id="5215" instrument_node="">Sette Cortili</span></em><span data-dcnode-id="5213" instrument_node=""> (seven Courtyards) located in the semi-abandoned city centre of Favara and then transformed them into the Farm Cultural Park, a modern cultural centre (</span><a data-dcnode-id="5211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.farmculturalpark.com/EN/index.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5212" instrument_node="">http://www.farmculturalpark.com/EN/index.html</span></a><span data-dcnode-id="5210" instrument_node="">). This investment was inspired by the couple's decision to take upon themselves the task of designing a new future for their town instead of waiting for the public sector to act. With the intention of creating the conditions for “a feasible and more desirable future for our family and the whole community”, these patrons of the arts – widely-travelled, cosmopolitan architecture/design enthusiasts - started a process of “recovery and re-appropriation of the old town and values and their re-definition through new ways of thinking and living”. Their references were international cultural and social spaces – in London, Paris or Marrakesh – where the synergy of diverse people and objects spark vital new impulses. The masterplan provides for the recovery of about 5000 m</span><sup data-dcnode-id="5208"><span data-dcnode-id="5209" instrument_node="">2</span></sup><span data-dcnode-id="5207" instrument_node=""> devoted to exhibition spaces, artists' residencies, co-work enterprises, places where people can cook and shop together; to date, over 1500 m</span><sup data-dcnode-id="5205"><span data-dcnode-id="5206" instrument_node="">2</span></sup><span data-dcnode-id="5200"><span data-dcnode-id="5204" instrument_node=""> have been given over to new functions. Talents – both emerging and well-known artists and designers – from around the world have been invited to Favara, where they are hosted in return for “expressing their creativity”. They use the spaces as their studios for artistic installations and performances and leave the resultant artworks behind at the end of their stay. The project includes public living spaces (e.g. the Riad Farm, an events and relaxation garden, social kitchens, and vintage and handmade shops); cultural exhibition spaces, one of which contains the world's largest permanent collection of work by US fashion photographer Terry Richardson; and edutainment spaces such as the Children's Museum, the largest Italian museum for children and adolescents. This last has experimental and teaching halls, a theatre and playgrounds and is home to the Children's School of Architecture, where young people can develop free creative thinking, a sense of place and a “do it yourself” culture. In just a few years, the Centre has become an important hub, hosting people interested in experiencing its creative atmosphere, finding inspiration, meeting locals and building social relations. Contemporary art tourism and creative tourism are developing in Favara – which has never before been on any Sicilian tourist itinerary – and thus creating a micro-chain between cultural industry and tourism. The social value of the Farm Cultural Park project has created spillover effects, inspiring other members of the community, individually or in new associations, to create their own businesses, start other urban regeneration projects, or get involved in the Farm Cultural Park, which is now funded by hundreds of people. Many young people have been encouraged to remain in Favara; entrepreneurs from the outside are investing confidently; locals are buying homes and starting businesses. Due to the community engagement of both host and hosted, the regeneration process catalysed by the Farm has spilled beyond the walls of the Sette Cortili and now involves the recovery of the whole historical centre and the surrounding areas: the town's built heritage is thus being conserved and restored, high quality design spaces are being created and the mixed use (cultural, hospitality, residential and commercial) of the restored buildings is revitalizing the town centre. Exemplary projects include the Community Cooperative Farmidable which supports the Farm in the recovery process by acquiring properties and transferring them free of charge to young people who want to set up businesses; the FUN-Favara Urban Network's revitalization of Chiaromonte Castle, which now hosts </span><a class="topic-link" data-dcnode-id="5202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/cultural-tourism" title="Learn more about cultural tourism from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5203" instrument_node="">cultural tourism</span></a><span data-dcnode-id="5201" instrument_node=""> and experiential visits; the crowdfunded Children's Museum, described above. The community's imitation of the best practice exemplified by Bartoli's investment is inspired by expected economic gain, but fostered by the social capital rebuilt through the reactivation of community relationships.</span></span></p><div data-dcnode-id="5166"><p data-dcnode-id="5191" id="p0215"><span data-dcnode-id="5198" instrument_node="">These drivers of cultural generation – the high level of heritage-creativity hybridization stimulated by Andrea Bartoli's initial investment and continued in the community's urban regeneration activities – make Favara an example of a creative city model of cultural regeneration, which can strike a balance between preservation, recycling and renovation (</span><a class="workspace-trigger" data-dcnode-id="5196" href="#bb0130" name="bbb0130"><span data-dcnode-id="5197" instrument_node="">Della Lucia et al., 2017</span></a><span data-dcnode-id="5195" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="5193" href="#f0015" name="bf0015"><span data-dcnode-id="5194" instrument_node="">Fig. 3</span></a><span data-dcnode-id="5192" instrument_node=""> summarizes Favara's three-step evolutionary process.</span></p><figure class="figure text-xs" data-dcnode-id="5167" id="f0015"><span data-dcnode-id="5175"><img alt="Fig. 3" aria-describedby="ca0015" data-dcnode-id="5190" height="282" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0264275117313975-gr3.jpg&amp;raw"><span data-dcnode-id="5189" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5176"><li data-dcnode-id="5183"><a class="anchor download-link u-font-sans" data-dcnode-id="5184" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0264275117313975-gr3_lrg.jpg" target="_blank" title="Download high-res image (242KB)"><span class="anchor-text" data-dcnode-id="5185"><span data-dcnode-id="5188" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5186"><span data-dcnode-id="5187" instrument_node="">Download high-res image (242KB)</span></span></span></a></li><li data-dcnode-id="5177"><a class="anchor download-link u-font-sans" data-dcnode-id="5178" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0264275117313975-gr3.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5179"><span data-dcnode-id="5182" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5180"><span data-dcnode-id="5181" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5168"><span data-dcnode-id="5169" id="ca0015"><p data-dcnode-id="5170" id="sp0015"><span class="label" data-dcnode-id="5173"><span data-dcnode-id="5174" instrument_node="">Fig. 3</span></span><span data-dcnode-id="5172" instrument_node="">. </span><span data-dcnode-id="5171" instrument_node="">The evolutionary process of Favara's cultural regeneration.</span></p></span></span></figure></div></section></section><section data-dcnode-id="5084" id="s0070"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5160" id="st0085"><span data-dcnode-id="5163" instrument_node="">6</span><span data-dcnode-id="5162" instrument_node="">. </span><span data-dcnode-id="5161" instrument_node="">Discussion</span></h2><p data-dcnode-id="5146" id="p0220"><span data-dcnode-id="5159" instrument_node="">Both the IlCartastorie museum and the Farm Cultural park are best practices which have adopted an innovative approach to enhance and extract value from the local urban cultural endowment through the latter's cross-fertilization with intangible assets; in both case, moreover, the aim is sustainable social and economic development. Both similarities and differences have emerged between the evolutionary processes of cultural regeneration adopted by the two cases. We have interpreted these in the light of the aim of this paper, identifying the factors (</span><a class="workspace-trigger" data-dcnode-id="5157" href="#bb0045" name="bbb0045"><span data-dcnode-id="5158" instrument_node="">Borseková et al., 2017</span></a><span data-dcnode-id="5156" instrument_node="">) exploited by private actors to hybridize cultural heritage with creativity and the strategy adopted to (eventually) engage urban community (</span><a class="workspace-trigger" data-dcnode-id="5154" href="#bb0265" name="bbb0265"><span data-dcnode-id="5155" instrument_node="">Lidegaard et al., 2017</span></a><span data-dcnode-id="5153" instrument_node="">) in the cultural regeneration process (</span><a class="workspace-trigger" data-dcnode-id="5151" href="#bb0130" name="bbb0130"><span data-dcnode-id="5152" instrument_node="">Della Lucia et al., 2017</span></a><span data-dcnode-id="5150" instrument_node="">). Any discussion of the cross-case comparison must take into account the extreme urban contexts in which the projects are located, since in both cases these heavily influence any of the spillover effects that produce material or intangible urban transformation (</span><a class="workspace-trigger" data-dcnode-id="5148" href="#bb0305" name="bbb0305"><span data-dcnode-id="5149" instrument_node="">Noordmann, 2004</span></a><span data-dcnode-id="5147" instrument_node="">).</span></p><p data-dcnode-id="5105" id="p0225"><span data-dcnode-id="5145" instrument_node="">In both cases intangible factors (</span><a class="workspace-trigger" data-dcnode-id="5143" href="#bb0045" name="bbb0045"><span data-dcnode-id="5144" instrument_node="">Borseková et al., 2017</span></a><span data-dcnode-id="5142" instrument_node="">) – the innovative thinking (</span><a class="workspace-trigger" data-dcnode-id="5140" href="#bb0235" name="bbb0235"><span data-dcnode-id="5141" instrument_node="">Landry, 2000</span></a><span data-dcnode-id="5139" instrument_node="">) of the creative class (</span><a class="workspace-trigger" data-dcnode-id="5137" href="#bb0155" name="bbb0155"><span data-dcnode-id="5138" instrument_node="">Florida, 2002</span></a><span data-dcnode-id="5136" instrument_node="">) – have been used to cross-fertilize and extract </span><em data-dcnode-id="5134"><span data-dcnode-id="5135" instrument_node="">value</span></em><span data-dcnode-id="5133" instrument_node=""> from cultural heritage, thus stimulating cultural regeneration. The different visions of the private actors involved clearly influenced the evolutionary processes and models of cultural regeneration adopted by the Foundation and the Bartolis (</span><a class="workspace-trigger" data-dcnode-id="5131" href="#bb0130" name="bbb0130"><span data-dcnode-id="5132" instrument_node="">Della Lucia et al., 2017</span></a><span data-dcnode-id="5130" instrument_node="">). The shift from heritage conservation (Banco di Napoli Foundation historical archives) and restoration (Favara's old buildings) to heritage enhancing through creativity-hybridization has been oriented towards </span><em data-dcnode-id="5128"><span data-dcnode-id="5129" instrument_node="">organizational value</span></em><span data-dcnode-id="5127" instrument_node=""> at IlCartastorie, and </span><em data-dcnode-id="5125"><span data-dcnode-id="5126" instrument_node="">social value</span></em><span data-dcnode-id="5124" instrument_node=""> in Favara. The (immersive, interactive) museum aims to increase visitor numbers, diversity and engagement in a private cultural resource that has been transformed into a tourist experiential offer; the museum's openness and inclusiveness contribute to value co-creation in order to enhance its own, organizational, sustainable development. The modern cultural centre aims to provide both the Bartoli family and their local community with informal spaces for social interaction and inclusion, the generation of creativity and the incubation of innovation (</span><a class="workspace-trigger" data-dcnode-id="5122" href="#bb0075" name="bbb0075"><span data-dcnode-id="5123" instrument_node="">Cohendet et al., 2010</span></a><span data-dcnode-id="5121" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5119" href="#bb0205" name="bbb0205"><span data-dcnode-id="5120" instrument_node="">Hutton, 2009</span></a><span data-dcnode-id="5118" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5116" href="#bb0425" name="bbb0425"><span data-dcnode-id="5117" instrument_node="">Tavano Blessi et al., 2012</span></a><span data-dcnode-id="5115" instrument_node="">). The inclusive, creative atmosphere of such spaces (</span><a class="workspace-trigger" data-dcnode-id="5113" href="#bb0035" name="bbb0035"><span data-dcnode-id="5114" instrument_node="">Bertacchini &amp; Santagata, 2012</span></a><span data-dcnode-id="5112" instrument_node="">) fosters individual well-being, capacity and social capital (re)building (</span><a class="workspace-trigger" data-dcnode-id="5110" href="#bb0215" name="bbb0215"><span data-dcnode-id="5111" instrument_node="">Inkpen &amp; Tsang, 2005</span></a><span data-dcnode-id="5109" instrument_node="">) and attracts people interested in authentic experiences, including forms of creative tourism (</span><a class="workspace-trigger" data-dcnode-id="5107" href="#bb0345" name="bbb0345"><span data-dcnode-id="5108" instrument_node="">Richards, 2014</span></a><span data-dcnode-id="5106" instrument_node="">). The Farm's ability to build relationships and engage both host and hosted communities increases their active role in the care, management and implementation of actions to regenerate urban space.</span></p><p data-dcnode-id="5087" id="p0230"><span data-dcnode-id="5104" instrument_node="">To date, these different visions have produced different results. IlCartastorie is a managerial innovation model of cultural regeneration, since the explicit strategy of the museum is to make </span><em data-dcnode-id="5102"><span data-dcnode-id="5103" instrument_node="">itself</span></em><span data-dcnode-id="5101" instrument_node=""> more attractive, effective and valuable: it creates no spillover effects in terms of either urban community participation or urban regeneration. There is still little dialogue or shared entrepreneurship with the local urban community, although the intention is to develop these through a deliberate development strategy aimed at fostering urban recovery and revitalizing commercial activity in a marginalized historical area near the museum (</span><a class="workspace-trigger" data-dcnode-id="5099" href="#bb0265" name="bbb0265"><span data-dcnode-id="5100" instrument_node="">Lidegaard et al., 2017</span></a><span data-dcnode-id="5098" instrument_node="">). Favara's Farm Cultural Park, in contrast, has adopted the creative city model as an implicit bottom-up strategy (</span><a class="workspace-trigger" data-dcnode-id="5096" href="#bb0265" name="bbb0265"><span data-dcnode-id="5097" instrument_node="">Lidegaard et al., 2017</span></a><span data-dcnode-id="5091"><span data-dcnode-id="5095" instrument_node="">) with spillover effects in term of both urban community participation and urban area regeneration. It fosters community engagement in a </span><a class="topic-link" data-dcnode-id="5093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/synergetics" title="Learn more about synergetic from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5094" instrument_node="">synergetic</span></a><span data-dcnode-id="5092" instrument_node=""> virtuous circle of urban recovery and renovation, socio-cultural transformation and economic value generation through new entrepreneurialism (</span></span><a class="workspace-trigger" data-dcnode-id="5089" href="#bb0520" name="bbb0520"><span data-dcnode-id="5090" instrument_node="">Miles &amp; Paddison, 2005</span></a><span data-dcnode-id="5088" instrument_node="">). The Bartolis' vision to envision “a better future and a more desirable place to live” has been demonstrated, and then re-interpreted, extended and shared by the local community and all the other people involved in the historical built environment, and in the dynamics of co-design and co-management; the shared aim is to look after, and increase the value of, both the material and immaterial resources of the city.</span></p><p data-dcnode-id="5085" id="p0235"><span data-dcnode-id="5086" instrument_node="">These different results in terms of both material and immaterial urban transformation reflect the sharply different urban contexts of these projects. The recovery, recycle and renovation schemes inspired by the Farm in Favara are giving places, and people's lives, new meaning, and creating the different perceptions needed to construct a new image and urban brand for Favara. The Neapolitan inner city still enjoys a strong brand, which benefits the positioning of IlCartastorie.</span></p></section><section data-dcnode-id="4999" id="s0075"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5080" id="st0090"><span data-dcnode-id="5083" instrument_node="">7</span><span data-dcnode-id="5082" instrument_node="">. </span><span data-dcnode-id="5081" instrument_node="">Conclusions and future research</span></h2><p data-dcnode-id="5078" id="p0240"><span data-dcnode-id="5079" instrument_node="">Although the importance of cultural regeneration and creative city building for innovative, inclusive urban development is widely recognized by both academics and policy makers, private – as contrasted with public – actor engagement deserves further investigation.</span></p><p data-dcnode-id="5063" id="p0245"><span data-dcnode-id="5077" instrument_node="">This paper, in its consideration of the role of private actors in cultural regeneration, examines this relevant but under-investigated topic from an original perspective, and experiments with the integration of critical issues in cultural regeneration and creative city research which have – until now – never been explored together. We have designed an integrated interpretative framework which combines the drivers of cultural regeneration (</span><a class="workspace-trigger" data-dcnode-id="5075" href="#bb0130" name="bbb0130"><span data-dcnode-id="5076" instrument_node="">Della Lucia et al., 2017</span></a><span data-dcnode-id="5070"><span data-dcnode-id="5074" instrument_node="">) and the theoretical constructs connected to the creation and </span><a class="topic-link" data-dcnode-id="5072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/governance" title="Learn more about governance from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5073" instrument_node="">governance</span></a><span data-dcnode-id="5071" instrument_node=""> of creative cities; these constructs include the factors fostering the hybridization of urban cultural heritage with creativity (</span></span><a class="workspace-trigger" data-dcnode-id="5068" href="#bb0045" name="bbb0045"><span data-dcnode-id="5069" instrument_node="">Borseková et al., 2017</span></a><span data-dcnode-id="5067" instrument_node="">) and the governance strategies adopted to engage urban communities (</span><a class="workspace-trigger" data-dcnode-id="5065" href="#bb0265" name="bbb0265"><span data-dcnode-id="5066" instrument_node="">Lidegaard et al., 2017</span></a><span data-dcnode-id="5064" instrument_node="">) in cultural regeneration. The cross-case comparison of similarities and differences between the two innovative Italian private regeneration projects located in sharply contrasting urban contexts – large and well-developed vs small and marginal – provide interesting insights which allow us to discuss and validate the interpretative capacity of the integrated conceptual framework we have designed.</span></p><p data-dcnode-id="5061" id="p0250"><span data-dcnode-id="5062" instrument_node="">Private actors have drawn upon the innovative thinking of the creative class to stimulate cultural regeneration. However, the ways in which the projects have evolved, and the resulting models of cultural regeneration, with their material and intangible legacies, have, to date, been shaped by the individual visions of private actors, who are themselves influenced by specific, and very different, urban conditions. In Naples' highly touristic inner city, IlCartastorie's managerial innovation is fostered by the investor's pro-tourism growth strategy aimed at increasing the organizational value and sustainable development of the museum. The marginalization of Favara has meant that the ongoing development of the creative city has had to be supported by a strategy conducive to social inclusion and sustainability, integrating both the explicit strategy of the pioneer and the implicit strategy emerging within the community through the imitation of the Farm's best practice.</span></p><p data-dcnode-id="5040" id="p0255"><span data-dcnode-id="5060" instrument_node="">Although exploratory, the case study allows for some preliminary theoretical and managerial implications and indications. From a theoretical perspective, firstly, the paper contributes to building theory (</span><a class="workspace-trigger" data-dcnode-id="5058" href="#bb0135" name="bbb0135"><span data-dcnode-id="5059" instrument_node="">Eisenhardt, 1989</span></a><span data-dcnode-id="5057" instrument_node="">) by providing a novel, integrated conceptual framework which combines a static perspective on cultural regeneration (</span><a class="workspace-trigger" data-dcnode-id="5055" href="#bb0130" name="bbb0130"><span data-dcnode-id="5056" instrument_node="">Della Lucia et al., 2017</span></a><span data-dcnode-id="5054" instrument_node="">) with the latter's dynamic evolution. This process is driven by the factors that facilitate the hybridization of urban cultural heritage with creativity (</span><a class="workspace-trigger" data-dcnode-id="5052" href="#bb0045" name="bbb0045"><span data-dcnode-id="5053" instrument_node="">Borseková et al., 2017</span></a><span data-dcnode-id="5051" instrument_node="">) and the governance strategies adopted to engage urban communities (</span><a class="workspace-trigger" data-dcnode-id="5049" href="#bb0265" name="bbb0265"><span data-dcnode-id="5050" instrument_node="">Lidegaard et al., 2017</span></a><span data-dcnode-id="5048" instrument_node="">). Secondly, the relative and situational concept of the creative city (</span><a class="workspace-trigger" data-dcnode-id="5046" href="#bb0340" name="bbb0340"><span data-dcnode-id="5047" instrument_node="">Pratt, 2011</span></a><span data-dcnode-id="5041"><span data-dcnode-id="5045" instrument_node="">) addressed through a cross-case comparison of sharply contrasting urban contexts – allows us to deal with both the issue of </span><a class="topic-link" data-dcnode-id="5043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/gentrification" title="Learn more about gentrification from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5044" instrument_node="">gentrification</span></a><span data-dcnode-id="5042" instrument_node=""> and the material and immaterial urban transformation that accompanies cultural regeneration. In large, developed cities the risk that residents will be forced to relocate and/or excluded seems to be higher than in small, marginal urban areas: the creation of organizational value overshadows broad-based social value when economic growth is prioritized over sustainable development. Sustainable, innovative urban regeneration requires the community engagement of both host and hosted in creative city building in order to best exploit the symbiosis between the specific urban identity with the transformative power of creative thinking. This combination generated by the blending of local knowledge and experience with the input of the creative class has spillover effects that can transform a city, both physically and at the symbolic level. The greater the influence of powerful stakeholder groups in decision-making processes whether conservative or creative –the more the regeneration process will either be too focussed on continuity with the past, in the first case, or risk overly disruptive change, in the second, thereby – if too conservative – missing potential opportunities, if too innovative, compromising the urban identity.</span></span></p><p data-dcnode-id="5005" id="p0260"><span data-dcnode-id="5039" instrument_node="">From a managerial perspective, some preliminary practical recommendations and implications emerge from our research with regard to the shaping of urban development strategies sensitive to the particular urban culture in question, in order to engage the community in urban regeneration and creative city building. First, the vision of the private actors involved matters, since it heavily influences how pervasive the regeneration process becomes (</span><a class="workspace-trigger" data-dcnode-id="5037" href="#bb0125" name="bbb0125"><span data-dcnode-id="5038" instrument_node="">Della Lucia et al., 2016</span></a><span data-dcnode-id="5036" instrument_node="">). Strategy-making should be oriented to engage the community in re-imagining and reinventing a sustainable urban future, in particular in marginalized cities. Rebuilding social capital (</span><a class="workspace-trigger" data-dcnode-id="5034" href="#bb0215" name="bbb0215"><span data-dcnode-id="5035" instrument_node="">Inkpen &amp; Tsang, 2005</span></a><span data-dcnode-id="5033" instrument_node="">) through social inclusion and improved quality of life fosters capacity, new entrepreneurship and networking (</span><a class="workspace-trigger" data-dcnode-id="5031" href="#bb0520" name="bbb0520"><span data-dcnode-id="5032" instrument_node="">Miles &amp; Paddison, 2005</span></a><span data-dcnode-id="5030" instrument_node="">). A public effort may help to scale-up this virtuous cycle, in particular in big urban areas, and ensure projects' financial viability. Second, city specific context matters in urban regeneration (</span><a class="workspace-trigger" data-dcnode-id="5028" href="#bb0015" name="bbb0015"><span data-dcnode-id="5029" instrument_node="">Ballas, 2013</span></a><span data-dcnode-id="5027" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5025" href="#bb0415" name="bbb0415"><span data-dcnode-id="5026" instrument_node="">Tang, 2016</span></a><span data-dcnode-id="5024" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5022" href="#bb0450" name="bbb0450"><span data-dcnode-id="5023" instrument_node="">Vanolo, 2013</span></a><span data-dcnode-id="5021" instrument_node="">) as it provides distinctive cultural resources and the mechanism, processes and factors that turn creativity into innovation. The fulfilling of social and physical requirements by policy makers stimulates creativity by mobilizing resources and fostering collaboration (</span><a class="workspace-trigger" data-dcnode-id="5019" href="#bb0235" name="bbb0235"><span data-dcnode-id="5020" instrument_node="">Landry, 2000</span></a><span data-dcnode-id="5018" instrument_node="">). Third, in a period marked by public sector cuts, but increasing creativity, established dichotomies – public vs private and commercial vs not-for-profit – should be dissolved into mixed governance models (</span><a class="workspace-trigger" data-dcnode-id="5016" href="#bb0175" name="bbb0175"><span data-dcnode-id="5017" instrument_node="">Go, Trunfio, &amp; Della Lucia, 2013</span></a><span data-dcnode-id="5015" instrument_node="">) and semi-explicit strategies (</span><a class="workspace-trigger" data-dcnode-id="5013" href="#bb0265" name="bbb0265"><span data-dcnode-id="5014" instrument_node="">Lidegaard et al., 2017</span></a><span data-dcnode-id="5012" instrument_node="">), striking a balance between tradition and innovation, equity and efficiency (</span><a class="workspace-trigger" data-dcnode-id="5010" href="#bb0115" name="bbb0115"><span data-dcnode-id="5011" instrument_node="">Della Lucia &amp; Franch, 2015</span></a><span data-dcnode-id="5009" instrument_node="">). Such models allow local authorities to guide existing interests and perceptions in more future-oriented and sustainable directions and give creative entrepreneurs a chance to experiment. International cases show that semi-explicit mixed governance models have successfully allowed creativity to flourish (</span><a class="workspace-trigger" data-dcnode-id="5007" href="#bb0265" name="bbb0265"><span data-dcnode-id="5008" instrument_node="">Lidegaard et al., 2017</span></a><span data-dcnode-id="5006" instrument_node="">), even in the absence of structural preconditions.</span></p><p data-dcnode-id="5000" id="p0265"><span data-dcnode-id="5004" instrument_node="">Further research is needed to overcome the limits of this exploratory study, since it deals with only two cases The processes governing heritage-creativity hybridization and </span><a class="topic-link" data-dcnode-id="5002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/stakeholder-engagement" title="Learn more about stakeholder engagement from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5003" instrument_node="">stakeholder engagement</span></a><span data-dcnode-id="5001" instrument_node=""> in cultural regeneration should be analysed qualitatively, within case studies that involve more diverse pools of public-private stakeholders at different governance levels. We need to be able to draw extensive cross-case comparisons, both in Italy and abroad, in order to provide additional empirical evidence about how culture, creativity and place specific conditions (including urban governance) can catalyse urban regeneration. Emerging issues to investigate include: how can cities move towards forms of mixed governance? What strategies for cultural resource/creativity hybridization foster inclusiveness and sustainable development in medium and large cities? What problems do public-private partnerships face in making cultural investments, and how can these be addressed?</span></p></section><section data-dcnode-id="4994" id="s0080"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4997" id="st0095"><span data-dcnode-id="4998" instrument_node="">Funding</span></h2><p data-dcnode-id="4995" id="p0270"><span data-dcnode-id="4996" instrument_node="">This research was not funded directly by any agency, whether public, commercial, or not-for-profit.</span></p></section></div><section data-dcnode-id="4988" id="s0100"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4991" id="st0200"><span data-dcnode-id="4992" instrument_node="">Acknowledgements</span></h2><p data-dcnode-id="4989" id="p0500"><span data-dcnode-id="4990" instrument_node="">The authors would like to thank the project leaders and managers – Sergio Riolo at IlCartastorie and the Bartolis at the Farm Cultural Park – for generously agreeing to be interviewed and sharing their experiences and insights.</span></p></section></div><div class="related-content-links u-hide-from-md" data-dcnode-id="4983"><button class="button button-anchor" data-dcnode-id="4984" type="button"><span class="button-text" data-dcnode-id="4985"><span data-dcnode-id="4986" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="4982"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="389" id="bi0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4980"><span data-dcnode-id="4981" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="390" id="bs0005"><dl class="references" data-dcn
