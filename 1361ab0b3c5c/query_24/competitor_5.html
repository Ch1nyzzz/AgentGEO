</span><meta content="Graffiti paintings, as an act of vandalism, are one of the most severe threats to stone applied in Cultural Heritage. Their cleaning is expensive and …" data-dcnode-id="12199" property="og:description"><span data-dcnode-id="12198" instrument_node="">
</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;abs0010&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;abst0010&quot;><p id=&quot;spar0060&quot;>Graffiti paintings, as an act of vandalism, are one of the most severe threats to stone applied in Cultural Heritage. Their cleaning is expensive and in most of the cases, also induce stone damage, such as chemical contamination, by-products and physical changes. In the recent years, the application of anti-graffiti products has been carried out in order to preserve the valuable substrate. Despite the research lines have been focused on the evaluation of cleaning procedures and anti-graffiti products, it is necessary to lead a critical study of the recently reported results, considering the type of stone and the composition of the other key stakeholders, namely the anti-graffiti protective coatings, the paints and the cleaning agents. A brief description of the composition of the most common spray paints used by graffiti-writers in Cultural Heritage stones is also presented.</p><p id=&quot;spar0065&quot;>The protective effectiveness of anti-graffiti coatings and the most remarkable findings on stone graffiti cleaning methods are listed and discussed. Anti-graffiti coatings may facilitate the removal of graffiti compared to untreated surfaces, however this efficacy may be compromised on more porous substrates. Moreover, in almost all of the analysed scientific papers, it was possible to remove graffiti without inducing any damage to the substrate.</p><p id=&quot;spar0070&quot;>This review paper will allow to help conservator-restores to achieve the optimization of the graffiti cleaning procedures on stones in Cultural Heritage. Finally, some futures research lines are pointed out.</p></div></div></div>" data-dcnode-id="12197" lang="en" name="citation_abstract"><span data-dcnode-id="12196" instrument_node="">

tract author-highlights" data-dcnode-id="11606" id="abs0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="11630"><span data-dcnode-id="11631" instrument_node="">Highlights</span></h2><div data-dcnode-id="11607" id="abst0005"><p data-dcnode-id="11608" id="spar0055"></p><dl class="list" data-dcnode-id="11609"><dt class="list-label" data-dcnode-id="11628"><span data-dcnode-id="11629" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="11625"><p data-dcnode-id="11626" id="par0525"><span data-dcnode-id="11627" instrument_node="">The most used graffiti spray paints were investigated.</span></p></dd><dt class="list-label" data-dcnode-id="11623"><span data-dcnode-id="11624" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="11620"><p data-dcnode-id="11621" id="par0530"><span data-dcnode-id="11622" instrument_node="">The performance of antigraffiti coatings was investigated.</span></p></dd><dt class="list-label" data-dcnode-id="11618"><span data-dcnode-id="11619" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="11615"><p data-dcnode-id="11616" id="par0535"><span data-dcnode-id="11617" instrument_node="">A critical approach to the graffiti cleaning methods is addressed.</span></p></dd><dt class="list-label" data-dcnode-id="11613"><span data-dcnode-id="11614" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="11610"><p data-dcnode-id="11611" id="par0540"><span data-dcnode-id="11612" instrument_node="">The impact of graffiti on differente lithotypes was evaluated.</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="11596" id="abs0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="11604"><span data-dcnode-id="11605" instrument_node="">Abstract</span></h2><div data-dcnode-id="11597" id="abst0010"><p data-dcnode-id="11602" id="spar0060"><span data-dcnode-id="11603" instrument_node="">Graffiti paintings, as an act of vandalism, are one of the most severe threats to stone applied in Cultural Heritage. Their cleaning is expensive and in most of the cases, also induce stone damage, such as chemical contamination, by-products and physical changes. In the recent years, the application of anti-graffiti products has been carried out in order to preserve the valuable substrate. Despite the research lines have been focused on the evaluation of cleaning procedures and anti-graffiti products, it is necessary to lead a critical study of the recently reported results, considering the type of stone and the composition of the other key stakeholders, namely the anti-graffiti protective coatings, the paints and the cleaning agents. A brief description of the composition of the most common spray paints used by graffiti-writers in Cultural Heritage stones is also presented.</span></p><p data-dcnode-id="11600" id="spar0065"><span data-dcnode-id="11601" instrument_node="">The protective effectiveness of anti-graffiti coatings and the most remarkable findings on stone graffiti cleaning methods are listed and discussed. Anti-graffiti coatings may facilitate the removal of graffiti compared to untreated surfaces, however this efficacy may be compromised on more porous substrates. Moreover, in almost all of the analysed scientific papers, it was possible to remove graffiti without inducing any damage to the substrate.</span></p><p data-dcnode-id="11598" id="spar0070"><span data-dcnode-id="11599" instrument_node="">This review paper will allow to help conservator-restores to achieve the optimization of the graffiti cleaning procedures on stones in Cultural Heritage. Finally, some futures research lines are pointed out.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="11572" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="11584"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="11585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0300944017302746"><svg class="icon icon-navigate-left" data-dcnode-id="11593" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="11594"></path></svg><span class="button-alternative-text" data-dcnode-id="11586"><strong data-dcnode-id="11591"><span data-dcnode-id="11592" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="11589"><span data-dcnode-id="11590" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="11587"><span data-dcnode-id="11588" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="11573"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="11574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0300944016308761"><span class="button-alternative-text" data-dcnode-id="11577"><strong data-dcnode-id="11582"><span data-dcnode-id="11583" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="11580"><span data-dcnode-id="11581" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="11578"><span data-dcnode-id="11579" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="11575" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="11576"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="11544"><div class="keywords-section" data-dcnode-id="11545" id="kwd0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="11570"><span data-dcnode-id="11571" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="11567" id="kw0005"><span data-dcnode-id="11568"><span data-dcnode-id="11569" instrument_node="">Cultural Heritage</span></span></div><div class="keyword" data-dcnode-id="11564" id="kw0010"><span data-dcnode-id="11565"><span data-dcnode-id="11566" instrument_node="">Stone</span></span></div><div class="keyword" data-dcnode-id="11561" id="kw0015"><span data-dcnode-id="11562"><span data-dcnode-id="11563" instrument_node="">Anti-graffiti</span></span></div><div class="keyword" data-dcnode-id="11558" id="kw0020"><span data-dcnode-id="11559"><span data-dcnode-id="11560" instrument_node="">Graffiti spray paints</span></span></div><div class="keyword" data-dcnode-id="11555" id="kw0025"><span data-dcnode-id="11556"><span data-dcnode-id="11557" instrument_node="">Coatings</span></span></div><div class="keyword" data-dcnode-id="11552" id="kw0030"><span data-dcnode-id="11553"><span data-dcnode-id="11554" instrument_node="">Cleaning methods</span></span></div><div class="keyword" data-dcnode-id="11549" id="kw0035"><span data-dcnode-id="11550"><span data-dcnode-id="11551" instrument_node="">Effectiveness</span></span></div><div class="keyword" data-dcnode-id="11546" id="kw0040"><span data-dcnode-id="11547"><span data-dcnode-id="11548" instrument_node="">Harmfulness</span></span></div></div></div><span data-dcnode-id="11543" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="5060" id="body"><div data-dcnode-id="5082"><section data-dcnode-id="11464" id="sec0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="11539" id="sect0020"><span data-dcnode-id="11542" instrument_node="">1</span><span data-dcnode-id="11541" instrument_node="">. </span><span data-dcnode-id="11540" instrument_node="">Introduction</span></h2><p data-dcnode-id="11516" id="par0545"><span data-dcnode-id="11538" instrument_node="">The term graffiti is derived from the Italian word </span><em data-dcnode-id="11536"><span data-dcnode-id="11537" instrument_node="">graffiare</span></em><span data-dcnode-id="11535" instrument_node=""> (to scratch) and can be defined as writing or drawings scribbled, scratched, drawn or painted, on a wide range of materials and substrates, mainly located in public accessible places, as result of a vandalism act </span><a class="workspace-trigger" data-dcnode-id="11533" href="#bib0005" name="bbib0005"><span data-dcnode-id="11534" instrument_node="">[1]</span></a><span data-dcnode-id="11532" instrument_node="">. Around 3,500,000 protected monuments in European cities are affected by this threat and many cities worldwide spend huge amounts of money in cleaning campaigns to tackle graffiti vandalism </span><a class="workspace-trigger" data-dcnode-id="11530" href="#bib0010" name="bbib0010"><span data-dcnode-id="11531" instrument_node="">[2]</span></a><span data-dcnode-id="11529" instrument_node="">. The European Commission (EC) has financed projects to develop sustainable anti-graffiti products that ensure the satisfactory graffiti extraction without induce damages on the substrate (GRAFFITAGE, 2005–2008) </span><a class="workspace-trigger" data-dcnode-id="11527" href="#bib0010" name="bbib0010"><span data-dcnode-id="11528" instrument_node="">[2]</span></a><span data-dcnode-id="11526" instrument_node=""> and on support urban environment policies to prevent and eliminate graffiti (GRAFFOLUTION, 2014–2016) </span><a class="workspace-trigger" data-dcnode-id="11524" href="#bib0015" name="bbib0015"><span data-dcnode-id="11525" instrument_node="">[3]</span></a><span data-dcnode-id="11523" instrument_node="">. During the last decade, some research centres and universities worldwide have been testing commercial anti-graffiti coatings and developing new formulations that intend to avoid/reduce the interaction of the cleaning procedure with the valuable substrate </span><a class="workspace-trigger" data-dcnode-id="11521" href="#bib0010" name="bbib0010"><span data-dcnode-id="11522" instrument_node="">[2]</span></a><span data-dcnode-id="11520" instrument_node="">. As a matter of fact, the EC established the main characteristics of the protective coatings to be applied in materials of historical monuments: Low surface energy; Permanent under outdoor conditions; Reversible to specially designed mild cleaning systems; Permeable to water vapour; Impermeable to liquid wate and; Transparent </span><a class="workspace-trigger" data-dcnode-id="11518" href="#bib0010" name="bbib0010"><span data-dcnode-id="11519" instrument_node="">[2]</span></a><span data-dcnode-id="11517" instrument_node="">.</span></p><div data-dcnode-id="11467"><p data-dcnode-id="11498" id="par0550"><span data-dcnode-id="11515" instrument_node="">However, in many cases, graffiti is done in historic surfaces (</span><a class="workspace-trigger" data-dcnode-id="11513" href="#fig0005" name="bfig0005"><span data-dcnode-id="11514" instrument_node="">Fig. 1</span></a><span data-dcnode-id="11508"><span data-dcnode-id="11512" instrument_node="">) without anti-graffiti protection and in real practice, they are not shortly removed after their execution, i.e., most of the times they are cleaned after long environmental exposure. This leads the graffiti to interact with the environmental agents (e.g. rain and atmospheric pollutants) and also with the stone substrate. Thus, the graffiti paint may suffer physical and chemical alterations and subsequently the stone may be affected not only by the application of graffiti but also by its alteration process. Along with the previously mentioned consequences it must be added the damages associated to cleaning, such as surface </span><a class="topic-link" data-dcnode-id="11510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/abrasion" title="Learn more about abrasion from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11511" instrument_node="">abrasion</span></a><span data-dcnode-id="11509" instrument_node="">, chemical contamination, mineralogical alterations </span></span><a class="workspace-trigger" data-dcnode-id="11506" href="#bib0020" name="bbib0020"><span data-dcnode-id="11507" instrument_node="">[4]</span></a><span data-dcnode-id="11505" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11503" href="#bib0025" name="bbib0025"><span data-dcnode-id="11504" instrument_node="">[5]</span></a><span data-dcnode-id="11502" instrument_node="">, which are related with the intrinsic properties of the stone, the composition of the paint and the cleaning agents used </span><a class="workspace-trigger" data-dcnode-id="11500" href="#bib0020" name="bbib0020"><span data-dcnode-id="11501" instrument_node="">[4]</span></a><span data-dcnode-id="11499" instrument_node="">.</span></p><figure class="figure text-xs" data-dcnode-id="11468" id="fig0005"><span data-dcnode-id="11482"><img alt="Fig. 1" aria-describedby="cap0005" data-dcnode-id="11497" height="626" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S030094401730629X-gr1.jpg&amp;raw"><span data-dcnode-id="11496" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="11483"><li data-dcnode-id="11490"><a class="anchor download-link u-font-sans" data-dcnode-id="11491" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S030094401730629X-gr1_lrg.jpg" target="_blank" title="Download high-res image (2MB)"><span class="anchor-text" data-dcnode-id="11492"><span data-dcnode-id="11495" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="11493"><span data-dcnode-id="11494" instrument_node="">Download high-res image (2MB)</span></span></span></a></li><li data-dcnode-id="11484"><a class="anchor download-link u-font-sans" data-dcnode-id="11485" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S030094401730629X-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="11486"><span data-dcnode-id="11489" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="11487"><span data-dcnode-id="11488" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="11469"><span data-dcnode-id="11470" id="cap0005"><p data-dcnode-id="11471" id="spar0005"><span class="label" data-dcnode-id="11480"><span data-dcnode-id="11481" instrument_node="">Fig. 1</span></span><span data-dcnode-id="11479" instrument_node="">. </span><span data-dcnode-id="11478" instrument_node="">A: Graffiti cans MOTIP</span><sup data-dcnode-id="11476"><span data-dcnode-id="11477" instrument_node="">®</span></sup><span data-dcnode-id="11475" instrument_node=""> and Montana Colours</span><sup data-dcnode-id="11473"><span data-dcnode-id="11474" instrument_node="">®</span></sup><span data-dcnode-id="11472" instrument_node="">. B-D: Graffiti vandalism paintings in stone monuments: B: Venetian fortress in Heraklion (Crete, Greece); C: Castel dell'Ovo (Naples, Italy); D: Roman bridge in Ourense (Spain). Sources: A and B: the authors; C: Cristina Montojo and D: Alberto Pereira.</span></p></span></span></figure></div><p data-dcnode-id="11465" id="par0555"><span data-dcnode-id="11466" instrument_node="">Therefore, in order to optimize the strategies to minimize the dangerous effect of graffiti on Cultural Heritage stones, an evaluation of the more recent researches on the graffiti cleaning and anti-graffiti coatings is imperious. So this review presents a state-of-the-art over the composition of the most common graffiti paints, anti-graffiti protective coatings and their cleaning procedures (chemical, mechanical, laser and biological methods). The cleaning performances are critically evaluated considering the stone type, the binder composition of the paints and the cleaning agent. This review concludes with a discussion of emerging issues and new research directions.</span></p></section><section data-dcnode-id="11167" id="sec0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="11460" id="sect0025"><span data-dcnode-id="11463" instrument_node="">2</span><span data-dcnode-id="11462" instrument_node="">. </span><span data-dcnode-id="11461" instrument_node="">Graffiti materials</span></h2><p data-dcnode-id="11452" id="par0560"><span data-dcnode-id="11459" instrument_node="">The range of materials used by graffiti-writers to scribble monuments and historic facades is fairly extent and they can be found in multiple layers superimposed requiring a sequence of methods/products to be removed </span><a class="workspace-trigger" data-dcnode-id="11457" href="#bib0030" name="bbib0030"><span data-dcnode-id="11458" instrument_node="">[6]</span></a><span data-dcnode-id="11456" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11454" href="#bib0035" name="bbib0035"><span data-dcnode-id="11455" instrument_node="">[7]</span></a><span data-dcnode-id="11453" instrument_node="">.</span></p><p data-dcnode-id="11429" id="par0565"><span data-dcnode-id="11451" instrument_node="">Spray paint outlines as the main material used by graffiti-writers due to its visual impact and quick and easy application </span><a class="workspace-trigger" data-dcnode-id="11449" href="#bib0025" name="bbib0025"><span data-dcnode-id="11450" instrument_node="">[5]</span></a><span data-dcnode-id="11448" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11446" href="#bib0040" name="bbib0040"><span data-dcnode-id="11447" instrument_node="">[8]</span></a><span data-dcnode-id="11445" instrument_node="">. They are composed of pigments that provide colour and opacity, additives that improve certain properties (e.g. plasticity, fluidity, thickness, etc.), a binder that holds all the ingredients together and a solvent that allows this mixture to flow </span><a class="workspace-trigger" data-dcnode-id="11443" href="#bib0045" name="bbib0045"><span data-dcnode-id="11444" instrument_node="">[9]</span></a><span data-dcnode-id="11442" instrument_node="">. Paints may harden by evaporation of the solvent or through polymerization. The polymerization can occur by chemical reaction with oxygen, a hardener, moisture and coalescence of an emulsion </span><a class="workspace-trigger" data-dcnode-id="11440" href="#bib0005" name="bbib0005"><span data-dcnode-id="11441" instrument_node="">[1]</span></a><span data-dcnode-id="11439" instrument_node="">. While the ones that harden by evaporation of the solvent can be dissolved thru re-application of the solvent </span><a class="workspace-trigger" data-dcnode-id="11437" href="#bib0005" name="bbib0005"><span data-dcnode-id="11438" instrument_node="">[1]</span></a><span data-dcnode-id="11436" instrument_node="">, the ones that harden by polymerization cannot be easily returned to the previously liquid state </span><a class="workspace-trigger" data-dcnode-id="11434" href="#bib0030" name="bbib0030"><span data-dcnode-id="11435" instrument_node="">[6]</span></a><span data-dcnode-id="11433" instrument_node="">. Moreover, the paint may penetrate to various depths on the substrate depending on factors like a high solvent content (that implies a higher flow rate) and the interfacial tension solid surface/liquid </span><a class="workspace-trigger" data-dcnode-id="11431" href="#bib0045" name="bbib0045"><span data-dcnode-id="11432" instrument_node="">[9]</span></a><span data-dcnode-id="11430" instrument_node="">.</span></p><p data-dcnode-id="11394" id="par0570"><span data-dcnode-id="11428" instrument_node="">From the universe of graffiti materials like spray paints, markers and inks covered by the literature, it is important to highlight some brands that were specially developed for the graffiter’s market. Montana Colors</span><sup data-dcnode-id="11426"><span data-dcnode-id="11427" instrument_node="">®</span></sup><span data-dcnode-id="11425" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="11423" href="#fig0005" name="bfig0005"><span data-dcnode-id="11424" instrument_node="">Fig. 1</span></a><span data-dcnode-id="11422" instrument_node="">) introduced in the market the first spray paint made specifically for graffiters and it is now spread worldwide across 60 countries. It was founded in Barcelona in 1994 by Jordi Rubio </span><a class="workspace-trigger" data-dcnode-id="11420" href="#bib0050" name="bbib0050"><span data-dcnode-id="11421" instrument_node="">[10]</span></a><span data-dcnode-id="11419" instrument_node=""> who started at Felton</span><sup data-dcnode-id="11417"><span data-dcnode-id="11418" instrument_node="">®</span></sup><span data-dcnode-id="11416" instrument_node="">, which is a paint production company also in Barcelona </span><a class="workspace-trigger" data-dcnode-id="11414" href="#bib0055" name="bbib0055"><span data-dcnode-id="11415" instrument_node="">[11]</span></a><span data-dcnode-id="11413" instrument_node="">. The international Krink</span><sup data-dcnode-id="11411"><span data-dcnode-id="11412" instrument_node="">®</span></sup><span data-dcnode-id="11410" instrument_node=""> started with handmade paints for personal use by KR (founder) in Brooklyn in 1993 </span><a class="workspace-trigger" data-dcnode-id="11408" href="#bib0060" name="bbib0060"><span data-dcnode-id="11409" instrument_node="">[12]</span></a><span data-dcnode-id="11407" instrument_node="">. Nero D’inferno </span><sup data-dcnode-id="11405"><span data-dcnode-id="11406" instrument_node="">®</span></sup><span data-dcnode-id="11404" instrument_node=""> was originally developed for use as a leather dye, however later it became established as one of the common choices of ink for artists. Brands with a larger market, not only focused on graffiti materials are also reported in the literature e.g. MOTIP HOME &amp; HOBBYLACQUER</span><sup data-dcnode-id="11402"><span data-dcnode-id="11403" instrument_node="">®</span></sup><span data-dcnode-id="11401" instrument_node=""> group (</span><a class="workspace-trigger" data-dcnode-id="11399" href="#fig0005" name="bfig0005"><span data-dcnode-id="11400" instrument_node="">Fig. 1</span></a><span data-dcnode-id="11398" instrument_node="">), Trans-color</span><sup data-dcnode-id="11396"><span data-dcnode-id="11397" instrument_node="">®</span></sup><span data-dcnode-id="11395" instrument_node="">, Herpe, Hammerite, Trimetal Nobel, Akzo Nobel Coatings AG, European Aerosols, De Keyn Paint, Intergamma, Auto-K.</span></p><p data-dcnode-id="11332" id="par0575"><span data-dcnode-id="11393" instrument_node="">White pigments are the main component of all paints (white and coloured); titanium confers whiteness, brightness and opacity to graffiti in Montana Colors</span><sup data-dcnode-id="11391"><span data-dcnode-id="11392" instrument_node="">®</span></sup><span data-dcnode-id="11390" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="11388" href="#bib0065" name="bbib0065"><span data-dcnode-id="11389" instrument_node="">[13]</span></a><span data-dcnode-id="11387" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11385" href="#bib0070" name="bbib0070"><span data-dcnode-id="11386" instrument_node="">[14]</span></a><span data-dcnode-id="11384" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11382" href="#bib0075" name="bbib0075"><span data-dcnode-id="11383" instrument_node="">[15]</span></a><span data-dcnode-id="11381" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11379" href="#bib0080" name="bbib0080"><span data-dcnode-id="11380" instrument_node="">[16]</span></a><span data-dcnode-id="11378" instrument_node="">, Trans-color</span><sup data-dcnode-id="11376"><span data-dcnode-id="11377" instrument_node="">®</span></sup><span data-dcnode-id="11375" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="11373" href="#bib0085" name="bbib0085"><span data-dcnode-id="11374" instrument_node="">[17]</span></a><span data-dcnode-id="11372" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11370" href="#bib0090" name="bbib0090"><span data-dcnode-id="11371" instrument_node="">[18]</span></a><span data-dcnode-id="11369" instrument_node="">, Felton</span><sup data-dcnode-id="11367"><span data-dcnode-id="11368" instrument_node="">®</span></sup><span data-dcnode-id="11366" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="11364" href="#bib0085" name="bbib0085"><span data-dcnode-id="11365" instrument_node="">[17]</span></a><span data-dcnode-id="11363" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11361" href="#bib0090" name="bbib0090"><span data-dcnode-id="11362" instrument_node="">[18]</span></a><span data-dcnode-id="11360" instrument_node=""> and Motip-Dupli</span><sup data-dcnode-id="11358"><span data-dcnode-id="11359" instrument_node="">®</span></sup><span data-dcnode-id="11357" instrument_node="">. Black colour is often obtained by adding carbon, silver colour by adding aluminium and gold colour by the introduction of zinc and copper (Montana Colors</span><sup data-dcnode-id="11355"><span data-dcnode-id="11356" instrument_node="">®</span></sup><span data-dcnode-id="11354" instrument_node=""> in </span><a class="workspace-trigger" data-dcnode-id="11352" href="#bib0065" name="bbib0065"><span data-dcnode-id="11353" instrument_node="">[13]</span></a><span data-dcnode-id="11351" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11349" href="#bib0070" name="bbib0070"><span data-dcnode-id="11350" instrument_node="">[14]</span></a><span data-dcnode-id="11348" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11346" href="#bib0075" name="bbib0075"><span data-dcnode-id="11347" instrument_node="">[15]</span></a><span data-dcnode-id="11345" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11343" href="#bib0080" name="bbib0080"><span data-dcnode-id="11344" instrument_node="">[16]</span></a><span data-dcnode-id="11342" instrument_node=""> and Trans-color</span><sup data-dcnode-id="11340"><span data-dcnode-id="11341" instrument_node="">®</span></sup><span data-dcnode-id="11339" instrument_node=""> in </span><a class="workspace-trigger" data-dcnode-id="11337" href="#bib0085" name="bbib0085"><span data-dcnode-id="11338" instrument_node="">[17]</span></a><span data-dcnode-id="11336" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11334" href="#bib0090" name="bbib0090"><span data-dcnode-id="11335" instrument_node="">[18]</span></a><span data-dcnode-id="11333" instrument_node="">).</span></p><p data-dcnode-id="11312" id="par0580"><span data-dcnode-id="11319"><span data-dcnode-id="11327"><span data-dcnode-id="11331" instrument_node="">Additives may be also present in small amounts: </span><a class="topic-link" data-dcnode-id="11329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/plasticizer" title="Learn more about plasticizers from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11330" instrument_node="">plasticizers</span></a><span data-dcnode-id="11328" instrument_node=""> or dispersants to increase plasticity or fluidity, </span></span><a class="topic-link" data-dcnode-id="11325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/surface-active-agent" title="Learn more about surfactants from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11326" instrument_node="">surfactants</span></a><span data-dcnode-id="11320"><span data-dcnode-id="11324" instrument_node=""> and wetting agents to disperse pigments, thickeners, pH buffers to stabilize the pH range, anti-foaming agents to alter the surface tension of a paint, freeze–thaw agents, </span><a class="topic-link" data-dcnode-id="11322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/biocides" title="Learn more about biocides from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11323" instrument_node="">biocides</span></a><span data-dcnode-id="11321" instrument_node=""> and sequestering agents to remove metal ions </span></span></span><a class="workspace-trigger" data-dcnode-id="11317" href="#bib0025" name="bbib0025"><span data-dcnode-id="11318" instrument_node="">[5]</span></a><span data-dcnode-id="11316" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11314" href="#bib0040" name="bbib0040"><span data-dcnode-id="11315" instrument_node="">[8]</span></a><span data-dcnode-id="11313" instrument_node="">.</span></p><p data-dcnode-id="11307" id="par0585"><span data-dcnode-id="11311" instrument_node="">The main synthetic binders in twentieth-century paints are acrylic, alkyd and nitrocellulosic </span><a class="workspace-trigger" data-dcnode-id="11309" href="#bib0095" name="bbib0095"><span data-dcnode-id="11310" instrument_node="">[19]</span></a><span data-dcnode-id="11308" instrument_node="">.</span></p><p data-dcnode-id="11274" id="par0590"><span data-dcnode-id="11306" instrument_node="">Acrylic resins are based on the esters of acrylic and methacrylic acids </span><a class="workspace-trigger" data-dcnode-id="11304" href="#bib0095" name="bbib0095"><span data-dcnode-id="11305" instrument_node="">[19]</span></a><span data-dcnode-id="11303" instrument_node=""> and can be found in Krink</span><sup data-dcnode-id="11301"><span data-dcnode-id="11302" instrument_node="">®</span></sup><span data-dcnode-id="11300" instrument_node=""> and Nero D’inferno</span><sup data-dcnode-id="11298"><span data-dcnode-id="11299" instrument_node="">®</span></sup><span data-dcnode-id="11297" instrument_node=""> cutting edge paints </span><a class="workspace-trigger" data-dcnode-id="11295" href="#bib0100" name="bbib0100"><span data-dcnode-id="11296" instrument_node="">[20]</span></a><span data-dcnode-id="11294" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11292" href="#bib0105" name="bbib0105"><span data-dcnode-id="11293" instrument_node="">[21]</span></a><span data-dcnode-id="11287"><span data-dcnode-id="11291" instrument_node="">. This paint may be purely acrylic or copolymerized with other vinyl species, such as </span><a class="topic-link" data-dcnode-id="11289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemical-engineering/styrene" title="Learn more about styrene from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11290" instrument_node="">styrene</span></a><span data-dcnode-id="11288" instrument_node=""> which is present in low-cost paints and also in artist quality paints, like Trans-color</span></span><sup data-dcnode-id="11285"><span data-dcnode-id="11286" instrument_node="">®</span></sup><span data-dcnode-id="11284" instrument_node=""> and Felton</span><sup data-dcnode-id="11282"><span data-dcnode-id="11283" instrument_node="">®</span></sup><span data-dcnode-id="11281" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="11279" href="#bib0085" name="bbib0085"><span data-dcnode-id="11280" instrument_node="">[17]</span></a><span data-dcnode-id="11278" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11276" href="#bib0090" name="bbib0090"><span data-dcnode-id="11277" instrument_node="">[18]</span></a><span data-dcnode-id="11275" instrument_node="">.</span></p><p data-dcnode-id="11219" id="par0595"><span data-dcnode-id="11270"><a class="topic-link" data-dcnode-id="11272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemical-engineering/alkyd-resins" title="Learn more about Alkyd resins from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11273" instrument_node="">Alkyd resins</span></a><span data-dcnode-id="11271" instrument_node=""> are polyesters formed by a polyalcohol and a dicarboxylic acid </span></span><a class="workspace-trigger" data-dcnode-id="11268" href="#bib0095" name="bbib0095"><span data-dcnode-id="11269" instrument_node="">[19]</span></a><span data-dcnode-id="11267" instrument_node="">. Its drying mechanism is similar to oil paint, i.e. complex oxidative polymerization reactions resulting in a cross-linked insoluble film </span><a class="workspace-trigger" data-dcnode-id="11265" href="#bib0095" name="bbib0095"><span data-dcnode-id="11266" instrument_node="">[19]</span></a><span data-dcnode-id="11264" instrument_node="">. These resins were identified in Motip-Dupli</span><sup data-dcnode-id="11262"><span data-dcnode-id="11263" instrument_node="">®</span></sup><span data-dcnode-id="11261" instrument_node=""> Montana Black </span><a class="workspace-trigger" data-dcnode-id="11259" href="#bib0110" name="bbib0110"><span data-dcnode-id="11260" instrument_node="">[22]</span></a><span data-dcnode-id="11258" instrument_node="">, Montana Colours</span><sup data-dcnode-id="11256"><span data-dcnode-id="11257" instrument_node="">®</span></sup><span data-dcnode-id="11255" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="11253" href="#bib0065" name="bbib0065"><span data-dcnode-id="11254" instrument_node="">[13]</span></a><span data-dcnode-id="11252" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11250" href="#bib0070" name="bbib0070"><span data-dcnode-id="11251" instrument_node="">[14]</span></a><span data-dcnode-id="11249" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11247" href="#bib0075" name="bbib0075"><span data-dcnode-id="11248" instrument_node="">[15]</span></a><span data-dcnode-id="11246" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11244" href="#bib0080" name="bbib0080"><span data-dcnode-id="11245" instrument_node="">[16]</span></a><span data-dcnode-id="11243" instrument_node=""> and MOTIP HOME &amp; HOBBYLACQUER</span><sup data-dcnode-id="11241"><span data-dcnode-id="11242" instrument_node="">®</span></sup><span data-dcnode-id="11240" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="11238" href="#bib0045" name="bbib0045"><span data-dcnode-id="11239" instrument_node="">[9]</span></a><span data-dcnode-id="11237" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11235" href="#bib0115" name="bbib0115"><span data-dcnode-id="11236" instrument_node="">[23]</span></a><span data-dcnode-id="11234" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11232" href="#bib0120" name="bbib0120"><span data-dcnode-id="11233" instrument_node="">[24]</span></a><span data-dcnode-id="11223"><span data-dcnode-id="11227"><span data-dcnode-id="11231" instrument_node="">. Burns &amp; Doolan found that through pyrolysis gas chromatography/mass </span><a class="topic-link" data-dcnode-id="11229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemical-engineering/spectrometry" title="Learn more about spectrometry from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11230" instrument_node="">spectrometry</span></a><span data-dcnode-id="11228" instrument_node="">, contrary to </span></span><a class="topic-link" data-dcnode-id="11225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/fourier-transform-infrared-spectroscopy" title="Learn more about Fourier transform infrared spectroscopy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11226" instrument_node="">Fourier transform infrared spectroscopy</span></a><span data-dcnode-id="11224" instrument_node="">, is possible to differentiate modified alkyd resins on the basis of their modifier </span></span><a class="workspace-trigger" data-dcnode-id="11221" href="#bib0125" name="bbib0125"><span data-dcnode-id="11222" instrument_node="">[25]</span></a><span data-dcnode-id="11220" instrument_node="">.</span></p><p data-dcnode-id="11201" id="par0600"><span data-dcnode-id="11214"><span data-dcnode-id="11218" instrument_node="">Nitrocellulosic resins are composed of </span><a class="topic-link" data-dcnode-id="11216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemical-engineering/nitrocellulose" title="Learn more about cellulose nitrate from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11217" instrument_node="">cellulose nitrate</span></a><span data-dcnode-id="11215" instrument_node="">, a second resin (usually alkyd) and large quantities of plasticizers (mainly dibutyl and dioctyl phthalate).It is formulated as a solution that can be re-dissolved in the same solvent </span></span><a class="workspace-trigger" data-dcnode-id="11212" href="#bib0095" name="bbib0095"><span data-dcnode-id="11213" instrument_node="">[19]</span></a><span data-dcnode-id="11211" instrument_node="">. Almost half of 51 red spray paints analysed by Govaert &amp; Bernard by optical microscopy, Fourier transform infrared spectrometry and X-ray fluorescence, are composed of alkyd-nitrocellulose-based binders </span><a class="workspace-trigger" data-dcnode-id="11209" href="#bib0130" name="bbib0130"><span data-dcnode-id="11210" instrument_node="">[26]</span></a><span data-dcnode-id="11208" instrument_node="">. Samolik et al. also detected in Motip-Dupli</span><sup data-dcnode-id="11206"><span data-dcnode-id="11207" instrument_node="">®</span></sup><span data-dcnode-id="11205" instrument_node=""> Montana Gold an acrylic resin along with nitrocellulose </span><a class="workspace-trigger" data-dcnode-id="11203" href="#bib0110" name="bbib0110"><span data-dcnode-id="11204" instrument_node="">[22]</span></a><span data-dcnode-id="11202" instrument_node="">.</span></p><p data-dcnode-id="11190" id="par0605"><span data-dcnode-id="11200" instrument_node="">The main spray paint solvents are hydrocarbons (aliphatic, naphthenic and aromatic-toluene and xylene), oxygenated (ketones, esters, glycol esters and alcohols-especially </span><em data-dcnode-id="11198"><span data-dcnode-id="11199" instrument_node="">n</span></em><span data-dcnode-id="11197" instrument_node="">-butanol) and water </span><a class="workspace-trigger" data-dcnode-id="11195" href="#bib0025" name="bbib0025"><span data-dcnode-id="11196" instrument_node="">[5]</span></a><span data-dcnode-id="11194" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11192" href="#bib0040" name="bbib0040"><span data-dcnode-id="11193" instrument_node="">[8]</span></a><span data-dcnode-id="11191" instrument_node="">.</span></p><p data-dcnode-id="11168" id="par0610"><span data-dcnode-id="11189" instrument_node="">It is barely impossible to distinguish the type of paint without proper analysis </span><a class="workspace-trigger" data-dcnode-id="11187" href="#bib0005" name="bbib0005"><span data-dcnode-id="11188" instrument_node="">[1]</span></a><span data-dcnode-id="11186" instrument_node="">. Germinario et al. carried out a multi-technique characterization focused on the identification of the binders, pigments and additives of 45 spray paints of diverse brands </span><a class="workspace-trigger" data-dcnode-id="11184" href="#bib0135" name="bbib0135"><span data-dcnode-id="11185" instrument_node="">[27]</span></a><span data-dcnode-id="11175"><span data-dcnode-id="11183" instrument_node="">. Fourier Transform Infrared spectroscopy was used for a first approach to characterize binders, pigments, andextenders and it was able to detect nitrocellulose in the alkyd-based paints. Then, μ-Raman spectroscopy allowed the characterization of inorganic pigments, extenders and some azo and polycyclic pigments. Moreover, pyrolysis-gas chromatography/mass spectrometry allowed to confirm main and minor binders, several azo and polycyclic pigments, presence of acrylic and alkyd resins in the same formulation, and the identification of </span><a class="topic-link" data-dcnode-id="11181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemical-engineering/acrylic-monomer" title="Learn more about acrylic monomers from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11182" instrument_node="">acrylic monomers</span></a><span data-dcnode-id="11176"><span data-dcnode-id="11180" instrument_node=""> and individual fatty acids and </span><a class="topic-link" data-dcnode-id="11178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/polyol" title="Learn more about polyols from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11179" instrument_node="">polyols</span></a><span data-dcnode-id="11177" instrument_node=""> of alkyd resins. The usefulness of pyrolysis-gas chromatography/mass spectrometry has also been reported by Milczarek &amp; Zieba-Palus to detect and characterize diverse spray paints on mineral-based plaster. However, for the acrylic copolymer-based, silicone-based and silicate-based plasters the presence of plaster strong background peaks hid the paints signal </span></span></span><a class="workspace-trigger" data-dcnode-id="11173" href="#bib0140" name="bbib0140"><span data-dcnode-id="11174" instrument_node="">[28]</span></a><span data-dcnode-id="11172" instrument_node="">. The analytic methods are expensive and time consuming, leading, in most of the times to the performance of different on-site trials to decide the most suitable method to achieve the optimal cleaning </span><a class="workspace-trigger" data-dcnode-id="11170" href="#bib0005" name="bbib0005"><span data-dcnode-id="11171" instrument_node="">[1]</span></a><span data-dcnode-id="11169" instrument_node="">. Usually the specific chemical composition of the graffiti paints is unknown. Despite, currently, part of the scientific community started to be concerned about the unveiling of the graffiti composition, the scientific works are mainly focused only in the cleaning evaluation.</span></p></section><section data-dcnode-id="7651" id="sec0015"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="11163" id="sect0030"><span data-dcnode-id="11166" instrument_node="">3</span><span data-dcnode-id="11165" instrument_node="">. </span><span data-dcnode-id="11164" instrument_node="">Anti-graffiti protective coatings</span></h2><div data-dcnode-id="11084"><p data-dcnode-id="11145" id="par0615"><span data-dcnode-id="11162" instrument_node="">Since the graffiti cleaning can induce stone damage, there was a need to develop coatings to protect the stone’s surface from graffiti and facilitate its removal (</span><a class="workspace-trigger" data-dcnode-id="11160" href="#fig0010" name="bfig0010"><span data-dcnode-id="11161" instrument_node="">Fig. 2</span></a><span data-dcnode-id="11159" instrument_node="">) </span><a class="workspace-trigger" data-dcnode-id="11157" href="#bib0145" name="bbib0145"><span data-dcnode-id="11158" instrument_node="">[29]</span></a><span data-dcnode-id="11152"><span data-dcnode-id="11156" instrument_node="">. The EC took a step forward by encouraging a new anti-graffiti formulation, suitable for historical monuments, based on ancient protein coatings, a complexation of polyampholytes with polymeric amines modified by </span><a class="topic-link" data-dcnode-id="11154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemical-engineering/fluorocarbon" title="Learn more about fluorocarbon from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11155" instrument_node="">fluorocarbon</span></a><span data-dcnode-id="11153" instrument_node=""> residues (GRAFFITAGE). The first scientific paper to focus the effect of anti-graffiti on stone is dated back 2008. Since then many protective coatings arrived on the market. Nowadays there are about 19 scientific papers published about this theme </span></span><a class="workspace-trigger" data-dcnode-id="11150" href="#bib0150" name="bbib0150"><span data-dcnode-id="11151" instrument_node="">[30]</span></a><span data-dcnode-id="11149" instrument_node="">, more than 50% focused on carbonated stones (</span><a class="workspace-trigger" data-dcnode-id="11147" href="#fig0015" name="bfig0015"><span data-dcnode-id="11148" instrument_node="">Fig. 3</span></a><span data-dcnode-id="11146" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="11116" id="fig0010"><span data-dcnode-id="11129"><img alt="Fig. 2" aria-describedby="cap0010" data-dcnode-id="11144" height="500" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S030094401730629X-gr2.jpg&amp;raw"><span data-dcnode-id="11143" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="11130"><li data-dcnode-id="11137"><a class="anchor download-link u-font-sans" data-dcnode-id="11138" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S030094401730629X-gr2_lrg.jpg" target="_blank" title="Download high-res image (1MB)"><span class="anchor-text" data-dcnode-id="11139"><span data-dcnode-id="11142" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="11140"><span data-dcnode-id="11141" instrument_node="">Download high-res image (1MB)</span></span></span></a></li><li data-dcnode-id="11131"><a class="anchor download-link u-font-sans" data-dc
