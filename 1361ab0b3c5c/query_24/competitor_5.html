t_node="">Briolux Spray</span><sup data-dcnode-id="10062"><span data-dcnode-id="10063" instrument_node="">®</span></sup><span data-dcnode-id="10061" instrument_node=""> orange-coloured (RAL code 2005)</span></td><td class="align-left" data-dcnode-id="10058"><span data-dcnode-id="10059" instrument_node="">Based on methyl-methacrylate resin</span></td><td class="align-left" data-dcnode-id="10046"><dl class="list" data-dcnode-id="10047"><dt class="list-label" data-dcnode-id="10056"><span data-dcnode-id="10057" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="10053"><p data-dcnode-id="10054" id="par0340"><span data-dcnode-id="10055" instrument_node="">AG1 (polymer waxes)</span></p></dd><dt class="list-label" data-dcnode-id="10051"><span data-dcnode-id="10052" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="10048"><p data-dcnode-id="10049" id="par0345"><span data-dcnode-id="10050" instrument_node="">AG2 (polymer waxes and acrylic-fluorinated resins)</span></p></dd></dl></td><td class="align-left" data-dcnode-id="10024"><dl class="list" data-dcnode-id="10025"><dt class="list-label" data-dcnode-id="10044"><span data-dcnode-id="10045" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="10041"><p data-dcnode-id="10042" id="par0350"><span data-dcnode-id="10043" instrument_node="">Hot water and brushing (mechanical method)</span></p></dd><dt class="list-label" data-dcnode-id="10039"><span data-dcnode-id="10040" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="10036"><p data-dcnode-id="10037" id="par0355"><span data-dcnode-id="10038" instrument_node="">R1 (glycol ether) for surfaces treated</span></p></dd><dt class="list-label" data-dcnode-id="10034"><span data-dcnode-id="10035" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="10031"><p data-dcnode-id="10032" id="par0360"><span data-dcnode-id="10033" instrument_node="">with AG1</span></p></dd><dt class="list-label" data-dcnode-id="10029"><span data-dcnode-id="10030" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="10026"><p data-dcnode-id="10027" id="par0365"><span data-dcnode-id="10028" instrument_node="">R2 (surfactants and solvents) for surfaces treated with AG2</span></p></dd></dl></td></tr></tbody></table></div></div></div><p data-dcnode-id="10013" id="par0625"><span data-dcnode-id="10017" instrument_node="">Anti-graffiti products generate low surface energies which limit the graffiti adhesion to the surface, thereby facilitating their removal and also waterproofing the stone material </span><a class="workspace-trigger" data-dcnode-id="10015" href="#bib0155" name="bbib0155"><span data-dcnode-id="10016" instrument_node="">[31]</span></a><span data-dcnode-id="10014" instrument_node="">. There are two main types of anti-graffiti coatings: the so-called sacrificial (or temporary) and permanent.</span></p><p data-dcnode-id="10004" id="par0630"><span data-dcnode-id="10008"><span data-dcnode-id="10012" instrument_node="">The sacrificial coatings are removed during the cleaning process and are generally based on waxes and </span><a class="topic-link" data-dcnode-id="10010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/polysiloxane" title="Learn more about silicones from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10011" instrument_node="">silicones</span></a><span data-dcnode-id="10009" instrument_node="">. Therefore they have a limited durability under intense environmental conditions </span></span><a class="workspace-trigger" data-dcnode-id="10006" href="#bib0160" name="bbib0160"><span data-dcnode-id="10007" instrument_node="">[32]</span></a><span data-dcnode-id="10005" instrument_node="">.</span></p><p data-dcnode-id="9991" id="par0635"><span data-dcnode-id="9995"><span data-dcnode-id="9999"><span data-dcnode-id="10003" instrument_node="">The permanent coatings which can theoretically resist several cleaning cycles, are usually </span><a class="topic-link" data-dcnode-id="10001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemical-engineering/polyurethane" title="Learn more about polyurethanes from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10002" instrument_node="">polyurethanes</span></a><span data-dcnode-id="10000" instrument_node="">, fluorocarbon, alkyl alkoxy </span></span><a class="topic-link" data-dcnode-id="9997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemical-engineering/silanes" title="Learn more about silanes from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9998" instrument_node="">silanes</span></a><span data-dcnode-id="9996" instrument_node="">. These are also known by hindering the moisture transport from the substrate through the atmosphere </span></span><a class="workspace-trigger" data-dcnode-id="9993" href="#bib0160" name="bbib0160"><span data-dcnode-id="9994" instrument_node="">[32]</span></a><span data-dcnode-id="9992" instrument_node="">.</span></p><p data-dcnode-id="9983" id="par0640"><span data-dcnode-id="9990" instrument_node="">Both types of anti-graffiti coatings can be removed by hot pressurized water or dissolved by chemical agents </span><a class="workspace-trigger" data-dcnode-id="9988" href="#bib0145" name="bbib0145"><span data-dcnode-id="9989" instrument_node="">[29]</span></a><span data-dcnode-id="9987" instrument_node="">. García &amp; Malaga developed a list of tests to determine the criteria for the acceptance or rejection of an anti-graffiti on historical porous substrates, with minimum acceptable values for relevant properties </span><a class="workspace-trigger" data-dcnode-id="9985" href="#bib0165" name="bbib0165"><span data-dcnode-id="9986" instrument_node="">[33]</span></a><span data-dcnode-id="9984" instrument_node="">. The anti-graffiti protective coatings were tested by the scientific community with various graffiti materials, namely spray paints and markers, the information concerning the type of graffiti material is given across the chapter individually for each study.</span></p><p data-dcnode-id="9955" id="par0645"><span data-dcnode-id="9978"><span data-dcnode-id="9982" instrument_node="">Several alkyd enamel spray paints were tried to remove on Gris Quintana </span><a class="topic-link" data-dcnode-id="9980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/granite" title="Learn more about granite from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9981" instrument_node="">granite</span></a><span data-dcnode-id="9979" instrument_node=""> and Branco Paloma limestone after the application of the permanent coating Protectosil Anti-graffiti (fluoralkyl siloxane) with chemical solvent cyclohexanone </span></span><a class="workspace-trigger" data-dcnode-id="9976" href="#bib0170" name="bbib0170"><span data-dcnode-id="9977" instrument_node="">[34]</span></a><span data-dcnode-id="9971"><span data-dcnode-id="9975" instrument_node="">. The nanometric coating nature slightly changed the porosity and lowered the permeability, however the cleaning was not completely effective in the limestone, the more </span><a class="topic-link" data-dcnode-id="9973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/porous-material" title="Learn more about porous material from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9974" instrument_node="">porous material</span></a><span data-dcnode-id="9972" instrument_node=""> studied by these authors. Later, Carmona-Quiroga et al. compared Ormosil organically modified silicate with Protectosil anti-graffiti under SO</span></span><sub data-dcnode-id="9969"><span data-dcnode-id="9970" instrument_node="">2</span></sub><span data-dcnode-id="9968" instrument_node=""> exposure </span><a class="workspace-trigger" data-dcnode-id="9966" href="#bib0175" name="bbib0175"><span data-dcnode-id="9967" instrument_node="">[35]</span></a><span data-dcnode-id="9965" instrument_node="">. Ormosil reduced the graffiti adhesion to the substrates and prevented the formation of sulphur compounds on limestone. In a later research, they also noticed that by increasing the anti-graffiti concentration, a more effective reduction of stone surface energy was achieved </span><a class="workspace-trigger" data-dcnode-id="9963" href="#bib0155" name="bbib0155"><span data-dcnode-id="9964" instrument_node="">[31]</span></a><span data-dcnode-id="9962" instrument_node="">. In a recent article, they concluded that in limestone, both mentioned coatings: Protectosil and Ormosil, remained stable under photo-oxidising conditions </span><a class="workspace-trigger" data-dcnode-id="9960" href="#bib0180" name="bbib0180"><span data-dcnode-id="9961" instrument_node="">[36]</span></a><span data-dcnode-id="9959" instrument_node="">. It was also detected that under freeze-thaw cycles limestone showed an accelerated decay, while the granite samples did not exhibit decay signs </span><a class="workspace-trigger" data-dcnode-id="9957" href="#bib0180" name="bbib0180"><span data-dcnode-id="9958" instrument_node="">[36]</span></a><span data-dcnode-id="9956" instrument_node="">.</span></p><p data-dcnode-id="9929" id="par0650"><span data-dcnode-id="9950"><span data-dcnode-id="9954" instrument_node="">Gardei et al. used diverse commercial AGS anti-graffiti agents with different formulations on Villamayor, Galdacano, Strterica and Baumberg </span><a class="topic-link" data-dcnode-id="9952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/sandstone" title="Learn more about sandstones from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9953" instrument_node="">sandstones</span></a><span data-dcnode-id="9951" instrument_node=""> and Balegem, Belgian blue, and Roman travertine limestones: a sacrificial one (AGS2 based on wax/paraffin), and six permanent others: AGS1 (Copolymer), AGS3 (Polyurethane), AGS4 (Methacrylate), in comparison to three versions of the newly designed agent AGS5, (1, 2 and 3) (2-C-Polymer) </span></span><a class="workspace-trigger" data-dcnode-id="9948" href="#bib0160" name="bbib0160"><span data-dcnode-id="9949" instrument_node="">[32]</span></a><span data-dcnode-id="9943"><span data-dcnode-id="9947" instrument_node="">. It was reported that surface became smoother, and a reduction of water uptake and decrease of water evaporation after the coatings application was achieved. It was obtained a satisfactory cleaning, with few paint residues, using a pH neutral commercial cleaner. The highest reductions of </span><a class="topic-link" data-dcnode-id="9945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/capillarity" title="Learn more about capillarity from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9946" instrument_node="">capillarity</span></a><span data-dcnode-id="9944" instrument_node=""> water absorption were achieved with AGS3, the lowest with AGS2 and AGS4. AGS3 also produced the minor colour and gloss changes while AGS2 altered the colour of the less porous substrates. Garcia et al. in its comparative study of 4 anti-graffiti (an acrylate copolymer; an emulsion of paraffin, a polyurethane and an ethyl methacrylate), reported that the graffiti penetration is more influenced by the pore sizes than by the porosity of the stone substrate </span></span><a class="workspace-trigger" data-dcnode-id="9941" href="#bib0185" name="bbib0185"><span data-dcnode-id="9942" instrument_node="">[37]</span></a><span data-dcnode-id="9940" instrument_node="">. Later, Meng et al. exposed these same coatings to artificial and natural ageing tests and concluded that the newly designed agent (AGS5) was the most suitable to historical surfaces. The coating offered a satisfactory compromise between water transport, visual alterations and cleaning effectiveness for all the tested substrates: Villamayor sandstone, Strtenica sandstone, Balegem limestone and Belgian blue limestone </span><a class="workspace-trigger" data-dcnode-id="9938" href="#bib0190" name="bbib0190"><span data-dcnode-id="9939" instrument_node="">[38]</span></a><span data-dcnode-id="9933"><span data-dcnode-id="9937" instrument_node="">. Mueller et al. also tested both AGS1 and AGS2 on Flossenbürg granite, Selters Trachyte, Mayern </span><a class="topic-link" data-dcnode-id="9935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/basalt" title="Learn more about basalt from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9936" instrument_node="">basalt</span></a><span data-dcnode-id="9934" instrument_node=""> lava, Lindlar greywacke, Anröchte green sandstone, Postaer sandstone, Treuchtlinger limestone, Crailshaim limestone and Thüster limestone, </span></span><a class="workspace-trigger" data-dcnode-id="9931" href="#bib0195" name="bbib0195"><span data-dcnode-id="9932" instrument_node="">[39]</span></a><span data-dcnode-id="9930" instrument_node="">. The porosity of the stones has proved to be the factor that mainly influences the cleaning performance and to a lesser extent, the superficial roughness. The water absorption coefficient and water vapour permeability were considerably reduced but not equally for all substrates. While the colour changes were acceptable for all the substrates, the gloss changes were notable in some of them, namely on the low porosity substrates were AGS2 was applied.</span></p><p data-dcnode-id="9916" id="par0655"><span data-dcnode-id="9924"><span data-dcnode-id="9928" instrument_node="">Malaga &amp; Bengtsson tested the removal of tectyl rust protection (a mixture of wax and tar), leather dye </span><a class="topic-link" data-dcnode-id="9926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemical-engineering/aniline" title="Learn more about aniline from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9927" instrument_node="">aniline</span></a><span data-dcnode-id="9925" instrument_node="">, felt tip pens and spray paints with high pressurized water on granite, sandstone, limestone and marble coated with a microcrystalline wax under artificial weathering </span></span><a class="workspace-trigger" data-dcnode-id="9922" href="#bib0145" name="bbib0145"><span data-dcnode-id="9923" instrument_node="">[29]</span></a><span data-dcnode-id="9917"><span data-dcnode-id="9921" instrument_node="">. As results, the coating maintained its colour, gloss, </span><a class="topic-link" data-dcnode-id="9919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/hydrophobicity" title="Learn more about hydrophobicity from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9920" instrument_node="">hydrophobicity</span></a><span data-dcnode-id="9918" instrument_node=""> and water uptake. They provided satisfactory extraction of the tested stains except of leather dyes which penetrated through the coating.</span></span></p><p data-dcnode-id="9885" id="par0660"><span data-dcnode-id="9915" instrument_node="">Licchelli et al. used a mixture of two anti-graffitis: Fluorolink</span><sup data-dcnode-id="9913"><span data-dcnode-id="9914" instrument_node="">®</span></sup><span data-dcnode-id="9912" instrument_node=""> P56 (anionic fluorinated polyurethane) and Xama</span><sup data-dcnode-id="9910"><span data-dcnode-id="9911" instrument_node="">®</span></sup><span data-dcnode-id="9909" instrument_node=""> 7 (pentaerythrytol tris [3-(1-aziridinyl)propionate]) to protect Carrara marble, Pietra Serena sandstone and Pietra di Lecce limestone. Afterwards Remover</span><sup data-dcnode-id="9907"><span data-dcnode-id="9908" instrument_node="">®</span></sup><span data-dcnode-id="9906" instrument_node=""> AC (mixture of γ-butyrolactone, dipropy-leneglycol monomethylether) and Triton</span><sup data-dcnode-id="9904"><span data-dcnode-id="9905" instrument_node="">®</span></sup><span data-dcnode-id="9903" instrument_node=""> were used to clean a BIC</span><sup data-dcnode-id="9901"><span data-dcnode-id="9902" instrument_node="">®</span></sup><span data-dcnode-id="9900" instrument_node=""> black permanent marker </span><a class="workspace-trigger" data-dcnode-id="9898" href="#bib0200" name="bbib0200"><span data-dcnode-id="9899" instrument_node="">[40]</span></a><span data-dcnode-id="9897" instrument_node="">. Despite both cured and uncured coatings showed high contact angles, the protective effectiveness was only satisfactory at the shortest times towards water penetration (30</span><span data-dcnode-id="9896" instrument_node="">&nbsp;</span><span data-dcnode-id="9895" instrument_node="">min of water capillarity absorption). The ink penetration was related to the cured/uncured polymer features (the cured samples exhibited better performance) and to the stone properties (after few cleaning cycles, traces of unremoved ink started to be perceptible in the porous Pietra di Lecce). Later, they used Tecnoflon</span><sup data-dcnode-id="9893"><span data-dcnode-id="9894" instrument_node="">®</span></sup><span data-dcnode-id="9892" instrument_node=""> TN (terpolymer of difluoroethene vinylidene fluoride, hexafluoropropene, and tetrafluoroethene) on Pietra di Lecce </span><a class="workspace-trigger" data-dcnode-id="9890" href="#bib0205" name="bbib0205"><span data-dcnode-id="9891" instrument_node="">[41]</span></a><span data-dcnode-id="9889" instrument_node="">. The samples coated by capillary absorption showed an acceptable reduction of vapour permeability contrary to the brushing application. The capillary absorption allowed the polymer to penetrate into the stone structure, however when applied in higher amounts, a formation of a film was detected </span><a class="workspace-trigger" data-dcnode-id="9887" href="#bib0205" name="bbib0205"><span data-dcnode-id="9888" instrument_node="">[41]</span></a><span data-dcnode-id="9886" instrument_node="">.</span></p><p data-dcnode-id="9856" id="par0665"><span data-dcnode-id="9884" instrument_node="">Lettieri &amp; Masieri applied on Pietra di Lecce an AG1 (water emulsion of polymer waxes), an AG2a (water emulsion of acrylic-fluorinated copolymers) and an AG2b (polymer waxes added to acrylic-fluorinated resins in water emulsion) to protect the stone from Briolux</span><sup data-dcnode-id="9882"><span data-dcnode-id="9883" instrument_node="">®</span></sup><span data-dcnode-id="9881" instrument_node=""> spray paint </span><a class="workspace-trigger" data-dcnode-id="9879" href="#bib0210" name="bbib0210"><span data-dcnode-id="9880" instrument_node="">[42]</span></a><span data-dcnode-id="9874"><span data-dcnode-id="9878" instrument_node="">. The paint was tried to remove with R1 (glycol ether-based solution) and R2 (surfactants and solvents specific for cleaning surfaces protected with AG2). The unprotected surfaces exhibited significant residual stains after the cleaning, due to the previously mentioned high penetration rate of the paint. The best results were obtained when a thinner </span><a class="topic-link" data-dcnode-id="9876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/polymer-coating" title="Learn more about polymer coating from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9877" instrument_node="">polymer coating</span></a><span data-dcnode-id="9875" instrument_node=""> was applied and namely with the AG2 and its primer since it avoided the penetration of the paint. The threshold values for the evaluation of the colour changes were indicative of acceptable cleaning actions </span></span><a class="workspace-trigger" data-dcnode-id="9872" href="#bib0210" name="bbib0210"><span data-dcnode-id="9873" instrument_node="">[42]</span></a><span data-dcnode-id="9871" instrument_node="">. Later the same authors tested the same stone and referred anti-graffiti, paint and cleaning agents </span><a class="workspace-trigger" data-dcnode-id="9869" href="#bib0215" name="bbib0215"><span data-dcnode-id="9870" instrument_node="">[43]</span></a><span data-dcnode-id="9860"><span data-dcnode-id="9868" instrument_node="">. The paint penetrated through the coating, due to the low </span><a class="topic-link" data-dcnode-id="9866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/glass-transition-temperature" title="Learn more about glass transition temperature from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9867" instrument_node="">glass transition temperature</span></a><span data-dcnode-id="9861"><span data-dcnode-id="9865" instrument_node=""> (Tg). After repeated cleaning cycles with hot water, mechanical action and the chemical removers R1 (glycol ether) and R2 (surfactants and solvents), the complete removal of the paints and protective coatings was not achieved, especially with AG1. Later, it was found that a </span><a class="topic-link" data-dcnode-id="9863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/thin-films" title="Learn more about thin film from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9864" instrument_node="">thin film</span></a><span data-dcnode-id="9862" instrument_node=""> of anti-graffiti protective coating achieved a lower percentage of residues (with a new proposed method to estimate the graffiti remains) after cleaning in comparison with a thicker coating </span></span></span><a class="workspace-trigger" data-dcnode-id="9858" href="#bib0215" name="bbib0215"><span data-dcnode-id="9859" instrument_node="">[43]</span></a><span data-dcnode-id="9857" instrument_node="">.</span></p><p data-dcnode-id="9843" id="par0670"><span data-dcnode-id="9847"><span data-dcnode-id="9855" instrument_node="">Cocco et al. tested on Biancone Tirreno (wakestone) and Pietra Cantone (limestone) an AG1 (paraffin waxes in water) and an AG2 (a primer with amino-functionalized polysiloxane water emulsion, and a base with alkyl fluoride functionalized silane </span><a class="topic-link" data-dcnode-id="9853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemical-engineering/monomer" title="Learn more about monomer from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9854" instrument_node="">monomer</span></a><span data-dcnode-id="9848"><span data-dcnode-id="9852" instrument_node=""> plus a lyophobic polymer) anti-graffiti products. It was achieved a good water repellence, </span><a class="topic-link" data-dcnode-id="9850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/wettability" title="Learn more about wettability from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9851" instrument_node="">wettability</span></a><span data-dcnode-id="9849" instrument_node=""> decrease and negligible colour variations. AG2 had a limited durability of one cleaning cycle </span></span></span><a class="workspace-trigger" data-dcnode-id="9845" href="#bib0220" name="bbib0220"><span data-dcnode-id="9846" instrument_node="">[44]</span></a><span data-dcnode-id="9844" instrument_node="">.</span></p><p data-dcnode-id="9838" id="par0675"><span data-dcnode-id="9842" instrument_node="">In a recent study, Carmona-Quiroga et al. applied on Portland limestone and Wood-kirk sandstone two anti-graffiti coatings: an AG1 (water dispersion of polyurethane with a perfluoropolyether backbone) and an AG2 (water based crystalline micro wax) </span><a class="workspace-trigger" data-dcnode-id="9840" href="#bib0225" name="bbib0225"><span data-dcnode-id="9841" instrument_node="">[45]</span></a><span data-dcnode-id="9839" instrument_node="">. Both coatings improved the graffiti removal without significant colour and gloss changes. However, both anti-graffiti products underwent colour changes after artificial and natural weathering conditions (UV-B radiation was more aggressive than marine conditions during 1 year). Although the water repellence remained inalterable for both surfaces, AG1 decreased the water vapour permeability on both stones and AG2 decreased the contact angles.</span></p><p data-dcnode-id="9806" id="par0680"><span data-dcnode-id="9837" instrument_node="">Licchelli et al. tested anti-graffiti systems composed of montmorillonite nanoparticles on Pietra di Lecce </span><a class="workspace-trigger" data-dcnode-id="9835" href="#bib0230" name="bbib0230"><span data-dcnode-id="9836" instrument_node="">[46]</span></a><span data-dcnode-id="9834" instrument_node="">. These products were Dellite</span><sup data-dcnode-id="9832"><span data-dcnode-id="9833" instrument_node="">®</span></sup><span data-dcnode-id="9831" instrument_node=""> HPS (natural Na-montmorillonite) and Dellite</span><sup data-dcnode-id="9829"><span data-dcnode-id="9830" instrument_node="">®</span></sup><span data-dcnode-id="9828" instrument_node="">43B (natural purified montmorillonite) dispersed in Fluorolink</span><sup data-dcnode-id="9826"><span data-dcnode-id="9827" instrument_node="">®</span></sup><span data-dcnode-id="9821"><span data-dcnode-id="9825" instrument_node=""> P56 (fluorinated polyurethane). The </span><a class="topic-link" data-dcnode-id="9823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/nanoclay" title="Learn more about nanoclay from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9824" instrument_node="">nanoclay</span></a><span data-dcnode-id="9822" instrument_node=""> structural features and its concentration influenced the coating behaviour. Dellite</span></span><sup data-dcnode-id="9819"><span data-dcnode-id="9820" instrument_node="">®</span></sup><span data-dcnode-id="9818" instrument_node="">43B exhibited a higher water repellence and better barrier effect against acrylic spray paint (ROLMACRYL) than Dellite</span><sup data-dcnode-id="9816"><span data-dcnode-id="9817" instrument_node="">®</span></sup><span data-dcnode-id="9807"><span data-dcnode-id="9815" instrument_node=""> HPS, which could be easily removed by </span><a class="topic-link" data-dcnode-id="9813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemical-engineering/ketone" title="Learn more about MEK from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9814" instrument_node="">MEK</span></a><span data-dcnode-id="9808"><span data-dcnode-id="9812" instrument_node=""> solvent without induce significant alterations. However, the permanent marker diffused into the </span><a class="topic-link" data-dcnode-id="9810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/polymer-matrix" title="Learn more about polymer matrix from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9811" instrument_node="">polymer matrix</span></a><span data-dcnode-id="9809" instrument_node="">.</span></span></span></p><p data-dcnode-id="9797" id="par0685"><span data-dcnode-id="9805" instrument_node="">Kronlund et al. tried to remove Montana Cans: Montana Black (nitrocelluloic and alkyd resins) and Montana White (alkyd resins with oxidising drying) from Carrara marble after apply Capstone FS-63 protective coating </span><a class="workspace-trigger" data-dcnode-id="9803" href="#bib0235" name="bbib0235"><span data-dcnode-id="9804" instrument_node="">[47]</span></a><span data-dcnode-id="9798"><span data-dcnode-id="9802" instrument_node="">. The coating formulations containing </span><a class="topic-link" data-dcnode-id="9800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemical-engineering/ethylene-glycol" title="Learn more about ethylene glycol from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9801" instrument_node="">ethylene glycol</span></a><span data-dcnode-id="9799" instrument_node=""> showed better penetration results, due to the slow evaporation rate. Despite Montana Black was slightly harder to wash away, there were no remarkable differences in the cleaning effectiveness achieved for the different coatings tested.</span></span></p><p data-dcnode-id="9756" id="par0690"><span data-dcnode-id="9796" instrument_node="">Moura et al. used on Moleanos limestone two sacrificial coatings: a S</span><sub data-dcnode-id="9794"><span data-dcnode-id="9795" instrument_node="">silox</span></sub><span data-dcnode-id="9793" instrument_node=""> (water-based organosiloxane emulsion with additives) and a S</span><sub data-dcnode-id="9791"><span data-dcnode-id="9792" instrument_node="">nano</span></sub><span data-dcnode-id="9790" instrument_node=""> (with SiO</span><sub data-dcnode-id="9788"><span data-dcnode-id="9789" instrument_node="">2</span></sub><span data-dcnode-id="9787" instrument_node=""> nanoparticles) and a permanent P</span><sub data-dcnode-id="9785"><span data-dcnode-id="9786" instrument_node="">fluor</span></sub><span data-dcnode-id="9784" instrument_node=""> (water-based fluoroalkylsiloxane) coatings after painting with a silicate-based paint </span><a class="workspace-trigger" data-dcnode-id="9782" href="#bib0240" name="bbib0240"><span data-dcnode-id="9783" instrument_node="">[48]</span></a><span data-dcnode-id="9781" instrument_node="">. The sacrificial anti-graffiti S</span><sub data-dcnode-id="9779"><span data-dcnode-id="9780" instrument_node="">nano</span></sub><span data-dcnode-id="9778" instrument_node=""> had the best physical performance, highly reducing the water absorption without significantly influence on the drying behaviour, water vapour permeability and colour. The permanent anti-graffiti P</span><sub data-dcnode-id="9776"><span data-dcnode-id="9777" instrument_node="">fluor</span></sub><span data-dcnode-id="9775" instrument_node=""> had also shown an optimal drying performance. S</span><sub data-dcnode-id="9773"><span data-dcnode-id="9774" instrument_node="">silox</span></sub><span data-dcnode-id="9772" instrument_node=""> produced the lowest colour variations </span><a class="workspace-trigger" data-dcnode-id="9770" href="#bib0240" name="bbib0240"><span data-dcnode-id="9771" instrument_node="">[48]</span></a><span data-dcnode-id="9769" instrument_node="">. Those authors attested that the cleaning effectiveness depends on the composition of the graffiti painting, the anti-graffiti and the substrate characteristics </span><a class="workspace-trigger" data-dcnode-id="9767" href="#bib0245" name="bbib0245"><span data-dcnode-id="9768" instrument_node="">[49]</span></a><span data-dcnode-id="9766" instrument_node="">. The cleaning of grey paint was more successful in samples treated with S</span><sub data-dcnode-id="9764"><span data-dcnode-id="9765" instrument_node="">silox</span></sub><span data-dcnode-id="9763" instrument_node=""> and for the blue paints the best results were achieved with S</span><sub data-dcnode-id="9761"><span data-dcnode-id="9762" instrument_node="">nano</span></sub><span data-dcnode-id="9760" instrument_node=""> and P</span><sub data-dcnode-id="9758"><span data-dcnode-id="9759" instrument_node="">fluor</span></sub><span data-dcnode-id="9757" instrument_node="">. Most of the paints was removed with high-pressurized cold water and some residues were detected. The highest colour change was observed in samples without anti-graffiti protection.</span></p><div data-dcnode-id="7652"><p data-dcnode-id="9747" id="par0695"><span data-dcnode-id="9755" instrument_node="">In </span><a class="workspace-trigger" data-dcnode-id="9753" href="#tbl0010" name="btbl0010"><span data-dcnode-id="9754" instrument_node="">Table 2</span></a><span data-dcnode-id="9748"><span data-dcnode-id="9752" instrument_node=""> are highlighted the methods used to evaluate the performance of anti-graffiti effectiveness, harmfulness and durability. From the critical analysis performed one verified that 30 different techniques/methods were used in that evaluation. The most used are </span><a class="topic-link" data-dcnode-id="9750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemical-engineering/colorimetry" title="Learn more about colorimetry from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9751" instrument_node="">colorimetry</span></a><span data-dcnode-id="9749" instrument_node="">, contact angle measurement, scanning electron microscopy, water vapour permeability and capillarity water absorption.</span></span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="7653" id="tbl0010"><span class="captions" data-dcnode-id="9740"><span data-dcnode-id="9741" id="cap0040"><p data-dcnode-id="9742" id="spar0040"><span class="label" data-dcnode-id="9745"><span data-dcnode-id="9746" instrument_node="">Table 2</span></span><span data-dcnode-id="9744" instrument_node="">. </span><span data-dcnode-id="9743" instrument_node="">Analytical techniques used in different researches focused on the evaluation of the anti-graffiti effectiveness on stones. Symbols show the different evaluation performed in each work with the different techniques; ■ shows that the previous characterization of the stone was carried out; ● the graffiti paints by themselves were evaluated; ▲ the anti-graffiti coatings were characterized and △ shows the techniques used to evaluate the protection level of the coated surfaces after graffiti cleaning.</span></p></span></span><div class="groups" data-dcnode-id="7654"><table data-dcnode-id="7655"><thead class="valign-top" data-dcnode-id="9676"><tr class="rowsep-1" data-dcnode-id="9677"><th class="align-left" data-dcnode-id="9738" scope="col"><span data-dcnode-id="9739" instrument_node="">Reference</span></th><th class="align-left" data-dcnode-id="9736" scope="col"><span data-dcnode-id="9737" instrument_node="">Optic microscopy</span></th><th class="align-left" data-dcnode-id="9734" scope="col"><span data-dcnode-id="9735" instrument_node="">Colorimetry</span></th><th class="align-left" data-dcnode-id="9732" scope="col"><span data-dcnode-id="9733" instrument_node="">Gloss meter</span></th><th class="align-left" data-dcnode-id="9730" scope="col"><span data-dcnode-id="9731" instrument_node="">FTIR</span></th><th class="align-left" data-dcnode-id="9728" scope="col"><span data-dcnode-id="9729" instrument_node="">XRD</span></th><th class="align-left" data-dcnode-id="9726" scope="col"><span data-dcnode-id="9727" instrument_node="">Raman</span></th><th class="align-left" data-dcnode-id="9724" scope="col"><span data-dcnode-id="9725" instrument_node="">Spectrophotometer for liquids</span></th><th class="align-left" data-dcnode-id="9722" scope="col"><span data-dcnode-id="9723" instrument_node="">Differential scanning calorimetry</span></th><th class="align-left" data-dcnode-id="9720" scope="col"><span data-dcnode-id="9721" instrument_node="">SEM</span></th><th class="align-left" data-dcnode-id="9718" scope="col"><span data-dcnode-id="9719" instrument_node="">Contact angle</span></th><th class="align-left" data-dcnode-id="9716" scope="col"><span data-dcnode-id="9717" instrument_node="">Capillary water absorption</span></th><th class="align-left" data-dcn n-left" data-dcnode-id="7677"></td><td class="align-left" data-dcnode-id="7676"></td><td class="align-left" data-dcnode-id="7675"></td><td class="align-left" data-dcnode-id="7674"></td><td class="align-left" data-dcnode-id="7673"></td><td class="align-left" data-dcnode-id="7672"></td><td class="align-left" data-dcnode-id="7671"></td><td class="align-left" data-dcnode-id="7670"></td><td class="align-left" data-dcnode-id="7669"></td><td class="align-left" data-dcnode-id="7668"></td><td class="align-left" data-dcnode-id="7667"></td><td class="align-left" data-dcnode-id="7666"></td><td class="align-left" data-dcnode-id="7665"></td><td class="align-left" data-dcnode-id="7664"></td><td class="align-left" data-dcnode-id="7663"></td><td class="align-left" data-dcnode-id="7662"></td><td class="align-left" data-dcnode-id="7661"></td><td class="align-left" data-dcnode-id="7660"></td><td class="align-left" data-dcnode-id="7658"><span data-dcnode-id="7659" instrument_node="">as</span></td></tr></tbody></table></div></div></div></section><section data-dcnode-id="5187" id="sec0020"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7647" id="sect0035"><span data-dcnode-id="7650" instrument_node="">4</span><span data-dcnode-id="7649" instrument_node="">. </span><span data-dcnode-id="7648" instrument_node="">Graffiti removal procedures</span></h2><p data-dcnode-id="7636" id="par0700"><span data-dcnode-id="7646" instrument_node="">Graffiti removal procedures, despite apparently simple, are potentially harmful and irreversible. Therefore, it is crucial to adequate the decision-making process to achieve satisfactory results. In the selection of a graffiti removal method, several aspects must be considered, namely the chemical composition of the paint and the intrinsic characteristics of the stone (texture, mineralogical composition, petrophysical properties, weathering degree, etc.). Several recommendations for the cleaning of Cultural Heritage stones have been proposed in the past decades </span><a class="workspace-trigger" data-dcnode-id="7644" href="#bib0250" name="bbib0250"><span data-dcnode-id="7645" instrument_node="">[50]</span></a><span data-dcnode-id="7643" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7641" href="#bib0255" name="bbib0255"><span data-dcnode-id="7642" instrument_node="">[51]</span></a><span data-dcnode-id="7640" instrument_node=""> as well as methods for assessment the cleaning results </span><a class="workspace-trigger" data-dcnode-id="7638" href="#bib0260" name="bbib0260"><span data-dcnode-id="7639" instrument_node="">[52]</span></a><span data-dcnode-id="7637" instrument_node="">.</span></p><div data-dcnode-id="7575"><p data-dcnode-id="7619" id="par0705"><span data-dcnode-id="7635" instrument_node="">Although the traditional procedures applied by professionals are the chemical and mechanical methods (</span><a class="workspace-trigger" data-dcnode-id="7633" href="#fig0020" name="bfig0020"><span data-dcnode-id="7634" instrument_node="">Fig. 4</span></a><span data-dcnode-id="7632" instrument_node="">), scientific publications based on the evaluation of their cleaning effectiveness are scarce.The first scientific paper focused on graffiti removal on stone is dated of 2000. Nowadays there are about 22 papers published in scientific journals about this theme </span><a class="workspace-trigger" data-dcnode-id="7630" href="#bib0150" name="bbib0150"><span data-dcnode-id="7631" instrument_node="">[30]</span></a><span data-dcnode-id="7629" instrument_node="">, not involving the use of anti-graffiti protection. Most of these papers (60%) are focused on carbonate stones (</span><a class="workspace-trigger" data-dcnode-id="7627" href="#fig0015" name="bfig0015"><span data-dcnode-id="7628" instrument_node="">Fig. 3</span></a><span data-dcnode-id="7626" instrument_node="">), which are also the most studied stones for anti-graffiti coatings (</span><a class="workspace-trigger" data-dcnode-id="7624" href="#fig0015" name="bfig0015"><span data-dcnode-id="7625" instrument_node="">Fig. 3</span></a><span data-dcnode-id="7623" instrument_node="">). Concerning the graffiti cleaning methods, the most studied are undoubtedly the lasers (</span><a class="workspace-trigger" data-dcnode-id="7621" href="#fig0015" name="bfig0015"><span data-dcnode-id="7622" instrument_node="">Fig. 3</span></a><span data-dcnode-id="7620" instrument_node="">), corresponding almost 50% of the analysed papers.</span></p><figure class="figure text-xs" data-dcnode-id="7576" id="fig0020"><span data-dcnode-id="7603"><img alt="Fig. 4" aria-describedby="cap0020" data-dcnode-id="7618" height="558" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S030094401730629X-gr4.jpg&amp;raw"><span data-dcnode-id="7617" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="7604"><li data-dcnode-id="7611"><a class="anchor download-link u-font-sans" data-dcnode-id="7612" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S030094401730629X-gr4_lrg.jpg" target="_blank" title="Download high-res image (1MB)"><span class="anchor-text" data-dcnode-id="7613"><span data-dcnode-id="7616" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7614"><span data-dcnode-id="7615" instrument_node="">Download high-res image (1MB)</span></span></span></a></li><li data-dcnode-id="7605"><a class="anchor download-link u-font-sans" data-dcnode-id="7606" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S030094401730629X-gr4.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="7607"><span data-dcnode-id="7610" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7608"><span data-dcnode-id="7609" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="7577"><span data-dcnode-id="7578" id="cap0020"><p data-dcnode-id="7579" id="spar0020"><span class="label" data-dcnode-id="7601"><span data-dcnode-id="7602" instrument_node="">Fig. 4</span></span><span data-dcnode-id="7600" instrument_node="">. </span><span data-dcnode-id="7599" instrument_node="">A and B: Graffiti cleaning procedures performed for laboratory evaluations. A: Chemical cleaning with Graffiti GR3 3M</span><sup data-dcnode-id="7597"><span data-dcnode-id="7598" instrument_node="">®</span></sup><span data-dcnode-id="7596" instrument_node=""> of silver graffiti paint (Montana Colours</span><sup data-dcnode-id="7594"><span data-dcnode-id="7595" instrument_node="">®</span></sup><span data-dcnode-id="7589"><span data-dcnode-id="7593" instrument_node="">) on Rosa Porriño </span><a class="topic-link" data-dcnode-id="7591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/granite" title="Learn more about granite from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7592" instrument_node="">granite</span></a><span data-dcnode-id="7590" instrument_node=""> (NW Spain); B: Mechanical cleaning with IBIX</span></span><sup data-dcnode-id="7587"><span data-dcnode-id="7588" instrument_node="">®</span></sup><span data-dcnode-id="7586" instrument_node=""> of silver graffiti paint (Montana Colours</span><sup data-dcnode-id="7584"><span data-dcnode-id="7585" instrument_node="">®</span></sup><span data-dcnode-id="7583" instrument_node="">) on Vilachan granite (NW Spain). C and D: Graffiti cleaning procedures performed in monuments: C: Chemical cleaning in Acção Virtuoza statue of Palácio da Ajuda (Lisbon); D: Mechanical cleaning with Sponge-Jet</span><sup data-dcnode-id="7581"><span data-dcnode-id="7582" instrument_node="">®</span></sup><span data-dcnode-id="7580" instrument_node=""> in Adamastor statue in miradouro de Santa Catarina (Lisbon). Sources: A: the authors; B: Alberto Pereira; C: Maria Inês Gomes and D: Miguel Carvalhão.</span></p></span></span></figure></div><p data-dcnode-id="7573" id="par0710"><span data-dcnode-id="7574" instrument_node="">Biological methods correspond to 8% of the analysed papers, but it must the mentioned that none of these papers are specifically applied to stone substrata. In fact correspond to laboratorial studies involving the biodegradation of paints over glass surfaces.</span></p><div data-dcnode-id="6935"><p data-dcnode-id="7568" id="par0715"><span data-dcnode-id="7572" instrument_node="">A brief summary of the diverse cleaning methods is shown in </span><a class="workspace-trigger" data-dcnode-id="7570" href="#tbl0015" name="btbl0015"><span data-dcnode-id="7571" instrument_node="">Table 3</span></a><span data-dcnode-id="7569" instrument_node=""> and are discussed in the following sections.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="6936" id="tbl0015"><span class="captions" data-dcnode-id="7561"><span data-dcnode-id="7562" id="cap0045"><p data-dcnode-id="7563" id="spar0045"><span class="label" data-dcnode-id="7566"><span data-dcnode-id="7567" instrument_node="">Table 3</span></span><span data-dcnode-id="7565" instrument_node="">. </span><span data-dcnode-id="7564" instrument_node="">Graffiti cleaning procedures carried out by several authors. The lithotypes and their nature, the graffiti paints and their composition and the cleaning procedures used to extract the graffiti are reported. n.p.: not performed, n.a.; not applied.</span></p></span></span><div class="groups" data-dcnode-id="6937"><table data-dcnode-id="6938"><thead class="valign-top" data-dcnode-id="7547"><tr class="rowsep-1" data-dcnode-id="7548"><th class="align-left" data-dcnode-id="7559" scope="col"><span data-dcnode-id="7560" instrument_node="">Reference</span></th><th class="align-left" data-dcnod
