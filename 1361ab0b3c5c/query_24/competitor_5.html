-title"><span data-dcnode-id="439" instrument_node="">Deterioration of graffiti spray paints applied on granite after a decade of natural environment</span></h3></a><div class="article-source ellipsis" data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">2022, Science of the Total Environment</span></div></div><div class="buttons" data-dcnode-id="428"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="429" type="button"><span class="button-link-text" data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="430" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="431"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="421"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="422" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="423"><p data-dcnode-id="426" id="sp0075"><span data-dcnode-id="427" instrument_node="">Graffiti spray paints are commonly used in contemporaneous mural paintings in public spaces, contributing to the transformation of sites and urban life. These outdoor artworks are now beginning to show different deterioration forms, such as physical-mechanical alteration (loss of material and cohesion, etc.) and chromatic changes. However, the deterioration has not been formally characterized, and the influence of the paint composition and underlying substrate are not known. In this study, three non-metallic (red, blue and black) alkyd graffiti spray paints and one metallic (silver) polyethylene graffiti spray paint were applied to two granite stones with different mineralogy and texture and exposed to a natural urban-marine environment near Vigo (NW Spain) for one decade (2010−2020). Physical changes were evaluated by stereomicroscopy, colour spectrophotometry, measurements of gloss, surface roughness and static contact angle, and peeling test. Mineralogical changes were determined by x-ray diffraction and molecular changes by Fourier transform infrared spectroscopy. Moreover, micromorphological and chemical characterization of the surfaces was conducted by scanning electron microscopy.</span></p><p data-dcnode-id="424" id="sp0080"><span data-dcnode-id="425" instrument_node="">Physical-mechanical changes, such as craquelure and paint loss, depended on the texture of the granite. More specifically, paint on the granite with the finest grain size showed most intense cracking and loss of material. Chemical changes, which were not related to the granite substrate, were most intense in the red and silver paint coatings. In the red paint, loss of binder was accompanied by an intense fading of the colour (due to titanium dioxide relative enrichment), while in the silver paint coating, chemical changes occurred in both the organic binder and aluminium particles, thus darkening the colour. Fewer chemical changes were observed in the blue and black paints. Physical and chemical changes detected in these paints were not correlated.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="390"><div class="sub-heading" data-dcnode-id="414"><a data-dcnode-id="417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0964830522000014" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="418" id="citing-articles-article1-title"><span data-dcnode-id="419" instrument_node="">Dual combination of cleaning methods (scalpel, biocide, laser) to enhance lichen removal from granite</span></h3></a><div class="article-source ellipsis" data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">2022, International Biodeterioration and Biodegradation</span></div></div><div class="buttons" data-dcnode-id="408"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="409" type="button"><span class="button-link-text" data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="410" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="411"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="391"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="392" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="393"><p data-dcnode-id="394" id="abspara0010"><span data-dcnode-id="407" instrument_node="">Three cleaning methods, namely i) a commercial biocide applied by brush with the subsequent extraction of organic remains by a rod, ii) a scalpel or iii) a Nd:YVO</span><sub data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">4</span></sub><span data-dcnode-id="404" instrument_node=""> laser at 355&nbsp;nm, single application as well as paired combinations, were tested for removing from a granite two different crustose lichens: </span><em data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Diploschistes scruposus</span></em><span data-dcnode-id="401" instrument_node=""> (lighter with a clearly distinguished thallus) and </span><em data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Polysporina simplex</span></em><span data-dcnode-id="398" instrument_node=""> (darker with a poorly developed thallus). In addition to the removal rate, side effects such as melting of biotite and feldspar grains and chromatic changes were assessed. The multianalytical approach was based on stereomicroscopy, light microscopy, Fourier Transform Infrared spectroscopy, Scanning Electron Microscopy and color spectrophotometry. Combining cleaning methods enhanced the removal efficacy. Biocide followed by laser was the most effective method for removing both lichens colonizing this granite. Mineral melting was more intense for the samples covered by </span><em data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Polysporina simplex</span></em><span data-dcnode-id="395" instrument_node=""> due to its lower coverage degree and darker color.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="354"><div class="sub-heading" data-dcnode-id="384"><a data-dcnode-id="387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1296207421000674" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="388" id="citing-articles-article2-title"><span data-dcnode-id="389" instrument_node="">Traditional Venetian marmorino: Effect of zinc-based oxides on self-bleaching properties</span></h3></a><div class="article-source ellipsis" data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">2021, Journal of Cultural Heritage</span></div></div><div class="buttons" data-dcnode-id="378"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="379" type="button"><span class="button-link-text" data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="380" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="381"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="355"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="356" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="357"><p data-dcnode-id="358" id="spara012"><span data-dcnode-id="377" instrument_node="">The Venetian </span><em data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">marmorino</span></em><span data-dcnode-id="374" instrument_node=""> is a traditional material used for wall coating in Venice city, composed of hydrated lime and marble powders, and is part of the cultural heritage of the city. Several surface damage processes can negatively affect its aesthetic properties, such as the formation of stain deposits of different origin (i.e. pollution, bio-deterioration, vandalism) which eventually change the colour of this material. An appealing way to avoid these deposits rely on inducing self-bleaching features by introducing a photocatalyts on this material. In the present work, TiO</span><sub data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">2</span></sub><span data-dcnode-id="371" instrument_node="">-based and ZnO-based photocatalysts were introduced within the </span><em data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">marmorino</span></em><span data-dcnode-id="368" instrument_node="">, then evaluating how the addition of these materials influenced the compositional, structural and morphological properties though X-ray diffraction (XRD), N</span><sub data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">2</span></sub><span data-dcnode-id="365" instrument_node=""> physisorption and electron microscopy (SEM). ZnO-modified samples, which exhibited comparable morphological and structural properties, were further analyzed to get information concerning the surface compostion and the opto-electronic properties, through attenuated total reflectance (ATR) spectroscopy and photoluminescence (PL), respectively, in turn related to the presence of defects and heterojunctions. The self-bleaching activity was evaluated by irradiation in mild condition (room temperature) in air using a dye as model stain compound. Finally, the morphological, surface and opto-electronic properties of the photocatalyst-modified </span><em data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">marmorino</span></em><span data-dcnode-id="362" instrument_node=""> were correlated to the activity results, aiming to understand how they can influence the material performances, and thus how to design an active self-bleaching Venetian </span><em data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">marmorino</span></em><span data-dcnode-id="359" instrument_node="">.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="336"><div class="sub-heading" data-dcnode-id="348"><a data-dcnode-id="351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0950061820319395" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="352" id="citing-articles-article3-title"><span data-dcnode-id="353" instrument_node="">Enhancement of graffiti removal from heritage stone by combining laser ablation and application of a solvent mixture</span></h3></a><div class="article-source ellipsis" data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">2020, Construction and Building Materials</span></div></div><div class="buttons" data-dcnode-id="342"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="343" type="button"><span class="button-link-text" data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="344" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="345"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="337"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="338" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="339"><p data-dcnode-id="340" id="sp0010"><span data-dcnode-id="341" instrument_node="">In this study, it was evaluated the combined cleaning treatment based on laser ablation followed by the application of chemical products for removing alkyd graffiti paint from two different types of stone. Three different laser treatments (operated in Q-switched, long Q-switched and free short running modes) were applied to the stone samples. The best two treatments were then followed up by application of a chemical product (a low toxic ternary solvent mixture). The Q-switched and the long Q-switched laser treatments in combination with the chemical agent were more effective than either of the laser treatments alone, leaving fewer paint remains, but with minimal damage to the stone.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="274"><div class="sub-heading" data-dcnode-id="330"><a data-dcnode-id="333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0300944020302034" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="334" id="citing-articles-article4-title"><span data-dcnode-id="335" instrument_node="">Development of a multi-functional acrylic urethane coating with high hardness and low surface energy</span></h3></a><div class="article-source ellipsis" data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">2020, Progress in Organic Coatings</span></div></div><div class="buttons" data-dcnode-id="324"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="325" type="button"><span class="button-link-text" data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="326" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="327"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="275"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="276" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="277"><p data-dcnode-id="278" id="spar0105"><span data-dcnode-id="323" instrument_node="">This study developed multi-functional acrylic urethane coating materials with anti-graffiti, anti-contamination, and anti-adhesion properties. The newly-developed coating was synthesized by high glass transition temperature (</span><span class="math" data-dcnode-id="302"><span class="MathJax_Preview" data-dcnode-id="322" style=""></span><span class="MathJax_SVG" data-dcnode-id="305" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><msub is=&quot;true&quot;><mi is=&quot;true&quot;>T</mi><mi is=&quot;true&quot;>g</mi></msub></math>" id="MathJax-Element-1-Frame" role="presentation" style="font-size: 90%; display: inline-block; position: relative;" tabindex="0"><svg aria-hidden="true" data-dcnode-id="313" focusable="false" height="2.656ex" role="img" style="vertical-align: -0.887ex;" viewBox="0 -761.8 1024.3 1143.7" width="2.379ex" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="314" fill="currentColor" stroke="currentColor" stroke-width="0" transform="matrix(1 0 0 -1 0 0)"><g data-dcnode-id="315" is="true"><g data-dcnode-id="319" is="true"><use data-dcnode-id="320" href="#MJMATHI-54"><path d="M40 437Q21 437 21 445Q21 450 37 501T71 602L88 651Q93 669 101 677H569H659Q691 677 697 676T704 667Q704 661 687 553T668 444Q668 437 649 437Q640 437 637 437T631 442L629 445Q629 451 635 490T641 551Q641 586 628 604T573 629Q568 630 515 631Q469 631 457 630T439 622Q438 621 368 343T298 60Q298 48 386 46Q418 46 427 45T436 36Q436 31 433 22Q429 4 424 1L422 0Q419 0 415 0Q410 0 363 1T228 2Q99 2 64 0H49Q43 6 43 9T45 27Q49 40 55 46H83H94Q174 46 189 55Q190 56 191 56Q196 59 201 76T241 233Q258 301 269 344Q339 619 339 625Q339 630 310 630H279Q212 630 191 624Q146 614 121 583T67 467Q60 445 57 441T43 437H40Z" data-dcnode-id="321" id="MJMATHI-54" stroke-width="1"></path></use></g><g data-dcnode-id="316" is="true" transform="translate(584,-150)"><use data-dcnode-id="317" href="#MJMATHI-67" transform="scale(0.707)"><path d="M311 43Q296 30 267 15T206 0Q143 0 105 45T66 160Q66 265 143 353T314 442Q361 442 401 394L404 398Q406 401 409 404T418 412T431 419T447 422Q461 422 470 413T480 394Q480 379 423 152T363 -80Q345 -134 286 -169T151 -205Q10 -205 10 -137Q10 -111 28 -91T74 -71Q89 -71 102 -80T116 -111Q116 -121 114 -130T107 -144T99 -154T92 -162L90 -164H91Q101 -167 151 -167Q189 -167 211 -155Q234 -144 254 -122T282 -75Q288 -56 298 -13Q311 35 311 43ZM384 328L380 339Q377 350 375 354T369 368T359 382T346 393T328 402T306 405Q262 405 221 352Q191 313 171 233T151 117Q151 38 213 38Q269 38 323 108L331 118L384 328Z" data-dcnode-id="318" id="MJMATHI-67" stroke-width="1"></path></use></g></g></g></svg><span class="MJX_Assistive_MathML" data-dcnode-id="306" role="presentation"><math data-dcnode-id="307" xmlns="http://www.w3.org/1998/Math/MathML"><msub data-dcnode-id="308" is="true"><mi data-dcnode-id="311" is="true"><span data-dcnode-id="312" instrument_node="">T</span></mi><mi data-dcnode-id="309" is="true"><span data-dcnode-id="310" instrument_node="">g</span></mi></msub></math></span></span></span><span data-dcnode-id="301" instrument_node="">) acrylic polyol and low-viscosity single-end-type silicone oil. The coating materials were chemically bonded and reacted with isocyanate to form acrylic urethane. The hardness, surface energy, color difference value, and anti-adhesion properties were examined using nanoindentation, a contact angle analyzer, a color difference meter, and a universal tensile test machine, respectively. In addition, the degradation of the coating was evaluated using an accelerated weathering test, taking into account various degradation factors (UV, humidity, high temperature, and water). In general, the properties of the coating degraded due to the loss of silicone oil after the accelerated weathering test. However, the degradation was retarded when high </span><span class="math" data-dcnode-id="280"><span class="MathJax_Preview" data-dcnode-id="300" style=""></span><span class="MathJax_SVG" data-dcnode-id="283" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><msub is=&quot;true&quot;><mi is=&quot;true&quot;>T</mi><mi is=&quot;true&quot;>g</mi></msub></math>" id="MathJax-Element-2-Frame" role="presentation" style="font-size: 90%; display: inline-block; position: relative;" tabindex="0"><svg aria-hidden="true" data-dcnode-id="291" focusable="false" height="2.656ex" role="img" style="vertical-align: -0.887ex;" viewBox="0 -761.8 1024.3 1143.7" width="2.379ex" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="292" fill="currentColor" stroke="currentColor" stroke-width="0" transform="matrix(1 0 0 -1 0 0)"><g data-dcnode-id="293" is="true"><g data-dcnode-id="297" is="true"><use data-dcnode-id="298" href="#MJMATHI-54"><path d="M40 437Q21 437 21 445Q21 450 37 501T71 602L88 651Q93 669 101 677H569H659Q691 677 697 676T704 667Q704 661 687 553T668 444Q668 437 649 437Q640 437 637 437T631 442L629 445Q629 451 635 490T641 551Q641 586 628 604T573 629Q568 630 515 631Q469 631 457 630T439 622Q438 621 368 343T298 60Q298 48 386 46Q418 46 427 45T436 36Q436 31 433 22Q429 4 424 1L422 0Q419 0 415 0Q410 0 363 1T228 2Q99 2 64 0H49Q43 6 43 9T45 27Q49 40 55 46H83H94Q174 46 189 55Q190 56 191 56Q196 59 201 76T241 233Q258 301 269 344Q339 619 339 625Q339 630 310 630H279Q212 630 191 624Q146 614 121 583T67 467Q60 445 57 441T43 437H40Z" data-dcnode-id="299" id="MJMATHI-54" stroke-width="1"></path></use></g><g data-dcnode-id="294" is="true" transform="translate(584,-150)"><use data-dcnode-id="295" href="#MJMATHI-67" transform="scale(0.707)"><path d="M311 43Q296 30 267 15T206 0Q143 0 105 45T66 160Q66 265 143 353T314 442Q361 442 401 394L404 398Q406 401 409 404T418 412T431 419T447 422Q461 422 470 413T480 394Q480 379 423 152T363 -80Q345 -134 286 -169T151 -205Q10 -205 10 -137Q10 -111 28 -91T74 -71Q89 -71 102 -80T116 -111Q116 -121 114 -130T107 -144T99 -154T92 -162L90 -164H91Q101 -167 151 -167Q189 -167 211 -155Q234 -144 254 -122T282 -75Q288 -56 298 -13Q311 35 311 43ZM384 328L380 339Q377 350 375 354T369 368T359 382T346 393T328 402T306 405Q262 405 221 352Q191 313 171 233T151 117Q151 38 213 38Q269 38 323 108L331 118L384 328Z" data-dcnode-id="296" id="MJMATHI-67" stroke-width="1"></path></use></g></g></g></svg><span class="MJX_Assistive_MathML" data-dcnode-id="284" role="presentation"><math data-dcnode-id="285" xmlns="http://www.w3.org/1998/Math/MathML"><msub data-dcnode-id="286" is="true"><mi data-dcnode-id="289" is="true"><span data-dcnode-id="290" instrument_node="">T</span></mi><mi data-dcnode-id="287" is="true"><span data-dcnode-id="288" instrument_node="">g</span></mi></msub></math></span></span></span><span data-dcnode-id="279" instrument_node=""> acrylic polyol and low-viscosity single-end-type silicone oil were chemically bonded. The newly-developed multi-functional acrylic urethane coating exhibited long-term stability against an accelerated weathering test of 120 h. The developed coating will be useful in broad applications, including harsh environments such as underground walls, heritage, facilities, and subways.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="250"><div class="sub-heading" data-dcnode-id="262"><a data-dcnode-id="271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0950061819331897" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="272" id="citing-articles-article5-title"><span data-dcnode-id="273" instrument_node="">Weathering of graffiti spray paint on building stones exposed to different types of UV radiation</span></h3></a><div class="article-source ellipsis" data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">2020, Construction and Building Materials</span></div><div class="CitedSection" data-dcnode-id="263"><div class="snippet" data-dcnode-id="264"><div class="cite-header" data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">Citation Excerpt :</span></div><p data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">In view of the increase in the urban phenomenon of graffiti vandalism, which causes significant damage to public spaces and historical monuments and requires a huge financial outlay (e.g. more than €150,000 was spent on removing graffiti from buildings in Santiago de Compostela, Spain, in 2008 [1]), novel approaches to graffiti removal are being developed every year. Physical (including laser), chemical and mechanical methods of removal have some drawbacks, including negative environmental impacts [2,3]. Although research is at an early stage, bioremediation appears to be a promising approach to graffiti removal [4].</span></p></div></div></div><div class="buttons" data-dcnode-id="256"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="257" type="button"><span class="button-link-text" data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="258" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="259"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="251"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="252" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="253"><p data-dcnode-id="254" id="sp0015"><span data-dcnode-id="255" instrument_node="">The weathering capacity of UV-A, UV-B and UV-C radiation (i.e. long, medium and short wave) was tested on granite, rhyolite and biocalcarenite samples and glass slide supports coated with silver, black, blue and red graffiti paint. Physical and chemical changes occurred in the red, blue and silver paints, but not the black paint. Red and blue paints appeared be sensitive to UV-B and UV-C radiation, and they were not altered by artificial daylight or UV-A radiation. By contrast, all three types of UV radiation caused chemical changes in silver paint. Unexpectedly, physical changes in the paint and photodegradation were not correlated.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-85028880804%26md5%3Dfb96292214433105cc7f129695c7e51" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcn
