 et al., 2016)</span></td><td class="align-left" data-dcnode-id="6992"><span data-dcnode-id="6993" instrument_node="">Same as (Pozo-Antonio et al., 2016)</span></td><td class="align-left" data-dcnode-id="6990"><span data-dcnode-id="6991" instrument_node="">Same as (Fiorucci et al., 2011)</span></td><td class="align-left" data-dcnode-id="6988"><span data-dcnode-id="6989" instrument_node="">Same as (Fiorucci et al., 2011)</span></td><td class="align-left" data-dcnode-id="6986"><span data-dcnode-id="6987" instrument_node="">Same as (Pozo-Antonio et al., 2016)</span></td></tr><tr data-dcnode-id="6965"><td class="align-left" data-dcnode-id="6981"><span data-dcnode-id="6984" instrument_node="">Careddu and Akkoyun </span><a class="workspace-trigger" data-dcnode-id="6982" href="#bib0285" name="bbib0285"><span data-dcnode-id="6983" instrument_node="">[57]</span></a></td><td class="align-left" data-dcnode-id="6979"><span data-dcnode-id="6980" instrument_node="">Carrara (marble)</span></td><td class="align-left" data-dcnode-id="6977"><span data-dcnode-id="6978" instrument_node="">Calcareous</span></td><td class="align-left" data-dcnode-id="6975"><span data-dcnode-id="6976" instrument_node="">n.a.</span></td><td class="align-left" data-dcnode-id="6973"><span data-dcnode-id="6974" instrument_node="">n.p.</span></td><td class="align-left" data-dcnode-id="6966"><dl class="list" data-dcnode-id="6967"><dt class="list-label" data-dcnode-id="6971"><span data-dcnode-id="6972" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="6968"><p data-dcnode-id="6969" id="par0515"><span data-dcnode-id="6970" instrument_node="">Water-jet (mechanical method)</span></p></dd></dl></td></tr><tr data-dcnode-id="6940"><td class="align-left" data-dcnode-id="6961"><span data-dcnode-id="6964" instrument_node="">Ramil et al. </span><a class="workspace-trigger" data-dcnode-id="6962" href="#bib0325" name="bbib0325"><span data-dcnode-id="6963" instrument_node="">[65]</span></a></td><td class="align-left" data-dcnode-id="6959"><span data-dcnode-id="6960" instrument_node="">Rosa Porriño (granite)</span></td><td class="align-left" data-dcnode-id="6957"><span data-dcnode-id="6958" instrument_node="">Siliceous</span></td><td class="align-left" data-dcnode-id="6955"><span data-dcnode-id="6956" instrument_node="">Same as (Fiorucci et al., 2011)</span></td><td class="align-left" data-dcnode-id="6953"><span data-dcnode-id="6954" instrument_node="">Same as (Fiorucci et al., 2011)</span></td><td class="align-left" data-dcnode-id="6941"><dl class="list" data-dcnode-id="6942"><dt class="list-label" data-dcnode-id="6951"><span data-dcnode-id="6952" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="6943"><p data-dcnode-id="6944" id="par0520"><span data-dcnode-id="6950" instrument_node="">Laser: Nd:YVO</span><sub data-dcnode-id="6948"><span data-dcnode-id="6949" instrument_node="">4</span></sub><span data-dcnode-id="6947" instrument_node=""> at 355</span><span data-dcnode-id="6946" instrument_node="">&nbsp;</span><span data-dcnode-id="6945" instrument_node="">nm.</span></p></dd></dl></td></tr></tbody></table></div></div></div><section data-dcnode-id="6811" id="sec0025"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6931" id="sect0040"><span data-dcnode-id="6934" instrument_node="">4.1</span><span data-dcnode-id="6933" instrument_node="">. </span><span data-dcnode-id="6932" instrument_node="">Chemical cleaning methods</span></h3><p data-dcnode-id="6902" id="par0720"><span data-dcnode-id="6930" instrument_node="">Chemical cleaning is due to the reaction between the chemical product applied and the paint, achieving its dissolution and extraction </span><a class="workspace-trigger" data-dcnode-id="6928" href="#bib0265" name="bbib0265"><span data-dcnode-id="6929" instrument_node="">[53]</span></a><span data-dcnode-id="6927" instrument_node="">. Chemical agents are available in a variety of compositions and consistencies (e.g. gels and poultices) to be adapted to different substrates </span><a class="workspace-trigger" data-dcnode-id="6925" href="#bib0005" name="bbib0005"><span data-dcnode-id="6926" instrument_node="">[1]</span></a><span data-dcnode-id="6924" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6922" href="#bib0270" name="bbib0270"><span data-dcnode-id="6923" instrument_node="">[54]</span></a><span data-dcnode-id="6921" instrument_node="">. Already in 1999, Urquhart reported the ghosting due to graffiti penetration, mainly in porous stones </span><a class="workspace-trigger" data-dcnode-id="6919" href="#bib0030" name="bbib0030"><span data-dcnode-id="6920" instrument_node="">[6]</span></a><span data-dcnode-id="6918" instrument_node="">. Later, this was corroborated by other authors that tried to remove spray paints (markers, black Krink</span><sup data-dcnode-id="6916"><span data-dcnode-id="6917" instrument_node="">®</span></sup><span data-dcnode-id="6915" instrument_node=""> and Nero d’inferno inks) from dolomitic white marble with Elephant Snot</span><sup data-dcnode-id="6913"><span data-dcnode-id="6914" instrument_node="">®</span></sup><span data-dcnode-id="6912" instrument_node=""> followed by Graffipaste</span><sup data-dcnode-id="6910"><span data-dcnode-id="6911" instrument_node="">®</span></sup><span data-dcnode-id="6909" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="6907" href="#bib0100" name="bbib0100"><span data-dcnode-id="6908" instrument_node="">[20]</span></a><span data-dcnode-id="6906" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6904" href="#bib0105" name="bbib0105"><span data-dcnode-id="6905" instrument_node="">[21]</span></a><span data-dcnode-id="6903" instrument_node="">.</span></p><p data-dcnode-id="6812" id="par0725"><span data-dcnode-id="6885"><span data-dcnode-id="6901" instrument_node="">The traditional solvents recommended for limestone, marble, </span><a class="topic-link" data-dcnode-id="6899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/sandstone" title="Learn more about sandstone from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6900" instrument_node="">sandstone</span></a><span data-dcnode-id="6886"><span data-dcnode-id="6898" instrument_node="">, slate and </span><a class="topic-link" data-dcnode-id="6896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/granite" title="Learn more about granite from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6897" instrument_node="">granite</span></a><span data-dcnode-id="6887"><span data-dcnode-id="6891"><span data-dcnode-id="6895" instrument_node=""> are usually based on </span><a class="topic-link" data-dcnode-id="6893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/organic-solvents" title="Learn more about organic solvents from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6894" instrument_node="">organic solvents</span></a><span data-dcnode-id="6892" instrument_node=""> like methylene and </span></span><a class="topic-link" data-dcnode-id="6889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemical-engineering/acetone" title="Learn more about acetone from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6890" instrument_node="">acetone</span></a><span data-dcnode-id="6888" instrument_node=""> or alkali caustic removers </span></span></span></span><a class="workspace-trigger" data-dcnode-id="6883" href="#bib0275" name="bbib0275"><span data-dcnode-id="6884" instrument_node="">[55]</span></a><span data-dcnode-id="6882" instrument_node="">. The solvent-based removers work by weakening the adhesion between the paint and the stone, while caustic removers broke down alkyd based paints by saponification </span><a class="workspace-trigger" data-dcnode-id="6880" href="#bib0005" name="bbib0005"><span data-dcnode-id="6881" instrument_node="">[1]</span></a><span data-dcnode-id="6879" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6877" href="#bib0030" name="bbib0030"><span data-dcnode-id="6878" instrument_node="">[6]</span></a><span data-dcnode-id="6876" instrument_node="">, i.e., interaction of fats and oils from the triglycerides with a strong nucleophilic base – that attacks polar bonds, accelerating the cleavage of the ester bonds and releasing fatty acids salts and glycerol. In Avebury Neolithic sandstones and Stonehenge Heel, methylene dichloride and acetone, prior to laser, was successfully tested to remove the remaining paint </span><a class="workspace-trigger" data-dcnode-id="6874" href="#bib0280" name="bbib0280"><span data-dcnode-id="6875" instrument_node="">[56]</span></a><span data-dcnode-id="6869"><span data-dcnode-id="6873" instrument_node="">. More recently Samolik et al. used a mixture of ethanol, acetone and </span><a class="topic-link" data-dcnode-id="6871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemical-engineering/xylene" title="Learn more about xylene from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6872" instrument_node="">xylene</span></a><span data-dcnode-id="6870" instrument_node=""> to successfully remove nitrocellulosic acrylic and alkyd based paint (Montana Gold from Motip-Dupli</span></span><sup data-dcnode-id="6867"><span data-dcnode-id="6868" instrument_node="">®</span></sup><span data-dcnode-id="6866" instrument_node="">) on limestone, sandstone, plaster and brick. However, it did not succeed in removing the alkyd black paint Montana Black from Motip-Dupli</span><sup data-dcnode-id="6864"><span data-dcnode-id="6865" instrument_node="">®</span></sup><span data-dcnode-id="6863" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="6861" href="#bib0110" name="bbib0110"><span data-dcnode-id="6862" instrument_node="">[22]</span></a><span data-dcnode-id="6852"><span data-dcnode-id="6860" instrument_node="">. Carvalhão &amp; Dionísio used a solution based on </span><a class="topic-link" data-dcnode-id="6858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemical-engineering/potassium-hydroxide" title="Learn more about potassium hydroxide from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6859" instrument_node="">potassium hydroxide</span></a><span data-dcnode-id="6853"><span data-dcnode-id="6857" instrument_node=""> and </span><a class="topic-link" data-dcnode-id="6855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/surface-active-agent" title="Learn more about surfactants from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6856" instrument_node="">surfactants</span></a><span data-dcnode-id="6854" instrument_node=""> (AGS 60™) to remove MOTIP HOME &amp; HOBBYLACQUER</span></span></span><sup data-dcnode-id="6850"><span data-dcnode-id="6851" instrument_node="">®</span></sup><span data-dcnode-id="6849" instrument_node=""> paints and achieved a homogeneous cleaning of the Portuguese Branco marble, while for Lioz limestone an extra-accumulation on stilolytes was registered </span><a class="workspace-trigger" data-dcnode-id="6847" href="#bib0115" name="bbib0115"><span data-dcnode-id="6848" instrument_node="">[23]</span></a><span data-dcnode-id="6846" instrument_node="">. The surface lightness also increased and dissolution of grain boundaries and loss of crystals was detected. Pozo-Antonio et al. tested both organic solvents and caustic removers Wendrox</span><sup data-dcnode-id="6844"><span data-dcnode-id="6845" instrument_node="">®</span></sup><span data-dcnode-id="6843" instrument_node=""> and Eligraf</span><sup data-dcnode-id="6841"><span data-dcnode-id="6842" instrument_node="">®</span></sup><span data-dcnode-id="6836"><span data-dcnode-id="6840" instrument_node=""> based in dichloro-methane, organic acids, solvents and </span><a class="topic-link" data-dcnode-id="6838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/anionic-surfactant" title="Learn more about anionic surfactants from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6839" instrument_node="">anionic surfactants</span></a><span data-dcnode-id="6837" instrument_node=""> and QuitaGraffi 200</span></span><sup data-dcnode-id="6834"><span data-dcnode-id="6835" instrument_node="">®</span></sup><span data-dcnode-id="6833" instrument_node="">–QuitaSombras 60</span><sup data-dcnode-id="6831"><span data-dcnode-id="6832" instrument_node="">®</span></sup><span data-dcnode-id="6830" instrument_node=""> (QG</span><span data-dcnode-id="6829" instrument_node="">&nbsp;</span><span data-dcnode-id="6828" instrument_node="">+</span><span data-dcnode-id="6827" instrument_node="">&nbsp;</span><span data-dcnode-id="6826" instrument_node="">QS) rich in potassium hydroxide. These were tested on less studied substrates, two granites: Silvestre and Rosa Porriño, with satisfactory results for various alkyd Montana Colors</span><sup data-dcnode-id="6824"><span data-dcnode-id="6825" instrument_node="">®</span></sup><span data-dcnode-id="6823" instrument_node="">. The silver graffiti required a subsequently application of TS-99 paint stripper </span><a class="workspace-trigger" data-dcnode-id="6821" href="#bib0075" name="bbib0075"><span data-dcnode-id="6822" instrument_node="">[15]</span></a><span data-dcnode-id="6820" instrument_node="">. However, chemical contamination was detected for cleanings performed with Wendrox</span><sup data-dcnode-id="6818"><span data-dcnode-id="6819" instrument_node="">®</span></sup><span data-dcnode-id="6817" instrument_node=""> and QG</span><span data-dcnode-id="6816" instrument_node="">&nbsp;</span><span data-dcnode-id="6815" instrument_node="">+</span><span data-dcnode-id="6814" instrument_node="">&nbsp;</span><span data-dcnode-id="6813" instrument_node="">QS.</span></p></section><section data-dcnode-id="6718" id="sec0030"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6807" id="sect0045"><span data-dcnode-id="6810" instrument_node="">4.2</span><span data-dcnode-id="6809" instrument_node="">. </span><span data-dcnode-id="6808" instrument_node="">Mechanical cleaning methods</span></h3><p data-dcnode-id="6775" id="par0730"><span data-dcnode-id="6806" instrument_node="">The mechanical cleaning acts through an abrasive process of the surface. This kind of technique based on pressurized projection of water and abrasives is frequently associated with an inhomogeneous cleaning, several substrate damages and an increase of the susceptibility to retain soiling by the substrate </span><a class="workspace-trigger" data-dcnode-id="6804" href="#bib0005" name="bbib0005"><span data-dcnode-id="6805" instrument_node="">[1]</span></a><span data-dcnode-id="6803" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6801" href="#bib0270" name="bbib0270"><span data-dcnode-id="6802" instrument_node="">[54]</span></a><span data-dcnode-id="6800" instrument_node="">. The pressure applied may have an abrasive effect and cause damage to the valuable surfaces </span><a class="workspace-trigger" data-dcnode-id="6798" href="#bib0005" name="bbib0005"><span data-dcnode-id="6799" instrument_node="">[1]</span></a><span data-dcnode-id="6797" instrument_node="">, as verified by different authors in dolomitic marble </span><a class="workspace-trigger" data-dcnode-id="6795" href="#bib0100" name="bbib0100"><span data-dcnode-id="6796" instrument_node="">[20]</span></a><span data-dcnode-id="6794" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6792" href="#bib0105" name="bbib0105"><span data-dcnode-id="6793" instrument_node="">[21]</span></a><span data-dcnode-id="6791" instrument_node="">. Later, Samolik et al. also found this abrasive effect on several construction materials (limestone, sandstone, plaster and brick) using high-pressure water jet and blast cleaning with sand and glass particles </span><a class="workspace-trigger" data-dcnode-id="6789" href="#bib0110" name="bbib0110"><span data-dcnode-id="6790" instrument_node="">[22]</span></a><span data-dcnode-id="6788" instrument_node="">. Recently, Careddu &amp; Akkoyun studied the efficiency of the application of water-jet with different operational conditions on painted Carrara marble surfaces, finding by means of image analysis and roughness tests, that the best cleaning operating conditions for this stone were an inter-distance between passes of 0.5</span><span data-dcnode-id="6787" instrument_node="">&nbsp;</span><span data-dcnode-id="6786" instrument_node="">mm, a 200 MPa-water pressure, and a 12.0</span><span data-dcnode-id="6785" instrument_node="">&nbsp;</span><span data-dcnode-id="6784" instrument_node="">m</span><span data-dcnode-id="6783" instrument_node="">&nbsp;</span><span data-dcnode-id="6782" instrument_node="">min</span><sup data-dcnode-id="6780"><span data-dcnode-id="6781" instrument_node="">−1</span></sup><span data-dcnode-id="6779" instrument_node="">-travel speed </span><a class="workspace-trigger" data-dcnode-id="6777" href="#bib0285" name="bbib0285"><span data-dcnode-id="6778" instrument_node="">[57]</span></a><span data-dcnode-id="6776" instrument_node="">.</span></p><p data-dcnode-id="6719" id="par0735"><span data-dcnode-id="6774" instrument_node="">In order to counteract the detected damages due to abrasive techniques, micro-blasting has been proved to minimize them </span><a class="workspace-trigger" data-dcnode-id="6772" href="#bib0005" name="bbib0005"><span data-dcnode-id="6773" instrument_node="">[1]</span></a><span data-dcnode-id="6771" instrument_node="">. In the last years, low pressure projection methods have been developed with the objective to avoid the substrate damage. Low pressure steam was used to remove a water soluble white paint from Avebury Neolithic Sandstone </span><a class="workspace-trigger" data-dcnode-id="6769" href="#bib0280" name="bbib0280"><span data-dcnode-id="6770" instrument_node="">[56]</span></a><span data-dcnode-id="6768" instrument_node="">. Carvalhão &amp; Dionísio tested Sponge-Jet</span><sup data-dcnode-id="6766"><span data-dcnode-id="6767" instrument_node="">®</span></sup><span data-dcnode-id="6757"><span data-dcnode-id="6765" instrument_node=""> (a dry soft-abrasive blasting media with a sponge-like </span><a class="topic-link" data-dcnode-id="6763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/urethane" title="Learn more about urethane from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6764" instrument_node="">urethane</span></a><span data-dcnode-id="6758"><span data-dcnode-id="6762" instrument_node=""> polymer involving spherical </span><a class="topic-link" data-dcnode-id="6760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemical-engineering/calcium-carbonate" title="Learn more about calcium carbonate from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6761" instrument_node="">calcium carbonate</span></a><span data-dcnode-id="6759" instrument_node=""> particles) and Exastrip</span></span></span><sup data-dcnode-id="6755"><span data-dcnode-id="6756" instrument_node="">®</span></sup><span data-dcnode-id="6754" instrument_node=""> (pure spherical calcium carbonate particles) to clean Branco marble and Lioz limestone </span><a class="workspace-trigger" data-dcnode-id="6752" href="#bib0115" name="bbib0115"><span data-dcnode-id="6753" instrument_node="">[23]</span></a><span data-dcnode-id="6747"><span data-dcnode-id="6751" instrument_node="">. Despite their successful level of cleaning, punctual paint traces were found in Lioz stilolytes. The topography changes were reduced comparatively to those registered in the surface cleaned with an alkaline cleaner. However </span><a class="topic-link" data-dcnode-id="6749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/hydrophobicity" title="Learn more about hydrophobicity from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6750" instrument_node="">hydrophobicity</span></a><span data-dcnode-id="6748" instrument_node=""> increased, probably due to unremoved polymers in the pores and also a significant global colour changes were detected. Pozo-Antonio et al. tested Hydrogommage</span></span><sup data-dcnode-id="6745"><span data-dcnode-id="6746" instrument_node="">®</span></sup><span data-dcnode-id="6744" instrument_node=""> which is based on a circular projection of a mixture of air–water–micro grained abrasive (99% SiO</span><sub data-dcnode-id="6742"><span data-dcnode-id="6743" instrument_node="">2</span></sub><span data-dcnode-id="6741" instrument_node=""> content, 0.5–0.1</span><span data-dcnode-id="6740" instrument_node="">&nbsp;</span><span data-dcnode-id="6739" instrument_node="">mm grain size) at low-pressure (0.5–1.5</span><span data-dcnode-id="6738" instrument_node="">&nbsp;</span><span data-dcnode-id="6737" instrument_node="">bar) to clean alkyd spray graffiti paints (black, blue, red and silver of Montana Colours</span><sup data-dcnode-id="6735"><span data-dcnode-id="6736" instrument_node="">®</span></sup><span data-dcnode-id="6734" instrument_node=""> S.L.) on Rosa Porriño and Silvestre granites with satisfactory results. However, an increase around 10</span><span data-dcnode-id="6733" instrument_node="">&nbsp;</span><span data-dcnode-id="6732" instrument_node="">μm on the average roughness (Ra) for both substrates was reported </span><a class="workspace-trigger" data-dcnode-id="6730" href="#bib0075" name="bbib0075"><span data-dcnode-id="6731" instrument_node="">[15]</span></a><span data-dcnode-id="6729" instrument_node="">. In a later work </span><a class="workspace-trigger" data-dcnode-id="6727" href="#bib0290" name="bbib0290"><span data-dcnode-id="6728" instrument_node="">[58]</span></a><span data-dcnode-id="6726" instrument_node="">, the same authors used hyperspectral imaging technique to characterize the cleaning performances, being Hydrogommage</span><sup data-dcnode-id="6724"><span data-dcnode-id="6725" instrument_node="">®</span></sup><span data-dcnode-id="6723" instrument_node=""> and Nd:YVO</span><sub data-dcnode-id="6721"><span data-dcnode-id="6722" instrument_node="">4</span></sub><span data-dcnode-id="6720" instrument_node=""> laser the more suitable techniques. This conclusions are in accordance with optical microscopy and SEM observations.</span></p></section><section data-dcnode-id="6418" id="sec0035"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6714" id="sect0050"><span data-dcnode-id="6717" instrument_node="">4.3</span><span data-dcnode-id="6716" instrument_node="">. </span><span data-dcnode-id="6715" instrument_node="">Laser cleaning</span></h3><div data-dcnode-id="6552"><p data-dcnode-id="6626" id="par0740"><span data-dcnode-id="6713" instrument_node="">The mechanism responsible for laser cleaning is the ablation; the undesired layers are removed by the beam irradiation when the fluence (energy deposited per unit area) exceeds a critical threshold which is an intrinsic property of the material to be extracted </span><a class="workspace-trigger" data-dcnode-id="6711" href="#bib0295" name="bbib0295"><span data-dcnode-id="6712" instrument_node="">[59]</span></a><span data-dcnode-id="6710" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6708" href="#bib0300" name="bbib0300"><span data-dcnode-id="6709" instrument_node="">[60]</span></a><span data-dcnode-id="6707" instrument_node="">. The most used lasers in stone cleaning are the different harmonics-wavelengths of neodymium-based systems (</span><a class="workspace-trigger" data-dcnode-id="6705" href="#fig0025" name="bfig0025"><span data-dcnode-id="6706" instrument_node="">Fig. 5</span></a><span data-dcnode-id="6704" instrument_node="">), i.e. Nd:YAG or Nd:YVO</span><sub data-dcnode-id="6702"><span data-dcnode-id="6703" instrument_node="">4</span></sub><span data-dcnode-id="6701" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="6699" href="#bib0020" name="bbib0020"><span data-dcnode-id="6700" instrument_node="">[4]</span></a><span data-dcnode-id="6698" instrument_node="">. Several advantages can be pointed out regarding laser cleaning namely the non-mechanical contact, its selective action since it provides a located and accurate cleaning and the adjustment of the cleaning conditions in real time </span><a class="workspace-trigger" data-dcnode-id="6696" href="#bib0020" name="bbib0020"><span data-dcnode-id="6697" instrument_node="">[4]</span></a><span data-dcnode-id="6695" instrument_node="">. The specific application of laser to extract graffiti on Cultural Heritage stones is rather reduced comparatively to other alteration forms, such as biological colonization, black crust, encrustations, etc. </span><a class="workspace-trigger" data-dcnode-id="6693" href="#bib0020" name="bbib0020"><span data-dcnode-id="6694" instrument_node="">[4]</span></a><span data-dcnode-id="6692" instrument_node="">. In 2003, Costela et al., were the pioneers to apply this technology to remove paints on marble obtaining satisfactory results without damage by using the wavelength of 355</span><span data-dcnode-id="6691" instrument_node="">&nbsp;</span><span data-dcnode-id="6690" instrument_node="">nm whereas 532</span><span data-dcnode-id="6689" instrument_node="">&nbsp;</span><span data-dcnode-id="6688" instrument_node="">nm radiation left remnants of polymeric base </span><a class="workspace-trigger" data-dcnode-id="6686" href="#bib0085" name="bbib0085"><span data-dcnode-id="6687" instrument_node="">[17]</span></a><span data-dcnode-id="6685" instrument_node="">. Later Gómez et al. used the same paints and stone to compare Nd:YAG at 1064</span><span data-dcnode-id="6684" instrument_node="">&nbsp;</span><span data-dcnode-id="6683" instrument_node="">nm with XeCl excimer at 308</span><span data-dcnode-id="6682" instrument_node="">&nbsp;</span><span data-dcnode-id="6681" instrument_node="">nm. While Nd:YAG left remains and darkened the surface, XeCl satisfactorly cleaned without damage </span><a class="workspace-trigger" data-dcnode-id="6679" href="#bib0090" name="bbib0090"><span data-dcnode-id="6680" instrument_node="">[18]</span></a><span data-dcnode-id="6678" instrument_node="">. Daurelio tested three laser protocols for graffiti removal on Bisceglie dolmen with a Nd:YAG working at 1064</span><span data-dcnode-id="6677" instrument_node="">&nbsp;</span><span data-dcnode-id="6676" instrument_node="">nm and 532</span><span data-dcnode-id="6675" instrument_node="">&nbsp;</span><span data-dcnode-id="6674" instrument_node="">nm </span><a class="workspace-trigger" data-dcnode-id="6672" href="#bib0305" name="bbib0305"><span data-dcnode-id="6673" instrument_node="">[61]</span></a><span data-dcnode-id="6667"><span data-dcnode-id="6671" instrument_node="">. The first protocol involving a laser beam in air or via a guiding </span><a class="topic-link" data-dcnode-id="6669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/glass-fiber-reinforced-plastic" title="Learn more about fibre glass from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6670" instrument_node="">fibre glass</span></a><span data-dcnode-id="6668" instrument_node="">, removed satisfactorily black paint. In the second methodology, a rectangular-shaped laser beam removed ink, graphite and spray paints. Then, in the third procedure, a rectangular-shaped laser beam with a mixture of water and red-brown earth removed indelible and fluorescent paint markers. Later, Andriani et al. tested three different modes of a Nd:YAG laser (normal mode, short free running and Q-switched) using the different Daureliós techniques. The inks of markers and pens (no spray graffiti paintings) were successfully removed from Travertino, Sabbie, Tufo Carparo and Chianca Pugliese with the Q-switch mode with the third protocol and with the second one with water </span></span><a class="workspace-trigger" data-dcnode-id="6665" href="#bib0310" name="bbib0310"><span data-dcnode-id="6666" instrument_node="">[62]</span></a><span data-dcnode-id="6660"><span data-dcnode-id="6664" instrument_node="">. The previously tested spray paints and markers were characterized by pyrolysis-gas chromatography/mass spectroscopy and </span><a class="topic-link" data-dcnode-id="6662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/fourier-transform-infrared-spectroscopy" title="Learn more about Fourier transform infrared spectroscopy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6663" instrument_node="">Fourier transform infrared spectroscopy</span></a><span data-dcnode-id="6661" instrument_node=""> and alkyd, styrene-acrylic resins were found in some of them. The laser cleaning parameters for Q-switched Nd:YAG laser were optimized </span></span><a class="workspace-trigger" data-dcnode-id="6658" href="#bib0315" name="bbib0315"><span data-dcnode-id="6659" instrument_node="">[63]</span></a><span data-dcnode-id="6657" instrument_node="">. As reported before, Ortiz et al. cleaned different paints on dolomitic white marble; despite a complete extraction with Nd:YAG laser working at 266</span><span data-dcnode-id="6656" instrument_node="">&nbsp;</span><span data-dcnode-id="6655" instrument_node="">nm was detected, damage was induced. At 1064</span><span data-dcnode-id="6654" instrument_node="">&nbsp;</span><span data-dcnode-id="6653" instrument_node="">nm it was only achieved the removal of black spray but with yellowing effect </span><a class="workspace-trigger" data-dcnode-id="6651" href="#bib0105" name="bbib0105"><span data-dcnode-id="6652" instrument_node="">[21]</span></a><span data-dcnode-id="6650" instrument_node="">. Authors working on laser cleaning of black encrustations on marble also reported this dramatic colour-change working with Nd:YAG at 1064</span><span data-dcnode-id="6649" instrument_node="">&nbsp;</span><span data-dcnode-id="6648" instrument_node="">nm, which were attenuated by moisturizing the stone surface </span><a class="workspace-trigger" data-dcnode-id="6646" href="#bib0300" name="bbib0300"><span data-dcnode-id="6647" instrument_node="">[60]</span></a><span data-dcnode-id="6645" instrument_node="">. Samolik et al. also reported yellowing with 1064</span><span data-dcnode-id="6644" instrument_node="">&nbsp;</span><span data-dcnode-id="6643" instrument_node="">nm, darkening with 355</span><span data-dcnode-id="6642" instrument_node="">&nbsp;</span><span data-dcnode-id="6641" instrument_node="">nm and satisfactory results with 532</span><span data-dcnode-id="6640" instrument_node="">&nbsp;</span><span data-dcnode-id="6639" instrument_node="">nm </span><a class="workspace-trigger" data-dcnode-id="6637" href="#bib0110" name="bbib0110"><span data-dcnode-id="6638" instrument_node="">[22]</span></a><span data-dcnode-id="6636" instrument_node="">. While with MotipDupli</span><sup data-dcnode-id="6634"><span data-dcnode-id="6635" instrument_node="">®</span></sup><span data-dcnode-id="6633" instrument_node=""> Montana Black paints were not possible to be successfully removed, acceptable results were obtained for MotipDupli</span><sup data-dcnode-id="6631"><span data-dcnode-id="6632" instrument_node="">®</span></sup><span data-dcnode-id="6630" instrument_node=""> Montana Gold </span><a class="workspace-trigger" data-dcnode-id="6628" href="#bib0110" name="bbib0110"><span data-dcnode-id="6629" instrument_node="">[22]</span></a><span data-dcnode-id="6627" instrument_node="">.</span></p><figure class="figure text-xs" data-dcnode-id="6553" id="fig0025"><span data-dcnode-id="6610"><img alt="Fig. 5" aria-describedby="cap0025" data-dcnode-id="6625" height="405" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S030094401730629X-gr5.jpg&amp;raw"><span data-dcnode-id="6624" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="6611"><li data-dcnode-id="6618"><a class="anchor download-link u-font-sans" data-dcnode-id="6619" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S030094401730629X-gr5_lrg.jpg" target="_blank" title="Download high-res image (1MB)"><span class="anchor-text" data-dcnode-id="6620"><span data-dcnode-id="6623" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6621"><span data-dcnode-id="6622" instrument_node="">Download high-res image (1MB)</span></span></span></a></li><li data-dcnode-id="6612"><a class="anchor download-link u-font-sans" data-dcnode-id="6613" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S030094401730629X-gr5.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="6614"><span data-dcnode-id="6617" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6615"><span data-dcnode-id="6616" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="6554"><span data-dcnode-id="6555" id="cap0025"><p data-dcnode-id="6556" id="spar0025"><span class="label" data-dcnode-id="6608"><span data-dcnode-id="6609" instrument_node="">Fig. 5</span></span><span data-dcnode-id="6607" instrument_node="">. </span><span data-dcnode-id="6606" instrument_node="">A and B: Laser equipment: A: a ns Nd:YVO</span><sub data-dcnode-id="6604"><span data-dcnode-id="6605" instrument_node="">4</span></sub><span data-dcnode-id="6603" instrument_node=""> laser working at 355</span><span data-dcnode-id="6602" instrument_node="">&nbsp;</span><span data-dcnode-id="6601" instrument_node="">nm in Laboratorio de Aplicacións Industriais do Laser (LAIL) at Escola Politécnica Superior (Universidade da Coruña, Spain). B: a ns Nd:YAG laser working at 1064</span><span data-dcnode-id="6600" instrument_node="">&nbsp;</span><span data-dcnode-id="6599" instrument_node="">nm and 355</span><span data-dcnode-id="6598" instrument_node="">&nbsp;</span><span data-dcnode-id="6593"><span data-dcnode-id="6597" instrument_node="">nm (single or simultaneously) at Institute of Electronic Structure and Laser-FORTH (Crete, Greece). C–F: Different cleaning tests performed with the laser Nd:YAG previously showed in order to optimize the cleaning of blue graffiti on Vilachan </span><a class="topic-link" data-dcnode-id="6595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/granite" title="Learn more about granite from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6596" instrument_node="">granite</span></a><span data-dcnode-id="6594" instrument_node=""> (C: 1064</span></span><span data-dcnode-id="6592" instrument_node="">&nbsp;</span><span data-dcnode-id="6591" instrument_node="">nm, 0.9</span><span data-dcnode-id="6590" instrument_node="">&nbsp;</span><span data-dcnode-id="6589" instrument_node="">J</span><span data-dcnode-id="6588" instrument_node="">&nbsp;</span><span data-dcnode-id="6587" instrument_node="">cm</span><sup data-dcnode-id="6585"><span data-dcnode-id="6586" instrument_node="">−2</span></sup><span data-dcnode-id="6584" instrument_node="">; D: 355</span><span data-dcnode-id="6583" instrument_node="">&nbsp;</span><span data-dcnode-id="6582" instrument_node="">nm, F 0.4</span><span data-dcnode-id="6581" instrument_node="">&nbsp;</span><span data-dcnode-id="6580" instrument_node="">J</span><span data-dcnode-id="6579" instrument_node="">&nbsp;</span><span data-dcnode-id="6578" instrument_node="">cm</span><sup data-dcnode-id="6576"><span data-dcnode-id="6577" instrument_node="">−2</span></sup><span data-dcnode-id="6575" instrument_node="">) and also silver graffiti on Lioz limestone (E: 1064</span><span data-dcnode-id="6574" instrument_node="">&nbsp;</span><span data-dcnode-id="6573" instrument_node="">nm, F: 1.1</span><span data-dcnode-id="6572" instrument_node="">&nbsp;</span><span data-dcnode-id="6571" instrument_node="">J</span><span data-dcnode-id="6570" instrument_node="">&nbsp;</span><span data-dcnode-id="6569" instrument_node="">cm</span><sup data-dcnode-id="6567"><span data-dcnode-id="6568" instrument_node="">−2</span></sup><span data-dcnode-id="6566" instrument_node=""> and 6 pulses; F: 1064</span><span data-dcnode-id="6565" instrument_node="">&nbsp;</span><span data-dcnode-id="6564" instrument_node="">nm, F: 1.1</span><span data-dcnode-id="6563" instrument_node="">&nbsp;</span><span data-dcnode-id="6562" instrument_node="">J</span><span data-dcnode-id="6561" instrument_node="">&nbsp;</span><span data-dcnode-id="6560" instrument_node="">cm</span><sup data-dcnode-id="6558"><span data-dcnode-id="6559" instrument_node="">−2</span></sup><span data-dcnode-id="6557" instrument_node=""> and 20 pulses). Sources: the authors. (For interpretation of the references to colour in this figure legend, the reader is referred to the web version of this article.)</span></p></span></span></figure></div><p data-dcnode-id="6431" id="par0745"><span data-dcnode-id="6551" instrument_node="">Fiorucci et al. studied different fluencess (from 0.1</span><span data-dcnode-id="6550" instrument_node="">&nbsp;</span><span data-dcnode-id="6549" instrument_node="">J</span><span data-dcnode-id="6548" instrument_node="">&nbsp;</span><span data-dcnode-id="6547" instrument_node="">cm</span><sup data-dcnode-id="6545"><span data-dcnode-id="6546" instrument_node="">−2</span></sup><span data-dcnode-id="6544" instrument_node=""> to 1.2</span><span data-dcnode-id="6543" instrument_node="">&nbsp;</span><span data-dcnode-id="6542" instrument_node="">J</span><span data-dcnode-id="6541" instrument_node="">&nbsp;</span><span data-dcnode-id="6540" instrument_node="">cm</span><sup data-dcnode-id="6538"><span data-dcnode-id="6539" instrument_node="">−2</span></sup><span data-dcnode-id="6537" instrument_node="">) of Nd:YVO</span><sub data-dcnode-id="6535"><span data-dcnode-id="6536" instrument_node="">4</span></sub><span data-dcnode-id="6534" instrument_node=""> laser at 355</span><span data-dcnode-id="6533" instrument_node="">&nbsp;</span><span data-dcnode-id="6532" instrument_node="">nm applied on Rosa Porriño granite finding optimal results with 0.1</span><span data-dcnode-id="6531" instrument_node="">&nbsp;</span><span data-dcnode-id="6530" instrument_node="">J</span><span data-dcnode-id="6529" instrument_node="">&nbsp;</span><span data-dcnode-id="6528" instrument_node="">cm</span><sup data-dcnode-id="6526"><span data-dcnode-id="6527" instrument_node="">−2</span></sup><span data-dcnode-id="6521"><span data-dcnode-id="6525" instrument_node="">. Undesirable damages, such as melting of the biotite and loss of the pink coloration of the potassium </span><a class="topic-link" data-dcnode-id="6523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemical-engineering/feldspar" title="Learn more about feldspar from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6524" instrument_node="">feldspar</span></a><span data-dcnode-id="6522" instrument_node=""> grains occurred in cleanings at 0.3</span></span><span data-dcnode-id="6520" instrument_node="">&nbsp;</span><span data-dcnode-id="6519" instrument_node="">J</span><span data-dcnode-id="6518" instrument_node="">&nbsp;</span><span data-dcnode-id="6517" instrument_node="">cm</span><sup data-dcnode-id="6515"><span data-dcnode-id="6516" instrument_node="">−2</span></sup><span data-dcnode-id="6514" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="6512" href="#bib0065" name="bbib0065"><span data-dcnode-id="6513" instrument_node="">[13]</span></a><span data-dcnode-id="6511" instrument_node="">. Researches on laser cleaning of other kind of deterioration forms, concluded that Fe compounds are very sensitive in response to 1064</span><span data-dcnode-id="6510" instrument_node="">&nbsp;</span><span data-dcnode-id="6509" instrument_node="">nm laser irradiation </span><a class="workspace-trigger" data-dcnode-id="6507" href="#bib0320" name="bbib0320"><span data-dcnode-id="6508" instrument_node="">[64]</span></a><span data-dcnode-id="6506" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6504" href="#bib0325" name="bbib0325"><span data-dcnode-id="6505" instrument_node="">[65]</span></a><span data-dcnode-id="6503" instrument_node="">. Urones-Garrote et al. after the laser irradiation of an uncoated granite with Nd:YAG at 355</span><span data-dcnode-id="6502" instrument_node="">&nbsp;</span><span data-dcnode-id="6497"><span data-dcnode-id="6501" instrument_node="">nm assigned the decolouration effect of the pinkish Rosa Porriño granite to the induced thermal effects in the </span><a class="topic-link" data-dcnode-id="6499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/microstructure" title="Learn more about microstructure from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6500" instrument_node="">microstructure</span></a><span data-dcnode-id="6498" instrument_node=""> and composition of potassium feldspar grains </span></span><a class="workspace-trigger" data-dcnode-id="6495" href="#bib0330" name="bbib0330"><span data-dcnode-id="6496" instrument_node="">[66]</span></a><span data-dcnode-id="6494" instrument_node="">. Rivas et al. working with Nd:YVO</span><sub data-dcnode-id="6492"><span data-dcnode-id="6493" instrument_node="">4</span></sub><span data-dcnode-id="6491" instrument_node=""> at 355</span><span data-dcnode-id="6490" instrument_node="">&nbsp;</span><span data-dcnode-id="6489" instrument_node="">nm to clean several colour graffiti on granite confirmed the influence of the chemical composition of the graffiti on the cleaning effectiveness; the cleaning of red, blue and black paints from Montana Colors</span><sup data-dcnode-id="6487"><span data-dcnode-id="6488" instrument_node="">®</span></sup><span data-dcnode-id="6486" instrument_node=""> had similar satisfactory results, while the surface cleaned of silver graffiti showed a translucid film easily visible under naked eye </span><a class="workspace-trigger" data-dcnode-id="6484" href="#bib0080" name="bbib0080"><span data-dcnode-id="6485" instrument_node="">[16]</span></a><span data-dcnode-id="6479"><span data-dcnode-id="6483" instrument_node="">. Moreover paint penetration into the granite fissures was reported and remained after cleaning. In the later research, laser also caused melting of the biotite grains, fracturing of the quartz grains and in case of the cleanings of black and silver paints, a possible change in the hydration state of </span><a class="topic-link" data-dcnode-id="6481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemical-engineering/iron-oxides" title="Learn more about iron oxides from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6482" instrument_node="">iron oxides</span></a><span data-dcnode-id="6480" instrument_node=""> and oxyhydroxides covering fissures was found. Pozo et al. also applied the same laser in the removal of the same paints over Rosa Porriño and Silvestre granites </span></span><a class="workspace-trigger" data-dcnode-id="6477" href="#bib0075" name="bbib0075"><span data-dcnode-id="6478" instrument_node="">[15]</span></a><span data-dcnode-id="6472"><span data-dcnode-id="6476" instrument_node="">. The laser was satisfactory for all the paints except silver. In fact, under SEM, these samples present a surface completely covered by a </span><a class="topic-link" data-dcnode-id="6474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/carbon-films" title="Learn more about carbon film from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6475" instrument_node="">carbon film</span></a><span data-dcnode-id="6473" instrument_node=""> rich in aluminium particles. Despite the results obtained for silver paint, in a later study </span></span><a class="workspace-trigger" data-dcnode-id="6470" href="#bib0290" name="bbib0290"><span data-dcnode-id="6471" instrument_node="">[58]</span></a><span data-dcnode-id="6469" instrument_node="">, the Nd:YVO</span><sub data-dcnode-id="6467"><span data-dcnode-id="6468" instrument_node="">4</span></sub><span data-dcnode-id="6466" instrument_node=""> laser at 355</span><span data-dcnode-id="6465" instrument_node="">&nbsp;</span><span data-dcnode-id="6464" instrument_node="">nm proved by means of hyperspectral imaging technique to be one of the most suitable cleaning techniques. More recently, Ramil et al. studied the optimal laser fluence ranges to clean graffiti on silicates with the previously used Nd:YVO</span><sub data-dcnode-id="6462"><span data-dcnode-id="6463" instrument_node="">4</span></sub><span data-dcnode-id="6461" instrument_node=""> laser at 355</span><span data-dcnode-id="6460" instrument_node="">&nbsp;</span><span data-dcnode-id="6459" instrument_node="">nm on Rosa Porriño granite painted with the referred Montana Colors</span><sup data-dcnode-id="6457"><span data-dcnode-id="6458" instrument_node="">®</span></sup><span data-dcnode-id="6456" instrument_node=""> paints. The cleaning effectiveness was found to be influenced by the polymineralic characteristic of the granite since the four main minerals presented different behaviours. For quartz and K-feldspar grains the higher cleaning effectiveness levels were achieved with 0.1–0.2</span><span data-dcnode-id="6455" instrument_node="">&nbsp;</span><span data-dcnode-id="6454" instrument_node="">J</span><span data-dcnode-id="6453" instrument_node="">&nbsp;</span><span data-dcnode-id="6452" instrument_node="">cm</span><sup data-dcnode-id="6450"><span data-dcnode-id="6451" instrument_node="">−2</span></sup><span data-dcnode-id="6449" instrument_node="">, regardless of the graffiti colour. For plagioclase, the cleaning effectiveness was achieved from 0.1 to 1.0</span><span data-dcnode-id="6448" instrument_node="">&nbsp;</span><span data-dcnode-id="6447" instrument_node="">J</span><span data-dcnode-id="6446" instrument_node="">&nbsp;</span><span data-dcnode-id="6445" instrument_node="">cm</span><sup data-dcnode-id="6443"><span data-dcnode-id="6444" instrument_node="">−2</span></sup><span data-dcnode-id="6442" instrument_node="">depending on the graffiti colour. Finally, biotite started to be cleaned with 0.06</span><span data-dcnode-id="6441" instrument_node="">&nbsp;</span><span data-dcnode-id="6440" instrument_node="">J</span><span data-dcnode-id="6439" instrument_node="">&nbsp;</span><span data-dcnode-id="6438" instrument_node="">cm</span><sup data-dcnode-id="6436"><span data-dcnode-id="6437" instrument_node="">−1</span></sup><span data-dcnode-id="6435" instrument_node=""> (with melting occurrence at the lowest fluence). Textural characteristics of the stone such as fissural system and cleavage also interfere in the graffiti penetration and consequently in the cleaning performance </span><a class="workspace-trigger" data-dcnode-id="6433" href="#bib0335" name="bbib0335"><span data-dcnode-id="6434" instrument_node="">[67]</span></a><span data-dcnode-id="6432" instrument_node="">.</span></p><p data-dcnode-id="6419" id="par0750"><span data-dcnode-id="6426"><span data-dcnode-id="6430" instrument_node="">High Power </span><a class="topic-link" data-dcnode-id="6428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/laser-diode" title="Learn more about Diode Laser from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6429" instrument_node="">Diode Laser</span></a><span data-dcnode-id="6427" instrument_node=""> (HPDL) was tested for the first time by Salimbeni et al. with a Rofin-Sinar mod. DLO25S emitting up to 2.5kW with a black paint on Carrara marble </span></span><a class="workspace-trigger" data-dcnode-id="6424" href="#bib0340" name="bbib0340"><span data-dcnode-id="6425" instrument_node="">[68]</span></a><span data-dcnode-id="6423" instrument_node="">. In comparison with modulated waves, continuous waves of a high power diode laser system HPDL successfully extracted paint in a Mexican Pink Morelia Quarry due to its two steps process: the first low irradiance pass leads to combustion–carbonization of the paint and the second pass removes it </span><a class="workspace-trigger" data-dcnode-id="6421" href="#bib0345" name="bbib0345"><span data-dcnode-id="6422" instrument_node="">[69]</span></a><span data-dcnode-id="6420" instrument_node="">.</span></p></section><section data-dcnode-id="6336" id="sec0040"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6414" id="sect0055"><span data-dcnode-id="6417" instrument_node="">4.4</span><span data-dcnode-id="6416" instrument_node="">. </span><span data-dcnode-id="6415" instrument_node="">Biocleaning</span></h3><div data-dcnode-id="6337"><p data-dcnode-id="6371" id="par0755"><span data-dcnode-id="6413" instrument_node="">Biocleaning consists on the use of living organisms to remove environmental pollutants or other exogenous substances, such as graffiti paints, through biodegradation due to their metabolic ability to use organic/inorganic compounds for growth </span><a class="workspace-trigger" data-dcnode-id="6411" href="#bib0025" name="bbib0025"><span data-dcnode-id="6412" instrument_node="">[5]</span></a><span data-dcnode-id="6410" instrument_node="">. The studies published focused directly on biocleaning of graffiti spray paint are still scarce. Giacomucci et al. demonstrated that the sulphate-reducing bacterium </span><em data-dcnode-id="6408"><span data-dcnode-id="6409" instrument_node="">Desulfovibrio desulfuricans</span></em><span data-dcnode-id="6407" instrument_node=""> ATCC 13541 is able to degrade nitrocellulosic-based paint binder, however the complete elimination/detachment of the paint layer from the glass substrate was not observed </span><a class="workspace-trigger" data-dcnode-id="6405" href="#bib0350" name="bbib0350"><span data-dcnode-id="6406" instrument_node="">[70]</span></a><span data-dcnode-id="6404" instrument_node="">. Sanmartín et al. using culturable microorganisms gave another step phylogenetically identifying nine bacterial and one fungal strains with the capability to degrade alkyd and polyester spray paint resins (</span><a class="workspace-trigger" data-dcnode-id="6402" href="#fig0030" name="bfig0030"><span data-dcnode-id="6403" instrument_node="">Fig. 6</span></a><span data-dcnode-id="6401" instrument_node="">) </span><a class="workspace-trigger" data-dcnode-id="6399" href="#bib0355" name="bbib0355"><span data-dcnode-id="6400" instrument_node="">[71]</span></a><span data-dcnode-id="6394"><span data-dcnode-id="6398" instrument_node="">. Germinario et al. used different </span><a class="topic-link" data-dcnode-id="6396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/lipase" title="Learn more about lipases from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6397" instrument_node="">lipases</span></a><span data-dcnode-id="6395" instrument_node=""> (a mixture of lipases from non-specified bacteria strains; lipase from </span></span><em data-dcnode-id="6392"><span data-dcnode-id="6393" instrument_node="">Candida rugose</span></em><span data-dcnode-id="6391" instrument_node=""> and lipase from </span><em data-dcnode-id="6389"><span data-dcnode-id="6390" instrument_node="">Candida antarctica</span></em><span data-dcnode-id="6388" instrument_node="">)to remove acrylic marker pen inks Uni-posca</span><sup data-dcnode-id="6386"><span data-dcnode-id="6387" instrument_node="">®</span></sup><span data-dcnode-id="6385" instrument_node="">, Tratto</span><sup data-dcnode-id="6383"><span data-dcnode-id="6384" instrument_node="">®</span></sup><span data-dcnode-id="6382" instrument_node=""> and Saratoga</span><sup data-dcnode-id="6380"><span data-dcnode-id="6381" instrument_node="">®</span></sup><span data-dcnode-id="6375"><span data-dcnode-id="6379" instrument_node=""> from unglazed </span><a class="topic-link" data-dcnode-id="6377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/ceramic-substrate" title="Learn more about ceramic substrates from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6378" instrument_node="">ceramic substrates</span></a><span data-dcnode-id="6376" instrument_node="">. The acrylic paints were removed with an oil in water micro emulsion even without the enzyme, but in general terms, the cleaning performance was enhanced by the addition of a lipase. Moreover, there was not found a formulation to effectively remove all kinds of paints. A future research line is proposed to study these formulations on ornamental stones </span></span><a class="workspace-trigger" data-dcnode-id="6373" href="#bib0360" name="bbib0360"><span data-dcnode-id="6374" instrument_node="">[72]</span></a><span data-dcnode-id="6372" instrument_node="">.</span></p><figure class="figure text-xs" data-dcnode-id="6338" id="fig0030"><span data-dcnode-id="6355"><img alt="Fig. 6" aria-describedby="cap0030" data-dcnode-id="6370" height="304" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S030094401730629X-gr6.jpg&amp;raw"><span data-dcnode-id="6369" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="6356"><li data-dcnode-id="6363"><a class="anchor download-link u-font-sans" data-dcnode-id="6364" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S030094401730629X-gr6_lrg.jpg" target="_blank" title="Download high-res image (599KB)"><span class="anchor-text" data-dcnode-id="6365"><span data-dcnode-id="6368" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6366"><span data-dcnode-id="6367" instrument_node="">Download high-res image (599KB)</span></span></span></a></li><li data-dcnode-id="6357"><a class="anchor download-link u-font-sans" data-dcnode-id="6358" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S030094401730629X-gr6.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="6359"><span data-dcnode-id="6362" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6360"><span data-dcnode-id="6361" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="6339"><span data-dcnode-id="6340" id="cap0030"><p data-dcnode-id="6341" id="spar0030"><span class="label" data-dcnode-id="6353"><span data-dcnode-id="6354" instrument_node="">Fig. 6</span></span><span data-dcnode-id="6352" instrument_node="">. </span><span data-dcnode-id="6351" instrument_node="">A: Sampling process of microorganisms with potential capacity to degrade graffiti, from car bodies found in junk yards in the Northeastern United States (Cambridge, MA), using moistened swabs. B: Examples of the different strains with ability to remove and degrade graffiti spray paint, isolated from graffiti and associated environments </span><a class="workspace-trigger" data-dcnode-id="6349" href="#bib0355" name="bbib0355"><span data-dcnode-id="6350" instrument_node="">[71]</span></a><span data-dcnode-id="6348" instrument_node="">. C: Plastic test tube containing one isolated colony </span><a class="workspace-trigger" data-dcnode-id="6346" href="#bib0355" name="bbib0355"><span data-dcnode-id="6347" instrument_node="">[71]</span></a><span data-dcnode-id="6345" instrument_node=""> and a microscope slide which had one side coated with a uniform layer of graffiti paint </span><a class="workspace-trigger" data-dcnode-id="6343" href="#bib0350" name="bbib0350"><span data-dcnode-id="6344" instrument_node="">[70]</span></a><span data-dcnode-id="6342" instrument_node="">, showing the biodeterioration due to microbial attack. Sources: Patricia Sanmartín.</span></p></span></span></figure></div></section><section data-dcnode-id="5188" id="sec0045"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6332" id="sect0060"><span data-dcnode-id="6335" instrument_node="">4.5</span><span data-dcnode-id="6334" instrument_node="">. </span><span data-dcnode-id="6333" instrument_node="">Effectiveness and harmfulness evaluation of the cleaning methods</span></h3><div data-dcnode-id="5189"><p data-dcnode-id="6314" id="par0760"><span data-dcnode-id="6331" instrument_node="">The analytical techniques used to evaluate the cleaning effectiveness and harmfulness are presented in </span><a class="workspace-trigger" data-dcnode-id="6329" href="#tbl0020" name="btbl0020"><span data-dcnode-id="6330" instrument_node="">Table 4</span></a><span data-dcnode-id="6324"><span data-dcnode-id="6328" instrument_node="">. From the critical analysis performed one verified that 15 different techniques/methods were used in that evaluation and among these, the most applied techniques/methods are optical microscopy, </span><a class="topic-link" data-dcnode-id="6326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemical-engineering/colorimetry" title="Learn more about colorimetry from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6327" instrument_node="">colorimetry</span></a><span data-dcnode-id="6325" instrument_node=""> and scanning electron microscopy. Back in 2007 Sansonetti et al. referred the risks associated with the cleaning procedures and established some guidelines to be followed by the scientific community. Briefly, step A involves the evaluation of the potential harmfulness of the cleaning method and step B the optimization of the cleaning parameters for each specific cleaning procedure for a specimen </span></span><em data-dcnode-id="6322"><span data-dcnode-id="6323" instrument_node="">in situ</span></em><span data-dcnode-id="6321" instrument_node=""> and for laboratory specimens </span><a class="workspace-trigger" data-dcnode-id="6319" href="#bib0365" name="bbib0365"><span data-dcnode-id="6320" instrument_node="">[73]</span></a><span data-dcnode-id="6318" instrument_node="">. The importance of long term observations are also highlighted. These guidelines were created since a gap in the analytical characterization of the cleaning performance was found. From the studied literature this problem can still be noticed, however as can be seen in </span><a class="workspace-trigger" data-dcnode-id="6316" href="#tbl0020" name="btbl0020"><span data-dcnode-id="6317" instrument_node="">Table 4</span></a><span data-dcnode-id="6315" instrument_node="">, despite not all the studies carry out an analytical characterization, most of the ones that actually do it encompass the previous characterization of the stone, of the graffiti paints and the techniques used to evaluate the graffiti cleaning effectiveness.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="5190" id="tbl0020"><span class="captions" data-dcnode-id="6307"><span data-dcnode-id="6308" id="cap0050"><p data-dcnode-id="6309" id="spar0050"><span class="label" data-dcnode-id="6312"><span data-dcnode-id="6313" instrument_node="">Table 4</span></span><span data-dcnode-id="6311" instrument_node="">. </span><span data-dcnode-id="6310" instrument_node="">Analytical techniques used by several authors to evaluate the cleaning effectiveness achieved for different cleaning procedures to extract graffiti on stones. Symbols show the different evaluation performed in each work with the different techniques; ■ shows that the previous characterization of the stone was carried out; ● the graffiti paints by themselves were evaluated and ○ shows the techniques used to evaluate the graffiti cleaning effectiveness.</span></p></span></span><div class="groups" data-dcnode-id="5191"><table data-dcnode-id="5192"><thead class="valign-top" data-dcnode-id="6273"><tr class="rowsep-1" data-dcnode-id="6274"><th class="align-left" data-dcnode-id="6305" scope="col"><span data-dcnode-id="6306" instrument_node="">Reference</span></th><th class="align-left" data-dcnode-id="6303" scope="col"><span data-dcnode-id="6304" instrument_node="">Optic microscopy</span></th><th class="align-left" data-dcnode-id="6301" scope="col"><span data-dcnode-id="6302" instrument_node="">Colorimetry</span></th><th class="align-left" data-dcnode-id="6299" scope="col"><span data-dcnode-id="6300" instrument_node="">FTIR</span></th><th class="align-left" data-dcnode-id="6297" scope="col"><span data-dcnode-id="6298" instrument_node="">XRF</span></th><th class="align-left" data-dcnode-id="6295" scope="col"><span data-dcnode-id="6296" instrument_no ■</span></td><td class="align-left" data-dcnode-id="5239"></td><td class="align-left" data-dcnode-id="5237"><span data-dcnode-id="5238" instrument_node="">■</span></td></tr><tr data-dcnode-id="5215"><td class="align-left" data-dcnode-id="5235"></td><td class="align-left" data-dcnode-id="5233"><span data-dcnode-id="5234" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="5232"></td><td class="align-left" data-dcnode-id="5231"></td><td class="align-left" data-dcnode-id="5230"></td><td class="align-left" data-dcnode-id="5229"></td><td class="align-left" data-dcnode-id="5228"></td><td class="align-left" data-dcnode-id="5227"></td><td class="align-left" data-dcnode-id="5226"></td><td class="align-left" data-dcnode-id="5224"><span data-dcnode-id="5225" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="5223"></td><td class="align-left" data-dcnode-id="5222"></td><td class="align-left" data-dcnode-id="5221"></td><td class="align-left" data-dcnode-id="5219"><span data-dcnode-id="5220" instrument_node="">●</span></td><td class="align-left" data-dcnode-id="5218"></td><td class="align-left" data-dcnode-id="5216"><span data-dcnode-id="5217" instrument_node="">●</span></td></tr><tr data-dcnode-id="5194"><td class="align-left" data-dcnode-id="5214"></td><td class="align-left" data-dcnode-id="5212"><span data-dcnode-id="5213" instrument_node="">○</span></td><td class="align-left" data-dcnode-id="5211"></td><td class="align-left" data-dcnode-id="5210"></td><td class="align-left" data-dcnode-id="5209"></td><td class="align-left" data-dcnode-id="5208"></td><td class="align-left" data-dcnode-id="5207"></td><td class="align-left" data-dcnode-id="5206"></td><td class="align-left" data-dcnode-id="5205"></td><td class="align-left" data-dcnode-id="5203"><span data-dcnode-id="5204" instrument_node="">○</span></td><td class="align-left" data-dcnode-id="5202"></td><td class="align-left" data-dcnode-id="5201"></td><td class="align-left" data-dcnode-id="5200"></td><td class="align-left" data-dcnode-id="5198"><span data-dcnode-id="5199" instrument_node="">○</span></td><td class="align-left" data-dcnode-id="5197"></td><td class="align-left" data-dcnode-id="5195"><span data-dcnode-id="5196" instrument_node="">○</span></td></tr></tbody></table></div></div></div></section></section><section data-dcnode-id="5083" id="sec0050"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5183" id="sect0065"><span data-dcnode-id="5186" instrument_node="">5</span><span data-dcnode-id="5185" instrument_node="">. </span><span data-dcnode-id="5184" instrument_node="">Final considerations and future research lines</span></h2><p data-dcnode-id="5181" id="par0765"><span data-dcnode-id="5182" instrument_node="">This review presents a state of art regarding: (i) the composition of the graffiti spray paints commonly used by graffiti-writers in Cultural Heritage stones, (ii) the protective effectiveness of anti-graffiti coatings on different stones and (iii) the most remarkable findings on graffiti cleaning procedures on stone.</span></p><p data-dcnode-id="5179" id="par0770"><span data-dcnode-id="5180" instrument_node="">Anti-graffiti protective coatings improve the graffiti removal efficacy comparatively to uncoated surfaces, however it can be compromised in more porous substrates, such as limestones. The impregnation of the anti-graffiti coatings is highly influenced by the pore size, and the porosity is the factor that mainly influences on the cleaning effectiveness. The application of the anti-graffiti by capillary absorption produces acceptable decreases in the vapour permeability. It has to be noticed that the ability of some inks/paints to penetrate through the protective coatings may be related to the cured/uncured polymer features; the uncured coating can more easily allow the migration of the ink/paint to the stone.</span></p><p data-dcnode-id="5177" id="par0775"><span data-dcnode-id="5178" instrument_node="">From a general overview, considering the type of substrate, most of the references are focused on carbonate stones. Regarding to the graffiti removal methods, more than half of the consulted studies are centred on the application of lasers. The majority of the analysed researches was not capable to remove graffiti without induce damage in the substrate. It is also possible to state that most of the researches, contrary to those based on the anti-graffiti products, does not consider the effects of ageing in their effectiveness. Therefore, more researches addressed on the effectiveness evaluation of cleaning of aged graffiti should be performed.</span></p><p data-dcnode-id="5097" id="par0780"><span data-dcnode-id="5176" instrument_node="">The most successful procedures to extract different graffiti on stone were analysed taking into account the painting binder:</span></p><dl class="list" data-dcnode-id="5098"><dt class="list-label" data-dcnode-id="5174"><span data-dcnode-id="5175" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5161"><p data-dcnode-id="5162" id="par0785"><span data-dcnode-id="5173" instrument_node="">For acrylic graffiti paintings the better cleaning results were obtained with Nd:YAG laser at 355</span><span data-dcnode-id="5172" instrument_node="">&nbsp;</span><span data-dcnode-id="5171" instrument_node="">nm and XeCl excimer at 308</span><span data-dcnode-id="5170" instrument_node="">&nbsp;</span><span data-dcnode-id="5169" instrument_node="">nm both in Trans-colour</span><sup data-dcnode-id="5167"><span data-dcnode-id="5168" instrument_node="">®</span></sup><span data-dcnode-id="5166" instrument_node=""> and Felton</span><sup data-dcnode-id="5164"><span data-dcnode-id="5165" instrument_node="">®</span></sup><span data-dcnode-id="5163" instrument_node=""> paints on marble.</span></p></dd><dt class="list-label" data-dcnode-id="5159"><span data-dcnode-id="5160" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5126"><p data-dcnode-id="5127" id="par0790"><span data-dcnode-id="5158" instrument_node="">The best cleaning results for alkyd graffiti paints were obtained with the chemical agents AGS 60™ and QuitaGraffi 200</span><sup data-dcnode-id="5156"><span data-dcnode-id="5157" instrument_node="">®</span></sup><span data-dcnode-id="5155" instrument_node="">–QuitaSombras 60</span><sup data-dcnode-id="5153"><span data-dcnode-id="5154" instrument_node="">®</span></sup><span data-dcnode-id="5152" instrument_node=""> (rich in potassium hydroxide-a clear evidence of the satisfactory cleaning effectiveness by saponification)-and paint stripper TS-99; Nd:YVO</span><sub data-dcnode-id="5150"><span data-dcnode-id="5151" instrument_node="">4</span></sub><span data-dcnode-id="5149" instrument_node=""> laser at 355</span><span data-dcnode-id="5148" instrument_node="">&nbsp;</span><span data-dcnode-id="5147" instrument_node="">nm; mechanical soft-abrasive blasting media Sponge-Jet</span><sup data-dcnode-id="5145"><span data-dcnode-id="5146" instrument_node="">®</span></sup><span data-dcnode-id="5144" instrument_node="">, Exastrip</span><sup data-dcnode-id="5142"><span data-dcnode-id="5143" instrument_node="">®</span></sup><span data-dcnode-id="5141" instrument_node=""> and Hydrogommage</span><sup data-dcnode-id="5139"><span data-dcnode-id="5140" instrument_node="">®</span></sup><span data-dcnode-id="5138" instrument_node="">. This results were obtained in Montana Colors</span><sup data-dcnode-id="5136"><span data-dcnode-id="5137" instrument_node="">®</span></sup><span data-dcnode-id="5135" instrument_node=""> and MOTIP HOME &amp; HOBBYLACQUER</span><sup data-dcnode-id="5133"><span data-dcnode-id="5134" instrument_node="">®</span></sup><span data-dcnode-id="5128"><span data-dcnode-id="5132" instrument_node=""> on limestone, marble and </span><a class="topic-link" data-dcnode-id="5130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/granite" title="Learn more about granite from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5131" instrument_node="">granite</span></a><span data-dcnode-id="5129" instrument_node="">.</span></span></p></dd><dt class="list-label" data-dcnode-id="5124"><span data-dcnode-id="5125" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5099"><p data-dcnode-id="5100" id="par0795"><span data-dcnode-id="5115"><span data-dcnode-id="5123" instrument_node="">For nitrocellulosic paints the best results were obtained with a mixture of ethanol, </span><a class="topic-link" data-dcnode-id="5121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemical-engineering/acetone" title="Learn more about acetone from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5122" instrument_node="">acetone</span></a><span data-dcnode-id="5116"><span data-dcnode-id="5120" instrument_node=""> and </span><a class="topic-link" data-dcnode-id="5118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemical-engineering/xylene" title="Learn more about xylene from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5119" instrument_node="">xylene</span></a><span data-dcnode-id="5117" instrument_node=""> chemical agents, probably the same solvents used in the resin formulation, and with Nd:YAG at 1064</span></span></span><span data-dcnode-id="5114" instrument_node="">&nbsp;</span><span data-dcnode-id="5113" instrument_node="">nm and 532</span><span data-dcnode-id="5112" instrument_node="">&nbsp;</span><span data-dcnode-id="5111" instrument_node="">nm, for Motip-Dupli</span><sup data-dcnode-id="5109"><span data-dcnode-id="5110" instrument_node="">®</span></sup><span data-dcnode-id="5104"><span data-dcnode-id="5108" instrument_node=""> Montana Gold on limestone and </span><a class="topic-link" data-dcnode-id="5106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/sandstone" title="Learn more about sandstone from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5107" instrument_node="">sandstone</span></a><span data-dcnode-id="5105" instrument_node=""> </span></span><a class="workspace-trigger" data-dcnode-id="5102" href="#bib0110" name="bbib0110"><span data-dcnode-id="5103" instrument_node="">[22]</span></a><span data-dcnode-id="5101" instrument_node="">.</span></p></dd></dl><p></p><p data-dcnode-id="5088" id="par0800"><span data-dcnode-id="5096" instrument_node="">The chemical methods are among the most economic solutions, although they may penetrate in the substrate and cause irreversible damages such as chemical contamination and shadows. Moreover they represent a risk to the environment and to the conservator-restorer health. It is important to highlight the current studies focused on the hydrogel technology that achieves promising results in the extraction of overpainting’s and undesired graffiti from street art </span><a class="workspace-trigger" data-dcnode-id="5094" href="#bib0370" name="bbib0370"><span data-dcnode-id="5095" instrument_node="">[74]</span></a><span data-dcnode-id="5089"><span data-dcnode-id="5093" instrument_node="">. Mechanical methods allow a complete paint extraction and are also an economic solution but can damage the substrate and generate pollutants through the release of fine dust particles. Despite the lasers do not allow mechanical contact, they provide a located and accurate cleaning with a selective action and they can be adapted in real time. As chemical methods, lasers depend on the chemical characteristics of the paint that lead their capacity of radiation absorption. Among their drawbacks, lasers may alter the colour of the substrate, induce mineralogical alteration and are the most expensive alternative. Further studies in order to optimize the laser cleaning of graffiti on different stones should be performed to minimize those disadvantages. Bioremediation for graffiti removal is an interesting field in expansion, with the promise of offering a friendly environmental low cost solution with a good public acceptance however we must keep in mind that many graffiti paints have </span><a class="topic-link" data-dcnode-id="5091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/biocides" title="Learn more about biocides from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5092" instrument_node="">biocides</span></a><span data-dcnode-id="5090" instrument_node=""> as additives in their formulation.</span></span></p><p data-dcnode-id="5086" id="par0805"><span data-dcnode-id="5087" instrument_node="">Despite some analytical techniques are employed in the evaluation of the cleaning effectiveness, the complementarity use of more analytical equipment should be applied in order to scientifically validate the obtained results.</span></p><p data-dcnode-id="5084" id="par0810"><span data-dcnode-id="5085" instrument_node="">Further studies focused on the cleaning effectiveness of aged graffiti paintings under different urban pollutants have been developed in order to obtain more realistic simulations to the graffiti cleaning practice.</span></p></section></div><section data-dcnode-id="5061" id="ack0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5080" id="sect0070"><span data-dcnode-id="5081" instrument_node="">Acknowledgements</span></h2><p data-dcnode-id="5066" id="par0815"><span data-dcnode-id="5079" instrument_node="">This work is co-funded by </span><span data-dcnode-id="5077" id="gs0005"><span data-dcnode-id="5078" instrument_node="">Fundação Calouste Gulbenkian</span></span><span data-dcnode-id="5076" instrument_node=""> (Programa de Estímulo à Investigação 2016, P 202710) and by the </span><span data-dc
