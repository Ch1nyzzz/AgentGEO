</span><div class="corpo" data-dcnode-id="1645"><p data-dcnode-id="1647"><span data-dcnode-id="1654" instrument_node="">The creation of a perfect object requires time and dedication, as well as rhythmic tension and passion. These are the ingredients that make up the unique mix that leads to the creation of a handmade and labeled Bassocontinuo rack. From the raw material to the finished product, from carpentry to turning, from painting to carbon fiber processing, from leather goods to quality control and certified packaging. Each line involves different suppliers: </span><strong data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">Bassocontinuo collaborates with more than twenty-five local businesses</span></strong><span data-dcnode-id="1651" instrument_node="">. And from every single work emerges the dedication, time and expertise of our craftsmen: behind a creation like ours lies all </span><strong data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">the extraordinary handmade in Italy</span></strong><span data-dcnode-id="1648" instrument_node="">.</span></p><span data-dcnode-id="1646" instrument_node="">

</span><h4 data-dcnode-id="1594"><img data-dcnode-id="1596" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bassocontinuo.biz/wp-content/uploads/2020/01/icona-falegnameria.jpg&amp;raw"><span data-dcnode-id="1595" instrument_node=""> CARPENTRY</span></h4><span data-dcnode-id="1593" instrument_node="">
</span><h5 data-dcnode-id="1592"></h5><span data-dcnode-id="1591" instrument_node="">
</span><div class="corpo" data-dcnode-id="1578"><p data-dcnode-id="1587"><span data-dcnode-id="1590" instrument_node="">From panels of about six square meters to shelves of sixty centimeters, from highly automated processes to skillful manual steps: every single action is meticulously studied on the drawing board in order to obtain a technically perfect object.</span><br data-dcnode-id="1589"><span data-dcnode-id="1588" instrument_node="">
From the cutting of the HDF panel (or in various other materials) to the single shelf is a succession of actions (such as milling and drilling carried out by latest generation five-axis CNC machines or completely manual polishing) that take more than forty minutes to obtain a semi-finished product ready to be sent to the next steps.</span></p><span data-dcnode-id="1586" instrument_node="">
</span><p data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1583" instrument_node="">
</span><p data-dcnode-id="1580"><a class="btn html5lightbox" data-dcnode-id="1581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bassocontinuo.s3.eu-central-1.amazonaws.com/Falegnameria.mp4" rel="noopener" target="_blank"><span data-dcnode-id="1582" instrument_node="">Video</span></a></p><span data-dcnode-id="1579" instrument_node="">

</span><h4 data-dcnode-id="1566"><img data-dcnode-id="1568" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bassocontinuo.biz/wp-content/uploads/2020/01/icona-turning.jpg&amp;raw"><span data-dcnode-id="1567" instrument_node=""> TURNING</span></h4><span data-dcnode-id="1565" instrument_node="">
</span><h5 data-dcnode-id="1564"></h5><span data-dcnode-id="1563" instrument_node="">
</span><div class="corpo" data-dcnode-id="1540"><p data-dcnode-id="1549"><span data-dcnode-id="1562" instrument_node="">The supporting structure is manufactured through a billet turning process, regardless of the material selected.</span><br data-dcnode-id="1561"><span data-dcnode-id="1560" instrument_node="">
Bars of six meters in length and different diameters depending on the product to be obtained are inserted in the loaders of the high precision CNC machining centers. The fully automated process continues with a completely manual procedure: surface satin finishing with abrasive papers of various grits used in sequence.</span><br data-dcnode-id="1559"><span data-dcnode-id="1558" instrument_node="">
Just to give you an idea,</span><strong data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node=""> we move more than two and a half tons of stainless steel per month.</span></strong><br data-dcnode-id="1555"><span data-dcnode-id="1554" instrument_node="">
The process ends with multiple quality controls (dimensional, aesthetic, mechanical) carried out on each single piece (from the spacer cylinder to the tip, from the cap to the subpoint).</span><br data-dcnode-id="1553"><span data-dcnode-id="1552" instrument_node="">
</span><em data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">Everything is very simple? Nothing is what it seems.</span></em></p><span data-dcnode-id="1548" instrument_node="">
</span><p data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1545" instrument_node="">
</span><p data-dcnode-id="1542"><a class="btn html5lightbox" data-dcnode-id="1543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bassocontinuo.s3.eu-central-1.amazonaws.com/Tornitura.mp4" rel="noopener" target="_blank"><span data-dcnode-id="1544" instrument_node="">Video</span></a></p><span data-dcnode-id="1541" instrument_node="">
</span></div><span data-dcnode-id="1539" instrument_node="">

</span><img data-dcnode-id="1532" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bassocontinuo.biz/wp-content/uploads/2020/01/pelletteria.jpg&amp;raw"><span data-dcnode-id="1531" instrument_node="">
</span><h4 data-dcnode-id="1528"><img data-dcnode-id="1530" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bassocontinuo.biz/wp-content/uploads/2020/01/icona-pelletteria.jpg&amp;raw"><span data-dcnode-id="1529" instrument_node=""> LEATHER WORKSHOP</span></h4><span data-dcnode-id="1527" instrument_node="">
</span><h5 data-dcnode-id="1526"></h5><span data-dcnode-id="1525" instrument_node="">
</span><div class="corpo" data-dcnode-id="1496"><p data-dcnode-id="1505"><span data-dcnode-id="1524" instrument_node="">Only a part of </span><strong data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">our products</span></strong><span data-dcnode-id="1521" instrument_node=""> </span><strong data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">is covered by leather</span></strong><span data-dcnode-id="1518" instrument_node="">: the racks of customers who rely on our </span><em data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">B by Bassocontinuo</span></em><span data-dcnode-id="1515" instrument_node=""> tailoring service.</span><br data-dcnode-id="1514"><span data-dcnode-id="1513" instrument_node="">
An incredibly long process that only expert hands are a capable of handling all the way through with painstaking precision.</span><br data-dcnode-id="1512"><span data-dcnode-id="1511" instrument_node="">
From the search for the ideal leather to the delivery of the finished product can take many weeks, it all depends on what you want to achieve. We have hundreds of leather samples and over 680 colours of thread for a proper tailoring service.</span><br data-dcnode-id="1510"><span data-dcnode-id="1509" instrument_node="">
From the cutting of the leather, to the subsequent</span><strong data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node=""> triple stitching </span></strong><span data-dcnode-id="1506" instrument_node="">(one structural and two cosmetic) to the covering of the shelf, there are several hours of work and only two of our craftsmen are skilled to complete the process.</span></p><span data-dcnode-id="1504" instrument_node="">
</span><p data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1501" instrument_node="">
</span><p data-dcnode-id="1498"><a class="btn html5lightbox" data-dcnode-id="1499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bassocontinuo.s3.eu-central-1.amazonaws.com/Pelletteria.mp4" rel="noopener" target="_blank"><span data-dcnode-id="1500" instrument_node="">Video</span></a></p><span data-dcnode-id="1497" instrument_node="">

</span><img data-dcnode-id="1479" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bassocontinuo.biz/wp-content/uploads/2020/01/verniciatura.jpg&amp;raw"><span data-dcnode-id="1478" instrument_node="">
</span><h4 data-dcnode-id="1475"><img data-dcnode-id="1477" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bassocontinuo.biz/wp-content/uploads/2020/01/icona-verniciatura.jpg&amp;raw"><span data-dcnode-id="1476" instrument_node=""> VARNISHING</span></h4><span data-dcnode-id="1474" instrument_node="">
</span><h5 data-dcnode-id="1473"></h5><span data-dcnode-id="1472" instrument_node="">
</span><div class="corpo" data-dcnode-id="1454"><p data-dcnode-id="1463"><span data-dcnode-id="1471" instrument_node="">One of the most complex steps because it is influenced by an infinity of parameters that are difficult to control.</span><br data-dcnode-id="1470"><span data-dcnode-id="1469" instrument_node="">
</span><strong data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">Each shelf receives between 6 and 9 coats of polyester-based paint</span></strong><span data-dcnode-id="1466" instrument_node="">. We use only light and moisture resistant nautical paints. It can take up to two and a half weeks from the first coat/primer to the final brushing (in the case of mirror polished shelves).</span><br data-dcnode-id="1465"><span data-dcnode-id="1464" instrument_node="">
The entire process is entirely manual and only the skill of the craftsman determines the final result.</span></p><span data-dcnode-id="1462" instrument_node="">

</span><img data-dcnode-id="1446" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bassocontinuo.biz/wp-content/uploads/2020/01/carbonio.jpg&amp;raw"><span data-dcnode-id="1445" instrument_node="">
</span><h4 data-dcnode-id="1442"><img data-dcnode-id="1444" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bassocontinuo.biz/wp-content/uploads/2020/01/icona-carbonio-1.jpg&amp;raw"><span data-dcnode-id="1443" instrument_node=""> CARBON FIBER</span></h4><span data-dcnode-id="1441" instrument_node="">
</span><h5 data-dcnode-id="1440"></h5><span data-dcnode-id="1439" instrument_node="">
</span><div class="corpo" data-dcnode-id="1422"><p data-dcnode-id="1431"><span data-dcnode-id="1438" instrument_node="">Few people know that to make a carbon fibre object you start from a fabric. Even fewer know the meaning of “monocoque frame” and the structural benefits that this entails. What is certain is that our craftsmen, assisted by a pool of engineers who have outlined the project down to the smallest detail, are capable of creating a small masterpiece of mechanical engineering using the same technique used in the production of F1 safety cells.</span><br data-dcnode-id="1437"><span data-dcnode-id="1436" instrument_node="">
We are not talking about a trivial carbon cover (or even worse, an adhesive that mimics it) that covers a load-bearing material (for example MDF) but an object made entirely of carbon fiber and other composite fibers, hollow inside, with characteristics of rigidity, lightness and at the same time elasticity like no other. A production limited to a few pieces per week, with a very long and totally manual lamination process.</span><br data-dcnode-id="1435"><span data-dcnode-id="1434" instrument_node="">
</span><strong data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">The thousands of filaments that make up the carbon fibre are transformed into something unique, precious and at the same time with an unrivalled output.</span></strong></p><span data-dcnode-id="1430" instrument_node="">

If everything is perfect, the rack is packed and shipped: all </span><strong data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">our packaging</span></strong><span data-dcnode-id="1401" instrument_node=""> has undergone drop tests during the design phase and </span><strong data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">are shockproof certified</span></strong><span data-dcnode-id="1398" instrument_node="">. We use only top quality materials, which guarantee shock resistance and solidity at the same time.</span><br data-dcnode-id="1397"><span data-dcnode-id="1396" instrument_node="">

</span><h3 data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">We're always one step ahead. And you can hear it</span></h3><span data-dcnode-id="1269" instrument_node="">
</span><div class="corpo" data-dcnode-id="1247"><p data-dcnode-id="1255"><span data-dcnode-id="1268" instrument_node="">Enhancement of craftsmanship and refinement of the finishes are the main features of our DNA. In addition to this, there is the continuous research of materials, to find in each rack the perfect symbiosis between aesthetics and functionality. </span><strong data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">In fact, it is absolutely forbidden to sit on our laurels</span></strong><span data-dcnode-id="1265" instrument_node="">, despite the high level of quality already achieved: every day we experiment, look for new solutions, roll up our sleeves and start from scratch. This is the only way to obtain </span><strong data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">revolutionary products.</span></strong><br data-dcnode-id="1262"><span data-dcnode-id="1261" instrument_node="">
“</span><em data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">Never give up</span></em><span data-dcnode-id="1258" instrument_node="">” perfectly reflects what we are.</span><br data-dcnode-id="1257"><span data-dcnode-id="1256" instrument_node="">
Revolution Line, for example, already identifies itself through its name with its disruptive spirit: the only series of racks in the world with monocoque carbon fiber frames was designed to offer our customers the perfect combination of hi-tech materials and exclusive textures.</span></p><span data-dcnode-id="1254" instrument_node="">
</span><p data-dcnode-id="1249"><span data-dcnode-id="1253" instrument_node="">Structural carbon, </span><em data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">Fenix NTA®, Delrin®, Torlon®, Technogel®</span></em><span data-dcnode-id="1250" instrument_node=""> are just some of the materials we use to optimize the performance of our racks. A long and expensive research process ultimately pays off with unique products, often imitated but still unmatched.</span></p><span data-dcnode-id="1248" instrument_node="">

</span><h3 data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">The fruit of an ambition taken to the extreme </span></h3><span data-dcnode-id="1192" instrument_node="">
</span><div class="corpo" data-dcnode-id="1183"><p data-dcnode-id="1185"><strong data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">Lightweight</span></strong><span data-dcnode-id="1189" instrument_node="">, with </span><strong data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">extraordinary mechanical strength</span></strong><span data-dcnode-id="1186" instrument_node=""> ( capable of withstanding high loads) and an extreme ability to dampen vibrations. These are the characteristics of the carbon fiber that we have applied to the world of audio, combined with the aesthetic and emotional value that distinguish it. A true technological jewel resulting from a highly specialized production process and derived from the world of competition, where ambition is taken to the extreme. This is the same spirit from which a unique rack was produced, where beauty, functionality and high performance come together to create a mix with a revolutionary soul.</span></p><span data-dcnode-id="1184" instrument_node="">

</span><h3 data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Carbon core revolution</span></h3><span data-dcnode-id="1164" instrument_node="">
</span><div class="corpo" data-dcnode-id="1150"><p data-dcnode-id="1159"><span data-dcnode-id="1163" instrument_node="">Revolution Line: </span><strong data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">no compromise, pure innovation</span></strong><span data-dcnode-id="1160" instrument_node="">. Destiny was written in its name: a revolutionary and unique rack with monocoque carbon fibre frames designed to draw a line. “Carbon Core” brings to light the carbon soul of this rack, its DNA and its vocation. The exceptional characteristics in terms of structural rigidity, lightness and elasticity have been the fundamental ingredients to create a frame composed of thousands of filaments which, after a long and skilful production process, have given life to a unique supporting structure of the highest technological level. From today nothing will be the same as it was before.</span></p><span data-dcnode-id="1158" instrument_node="">

</span><h2 data-dcnode-id="533"><span data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">TESTED</span></span></h2><span data-dcnode-id="532" instrument_node="">
</span><h3 data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Perfect, over the top</span></h3><span data-dcnode-id="529" instrument_node="">
</span><div class="corpo" data-dcnode-id="505"><p data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">There are many rack manufacturers on the market: few seriously address the problem of vibration, even less do so scientifically.</span></p><span data-dcnode-id="526" instrument_node="">
</span><p data-dcnode-id="510"><span data-dcnode-id="525" instrument_node="">We work with an industry-leading consulting firm to whom </span><strong data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">we entrust the static and dynamic testing of our products </span></strong><span data-dcnode-id="522" instrument_node="">using state-of-the-art equipment.</span><br data-dcnode-id="521"><span data-dcnode-id="520" instrument_node="">
The racks are subjected to static test cycles with laser equipment that determine their compliance, vertical and horizontal deformations and breaking loads, thus enabling us to certify the capacity of the shelves and structure them for longer life.</span><br data-dcnode-id="519"><span data-dcnode-id="518" instrument_node="">
The next step is dynamic characterization with detection by mono and triaxial accelerometers positioned in 52 points. The tests make it possible to reconstruct the modal deformities of each shelf and understand which forces interact with the structure when we generate vibrations controlled in terms of amplitude and frequency by means of a seismic exciter.</span><br data-dcnode-id="517"><span data-dcnode-id="516" instrument_node="">
We record parameters such as transmissibility (to understand if there are frequency bands for which the vibrations coming from the floor are amplified), the time course of the frequency response functions and damping as a function of resonance frequencies.</span><br data-dcnode-id="515"><span data-dcnode-id="514" instrument_node="">
The results allow us to return to structures and materials, </span><strong data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">optimizing the response at lower frequencies </span></strong><span data-dcnode-id="511" instrument_node="">(the most harmful ones), applying damping masses or dampers as needed.</span></p><span data-dcnode-id="509" instrument_node="">
