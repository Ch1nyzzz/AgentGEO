.chatnoir.eu/?index=cw22&amp;url=https%3A//mts.intechopen.com/account/login" target="_blank"><span data-dcnode-id="1729" instrument_node="">Author Panel Sign in</span></a></li></ul><form class="search-term" data-dcnode-id="1722" data-v-36b4823c="" data-v-b33947ae=""><input data-dcnode-id="1725" data-v-36b4823c="" placeholder="Search" required="required"><button class="icr iconSearch" data-dcnode-id="1723" data-v-36b4823c="" type="submit"><span data-dcnode-id="1724" instrument_node="">Submit</span></button></form></aside><div class="nav-dropdown collapsed" data-dcnode-id="1689" data-v-b33947ae=""><div class="inner" data-dcnode-id="1690" data-v-b33947ae=""><div class="drop-box" data-dcnode-id="1716" data-v-b33947ae=""><a class="drop-item" data-dcnode-id="1719" data-v-b33947ae="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/how-open-access-publishing-with-intechopen-works"><span data-dcnode-id="1720" instrument_node="">What is Open Access?</span></a><p data-dcnode-id="1717" data-v-b33947ae=""><span data-dcnode-id="1718" instrument_node="">Open Access is an initiative that aims to make scientific research freely available to all. To date our community has made over 100 million downloads. It’s based on principles of collaboration, unobstructed discovery, and, most importantly, scientific progression. As PhD students, we found it difficult to access the research we needed, so we decided to create a new Open Access publisher that levels the playing field for scientists across the world. How? By making research easy to access, and puts the academic needs of the researchers before the business interests of publishers.</span></p></div><div class="drop-box" data-dcnode-id="1711" data-v-b33947ae=""><a class="drop-item" data-dcnode-id="1714" data-v-b33947ae="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/authors-and-editors"><span data-dcnode-id="1715" instrument_node="">Our authors and editors</span></a><p data-dcnode-id="1712" data-v-b33947ae=""><span data-dcnode-id="1713" instrument_node="">We are a community of more than 103,000 authors and editors from 3,291 institutions spanning 160 countries, including Nobel Prize winners and some of the world’s most-cited researchers. Publishing on IntechOpen allows authors to earn citations and find new collaborators, meaning more people see your work not only from your own field of study, but from other related fields too.</span></p></div><div class="drop-box" data-dcnode-id="1702" data-v-b33947ae=""><a class="drop-item" data-dcnode-id="1709" data-v-b33947ae="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/page/content-alerts"><span data-dcnode-id="1710" instrument_node="">Content Alerts</span></a><p data-dcnode-id="1707" data-v-b33947ae=""><span data-dcnode-id="1708" instrument_node="">Brief introduction to this section that descibes Open Access especially from an IntechOpen perspective</span></p><a class="nav-item" data-dcnode-id="1705" data-v-b33947ae="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/how-open-access-publishing-with-intechopen-works"><span data-dcnode-id="1706" instrument_node="">How it works</span></a><a class="nav-item" data-dcnode-id="1703" data-v-b33947ae="" href="#"><span data-dcnode-id="1704" instrument_node="">Manage preferences</span></a></div><div class="drop-box" data-dcnode-id="1691" data-v-b33947ae=""><a class="drop-item" data-dcnode-id="1700" data-v-b33947ae="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/page/contact-us"><span data-dcnode-id="1701" instrument_node="">Contact</span></a><p data-dcnode-id="1696" data-v-b33947ae=""><span data-dcnode-id="1699" instrument_node="">Want to get in touch? Contact our London head office or </span><a data-dcnode-id="1697" data-v-b33947ae="" href="#"><span data-dcnode-id="1698" instrument_node="">media team here</span></a></p><a class="drop-item" data-dcnode-id="1694" data-v-b33947ae="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/page/careers-at-intechopen"><span data-dcnode-id="1695" instrument_node="">Careers</span></a><p data-dcnode-id="1692" data-v-b33947ae=""><span data-dcnode-id="1693" instrument_node="">Our team is growing all the time, so we’re always on the lookout for smart people who want to help us reshape the world of scientific publishing.</span></p></div></div></div></div></header><section data-dcnode-id="97" data-v-87be0136="" data-v-e85dd3ce=""><div class="container" data-dcnode-id="1675" data-v-e85dd3ce=""><div class="breadcrumbs" data-dcnode-id="1676" data-v-80d35b96="" data-v-e85dd3ce=""><div class="wrap" data-dcnode-id="1677" data-v-80d35b96=""><p data-dcnode-id="1678" data-v-80d35b96=""><a class="router-link-active" data-dcnode-id="1685" data-v-80d35b96="" data-v-e85dd3ce="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/"><span data-dcnode-id="1686" instrument_node="">Home</span></a><span data-dcnode-id="1684" instrument_node=""> &gt;

</span><div class="section" data-dcnode-id="1225" data-lvl="1" id="sec_1"><span data-dcnode-id="1244" instrument_node="">
</span><h2 class="heading main-title" data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">1. Introduction</span></h2><span data-dcnode-id="1241" instrument_node="">
</span><disp-quote data-dcnode-id="1233"><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1238" id="p1"><span data-dcnode-id="1239" instrument_node="">Without the understanding and support of the public at large, without the respect and daily care of the local communities, which are the true custodians of world heritage, no amount of funds or army of experts will suffice in protecting the cites.</span></p><span data-dcnode-id="1237" instrument_node="">
</span><p data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">—Mr. Koïchiro Matsuura, Former Director-General of UNESCO</span></p><span data-dcnode-id="1234" instrument_node="">
</span></disp-quote><span data-dcnode-id="1232" instrument_node="">
</span><p data-dcnode-id="1230" id="p2"><span data-dcnode-id="1231" instrument_node="">For the time being, we are interested in preserving the heritage because of the loss of culture, heritage, and inherited buildings. For more than 100&nbsp;years ago, there has been an increasing research interest in the preservation of architectural heritage, restoration of monuments and historic buildings, urban renewal policies, traditional architecture and its identity, etc. On the other hand, there is a growing interest in sustainability.</span></p><span data-dcnode-id="1229" instrument_node="">
</span><p data-dcnode-id="1227" id="p3"><span data-dcnode-id="1228" instrument_node="">On this basis, there is an important need to formulate guidelines for planning and designing decisions of contemporary architecture that belongs to the sustainability and appear in the traditional architectural environment, which preserves its past and maintains its identity. Modern cities must meet humans’ needs and preserve their urban identity. Planning policies must be developed in order to achieve the sustainable development goals, which meet the needs of the present and protect the future rights that preserve the past and constitute a strong basis for the present and future.</span></p><span data-dcnode-id="1226" instrument_node="">
</span></div><span data-dcnode-id="1224" instrument_node="">

.1L195.8,39.1z" data-dcnode-id="957"></path></svg><div class="jw-reset-text jw-tooltip jw-tooltip-fullscreen" data-dcnode-id="954" dir="auto"><div class="jw-text" data-dcnode-id="955"></div></div></div></div></div></div></div><div class="afs_ads ad-placement" data-dcnode-id="947" style="width: 1px; height: 1px; position: absolute; background: transparent;"><span data-dcnode-id="948" instrument_node="">&nbsp;</span></div><div class="jw-error-msg jw-info-overlay jw-reset" data-dcnode-id="936"><div class="jw-icon jw-reset" data-dcnode-id="942"><svg class="jw-svg-icon jw-svg-icon-error" data-dcnode-id="943" focusable="false" style="width:100%;height:100%;" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><path d="M34.6 20.2L10 33.2 27.6 16l7 3.7a.4.4 0 0 1 .2.5.4.4 0 0 1-.2.2zM33.3 0L21 12.2 9 6c-.2-.3-.6 0-.6.5V25L0 33.6 2.5 36 36 2.7z" data-dcnode-id="944"></path></svg></div><div class="jw-info-container jw-reset" data-dcnode-id="937"><div class="jw-error-text jw-reset-text" data-dcnode-id="938" data-nosnippet="" dir="auto"><span data-dcnode-id="941" instrument_node="">This video file cannot be played.</span><span class="jw-break jw-reset" data-dcnode-id="940"></span><span data-dcnode-id="939" instrument_node="">(Error&nbsp;Code:&nbsp;224003)</span></div></div></div></div><h2 class="heading main-title" data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">2. What is the purpose of this book?</span></h2><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="930" id="p4"><span data-dcnode-id="931" instrument_node="">This book tries to answer many questions, in order to reach to the required conclusions and recommendations. The questions are as follows: What is the urban conservation? How do cities with historic depth deal with modern planning policies? What are our policies to preserve and rehabilitate the urban fabric of historic cities and heritage buildings? How do we explain urban conservation, sustainable heritage, and historical sustainability? How can we add new additions to the current building heritage and what is their contribution to sustainable development? What is the role of the organic additives in heritage structures? Shall we rethink of identity, through the study of traditional architecture within sustainability? Our book meets human needs and energy consumption and maintains the architecture identity with respect to sustainability.</span></p><span data-dcnode-id="929" instrument_node="">
</span></div><span data-dcnode-id="927" instrument_node="">
</span><div class="section" data-dcnode-id="812" data-lvl="1" id="sec_3"><span data-dcnode-id="926" instrument_node="">
</span><a class="ads-link" data-dcnode-id="924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ehealthcaresolutions.com/contact-us/" target="_blank"><span data-dcnode-id="925" instrument_node="">Advertisement</span></a><span data-dcnode-id="923" instrument_node="">
</span><div class="ads" data-dcnode-id="922" id="intechopen-intechopen-3"></div><h2 class="heading main-title" data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">3. What is heritage conservation?</span></h2><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="914" id="p5"><span data-dcnode-id="918" instrument_node="">The preservation of identity in the cities has a great relationship with the correct planning policies that relate to heritage buildings and traditional architecture, where the traditional cities contain organic fabric with narrow, twisted, or broken roads with incomplete visual axes. The streets in the traditional cities are shaded and sometimes even roofed, as in Jerusalem, Damascus, Aleppo, etc. In addition to the inner courtyards, this made them an inward-looking buildings [</span><a class="ref-link" data-dcnode-id="916" data-ref-style="bibr" href="#B1"><span data-dcnode-id="917" instrument_node="">1</span></a><span data-dcnode-id="915" instrument_node="">], in contrary to what we see those days in modern cities.</span></p><span data-dcnode-id="913" instrument_node="">
</span><div class="section" data-dcnode-id="814" data-lvl="2" id="sec_3_2"><span data-dcnode-id="912" instrument_node="">
</span><h3 class="heading section-title" data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">3.1 What is heritage preservation?</span></h3><span data-dcnode-id="909" instrument_node="">
</span><p data-dcnode-id="904" id="p6"><span data-dcnode-id="908" instrument_node="">It is important to preserve historic cities and heritage buildings and revive them. The policy of reuse and rehabilitation of these legacies with selecting the right contemporary functions is a successful step on a secure path to save what can be saved from the heritage (</span><a class="ref-link" data-dcnode-id="906" data-ref-style="fig" href="#F1"><span data-dcnode-id="907" instrument_node="">Figure 1</span></a><span data-dcnode-id="905" instrument_node="">).</span></p><span data-dcnode-id="903" instrument_node="">
</span><figure class="media-panel" data-dcnode-id="893" id="F1"><div class="media" data-dcnode-id="901"><img alt="" class="figure-link" data-dcnode-id="902" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/media/chapter/67342/media/F1.png&amp;raw"></div><figcaption class="caption" data-dcnode-id="894"><h4 data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Figure 1.</span></h4><p data-dcnode-id="898"></p><p data-dcnode-id="896" id="p7" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="897" instrument_node="">Amman City, Jordan (past and present).</span></p><p data-dcnode-id="895"></p></figcaption></figure><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="887" id="p8"><span data-dcnode-id="891" instrument_node="">The World Heritage Convention recognizes that heritage can be defined as “monuments, group of buildings, and sites.” There is a wide range of styles including urban cities, archeological sites, industrial heritage, cultural landscapes, and heritage roads. This increases the scope of places and landscapes that must be managed by heritage managers. By this definition, heritage is not only buildings such as worship places or fortresses and castles, which were considered as independent places of its own not related to its urban environment. Today, heritage represents the whole environment that is influenced by its interaction with humanity and is therefore qualified to be recognized as a heritage [</span><a class="ref-link" data-dcnode-id="889" data-ref-style="bibr" href="#B2"><span data-dcnode-id="890" instrument_node="">2</span></a><span data-dcnode-id="888" instrument_node="">].</span></p><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="881" id="p9"><span data-dcnode-id="885" instrument_node="">There are several definitions of architectural and urban heritage preservation. For example, Elias considered that “conservation is a set of procedure which guarantee the protection of the architectural and historical characteristics of the important old areas and buildings, such as repairing, removing erosion and sedimentation signs, and securing acceptable standards for the protection of open spaces and squares. These emphasize the importance of urban preservation and the need for the functional continuity of these areas and buildings” [</span><a class="ref-link" data-dcnode-id="883" data-ref-style="bibr" href="#B3"><span data-dcnode-id="884" instrument_node="">3</span></a><span data-dcnode-id="882" instrument_node="">]. This means preserving the heritage while insisting on keeping up and responding to the modern urban fabric of the city as a whole.</span></p><span data-dcnode-id="880" instrument_node="">
</span><p data-dcnode-id="875" id="p10"><span data-dcnode-id="879" instrument_node="">Feilden defines the cultural heritage by making the architectural heritage an important part of it, because it is “the physical image and material embodiment of unique human components in which man is the basis of creation, creativity and production” [</span><a class="ref-link" data-dcnode-id="877" data-ref-style="bibr" href="#B4"><span data-dcnode-id="878" instrument_node="">4</span></a><span data-dcnode-id="876" instrument_node="">]. Since the ruined or heritage building cannot be separated from its urban surroundings, therefore, urban conservation is what we should seek.</span></p><span data-dcnode-id="874" instrument_node="">
</span><p data-dcnode-id="872" id="p11"><span data-dcnode-id="873" instrument_node="">Today, in contemporary cities, there is a rapid population growth leading to the expansion of contemporary cities, and with the loss of most master plans of cities, the relationship between ancient and contemporary has become an issue that has been addressed in many researches. This makes us responsible for developing today’s cities, especially our historic cities for the future. As a result, future cities must be based on the past, living in the present, and evolving in the future through a coherent chain that meets the needs of all people in any age.</span></p><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="869" id="p12"><span data-dcnode-id="870" instrument_node="">Cities that lack memory, away from their past, and do not preserve their heritage and identity cannot build their own future, which make them vulnerable to destruction.</span></p><span data-dcnode-id="868" instrument_node="">
</span><p data-dcnode-id="866" id="p13"><span data-dcnode-id="867" instrument_node="">This leads us to the importance of studying the term “urban conservation.”</span></p><span data-dcnode-id="865" instrument_node="">
</span><p data-dcnode-id="860" id="p14"><span data-dcnode-id="864" instrument_node="">Urban conservation is “a process that focuses on the quality of urban environment by developing a program to protect cities and urban areas from environmental and optical pollution” [</span><a class="ref-link" data-dcnode-id="862" data-ref-style="bibr" href="#B5"><span data-dcnode-id="863" instrument_node="">5</span></a><span data-dcnode-id="861" instrument_node="">].</span></p><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="857" id="p15"><span data-dcnode-id="858" instrument_node="">The definition highlights the importance of restoration as an essential part of conservation procedure, regardless of the way or the area covered by preservation, whether it is a single building, urban fabric, or an entire city. They are maintained through different methods depending on the state of the building, the factors that led to the deterioration, its original or required function, and the proposed function.</span></p><span data-dcnode-id="856" instrument_node="">
</span><p data-dcnode-id="851" id="p16"><span data-dcnode-id="855" instrument_node="">We must understand and pay attention to preserving the traditional urban fabric, at least in the case of heritage loss and the addition of the modern element, as what happened in Leipzig. It happened also in Vienna, with a clear harmony between the old and the modern by preserving the important monuments and morphology of the city (</span><a class="ref-link" data-dcnode-id="853" data-ref-style="fig" href="#F2"><span data-dcnode-id="854" instrument_node="">Figure 2</span></a><span data-dcnode-id="852" instrument_node="">).</span></p><span data-dcnode-id="850" instrument_node="">
</span><figure class="media-panel" data-dcnode-id="840" id="F2"><div class="media" data-dcnode-id="848"><img alt="" class="figure-link" data-dcnode-id="849" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/media/chapter/67342/media/F2.png&amp;raw"></div><figcaption class="caption" data-dcnode-id="841"><h4 data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Figure 2.</span></h4><p data-dcnode-id="845"></p><p data-dcnode-id="843" id="p17" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="844" instrument_node="">Urban preservation by figuring out the harmony between the old and the present.</span></p><p data-dcnode-id="842"></p></figcaption></figure><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="834" id="p18"><span data-dcnode-id="838" instrument_node="">We found a beautiful harmony between the old and the present, as well as preserving this harmony in Danzig (located Northern Poland) from war damages [</span><a class="ref-link" data-dcnode-id="836" data-ref-style="bibr" href="#B6"><span data-dcnode-id="837" instrument_node="">6</span></a><span data-dcnode-id="835" instrument_node="">]. In Baku, Azerbaijan, the preservation of the internal order of the urban fabric was observed. This means the preservation of the urban structures, roads, and historic buildings. In Baku, it allowed us to find a new urban pattern, linked successfully to the old type.</span></p><span data-dcnode-id="833" instrument_node="">
</span><p data-dcnode-id="831" id="p19"><span data-dcnode-id="832" instrument_node="">Accordingly, urban conservation in historical cities can be achieved during its expansion, in an attempt to meet the requirements of the age. This can be achieved through applying the urban renewal policies that attempt to preserve the urban fabric and the city’s inherited structure, as well as the urban flow of modern requirements, without forgetting the harmony of the architectural type of buildings and surroundings.</span></p><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="825" id="p20"><span data-dcnode-id="829" instrument_node="">Heritage is a moral and material entity. Therefore, preserving it is a necessity in urban renewal policies of cities in all countries of the world, especially cities with historical depth, to achieve historical sustainability. The policy of maintaining their differences can stop the deterioration and the decline of the traditional and historical urban fabric [</span><a class="ref-link" data-dcnode-id="827" data-ref-style="bibr" href="#B7"><span data-dcnode-id="828" instrument_node="">7</span></a><span data-dcnode-id="826" instrument_node="">].</span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="822" id="p21"><span data-dcnode-id="823" instrument_node="">Countries with special cultural heritage provide a humanitarian service to the world community and its society in particular. Therefore, many international organizations are interested in preserving the heritage and providing emotional, scientific, and material support to many countries such as UNESCO, Arab Towns Organizations, Aga Khan Institute, and others.</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="816" id="p22"><span data-dcnode-id="820" instrument_node="">There are many countries through UNESCO which provide material and scientific support in order to save heritage in other countries of the world [</span><a class="ref-link" data-dcnode-id="818" data-ref-style="bibr" href="#B8"><span data-dcnode-id="819" instrument_node="">8</span></a><span data-dcnode-id="817" instrument_node="">].</span></p><span data-dcnode-id="815" instrument_node="">
</span></div><span data-dcnode-id="813" instrument_node="">
</span></div><span data-dcnode-id="811" instrument_node="">
</span><div class="section" data-dcnode-id="564" data-lvl="1" id="sec_5"><span data-dcnode-id="810" instrument_node="">
</span><a class="ads-link" data-dcnode-id="808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ehealthcaresolutions.com/contact-us/" target="_blank"><span data-dcnode-id="809" instrument_node="">Advertisement</span></a><span data-dcnode-id="807" instrument_node="">
</span><div class="ads" data-dcnode-id="806" id="intechopen-intechopen-4"></div><h2 class="heading main-title" data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">4. Conservation methods and policies</span></h2><span data-dcnode-id="803" instrument_node="">
</span><div class="section" data-dcnode-id="777" data-lvl="2" id="sec_5_2"><span data-dcnode-id="802" instrument_node="">
</span><h3 class="heading section-title" data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">4.1 Methods and policies of conservation</span></h3><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="797" id="p23"><span data-dcnode-id="798" instrument_node="">Conservation methods are consolidation, reproduction, reconstruction, preservation, deterioration perversion, rehabilitation, and restoration.</span></p><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="794" id="p24"><span data-dcnode-id="795" instrument_node="">The cultural awareness of the importance of heritage preservation in general, architectural and urban heritage in particular, was more evident after World War II in the twentieth century. Several policies were applied in the old cities and historical areas of Europe after World War II, including the removal and compensation policy. There is a reconstruction policy which deals with the replanning and constructing the areas that have been completely destroyed.</span></p><span data-dcnode-id="793" instrument_node="">
</span><p data-dcnode-id="788" id="p25"><span data-dcnode-id="792" instrument_node="">In addition to the conservation and preservation policy, which is concerned with the urban, social, and economic environment in order to preserve the buildings, the fabric and the special urban character of the old city, the use of inherited buildings, and their fabric to suit the age without affecting building exterior represents the policy of reuse and refunction. Once the adopted policy maintains to preserve the building, which extends to the surrounding area by intervening with the inherited buildings (renovation, restoration, maintenance, and reuse) and to its historical surroundings, we have to adopt the rehabilitation method. In addition, we have restoration policy, and when we put the criteria and conditions to ensure the survival of these buildings in the urban framework, this will call the protection policy, which are related to the restoration and renewal policy of inheritances [</span><a class="ref-link" data-dcnode-id="790" data-ref-style="bibr" href="#B9"><span data-dcnode-id="791" instrument_node="">9</span></a><span data-dcnode-id="789" instrument_node="">].</span></p><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="785" id="p26"><span data-dcnode-id="786" instrument_node="">Keeping up with the architectural and urban heritage is achieved through the process of rehabilitation and reuse within a different age other than the one that produced these inheritances. This can be achieved through selecting a suitable contemporary function, which is not impossible, but it is very difficult and complex, where several factors overlap in order to get the balance to reach an acceptable outcome and achieve a successful experience.</span></p><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="779" id="p27"><span data-dcnode-id="783" instrument_node="">The specialists must balance between these factors and influences and consider them, starting from the nature of the inheritance, its internal spaces, their size, distribution and its absorption of new activities, and the value of historical and architectural heritage. The type of the proposed function comes from the origin of the adopted function of the inheritance that is derived from its location, the time of construction, and the most important events associated with it in addition to its architectural and urban style. The ownership of the inheritance is considered to have a significant impact on the process of its functional rehabilitation, since the responsible authorities cannot preserve the heritage when it is considered as private property. The selected function should be homogeneous with the surrounding urban fabric and should be achieved with the least amount of modifications [</span><a class="ref-link" data-dcnode-id="781" data-ref-style="bibr" href="#B10"><span data-dcnode-id="782" instrument_node="">10</span></a><span data-dcnode-id="780" instrument_node="">].</span></p><span data-dcnode-id="778" instrument_node="">
</span></div><span data-dcnode-id="776" instrument_node="">
</span><div class="section" data-dcnode-id="742" data-lvl="2" id="sec_6_2"><span data-dcnode-id="775" instrument_node="">
</span><h3 class="heading section-title" data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">4.2 Rehabilitation of heritage buildings</span></h3><span data-dcnode-id="772" instrument_node="">
</span><p data-dcnode-id="770" id="p28"><span data-dcnode-id="771" instrument_node="">The preservation of heritage, and in particular architectural heritage, goes through several stages, starting with documentation, collection of enough data and information about each heritage, documentation by photos, architectural plans, tables, etc.</span></p><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="767" id="p29"><span data-dcnode-id="768" instrument_node="">By teaching the following course, “Preserving Architectural Heritage,” I realized the importance of connecting the theoretical aspect with the practical one, where the student learns the scientific stages that he/she should follow for the success of the heritage preserving process.</span></p><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="764" id="p30"><span data-dcnode-id="765" instrument_node="">After placing students into groups, they were asked to submit a conservation study of a preserved single building or a group of historical or heritage buildings without proper contemporary use or the lack of documentation or those that deserve to be preserved but neglected. Students were then asked to document, study, and analyze them to choose a contemporary function, which allows heritage building or group of buildings to achieve heritage sustainability in the current age. In the case of rehabilitated heritage buildings, the present function is evaluated and we propose another one to be developed according to the standards and the scientific foundations, which were adopted in this regard. Anyway, it is a direct means of documenting these achievements and preserving them from loss, and reviving them for our contemporary life and for the future of generations, which preserves the nation’s memory.</span></p><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="761" id="p31"><span data-dcnode-id="762" instrument_node="">The heritage preservation process of inherited models is provided through:</span></p><ul data-dcnode-id="748"><li data-dcnode-id="758"><p data-dcnode-id="759" id="p32"><span data-dcnode-id="760" instrument_node="">Registering</span></p></li><li data-dcnode-id="755"><p data-dcnode-id="756" id="p33"><span data-dcnode-id="757" instrument_node="">Describing</span></p></li><li data-dcnode-id="752"><p data-dcnode-id="753" id="p34"><span data-dcnode-id="754" instrument_node="">Taking photos to preserve its features</span></p></li><li data-dcnode-id="749"><p data-dcnode-id="750" id="p35"><span data-dcnode-id="751" instrument_node="">Measuring its size to draw its plan accurately</span></p></li></ul><p data-dcnode-id="747"></p><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="744" id="p36"><span data-dcnode-id="745" instrument_node="">This is done by conducting a comprehensive field survey of the inherited stocks with interviews of specialists and persons involved in the inherited architectural or urban model. In addition to relying on the literature and sources that can provide us with data, information, and documents that make preservation (and often rehabilitation) an accurate and calculated process, which increases the value of architectural and urban heritage and is not a reason to harm it if it is based on inaccurate data and information, the results of this documentation are proved in tables, records, and maps to facilitate the heritage whenever necessary, whether at the stage of the preserving decision of those inherited models or while maintaining and restoring them to prepare them for new or previous use after making the inheritance suitable and compatible with our age.</span></p><span data-dcnode-id="743" instrument_node="">
</span></div><span data-dcnode-id="741" instrument_node="">
</span><div class="section" data-dcnode-id="684" data-lvl="2" id="sec_7_2"><span data-dcnode-id="740" instrument_node="">
</span><h3 class="heading section-title" data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">4.3 Choosing appropriate function</span></h3><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="735" id="p37"><span data-dcnode-id="736" instrument_node="">At this stage, there are a lot of difficulties linked to multiple aspects to ensure the proper selection of the new use; many of the traditional models suffered from damage and loss due to poor preservation and bad selection of function. The traditional model site, its architectural value, its original function, distribution of its spaces, their size, services, and its ownership are the factors behind the selection of the new suitable function.</span></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="732" id="p38"><span data-dcnode-id="733" instrument_node="">And preparing the historical model for the its new use, based on the fact that space, as Schulz sees, meets the needs of man in a way that creates a close relationship with his environment, and so space is embodied in architecture, which achieves useful and symbolic purpose. The first useful purpose can be achieved by meeting human’s needs and his various activities within a comfortable environment, and the second purpose is achieved through the meanings and expressions that space provides to its occupants.</span></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="729" id="p39"><span data-dcnode-id="730" instrument_node="">The task of selecting the appropriate function in the old heritance rehabilitation is not easy. Some difficulties may arise from the fact that the selection process is subject to multiple factors and different influences. The team of specialists that maintain and rehabilitate must balance all of them. The type of the function often is derived from the origin of the adopted function of the inheritance and that came from its origin, time of its construction, and most important events related to it, in addition to its architectural and urban type.</span></p><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="726" id="p40"><span data-dcnode-id="727" instrument_node="">The ownership of the inheritance has a significant impact on its functional rehabilitation, especially when it is a private property. The owner should be aware of the value of the inheritance and preserve it to achieve cooperation with the responsible authorities (either governmental or otherwise).</span></p><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="723" id="p41"><span data-dcnode-id="724" instrument_node="">The selected function should suitably relate to the inherited environment and with minimal changes to harmonize between the new proposed use and with the old use, so that they will pay a reasonable cost for that change. In addition, that process will be done with the least cost, effort, and time. We should take into account the variable usage from time to time for the inheritance.</span></p><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="717" id="p42"><span data-dcnode-id="721" instrument_node="">An example of heritage building rehabilitation is the building of the Consulate of Tuscany (</span><a class="ref-link" data-dcnode-id="719" data-ref-style="fig" href="#F3"><span data-dcnode-id="720" instrument_node="">Figure 3</span></a><span data-dcnode-id="718" instrument_node="">). It was built in the second half of the eighteenth century under the reign of Ali Pasha al-Qara Manli, who ruled Tripoli, Libya, from 1754 to 1793. It is considered as one of the most beautiful houses in Tripoli, known as Hosh Al Hareem (courtyard of women). It was used in the Second Ottoman Period as the Consulate of Tuscany. This building was restored and then opened in 1994 to be a building for folk collections and historical fashion in the name of “Tripoli Historic Exhibition of Folk Collections and Historical Fashion.”</span></p><span data-dcnode-id="716" instrument_node="">
</span><figure class="media-panel" data-dcnode-id="703" id="F3"><div class="media" data-dcnode-id="714"><img alt="" class="figure-link" data-dcnode-id="715" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/media/chapter/67342/media/F3.png&amp;raw"></div><figcaption class="caption" data-dcnode-id="704"><h4 data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Figure 3.</span></h4><p data-dcnode-id="711"></p><p data-dcnode-id="706" id="p43" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="710" instrument_node="">The central courtyard of the Consulate of Tuscany, which is now the Historical Exhibition of Tripoli, Libya [</span><xref data-dcnode-id="708" ref-type="bibr" rid="B11"><span data-dcnode-id="709" instrument_node="">11</span></xref><span data-dcnode-id="707" instrument_node="">].</span></p><p data-dcnode-id="705"></p></figcaption></figure><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="697" id="p44"><span data-dcnode-id="701" instrument_node="">We have also Al Azem Palace in Damascus, Syria (</span><a class="ref-link" data-dcnode-id="699" data-ref-style="fig" href="#F4"><span data-dcnode-id="700" instrument_node="">Figure 4</span></a><span data-dcnode-id="698" instrument_node="">), which is one of the most impressive residential buildings in Syria, built in the eighteenth century, and was originally the residence of the ruler. Later, the palace became the museum of art and folk traditions in Syria. It has a traditional style and is divided into two parts, which consists of the official area, bathrooms, and exterior buildings. Each room embodies a particular social situation. Wax dolls are used in the museum to embody the characters that tell the story of the place and time.</span></p><span data-dcnode-id="696" instrument_node="">
</span><figure class="media-panel" data-dcnode-id="686" id="F4"><div class="media" data-dcnode-id="694"><img alt="" class="figure-link" data-dcnode-id="695" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/media/chapter/67342/media/F4.png&amp;raw"></div><figcaption class="caption" data-dcnode-id="687"><h4 data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Figure 4.</span></h4><p data-dcnode-id="691"></p><p data-dcnode-id="689" id="p45" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="690" instrument_node="">The distinctive architecture in Al Azem Palace, Damascus (which is a residential building reused to be a museum).</span></p><p data-dcnode-id="688"></p></figcaption></figure><span data-dcnode-id="685" instrument_node="">
</span></div><span data-dcnode-id="683" instrument_node="">
</span><div class="section" data-dcnode-id="566" data-lvl="2" id="sec_8_2"><span data-dcnode-id="682" instrument_node="">
</span><h3 class="heading section-title" data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">4.4 Space modifying with the new function</span></h3><span data-dcnode-id="679" instrument_node="">
</span><p data-dcnode-id="677" id="p46"><span data-dcnode-id="678" instrument_node="">This stage was formed through the changing and modifying of the internal and urban spaces and their designed elements. In order to employ it in line with the revival of the heritage model, the users’ needs and the new function requirements, at the level of all interior design elements and without affecting the value of the historical, architectural, and esthetic heritage model, and the different services that are required by the age when the model was rehabilitated.</span></p><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="674" id="p47"><span data-dcnode-id="675" instrument_node="">Any defect in the space rehabilitation process is a failure in the process of preservation and rehabilitation, which will result in the same damage of not selecting the appropriate function, accurate rehabilitation, and in maintaining, registering, and documenting the traditional models. These spatial adaptations are not only at the level of the internal space elements of the architectural heritage, but also include the required spatial adaptations in the open spaces, in the inherited urban fabric, and the required changes to suit the chosen functions of this inherited urban area. The suitable choosing of new function is based on its centrality within the fabric of the city, its relationship with the surrounding planning units, the historical roots and original functions, as well as the impact of the new functions proposed to rehabilitate the inherited urban area, and the nature of the heritage buildings. In addition, of its age and the state of its construction and other influences that is the formation of space, then adapting it in line with the requirements of the age and the users’ needs of the inherited urban fabric.</span></p><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="671" id="p48"><span data-dcnode-id="672" instrument_node="">In Tripoli, Libya, we can find the Izmeet Hotel, founded in 1816 and used since its establishment in the First Ottoman era as a hotel and a forum for caravan traders between Europe, North Africa, Countries of Africa, and beyond the Sahara. Izmeet Hotel is located in Bab El Bahr, near the port of Tripoli, not far from the Roman Marcus Aurelius, the Roman ruins of the city.</span></p><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="665" id="p49"><span data-dcnode-id="669" instrument_node="">This hotel has been renovated, maintained, designed, furnished, reused, and rehabilitated. It operated for 5 years. It consists of two floors with 10 rooms and 14 suites provided with all services. It includes a dining hall, an Arabic session, a coffee shop, and a room equipped with Internet. The whole parts of the hotel are furnished with traditionally handmade pieces (</span><a class="ref-link" data-dcnode-id="667" data-ref-style="fig" href="#F5"><span data-dcnode-id="668" instrument_node="">Figure 5</span></a><span data-dcnode-id="666" instrument_node="">).</span></p><span data-dcnode-id="664" instrument_node="">
</span><figure class="media-panel" data-dcnode-id="654" id="F5"><div class="media" data-dcnode-id="662"><img alt="" class="figure-link" data-dcnode-id="663" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/media/chapter/67342/media/F5.png&amp;raw"></div><figcaption class="caption" data-dcnode-id="655"><h4 data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Figure 5.</span></h4><p data-dcnode-id="659"></p><p data-dcnode-id="657" id="p50" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="658" instrument_node="">An old building that has been preserved and rehabilitated as a hotel (Libya).</span></p><p data-dcnode-id="656"></p></figcaption></figure><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="648" id="p51"><span data-dcnode-id="652" instrument_node="">Modifications can be made on some traditional houses to be used for administrative purposes, as is the case with two houses in Baghdad, Iraq (</span><a class="ref-link" data-dcnode-id="650" data-ref-style="fig" href="#F6"><span data-dcnode-id="651" instrument_node="">Figure 6</span></a><span data-dcnode-id="649" instrument_node="">).</span></p><span data-dcnode-id="647" instrument_node="">
</span><figure class="media-panel" data-dcnode-id="637" id="F6"><div class="media" data-dcnode-id="645"><img alt="" class="figure-link" data-dcnode-id="646" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/media/chapter/67342/media/F6.png&amp;raw"></div><figcaption class="caption" data-dcnode-id="638"><h4 data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Figure 6.</span></h4><p data-dcnode-id="642"></p><p data-dcnode-id="640" id="p52" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="641" instrument_node="">Traditional Baghdadi houses that have been rehabilitated for administrative use.</span></p><p data-dcnode-id="639"></p></figcaption></figure><span data-dcnode-id="636" instrument_node="">
</span><p data-dcnode-id="634" id="p53"><span data-dcnode-id="635" instrument_node="">One of the heritage buildings that has been used and rehabilitated with a new function is the Khan Murjan building from the Mughal period. The Khan is famous for the beauty of its architecture, design, stone decoration, and the uniqueness of its arches. It is one of Baghdad’s most famous Khans. It was rebuilt by the Department of Archeology and Heritage and reused as the House of Antiquities and Heritage (administrative use) and then as the Museum of Islamic Art.</span></p><span data-dcnode-id="633" instrument_node="">
</span><p data-dcnode-id="622" id="p54"><span data-dcnode-id="632" instrument_node="">Khan Murjan is now a wonderful tourist restaurant consisting of two floors; the first floor contains 22 rooms and the second floor contains 23 rooms. The ceiling consists of eight huge arches. It includes a series of walls and vaults with different shapes and dimensions interspersed with windows. This type helps to provide natural lighting and reduces the amount of pressure caused by the weight of the arches [</span><a class="ref-link" data-dcnode-id="630" data-ref-style="bibr" href="#B12"><span data-dcnode-id="631" instrument_node="">12</span></a><span data-dcnode-id="629" instrument_node="">] (</span><a class="ref-link" data-dcnode-id="627" data-ref-style="fig" href="#F7"><span data-dcnode-id="628" instrument_node="">Figures 7</span></a><span data-dcnode-id="626" instrument_node=""> and </span><a class="ref-link" data-dcnode-id="624" data-ref-style="fig" href="#F8"><span data-dcnode-id="625" instrument_node="">8</span></a><span data-dcnode-id="623" instrument_node="">).</span></p><span data-dcnode-id="621" instrument_node="">
</span><figure class="media-panel" data-dcnode-id="611" id="F7"><div class="media" data-dcnode-id="619"><img alt="" class="figure-link" data-dcnode-id="620" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/media/chapter/67342/media/F7.png&amp;raw"></div><figcaption class="caption" data-dcnode-id="612"><h4 data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Figure 7.</span></h4><p data-dcnode-id="616"></p><p data-dcnode-id="614" id="p55" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="615" instrument_node="">Khan Murjan in Baghdad, Iraq.</span></p><p data-dcnode-id="613"></p></figcaption></figure><span data-dcnode-id="610" instrument_node="">
</span><figure class="media-panel" data-dcnode-id="600" id="F8"><div class="media" data-dcnode-id="608"><img alt="" class="figure-link" data-dcnode-id="609" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/media/chapter/67342/media/F8.png&amp;raw"></div><figcaption class="caption" data-dcnode-id="601"><h4 data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Figure 8.</span></h4><p data-dcnode-id="605"></p><p data-dcnode-id="603" id="p56" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="604" instrument_node="">Khan Murjan was built since Mughal period in Baghdad, Iraq.</span></p><p data-dcnode-id="602"></p></figcaption></figure><span data-dcnode-id="599" instrument_node="">
</span><p data-dcnode-id="597" id="p57"><span data-dcnode-id="598" instrument_node="">As for the most appropriate contemporary functions that are selected to rehabilitate the heritage for preservation, the most specialized specialists in architecture, history, heritage, archeology, arts, maintenance, and interior design, who have distinct interests in preserving the inheritance have agreed that:</span></p><ul data-dcnode-id="572"><li data-dcnode-id="594"><p data-dcnode-id="595" id="p58"><span data-dcnode-id="596" instrument_node="">Cultural functions (museums, libraries, art galleries, exhibition halls, scientific and cultural centers, etc.) are at the top of the list of selected functions because they extend the age of the inheritance and do not harm it in the future. They are also compatible with the historical roots and the symbolic and architectural values of heritage.</span></p></li><li data-dcnode-id="591"><p data-dcnode-id="592" id="p59"><span data-dcnode-id="593" instrument_node="">These functions are often cultural tourism followed by tourist functions:</span></p></li><li data-dcnode-id="588"><p data-dcnode-id="589" id="p60"><span data-dcnode-id="590" instrument_node="">Educational functions</span></p></li><li data-dcnode-id="585"><p data-dcnode-id="586" id="p61"><span data-dcnode-id="587" instrument_node="">Residential functions</span></p></li><li data-dcnode-id="582"><p data-dcnode-id="583" id="p62"><span data-dcnode-id="584" instrument_node="">Entertainment functions</span></p></li><li data-dcnode-id="579"><p data-dcnode-id="580" id="p63"><span data-dcnode-id="581" instrument_node="">Administrative functions</span></p></li><li data-dcnode-id="576"><p data-dcnode-id="577" id="p64"><span data-dcnode-id="578" instrument_node="">Commercial functions</span></p></li><li data-dcnode-id="573"><p data-dcnode-id="574" id="p65"><span data-dcnode-id="575" instrument_node="">Health functions</span></p></li></ul><p data-dcnode-id="571"></p><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="568" id="p66"><span data-dcnode-id="569" instrument_node="">Industrial function is one of the most harmful functions for the inherited buildings and inherited urban fabric, because this function results in damage and cracks in the body of the inheritance that causes loss over time. In the Aleppo preservation experience, the cultural tourism uses achieved the highest use, and there is almost no industrial function in the old fabric.</span></p><span data-dcnode-id="567" instrument_node="">
</span></div><span data-dcnode-id="565" instrument_node="">
</span></div><span data-dcnode-id="563" instrument_node="">
</span><div class="section" data-dcnode-id="533" data-lvl="1" id="sec_10"><span data-dcnode-id="562" instrument_node="">
</span><a class="ads-link" data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ehealthcaresolutions.com/contact-us/" target="_blank"><span data-dcnode-id="561" instrument_node="">Advertisement</span></a><span data-dcnode-id="559" instrument_node="">
</span><div class="ads" data-dcnode-id="558" id="intechopen-intechopen-6"></div><h2 class="heading main-title" data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">5. Conclusion</span></h2><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="553" id="p67"><span data-dcnode-id="554" instrument_node="">Attempts to preserve historical cities and cultural heritage are very few compared to the historical richness of the world. We highlight the historical identity when preserving our heritage. It is necessary to increase the degree of interest that strengthens the balance between historical and heritage wealth and the achievements of preserving it.</span></p><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="550" id="p68"><span data-dcnode-id="551" instrument_node="">The preservation of heritage in all its forms poses a number of unique problems. The issue must consider in terms of the cultural, economic, and political values of the society in which it exists. The problem of financing is one of the most important obstacles to accomplish this task. It is necessary to cooperate with the governmental and private sectors at the local level. It is also possible to involve the international institutes interested in this aspect, because heritage is a human achievement.</span></p><span data-dcnode-id="549" instrument_node="">
</span><p data-dcnode-id="547" id="p69"><span data-dcnode-id="548" instrument_node="">The participation of people in preserving their heritage, identity, and awareness of its importance is considered as an effective factor in achieving the sustainability of these inheritances through a successful program of sustainable development. The legislation and administrative procedures are important for the success of conservation operations.</span></p><span data-dcnode-id="546" instrument_node="">
</span><p data-dcnode-id="544" id="p70"><span data-dcnode-id="545" instrument_node="">This can be achieved through granting people incentives and supporting them to participate in maintaining to encourage them stay in the city and preserve it. It is necessary to study the environmental importance of the old city, open spaces, gardens, and infrastructure, and involve the population in developing protection plans in cooperation with the competent authority. It is also useful to encourage tourism to the old city without harming it. This makes the population feel that they are materially benefiting from the tourists and that their cultural property deserves maintenance and protection because it is part of the world heritage.</span></p><span data-dcnode-id="543" instrument_node="">
</span><p data-dcnode-id="541" id="p71"><span data-dcnode-id="542" instrument_node="">Therefore, this awareness should start from people, society, and enterprise to achieve our goal of preserving heritage buildings and historic cities, in order to preserve the cultural and urban identity. We should also bear in mind the importance of the contribution of heritage protection in sustainability and sustainable development, which varies from case to another, during the three “pillars”: the social dimension, the economic, and the environmental dimension.</span></p><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="538" id="p72"><span data-dcnode-id="539" instrument_node="">Finally, we must emphasize that the overlap of several aspects is needed to achieve a successful preservation experience of a city. These aspects are planning, designing, housing and construction, laws and legislation as well as the field of tourism, preservation of the architectural heritage, infrastructure, services, environment and community participation with media to activate the sense of responsibility, awareness of the importance of the city, and its cultural and historical value.</span></p><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="535" id="p73"><span data-dcnode-id="536" instrument_node="">Conservation should also include traditional and local architecture, as it always places the option of preserving through rehabilitation and letting the inherited buildings up-to-date.</span></p><span data-dcnode-id="534" instrument_node="">
</span></div><span data-dcnode-id="532" instrument_node="">
