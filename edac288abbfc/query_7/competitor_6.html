></a><span data-dcnode-id="842" instrument_node="">

</span><p data-dcnode-id="833"><span data-dcnode-id="834" style="font-style: normal;font-size: 12pt"><span data-dcnode-id="838" instrument_node="">Kidney stones are one common health problem that has been completely misdiagnosed for years. What’s worse, even though we now know the cause of kidney stones, some doctors are </span><u data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">still</span></u><span data-dcnode-id="835" instrument_node=""> giving their patients the wrong advice! </span></span></p><span data-dcnode-id="832" instrument_node="">
</span><span data-dcnode-id="830" instrument_node="">
</span><div class="" data-dcnode-id="829" style="width: 100%; box-sizing: border-box"></div><span data-dcnode-id="828" instrument_node="">
</span><span data-dcnode-id="826" instrument_node="">
</span><span data-dcnode-id="824" instrument_node="">
</span><div class="" data-dcnode-id="823" style="width: 100%; box-sizing: border-box"></div><span data-dcnode-id="822" instrument_node="">
</span><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="817"><span data-dcnode-id="818" style="font-size: 12pt;"><span data-dcnode-id="819" instrument_node="">The Medical profession used to think that kidney stones were the result of having too much calcium in the body. So what doctors would do is tell their patients to cut out all foods containing calcium, especially dairy foods.</span></span></p><p data-dcnode-id="811"><span data-dcnode-id="812" style="font-size: 12pt;"><span data-dcnode-id="816" instrument_node="">But kidney stones are not the result of having too much calcium in the body, instead, they actually come from your&nbsp;</span><u data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">own</span></u><span data-dcnode-id="813" instrument_node="">&nbsp;bones when you have a raging calcium deficiency!</span></span></p><span data-dcnode-id="810" instrument_node="">
</span><h2 data-dcnode-id="806"><span data-dcnode-id="807" style="font-size:14.0pt;"><br data-dcnode-id="809"><span data-dcnode-id="808" instrument_node="">Your Body is
Attacking and Consuming its Own Bones!</span></span></h2><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="799"><span data-dcnode-id="800" style="font-size:12.0pt;"><span data-dcnode-id="804" instrument_node="">The human
body needs calcium everyday to perform thousands of different processes. If
there isn’t enough coming from the diet, it will take what it needs from the
next best place, which of course is the bones. So it will basically “eat up”&nbsp;its own bones to get the calcium it
needs (a process called homeostasis).</span><a data-dcnode-id="801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Homeostasis" onclick="return FIX.track(this);" rel="noopener" target="_blank"><span data-dcnode-id="802" style="font-size: 6pt;"><span data-dcnode-id="803" instrument_node="">2</span></span></a></span></p><p data-dcnode-id="794"><span data-dcnode-id="795" style="font-size: 12pt"><u data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Kidney stones are the result of homeostasis</span></u><span data-dcnode-id="796" instrument_node="">. </span></span></p><p data-dcnode-id="791"><span data-dcnode-id="792" style="font-size: 12pt"><span data-dcnode-id="793" instrument_node="">These “stones” are crystallized deposits of calcium, formed as a result of the kidney’s inability to filter through such a course textured form of calcium. </span></span></p><span data-dcnode-id="790" instrument_node="">
</span><span data-dcnode-id="788" instrument_node="">
</span><div class="" data-dcnode-id="787" style="width: 100%; box-sizing: border-box"></div><span data-dcnode-id="786" instrument_node="">
</span><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="779" style="font-size: 12pt"><span data-dcnode-id="783" instrument_node="">An article from Harvard Medical School published in March of 1993 confirms this. Titled </span><i data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">“Calcium Limits Kidney Stone Risk”</span></i><span data-dcnode-id="780" instrument_node=""> it says…</span></span></p><p data-dcnode-id="771"><span data-dcnode-id="772" style="font-size: 12pt"><i data-dcnode-id="773"><span data-dcnode-id="777" instrument_node="">In a study that turns conventional medical wisdom on its head, researchers have found that people whose diets are rich in calcium run a reduced risk of developing kidney stones. In a study of more than 45000 people who were ranked into five categories, the group that received the most calcium had no kidney stones.</span><a data-dcnode-id="774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kingmaker.net/DeadDoctorstxt.html%235.%2520Kidney%2520Stones" onclick="return FIX.track(this);" rel="noopener nofollow" target="_blank"><span data-dcnode-id="775" style="font-size: 8px;"><span data-dcnode-id="776" instrument_node="">1</span></span></a></i></span></p><span data-dcnode-id="770" instrument_node="">
</span><span data-dcnode-id="768" instrument_node="">
</span><div class="" data-dcnode-id="767" style="width: 100%; box-sizing: border-box"></div><span data-dcnode-id="766" instrument_node="">
</span><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="752"><span data-dcnode-id="762" style="font-size: 16px;"><span data-dcnode-id="763" instrument_node="">It’s also interesting to note here that most people who suffer from kidney stones also suffer with other calcium deficient diseases such as&nbsp;</span></span><a data-dcnode-id="760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifesavinghealth.org/arthritis-treatments-best.html" style="font-size: 16px;"><span data-dcnode-id="761" instrument_node="">arthritis</span></a><span data-dcnode-id="758" style="font-size: 16px;"><span data-dcnode-id="759" instrument_node="">,&nbsp;</span></span><a data-dcnode-id="756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifesavinghealth.org/home-remedies-for-bone-spurs-heal-spurs.html" style="font-size: 16px;"><span data-dcnode-id="757" instrument_node="">bone spurs</span></a><span data-dcnode-id="754" style="font-size: 16px;"><span data-dcnode-id="755" instrument_node="">, back and joint problems and periodontal disease (just to name a few), which also helps to confirm the strong link between a lack of calcium in the diet and kidney stones.</span></span><br data-dcnode-id="753"></p><span data-dcnode-id="751" instrument_node="">
</span><h3 data-dcnode-id="747"><span data-dcnode-id="748" style="font-size:14.0pt;"><br data-dcnode-id="750"><span data-dcnode-id="749" instrument_node="">Calcium is
One of the Best Treatments For Kidney Stones...</span></span></h3><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="743"><span data-dcnode-id="744" style="font-size: 12pt"><span data-dcnode-id="745" instrument_node="">The other benefit of calcium is it keeps the body oxygenated (alkalized pH) which is another theory as to why it helps to prevent kidney stones from forming. </span></span></p><p data-dcnode-id="740"><span data-dcnode-id="741" style="font-size: 12pt"><span data-dcnode-id="742" instrument_node="">Remember this… The Okinawa’s in Japan receive around &nbsp; &nbsp; 10,000 milligrams of coral calcium a day and they never get kidney stones. So don’t be afraid to supplement with extra calcium to keep kidney stones away!</span></span></p><p data-dcnode-id="728"><span data-dcnode-id="735" style="font-size: 12pt"><span data-dcnode-id="739" instrument_node="">If you are going to supplement with extra calcium (which we strongly recommend you do) just make sure you take an absorbable form of calcium like coral calcium (</span><a data-dcnode-id="737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//geni.us/CoralCalciumVitaminD3" onclick="return FIX.track(this);" rel="noopener nofollow" target="_blank"><span data-dcnode-id="738" instrument_node="">Bob's Best Coral Calcium</span></a><span data-dcnode-id="736" instrument_node="">) or calcium lactate, malate or aspartate, along with added magnesium, boron and vitamin D for extra absorption. We also highly recommend you take the time to read this handy article for more information on why you need these essential nutrients...</span></span><span data-dcnode-id="733" style="font-size: 12pt;"><span data-dcnode-id="734" instrument_node="">&nbsp;</span></span><a data-dcnode-id="731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifesavinghealth.org/arthritis-treatments-calcium-magnesium-boron-vitamin-d.html" style="font-size: 12pt;"><span data-dcnode-id="732" instrument_node="">Natural Arthritis Treatments</span></a><span data-dcnode-id="729" style="font-size: 12pt;"><span data-dcnode-id="730" instrument_node="">.&nbsp;</span></span></p><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="718"><span data-dcnode-id="719" style="font-size: 12pt"><span data-dcnode-id="726" instrument_node="">And while we’re on the subject of </span><a data-dcnode-id="724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//geni.us/vitaminD3" onclick="return FIX.track(this);" rel="noopener nofollow" target="_blank"><span data-dcnode-id="725" instrument_node="">vitamin D</span></a><span data-dcnode-id="723" instrument_node="">, some web sites recommend you avoid vitamin D if you have kidney stones, but we believe these calls are ill founded. There hasn’t been one bit of evidence to prove that vitamin D is even a contributing factor for kidney stones. On the contrary, because this vitamin is so crucial for calcium absorption, it may actually be needed </span><u data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">more</span></u><span data-dcnode-id="720" instrument_node=""> for kidney stone prevention and treatment - not less! (Opinion only of course). </span></span></p><span data-dcnode-id="717" instrument_node="">
</span><div class="ImageBlock ImageBlockRight" data-dcnode-id="715"><img data-dcnode-id="716" data-pin-media="https://www.lifesavinghealth.org/images/vitamins.jpg" height="201.694915254237" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifesavinghealth.org/images/vitamins.jpg&amp;raw" style="width: 238px; height: auto" width="238"></div><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="706" style="font-size: 12pt"><span data-dcnode-id="713" instrument_node="">The RDA for calcium is 1500 mg’s a day, but this is just way too low to have any beneficial effect. So it’s absolutely vital that you get </span><u data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">at least</span></u><span data-dcnode-id="710" instrument_node=""> 2000 mg’s a day of a highly absorbable, non dairy form of calcium. You cannot get this amount from your diet either (there is not enough calcium in our foods anymore) so you </span><b data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">must</span></b><span data-dcnode-id="707" instrument_node=""> take a form of dietary supplement every day.</span></span></p><span data-dcnode-id="704" instrument_node="">

the medical profession now blames every disease there is in the world on
genetics). The problem is medical doctors believe this theory to be true and
will try to convince you also.</span></span></p><p data-dcnode-id="654"><span data-dcnode-id="655" style="font-size: 12pt"><span data-dcnode-id="656" instrument_node="">Do not fall for it!</span></span></p><p data-dcnode-id="651"><span data-dcnode-id="652" style="font-size: 12pt"><span data-dcnode-id="653" instrument_node="">My father has suffered with kidney stones and gout (which are primarily calcium deficient diseases) for nearly 40 years, yet I’ve never had either. </span></span></p><p data-dcnode-id="648"><span data-dcnode-id="649" style="font-size: 12pt"><span data-dcnode-id="650" instrument_node="">Apparently, the prime age group for getting these ailments is between 20-40 years. </span></span></p><p data-dcnode-id="645"><span data-dcnode-id="646" style="font-size: 12pt"><span data-dcnode-id="647" instrument_node="">I’m now 52 and still waiting!</span></span></p><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="641"><span data-dcnode-id="642" style="font-size: 12pt;"><span data-dcnode-id="643" instrument_node="">So why don’t I get gout or kidney stones, even though I’m supposedly a perfect "family history" candidate?</span></span></p><p data-dcnode-id="638"><span data-dcnode-id="639" style="font-size: 12pt;"><span data-dcnode-id="640" instrument_node="">Well, I believe it’s because I take in plenty of the right forms of calcium, magnesium and boron and get out in the sun every day to get my quota of vitamin D - along with drinking wheat grass juice and green tea every day.</span></span></p><p data-dcnode-id="635"><span data-dcnode-id="636" style="font-size: 12pt;"><span data-dcnode-id="637" instrument_node="">…And I recommend you do the same thing too! </span></span></p><p data-dcnode-id="633"><br data-dcnode-id="634"></p><p data-dcnode-id="630"><span data-dcnode-id="631" style="font-size: 12pt;"><span data-dcnode-id="632" instrument_node="">Good luck and all the best.</span></span></p><p data-dcnode-id="628"><br data-dcnode-id="629"></p><span data-dcnode-id="627" instrument_node="">
