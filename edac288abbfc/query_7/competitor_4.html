523"><strong class="bread-current bread-42653" data-dcnode-id="2524" title="20 Proven Natural Remedies for Stiff Joints"><span data-dcnode-id="2525" instrument_node="">20 Proven Natural Remedies for Stiff Joints</span></strong></li></ul><span data-dcnode-id="2521" instrument_node=""> </span><div class="wrapper" data-dcnode-id="690"><span data-dcnode-id="2520" instrument_node=""> </span><div class="posts" data-dcnode-id="778"><span data-dcnode-id="2519" instrument_node=""> </span><article class="post-42653 post type-post status-publish format-standard hentry category-natural-remedies" data-dcnode-id="1022" id="post-42653"><span data-dcnode-id="2518" instrument_node=""> </span><div class="entry-header" data-dcnode-id="2495"><span data-dcnode-id="2517" instrument_node=""> </span><div class="post-info" data-dcnode-id="2501"><span data-dcnode-id="2516" instrument_node=""> </span><div class="author" data-dcnode-id="2508"><span data-dcnode-id="2515" instrument_node=""> </span><i aria-hidden="true" class="fa fa-pencil" data-dcnode-id="2514"></i><span data-dcnode-id="2513" instrument_node=""> Written by </span><span data-dcnode-id="2510" itemprop="name"><a data-dcnode-id="2511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthyline.com/author/lizziewendel/" rel="author" title="Posts by Lizzie Wendel"><span data-dcnode-id="2512" instrument_node="">Lizzie Wendel</span></a></span><span data-dcnode-id="2509" instrument_node=""> </span></div><span data-dcnode-id="2507" instrument_node=""> </span><div class="updated" data-dcnode-id="2503"><span data-dcnode-id="2506" instrument_node=""> </span><i aria-hidden="true" class="fa fa-calendar" data-dcnode-id="2505"></i><span data-dcnode-id="2504" instrument_node=""> Updated November 6, 2017 </span></div><span data-dcnode-id="2502" instrument_node=""> </span></div><span data-dcnode-id="2500" instrument_node=""> </span><meta content="2017-11-06T15:41:32-05:00" data-dcnode-id="2499" itemprop="datePublished"><span data-dcnode-id="2498" instrument_node=""> </span><meta content="2021-08-03T04:04:06-05:00" data-dcnode-id="2497" itemprop="dateModified"><span data-dcnode-id="2496" instrument_node=""> </span></div><span data-dcnode-id="2494" instrument_node=""> </span><hr data-dcnode-id="2493"><span data-dcnode-id="2492" instrument_node=""> </span><div class="entry-content" data-dcnode-id="1083"><span data-dcnode-id="2491" instrument_node=""> </span><h1 data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">20 Proven Natural Remedies for Stiff Joints</span></h1><span data-dcnode-id="2488" instrument_node=""> </span><p data-dcnode-id="2486"><span data-dcnode-id="2487" instrument_node="">If your joints hurt, then you certainly should read what follows.</span></p><span data-dcnode-id="2485" instrument_node=""> </span><p data-dcnode-id="2483"><span data-dcnode-id="2484" instrument_node="">We will deal comprehensively with what causes joint pain and what you can do about managing the problem.</span></p><span data-dcnode-id="2482" instrument_node=""> </span><p data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">We will discuss natural remedies that can help ease your pain and stiffness without any of the toxic effects of drugs.</span></p><span data-dcnode-id="2479" instrument_node=""> </span><p data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">You can try these natural remedies to ease your pain.</span></p><span data-dcnode-id="2476" instrument_node=""> </span><p data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">However, if you have a serious problem, then you really need to be evaluated and treated by a doctor.</span></p><span data-dcnode-id="2473" instrument_node=""> </span><p data-dcnode-id="2471"><span data-dcnode-id="2472" instrument_node="">Later, we will discuss the symptoms that indicate you should see a doctor.</span></p><span data-dcnode-id="2470" instrument_node=""> </span><p data-dcnode-id="2468"><span data-dcnode-id="2469" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2467" instrument_node=""> </span><h2 data-dcnode-id="2464"><strong data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">Why Do People Get Stiff Joints?</span></strong></h2><span data-dcnode-id="2463" instrument_node=""> </span><p data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2460" instrument_node=""> </span><p data-dcnode-id="2455"><span data-dcnode-id="2459" instrument_node="">Many people get </span><a data-dcnode-id="2457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthyline.com/joint-stiffness-and-pain-remedies/"><span data-dcnode-id="2458" instrument_node="">joint pain and stiffness</span></a><span data-dcnode-id="2456" instrument_node=""> as they age.</span></p><span data-dcnode-id="2454" instrument_node=""> </span><p data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">When you use your joints for many years, it takes a toll on them.</span></p><span data-dcnode-id="2451" instrument_node=""> </span><p data-dcnode-id="2449"><span data-dcnode-id="2450" instrument_node="">A lot of people get stiffness upon waking.</span></p><span data-dcnode-id="2448" instrument_node=""> </span><p data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">When you lie down overnight, the inactivity causes less lubricating fluid to be released into the joints.</span></p><span data-dcnode-id="2445" instrument_node=""> </span><p data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">This can make it more difficult to move your joints upon waking.</span></p><span data-dcnode-id="2442" instrument_node=""> </span><p data-dcnode-id="2440"><span data-dcnode-id="2441" instrument_node="">Stiffness in the joints might trouble you only for a brief period each day.</span></p><span data-dcnode-id="2439" instrument_node=""> </span><p data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">On the other hand, the stiffness might be a larger problem that impacts your mobility to a greater degree.</span></p><span data-dcnode-id="2436" instrument_node=""> </span><p data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">Sometimes pain and inflammation accompany the stiffness.</span></p><span data-dcnode-id="2433" instrument_node=""> </span><p data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">This can make using your joints very difficult.</span></p><span data-dcnode-id="2430" instrument_node=""> </span><p data-dcnode-id="2428"><span data-dcnode-id="2429" instrument_node="">Stiff joints are not always caused by aging.</span></p><span data-dcnode-id="2427" instrument_node=""> </span><p data-dcnode-id="2425"><span data-dcnode-id="2426" instrument_node="">Medical conditions such arthritis and lupus, as well as a person’s weight and diet, also can impact joint mobility.</span></p><span data-dcnode-id="2424" instrument_node=""> </span><p data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2421" instrument_node=""> </span><h2 data-dcnode-id="2418"><strong data-dcnode-id="2419"><span data-dcnode-id="2420" instrument_node="">Causes</span></strong></h2><span data-dcnode-id="2417" instrument_node=""> </span><p data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2414" instrument_node=""> </span><h3 data-dcnode-id="2411"><strong data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">Rheumatoid Arthritis</span></strong></h3><span data-dcnode-id="2410" instrument_node=""> </span><p data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2407" instrument_node=""> </span><p data-dcnode-id="2405"><span data-dcnode-id="2406" instrument_node="">The most typical cause of joint pain is arthritis.</span></p><span data-dcnode-id="2404" instrument_node=""> </span><p data-dcnode-id="2402"><span data-dcnode-id="2403" instrument_node="">Rheumatoid arthritis is a condition that afflicts around 1.5 million Americans.</span></p><span data-dcnode-id="2401" instrument_node=""> </span><p data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">People usually are affected by this condition between the ages of 30 and 60.</span></p><span data-dcnode-id="2398" instrument_node=""> </span><p data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">RA is a chronic inflammatory condition.</span></p><span data-dcnode-id="2395" instrument_node=""> </span><p data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node="">It is also an autoimmune condition, which means the immune system attacks your body; scientists haven’t discovered the reason why.</span></p><span data-dcnode-id="2392" instrument_node=""> </span><p data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">In this case, it attacks the lining of your joints. This results in inflammation, soreness, and stiffness.</span></p><span data-dcnode-id="2389" instrument_node=""> </span><p data-dcnode-id="2387"><span data-dcnode-id="2388" instrument_node="">It also can result in joint deformity and bone erosion.</span></p><span data-dcnode-id="2386" instrument_node=""> </span><p data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">RA has no known cure. The only option is managing the symptoms through regular treatment.</span></p><span data-dcnode-id="2383" instrument_node=""> </span><p data-dcnode-id="2381"><span data-dcnode-id="2382" instrument_node="">As the condition progresses, not much can be done to prevent disability.</span></p><span data-dcnode-id="2380" instrument_node=""> </span><p data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2377" instrument_node=""> </span><h3 data-dcnode-id="2374"><strong data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">Osteoarthritis</span></strong></h3><span data-dcnode-id="2373" instrument_node=""> </span><p data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2370" instrument_node=""> </span><p data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">Another type of arthritis is osteoarthritis, which affects over 30 million people in the U.S.</span></p><span data-dcnode-id="2367" instrument_node=""> </span><p data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">It generally occurs in people over the age of 65 and is caused by wear and tear on your joints.</span></p><span data-dcnode-id="2364" instrument_node=""> </span><p data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">The cartilage in your joints wears down with use; after a while, there is not sufficient cartilage to protect your bones.</span></p><span data-dcnode-id="2361" instrument_node=""> </span><p data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">OA most commonly affects the:</span></p><span data-dcnode-id="2358" instrument_node=""> </span><ul data-dcnode-id="2341" style="list-style-type:disc;"><span data-dcnode-id="2357" instrument_node=""> </span><li data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">knees</span></li><span data-dcnode-id="2354" instrument_node=""> </span><li data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node="">hips</span></li><span data-dcnode-id="2351" instrument_node=""> </span><li data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">fingers</span></li><span data-dcnode-id="2348" instrument_node=""> </span><li data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">neck</span></li><span data-dcnode-id="2345" instrument_node=""> </span><li data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">back</span></li><span data-dcnode-id="2342" instrument_node=""> </span></ul><span data-dcnode-id="2340" instrument_node=""> </span><p data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">After a time, other symptoms may occur. These include:</span></p><span data-dcnode-id="2337" instrument_node=""> </span><ul data-dcnode-id="2323" style="list-style-type:disc;"><span data-dcnode-id="2336" instrument_node=""> </span><li data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">pain</span></li><span data-dcnode-id="2333" instrument_node=""> </span><li data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">swelling</span></li><span data-dcnode-id="2330" instrument_node=""> </span><li data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">decreased range of motion</span></li><span data-dcnode-id="2327" instrument_node=""> </span><li data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">cracking sounds when the joint is in motion</span></li><span data-dcnode-id="2324" instrument_node=""> </span></ul><span data-dcnode-id="2322" instrument_node=""> </span><p data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">As the condition progresses, you may find that your bones break more easily.</span></p><span data-dcnode-id="2319" instrument_node=""> </span><p data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">You might get bone spurs. After a time, you may lose cartilage completely.</span></p><span data-dcnode-id="2316" instrument_node=""> </span><p data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">This can cause real disability.</span></p><span data-dcnode-id="2313" instrument_node=""> </span><p data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">OA can be treated. In severe cases, joint replacement might be necessary.</span></p><span data-dcnode-id="2310" instrument_node=""> </span><p data-dcnode-id="2308"><span data-dcnode-id="2309" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2307" instrument_node=""> </span><h3 data-dcnode-id="2304"><strong data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">Lupus</span></strong></h3><span data-dcnode-id="2303" instrument_node=""> </span><p data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2300" instrument_node=""> </span><p data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">Lupus is also an autoimmune disease.</span></p><span data-dcnode-id="2297" instrument_node=""> </span><p data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">It causes the immune system to attack the body’s organs and tissues.</span></p><span data-dcnode-id="2294" instrument_node=""> </span><p data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">Lupus is hard to diagnose because its symptoms are similar to other conditions.</span></p><span data-dcnode-id="2291" instrument_node=""> </span><p data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">There is no cure for lupus, but treatments can reduce and control the symptoms.</span></p><span data-dcnode-id="2288" instrument_node=""> </span><p data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2285" instrument_node=""> </span><h3 data-dcnode-id="2282"><strong data-dcnode-id="2283"><span data-dcnode-id="2284" instrument_node="">Bursitis</span></strong></h3><span data-dcnode-id="2281" instrument_node=""> </span><p data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2278" instrument_node=""> </span><p data-dcnode-id="2276"><span data-dcnode-id="2277" instrument_node="">The bursae are little sacs that cushion the different structures in your joints.</span></p><span data-dcnode-id="2275" instrument_node=""> </span><p data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">When those sacs become inflamed, you develop bursitis.</span></p><span data-dcnode-id="2272" instrument_node=""> </span><p data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">This results in stiffness and pain in the affected joint.</span></p><span data-dcnode-id="2269" instrument_node=""> </span><p data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">Bursitis happens most typically in the:</span></p><span data-dcnode-id="2266" instrument_node=""> </span><ul data-dcnode-id="2255" style="list-style-type:disc;"><span data-dcnode-id="2265" instrument_node=""> </span><li data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node="">elbow</span></li><span data-dcnode-id="2262" instrument_node=""> </span><li data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">shoulder</span></li><span data-dcnode-id="2259" instrument_node=""> </span><li data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">hip</span></li><span data-dcnode-id="2256" instrument_node=""> </span></ul><span data-dcnode-id="2254" instrument_node=""> </span><p data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">Bursitis is often temporary, and it is treated by resting the affected joint for a while.</span></p><span data-dcnode-id="2251" instrument_node=""> </span><p data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2248" instrument_node=""> </span><h3 data-dcnode-id="2245"><strong data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">Gout</span></strong></h3><span data-dcnode-id="2244" instrument_node=""> </span><p data-dcnode-id="2242"><span data-dcnode-id="2243" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2241" instrument_node=""> </span><p data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">Gout is a form of arthritis.</span></p><span data-dcnode-id="2238" instrument_node=""> </span><p data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">It happens when crystals of uric acid form between the joints. Treatments are available.</span></p><span data-dcnode-id="2235" instrument_node=""> </span><p data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2232" instrument_node=""> </span><h3 data-dcnode-id="2229"><strong data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">Bone Cancer</span></strong></h3><span data-dcnode-id="2228" instrument_node=""> </span><p data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2225" instrument_node=""> </span><p data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">Although it is rare, bone cancer can be the cause of pain and stiffness in the joints.</span></p><span data-dcnode-id="2222" instrument_node=""> </span><p data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">If your joints hurt, then it may be the result of bone cancer, which almost always causes increasing bone or joint pain.</span></p><span data-dcnode-id="2219" instrument_node=""> </span><p data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2216" instrument_node=""> </span><h2 data-dcnode-id="2213"><strong data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">How to Avoid Stiffness in the Joints</span></strong></h2><span data-dcnode-id="2212" instrument_node=""> </span><p data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2209" instrument_node=""> </span><p data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">The best way to ease stiffness in the joints will depend upon the cause.</span></p><span data-dcnode-id="2206" instrument_node=""> </span><p data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">If your stiffness bothers you for more than half an hour after you awaken, or if your symptoms are getting worse, then you need to seek medical attention.</span></p><span data-dcnode-id="2203" instrument_node=""> </span><p data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2200" instrument_node=""> </span><h3 data-dcnode-id="2197"><strong data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">Hot or Cold Compress</span></strong></h3><span data-dcnode-id="2196" instrument_node=""> </span><p data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2193" instrument_node=""> </span><p data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">Either extreme of temperature can be helpful for muscle and joint pain relief.</span></p><span data-dcnode-id="2190" instrument_node=""> </span><p data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">Apply a cold compress or bag of ice to the affected joint for 20 minutes many times throughout the day.</span></p><span data-dcnode-id="2187" instrument_node=""> </span><p data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">This will help reduce the inflammation or swelling and restore your movement.</span></p><span data-dcnode-id="2184" instrument_node=""> </span><p data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">It also will dull your pain receptors.</span></p><span data-dcnode-id="2181" instrument_node=""> </span><p data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">Heat is also beneficial for muscle and joint pain relief.</span></p><span data-dcnode-id="2178" instrument_node=""> </span><p data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">Try a heating pad or a hot water bottle to relax your muscles and increase your circulation.</span></p><span data-dcnode-id="2175" instrument_node=""> </span><p data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2172" instrument_node=""> </span><h3 data-dcnode-id="2169"><strong data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">Over-the-Counter Medications</span></strong></h3><span data-dcnode-id="2168" instrument_node=""> </span><p data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2165" instrument_node=""> </span><p data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">Many mild instances of pain can be treated with OTC medicines.</span></p><span data-dcnode-id="2162" instrument_node=""> </span><p data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">Non-Steroidal Anti-Inflammatory Drugs are the most commonly used medication for this kind of pain.</span></p><span data-dcnode-id="2159" instrument_node=""> </span><p data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">These drugs are best known as aspirin, ibuprofen, and naproxen.</span></p><span data-dcnode-id="2156" instrument_node=""> </span><p data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2153" instrument_node=""> </span><h3 data-dcnode-id="2150"><strong data-dcnode-id="2151"><span data-dcnode-id="2152" instrument_node="">Steroids</span></strong></h3><span data-dcnode-id="2149" instrument_node=""> </span><p data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2146" instrument_node=""> </span><p data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">Steroids are another method for treating joint stiffness and pain.</span></p><span data-dcnode-id="2143" instrument_node=""> </span><p data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">Corticosteroids can decrease inflammation.</span></p><span data-dcnode-id="2140" instrument_node=""> </span><p data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">Steroids may not be useful for people with advanced arthritis.</span></p><span data-dcnode-id="2137" instrument_node=""> </span><p data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">In certain cases, relief may only be temporary, and further injections might not be effective.</span></p><span data-dcnode-id="2134" instrument_node=""> </span><p data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2131" instrument_node=""> </span><h3 data-dcnode-id="2128"><strong data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">Exercise</span></strong></h3><span data-dcnode-id="2127" instrument_node=""> </span><p data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2124" instrument_node=""> </span><p data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">Exercise and physical therapy can increase joint mobility and decrease stiffness.</span></p><span data-dcnode-id="2121" instrument_node=""> </span><p data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">If you don’t know how to begin an exercise regimen&nbsp;or are having movement problems, then you should discuss the matter with your doctor or a qualified physical therapist.</span></p><span data-dcnode-id="2118" instrument_node=""> </span><p data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">Exercise can be very beneficial, but you might aggravate some conditions if you don’t take the proper precautions.</span></p><span data-dcnode-id="2115" instrument_node=""> </span><p data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2112" instrument_node=""> </span><h3 data-dcnode-id="2109"><strong data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">Lose Weight</span></strong></h3><span data-dcnode-id="2108" instrument_node=""> </span><p data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2105" instrument_node=""> </span><p data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">Carrying around excess weight can put you at greater risk for conditions that cause joint problems.</span></p><span data-dcnode-id="2102" instrument_node=""> </span><p data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">The extra weight will put greater stress on your joints, causing a lot of wear and tear.</span></p><span data-dcnode-id="2099" instrument_node=""> </span><p data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">You should use a combination of sensible exercise and diet to shed those pounds and give your body a break.</span></p><span data-dcnode-id="2096" instrument_node=""> </span><p data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2093" instrument_node=""> </span><h2 data-dcnode-id="2090"><strong data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">Home Remedies</span></strong></h2><span data-dcnode-id="2089" instrument_node=""> </span><p data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2086" instrument_node=""> </span><h3 data-dcnode-id="2083"><strong data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">Turmeric and Ginger Tea</span></strong></h3><span data-dcnode-id="2082" instrument_node=""> </span><p data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2079" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">Turmeric and ginger have anti-inflammatory properties that can ease the symptoms of both osteoarthritis and rheumatoid arthritis.</span></p><span data-dcnode-id="2076" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">Turmeric has become particularly well-known recently.</span></p><span data-dcnode-id="2073" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">It contains a compound called curcumin, which is a powerful antioxidant.</span></p><span data-dcnode-id="2070" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">Also, it reduces two enzymes in the body that cause inflammation.</span></p><span data-dcnode-id="2067" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">You can take turmeric and ginger via capsules, or you can enjoy them in a tea.</span></p><span data-dcnode-id="2064" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">To make the tea, you will need:</span></p><span data-dcnode-id="2061" instrument_node=""> </span><ul class="nitro-offscreen" data-dcnode-id="2047" style="list-style-type:disc;"><span data-dcnode-id="2060" instrument_node=""> </span><li data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">Two cups of water</span></li><span data-dcnode-id="2057" instrument_node=""> </span><li data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">1/2 teaspoon ground ginger</span></li><span data-dcnode-id="2054" instrument_node=""> </span><li data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">1/2 teaspoon ground turmeric</span></li><span data-dcnode-id="2051" instrument_node=""> </span><li data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">Honey for sweetness (optional)</span></li><span data-dcnode-id="2048" instrument_node=""> </span></ul><span data-dcnode-id="2046" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="2043"><strong data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">Instructions:</span></strong></p><span data-dcnode-id="2042" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">Boil the water and add the turmeric and ginger.</span></p><span data-dcnode-id="2039" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">Reduce the heat and allow it to simmer for 15 minutes.</span></p><span data-dcnode-id="2036" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">Strain the mixture and add enough honey to create a pleasing taste for you.</span></p><span data-dcnode-id="2033" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">You should drink this tea twice a day. The recipe makes two servings.</span></p><span data-dcnode-id="2030" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2027" instrument_node=""> </span><h3 class="nitro-offscreen" data-dcnode-id="2024"><strong data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">Epsom Salt Soak</span></strong></h3><span data-dcnode-id="2023" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2020" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">Epsom salt contains magnesium sulfate, a naturally occurring mineral that has been used for pain relief for a long time.</span></p><span data-dcnode-id="2017" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">You can soak individual joints or add Epsom salt to your bathwater for a relaxing soak.</span></p><span data-dcnode-id="2014" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">You will need:</span></p><span data-dcnode-id="2011" instrument_node=""> </span><ul class="nitro-offscreen" data-dcnode-id="2000" style="list-style-type:disc;"><span data-dcnode-id="2010" instrument_node=""> </span><li data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">1/2 cup of Epsom salt</span></li><span data-dcnode-id="2007" instrument_node=""> </span><li data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">A large container</span></li><span data-dcnode-id="2004" instrument_node=""> </span><li data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">Warm water</span></li><span data-dcnode-id="2001" instrument_node=""> </span></ul><span data-dcnode-id="1999" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1996"><strong data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">Instructions:</span></strong></p><span data-dcnode-id="1995" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">Fill the container with warm water and add the Epsom salt.</span></p><span data-dcnode-id="1992" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">Stir it well so the grains dissolve, and place your painful joints in the solution.</span></p><span data-dcnode-id="1989" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">If you have soreness in a place that is hard to soak in a container, then you should use Epsom salt in your bathwater.</span></p><span data-dcnode-id="1986" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">You can do this by filling the tub with warm water and adding two cups of Epsom salt.</span></p><span data-dcnode-id="1983" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">Try soaking in the mixture for at least 15 minutes.</span></p><span data-dcnode-id="1980" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1977" instrument_node=""> </span><h3 class="nitro-offscreen" data-dcnode-id="1974"><strong data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">Magnesium</span></strong></h3><span data-dcnode-id="1973" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1970" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">Magnesium is a mineral that your body needs but does not produce for itself.</span></p><span data-dcnode-id="1967" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">It is an important part of more than 300 different biochemical responses in the body.</span></p><span data-dcnode-id="1964" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">It will relax your muscles and nerve endings to ease stiffness and soreness and is important for maintaining your heart rate.</span></p><span data-dcnode-id="1961" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">According to one study, it also increases bone density when added to your diet.</span></p><span data-dcnode-id="1958" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">Magnesium is available from several sources:</span></p><span data-dcnode-id="1955" instrument_node=""> </span><ul class="nitro-offscreen" data-dcnode-id="1938" style="list-style-type:disc;"><span data-dcnode-id="1954" instrument_node=""> </span><li data-dcnode-id="1950"><strong data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">Supplements:</span></strong><span data-dcnode-id="1951" instrument_node=""> You can take magnesium in capsule form. They will function better when used in combination with a healthy diet.</span></li><span data-dcnode-id="1949" instrument_node=""> </span><li data-dcnode-id="1945"><strong data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">Diet:</span></strong><span data-dcnode-id="1946" instrument_node=""> Even better than using supplements is getting magnesium naturally in your diet. Foods that are rich in magnesium include dark leafy greens, nuts, and legumes.</span></li><span data-dcnode-id="1944" instrument_node=""> </span><li data-dcnode-id="1940"><strong data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">Oil:</span></strong><span data-dcnode-id="1941" instrument_node=""> Magnesium oil can be applied topically to the skin. You should apply it directly to the joints that are causing you pain.</span></li><span data-dcnode-id="1939" instrument_node=""> </span></ul><span data-dcnode-id="1937" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1934" instrument_node=""> </span><h3 class="nitro-offscreen" data-dcnode-id="1931"><strong data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">Olive Oil</span></strong></h3><span data-dcnode-id="1930" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1927" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">Olive oil is useful to lubricate your joints and ease the soreness of arthritis.</span></p><span data-dcnode-id="1924" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">A substance in extra virgin olive oil called oleocanthal suppresses the inflammatory enzymes COX-1 and COX-2.</span></p><span data-dcnode-id="1921" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">In this way, it functions similar to aspirin.</span></p><span data-dcnode-id="1918" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">A study has indicated that a couple of tablespoons is equivalent to a dose of ibuprofen.</span></p><span data-dcnode-id="1915" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">Not every olive oil is equally effective.</span></p><span data-dcnode-id="1912" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">Heat destroys oleocanthal, so you need to use extra-virgin olive oil.</span></p><span data-dcnode-id="1909" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">How ripe the olives are also affects the oleocanthal content.</span></p><span data-dcnode-id="1906" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">The stronger the oil tastes, the higher the quantity of oleocanthal.</span></p><span data-dcnode-id="1903" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">To apply it topically, you will need:</span></p><span data-dcnode-id="1900" instrument_node=""> </span><ul class="nitro-offscreen" data-dcnode-id="1895" style="list-style-type:disc;"><span data-dcnode-id="1899" instrument_node=""> </span><li data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">a few tablespoons of extra virgin olive oil</span></li><span data-dcnode-id="1896" instrument_node=""> </span></ul><span data-dcnode-id="1894" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1891"><strong data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">Instructions:</span></strong></p><span data-dcnode-id="1890" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">Massage some of the oil onto painful joints twice daily.</span></p><span data-dcnode-id="1887" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">You may also consume the oil.</span></p><span data-dcnode-id="1884" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">If you consume it, you should account for it in your daily fat consumption so that you don’t add a lot of calories to your diet.</span></p><span data-dcnode-id="1881" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1878" instrument_node=""> </span><h3 class="nitro-offscreen" data-dcnode-id="1875"><strong data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">Dandelion Leaves</span></strong></h3><span data-dcnode-id="1874" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1871" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">Dandelion leaves are rich in vitamins A and C, so they are useful for repairing damaged tissue and helping the liver remove toxins from the blood.</span></p><span data-dcnode-id="1868" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">Studies have indicated that they have anti-inflammatory properties because they contain linoleic and linoleic acid.</span></p><span data-dcnode-id="1865" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">Linoleic is an essential fatty acid needed by your body to make prostaglandin.</span></p><span data-dcnode-id="1862" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">Prostaglandin regulates immune responses and controls inflammation.</span></p><span data-dcnode-id="1859" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">Due to this connection to immunity, dandelion is rather useful in controlling rheumatoid arthritis specifically.</span></p><span data-dcnode-id="1856" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">You may make a tasty salad out of the leaves or use them in tea.</span></p><span data-dcnode-id="1853" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">To use the leaves in either a tea or a salad, you will need:</span></p><span data-dcnode-id="1850" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1847"><strong data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">Tea</span></strong></p><span data-dcnode-id="1846" instrument_node=""> </span><ul class="nitro-offscreen" data-dcnode-id="1838" style="list-style-type:disc;"><span data-dcnode-id="1845" instrument_node=""> </span><li data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">three teaspoons of fresh dandelion leaves or one teaspoon dried leaves</span></li><span data-dcnode-id="1842" instrument_node=""> </span><li data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">1 cup of water</span></li><span data-dcnode-id="1839" instrument_node=""> </span></ul><span data-dcnode-id="1837" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1834"><strong data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">Salad</span></strong></p><span data-dcnode-id="1833" instrument_node=""> </span><ul class="nitro-offscreen" data-dcnode-id="1825" style="list-style-type:disc;"><span data-dcnode-id="1832" instrument_node=""> </span><li data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">Some fresh leaves</span></li><span data-dcnode-id="1829" instrument_node=""> </span><li data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">a little olive oil</span></li><span data-dcnode-id="1826" instrument_node=""> </span></ul><span data-dcnode-id="1824" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1821"><strong data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">Instructions:</span></strong></p><span data-dcnode-id="1820" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">For fresh dandelion tea, soak the fresh leaves in hot water.</span></p><span data-dcnode-id="1817" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">If you use dried leaves, put them in boiling water.</span></p><span data-dcnode-id="1814" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">Dandelion tea is rather bitter.</span></p><span data-dcnode-id="1811" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">You can add some sweetener to make it more palatable.</span></p><span data-dcnode-id="1808" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">For a salad, just mix the leaves with your other favorite ingredients.</span></p><span data-dcnode-id="1805" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1802" instrument_node=""> </span><h3 class="nitro-offscreen" data-dcnode-id="1799"><strong data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">Molasses</span></strong></h3><span data-dcnode-id="1798" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1795" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">Blackstrap molasses is rich in important minerals, such as calcium, potassium, and magnesium.</span></p><span data-dcnode-id="1792" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">It has been a valued home remedy for arthritis for ages now.</span></p><span data-dcnode-id="1789" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">Blackstrap molasses is the residue that remains after sugar is boiled three times.</span></p><span data-dcnode-id="1786" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">It is not like refined sugar, which is bereft of nutrients.</span></p><span data-dcnode-id="1783" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">As a dietary supplement, it can ease symptoms of arthritis due to its components that regulate nerve and muscle function.</span></p><span data-dcnode-id="1780" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">It also will strengthen your bones.</span></p><span data-dcnode-id="1777" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">To use it in a drink, you will need:</span></p><span data-dcnode-id="1774" instrument_node=""> </span><ul class="nitro-offscreen" data-dcnode-id="1766" style="list-style-type:disc;"><span data-dcnode-id="1773" instrument_node=""> </span><li data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">1 tablespoon of blackstrap molasses</span></li><span data-dcnode-id="1770" instrument_node=""> </span><li data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">1 cup of warm water</span></li><span data-dcnode-id="1767" instrument_node=""> </span></ul><span data-dcnode-id="1765" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1762"><strong data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">Instructions:</span></strong></p><span data-dcnode-id="1761" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">Warm the water, but don’t bring it to a boil.</span></p><span data-dcnode-id="1758" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">Stir the molasses into the water until dissolved.</span></p><span data-dcnode-id="1755" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">Drink the mixture once a day.</span></p><span data-dcnode-id="1752" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">Please note that molasses will sometimes act as a laxative.</span></p><span data-dcnode-id="1749" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1746" instrument_node=""> </span><h3 class="nitro-offscreen" data-dcnode-id="1743"><strong data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">White Willow Tea</span></strong></h3><span data-dcnode-id="1742" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1739" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">In ancient times, white willow bark was used for pain relief instead of aspirin.</span></p><span data-dcnode-id="1736" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">Hippocrates, the famous Greek physician, actually wrote about it.</span></p><span data-dcnode-id="1733" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">In the nineteenth century, it was discovered that white willow bark contains an active ingredient called salicin.</span></p><span data-dcnode-id="1730" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">The body turns salicin into salicylic acid, which is similar to the active ingredient in aspirin.</span></p><span data-dcnode-id="1727" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">However, white willow bark’s advantage is that the conversion takes place after it passes through the stomach.</span></p><span data-dcnode-id="1724" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1719"><span data-dcnode-id="1723" instrument_node="">Therefore, it is less likely to produce </span><a data-dcnode-id="1721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthyline.com/stomach-ache-remedies/"><span data-dcnode-id="1722" instrument_node="">stomach irritation</span></a><span data-dcnode-id="1720" instrument_node="">.</span></p><span data-dcnode-id="1718" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">It comes in capsule form and also can be made into a tea.</span></p><span data-dcnode-id="1715" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">To make the tea, you will need:</span></p><span data-dcnode-id="1712" instrument_node=""> </span><ul class="nitro-offscreen" data-dcnode-id="1701" style="list-style-type:disc;"><span data-dcnode-id="1711" instrument_node=""> </span><li data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">2 teaspoons of powdered white willow bark</span></li><span data-dcnode-id="1708" instrument_node=""> </span><li data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">1 cup of water</span></li><span data-dcnode-id="1705" instrument_node=""> </span><li data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">honey and lemon</span></li><span data-dcnode-id="1702" instrument_node=""> </span></ul><span data-dcnode-id="1700" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1697"><strong data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">Instructions:</span></strong></p><span data-dcnode-id="1696" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Bring the water to a boil, then reduce the heat to a simmer.</span></p><span data-dcnode-id="1693" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">Mix the bark in and steep it for 15 minutes.</span></p><span data-dcnode-id="1690" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">Remove from the heat and steep for 30 minutes more. Drink the tea twice a day.</span></p><span data-dcnode-id="1687" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">You may need to flavor it with the honey and lemon to remove the bitterness.</span></p><span data-dcnode-id="1684" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1681" instrument_node=""> </span><h3 class="nitro-offscreen" data-dcnode-id="1678"><strong data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">Exercise</span></strong></h3><span data-dcnode-id="1677" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1674" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">Although the last thing on your mind when you have pain is exercise, the truth is that it is very beneficial for reducing joint pain and stiffness.</span></p><span data-dcnode-id="1671" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">Exercise also will help you get rid of extra weight, which strains your joints.</span></p><span data-dcnode-id="1668" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">Exercise also will build up the muscles that support your joints, and it lubricates them too.</span></p><span data-dcnode-id="1665" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">If you are sedentary, then less synovial fluid is made, and it is not being pressed out of the cartilage to provide lubrication.</span></p><span data-dcnode-id="1662" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">However, once you become active, the increased blood flow aids synovial fluid production, which makes it easier for your joints to move.</span></p><span data-dcnode-id="1659" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">To add exercise to your daily routine, try walking for at least 30 minutes.</span></p><span data-dcnode-id="1656" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">You can start with 15 minutes of brisk walking.</span></p><span data-dcnode-id="1653" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">Also, try doing joint-targeted exercises.</span></p><span data-dcnode-id="1650" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">Specific stretches and exercises will focus on joints to strengthen them and help get rid of your pain.</span></p><span data-dcnode-id="1647" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">Another way to encourage activity is to get a dog. When you have a dog, you have no choice but to get outside and exercise.</span></p><span data-dcnode-id="1644" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1641" instrument_node=""> </span><h3 class="nitro-offscreen" data-dcnode-id="1638"><strong data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">Peppermint and Eucalyptus Oil Blend</span></strong></h3><span data-dcnode-id="1637" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1634" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">Peppermint and eucalyptus aren’t useful for healing arthritis, but they do have analgesic (pain-relieving) properties.</span></p><span data-dcnode-id="1631" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">They give you a cooling sensation that will ease your discomfort for a while.</span></p><span data-dcnode-id="1628" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">For the rub, you will need:</span></p><span data-dcnode-id="1625" instrument_node=""> </span><ul class="nitro-offscreen" data-dcnode-id="1611" style="list-style-type:disc;"><span data-dcnode-id="1624" instrument_node=""> </span><li data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">10 drops of peppermint oil</span></li><span data-dcnode-id="1621" instrument_node=""> </span><li data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">10 drops of eucalyptus oil</span></li><span data-dcnode-id="1618" instrument_node=""> </span><li data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">2 tablespoons of carrier oil&nbsp;(a mild oil used to dilute the others)</span></li><span data-dcnode-id="1615" instrument_node=""> </span><li data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">a dark glass bottle</span></li><span data-dcnode-id="1612" instrument_node=""> </span></ul><span data-dcnode-id="1610" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1607"><strong data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">Instructions:</span></strong></p><span data-dcnode-id="1606" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">Mix the oils together. The carrier oil is necessary to dilute the other oils; they may irritate your skin without it.</span></p><span data-dcnode-id="1603" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">You can use olive oil for this purpose.</span></p><span data-dcnode-id="1600" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">Store the blend in the dark bottle away from sunlight.</span></p><span data-dcnode-id="1597" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">Apply the mixture to your joints when they are sore.</span></p><span data-dcnode-id="1594" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1591" instrument_node=""> </span><h3 class="nitro-offscreen" data-dcnode-id="1588"><strong data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">Juniper Berry Tea</span></strong></h3><span data-dcnode-id="1587" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1584" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">Research shows that juniper berries can ease arthritis pain.</span></p><span data-dcnode-id="1581" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">This is due to a substance named terpinene-4-ol.</span></p><span data-dcnode-id="1578" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">It suppresses blood cells called monocytes that respond to inflammation in the body.</span></p><span data-dcnode-id="1575" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">In rheumatoid arthritis, the immune system will damage normal joint tissue without cause.</span></p><span data-dcnode-id="1572" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">If you drink the tea every day, then the terpene might be able to reduce the inflammation.</span></p><span data-dcnode-id="1569" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">Only two varieties are considered effective, the prickly juniper and the common juniper.</span></p><span data-dcnode-id="1566" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">If you are pregnant, do not use this tea.</span></p><span data-dcnode-id="1563" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">To make the tea, you will need:</span></p><span data-dcnode-id="1560" instrument_node=""> </span><ul class="nitro-offscreen" data-dcnode-id="1549" style="list-style-type:disc;"><span data-dcnode-id="1559" instrument_node=""> </span><li data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">1 tablespoon dried juniper berries</span></li><span data-dcnode-id="1556" instrument_node=""> </span><li data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">1 cup of water</span></li><span data-dcnode-id="1553" instrument_node=""> </span><li data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">honey</span></li><span data-dcnode-id="1550" instrument_node=""> </span></ul><span data-dcnode-id="1548" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1545"><strong data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">Instructions:</span></strong></p><span data-dcnode-id="1544" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">Boil the water. Put the berries in a cup.</span></p><span data-dcnode-id="1541" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">Pour the water over the berries and let them soak for 20 minutes.</span></p><span data-dcnode-id="1538" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">Strain the tea. Drink the tea twice a day.</span></p><span data-dcnode-id="1535" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1532" instrument_node=""> </span><h3 class="nitro-offscreen" data-dcnode-id="1529"><strong data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">Golden Raisins and Gin</span></strong></h3><span data-dcnode-id="1528" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1525" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">This is an old home remedy for arthritis. The flavor in gin comes from juniper berries.</span></p><span data-dcnode-id="1522" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">As explained before, juniper berries work well against inflammation.</span></p><span data-dcnode-id="1519" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">Golden raisins (they must be golden) are processed with sulfides.</span></p><span data-dcnode-id="1516" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">For this remedy, you will need:</span></p><span data-dcnode-id="1513" instrument_node=""> </span><ul class="nitro-offscreen" data-dcnode-id="1502" style="list-style-type:disc;"><span data-dcnode-id="1512" instrument_node=""> </span><li data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">1/2 cup of gin</span></li><span data-dcnode-id="1509" instrument_node=""> </span><li data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">1 cup of raisins</span></li><span data-dcnode-id="1506" instrument_node=""> </span><li data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">a dish</span></li><span data-dcnode-id="1503" instrument_node=""> </span></ul><span data-dcnode-id="1501" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1498"><strong data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">Instructions:</span></strong></p><span data-dcnode-id="1497" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">The amounts given above are only a general guideline.</span></p><span data-dcnode-id="1494" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">The idea is simply that you need raisins and enough gin to cover them.</span></p><span data-dcnode-id="1491" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">Place the raisins in a shallow dish and add enough gin to cover them.</span></p><span data-dcnode-id="1488" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">Cover with a towel and put them away for two weeks. The gin will evaporate.</span></p><span data-dcnode-id="1485" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">Eat about 10 raisins every day. It may take a while before you achieve the desired effect.</span></p><span data-dcnode-id="1482" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1479" instrument_node=""> </span><h3 class="nitro-offscreen" data-dcnode-id="1476"><strong data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">Boswellia Supplements</span></strong></h3><span data-dcnode-id="1475" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1472" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">Boswellia, also known as frankincense, is a flowering plant that grows in Africa and Asia.</span></p><span data-dcnode-id="1469" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">The resin derived from the plant is useful for its anti-inflammatory properties. It also works as an analgesic.</span></p><span data-dcnode-id="1466" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">It also shrinks tissue that has become inflamed.</span></p><span data-dcnode-id="1463" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">It usually is taken in tablet supplement form, and you can purchase it at your local health food store or online.</span></p><span data-dcnode-id="1460" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1457" instrument_node=""> </span><h3 class="nitro-offscreen" data-dcnode-id="1454"><strong data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Pectin and Grape Juice</span></strong></h3><span data-dcnode-id="1453" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1450" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">Pectin is a water-soluble carbohydrate contained in the cell walls of plants.</span></p><span data-dcnode-id="1447" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">It is what makes a fruit firm when it gets ripe.</span></p><span data-dcnode-id="1444" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">It has become well known as a home remedy for arthritis when combined with grape juice.</span></p><span data-dcnode-id="1441" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">It is thought that it restores synovial tissue, which aids movement.</span></p><span data-dcnode-id="1438" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">Many people have found relief with this mixture.</span></p><span data-dcnode-id="1435" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">The reason you should use mix it with grape juice is that grape juice itself also is useful in reducing inflammation.</span></p><span data-dcnode-id="1432" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">To make this mixture, you will need:</span></p><span data-dcnode-id="1429" instrument_node=""> </span><ul class="nitro-offscreen" data-dcnode-id="1421" style="list-style-type:disc;"><span data-dcnode-id="1428" instrument_node=""> </span><li data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">1 tablespoon of liquid pectin</span></li><span data-dcnode-id="1425" instrument_node=""> </span><li data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">8 ounces of grape juice</span></li><span data-dcnode-id="1422" instrument_node=""> </span></ul><span data-dcnode-id="1420" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1417"><strong data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">Instructions:</span></strong></p><span data-dcnode-id="1416" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">Mix the pectin with the grape juice. Drink the mixture twice a day.</span></p><span data-dcnode-id="1413" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">It will probably take a week or two for the benefits to begin.</span></p><span data-dcnode-id="1410" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1407" instrument_node=""> </span><h3 class="nitro-offscreen" data-dcnode-id="1404"><strong data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">Cayenne Ointment</span></strong></h3><span data-dcnode-id="1403" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1400" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">Capsaicin is a component of hot peppers that inhibits something called “substance P,” which helps the body transmit pain signals to the brain.</span></p><span data-dcnode-id="1397" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">When substance P is inhibited, fewer pain signals are transmitted.</span></p><span data-dcnode-id="1394" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">It is considered to be one of the better remedies for arthritis,&nbsp;but it should be used sparingly.</span></p><span data-dcnode-id="1391" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">For this ointment, you will need:</span></p><span data-dcnode-id="1388" instrument_node=""> </span><ul class="nitro-offscreen" data-dcnode-id="1371" style="list-style-type:disc;"><span data-dcnode-id="1387" instrument_node=""> </span><li data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">3 tablespoons of cayenne powder</span></li><span data-dcnode-id="1384" instrument_node=""> </span><li data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">1 cup of carrier oil</span></li><span data-dcnode-id="1381" instrument_node=""> </span><li data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">1/2 cup of grated beeswax</span></li><span data-dcnode-id="1378" instrument_node=""> </span><li data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">&nbsp;a double boiler</span></li><span data-dcnode-id="1375" instrument_node=""> </span><li data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">a glass jar</span></li><span data-dcnode-id="1372" instrument_node=""> </span></ul><span data-dcnode-id="1370" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1367"><strong data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">Instructions:</span></strong></p><span data-dcnode-id="1366" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">Mix the cayenne powder with the oil and heat in a double boiler over medium heat.</span></p><span data-dcnode-id="1363" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">Add the beeswax and stir until everything melts together.</span></p><span data-dcnode-id="1360" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">Cool the mixture in the refrigerator for 10 minutes. Whisk the whole thing together.</span></p><span data-dcnode-id="1357" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">Cool for another 15 minutes and then whisk it again. Put it in the glass jar.</span></p><span data-dcnode-id="1354" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">Store it in the refrigerator. Apply daily as needed for pain.</span></p><span data-dcnode-id="1351" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1348" instrument_node=""> </span><h3 class="nitro-offscreen" data-dcnode-id="1345"><strong data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">Licorice</span></strong></h3><span data-dcnode-id="1344" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1341" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">Licorice works a lot like the natural corticosteroids in your body that reduce inflammation.</span></p><span data-dcnode-id="1338" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">It also reduces free radicals at the location of the inflammation and inhibits the creation of enzymes that contribute to inflammation.</span></p><span data-dcnode-id="1335" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">Licorice does this by using a component called glycyrrhizin.</span></p><span data-dcnode-id="1332" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">This substance is involved in the release of cortisol, which suppresses the immune system.</span></p><span data-dcnode-id="1329" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">It will help with the pain and frequency of arthritis attacks.</span></p><span data-dcnode-id="1326" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Licorice comes in a variety of forms, including tea, tinctures and supplements.</span></p><span data-dcnode-id="1323" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">Licorice is not something that everyone should use; avoid using it if you have blood pressure problems.</span></p><span data-dcnode-id="1320" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1317" instrument_node=""> </span><h3 class="nitro-offscreen" data-dcnode-id="1314"><strong data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">Flaxseed</span></strong></h3><span data-dcnode-id="1313" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="1311"><span data-dcnod
