><p data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">Your personality may actually play a role in developing and maintaining your thyroid dysfunction.&nbsp;</span></p><p data-dcnode-id="2684"><span data-dcnode-id="2685" instrument_node="">Newer studies are showing that certain types of personalities are associated with an increased risk of developing health problems over their lifetime.&nbsp;</span></p><p data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">Which personality type is associated with this risk?</span></p><p data-dcnode-id="2677"><span data-dcnode-id="2681" instrument_node="">I</span><a data-dcnode-id="2679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.123test.com/personality-neuroticism/" target="_blank"><span data-dcnode-id="2680" instrument_node="">t's the neuroticism personality trait</span></a><span data-dcnode-id="2678" instrument_node=""> (one of the big 5 personality traits).&nbsp;</span></p><p data-dcnode-id="2675"><span data-dcnode-id="2676" instrument_node="">People who are more neurotic than others tend to experience the following emotions: moodiness, anxiety, worry, fear, anger, frustration, envy, jealousy, guilt, depression, and loneliness.&nbsp;</span></p><p data-dcnode-id="2670"><span data-dcnode-id="2674" instrument_node="">If you have a baseline tendency to experience any of those emotions </span><a data-dcnode-id="2672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2493466/" target="_blank"><span data-dcnode-id="2673" instrument_node="">then you are statistically more likely to develop health conditions, one of which may be thyroid disease</span></a><span data-dcnode-id="2671" instrument_node=""> (18).&nbsp;</span></p><p data-dcnode-id="2668"><span data-dcnode-id="2669" instrument_node="">What isn't clear, however, is whether or not the tendency to experience those emotions causes the disease or whether the disease state causes those emotions.&nbsp;</span></p><p data-dcnode-id="2666"><span data-dcnode-id="2667" instrument_node="">In reality, it's probably a combination of the two.&nbsp;</span></p><p data-dcnode-id="2664"><span data-dcnode-id="2665" instrument_node="">Those who have those emotions at baseline are much more likely to experience certain diseases and then once they have those diseases, they are likely to experience the same emotions to a larger degree.&nbsp;</span></p><p data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">What can you do it about it?</span></p><p data-dcnode-id="2660"><span data-dcnode-id="2661" instrument_node="">Even though the desire to feel those emotions may be built into your genetic framework, you can still take steps to manage them.&nbsp;</span></p><p data-dcnode-id="2655"><span data-dcnode-id="2659" instrument_node="">Things like </span><a data-dcnode-id="2657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3772979/" target="_blank"><span data-dcnode-id="2658" instrument_node="">meditation and mindfulness are scientifically proven ways to help ease your mind and reduce anxiety</span></a><span data-dcnode-id="2656" instrument_node="">&nbsp;(19).&nbsp;</span></p><p data-dcnode-id="2652"><strong data-dcnode-id="2653"><span data-dcnode-id="2654" instrument_node="">Does it work?</span></strong></p><p data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node="">Addressing your personality may not instantly improve your thyroid function but it may help to improve your overall quality of life.&nbsp;</span></p><h4 class="" data-dcnode-id="2648"><span data-dcnode-id="2649" instrument_node="">#9. Give up Coffee</span></h4><p data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">It may sound like heresy to tell you to give up drinking coffee but your thyroid gland may thank you for it!</span></p><p data-dcnode-id="2644"><span data-dcnode-id="2645" instrument_node="">The problem from coffee probably has little to do with the coffee itself and more to do with our ever-increasing reliance upon caffeine and the lifestyle that it promotes.&nbsp;</span></p><p data-dcnode-id="2642"><span data-dcnode-id="2643" instrument_node="">Caffeine, especially coffee, is often used as a pick-me-up to help you get through the day when you haven't had a good night sleep or restful night.&nbsp;</span></p><p data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">This cycle often continues as coffee can actually make getting to bed even more difficult (especially if you are a slow metabolizer of caffeine).&nbsp;</span></p><p data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">When you combine this with the potentially addictive component of caffeine and coffee, you have a problem for many people.&nbsp;</span></p><p data-dcnode-id="2633"><span data-dcnode-id="2637" instrument_node="">If this wasn't enough to suggest that you give up coffee then you also might find it helpful to know that coffee can inhibit your body from </span><a data-dcnode-id="2635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/6104718" target="_blank"><span data-dcnode-id="2636" instrument_node="">producing adequate amounts of TSH</span></a><span data-dcnode-id="2634" instrument_node=""> (20) (thyroid stimulating hormone).&nbsp;</span></p><p data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">If your TSH production is blunted then your free thyroid hormones may be affected as well which may promote the symptoms of hypothyroidism.&nbsp;</span></p><p data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">Reliance upon caffeine may also rev up your adrenal system and promote extra drag on adrenal (cortisol) function.&nbsp;</span></p><p data-dcnode-id="2627"><span data-dcnode-id="2628" instrument_node="">If you suffer from thyroid problems do your best to give up coffee and caffeine.</span></p><p data-dcnode-id="2624"><strong data-dcnode-id="2625"><span data-dcnode-id="2626" instrument_node="">Does it work?</span></strong></p><p data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">In my experience, I find that most people, once they give up coffee and caffeine, are able to function with more energy and more mental clarity than before.&nbsp;</span></p><p data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">You may go through a withdrawal period, though, so be mindful of that if you decide to cut back on coffee.&nbsp;</span></p><h4 class="" data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">#10. Goitrogens</span></h4><p data-dcnode-id="2616"><span data-dcnode-id="2617" instrument_node="">Another way you can improve your thyroid is by avoiding compounds known as goitrogens.&nbsp;</span></p><p data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">Goitrogens are compounds (foods, chemicals, medications, etc.) which block the uptake of iodine into your thyroid gland.&nbsp;</span></p><p data-dcnode-id="2612"><span data-dcnode-id="2613" instrument_node="">In really simple terms, no iodine = no thyroid hormone production = low thyroid function.&nbsp;</span></p><p data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">For this reason, you want to avoid goitrogens as much as possible.&nbsp;</span></p><p data-dcnode-id="2608"><span data-dcnode-id="2609" instrument_node="">We already mentioned endocrine disruptors but there are other chemicals and compounds as well:</span></p><ul class="" data-dcnode-id="2581"><li class="" data-dcnode-id="2604"><strong data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">Prescription medications</span></strong><span data-dcnode-id="2605" instrument_node="">: Amiodarone and lithium being the most prominent.&nbsp;</span></li><li class="" data-dcnode-id="2597"><strong data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">Food groups</span></strong><span data-dcnode-id="2601" instrument_node="">: Soy-enriched foods have been shown to </span><a data-dcnode-id="2599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/16571087" target="_blank"><span data-dcnode-id="2600" instrument_node="">interfere with thyroid hormone absorption</span></a><span data-dcnode-id="2598" instrument_node="">&nbsp;(21) in the GI tract.&nbsp;</span></li><li class="" data-dcnode-id="2593"><strong data-dcnode-id="2595"><span data-dcnode-id="2596" instrument_node="">Intake of iodine itself</span></strong><span data-dcnode-id="2594" instrument_node="">: High doses of iodine can actually prevent your thyroid gland from absorbing iodine as a protective mechanism. Because of this, it's best to use smaller doses of iodine and ease your way into higher doses (but only if necessary).&nbsp;</span></li><li class="" data-dcnode-id="2589"><strong data-dcnode-id="2591"><span data-dcnode-id="2592" instrument_node="">Certain diets</span></strong><span data-dcnode-id="2590" instrument_node="">: Diets very low in protein (or high in some fats) can impact serum T4 and T3 levels.&nbsp;</span></li><li class="" data-dcnode-id="2582"><strong data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">Green tea</span></strong><span data-dcnode-id="2586" instrument_node="">: Green tea, if used in high doses, can cause </span><a data-dcnode-id="2584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/23117228" target="_blank"><span data-dcnode-id="2585" instrument_node="">thyroid dysfunction</span></a><span data-dcnode-id="2583" instrument_node=""> (22). This is problematic because green tea is found in many 'weight loss' supplements.&nbsp;</span></li></ul><p data-dcnode-id="2579"><span data-dcnode-id="2580" instrument_node="">And lastly, what about food?</span></p><p data-dcnode-id="2577"><span data-dcnode-id="2578" instrument_node="">You guessed it. Certain foods have been known to block iodine entry into your thyroid gland.&nbsp;</span></p><p data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">Are some foods bad for your thyroid?</span></p><p data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">It's a little more nuanced than that, but that's the general idea.&nbsp;</span></p><p data-dcnode-id="2571"><span data-dcnode-id="2572" instrument_node="">The only problem is that many of the foods which are goitrogenic are actually quite healthy.&nbsp;</span></p><p data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">Included in this group is broccoli, cauliflower, cabbage, kale, Brussels sprouts, peanuts, strawberries, and even spinach.&nbsp;</span></p><p data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">At first glance, this might sound confusing.&nbsp;</span></p><p data-dcnode-id="2565"><span data-dcnode-id="2566" instrument_node="">How can these healthy foods be damaging your thyroid?</span></p><p data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">The truth is that while these foods have a theoretical CHANCE of blocking thyroid function, the reality is that most of us do not consume enough to have any noticeable change.&nbsp;</span></p><p data-dcnode-id="2561"><span data-dcnode-id="2562" instrument_node="">On the contrary, it's my belief that the benefits of consuming these foods (in place of unhealthy foods) far outweigh any potential negative consequences related to your thyroid.&nbsp;</span></p><p data-dcnode-id="2556"><span data-dcnode-id="2560" instrument_node="">Even if you are worried, however, you can take steps to </span><a data-dcnode-id="2558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4740614/" target="_blank"><span data-dcnode-id="2559" instrument_node="">reduce the goitrogenic capacity that these foods carry</span></a><span data-dcnode-id="2557" instrument_node=""> (23) by simply steaming your vegetables.&nbsp;</span></p><p data-dcnode-id="2554"><span data-dcnode-id="2555" instrument_node="">If you are still worried, you can also cut back the frequency with which you consume these foods to only 3-6 times per week.&nbsp;</span></p><p data-dcnode-id="2551"><strong data-dcnode-id="2552"><span data-dcnode-id="2553" instrument_node="">Does it work?</span></strong></p><p data-dcnode-id="2549"><span data-dcnode-id="2550" instrument_node="">I find the most success in treating patients when they alter up the medications that they are using.&nbsp;</span></p><p data-dcnode-id="2547"><span data-dcnode-id="2548" instrument_node="">Prescription medications, even if used for the right reason, may have the unintended consequence of slowing down your thyroid.&nbsp;</span></p><p data-dcnode-id="2545"><span data-dcnode-id="2546" instrument_node="">There are also many options and different drugs which serve the same purpose but don't also cause thyroid dysfunction.&nbsp;</span></p><p data-dcnode-id="2540"><span data-dcnode-id="2544" instrument_node="">If you feel your thyroid is suffering, or just want to get your medications double checked, </span><a data-dcnode-id="2542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.restartmed.com/medications-thyroid-problems/" target="_blank"><span data-dcnode-id="2543" instrument_node="">you can look at this article which goes into detail on various medications and supplements</span></a><span data-dcnode-id="2541" instrument_node=""> which have all been shown to block thyroid function.&nbsp;</span></p><p data-dcnode-id="2538"><span data-dcnode-id="2539" instrument_node="">The degree that they block thyroid dysfunction does vary from person to person, however, so keep that in mind as you read that article and consider your own situation.&nbsp;</span></p><h4 class="" data-dcnode-id="2536"><span data-dcnode-id="2537" instrument_node="">#11. Reduce Sugar Intake</span></h4><p data-dcnode-id="2534"><span data-dcnode-id="2535" instrument_node="">We've kind of already touched on the sugar idea but it's worth spending some time here as well.&nbsp;</span></p><p data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">One of the best things that you can do for your thyroid (and overall health) is to reduce the amount of sugar that you consume on a daily basis.&nbsp;</span></p><p data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">Sugar, and by sugar I am referring to refined and added sugar, impacts several hormone systems in your body and can lead to hormone resistant syndromes such as insulin resistance.&nbsp;</span></p><p data-dcnode-id="2528"><span data-dcnode-id="2529" instrument_node="">It also can alter immune function, change your mood, impact your energy, and alter your cortisol.&nbsp;</span></p><p data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">Even though most of you probably already know that you should be avoiding sugar, you probably don't even realize that you are unknowingly consuming sugar despite your best efforts to avoid it.&nbsp;</span></p><p data-dcnode-id="2524"><span data-dcnode-id="2525" instrument_node="">Why is that?</span></p><p data-dcnode-id="2522"><span data-dcnode-id="2523" instrument_node="">Because sugar has more than one name and it has found its way into many different types of foods.&nbsp;</span></p><p data-dcnode-id="2520"><span data-dcnode-id="2521" instrument_node="">Furthermore, the food industry doesn't want to make it simple for you to understand what you are consuming and they often try to conflate refined and added sugar with natural healthy sugars.&nbsp;</span></p><p data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">The sugar that you find in fruit and vegetables is NOT the same type of sugar such as refined white and brown sugar.&nbsp;</span></p><p data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">They are NOT the same because they impact your body in completely different ways.&nbsp;</span></p><p data-dcnode-id="2514"><span data-dcnode-id="2515" instrument_node="">Baking a cake and adding sugar is far less healthy than consuming fructose enriched fruits such as pineapple or dates.&nbsp;</span></p><p data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">Natural healthy sugars can provide your body with sustained energy and provide other nutrients to your body.&nbsp;</span></p><p data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">Consuming food products with added sugar do nothing but alter the taste of the food (which can taste nice) while wreaking havoc on your hormones.&nbsp;</span></p><p data-dcnode-id="2508"><span data-dcnode-id="2509" instrument_node="">It can also be tough to identify if your food has added sugar because of the different names that sugar goes by.&nbsp;</span></p><p data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">Refined sugar can go by any of the following names:</span></p><ul class="" data-dcnode-id="2472"><li data-dcnode-id="2503"><strong data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node="">Sugar</span></strong></li><li data-dcnode-id="2500"><strong data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">Brown rice syrup</span></strong></li><li data-dcnode-id="2497"><strong data-dcnode-id="2498"><span data-dcnode-id="2499" instrument_node="">Organic cane sugar</span></strong></li><li data-dcnode-id="2494"><strong data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">Dried cane syrup</span></strong></li><li data-dcnode-id="2491"><strong data-dcnode-id="2492"><span data-dcnode-id="2493" instrument_node="">Invert cane syrup</span></strong></li><li data-dcnode-id="2488"><strong data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">Honey</span></strong></li><li data-dcnode-id="2485"><strong data-dcnode-id="2486"><span data-dcnode-id="2487" instrument_node="">Brown sugar</span></strong></li><li data-dcnode-id="2482"><strong data-dcnode-id="2483"><span data-dcnode-id="2484" instrument_node="">Molasses</span></strong></li><li data-dcnode-id="2479"><strong data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">Maltose</span></strong></li><li data-dcnode-id="2476"><strong data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">Glucose</span></strong></li><li data-dcnode-id="2473"><strong data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">And many others...</span></strong></li></ul><p data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">Before you consume ANY food you need to check two places:</span></p><p data-dcnode-id="2468"><span data-dcnode-id="2469" instrument_node="">The first is under the "Total Carbohydrate" section under the subheading of "added sugars":</span></p></div><div class="thrv_wrapper tve_image_caption" data-css="tve-u-167c2e4b62e" data-dcnode-id="2456"><span class="tve_image_frame" data-dcnode-id="2457" style="width: 100%;"><div class="dpsp-pin-it-wrapper tve_image wp-image-33740 perfmatters-lazy" data-dcnode-id="2460"><img alt="added sugar on food labels" class="" data-dcnode-id="2466" data-height="469" data-id="33740" data-init-height="469" data-init-width="243" data-pin-description="Are you interesting in using natural therapies to heal your thyroid? If so, then you need to see this entire list of natural thyroid remedies. You will find information on what type of diet you should be eating, what thyroid supplements you should be taking, how to exercise for your thyroid, whether you should use essential oils for your thyroid, and more. You'll also find out how these therapies heal your thyroid, improve your thyroid lab tests, and help reduce the symptoms of hypothyroidism." data-pin-media="https://www.restartmed.com/wp-content/uploads/2018/12/added-sugar-on-food-labels.png" data-pin-title="17 Natural Thyroid Remedies That Work (supported by medical research)" data-sizes="(max-width: 243px) 100vw, 243px" data-src="https://www.restartmed.com/wp-content/uploads/2018/12/added-sugar-on-food-labels.png" data-srcset="https://www.restartmed.com/wp-content/uploads/2018/12/added-sugar-on-food-labels.png 243w, https://www.restartmed.com/wp-content/uploads/2018/12/added-sugar-on-food-labels-155x300.png 155w" data-width="243" height="469" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='243'%20height='469'%20viewBox='0%200%20243%20469'%3E%3C/svg%3E" style="" title="added sugar on food labels" width="243"><span class="dpsp-pin-it-overlay" data-dcnode-id="2465"></span><a aria-label="" class="dpsp-pin-it-button dpsp-pin-it-button-center dpsp-pin-it-button-shape-circle dpsp-pin-it-button-has-label" data-dcnode-id="2461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fwww.restartmed.com%252Fwp-content%252Fuploads%252F2018%252F12%252Fadded-sugar-on-food-labels.png%26url%3Dhttps%253A%252F%252Fwww.restartmed.com%252Fnatural-thyroid-remedies%252F%26is_video%3Dfalse%26description%3DAre%2520you%2520interesting%2520in%2520using%2520natural%2520therapies%2520to%2520heal%2520your%2520thyroid%253F%2520If%2520so%252C%2520then%2520you%2520need%2520to%2520see%2520this%2520entire%2520list%2520of%2520natural%2520thyroid%2520remedies.%2520You%2520will%2520find%2520information%2520on%2520what%2520type%2520of%2520diet%2520you%2520should%2520be%2520eating%252C%2520what%2520thyroid%2520supplements%2520you%2520should%2520be%2520taking%252C%2520how%2520to%2520exercise%2520for%2520your%2520thyroid%252C%2520whether%2520you%2520should%2520use%2520essential%2520oils%2520for%2520your%2520thyroid%252C%2520and%2520more.%2520You%27ll%2520also%2520find%2520out%2520how%2520these%2520therapies%2520heal%2520your%2520thyroid%252C%2520improve%2520your%2520thyroid%2520lab%2520tests%252C%2520and%2520help%2520reduce%2520the%2520symptoms%2520of%2520hypothyroidism." rel="noopener" target="_blank" title=""><span class="dpsp-network-icon" data-dcnode-id="2462"><svg data-dcnode-id="2463" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.856t1.952 0.736q0.992 0 1.824-0.448t1.408-1.216 0.992-1.696 0.672-1.952 0.352-1.984 0.128-1.792q0-3.072-1.952-4.8t-5.12-1.728q-3.552 0-5.952 2.304t-2.4 5.856q0 0.8 0.224 1.536t0.48 1.152 0.48 0.832 0.224 0.544q0 0.48-0.256 1.28t-0.672 0.8q-0.032 0-0.288-0.032-0.928-0.288-1.632-0.992t-1.088-1.696-0.576-1.92-0.192-1.92z" data-dcnode-id="2464"></path></svg></span></a></div><noscript data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">&lt;img class="tve_image wp-image-33740" alt="added sugar on food labels" width="243" height="469" title="added sugar on food labels" data-id="33740" src="https://www.restartmed.com/wp-content/uploads/2018/12/added-sugar-on-food-labels.png" style="" data-width="243" data-height="469" data-init-width="243" data-init-height="469" srcset="https://www.restartmed.com/wp-content/uploads/2018/12/added-sugar-on-food-labels.png 243w, https://www.restartmed.com/wp-content/uploads/2018/12/added-sugar-on-food-labels-155x300.png 155w" sizes="(max-width: 243px) 100vw, 243px" data-pin-media="https://www.restartmed.com/wp-content/uploads/2018/12/added-sugar-on-food-labels.png"&gt;</span></noscript></span></div><div class="thrv_wrapper thrv_text_element" data-dcnode-id="2442"><p data-dcnode-id="2454"><span data-dcnode-id="2455" instrument_node="">You can't look at the Total Carbohydrate section because this includes the natural and healthy carbohydrates as well as the unhealthy added sugars. Look specifically for added sugars.&nbsp;</span></p><p data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">The section above also contains more information than what you generally find on nutritional labels.&nbsp;</span></p><p data-dcnode-id="2447"><span data-dcnode-id="2451" instrument_node="">Most foods will NOT include a percentage of added sugars because you would quickly find that most servings contain nearly 100% of the total amount of sugar you should consume in a day </span><a data-dcnode-id="2449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//sugarscience.ucsf.edu/the-growing-concern-of-overconsumption.html" target="_blank"><span data-dcnode-id="2450" instrument_node="">which is no more than 25-30 grams of sugar per day</span></a><span data-dcnode-id="2448" instrument_node="">.&nbsp;</span></p><p data-dcnode-id="2445"><span data-dcnode-id="2446" instrument_node="">The example above contains 10g of added sugar (about 30% of your daily amount) in 1 serving.&nbsp;</span></p><p data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">The second place you need to look is in the ingredient list under the nutritional label:</span></p></div><div class="thrv_wrapper tve_image_caption" data-css="tve-u-167c2e4f7f6" data-dcnode-id="2431"><span class="tve_image_frame" data-dcnode-id="2432" style="width: 100%;"><div class="dpsp-pin-it-wrapper tve_image wp-image-33742 perfmatters-lazy" data-dcnode-id="2435"><img alt="ingredient list and sugar content" class="" data-dcnode-id="2441" data-height="280" data-id="33742" data-init-height="280" data-init-width="246" data-pin-description="Are you interesting in using natural therapies to heal your thyroid? If so, then you need to see this entire list of natural thyroid remedies. You will find information on what type of diet you should be eating, what thyroid supplements you should be taking, how to exercise for your thyroid, whether you should use essential oils for your thyroid, and more. You'll also find out how these therapies heal your thyroid, improve your thyroid lab tests, and help reduce the symptoms of hypothyroidism." data-pin-media="https://www.restartmed.com/wp-content/uploads/2018/12/ingredient-list-and-sugar-content.png" data-pin-title="17 Natural Thyroid Remedies That Work (supported by medical research)" data-src="https://www.restartmed.com/wp-content/uploads/2018/12/ingredient-list-and-sugar-content.png" data-width="246" height="280" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='246'%20height='280'%20viewBox='0%200%20246%20280'%3E%3C/svg%3E" style="" title="ingredient list and sugar content" width="246"><span class="dpsp-pin-it-overlay" data-dcnode-id="2440"></span><a aria-label="" class="dpsp-pin-it-button dpsp-pin-it-button-center dpsp-pin-it-button-shape-circle dpsp-pin-it-button-has-label" data-dcnode-id="2436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fwww.restartmed.com%252Fwp-content%252Fuploads%252F2018%252F12%252Fingredient-list-and-sugar-content.png%26url%3Dhttps%253A%252F%252Fwww.restartmed.com%252Fnatural-thyroid-remedies%252F%26is_video%3Dfalse%26description%3DAre%2520you%2520interesting%2520in%2520using%2520natural%2520therapies%2520to%2520heal%2520your%2520thyroid%253F%2520If%2520so%252C%2520then%2520you%2520need%2520to%2520see%2520this%2520entire%2520list%2520of%2520natural%2520thyroid%2520remedies.%2520You%2520will%2520find%2520information%2520on%2520what%2520type%2520of%2520diet%2520you%2520should%2520be%2520eating%252C%2520what%2520thyroid%2520supplements%2520you%2520should%2520be%2520taking%252C%2520how%2520to%2520exercise%2520for%2520your%2520thyroid%252C%2520whether%2520you%2520should%2520use%2520essential%2520oils%2520for%2520your%2520thyroid%252C%2520and%2520more.%2520You%27ll%2520also%2520find%2520out%2520how%2520these%2520therapies%2520heal%2520your%2520thyroid%252C%2520improve%2520your%2520thyroid%2520lab%2520tests%252C%2520and%2520help%2520reduce%2520the%2520symptoms%2520of%2520hypothyroidism." rel="noopener" target="_blank" title=""><span class="dpsp-network-icon" data-dcnode-id="2437"><svg data-dcnode-id="2438" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.856t1.952 0.736q0.992 0 1.824-0.448t1.408-1.216 0.992-1.696 0.672-1.952 0.352-1.984 0.128-1.792q0-3.072-1.952-4.8t-5.12-1.728q-3.552 0-5.952 2.304t-2.4 5.856q0 0.8 0.224 1.536t0.48 1.152 0.48 0.832 0.224 0.544q0 0.48-0.256 1.28t-0.672 0.8q-0.032 0-0.288-0.032-0.928-0.288-1.632-0.992t-1.088-1.696-0.576-1.92-0.192-1.92z" data-dcnode-id="2439"></path></svg></span></a></div><noscript data-dcnode-id="2433"><span data-dcnode-id="2434" instrument_node="">&lt;img class="tve_image wp-image-33742" alt="ingredient list and sugar content" width="246" height="280" title="ingredient list and sugar content" data-id="33742" src="https://www.restartmed.com/wp-content/uploads/2018/12/ingredient-list-and-sugar-content.png" style="" data-width="246" data-height="280" data-init-width="246" data-init-height="280" data-pin-media="https://www.restartmed.com/wp-content/uploads/2018/12/ingredient-list-and-sugar-content.png"&gt;</span></noscript></span></div><div class="thrv_wrapper thrv_text_element" data-dcnode-id="2411"><p data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">The ingredients are listed in terms of the highest to lowest quantity in the food.&nbsp;</span></p><p data-dcnode-id="2427"><span data-dcnode-id="2428" instrument_node="">If you find sugar at the top (or anywhere near the top) that is a good sign to avoid the food or look for a different brand!&nbsp;</span></p><p data-dcnode-id="2425"><span data-dcnode-id="2426" instrument_node="">Take care when you consume processed foods as you may be inadvertently consuming much more sugar than you realize.&nbsp;</span></p><p data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">Added sugar is found in MANY foods including ketchup, peanut butter, yogurt, cereals, and so on.&nbsp;</span></p><p data-dcnode-id="2420"><strong data-dcnode-id="2421"><span data-dcnode-id="2422" instrument_node="">Does it work? </span></strong></p><p data-dcnode-id="2418"><span data-dcnode-id="2419" instrument_node="">Avoiding sugar will stand to help a great many people.&nbsp;</span></p><p data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">Avoiding sugar may not be enough to completely reverse your thyroid but you will most likely feel a noticeable difference in your mood, your weight, and your energy level.&nbsp;</span></p><p data-dcnode-id="2414"><span data-dcnode-id="2415" instrument_node="">Be prepared to give up sugar for at least 60 days to start noticing the difference.&nbsp;</span></p><p data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">As you remove sugar from your diet you will probably also notice that your cravings for sweet foods will decrease as well.&nbsp;</span></p></div><div class="thrv_wrapper thrv_text_element" data-dcnode-id="2303" data-tag="h4"><h4 class="" data-dcnode-id="2409"><span data-dcnode-id="2410" instrument_node="">#12. Reduce Inflammation</span></h4><p data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">We all know that inflammation is bad for the body but what you may not realize is that it is also bad for your thyroid.&nbsp;</span></p><p data-dcnode-id="2405"><span data-dcnode-id="2406" instrument_node="">Inflammation, from any source, has been shown to reduce the ability of your body to convert the inactive T4 thyroid hormone into the active T3 thyroid hormone.&nbsp;</span></p><p data-dcnode-id="2403"><span data-dcnode-id="2404" instrument_node="">Inflammation is, therefore, an inhibitor of peripheral thyroid conversion.&nbsp;</span></p><p data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">The problem with this is that the changes inflammation can cause changes to your thyroid which are not necessarily picked up by standard tests.&nbsp;</span></p><p data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">When your body can't convert T4 into T3, there will be a build up of Free T4, a reduction in free T3, and a buildup in reverse T3.&nbsp;</span></p><p data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">These tests can be ordered and evaluated, but most physicians do not commonly order them.&nbsp;</span></p><p data-dcnode-id="2395"><span data-dcnode-id="2396" instrument_node="">What makes this problem even more sinister is that often the TSH is not changed.&nbsp;</span></p><p data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node="">So, if you only look at the TSH and the free T4, your thyroid may look absolutely normal.&nbsp;</span></p><p data-dcnode-id="2391"><span data-dcnode-id="2392" instrument_node="">The rest of the story can be discovered, however, when ordering the other tests.&nbsp;</span></p><p data-dcnode-id="2386"><span data-dcnode-id="2390" instrument_node="">If you aren't already of the value of the various thyroid tests or how they work and what they mean, I would recommend you </span><a data-dcnode-id="2388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.restartmed.com/thyroid-tests/" target="_blank"><span data-dcnode-id="2389" instrument_node="">check out this article which goes into this topic in detail</span></a><span data-dcnode-id="2387" instrument_node="">.&nbsp;</span></p><p data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">How do you know if you have inflammation?&nbsp;</span></p><p data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">There are two main ways:&nbsp;</span></p><p data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">The first is to actually test for it.&nbsp;</span></p><p data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">You can easily find out if you have what is known as systemic inflammation by ordering a CRP and ESR test.&nbsp;</span></p><p data-dcnode-id="2376"><span data-dcnode-id="2377" instrument_node="">CRP stands for C reactive protein and ESR stands for erythrocyte sedimentation rate, both of which are markers of inflammation.&nbsp;</span></p><p data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">If either of these values is elevated then you have some element of inflammation in your body.&nbsp;</span></p><p data-dcnode-id="2372"><span data-dcnode-id="2373" instrument_node="">But this isn't the only way to check for inflammation...</span></p><p data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">The second is to evaluate your symptoms.&nbsp;</span></p><p data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">Not all cases of inflammation will be picked up by serum or blood testing. In fact, some low-grade inflammation may run under the radar but still cause problems for your cells.&nbsp;</span></p><p data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">Low-grade inflammation is often felt in a symptomatic way with people experiencing such things as minor fatigue, minor joint pain, low-grade headaches, minor gastrointestinal discomfort, recurrent illness, and so on.</span></p><p data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">These low-grade symptoms may not show up on your blood tests but they can still be causing problems for your thyroid.&nbsp;</span></p><p data-dcnode-id="2361"><strong data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">Does reducing inflammation work? </span></strong></p><p data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">Yes!</span></p><p data-dcnode-id="2357"><span data-dcnode-id="2358" instrument_node="">Reducing inflammation, especially if it's systemic or picked up by standard blood tests, will go a long way to help improve your thyroid function.&nbsp;</span></p><p data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">You can reduce inflammation by taking targeted supplements, by eating an anti-inflammatory diet, by exercising, and ensuring that you get enough sleep.</span></p><h4 class="" data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">#13. Address Gut Health</span></h4><p data-dcnode-id="2351"><span data-dcnode-id="2352" instrument_node="">Another very important system you won't want to ignore if you have thyroid issues is your gut.&nbsp;</span></p><p data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">And by your gut, I'm really referring to the trillions of bacteria that live inside of your intestinal tract and how these bacteria influence your body.&nbsp;</span></p><p data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">Issues, including imbalances in these bacteria, promote problems for your body such as inflammation, damage to the barrier which is supposed to protect your body from pathogens, and direct changes to your hormones.&nbsp;</span></p><p data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">And one of the hormones that can be influenced by these changes is your thyroid.&nbsp;</span></p><p data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">Some studies suggest that up to 20% of the circulating thyroid in your body is converted from T4 to T3 in your intestinal tract.&nbsp;</span></p><p data-dcnode-id="2341"><span data-dcnode-id="2342" instrument_node="">This high percentage can be affected by problems that arise in your gut.&nbsp;</span></p><p data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">Local inflammation, or overgrowth of certain types of bacteria, may act to negatively impact your thyroid by reducing thyroid peripheral conversion.&nbsp;</span></p><p data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">What's the solution?&nbsp;</span></p><p data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">Fix your gut!</span></p><p data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">You probably don't need me to tell you how important your gut is to your overall health, but it's something that you should not ignore.&nbsp;</span></p><p data-dcnode-id="2330"><strong data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">Does it work?</span></strong></p><p data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">Yes!</span></p><p data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node="">Improving your intestinal tract will not only help your thyroid function directly but it will also help indirectly as you are able to absorb more nutrients both from food and from vitamins and supplements.&nbsp;</span></p><p data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">Improving your gut can also help treat non-gut-related issues such as depression, fatigue, and skin issues.&nbsp;</span></p><p data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node="">Those with gut-related issues often experience symptoms (making it hard to miss) such as gas, bloating, IBS, inflammatory bowel disease, abdominal pain, acid reflux, constipation, diarrhea, and so on.&nbsp;</span></p><p data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">If you are experiencing ANY of these symptoms then there is a high chance that something is 'off' in your gut that must be addressed.&nbsp;</span></p><h4 class="" data-dcnode-id="2318"><span data-dcnode-id="2319" instrument_node="">#14. Avoid Radiation &amp; Protect your Thyroid</span></h4><p data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">Your thyroid gland is probably one of the most sensitive organs in your body to radiation.&nbsp;</span></p><p data-dcnode-id="2311"><span data-dcnode-id="2315" instrument_node="">And it has been well documented that radiation to the thyroid gland can increase your risk of </span><a data-dcnode-id="2313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5454824/" target="_blank"><span data-dcnode-id="2314" instrument_node="">thyroid dysfunction including thyroid cancer, thyroid nodules, and thyroid cysts</span></a><span data-dcnode-id="2312" instrument_node=""> (24).&nbsp;</span></p><p data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">It makes sense, therefore, to protect your thyroid gland at all costs!</span></p><p data-dcnode-id="2304"><span data-dcnode-id="2308" instrument_node="">The most common exposure to radiation in modern life is from conventional medicine and the use of radiology imaging including </span><a data-dcnode-id="2306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3365850/" target="_blank"><span data-dcnode-id="2307" instrument_node="">CT scans, X-rays, barium studies, cardiac stress tests, dental x-rays, and so on</span></a><span data-dcnode-id="2305" instrument_node=""> (25).&nbsp;</span></p></div><div class="thrv_wrapper tve_image_caption" data-css="tve-u-167c2e5286c" data-dcnode-id="2292"><span class="tve_image_frame" data-dcnode-id="2293" style="width: 100%;"><div class="dpsp-pin-it-wrapper tve_image wp-image-33747 perfmatters-lazy" data-dcnode-id="2296"><img alt="sources of radiation exposure updated" class="" data-dcnode-id="2302" data-height="535" data-id="33747" data-init-height="535" data-init-width="466" data-pin-description="Are you interesting in using natural therapies to heal your thyroid? If so, then you need to see this entire list of natural thyroid remedies. You will find information on what type of diet you should be eating, what thyroid supplements you should be taking, how to exercise for your thyroid, whether you should use essential oils for your thyroid, and more. You'll also find out how these therapies heal your thyroid, improve your thyroid lab tests, and help reduce the symptoms of hypothyroidism." data-pin-media="https://www.restartmed.com/wp-content/uploads/2018/12/sources-of-radiation-exposure-updated.png" data-pin-title="17 Natural Thyroid Remedies That Work (supported by medical research)" data-sizes="(max-width: 466px) 100vw, 466px" data-src="https://www.restartmed.com/wp-content/uploads/2018/12/sources-of-radiation-exposure-updated.png" data-srcset="https://www.restartmed.com/wp-content/uploads/2018/12/sources-of-radiation-exposure-updated.png 466w, https://www.restartmed.com/wp-content/uploads/2018/12/sources-of-radiation-exposure-updated-300x344.png 300w, https://www.restartmed.com/wp-content/uploads/2018/12/sources-of-radiation-exposure-updated-261x300.png 261w" data-width="466" height="535" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='466'%20height='535'%20viewBox='0%200%20466%20535'%3E%3C/svg%3E" style="" title="sources of radiation exposure updated" width="466"><span class="dpsp-pin-it-overlay" data-dcnode-id="2301"></span><a aria-label="" class="dpsp-pin-it-button dpsp-pin-it-button-center dpsp-pin-it-button-shape-circle dpsp-pin-it-button-has-label" data-dcnode-id="2297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fwww.restartmed.com%252Fwp-content%252Fuploads%252F2018%252F12%252Fsources-of-radiation-exposure-updated.png%26url%3Dhttps%253A%252F%252Fwww.restartmed.com%252Fnatural-thyroid-remedies%252F%26is_video%3Dfalse%26description%3DAre%2520you%2520interesting%2520in%2520using%2520natural%2520therapies%2520to%2520heal%2520your%2520thyroid%253F%2520If%2520so%252C%2520then%2520you%2520need%2520to%2520see%2520this%2520entire%2520list%2520of%2520natural%2520thyroid%2520remedies.%2520You%2520will%2520find%2520information%2520on%2520what%2520type%2520of%2520diet%2520you%2520should%2520be%2520eating%252C%2520what%2520thyroid%2520supplements%2520you%2520should%2520be%2520taking%252C%2520how%2520to%2520exercise%2520for%2520your%2520thyroid%252C%2520whether%2520you%2520should%2520use%2520essential%2520oils%2520for%2520your%2520thyroid%252C%2520and%2520more.%2520You%27ll%2520also%2520find%2520out%2520how%2520these%2520therapies%2520heal%2520your%2520thyroid%252C%2520improve%2520your%2520thyroid%2520lab%2520tests%252C%2520and%2520help%2520reduce%2520the%2520symptoms%2520of%2520hypothyroidism." rel="noopener" target="_blank" title=""><span class="dpsp-network-icon" data-dcnode-id="2298"><svg data-dcnode-id="2299" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.856t1.952 0.736q0.992 0 1.824-0.448t1.408-1.216 0.992-1.696 0.672-1.952 0.352-1.984 0.128-1.792q0-3.072-1.952-4.8t-5.12-1.728q-3.552 0-5.952 2.304t-2.4 5.856q0 0.8 0.224 1.536t0.48 1.152 0.48 0.832 0.224 0.544q0 0.48-0.256 1.28t-0.672 0.8q-0.032 0-0.288-0.032-0.928-0.288-1.632-0.992t-1.088-1.696-0.576-1.92-0.192-1.92z" data-dcnode-id="2300"></path></svg></span></a></div><noscript data-dcnode-id="2294"><span data-dcnode-id="2295" instrument_node="">&lt;img class="tve_image wp-image-33747" alt="sources of radiation exposure updated" width="466" height="535" title="sources of radiation exposure updated" data-id="33747" src="https://www.restartmed.com/wp-content/uploads/2018/12/sources-of-radiation-exposure-updated.png" style="" data-width="466" data-height="535" data-init-width="466" data-init-height="535" srcset="https://www.restartmed.com/wp-content/uploads/2018/12/sources-of-radiation-exposure-updated.png 466w, https://www.restartmed.com/wp-content/uploads/2018/12/sources-of-radiation-exposure-updated-300x344.png 300w, https://www.restartmed.com/wp-content/uploads/2018/12/sources-of-radiation-exposure-updated-261x300.png 261w" sizes="(max-width: 466px) 100vw, 466px" data-pin-media="https://www.restartmed.com/wp-content/uploads/2018/12/sources-of-radiation-exposure-updated.png"&gt;</span></noscript></span></div><div class="thrv_wrapper thrv_text_element" data-dcnode-id="2098"><p data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">This is both good and bad.&nbsp;</span></p><p data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">Good in the sense that you almost always know where your radiation will be coming from and bad in the sense that you obviously don't want to be subjected to radiation unless you absolutely have to.&nbsp;</span></p><p data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">The point here is that if you do have to get an imaging study (X-ray or CT scan) make sure that you protect your thyroid gland with protective covering.&nbsp;</span></p><p data-dcnode-id="2284"><span data-dcnode-id="2285" instrument_node="">Lead covering can reduce your exposure to radiation and protect your thyroid gland from developing cancer or other issues down the line.&nbsp;</span></p><h4 class="" data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">#15. Stimulate your Thyroid with Exercise</span></h4><p data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node="">You probably know that exercising is something that everyone should be doing on a weekly (if not daily) basis.&nbsp;</span></p><p data-dcnode-id="2278"><span data-dcnode-id="2279" instrument_node="">And I'm not going to tell you anything different!</span></p><p data-dcnode-id="2276"><span data-dcnode-id="2277" instrument_node="">Why?</span></p><p data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">Because exercising positively impacts your thyroid.&nbsp;</span></p><p data-dcnode-id="2266"><span data-dcnode-id="2273" instrument_node="">In fact, exercising has been shown to </span><a data-dcnode-id="2271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amhsjournal.org/article.asp%3Fissn%3D2321-4848%3Byear%3D2015%3Bvolume%3D3%3Bissue%3D2%3Bspage%3D244%3Bepage%3D246%3Baulast%3DBansal" target="_blank"><span data-dcnode-id="2272" instrument_node="">increase free thyroid hormone concentration</span></a><span data-dcnode-id="2270" instrument_node=""> (26) (this is what allows your thyroid to do its job), </span><a data-dcnode-id="2268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3629815/" target="_blank"><span data-dcnode-id="2269" instrument_node="">reduces inflammation</span></a><span data-dcnode-id="2267" instrument_node=""> (27) (thereby indirectly improving thyroid function), and improves your metabolism (which helps treat weight gain).&nbsp;</span></p><p data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">The key to exercising for your thyroid has to do with how intensely you exercise.&nbsp;</span></p><p data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">If you don't exercise enough then you won't get any benefit.&nbsp;</span></p><p data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">But on the flip side, if you over exercise then you also risk damaging your thyroid.&nbsp;</span></p><p data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">Studies have shown that moderate intensity exercise (not light or high intensity) is the sweet spot for your thyroid.</span></p><p data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">As your heart rate, and demand on the body, ramps up, thyroid function tends to start to suffer.&nbsp;</span></p><p data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node="">This probably has to do with the fact that many thyroid patients already suffer from fatigue and stress on the body.&nbsp;</span></p><p data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">Because exercise is just another stressor, it's important you don't overdo it.&nbsp;</span></p><p data-dcnode-id="2248"><a data-dcnode-id="2250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.restartmed.com/thyroid-stimulating-exercises/" target="_blank"><span data-dcnode-id="2251" instrument_node="">You can find more information on exercising in this article</span></a><span data-dcnode-id="2249" instrument_node=""> which outlines how much is enough and how to prevent yourself from over-exercising or under exercising.&nbsp;</span></p><p data-dcnode-id="2245"><strong data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">Does it work?</span></strong></p><p data-dcnode-id="2243"><span data-dcnode-id="2244" instrument_node="">Absolutely.&nbsp;</span></p><p data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">Exercise is a tried and true therapy and something that everyone should consider doing.&nbsp;</span></p><p data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">The key is finding the right intensity for your body and using the right types of exercises which can take some trial and error.&nbsp;</span></p><h4 class="" data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">#16. Get Enough Sleep</span></h4><p data-dcnode-id="2233"><a data-dcnode-id="2235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.gallup.com/poll/166553/less-recommended-amount-sleep.aspx" target="_blank"><span data-dcnode-id="2236" instrument_node="">As many as 40% of American are not getting enough sleep each night</span></a><span data-dcnode-id="2234" instrument_node=""> (28).&nbsp;</span></p><p data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">And this lack of sleep can potentially cause problems for your thyroid.&nbsp;</span></p><p data-dcnode-id="2226"><span data-dcnode-id="2230" instrument_node="">Several studies show that sleep deprivation has a negative impact on the </span><a data-dcnode-id="2228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/8827131" target="_blank"><span data-dcnode-id="2229" instrument_node="">hypothalamic-pituitary-thyroid axis</span></a><span data-dcnode-id="2227" instrument_node=""> (29).&nbsp;</span></p><p data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">Sleep deprivation leads to a decrease in peripheral thyroid conversion and a rise in the TSH.&nbsp;</span></p><p data-dcnode-id="2221"><strong data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">Does getting enough sleep work?</span></strong></p><p data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">Yes! Your goal should be to get at least 8 hours of sleep each night if you have thyroid dysfunction.&nbsp;</span></p><p data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">Even though you may not feel like you need it, your body needs sleep to help heal and balance your hormones and this need may extend out for several months.&nbsp;</span></p><p data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">To allow your body enough sleep make sure that you provide your body with optimal sleeping conditions including sleeping temperature, blocking blue light exposure, proper bedding and darkness.&nbsp;</span></p><h4 class="" data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">#17. Get Enough Sunlight</span></h4><p data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">And by getting enough sunlight what I am really referring to is optimizing your Vitamin D status.&nbsp;</span></p><p data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">Why would you want to ensure that you have sufficient Vitamin D if you have thyroid problems?</span></p><p data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">The main reason has to do with the fact that your Vitamin D status can be used as proxy for your immune status.&nbsp;</span></p><p data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node="">Low levels of Vitamin D have been associated with an increased risk of developing autoimmune disease, especially Hashimoto's thyroiditis.&nbsp;</span></p><p data-dcnode-id="2200"><span data-dcnode-id="2204" instrument_node="">Hashimoto's thyroiditis is an autoimmune disease of the thyroid gland and the </span><a data-dcnode-id="2202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3921055/" target="_blank"><span data-dcnode-id="2203" instrument_node="">severity of thyroid antibodies has been shown to correlate with Vitamin D status</span></a><span data-dcnode-id="2201" instrument_node=""> (30).&nbsp;</span></p><p data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">The lower your Vitamin D status the higher your thyroid antibodies tend to be and the more damage that is done to your thyroid over time.&nbsp;</span></p><p data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">And the best way to get Vitamin D is not from supplementation but from the good old fashioned way of exposing your skin to the sun!</span></p><p data-dcnode-id="2191"><span data-dcnode-id="2195" instrument_node="">I've discussed the difference between </span><a data-dcnode-id="2193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.restartmed.com/vitamin-d-thyroid/" target="_blank"><span data-dcnode-id="2194" instrument_node="">supplementing with Vitamin D3 to raise your Vitamin D levels and the benefit that getting Vitamin D directly from the sun provides in this post</span></a><span data-dcnode-id="2192" instrument_node="">.&nbsp;</span></p><p data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node="">Sunlight is the absolute best way to get your Vitamin D.&nbsp;</span></p><p data-dcnode-id="2187"><span data-dcnode-id="2188" instrument_node="">How do you get Vitamin D from the sun?</span></p><p data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">Follow these guidelines:</span></p><ul class="" data-dcnode-id="2176"><li class="" data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">Only go outside in direct sunlight between the hours of 12:00 and 2:00pm.&nbsp;</span></li><li class="" data-dcnode-id="2181"><span data-dcnode-id="2182" instrument_node="">Expose 40% of your skin</span></li><li class="" data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">Stay outside in direct sunlight for 10-20 minutes (depending on your skin type)</span></li><li class="" data-dcnode-id="2177"><span data-dcnode-id="2178" instrument_node="">Do this daily!</span></li></ul><p data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node="">Following these guidelines will help you maximize Vitamin D levels while avoiding excessive sun exposure.&nbsp;</span></p><p data-dcnode-id="2171"><strong data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">Does it work?</span></strong></p><p data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">Yes! Getting enough sunlight will definitely help your Vitamin D status.&nbsp;</span></p><p data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">It isn't possible to get enough sunlight in all parts of the world due to the angle at which sun rays hit the earth, but most people will find tremendous benefit by getting out in the sun.&nbsp;</span></p><h3 class="" data-dcnode-id="2165" id="tab-con-2"><span data-dcnode-id="2166" instrument_node="">Combining Natural Therapies with Conventional Therapies</span></h3><p data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">I spent the majority of this article discussing natural therapies but I also think it's important to at least discuss conventional therapies as well.&nbsp;</span></p><p data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">The reason this is important is that I find that many patients find the best results when they combine conventional medicine with that of natural and alternative therapies.&nbsp;</span></p><p data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">By combining therapies you can get the best of both worlds.&nbsp;</span></p><p data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">But what exactly do I mean by conventional thyroid therapies?</span></p><p data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">Perhaps the primary treatment (and only treatment) is the use of prescription thyroid medication.&nbsp;</span></p><p data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">Prescription thyroid medications are used to provide your body with thyroid hormone directly (drawing from our analogy above it's like helping you press on the gas as opposed to lifting off the break).&nbsp;</span></p><p data-dcnode-id="2151"><span data-dcnode-id="2152" instrument_node="">Thyroid medications are very powerful and provide your body with exactly what it is missing.&nbsp;</span></p><p data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">The good news is that you can often use natural therapies AND thyroid medication at the same time.&nbsp;</span></p><p data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">Using this strategy may allow you to reduce the amount of thyroid medication that you need by helping your thyroid function naturally.&nbsp;</span></p><p data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">Indeed, many of the studies I've listed above have shown just that! A decrease in demand for thyroid medication as people improve their diet and add in exercise.&nbsp;</span></p><p data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">It's also important to understand that even though you may want to only undergo natural therapies that may not be possible for all people.&nbsp;</span></p><p data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">For instance:</span></p><p data-dcnode-id="2138"><strong data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">What if you have had your thyroid removed due to thyroid cancer? Or what if you've had your thyroid ablated because of Graves' disease?</span></strong></p><p data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">These are two situations in which you will be reliant upon thyroid medication for the rest of your life.&nbsp;</span></p><p data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">This doesn't mean you can't benefit from natural therapies, but it does mean you need to understand your specific situation.&nbsp;</span></p><p data-dcnode-id="2131"><strong data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">What if your thyroid has been atrophied and destroyed from autoimmune thyroiditis? </span></strong></p><p data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">This is another situation in which you simply won't be able to rehabilitate your thyroid function very well because of the damage that's already been done.&nbsp;</span></p><p data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">You still can, and should, do the natural therapies above, but it is not realistic to assume that you can bring your thyroid back after significant autoimmune attack.&nbsp;</span></p><p data-dcnode-id="2124"><strong data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">Is it possible to completely reverse thyroid function in most or at least some people? </span></strong></p><p data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">The answer is definitely yes but it really depends on your body, how long you've had thyroid disease, and what caused your thyroid problems to begin with.&nbsp;</span></p><h3 class="" data-dcnode-id="2120" id="tab-con-3"><span data-dcnode-id="2121" instrument_node="">Conclusion</span></h3><p data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">It's absolutely possible to treat and manage your thyroid in a natural way.&nbsp;</span></p><p data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">Natural remedies tend to work by helping your own body function and your thyroid to do its job.&nbsp;</span></p><p data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">This can be compared to conventional therapies (such as thyroid medication) which directly act to increase thyroid hormone.&nbsp;</span></p><p data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">For best results, you will probably want to consider a combination of both natural remedies as well as conventional therapies.&nbsp;</span></p><p data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">Now I want to hear from you:</span></p><p data-dcnode-id="2107"><strong data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">Have you tried any natural thyroid remedies?</span></strong></p><p data-dcnode-id="2104"><strong data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">If so, which ones worked for you? Which didn't?</span></strong></p><p data-dcnode-id="2101"><strong data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">Have you had success combining natural therapies with thyroid medication?</span></strong></p><p data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">Leave your questions and comments below!&nbsp;</span></p></div><div class="thrv_wrapper thrv_toggle_shortcode" data-css="tve-u-16872065b46" data-dcnode-id="1990" data-hover-color="var(--tcb-color-0)"><span data-dcnode-id="2097" instrument_node="">

</span><p data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">Dear Dr. Childs, I have been diagnosed with Hashimoto’s. All my life I have been slightly underweight, and chronically constipated; now I am starting to lose a lot of hair too. I do not consume gluten, dairy, soy, sugar, alcohol, caffeine and processed foods. I am taking lots of relevant supplements, yet I am still constipated, losing hair and never seem to put on weight. There must be something stopping me progressing, but I don’t know what to try next – could you suggest what I could try next? Thanks for your help!</span></p><span data-dcnode-id="1526" instrument_node="">

Thanks for this article! My doctor prescribed metformin to lower my insulin resistance (in an effort to lower my cortisol levels) and lose this extra 70lbs  I’ve gained. I didn’t take it initially, because of my fear of taking a drug (he practices both functional and integrative medicine). Two days ago I decided to try it as most of the other things you suggested, I’m already doing. I will have my leptin levels measured with my next visit. Your article confirmed and enlightened me. I’ll give it one month and become consistent ( tired of taking all these natural supplements). Please continue to share thyroid information to help us on the path to good health!</span></p><span data-dcnode-id="1431" instrument_node="">

</span><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Thanks a lot, Dr. Childs. I have begun avidly following your blog and will most certainly take a note of your suggestions. </span></p><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">What do you think of maca and ashwagandha powder as supplements to help improve functioning of thyroid gland? </span></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="982" instrument_node="">Am thinking of taking 1/4 tsp maca (Royal maca, Whole world botanicals </span><a data-dcnode-id="980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wholeworldbotanicals.com/royal-maca/thyroid-awareness/" rel="nofollow ugc"><span data-dcnode-id="981" instrument_node="">https://wholeworldbotanicals.com/royal-maca/thyroid-awareness/</span></a><span data-dcnode-id="979" instrument_node="">) and 1/4 tsp ashwagandha root powder daily (Terrasoul superfoods). For Maca 1/3 tsp = 833 mg and for Ashwagandha 1/3 tsp = 1g. I have tried this one without noticing any side effects.</span></p><span data-dcnode-id="977" instrument_node="">
