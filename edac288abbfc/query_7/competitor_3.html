</span><p data-dcnode-id="3189"><span data-dcnode-id="3190" instrument_node="">Adults and teens alike can suffer from the vexing problem of acne. Sometimes a simple natural remedy like apple cider vinegar will solve the problem easily. Other times the answer is more complicated depending on the cause of acne. Even so, home treatments including vitamin supplements, dietary changes, and hormone balancing can be combined to bring long-awaited relief to those with acne.</span></p><span data-dcnode-id="3188" instrument_node="">
</span><h2 data-dcnode-id="3186"><span data-dcnode-id="3187" instrument_node="">12 Natural Remedies for Acne</span></h2><span data-dcnode-id="3185" instrument_node="">
</span><h2 data-dcnode-id="3183"><span data-dcnode-id="3184" instrument_node="">1. Apple Cider Vinegar</span></h2><span data-dcnode-id="3182" instrument_node="">
</span><p data-dcnode-id="3177"><span data-dcnode-id="3181" instrument_node="">Apple cider vinegar is a simple and inexpensive cure for acne that works very well for many people. It can be used internally and externally for acne. &nbsp;When used topically, apple cider vinegar fights bacteria, supports the natural acidic nature of the skin and can shrink pores. Used internally, </span><a data-dcnode-id="3179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/cures/apple-cider-vinegar-acne-treatment.html"><span data-dcnode-id="3180" instrument_node="">apple cider vinegar</span></a><span data-dcnode-id="3178" instrument_node=""> helps to alkalize the body and supply probiotics to the system.</span></p><span data-dcnode-id="3176" instrument_node="">
</span><h2 data-dcnode-id="3174"><span data-dcnode-id="3175" instrument_node="">2. Turmeric</span></h2><span data-dcnode-id="3173" instrument_node="">
</span><p data-dcnode-id="3168"><span data-dcnode-id="3172" instrument_node="">Turmeric is a blood purifying herb that is also anti-inflammatory and antibacterial. If antibiotics have worked to relieve your acne, it is possible that turmeric would as well. Turmeric is taken internally for acne. 1-3 capsules can be taken twice a day, or ½ teaspoon can be added to some milk and taken as “</span><a data-dcnode-id="3170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/remedies/goldenmilk.html"><span data-dcnode-id="3171" instrument_node="">golden milk</span></a><span data-dcnode-id="3169" instrument_node="">.” Turmeric should be taken with plenty of water to avoid constipation. Turmeric is especially helpful when used with vitamin C.</span></p><span data-dcnode-id="3167" instrument_node="">
</span><h2 data-dcnode-id="3165"><span data-dcnode-id="3166" instrument_node="">3. Vitamin C</span></h2><span data-dcnode-id="3164" instrument_node="">
</span><p data-dcnode-id="3162"><span data-dcnode-id="3163" instrument_node="">Used alone or alongside turmeric, vitamin C supports the immune system, helps to fight infection, and is needed for skin regeneration. Sodium ascorbate is a good form of vitamin C to use and is easier on the system than ascorbic acid. 500-1,000 mg is taken 1-3 times a day. If your body is getting too much vitamin C, it will let you know. Too much vitamin C will cause loose stools, in which case you should reduce the dose.</span></p><span data-dcnode-id="3161" instrument_node="">
</span><h2 data-dcnode-id="3159"><span data-dcnode-id="3160" instrument_node="">4. Vitamin A</span></h2><span data-dcnode-id="3158" instrument_node="">
</span><p data-dcnode-id="3156"><span data-dcnode-id="3157" instrument_node="">Vitamin A supplements help some who suffer from acne. Because vitamin A is fat soluble and stored in the body, do not use excessive amounts of vitamin A. An alternative is to eat foods rich in vitamin A, like carrots. Carrot juice is even sometimes used topically to treat acne, and carrot essential oil is included in many face care products for its benefit to the skin.</span></p><span data-dcnode-id="3155" instrument_node="">
</span><h2 data-dcnode-id="3153"><span data-dcnode-id="3154" instrument_node="">5. Dietary Changes</span></h2><span data-dcnode-id="3152" instrument_node="">
</span><p data-dcnode-id="3150"><span data-dcnode-id="3151" instrument_node="">The food you consume is what your body uses to heal and repair itself. You do not need to have a perfect diet, but often times improving your diet and reducing empty calories will go a long way to healing acne and other chronic health problems. Processed foods do not give your body much to work with. Consume processed foods and fast foods less. Use more whole foods. Eat plenty of fruits and vegetables. Variety in your diet will help your body to get the assortment of nutrients that it needs.</span></p><span data-dcnode-id="3149" instrument_node="">
</span><p data-dcnode-id="3147"><span data-dcnode-id="3148" instrument_node="">For some people, certain foods will cause acne outbreaks. Sugar, fried foods, chocolate, dairy products and wheat products can be an issue for some. Try eliminating some of these foods for a time to see if you notice an improvement, especially anything which makes up a large part of your diet. (Hopefully sugar, fried foods, and chocolate do not make up a large part of your diet!)</span></p><span data-dcnode-id="3146" instrument_node="">
</span><p data-dcnode-id="3144"><span data-dcnode-id="3145" instrument_node="">Adding probiotic foods like sauerkraut, milk kefir or kombucha can improve your digestion and help your immune system to work more effectively, which is often a benefit to the skin, especially skin that needs healing.</span></p><span data-dcnode-id="3143" instrument_node="">
</span><p data-dcnode-id="3141"><span data-dcnode-id="3142" instrument_node="">Drinking quality liquids also can help with acne. Consume less soda pop, coffee, energy drinks and artificially sweetened drinks. Drink more water, green tea, and herbal tea. Water helps your body to flush out toxins. Keeping well hydrated with water will help your body to keep the toxins moving out!</span></p><span data-dcnode-id="3140" instrument_node="">
</span><h2 data-dcnode-id="3138"><span data-dcnode-id="3139" instrument_node="">6. Detox</span></h2><span data-dcnode-id="3137" instrument_node="">
</span><p data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">Acne can be a symptom of toxic overload in your system. Your skin eliminates toxins and acne is one way your body releases toxins. You can do things to help your body eliminate toxins in other ways, which will reduce the acne outbreaks.</span></p><span data-dcnode-id="3134" instrument_node="">
</span><p data-dcnode-id="3129"><span data-dcnode-id="3133" instrument_node="">As aforementioned, plenty of </span><strong data-dcnode-id="3131"><span data-dcnode-id="3132" instrument_node="">water</span></strong><span data-dcnode-id="3130" instrument_node=""> is a simple way to help your body flush out toxins.</span></p><span data-dcnode-id="3128" instrument_node="">
</span><p data-dcnode-id="3117"><span data-dcnode-id="3127" instrument_node="">Simple </span><strong data-dcnode-id="3125"><span data-dcnode-id="3126" instrument_node="">detox baths</span></strong><span data-dcnode-id="3124" instrument_node=""> with Epsom salt or baking soda a few times a week can help your body eliminate toxins. Start with 1 cup of Epsom salt or baking soda per bath. For more information, see our page on d</span><a data-dcnode-id="3122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/remedies/detox-and-healing-baths.html"><span data-dcnode-id="3123" instrument_node="">etox baths</span></a><span data-dcnode-id="3121" instrument_node=""> or you can </span><a data-dcnode-id="3119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/children/bath-bombs-for-fun-and-health.html"><span data-dcnode-id="3120" instrument_node="">make your own bath bombs</span></a><span data-dcnode-id="3118" instrument_node=""> to use for detox.</span></p><span data-dcnode-id="3116" instrument_node="">
</span><p data-dcnode-id="3111"><span data-dcnode-id="3115" instrument_node="">If you do not have</span><strong data-dcnode-id="3113"><span data-dcnode-id="3114" instrument_node=""> regular bowel movements</span></strong><span data-dcnode-id="3112" instrument_node=""> (another way your body eliminates waste) your body will find alternatives to eliminate waste which can result in acne as toxins are eliminated through the skin. If constipation is an issue, find some simple remedies to get your body regular.</span></p><span data-dcnode-id="3110" instrument_node="">
</span><p data-dcnode-id="3106"><strong data-dcnode-id="3108"><span data-dcnode-id="3109" instrument_node="">Liquid chlorophyll </span></strong><span data-dcnode-id="3107" instrument_node="">is a supplement you can use to help your body to remove toxins.</span></p><span data-dcnode-id="3105" instrument_node="">
</span><h2 data-dcnode-id="3103"><span data-dcnode-id="3104" instrument_node="">7. Hormone Balancing</span></h2><span data-dcnode-id="3102" instrument_node="">
</span><p data-dcnode-id="3100"><span data-dcnode-id="3101" instrument_node="">Many of the above-listed remedies will help your body to naturally balance hormones, which can reduce acne symptoms.</span></p><span data-dcnode-id="3099" instrument_node="">
</span><p data-dcnode-id="3094"><span data-dcnode-id="3098" instrument_node="">Adults can consider </span><a data-dcnode-id="3096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/remedies/borax.html"><span data-dcnode-id="3097" instrument_node="">Ted’s borax solution</span></a><span data-dcnode-id="3095" instrument_node=""> as a hormone balancing remedy.</span></p><span data-dcnode-id="3093" instrument_node="">
</span><p data-dcnode-id="3091"><span data-dcnode-id="3092" instrument_node="">Red raspberry leaf tea is a simple and tasty tea that can be taken daily by girls and women to balance hormones. Two or three cups of red raspberry leaf tea will supply minerals and nutrients needed for good hormone balance.</span></p><span data-dcnode-id="3090" instrument_node="">
</span><h2 data-dcnode-id="3088"><span data-dcnode-id="3089" instrument_node="">How to Clean Your Face if You Have Acne</span></h2><span data-dcnode-id="3087" instrument_node="">
</span><p data-dcnode-id="3085"><span data-dcnode-id="3086" instrument_node="">It is tempting to use harsh soaps and chemicals if you have acne, to make sure that your face is very clean. However, these things can contribute to the problem. Removing all the oil from your face encourages your body to produce more oil for your face. Harsh products can damage skin instead of helping it to move towards a more healthy state. Simple natural items can effectively clean and nourish the skin while healing acne.</span></p><span data-dcnode-id="3084" instrument_node="">
</span><h3 data-dcnode-id="3082"><span data-dcnode-id="3083" instrument_node="">8. Honey</span></h3><span data-dcnode-id="3081" instrument_node="">
</span><p data-dcnode-id="3079"><span data-dcnode-id="3080" instrument_node="">You can use honey to clean your face! Honey is gentle and nourishing. Use raw honey and gently massage some into your face and rinse with warm water.</span></p><span data-dcnode-id="3078" instrument_node="">
</span><h3 data-dcnode-id="3076"><span data-dcnode-id="3077" instrument_node="">9. Oatmeal</span></h3><span data-dcnode-id="3075" instrument_node="">
</span><p data-dcnode-id="3073"><span data-dcnode-id="3074" instrument_node="">Oatmeal is soothing to the skin and can be used as a gentle exfoliant. Grind up some oats in your blender for this purpose. Moisten the oats with some buttermilk, yogurt or just plain water and gently massage the face. Rinse with warm water.</span></p><span data-dcnode-id="3072" instrument_node="">
</span><h3 data-dcnode-id="3070"><span data-dcnode-id="3071" instrument_node="">10. Oil Cleansing</span></h3><span data-dcnode-id="3069" instrument_node="">
</span><p data-dcnode-id="3067"><span data-dcnode-id="3068" instrument_node="">Yes, oil! Castor oil, almond oil or argan oil can be used to gently remove makeup and cleanse the face. Gently remove the oil with warm water.</span></p><span data-dcnode-id="3066" instrument_node="">
</span><h3 data-dcnode-id="3064"><span data-dcnode-id="3065" instrument_node="">11. French Green Clay</span></h3><span data-dcnode-id="3063" instrument_node="">
</span><div data-dcnode-id="3058" id="943725766"><span data-dcnode-id="3062" instrument_node="">
</span><span data-dcnode-id="3059" instrument_node="">
</span></div><p data-dcnode-id="3056"><span data-dcnode-id="3057" instrument_node="">Treat yourself to a mask of French Green Clay to remove toxins from the skin every week or two. (Too often can dry out the skin.) Mix equal parts of French Green Clay with water. Massage onto the face. Don’t allow it to completely dry on the face. Rinse off with warm water after 10 minutes or so.</span></p><span data-dcnode-id="3055" instrument_node="">
</span><h3 data-dcnode-id="3053"><span data-dcnode-id="3054" instrument_node="">12. Calendula</span></h3><span data-dcnode-id="3052" instrument_node="">
</span><p data-dcnode-id="3050"><span data-dcnode-id="3051" instrument_node="">You can make your own Calendula face toner with calendula flowers and witch hazel.</span></p><span data-dcnode-id="3049" instrument_node="">
</span><ul data-dcnode-id="3038"><span data-dcnode-id="3048" instrument_node="">
</span><li data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">Place dried calendula flowers into a glass jar.</span></li><span data-dcnode-id="3045" instrument_node="">
</span><li data-dcnode-id="3043"><span data-dcnode-id="3044" instrument_node="">Cover with witch hazel.</span></li><span data-dcnode-id="3042" instrument_node="">
</span><li data-dcnode-id="3040"><span data-dcnode-id="3041" instrument_node="">Strain flowers out in one week.</span></li><span data-dcnode-id="3039" instrument_node="">
</span></ul><span data-dcnode-id="3037" instrument_node="">
</span><p data-dcnode-id="3035"><span data-dcnode-id="3036" instrument_node="">Use a cotton ball to apply the calendula infused witch hazel to your face as a toner.</span></p><span data-dcnode-id="3034" instrument_node="">
</span><h3 data-dcnode-id="3031"><strong data-dcnode-id="3032"><span data-dcnode-id="3033" instrument_node="">What Causes Acne?</span></strong></h3><span data-dcnode-id="3030" instrument_node="">
</span><p data-dcnode-id="3028"><span data-dcnode-id="3029" instrument_node="">Acne can be caused by hormonal changes and imbalances, bacteria, fungus, toxin&nbsp;build-up, and other health problems. Figuring out the root of the acne problem can help to find the appropriate remedy. Acne is not generally caused by a lack of cleanliness. In fact, many acne sufferers tend to overclean their faces!</span></p><span data-dcnode-id="3027" instrument_node="">
</span><p data-dcnode-id="3023"><span data-dcnode-id="3026" instrument_node="">What's your favorite natural cure for acne? Please </span><a data-dcnode-id="3024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/contactus.html"><span data-dcnode-id="3025" instrument_node="">send us your&nbsp;remedy!</span></a></p><span data-dcnode-id="3022" instrument_node="">

</span><br data-dcnode-id="2826"><span data-dcnode-id="2825" instrument_node=""> </span><p data-dcnode-id="2823"><span data-dcnode-id="2824" instrument_node="">
Don't ever take Accutane. The side effects are too dire and not worth it!! Any decent, informed doctor will tell you this. There are natural remedies out there that are incredibly effective for keeping acne at bay. Apple Cider Vinegar 2 teaspoons in 8 ounces of purified water 3 X a day. B vitamins are also incredible for helping to clear acne, particularly in Coenzymated forms (if you get an initial breakout don't worry - that's a good sign it's clearing things out). Ground Flaxseeds and Hemp seeds are also great for skin. Tea Tree Oil works amazingly well as a spot treatment, it's more powerful than Benzamycin and without the toxic effects. Just know there are natural remedies out there that clear skin! You don't have to rely on medication that will damage your body.</span></p><span data-dcnode-id="2822" instrument_node="">
</span><p data-dcnode-id="2820"><span data-dcnode-id="2821" instrument_node="">Also, it is crucial to stay away from all dairy from a cow (goat is ok). It is the most acne producing food and best to stay clear of if you want clear skin!</span></p><span data-dcnode-id="2819" instrument_node="">

I've struggled with adult acne for years but finally got it under control by not using commercial soaps/moisturizers, only handmade soap and a moisturizing mix of grapeseed oil, castor oil, jojoba oil, lavender &amp; tea tree &amp; lemongrass essential oils. However, sometimes even though I haven't changed any of my skin treatments, I've experienced breakouts. </span></p><span data-dcnode-id="2758" instrument_node="">
</span><p data-dcnode-id="2756"><span data-dcnode-id="2757" instrument_node="">Recently I connected the breakouts to starting a new vitamin supplement. I stopped the supplement and the breakouts stopped. A similar thing had happened about a year ago and I compared the ingredients of the two supplements (one was Vitamin C and the other was a multi). The only thing they seemed to have in common was silicon dioxide. I checked the supplements I take that don't seem to bother me (flax oil, magnesium, Vit D, and another brand of Vit C) and none of them have silicon dioxide in them. It's hard to be sure what exactly it is, but I just wanted people to consider that perhaps their supplements are causing breakouts!</span></p><span data-dcnode-id="2755" instrument_node="">

</span><img align="baseline" alt="5 out of 5 stars" data-dcnode-id="2644" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/images/stars/5.png&amp;raw" title="5 out of 5 stars"><p data-dcnode-id="2642"><span data-dcnode-id="2643" instrument_node=""> </span></p><p data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">
I agree with stopping the use anything containing sodium lauryl sulfate (SLS). I got canker sores in my mouth repeatedly for a month until I switched to a sensitve toothpaste (pronamel or sensodyne are good and inexpensive) and my canker sores vanished w/in 1 day - the only different ingredient was the absence of SLS. Read up on it and SLS is a strong detergent used in toliet cleaner/bath&amp;kitchen cleaner to make the "foaming" soapy action... Everything has this - shampoo, bottled soaps, toothpaste, and all household cleaners. I started developing cysts and dandruff problems on my head after a while and was shedding a lot of hair, I found some good shampoos - David Babaii's Wildaid (from ULTA) and Renpure Organics (from Walgreens) - they don't have SLS and have safer, less harmful ingredients for the environment - my scalp problems vanished w/in 1 week and I haven't had problems for the last 2 years since I've cut SLS out of my life.</span></p><span data-dcnode-id="2639" instrument_node="">
</span><p data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">I was on Retin-A for years w/o much help, still broke out and it turned my face red. Using face wash w/o SLS has reduced my acne outbreaks to only 3-4 days out of the month when I'm cycling, all other times my face is pretty clear and I don't have to apply harsh chemicals anymore.</span></p><span data-dcnode-id="2636" instrument_node="">

</span><br data-dcnode-id="2579"><span data-dcnode-id="2578" instrument_node=""> </span><p data-dcnode-id="2576"><span data-dcnode-id="2577" instrument_node="">
I suffered from acne for years. As I got older, it got worse. After trying numerous OTC remedies, at great expense, I started doing research on what the problem could be. Chemicals! SLS/ALS's trigger acne. Propylene glycol triggers acne. Parabens trigger acne. Mineral oil triggers acne. The list goes on and on. All these chemicals were linked to my bad skin. So, I stopped using everything - shampoo, face/body wash, toothpaste, deodorant, lotions, creams, etc. I started over. K.I.S.S. - keep it super simple. Natural is the key with the fewest ingredients possible. There are cosmetics out there that are natural and pigmented with fruit. There are soaps out there that are just made with castille soap. Baking soda for deodorant. Read the labels - you'd be surprised. The stuff is even in our food. Moisturize with an organic oil (yes, you can put natural oil on your face if you have acne). Look into essential oils and adding a few drops. Eliminate everything and then start adding in a few natural things. After I eliminated all the chemicals, my skin cleared. I get a zit here and there (PMS related), but rarely. Read your labels! Note: the cosmetic industry is self-regulated. Even if it says "natural" it may not be. Don't be fooled - read the ingredients.</span></p><span data-dcnode-id="2575" instrument_node="">

Thoes harsh chemicals are horrible for skin and hair, not only that but our health as well. I've been using African black soap to cleanse my face and body, it's free of all harsh SLS's, parabens, is high in natural glycerin and has been used traditionaly by African women to wash lol babies! The smell is very earthy and it lathers like a body wash. I wet my face and hands with Luke warm water rub the bar untill it lathers slightly and lightly massage my face in little circles for about 1 min, rinse well with a cloth. I also like to use a toner I made out of boiled( and cooled) water, organic apple cider vinegar with mother, peppermint tea and lavender oil. To make:</span></p><span data-dcnode-id="2517" instrument_node="">
</span><p data-dcnode-id="2511"><span data-dcnode-id="2516" instrument_node="">Boil 3 cups of water</span><br data-dcnode-id="2515"><span data-dcnode-id="2514" instrument_node="">Throw in 1 peppermint tea bag</span><br data-dcnode-id="2513"><span data-dcnode-id="2512" instrument_node="">3 drops of lavender EO</span></p><p data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">Let stand untill cool </span></p><span data-dcnode-id="2508" instrument_node="">
</span><p data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">Add 1/4 cup ACV</span></p><span data-dcnode-id="2505" instrument_node="">
</span><p data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">The smell of the ACV dissipates once it's dried, if you have very sensitive skin you can use less ACV. I also moisturize with extra virgin organic coconut oil, use VERY VERY sparingly, focusing on your dry areas and under the eyes!! That's my daily skin care and I finally don't have to wear any of that foundation anymore without being embarassed of red patches and zit everywhere!</span></p><span data-dcnode-id="2502" instrument_node="">

</span><br data-dcnode-id="2443"><span data-dcnode-id="2442" instrument_node=""> </span><p data-dcnode-id="2440"><span data-dcnode-id="2441" instrument_node="">
I am an aesthetician and treat acne clients on a regular basis. The first thing I teach my clients is how to wash their face. When washing your face use a good quality product and apply it using a light hand, don't press or push to hard. You do not want to stimulate more oils by pressing to hard. Use a very light touch in circular motions for 1 to 2 minutes. Yes, 1 or 2 minutes, you want to cleanse the skin and the pores. Always use a clean wash cloth with warm (not hot) water to rinse your face. It is important to use a wash cloth to pick up the oils from the face as well as exfoliating . (this is one thing I find that most of my acne clients don't do), but when you think of it we use some kind of cloth to wash our dishes, our cars, or the counter top. Washing in the morning and evening should be enough. So make sure you have plenty of clean wash cloths on hand.</span></p><span data-dcnode-id="2439" instrument_node="">

</span><p data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">
I'm a Registered Nurse and had an Anti-Aging Center. I agree with the esthetician who states that proper method of cleansing the skin. The reason you should use a 100% cotton wash cloth is because the cotton fibers pick up the dead skin cells (which baby wipes do not do). It's these dead skin cells that help contribute to clogging the pores. You will definitely start seeing a difference with this method. It also stimulates a small bit of collagen (desperately wanted as we age)</span></p><span data-dcnode-id="2330" instrument_node="">

I haven't ever had severe acne, but I tend to get a lot of blackheads and breakouts every once in a while. I have started this simple regimine and it has worked terrifically when I follow through with it.</span></p><p data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">I wash my face with non-foaming wash in the shower, and once with only water before bed. Once a week I apply AVC to my entire face besides the eye area. It dried out pimples but not the rest of your face.</span></p><p data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">For bacne I use naturally made soap and a pumice stone. It works great.</span></p><p data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">Also applying an organic lotion in the morning helps with acne and bacne. I use Nubian Organic Honey and Blackseed healing lotion. It smells good too. :)</span></p><span data-dcnode-id="2267" instrument_node="">

</span><p data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">
I can't stress how much thoroughly washing my face has made a difference in the feel of my skin. Normally I would lather the soap on my face and immediately rinse. The surface of my face would get clean, but keep in mind most of the skin on our faces is about seven layers deep. It takes more than a quick rinse to thoroughly cleanse.</span></p><span data-dcnode-id="2213" instrument_node="">
</span><p data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">Now I lather and massage in a circular motion for a couple of minutes. Sometimes if I had been wearing a lot of makeup or something that day I will wash my face twice. </span></p><p data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">After the first time you do this you will literally feel an immediate difference. Your skin will feel deep-cleaned.</span></p><span data-dcnode-id="2208" instrument_node="">
</span><div class="links-group" data-dcnode-id="2175" style="display: table; width:99%;"><div data-dcnode-id="2177" style="width:80%; margin:5px 0;"><a class="reply-btn btn btn-default" data-dcnode-id="2205" onclick="javascript:loadReplyForm('28171','Feedback','Lindsay','73','Acne Tips','79886','1'); document.getElementById('respond-28171').scrollIntoView(); setup();"><i class="fa fa-reply-all" data-dcnode-id="2207" style="cursor: pointer;"></i><span data-dcnode-id="2206" instrument_node=""> Reply</span></a><span data-dcnode-id="2204" instrument_node=""> </span><a data-dcnode-id="2200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/earthclinic%3F%26_encoding%3DUTF8%26tag%3Dearthclinic-20%26linkCode%3Dur2%26linkId%3D1117e7408c329825d9c641f5ab1132ef%26camp%3D1789%26creative%3D9325" style="padding-right:1px;" target="_self"><i class="fa fa-amazon" data-dcnode-id="2203" data-toggle="tooltip" title="Research on Amazon"></i><span data-dcnode-id="2202" instrument_node=""> </span><span data-dcnode-id="2201"></span></a><span data-dcnode-id="2199" instrument_node=""> </span><a data-dcnode-id="2195" href="#" onclick="sharePost('https%3A%2F%2Fwww.earthclinic.com%2FRedirect.php%3FpageLink%3D%2Fcures%2Facne.html%26name%3Daloemt_79886','79886','Feedback');return false;"><i class="fa fa-share-alt" data-dcnode-id="2198" data-toggle="tooltip" title="Share this post"></i><span data-dcnode-id="2197" instrument_node=""> </span><span data-dcnode-id="2196"></span></a><span data-dcnode-id="2194" instrument_node=""> </span><a class="" data-article="79886" data-dcnode-id="2189" data-hearts="" data-toggle="tooltip" data-vote="73" href="#" onclick="rateArticle(73, 79886, '');return false;" title="Love this post? Click this button."><i class="fa fa-heart hearts" data-article="79886" data-dcnode-id="2190"><span data-dcnode-id="2193" instrument_node=""> </span><span data-dcnode-id="2191" style="font-family: Verdana,Helvetica,sans-serif;"><span data-dcnode-id="2192" instrument_node=""> </span></span></i></a><span data-dcnode-id="2188" instrument_node=""> </span><a class="followlink" data-dcnode-id="2184" href="#"><i class="fa fa-eye" data-dcnode-id="2187" data-toggle="tooltip" title="Follow this thread in your account"></i><span data-dcnode-id="2186" instrument_node=""> </span><span data-dcnode-id="2185"></span></a><span data-dcnode-id="2183" instrument_node=""> </span><a data-dcnode-id="2179" href="#" onclick="flagPost('73', '79886', 'Acne Tips', 'Feedback');return false;"><i class="fa fa-flag red" data-dcnode-id="2182" data-toggle="tooltip" title="Report this post"></i><span data-dcnode-id="2181" instrument_node=""> </span><span data-dcnode-id="2180"></span></a><span data-dcnode-id="2178" instrument_node=""> </span></div><div class="hidlink" data-dcnode-id="2176" style="display: table-cell; text-align:right;"></div></div><span data-dcnode-id="2174" instrument_node=""> </span></div><span data-dcnode-id="2172" instrument_node="">

Posted by Stella (USA) on 07/01/2008</span><br data-dcnode-id="2156"><span data-dcnode-id="2155" instrument_node="">
</span></span><span data-dcnode-id="2153" instrument_node="">
</span><br data-dcnode-id="2152"><span data-dcnode-id="2151" instrument_node=""> </span><p data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">
Here are a few tips to help control acne. Whenever I sway from these I pay the price.</span></p><span data-dcnode-id="2148" instrument_node="">
</span><p data-dcnode-id="2145"><strong data-dcnode-id="2146"><span data-dcnode-id="2147" instrument_node="">Acne Tips:</span></strong></p><span data-dcnode-id="2144" instrument_node="">
</span><ul data-dcnode-id="2095"><span data-dcnode-id="2143" instrument_node="">
</span><li data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">Wash face Twice in a row</span></li><span data-dcnode-id="2140" instrument_node="">
</span><li data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">Rinse face Thirteen splashes</span></li><span data-dcnode-id="2137" instrument_node="">
</span><li data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">Exfoliate once a week</span></li><span data-dcnode-id="2134" instrument_node="">
</span><li data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">Have good oral hygiene</span></li><span data-dcnode-id="2131" instrument_node="">
</span><li data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">Plucking eyebrows invites bacteria-clean the area well after</span></li><span data-dcnode-id="2128" instrument_node="">
</span><li data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">Don't bite inside your cheeks or lips</span></li><span data-dcnode-id="2125" instrument_node="">
</span><li data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">Use a water filter on the shower</span></li><span data-dcnode-id="2122" instrument_node="">
</span><li data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">Change pillowcases every other day (I use aloe soaked pillowcases)</span></li><span data-dcnode-id="2119" instrument_node="">
</span><li data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">Do not use fabric softener or dryer sheets and use only chemical free laundry soap</span></li><span data-dcnode-id="2116" instrument_node="">
</span><li data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">Use chemical free shamp/Cond and hair products (what you put on your hair ends up on your face)</span></li><span data-dcnode-id="2113" instrument_node="">
</span><li data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">Clean your phone often (a must)</span></li><span data-dcnode-id="2110" instrument_node="">
</span><li data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">Use a natural deodorant</span></li><span data-dcnode-id="2107" instrument_node="">
</span><li data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">Use chemical free hand-soap and moisturizer (what you put on your hands ends up on your face)</span></li><span data-dcnode-id="2104" instrument_node="">
</span><li data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">Wash your hands after you touch your pets</span></li><span data-dcnode-id="2101" instrument_node="">
</span><li data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">Wash your hands and chin after you brush your teeth because bacteria from your mouth drips on your face</span></li><span data-dcnode-id="2098" instrument_node="">
</span><li data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">Never use Old make-up</span></li></ul><span data-dcnode-id="2094" instrument_node="">
</span><p data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">Do Not leave your face wash and shamp/cond in the shower, store it in a dry place</span></p><span data-dcnode-id="2091" instrument_node="">

STOP USING DEODORANT IF YOU HAVE ACNE!</span></p><span data-dcnode-id="2029" instrument_node="">
</span><p data-dcnode-id="2027"><span data-dcnode-id="2028" instrument_node="">Why? I have no idea but I have tried every remedy in the book for acne and it would not cure it. From benzaclyn, proactiv, retina micro, hydrogen peroxide, acv, etc. You name it, I prolly tried it. So one day I decided to get away from regular deodorant and go to a natural deodorant because of the Aluminum in deodorant. Little did I know days later my face was clear and has been clear for 2 months now. It has been the clearest it has ever been since I was a kid. I went to my local supermarket and found this deodorant called Toms Natural Deodorant and it is Aluminum free. Maybe the ingredients in my deodorant I had always used was the cause for my acne. I wish I knew this in high school! Try it, It's amazing!</span></p><span data-dcnode-id="2026" instrument_node="">

</span><img align="baseline" alt="5 out of 5 stars" data-dcnode-id="1969" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/images/stars/5.png&amp;raw" title="5 out of 5 stars"><p data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node=""> </span></p><p data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">
My decade-long bout with facial acne ended when I (1) Quit using liquid make-up, and (2) Started using a facial wash with alpha hydroxy acid. My absolute favorite is the brand Alpha Hydrox Foaming Facial Wash. Awesome AND inexpensive. I think that quitting using concealers and liquid make-up to cover up the skin is crucial to stopping the acne cycle. Even if a liquid make-up claims to be non-codemogenic it may aggravate the acne. For a while I used powder make-up, which didn't cause break-outs, but now I rarely even use that.</span></p><span data-dcnode-id="1964" instrument_node="">

</span><img align="baseline" alt="5 out of 5 stars" data-dcnode-id="1793" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/images/stars/5.png&amp;raw" title="5 out of 5 stars"><p data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node=""> </span></p><p data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">
Lots of great acne tips here. If you drink 1 tbs baking soda in a glass of water and 1 or 2 tbs apple cider vinegar in a glass of water, it will make your body alkaline (rather than acidic - the US diet is almost 100% acidic which promotes... Cancer and disease). An alkaline body actually makes your body a very poor host for disease and bad bacteria. Having an acidic body is like posting your houseparty on Facebook... They ALL show up. Incluing acne.</span></p><span data-dcnode-id="1788" instrument_node="">
</span><p data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">I would also suggest a wakeup and before going to bed rinse of your face with a cottonball or cottonpad dampened with witch hazel. It gently removes a lot of the oil from your skin without drying you out. Keep a small bottle of it with you during the day and it is great for a midday removal of any oil that may accumulate on your face.</span></p><span data-dcnode-id="1785" instrument_node="">
</span><p data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">Research the skin vitality vitamins, minerals and supplements also. A base vitamin regime of a multi vit/min, vit C, vit E, vit D will help keep that healthy glow to your visage and prevent you from getting sick with all the colds and flu that come around. The US diet is very deficient in vitamins and minerals, one of the reasons that hypo/hyper thyroidism is so prevalent. 90% of Americans checked have low levels of vit D (get more Sun... But choose short exposures), magnesium and vit B12. In the past 30 years the soil has been depleted, so you cannot trust the produce to provide vits/mins anymore. Some vits/mins are as much as 90% less than 3 decades ago. Take your vitamins.</span></p><span data-dcnode-id="1782" instrument_node="">
</span><p data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">Also be aware of the 3 stooges that appear in virtually all processed food and drink. Aspartame, MSG and high fructose corn syrup. They are excitotoxins which play havoc on your digestive, neuro and endocrine systems... Which could manifest as acne breakouts. If you switch to an organic diet you will find you eat less (because your body is geting nutrition and doesn't need to signal you to gorge so that it gets the proper amount of nutrients).</span></p><span data-dcnode-id="1779" instrument_node="">
</span><p data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">Sleep much? 8 hours or more per night to ensure that your face gets the restorative and healing rest it needs. Research good sleepijng methods and be sure that you have a comfortable, dark (wear a face mask if necessary) and peaceful place to rest.</span></p><span data-dcnode-id="1776" instrument_node="">
</span><p data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">Good luck!</span></p><span data-dcnode-id="1773" instrument_node="">
