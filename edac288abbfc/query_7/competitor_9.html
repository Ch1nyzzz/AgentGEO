</span><h3 data-dcnode-id="1195" id="h-guaranteed-safer-and-far-more-effective"><span data-dcnode-id="1199" instrument_node="">Guaranteed, safer, and </span><strong data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">far more effective</span></strong><span data-dcnode-id="1196" instrument_node="">…</span></h3><span data-dcnode-id="1194" instrument_node="">
</span><h4 data-dcnode-id="1192" id="h-over-40-000-happy-customers-since-2006-with-a-success-rate-of-over-98"><span data-dcnode-id="1193" instrument_node="">Over 40,000 happy customers since 2006 – with a success rate of over 98%*</span></h4><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">So what is this new proven treatment for stomach ulcers that everyone is talking about? Our Natural Health team reveals the facts behind this incredibly successful natural method now being recommended and used by health care professionals around the world. Look no further – the safest, all-natural answer to stomach ulcers lies right here…</span></p><span data-dcnode-id="1188" instrument_node="">
</span><h4 data-dcnode-id="1186" id="h-get-the-right-treatment-and-get-better-sooner"><span data-dcnode-id="1187" instrument_node="">Get the right treatment – and get better sooner!</span></h4><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">The aim of any good treatment for stomach ulcers should be to successfully treat H. pylori (the main cause of ulcers) with just one course of treatment. This will prevent the onset of more ulcers – or the worsening of any existing ulcers.</span></p><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1178"><span data-dcnode-id="1181" instrument_node="">We have heard from so many visitors who unnecessarily subjected themselves to a great deal of pain and unnecessary suffering – by failing to do some simple research on the </span><a data-dcnode-id="1179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ulcer-cure.com/chemical-based-ulcer-treatments/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1180" instrument_node="">treatment/s being recommended to them by their doctors.</span></a></p><span data-dcnode-id="1177" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1172"><figure class="aligncenter size-full" data-dcnode-id="1173"><img alt="h pylori bacteria" class="wp-image-5772" data-dcnode-id="1176" height="145" loading="lazy" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ulcer-cure.com/wp-content/uploads/2021/06/pylori-bug-500w.png&amp;raw" srcset="https://www.ulcer-cure.com/wp-content/uploads/2021/06/pylori-bug-500w.png 500w, https://www.ulcer-cure.com/wp-content/uploads/2021/06/pylori-bug-500w-300x87.png 300w" width="500"><figcaption data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">H. pylori bacterium</span></figcaption></figure></div><span data-dcnode-id="1171" instrument_node="">
</span><h4 data-dcnode-id="1169" id="h-ineffective-treatments-can-be-worse-than-no-treatment"><span data-dcnode-id="1170" instrument_node="">Ineffective treatments – can be worse than no treatment!</span></h4><span data-dcnode-id="1168" instrument_node="">
</span><p data-dcnode-id="1163"><span data-dcnode-id="1167" instrument_node="">Growing evidence has linked the presence of </span><a data-dcnode-id="1165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ulcer-cure.com/h-pylori/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1166" instrument_node="">H. pylori </span></a><span data-dcnode-id="1164" instrument_node="">to cardiac arrests and stomach cancer, so it’s best to treat this infection as soon and as safely as possible. </span></p><span data-dcnode-id="1162" instrument_node="">
</span><p data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Choosing the wrong treatment can be costly in all ways. Using ineffective treatments results in you staying unwell for as long as it takes you to find and complete a treatment that will actually work for you. You also need to take into account the financial costs that you can’t recover. </span></p><span data-dcnode-id="1159" instrument_node="">
</span><h4 data-dcnode-id="1157" id="h-how-to-avoid-this"><span data-dcnode-id="1158" instrument_node="">A simple way to avoid disappointment…</span></h4><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">Simply make sure that the treatment you accept or choose, is actually going to work. This is actually quite easy to do, as we are about to show you. </span></p><span data-dcnode-id="1153" instrument_node="">
</span><p data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">Taking a little time to research treatment options is a crucial part of regaining your good health. Don’t settle for treatments that have poor success rates – or bad side effects. Both are risks that could result in your health deteriorating. </span></p><span data-dcnode-id="1150" instrument_node="">

</span><p data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">In September 2006, we had the privilege of introducing a completely unique natural solution to H. pylori sufferers across the globe.</span></p><span data-dcnode-id="1144" instrument_node="">
</span><p data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">This all-natural solution is unique for many reasons, but the most important reason is that it is clinically proven to be over 98% effective* in the treatment of H. pylori bacteria – and it has no known negative side effects.</span></p><span data-dcnode-id="1141" instrument_node="">

</span><p data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Known as Matula Tea, this unique 30-day herbal preparation from Southern Africa is proven in both laboratory studies and clinical trials to be extremely effective against H. pylori bacteria – the proven cause of 90% of stomach ulcers.</span></p><span data-dcnode-id="1117" instrument_node="">
</span><p data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">Most people really enjoy the taste of Matula Tea and also find it much easier, and safer to take (only 2 cups of Matula Tea per day) than prescribed treatments.</span></p><span data-dcnode-id="1114" instrument_node="">

</span><p data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">We have now had the privilege of using Matula Tea to successfully treat over 40,000 people diagnosed with a presence of H. pylori. The results have been no less than remarkable, and with less than 0.03% reports of discomfort during treatment.</span></p><span data-dcnode-id="1102" instrument_node="">
</span><p data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">Recovery time after the successful treatment of H. pylori bacteria has proven to be far quicker than when using other methods. In general, the well-being of patients has improved remarkably, with improvements in other parts of the body being reported as well.</span></p><span data-dcnode-id="1099" instrument_node="">
</span></div></div><span data-dcnode-id="1096" instrument_node="">

</span><h4 data-dcnode-id="1053" id="h-different-levels-of-infection-require-different-methods-of-treatment"><span data-dcnode-id="1054" instrument_node="">Different levels of infection require different methods of treatment…</span></h4><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">There are generally 4 different approaches to the successful treatment of H. pylori. These depend on how long you have been infected, and if you also have ulcers, and also if you have had any other treatments for H. pylori in the last 12 months.</span></p><span data-dcnode-id="1049" instrument_node="">
</span><p data-dcnode-id="1044"><span data-dcnode-id="1048" instrument_node="">No matter what level of infection you have, the core ingredient of this proven protocols is always </span><a data-dcnode-id="1046" data-id="/matula-tea-benefits/" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ulcer-cure.com/matula-tea-benefits/"><span data-dcnode-id="1047" instrument_node="">Matula Tea</span></a><span data-dcnode-id="1045" instrument_node=""> – this is the real secret to having more than a 98% chance of success*</span></p><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1040"><strong data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Proven Treatment Protocols</span></strong></p><span data-dcnode-id="1039" instrument_node="">
</span><ol data-dcnode-id="995"><li data-dcnode-id="1031"><strong data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">New, untreated H. pylori infection</span></strong><br data-dcnode-id="1036"><span data-dcnode-id="1035" instrument_node="">A simple 30-day course of Matula Tea along with your positive attitude.</span><br data-dcnode-id="1034"><span data-dcnode-id="1033" instrument_node="">A good omega-3 oil, can help reduce inflammation in the bowel lining if necessary.</span><br data-dcnode-id="1032"></li><li data-dcnode-id="1021"><strong data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">New, recently treated H. pylori infection</span></strong><br data-dcnode-id="1028"><span data-dcnode-id="1027" instrument_node="">A 30-day course of Matula Tea along with your positive attitude.</span><br data-dcnode-id="1026"><span data-dcnode-id="1025" instrument_node="">Good quality Probiotic supplements are recommended – these will re-introduce good flora into your digestive system that may have been killed off.</span><br data-dcnode-id="1024"><span data-dcnode-id="1023" instrument_node="">A good omega-3 oil, can help reduce inflammation in the bowel lining if necessary.</span><br data-dcnode-id="1022"></li><li data-dcnode-id="1009"><strong data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Older, untreated H. pylori infection</span></strong><br data-dcnode-id="1018"><span data-dcnode-id="1017" instrument_node="">To start with we recommend that you have an ultrasound evaluation done. If your Gallbladder requires a flush then to do a Gall Flush. This is necessary because the H. pylori bacteria has been in your system long enough to colonize in the areas of your digestive tract where Matula Tea may not be able to make physical contact with the bacteria.</span><br data-dcnode-id="1016"><span data-dcnode-id="1015" instrument_node="">A 30-day course of Matula Tea along with your positive attitude, plus the Gall Flush as recommended above.</span><br data-dcnode-id="1014"><span data-dcnode-id="1013" instrument_node="">To keep on top of your digestive health in general, and to complete your treatment, we recommend a colon cleanse 3- 4 weeks after you have finished your treatment of Matula Tea. A colon cleanse should be done before you have the HpSA re-test.</span><br data-dcnode-id="1012"><span data-dcnode-id="1011" instrument_node="">A good omega-3 oil, can help reduce inflammation in the bowel lining if necessary.</span><br data-dcnode-id="1010"></li><li data-dcnode-id="996"><strong data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Older, recently treated H. pylori infection</span></strong><br data-dcnode-id="1006"><span data-dcnode-id="1005" instrument_node="">Again we recommend that you have an ultrasound evaluation done and if your Gallbladder requires a flush then to do a Gall Flush. This is necessary because if the H. pylori bacteria has been in your system long enough to colonize in the areas of your digestive tract where Matula Tea may not be able to make physical contact with the bacteria.</span><br data-dcnode-id="1004"><span data-dcnode-id="1003" instrument_node="">A 30-day course of Matula Tea along with your positive attitude, and the above Gall Flush as recommended.</span><br data-dcnode-id="1002"><span data-dcnode-id="1001" instrument_node="">A good quality Probiotic supplements are recommended – these will re-introduce good flora into your digestive system that may have been killed off.</span><br data-dcnode-id="1000"><span data-dcnode-id="999" instrument_node="">To keep on top of your digestive health in general, and to complete your treatment, we recommend a colon cleanse 3- 4 weeks after you have finished your treatment of Matula Tea. A colon cleanse should be done before you have the HpSA re-test.</span><br data-dcnode-id="998"><span data-dcnode-id="997" instrument_node="">A good omega-3 oil, can help reduce inflammation in the bowel lining if necessary.</span></li></ol><span data-dcnode-id="994" instrument_node="">

</span><div class="wp-block-genesis-blocks-gb-testimonial left-aligned gb-font-size-18 gb-block-testimonial" data-dcnode-id="460" style="background-color:#ebffa5;color:#32373c"><div class="gb-testimonial-text" data-dcnode-id="468" style="text-align:left"><p data-dcnode-id="472"><em data-dcnode-id="473"><strong data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Sincerely grateful for your help!!!*</span></strong></em></p><p data-dcnode-id="469"><em data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">I spoke with you on the phone about 4 weeks ago. I’m the one who wasn’t sure if I took the tea properly because I had cereal at night sometimes before taking the tea. I thought I was going to need to re-take the 30-day course, but you encouraged me to go ahead and send in a stool sample to BioHealth Diagnostics (to who I had sent my first stool sample) to see if I really needed to repeat the course or not. Well, I did and the results thankfully came back negative for h.pylori!! I was so excited to get the news, and I told you I would let you know what happened so I hope you get this note!!! I am sincerely grateful for your help!!!*</span></em></p></div><div class="gb-testimonial-info" data-dcnode-id="461"><h2 class="gb-testimonial-name" data-dcnode-id="465" style="color:#32373c"><em data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">Janet A Blenheim</span></em></h2><small class="gb-testimonial-title" data-dcnode-id="462" style="color:#32373c"><em data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">USA</span></em></small></div></div><span data-dcnode-id="459" instrument_node="">

"><em data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">We filled the expensive prescription and my husband made peace with the idea of taking it for the rest of his life. I was not satisfied with that and decided to do a little research on what causes ulcers. I learned about the H-pylori virus and how it does not respond to antibiotic treatment. I was beginning to lose hope when there suddenly appeared a glimmer of hope … a tea found only in Africa. *</span></em></p><p data-dcnode-id="335"><em data-dcnode-id="336"><strong data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">….it seemed too good to be true….*</span></strong></em></p><p data-dcnode-id="332"><em data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">Wild and extraordinary claims were made about this tea and its miraculous results. At first, it seemed too good to be true. Drink this stuff called Matula tea two times a day and you kill the virus responsible for many of the problems Neil had, so, with nothing to lose and everything to gain, we decided to give it a try.*</span></em></p><p data-dcnode-id="324"><em data-dcnode-id="329"><strong data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">…he decided not to take the medication</span></strong></em><span data-dcnode-id="328" instrument_node=""> </span><em data-dcnode-id="325"><strong data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">he had been prescribed…*</span></strong></em></p><p data-dcnode-id="321"><em data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">For one month Neil drank the tea religiously and ate a reasonable diet. It should be noted that during this “experiment” he decided not to take the medication he had been prescribed – the Matula tea we ordered would be his only course of care*</span></em></p><p data-dcnode-id="318"><em data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">The condition of Neil’s esophagus was so serious that at the time of his first endoscopy, the doctor ordered a follow-up endoscopy to determine whether Neil’s condition was getting worse and would require any kind of surgical intervention. We strategically scheduled the follow-up endoscopy so that it would take place within days of Neil’s completion of his “30-day Matula Tea Treatment.”*</span></em></p><p data-dcnode-id="315"><em data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">It had been just weeks since his first procedure revealed a black esophagus with ulcers eating away at it…*</span></em></p><p data-dcnode-id="312"><em data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">Approximately six weeks later, and with a pronounced sense of worry, and a doom and gloom prognosis possibly hanging in the balance. Neil was sedated and taken in for his second endoscopy. It had been just weeks since his first procedure revealed a black esophagus with ulcers eating away at it. I waited nervously, but this time I waited with a sense of hope and curiosity.*</span></em></p><p data-dcnode-id="308"><em data-dcnode-id="309"><strong data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">Now…there was nothing to find!*</span></strong></em></p><p data-dcnode-id="305"><em data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">Within an hour, I was ushered back to see my groggy husband, soon after that, the doctor appeared. Dr. S. had a puzzled look on his face and was clearly a little bewildered and befuddled as he announced that when they went in to explore my husband’s throat and check on the status of the bleeding and ulcers – there was nothing to find! *</span></em></p><p data-dcnode-id="301"><strong data-dcnode-id="302"><em data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">…esophagus as clean and new as the day he was born…*</span></em></strong></p><p data-dcnode-id="298"><em data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">He went on to say that,
