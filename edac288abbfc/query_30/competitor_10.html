 src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/post.healthline.com/wp-content/uploads/2022/01/Alan-Carter-500x500-Bio.png%3Fw%3D105%26h%3D105&amp;raw"></div></div><div data-dcnode-id="1166"><span data-dcnode-id="1175"><span data-dcnode-id="1178" instrument_node="">Medically reviewed by </span><a class="css-zocu4s" data-dcnode-id="1176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/reviewers/alan-carter-pharmd"><span data-dcnode-id="1177" instrument_node="">Alan Carter, Pharm.D.</span></a></span><span data-dcnode-id="1174" instrument_node=""> — </span><span data-dcnode-id="1170"><span data-dcnode-id="1173" instrument_node="">Written by </span><a class="css-zocu4s" data-dcnode-id="1171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/authors/kristeen-cherney"><span data-dcnode-id="1172" instrument_node="">Kristeen Cherney</span></a></span><span data-dcnode-id="1169" instrument_node=""> — </span><span data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node=""> Updated on February 4, 2020</span></span></div></section><div data-dcnode-id="646"><nav class="css-7u7i0a" data-dcnode-id="1145" id="tab-bar-0"><ul class="css-17ztj4b" data-dcnode-id="1146"><li class="css-t753mo" data-dcnode-id="1162"><a class="css-1ggiqr2" data-dcnode-id="1163" href="#chronic-pain-relief"><span data-dcnode-id="1164" instrument_node="">Chronic pain relief</span></a></li><li class="css-t753mo" data-dcnode-id="1159"><a class="css-1ggiqr2" data-dcnode-id="1160" href="#arthritis-pain-relief"><span data-dcnode-id="1161" instrument_node="">Arthritis pain relief</span></a></li><li class="css-t753mo" data-dcnode-id="1156"><a class="css-1ggiqr2" data-dcnode-id="1157" href="#cancer-treatment-relief"><span data-dcnode-id="1158" instrument_node="">Cancer treatment relief</span></a></li><li class="css-t753mo" data-dcnode-id="1153"><a class="css-1ggiqr2" data-dcnode-id="1154" href="#migraine-pain-relief"><span data-dcnode-id="1155" instrument_node="">Migraine pain relief</span></a></li><li class="css-t753mo" data-dcnode-id="1150"><a class="css-1ggiqr2" data-dcnode-id="1151" href="#side-effects"><span data-dcnode-id="1152" instrument_node="">Side effects</span></a></li><li class="css-t753mo" data-dcnode-id="1147"><a class="css-1ggiqr2" data-dcnode-id="1148" href="#takeaway"><span data-dcnode-id="1149" instrument_node="">Takeaway</span></a></li></ul></nav><article class="article-body css-d2znx6 undefined" data-dcnode-id="651"><div class="css-1u22pos" data-dcnode-id="1047"><span data-dcnode-id="1144" style="font-size:0;line-height:0"></span><p class="h2" data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node=""> Overview</span></p><p data-dcnode-id="1128"><span data-dcnode-id="1141" instrument_node="">Cannabidiol (CBD) is a type of cannabinoid, a chemical found naturally in </span><a class="content-link css-5r4717" data-dcnode-id="1139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/what-is-cannabis"><span data-dcnode-id="1140" instrument_node="">cannabis</span></a><span data-dcnode-id="1138" instrument_node=""> (</span><a class="content-link css-5r4717" data-dcnode-id="1136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/246392.php" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="1137" instrument_node="">marijuana</span></a><span data-dcnode-id="1135" instrument_node=""> and </span><a class="content-link css-5r4717" data-dcnode-id="1133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/308044.php" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="1134" instrument_node="">hemp</span></a><span data-dcnode-id="1132" instrument_node="">) plants. CBD doesn’t cause the “high” feeling often associated with cannabis. That feeling is caused by </span><a class="content-link css-5r4717" data-dcnode-id="1130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/cbd-vs-thc"><span data-dcnode-id="1131" instrument_node="">tetrahydrocannabinol (THC)</span></a><span data-dcnode-id="1129" instrument_node="">, a different type of cannabinoid.</span></p><p data-dcnode-id="1120"><span data-dcnode-id="1127" instrument_node="">Some people with </span><a class="content-link css-5r4717" data-dcnode-id="1125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/chronic-pain"><span data-dcnode-id="1126" instrument_node="">chronic pain</span></a><span data-dcnode-id="1124" instrument_node=""> use topical CBD products, in particular </span><a class="content-link css-5r4717" data-dcnode-id="1122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/best-cbd-oil"><span data-dcnode-id="1123" instrument_node="">CBD oil</span></a><span data-dcnode-id="1121" instrument_node="">, to manage their symptoms. CBD oil may reduce:</span></p><ul data-dcnode-id="1113"><li data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">pain</span></li><li data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">inflammation</span></li><li data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">overall discomfort related to a variety of health conditions</span></li></ul><p data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">The research on CBD products and pain management has been promising. </span></p><p data-dcnode-id="1106"><span data-dcnode-id="1110" instrument_node="">CBD can offer an alternative for people who have chronic pain and rely on medications, such as </span><a class="content-link css-5r4717" data-dcnode-id="1108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/opioids-list"><span data-dcnode-id="1109" instrument_node="">opioids</span></a><span data-dcnode-id="1107" instrument_node="">, that can be habit-forming and cause more side effects. However, more research is needed to verify the pain-relieving benefits of CBD oil and other products.</span></p><p data-dcnode-id="1099"><a class="content-link css-5r4717" data-dcnode-id="1104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/cdi/epidiolex"><span data-dcnode-id="1105" instrument_node="">Epidiolex</span></a><span data-dcnode-id="1103" instrument_node="">, a </span><a class="content-link css-5r4717" data-dcnode-id="1101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/epilepsy/medications-list"><span data-dcnode-id="1102" instrument_node="">drug prescribed for epilepsy</span></a><span data-dcnode-id="1100" instrument_node="">, is the only CBD product on the market that the Food and Drug Administration (FDA) has approved.</span></p><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">There aren’t any FDA-approved, nonprescription CBD products. They aren’t regulated for purity and dosage like other medications.</span></p><p data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">Keep reading to learn more about the potential benefits of CBD use for pain. You can also talk with your doctor to see if it’s an option for your condition.</span></p><div data-dcnode-id="1054" id="m1a7bebf5-99bf-4490-b2a8-6da9521e21e3"><div data-dcnode-id="1055"><form data-dcnode-id="1056" novalidate=""><div data-dcnode-id="1057"><section class="css-11k39sg" data-dcnode-id="1058"><div class="css-1x6oboy" data-dcnode-id="1094"></div><div class="css-1rx43lg" data-dcnode-id="1060"><div class="css-7nn8wn" data-dcnode-id="1087"><div class="css-k008qs" data-dcnode-id="1088"><a class="css-yvmi2y" data-dcnode-id="1089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/cbd-oil-for-pain%3FcorrelationId%3D9b35e0a2-be4e-48e7-9d21-ee82a706d6df" rel="noopener noreferrer sponsored" target="_blank"><lazy-image alt="TAKE CHALLENGE" classname="css-5enzam" data-dcnode-id="1090" src="//i0.wp.com/post.healthline.com/wp-content/uploads/2022/05/Mental-Health-Social-Challenge-cobranded-illo-732x549-HL-Thumbnail.jpg?w=1155" srcset="//i0.wp.com/post.healthline.com/wp-content/uploads/2022/05/Mental-Health-Social-Challenge-cobranded-illo-732x549-HL-Thumbnail.jpg?w=483 230w"><picture class="css-129gw94" data-dcnode-id="1091"><source data-dcnode-id="1093" media="(min-width: 768px)" srcset="//i0.wp.com/post.healthline.com/wp-content/uploads/2022/05/Mental-Health-Social-Challenge-cobranded-illo-732x549-HL-Thumbnail.jpg?w=483 230w"><img alt="TAKE CHALLENGE" class="css-5enzam" data-dcnode-id="1092" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/post.healthline.com/wp-content/uploads/2022/05/Mental-Health-Social-Challenge-cobranded-illo-732x549-HL-Thumbnail.jpg%3Fw%3D1155&amp;raw"></picture></lazy-image></a></div></div><div class="css-1rr4qq7" data-dcnode-id="1061"><div class="css-rp3d6" data-dcnode-id="1062"><div class="css-8rcmo0" data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">HEALTHLINE CHALLENGE</span></div><div class="css-kp58b2" data-dcnode-id="1080"><div class="css-1dxn28w" data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">Slow Your Social Media Scroll</span></div><p class="css-1cr3nkl" data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Take Healthline’s Digital Disconnect to the next level with our 10-day email challenge. Learn social media’s effects on the brain and build better online (and offline) habits with us.</span></p></div><div class="css-8nu43k" data-dcnode-id="1063"><div data-dcnode-id="1064"><div class="css-12wslxx" data-dcnode-id="1070"><div class="css-11eiosp" data-dcnode-id="1075"><div class="css-1rr4qq7" data-dcnode-id="1076"><div class="css-qddt1o" data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Enter your email</span></div><input aria-label="Enter your email" class="css-kljuul" data-dcnode-id="1077" name="email" placeholder="Enter your email" type="email" value=""></div></div><button class="css-1hitip5" data-dcnode-id="1071" type="submit"><span class="css-14ktbsh" data-dcnode-id="1072"><span class="css-1huyk6v" data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">TAKE CHALLENGE</span></span></span></button></div><p class="css-nz9v2z" data-dcnode-id="1065"><span data-dcnode-id="1069" instrument_node="">Your </span><a class="css-1pule1j" data-dcnode-id="1067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/privacy-policy" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1068" instrument_node="">privacy</span></a><span data-dcnode-id="1066" instrument_node=""> is important to us</span></p></div></div></div></div></div><div class="css-1tuviqo" data-dcnode-id="1059"></div></section></div></form></div></div><div class="css-umsscj" data-dcnode-id="1048"><aside class="css-0 css-0" data-dcnode-id="1049"><div data-dcnode-id="1050"><div class="css-10gx9pb" data-dcnode-id="1051" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="1053"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline2" data-dcnode-id="1052" id="inline2__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="1005"><span data-dcnode-id="1046" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1042"><div data-dcnode-id="1043"><a class="chartbeat-section" data-dcnode-id="1044" name="chronic-pain-relief"><span data-dcnode-id="1045" instrument_node=""> CBD for chronic pain relief</span></a></div></h2><p data-dcnode-id="1037"><span data-dcnode-id="1041" instrument_node="">Everyone has a cell-signaling system known as the </span><a class="content-link css-5r4717" data-dcnode-id="1039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/endocannabinoid-system-2"><span data-dcnode-id="1040" instrument_node="">endocannabinoid system (ECS)</span></a><span data-dcnode-id="1038" instrument_node="">.</span></p><p data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Some researchers think that CBD interacts with a core component of the ECS — endocannabinoid receptors in your brain and immune system. </span></p><p data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Receptors are tiny proteins attached to your cells. They receive signals, mostly chemical ones, from different stimuli and help your cells respond.</span></p><p data-dcnode-id="1028"><span data-dcnode-id="1032" instrument_node="">This response creates anti-inflammatory and pain-relieving effects that help with pain management. This means that CBD oil and other products may benefit people with chronic pain, such as chronic </span><a class="content-link css-5r4717" data-dcnode-id="1030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/back-pain"><span data-dcnode-id="1031" instrument_node="">back pain</span></a><span data-dcnode-id="1029" instrument_node="">.</span></p><p data-dcnode-id="1023"><span data-dcnode-id="1027" instrument_node="">One </span><a class="content-link css-5r4717" data-dcnode-id="1025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.3389/fphar.2018.01259" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1026" instrument_node="">2018 review</span></a><span data-dcnode-id="1024" instrument_node=""> assessed how well CBD works to relieve chronic pain. The review looked at studies conducted between 1975 and March 2018. These studies examined various types of pain, including:</span></p><ul data-dcnode-id="1014"><li data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">cancer pain</span></li><li data-dcnode-id="1018"><a class="content-link css-5r4717" data-dcnode-id="1019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/neuropathic-pain"><span data-dcnode-id="1020" instrument_node="">neuropathic pain</span></a></li><li data-dcnode-id="1015"><a class="content-link css-5r4717" data-dcnode-id="1016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/fibromyalgia"><span data-dcnode-id="1017" instrument_node="">fibromyalgia</span></a></li></ul><p data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Based on these studies, researchers concluded that CBD was effective in overall pain management and didn’t cause negative side effects.</span></p><div class="css-1cg0byz" data-dcnode-id="1006"><aside class="css-0 css-0" data-dcnode-id="1007"><div data-dcnode-id="1008"><div class="css-az6x7v" data-dcnode-id="1009" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="1011"></div><div class="css-itezwm" data-ad="true" data-adbridg-ad-class="inline5" data-dcnode-id="1010" id="inline5__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="827"><span data-dcnode-id="1004" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1000"><div data-dcnode-id="1001"><a class="chartbeat-section" data-dcnode-id="1002" name="arthritis-pain-relief"><span data-dcnode-id="1003" instrument_node=""> CBD for arthritis pain relief</span></a></div></h2><p data-dcnode-id="987"><span data-dcnode-id="999" instrument_node="">A </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="992" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4851925" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="998" instrument_node="">2016 study</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="995"><span class="sro" data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="993"></span></hl-trusted-source><span data-dcnode-id="991" instrument_node=""> looked at CBD use in rats with </span><a class="content-link css-5r4717" data-dcnode-id="989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/arthritis"><span data-dcnode-id="990" instrument_node="">arthritis</span></a><span data-dcnode-id="988" instrument_node="">.</span></p><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Researchers applied CBD gel to rats for four days in a row. The rats received either 0.6, 3.1, 6.2, or 62.3 milligrams (mg) per day. The researchers noted reduced inflammation and overall pain in the rats’ affected joints. There were no obvious side effects.</span></p><p data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">Rats who received low doses of 0.6 or 3.1 mg didn’t improve their pain scores. The researchers found that 6.2 mg/day was a high enough dose to reduce the rats’ pain and swelling.</span></p><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">In addition, rats who received 62.3 mg/day had similar outcomes to the rats that received 6.2 mg/day. Receiving a substantially larger dosage didn’t result in them having less pain.</span></p><p data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">The anti-inflammatory and pain-relieving effects of CBD gel could potentially help people with arthritis. However, more human studies are needed.</span></p><div data-dcnode-id="834" id="meb08ce65-8e2a-407e-a3d5-e60a62564ede"><div data-dcnode-id="835"><div class="myFinance-widget myFinance-ad-unit" data-campaign="hl-cbd-quiz-embed" data-dcnode-id="836" data-sub-id="cbd_hl_mid_productquiz_embedded_33715_34075" data-widget-id="b040d10d-1713-446f-adfa-fa6aa02b6d62"><iframe class="myFinance-iframe" data-dcnode-id="837" data-loaded="1" data-src="https://inline.healthline.com/r/ssr/b040d10d-1713-446f-adfa-fa6aa02b6d62?utm_campaign=hl-cbd-quiz-embed&amp;utm_medium=embed&amp;selector=%23meb08ce65-8e2a-407e-a3d5-e60a62564ede+%3E+div+%3E+div&amp;csid=6f100931-8347-48e1-8c05-00054de26aad&amp;caid=64332b80-c618-462c-bd1f-d847e7ad8377&amp;ciid=1325c4a1-691c-46a4-ae3d-5bcb99e82636&amp;tenant=wk_1Tqf7EYzOKyxm4Gvq042rU0Uky0&amp;srckey=src_1Tqf7BF96WTbG5QbUndHWIgKoFo&amp;imre=aHR0cHM6Ly93d3cuaGVhbHRobGluZS5jb20vaGVhbHRoL2NiZC1vaWwtZm9yLXBhaW4%3D&amp;_mfuuid_=b193604d-6cc4-4dd3-ace5-54886c635689&amp;width=584&amp;subId=cbd_hl_mid_productquiz_embedded_33715_34075" id="MyFiAd" loading="lazy" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/r/ssr/b040d10d-1713-446f-adfa-fa6aa02b6d62%3Futm_campaign%3Dhl-cbd-quiz-embed%26utm_medium%3Dembed%26selector%3D%2523meb08ce65-8e2a-407e-a3d5-e60a62564ede%2B%253E%2Bdiv%2B%253E%2Bdiv%26csid%3D6f100931-8347-48e1-8c05-00054de26aad%26caid%3D64332b80-c618-462c-bd1f-d847e7ad8377%26ciid%3D1325c4a1-691c-46a4-ae3d-5bcb99e82636%26tenant%3Dwk_1Tqf7EYzOKyxm4Gvq042rU0Uky0%26srckey%3Dsrc_1Tqf7BF96WTbG5QbUndHWIgKoFo%26imre%3DaHR0cHM6Ly93d3cuaGVhbHRobGluZS5jb20vaGVhbHRoL2NiZC1vaWwtZm9yLXBhaW4%253D%26_mfuuid_%3Db193604d-6cc4-4dd3-ace5-54886c635689%26width%3D584%26subId%3Dcbd_hl_mid_productquiz_embedded_33715_34075&amp;raw" style="overflow: hidden; height: 361px;" title="Advertisement"><html data-dcnode-id="839" lang="en"><head data-dcnode-id="927"><meta charset="utf-8"><span data-dcnode-id="977" instrument_node="">

x-height: 300px;"><div class="v-image__image v-image__image--preload v-image__image--contain" data-dcnode-id="895" style="background-position: center center;"></div><div class="v-responsive__content" data-dcnode-id="894"></div></div></div><span data-dcnode-id="891" instrument_node=""> </span><div class="col col-12" data-dcnode-id="887" data-v-7f20d968=""><div class="mf-body--md" data-dcnode-id="888" data-v-7f20d968=""><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Take a short quiz about what type of CBD you are interested in and we'll share our top product picks, vetted by experts.</span></p></div></div><span data-dcnode-id="886" instrument_node=""> </span><div class="col col-12" data-dcnode-id="882" data-v-7f20d968=""><button class="v-btn v-btn--block v-btn--has-bg theme--light v-size--x-large primary mf-cta" data-dcnode-id="883" data-v-7f20d968="" type="button"><span class="v-btn__content" data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">LET'S GET STARTED</span></span></button></div></div></div><span data-dcnode-id="879" instrument_node=""> </span></div></div><span data-dcnode-id="875" instrument_node=""> </span><div class="footer-disclaimer-box px-5" data-dcnode-id="873" data-v-2552d994=""><div data-dcnode-id="874" data-v-2552d994=""></div></div></div><span data-dcnode-id="871" instrument_node=""> </span><span data-dcnode-id="867" instrument_node=""> </span></div></div><span data-dcnode-id="863" instrument_node=""> </span><form action="https://www.platejoy.com/onboarding/healthline" data-dcnode-id="862" data-v-2552d994="" method="post" target="_blank"></form></div><span data-dcnode-id="860" instrument_node=""> </span><hr aria-orientation="horizontal" class="mx-5 divider--footer v-divider theme--light" data-dcnode-id="859" data-v-2552d994="" role="separator"/></div></div></main></div></div><span data-dcnode-id="853" instrument_node="">

</span><div data-dcnode-id="841" style="clear: both; display: block; height: 0px;"></div></body></html></iframe></div></div></div><div class="css-umsscj" data-dcnode-id="828"><aside class="css-0 css-0" data-dcnode-id="829"><div data-dcnode-id="830"><div class="css-10gx9pb" data-dcnode-id="831" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="833"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline8" data-dcnode-id="832" id="inline8__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="778"><span data-dcnode-id="826" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="822"><div data-dcnode-id="823"><a class="chartbeat-section" data-dcnode-id="824" name="cancer-treatment-relief"><span data-dcnode-id="825" instrument_node=""> CBD for cancer treatment relief</span></a></div></h2><p data-dcnode-id="814"><span data-dcnode-id="821" instrument_node="">Some people with </span><a class="content-link css-5r4717" data-dcnode-id="819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/cancer/cbd-for-cancer"><span data-dcnode-id="820" instrument_node="">cancer</span></a><span data-dcnode-id="818" instrument_node=""> also use CBD. </span><a class="content-link css-5r4717" data-dcnode-id="816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.jss.2018.08.055" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="817" instrument_node="">Research</span></a><span data-dcnode-id="815" instrument_node=""> on mice has shown that CBD can lead to the shrinking of cancerous tumors. However, most studies in humans have investigated the role of CBD in managing pain related to cancer and cancer treatment.</span></p><p data-dcnode-id="801"><span data-dcnode-id="813" instrument_node="">The </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="806" rationale="Governmental authority" source="National Cancer Institute "><a class="content-link css-5r4717" data-dcnode-id="808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancer.gov/about-cancer/treatment/cam/hp/cannabis-pdq" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="812" instrument_node="">National Cancer Institute (NCI)</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="809"><span class="sro" data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="807"></span></hl-trusted-source><span data-dcnode-id="805" instrument_node=""> has pointed to CBD as a possible option for reducing </span><a class="content-link css-5r4717" data-dcnode-id="803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/cancer/effects-on-body"><span data-dcnode-id="804" instrument_node="">chemotherapy side effects</span></a><span data-dcnode-id="802" instrument_node="">, such as:</span></p><ul data-dcnode-id="794"><li data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">pain</span></li><li data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">vomiting</span></li><li data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">lack of appetite</span></li></ul><p data-dcnode-id="786"><span data-dcnode-id="793" instrument_node="">In a </span><a class="content-link css-5r4717" data-dcnode-id="791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jpsmjournal.com/article/S0885-3924%2809%2900787-8/fulltext" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="792" instrument_node="">2010 study</span></a><span data-dcnode-id="790" instrument_node=""> on cancer-related pain, study subjects received oral sprays of a combination THC-CBD extract. The THC-CBD extract was used in conjunction with </span><a class="content-link css-5r4717" data-dcnode-id="788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/opioids-list"><span data-dcnode-id="789" instrument_node="">opioids</span></a><span data-dcnode-id="787" instrument_node="">. This study revealed that using the extract provided more effective pain relief than using the opioids alone.</span></p><p data-dcnode-id="781"><span data-dcnode-id="785" instrument_node="">A </span><a class="content-link css-5r4717" data-dcnode-id="783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//doi.org/10.1016/j.jpainsymman.2012.07.014" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="784" instrument_node="">2013 study</span></a><span data-dcnode-id="782" instrument_node=""> on THC and THC-CBD oral sprays had a similar finding. Many researchers from the 2010 study worked on this study as well. More evidence is still needed.</span></p><div class="css-1sxbpyw" data-adbridg-ad-class="hl-incontent" data-dcnode-id="780" id="hl-incontent-video-ad"></div><div class="css-1h5aco8" data-dcnode-id="779" id="div-gpt-ad-out-of-page"></div></div><div class="css-0" data-dcnode-id="737"><span data-dcnode-id="777" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="773"><div data-dcnode-id="774"><a class="chartbeat-section" data-dcnode-id="775" name="migraine-pain-relief"><span data-dcnode-id="776" instrument_node=""> CBD for migraine pain relief</span></a></div></h2><p data-dcnode-id="765"><span data-dcnode-id="772" instrument_node="">Studies on CBD and </span><a class="content-link css-5r4717" data-dcnode-id="770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/migraine"><span data-dcnode-id="771" instrument_node="">migraine</span></a><span data-dcnode-id="769" instrument_node=""> are limited. The </span><a class="content-link css-5r4717" data-dcnode-id="767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1111/head.13345" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="768" instrument_node="">studies</span></a><span data-dcnode-id="766" instrument_node=""> that currently exist also look at CBD when it’s paired with THC, not when it’s used alone.</span></p><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">However, results from a 2017 study indicate that CBD and THC can lead to less acute pain and less intense pain for people with migraine.</span></p><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">In this two-phase study, some participants took a combination of two compounds. One compound contained 9 percent CBD and almost no THC. The other compound contained 19 percent THC. Doses were taken orally.</span></p><p data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">In phase I, there was no effect on pain when the doses were under 100 mg. When the doses were increased to 200 mg, acute pain fell by 55 percent.</span></p><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">In phase II, participants who received the combination of CBD and THC compounds saw the frequency of their migraine attacks fall by 40.4 percent. The daily dose was 200 mg.</span></p><p data-dcnode-id="749"><span data-dcnode-id="756" instrument_node="">The combination of compounds was slightly more effective than 25 mg of </span><a class="content-link css-5r4717" data-dcnode-id="754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/amitriptyline-oral-tablet"><span data-dcnode-id="755" instrument_node="">amitriptyline</span></a><span data-dcnode-id="753" instrument_node="">, a </span><a class="content-link css-5r4717" data-dcnode-id="751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/depression/tricyclic-antidepressants-tcas"><span data-dcnode-id="752" instrument_node="">tricyclic antidepressant</span></a><span data-dcnode-id="750" instrument_node="">. Amitriptyline reduced migraine attacks by 40.1 percent in study participants.</span></p><p data-dcnode-id="741"><span data-dcnode-id="748" instrument_node="">Participants with </span><a class="content-link css-5r4717" data-dcnode-id="746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/cluster-headache"><span data-dcnode-id="747" instrument_node="">cluster headaches</span></a><span data-dcnode-id="745" instrument_node=""> also found pain relief with the combination of CBD and THC compounds, but only if they’d had </span><a class="content-link css-5r4717" data-dcnode-id="743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health-news/what-to-do-about-childrens-migraines"><span data-dcnode-id="744" instrument_node="">a childhood history</span></a><span data-dcnode-id="742" instrument_node=""> of migraine.</span></p><p data-dcnode-id="738"><a class="content-link css-5r4717" data-dcnode-id="739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/migraine/cbd-oil-for-migraines"><span data-dcnode-id="740" instrument_node="">Learn more about CBD and migraine.</span></a></p></div><div class="css-0" data-dcnode-id="682"><span data-dcnode-id="736" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="732"><div data-dcnode-id="733"><a class="chartbeat-section" data-dcnode-id="734" name="side-effects"><span data-dcnode-id="735" instrument_node=""> CBD side effects</span></a></div></h2><p data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">CBD doesn’t pose significant risks for users, and most topical CBD products don’t enter the bloodstream.</span></p><p data-dcnode-id="725"><span data-dcnode-id="729" instrument_node="">However, </span><a class="content-link css-5r4717" data-dcnode-id="727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1089/can.2016.0034" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="728" instrument_node="">certain side effects</span></a><span data-dcnode-id="726" instrument_node=""> are possible, such as:</span></p><ul data-dcnode-id="716"><li data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">fatigue</span></li><li data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">diarrhea</span></li><li data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">changes in appetite</span></li><li data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">changes in weight</span></li></ul><p data-dcnode-id="711"><span data-dcnode-id="715" instrument_node="">CBD may </span><a class="content-link css-5r4717" data-dcnode-id="713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/drug-interactions"><span data-dcnode-id="714" instrument_node="">interact with</span></a><span data-dcnode-id="712" instrument_node="">: </span></p><ul data-dcnode-id="704"><li data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">certain over-the-counter (OTC) drugs</span></li><li data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">prescription medications</span></li><li data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">dietary supplements </span></li></ul><p data-dcnode-id="696"><span data-dcnode-id="703" instrument_node="">Proceed with caution if any of your medications or supplements contain a “</span><a class="content-link css-5r4717" data-dcnode-id="701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/nutrition/grapefruit-and-medications"><span data-dcnode-id="702" instrument_node="">grapefruit warning</span></a><span data-dcnode-id="700" instrument_node="">.” Grapefruit and CBD both interfere with </span><a class="content-link css-5r4717" data-dcnode-id="698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/why-are-enzymes-important"><span data-dcnode-id="699" instrument_node="">enzymes</span></a><span data-dcnode-id="697" instrument_node=""> that are crucial to drug metabolism.</span></p><p data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Like other drugs and supplements, CBD may also increase your risk of liver toxicity. </span></p><p data-dcnode-id="689"><span data-dcnode-id="693" instrument_node="">One </span><a class="content-link css-5r4717" data-dcnode-id="691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/1420-3049/24/9/1694/htm" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="692" instrument_node="">study</span></a><span data-dcnode-id="690" instrument_node=""> on mice concluded that CBD-rich cannabis extract increased their risk of liver toxicity. However, some of the mice had been force-fed very large amounts of the CBD-rich cannabis extract.</span></p><div class="css-20w1gi" data-dcnode-id="683"><aside class="css-0 css-0" data-dcnode-id="684"><div data-dcnode-id="685"><div class="css-1sq15os" data-dcnode-id="686" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="688"></div><div class="css-1t05dkn" data-ad="true" data-adbridg-ad-class="inline15" data-dcnode-id="687" id="inline15__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="652"><span data-dcnode-id="681" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="677"><div data-dcnode-id="678"><a class="chartbeat-section" data-dcnode-id="679" name="takeaway"><span data-dcnode-id="680" instrument_node=""> Takeaway</span></a></div></h2><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">While there isn’t conclusive data to support CBD or CBD oil as the preferred method of pain management, researchers agree that these types of products have a lot of potential. </span></p><p data-dcnode-id="667"><span data-dcnode-id="674" instrument_node="">CBD products might be able to offer relief for many people who have chronic pain, all without causing drug </span><a class="content-link css-5r4717" data-dcnode-id="672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/drug-overdose"><span data-dcnode-id="673" instrument_node="">intoxication</span></a><span data-dcnode-id="671" instrument_node=""> and </span><a class="content-link css-5r4717" data-dcnode-id="669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/drug-dependence"><span data-dcnode-id="670" instrument_node="">dependence</span></a><span data-dcnode-id="668" instrument_node="">.</span></p><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">If you’re interested in trying CBD for chronic pain, talk to your doctor. They can help you determine a starting dosage that’s right for you. </span></p><p data-dcnode-id="662"><a class="content-link css-5r4717" data-dcnode-id="663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/cbd-dosage"><span data-dcnode-id="664" instrument_node="">Learn more about CBD dosage here.</span></a></p><p data-dcnode-id="653"><strong data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Is CBD Legal?</span></strong><span data-dcnode-id="659" instrument_node=""> </span><em data-dcnode-id="654"><span data-dcnode-id="658" instrument_node="">Hemp-derived CBD products (with less than 0.3 percent THC) are legal on the federal level, but are still illegal under some </span><a class="content-link css-5r4717" data-dcnode-id="656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ncsl.org/research/health/state-medical-marijuana-laws.aspx" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="657" instrument_node="">state laws</span></a><span data-dcnode-id="655" instrument_node="">. Marijuana-derived CBD products are illegal on the federal level, but are legal under some state laws. Check your state’s laws and those of anywhere you travel. Keep in mind that nonprescription CBD products are not FDA-approved, and may be inaccurately labeled.</span></em></p></div></article><div data-dcnode-id="647" id="m026d426e-62fe-4701-86f6-0f617abead4d"><div data-dcnode-id="648"><div class="myFinance-widget myFinance-ad-unit" data-campaign="hl-cbd-quiz-no-cw" data-dcnode-id="649" data-sub-id="CBD-CPC-Campaign-Shop-Replace_37558" data-widget-id="507d8e00-5d8a-43a4-8e9a-c81ffae1fee4 "><iframe class="myFinance-iframe" data-dcnode-id="650" data-loaded="0" data-src="https://inline.healthline.com/r/ssr/507d8e00-5d8a-43a4-8e9a-c81ffae1fee4?utm_campaign=hl-cbd-quiz-no-cw&amp;utm_medium=embed&amp;selector=%23m026d426e-62fe-4701-86f6-0f617abead4d+%3E+div+%3E+div&amp;csid=6f100931-8347-48e1-8c05-00054de26aad&amp;caid=64332b80-c618-462c-bd1f-d847e7ad8377&amp;ciid=1325c4a1-691c-46a4-ae3d-5bcb99e82636&amp;tenant=wk_1Tqf7EYzOKyxm4Gvq042rU0Uky0&amp;srckey=src_1Tqf7BF96WTbG5QbUndHWIgKoFo&amp;imre=aHR0cHM6Ly93d3cuaGVhbHRobGluZS5jb20vaGVhbHRoL2NiZC1vaWwtZm9yLXBhaW4%3D&amp;_mfuuid_=b193604d-6cc4-4dd3-ace5-54886c635689&amp;width=584&amp;subId=CBD-CPC-Campaign-Shop-Replace_37558" loading="lazy" title="Advertisement"></iframe></div></div></div></div><p class="css-1kir5of" data-dcnode-id="643"><span data-dcnode-id="644"><span data-dcnode-id="645" instrument_node=""> Last medically reviewed on  August 13, 2019</span></span></p><div class="css-zvkybb" data-dcnode-id="525"><div class="css-55guol" data-dcnode-id="547"><div aria-controls="article-resources" aria-expanded="false" class="css-ln6pc0" data-dcnode-id="634" role="button"><p class="css-lkhgkk" data-dcnode-id="635"><span class="css-fjmckk icon-hlvideo-minus" data-dcnode-id="642"></span><span class="css-fjmckk icon-hlvideo-plus" data-dcnode-id="641"></span><span data-dcnode-id="640" instrument_node=""> </span><span class="css-11nuv7j" data-dcnode-id="638"><span data-dcnode-id="639" ins
