uto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=2258 2258w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-1.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=2618 2618w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-1.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=3038 3038w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-1.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=3524 3524w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-1.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=4088 4088w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-1.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=4742 4742w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-1.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=5500 5500w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-1.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=6380 6380w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-1.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=7400 7400w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-1.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=8192 8192w"></dt><dt data-dcnode-id="2491"><a data-dcnode-id="2492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/1/15/Anatomy_Abdomen_Tiesworks.jpg" rel="noopener" target="_blank"><span data-dcnode-id="2493" instrument_node="">Photo credit</span></a></dt></dl></div><p data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">Liver cancer is one of the most common types of cancer. Alcohol abuse, hepatitis infections, and birth defects can all contribute to the development&nbsp;of this disease. While both men and women can develop liver cancer, it most commonly affects men.</span></p><p data-dcnode-id="2482"><span data-dcnode-id="2486" instrument_node="">This year, it’s </span><a data-dcnode-id="2484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancer.net/cancer-types/liver-cancer/statistics" rel="noopener" target="_blank"><span data-dcnode-id="2485" instrument_node="">estimated</span></a><span data-dcnode-id="2483" instrument_node=""> that over 18,000 men and nearly 9,000 women will die of the condition in the United States. Yet, the condition affects nearly 40,000 Americans each year. There are two primary types of liver cancer:</span></p><ul data-dcnode-id="2477"><li data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">Hepatocellular carcinoma (HCC)</span></li><li data-dcnode-id="2478"><span data-dcnode-id="2479" instrument_node="">Cholangiocarcinoma (cancers of the bile duct)</span></li></ul><p data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">Unfortunately, liver cancer is often deadly. 15% of those with the disease have a 5-year survival rate. Current treatment options also leave much to be desired. Chemotherapy, radiation, liver transplant, and opioid pain management are the common lines of action.</span></p><h2 data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">Cannabis and liver cancer</span></h2><div data-dcnode-id="2466"><dl data-dcnode-id="2467" id="attachment_41758"><dt data-dcnode-id="2471"><img alt="Liver Cancer With Cannabis 2 How Patients Treat Liver Cancer With Cannabis" class="lazyload css-8atqhb" data-dcnode-id="2472" sizes="(min-width: 768px) 600px, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-2.jpg%3Fauto%3Dformat%26fit%3Dclip%26q%3D60%26ixlib%3Dreact-8.6.4&amp;raw" srcset="https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-2.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=100 100w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-2.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=116 116w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-2.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=134 134w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-2.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=156 156w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-2.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=182 182w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-2.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=210 210w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-2.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=244 244w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-2.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=282 282w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-2.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=328 328w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-2.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=380 380w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-2.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=442 442w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-2.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=512 512w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-2.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=594 594w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-2.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=688 688w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-2.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=798 798w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-2.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=926 926w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-2.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=1074 1074w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-2.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=1246 1246w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-2.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=1446 1446w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-2.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=1678 1678w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-2.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=1946 1946w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-2.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=2258 2258w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-2.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=2618 2618w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-2.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=3038 3038w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-2.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=3524 3524w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-2.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=4088 4088w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-2.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=4742 4742w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-2.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=5500 5500w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-2.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=6380 6380w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-2.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=7400 7400w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-2.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=8192 8192w"></dt><dt data-dcnode-id="2468"><a data-dcnode-id="2469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Liver.svg/2000px-Liver.svg.png" rel="noopener" target="_blank"><span data-dcnode-id="2470" instrument_node="">Photo credit</span></a></dt></dl></div><p data-dcnode-id="2461"><span data-dcnode-id="2465" instrument_node="">In 2015, </span><a data-dcnode-id="2463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cannabis-cancer-info.org/" rel="noopener" target="_blank"><span data-dcnode-id="2464" instrument_node="">Chinese researchers discovered</span></a><span data-dcnode-id="2462" instrument_node=""> that cannabinoids effectively halted Hepatocellular carcinoma (HCC) cells in a cell line study. HCC is the most common type of liver cancer. So common that it makes up over 75% of all liver cancer cases.</span></p><p data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">With a percentage this high, possible success with cannabis treatments can have a huge therapeutic impact.</span></p><p data-dcnode-id="2454"><span data-dcnode-id="2458" instrument_node="">The research used synthetic cannabinoid&nbsp;WIN55, 212-2, which is a man-made version of </span><a data-dcnode-id="2456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//herb.co/learn/what-is-thc/" rel="noopener" target="_blank"><span data-dcnode-id="2457" instrument_node="">psychoactive THC</span></a><span data-dcnode-id="2455" instrument_node="">. &nbsp;The team found that the cannabinoid&nbsp;arrested the targeted cancer cells, meaning that they had stopped dividing. This means that the cancer cells stopped growing.</span></p><p data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">While this study is specific to liver cancer, the anti-proliferative effects of cannabis are evidenced in additional studies. A 2014 review found that compounds in the herb effectively reduced proliferation in breast, bone, and brain cancers.</span></p><p data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">These findings are quite miraculous. Cancer is caused when cells continue to grow and divide until they interfere with important bodily systems.</span></p><p data-dcnode-id="2448"><span data-dcnode-id="2449" instrument_node="">Halting proliferation is one of the primary reasons cannabis is thought to hold potent, anti-tumor properties. If cells cannot grow and divide, then cancer cells are frozen in place. This means that while the condition may still be present in some, cannabinoids seem to prevent&nbsp;cancer from getting worse.</span></p><div class="banner" data-dcnode-id="2445"><div class="herb-global-content" data-dcnode-id="2446" data-mantis-zone="herb-global-in-page-01"><span data-dcnode-id="2447" instrument_node="">&nbsp;</span></div></div><h2 data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">Does cannabis kill cancer cells?</span></h2><p data-dcnode-id="1924"><iframe allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="1925" f ver-Cancer-With-Cannabis-3.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=3524 3524w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-3.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=4088 4088w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-3.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=4742 4742w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-3.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=5500 5500w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-3.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=6380 6380w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-3.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=7400 7400w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-3.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=8192 8192w"></dt><dt data-dcnode-id="1915"><a data-dcnode-id="1916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/b/b3/HeLa-I.jpg" rel="noopener" target="_blank"><span data-dcnode-id="1917" instrument_node="">Photo credit</span></a></dt></dl></div><p data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">A metastatic cancer is one that spreads from its original location in the body and sets up camp somewhere else. The liver is actually very vulnerable to metastatic cancers. Metastatic cancer cells often use the blood as a highway to their next location.</span></p><p data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">Because the liver’s job is to filter all of your blood as it circulates, it is especially prone to picking up unwanted cancer cells traveling in the bloodstream.</span></p><p data-dcnode-id="1904"><span data-dcnode-id="1908" instrument_node="">A </span><a data-dcnode-id="1906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0278584615001190" rel="noopener" target="_blank"><span data-dcnode-id="1907" instrument_node="">review published</span></a><span data-dcnode-id="1905" instrument_node=""> in January of 2016&nbsp;explains that “cannabinoids have been shown to prevent the&nbsp;formation of distant tumor masses in animal models.” While this information may not be very helpful to those with cancers that have already spread to the liver, it shows that cannabinoid treatments early on may be useful to prevent cancers from getting much worse.</span></p><h3 data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">2. Prevents blood vessel formation</span></h3><div data-dcnode-id="1895"><dl data-dcnode-id="1896" id="attachment_41760"><dt data-dcnode-id="1900"><img alt="Liver Cancer With Cannabis 4 How Patients Treat Liver Cancer With Cannabis" class="lazyload css-8atqhb" data-dcnode-id="1901" sizes="(min-width: 768px) 600px, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-4.jpg%3Fauto%3Dformat%26fit%3Dclip%26q%3D60%26ixlib%3Dreact-8.6.4&amp;raw" srcset="https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-4.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=100 100w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-4.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=116 116w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-4.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=134 134w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-4.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=156 156w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-Wit images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-4.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=8192 8192w"></dt><dt data-dcnode-id="1897"><a data-dcnode-id="1898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vimeo.com/25316513" rel="noopener" target="_blank"><span data-dcnode-id="1899" instrument_node="">Photo credit</span></a></dt></dl></div><p data-dcnode-id="1884"><span data-dcnode-id="1894" instrument_node="">In order for tumors to grow, they need their own blood supply. To tap into this vital resource, they create their own blood vessels. Turns out, cannabinoids may put a stop to this. </span><a data-dcnode-id="1892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cancerres.aacrjournals.org/content/68/6/1945.long" rel="noopener" target="_blank"><span data-dcnode-id="1893" instrument_node="">Research published</span></a><span data-dcnode-id="1891" instrument_node=""> over the last decade has found that both psychoactive THC and </span><a data-dcnode-id="1889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//herb.co/learn/what-is-cbd/" rel="noopener" target="_blank"><span data-dcnode-id="1890" instrument_node="">non-psychoactive CBD</span></a><span data-dcnode-id="1888" instrument_node=""> prevent tumors from </span><a data-dcnode-id="1886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3366283/" rel="noopener" target="_blank"><span data-dcnode-id="1887" instrument_node="">developing blood vessels</span></a><span data-dcnode-id="1885" instrument_node="">.</span></p><p data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">This means that they are deprived of the vital oxygen that they need to grow and produce energy. Without the ability to grow blood vessels, tumors essentially suffocate and starve.</span></p><h2 data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">3. Encourages programmed cell death</span></h2><p data-dcnode-id="1361"><iframe allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="1362" frameborder="0" height="281" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/Ax5Abx-u4HQ%3Ffeature%3Doembed&amp;raw" width="500"><html data-cast-api-enabled="true" data-dcnode-id="1364" dir="ltr" lang="en"><head data-dcnode-id="1854"><meta charset="utf-8"><meta content="width=device-width, initial-scale=1" data-dcnode-id="1874" name="viewport"/><link data-dcnode-id="1869" href="https://www.youtube.com/s/player/596ef930/www-player.css" name="www-player" nonce="hgicmyQT7F6Ticwc21STeQ" rel="stylesheet"/><title data-dcnode-id="1856">YouTube</title><link data-dcnode-id="1855" href="https://www.youtube.com/watch?v=Ax5Abx-u4HQ" rel="canonical"/></meta></head><body class="date-20220425 en_US ltr site-center-aligned site-as-giant-card webkit webkit-534" data-dcnode-id="1365" dir="ltr"><div data-dcnode-id="1372" id="player" style="width: 100%; height: 100%;"><div aria-label="YouTube Video Player" class="html5-video-player ytp-exp-bottom-control-flexbox ytp-title-enable-channel-logo ytp-embed ytp-embed-playlist unstarted-mode ytp-hide-controls ytp-small-mode" data-dcnode-id="1373" data-version="/s/player/596ef930/player_ias.vflset/en_US/base.js" id="movie_player" tabindex="-1"><div class="html5-video-container" data-dcnode-id="1852" data-layer="0"><video class="video-stream html5-main-video" controlslist="nodownload" data-dcnode-id="1853" playsinline="" style="width: 526px; height: 281px; left: 0px; top: -281px;" tabindex="-1" webkit-playsinline=""></video></div><div class="ytp-gradient-top" data-dcnode-id="1851" data-layer="1"></div><div class="ytp-chrome-top ytp-show-cards-title" data-dcnode-id="1800" data-layer="1"><div class="ytp-title-channel" data-dcnode-id="1841"><div class="ytp-title-beacon" data-dcno path></use><path class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="1388" id="ytp-id-7"></path></g><g class="ytp-fullscreen-button-corner-2" data-dcnode-id="1383"><use class="ytp-svg-shadow" data-dcnode-id="1385" href="#ytp-id-8"><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="1386" id="ytp-id-8"></path></use><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="1384" id="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="1379"><use class="ytp-svg-shadow" data-dcnode-id="1381" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="1382" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="1380" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=Ax5Abx-u4HQ" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></p><p data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">Perhaps the most fascinating way cannabinoids fight cancer is through a process known as programmed cell death. Basically, when cells go awry, your body has built-in mechanisms to kill these cells off. Damaged and dysfunctional cells receive a signal that tells them to commit suicide or auto-digest themselves.</span></p><p data-dcnode-id="1351"><span data-dcnode-id="1358" instrument_node="">Cancer cells, however, don’t respond to these signals. They are damaged cells that just keep growing and dividing until they create a tumor mass. This is where cannabis comes in.</span><a data-dcnode-id="1356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4791143/" rel="noopener" target="_blank"><span data-dcnode-id="1357" instrument_node=""> Laboratory and animal models</span></a><span data-dcnode-id="1355" instrument_node=""> have shown that both THC and CBD </span><a data-dcnode-id="1353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2673842/" rel="noopener" target="_blank"><span data-dcnode-id="1354" instrument_node="">trigger programmed cell death</span></a><span data-dcnode-id="1352" instrument_node=""> in tumor cells.</span></p><p data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">This means that the cells begin to commit suicide and auto-digest themselves, actually killing&nbsp;cancer cells.</span></p><p data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">Unfortunately, we are still awaiting human trials to test how well this process works in humans. However, the clinical models so far have been positive. We also don’t know exactly whether or not these mechanisms work in all forms of cancer. We can only hope the scientific community will give us some firm answers sometime in the near future.</span></p><div data-dcnode-id="1344"><div data-dcnode-id="1345" data-mantis-zone="herb-global-in-page-03"><span data-dcnode-id="1346" instrument_node="">&nbsp;</span></div></div><h2 data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">Patients treating liver cancer with cannabis</span></h2><div data-dcnode-id="1335"><dl data-dcnode-id="1336" id="attachment_41761"><dt data-dcnode-id="1340"><img alt="Liver Cancer With Cannabis 5 How Patients Treat Liver Cancer With Cannabis" class="lazyload css-8atqhb" data-dcnode-id="1341" sizes="(min-width: 768px) 600px, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&am mp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=3524 3524w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-5.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=4088 4088w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-5.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=4742 4742w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-5.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=5500 5500w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-5.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=6380 6380w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-5.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=7400 7400w, https://images.herb.co/wp-content/uploads/2016/08/Liver-Cancer-With-Cannabis-5.jpg?auto=format&amp;fit=clip&amp;q=60&amp;ixlib=react-8.6.4&amp;w=8192 8192w"></dt><dt data-dcnode-id="1337"><a data-dcnode-id="1338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.vimeocdn.com/video/173525159_1280x954.jpg" rel="noopener" target="_blank"><span data-dcnode-id="1339" instrument_node="">Photo credit</span></a></dt></dl></div><p data-dcnode-id="1330"><span data-dcnode-id="1334" instrument_node="">Sorry to say, but smoking a joint is not the way patients are using cannabis to treat liver cancer. Rather, patients who have success with the herb use a highly concentrated medical cannabis oil. This oil is a whole-plant extraction that separates all cannabis resin from plant material. To learn how it’s made, take a look at our article </span><a data-dcnode-id="1332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//herb.co/learn/how-to-make-cannabis-oil/" rel="noopener" target="_blank"><span data-dcnode-id="1333" instrument_node="">here</span></a><span data-dcnode-id="1331" instrument_node="">.</span></p><p data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">Generally, patients work up to at least a full gram of cannabis oil each day, in 90-day cycles. However, the only way to determine the best course of treatment for your specific condition is to work closely with your doctor. Always consult your doctor before making changes to your treatment plan.</span></p><p data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">There are no guarantees with cannabis, and what works for some people might not work for others. A medical professional will be able to advise you on the best course of action.</span></p><h3 data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Mike Cutler</span></h3><p data-dcnode-id="721"><iframe allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="722" frameborder="0" height="281" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/bxLkNLXUde4%3Ffeature%3Doembed&amp;raw" width="500"><html data-cast-api-enabled="true" data-dcnode-id="724" dir="ltr" lang="en"><head data-dcnode-id="1300"><meta charset="utf-8"><meta content="width=device-width, initial-scale=1" data-dcnode-id="1320" name="viewport"/><meta content="noindex" data-dcnode-id="1319" name="robots"/><link data-dcnode-id="1314" href="https://www.youtube.com/s/player/596ef930/www-player.css" name="www-player" nonce="bVmZiHX6si0IMfz7IMcO1g" rel="stylesheet"/><title data-dcnode-id="1301">YouTube</title></meta></head><body class="date-20220425 en_US ltr site-center-aligned site-as-giant-card webkit webkit-534" data-dcnode-id="725" dir="ltr"><div data-dcnode-id="732" id="player" style="width: 100%; height: 100%;"><div aria-label="YouTube Video Player" class="html5-video-player ytp-exp-bottom-control-flexbox ytp-embed ytp-embed-playlist ytp-menu-shown ytp-hide-info-bar ytp-small-mode ytp-embed-error" data-dcnode-id="733" data-version="/s/play ath></use><path class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="748" id="ytp-id-7"></path></g><g class="ytp-fullscreen-button-corner-2" data-dcnode-id="743"><use class="ytp-svg-shadow" data-dcnode-id="745" href="#ytp-id-8"><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="746" id="ytp-id-8"></path></use><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="744" id="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="739"><use class="ytp-svg-shadow" data-dcnode-id="741" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="742" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="740" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;Unable to execute JavaScript.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></p><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">In 2009, Mike Cutler of the UK had a liver transplant. The procedure was an attempt to combat a bad case of liver cancer, but something went horribly wrong. Nearly three years later, cancer came back and attacked his new organ.</span></p><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">There was nothing his doctors could do. In his early 60s, Cutler was sent home from the hospital with ample amounts of morphine and a&nbsp;death sentence.</span></p><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">After being confined to bed rest and ill from ample doses of morphine, Cutler knew that there had to be another way. Armed with a laptop, he took to the almighty internet. He soon stumbled upon Rick Simpson’s story.</span></p><p data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">As chance would have it, he happened to meet someone who gave him some cannabis oil. Here’s how it worked for him,</span></p><blockquote data-dcnode-id="710"><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Within three days, I’d stopped taking the morphine. My wife got me to go to the doctor’s, and he said “my God, you look well.” and he said “what’s happening?” and I said, “well, I’ve stopped taking the morphine and I’m taking cannabis oil.” And he was more conserned that I wasn’t having serious withdrawl symptoms from stopping taking the morphine than he was about the cannabis oil.</span></p></blockquote><blockquote data-dcnode-id="707"><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">About two months into taking the oil, I started coughing up blood. Or, what I thought was blood. And I thought, well this isn’t good. My wife wasn’t happy, so back to the doctor’s we went. He took a sample and he looked at it, and he said “well, I don’t know what this is, but it’s not blood.”</span></p></blockquote><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">The doctor was unable to identify what Cutler was coughing up, so he was sent back to the hospital for a biopsy. In the meantime, Cutler’s wife bought him a microscope and he did some research himself. He hooked his microscope up to his computer and found something quite amazing. He explains:</span></p><blockquote data-dcnode-id="702"><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Suddenly there was this picture in front of me on the screen which was idential to the one next to it that I spat up. And to my amazment it was a dead cancer cell.</span></p></blockquote><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">When the results of Cutler’s biopsy came back, he asked the doctors about his cancer. Their reply? “What cancer?”. After two months of cannabis oil treatment, Cutler’s cancer couldn’t be found.</span></p><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Unfortunately, Culter passed away several months after being told that his cancer had cleared. Whether or not his death was caused by his cancer is uncertain. However, there’s no doubt that cannabis oil prolonged Mike Cutler’s life and improved his day to day symptoms while he was still on earth.</span></p><h3 data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Ed’s story</span></h3><p data-dcnode-id="177"><iframe allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="178" frameborder="0" height="281" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/0tsqUdIbDKE%3Ffeature%3Doembed&amp;raw" width="500"><html data-cast-api-enabled="true" data-dcnode-id="180" dir="ltr" lang="en"><head data-dcnode-id="670"><meta charset="utf-8"><meta content="width=device-width, initial-scale=1" data-dcnode-id="690" name="viewport"/><link data-dcnode-id="685" href="https://www.youtube.com/s/player/596ef930/www-player.css" name="www-player" nonce="hrYyaDjJNvtcT9j9k4FumA" rel="stylesheet"/><title data-dcnode-id="672">YouTube</title><link data-dcnode-id="671" href="https://www.youtube.com/watch?v=0tsqUdIbDKE" rel="canonical"/></meta></head><body class="date-20220425 en_US ltr site-center-aligned site-as-giant-card webkit webkit-534" data-dcnode-id="181" dir="ltr"><div data-dcnode-id="188" id="player" style="width: 100%; height: 100%;"><div aria-label="YouTube Video Player" class="html5-video-player ytp-exp-bottom-control-flexbox ytp-title-enable-channel-logo ytp-embed ytp-embed-playlist unstarted-mode ytp-hide-controls ytp-small-mode" data-dcnode-id="189" data-version="/s/player/596ef930/player_ias.vflset/en_US/base.js" id="movie_player" tabindex="-1"><div class="html path class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="204" id="ytp-id-7"></path></g><g class="ytp-fullscreen-button-corner-2" data-dcnode-id="199"><use class="ytp-svg-shadow" data-dcnode-id="201" href="#ytp-id-8"><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="202" id="ytp-id-8"></path></use><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="200" id="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="195"><use class="ytp-svg-shadow" data-dcnode-id="197" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="198" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="196" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="182"><span data-dcnode-id="183" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=0tsqUdIbDKE" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></p><p data-dcnode-id="175"><span data-dcnode-id="176" instrument_node="">In 2012 Ed was diagnosed with stage 4 liver cancer. His tumor spanned 7 inches and had spread to his lymph nodes. Armed with morphine, doctors told him that there was nothing to do other than to call hospice. He was given two weeks to two months to live.</span></p><p data-dcnode-id="173"><span data-dcnode-id="174" instrument_node="">Then, two friends approached him with cannabis oil. He decided to give it a try.&nbsp;Four years later, he’s still going strong. His tumor has continued to shrink, though he is not yet fully in the clear.</span></p><p data-dcnode-id="168"><span data-dcnode-id="172" instrument_node="">Ed took a very aggressive approach to treating his liver cancer. He worked up to 2 grams of cannabis oil divided between four daily doses. Yet, he also worked heavily with a naturopathic doctor and incorporated other alternative treatments, such as intravenous vitamin C and regular sauna and hot tub use, eats a very strict diet high in fresh fruits and vegetables, and takes over 20 different supplements daily. You can find more information&nbsp;on his unique treatment plan </span><a data-dcnode-id="170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chrisbeatcancer.com/ed-crushing-stage-four-liver-cancer-with-cannabis-oil/"><span data-dcnode-id="171" instrument_node="">here</span></a><span data-dcnode-id="169" instrument_node="">.</span></p><blockquote data-dcnode-id="165"><p data-dcnode-id="166"><span data-dcnode-id="167" instrument_node="">I would say that the Phoenix Tears, which are actually cannabis oil concentrate, a whole plant reduction process to pull the oils out of it […] This isn’t the stuff we used to get high on in college and high school. This is serious chemotherapy, it just happens to be herbal, it happens to be organic. Hopfully organic, that’s a new and important step in this protocol.</span></p></blockquote><blockquote data-dcnode-id="162"><p data-dcnode-id="163"><span data-dcnode-id="164" instrument_node="">The medicine can be modeled to your specific cancer, [to the] specific symptoms you’re trying to deal with.However, you need to do it under a doctor’s supervision. I recommend a cancer patient immediately get a good naturopathic doctor to go along with your regular primary physician.</span></p></blockquote><p data-dcnode-id="157"><span data-dcnode-id="161" instrument_node="">Ed also does raw cannabis juicing, mixing fan leaves and fresh buds with a daily green juice. He also has learned that “cancer is smart” and</span><a data-dcnode-id="159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cannabis-cancer-info.org/" rel="noopener" target="_blank"><span data-dcnode-id="160" instrument_node=""> argues</span></a><span data-dcnode-id="158" instrument_node=""> that it is important to take brakes from cannabis therapy or switch your varieties of cannabis oil for continuous effective treatment.</span></p><p data-dcnode-id="155"><span data-dcnode-id="156" instrument_node="">Cannabis holds a lot of potential as an anti-cancer agent. Laboratory and animal models have shown tremendous promise, yet current trials in humans are sorely lacking.</span></p><p data-dcnode-id="153"><span data-dcnode-id="154" instrument_node="">Different types of cancer may also respond differently to cannabinoid treatment, making it difficult to determine just what kind of cannabis holds the most potential as a liver cancer treatment. Regardless of the lack of mainstream human research, patients are&nbsp;turning to cannabis treatment with success.</span></p><p data-dcnode-id="151"><span data-dcnode-id="152" instrument_node="">Regardless of the lack of mainstream human research, patients are&nbsp;turning to cannabis treatment with success. Of course, what works for one person may not work for another. So, always consult your care team before experimenting with cannabis treatments.</span></p><p data-dcnode-id="149"><span data-dcnode-id="150" instrument_node="">As an inevitable disclaimer, the research presented here are meant for information purposes only. Only a medical professional can help you develop a proper treatment plan.</span></p><p data-dcnode-id="144"><span data-dcnode-id="148" instrument_node="">Have you had success with cannabis for liver cancer? Share your story with us on </span><a data-dcnode-id="146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/TheStonersCookbook" rel="noopener" target="_blank"><span data-dcnode-id="147" instrument_node="">social media</span></a><span data-dcnode-id="145" instrument_node=""> or in the comments below. We’d love to hear from you!</span></p></div><div class="shareAricleLinks" data-dcnode-id="126"><div class="css-1h6yr84 e1mf5b910" data-dcnode-id="127"><div class="css-5486gr e4zcl2v0" data-dcnode-id="138"><button additionalprops="[object Object]" aria-label="facebook" class="react-share__ShareButton" data-dcnode-id="139" style="background-color:transparent;border:none;padding:0;font:inherit;color:inherit;cursor:pointer"><svg data-dcnode-id="140" height="32" viewBox="0 0 64 64" width="32"><circle cx="32" cy="32" data-dcnode-id="142" fill="#3b5998" r="31" style="fill:#535353"></circle><path d="M34.1,47V33.3h4.6l0.7-5.3h-5.3v-3.4c0-1.5,0.4-2.6,2.6-2.6l2.8,0v-4.8c-0.5-0.1-2.2-0.2-4.1-0.2 c-4.1,0-6.9,2.5-6.9,7V28H24v5.3h4.6V47H34.1z" data-dcnode-id="141" fill="white"></path></svg></button></div><div class="css-5486gr e4zcl2v0" data-dcnode-id="133"><button additionalprops="[object Object]" aria-label="twitter" class="react-share__ShareButton" data-dcnode-id="134" style="background-color:transparent;border:none;padding:0;font:inherit;color:inherit;cursor:pointer"><svg data-dcnode-id="135" height="32" viewBox="0 0 64 64" width="32"><circle cx="32" cy="32" data-dcnode-id="137" fill="#00aced" r="31" style="fill:#535353"></circle><path d="M48,22.1c-1.2,0.5-2.4,0.9-3.8,1c1.4-0.8,2.4-2.1,2.9-3.6c-1.3,0.8-2.7,1.3-4.2,1.6 C41.7,19.8,40,19,38.2,19c-3.6,0-6.6,2.9-6.6,6.6c0,0.5,0.1,1,0.2,1.5c-5.5-0.3-10.3-2.9-13.5-6.9c-0.6,1-0.9,2.1-0.9,3.3 c0,2.3,1.2,4.3,2.9,5.5c-1.1,0-2.1-0.3-3-0.8c0,0,0,0.1,0,0.1c0,3.2,2.3,5.8,5.3,6.4c-0.6,0.1-1.1,0.2-1.7,0.2c-0.4,0-0.8,0-1.2-0.1 c0.8,2.6,3.3,4.5,6.1,4.6c-2.2,1.8-5.1,2.8-8.2,2.8c-0.5,0-1.1,0-1.6-0.1c2.9,1.9,6.4,2.9,10.1,2.9c12.1,0,18.7-10,18.7-18.7 c0-0.3,0-0.6,0-0.8C46,24.5,47.1,23.4,48,22.1z" data-dcnode-id="136" fill="white"></path></svg></button></div><div class="css-5486gr e4zcl2v0" data-dcnode-id="128"><button additionalprops="[object Object]" aria-labe
