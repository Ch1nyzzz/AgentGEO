</span><u data-dcnode-id="4069"><span data-dcnode-id="4070" instrument_node="">al</span></u><span data-dcnode-id="4068" instrument_node="">., 1975; Wynder and Goldsmith, 1977). However, with only two possible exceptions in males (Bross and Tidings, 1973; Wynder and Goldsmith, 1977), there has been no evidence of a dose-response relationship, and it appears that the association is not causal.</span></p><p data-dcnode-id="4059"><span data-dcnode-id="4066" instrument_node="">A direct association of coffee consumption with risk of pancreatic cancer based on case-control data was reported by MacMahon </span><u data-dcnode-id="4064"><span data-dcnode-id="4065" instrument_node="">et</span></u><span data-dcnode-id="4063" instrument_node="">
</span><u data-dcnode-id="4061"><span data-dcnode-id="4062" instrument_node="">al</span></u><span data-dcnode-id="4060" instrument_node="">. (1981). They provided evidence for a dose-response relationship. In another report, Lin and Kessler (1981) noted an association between pancreatic cancer and the use of decaffeinated coffee specifically. In an earlier geographical correlation of per capita food intake and mortality from cancer, Stocks (1970) observed a significant association between coffee drinking and pancreatic cancer.</span></p><p data-dcnode-id="4045"><span data-dcnode-id="4058" instrument_node="">Other reported associations of coffee drinking with cancer have been scattered and inconsistent. Martinez (1969) found an association between oral and esophageal cancers combined and consumption of hot beverages, mostly coffee, whereas Stocks (1970) did not find a significant correlation between coffee consumption and esophageal cancer. Shennan (1973) reported a direct correlation between per capita coffee intake and mortality from renal carcinoma (r=0.8), and the association, though less strong, appeared also in the correlational data of Armstrong and Doll (1975). On the other hand, case-control studies of renal cancer (Armstrong </span><u data-dcnode-id="4056"><span data-dcnode-id="4057" instrument_node="">et</span></u><span data-dcnode-id="4055" instrument_node="">
</span><u data-dcnode-id="4053"><span data-dcnode-id="4054" instrument_node="">al</span></u><span data-dcnode-id="4052" instrument_node="">., 1976; Wynder </span><u data-dcnode-id="4050"><span data-dcnode-id="4051" instrument_node="">et</span></u><span data-dcnode-id="4049" instrument_node="">
</span><u data-dcnode-id="4047"><span data-dcnode-id="4048" instrument_node="">al</span></u><span data-dcnode-id="4046" instrument_node="">., 1974) have not confirmed this association. Stocks (1970) also found a direct correlation of prostate cancer mortality with per capita coffee intake. This finding did not appear in a similar analysis by Armstrong and Doll (1975), who reported an association with per capita fat intake and a high correlation between these two dietary factors.</span></p><p data-dcnode-id="4041"><u data-dcnode-id="4043"><span data-dcnode-id="4044" instrument_node="">Experimental Evidence: Carcinogenicity</span></u><span data-dcnode-id="4042" instrument_node="">. Sprague-Dawley rats were fed a diet containing 5% instant coffee for 2 years. No bladder tumors were noted in rats fed diets containing the equivalent of up to 85 cups of coffee per day (Zeitlin, 1972).</span></p><p data-dcnode-id="4033"><span data-dcnode-id="4040" instrument_node="">Maximum tolerated doses of regular and decaffeinated instant coffees (6% of the diet) fed to Sprague-Dawley rats for 2 years produced no evidence of carcinogenesis (Würzner </span><u data-dcnode-id="4038"><span data-dcnode-id="4039" instrument_node="">et</span></u><span data-dcnode-id="4037" instrument_node="">
</span><u data-dcnode-id="4035"><span data-dcnode-id="4036" instrument_node="">al</span></u><span data-dcnode-id="4034" instrument_node="">., 1977). The authors also reported that high levels of caffeine led to a lower incidence of tumors. However, Challis and Bartlett (1975) reported that readily oxidized phenolic compounds--which are constituents of coffee--catalyze nitrosamine formation from nitrite and secondary amines at gastric pH. For example, these experiments showed that 4-methylcatechol and the phenolic component of chlorogenic acid (approximately 13% of the dry weight of the soluble constituents of coffee), exerted catalytic effects on nitrosamine formation. This finding implies that several foodstuffs and beverages, including coffee, may have cocarcinogenic properties.</span></p><p data-dcnode-id="3993"><u data-dcnode-id="4031"><span data-dcnode-id="4032" instrument_node="">Experimental Evidence: Mutagenicity</span></u><span data-dcnode-id="4030" instrument_node="">. Coffee is mutagenic to </span><u data-dcnode-id="4028"><span data-dcnode-id="4029" instrument_node="">Salmonella</span></u><span data-dcnode-id="4027" instrument_node="">
</span><u data-dcnode-id="4025"><span data-dcnode-id="4026" instrument_node="">typhimurium</span></u><span data-dcnode-id="4024" instrument_node=""> strain TA100, whether it is brewed, instant, or decaffeinated (Aeschbacher and Würzner, 1980; Aeschbacher </span><u data-dcnode-id="4022"><span data-dcnode-id="4023" instrument_node="">et</span></u><span data-dcnode-id="4021" instrument_node="">
</span><u data-dcnode-id="4019"><span data-dcnode-id="4020" instrument_node="">al</span></u><span data-dcnode-id="4018" instrument_node="">., 1980; Nagao </span><u data-dcnode-id="4016"><span data-dcnode-id="4017" instrument_node="">et</span></u><span data-dcnode-id="4015" instrument_node="">
</span><u data-dcnode-id="4013"><span data-dcnode-id="4014" instrument_node="">al</span></u><span data-dcnode-id="4012" instrument_node="">., 1979). Although caffeine has been reported to be mutagenic to bacteria (Clarke and Wade, 1975; Demerec </span><u data-dcnode-id="4010"><span data-dcnode-id="4011" instrument_node="">et</span></u><span data-dcnode-id="4009" instrument_node="">
</span><u data-dcnode-id="4007"><span data-dcnode-id="4008" instrument_node="">al</span></u><span data-dcnode-id="4006" instrument_node="">., 1948, 1951; Gezelius and Fries, 1952; Glass and Novick, 1959; Johnson and Bach, 1965; Kubitschek and Bendigkeit, 1958, 1964; Novick, 1956), it could not have been responsible for the mutagenicity of coffee observed in these reports, since decaffeinated coffee was as mutagenic as regular coffee and caffeine itself was not detected as a mutagen under the test conditions used (Aeschbacher </span><u data-dcnode-id="4004"><span data-dcnode-id="4005" instrument_node="">et</span></u><span data-dcnode-id="4003" instrument_node="">
</span><u data-dcnode-id="4001"><span data-dcnode-id="4002" instrument_node="">al</span></u><span data-dcnode-id="4000" instrument_node="">., 1980; Nagao </span><u data-dcnode-id="3998"><span data-dcnode-id="3999" instrument_node="">et</span></u><span data-dcnode-id="3997" instrument_node="">
</span><u data-dcnode-id="3995"><span data-dcnode-id="3996" instrument_node="">al</span></u><span data-dcnode-id="3994" instrument_node="">., 1979).</span></p></div><div data-dcnode-id="3969" id="ddd0000213"><h3 data-dcnode-id="3990"><span data-dcnode-id="3991" instrument_node="">Methylxanthines</span></h3><p data-dcnode-id="3986"><u data-dcnode-id="3988"><span data-dcnode-id="3989" instrument_node="">Experimental Evidence: Carcinogenicity</span></u><span data-dcnode-id="3987" instrument_node="">. Another widely consumed class of compounds are the methylxanthines, which include caffeine. There appear to be no published studies on the carcinogenicity of caffeine in laboratory animals following chronic oral administration. In one as yet unpublished study (Takayama, personal communication), Wistar rats were divided into three dose groups each containing 50 males and 50 females. The first two groups were given 0.2% and 0.1% caffeine in their drinking water for 18 months beginning at the age of 8 weeks. Then, normal water without caffeine was given to the surviving animals for an additional 6 months. The third group, which served as the control group, was given normal water throughout the experiment. All remaining animals were sacrificed 24 months after the caffeine treatment had begun. The investigators concluded that there was no significant increase in the incidence of any type of tumors in caffeine-treated animals, as compared to control animals.</span></p><p data-dcnode-id="3970"><u data-dcnode-id="3984"><span data-dcnode-id="3985" instrument_node="">Experimental Evidence: Mutagenicity</span></u><span data-dcnode-id="3983" instrument_node="">. The methylxanthines--a class of compounds that are present in tea and coffee--are mutagenic in at least some test systems. Three of the compounds--caffeine, theophylline, and theobromine--have been reported to be mutagenic to bacteria and to cause abnormalities in the chromosomes of plant cells (see reviews by Kihlman, 1977, and Timson, 1975). However, the mutagenic effects of these compounds in mammals have not been clearly demonstrated </span><u data-dcnode-id="3981"><span data-dcnode-id="3982" instrument_node="">in</span></u><span data-dcnode-id="3980" instrument_node="">
</span><u data-dcnode-id="3978"><span data-dcnode-id="3979" instrument_node="">vivo</span></u><span data-dcnode-id="3977" instrument_node="">. Caffeine can enhance the genetic effects of other chemicals, even </span><u data-dcnode-id="3975"><span data-dcnode-id="3976" instrument_node="">in</span></u><span data-dcnode-id="3974" instrument_node="">
</span><u data-dcnode-id="3972"><span data-dcnode-id="3973" instrument_node="">vivo</span></u><span data-dcnode-id="3971" instrument_node=""> (Frei and Venitt, 1975; Jenssen and Ramel, 1978). This activity is presumably due to the ability of caffeine to inhibit repair of DNA damage caused by chemical mutagens.</span></p></div><div data-dcnode-id="3903" id="ddd0000214"><h3 data-dcnode-id="3967"><span data-dcnode-id="3968" instrument_node="">Cycasin</span></h3><p data-dcnode-id="3956"><span data-dcnode-id="3966" instrument_node="">Cycasin (methylazoxymethanol-β-glucoside) is one of the most potent carcinogens found in plants (International Agency for Research on </span><a aria-expanded="false" aria-haspopup="true" class="def" data-dcnode-id="3964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap371/ddd0000314/def-item/ggg00008/" role="button"><span data-dcnode-id="3965" instrument_node="">Cancer</span></a><span data-dcnode-id="3963" instrument_node="">, 1976; Magee </span><u data-dcnode-id="3961"><span data-dcnode-id="3962" instrument_node="">et</span></u><span data-dcnode-id="3960" instrument_node="">
</span><u data-dcnode-id="3958"><span data-dcnode-id="3959" instrument_node="">al</span></u><span data-dcnode-id="3957" instrument_node="">., 1976). This compound and at least one related glucoside (macrozamin) are present in the palmlike cycad trees of the family Cycadaceae. These trees have provided food for natives and their livestock in tropical and subtropical regions. The sliced nuts are generally extracted with water prior to use, but acute poisonings have been reported.</span></p><p data-dcnode-id="3948"><span data-dcnode-id="3955" instrument_node="">In Guam and Okinawa, which have high rates of liver cancer, the ingestion of cycasin in cycad nuts has been proposed as an etiologic factor. However, in a descriptive study conducted in the Miyako Islands of Okinawa, investigators found no correlation between mortality from hepatoma and the ingestion of cycad nuts (Hirono </span><u data-dcnode-id="3953"><span data-dcnode-id="3954" instrument_node="">et</span></u><span data-dcnode-id="3952" instrument_node="">
</span><u data-dcnode-id="3950"><span data-dcnode-id="3951" instrument_node="">al</span></u><span data-dcnode-id="3949" instrument_node="">., 1970). Therefore, there is no evidence for the carcinogenicity of cycasin in humans.</span></p><p data-dcnode-id="3920"><u data-dcnode-id="3946"><span data-dcnode-id="3947" instrument_node="">Experimental Evidence: Carcinogenicity</span></u><span data-dcnode-id="3945" instrument_node="">. When administered orally, cycasin is highly carcinogenic in the liver, kidney, and colon of rats, and also induces tumors in other species (Laquer and Spatz, 1968). The tissues of rats contain low levels of β-glucosidase, which hydrolyzes cycasin. However, the hydrolysis generally depends on the action of intestinal bacteria (Matsumoto </span><u data-dcnode-id="3943"><span data-dcnode-id="3944" instrument_node="">et</span></u><span data-dcnode-id="3942" instrument_node="">
</span><u data-dcnode-id="3940"><span data-dcnode-id="3941" instrument_node="">al</span></u><span data-dcnode-id="3939" instrument_node="">., 1972). The product, methylazoxymethanol (MAM), decomposes at neutral pH to an electrophilic intermediate that methylates nucleic acids and proteins both </span><u data-dcnode-id="3937"><span data-dcnode-id="3938" instrument_node="">in</span></u><span data-dcnode-id="3936" instrument_node="">
</span><u data-dcnode-id="3934"><span data-dcnode-id="3935" instrument_node="">vitro</span></u><span data-dcnode-id="3933" instrument_node=""> and </span><u data-dcnode-id="3931"><span data-dcnode-id="3932" instrument_node="">in</span></u><span data-dcnode-id="3930" instrument_node="">
</span><u data-dcnode-id="3928"><span data-dcnode-id="3929" instrument_node="">vivo</span></u><span data-dcnode-id="3927" instrument_node=""> (Matsumoto and Higa, 1966). These findings and the carcinogenic activity of MAM (Laquer and Spatz, 1968) have implicated MAM as a proximate carcinogenic metabolite of cycasin. The methylating species formed from MAM and cycasin appears to be similar or identical to that formed during the metabolic activation of the synthetic carcinogen nitrosodimethylamine, which has carcinogenic properties similar to those of cycasin (Magee </span><u data-dcnode-id="3925"><span data-dcnode-id="3926" instrument_node="">et</span></u><span data-dcnode-id="3924" instrument_node="">
</span><u data-dcnode-id="3922"><span data-dcnode-id="3923" instrument_node="">al</span></u><span data-dcnode-id="3921" instrument_node="">., 1976).</span></p><p data-dcnode-id="3904"><u data-dcnode-id="3918"><span data-dcnode-id="3919" instrument_node="">Experimental Evidence: Mutagenicity</span></u><span data-dcnode-id="3917" instrument_node="">. Cycasin was not mutagenic in the standard Ames test (Ames </span><u data-dcnode-id="3915"><span data-dcnode-id="3916" instrument_node="">et</span></u><span data-dcnode-id="3914" instrument_node="">
</span><u data-dcnode-id="3912"><span data-dcnode-id="3913" instrument_node="">al</span></u><span data-dcnode-id="3911" instrument_node="">., 1975), but it became mutagenic when preincubated with almond β-glucosidase (Matsushima </span><u data-dcnode-id="3909"><span data-dcnode-id="3910" instrument_node="">et</span></u><span data-dcnode-id="3908" instrument_node="">
</span><u data-dcnode-id="3906"><span data-dcnode-id="3907" instrument_node="">al</span></u><span data-dcnode-id="3905" instrument_node="">., 1979).</span></p></div><div data-dcnode-id="3863" id="ddd0000215"><h3 data-dcnode-id="3901"><span data-dcnode-id="3902" instrument_node="">Thiourea</span></h3><p data-dcnode-id="3884"><span data-dcnode-id="3900" instrument_node="">Thiourea occurs naturally in laburnum shrubs and in certain fungi (e.g., </span><u data-dcnode-id="3898"><span data-dcnode-id="3899" instrument_node="">Verticillium</span></u><span data-dcnode-id="3897" instrument_node="">
</span><u data-dcnode-id="3895"><span data-dcnode-id="3896" instrument_node="">albo</span></u><span data-dcnode-id="3894" instrument_node="">-</span><u data-dcnode-id="3892"><span data-dcnode-id="3893" instrument_node="">atrum</span></u><span data-dcnode-id="3891" instrument_node=""> and </span><u data-dcnode-id="3889"><span data-dcnode-id="3890" instrument_node="">Bortrylio</span></u><span data-dcnode-id="3888" instrument_node="">
</span><u data-dcnode-id="3886"><span data-dcnode-id="3887" instrument_node="">cinerea</span></u><span data-dcnode-id="3885" instrument_node="">).</span></p><p data-dcnode-id="3877"><u data-dcnode-id="3882"><span data-dcnode-id="3883" instrument_node="">Experimental Evidence: Carcinogenicity</span></u><span data-dcnode-id="3881" instrument_node="">. Thiourea has been shown to cause thyroid tumors, hepatic adenomas, and epidermoid carcinomas of Zymbal's gland when administered to rats as 0.2% of the drinking water or diet for as long as 2 years (International Agency for Research on </span><a aria-expanded="false" aria-haspopup="true" class="def" data-dcnode-id="3879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap371/ddd0000314/def-item/ggg00008/" role="button"><span data-dcnode-id="3880" instrument_node="">Cancer</span></a><span data-dcnode-id="3878" instrument_node="">, 1974).</span></p><p data-dcnode-id="3864"><u data-dcnode-id="3875"><span data-dcnode-id="3876" instrument_node="">Experimental Evidence: Mutagenicity</span></u><span data-dcnode-id="3874" instrument_node="">. Thiourea was negative in the standard Ames </span><u data-dcnode-id="3872"><span data-dcnode-id="3873" instrument_node="">Salmonella</span></u><span data-dcnode-id="3871" instrument_node="">/microsome assay (Simmon, 1979), but positive in the host-mediated assay (Simmon </span><u data-dcnode-id="3869"><span data-dcnode-id="3870" instrument_node="">et</span></u><span data-dcnode-id="3868" instrument_node="">
</span><u data-dcnode-id="3866"><span data-dcnode-id="3867" instrument_node="">al</span></u><span data-dcnode-id="3865" instrument_node="">., 1979). It also induced transformations in hamster embryo cells (Pienta, 1981).</span></p></div><div data-dcnode-id="3836" id="ddd0000216"><h3 data-dcnode-id="3861"><span data-dcnode-id="3862" instrument_node="">Tannic Acid and Tannins</span></h3><p data-dcnode-id="3859"><span data-dcnode-id="3860" instrument_node="">Tannins are contained in many plants. These compounds are divided into two groups--the nonhydrolyzable condensed tannins and the hydrolyzable tannins, which are subdivided into ellagitannins or gallotannins. Commercially, the term tannic acid generally applies to hydrolyzable gallotannins, including taratannic acid. Tannins are widely distributed in plants, and are present naturally in small amounts in coffee and tea. Tannic acid has also been used by U.S. food processors as a clarifying agent in the brewing and wine industries and as a flavoring agent in such products as butter, caramel, fruit, brandy, maple, syrup, and nuts (National Academy of Sciences, 1965).</span></p><p data-dcnode-id="3855"><u data-dcnode-id="3857"><span data-dcnode-id="3858" instrument_node="">Experimental Evidence: Carcinogenicity</span></u><span data-dcnode-id="3856" instrument_node="">. The investigations of Korpássy showed that subcutaneous administration of tannic acid in doses of 150 to 200 mg/kg bw produced skin necrosis, ulcers, and hepatic tumors in rats (Korpássy, 1959, 1961; Korpássy and Mosonyi, 1950, 1951). No adequate studies have been conducted to test the carcinogenicity of orally administered tannins.</span></p><p data-dcnode-id="3853"><span data-dcnode-id="3854" instrument_node="">In mice, repeated subcutaneous injections of three condensed non-hydrolyzable tannins produced liver tumors and sarcomas (Kirby, 1960).</span></p><p data-dcnode-id="3837"><u data-dcnode-id="3851"><span data-dcnode-id="3852" instrument_node="">Experimental Evidence: Mutagenicity</span></u><span data-dcnode-id="3850" instrument_node="">. Tannic acid was found not to be genotoxic or mutagenic to </span><u data-dcnode-id="3848"><span data-dcnode-id="3849" instrument_node="">Saccharomyces</span></u><span data-dcnode-id="3847" instrument_node="">
</span><u data-dcnode-id="3845"><span data-dcnode-id="3846" instrument_node="">cerevisiae</span></u><span data-dcnode-id="3844" instrument_node=""> D4 and Ames </span><u data-dcnode-id="3842"><span data-dcnode-id="3843" instrument_node="">S</span></u><span data-dcnode-id="3841" instrument_node="">. </span><u data-dcnode-id="3839"><span data-dcnode-id="3840" instrument_node="">typhimurium</span></u><span data-dcnode-id="3838" instrument_node=""> strains with and without metabolic activation (Litton Bionetics, Inc., 1975). Tannins from various sources such as apple juice, grape juice, wine, and betel nuts were found to be strongly clastogenic for Chinese hamster ovary cells, but they lacked the capacity to induce mutations in the Ames test (Stich and Powrie, in press).</span></p></div><div data-dcnode-id="3805" id="ddd0000217"><h3 data-dcnode-id="3834"><span data-dcnode-id="3835" instrument_node="">Coumarin</span></h3><p data-dcnode-id="3829"><span data-dcnode-id="3833" instrument_node="">Coumarin is present in a number of plants, including tonka beans, cassia, and woodruff, and in their essential oils (International Agency for Research on </span><a aria-expanded="false" aria-haspopup="true" class="def" data-dcnode-id="3831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap371/ddd0000314/def-item/ggg00008/" role="button"><span data-dcnode-id="3832" instrument_node="">Cancer</span></a><span data-dcnode-id="3830" instrument_node="">, 1976).</span></p><p data-dcnode-id="3822"><u data-dcnode-id="3827"><span data-dcnode-id="3828" instrument_node="">Experimental Evidence: Carcinogenicity</span></u><span data-dcnode-id="3826" instrument_node="">. Coumarin (</span><u data-dcnode-id="3824"><span data-dcnode-id="3825" instrument_node="">o</span></u><span data-dcnode-id="3823" instrument_node="">-hydroxycinnamic acid-δ-lactone) has induced bile duct carcinomas in rats fed 0.35% to 0.5% of the compound in the diet for approximately 18 months.</span></p><p data-dcnode-id="3806"><u data-dcnode-id="3820"><span data-dcnode-id="3821" instrument_node="">Experimental Evidence: Mutagenicity</span></u><span data-dcnode-id="3819" instrument_node="">. Coumarin was negative in the </span><u data-dcnode-id="3817"><span data-dcnode-id="3818" instrument_node="">E</span></u><span data-dcnode-id="3816" instrument_node="">. </span><u data-dcnode-id="3814"><span data-dcnode-id="3815" instrument_node="">coli</span></u><span data-dcnode-id="3813" instrument_node=""> pol A assay (Rosenkranz and Leifer, 1981). It interferes with excision repair processes in ultraviolet-damaged DNA and with host cell reactivation of ultraviolet-irradiated phage T1 in </span><u data-dcnode-id="3811"><span data-dcnode-id="3812" instrument_node="">E</span></u><span data-dcnode-id="3810" instrument_node="">. </span><u data-dcnode-id="3808"><span data-dcnode-id="3809" instrument_node="">coli</span></u><span data-dcnode-id="3807" instrument_node=""> WP2 (Grigg, 1972).</span></p></div><div data-dcnode-id="3777" id="ddd0000218"><h3 data-dcnode-id="3803"><span data-dcnode-id="3804" instrument_node="">Parasorbic Acid</span></h3><p data-dcnode-id="3789"><span data-dcnode-id="3802" instrument_node="">Parasorbic acid occurs in concentrations ranging from 0.2 to 2 μg/g in the ripe berries of the Moravian mountain ash </span><u data-dcnode-id="3800"><span data-dcnode-id="3801" instrument_node="">Sorbus</span></u><span data-dcnode-id="3799" instrument_node="">
</span><u data-dcnode-id="3797"><span data-dcnode-id="3798" instrument_node="">aucuparia</span></u><span data-dcnode-id="3796" instrument_node=""> var. </span><u data-dcnode-id="3794"><span data-dcnode-id="3795" instrument_node="">edulis</span></u><span data-dcnode-id="3793" instrument_node="">. It has not been found in a number of common fruits (pears, apples, lemons, cranberries, grapes, oranges, or tomatoes) (International Agency for Research on </span><a aria-expanded="false" aria-haspopup="true" class="def" data-dcnode-id="3791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap371/ddd0000314/def-item/ggg00008/" role="button"><span data-dcnode-id="3792" instrument_node="">Cancer</span></a><span data-dcnode-id="3790" instrument_node="">, 1976).</span></p><p data-dcnode-id="3782"><u data-dcnode-id="3787"><span data-dcnode-id="3788" instrument_node="">Experimental Evidence: Carcinogenicity</span></u><span data-dcnode-id="3786" instrument_node="">. Sarcomas resulted within 2 years in rats that had received repeated subcutaneous injections of parasorbic acid in total doses of either 13 or 128 mg per animal (International Agency for Research on </span><a aria-expanded="false" aria-haspopup="true" class="def" data-dcnode-id="3784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap371/ddd0000314/def-item/ggg00008/" role="button"><span data-dcnode-id="3785" instrument_node="">Cancer</span></a><span data-dcnode-id="3783" instrument_node="">, 1976).</span></p><p data-dcnode-id="3778"><u data-dcnode-id="3780"><span data-dcnode-id="3781" instrument_node="">Experimental Evidence: Mutagenicity</span></u><span data-dcnode-id="3779" instrument_node="">. No studies concerning the mutagenicity of parasorbic acid could be identified.</span></p></div></div><div data-dcnode-id="3728" id="ddd0000219"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="3773"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="3774" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="3775" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="3771" id="_ddd0000219_"><span data-dcnode-id="3772" instrument_node="">METABOLITES OF ANIMAL ORIGIN</span></h2><div data-dcnode-id="3739" id="ddd0000220"><h3 data-dcnode-id="3769"><span data-dcnode-id="3770" instrument_node="">Tryptophan and Its Metabolites</span></h3><p data-dcnode-id="3753"><u data-dcnode-id="3767"><span data-dcnode-id="3768" instrument_node="">Experimental Evidence: Carcinogenicity</span></u><span data-dcnode-id="3766" instrument_node="">. Dogs fed high levels of tryptophan (7 g/day, i.e., 7 times the amount fed to controls) for long periods developed hyperplasia of the urinary bladder (Radomski </span><u data-dcnode-id="3764"><span data-dcnode-id="3765" instrument_node="">et</span></u><span data-dcnode-id="3763" instrument_node="">
</span><u data-dcnode-id="3761"><span data-dcnode-id="3762" instrument_node="">al</span></u><span data-dcnode-id="3760" instrument_node="">., 1971). When tryptophan was given to rats as 2% of the diet after subcarcinogenic doses of a nitrofuran, tryptophan exerted a promoting effect on the formation of tumors in the urinary bladder (Cohen </span><u data-dcnode-id="3758"><span data-dcnode-id="3759" instrument_node="">et</span></u><span data-dcnode-id="3757" instrument_node="">
</span><u data-dcnode-id="3755"><span data-dcnode-id="3756" instrument_node="">al</span></u><span data-dcnode-id="3754" instrument_node="">., 1979). In other studies, four metabolites of tryptophan (3-hydroxykynurenine, 3-hydroxyanthranilic acid, 2-amino-3-hydroxyacetophenone, and xanthurenic acid-8-methyl ether) each induced bladder tumors when implanted as pellets in the urinary bladders of mice (Clayson and Garner, 1976). However, attempts to relate the development of tumors in the urinary bladder of humans to abnormalities in the metabolism of tryptophan have not been definitive (Clayson and Garner, 1976).</span></p><p data-dcnode-id="3740"><u data-dcnode-id="3751"><span data-dcnode-id="3752" instrument_node="">Experimental Evidence: Mutagenicity</span></u><span data-dcnode-id="3750" instrument_node="">. Tryptophan and its metabolites were not mutagenic in the </span><u data-dcnode-id="3748"><span data-dcnode-id="3749" instrument_node="">Salmonella</span></u><span data-dcnode-id="3747" instrument_node="">/microsome assay (Bowden </span><u data-dcnode-id="3745"><span data-dcnode-id="3746" instrument_node="">et</span></u><span data-dcnode-id="3744" instrument_node="">
</span><u data-dcnode-id="3742"><span data-dcnode-id="3743" instrument_node="">al</span></u><span data-dcnode-id="3741" instrument_node="">., 1976).</span></p></div><div data-dcnode-id="3729" id="ddd0000221"><h3 data-dcnode-id="3737"><span data-dcnode-id="3738" instrument_node="">Hormones</span></h3><p data-dcnode-id="3730"><u data-dcnode-id="3735"><span data-dcnode-id="3736" instrument_node="">Experimental Evidence: Carcinogenicity</span></u><span data-dcnode-id="3734" instrument_node="">. A number of endogenous peptide and steroid hormones facilitate the development of tumors of the endocrine glands of laboratory animals (Clifton and Sridharan, 1975; Furth, 1975). However, because humans consume only very small amounts of hormones from the tissues of animals and because there is no indication that hormones from food sources are significant factors in the development of cancer in humans, they are not considered in this report. One exception is diethylstilbestrol (DES), which is discussed in </span><a data-dcnode-id="3732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap371/ddd0000247/"><span data-dcnode-id="3733" instrument_node="">Chapter 14</span></a><span data-dcnode-id="3731" instrument_node="">.</span></p></div></div><div data-dcnode-id="3689" id="ddd0000222"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="3725"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="3726" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="3727" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="3723" id="_ddd0000222_"><span data-dcnode-id="3724" instrument_node="">FERMENTATION PRODUCT</span></h2><div data-dcnode-id="3690" id="ddd0000223"><h3 data-dcnode-id="3721"><span data-dcnode-id="3722" instrument_node="">Ethyl Carbamate (Urethan)</span></h3><p data-dcnode-id="3713"><span data-dcnode-id="3720" instrument_node="">Ethyl carbamate, or urethan, is a fermentation product. The detection of low levels of ethyl carbamate in wines treated with the synthetic sterilant diethyl pyrocarbonate (Ehrenberg </span><u data-dcnode-id="3718"><span data-dcnode-id="3719" instrument_node="">et</span></u><span data-dcnode-id="3717" instrument_node="">
</span><u data-dcnode-id="3715"><span data-dcnode-id="3716" instrument_node="">al</span></u><span data-dcnode-id="3714" instrument_node="">., 1976) led to investigations into the natural occurrence of ethyl carbamate. These studies have demonstrated that naturally fermented foods and beverages (e.g., wines, bread, beers, and yogurt) contain detectable, but very low levels of ethyl carbamate, usually less than 5 μg/kg. The ethyl carbamate probably results from the reaction of ethanol and carbamoyl phosphate--both normal metabolic products in the yeast (Ough, 1976).</span></p><p data-dcnode-id="3706"><u data-dcnode-id="3711"><span data-dcnode-id="3712" instrument_node="">Experimental Evidence: Carcinogenicity</span></u><span data-dcnode-id="3710" instrument_node="">. For many years, ethyl carbamate has been studied as a synthetic carcinogen in the rat, mouse, and hamster. Its ability to induce tumors has been demonstrated by administering the compound during the prenatal and preweanling periods as well as to adult animals. Ethyl carbamate is active when administered orally, by inhalation, or by subcutaneous or intraperitoneal injection. The susceptible tissues include the lungs, lymphoid tissue, skin, liver, mammary gland, and Zymbal's gland. Most frequently, tumors are induced with doses ranging from 0.5 to 3 mg/g bw (International Agency for Research on </span><a aria-expanded="false" aria-haspopup="true" class="def" data-dcnode-id="3708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap371/ddd0000314/def-item/ggg00008/" role="button"><span data-dcnode-id="3709" instrument_node="">Cancer</span></a><span data-dcnode-id="3707" instrument_node="">, 1974; Mirvish, 1968). However, lung adenomas were induced in mice with a single dose of 0.01 mg/g bw (Nomura, 1975).</span></p><p data-dcnode-id="3704"><span data-dcnode-id="3705" instrument_node="">The significance of naturally occurring ethyl carbamate in foods in the development of human cancer is unknown, but the levels are very low in comparison to those used to induce tumors in laboratory animals (i.e., the consumption of 5 μg/day by a 70-kg person would provide an annual intake of approximately 0.05 μg/g bw).</span></p><p data-dcnode-id="3691"><u data-dcnode-id="3702"><span data-dcnode-id="3703" instrument_node="">Experimental Evidence: Mutagenicity</span></u><span data-dcnode-id="3701" instrument_node="">. Urethan was not mutagenic to Ames </span><u data-dcnode-id="3699"><span data-dcnode-id="3700" instrument_node="">Salmonella</span></u><span data-dcnode-id="3698" instrument_node=""> strains (Simmon, 1979) or in the host-mediated assay (Simmon </span><u data-dcnode-id="3696"><span data-dcnode-id="3697" instrument_node="">et</span></u><span data-dcnode-id="3695" instrument_node="">
</span><u data-dcnode-id="3693"><span data-dcnode-id="3694" instrument_node="">al</span></u><span data-dcnode-id="3692" instrument_node="">., 1979). However, it did induce transformations in hamster embryo cells (Pienta, 1981).</span></p></div></div><div data-dcnode-id="3322" id="ddd0000224"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="3686"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="3687" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="3688" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="3684" id="_ddd0000224_"><span data-dcnode-id="3685" instrument_node="">NITRATE, NITRITE, AND N-NITROSO COMPOUNDS</span></h2><p data-dcnode-id="3637"><span data-dcnode-id="3683" instrument_node="">Because many </span><u data-dcnode-id="3681"><span data-dcnode-id="3682" instrument_node="">N</span></u><span data-dcnode-id="3680" instrument_node="">-nitrosodialkylamines, </span><u data-dcnode-id="3678"><span data-dcnode-id="3679" instrument_node="">N</span></u><span data-dcnode-id="3677" instrument_node="">-nitrosoalkylamides, and </span><u data-dcnode-id="3675"><span data-dcnode-id="3676" instrument_node="">N</span></u><span data-dcnode-id="3674" instrument_node="">-nitrosoalkylimides are strong carcinogens under a variety of conditions and in many species (Magee and Barnes, 1967; Magee </span><u data-dcnode-id="3672"><span data-dcnode-id="3673" instrument_node="">et</span></u><span data-dcnode-id="3671" instrument_node="">
</span><u data-dcnode-id="3669"><span data-dcnode-id="3670" instrument_node="">al</span></u><span data-dcnode-id="3668" instrument_node="">., 1976) and because certain </span><u data-dcnode-id="3666"><span data-dcnode-id="3667" instrument_node="">N</span></u><span data-dcnode-id="3665" instrument_node="">-nitroso compounds have been detected in foods, in gastrointestinal contents, and in blood or urine (Fine </span><u data-dcnode-id="3663"><span data-dcnode-id="3664" instrument_node="">et</span></u><span data-dcnode-id="3662" instrument_node="">
</span><u data-dcnode-id="3660"><span data-dcnode-id="3661" instrument_node="">al</span></u><span data-dcnode-id="3659" instrument_node="">., 1977; Hicks </span><u data-dcnode-id="3657"><span data-dcnode-id="3658" instrument_node="">et</span></u><span data-dcnode-id="3656" instrument_node="">
</span><u data-dcnode-id="3654"><span data-dcnode-id="3655" instrument_node="">al</span></u><span data-dcnode-id="3653" instrument_node="">., 1977; Sen </span><u data-dcnode-id="3651"><span data-dcnode-id="3652" instrument_node="">et</span></u><span data-dcnode-id="3650" instrument_node="">
</span><u data-dcnode-id="3648"><span data-dcnode-id="3649" instrument_node="">al</span></u><span data-dcnode-id="3647" instrument_node="">., 1980; Spiegelhalder </span><u data-dcnode-id="3645"><span data-dcnode-id="3646" instrument_node="">et</span></u><span data-dcnode-id="3644" instrument_node="">
</span><u data-dcnode-id="3642"><span data-dcnode-id="3643" instrument_node="">al</span></u><span data-dcnode-id="3641" instrument_node="">., 1980; Stephany and Schuller, 1980), there has been much concern during the past 10 to 15 years about the role of </span><u data-dcnode-id="3639"><span data-dcnode-id="3640" instrument_node="">N</span></u><span data-dcnode-id="3638" instrument_node="">-nitroso compounds in the etiology of human cancer.</span></p><p data-dcnode-id="3629"><span data-dcnode-id="3636" instrument_node="">In recent years, a number of observations have also led to concern about potential risks to human health resulting from the use of nitrate and nitrite as preservatives in meats and other cured products. Nitrate can be reduced to nitrite, which can interact with dietary substrates such as amines or amides to produce </span><u data-dcnode-id="3634"><span data-dcnode-id="3635" instrument_node="">N</span></u><span data-dcnode-id="3633" instrument_node="">-nitroso compounds. Because the health effects of nitrate, nitrite, and </span><u data-dcnode-id="3631"><span data-dcnode-id="3632" instrument_node="">N</span></u><span data-dcnode-id="3630" instrument_node="">-nitroso compounds have been reviewed in depth by the Committee on Nitrite and Alternative Curing Agents in Food (National Academy of Sciences, 1981), only a brief summary is presented in this section.</span></p><p data-dcnode-id="3627"><span data-dcnode-id="3628" instrument_node="">Nitrate and nitrite are widely distributed in foods in varying concentrations, depending on a number of factors such as agricultural practices and storage conditions. It is difficult to estimate with any precision the exposure of humans to these ions because of differing lifestyles and dietary habits and the limitations in analytical techniques for measuring them and in the methods for determining food consumption. The Committee on Nitrite and Alternative Curing Agents in Food estimated that the average U.S. diet provides approximately 75 mg of nitrate and 0.8 mg of nitrite daily (National Academy of Sciences, 1981). Vegetables contribute most of the nitrate ingested. Other dietary sources include nitrate-rich drinking water and fruit juices. More than one-third of the average daily intake of nitrite is contributed by the ingestion of cured meats, approximately one-third by baked goods and cereals, and less than one-fifth by vegetables.</span></p><p data-dcnode-id="3610"><span data-dcnode-id="3626" instrument_node="">Two additional factors must be considered when determining exposure to nitrate and nitrite: Vegetables contain both inhibitors (e.g., ascorbic acid) and catalysts (e.g., phenols) of nitrosation reactions. These modifiers tend to affect the extent of </span><u data-dcnode-id="3624"><span data-dcnode-id="3625" instrument_node="">in</span></u><span data-dcnode-id="3623" instrument_node="">
</span><u data-dcnode-id="3621"><span data-dcnode-id="3622" instrument_node="">vivo</span></u><span data-dcnode-id="3620" instrument_node=""> nitrosation and, thus, the synthesis of </span><u data-dcnode-id="3618"><span data-dcnode-id="3619" instrument_node="">N</span></u><span data-dcnode-id="3617" instrument_node="">-nitroso compounds. Evidence indicates that </span><u data-dcnode-id="3615"><span data-dcnode-id="3616" instrument_node="">in</span></u><span data-dcnode-id="3614" instrument_node="">
</span><u data-dcnode-id="3612"><span data-dcnode-id="3613" instrument_node="">vivo</span></u><span data-dcnode-id="3611" instrument_node=""> nitrosation occurs when amines and/or amides and nitrate and/ or nitrite are ingested simultaneously (National Academy of Sciences, 1981). The key factors that determine the extent of these reactions in the stomach are the gastric pH; the concentrations of the nitrate and/or nitrite and the nitrosatable amines and/or amides; the rates of nitrosation of the substrate; and types and amounts of nitrosation modifiers in the stomach.</span></p><p data-dcnode-id="3596"><span data-dcnode-id="3609" instrument_node="">Humans may also be exposed to preformed nitrosamines that occur as contaminants in some foods, chiefly in nitrate- or nitrite-treated products (Gough </span><u data-dcnode-id="3607"><span data-dcnode-id="3608" instrument_node="">et</span></u><span data-dcnode-id="3606" instrument_node="">
</span><u data-dcnode-id="3604"><span data-dcnode-id="3605" instrument_node="">al</span></u><span data-dcnode-id="3603" instrument_node="">., 1978; Spiegelhalder </span><u data-dcnode-id="3601"><span data-dcnode-id="3602" instrument_node="">et</span></u><span data-dcnode-id="3600" instrument_node="">
</span><u data-dcnode-id="3598"><span data-dcnode-id="3599" instrument_node="">al</span></u><span data-dcnode-id="3597" instrument_node="">., 1980; Stephany and Schuller, 1980). The largest single dietary source of nitrosamines was beer until recently, when maltsters reduced the concentrations by modifying the malting processes. The most important sources of nitrosamines in the diet are now cured meat products, especially bacon, which contributes approximately 0.17 μg of nitrosopyrrolidine per person daily. In the United States, the intake of nitrosamines from all dietary sources, including beer, is estimated to be approximately 1.1 μg/day.</span></p><p data-dcnode-id="3594"><span data-dcnode-id="3595" instrument_node="">Nitrate can be converted to nitrite by bacterial reduction in the saliva. Roughly 25% of ingested nitrate is recirculated into saliva, and approximately 20% of salivary nitrate is reduced to nitrite (National Academy of Sciences, 1981).</span></p><p data-dcnode-id="3562"><span data-dcnode-id="3593" instrument_node="">The formation of nitrate by bacteria in the large intestine (heterotrophic nitrification) has been postulated as one mechanism to account for differences in ingestion and urinary excretion of nitrate by humans (Tannenbaum </span><u data-dcnode-id="3591"><span data-dcnode-id="3592" instrument_node="">et</span></u><span data-dcnode-id="3590" instrument_node="">
</span><u data-dcnode-id="3588"><span data-dcnode-id="3589" instrument_node="">al</span></u><span data-dcnode-id="3587" instrument_node="">., 1978). However, these conclusions appear to be erroneous since studies in germfree rodents indicate that such reactions are not important (Green </span><u data-dcnode-id="3585"><span data-dcnode-id="3586" instrument_node="">et</span></u><span data-dcnode-id="3584" instrument_node="">
</span><u data-dcnode-id="3582"><span data-dcnode-id="3583" instrument_node="">al</span></u><span data-dcnode-id="3581" instrument_node="">., 1981). Moreover, the nitrate content of ingested food, water, and air may have been underestimated in the earlier studies. Recent studies suggest that mammalian tissues synthesize nitrate and that this may partially explain excess urinary nitrate excretion (Green </span><u data-dcnode-id="3579"><span data-dcnode-id="3580" instrument_node="">et</span></u><span data-dcnode-id="3578" instrument_node="">
</span><u data-dcnode-id="3576"><span data-dcnode-id="3577" instrument_node="">al</span></u><span data-dcnode-id="3575" instrument_node="">., 1981; Parks </span><u data-dcnode-id="3573"><span data-dcnode-id="3574" instrument_node="">et</span></u><span data-dcnode-id="3572" instrument_node="">
</span><u data-dcnode-id="3570"><span data-dcnode-id="3571" instrument_node="">al</span></u><span data-dcnode-id="3569" instrument_node="">., 1981). However, the amount of nitrate produced endogenously appears to be less than that suggested in earlier studies by Tannenbaum </span><u data-dcnode-id="3567"><span data-dcnode-id="3568" instrument_node="">et</span></u><span data-dcnode-id="3566" instrument_node="">
</span><u data-dcnode-id="3564"><span data-dcnode-id="3565" instrument_node="">al</span></u><span data-dcnode-id="3563" instrument_node="">. (1978).</span></p><p data-dcnode-id="3545"><span data-dcnode-id="3561" instrument_node="">The formation of </span><u data-dcnode-id="3559"><span data-dcnode-id="3560" instrument_node="">N</span></u><span data-dcnode-id="3558" instrument_node="">-nitroso compounds </span><u data-dcnode-id="3556"><span data-dcnode-id="3557" instrument_node="">in</span></u><span data-dcnode-id="3555" instrument_node="">
</span><u data-dcnode-id="3553"><span data-dcnode-id="3554" instrument_node="">vivo</span></u><span data-dcnode-id="3552" instrument_node=""> has been well documented in laboratory animals (Mirvish </span><u data-dcnode-id="3550"><span data-dcnode-id="3551" instrument_node="">et</span></u><span data-dcnode-id="3549" instrument_node="">
</span><u data-dcnode-id="3547"><span data-dcnode-id="3548" instrument_node="">al</span></u><span data-dcnode-id="3546" instrument_node="">., 1980). In humans, the evidence is sparse. However, one recent study provides direct evidence that nitrosamines are synthesized in humans following the ingestion of an amine (proline) and nitrate (Ohshima and Bartsch, 1981). In that experiment, the ingestion of a large excess of ascorbic acid or α-tocopherol effectively reduced the endogenous formation of nitrosamines.</span></p><div data-dcnode-id="3478" id="ddd0000225"><h3 data-dcnode-id="3543"><span data-dcnode-id="3544" instrument_node="">Epidemiological Evidence</span></h3><p data-dcnode-id="3517"><span data-dcnode-id="3542" instrument_node="">Studies conducted in Colombia, Chile, Japan, Iran, China, England, and the United States (Hawaii) have indicated that there is an association between increased incidence of cancers of the stomach and the esophagus and exposures to high levels of nitrate or nitrite in the diet or drinking water. (See, for example, Armijo and Coulson, 1975; Armijo </span><u data-dcnode-id="3540"><span data-dcnode-id="3541" instrument_node="">et</span></u><span data-dcnode-id="3539" instrument_node="">
</span><u data-dcnode-id="3537"><span data-dcnode-id="3538" instrument_node="">al</span></u><span data-dcnode-id="3536" instrument_node="">., 1981; Correa </span><u data-dcnode-id="3534"><span data-dcnode-id="3535" instrument_node="">et</span></u><span data-dcnode-id="3533" instrument_node="">
</span><u data-dcnode-id="3531"><span data-dcnode-id="3532" instrument_node="">al</span></u><span data-dcnode-id="3530" instrument_node="">., 1975; Cuello </span><u data-dcnode-id="3528"><span data-dcnode-id="3529" instrument_node="">et</span></u><span data-dcnode-id="3527" instrument_node="">
</span><u data-dcnode-id="3525"><span data-dcnode-id="3526" instrument_node="">al</span></u><span data-dcnode-id="3524" instrument_node="">., 1976; Haenszel </span><u data-dcnode-id="3522"><span data-dcnode-id="3523" instrument_node="">et</span></u><span data-dcnode-id="3521" instrument_node="">
</span><u data-dcnode-id="3519"><span data-dcnode-id="3520" instrument_node="">al</span></u><span data-dcnode-id="3518" instrument_node="">., 1972; Higginson, 1966; Meinsma, 1964).</span></p><p data-dcnode-id="3512"><span data-dcnode-id="3516" instrument_node="">Exposures to nitrate, nitrite, or </span><u data-dcnode-id="3514"><span data-dcnode-id="3515" instrument_node="">N</span></u><span data-dcnode-id="3513" instrument_node="">-nitroso compounds were not directly measured in these epidemiological studies. The associations with cancer were based either on correlations of high risk population groups with corresponding exposures in food and water supplies, or on comparisons of the frequency of consumption of foods containing these substances (plus secondary amines) by gastric cancer patients and by controls.</span></p><p data-dcnode-id="3486"><span data-dcnode-id="3511" instrument_node="">Bladder cancer has been correlated with nitrate in the water supply or with urinary tract infections in some epidemiological studies (Howe </span><u data-dcnode-id="3509"><span data-dcnode-id="3510" instrument_node="">et</span></u><span data-dcnode-id="3508" instrument_node="">
</span><u data-dcnode-id="3506"><span data-dcnode-id="3507" instrument_node="">al</span></u><span data-dcnode-id="3505" instrument_node="">., 1980; Wynder </span><u data-dcnode-id="3503"><span data-dcnode-id="3504" instrument_node="">et</span></u><span data-dcnode-id="3502" instrument_node="">
</span><u data-dcnode-id="3500"><span data-dcnode-id="3501" instrument_node="">al</span></u><span data-dcnode-id="3499" instrument_node="">., 1963). However, Howe </span><u data-dcnode-id="3497"><span data-dcnode-id="3498" instrument_node="">et</span></u><span data-dcnode-id="3496" instrument_node="">
</span><u data-dcnode-id="3494"><span data-dcnode-id="3495" instrument_node="">al</span></u><span data-dcnode-id="3493" instrument_node="">. (1980) reported that there was no difference between cases and controls in consumption of nitrite-preserved meats, such as hams and sausages. Nevertheless, it is of interest that nitrosamines, which are presumably formed from dietary precursors, have been found in the urine of patients with urinary tract infections and could presumably be carcinogenic in the bladder (Hicks </span><u data-dcnode-id="3491"><span data-dcnode-id="3492" instrument_node="">et</span></u><span data-dcnode-id="3490" instrument_node="">
</span><u data-dcnode-id="3488"><span data-dcnode-id="3489" instrument_node="">al</span></u><span data-dcnode-id="3487" instrument_node="">., 1977; Radomski et al., 1978).</span></p><p data-dcnode-id="3484"><span data-dcnode-id="3485" instrument_node="">The Committee on Nitrite and Alternative Curing Agents in Food concluded that these reports do not provide conclusive evidence of a causal relationship, and that alternative explanations for the findings have not been ruled out (National Academy of Sciences, 1981).</span></p><p data-dcnode-id="3479"><span data-dcnode-id="3483" instrument_node="">Studies of occupational exposure have not contributed significant information on possible associations between </span><u data-dcnode-id="3481"><span data-dcnode-id="3482" instrument_node="">N</span></u><span data-dcnode-id="3480" instrument_node="">-nitroso compounds and cancer risk.</span></p></div><div data-dcnode-id="3368" id="ddd0000226"><h3 data-dcnode-id="3476"><span data-dcnode-id="3477" instrument_node="">Experimental Evidence: Carcinogenicity</span></h3><p data-dcnode-id="3462"><span data-dcnode-id="3475" instrument_node="">The data on the carcinogenicity of nitrate and nitrite in animals are not definitive. The few experiments conducted in animals have provided no evidence that nitrate is carcinogenic (Greenblatt and Mirvish, 1973; Lijinsky </span><u data-dcnode-id="3473"><span data-dcnode-id="3474" instrument_node="">et</span></u><span data-dcnode-id="3472" instrument_node="">
</span><u data-dcnode-id="3470"><span data-dcnode-id="3471" instrument_node="">al</span></u><span data-dcnode-id="3469" instrument_node="">., 1973; Sugiyama </span><u data-dcnode-id="3467"><span data-dcnode-id="3468" instrument_node="">et</span></u><span data-dcnode-id="3466" instrument_node="">
</span><u data-dcnode-id="3464"><span data-dcnode-id="3465" instrument_node="">al</span></u><span data-dcnode-id="3463" instrument_node="">., 1979).</span></p><p data-dcnode-id="3442"><span data-dcnode-id="3461" instrument_node="">There have been very few adequate studies to test the carcinogenicity of nitrite. Most of the information is derived from data on tumor incidence in experiments that were designed primarily to study nitrosation in animals given nitrite and amine simultaneously. These data were compared with data on control animals given nitrite alone (usually in drinking water). Because the control animals were usually sacrificed after a few months, there may not have been sufficient time for tumors to develop (Aoyagi </span><u data-dcnode-id="3459"><span data-dcnode-id="3460" instrument_node="">et</span></u><span data-dcnode-id="3458" instrument_node="">
</span><u data-dcnode-id="3456"><span data-dcnode-id="3457" instrument_node="">al</span></u><span data-dcnode-id="3455" instrument_node="">., 1980; Inai </span><u data-dcnode-id="3453"><span data-dcnode-id="3454" instrument_node="">et</span></u><span data-dcnode-id="3452" instrument_node="">
</span><u data-dcnode-id="3450"><span data-dcnode-id="3451" instrument_node="">al</span></u><span data-dcnode-id="3449" instrument_node="">., 1979; Mirvish </span><u data-dcnode-id="3447"><span data-dcnode-id="3448" instrument_node="">et</span></u><span data-dcnode-id="3446" instrument_node="">
</span><u data-dcnode-id="3444"><span data-dcnode-id="3445" instrument_node="">al</span></u><span data-dcnode-id="3443" instrument_node="">., 1980; Shank and Newberne, 1976).</span></p><p data-dcnode-id="3440"><span data-dcnode-id="3441" instrument_node="">In a larger lifetime study conducted for the U.S. Food and Drug Administration, Newberne (1978, 1979) fed various doses of nitrite to groups of approximately 68 male and 68 female Sprague-Dawley rats under a variety of conditions. In comparison to the controls, the treated rats had not only a higher incidence of malignant tumors of the lymphatic system, but also a higher incidence of alterations (immunoblastic cell proliferation) in the spleen and, occasionally, in the lymph nodes of the treated groups (Newberne, 1979). These results were interpreted by the author to indicate that nitrite may be an enhancer or promoter of carcinogenesis in rats. However, a Joint Committee of Experts, which was established to review the study, diagnosed fewer lymphomas than those reported by Newberne (U.S. Food and Drug Administration, 1980a). The discrepancy between the two diagnoses involved the differentiation of lymphomas from extramedullary hematopoiesis, plasmacytosis, or histiocytic sarcoma. Furthermore, the Joint Committee was unable to confirm the diagnosis of immunoblastic hyperplasia.</span></p><p data-dcnode-id="3426"><span data-dcnode-id="3439" instrument_node="">In addition, the Committee on Nitrite and Alternative Curing Agents in Food reviewed 21 reports in which the carcinogenicity of nitrite was examined (National Academy of Sciences, 1981). The committee concluded that three of the 21 reports were too brief to evaluate adequately. Of the remaining 18 studies, 9 were conducted in rats, 8 in mice, and 1 in guinea pigs. The experimental design was inadequate in many cases, and varied greatly with regard to the end points for carcinogenicity. However, none of the remaining 18 studies provided sufficient evidence that nitrite was carcinogenic (see, for example, Greenblatt </span><u data-dcnode-id="3437"><span data-dcnode-id="3438" instrument_node="">et</span></u><span data-dcnode-id="3436" instrument_node="">
</span><u data-dcnode-id="3434"><span data-dcnode-id="3435" instrument_node="">al</span></u><span data-dcnode-id="3433" instrument_node="">., 1973; Lijinsky </span><u data-dcnode-id="3431"><span data-dcnode-id="3432" instrument_node="">et</span></u><span data-dcnode-id="3430" instrument_node="">
</span><u data-dcnode-id="3428"><span data-dcnode-id="3429" instrument_node="">al</span></u><span data-dcnode-id="3427" instrument_node="">., 1980).</span></p><p data-dcnode-id="3421"><span data-dcnode-id="3425" instrument_node="">The absence of evidence that nitrite is a direct carcinogen does not diminish the possibility that it can interact with specific components of diets consumed by humans and animals or with endogenous metabolites to produce </span><u data-dcnode-id="3423"><span data-dcnode-id="3424" instrument_node="">N</span></u><span data-dcnode-id="3422" instrument_node="">-nitroso compounds that induce cancer.</span></p><p data-dcnode-id="3393"><u data-dcnode-id="3419"><span data-dcnode-id="3420" instrument_node="">N</span></u><span data-dcnode-id="3418" instrument_node="">-Nitroso compounds have been studied extensively to determine their carcinogenic effects. Druckrey and his colleagues (1967) reported tests in rats exposed to 65 </span><u data-dcnode-id="3416"><span data-dcnode-id="3417" instrument_node="">N</span></u><span data-dcnode-id="3415" instrument_node="">-nitroso compounds, most of which were potent carcinogens. Lijinsky and Reuber (1981) examined many other </span><u data-dcnode-id="3413"><span data-dcnode-id="3414" instrument_node="">N</span></u><span data-dcnode-id="3412" instrument_node="">-nitroso compounds for their carcinogenic potential, mainly in rats. Approximately 300 different </span><u data-dcnode-id="3410"><span data-dcnode-id="3411" instrument_node="">N</span></u><span data-dcnode-id="3409" instrument_node="">-nitroso compounds have been tested, and a majority of them have been shown to induce cancer in various tissues of one or more species of laboratory animals when administered by any of several routes (Preussmann and Steward, personal communication, 1981). In addition to both nitrosodimethylamine and nitrosodiethylamine, a number of other </span><u data-dcnode-id="3407"><span data-dcnode-id="3408" instrument_node="">N</span></u><span data-dcnode-id="3406" instrument_node="">-nitroso compounds detected in the environment are carcinogenic in animals (see, for example, Druckrey </span><u data-dcnode-id="3404"><span data-dcnode-id="3405" instrument_node="">et</span></u><span data-dcnode-id="3403" instrument_node="">
</span><u data-dcnode-id="3401"><span data-dcnode-id="3402" instrument_node="">al</span></u><span data-dcnode-id="3400" instrument_node="">., 1967; Preussmann </span><u data-dcnode-id="3398"><span data-dcnode-id="3399" instrument_node="">et</span></u><span data-dcnode-id="3397" instrument_node="">
</span><u data-dcnode-id="3395"><span data-dcnode-id="3396" instrument_node="">al</span></u><span data-dcnode-id="3394" instrument_node="">., 1981).</span></p><p data-dcnode-id="3385"><span data-dcnode-id="3392" instrument_node="">The carcinogenic action of several </span><u data-dcnode-id="3390"><span data-dcnode-id="3391" instrument_node="">N</span></u><span data-dcnode-id="3389" instrument_node="">-nitroso compounds can be inhibited in systems where the formation of </span><u data-dcnode-id="3387"><span data-dcnode-id="3388" instrument_node="">N</span></u><span data-dcnode-id="3386" instrument_node="">-nitroso compounds has been prevented (Mirvish, 1981). Nitrosation is inhibited when ascorbic acid and a variety of other agents compete with the nitrosatable agent for the available nitrite in the acidic conditions of the stomach. A number of other agents that interact readily with nitrite can inhibit nitrosation. Among these are other isomers of ascorbic acid, sorbic acid, some phenols, and α-tocopherol. Most of these interactions have been observed at the chemical rather than at the biological level.</span></p><p data-dcnode-id="3374"><span data-dcnode-id="3384" instrument_node="">Formation of </span><u data-dcnode-id="3382"><span data-dcnode-id="3383" instrument_node="">N</span></u><span data-dcnode-id="3381" instrument_node="">-nitroso compounds can also be enhanced since a variety of ions, especially thiocyanate and iodide, may catalyze the nitrosation reaction in the stomach (Mirvish </span><u data-dcnode-id="3379"><span data-dcnode-id="3380" instrument_node="">et</span></u><span data-dcnode-id="3378" instrument_node="">
</span><u data-dcnode-id="3376"><span data-dcnode-id="3377" instrument_node="">al</span></u><span data-dcnode-id="3375" instrument_node="">., 1975). Since these ions are present in foodstuffs, these catalysts could be important in determining the outcome.</span></p><p data-dcnode-id="3369"><span data-dcnode-id="3373" instrument_node="">The additive or synergistic effects of </span><u data-dcnode-id="3371"><span data-dcnode-id="3372" instrument_node="">N</span></u><span data-dcnode-id="3370" instrument_node="">-nitroso compounds on other carcinogens with similar organotropy has been emphasized by Schmähl (1980).</span></p></div><div data-dcnode-id="3352" id="ddd0000227"><h3 data-dcnode-id="3366"><span data-dcnode-id="3367" instrument_node="">Experimental Evidence: Mutagenicity</span></h3><p data-dcnode-id="3361"><span data-dcnode-id="3365" instrument_node="">Nitrate does not appear to be directly mutagenic (Konetzka, 1974). In microbial systems, nitrite may be mutagenic by three different mechanisms (Zimmerman, 1977): deamination of DNA bases in single-stranded DNA; formation of 2-nitroinosine, intrastrand, or interstrand lesions leading to helix distortions in double-stranded DNA; and formation of mutagenic </span><u data-dcnode-id="3363"><span data-dcnode-id="3364" instrument_node="">N</span></u><span data-dcnode-id="3362" instrument_node="">-nitroso compounds by combination with nitrosatable substrates. Except for the results of one study in which a high dose of nitrite was used, there is no evidence that nitrite is mutagenic in mammalian systems.</span></p><p data-dcnode-id="3353"><span data-dcnode-id="3360" instrument_node="">Many </span><u data-dcnode-id="3358"><span data-dcnode-id="3359" instrument_node="">N</span></u><span data-dcnode-id="3357" instrument_node="">-nitroso compounds have been found to be mutagenic in a variety of test systems, including bacterial tests and </span><u data-dcnode-id="3355"><span data-dcnode-id="3356" instrument_node="">Drosophila</span></u><span data-dcnode-id="3354" instrument_node="">, and under a variety of conditions (Montesano and Bartsch, 1976).</span></p></div><div data-dcnode-id="3323" id="ddd0000228"><h3 data-dcnode-id="3350"><span data-dcnode-id="3351" instrument_node="">Summary and Conclusions: Nitrate, Nitrite, and N-Nitroso Compounds</span></h3><p data-dcnode-id="3345"><span data-dcnode-id="3349" instrument_node="">Epidemiological evidence suggesting that nitrate, nitrite, and </span><u data-dcnode-id="3347"><span data-dcnode-id="3348" instrument_node="">N </span></u><span data-dcnode-id="3346" instrument_node="">-nitroso compounds play a role in the development of cancer in humans is largely circumstantial. However, the findings from several epidemiological studies of certain geographical/nationality groups are consistent with the hypothesis that exposure of humans to high levels of nitrate and/or nitrite may be associated with an increased incidence of cancers of the stomach and esophagus. In these studies, the level, duration, and time of exposure were not studied in relation to cancer incidence, and exposure to other known or suspected carcinogens was not excluded.</span></p><p data-dcnode-id="3337"><span data-dcnode-id="3344" instrument_node="">In animals, nitrate has not been shown to be carcinogenic or mutagenic </span><u data-dcnode-id="3342"><span data-dcnode-id="3343" instrument_node="">per</span></u><span data-dcnode-id="3341" instrument_node="">
</span><u data-dcnode-id="3339"><span data-dcnode-id="3340" instrument_node="">se</span></u><span data-dcnode-id="3338" instrument_node="">. The data on nitrite, which has been tested more extensively than nitrate, indicate that nitrite is probably not carcinogenic but that it is mutagenic, at least in microbial systems.</span></p><p data-dcnode-id="3329"><span data-dcnode-id="3336" instrument_node="">As a group, the </span><u data-dcnode-id="3334"><span data-dcnode-id="3335" instrument_node="">N</span></u><span data-dcnode-id="3333" instrument_node="">-nitroso compounds are clearly carcinogenic in numerous species of animals in which they have been tested. Positive results have been obtained for nearly all of the approximately 300 </span><u data-dcnode-id="3331"><span data-dcnode-id="3332" instrument_node="">N</span></u><span data-dcnode-id="3330" instrument_node="">-nitroso compounds tested for carcinogenicity in one or more species. Many of these compounds are also mutagenic.</span></p><p data-dcnode-id="3324"><span data-dcnode-id="3328" instrument_node="">The Committee on Nitrite and Alternative Curing Agents in Food recommended that exposure to nitrate, nitrite, and </span><u data-dcnode-id="3326"><span data-dcnode-id="3327" instrument_node="">N</span></u><span data-dcnode-id="3325" instrument_node="">-nitroso compounds should be reduced (National Academy of Sciences, 1981).</span></p></div></div><div data-dcnode-id="3284" id="ddd0000229"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="3319"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="3320" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="3321" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="3317" id="_ddd0000229_"><span data-dcnode-id="3318" instrument_node="">SUMMARY AND CONCLUSIONS</span></h2><p data-dcnode-id="3315"><span data-dcnode-id="3316" instrument_node="">This chapter contains an assessment of the carcinogenicity and mutagenicity of some naturally occurring substances, mainly mycotoxins and compounds of plant origin.</span></p><p data-dcnode-id="3313"><span data-dcnode-id="3314" instrument_node="">Aflatoxin, a mycotoxin that occurs in grains and other food commodities, is carcinogenic in several species of animals, including mice, rats, trout, ducks, and monkeys, and there is evidence of a dose response. In addition, it has been shown to be mutagenic in bacterial and mammalian systems. Several other mycotoxins that are found in food are carcinogenic and/or mutagenic in laboratory tests. However, with the exception of aflatoxin, which has been implicated in liver cancer in some parts of the world, there is no epidemiological evidence concerning other mycotoxins and neoplasia in humans.</span></p><p data-dcnode-id="3299"><span data-dcnode-id="3312" instrument_node="">Hydrazine derivatives of two mushrooms--</span><u data-dcnode-id="3310"><span data-dcnode-id="3311" instrument_node="">Agaricus</span></u><span data-dcnode-id="3309" instrument_node="">
</span><u data-dcnode-id="3307"><span data-dcnode-id="3308" instrument_node="">bisporus</span></u><span data-dcnode-id="3306" instrument_node=""> and </span><u data-dcnode-id="3304"><span data-dcnode-id="3305" instrument_node="">Gyromitra</span></u><span data-dcnode-id="3303" instrument_node="">
</span><u data-dcnode-id="3301"><span data-dcnode-id="3302" instrument_node="">esculenta</span></u><span data-dcnode-id="3300" instrument_node="">--both of which are consumed throughout the world, appear to be carcinogenic in mice and, under certain conditions, in hamsters, and are mutagenic in bacteria. However, the significance of these findings for risk to humans cannot be determined since there are no epidemiological data.</span></p><p data-dcnode-id="3297"><span data-dcnode-id="3298" instrument_node="">Several pyrrolizidine alkaloids, e.g., monocrotaline, are carcinogenic in animals and/or mutagenic in several test systems. Tumors develop in rats fed plants such as coltsfoot, which contain these alkaloids. Cycad nuts, which are eaten in some parts of the world, contain cycasin (methylazoxymethanol-β-glucoside), a compound known to be carcinogenic in animals. It is also mutagenic in the Ames test after addition of β-glucosidase. However, no evidence has been presented for the carcinogenicity of pyrrolizidine alkaloids and cycasin in humans, although there is unsubstantiated speculation that they may be involved in the development of neoplasia in humans.</span></p><p data-dcnode-id="3295"><span data-dcnode-id="3296" instrument_node="">Other plant constituents, such as methylxanthines, thiourea, tannins, coumarin, parasorbic acid, safrole, estragole, and eugenol, and plant estrogens, such as zearalenone, are carcinogenic in laboratory animals and/or mutagenic in bacterial or mammalian cell systems. However, the significance of these findings for human health is not known since there are no data from studies in humans.</span></p><p data-dcnode-id="3290"><span data-dcnode-id="3294" instrument_node="">Nitrosamines--compounds derived from the reaction of nitrite with amines--are carcinogenic in numerous species of laboratory animals and mutagenic in several experimental systems. Nitrate appears to be neither carcinogenic nor mutagenic, whereas nitrite is probably not directly carcinogenic, but it is mutagenic in microbial systems. There is some inconclusive epidemiological evidence that nitrate, nitrite, and </span><u data-dcnode-id="3292"><span data-dcnode-id="3293" instrument_node="">N</span></u><span data-dcnode-id="3291" instrument_node="">-nitroso compounds play a role in the development of gastric and esophageal cancer.</span></p><p data-dcnode-id="3285"><span data-dcnode-id="3289" instrument_node="">Many of the naturally occurring substances discussed in this chapter have been found to be carcinogenic in laboratory animals and/ or mutagenic in bacterial and other systems, thereby posing a potential risk of cancer in humans. However, there have been no pertinent epidemiological studies concerning their impact on humans except for those on aflatoxins and those on nitrate, nitrite, and </span><u data-dcnode-id="3287"><span data-dcnode-id="3288" instrument_node="">N</span></u><span data-dcnode-id="3286" instrument_node="">-nitroso compounds. The compounds thus far shown to be carcinogenic in animals have been reported to occur in the average U.S. diet in small amounts; however, there is no evidence that any of these substances individually makes a major contribution to the total risk of cancer in the United States. This lack of sufficient data should not be interpreted as an indication that these or other compounds subsequently found to be carcinogenic do not present a hazard. Further investigations are necessary. Efforts should be made to minimize or avoid the exposure of humans to compounds that are carcinogenic or mutagenic in experimental systems.</span></p></div><div data-dcnode-id="605" id="ddd0000230"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="3281"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="3282" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="3283" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="3279" id="_ddd0000230_"><span data-dcnode-id="3280" instrument_node="">REFERENCES</span></h2><ul class="simple-list" data-dcnode-id="606"><li class="half_rhythm" data-dcnode-id="3263"><div class="bk_ref" data-dcnode-id="3264" id="rrr00742"><span data-dcnode-id="3278" instrument_node="">Adamson, R. H., P. Correa, and D. W. Dalgard. 1973. </span><span class="ref-title" data-dcnode-id="3274"><span data-dcnode-id="3277" instrument_node="">Occurrence of a primary liver carcinoma in a rhesus monkey fed aflatoxin B</span><sub data-dcnode-id="3275"><span data-dcnode-id="3276" instrument_node="">1</span></sub></span><span data-dcnode-id="3273" instrument_node="">. </span><span class="ref-journal" data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node="">J. Natl. Cancer Inst.</span></span><span data-dcnode-id="3270" instrument_node="">
