</span><meta content="INDEX,NOFOLLOW,NOARCHIVE,NOIMAGEINDEX" data-dcnode-id="5424" name="robots"><meta content="Diet, Nutrition, and Cancer" data-dcnode-id="5423" name="citation_inbook_title"><meta content="12 Naturally Occurring Carcinogens" data-dcnode-id="5422" name="citation_title"><meta content="National Academies Press (US)" data-dcnode-id="5421" name="citation_publisher"><meta content="1982" data-dcnode-id="5420" name="citation_date"><meta content="National Research Council (US) Committee on Diet, Nutrition, and Cancer" data-dcnode-id="5419" name="citation_author"><meta content="https://www.ncbi.nlm.nih.gov/books/NBK216657/" data-dcnode-id="5418" name="citation_fulltext_html_url"><link data-dcnode-id="5417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//purl.org/DC/elements/1.0/&amp;raw" rel="schema.DC"><meta content="12 Naturally Occurring Carcinogens" data-dcnode-id="5416" name="DC.Title"><meta content="Text" data-dcnode-id="5415" name="DC.Type"><meta content="National Academies Press (US)" data-dcnode-id="5414" name="DC.Publisher"><meta content="National Research Council (US) Committee on Diet, Nutrition, and Cancer" data-dcnode-id="5413" name="DC.Contributor"><meta content="1982" data-dcnode-id="5412" name="DC.Date"><meta content="https://www.ncbi.nlm.nih.gov/books/NBK216657/" data-dcnode-id="5411" name="DC.Identifier"><meta content="en" data-dcnode-id="5410" name="DC.Language"><meta content="The production of toxic compounds by living cells has long been recognized. Some of these chemicals, especially those produced by microbes and plant cells, have carcinogenic activity. Although some of these compounds are integral components of foods that are relatively common in the diet of humans, many of them have been found either in unusual food sources or in foods contaminated by microorganisms or unwanted plant materials. The potential hazards to human health posed by these components or contaminants of foods range from slight to very great. For example, very low levels of exposure to chemicals with relatively weak carcinogenic activity in laboratory animals may pose little risk to human populations. On the other hand, the presence of aflatoxin B1 in foods is a matter of great concern, since aflatoxin B1 is a potent carcinogen for a number of species and epidemiological data suggest that this carcinogen may play a role in the development of cancer in humans living in some parts of Africa and in the Far East (Peers et al., 1976; van Rensburg et al., 1974)." data-dcnode-id="5409" name="description"><meta content="12 Naturally Occurring Carcinogens" data-dcnode-id="5408" name="og:title"><meta content="book" data-dcnode-id="5407" name="og:type"><meta content="The production of toxic compounds by living cells has long been recognized. Some of these chemicals, especially those produced by microbes and plant cells, have carcinogenic activity. Although some of these compounds are integral components of foods that are relatively common in the diet of humans, many of them have been found either in unusual food sources or in foods contaminated by microorganisms or unwanted plant materials. The potential hazards to human health posed by these components or contaminants of foods range from slight to very great. For example, very low levels of exposure to chemicals with relatively weak carcinogenic activity in laboratory animals may pose little risk to human populations. On the other hand, the presence of aflatoxin B1 in foods is a matter of great concern, since aflatoxin B1 is a potent carcinogen for a number of species and epidemiological data suggest that this carcinogen may play a role in the development of cancer in humans living in some parts of Africa and in the Far East (Peers et al., 1976; van Rensburg et al., 1974)." data-dcnode-id="5406" name="og:description"><meta content="https://www.ncbi.nlm.nih.gov/books/NBK216657/" data-dcnode-id="5405" name="og:url"><meta content="NCBI Bookshelf" data-dcnode US) Committee on Diet, Nutrition, and Cancer.</span></div><div data-dcnode-id="4996"><span data-dcnode-id="5000" instrument_node="">Washington (DC): </span><a data-dcnode-id="4998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nap.edu/" ref="pagearea=page-banner&amp;targetsite=external&amp;targetcat=link&amp;targettype=publisher"><span data-dcnode-id="4999" instrument_node="">National Academies Press (US)</span></a><span data-dcnode-id="4997" instrument_node="">; 1982.</span></div></div></div><div class="half_rhythm" data-dcnode-id="4986"><ul class="inline_list" data-dcnode-id="4987"><li data-dcnode-id="4991" style="margin-right:1em"><a aria-expanded="false" aria-haspopup="true" class="bk_cntns" data-dcnode-id="4992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap371/" role="button"><span data-dcnode-id="4993" instrument_node="">Contents</span></a></li><li data-dcnode-id="4988" style="margin-left:1em"><a data-dcnode-id="4989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nap.edu/catalog.php%3Frecord_id%3D371" ref="pagearea=body&amp;targetsite=external&amp;targetcat=link&amp;targettype=publisher"><span data-dcnode-id="4990" instrument_node="">Hardcopy Version at National Academies Press</span></a></li></ul></div><div class="bk_noprnt" data-dcnode-id="4975"><form action="/books/n/nap371/" data-dcnode-id="4976" id="bk_srch" method="get"><div class="bk_search" data-dcnode-id="4977"><label class="offscreen_noflow" data-dcnode-id="4984" for="bk_term"><span data-dcnode-id="4985" instrument_node="">Search term</span></label><div class="jig-ncbiclearbutton-wrap ui-ncbiclearbutton-wrap" data-dcnode-id="4980"><input data-dcnode-id="4983" data-jig="ncbiclearbutton" id="bk_term" name="term" title="Search this book" type="text" value=""><a class="reset" data-dcnode-id="4981" href="#" style="visibility: hidden;"><img alt="Clear input" data-dcnode-id="4982" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/core/jig/1.15.2/img/clear.png&amp;raw"></a></div><span data-dcnode-id="4979" instrument_node=""> </span><input class="jig-ncbibutton ui-corner-all ui-ncbibutton ui-ncbibutton-gray" data-dcnode-id="4978" id="ui-ncbibutton-7" role="button" style="padding: 0.1em 0.4em;" submit="false" type="submit" value="Search this book"></div></form></div></div><div class="icnblk_cntnt two_col" data-dcnode-id="4968"><div class="pagination bk_noprnt" data-dcnode-id="4969"><a class="active page_link prev" data-dcnode-id="4972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap371/ddd0000197/" title="Previous page in this title"><span data-dcnode-id="4973" instrument_node="">&lt; Prev</span></a><a class="active page_link next" data-dcnode-id="4970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap371/ddd0000231/" title="Next page in this title"><span data-dcnode-id="4971" instrument_node="">Next &gt;</span></a></div></div></div></div></div><span data-dcnode-id="4964" instrument_node="">
</span><div class="main-content lit-style" data-dcnode-id="576" itemscope="itemscope" itemtype="http://schema.org/CreativeWork"><div class="meta-content fm-sec" data-dcnode-id="4960"><h1 data-dcnode-id="4961" id="_NBK216657_"><span class="title" data-dcnode-id="4962" itemprop="name"><span data-dcnode-id="4963" instrument_node="">12 Naturally Occurring Carcinogens</span></span></h1></div><div class="jig-ncbiinpagenav body-content whole_rhythm" data-dcnode-id="577" data-jigconfig="allHeadingLevels: ['h2'],smoothScroll: false" id="ui-ncbiinpagenav-9" itemprop="text"><p data-dcnode-id="4940"><span data-dcnode-id="4959" instrument_node="">The production of toxic compounds by living cells has long been recognized. Some of these chemicals, especially those produced by microbes and plant cells, have carcinogenic activity. Although some of these compounds are integral components of foods that are relatively common in the diet of humans, many of them have been found either in unusual food sources or in foods contaminated by microorganisms or unwanted plant materials. The potential hazards to human health posed by these components or contaminants of foods range from slight to very great. For example, very low levels of exposure to chemicals with relatively weak carcinogenic activity in laboratory animals may pose little risk to human populations. On the other hand, the presence of aflatoxin B</span><sub data-dcnode-id="4957"><span data-dcnode-id="4958" instrument_node="">1</span></sub><span data-dcnode-id="4956" instrument_node=""> in foods is a matter of great concern, since aflatoxin B</span><sub data-dcnode-id="4954"><span data-dcnode-id="4955" instrument_node="">1</span></sub><span data-dcnode-id="4953" instrument_node=""> is a potent carcinogen for a number of species and epidemiological data suggest that this carcinogen may play a role in the development of cancer in humans living in some parts of Africa and in the Far East (Peers </span><u data-dcnode-id="4951"><span data-dcnode-id="4952" instrument_node="">et</span></u><span data-dcnode-id="4950" instrument_node="">
</span><u data-dcnode-id="4948"><span data-dcnode-id="4949" instrument_node="">al</span></u><span data-dcnode-id="4947" instrument_node="">., 1976; van Rensburg </span><u data-dcnode-id="4945"><span data-dcnode-id="4946" instrument_node="">et</span></u><span data-dcnode-id="4944" instrument_node="">
</span><u data-dcnode-id="4942"><span data-dcnode-id="4943" instrument_node="">al</span></u><span data-dcnode-id="4941" instrument_node="">., 1974).</span></p><p data-dcnode-id="4929"><span data-dcnode-id="4939" instrument_node="">Much of the literature on the carcinogenic products of living cells has been collected and evaluated by working groups of the International Agency for Research on </span><a aria-expanded="false" aria-haspopup="true" class="def" data-dcnode-id="4937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap371/ddd0000314/def-item/ggg00008/" role="button"><span data-dcnode-id="4938" instrument_node="">Cancer</span></a><span data-dcnode-id="4936" instrument_node=""> (1976) and by the National Research Council (National Academy of Sciences, 1973). Accordingly, these comprehensive reviews are often cited in this chapter instead of the primary literature. In addition, several recent reviews on naturally occurring carcinogens include exhaustive lists of primary references pertaining to these carcinogens. The overviews also cite literature on certain aspects of these carcinogens not covered in this chapter, such as their metabolic activation and deactivation, the reactions of electrophilic derivatives with cellular macromolecules, and the biochemical and biological consequences of the latter reactions (Hirono, 1981; Miller and Miller, 1979; Miller </span><u data-dcnode-id="4934"><span data-dcnode-id="4935" instrument_node="">et</span></u><span data-dcnode-id="4933" instrument_node="">
</span><u data-dcnode-id="4931"><span data-dcnode-id="4932" instrument_node="">al</span></u><span data-dcnode-id="4930" instrument_node="">., 1979; Schoental, 1976).</span></p><div data-dcnode-id="4631" id="ddd0000199"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="4925"><span data-dcnode-id="4926" role="menubar"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="4927" href="#" role="menuitem" title="Go to other sections in this page"><span data-dcnode-id="4928" instrument_node="">Go to:</span></a></span></div><h2 class="ui-helper-clearfix" data-dcnode-id="4923" id="_ddd0000199_"><span data-dcnode-id="4924" instrument_node="">MYCOTOXINS</span></h2><p data-dcnode-id="4921"><span data-dcnode-id="4922" instrument_node="">By definition, mycotoxins are toxic secondary products resulting from the metabolism of molds. In this chapter, the committee has reviewed only those toxic metabolites of mold that occur as natural contaminants of food or feed or that demonstrate some evidence of carcinogenicity in mammals when administered orally. Although at least 45 mycotoxins have been identified as eliciting some type of carcinogenic or mutagenic response, only 17 of them have been reported to occur naturally in food or feed (Stoloff, in press) (or only 13, if the aflatoxin group is considered as a single compound).</span></p><p data-dcnode-id="4919"><span data-dcnode-id="4920" instrument_node="">The selection of the mycotoxins discussed in this section was based on the extent of their occurrence in food and/or the data demonstrating their carcinogenicity. These compounds include: aflatoxins, sterigmatocystin, ochratoxin A, zearalenone, T-2 toxin, patulin, penicillic acid, griseofulvin, luteoskyrin, cyclochlorotine, and ergot.</span></p><div data-dcnode-id="4655" id="ddd0000200"><h3 data-dcnode-id="4917"><span data-dcnode-id="4918" instrument_node="">Aflatoxins</span></h3><p data-dcnode-id="4912"><span data-dcnode-id="4916" instrument_node="">A very extensive effort has gone into the study of this group of mycotoxins, especially to examine its most potent member, aflatoxin B</span><sub data-dcnode-id="4914"><span data-dcnode-id="4915" instrument_node="">1</span></sub><span data-dcnode-id="4913" instrument_node="">. Much more is known about the occurrence and toxicity of the aflatoxins than about any other mycotoxin and, probably, most other natural contaminants.</span></p><p data-dcnode-id="4907"><span data-dcnode-id="4911" instrument_node="">The scattered data pertaining to worldwide occurrence of aflatoxins in food were compiled for a conference on mycotoxins, which was sponsored by the Food and Agriculture Organization, the United Nations </span><a aria-expanded="false" aria-haspopup="true" class="def" data-dcnode-id="4909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap371/ddd0000314/def-item/ggg00019/" role="button"><span data-dcnode-id="4910" instrument_node="">Environment</span></a><span data-dcnode-id="4908" instrument_node=""> Program, and the World Health Organization (1977). More recently, Stoloff (in press) compiled data on the occurrence of aflatoxins in the United States.</span></p><p data-dcnode-id="4893"><span data-dcnode-id="4906" instrument_node="">The aflatoxin-producing molds </span><u data-dcnode-id="4904"><span data-dcnode-id="4905" instrument_node="">Aspergillus</span></u><span data-dcnode-id="4903" instrument_node="">
</span><u data-dcnode-id="4901"><span data-dcnode-id="4902" instrument_node="">flavus</span></u><span data-dcnode-id="4900" instrument_node=""> and </span><u data-dcnode-id="4898"><span data-dcnode-id="4899" instrument_node="">A</span></u><span data-dcnode-id="4897" instrument_node="">. </span><u data-dcnode-id="4895"><span data-dcnode-id="4896" instrument_node="">parasiticus</span></u><span data-dcnode-id="4894" instrument_node=""> are ubiquitous. They are frequently encountered as outgrowths on stored commodities under conditions prevailing in many tropical areas. In the United States, aflatoxin contamination is generally restricted to those crops invaded by the aflatoxin-producing molds before harvest: most frequently peanuts, corn, and cottonseed, and to a much lesser extent tree nuts, including almonds, walnuts, pecans, and pistachios. The extent of contamination is greater in the southeastern United States.</span></p><p data-dcnode-id="4891"><span data-dcnode-id="4892" instrument_node="">In the United States, humans are exposed to aflatoxin mostly from corn and peanuts (U.S. Food and Drug Administration, 1979). Other direct dietary sources, such as tree nuts, are of minor significance, either because contamination is infrequent or because only small quantities are consumed.</span></p><p data-dcnode-id="4886"><span data-dcnode-id="4890" instrument_node="">It is unlikely that secondary exposures result from the ingestion of aflatoxin residues in tissues of animals fed aflatoxin-contaminated feed (Stoloff, 1979), except for aflatoxin M</span><sub data-dcnode-id="4888"><span data-dcnode-id="4889" instrument_node="">1</span></sub><span data-dcnode-id="4887" instrument_node="">, a metabolite that appears in the milk of lactating mammals exposed to aflatoxins. But, although large amounts of milk are consumed, this exposure is negligible compared to the direct exposure from peanuts and corn.</span></p><p data-dcnode-id="4884"><span data-dcnode-id="4885" instrument_node="">Aflatoxins are classified as unavoidable contaminants. In the United States, the maximum allowable limit of total aflatoxins in consumer peanut products is currently 20 μg/kg (U.S. Food and Drug Administration, 1980b).</span></p><p data-dcnode-id="4862"><u data-dcnode-id="4882"><span data-dcnode-id="4883" instrument_node="">Epidemiological Evidence</span></u><span data-dcnode-id="4881" instrument_node="">. Oettlé (1965) was the first investigator to draw serious attention to the hypothesis that aflatoxin ingestion might cause liver cancer. He suggested that the geographic distribution of liver cancer in Africa could be explained by differing levels of exposure to aflatoxin in the diet. Keen and Martin (1971) reported an apparent association between the consumption of groundnuts contaminated with aflatoxin and the occurrence of liver cancer in different areas of Swaziland. Alpert </span><u data-dcnode-id="4879"><span data-dcnode-id="4880" instrument_node="">et</span></u><span data-dcnode-id="4878" instrument_node="">
</span><u data-dcnode-id="4876"><span data-dcnode-id="4877" instrument_node="">al</span></u><span data-dcnode-id="4875" instrument_node="">. (1971) made a similar correlation of contaminated foodstuffs and incidence of hepatoma by tribe and by province or district in Uganda. In a later study in Swaziland, Peers </span><u data-dcnode-id="4873"><span data-dcnode-id="4874" instrument_node="">et</span></u><span data-dcnode-id="4872" instrument_node="">
</span><u data-dcnode-id="4870"><span data-dcnode-id="4871" instrument_node="">al</span></u><span data-dcnode-id="4869" instrument_node="">. (1976) analyzed aflatoxin levels in foods consumed by a representative sample of the population in 11 geographic areas. He reported a significant correlation between aflatoxin contamination and incidence of primary liver cancer among adult males. A similar study in the Murang'a district of Kenya (Peers and Linsell, 1973) indicated that there was a correlation between aflatoxin levels in dietary staples of three district subdivisions and the incidence of liver cancer. Mozambique has particularly high rates of liver cancer, perhaps the highest in the world, and studies of aflatoxin contamination of foods indicated that the estimated daily intake of aflatoxin in that country was higher than that reported for any other country (van Rensburg </span><u data-dcnode-id="4867"><span data-dcnode-id="4868" instrument_node="">et</span></u><span data-dcnode-id="4866" instrument_node="">
</span><u data-dcnode-id="4864"><span data-dcnode-id="4865" instrument_node="">al</span></u><span data-dcnode-id="4863" instrument_node="">., 1974). One problem recognized by the researchers in all of these studies is the inadequacy of the data on liver cancer incidence, since cancer registration is not well established in these areas.</span></p><p data-dcnode-id="4854"><span data-dcnode-id="4861" instrument_node="">Detailed studies of aflatoxin contamination of ingested foodstuffs have also been conducted in Thailand, where there was an overall correlation between estimated aflatoxin intakes in two regions and liver cancer incidence (Shank </span><u data-dcnode-id="4859"><span data-dcnode-id="4860" instrument_node="">et</span></u><span data-dcnode-id="4858" instrument_node="">
</span><u data-dcnode-id="4856"><span data-dcnode-id="4857" instrument_node="">al</span></u><span data-dcnode-id="4855" instrument_node="">., 1972a, b; Wogan, 1975). The frequency with which aflatoxin was detected in foods has also been correlated with liver cancer mortality in Guangxi province in China (Armstrong, 1980). In Taiwan, where liver cancer mortality rates are high, Tung and Ling (1968) reported that dietary staples (e.g., peanuts and peanut oil, which is widely used in cooking) are frequently contaminated with aflatoxin.</span></p><p data-dcnode-id="4852"><span data-dcnode-id="4853" instrument_node="">Linsell and Peers (1977) observed a strong correlation between estimated levels of aflatoxin ingested and liver cancer incidence from various studies conducted in Africa and Asia. They further noted that there were no areas where high levels of aflatoxin ingestion have been associated with low rates of liver cancer.</span></p><p data-dcnode-id="4814"><span data-dcnode-id="4851" instrument_node="">Although the studies described above suggest that aflatoxin causes primary hepatocellular carcinoma (PHC), numerous other reports have also documented a high correlation between PHC and exposure to hepatitis B virus (Chien </span><u data-dcnode-id="4849"><span data-dcnode-id="4850" instrument_node="">et</span></u><span data-dcnode-id="4848" instrument_node="">
</span><u data-dcnode-id="4846"><span data-dcnode-id="4847" instrument_node="">al</span></u><span data-dcnode-id="4845" instrument_node="">., 1981; Prince </span><u data-dcnode-id="4843"><span data-dcnode-id="4844" instrument_node="">et</span></u><span data-dcnode-id="4842" instrument_node="">
</span><u data-dcnode-id="4840"><span data-dcnode-id="4841" instrument_node="">al</span></u><span data-dcnode-id="4839" instrument_node="">., 1975; Simons </span><u data-dcnode-id="4837"><span data-dcnode-id="4838" instrument_node="">et</span></u><span data-dcnode-id="4836" instrument_node="">
</span><u data-dcnode-id="4834"><span data-dcnode-id="4835" instrument_node="">al</span></u><span data-dcnode-id="4833" instrument_node="">., 1972; Tong </span><u data-dcnode-id="4831"><span data-dcnode-id="4832" instrument_node="">et</span></u><span data-dcnode-id="4830" instrument_node="">
</span><u data-dcnode-id="4828"><span data-dcnode-id="4829" instrument_node="">al</span></u><span data-dcnode-id="4827" instrument_node="">., 1971; Vogel </span><u data-dcnode-id="4825"><span data-dcnode-id="4826" instrument_node="">et</span></u><span data-dcnode-id="4824" instrument_node="">
</span><u data-dcnode-id="4822"><span data-dcnode-id="4823" instrument_node="">al</span></u><span data-dcnode-id="4821" instrument_node="">., 1970). These studies do not indicate whether present or past exposure to this virus is more closely associated with the development of PHC. However, Kew </span><u data-dcnode-id="4819"><span data-dcnode-id="4820" instrument_node="">et</span></u><span data-dcnode-id="4818" instrument_node="">
</span><u data-dcnode-id="4816"><span data-dcnode-id="4817" instrument_node="">al</span></u><span data-dcnode-id="4815" instrument_node="">. (1979) reported that active hepatitis B viral infection is present in approximately 80% to 90% of the patients with PHC. Approximately 5% to 10% of the victims of hepatitis B infection actually develop chronic active hepatitis with persistent liver damage. The liver cells of these individuals are believed to regenerate more rapidly, thereby increasing the likelihood that a biochemical lesion that initiates neoplasia will become fixed in the genes of the subsequent cell population.</span></p><p data-dcnode-id="4812"><span data-dcnode-id="4813" instrument_node="">The worldwide occurrence of hepatitis B viral infection is similar to that of primary hepatocellular carcinoma. However, it is possible that the influences of aflatoxin and hepatitis B virus on the risk for PHC are not completely independent. Van Rensburg (1977) reviewed the evidence for both risk factors and concluded that preexisting viral infection is probably a prerequisite for malignant transformation by aflatoxin.</span></p><p data-dcnode-id="4801"><span data-dcnode-id="4811" instrument_node="">The possibility that aflatoxin may also be involved in the etiology of esophageal cancer is suggested by the correlation between mortality from esophageal cancer and the consumption of large amounts of pickled vegetables and other fermented or moldy food in Linxian county of Henan province in northern China (Yang, 1980). Although </span><u data-dcnode-id="4809"><span data-dcnode-id="4810" instrument_node="">Aspergillus</span></u><span data-dcnode-id="4808" instrument_node="">
</span><u data-dcnode-id="4806"><span data-dcnode-id="4807" instrument_node="">flavus</span></u><span data-dcnode-id="4805" instrument_node=""> has been isolated from some products, it is difficult to determine the role of aflatoxin in the etiology of this disease because these foods also contain other fungal species, mutagens, and carcinogens, including </span><u data-dcnode-id="4803"><span data-dcnode-id="4804" instrument_node="">N</span></u><span data-dcnode-id="4802" instrument_node="">-nitroso compounds.</span></p><p data-dcnode-id="4775"><span data-dcnode-id="4800" instrument_node="">Epidemiological studies have not been undertaken in Western countries, but there have been reports indicating the presence of aflatoxin B</span><sub data-dcnode-id="4798"><span data-dcnode-id="4799" instrument_node="">1</span></sub><span data-dcnode-id="4797" instrument_node=""> in autopsy samples from liver cancer patients in Czechoslovakia (Dvořačková </span><u data-dcnode-id="4795"><span data-dcnode-id="4796" instrument_node="">et</span></u><span data-dcnode-id="4794" instrument_node="">
</span><u data-dcnode-id="4792"><span data-dcnode-id="4793" instrument_node="">al</span></u><span data-dcnode-id="4791" instrument_node="">., 1977), New Zealand (Becroft and Webster, 1972), and the United States (Siraj </span><u data-dcnode-id="4789"><span data-dcnode-id="4790" instrument_node="">et</span></u><span data-dcnode-id="4788" instrument_node="">
</span><u data-dcnode-id="4786"><span data-dcnode-id="4787" instrument_node="">al</span></u><span data-dcnode-id="4785" instrument_node="">., 1981). Siraj </span><u data-dcnode-id="4783"><span data-dcnode-id="4784" instrument_node="">et</span></u><span data-dcnode-id="4782" instrument_node="">
</span><u data-dcnode-id="4780"><span data-dcnode-id="4781" instrument_node="">al</span></u><span data-dcnode-id="4779" instrument_node="">. (1981) detected aflatoxin B</span><sub data-dcnode-id="4777"><span data-dcnode-id="4778" instrument_node="">1</span></sub><span data-dcnode-id="4776" instrument_node=""> in four of the six liver samples obtained from patients with PHC in the United States. The significance of these findings is not yet known.</span></p><p data-dcnode-id="4765"><u data-dcnode-id="4773"><span data-dcnode-id="4774" instrument_node="">Experimental Evidence: Carcinogenicity</span></u><span data-dcnode-id="4772" instrument_node="">. Aflatoxin B</span><sub data-dcnode-id="4770"><span data-dcnode-id="4771" instrument_node="">1</span></sub><span data-dcnode-id="4769" instrument_node=""> is the most potent hepatocarcinogen known, being about 1,000 times more powerful than butter yellow (</span><u data-dcnode-id="4767"><span data-dcnode-id="4768" instrument_node="">p</span></u><span data-dcnode-id="4766" instrument_node="">-dimethylaminoazobenzene) in rats. The carcinogenicity of aflatoxins has been examined in several studies in a variety of species and strains of laboratory animals, including mice, marmosets, tree shrews, trout, ducks, rhesus monkeys, hamsters, and several strains of rats (Wogan, 1973). Of the various species tested, the male Fischer 344 rat was the most sensitive to aflatoxin-induced carcinogenesis (Wogan, 1973).</span></p><p data-dcnode-id="4748"><span data-dcnode-id="4764" instrument_node="">Aflatoxin B</span><sub data-dcnode-id="4762"><span data-dcnode-id="4763" instrument_node="">1</span></sub><span data-dcnode-id="4761" instrument_node=""> induced mainly hepatocellular carcinomas in rats. However, other studies in rats have indicated that it may also induce a very low incidence of carcinomas of the glandular stomach (Butler and Barnes, 1966), cancers of the colon (Newberne and Rogers, 1973; Wogan and Newberne, 1967), renal epithelial neoplasia (Epstein </span><u data-dcnode-id="4759"><span data-dcnode-id="4760" instrument_node="">et</span></u><span data-dcnode-id="4758" instrument_node="">
</span><u data-dcnode-id="4756"><span data-dcnode-id="4757" instrument_node="">al</span></u><span data-dcnode-id="4755" instrument_node="">., 1969), and lung adenomas (Newberne </span><u data-dcnode-id="4753"><span data-dcnode-id="4754" instrument_node="">et</span></u><span data-dcnode-id="4752" instrument_node="">
</span><u data-dcnode-id="4750"><span data-dcnode-id="4751" instrument_node="">al</span></u><span data-dcnode-id="4749" instrument_node="">., 1967). Within a susceptible species and strain, males are much more susceptible than females to challenge with aflatoxin (Wogan and Newberne, 1967).</span></p><p data-dcnode-id="4734"><span data-dcnode-id="4747" instrument_node="">Mice are resistant to aflatoxin-induced carcinogenesis under conditions that result in 100% tumor incidence in Fischer rats. However, hepatomas were induced in 82 of 105 inbred (C57BL X C3H)F</span><sub data-dcnode-id="4745"><span data-dcnode-id="4746" instrument_node="">1</span></sub><span data-dcnode-id="4744" instrument_node=""> mice injected intraperitoneally during the first 7 days after birth with doses of aflatoxin B</span><sub data-dcnode-id="4742"><span data-dcnode-id="4743" instrument_node="">1</span></sub><span data-dcnode-id="4741" instrument_node=""> as low as 1.25 μg/g body weight (bw) and killed 82 weeks later (Vesselinovitch </span><u data-dcnode-id="4739"><span data-dcnode-id="4740" instrument_node="">et</span></u><span data-dcnode-id="4738" instrument_node="">
</span><u data-dcnode-id="4736"><span data-dcnode-id="4737" instrument_node="">al</span></u><span data-dcnode-id="4735" instrument_node="">., 1972).</span></p><p data-dcnode-id="4705"><span data-dcnode-id="4733" instrument_node="">In comparison to Fischer rats, nonhuman primates (170 animals in 12 different investigations) were relatively resistant to aflatoxin-induced carcinogenesis (Stoloff and Friedman, 1976). Liver tumors do not occur spontaneously in monkeys (O'Gara and Adamson, 1972), but a female rhesus monkey developed a primary liver carcinoma after ingesting approximately 500 mg of aflatoxin B</span><sub data-dcnode-id="4731"><span data-dcnode-id="4732" instrument_node="">1</span></sub><span data-dcnode-id="4730" instrument_node=""> over a 6-year period (Adamson </span><u data-dcnode-id="4728"><span data-dcnode-id="4729" instrument_node="">et</span></u><span data-dcnode-id="4727" instrument_node="">
</span><u data-dcnode-id="4725"><span data-dcnode-id="4726" instrument_node="">al</span></u><span data-dcnode-id="4724" instrument_node="">., 1973). In another study, one of nine marmosets developed liver tumors after 50 weeks on a diet (5 days a week) containing aflatoxin B</span><sub data-dcnode-id="4722"><span data-dcnode-id="4723" instrument_node="">1</span></sub><span data-dcnode-id="4721" instrument_node=""> at 2 μg/g (Lin </span><u data-dcnode-id="4719"><span data-dcnode-id="4720" instrument_node="">et</span></u><span data-dcnode-id="4718" instrument_node="">
</span><u data-dcnode-id="4716"><span data-dcnode-id="4717" instrument_node="">al</span></u><span data-dcnode-id="4715" instrument_node="">., 1974). However, the authors also observed liver cirrhosis,which is not a symptom of aflatoxicosis in rats. Reddy </span><u data-dcnode-id="4713"><span data-dcnode-id="4714" instrument_node="">et</span></u><span data-dcnode-id="4712" instrument_node="">
</span><u data-dcnode-id="4710"><span data-dcnode-id="4711" instrument_node="">al</span></u><span data-dcnode-id="4709" instrument_node="">. (1976) reported that 9 of 18 tree shrews intermittently fed aflatoxin B</span><sub data-dcnode-id="4707"><span data-dcnode-id="4708" instrument_node="">1</span></sub><span data-dcnode-id="4706" instrument_node=""> at 2 μg/g diet developed liver cancers after 74 to 172 weeks of treatment.</span></p><p data-dcnode-id="4656"><u data-dcnode-id="4703"><span data-dcnode-id="4704" instrument_node="">Experimental Evidence: Mutagenicity</span></u><span data-dcnode-id="4702" instrument_node="">. Aflatoxin B</span><sub data-dcnode-id="4700"><span data-dcnode-id="4701" instrument_node="">1</span></sub><span data-dcnode-id="4699" instrument_node=""> was shown to be mutagenic to </span><u data-dcnode-id="4697"><span data-dcnode-id="4698" instrument_node="">Salmonella</span></u><span data-dcnode-id="4696" instrument_node="">
</span><u data-dcnode-id="4694"><span data-dcnode-id="4695" instrument_node="">typhimurium</span></u><span data-dcnode-id="4693" instrument_node=""> strains TA98 and TA100 with and without S9 fraction (Ueno </span><u data-dcnode-id="4691"><span data-dcnode-id="4692" instrument_node="">et</span></u><span data-dcnode-id="4690" instrument_node="">
</span><u data-dcnode-id="4688"><span data-dcnode-id="4689" instrument_node="">al</span></u><span data-dcnode-id="4687" instrument_node="">., 1978). It was positive in the </span><u data-dcnode-id="4685"><span data-dcnode-id="4686" instrument_node="">Bacillus</span></u><span data-dcnode-id="4684" instrument_node="">
</span><u data-dcnode-id="4682"><span data-dcnode-id="4683" instrument_node="">subtilis</span></u><span data-dcnode-id="4681" instrument_node="">
</span><u data-dcnode-id="4679"><span data-dcnode-id="4680" instrument_node="">rec</span></u><span data-dcnode-id="4678" instrument_node=""> assay (Ueno and Kubota, 1976). In FM3A mouse cells, aflatoxin inducd 8-azaguanine-resistant mutants as well as chromosome aberrations (Umeda </span><u data-dcnode-id="4676"><span data-dcnode-id="4677" instrument_node="">et</span></u><span data-dcnode-id="4675" instrument_node="">
</span><u data-dcnode-id="4673"><span data-dcnode-id="4674" instrument_node="">al</span></u><span data-dcnode-id="4672" instrument_node="">., 1977). Aflatoxin M </span><sub data-dcnode-id="4670"><span data-dcnode-id="4671" instrument_node="">1</span></sub><span data-dcnode-id="4669" instrument_node="">, the metabolite of aflatoxin B</span><sub data-dcnode-id="4667"><span data-dcnode-id="4668" instrument_node="">1</span></sub><span data-dcnode-id="4666" instrument_node="">, was mutagenic in the Ames test (Wong and Hsieh, 1976), but inactive in </span><u data-dcnode-id="4664"><span data-dcnode-id="4665" instrument_node="">B</span></u><span data-dcnode-id="4663" instrument_node="">. </span><u data-dcnode-id="4661"><span data-dcnode-id="4662" instrument_node="">subtilis</span></u><span data-dcnode-id="4660" instrument_node="">
</span><u data-dcnode-id="4658"><span data-dcnode-id="4659" instrument_node="">rec</span></u><span data-dcnode-id="4657" instrument_node=""> assay (Ueno and Kubota, 1976).</span></p></div><div data-dcnode-id="4639" id="ddd0000201"><h3 data-dcnode-id="4653"><span data-dcnode-id="4654" instrument_node="">Other Mycotoxins</span></h3><p data-dcnode-id="4649"><a class="figpopup" data-dcnode-id="4651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK216657/table/ttt00010/%3Freport%3Dobjectonly" rid-figpopup="figttt00010" rid-ob="figobttt00010" target="object"><span data-dcnode-id="4652" instrument_node="">Table 12-1</span></a><span data-dcnode-id="4650" instrument_node=""> summarizes the data on the occurrence, carcinogenicity, and mutagenicity of mycotoxins other than aflatoxins that may be found in food. Although most of these mycotoxins are mutagenic in bacterial systems and other short-term tests and/or are carcinogenic in laboratory animals, there are no epidemiological studies pertaining to their role in neoplasia in humans.</span></p><div class="iconblock whole_rhythm clearfix ten_col table-wrap" data-dcnode-id="4640" id="figttt00010"><a class="img_link icnblk_img figpopup" data-dcnode-id="4647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK216657/table/ttt00010/%3Freport%3Dobjectonly" rid-figpopup="figttt00010" rid-ob="figobttt00010" target="object" title="TABLE 12-1"><img alt="TABLE 12-1. Occurrence, Carcinogenicity, and Mutagenicity of Mycotoxins Other than Aflatoxins." class="small-thumb" data-dcnode-id="4648" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK216657/table/ttt00010/%3Freport%3Dthumb&amp;raw" src-large="/books/NBK216657/table/ttt00010/?report=previmg"></a><div class="icnblk_cntnt" data-dcnode-id="4641"><h4 data-dcnode-id="4644" id="ttt00010"><a data-dcnode-id="4645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK216657/table/ttt00010/%3Freport%3Dobjectonly" rid-ob="figobttt00010" target="object"><span data-dcnode-id="4646" instrument_node="">TABLE 12-1</span></a></h4><p class="float-caption no_bottom_margin" data-dcnode-id="4642"><span data-dcnode-id="4643" instrument_node="">Occurrence, Carcinogenicity, and Mutagenicity of Mycotoxins Other than Aflatoxins. </span></p></div></div></div><div data-dcnode-id="4632" id="ddd0000202"><h3 data-dcnode-id="4637"><span data-dcnode-id="4638" instrument_node="">Summary and Conclusions: Aflatoxins and Other Mycotoxins</span></h3><p data-dcnode-id="4635"><span data-dcnode-id="4636" instrument_node="">A consistent body of evidence, all based on correlational data, associates the contamination of foods by aflatoxin with a high incidence of liver cancer in parts of Africa and Asia, but there is no epidemiological evidence that aflatoxin contamination of foodstuffs is related to cancer risk in the United States. Epidemiological studies have also indicated a high correlation between primary hepatocellular carcinoma and exposure to hepatitis B viral infection. Aflatoxin is carcinogenic in several species of animals, including rats, mice, trout, ducks, monkeys, and marmosets, and there is evidence of dose response. It induces mainly tumors of the liver and, to a lesser extent, tumors in the kidney, lung, stomach, and colon, more readily in males and in the young. The carcinogenicity of aflatoxin is paralleled by its mutagenicity in various systems.</span></p><p data-dcnode-id="4633"><span data-dcnode-id="4634" instrument_node="">There is no reliable information about the role of other mycotoxins in carcinogenesis in humans.</span></p></div></div><div data-dcnode-id="4379" id="ddd0000203"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="4628"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="4629" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="4630" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="4626" id="_ddd0000203_"><span data-dcnode-id="4627" instrument_node="">HYDRAZINES IN MUSHROOMS</span></h2><p data-dcnode-id="4622"><u data-dcnode-id="4624"><span data-dcnode-id="4625" instrument_node="">Epidemiological Evidence</span></u><span data-dcnode-id="4623" instrument_node="">. No epidemiological studies have been conducted to determine the effects of hydrazines on carcinogenesis in humans.</span></p><div data-dcnode-id="4497" id="ddd0000204"><h3 data-dcnode-id="4620"><span data-dcnode-id="4621" instrument_node="">Agaricus bisporus</span></h3><p data-dcnode-id="4607"><u data-dcnode-id="4618"><span data-dcnode-id="4619" instrument_node="">Agaricus</span></u><span data-dcnode-id="4617" instrument_node="">
</span><u data-dcnode-id="4615"><span data-dcnode-id="4616" instrument_node="">bisporus</span></u><span data-dcnode-id="4614" instrument_node=""> is a commonly eaten cultivated mushroom in Europe, North America, and other parts of the world. The exact consumption figures for </span><u data-dcnode-id="4612"><span data-dcnode-id="4613" instrument_node="">Agaricus</span></u><span data-dcnode-id="4611" instrument_node="">
</span><u data-dcnode-id="4609"><span data-dcnode-id="4610" instrument_node="">bisporus</span></u><span data-dcnode-id="4608" instrument_node=""> are unknown, but the U.S. Department of Agriculture (1981) has estimated that approximately 213 million kilograms of this mushroom were available for consumption (production and imports) in the United States during 1980.</span></p><p data-dcnode-id="4588"><u data-dcnode-id="4605"><span data-dcnode-id="4606" instrument_node="">Agaricus</span></u><span data-dcnode-id="4604" instrument_node="">
</span><u data-dcnode-id="4602"><span data-dcnode-id="4603" instrument_node="">bisporus</span></u><span data-dcnode-id="4601" instrument_node=""> contains agaritine -- β-N-[γ-L(+)-glutamyl]-4-hydroxymethylphenylhydrazine (Toth </span><u data-dcnode-id="4599"><span data-dcnode-id="4600" instrument_node="">et</span></u><span data-dcnode-id="4598" instrument_node="">
</span><u data-dcnode-id="4596"><span data-dcnode-id="4597" instrument_node="">al</span></u><span data-dcnode-id="4595" instrument_node="">., 1978) -- and 4-(hydroxymethyl)benzenediazonium ion (Levenberg, 1962). 4-Hydroxymethylphenylhydrazine and 4-methylphenylhydrazine, which are breakdown products of agaritine, have also been found in </span><u data-dcnode-id="4593"><span data-dcnode-id="4594" instrument_node="">A</span></u><span data-dcnode-id="4592" instrument_node="">. </span><u data-dcnode-id="4590"><span data-dcnode-id="4591" instrument_node="">bisporus</span></u><span data-dcnode-id="4589" instrument_node=""> (Levenberg, 1964).</span></p><p data-dcnode-id="4575"><u data-dcnode-id="4586"><span data-dcnode-id="4587" instrument_node="">Experimental Evidence: Carcinogenicity</span></u><span data-dcnode-id="4585" instrument_node="">. </span><u data-dcnode-id="4583"><span data-dcnode-id="4584" instrument_node="">N</span></u><span data-dcnode-id="4582" instrument_node="">'-Acetyl-4-(hydroxymethyl)phenylhydrazine as a 0.0625% solution in drinking water administered continuously to Swiss mice from 6 weeks of age to the end of their lives induced lung and blood vessel tumors (Toth </span><u data-dcnode-id="4580"><span data-dcnode-id="4581" instrument_node="">et</span></u><span data-dcnode-id="4579" instrument_node="">
</span><u data-dcnode-id="4577"><span data-dcnode-id="4578" instrument_node="">al</span></u><span data-dcnode-id="4576" instrument_node="">., 1978).</span></p><p data-dcnode-id="4567"><span data-dcnode-id="4574" instrument_node="">4-(Hydroxymethyl)benzenediazonium tetrafluoroborate administered to Swiss mice in 26 weekly subcutaneous injections at 50 μg/g bw resulted in an increased incidence of tumors of the subcutis and skin (Toth </span><u data-dcnode-id="4572"><span data-dcnode-id="4573" instrument_node="">et</span></u><span data-dcnode-id="4571" instrument_node="">
</span><u data-dcnode-id="4569"><span data-dcnode-id="4570" instrument_node="">al</span></u><span data-dcnode-id="4568" instrument_node="">., 1981).</span></p><p data-dcnode-id="4559"><span data-dcnode-id="4566" instrument_node="">4-Methylphenylhydrazine hydrochloride administered to Swiss mice in 7 weekly intragastric instillations of 250 μg/g bw induced lung and blood vessel tumors (Toth </span><u data-dcnode-id="4564"><span data-dcnode-id="4565" instrument_node="">et</span></u><span data-dcnode-id="4563" instrument_node="">
</span><u data-dcnode-id="4561"><span data-dcnode-id="4562" instrument_node="">al</span></u><span data-dcnode-id="4560" instrument_node="">., 1977).</span></p><p data-dcnode-id="4540"><u data-dcnode-id="4557"><span data-dcnode-id="4558" instrument_node="">Experimental Evidence: Mutagenicity</span></u><span data-dcnode-id="4556" instrument_node="">. </span><u data-dcnode-id="4554"><span data-dcnode-id="4555" instrument_node="">N</span></u><span data-dcnode-id="4553" instrument_node="">'-Acetyl-4-(hydroxymethyl)phenylhydrazine was most mutagenic in </span><u data-dcnode-id="4551"><span data-dcnode-id="4552" instrument_node="">S</span></u><span data-dcnode-id="4550" instrument_node="">. </span><u data-dcnode-id="4548"><span data-dcnode-id="4549" instrument_node="">typhimurium</span></u><span data-dcnode-id="4547" instrument_node=""> TA1537 without metabolic activation, and it exhibited marginal DNA-modifying activity only when the S9 fraction was included (Rogan </span><u data-dcnode-id="4545"><span data-dcnode-id="4546" instrument_node="">et</span></u><span data-dcnode-id="4544" instrument_node="">
</span><u data-dcnode-id="4542"><span data-dcnode-id="4543" instrument_node="">al</span></u><span data-dcnode-id="4541" instrument_node="">., in press).</span></p><p data-dcnode-id="4532"><span data-dcnode-id="4539" instrument_node="">4-(Hydroxymethyl)benzenediazonium tetrafluoroborate was weakly mutagenic in TA1535 and strongly mutagenic in TA1537, exhibiting toxicity in both strains (Rogan </span><u data-dcnode-id="4537"><span data-dcnode-id="4538" instrument_node="">et</span></u><span data-dcnode-id="4536" instrument_node="">
</span><u data-dcnode-id="4534"><span data-dcnode-id="4535" instrument_node="">al</span></u><span data-dcnode-id="4533" instrument_node="">., in press).</span></p><p data-dcnode-id="4512"><span data-dcnode-id="4531" instrument_node="">Agaritine produced equivocal results </span><u data-dcnode-id="4529"><span data-dcnode-id="4530" instrument_node="">in</span></u><span data-dcnode-id="4528" instrument_node=""> both in </span><u data-dcnode-id="4526"><span data-dcnode-id="4527" instrument_node="">vitro</span></u><span data-dcnode-id="4525" instrument_node=""> assays. There was a slight enhancement of mutagenicity in </span><u data-dcnode-id="4523"><span data-dcnode-id="4524" instrument_node="">S</span></u><span data-dcnode-id="4522" instrument_node="">. </span><u data-dcnode-id="4520"><span data-dcnode-id="4521" instrument_node="">typhimurium</span></u><span data-dcnode-id="4519" instrument_node=""> TA1537 without metabolic activation, and marginal DNA-modifying activity in the presence of S9 fraction (Rogan </span><u data-dcnode-id="4517"><span data-dcnode-id="4518" instrument_node="">et</span></u><span data-dcnode-id="4516" instrument_node="">
</span><u data-dcnode-id="4514"><span data-dcnode-id="4515" instrument_node="">al</span></u><span data-dcnode-id="4513" instrument_node="">., in press).</span></p><p data-dcnode-id="4498"><span data-dcnode-id="4511" instrument_node="">4-Methylphenylhydrazine hydrochloride was also found to be mutagenic with and without S9 fraction in </span><u data-dcnode-id="4509"><span data-dcnode-id="4510" instrument_node="">S</span></u><span data-dcnode-id="4508" instrument_node="">. </span><u data-dcnode-id="4506"><span data-dcnode-id="4507" instrument_node="">typhimurium</span></u><span data-dcnode-id="4505" instrument_node=""> TA98 and TA100 (Shimizu </span><u data-dcnode-id="4503"><span data-dcnode-id="4504" instrument_node="">et</span></u><span data-dcnode-id="4502" instrument_node="">
</span><u data-dcnode-id="4500"><span data-dcnode-id="4501" instrument_node="">al</span></u><span data-dcnode-id="4499" instrument_node="">., 1978).</span></p></div><div data-dcnode-id="4399" id="ddd0000205"><h3 data-dcnode-id="4495"><span data-dcnode-id="4496" instrument_node="">Gyromitra esculenta</span></h3><p data-dcnode-id="4484"><span data-dcnode-id="4494" instrument_node="">Each year, approximately 1 million people throughout the world eat the mushroom </span><u data-dcnode-id="4492"><span data-dcnode-id="4493" instrument_node="">Gyromitra esculenta</span></u><span data-dcnode-id="4491" instrument_node=""> (Simons, 1971); 100,000 of these people reside in the United States (S. Miller, personal communication). The literature contains more than 500 reports of poisonings resulting from the ingestion of this mushroom. Some of these incidents were fatal (Franke </span><u data-dcnode-id="4489"><span data-dcnode-id="4490" instrument_node="">et</span></u><span data-dcnode-id="4488" instrument_node="">
</span><u data-dcnode-id="4486"><span data-dcnode-id="4487" instrument_node="">al</span></u><span data-dcnode-id="4485" instrument_node="">., 1967).</span></p><p data-dcnode-id="4474"><u data-dcnode-id="4482"><span data-dcnode-id="4483" instrument_node="">Experimental Evidence: Carcinogenicity</span></u><span data-dcnode-id="4481" instrument_node="">. Eleven hydrazines and hydrazones have been identified in </span><u data-dcnode-id="4479"><span data-dcnode-id="4480" instrument_node="">G</span></u><span data-dcnode-id="4478" instrument_node="">. </span><u data-dcnode-id="4476"><span data-dcnode-id="4477" instrument_node="">esculenta</span></u><span data-dcnode-id="4475" instrument_node="">. Studies have been conducted to determine the carcinogenicity of many of these compounds.</span></p><p data-dcnode-id="4466"><span data-dcnode-id="4473" instrument_node="">Continuous administration of 0.0078% </span><u data-dcnode-id="4471"><span data-dcnode-id="4472" instrument_node="">N</span></u><span data-dcnode-id="4470" instrument_node="">-methyl-</span><u data-dcnode-id="4468"><span data-dcnode-id="4469" instrument_node="">N</span></u><span data-dcnode-id="4467" instrument_node="">-formylhydrazine (MFH) in drinking water to 6-week-old outbred Swiss mice for life produced tumors of the liver, lung, gallbladder, and bile duct. A higher dose (0.0156% MFH) given under identical conditions had no tumorigenic effect, since it proved too toxic for the animals (Toth and Nagel, 1978). Subsequently, the carcinogenicity of MFH was confirmed in mice (Toth and Patil, 1980, 1981) and in Syrian hamsters (Toth and Patil, 1979).</span></p><p data-dcnode-id="4452"><span data-dcnode-id="4465" instrument_node="">Acetaldehyde methylformylhydrazone, the main ingredient of </span><u data-dcnode-id="4463"><span data-dcnode-id="4464" instrument_node="">G</span></u><span data-dcnode-id="4462" instrument_node="">. </span><u data-dcnode-id="4460"><span data-dcnode-id="4461" instrument_node="">esculenta</span></u><span data-dcnode-id="4459" instrument_node="">, was administered to Swiss mice in propylene glycol in 52 weekly intragastric instillations at 100 μg/g bw (Toth </span><u data-dcnode-id="4457"><span data-dcnode-id="4458" instrument_node="">et</span></u><span data-dcnode-id="4456" instrument_node="">
</span><u data-dcnode-id="4454"><span data-dcnode-id="4455" instrument_node="">al</span></u><span data-dcnode-id="4453" instrument_node="">., 1981). The treatment induced tumors of the lungs, preputial glands, forestomach, and clitoral glands.</span></p><p data-dcnode-id="4450"><span data-dcnode-id="4451" instrument_node="">Drinking water solutions of 0.001% hydrazine, 0.01% methylhydrazine, and 0.001% methylhydrazine sulfate were administered continuously to 5-and 6-week-old randomly bred Swiss mice for their lifetimes. Hydrazine and methylhydrazine sulfate significantly increased the incidence of lung tumors in Swiss mice, whereas methylhydrazine enhanced the development of this neoplasm by shortening its latent period (Toth, 1972).</span></p><p data-dcnode-id="4448"><span data-dcnode-id="4449" instrument_node="">A 0.01% solution of methylhydrazine was administered daily in the drinking water of 6-week-old randomly bred Syrian golden hamsters for the remainder of their lifetimes. The treatment produced malignant histiocytomas of the liver and tumors of the cecum (Toth and Shimizu 1973).</span></p><p data-dcnode-id="4420"><u data-dcnode-id="4446"><span data-dcnode-id="4447" instrument_node="">Experimental Evidence: Mutagenicity</span></u><span data-dcnode-id="4445" instrument_node="">. </span><u data-dcnode-id="4443"><span data-dcnode-id="4444" instrument_node="">N</span></u><span data-dcnode-id="4442" instrument_node="">-Methyl-</span><u data-dcnode-id="4440"><span data-dcnode-id="4441" instrument_node="">N</span></u><span data-dcnode-id="4439" instrument_node="">-formylhydrazine, which is present in </span><u data-dcnode-id="4437"><span data-dcnode-id="4438" instrument_node="">G</span></u><span data-dcnode-id="4436" instrument_node="">. </span><u data-dcnode-id="4434"><span data-dcnode-id="4435" instrument_node="">esculenta</span></u><span data-dcnode-id="4433" instrument_node="">, was mutagenic only in </span><u data-dcnode-id="4431"><span data-dcnode-id="4432" instrument_node="">S</span></u><span data-dcnode-id="4430" instrument_node="">. </span><u data-dcnode-id="4428"><span data-dcnode-id="4429" instrument_node="">typhimurium</span></u><span data-dcnode-id="4427" instrument_node=""> TA1537 without activation and had no DNA-modifying activity (Rogan </span><u data-dcnode-id="4425"><span data-dcnode-id="4426" instrument_node="">et</span></u><span data-dcnode-id="4424" instrument_node="">
</span><u data-dcnode-id="4422"><span data-dcnode-id="4423" instrument_node="">al</span></u><span data-dcnode-id="4421" instrument_node="">., in press).</span></p><p data-dcnode-id="4400"><span data-dcnode-id="4419" instrument_node="">Methylhydrazine was mutagenic in </span><u data-dcnode-id="4417"><span data-dcnode-id="4418" instrument_node="">S</span></u><span data-dcnode-id="4416" instrument_node="">. </span><u data-dcnode-id="4414"><span data-dcnode-id="4415" instrument_node="">typhimurium</span></u><span data-dcnode-id="4413" instrument_node=""> TA1535 and TA1537. The addition of S9 fraction activating system enhanced the mutagenicity in both strains (Rogan </span><u data-dcnode-id="4411"><span data-dcnode-id="4412" instrument_node="">et</span></u><span data-dcnode-id="4410" instrument_node="">
</span><u data-dcnode-id="4408"><span data-dcnode-id="4409" instrument_node="">al</span></u><span data-dcnode-id="4407" instrument_node="">., in press). The DNA-modifying activity was observed earlier by von Wright </span><u data-dcnode-id="4405"><span data-dcnode-id="4406" instrument_node="">et</span></u><span data-dcnode-id="4404" instrument_node="">
</span><u data-dcnode-id="4402"><span data-dcnode-id="4403" instrument_node="">al</span></u><span data-dcnode-id="4401" instrument_node="">. (1977).</span></p></div><div data-dcnode-id="4380" id="ddd0000206"><h3 data-dcnode-id="4397"><span data-dcnode-id="4398" instrument_node="">Summary and Conclusions: Hydrazines</span></h3><p data-dcnode-id="4389"><span data-dcnode-id="4396" instrument_node="">Studies have shown that some chemical constituents of the </span><u data-dcnode-id="4394"><span data-dcnode-id="4395" instrument_node="">Agaricus </span></u><span data-dcnode-id="4393" instrument_node="">
</span><u data-dcnode-id="4391"><span data-dcnode-id="4392" instrument_node="">bisporus</span></u><span data-dcnode-id="4390" instrument_node=""> mushroom are carcinogenic in mice and mutagenic in bacterial systems. One constituent has also been shown to be carcinogenic in hamsters. But the findings of these studies are not sufficient for conclusions to be drawn concerning the risk to humans.</span></p><p data-dcnode-id="4381"><span data-dcnode-id="4388" instrument_node="">Some derivatives of hydrazines in the fungus </span><u data-dcnode-id="4386"><span data-dcnode-id="4387" instrument_node="">Gyromitra</span></u><span data-dcnode-id="4385" instrument_node="">
</span><u data-dcnode-id="4383"><span data-dcnode-id="4384" instrument_node="">esculenta</span></u><span data-dcnode-id="4382" instrument_node=""> have proven carcinogenic in a number of organs and tissues of mice and hamsters. Two of them were mutagenic in bacterial systems. There are no epidemiological studies concerning the carcinogenicity of these mushrooms in humans.</span></p></div></div><div data-dcnode-id="3776" id="ddd0000207"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="4376"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="4377" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="4378" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="4374" id="_ddd0000207_"><span data-dcnode-id="4375" instrument_node="">PLANT CONSTITUENTS AND METABOLITES</span></h2><div data-dcnode-id="4293" id="ddd0000208"><h3 data-dcnode-id="4372"><span data-dcnode-id="4373" instrument_node="">Pyrrolizidine Alkaloids</span></h3><p data-dcnode-id="4352"><span data-dcnode-id="4371" instrument_node="">Pyrrolizidine alkaloids occur in many nonedible plant species, including the genera </span><u data-dcnode-id="4369"><span data-dcnode-id="4370" instrument_node="">Senecio</span></u><span data-dcnode-id="4368" instrument_node=""> (ragworts), </span><u data-dcnode-id="4366"><span data-dcnode-id="4367" instrument_node="">Crotalaria</span></u><span data-dcnode-id="4365" instrument_node=""> (rattleboxes), and </span><u data-dcnode-id="4363"><span data-dcnode-id="4364" instrument_node="">Heliotropium</span></u><span data-dcnode-id="4362" instrument_node=""> (heliotropes), in amounts ranging from trace amounts to as much as 5% of the dry weight. In general, members of this group that contain a nuclear double bond alpha to an esterified carbinol are very potent toxins in the liver and lung of rodents and certain farm livestock (Hirono, 1981; Hirono </span><u data-dcnode-id="4360"><span data-dcnode-id="4361" instrument_node="">et</span></u><span data-dcnode-id="4359" instrument_node="">
</span><u data-dcnode-id="4357"><span data-dcnode-id="4358" instrument_node="">al</span></u><span data-dcnode-id="4356" instrument_node="">., 1979; International Agency for Research on </span><a aria-expanded="false" aria-haspopup="true" class="def" data-dcnode-id="4354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap371/ddd0000314/def-item/ggg00008/" role="button"><span data-dcnode-id="4355" instrument_node="">Cancer</span></a><span data-dcnode-id="4353" instrument_node="">, 1976).</span></p><p data-dcnode-id="4333"><u data-dcnode-id="4350"><span data-dcnode-id="4351" instrument_node="">Experimental Evidence: Carcinogenicity</span></u><span data-dcnode-id="4349" instrument_node="">. Monocrotaline, retrorsine, lasiocarpine, heliotrine, senkirkine, symphytine, and petasitenine, all of which are α, β-unsaturated esters, are carcinogenic when administered to rats orally or parenterally under conditions that permit long-term survivals. Most frequently, tumor induction has involved multiple doses of the alkaloids at moderate levels (e.g., a 0.01% solution of petasitenine in drinking water for 480 days) (Hirono </span><u data-dcnode-id="4347"><span data-dcnode-id="4348" instrument_node="">et</span></u><span data-dcnode-id="4346" instrument_node="">
</span><u data-dcnode-id="4344"><span data-dcnode-id="4345" instrument_node="">al</span></u><span data-dcnode-id="4343" instrument_node="">., 1979), but low incidences of tumors after long latent periods have apparently resulted from only one or a few doses. Tumors have also been induced in rats after the administration of plants, such as coltsfoot (</span><u data-dcnode-id="4341"><span data-dcnode-id="4342" instrument_node="">Tussilago</span></u><span data-dcnode-id="4340" instrument_node="">
</span><u data-dcnode-id="4338"><span data-dcnode-id="4339" instrument_node="">farfara</span></u><span data-dcnode-id="4337" instrument_node="">) or comfrey (</span><u data-dcnode-id="4335"><span data-dcnode-id="4336" instrument_node="">Symphytum</span></u><span data-dcnode-id="4334" instrument_node=""> sp.), which contain high levels of pyrrolizidine alkaloids. he tumors occur most frequently in the liver, but some have developed in other tissues, including the skin and lungs.</span></p><p data-dcnode-id="4319"><span data-dcnode-id="4332" instrument_node="">Plants containing the pyrrolizidine alkaloids may contaminate forages and food grains. Such contamination has resulted in acute and chronic poisoning of livestock in some parts of the world (Schoental, 1976). Humans may also be exposed by consuming such alkaloid-containing plants as drugs or foods. For example, one species of comfrey (</span><u data-dcnode-id="4330"><span data-dcnode-id="4331" instrument_node="">Symphytum</span></u><span data-dcnode-id="4329" instrument_node="">
</span><u data-dcnode-id="4327"><span data-dcnode-id="4328" instrument_node="">officinale</span></u><span data-dcnode-id="4326" instrument_node="">) is consumed as a green vegetable in Japan (Hirono </span><u data-dcnode-id="4324"><span data-dcnode-id="4325" instrument_node="">et</span></u><span data-dcnode-id="4323" instrument_node="">
</span><u data-dcnode-id="4321"><span data-dcnode-id="4322" instrument_node="">al</span></u><span data-dcnode-id="4320" instrument_node="">., 1979). The carcinogenic potency of some pyrrolizidine alkaloids and their widespread occurrence have led to the suggestion that these α, β-unsaturated esters may play a role in the induction of hepatic cancer in humans in some parts of the world; however, there are no reliable data to support this hypothesis.</span></p><p data-dcnode-id="4294"><u data-dcnode-id="4317"><span data-dcnode-id="4318" instrument_node="">Experimental Evidence: Mutagenicity</span></u><span data-dcnode-id="4316" instrument_node="">. Retrorsine, lasiocarpine, heliotrine, senkirkine, symphytine, and petasitenine, but not monocrotaline, have been shown to be mutagenic in the </span><u data-dcnode-id="4314"><span data-dcnode-id="4315" instrument_node="">Salmonella</span></u><span data-dcnode-id="4313" instrument_node="">/microsome assay (Hirono </span><u data-dcnode-id="4311"><span data-dcnode-id="4312" instrument_node="">et</span></u><span data-dcnode-id="4310" instrument_node="">
</span><u data-dcnode-id="4308"><span data-dcnode-id="4309" instrument_node="">al</span></u><span data-dcnode-id="4307" instrument_node="">., 1979; Wehner </span><u data-dcnode-id="4305"><span data-dcnode-id="4306" instrument_node="">et</span></u><span data-dcnode-id="4304" instrument_node="">
</span><u data-dcnode-id="4302"><span data-dcnode-id="4303" instrument_node="">al</span></u><span data-dcnode-id="4301" instrument_node="">., 1979; Yamanaka </span><u data-dcnode-id="4299"><span data-dcnode-id="4300" instrument_node="">et</span></u><span data-dcnode-id="4298" instrument_node="">
</span><u data-dcnode-id="4296"><span data-dcnode-id="4297" instrument_node="">al</span></u><span data-dcnode-id="4295" instrument_node="">., 1979).</span></p></div><div data-dcnode-id="4194" id="ddd0000209"><h3 data-dcnode-id="4291"><span data-dcnode-id="4292" instrument_node="">Allylic and Propenylic Benzene Derivatives</span></h3><p data-dcnode-id="4289"><span data-dcnode-id="4290" instrument_node="">Numerous allylic and propenylic benzene derivatives are present in the essential oils of a wide variety of plants (Guenther, 1948-1952; Guenther and Althausen, 1949), and some of these plants or their extracts are used as flavoring agents for human foods or as medicines consumed by humans. Of the known naturally occurring allylic benzene derivatives, safrole (l-allyl-3, 4-methylenedioxybenzene), which is a major component of oil of sassafras, and estragole (l-allyl-4-methoxybenzene), which is present in tarragon and anise, have been the most comprehensively studied.</span></p><p data-dcnode-id="4267"><u data-dcnode-id="4287"><span data-dcnode-id="4288" instrument_node="">Experimental Evidence: Carcinogenicity</span></u><span data-dcnode-id="4286" instrument_node="">. Safrole has induced low-to-moderate incidences of hepatic tumors in adult rats fed at levels of 0.5% or more of the diet for as long as 2 years (International Agency for Research on </span><a aria-expanded="false" aria-haspopup="true" class="def" data-dcnode-id="4284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/nap371/ddd0000314/def-item/ggg00008/" role="button"><span data-dcnode-id="4285" instrument_node="">Cancer</span></a><span data-dcnode-id="4283" instrument_node="">, 1976). Both safrole and estragole induced hepatic tumors and subcutaneous angiosarcomas within 18 months after they were fed to adult female CD-1 mice at levels of 0.25%-0.5% for approximately 1 year (Miller </span><u data-dcnode-id="4281"><span data-dcnode-id="4282" instrument_node="">et</span></u><span data-dcnode-id="4280" instrument_node="">
</span><u data-dcnode-id="4278"><span data-dcnode-id="4279" instrument_node="">al</span></u><span data-dcnode-id="4277" instrument_node="">., 1979). Administration of less than 1 mg of either compound or of methyl eugenol to CD-1 or (C57BL/6 x C3H/He)F</span><sub data-dcnode-id="4275"><span data-dcnode-id="4276" instrument_node="">1</span></sub><span data-dcnode-id="4274" instrument_node=""> male mice prior to weaning resulted in a high incidence of hepatomas by the age of 12 months (Miller </span><u data-dcnode-id="4272"><span data-dcnode-id="4273" instrument_node="">et</span></u><span data-dcnode-id="4271" instrument_node="">
</span><u data-dcnode-id="4269"><span data-dcnode-id="4270" instrument_node="">al</span></u><span data-dcnode-id="4268" instrument_node="">., 1979).</span></p><p data-dcnode-id="4224"><u data-dcnode-id="4265"><span data-dcnode-id="4266" instrument_node="">Experimental Evidence: Mutagenicity</span></u><span data-dcnode-id="4264" instrument_node="">. Safrole was mutagenic </span><u data-dcnode-id="4262"><span data-dcnode-id="4263" instrument_node="">in</span></u><span data-dcnode-id="4261" instrument_node="">
</span><u data-dcnode-id="4259"><span data-dcnode-id="4260" instrument_node="">vitro</span></u><span data-dcnode-id="4258" instrument_node=""> and in the host-mediated assay (Green and Savage, 1978). However, McCann </span><u data-dcnode-id="4256"><span data-dcnode-id="4257" instrument_node="">et</span></u><span data-dcnode-id="4255" instrument_node="">
</span><u data-dcnode-id="4253"><span data-dcnode-id="4254" instrument_node="">al</span></u><span data-dcnode-id="4252" instrument_node="">. (1975), Swanson </span><u data-dcnode-id="4250"><span data-dcnode-id="4251" instrument_node="">et</span></u><span data-dcnode-id="4249" instrument_node="">
</span><u data-dcnode-id="4247"><span data-dcnode-id="4248" instrument_node="">al</span></u><span data-dcnode-id="4246" instrument_node="">. (1979), and Wislocki </span><u data-dcnode-id="4244"><span data-dcnode-id="4245" instrument_node="">et</span></u><span data-dcnode-id="4243" instrument_node="">
</span><u data-dcnode-id="4241"><span data-dcnode-id="4242" instrument_node="">al</span></u><span data-dcnode-id="4240" instrument_node="">. (1977) reported that it was not mutagenic in the Ames test. It was positive in </span><u data-dcnode-id="4238"><span data-dcnode-id="4239" instrument_node="">Bacillus</span></u><span data-dcnode-id="4237" instrument_node="">
</span><u data-dcnode-id="4235"><span data-dcnode-id="4236" instrument_node="">subtilis</span></u><span data-dcnode-id="4234" instrument_node="">
</span><u data-dcnode-id="4232"><span data-dcnode-id="4233" instrument_node="">rec</span></u><span data-dcnode-id="4231" instrument_node=""> assay (Rosenkranz and Poirier, 1979) and in </span><u data-dcnode-id="4229"><span data-dcnode-id="4230" instrument_node="">Saccharomyces</span></u><span data-dcnode-id="4228" instrument_node="">
</span><u data-dcnode-id="4226"><span data-dcnode-id="4227" instrument_node="">cerevisiae</span></u><span data-dcnode-id="4225" instrument_node=""> D3 (Simmon, 1979).</span></p><p data-dcnode-id="4195"><span data-dcnode-id="4223" instrument_node="">Estragole was mutagenic to </span><u data-dcnode-id="4221"><span data-dcnode-id="4222" instrument_node="">S</span></u><span data-dcnode-id="4220" instrument_node="">. </span><u data-dcnode-id="4218"><span data-dcnode-id="4219" instrument_node="">typhimurium</span></u><span data-dcnode-id="4217" instrument_node=""> TA100 (Swanson </span><u data-dcnode-id="4215"><span data-dcnode-id="4216" instrument_node="">et</span></u><span data-dcnode-id="4214" instrument_node="">
</span><u data-dcnode-id="4212"><span data-dcnode-id="4213" instrument_node="">al</span></u><span data-dcnode-id="4211" instrument_node="">., 1979). Eugenol was not mutagenic to Ames </span><u data-dcnode-id="4209"><span data-dcnode-id="4210" instrument_node="">Salmonella</span></u><span data-dcnode-id="4208" instrument_node=""> strains </span><u data-dcnode-id="4206"><span data-dcnode-id="4207" instrument_node="">in</span></u><span data-dcnode-id="4205" instrument_node="">
</span><u data-dcnode-id="4203"><span data-dcnode-id="4204" instrument_node="">vitro</span></u><span data-dcnode-id="4202" instrument_node=""> and in the host-mediated assay (Green and Savage, 1978; Swanson </span><u data-dcnode-id="4200"><span data-dcnode-id="4201" instrument_node="">et</span></u><span data-dcnode-id="4199" instrument_node="">
</span><u data-dcnode-id="4197"><span data-dcnode-id="4198" instrument_node="">al</span></u><span data-dcnode-id="4196" instrument_node="">., 1979).</span></p></div><div data-dcnode-id="4133" id="ddd0000210"><h3 data-dcnode-id="4192"><span data-dcnode-id="4193" instrument_node="">Bracken Fern Toxin(s)</span></h3><p data-dcnode-id="4184"><span data-dcnode-id="4191" instrument_node="">Bracken fern (</span><u data-dcnode-id="4189"><span data-dcnode-id="4190" instrument_node="">Pteridium</span></u><span data-dcnode-id="4188" instrument_node="">
</span><u data-dcnode-id="4186"><span data-dcnode-id="4187" instrument_node="">aquilinum</span></u><span data-dcnode-id="4185" instrument_node="">) occurs widely in nature and is consumed by humans in several parts of the world, especially in Japan (Hirono, 1981). For at least 30 years, it has been known that consumption of this plant causes damage to the bone marrow and intestinal mucosa of cattle, but the precise compound(s) responsible for these toxic effects have not been identified.</span></p><p data-dcnode-id="4174"><u data-dcnode-id="4182"><span data-dcnode-id="4183" instrument_node="">Epidemiological Evidence: Carcinogenicity</span></u><span data-dcnode-id="4181" instrument_node="">. In a prospective cohort study in Japan, Hirayama (1979) found a significantly higher risk of esophageal carcinoma associated with the daily intake of hot gruel or bracken fern every day, especially in people who ate both foods daily. However, Howe </span><u data-dcnode-id="4179"><span data-dcnode-id="4180" instrument_node="">et</span></u><span data-dcnode-id="4178" instrument_node="">
</span><u data-dcnode-id="4176"><span data-dcnode-id="4177" instrument_node="">al</span></u><span data-dcnode-id="4175" instrument_node="">. (1980) found no association between bladder cancer and consumption of fiddlehead greens (related to bracken fern) in a case-control study in Canada.</span></p><p data-dcnode-id="4170"><u data-dcnode-id="4172"><span data-dcnode-id="4173" instrument_node="">Experimental Evidence: Carcinogenicity</span></u><span data-dcnode-id="4171" instrument_node="">. The carcinogenicity of bracken fern was first suspected by Pamukcu in 1960, who found polyps in the urinary bladder mucosa of cattle fed large amounts of bracken fern for long periods (Pamukcu and Bryan, 1979). Since that time, ingestion of high levels of bracken fern (25% to 40% of the diet) has been found to result in the formation of urinary bladder carcinomas in cattle, urinary bladder carcinomas and intestinal adenocarcinomas in rats, urinary bladder tumors in guinea pigs, pulmonary adenomas in mice, and intestinal adenocarcinomas in Japanese quail (Evans, 1976).</span></p><p data-dcnode-id="4168"><span data-dcnode-id="4169" instrument_node="">Hirono (1981) reported that the greatest concentration of the toxin(s) is present in young plants before the fronds have uncurled, and the carcinogenic activity of the rhizome is greater than that of the stalk or fronds. The toxicity of the fern is reduced, but not eliminated, by cooking.</span></p><p data-dcnode-id="4142"><span data-dcnode-id="4167" instrument_node="">A number of studies have been conducted to identify the carcinogenic agent(s) in bracken fern (Evans, 1976; Hirono, 1981; Pamukcu and Bryan, 1979). Quercetin (3, 3', 4', 5, 7-pentahydroxyflavone) occurs as a conjugate in bracken fern and in numerous other plants. In culture, this compound has induced morphological transformation of cryopreserved golden hamster embryo cells (Umezawa </span><u data-dcnode-id="4165"><span data-dcnode-id="4166" instrument_node="">et</span></u><span data-dcnode-id="4164" instrument_node="">
</span><u data-dcnode-id="4162"><span data-dcnode-id="4163" instrument_node="">al</span></u><span data-dcnode-id="4161" instrument_node="">., 1977) and mutations in </span><u data-dcnode-id="4159"><span data-dcnode-id="4160" instrument_node="">S</span></u><span data-dcnode-id="4158" instrument_node="">. </span><u data-dcnode-id="4156"><span data-dcnode-id="4157" instrument_node="">typhimurium</span></u><span data-dcnode-id="4155" instrument_node=""> (Bartholomew and Ryan, 1980), but its carcinogenicity in rats continues to be disputed. In one study, administration of 0.1% quercetin in the diet of rats for as long as 1 year resulted in an 80% incidence of intestinal tumors and a 20% incidence of urinary bladder tumors (Pamukcu </span><u data-dcnode-id="4153"><span data-dcnode-id="4154" instrument_node="">et</span></u><span data-dcnode-id="4152" instrument_node="">
</span><u data-dcnode-id="4150"><span data-dcnode-id="4151" instrument_node="">al</span></u><span data-dcnode-id="4149" instrument_node="">., 1980). However, in another laboratory, administration of quercetin as 1% or 5% of the diet for 540 days or as 10% of the diet for 850 days did not result in a significant incidence of tumors in ACI rats (Hirono </span><u data-dcnode-id="4147"><span data-dcnode-id="4148" instrument_node="">et</span></u><span data-dcnode-id="4146" instrument_node="">
</span><u data-dcnode-id="4144"><span data-dcnode-id="4145" instrument_node="">al</span></u><span data-dcnode-id="4143" instrument_node="">., 1981).</span></p><p data-dcnode-id="4134"><span data-dcnode-id="4141" instrument_node="">Interest in the possibility that bracken fern might play a role in the induction of cancers stems from the knowledge that it is used by humans as food in several parts of the world (Hirono, 1981). Indirect evidence for its carcinogenicity is derived from observations that milk from cows fed high levels of bracken fern contained compounds that were shown to be carcinogenic in rats. Carcinomas of the intestine, urinary bladder, and kidney pelvis were observed in rats fed high levels of fresh or powdered milk from cows that had consumed 1 g of bracken fern per kilogram of body weight daily for approximately 2 years, but not in rats fed milk from control cows (Pamukcu </span><u data-dcnode-id="4139"><span data-dcnode-id="4140" instrument_node="">et</span></u><span data-dcnode-id="4138" instrument_node="">
</span><u data-dcnode-id="4136"><span data-dcnode-id="4137" instrument_node="">al</span></u><span data-dcnode-id="4135" instrument_node="">., 1978).</span></p></div><div data-dcnode-id="4097" id="ddd0000211"><h3 data-dcnode-id="4131"><span data-dcnode-id="4132" instrument_node="">Estrogenic Compounds</span></h3><p data-dcnode-id="4126"><span data-dcnode-id="4130" instrument_node="">The plant estrogens include estrone (from palm kernels), genistein (from soybean and clover), coumestrol (from alfalfa and other forage crops), and mirestrol (from certain legumes) (Schoental, 1976; Stob, 1973). Zearalenone, a product of </span><u data-dcnode-id="4128"><span data-dcnode-id="4129" instrument_node="">Fusarium</span></u><span data-dcnode-id="4127" instrument_node=""> molds that sometimes infect grains, also possesses estrogenic activity.</span></p><p data-dcnode-id="4118"><span data-dcnode-id="4125" instrument_node="">Plant estrogens are very weak estrogens compared to the hormones from animals; however, they can occur in relatively large amounts. For example, fat-free soybeans may contain as much as 0.1% of genistein (Verdeal </span><u data-dcnode-id="4123"><span data-dcnode-id="4124" instrument_node="">et</span></u><span data-dcnode-id="4122" instrument_node="">
</span><u data-dcnode-id="4120"><span data-dcnode-id="4121" instrument_node="">al</span></u><span data-dcnode-id="4119" instrument_node="">., 1980).</span></p><p data-dcnode-id="4105"><u data-dcnode-id="4116"><span data-dcnode-id="4117" instrument_node="">Experimental Evidence: Carcinogenicity</span></u><span data-dcnode-id="4115" instrument_node="">. Other than one report on zearalenone (discussed earlier in this chapter), there are no data pertaining to the carcinogenicity of plant estrogens. Some nonsteroidal phytoestrogens that are natural components of some foods compete for estrogen receptors in rat uterine cytosol in tissue sections from 7, 12-dimethylbenz[</span><u data-dcnode-id="4113"><span data-dcnode-id="4114" instrument_node="">a</span></u><span data-dcnode-id="4112" instrument_node="">]anthracene-induced mammary tumors, and in mammary tumor tissue from humans (Verdeal </span><u data-dcnode-id="4110"><span data-dcnode-id="4111" instrument_node="">et</span></u><span data-dcnode-id="4109" instrument_node="">
</span><u data-dcnode-id="4107"><span data-dcnode-id="4108" instrument_node="">al</span></u><span data-dcnode-id="4106" instrument_node="">., 1980). The significance of these findings in the etiology of neoplasia in humans is not known.</span></p><p data-dcnode-id="4098"><u data-dcnode-id="4103"><span data-dcnode-id="4104" instrument_node="">Experimental Evidence: Mutagenicity</span></u><span data-dcnode-id="4102" instrument_node="">. Genistein and coumestrol were not mutagenic in the </span><u data-dcnode-id="4100"><span data-dcnode-id="4101" instrument_node="">Salmonella</span></u><span data-dcnode-id="4099" instrument_node=""> microsome assay (Bartholomew and Ryan, 1980).</span></p></div><div data-dcnode-id="3992" id="ddd0000212"><h3 data-dcnode-id="4095"><span data-dcnode-id="4096" instrument_node="">Coffee</span></h3><p data-dcnode-id="4067"><u data-dcnode-id="4093"><span data-dcnode-id="4094" instrument_node="">Epidemiological Evidence: Carcinogenicity</span></u><span data-dcnode-id="4092" instrument_node="">: Coffee drinking has been associated with elevated risk for bladder cancer in several case-control studies (Bross and Tidings, 1973; Cole, 1971; Fraumeni </span><u data-dcnode-id="4090"><span data-dcnode-id="4091" instrument_node="">et</span></u><span data-dcnode-id="4089" instrument_node="">
</span><u data-dcnode-id="4087"><span data-dcnode-id="4088" instrument_node="">al</span></u><span data-dcnode-id="4086" instrument_node="">., 1971; Howe </span><u data-dcnode-id="4084"><span data-dcnode-id="4085" instrument_node="">et</span></u><span data-dcnode-id="4083" instrument_node="">
</span><u data-dcnode-id="4081"><span data-dcnode-id="4082" instrument_node="">al</span></u><span data-dcnode-id="4080" instrument_node="">., 1980; Miller </span><u data-dcnode-id="4078"><span data-dcnode-id="4079" instrument_node="">et</span></u><span data-dcnode-id="4077" instrument_node="">
</span><u data-dcnode-id="4075"><span data-dcnode-id="4076" instrument_node="">al</span></u><span data-dcnode-id="4074" instrument_node="">., 1978; Simon </span><u data-dcnode-id="4072"><span data-dcnode-id="4073" instrument_node="">et</span></u><span data-dcnode-id="4071" instrument_node="">
