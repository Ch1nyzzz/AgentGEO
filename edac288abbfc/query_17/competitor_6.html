</span><p align="left" data-dcnode-id="1297"><span data-dcnode-id="1300" instrument_node="">ARTICLE</span><br data-dcnode-id="1299"><span data-dcnode-id="1298" instrument_node="">
            (Editor's Note: Summary of a 57 page Report presented by G. Wollin
              on November 20, 1987, at Chalmers University of Technology, Gothenburg,
              Sweden.) Excerpt taken from MAGNETS, Volume 3, Number 4, April
              1988.</span></p><span data-dcnode-id="1296" instrument_node="">
</span><p align="left" data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">"Mrs. Kerstin Westelius had lung cancer of the metastasis type.
            After years of surgery, therapy and chemotherapy, she was told in
            June 1987 by her physicians that her cancer was incurable and that
            she had only 2 more months to live. Here in the picture, she is shown
            in January of 1988 with her physician, Dr., Erik Enby, who treated
            her by hanging a Neomax supermagnet around her neck, and with Prof.
            Goesta Wollen of Clyde, N.C., who invented the method of treating
            cancer with the employment of supermagnets. Since July of 1987 more
            than 50 cancer patients in Sweden and America have been treated -
            all successfully."</span></p><span data-dcnode-id="1293" instrument_node="">
</span><p align="left" data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">Because of the recent invention of a supermagnet with great strength
            and a minute size, three breast cancer patients have been cured by
            a method, which will revolutionize the field of cancer treatment.
            One of the patients had breast cancer of the metastasis type; that
            is, the cancer had transplanted into tissue distant from the site
            of the original cancer. The technique we used strongly indicates
            that all kinds of cancer can be cured by this method.</span></p><span data-dcnode-id="1290" instrument_node="">
</span><p align="center" data-dcnode-id="1287"><a data-dcnode-id="1288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//altered-states.net/rife/rife_mk5.htm"><span data-dcnode-id="1289" instrument_node="">Portable
            Rife MK5</span></a></p><span data-dcnode-id="1286" instrument_node="">
</span><p align="left" data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">The super energy permanent magnet we use in our project has a maximum
            energy of up to 35,000,000 gauss-oersteds. This strength of the supermagnet
            is the world's record in commercial production, according to the
            prestigious American Journal "SCIENCE." It is made of iron,
            boron and neodymium, one of the rare metals. It is brand-named Neomax.</span></p><span data-dcnode-id="1283" instrument_node="">
</span><p align="left" data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">The Neomax supermagnet was recently -1983 - invented by the Sumitomo
            Special Metals Company of Japan. This company also commercially produces
            it.</span></p><span data-dcnode-id="1280" instrument_node="">
</span><p align="left" data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">The size of the Neomax supermagnet that was used in the cancer project
            is approximately the size of an American quarter. It is smaller than
            a Swedish krona. It weights 30 grams, which is approximately 1 ounce.</span></p><span data-dcnode-id="1277" instrument_node="">
</span><p align="left" data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">The supermagnets for Professor Wollin were made to his specifications.
            Professor Wollin received, as a generous gift, 30 Neomax supermagnets
            from the Sumitomo Special Metals Company of Japan. Each one of the
            women with breast cancer who participated in the project had a supermagnet
            hanging around her neck for about 4 months, with the north polarity
            of the magnet directed toward the body.</span></p><span data-dcnode-id="1274" instrument_node="">
</span><p align="left" data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">The results indicate that our method can cure all types of cancer.
            If we had positioned the magnets on the tumor, we would not have
            known this. But since we hung a supermagnet around the neck of each
            patient, it indicates the supermagnets influence the whole body.</span></p><span data-dcnode-id="1271" instrument_node="">
</span><p align="left" data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">Of importance is healthy tissue surrounding a cancer tumor is not
            harmed by a supermagnet because healthy cells have different electromagnetic
            potential than cancer cells.</span></p><span data-dcnode-id="1268" instrument_node="">
</span><p align="left" data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Of great importance is that we can suggest a mechanism; that is,
            what is happening when a supermagnet is trying to eliminate a malignant
            tumor. The mechanism is based on Wollin's recent discovery of a universal
            spiral theory. Wollin discovered that spirals are found throughout
            nature, from the galaxies, each one consisting of hundreds of billions
            of stars, down to the basic shape of DNA (deoxyribonucleic acid),

</span><p align="left" data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">"A negative magnetic field (north or negative side) can function

</span><p align="left" data-dcnode-id="1121"><span data-dcnode-id="1132" instrument_node="">Curing cancer with magnets; a case study</span><br data-dcnode-id="1131"><span data-dcnode-id="1130" instrument_node="">
  Patient: Norma Redman.</span><br data-dcnode-id="1129"><span data-dcnode-id="1128" instrument_node="">
  Age: 65.</span><br data-dcnode-id="1127"><span data-dcnode-id="1126" instrument_node="">
  Diagnosis: Undifferentiated small cell (Oatcell) carcinoma - lung cancer.</span><br data-dcnode-id="1125"><span data-dcnode-id="1124" instrument_node="">
  Medical History: Little or no health problems until present illness. </span><br data-dcnode-id="1123"><span data-dcnode-id="1122" instrument_node="">
  Miscellaneous: Patient smoked two or three packs of cigarettes per day for
  fifty years.</span></p><span data-dcnode-id="1120" instrument_node="">
</span><p align="left" data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">In August of 1986, the patient developed a severe cough and experienced
            difficulty in breathing. She visited her doctor and he diagnosed
            her as having pneumonia and he admitted her to the hospital. After
            further testing - C.A.T scans and x-rays - she was diagnosed as having
            small cell carcinoma. A broncoscophy confirmed the diagnosis.</span></p><span data-dcnode-id="1117" instrument_node="">
</span><p align="left" data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">In September 1986, chemotherapy was begun. Chemotherapy continued
            until April 1987. Then she was given ten days of cobalt radiation
            directed at the brain. This treatment is necessary because conventional
            chemotherapy will not kill cancer cells of the Oatcell type in the
            brain. Chemotherapy was reinstated through late November and early
            December 1987.</span></p><span data-dcnode-id="1114" instrument_node="">
</span><p align="left" data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">In December 1987, one of her doctors told her she had about one
            month to live and that they had done all they could for her. At this
            time, she was experiencing severe back pain and the doctors determined
            the cancer had moved into her spine. She was given radiation (5 days)
            and one more round of chemotherapy. At that point she was told that
            any additional treatment would be of little or no value. On December
            23, 1987, she was released from the hospital.</span></p><span data-dcnode-id="1111" instrument_node="">
</span><p align="left" data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">I visited the patient on December 25, 1987. Her condition was as
            follows:</span></p><span data-dcnode-id="1108" instrument_node="">
</span><p align="left" data-dcnode-id="1096"><span data-dcnode-id="1107" instrument_node="">a. Mental confusion. Could not remember things told to her longer
            that five minutes.</span><br data-dcnode-id="1106"><span data-dcnode-id="1105" instrument_node="">
  b. Patient was in severe pain.</span><br data-dcnode-id="1104"><span data-dcnode-id="1103" instrument_node="">
  c. Patient was on pain medication (Percoset), 2 tablets every 3 hours.</span><br data-dcnode-id="1102"><span data-dcnode-id="1101" instrument_node="">
  d. Patient could not stand or walk, aided or unaided.</span><br data-dcnode-id="1100"><span data-dcnode-id="1099" instrument_node="">
  e. Patient could not sleep through the night. Would awaken several times during
  the night and require assistance.</span><br data-dcnode-id="1098"><span data-dcnode-id="1097" instrument_node="">
  f. Patient was depressed and exhibited child-like mannerisms.</span></p><span data-dcnode-id="1095" instrument_node="">
</span><p align="left" data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">The "Neomax" was placed on the patient with the north
            polarity toward the body. After two days had passed, the patient
            was only taking one pain tablet in the morning and one at night.
            The mental confusion was noticeably absent and the patient stated
            that she had slept uninterrupted from 9:00 p.m. to 6:30 a.m. the
            next day.</span></p><span data-dcnode-id="1092" instrument_node="">
</span><p align="left" data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">I visited the patient on January 2, 1988. She told me she had been
            sleeping well every night, not awakening at all during the night.
            She was taking very little pain medicine. Her back was still hurting
            when she moved. But she stated it was more tolerable.</span></p><span data-dcnode-id="1089" instrument_node="">
</span><p align="left" data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">On January 5, 1988, the patient was moved to a skilled care nursing
            home. The doctors there conferred with her oncologist about her condition.
            On Wednesday, January 6, 1988, the patient told me she had no pain
            medication that day and that twice that day she had walked (aided)
            to the bathroom. Also, the resident doctor told her that they determined
            by studying x-rays, C.A.T. scans, and by other means, that she did
            not have any cancer in her spine. Instead, they thought her back
            pain was being caused by osteoporosis. Further, they told her that
            all tests they performed on her showed no trace of any cancer.</span></p><span data-dcnode-id="1086" instrument_node="">
</span><p align="left" data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">I talked with the patient on Friday, January 8, 1988. Her mental
            condition was excellent. She stated that she was taking very little
            pain medication and was in less pain than previous conversations.
            She has been wearing the super magnet, as of this writing, for fourteen
            days and has made remarkable progress in so short a period of time.
            I visited the patient on January 9, 1988. She was able to sit up
            in bed by herself, could sit on the side of the bed by herself, and
            could walk, unaided, to the bathroom by herself, although I walked
            along beside her just to be on the safe side. She is presently taking
            little or no pain medication, and no other drugs. Her appetite is
            not very good, but it is improving daily. I expect to visit her again

</span><p align="left" data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">In August of 1986, the patient developed a severe cough and experienced
            difficulty in breathing. She visited her doctor and he diagnosed
            her as having pneumonia and he admitted her to the hospital. After
            further testing - C.A.T scans and x-rays - she was diagnosed as having
            small cell carcinoma. A broncoscophy confirmed the diagnosis.</span></p><span data-dcnode-id="1029" instrument_node="">
</span><p align="left" data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">In September 1986, chemotherapy was begun. Chemotherapy continued
            until April 1987. Then she was given ten days of cobalt radiation
            directed at the brain. This treatment is necessary because conventional
            chemotherapy will not kill cancer cells of the Oatcell type in the
            brain. Chemotherapy was reinstated through late November and early
            December 1987.</span></p><span data-dcnode-id="1026" instrument_node="">
</span><p align="left" data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">In December 1987, one of her doctors told her she had about one
            month to live and that they had done all they could for her. At this
            time, she was experiencing severe back pain and the doctors determined
            the cancer had moved into her spine. She was given radiation (5 days)
            and one more round of chemotherapy. At that point she was told that
            any additional treatment would be of little or no value. On December
            23, 1987, she was released from the hospital.</span></p><span data-dcnode-id="1023" instrument_node="">

            follows:</span></p><span data-dcnode-id="1020" instrument_node="">

            that five minutes.</span><br data-dcnode-id="1018"><span data-dcnode-id="1017" instrument_node="">
  b. Patient was in severe pain.</span><br data-dcnode-id="1016"><span data-dcnode-id="1015" instrument_node="">
  c. Patient was on pain medication (Percoset), 2 tablets every 3 hours.</span><br data-dcnode-id="1014"><span data-dcnode-id="1013" instrument_node="">
  d. Patient could not stand or walk, aided or unaided.</span><br data-dcnode-id="1012"><span data-dcnode-id="1011" instrument_node="">
  e. Patient could not sleep through the night. Would awaken several times during
  the night and require assistance.</span><br data-dcnode-id="1010"><span data-dcnode-id="1009" instrument_node="">
  f. Patient was depressed and exhibited child-like mannerisms.</span></p><span data-dcnode-id="1007" instrument_node="">
</span><p align="left" data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">The "Neomax" was placed on the patient with the north

            The mental confusion was noticeably absent and the patient stated
            that she had slept uninterrupted from 9:00 p.m. to 6:30 a.m. the
            next day.</span></p><span data-dcnode-id="1004" instrument_node="">
</span><p align="left" data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">I visited the patient on January 2, 1988. She told me she had been
            sleeping well every night, not awakening at all during the night.
            She was taking very little pain medicine. Her back was still hurting
            when she moved. But she stated it was more tolerable.</span></p><span data-dcnode-id="1001" instrument_node="">
</span><p align="left" data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">On January 5, 1988, the patient was moved to a skilled care nursing
            home. The doctors there conferred with her oncologist about her condition.
            On Wednesday, January 6, 1988, the patient told me she had no pain

            to the bathroom. Also, the resident doctor told her that they determined
            by studying x-rays, C.A.T. scans, and by other means, that she did
            not have any cancer in her spine. Instead, they thought her back
            pain was being caused by osteoporosis. Further, they told her that
            all tests they performed on her showed no trace of any cancer.</span></p><span data-dcnode-id="998" instrument_node="">
</span><p align="left" data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">I talked with the patient on Friday, January 8, 1988. Her mental

            could walk, unaided, to the bathroom by herself, although I walked

</span><p align="left" data-dcnode-id="951"></p><span data-dcnode-id="950" instrument_node="">
</span><p align="left" data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Magnetic energy is a structuring force of the universe. As such,
            it is a reflection of the order that causes the infinite stars and
            planets throughout the galaxies to revolve and spin at incredible
            velocities while remaining in their respective orbits. As one of
            the four fundamental forces of nature along with gravity, nuclear
            energy and radioactivity, electromagnetism is equivalent in definition
            to the Traditional Chinese Medicine (TCM) concept of ‘Qi’,
            or the East Indian Ayurvedic definition of ‘Prana’. These
            concepts are what many in the West, regard as the ‘life force’.</span></p><span data-dcnode-id="947" instrument_node="">
</span><p align="left" data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">Personally, I have had long occasion to experiment and use magnets
            beginning with myself and then extending to family, friends, students
            and patients. Two particular occasions on myself were most convincing.
            Both were soft tissue injuries, one to my elbow and the other, a
            ligament injury of my knee which I will describe further on. </span></p><span data-dcnode-id="944" instrument_node="">
</span><p align="left" data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">The elbow pain stemmed from an unknown cause, perhaps an injury
            or strain. It had persisted for at least 2 weeks during that time
            I tried acupuncture and herbal treatments which offered only minor
            temporary relief. As is well known, soft tissue injuries can take
            some time for repair. It would be most helpful, however, if during
            that time, there was a simple, non-invasive method to hasten the
            healing and relieve the pain. </span></p><span data-dcnode-id="941" instrument_node="">
</span><p align="left" data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">I decided to experiment using magnets to treat the problem. While
            I had previously heard of magnet therapy, basically that there was
            a difference therapeutically between the magnet’s North and
            South polarities, I had no previous experience or further knowledge
            of their use. When I taped a small 1000 Gauss acuband magnet directly
            on the skin over the ‘trigger’ point or center of the pain
            in my arm. I was amazed to find that the pain almost completely disappeared
            within 5 minutes. I decided to experiment further, first by removing
            and reapplying the magnet a few times. Each time the pain returned
            when the magnet was removed and all but completely disappeared again
            when reapplied. I then experimented by turning the magnet over to
            change its polarity from North, which is cooling and dispersing,
            to South, which is heating and building. I discovered that when the
            South side of the magnet was against the skin, the pain intensified
            and by reversing the magnet to North, it was alleviated. </span></p><span data-dcnode-id="938" instrument_node="">
</span><p align="left" data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Since that time, I have been intrigued with the therapeutic possibilities
            of bio-magnetic therapy. However, I still had no idea whether the
            magnet treatment to my arm was only symptomatic or could eventually
            promote complete healing. Further, I found that there was discrepancies
            both in print and from various distributors concerning the importance
            and definition of the North and South sides of a magnet. Despite
            my confusion, I tentatively began to use magnets on my patients.
            Because, however, I had such an unsure grasp of any basic theoretical
            or practical methodology, my results were inconclusive. </span></p><span data-dcnode-id="935" instrument_node="">
</span><p align="left" data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">I say all this because there may be others who, like myself, felt
            or presently feel unsure about the value and results of an experience
            of biomagnetic therapy. Through my example they may appreciate a
            further corroboration by another who has become fully convinced that
            biomagnetic therapy may well be one of the safest and most powerful
            natural healing methods, especially for the relief of pain ever discovered
            by humankind. </span></p><span data-dcnode-id="932" instrument_node="">
</span><p align="left" data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">My interest in magnets was rekindled a few years later when I had
            a crippling soft tissue injury to the medial aspect of my right knee.
            It was particularly debilitating because there were few positions
            either standing, sitting or reclining that could provide relief.
            Having nearly all but forgotten about my previous experience with
            the magnets on my elbow, I began by using acupuncture, moxabustion
            (heat applied to specific acupuncture points) and herbal poultices,
            fomentations and liniments. Everything helped but I still could barely
            walk or find a comfortable position to either sit or recline. </span></p><span data-dcnode-id="929" instrument_node="">
</span><p align="left" data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">I certainly was not looking forward to having to stand and be present
            at a forthcoming natural products trade show that included a promised
            diversion to my excited young son to a nearby entertainment park.
            In desperation I remembered the all-but-forgotten magnets that I
            stored in a cupboard near my bed. I systematically applied the North
            magnets to the trigger points located near the site of pain around
            my knee. Estimating what meridians were involved, I positioned the
            South magnets further up the femur and hip on the Gall Bladder and
            Bladder Meridians. I found, however, that it was the local application
            of the North magnets around the knee that was most effective. Within
            two hours after their application, the pain was 95% gone. </span></p><span data-dcnode-id="926" instrument_node="">
</span><p align="left" data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Again, I decided to conduct the same experiments on my knee that
            I had done a few years previous on my elbow pain, by removing and
            reapplying them, changing the magnets to irrelevant locations and
            reversing their polarity. My previous findings were absolutely corroborated.
            I eventually discovered that I needed to wear the magnets on the
            trigger points around my knee nearly continuously for about two months
            before the problem became sufficiently stabilized and resolved. </span></p><span data-dcnode-id="923" instrument_node="">
</span><p align="left" data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">After this second powerful experience with bio-magnetic therapy,
            I decided to apply magnets on all my patients along with the acupuncture,
            dietary and herbal therapy that was part of my normal practice. I
            wanted to discover for myself the range of their effectiveness for
            a wide variety of complaints. Since that time, I have found biomagnetic
            therapy to be around 90% effective for the relief of pains and conditions
            caused by inflammation. For examples, a woman with diagnosed symptoms
            of colitis, had tried many forms of conventional and non-conventional
            treatment over the year previous but was relieved with the application
            of magnets to her lower abdomen within a week. Another man with arthritis
            in his hands and fingers with only minimal response from acupuncture
            and herbal therapy used magnetic balls to relieve and eventually
            remedy his condition completely. Similarly, another man had encroaching
            stiffness in his fingers that was threatening to impair his main
            love, playing the guitar. He also found the results he was seeking
            with the use of magnetic balls. As a pianist, I can only imagine
            the benefit these simply magnetic balls could be to the many who
            have suffered injury from repetitive use or wrong playing. </span></p><span data-dcnode-id="920" instrument_node="">
</span><p align="left" data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Everyone, who had acute or chronic lower back, elbow or knee problems
            found relief and in many cases, complete recovery from the local
            application of magnets. Patients with asthma, found that the application
            of magnets to their upper back or chest would provide them the relief
            they desperately needed without any further external medication.
            The list goes on to include patients with upper respiratory allergies,
            gastro-intestinal and digestive complaints, migraine headaches --
            all were relieved with the use of magnets -- and the list of conditions
            continues to expand. Now with the expanded methods of application
            using magnetized water, magnetized oils, magnetic mattresses and
            mattress pads, jewelry and so forth, I am convinced that there is
            no condition that bio-magnetic therapy would not be at least helpful. </span></p><span data-dcnode-id="917" instrument_node="">
</span><p align="left" data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Because of my experience with traditional Eastern systems of medicine,
            including Traditional Chinese Medical (TCM) and East Indian Ayurvedic
            medicine, I was able to tangibly experience the fundamental energetic
            basis of healing with magnets described in various traditional healing
            systems around the world. I could tangibly understand that the North
            facing side of a magnet was equivalent in energy to the definition
            in TCM of Yin, or in Ayurveda of Shakti energy. The South facing
            side was equivalent to TCM Yang, or Ayurvedic Shiva energy. I also
            understood that the relative strength of a magnet determined whether
            it was to be used as an important energetic nutrient when in low
            strength (under 1000 gauss), or a high powered therapeutic tool in
            high strength (over 3000 gauss) that should be used with due respect.
            Essentially, like other forms of natural healing energy, if reasonably
            used, magnets are very forgiving. Except for the obvious contraindications
            noted, it is rare that anyone would experience anything more than
            a minor discomfort or aggravation usually caused by using magnetics
            that are too strong, applying the wrong North-South polarity for
            a given area or generally an overexposure to a strong magnetic field.
            If, for instance, one misapplies them over a wrong area, uses the
            wrong polarity or uses magnets that are inappropriately too strong,
            there may be a period of minor aggravation and discomfort that is
            easily remedied as soon as they are appropriately changed or removed.
            As with herbs, acupuncture and all other systems of natural healing,
            trial and error is a valid approach to biomagnetic therapy.</span></p><span data-dcnode-id="914" instrument_node="">
</span><p align="left" data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Science recognizes a close relationship between electricity and
            magnetism. In 1820, Hans Oersted of Denmark discovered a direct relationship
            between electricity and magnetism by showing that an electric current
            flowing in a wire caused a nearby compass needle to be deflected.
            Following the discoveries of Oersted, Ampere, the 18th century physicist
            whose notable achievements were germinal to the harnessing of electrical
            energy, discovered a quantitative relationship between the strength
            of an electric current with the magnetic field it creates (Ampere’s
            theorem). Noting the close relationship between electricity and magnetism,
            he described magnetism as “electricity thrown into curves”. </span></p><span data-dcnode-id="911" instrument_node="">
</span><p align="left" data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Just as the stars and planets revolve in galactical orbits, each
            atom has a nucleus around which spins various positively charged
            protons and negatively charged electrons that in turn generate a
            magnetic field. To reiterate, health represents a balance of these
            positive and negative forces described in TCM as Yin and Yang, in
            Ayurvedic medicine as ‘Shiva’ and ‘Shakti’, and
            in Western physiology as the sympathetic and parasympathetic systems. </span></p><span data-dcnode-id="908" instrument_node="">

</span><p align="left" data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">The Earth’s magnetic field strength is about a half gauss.(1)

</span><p align="left" data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">With the exploration of space in the 1960’s, there came increased

</span><p align="left" data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Part of the Earth’s magnetic field is created by the ‘ionosphere’--

            some thousands of miles into space is the ‘magnetosphere’,
            sometimes called Van Allen Radiation Belt, after the scientist who
            discovered it. This is a huge swarm of radioactive particles that
            are threatening to life. If it were not for the fact that the harmful
            radiation particles are trapped by the Earth’s magnetic field,
            life on Earth would be impossible.</span></p><span data-dcnode-id="866" instrument_node="">
</span><p align="left" data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">The half gauss strength of the Earth seems to be in a state of cyclic

            about 50% of what it was 500-1000 years ago, with a full 5% decline

            importance of geomagnetic energy to life. </span></p><span data-dcnode-id="863" instrument_node="">
</span><p align="left" data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Drs. Barnwell and Brown of the Department of Biological Sciences,

</span><p align="left" data-dcnode-id="718"><span data-dcnode-id="721" instrument_node="">Magnets</span><br data-dcnode-id="720"><span data-dcnode-id="719" instrument_node="">
            Materials used for magnets are those whose atoms can be permanently
              or semi-permanently lined up. Of all magnetic materials, an alloy
              comprised of one-fifth cobalt and four fifths platinum makes the
              most powerful magnet. Other materials used for magnets are Alnico
              magnets comprised of an alloy of aluminum, nickel, iron, cobalt
              and copper. These are about 10 times more powerful than steel magnets
              and 100 times more powerful than the Earth’s magnetic field.
              Ferrite magnets are comprised of carbonates of barium and iron.
              They are very powerful and significantly cheaper than alnico magnets
              but have the disadvantage of being very fragile. </span></p><span data-dcnode-id="717" instrument_node="">
</span><p align="left" data-dcnode-id="713"><span data-dcnode-id="716" instrument_node="">MAGNETIC FIELDS</span><br data-dcnode-id="715"><span data-dcnode-id="714" instrument_node="">

</span><p align="left" data-dcnode-id="708"><span data-dcnode-id="711" instrument_node="">Magnetic Poles</span><br data-dcnode-id="710"><span data-dcnode-id="709" instrument_node="">

    and effects of the two poles of a magnet as being the same. The years of
    research by Dr. Albert Roy Davis Ph.D., based on isolating and measuring
    the effects of the two poles has confirmed the different reactions they produce
    on living systems. </span></p><span data-dcnode-id="707" instrument_node="">
</span><p align="left" data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Dr. Davis was able to measure the direction of electron spin given
            off and transmitted from the two ends of magnet’s poles. From
            this, he was able to determine that the spin of the electrons were
            in reverse of each other. The electrons coming from the South pole
            of the magnet cycled and moved clockwise, to the right while those
            emanating from the North pole moved and cycled to the left or counterclockwise.
            (4)</span></p><span data-dcnode-id="704" instrument_node="">
</span><p align="left" data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">This was confirmed from the use of complex technical magnetometers
            measuring the magnetic field of Earth from space. It was discovered
            that magnetic energy moves in an spiral forming the infinity pattern.
            Upon leaving either the North or South poles it travels halfway backward,
            clockwise or counterclockwise depending upon the exiting pole, to
            reenter and rephase itself inwards where it takes on the reverse
            spin in the opposite direction. </span></p><span data-dcnode-id="701" instrument_node="">
</span><p align="left" data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Dr. Davis was able to use a cathode ray vacuum to photograph in
            color the different North and South energies emitted from a long
            bar magnet. By a series of experiments first on animals and seeds
            and then on various fluids and foods, he was able to observe the
            physical effects on living systems. He confirmed the positive effects
            of the South pole energies in promoting rapid growth, fertility and
            a general metabolically heating effect as opposed to the inhibiting
            negative effects of the North pole that had a quieting, soothing
            and metabolically cooling effect. </span></p><span data-dcnode-id="698" instrument_node="">
</span><p align="left" data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Using untreated seeds as a comparison guide, Dr. Davis conducted
            a series of laboratory experiments on seeds and vegetables that were
            first exposed to the South pole magnet. An analysis of the end products
            of these plant products showed a noticeable increase in protein,
            sugars and oils as opposed to the control group. In contrast, those
            exposed to the North pole were lower in protein, sugars and oils
            than the control group.</span></p><span data-dcnode-id="695" instrument_node="">
</span><p align="left" data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">He then studied the effect of South and North pole to the development
            and growth of Earthworms. Again, worms treated with South pole energy
            multiplied faster, grew more and larger than those treated with North
            pole energy. The protein of Earthworms is approximately 90% on the
            average but the effect of the South pole evidenced a marked increase
            of their protein content. He was also able to corroborate similar
            results on the growth of mice and rats. </span></p><span data-dcnode-id="692" instrument_node="">
</span><p align="left" data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">As stated, the difference between magnetized and demagnetized material
            was that electrons in a magnetized object are aligned to go in a
            single rather than a seemingly randomized direction. The direction
            follows the magnetic poles of the Earth between the Southern and
            Northern hemispheres. (5) </span></p><span data-dcnode-id="689" instrument_node="">
</span><p align="left" data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Following the system described by Davis and Rawls, the bio-North
            (-) pole of a magnet has the same polarity as the true geographic
            North pole of the Earth. This bio-magnetic definition of North and
            South is in contradistinction to that of the National Bureau of Standards
            (NBS).</span></p><span data-dcnode-id="686" instrument_node="">
</span><p align="left" data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">To determine the North-South direction of a magnet, tie a thread
            to the center of the magnet bar and the other end to a high place
            such as a ceiling or door frame. The suspended magnet will tend to
            spin and eventually position itself in the direction of geographical
            North and South as is determined by a compass. Permanently mark as
            South the side facing the South pole of the magnet with red paint
            or fingernail polish. With one marked magnet, it can be lined up
            and used to indicate the polarity of all other magnets.</span></p><span data-dcnode-id="683" instrument_node="">
</span><p align="left" data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Another method is to align the needle of a compass to point North.
            Bring one side or end of the magnet near the compass. The side of
            the magnet that is able to attract the North end of the compass needle
            is to be marked as North. All other magnets can be so marked and
            aligned to conform to one predetermined indicator magnet. </span></p><span data-dcnode-id="680" instrument_node="">
</span><p align="left" data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">The gauss level employed is dependent upon the severity and duration
            of a complaint, together with the age and condition of the patient.
            It is always best to begin treatment with a low to medium gauss range
            and then increase to higher strength as necessary. On infants, young
            children, the frail and elderly, use only low strength magnets. </span></p><span data-dcnode-id="677" instrument_node="">
</span><p align="left" data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Finally, many biomagnetic therapists believe that magnets whose
            gauss measure less than 2500 can be used irrespective of their North
            or South polarity. It is my experience that the quickest and most
            dramatic results is when the North and South are appropriately applied
            according to an evaluation of the condition to be treated. </span></p><span data-dcnode-id="674" instrument_node="">
</span><p align="left" data-dcnode-id="670"><span data-dcnode-id="673" instrument_node="">THE CARE AND HANDLING OF MAGNETS</span><br data-dcnode-id="672"><span data-dcnode-id="671" instrument_node="">
            To prevent them from losing their power or becoming totally broken
              and destroyed, magnets must be carefully handled. Dropping a magnet
              or subjecting it to a sharp blow may cause it to lose much of its
              strength. Furthermore, magnets subjected to temperatures in excess
              of 400 to 500 degrees Fahrenheit will lose all of their energy. </span></p><span data-dcnode-id="669" instrument_node="">
</span><p align="left" data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">U-shaped magnets need to be placed on a flat bar or cylinder so
            that both ends of the magnet make contact with the metal. This is
            called a “Keeper” and prevents the dissipation of their
            magnetic power. For long, flat, wide surface magnets, bend a piece
            of iron, a tin can or a metal bar that can be fastened to both ends
            to provide a passage of energy between both poles and again prevent
            its lose into space. Try to keep different sizes and strengths of
            magnets away from each other to prevent them from bleeding off their
            charges.</span></p><span data-dcnode-id="666" instrument_node="">
</span><p align="left" data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">All magnets can be stuck together but they should be positioned
            so that they are symmetrical in a single row and not balled up in
            any way with magnets of various sizes hanging off the ends. This
            is especially true of inferior quality magnets while with higher
            quality industrial strength magnets this is not a consideration. </span></p><span data-dcnode-id="663" instrument_node="">
</span><p align="left" data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Finally, magnets can be dangerous. The attractive force of even
            two 25 pound magnets is capable of inflicting serious injury to pinched
            fingers or other bodily parts that may get caught in their way. It
            is easier to handle strong magnets if they are wrapped in some kind
            of thin soft fiber such as a cotton wash towel. </span></p><span data-dcnode-id="660" instrument_node="">
</span><p align="left" data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Summary of Precautions in the Handling and Use of Magnets</span></p><span data-dcnode-id="657" instrument_node="">
</span><p align="left" data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">a. Remove battery powered wristwatches and any other magnetic objects
            whose field can be altered by the presence of an externally applied
            magnet. </span></p><span data-dcnode-id="654" instrument_node="">
</span><p align="left" data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">b. Avoid dropping, banging or heating magnets above 700 degrees
            Fahrenheit as this may dissipate their strength. </span></p><span data-dcnode-id="651" instrument_node="">
</span><p align="left" data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">c. For U shaped magnets, use a “keeper” to connect the
            two ends when it is not in use.</span></p><span data-dcnode-id="648" instrument_node="">
</span><p align="left" data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">d. Be careful in handling large heavy magnets as one can injure
            a body part if they were to suddenly slam together from a distance.</span></p><span data-dcnode-id="645" instrument_node="">
</span><p align="left" data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">e. If possible, do not allow different sized magnets to remain together. </span></p><span data-dcnode-id="642" instrument_node="">
</span><p align="left" data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">f. Keep magnets away from homeopathic remedies, computer hard drives,
            recording tape, credit cards, videos and CD’s to prevent their
            being damaged or erased. Magnets should also be kept away from battery
            operated watches, hearing aids and from individuals who have a pacemaker
            or any metallic parts placed in their body. </span></p><span data-dcnode-id="639" instrument_node="">
</span><p align="left" data-dcnode-id="635"><span data-dcnode-id="638" instrument_node="">MAGNET THERAPY</span><br data-dcnode-id="637"><span data-dcnode-id="636" instrument_node="">
  Biomagnetic therapy is used for the control of pain, to stop infections, heal
    bones and scar tissue, rejuvenation of cells and balancing the body’s
    energy levels. It can also be effectively combined with most other therapeutic
    modalities. The strength of the magnetic field chosen is based on the magnetic
    strength, shape and size of the magnet selected based on the following considerations:</span></p><span data-dcnode-id="634" instrument_node="">
</span><p align="left" data-dcnode-id="622"><span data-dcnode-id="633" instrument_node="">duration of the ailment </span><br data-dcnode-id="632"><span data-dcnode-id="631" instrument_node="">
  severity of the condition </span><br data-dcnode-id="630"><span data-dcnode-id="629" instrument_node="">
  total area to be treated </span><br data-dcnode-id="628"><span data-dcnode-id="627" instrument_node="">
  whether the diseased tissue is superficial or deep </span><br data-dcnode-id="626"><span data-dcnode-id="625" instrument_node="">
  the patient’s sensitivity </span><br data-dcnode-id="624"><span data-dcnode-id="623" instrument_node="">
  THERAPEUTIC APPLICATION OF THE South and North poles</span></p><span data-dcnode-id="621" instrument_node="">
</span><p align="left" data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Understanding and utilizing the unique application of the North
            and South poles of a magnet is fundamental to any biomagnetic therapeutic
            application. </span></p><span data-dcnode-id="618" instrument_node="">
</span><p align="left" data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">The North pole of the magnet is cooling, sedating and dispersing.
            This corresponds to Traditional Chinese medicine definition of Yin
            or negative polarity. </span></p><span data-dcnode-id="615" instrument_node="">
</span><p align="left" data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">The South polarity is heating, stimulating and accumulating. This
            corresponds to the TCM Yang or positive polarity. </span></p><span data-dcnode-id="612" instrument_node="">
</span><p align="left" data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">All descriptions of positive and negative are not qualitative definitions
            but express the relationship between the opposite poles to each other
            and outer phenomena.</span></p><span data-dcnode-id="609" instrument_node="">
</span><p align="left" data-dcnode-id="601"><span data-dcnode-id="608" instrument_node=""> Indications Contraindications </span><br data-dcnode-id="607"><span data-dcnode-id="606" instrument_node="">
            SOUTH Tonifying, strengthening, building, heating, Yang in nature.
              Can be used for pains caused by weakness, coldness and deficiency
              (usually of a more chronic and ‘achy’ nature), also for
              hypometabolic conditions associated with low energy, weak digestion
              and weak immune system. Not for acute inflammatory conditions,
              bacterial infections, cancers and tumors, excess and stagnation
              conditions, excess Yang </span><br data-dcnode-id="605"><span data-dcnode-id="604" instrument_node="">
  NORTH Clearing, eliminative, detoxifying, dispersing, cooling, Yin in nature.
  Can be used for acute pains (sharp or burning) caused by heat, inflammation,
  hyper metabolic conditions, hypertensive conditions, insomnia, nervousness,
  infections and inflammations. Not for deficiency conditions, coldness, low
  metabolism, weakness </span><br data-dcnode-id="603"><span data-dcnode-id="602" instrument_node="">
  SOUTH AND NORTH COMBINED When pain, infection or another condition has gotten
  to a point where the body apparently lacks both the positive and negative energies
  to fully recover, both poles should be applied. This can be done either by
  alternating the application of North and South every 15 minutes or by applying
  a number of both North and South acu-magnets simultaneously over an area. This
  approach can also be used if the site of pain encompasses a large area. This
  is equivalent to a deficiency of both Yin and Yang. This harmonizing approach
  is one of the most commonly used because conditions are seldom either/or. It
  is especially useful when a single center of the pain or disease extends over
  a larger area or cannot be discerned. The disadvantage is that if the particular
  site can be found and appropriately treated, positive results are quicker. </span></p><span data-dcnode-id="600" instrument_node="">
</span><p align="left" data-dcnode-id="596"><span data-dcnode-id="599" instrument_node="">Therapeutic application of North</span><br data-dcnode-id="598"><span data-dcnode-id="597" instrument_node="">
            The North magnetic pole is inhibiting and sedating. It slows down
              cellular metabolism. Because of this, it is cooling, soothing and
              retarding and useful for painful or inflammatory conditions such
              as:</span></p><span data-dcnode-id="595" instrument_node="">
</span><p align="left" data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Arthritis, spondylitis, prostatitis, lumbago, chronic and acute
            headaches, bruises, injuries, and sharp pains, bacterial infections,
            dysentery, skin ailments such as eczema, psoriasis and ringworm,
            tumors, mental retardation, epilepsy, cataract, glaucoma, neuralgia,
            nervousness, insomnia and initially on hernias.</span></p><span data-dcnode-id="592" instrument_node="">
</span><p align="left" data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">It can be applied for the initial inflammatory response to any injury.
            When a condition assumes a more chronic state, however, one may need
            to switch to the more tonifying South pole to relieve symptoms.</span></p><span data-dcnode-id="589" instrument_node="">
</span><p align="left" data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">North energies over 7000 gauss retard bacterial growth as well as
            cell and tissue regeneration. In the September 1990 “Journal
            of the National Medical Association”, it is clearly shown how
            the North magnetic pole inhibits the growth of lung carcinoma cells.
            In general, the North polarity tends to have a normalizing effect
            regardless of the length of exposure. </span></p><span data-dcnode-id="586" instrument_node="">
</span><p align="left" data-dcnode-id="582"><span data-dcnode-id="585" instrument_node="">Therapeutic Application of the South</span><br data-dcnode-id="584"><span data-dcnode-id="583" instrument_node="">
            The South magnetic pole is heating, tonifying and augmenting and
              increases cellular metabolism. It can be used for the following
              conditions:</span></p><span data-dcnode-id="581" instrument_node="">
</span><p align="left" data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Paralysis, leucoderma, alopecia, hernia (later), asthma, tingling
            and numbness, to strengthen weak muscles and tissues, comatose conditions,
            after debilitating illness such as tuberculosis, gastroenteritis,
            scars, etc.</span></p><span data-dcnode-id="578" instrument_node="">
</span><p align="left" data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Because South promotes growth, it should never be directly applied
            on cancerous tumors, bacterial or viral infections or parasites.
            For regeneration of cells and tissues, magnets over 7000 gauss are
            extremely effective. </span></p><span data-dcnode-id="575" instrument_node="">
</span><p align="left" data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Applying Complete North and South Pole Magnetic Therapy</span></p><span data-dcnode-id="572" instrument_node="">
</span><p align="left" data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">The bioelectrical force of the right side of the body is more Yin
            and inhibitory. If there is a lack of the Yin-inhibitory force, the
            left sided Yang-stimulating bioelectrical activity will appear to
            be in excess. This represents False Yang or Yin Deficiency. It can
            manifests as apparent hyperactivity with symptoms such as high blood
            pressure, hyperthyroidism, palpitations, hyperacidity, etc., all
            within the overall context of Deficiency and wasting. For these conditions,
            apply a Yang South magnet to the inside of the right wrist to restore
            equilibrium and harmony. </span></p><span data-dcnode-id="569" instrument_node="">
</span><p align="left" data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">If the Yang left-sided energies of the body are weaker than the
            right-sided Yin, there will be hypoactive or apparent excess Yin
            symptoms. These can include low blood pressure, hypothyroidism, sluggish
            bowel movements, general lethargy, fluid retention and edema and
            hypoglycemia. These conditions are treated by applying the South
            pole to the inside of the left wrist.</span></p><span data-dcnode-id="566" instrument_node="">
</span><p align="left" data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">Chronic pains, including chronic arthritic and rheumatic pains may
            also require bipolar treatment. Treating large organs systems such
            as the Liver and Kidneys also seem to respond better to the use of
            bipolar treatment. </span></p><span data-dcnode-id="563" instrument_node="">
</span><p align="left" data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">To speed the mending of fractures by at least half, dual poles are
            used. South should be applied to the upper side of the break and
            North applied to the lower side. </span></p><span data-dcnode-id="560" instrument_node="">
</span><p align="left" data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">Magnets come in many shapes and forms. Following are some of the
            more common ones that are used therapeutically used:</span></p><span data-dcnode-id="557" instrument_node="">
</span><p align="left" data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">BI-POLAR MAGNETS AND THEIR THERAPEUTIC APPLICATIONS</span></p><span data-dcnode-id="554" instrument_node="">
</span><p align="left" data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">In an attempt to utilize the combined North-South poles various
            bipolar magnets have been used. In 1981, a Swiss scientist Arno Latske
            introduced an alternating polarity magnet. He observed that when
            these bipolar magnets were applied over areas of pain, relief and
            healing occurred as a result of charged articles (i.e. electrolytes
            in the blood) that passed perpendicular to the magnetic field as
            a result of what in physics is called the Hall Effect. The North-South
            poles of the magnet were arranged in perpendicular strips so that
            the optimal response occurred with blood vessels that directly crossed
            the bipolar North-South magnetic strips. However, those vessels did
            not cross the bipolar arrangement sufficiently had the least therapeutic
            effect.</span></p><span data-dcnode-id="551" instrument_node="">
</span><p align="left" data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Next, a German scientist Horst Baermann, in an attempt to improve
            the Hall Effect, developed a magnet with concentric North-South strips
            The problem is that if the blood vessels did not cross near the center
            of the circle, there was little benefit from the alternating current.</span></p><span data-dcnode-id="548" instrument_node="">
</span><p align="left" data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">In an attempt to circumvent the shortcoming of the previous two
            designs, an American engineer, Vincent Ardizzone, of Nu-Magnetics,
            Inc., NY, developed a checkerboard design that accommodate the random
            design of blood vessels. While the previous two designs had only
            two sides per pole adjacent to opposite poles, the four-sided checkerboard
            pattern significantly increased the possibility of a blood vessel
            being exposed to cross alternating poles. This design also allowed
            for the magnet to be cut into various shapes and sized without intervening
            gaps.</span></p><span data-dcnode-id="545" instrument_node="">
</span><p align="left" data-dcnode-id="541"><span data-dcnode-id="544" instrument_node="">Acu Band Magnets</span><br data-dcnode-id="543"><span data-dcnode-id="542" instrument_node="">
            These are usually 0.16’ dia x 0.06’ thick and come with
            0.8” dia Band-Aids. They are available in varying Gauss strengths
            and different alloys, usually in packets of 12. The most effective
            in my experience are acuband magnets that range from 3000 to 9000
            gauss. Some are marked with a grove to indicate the North side, while
            others have a tiny protrusion, indicating the South. </span></p><span data-dcnode-id="540" instrument_node="">
</span><p align="left" data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">One or more are taped directly over or near the affected site or
            acupuncture points, using either the North or South polarity as appropriate.
            Magnets with opposite polarity can be applied directly opposite or
            distally along a line or acupuncture meridian located nearest the
            affected area. North or South polarity can be used over acupuncture
            points and/or centers diagnostically related to the primary symptom. </span></p><span data-dcnode-id="537" instrument_node="">
</span><p align="left" data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">For instance:</span></p><span data-dcnode-id="534" instrument_node="">
</span><p align="left" data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">For acute colds and flu tape North facing magnets to Large Intestine
            4, Large Intestine 11, Triple Warmer 5 and Governor 14.</span></p><span data-dcnode-id="531" instrument_node="">
</span><p align="left" data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">For chronic back ache that is not inflamed, tape South facing magnets
            over Bladder 23 and Kidney 3. One can apply a North directly over
            the acute ‘trigger’ points of pain and further down the
            Bladder meridian over Bladder 40 (aka 54) behind the knee.</span></p><span data-dcnode-id="528" instrument_node="">
</span><p align="left" data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">For insomnia apply a North magnet to Yin Tang point between the
            eyebrows and two North magnets to one of the two Anmien points behind
            the ear.</span></p><span data-dcnode-id="525" instrument_node="">
</span><p align="left" data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">For fatigue and low energy apply South magnets to stomach 36, conception
            vessel 6 or 4 and bladder 23 on the lower back. In addition, one
            can also apply a North magnet to large intestine four on the hand
            to help clear any Heat and toxicity.</span></p><span data-dcnode-id="522" instrument_node="">
</span><p align="left" data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">For promoting the healing of fractures apply alternating South and
            North magnets directly along the affected area. These can be simultaneously
            used with North to reduce any inflammation in the area. </span></p><span data-dcnode-id="519" instrument_node="">
</span><p align="left" data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">These are only a few of many possibilities based on a knowledge
            of acupuncture meridians and points. It is a good idea to have a
            razor available to shave off any hair that may prevent the Band-Aid
            from sticking. Acu-magnets can be left on for a week, taken off briefly
            and reapplied if they are still needed. If there is any prolonged
            aggravation or discomfort, they should be removed or reverse the
            North-South polarity.</span></p><span data-dcnode-id="516" instrument_node="">
</span><p align="left" data-dcnode-id="512"><span data-dcnode-id="515" instrument_node="">Large Block Magnets</span><br data-dcnode-id="514"><span data-dcnode-id="513" instrument_node="">
            These are iron ferrite magnets which can be purchased from industrial
              magnet manufacturers and come in various sizes and very high Gauss.
              Since these are made of fragile ceramic, they are not easy to handle.
              In general one should learn the technique of sliding them apart
              or together when needed and keep delicate fingers out of the way
              in case they inevitably snap together. </span></p><span data-dcnode-id="511" instrument_node="">
</span><p align="left" data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">Smaller ones can be ordered in various sizes and dimensions and
            are available in dual color to easily distinguish between the North
            and South polarity. The strength of these magnets may be deceptive.
            They are usually available from 1000 to 3600 gauss or higher. Because
            they cover a larger area, even a lower strength magnet can exert
            a powerful therapeutic effect. Two magnets can be used to attach
            to clothing, North or South as needed. </span></p><span data-dcnode-id="508" instrument_node="">
</span><p align="left" data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">The highest Gauss magnets are Neodymium (NeoMax) magnets. They are
            composed of iron, boron and neodymium, one of the rarest metals on
            Earth and their strength range from 2000 to 3600 gauss. Their use
            was first promoted by the International Medical Research Center based
            on the discovery and work of Professor Goesta Wollin’s development
            of a Universal Cancer Spiral Theory. Professor Wollin discovered
            that spirals are found throughout nature, down to the basic shape
            and structure of DNA. In 1987, the Swedish press widely reported
            Professor Wollin’s discovery of the Universal Cancer Spiral.
            He claimed that when supermagnets are applied to cancerous tumors,
            the magnetic spirals, which are larger, would superimpose themselves
            and destroy the smaller cancerous cell spirals. </span></p><span data-dcnode-id="505" instrument_node="">
</span><p align="left" data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Professor Wollin’s round neodymium magnets were specifically
            developed to treat cancer. Usually they are sold in pairs. The North
            sided magnet is intended to be placed directly over the cancer or
            tumor while the South is worn over the thymus located on the sternum
            between the breasts. This is used to help stimulate the body’s
            immune system. While the North magnet directly over the site of the
            cancer can be left on for a prolonged period, the South over the
            thymus should only be applied twice daily for no longer than 30 minutes.</span></p><span data-dcnode-id="502" instrument_node="">
</span><p align="left" data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">These larger magnets are available encased in plastic and color

</span><p align="left" data-dcnode-id="200"></p><span data-dcnode-id="199" instrument_node="">
</span><p align="left" data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">.Present Day Observations on Magnetics</span></p><span data-dcnode-id="196" instrument_node="">
</span><p align="left" data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">--------------------------------------------------------------------------------</span></p><span data-dcnode-id="193" instrument_node="">
</span><p align="left" data-dcnode-id="190"><br data-dcnode-id="192"><span data-dcnode-id="191" instrument_node="">
            Variations in the earth's magnetic field are important to all living
              beings on the planet. Scientists are aware that this field is in
              a constant state of flux as it is influenced by the solar winds,
              shifts in the magnetic core, and the presence of ferromagnetic
              substances in the earth's crust.</span></p><span data-dcnode-id="189" instrument_node="">
</span><p align="left" data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">Current research shows that the earth's field periodically waxes
            and wanes, and even reverses itself entirely. Though the reasons
            for this are not currently known, geological evidence indicates that
            the strength of the field gradually grows weaker, reaches a minimum
            or disappears entirely, and then builds again the opposite direction.
            This results in a reversal of the North and South magnetic poles.
            Scientists estimate that such reversals take place about every one-half
            to one million years. The most recent reversal took place about 700,000
            years ago.</span></p><span data-dcnode-id="186" instrument_node="">
</span><p align="left" data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">Other scientist have documented that the earth's magnetic field
            has degraded about 50% over the last 500 - 1,000 years, with a full
            5% decline being recorded in the past 100 years. Calculations are
            that if this degradation continues at its present rate, there will
            not be a sufficient magnetic field to support life within 1500 years.</span></p><span data-dcnode-id="183" instrument_node="">
</span><p align="left" data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">Interestingly, certain locales on Earth have inexplicably retained
            the strength of their magnetic fields. Among them, areas such as
            Sedona, Arizona and Lourdes, France, are destinations to which countless
            persons travel annually to experience feelings of well-being and
            to seek healing.</span></p><span data-dcnode-id="180" instrument_node="">
</span><p align="left" data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">Much research and interest is now directed toward the electrical
            nature of life. Scientists have established beyond any doubt that
            all living cells are electrical in nature. The functioning of the
            cells and nervous system of every living being is based on direct
            current (DC) and pulsed DC energy. Without this energy, there is
            no life. Each individual cell possesses a positive electrical charge
            at its nucleus and a negative electrical charge on its outer membrane.</span></p><span data-dcnode-id="177" instrument_node="">
</span><p align="left" data-dcnode-id="175"><span data-dcnode-id="176" instrument_node="">This positive-negative polarization allows each cell to function
            in an orderly and healthy manner. As cells perform their normal bodily
            functions, this electromagnetic charge wears down. The body attempts
            to revitalize these "tired" cells by sending pulses of
            electromagnetic energy from the brain through the nervous system
            to recharge the cells and strengthen the polarized field.</span></p><span data-dcnode-id="174" instrument_node="">
</span><p align="left" data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">The energy can be diminished or blocked conditions found throughout
            today's environment, resulting in a host of modern maladies. These
            can range from headaches and fatigue to tumors and disruption of
            both circulatory and digestive systems, along with other specific
            and non-specific ailments.</span></p><span data-dcnode-id="171" instrument_node="">
</span><p align="left" data-dcnode-id="169"><span data-dcnode-id="170" instrument_node="">Noted researchers, including the U.S. Surgeon General, warn of the
            harmful effects of the "electric smog" from televisions,
            radio, radar, electric blankets, waterbed heaters, household appliances,
            excessive exposure to computers, power lines, and other sources.</span></p><span data-dcnode-id="168" instrument_node="">
</span><p align="left" data-dcnode-id="166"><span data-dcnode-id="167" instrument_node="">Sensitive instruments show that man's mushrooming alternating current
            (AC) electronic technology is creating interference with the earth's
            natural magnetic fields. Within the typical home or work environment,
            the AC radiation is sufficiently prolific enough to overpower the
            earth's natural magnetic field by up to 16 times. In today's buildings,
            the iron and steel alone can deplete the magnetic field by more than
            half.</span></p><span data-dcnode-id="165" instrument_node="">
</span><p align="left" data-dcnode-id="163"><span data-dcnode-id="164" instrument_node="">The earth produces its own direct current (DC) magnetic pulses that
            support the natural biorhythms of all living things. However, as
            mentioned earlier, scientists are becoming increasingly alarmed that
            the present-day magnetic field of the earth has and continues to
            diminish significantly.</span></p><span data-dcnode-id="162" instrument_node="">
</span><p align="left" data-dcnode-id="160"><span data-dcnode-id="161" instrument_node="">A radiation researcher at Arizona State University believes that
            the ordinary 60 cycle household AC electricity and higher frequencies
            such as those from radio broadcasts and radar can cause memory loss,
            headaches, changes in heart rates, blood chemistry and general malaise.</span></p><span data-dcnode-id="159" instrument_node="">
</span><p align="left" data-dcnode-id="157"><span data-dcnode-id="158" instrument_node="">European scientists report such daily exposure is cumulative and
            contributes to sluggishness, headaches, and both digestive and circulatory
            problems. At the University of Colorado in Boulder, Dr. Nancy Wertheimer
            has reported increased cancer among children in "high current" dwellings.</span></p><span data-dcnode-id="156" instrument_node="">
</span><p align="left" data-dcnode-id="154"><span data-dcnode-id="155" instrument_node="">According to Dr. William Adey, an American cancer researcher, this "electronic
            smog" can block the brains electromagnetic signals to the cells,
            thereby undermining the body's disease-fighting ability and promoting
            tumors.</span></p><span data-dcnode-id="153" instrument_node="">
</span><p align="left" data-dcnode-id="151"><span data-dcnode-id="152" instrument_node="">Dr. Robert O. Becker, M.D., one of America's pioneers in the field
            of research on regeneration and electrical currents in living things,
            has achieved what have been termed "miraculous" results
            in healing with biomagnetic therapy. He has gone so far as to speculate
            that electro-pollution, in addition to causing some cancers, may
            be contributing to the onslaught of such maladies as Reye's syndrome,
            Lyme disease, Legionnaire's disease, and AIDS.</span></p><span data-dcnode-id="150" instrument_node="">
</span><p align="left" data-dcnode-id="148"><span data-dcnode-id="149" instrument_node="">Kyoichi Nakagawa, M.D., one of the world's foremost authorities
            on magnetism and its therapeutic effects on the human body, claims
            that the continuing degrading of the earth's magnetic field, combined
            with mans electronic environment, is responsible for a broad range
            of ailments which he labels as the Magnetic Deficiency Syndrome.
            These ailments include stiffness of the shoulders, back pain, neck
            pain, uncertain low back pain, chest pains for no specific reason,
            habitual headache, heaviness of head, dizziness, insomnia for uncertain
            reasons, habitual constipation and general fatigue.</span></p><span data-dcnode-id="147" instrument_node="">
</span><p align="left" data-dcnode-id="141"><span data-dcnode-id="146" instrument_node="">I think it is worth noting, that in Japan, one out of every five
            households has some Natural Magnetic Field and/or Far Infrared Field
            product to assist in offsetting some of the difficulties cited.</span><br data-dcnode-id="145"><span data-dcnode-id="144" instrument_node="">
