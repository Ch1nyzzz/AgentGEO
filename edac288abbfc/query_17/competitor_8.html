</span><div class="td-post-featured-image" data-dcnode-id="1609"><figure data-dcnode-id="1610"><a class="td-modal-image" data-caption="© Little Black Cat / Adobe Stock" data-dcnode-id="1613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.todaysrdh.com/wp-content/uploads/2018/12/curing-tooth-decay-naturally.jpg"><img alt="" class="entry-thumb" data-dcnode-id="1614" height="464" sizes="(max-width: 696px) 100vw, 696px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.todaysrdh.com/wp-content/uploads/2018/12/curing-tooth-decay-naturally-696x464.jpg&amp;raw" srcset="https://www.todaysrdh.com/wp-content/uploads/2018/12/curing-tooth-decay-naturally-696x464.jpg 696w, https://www.todaysrdh.com/wp-content/uploads/2018/12/curing-tooth-decay-naturally-300x200.jpg 300w, https://www.todaysrdh.com/wp-content/uploads/2018/12/curing-tooth-decay-naturally-768x512.jpg 768w, https://www.todaysrdh.com/wp-content/uploads/2018/12/curing-tooth-decay-naturally-1024x683.jpg 1024w, https://www.todaysrdh.com/wp-content/uploads/2018/12/curing-tooth-decay-naturally.jpg 1068w, https://www.todaysrdh.com/wp-content/uploads/2018/12/curing-tooth-decay-naturally-630x420.jpg 630w" title="curing tooth decay naturally" width="696"></a><figcaption class="wp-caption-text" data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">© Little Black Cat / Adobe Stock</span></figcaption></figure></div><span data-dcnode-id="1608" instrument_node="">
</span><div class="today-b5670d893c855c556a30009f5d9112eb today-post-before-content-300x250" data-dcnode-id="1606" id="today-b5670d893c855c556a30009f5d9112eb"></div><p data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">The idea of “naturally” curing tooth decay is a fast-growing fad. It has become such a craze there are Facebook pages and groups encouraging and supporting the idea. One such group called, “Cure Tooth Decay – Heal Tooth Cavities, Dental Caries, Tooth Abscess,” is a closed group, in which you must be accepted to join, which I’ve recently learned is well-known for supporting this fad. Full disclosure, I am not a member. I have seen posts from this group, mainly from other dental professionals, who have gained access and tried to educate people on the importance of seeking professional dental care. I admire the people trying to educate; they are dental missionaries. I don’t generally get into arguments on the internet, no matter how strong my feelings are on a subject. Therefore, for the most part, I read the stories the missionaries brought back to the dental groups, but I didn’t allow myself to get too terribly upset.</span></p><div class="today-bc153edda9d91cd4a3012d35285f1f61 today-post-middle-300x200-new" data-dcnode-id="1603" id="today-bc153edda9d91cd4a3012d35285f1f61"></div><span data-dcnode-id="1602" instrument_node="">
</span><p data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">When several of the missionaries shared the same story multiple times, it piqued my interest, or rather, my concern. It was posted by a mother, who was seriously distraught that her almost 2-year-old had rampant caries across her upper anterior teeth, and two of the teeth were decayed to the gumline. The mother admitted she was aware the two severely decayed teeth would probably require extraction. I don’t understand why you would avoid professional dental care to repair a tooth, but acknowledge the need when the tooth is no longer salvageable. To add insult to injury, after watching this happen to your child, why would you continue this lifestyle? It made me so sad. I simply don’t understand choosing this for your children seems absurd.</span></p><span data-dcnode-id="1599" instrument_node="">
</span><p data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">I decided to go to the page, (side note here, there are two pages: a private “discussion forum” and a public page) and I contacted the administrator to see if they would be interested in a civil, non-judgmental interview to help me better understand their beliefs and practices. This is when I discovered there are almost 68,000 members in this forum! My head exploded; how in the world has dentistry failed this many people?! I sent a private message. I was desperate to know if it was due to the financial burden, fear, lack of trust, or a blatant disregard for modern medicine in general? I was curious if they believed in avoiding medical doctors as well.</span></p><div class="today-e9f10ef8be322d37919f96b4d5921d43 today-post-middle-300x200-new" data-dcnode-id="1596" id="today-e9f10ef8be322d37919f96b4d5921d43"></div><span data-dcnode-id="1595" instrument_node="">
</span><p data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">Unfortunately, but not surprising, I did not get a response. My message was very kind and unthreatening, but no dice. I did discover the basis of their beliefs come from the book “Cure Tooth Decay: Remineralize Cavities and Repair Your Teeth Naturally with Good Food,” by Ramiel Nagel. I would love nothing more than to have a sit down with Ramiel Nagel. Unfortunately, he died from cancer on July 28, 2017.</span></p><span data-dcnode-id="1592" instrument_node="">
</span><p data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">Because I couldn’t get a response via Facebook and Mr. Nagel is no longer with us, I decided to do my own research and see what I could learn about him and his recommended practices to cure tooth decay. His bio does not mention any formal education, dental, medical or otherwise. It only states, “His background is in body-oriented psychology, energy medicine, and yoga, and his writings focus on empowerment and self-responsibility in relation to health.” Originally, I thought I would buy his book and read it, but I couldn’t bring myself to pay $28.00 for something I just do not support. I decided to cheat and go to his website and soak up as much inaccurate information as possible.</span></p><div class="today-b6ce7970ac91c6c9856a714ab1950098 today-post-middle-300x200-new" data-dcnode-id="1589" id="today-b6ce7970ac91c6c9856a714ab1950098"></div><span data-dcnode-id="1588" instrument_node="">
</span><p data-dcnode-id="1580"><span data-dcnode-id="1587" instrument_node="">To sum it up, what I learned about his recommendations comes down to this: he claims tooth decay is caused by nutrient deficiencies and not bacteria. He also implies by simply changing your diet you can cure dental decay. If you are interested in exploring Ramiel’s work further, you can go </span><a data-dcnode-id="1585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.curetoothdecay.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1586" instrument_node="">here</span></a><span data-dcnode-id="1584" instrument_node="">. I did run across a well-documented interview with Mr. Nagel on a blog named Kitchen Stewardship, </span><a data-dcnode-id="1582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kitchenstewardship.com/i-dont-have-a-cavity-how-to-argue-with-your-dentist/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1583" instrument_node="">baby steps to real food and natural living</span></a><span data-dcnode-id="1581" instrument_node="">. My favorite quote from the interview is, “From my understanding, there should be more than one sign to indicate it needs to be filled. In other words, don’t get a filling just from a spot on an X-ray. This is still a form of conventional perspective. Even if an active cavity is found, it can still be remineralized, and drilling can be avoided. Often these types of cavities can be remineralized in 2-6 weeks time. Seeing one spot on an X-ray is not good justification.”</span></p><div class="today-658f58102dd65bc2121b417c0c77cefd today-post-middle-300x200-new" data-dcnode-id="1579" id="today-658f58102dd65bc2121b417c0c77cefd"></div><span data-dcnode-id="1578" instrument_node="">
</span><p data-dcnode-id="1573"><span data-dcnode-id="1577" instrument_node="">I do believe nutrition plays a key role in dental and overall health, and I do believe incipient lesions can and do remineralize, and they do not require treatment. I thought these lesions were to what he was referring, but you can find an X-ray of a tooth with severe decay the website claims is healing. You can see a large temporary filling that has been placed with indication of secondary dentin. The image is copyrighted so you will have to go </span><a data-dcnode-id="1575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.curetoothdecay.com/Tooth_Decay/heal_prevent_cavities.htm" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1576" instrument_node="">here</span></a><span data-dcnode-id="1574" instrument_node=""> to see it.</span></p><span data-dcnode-id="1572" instrument_node="">
</span><p data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">So, why am I writing all this? The first reason is that I can’t stop thinking about it; I’m concerned for all the people who really believe in this practice. The second and most important reason is that I hope at least one person will read this and be educated on the dangers of curing tooth decay “naturally.” Before I go further, I would like to say to my critics; I know some of the following information is extreme. In my defense it is science-based, and I personally feel like trying to cure a cavity with raw milk and cod liver oil is extreme. Therefore, I’m just following Ramiel Nagel’s lead. Keep reading for science-based facts.</span></p><div class="today-7aac1116b47cba43b94608cd8bfa6f92 today-post-middle-300x200-new" data-dcnode-id="1569" id="today-7aac1116b47cba43b94608cd8bfa6f92"></div><span data-dcnode-id="1568" instrument_node="">
</span><p data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">Life-threatening infections of odontogenic (tooth or surrounding tissue) or upper airway origin may extend to potential spaces formed by fascial planes of the lower head and upper cervical area. Complications include airway obstruction, mediastinitis, necrotizing fasciitis, cavernous sinus thrombosis, sepsis, thoracic empyema, Lemierre’s syndrome, cerebral abscess, orbital abscess, and osteomyelitis. The incidence of these “space infections” has been greatly reduced by modern antibiotic therapy. Odontogenic infections have been one of the most common diseases in the oral and maxillofacial region associated with a mortality rate of 10–40%. I would like to add, if you are following Ramiel Nagel’s advice, you refuse antibiotics. So, let’s dig into some of these complications that could arise.</span></p><span data-dcnode-id="1565" instrument_node="">
</span><p data-dcnode-id="1561"><strong data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">Sepsis</span></strong><span data-dcnode-id="1562" instrument_node=""> – Defined as the presence of confirmed or suspected infectious agents with two or more of the systemic inflammatory response syndrome criteria. (Systemic inflammatory response syndrome criteria include body temperature less than 96.8 degrees or greater than 100.4 degrees, heart rate greater than 90 beats per minute, respiratory rate greater than 20 breaths per minute, or white blood cell count greater than 12,000 or less than 4,000.) In a survey conducted, 18 deaths were reported out of 2,790 patients — one case included a 9-year-old patient developing toxic shock syndrome secondary to dental abscesses. Despite the treatment, the patient died two days after admission to intensive care unit because of multi-system organ failure.</span></p><div class="today-e102ece05c61985f5b63d9028484710a today-post-middle-300x200-new" data-dcnode-id="1560" id="today-e102ece05c61985f5b63d9028484710a"></div><span data-dcnode-id="1559" instrument_node="">
</span><p data-dcnode-id="1555"><strong data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">Respiratory Obstruction </span></strong><span data-dcnode-id="1556" instrument_node="">– This is another most concerning complication of odontogenic infections. Respiratory obstruction may be due to swelling of floor of mouth, trismus, edema, and abscess formation leading to narrowing and eventually to the loss of airway. Tracheal intubation in patients with deep neck infections is challenging. The distorted airway anatomy, tissue immobility, and limited access to the mouth make orotracheal intubation with rigid laryngoscopy difficult. No airway = no oxygen, you can do the math.</span></p><span data-dcnode-id="1554" instrument_node="">
</span><p data-dcnode-id="1550"><strong data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">Descending Necrotizing Mediastinitis </span></strong><span data-dcnode-id="1551" instrument_node="">– Of the reported cases of descending necrotizing mediastinitis, 60–70% originate from odontogenic infections. Although descending necrotizing mediastinitis is quite rare, this variety of mediastinitis is a highly lethal disease with a mortality rate of 37–60% and is frequently associated with pleural and pericardial effusion, compression of the local blood vessels, persistent sepsis, and multi-organ failure.</span></p><span data-dcnode-id="1549" instrument_node="">
</span><p data-dcnode-id="1545"><strong data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">Lemierre’s Syndrome</span></strong><span data-dcnode-id="1546" instrument_node=""> – Characterized by suppurative thrombophlebitis (venous thrombosis associated with inflammation in the setting of bacteremia) of the internal jugular vein, is a metastatic infection. In literature search for Lemierre’s syndrome, the primary site of infection was oropharynx in 59.5% of cases, followed by mastoiditis (15%), and 7 cases with a primary odontogenic infection (in the pre-antibiotic era, Lemierre’s syndrome carried a mortality rate of 83%). Reminder, if you are following Ramiel Nagel’s advice, you are living in the pre-antibiotic era.</span></p><div class="today-8fe8dc6a09e47aede61004033e03a26f today-post-middle-300x200-new" data-dcnode-id="1544" id="today-8fe8dc6a09e47aede61004033e03a26f"></div><span data-dcnode-id="1543" instrument_node="">
</span><p data-dcnode-id="1539"><strong data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">Cervical Necrotizing Fasciitis </span></strong><span data-dcnode-id="1540" instrument_node="">– Characterized by an extensive, severe progressive infection with dissection and necrosis of the soft tissues along the cervical planes, is associated with a mortality rate in between 20% and 40%. Bacterial enzymes and cell wall components play an essential role in local tissue destruction, dissemination of the infection, and in systemic toxicity. If left untreated, the rapid dissemination of the infection can be fatal.</span></p><span data-dcnode-id="1538" instrument_node="">
</span><p data-dcnode-id="1534"><strong data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">Orbital Abscess </span></strong><span data-dcnode-id="1535" instrument_node="">– Organisms from an odontogenic source may gain entrance to the orbit through local tissue planes, by hematogenous (blood) spread, or via involvement of the paranasal sinuses. The orbital septum delineates these infections into pre- and post-septal disease, which is important because the latter has the potential to cause severe complications. Orbital abscesses exhibit common signs and symptoms such as chemosis (swelling of the conjunctiva), swelling of the eyelid, reddening, hyperthermia, proptosis (protrusion or displacement of the eye), extraocular muscle dysfunction, and decreased visual acuity. Retrograde spread of infection can lead to complications such as cavernous sinus thrombosis, meningitis, cerebritis, brain abscess, or death.</span></p><div class="today-3ea36efe6ecce194b5d81174fec02f24 today-post-middle-300x200-new" data-dcnode-id="1533" id="today-3ea36efe6ecce194b5d81174fec02f24"></div><span data-dcnode-id="1532" instrument_node="">
</span><p data-dcnode-id="1528"><strong data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">Cavernous Sinus Thrombosis </span></strong><span data-dcnode-id="1529" instrument_node="">– Septic cavernous sinus thrombosis is a rare condition. Seven percent of all cases of thrombosis of the cavernous sinus are of dental origin. Though it is rare, fewer than 40% of patients usually have a full recovery, while the remainder of patients have neurological deficits. Death generally occurs within 4–7 days if the diagnosis is not made or when treatment is not instituted, usually due to meningitis, brain abscess, or generalized sepsis.</span></p><span data-dcnode-id="1527" instrument_node="">
</span><p data-dcnode-id="1520"><strong data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">Brain Abscess </span></strong><span data-dcnode-id="1524" instrument_node="">– Anaerobic species are responsible for the majority of cases of odontogenic (78%) brain abscess. Clinically, there is usually a latent period of several days or weeks before the appearance of symptoms of intracranial involvement. Initial complaints may be mild, consisting mostly of headaches, malaise, and apathy. Neurologic signs may appear later, depending on the location of the lesion. In a case study published in the Journal of the Canadian Dental Association (JCDA), a primary molar dental abscess was implicated as the cause of a brain abscess in an 11-year-old boy. You can read the case study </span><a data-dcnode-id="1522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jcda.ca/article/c49" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1523" instrument_node="">here</span></a><span data-dcnode-id="1521" instrument_node="">.</span></p><div class="today-3fe120c254e2cd11aff7c53595decfce today-post-middle-300x200-new" data-dcnode-id="1519" id="today-3fe120c254e2cd11aff7c53595decfce"></div><span data-dcnode-id="1518" instrument_node="">
</span><p data-dcnode-id="1514"><strong data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">Osteomyelitis </span></strong><span data-dcnode-id="1515" instrument_node="">– Defined as an infection in a bone. Osteomyelitis may develop in the jaws after a chronic odontogenic infection. Odontogenic infections were found to be the cause of 38% of mandibular and 25% of maxillary involvement. Proper surgical management and antimicrobial therapy are must to avoid complications.</span></p><span data-dcnode-id="1513" instrument_node="">
</span><p data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">With the widespread availability of preventive dental care and the development of effective antibiotics for the treatment of orofacial infection, the incidence of serious odontogenic infections has decreased dramatically over the past 50 years. However, they can still carry the potential for lethal complications, especially in the immunocompromised patient. When considering a “natural” cure for any dental or medical disease, the consequences could be painful at best and life-threatening at worst. Blindly following recommendations by an unqualified individual is dangerous. I know there are many people that would like Ramiel Nagel’s practice to be true and successful, however, there is no science-based evidence to support his claims.</span></p><span data-dcnode-id="1510" instrument_node="">
</span><p data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">Nutrition and a healthy lifestyle are important in disease prevention, and I highly recommend choosing a healthy diet. However, if you or your child has a dental or medical problem, I encourage you to seek professional treatment and guidance from a qualified individual. Obtaining medical or dental advice from a book that can be purchased online, written by an individual with no medical or dental background, is not a substitute for actual dental or medical advice from a board-certified dentist or physician.</span></p><span data-dcnode-id="1507" instrument_node="">
</span><p data-dcnode-id="1503"><span data-dcnode-id="1506" instrument_node="">Originally published on </span><a data-dcnode-id="1504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dentalmastermindsllc.com/blog/the-risks-of-curing-tooth-decay-naturally" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1505" instrument_node="">Dental Masterminds</span></a></p><span data-dcnode-id="1502" instrument_node="">
