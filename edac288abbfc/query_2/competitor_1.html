</span><h2 data-dcnode-id="2369" id="is-herbal-medicine-safe"><span data-dcnode-id="2370" instrument_node="">Is Herbal Medicine Safe for Cancer Patients?</span></h2><span data-dcnode-id="2368" instrument_node="">
</span><p data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">Herbs may seem harmless, but sometimes they can interfere with cancer treatment. </span></p><span data-dcnode-id="2365" instrument_node="">
</span><p data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">For example, some herbs can prevent chemotherapy and radiation therapy from killing cancer cells. Certain herbs enhance the effect of chemotherapy in a toxic way that leads to unwanted side effects.</span></p><span data-dcnode-id="2362" instrument_node="">
</span><p data-dcnode-id="2357"><span data-dcnode-id="2361" instrument_node="">Doctors recommend patients avoid herbs during treatment. It won’t be safe until research can identify which herbs are safe to combine with </span><a data-dcnode-id="2359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.asbestos.com/treatment/"><span data-dcnode-id="2360" instrument_node="">cancer treatment</span></a><span data-dcnode-id="2358" instrument_node="">.</span></p><span data-dcnode-id="2356" instrument_node="">
</span><p data-dcnode-id="2354"><span data-dcnode-id="2355" instrument_node="">Clinical trials that combine herbal medicine with cancer therapies are relatively new to the United States. China has performed such trials since the early 1900s.</span></p><span data-dcnode-id="2353" instrument_node="">
</span><p data-dcnode-id="2351"><span data-dcnode-id="2352" instrument_node="">Cancer doctors rely on clinical trials to recommend treatments that are proven effective. The lack of clinical trials on herbal medicines has limited what doctors can safely recommend.</span></p><span data-dcnode-id="2350" instrument_node="">
</span><p data-dcnode-id="2348"><span data-dcnode-id="2349" instrument_node="">People with cancer should get approval from their oncologist first before they take any kind of herbal medicine because some herbs may negatively impact the outcome of cancer treatment. </span></p><span data-dcnode-id="2347" instrument_node="">
</span><h2 data-dcnode-id="2345" id="effectiveness-in-cancer-care"><span data-dcnode-id="2346" instrument_node="">Is Herbal Medicine Effective in Cancer Care?</span></h2><span data-dcnode-id="2344" instrument_node="">
</span><p data-dcnode-id="2339"><span data-dcnode-id="2343" instrument_node="">Research in a developing field of medicine known as </span><a data-dcnode-id="2341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.asbestos.com/treatment/alternative/"><span data-dcnode-id="2342" instrument_node="">integrative oncology</span></a><span data-dcnode-id="2340" instrument_node=""> is attempting to understand which complementary therapies, including herbal medicines, are safe and effective to combine with conventional cancer treatments.</span></p><span data-dcnode-id="2338" instrument_node="">
</span><p data-dcnode-id="2333"><span data-dcnode-id="2337" instrument_node="">Some conventional cancer medicines contain active herbal ingredients. For example, the mesothelioma chemotherapy drug </span><a data-dcnode-id="2335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.asbestos.com/treatment/drugs/paclitaxel/"><span data-dcnode-id="2336" instrument_node="">Taxol (paclitaxel)</span></a><span data-dcnode-id="2334" instrument_node=""> comes from the bark of the yew tree. However, taking a yew tree bark herbal supplement does not produce the same effects as Taxol.</span></p><span data-dcnode-id="2332" instrument_node="">
</span><p data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">In general, herbal medicines are not as effective as conventional prescription medications. While some people get relief with herbal medicine for mild symptoms or side effects, many people get more relief from prescription medication. </span></p><span data-dcnode-id="2329" instrument_node="">
</span><p data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">Prescription medications may come with unwanted side effects, and these side effects may motivate people to consider herbal medicine. Herbal medicines often have a lower risk of side effects than standard-of-care drugs. This is partially because they are less potent than pharmaceuticals.</span></p><span data-dcnode-id="2326" instrument_node="">
</span><p data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">For example, patients who use natural remedies for insomnia are less likely to experience dizziness, tremors or spasms than patients who use prescription pills such as benzodiazepines.</span></p><span data-dcnode-id="2323" instrument_node="">
</span><p data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">The side effects that do occur with herbal remedies are typically mild. Constipation is the most common. The likelihood of dependency is also lower for herbal remedies.</span></p><span data-dcnode-id="2320" instrument_node="">
</span><p data-dcnode-id="2318"><span data-dcnode-id="2319" instrument_node="">The U.S. Food and Drug Administration designate most herbs as GRAS, or generally recognized as safe. But patients must remember herbal remedies are still a type of medicine. Make sure to get approval first from your oncologist.</span></p><span data-dcnode-id="2317" instrument_node="">
</span><p data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">Herbal medicine may come in the form of tablets or capsules, creams, teas or tinctures (an alcohol-based concentrate).</span></p><span data-dcnode-id="2314" instrument_node="">
</span><div class="c-list" data-dcnode-id="2288" id="list-5fa2be34096ff"><span data-dcnode-id="2313" instrument_node="">
</span><p class="c-list__title" data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">
            Research on herbs suggests they may help to:
        </span></p><span data-dcnode-id="2310" instrument_node="">
</span><div class="c-list__content" data-dcnode-id="2290"><span data-dcnode-id="2309" instrument_node="">
</span><ul class="c-ul" data-dcnode-id="2292" id="list-5fa2be34096ff"><span data-dcnode-id="2308" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">Boost the immune system</span></li><span data-dcnode-id="2305" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">
Ease cancer symptoms</span></li><span data-dcnode-id="2302" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node="">
Reduce treatment side effects</span></li><span data-dcnode-id="2299" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="2297"><span data-dcnode-id="2298" instrument_node="">
Slow cancer spreading (metastasis)</span></li><span data-dcnode-id="2296" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="2294"><span data-dcnode-id="2295" instrument_node="">
Attack cancer cells</span></li><span data-dcnode-id="2293" instrument_node="">
</span></ul><span data-dcnode-id="2291" instrument_node="">
</span></div><span data-dcnode-id="2289" instrument_node="">
</span></div><span data-dcnode-id="2287" instrument_node="">
</span><p data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">Research does not indicate that herbal medicine can replace conventional cancer treatment. No herb has been proven to control or cure any kind of cancer. </span></p><span data-dcnode-id="2284" instrument_node="">
</span><p data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">Most of the research has been conducted in test tube studies or mouse studies. Some research involving humans has been conducted, but no large, double-blind controlled clinical trials have been conducted in the U.S. </span></p><span data-dcnode-id="2281" instrument_node="">
</span><h2 data-dcnode-id="2279" id="research"><span data-dcnode-id="2280" instrument_node="">Research on Herbal Medicine and Cancer</span></h2><span data-dcnode-id="2278" instrument_node="">
</span><p data-dcnode-id="2276"><span data-dcnode-id="2277" instrument_node="">Research indicates that some herbs may help cancer patients cope with cancer symptoms and side effects of cancer treatment. Studies conducted in test tubes and animals have shown some anti-cancer effects of various herbs, but these results haven’t been replicated in human trials. </span></p><span data-dcnode-id="2275" instrument_node="">
</span><h3 data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">Astragalus</span></h3><span data-dcnode-id="2272" instrument_node="">
</span><p data-dcnode-id="2267"><span data-dcnode-id="2271" instrument_node="">Research on astragalus shows that it may reduce side effects of platinum-based chemotherapy agents such as cisplatin and carboplatin. These are two of the most effective </span><a data-dcnode-id="2269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.asbestos.com/treatment/chemotherapy/"><span data-dcnode-id="2270" instrument_node="">chemotherapy drugs for mesothelioma</span></a><span data-dcnode-id="2268" instrument_node="">. </span></p><span data-dcnode-id="2266" instrument_node="">
</span><p data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">A 2012 Chinese study published in Medical Oncology found improved quality of life among lung cancer patients who received a combination injection of astragalus, cisplatin and vinorelbine compared to patients who only received cisplatin and vinorelbine. Patients who received astragalus had better physical function, improved appetite, and they experienced less fatigue, pain, nausea and vomiting. </span></p><span data-dcnode-id="2263" instrument_node="">
</span><p data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">Make sure you discuss astragalus with your oncologist because it is a potent herb. It can alter the way your body processes chemotherapy in ways that may help or hurt depending on the patient.</span></p><span data-dcnode-id="2260" instrument_node="">
</span><h3 data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">Dong Quai</span></h3><span data-dcnode-id="2257" instrument_node="">
</span><p data-dcnode-id="2252"><span data-dcnode-id="2256" instrument_node="">Traditional Chinese Medicine uses the herb dong quai to support overall wellness. The herb may offer additional benefits to cancer patients receiving doxorubicin, which is a chemotherapy drug used in the treatment of </span><a data-dcnode-id="2254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.asbestos.com/mesothelioma/"><span data-dcnode-id="2255" instrument_node="">mesothelioma</span></a><span data-dcnode-id="2253" instrument_node="">. </span></p><span data-dcnode-id="2251" instrument_node="">
</span><p data-dcnode-id="2243"><span data-dcnode-id="2250" instrument_node="">A 2007 study published in Basic and Clinical Pharmacology and Toxicology found dong quai may protect against heart damage caused by </span><a data-dcnode-id="2248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.asbestos.com/treatment/drugs/doxorubicin/"><span data-dcnode-id="2249" instrument_node="">doxorubicin</span></a><span data-dcnode-id="2247" instrument_node="">. A 2006 study published in Oncology Reports found dong quai may protect against lung inflammation caused by </span><a data-dcnode-id="2245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.asbestos.com/treatment/radiation/"><span data-dcnode-id="2246" instrument_node="">radiation therapy</span></a><span data-dcnode-id="2244" instrument_node="">.</span></p><span data-dcnode-id="2242" instrument_node="">
</span><h3 data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">Burdock Root </span></h3><span data-dcnode-id="2239" instrument_node="">
</span><p data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">A 2011 review published in Inflammopharmacology discusses laboratory studies of burdock root that indicate the herb has anti-inflammatory, antibacterial, anti-cancer and liver-protecting properties. It hasn’t been proven to treat cancer in humans, but it may reduce inflammation and help patients recover from liver damage after cancer treatment. </span></p><span data-dcnode-id="2236" instrument_node="">
</span><p data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">It should be noted that a commercially available type of burdock root tea was found contaminated with atropine in the 1970s. Atropine is a chemical that causes irregular heartbeat and blurry vision. Cancer patients should closely monitor the effects of any herb they try.</span></p><span data-dcnode-id="2233" instrument_node="">
</span><h3 data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">Essiac Tea</span></h3><span data-dcnode-id="2230" instrument_node="">
</span><p data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">An herbal tea blend known as Essiac tea contains herbs known for their immune-boosting effects, including burdock root. Research shows Essiac tea doesn’t cure cancer, but it does contain more antioxidants than red wine or green tea.</span></p><span data-dcnode-id="2227" instrument_node="">
</span><p data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">The Memorial Sloan Kettering Cancer Center conducted about 18 studies on Essiac in the 1970s and 1980s. These studies found Essiac did not boost the immune system or kill cancer cells. </span></p><span data-dcnode-id="2224" instrument_node="">
</span><h3 data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">Hypericin</span></h3><span data-dcnode-id="2221" instrument_node="">
</span><p data-dcnode-id="2216"><span data-dcnode-id="2220" instrument_node="">This compound is found in St. John’s Wort and it may help kill cancer cells. According to a 2000 study published in the Medical Journal of Australia, hypericin makes certain cancer cells more likely to die after </span><a data-dcnode-id="2218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.asbestos.com/treatment/photodynamic-therapy/"><span data-dcnode-id="2219" instrument_node="">photodynamic therapy</span></a><span data-dcnode-id="2217" instrument_node="">, which is an experimental treatment for mesothelioma.</span></p><span data-dcnode-id="2215" instrument_node="">
</span><h3 data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">Ginger</span></h3><span data-dcnode-id="2212" instrument_node="">
</span><p data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">This herb shows anti-inflammatory and anti-cancer effects in lab studies. It can also reduce chemotherapy-related nausea and vomiting, according to a 2000 review published in the British Journal of Anaesthesia. But ginger should be strictly avoided before and after surgery. It promotes bleeding and should be avoided by patients with a low platelet count.</span></p><span data-dcnode-id="2209" instrument_node="">
</span><h3 data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">Aloe Vera</span></h3><span data-dcnode-id="2206" instrument_node="">
</span><p data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">A 2011 review published in Cochrane Database Systematic Reviews reported that taking aloe vera during chemotherapy helped prevent mouth sores in some patients.</span></p><span data-dcnode-id="2203" instrument_node="">
</span><h3 data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">Mistletoe Extracts</span></h3><span data-dcnode-id="2200" instrument_node="">
</span><p data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">Also known as Iscador, research done in humans suggests that mistletoe reduces symptoms and improves quality of life. A 2013 study published in the European Journal of Cancer found that mistletoe reduces side effects of chemotherapy in lung cancer patients. </span></p><span data-dcnode-id="2197" instrument_node="">
</span><p data-dcnode-id="2192"><span data-dcnode-id="2196" instrument_node="">A 2013 study published in Evidenced Based Complementary Alternative Medicine found that cancer patients with advanced tumors were able to tolerate higher doses of </span><a data-dcnode-id="2194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.asbestos.com/treatment/chemotherapy/gemcitabine/"><span data-dcnode-id="2195" instrument_node="">gemcitabine</span></a><span data-dcnode-id="2193" instrument_node=""> (a chemotherapy drug used to treat mesothelioma) with the addition of mistletoe.</span></p><span data-dcnode-id="2191" instrument_node="">
</span><h3 data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node="">Turmeric</span></h3><span data-dcnode-id="2188" instrument_node="">
</span><p data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">This herb contains a compound know as curcumin. A 2011 study published in Cancer Chemotherapy and Pharmacology shows that curcumin extract may be safe to combine with gemcitabine chemotherapy in pancreatic cancer patients. </span></p><span data-dcnode-id="2185" instrument_node="">
</span><p data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">Turmeric is used as an anti-inflammatory. It may reduce bruising in surgery patients when combined with bromelain (an extract from pineapples) and arnica (an herbaceous plant).</span></p><span data-dcnode-id="2182" instrument_node="">
</span><h3 data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">Moringa Tree</span></h3><span data-dcnode-id="2179" instrument_node="">
</span><p data-dcnode-id="2177"><span data-dcnode-id="2178" instrument_node="">A 2006 test tube study published in the Journal of Experimental Therapeutics in Oncology found a compound in moringa tree effective at killing ovarian cancer cells. Other research suggests it may help cancer symptoms including difficulty breathing, cough, sore throat, fever and joint pain.</span></p><span data-dcnode-id="2176" instrument_node="">

</span><h2 data-dcnode-id="2149" id="easing-treatment-side-effects"><span data-dcnode-id="2150" instrument_node="">Herbs That May Help Treatment Side Effects</span></h2><span data-dcnode-id="2148" instrument_node="">
</span><p data-dcnode-id="2146"><span data-dcnode-id="2147" instrument_node="">Several herbs may help control the side effects of conventional cancer treatment. However, doctors do not recommend that cancer patients take herbal medicine while undergoing cancer treatment. If you want to try herbal medicine during cancer treatment, talk to your oncologist about it so they can monitor your response and warn you of potential drug interactions.</span></p><span data-dcnode-id="2145" instrument_node="">
</span><p data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">Some of these herbs might be safe to take after cancer treatment is completed, but you should get approval from your oncologist first. </span></p><span data-dcnode-id="2142" instrument_node="">

</span><h2 data-dcnode-id="2058" id="easing-cancer-symptoms"><span data-dcnode-id="2059" instrument_node="">Herbs That May Help Cancer Symptoms</span></h2><span data-dcnode-id="2057" instrument_node="">
</span><p data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">Certain herbal medicines may help mesothelioma cancer symptoms such as pain and difficulty breathing. Some of these herbs have been studied in cancer patients, and some of them haven’t. </span></p><span data-dcnode-id="2054" instrument_node="">

</span><a class="c-button js-trackClicks" data-dcnode-id="1962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.asbestos.com/doctor-match/%3Fcontent%3Dcancer-center"><span class="c-cta__button-copy" data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">Get Help Now</span></span><i class="o-icon o-icon--arrow-right c-button__icon c-button__icon--after" data-dcnode-id="1963"></i></a><span data-dcnode-id="1961" instrument_node="">
</span></div><span data-dcnode-id="1959" instrument_node="">
</span></div><span data-dcnode-id="1957" instrument_node="">
</span></div><span data-dcnode-id="1955" instrument_node="">
</span></div><span data-dcnode-id="1953" instrument_node="">
</span><h2 data-dcnode-id="1951" id="precautions"><span data-dcnode-id="1952" instrument_node="">Precautions for Using Herbal Medicine</span></h2><span data-dcnode-id="1950" instrument_node="">
</span><p data-dcnode-id="1948"><span data-dcnode-id="1949" instrument_node="">Herbal medicines may be less likely to cause side effects than traditional drugs. But patients can still experience complications. Some herbs can cause negative interactions with chemotherapy drugs. Others may prevent blood from clotting properly after surgery.</span></p><span data-dcnode-id="1947" instrument_node="">
</span><p data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">Closely monitor how you feel before and after taking herbal remedies. Patients should always consult with their doctor before trying herbs to avoid complications.</span></p><span data-dcnode-id="1944" instrument_node="">
</span><p data-dcnode-id="1940"><a data-dcnode-id="1942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.asbestos.com/treatment/alternative/dietary-supplements/"><span data-dcnode-id="1943" instrument_node="">Dietary supplements</span></a><span data-dcnode-id="1941" instrument_node=""> do not have to undergo FDA testing before reaching the market. Some patients have unknowingly bought supplements contaminated with arsenic, lead and mercury.</span></p><span data-dcnode-id="1939" instrument_node="">
</span><p data-dcnode-id="1937"><span data-dcnode-id="1938" instrument_node="">To avoid contaminated herbs, patients should only buy products from reputable companies with a United States Pharmacopeia (USP) label.</span></p><span data-dcnode-id="1936" instrument_node="">
</span><div class="c-list" data-dcnode-id="1913" id="list-5fa2be7809733"><span data-dcnode-id="1935" instrument_node="">
</span><p class="c-list__title" data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">
            Patients can also look for one or more of the following quality labels on their herbal supplements:
        </span></p><span data-dcnode-id="1932" instrument_node="">
</span><div class="c-list__content" data-dcnode-id="1915"><span data-dcnode-id="1931" instrument_node="">
</span><ul class="c-ul" data-dcnode-id="1917" id="list-5fa2be7809733"><span data-dcnode-id="1930" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node="">GAP (Good Agricultural Practice)</span></li><span data-dcnode-id="1927" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">
GLP (Good Laboratory Practice)</span></li><span data-dcnode-id="1924" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">
GSP (Good Supply Practice)</span></li><span data-dcnode-id="1921" instrument_node="">
</span><li class="c-ul__item" data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">
GMP (Good Manufacturing Practice)</span></li><span data-dcnode-id="1918" instrument_node="">
</span></ul><span data-dcnode-id="1916" instrument_node="">
</span></div><span data-dcnode-id="1914" instrument_node="">
</span></div><span data-dcnode-id="1912" instrument_node="">
</span><p data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">Although some herbs may be able to slow cancer growth, patients should avoid herbal medicines that are marketed as cures for cancer. These remedies are often produced without any scientific evidence to support the manufacturer’s claim.</span></p><span data-dcnode-id="1909" instrument_node="">
</span><h2 data-dcnode-id="1907" id="talk-to-your-doctor"><span data-dcnode-id="1908" instrument_node="">Talk with Your Oncologist</span></h2><span data-dcnode-id="1906" instrument_node="">
</span><p data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">The importance of discussing herbal remedies with your oncologist before buying or trying them cannot be stressed enough.</span></p><span data-dcnode-id="1903" instrument_node="">
</span><p data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">All too often patients hide the supplements and herbs they want to take from their doctor. Your oncologist has your best interest at heart and only wants to protect you from potentially harmful interactions.</span></p><span data-dcnode-id="1900" instrument_node="">
</span><p data-dcnode-id="1895"><span data-dcnode-id="1899" instrument_node="">In many cases, your </span><a data-dcnode-id="1897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.asbestos.com/treatment/doctors/"><span data-dcnode-id="1898" instrument_node="">doctor</span></a><span data-dcnode-id="1896" instrument_node=""> will give their approval to take herbal remedies after you complete treatment.</span></p><span data-dcnode-id="1894" instrument_node="">
</span><p data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">You can also inquire about joining a clinical trial that is investigating an herb in combination with cancer treatment. These trials are not common, but they do closely monitor patients for harmful interactions. They take the precautions necessary to prevent unwanted side effects such as testing herbs for contaminants before administration.</span></p><span data-dcnode-id="1891" instrument_node="">
</span><p data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">A common misconception is that natural products can’t be harmful or that they are always safe to combine with pharmaceutical medications.</span></p><span data-dcnode-id="1888" instrument_node="">
</span><p data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">Many natural substances, such as arsenic and tobacco, are poisonous and carcinogenic. The effects of herbs can range from mild to potent depending on the person taking them and the medications they are using.</span></p><span data-dcnode-id="1885" instrument_node="">
</span><p data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">It is wise to thoroughly research the herbs you want to try and take your research to your oncologist. This allows your doctor to advise you with as much information as possible.</span></p><span data-dcnode-id="1882" instrument_node="">
</span></div><span data-dcnode-id="1880" instrument_node="">

</span><p data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">The Mesothelioma Center at Asbestos.com has provided patients and their loved ones the most updated and reliable information on mesothelioma and asbestos exposure since 2006.</span></p><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">Our team of Patient Advocates includes a medical doctor, a registered nurse, health services administrators, veterans, VA-accredited Claims Agents, an oncology patient navigator and hospice care expert. Their combined expertise means we help any mesothelioma patient or loved one through every step of their cancer journey.</span></p><span data-dcnode-id="1523" instrument_node="">
</span><p data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">More than 30 contributors, including mesothelioma doctors, survivors, health care professionals and other experts, have peer-reviewed our website and written unique research-driven articles to ensure you get the highest-quality medical and health information.</span></p><span data-dcnode-id="1520" instrument_node="">
