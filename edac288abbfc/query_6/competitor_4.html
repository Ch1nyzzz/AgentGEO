</span><article class="iconbox iconbox_top av-1kky8db7-abfda27401eafe044770b0a89f06713e avia-builder-el-5 el_after_av_hr el_before_av_icon_box main_color" data-dcnode-id="5927"><div class="iconbox_content" data-dcnode-id="5929"><header class="entry-content-header" data-dcnode-id="5943"><div aria-hidden="true" class="iconbox_icon heading-color" data-av_icon="" data-av_iconfont="entypo-fontello" data-dcnode-id="5947"></div><h3 class="iconbox_content_title" data-dcnode-id="5944"><span data-dcnode-id="5945" id="Regular_Cancer_Treatment_is_Big_Business"><span data-dcnode-id="5946" instrument_node="">Regular Cancer Treatment is Big Business</span></span></h3></header><div class="iconbox_content_container" data-dcnode-id="5930"><p data-dcnode-id="5941"><span data-dcnode-id="5942" instrument_node="">Big pharma has a lot of influence and power, and the reintroduction of powerful plant-based medicine is not in their interest. And it seems like, especially with cancer treatment, traditional medicine has shown inferior results.</span></p><span data-dcnode-id="5940" instrument_node="">
</span><p data-dcnode-id="5938"><span data-dcnode-id="5939" instrument_node="">The medical industry spends billions of (taxpayers) dollars on research and development of cancer medication each year (~6$ billion in the U.S.). Yet after 70 years of active research, still today, the only cancer treatments used by regular medicine are surgery, chemotherapy, and radiation therapy.</span></p><span data-dcnode-id="5937" instrument_node="">
</span><p data-dcnode-id="5935"><span data-dcnode-id="5936" instrument_node="">The latter two destroy your entire body, and often they do irreparable damage to your immune system, exponentially increasing the chances of cancer returning in more than one place. Besides, some doctors claim that most of the time, chemo and radiation don’t work.</span></p><span data-dcnode-id="5934" instrument_node="">
</span><p data-dcnode-id="5932"><img alt="Cancer statistics" class="aligncenter size-medium wp-image-31811" data-dcnode-id="5933" height="199" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.idweeds.com/wp-content/uploads/2017/11/cancer-389921_1920-300x199.jpg&amp;raw" srcset="https://cdn.idweeds.com/wp-content/uploads/2017/11/cancer-389921_1920-300x199.jpg 300w, https://cdn.idweeds.com/wp-content/uploads/2017/11/cancer-389921_1920-80x53.jpg 80w, https://cdn.idweeds.com/wp-content/uploads/2017/11/cancer-389921_1920-768x508.jpg 768w, https://cdn.idweeds.com/wp-content/uploads/2017/11/cancer-389921_1920.jpg 1920w" width="300"></p><span data-dcnode-id="5931" instrument_node="">
</span></div></div><footer class="entry-footer" data-dcnode-id="5928"></footer></article><article class="iconbox iconbox_left av-5mcyhdv-46c4f5b4ef680d32d3df501fed94fbe1 avia-builder-el-6 el_after_av_icon_box el_before_av_textblock" data-dcnode-id="5912"><div class="iconbox_content" data-dcnode-id="5914"><header class="entry-content-header" data-dcnode-id="5922"><div aria-hidden="true" class="iconbox_icon heading-color" data-av_icon="" data-av_iconfont="entypo-fontello" data-dcnode-id="5926"></div><h3 class="iconbox_content_title" data-dcnode-id="5923"><span data-dcnode-id="5924" id="Cancer_Statistics"><span data-dcnode-id="5925" instrument_node="">Cancer Statistics</span></span></h3></header><div class="iconbox_content_container" data-dcnode-id="5915"><p data-dcnode-id="5917"><span data-dcnode-id="5921" instrument_node="">About 70 years ago, humankind discovered cancer, and only one in sixteen people would get cancer. This number reduced to one in ten, 40 years ago, and now </span><strong data-dcnode-id="5919"><span data-dcnode-id="5920" instrument_node="">one-third of the people get cancer</span></strong><span data-dcnode-id="5918" instrument_node=""> during their lifetime. No wonder more and more people are waking up to these disturbing facts.</span></p><span data-dcnode-id="5916" instrument_node="">
</span></div></div><footer class="entry-footer" data-dcnode-id="5913"></footer></article><section class="av_textblock_section av-1jvvl32b-0fcfb84a1886ac050b76e98cfee3006f" data-dcnode-id="5736"><div class="avia_textblock" data-dcnode-id="5737"><h3 data-dcnode-id="5909"><span data-dcnode-id="5910" id="Cannabis_Oil_Usage_Methods"><span data-dcnode-id="5911" instrument_node="">Cannabis Oil Usage Methods</span></span></h3><span data-dcnode-id="5908" instrument_node="">
</span><ul data-dcnode-id="5892"><li data-dcnode-id="5906"><span data-dcnode-id="5907" instrument_node="">Sublingual (under your tongue)</span></li><span data-dcnode-id="5905" instrument_node="">
</span><li data-dcnode-id="5903"><span data-dcnode-id="5904" instrument_node="">Rectally, using suppositories</span></li><span data-dcnode-id="5902" instrument_node="">
</span><li data-dcnode-id="5900"><span data-dcnode-id="5901" instrument_node="">Orally; swallowing drops or capsules</span></li><span data-dcnode-id="5899" instrument_node="">
</span><li data-dcnode-id="5897"><span data-dcnode-id="5898" instrument_node="">Smoking or vaping</span></li><span data-dcnode-id="5896" instrument_node="">
</span><li data-dcnode-id="5894"><span data-dcnode-id="5895" instrument_node="">Applying oil to the skin</span></li><span data-dcnode-id="5893" instrument_node="">
</span></ul><p data-dcnode-id="5881"><span data-dcnode-id="5891" instrument_node="">You should not confuse Cannabis</span><strong data-dcnode-id="5889"><span data-dcnode-id="5890" instrument_node=""> oil</span></strong><span data-dcnode-id="5888" instrument_node="">&nbsp;with </span><strong data-dcnode-id="5886"><span data-dcnode-id="5887" instrument_node="">CBD oil</span></strong><span data-dcnode-id="5885" instrument_node="">. The main component of cannabis oil is </span><strong data-dcnode-id="5883"><span data-dcnode-id="5884" instrument_node="">THC</span></strong><span data-dcnode-id="5882" instrument_node="">, and in CBD oil, it’s CBD. For cancer treatment, the experience of our audience recommends a mixture of Cannabis and CBD oil.</span></p><span data-dcnode-id="5880" instrument_node="">
</span><p data-dcnode-id="5878"><span data-dcnode-id="5879" instrument_node="">But, how best to take THC drops? It all depends on your condition. The closer you can get the cannabis oil to the cancer source, the better.</span></p><span data-dcnode-id="5877" instrument_node="">
</span><p data-dcnode-id="5875"><span data-dcnode-id="5876" instrument_node="">The best way to obtain cannabis oil is from your local dispensary if you are from the US and a cannabis-legal state. CBDistillery 5000 is lab tested and a suitable CBD oil for cancer when you consider the value and full-spectrum cannabinoids, bringing you the “entourage effect”.</span></p><span data-dcnode-id="5874" instrument_node="">
</span><p data-dcnode-id="5863"><span data-dcnode-id="5873" instrument_node="">You can buy </span><a data-dcnode-id="5871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//idweeds.com/cbd-pills/"><span data-dcnode-id="5872" instrument_node="">Full-spectrum CBD capsules</span></a><span data-dcnode-id="5870" instrument_node=""> or oil online, following the link. If you are Canadian, you can choose an </span><a data-dcnode-id="5868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//idweeds.com/buy-weed-online-canada/"><span data-dcnode-id="5869" instrument_node="">online dispensary in Canada</span></a><span data-dcnode-id="5867" instrument_node=""> and purchase </span><a data-dcnode-id="5865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//idweeds.com/thc-capsules/"><span data-dcnode-id="5866" instrument_node="">cannabis pills</span></a><span data-dcnode-id="5864" instrument_node=""> online. In the United States, online cannabis sales are only allowed in a few States for now.</span></p><span data-dcnode-id="5862" instrument_node="">
</span><h3 data-dcnode-id="5859"><span data-dcnode-id="5860" id="The_Effectiveness_of_Different_Cannabis_Usage_Methods"><span data-dcnode-id="5861" instrument_node="">The Effectiveness of Different Cannabis Usage Methods</span></span></h3><span data-dcnode-id="5858" instrument_node="">
</span><hr data-dcnode-id="5857"><h4 data-dcnode-id="5854"><span data-dcnode-id="5855" id="Sublingual"><span data-dcnode-id="5856" instrument_node="">Sublingual</span></span></h4><span data-dcnode-id="5853" instrument_node="">
</span><p data-dcnode-id="5851"><span data-dcnode-id="5852" instrument_node="">The sublingual method is, first of all, the most effective way. Its effect is noticeable sooner than the oral method, and its working time is almost the same. Therefore, most people use it for pain treatment with CBD for quick relief.</span></p><span data-dcnode-id="5850" instrument_node="">
</span><p data-dcnode-id="5848"><span data-dcnode-id="5849" instrument_node="">Cannabidiol cancer treatment&nbsp;is, however, most effective the closer you can bring it to the cancer source. So, if your cancer is in the lower part of your body, the following method will be more effective:</span></p><span data-dcnode-id="5847" instrument_node="">
</span><p data-dcnode-id="5845"><img alt="suppository" class="aligncenter size-medium wp-image-31819" data-dcnode-id="5846" height="169" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.idweeds.com/wp-content/uploads/2017/11/suppository-1858085_1920-300x169.jpg&amp;raw" srcset="https://cdn.idweeds.com/wp-content/uploads/2017/11/suppository-1858085_1920-300x169.jpg 300w, https://cdn.idweeds.com/wp-content/uploads/2017/11/suppository-1858085_1920-80x45.jpg 80w, https://cdn.idweeds.com/wp-content/uploads/2017/11/suppository-1858085_1920-768x432.jpg 768w, https://cdn.idweeds.com/wp-content/uploads/2017/11/suppository-1858085_1920.jpg 1920w" width="300"></p><span data-dcnode-id="5844" instrument_node="">
</span><h4 data-dcnode-id="5841"><span data-dcnode-id="5842" id="Rectally_Suppositories"><span data-dcnode-id="5843" instrument_node="">Rectally (Suppositories)</span></span></h4><span data-dcnode-id="5840" instrument_node="">
</span><p data-dcnode-id="5838"><span data-dcnode-id="5839" instrument_node="">Almost equally compelling is the rectal intake, depending on the location of your cancer. With a suppository, your body absorbs 50% to 70% of the plants’ medicine. This is a lot.</span></p><span data-dcnode-id="5837" instrument_node="">
</span><p data-dcnode-id="5835"><span data-dcnode-id="5836" instrument_node="">As mentioned before, bring cannabis oil as close to the cancer source as possible for the best results. Therefore, the medical cannabis community especially recommends this method for bowel and prostate cancer and cancer forms in the lower part of the body.</span></p><span data-dcnode-id="5834" instrument_node="">
</span><p data-dcnode-id="5832"><span data-dcnode-id="5833" instrument_node="">There are two ways to insert a suppository, both with different effects and purposes.</span></p><span data-dcnode-id="5831" instrument_node="">
</span><ol data-dcnode-id="5824"><li data-dcnode-id="5829"><span data-dcnode-id="5830" instrument_node="">Upper rectum</span></li><span data-dcnode-id="5828" instrument_node="">
</span><li data-dcnode-id="5826"><span data-dcnode-id="5827" instrument_node="">Lower rectum</span></li><span data-dcnode-id="5825" instrument_node="">
</span></ol><h5 data-dcnode-id="5821"><span data-dcnode-id="5822" id="Upper_and_Lower_Rectum_Insertion"><span data-dcnode-id="5823" instrument_node="">Upper and Lower Rectum Insertion</span></span></h5><span data-dcnode-id="5820" instrument_node="">
</span><p data-dcnode-id="5815"><span data-dcnode-id="5819" instrument_node="">When you insert a suppository in the </span><strong data-dcnode-id="5817"><span data-dcnode-id="5818" instrument_node="">upper rectum</span></strong><span data-dcnode-id="5816" instrument_node=""> (deeper), it is absorbed into the first-pass metabolism and first passes through the liver, after which it passes through the entire body. The route the cannabinoids take through your body is similar to sublingual submission and also when taken orally.</span></p><span data-dcnode-id="5814" instrument_node="">
</span><p data-dcnode-id="5812"><span data-dcnode-id="5813" instrument_node="">The cannabinoids pass through your liver, so you likely experience a ‘high’ in the head at first. Your body, however, does get used to it. Hence, it would be best to start with small doses, and consequently, it will take three to five weeks on average to get to the whole dosage level.</span></p><span data-dcnode-id="5811" instrument_node="">
</span><p data-dcnode-id="5806"><span data-dcnode-id="5810" instrument_node="">When you insert a suppository in the </span><strong data-dcnode-id="5808"><span data-dcnode-id="5809" instrument_node="">lower rectum</span></strong><span data-dcnode-id="5807" instrument_node=""> (less deep), it is absorbed into the vascular system, bypassing the liver. Because you bypass the liver, most patients do not experience a ‘high’ in the head but only a comfortable body relaxation. This is probably the most considerable advantage of this intake method.</span></p><span data-dcnode-id="5805" instrument_node="">
</span><p data-dcnode-id="5803"><span data-dcnode-id="5804" instrument_node="">Another benefit is that you can increase dosages faster. You get to the desired dosing level quicker. Especially late-stage cancer and patients that doctors have given up on, they must get to the full dosage as quickly as possible.</span></p><span data-dcnode-id="5802" instrument_node="">
</span><p data-dcnode-id="5800"><span data-dcnode-id="5801" instrument_node="">You should bear in mind that the reaction to cannabis is different for everybody, and it has little to do with your weight or size. Therefore, one person might get used to it much quicker than the other, and you need to finetune cannabis oil dosing to yourself.</span></p><span data-dcnode-id="5799" instrument_node="">
</span><h4 data-dcnode-id="5796"><span data-dcnode-id="5797" id="Orally"><span data-dcnode-id="5798" instrument_node="">Orally</span></span></h4><span data-dcnode-id="5795" instrument_node="">
</span><p data-dcnode-id="5793"><span data-dcnode-id="5794" instrument_node="">It is also helpful to take cannabis oil orally by swallowing it. It takes a little longer for the cannabis to get absorbed by your body, and it is a suitable method of taking cannabis oil for cancer treatment.</span></p><span data-dcnode-id="5792" instrument_node="">
</span><p data-dcnode-id="5790"><span data-dcnode-id="5791" instrument_node="">The effectiveness of cannabis oil increases the closer you can bring it to the cancer source. Therefore, the iDWeeds community recommends this method to patients with cancer forms in the upper part of the digestive system, such as throat and stomach cancer.</span></p><span data-dcnode-id="5789" instrument_node="">
</span><p data-dcnode-id="5787"><span data-dcnode-id="5788" instrument_node="">The effect lead time of oral intake is longer because it has to go through your digestive tract. However, the working time is with six to eight hours optimal for cancer treatment.</span></p><span data-dcnode-id="5786" instrument_node="">
</span><p data-dcnode-id="5784"><span data-dcnode-id="5785" instrument_node="">This method also causes a ‘high’ in the head and needs to be started slowly to give your body the time to get used to it. Once you get used to it, the moment you take your dose is not essential.</span></p><span data-dcnode-id="5783" instrument_node="">
</span><p data-dcnode-id="5781"><span data-dcnode-id="5782" instrument_node="">However, when you start, we recommend taking your dose after meals, brush your teeth, and rinse your mouth afterward.</span></p><span data-dcnode-id="5780" instrument_node="">
</span><p data-dcnode-id="5775"><span data-dcnode-id="5779" instrument_node="">You probably didn’t realize that there are also </span><a data-dcnode-id="5777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//idweeds.com/thc-gummies/"><span data-dcnode-id="5778" instrument_node="">THC hard candy</span></a><span data-dcnode-id="5776" instrument_node=""> and gummies for sale. They pose an excellent alternative to oil if you want to be discreet about your treatment or don’t like the taste of hemp.</span></p><span data-dcnode-id="5774" instrument_node="">
</span><h4 data-dcnode-id="5771"><span data-dcnode-id="5772" id="Vaping"><span data-dcnode-id="5773" instrument_node="">Vaping</span></span></h4><span data-dcnode-id="5770" instrument_node="">
</span><p data-dcnode-id="5768"><span data-dcnode-id="5769" instrument_node="">Vaping is an effective method of taking cannabis oil for medical reasons in terms of absorption.&nbsp; You get the quickest effect after approximately a few minutes, but the effects last shorter than with other intake methods- between one and two hours only.</span></p><span data-dcnode-id="5767" instrument_node="">
</span><p data-dcnode-id="5765"><span data-dcnode-id="5766" instrument_node="">As this method causes an intense high, people usually use it for recreational use. But for medical applications, we even recommend it as a parallel intake with cancer forms involving the lungs, throat, bronchi, and other parts that come in contact with the inhaled cannabis.</span></p><span data-dcnode-id="5764" instrument_node="">
</span><p data-dcnode-id="5762"><span data-dcnode-id="5763" instrument_node="">For example, cured patients recommend vaping twice a day, besides the sublingual or oral lung cancer procedure (see regular roadmap below).</span></p><span data-dcnode-id="5761" instrument_node="">
</span><p data-dcnode-id="5756"><span data-dcnode-id="5760" instrument_node="">Use about half a gram or up to one gram of finely ground cannabis per day. Find out here what the </span><a data-dcnode-id="5758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//idweeds.com/vape-pen-reviews/"><span data-dcnode-id="5759" instrument_node="">best CBD vape pen</span></a><span data-dcnode-id="5757" instrument_node=""> is for oil.</span></p><span data-dcnode-id="5755" instrument_node="">
</span><p data-dcnode-id="5753"><span data-dcnode-id="5754" instrument_node="">ALS patients usually have problems with excessive saliva. According to anecdotal reports, smoking or vaping cannabis reduces saliva and provokes coughing, which keeps ALS patients from choking. We, therefore, see many ALS patients having great benefits from vaping.</span></p><span data-dcnode-id="5752" instrument_node="">
</span><h4 data-dcnode-id="5749"><span data-dcnode-id="5750" id="Applying_Oil_to_the_Skin"><span data-dcnode-id="5751" instrument_node="">Applying Oil to the Skin</span></span></h4><span data-dcnode-id="5748" instrument_node="">
</span><p data-dcnode-id="5746"><span data-dcnode-id="5747" instrument_node="">This method is very effective with skin cancer and is described in detail later in this article.</span></p><span data-dcnode-id="5745" instrument_node="">
</span><h4 data-dcnode-id="5742"><span data-dcnode-id="5743" id="Smoking"><span data-dcnode-id="5744" instrument_node="">Smoking</span></span></h4><span data-dcnode-id="5741" instrument_node="">
</span><p data-dcnode-id="5739"><span data-dcnode-id="5740" instrument_node="">Smoking is the least effective method. You feel the effects quickly, but they last shorter. Besides that, due to the burning process, many vital components are lost vs. sublingual. And for smoking, you need cannabis herbs as you cannot smoke cannabis oil. But, you can apply it to the surface of your joint.</span></p><span data-dcnode-id="5738" instrument_node="">
</span></div></section><section class="av_textblock_section av-1jb8794z-89b8f86cda4a1a14c6aa59d7afc07629" data-dcnode-id="5718"><div class="avia_textblock" data-dcnode-id="5719"><h2 data-dcnode-id="5733"><span data-dcnode-id="5734" id="Skin_Cancer_Treatment_with_Cannabis_Oil"><span data-dcnode-id="5735" instrument_node="">-Skin Cancer Treatment with Cannabis Oil</span></span></h2><span data-dcnode-id="5732" instrument_node="">
</span><p data-dcnode-id="5730"><span data-dcnode-id="5731" instrument_node="">As already mentioned, it is best to bring the cannabis oil as close as possible to the cancer source. Therefore, with skin cancer, it is very effective. Because with this form of cancer, you can directly apply the oil to the cancer source.</span></p><span data-dcnode-id="5729" instrument_node="">
</span><p data-dcnode-id="5727"><span data-dcnode-id="5728" instrument_node="">You should apply cannabis oil to the cancer-affected skin and cover it with a bandage. Every four days, you should apply new oil and replace the bandage every couple of weeks.</span></p><span data-dcnode-id="5726" instrument_node="">
</span><p data-dcnode-id="5724"><span data-dcnode-id="5725" instrument_node="">We have had reports from patients that skin cancer disappeared in a few days or five to six weeks in very severe cases.</span></p><span data-dcnode-id="5723" instrument_node="">
</span><p data-dcnode-id="5721"><span data-dcnode-id="5722" instrument_node="">Like other treatments, you need to continue this treatment two or three weeks after the cancer has disappeared to ensure that it doesn’t return.</span></p><span data-dcnode-id="5720" instrument_node="">
</span></div></section><section class="av_textblock_section av-1iwx55pf-bbdfaa6903995297c7918b669539efd1" data-dcnode-id="5659"><div class="avia_textblock" data-dcnode-id="5660"><h2 data-dcnode-id="5715"><span data-dcnode-id="5716" id="Cannabis_Oil_Dosing_Roadmaps"><span data-dcnode-id="5717" instrument_node="">Cannabis Oil Dosing Roadmaps</span></span></h2><span data-dcnode-id="5714" instrument_node="">
</span><p data-dcnode-id="5712"><span data-dcnode-id="5713" instrument_node="">We provide an average dosing roadmap that can be increased or decreased based on the patients’ reactions. We consider it essential to stay within your comfort zone, although there are no medical downsides to slightly overdosing.</span></p><span data-dcnode-id="5711" instrument_node="">
</span><h3 data-dcnode-id="5708"><span data-dcnode-id="5709" id="Regular_Cannabis_Oil_Dosing_Roadmap"><span data-dcnode-id="5710" instrument_node="">Regular Cannabis Oil Dosing Roadmap</span></span></h3><span data-dcnode-id="5707" instrument_node="">
</span><ul data-dcnode-id="5681"><li data-dcnode-id="5705"><span data-dcnode-id="5706" instrument_node="">The Cannabis oil dosing roadmap aims to reach one gram per day.</span></li><span data-dcnode-id="5704" instrument_node="">
</span><li data-dcnode-id="5692"><span data-dcnode-id="5703" instrument_node="">Start with 5-10 mg, three times a day, every 8 hours:
</span><ul data-dcnode-id="5693"><li data-dcnode-id="5701"><span data-dcnode-id="5702" instrument_node="">After breakfast, e.g., 8 AM</span></li><span data-dcnode-id="5700" instrument_node="">
</span><li data-dcnode-id="5698"><span data-dcnode-id="5699" instrument_node="">In the afternoon, e.g., 2 PM</span></li><span data-dcnode-id="5697" instrument_node="">
</span><li data-dcnode-id="5695"><span data-dcnode-id="5696" instrument_node="">Before going to bed, e.g., 10 PM</span></li><span data-dcnode-id="5694" instrument_node="">
</span></ul></li><span data-dcnode-id="5691" instrument_node="">
</span><li data-dcnode-id="5689"><span data-dcnode-id="5690" instrument_node="">Double the dosing every four days</span></li><span data-dcnode-id="5688" instrument_node="">
</span><li data-dcnode-id="5686"><span data-dcnode-id="5687" instrument_node="">In three weeks, you will reach the desired dosing.</span></li><span data-dcnode-id="5685" instrument_node="">
</span><li data-dcnode-id="5683"><span data-dcnode-id="5684" instrument_node="">This treatment will take approximately three months, which is roughly 60 grams.</span></li><span data-dcnode-id="5682" instrument_node="">
</span></ul><p data-dcnode-id="5679"><span data-dcnode-id="5680" instrument_node="">The table below outlines the regular dosing road maps indicating the days you need to increment the cannabis oil dosing. Once you reach the cannabis oil dosing of 1 gram per day after three to five weeks, you continue with 1 gram per day for the remaining days until the end of the 90-day treatment period.</span></p><span data-dcnode-id="5678" instrument_node="">
</span><p data-dcnode-id="5676"><span data-dcnode-id="5677" instrument_node="">In severe cases, patients often extend their treatment to 120 or 180 days while continuing the 1 gram per day of cannabis oil.</span></p><span data-dcnode-id="5675" instrument_node="">
</span><span class="av_font_icon av-1ibeoi03-75ba3f9ff75d6431779ad747486beb0f avia_animate_when_visible av-icon-style- avia-icon-pos-left av-no-color avia-icon-animate" data-dcnode-id="5673"><span aria-hidden="true" class="av-icon-char" data-av_icon="" data-av_iconfont="entypo-fontello" data-dcnode-id="5674"></span></span><span data-dcnode-id="5672" instrument_node="">
</span><p data-dcnode-id="5666"><strong data-dcnode-id="5667"><span data-dcnode-id="5671" instrument_node="">You should not confuse cannabis oil with CBD oil. The main component of cannabis oil is THC, and of course, it is CBD in CBD oil. For cancer treatment, the medical cannabis community recommends a mixture of Cannabis oil and </span><a data-dcnode-id="5669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//idweeds.com/cbd-dosage-calculator/"><span data-dcnode-id="5670" instrument_node="">CBD dosage</span></a><span data-dcnode-id="5668" instrument_node="">.</span></strong></p><span data-dcnode-id="5665" instrument_node="">
</span><h4 data-dcnode-id="5662"><span data-dcnode-id="5663" id="Regular_Roadmap"><span data-dcnode-id="5664" instrument_node="">Regular Roadmap</span></span></h4><span data-dcnode-id="5661" instrument_node="">
</span></div></section><div class="avia-data-table-wrap av-1i068qrn-0784210a2cd91e8b013bae0fff84b47a avia_responsive_table avia-table-2" data-dcnode-id="5602"><table class="avia-table avia-data-table avia_pricing_default avia-builder-el-11 el_after_av_textblock el_before_av_table" data-dcnode-id="5603"><caption data-dcnode-id="5657"><span data-dcnode-id="5658" instrument_node="">The amount of drops depends on the cannabis oil concentration</span></caption><tbody data-dcnode-id="5604"><tr class="avia-heading-row" data-dcnode-id="5649"><th class="avia-desc-col" data-dcnode-id="5654"><span data-dcnode-id="5656" instrument_node="">3 week ramp-up</span><br data-dcnode-id="5655"></th><th class="" data-dcnode-id="5652"><span data-dcnode-id="5653" instrument_node="">mg / dosing</span></th><th class="avia-highlight-col" data-dcnode-id="5650"><span data-dcnode-id="5651" instrument_node="">mg / day</span></th></tr><tr class="" data-dcnode-id="5641"><th class="avia-desc-col" data-dcnode-id="5646"><span data-dcnode-id="5648" instrument_node="">Day 1 to 4</span><br data-dcnode-id="5647"></th><td class="" data-dcnode-id="5644"><span data-dcnode-id="5645" instrument_node="">10</span></td><td class="avia-highlight-col" data-dcnode-id="5642"><span data-dcnode-id="5643" instrument_node="">30</span></td></tr><tr class="" data-dcnode-id="5634"><th class="avia-desc-col" data-dcnode-id="5639"><span data-dcnode-id="5640" instrument_node="">Day 5 to 8</span></th><td class="" data-dcnode-id="5637"><span data-dcnode-id="5638" instrument_node="">20</span></td><td class="avia-highlight-col" data-dcnode-id="5635"><span data-dcnode-id="5636" instrument_node="">60</span></td></tr><tr class="" data-dcnode-id="5626"><th class="avia-desc-col" data-dcnode-id="5632"><span data-dcnode-id="5633" instrument_node="">Day 9 to 12</span></th><td class="" data-dcnode-id="5630"><span data-dcnode-id="5631" instrument_node="">42</span></td><td class="avia-highlight-col" data-dcnode-id="5627"><span data-dcnode-id= node-id="5530" instrument_node="">Day 36 to 90</span></th><td class="" data-dcnode-id="5527"><span data-dcnode-id="5528" instrument_node="">333</span></td><td class="avia-highlight-col" data-dcnode-id="5525"><span data-dcnode-id="5526" instrument_node="">1000</span></td></tr></tbody></table></div><span data-dcnode-id="5518" instrument_node="">
</span><article class="iconbox iconbox_left av-14pkcohv-ba48df7c6ec0e7b6bef031aada917d35 avia-builder-el-13 el_after_av_table el_before_av_textblock" data-dcnode-id="5487"><div class="iconbox_content" data-dcnode-id="5489"><header class="entry-content-header" data-dcnode-id="5513"><div aria-hidden="true" class="iconbox_icon heading-color" data-av_icon="" data-av_iconfont="entypo-fontello" data-dcnode-id="5517"></div><h3 class="iconbox_content_title" data-dcnode-id="5514"><span data-dcnode-id="5515" id="Important"><span data-dcnode-id="5516" instrument_node="">Important</span></span></h3></header><div class="iconbox_content_container" data-dcnode-id="5490"><ul data-dcnode-id="5491"><li data-dcnode-id="5511"><span data-dcnode-id="5512" instrument_node="">Use Responsibly</span></li><span data-dcnode-id="5510" instrument_node="">
</span><li data-dcnode-id="5508"><span data-dcnode-id="5509" instrument_node="">Keep out of reach of children and pets</span></li><span data-dcnode-id="5507" instrument_node="">
</span><li data-dcnode-id="5505"><span data-dcnode-id="5506" instrument_node="">Store in a secure and dark place</span></li><span data-dcnode-id="5504" instrument_node="">
</span><li data-dcnode-id="5502"><span data-dcnode-id="5503" instrument_node="">Do not use during pregnancy</span></li><span data-dcnode-id="5501" instrument_node="">
</span><li data-dcnode-id="5499"><span data-dcnode-id="5500" instrument_node="">When driving, we do not recommend using it</span></li><span data-dcnode-id="5498" instrument_node="">
</span><li data-dcnode-id="5496"><span data-dcnode-id="5497" instrument_node="">Please do not take it on holidays abroad</span></li><span data-dcnode-id="5495" instrument_node="">
</span><li data-dcnode-id="5493"><span data-dcnode-id="5494" instrument_node="">Always consult a medical doctor concerning the decrease or cancellation of regular medication.</span></li><span data-dcnode-id="5492" instrument_node="">
</span></ul></div></div><footer class="entry-footer" data-dcnode-id="5488"></footer></article><section class="av_textblock_section av-14dcb7ab-710125a2657115ce4bf47c5381464ffe" data-dcnode-id="5445"><div class="avia_textblock" data-dcnode-id="5446"><p data-dcnode-id="5485"><span data-dcnode-id="5486" instrument_node="">When you are sensitive to cannabis oil, first of all, decrease the dosage by half in the beginning and increase the 4-day incrementation period to 5 or 6 days. After about five weeks, your body will have adapted to the treatment, and most people even enjoy it after that. Furthermore, once you get used to the cannabis, you will no longer experience the ‘high’ in the head, but probably only this comfortable feeling that some people compare with being wrapped in a warm blanket.</span></p><span data-dcnode-id="5484" instrument_node="">
</span><h3 data-dcnode-id="5481"><span data-dcnode-id="5482" id="Usage_Instructions"><span data-dcnode-id="5483" instrument_node="">Usage Instructions</span></span></h3><span data-dcnode-id="5480" instrument_node="">
</span><p data-dcnode-id="5478"><span data-dcnode-id="5479" instrument_node="">When the oil is cold, it is very thick. For easier cannabis oil dosing, you should warm it up. For example, hold the syringe in or under warm water or carefully heat it with a lighter.</span></p><span data-dcnode-id="5477" instrument_node="">
</span><ul data-dcnode-id="5461"><li data-dcnode-id="5475"><span data-dcnode-id="5476" instrument_node="">Wash your hands</span></li><span data-dcnode-id="5474" instrument_node="">
</span><li data-dcnode-id="5472"><span data-dcnode-id="5473" instrument_node="">Put some cannabis oil on your index finger and hold it behind your lower lip onto your lower gum.</span></li><span data-dcnode-id="5471" instrument_node="">
</span><li data-dcnode-id="5469"><span data-dcnode-id="5470" instrument_node="">Hold the cannabis oil onto your lower gum until it sticks</span></li><span data-dcnode-id="5468" instrument_node="">
</span><li data-dcnode-id="5466"><span data-dcnode-id="5467" instrument_node="">After that, gently massage it in from left to right, making circular motions</span></li><span data-dcnode-id="5465" instrument_node="">
</span><li data-dcnode-id="5463"><span data-dcnode-id="5464" instrument_node="">Keep doing this until your gum has absorbed all the cannabis oil</span></li><span data-dcnode-id="5462" instrument_node="">
</span></ul><h3 data-dcnode-id="5458"><span data-dcnode-id="5459" id="Urgent_Cannabis_Oil_Dosing_Roadmap"><span data-dcnode-id="5460" instrument_node="">Urgent Cannabis Oil Dosing Roadmap</span></span></h3><span data-dcnode-id="5457" instrument_node="">
</span><p data-dcnode-id="5455"><span data-dcnode-id="5456" instrument_node="">We often hear of life-threatening situations and cases where there is no time to lose, like late-stage cancer or when the doctors have given the patient only a short time to live. Because of urgency, you need to increase the cannabis oil dosing and shorten the implementation time. However, it would be best to give your body still the time to get used to cannabis.</span></p><span data-dcnode-id="5454" instrument_node="">
</span><p data-dcnode-id="5452"><span data-dcnode-id="5453" instrument_node="">In severe cases, patients have taken the 60-gram treatment within one month. We suggest the following cannabis oil dosing roadmap for this urgent treatment of severe cancer cases. The urgent roadmap ramps up a lot faster than the regular roadmap, so patients who choose this method will have to deal with the unpleasant THC oil side effects&nbsp;described later in this article.</span></p><span data-dcnode-id="5451" instrument_node="">
</span><h4 data-dcnode-id="5448"><span data-dcnode-id="5449" id="Urgent_Roadmap"><span data-dcnode-id="5450" instrument_node="">Urgent Roadmap</span></span></h4><span data-dcnode-id="5447" instrument_node="">
</span></div></section><div class="avia-data-table-wrap av-13t4ri1v-2d9b56e5e5470a7e49ed2acedb15f645 avia_responsive_table avia-table-4" data-dcnode-id="5386"><table class="avia-table avia-data-table avia_pricing_default avia-builder-el-15 el_after_av_textblock el_before_av_textblock" data-dcnode-id="5387"><tbody data-dcnode-id="5388"><tr class="avia-heading-row" data-dcnode-id="5438"><th class="avia-desc-col" data-dcnode-id="5443"><span data-dcnode-id="5444" instrument_node="">Urgent</span></th><th class="" data-dcnode-id="5441"><span data-dcnode-id="5442" instrument_node="">mg / dosing</span></th><th class="avia-highlight-col" data-dcnode-id="5439"><span data-dcnode-id="5440" instrument_node="">mg / day</span></th></tr><tr class="" data-dcnode-id="5431"><th class="avia-desc-col" data-dcnode-id="5436"><span data-dcnode-id="5437" instrument_node="">Day 1 to 4</span></th><td class="" data-dcnode-id="5434"><span data-dcnode-id="5435" instrument_node="">167</span></td><td class="avia-highlight-col" data-dcnode-id="5432"><span data-dcnode-id="5433" instrument_node="">500</span></td></tr><tr class="" data-dcnode-id="5424"><th class="avia-desc-col" data-dcnode-id="5429"><span data-dcnode-id="5430" instrument_node="">Day 5 to 8</span></th><td class="" data-dcnode-id="5427"><span data-dcnode-id="5428" instrument_node="">250</span></td><td class="avia-highlight-col" data-dcnode-id="5425"><span data-dcnode-id="5426" instrument_node="">750</span></td></tr><tr class="" data-dcnode-id="5417"><th class="avia-desc-col" data-dcnode-id="5422"><span data-dcnode-id="5423" instrument_node="">Day 9 to 12</span></th><td class="" data-dcnode-id="5420"><span data-dcnode-id="5421" instrument_node="">500</span></td><td class="avia-highlight-col" data-dcnode-id="5418"><span data-dcnode-id="5419" instrument_node="">1500</span></td></tr><tr class="" data-dcnode-id="5410"><th class="avia-desc-col" data-dcnode-id="5415"><span data-dcnode-id="5416" instrument_node="">Day 13 to 16</span></th><td class="" data-dcnode-id="5413"><span data-dcnode-id="5414" instrument_node="">750</span></td><td class="avia-highlight-col" data-dcnode-id="5411"><span data-dcnode-id="5412" instrument_node="">2250</span></td></tr><tr class="" data-dcnode-id="5403"><th class="avia-desc-col" data-dcnode-id="5408"><span data-dcnode-id="5409" instrument_node="">Day 17 to 20</span></th><td class="" data-dcnode-id="5406"><span data-dcnode-id="5407" instrument_node="">875</span></td><td class="avia-highlight-col" data-dcnode-id="5404"><span data-dcnode-id="5405" instrument_node="">2625</span></td></tr><tr class="" data-dcnode-id="5396"><th class="avia-desc-col" data-dcnode-id="5401"><span data-dcnode-id="5402" instrument_node="">Day 21 to 24</span></th><td class="" data-dcnode-id="5399"><span data-dcnode-id="5400" instrument_node="">958</span></td><td class="avia-highlight-col" data-dcnode-id="5397"><span data-dcnode-id="5398" instrument_node="">2875</span></td></tr><tr class="" data-dcnode-id="5389"><th class="avia-desc-col" data-dcnode-id="5394"><span data-dcnode-id="5395" instrument_node="">Day 25 to 30</span></th><td class="" data-dcnode-id="5392"><span data-dcnode-id="5393" instrument_node="">1000</span></td><td class="avia-highlight-col" data-dcnode-id="5390"><span data-dcnode-id="5391" instrument_node="">3000</span></td></tr></tbody></table></div><span data-dcnode-id="5383" instrument_node="">
</span><section class="av_textblock_section av-okm85pf-c44ebb715e92ea2e924c2d1b9a5ef946" data-dcnode-id="5368"><div class="avia_textblock" data-dcnode-id="5369"><p data-dcnode-id="5381"><span data-dcnode-id="5382" instrument_node="">* The length of the urgent treatment is 60 grams in 30 days. When necessary, you can extend it to 60 or 90 days.</span></p><span data-dcnode-id="5380" instrument_node="">
</span><h3 data-dcnode-id="5377"><span data-dcnode-id="5378" id="Cannabis_Dosage_After_Treatment"><span data-dcnode-id="5379" instrument_node="">Cannabis Dosage After Treatment</span></span></h3><span data-dcnode-id="5376" instrument_node="">
</span><p data-dcnode-id="5374"><span data-dcnode-id="5375" instrument_node="">Once you have gone through the regular treatment,&nbsp; it is wise to do an after-treatment of six months with a much lower dosage. The regular treatment typically takes three months, but you could extend it to four or six months in more severe cases.</span></p><span data-dcnode-id="5373" instrument_node="">
</span><p data-dcnode-id="5371"><span data-dcnode-id="5372" instrument_node="">This way, you make sure cancer does not come back. As an after-treatment, people usually take 1/10th of the regular dosage or 100 mg per day.</span></p><span data-dcnode-id="5370" instrument_node="">
</span></div></section><section class="av_textblock_section av-o6kgfb7-cf05b0e22bf4f60a886d7ac549e2126e" data-dcnode-id="5275"><div class="avia_textblock" data-dcnode-id="5276"><h2 data-dcnode-id="5365"><span data-dcnode-id="5366" id="How_to_Make_Cannabis_Suppositories"><span data-dcnode-id="5367" instrument_node="">How to Make Cannabis Suppositories</span></span></h2><span data-dcnode-id="5364" instrument_node="">
</span><p data-dcnode-id="5362"><span data-dcnode-id="5363" instrument_node="">It is surprisingly easy to make your own cannabis suppositories. You can either use reusable or disposable molds, which both are readily available online and in drugstores.</span></p><span data-dcnode-id="5361" instrument_node="">
</span><p data-dcnode-id="5359"><span data-dcnode-id="5360" instrument_node="">Based on the suppository roadmap below, you need to start with lower cannabis oil concentrations and gradually increase the dosage to reach the regular dosage of 1 gram (1000 mg) per day. Because you need to take three times a day for four days suppositories of the same concentration, you need 12 suppositories of the same concentration for the ramp-up period.</span></p><span data-dcnode-id="5358" instrument_node="">
</span><h3 data-dcnode-id="5355"><span data-dcnode-id="5356" id="Cannabis_Suppository_Ingredients"><span data-dcnode-id="5357" instrument_node="">Cannabis Suppository Ingredients</span></span></h3><span data-dcnode-id="5354" instrument_node="">
</span><p data-dcnode-id="5352"><span data-dcnode-id="5353" instrument_node="">You will need the following ingredients (based on the regular dosage of 1 gram cannabis oil per day; decrease according to the table for the ramp-up suppositories):</span></p><span data-dcnode-id="5351" instrument_node="">
</span><h4 data-dcnode-id="5348"><span data-dcnode-id="5349" id="Ingredients_for_four_days_12_suppositories"><span data-dcnode-id="5350" instrument_node="">Ingredients for four days / 12 suppositories</span></span></h4><span data-dcnode-id="5347" instrument_node="">
</span><p data-dcnode-id="5345"><span data-dcnode-id="5346" instrument_node="">Only reduce the THC amount during the ramp-up phase. The other ingredients stay the same.</span></p><span data-dcnode-id="5344" instrument_node="">
</span><ul data-dcnode-id="5319"><li data-dcnode-id="5336"><span data-dcnode-id="5343" instrument_node="">30 grams (1/8th cup) of </span><strong data-dcnode-id="5341"><span data-dcnode-id="5342" instrument_node="">organic cocoa</span></strong><span data-dcnode-id="5340" instrument_node=""> or shay </span><strong data-dcnode-id="5338"><span data-dcnode-id="5339" instrument_node="">butter</span></strong><span data-dcnode-id="5337" instrument_node=""> (for 12 suppositories)</span></li><span data-dcnode-id="5335" instrument_node="">
</span><li data-dcnode-id="5330"><span data-dcnode-id="5334" instrument_node="">Four grams of </span><strong data-dcnode-id="5332"><span data-dcnode-id="5333" instrument_node="">Cannabis oil</span></strong><span data-dcnode-id="5331" instrument_node="">. (Check the table below for ramp-up concentrations)</span></li><span data-dcnode-id="5329" instrument_node="">
</span><li data-dcnode-id="5321"><span data-dcnode-id="5328" instrument_node="">400 mg&nbsp;of </span><strong data-dcnode-id="5326"><span data-dcnode-id="5327" instrument_node="">CBD oil</span></strong><span data-dcnode-id="5325" instrument_node=""> (upon desire but recommended). For example, one bottle of </span><a data-dcnode-id="5323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//idweeds.com/go/cbdpure-600mg/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="5324" instrument_node="">CBDPure 600</span></a><span data-dcnode-id="5322" instrument_node=""> equals 600 mg of CBD.</span></li><span data-dcnode-id="5320" instrument_node="">
</span></ul><blockquote data-dcnode-id="5308"><span data-dcnode-id="5318" instrument_node="">
</span><p data-dcnode-id="5313"><span data-dcnode-id="5317" instrument_node="">Did you know that when you mix </span><strong data-dcnode-id="5315"><span data-dcnode-id="5316" instrument_node="">cocoa</span></strong><span data-dcnode-id="5314" instrument_node=""> into your suppositories, you further reduce the chances of getting ‘high’?</span></p><span data-dcnode-id="5312" instrument_node="">
</span><p data-dcnode-id="5310"><span data-dcnode-id="5311" instrument_node="">CBD also reduces the chances of getting high and it mitigates pain and nausea. Therefore, many patients increase this dosage two or threefold, based on these symptoms.</span></p><span data-dcnode-id="5309" instrument_node="">
</span></blockquote><span data-dcnode-id="5307" instrument_node="">
</span><h3 data-dcnode-id="5304"><span data-dcnode-id="5305" id="DYI_Suppository_Instructions"><span data-dcnode-id="5306" instrument_node="">DYI Suppository Instructions</span></span></h3><span data-dcnode-id="5303" instrument_node="">
</span><p data-dcnode-id="5301"><span data-dcnode-id="5302" instrument_node="">First of all, melt the butter in a small pan but avoid boiling it. Add the cannabis oil and CBD oil and stir until they are thoroughly blended. After letting the butter blend cool off for a couple of minutes, you can fill the molds.</span></p><span data-dcnode-id="5300" instrument_node="">
</span><p data-dcnode-id="5298"><span data-dcnode-id="5299" instrument_node="">It is best to use a syringe to fill the molds. Finally, put the molds in the freezer and let them solidify for about an hour.</span></p><span data-dcnode-id="5297" instrument_node="">
</span><p data-dcnode-id="5295"><span data-dcnode-id="5296" instrument_node="">Instead of the butter mentioned above, people also often use coconut oil. Hence you need to use the type of coconut oil that solidifies when cooled. However, in some cases, coconut oil can cause an allergic reaction- so keep that in mind.</span></p><span data-dcnode-id="5294" instrument_node="">
</span><h4 data-dcnode-id="5291"><span data-dcnode-id="5292" id="CannabisCBD_Suppository_Dosing"><span data-dcnode-id="5293" instrument_node="">Cannabis/CBD Suppository Dosing</span></span></h4><span data-dcnode-id="5290" instrument_node="">
</span><p data-dcnode-id="5288"><span data-dcnode-id="5289" instrument_node="">When you take&nbsp;suppositories, you also need to build up slowly to get used to the cannabis. However, you can ramp up much quicker in this case. The dosing is done by changing the concentration of cannabis oil and CBD oil in the suppositories, not by the number of suppositories you take.</span></p><span data-dcnode-id="5287" instrument_node="">
</span><p data-dcnode-id="5282"><span data-dcnode-id="5286" instrument_node="">Cannabidiol (or CBD, not to be confused with cannabis oil) is most of all used as a supportive component for cannabis cancer treatment. Because it is an effective pain reliever besides other </span><a data-dcnode-id="5284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//idweeds.com/cbd-oil-benefits/"><span data-dcnode-id="5285" instrument_node="">substantial health benefits</span></a><span data-dcnode-id="5283" instrument_node="">, it inhibits nausea and vomiting and is an anti-inflammatory. There is more info in the ‘What does CBD feel like’ and the ‘How to use CBD oil’ articles.</span></p><span data-dcnode-id="5281" instrument_node="">
</span><h4 data-dcnode-id="5278"><span data-dcnode-id="5279" id="Regular_Suppository_Roadmap"><span data-dcnode-id="5280" instrument_node="">Regular Suppository Roadmap</span></span></h4><span data-dcnode-id="5277" instrument_node="">

</span><article class="iconbox iconbox_left_content av-425zu4j-9b12c41d41274fdd945e5591aa27b6db avia-builder-el-20 el_after_av_table el_before_av_textblock" data-dcnode-id="5046"><div aria-hidden="true" class="iconbox_icon heading-color" data-av_icon="" data-av_iconfont="entypo-fontello" data-dcnode-id="5060"></div><div class="iconbox_content" data-dcnode-id="5048"><header class="entry-content-header" data-dcnode-id="5056"><h3 class="iconbox_content_title" data-dcnode-id="5057"><span data-dcnode-id="5058" id="Urgent_Suppository_Road_Map"><span data-dcnode-id="5059" instrument_node="">Urgent Suppository Road Map</span></span></h3></header><div class="iconbox_content_container" data-dcnode-id="5049"><p data-dcnode-id="5054"><span data-dcnode-id="5055" instrument_node="">Using this roadmap, you will arrive at 1 gram of cannabis oil per day, recommended for cancer patients. The standard treatment takes three months and roughly 60 grams of cannabis oil (5-week ramp-up).</span></p><span data-dcnode-id="5053" instrument_node="">
</span><p data-dcnode-id="5051"><span data-dcnode-id="5052" instrument_node="">However, in urgent, life-threatening situations, similar to the urgent roadmap for oral intake (see above), the dosing can be increased to the extent of taking the entire 60-gram treatment in one month. In this case, you will most likely have to deal with side effects, which we describe below.</span></p><span data-dcnode-id="5050" instrument_node="">
</span></div></div><footer class="entry-footer" data-dcnode-id="5047"></footer></article><section class="av_textblock_section av-3av9r0j-fb8523c2e9bb33ef61291853b8439775" data-dcnode-id="4996"><div class="avia_textblock" data-dcnode-id="4997"><h2 data-dcnode-id="5043"><span data-dcnode-id="5044" id="Maintaining_Your_Health_After_Cancer_Treatment"><span data-dcnode-id="5045" instrument_node="">Maintaining Your Health After Cancer Treatment</span></span></h2><span data-dcnode-id="5042" instrument_node="">
</span><h3 data-dcnode-id="5039"><span data-dcnode-id="5040" id="Maintenance_Dosing"><span data-dcnode-id="5041" instrument_node="">Maintenance Dosing</span></span></h3><span data-dcnode-id="5038" instrument_node="">
</span><p data-dcnode-id="5036"><span data-dcnode-id="5037" instrument_node="">In general, we recommend continuing to take cannabis oil just to keep your health in good condition. Only a couple of drops a day, which amounts to about 1 gram or milliliter a month, is enough to maintain your health.</span></p><span data-dcnode-id="5035" instrument_node="">
</span><p data-dcnode-id="5033"><img alt="health" class="aligncenter size-medium wp-image-31829" data-dcnode-id="5034" height="199" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.idweeds.com/wp-content/uploads/2017/11/fitness-332278_1920-300x199.jpg&amp;raw" srcset="https://cdn.idweeds.com/wp-content/uploads/2017/11/fitness-332278_1920-300x199.jpg 300w, https://cdn.idweeds.com/wp-content/uploads/2017/11/fitness-332278_1920-80x53.jpg 80w, https://cdn.idweeds.com/wp-content/uploads/2017/11/fitness-332278_1920-768x510.jpg 768w, https://cdn.idweeds.com/wp-content/uploads/2017/11/fitness-332278_1920.jpg 1920w" width="300"></p><span data-dcnode-id="5032" instrument_node="">
</span><p data-dcnode-id="5030"><span data-dcnode-id="5031" instrument_node="">Cannabis oil not only treats cancer, but it enhances your general health and has, amongst others, the following health benefits:</span></p><span data-dcnode-id="5029" instrument_node="">
</span><ul data-dcnode-id="5001"><li data-dcnode-id="5027"><span data-dcnode-id="5028" instrument_node="">Prevents cancer</span></li><span data-dcnode-id="5026" instrument_node="">
</span><li data-dcnode-id="5024"><span data-dcnode-id="5025" instrument_node="">Improves heart health</span></li><span data-dcnode-id="5023" instrument_node="">
</span><li data-dcnode-id="5021"><span data-dcnode-id="5022" instrument_node="">Reduces eye diseases like Glaucoma</span></li><span data-dcnode-id="5020" instrument_node="">
</span><li data-dcnode-id="5018"><span data-dcnode-id="5019" instrument_node="">Decreases skin aging</span></li><span data-dcnode-id="5017" instrument_node="">
</span><li data-dcnode-id="5015"><span data-dcnode-id="5016" instrument_node="">Relieves stress and anxiety</span></li><span data-dcnode-id="5014" instrument_node="">
</span><li data-dcnode-id="5012"><span data-dcnode-id="5013" instrument_node="">Improves sleep</span></li><span data-dcnode-id="5011" instrument_node="">
</span><li data-dcnode-id="5009"><span data-dcnode-id="5010" instrument_node="">Eliminates headaches</span></li><span data-dcnode-id="5008" instrument_node="">
</span><li data-dcnode-id="5006"><span data-dcnode-id="5007" instrument_node="">Mitigates pain</span></li><span data-dcnode-id="5005" instrument_node="">
</span><li data-dcnode-id="5003"><span data-dcnode-id="5004" instrument_node="">Boosts appetite</span></li><span data-dcnode-id="5002" instrument_node="">
</span></ul><p data-dcnode-id="4999"><span data-dcnode-id="5000" instrument_node="">Besides cannabis oil, we recommend mixing it with CO2 CBD oil&nbsp;because CBD has other positive effects on your health.</span></p><span data-dcnode-id="4998" instrument_node="">
</span></div></section><section class="av_textblock_section av-36zpqtf-16c226ccdf69c282eabc4ee929f1e861" data-dcnode-id="4928"><div class="avia_textblock" data-dcnode-id="4929"><h2 data-dcnode-id="4993"><span data-dcnode-id="4994" id="Parallel_Use_of_Regular_Medication"><span data-dcnode-id="4995" instrument_node="">Parallel Use of Regular Medication</span></span></h2><span data-dcnode-id="4992" instrument_node="">
</span><p data-dcnode-id="4990"><span data-dcnode-id="4991" instrument_node="">When using regular medication, you need to be aware of a few things before starting cannabis oil treatment and always consult a medical doctor who has experience with cannabis treatment.</span></p><span data-dcnode-id="4989" instrument_node="">
</span><p data-dcnode-id="4987"><span data-dcnode-id="4988" instrument_node="">The following three scenarios require special attention when starting cannabis oil treatment:</span></p><span data-dcnode-id="4986" instrument_node="">
</span><ul data-dcnode-id="4976"><li data-dcnode-id="4984"><span data-dcnode-id="4985" instrument_node="">Parallel use of regular painkillers, steroids, or morphine</span></li><span data-dcnode-id="4983" instrument_node="">
</span><li data-dcnode-id="4981"><span data-dcnode-id="4982" instrument_node="">Usage of blood pressure medication in&nbsp;parallel with cannabis</span></li><span data-dcnode-id="4980" instrument_node="">
</span><li data-dcnode-id="4978"><span data-dcnode-id="4979" instrument_node="">Insulin usage for diabetes in&nbsp;parallel with cannabis</span></li><span data-dcnode-id="4977" instrument_node="">
</span></ul><h3 data-dcnode-id="4973"><span data-dcnode-id="4974" id="Parallel_Use_of_Regular_Painkillers_Steroids_or_Morphine"><span data-dcnode-id="4975" instrument_node="">Parallel Use of Regular Painkillers, Steroids, or Morphine</span></span></h3><span data-dcnode-id="4972" instrument_node="">
</span><p data-dcnode-id="4970"><span data-dcnode-id="4971" instrument_node="">The side effects of using regular painkillers, along with cannabis oil, can be harmful. Ideally, you should stop the traditional pain treatment on day one of your cannabis oil treatment, or at least drastically reduce it and range it down to zero within the first week or up to three weeks in case of severe dosages.</span></p><span data-dcnode-id="4969" instrument_node="">
</span><p data-dcnode-id="4967"><img alt="Regular medication" class="aligncenter size-medium wp-image-31822" data-dcnode-id="4968" height="200" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.idweeds.com/wp-content/uploads/2017/11/drug-pusher-1907827_1920-300x200.jpg&amp;raw" srcset="https://cdn.idweeds.com/wp-content/uploads/2017/11/drug-pusher-1907827_1920-300x200.jpg 300w, https://cdn.idweeds.com/wp-content/uploads/2017/11/drug-pusher-1907827_1920-80x53.jpg 80w, https://cdn.idweeds.com/wp-content/uploads/2017/11/drug-pusher-1907827_1920-768x512.jpg 768w, https://cdn.idweeds.com/wp-content/uploads/2017/11/drug-pusher-1907827_1920.jpg 1920w" width="300"></p><span data-dcnode-id="4966" instrument_node="">
</span><p data-dcnode-id="4964"><span data-dcnode-id="4965" instrument_node="">However, because of the pain relief properties of cannabis oil, caused by the THC and CBD components, it also provides pain relief. By using additional CBD for pain relief, you can increase the effects of these natural products, allowing you to reduce the regular painkillers quicker.</span></p><span data-dcnode-id="4963" instrument_node="">
</span><p data-dcnode-id="4958"><span data-dcnode-id="4962" instrument_node="">Some CBD brands are </span><a data-dcnode-id="4960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//idweeds.com/cbd-white-label/"><span data-dcnode-id="4961" instrument_node="">white label CBD oil</span></a><span data-dcnode-id="4959" instrument_node="">. They are identical to the original product, just with different labeling.</span></p><span data-dcnode-id="4957" instrument_node="">
</span><h4 data-dcnode-id="4954"><span data-dcnode-id="4955" id="Risk_of_Addiction_to_Big_Pharma_Painkillers"><span data-dcnode-id="4956" instrument_node="">Risk of Addiction to ‘Big Pharma’ Painkillers</span></span></h4><span data-dcnode-id="4953" instrument_node="">
</span><p data-dcnode-id="4951"><span data-dcnode-id="4952" instrument_node="">Check out the best Cannabidiol oils for pain&nbsp;and the best Cannabidiol oils for anxiety, as well as CBD oil for dogs.</span></p><span data-dcnode-id="4950" instrument_node="">
</span><p data-dcnode-id="4948"><span data-dcnode-id="4949" instrument_node="">Very often, regular painkillers, like morphine, are highly addictive, and it can be challenging for patients to reduce them, and they can even suffer from withdrawal symptoms. It is good to know that cannabis oil helps to reduce these symptoms much quicker.</span></p><span data-dcnode-id="4947" instrument_node="">
</span><h3 data-dcnode-id="4944"><span data-dcnode-id="4945" id="Parallel_Use_of_Blood_Pressure_Medication"><span data-dcnode-id="4946" instrument_node="">Parallel Use of Blood Pressure Medication</span></span></h3><span data-dcnode-id="4943" instrument_node="">
</span><p data-dcnode-id="4941"><span data-dcnode-id="4942" instrument_node="">THC tincture for sale in dispensaries (and online in some states) lowers your blood pressure, so it can drop too far when you combine it with regular blood pressure medication. Monitor your blood pressure regularly and reduce the conventional medicines as needed while increasing cannabis oil to keep your blood pressure at a healthy level.</span></p><span data-dcnode-id="4940" instrument_node="">
</span><p data-dcnode-id="4938"><span data-dcnode-id="4939" instrument_node="">If you already have low blood pressure, you need to decrease the cannabis oil dosing in the beginning and ramp it up over a more extended period (for example, six to eight weeks instead of three to five). Also, in this case, the regular monitoring of your blood pressure should serve as a guideline, keeping it at comfortable levels.</span></p><span data-dcnode-id="4937" instrument_node="">
</span><h3 data-dcnode-id="4934"><span data-dcnode-id="4935" id="Insulin_Usage_for_Diabetes_in_Parallel_with_Cannabis"><span data-dcnode-id="4936" instrument_node="">Insulin Usage for Diabetes in&nbsp;Parallel with Cannabis</span></span></h3><span data-dcnode-id="4933" instrument_node="">
</span><p data-dcnode-id="4931"><span data-dcnode-id="4932" instrument_node="">Patients who have diabetes are regularly monitoring their blood sugar levels to determine the dose of insulin. When starting cannabis oil treatment, you can expect to reduce insulin intake until you can finally eliminate it.</span></p><span data-dcnode-id="4930" instrument_node="">
</span></div></section><section class="av_textblock_section av-2cx9jvn-b6f651d2def055efd614ac1aca8310ea" data-dcnode-id="4835"><div class="avia_textblock" data-dcnode-id="4836"><h2 data-dcnode-id="4925"><span data-dcnode-id="4926" id="Side_Effects_and_Overdosing"><span data-dcnode-id="4927" instrument_node="">Side Effects and Overdosing</span></span></h2><span data-dcnode-id="4924" instrument_node="">
</span><p data-dcnode-id="4922"><span data-dcnode-id="4923" instrument_node="">Cannabis oil is generally not harmful and can by no means cause death even when overdosing. However, unpleasant side effects can occur in some instances. These side effects, in general, happen in the following cases:</span></p><span data-dcnode-id="4921" instrument_node="">
</span><p data-dcnode-id="4919"><img alt="RSO side effects" class="aligncenter size-medium wp-image-31827" data-dcnode-id="4920" height="200" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.idweeds.com/wp-content/uploads/2017/11/upset-2681502_1920-300x200.jpg&amp;raw" srcset="https://cdn.idweeds.com/wp-content/uploads/2017/11/upset-2681502_1920-300x200.jpg 300w, https://cdn.idweeds.com/wp-content/uploads/2017/11/upset-2681502_1920-80x53.jpg 80w, https://cdn.idweeds.com/wp-content/uploads/2017/11/upset-2681502_1920-768x512.jpg 768w, https://cdn.idweeds.com/wp-content/uploads/2017/11/upset-2681502_1920.jpg 1920w" width="300"></p><span data-dcnode-id="4918" instrument_node="">
</span><ul data-dcnode-id="4908"><li data-dcnode-id="4916"><span data-dcnode-id="4917" instrument_node="">General side effects</span></li><span data-dcnode-id="4915" instrument_node="">
</span><li data-dcnode-id="4913"><span data-dcnode-id="4914" instrument_node="">Side effects due to parallel use of regular medication</span></li><span data-dcnode-id="4912" instrument_node="">
</span><li data-dcnode-id="4910"><span data-dcnode-id="4911" instrument_node="">Side effects due to overdosing</span></li><span data-dcnode-id="4909" instrument_node="">
</span></ul><h3 data-dcnode-id="4905"><span data-dcnode-id="4906" id="General_Side_Effects"><span data-dcnode-id="4907" instrument_node="">General Side Effects</span></span></h3><span data-dcnode-id="4904" instrument_node="">
</span><p data-dcnode-id="4902"><span data-dcnode-id="4903" instrument_node="">The following side effects might occur when starting the cannabis treatment.</span></p><span data-dcnode-id="4901" instrument_node="">
</span><ul data-dcnode-id="4882"><li data-dcnode-id="4899"><span data-dcnode-id="4900" instrument_node="">Dry mouth</span></li><span data-dcnode-id="4898" instrument_node="">
</span><li data-dcnode-id="4896"><span data-dcnode-id="4897" instrument_node="">Fatigue or weariness</span></li><span data-dcnode-id="4895" instrument_node="">
</span><li data-dcnode-id="4893"><span data-dcnode-id="4894" instrument_node="">Dizziness</span></li><span data-dcnode-id="4892" instrument_node="">
</span><li data-dcnode-id="4890"><span data-dcnode-id="4891" instrument_node="">Nausea</span></li><span data-dcnode-id="4889" instrument_node="">
</span><li data-dcnode-id="4887"><span data-dcnode-id="4888" instrument_node="">Regular toilet visits</span></li><span data-dcnode-id="4886" instrument_node="">
</span><li data-dcnode-id="4884"><span data-dcnode-id="4885" instrument_node="">Appetite reduction</span></li><span data-dcnode-id="4883" instrument_node="">
</span></ul><p data-dcnode-id="4880"><span data-dcnode-id="4881" instrument_node="">These side effects are temporary and will disappear when you get used to the treatment in three to five weeks. You can reduce them by reducing both the dosing and incrementation speed.</span></p><span data-dcnode-id="4879" instrument_node="">
</span><p data-dcnode-id="4877"><span data-dcnode-id="4878" instrument_node="">We recommend always drinking enough water. Especially when starting the cannabis oil treatment, you need to pay attention to this and drink water regularly. The tired feeling you most likely get is actually beneficial to the healing process, and you should go along with it and rest as much as possible. It is usual for patients to sleep for hours during the day while at the same time sleeping much better and longer at night.</span></p><span data-dcnode-id="4876" instrument_node="">
</span><h3 data-dcnode-id="4873"><span data-dcnode-id="4874" id="Side_Effects_Due_to_Parallel_Use_of_Regular_Medication"><span data-dcnode-id="4875" instrument_node="">Side Effects Due to Parallel Use of Regular Medication</span></span></h3><span data-dcnode-id="4872" instrument_node="">
</span><p data-dcnode-id="4870"><span data-dcnode-id="4871" instrument_node="">Depending on the type of regular medication used, people suffer from nausea to vomiting. If this is the case, it is good to remember that regular medicines could be causing the problem. It is best to reduce the regular medication as soon as possible instead of the cannabis oil treatment.</span></p><span data-dcnode-id="4869" instrument_node="">
</span><p data-dcnode-id="4867"><span data-dcnode-id="4868" instrument_node="">Cannabis oil is a natural product, and it enhances your body’s own ability to fight diseases and infections. Most of the regular medications used are chemical substances that harm our stomach and other organs. Cannabis oil stimulates our body to fight this harm, which causes nausea and vomiting.</span></p><span data-dcnode-id="4866" instrument_node="">
</span><h3 data-dcnode-id="4863"><span data-dcnode-id="4864" id="Side_Effects_Due_to_Overdosing"><span data-dcnode-id="4865" instrument_node="">Side Effects Due to Overdosing</span></span></h3><span data-dcnode-id="4862" instrument_node="">
</span><p data-dcnode-id="4860"><span data-dcnode-id="4861" instrument_node="">As already mentioned, there are no harmful effects from cannabis oil- even when seriously overdosing. However, when you are not used to cannabis and, in the beginning, take too much or ramp up the dosing too fast, you can encounter some unpleasant side effects:</span></p><span data-dcnode-id="4859" instrument_node="">
</span><ul data-dcnode-id="4846"><li data-dcnode-id="4857"><span data-dcnode-id="4858" instrument_node="">Anxiety</span></li><span data-dcnode-id="4856" instrument_node="">
</span><li data-dcnode-id="4854"><span data-dcnode-id="4855" instrument_node="">Passing out</span></li><span data-dcnode-id="4853" instrument_node="">
</span><li data-dcnode-id="4851"><span data-dcnode-id="4852" instrument_node="">Hyperventilation</span></li><span data-dcnode-id="4850" instrument_node="">
</span><li data-dcnode-id="4848"><span data-dcnode-id="4849" instrument_node="">Having an intense ‘high’</span></li><span data-dcnode-id="4847" instrument_node="">
</span></ul><p data-dcnode-id="4844"><span data-dcnode-id="4845" instrument_node="">Although these effects are not harmful to your health, they can give you a good scare. The most important thing is to stay calm and sleep or rest until it is over.&nbsp;You can drink and eat something sweet to make you feel better.</span></p><span data-dcnode-id="4843" instrument_node="">
</span><p data-dcnode-id="4841"><span data-dcnode-id="4842" instrument_node="">The reason for slowly ramping up the THC dosing is to avoid these effects.</span></p><span data-dcnode-id="4840" instrument_node="">
</span><p data-dcnode-id="4838"><span data-dcnode-id="4839" instrument_node="">However, once your body gets used to cannabis, people only experience a delightful and relaxed feeling.</span></p><span data-dcnode-id="4837" instrument_node="">
</span></div></section></div><div class="flex_column av-1qgkk7m-8fd44fbbdc410d0407b786c5684422ab av_one_full avia-builder-el-24 el_after_av_one_full avia-builder-el-last first flex_column_div av-zero-column-padding column-top-margin" data-dcnode-id="504"><div class="togglecontainer av-jyaa1ho6-4ebf7059fa272700c9237a7333fe57f7 av-minimal-toggle avia-builder-el-25 el_before_av_comments_list avia-builder-el-first toggle_close_all enable_toggles" data-dcnode-id="4818"><span data-dcnode-id="4833" instrument_node="">

</span><p data-dcnode-id="4426"><span data-dcnode-id="4427" instrument_node="">I have Stage IV, Gleason 9 (4+5) Prostate Cancer since 2014 with metastases to my ribs in 2018, and back, plus lymph nodes.  In 2017 I was given anywhere from two months to a couple of years to live.  In May 2018 was the first metastases and when I began using FECO – I am currently on 1g of 775mg THC and 1g of 700mg CBD per day.</span></p><span data-dcnode-id="4425" instrument_node="">
</span><p data-dcnode-id="4423"><span data-dcnode-id="4424" instrument_node="">I find that it is too bitter to continually take sublingually, though this is the most efficient route and so I put my oils in capsules and swallow them.  I DON’T NEED TO ACCLIMATISE TO THC.</span></p><span data-dcnode-id="4422" instrument_node="">
</span><p data-dcnode-id="4420"><span data-dcnode-id="4421" instrument_node="">But I’m having a problem.  Initially, I went to dealer and bought a carrier bag full of good bud at a discount and made my own oil from it and the results were very good.  But I couldn’t buy the same stuff again, so I went elsewhere and I’m using TESTED oils only.  The problem is that it isn’t working, or not working as well as it had.</span></p><span data-dcnode-id="4419" instrument_node="">
</span><p data-dcnode-id="4417"><span data-dcnode-id="4418" instrument_node="">I cannot really afford the 2g of oil that I am doing right now, per day and you mention 4000mg!  You’ve also said that suppositories are best.  I’m trying to find out how to stop this cancer before it stops me.  The suppositories make sense and I have 2g single-use plastic moulds that I got on eBay (expensive!) and I have some ‘Tiana’ Coconut oil. that is out of date, but still unopened.  What would my recipe be?</span></p><span data-dcnode-id="4416" instrument_node="">
</span><p data-dcnode-id="4414"><span data-dcnode-id="4415" instrument_node="">Another question, someone else has told me to take CBD, wait 2 hrs, then take THC, does that make sense to you?</span></p><span data-dcnode-id="4413" instrument_node="">
</span><a aria-label="Reply to Anonymous" class="comment-reply-link" data-belowelement="comment-693" data-commentid="693" data-dcnode-id="4411" data-postid="31779" data-replyto="Reply to Anonymous" data-respondelement="respond" href="#comment-693" rel="nofollow"><span data-dcnode-id="4412" instrument_node="">Reply</span></a><span data-dcnode-id="4410" instrument_node=""> </span></div><span data-dcnode-id="4408" instrument_node="">

</span><p data-dcnode-id="4370"><span data-dcnode-id="4373" instrument_node="">Hi Mike, Thanks for writing. I am surprised that you didn’t need to acclimatize to THC. Many of our community members write us that they have trouble acclimatizing. You must have a strong body system or not the right concentration of THC (is suspect the latter). I am confused with the milligram and gram amounts you mention. The article where you left your comment, does not mention 4000mg THC as far as I know. We recommend (as well as Rick Simpson) 1000mg which is equal to 1 gram of THC per day. But to avoid getting high you need to follow one of the ramp up roadmaps.</span><br data-dcnode-id="4372"><span data-dcnode-id="4371" instrument_node="">
What do you mean with: – I am currently on 1g of 775mg THC and 1g of 700mg CBD per day.? Does that mean you have a bottle containing 775mg THC and you take 1 gram of that? How is that possible? 1 gram is 1000 mg which is more then the bottle contains (775mg). In order to take 1000mg of THC you would have to take almost one and a quarter bottle. I am guessing that this is probably why you are not getting high because your dosages are way too low like this. </span></p><span data-dcnode-id="4369" instrument_node="">
</span><p data-dcnode-id="4357"><span data-dcnode-id="4368" instrument_node="">Maybe the confusion is the following. CBD and THC oils are mixed with carrier oils. So the total weight of the oil in the bottle is a lot more than the amount of THC in there. Plus you cannot know the weight of the oil in the bottle as this is never indicated. However, the volume is.</span><br data-dcnode-id="4367"><span data-dcnode-id="4366" instrument_node="">
If you have for example a 1 oz bottle (the volume of this bottle is 1 oz = 30ml) You cannot transfer 1ml to 1 gram because it is not water. Oil is lighter so 1 ml is way less than 1 gram. The right way to calculate your dosage of THC (and equally CBD) is to look at the volume of the bottle.</span><br data-dcnode-id="4365"><span data-dcnode-id="4364" instrument_node="">
Let’s say your bottle contains 775mg of THC.</span><br data-dcnode-id="4363"><span data-dcnode-id="4362" instrument_node="">
You need to find out the volume of the bottle. Let’s say it is 1 oz or 30ml.</span><br data-dcnode-id="4361"><span data-dcnode-id="4360" instrument_node="">
There are 20 drops in 1 ml or 600 drops in a 30ml bottle.</span><br data-dcnode-id="4359"><span data-dcnode-id="4358" instrument_node="">
1 drop contains in this case 775:600= 1.25832mg of THC, respectively 4 drops of oil = 5 mg of THC, which is the starting dosage according to the regular 5-week ramp-up table. </span></p><span data-dcnode-id="4356" instrument_node="">
</span><p data-dcnode-id="4354"><span data-dcnode-id="4355" instrument_node="">I hope this helps. If you have any problems calculating the volume of oil you need to take to get the correct milligram dosage of THC and CBD, let me know the volume of the bottles, the mg amount of THC and CBD or the concentration percentage. I will help you guide through it. </span></p><span data-dcnode-id="4353" instrument_node="">
</span><p data-dcnode-id="4349"><span data-dcnode-id="4352" instrument_node="">As for suppositories or sublingual or oral intake. The key rule is that both THC and CBD are most effective when they can be brought in contact or at least as close as possible with the cancer.</span><br data-dcnode-id="4351"><span data-dcnode-id="4350" instrument_node="">
In your situation with cancer is spread out and sublingual or oral intake is probably the best. But for the prostate cancer of course suppositories would be best, so do that as a side treatment. Do both methods in parallel. The recipe for making suppositories is in the article. </span></p><span data-dcnode-id="4348" instrument_node="">
</span><p data-dcnode-id="4346"><span data-dcnode-id="4347" instrument_node="">Concerning the split intaking of THC and CBD, it is the first time I hear about that. The many people that have reported to have had good results with THC and CBD treatments usually take them together. THC and CBD both come from the cannabis plant and therefore go together naturally.</span></p><span data-dcnode-id="4345" instrument_node="">

</span><p data-dcnode-id="4036"><span data-dcnode-id="4043" instrument_node="">Hi Amanda, Thanks for sharing. I understand that you don’t like the high, but it is completely harmless to your body and you probably wouldn’t feel much better with chemo or radiation therapies, which do a lot of harm to your body. But you are doing the right thing to handle it. Well done!</span><br data-dcnode-id="4042"><span data-dcnode-id="4041" instrument_node="">
THC (and CBD) needs to be administered as close as possible to the cancer source. Your initial cancer source (colon) is in the lower part of the body, so suppositories would be beneficial, although probably better as a supportive treatment. I would keep the oral ingestion as the main method as this brings the THC directly through the colon. When using suppositories pay attention to the position of the suppository when inserting (lower or upper rectum). Read that section of the article carefully. It is probably better in your case to insert them into the upper rectum, thus deeper, which won’t make a difference for the THC high then.</span><br data-dcnode-id="4040"><span data-dcnode-id="4039" instrument_node="">
As you read from the article it is definitely recommended to add CBD oil. Adding CBD oil has several advantages of which the main ones in your case are: Reduces the high to a certain extent. Improves the effectivity of the THC and also mitigates pain, anxiety and stress that most cancer patients are suffering from.</span><br data-dcnode-id="4038"><span data-dcnode-id="4037" instrument_node="">
All the best with your further treatment and we would appreciate it if you could share with us further progress and results, so other people can benefit from it too.</span></p><span data-dcnode-id="4035" instrument_node="">

</span><p data-dcnode-id="3964"><span data-dcnode-id="3987" instrument_node="">Hi all , Hi Fawaz .</span><br data-dcnode-id="3986"><span data-dcnode-id="3985" instrument_node="">
My sister is 50 and she have been diagnosed since 3 months ( last 5th august ) with an aggressive Ovarian cancer grade 4 that metastasized to the lungs and liver . After the biopsy the tumor was measured at 9 cm, this cancer has been evaluated as existing not more than 2 to 3 months, it’s why it have been classified aggressive.</span><br data-dcnode-id="3984"><span data-dcnode-id="3983" instrument_node="">
My sister started since last 21 September Chemo treatment ( Taxol / Carboplatine ) and to reduce the harmful effects of chemo she also started since last 7th october taking RSO orally , this Oil have been provided by a friend ( 60% CBD / 40 %THC ).</span><br data-dcnode-id="3982"><span data-dcnode-id="3981" instrument_node="">
The  regular roadmap method have been choosed to avoid psychotic effect ==&gt;  actually 30 October she’s taking 600 mg ( 3 dose x 200 mg per day ), next week she’ll take 1g per day still subdivide in 3 dose per day and we’ll hope to reach 2g or 2,5g per day the next 2nd and 3rd weeks to come.</span><br data-dcnode-id="3980"><span data-dcnode-id="3979" instrument_node="">
Before the RSO treatment the clinical condition of my sister was catastrophic ==&gt; respiratory problem, abdomen full of water, tachycardia, permanently bedridden, a lot of nausea due to the chemo and a lot of problem to eat, was not eating almost …</span><br data-dcnode-id="3978"><span data-dcnode-id="3977" instrument_node="">
Since she started taking RSO on October 7th, she was able to start eating from the 2nd or 3rd day and her appetite grew amazingly and her clinical condition began to improve, today she’s walking and started physical exercises.</span><br data-dcnode-id="3976"><span data-dcnode-id="3975" instrument_node="">
The next step is surgery to remove the Ovarian tumor and everything that has been touched by this cancer when possible.</span><br data-dcnode-id="3974"><span data-dcnode-id="3973" instrument_node="">
It should be planned soon after the oncology assessment scheduled for next November 26th.</span><br data-dcnode-id="3972"><span data-dcnode-id="3971" instrument_node="">
In the meantime she continues her weekly chemo treatment and the RSO administration which I think helps her to support chemo and its catastrophic effects , and also has to make the disease regress I am convinced.</span><br data-dcnode-id="3970"><span data-dcnode-id="3969" instrument_node="">
I will keep you informed on a regular basis, in order to help the community to move towards this alternative treatment based on RSO which I think deeply to a growing future and the various testimonies are there to prove it.</span><br data-dcnode-id="3968"><span data-dcnode-id="3967" instrument_node="">
I have a question I would like to know what variety of Cannabis medical plant can provide this level of dosage (CBD / THC) in equilibrium and that has no side effect since my sister has never had since it takes .</span><br data-dcnode-id="3966"><span data-dcnode-id="3965" instrument_node="">
Indeed my friend could not inform me with certainty, he only indicated without certainty that it could be the “California Indica Feminized” used to make this oil.</span></p><span data-dcnode-id="3963" instrument_node="">
</span><p data-dcnode-id="3961"><span data-dcnode-id="3962" instrument_node="">Thank you for your response or direction for the science and culture of the community.</span></p><span data-dcnode-id="3960" instrument_node="">
</span><p data-dcnode-id="3958"><span data-dcnode-id="3959" instrument_node="">Adnan.</span></p><span data-dcnode-id="3957" instrument_node="">
