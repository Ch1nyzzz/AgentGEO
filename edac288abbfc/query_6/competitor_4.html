</span><p data-dcnode-id="3909"><span data-dcnode-id="3917" instrument_node="">Hi Adnan, it is difficult to say which cannabis strains have this blend of CBD/THC. We always recommend to buy the CBD oil (e.g. </span><a data-dcnode-id="3915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//idweeds.com/cbdpure-sb" rel="nofollow ugc"><span data-dcnode-id="3916" instrument_node="">https://idweeds.com/cbdpure-sb</span></a><span data-dcnode-id="3914" instrument_node="">) and Cannabis oil separately, so you can mix them yourself and adjust according to the treatment requirements. Great that your sister is doing so well, despite the chemotherapy. Perhaps until her next scheduled assessment, there is time to reflect on the treatment and her condition. Is it really necessary to continue the chemo and do the surgery? What if the assessment reveals that the tumor has decreased? Do you credit the chemo or the cannabis for that?</span><br data-dcnode-id="3913"><span data-dcnode-id="3912" instrument_node="">
Chemo does not only makes the patient feel terrible, but it also inflicts severe and lasting damage to the body and its systems. It is believed that after chemo cancer can come back and metastasize easier.</span><br data-dcnode-id="3911"><span data-dcnode-id="3910" instrument_node="">
We wish your sister all the best and hope for a very good assessment on November 26. Please share with us her progress and results, so other people can benefit from it too.</span></p><span data-dcnode-id="3908" instrument_node="">

</span><div class="comment-meta commentmetadata" data-dcnode-id="3873"><span data-dcnode-id="3879" instrument_node="">

</span><p data-dcnode-id="3867"><span data-dcnode-id="3868" instrument_node="">Hi All , Hi Fawaz,</span></p><span data-dcnode-id="3866" instrument_node="">
</span><p data-dcnode-id="3864"><span data-dcnode-id="3865" instrument_node="">Today my sister received the assessment results and I want to share with the community the following good news:</span></p><span data-dcnode-id="3863" instrument_node="">
</span><p data-dcnode-id="3859"><span data-dcnode-id="3862" instrument_node="">Lungs metastasis completely disappeared , 2 metastasis on the liver have been reduced, the right ovary tumors have also been reduced from 11cm to 2,3 cm .</span><br data-dcnode-id="3861"><span data-dcnode-id="3860" instrument_node="">
I can’t publish the tepscan results picture on the blog but initially ( tepscan made on last 20th September ) we can see that the tumors was extended to about 90% of her abdomen and to the organs, today we can see only 2 metastasis on the live and the ovary tumor that have been consequently reduced and represents 5% abdomen surface.</span></p><span data-dcnode-id="3858" instrument_node="">
</span><p data-dcnode-id="3856"><span data-dcnode-id="3857" instrument_node="">It’s incredible , the oncologist have observed  only one similar case in her carier.</span></p><span data-dcnode-id="3855" instrument_node="">
</span><p data-dcnode-id="3849"><span data-dcnode-id="3854" instrument_node="">Since my last post we have increased the RSO roadmap :</span><br data-dcnode-id="3853"><span data-dcnode-id="3852" instrument_node="">
Oraly : 600 mg ( 3 dose x 200 mg per day ) increased  to 1 g ( 3 dose x 340 mg per day )</span><br data-dcnode-id="3851"><span data-dcnode-id="3850" instrument_node="">
Suppository : 500 mg per day </span></p><span data-dcnode-id="3848" instrument_node="">
</span><p data-dcnode-id="3844"><span data-dcnode-id="3847" instrument_node="">Next steps :</span><br data-dcnode-id="3846"><span data-dcnode-id="3845" instrument_node="">
3 chemo planned that should be completed on next December 14th, and the surgery will be planned at the end of December to remove residual tumors and organs at risk (ovary, uterus, peritoneum), to avoid any recurrence.</span></p><span data-dcnode-id="3843" instrument_node="">
</span><p data-dcnode-id="3841"><span data-dcnode-id="3842" instrument_node="">We’ll increase the roadmap to reach progressively the recommended roadmap ( 2/ 2,5 g per day )  till end of December before the surgery if it’s  supported by my sister.</span></p><span data-dcnode-id="3840" instrument_node="">
</span><p data-dcnode-id="3832"><span data-dcnode-id="3839" instrument_node="">Regarding your last question as to whether the clinical improvement is credited to chemotherapy or Cannabis treatment:</span><br data-dcnode-id="3838"><span data-dcnode-id="3837" instrument_node="">
I am unequivocal: Appetite, reduction of nausea and anxiety, energy, strengthening of the body’s immunity are the result of Cannabis that has probably opened the cannabinoid receptors system to reinforce all these essentials survival indicators .</span><br data-dcnode-id="3836"><span data-dcnode-id="3835" instrument_node="">
But unfortunately I think that Cannabis it is not enough alone, it must be combined with chemotherapy when the disease is at an advanced stage like that of my sister.</span><br data-dcnode-id="3834"><span data-dcnode-id="3833" instrument_node="">
And I will say that associated with chemo it reduces the chemo side effects and makes it targeted the eradication of the cancer cells.</span></p><span data-dcnode-id="3831" instrument_node="">
</span><p data-dcnode-id="3825"><span data-dcnode-id="3830" instrument_node="">This is of course my position and based on scientific publications that I have read and discovered throughout the net.</span><br data-dcnode-id="3829"><span data-dcnode-id="3828" instrument_node="">
And I have never found a clinical trial using only Cannabis and its derivatives on humans to treat and cure cancer. I found only clinical trials in-vivo and on laboratory animals.</span><br data-dcnode-id="3827"><span data-dcnode-id="3826" instrument_node="">
I am interested by the information if you have  (and the community around this blog, too, I think) that shows clinical / therapeutic trials on humans treated only by cannabis to cure from cancer.</span></p><span data-dcnode-id="3824" instrument_node="">
</span><p data-dcnode-id="3822"><span data-dcnode-id="3823" instrument_node="">Even if there is still some way in the healing of my sister who I hope will come by the grace of God, I hope that my testimony and lived experience will give hope to the community, as he gave me some hope when I started looking for alternative treatments last september and discovered that Cannabis could help effectively, and the results on my sister are there to prove it.</span></p><span data-dcnode-id="3821" instrument_node="">
</span><p data-dcnode-id="3819"><span data-dcnode-id="3820" instrument_node="">Good luck to all, and see you soon.</span></p><span data-dcnode-id="3818" instrument_node="">

</span><div class="comment-meta commentmetadata" data-dcnode-id="3783"><span data-dcnode-id="3789" instrument_node="">

</span><p data-dcnode-id="3765"><span data-dcnode-id="3778" instrument_node="">Hi Adnan,</span><br data-dcnode-id="3777"><span data-dcnode-id="3776" instrument_node="">
Great news! These reductions are so impressive. Thanks for sharing them with our community.</span><br data-dcnode-id="3775"><span data-dcnode-id="3774" instrument_node="">
As to the presence or rather absence of clinical trials with only cannabis treatment, you are right. There aren’t any. also that we know of. However, you should bear in mind that the whole pharmaceutical industry, including research, is controlled by money. More than 90% of research is funded by big pharma who only fund research when there is ROI (return of investment) involved. Financing plant-based treatment research is not in their interest because the money isn’t coming back to them.</span><br data-dcnode-id="3773"><span data-dcnode-id="3772" instrument_node="">
You are also right that cannabis reduces some side effects of chemotherapy -like nausea etc- but it doesn’t prevent chemo from killing cancer cells and other cells along the way. Chemo does indeed do a good job in killing cancer cells, but the problem is it also kills many healthy cells in the process. This creates irreparable damage to the body and its systems that even cannabis cannot reverse. Besides that, there is increasing evidence that chemotherapy -because it is killing so many healthy cells in the process- provokes metastasis both in terms of time (cancer returns quicker) and force (cancer comes back stronger than before). e.g.: </span><a data-dcnode-id="3770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancer.gov/news-events/cancer-currents-blog/2017/chemotherapy-effect-metastasis" rel="nofollow ugc noopener"><span data-dcnode-id="3771" instrument_node="">https://www.cancer.gov/news-events/cancer-currents-blog/2017/chemotherapy-effect-metastasis</span></a><br data-dcnode-id="3769"><span data-dcnode-id="3768" instrument_node="">
So these are things to consider. There are however many real people that have been declared cancer free by their oncologist after cannabis only treatment.</span><br data-dcnode-id="3767"><span data-dcnode-id="3766" instrument_node="">
Good luck to your sister, let’s hope the treatment keeps working and completely eliminates all her cancer, and that the chemo does not do too much damage. Please keep us posted. It is very valuable for the community.</span></p><span data-dcnode-id="3764" instrument_node="">

</span><p data-dcnode-id="3652"><span data-dcnode-id="3655" instrument_node="">Hi! My mom is 86 and recently found out she has cancer. She has four masses in her liver, nodules in her lungs and also has spread to her lymph nodes. She was given approximately 6 months to live. She’s opting not to have any treatment but we would like to get started with the THC/CBD treatment. Should she start on the “URGENT ROADMAP” treatment and would the “SUPPOSITORIES” be the way to go? I’m also confused on the dosage, making the suppositories…pretty much all of it!</span><br data-dcnode-id="3654"><span data-dcnode-id="3653" instrument_node="">
She lives in California..where can we buy the THC oil and CBD oil? Which oils do you recommend? How much should I buy for a 90 day dosage? Sorry for all the questions but I’m confused.  Could you please explain it as simple as possible to me and thank you in advanced for your help.    @jeroen</span></p><span data-dcnode-id="3651" instrument_node="">

</span><p data-dcnode-id="3597"><span data-dcnode-id="3611" instrument_node="">Hi Cheryl, Such difficult decisions the family should make. But I can point out the pros and cons and my personal opinion. The urgent treatment inevitably causes severe cognitively impairing side effects, possibly panic attacks, paranoia, anxiety etc. It is meant for those that have otherwise only a few weeks to live and the regular roadmap is too long. Although a cannabis ‘high’ does not cause any physical harm, it can scare people to the point they reject also this treatment and also give up on this last hope.</span><br data-dcnode-id="3610"><span data-dcnode-id="3609" instrument_node="">
The regular roadmap is designed to avoid strong cognitively impairing ‘highs’, although it is on the borderline and some people still get high. But strong will to survive usually helps people through this. Chemo and radtiation are also no fun but opposed to cannabis leave devastating damage to the body’s systems.  Therefore if she has been given half a year to live she has time to do the regular treatment I would say. You have to take into account that the cannabis will start working as soon as she starts taking it. Look up Corry Yelland’s story on the internet. She didn’t have the means to ramp up to 1000 mg and she took far less. To compensate she continued taking cannabis for 1 year and was cancer-free after that.</span><br data-dcnode-id="3608"><span data-dcnode-id="3607" instrument_node="">
Cannabis should be administered as close as possible to the cancer sources. In your mom’s case the upper body. Therefore sublingual intake, and possibly some vaping as additional side treatment later on when she got used to the cannabis, would be most effective. With suppositories, you have the risk that the cannabis bypasses the liver if you don’t insert them correctly. (see article).</span><br data-dcnode-id="3606"><span data-dcnode-id="3605" instrument_node="">
THC oil you can get from your local dispensary (not sold online in US) and CBD oil we recommend </span><a data-dcnode-id="3603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//idweeds.com/cbd-oil-for-sale/" rel="nofollow ugc"><span data-dcnode-id="3604" instrument_node="">https://idweeds.com/cbd-oil-for-sale/</span></a><span data-dcnode-id="3602" instrument_node="">.</span><br data-dcnode-id="3601"><span data-dcnode-id="3600" instrument_node="">
For the 90 day treatment, you need approximately 60 grams (60,000 mgs) of THC oil. CBD oil she needs to take 100-300 mg daily (depending on her pain and impairing symptoms from the THC; CBD reduces pain and impairing symptoms). So for 90 days you’ll need (9,000mg – 27,000mg CBD)</span><br data-dcnode-id="3599"><span data-dcnode-id="3598" instrument_node="">
Hope this helps you and please share your mom’s progress, how she is coping with the regular roadmap and hopefully good results. It will be beneficial for a lot of people all over the world. If you have any additional questions, or you want me to explain the suppository ingredient anyway, just write us another comment.</span></p><span data-dcnode-id="3596" instrument_node="">

</span><p data-dcnode-id="3221"><span data-dcnode-id="3226" instrument_node="">Hi Benson, There is a big difference between the two treatments. Namely the unpleasant (to say the least) side effects of THC, getting too high. People only use the 30-day schedule when their doctors have told them they haven’t got a couple of months to live. The 90-day treatment is already tough for a lot of people, in terms of having to deal with getting high, but more or less manageable. If done correctly most people can avoid getting too high. However, the 30-day treatment is way too short to avoid getting too high. People that do this treatment will have to deal with major panic attacks etc. Although it is not harmful to the body or your health, it does prove to be too much for some people. If you still have the time, go for the 90-day treatment. The most important thing is the total amount of cannabis you take. There are examples of people taking way less than the 1000 mg THC per day but taking it for a longer period. Corrie Yelland is such an example who stretched her treatment to one year with lower dosages.</span><br data-dcnode-id="3225"><span data-dcnode-id="3224" instrument_node="">
Suppositories would be recommended in your case, because it is the closest point of contact between cannabis and cancer. Depending on where to the cancer has metastasized, you could also do partly sublingual and partly rectal (like 50/50, depending on the amount of metastization).</span><br data-dcnode-id="3223"><span data-dcnode-id="3222" instrument_node="">
Please keep up posted on your progress and results. Other people all over the world will benefit from it too.</span></p><span data-dcnode-id="3220" instrument_node="">

</span><p data-dcnode-id="3033"><span data-dcnode-id="3038" instrument_node="">Hi Kevin, She could best follow the standard dosage roadmap from the article with regards to the THC dosage. As far as CBD dosage goes, CBD helps to counteract some of the impairing effects of THC and it helps with pain and nausea. Therefore the CBD dosage should be based on these symptoms. It generally ranges from 100 mg to 1000 mg per day. Whereby 100 is a low dosage for cancer and 1000 a high dosage (1:1 THC/CBD) but (other than for the costs) probably optimal for people that are sensitive to the THC high and that have a lot of pain.</span><br data-dcnode-id="3037"><span data-dcnode-id="3036" instrument_node="">
Concerning the delivery method(s) it is important to bring the cannabis as close as possible to the cancer sources (more effective). In your sisters’ case, this means vaginal suppositories, sublingual/oral intake methods. With sublingual consumption, part is absorbed under the tongue directly into the bloodstream and part goes through the GI tract. She could do a 50/50 treatment, meaning half the dosage sublingual and half vaginal suppositories. Instructions on suppositories can also be found in the article.</span><br data-dcnode-id="3035"><span data-dcnode-id="3034" instrument_node="">
Good luck with the treatment and please keep us posted on her progress and results because other people all over the world will benefit from it too.</span></p><span data-dcnode-id="3032" instrument_node="">

In your situation, a dosage level of 80 to 100 mg per day would be recommended. Probably best to start with 100 and see what it does for you.  Both from the perspective of how you feel and from the testosterone levels that can be measured, you should see improvement.</span><br data-dcnode-id="2926"><span data-dcnode-id="2925" instrument_node="">
Please let us know how it goes and if and what benefits you have from the CBD oil, so other people all over the world can benefit from it too.</span></p><span data-dcnode-id="2923" instrument_node="">

</span><p data-dcnode-id="2708"><span data-dcnode-id="2737" instrument_node="">Hi Daniel, Suppositories are a good option in case of prostate cancer because it is the closest to the cancer source you can administer the cannabis.</span><br data-dcnode-id="2736"><span data-dcnode-id="2735" instrument_node="">
1) To avoid getting high he needs to insert the suppositories in the lower rectum. This means not too deep. So he cannot insert two suppositories one after the other, because the first one will go too deep, causing a high.</span><br data-dcnode-id="2734"><span data-dcnode-id="2733" instrument_node="">
2) Therefore you need to have suppositories with the exact dosage level.</span><br data-dcnode-id="2732"><span data-dcnode-id="2731" instrument_node="">
3) He needs to take suppositories 3 times a day.</span><br data-dcnode-id="2730"><span data-dcnode-id="2729" instrument_node="">
4) Every 4 days the dosage needs to be increased.</span><br data-dcnode-id="2728"><span data-dcnode-id="2727" instrument_node="">
5) Therefore you need 12 suppositories with the same dosage of THC.</span><br data-dcnode-id="2726"><span data-dcnode-id="2725" instrument_node="">
6) Each batch of 12 suppositories is made of 30 grams (1/8th cup) of organic cocoa butter or shay butter. This is the basis of the suppositories, which remains unchanged no matter which dosage level.</span><br data-dcnode-id="2724"><span data-dcnode-id="2723" instrument_node="">
7) To a batch of 12 suppositories add at least 400 mg of CBD. This is 100 mg per day. Some people increase this to 200 or even 300 mg per day to further avoid getting high. For 12 suppositories this would be 800 mg and 1200 mg of CBD respectively.</span><br data-dcnode-id="2722"><span data-dcnode-id="2721" instrument_node="">
7.1.) The amount of CBD needs to be chosen once and then stays the same for all suppositories</span><br data-dcnode-id="2720"><span data-dcnode-id="2719" instrument_node="">
8) THC needs to be added as well, but it is the only ingredient that needs to be ramped up. To the first 12 suppositories add 120 mg THC.</span><br data-dcnode-id="2718"><span data-dcnode-id="2717" instrument_node="">
9) To the second batch of 12 suppositories add 250 mg THC</span><br data-dcnode-id="2716"><span data-dcnode-id="2715" instrument_node="">
10) To the third batch of 12 suppositories add 500 mg THC</span><br data-dcnode-id="2714"><span data-dcnode-id="2713" instrument_node="">
11) To the fourth batch of 12 suppositories add 1000 mg THC</span><br data-dcnode-id="2712"><span data-dcnode-id="2711" instrument_node="">
12) To the fifth batch of 12 suppositories add 2000 mg THC</span><br data-dcnode-id="2710"><span data-dcnode-id="2709" instrument_node="">
13) To the last 17 batches of 12 suppositories add 4000 mg THC per 12 suppositories. </span></p><span data-dcnode-id="2707" instrument_node="">
</span><p data-dcnode-id="2705"><span data-dcnode-id="2706" instrument_node="">It is difficult to explain. I hope it makes more sense like this. Please keep us informed on how your dads’ treatment is going and how he handles the THC. It would also be great if you could share with us the progress and results of his treatment as people all over the world would benefit from it.</span></p><span data-dcnode-id="2704" instrument_node="">

</span><p data-dcnode-id="2336"><span data-dcnode-id="2347" instrument_node="">Hi Claudia,</span><br data-dcnode-id="2346"><span data-dcnode-id="2345" instrument_node="">
Sorry for not getting back to you sooner. A specific case like this we haven’t had so far, but here are some common sense thoughts on how you could possibly handle it.</span><br data-dcnode-id="2344"><span data-dcnode-id="2343" instrument_node="">
A 1:1 ratio is fine. The important thing is to not get your dog too high. Although not harmful it can be unpleasant.</span><br data-dcnode-id="2342"><span data-dcnode-id="2341" instrument_node="">
Therefore, make sure you ease him in on the treatment using the roadmap as a guide. Humans ideally have to ramp up to 1,000 mg (1 gram) of THC per day. With your dog being roughly one-quarter of the weight of an average human, this would mean you’ll have to ramp up to 250 mg THC per day (with 1:1 he will get also 250 mg CBD per day).</span><br data-dcnode-id="2340"><span data-dcnode-id="2339" instrument_node="">
So if you take the regular ramp-up table and divide each dosage level by 4 you’ll have a tailor-made roadmap for your dog. It is best to divide the daily dosage into 3 takings and probably less during the two daily consumptions and more at night, so your dog can sleep it off. Monitor your dog and freeze the dosage level if it becomes to much for him. There is no absolute necessity to reach the highest dosage level. If you have reached half and you find it almost impossible to raise it further because he can’t handle it, it is fine as well. Consequently, you’ll have to continue longer. How long is difficult to say, but a scan at the vets can tell you if the cancer is shrinking or no longer present.</span><br data-dcnode-id="2338"><span data-dcnode-id="2337" instrument_node="">
Again, thank you for sharing. We appreciate that Claudia. Sharing is caring. We and the iDWeeds community are eager to hear about your dogs progress. All the best.</span></p><span data-dcnode-id="2335" instrument_node="">

</span><p data-dcnode-id="2121"><span data-dcnode-id="2130" instrument_node="">Hi Colin, Your question is about the first 4 days where you have to take 30 MILLIGRAMS of THC per day, correct?</span><br data-dcnode-id="2129"><span data-dcnode-id="2128" instrument_node="">
1) Yes, The cocoa butter is the basis or the ‘body’ of the suppositories. The 30 grams of cocoa butter stays the same for all dosage levels during the ramp-up. This is how much cocoa butter you need to make 12 suppositories.</span><br data-dcnode-id="2127"><span data-dcnode-id="2126" instrument_node="">
2) Yes, 30 gram of cocoa butter and the other ingredients are for 4 days or 12 suppositories. But the list of ingredients is for the highest dosage of THC after ramping up. (4 gram THC for 4 days = 1 gram of THC per day) For ramping up you only need to reduce the THC quantity according to the ramp-up table. So, for day 1-4 you need 120-125 mg of THC instead of 4 gram. If the concentration of your THC oil is 30 MILLIGRAM = 0.120 ml, then you are right that you need 0.480 ml for 4 days. But just round it up to 0,5 ml.</span><br data-dcnode-id="2125"><span data-dcnode-id="2124" instrument_node="">
3) CBD you don’t need to ramp up and you can experiment with the quantity, taking into account that CBD counteracts some of the impairing effects of THC (if you have any with suppositories). It also mitigates pain. 300 mg CBD is for 4 days (you can increase to 100 or 200, or 300 or 400 mg per day depending on the symptoms mentioned).</span><br data-dcnode-id="2123"><span data-dcnode-id="2122" instrument_node="">

</span><a aria-label="Reply to Bbblue" class="comment-reply-link" data-belowelement="comment-463" data-commentid="463" data-dcnode-id="1508" data-postid="31779" data-replyto="Reply to Bbblue" data-respondelement="respond" href="#comment-463" rel="nofollow"><span data-dcnode-id="1509" instrument_node="">Reply</span></a><span data-dcnode-id="1507" instrument_node=""> </span></div><span data-dcnode-id="1505" instrument_node="">

</span><header class="comment-header" data-dcnode-id="1473"><cite class="author_name heading" data-dcnode-id="1488"><cite class="comment_author_name" data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">Fawaz Abomaray</span></cite></cite><span data-dcnode-id="1487" instrument_node=""> </span><span class="says" data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">says:</span></span><span data-dcnode-id="1484" instrument_node="">

</span><p data-dcnode-id="1465"><span data-dcnode-id="1470" instrument_node="">Hi, sorry for taking so long. It is a difficult question and in order to come to this answer, we had to make some assumptions.</span><br data-dcnode-id="1469"><span data-dcnode-id="1468" instrument_node="">
1) Let’s assume the bud you used is 20% THC (sounds like it’s pretty potent based of the way you describe its performance)</span><br data-dcnode-id="1467"><span data-dcnode-id="1466" instrument_node="">
2) We found sources stating that it appears that some THC is lost, based on “Estimated THC extraction efficiency”. Let’s use the 80% they mentioned</span></p><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">You used 1oz</span></p><span data-dcnode-id="1461" instrument_node="">
</span><p data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">1oz = 28g</span></p><span data-dcnode-id="1458" instrument_node="">
</span><p data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">28g  = 28,000mg</span></p><span data-dcnode-id="1455" instrument_node="">
</span><p data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">Let’s assume the bud you used is 20% THC </span></p><span data-dcnode-id="1452" instrument_node="">
</span><p data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">28,000 x 0.2 = 5,600 </span></p><span data-dcnode-id="1449" instrument_node="">
</span><p data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">This means that out of the 28,000mg of bud, 5,600mg is pure THC</span></p><span data-dcnode-id="1446" instrument_node="">
</span><p data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">“a Fifth” is Everclear, which apparently means 750ml in alcohol terms (thank you, Urban Dictionary)</span></p><span data-dcnode-id="1443" instrument_node="">
</span><p data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">You say you evaporated half, so that leaves us with 375ml</span></p><span data-dcnode-id="1440" instrument_node="">
</span><p data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">5,600mg/375 = 14.9mg per 1ml</span></p><span data-dcnode-id="1437" instrument_node="">
</span><p data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">If the THC extraction efficiency is 80%, then 14.9 x 0.8 = 11.9mg per 1ml</span></p><span data-dcnode-id="1434" instrument_node="">
</span><p data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">Half of that would be roughly 6mg</span></p><span data-dcnode-id="1431" instrument_node="">
</span><p data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">So every drop you give him contains 6mg of THC, based on the 20% THC content we threw in above.</span></p><span data-dcnode-id="1428" instrument_node="">
</span><p data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">In order to give you a more accurate answer, we need to know the THC percentage of the strain. After that, you can use this formula to crunch the numbers. It is also possible that some THC destruction could occur during the evaporation process, which we did not include in the calculation. </span></p><span data-dcnode-id="1425" instrument_node="">
</span><p data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">Hope this helps, and please keep us posted on how your husband is doing. It seems he is benefitting from the treatment. When you share the progress and results with us, thousands of other people all over the world could benefit from it too.</span></p><span data-dcnode-id="1422" instrument_node="">

Hope it works out for your dad, and please keep us posted on his progress and results, as people all over the world will benefit from it. Thanks.</span></p><span data-dcnode-id="1328" instrument_node="">

</span><p data-dcnode-id="1273"><span data-dcnode-id="1280" instrument_node="">Hi..Need guidance please! One year ago i was diagnosed with Ovarian stage 3. Given 6 months to live. 9 chemo treatments (platinum based) two major surgeries then 7 more chemo treatments, the chemo worked. I was told i am NDE or no disease evident about 4 months ago. I was given a small can of CBD suave to rub on my abdomen by a friend. I used it but not consistently</span><br data-dcnode-id="1279"><span data-dcnode-id="1278" instrument_node="">
 i want to use CBD or cannabis oil to prevent any re occurrence. I am very confused as to the type, quality, and quantity to use .I  live in Arizona and not sure if this must be prescribed by a Dr. or something i can get myself.</span><br data-dcnode-id="1277"><span data-dcnode-id="1276" instrument_node="">
Any information on this would be greatly appreciated Please note am no longer under the care of my oncologist and am on a “watch” list.</span><br data-dcnode-id="1275"><span data-dcnode-id="1274" instrument_node="">
Thank you so much for your time and consideration</span></p><span data-dcnode-id="1272" instrument_node="">

</span><p data-dcnode-id="1225"><span data-dcnode-id="1232" instrument_node="">Hi, good that you are cancer free now and have survived the heavy chemo treatments. What people have taken in your situation (being cancer free) to avoid reoccurrence, is a quarter of the amount of the full cancer treatment as outlined in the article. This means you do a 90-day treatment course but with 250 mg a day of cannabis oil instead of the 1000 mg a day from the article. The quantity of CBD oil -which you need to take parallel to the THC oil- we recommend keeping high at 100 mg a day for this period. The cannabis oil needs to be ramped up according to the roadmap in the article and stop at the 250 mg level. You can ramp up slower to avoid the highs in the beginning, since the end amount is lower.</span><br data-dcnode-id="1231"><span data-dcnode-id="1230" instrument_node="">
After that treatment, it is recommended to continue with a maintenance dosage for the rest of your life. The THC oil can be reduced to about 30 mg a day and the CBD oil to about 25 mg a day. They can be taken together at the same time, but it is best to divide the daily amount into two or three takings.</span><br data-dcnode-id="1229"><span data-dcnode-id="1228" instrument_node="">
In Arizona, cannabis is legal for medicinal purposes but not for recreational use. So, you will have to get a medical marijuana card.</span><br data-dcnode-id="1227"><span data-dcnode-id="1226" instrument_node="">
All the best with your preventive after treatment, and please share with us your progress as people from all over the world benefit from it.</span></p><span data-dcnode-id="1224" instrument_node="">

</span><p data-dcnode-id="1082"><span data-dcnode-id="1087" instrument_node="">Hi, before giving you a recommendation on the dosage, I would like to ask you, Why are you taking suppositories? Cannabinoids like THC and CBD are most effective when you can bring them as close as possible to the source of the disease. In your case your lungs. The best intake method in your case would, therefore, be vaping. This brings the cannabinoids in direct contact with your COPD. It will help you breathe easier and you have to take less CBD/THC because it is more effective for COPD. Suppositories are most effective in diseases affecting the lower part of the body, like anal or vaginal cancer.</span><br data-dcnode-id="1086"><span data-dcnode-id="1085" instrument_node="">
Concerning the dosage, there is very little anecdotal experience with COPD. If you are living in a state allowing THC, take a combination of CBD and THC. The dosage level mainly depends on the severity of the disease. But especially with vaping it is very easy to find your dosage level by trial and error. You cannot overdose CBD and also THC is non-toxic to your body, however, it is psychoactive so you need to slowly build up THC dosage levels.  Start with vaping 40 or 50 mg CBD and (if allowed in your state) the same amount of THC. Monitor your symptoms for a day or four and increase with 10 mg increments, until you reach the desired results.</span><br data-dcnode-id="1084"><span data-dcnode-id="1083" instrument_node="">
Especially because there is very little data on dosage for COPD, we would like to ask you to share your progress and results with us. This way other people all over the world can benefit from it too. Sharing is caring…</span></p><span data-dcnode-id="1081" instrument_node="">
