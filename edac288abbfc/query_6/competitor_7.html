d data-dcnode-id="2747"><p data-dcnode-id="2748"><span data-dcnode-id="2749" instrument_node="">Mini-Mental State Examination</span></p></dd><dt data-dcnode-id="2745" id="abb_DL1_DI6"><span data-dcnode-id="2746" instrument_node="">NPI</span></dt><dd data-dcnode-id="2742"><p data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">Neuropsychiatric Inventory Index</span></p></dd><dt data-dcnode-id="2740" id="abb_DL1_DI7"><span data-dcnode-id="2741" instrument_node="">NPS</span></dt><dd data-dcnode-id="2737"><p data-dcnode-id="2738"><span data-dcnode-id="2739" instrument_node="">neuropsychiatric symptoms</span></p></dd><dt data-dcnode-id="2735" id="abb_DL1_DI8"><span data-dcnode-id="2736" instrument_node="">PAS</span></dt><dd data-dcnode-id="2732"><p data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node="">Pittsburg Agitation Scale</span></p></dd><dt data-dcnode-id="2730" id="abb_DL1_DI9"><span data-dcnode-id="2731" instrument_node="">PRISMA</span></dt><dd data-dcnode-id="2727"><p data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">Preferred Reporting Items for Systematic Reviews and Meta-Analyses</span></p></dd><dt data-dcnode-id="2725" id="abb_DL1_DI10"><span data-dcnode-id="2726" instrument_node="">RCT</span></dt><dd data-dcnode-id="2722"><p data-dcnode-id="2723"><span data-dcnode-id="2724" instrument_node="">randomized controlled trial</span></p></dd><dt data-dcnode-id="2720" id="abb_DL1_DI11"><span data-dcnode-id="2721" instrument_node="">THC</span></dt><dd data-dcnode-id="2717"><p data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">delta-9 tetrahydrocannabinol</span></p></dd><dt data-dcnode-id="2715" id="abb_DL1_DI12"><span data-dcnode-id="2716" instrument_node="">UPDRS</span></dt><dd data-dcnode-id="2712"><p data-dcnode-id="2713"><span data-dcnode-id="2714" instrument_node="">Unified Parkinson Disease Rating Scale</span></p></dd><dt data-dcnode-id="2710" id="abb_DL1_DI13"><span data-dcnode-id="2711" instrument_node="">VAS</span></dt><dd data-dcnode-id="2707"><p data-dcnode-id="2708"><span data-dcnode-id="2709" instrument_node="">visual analog scale</span></p></dd></dl></div></div><div data-dcnode-id="2601" id="rc1152.s1"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="2701"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="2702" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="2703" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="2699" id="_rc1152_s1_"><span data-dcnode-id="2700" instrument_node="">Context and Policy Issues</span></h2><p data-dcnode-id="2685"><span data-dcnode-id="2698" instrument_node="">Dementia refers to a set of symptoms and signs associated with a progressive deterioration of cognitive functions that affects daily activities.</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref1" data-dcnode-id="2695" href="#" role="button"><sup data-dcnode-id="2696"><span data-dcnode-id="2697" instrument_node="">1</span></sup></a><span data-dcnode-id="2694" instrument_node=""> Symptoms may include memory loss and difficulties with thinking, problem-solving or language, as well as changes in mood, perception, personality, or behaviour.</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref2" data-dcnode-id="2691" href="#" role="button"><sup data-dcnode-id="2692"><span data-dcnode-id="2693" instrument_node="">2</span></sup></a><sup data-dcnode-id="2689"><span data-dcnode-id="2690" instrument_node="">,</span></sup><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2686" href="#" role="button"><sup data-dcnode-id="2687"><span data-dcnode-id="2688" instrument_node="">3</span></sup></a></p><p data-dcnode-id="2672"><span data-dcnode-id="2684" instrument_node="">According to the World Alzheimer Report 2018, about 50 million people worldwide lived with dementia in 2018, with the number projected to increase to 152 million by 2050.</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref4" data-dcnode-id="2681" href="#" role="button"><sup data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">4</span></sup></a><span data-dcnode-id="2680" instrument_node=""> In Canada, the estimated number of people living with dementia in 2016 was 564,000, and this is expected to increase to 937,000 by 2031.</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref5" data-dcnode-id="2677" href="#" role="button"><sup data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">5</span></sup></a><span data-dcnode-id="2676" instrument_node=""> The total health care system costs and out of pocket costs of caring for people with dementia were $10.4 billion in 2016, and are projected to double by 2031.</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref5" data-dcnode-id="2673" href="#" role="button"><sup data-dcnode-id="2674"><span data-dcnode-id="2675" instrument_node="">5</span></sup></a></p><p data-dcnode-id="2653"><span data-dcnode-id="2671" instrument_node="">Alzheimer’s disease is the most common type of dementia, accounting for about two thirds of all dementia.</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref4" data-dcnode-id="2668" href="#" role="button"><sup data-dcnode-id="2669"><span data-dcnode-id="2670" instrument_node="">4</span></sup></a><span data-dcnode-id="2667" instrument_node=""> Other types of dementia that occur less frequently include vascular dementia, mixed dementia, Lewy body dementia, frontotemporal dementia, and young-onset dementia.</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref1" data-dcnode-id="2664" href="#" role="button"><sup data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">1</span></sup></a><sup data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">,</span></sup><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2659" href="#" role="button"><sup data-dcnode-id="2660"><span data-dcnode-id="2661" instrument_node="">3</span></sup></a><span data-dcnode-id="2658" instrument_node=""> Neuropsychiatric symptoms (NPS) are common to all dementia types and may manifest as agitation, aggression, wandering, apathy, sleep disorders, depression, anxiety, psychosis, and eating disorders.</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2655" href="#" role="button"><sup data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">3</span></sup></a><span data-dcnode-id="2654" instrument_node=""> These behavioral symptoms of dementia present significant risks of injury to the patients and caregivers, reduce quality of life, and may cause distress or depression.</span></p><p data-dcnode-id="2640"><span data-dcnode-id="2652" instrument_node="">The progressive course of dementia cannot be altered since there is no known cure or disease-modifying therapy.</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref6" data-dcnode-id="2649" href="#" role="button"><sup data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node="">6</span></sup></a><span data-dcnode-id="2648" instrument_node=""> However, there are interventions to manage NPS, although they are based on limited and disparate evidence.</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2645" href="#" role="button"><sup data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">3</span></sup></a><span data-dcnode-id="2644" instrument_node=""> The first-line treatment of NPS comprises a range of nonpharmacological interventions based on identifying unmet physical and emotional needs, such as inadequately treated pain and unpleasant environmental factors, which may trigger the symptoms. Pharmacological therapies are the second-line treatment in patients for whom nonpharmacological interventions were unsuccessful and who present a potential risk of injury to either themselves or others. Pharmacological interventions commonly involve off-label use of atypical antipsychotics or second-generation antidepressants, usually in combination the nonpharmacological strategies.</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2641" href="#" role="button"><sup data-dcnode-id="2642"><span data-dcnode-id="2643" instrument_node="">3</span></sup></a></p><p data-dcnode-id="2604"><span data-dcnode-id="2639" instrument_node="">Given the limited currently available therapeutic options, their side-effect profiles, and inconsistent evidence base, there is a need for alternate therapies in the growing population of dementia patients.</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref7" data-dcnode-id="2636" href="#" role="button"><sup data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">7</span></sup></a><sup data-dcnode-id="2634"><span data-dcnode-id="2635" instrument_node="">–</span></sup><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref9" data-dcnode-id="2631" href="#" role="button"><sup data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">9</span></sup></a><span data-dcnode-id="2630" instrument_node=""> Medical cannabis has been investigated as one the potential alternative treatments for dementia.</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref10" data-dcnode-id="2627" href="#" role="button"><sup data-dcnode-id="2628"><span data-dcnode-id="2629" instrument_node="">10</span></sup></a><sup data-dcnode-id="2625"><span data-dcnode-id="2626" instrument_node="">,</span></sup><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref11" data-dcnode-id="2622" href="#" role="button"><sup data-dcnode-id="2623"><span data-dcnode-id="2624" instrument_node="">11</span></sup></a><span data-dcnode-id="2621" instrument_node=""> Cannabis (also known as marijuana) is a plant that contains over 70 different chemical compounds called cannabinoids.</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref2" data-dcnode-id="2618" href="#" role="button"><sup data-dcnode-id="2619"><span data-dcnode-id="2620" instrument_node="">2</span></sup></a><span data-dcnode-id="2617" instrument_node=""> Although their mechanism of action in dementia is not well elucidated, they have been shown to interact with neurotransmitter systems that have been implicated in the manifestations of NPS.</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref11" data-dcnode-id="2614" href="#" role="button"><sup data-dcnode-id="2615"><span data-dcnode-id="2616" instrument_node="">11</span></sup></a><span data-dcnode-id="2613" instrument_node=""> Currently, patients living in Canada who have a prescription from an authorized health care professional can legally use cannabis for medical purposes, if they are registered with a licensed producer or Health Canada.</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref12" data-dcnode-id="2610" href="#" role="button"><sup data-dcnode-id="2611"><span data-dcnode-id="2612" instrument_node="">12</span></sup></a><sup data-dcnode-id="2608"><span data-dcnode-id="2609" instrument_node="">,</span></sup><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref13" data-dcnode-id="2605" href="#" role="button"><sup data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">13</span></sup></a></p><p data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">The objective of this report is to summarize the evidence regarding the clinical effectiveness of medical cannabis for the treatment of dementia and the evidence-based guidelines for its use in this condition.</span></p></div><div data-dcnode-id="2588" id="rc1152.s2"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="2598"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="2599" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="2600" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="2596" id="_rc1152_s2_"><span data-dcnode-id="2597" instrument_node="">Research Questions</span></h2><ol data-dcnode-id="2589"><li class="half_rhythm" data-dcnode-id="2593"><div data-dcnode-id="2594"><span data-dcnode-id="2595" instrument_node="">What is the clinical effectiveness of medical cannabis for the treatment of dementia?</span></div></li><li class="half_rhythm" data-dcnode-id="2590"><div data-dcnode-id="2591"><span data-dcnode-id="2592" instrument_node="">What are the evidence-based guidelines associated with the use of medical cannabis for the treatment of dementia?</span></div></li></ol></div><div data-dcnode-id="2564" id="rc1152.s3"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="2585"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="2586" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="2587" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="2583" id="_rc1152_s3_"><span data-dcnode-id="2584" instrument_node="">Key Findings</span></h2><p data-dcnode-id="2565"><span data-dcnode-id="2582" instrument_node="">Limited evidence from one systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2579" href="#" role="button"><sup data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">3</span></sup></a><span data-dcnode-id="2578" instrument_node=""> and one uncontrolled before-and-after study</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref10" data-dcnode-id="2575" href="#" role="button"><sup data-dcnode-id="2576"><span data-dcnode-id="2577" instrument_node="">10</span></sup></a><span data-dcnode-id="2574" instrument_node=""> suggested that medical cannabis may be effective for treating agitation, disinhibition, irritability, aberrant motor behaviour, and nocturnal behaviour disorders as well as aberrant vocalization and resting care, which are neuropsychiatric symptoms associated with dementia. There was also limited evidence of improvement in rigidity and cognitive scores as assessed by Mini-Mental State Examination. The evidence from the systematic review came from four of its primary studies, whereas its remaining eight included studies did not find favourable or unfavourable evidence regarding the effectiveness of cannabinoids in the treatment of dementia. Sources of uncertainty included the low quality of evidence in the primary studies of the systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2571" href="#" role="button"><sup data-dcnode-id="2572"><span data-dcnode-id="2573" instrument_node="">3</span></sup></a><span data-dcnode-id="2570" instrument_node=""> and the fact that the uncontrolled before-and-after study</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref10" data-dcnode-id="2567" href="#" role="button"><sup data-dcnode-id="2568"><span data-dcnode-id="2569" instrument_node="">10</span></sup></a><span data-dcnode-id="2566" instrument_node=""> was a nonrandomized pilot study in 10 dementia patients that reported descriptive outcomes without statistical analysis. No relevant evidence-based clinical guidelines regarding the use of medical cannabis for treating dementia were identified.</span></p></div><div data-dcnode-id="2484" id="rc1152.s4"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="2561"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="2562" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="2563" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="2559" id="_rc1152_s4_"><span data-dcnode-id="2560" instrument_node="">Methods</span></h2><div data-dcnode-id="2554" id="rc1152.s4.1"><h3 data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">Literature Search Methods</span></h3><p data-dcnode-id="2555"><span data-dcnode-id="2556" instrument_node="">A limited literature search was conducted by an information specialist on key resources including PubMed, the Cochrane Library, the University of York Centre for Reviews and Dissemination (CRD) databases, the websites of Canadian and major international health technology agencies, as well as a focused Internet search. The search strategy was comprised of both controlled vocabulary, such as the National Library of Medicine’s MeSH (Medical Subject Headings), and keywords. The main search concepts were cannabis and dementia. No filters were applied to limit the retrieval by study type. The search was also limited to English language documents published between January 1, 2009, and June 18, 2019.</span></p></div><div data-dcnode-id="2537" id="rc1152.s4.2"><h3 data-dcnode-id="2552"><span data-dcnode-id="2553" instrument_node="">Selection Criteria and Methods</span></h3><p data-dcnode-id="2547"><span data-dcnode-id="2551" instrument_node="">One reviewer screened citations and selected studies. In the first level of screening, titles and abstracts were reviewed and potentially relevant articles were retrieved and assessed for inclusion. The final selection of full-text articles was based on the inclusion criteria presented in </span><a class="figpopup" data-dcnode-id="2549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK546328/table/rc1152.tab1/%3Freport%3Dobjectonly" rid-figpopup="figrc1152tab1" rid-ob="figobrc1152tab1" target="object"><span data-dcnode-id="2550" instrument_node="">Table 1</span></a><span data-dcnode-id="2548" instrument_node="">.</span></p><div class="iconblock whole_rhythm clearfix ten_col table-wrap" data-dcnode-id="2538" id="figrc1152tab1"><a class="img_link icnblk_img figpopup" data-dcnode-id="2545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK546328/table/rc1152.tab1/%3Freport%3Dobjectonly" rid-figpopup="figrc1152tab1" rid-ob="figobrc1152tab1" target="object" title="Table 1"><img alt="Table 1. Selection Criteria." class="small-thumb" data-dcnode-id="2546" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK546328/table/rc1152.tab1/%3Freport%3Dthumb&amp;raw" src-large="/books/NBK546328/table/rc1152.tab1/?report=previmg"></a><div class="icnblk_cntnt" data-dcnode-id="2539"><h4 data-dcnode-id="2542" id="rc1152.tab1"><a data-dcnode-id="2543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK546328/table/rc1152.tab1/%3Freport%3Dobjectonly" rid-ob="figobrc1152tab1" target="object"><span data-dcnode-id="2544" instrument_node="">Table 1</span></a></h4><p class="float-caption no_bottom_margin" data-dcnode-id="2540"><span data-dcnode-id="2541" instrument_node="">Selection Criteria. </span></p></div></div></div><div data-dcnode-id="2506" id="rc1152.s4.3"><h3 data-dcnode-id="2535"><span data-dcnode-id="2536" instrument_node="">Exclusion Criteria</span></h3><p data-dcnode-id="2507"><span data-dcnode-id="2534" instrument_node="">Articles were excluded if they did not meet the selection criteria outlined in </span><a class="figpopup" data-dcnode-id="2532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK546328/table/rc1152.tab1/%3Freport%3Dobjectonly" rid-figpopup="figrc1152tab1" rid-ob="figobrc1152tab1" target="object"><span data-dcnode-id="2533" instrument_node="">Table 1</span></a><span data-dcnode-id="2531" instrument_node="">; they were duplicate publications or were published before 2009. Systematic reviews</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref11" data-dcnode-id="2528" href="#" role="button"><sup data-dcnode-id="2529"><span data-dcnode-id="2530" instrument_node="">11</span></sup></a><sup data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">,</span></sup><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref14" data-dcnode-id="2523" href="#" role="button"><sup data-dcnode-id="2524"><span data-dcnode-id="2525" instrument_node="">14</span></sup></a><sup data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">–</span></sup><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref18" data-dcnode-id="2518" href="#" role="button"><sup data-dcnode-id="2519"><span data-dcnode-id="2520" instrument_node="">18</span></sup></a><span data-dcnode-id="2517" instrument_node=""> with relevant included studies fully captured in an already selected systematic review (i.e., complete overlap), and primary studies</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref19" data-dcnode-id="2514" href="#" role="button"><sup data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">19</span></sup></a><sup data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">–</span></sup><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref24" data-dcnode-id="2509" href="#" role="button"><sup data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">24</span></sup></a><span data-dcnode-id="2508" instrument_node=""> that were included in an already selected systematic review, were also excluded.</span></p></div><div data-dcnode-id="2485" id="rc1152.s4.4"><h3 data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node="">Critical Appraisal of Individual Studies</span></h3><p data-dcnode-id="2486"><span data-dcnode-id="2503" instrument_node="">The included systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2500" href="#" role="button"><sup data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">3</span></sup></a><span data-dcnode-id="2499" instrument_node=""> was critically appraised using A Measurement Tool to Assess Systematic Reviews (AMSTAR 2),</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref25" data-dcnode-id="2496" href="#" role="button"><sup data-dcnode-id="2497"><span data-dcnode-id="2498" instrument_node="">25</span></sup></a><span data-dcnode-id="2495" instrument_node=""> while the prospective before-and-after study</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref10" data-dcnode-id="2492" href="#" role="button"><sup data-dcnode-id="2493"><span data-dcnode-id="2494" instrument_node="">10</span></sup></a><span data-dcnode-id="2491" instrument_node=""> was critically appraised using the Risk of Bias for Nonrandomized Studies (RoBANS)</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref26" data-dcnode-id="2488" href="#" role="button"><sup data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">26</span></sup></a><span data-dcnode-id="2487" instrument_node=""> tool. Summary scores were not calculated for the included studies; instead, a review of the strengths and limitations of each included study were described.</span></p></div></div><div data-dcnode-id="2041" id="rc1152.s5"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="2481"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="2482" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="2483" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="2479" id="_rc1152_s5_"><span data-dcnode-id="2480" instrument_node="">Summary of Evidence</span></h2><div data-dcnode-id="2456" id="rc1152.s5.1"><h3 data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">Quantity of Research Available</span></h3><p data-dcnode-id="2457"><span data-dcnode-id="2476" instrument_node="">A total of 570 citations were identified in the literature search. Following screening of titles and abstracts, 544 citations were excluded, and 26 potentially relevant reports from the electronic search were retrieved for full-text review. The grey literature search identified one additional relevant publication. Of the 27 potentially relevant articles, 25 papers were excluded for various reasons, and two reports that met the inclusion criteria were included in this review. These comprised one systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2473" href="#" role="button"><sup data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">3</span></sup></a><span data-dcnode-id="2472" instrument_node=""> and one uncontrolled before-and-after study.</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref10" data-dcnode-id="2469" href="#" role="button"><sup data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">10</span></sup></a><span data-dcnode-id="2468" instrument_node="">
</span><a data-dcnode-id="2466" href="#rc1152.app1"><span data-dcnode-id="2467" instrument_node="">Appendix 1</span></a><span data-dcnode-id="2465" instrument_node=""> presents the Preferred Reporting Items for Systematic Reviews and Meta-Analyses (PRISMA)</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref27" data-dcnode-id="2462" href="#" role="button"><sup data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">27</span></sup></a><span data-dcnode-id="2461" instrument_node=""> flowchart of the study selection process. Additional references of potential interest are provided in </span><a data-dcnode-id="2459" href="#rc1152.app5"><span data-dcnode-id="2460" instrument_node="">Appendix 5</span></a><span data-dcnode-id="2458" instrument_node="">.</span></p></div><div data-dcnode-id="2322" id="rc1152.s5.2"><h3 data-dcnode-id="2454"><span data-dcnode-id="2455" instrument_node="">Summary of Study Characteristics</span></h3><p data-dcnode-id="2449"><span data-dcnode-id="2453" instrument_node="">Additional details regarding the characteristics of included publications are provided in </span><a data-dcnode-id="2451" href="#rc1152.app2"><span data-dcnode-id="2452" instrument_node="">Appendix 2</span></a><span data-dcnode-id="2450" instrument_node="">.</span></p><div data-dcnode-id="2425" id="rc1152.s5.2.1"><h4 data-dcnode-id="2447"><span data-dcnode-id="2448" instrument_node="">Study Design</span></h4><p data-dcnode-id="2426"><span data-dcnode-id="2446" instrument_node="">One systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2443" href="#" role="button"><sup data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">3</span></sup></a><span data-dcnode-id="2442" instrument_node=""> and one uncontrolled before-and-after prospective pilot study,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref10" data-dcnode-id="2439" href="#" role="button"><sup data-dcnode-id="2440"><span data-dcnode-id="2441" instrument_node="">10</span></sup></a><span data-dcnode-id="2438" instrument_node=""> both published in 2019, were included in this report. The primary studies in the systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2435" href="#" role="button"><sup data-dcnode-id="2436"><span data-dcnode-id="2437" instrument_node="">3</span></sup></a><span data-dcnode-id="2434" instrument_node=""> were identified through a comprehensive literature search involving 27 online resources, including Medline, PsycINFO, and Embase. The databases were searched from inception (where possible) to January 1</span><sup data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">st</span></sup><span data-dcnode-id="2431" instrument_node="">, 2018. A total of 12 studies published from 1997 to 2017 were included in the systematic review.</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2428" href="#" role="button"><sup data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">3</span></sup></a><span data-dcnode-id="2427" instrument_node=""> They comprised six randomized controlled trials (RCTs), two cohort studies, and four case series or case studies.</span></p></div><div data-dcnode-id="2408" id="rc1152.s5.2.2"><h4 data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">Country of Origin</span></h4><p data-dcnode-id="2409"><span data-dcnode-id="2422" instrument_node="">Reviewers from Australia authored the systematic review.</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2419" href="#" role="button"><sup data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">3</span></sup></a><span data-dcnode-id="2418" instrument_node=""> Four primary studies of the systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2415" href="#" role="button"><sup data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">3</span></sup></a><span data-dcnode-id="2414" instrument_node=""> were from the Netherlands, two each from the United Kingdom and United States of America, and one each from Germany, Israel, Switzerland, and Canada. The uncontrolled before-and-after prospective pilot study</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref10" data-dcnode-id="2411" href="#" role="button"><sup data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">10</span></sup></a><span data-dcnode-id="2410" instrument_node=""> was conducted in Switzerland.</span></p></div><div data-dcnode-id="2385" id="rc1152.s5.2.3"><h4 data-dcnode-id="2406"><span data-dcnode-id="2407" instrument_node="">Patient Population</span></h4><p data-dcnode-id="2392"><span data-dcnode-id="2405" instrument_node="">The systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2402" href="#" role="button"><sup data-dcnode-id="2403"><span data-dcnode-id="2404" instrument_node="">3</span></sup></a><span data-dcnode-id="2401" instrument_node=""> involved a total of 178 patients, aged 65 years or older, across 12 included studies. The mean age ranged from 72.7 to 81.5 years. Five primary studies of the systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2398" href="#" role="button"><sup data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">3</span></sup></a><span data-dcnode-id="2397" instrument_node=""> included patients with any type of dementia, whereas four studies included participants with Alzheimer’s disease only and three studies included one or two dementia types (Alzheimer’s disease, vascular, mixed and frontotemporal). Seven primary studies in the systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2394" href="#" role="button"><sup data-dcnode-id="2395"><span data-dcnode-id="2396" instrument_node="">3</span></sup></a><span data-dcnode-id="2393" instrument_node=""> were undertaken in psychogeriatric units of hospitals. Two studies were conducted in the community. Another two studies took place in both the community and hospital, while one study was undertaken in the community and nursing home settings.</span></p><p data-dcnode-id="2386"><span data-dcnode-id="2391" instrument_node="">The uncontrolled before-and-after prospective pilot study</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref10" data-dcnode-id="2388" href="#" role="button"><sup data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node="">10</span></sup></a><span data-dcnode-id="2387" instrument_node=""> enrolled 10 female patients with dementia from different causes with persisting behavior problems, notwithstanding optimal conventional treatment. Patients had to have a neuropsychiatric inventory index (NPI) score higher than 10 to be eligible for inclusion. The average age of the patients was 79.5 years. The study was conducted at a nursing home specialized in the care of elderly with severe dementia.</span></p></div><div data-dcnode-id="2370" id="rc1152.s5.2.4"><h4 data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">Interventions and Comparators</span></h4><p data-dcnode-id="2377"><span data-dcnode-id="2382" instrument_node="">Studies included in the systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2379" href="#" role="button"><sup data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">3</span></sup></a><span data-dcnode-id="2378" instrument_node=""> evaluated three different orally administered cannabinoids – dronabinol, delta-9 tetrahydrocannabinol (THC), and nabilone. The medications were given at daily dose ranges of 2.5 to 7.03 mg, 1.5 to 15 mg, and 0.5 to 2.0 mg, respectively. In all comparative studies, placebo was given to patients in the control arm. Overall, reporting of prior treatment for NPS was limited and varied across the included studies. Reported concomitant medications included antipsychotics, antidepressants, and neuromodulators. However, it was unclear if these drugs were indicated for treating NPS of dementia or co-morbid conditions.</span></p><p data-dcnode-id="2371"><span data-dcnode-id="2376" instrument_node="">Cannabis oil containing THC and cannabidiol (CBD) combination (THC/CBD) was the intervention in the uncontrolled before-and-after prospective pilot study.</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref10" data-dcnode-id="2373" href="#" role="button"><sup data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">10</span></sup></a><span data-dcnode-id="2372" instrument_node=""> The medication was given with a small piece of chocolate cake to facilitate intake. The average doses were titrated over the study period as follows: up to 7.6 mg THC/13.2 mg CBD daily over two weeks, 8.8 mg THC/17.6 mg CBD by one month, and 9.0 mg THC/18.0 mg CBD by two months. No information was provided about previous treatments or concomitant therapy during the study.</span></p></div><div data-dcnode-id="2323" id="rc1152.s5.2.5"><h4 data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">Outcomes</span></h4><p data-dcnode-id="2338"><span data-dcnode-id="2367" instrument_node="">Six of the primary studies included in the systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2364" href="#" role="button"><sup data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">3</span></sup></a><span data-dcnode-id="2363" instrument_node=""> evaluated the effectiveness of cannabinoid therapy for treating NPS of dementia using more than one set of criteria. The most common assessment tool was the NPI, which was used in five primary studies. The NPI is a validated tool developed to assess dementia-related behavioral symptoms, and it is routinely used to evaluate the effects of treatment on these symptoms.</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref28" data-dcnode-id="2360" href="#" role="button"><sup data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">28</span></sup></a><span data-dcnode-id="2359" instrument_node=""> The instrument is administrated to caregivers of dementia patients, who assess 12 behavioral areas commonly affected in such patients. The 12 behavioral domains are: delusions, hallucinations, agitation/aggression, depression, anxiety, euphoria, apathy, disinhibition, irritability, aberrant motor activity, night-time behaviors, and appetite and eating disorders.</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref28" data-dcnode-id="2356" href="#" role="button"><sup data-dcnode-id="2357"><span data-dcnode-id="2358" instrument_node="">28</span></sup></a><span data-dcnode-id="2355" instrument_node=""> For each domain, there are four scores: frequency, severity, total (frequency × severity), and caregiver distress. The total possible score is 144, with higher scores denoting greater severity.</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref28" data-dcnode-id="2352" href="#" role="button"><sup data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">28</span></sup></a><span data-dcnode-id="2351" instrument_node=""> The Cohen–Mansfield Agitation Inventory (CMAI) was used in three included RCTs. The CMAI is a validated 29-item tool intended to assess the frequency of manifestations of agitated behaviors in elderly persons in the long-term care setting.</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref29" data-dcnode-id="2348" href="#" role="button"><sup data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">29</span></sup></a><span data-dcnode-id="2347" instrument_node=""> Each item is rated on a 7-point scale of frequency (i.e., from 1 = never to 7 = several times an hour).</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref29" data-dcnode-id="2344" href="#" role="button"><sup data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">29</span></sup></a><span data-dcnode-id="2343" instrument_node=""> A primary caregiver rates the elderly patients regarding the frequency with which they manifest physically aggressive, physically non-aggressive, and verbally agitated behaviors. Changes in cognition following cannabinoid treatment were reported by one study out of nine studies included in the systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2340" href="#" role="button"><sup data-dcnode-id="2341"><span data-dcnode-id="2342" instrument_node="">3</span></sup></a><span data-dcnode-id="2339" instrument_node=""> that assessed baseline cognition using the Mini-Mental State Examination (MMSE).</span></p><p data-dcnode-id="2324"><span data-dcnode-id="2337" instrument_node="">The NPI and CMAI were also used in the uncontrolled before-and-after prospective pilot study.</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref10" data-dcnode-id="2334" href="#" role="button"><sup data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">10</span></sup></a><span data-dcnode-id="2333" instrument_node=""> In addition, item 22 of the Unified Parkinson Disease Rating Scale (UPDRS), a widely-used clinical rating scale consisting of a 31-item questionnaire for Parkinson’s disease,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref30" data-dcnode-id="2330" href="#" role="button"><sup data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">30</span></sup></a><span data-dcnode-id="2329" instrument_node=""> was used to assess the degree of rigidity with passive movements, on a scale of 0 (absent) to 4 (severe, range of motion achieved with difficulty).</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref31" data-dcnode-id="2326" href="#" role="button"><sup data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">31</span></sup></a><span data-dcnode-id="2325" instrument_node=""> Lastly, a 0 to 10 visual analog scale (VAS) was used to evaluate the most “invalidating daily activity” or “disturbing behavior” (as determined by staff; however these were not defined).</span></p></div></div><div data-dcnode-id="2263" id="rc1152.s5.3"><h3 data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">Summary of Critical Appraisal</span></h3><p data-dcnode-id="2315"><span data-dcnode-id="2319" instrument_node="">Additional details regarding the strengths and limitations of included publications are provided in </span><a data-dcnode-id="2317" href="#rc1152.app3"><span data-dcnode-id="2318" instrument_node="">Appendix 3</span></a><span data-dcnode-id="2316" instrument_node="">.</span></p><div data-dcnode-id="2295" id="rc1152.s5.3.1"><h4 data-dcnode-id="2313"><span data-dcnode-id="2314" instrument_node="">Systematic Review</span></h4><p data-dcnode-id="2296"><span data-dcnode-id="2312" instrument_node="">The systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2309" href="#" role="button"><sup data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node="">3</span></sup></a><span data-dcnode-id="2308" instrument_node=""> followed the PRISMA guidelines, and it was registered with International Prospective Register of Systematic Reviews (PROSPERO). The research objective was stated clearly, and inclusion and exclusion criteria were specified. The population, intervention, and control (comparator) of interest, as well as the outcome measures, were defined. The review authors searched multiple databases, with search dates ranging from inception to January 1</span><sup data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">st</span></sup><span data-dcnode-id="2305" instrument_node="">, 2018. Also, the reference lists of relevant studies were hand-searched to identify additional studies. However, the search was limited to studies published in English and older patients (≥65 years old). Studies undertaken in younger populations (&lt;65 years) were excluded. Study selection and data extraction were performed in duplicate by two review authors, with disagreements between them resolved by a third reviewer. The review authors did not explain their selection of the study designs for inclusion in the review. However, given the limited number of high-quality RCTs on the subject, it seems reasonable to include peer-reviewed studies regardless of the study design, as they did. The included primary studies were listed in tabular form, with the relevant characteristics of each study. A list of excluded studies was not provided; however, the number of studies excluded and the reasons for exclusion were specified in the PRISMA flow chart illustrating the study selection process. The risk of bias and methodological quality of the studies were evaluated using the Johanna Briggs Institute and Cochrane Collaboration critical appraisal tools (i.e., for observation studies and RCTs, respectively). Disagreements were resolved with a third reviewer. Overall, the included studies were of low quality with a high risk of bias, except for one RCT and one cohort study that were rated as having moderate risk of bias by the authors. The systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2302" href="#" role="button"><sup data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">3</span></sup></a><span data-dcnode-id="2301" instrument_node=""> considered the risk of bias in individual studies in the discussions of the results and conclusions, and stated that they had no conflicts of interest to disclose. However, they also acknowledged funding support from a cannabis manufacturing firm, although they noted that the firm and its employees were not involved in undertaking the systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2298" href="#" role="button"><sup data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">3</span></sup></a><span data-dcnode-id="2297" instrument_node=""> or interpreting its results.</span></p></div><div data-dcnode-id="2264" id="rc1152.s5.3.2"><h4 data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">Primary Study</span></h4><p data-dcnode-id="2283"><span data-dcnode-id="2292" instrument_node="">On account of its non-randomized design, the included uncontrolled before-and-after study</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref10" data-dcnode-id="2289" href="#" role="button"><sup data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">10</span></sup></a><span data-dcnode-id="2288" instrument_node=""> was inherently likely to have more systemic biases as it lacked the risk-diminishing property of randomization. It was unknown if all consecutive eligible patients were considered for inclusion or if the study participants were intentionally targeted. Thus, the risk of bias due to inappropriate selection was unclear. Data for the study</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref10" data-dcnode-id="2285" href="#" role="button"><sup data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">10</span></sup></a><span data-dcnode-id="2284" instrument_node=""> were collected prospectively, which minimized risk of bias. Selection bias due to an inappropriate comparison group was low because data were available for all the same study participants both before and after the intervention. Although there was no reference to a pre-specified protocol for the study, the expected main outcomes were included, and results were measured with validated scales, suggesting a reduced risk of bias due to selective outcome reporting. However, it was unknown if the outcome assessors were blinded to the study hypothesis or exposure to the medication. Thus, the risk of confirmation bias due to inappropriate blinding of assessors was unclear. Also, it was not reported how the cannabis oil was standardized or how the stated doses were determined. Therefore, there was uncertainty about the level of risk of performance bias that could arise from variability in the intended doses the patients received. The severity of dementia among the patients precluded patient-reported feedback. Therefore, the assessments were based on the perception of third parties (i.e., family members and caregivers).</span></p><p data-dcnode-id="2265"><span data-dcnode-id="2282" instrument_node="">There was no indication that the uncontrolled before-and-after study</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref10" data-dcnode-id="2279" href="#" role="button"><sup data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node="">10</span></sup></a><span data-dcnode-id="2278" instrument_node=""> or any of the primary studies of the systematic review,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2275" href="#" role="button"><sup data-dcnode-id="2276"><span data-dcnode-id="2277" instrument_node="">3</span></sup></a><span data-dcnode-id="2274" instrument_node=""> had any mechanism to identify and adjust for potential confounding factors that could affect the observed outcomes beyond the cannabinoids medication. Overall, the quality of evidence from the systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2271" href="#" role="button"><sup data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">3</span></sup></a><span data-dcnode-id="2270" instrument_node=""> and the uncontrolled before-and-after study</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref10" data-dcnode-id="2267" href="#" role="button"><sup data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">10</span></sup></a><span data-dcnode-id="2266" instrument_node=""> included in this report was limited.</span></p></div></div><div data-dcnode-id="2103" id="rc1152.s5.4"><h3 data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">Summary of Findings</span></h3><p data-dcnode-id="2257"><a data-dcnode-id="2259" href="#rc1152.app4"><span data-dcnode-id="2260" instrument_node="">Appendix 4</span></a><span data-dcnode-id="2258" instrument_node=""> presents a table of the main study findings and authors’ conclusions.</span></p><div data-dcnode-id="2109" id="rc1152.s5.4.1"><h4 data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">Clinical Effectiveness of Medical Cannabis for the Treatment of Dementia</span></h4><p data-dcnode-id="2245"><span data-dcnode-id="2254" instrument_node="">The included systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2251" href="#" role="button"><sup data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">3</span></sup></a><span data-dcnode-id="2250" instrument_node=""> reported study-level findings without meta-analysis. Four of the 12 primary studies in the systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2247" href="#" role="button"><sup data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">3</span></sup></a><span data-dcnode-id="2246" instrument_node=""> found that treatment of patients with dementia with medical cannabis resulted in significant improvements in a range of neuropsychiatric symptoms associated with dementia. The remaining eight primary studies did not find evidence to support the efficacy of cannabinoids in the treatment of dementia. They comprised five placebo-controlled RCTs, and one case series and two case studies without controls. Three of the RCTs evaluated THC (two studies) or dronabinol (one study) for agitation and behavior changes. Another RCT evaluated THC for static and dynamic balance as well as gait, and one RCT assessed safety. Doses of THC used varied between 0.75 mg twice daily to 1.5 mg three times daily, with follow-up varying from 14 to 84 days across the studies. Dronabinol was dosed at 2.5 mg twice daily for 84 days. The case series evaluated nabilone for NPS titrating doses from 0.5 mg twice to thrice daily for 78 days. The period of dose titration was not mentioned. The two case studies also assessed nabilone, with change in behaviours as outcome for one and observed response to nabilone outcome for the other. None of these two case studies provided quantifiable results, and it was not possible to determine significant effect.</span></p><p data-dcnode-id="2236"><span data-dcnode-id="2244" instrument_node="">The following paragraphs summarize the findings from the four primary studies of the included systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2241" href="#" role="button"><sup data-dcnode-id="2242"><span data-dcnode-id="2243" instrument_node="">3</span></sup></a><span data-dcnode-id="2240" instrument_node=""> and the uncontrolled before-and-after study.</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref10" data-dcnode-id="2237" href="#" role="button"><sup data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">10</span></sup></a></p><div data-dcnode-id="2129" id="rc1152.s5.4.1.1"><h5 data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">Effectiveness</span></h5><div data-dcnode-id="2195" id="rc1152.s5.4.1.1.1"><h5 data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">Changes in overall symptoms score</span></h5><p data-dcnode-id="2205"><span data-dcnode-id="2231" instrument_node="">One RCT with a crossover design included in the systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2228" href="#" role="button"><sup data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node="">3</span></sup></a><span data-dcnode-id="2227" instrument_node=""> compared dronabinol 2.5 mg at night to placebo in two patients and found that after 28 days of treatment with dronabinol the overall NPI score was reduced by 10 points in patient and 11 points in the other. The significance of this reduction was not clear. One open-label prospective cohort study with 11 patients included in the systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2224" href="#" role="button"><sup data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">3</span></sup></a><span data-dcnode-id="2223" instrument_node=""> found that the overall NPI was reduced by 31.6 points (</span><i data-dcnode-id="2221"><span data-dcnode-id="2222" instrument_node="">P</span></i><span data-dcnode-id="2220" instrument_node=""> &lt; 0.001) after 28 days of treatment with up to 7.5 mg/day of THC. Also, one uncontrolled before-and-after study</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref10" data-dcnode-id="2217" href="#" role="button"><sup data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">10</span></sup></a><span data-dcnode-id="2216" instrument_node=""> found that the overall NPI was reduced by 32.9 points (</span><i data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">P</span></i><span data-dcnode-id="2213" instrument_node="">-value not reported) after two months of treatment with up 9.0/18 mg/day of THC/CBD. One case series included in the systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2210" href="#" role="button"><sup data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">3</span></sup></a><span data-dcnode-id="2209" instrument_node=""> reported that, in comparison to before treatment, a significantly lower total NPI (</span><i data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">P</span></i><span data-dcnode-id="2206" instrument_node=""> &lt; 0.05) was observed after 14 days of treatment with 2.5 mg oral dronabinol at night (the score values were not reported).</span></p><p data-dcnode-id="2196"><span data-dcnode-id="2204" instrument_node="">One cohort study included in the systematic review,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2201" href="#" role="button"><sup data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">3</span></sup></a><span data-dcnode-id="2200" instrument_node=""> which assessed patient outcomes using the Pittsburg Agitation Scale (PAS), found significant improvements (</span><i data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">P</span></i><span data-dcnode-id="2197" instrument_node=""> &lt; 0.05) in the overall mean PAS among 40 patients after treatment with dronabinol at a mean dose of 7.3 mg/day for a mean duration of 16.88 days.</span></p></div><div data-dcnode-id="2142" id="rc1152.s5.4.1.1.2"><h5 data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">Changes in specific symptoms</span></h5><p data-dcnode-id="2174"><span data-dcnode-id="2192" instrument_node="">One open-label prospective cohort study included in the systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2189" href="#" role="button"><sup data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">3</span></sup></a><span data-dcnode-id="2188" instrument_node=""> found statistically significant improvements (</span><i data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">P</span></i><span data-dcnode-id="2185" instrument_node=""> &lt; 0.05) in the NPI subscales agitation, disinhibition, irritability, aberrant motor behaviour, and nocturnal behaviour disorders among 11 patients, following 28 days treatment with medical cannabis oil containing THC given orally at doses up to 7.5 mg twice daily. Caregiver burden was also reduced significantly (</span><i data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">P</span></i><span data-dcnode-id="2182" instrument_node=""> &lt; 0.05). One case series included in the systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2179" href="#" role="button"><sup data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">3</span></sup></a><span data-dcnode-id="2178" instrument_node=""> also reported significantly lower (</span><i data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">P</span></i><span data-dcnode-id="2175" instrument_node=""> &lt; 0.05) NPI sub-scores in six patients for aberrant motor behavior, agitation and night-time behaviors, after 14 days of treatment with 2.5 mg oral dronabinol at night. However, the study did not report the actual score values.</span></p><p data-dcnode-id="2165"><span data-dcnode-id="2173" instrument_node="">One cohort study included in the systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2170" href="#" role="button"><sup data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">3</span></sup></a><span data-dcnode-id="2169" instrument_node=""> found significant improvements (</span><i data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">P</span></i><span data-dcnode-id="2166" instrument_node=""> &lt; 0.05) in aberrant vocalization, motor agitation, aggressiveness and resting care as assessed on PAS among 40 patients, after treatment with dronabinol at a mean dose of dose of 7.3 mg/day for a mean duration of use of 16.88 days.</span></p><p data-dcnode-id="2155"><span data-dcnode-id="2164" instrument_node="">One RCT with a crossover design (involving two patients) included in the systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2161" href="#" role="button"><sup data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">3</span></sup></a><span data-dcnode-id="2160" instrument_node=""> found a 67% reduction in nightly movement counts by the third week of treatment with dronabinol. It was unclear if this symptom referred to nocturnal behavior disorders. However, in the fourth week, nocturnal activity returned to baseline in one patient and increased in the other patient. One case series included in the systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2157" href="#" role="button"><sup data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">3</span></sup></a><span data-dcnode-id="2156" instrument_node=""> involving six patients found that nocturnal activity significantly decreased (P &lt; 0.05) after 14 days of treatment with 2.5 mg oral dronabinol at night. It was unclear whether this symptom referred to nocturnal behavior disorders or aberrant motor behavior.</span></p><p data-dcnode-id="2149"><span data-dcnode-id="2154" instrument_node="">One uncontrolled before-and-after study</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref10" data-dcnode-id="2151" href="#" role="button"><sup data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">10</span></sup></a><span data-dcnode-id="2150" instrument_node=""> found that baseline agitation as measured by CMAI, and rigidity scores on UPDRS, decreased from 74.5 to 47.5, and 3.4 to 1.7, respectively, in 10 patients with severe dementia after two months follow-up. Statistical significance was not assessed.</span></p><p data-dcnode-id="2143"><span data-dcnode-id="2148" instrument_node="">One uncontrolled before-and-after study</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref10" data-dcnode-id="2145" href="#" role="button"><sup data-dcnode-id="2146"><span data-dcnode-id="2147" instrument_node="">10</span></sup></a><span data-dcnode-id="2144" instrument_node=""> involving 10 patients with severe dementia who were treated with THC/CBD (at doses up to 9.0/18.0 mg daily), found that persistent screaming stopped almost entirely in two women (20%) and frequent vomiting stopped in one patient (10%) after two months. Also, two patients (20%) stopped all morphine within three months, one patient (10%) decreased morphine by two-thirds in two months, and one patient (10%) stopped two antipsychotic medications after one month.</span></p></div><div data-dcnode-id="2130" id="rc1152.s5.4.1.1.3"><h5 data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">Cognitive changes</span></h5><p data-dcnode-id="2131"><span data-dcnode-id="2139" instrument_node="">One open-label prospective cohort study included in the systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2136" href="#" role="button"><sup data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">3</span></sup></a><span data-dcnode-id="2135" instrument_node=""> found that among 11 patients, there were statistically significant improvements in the MMSE scores from baseline (10.0) to following 28 days of treatment (11.0) with oral medical cannabis oil containing THC given at an initial dose of 2.5 mg twice daily and titrated up to 7.5 mg twice daily (</span><i data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">P</span></i><span data-dcnode-id="2132" instrument_node=""> &lt; 0.05).</span></p></div></div><div data-dcnode-id="2110" id="rc1152.s5.4.1.2"><h5 data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">Safety</span></h5><p data-dcnode-id="2117"><span data-dcnode-id="2126" instrument_node="">Adverse events (AEs) were reported in 10 included studies in the systematic review,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2123" href="#" role="button"><sup data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">3</span></sup></a><span data-dcnode-id="2122" instrument_node=""> whereas one case series and one case study did not report AEs. Overall, the most common AE reported was sedation, observed in 10 (24.4%) out of a total of 41 patients from two studies. The AEs were described as mostly mild. The exact numbers of patients involved were not clearly reported. Serious AEs (SAEs) were observed in three primary studies in the systematic review.</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2119" href="#" role="button"><sup data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">3</span></sup></a><span data-dcnode-id="2118" instrument_node=""> One RCT reported one seizure (7%) and two serious infections (13.4%). Another included RCT found SAEs in the form of gastroenteritis, worsening of NPS, and exacerbation of vestibular disorder and malignancy. One included cohort study reported three SAEs (dysphagia, fall, and confusion). No values were specified in either study.</span></p><p data-dcnode-id="2111"><span data-dcnode-id="2116" instrument_node="">One uncontrolled before-and-after study</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref10" data-dcnode-id="2113" href="#" role="button"><sup data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">10</span></sup></a><span data-dcnode-id="2112" instrument_node=""> reported that no patient stopped the cannabinoids for reasons of side effects; however, one patient died after one month for reasons unrelated to the cannabinoid medication.</span></p></div></div><div data-dcnode-id="2104" id="rc1152.s5.4.2"><h4 data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">Evidence-Based Guidelines Associated with the Use of Medical Cannabis for the Treatment of Dementia</span></h4><p data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">The literature search for this review did not identify any clinical guidelines associated with the use of medical cannabis for the treatment of dementia; therefore, no summary can be provided.</span></p></div></div><div data-dcnode-id="2042" id="rc1152.s5.5"><h3 data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">Limitations</span></h3><p data-dcnode-id="2091"><span data-dcnode-id="2100" instrument_node="">The systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2097" href="#" role="button"><sup data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">3</span></sup></a><span data-dcnode-id="2096" instrument_node=""> included primary studies of generally low quality and high risk of bias, except two studies with moderate risk of bias. The primary studies evaluated three isolated orally administered cannabinoids, with no study examining botanical cannabis or its crude extract. Also, no other route of administering cannabis was explored apart from the oral route. Thus, it is unknown if the finding will be generalizable to patients who used different medical cannabis preparations (i.e., not ingested orally). The authors of the systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2093" href="#" role="button"><sup data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">3</span></sup></a><span data-dcnode-id="2092" instrument_node=""> did not calculate effect estimates from the multiple studies due to the scarcity and heterogeneity of identified studies. Therefore, it was difficult to draw a generally representative conclusion on the effectiveness of the interventions.</span></p><p data-dcnode-id="2077"><span data-dcnode-id="2090" instrument_node="">Further, the systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2087" href="#" role="button"><sup data-dcnode-id="2088"><span data-dcnode-id="2089" instrument_node="">3</span></sup></a><span data-dcnode-id="2086" instrument_node=""> was limited to dementia patients 65 years or older, and studies undertaken in patients less than 65 years were excluded. Thus, it is unclear if the reported findings will be generalizable in younger populations. Patients in the uncontrolled before-and-after study were all female. Therefore, the generalizability of the results to male patients is unknown. Apart from one case study conducted in Canada, which was included in the systematic review,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2083" href="#" role="button"><sup data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">3</span></sup></a><span data-dcnode-id="2082" instrument_node=""> all other studies, including the uncontrolled before-and-after study,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref10" data-dcnode-id="2079" href="#" role="button"><sup data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">10</span></sup></a><span data-dcnode-id="2078" instrument_node=""> were undertaken outside Canada. Therefore, the generalizability of the findings to the Canadian context is unclear, given the potential for differences in practice patterns that might impact the interpretation of the results or the resources used to achieve them.</span></p><p data-dcnode-id="2045"><span data-dcnode-id="2076" instrument_node="">Although the uncontrolled before-and-after study</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref10" data-dcnode-id="2073" href="#" role="button"><sup data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">10</span></sup></a><span data-dcnode-id="2072" instrument_node=""> was conducted in patients with dementia with persisting severe behavior problems, notwithstanding optimal conventional treatment, medical cannabis was not compared with any active intervention in any of the studies</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2069" href="#" role="button"><sup data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">3</span></sup></a><sup data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">,</span></sup><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref10" data-dcnode-id="2064" href="#" role="button"><sup data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">10</span></sup></a><span data-dcnode-id="2063" instrument_node=""> included in this report. Thus, the comparative effectiveness of medical cannabis to standard care for dementia could not be determined conclusively. Also, none of the included studies</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2060" href="#" role="button"><sup data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">3</span></sup></a><sup data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">,</span></sup><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref10" data-dcnode-id="2055" href="#" role="button"><sup data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">10</span></sup></a><span data-dcnode-id="2054" instrument_node=""> had long-term effectiveness and safety data. However, in both the systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2051" href="#" role="button"><sup data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">3</span></sup></a><span data-dcnode-id="2050" instrument_node=""> and the uncontrolled before-and-after study</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref10" data-dcnode-id="2047" href="#" role="button"><sup data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">10</span></sup></a><span data-dcnode-id="2046" instrument_node=""> patients with dementia of all origins were eligibility for inclusion, which implies a good generalizability across patients with various kinds of dementia.</span></p><p data-dcnode-id="2043"><span data-dcnode-id="2044" instrument_node="">The literature search for this report did not identify any clinical guidelines regarding the use of medical cannabis for the treatment of dementia. However, the search was limited to English-language documents, and it is unknown if potentially relevant guidelines in other languages were missed. Given these limitations, there is a need for further studies to evaluate the use of medical cannabis in dementia, and establish clear guidelines for its use, if proven safe and effective.</span></p></div></div><div data-dcnode-id="1996" id="rc1152.s6"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="2038"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="2039" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="2040" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="2036" id="_rc1152_s6_"><span data-dcnode-id="2037" instrument_node="">Conclusions and Implications for Decision or Policy Making</span></h2><p data-dcnode-id="2018"><span data-dcnode-id="2035" instrument_node="">One systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2032" href="#" role="button"><sup data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">3</span></sup></a><span data-dcnode-id="2031" instrument_node=""> of 12 primary studies and one uncontrolled before-and-after prospective pilot study</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref10" data-dcnode-id="2028" href="#" role="button"><sup data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">10</span></sup></a><span data-dcnode-id="2027" instrument_node=""> provided the information in this report. No relevant evidence-based clinical guidelines regarding the use of medical cannabis for treating dementia were identified. The primary studies of the systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2024" href="#" role="button"><sup data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">3</span></sup></a><span data-dcnode-id="2023" instrument_node=""> assessed the safety and efficacy of three isolated cannabinoids (dronabinol, THC, and nabilone) that were orally administered to patients with dementia at various doses. In the uncontrolled before-and-after prospective pilot study,</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref10" data-dcnode-id="2020" href="#" role="button"><sup data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">10</span></sup></a><span data-dcnode-id="2019" instrument_node=""> patients were given cannabis oil containing THC/CBD given with small pieces of chocolate cake to facilitate intake at doses from an initial dose of 7.6 mg THC/13.2 mg CBD titrated up to 9.0 mg THC/18.0 mg CBD daily over two months. None of the studies examined raw botanical cannabis or explored another route of administration apart from oral.</span></p><p data-dcnode-id="2007"><span data-dcnode-id="2017" instrument_node="">Overall, limited evidence from the studies</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2014" href="#" role="button"><sup data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">3</span></sup></a><sup data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">,</span></sup><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref10" data-dcnode-id="2009" href="#" role="button"><sup data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">10</span></sup></a><span data-dcnode-id="2008" instrument_node=""> included this report suggested that medical cannabis may be effective for treating neuropsychiatric symptoms associated with dementia (i.e., agitation, disinhibition, irritability, aberrant motor behaviour, nocturnal behaviour disorders, and aberrant vocalization and resting care). There was also limited evidence of improvement in rigidity and cognitive scores as assessed by MMSE.</span></p><p data-dcnode-id="1997"><span data-dcnode-id="2006" instrument_node="">However, the data were inconclusive, given the limitations previously discussed. Key sources of uncertainty included the low quality of evidence in the primary studies of the systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="2003" href="#" role="button"><sup data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">3</span></sup></a><span data-dcnode-id="2002" instrument_node=""> and the fact that the uncontrolled before-and-after study</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref10" data-dcnode-id="1999" href="#" role="button"><sup data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">10</span></sup></a><span data-dcnode-id="1998" instrument_node=""> was a nonrandomized pilot study in 10 dementia patients that reported descriptive outcomes without statistical analysis. Given these limitations, there is a need for a well-designed randomized controlled trial to confirm the effectiveness of medical cannabis for the treatment of dementia using different formulations that explore varieties of routes of administration.</span></p></div><div data-dcnode-id="1514" id="rc1152.rl.r1"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="1993"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="1994" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="1995" instrument_node="">Go to:</span></a></div><h2 clas
