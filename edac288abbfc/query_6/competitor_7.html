uto; height: auto; overflow: visible;"><table class="no_bottom_margin" data-dcnode-id="1440"><thead data-dcnode-id="1477"><tr data-dcnode-id="1478"><th colspan="1" data-dcnode-id="1487" id="hd_h_rc1152.app2.tab1_1_1_1_1" rowspan="1" style="text-align:left;vertical-align:top;"><span data-dcnode-id="1488" instrument_node="">First Author, Publication Year, Country</span></th><th colspan="1" data-dcnode-id="1485" id="hd_h_rc1152.app2.tab1_1_1_1_2" rowspan="1" style="text-align:left;vertical-align:top;"><span data-dcnode-id="1486" instrument_node="">Study Designs and Numbers of Primary Studies Included</span></th><th colspan="1" data-dcnode-id="1483" id="hd_h_rc1152.app2.tab1_1_1_1_3" rowspan="1" style="text-align:left;vertical-align:top;"><span data-dcnode-id="1484" instrument_node="">Population Characteristics</span></th><th colspan="1" data-dcnode-id="1481" id="hd_h_rc1152.app2.tab1_1_1_1_4" rowspan="1" style="text-align:left;vertical-align:top;"><span data-dcnode-id="1482" instrument_node="">Intervention and Comparator(s)</span></th><th colspan="1" data-dcnode-id="1479" id="hd_h_rc1152.app2.tab1_1_1_1_5" rowspan="1" style="text-align:left;vertical-align:top;"><span data-dcnode-id="1480" instrument_node="">Clinical Outcomes, Length of Follow-Up</span></th></tr></thead><tbody data-dcnode-id="1441"><tr data-dcnode-id="1442"><td colspan="1" data-dcnode-id="1469" headers="hd_h_rc1152.app2.tab1_1_1_1_1" rowspan="1" style="text-align:left;vertical-align:top;"><p data-dcnode-id="1472"><span data-dcnode-id="1476" instrument_node="">Hillen et al., 2019</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="1473" href="#" role="button"><sup data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">3</span></sup></a></p><p data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">Australia</span></p></td><td colspan="1" data-dcnode-id="1464" headers="hd_h_rc1152.app2.tab1_1_1_1_2" rowspan="1" style="text-align:left;vertical-align:top;"><p data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">A total of 12 studies published from 1997 to 2017. Six studies were RCTs, two were cohort studies (prospective cohort = 1, retrospective cohort = 1), and four were case series or case studies</span></p><p data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">Original peer-reviewed studies assessing the safety and or effectiveness of any cannabinoid in treating NPS in dementia patients were included, regardless of publication date.</span></p></td><td colspan="1" data-dcnode-id="1462" headers="hd_h_rc1152.app2.tab1_1_1_1_3" rowspan="1" style="text-align:left;vertical-align:top;"><span data-dcnode-id="1463" instrument_node="">A total of 178 patients ≥ 65 years with a diagnosis of dementia of all origins, exhibiting NPS. The mean age ranged from 72.7 to 81.5 years, with the proportion of males included ranging from 30 to 100%. The number of participants in the studies ranged from 2 to 50. In nine studies that reported baseline cognition as (assessed using the MMSE), scores ranged from 4 (severe cognitive impairment) to 22 (mild cognitive impairment). Four RCTs included patients with NPI score ≥ 10.</span></td><td colspan="1" data-dcnode-id="1457" headers="hd_h_rc1152.app2.tab1_1_1_1_4" rowspan="1" style="text-align:left;vertical-align:top;"><p data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Three different orally administered cannabinoids (dronabinol at doses ranging from 2.5 to 7.03 mg/day; THC at doses ranging from 1.5 to 15 mg/day; and nabilone at doses ranging from 0.5 to 2.0 mg/day).</span></p><p data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">Overall, reporting of prior treatment for NPS was limited and varied across the included studies. Reported concomitant medications included antipsychotics, antidepressants, and neuromodulators; however, it was often unclear which medications were indicated for treating NPS of dementia.</span></p></td><td colspan="1" data-dcnode-id="1443" headers="hd_h_rc1152.app2.tab1_1_1_1_5" rowspan="1" style="text-align:left;vertical-align:top;"><p data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Effectiveness of cannabinoid therapy for treating NPS of dementia as assessed by tools such as the NPI, CMAI, Pittsburg Agitation Scale, CGI, and negative affect score</span></p><p data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">Safety as assessed by
</span></p><ul data-dcnode-id="1446"><li class="half_rhythm" data-dcnode-id="1450"><div data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">Reporting AEs. Methods for ascertaining AEs included participant and caregiver reports, predetermined lists of AEs to aid in identification, medical notes or clinical observation or a combination of these;</span></div></li><li class="half_rhythm" data-dcnode-id="1447"><div data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">Physical parameters related to safety such blood pressure, heart rate, electrocardiogram, and weight.</span></div></li></ul><p data-dcnode-id="1445"></p><span data-dcnode-id="1444" instrument_node="">
</span></td></tr></tbody></table></div><div data-dcnode-id="1431"><div data-dcnode-id="1432"><dl class="temp-labeled-list small" data-dcnode-id="1433"><dt data-dcnode-id="1438"></dt><dd data-dcnode-id="1434"><div data-dcnode-id="1435"><p class="no_margin" data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">AEs = adverse drug events; CGI = Clinical Global Impression; CMAI = Cohen-Mansfield Agitation Inventory; MMSE = Mini-Mental State Examination; NPI = Neuropsychiatric Inventory Index; NPS = neuropsychiatric symptoms; THC = delta-9 tetrahydrocannabinol.</span></p></div></dd></dl></div></div></div><div class="table" data-dcnode-id="1354" id="rc1152.app2.tab2"><h3 data-dcnode-id="1425"><span class="label" data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">Table 3</span></span><span class="title" data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">Characteristics of Included Primary Clinical Study</span></span></h3><p class="large-table-link" data-dcnode-id="1421" style="display:none"><span class="right" data-dcnode-id="1422"><a data-dcnode-id="1423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK546328/table/rc1152.app2.tab2/%3Freport%3Dobjectonly" target="object"><span data-dcnode-id="1424" instrument_node="">View in own window</span></a></span></p><div class="large_tbl" data-dcnode-id="1363" id="__rc1152.app2.tab2_lrgtbl__" style="width: auto; height: auto; overflow: visible;"><table class="no_bottom_margin" data-dcnode-id="1364"><thead data-dcnode-id="1409"><tr data-dcnode-id="1410"><th colspan="1" data-dcnode-id="1419" id="hd_h_rc1152.app2.tab2_1_1_1_1" rowspan="1" style="text-align:left;vertical-align:top;"><span data-dcnode-id="1420" instrument_node="">First Author, Publication Year, Country</span></th><th colspan="1" data-dcnode-id="1417" id="hd_h_rc1152.app2.tab2_1_1_1_2" rowspan="1" style="text-align:left;vertical-align:top;"><span data-dcnode-id="1418" instrument_node="">Study Design</span></th><th colspan="1" data-dcnode-id="1415" id="hd_h_rc1152.app2.tab2_1_1_1_3" rowspan="1" style="text-align:left;vertical-align:top;"><span data-dcnode-id="1416" instrument_node="">Population Characteristics</span></th><th colspan="1" data-dcnode-id="1413" id="hd_h_rc1152.app2.tab2_1_1_1_4" rowspan="1" style="text-align:left;vertical-align:top;"><span data-dcnode-id="1414" instrument_node="">Intervention and Comparator(s)</span></th><th colspan="1" data-dcnode-id="1411" id="hd_h_rc1152.app2.tab2_1_1_1_5" rowspan="1" style="text-align:left;vertical-align:top;"><span data-dcnode-id="1412" instrument_node="">Clinical Outcomes, Length of Follow-Up</span></th></tr></thead><tbody data-dcnode-id="1365"><tr data-dcnode-id="1366"><td colspan="1" data-dcnode-id="1401" headers="hd_h_rc1152.app2.tab2_1_1_1_1" rowspan="1" style="text-align:left;vertical-align:top;"><p data-dcnode-id="1404"><span data-dcnode-id="1408" instrument_node="">Broers et al., 2019</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref10" data-dcnode-id="1405" href="#" role="button"><sup data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">10</span></sup></a></p><p data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">Switzerland</span></p></td><td colspan="1" data-dcnode-id="1399" headers="hd_h_rc1152.app2.tab2_1_1_1_2" rowspan="1" style="text-align:left;vertical-align:top;"><span data-dcnode-id="1400" instrument_node="">Prospective before-and-after pilot study</span></td><td colspan="1" data-dcnode-id="1397" headers="hd_h_rc1152.app2.tab2_1_1_1_3" rowspan="1" style="text-align:left;vertical-align:top;"><span data-dcnode-id="1398" instrument_node="">Ten female patients with dementia from different origins with persisting severe behavior problems, notwithstanding optimal conventional treatment. The patients had average age of 79.5 years and NPI score &gt;10. No measures of variability (e.g., SDor SE) was reported.</span></td><td colspan="1" data-dcnode-id="1380" headers="hd_h_rc1152.app2.tab2_1_1_1_4" rowspan="1" style="text-align:left;vertical-align:top;"><p data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">THC/CBD-based oral cannabis oil. The medication was given three times daily, with the average doses titrated upwards over the study period as follows:
</span></p><ul data-dcnode-id="1385"><li class="half_rhythm" data-dcnode-id="1392"><div data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">7.6 mg THC/13.2 mg CBD daily after two weeks,</span></div></li><li class="half_rhythm" data-dcnode-id="1389"><div data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">8.8 mg THC/17.6 mg CBD after one month, and</span></div></li><li class="half_rhythm" data-dcnode-id="1386"><div data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">9.0 mg THC/18.0 mg CBD after two months.</span></div></li></ul><p data-dcnode-id="1384"></p><span data-dcnode-id="1383" instrument_node="">
</span><p data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">The medication was given with a small piece of chocolate cake to facilitate intake.</span></p></td><td colspan="1" data-dcnode-id="1367" headers="hd_h_rc1152.app2.tab2_1_1_1_5" rowspan="1" style="text-align:left;vertical-align:top;"><p data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">NPI for severity of NPS</span></p><p data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">CMAI for severity of agitation</span></p><p data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">UPDRS (notably item 22) for degree of rigidity with passive movements</span></p><p data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">Barthel index for daily activity</span></p><p data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">A 0 to 10 VAS for the most invalidating daily activity or disturbing behavior</span></p><p data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">Descriptive results were reported after a follow-up period of two months</span></p></td></tr></tbody></table></div><div data-dcnode-id="1355"><div data-dcnode-id="1356"><dl class="temp-labeled-list small" data-dcnode-id="1357"><dt data-dcnode-id="1362"></dt><dd data-dcnode-id="1358"><div data-dcnode-id="1359"><p class="no_margin" data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">CBD = cannabidiol; CMAI = Cohen-Mansfield Agitation Inventory; NPI = Neuropsychiatric Inventory Index; NPS = neuropsychiatric symptoms; SD = standard deviation; SE = standard error; THC = delta-9 tetrahydrocannabinol; UPDRS = Unified Parkinson Disease Rating Scale; VAS = visual analog scale.</span></p></div></dd></dl></div></div></div></div><div data-dcnode-id="1169" id="rc1152.app3"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="1350"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="1351" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="1352" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="1348" id="_rc1152_app3_"><span data-dcnode-id="1349" instrument_node="">Appendix 3. Critical Appraisal of Included Publications</span></h2><div class="table" data-dcnode-id="1242" id="rc1152.app3.tab1"><h3 data-dcnode-id="1340"><span class="label" data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">Table 4</span></span><span class="title" data-dcnode-id="1341"><span data-dcnode-id="1345" instrument_node="">Strengths and Limitations of Systematic Review using AMSTAR</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref25" data-dcnode-id="1342" href="#" role="button"><sup data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">25</span></sup></a></span></h3><p class="large-table-link" data-dcnode-id="1336" style="display:none"><span class="right" data-dcnode-id="1337"><a data-dcnode-id="1338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK546328/table/rc1152.app3.tab1/%3Freport%3Dobjectonly" target="object"><span data-dcnode-id="1339" instrument_node="">View in own window</span></a></span></p><div class="large_tbl" data-dcnode-id="1251" id="__rc1152.app3.tab1_lrgtbl__" style="width: auto; height: auto; overflow: visible;"><table class="no_bottom_margin" data-dcnode-id="1252"><thead data-dcnode-id="1330"><tr data-dcnode-id="1331"><th colspan="1" data-dcnode-id="1334" id="hd_h_rc1152.app3.tab1_1_1_1_1" rowspan="1" style="text-align:center;vertical-align:middle;"><span data-dcnode-id="1335" instrument_node="">Strengths</span></th><th colspan="1" data-dcnode-id="1332" id="hd_h_rc1152.app3.tab1_1_1_1_2" rowspan="1" style="text-align:center;vertical-align:middle;"><span data-dcnode-id="1333" instrument_node="">Limitations</span></th></tr></thead><tbody data-dcnode-id="1253"><tr data-dcnode-id="1324"><th colspan="2" data-dcnode-id="1325" headers="hd_h_rc1152.app3.tab1_1_1_1_1 hd_h_rc1152.app3.tab1_1_1_1_2" id="hd_b_rc1152.app3.tab1_1_1_1_1" rowspan="1" style="text-align:center;vertical-align:middle;"><span data-dcnode-id="1329" instrument_node="">Hillen et al., 2019</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="1326" href="#" role="button"><sup data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">3</span></sup></a></th></tr><tr data-dcnode-id="1254"><td colspan="1" data-dcnode-id="1296" headers="hd_h_rc1152.app3.tab1_1_1_1_1 hd_b_rc1152.app3.tab1_1_1_1_1" rowspan="1" style="text-align:left;vertical-align:top;"><span data-dcnode-id="1323" instrument_node="">
</span><ul data-dcnode-id="1298"><li class="half_rhythm" data-dcnode-id="1320"><div data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">This systematic review followed the Preferred Reporting Items for Systematic Reviews and Meta-Analyses (PRISMA) guidelines and was registered with International Prospective Register of Systematic Reviews (PROSPERO).</span></div></li><li class="half_rhythm" data-dcnode-id="1317"><div data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">The objectives of the systematic review were described clearly, and the research questions and inclusion criteria for the study were provided</span></div></li><li class="half_rhythm" data-dcnode-id="1314"><div data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">A systematic search of 27 online sources, including healthcare databases and clinical trial databases, were searched from inception to January 01, 2018 for original peer-reviewed studies assessing the safety and or effectiveness of any cannabinoid in treating NPS in patients with a diagnosis of dementia of all origins</span></div></li><li class="half_rhythm" data-dcnode-id="1311"><div data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">Two reviewers independently selected studies for inclusion and extracted the relevant information. Disagreements were resolved with a third reviewer</span></div></li><li class="half_rhythm" data-dcnode-id="1308"><div data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">The characteristics of the included studies were described in adequate detail</span></div></li><li class="half_rhythm" data-dcnode-id="1305"><div data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">Assessment of the quality of the individual included studies was undertaken independently by two reviewers using the Johanna Briggs Institute and the Cochrane Collaboration critical appraisal tools (i.e., for observational studies and RCTs, respectively). Disagreements were resolved with a third reviewer</span></div></li><li class="half_rhythm" data-dcnode-id="1302"><div data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">The interpretation and discussions of the results appropriately considered the risk of bias in individual studies included in the review.</span></div></li><li class="half_rhythm" data-dcnode-id="1299"><div data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">The authors declared that there was no conflict of interest</span></div></li></ul><span data-dcnode-id="1297" instrument_node="">
</span></td><td colspan="1" data-dcnode-id="1255" headers="hd_h_rc1152.app3.tab1_1_1_1_2 hd_b_rc1152.app3.tab1_1_1_1_1" rowspan="1" style="text-align:left;vertical-align:top;"><span data-dcnode-id="1295" instrument_node="">
</span><ul data-dcnode-id="1257"><li class="half_rhythm" data-dcnode-id="1292"><div data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Study selection was limited to studies in the older population (≥65 years old). Therefore, there is the likelihood of reduced generalizability to variants of dementia such as executive and frontal dementia, which are more common in younger population</span></div></li><li class="half_rhythm" data-dcnode-id="1289"><div data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">The review authors did not explain their selection of the study designs for inclusion in the review. However, given the limited number of high-quality RCTs of the subject, it seems reasonable to include peer-reviewed studies regardless of the study design</span></div></li><li class="half_rhythm" data-dcnode-id="1286"><div data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">A list of excluded studies was not provided, although the number of full-text articles excluded along with reasons for exclusion were reported in the PRISMA flow diagram of systematic search results and study selection</span></div></li><li class="half_rhythm" data-dcnode-id="1283"><div data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">The study population included patients who were frail and had multiple comorbidities associated with multiple chronic medications making it challenging to delineate the precise effect of the intervention under review in the face of inadequately reported comorbidities and concomitant medication use</span></div></li><li class="half_rhythm" data-dcnode-id="1280"><div data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">According to the authors, the quality of the studies identified for the systematic review was low, with eight out of the 12 studies (66.7%) assessed to have a high risk of bias. Sources of bias included incomplete reporting of study design, patient clinical characteristics, tools to measure change in NPS of dementia, and outcomes</span></div></li><li class="half_rhythm" data-dcnode-id="1277"><div data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">Three orally administered isolated cannabinoids were investigated. No study examined botanical cannabis or its crude extract, and no other route of administration of cannabis was evaluated. Thus, it is unknown if the finding will be generalizable in patients who used different forms of medical cannabis</span></div></li><li class="half_rhythm" data-dcnode-id="1267"><div data-dcnode-id="1268"><span data-dcnode-id="1276" instrument_node="">Given that cannabinoids at higher doses have been found to be effective in some conditions (e.g., 15 mg/m</span><sup data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">2</span></sup><span data-dcnode-id="1273" instrument_node=""> oral dronabinol up to six times daily for nausea and vomiting, and 2 mg oral nabilone twice daily for chemotherapy-induced nausea and vomiting),</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref32" data-dcnode-id="1270" href="#" role="button"><sup data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">32</span></sup></a><span data-dcnode-id="1269" instrument_node=""> it is unknown if the doses of cannabinoids used in the studies of the systematic review may have been suboptimal. The dose ranges in the primary study of the systematic were 2.5 to 7.03 mg/day), 1.5 to 15 mg/day, and 0.5 to 2.0 mg/day for dronabinol, THC, and nabilone, respectively</span></div></li><li class="half_rhythm" data-dcnode-id="1264"><div data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">Long-term effectiveness and safety were not established in the studies due to short exposure times</span></div></li><li class="half_rhythm" data-dcnode-id="1261"><div data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">Due to the heterogeneity of identified studies, a meta-analysis was not undertaken, and overall, it was difficult to generalize about the safety and effectiveness of cannabinoids in treating NPS of dementia</span></div></li><li class="half_rhythm" data-dcnode-id="1258"><div data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">The authors acknowledged funding support from a cannabis manufacturing firm. However, they stated that the firm and its employees were not involved in undertaking of the systematic review, nor the interpretation of the results.</span></div></li></ul><span data-dcnode-id="1256" instrument_node="">
</span></td></tr></tbody></table></div><div data-dcnode-id="1243"><div data-dcnode-id="1244"><dl class="temp-labeled-list small" data-dcnode-id="1245"><dt data-dcnode-id="1250"></dt><dd data-dcnode-id="1246"><div data-dcnode-id="1247"><p class="no_margin" data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">NPS = neuropsychiatric symptoms; RCT = randomized controlled trial; THC = delta-9 tetrahydrocannabinol.</span></p></div></dd></dl></div></div></div><div class="table" data-dcnode-id="1170" id="rc1152.app3.tab2"><h3 data-dcnode-id="1234"><span class="label" data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">Table 5</span></span><span class="title" data-dcnode-id="1235"><span data-dcnode-id="1239" instrument_node="">Strengths and Limitations of Clinical Studies using ROBANS Tool</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref26" data-dcnode-id="1236" href="#" role="button"><sup data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">26</span></sup></a></span></h3><p class="large-table-link" data-dcnode-id="1230" style="display:none"><span class="right" data-dcnode-id="1231"><a data-dcnode-id="1232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK546328/table/rc1152.app3.tab2/%3Freport%3Dobjectonly" target="object"><span data-dcnode-id="1233" instrument_node="">View in own window</span></a></span></p><div class="large_tbl" data-dcnode-id="1179" id="__rc1152.app3.tab2_lrgtbl__" style="width: auto; height: auto; overflow: visible;"><table class="no_bottom_margin" data-dcnode-id="1180"><thead data-dcnode-id="1224"><tr data-dcnode-id="1225"><th colspan="1" data-dcnode-id="1228" id="hd_h_rc1152.app3.tab2_1_1_1_1" rowspan="1" style="text-align:center;vertical-align:middle;"><span data-dcnode-id="1229" instrument_node="">Strengths</span></th><th colspan="1" data-dcnode-id="1226" id="hd_h_rc1152.app3.tab2_1_1_1_2" rowspan="1" style="text-align:center;vertical-align:middle;"><span data-dcnode-id="1227" instrument_node="">Limitations</span></th></tr></thead><tbody data-dcnode-id="1181"><tr data-dcnode-id="1218"><th colspan="2" data-dcnode-id="1219" headers="hd_h_rc1152.app3.tab2_1_1_1_1 hd_h_rc1152.app3.tab2_1_1_1_2" id="hd_b_rc1152.app3.tab2_1_1_1_1" rowspan="1" style="text-align:center;vertical-align:middle;"><span data-dcnode-id="1223" instrument_node="">Broers et al., 2019</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref10" data-dcnode-id="1220" href="#" role="button"><sup data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">10</span></sup></a></th></tr><tr data-dcnode-id="1182"><td colspan="1" data-dcnode-id="1199" headers="hd_h_rc1152.app3.tab2_1_1_1_1 hd_b_rc1152.app3.tab2_1_1_1_1" rowspan="1" style="text-align:left;vertical-align:top;"><span data-dcnode-id="1217" instrument_node="">
</span><ul data-dcnode-id="1201"><li class="half_rhythm" data-dcnode-id="1214"><div data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">This before-and-after study collected data prospectively, thereby reducing risk of bias.</span></div></li><li class="half_rhythm" data-dcnode-id="1211"><div data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">Outcomes were measured with validated scales and structured VAS.</span></div></li><li class="half_rhythm" data-dcnode-id="1208"><div data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">The study population was the same both before and after the interventions. Therefore, selection bias due to inappropriate comparison target group was low.</span></div></li><li class="half_rhythm" data-dcnode-id="1205"><div data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">All study participants had data for before-value and after-value; therefore, there was no risk of bias due to incomplete data outcome.</span></div></li><li class="half_rhythm" data-dcnode-id="1202"><div data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">Although there was no reference to a pre-specified protocol for the study, most of the expected main outcomes were included; thus, reducing the risk of bias due to selective outcome reporting</span></div></li></ul><span data-dcnode-id="1200" instrument_node="">
</span></td><td colspan="1" data-dcnode-id="1183" headers="hd_h_rc1152.app3.tab2_1_1_1_2 hd_b_rc1152.app3.tab2_1_1_1_1" rowspan="1" style="text-align:left;vertical-align:top;"><span data-dcnode-id="1198" instrument_node="">
</span><ul data-dcnode-id="1185"><li class="half_rhythm" data-dcnode-id="1195"><div data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">It was unknown if all eligible patients were consecutively enrolled or if the study participants were intentionally targeted. Therefore, the risk of bias due to inappropriate selection is unclear.</span></div></li><li class="half_rhythm" data-dcnode-id="1192"><div data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">It was not reported if the cannabis oil was standardized or how the stated doses were measured. Thus, there was uncertainty about the level of risk of performance bias.</span></div></li><li class="half_rhythm" data-dcnode-id="1189"><div data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">It is unknown if the outcome assessors were blinded to the study hypothesis or exposure to the medication. Thus, the risk of confirmation bias due to inappropriate blinding of assessors was unclear.</span></div></li><li class="half_rhythm" data-dcnode-id="1186"><div data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">Because the patients had severe dementia, they could not personally give feedback, and confounding factors that could affect their behavior and symptoms beyond the cannabinoid medications were not identified or analyzed.</span></div></li></ul><span data-dcnode-id="1184" instrument_node="">
</span></td></tr></tbody></table></div><div data-dcnode-id="1171"><div data-dcnode-id="1172"><dl class="temp-labeled-list small" data-dcnode-id="1173"><dt data-dcnode-id="1178"></dt><dd data-dcnode-id="1174"><div data-dcnode-id="1175"><p class="no_margin" data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">VAS = visual analog scale.</span></p></div></dd></dl></div></div></div></div><div data-dcnode-id="867" id="rc1152.app4"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="1166"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="1167" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="1168" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="1164" id="_rc1152_app4_"><span data-dcnode-id="1165" instrument_node="">Appendix 4. Main Study Findings and Authors’ Conclusions</span></h2><div class="table" data-dcnode-id="954" id="rc1152.app4.tab1"><h3 data-dcnode-id="1159"><span class="label" data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">Table 6</span></span><span class="title" data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Summary of Findings Included Systematic Review</span></span></h3><p class="large-table-link" data-dcnode-id="1155" style="display:none"><span class="right" data-dcnode-id="1156"><a data-dcnode-id="1157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK546328/table/rc1152.app4.tab1/%3Freport%3Dobjectonly" target="object"><span data-dcnode-id="1158" instrument_node="">View in own window</span></a></span></p><div class="large_tbl" data-dcnode-id="963" id="__rc1152.app4.tab1_lrgtbl__" style="width: auto; height: auto; overflow: visible;"><table class="no_bottom_margin" data-dcnode-id="964"><thead data-dcnode-id="1149"><tr data-dcnode-id="1150"><th colspan="1" data-dcnode-id="1153" id="hd_h_rc1152.app4.tab1_1_1_1_1" rowspan="1" style="text-align:center;vertical-align:middle;"><span data-dcnode-id="1154" instrument_node="">Main Study Findings</span></th><th colspan="1" data-dcnode-id="1151" id="hd_h_rc1152.app4.tab1_1_1_1_2" rowspan="1" style="text-align:center;vertical-align:middle;"><span data-dcnode-id="1152" instrument_node="">Authors’ Conclusion</span></th></tr></thead><tbody data-dcnode-id="965"><tr data-dcnode-id="1143"><th colspan="2" data-dcnode-id="1144" headers="hd_h_rc1152.app4.tab1_1_1_1_1 hd_h_rc1152.app4.tab1_1_1_1_2" id="hd_b_rc1152.app4.tab1_1_1_1_1" rowspan="1" style="text-align:center;vertical-align:middle;"><span data-dcnode-id="1148" instrument_node="">Hillen et al., 2019</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="1145" href="#" role="button"><sup data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">3</span></sup></a></th></tr><tr data-dcnode-id="966"><td colspan="1" data-dcnode-id="973" headers="hd_h_rc1152.app4.tab1_1_1_1_1 hd_b_rc1152.app4.tab1_1_1_1_1" rowspan="1" style="text-align:left;vertical-align:top;"><p data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Four of the 12 primary studies in the SR found that treatment of dementia patients with medical cannabis resulted in significant improvements in a range of neuropsychiatric symptoms associated with dementia. The remaining eight primary studies did not find evidence to support the efficacy of cannabinoids in the treatment of dementia. They comprised five placebo-controlled RCTs, and one case series and two case studies without controls. Three of the RCTs evaluated THC (two studies) or dronabinol (one study) for agitation and behavior changes. Another RCT evaluated THC for static and dynamic balance as well as gait, and one RCT assessed safety. Doses of THC used varied between 0.75 mg twice daily to 1.5 mg three times daily, with follow-up varying from 14 to 84 days across the studies. Dronabinol was dosed at 2.5 mg twice daily for 84 days. The case series evaluated nabilone for NPS titrating doses from 0.5 mg twice to thrice daily for 78 days. The period of dose titration was not mentioned. The two case studies also assessed nabilone; with change in behaviours as outcome for one and observed response to nabilone outcome for the other. None of these two case studies provided quantifiable results, and it was not possible to determine significant effect.</span></p><span data-dcnode-id="1140" instrument_node="">
</span><p data-dcnode-id="1131"><span data-dcnode-id="1139" instrument_node="">The following are the findings from the four primary studies of the included systematic review</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="1136" href="#" role="button"><sup data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">3</span></sup></a><span data-dcnode-id="1135" instrument_node=""> and the uncontrolled before-and-after study.</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref10" data-dcnode-id="1132" href="#" role="button"><sup data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">10</span></sup></a></p><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1126"><i data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">Overall symptoms score</span></i><span data-dcnode-id="1127" instrument_node="">
</span></p><ul data-dcnode-id="1107"><li class="half_rhythm" data-dcnode-id="1120"><div data-dcnode-id="1121"><span data-dcnode-id="1125" instrument_node="">In one RCT with crossover design included in the SR, the overall NPI score of two patients treated with dronabinol 2.5 mg at night for 28 days improved from 18 and 44 at baseline to 8 and 33, respectively. One case series included in the SR, found significantly lower total NPI score and sub-scores of aberrant motor behavior, agitation and night-time behaviors in six patients with Alzheimer’s disease and vascular dementia, after 14 days of treatment with 2.5 mg oral dronabinol at night (no values given, </span><i data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">P</span></i><span data-dcnode-id="1122" instrument_node=""> &lt; 0.05).</span></div></li><li class="half_rhythm" data-dcnode-id="1114"><div data-dcnode-id="1115"><span data-dcnode-id="1119" instrument_node="">One open-label prospective cohort study included in the SR found that among 11 patients with Alzheimer’s disease, there was a statistically significant improvement in the overall NPI score from baseline following 28 days treatment with medical cannabis oil containing THC given orally at an initial dose of 2.5 mg twice daily and titrated up to 7.5 mg twice daily (44.4 versus 12.8, </span><i data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">P</span></i><span data-dcnode-id="1116" instrument_node=""> &lt; 0.01).</span></div></li><li class="half_rhythm" data-dcnode-id="1108"><div data-dcnode-id="1109"><span data-dcnode-id="1113" instrument_node="">One cohort study included in the systematic review, which assessed patient outcomes using the PAS found significant improvements in overall mean (SD) among 40 patients after treatment with dronabinol at a mean dose of 7.3 mg/day for a mean duration of use of 16.88 days (9.68 [3.91] versus 5.25 [4.17], </span><i data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">P</span></i><span data-dcnode-id="1110" instrument_node=""> &lt; 0.05)</span></div></li></ul><span data-dcnode-id="1106" instrument_node="">
</span><i data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">Changes in specific symptom scores</span></i><span data-dcnode-id="1103" instrument_node="">
</span><ul data-dcnode-id="1014"><li class="half_rhythm" data-dcnode-id="1051"><div data-dcnode-id="1052"><span data-dcnode-id="1102" instrument_node="">One open-label prospective cohort study included in the SR found that among 11 patients with Alzheimer’s disease, there were statistically significant improvements in the NPI subscales assessed from baseline following 28 days treatment with medical cannabis oil containing THC given orally at an initial dose of 2.5 mg twice daily and titrated up to 7.5 mg twice daily as follows:
</span><dl class="temp-labeled-list" data-dcnode-id="1053"><dt data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">-</span></dt><dd data-dcnode-id="1094"><p class="no_top_margin" data-dcnode-id="1095"><span data-dcnode-id="1099" instrument_node="">Agitation/aggression (8.2 versus 2.1, </span><i data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">P</span></i><span data-dcnode-id="1096" instrument_node=""> &lt; 0.05),</span></p></dd><dt data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">-</span></dt><dd data-dcnode-id="1086"><p class="no_top_margin" data-dcnode-id="1087"><span data-dcnode-id="1091" instrument_node="">Disinhibition (5.3 versus 1.6, </span><i data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">P</span></i><span data-dcnode-id="1088" instrument_node=""> &lt; 0.05),</span></p></dd><dt data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">-</span></dt><dd data-dcnode-id="1078"><p class="no_top_margin" data-dcnode-id="1079"><span data-dcnode-id="1083" instrument_node="">Irritability/lability (5.9 versus 1.7, </span><i data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">P</span></i><span data-dcnode-id="1080" instrument_node=""> &lt; 0.05),</span></p></dd><dt data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">-</span></dt><dd data-dcnode-id="1070"><p class="no_top_margin" data-dcnode-id="1071"><span data-dcnode-id="1075" instrument_node="">Aberrant motor behaviour (4.6 versus 1.9, </span><i data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">P</span></i><span data-dcnode-id="1072" instrument_node=""> &lt; 0.05),</span></p></dd><dt data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">-</span></dt><dd data-dcnode-id="1062"><p class="no_top_margin" data-dcnode-id="1063"><span data-dcnode-id="1067" instrument_node="">Nocturnal behaviour disorders (3.8 versus 0.9, </span><i data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">P</span></i><span data-dcnode-id="1064" instrument_node=""> &lt; 0.05) and</span></p></dd><dt data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">-</span></dt><dd data-dcnode-id="1054"><p class="no_top_margin" data-dcnode-id="1055"><span data-dcnode-id="1059" instrument_node="">Caregiver burden (20.7 versus 9.4, </span><i data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">P</span></i><span data-dcnode-id="1056" instrument_node=""> &lt; 0.05)</span></p></dd></dl></div></li><li class="half_rhythm" data-dcnode-id="1015"><div data-dcnode-id="1016"><span data-dcnode-id="1050" instrument_node="">One cohort study included in the SR, assessment with the PAS found significant improvements in the mean (SD) of each PAS domain from baseline as follows:
</span><dl class="temp-labeled-list" data-dcnode-id="1017"><dt data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">-</span></dt><dd data-dcnode-id="1042"><p class="no_top_margin" data-dcnode-id="1043"><span data-dcnode-id="1047" instrument_node="">Aberrant vocalization (2.50 [1.06] versus 1.15 [1.09], </span><i data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">P</span></i><span data-dcnode-id="1044" instrument_node=""> &lt; 0.05);</span></p></dd><dt data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">-</span></dt><dd data-dcnode-id="1034"><p class="no_top_margin" data-dcnode-id="1035"><span data-dcnode-id="1039" instrument_node="">Motor agitation (2.02 [1.0] versus 1.18 [0.98], </span><i data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">P</span></i><span data-dcnode-id="1036" instrument_node=""> &lt; 0.05);</span></p></dd><dt data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">-</span></dt><dd data-dcnode-id="1026"><p class="no_top_margin" data-dcnode-id="1027"><span data-dcnode-id="1031" instrument_node="">Aggressiveness (2.25 [1.71] versus 1.08 [1.49], </span><i data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">P</span></i><span data-dcnode-id="1028" instrument_node=""> &lt; 0.05); and</span></p></dd><dt data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">-</span></dt><dd data-dcnode-id="1018"><p class="no_top_margin" data-dcnode-id="1019"><span data-dcnode-id="1023" instrument_node="">Resting care (2.80 [1.86] versus 1.80 [1.62), </span><i data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">P</span></i><span data-dcnode-id="1020" instrument_node=""> &lt; 0.05).</span></p></dd></dl></div></li></ul><span data-dcnode-id="1013" instrument_node="">
</span><i data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Nocturnal activity disorder</span></i><span data-dcnode-id="1010" instrument_node="">
</span><ul data-dcnode-id="1000"><li class="half_rhythm" data-dcnode-id="1007"><div data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">In one RCT with a crossover design involving two patients treated with dronabinol, decreased nocturnal activity (67% reduction in movement counts) was observed by the third week. It was unclear whether this symptom referred to nocturnal behavior disorders or some other measure. However, in the fourth week, nocturnal activity returned to baseline in one patient and increased in the other patient.</span></div></li><li class="half_rhythm" data-dcnode-id="1001"><div data-dcnode-id="1002"><span data-dcnode-id="1006" instrument_node="">One case series included in the SR, involving six patients with Alzheimer’s disease and vascular dementia, found that nocturnal activity, as assessed by the by actigraphy, significantly decreased after 14 days of treatment with 2.5 mg oral dronabinol at night (median activity counts 34.26 at baseline versus 10.79 after 14 days, </span><i data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">P</span></i><span data-dcnode-id="1003" instrument_node=""> &lt; 0.05). It was unclear whether this symptom referred to nocturnal behavior disorders or aberrant motor behavior.</span></div></li></ul><span data-dcnode-id="999" instrument_node="">
</span><i data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Mini-Mental State Exam</span></i><span data-dcnode-id="996" instrument_node="">
</span><ul data-dcnode-id="989"><li class="half_rhythm" data-dcnode-id="990"><div data-dcnode-id="991"><span data-dcnode-id="995" instrument_node="">One open-label prospective cohort study included in the SR found that among 11 patients with Alzheimer’s disease, there were statistically significant improvements in MMSE from baseline following 28 days treatment with medical cannabis oil containing THC given orally at an initial dose of 2.5 mg twice daily and titrated up to 7.5 mg twice daily (10.0 versus 11.0, </span><i data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">P</span></i><span data-dcnode-id="992" instrument_node=""> &lt; 0.05)</span></div></li></ul><span data-dcnode-id="988" instrument_node="">
</span><i data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Safety</span></i><span data-dcnode-id="985" instrument_node="">
</span><ul data-dcnode-id="975"><li class="half_rhythm" data-dcnode-id="982"><div data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">Adverse events were reported in 10 included studies of the SR, whereas one case series and one case study did not report AEs. Studies reported mostly mild adverse effects such as sedation, somnolence, and fatigue. The exact number of patients involved was not clear.</span></div></li><li class="half_rhythm" data-dcnode-id="979"><div data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">Overall, the most common AE reported was sedation, reported in 10 (24.4%) out of a total of 41 patients from two studies.</span></div></li><li class="half_rhythm" data-dcnode-id="976"><div data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Serious AEs were reported in three trials. One RCT reported one seizure (7%) and two serious infections (13.4%). Serious AEs in the form of gastroenteritis, worsening of NPS, exacerbation of vestibular disorder and malignancy were reported by another RCT, whereas one cohort reported three serious AEs (dysphagia, fall, and confusion). No values were specified in either study.</span></div></li></ul><p data-dcnode-id="974"></p></td><td colspan="1" data-dcnode-id="967" headers="hd_h_rc1152.app4.tab1_1_1_1_2 hd_b_rc1152.app4.tab1_1_1_1_1" rowspan="1" style="text-align:left;vertical-align:top;"><span data-dcnode-id="972" instrument_node="">“While the efficacy of cannabinoids was not proven in a robust RCT, observational studies showed promising responses, especially for refractory patients. Also, the safety profile appears favourable, as most ADEs reported were mild. However, formulations and doses of the cannabinoids used in the identified studies may have limited the ability to demonstrate cannabinoid efficacy and safety for this indication. A large, well-controlled trial is warranted, given the current limited treatment options available for NPS in dementia patients.”</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref3" data-dcnode-id="969" href="#" role="button"><sup data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">3</span></sup></a><span data-dcnode-id="968" instrument_node=""> P. 21</span></td></tr></tbody></table></div><div data-dcnode-id="955"><div data-dcnode-id="956"><dl class="temp-labeled-list small" data-dcnode-id="957"><dt data-dcnode-id="962"></dt><dd data-dcnode-id="958"><div data-dcnode-id="959"><p class="no_margin" data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">AEs = adverse drug events; CMAI = Cohen–Mansfield Agitation Inventory; MMSE = Mini-Mental State Examination; NPI = Neuropsychiatric Inventory Index; NPS = neuropsychiatric symptoms; PAS = Pittsburg Agitation Scale; RCT = randomized controlled trial; SR = systematic review; THC = delta-9 tetrahydrocannabinol.</span></p></div></dd></dl></div></div></div><div class="table" data-dcnode-id="868" id="rc1152.app4.tab2"><h3 data-dcnode-id="949"><span class="label" data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Table 7</span></span><span class="title" data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Summary of Findings of Included Primary Clinical Studies</span></span></h3><p class="large-table-link" data-dcnode-id="945" style="display:none"><span class="right" data-dcnode-id="946"><a data-dcnode-id="947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK546328/table/rc1152.app4.tab2/%3Freport%3Dobjectonly" target="object"><span data-dcnode-id="948" instrument_node="">View in own window</span></a></span></p><div class="large_tbl" data-dcnode-id="877" id="__rc1152.app4.tab2_lrgtbl__" style="width: auto; height: auto; overflow: visible;"><table class="no_bottom_margin" data-dcnode-id="878"><thead data-dcnode-id="939"><tr data-dcnode-id="940"><th colspan="1" data-dcnode-id="943" id="hd_h_rc1152.app4.tab2_1_1_1_1" rowspan="1" style="text-align:center;vertical-align:middle;"><span data-dcnode-id="944" instrument_node="">Main Study Findings</span></th><th colspan="1" data-dcnode-id="941" id="hd_h_rc1152.app4.tab2_1_1_1_2" rowspan="1" style="text-align:center;vertical-align:middle;"><span data-dcnode-id="942" instrument_node="">Authors’ Conclusion</span></th></tr></thead><tbody data-dcnode-id="879"><tr data-dcnode-id="933"><th colspan="2" data-dcnode-id="934" headers="hd_h_rc1152.app4.tab2_1_1_1_1 hd_h_rc1152.app4.tab2_1_1_1_2" id="hd_b_rc1152.app4.tab2_1_1_1_1" rowspan="1" style="text-align:center;vertical-align:middle;"><span data-dcnode-id="938" instrument_node="">Broers et al., 2019</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref10" data-dcnode-id="935" href="#" role="button"><sup data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">10</span></sup></a></th></tr><tr data-dcnode-id="880"><td colspan="1" data-dcnode-id="887" headers="hd_h_rc1152.app4.tab2_1_1_1_1 hd_b_rc1152.app4.tab2_1_1_1_1" rowspan="1" style="text-align:left;vertical-align:top;"><span data-dcnode-id="932" instrument_node="">
</span><ul data-dcnode-id="896"><li class="half_rhythm" data-dcnode-id="929"><div data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">The average NPI, CMAI, and UPDRS (rigidity) scores decreased from 71.1 to 38.3, 74.5 to 47.5, and 3.4 to 1.7, respectively, after two months follow-up.</span></div></li><li class="half_rhythm" data-dcnode-id="900"><div data-dcnode-id="901"><span data-dcnode-id="928" instrument_node="">The VAS score for the most invalidating behavior problem (screaming, aggressive behavior, tearing clothes) decreased from 9 to 5, after two months follow-up.
</span><dl class="temp-labeled-list" data-dcnode-id="902"><dt data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">-</span></dt><dd data-dcnode-id="923"><p class="no_top_margin" data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Persistent screaming in two women (20%) stopped almost entirely</span></p></dd><dt data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">-</span></dt><dd data-dcnode-id="918"><p class="no_top_margin" data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Frequent vomiting stopped in one patient (10%)</span></p></dd><dt data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">-</span></dt><dd data-dcnode-id="913"><p class="no_top_margin" data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Two patients (20%) stopped all morphine within three months, and one patient (10%) decreased by two-thirds in two months. Constipation also stopped in these three patients (30%).</span></p></dd><dt data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">-</span></dt><dd data-dcnode-id="908"><p class="no_top_margin" data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">One patient (10%) decreased benzodiazepine use by three-fourths after months, and</span></p></dd><dt data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">-</span></dt><dd data-dcnode-id="903"><p class="no_top_margin" data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">One patient (10%) stopped two antipsychotic medications after one month.</span></p></dd></dl></div></li><li class="half_rhythm" data-dcnode-id="897"><div data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Systolic blood pressure decreased from an average of 135.4 to 120 mm Hg across patients, after two months follow-up, although other vital parameters (diastolic blood pressure, heart rate, weight) remained stable over time.</span></div></li></ul><span data-dcnode-id="895" instrument_node="">
Adverse events
</span><ul data-dcnode-id="888"><li class="half_rhythm" data-dcnode-id="892"><div data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">One patient died after one month for reasons unrelated to the cannabinoid medication.</span></div></li><li class="half_rhythm" data-dcnode-id="889"><div data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">No patient stopped the cannabinoids for reasons of side effects.</span></div></li></ul></td><td colspan="1" data-dcnode-id="881" headers="hd_h_rc1152.app4.tab2_1_1_1_2 hd_b_rc1152.app4.tab2_1_1_1_1" rowspan="1" style="text-align:left;vertical-align:top;"><span data-dcnode-id="886" instrument_node="">“Our study suggests that a THC/CBD oral medication in severely demented patients with behavior problems is acceptable, well tolerated, and improves rigidity and behavior overall. It allowed the decrease or stop of other psychotropic medications in half of the patients.”</span><a aria-expanded="false" aria-haspopup="true" class="bk_pop" data-bk-pop-href="#rc1152.ref10" data-dcnode-id="883" href="#" role="button"><sup data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">10</span></sup></a><span data-dcnode-id="882" instrument_node=""> P. 3</span></td></tr></tbody></table></div><div data-dcnode-id="869"><div data-dcnode-id="870"><dl class="temp-labeled-list small" data-dcnode-id="871"><dt data-dcnode-id="876"></dt><dd data-dcnode-id="872"><div data-dcnode-id="873"><p class="no_margin" data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">CMAI = Cohen–Mansfield Agitation Inventory; MMSE = Mini-Mental State Examination; NPI = Neuropsychiatric Inventory Index; THC/CBD = delta-9 tetrahydrocannabinol/cannabidiol; UPDRS =Unified Parkinson Disease Rating Scale; VAS = visual analog scale.</span></p></div></dd></dl></div></div></div></div><div data-dcnode-id="794" id="rc1152.app5"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="864"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="865" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="866" instrument_node="">Go to:</span></a></div><h2 class="ui-helper-clearfix" data-dcnode-id="862" id="_rc1152_app5_"><span data-dcnode-id="863" instrument_node="">Appendix 5. Additional References of Potential Interest</span></h2><div data-dcnode-id="795" id="rc1152.app5.rl.r1"><h3 data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Systematic reviews with relevant primary studies fully captured in the included systematic review</span></h3><ul class="simple-list" data-dcnode-id="796"><li class="half_rhythm" data-dcnode-id="847"><div class="bk_ref" data-dcnode-id="848" id="rc1152.app5.ref1"><span data-dcnode-id="859" instrument_node="">Hoch
