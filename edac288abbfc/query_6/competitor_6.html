</span></ul></div></nav></div></header><div class="site-inner" data-dcnode-id="188"><div class="content-sidebar-wrap" data-dcnode-id="189"><main class="content" data-dcnode-id="198" id="genesis-content"><div class="breadcrumb" data-dcnode-id="620"><span class="breadcrumb-link-wrap" data-dcnode-id="628"><a class="breadcrumb-link" data-dcnode-id="630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reset.me/"><span class="breadcrumb-link-text-wrap" data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Home</span></span></a><meta data-dcnode-id="629"></span><span data-dcnode-id="627" instrument_node=""> </span><span aria-label="breadcrumb separator" data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">/</span></span><span data-dcnode-id="624" instrument_node=""> Stories </span><span aria-label="breadcrumb separator" data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">/</span></span><span data-dcnode-id="621" instrument_node=""> Man Cures Colon Cancer With Cannabis Oil</span></div><article aria-label="Man Cures Colon Cancer With Cannabis Oil" class="post-13206 reset_story type-reset_story status-publish has-post-thumbnail reset_category-cancer-treatments reset_category-marijuana reset_category-medicines entry" data-dcnode-id="530"><header class="entry-header" data-dcnode-id="606"><h1 class="entry-title" data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">Man Cures Colon Cancer With Cannabis Oil</span></h1><span data-dcnode-id="617" instrument_node="">
</span><p class="entry-meta" data-dcnode-id="607"><time class="entry-time" data-dcnode-id="616"></time><span data-dcnode-id="615" instrument_node=""> by </span><span class="entry-author" data-dcnode-id="612"><span class="entry-author-name" data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Luke Sumpter</span></span></span><span data-dcnode-id="611" instrument_node=""> </span><span class="entry-comments-link" data-dcnode-id="608"><a data-dcnode-id="609" href="#comments"><span data-dcnode-id="610" instrument_node="">6 Comments</span></a></span></p></header><div class="featured-image-class" data-dcnode-id="602"><img alt="" class="aligncenter error" data-dcnode-id="605" data-lazy-sizes="(max-width: 526px) 100vw, 526px" data-lazy-src="https://reset.me/app/uploads/2015/07/David-after-cannabis-oil.jpg" data-lazy-srcset="https://reset.me/app/uploads/2015/07/David-after-cannabis-oil.jpg 526w, https://reset.me/app/uploads/2015/07/David-after-cannabis-oil-300x217.jpg 300w" data-ll-status="error" height="380" sizes="(max-width: 526px) 100vw, 526px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reset.me/app/uploads/2015/07/David-after-cannabis-oil.jpg&amp;raw" srcset="https://reset.me/app/uploads/2015/07/David-after-cannabis-oil.jpg 526w, https://reset.me/app/uploads/2015/07/David-after-cannabis-oil-300x217.jpg 300w" width="526"><noscript data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">&lt;img width="526" height="380" src="https://reset.me/app/uploads/2015/07/David-after-cannabis-oil.jpg" class="aligncenter" alt="" srcset="https://reset.me/app/uploads/2015/07/David-after-cannabis-oil.jpg 526w, https://reset.me/app/uploads/2015/07/David-after-cannabis-oil-300x217.jpg 300w" sizes="(max-width: 526px) 100vw, 526px" /&gt;</span></noscript></div><div class="entry-content" data-dcnode-id="532"><p class="first-child" data-dcnode-id="598"><span class="cap" data-dcnode-id="600" title="T"><span data-dcnode-id="601" instrument_node="">T</span></span><span data-dcnode-id="599" instrument_node="">he cultural narrative of many countries is one that speaks of the cannabis plant as being a legitimate threat to mental and physical health and therefore rendering it a threat to the populace — deserving to be forbidden and restricted behind government classification.</span></p><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">This typically archaic mentality is slowly peeling away, layer by layer, around the world. Governing bodies are starting to accept the science that&nbsp;recognizes&nbsp;the medicinal value of the plant, displaying its effectiveness against an array of disorders from the minor to the major.</span></p><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">In regards to the major: the internet&nbsp;is now abundantly flourishing with evidence — of both the anecdotal and scientific varieties — that suggests and outright proves cannabis, in all its taboo-shattering glory, is effective against tumor cells and certain types of cancer.</span></p><span data-dcnode-id="591" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="584" id="attachment_13208" style="width: 1010px"><a class="broken_link" data-dcnode-id="587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reset.me/app/uploads/2015/07/shutterstock_266451137.jpg"><img alt="Via: Steve Photography | Shutterstock " aria-describedby="caption-attachment-13208" class="size-large wp-image-13208 error" data-dcnode-id="590" data-lazy-src="http://reset.me/app/uploads/cache/2015/07/shutterstock_266451137/3691919652.jpg" data-ll-status="error" height="667" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//reset.me/app/uploads/cache/2015/07/shutterstock_266451137/3691919652.jpg&amp;raw" width="1000"><noscript data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">&lt;img aria-describedby="caption-attachment-13208" class="size-large wp-image-13208" src="http://reset.me/app/uploads/cache/2015/07/shutterstock_266451137/3691919652.jpg" alt="Via: Steve Photography | Shutterstock " width="1000" height="667" /&gt;</span></noscript></a><p class="wp-caption-text" data-dcnode-id="585" id="caption-attachment-13208"><span data-dcnode-id="586" instrument_node="">Via: Steve Photography | Shutterstock</span></p></div><span data-dcnode-id="583" instrument_node="">
</span><p data-dcnode-id="579"><em data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Reset</span></em><span data-dcnode-id="580" instrument_node="">&nbsp;spoke to 33-year old father of one David Hibbitt, from Stoke-on-Trent in the United Kingdom, who claims to have defeated terminal cancer via the&nbsp;administration&nbsp;of a high potency cannabis extract in the form of oil.</span></p><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="573"><span data-dcnode-id="577" instrument_node="">Hibbitt told&nbsp;</span><em data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Reset</span></em><span data-dcnode-id="574" instrument_node="">, &nbsp;“I was diagnosed with stage 3 bowel [colon] cancer along with infected lymph nodes in July 2012. I received chemotherapy and radiation treatment along with the surgical removal of the cancer from my large bowel during February 2013. I was then given the all clear.”</span></p><span data-dcnode-id="572" instrument_node="">
</span><p data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Hibbitt continues, “The cancer returned in my scrotum. This was then removed during June 2013, and was followed up by 12 weeks of chemotherapy. I was given the all clear, once again, at the beginning of November 2013.</span></p><span data-dcnode-id="569" instrument_node="">
</span><p data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">“The cancer then returned to my lymph nodes around my groin during December 2013, however it was not diagnosed until the following February, due to being mistaken for scar tissue. I received the news in February that I was now terminal.”</span></p><span data-dcnode-id="566" instrument_node="">
</span><p data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">Upon receiving the&nbsp;devastating&nbsp;news that he was terminal, with an estimated period of between 18 months and 5 years to live, Hibbitt decided to utilize the healing qualities of cannabis oil as a last resort treatment.</span></p><span data-dcnode-id="563" instrument_node="">
</span><p data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Hibbitt explains: “I had chemotherapy for a further 3 months, then I started to take the cannabis oil. I started avoiding chemotherapy sessions and instead started consuming approximately 1 gram of the oil per week. I then completely halted chemotherapy in August 2014 and was sent for a scan; the results showed a nodule present in one of my lungs. I then decided to up the dosage to 1 gram of oil per day and was soon after sent to receive a PET scan.”</span></p><span data-dcnode-id="560" instrument_node="">
</span><p data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">Hibbitt went on, “The PET scan revealed that the cancer in my lung had&nbsp;disappeared. The doctor then wanted to remove my lymph nodes and administer conventional treatment afterwards. I refused the following treatment and have remained cancer free ever since.”</span></p><span data-dcnode-id="557" instrument_node="">
</span><p data-dcnode-id="552"><a class="broken_link" data-dcnode-id="553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reset.me/app/uploads/2015/07/Before-And-After.jpg"><img alt="Before And After" class="alignnone size-large wp-image-13214 error" data-dcnode-id="556" data-lazy-src="http://reset.me/app/uploads/cache/2015/07/Before-And-After/279731590.jpg" data-ll-status="error" height="400" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//reset.me/app/uploads/cache/2015/07/Before-And-After/279731590.jpg&amp;raw" width="600"><noscript data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">&lt;img class="alignnone size-large wp-image-13214" src="http://reset.me/app/uploads/cache/2015/07/Before-And-After/279731590.jpg" alt="Before And After" width="600" height="400" /&gt;</span></noscript></a></p><span data-dcnode-id="551" instrument_node="">
</span><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">It is quite obvious that cannabis oil played a major role in the fight for Hibbitt’s life. “My doctor was almost speechless,” says Hibbitt. “Upon seeing the effectiveness, he told me to just continue what it was I was doing.”</span></p><span data-dcnode-id="548" instrument_node="">
</span><p data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Despite this particular anecdote — and scores more that parallel Hibbitt’s — cannabis is a class B substance in the United Kingdom, where Hibbitt resides, and possession alone is a punishable offense.</span></p><span data-dcnode-id="545" instrument_node="">
</span><p data-dcnode-id="537"><span data-dcnode-id="544" instrument_node="">The scientific cup is overflowing with evidence showing why cases such as Hibbitt’s are not only possible, but widespread. The National Cancer Institute notes that </span><a data-dcnode-id="542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cancer.gov/about-cancer/treatment/cam/hp/cannabis-pdq" target="_blank"><span data-dcnode-id="543" instrument_node="">cannabinoids</span></a><span data-dcnode-id="541" instrument_node="">, compounds found within the cannabis plant, trigger certain receptors found within the body that produce pharmacologic effects, particularly in the central nervous system and the immune system. It has also been discovered&nbsp;that certain cannabinoids make </span><a data-dcnode-id="539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reset.me/study/study-heres-how-cannabis-helps-your-body-fight-off-cancer/" target="_blank"><span data-dcnode-id="540" instrument_node="">cancerous cells</span></a><span data-dcnode-id="538" instrument_node=""> more susceptible to the immune-defending&nbsp;abilities&nbsp;of white blood cells.</span></p><span data-dcnode-id="536" instrument_node="">
</span><p data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Hibbitt added, “The only reason I can think that it is not legally available to people medically is because they cannot compete with the street price and would not be able to make a profit. Nothing else makes sense, as it has proven to help so many people.”</span></p><span data-dcnode-id="533" instrument_node="">
</span></div><footer class="entry-footer" data-dcnode-id="531"></footer></article><h3 class="related_posts" data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">Related Posts</span></h3><div class="related-post archive" data-dcnode-id="494"><article class="related-post entry" data-dcnode-id="513"><header class="entry-header" data-dcnode-id="514"><a aria-hidden="true" class="entry-image-link" data-dcnode-id="518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reset.me/story/mexico-moves-to-abolish-laws-prohibiting-personal-use-of-marijuana/" tabindex="-1"><picture class="attachment-postlist size-postlist" data-dcnode-id="522"><span data-dcnode-id="527" instrument_node="">
