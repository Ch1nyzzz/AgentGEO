						" rel="nofollow noreferrer noopener"><span class="iconFiller" data-dcnode-id="428"><span class="spaceManWilly" data-dcnode-id="429"><i class="sw swp_pinterest_icon" data-dcnode-id="432"></i><span class="swp_share" data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Pin</span></span></span></span><span class="swp_count" data-dcnode-id="426" style="transition: padding 0.1s linear 0s;"><span data-dcnode-id="427" instrument_node="">29</span></span></a></div><div class="nc_tweetContainer swp_share_button total_shares total_sharesalt" data-dcnode-id="419"><span class="swp_count" data-dcnode-id="420" style="transition: padding 0.1s linear 0s;"><span data-dcnode-id="423" instrument_node="">2K </span><span class="swp_label" data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">Shares</span></span></span></div></div><p data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">There has been a lot of talk about cancer of late. With October being breast cancer awareness month, November being prostate cancer awareness month, and the Truth About Cancer recently releasing its epic docu-series on the cancer industry and the brave individuals promoting natural cures, we are up to our armpits in cancer related information.</span></p><span data-dcnode-id="415" instrument_node="">
</span><p data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">Combing through this information can be a daunting task. There is plenty to think about and incorporate when dealing with a cancer diagnosis, or more proactively, trying to avoid it. To make it a bit easier, a primary suggestion would be transitioning as quickly a possible to a clean, fully holistic lifestyle, and layering in treatments or nutrients that have been positively proven to combat cancer.</span></p><span data-dcnode-id="412" instrument_node="">
</span><p data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">Here are 4 nutrients you can consider to help defeat cancer, naturally.</span></p><span data-dcnode-id="409" instrument_node="">
</span><h2 data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">Vitamin C</span></h2><span data-dcnode-id="406" instrument_node="">
</span><p data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">It should be no surprise that vitamin C, a powerful immune booster, could have a significant effect against an immune compromised disease like cancer. However, researchers have been pleasantly surprised by the effects of vitamin C given in high doses intravenously.</span></p><span data-dcnode-id="403" instrument_node="">
</span><p data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">New research published in the peer-reviewed journal Science Translational Medicine, conducted by a team or researchers at the University of Kansas, found that these high doses of vitamin C injected intravenously eradicated cancer cells while leaving healthy cells intact.</span></p><span data-dcnode-id="400" instrument_node="">
</span><p data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">Based on earlier research pioneered by Linus Pauling, a chemist from Oregon State University conducted the tests in vitro in a lab, as well as directly in both mice and a group of 22 human subjects. According to BBC News the tests proved favourable in all 3 situations as the vitamin C targeted the ovarian cancer cells while avoiding healthy cells.</span></p><span data-dcnode-id="397" instrument_node="">
</span><p data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">If you are unable to get high dose vitamin C injections (or simply don’t want to), then consider his end supplement forms that are easy on the stomach.</span></p><span data-dcnode-id="394" instrument_node="">
</span><p data-dcnode-id="390"><a data-dcnode-id="392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthrangerstore.com/products/health-rangers-nutrition-rescue-non-gmo-buffered-vitamin-c-powder-125-grams%3Fvariant%3D20205932673%3Futm_source%3DHR_Affiliate%26utm_campaign%3D18318%26utm_affiliate%3D301255%26rfsn%3D301255.1ae0a57" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="393" instrument_node="">Get the Health Ranger’s Nutrition Rescue Non-GMO Buffered Vitamin C Powder</span></a><span data-dcnode-id="391" instrument_node="">.</span></p><span data-dcnode-id="389" instrument_node="">
</span><h2 data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">Laetrile (B17)</span></h2><span data-dcnode-id="386" instrument_node="">
</span><p data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">Laetrile (or B17) was banned by the FDA in 1971 despite its proven efficacy. However, the source of laetrile or B17, is legally available and this natural source is amygdalin (found predominantly in apricot kernels).</span></p><span data-dcnode-id="383" instrument_node="">
</span><p data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Amygdalin contains four substances, two being glucose, the third benzaldehyde, and the fourth is cyanide. Cyanide and benzaldehyde are poisons if they appear as molecules that are not bound to other molecular formations. Vitamin B-12 also contains cyanide, but remains safe as it remains bound and locked by part of another molecule. An enzyme in normal cells called rhodanese can render them harmless by combining them with sulfur.</span></p><span data-dcnode-id="380" instrument_node="">
</span><p data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">Cancer cells thrive on sugar, which makes the glucose molecules of amygdalin irresistible. However, an enzyme called beta-glucosidase (found only in cancer cells,not healthy cells) unlocks the amygdalin molecules and releases the benzaldehyde and cyanide (the poison) creating a toxic onslaught that destroys cancer cells. The cancer cell’s beta-glucosidase enzymes causes cancer cells to self destruct by opening themselves up to the poison of cynaide and benzaldehyde.</span></p><span data-dcnode-id="377" instrument_node="">
</span><p data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">Of course, one needs to be on a clean, organic diet that is devoid of sugar for this therapy to really work. One also has to avoid excessive consumption of apricot kernels (eating 6-10 seeds throughout the day is a common amount), as side effects like dizziness, headache, or upset stomach can kick in.</span></p><span data-dcnode-id="374" instrument_node="">
</span><h2 data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">Cannabis</span></h2><span data-dcnode-id="371" instrument_node="">
</span><p data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">Cannabis has made a splash onto the natural cancer remedy scene recently, even though medical scientists have been well aware of the beneficial affects of cannabinoid compounds since the mid 70s.</span></p><span data-dcnode-id="368" instrument_node="">
</span><p data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">Laboratory tests conducted in 2008 and published in the Journal of Clinical Investigation showed the active ingredient in marijuana, known as THC, can function as a cure for brain cancer, and multiple types of other cancers. Other studies have shown that cannabinoids may work by various mechanisms, including inhibiting cell growth, inducing cell death, and mitigating tutor metastasis. One of the cannabinoids that have shown great promise is cannabidiol, or CBD, with research indicating it can inhibit cancer development.</span></p><span data-dcnode-id="365" instrument_node="">
</span><p data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">Unlike conventional cancer treatments like chemotherapy, cannabinoids effectively target and kill cancerous cells while not negatively affecting healthy, normal cells. This is paramount in being able to properly fight and recover fully from cancer.</span></p><span data-dcnode-id="362" instrument_node="">
</span><p data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">Unfortunately, cannabis is not readily available to most citizens legally, which mitigates this natural cancer remedy’s availability. As of this writing, it is available legally in Colorado, Alaska, Oregon, and Washington.</span></p><span data-dcnode-id="359" instrument_node="">
</span><h2 data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">Chaga mushroom</span></h2><span data-dcnode-id="356" instrument_node="">
</span><p data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">Chaga mushroom is a fungus that grows on birch and other hardwood trees. The type that is found on birch is believed to be the most potent because of its high concentration of betulinic acid, which is toxic to cancer cells.</span></p><span data-dcnode-id="353" instrument_node="">
</span><p data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">Research has shown chaga to be extremely effective in protecting cellular DNA from damaging free radicals and also has anti-tumor and immune stimulating benefits. Researchers at Kyunghee University in Seoul, South Korea examined chaga’s effectiveness in protecting cellular DNA. These cells were treated with chaga mushroom extract then exposed to oxidative stress, and it was found that the extract treated cells had 40% less DNA mutation than untreated cells.</span></p><span data-dcnode-id="350" instrument_node="">
</span><p data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">In another study, Japanese researchers found that chaga had higher levels of antioxidants than other medicinal mushrooms, and has been shown to be effective against cancers of the liver, uterus, breast, colon, skin, cervix, and lung. It also attacks tumors without disturbing healthy tissue.</span></p><span data-dcnode-id="347" instrument_node="">
</span><p data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">The sterols, flavonoids, polysaccharides, and polyphenols are some key constituents that give this medicinal mushroom its anti-cancer properties.</span></p><span data-dcnode-id="344" instrument_node="">
</span><a class="btn-shortcode dt-btn-m dt-btn default-btn-color default-btn-hover-color default-btn-bg-color default-btn-bg-hover-color fadeIn animate-element animation-builder animation-triggered start-animation" data-dcnode-id="340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.surthrival.com/index.php/supplements.html%3Fcat%3D17http%3A//www.surthrival.com/index.php/supplements.html%3Fcat%3D17%26acc%3D99c5e07b4d5de9d18c350cdf64c5aa3d%26bannerid%3D138" id="dt-btn-1"><i class="fa fa-chevron-circle-right" data-dcnode-id="343"></i><span data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">Get Surthrival’s Chaga Mushroom</span></span></a><span data-dcnode-id="339" instrument_node="">
</span><p data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">Of course, there are other foods and nutrients that are gaining acclaim for their cancer healing properties. In addition to considering these natural cancer remedies, consider a completely holistic lifestyle and incorporating these 8 foods and herbs that have shown to help heal cancer.</span></p><span data-dcnode-id="336" instrument_node="">
