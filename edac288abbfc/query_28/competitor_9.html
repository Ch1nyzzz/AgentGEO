</span><h1 class="entry-title" data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Full Extract Cannabis Oil (FECO) and Cancer</span></h1><span data-dcnode-id="1084" instrument_node="">
</span><p class="p-meta" data-dcnode-id="1066"><span data-dcnode-id="1073"><span data-dcnode-id="1083" instrument_node="">In </span><a data-dcnode-id="1081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sativaisticated.com/category/medical-cannabis/" title="View all posts in: “Medical Cannabis”"><span data-dcnode-id="1082" instrument_node=""> Medical Cannabis</span></a><span data-dcnode-id="1080" instrument_node="">, </span><a data-dcnode-id="1078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sativaisticated.com/category/medical-marijuana/" title="View all posts in: “Medical Marijuana”"><span data-dcnode-id="1079" instrument_node=""> Medical Marijuana</span></a><span data-dcnode-id="1077" instrument_node="">, </span><a data-dcnode-id="1075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sativaisticated.com/category/marijuana-culture/uncategorized/" title="View all posts in: “Uncategorized”"><span data-dcnode-id="1076" instrument_node=""> Uncategorized</span></a><span data-dcnode-id="1074" instrument_node=""> by Eric</span></span><span data-dcnode-id="1070"><time class="entry-date" data-dcnode-id="1071" datetime="2020-01-03T17:45:08-07:00"><span data-dcnode-id="1072" instrument_node="">January 3, 2020</span></time></span><span data-dcnode-id="1067"><a class="meta-comments" data-dcnode-id="1068" href="#comments" title="Leave a comment on: “Full Extract Cannabis Oil (FECO) and Cancer”"><span data-dcnode-id="1069" instrument_node="">6 Comments</span></a></span></p></header><span data-dcnode-id="1064" instrument_node="">
</span><div class="entry-content content" data-dcnode-id="507"><span data-dcnode-id="1063" instrument_node="">
</span><div class="cs-content" data-dcnode-id="509" id="cs-content"><div class="x-section e14801-1 mbf5-0 mbf5-1" data-dcnode-id="1028"><div aria-hidden="true" class="x-bg" data-dcnode-id="1061"><div class="x-bg-layer-lower-image" data-dcnode-id="1062" style=" background-image: url(https://sativaisticated.com/wp-content/uploads/2017/04/Background_1200x300_Green_Leaf_by_SATIVAisticated-1.jpg); background-repeat: no-repeat; background-position: center; background-size: cover;"></div></div><div class="x-container max width e14801-2 mbf5-4" data-dcnode-id="1029"><div class="x-column x-sm x-1-1 e14801-3 mbf5-5" data-dcnode-id="1030"><div class="x-text e14801-4 mbf5-6 mbf5-7" data-dcnode-id="1031"><p data-dcnode-id="1032"><span data-dcnode-id="1040" style="color: #ffffff;"><strong data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">Cancer is the name given to a collection of related diseases. In all types of cancer, some of the body’s cells begin to divide without stopping and spread into surrounding tissues.</span></strong><span data-dcnode-id="1058" instrument_node=""> </span><em data-dcnode-id="1052"><span data-dcnode-id="1057" instrument_node="">(1) </span><br data-dcnode-id="1056"><span data-dcnode-id="1055" instrument_node="">
</span><br data-dcnode-id="1054"><span data-dcnode-id="1053" instrument_node="">
</span></em><span data-dcnode-id="1051" instrument_node="">There are more than 100 types of cancer, usually named for the organs or tissues where the cancers form. For example, lung cancer starts in cells of the lung, and brain cancer starts in cells of the brain. Cancers also may be described by the type of cell that formed them, such as an epithelial cell or a squamous cell. </span><em data-dcnode-id="1045"><span data-dcnode-id="1050" instrument_node="">(1)</span><br data-dcnode-id="1049"><span data-dcnode-id="1048" instrument_node="">
</span><br data-dcnode-id="1047"><span data-dcnode-id="1046" instrument_node="">
</span></em><span data-dcnode-id="1044" instrument_node="">Cannabis has been used by Cancer patients as a chemotherapy with reports of Full Extract Cannabis Oil acting as a cure for some. Is Cannabis a potential end for Cancer? Below, we review a recent study from Israel, "The Heterogeneity and Complexity of </span><em data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Cannabis</span></em><span data-dcnode-id="1041" instrument_node=""> Extracts as Antitumor Agents".</span></span><br data-dcnode-id="1039"><span data-dcnode-id="1038" instrument_node="">
</span><br data-dcnode-id="1037"><span data-dcnode-id="1036" instrument_node="">
</span><span data-dcnode-id="1033" style="color: #ffffff;"><strong data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Learn more about Full Extract Cannabis Oil and cancer below.</span></strong></span></p></div></div></div></div><div class="x-section e14801-5 mbf5-0 mbf5-2" data-dcnode-id="615"><div class="x-container max width e14801-6 mbf5-4" data-dcnode-id="616"><div class="x-column x-sm x-1-1 e14801-7 mbf5-5" data-dcnode-id="617"><div class="x-text e14801-8 mbf5-7 mbf5-8" data-dcnode-id="618"><p data-dcnode-id="1008"><span data-dcnode-id="1027" instrument_node="">The “C” word instills dread in all, as it did with my Father's cancer diagnosis. Continually listed as the second leading cause of death for Americans, Cancer is a proven killer that does not discriminate. Even with today’s modern medicine, the fight against Cancer with early diagnosis and aggressive treatment can still lead to an early demise.</span><br data-dcnode-id="1026"><span data-dcnode-id="1025" instrument_node="">
</span><br data-dcnode-id="1024"><span data-dcnode-id="1023" instrument_node="">
Cancer is a genetic disease, caused by changes to genes that control the way our cells function, especially how they grow and divide. Genetic changes that cause cancer can be inherited. They can also arise during a person’s lifetime as a result of errors that occur as cells divide or because of damage to DNA caused by certain environmental exposures. Cancer-causing environmental exposures include substances, such as the chemicals in tobacco smoke, and radiation, such as ultraviolet rays from the sun. </span><em data-dcnode-id="1017"><span data-dcnode-id="1022" instrument_node="">(1)</span><br data-dcnode-id="1021"><span data-dcnode-id="1020" instrument_node="">
</span><br data-dcnode-id="1019"><span data-dcnode-id="1018" instrument_node="">
</span></em><span data-dcnode-id="1016" instrument_node="">We are not aware of any cancer in his family history. He lived a clean life of no smoking, very little drinking and stayed in shape playing tennis. However, for twenty years he worked in the front office of an iron works company with more-than-you-can-count cancer causing chemicals floating around. He was diagnosed with Stage 4 Renal Cell Carcinoma more than a decade after retirement from the company. Did his exposure to those chemicals cause his cancer?</span><br data-dcnode-id="1015"><span data-dcnode-id="1014" instrument_node="">
</span><br data-dcnode-id="1013"><span data-dcnode-id="1012" instrument_node="">
Each person’s cancer has a unique combination of genetic changes. As the cancer continues to grow, additional changes will occur. Even within the same tumor, different cells may have different genetic changes. In general, cancer cells have more genetic changes, such as mutations in DNA, than normal cells. Some of these changes may have nothing to do with the cancer; they may be the result of the cancer, rather than its cause. </span><em data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">(1)</span></em><span data-dcnode-id="1009" instrument_node=""> These unique combinations of genetic mutations in tumors and cancers can determine what chemotherapies work and which ones don’t.</span></p><span data-dcnode-id="1007" instrument_node="">
</span><h6 data-dcnode-id="1004"><strong data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">The Diagnosis</span></strong></h6><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="992"><a data-dcnode-id="1001" rel="attachment wp-att-5634" title="Rick Simpson Oil RSO Medical Cannabis Marijuana Fight Illness with Cannabis by SATIVAisticated"><img alt="Rick Simpson Oil_RSO Medical Cannabis Marijuana Fight Illness With Cannabis by SATIVAisticated" class="alignright wp-image-5634" data-dcnode-id="1002" height="303" loading="lazy" sizes="(max-width: 400px) 100vw, 400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sativaisticated.com/wp-content/uploads/2016/08/Rick_Simpson_Oil_RSO_Medical_Cannabis_Marijuana_Fight_Illness_With_Cannabis_by-SATIVAisticated.jpg&amp;raw" srcset="https://sativaisticated.com/wp-content/uploads/2016/08/Rick_Simpson_Oil_RSO_Medical_Cannabis_Marijuana_Fight_Illness_With_Cannabis_by-SATIVAisticated.jpg 960w, https://sativaisticated.com/wp-content/uploads/2016/08/Rick_Simpson_Oil_RSO_Medical_Cannabis_Marijuana_Fight_Illness_With_Cannabis_by-SATIVAisticated-300x228.jpg 300w, https://sativaisticated.com/wp-content/uploads/2016/08/Rick_Simpson_Oil_RSO_Medical_Cannabis_Marijuana_Fight_Illness_With_Cannabis_by-SATIVAisticated-768x582.jpg 768w, https://sativaisticated.com/wp-content/uploads/2016/08/Rick_Simpson_Oil_RSO_Medical_Cannabis_Marijuana_Fight_Illness_With_Cannabis_by-SATIVAisticated-100x76.jpg 100w" width="400"></a><span data-dcnode-id="1000" instrument_node="">I always worried about my dad having a heart attack due to stress but once he reached his seventies, really thought he could live to be an very old man. His diagnosis at age 75 caught the family off-guard and unprepared. Unfortunately, his case was our learning experience. He was given two traditional chemotherapy options; each with low efficacy rates failed. He also tried a several varieties of Full Cannabis Extract Oils (FECO), also known as Rick Simpson Oil (RSO) which provided great palliative care. But we couldn’t defeat the cancer and lost after 17 months.</span><br data-dcnode-id="999"><span data-dcnode-id="998" instrument_node="">
</span><br data-dcnode-id="997"><span data-dcnode-id="996" instrument_node="">
Why did my Father die of cancer after treatment with Cannabis oil? Each individual is unique including their Endocannabinoid System (ECS), a principal endogenous signaling system that appeared early in evolution and has important regulatory functions throughout the body. </span><em data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">(2, 3, 4, 5)</span></em><span data-dcnode-id="993" instrument_node=""> Each cancer is unique with its mutation combinations. Each Cannabis flower is unique with its Cannabinoid, terpene, and flavonoid ratios. And to note, investigators do not know how terpenes and flavonoids affect the interaction of the Cannabinoid molecules with the ECS.</span></p><span data-dcnode-id="991" instrument_node="">
</span><h4 data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">The Heterogeneity and Complexity of Cannabis Extracts as Anti-Tumor Agents</span></h4><span data-dcnode-id="988" instrument_node="">
</span><p data-dcnode-id="929"><span data-dcnode-id="987" instrument_node="">The mainstream conversation of Cannabis revolves around the two major Cannabinoids, Delta-9-tetrahydrocannabinol (THC) and Cannabidiol (CBD), however; the Cannabis plant contains over 500 different compounds including over 120 identified as phytocannabinoids. </span><em data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">(2)</span></em><span data-dcnode-id="984" instrument_node=""> Included in these compounds are terpenes and flavonoids, the molecules that define the aroma and taste of the flower. Why mention them? Because they are important, yet investigators do not know their exact role in the interaction with Cannabinoids and ECS. How important are they? Researchers have identified and classified a common terpene, </span><a data-dcnode-id="981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sativaisticated.com/medical-cannabis/research/cannabis-research-for-beta-caryophyllene-dietary-cannabinoid/" rel="noopener" target="_blank" title="Medical Cannabinoid Medical Marijuana Research Study Library for Beta-Caryophyllene (Dietary Cannabinoid)"><strong data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">Beta-Caryophyllene</span></strong></a><span data-dcnode-id="980" instrument_node="">, found in Cannabis, black pepper, and basil as a dietary Cannabinoid. </span><em data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">(6)</span></em><span data-dcnode-id="977" instrument_node=""> And recently, investigators announced that a Cannabis derived flavonoid demonstrated therapeutic potential in preclinical models of metastatic pancreatic cancer. </span><em data-dcnode-id="971"><span data-dcnode-id="976" instrument_node="">(7)</span><br data-dcnode-id="975"><span data-dcnode-id="974" instrument_node="">
</span><br data-dcnode-id="973"><span data-dcnode-id="972" instrument_node="">
</span></em><span data-dcnode-id="970" instrument_node="">A study recently published in Oncotarget demonstrates the diverse characteristics and complexity of the Cannabis plant and its extracts in fighting various cancer cell lines. Cancer cell lines are Cancer cells that keep dividing and growing over time, under certain conditions in a laboratory. Cancer cell lines are used in research to study the biology of cancer and to test cancer treatments. </span><em data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">(8</span></em><em data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">) </span></em><span data-dcnode-id="965" instrument_node="">Investigators in Israel examined 124 different Cannabis extracts, choosing a select 12 to monitor on 12 Cancer cell lines. Some of the cancers represented in the study were colon carcinoma (HT-29), breast carcinoma (MCF-7) and prostate carcinoma (LNCaP).</span><br data-dcnode-id="964"><span data-dcnode-id="963" instrument_node="">
</span><br data-dcnode-id="962"><span data-dcnode-id="961" instrument_node="">
The complexity of Cannabis extracts was evident in the researchers recently developed liquid chromatography mass spectrometry. From the 124 natural and decarboxylated Cannabis extracts, 89 Phytocannabinoids were identified with 54 Cannabinoids appearing on a heat map which demonstrated the significant differences in the extracts. The heat map identified 5 major clusters characterized by patterns of Phytocannabinoid compositions. As previous research indicates, it is apparent that minor constituents can also significantly contribute to the variance among Cannabis extracts. </span><em data-dcnode-id="957"><span data-dcnode-id="960" instrument_node="">(2, 9)</span><br data-dcnode-id="959"><span data-dcnode-id="958" instrument_node="">
</span></em><strong data-dcnode-id="954"><br data-dcnode-id="956"><span data-dcnode-id="955" instrument_node="">
The five clusters of Cannabinoids are:</span></strong><br data-dcnode-id="953"><span data-dcnode-id="952" instrument_node="">
</span><strong data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Cluster 1: </span></strong><span data-dcnode-id="949" instrument_node="">CAN 10, highest concentration of Cannabigerol (CBG)&nbsp;</span><strong data-dcnode-id="946"><br data-dcnode-id="948"><span data-dcnode-id="947" instrument_node="">
Cluster 2: </span></strong><span data-dcnode-id="945" instrument_node="">CAN2, CAN3 and CAN9, more Cannabidiol (CBD) and Cannabichromene (CBC) type and degradation products&nbsp;</span><br data-dcnode-id="944"><span data-dcnode-id="943" instrument_node="">
</span><strong data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Cluster 3: </span></strong><span data-dcnode-id="940" instrument_node="">CAN1 and CAN8, large concentrations of Cannabidiolic Acid (CBDA) and degradation products including Cannabielsoic Acid (CBEA)&nbsp;</span><br data-dcnode-id="939"><span data-dcnode-id="938" instrument_node="">
</span><strong data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Cluster 4: </span></strong><span data-dcnode-id="935" instrument_node="">CAN5, CAN7 and CAN12, higher concentrations (&gt;35%) of Delta-9-Tetrahydrocannabinol (THC)</span><br data-dcnode-id="934"><span data-dcnode-id="933" instrument_node="">
</span><strong data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Cluster 5: </span></strong><span data-dcnode-id="930" instrument_node="">CAN4, CAN 6 and CAN11, relatively higher concentrations of (-)-Delta-9-Tetrahydrocannabinolic Acid (THCA) and degradation products Cannabinolic Acid (CBNA) and (+/-)-Trans-Cis-Cannabitriolic Acid (CBTA)</span></p><span data-dcnode-id="928" instrument_node="">
</span><h5 data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Cannabis' Potential Tumor Properties</span></h5><span data-dcnode-id="925" instrument_node="">
Investigators believe the Endocannabinoid System is involved in the control of cell proliferation and survival. The expression of endocannabinoids in vertebrate and invertebrate organisms and their ability to modulate the activity of proteins responsible for cell proliferation, differentiation and apoptosis. However, there is conflicting research in regards to the activation of Cannabinoid receptors and tumor development. Further, it seems that Cannabis can provide biphasic effects which appears to be dose dependent, as low doses of Cannabinoids promoted cell proliferation, while higher doses induced anti-proliferative actions. </span><i data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">(17</span></i><span data-dcnode-id="922" instrument_node="">) In a traditional RSO regiment by the end of 90 days, the patient will be ingesting 1 gram of RSO oil a day. One gram is roughly 55 to 60% THC, equating to 500 to 600 milligrams of THC. This is considered a high dose. 
</span><br data-dcnode-id="921"><span data-dcnode-id="920" instrument_node="">
</span><br data-dcnode-id="919"><span data-dcnode-id="918" instrument_node="">The primary anti-tumor effects of Cannabinoids rely on cell cycle arrest through the inhibition of the expression of growth factors and induction of apoptosis (cell death). It is also thought it can also avoid angiogenesis (growth of new blood vessels) and block invasion and metastasis by impairing the activation of the vascular endothelial growth factor (VEGF) pathway. The actions of Cannabinoids have been identified in different tumors, including gliomas, melanomas, lymphomas, breast cancer, skin cancer, lung carcinoma, liver cancer, pancreatic cancer, colon cancer and prostate cancer, indicating that the anti-tumor actions are not tumor type specific. </span><i data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">(17</span></i><span data-dcnode-id="915" instrument_node="">) Until now, new breast cancer research is demonstrating there might be a difference in how Cannabinoids interact with different subtypes.  

</span><h5 data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Effect of Cannabis Oil on Cancer Cell Line Survival</span></h5><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">The complexities of Cannabis is immense; what is not addressed in the research study is the impact of the "other" elements contained in the flower. Mentioned earlier, terpenes and flavonoids add to the entourage effect, yet scientists do not know the method of action of these molecules and how they affect the Endocannabinoid System. Different strains of Cannabis contain different ratios of Cannabinoids, terpenes and flavonoids.</span></p><span data-dcnode-id="909" instrument_node="">
</span><p data-dcnode-id="906"><span data-dcnode-id="908" instrument_node="">
</span><a data-dcnode-id="907" title="The effect of various Cannabis extracts on the survival of A549 cancer cells Medical Cannabis Medical Marijuana Research Study"></a></p><div class="wp-caption alignright" data-dcnode-id="901" id="attachment_14857" style="width: 410px"><a data-dcnode-id="904" title="The effect of various Cannabis extracts on the survival of A549 cancer cells Medical Cannabis Medical Marijuana Research Study"><img alt="The effect of various Cannabis extracts on the survival of A549 cancer cells Medical Cannabis Medical Marijuana Research Study" aria-describedby="caption-attachment-14857" data-dcnode-id="905" height="234" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sativaisticated.com/wp-content/uploads/2019/10/Medical-Cannabis-Medical-Marijuana-Exctract-on-A429-Lung-Cancer-Cell-Line.png&amp;raw" width="400"></a><p class="wp-caption-text" data-dcnode-id="902" id="caption-attachment-14857"><span data-dcnode-id="903" instrument_node="">The effect of various Cannabis extracts on the survival of cancer cells. A dose-response curve of A549 cells after 24hr incubation with or without (control) 2-10 μg/ml of CAN1-CAN12 calculated from at least 5 independent experiments.</span></p></div><span data-dcnode-id="900" instrument_node="">
</span><p data-dcnode-id="899"></p><span data-dcnode-id="898" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="897" instrument_node="">The twelve chosen Cannabis extracts (CAN1 - CAN12) effects were examined on the survival of 12 well-characterized cancer cell lines. The cells were exposed to increasing concentrations and monitored. The figure shown to the right are the effects of the 12 Cannabis extracts on the survival of A549 cancer cells, a lung carcinoma. As shown, one can see the variation of cancer cell survival. Extracts CAN8 (high CBDA) and CAN11 (high THCA) did not significantly affect cancer cell viability, while CAN7 (high THC) at the lowest dose appeared to greatly affect the viability of A549 but at higher doses became slightly less effective. The three extracts that affected the lung cancer cells the least were inactivated Cannabinoids, Cannabidiolic Acids THCA and CBDA.</span><br data-dcnode-id="896"><span data-dcnode-id="895" instrument_node="">
</span><br data-dcnode-id="894"><span data-dcnode-id="893" instrument_node="">
After review, it was determined that CAN5 and CAN7, each tested high for THC, were the most potent as an anti-tumor agent affecting the survival of the most cell lines. It's noted that the 14 THC-rich extracts seemed to possess similar Cannabinoid profiles. What is not noted is the terpene and flavonoid profile of each extract, a missing link in both this research study and in how do they affect Cannabinoids on the ECS receptors.</span><br data-dcnode-id="892"><span data-dcnode-id="891" instrument_node="">
</span><br data-dcnode-id="890"><span data-dcnode-id="889" instrument_node="">
The graphic below shows the variety of results the 12 Cannabis extracts exhibited against 12 different Cancer cell lines; some samples showing small results against a small number of cell lines, while others Cannabis extract samples are more prolific in their apoptosis levels. Unfortunately, on Cancer cell line HT-29, a </span><span data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">human colorectal adenocarcinoma </span></span><span data-dcnode-id="886" instrument_node="">displayed no reaction to all of the Cannabis extract samples.</span></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="881"><a data-dcnode-id="882" title="Effect of Various Cannabinoid Ratios from Cannabis Extracts Against Various Cancer Cell Lines"><img alt="Effect of various Cannabinoid Ratios against Various Cancer Cell Lines" class="aligncenter wp-image-14898" data-dcnode-id="883" height="600" loading="lazy" sizes="(max-width: 531px) 100vw, 531px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sativaisticated.com/wp-content/uploads/2019/11/Screen-Shot-2019-11-24-at-11.55.24-AM.png&amp;raw" srcset="https://sativaisticated.com/wp-content/uploads/2019/11/Screen-Shot-2019-11-24-at-11.55.24-AM.png 1100w, https://sativaisticated.com/wp-content/uploads/2019/11/Screen-Shot-2019-11-24-at-11.55.24-AM-266x300.png 266w, https://sativaisticated.com/wp-content/uploads/2019/11/Screen-Shot-2019-11-24-at-11.55.24-AM-907x1024.png 907w, https://sativaisticated.com/wp-content/uploads/2019/11/Screen-Shot-2019-11-24-at-11.55.24-AM-768x867.png 768w, https://sativaisticated.com/wp-content/uploads/2019/11/Screen-Shot-2019-11-24-at-11.55.24-AM-100x113.png 100w" width="531"></a></p><span data-dcnode-id="880" instrument_node="">
</span><p data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">Battling Cancer is a complex set of variables, an intense game of chance. These include type of Cancer and timing of the diagnosis, the mutations within the Cancer and traditional chemotherapies. The variables for introducing Cannabis are Cannabinoids, terpenes, flavonoids and delivery methods. Currently, Cannabinoids are only being considered in treatments with few exceptions.</span></p><span data-dcnode-id="877" instrument_node="">
</span><h4 data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Rick Simpson aka Full Extract Cannabis Oil</span></h4><span data-dcnode-id="874" instrument_node="">
</span><p data-dcnode-id="865"><span data-dcnode-id="873" instrument_node="">We decided to incorporate Cannabis into my dad's chemotherapy and researched Rick Simpson Oil commonly referred to by its acronym, RSO. RSO is now also referred to as Full Extract Cannabis Oil or FECO. This type of Cannabis extract oil was re-discovered by a man named Rick Simpson who used it to cure his </span><span data-dcnode-id="867"><span data-dcnode-id="872" instrument_node="">Melanoma (skin cancer) and has claimed to have consulted thousands of patients with success. Rick Simpson advises to use a heavy Indica strain that is high in THC; his theory behind using heavy Indica dominant strains is that it would produce a more sedative effect compared to Sativa leaning flowers. These 'effects' are thought to be the result of the entourage effect determined by the terpenoids, flavonoids and other compounds present in the Cannabis oil. The terpenes, Myrcene and B-Caryophyllene are commonly found in Indica leaning Cannabis strains with more sedative or "couch lock" characteristics. As mentioned previously, B-Caryophyllene is categorized as a dietary Cannabinoid.</span><br data-dcnode-id="871"><span data-dcnode-id="870" instrument_node="">
</span><br data-dcnode-id="869"><span data-dcnode-id="868" instrument_node="">
</span></span><span data-dcnode-id="866" instrument_node="">Fighting Cancer with FECO is not covered by insurance and is potentially, an expensive therapy protocol for the average household. Whether buying it off the shelf with no discerning information, making it yourself or consulting a professional for personalized care, treatment can start as low as $30 - 50 for a gram to into the thousands and easily reach $7,000 to $10,000 for a 60 gram in 90 day regimen. My family learned many things in our fight and though we didn't win against Cancer, doesn't mean Cannabis wasn't a win for my family.</span></p><span data-dcnode-id="864" instrument_node="">
</span><h6 data-dcnode-id="861"><strong data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">POTENTIAL DRUG INTERACTIONS</span></strong></h6><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="820"><span data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">CBD is metabolized via the cytochrome P450 system </span></span><em data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">(10)</span></em><span data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">, mainly by&nbsp;</span></span><span data-dcnode-id="844"><span data-dcnode-id="853" instrument_node="">isozymes located in the liver&nbsp;</span><em data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">(11).</span></em><span data-dcnode-id="850" instrument_node="">&nbsp;Most drug interactions are associated with concurrent use of other Central Nervous System depressants with Cannabis</span><em data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">.&nbsp;</span></em><span data-dcnode-id="847" instrument_node="">In clinical research, drug interactions are rare and there is no drug that cannot be used with Cannabis, if necessary. Existing studies have not demonstrated toxicity/loss of effect of comitant medications, but still theoretically possible</span><em data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">.&nbsp;</span></em></span><span data-dcnode-id="835"><span data-dcnode-id="843" instrument_node="">A known exception is a high dose of CBD/Clobazam with a side-effect of drowsiness caused by a sedating metabolite, N-deesmethyl Clozabam that requires a dose reduction&nbsp;</span><em data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">(12, 13, 14)</span></em><span data-dcnode-id="840" instrument_node="">.</span><br data-dcnode-id="839"><span data-dcnode-id="838" instrument_node="">
</span><br data-dcnode-id="837"><span data-dcnode-id="836" instrument_node="">
</span></span><span data-dcnode-id="834" instrument_node="">If you are taking a medication that says "Do Not Take With Grapefruit", taking CBD in tincture, pill capsule or edible form could cause you to have too much of your medication in your bloodstream. This could cause unwanted side effects. This can happen with common drugs including warfarin, taken by millions for blood clots, and antidepressants like Zoloft. </span><em data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">(15)</span></em><span data-dcnode-id="831" instrument_node="">&nbsp;Dr. Michele Ross, PhD writes in her book,&nbsp;</span><em data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Vitamin Weed: A 4-Step Plan to Prevent and Reverse Endocannabinoid Deficiency,</span></em><span data-dcnode-id="828" instrument_node="">&nbsp;ways to mediate the risk include lowering your dose of medication under your doctor's guidance or lowering your dose of CBD to a dose that causes minimal inhibition of P450 enzymes.</span><br data-dcnode-id="827"><span data-dcnode-id="826" instrument_node="">
</span><br data-dcnode-id="825"><span data-dcnode-id="824" instrument_node="">
If you take prescription medicines for blood pressure or central nervous system or are a sensitive patient, we recommend consulting a Medical Cannabis Practitioner (Canna-Nurse). CBD can lower blood pressure&nbsp;</span><em data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">(16)</span></em><span data-dcnode-id="821" instrument_node="">&nbsp;precaution must be taken. My father, who was battling Stage 4 Renal Cell Carcinoma, had a blood pressure event when I switched his Full Extract Cannabis Oil (FECO), also referred to as Rick Simpson Oil (RSO), to a CBD dominant strain.</span></p><span data-dcnode-id="819" instrument_node="">

</span><cite class="x-comment-author" data-dcnode-id="375" itemprop="author"><span data-dcnode-id="376" instrument_node="">Marjorie R Sharick</span></cite><span data-dcnode-id="374" instrument_node=""> </span></header><span data-dcnode-id="372" instrument_node="">
</span><section class="x-comment-content" data-dcnode-id="367" itemprop="description"><span data-dcnode-id="371" instrument_node="">
</span><p data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">My brother, 59 years old was just diagnosed with kidney cancer.  It was found when they scanned his shoulder for a possible torn rotator cuff.  Instead the found a egg shaped Metastatic Carcinoma.  It was removed and they had to put a plate and pins into his shoulder where they had to remove bone.  The biopsy showed it originated in his kidney.  They are starting radiation on shoulder and chemotherapy.    Would it be worth him trying RSO.  He lives in Nashville and being treated at Vanderbilt.</span></p><span data-dcnode-id="368" instrument_node="">
</span></section><span data-dcnode-id="366" instrument_node="">

</span><article class="comment" data-dcnode-id="295" id="comment-21471"><span data-dcnode-id="359" instrument_node="">
</span><div class="x-comment-img" data-dcnode-id="353"><span class="avatar-wrap cf" data-dcnode-id="357"><img alt="" class="avatar avatar-120 photo" data-dcnode-id="358" height="120" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/eda27fbcb9e9cecaecb14b9c6011f2f7%3Fs%3D120%26d%3Dblank%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/eda27fbcb9e9cecaecb14b9c6011f2f7?s=240&amp;d=blank&amp;r=g 2x" width="120"></span><span data-dcnode-id="356" instrument_node=""> </span><span class="bypostauthor" data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">Author</span></span></div><span data-dcnode-id="352" instrument_node=""> </span><div class="x-comment-content-wrap" data-dcnode-id="297"><span data-dcnode-id="351" instrument_node="">

</span><a class="x-comment-time" data-dcnode-id="346" href="#comment-21471"><time data-dcnode-id="347" datetime="2021-05-18T08:59:20-07:00" itemprop="datePublished"><span data-dcnode-id="348" instrument_node="">May 18, 2021</span></time></a><span data-dcnode-id="345" instrument_node=""> </span><a aria-label="Reply to Eric" class="comment-reply-link" data-belowelement="comment-21471" data-commentid="21471" data-dcnode-id="341" data-postid="14801" data-replyto="Reply to Eric" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sativaisticated.com/full-extract-cannabis-oil-feco-and-cancer/%3Freplytocom%3D21471%23respond" rel="nofollow"><span data-dcnode-id="344" instrument_node="">Reply </span><span class="comment-reply-link-after" data-dcnode-id="342"><i class="x-icon-reply" data-dcnode-id="343" data-x-icon-s=""></i></span></a><span data-dcnode-id="340" instrument_node=""> </span></div><span data-dcnode-id="338" instrument_node="">
</span><cite class="x-comment-author" data-dcnode-id="336" itemprop="author"><span data-dcnode-id="337" instrument_node="">Eric</span></cite><span data-dcnode-id="335" instrument_node=""> </span></header><span data-dcnode-id="333" instrument_node="">
</span><section class="x-comment-content" data-dcnode-id="299" itemprop="description"><span data-dcnode-id="332" instrument_node="">
</span><p data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">Hello-</span></p><span data-dcnode-id="329" instrument_node="">
</span><p data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">Sorry to hear about your brother. </span></p><span data-dcnode-id="326" instrument_node="">
</span><p data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">Would it be worth it to try RSO? The use of Cannabis is a personal decision that your brother and family need to make. Unfortunately to start, Cannabis is illegal in Tennessee so that makes the use a little more complicated.</span></p><span data-dcnode-id="323" instrument_node="">
</span><p data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">My father was diagnosed with Stage 4 Renal Cell Carcinoma, a very hard diagnosis to swallow. There were no radiation options and the two chemotherapies were not working, they actually were killing him…and my mom. That is when we decided to try Cannabis and my parents had zero experience with it previously. It was taboo before the cancer.</span></p><span data-dcnode-id="320" instrument_node="">
</span><p data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">RSO is not covered by insurance and can be cost prohibitive. The protocol for RSO to treat cancer is 60 grams in 90 days, starting with a “grain of rice” amount up working up to a full gram of RSO a day. A full gram could cost anywhere from $30 up to $75ish, if purchasing from a dispensary after taxes. The good thing is, RSO can be made at home. However, making medicine for an immunocompromised cancer patient means there is potential risk if the medicine is not clean. I would want to know either the Cannabis is tested or it is from a trusted source.</span></p><span data-dcnode-id="317" instrument_node="">
</span><p data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">My father ultimately gave up on the western medicine options and decided to only do RSO. We never could get him up to a gram a day, at most, he would get to about a half a gram. We also switched Cannabinoids, THC based to adding in CBD to allow him to be able to consume more oil. </span></p><span data-dcnode-id="314" instrument_node="">
</span><p data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">In the fog of war (battling the cancer), we ran into a couple of complications that I am not sure if they were associated with the use of RSO. I wish I took notes, we did experience tumor regression but we also experienced growth of the tumors. He also had an cardiac episode that put him into the hospital, not sure if it was reaction of CBD and blood pressure medicine. </span></p><span data-dcnode-id="311" instrument_node="">
</span><p data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">Ultimately, my father lost his battle with Renal Cell Carcinoma but the Cannabis was a win for my family. RSO provided my father with great relief, leading to a good final year. He ate better and felt better, which we believe was a result of the Cannabis. My father was never going to win his battle because he lost his vision of life. That was ok, because that was his right and we were there to support it. My mother saw the benefits and now says, she only wants to be treated with Cannabis when it is her time.</span></p><span data-dcnode-id="308" instrument_node="">
</span><p data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">Cannabis is not the magic bullet to cancer, it is a little more complicated. But it has the potential to provide your brother with relief and comfort, like it did for my father. And it does have the potential for miracles too!  </span></p><span data-dcnode-id="305" instrument_node="">
</span><p data-dcnode-id="301"><span data-dcnode-id="304" instrument_node="">Godspeed in your fight,</span><br data-dcnode-id="303"><span data-dcnode-id="302" instrument_node="">
Eric</span></p><span data-dcnode-id="300" instrument_node="">

</span><p data-dcnode-id="196"><span data-dcnode-id="203" instrument_node="">Regarding your search for FECO oil, there a couple of good choices for you. One is </span><a data-dcnode-id="201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cornerstonecollective.com/" rel="nofollow ugc" title="Cornerstone Wellness Cannabis Dispensary"><span data-dcnode-id="202" instrument_node="">Cornerstone Wellness Dispensary</span></a><span data-dcnode-id="200" instrument_node=""> in the Eagle Rock part of Los Angeles or there are the </span><a data-dcnode-id="198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//beardbrospharms.com/" rel="nofollow ugc" title="Beard Brothers Pharms cannabis brand"><span data-dcnode-id="199" instrument_node="">Beard Brothers Pharms cannabis brand</span></a><span data-dcnode-id="197" instrument_node="">.   Cornerstone Wellness was the first research based dispensary in the United States and have always offered goo FECO oil at different cannabinoid ratios. The Beard Brothers are veterans who make quality product and are one of the few brands that make FECO. They do have a product finder on their website, so you can find some closest to you.</span></p><span data-dcnode-id="195" instrument_node="">
</span><p data-dcnode-id="193"><span data-dcnode-id="194" instrument_node="">In regards to finding a Canna-Nurse, I was going to send you to Cannabis Nurse Network but their Nurse Finder is not working. What is your expectation (or hope) with the use of Cannabis?</span></p><span data-dcnode-id="192" instrument_node="">
</span><p data-dcnode-id="190"><span data-dcnode-id="191" instrument_node="">Please don’t hesitate to contact me if have any further questions or would like assistance on a FECO regimen.</span></p><span data-dcnode-id="189" instrument_node="">
