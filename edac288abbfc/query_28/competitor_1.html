ata-dcnode-id="961" instrument_node=""> Potential Uses of Cannabis for Lung Cancer </span></a></li><li data-dcnode-id="956"><a data-dcnode-id="957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hbx.media.net/checksync.php%3Fcid%3D8CU66J63J%26cs%3D1%26cv%3D37%26hb%3D1%26prvid%3D79%252C141%252C3007%252C126%252C178%252C96%252C237%252C55%252C351%252C3016%252C147%252C226%252C23%252C296%252C97%252C3%252C246%252C203%252C208%252C251%252C175%252C2043%252C229%252C29%252C214%252C107%252C3017%252C3012%252C338%252C54%252C77%252C201%252C344%252C3003%252C172%252C326%252C327%252C337%252C339%26vsSync%3D1%26refUrl%3D%26gdpr%3D0%26gdprconsent%3D0%26gdprstring%3D%26usp_status%3D0%26usp_consent%3D1%26coppa%3D0%23091e9c5e81f466d7-2-6"><span data-dcnode-id="958" instrument_node=""> Research on Cannabis as a Lung Cancer Treatment </span></a></li><li data-dcnode-id="953"><a data-dcnode-id="954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hbx.media.net/checksync.php%3Fcid%3D8CU66J63J%26cs%3D1%26cv%3D37%26hb%3D1%26prvid%3D79%252C141%252C3007%252C126%252C178%252C96%252C237%252C55%252C351%252C3016%252C147%252C226%252C23%252C296%252C97%252C3%252C246%252C203%252C208%252C251%252C175%252C2043%252C229%252C29%252C214%252C107%252C3017%252C3012%252C338%252C54%252C77%252C201%252C344%252C3003%252C172%252C326%252C327%252C337%252C339%26vsSync%3D1%26refUrl%3D%26gdpr%3D0%26gdprconsent%3D0%26gdprstring%3D%26usp_status%3D0%26usp_consent%3D1%26coppa%3D0%23091e9c5e81f466d7-2-8"><span data-dcnode-id="955" instrument_node=""> Cannabis Side Effects </span></a></li></ul></aside><div class="med-wrap" data-dcnode-id="943"><div data-dcnode-id="945"></div></div><div class="article__body" data-dcnode-id="747" data-metrics-module="embd-lnk"><div class="article-page active-page" data-dcnode-id="850" data-page="1"><section data-dcnode-id="923"><p data-dcnode-id="929"><a data-crosslink-type="article" data-dcnode-id="937" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/mental-health/addiction/marijuana-use-and-its-effects"><span data-dcnode-id="938" instrument_node="">Cannabis</span></a><span data-dcnode-id="936" instrument_node="">, better known to most folks as marijuana or pot, might have the potential to ease </span><a data-crosslink-type="article" data-dcnode-id="934" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/pain-management/default.htm"><span data-dcnode-id="935" instrument_node="">pain</span></a><span data-dcnode-id="933" instrument_node=""> and other </span><a data-crosslink-type="article" data-dcnode-id="931" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/lung-cancer/understanding-lung-cancer-symptoms"><span data-dcnode-id="932" instrument_node="">symptoms of lung cancer</span></a><span data-dcnode-id="930" instrument_node="">. But so far, there's no evidence it can work as a treatment for the disease.</span></p><p data-dcnode-id="924"><span data-dcnode-id="928" instrument_node="">Cannabis is a drug made from the dried leaves and buds of the </span><em data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Cannabis sativa</span></em><span data-dcnode-id="925" instrument_node=""> plant. Some people smoke or eat marijuana for the "high" it gives, but it's also getting a look from experts for the chance that it can play a role in helping with certain medical conditions.</span></p></section><section data-_get-element-size="{&quot;w&quot;:608,&quot;h&quot;:508.578125}" data-dcnode-id="895"><h2 data-dcnode-id="921" id="091e9c5e81f466d7-1-2"><span data-dcnode-id="922" instrument_node="">What's in Cannabis?</span></h2><p data-dcnode-id="916"><span data-dcnode-id="920" instrument_node="">The active ingredients in cannabis are chemicals called cannabinoids. Tetrahydrocannabinol (THC) gives the "high" people get when they use marijuana. </span><a data-crosslink-type="article" data-dcnode-id="918" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/vitamins-supplements/ingredientmono-1439-cannabidiol%2Bcbd.aspx%3Factiveingredientid%3D1439%26activeingredientname%3Dcannabidiol%2B%28cbd%29"><span data-dcnode-id="919" instrument_node="">Cannabidiol</span></a><span data-dcnode-id="917" instrument_node=""> (CBD) doesn't cause the same euphoric feeling, but it does relax the body.</span></p><p data-dcnode-id="911"><span data-dcnode-id="915" instrument_node="">Both THC and CBD may help relieve the side effects of </span><a data-crosslink-type="article" data-dcnode-id="913" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/cancer/default.htm"><span data-dcnode-id="914" instrument_node="">cancer</span></a><span data-dcnode-id="912" instrument_node=""> and its treatments.</span></p><p data-_get-element-size="{&quot;w&quot;:608,&quot;h&quot;:96}" data-dcnode-id="907"><a data-crosslink-type="article" data-dcnode-id="909" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/drugs/2/drug-175441/cannabidiol%2B%28cbd%29%2Bextract%2Boral/details"><span data-dcnode-id="910" instrument_node="">CBD oil</span></a><span data-dcnode-id="908" instrument_node=""> is an extract from the hemp plant -- a relative of cannabis -- mixed with oil. Unlike THC, CBD oil doesn't cause a high when you use it.</span></p><p data-_get-element-size="{&quot;w&quot;:608,&quot;h&quot;:128}" data-dcnode-id="896"><span data-dcnode-id="906" instrument_node="">Cannabis and CBD products aren't FDA-approved to treat </span><a data-crosslink-type="article" data-dcnode-id="904" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/lung-cancer/understanding-lung-cancer-symptoms"><span data-dcnode-id="905" instrument_node="">lung cancer</span></a><span data-dcnode-id="903" instrument_node="">. They shouldn't replace proven treatments like surgery, </span><a data-crosslink-type="article" data-dcnode-id="901" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/cancer/chemotherapy-what-to-expect"><span data-dcnode-id="902" instrument_node="">chemotherapy</span></a><span data-dcnode-id="900" instrument_node="">, </span><a data-crosslink-type="article" data-dcnode-id="898" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/cancer/what-to-expect-from-radiation-therapy"><span data-dcnode-id="899" instrument_node="">radiation</span></a><span data-dcnode-id="897" instrument_node="">, and targeted therapy. If you want to try cannabis for medical purposes, ask your doctor whether it's safe for you.</span></p></section><section data-_get-element-size="{&quot;w&quot;:608,&quot;h&quot;:594.359375}" data-dcnode-id="872"><div class="module ad emb-center-well-ad ad-923" data-_get-element-size="{&quot;w&quot;:608,&quot;h&quot;:132}" data-dcnode-id="894" id="ad-centerwell-pos-923-1"></div><h2 data-_get-element-size="{&quot;w&quot;:608,&quot;h&quot;:33}" data-dcnode-id="892" id="091e9c5e81f466d7-1-3"><span data-dcnode-id="893" instrument_node="">How Do You Take Cannabis?</span></h2><p data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Cannabis products come in a few different forms. You can:</span></p><ul data-dcnode-id="878"><li data-dcnode-id="886"><a data-crosslink-type="article" data-dcnode-id="888" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/lung/how-we-breathe"><span data-dcnode-id="889" instrument_node="">Breathe</span></a><span data-dcnode-id="887" instrument_node=""> them in as smoke or through a vaporizer</span></li><li data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Eat or drink them</span></li><li data-dcnode-id="879"><span data-dcnode-id="883" instrument_node="">Apply them to your </span><a data-crosslink-type="article" data-dcnode-id="881" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/skin-problems-and-treatments/picture-of-the-skin"><span data-dcnode-id="882" instrument_node="">skin</span></a><span data-dcnode-id="880" instrument_node=""> as a cream, patch, or spray</span></li></ul><p data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Your doctor can suggest a form based on your symptoms and which types of cannabis are legal in your state.</span></p><div class="module ad ad-5000" data-block-codes="_c34_cust090_f1_nn1_0_j_cust4_cust051_" data-dcnode-id="875" data-is-mobile="false" data-pos="5000" data-sizes="[]" data-targets="{&quot;art&quot;:&quot;091e9c5e81f466d7&quot;,&quot;cc&quot;:&quot;16&quot;,&quot;env&quot;:&quot;0&quot;,&quot;hcent&quot;:&quot;1071&quot;,&quot;leaf&quot;:&quot;&quot;,&quot;mcent&quot;:&quot;&quot;,&quot;mic&quot;:&quot;&quot;,&quot;pt&quot;:&quot;1822&quot;,&quot;sec&quot;:&quot;&quot;,&quot;pug&quot;:&quot;&quot;,&quot;scent&quot;:&quot;&quot;,&quot;tmg&quot;:&quot;&quot;,&quot;tug&quot;:&quot;&quot;,&quot;uri&quot;:&quot;/lung-cancer/guide/could-cannabis-treat-lung-cancer&quot;,&quot;rd&quot;:&quot;1&quot;,&quot;tex&quot;:&quot;vuejs&quot;}" id="ad-pos-5000-1"></div><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">When you smoke marijuana, it goes to work within seconds, but the effects only last for about 1 to 3 hours. When you eat marijuana, it starts to work more slowly, but the effects can last for up to 8 hours.</span></p></section><section data-dcnode-id="851"><h2 data-dcnode-id="870" id="091e9c5e81f466d7-1-4"><span data-dcnode-id="871" instrument_node="">Potential Uses of Cannabis for Lung Cancer</span></h2><p data-dcnode-id="862"><span data-dcnode-id="869" instrument_node="">Cannabis acts on your </span><a data-crosslink-type="article" data-dcnode-id="867" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/brain/what-is-nervous-system"><span data-dcnode-id="868" instrument_node="">central nervous system</span></a><span data-dcnode-id="866" instrument_node=""> and the </span><a data-crosslink-type="article" data-dcnode-id="864" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/cold-and-flu/immune-system-function"><span data-dcnode-id="865" instrument_node="">immune system</span></a><span data-dcnode-id="863" instrument_node=""> -- your body's defense against germs -- in ways that could help ease symptoms of lung cancer or its treatment, like these:</span></p><p data-dcnode-id="852"><strong data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Pain.</span></strong><span data-dcnode-id="859" instrument_node=""> There's some evidence that marijuana eases pain, both from the cancer itself and from the </span><a data-crosslink-type="article" data-dcnode-id="857" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/brain/nerve-pain-and-nerve-damage-symptoms-and-causes"><span data-dcnode-id="858" instrument_node="">nerve damage</span></a><span data-dcnode-id="856" instrument_node=""> that treatments like chemotherapy can sometimes cause. It might help people who don't get enough relief from </span><a data-crosslink-type="article" data-dcnode-id="854" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/pain-management/guide/narcotic-pain-medications"><span data-dcnode-id="855" instrument_node="">opioid</span></a><span data-dcnode-id="853" instrument_node=""> pain medicines.</span></p></section></div><div class="article-page active-page" data-dcnode-id="748" data-page="2"><div class="module ad emb-top-ad ad-923" data-dcnode-id="849" id="ad-top-pos-923-2"></div><section data-dcnode-id="801"><span data-dcnode-id="848" instrument_node=""> </span><p data-dcnode-id="822"><strong data-dcnode-id="844"><a data-crosslink-type="article" data-dcnode-id="846" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/digestive-disorders/digestive-diseases-nausea-vomiting"><span data-dcnode-id="847" instrument_node="">Nausea and vomiting</span></a><span data-dcnode-id="845" instrument_node="">.</span></strong><a data-crosslink-type="article" data-dcnode-id="842" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/a-to-z-guides/medical-marijuana-faq"><span data-dcnode-id="843" instrument_node=""> Medical marijuana</span></a><span data-dcnode-id="841" instrument_node=""> may help relieve these symptoms, which are common </span><a data-crosslink-type="video" data-dcnode-id="839" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/cancer/video/chemo-nausea-side-effect"><span data-dcnode-id="840" instrument_node="">chemotherapy side effects</span></a><span data-dcnode-id="838" instrument_node="">. The FDA has approved two man-made cannabinoid </span><a data-crosslink-type="article" data-dcnode-id="836" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/drugs/index-drugs.aspx"><span data-dcnode-id="837" instrument_node="">drugs</span></a><span data-dcnode-id="835" instrument_node=""> to treat nausea and vomiting: </span><a data-crosslink-type="article" data-dcnode-id="833" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/drugs/drug-144706-nabilone%2Boral.aspx"><span data-dcnode-id="834" instrument_node="">nabilone</span></a><span data-dcnode-id="832" instrument_node=""> (</span><a data-crosslink-type="article" data-dcnode-id="830" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/drugs/drug-144710-cesamet%2Boral.aspx"><span data-dcnode-id="831" instrument_node="">Cesamet</span></a><span data-dcnode-id="829" instrument_node="">) and </span><a data-crosslink-type="article" data-dcnode-id="827" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/drugs/drug-8774-dronabinol%2Boral.aspx"><span data-dcnode-id="828" instrument_node="">dronabinol</span></a><span data-dcnode-id="826" instrument_node=""> (</span><a data-crosslink-type="article" data-dcnode-id="824" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/drugs/drug-9308-marinol%2Boral.aspx"><span data-dcnode-id="825" instrument_node="">Marinol</span></a><span data-dcnode-id="823" instrument_node="">).</span></p><p data-_get-element-size="{&quot;w&quot;:608,&quot;h&quot;:64}" data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">These drugs may help when other anti-nausea drugs haven't worked. Your doctor can give you a prescription for them.</span></p><p data-_get-element-size="{&quot;w&quot;:608,&quot;h&quot;:96}" data-dcnode-id="813"><strong data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Weight loss.</span></strong><span data-dcnode-id="817" instrument_node=""> Dropping pounds is a common </span><a data-crosslink-type="article" data-dcnode-id="815" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/lung-cancer/default.htm"><span data-dcnode-id="816" instrument_node="">lung cancer</span></a><span data-dcnode-id="814" instrument_node=""> symptom. You may lose weight because you don't have an appetite, or because your treatment causes nausea and vomiting.</span></p><p data-_get-element-size="{&quot;w&quot;:608,&quot;h&quot;:64}" data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">Cancer can sometimes cause muscle loss, called cachexia. Marijuana may also help with this symptom.</span></p><p data-_get-element-size="{&quot;w&quot;:608,&quot;h&quot;:64}" data-dcnode-id="802"><strong data-dcnode-id="804"><a data-crosslink-type="article" data-dcnode-id="809" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/anxiety-panic/default.htm"><span data-dcnode-id="810" instrument_node="">Anxiety</span></a><span data-dcnode-id="808" instrument_node=""> and </span><a data-crosslink-type="article" data-dcnode-id="806" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/sleep-disorders/default.htm"><span data-dcnode-id="807" instrument_node="">sleep</span></a><span data-dcnode-id="805" instrument_node="">.</span></strong><span data-dcnode-id="803" instrument_node=""> Sleepiness is a side effect of cannabis. If you have cancer, cannabis may improve sleep and ease anxiety.</span></p></section><section data-_get-element-size="{&quot;w&quot;:608,&quot;h&quot;:183}" data-dcnode-id="793"><h2 data-_get-element-size="{&quot;w&quot;:608,&quot;h&quot;:66}" data-dcnode-id="799" id="091e9c5e81f466d7-2-6"><span data-dcnode-id="800" instrument_node="">Research on Cannabis as a Lung Cancer Treatment</span></h2><p data-dcnode-id="794"><span data-dcnode-id="798" instrument_node="">Studies done in cells and animals show that cannabis slows or stops the growth of certain cancer cells -- including </span><a data-crosslink-type="article" data-dcnode-id="796" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/lung-cancer/what-is-lung-cancer"><span data-dcnode-id="797" instrument_node="">lung cancer</span></a><span data-dcnode-id="795" instrument_node=""> cells. But so far, there's no evidence that it works as a treatment for cancer in people.</span></p></section><section data-_get-element-size="{&quot;w&quot;:608,&quot;h&quot;:356.859375}" data-dcnode-id="777"><span data-dcnode-id="792" instrument_node=""> </span><p data-_get-element-size="{&quot;w&quot;:608,&quot;h&quot;:64}" data-dcnode-id="784"><span data-dcnode-id="791" instrument_node="">There's also no evidence that </span><a data-crosslink-type="slideshow" data-dcnode-id="789" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/pain-management/ss/slideshow-cbd-oil"><span data-dcnode-id="790" instrument_node="">CBD oil</span></a><span data-dcnode-id="788" instrument_node=""> treats cancer or its symptoms, although it may ease anxiety, pain, and problems with </span><a data-crosslink-type="article" data-dcnode-id="786" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/sleep-disorders/sleep-disorders-faq"><span data-dcnode-id="787" instrument_node="">sleep</span></a><span data-dcnode-id="785" instrument_node="">.</span></p><div class="module ad emb-center-well-ad ad-923" data-_get-element-size="{&quot;w&quot;:608,&quot;h&quot;:132}" data-dcnode-id="783" id="ad-centerwell-pos-923-2"></div><p data-_get-element-size="{&quot;w&quot;:608,&quot;h&quot;:128}" data-dcnode-id="778"><span data-dcnode-id="782" instrument_node="">Research on marijuana as a </span><a data-crosslink-type="article" data-dcnode-id="780" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/cancer/understanding-cancer-treatment"><span data-dcnode-id="781" instrument_node="">cancer treatment</span></a><span data-dcnode-id="779" instrument_node=""> has been slow because the federal government considers it an illegal drug. More studies are needed to learn how it might help with lung cancer and other types of cancer.</span></p></section><section data-_get-element-size="{&quot;w&quot;:608,&quot;h&quot;:745.71875}" data-dcnode-id="749"><h2 data-_get-element-size="{&quot;w&quot;:608,&quot;h&quot;:33}" data-dcnode-id="775" id="091e9c5e81f466d7-2-8"><span data-dcnode-id="776" instrument_node="">Cannabis Side Effects</span></h2><p data-dcnode-id="770"><span data-dcnode-id="774" instrument_node="">Although </span><a data-crosslink-type="slideshow" data-dcnode-id="772" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/brain/ss/slideshow-medical-marijuana"><span data-dcnode-id="773" instrument_node="">medical marijuana</span></a><span data-dcnode-id="771" instrument_node=""> is safe overall, it can cause side effects like these:</span></p><ul data-_get-element-size="{&quot;w&quot;:608,&quot;h&quot;:208}" data-dcnode-id="756"><li data-dcnode-id="766"><span data-dcnode-id="769" instrument_node="">Changes in </span><a data-crosslink-type="article" data-dcnode-id="767" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/heart-disease/heart-failure/watching-rate-monitor"><span data-dcnode-id="768" instrument_node="">heart rate</span></a></li><li data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Dizziness</span></li><li data-dcnode-id="761"><a data-crosslink-type="slideshow" data-dcnode-id="762" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/oral-health/ss/slideshow-dry-mouth"><span data-dcnode-id="763" instrument_node="">Dry mouth</span></a></li><li data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Mood changes</span></li><li data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Sleepiness</span></li></ul><p data-_get-element-size="{&quot;w&quot;:608,&quot;h&quot;:96}" data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Except for the two FDA-approved cannabis drugs, it's hard to know how much CBD or THC is in the products you buy. How strong the doses are varies with the type you take.</span></p><p data-_get-element-size="{&quot;w&quot;:608,&quot;h&quot;:160}" data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">There have been reports of contaminants like lead, pesticides, or dextromethorphan (an ingredient in cough medicines) in cannabis and CBD products. A small number of people have gotten infections after using one of these. People with cancer are already at a higher risk for infections because their immune system is weaker than usual.</span></p><p data-_get-element-size="{&quot;w&quot;:608,&quot;h&quot;:96}" data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">CBD oil might also affect how well your cancer drugs work. For these reasons, it's important to let your doctor know before you use CBD products, even if you can buy them over the counter.</span></p></section></div></div><footer data-dcnode-id="682" style=""><div class="pub-info-and-share-bar" data-_get-element-size="{&quot;w&quot;:608,&quot;h&quot;:42}" data-dcnode-id="689"><div class="article__publication-sources" data-_get-element-size="{&quot;w&quot;:135.15625,&quot;h&quot;:29}" data-dcnode-id="712"><span class="sources" data-_get-element-size="{&quot;w&quot;:0,&quot;h&quot;:0}" data-chronicle="091e9c5e81e52377" data-dcnode-id="713" data-e2e="dart-sources"><h4 class="sources__header" data-_get-element-size="{&quot;w&quot;:135.15625,&quot;h&quot;:18}" data-dcnode-id="745"><span data-dcnode-id="746" instrument_node=""> Show Sources </span></h4><div class="sources__wrapper" data-dcnode-id="714"><p data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">SOURCES:</span></p><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">American Cancer Society: "Signs and Symptoms of Cancer."</span></p><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Cancer.Net: "Weight Loss."</span></p><p data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">CDC: "How is Lung Cancer Diagnosed and
