</span></span></div><figcaption data-dcnode-id="4905"><span data-dcnode-id="4906" instrument_node="">How is CBD like grapefruit? Both could interact with some pharmaceutical drugs.</span></figcaption></figure><span data-dcnode-id="4903" instrument_node="">
</span><p data-dcnode-id="4893"><a data-dcnode-id="4901" data-lasso-id="5614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.drugs.com/article/grapefruit-drug-interactions.html" rel="nofollow noopener" target="_blank"><span data-dcnode-id="4902" instrument_node="">Grapefruit can actually interfere with the absorption</span></a><span data-dcnode-id="4900" instrument_node=""> of some common drugs, potentially resulting in unbalanced or dangerous levels of the drug in a person’s bloodstream. There’s quite a list of affected drugs, including some cholesterol-reducing drugs as well as some </span><a data-dcnode-id="4898" data-lasso-id="5615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthcentral.com/article/why-antidepressants-and-grapefruit-dont-mix" rel="nofollow noopener" target="_blank"><span data-dcnode-id="4899" instrument_node="">psychiatric medications</span></a><span data-dcnode-id="4897" instrument_node="">. This connection is well known and, in most cases, your doctor would tell you if you need to avoid grapefruit. When in doubt, you can use a </span><a data-dcnode-id="4895" data-lasso-id="5616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.drugs.com/drug_interactions.html" rel="nofollow noopener" target="_blank"><span data-dcnode-id="4896" instrument_node="">drug interaction checker</span></a><span data-dcnode-id="4894" instrument_node=""> online or check with your doctor or pharmacist. </span></p><span data-dcnode-id="4892" instrument_node="">
</span><p data-dcnode-id="4887"><span data-dcnode-id="4891" instrument_node="">The possible connection with CBD is less well-known, and also less well-established. However, some preliminary clinical research suggests </span><a data-dcnode-id="4889" data-lasso-id="5617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.health.harvard.edu/blog/cannabidiol-cbd-what-we-know-and-what-we-dont-2018082414476" rel="noopener" target="_blank"><span data-dcnode-id="4890" instrument_node="">grapefruit and CBD could affect the same enzymes</span></a><span data-dcnode-id="4888" instrument_node="">, meaning CBD should be avoided with the same medications. However, it’s important to note that the clinical studies where this connection was found involve much higher doses of CBD than people typically take at home. </span></p><span data-dcnode-id="4886" instrument_node="">
</span><p data-dcnode-id="4884"><span data-dcnode-id="4885" instrument_node="">Even so, it’s better to be safe than sorry. If you’re supposed to avoid grapefruit, or you’re concerned about potential interactions, check with a medical professional before starting or continuing to take CBD. </span></p><span data-dcnode-id="4883" instrument_node="">
</span><h2 data-dcnode-id="4881" id="h-an-anecdotal-look-at-cbd-oil-side-effects-shows-quality-matters"><span data-dcnode-id="4882" instrument_node="">An anecdotal look at CBD Oil side effects shows quality matters</span></h2><span data-dcnode-id="4880" instrument_node="">
</span><p data-dcnode-id="4878"><span data-dcnode-id="4879" instrument_node="">Of course, since many of these studies have small sample sizes, and every person reacts a little bit differently to any substance, we looked at CBD oil users’ anecdotal reports, posted on popular online communities and forums, such as Reddit and sites that sell CBD products.</span></p><span data-dcnode-id="4877" instrument_node="">
</span><p data-dcnode-id="4875"><span data-dcnode-id="4876" instrument_node="">A handful of very sensitive people who use CBD oil report feeling mild mood and mind-altering effects, similar to a low dose of psychoactive cannabis, but these effects appear to be rare. Some people also reported mild digestive upset, including diarrhea, from ingesting CBD oil.</span></p><span data-dcnode-id="4874" instrument_node="">
</span><p data-dcnode-id="4866"><span data-dcnode-id="4873" instrument_node="">According to one </span><a data-dcnode-id="4871" data-lasso-id="5618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reddit.com/r/CBD/comments/4bnoes/does_anyone_else_get_headaches_from_cbd_oil/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="4872" instrument_node="">post</span></a><span data-dcnode-id="4870" instrument_node=""> on Reddit, some people get headaches from using CBD oil, which is a bit unusual since CBD can also sometimes be used to </span><a data-dcnode-id="4868" data-lasso-id="5619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hellomd.com/health-wellness/migraines-how-i-got-off-pain-meds-and-found-relief-with-cannabis" rel="nofollow noopener" target="_blank"><span data-dcnode-id="4869" instrument_node="">treat migraines</span></a><span data-dcnode-id="4867" instrument_node="">. However, other Redditors have suggested the problem was actually the purity of the CBD extract.</span></p><span data-dcnode-id="4865" instrument_node="">
</span><p data-dcnode-id="4863"><span data-dcnode-id="4864" instrument_node="">“I have just recently started taking CBD for headaches, and after three weeks of getting a worse headaches, I finally figured out that my CBD oil was cheap crap — and that a LOT of it is,” a Redditor named Pellquin.</span></p><span data-dcnode-id="4862" instrument_node="">
</span><a data-dcnode-id="4861" data-lasso-id="5620" href="#" name="research"></a><span data-dcnode-id="4860" instrument_node="">
</span><h2 data-dcnode-id="4858" id="h-the-war-on-drugs-hurts-cannabis-hemp-research"><span data-dcnode-id="4859" instrument_node="">The War on Drugs hurts cannabis &amp; hemp research</span></h2><span data-dcnode-id="4857" instrument_node="">
</span><p data-dcnode-id="4855"><span data-dcnode-id="4856" instrument_node="">Due to the the stigma associated with the war on drugs, free and open research into both hemp and its close relative, psychoactive cannabis, is only just beginning in many ways.</span></p><span data-dcnode-id="4854" instrument_node="">
</span><p data-dcnode-id="4849"><span data-dcnode-id="4853" instrument_node="">For example, the first study into the benefits of </span><a data-dcnode-id="4851" data-lasso-id="5621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//maps.org/marijuana/marijuana-us/" rel="noopener" target="_blank"><span data-dcnode-id="4852" instrument_node="">cannabis in veterans</span></a><span data-dcnode-id="4850" instrument_node=""> with otherwise untreatable post-traumatic stress disorder began in 2017, but only after the researchers struggled through years of red tape and put their careers at risk in order to do promote the need for this vital research. Fortunately, their work, and that of others like them, have begun to peel back the bureaucracy preventing scientific research.</span></p><span data-dcnode-id="4848" instrument_node="">
</span><p data-dcnode-id="4846"><span data-dcnode-id="4847" instrument_node="">On the hemp side of the equation, the 2018 Farm Bill fully legalized the growth and sales of agricultural hemp in the U.S., and the production of its derivatives like CBD oil. We hope this finally opens the way for research into the benefits and possibilities of hemp in all its forms. While this article summarizes some of what we’ve found from our research into CBD side effects, we expect to see a lot more research in this field in the years to come.</span></p><span data-dcnode-id="4845" instrument_node="">
</span><hr class="wp-block-separator is-style-wide" data-dcnode-id="4844"><span data-dcnode-id="4843" instrument_node="">

</span><h2 data-dcnode-id="4807" id="h-when-it-comes-to-cbd-purity-source-matters"><span data-dcnode-id="4808" instrument_node="">When it comes to CBD, purity &amp; source matters</span></h2><span data-dcnode-id="4806" instrument_node="">
</span><p data-dcnode-id="4801"><span data-dcnode-id="4805" instrument_node="">That redditor had it right: there’s a lot of poor quality CBD oil from unreliable brands. Some </span><a data-dcnode-id="4803" data-lasso-id="5623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.leafly.com/news/industry/tests-of-cbd-oils-reveal-three-surprise-chemicals-one-big-problem" rel="nofollow noopener" target="_blank"><span data-dcnode-id="4804" instrument_node="">especially bad products may even include unexpected ingredients</span></a><span data-dcnode-id="4802" instrument_node="">. The CBD oil market is still in its infancy, and it can be challenging for consumers to educate themselves except through expensive trial and error. When Ministry of Hemp investigated CBD oil purity and safety, we found a host of potential problems.</span></p><span data-dcnode-id="4800" instrument_node="">
</span><p data-dcnode-id="4798"><span data-dcnode-id="4799" instrument_node="">CBD oil is an unregulated market. Since hemp absorbs chemicals from the ground, including lead and mercury, growing conditions can make a big difference. Labeling of CBD products is also often inconsistent and unclear, making it confusing for CBD consumers to know what they’re buying.</span></p><span data-dcnode-id="4797" instrument_node="">
</span><p data-dcnode-id="4795"><span data-dcnode-id="4796" instrument_node="">When we interviewed Carlos Frias, founder of Green Lotus and a cannabis industry expert, he gave us three pieces of advice for buying CBD oil:</span></p><span data-dcnode-id="4794" instrument_node="">
</span><ul data-dcnode-id="4781"><li data-dcnode-id="4790"><em data-dcnode-id="4791"><em data-dcnode-id="4792"><span data-dcnode-id="4793" instrument_node="">Always ask for third-party lab results when buying CBD oil</span></em></em></li><li data-dcnode-id="4786"><em data-dcnode-id="4787"><em data-dcnode-id="4788"><span data-dcnode-id="4789" instrument_node="">Pay close attention to product labeling</span></em></em></li><li data-dcnode-id="4782"><em data-dcnode-id="4783"><em data-dcnode-id="4784"><span data-dcnode-id="4785" instrument_node="">Don’t hesitate to ask a more knowledgeable expert for help.</span></em></em></li></ul><span data-dcnode-id="4780" instrument_node="">
</span><h2 data-dcnode-id="4778" id="h-cbd-is-safe-but-research-before-you-buy-use"><span data-dcnode-id="4779" instrument_node="">CBD is safe, but research before you buy &amp; use</span></h2><span data-dcnode-id="4777" instrument_node="">

</span><p data-dcnode-id="4748"><span data-dcnode-id="4749" instrument_node="">Overall, we found that scientists and doctors consider CBD oil to be safe for most people to use, and there are few, if any, serious side effects.</span></p><span data-dcnode-id="4747" instrument_node="">
</span><p data-dcnode-id="4745"><span data-dcnode-id="4746" instrument_node="">While everyone has their own unique body chemistry, it seems like the vast majority of people can ingest CBD oil without ever feeling any unpleasant side effects at all, and the remaining few will mostly likely experience only minor symptoms like stomach upset or dry mouth. Since scientists are using pure extracts from known sources, it’s likely that some consumer reports of headaches or other minor adverse reactions could be due to impurities in inferior CBD products.</span></p><span data-dcnode-id="4744" instrument_node="">
</span><p data-dcnode-id="4739"><span data-dcnode-id="4743" instrument_node="">As always, you should closely research the products you buy. Look for </span><a data-dcnode-id="4741" data-lasso-id="7113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ministryofhemp.com/blog/best-cbd-tinctures/" rel="noopener" target="_blank"><span data-dcnode-id="4742" instrument_node="">CBD oil reviews</span></a><span data-dcnode-id="4740" instrument_node=""> and other information on our site, or reliable websites like ours. And never hesitate to consult with a medical expert if you have any doubt about the best or safest way to use CBD oil.</span></p><div class="post-views post-33805 entry-meta" data-dcnode-id="4729"><span data-dcnode-id="4738" instrument_node="">

</span><p data-dcnode-id="3712"><span data-dcnode-id="3713" instrument_node="">The price of the product does not reflect it’s quality.  Unfortunately,  in the world of supplements, there are many unscrupulous companies.   Just because it’s priced in the upper tier does not mean it’s upper tier quality.   Look for companies that have third party testing and good comments and reviews.  After much wasted money, I have learned that lesson.   I  hate hearing that herbal remedies are useless from people who’ve tried them, but don’t realize it’s the company that put in useless ingredients.      Also, to the posters who report itchy mouth or other itchy side effects,  my daughter is allergic to soy, even in trace amounts, her tongue, throat and the roof of her mouth start itching immediately and then her skin starts itching a few minutes later.  I’m thinking that perhaps you are reacting to a soy oil carrier, or ingredient in the CBD,  and not to the CBD itself.  Perhaps a change to an olive oil carrier, or another type of product without soy, or lecithin.</span></p><span data-dcnode-id="3711" instrument_node="">

</span><p data-dcnode-id="3000"><span data-dcnode-id="3001" instrument_node="">My dog was diagnosed with liver damage and had jaundice.   Nothing that the vets was giving her was working and I told the vet that I was taking her home, to live out how ever long she had left.</span></p><span data-dcnode-id="2999" instrument_node="">
</span><p data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">She would not eat and every time I tried to put food into her mouth, she would shake and tremble.  It was heartbreaking.</span></p><span data-dcnode-id="2996" instrument_node="">
</span><p data-dcnode-id="2994"><span data-dcnode-id="2995" instrument_node="">Doing some research, I came across Milk Thistle and CBD oil.  I got hold of some Milk Thistle and the results were amazing, however, she was still shaking and trembling whenever I tried to feed her.</span></p><span data-dcnode-id="2993" instrument_node="">
</span><p data-dcnode-id="2991"><span data-dcnode-id="2992" instrument_node="">I got some CBD oil from Hollands and Barretts (I am in the UK) and this did the trick.  It calmed her down enough to make feeding much easier.</span></p><span data-dcnode-id="2990" instrument_node="">
</span><p data-dcnode-id="2988"><span data-dcnode-id="2989" instrument_node="">She has now made a full recovery.  I do not know if it was the Milk Thistle, CBD oil or a combination of the two.</span></p><span data-dcnode-id="2987" instrument_node="">
</span><p data-dcnode-id="2985"><span data-dcnode-id="2986" instrument_node="">However, I have started to take the CBD oil.   For twenty years, I have never slept properly, but now I am.  Within two days, I started to sleep through without waking up numerous times.</span></p><span data-dcnode-id="2984" instrument_node="">
</span><p data-dcnode-id="2982"><span data-dcnode-id="2983" instrument_node="">My joints have never been brilliant and bending down to pick up things was difficult.   This is now also easier for me.</span></p><span data-dcnode-id="2981" instrument_node="">
</span><p data-dcnode-id="2979"><span data-dcnode-id="2980" instrument_node="">I can actually say, since taking CBD oil, I am now feeling happy within myself, and I have not been able to say that for a long time.</span></p><span data-dcnode-id="2978" instrument_node="">

</span><p data-dcnode-id="2674"><span data-dcnode-id="2687" instrument_node="">I’m on my second bottle of CBD Oil.  I have back problems – wear and tear on my lumber spine – and I have a very stressful job, so I thought I would give it a try.  I’m not sure if I am getting any benefit from it?  I still have the lower back pain every day.   I get a real strain in my lower back even if I have been standing too long (5 mins)  I take Cocodamol 30/500 8 per day but I’ve tried tramadol, diazepam, everything, but nothing seems to help especially if I put my back out and I’m doubled over!</span><br data-dcnode-id="2686"><span data-dcnode-id="2685" instrument_node="">
Anyway, it’s one o’clock in the morning as I write this.  I just can’t sleep and I’ve been this way for the last few days.  I thought CBD oil would help me sleep!   I seem to have developed a pain in my right shoulder and neck now also!</span><br data-dcnode-id="2684"><span data-dcnode-id="2683" instrument_node="">
I read loads of reports and reviews about CBD oil before I bought any so when I did I was hoping for a miracle cure and a good nights sleep to boot!</span><br data-dcnode-id="2682"><span data-dcnode-id="2681" instrument_node="">
I’m working and I need to be able to focus and concentrate but I am now stressing that I will be going into work looking like I’ve been out on the town all night!</span><br data-dcnode-id="2680"><span data-dcnode-id="2679" instrument_node="">
By the way, just recently, before I started taking CBD oil, I had a bad case of prostatitis and I was taking a 2 week course of antibiotics.  My body is feeling a bit the same way as it did then – kind of jumpy and irritable and unable to sleep – I had hallucinations then – I don’t just now – just my body feels quite similar!</span><br data-dcnode-id="2678"><span data-dcnode-id="2677" instrument_node="">
I’m sitting up in bed thinking ‘will I go and get some CBD oil and see if it helps me sleep!’  I’m also thinking, maybe it’s the CBD oil that’s making me feel like this!  I don’t know?</span><br data-dcnode-id="2676"><span data-dcnode-id="2675" instrument_node="">
As I said, I was hoping for a miracle cure but it’s not materialising yet!</span></p><span data-dcnode-id="2673" instrument_node="">

</span><p data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">Taking CBD oil for the last couple of months has greatly helped me with my anxiety issues as well as my insomnia.  I would normally wake multiple times a night and feel absolutely exhausted every day.  I would remember all the crazy dreams every night because I would be waking up so often it felt like I was living a crazy night life.  I now only wake up once maybe twice and feel that I am getting a much deeper sleep.  This has also helped with my anxiety issues.  I continue to take a very low dose of an anti depressant but I do not have to take my xanax anymore.  The only side effect I seem to have is that I feel a little ditzy and maybe not as quick with my thoughts (I believe called psychomotor slowing).  But this side effect is worth the positive outcomes I have had.  Overall I’m a big fan of this oil.  Any time I can take less prescribed meds and take something more natural I am all for it.</span></p><span data-dcnode-id="2543" instrument_node="">

</span><p data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">Hi, I just started using CBD Oil (NULeaf) concentration 50mg/ml. I only took 10 drops sublingually (below tongue for 60 seconds) as suggested the first time round and had the same experience. I felt great within 30mins afterward, my shingles pains and joint pains/skin pain subsided almost 90% and brain fog (probably from sinus problems) lifted like a veil. I was so happy. Next morning I took 4 more drops as I had a slight headache (like a dehydration headache) by the afternoon I had a horrible migraine (which I haven’t had in 6months) and vomiting throughout the night. I stopped the CBD but for the next 2 days I still had headaches in the back of my head (like dehydration headaches). Now I feel very uneasy taking the oil again. I really want this to work, as the shingles related nerve pain is driving be crazy and my anxiety levels anyways are thru the roof. I am wondering if you’ve found a solution and are still taking the CBD. I will start again today with a 3 drop dose once a day and see if I can come up with a dosage that doesn’t cause me headaches and still do the job I intended it for.</span></p><span data-dcnode-id="2216" instrument_node="">

</span><p data-dcnode-id="1642"><span data-dcnode-id="1645" instrument_node="">Hi Marj</span><br data-dcnode-id="1644"><span data-dcnode-id="1643" instrument_node="">
I hope your journey with CBD’s has been beneficial. If you have arthritis in your joints “please” try Glucosamine Chondroitin with (or without) MSM (500/400mg). I had severe arthritis pain in my knees for over 25 years. I could literally tell you when the weather was about to change, how bad it would be and how long it would last….just from the pain in my knees! I was way more accurate than the local weather man. After taking Glucosamine Chondroitin for 2 months, I am no longer able to tell you anything about the weather because the pain is completely gone! At first I could hardly believe this could be true, that a herbal capsule could completely heal my arthritis. What upsets more is that none of the many doctors that i visited ever mentioned it!</span></p><span data-dcnode-id="1641" instrument_node="">
</span><p data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">I too am now trying CBD oil for pain from a spinal injury and no negative reactions so far and the benefits are incredible (no pain). What I wanted to share was that there are now so many ways to take CBD’s that if one doesn’t seem to fit or has negative side effects, try another delivery option. Also, I would try changing the supplier and purchase only the best product that you can find. I had a negative experience with one supplier where their product gave me a bad headache, I changed suppliers (little more expensive) and the headaches stopped.</span></p><span data-dcnode-id="1638" instrument_node="">

</span><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">You’re right in that the majority of articles about CBD Oil point out the benefits as opposed to any negatives.  It’s nice to read an article about the side effects of CBD Oil.  It’s even nicer to find out that over all, the side effects are minor and the benefits far out weigh a rare report of some discomfort. Apparently the quality of the CBD Oil plays a large role in side effects and that makes sense.  It seems you get what you pay for in the CBD Oil market.  Several findings from tests going back into the 1980’s and thru the early 2000’s seem to suggest CBD Oil is safe, but you should do your own research of the available products before you buy.  Keep the knowledge flowing!</span></p><span data-dcnode-id="496" instrument_node="">
