</span><div class="row hero-image" data-dcnode-id="5164"><span data-dcnode-id="5170" instrument_node="">
</span><div class="col col-xsmall--12" data-dcnode-id="5166"><span data-dcnode-id="5169" instrument_node="">
</span><div class="full-width feature-image" data-dcnode-id="5168" style="background-image: url('https://ministryofhemp.com/wp-content/uploads/2017/02/Taking-CBD-Capsule-shutterstock_1194557230-scaled.jpg');"></div><span data-dcnode-id="5167" instrument_node="">

</span><div class="heading" data-dcnode-id="5144"><span data-dcnode-id="5160" instrument_node="">
</span><h5 data-dcnode-id="5158"><span data-dcnode-id="5159" instrument_node="">Featured</span></h5><span data-dcnode-id="5157" instrument_node="">
</span><h1 data-dcnode-id="5155"><span data-dcnode-id="5156" instrument_node="">What Are The Side Effects Of CBD Oil? Is CBD Safe?</span></h1><span data-dcnode-id="5154" instrument_node="">
</span><hr data-dcnode-id="5153"><span data-dcnode-id="5152" instrument_node="">
</span><span class="metadata" data-dcnode-id="5146"><a data-dcnode-id="5150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ministryofhemp.com/blog/author/kit/" rel="author" title="Posts by Kit O'Connell"><span data-dcnode-id="5151" instrument_node="">Kit O'Connell</span></a><span data-dcnode-id="5149" instrument_node=""> / October 10, 2020 / </span><a data-dcnode-id="5147" href="#comments"><span data-dcnode-id="5148" instrument_node="">120 Comments</span></a></span><span data-dcnode-id="5145" instrument_node="">
</span></div><span data-dcnode-id="5143" instrument_node="">
</span><div class="content" data-dcnode-id="4727"><span data-dcnode-id="5142" instrument_node="">
</span><p data-dcnode-id="5138"><span data-dcnode-id="5141" instrument_node="">With all the attention CBD has been getting, it’s easy to find information on all its benefits — but is there a downside? </span><em data-dcnode-id="5139"><span data-dcnode-id="5140" instrument_node="">Does CBD have any side effects?</span></em></p><span data-dcnode-id="5137" instrument_node="">
</span><p data-dcnode-id="5129"><span data-dcnode-id="5136" instrument_node="">Even here at Ministry of Hemp, we’ve focused a lot on exploring the benefits of </span><a data-dcnode-id="5134" data-lasso-id="7111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ministryofhemp.com/cbd/" rel="noopener" target="_blank"><span data-dcnode-id="5135" instrument_node="">CBD oil</span></a><span data-dcnode-id="5133" instrument_node=""> and the </span><a data-dcnode-id="5131" data-lasso-id="5597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ministryofhemp.com/blog/endocannabinoid-system-and-cbd/" rel="noopener" target="_blank"><span data-dcnode-id="5132" instrument_node="">endocannabinoid system</span></a><span data-dcnode-id="5130" instrument_node=""> over the past few months. Yet, so much has been written about how CBD is helping people that we wanted to take a look at its potential drawbacks too.</span></p><span data-dcnode-id="5128" instrument_node="">
</span><p data-dcnode-id="5123"><span data-dcnode-id="5127" instrument_node="">To create this article, we looked at both scientific research and anecdotal reports from CBD users. You can’t </span><a data-dcnode-id="5125" data-lasso-id="7123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ministryofhemp.com/blog/cbd-overdose/" rel="noopener" target="_blank"><span data-dcnode-id="5126" instrument_node="">overdose on CBD</span></a><span data-dcnode-id="5124" instrument_node=""> and, from our in-depth research, the side effects of CBD oil are usually minor, and, for most people, the benefits far outweigh the rare reports of discomfort.</span></p><span data-dcnode-id="5122" instrument_node="">
</span><p data-dcnode-id="5119" id="h-table-of-contents"><strong data-dcnode-id="5120"><span data-dcnode-id="5121" instrument_node="">Table of Contents</span></strong></p><span data-dcnode-id="5118" instrument_node="">
</span><ul data-dcnode-id="5099"><li data-dcnode-id="5115"><a data-dcnode-id="5116" href="#safe"><span data-dcnode-id="5117" instrument_node="">Is CBD Safe?&nbsp;</span></a></li><li data-dcnode-id="5112"><a data-dcnode-id="5113" href="#studies"><span data-dcnode-id="5114" instrument_node="">What CBD Oil Studies Have Found About Side Effects</span></a></li><li data-dcnode-id="5109"><a data-dcnode-id="5110" href="#highdosage"><span data-dcnode-id="5111" instrument_node="">Could High CBD Dosage Have Side Effects? </span></a></li><li data-dcnode-id="5106"><a data-dcnode-id="5107" href="#pharma"><span data-dcnode-id="5108" instrument_node="">Can CBD Interfere With Pharmaceutical Drugs?</span></a></li><li data-dcnode-id="5103"><a data-dcnode-id="5104" href="#research"><span data-dcnode-id="5105" instrument_node="">Why There’s Limited Research On Hemp CBD</span></a></li><li data-dcnode-id="5100"><a data-dcnode-id="5101" href="#buy"><span data-dcnode-id="5102" instrument_node="">What You Should Look For When Buying CBD</span></a></li></ul><span data-dcnode-id="5098" instrument_node="">
</span><p data-dcnode-id="5096"><span data-dcnode-id="5097" instrument_node="">Overall, our research suggests that, just as with any health supplement, the quality and source of your CBD oil can make a big difference when it comes to side effects. In fact, many unpleasant experiences from CBD reported by consumers could be due to impurities or poor quality CBD oil, as we’ll discuss later in this article.</span></p><span data-dcnode-id="5095" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="5070"><div class="ss-on-media-container wp-image-59183" data-dcnode-id="5073" style="display: inline;"><span class="ss-on-media-image-wrap wp-image-59183" data-dcnode-id="5074"><img alt="Is CBD safe and what are cbd oil side effects? Image shows two bottles of CBD, hemp leaves, and some letter blocks spelling out cannabidiol." class="ss-on-media-img wp-image-59183" data-dcnode-id="5094" height="683" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ministryofhemp.com/wp-content/uploads/2017/02/CBD-Letters-shutterstock_1207415518-1024x683.jpg&amp;raw" srcset="https://ministryofhemp.com/wp-content/uploads/2017/02/CBD-Letters-shutterstock_1207415518-1024x683.jpg 1024w, https://ministryofhemp.com/wp-content/uploads/2017/02/CBD-Letters-shutterstock_1207415518-300x200.jpg 300w, https://ministryofhemp.com/wp-content/uploads/2017/02/CBD-Letters-shutterstock_1207415518-768x512.jpg 768w, https://ministryofhemp.com/wp-content/uploads/2017/02/CBD-Letters-shutterstock_1207415518-1536x1024.jpg 1536w, https://ministryofhemp.com/wp-content/uploads/2017/02/CBD-Letters-shutterstock_1207415518-2048x1365.jpg 2048w, https://ministryofhemp.com/wp-content/uploads/2017/02/CBD-Letters-shutterstock_1207415518-scaled.jpg 1200w" width="1024"><span data-dcnode-id="5093" instrument_node=""> </span><div class="ss-on-media-wrapper ss-top-left-on-media ss-small-icons ss-with-spacing ss-circle-icons" data-dcnode-id="5076" style="display: block;"><span data-dcnode-id="5092" instrument_node="">

</span><div class="ss-pinterest-color ss-pinit-button ss-ss-on-media-button" data-dcnode-id="5082" data-ss-ss-link="https://pinterest.com/pin/create/button/?url=https%3A%2F%2Fministryofhemp.com%2Fblog%2Fcbd-oil-side-effects%2F&amp;media=http://ministryofhemp.com/wp-content/uploads/2017/02/CBD-Letters-shutterstock_1207415518-1024x683.jpg&amp;description=With%20all%20the%20attention%20CBD%20has%20been%20getting%2C%20it%E2%80%99s%20easy%20to%20find%20information%20on%20all%20its%20benefits%20--%20but%20is%20there%20a%20downside%3F%20Does%20CBD%20have%20any%20side%20effects%3FEven%20here%20at%20Ministry%20of%20Hemp%2C%20we%E2%80%99ve%20focused%20a%20lot%20on%20exploring%20the%20benefits%20of%20CBD%20oil%20and%20the%20endocannabinoid%20system%20over%20the%20past%20few%20months.%20Yet%2C%20so%20much%20has%20been%20written%20about%20how%20CBD%20is%20helping%20people%20that%20we%20wanted%20to%20take%20a%20look%20at%20its%20potential%20drawbacks%20too.To%20create%20this%20article%2C%20we%20looked%20at%20both%20scientific%20research%20and%20anecdotal%20reports%20from%20CBD%20users.%20You%20can%27t%20overdose%20on%20CBD%20and%2C%20from%20our%20in-depth%20research%2C%20the%20side%20effects%20of%20CBD%20oil%20are%20usually%20minor%2C%20and%2C%20for%20most%20people%2C%20the%20benefits%20far%20outweigh%20the%20rare%20reports%20of%20discomfort.Table%20of%20ContentsIs%20CBD%20Safe%3F%C2%A0What%20CBD%20Oil%20Studies%20Have%20Found%20About%20Side%20EffectsCould%20High%20CBD%20Dosage%20Have%20Side%20Effects%3F%20Can%20CBD%20Interfere%20With%20Pharmaceutical%20Drugs%3FWhy%20There%27s%20Limited%20Research%20On%20Hemp%20CBDWhat%20You%20Should%20Look%20For%20When%20Buying%20CBDOverall%2C%20our%20research%20suggests%20that%2C%20just%20as%20with%20any%20health%20supplement%2C%20the%20quality%20and%20source%20of%20your%20CBD%20oil%20can%20make%20a%20big%20difference%20when%20it%20comes%20to%20side%20effects.%20In%20fact%2C%20many%20unpleasant%20experiences%20from%20CBD%20reported%20by%20consumers%20could%20be%20due%20to%20impurities%20or%20poor%20quality%20CBD%20oil%2C%20as%20we%27ll%20discuss%20later%20in%20this%20article.Is%20CBD%20safe%20and%20does%20it%20have%20side%20effects%3FIf%20you%20feel%20unpleasant%20effects%20from%20any%20supplement%2C%20it%27s%20better%20to%20take%20a%20break%20and%2C%20when%20in%20doubt%2C%20consult%20your%20doctor.%20Keep%20reading%20to%20learn%20more%20about%20the%20safety%20of%20CBD%2C%20and%20read%20about%20some%20common%20side%20effects%20and%20potential%20drug%20interactions.%20Is%20CBD%20safe%3F%20The%20World%20Health%20Organization%20Says%20YesIt%27s%20worth%20noting%20that%20even%20psychoactive%20cannabis%20--%20what%E2%80%99s%20often%20called%20%22marijuana%22%20--%20is%20also%20considered%20to%20be%20extremely%20safe%2C%20contrary%20to%20what%20the%20government%20wants%20us%20to%20believe.%20It%27s%20so%20safe%20that%20it%27s%20basically%20impossible%20for%20an%20adult%20human%20to%20ingest%20a%20fatal%20dose%2C%20although%20they%20can%20certainly%20make%20themselves%20feel%20very%20sick%20from%20eating%20or%20smoking%20too%20much.%20There%27s%20every%20reason%20to%20believe%20that%20CBD%20extracts%20from%20hemp%20plants%20are%20as%20safe%2C%20or%20even%20safer%2C%20than%20psychoactive%20strains%20of%20cannabis.In%202017%2C%20the%20World%20Health%20Organization%20declared%20CBD%20to%20be%20safe.In%202017%2C%20the%20World%20Health%20Organization%20ruled%20that%20CBD%20is%20safe%20with%20no%20potential%20for%20abuse.%20Since%20that%20time%2C%20various%20global%20and%20national%20authorities%20have%20come%20to%20support%20the%20use%20of%20CBD.%20For%20example%2C%20while%20some%20athletes%20are%20still%20banned%20from%20using%20CBD%2C%20depending%20on%20the%20sport%2C%20the%20World%20Anti-Doping%20Authority%20removed%20CBD%20from%20its%20list%20of%20banned%20substances%20that%20same%20year%2C%20and%20the%20USADA%20followed%20suit%20in%202018.It%27s%20worth%20noting%20that%20the%20FDA%20doesn%27t%20regulate%20CBD%2C%20though%20they%20do%20issue%20warnings%20to%20companies%20that%20blatantly%20break%20the%20law.%20Typically%2C%20these%20companies%20made%20outlandish%20claims%20about%20the%20supplement%27s%20abilities.%20In%20late%202019%2C%20the%20FDA%20issued%20some%20guidance%2C%20including%20safety%20concerns%20about%20CBD.%20According%20to%20the%20FDA%2C%20more%20research%20is%20needed%20to%20definitively%20prove%20that%20CBD%20is%20safe.%20But%20it%27s%20worth%20noting%20the%20findings%20of%20global%20authorities%20like%20the%20WHO%2C%20and%20the%20safe%20results%20found%20in%20the%20studies%20we%20outline%20below.%20%20CBD%20oil%20studies%20find%20few%20side%20effectsAlthough%20the%20medical%20research%20is%20still%20in%20its%20preliminary%20stages%2C%20scientists%20have%20devoted%20considerable%20effort%20to%20proving%20that%20CBD%20oil%20is%20safe%20for%20human%20consumption.A%20study%20published%20in%201986%20in%20the%20International%20Journal%20of%20Neuroscience%2C%20examined%20the%20effects%20of%20CBD%20oil%20in%205%20patients%20with%20dystonic%20movement%20disorders%20%28muscle%20tremors%20and%20other%20forms%20of%20uncontrollable%20movements%29.%20CBD%20oil%27s%20side%20effects%20%22were%20mild%20and%20included%20hypotension%20%5Blow%20blood%20pressure%5D%2C%20dry%20mouth%2C%20psychomotor%20slowing%20%5Bslowed%20thoughts%20or%20movements%5D%2C%20lightheadedness%2C%20and%20sedation%2C%22%20according%20to%20the%20study%27s%20authors%2C%20Paul%20Consroe%2C%20Reuven%20Sandyk%20and%20Stuart%20R.%20Snider.According%20to%20this%20study%2C%20CBD%20seemed%20to%20help%20people%20with%20their%20dystonia%2C%20but%20might%20have%20made%20some%20symptoms%20of%20Parkinson%27s%20Disease%20%28found%20in%202%20of%20the%20study%27s%20subjects%29%20a%20little%20bit%20worse.%20However%2C%20other%2C%20more%20recent%20research%20has%20found%20that%20CBD%20can%20benefit%20Parkinson%27s%20patients.Most%20studies%20into%20CBD%20oil%20show%20few%20side%20effects%2C%20mostly%20minor%20ones%20like%20sleepiness%20or%20mild%20sedation.One%20study%20of%208%20healthy%20volunteers%20and%2015%20patients%20with%20epilepsy%2C%20published%20in%201980%20in%20Pharmacology%2C%20looked%20at%20the%20side-effects%20of%20CBD%20when%20consumed%20daily%20for%20a%20month.%20%22All%20patients%20and%20volunteers%20tolerated%20CBD%20very%20well%20and%20no%20signs%20of%20toxicity%20or%20serious%20side%20effects%20were%20detected%20on%20examination%2C%22%20wrote%20the%20researchers%2C%20who%20also%20found%20that%20CBD%20can%20help%20some%20people%20with%20epilepsy.Consuming%20higher%20dosage%20of%20CBD%20caused%20no%20toxicityIn%202006%2C%20a%20group%20of%20researchers%20studying%20the%20potential%20benefits%20of%20CBD%20in%20treating%20psychosis%20and%20anxiety%2C%20looked%20at%20several%20studies%20of%20CBD%20oil%27s%20safety%20and%20summarized%20their%20findings%20in%20a%20paper%20published%20by%20the%20Brazilian%20Journal%20of%20Medical%20and%20Biological%20Research.%20Noting%20that%20CBD%20safety%20was%20first%20proven%20through%20animal%20research%2C%20the%20scientists%20added%3A%22Therefore%20...%20the%20available%20clinical%20data%20suggest%20that%20CBD%20can%20be%20safely%20administered%20over%20a%20wide%20dose%20range.%22Brazilian%20Journal%20of%20Medical%20and%20Biological%20Research%22Acute%20CBD%20administration%20by%20the%20oral%2C%20inhalatory%20or%20intravenous%20route%20did%20not%20induce%20any%20significant%20toxic%20effect%20in%20humans.%20In%20addition%2C%20chronic%20administration%20of%20CBD%20for%2030%20days%20to%20healthy%20volunteers%2C%20at%20daily%20doses%20ranging%20from%2010%20to%20400%20mg%2C%20failed%20to%20induce%20any%20significant%20alteration%20in%20neurological%2C%20psychiatric%20or%20clinical%20exams.%20Finally%2C%20in%20patients%20suffering%20from%20Huntington%27s%20disease%2C%20daily%20doses%20of%20CBD%20%28700%20mg%29%20for%206%20weeks%20did%20not%20induce%20any%20toxicity.%20Therefore%2C%20confirming%20results%20from%20animal%20studies%2C%20the%20available%20clinical%20data%20suggest%20that%20CBD%20can%20be%20safely%20administered%20over%20a%20wide%20dose%20range.%22A%202007%20study%20published%20in%20Phytomedicine%20found%20that%20CBD%2C%20along%20with%20other%20similar%20substances%20including%20THC%20%28the%20main%20active%20ingredient%20in%20psychoactive%20cannabis%29%2C%20have%20potential%20as%20an%20anticoagulant%2C%20so%20people%20with%20who%20have%20diseases%20like%20hemophilia%20that%20cause%20problems%20with%20blood%20clotting%20should%20use%20extra%20caution%20with%20these%20substances.Are%20there%20concerns%20about%20liver%20toxicity%3FWe%20wrote%20above%20that%20the%20FDA%20raised%20concerns%20about%20liver%20damage%20from%20CBD.%20In%20reality%2C%20this%20is%20an%20area%20where%20we%20need%20more%20research.%20Thousands%20of%20people%20take%20CBD%20everyday%20without%20showing%20signs%20of%20liver%20damage%20and%2C%20as%20we%20write%20in%20this%20guide%20and%20elsewhere%2C%20a%20lot%20of%20research%20shows%20CBD%20to%20be%20very%20safe%20for%20human%20consumption%20even%20at%20very%20high%20doses.On%20the%20other%20hand%2C%20a%20very%20limited%20amount%20of%20research%20suggests%20liver%20damage%20is%20possible%20at%20high%20doses%20of%20concentrated%20CBD.%20For%20example%2C%20a%20very%20small%20study%20%2816%20participants%29%20showed%20that%2044%25%20of%20participants%20%287%29%20had%20elevated%20values%20of%20some%20liver%20enzymes.%20It%27s%20important%20to%20note%20that%20the%20dosage%20in%20these%20studies%20%281500mg%20of%20CBD%20per%20day%29%20far%20exceeds%20the%20amount%20consumed%20by%20almost%20all%20CBD%20users.%20This%20would%20be%20the%20same%20as%20consuming%20multiple%20bottles%20a%20day%20of%20some%20lower%20strength%20CBD%20supplements.For%20now%2C%20there%27s%20still%20no%20reason%20to%20believe%20normal%20use%20of%20CBD%20supplements%20poses%20any%20serious%20risk%20to%20your%20liver%2C%20but%20when%20in%20doubt%20check%20with%20your%20doctor.%20CBD%2C%20grapefruit%20and%20pharmaceutical%20drugsThere%27s%20an%20unexpected%20connection%20between%20CBD%20oil%20and%20grapefruit%2C%20the%20citrus%20fruit%20that%27s%20a%20popular%20breakfast%20choice.%20That%20connection%3F%20It%27s%20possible%20that%2C%20like%20grapefruit%2C%20CBD%20could%20interfere%20with%20certain%20medications.How%20is%20CBD%20like%20grapefruit%3F%20Both%20could%20interact%20with%20some%20pharmaceutical%20drugs.Grapefruit%20can%20actually%20interfere%20with%20the%20absorption%20of%20some%20common%20drugs%2C%20potentially%20resulting%20in%20unbalanced%20or%20dangerous%20levels%20of%20the%20drug%20in%20a%20person%27s%20bloodstream.%20There%27s%20quite%20a%20list%20of%20affected%20drugs%2C%20including%20some%20cholesterol-reducing%20drugs%20as%20well%20as%20some%20psychiatric%20medications.%20This%20connection%20is%20well%20known%20and%2C%20in%20most%20cases%2C%20your%20doctor%20would%20tell%20you%20if%20you%20need%20to%20avoid%20grapefruit.%20When%20in%20doubt%2C%20you%20can%20use%20a%20drug%20interaction%20checker%20online%20or%20check%20with%20your%20doctor%20or%20pharmacist.%20The%20possible%20connection%20with%20CBD%20is%20less%20well-known%2C%20and%20also%20less%20well-established.%20However%2C%20some%20preliminary%20clinical%20research%20suggests%20grapefruit%20and%20CBD%20could%20affect%20the%20same%20enzymes%2C%20meaning%20CBD%20should%20be%20avoided%20with%20the%20same%20medications.%20However%2C%20it%27s%20important%20to%20note%20that%20the%20clinical%20studies%20where%20this%20connection%20was%20found%20involve%20much%20higher%20doses%20of%20CBD%20than%20people%20typically%20take%20at%20home.%20Even%20so%2C%20it%27s%20better%20to%20be%20safe%20than%20sorry.%20If%20you%27re%20supposed%20to%20avoid%20grapefruit%2C%20or%20you%27re%20concerned%20about%20potential%20interactions%2C%20check%20with%20a%20medical%20professional%20before%20starting%20or%20continuing%20to%20take%20CBD.%20An%20anecdotal%20look%20at%20CBD%20Oil%20side%20effects%20shows%20quality%20mattersOf%20course%2C%20since%20many%20of%20these%20studies%20have%20small%20sample%20sizes%2C%20and%20every%20person%20reacts%20a%20little%20bit%20differently%20to%20any%20substance%2C%20we%20looked%20at%20CBD%20oil%20users%27%20anecdotal%20reports%2C%20posted%20on%20popular%20online%20communities%20and%20forums%2C%20such%20as%20Reddit%20and%20sites%20that%20sell%20CBD%20products.A%20handful%20of%20very%20sensitive%20people%20who%20use%20CBD%20oil%20report%20feeling%20mild%20mood%20and%20mind-altering%20effects%2C%20similar%20to%20a%20low%20dose%20of%20psychoactive%20cannabis%2C%20but%20these%20effects%20appear%20to%20be%20rare.%20Some%20people%20also%20reported%20mild%20digestive%20upset%2C%20including%20diarrhea%2C%20from%20ingesting%20CBD%20oil.According%20to%20one%20post%20on%20Reddit%2C%20some%20people%20get%20headaches%20from%20using%20CBD%20oil%2C%20which%20is%20a%20bit%20unusual%20since%20CBD%20can%20also%20sometimes%20be%20used%20to%20treat%20migraines.%20However%2C%20other%20Redditors%20have%20suggested%20the%20problem%20was%20actually%20the%20purity%20of%20the%20CBD%20extract.%22I%20have%20just%20recently%20started%20taking%20CBD%20for%20headaches%2C%20and%20after%20three%20weeks%20of%20getting%20a%20worse%20headaches%2C%20I%20finally%20figured%20out%20that%20my%20CBD%20oil%20was%20cheap%20crap%20--%20and%20that%20a%20LOT%20of%20it%20is%2C%22%20a%20Redditor%20named%20Pellquin.The%20War%20on%20Drugs%20hurts%20cannabis%20%26%20hemp%20researchDue%20to%20the%20the%20stigma%20associated%20with%20the%20war%20on%20drugs%2C%20free%20and%20open%20research%20into%20both%20hemp%20and%20its%20close%20relative%2C%20psychoactive%20cannabis%2C%20is%20only%20just%20beginning%20in%20many%20ways.For%20example%2C%20the%20first%20study%20into%20the%20benefits%20of%20cannabis%20in%20veterans%20with%20otherwise%20untreatable%20post-traumatic%20stress%20disorder%20began%20in%202017%2C%20but%20only%20after%20the%20researchers%20struggled%20through%20years%20of%20red%20tape%20and%20put%20their%20careers%20at%20risk%20in%20order%20to%20do%20promote%20the%20need%20for%20this%20vital%20research.%20Fortunately%2C%20their%20work%2C%20and%20that%20of%20others%20like%20them%2C%20have%20begun%20to%20peel%20back%20the%20bureaucracy%20preventing%20scientific%20research.On%20the%20hemp%20side%20of%20the%20equation%2C%20the%202018%20Farm%20Bill%20fully%20legalized%20the%20growth%20and%20sales%20of%20agricultural%20hemp%20in%20the%20U.S.%2C%20and%20the%20production%20of%20its%20derivatives%20like%20CBD%20oil.%20We%20hope%20this%20finally%20opens%20the%20way%20for%20research%20into%20the%20benefits%20and%20possibilities%20of%20hemp%20in%20all%20its%20forms.%20While%20this%20article%20summarizes%20some%20of%20what%20we%27ve%20found%20from%20our%20research%20into%20CBD%20side%20effects%2C%20we%20expect%20to%20see%20a%20lot%20more%20research%20in%20this%20field%20in%20the%20years%20to%20come.Want%20to%20learn%20more%20about%20CBD%3F%20Download%20a%20PDF%20version%20of%20%27The%20Complete%20CBD%20Guide%27%5Bmc4wp_form%20id%3D%221833%22%5DWhen%20it%20comes%20to%20CBD%2C%20purity%20%26%20source%20mattersThat%20redditor%20had%20it%20right%3A%20there%27s%20a%20lot%20of%20poor%20quality%20CBD%20oil%20from%20unreliable%20brands.%20Some%20especially%20bad%20products%20may%20even%20include%20unexpected%20ingredients.%20The%20CBD%20oil%20market%20is%20still%20in%20its%20infancy%2C%20and%20it%20can%20be%20challenging%20for%20consumers%20to%20educate%20themselves%20except%20through%20expensive%20trial%20and%20error.%20When%20Ministry%20of%20Hemp%20investigated%20CBD%20oil%20purity%20and%20safety%2C%20we%20found%20a%20host%20of%20potential%20problems.CBD%20oil%20is%20an%20unregulated%20market.%20Since%20hemp%20absorbs%20chemicals%20from%20the%20ground%2C%20including%20lead%20and%20mercury%2C%20growing%20conditions%20can%20make%20a%20big%20difference.%20Labeling%20of%20CBD%20products%20is%20also%20often%20inconsistent%20and%20unclear%2C%20making%20it%20confusing%20for%20CBD%20consumers%20to%20know%20what%20they%27re%20buying.When%20we%20interviewed%20Carlos%20Frias%2C%20founder%20of%20Green%20Lotus%20and%20a%20cannabis%20industry%20expert%2C%20he%20gave%20us%20three%20pieces%20of%20advice%20for%20buying%20CBD%20oil%3AAlways%20ask%20for%20third-party%20lab%20results%20when%20buying%20CBD%20oilPay%20close%20attention%20to%20product%20labelingDon%27t%20hesitate%20to%20ask%20a%20more%20knowledgeable%20expert%20for%20help.CBD%20is%20safe%2C%20but%20research%20before%20you%20buy%20%26%20useIf%20you%20want%20CBD%20to%20work%20without%20unpleasant%20side%20effects%2C%20buy%20your%20CBD%20from%20a%20reliable%20and%20trusted%20source.Overall%2C%20we%20found%20that%20scientists%20and%20doctors%20consider%20CBD%20oil%20to%20be%20safe%20for%20most%20people%20to%20use%2C%20and%20there%20are%20few%2C%20if%20any%2C%20serious%20side%20effects.While%20everyone%20has%20their%20own%20unique%20body%20chemistry%2C%20it%20seems%20like%20the%20vast%20majority%20of%20people%20can%20ingest%20CBD%20oil%20without%20ever%20feeling%20any%20unpleasant%20side%20effects%20at%20all%2C%20and%20the%20remaining%20few%20will%20mostly%20likely%20experience%20only%20minor%20symptoms%20like%20stomach%20upset%20or%20dry%20mouth.%20Since%20scientists%20are%20using%20pure%20extracts%20from%20known%20sources%2C%20it%27s%20likely%20that%20some%20consumer%20reports%20of%20headaches%20or%20other%20minor%20adverse%20reactions%20could%20be%20due%20to%20impurities%20in%20inferior%20CBD%20products.As%20always%2C%20you%20should%20closely%20research%20the%20products%20you%20buy.%20Look%20for%20CBD%20oil%20reviews%20and%20other%20information%20on%20our%20site%2C%20or%20reliable%20websites%20like%20ours.%20And%20never%20hesitate%20to%20consult%20with%20a%20medical%20expert%20if%20you%20have%20any%20doubt%20about%20the%20best%20or%20safest%20way%20to%20use%20CBD%20oil." data-ss-ss-location="on_media" data-ss-ss-network-id="pinterest" data-ss-ss-type="share"><span data-dcnode-id="5089" instrument_node="">

</span></span></div><figcaption data-dcnode-id="5071"><span data-dcnode-id="5072" instrument_node="">Is CBD safe and does it have side effects?</span></figcaption></figure><span data-dcnode-id="5069" instrument_node="">
</span><p data-dcnode-id="5067"><span data-dcnode-id="5068" instrument_node="">If you feel unpleasant effects from any supplement, it’s better to take a break and, when in doubt, consult your doctor. Keep reading to learn more about the safety of CBD, and read about some common side effects and potential drug interactions. </span></p><span data-dcnode-id="5066" instrument_node="">
</span><a data-dcnode-id="5065" data-lasso-id="5599" href="#" name="safe"></a><span data-dcnode-id="5064" instrument_node="">
</span><h2 data-dcnode-id="5062" id="h-is-cbd-safe-the-world-health-organization-says-yes"><span data-dcnode-id="5063" instrument_node="">Is CBD safe? The World Health Organization Says Yes</span></h2><span data-dcnode-id="5061" instrument_node="">
</span><p data-dcnode-id="5056"><span data-dcnode-id="5060" instrument_node="">It’s worth noting that even psychoactive cannabis — what’s often called </span><a data-dcnode-id="5058" data-lasso-id="5600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//norml.org/marijuana/library/marijuana-a-primer/" rel="noopener" target="_blank"><span data-dcnode-id="5059" instrument_node="">“marijuana” — is also considered to be extremely safe</span></a><span data-dcnode-id="5057" instrument_node="">, contrary to what the government wants us to believe. </span></p><span data-dcnode-id="5055" instrument_node="">
</span><p data-dcnode-id="5053"><span data-dcnode-id="5054" instrument_node="">It’s so safe that it’s basically impossible for an adult human to ingest a fatal dose, although they can certainly make themselves feel very sick from eating or smoking too much. There’s every reason to believe that CBD extracts from hemp plants are as safe, or even safer, than psychoactive strains of cannabis.</span></p><span data-dcnode-id="5052" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="5049"><p data-dcnode-id="5050"><span data-dcnode-id="5051" instrument_node="">In 2017, the World Health Organization declared CBD to be safe.</span></p></blockquote><span data-dcnode-id="5048" instrument_node="">
</span><p data-dcnode-id="5040"><span data-dcnode-id="5047" instrument_node="">In 2017, the </span><a data-dcnode-id="5045" data-lasso-id="5601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ministryofhemp.com/blog/world-health-organization-cbd/" rel="noopener" target="_blank"><span data-dcnode-id="5046" instrument_node="">World Health Organization ruled that CBD is safe</span></a><span data-dcnode-id="5044" instrument_node=""> with no potential for abuse. Since that time, various global and national authorities have come to support the use of CBD. For example, while some athletes are still banned from using CBD, depending on the sport, the </span><a data-dcnode-id="5042" data-lasso-id="5602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ministryofhemp.com/blog/athletes-use-cbd/" rel="noopener" target="_blank"><span data-dcnode-id="5043" instrument_node="">World Anti-Doping Authority removed CBD</span></a><span data-dcnode-id="5041" instrument_node=""> from its list of banned substances that same year, and the USADA followed suit in 2018.</span></p><span data-dcnode-id="5039" instrument_node="">
</span><p data-dcnode-id="5031"><span data-dcnode-id="5038" instrument_node="">It’s worth noting that the </span><a data-dcnode-id="5036" data-lasso-id="5603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ministryofhemp.com/blog/fda-cbd-2019/"><span data-dcnode-id="5037" instrument_node="">FDA doesn’t regulate CBD</span></a><span data-dcnode-id="5035" instrument_node="">, though they do issue warnings to companies that blatantly break the law. Typically, these companies made outlandish claims about the supplement’s abilities. In late 2019, the FDA issued some guidance, including </span><a data-dcnode-id="5033" data-lasso-id="5604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fda.gov/consumers/consumer-updates/what-you-need-know-and-what-were-working-find-out-about-products-containing-cannabis-or-cannabis" rel="noopener" target="_blank"><span data-dcnode-id="5034" instrument_node="">safety concerns about CBD</span></a><span data-dcnode-id="5032" instrument_node="">. According to the FDA, more research is needed to definitively prove that CBD is safe. But it’s worth noting the findings of global authorities like the WHO, and the safe results found in the studies we outline below.  </span></p><span data-dcnode-id="5030" instrument_node="">
</span><a data-dcnode-id="5029" data-lasso-id="5605" href="#" name="studies"></a><span data-dcnode-id="5028" instrument_node="">
</span><h2 data-dcnode-id="5026" id="h-cbd-oil-studies-find-few-side-effects"><span data-dcnode-id="5027" instrument_node="">CBD oil studies find few side effects</span></h2><span data-dcnode-id="5025" instrument_node="">
</span><p data-dcnode-id="5023"><span data-dcnode-id="5024" instrument_node="">Although the medical research is still in its preliminary stages, scientists have devoted considerable effort to proving that CBD oil is safe for human consumption.</span></p><span data-dcnode-id="5022" instrument_node="">
</span><p data-dcnode-id="5017"><span data-dcnode-id="5021" instrument_node="">A study published in 1986 in the International Journal of Neuroscience, examined the effects of </span><a data-dcnode-id="5019" data-lasso-id="5606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/doi/abs/10.3109/00207458608985678" rel="nofollow noopener" target="_blank"><span data-dcnode-id="5020" instrument_node="">CBD oil in 5 patients with dystonic movement disorders</span></a><span data-dcnode-id="5018" instrument_node=""> (muscle tremors and other forms of uncontrollable movements). CBD oil’s side effects “were mild and included hypotension [low blood pressure], dry mouth, psychomotor slowing [slowed thoughts or movements], lightheadedness, and sedation,” according to the study’s authors, Paul Consroe, Reuven Sandyk and Stuart R. Snider.</span></p><span data-dcnode-id="5016" instrument_node="">
</span><p data-dcnode-id="5011"><span data-dcnode-id="5015" instrument_node="">According to this study, CBD seemed to help people with their dystonia, but might have made some symptoms of Parkinson’s Disease (found in 2 of the study’s subjects) a little bit worse. However, other, more recent research has found that </span><a data-dcnode-id="5013" data-lasso-id="5607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medicalmarijuanainc.com/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="5014" instrument_node="">CBD can benefit Parkinson’s patients</span></a><span data-dcnode-id="5012" instrument_node="">.</span></p><span data-dcnode-id="5010" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4985"><div class="ss-on-media-container wp-image-59082" data-dcnode-id="4988" style="display: inline;"><span class="ss-on-media-image-wrap wp-image-59082" data-dcnode-id="4989"><img alt="Most studies into CBD oil show few side effects, mostly minor ones like sleepiness or mild sedation. Photo shows hemp leaves near two beakers of green liquid, depicting hemp and CBD research." class="ss-on-media-img wp-image-59082" data-dcnode-id="5009" height="632" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ministryofhemp.com/wp-content/uploads/2019/11/Hemp-Research-shutterstock_502681951-1024x632.jpg&amp;raw" srcset="https://ministryofhemp.com/wp-content/uploads/2019/11/Hemp-Research-shutterstock_502681951-1024x632.jpg 1024w, https://ministryofhemp.com/wp-content/uploads/2019/11/Hemp-Research-shutterstock_502681951-300x185.jpg 300w, https://ministryofhemp.com/wp-content/uploads/2019/11/Hemp-Research-shutterstock_502681951-768x474.jpg 768w, https://ministryofhemp.com/wp-content/uploads/2019/11/Hemp-Research-shutterstock_502681951-1536x948.jpg 1536w, https://ministryofhemp.com/wp-content/uploads/2019/11/Hemp-Research-shutterstock_502681951-2048x1264.jpg 2048w, https://ministryofhemp.com/wp-content/uploads/2019/11/Hemp-Research-shutterstock_502681951-scaled.jpg 1297w" width="1024"><span data-dcnode-id="5008" instrument_node=""> </span><div class="ss-on-media-wrapper ss-top-left-on-media ss-small-icons ss-with-spacing ss-circle-icons" data-dcnode-id="4991" style="display: block;"><span data-dcnode-id="5007" instrument_node="">

</span><div class="ss-pinterest-color ss-pinit-button ss-ss-on-media-button" data-dcnode-id="4997" data-ss-ss-link="https://pinterest.com/pin/create/button/?url=https%3A%2F%2Fministryofhemp.com%2Fblog%2Fcbd-oil-side-effects%2F&amp;media=http://ministryofhemp.com/wp-content/uploads/2019/11/Hemp-Research-shutterstock_502681951-1024x632.jpg&amp;description=With%20all%20the%20attention%20CBD%20has%20been%20getting%2C%20it%E2%80%99s%20easy%20to%20find%20information%20on%20all%20its%20benefits%20--%20but%20is%20there%20a%20downside%3F%20Does%20CBD%20have%20any%20side%20effects%3FEven%20here%20at%20Ministry%20of%20Hemp%2C%20we%E2%80%99ve%20focused%20a%20lot%20on%20exploring%20the%20benefits%20of%20CBD%20oil%20and%20the%20endocannabinoid%20system%20over%20the%20past%20few%20months.%20Yet%2C%20so%20much%20has%20been%20written%20about%20how%20CBD%20is%20helping%20people%20that%20we%20wanted%20to%20take%20a%20look%20at%20its%20potential%20drawbacks%20too.To%20create%20this%20article%2C%20we%20looked%20at%20both%20scientific%20research%20and%20anecdotal%20reports%20from%20CBD%20users.%20You%20can%27t%20overdose%20on%20CBD%20and%2C%20from%20our%20in-depth%20research%2C%20the%20side%20effects%20of%20CBD%20oil%20are%20usually%20minor%2C%20and%2C%20for%20most%20people%2C%20the%20benefits%20far%20outweigh%20the%20rare%20reports%20of%20discomfort.Table%20of%20ContentsIs%20CBD%20Safe%3F%C2%A0What%20CBD%20Oil%20Studies%20Have%20Found%20About%20Side%20EffectsCould%20High%20CBD%20Dosage%20Have%20Side%20Effects%3F%20Can%20CBD%20Interfere%20With%20Pharmaceutical%20Drugs%3FWhy%20There%27s%20Limited%20Research%20On%20Hemp%20CBDWhat%20You%20Should%20Look%20For%20When%20Buying%20CBDOverall%2C%20our%20research%20suggests%20that%2C%20just%20as%20with%20any%20health%20supplement%2C%20the%20quality%20and%20source%20of%20your%20CBD%20oil%20can%20make%20a%20big%20difference%20when%20it%20comes%20to%20side%20effects.%20In%20fact%2C%20many%20unpleasant%20experiences%20from%20CBD%20reported%20by%20consumers%20could%20be%20due%20to%20impurities%20or%20poor%20quality%20CBD%20oil%2C%20as%20we%27ll%20discuss%20later%20in%20this%20article.Is%20CBD%20safe%20and%20does%20it%20have%20side%20effects%3FIf%20you%20feel%20unpleasant%20effects%20from%20any%20supplement%2C%20it%27s%20better%20to%20take%20a%20break%20and%2C%20when%20in%20doubt%2C%20consult%20your%20doctor.%20Keep%20reading%20to%20learn%20more%20about%20the%20safety%20of%20CBD%2C%20and%20read%20about%20some%20common%20side%20effects%20and%20potential%20drug%20interactions.%20Is%20CBD%20safe%3F%20The%20World%20Health%20Organization%20Says%20YesIt%27s%20worth%20noting%20that%20even%20psychoactive%20cannabis%20--%20what%E2%80%99s%20often%20called%20%22marijuana%22%20--%20is%20also%20considered%20to%20be%20extremely%20safe%2C%20contrary%20to%20what%20the%20government%20wants%20us%20to%20believe.%20It%27s%20so%20safe%20that%20it%27s%20basically%20impossible%20for%20an%20adult%20human%20to%20ingest%20a%20fatal%20dose%2C%20although%20they%20can%20certainly%20make%20themselves%20feel%20very%20sick%20from%20eating%20or%20smoking%20too%20much.%20There%27s%20every%20reason%20to%20believe%20that%20CBD%20extracts%20from%20hemp%20plants%20are%20as%20safe%2C%20or%20even%20safer%2C%20than%20psychoactive%20strains%20of%20cannabis.In%202017%2C%20the%20World%20Health%20Organization%20declared%20CBD%20to%20be%20safe.In%202017%2C%20the%20World%20Health%20Organization%20ruled%20that%20CBD%20is%20safe%20with%20no%20potential%20for%20abuse.%20Since%20that%20time%2C%20various%20global%20and%20national%20authorities%20have%20come%20to%20support%20the%20use%20of%20CBD.%20For%20example%2C%20while%20some%20athletes%20are%20still%20banned%20from%20using%20CBD%2C%20depending%20on%20the%20sport%2C%20the%20World%20Anti-Doping%20Authority%20removed%20CBD%20from%20its%20list%20of%20banned%20substances%20that%20same%20year%2C%20and%20the%20USADA%20followed%20suit%20in%202018.It%27s%20worth%20noting%20that%20the%20FDA%20doesn%27t%20regulate%20CBD%2C%20though%20they%20do%20issue%20warnings%20to%20companies%20that%20blatantly%20break%20the%20law.%20Typically%2C%20these%20companies%20made%20outlandish%20claims%20about%20the%20supplement%27s%20abilities.%20In%20late%202019%2C%20the%20FDA%20issued%20some%20guidance%2C%20including%20safety%20concerns%20about%20CBD.%20According%20to%20the%20FDA%2C%20more%20research%20is%20needed%20to%20definitively%20prove%20that%20CBD%20is%20safe.%20But%20it%27s%20worth%20noting%20the%20findings%20of%20global%20authorities%20like%20the%20WHO%2C%20and%20the%20safe%20results%20found%20in%20the%20studies%20we%20outline%20below.%20%20CBD%20oil%20studies%20find%20few%20side%20effectsAlthough%20the%20medical%20research%20is%20still%20in%20its%20preliminary%20stages%2C%20scientists%20have%20devoted%20considerable%20effort%20to%20proving%20that%20CBD%20oil%20is%20safe%20for%20human%20consumption.A%20study%20published%20in%201986%20in%20the%20International%20Journal%20of%20Neuroscience%2C%20examined%20the%20effects%20of%20CBD%20oil%20in%205%20patients%20with%20dystonic%20movement%20disorders%20%28muscle%20tremors%20and%20other%20forms%20of%20uncontrollable%20movements%29.%20CBD%20oil%27s%20side%20effects%20%22were%20mild%20and%20included%20hypotension%20%5Blow%20blood%20pressure%5D%2C%20dry%20mouth%2C%20psychomotor%20slowing%20%5Bslowed%20thoughts%20or%20movements%5D%2C%20lightheadedness%2C%20and%20sedation%2C%22%20according%20to%20the%20study%27s%20authors%2C%20Paul%20Consroe%2C%20Reuven%20Sandyk%20and%20Stuart%20R.%20Snider.According%20to%20this%20study%2C%20CBD%20seemed%20to%20help%20people%20with%20their%20dystonia%2C%20but%20might%20have%20made%20some%20symptoms%20of%20Parkinson%27s%20Disease%20%28found%20in%202%20of%20the%20study%27s%20subjects%29%20a%20little%20bit%20worse.%20However%2C%20other%2C%20more%20recent%20research%20has%20found%20that%20CBD%20can%20benefit%20Parkinson%27s%20patients.Most%20studies%20into%20CBD%20oil%20show%20few%20side%20effects%2C%20mostly%20minor%20ones%20like%20sleepiness%20or%20mild%20sedation.One%20study%20of%208%20healthy%20volunteers%20and%2015%20patients%20with%20epilepsy%2C%20published%20in%201980%20in%20Pharmacology%2C%20looked%20at%20the%20side-effects%20of%20CBD%20when%20consumed%20daily%20for%20a%20month.%20%22All%20patients%20and%20volunteers%20tolerated%20CBD%20very%20well%20and%20no%20signs%20of%20toxicity%20or%20serious%20side%20effects%20were%20detected%20on%20examination%2C%22%20wrote%20the%20researchers%2C%20who%20also%20found%20that%20CBD%20can%20help%20some%20people%20with%20epilepsy.Consuming%20higher%20dosage%20of%20CBD%20caused%20no%20toxicityIn%202006%2C%20a%20group%20of%20researchers%20studying%20the%20potential%20benefits%20of%20CBD%20in%20treating%20psychosis%20and%20anxiety%2C%20looked%20at%20several%20studies%20of%20CBD%20oil%27s%20safety%20and%20summarized%20their%20findings%20in%20a%20paper%20published%20by%20the%20Brazilian%20Journal%20of%20Medical%20and%20Biological%20Research.%20Noting%20that%20CBD%20safety%20was%20first%20proven%20through%20animal%20research%2C%20the%20scientists%20added%3A%22Therefore%20...%20the%20available%20clinical%20data%20suggest%20that%20CBD%20can%20be%20safely%20administered%20over%20a%20wide%20dose%20range.%22Brazilian%20Journal%20of%20Medical%20and%20Biological%20Research%22Acute%20CBD%20administration%20by%20the%20oral%2C%20inhalatory%20or%20intravenous%20route%20did%20not%20induce%20any%20significant%20toxic%20effect%20in%20humans.%20In%20addition%2C%20chronic%20administration%20of%20CBD%20for%2030%20days%20to%20healthy%20volunteers%2C%20at%20daily%20doses%20ranging%20from%2010%20to%20400%20mg%2C%20failed%20to%20induce%20any%20significant%20alteration%20in%20neurological%2C%20psychiatric%20or%20clinical%20exams.%20Finally%2C%20in%20patients%20suffering%20from%20Huntington%27s%20disease%2C%20daily%20doses%20of%20CBD%20%28700%20mg%29%20for%206%20weeks%20did%20not%20induce%20any%20toxicity.%20Therefore%2C%20confirming%20results%20from%20animal%20studies%2C%20the%20available%20clinical%20data%20suggest%20that%20CBD%20can%20be%20safely%20administered%20over%20a%20wide%20dose%20range.%22A%202007%20study%20published%20in%20Phytomedicine%20found%20that%20CBD%2C%20along%20with%20other%20similar%20substances%20including%20THC%20%28the%20main%20active%20ingredient%20in%20psychoactive%20cannabis%29%2C%20have%20potential%20as%20an%20anticoagulant%2C%20so%20people%20with%20who%20have%20diseases%20like%20hemophilia%20that%20cause%20problems%20with%20blood%20clotting%20should%20use%20extra%20caution%20with%20these%20substances.Are%20there%20concerns%20about%20liver%20toxicity%3FWe%20wrote%20above%20that%20the%20FDA%20raised%20concerns%20about%20liver%20damage%20from%20CBD.%20In%20reality%2C%20this%20is%20an%20area%20where%20we%20need%20more%20research.%20Thousands%20of%20people%20take%20CBD%20everyday%20without%20showing%20signs%20of%20liver%20damage%20and%2C%20as%20we%20write%20in%20this%20guide%20and%20elsewhere%2C%20a%20lot%20of%20research%20shows%20CBD%20to%20be%20very%20safe%20for%20human%20consumption%20even%20at%20very%20high%20doses.On%20the%20other%20hand%2C%20a%20very%20limited%20amount%20of%20research%20suggests%20liver%20damage%20is%20possible%20at%20high%20doses%20of%20concentrated%20CBD.%20For%20example%2C%20a%20very%20small%20study%20%2816%20participants%29%20showed%20that%2044%25%20of%20participants%20%287%29%20had%20elevated%20values%20of%20some%20liver%20enzymes.%20It%27s%20important%20to%20note%20that%20the%20dosage%20in%20these%20studies%20%281500mg%20of%20CBD%20per%20day%29%20far%20exceeds%20the%20amount%20consumed%20by%20almost%20all%20CBD%20users.%20This%20would%20be%20the%20same%20as%20consuming%20multiple%20bottles%20a%20day%20of%20some%20lower%20strength%20CBD%20supplements.For%20now%2C%20there%27s%20still%20no%20reason%20to%20believe%20normal%20use%20of%20CBD%20supplements%20poses%20any%20serious%20risk%20to%20your%20liver%2C%20but%20when%20in%20doubt%20check%20with%20your%20doctor.%20CBD%2C%20grapefruit%20and%20pharmaceutical%20drugsThere%27s%20an%20unexpected%20connection%20between%20CBD%20oil%20and%20grapefruit%2C%20the%20citrus%20fruit%20that%27s%20a%20popular%20breakfast%20choice.%20That%20connection%3F%20It%27s%20possible%20that%2C%20like%20grapefruit%2C%20CBD%20could%20interfere%20with%20certain%20medications.How%20is%20CBD%20like%20grapefruit%3F%20Both%20could%20interact%20with%20some%20pharmaceutical%20drugs.Grapefruit%20can%20actually%20interfere%20with%20the%20absorption%20of%20some%20common%20drugs%2C%20potentially%20resulting%20in%20unbalanced%20or%20dangerous%20levels%20of%20the%20drug%20in%20a%20person%27s%20bloodstream.%20There%27s%20quite%20a%20list%20of%20affected%20drugs%2C%20including%20some%20cholesterol-reducing%20drugs%20as%20well%20as%20some%20psychiatric%20medications.%20This%20connection%20is%20well%20known%20and%2C%20in%20most%20cases%2C%20your%20doctor%20would%20tell%20you%20if%20you%20need%20to%20avoid%20grapefruit.%20When%20in%20doubt%2C%20you%20can%20use%20a%20drug%20interaction%20checker%20online%20or%20check%20with%20your%20doctor%20or%20pharmacist.%20The%20possible%20connection%20with%20CBD%20is%20less%20well-known%2C%20and%20also%20less%20well-established.%20However%2C%20some%20preliminary%20clinical%20research%20suggests%20grapefruit%20and%20CBD%20could%20affect%20the%20same%20enzymes%2C%20meaning%20CBD%20should%20be%20avoided%20with%20the%20same%20medications.%20However%2C%20it%27s%20important%20to%20note%20that%20the%20clinical%20studies%20where%20this%20connection%20was%20found%20involve%20much%20higher%20doses%20of%20CBD%20than%20people%20typically%20take%20at%20home.%20Even%20so%2C%20it%27s%20better%20to%20be%20safe%20than%20sorry.%20If%20you%27re%20supposed%20to%20avoid%20grapefruit%2C%20or%20you%27re%20concerned%20about%20potential%20interactions%2C%20check%20with%20a%20medical%20professional%20before%20starting%20or%20continuing%20to%20take%20CBD.%20An%20anecdotal%20look%20at%20CBD%20Oil%20side%20effects%20shows%20quality%20mattersOf%20course%2C%20since%20many%20of%20these%20studies%20have%20small%20sample%20sizes%2C%20and%20every%20person%20reacts%20a%20little%20bit%20differently%20to%20any%20substance%2C%20we%20looked%20at%20CBD%20oil%20users%27%20anecdotal%20reports%2C%20posted%20on%20popular%20online%20communities%20and%20forums%2C%20such%20as%20Reddit%20and%20sites%20that%20sell%20CBD%20products.A%20handful%20of%20very%20sensitive%20people%20who%20use%20CBD%20oil%20report%20feeling%20mild%20mood%20and%20mind-altering%20effects%2C%20similar%20to%20a%20low%20dose%20of%20psychoactive%20cannabis%2C%20but%20these%20effects%20appear%20to%20be%20rare.%20Some%20people%20also%20reported%20mild%20digestive%20upset%2C%20including%20diarrhea%2C%20from%20ingesting%20CBD%20oil.According%20to%20one%20post%20on%20Reddit%2C%20some%20people%20get%20headaches%20from%20using%20CBD%20oil%2C%20which%20is%20a%20bit%20unusual%20since%20CBD%20can%20also%20sometimes%20be%20used%20to%20treat%20migraines.%20However%2C%20other%20Redditors%20have%20suggested%20the%20problem%20was%20actually%20the%20purity%20of%20the%20CBD%20extract.%22I%20have%20just%20recently%20started%20taking%20CBD%20for%20headaches%2C%20and%20after%20three%20weeks%20of%20getting%20a%20worse%20headaches%2C%20I%20finally%20figured%20out%20that%20my%20CBD%20oil%20was%20cheap%20crap%20--%20and%20that%20a%20LOT%20of%20it%20is%2C%22%20a%20Redditor%20named%20Pellquin.The%20War%20on%20Drugs%20hurts%20cannabis%20%26%20hemp%20researchDue%20to%20the%20the%20stigma%20associated%20with%20the%20war%20on%20drugs%2C%20free%20and%20open%20research%20into%20both%20hemp%20and%20its%20close%20relative%2C%20psychoactive%20cannabis%2C%20is%20only%20just%20beginning%20in%20many%20ways.For%20example%2C%20the%20first%20study%20into%20the%20benefits%20of%20cannabis%20in%20veterans%20with%20otherwise%20untreatable%20post-traumatic%20stress%20disorder%20began%20in%202017%2C%20but%20only%20after%20the%20researchers%20struggled%20through%20years%20of%20red%20tape%20and%20put%20their%20careers%20at%20risk%20in%20order%20to%20do%20promote%20the%20need%20for%20this%20vital%20research.%20Fortunately%2C%20their%20work%2C%20and%20that%20of%20others%20like%20them%2C%20have%20begun%20to%20peel%20back%20the%20bureaucracy%20preventing%20scientific%20research.On%20the%20hemp%20side%20of%20the%20equation%2C%20the%202018%20Farm%20Bill%20fully%20legalized%20the%20growth%20and%20sales%20of%20agricultural%20hemp%20in%20the%20U.S.%2C%20and%20the%20production%20of%20its%20derivatives%20like%20CBD%20oil.%20We%20hope%20this%20finally%20opens%20the%20way%20for%20research%20into%20the%20benefits%20and%20possibilities%20of%20hemp%20in%20all%20its%20forms.%20While%20this%20article%20summarizes%20some%20of%20what%20we%27ve%20found%20from%20our%20research%20into%20CBD%20side%20effects%2C%20we%20expect%20to%20see%20a%20lot%20more%20research%20in%20this%20field%20in%20the%20years%20to%20come.Want%20to%20learn%20more%20about%20CBD%3F%20Download%20a%20PDF%20version%20of%20%27The%20Complete%20CBD%20Guide%27%5Bmc4wp_form%20id%3D%221833%22%5DWhen%20it%20comes%20to%20CBD%2C%20purity%20%26%20source%20mattersThat%20redditor%20had%20it%20right%3A%20there%27s%20a%20lot%20of%20poor%20quality%20CBD%20oil%20from%20unreliable%20brands.%20Some%20especially%20bad%20products%20may%20even%20include%20unexpected%20ingredients.%20The%20CBD%20oil%20market%20is%20still%20in%20its%20infancy%2C%20and%20it%20can%20be%20challenging%20for%20consumers%20to%20educate%20themselves%20except%20through%20expensive%20trial%20and%20error.%20When%20Ministry%20of%20Hemp%20investigated%20CBD%20oil%20purity%20and%20safety%2C%20we%20found%20a%20host%20of%20potential%20problems.CBD%20oil%20is%20an%20unregulated%20market.%20Since%20hemp%20absorbs%20chemicals%20from%20the%20ground%2C%20including%20lead%20and%20mercury%2C%20growing%20conditions%20can%20make%20a%20big%20difference.%20Labeling%20of%20CBD%20products%20is%20also%20often%20inconsistent%20and%20unclear%2C%20making%20it%20confusing%20for%20CBD%20consumers%20to%20know%20what%20they%27re%20buying.When%20we%20interviewed%20Carlos%20Frias%2C%20founder%20of%20Green%20Lotus%20and%20a%20cannabis%20industry%20expert%2C%20he%20gave%20us%20three%20pieces%20of%20advice%20for%20buying%20CBD%20oil%3AAlways%20ask%20for%20third-party%20lab%20results%20when%20buying%20CBD%20oilPay%20close%20attention%20to%20product%20labelingDon%27t%20hesitate%20to%20ask%20a%20more%20knowledgeable%20expert%20for%20help.CBD%20is%20safe%2C%20but%20research%20before%20you%20buy%20%26%20useIf%20you%20want%20CBD%20to%20work%20without%20unpleasant%20side%20effects%2C%20buy%20your%20CBD%20from%20a%20reliable%20and%20trusted%20source.Overall%2C%20we%20found%20that%20scientists%20and%20doctors%20consider%20CBD%20oil%20to%20be%20safe%20for%20most%20people%20to%20use%2C%20and%20there%20are%20few%2C%20if%20any%2C%20serious%20side%20effects.While%20everyone%20has%20their%20own%20unique%20body%20chemistry%2C%20it%20seems%20like%20the%20vast%20majority%20of%20people%20can%20ingest%20CBD%20oil%20without%20ever%20feeling%20any%20unpleasant%20side%20effects%20at%20all%2C%20and%20the%20remaining%20few%20will%20mostly%20likely%20experience%20only%20minor%20symptoms%20like%20stomach%20upset%20or%20dry%20mouth.%20Since%20scientists%20are%20using%20pure%20extracts%20from%20known%20sources%2C%20it%27s%20likely%20that%20some%20consumer%20reports%20of%20headaches%20or%20other%20minor%20adverse%20reactions%20could%20be%20due%20to%20impurities%20in%20inferior%20CBD%20products.As%20always%2C%20you%20should%20closely%20research%20the%20products%20you%20buy.%20Look%20for%20CBD%20oil%20reviews%20and%20other%20information%20on%20our%20site%2C%20or%20reliable%20websites%20like%20ours.%20And%20never%20hesitate%20to%20consult%20with%20a%20medical%20expert%20if%20you%20have%20any%20doubt%20about%20the%20best%20or%20safest%20way%20to%20use%20CBD%20oil." data-ss-ss-location="on_media" data-ss-ss-network-id="pinterest" data-ss-ss-type="share"><span data-dcnode-id="50 </span></span></div><figcaption data-dcnode-id="4986"><span data-dcnode-id="4987" instrument_node="">Most studies into CBD oil show few side effects, mostly minor ones like sleepiness or mild sedation.</span></figcaption></figure><span data-dcnode-id="4984" instrument_node="">
</span><p data-dcnode-id="4979"><span data-dcnode-id="4983" instrument_node="">One study of 8 healthy volunteers and 15 patients with epilepsy, published in 1980 in Pharmacology, looked at the </span><a data-dcnode-id="4981" data-lasso-id="5608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karger.com/Article/Abstract/137430" rel="nofollow noopener" target="_blank"><span data-dcnode-id="4982" instrument_node="">side-effects of CBD when consumed daily</span></a><span data-dcnode-id="4980" instrument_node=""> for a month. “All patients and volunteers tolerated CBD very well and no signs of toxicity or serious side effects were detected on examination,” wrote the researchers, who also found that CBD can help some people with epilepsy.</span></p><span data-dcnode-id="4978" instrument_node="">
</span><a data-dcnode-id="4977" data-lasso-id="5609" href="#" name="highdosage"></a><span data-dcnode-id="4976" instrument_node="">
</span><h2 data-dcnode-id="4974" id="h-consuming-higher-dosage-of-cbd-caused-no-toxicity"><span data-dcnode-id="4975" instrument_node="">Consuming higher dosage of CBD caused no toxicity</span></h2><span data-dcnode-id="4973" instrument_node="">
</span><p data-dcnode-id="4971"><span data-dcnode-id="4972" instrument_node="">In 2006, a group of researchers studying the potential benefits of CBD in treating psychosis and anxiety, looked at several studies of CBD oil’s safety and summarized their findings in a paper published by the Brazilian Journal of Medical and Biological Research. Noting that CBD safety was first proven through animal research, the scientists added:</span></p><span data-dcnode-id="4970" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="4965"><p data-dcnode-id="4968"><span data-dcnode-id="4969" instrument_node="">“Therefore … the available clinical data suggest that CBD can be safely administered over a wide dose range.”</span></p><cite data-dcnode-id="4966"><span data-dcnode-id="4967" instrument_node="">Brazilian Journal of Medical and Biological Research</span></cite></blockquote><span data-dcnode-id="4964" instrument_node="">
</span><p data-dcnode-id="4962"><span data-dcnode-id="4963" instrument_node="">“Acute CBD administration by the oral, inhalatory or intravenous route did not induce any significant toxic effect in humans. In addition, chronic administration of CBD for 30 days to healthy volunteers, at daily doses ranging from 10 to 400 mg, failed to induce any significant alteration in neurological, psychiatric or clinical exams. Finally, in patients suffering from Huntington’s disease, daily doses of CBD (700 mg) for 6 weeks did not induce any toxicity. Therefore, confirming results from animal studies, the available clinical data suggest that CBD can be safely administered over a wide dose range.”</span></p><span data-dcnode-id="4961" instrument_node="">
</span><p data-dcnode-id="4956"><span data-dcnode-id="4960" instrument_node="">A 2007 </span><a data-dcnode-id="4958" data-lasso-id="5611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/16644197/" rel="noopener" target="_blank"><span data-dcnode-id="4959" instrument_node="">study</span></a><span data-dcnode-id="4957" instrument_node=""> published in Phytomedicine found that CBD, along with other similar substances including THC (the main active ingredient in psychoactive cannabis), have potential as an anticoagulant, so people with who have diseases like hemophilia that cause problems with blood clotting should use extra caution with these substances.</span></p><span data-dcnode-id="4955" instrument_node="">
</span><h3 data-dcnode-id="4953" id="h-are-there-concerns-about-liver-toxicity"><span data-dcnode-id="4954" instrument_node="">Are there concerns about liver toxicity?</span></h3><span data-dcnode-id="4952" instrument_node="">
</span><p data-dcnode-id="4950"><span data-dcnode-id="4951" instrument_node="">We wrote above that the FDA raised concerns about liver damage from CBD. In reality, this is an area where we need more research. </span></p><span data-dcnode-id="4949" instrument_node="">
</span><p data-dcnode-id="4947"><span data-dcnode-id="4948" instrument_node="">Thousands of people take CBD everyday without showing signs of liver damage and, as we write in this guide and elsewhere, a lot of research shows CBD to be very safe for human consumption even at very high doses.</span></p><span data-dcnode-id="4946" instrument_node="">
</span><p data-dcnode-id="4941"><span data-dcnode-id="4945" instrument_node="">On the other hand, a very limited amount of research suggests liver damage is possible at high doses of concentrated CBD. For example, a very small study (16 participants) showed that</span><a data-dcnode-id="4943" data-lasso-id="5612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ascpt.onlinelibrary.wiley.com/doi/abs/10.1002/cpt.2071"><span data-dcnode-id="4944" instrument_node=""> 44% of participants (7) had elevated values of some liver enzymes</span></a><span data-dcnode-id="4942" instrument_node="">. It’s important to note that the dosage in these studies (1500mg of CBD per day) far exceeds the amount consumed by almost all CBD users. This would be the same as consuming multiple bottles a day of some lower strength CBD supplements.</span></p><span data-dcnode-id="4940" instrument_node="">
</span><p data-dcnode-id="4938"><span data-dcnode-id="4939" instrument_node="">For now, there’s still no reason to believe normal use of CBD supplements poses any serious risk to your liver, but when in doubt check with your doctor. </span></p><span data-dcnode-id="4937" instrument_node="">
</span><a data-dcnode-id="4936" data-lasso-id="5613" href="#" name="pharma"></a><span data-dcnode-id="4935" instrument_node="">
</span><h2 data-dcnode-id="4933" id="h-cbd-grapefruit-and-pharmaceutical-drugs"><span data-dcnode-id="4934" instrument_node="">CBD, grapefruit and pharmaceutical drugs</span></h2><span data-dcnode-id="4932" instrument_node="">
</span><p data-dcnode-id="4930"><span data-dcnode-id="4931" instrument_node="">There’s an unexpected connection between CBD oil and grapefruit, the citrus fruit that’s a popular breakfast choice. That connection? It’s possible that, like grapefruit, CBD could interfere with certain medications.</span></p><span data-dcnode-id="4929" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4904"><div class="ss-on-media-container wp-image-59184" data-dcnode-id="4907" style="display: inline;"><span class="ss-on-media-image-wrap wp-image-59184" data-dcnode-id="4908"><img alt="How is CBD like grapefruit? Both could interact with some pharmaceutical drugs. Photo shows two grapefruits, one whole and one sliced in half to show the inside. " class="ss-on-media-img wp-image-59184" data-dcnode-id="4928" height="683" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ministryofhemp.com/wp-content/uploads/2017/02/grapefruit-3752413-Pixabay-PD-mihai_ngr-1024x683.jpg&amp;raw" srcset="https://ministryofhemp.com/wp-content/uploads/2017/02/grapefruit-3752413-Pixabay-PD-mihai_ngr-1024x683.jpg 1024w, https://ministryofhemp.com/wp-content/uploads/2017/02/grapefruit-3752413-Pixabay-PD-mihai_ngr-300x200.jpg 300w, https://ministryofhemp.com/wp-content/uploads/2017/02/grapefruit-3752413-Pixabay-PD-mihai_ngr-768x512.jpg 768w, https://ministryofhemp.com/wp-content/uploads/2017/02/grapefruit-3752413-Pixabay-PD-mihai_ngr-1536x1024.jpg 1536w, https://ministryofhemp.com/wp-content/uploads/2017/02/grapefruit-3752413-Pixabay-PD-mihai_ngr-2048x1365.jpg 2048w, https://ministryofhemp.com/wp-content/uploads/2017/02/grapefruit-3752413-Pixabay-PD-mihai_ngr-scaled.jpg 1200w" width="1024"><span data-dcnode-id="4927" instrument_node=""> </span><div class="ss-on-media-wrapper ss-top-left-on-media ss-small-icons ss-with-spacing ss-circle-icons" data-dcnode-id="4910" style="display: block;"><span data-dcnode-id="4926" instrument_node="">
</span><ul class="ss-social-icons-container ss-on-media-pinit" data-dcnode-id="4912"><span data-dcnode-id="4925" instrument_node="">
</span><li data-dcnode-id="4914"><span data-dcnode-id="4924" instrument_node="">
</span><div class="ss-pinterest-color ss-pinit-button ss-ss-on-media-button" data-dcnode-id="4916" data-ss-ss-link="https://pinterest.com/pin/create/button/?url=https%3A%2F%2Fministryofhemp.com%2Fblog%2Fcbd-oil-side-effects%2F&amp;media=http://ministryofhemp.com/wp-content/uploads/2017/02/grapefruit-3752413-Pixabay-PD-mihai_ngr-1024x683.jpg&amp;description=With%20all%20the%20attention%20CBD%20has%20been%20getting%2C%20it%E2%80%99s%20easy%20to%20find%20information%20on%20all%20its%20benefits%20--%20but%20is%20there%20a%20downside%3F%20Does%20CBD%20have%20any%20side%20effects%3FEven%20here%20at%20Ministry%20of%20Hemp%2C%20we%E2%80%99ve%20focused%20a%20lot%20on%20exploring%20the%20benefits%20of%20CBD%20oil%20and%20the%20endocannabinoid%20system%20over%20the%20past%20few%20months.%20Yet%2C%20so%20much%20has%20been%20written%20about%20how%20CBD%20is%20helping%20people%20that%20we%20wanted%20to%20take%20a%20look%20at%20its%20potential%20drawbacks%20too.To%20create%20this%20article%2C%20we%20looked%20at%20both%20scientific%20research%20and%20anecdotal%20reports%20from%20CBD%20users.%20You%20can%27t%20overdose%20on%20CBD%20and%2C%20from%20our%20in-depth%20research%2C%20the%20side%20effects%20of%20CBD%20oil%20are%20usually%20minor%2C%20and%2C%20for%20most%20people%2C%20the%20benefits%20far%20outweigh%20the%20rare%20reports%20of%20discomfort.Table%20of%20ContentsIs%20CBD%20Safe%3F%C2%A0What%20CBD%20Oil%20Studies%20Have%20Found%20About%20Side%20EffectsCould%20High%20CBD%20Dosage%20Have%20Side%20Effects%3F%20Can%20CBD%20Interfere%20With%20Pharmaceutical%20Drugs%3FWhy%20There%27s%20Limited%20Research%20On%20Hemp%20CBDWhat%20You%20Should%20Look%20For%20When%20Buying%20CBDOverall%2C%20our%20research%20suggests%20that%2C%20just%20as%20with%20any%20health%20supplement%2C%20the%20quality%20and%20source%20of%20your%20CBD%20oil%20can%20make%20a%20big%20difference%20when%20it%20comes%20to%20side%20effects.%20In%20fact%2C%20many%20unpleasant%20experiences%20from%20CBD%20reported%20by%20consumers%20could%20be%20due%20to%20impurities%20or%20poor%20quality%20CBD%20oil%2C%20as%20we%27ll%20discuss%20later%20in%20this%20article.Is%20CBD%20safe%20and%20does%20it%20have%20side%20effects%3FIf%20you%20feel%20unpleasant%20effects%20from%20any%20supplement%2C%20it%27s%20better%20to%20take%20a%20break%20and%2C%20when%20in%20doubt%2C%20consult%20your%20doctor.%20Keep%20reading%20to%20learn%20more%20about%20the%20safety%20of%20CBD%2C%20and%20read%20about%20some%20common%20side%20effects%20and%20potential%20drug%20interactions.%20Is%20CBD%20safe%3F%20The%20World%20Health%20Organization%20Says%20YesIt%27s%20worth%20noting%20that%20even%20psychoactive%20cannabis%20--%20what%E2%80%99s%20often%20called%20%22marijuana%22%20--%20is%20also%20considered%20to%20be%20extremely%20safe%2C%20contrary%20to%20what%20the%20government%20wants%20us%20to%20believe.%20It%27s%20so%20safe%20that%20it%27s%20basically%20impossible%20for%20an%20adult%20human%20to%20ingest%20a%20fatal%20dose%2C%20although%20they%20can%20certainly%20make%20themselves%20feel%20very%20sick%20from%20eating%20or%20smoking%20too%20much.%20There%27s%20every%20reason%20to%20believe%20that%20CBD%20extracts%20from%20hemp%20plants%20are%20as%20safe%2C%20or%20even%20safer%2C%20than%20psychoactive%20strains%20of%20cannabis.In%202017%2C%20the%20World%20Health%20Organization%20declared%20CBD%20to%20be%20safe.In%202017%2C%20the%20World%20Health%20Organization%20ruled%20that%20CBD%20is%20safe%20with%20no%20potential%20for%20abuse.%20Since%20that%20time%2C%20various%20global%20and%20national%20authorities%20have%20come%20to%20support%20the%20use%20of%20CBD.%20For%20example%2C%20while%20some%20athletes%20are%20still%20banned%20from%20using%20CBD%2C%20depending%20on%20the%20sport%2C%20the%20World%20Anti-Doping%20Authority%20removed%20CBD%20from%20its%20list%20of%20banned%20substances%20that%20same%20year%2C%20and%20the%20USADA%20followed%20suit%20in%202018.It%27s%20worth%20noting%20that%20the%20FDA%20doesn%27t%20regulate%20CBD%2C%20though%20they%20do%20issue%20warnings%20to%20companies%20that%20blatantly%20break%20the%20law.%20Typically%2C%20these%20companies%20made%20outlandish%20claims%20about%20the%20supplement%27s%20abilities.%20In%20late%202019%2C%20the%20FDA%20issued%20some%20guidance%2C%20including%20safety%20concerns%20about%20CBD.%20According%20to%20the%20FDA%2C%20more%20research%20is%20needed%20to%20definitively%20prove%20that%20CBD%20is%20safe.%20But%20it%27s%20worth%20noting%20the%20findings%20of%20global%20authorities%20like%20the%20WHO%2C%20and%20the%20safe%20results%20found%20in%20the%20studies%20we%20outline%20below.%20%20CBD%20oil%20studies%20find%20few%20side%20effectsAlthough%20the%20medical%20research%20is%20still%20in%20its%20preliminary%20stages%2C%20scientists%20have%20devoted%20considerable%20effort%20to%20proving%20that%20CBD%20oil%20is%20safe%20for%20human%20consumption.A%20study%20published%20in%201986%20in%20the%20International%20Journal%20of%20Neuroscience%2C%20examined%20the%20effects%20of%20CBD%20oil%20in%205%20patients%20with%20dystonic%20movement%20disorders%20%28muscle%20tremors%20and%20other%20forms%20of%20uncontrollable%20movements%29.%20CBD%20oil%27s%20side%20effects%20%22were%20mild%20and%20included%20hypotension%20%5Blow%20blood%20pressure%5D%2C%20dry%20mouth%2C%20psychomotor%20slowing%20%5Bslowed%20thoughts%20or%20movements%5D%2C%20lightheadedness%2C%20and%20sedation%2C%22%20according%20to%20the%20study%27s%20authors%2C%20Paul%20Consroe%2C%20Reuven%20Sandyk%20and%20Stuart%20R.%20Snider.According%20to%20this%20study%2C%20CBD%20seemed%20to%20help%20people%20with%20their%20dystonia%2C%20but%20might%20have%20made%20some%20symptoms%20of%20Parkinson%27s%20Disease%20%28found%20in%202%20of%20the%20study%27s%20subjects%29%20a%20little%20bit%20worse.%20However%2C%20other%2C%20more%20recent%20research%20has%20found%20that%20CBD%20can%20benefit%20Parkinson%27s%20patients.Most%20studies%20into%20CBD%20oil%20show%20few%20side%20effects%2C%20mostly%20minor%20ones%20like%20sleepiness%20or%20mild%20sedation.One%20study%20of%208%20healthy%20volunteers%20and%2015%20patients%20with%20epilepsy%2C%20published%20in%201980%20in%20Pharmacology%2C%20looked%20at%20the%20side-effects%20of%20CBD%20when%20consumed%20daily%20for%20a%20month.%20%22All%20patients%20and%20volunteers%20tolerated%20CBD%20very%20well%20and%20no%20signs%20of%20toxicity%20or%20serious%20side%20effects%20were%20detected%20on%20examination%2C%22%20wrote%20the%20researchers%2C%20who%20also%20found%20that%20CBD%20can%20help%20some%20people%20with%20epilepsy.Consuming%20higher%20dosage%20of%20CBD%20caused%20no%20toxicityIn%202006%2C%20a%20group%20of%20researchers%20studying%20the%20potential%20benefits%20of%20CBD%20in%20treating%20psychosis%20and%20anxiety%2C%20looked%20at%20several%20studies%20of%20CBD%20oil%27s%20safety%20and%20summarized%20their%20findings%20in%20a%20paper%20published%20by%20the%20Brazilian%20Journal%20of%20Medical%20and%20Biological%20Research.%20Noting%20that%20CBD%20safety%20was%20first%20proven%20through%20animal%20research%2C%20the%20scientists%20added%3A%22Therefore%20...%20the%20available%20clinical%20data%20suggest%20that%20CBD%20can%20be%20safely%20administered%20over%20a%20wide%20dose%20range.%22Brazilian%20Journal%20of%20Medical%20and%20Biological%20Research%22Acute%20CBD%20administration%20by%20the%20oral%2C%20inhalatory%20or%20intravenous%20route%20did%20not%20induce%20any%20significant%20toxic%20effect%20in%20humans.%20In%20addition%2C%20chronic%20administration%20of%20CBD%20for%2030%20days%20to%20healthy%20volunteers%2C%20at%20daily%20doses%20ranging%20from%2010%20to%20400%20mg%2C%20failed%20to%20induce%20any%20significant%20alteration%20in%20neurological%2C%20psychiatric%20or%20clinical%20exams.%20Finally%2C%20in%20patients%20suffering%20from%20Huntington%27s%20disease%2C%20daily%20doses%20of%20CBD%20%28700%20mg%29%20for%206%20weeks%20did%20not%20induce%20any%20toxicity.%20Therefore%2C%20confirming%20results%20from%20animal%20studies%2C%20the%20available%20clinical%20data%20suggest%20that%20CBD%20can%20be%20safely%20administered%20over%20a%20wide%20dose%20range.%22A%202007%20study%20published%20in%20Phytomedicine%20found%20that%20CBD%2C%20along%20with%20other%20similar%20substances%20including%20THC%20%28the%20main%20active%20ingredient%20in%20psychoactive%20cannabis%29%2C%20have%20potential%20as%20an%20anticoagulant%2C%20so%20people%20with%20who%20have%20diseases%20like%20hemophilia%20that%20cause%20problems%20with%20blood%20clotting%20should%20use%20extra%20caution%20with%20these%20substances.Are%20there%20concerns%20about%20liver%20toxicity%3FWe%20wrote%20above%20that%20the%20FDA%20raised%20concerns%20about%20liver%20damage%20from%20CBD.%20In%20reality%2C%20this%20is%20an%20area%20where%20we%20need%20more%20research.%20Thousands%20of%20people%20take%20CBD%20everyday%20without%20showing%20signs%20of%20liver%20damage%20and%2C%20as%20we%20write%20in%20this%20guide%20and%20elsewhere%2C%20a%20lot%20of%20research%20shows%20CBD%20to%20be%20very%20safe%20for%20human%20consumption%20even%20at%20very%20high%20doses.On%20the%20other%20hand%2C%20a%20very%20limited%20amount%20of%20research%20suggests%20liver%20damage%20is%20possible%20at%20high%20doses%20of%20concentrated%20CBD.%20For%20example%2C%20a%20very%20small%20study%20%2816%20participants%29%20showed%20that%2044%25%20of%20participants%20%287%29%20had%20elevated%20values%20of%20some%20liver%20enzymes.%20It%27s%20important%20to%20note%20that%20the%20dosage%20in%20these%20studies%20%281500mg%20of%20CBD%20per%20day%29%20far%20exceeds%20the%20amount%20consumed%20by%20almost%20all%20CBD%20users.%20This%20would%20be%20the%20same%20as%20consuming%20multiple%20bottles%20a%20day%20of%20some%20lower%20strength%20CBD%20supplements.For%20now%2C%20there%27s%20still%20no%20reason%20to%20believe%20normal%20use%20of%20CBD%20supplements%20poses%20any%20serious%20risk%20to%20your%20liver%2C%20but%20when%20in%20doubt%20check%20with%20your%20doctor.%20CBD%2C%20grapefruit%20and%20pharmaceutical%20drugsThere%27s%20an%20unexpected%20connection%20between%20CBD%20oil%20and%20grapefruit%2C%20the%20citrus%20fruit%20that%27s%20a%20popular%20breakfast%20choice.%20That%20connection%3F%20It%27s%20possible%20that%2C%20like%20grapefruit%2C%20CBD%20could%20interfere%20with%20certain%20medications.How%20is%20CBD%20like%20grapefruit%3F%20Both%20could%20interact%20with%20some%20pharmaceutical%20drugs.Grapefruit%20can%20actually%20interfere%20with%20the%20absorption%20of%20some%20common%20drugs%2C%20potentially%20resulting%20in%20unbalanced%20or%20dangerous%20levels%20of%20the%20drug%20in%20a%20person%27s%20bloodstream.%20There%27s%20quite%20a%20list%20of%20affected%20drugs%2C%20including%20some%20cholesterol-reducing%20drugs%20as%20well%20as%20some%20psychiatric%20medications.%20This%20connection%20is%20well%20known%20and%2C%20in%20most%20cases%2C%20your%20doctor%20would%20tell%20you%20if%20you%20need%20to%20avoid%20grapefruit.%20When%20in%20doubt%2C%20you%20can%20use%20a%20drug%20interaction%20checker%20online%20or%20check%20with%20your%20doctor%20or%20pharmacist.%20The%20possible%20connection%20with%20CBD%20is%20less%20well-known%2C%20and%20also%20less%20well-established.%20However%2C%20some%20preliminary%20clinical%20research%20suggests%20grapefruit%20and%20CBD%20could%20affect%20the%20same%20enzymes%2C%20meaning%20CBD%20should%20be%20avoided%20with%20the%20same%20medications.%20However%2C%20it%27s%20important%20to%20note%20that%20the%20clinical%20studies%20where%20this%20connection%20was%20found%20involve%20much%20higher%20doses%20of%20CBD%20than%20people%20typically%20take%20at%20home.%20Even%20so%2C%20it%27s%20better%20to%20be%20safe%20than%20sorry.%20If%20you%27re%20supposed%20to%20avoid%20grapefruit%2C%20or%20you%27re%20concerned%20about%20potential%20interactions%2C%20check%20with%20a%20medical%20professional%20before%20starting%20or%20continuing%20to%20take%20CBD.%20An%20anecdotal%20look%20at%20CBD%20Oil%20side%20effects%20shows%20quality%20mattersOf%20course%2C%20since%20many%20of%20these%20studies%20have%20small%20sample%20sizes%2C%20and%20every%20person%20reacts%20a%20little%20bit%20differently%20to%20any%20substance%2C%20we%20looked%20at%20CBD%20oil%20users%27%20anecdotal%20reports%2C%20posted%20on%20popular%20online%20communities%20and%20forums%2C%20such%20as%20Reddit%20and%20sites%20that%20sell%20CBD%20products.A%20handful%20of%20very%20sensitive%20people%20who%20use%20CBD%20oil%20report%20feeling%20mild%20mood%20and%20mind-altering%20effects%2C%20similar%20to%20a%20low%20dose%20of%20psychoactive%20cannabis%2C%20but%20these%20effects%20appear%20to%20be%20rare.%20Some%20people%20also%20reported%20mild%20digestive%20upset%2C%20including%20diarrhea%2C%20from%20ingesting%20CBD%20oil.According%20to%20one%20post%20on%20Reddit%2C%20some%20people%20get%20headaches%20from%20using%20CBD%20oil%2C%20which%20is%20a%20bit%20unusual%20since%20CBD%20can%20also%20sometimes%20be%20used%20to%20treat%20migraines.%20However%2C%20other%20Redditors%20have%20suggested%20the%20problem%20was%20actually%20the%20purity%20of%20the%20CBD%20extract.%22I%20have%20just%20recently%20started%20taking%20CBD%20for%20headaches%2C%20and%20after%20three%20weeks%20of%20getting%20a%20worse%20headaches%2C%20I%20finally%20figured%20out%20that%20my%20CBD%20oil%20was%20cheap%20crap%20--%20and%20that%20a%20LOT%20of%20it%20is%2C%22%20a%20Redditor%20named%20Pellquin.The%20War%20on%20Drugs%20hurts%20cannabis%20%26%20hemp%20researchDue%20to%20the%20the%20stigma%20associated%20with%20the%20war%20on%20drugs%2C%20free%20and%20open%20research%20into%20both%20hemp%20and%20its%20close%20relative%2C%20psychoactive%20cannabis%2C%20is%20only%20just%20beginning%20in%20many%20ways.For%20example%2C%20the%20first%20study%20into%20the%20benefits%20of%20cannabis%20in%20veterans%20with%20otherwise%20untreatable%20post-traumatic%20stress%20disorder%20began%20in%202017%2C%20but%20only%20after%20the%20researchers%20struggled%20through%20years%20of%20red%20tape%20and%20put%20their%20careers%20at%20risk%20in%20order%20to%20do%20promote%20the%20need%20for%20this%20vital%20research.%20Fortunately%2C%20their%20work%2C%20and%20that%20of%20others%20like%20them%2C%20have%20begun%20to%20peel%20back%20the%20bureaucracy%20preventing%20scientific%20research.On%20the%20hemp%20side%20of%20the%20equation%2C%20the%202018%20Farm%20Bill%20fully%20legalized%20the%20growth%20and%20sales%20of%20agricultural%20hemp%20in%20the%20U.S.%2C%20and%20the%20production%20of%20its%20derivatives%20like%20CBD%20oil.%20We%20hope%20this%20finally%20opens%20the%20way%20for%20research%20into%20the%20benefits%20and%20possibilities%20of%20hemp%20in%20all%20its%20forms.%20While%20this%20article%20summarizes%20some%20of%20what%20we%27ve%20found%20from%20our%20research%20into%20CBD%20side%20effects%2C%20we%20expect%20to%20see%20a%20lot%20more%20research%20in%20this%20field%20in%20the%20years%20to%20come.Want%20to%20learn%20more%20about%20CBD%3F%20Download%20a%20PDF%20version%20of%20%27The%20Complete%20CBD%20Guide%27%5Bmc4wp_form%20id%3D%221833%22%5DWhen%20it%20comes%20to%20CBD%2C%20purity%20%26%20source%20mattersThat%20redditor%20had%20it%20right%3A%20there%27s%20a%20lot%20of%20poor%20quality%20CBD%20oil%20from%20unreliable%20brands.%20Some%20especially%20bad%20products%20may%20even%20include%20unexpected%20ingredients.%20The%20CBD%20oil%20market%20is%20still%20in%20its%20infancy%2C%20and%20it%20can%20be%20challenging%20for%20consumers%20to%20educate%20themselves%20except%20through%20expensive%20trial%20and%20error.%20When%20Ministry%20of%20Hemp%20investigated%20CBD%20oil%20purity%20and%20safety%2C%20we%20found%20a%20host%20of%20potential%20problems.CBD%20oil%20is%20an%20unregulated%20market.%20Since%20hemp%20absorbs%20chemicals%20from%20the%20ground%2C%20including%20lead%20and%20mercury%2C%20growing%20conditions%20can%20make%20a%20big%20difference.%20Labeling%20of%20CBD%20products%20is%20also%20often%20inconsistent%20and%20unclear%2C%20making%20it%20confusing%20for%20CBD%20consumers%20to%20know%20what%20they%27re%20buying.When%20we%20interviewed%20Carlos%20Frias%2C%20founder%20of%20Green%20Lotus%20and%20a%20cannabis%20industry%20expert%2C%20he%20gave%20us%20three%20pieces%20of%20advice%20for%20buying%20CBD%20oil%3AAlways%20ask%20for%20third-party%20lab%20results%20when%20buying%20CBD%20oilPay%20close%20attention%20to%20product%20labelingDon%27t%20hesitate%20to%20ask%20a%20more%20knowledgeable%20expert%20for%20help.CBD%20is%20safe%2C%20but%20research%20before%20you%20buy%20%26%20useIf%20you%20want%20CBD%20to%20work%20without%20unpleasant%20side%20effects%2C%20buy%20your%20CBD%20from%20a%20reliable%20and%20trusted%20source.Overall%2C%20we%20found%20that%20scientists%20and%20doctors%20consider%20CBD%20oil%20to%20be%20safe%20for%20most%20people%20to%20use%2C%20and%20there%20are%20few%2C%20if%20any%2C%20serious%20side%20effects.While%20everyone%20has%20their%20own%20unique%20body%20chemistry%2C%20it%20seems%20like%20the%20vast%20majority%20of%20people%20can%20ingest%20CBD%20oil%20without%20ever%20feeling%20any%20unpleasant%20side%20effects%20at%20all%2C%20and%20the%20remaining%20few%20will%20mostly%20likely%20experience%20only%20minor%20symptoms%20like%20stomach%20upset%20or%20dry%20mouth.%20Since%20scientists%20are%20using%20pure%20extracts%20from%20known%20sources%2C%20it%27s%20likely%20that%20some%20consumer%20reports%20of%20headaches%20or%20other%20minor%20adverse%20reactions%20could%20be%20due%20to%20impurities%20in%20inferior%20CBD%20products.As%20always%2C%20you%20should%20closely%20research%20the%20products%20you%20buy.%20Look%20for%20CBD%20oil%20reviews%20and%20other%20information%20on%20our%20site%2C%20or%20reliable%20websites%20like%20ours.%20And%20never%20hesitate%20to%20consult%20with%20a%20medical%20expert%20if%20you%20have%20any%20doubt%20about%20the%20best%20or%20safest%20way%20to%20use%20CBD%20oil." data-ss-ss-location="on_media" data-ss-ss-network-id="pinterest" data-ss-ss-type="share"><span data-dcnode-id=
