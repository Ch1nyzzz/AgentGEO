</span><p data-dcnode-id="895"><span data-dcnode-id="899" instrument_node="">By bonding with the body’s endocannabinoid system (a network of receptors located throughout the body), CBD oil stimulates health and healing. It can help an anxious dog </span><a data-dcnode-id="897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannanine.com/age-old-remedy-rediscovered-helps-dogs-immensely-with-thunderstorms/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="898" instrument_node="">stay calm and relaxed</span></a><span data-dcnode-id="896" instrument_node="">, help dogs with epilepsy, and senior dogs benefit from the anti-inflammatory properties that can ease symptoms of arthritis. There’s a lot to love about CBD oil, but as with any new name in pet health, there are also a lot of questions. One of the biggest questions pet parents have is what are the possible CBD side effects for dogs? Is it really safe to give a dog cannabis? Here’s what you need to know.</span></p><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="890"><img alt="CBD side effects for dogs" class="aligncenter size-full wp-image-705 perfmatters-lazy loaded" data-dcnode-id="893" data-sizes="(max-width: 640px) 100vw, 640px" data-src="https://cannanine.com/wp-content/uploads/2018/08/CBD-side-effects-for-dogs.png" data-srcset="https://cannanine.com/wp-content/uploads/2018/08/CBD-side-effects-for-dogs.png 640w, https://cannanine.com/wp-content/uploads/2018/08/CBD-side-effects-for-dogs-300x200.png 300w, https://cannanine.com/wp-content/uploads/2018/08/CBD-side-effects-for-dogs-600x400.png 600w" data-was-processed="true" height="427" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannanine.com/wp-content/uploads/2018/08/CBD-side-effects-for-dogs.png&amp;raw" srcset="https://cannanine.com/wp-content/uploads/2018/08/CBD-side-effects-for-dogs.png 640w, https://cannanine.com/wp-content/uploads/2018/08/CBD-side-effects-for-dogs-300x200.png 300w, https://cannanine.com/wp-content/uploads/2018/08/CBD-side-effects-for-dogs-600x400.png 600w" width="640"><noscript data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">&lt;img class="aligncenter size-full wp-image-705" src="https://cannanine.com/wp-content/uploads/2018/08/CBD-side-effects-for-dogs.png" alt="CBD side effects for dogs" width="640" height="427" srcset="https://cannanine.com/wp-content/uploads/2018/08/CBD-side-effects-for-dogs.png 640w, https://cannanine.com/wp-content/uploads/2018/08/CBD-side-effects-for-dogs-300x200.png 300w, https://cannanine.com/wp-content/uploads/2018/08/CBD-side-effects-for-dogs-600x400.png 600w" sizes="(max-width: 640px) 100vw, 640px" /&gt;</span></noscript></p><span data-dcnode-id="889" instrument_node="">
</span><h3 data-dcnode-id="886"><strong data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">CBD vs. THC</span></strong></h3><span data-dcnode-id="885" instrument_node="">
</span><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">The first step to understanding CBD oil is knowing where it comes from. CBD (cannabidiol) is a type of compound called a cannabinoid found in cannabis plants, including hemp and marijuana plants. There are over 100 different cannabinoids, but the two you know best are CBD and THC (tetrahydrocannabinol). CBD has recently started taking the pet care world by storm, but THC still reigns as the most well-known part of cannabis plants, specifically marijuana (hemp plants are different). That’s because THC is the part of marijuana that makes a person high. It’s also the reason marijuana is dangerous for dogs.</span></p><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="877"><span data-dcnode-id="881" instrument_node="">That’s right, whether in its original form or made into an edible, marijuana should never be given to dogs. The reason is that unlike hemp, marijuana has high levels of THC. Dogs don’t appreciate its psychoactive properties the way some humans might, and </span><a data-dcnode-id="879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vcahospitals.com/know-your-pet/marijuana-intoxication-in-dogs-and-cats" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="880" instrument_node="">VCA Hospitals</span></a><span data-dcnode-id="878" instrument_node=""> warns about the dangers of marijuana toxicity in pets.</span></p><div class="rh-widget rh-inline" data-dcnode-id="753" data-url="https://admin.revenuehunt.com/public/quiz/X2HBgk" style="margin: 10px auto; width: 100%; height: 600px; display: flex;"><iframe data-dcnode-id="754" data-hj-allow-iframe="true" id="BATEr" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//admin.revenuehunt.com/public/quiz/X2HBgk&amp;raw" style="transform-style: preserve-3d; padding: 0px; border: none; margin: 0px auto; height: 100%; flex-grow: 1; background: url(&quot;https://admin.revenuehunt.com/rolling.svg&quot;) center center no-repeat;"><html class="" data-dcnode-id="756"><head data-dcnode-id="842"><meta charset="utf-8"><span data-dcnode-id="875" instrument_node="">

span data-dcnode-id="805" instrument_node=""> </span><div class="lq-group" data-dcnode-id="778" data-v-ade0c9be="" id="inputgroup"><span data-dcnode-id="803" instrument_node=""> </span><span data-dcnode-id="801" instrument_node=""> </span><span data-dcnode-id="799" instrument_node=""> </span><span data-dcnode-id="797" instrument_node=""> </span><span data-dcnode-id="795" instrument_node=""> </span><span data-dcnode-id="793" instrument_node=""> </span><span data-dcnode-id="791" instrument_node=""> </span><span data-dcnode-id="789" instrument_node=""> </span><span data-dcnode-id="787" instrument_node=""> </span><span data-dcnode-id="785" instrument_node=""> </span><div data-dcnode-id="781" data-v-ade0c9be=""><div data-dcnode-id="782" data-v-ade0c9be=""><button class="" data-dcnode-id="783" data-v-ade0c9be="" id="cta" style="--font-txt:Roboto, sans-serif; --btn-bg:rgb(0,0,0); --btn-col:white;"><span data-dcnode-id="784" instrument_node="">Start Quiz</span></button></div></div><span data-dcnode-id="780" instrument_node=""> </span></div></div></div><span data-dcnode-id="775" instrument_node=""> </span></section><span data-dcnode-id="772" instrument_node=""> </span></div></div></div></div></div></div><span data-dcnode-id="764" instrument_node="">

</span><p data-dcnode-id="747"><span data-dcnode-id="751" instrument_node="">THC can cause disorientation, elevated heart rate, and respiratory depression. But before you condemn all types of cannabis, it’s important to remember THC is not the same as CBD. CBD in its isolated form contains less than .3% THC. And when it’s a </span><a data-dcnode-id="749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannanine.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="750" instrument_node="">quality product</span></a><span data-dcnode-id="748" instrument_node=""> derived from hemp, the amount of THC should be zero. While THC makes people high and dogs sick, CBD doesn’t. It’s the therapeutic part of cannabis that is proving to be beneficial for both dogs and people.</span></p><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="742"><img alt="CBD side effects for dogs" class="aligncenter wp-image-703 size-full perfmatters-lazy loaded" data-dcnode-id="745" data-sizes="(max-width: 640px) 100vw, 640px" data-src="https://cannanine.com/wp-content/uploads/2018/08/hemp-2540730_640.jpg" data-srcset="https://cannanine.com/wp-content/uploads/2018/08/hemp-2540730_640.jpg 640w, https://cannanine.com/wp-content/uploads/2018/08/hemp-2540730_640-300x200.jpg 300w, https://cannanine.com/wp-content/uploads/2018/08/hemp-2540730_640-600x399.jpg 600w" data-was-processed="true" height="426" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannanine.com/wp-content/uploads/2018/08/hemp-2540730_640.jpg&amp;raw" srcset="https://cannanine.com/wp-content/uploads/2018/08/hemp-2540730_640.jpg 640w, https://cannanine.com/wp-content/uploads/2018/08/hemp-2540730_640-300x200.jpg 300w, https://cannanine.com/wp-content/uploads/2018/08/hemp-2540730_640-600x399.jpg 600w" width="640"><noscript data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">&lt;img class="aligncenter wp-image-703 size-full" src="https://cannanine.com/wp-content/uploads/2018/08/hemp-2540730_640.jpg" alt="CBD side effects for dogs" width="640" height="426" srcset="https://cannanine.com/wp-content/uploads/2018/08/hemp-2540730_640.jpg 640w, https://cannanine.com/wp-content/uploads/2018/08/hemp-2540730_640-300x200.jpg 300w, https://cannanine.com/wp-content/uploads/2018/08/hemp-2540730_640-600x399.jpg 600w" sizes="(max-width: 640px) 100vw, 640px" /&gt;</span></noscript></p><span data-dcnode-id="741" instrument_node="">
</span><h2 data-dcnode-id="738"><strong data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">CBD Side Effects In Dogs</span></strong></h2><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Using CBD oil to treat dogs is one of the newest trends in the pet care industry, and researchers are rushing to give pet parents what they want: hard facts. Studies on using CBD oil for dogs with arthritis, epilepsy, anxiety, and cancer are in the works. In the meantime, people are learning about CBD oil for dogs through personal testimonies and human studies. It’s understood that because the human and canine endocannabinoid systems are largely the same, CBD oil most likely affects dogs in the same ways it does humans.</span></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">One of the reasons why CBD oil is becoming popular is because, as a holistic treatment, side effects seem to be both rare and mild. It’s a relief from prescription drugs that often have severe side effects that cause additional health issues.</span></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="727"><a data-dcnode-id="729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//veterinarynews.dvm360.com/cannabidiol-new-option-pets-pain" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="730" instrument_node="">Veterinary News</span></a><span data-dcnode-id="728" instrument_node=""> says,</span></p><span data-dcnode-id="726" instrument_node="">
</span><blockquote data-dcnode-id="723"><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">“Most pharmaceuticals only stimulate upregulation or downregulation, making it possible to move body systems out of their normal or homeostatic state. Because CBD works toward homeostasis, it doesn’t do this, making unwanted side effects rare and giving CBD a good safety profile.”</span></p></blockquote><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Side effects of CBD oil for dogs and humans include:</span></p><span data-dcnode-id="719" instrument_node="">
</span><ul data-dcnode-id="702"><span data-dcnode-id="718" instrument_node="">
</span><li data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Drowsiness</span></li><span data-dcnode-id="715" instrument_node="">
</span><li data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Vomiting</span></li><span data-dcnode-id="712" instrument_node="">
</span><li data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Diarrhea</span></li><span data-dcnode-id="709" instrument_node="">
</span><li data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Itching</span></li><span data-dcnode-id="706" instrument_node="">
</span><li data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Dizziness</span></li><span data-dcnode-id="703" instrument_node="">
</span></ul><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">In general, side effects in dogs are mild and go away as the CBD oil is processed through the dog’s system. There’s also the chance it could interact with medications (sometimes making them more effective), and it’s important to talk to a vet before adding CBD oil to your dog’s regular medication schedule.</span></p><span data-dcnode-id="698" instrument_node="">
</span><h3 data-dcnode-id="695"><strong data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">What To Do If a Dog Experiences Side Effects?</span></strong></h3><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">It doesn’t matter whether you’re giving your dog a dose of CBD oil or a new chew toy, it’s always important to supervise their actions and monitor their behavior. If something seems “not right” with your dog after giving them CBD oil, they could be experiencing unwanted side effects.</span></p><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="687"><a data-dcnode-id="689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hawthornevet.com/resources/medicinal-cannabis-pets" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="690" instrument_node="">Hawthorne Veterinary Clinic</span></a><span data-dcnode-id="688" instrument_node=""> advises pet parents to stop administering CBD oil as soon as they recognize side effects. Too high a dosage without acclimation is the most likely cause of CBD oil side effects. HVC recommends waiting until side effects have worn off and then restarting the dog with a lower dose. After one week with a low dose and no side effects, the dose can be gradually increased until desired effects are reached.</span></p><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">If side effects last for an extended period of time, or you’re worried about your dog’s well-being, contact your vet.</span></p><span data-dcnode-id="683" instrument_node="">
</span><h3 data-dcnode-id="680"><strong data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Choosing the Right CBD Oil for Dogs</span></strong></h3><span data-dcnode-id="679" instrument_node="">
