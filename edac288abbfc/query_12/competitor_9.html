</span><div class="times-before-content_2" data-dcnode-id="980" id="times-2113506963"><a data-dcnode-id="981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timesofcbd.com/find-cbd-pain-relief"><img alt="" data-dcnode-id="982" height="80" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timesofcbd.com/wp-content/uploads/2020/01/best-cbd-product-pain-relief.jpg&amp;raw" srcset="https://timesofcbd.com/wp-content/uploads/2020/01/best-cbd-product-pain-relief.jpg 800w, https://timesofcbd.com/wp-content/uploads/2020/01/best-cbd-product-pain-relief-300x30.jpg 300w, https://timesofcbd.com/wp-content/uploads/2020/01/best-cbd-product-pain-relief-768x77.jpg 768w" width="800"></a></div><span data-dcnode-id="979" instrument_node=""> </span><center data-dcnode-id="976"><sub data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">- Ad -</span></sub></center><div class="times-before-content" data-dcnode-id="969" id="times-1971239972"><ins class="adsbygoogle" data-ad-client="ca-pub-9778509923296752" data-ad-format="auto" data-ad-slot="1905414393" data-dcnode-id="974" data-full-width-responsive="true" style="display:block;"></ins><span data-dcnode-id="973" instrument_node="">
</span><span data-dcnode-id="970" instrument_node="">
</span></div><p data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">Rick Simpson is a Canadian medical marijuana activist best known for creating Rick Simpson Oil (RSO), which is similar to CBD oil but with significantly different composition.</span></p><span data-dcnode-id="966" instrument_node="">
</span><p data-dcnode-id="961"><span data-dcnode-id="965" instrument_node="">Today, we’re explaining everything you need to know about </span><strong data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Rick Simpson CBD oil</span></strong><span data-dcnode-id="962" instrument_node="">, including whether or not Rick Simpson Oil (RSO) is scientifically proven to reduce cancer in any way.</span></p><span data-dcnode-id="960" instrument_node="">
</span><h2 data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">What is Rick Simpson Oil?</span></h2><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="950"><a data-dcnode-id="955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timesofcbd.com/cbd-oil-vs-rso/"><span data-dcnode-id="956" instrument_node="">Rick Simpson Oil</span></a><span data-dcnode-id="954" instrument_node="">, also known as RSO, is a </span><a data-dcnode-id="952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timesofcbd.com/cannabidiol-oil-guide/"><span data-dcnode-id="953" instrument_node="">cannabis oil</span></a><span data-dcnode-id="951" instrument_node=""> product popularized by Canadian medical marijuana activist Rick Simpson.</span></p><span data-dcnode-id="949" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="948" instrument_node="">There are plenty of CBD oils on the market today. However, Rick Simpson Oil is not technically a CBD oil. RSO contains significantly higher levels of </span><a data-dcnode-id="946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timesofcbd.com/cbd-vs-thc-cannabinoids/"><span data-dcnode-id="947" instrument_node="">tetrahydrocannabinol</span></a><span data-dcnode-id="945" instrument_node=""> (THC) than a typical CBD oil. THC is the active chemical compound – or cannabinoid – in marijuana that makes you high.</span></p><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">An average RSO made at-home or bought in-store contains 50 to 60% THC and 10 to 15% CBD, depending on the strain that was used. It’s also a full spectrum plant extract, which means it contains all of the components of the cannabis plant. Cannabinoids like CBN and CBG may be present in concentrated amounts.</span></p><span data-dcnode-id="940" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">RSO is generally made from Cannabis indica, which is known for its sedative, healing properties.</span></p><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="936" instrument_node="">Typically, CBD oils on the market today contain less than 0.3% THC – or no THC at all. CBD oils with more than 0.3% THC are legal only in states or countries that have </span><a data-dcnode-id="934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timesofcbd.com/10-usa-states-legal-recreational-marijuana-use/"><span data-dcnode-id="935" instrument_node="">legalized recreational use of marijuana</span></a><span data-dcnode-id="933" instrument_node="">.</span></p><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="930" instrument_node="">Before you call Rick Simpson a snake oil salesman, it’s important to note that Rick Simpson doesn’t actually sell RSO; instead, he encourages people to create their own </span><em data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">Rick Simpson Oil</span></em><span data-dcnode-id="927" instrument_node=""> using his methods.</span></p><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Today, you can also purchase RSO CBD Oil from various online retailers. Lazarus Naturals, for example, sells a popular RSO CBD Oil product for $40 (10mL) to $180 (50mL), with each mL containing 100mg of CBD.</span></p><span data-dcnode-id="922" instrument_node="">
</span><h2 data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">What is Rick Simpson CBD Oil?</span></h2><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="914"><span data-dcnode-id="918" instrument_node="">Rick Simpson Oil (RSO) and CBD oil are two different </span><a data-dcnode-id="916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timesofcbd.com/why-take-cbd-oil-cannabidiol-hemp-extracts-even-if-not-a-cannabis-user-or-smoker/"><span data-dcnode-id="917" instrument_node="">cannabis extracts</span></a><span data-dcnode-id="915" instrument_node="">. Today, however, some retailers now sell “RSO CBD oil”.</span></p><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">This might seem contradictory: RSO contains 50 to 60% THC, while CBD oil contains less than 0.3% THC by definition.</span></p><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">So how does RSO CBD oil work? What is RSO CBD oil?</span></p><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">As far as we can tell, RSO CBD oil is just a clever marketing term. It’s basically just full spectrum CBD oil, where the entire plant is used to make oil.</span></p><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Unlike pure CBD oil, which focuses only on CBD, full spectrum CBD oil contains CBD and other cannabinoids in the hemp plant (without THC or other psychoactive compounds).</span></p><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">In other words, full spectrum CBD oil and RSO CBD oil appear to be identical products.</span></p><span data-dcnode-id="898" instrument_node="">
</span><p data-dcnode-id="896"><img alt="rso" class="aligncenter size-full wp-image-16502" data-dcnode-id="897" height="371" loading="lazy" sizes="(max-width: 745px) 100vw, 745px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timesofcbd.com/wp-content/uploads/2019/09/RSO.jpg&amp;raw" srcset="https://timesofcbd.com/wp-content/uploads/2019/09/RSO.jpg 745w, https://timesofcbd.com/wp-content/uploads/2019/09/RSO-300x149.jpg 300w" width="745"></p><span data-dcnode-id="895" instrument_node="">
</span><h2 data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Potential Benefits of RSO</span></h2><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">The main benefit of Rick Simpson Oil according to Rick and his supporters is that it cures cancer.</span></p><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Simpson was diagnosed with skin cancer in 2003. Then, he began applying RSO to cancerous spots on his face and neck. Simpson claims the spots disappeared within a few days, and he has been cancer-free ever since.</span></p><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">RSO is also purported to treat a number of other conditions, including:</span></p><span data-dcnode-id="883" instrument_node="">
</span><ul data-dcnode-id="854"><span data-dcnode-id="882" instrument_node="">
</span><li data-dcnode-id="879"><a data-dcnode-id="880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timesofcbd.com/cbd-for-multiple-sclerosis/"><span data-dcnode-id="881" instrument_node="">Multiple sclerosis</span></a></li><span data-dcnode-id="878" instrument_node="">
</span><li data-dcnode-id="875"><a data-dcnode-id="876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timesofcbd.com/cbd-oil-for-rheumatoid-arthritis/"><span data-dcnode-id="877" instrument_node="">Arthritis</span></a></li><span data-dcnode-id="874" instrument_node="">
</span><li data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Asthma</span></li><span data-dcnode-id="871" instrument_node="">
</span><li data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Infections</span></li><span data-dcnode-id="868" instrument_node="">
</span><li data-dcnode-id="865"><a data-dcnode-id="866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timesofcbd.com/cbd-for-inflammation/"><span data-dcnode-id="867" instrument_node="">Inflammation</span></a></li><span data-dcnode-id="864" instrument_node="">
</span><li data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">High blood pressure</span></li><span data-dcnode-id="861" instrument_node="">
</span><li data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Depression</span></li><span data-dcnode-id="858" instrument_node="">
</span><li data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Insomnia</span></li><span data-dcnode-id="855" instrument_node="">
</span></ul><span data-dcnode-id="853" instrument_node="">
</span><p data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Scientific Evidence for Rick Simpson Oil</span></p><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="845"><span data-dcnode-id="849" instrument_node="">All of the benefits above </span><em data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">sound </span></em><span data-dcnode-id="846" instrument_node="">good – but are they backed by any real, scientific research? Let’s take a look at some of the formal studies on using CBD oil and Rick Simpson Oil to cure cancer and other conditions.</span></p><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="839"><span data-dcnode-id="843" instrument_node="">First, Rick Simpson decided to try cannabis oil after </span><a data-dcnode-id="841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/1159836"><span data-dcnode-id="842" instrument_node="">discovering a 1975 study</span></a><span data-dcnode-id="840" instrument_node=""> involving mice with lung cancer. Researchers found that THC and another cannabinoid called cannabinol (CBN) reduced the growth of lung cancer in mice.</span></p><span data-dcnode-id="838" instrument_node="">
</span><p data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">In the years since the publication of that study, a number of other studies have reported similar anti-cancer effects in both cell and animal models. Certain cannabinoids, including THC, CBN, and CBD, may be able to reduce the spread and growth of cancer cells.</span></p><span data-dcnode-id="835" instrument_node="">
</span><p data-dcnode-id="831"><a data-dcnode-id="833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mct.aacrjournals.org/content/early/2014/11/12/1535-7163.MCT-14-0402"><span data-dcnode-id="834" instrument_node="">One 2014 study</span></a><span data-dcnode-id="832" instrument_node="">, for example, examined the effects of THC and CBD extracts when used in conjunction with radiation therapy. Researchers found that the cannabis extracts increased the effectiveness of radiation against an aggressive type of brain cancer. The study’s authors concluded that THC and CBD may help prepare cancer cells to respond better to radiation therapy.</span></p><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="829" instrument_node="">It’s not all good news, however. </span><a data-dcnode-id="827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cancerres.aacrjournals.org/content/64/6/1943.long%23sec-10"><span data-dcnode-id="828" instrument_node="">One study published in</span></a><span data-dcnode-id="826" instrument_node=""> Cancer Research in 2004, for example, found that THC actually increased the growth rate of certain lung and brain cancer cells. Researchers were attempting to replicate the anti-cancer effects of earlier THC studies, but discovered the opposite instead.</span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="823" instrument_node="">More recently, there have been several early stage clinical trials involving human participants with cancer. These studies generally produce similar findings: </span><a data-dcnode-id="821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timesofcbd.com/how-to-find-top-cannabidiol-products-from-distributors/"><span data-dcnode-id="822" instrument_node="">CBD and THC oils</span></a><span data-dcnode-id="820" instrument_node=""> are safe for humans with cancer to take, but they have mixed results at actually treating the cancer.</span></p><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="816"><img alt="hemp and cbd" class="aligncenter size-full wp-image-16503" data-dcnode-id="817" height="371" loading="lazy" sizes="(max-width: 745px) 100vw, 745px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timesofcbd.com/wp-content/uploads/2019/09/hemp-and-cbd.jpg&amp;raw" srcset="https://timesofcbd.com/wp-content/uploads/2019/09/hemp-and-cbd.jpg 745w, https://timesofcbd.com/wp-content/uploads/2019/09/hemp-and-cbd-300x149.jpg 300w" width="745"></p><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="810"><span data-dcnode-id="814" instrument_node="">One study that Rick Simpson and RSO supporters frequently cite was published in 2013. A 14-year old girl with a specific type of leukemia worked with Rick Simpson to create a cannabinoid resin extract – referred to as </span><a data-dcnode-id="812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timesofcbd.com/full-spectrum-cbd-oil-vs-cbd-isolate/"><span data-dcnode-id="813" instrument_node="">hemp oil</span></a><span data-dcnode-id="811" instrument_node=""> – which she took daily. After taking the hemp oil, the girl’s cancer appeared to stop spreading. However, the girl started using other oils with mixed results. The girl died two months later from an unrelated gastrointestinal condition.</span></p><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Some of these results are promising and suggest that cannabis oil and CBD oil have powerful anti-cancer benefits. Overall, more research is needed to fully understand the mechanisms behind cannabinoids and cancer cells.</span></p><span data-dcnode-id="806" instrument_node="">
</span><h2 data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Side Effects of Rick Simpson Oil</span></h2><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Cannabis oil contains THC, which is a psychoactive substance. It can make you feel high. It can also produce a range of psychological symptoms similar to cannabis consumption in general, including:</span></p><span data-dcnode-id="800" instrument_node="">
</span><ul data-dcnode-id="779"><span data-dcnode-id="799" instrument_node="">
</span><li data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Paranoia</span></li><span data-dcnode-id="796" instrument_node="">
</span><li data-dcnode-id="793"><a data-dcnode-id="794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timesofcbd.com/cbd-for-anxiety/"><span data-dcnode-id="795" instrument_node="">Anxiety</span></a></li><span data-dcnode-id="792" instrument_node="">
</span><li data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Hallucinations</span></li><span data-dcnode-id="789" instrument_node="">
</span><li data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Disorientation</span></li><span data-dcnode-id="786" instrument_node="">
</span><li data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Depression</span></li><span data-dcnode-id="783" instrument_node="">
</span><li data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">Irritability</span></li><span data-dcnode-id="780" instrument_node="">
</span></ul><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">In addition to psychoactive effects, THC can also cause physical side effects, including:</span></p><span data-dcnode-id="775" instrument_node="">
</span><ul data-dcnode-id="752"><span data-dcnode-id="774" instrument_node="">
</span><li data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Low blood pressure</span></li><span data-dcnode-id="771" instrument_node="">
</span><li data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">Bloodshot eyes</span></li><span data-dcnode-id="768" instrument_node="">
</span><li data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Dizziness</span></li><span data-dcnode-id="765" instrument_node="">
</span><li data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Slow digestion</span></li><span data-dcnode-id="762" instrument_node="">
</span><li data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Sleep issues</span></li><span data-dcnode-id="759" instrument_node="">
</span><li data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Impaired motor control and reaction time</span></li><span data-dcnode-id="756" instrument_node="">
</span><li data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Impaired memory</span></li><span data-dcnode-id="753" instrument_node="">
</span></ul><span data-dcnode-id="751" instrument_node="">
</span><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Both the psychoactive and physical side effects typically only last a few hours and do not pose any major, long-term health risks.</span></p><span data-dcnode-id="748" instrument_node="">
</span><h2 data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Other Risks of Rick Simpson Oil</span></h2><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Generally, cannabis oil, CBD oil, and RSO are safe to take, according to the results of most studies to date.</span></p><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">The main risk of Rick Simpson Oil, of course, is that there’s limited evidence that it can cure cancer. Someone might stop taking a doctor-prescribed cancer treatment and begin taking RSO with disastrous effects. If the RSO doesn’t work, then the cancer can continue to spread until eventually it’s too late.</span></p><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Another risk is that Rick Simpson Oil is made at home, which could introduce some problems, including:</span></p><span data-dcnode-id="736" instrument_node="">
</span><ul data-dcnode-id="722"><span data-dcnode-id="735" instrument_node="">
</span><li data-dcnode-id="730"><span data-dcnode-id="734" instrument_node="">To make RSO, you’ll need to acquire a significant amount of </span><a data-dcnode-id="732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timesofcbd.com/smoking-marijuana-and-driving-while-high/"><span data-dcnode-id="733" instrument_node="">marijuana</span></a><span data-dcnode-id="731" instrument_node="">, which is illegal in some countries or states</span></li><span data-dcnode-id="729" instrument_node="">
</span><li data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">The process for making RSO at home is slightly risky; if a spark reaches one of the solvents used to make RSO during the cooking process, it can cause an explosion or fire</span></li><span data-dcnode-id="726" instrument_node="">
</span><li data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">The solvents themselves can leave behind cancer-causing residue if they are improperly handled</span></li><span data-dcnode-id="723" instrument_node="">
</span></ul><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Obviously, you can limit these risks by making RSO in a safe setting, and by following your doctor’s recommended cancer treatment in conjunction to using RSO. Remember: one of the studies that showed the effectiveness of RSO involved taking RSO in conjunction with traditional cancer treatment.</span></p><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Of course, you can also limit these risks by buying RSO from retailers online.</span></p><span data-dcnode-id="715" instrument_node="">
</span><h2 data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">What’s the Difference Between CBD Oil and Rick Simpson Oil (RSO)?</span></h2><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">CBD oil and Rick Simpson Oil (RSO) have both surged in popularity in recent years. What’s the difference between the two cannabis-derived oils?</span></p><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Both oils are made from the same plant – the cannabis plant. Botanically speaking, the cannabis genus includes both cannabis and hemp. However, hemp is known for having low THC content, while cannabis is not (among other differences).</span></p><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Rick Simpson Oil is almost always made specifically from Cannabis indica strains, which some studies show are more effective for physical ailments.</span></p><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Many people do, however, make Rick Simpson Oil from Cannabis sativa strains. RSO made from sativa strains may be more effective for treating mental illness.</span></p><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="695"><span data-dcnode-id="699" instrument_node="">CBD oil, on the other hand, is made from hemp, which is known for its high CBD and low THC content. CBD is a non-psychoactive cannabinoid found within the cannabis plant. It does not get you high, but many people claim </span><a data-dcnode-id="697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timesofcbd.com/hemp-oil-health-benefits-vs-side-effects/"><span data-dcnode-id="698" instrument_node="">CBD delivers powerful health benefits</span></a><span data-dcnode-id="696" instrument_node="">.</span></p><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">As mentioned above, RSO has THC content as high as 50 to 60% and CBD content of 10 to 15%, depending on the strain used. CBD oil, meanwhile, has trace amounts of cannabinoids like THC or CBN (0 to 0.03%) and anywhere from 2.5 to 20% CBD.</span></p><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Overall, CBD oil and Rick Simpson Oil (RSO) are two different products with different chemical components.</span></p><span data-dcnode-id="688" instrument_node="">
</span><h2 data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Who is Rick Simpson?</span></h2><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Rick Simpson is a Canadian medical marijuana advocate best known for popularizing Rick Simpson Oil, or RSO.</span></p><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Rick discovered the effects of cannabis oil long before medical marijuana was mainstream. In 1997, four years before medical marijuana was legalized across Canada, Rick Simpson was an engineer working at a Canadian hospital.</span></p><span data-dcnode-id="679" instrument_node="">
</span><p data-dcnode-id="677"><img alt="rick simpson" class="aligncenter size-full wp-image-16504" data-dcnode-id="678" height="371" loading="lazy" sizes="(max-width: 745px) 100vw, 745px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timesofcbd.com/wp-content/uploads/2019/09/rick-simpson.jpg&amp;raw" srcset="https://timesofcbd.com/wp-content/uploads/2019/09/rick-simpson.jpg 745w, https://timesofcbd.com/wp-content/uploads/2019/09/rick-simpson-300x149.jpg 300w" width="745"></p><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">Simpson worked in the boiler room of the hospital, covering the asbestos on the hospital’s pipes with powerful aerosol glue. The boiler room was poorly ventilated, and the toxic fumes caused temporary nervous system shock. Simpson collapsed, fell off the ladder, and hit his head. When he awoke, his colleagues took him to the emergency room.</span></p><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">For years after the accident, Rick suffered dizzy spells and ringing in his ears. His doctor prescribed medication, but it had limited effect and even made his symptoms worse.</span></p><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="665"><span data-dcnode-id="669" instrument_node="">Rick watched a documentary on the </span><a data-dcnode-id="667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timesofcbd.com/who-uses-cbd-oil/"><span data-dcnode-id="668" instrument_node="">healing effects of cannabis</span></a><span data-dcnode-id="666" instrument_node=""> and asked his doctor about medical marijuana, but his doctor refused to consider it as a source of treatment.</span></p><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Rick ended up getting cannabis on his own and noticed a significant improvement in his tinnitus and other symptoms.</span></p><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">In 2003, three small bumps appeared on Simpson’s arm. His doctor agreed that the bumps looked cancerous, and samples were taken for a biopsy. Rick had a form of skin cancer called basal cell carcinoma.</span></p><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">This is when Simpson stumbled upon the 1975 study linked above where THC was found to kill cancer cells in mice. Rick created a concentrated cannabis oil product, then applied the oil to the spots on his skin, wrapping the area in a bandage and leaving it for several days.</span></p><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Four days later, Rick removed the bandages and noticed the cancerous growths had disappeared. His doctor couldn’t believe it and refused to acknowledge cannabis as an alternative treatment. Rick was officially converted to the healing powers of cannabis.</span></p><span data-dcnode-id="652" instrument_node="">
</span><p data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">From this point forward, Rick began cultivating his own cannabis and harvesting his own plants to create a specialized form of cannabis concentrate known as Rick Simpson Oil, or RSO.</span></p><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Rick also wanted that oil to be available to anyone who needed it, free of charge. That’s why Rick has never manufactured and sold his own RSO.</span></p><span data-dcnode-id="646" instrument_node="">
</span><p data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Over the following years, Rick faced increased scrutiny from law enforcement. His home was raided multiple times by police. At one point, the Royal Canadian Mounted Police (RCMP) cut down and confiscated more than 2,600 plants from his residence. Undeterred, Rick continues to spread his findings to this day.</span></p><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="641"><img alt="cooking rso" class="aligncenter size-full wp-image-16505" data-dcnode-id="642" height="371" loading="lazy" sizes="(max-width: 745px) 100vw, 745px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timesofcbd.com/wp-content/uploads/2019/09/cooking-rso.jpg&amp;raw" srcset="https://timesofcbd.com/wp-content/uploads/2019/09/cooking-rso.jpg 745w, https://timesofcbd.com/wp-content/uploads/2019/09/cooking-rso-300x149.jpg 300w" width="745"></p><span data-dcnode-id="640" instrument_node="">
</span><h2 data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">How to Make Rick Simpson Oil (RSO) at Home</span></h2><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="632"><span data-dcnode-id="636" instrument_node="">You can find plenty of Rick Simpson Oil recipes online. It’s not overly difficult, although there are some small risks involved. The process isn’t much different from making cannabutter and similar types of </span><a data-dcnode-id="634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timesofcbd.com/cannabis-infused-topicals-and-skincare-trend-in-asia-and-usa/"><span data-dcnode-id="635" instrument_node="">infused cannabis oils</span></a><span data-dcnode-id="633" instrument_node="">.</span></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">This recipe will create 60g of oil, good for a 90 day treatment plan. As a general rule, each ounce of cannabis produces 3 to 4 grams of RSO.</span></p><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="625"><strong data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Ingredients:</span></strong></p><span data-dcnode-id="624" instrument_node="">
</span><ul data-dcnode-id="598"><span data-dcnode-id="623" instrument_node="">
</span><li data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">1 pound of dried cannabis (indica strain)</span></li><span data-dcnode-id="620" instrument_node="">
</span><li data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">2 gallons of solvent (99% isopropyl alcohol is most popular, but people also use butane, ethanol, and other solvents)</span></li><span data-dcnode-id="617" instrument_node="">
</span><li data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">5 gallon bucket</span></li><span data-dcnode-id="614" instrument_node="">
</span><li data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">A deep bowl</span></li><span data-dcnode-id="611" instrument_node="">
</span><li data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">A wooden spoon for stirring</span></li><span data-dcnode-id="608" instrument_node="">
</span><li data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Cheesecloth</span></li><span data-dcnode-id="605" instrument_node="">
</span><li data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Rice cooker (you don’t technically need a rice cooker, but it’s useful for maintaining a slow and steady temperature during the cooking process)</span></li><span data-dcnode-id="602" instrument_node="">
</span><li data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Plastic catheter tip syringe</span></li><span data-dcnode-id="599" instrument_node="">
</span></ul><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="594"><strong data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">Recipe:</span></strong></p><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="589"><strong data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Step 1)</span></strong><span data-dcnode-id="590" instrument_node=""> Place the dried cannabis into the 5 gallon bucket, then pour the solvent over the cannabis until it’s covered.</span></p><span data-dcnode-id="588" instrument_node="">
</span><p data-dcnode-id="584"><strong data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Step 2)</span></strong><span data-dcnode-id="585" instrument_node=""> Stir and crush the plant material with your wooden spoon while adding the solvent to your mixture. Continue stirring the mixture for about three minutes while the THC dissolves into the solvent. About 80% of the THC will be dissolved into the solvent.</span></p><span data-dcnode-id="583" instrument_node="">
</span><p data-dcnode-id="579"><strong data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Step 3) </span></strong><span data-dcnode-id="580" instrument_node="">Drain the solvent from the plant material in your bowl using the cheesecloth, then place the plant material back into the bucket and add more solvent. Continue stirring for three minutes.</span></p><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="574"><strong data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Step 4)</span></strong><span data-dcnode-id="575" instrument_node=""> Drain the solvent from the plant material into your bowl using the cheesecloth, then discard the remaining plant material.</span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="569"><strong data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Step 5)</span></strong><span data-dcnode-id="570" instrument_node=""> Transfer your solvent to the rice cooker until it is about ¾ full, then turn on your rice cooker.</span></p><span data-dcnode-id="568" instrument_node="">
</span><p data-dcnode-id="564"><strong data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Note:</span></strong><span data-dcnode-id="565" instrument_node=""> You don’t technically need a rice cooker. However, rice cookers let you maintain a slow, steady temperatures. If you heat the mixture above 300 degrees F (148 degrees C), the cannabinoids will cook off and the RSO will be worthless. Using a Crockpot or slow cooker is not recommended, as it’s easy to overheat the mixture.</span></p><span data-dcnode-id="563" instrument_node="">
</span><p data-dcnode-id="559"><strong data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Step 6)</span></strong><span data-dcnode-id="560" instrument_node=""> Use the rice cooker to maintain a steady temperature between 210 and 230 degrees F (100 to 110 degrees C); this is the temperature at which decarboxylation occurs, releasing the active components from the cannabis plant.</span></p><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="554"><strong data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Step 7)</span></strong><span data-dcnode-id="555" instrument_node=""> Wait for the solvent to evaporate as the rice cooker heats up. Continue adding your mixture to the rice cooker bit by bit.</span></p><span data-dcnode-id="553" instrument_node="">
</span><p data-dcnode-id="549"><strong data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Note:</span></strong><span data-dcnode-id="550" instrument_node=""> Keep your rice cooker in an open, well-ventilated area. The solvent is highly combustible, so avoid all flames, stovetops, sparks, cigarettes, lighters, etc. during any stage of this process.</span></p><span data-dcnode-id="548" instrument_node="">
</span><p data-dcnode-id="544"><strong data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Step 8)</span></strong><span data-dcnode-id="545" instrument_node=""> Once the solvent has evaporated, siphon the oil into your syringe for easy dosing. The RSO will be thick, and it may be difficult to dispense. Run the syringe under hot water with the RSO mixture inside to reduce viscosity.</span></p><span data-dcnode-id="543" instrument_node="">
</span><h2 data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">How to Take RSO</span></h2><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Talk to your doctor to determine the best RSO dosage for your unique needs or condition.</span></p><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Generally, the goal is to gradually consume 60g of Rick Simpson Oil (the same amount made in the recipe above) over a 90 day period, increasing your dose gradually over the treatment period.</span></p><span data-dcnode-id="534" instrument_node="">
</span><p data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Most people take RSO sublingually, placing drops under your tongue for the fastest absorption rate. However, you can also take it in a capsule (slowest-acting effects, but the effects last longer) or as a topical applied directly to your skin (to potentially treat skin issues).</span></p><span data-dcnode-id="531" instrument_node="">
</span><p data-dcnode-id="527"><strong data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">Week 1)</span></strong><span data-dcnode-id="528" instrument_node=""> Start with three doses every day, with each dose about the size of half a grain of rice, administered once every eight hours (morning, noon, and night); your first dose should be about one quarter of one drop of RSO</span></p><span data-dcnode-id="526" instrument_node="">
</span><p data-dcnode-id="522"><strong data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Weeks 2 through 5) </span></strong><span data-dcnode-id="523" instrument_node="">Double your dose every four days; it should take 3 to 5 weeks to reach the full RSO dosage of one gram, which means you’re taking about 8 to 9 rice-sized drops of RSO every eight hours</span></p><span data-dcnode-id="521" instrument_node="">
</span><p data-dcnode-id="517"><strong data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Weeks 5 Through 12)</span></strong><span data-dcnode-id="518" instrument_node=""> Continue taking one gram of RSO per day until you’ve consumed the full 60g of RSO</span></p><span data-dcnode-id="516" instrument_node="">
</span><p data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">RSO can have a bitter or unpleasant taste. Some people mix RSO with foods like bananas to mask the taste. Others just swallow the oil directly.</span></p><span data-dcnode-id="513" instrument_node="">
</span><h2 data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">How to Buy RSO</span></h2><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">RSO has become increasingly popular in recent years. A number of cannabis retailers now sell RSO in various forms.</span></p><span data-dcnode-id="507" instrument_node="">
</span><p data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Lazarus Naturals, for example, sells RSO CBD Oil for $40 to $180.</span></p><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Remember: RSO contains high levels (50 to 60%) of THC, which means it’s only legal in jurisdictions where recreational use of marijuana is legal (or you have a valid prescription).</span></p><span data-dcnode-id="501" instrument_node="">
</span><h2 data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">Final Word</span></h2><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Rick Simpson Oil is backed by some promising research. However, other studies have shown that the oil has mixed effectiveness when treating cancer. Some studies have even shown that THC can increase the growth of cancer cells.</span></p><span data-dcnode-id="495" instrument_node="">
</span><p data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Today, some people take RSO CBD oil, combining the benefits of RSO with the legality of CBD.</span></p><span data-dcnode-id="492" instrument_node="">
</span><p data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Ultimately, Rick Simpson Oil could be a legitimate cure for cancer – or it could be complete snake oil. Until we conduct large-scale human trials on RSO, CBD oil, or cannabis oil, it’s impossible to say whether or not these oils are effective for treating cancer and other health conditions.</span></p><span data-dcnode-id="489" instrument_node="">
