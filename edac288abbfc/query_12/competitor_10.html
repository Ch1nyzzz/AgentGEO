l-to-top" data-dcnode-id="786"></div><div class="hdr-spacer" data-dcnode-id="785"></div><span data-dcnode-id="784" instrument_node=""> </span><span data-dcnode-id="781" instrument_node=""> </span><div class="content-area" data-dcnode-id="186" id="primary"><div class="background-single" data-dcnode-id="778"></div><div class="row row-visible-flex" data-dcnode-id="461"><div class="col-2-3 transform" data-dcnode-id="497"><div class="page-single" data-dcnode-id="500"><main class="site-main" data-dcnode-id="501" id="main"><div class="breadcrumbs" data-dcnode-id="756"><ul class="" data-dcnode-id="757" itemscope="" itemtype="http://schema.org/BreadcrumbList"><span data-dcnode-id="777" instrument_node=""> </span><li data-dcnode-id="769" itemprop="itemListElement" itemscope="" itemtype="http://schema.org/ListItem"><span data-dcnode-id="776" instrument_node=""> </span><a data-dcnode-id="770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wayofleaf.com/cannabis" itemprop="item"><span data-dcnode-id="775" instrument_node=""> </span><span data-dcnode-id="773" itemprop="name"><span data-dcnode-id="774" instrument_node="">Cannabis</span></span><meta content="2" data-dcnode-id="772" itemprop="position"><span data-dcnode-id="771" instrument_node=""> </span></a></li><li class="breadcrumbs-sep" data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">/</span></li><li data-dcnode-id="759" itemprop="itemListElement" itemscope="" itemtype="http://schema.org/ListItem"><span data-dcnode-id="766" instrument_node=""> </span><a data-dcnode-id="760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wayofleaf.com/cannabis/101" itemprop="item"><span data-dcnode-id="765" instrument_node=""> </span><span data-dcnode-id="763" itemprop="name"><span data-dcnode-id="764" instrument_node="">Cannabis 101</span></span><meta content="3" data-dcnode-id="762" itemprop="position"><span data-dcnode-id="761" instrument_node=""> </span></a></li><span data-dcnode-id="758" instrument_node=""> </span></ul></div><div class="single-save-post" data-dcnode-id="753"><div class="save-post-button" data-dcnode-id="754" data-id="68457"><span data-dcnode-id="755" instrument_node=""> Save and Read Later</span></div></div><h1 data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">What Are the Side Effects of Cannabis Edibles?</span></h1><div class="post-info-author" data-dcnode-id="739"><span data-dcnode-id="750" instrument_node=""> </span><img alt="" class="avatar avatar-96 wp-user-avatar wp-user-avatar-96 alignnone photo" data-dcnode-id="749" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wayofleaf.com/wp-content/uploads/2020/12/image1-1-min-2.jpg&amp;raw" width="96"><div class="post-info-box" data-dcnode-id="740"><div class="post-info-box-item" data-dcnode-id="748"></div><div class="post-info-box-item" data-dcnode-id="741"><span data-dcnode-id="747" instrument_node=""> </span><span class="post-info-span" data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Written by</span></span><span data-dcnode-id="744" instrument_node=""> </span><a class="tag-author-name" data-dcnode-id="742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wayofleaf.com/about-us/dylan"><span data-dcnode-id="743" instrument_node="">Dylan Baker, B.S.</span></a></div></div></div><div class="post-info-tags" data-dcnode-id="730"><div class="tag-post-date" data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Updated on: 8 Jul, 2020</span></div><div class="tag-read" data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">6 min read</span></div><div class="tag-comment" data-dcnode-id="731"><span data-dcnode-id="734" instrument_node="">0</span><span data-dcnode-id="732"><span data-dcnode-id="733" instrument_node=""> comments</span></span></div></div><article data-dcnode-id="502"><div class="entry-content" data-dcnode-id="503"><p data-dcnode-id="725"><span data-dcnode-id="729" instrument_node="">Edibles have been a staple of the cannabis world for decades. The weed brownie is practically a symbol of the plant’s history. And although </span><a data-dcnode-id="727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wayofleaf.com/recipes/ways-to-make-pot-brownies"><span data-dcnode-id="728" instrument_node="">pot brownies</span></a><span data-dcnode-id="726" instrument_node=""> perhaps began as a way to conceal our consumption habits, they now offer a fantastic alternative to smoking.</span></p><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Now that several states allow medical or recreational cannabis use, new users are looking for ways to consume that don’t involve smoking. It’s no secret that smoking anything – be it cigarettes or joints – can be harmful to our lungs, and that’s why many users are seeking alternative methods.</span></p><p data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">These days, edibles come in numerous forms – you’re no longer limited to the old-fashioned brownie! There are lots of sweet treats available infused with cannabis, and some gourmet restaurants are even offering five-star meals infused with THC oils.</span></p><p data-dcnode-id="716"><span data-dcnode-id="720" instrument_node="">Whether you’re browsing space cakes in Amsterdam, enjoying a five-star menu in a cannabis-themed restaurant, or attempting your own cannabis delight, there are some things you should know about cannabis edibles. Primarily, you need to be aware of the </span><a data-dcnode-id="718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wayofleaf.com/education/thc-side-effects-tetrahydrocannabinol"><span data-dcnode-id="719" instrument_node="">side effects</span></a><span data-dcnode-id="717" instrument_node="">. Edibles are quite different to smoking, and that’s why we created this guide; read on to learn more about the side effects of edibles.</span></p><h2 class="listItem-0" data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Why Are Edibles Different?</span></h2><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">The traditional way to consume cannabis is through smoking. You burn the joint containing cannabis, and when you inhale, the cannabinoids enter your lungs. From there, they can travel around the rest of the body and trigger the numerous effects associated with marijuana.</span></p><p data-dcnode-id="707"><span data-dcnode-id="711" instrument_node="">However, it’s more than just cannabinoids you’re inhaling. You also get burned plant matter and paper, and potentially, carcinogens. Experts have long been concerned about the </span><a data-dcnode-id="709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wayofleaf.com/education/can-lung-damage-be-repaired-after-smoking"><span data-dcnode-id="710" instrument_node="">long-term effects of smoking</span></a><span data-dcnode-id="708" instrument_node="">; it can permanently damage your respiratory system even after you’ve stopped smoking.</span></p><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Edibles, of course, don’t enter your respiratory system at all. Instead, they go through the digestive system, where the body breaks them down like regular food. As the food breaks down, the cannabinoids are released, and they find their way into the bloodstream.</span></p><h4 data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">There are several differences between these two popular methods:</span></h4><ul data-dcnode-id="686"><li data-dcnode-id="699"><b data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Speed:</span></b><span data-dcnode-id="700" instrument_node=""> Cannabinoids that enter via the respiratory system take effect almost immediately. Digested cannabinoids, however, can take up to an hour or more to kick in.</span></li><li data-dcnode-id="695"><b data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Potency:</span></b><span data-dcnode-id="696" instrument_node=""> According to some studies, edibles offer a lower bioavailability than inhaled marijuana. In other words, your body can’t make use of all of the cannabinoids in edibles because they are lost to the digestive system.</span></li><li data-dcnode-id="691"><b data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Effects:</span></b><span data-dcnode-id="692" instrument_node=""> Some users report different experiences when they use edibles compared to joints. Some say that edibles can lead to a more intense and psychoactive high, despite the reduced bioavailability. But perhaps these users had one too many weed brownies!</span></li><li data-dcnode-id="687"><b data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Duration:</span></b><span data-dcnode-id="688" instrument_node=""> The high from edibles can last for multiple hours – much longer than marijuana consumed in other forms! This is because the cannabinoids are released slowly.</span></li></ul><p data-dcnode-id="678"><span data-dcnode-id="685" instrument_node="">The precise effects and </span><a data-dcnode-id="683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wayofleaf.com/cbd/101/cbd-bioavailability"><span data-dcnode-id="684" instrument_node="">bioavailability of edibles</span></a><span data-dcnode-id="682" instrument_node=""> depend on numerous factors. For example, your diet, metabolism, and BMI all come into play. Even the type of edible can make a difference! Fatty foods can improve digestion of cannabinoids, so </span><a data-dcnode-id="680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wayofleaf.com/blog/should-you-wash-cannabutter-for-better-tasting-edibles"><span data-dcnode-id="681" instrument_node="">cannabutter-heavy foods</span></a><span data-dcnode-id="679" instrument_node=""> are key for a killer high.</span></p><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">You need to tread carefully, though, because the potency of edibles can cause problems.</span></p><h2 class="listItem-1" data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">Side Effects of Marijuana</span></h2><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Whatever way you use it, marijuana often has side effects. All good things have a couple of downsides, right?</span></p><p data-dcnode-id="670"><img alt="edible-marijuana-side-effects" class="lazyload size-full wp-image-81678 aligncenter" data-dcnode-id="671" data-sizes="(max-width: 900px) 100vw, 900px" data-src="https://wayofleaf.com/wp-content/uploads/2020/06/wol_side-effects-of-marijuana.jpg" data-srcset="https://wayofleaf.com/wp-content/uploads/2020/06/wol_side-effects-of-marijuana.jpg 900w, https://wayofleaf.com/wp-content/uploads/2020/06/wol_side-effects-of-marijuana-324x180.jpg 324w, https://wayofleaf.com/wp-content/uploads/2020/06/wol_side-effects-of-marijuana-768x427.jpg 768w" height="500" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20900%20500%22%3E%3C/svg%3E" width="900"></p><h3 class="listItem-2" data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Short-Term Side Effects</span></h3><ul data-dcnode-id="645"><li data-dcnode-id="661"><b data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Dry Mouth:</span></b><span data-dcnode-id="665" instrument_node=""> Also called </span><a data-dcnode-id="663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wayofleaf.com/cannabis/101/the-science-behind-weed-and-cotton-mouth"><span data-dcnode-id="664" instrument_node="">cottonmouth</span></a><span data-dcnode-id="662" instrument_node="">, a dry mouth is one of the key side effects of cannabis. Researchers have been trying to figure out precisely why this happens for years. It turns out that, when the THC binds to cannabinoid receptors in the body, the submandibular glands stop producing as much saliva. This results in a dry mouth.</span></li><li data-dcnode-id="657"><b data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Red, Bloodshot Eyes:</span></b><span data-dcnode-id="658" instrument_node=""> One of the easiest ways to spot a stoner is their eyes. THC dilates blood vessels around the eyes, causing redness. Some people may also feel that their eyes are dry.</span></li><li data-dcnode-id="650"><b data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">The Munchies:</span></b><span data-dcnode-id="654" instrument_node=""> We all know about </span><a data-dcnode-id="652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wayofleaf.com/blog/how-to-not-get-the-munchies-when-high"><span data-dcnode-id="653" instrument_node="">the munchies</span></a><span data-dcnode-id="651" instrument_node="">, those hunger pangs you experience after toking. While some MMJ patients may use marijuana to increase appetite, the munchies remain an unwanted side effect for many.</span></li><li data-dcnode-id="646"><b data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Anxiety/Paranoia:</span></b><span data-dcnode-id="647" instrument_node=""> High doses of THC can cause anxiety and paranoia in some users. This doesn’t tend to occur with lower doses, but it all depends on your THC tolerance.</span></li></ul><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Most of these side effects are easy to counter; for example, drinking water can help with dry mouth.</span></p><h3 class="listItem-3" data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">Long-Term Side Effects</span></h3><ul data-dcnode-id="622"><li data-dcnode-id="637"><b data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Respiratory Issues:</span></b><span data-dcnode-id="638" instrument_node=""> As mentioned above, smoking anything can damage your lungs in the long term.</span></li><li data-dcnode-id="630"><b data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Addiction:</span></b><span data-dcnode-id="634" instrument_node=""> Although many advocates of marijuana will tell you that </span><a data-dcnode-id="632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wayofleaf.com/cbd/ailments/cbd-to-treat-drug-addiction"><span data-dcnode-id="633" instrument_node="">addiction</span></a><span data-dcnode-id="631" instrument_node=""> is impossible, the act of smoking can become an addictive behavior, and you may end up relying on cannabis in a similar way that some individuals rely on alcohol. It’s important to be careful and use responsibly.</span></li><li data-dcnode-id="623"><b data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Mental Issues in Teens:</span></b><span data-dcnode-id="627" instrument_node=""> Some </span><a data-dcnode-id="625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3930618/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="626" instrument_node="">studies</span></a><span data-dcnode-id="624" instrument_node=""> have shown that marijuana use has more negative long-term effects for teenagers and young people. Since the brain is not fully developed, THC’s effects may have ramifications with repeated use. These studies are sometimes biased, but it’s worth considering if you’re of adolescent age or someone close to you is thinking about using cannabis.</span></li></ul><p data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">Some of these long-term effects come as a result of smoking. However, edibles have some side effects of their own. Let’s find out how edibles are different.</span></p><h2 class="listItem-4" data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">Side Effects of Cannabis Edibles: Things to Know</span></h2><p data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">So, let’s walk you through an edible high. When you eat an edible, you won’t feel the effects right away; they can take between 30 and 90 minutes to kick in. However, the high won’t peak until 2-4 hours after you ate the edibles. The exact time will depend on your body and numerous other factors.</span></p><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Just like other forms of consumption, you may experience:</span></p><ul data-dcnode-id="603"><li data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Dry mouth</span></li><li data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Dry, red eyes</span></li><li data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Changes in visual perception</span></li><li data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Changes in perception of time</span></li><li data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Loss of short-term memory</span></li></ul><p data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">These are all pretty typical side effects of marijuana. However, edibles can be a little more dangerous because of how long they take to kick in.</span></p><p data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">In the years between 2005 and 2011, calls to the U.S. poison control centers regarding marijuana increased by 30% in states with decriminalized marijuana. Why? Because people were accidentally eating edibles or were consuming too much at once. It’s all too easy to reach for another edible when an hour has passed and you haven’t experienced any effects.</span></p><p data-dcnode-id="591"><span data-dcnode-id="598" instrument_node="">However, marijuana edibles are pretty potent. If you eat more than you require, the high will hit you like a freight train – and it </span><em data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">won’t</span></em><span data-dcnode-id="595" instrument_node=""> be pleasant! You are likely to experience hallucinations, anxiety, and </span><a data-dcnode-id="593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wayofleaf.com/cannabis/101/paranoia-and-weed"><span data-dcnode-id="594" instrument_node="">paranoia</span></a><span data-dcnode-id="592" instrument_node="">. You may also feel queasy and nauseous, so prepare to feel sick!</span></p><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">When you feel sick, sedated, anxious, and are hallucinating, it’s called ‘greening out’. It’s not fatal, and you will recover. However, it’s not a situation you want to be in! Here are some tips for staying safe with edibles.</span></p><h2 class="listItem-5" data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">What You Can Do to Reduce the Risk of Edibles Side Effects</span></h2><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Here are the solutions for several side effects:</span></p><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">The cardinal rule is to always use edibles with friends, or in the very least, in a safe environment. At the end of the day, marijuana is usually intoxicating and you should try to avoid putting yourself in danger.</span></p><div class="comparing_table" data-dcnode-id="518"><table data-dcnode-id="519"><tbody data-dcnode-id="520"><tr data-dcnode-id="576"><th data-dcnode-id="580"><p data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Side Effect</span></p></th><th data-dcnode-id="577"><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Solution</span></p></th></tr><tr data-dcnode-id="565"><th class="child-hide-tbl" data-dcnode-id="573"><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Dry Mouth</span></p></th><td class="child-hide-tbl" data-dcnode-id="566"><div data-dcnode-id="570"><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Solution</span></p></div><div data-dcnode-id="567"><p data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Keep a glass of water on hand for when you’re experiencing cotton mouth.</span></p></div></td></tr><tr data-dcnode-id="554"><th class="child-hide-tbl" data-dcnode-id="562"><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Dry Eyes</span></p></th><td class="child-hide-tbl" data-dcnode-id="555"><div data-dcnode-id="559"><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Solution</span></p></div><div data-dcnode-id="556"><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">For some, eye drops are a savior when you’re experiencing bloodshot eyes.</span></p></div></td></tr><tr data-dcnode-id="543"><th class="child-hide-tbl" data-dcnode-id="551"><p data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">Anxiety</span></p></th><td class="child-hide-tbl" data-dcnode-id="544"><div data-dcnode-id="548"><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Solution</span></p></div><div data-dcnode-id="545"><p data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Always stick to a low THC dose. Don’t eat another edible until several hours later, or the combined efforts of both edibles will hit you all at once.</span></p></div></td></tr><tr data-dcnode-id="532"><th class="child-hide-tbl" data-dcnode-id="540"><p data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Sedation/Fatigue</span></p></th><td class="child-hide-tbl" data-dcnode-id="533"><div data-dcnode-id="537"><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Solution</span></p></div><div data-dcnode-id="534"><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Make sure you’re somewhere comfortable and somewhere you don’t mind passing out! Don’t drive to the location you plan on consuming edibles when you have no way to get home.</span></p></div></td></tr><tr data-dcnode-id="521"><th class="child-hide-tbl" data-dcnode-id="529"><p data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Nausea/Paranoia/Hallucinations</span></p></th><td class="child-hide-tbl" data-dcnode-id="522"><div data-dcnode-id="526"><p data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Solution</span></p></div><div data-dcnode-id="523"><p data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">You should always use edibles with friends. That way, if anything negative happens to you, you have a support network that can help you out.</span></p></div></td></tr></tbody></table></div><h2 class="listItem-6" data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Final Thoughts on Cannabis Edibles and Their Side Effects</span></h2><p data-dcnode-id="511"><span data-dcnode-id="515" instrument_node="">Edibles are fun. They’re a tasty and enjoyable way to take marijuana, including for medical patients and recreational users alike. Whatever your reason for using marijuana, </span><a data-dcnode-id="513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wayofleaf.com/cannabis/101/cannabis-edibles-101"><span data-dcnode-id="514" instrument_node="">edibles</span></a><span data-dcnode-id="512" instrument_node=""> might be calling to you.</span></p><p data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">Despite all their positives, edibles have a few side effects. Many of them are the same as what you experience with other consumption methods. However, the potency and delayed effects of edibles can lead to adverse reactions if you’re not careful.</span></p><p data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Luckily, most side effects have quick fixes. As long as you’re using marijuana edibles responsibly, you should have nothing to worry about.</span></p><div class="bottom-content" data-dcnode-id="504"><div class="like-btn lazyhtml lazyfacebook" data-dcnode-id="505" data-html="<iframe src=&quot;https://www.facebook.com/plugins/like.php?locale=en_US&amp;href=https%3A%2F%2Fwww.facebook.com%2FMarijuanaBreak-204962099895761&amp;width=97&amp;layout=button_count&amp;action=like&amp;size=large&amp;show_faces=false&amp;share=false&amp;height=28&amp;appId&quot; width=&quot;105&quot; height=&quot;28&quot; style=&quot;border:none;overflow:hidden&quot; scrolling=&quot;no&quot; frameborder=&quot;0&quot; allowTransparency=&quot;true&quot; allow=&quot;encrypted-media&quot;></iframe>"><div class="like-btn-label" data-dcnode-id="506"></div></div></div></div></article></main></div><div class="email-subscription" data-dcnode-id="498"><div class="general" data-dcnode-id="499" id="om-pwonvswnv60lngzszj5j-holder"></div></div></div><div class="col-1-3 sidebar sidebar-desktop" data-dcnode-id="462"><div class="sidebar-desktop-sticky" data-dcnode-id="463" id="sidebar_sticky_single"><div data-dcnode-id="464"><div class="table_of_content3 table-margin" data-dcnode-id="471"><div class="table_of_content3_head" data-dcnode-id="495"><span data-dcnode-id="496" instrument_node=""> Table of Contents</span></div><div class="table_of_content3_main newtbl" data-dcnode-id="473"><div class="perentslist" data-dcnode-id="492"><span data-dcnode-id="493" scrollto="listItem-0"><span data-dcnode-id="494" instrument_node="">Why Are Edibles Different?</span></span></div><div class="perentslist plus" data-dcnode-id="483"><span data-dcnode-id="490" scrollto="listItem-1"><span data-dcnode-id="491" instrument_node="">Side Effects of Marijuana</span></span><div class="child-list_tbl" data-dcnode-id="487"><span data-dcnode-id="488" scrollto="listItem-2"><span data-dcnode-id="489" instrument_node="">Short-Term Side Effects</span></span></div><div class="child-list_tbl" data-dcnode-id="484"><span data-dcnode-id="485" scrollto="listItem-3"><
