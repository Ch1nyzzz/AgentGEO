</span><div class="sidebar--widget" data-dcnode-id="629"><div class="sidebar--title" data-dcnode-id="686"><h5 data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Table of Contents</span></h5></div><ul class="toc_widget_list no_bullets" data-dcnode-id="630"><li data-dcnode-id="673"><a data-dcnode-id="684" href="#Types_of_CBD_Products_Their_Common_Side_Effects"><span data-dcnode-id="685" instrument_node="">Types of CBD Products &amp; Their Common Side Effects</span></a><ul data-dcnode-id="674"><li data-dcnode-id="681"><a data-dcnode-id="682" href="#1_Sublingual_CBD_Oil"><span data-dcnode-id="683" instrument_node="">1. Sublingual (CBD Oil)</span></a></li><li data-dcnode-id="678"><a data-dcnode-id="679" href="#2_Inhalation_Vapes_Hemp_Flower"><span data-dcnode-id="680" instrument_node="">2. Inhalation (Vapes &amp; Hemp Flower)</span></a></li><li data-dcnode-id="675"><a data-dcnode-id="676" href="#3_Topical_CBD_Creams_Salves_Balms"><span data-dcnode-id="677" instrument_node="">3. Topical CBD (Creams, Salves, &amp; Balms)</span></a></li></ul></li><li data-dcnode-id="663"><a data-dcnode-id="671" href="#What_are_the_Common_Side_Effects_of_Cannabidiol"><span data-dcnode-id="672" instrument_node="">What are the Common Side Effects of Cannabidiol?</span></a><ul data-dcnode-id="664"><li data-dcnode-id="668"><a data-dcnode-id="669" href="#Short-Term_Side_Effects_of_CBD"><span data-dcnode-id="670" instrument_node="">Short-Term Side Effects of CBD</span></a></li><li data-dcnode-id="665"><a data-dcnode-id="666" href="#Long-Term_Side_Effects_of_CBD"><span data-dcnode-id="667" instrument_node="">Long-Term Side Effects of CBD</span></a></li></ul></li><li data-dcnode-id="647"><a data-dcnode-id="661" href="#Considerations_and_Precautions_Before_Taking_CBD"><span data-dcnode-id="662" instrument_node="">Considerations and Precautions Before Taking CBD</span></a><ul data-dcnode-id="648"><li data-dcnode-id="658"><a data-dcnode-id="659" href="#1_Interaction_of_CBD_with_Other_Drugs"><span data-dcnode-id="660" instrument_node="">1. Interaction of CBD with Other Drugs</span></a></li><li data-dcnode-id="655"><a data-dcnode-id="656" href="#2_Pregnant_Lactating_Mothers"><span data-dcnode-id="657" instrument_node="">2. Pregnant &amp; Lactating Mothers</span></a></li><li data-dcnode-id="652"><a data-dcnode-id="653" href="#3_Liver_Problems"><span data-dcnode-id="654" instrument_node="">3. Liver Problems</span></a></li><li data-dcnode-id="649"><a data-dcnode-id="650" href="#4_Allergy_to_Hemp_Cannabis"><span data-dcnode-id="651" instrument_node="">4. Allergy to Hemp &amp; Cannabis</span></a></li></ul></li><li data-dcnode-id="634"><a data-dcnode-id="645" href="#How_to_Avoid_CBD_Side_Effects"><span data-dcnode-id="646" instrument_node="">How to Avoid CBD Side Effects?</span></a><ul data-dcnode-id="635"><li data-dcnode-id="642"><a data-dcnode-id="643" href="#1_Start_Low_Go_Slow"><span data-dcnode-id="644" instrument_node="">1. Start Low, Go Slow</span></a></li><li data-dcnode-id="639"><a data-dcnode-id="640" href="#2_Know_Who_Should_Not_Take_CBD"><span data-dcnode-id="641" instrument_node="">2. Know Who Should Not Take CBD</span></a></li><li data-dcnode-id="636"><a data-dcnode-id="637" href="#3_Look_for_the_Products_Certificate_of_Analysis"><span data-dcnode-id="638" instrument_node="">3. Look for the Product’s Certificate of Analysis</span></a></li></ul></li><li data-dcnode-id="631"><a data-dcnode-id="632" href="#Final_Thoughts_Side-Effects_of_CBD"><span data-dcnode-id="633" instrument_node="">Final Thoughts: Side-Effects of CBD</span></a></li></ul></div><span data-dcnode-id="628" instrument_node=""> </span></div><span data-dcnode-id="626" instrument_node="">
</span></header><span data-dcnode-id="624" instrument_node="">
</span><div class="col-xs-12 single--content" data-dcnode-id="311" id="content"><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">We can’t deny that CBD oil offers many therapeutic effects — from the relief of common post-exercise pain to the control of severe symptoms such as seizures and post-traumatic stress disorder.</span></p><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">CBD, as a health supplement, became even more popular when studies show CBD to be non-psychoactive, non-addictive, and generally very safe.</span></p><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">As a 2019 Gallup Poll shows, one in seven American adults uses CBD not only for health maintenance but for symptom relief.</span></p><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">With CBD’s popularity, one can’t help but wonder — are there any CBD oil side effects that we have to be aware of?</span></p><span data-dcnode-id="611" instrument_node="">
</span><h2 data-dcnode-id="607"><span data-dcnode-id="608" id="Types_of_CBD_Products_Their_Common_Side_Effects"><strong data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">Types of CBD Products &amp; Their Common Side Effects</span></strong></span></h2><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Before we go into the details of the CBD side effects, let’s explore the different types of CBD products and their potential side effects.</span></p><span data-dcnode-id="603" instrument_node="">
</span><h3 data-dcnode-id="599"><span data-dcnode-id="600" id="1_Sublingual_CBD_Oil"><strong data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">1. Sublingual (CBD Oil)</span></strong></span></h3><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">CBD oils and tinctures fall under this category. The drops are placed under the tongue and left there for about a couple of minutes. The CBD is absorbed through tiny capillaries under the tongue — directly into the bloodstream.</span></p><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Common side effects from this type of application include dry mouth, decreased appetite, and changes in bowel habits.</span></p><span data-dcnode-id="592" instrument_node="">
</span><h3 data-dcnode-id="588"><span data-dcnode-id="589" id="2_Inhalation_Vapes_Hemp_Flower"><strong data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">2. Inhalation (Vapes &amp; Hemp Flower)</span></strong></span></h3><span data-dcnode-id="587" instrument_node="">
</span><p data-dcnode-id="583"><a data-dcnode-id="585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cfah.org/best-cbd-vape-pens/" rel="noopener" target="_blank"><span data-dcnode-id="586" instrument_node="">CBD products that you inhale</span></a><span data-dcnode-id="584" instrument_node=""> include smokable CBD flowers and vape oil.</span></p><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Because you’d be inhaling smoke or vapor, this type of CBD product often causes lung irritation, especially if the product makes use of risky solvents and additives.</span></p><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Other side effects also include dry mouth, lightheadedness, and dizziness. Some also report developing headaches.</span></p><span data-dcnode-id="576" instrument_node="">
</span><h3 data-dcnode-id="572"><span data-dcnode-id="573" id="3_Topical_CBD_Creams_Salves_Balms"><strong data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">3. Topical CBD (Creams, Salves, &amp; Balms)</span></strong></span></h3><span data-dcnode-id="571" instrument_node="">
</span><p data-dcnode-id="566"><span data-dcnode-id="570" instrument_node="">These </span><a data-dcnode-id="568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cfah.org/best-cbd-cream-for-pain/" rel="noopener" target="_blank"><span data-dcnode-id="569" instrument_node="">CBD-infused topical products</span></a><span data-dcnode-id="567" instrument_node=""> aren’t known to produce side effects when applied to the skin. If they do, it’s pretty rare and usually affects people allergic to hemp or marijuana.</span></p><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Some of the side effects of CBD topicals include skin rash, hives, and itching.</span></p><span data-dcnode-id="562" instrument_node="">
</span><h2 data-dcnode-id="558"><span data-dcnode-id="559" id="What_are_the_Common_Side_Effects_of_Cannabidiol"><strong data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">What are the Common Side Effects of Cannabidiol?</span></strong></span></h2><span data-dcnode-id="557" instrument_node="">
</span><p data-dcnode-id="553"><img alt="CBD Oil in Dropper Pulled Out from Bottle Beside Hemp Leaves" class="aligncenter size-full wp-image-3273 entered litespeed-loaded" data-dcnode-id="556" data-lazyloaded="1" data-ll-status="loaded" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://cfah.org/wp-content/uploads/2021/04/What-Are-CBD-Side-Effects.jpg" data-srcset="https://cfah.org/wp-content/uploads/2021/04/What-Are-CBD-Side-Effects.jpg 800w, https://cfah.org/wp-content/uploads/2021/04/What-Are-CBD-Side-Effects-300x169.jpg 300w, https://cfah.org/wp-content/uploads/2021/04/What-Are-CBD-Side-Effects-768x432.jpg 768w" height="450" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cfah.org/wp-content/uploads/2021/04/What-Are-CBD-Side-Effects.jpg&amp;raw" srcset="https://cfah.org/wp-content/uploads/2021/04/What-Are-CBD-Side-Effects.jpg 800w, https://cfah.org/wp-content/uploads/2021/04/What-Are-CBD-Side-Effects-300x169.jpg 300w, https://cfah.org/wp-content/uploads/2021/04/What-Are-CBD-Side-Effects-768x432.jpg 768w" width="800"><noscript data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">&lt;img class="aligncenter size-full wp-image-3273" src="https://cfah.org/wp-content/uploads/2021/04/What-Are-CBD-Side-Effects.jpg" alt="CBD Oil in Dropper Pulled Out from Bottle Beside Hemp Leaves" width="800" height="450" srcset="https://cfah.org/wp-content/uploads/2021/04/What-Are-CBD-Side-Effects.jpg 800w, https://cfah.org/wp-content/uploads/2021/04/What-Are-CBD-Side-Effects-300x169.jpg 300w, https://cfah.org/wp-content/uploads/2021/04/What-Are-CBD-Side-Effects-768x432.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript></p><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">As a whole, cannabidiol (CBD) is generally considered safe. Not only is it well-tolerated by users, but it also doesn’t cause significant adverse changes in one’s physiological parameters (heart rate, blood pressure, temperature, and respiratory rate).</span></p><span data-dcnode-id="549" instrument_node="">
</span><p data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Because of this effect and the fact that there are only a few cannabinoid receptors in the lower brainstem (part of the brain that controls heart and lung function), CBD doesn’t cause an overdose.</span></p><span data-dcnode-id="546" instrument_node="">
</span><p data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">This doesn’t mean that CBD is without side effects. Here are the most common side effects to watch out for:</span></p><span data-dcnode-id="543" instrument_node="">
</span><h3 data-dcnode-id="539"><span data-dcnode-id="540" id="Short-Term_Side_Effects_of_CBD"><strong data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Short-Term Side Effects of CBD</span></strong></span></h3><span data-dcnode-id="538" instrument_node="">
</span><h4 data-dcnode-id="535"><strong data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">1. Dry Mouth</span></strong></h4><span data-dcnode-id="534" instrument_node="">
</span><p data-dcnode-id="529"><span data-dcnode-id="533" instrument_node="">According to studies, the cannabinoids’ effects on the endocannabinoid system can lead to reduced saliva production, </span><a data-dcnode-id="531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cfah.org/cbd-and-dry-mouth/" rel="noopener" target="_blank"><span data-dcnode-id="532" instrument_node="">causing cottonmouth</span></a><span data-dcnode-id="530" instrument_node=""> (dry mouth).</span></p><span data-dcnode-id="528" instrument_node="">
</span><p data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Drinking plenty of water helps relieve dry mouth.</span></p><span data-dcnode-id="525" instrument_node="">
</span><h4 data-dcnode-id="522"><strong data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">2. Lower Blood Pressure</span></strong></h4><span data-dcnode-id="521" instrument_node="">
</span><p data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">The drop in blood pressure is temporary and may be due to CBD’s vasodilation effects on the blood vessels.</span></p><span data-dcnode-id="518" instrument_node="">
</span><p data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">When the blood vessels are relaxed and blood flows freely, there’s less pressure against the blood vessel walls, resulting in lower blood pressure.</span></p><span data-dcnode-id="515" instrument_node="">
</span><h4 data-dcnode-id="512"><strong data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">3. Dizziness &amp; Lightheadedness</span></strong></h4><span data-dcnode-id="511" instrument_node="">
</span><p data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">The dizziness and lightheadedness may be caused by the drop in blood pressure, but this will go away once it returns to its normal resting pressure.</span></p><span data-dcnode-id="508" instrument_node="">
</span><h4 data-dcnode-id="505"><strong data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">4. Sleepiness</span></strong></h4><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">This effect typically happens to people who take higher doses of CBD.</span></p><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="496"><span data-dcnode-id="500" instrument_node="">At very high doses, </span><a data-dcnode-id="498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cfah.org/best-cbd-oil-for-sleep/" rel="noopener" target="_blank"><span data-dcnode-id="499" instrument_node="">CBD promotes sleep</span></a><span data-dcnode-id="497" instrument_node="">, while low CBD doses promote wakefulness and alertness.</span></p><span data-dcnode-id="495" instrument_node="">
</span><h4 data-dcnode-id="492"><strong data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">5. Changes in Bowel Habits</span></strong></h4><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">CBD has a relaxing effect on the muscles, so some people develop mild diarrhea after taking CBD since it relaxes the bowels.</span></p><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">However, the changes in bowel habits may also be caused by the other ingredients found in the CBD oil.</span></p><span data-dcnode-id="485" instrument_node="">
</span><h3 data-dcnode-id="481"><span data-dcnode-id="482" id="Long-Term_Side_Effects_of_CBD"><strong data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">Long-Term Side Effects of CBD</span></strong></span></h3><span data-dcnode-id="480" instrument_node="">
</span><p data-dcnode-id="475"><span data-dcnode-id="479" instrument_node="">There’s still limited research on long-term CBD use, but according to a </span><a data-dcnode-id="477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6539990/" rel="noopener" target="_blank"><span data-dcnode-id="478" instrument_node="">study</span></a><span data-dcnode-id="476" instrument_node="">, prolonged CBD use has led to increased liver enzymes in mice.</span></p><span data-dcnode-id="474" instrument_node="">
</span><p data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">In humans, the long-term side effects of CBD haven’t been completely studied yet, although elevated liver enzymes were also seen in some patients.</span></p><span data-dcnode-id="471" instrument_node="">
</span><p data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Most CBD users report only a few side effects. The side effects they develop are usually mild, well-tolerated, and typically go away once the effects wear off.</span></p><span data-dcnode-id="468" instrument_node="">
</span><h2 data-dcnode-id="464"><span data-dcnode-id="465" id="Considerations_and_Precautions_Before_Taking_CBD"><strong data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">Considerations and Precautions Before Taking CBD</span></strong></span></h2><span data-dcnode-id="463" instrument_node="">
</span><p data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">It’s possible to develop CBD oil side effects, especially if you’re new to CBD products.</span></p><span data-dcnode-id="460" instrument_node="">
</span><p data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">However, you can reduce your risks of developing adverse side effects by understanding these considerations and precautions.</span></p><span data-dcnode-id="457" instrument_node="">
</span><h3 data-dcnode-id="453"><span data-dcnode-id="454" id="1_Interaction_of_CBD_with_Other_Drugs"><strong data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">1. Interaction of CBD with Other Drugs</span></strong></span></h3><span data-dcnode-id="452" instrument_node="">
</span><p data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">CBD is safe, but we always recommend speaking with your primary care physician first before trying CBD oil. He knows more about your medical history and can help you reach an informed decision.</span></p><span data-dcnode-id="449" instrument_node="">
</span><p data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">This is especially important if you’re taking medications. CBD is known to interact with several drugs. it can either amplify or dampen the drug’s potency, which could lead to more unwanted side effects.</span></p><span data-dcnode-id="446" instrument_node="">
</span><h3 data-dcnode-id="442"><span data-dcnode-id="443" id="2_Pregnant_Lactating_Mothers"><strong data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">2. Pregnant &amp; Lactating Mothers</span></strong></span></h3><span data-dcnode-id="441" instrument_node="">
</span><p data-dcnode-id="436"><span data-dcnode-id="440" instrument_node="">Cannabinoids are known to cross the placenta and the breastmilk, exposing the fetus or the baby and affecting their growth and development. To be on the safe side, you should </span><a data-dcnode-id="438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cfah.org/cbd-oil-and-breastfeeding/" rel="noopener" target="_blank"><span data-dcnode-id="439" instrument_node="">avoid CBD if you’re breastfeeding</span></a><span data-dcnode-id="437" instrument_node=""> or pregnant.</span></p><span data-dcnode-id="435" instrument_node="">
</span><p data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">If you still want to try CBD oil, we recommend speaking with your physician first.</span></p><span data-dcnode-id="432" instrument_node="">
</span><h3 data-dcnode-id="428"><span data-dcnode-id="429" id="3_Liver_Problems"><strong data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">3. Liver Problems</span></strong></span></h3><span data-dcnode-id="427" instrument_node="">
</span><p data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">As mentioned earlier, CBD has the potential to increase liver enzymes, so if you have liver problems, it’s best to avoid CBD oil or only use low doses of CBD.</span></p><span data-dcnode-id="424" instrument_node="">
</span><p data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">Again, we emphasize the importance of seeing your doctor before taking CBD, especially if you’re diagnosed with liver disease.</span></p><span data-dcnode-id="421" instrument_node="">
</span><h3 data-dcnode-id="417"><span data-dcnode-id="418" id="4_Allergy_to_Hemp_Cannabis"><strong data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">4. Allergy to Hemp &amp; Cannabis</span></strong></span></h3><span data-dcnode-id="416" instrument_node="">
</span><p data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">Allergic reactions to cannabis and hemp are pretty rare, but they do happen. Coming into contact with the plant, for example, can induce skin allergies, while inhaling its pollen can result in respiratory symptoms.</span></p><span data-dcnode-id="413" instrument_node="">
</span><p data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">To reduce the risks of an allergic reaction, you can try dabbing a small amount of oil on your skin and then wait for about half an hour to an hour. If you develop some skin rashes and hives, discontinue the oil immediately and consider visiting a doctor.</span></p><span data-dcnode-id="410" instrument_node="">
</span><h2 data-dcnode-id="406"><span data-dcnode-id="407" id="How_to_Avoid_CBD_Side_Effects"><strong data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">How to Avoid CBD Side Effects?</span></strong></span></h2><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="400"><img alt="Hemp Leaves Beside the CBD Oil and Dropper Lying on Surface" class="aligncenter size-full wp-image-3274 entered litespeed-loaded" data-dcnode-id="404" data-lazyloaded="1" data-ll-status="loaded" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://cfah.org/wp-content/uploads/2021/04/Side-Effects-of-CBD.jpg" data-srcset="https://cfah.org/wp-content/uploads/2021/04/Side-Effects-of-CBD.jpg 800w, https://cfah.org/wp-content/uploads/2021/04/Side-Effects-of-CBD-300x169.jpg 300w, https://cfah.org/wp-content/uploads/2021/04/Side-Effects-of-CBD-768x432.jpg 768w" height="450" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cfah.org/wp-content/uploads/2021/04/Side-Effects-of-CBD.jpg&amp;raw" srcset="https://cfah.org/wp-content/uploads/2021/04/Side-Effects-of-CBD.jpg 800w, https://cfah.org/wp-content/uploads/2021/04/Side-Effects-of-CBD-300x169.jpg 300w, https://cfah.org/wp-content/uploads/2021/04/Side-Effects-of-CBD-768x432.jpg 768w" width="800"><noscript data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">&lt;img class="aligncenter size-full wp-image-3274" src="https://cfah.org/wp-content/uploads/2021/04/Side-Effects-of-CBD.jpg" alt="Hemp Leaves Beside the CBD Oil and Dropper Lying on Surface" width="800" height="450" srcset="https://cfah.org/wp-content/uploads/2021/04/Side-Effects-of-CBD.jpg 800w, https://cfah.org/wp-content/uploads/2021/04/Side-Effects-of-CBD-300x169.jpg 300w, https://cfah.org/wp-content/uploads/2021/04/Side-Effects-of-CBD-768x432.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><span data-dcnode-id="401" instrument_node="">CBD oil is generally well-tolerated by users. Once your body gets used to the addition of CBD, these side effects resolve on their own.</span></p><span data-dcnode-id="399" instrument_node="">
</span><p data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">However, these side effects can also be pretty uncomfortable, so if you want to avoid them or at least reduce their intensity, follow these simple tips.</span></p><span data-dcnode-id="396" instrument_node="">
</span><h3 data-dcnode-id="392"><span data-dcnode-id="393" id="1_Start_Low_Go_Slow"><strong data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">1. Start Low, Go Slow</span></strong></span></h3><span data-dcnode-id="391" instrument_node="">
</span><p data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">This term simply means starting at the lowest dose possible and increasing or decreasing the dosage according to your needs.</span></p><span data-dcnode-id="388" instrument_node="">
</span><p data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">For example, the instruction is to take one full dropper, then you can start with half a dropper for about three to five days. If you didn’t notice any improvement, increase the dosage.</span></p><span data-dcnode-id="385" instrument_node="">
</span><p data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">However, if you developed adverse side effects on half a dropper, then decrease your dosage.</span></p><span data-dcnode-id="382" instrument_node="">
</span><p data-dcnode-id="377"><span data-dcnode-id="381" instrument_node="">Be consistent and be patient. You’ll soon find a </span><a data-dcnode-id="379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cfah.org/cbd-dosage/" rel="noopener" target="_blank"><span data-dcnode-id="380" instrument_node="">dosage perfect for your health needs</span></a><span data-dcnode-id="378" instrument_node="">.</span></p><span data-dcnode-id="376" instrument_node="">
</span><h3 data-dcnode-id="372"><span data-dcnode-id="373" id="2_Know_Who_Should_Not_Take_CBD"><strong data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">2. Know Who Should Not Take CBD</span></strong></span></h3><span data-dcnode-id="371" instrument_node="">
</span><p data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">If you’re allergic to hemp or cannabis, take medications, have liver problems, are pregnant, or are lactating, then be extra cautious in using CBD oil.</span></p><span data-dcnode-id="368" instrument_node="">
</span><p data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">Again, we recommend seeing your doctor before using CBD oil.</span></p><span data-dcnode-id="365" instrument_node="">
</span><h3 data-dcnode-id="361"><span data-dcnode-id="362" id="3_Look_for_the_Products_Certificate_of_Analysis"><strong data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">3. Look for the Product’s Certificate of Analysis</span></strong></span></h3><span data-dcnode-id="360" instrument_node="">
</span><p data-dcnode-id="356"><a data-dcnode-id="358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cfah.org/best-cbd-oil/" rel="noopener" target="_blank"><span data-dcnode-id="359" instrument_node="">Trusted CBD brands</span></a><span data-dcnode-id="357" instrument_node=""> always have their products tested by certified testing facilities to check for the presence of harmful pathogens, heavy metals, solvent residues, dangerous pesticides, and artificial fertilizers.</span></p><span data-dcnode-id="355" instrument_node="">
</span><p data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Don’t trust brands that can’t show proof of their CBD oil’s safety and quality.</span></p><span data-dcnode-id="352" instrument_node="">
</span><h4 data-dcnode-id="349"><strong data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">4. Read Reviews</span></strong></h4><span data-dcnode-id="348" instrument_node="">
</span><p data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">Reviews made by customers can help you choose a good CBD oil. These reviews let you know about the product’s expected effects (and side effects, if any).</span></p><span data-dcnode-id="345" instrument_node="">
</span><h4 data-dcnode-id="342"><strong data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">5. Avoid Too-Good-to-be-True Claims</span></strong></h4><span data-dcnode-id="341" instrument_node="">
</span><p data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">Bogus CBD companies will promise you the moon if they think it’ll make you buy their products. Their CBD oil can cure all types of diseases, and their CBD oil is the cheapest on the market.</span></p><span data-dcnode-id="338" instrument_node="">
</span><p data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">Producing premium-grade CBD oil doesn’t come cheap. Legit CBD brands invest money to buy state-of-the-art equipment and purchase high-quality, organic raw materials.</span></p><span data-dcnode-id="335" instrument_node="">
</span><p data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">If you see CBD brands offering cheap but “quality CBD oil,” avoid them. Not only are they violating FDA rules, but they may also be lying about their products, especially if they can’t produce valid laboratory test results.</span></p><span data-dcnode-id="332" instrument_node="">
</span><h2 data-dcnode-id="328"><span data-dcnode-id="329" id="Final_Thoughts_Side-Effects_of_CBD"><strong data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">Final Thoughts: Side-Effects of CBD</span></strong></span></h2><span data-dcnode-id="327" instrument_node="">
</span><p data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">It’s safe to use CBD oil daily. It can ease discomfort and help maintain normal health and wellbeing.</span></p><span data-dcnode-id="324" instrument_node="">
</span><p data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">However, like most health supplements, CBD also has its own side effects. It can cause dizziness, lightheadedness, dry mouth, changes in bowel habits, and sleepiness. It can even lower blood pressure.</span></p><span data-dcnode-id="321" instrument_node="">
</span><p data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">These side effects are very well-tolerated by users. They also typically go away once your body gets used to CBD.</span></p><span data-dcnode-id="318" instrument_node="">
</span><p data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">You can avoid these side effects by following the precautions and considerations mentioned above. You can also reduce the risk by choosing CBD oil made by trusted brands.</span></p><span data-dcnode-id="315" instrument_node="">
</span><p data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">Have you tried CBD oil and experienced some side effects? What did you do to get rid of them?</span></p><span data-dcnode-id="312" instrument_node="">
</span></div><span data-dcnode-id="310" instrument_node="">

ugs"><span data-dcnode-id="178" instrument_node="">1. Interaction of CBD with Other Drugs</span></a></li><li data-dcnode-id="173"><a data-dcnode-id="174" href="#2_Pregnant_Lactating_Mothers"><span data-dcnode-id="175" instrument_node="">2. Pregnant &amp; Lactating Mothers</span></a></li><li data-dcnode-id="170"><a data-dcnode-id="171" href="#3_Liver_Problems"><span data-dcnode-id="172" instrument_node="">3. Liver Problems</span></a></li><li data-dcnode-id="167"><a data-dcnode-id="168" href="#4_Allergy_to_Hemp_Cannabis"><span data-dcnode-id="169" instrument_node="">4. Allergy to Hemp &amp; Cannabis</span></a></li></ul></li><li data-dcnode-id="152"><a data-dcnode-id="163" href="#How_to_Avoid_CBD_Side_Effects"><span data-dcnode-id="164" instrument_node="">How to Avoid CBD Side Effects?</span></a><ul data-dcnode-id="153"><li data-dcnode-id="160"><a data-dcnode-id="161" href="#1_Start_Low_Go_Slow"><span data-dcnode-id="162" instrument_node="">1. Start Low, Go Slow</span></a></li><li data-dcnode-id="157"><a data-dcnode-id="158" href="#2_Know_Who_Should_Not_Take_CBD"><span data-dcnode-id="159" instrument_node="">2. Know Who Should Not Take CBD</span></a></li><li data-dcnode-id="154"><a data-dcnode-id="155" href="#3_Look_for_the_Products_Certificate_of_Analysis"><span data-dcnode-id="156" instrument_node="">3. Look for the Product’s Certificate of Analysis</span></a></li></ul></li><li data-dcnode-id="149"><a data-dcnode-id="150" href="#Final_Thoughts_Side-Effects_of_CBD"><span data-dcnode-id="151" instrument_node="">Final Thoughts: Side-Effects of CBD</span></a></li></ul></div><span data-dcnode-id="146" instrument_node=""> </span></aside><span data-dcnode-id="144" instrument_node="">
