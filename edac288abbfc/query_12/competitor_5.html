</span><p data-dcnode-id="2411"><strong data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">Is CBD safe? Has it been tested on humans? What are the side effects? </span></strong></p><span data-dcnode-id="2410" instrument_node="">

</span><p data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">In the bureaucratic language of the WHO — this essentially means there’s a lot of evidence to suggest CBD is safe, and that the side effects are mild and manageable.&nbsp;</span></p><span data-dcnode-id="2398" instrument_node="">

</span></p><span data-dcnode-id="2385" instrument_node="">

</span><p data-dcnode-id="2087"><strong data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">The short answer to this question is yes.</span></strong><span data-dcnode-id="2088" instrument_node=""> </span></p><span data-dcnode-id="2086" instrument_node="">
</span><p data-dcnode-id="2081"><span data-dcnode-id="2085" instrument_node="">Although </span><a data-dcnode-id="2083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/cbd-ultimate-guide/"><span data-dcnode-id="2084" instrument_node="">CBD (cannabidiol)</span></a><span data-dcnode-id="2082" instrument_node=""> has been proven time and time again to be inherently safe — nothing is entirely without side effects. Any health supplement or medication that causes a physiological change in the body has the potential to cause side effects. </span></p><span data-dcnode-id="2080" instrument_node="">
</span><p data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">CBD has many effects on the human body — which means it’s totally possible that some of these changes will be undesired. </span></p><span data-dcnode-id="2077" instrument_node="">
</span><p data-dcnode-id="2072"><span data-dcnode-id="2076" instrument_node="">These undesirable effects are what we refer to as a </span><em data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">side effects</span></em><span data-dcnode-id="2073" instrument_node="">. </span></p><span data-dcnode-id="2071" instrument_node="">
</span><p data-dcnode-id="2064"><strong data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">With that said, the side effects of CBD tend to be very mild.</span></strong><span data-dcnode-id="2068" instrument_node=""> Issues with side effects from CBD most often come from high doses of CBD, combining CBD with other medications, or using CBD alongside other underlying health conditions [</span><a data-dcnode-id="2066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ingentaconnect.com/content/ben/cds/2011/00000006/00000004/art00005" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2067" instrument_node="">1</span></a><span data-dcnode-id="2065" instrument_node="">]. </span></p><span data-dcnode-id="2063" instrument_node="">
</span><div class="p_wrap" data-dcnode-id="1975"><span data-dcnode-id="2062" instrument_node="">
</span><amp-position-observer data-dcnode-id="2061" intersection-ratios="0" layout="nodisplay" on="scroll:h2-what-are-the-side-effects-of-cbd-2-offset.seekTo(percent=event.percent)"></amp-position-observer><h2 data-dcnode-id="2059" id="h2-what-are-the-side-effects-of-cbd-2"><span data-dcnode-id="2060" instrument_node="">What Are The Side Effects of CBD?</span></h2><span data-dcnode-id="2058" instrument_node="">
</span><p data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">There are five main side effects you may experience when using CBD —&nbsp;low blood pressure, dry mouth, diarrhea, loss of appetite, and tiredness. </span></p><span data-dcnode-id="2055" instrument_node="">
</span><p data-dcnode-id="2048"><span data-dcnode-id="2054" instrument_node="">Each of these side effects is considered a </span><em data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">short-term</span></em><span data-dcnode-id="2051" instrument_node=""> side effect — which means it only lasts as long as CBD remains in the body. </span><strong data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">These symptoms will disappear as the CBD wears off. </span></strong></p><span data-dcnode-id="2047" instrument_node="">
</span><p data-dcnode-id="2039"><span data-dcnode-id="2046" instrument_node="">There are a few CBD-based pharmaceutical preparations on the market, such as </span><a data-dcnode-id="2044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rxlist.com/epidiolex-side-effects-drug-center.htm%23professional" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2045" instrument_node="">Epidolex</span></a><span data-dcnode-id="2043" instrument_node=""> and </span><a data-dcnode-id="2041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mstrust.org.uk/a-z/sativex-nabiximols" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2042" instrument_node="">Sativex</span></a><span data-dcnode-id="2040" instrument_node=""> — each of which has had a ton of research done to assess the potential for side effects. This research has given us a lot more insight into the potential adverse effects of CBD and other related cannabinoids. </span></p><span data-dcnode-id="2038" instrument_node="">
</span><p data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">The side effects of CBD can be broken up into two categories&nbsp;—&nbsp;short-term and long-term. Let’s cover each in more detail. </span></p><span data-dcnode-id="2035" instrument_node="">
</span><h4 data-dcnode-id="2033" id="h4-shortterm-side-effects-of-cbd-1"><span data-dcnode-id="2034" instrument_node="">Short-term Side Effects of CBD</span></h4><span data-dcnode-id="2032" instrument_node="">
</span><p data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">Short-term side effects happen right away as the CBD begins to take effect. They can last anywhere from a few minutes to a few hours. Once the CBD wears off, the side effects usually wear off along with it. </span></p><span data-dcnode-id="2029" instrument_node="">
</span><p data-dcnode-id="2026"><strong data-dcnode-id="2027"><span data-dcnode-id="2028" instrument_node="">Short-Term Side Effects of CBD May
Include:</span></strong></p><span data-dcnode-id="2025" instrument_node="">
</span><ul data-dcnode-id="2002"><span data-dcnode-id="2024" instrument_node="">
</span><li data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">Low blood pressure (defined as blood pressure below 110/80 mm Hg)</span></li><span data-dcnode-id="2021" instrument_node="">
</span><li data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">Dry mouth (Xerostomia)</span></li><span data-dcnode-id="2018" instrument_node="">
</span><li data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">Fatigue</span></li><span data-dcnode-id="2015" instrument_node="">
</span><li data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">Diarrhea</span></li><span data-dcnode-id="2012" instrument_node="">
</span><li data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">Poor appetite</span></li><span data-dcnode-id="2009" instrument_node="">
</span><li data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">Nausea and vomiting</span></li><span data-dcnode-id="2006" instrument_node="">
</span><li data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">Skin rash</span></li><span data-dcnode-id="2003" instrument_node="">
</span></ul><span data-dcnode-id="2001" instrument_node="">
</span><h4 data-dcnode-id="1999" id="h4-longterm-side-effects-of-cbd-2"><span data-dcnode-id="2000" instrument_node="">Long-Term Side Effects of CBD</span></h4><span data-dcnode-id="1998" instrument_node="">
</span><p data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">Long-term side effects don’t appear right
away. These side effects develop gradually over time with consistent use. There
are very few long-term side effects reported from CBD, and many of these
effects can be traced back to other aspects of CBD use instead — such as
smoking, vaping, or combining CBD with pharmaceutical medications. </span></p><span data-dcnode-id="1995" instrument_node="">
</span><p data-dcnode-id="1992"><strong data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">Long-Term Side Effects of CBD May
Include: </span></strong></p><span data-dcnode-id="1991" instrument_node="">
</span><ul data-dcnode-id="1977"><span data-dcnode-id="1990" instrument_node="">
</span><li data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">Changes in weight (loss or gain)</span></li><span data-dcnode-id="1987" instrument_node="">
</span><li data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">Frequent infections (low immunity)</span></li><span data-dcnode-id="1984" instrument_node="">
</span><li data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">Abnormal liver function tests (high AST or ALT)</span></li><span data-dcnode-id="1981" instrument_node="">
</span><li data-dcnode-id="1979"><span data-dcnode-id="1980" instrument_node="">Feeling weak or tired</span></li><span data-dcnode-id="1978" instrument_node="">
</span></ul><span data-dcnode-id="1976" instrument_node="">
</span></div><span data-dcnode-id="1974" instrument_node="">
</span><div class="p_wrap" data-dcnode-id="1886"><span data-dcnode-id="1973" instrument_node="">
</span><amp-position-observer data-dcnode-id="1972" intersection-ratios="0" layout="nodisplay" on="scroll:h2-is-cbd-safe-3-offset.seekTo(percent=event.percent)"></amp-position-observer><h2 data-dcnode-id="1970" id="h2-is-cbd-safe-3"><span data-dcnode-id="1971" instrument_node="">Is CBD Safe? </span></h2><span data-dcnode-id="1969" instrument_node="">
</span><p data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">There’s a wealth of research available in the scientific literature that explores the safety profile of CBD —&nbsp;I dug into it to see what I could find. </span></p><span data-dcnode-id="1966" instrument_node="">
</span><p data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">This research is critical in order for further testing can take place to explore the practical and medicinal applications of the compound in humans. Researchers can’t test CBD on health conditions such as epilepsy before it can be proven safe.</span></p><span data-dcnode-id="1963" instrument_node="">
</span><p data-dcnode-id="1960"><strong data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">Let’s cover some of the most important
safety research involving CBD: </span></strong></p><span data-dcnode-id="1959" instrument_node="">
</span><h4 data-dcnode-id="1957" id="h4-study-1a-metaanalysis-on-132-different-studies-1"><span data-dcnode-id="1958" instrument_node="">Study #1&nbsp;—&nbsp;A Meta-Analysis on 132 Different Studies</span></h4><span data-dcnode-id="1956" instrument_node="">
</span><p data-dcnode-id="1952"><span data-dcnode-id="1955" instrument_node="">Study: </span><a data-dcnode-id="1953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ingentaconnect.com/content/ben/cds/2011/00000006/00000004/art00005" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1954" instrument_node="">Safety and Side Effects of Cannabidiol, a Cannabis sativa Constituent</span></a></p><span data-dcnode-id="1951" instrument_node="">
</span><p data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">This review looked at 132 research papers that assessed the safety and tolerability of CBD. These studies included in vitro research, animal testing, and human clinical trials. </span></p><span data-dcnode-id="1948" instrument_node="">
</span><p data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">The study concluded that CBD is well tolerated and safe in humans, even in high doses over long periods. Researchers made note that there was potential for adverse side effects if CBD was used in combination with other medications or underlying health conditions [1]. </span></p><span data-dcnode-id="1945" instrument_node="">
</span><h4 data-dcnode-id="1943" id="h4-study-2-animal-testing-on-cbd-safety-2"><span data-dcnode-id="1944" instrument_node="">Study #2 —&nbsp;Animal Testing on CBD Safety </span></h4><span data-dcnode-id="1942" instrument_node="">
</span><p data-dcnode-id="1938"><span data-dcnode-id="1941" instrument_node="">Study: </span><a data-dcnode-id="1939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5569602/pdf/can.2016.0034.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1940" instrument_node="">An Update on Safety and Side Effects of Cannabidiol: A Review of Clinical Data and Relevant Animal Studies</span></a></p><span data-dcnode-id="1937" instrument_node="">
</span><p data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">This review seeks to build off the research published by Bergamaschi et al., 2011. The results of the study confirmed the initial conclusion for the first review, highlighting CBD as a safe and effective compound for the vast majority of patients. </span></p><span data-dcnode-id="1934" instrument_node="">
</span><p data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">This study reported the most common side effects to be fatigue, diarrhea, and changes in appetite/weight. Researchers also noted CBD to be significantly better-tolerated than other medications used for similar purposes [3]. </span></p><span data-dcnode-id="1931" instrument_node="">
</span><h4 data-dcnode-id="1929" id="h4-study-3-longterm-safety-of-cbd-thc-3"><span data-dcnode-id="1930" instrument_node="">Study #3: Long-Term Safety of CBD &amp; THC</span></h4><span data-dcnode-id="1928" instrument_node="">
</span><p data-dcnode-id="1924"><span data-dcnode-id="1927" instrument_node="">Study: </span><a data-dcnode-id="1925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0885392412004393https%3A//www.sciencedirect.com/science/article/pii/S0885392412004393" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1926" instrument_node="">An Open-Label Extension Study to Investigate the Long-Term Safety and Tolerability of THC/CBD…</span></a></p><span data-dcnode-id="1923" instrument_node="">
</span><p data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">This study examined the long-term health effects of CBD and THC.&nbsp; </span></p><span data-dcnode-id="1920" instrument_node="">
</span><p data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">Preparations of the two cannabinoids were given to 43 cancer patients every day for two weeks. Researchers of this study reported there to be minimal side effects and concluded that the preparation was “well-tolerated” [4]. </span></p><span data-dcnode-id="1917" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1914"><figure class="aligncenter is-resized" data-dcnode-id="1915"><img alt="" class="wp-image-18328" data-dcnode-id="1916" decoding="async" fetchpriority="low" height="310" loading="lazy" sizes="(max-width: 554px) 100vw, 554px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cbd-research.jpg&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cbd-research-300x169.jpg 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cbd-research-180x101.jpg 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cbd-research-283x159.jpg 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cbd-research-54x30.jpg 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cbd-research-330x186.jpg 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cbd-research-420x236.jpg 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cbd-research-74x42.jpg 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cbd-research-53x30.jpg 53w" width="554"></figure></div><span data-dcnode-id="1913" instrument_node="">
</span><h4 data-dcnode-id="1911" id="h4-study-4-safety-of-cbd-with-dravets-syndrome-epilepsy-4"><span data-dcnode-id="1912" instrument_node="">Study #4 — Safety of CBD With Dravet’s Syndrome (Epilepsy)</span></h4><span data-dcnode-id="1910" instrument_node="">
</span><p data-dcnode-id="1906"><span data-dcnode-id="1909" instrument_node="">Study: </span><a data-dcnode-id="1907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5890607/%3Freport%3Dreader" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1908" instrument_node="">Randomized, dose-ranging safety trial of cannabidiol in Dravet syndrome</span></a></p><span data-dcnode-id="1905" instrument_node="">
</span><p data-dcnode-id="1900"><span data-dcnode-id="1904" instrument_node="">This randomized clinical trial looked at the effects of CBD in the treatment of a rare form of </span><a data-dcnode-id="1902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/condition/epilepsy-seizure/"><span data-dcnode-id="1903" instrument_node="">epilepsy</span></a><span data-dcnode-id="1901" instrument_node=""> known as Dravet syndrome over 13 weeks. </span></p><span data-dcnode-id="1899" instrument_node="">
</span><p data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">34 patients diagnosed with Dravet syndrome (aged 4 to 10) were randomized into four treatment groups —&nbsp;5 mg/kg, 10 mg/kg, 20 mg/kg CBD, and an inactive placebo control. </span></p><span data-dcnode-id="1896" instrument_node="">
</span><p data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">The study concluded by stating that CBD was well-tolerated by the majority of patients (94% completion rate), and safety findings were consistent with other research. Some patients were noted to have elevated ALT or AST (indicating changes in liver function), but these elevations disappeared once CBD was discontinued. </span></p><span data-dcnode-id="1893" instrument_node="">
</span><p data-dcnode-id="1888"><span data-dcnode-id="1892" instrument_node="">This is one of the best studies we have so far on the safety of </span><a data-dcnode-id="1890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/cbd-children/"><span data-dcnode-id="1891" instrument_node="">CBD in children</span></a><span data-dcnode-id="1889" instrument_node="">, especially since the doses used in the study were significantly higher than the standard dose of CBD [5]. </span></p><span data-dcnode-id="1887" instrument_node="">
</span></div><span data-dcnode-id="1885" instrument_node="">
</span><div class="p_wrap" data-dcnode-id="1570"><span data-dcnode-id="1884" instrument_node="">
</span><amp-position-observer data-dcnode-id="1883" intersection-ratios="0" layout="nodisplay" on="scroll:h2-what-causes-the-side-effects-ofcbd-4-offset.seekTo(percent=event.percent)"></amp-position-observer><h2 data-dcnode-id="1881" id="h2-what-causes-the-side-effects-ofcbd-4"><span data-dcnode-id="1882" instrument_node="">What Causes The Side Effects of
CBD? </span></h2><span data-dcnode-id="1880" instrument_node="">
</span><p data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">CBD has a long list of effects on humans. It works by binding or modulating various receptors in the body. These receptors control other chemical, cellular, and organ functions. This interaction with receptors is what gives CBD its benefits as well as some of its side effects. </span></p><span data-dcnode-id="1877" instrument_node="">
</span><p data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">There are other ways CBD may lead to side
effects as well — some of which come down to the way CBD was consumed, how much
CBD was used, what other medications were taken alongside CBD, underlying
health issues, and the presence of contaminants in the CBD extract itself. </span></p><span data-dcnode-id="1874" instrument_node="">
</span><p data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">Let’s cover each of these potential causes in more detail and what you can do to minimize your chances of experiencing side effects from each one. </span></p><span data-dcnode-id="1871" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1868"><figure class="aligncenter is-resized" data-dcnode-id="1869"><img alt="" class="wp-image-18329" data-dcnode-id="1870" decoding="async" fetchpriority="low" height="399" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2020/01/smoking-kills.jpg&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/smoking-kills.jpg 1000w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/smoking-kills-300x200.jpg 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/smoking-kills-768x512.jpg 768w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/smoking-kills-180x120.jpg 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/smoking-kills-283x189.jpg 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/smoking-kills-54x36.jpg 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/smoking-kills-330x220.jpg 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/smoking-kills-420x280.jpg 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/smoking-kills-74x49.jpg 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/smoking-kills-45x30.jpg 45w" width="600"></figure></div><span data-dcnode-id="1867" instrument_node="">
</span><h3 data-dcnode-id="1865" id="h3-1-smoke-or-vapor-inhalation-1"><span data-dcnode-id="1866" instrument_node="">1. Smoke or Vapor Inhalation</span></h3><span data-dcnode-id="1864" instrument_node="">
</span><p data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">Different forms of CBD can bring unique side effects. For example, smoking, dabbing, or vaping CBD may lead to short-term side effects caused by the inhalation of compounds through the lungs rather than from the CBD itself. </span></p><span data-dcnode-id="1861" instrument_node="">
</span><p data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">When smoke is inhaled it causes damage to the lungs along with an increase in carbon dioxide and carbon monoxide in the blood. This can lead to side effects like coughing, sore throat, fatigue, and nausea. </span></p><span data-dcnode-id="1858" instrument_node="">
</span><p data-dcnode-id="1853"><span data-dcnode-id="1857" instrument_node="">There have also been some recent reports of a condition known as </span><a data-dcnode-id="1855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/lipoid-pneumonia" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1856" instrument_node="">lipoid pneumonia</span></a><span data-dcnode-id="1854" instrument_node="">, which can be life-threatening. This condition is caused by inhaling fatty compounds into the lungs — such as with vape oils or e-liquids. This condition is rare but can happen from any e-liquids, including CBD-infused vape oils. </span></p><span data-dcnode-id="1852" instrument_node="">
</span><h4 data-dcnode-id="1850" id="h4-how-to-minimize-your-risk-1"><span data-dcnode-id="1851" instrument_node="">How To Minimize Your Risk</span></h4><span data-dcnode-id="1849" instrument_node="">
</span><p data-dcnode-id="1835"><span data-dcnode-id="1848" instrument_node="">The easiest way to minimize the chances of
experiencing side effects from smoke or vape inhalation is to use CBD orally (</span><a data-dcnode-id="1846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/products/best-cbd-oils/"><span data-dcnode-id="1847" instrument_node="">CBD
oils</span></a><span data-dcnode-id="1845" instrument_node="">, </span><a data-dcnode-id="1843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/products/cbd-capsules/"><span data-dcnode-id="1844" instrument_node="">CBD capsules</span></a><span data-dcnode-id="1842" instrument_node="">, </span><a data-dcnode-id="1840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/products/cbd-edibles/"><span data-dcnode-id="1841" instrument_node="">CBD
edibles</span></a><span data-dcnode-id="1839" instrument_node="">) or </span><a data-dcnode-id="1837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/products/cbd-topicals/"><span data-dcnode-id="1838" instrument_node="">topically</span></a><span data-dcnode-id="1836" instrument_node=""> instead. </span></p><span data-dcnode-id="1834" instrument_node="">
</span><p data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">There are a ton of excellent CBD products available that don’t rely on smoking or vaping to deliver CBD into the body. This saves your lungs and keeps harmful compounds like carbon monoxide out of your bloodstream. </span></p><span data-dcnode-id="1831" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1828"><figure class="aligncenter is-resized" data-dcnode-id="1829"><img alt="" class="wp-image-18330" data-dcnode-id="1830" decoding="async" fetchpriority="low" height="411" loading="lazy" sizes="(max-width: 666px) 100vw, 666px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2020/01/high-dose-cbd.jpg&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/high-dose-cbd.jpg 1000w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/high-dose-cbd-300x185.jpg 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/high-dose-cbd-768x473.jpg 768w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/high-dose-cbd-180x111.jpg 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/high-dose-cbd-283x174.jpg 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/high-dose-cbd-54x33.jpg 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/high-dose-cbd-330x203.jpg 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/high-dose-cbd-420x259.jpg 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/high-dose-cbd-74x46.jpg 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/high-dose-cbd-49x30.jpg 49w" width="666"></figure></div><span data-dcnode-id="1827" instrument_node="">
</span><h3 data-dcnode-id="1825" id="h3-2-high-doses-of-cbd-2"><span data-dcnode-id="1826" instrument_node="">2. High Doses of CBD</span></h3><span data-dcnode-id="1824" instrument_node="">
</span><p data-dcnode-id="1820"><strong data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">The more CBD you take, the stronger the effects.</span></strong><span data-dcnode-id="1821" instrument_node=""> </span></p><span data-dcnode-id="1819" instrument_node="">
</span><p data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">This is true for both the positive and negative effects of CBD. Several of the research papers cited above used large doses of CBD (up to 20 mg/kg), which is significantly higher than the standard dose of CBD. However, despite remaining safe at these doses, the larger the dosage of CBD, the more chances there will be side effects. </span></p><span data-dcnode-id="1816" instrument_node="">
</span><p data-dcnode-id="1810"><strong data-dcnode-id="1811"><span data-dcnode-id="1815" instrument_node="">Learn more about </span><a data-dcnode-id="1813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/cbd-dosage/"><span data-dcnode-id="1814" instrument_node="">how much CBD you should take</span></a><span data-dcnode-id="1812" instrument_node="">.</span></strong></p><span data-dcnode-id="1809" instrument_node="">
</span><h4 data-dcnode-id="1807" id="h4-how-to-minimize-your-risk-2"><span data-dcnode-id="1808" instrument_node="">How To Minimize Your Risk</span></h4><span data-dcnode-id="1806" instrument_node="">
</span><p data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">If you’ve never used CBD before, it’s
important you understand how to find the best dose for your body individually.
The effective dose of CBD is different for everybody, so you have to use some
trial and error to find what works for you. </span></p><span data-dcnode-id="1803" instrument_node="">
</span><p data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">Most people do this by starting with a low
dose and building up slowly over time. Once you reach the desired level of
effects, you’ve found your dose. </span></p><span data-dcnode-id="1800" instrument_node="">
</span><p data-dcnode-id="1795"><span data-dcnode-id="1799" instrument_node="">Some people will continue increasing the dose gradually until they experience some mild side effects, then dial the dose back to the last dose that didn’t produce any side effects and stay here — this is what’s considered the </span><em data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">maximum tolerated dose</span></em><span data-dcnode-id="1796" instrument_node=""> — or the highest dose you can take before experiencing negative effects. </span></p><span data-dcnode-id="1794" instrument_node="">
</span><p data-dcnode-id="1789"><span data-dcnode-id="1793" instrument_node="">You may want to avoid using exceptionally </span><a data-dcnode-id="1791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/strongest-cbd-oil/"><span data-dcnode-id="1792" instrument_node="">strong CBD oils</span></a><span data-dcnode-id="1790" instrument_node=""> if you’re just starting out with CBD as well. It’s easier to take too much when using very strong oils. </span></p><span data-dcnode-id="1788" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1785"><figure class="aligncenter is-resized" data-dcnode-id="1786"><img alt="" class="wp-image-18331" data-dcnode-id="1787" decoding="async" fetchpriority="low" height="371" loading="lazy" sizes="(max-width: 557px) 100vw, 557px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2020/01/medications-cbd.jpg&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/medications-cbd.jpg 1000w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/medications-cbd-300x200.jpg 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/medications-cbd-768x513.jpg 768w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/medications-cbd-180x120.jpg 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/medications-cbd-283x189.jpg 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/medications-cbd-54x36.jpg 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/medications-cbd-330x220.jpg 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/medications-cbd-420x281.jpg 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/medications-cbd-74x49.jpg 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/medications-cbd-45x30.jpg 45w" width="557"></figure></div><span data-dcnode-id="1784" instrument_node="">
</span><h3 data-dcnode-id="1782" id="h3-3-interactions-between-cbd-other-medications-3"><span data-dcnode-id="1783" instrument_node="">3. Interactions Between CBD &amp;
Other Medications</span></h3><span data-dcnode-id="1781" instrument_node="">
</span><p data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">Whenever you take medications or supplements,
you have to consider how the active compounds interact inside the body. Even if
you take them separately, they end up mixing in the digestive tract or bloodstream.
</span></p><span data-dcnode-id="1778" instrument_node="">
</span><p data-dcnode-id="1771"><a data-dcnode-id="1776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/"><span data-dcnode-id="1777" instrument_node="">CBD rarely interacts with other medications</span></a><span data-dcnode-id="1775" instrument_node=""> — but there are a few exceptions. CBD may cause the effects of the drug to become stronger </span><em data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">or</span></em><span data-dcnode-id="1772" instrument_node=""> weaker than intended — which could lead to side effects from the medication. </span></p><span data-dcnode-id="1770" instrument_node="">
</span><h4 data-dcnode-id="1768" id="h4-how-to-minimize-your-risk-3"><span data-dcnode-id="1769" instrument_node="">How To Minimize Your Risk</span></h4><span data-dcnode-id="1767" instrument_node="">
</span><p data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">CBD can interact with medications in many
different ways. Even drugs that seem to be utterly unrelated to the effects of
CBD can result in a negative interaction because of how the liver or kidneys
process various medications. If CBD and the medication both compete for the
same pathway of metabolism or elimination, it can lead to a buildup of both in
the system — ultimately leading to side effects. </span></p><span data-dcnode-id="1764" instrument_node="">
</span><p data-dcnode-id="1757"><strong data-dcnode-id="1759"><span data-dcnode-id="1763" instrument_node="">Because of this, you must </span><a data-dcnode-id="1761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/talk-to-your-doctor-cbd/"><span data-dcnode-id="1762" instrument_node="">speak with your doctor first about using CBD</span></a><span data-dcnode-id="1760" instrument_node=""> if you’re taking any medications.</span></strong><span data-dcnode-id="1758" instrument_node=""> Your doctor will give you more accurate advice on whether or not CBD is likely to interact with any medications you’re taking — and what you can do to reduce your chances of developing side effects. </span></p><span data-dcnode-id="1756" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1753"><figure class="aligncenter is-resized" data-dcnode-id="1754"><img alt="" class="wp-image-18332" data-dcnode-id="1755" decoding="async" fetchpriority="low" height="323" loading="lazy" sizes="(max-width: 523px) 100vw, 523px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2020/01/xray-cbd.jpg&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/xray-cbd.jpg 1000w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/xray-cbd-300x186.jpg 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/xray-cbd-768x476.jpg 768w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/xray-cbd-180x112.jpg 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/xray-cbd-283x175.jpg 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/xray-cbd-54x33.jpg 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/xray-cbd-330x205.jpg 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/xray-cbd-420x260.jpg 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/xray-cbd-74x46.jpg 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/xray-cbd-48x30.jpg 48w" width="523"></figure></div><span data-dcnode-id="1752" instrument_node="">
</span><h3 data-dcnode-id="1750" id="h3-4-underlying-health-issues-4"><span data-dcnode-id="1751" instrument_node="">4. Underlying Health Issues</span></h3><span data-dcnode-id="1749" instrument_node="">
</span><p data-dcnode-id="1732"><span data-dcnode-id="1748" instrument_node="">CBD is well-known to offer benefits to
specific health conditions. There’s a lot of research on how this compound
offers benefits towards diseases such as </span><a data-dcnode-id="1746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/condition/epilepsy-seizure/"><span data-dcnode-id="1747" instrument_node="">epilepsy</span></a><span data-dcnode-id="1745" instrument_node="">, </span><a data-dcnode-id="1743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/condition/multiple-sclerosis/"><span data-dcnode-id="1744" instrument_node="">multiple sclerosis</span></a><span data-dcnode-id="1742" instrument_node="">, </span><a data-dcnode-id="1740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/condition/cancer/"><span data-dcnode-id="1741" instrument_node="">cancer</span></a><span data-dcnode-id="1739" instrument_node="">,
</span><a data-dcnode-id="1737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/condition/arthritis/"><span data-dcnode-id="1738" instrument_node="">arthritis</span></a><span data-dcnode-id="1736" instrument_node="">,
</span><a data-dcnode-id="1734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/conditions/"><span data-dcnode-id="1735" instrument_node="">and
more</span></a><span data-dcnode-id="1733" instrument_node=""> — however, some people may experience a worsening of symptoms
after using CBD for their health disorder. </span></p><span data-dcnode-id="1731" instrument_node="">
</span><p data-dcnode-id="1723"><span data-dcnode-id="1730" instrument_node="">Some examples of this may include </span><a data-dcnode-id="1728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/best-cbd/parkinsons-disease/"><span data-dcnode-id="1729" instrument_node="">Parkinson’s disease</span></a><span data-dcnode-id="1727" instrument_node="">, </span><a data-dcnode-id="1725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/best-cbd/anorexia/"><span data-dcnode-id="1726" instrument_node="">anorexia</span></a><span data-dcnode-id="1724" instrument_node="">, and hypotension (low blood pressure).</span></p><span data-dcnode-id="1722" instrument_node="">
</span><p data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">Liver conditions can also increase your odds of experiencing side effects. </span></p><span data-dcnode-id="1719" instrument_node="">
</span><p data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">Most of the compounds you take into the body need to be processed and metabolized by the liver before they can be removed from the body. If the liver is compromised for any reason, CBD and its metabolites can build up in the bloodstream — which can ultimately lead to side effects. </span></p><span data-dcnode-id="1716" instrument_node="">
</span><p data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">Hypotension (low blood pressure) is one of the most concerning health issues people should be aware of before using this supplement. </span></p><span data-dcnode-id="1713" instrument_node="">
</span><p data-dcnode-id="1709"><a data-dcnode-id="1711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5470879/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1712" instrument_node="">Cannabidiol can cause a reduction in blood pressure.</span></a><span data-dcnode-id="1710" instrument_node=""> For many people, this is one of the major benefits — however, if blood pressure is already too low, this effect can push blood pressure below safe levels. If this happens, the heart may be unable to pump enough blood into the brain, leading to lightheadedness, confusion, and fainting. </span></p><span data-dcnode-id="1708" instrument_node="">
</span><h4 data-dcnode-id="1706" id="h4-how-to-minimize-your-risk-4"><span data-dcnode-id="1707" instrument_node="">How To Minimize Your Risk</span></h4><span data-dcnode-id="1705" instrument_node="">
</span><p data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">The best way to avoid side effects if you have an underlying health issue is to speak with your doctor directly before using CBD. </span></p><span data-dcnode-id="1702" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1699"><figure class="aligncenter is-resized" data-dcnode-id="1700"><img alt="" class="wp-image-18333" data-dcnode-id="1701" decoding="async" fetchpriority="low" height="360" loading="lazy" sizes="(max-width: 482px) 100vw, 482px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cadmium-heavy-metal.jpg&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cadmium-heavy-metal-300x225.jpg 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cadmium-heavy-metal-180x135.jpg 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cadmium-heavy-metal-283x212.jpg 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cadmium-heavy-metal-54x41.jpg 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cadmium-heavy-metal-420x315.jpg 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cadmium-heavy-metal-74x56.jpg 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cadmium-heavy-metal-40x30.jpg 40w" width="482"></figure></div><span data-dcnode-id="1698" instrument_node="">
</span><h3 data-dcnode-id="1696" id="h3-5-lowquality-or-contaminatedcbd-products-5"><span data-dcnode-id="1697" instrument_node="">5. Low-Quality or Contaminated
CBD Products</span></h3><span data-dcnode-id="1695" instrument_node="">
</span><p data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">The source of CBD matters when discussing side effects. CBD oil can become contaminated during the cultivation or manufacturing process. These contaminants may lead to both short-term and long-term side effects — some can even be quite severe. </span></p><span data-dcnode-id="1692" instrument_node="">
</span><p data-dcnode-id="1687"><span data-dcnode-id="1691" instrument_node="">This is why we encourage people to only order CBD products from companies that publish </span><a data-dcnode-id="1689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/third-party-testing/"><span data-dcnode-id="1690" instrument_node="">independent lab analyses</span></a><span data-dcnode-id="1688" instrument_node=""> for each batch of products they produce. </span></p><span data-dcnode-id="1686" instrument_node="">
</span><p data-dcnode-id="1683"><strong data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">These tests should look for all the main
contaminants of CBD products, including:</span></strong></p><span data-dcnode-id="1682" instrument_node="">
</span><ol data-dcnode-id="1661"><span data-dcnode-id="1681" instrument_node="">
</span><li data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">Heavy metals</span></li><span data-dcnode-id="1678" instrument_node="">
</span><li data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">Pesticides</span></li><span data-dcnode-id="1675" instrument_node="">
</span><li data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">Organic solvents (like propane, butane, or hexane)</span></li><span data-dcnode-id="1672" instrument_node="">
</span><li data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">Microbial contaminants (mycotoxins, bacteria, mold)</span></li><span data-dcnode-id="1669" instrument_node="">
</span><li data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">Psychoactive cannabinoids (THC or THCV)</span></li><span data-dcnode-id="1666" instrument_node="">
</span><li data-dcnode-id="1663"><a data-dcnode-id="1664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/synthetic-cannabinoids/"><span data-dcnode-id="1665" instrument_node="">Synthetic cannabinoids</span></a></li><span data-dcnode-id="1662" instrument_node="">
</span></ol><span data-dcnode-id="1660" instrument_node="">
</span><p data-dcnode-id="1655"><span data-dcnode-id="1659" instrument_node="">Contaminated CBD products aren’t uncommon, so it’s important you look for a reputable supplier before placing your order. CBD oils that are significantly cheaper than the competition are most likely </span><em data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">too good to be true.</span></em><span data-dcnode-id="1656" instrument_node=""> </span></p><span data-dcnode-id="1654" instrument_node="">
</span><p data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">Many of these oils are made from cheap hemp cultivated in places like China or India where soil contamination is common — leading to the accumulation of heavy metals or other harmful compounds in the final product. </span></p><span data-dcnode-id="1651" instrument_node="">
</span><p data-dcnode-id="1648"><strong data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">Contaminants can lead to side effects
such as: </span></strong></p><span data-dcnode-id="1647" instrument_node="">
</span><ul data-dcnode-id="1624"><span data-dcnode-id="1646" instrument_node="">
</span><li data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">Headaches</span></li><span data-dcnode-id="1643" instrument_node="">
</span><li data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">Allergic reactions</span></li><span data-dcnode-id="1640" instrument_node="">
</span><li data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">Skin rashes</span></li><span data-dcnode-id="1637" instrument_node="">
</span><li data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">Memory loss</span></li><span data-dcnode-id="1634" instrument_node="">
</span><li data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">Confusion</span></li><span data-dcnode-id="1631" instrument_node="">
</span><li data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">Nausea/vomiting</span></li><span data-dcnode-id="1628" instrument_node="">
</span><li data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">Vision loss</span></li><span data-dcnode-id="1625" instrument_node="">
</span></ul><span data-dcnode-id="1623" instrument_node="">
</span><p data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">Some low-quality CBD oils may also contain the psychoactive cannabinoid, THC. If the THC content is high enough, it will lead to undesirable side effects as well — essentially causing the same effects of marijuana that make users high.</span></p><span data-dcnode-id="1620" instrument_node="">
</span><h4 data-dcnode-id="1618" id="h4-how-to-minimize-your-risk-5"><span data-dcnode-id="1619" instrument_node="">How To Minimize Your Risk</span></h4><span data-dcnode-id="1617" instrument_node="">
</span><p data-dcnode-id="1612"><span data-dcnode-id="1616" instrument_node="">Always purchase your CBD from a reputable
manufacturer that offers clear evidence that each batch of product they produce
is completely free from these contaminants. There’s no </span><em data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">safe</span></em><span data-dcnode-id="1613" instrument_node=""> dose of heavy metals, pesticides, or organic solvents, so it’s
critical the tests show no trace of these compounds. </span></p><span data-dcnode-id="1611" instrument_node="">
</span><p data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">If a company can’t or won’t provide this information, we suggest you look elsewhere. </span></p><span data-dcnode-id="1608" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1605"><figure class="aligncenter is-resized" data-dcnode-id="1606"><img alt="" class="wp-image-18334" data-dcnode-id="1607" decoding="async" fetchpriority="low" height="343" loading="lazy" sizes="(max-width: 515px) 100vw, 515px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2020/01/allergies.jpg&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/allergies.jpg 1000w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/allergies-300x200.jpg 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/allergies-768x513.jpg 768w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/allergies-180x120.jpg 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/allergies-283x189.jpg 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/allergies-54x36.jpg 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/allergies-330x220.jpg 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/allergies-420x281.jpg 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/allergies-74x49.jpg 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/allergies-45x30.jpg 45w" width="515"></figure></div><span data-dcnode-id="1604" instrument_node="">
</span><h3 data-dcnode-id="1602" id="h3-6-allergic-reactions-6"><span data-dcnode-id="1603" instrument_node="">6. Allergic Reactions</span></h3><span data-dcnode-id="1601" instrument_node="">
</span><p data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">Some side effects are purely the result of
allergies. This may be an allergy to the CBD itself, other cannabinoids, or
additives such as oils, synthetic flavoring, or vape fluids. </span></p><span data-dcnode-id="1598" instrument_node="">
</span><p data-dcnode-id="1593"><span data-dcnode-id="1597" instrument_node="">Allergies are driven by the immune system,
which is continuously monitoring the body to identify and destroy anything that
poses a threat. Sometimes the immune system mistakes a harmless compound as a
threat — leading to what we call an </span><em data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">allergic
reaction</span></em><span data-dcnode-id="1594" instrument_node="">. </span></p><span data-dcnode-id="1592" instrument_node="">
</span><p data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">When a threat is discovered (even if by
mistake), the immune system immediately mobilizes a fleet of white blood cells
and chemical messengers to the area to fight off the invader. This can lead to
side effects including skin rashes, swelling, tightness in the throat, or much
more severe effects like a closing of the airway, tachycardia (excessive heart
rate), elevated blood pressure, and loss of consciousness. </span></p><span data-dcnode-id="1589" instrument_node="">
</span><p data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">Most allergies to CBD products are triggered by chemical additives from synthetic flavorings or preservatives rather than to the CBD itself. </span></p><span data-dcnode-id="1586" instrument_node="">
</span><h4 data-dcnode-id="1584" id="h4-how-to-minimize-your-risk-6"><span data-dcnode-id="1585" instrument_node="">How To Minimize Your Risk</span></h4><span data-dcnode-id="1583" instrument_node="">
</span><p data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">Allergies can be hard to prevent and even
harder to predict. For this reason, it’s wise to test a small amount of a
supplement or topical before using the full amount to see if there’s any
reaction to it. </span></p><span data-dcnode-id="1580" instrument_node="">
</span><p data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">For topicals, apply a small amount to the skin
and wait for about 30 – 45 minutes to see if any rash or irritation appears. If
not, you’re probably safe to apply the topical to a larger area of the body. </span></p><span data-dcnode-id="1577" instrument_node="">
</span><p data-dcnode-id="1572"><span data-dcnode-id="1576" instrument_node="">For edibles, the process is similar. Start by taking a tiny amount. Hold it in your mouth for a moment, if you can. Wait for 30 – 45 minutes to give the immune system time to react. If you don’t experience any side effects (most commonly, swelling or </span><a data-dcnode-id="1574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/cbd-side-effects/itching/"><span data-dcnode-id="1575" instrument_node="">itchiness</span></a><span data-dcnode-id="1573" instrument_node="">), you can safely take a larger dose. </span></p><span data-dcnode-id="1571" instrument_node="">
</span></div><span data-dcnode-id="1569" instrument_node="">
</span><div class="p_wrap" data-dcnode-id="1510"><span data-dcnode-id="1568" instrument_node="">
</span><amp-position-observer data-dcnode-id="1567" intersection-ratios="0" layout="nodisplay" on="scroll:h2-what-can-i-do-if-i-experienceside-effects-from-cbd-5-offset.seekTo(percent=event.percent)"></amp-position-observer><h2 data-dcnode-id="1565" id="h2-what-can-i-do-if-i-experienceside-effects-from-cbd-5"><span data-dcnode-id="1566" instrument_node="">What Can I Do If I Experience
Side Effects From CBD?</span></h2><span data-dcnode-id="1564" instrument_node="">
</span><p data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">What happens if you start to experience side
effects from CBD? When should you be concerned? </span></p><span data-dcnode-id="1561" instrument_node="">
</span><p data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">The vast majority of side effects from CBD are mild in nature — meaning that although you might feel uncomfortable, the side effects will soon pass on their own. Depending on which side effects you’re experiencing, there may be some steps you can take to help them go away much faster. </span></p><span data-dcnode-id="1558" instrument_node="">
</span><h4 data-dcnode-id="1556" id="h4-1-dry-mouth-cottonmouth-1"><span data-dcnode-id="1557" instrument_node="">1. Dry Mouth (Cottonmouth)</span></h4><span data-dcnode-id="1555" instrument_node="">
</span><p data-dcnode-id="1550"><span data-dcnode-id="1554" instrument_node="">The best way to eliminate </span><a data-dcnode-id="1552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/cbd-side-effects/cottonmouth/"><span data-dcnode-id="1553" instrument_node="">cottonmouth from CBD</span></a><span data-dcnode-id="1551" instrument_node=""> is to drink something fruity like orange or pineapple juice, sip water, or chew gum. If you remain well-hydrated before using CBD, the chances of experiencing this side effect are reduced. </span></p><span data-dcnode-id="1549" instrument_node="">
</span><h4 data-dcnode-id="1547" id="h4-2-lightheadedness-2"><span data-dcnode-id="1548" instrument_node="">2. Lightheadedness</span></h4><span data-dcnode-id="1546" instrument_node="">
</span><p data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">This side effect is pretty common and usually
doesn’t mean anything serious. However, lightheadedness can also signal a
deeper underlying problem. The cause of this is typically low blood pressure,
so it’s best if you can either sit or lie down for a while. This will allow the
blood to flow easily into the brain. It also helps to drink something with
electrolytes in it to help stabilize your blood pressure before you take CBD. </span></p><span data-dcnode-id="1543" instrument_node="">
</span><p data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">If you experience any loss of consciousness or feel excessive lightheadedness, stop using CBD immediately and set up a visit with your doctor to discuss your symptoms. </span></p><span data-dcnode-id="1540" instrument_node="">
</span><h4 data-dcnode-id="1538" id="h4-3-diarrhea-3"><span data-dcnode-id="1539" instrument_node="">3. Diarrhea</span></h4><span data-dcnode-id="1537" instrument_node="">
</span><p data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">This side effect is hard to stop once it’s
begun. You can take medications to help, but by the time the drugs take effect,
the side effects will likely have worn off anyway.</span></p><span data-dcnode-id="1534" instrument_node="">
</span><p data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">It helps to take CBD along with food to
minimize the chances of diarrhea. </span></p><span data-dcnode-id="1531" instrument_node="">
</span><p data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">If diarrhea continues to occur, it’s wise to speak with your doctor before using CBD again. </span></p><span data-dcnode-id="1528" instrument_node="">
</span><h4 data-dcnode-id="1526" id="h4-4-fatigue-or-tiredness-4"><span data-dcnode-id="1527" instrument_node="">4. Fatigue or Tiredness</span></h4><span data-dcnode-id="1525" instrument_node="">
</span><p data-dcnode-id="1520"><span data-dcnode-id="1524" instrument_node="">Feeling tired after using CBD is often a goal for using the supplement, especially in people who have a hard time sleeping. However, not everyone wants this effect from CBD. The easiest way to avoid this is to take </span><a data-dcnode-id="1522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/mixing-cbd-coffee/"><span data-dcnode-id="1523" instrument_node="">CBD alongside caffeine</span></a><span data-dcnode-id="1521" instrument_node=""> to counteract the sedative effects of the compound. </span></p><span data-dcnode-id="1519" instrument_node="">
</span><h4 data-dcnode-id="1517" id="h4-5-poor-appetite-5"><span data-dcnode-id="1518" instrument_node="">5. Poor Appetite</span></h4><span data-dcnode-id="1516" instrument_node="">
</span><p data-dcnode-id="1512"><a data-dcnode-id="1514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/does-cbd-make-you-hungry/"><span data-dcnode-id="1515" instrument_node="">CBD can lower our appetite</span></a><span data-dcnode-id="1513" instrument_node=""> — and while this is usually not a significant problem, it can cause you to go undernourished for long periods if you use CBD frequently. This could lead to nutritional deficiencies, weakness, irritability, and weight loss. It can help to take CBD along with a meal to avoid this effect. </span></p><span data-dcnode-id="1511" instrument_node="">
</span></div><span data-dcnode-id="1509" instrument_node="">
</span><div class="p_wrap" data-dcnode-id="1296"><span data-dcnode-id="1508" instrument_node="">
</span><amp-position-observer data-dcnode-id="1507" intersection-ratios="0" layout="nodisplay" on="scroll:h2-do-other-cannabinoids-havesideeffects-6-offset.seekTo(percent=event.percent)"></amp-position-observer><h2 data-dcnode-id="1505" id="h2-do-other-cannabinoids-havesideeffects-6"><span data-dcnode-id="1506" instrument_node="">Do Other Cannabinoids Have
Side-Effects? </span></h2><span data-dcnode-id="1504" instrument_node="">
</span><p data-dcnode-id="1496"><span data-dcnode-id="1503" instrument_node="">CBD isn’t the only </span><a data-dcnode-id="1501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/cannabinoids/"><span data-dcnode-id="1502" instrument_node="">cannabinoid in the cannabis plant</span></a><span data-dcnode-id="1500" instrument_node="">. There are over one hundred other cannabinoids also produced in the plant — many of which end up in your CBD oil. This is especially the case for </span><a data-dcnode-id="1498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/full-spectrum-vs-isolate/"><span data-dcnode-id="1499" instrument_node="">full-spectrum hemp extracts</span></a><span data-dcnode-id="1497" instrument_node="">.</span></p><span data-dcnode-id="1495" instrument_node="">
</span><p data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">So, do any of these other cannabinoids have
side effects you should be concerned about? </span></p><span data-dcnode-id="1492" instrument_node="">
</span><p data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">Overall, the side effects of these other cannabinoids are very similar to the side effects of CBD, with some subtle differences. </span></p><span data-dcnode-id="1489" instrument_node="">
</span><h4 data-dcnode-id="1487" id="h4-1-side-effects-of-thc-1"><span data-dcnode-id="1488" instrument_node="">1. Side Effects of THC</span></h4><span data-dcnode-id="1486" instrument_node="">
</span><p data-dcnode-id="1482"><a data-dcnode-id="1484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/thc-oil/"><span data-dcnode-id="1485" instrument_node="">THC (tetrahydrocannabinol)</span></a><span data-dcnode-id="1483" instrument_node=""> is the primary psychoactive cannabinoid in cannabis plants. Hemp products have very low levels of THC in them in order to stay within the legal limit and to prevent any psychoactive side effects. </span></p><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">Products that have high THC content (over 2%) may produce side effects related to the psychoactivity of THC. </span></p><span data-dcnode-id="1478" instrument_node="">
</span><p data-dcnode-id="1464"><span data-dcnode-id="1477" instrument_node="">There is more than one type of THC. The most common is delta 9 THC but there’s also delta 7 THC, </span><a data-dcnode-id="1475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/delta-8-thc/"><span data-dcnode-id="1476" instrument_node="">delta 8 THC</span></a><span data-dcnode-id="1474" instrument_node="">, </span><a data-dcnode-id="1472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/delta-10-thc/"><span data-dcnode-id="1473" instrument_node="">delta 10 THC</span></a><span data-dcnode-id="1471" instrument_node="">, </span><a data-dcnode-id="1469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/thcp/"><span data-dcnode-id="1470" instrument_node="">THCP</span></a><span data-dcnode-id="1468" instrument_node="">, </span><a data-dcnode-id="1466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/thcc/"><span data-dcnode-id="1467" instrument_node="">THCC</span></a><span data-dcnode-id="1465" instrument_node="">, and more. </span></p><span data-dcnode-id="1463" instrument_node="">
</span><p data-dcnode-id="1458"><span data-dcnode-id="1462" instrument_node="">Full-spectrum </span><a data-dcnode-id="1460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/thc-in-cbd-oil/"><span data-dcnode-id="1461" instrument_node="">CBD oils contain trace amounts of delta 9 THC</span></a><span data-dcnode-id="1459" instrument_node="">. </span></p><span data-dcnode-id="1457" instrument_node="">
</span><p data-dcnode-id="1454"><strong data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Here are some of the most common side effects of THC: </span></strong></p><span data-dcnode-id="1453" instrument_node="">
</span><ul data-dcnode-id="1427"><span data-dcnode-id="1452" instrument_node="">
</span><li data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">Visual disturbances</span></li><span data-dcnode-id="1449" instrument_node="">
</span><li data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">Increased appetite</span></li><span data-dcnode-id="1446" instrument_node="">
</span><li data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">Dry mouth</span></li><span data-dcnode-id="1443" instrument_node="">
</span><li data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">Paranoia</span></li><span data-dcnode-id="1440" instrument_node="">
</span><li data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">Lightheadedness</span></li><span data-dcnode-id="1437" instrument_node="">
</span><li data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">Headache</span></li><span data-dcnode-id="1434" instrument_node="">
</span><li data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">Fatigue</span></li><span data-dcnode-id="1431" instrument_node="">
</span><li data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">Changes in emotion and mood</span></li><span data-dcnode-id="1428" instrument_node="">
</span></ul><span data-dcnode-id="1426" instrument_node="">
</span><h4 data-dcnode-id="1424" id="h4-2-side-effects-of-thcv-2"><span data-dcnode-id="1425" instrument_node="">2. Side Effects of THCV</span></h4><span data-dcnode-id="1423" instrument_node="">
</span><p data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">THCV stands for tetrahydrocannabivarin. It’s
closely related to THC, but has significantly less psychoactivity and is found
in much lower concentrations in cannabis plants. This cannabinoid is unlikely
to cause any real side effects in CBD products simply because of how low the
concentration is. </span></p><span data-dcnode-id="1420" instrument_node="">
</span><p data-dcnode-id="1414"><strong data-dcnode-id="1415"><span data-dcnode-id="1419" instrument_node="">Here are some potential side effects of </span><a data-dcnode-id="1417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/thcv/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1418" instrument_node="">THCV:</span></a><span data-dcnode-id="1416" instrument_node=""> </span></strong></p><span data-dcnode-id="1413" instrument_node="">
</span><ul data-dcnode-id="1396"><span data-dcnode-id="1412" instrument_node="">
</span><li data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">Visual disturbances</span></li><span data-dcnode-id="1409" instrument_node="">
</span><li data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">Paranoia</span></li><span data-dcnode-id="1406" instrument_node="">
</span><li data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">Nausea and vomiting</span></li><span data-dcnode-id="1403" instrument_node="">
</span><li data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Changes in mood</span></li><span data-dcnode-id="1400" instrument_node="">
</span><li data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">Fatigue</span></li><span data-dcnode-id="1397" instrument_node="">
</span></ul><span data-dcnode-id="1395" instrument_node="">
</span><h4 data-dcnode-id="1393" id="h4-3-side-effects-of-cbc-3"><span data-dcnode-id="1394" instrument_node="">3. Side Effects of CBC</span></h4><span data-dcnode-id="1392" instrument_node="">
</span><p data-dcnode-id="1387"><span data-dcnode-id="1391" instrument_node="">CBC stands for </span><a data-dcnode-id="1389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/cbc/"><span data-dcnode-id="1390" instrument_node="">cannabichromene</span></a><span data-dcnode-id="1388" instrument_node=""> — it’s the third most predominant cannabinoid next to CBD and THC. Some hemp strains are high in CBC, so it has a greater potential for impacting the side effects of hemp products than most other minor cannabinoids. </span></p><span data-dcnode-id="1386" instrument_node="">
</span><p data-dcnode-id="1383"><strong data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">The potential side effects of CBC include:</span></strong></p><span data-dcnode-id="1382" instrument_node="">
</span><ul data-dcnode-id="1365"><span data-dcnode-id="1381" instrument_node="">
</span><li data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">Dizziness</span></li><span data-dcnode-id="1378" instrument_node="">
</span><li data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">Fatigue</span></li><span data-dcnode-id="1375" instrument_node="">
</span><li data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Sedation</span></li><span data-dcnode-id="1372" instrument_node="">
</span><li data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">Nausea</span></li><span data-dcnode-id="1369" instrument_node="">
</span><li data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">Loss of appetite</span></li><span data-dcnode-id="1366" instrument_node="">
</span></ul><span data-dcnode-id="1364" instrument_node="">
</span><h4 data-dcnode-id="1362" id="h4-4-side-effects-of-cbg-4"><span data-dcnode-id="1363" instrument_node="">4. Side Effects of CBG</span></h4><span data-dcnode-id="1361" instrument_node="">
</span><p data-dcnode-id="1357"><a data-dcnode-id="1359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/cbg/"><span data-dcnode-id="1360" instrument_node="">CBG stands for cannabigerol</span></a><span data-dcnode-id="1358" instrument_node=""> — it’s the precursor molecule for both CBD and THC. Therefore, plants that have been harvested too early will have high levels of CBG. </span></p><span data-dcnode-id="1356" instrument_node="">
</span><p data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">CBG has few side effects and is reported to
counteract many of the psychoactive effects of THC. </span></p><span data-dcnode-id="1353" instrument_node="">
</span><p data-dcnode-id="1350"><strong data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">Side effects of CBG may include: </span></strong></p><span data-dcnode-id="1349" instrument_node="">
</span><ul data-dcnode-id="1335"><span data-dcnode-id="1348" instrument_node="">
</span><li data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">Sedation</span></li><span data-dcnode-id="1345" instrument_node="">
</span><li data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">Muscle weakness</span></li><span data-dcnode-id="1342" instrument_node="">
</span><li data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">Nausea and vomiting</span></li><span data-dcnode-id="1339" instrument_node="">
</span><li data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">Lightheadedness</span></li><span data-dcnode-id="1336" instrument_node="">
</span></ul><span data-dcnode-id="1334" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1331"><figure class="aligncenter is-resized" data-dcnode-id="1332"><img alt="" class="wp-image-18336" data-dcnode-id="1333" decoding="async" fetchpriority="low" height="271" loading="lazy" sizes="(max-width: 523px) 100vw, 523px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cannabinoids-cbc-cbg.jpg&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cannabinoids-cbc-cbg.jpg 1000w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cannabinoids-cbc-cbg-300x156.jpg 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cannabinoids-cbc-cbg-768x399.jpg 768w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cannabinoids-cbc-cbg-180x94.jpg 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cannabinoids-cbc-cbg-283x147.jpg 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cannabinoids-cbc-cbg-54x28.jpg 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cannabinoids-cbc-cbg-330x172.jpg 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cannabinoids-cbc-cbg-420x218.jpg 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cannabinoids-cbc-cbg-74x38.jpg 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cannabinoids-cbc-cbg-58x30.jpg 58w" width="523"></figure></div><span data-dcnode-id="1330" instrument_node="">
</span><h4 data-dcnode-id="1328" id="h4-5-side-effects-of-cbn-5"><span data-dcnode-id="1329" instrument_node="">5. Side Effects of CBN</span></h4><span data-dcnode-id="1327" instrument_node="">
</span><p data-dcnode-id="1323"><a data-dcnode-id="1325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/cbn/"><span data-dcnode-id="1326" instrument_node="">CBN (cannabinol)</span></a><span data-dcnode-id="1324" instrument_node=""> is on the opposite end of the scale to CBG. Instead of being a precursor, it’s a metabolite of THC. As THC breaks down, CBN levels rise. </span></p><span data-dcnode-id="1322" instrument_node="">
</span><p data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">This compound is not found in high concentrations in hemp plants because of the lack of THC but will still be present in some capacity — especially in plants that have been harvested late or in full-spectrum CBD oils nearing their expiration date. </span></p><span data-dcnode-id="1319" instrument_node="">
</span><p data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">CBN is more sedative than most other
cannabinoids, so the most common side effects are sedation and fatigue. </span></p><span data-dcnode-id="1316" instrument_node="">
</span><p data-dcnode-id="1313"><strong data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">The side effects of CBN may include: </span></strong></p><span data-dcnode-id="1312" instrument_node="">
</span><ul data-dcnode-id="1298"><span data-dcnode-id="1311" instrument_node="">
</span><li data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">Sedation</span></li><span data-dcnode-id="1308" instrument_node="">
</span><li data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">Nausea and vomiting</span></li><span data-dcnode-id="1305" instrument_node="">
</span><li data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">Increased appetite</span></li><span data-dcnode-id="1302" instrument_node="">
</span><li data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">Poor memory and concentration</span></li><span data-dcnode-id="1299" instrument_node="">
</span></ul><span data-dcnode-id="1297" instrument_node="">
</span></div><span data-dcnode-id="1295" instrument_node="">
</span><div class="p_wrap" data-dcnode-id="1203"><span data-dcnode-id="1294" instrument_node="">
</span><amp-position-observer data-dcnode-id="1293" intersection-ratios="0" layout="nodisplay" on="scroll:h2-who-should-avoid-using-cbd-7-offset.seekTo(percent=event.percent)"></amp-position-observer><h2 data-dcnode-id="1291" id="h2-who-should-avoid-using-cbd-7"><span data-dcnode-id="1292" instrument_node="">Who Should Avoid Using CBD? </span></h2><span data-dcnode-id="1290" instrument_node="">
</span><p data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">Now that we’ve covered all the side effects of CBD and highlighted some of the factors that can make these side effects more frequent or more severe — let’s discuss a few examples where CBD should be avoided altogether.</span></p><span data-dcnode-id="1287" instrument_node="">
</span><h4 data-dcnode-id="1285" id="h4-1-people-with-liver-disorders-1"><span data-dcnode-id="1286" instrument_node="">1. People With Liver Disorders</span></h4><span data-dcnode-id="1284" instrument_node="">
</span><p data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">CBD is metabolized in the liver — along with
just about every other medication or supplement we consume. If there’s already
a problem with the liver, it will be difficult to metabolize CBD effectively,
causing CBD levels (and other medications) to remain elevated for extended
periods. </span></p><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">If you suffer from any liver disorders (hepatitis, fatty liver disease, cirrhosis, etc.), it’s wise to speak with your doctor before using CBD.</span></p><span data-dcnode-id="1278" instrument_node="">
</span><h4 data-dcnode-id="1276" id="h4-2-people-trying-to-conceive-achild-2"><span data-dcnode-id="1277" instrument_node="">2. People Trying to Conceive a
Child</span></h4><span data-dcnode-id="1275" instrument_node="">
</span><p data-dcnode-id="1270"><span data-dcnode-id="1274" instrument_node="">CBD and other cannabinoids are untested on a growing fetus, and there are many theories that the compound can </span><a data-dcnode-id="1272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S0890856709660731" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1273" instrument_node="">negatively affect brain development</span></a><span data-dcnode-id="1271" instrument_node="">. Therefore, if you’re trying to conceive, it’s wise to avoid the use of CBD supplements. </span></p><span data-dcnode-id="1269" instrument_node="">
</span><h4 data-dcnode-id="1267" id="h4-3-pregnant-or-breastfeedingmothers-3"><span data-dcnode-id="1268" instrument_node="">3. Pregnant or Breastfeeding
Mothers</span></h4><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Similar to the point above, CBD should be avoided in expectant or nursing mothers to avoid losing the baby with CBD. Cannabinoids are highly interactive with our central nervous system and may cause problems in the developing infant nervous system. </span></p><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">CBD is a fat-soluble substance and will transfer to the child through breast milk. </span></p><span data-dcnode-id="1260" instrument_node="">
</span><h4 data-dcnode-id="1258" id="h4-4-people-taking-certainmedications-ask-your-doctor-4"><span data-dcnode-id="1259" instrument_node="">4. People Taking Certain
Medications (Ask Your Doctor)</span></h4><span data-dcnode-id="1257" instrument_node="">
</span><p data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">Some medications may interact with CBD, as highlighted in several of the safety studies listed earlier. Here are some of the key ways CBD can interact with a drug: </span></p><span data-dcnode-id="1254" instrument_node="">
</span><ul data-dcnode-id="1234"><span data-dcnode-id="1253" instrument_node="">
</span><li data-dcnode-id="1248"><span data-dcnode-id="1252" instrument_node="">
</span><strong data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">CBD may increase the effects of
medication —</span></strong><span data-dcnode-id="1249" instrument_node="">&nbsp;this can lead to side effects from
the CBD or the medication being too strong</span></li><span data-dcnode-id="1247" instrument_node="">
</span><li data-dcnode-id="1242"><span data-dcnode-id="1246" instrument_node="">
</span><strong data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">CBD may prevent the breakdown and
excretion of drugs from the body —</span></strong><span data-dcnode-id="1243" instrument_node=""> this can cause
compounds to build up to dangerous levels in the bloodstream over time</span></li><span data-dcnode-id="1241" instrument_node="">
