</span><li data-dcnode-id="1236"><span data-dcnode-id="1240" instrument_node="">
</span><strong data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">CBD may counteract the effects of a
medication —</span></strong><span data-dcnode-id="1237" instrument_node="">&nbsp;this can cause the medicine to
become ineffective for addressing the symptoms it’s being used to treat</span></li><span data-dcnode-id="1235" instrument_node="">
</span></ul><span data-dcnode-id="1233" instrument_node="">
</span><p data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Certain drugs are more likely to interact with
CBD than others —&nbsp;such as antipsychotics, blood thinners, blood pressure
medications, and pain medications. </span></p><span data-dcnode-id="1230" instrument_node="">
</span><p data-dcnode-id="1227"><strong data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">Always speak with your doctor before using CBD if you’re taking any prescription medications. </span></strong></p><span data-dcnode-id="1226" instrument_node="">
</span><h4 data-dcnode-id="1224" id="h4-5-people-suffering-from-lowblood-pressure-5"><span data-dcnode-id="1225" instrument_node="">5. People Suffering from Low
Blood Pressure</span></h4><span data-dcnode-id="1223" instrument_node="">
</span><p data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">As mentioned above, CBD may cause a reduction
in blood pressure. If you already experience low blood pressure, taking CBD
could worsen the problem. </span></p><span data-dcnode-id="1220" instrument_node="">
</span><p data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">It’s recommended that people who have low
blood pressure (hypotension) should avoid using CBD, or use CBD under the
supervision and advice of a medical professional. </span></p><span data-dcnode-id="1217" instrument_node="">
</span><h4 data-dcnode-id="1215" id="h4-6-people-with-known-allergies-tocannabis-products-6"><span data-dcnode-id="1216" instrument_node="">6. People With Known Allergies to
Cannabis Products</span></h4><span data-dcnode-id="1214" instrument_node="">
</span><p data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">If you’ve had allergic reactions to cannabis
products in the past, be very careful when trying CBD. Sometimes these
allergies are experienced only from smoking the plant or from additives like
synthetic flavorings or preservatives — however, in other cases, the allergies
are to the cannabinoids or other phytochemicals in the hemp plant. </span></p><span data-dcnode-id="1211" instrument_node="">
</span><p data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">In cases of severe allergies, such as anaphylaxis, avoid CBD products altogether. </span></p><span data-dcnode-id="1208" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1205"><figure class="aligncenter is-resized" data-dcnode-id="1206"><img alt="" class="wp-image-18337" data-dcnode-id="1207" decoding="async" fetchpriority="low" height="380" loading="lazy" sizes="(max-width: 571px) 100vw, 571px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cbd-oil-side-effects.jpg&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cbd-oil-side-effects.jpg 1000w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cbd-oil-side-effects-300x200.jpg 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cbd-oil-side-effects-768x512.jpg 768w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cbd-oil-side-effects-180x120.jpg 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cbd-oil-side-effects-283x189.jpg 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cbd-oil-side-effects-54x36.jpg 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cbd-oil-side-effects-330x220.jpg 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cbd-oil-side-effects-420x280.jpg 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cbd-oil-side-effects-74x49.jpg 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2020/01/cbd-oil-side-effects-45x30.jpg 45w" width="571"></figure></div><span data-dcnode-id="1204" instrument_node="">
</span></div><span data-dcnode-id="1202" instrument_node="">
</span><div class="p_wrap" data-dcnode-id="1178"><span data-dcnode-id="1201" instrument_node="">
</span><amp-position-observer data-dcnode-id="1200" intersection-ratios="0" layout="nodisplay" on="scroll:h2-conclusion-is-cbd-safe-8-offset.seekTo(percent=event.percent)"></amp-position-observer><h2 data-dcnode-id="1198" id="h2-conclusion-is-cbd-safe-8"><span data-dcnode-id="1199" instrument_node="">Conclusion: Is CBD Safe? </span></h2><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">Everything has the potential to cause side
effects — especially compounds that have apparent physiological effects on the
body. This includes CBD — which has a long list of effects and benefits. </span></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">CBD has been proven to be a safe and effective
compound in animal and human clinical trials many times over. The side effects
this compound is most likely to cause are very mild in nature — such as dry
mouth, mild drops in blood pressure, diarrhea, loss of appetite, and fatigue,
or drowsiness. </span></p><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">Most people can avoid these side effects by
following some of the advice listed above — such as drinking plenty of water,
taking CBD with food, combining other supplements like caffeine, or limiting
the dose of CBD. </span></p><span data-dcnode-id="1188" instrument_node="">
</span><p data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">However, in rare instances, these side effects
are more severe. The most severe side effects come from allergic reactions,
smoke or vape inhalation, or interactions with other medications and underlying
health disorders. </span></p><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">For this reason, it’s wise that you speak with
your doctor before using CBD if you have any underlying health issues or are
taking any medications. It’s also a good idea to start with a very low dose of
CBD (~2 mg) and build the dose up gradually over time once you know how this
compound interacts with your body individually. </span></p><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">Have you experienced any side effects from
CBD? Leave your comments below!</span></p><span data-dcnode-id="1179" instrument_node="">
