" instrument_node="">Oncology</span></a></td></tr><tr data-dcnode-id="4438"><th class="infobox-label" data-dcnode-id="4441" scope="row"><a data-dcnode-id="4442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/ICD-10_Procedure_Coding_System" title="ICD-10 Procedure Coding System"><span data-dcnode-id="4443" instrument_node="">ICD-10-PCS</span></a></th><td class="infobox-data" data-dcnode-id="4439"><span data-dcnode-id="4440" instrument_node="">110000053</span></td></tr><tr class="noprint" data-dcnode-id="4431"><td class="infobox-full-data" colspan="2" data-dcnode-id="4432"><div data-dcnode-id="4433" style="text-align: right;"><span data-dcnode-id="4437" instrument_node="">[</span><a class="extiw" data-dcnode-id="4435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikidata.org/wiki/Q2575340" title="d:Q2575340"><span data-dcnode-id="4436" instrument_node="">edit on Wikidata</span></a><span data-dcnode-id="4434" instrument_node="">]</span></div></td></tr></tbody></table><span data-dcnode-id="4428" instrument_node="">
</span><p data-dcnode-id="4384"><a data-dcnode-id="4426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cancer" title="Cancer"><span data-dcnode-id="4427" instrument_node="">Cancer</span></a><span data-dcnode-id="4425" instrument_node=""> can be treated by </span><a data-dcnode-id="4423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Surgery" title="Surgery"><span data-dcnode-id="4424" instrument_node="">surgery</span></a><span data-dcnode-id="4422" instrument_node="">, </span><a data-dcnode-id="4420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chemotherapy" title="Chemotherapy"><span data-dcnode-id="4421" instrument_node="">chemotherapy</span></a><span data-dcnode-id="4419" instrument_node="">, </span><a data-dcnode-id="4417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radiation_therapy" title="Radiation therapy"><span data-dcnode-id="4418" instrument_node="">radiation therapy</span></a><span data-dcnode-id="4416" instrument_node="">, </span><a data-dcnode-id="4414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hormonal_therapy_%28oncology%29" title="Hormonal therapy (oncology)"><span data-dcnode-id="4415" instrument_node="">hormonal therapy</span></a><span data-dcnode-id="4413" instrument_node="">, </span><a data-dcnode-id="4411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Targeted_therapy" title="Targeted therapy"><span data-dcnode-id="4412" instrument_node="">targeted therapy</span></a><span data-dcnode-id="4410" instrument_node=""> (including </span><a data-dcnode-id="4408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immunotherapy" title="Immunotherapy"><span data-dcnode-id="4409" instrument_node="">immunotherapy</span></a><span data-dcnode-id="4407" instrument_node=""> such as </span><a data-dcnode-id="4405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monoclonal_antibody_therapy" title="Monoclonal antibody therapy"><span data-dcnode-id="4406" instrument_node="">monoclonal antibody therapy</span></a><span data-dcnode-id="4404" instrument_node="">) and </span><a data-dcnode-id="4402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Synthetic_lethality" title="Synthetic lethality"><span data-dcnode-id="4403" instrument_node="">synthetic lethality</span></a><span data-dcnode-id="4401" instrument_node="">, most commonly as a series of separate treatments (e.g. chemotherapy before surgery). The choice of therapy depends upon the location and grade of the tumor and the </span><a data-dcnode-id="4399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cancer_staging" title="Cancer staging"><span data-dcnode-id="4400" instrument_node="">stage</span></a><span data-dcnode-id="4398" instrument_node=""> of the disease, as well as the general state of the patient (</span><a data-dcnode-id="4396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Performance_status" title="Performance status"><span data-dcnode-id="4397" instrument_node="">performance status</span></a><span data-dcnode-id="4395" instrument_node="">). </span><a data-dcnode-id="4393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cancer_genome_sequencing" title="Cancer genome sequencing"><span data-dcnode-id="4394" instrument_node="">Cancer genome sequencing</span></a><span data-dcnode-id="4392" instrument_node=""> helps in determining which cancer the patient exactly has for determining the best therapy for the cancer. A number of </span><a data-dcnode-id="4390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Experimental_cancer_treatment" title="Experimental cancer treatment"><span data-dcnode-id="4391" instrument_node="">experimental cancer treatments</span></a><span data-dcnode-id="4389" instrument_node=""> are also under development. Under current estimates, two in five people will have cancer at some point in their lifetime.</span><sup class="reference" data-dcnode-id="4386" id="cite_ref-1"><a data-dcnode-id="4387" href="#cite_note-1"><span data-dcnode-id="4388" instrument_node="">[1]</span></a></sup><span data-dcnode-id="4385" instrument_node="">
</span></p><p data-dcnode-id="4357"><span data-dcnode-id="4383" instrument_node="">Complete removal of the cancer without damage to the rest of the body (that is, achieving </span><a data-dcnode-id="4381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cure" title="Cure"><span data-dcnode-id="4382" instrument_node="">cure</span></a><span data-dcnode-id="4380" instrument_node=""> with near-zero </span><a data-dcnode-id="4378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adverse_effect" title="Adverse effect"><span data-dcnode-id="4379" instrument_node="">adverse effects</span></a><span data-dcnode-id="4377" instrument_node="">) is the ideal, if rarely achieved, goal of treatment and is often the goal in practice. Sometimes this can be accomplished by surgery, but the propensity of cancers to invade adjacent tissue or to spread to distant sites by microscopic </span><a data-dcnode-id="4375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Metastasis" title="Metastasis"><span data-dcnode-id="4376" instrument_node="">metastasis</span></a><span data-dcnode-id="4374" instrument_node=""> often limits its effectiveness; and chemotherapy and radiotherapy can have a negative effect on normal cells.</span><sup class="reference" data-dcnode-id="4371" id="cite_ref-Al_2-0"><a data-dcnode-id="4372" href="#cite_note-Al-2"><span data-dcnode-id="4373" instrument_node="">[2]</span></a></sup><span data-dcnode-id="4370" instrument_node=""> Therefore, cure with nonnegligible adverse effects may be accepted as a practical goal in some cases; and besides </span><a data-dcnode-id="4368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Therapy%23Curative_therapy" title="Therapy"><span data-dcnode-id="4369" instrument_node="">curative intent</span></a><span data-dcnode-id="4367" instrument_node="">, practical goals of therapy can also include (1) suppressing the cancer to a subclinical state and maintaining that state for years of good </span><a data-dcnode-id="4365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quality_of_life" title="Quality of life"><span data-dcnode-id="4366" instrument_node="">quality of life</span></a><span data-dcnode-id="4364" instrument_node=""> (that is, treating the cancer as a </span><a class="mw-redirect" data-dcnode-id="4362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chronic_disease" title="Chronic disease"><span data-dcnode-id="4363" instrument_node="">chronic disease</span></a><span data-dcnode-id="4361" instrument_node="">), and (2) </span><a data-dcnode-id="4359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Palliative_care" title="Palliative care"><span data-dcnode-id="4360" instrument_node="">palliative care</span></a><span data-dcnode-id="4358" instrument_node=""> without curative intent (for advanced-stage metastatic cancers).
</span></p><p data-dcnode-id="4328"><span data-dcnode-id="4356" instrument_node="">Because "cancer" refers to a class of diseases,</span><sup class="reference" data-dcnode-id="4353" id="cite_ref-WhatIsCancerNCI_3-0"><a data-dcnode-id="4354" href="#cite_note-WhatIsCancerNCI-3"><span data-dcnode-id="4355" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="4350" id="cite_ref-4"><a data-dcnode-id="4351" href="#cite_note-4"><span data-dcnode-id="4352" instrument_node="">[4]</span></a></sup><span data-dcnode-id="4349" instrument_node=""> it is unlikely that there will ever be a single "</span><a class="mw-redirect" data-dcnode-id="4347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cure_for_cancer" title="Cure for cancer"><span data-dcnode-id="4348" instrument_node="">cure for cancer</span></a><span data-dcnode-id="4346" instrument_node="">" any more than there will be a single treatment for all </span><a class="mw-redirect" data-dcnode-id="4344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Infectious_disease" title="Infectious disease"><span data-dcnode-id="4345" instrument_node="">infectious diseases</span></a><span data-dcnode-id="4343" instrument_node="">.</span><sup class="reference" data-dcnode-id="4340" id="cite_ref-5"><a data-dcnode-id="4341" href="#cite_note-5"><span data-dcnode-id="4342" instrument_node="">[5]</span></a></sup><span data-dcnode-id="4339" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="4337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Angiogenesis_inhibitors" title="Angiogenesis inhibitors"><span data-dcnode-id="4338" instrument_node="">Angiogenesis inhibitors</span></a><span data-dcnode-id="4336" instrument_node=""> were once thought to have potential as a "</span><a data-dcnode-id="4334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Silver_bullet" title="Silver bullet"><span data-dcnode-id="4335" instrument_node="">silver bullet</span></a><span data-dcnode-id="4333" instrument_node="">" treatment applicable to many types of cancer, but this has not been the case in practice.</span><sup class="reference" data-dcnode-id="4330" id="cite_ref-6"><a data-dcnode-id="4331" href="#cite_note-6"><span data-dcnode-id="4332" instrument_node="">[6]</span></a></sup><span data-dcnode-id="4329" instrument_node="">
</span></p><span data-dcnode-id="4327" instrument_node="">

</span><h2 data-dcnode-id="4073"><span class="mw-headline" data-dcnode-id="4081" id="Types_of_treatments"><span data-dcnode-id="4082" instrument_node="">Types of treatments</span></span><span class="mw-editsection" data-dcnode-id="4074"><span class="mw-editsection-bracket" data-dcnode-id="4079"><span data-dcnode-id="4080" instrument_node="">[</span></span><a data-dcnode-id="4077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTreatment_of_cancer%26action%3Dedit%26section%3D1" title="Edit section: Types of treatments"><span data-dcnode-id="4078" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4075"><span data-dcnode-id="4076" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4072" instrument_node="">
</span><p data-dcnode-id="4070"><span data-dcnode-id="4071" instrument_node="">The treatment of cancer has undergone evolutionary changes as understanding of the underlying biological processes has increased. Tumor removal surgeries have been documented in ancient Egypt, hormone therapy and radiation therapy were developed in the late 19th century. Chemotherapy, immunotherapy and newer targeted therapies are products of the 20th century. As new information about the biology of cancer emerges, treatments will be developed and modified to increase effectiveness, precision, survivability, and quality of life.
</span></p><span data-dcnode-id="4069" instrument_node="">
</span><h3 data-dcnode-id="4059"><span class="mw-headline" data-dcnode-id="4067" id="Surgery"><span data-dcnode-id="4068" instrument_node="">Surgery</span></span><span class="mw-editsection" data-dcnode-id="4060"><span class="mw-editsection-bracket" data-dcnode-id="4065"><span data-dcnode-id="4066" instrument_node="">[</span></span><a data-dcnode-id="4063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTreatment_of_cancer%26action%3Dedit%26section%3D2" title="Edit section: Surgery"><span data-dcnode-id="4064" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4061"><span data-dcnode-id="4062" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4058" instrument_node="">
</span><p data-dcnode-id="4044"><span data-dcnode-id="4057" instrument_node="">In theory, non-</span><a class="mw-redirect" data-dcnode-id="4055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hematological" title="Hematological"><span data-dcnode-id="4056" instrument_node="">hematological</span></a><span data-dcnode-id="4054" instrument_node=""> cancers can be cured if entirely removed by </span><a data-dcnode-id="4052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Surgery" title="Surgery"><span data-dcnode-id="4053" instrument_node="">surgery</span></a><span data-dcnode-id="4051" instrument_node="">, but this is not always possible. When the cancer has </span><a data-dcnode-id="4049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Metastasis" title="Metastasis"><span data-dcnode-id="4050" instrument_node="">metastasized</span></a><span data-dcnode-id="4048" instrument_node=""> to other sites in the body prior to surgery, complete surgical excision is usually impossible. In the </span><a data-dcnode-id="4046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Stewart_Halsted" title="William Stewart Halsted"><span data-dcnode-id="4047" instrument_node="">Halstedian</span></a><span data-dcnode-id="4045" instrument_node=""> model of cancer progression, tumors grow locally, then spread to the lymph nodes, then to the rest of the body. This has given rise to the popularity of local-only treatments such as surgery for small cancers. Even small localized tumors are increasingly recognized as possessing metastatic potential.
</span></p><p data-dcnode-id="4026"><span data-dcnode-id="4043" instrument_node="">Examples of surgical procedures for cancer include </span><a data-dcnode-id="4041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mastectomy" title="Mastectomy"><span data-dcnode-id="4042" instrument_node="">mastectomy</span></a><span data-dcnode-id="4040" instrument_node=""> for breast cancer, </span><a data-dcnode-id="4038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prostatectomy" title="Prostatectomy"><span data-dcnode-id="4039" instrument_node="">prostatectomy</span></a><span data-dcnode-id="4037" instrument_node=""> for prostate cancer, and </span><a class="mw-redirect" data-dcnode-id="4035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lung_cancer_surgery" title="Lung cancer surgery"><span data-dcnode-id="4036" instrument_node="">lung cancer surgery</span></a><span data-dcnode-id="4034" instrument_node=""> for non-small cell lung cancer. The goal of the surgery can be either the removal of only the tumor, or the entire organ.</span><sup class="reference" data-dcnode-id="4031" id="cite_ref-7"><a data-dcnode-id="4032" href="#cite_note-7"><span data-dcnode-id="4033" instrument_node="">[7]</span></a></sup><span data-dcnode-id="4030" instrument_node=""> A single cancer cell is invisible to the naked eye but can regrow into a new tumor, a process called recurrence. For this reason, the </span><a data-dcnode-id="4028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anatomical_pathology" title="Anatomical pathology"><span data-dcnode-id="4029" instrument_node="">pathologist</span></a><span data-dcnode-id="4027" instrument_node=""> will examine the surgical specimen to determine if a margin of healthy tissue is present, thus decreasing the chance that microscopic cancer cells are left in the patient.
</span></p><p data-dcnode-id="4000"><span data-dcnode-id="4025" instrument_node="">In addition to removal of the primary tumor, surgery is often necessary for </span><a data-dcnode-id="4023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cancer_staging" title="Cancer staging"><span data-dcnode-id="4024" instrument_node="">staging</span></a><span data-dcnode-id="4022" instrument_node="">, e.g. determining the extent of the disease and whether it has </span><a data-dcnode-id="4020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Metastasis" title="Metastasis"><span data-dcnode-id="4021" instrument_node="">metastasized</span></a><span data-dcnode-id="4019" instrument_node=""> to regional </span><a data-dcnode-id="4017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lymph_node" title="Lymph node"><span data-dcnode-id="4018" instrument_node="">lymph nodes</span></a><span data-dcnode-id="4016" instrument_node="">. Staging is a major determinant of </span><a data-dcnode-id="4014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prognosis" title="Prognosis"><span data-dcnode-id="4015" instrument_node="">prognosis</span></a><span data-dcnode-id="4013" instrument_node=""> and of the need for </span><a data-dcnode-id="4011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adjuvant_therapy" title="Adjuvant therapy"><span data-dcnode-id="4012" instrument_node="">adjuvant therapy</span></a><span data-dcnode-id="4010" instrument_node="">. Occasionally, surgery is necessary to control symptoms, such as </span><a data-dcnode-id="4008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spinal_cord_compression" title="Spinal cord compression"><span data-dcnode-id="4009" instrument_node="">spinal cord compression</span></a><span data-dcnode-id="4007" instrument_node=""> or </span><a data-dcnode-id="4005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bowel_obstruction" title="Bowel obstruction"><span data-dcnode-id="4006" instrument_node="">bowel obstruction</span></a><span data-dcnode-id="4004" instrument_node="">. This is referred to as </span><a class="mw-redirect" data-dcnode-id="4002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Palliative_treatment" title="Palliative treatment"><span data-dcnode-id="4003" instrument_node="">palliative treatment</span></a><span data-dcnode-id="4001" instrument_node="">.
</span></p><p data-dcnode-id="3987"><span data-dcnode-id="3999" instrument_node="">Surgery may be performed before or after other forms of treatment. Treatment before surgery is often described as </span><a class="mw-redirect" data-dcnode-id="3997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neoadjuvant" title="Neoadjuvant"><span data-dcnode-id="3998" instrument_node="">neoadjuvant</span></a><span data-dcnode-id="3996" instrument_node="">. In breast cancer, the survival rate of patients who receive neoadjuvant chemotherapy are no different from those who are treated following surgery.</span><sup class="reference" data-dcnode-id="3993" id="cite_ref-8"><a data-dcnode-id="3994" href="#cite_note-8"><span data-dcnode-id="3995" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3992" instrument_node=""> Giving chemotherapy earlier allows oncologists to evaluate the effectiveness of the therapy, and may make removal of the tumor easier. However, the survival advantages of neoadjuvant treatment in lung cancer are less clear.</span><sup class="reference" data-dcnode-id="3989" id="cite_ref-9"><a data-dcnode-id="3990" href="#cite_note-9"><span data-dcnode-id="3991" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3988" instrument_node="">
</span></p><span data-dcnode-id="3986" instrument_node="">
</span><h3 data-dcnode-id="3976"><span class="mw-headline" data-dcnode-id="3984" id="Radiation_therapy"><span data-dcnode-id="3985" instrument_node="">Radiation therapy</span></span><span class="mw-editsection" data-dcnode-id="3977"><span class="mw-editsection-bracket" data-dcnode-id="3982"><span data-dcnode-id="3983" instrument_node="">[</span></span><a data-dcnode-id="3980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTreatment_of_cancer%26action%3Dedit%26section%3D3" title="Edit section: Radiation therapy"><span data-dcnode-id="3981" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3978"><span data-dcnode-id="3979" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3975" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="3969" role="note"><span data-dcnode-id="3972" instrument_node="">Main article: </span><a data-dcnode-id="3970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radiation_therapy" title="Radiation therapy"><span data-dcnode-id="3971" instrument_node="">Radiation therapy</span></a></div><span data-dcnode-id="3968" instrument_node="">
</span><p data-dcnode-id="3955"><a data-dcnode-id="3966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radiation_therapy" title="Radiation therapy"><span data-dcnode-id="3967" instrument_node="">Radiation therapy</span></a><span data-dcnode-id="3965" instrument_node=""> (also called radiotherapy, X-ray therapy, or irradiation) is the use of ionizing radiation to kill cancer cells and shrink tumors by damaging their DNA (the molecules inside cells that carry genetic information and pass it from one generation to the next), making it impossible for these cells to continue to grow and divide. Radiation therapy can either damage DNA directly or create charged particles (</span><a class="mw-redirect" data-dcnode-id="3963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Free_radicals" title="Free radicals"><span data-dcnode-id="3964" instrument_node="">free radicals</span></a><span data-dcnode-id="3962" instrument_node="">) within the cells that can in turn damage the DNA. Radiation therapy can be administered externally via </span><a data-dcnode-id="3960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/External_beam_radiotherapy" title="External beam radiotherapy"><span data-dcnode-id="3961" instrument_node="">external beam radiotherapy</span></a><span data-dcnode-id="3959" instrument_node=""> (EBRT) or internally via </span><a data-dcnode-id="3957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brachytherapy" title="Brachytherapy"><span data-dcnode-id="3958" instrument_node="">brachytherapy</span></a><span data-dcnode-id="3956" instrument_node="">. The effects of radiation therapy are localised and confined to the region being treated. Although radiation damages both cancer cells and normal cells, most normal cells can recover from the effects of radiation and function properly. The goal of radiation therapy is to damage as many cancer cells as possible, while limiting harm to nearby healthy tissue. Hence, it is given in many fractions, allowing healthy tissue to recover between fractions.
</span></p><p data-dcnode-id="3953"><span data-dcnode-id="3954" instrument_node="">Radiation therapy may be used to treat almost every type of solid tumor, including cancers of the brain, breast, cervix, larynx, liver, lung, pancreas, prostate, skin, stomach, uterus, or soft tissue sarcomas. Radiation is also used to treat leukemia and lymphoma. Radiation dose to each site depends on a number of factors, including the radio sensitivity of each cancer type and whether there are tissues and organs nearby that may be damaged by radiation. Thus, as with every form of treatment, radiation therapy is not without its side effects.
</span></p><p data-dcnode-id="3947"><span data-dcnode-id="3952" instrument_node="">Radiation therapy can lead to dry mouth from exposure of salivary glands to radiation, resulting in decreased saliva secretion. Post therapy, the salivary glands will resume functioning but rarely in the same fashion. Dry mouth caused by radiation can be a lifelong problem.</span><sup class="reference" data-dcnode-id="3949" id="cite_ref-10"><a data-dcnode-id="3950" href="#cite_note-10"><span data-dcnode-id="3951" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3948" instrument_node="">
</span></p><p data-dcnode-id="3937"><span data-dcnode-id="3946" instrument_node="">Radiation might not be a choice of treatment if the tumour was diagnosed in late stages or is in a vulnerable location, as radiation might be more likely to cause damage to organs at effective doses. Moreover, radiation therapy for patients under 14 can cause particularly significant long-term side effects, such as hearing loss and blindness, that influence the lifestyle of the young patients. Children who had received cranial radiotherapy are deemed at a high risk for academic failure and cognitive delay.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3939" style="white-space:nowrap;"><span data-dcnode-id="3945" instrument_node="">[</span><i data-dcnode-id="3941"><a data-dcnode-id="3942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3943" title="This claim needs references to reliable sources. (February 2022)"><span data-dcnode-id="3944" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3940" instrument_node="">]</span></sup><span data-dcnode-id="3938" instrument_node="">
</span></p><p data-dcnode-id="3935"><span data-dcnode-id="3936" instrument_node="">A study by Reddy A.T. determined the significant decrease in IQ with higher doses of radiation, specifically for children with brain tumours. Alternative treatments, such as surgical resection, may be used in young patients to decrease the occurrence of side effects.
</span></p><span data-dcnode-id="3934" instrument_node="">
</span><h3 data-dcnode-id="3924"><span class="mw-headline" data-dcnode-id="3932" id="Chemotherapy"><span data-dcnode-id="3933" instrument_node="">Chemotherapy</span></span><span class="mw-editsection" data-dcnode-id="3925"><span class="mw-editsection-bracket" data-dcnode-id="3930"><span data-dcnode-id="3931" instrument_node="">[</span></span><a data-dcnode-id="3928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTreatment_of_cancer%26action%3Dedit%26section%3D4" title="Edit section: Chemotherapy"><span data-dcnode-id="3929" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3926"><span data-dcnode-id="3927" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3923" instrument_node="">
</span><link data-dcnode-id="3922" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3918" role="note"><span data-dcnode-id="3921" instrument_node="">Main article: </span><a data-dcnode-id="3919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chemotherapy" title="Chemotherapy"><span data-dcnode-id="3920" instrument_node="">Chemotherapy</span></a></div><span data-dcnode-id="3917" instrument_node="">
</span><p data-dcnode-id="3895"><a data-dcnode-id="3915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chemotherapy" title="Chemotherapy"><span data-dcnode-id="3916" instrument_node="">Chemotherapy</span></a><span data-dcnode-id="3914" instrument_node=""> is the treatment of cancer with </span><a data-dcnode-id="3912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Medication" title="Medication"><span data-dcnode-id="3913" instrument_node="">drugs</span></a><span data-dcnode-id="3911" instrument_node=""> ("anticancer drugs") that can destroy cancer cells. In current usage, the term "chemotherapy" usually refers to </span><i data-dcnode-id="3909"><span data-dcnode-id="3910" instrument_node="">cytotoxic</span></i><span data-dcnode-id="3908" instrument_node=""> drugs which affect rapidly dividing cells in general, in contrast with </span><i data-dcnode-id="3906"><span data-dcnode-id="3907" instrument_node="">targeted therapy</span></i><span data-dcnode-id="3905" instrument_node=""> (see below). Chemotherapy drugs interfere with cell division in various possible ways, e.g. with the duplication of </span><a data-dcnode-id="3903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/DNA" title="DNA"><span data-dcnode-id="3904" instrument_node="">DNA</span></a><span data-dcnode-id="3902" instrument_node=""> or the separation of newly formed </span><a data-dcnode-id="3900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chromosome" title="Chromosome"><span data-dcnode-id="3901" instrument_node="">chromosomes</span></a><span data-dcnode-id="3899" instrument_node="">. Most forms of chemotherapy target all rapidly dividing cells and are not specific to cancer cells, although some degree of specificity may come from the inability of many cancer cells to repair </span><a class="mw-redirect" data-dcnode-id="3897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/DNA_damage" title="DNA damage"><span data-dcnode-id="3898" instrument_node="">DNA damage</span></a><span data-dcnode-id="3896" instrument_node="">, while normal cells generally can. Hence, chemotherapy has the potential to harm healthy tissue, especially those tissues that have a high replacement rate (e.g. intestinal lining). These cells usually repair themselves after chemotherapy.
</span></p><p data-dcnode-id="3889"><span data-dcnode-id="3894" instrument_node="">Because some drugs work better together than alone, two or more drugs are often given at the same time. This is called "combination chemotherapy"; most chemotherapy regimens are given in a combination.</span><sup class="reference" data-dcnode-id="3891" id="cite_ref-takimoto_11-0"><a data-dcnode-id="3892" href="#cite_note-takimoto-11"><span data-dcnode-id="3893" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3890" instrument_node="">
</span></p><p data-dcnode-id="3875"><span data-dcnode-id="3888" instrument_node="">The treatment of some </span><a class="mw-redirect" data-dcnode-id="3886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leukaemia" title="Leukaemia"><span data-dcnode-id="3887" instrument_node="">leukaemias</span></a><span data-dcnode-id="3885" instrument_node=""> and </span><a data-dcnode-id="3883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lymphoma" title="Lymphoma"><span data-dcnode-id="3884" instrument_node="">lymphomas</span></a><span data-dcnode-id="3882" instrument_node=""> requires the use of high-dose chemotherapy, and </span><a data-dcnode-id="3880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Total_body_irradiation" title="Total body irradiation"><span data-dcnode-id="3881" instrument_node="">total body irradiation</span></a><span data-dcnode-id="3879" instrument_node=""> (TBI). This treatment ablates the bone marrow, and hence the body's ability to recover and repopulate the blood. For this reason, bone marrow, or peripheral blood stem cell harvesting is carried out before the ablative part of the therapy, to enable "rescue" after the treatment has been given. This is known as autologous </span><a class="mw-redirect" data-dcnode-id="3877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stem_cell_transplant" title="Stem cell transplant"><span data-dcnode-id="3878" instrument_node="">stem cell transplantation</span></a><span data-dcnode-id="3876" instrument_node="">.
</span></p><span data-dcnode-id="3874" instrument_node="">
</span><h3 data-dcnode-id="3864"><span class="mw-headline" data-dcnode-id="3872" id="Targeted_therapies"><span data-dcnode-id="3873" instrument_node="">Targeted therapies</span></span><span class="mw-editsection" data-dcnode-id="3865"><span class="mw-editsection-bracket" data-dcnode-id="3870"><span data-dcnode-id="3871" instrument_node="">[</span></span><a data-dcnode-id="3868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTreatment_of_cancer%26action%3Dedit%26section%3D5" title="Edit section: Targeted therapies"><span data-dcnode-id="3869" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3866"><span data-dcnode-id="3867" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3863" instrument_node="">
</span><link data-dcnode-id="3862" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3858" role="note"><span data-dcnode-id="3861" instrument_node="">Main article: </span><a data-dcnode-id="3859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Targeted_therapy" title="Targeted therapy"><span data-dcnode-id="3860" instrument_node="">Targeted therapy</span></a></div><span data-dcnode-id="3857" instrument_node="">
</span><p data-dcnode-id="3843"><span data-dcnode-id="3856" instrument_node="">Targeted therapy, which first became available in the late 1990s, has had a significant impact in the treatment of some types of cancer, and is currently a very active research area. This constitutes the use of agents specific for the deregulated proteins of cancer cells. </span><a data-dcnode-id="3854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Small_molecule" title="Small molecule"><span data-dcnode-id="3855" instrument_node="">Small molecule</span></a><span data-dcnode-id="3853" instrument_node=""> targeted therapy drugs are generally inhibitors of </span><a data-dcnode-id="3851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enzyme" title="Enzyme"><span data-dcnode-id="3852" instrument_node="">enzymatic</span></a><span data-dcnode-id="3850" instrument_node=""> domains on mutated, overexpressed, or otherwise critical proteins within the cancer cell. Prominent examples are the tyrosine kinase inhibitors </span><a data-dcnode-id="3848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Imatinib" title="Imatinib"><span data-dcnode-id="3849" instrument_node="">imatinib</span></a><span data-dcnode-id="3847" instrument_node=""> (Gleevec/Glivec) and </span><a data-dcnode-id="3845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gefitinib" title="Gefitinib"><span data-dcnode-id="3846" instrument_node="">gefitinib</span></a><span data-dcnode-id="3844" instrument_node=""> (Iressa).
</span></p><p data-dcnode-id="3824"><a data-dcnode-id="3841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monoclonal_antibody_therapy" title="Monoclonal antibody therapy"><span data-dcnode-id="3842" instrument_node="">Monoclonal antibody therapy</span></a><span data-dcnode-id="3840" instrument_node=""> is another strategy in which the therapeutic agent is an </span><a data-dcnode-id="3838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antibody" title="Antibody"><span data-dcnode-id="3839" instrument_node="">antibody</span></a><span data-dcnode-id="3837" instrument_node=""> which specifically binds to a protein on the surface of the cancer cells. Examples include the anti-</span><a data-dcnode-id="3835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/HER2/neu" title="HER2/neu"><span data-dcnode-id="3836" instrument_node="">HER2/neu</span></a><span data-dcnode-id="3834" instrument_node=""> antibody </span><a data-dcnode-id="3832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trastuzumab" title="Trastuzumab"><span data-dcnode-id="3833" instrument_node="">trastuzumab</span></a><span data-dcnode-id="3831" instrument_node=""> (Herceptin) used in breast cancer, and the anti-CD20 antibody </span><a data-dcnode-id="3829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rituximab" title="Rituximab"><span data-dcnode-id="3830" instrument_node="">rituximab</span></a><span data-dcnode-id="3828" instrument_node="">, used in a variety of </span><a class="mw-redirect" data-dcnode-id="3826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/B-cell" title="B-cell"><span data-dcnode-id="3827" instrument_node="">B-cell</span></a><span data-dcnode-id="3825" instrument_node=""> malignancies.
</span></p><p data-dcnode-id="3814"><a data-dcnode-id="3822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Targeted_therapy" title="Targeted therapy"><span data-dcnode-id="3823" instrument_node="">Targeted therapy</span></a><span data-dcnode-id="3821" instrument_node=""> can also involve small </span><a data-dcnode-id="3819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peptide" title="Peptide"><span data-dcnode-id="3820" instrument_node="">peptides</span></a><span data-dcnode-id="3818" instrument_node=""> as "homing devices" which can bind to cell surface receptors or affected </span><a data-dcnode-id="3816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Extracellular_matrix" title="Extracellular matrix"><span data-dcnode-id="3817" instrument_node="">extracellular matrix</span></a><span data-dcnode-id="3815" instrument_node=""> surrounding the tumor. Radionuclides which are attached to these peptides (e.g. RGDs) eventually kill the cancer cell if the nuclide decays in the vicinity of the cell. Especially oligo- or multimers of these binding motifs are of great interest, since this can lead to enhanced tumor specificity and avidity.
</span></p><p data-dcnode-id="3775"><a data-dcnode-id="3812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Photodynamic_therapy" title="Photodynamic therapy"><span data-dcnode-id="3813" instrument_node="">Photodynamic therapy</span></a><span data-dcnode-id="3811" instrument_node=""> (PDT) is a ternary treatment for cancer involving a photosensitizer, tissue oxygen, and light (often using </span><a class="mw-redirect" data-dcnode-id="3809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lasers" title="Lasers"><span data-dcnode-id="3810" instrument_node="">lasers</span></a><sup class="reference" data-dcnode-id="3806" id="cite_ref-12"><a data-dcnode-id="3807" href="#cite_note-12"><span data-dcnode-id="3808" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3805" instrument_node="">). PDT can be used as treatment for </span><a class="mw-redirect" data-dcnode-id="3803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Basal_cell_carcinoma" title="Basal cell carcinoma"><span data-dcnode-id="3804" instrument_node="">basal cell carcinoma</span></a><span data-dcnode-id="3802" instrument_node=""> (BCC) or </span><a data-dcnode-id="3800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lung_cancer" title="Lung cancer"><span data-dcnode-id="3801" instrument_node="">lung cancer</span></a><span data-dcnode-id="3799" instrument_node="">; PDT can also be useful in removing traces of malignant tissue after surgical removal of large tumors.</span><sup class="reference" data-dcnode-id="3796" id="cite_ref-13"><a data-dcnode-id="3797" href="#cite_note-13"><span data-dcnode-id="3798" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3795" instrument_node=""> In February 2019, medical scientists announced that </span><a data-dcnode-id="3793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iridium" title="Iridium"><span data-dcnode-id="3794" instrument_node="">iridium</span></a><span data-dcnode-id="3792" instrument_node=""> attached to </span><a data-dcnode-id="3790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Albumin" title="Albumin"><span data-dcnode-id="3791" instrument_node="">albumin</span></a><span data-dcnode-id="3789" instrument_node="">, creating a </span><a data-dcnode-id="3787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Photosensitizer" title="Photosensitizer"><span data-dcnode-id="3788" instrument_node="">photosensitized molecule</span></a><span data-dcnode-id="3786" instrument_node="">, can penetrate </span><a class="mw-redirect" data-dcnode-id="3784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cancer_cells" title="Cancer cells"><span data-dcnode-id="3785" instrument_node="">cancer cells</span></a><span data-dcnode-id="3783" instrument_node=""> and, after being irradiated with light, destroy the cancer cells.</span><sup class="reference" data-dcnode-id="3780" id="cite_ref-EA-20190203_14-0"><a data-dcnode-id="3781" href="#cite_note-EA-20190203-14"><span data-dcnode-id="3782" instrument_node="">[14]</span></a></sup><sup class="reference" data-dcnode-id="3777" id="cite_ref-ANG-20181215_15-0"><a data-dcnode-id="3778" href="#cite_note-ANG-20181215-15"><span data-dcnode-id="3779" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3776" instrument_node="">
</span></p><p data-dcnode-id="3769"><span data-dcnode-id="3774" instrument_node="">High-energy therapeutic ultrasound could increase higher-density anti-cancer drug load and nanomedicines to target tumor sites by 20x fold higher than traditional target cancer therapy.</span><sup class="reference" data-dcnode-id="3771" id="cite_ref-16"><a data-dcnode-id="3772" href="#cite_note-16"><span data-dcnode-id="3773" instrument_node="">[16]</span></a></sup><span data-dcnode-id="3770" instrument_node="">
</span></p><p data-dcnode-id="3719"><span data-dcnode-id="3768" instrument_node="">Targeted therapies under pre-clinical development as potential cancer treatments include </span><a data-dcnode-id="3766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Morpholino" title="Morpholino"><span data-dcnode-id="3767" instrument_node="">morpholino</span></a><span data-dcnode-id="3765" instrument_node=""> splice switching oligonucleotides, which induce </span><a data-dcnode-id="3763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/ERG_%28gene%29" title="ERG (gene)"><span data-dcnode-id="3764" instrument_node="">ERG</span></a><span data-dcnode-id="3762" instrument_node=""> exon skipping in </span><a data-dcnode-id="3760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prostate_cancer" title="Prostate cancer"><span data-dcnode-id="3761" instrument_node="">prostate cancer</span></a><span data-dcnode-id="3759" instrument_node=""> models,</span><sup class="reference" data-dcnode-id="3756" id="cite_ref-17"><a data-dcnode-id="3757" href="#cite_note-17"><span data-dcnode-id="3758" instrument_node="">[17]</span></a></sup><span data-dcnode-id="3755" instrument_node=""> multitargeted </span><a data-dcnode-id="3753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kinase" title="Kinase"><span data-dcnode-id="3754" instrument_node="">kinase</span></a><span data-dcnode-id="3752" instrument_node=""> inhibitors that inhibit the </span><a data-dcnode-id="3750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/PI3K/AKT/mTOR_pathway" title="PI3K/AKT/mTOR pathway"><span data-dcnode-id="3751" instrument_node="">PI3K</span></a><sup class="reference" data-dcnode-id="3747" id="cite_ref-18"><a data-dcnode-id="3748" href="#cite_note-18"><span data-dcnode-id="3749" instrument_node="">[18]</span></a></sup><span data-dcnode-id="3746" instrument_node=""> with other pathways including </span><a data-dcnode-id="3744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/MAPK/ERK_pathway" title="MAPK/ERK pathway"><span data-dcnode-id="3745" instrument_node="">MEK</span></a><sup class="reference" data-dcnode-id="3741" id="cite_ref-19"><a data-dcnode-id="3742" href="#cite_note-19"><span data-dcnode-id="3743" instrument_node="">[19]</span></a></sup><span data-dcnode-id="3740" instrument_node=""> and </span><a data-dcnode-id="3738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/PIM1" title="PIM1"><span data-dcnode-id="3739" instrument_node="">PIM</span></a><span data-dcnode-id="3737" instrument_node="">,</span><sup class="reference" data-dcnode-id="3734" id="cite_ref-20"><a data-dcnode-id="3735" href="#cite_note-20"><span data-dcnode-id="3736" instrument_node="">[20]</span></a></sup><span data-dcnode-id="3733" instrument_node=""> and inhibitors of </span><a data-dcnode-id="3731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NF-%25CE%25BAB" title="NF-κB"><span data-dcnode-id="3732" instrument_node="">NFKB</span></a><span data-dcnode-id="3730" instrument_node=""> in models of chemotherapy resistance.</span><sup class="reference" data-dcnode-id="3727" id="cite_ref-21"><a data-dcnode-id="3728" href="#cite_note-21"><span data-dcnode-id="3729" instrument_node="">[21]</span></a></sup><sup class="reference" data-dcnode-id="3724" id="cite_ref-22"><a data-dcnode-id="3725" href="#cite_note-22"><span data-dcnode-id="3726" instrument_node="">[22]</span></a></sup><sup class="reference" data-dcnode-id="3721" id="cite_ref-23"><a data-dcnode-id="3722" href="#cite_note-23"><span data-dcnode-id="3723" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3720" instrument_node="">
</span></p><span data-dcnode-id="3718" instrument_node="">
</span><h3 data-dcnode-id="3708"><span class="mw-headline" data-dcnode-id="3716" id="Immunotherapy"><span data-dcnode-id="3717" instrument_node="">Immunotherapy</span></span><span class="mw-editsection" data-dcnode-id="3709"><span class="mw-editsection-bracket" data-dcnode-id="3714"><span data-dcnode-id="3715" instrument_node="">[</span></span><a data-dcnode-id="3712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTreatment_of_cancer%26action%3Dedit%26section%3D6" title="Edit section: Immunotherapy"><span data-dcnode-id="3713" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3710"><span data-dcnode-id="3711" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3707" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3695"><div class="thumbinner" data-dcnode-id="3696" style="width:172px;"><a class="image" data-dcnode-id="3705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARenal_cell_carcinoma.jpg"><img alt="" class="thumbimage" data-dcnode-id="3706" data-file-height="650" data-file-width="467" decoding="async" height="237" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/77/Renal_cell_carcinoma.jpg/170px-Renal_cell_carcinoma.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/77/Renal_cell_carcinoma.jpg/255px-Renal_cell_carcinoma.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/77/Renal_cell_carcinoma.jpg/340px-Renal_cell_carcinoma.jpg 2x" width="170"></a><span data-dcnode-id="3704" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3697"><div class="magnify" data-dcnode-id="3702"><a class="internal" data-dcnode-id="3703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARenal_cell_carcinoma.jpg" title="Enlarge"></a></div><span data-dcnode-id="3701" instrument_node="">A renal cell carcinoma (lower left) in a </span><a data-dcnode-id="3699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kidney" title="Kidney"><span data-dcnode-id="3700" instrument_node="">kidney</span></a><span data-dcnode-id="3698" instrument_node=""> specimen.</span></div></div></div><span data-dcnode-id="3694" instrument_node="">
</span><link data-dcnode-id="3693" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3689" role="note"><span data-dcnode-id="3692" instrument_node="">Main article: </span><a data-dcnode-id="3690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cancer_immunotherapy" title="Cancer immunotherapy"><span data-dcnode-id="3691" instrument_node="">Cancer immunotherapy</span></a></div><span data-dcnode-id="3688" instrument_node="">
</span><p data-dcnode-id="3644"><span data-dcnode-id="3687" instrument_node="">Cancer immunotherapy refers to a diverse set of therapeutic strategies designed to induce the patient's own </span><a data-dcnode-id="3685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immune_system" title="Immune system"><span data-dcnode-id="3686" instrument_node="">immune system</span></a><span data-dcnode-id="3684" instrument_node=""> to fight the tumor. Contemporary methods for generating an immune response against tumours include intravesical </span><a class="mw-redirect" data-dcnode-id="3682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bacillus_Calmette-Gu%25C3%25A9rin" title="Bacillus Calmette-Guérin"><span data-dcnode-id="3683" instrument_node="">BCG</span></a><span data-dcnode-id="3681" instrument_node=""> immunotherapy for superficial bladder cancer, and use of </span><a data-dcnode-id="3679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Interferon" title="Interferon"><span data-dcnode-id="3680" instrument_node="">interferons</span></a><span data-dcnode-id="3678" instrument_node=""> and other </span><a data-dcnode-id="3676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cytokine" title="Cytokine"><span data-dcnode-id="3677" instrument_node="">cytokines</span></a><span data-dcnode-id="3675" instrument_node=""> to induce an immune response in </span><a data-dcnode-id="3673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Renal_cell_carcinoma" title="Renal cell carcinoma"><span data-dcnode-id="3674" instrument_node="">renal cell carcinoma</span></a><span data-dcnode-id="3672" instrument_node=""> and </span><a data-dcnode-id="3670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Melanoma" title="Melanoma"><span data-dcnode-id="3671" instrument_node="">melanoma</span></a><span data-dcnode-id="3669" instrument_node=""> patients. </span><a data-dcnode-id="3667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cancer_vaccine" title="Cancer vaccine"><span data-dcnode-id="3668" instrument_node="">Cancer vaccines</span></a><span data-dcnode-id="3666" instrument_node=""> to generate specific </span><a data-dcnode-id="3664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immune_response" title="Immune response"><span data-dcnode-id="3665" instrument_node="">immune responses</span></a><span data-dcnode-id="3663" instrument_node=""> are the subject of intensive research for a number of tumours, notably </span><a class="mw-redirect" data-dcnode-id="3661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malignant_melanoma" title="Malignant melanoma"><span data-dcnode-id="3662" instrument_node="">malignant melanoma</span></a><span data-dcnode-id="3660" instrument_node=""> and </span><a data-dcnode-id="3658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Renal_cell_carcinoma" title="Renal cell carcinoma"><span data-dcnode-id="3659" instrument_node="">renal cell carcinoma</span></a><span data-dcnode-id="3657" instrument_node="">. </span><a data-dcnode-id="3655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sipuleucel-T" title="Sipuleucel-T"><span data-dcnode-id="3656" instrument_node="">Sipuleucel-T</span></a><span data-dcnode-id="3654" instrument_node=""> is a vaccine-like strategy in late clinical trials for </span><a data-dcnode-id="3652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prostate_cancer" title="Prostate cancer"><span data-dcnode-id="3653" instrument_node="">prostate cancer</span></a><span data-dcnode-id="3651" instrument_node=""> in which </span><a data-dcnode-id="3649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dendritic_cell" title="Dendritic cell"><span data-dcnode-id="3650" instrument_node="">dendritic cells</span></a><span data-dcnode-id="3648" instrument_node=""> from the patient are loaded with </span><a data-dcnode-id="3646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prostatic_acid_phosphatase" title="Prostatic acid phosphatase"><span data-dcnode-id="3647" instrument_node="">prostatic acid phosphatase</span></a><span data-dcnode-id="3645" instrument_node=""> peptides to induce a specific immune response against prostate-derived cells.
</span></p><p data-dcnode-id="3636"><span data-dcnode-id="3643" instrument_node="">Allogeneic </span><a data-dcnode-id="3641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hematopoietic_stem_cell_transplantation" title="Hematopoietic stem cell transplantation"><span data-dcnode-id="3642" instrument_node="">hematopoietic stem cell transplantation</span></a><span data-dcnode-id="3640" instrument_node=""> ("bone marrow transplantation" from a genetically non-identical donor) can be considered a form of immunotherapy, since the donor's immune cells will often attack the tumor in a phenomenon known as </span><a data-dcnode-id="3638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hematopoietic_stem_cell_transplantation%23Side_effects_and_complications" title="Hematopoietic stem cell transplantation"><span data-dcnode-id="3639" instrument_node="">graft-versus-tumor effect</span></a><span data-dcnode-id="3637" instrument_node="">. For this reason, allogeneic HSCT leads to a higher cure rate than autologous transplantation for several cancer types, although the side effects are also more severe.
</span></p><p data-dcnode-id="3627"><span data-dcnode-id="3635" instrument_node="">The cell based immunotherapy in which the patients own Natural Killer cells(NK) and Cytotoxic T-Lymphocytes(CTL) are used has been in practice in Japan since 1990. NK cells and CTLs primarily kill the cancer cells when they are developed. This treatment is given together with the other modes of treatment such as surgery, radiotherapy or chemotherapy and called as Autologous Immune Enhancement Therapy (AIET).</span><sup class="reference" data-dcnode-id="3632" id="cite_ref-24"><a data-dcnode-id="3633" href="#cite_note-24"><span data-dcnode-id="3634" instrument_node="">[24]</span></a></sup><sup class="reference" data-dcnode-id="3629" id="cite_ref-25"><a data-dcnode-id="3630" href="#cite_note-25"><span data-dcnode-id="3631" instrument_node="">[25]</span></a></sup><span data-dcnode-id="3628" instrument_node="">
</span></p><p data-dcnode-id="3617"><span data-dcnode-id="3626" instrument_node="">Immune Checkpoint therapy focuses on two "checkpoint" proteins, cytotoxic T-lymphocyte–associated antigen 4 (CTLA-4) and programmed death 1 (PD-1). Under normal conditions, the immune system utilizes checkpoint proteins as negative feedback mechanisms to return to homeostasis once pathogens have been cleared from the body. In tumor microenvironment, cancer cells can commandeer this physiological regulatory system to "put a brake" on the anti-cancer immune response and evade immune surveillance.</span><sup class="reference" data-dcnode-id="3623" id="cite_ref-26"><a data-dcnode-id="3624" href="#cite_note-26"><span data-dcnode-id="3625" instrument_node="">[26]</span></a></sup><span data-dcnode-id="3622" instrument_node=""> 2018 Nobel Prize in medicine is awarded to Dr. James Allison of University of Texas MD Anderson Cancer Center in U.S. and Dr. Tasuku Honjo Kyoto University in Japan for their contributions in advance of PD-1 and CTLA-4 immune checkpoint therapy.</span><sup class="reference" data-dcnode-id="3619" id="cite_ref-27"><a data-dcnode-id="3620" href="#cite_note-27"><span data-dcnode-id="3621" instrument_node="">[27]</span></a></sup><span data-dcnode-id="3618" instrument_node="">
</span></p><span data-dcnode-id="3616" instrument_node="">
</span><h3 data-dcnode-id="3606"><span class="mw-headline" data-dcnode-id="3614" id="Hormonal_therapy"><span data-dcnode-id="3615" instrument_node="">Hormonal therapy</span></span><span class="mw-editsection" data-dcnode-id="3607"><span class="mw-editsection-bracket" data-dcnode-id="3612"><span data-dcnode-id="3613" instrument_node="">[</span></span><a data-dcnode-id="3610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTreatment_of_cancer%26action%3Dedit%26section%3D7" title="Edit section: Hormonal therapy"><span data-dcnode-id="3611" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3608"><span data-dcnode-id="3609" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3605" instrument_node="">
</span><link data-dcnode-id="3604" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3600" role="note"><span data-dcnode-id="3603" instrument_node="">Main article: </span><a data-dcnode-id="3601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hormonal_therapy_%28oncology%29" title="Hormonal therapy (oncology)"><span data-dcnode-id="3602" instrument_node="">Hormonal therapy (oncology)</span></a></div><span data-dcnode-id="3599" instrument_node="">
</span><p data-dcnode-id="3588"><span data-dcnode-id="3598" instrument_node="">The growth of some cancers can be inhibited by providing or blocking certain hormones. Common examples of hormone-sensitive tumors include certain types of breast and prostate cancers. Blocking </span><a data-dcnode-id="3596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Estrogen" title="Estrogen"><span data-dcnode-id="3597" instrument_node="">estrogen</span></a><span data-dcnode-id="3595" instrument_node=""> or </span><a data-dcnode-id="3593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Testosterone" title="Testosterone"><span data-dcnode-id="3594" instrument_node="">testosterone</span></a><span data-dcnode-id="3592" instrument_node=""> is often an important additional treatment. In certain cancers, administration of hormone agonists, such as </span><a data-dcnode-id="3590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Progestogen" title="Progestogen"><span data-dcnode-id="3591" instrument_node="">progestogens</span></a><span data-dcnode-id="3589" instrument_node=""> may be therapeutically beneficial.
</span></p><span data-dcnode-id="3587" instrument_node="">
</span><h3 data-dcnode-id="3577"><span class="mw-headline" data-dcnode-id="3585" id="Angiogenesis_inhibitors"><span data-dcnode-id="3586" instrument_node="">Angiogenesis inhibitors</span></span><span class="mw-editsection" data-dcnode-id="3578"><span class="mw-editsection-bracket" data-dcnode-id="3583"><span data-dcnode-id="3584" instrument_node="">[</span></span><a data-dcnode-id="3581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTreatment_of_cancer%26action%3Dedit%26section%3D8" title="Edit section: Angiogenesis inhibitors"><span data-dcnode-id="3582" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3579"><span data-dcnode-id="3580" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3576" instrument_node="">
</span><link data-dcnode-id="3575" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3571" role="note"><span data-dcnode-id="3574" instrument_node="">Main article: </span><a data-dcnode-id="3572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Angiogenesis_inhibitor" title="Angiogenesis inhibitor"><span data-dcnode-id="3573" instrument_node="">Angiogenesis inhibitor</span></a></div><span data-dcnode-id="3570" instrument_node="">
</span><p data-dcnode-id="3555"><span data-dcnode-id="3569" instrument_node="">Angiogenesis inhibitors prevent the extensive growth of blood vessels (</span><a data-dcnode-id="3567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Angiogenesis" title="Angiogenesis"><span data-dcnode-id="3568" instrument_node="">angiogenesis</span></a><span data-dcnode-id="3566" instrument_node="">) that tumors require to survive. Some, such as </span><a data-dcnode-id="3564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bevacizumab" title="Bevacizumab"><span data-dcnode-id="3565" instrument_node="">bevacizumab</span></a><span data-dcnode-id="3563" instrument_node="">, have been approved and are in clinical use. One of the main problems with anti-angiogenesis drugs is that many factors stimulate blood vessel growth in cells normal or cancerous. Anti-angiogenesis drugs only target one factor, so the other factors continue to stimulate blood vessel growth. Other problems include </span><a data-dcnode-id="3561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Route_of_administration" title="Route of administration"><span data-dcnode-id="3562" instrument_node="">route of administration</span></a><span data-dcnode-id="3560" instrument_node="">, maintenance of stability and activity and targeting at the tumor vasculature.</span><sup class="reference" data-dcnode-id="3557" id="cite_ref-28"><a data-dcnode-id="3558" href="#cite_note-28"><span data-dcnode-id="3559" instrument_node="">[28]</span></a></sup><span data-dcnode-id="3556" instrument_node="">
</span></p><span data-dcnode-id="3554" instrument_node="">
</span><h3 data-dcnode-id="3544"><span class="mw-headline" data-dcnode-id="3552" id="Exercise_prescription"><span data-dcnode-id="3553" instrument_node="">Exercise prescription</span></span><span class="mw-editsection" data-dcnode-id="3545"><span class="mw-editsection-bracket" data-dcnode-id="3550"><span data-dcnode-id="3551" instrument_node="">[</span></span><a data-dcnode-id="3548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTreatment_of_cancer%26action%3Dedit%26section%3D9" title="Edit section: Exercise prescription"><span data-dcnode-id="3549" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3546"><span data-dcnode-id="3547" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3543" instrument_node="">
</span><link data-dcnode-id="3542" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3538" role="note"><span data-dcnode-id="3541" instrument_node="">Main article: </span><a data-dcnode-id="3539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exercise_prescription" title="Exercise prescription"><span data-dcnode-id="3540" instrument_node="">Exercise prescription</span></a></div><span data-dcnode-id="3537" instrument_node="">
</span><p data-dcnode-id="3510"><span data-dcnode-id="3536" instrument_node="">Exercise prescription is becoming a mainstream adjunct treatment for cancer,</span><sup class="reference" data-dcnode-id="3533" id="cite_ref-29"><a data-dcnode-id="3534" href="#cite_note-29"><span data-dcnode-id="3535" instrument_node="">[29]</span></a></sup><span data-dcnode-id="3532" instrument_node=""> based on studies which show that exercise (compared to no exercise) is associated with reduced recurrence rates, improved mortality outcomes, reduction of side effects from traditional cancer treatments.</span><sup class="reference" data-dcnode-id="3529" id="cite_ref-30"><a data-dcnode-id="3530" href="#cite_note-30"><span data-dcnode-id="3531" instrument_node="">[30]</span></a></sup><sup class="reference" data-dcnode-id="3526" id="cite_ref-31"><a data-dcnode-id="3527" href="#cite_note-31"><span data-dcnode-id="3528" instrument_node="">[31]</span></a></sup><span data-dcnode-id="3525" instrument_node=""> Although it is uncertain whether improved outcomes with exercise are correlated or causative, the benefit-risk ratio of including exercise as part of cancer treatment is large,</span><sup class="reference" data-dcnode-id="3522" id="cite_ref-32"><a data-dcnode-id="3523" href="#cite_note-32"><span data-dcnode-id="3524" instrument_node="">[32]</span></a></sup><span data-dcnode-id="3521" instrument_node=""> as exercise has further benefits (e.g. cardiovascular, mental health) without major risks, although there is a small risk of overuse injury if added too aggressively.</span><sup class="reference" data-dcnode-id="3518" id="cite_ref-33"><a data-dcnode-id="3519" href="#cite_note-33"><span data-dcnode-id="3520" instrument_node="">[33]</span></a></sup><span data-dcnode-id="3517" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="3515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exercise_Physiologist" title="Exercise Physiologist"><span data-dcnode-id="3516" instrument_node="">Exercise physiologists</span></a><span data-dcnode-id="3514" instrument_node=""> and </span><a data-dcnode-id="3512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exercise_medicine" title="Exercise medicine"><span data-dcnode-id="3513" instrument_node="">exercise medicine</span></a><span data-dcnode-id="3511" instrument_node=""> specialists can assist oncologists and primary care practitioners with exercise prescription in cancer patients.
</span></p><span data-dcnode-id="3509" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3500"><div class="thumbinner" data-dcnode-id="3501" style="width:222px;"><a class="image" data-dcnode-id="3507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWalkingexercise.jpg"><img alt="" class="thumbimage" data-dcnode-id="3508" data-file-height="3024" data-file-width="4032" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/a1/Walkingexercise.jpg/220px-Walkingexercise.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/a1/Walkingexercise.jpg/330px-Walkingexercise.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/a1/Walkingexercise.jpg/440px-Walkingexercise.jpg 2x" width="220"></a><span data-dcnode-id="3506" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3502"><div class="magnify" data-dcnode-id="3504"><a class="internal" data-dcnode-id="3505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWalkingexercise.jpg" title="Enlarge"></a></div><span data-dcnode-id="3503" instrument_node="">Walking is usually an excellent exercise option as an adjunct cancer treatment</span></div></div></div><span data-dcnode-id="3499" instrument_node="">
</span><h3 data-dcnode-id="3489"><span class="mw-headline" data-dcnode-id="3497" id="Synthetic_lethality"><span data-dcnode-id="3498" instrument_node="">Synthetic lethality</span></span><span class="mw-editsection" data-dcnode-id="3490"><span class="mw-editsection-bracket" data-dcnode-id="3495"><span data-dcnode-id="3496" instrument_node="">[</span></span><a data-dcnode-id="3493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTreatment_of_cancer%26action%3Dedit%26section%3D10" title="Edit section: Synthetic lethality"><span data-dcnode-id="3494" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3491"><span data-dcnode-id="3492" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3488" instrument_node="">
</span><link data-dcnode-id="3487" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3483" role="note"><span data-dcnode-id="3486" instrument_node="">Main article: </span><a data-dcnode-id="3484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Synthetic_lethality" title="Synthetic lethality"><span data-dcnode-id="3485" instrument_node="">Synthetic lethality</span></a></div><span data-dcnode-id="3482" instrument_node="">
</span><p data-dcnode-id="3478"><a data-dcnode-id="3480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Synthetic_lethality" title="Synthetic lethality"><span data-dcnode-id="3481" instrument_node="">Synthetic lethality</span></a><span data-dcnode-id="3479" instrument_node=""> arises when a combination of deficiencies in the expression of two or more genes leads to cell death, whereas a deficiency in only one of these genes does not. The deficiencies can arise through mutations, epigenetic alterations or inhibitors of one or both of the genes.
</span></p><p data-dcnode-id="3460"><span data-dcnode-id="3477" instrument_node="">Cancer cells are frequently deficient in a DNA repair gene.</span><sup class="reference" data-dcnode-id="3474" id="cite_ref-pmid16896009_34-0"><a data-dcnode-id="3475" href="#cite_note-pmid16896009-34"><span data-dcnode-id="3476" instrument_node="">[34]</span></a></sup><sup class="reference" data-dcnode-id="3471" id="cite_ref-pmid21441464_35-0"><a data-dcnode-id="3472" href="#cite_note-pmid21441464-35"><span data-dcnode-id="3473" instrument_node="">[35]</span></a></sup><span data-dcnode-id="3470" instrument_node=""> (Also see </span><a data-dcnode-id="3468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malignant_transformation%23DNA_repair_gene_silencing" title="Malignant transformation"><span data-dcnode-id="3469" instrument_node="">DNA repair deficiency in cancer</span></a><span data-dcnode-id="3467" instrument_node="">.) This DNA repair defect either may be due to mutation or, often, epigenetic silencing (see </span><a data-dcnode-id="3465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cancer_epigenetics%23Frequencies_of_epimutations_in_DNA_repair_genes" title="Cancer epigenetics"><span data-dcnode-id="3466" instrument_node="">epigenetic silencing of DNA repair</span></a><span data-dcnode-id="3464" instrument_node="">). If this DNA repair defect is in one of seven DNA repair pathways (see </span><a data-dcnode-id="3462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cancer_epigenetics%23DNA_repair_pathways" title="Cancer epigenetics"><span data-dcnode-id="3463" instrument_node="">DNA repair pathways</span></a><span data-dcnode-id="3461" instrument_node="">), and a compensating DNA repair pathway is inhibited, then the tumor cells may be killed by synthetic lethality. Non-tumorous cells, with the initial pathway intact, can survive.
</span></p><span data-dcnode-id="3459" instrument_node="">
</span><h4 data-dcnode-id="3449"><span class="mw-headline" data-dcnode-id="3457" id="Ovarian_cancer"><span data-dcnode-id="3458" instrument_node="">Ovarian cancer</span></span><span class="mw-editsection" data-dcnode-id="3450"><span class="mw-editsection-bracket" data-dcnode-id="3455"><span data-dcnode-id="3456" instrument_node="">[</span></span><a data-dcnode-id="3453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTreatment_of_cancer%26action%3Dedit%26section%3D11" title="Edit section: Ovarian cancer"><span data-dcnode-id="3454" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3451"><span data-dcnode-id="3452" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3448" instrument_node="">
</span><p data-dcnode-id="3418"><span data-dcnode-id="3447" instrument_node="">Mutations in DNA repair genes </span><i data-dcnode-id="3444"><a data-dcnode-id="3445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/BRCA1" title="BRCA1"><span data-dcnode-id="3446" instrument_node="">BRCA1</span></a></i><span data-dcnode-id="3443" instrument_node=""> or </span><i data-dcnode-id="3440"><a data-dcnode-id="3441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/BRCA2" title="BRCA2"><span data-dcnode-id="3442" instrument_node="">BRCA2</span></a></i><span data-dcnode-id="3439" instrument_node=""> (active in </span><a data-dcnode-id="3437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Homologous_recombination" title="Homologous recombination"><span data-dcnode-id="3438" instrument_node="">homologous recombinational</span></a><span data-dcnode-id="3436" instrument_node=""> repair) are synthetically lethal with inhibition of DNA repair gene </span><i data-dcnode-id="3433"><a data-dcnode-id="3434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/PARP1" title="PARP1"><span data-dcnode-id="3435" instrument_node="">PARP1</span></a></i><span data-dcnode-id="3432" instrument_node=""> (active in the </span><a data-dcnode-id="3430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Base_excision_repair" title="Base excision repair"><span data-dcnode-id="3431" instrument_node="">base excision repair</span></a><span data-dcnode-id="3429" instrument_node=""> and in the </span><a data-dcnode-id="3427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Microhomology-mediated_end_joining" title="Microhomology-mediated end joining"><span data-dcnode-id="3428" instrument_node="">microhomology-mediated end joining</span></a><span data-dcnode-id="3426" instrument_node=""> pathways of DNA repair).</span><sup class="reference" data-dcnode-id="3423" id="cite_ref-pmid24882434_36-0"><a data-dcnode-id="3424" href="#cite_note-pmid24882434-36"><span data-dcnode-id="3425" instrument_node="">[36]</span></a></sup><sup class="reference" data-dcnode-id="3420" id="cite_ref-pmid27498558_37-0"><a data-dcnode-id="3421" href="#cite_note-pmid27498558-37"><span data-dcnode-id="3422" instrument_node="">[37]</span></a></sup><span data-dcnode-id="3419" instrument_node="">
