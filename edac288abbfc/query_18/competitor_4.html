</span></p><p data-dcnode-id="3386"><span data-dcnode-id="3417" instrument_node="">Ovarian cancers have a mutational defect in </span><a data-dcnode-id="3414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/BRCA1%23Mutation_of_BRCA1_in_breast_and_ovarian_cancer" title="BRCA1"><i data-dcnode-id="3415"><span data-dcnode-id="3416" instrument_node="">BRCA1</span></i></a><span data-dcnode-id="3413" instrument_node=""> in about 18% of patients (13% germline mutations and 5% somatic mutations) (see </span><a data-dcnode-id="3411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/BRCA1" title="BRCA1"><span data-dcnode-id="3412" instrument_node="">BRCA1</span></a><span data-dcnode-id="3410" instrument_node="">). </span><a data-dcnode-id="3408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Olaparib" title="Olaparib"><span data-dcnode-id="3409" instrument_node="">Olaparib</span></a><span data-dcnode-id="3407" instrument_node="">, a </span><a data-dcnode-id="3405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/PARP_inhibitor" title="PARP inhibitor"><span data-dcnode-id="3406" instrument_node="">PARP inhibitor</span></a><span data-dcnode-id="3404" instrument_node="">, was approved in 2014 by the </span><a class="mw-redirect" data-dcnode-id="3402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/US_FDA" title="US FDA"><span data-dcnode-id="3403" instrument_node="">US FDA</span></a><span data-dcnode-id="3401" instrument_node=""> for use in BRCA-associated ovarian cancer that had previously been treated with chemotherapy.</span><sup class="reference" data-dcnode-id="3398" id="cite_ref-38"><a data-dcnode-id="3399" href="#cite_note-38"><span data-dcnode-id="3400" instrument_node="">[38]</span></a></sup><span data-dcnode-id="3397" instrument_node=""> The FDA, in 2016, also approved the PARP inhibitor rucaparib to treat women with advanced ovarian cancer who have already been treated with at least two chemotherapies and have a </span><i data-dcnode-id="3395"><span data-dcnode-id="3396" instrument_node="">BRCA1</span></i><span data-dcnode-id="3394" instrument_node=""> or </span><i data-dcnode-id="3392"><span data-dcnode-id="3393" instrument_node="">BRCA2</span></i><span data-dcnode-id="3391" instrument_node=""> gene mutation.</span><sup class="reference" data-dcnode-id="3388" id="cite_ref-39"><a data-dcnode-id="3389" href="#cite_note-39"><span data-dcnode-id="3390" instrument_node="">[39]</span></a></sup><span data-dcnode-id="3387" instrument_node="">
</span></p><span data-dcnode-id="3385" instrument_node="">
</span><h4 data-dcnode-id="3375"><span class="mw-headline" data-dcnode-id="3383" id="Colon_cancer"><span data-dcnode-id="3384" instrument_node="">Colon cancer</span></span><span class="mw-editsection" data-dcnode-id="3376"><span class="mw-editsection-bracket" data-dcnode-id="3381"><span data-dcnode-id="3382" instrument_node="">[</span></span><a data-dcnode-id="3379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTreatment_of_cancer%26action%3Dedit%26section%3D12" title="Edit section: Colon cancer"><span data-dcnode-id="3380" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3377"><span data-dcnode-id="3378" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3374" instrument_node="">
</span><p data-dcnode-id="3314"><span data-dcnode-id="3373" instrument_node="">In colon cancer, epigenetic defects in the </span><i data-dcnode-id="3370"><a class="mw-redirect" data-dcnode-id="3371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Werner_syndrome_ATP-dependent_helicase" title="Werner syndrome ATP-dependent helicase"><span data-dcnode-id="3372" instrument_node="">WRN</span></a></i><span data-dcnode-id="3369" instrument_node=""> gene appear to be synthetically lethal with inactivation of </span><i data-dcnode-id="3366"><a data-dcnode-id="3367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/TOP1" title="TOP1"><span data-dcnode-id="3368" instrument_node="">TOP1</span></a></i><span data-dcnode-id="3365" instrument_node="">. In particular, </span><a data-dcnode-id="3363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Irinotecan" title="Irinotecan"><span data-dcnode-id="3364" instrument_node="">irinotecan</span></a><span data-dcnode-id="3362" instrument_node=""> inactivation of </span><i data-dcnode-id="3359"><a data-dcnode-id="3360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/TOP1" title="TOP1"><span data-dcnode-id="3361" instrument_node="">TOP1</span></a></i><span data-dcnode-id="3358" instrument_node=""> was synthetically lethal with deficient expression of the DNA repair </span><a class="mw-redirect" data-dcnode-id="3355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Werner_syndrome_ATP-dependent_helicase" title="Werner syndrome ATP-dependent helicase"><i data-dcnode-id="3356"><span data-dcnode-id="3357" instrument_node="">WRN</span></i></a><span data-dcnode-id="3354" instrument_node=""> gene in patients with colon cancer.</span><sup class="reference" data-dcnode-id="3351" id="cite_ref-Agrelo_40-0"><a data-dcnode-id="3352" href="#cite_note-Agrelo-40"><span data-dcnode-id="3353" instrument_node="">[40]</span></a></sup><span data-dcnode-id="3350" instrument_node=""> In a 2006 study, 45 patients had colonic tumors with </span><a data-dcnode-id="3348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/DNA_methylation" title="DNA methylation"><span data-dcnode-id="3349" instrument_node="">hypermethylated</span></a><span data-dcnode-id="3347" instrument_node=""> </span><i data-dcnode-id="3345"><span data-dcnode-id="3346" instrument_node="">WRN</span></i><span data-dcnode-id="3344" instrument_node=""> gene </span><a data-dcnode-id="3342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Promoter_%28genetics%29" title="Promoter (genetics)"><span data-dcnode-id="3343" instrument_node="">promoters</span></a><span data-dcnode-id="3341" instrument_node=""> (silenced </span><i data-dcnode-id="3339"><span data-dcnode-id="3340" instrument_node="">WRN</span></i><span data-dcnode-id="3338" instrument_node=""> expression), and 43 patients had tumors with unmethylated </span><i data-dcnode-id="3336"><span data-dcnode-id="3337" instrument_node="">WRN</span></i><span data-dcnode-id="3335" instrument_node=""> gene promoters, so that WRN protein expression was high.</span><sup class="reference" data-dcnode-id="3332" id="cite_ref-Agrelo_40-1"><a data-dcnode-id="3333" href="#cite_note-Agrelo-40"><span data-dcnode-id="3334" instrument_node="">[40]</span></a></sup><span data-dcnode-id="3331" instrument_node=""> Irinotecan was more strongly beneficial for patients with hypermethylated </span><i data-dcnode-id="3329"><span data-dcnode-id="3330" instrument_node="">WRN</span></i><span data-dcnode-id="3328" instrument_node=""> promoters (39.4 months survival) than for those with unmethylated </span><i data-dcnode-id="3326"><span data-dcnode-id="3327" instrument_node="">WRN</span></i><span data-dcnode-id="3325" instrument_node=""> promoters (20.7 months survival). The </span><i data-dcnode-id="3323"><span data-dcnode-id="3324" instrument_node="">WRN</span></i><span data-dcnode-id="3322" instrument_node=""> gene promoter is hypermethylated in about 38% of </span><a data-dcnode-id="3320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colorectal_cancer" title="Colorectal cancer"><span data-dcnode-id="3321" instrument_node="">colorectal cancers</span></a><span data-dcnode-id="3319" instrument_node="">.</span><sup class="reference" data-dcnode-id="3316" id="cite_ref-Agrelo_40-2"><a data-dcnode-id="3317" href="#cite_note-Agrelo-40"><span data-dcnode-id="3318" instrument_node="">[40]</span></a></sup><span data-dcnode-id="3315" instrument_node="">
</span></p><p data-dcnode-id="3312"><span data-dcnode-id="3313" instrument_node="">There are five different stages of colon cancer, and these five stages all have treatment:
</span></p><span data-dcnode-id="3311" instrument_node="">
</span><ul data-dcnode-id="3288"><li data-dcnode-id="3305"><span data-dcnode-id="3310" instrument_node="">Stage 0, is where the patient is required to undergo surgery to remove the polyp (American Cancer Society</span><sup class="reference" data-dcnode-id="3307" id="cite_ref-cancer.org_41-0"><a data-dcnode-id="3308" href="#cite_note-cancer.org-41"><span data-dcnode-id="3309" instrument_node="">[41]</span></a></sup><span data-dcnode-id="3306" instrument_node="">).</span></li><span data-dcnode-id="3304" instrument_node="">
</span><li data-dcnode-id="3302"><span data-dcnode-id="3303" instrument_node="">Stage 1, depending on the location of the cancer in the colon and lymph nodes, the patient undergoes surgery just like Stage 0.</span></li><span data-dcnode-id="3301" instrument_node="">
</span><li data-dcnode-id="3299"><span data-dcnode-id="3300" instrument_node="">Stage 2 patients undergoes removing nearby lymph nodes, but depending on what the doctor says, the patent might have to undergo chemotherapy after surgery (if the cancer is at higher risk of coming back).</span></li><span data-dcnode-id="3298" instrument_node="">
</span><li data-dcnode-id="3292"><span data-dcnode-id="3297" instrument_node="">Stage 3, is where the cancer has spread all throughout the lymph nodes but not yet to other organs or body parts. When getting to this stage, Surgery is conducted on the colon and lymph nodes, then the doctor orders Chemotherapy (FOLFOX or CapeOx) to treat the colon cancer in the location needed (American Cancer Society</span><sup class="reference" data-dcnode-id="3294" id="cite_ref-cancer.org_41-1"><a data-dcnode-id="3295" href="#cite_note-cancer.org-41"><span data-dcnode-id="3296" instrument_node="">[41]</span></a></sup><span data-dcnode-id="3293" instrument_node="">). The last a patient can get is Stage 4.</span></li><span data-dcnode-id="3291" instrument_node="">
</span><li data-dcnode-id="3289"><span data-dcnode-id="3290" instrument_node="">Stage 4 patients only undergo surgery if it is for the prevention of the cancer, along with pain relief. If the pain continues with these two options, the doctor might recommended radiation therapy. The main treatment strategy is chemotherapy due to how aggressive the cancer becomes in this stage, not only to the colon but to the lymph nodes.</span></li></ul><span data-dcnode-id="3287" instrument_node="">
</span><h2 data-dcnode-id="3277"><span class="mw-headline" data-dcnode-id="3285" id="Cancer_pain_management"><span data-dcnode-id="3286" instrument_node="">Cancer pain management</span></span><span class="mw-editsection" data-dcnode-id="3278"><span class="mw-editsection-bracket" data-dcnode-id="3283"><span data-dcnode-id="3284" instrument_node="">[</span></span><a data-dcnode-id="3281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTreatment_of_cancer%26action%3Dedit%26section%3D13" title="Edit section: Cancer pain management"><span data-dcnode-id="3282" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3279"><span data-dcnode-id="3280" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3276" instrument_node="">
</span><link data-dcnode-id="3275" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3271" role="note"><span data-dcnode-id="3274" instrument_node="">Main article: </span><a data-dcnode-id="3272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cancer_pain" title="Cancer pain"><span data-dcnode-id="3273" instrument_node="">Cancer pain</span></a></div><span data-dcnode-id="3270" instrument_node="">
</span><h2 data-dcnode-id="3260"><span class="mw-headline" data-dcnode-id="3268" id="Symptom_control_and_palliative_care"><span data-dcnode-id="3269" instrument_node="">Symptom control and palliative care</span></span><span class="mw-editsection" data-dcnode-id="3261"><span class="mw-editsection-bracket" data-dcnode-id="3266"><span data-dcnode-id="3267" instrument_node="">[</span></span><a data-dcnode-id="3264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTreatment_of_cancer%26action%3Dedit%26section%3D14" title="Edit section: Symptom control and palliative care"><span data-dcnode-id="3265" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3262"><span data-dcnode-id="3263" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3259" instrument_node="">
</span><p data-dcnode-id="3248"><span data-dcnode-id="3258" instrument_node="">Although the control of the symptoms of cancer is not typically thought of as a treatment directed at the cancer, it is an important determinant of the </span><a data-dcnode-id="3256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quality_of_life" title="Quality of life"><span data-dcnode-id="3257" instrument_node="">quality of life</span></a><span data-dcnode-id="3255" instrument_node=""> of cancer patients, and plays an important role in the decision whether the patient is able to undergo other treatments. Although doctors generally have the therapeutic skills to reduce pain, </span><a data-dcnode-id="3253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chemotherapy-induced_nausea_and_vomiting" title="Chemotherapy-induced nausea and vomiting"><span data-dcnode-id="3254" instrument_node="">chemotherapy-induced nausea and vomiting</span></a><span data-dcnode-id="3252" instrument_node="">, diarrhea, hemorrhage and other common problems in cancer patients, the multidisciplinary specialty of </span><a data-dcnode-id="3250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Palliative_care" title="Palliative care"><span data-dcnode-id="3251" instrument_node="">palliative care</span></a><span data-dcnode-id="3249" instrument_node=""> has arisen specifically in response to the symptom control needs of this group of patients.
</span></p><p data-dcnode-id="3226"><a class="mw-redirect" data-dcnode-id="3246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Analgesia" title="Analgesia"><span data-dcnode-id="3247" instrument_node="">Pain medication</span></a><span data-dcnode-id="3245" instrument_node="">, such as </span><a data-dcnode-id="3243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Morphine" title="Morphine"><span data-dcnode-id="3244" instrument_node="">morphine</span></a><span data-dcnode-id="3242" instrument_node=""> and </span><a data-dcnode-id="3240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oxycodone" title="Oxycodone"><span data-dcnode-id="3241" instrument_node="">oxycodone</span></a><span data-dcnode-id="3239" instrument_node="">, and </span><a data-dcnode-id="3237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antiemetic" title="Antiemetic"><span data-dcnode-id="3238" instrument_node="">antiemetics</span></a><span data-dcnode-id="3236" instrument_node="">, drugs to suppress nausea and vomiting, are very commonly used in patients with cancer-related symptoms. Improved </span><a class="mw-redirect" data-dcnode-id="3234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antiemetics" title="Antiemetics"><span data-dcnode-id="3235" instrument_node="">antiemetics</span></a><span data-dcnode-id="3233" instrument_node=""> such as </span><a data-dcnode-id="3231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ondansetron" title="Ondansetron"><span data-dcnode-id="3232" instrument_node="">ondansetron</span></a><span data-dcnode-id="3230" instrument_node=""> and analogues, as well as </span><a data-dcnode-id="3228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aprepitant" title="Aprepitant"><span data-dcnode-id="3229" instrument_node="">aprepitant</span></a><span data-dcnode-id="3227" instrument_node=""> have made aggressive treatments much more feasible in cancer patients.
</span></p><p data-dcnode-id="3216"><a data-dcnode-id="3224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cancer_pain" title="Cancer pain"><span data-dcnode-id="3225" instrument_node="">Cancer pain</span></a><span data-dcnode-id="3223" instrument_node=""> can be associated with continuing tissue damage due to the disease process or the treatment (i.e. surgery, radiation, chemotherapy). Although there is always a role for environmental factors and affective disturbances in the genesis of pain behaviors, these are not usually the predominant etiologic factors in patients with cancer pain. Some patients with severe pain associated with cancer are nearing the end of their lives, but in all cases </span><a class="mw-redirect" data-dcnode-id="3221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Palliative" title="Palliative"><span data-dcnode-id="3222" instrument_node="">palliative</span></a><span data-dcnode-id="3220" instrument_node=""> therapies should be used to control the pain. Issues such as social stigma of using </span><a class="mw-redirect" data-dcnode-id="3218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Opioids" title="Opioids"><span data-dcnode-id="3219" instrument_node="">opioids</span></a><span data-dcnode-id="3217" instrument_node="">, work and functional status, and health care consumption can be concerns and may need to be addressed in order for the person to feel comfortable taking the medications required to control his or her symptoms. The typical strategy for cancer pain management is to get the patient as comfortable as possible using the least amount of medications possible but opioids, surgery, and physical measures are often required.
</span></p><p data-dcnode-id="3201"><span data-dcnode-id="3215" instrument_node="">Historically, doctors were reluctant to prescribe narcotics to terminal cancer patients due to addiction and respiratory function suppression.  The </span><a data-dcnode-id="3213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Palliative_care" title="Palliative care"><span data-dcnode-id="3214" instrument_node="">palliative care</span></a><span data-dcnode-id="3212" instrument_node=""> movement, a more recent offshoot of the </span><a data-dcnode-id="3210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hospice" title="Hospice"><span data-dcnode-id="3211" instrument_node="">hospice</span></a><span data-dcnode-id="3209" instrument_node=""> movement, has engendered more widespread support for preemptive pain treatment for cancer patients. The </span><a data-dcnode-id="3207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Health_Organization" title="World Health Organization"><span data-dcnode-id="3208" instrument_node="">World Health Organization</span></a><span data-dcnode-id="3206" instrument_node=""> also noted uncontrolled cancer pain as a worldwide problem and established a "ladder" as a guideline for how practitioners should treat pain in patients who have cancer</span><sup class="reference" data-dcnode-id="3203" id="cite_ref-42"><a data-dcnode-id="3204" href="#cite_note-42"><span data-dcnode-id="3205" instrument_node="">[42]</span></a></sup><span data-dcnode-id="3202" instrument_node="">
</span></p><p data-dcnode-id="3197"><a data-dcnode-id="3199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cancer-related_fatigue" title="Cancer-related fatigue"><span data-dcnode-id="3200" instrument_node="">Cancer-related fatigue</span></a><span data-dcnode-id="3198" instrument_node=""> is a very common problem for cancer patients, and has only recently become important enough for oncologists to suggest treatment, even though it plays a significant role in many patients' quality of life.
</span></p><span data-dcnode-id="3196" instrument_node="">
</span><h3 data-dcnode-id="3186"><span class="mw-headline" data-dcnode-id="3194" id="Hospice_in_cancer"><span data-dcnode-id="3195" instrument_node="">Hospice in cancer</span></span><span class="mw-editsection" data-dcnode-id="3187"><span class="mw-editsection-bracket" data-dcnode-id="3192"><span data-dcnode-id="3193" instrument_node="">[</span></span><a data-dcnode-id="3190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTreatment_of_cancer%26action%3Dedit%26section%3D15" title="Edit section: Hospice in cancer"><span data-dcnode-id="3191" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3185" instrument_node="">
</span><p data-dcnode-id="3175"><a data-dcnode-id="3183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hospice" title="Hospice"><span data-dcnode-id="3184" instrument_node="">Hospice</span></a><span data-dcnode-id="3182" instrument_node=""> is a group that provides care at the home of a person that has an advanced illness with a likely prognosis of less than 6 months. As most treatments for cancer involve significant unpleasant side effects, a patient with little realistic hope of a cure or prolonged life may choose to seek comfort care only, forgoing more radical therapies in exchange for a prolonged period of normal living. This is an especially important aspect of care for those patients whose disease is not a good candidate for other forms of treatment. In these patients, the risks related to the </span><a data-dcnode-id="3180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chemotherapy" title="Chemotherapy"><span data-dcnode-id="3181" instrument_node="">chemotherapy</span></a><span data-dcnode-id="3179" instrument_node=""> may actually be higher than the chance of responding to the treatment, making further attempts to cure the disease impossible. Of note, patients on hospice can sometimes still get treatments such as </span><a data-dcnode-id="3177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radiation" title="Radiation"><span data-dcnode-id="3178" instrument_node="">radiation</span></a><span data-dcnode-id="3176" instrument_node=""> therapy if it is being used to treat symptoms, not as an attempt to cure the cancer.
</span></p><span data-dcnode-id="3174" instrument_node="">
</span><h2 data-dcnode-id="3164"><span class="mw-headline" data-dcnode-id="3172" id="Research"><span data-dcnode-id="3173" instrument_node="">Research</span></span><span class="mw-editsection" data-dcnode-id="3165"><span class="mw-editsection-bracket" data-dcnode-id="3170"><span data-dcnode-id="3171" instrument_node="">[</span></span><a data-dcnode-id="3168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTreatment_of_cancer%26action%3Dedit%26section%3D16" title="Edit section: Research"><span data-dcnode-id="3169" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3166"><span data-dcnode-id="3167" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3163" instrument_node="">
</span><link data-dcnode-id="3162" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3158" role="note"><span data-dcnode-id="3161" instrument_node="">Main article: </span><a data-dcnode-id="3159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Experimental_cancer_treatment" title="Experimental cancer treatment"><span data-dcnode-id="3160" instrument_node="">Experimental cancer treatment</span></a></div><span data-dcnode-id="3157" instrument_node="">
</span><p data-dcnode-id="3150"><a data-dcnode-id="3155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Clinical_trial" title="Clinical trial"><span data-dcnode-id="3156" instrument_node="">Clinical trials</span></a><span data-dcnode-id="3154" instrument_node="">, also called research studies, test new treatments in people with cancer. The goal of this research is to find better ways to treat cancer and help cancer patients. Clinical trials test many types of treatment such as new drugs, new approaches to surgery or radiation therapy, new combinations of treatments, or new methods such as </span><a data-dcnode-id="3152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gene_therapy" title="Gene therapy"><span data-dcnode-id="3153" instrument_node="">gene therapy</span></a><span data-dcnode-id="3151" instrument_node="">.
</span></p><p data-dcnode-id="3148"><span data-dcnode-id="3149" instrument_node="">A clinical trial is one of the final stages of a long and careful cancer research process. The search for new treatments begins in the laboratory, where scientists first develop and test new ideas. If an approach seems promising, the next step may be testing a treatment in animals to see how it affects cancer in a living being and whether it has harmful effects. Of course, treatments that work well in the lab or in animals do not always work well in people. Studies are done with cancer patients to find out whether promising treatments are safe and effective.
</span></p><p data-dcnode-id="3142"><span data-dcnode-id="3147" instrument_node="">Patients who take part may be helped personally by the treatment they receive. They get up-to-date care from cancer experts, and they receive either a new treatment being tested or the best available standard treatment for their cancer. At the same time, new treatments also may have unknown risks, but if a new treatment proves effective or more effective than standard treatment, study patients who receive it may be among the first to benefit. There is no guarantee that a new treatment being tested or a standard treatment will produce good results. In children with cancer, a survey of trials found that those enrolled in trials were on average not more likely to do better or worse than those on standard treatment; this confirms that success or failure of an experimental treatment cannot be predicted.</span><sup class="reference" data-dcnode-id="3144" id="cite_ref-43"><a data-dcnode-id="3145" href="#cite_note-43"><span data-dcnode-id="3146" instrument_node="">[43]</span></a></sup><span data-dcnode-id="3143" instrument_node="">
</span></p><span data-dcnode-id="3141" instrument_node="">
</span><h3 data-dcnode-id="3131"><span class="mw-headline" data-dcnode-id="3139" id="Exosome_research"><span data-dcnode-id="3140" instrument_node="">Exosome research</span></span><span class="mw-editsection" data-dcnode-id="3132"><span class="mw-editsection-bracket" data-dcnode-id="3137"><span data-dcnode-id="3138" instrument_node="">[</span></span><a data-dcnode-id="3135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTreatment_of_cancer%26action%3Dedit%26section%3D17" title="Edit section: Exosome research"><span data-dcnode-id="3136" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3133"><span data-dcnode-id="3134" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3130" instrument_node="">
</span><p data-dcnode-id="3112"><a data-dcnode-id="3128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exosome_%28vesicle%29" title="Exosome (vesicle)"><span data-dcnode-id="3129" instrument_node="">Exosomes</span></a><span data-dcnode-id="3127" instrument_node=""> are lipid-covered microvesicles shed by solid tumors into bodily fluids, such as blood and urine. Current research is being done attempting to use exosomes as a detection and monitoring method for a variety of cancers.</span><sup class="reference" data-dcnode-id="3124" id="cite_ref-44"><a data-dcnode-id="3125" href="#cite_note-44"><span data-dcnode-id="3126" instrument_node="">[44]</span></a></sup><sup class="reference" data-dcnode-id="3121" id="cite_ref-45"><a data-dcnode-id="3122" href="#cite_note-45"><span data-dcnode-id="3123" instrument_node="">[45]</span></a></sup><span data-dcnode-id="3120" instrument_node=""> The hope is to be able to detect cancer with a high sensitivity and specificity via detection of specific exosomes in the blood or urine. The same process can also be used to more accurately monitor a patient's treatment progress. Enzyme linked lectin specific assay or </span><a class="external text" data-dcnode-id="3118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//aethlonmedical.investorroom.com/index.php%3Fs%3D43%26item%3D49" rel="nofollow"><span data-dcnode-id="3119" instrument_node="">ELLSA</span></a><span data-dcnode-id="3117" instrument_node=""> has been proven to directly detect melanoma derived exosomes from fluid samples.</span><sup class="reference" data-dcnode-id="3114" id="cite_ref-aethlonmedical.investorroom_46-0"><a data-dcnode-id="3115" href="#cite_note-aethlonmedical.investorroom-46"><span data-dcnode-id="3116" instrument_node="">[46]</span></a></sup><span data-dcnode-id="3113" instrument_node=""> Previously, exosomes had been measured by total protein content in purified samples and by indirect immunomodulatory effects. ELLSA directly measures exosome particles in complex solutions, and has already been found capable of detecting exosomes from other sources, including ovarian cancer and tuberculosis-infected macrophages.
</span></p><p data-dcnode-id="3102"><span data-dcnode-id="3111" instrument_node="">Exosomes, secreted by tumors, are also believed to be responsible for triggering programmed cell death (apoptosis) of immune cells; interrupting T-cell signaling required to mount an immune response; inhibiting the production of anti-cancer cytokines, and has implications in the spread of metastasis and allowing for angiogenesis.</span><sup class="reference" data-dcnode-id="3108" id="cite_ref-47"><a data-dcnode-id="3109" href="#cite_note-47"><span data-dcnode-id="3110" instrument_node="">[47]</span></a></sup><span data-dcnode-id="3107" instrument_node=""> Studies are currently being done with "Lectin affinity plasmapheresis" (LAP),</span><sup class="reference" data-dcnode-id="3104" id="cite_ref-aethlonmedical.investorroom_46-1"><a data-dcnode-id="3105" href="#cite_note-aethlonmedical.investorroom-46"><span data-dcnode-id="3106" instrument_node="">[46]</span></a></sup><span data-dcnode-id="3103" instrument_node=""> LAP is a blood filtration method which selectively targets the tumor based exosomes and removes them from the bloodstream. It is believed that decreasing the tumor-secreted exosomes in a patient's bloodstream will slow down progression of the cancer while at the same time increasing the patients own immune response.
</span></p><span data-dcnode-id="3101" instrument_node="">
</span><h2 data-dcnode-id="3091"><span class="mw-headline" data-dcnode-id="3099" id="Complementary_and_alternative"><span data-dcnode-id="3100" instrument_node="">Complementary and alternative</span></span><span class="mw-editsection" data-dcnode-id="3092"><span class="mw-editsection-bracket" data-dcnode-id="3097"><span data-dcnode-id="3098" instrument_node="">[</span></span><a data-dcnode-id="3095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTreatment_of_cancer%26action%3Dedit%26section%3D18" title="Edit section: Complementary and alternative"><span data-dcnode-id="3096" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3093"><span data-dcnode-id="3094" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3090" instrument_node="">
</span><link data-dcnode-id="3089" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3085" role="note"><span data-dcnode-id="3088" instrument_node="">Main article: </span><a data-dcnode-id="3086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alternative_cancer_treatments" title="Alternative cancer treatments"><span data-dcnode-id="3087" instrument_node="">Alternative cancer treatments</span></a></div><span data-dcnode-id="3084" instrument_node="">
</span><p data-dcnode-id="3061"><a data-dcnode-id="3082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alternative_medicine" title="Alternative medicine"><span data-dcnode-id="3083" instrument_node="">Complementary and alternative medicine</span></a><span data-dcnode-id="3081" instrument_node=""> (CAM) treatments are the diverse group of medical and health care systems, practices, and products that are not part of conventional medicine and have not been shown to be effective.</span><sup class="reference" data-dcnode-id="3078" id="cite_ref-mnalt_48-0"><a data-dcnode-id="3079" href="#cite_note-mnalt-48"><span data-dcnode-id="3080" instrument_node="">[48]</span></a></sup><span data-dcnode-id="3077" instrument_node=""> "Complementary medicine" refers to methods and substances used along with conventional medicine, while "</span><a data-dcnode-id="3075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alternative_medicine" title="Alternative medicine"><span data-dcnode-id="3076" instrument_node="">alternative medicine</span></a><span data-dcnode-id="3074" instrument_node="">" refers to compounds used instead of conventional medicine.</span><sup class="reference" data-dcnode-id="3071" id="cite_ref-49"><a data-dcnode-id="3072" href="#cite_note-49"><span data-dcnode-id="3073" instrument_node="">[49]</span></a></sup><span data-dcnode-id="3070" instrument_node=""> CAM use is common among people with cancer; a 2000 study found that 69% of cancer patients had used at least one CAM therapy as part of their cancer treatment.</span><sup class="reference" data-dcnode-id="3067" id="cite_ref-Richardson2000_50-0"><a data-dcnode-id="3068" href="#cite_note-Richardson2000-50"><span data-dcnode-id="3069" instrument_node="">[50]</span></a></sup><span data-dcnode-id="3066" instrument_node=""> Most complementary and alternative medicines for cancer have not been rigorously studied or tested. Some alternative treatments which have been investigated and shown to be ineffective continue to be marketed and promoted.</span><sup class="reference" data-dcnode-id="3063" id="cite_ref-pmid15061600_51-0"><a data-dcnode-id="3064" href="#cite_note-pmid15061600-51"><span data-dcnode-id="3065" instrument_node="">[51]</span></a></sup><span data-dcnode-id="3062" instrument_node="">
</span></p><span data-dcnode-id="3060" instrument_node="">
</span><h2 data-dcnode-id="3050"><span class="mw-headline" data-dcnode-id="3058" id="Special_circumstances"><span data-dcnode-id="3059" instrument_node="">Special circumstances</span></span><span class="mw-editsection" data-dcnode-id="3051"><span class="mw-editsection-bracket" data-dcnode-id="3056"><span data-dcnode-id="3057" instrument_node="">[</span></span><a data-dcnode-id="3054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTreatment_of_cancer%26action%3Dedit%26section%3D19" title="Edit section: Special circumstances"><span data-dcnode-id="3055" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3052"><span data-dcnode-id="3053" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3049" instrument_node="">
</span><h3 data-dcnode-id="3039"><span class="mw-headline" data-dcnode-id="3047" id="In_pregnancy"><span data-dcnode-id="3048" instrument_node="">In pregnancy</span></span><span class="mw-editsection" data-dcnode-id="3040"><span class="mw-editsection-bracket" data-dcnode-id="3045"><span data-dcnode-id="3046" instrument_node="">[</span></span><a data-dcnode-id="3043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTreatment_of_cancer%26action%3Dedit%26section%3D20" title="Edit section: In pregnancy"><span data-dcnode-id="3044" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3041"><span data-dcnode-id="3042" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3038" instrument_node="">
</span><p data-dcnode-id="3029"><span data-dcnode-id="3037" instrument_node="">The incidence of concurrent cancer during </span><a data-dcnode-id="3035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pregnancy" title="Pregnancy"><span data-dcnode-id="3036" instrument_node="">pregnancy</span></a><span data-dcnode-id="3034" instrument_node=""> has risen due to the increasing age of pregnant mothers</span><sup class="reference" data-dcnode-id="3031" id="cite_ref-curado_52-0"><a data-dcnode-id="3032" href="#cite_note-curado-52"><span data-dcnode-id="3033" instrument_node="">[52]</span></a></sup><span data-dcnode-id="3030" instrument_node=""> and due to the incidental discovery of maternal tumors during prenatal ultrasound examinations.
</span></p><p data-dcnode-id="3024"><span data-dcnode-id="3028" instrument_node="">Cancer treatment needs to be selected to do least harm to both the woman and her embryo/fetus. In some cases a </span><a class="mw-redirect" data-dcnode-id="3026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Therapeutic_abortion" title="Therapeutic abortion"><span data-dcnode-id="3027" instrument_node="">therapeutic abortion</span></a><span data-dcnode-id="3025" instrument_node=""> may be recommended.
</span></p><p data-dcnode-id="3018"><span data-dcnode-id="3023" instrument_node="">Radiation therapy is out of the question, and chemotherapy always poses the risk of miscarriage and congenital malformations.</span><sup class="reference" data-dcnode-id="3020" id="cite_ref-curado_52-1"><a data-dcnode-id="3021" href="#cite_note-curado-52"><span data-dcnode-id="3022" instrument_node="">[52]</span></a></sup><span data-dcnode-id="3019" instrument_node=""> Little is known about the effects of medications on the child.
</span></p><p data-dcnode-id="3008"><span data-dcnode-id="3017" instrument_node="">Even if a drug has been tested as not crossing the placenta to reach the child, some cancer forms can harm the placenta and make the drug pass over it anyway.</span><sup class="reference" data-dcnode-id="3014" id="cite_ref-curado_52-2"><a data-dcnode-id="3015" href="#cite_note-curado-52"><span data-dcnode-id="3016" instrument_node="">[52]</span></a></sup><span data-dcnode-id="3013" instrument_node=""> Some forms of skin cancer may even metastasize to the child's body.</span><sup class="reference" data-dcnode-id="3010" id="cite_ref-curado_52-3"><a data-dcnode-id="3011" href="#cite_note-curado-52"><span data-dcnode-id="3012" instrument_node="">[52]</span></a></sup><span data-dcnode-id="3009" instrument_node="">
</span></p><p data-dcnode-id="2989"><span data-dcnode-id="3007" instrument_node="">Diagnosis is also made more difficult, since </span><a class="mw-redirect" data-dcnode-id="3005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Computed_tomography" title="Computed tomography"><span data-dcnode-id="3006" instrument_node="">computed tomography</span></a><span data-dcnode-id="3004" instrument_node=""> is infeasible because of its high radiation dose. Still, </span><a data-dcnode-id="3002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magnetic_resonance_imaging" title="Magnetic resonance imaging"><span data-dcnode-id="3003" instrument_node="">magnetic resonance imaging</span></a><span data-dcnode-id="3001" instrument_node=""> works normally.</span><sup class="reference" data-dcnode-id="2998" id="cite_ref-curado_52-4"><a data-dcnode-id="2999" href="#cite_note-curado-52"><span data-dcnode-id="3000" instrument_node="">[52]</span></a></sup><span data-dcnode-id="2997" instrument_node=""> However, </span><a class="mw-redirect" data-dcnode-id="2995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Contrast_medium" title="Contrast medium"><span data-dcnode-id="2996" instrument_node="">contrast media</span></a><span data-dcnode-id="2994" instrument_node=""> cannot be used, since they cross the placenta.</span><sup class="reference" data-dcnode-id="2991" id="cite_ref-curado_52-5"><a data-dcnode-id="2992" href="#cite_note-curado-52"><span data-dcnode-id="2993" instrument_node="">[52]</span></a></sup><span data-dcnode-id="2990" instrument_node="">
</span></p><p data-dcnode-id="2980"><span data-dcnode-id="2988" instrument_node="">As a consequence of the difficulties to properly diagnose and treat cancer during pregnancy, the alternative methods are either to perform a </span><a class="mw-redirect" data-dcnode-id="2986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cesarean_section" title="Cesarean section"><span data-dcnode-id="2987" instrument_node="">Cesarean section</span></a><span data-dcnode-id="2985" instrument_node=""> when the child is viable in order to begin a more aggressive cancer treatment, or, if the cancer is malignant enough that the mother is unlikely to be able to wait that long, to perform an abortion in order to treat the cancer.</span><sup class="reference" data-dcnode-id="2982" id="cite_ref-curado_52-6"><a data-dcnode-id="2983" href="#cite_note-curado-52"><span data-dcnode-id="2984" instrument_node="">[52]</span></a></sup><span data-dcnode-id="2981" instrument_node="">
</span></p><span data-dcnode-id="2979" instrument_node="">
</span><h3 data-dcnode-id="2969"><span class="mw-headline" data-dcnode-id="2977" id="In_utero"><span data-dcnode-id="2978" instrument_node="">In utero</span></span><span class="mw-editsection" data-dcnode-id="2970"><span class="mw-editsection-bracket" data-dcnode-id="2975"><span data-dcnode-id="2976" instrument_node="">[</span></span><a data-dcnode-id="2973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTreatment_of_cancer%26action%3Dedit%26section%3D21" title="Edit section: In utero"><span data-dcnode-id="2974" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2971"><span data-dcnode-id="2972" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2968" instrument_node="">
</span><p data-dcnode-id="2960"><span data-dcnode-id="2967" instrument_node="">Fetal tumors are sometimes diagnosed while still in utero. </span><a data-dcnode-id="2965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Teratoma" title="Teratoma"><span data-dcnode-id="2966" instrument_node="">Teratoma</span></a><span data-dcnode-id="2964" instrument_node=""> is the most common type of fetal tumor, and usually is benign. In some cases these are surgically treated while the fetus is still in the </span><a data-dcnode-id="2962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uterus" title="Uterus"><span data-dcnode-id="2963" instrument_node="">uterus</span></a><span data-dcnode-id="2961" instrument_node="">.
</span></p><span data-dcnode-id="2959" instrument_node="">
</span><h2 data-dcnode-id="2949"><span class="mw-headline" data-dcnode-id="2957" id="Racial_and_social_disparities"><span data-dcnode-id="2958" instrument_node="">Racial and social disparities</span></span><span class="mw-editsection" data-dcnode-id="2950"><span class="mw-editsection-bracket" data-dcnode-id="2955"><span data-dcnode-id="2956" instrument_node="">[</span></span><a data-dcnode-id="2953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTreatment_of_cancer%26action%3Dedit%26section%3D22" title="Edit section: Racial and social disparities"><span data-dcnode-id="2954" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2951"><span data-dcnode-id="2952" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2948" instrument_node="">
</span><p data-dcnode-id="2938"><span data-dcnode-id="2947" instrument_node="">Cancer is a significant issue that is affecting the world. Specifically in the U.S, it is expected for there to be 1,735,350 new cases of cancer, and 609,640 deaths by the end of 2018. Adequate treatment can prevent many cancer deaths but there are racial and social disparities in treatments which has a significant factor in high death rates. Minorities are more likely to suffer from inadequate treatment while white patients are more likely to receive efficient treatments in a timely manner.</span><sup class="reference" data-dcnode-id="2944" id="cite_ref-:0_53-0"><a data-dcnode-id="2945" href="#cite_note-:0-53"><span data-dcnode-id="2946" instrument_node="">[53]</span></a></sup><span data-dcnode-id="2943" instrument_node=""> Having satisfactory treatment in timely manner can increase the patients likelihood of survival. It has been shown that chances of survival are significantly greater for white patients than for African American patients.</span><sup class="reference" data-dcnode-id="2940" id="cite_ref-:0_53-1"><a data-dcnode-id="2941" href="#cite_note-:0-53"><span data-dcnode-id="2942" instrument_node="">[53]</span></a></sup><span data-dcnode-id="2939" instrument_node="">
</span></p><p data-dcnode-id="2928"><span data-dcnode-id="2937" instrument_node="">The annual average mortality of patients with colorectal cancer between 1992 and 2000 was 27 and 18.5 per 100,000 white patients and 35.4 and 25.3 per 100,000 black patients. In a journal that analyzed multiple studies testing racial disparities when treating colorectal cancer found contradicting findings. The Veterans administration and an adjuvant trial found that there were no evidence to support racial differences in treating colorectal cancer. However, two studies suggested that African American patients received less satisfactory and poor quality treatment compared to white patients.</span><sup class="reference" data-dcnode-id="2934" id="cite_ref-54"><a data-dcnode-id="2935" href="#cite_note-54"><span data-dcnode-id="2936" instrument_node="">[54]</span></a></sup><span data-dcnode-id="2933" instrument_node=""> One of these studies specifically was provided by the Center for Intramural Research. They found that black patients were 41% less likely to receive colorectal treatment and were more likely to be hospitalized in a teaching hospital with less certified physicians compared to white patients. Furthermore, black patients were more likely to be diagnosed with oncologic sequelae, which is a severity of the illness in result of poorly treated cancer. Lastly, for every 1,000 patients in the hospital, there were 137.4 black patient deaths and 95.6 white patient deaths.</span><sup class="reference" data-dcnode-id="2930" id="cite_ref-:02_55-0"><a data-dcnode-id="2931" href="#cite_note-:02-55"><span data-dcnode-id="2932" instrument_node="">[55]</span></a></sup><span data-dcnode-id="2929" instrument_node="">
</span></p><p data-dcnode-id="2911"><span data-dcnode-id="2927" instrument_node="">In a breast cancer journal article analyzed the disparities of breast cancer treatments in the Appalachian Mountains. African American women were found to be 3 times more likely to die compared to Asians and two times more likely to die compared to white women.</span><sup class="reference" data-dcnode-id="2924" id="cite_ref-:1_56-0"><a data-dcnode-id="2925" href="#cite_note-:1-56"><span data-dcnode-id="2926" instrument_node="">[56]</span></a></sup><span data-dcnode-id="2923" instrument_node=""> According to this study, African American women are at a survival disadvantage compared to other races.</span><sup class="reference" data-dcnode-id="2920" id="cite_ref-57"><a data-dcnode-id="2921" href="#cite_note-57"><span data-dcnode-id="2922" instrument_node="">[57]</span></a></sup><sup class="reference" data-dcnode-id="2917" id="cite_ref-:1_56-1"><a data-dcnode-id="2918" href="#cite_note-:1-56"><span data-dcnode-id="2919" instrument_node="">[56]</span></a></sup><span data-dcnode-id="2916" instrument_node=""> Black women are also more likely to receive less successful treatment than white women by not receiving surgery or therapy. Furthermore, The National Cancer Institute panel, identified breast cancer treatments, given to black women, as inappropriate and not adequate compared to the treatment given to white women.</span><sup class="reference" data-dcnode-id="2913" id="cite_ref-58"><a data-dcnode-id="2914" href="#cite_note-58"><span data-dcnode-id="2915" instrument_node="">[58]</span></a></sup><span data-dcnode-id="2912" instrument_node="">
</span></p><p data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">From these studies, researchers have noted that there are definite disparities in the treatment of cancer, specifically who have access to the best treatment and can receive it in a timely manner. This eventually leads to disparities between who is dying from cancer and who is more likely to survive.
</span></p><p data-dcnode-id="2884"><span data-dcnode-id="2908" instrument_node="">The cause of these disparities is generally that African Americans have less medical care coverage, insurance and access cancer centers than other races.</span><sup class="reference" data-dcnode-id="2905" id="cite_ref-:2_59-0"><a data-dcnode-id="2906" href="#cite_note-:2-59"><span data-dcnode-id="2907" instrument_node="">[59]</span></a></sup><span data-dcnode-id="2904" instrument_node=""> For an example, black patients with breast cancer and colorectal cancer were shown to be more likely to have medicaid or no insurance compared to other races.</span><sup class="reference" data-dcnode-id="2901" id="cite_ref-:02_55-1"><a data-dcnode-id="2902" href="#cite_note-:02-55"><span data-dcnode-id="2903" instrument_node="">[55]</span></a></sup><span data-dcnode-id="2900" instrument_node=""> The location of the health care facility also plays a role in why African Americans receive less treatment in comparison to other races.</span><sup class="reference" data-dcnode-id="2897" id="cite_ref-:2_59-1"><a data-dcnode-id="2898" href="#cite_note-:2-59"><span data-dcnode-id="2899" instrument_node="">[59]</span></a></sup><sup class="reference" data-dcnode-id="2894" id="cite_ref-:02_55-2"><a data-dcnode-id="2895" href="#cite_note-:02-55"><span data-dcnode-id="2896" instrument_node="">[55]</span></a></sup><span data-dcnode-id="2893" instrument_node=""> However, some studies say that African Americans don't trust doctors and don't always seek the help they need and this explains why there are less African Americans receiving treatment.</span><sup class="reference" data-dcnode-id="2890" id="cite_ref-:3_60-0"><a data-dcnode-id="2891" href="#cite_note-:3-60"><span data-dcnode-id="2892" instrument_node="">[60]</span></a></sup><span data-dcnode-id="2889" instrument_node=""> Others suggest that African Americans seek even more treatment than whites and that it is simply a lack of the resources available to them.</span><sup class="reference" data-dcnode-id="2886" id="cite_ref-:3_60-1"><a data-dcnode-id="2887" href="#cite_note-:3-60"><span data-dcnode-id="2888" instrument_node="">[60]</span></a></sup><span data-dcnode-id="2885" instrument_node=""> In this case, analyzing these studies will identify the treatment disparities and look to prevent them by discovering potential causes of these disparities.
</span></p><span data-dcnode-id="2883" instrument_node="">
