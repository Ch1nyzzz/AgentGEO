g"><span class="therapy-icon-nav-image" data-dcnode-id="914"><img class="therapy-icon-nav-image" data-dcnode-id="915" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bcct.ngo/assets/images/icons/headicon-nav-dosing.png&amp;raw"></span><br data-dcnode-id="913"><span data-dcnode-id="912" instrument_node="">Dosing</span></a><a class="therapy-icon-nav-link" data-dcnode-id="904" href="#headprotocols"><span class="therapy-icon-nav-image" data-dcnode-id="909"><img class="therapy-icon-nav-image" data-dcnode-id="910" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bcct.ngo/assets/images/icons/headicon-nav-protocols.png&amp;raw"></span><br data-dcnode-id="908"><span data-dcnode-id="907" instrument_node="">Integrative</span><br data-dcnode-id="906"><span data-dcnode-id="905" instrument_node="">Programs</span></a><a class="therapy-icon-nav-link" data-dcnode-id="899" href="#headcommentary"><span class="therapy-icon-nav-image" data-dcnode-id="902"><img class="therapy-icon-nav-image" data-dcnode-id="903" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bcct.ngo/assets/images/icons/headicon-nav-commentary.png&amp;raw"></span><br data-dcnode-id="901"><span data-dcnode-id="900" instrument_node="">Commentary</span></a><a class="therapy-icon-nav-link" data-dcnode-id="892" href="#headmoreinfo"><span class="therapy-icon-nav-image" data-dcnode-id="897"><img class="therapy-icon-nav-image" data-dcnode-id="898" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bcct.ngo/assets/images/icons/headicon-nav-moreinformation.png&amp;raw"></span><br data-dcnode-id="896"><span data-dcnode-id="895" instrument_node="">More</span><br data-dcnode-id="894"><span data-dcnode-id="893" instrument_node="">Information</span></a></div><span data-dcnode-id="890" instrument_node="">

</span><p data-dcnode-id="861"><strong data-dcnode-id="862"><img alt="" class="align-right" data-dcnode-id="865" height="128" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bcct.ngo/assets/images/about%2520BCCT/NancyHepp-cropped.jpg&amp;raw" width="100"><span data-dcnode-id="864" instrument_node="">Nancy Hepp, MS, BCCT Project Manager</span><br data-dcnode-id="863"></strong></p><span data-dcnode-id="860" instrument_node="">
</span><p class="accordion-title" data-dcnode-id="857" id="accordiontitle2"><a data-dcnode-id="858" href="javascript:showAccordion(2,'Read%20more')"><span data-dcnode-id="859" instrument_node="">Read more</span></a></p><div class="accordion-text hidden" data-dcnode-id="852" id="accordion2"><p data-dcnode-id="853"><span data-dcnode-id="856" instrument_node="">Ms. Hepp is a science researcher and communicator who has been writing and editing educational content on varied health topics for more than 20 years. </span><a data-dcnode-id="854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bcct.ngo/about-bcct/bcct-staff%23hepp"><span data-dcnode-id="855" instrument_node="">View profile.</span></a></p></div><span data-dcnode-id="851" instrument_node="">

</span><table class="highlight-box-right" data-dcnode-id="804" style="width: 300px;"><tbody data-dcnode-id="806"><tr data-dcnode-id="808"><td data-dcnode-id="810"><span data-dcnode-id="835" instrument_node="">
</span><h3 class="headicon-sub keypoints" data-dcnode-id="833" id="headkeypoint"><span data-dcnode-id="834" instrument_node="">Key Points</span></h3><span data-dcnode-id="832" instrument_node="">
</span><ul data-dcnode-id="812"><span data-dcnode-id="831" instrument_node="">
</span><li data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Before using this therapy, consult your oncology team about interactions with other treatments and therapies. Also make sure this therapy is safe for use with any other medical conditions you may have.</span></li><span data-dcnode-id="828" instrument_node="">
</span><li data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Pomi-T is a food supplement capsule containing green tea, pomegranate seed extract, broccoli extract and turmeric.</span></li><span data-dcnode-id="825" instrument_node="">
</span><li data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Pomi-T interests BCCT because of the impressive results of a trial evaluating its use in men with prostate cancer undergoing active surveillance or watchful waiting.</span></li><span data-dcnode-id="822" instrument_node="">
</span><li data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">It is listed and described in the NCI’s PDQ Prostate Cancer, Nutrition, and Dietary Supplements as one of the multicomponent complementary therapies used in preventing and treating prostate cancers.</span></li><span data-dcnode-id="819" instrument_node="">
</span><li data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Although initial research is promising, no clinical evidence yet shows that Pomi-T has any impact on cancer outcomes.</span></li><span data-dcnode-id="816" instrument_node="">
</span><li data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">Pomi-T in clinical trial was well tolerated, although some people may be hypersensitive to one or more components in Pomi-T. Some of the components can potentially interact with prescription drugs. Consult with your pharmacist for interactions, and discuss using Pomi-T with your doctor.</span></li><span data-dcnode-id="813" instrument_node="">
</span></ul><span data-dcnode-id="811" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="792"><span data-dcnode-id="802" instrument_node="">Pomi-T® is a food supplement capsule containing </span><a data-dcnode-id="800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bcct.ngo/search-therapies/search-therapy-summaries/green-teaegcg"><span data-dcnode-id="801" instrument_node="">green tea</span></a><span data-dcnode-id="799" instrument_node="">, </span><a data-dcnode-id="797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bcct.ngo/search-therapies/search-therapy-summaries/pomegranate"><span data-dcnode-id="798" instrument_node="">pomegranate</span></a><span data-dcnode-id="796" instrument_node=""> seed extract, broccoli extract and </span><a data-dcnode-id="794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bcct.ngo/search-therapies/search-therapy-summaries/curcumin"><span data-dcnode-id="795" instrument_node="">turmeric</span></a><span data-dcnode-id="793" instrument_node="">. The individual components in Pomi-T are each rich in polyphenols, natural plant-based phytochemicals that are associated with lowering risk for a number of chronic illnesses and are known for anticancer effects.&nbsp;</span></p><span data-dcnode-id="791" instrument_node="">
</span><p class="accordion-title" data-dcnode-id="788" id="accordiontitle3"><a data-dcnode-id="789" href="javascript:showAccordion(3,'Read%20more')"><span data-dcnode-id="790" instrument_node="">Read more</span></a></p><div class="accordion-text hidden" data-dcnode-id="782" id="accordion3"><p data-dcnode-id="783"><span data-dcnode-id="787" instrument_node="">Pomi-T was developed by a team of doctors, scientists and nutritionists led by an oncologist from Cambridge University for a national randomized control trial in the United Kingdom (UK). Classified in the UK as a food supplement and not as a medicinal product, Pomi-T cannot legally be recommended for any medical condition or claim any health benefits. However, it contains a combination of food extracts that are included in several integrative cancer care protocols for </span><a data-dcnode-id="785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bcct.ngo/cancers-and-symptoms/cancer-handbooks/prostate-cancer"><span data-dcnode-id="786" instrument_node="">prostate</span></a><span data-dcnode-id="784" instrument_node=""> and other cancers (see our related pages section for more information).</span></p></div><span data-dcnode-id="781" instrument_node="">
</span><h2 class="headicon treatment" data-dcnode-id="779" id="headtreatment"><span data-dcnode-id="780" instrument_node="">Treating the Cancer</span></h2><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Working against cancer growth or spread, improving survival, or working with other treatments or therapies to improve their anticancer action</span></p><span data-dcnode-id="775" instrument_node="">
</span><h3 data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">Clinical Evidence</span></h3><span data-dcnode-id="772" instrument_node="">
</span><p data-dcnode-id="759"><span data-dcnode-id="771" instrument_node="">Pomi-T was tested in a small study of men with early-stage </span><a data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bcct.ngo/cancers-and-symptoms/cancer-handbooks/prostate-cancer"><span data-dcnode-id="770" instrument_node="">prostate cancer</span></a><span data-dcnode-id="768" instrument_node=""> in active surveillance or watchful waiting. Because rising prostate-specific antigen (PSA) levels are a marker of potential cancer activity, the researchers tracked these levels. After six months, the Pomi-T treatment group's PSA rose by 14.7 percent, but the levels in the group not receiving Pomi-T rose by 78.5 percent.</span><sup class="footnote-reference" data-dcnode-id="765"><a data-dcnode-id="766" href="javascript:showElementInPopUp('footnote1')"><span data-dcnode-id="767" instrument_node="">1</span></a></sup><span data-dcnode-id="764" instrument_node=""> The researchers concluded that taking Pomi-T had a significant short-term favorable effect on PSA levels, slowing the rise dramatically..</span><sup class="footnote-reference" data-dcnode-id="761"><a data-dcnode-id="762" href="javascript:showElementInPopUp('footnote2')"><span data-dcnode-id="763" instrument_node="">2</span></a></sup><span data-dcnode-id="760" instrument_node=""> </span></p><span data-dcnode-id="758" instrument_node="">
</span><span data-dcnode-id="757" instrument_node="">
</span><span data-dcnode-id="756" instrument_node="">
</span><span data-dcnode-id="755" instrument_node="">
</span><span data-dcnode-id="708" instrument_node="">
</span><span data-dcnode-id="706" instrument_node="">
</span><span data-dcnode-id="704" instrument_node="">
</span><table class="highlight-box-right" data-dcnode-id="703" style="clear: right; width: 300px;"><tbody data-dcnode-id="705"><tr data-dcnode-id="707"><td data-dcnode-id="709"><span data-dcnode-id="754" instrument_node="">
</span><h3 data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Components of Pomi-T</span></h3><span data-dcnode-id="751" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="750" instrument_node="">The individual ingredients in Pomi-T are all considered to be rich in polyphenols, natural plant-based phytochemicals that are associated with lowering risk for a number of chronic illnesses as well as having anticancer effects, as described in the study of Pomi-T:</span><sup class="footnote-reference" data-dcnode-id="747"><a data-dcnode-id="748" href="javascript:showElementInPopUp('footnote3')"><span data-dcnode-id="749" instrument_node="">3</span></a></sup><span data-dcnode-id="746" instrument_node=""> </span></p><span data-dcnode-id="744" instrument_node="">
</span><p class="accordion-title" data-dcnode-id="741" id="accordiontitle4"><a data-dcnode-id="742" href="javascript:showAccordion(4,'Expand%20list')"><span data-dcnode-id="743" instrument_node="">Expand list</span></a></p><div class="accordion-text hidden" data-dcnode-id="711" id="accordion4"><p data-dcnode-id="740"></p><span data-dcnode-id="739" instrument_node="">
</span><ul data-dcnode-id="714"><span data-dcnode-id="738" instrument_node="">
</span><li data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">In lab studies, pomegranate has shown anticancer effects in breast and prostate cancer cells. In human studies of prostate cancer, it prolonged PSA doubling and improved markers of oxidative stress.</span></li><span data-dcnode-id="735" instrument_node="">
</span><li data-dcnode-id="730"><span data-dcnode-id="734" instrument_node="">In lab studies, </span><a data-dcnode-id="732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bcct.ngo/search-therapies/search-therapy-summaries/green-teaegcg"><span data-dcnode-id="733" instrument_node="">green tea</span></a><span data-dcnode-id="731" instrument_node=""> has shown anticancer properties in breast and prostate cancer cells. Men given an extract of green tea saw a significant reduction in cancer growth factors and a beneficial effect on PSA.</span></li><span data-dcnode-id="729" instrument_node="">
</span><li data-dcnode-id="724"><span data-dcnode-id="728" instrument_node="">In the lab, broccoli inhibits growth of cancer cells and promotes apoptosis (programmed cell death). In a human study, broccoli “quieted” cancer promoting genes and “turned on” cancer suppressing genes. See the </span><a data-dcnode-id="726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bcct.ngo/search-therapies/search-therapy-summaries/diindolylmethane"><span data-dcnode-id="727" instrument_node="">Diindolylmethane (DIM)</span></a><span data-dcnode-id="725" instrument_node=""> page for more information.</span></li><span data-dcnode-id="723" instrument_node="">
</span><li data-dcnode-id="719"><a data-dcnode-id="721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bcct.ngo/search-therapies/search-therapy-summaries/curcumin"><span data-dcnode-id="722" instrument_node="">Curcumin</span></a><span data-dcnode-id="720" instrument_node=""> (in turmeric) has shown several anticancer effects as well as anti-inflammatory effects. It has halted the growth of stem cells that give rise to breast cancer cells while leaving normal breast cells alone.</span></li><span data-dcnode-id="718" instrument_node="">
</span><li data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">“Finally, all four ingredients also have some antioxidant properties that are thought to protect the DNA against oxidative damage from ingested or environmental carcinogens, although this precise mechanism has not been confirmed clinically.”</span></li><span data-dcnode-id="715" instrument_node="">
</span></ul><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="712"></p></div><span data-dcnode-id="710" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="692"><span data-dcnode-id="701" instrument_node="">Although one small clinical study showed significant effects of Pomi-T on PSA levels, it was of short duration (six months), and no impact on cancer incidence, quality of life or mortality was established.</span><sup class="footnote-reference" data-dcnode-id="698"><a data-dcnode-id="699" href="javascript:showElementInPopUp('footnote4')"><span data-dcnode-id="700" instrument_node="">4</span></a></sup><span data-dcnode-id="697" instrument_node=""> Pomi-T shows promise, but as yet no clinical evidence of impact on cancer is available..</span><sup class="footnote-reference" data-dcnode-id="694"><a data-dcnode-id="695" href="javascript:showElementInPopUp('footnote5')"><span data-dcnode-id="696" instrument_node="">5</span></a></sup><span data-dcnode-id="693" instrument_node=""> </span></p><span data-dcnode-id="691" instrument_node="">
</span><h3 data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Lab and Animal Evidence</span></h3><span data-dcnode-id="688" instrument_node="">
</span><p class="accordion-title" data-dcnode-id="685" id="accordiontitle5"><a data-dcnode-id="686" href="javascript:showAccordion(5,'Read%20more')"><span data-dcnode-id="687" instrument_node="">Read more</span></a></p><div class="accordion-text hidden" data-dcnode-id="645" id="accordion5"><p data-dcnode-id="680"><span data-dcnode-id="684" instrument_node="">According to the </span><a data-dcnode-id="682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pomi-t.com/" rel="noopener" target="_blank"><span data-dcnode-id="683" instrument_node="">Pomi-T official website</span></a><span data-dcnode-id="681" instrument_node="">, background lab experiments report positive effects across a number of cancer types. These effects are congruent with the effects of the individual components of Pomi-T (see at right).</span></p><span data-dcnode-id="679" instrument_node="">
</span><ul data-dcnode-id="665"><span data-dcnode-id="678" instrument_node="">
</span><li data-dcnode-id="670"><span data-dcnode-id="677" instrument_node="">Anticancer effects in </span><a data-dcnode-id="675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bcct.ngo/cancers-and-symptoms/cancer-handbooks/breast-cancer"><span data-dcnode-id="676" instrument_node="">breast</span></a><span data-dcnode-id="674" instrument_node=""> and&nbsp;</span><a data-dcnode-id="672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bcct.ngo/cancers-and-symptoms/cancer-handbooks/prostate-cancer"><span data-dcnode-id="673" instrument_node="">prostate cancer</span></a><span data-dcnode-id="671" instrument_node=""> cells, with slowing in PSA doubling and reduced cancer growth factors</span></li><span data-dcnode-id="669" instrument_node="">
</span><li data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">Increased&nbsp;cell death (apoptosis)</span></li><span data-dcnode-id="666" instrument_node="">
</span></ul><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="663" instrument_node="">As of 2017 the scientific committee is planning a series of studies involving different stages of </span><a data-dcnode-id="661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bcct.ngo/cancers-and-symptoms/cancer-handbooks/prostate-cancer"><span data-dcnode-id="662" instrument_node="">prostate cancer</span></a><span data-dcnode-id="660" instrument_node="">, as well as other cancer types, including </span><a data-dcnode-id="658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bcct.ngo/cancers-and-symptoms/partial-handbooks/leukemia"><span data-dcnode-id="659" instrument_node="">chronic lymphoblastic leukemia (CLL)</span></a><span data-dcnode-id="657" instrument_node="">, </span><a data-dcnode-id="655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bcct.ngo/cancers-and-symptoms/cancer-handbooks/ovarian-cancer"><span data-dcnode-id="656" instrument_node="">ovarian</span></a><span data-dcnode-id="654" instrument_node="">, </span><a data-dcnode-id="652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bcct.ngo/cancers-and-symptoms/cancer-handbooks/breast-cancer"><span data-dcnode-id="653" instrument_node="">breast</span></a><span data-dcnode-id="651" instrument_node=""> and </span><a data-dcnode-id="649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bcct.ngo/cancers-and-symptoms/cancer-handbooks/colorectal-cancer"><span data-dcnode-id="650" instrument_node="">bowel cancer</span></a><strong data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">.</span></strong></p></div><span data-dcnode-id="644" instrument_node="">
</span><h2 class="headicon terrain" data-dcnode-id="642" id="headterrain"><span data-dcnode-id="643" instrument_node="">Optimizing Your Terrain</span></h2><span data-dcnode-id="641" instrument_node="">
</span><h3 data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Lab and Animal Evidence</span></h3><span data-dcnode-id="638" instrument_node="">
</span><p class="accordion-title" data-dcnode-id="635" id="accordiontitle6"><a data-dcnode-id="636" href="javascript:showAccordion(6,'Read%20more')"><span data-dcnode-id="637" instrument_node="">Read more</span></a></p><div class="accordion-text hidden" data-dcnode-id="618" id="accordion6"><p data-dcnode-id="630"><span data-dcnode-id="634" instrument_node="">According to the </span><a data-dcnode-id="632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pomi-t.com/" rel="noopener" target="_blank"><span data-dcnode-id="633" instrument_node="">Pomi-T official website</span></a><span data-dcnode-id="631" instrument_node="">, background lab experiments report positive effects congruent with the effects of the individual components of Pomi-T (see at right).</span></p><span data-dcnode-id="629" instrument_node="">
</span><ul data-dcnode-id="621"><span data-dcnode-id="628" instrument_node="">
</span><li data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Antioxidant activity and improved markers of oxidative stress</span></li><span data-dcnode-id="625" instrument_node="">
</span><li data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Anti-inflammatory effects</span></li><span data-dcnode-id="622" instrument_node="">
</span></ul><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="619"></p></div><span data-dcnode-id="617" instrument_node="">
</span><h2 class="headicon access" data-dcnode-id="615" id="headaccess"><span data-dcnode-id="616" instrument_node="">Access</span></h2><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Pomi-T is a food supplement and doesn’t require a prescription. It is generally available at retail pharmacies, supplement stores and online.</span></p><span data-dcnode-id="611" instrument_node="">
</span><h2 class="headicon cautions" data-dcnode-id="609" id="headcautions"><span data-dcnode-id="610" instrument_node="">Cautions</span></h2><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Because Pomi-T doesn’t contain the sugar in pomegranate juice, use is generally appropriate for patients with diabetes.</span></p><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="594"><span data-dcnode-id="604" instrument_node="">Safety of Pomi-T in pregnancy hasn’t been established. Safety recommendations for </span><a data-dcnode-id="602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bcct.ngo/search-therapies/search-therapy-summaries/green-teaegcg"><span data-dcnode-id="603" instrument_node="">green tea</span></a><span data-dcnode-id="601" instrument_node="">, </span><a data-dcnode-id="599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bcct.ngo/search-therapies/search-therapy-summaries/pomegranate"><span data-dcnode-id="600" instrument_node="">pomegranate</span></a><span data-dcnode-id="598" instrument_node=""> seed extract, broccoli extract and </span><a data-dcnode-id="596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bcct.ngo/search-therapies/search-therapy-summaries/curcumin"><span data-dcnode-id="597" instrument_node="">turmeric</span></a><span data-dcnode-id="595" instrument_node=""> should be followed.</span></p><span data-dcnode-id="593" instrument_node="">
</span><h3 data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Side Effects/Adverse Events</span></h3><span data-dcnode-id="590" instrument_node="">
</span><p data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Pomi-T was well tolerated in the study, although a few side effects were noted compared to a control:</span></p><span data-dcnode-id="587" instrument_node="">
</span><ul data-dcnode-id="579"><span data-dcnode-id="586" instrument_node="">
</span><li data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">More flatulence and loose bowels</span></li><span data-dcnode-id="583" instrument_node="">
</span><li data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Mild indigestion, which disappeared if Pomi-T was taken with food</span></li><span data-dcnode-id="580" instrument_node="">
</span></ul><span data-dcnode-id="578" instrument_node="">
</span><h3 data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Drug Interactions</span></h3><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="570"><span data-dcnode-id="574" instrument_node="">Pomegranate has the potential to interact with some drugs, such as warfarin, anti-hypertensives or anti-convulsants. For more information on potential drug interactions see Pomi-T website FAQ’s: </span><a data-dcnode-id="572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pomi-t.com/faq-pomi-t/" rel="noopener" target="_blank"><span data-dcnode-id="573" instrument_node="">Does Pomi-T interact with other drugs</span></a><span data-dcnode-id="571" instrument_node="">? &nbsp;</span></p><span data-dcnode-id="569" instrument_node="">
</span><p class="accordion-title" data-dcnode-id="566" id="accordiontitle7"><a data-dcnode-id="567" href="javascript:showAccordion(7,'Read%20more')"><span data-dcnode-id="568" instrument_node="">Read more</span></a></p><div class="accordion-text hidden" data-dcnode-id="554" id="accordion7"><p data-dcnode-id="561"><span data-dcnode-id="565" instrument_node="">Although not substantiated in humans, in lab studies, high doses of polyphenols can have anti-oxidant effects that could possibly reduce the action of chemotherapy. The </span><a data-dcnode-id="563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pomi-t.com/faq-pomi-t/" rel="noopener" target="_blank"><span data-dcnode-id="564" instrument_node="">Pomi-T website</span></a><span data-dcnode-id="562" instrument_node=""> advises that until this issue is resolved, it’s best to avoid taking Pomi-T one day before and three days after the administration of chemotherapy.</span></p><span data-dcnode-id="560" instrument_node="">
</span><p data-dcnode-id="555"><span data-dcnode-id="559" instrument_node="">People can be hypersensitive to one or more of the ingredients in Pomi-T. It is contraindicated in people with allergies to pomegranate or caffeine. For more safety information on Pomi-T, visit the </span><a data-dcnode-id="557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pomi-t.com/safety-information/" rel="noopener" target="_blank"><span data-dcnode-id="558" instrument_node="">Pomi-T website</span></a><span data-dcnode-id="556" instrument_node="">.</span></p></div><span data-dcnode-id="553" instrument_node="">
</span><h2 class="headicon dosing" data-dcnode-id="551" id="headdosing"><span data-dcnode-id="552" instrument_node="">Dosing</span></h2><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="545"><span data-dcnode-id="549" instrument_node="">BCCT does not recommend therapies or doses, but only provides information for patients and providers to consider as part of a complete treatment plan. Patients should discuss therapies with their physicians, as contraindications, interactions and side effects must be evaluated. Levels of active ingredients of natural products can vary widely between and even within products. See </span><a data-dcnode-id="547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bcct.ngo/search-therapies/quality-and-sources-of-herbs-supplements-and-other-natural-products"><span data-dcnode-id="548" instrument_node="">Quality and Sources of Herbs, Supplements and Other Natural Products</span></a><span data-dcnode-id="546" instrument_node="">.</span></p><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="536"><span data-dcnode-id="543" instrument_node="">The Pomi-T official website contains a number of tips on dosing as well as improving the absorption and bioavailability of Pomi-T. The UK site also describes an i-Phone app created to help patients calculate their PSA doubling time between two time points. See the </span><a data-dcnode-id="541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pomi-t.co.uk/faq-about-pomi-t/" rel="noopener" target="_blank"><span data-dcnode-id="542" instrument_node="">Pomi-T FAQ’s</span></a><span data-dcnode-id="540" instrument_node=""> page (Q. </span><a data-dcnode-id="538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pomi-t.com/faq-pomi-t/" rel="noopener" target="_blank"><span data-dcnode-id="539" instrument_node="">How can I accurately follow my PSA doubling time?</span></a><span data-dcnode-id="537" instrument_node="">).</span></p><span data-dcnode-id="535" instrument_node="">
</span><h2 class="headicon protocols" data-dcnode-id="533" id="headprotocols"><span data-dcnode-id="534" instrument_node="">Integrative Programs, Protocols and Medical Systems</span></h2><span data-dcnode-id="532" instrument_node="">
</span><span data-dcnode-id="531" instrument_node="">
</span><span data-dcnode-id="530" instrument_node="">
</span><span data-dcnode-id="529" instrument_node="">
</span><span data-dcnode-id="523" instrument_node="">
</span><span data-dcnode-id="521" instrument_node="">
</span><span data-dcnode-id="519" instrument_node="">
</span><table class="highlight-box-right" data-dcnode-id="518" style="width: 300px;"><tbody data-dcnode-id="520"><tr data-dcnode-id="522"><td data-dcnode-id="524"><span data-dcnode-id="528" instrument_node="">For more information about programs and protocols, see our </span><a data-dcnode-id="526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bcct.ngo/integrative-cancer-care/integrative-approaches/integrative-programs-and-protocols"><span data-dcnode-id="527" instrument_node="">Integrative Programs and Protocols</span></a><span data-dcnode-id="525" instrument_node=""> page.</span></td></tr></tbody></table><span data-dcnode-id="517" instrument_node="">
</span><p data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Pomi-T is not yet listed in any of the protocols or systems that BCCT references, although several of its constituent ingredients are used in protocols.</span></p><span data-dcnode-id="514" instrument_node="">
</span><h2 class="headicon commentary" data-dcnode-id="512" id="headcommentary"><span data-dcnode-id="513" instrument_node="">Commentary</span></h2><span data-dcnode-id="511" instrument_node="">
</span><p data-dcnode-id="499"><span data-dcnode-id="510" instrument_node="">From </span><strong data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">BCCT staff</span></strong><span data-dcnode-id="507" instrument_node="">, January 4, 2018: In a 2013 post, integrative oncologist Dr. Brian Lawenda cautions, “POMI-T is NOT A TREATMENT FOR </span><a data-dcnode-id="505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bcct.ngo/cancers-and-symptoms/cancer-handbooks/prostate-cancer"><span data-dcnode-id="506" instrument_node="">PROSTATE CANCER</span></a><span data-dcnode-id="504" instrument_node="">. Make sure you have first discussed this with your cancer care team before taking POMI-T as the individual ingredients have the potential to interact with other therapies you may be receiving.”</span><sup class="footnote-reference" data-dcnode-id="501"><a data-dcnode-id="502" href="javascript:showElementInPopUp('footnote6')"><span data-dcnode-id="503" instrument_node="">6</span></a></sup><span data-dcnode-id="500" instrument_node=""> Thus, although Pomi-T has been shown to reduce PSA in early stage prostate cancer, no evidence to date indicates it could stand alone as a treatment for prostate cancer.</span></p><span data-dcnode-id="498" instrument_node="">
</span><span data-dcnode-id="497" instrument_node="">
</span><span data-dcnode-id="496" instrument_node="">
</span><span data-dcnode-id="495" instrument_node="">
</span><span data-dcnode-id="479" instrument_node="">
</span><span data-dcnode-id="477" instrument_node="">
</span><span data-dcnode-id="475" instrument_node="">
</span><table class="highlight-box-right" data-dcnode-id="474" style="width: 300px; clear: right;"><tbody data-dcnode-id="476"><tr data-dcnode-id="478"><td data-dcnode-id="480"><span data-dcnode-id="494" instrument_node="">
</span><h3 class="headicon-sub noncancer" data-dcnode-id="492" id="headnoncancer"><span data-dcnode-id="493" instrument_node="">Non-cancer Uses of Pomi-T</span></h3><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="485"><span data-dcnode-id="490" instrument_node="">Because all four Pomi-T ingredients have anti-inflammatory properties, a trial is planned to evaluate the effect of Pomi-T on arthritis.</span><sup class="footnote-reference" data-dcnode-id="487"><a data-dcnode-id="488" href="javascript:showElementInPopUp('footnote7')"><span data-dcnode-id="489" instrument_node="">7</span></a></sup><span data-dcnode-id="486" instrument_node=""> &nbsp;</span></p><span data-dcnode-id="484" instrument_node="">
</span><p data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">BCCT has not reviewed the effectiveness of this therapy for non-cancer uses.</span></p><span data-dcnode-id="481" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="473" instrument_node="">
</span><p data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Note: BCCT has not conducted an independent review of research of Pomi-T. We have drawn from the following sources to create this summary:</span></p><span data-dcnode-id="470" instrument_node="">
