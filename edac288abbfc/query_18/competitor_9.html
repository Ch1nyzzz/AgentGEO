</span><h1 class="align-top" data-dcnode-id="1087"><img alt="HealingCancerNaturally.com" class="ar-15" data-dcnode-id="1089" height="169" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/assets/images/layout/flower-13.jpg&amp;raw" width="140"><span data-dcnode-id="1088" instrument_node="">Healing Cancer Naturally</span></h1><span data-dcnode-id="1086" instrument_node="">
</span><h2 data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Welcome!</span></h2><span data-dcnode-id="1083" instrument_node="">
</span><p class="quote-special" data-dcnode-id="1077"><span data-dcnode-id="1082" instrument_node="">Do not let either the medical authorities or the politicians mislead you. Find out what the facts are, and make your own decisions about how to live a happy life and how to work for a better world.</span><br data-dcnode-id="1081"><span data-dcnode-id="1080" instrument_node="">
</span><span class="quote-special-source" data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Linus Pauling, two time Nobel laureate (Chemistry and Peace)</span></span></p><span data-dcnode-id="1076" instrument_node="">
</span><p class="intro" data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">Hi and Welcome! Thank you for visiting Healing Cancer — Naturally! You will find a wealth of useful and interesting information on this site devoted to the extensive field of alternative non-intrusive healing modalities for cancer that have proven successful for people with this serious challenge!</span></p><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1068"><span data-dcnode-id="1072" instrument_node="">I aim to give you an all-round “holistic” view of the many natural, gentle and/or non-intrusive ways that have been used to heal cancer while placing particular emphasis on those </span><strong data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">cancer cures that are affordable</span></strong><span data-dcnode-id="1069" instrument_node=""> for next to everyone and easy to implement.</span></p><span data-dcnode-id="1067" instrument_node="">
</span><p data-dcnode-id="995"><span data-dcnode-id="1066" instrument_node="">So you’ll find information under </span><a data-dcnode-id="1063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/index-treatment-greatest.html"><strong data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">"Greatest Hits"</span></strong></a><span data-dcnode-id="1062" instrument_node=""> (distilling twenty years of research into the best while simplest and least expensive natural cancer cures), </span><a data-dcnode-id="1060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/index-why-alternatives.html"><span data-dcnode-id="1061" instrument_node="">Why Alternative Cancer Treatment?</span></a><span data-dcnode-id="1059" instrument_node=""> (crucial reading), </span><a data-dcnode-id="1057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/index-treatment-nature-heals.html"><span data-dcnode-id="1058" instrument_node="">Nature Heals</span></a><span data-dcnode-id="1056" instrument_node="">, </span><a data-dcnode-id="1054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/healing-cancer.html"><span data-dcnode-id="1055" instrument_node="">Healing Cancer • Naturally!!!</span></a><span data-dcnode-id="1053" instrument_node="">, </span><a data-dcnode-id="1051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/index-holistic-mind.html"><span data-dcnode-id="1052" instrument_node="">Healing Cancer &amp; Your Mind</span></a><span data-dcnode-id="1050" instrument_node="">, </span><a data-dcnode-id="1048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/index-budwig.html"><span data-dcnode-id="1049" instrument_node="">Budwig Diet</span></a><span data-dcnode-id="1047" in bcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/index-treatment-light.html"><span data-dcnode-id="1007" instrument_node="">Light</span></a><span data-dcnode-id="1005" instrument_node="">, </span><a data-dcnode-id="1003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/index-holistic-love.html"><span data-dcnode-id="1004" instrument_node="">Love</span></a><span data-dcnode-id="1002" instrument_node="">, </span><a data-dcnode-id="1000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/download-healing-cancer-info.html"><span data-dcnode-id="1001" instrument_node="">Free Downloads</span></a><span data-dcnode-id="999" instrument_node=""> and more related subjects, particularly </span><a data-dcnode-id="997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/naturalcancer-curetestimonials.html"><span data-dcnode-id="998" instrument_node="">many stunning and uplifting Cancer Healing Testimonials</span></a><span data-dcnode-id="996" instrument_node="">...</span></p><span data-dcnode-id="994" instrument_node="">
</span><p data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Simultaneously, in my ongoing selection of the information to be featured here, I have striven to include especially such scientific and spiritual data and sources as may be harder to find, as opposed to oft-repeated (and occasionally un- or half true) statements found in many places.</span></p><span data-dcnode-id="991" instrument_node="">
</span><p data-dcnode-id="986"><span data-dcnode-id="990" instrument_node="">The page </span><a data-dcnode-id="988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/healing-cancer.html"><span data-dcnode-id="989" instrument_node="">Healing Cancer</span></a><span data-dcnode-id="987" instrument_node=""> succinctly outlines what currently seems to be the most comprehensive overall approach to healing this and other disease. This approach is three-pronged and consists of addressing and healing the</span></p><span data-dcnode-id="985" instrument_node="">

</span><p data-dcnode-id="855"><span data-dcnode-id="859" instrument_node="">This has led many to think that the conventional approach (more drugs and surgery) may not be the answer. It appears that it clearly fails to address the root causes, which, when unaddressed, may (even in the relatively rare event of a temporary remission being achieved as shown in </span><a data-dcnode-id="857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/quotes-on-cancer-statistics.html"><span data-dcnode-id="858" instrument_node="">cancer statistics</span></a><span data-dcnode-id="856" instrument_node="">) lead to a recurrence and exacerbation of previous symptoms.</span></p><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="849"><span data-dcnode-id="853" instrument_node="">In fact, as seen from </span><a data-dcnode-id="851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/sideeffects-conventional-treat.html"><span data-dcnode-id="852" instrument_node="">Possible side effects you may not have been told about</span></a><span data-dcnode-id="850" instrument_node="">, conventional cancer care can trigger new and similarly serious illnesses. These, ironic &amp; facetious as it may sound, include death.</span></p><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="843"><span data-dcnode-id="847" instrument_node="">One of the most important reasons for preferably avoiding conventional treatment can be found out by asking your doctor two simple questions. See "After A Cancer Diagnosis and before choosing any conventional treatment (chemo, radiation, surgery), </span><a data-dcnode-id="845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/before-conventional-treatment-two-questions.html"><span data-dcnode-id="846" instrument_node="">ask your oncologists two basic questions</span></a><span data-dcnode-id="844" instrument_node="">".</span></p><span data-dcnode-id="842" instrument_node="">

</span></div><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Another cause is likely to be found in the dangerous harsh chemicals present in our polluted food, air and water supply, ranging from pesticides to artificial hormones (present in meat and dairy from non-organic husbandry). Another factor are the ubiquitous electromagnetic fields from appliances, cell phones, computers, TVs, microwaves etc. which no one can escape. </span></p><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">All of these are assaultive, unnatural substances and influences our bodies have to contend with on a daily basis without, and this may be a crucial point, having had the evolutionary time to adapt to them.</span></p><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">In tandem with this onslaught of toxins works the widespread intake of devitalized, demineralized, industrially produced food low in nutrition and high in calories. This kind of diet is far removed from what more naturally-living and much healthier peoples have consumed and is another major suspect in the genesis of cancer.</span></p><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="807"><span data-dcnode-id="811" instrument_node="">And many seem to compound the problem by the intake of medicinal drugs and noxious substances, themselves all too often the contributing cause of disease and worse, even death (compare </span><a data-dcnode-id="809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/quotes-on-pharmaceutical-drugs.html"><span data-dcnode-id="810" instrument_node="">On Drugs</span></a><span data-dcnode-id="808" instrument_node="">).</span></p><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">There is also reason for the contention that all disease has a psychosomatic causative agent if not root cause, in other words stress and inner wounding in all of their multiple forms.</span></p><span data-dcnode-id="803" instrument_node="">

</span><p data-dcnode-id="666"><span data-dcnode-id="673" instrument_node="">Also included in the </span><a data-dcnode-id="671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/index-why-alternatives-testimonials.html"><span data-dcnode-id="672" instrument_node="">Testimonials</span></a><span data-dcnode-id="670" instrument_node=""> section: crucially important reports of cancer patients undergoing conventional cancer treatment such as “Rushed into </span><a data-dcnode-id="668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/testimonyconventionaltreatment.html"><span data-dcnode-id="669" instrument_node="">conventional cancer diagnostics &amp; therapy: a tale of manipulation,</span></a><span data-dcnode-id="667" instrument_node=""> dishonesty, callousness, lack of integrity and ethics and the trauma, pain, shock, disfigurement &amp; regret experienced” — a warning to all cancer patients!</span></p><span data-dcnode-id="665" instrument_node="">

 100 pages offering a comprehensive introduction to Dr. Budwig’s revolutionary yet simple and natural health and healing discoveries. Claimed to be highly effective, they are said to boast a high success rate with cancer (according to statements made by Dr. Budwig and several proponents of her method).</span></p><span data-dcnode-id="660" instrument_node="">

</span><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Healing Cancer Naturally is the only English-language website worldwide which focuses on authentic information on Dr. Johanna Budwig and her diet &amp; protocol as spelled out in 14 of her original German books and other Budwig-related German-language sources.</span></p><span data-dcnode-id="632" instrument_node="">

</span><p data-dcnode-id="617"><a data-dcnode-id="625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/index-holistic-emotions.html"><span data-dcnode-id="626" instrument_node="">Emotions and</span></a><span data-dcnode-id="624" instrument_node=""> </span><a data-dcnode-id="622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/index-holistic-emotions.html"><span data-dcnode-id="623" instrument_node="">Cancer</span></a><span data-dcnode-id="621" instrument_node=""> — Amazing case histories and personal reading have led me to believe that emotions and thoughts, including the power of belief, can be of crucial importance in the genesis of serious and less serious disease as well as in their healing. Very impressive </span><a data-dcnode-id="619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/real-life-healing-stories.html"><span data-dcnode-id="620" instrument_node="">real-life healing stories</span></a><span data-dcnode-id="618" instrument_node=""> show this astounding link.</span></p><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="611"><span data-dcnode-id="615" instrument_node="">Emotions can be healed by allowing them to flow (such as practised in Primal Therapy or Bioenergetics and other approaches based on the work of Wilhelm Reich), as well as particularly with the DIY healing tool of EFT (Emotional Freedom Technique) introduced in </span><a data-dcnode-id="613" href="#cancer-energetics"><span data-dcnode-id="614" instrument_node="">Cancer &amp; Energetics</span></a><span data-dcnode-id="612" instrument_node="">. Also included: links to sites offering emotional healing support and powerful techniques.</span></p><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="600"><a data-dcnode-id="608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/laughter-is-medicine.html"><span data-dcnode-id="609" instrument_node="">Laughter Is Medicine</span></a><span data-dcnode-id="607" instrument_node=""> — Did you know Laughter Is Medicine is not just a saying, but actual fact? Laughing has a measurably positive effect on your immune system including raising the amount of natural killer cells in your blood whose role among other things consists in destroying tumour cells (read Dr. McGhee’s </span><a data-dcnode-id="605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/positive-emotion-survival.html"><span data-dcnode-id="606" instrument_node="">detailed articles</span></a><span data-dcnode-id="604" instrument_node="">) ... That’s why I’ve additionally included a few jokes in </span><a data-dcnode-id="602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/laughter-is-medicine-2.html"><span data-dcnode-id="603" instrument_node="">Laughter is Medicine 2</span></a><span data-dcnode-id="601" instrument_node="">...</span></p><span data-dcnode-id="599" instrument_node="">
</span><p data-dcnode-id="595"><a data-dcnode-id="597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/index-holistic-mind.html"><span data-dcnode-id="598" instrument_node="">Healing Cancer &amp; Your Mind</span></a><span data-dcnode-id="596" instrument_node=""> — I believe that generally speaking, healing from (and getting) cancer often begins in the mind. To heal from cancer, the person’s decision and firm resolve to recover their health often seems the major first step to take.</span></p><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Here are inspiring and practical tools to regain your health through the power of your mind, including healing affirmations, guided imagery and visualization that have helped a kidney cancer patient recover his health. In addition, you’ll find in-depth scientific discussions of the role of the mind (attitudes, feelings, thoughts, beliefs) and the mind-body interface both in the genesis and recovery from cancer.</span></p><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="587"><a data-dcnode-id="589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/index-treatment-light.html"><span data-dcnode-id="590" instrument_node="">Healing Cancer With Light</span></a><span data-dcnode-id="588" instrument_node=""> — Dr. A., a naturopathic physician, writes “Cancer patients need LIGHT!... Get as much exposure to sunlight and fresh air as you possibly can and watch your tumors and cancers shrink away.” Read here about the healing power of sunlight (yes) and its relationship to cancer incidence, as well as about Photodynamic Therapy and the healing of cancer with UV light. Incidentally, Dr. Johanna Budwig’s natural cancer curing protocol lists sunlight exposure as one of the essential healing factors. As so often, nature reveals herself as the greatest healer...</span></p><span data-dcnode-id="586" instrument_node="">
</span><p data-dcnode-id="582"><a data-dcnode-id="584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/index-holistic-love.html"><span data-dcnode-id="585" instrument_node="">Love &amp; Healing</span></a><span data-dcnode-id="583" instrument_node=""> — I believe love — both for others and oneself — to not only be the most important thing in life, but maybe one of the central healing factors as well. If I were asked to list my favourite “alternative cancer treatments”, love would certainly count among them. Based on observations such as those made by cancer researcher Dr. Bernie Siegel, I believe love may be an essential attitude &amp; quality to develop and cultivate to further a person’s healing of cancer, peace of mind and spiritual progress. </span></p><span data-dcnode-id="581" instrument_node="">
</span><p data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Includes long excerpts from Lessons from the Light: What We Can Learn from the Near-Death Experience.</span></p><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="574"><a data-dcnode-id="576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/geopathic-stress-and-cancer.html"><span data-dcnode-id="577" instrument_node="">Geopathic Stress</span></a><span data-dcnode-id="575" instrument_node=""> — A much neglected though critically important area both in the preservation of health and the genesis of disease, including cancer. Information and proposed solutions can be found here — a “must read”.</span></p><span data-dcnode-id="573" instrument_node="">

</span><p data-dcnode-id="564"><a data-dcnode-id="566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/index-causes.html"><span data-dcnode-id="567" instrument_node="">Causes of Cancer</span></a><span data-dcnode-id="565" instrument_node=""> — lists and discusses both those factors which are officially recognised, for instance carcinogens, aflatoxins, radiation (incl. mammography), and those merely “suspected” or probable contributing agents including nutritional, emotional, spiritual factors, cellular oxygen deprivation, fungal pathogens, lymphatic restriction, geopathic stress, viruses, fluorescent lighting, toxic chemicals &amp; pesticides, parasites, aspartame, cell phones, lack (or blockages) of “life force energy” etc.</span></p><span data-dcnode-id="563" instrument_node="">
</span><p data-dcnode-id="555"><a data-dcnode-id="562" id="cancer-energetics" name="cancer-energetics"></a><a data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/index-holistic-energetics.html"><span data-dcnode-id="561" instrument_node="">Cancer &amp; Energetics</span></a><span data-dcnode-id="559" instrument_node="">, </span><a data-dcnode-id="557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/index-holistic-spirituality.html"><span data-dcnode-id="558" instrument_node="">Cancer &amp; Spirituality</span></a><span data-dcnode-id="556" instrument_node=""> — Some of the most important pages on this site featuring a growing collection of information on the vital subjects of our energetic and spiritual foundations, including the effect of sounds, prayer and the “healing stream” on cancer.</span></p><span data-dcnode-id="554" instrument_node="">

</span><p data-dcnode-id="538"><span data-dcnode-id="542" instrument_node="">I currently estimate the physical (nutrition and toxin-related) factors to be the overall most decisive influence in the increasing cancer incidence in Western societies. For some particularly revealing corroborating evidence of this view, see the article </span><a data-dcnode-id="540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/importance-minerals-trace-elements.html"><span data-dcnode-id="541" instrument_node="">US-Sri Lanka Cancer Mortality Comparison</span></a><span data-dcnode-id="539" instrument_node=""> outlining “what may well be a simple, supremely effective, and completely natural cancer cure”.</span></p><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="532"><span data-dcnode-id="536" instrument_node="">These sections also include discussions of water, the largest constituent of physical life and possibly critical element in health and recovery. Even more importantly, they provide detailed scientific corroboration and peer-reviewed research showing the </span><strong data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">unbelievable power of certain simple everyday herbs</span></strong><span data-dcnode-id="533" instrument_node=""> in fighting illness and recovering health. Long contemptuously relegated to the obscurity of old-wives tales, humble weeds are thus lifted to their rightful place as powerful medicinal plants. </span></p><span data-dcnode-id="531" instrument_node="">
</span><p data-dcnode-id="527"><a data-dcnode-id="529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/index-treatment-detoxification.html"><span data-dcnode-id="530" instrument_node="">Detoxification</span></a><span data-dcnode-id="528" instrument_node=""> — Extensive holistic information on a subject which seems absolutely vital to health and healing as well as prevention of degenerative disease including cancer.</span></p><span data-dcnode-id="526" instrument_node="">

</span><p data-dcnode-id="512"><a data-dcnode-id="514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/index-treatment-gerson.html"><span data-dcnode-id="515" instrument_node="">Gerson Diet</span></a><span data-dcnode-id="513" instrument_node=""> — The fresh juice therapy developed by Dr. Max Gerson boasts a good success rate in helping to cure various degenerative diseases including cancer (and seems to be very compatible and advantageously combined with Dr. Budwig’s diet &amp; protocol). Includes detailed discussions of the Gerson therapy plus healing and other testimonials.</span></p><span data-dcnode-id="511" instrument_node="">

</span><p data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">Amazingly (or understandably?), he has arrived at some similar conclusions in his research as did Dr. Johanna Budwig, Dr. Ryke Geerd Hamer, father of German New Medicine, and particularly those schools of thought (some of them with ancient roots such as TCM) who claim that all or most disease is due to a blockage of “energy”, leading to a corresponding weakness in the organ and/or system affected by such deprivation of “vital energy” flow ...</span></p><span data-dcnode-id="484" instrument_node="">

</span><h3 data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">In Conclusion: Some Thoughts on Healing</span></h3><span data-dcnode-id="415" instrument_node="">
</span><p data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">The impression we receive from our sensory contact with the world is that the world around us has substance. Yet all of what appears to be solid matter, is anything but. There is enough space within any atom to place between one trillion and one quadrillion atomic nuclei in it, i.e. an atom is hardly a solid object.</span></p><span data-dcnode-id="412" instrument_node="">
</span><p data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">Most of it (99.999%) is empty space, comprised almost exclusively of void. The portion within it that constitutes real matter occupies only a minute fraction of the total space it fills. The atom can therefore hardly be considered truly substantive. This is what we are made of!</span></p><span data-dcnode-id="409" instrument_node="">
</span><p data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">I read somewhere a comparison of how far a distance there is between each atom in our body compared to their size, and it was something like the distance New York to Los Angeles. So what seems to us to be really solid is ephemeral, a mirage, not at all what it appears to be.</span></p><span data-dcnode-id="406" instrument_node="">
</span><p data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">So our body (including any cancerous tumors it may presently host) with its 76 trillion cells made up of mostly empty atoms that oscillate at 186,000 miles per second is mainly empty space — in essence, simply energy. What seems so dense and fixed to our five senses (including cancerous tumours) is really just energy vibrating in certain patterns.</span></p><span data-dcnode-id="403" instrument_node="">
</span><p data-dcnode-id="398"><span data-dcnode-id="402" instrument_node="">Doesn’t this somehow make the task of healing appear so much easier when it is just a question of modifying, shifting, adding or withdrawing energy, no matter what our (very limited in scope and thus basically “lying”) senses tell us? And you know what? There are actually people who have done that — </span><a data-dcnode-id="400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/chi-dissolving-tumours.html"><span data-dcnode-id="401" instrument_node="">melting tumors in seconds energetically</span></a><span data-dcnode-id="399" instrument_node="">!</span></p><span data-dcnode-id="397" instrument_node="">
</span><p data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">And last but not least: did you know that many if not all alternative physicians or naturopaths reached the ages of 80, 90, 100 and higher? More well-known examples include Dr. Johanna Budwig, 94, and Norman W. Walker, whose age at death is variably stated as 99, 109 or 116, ”his own example of achieving vibrant health through proper thought, diet and body care”.</span></p><span data-dcnode-id="394" instrument_node="">
</span><p data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">The average lifespan of US allopathic doctors lies years below even that of the average US citizen (average age of US doctors in 1993 was 57.6 (”dead doctors don’t lie”)!</span></p><span data-dcnode-id="391" instrument_node="">
</span><h3 data-dcnode-id="388"><a data-dcnode-id="390" id="note" name="note"></a><span data-dcnode-id="389" instrument_node="">More Notes on Healing</span></h3><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">It’s not solely the legal situation and attendant considerations that impose the addition of a disclaimer to a site focussing on the natural and holistic healing or “curing” of cancer. Rather, giving any kind of health advice carries a great amount of responsibility — while I am aware that I basically can only take responsibility for my own body and health.</span></p><span data-dcnode-id="384" instrument_node="">
</span><p data-dcnode-id="355"><span data-dcnode-id="383" instrument_node="">I have seen natural and/or holistic methods and approaches (</span><a data-dcnode-id="381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/index-treatment-supplements-herbs.html"><span data-dcnode-id="382" instrument_node="">herbs</span></a><span data-dcnode-id="380" instrument_node="">, </span><a data-dcnode-id="378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/index-budwig.html"><span data-dcnode-id="379" instrument_node=""> Budwig diet</span></a><span data-dcnode-id="377" instrument_node="">, </span><a data-dcnode-id="375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/index-holistic-emotions.html"><span data-dcnode-id="376" instrument_node="">emotional</span></a><span data-dcnode-id="374" instrument_node="">, </span><a data-dcnode-id="372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/index-holistic-mind.html"><span data-dcnode-id="373" instrument_node="">mental</span></a><span data-dcnode-id="371" instrument_node="">, </span><a data-dcnode-id="369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/index-holistic-energetics.html"><span data-dcnode-id="370" instrument_node="">energetic</span></a><span data-dcnode-id="368" instrument_node=""> and </span><a data-dcnode-id="366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/index-holistic-spirituality.html"><span data-dcnode-id="367" instrument_node="">spiritual</span></a><span data-dcnode-id="365" instrument_node=""> approaches and transformation) being credibly claimed to lead to long-term recovery in between 25 and 100 % of cancer patients who applied them (with “intangible” methods often
 not being quantifiable or statistically recorded), while </span><a data-dcnode-id="363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/index-why-alternatives-conventional.html"><span data-dcnode-id="364" instrument_node="">chemotherapy/radiation/surgery</span></a><span data-dcnode-id="362" instrument_node=""> healing statistics fall (far) below 10 % (and this without taking into account the long-term </span><a data-dcnode-id="360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/quotes-on-cancer-statistics.html"><span data-dcnode-id="361" instrument_node="">cancer cure statistics</span></a><span data-dcnode-id="359" instrument_node=""> and what is often euphemistically termed simple </span><a data-dcnode-id="357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/sideeffects-conventional-treat.html"><span data-dcnode-id="358" instrument_node="">side effects</span></a><span data-dcnode-id="356" instrument_node="">).</span></p><span data-dcnode-id="354" instrument_node="">
</span><p data-dcnode-id="350"><strong data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">So it is really about finding out what will work for You.</span></strong><span data-dcnode-id="351" instrument_node=""> As stated above, this continually updated website aims to give you both a sense of certainty that healing can be accomplished and as many of the vital pointers to health and healing as I am aware of from my ongoing dedicated study of the subject.</span></p><span data-dcnode-id="349" instrument_node="">
</span><p data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">I encourage you to do all the research you can, both “on site” (c. 820 pages of content plus downloads easily equivalent to a dozen printed books) and “out site”, with the Internet offering a vast resource of quality (and other ;-) information &amp; opinions on the subject to which many links are provided.</span></p><span data-dcnode-id="346" instrument_node="">
</span><p data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">One tip: remember that the “alternative cancer treatment” pool may also harbour some fish who are just or mostly “in it” for the money and/or other ego-motivated reasons (such as attention-seeking and self-glorification).</span></p><span data-dcnode-id="343" instrument_node="">
</span><p data-dcnode-id="335"><span data-dcnode-id="342" instrument_node="">And of course: human opinion on medical and other matters is very much just that, i.e. highly prone to error, including opinions emanating from “official” as well as “self-appointed” authority — as amply demonstrated throughout human history and to this very day (compare </span><a data-dcnode-id="340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/what-do-we-truly-know.html"><span data-dcnode-id="341" instrument_node="">Note on honesty and the bigger picture of healing</span></a><span data-dcnode-id="339" instrument_node=""> and my article </span><a data-dcnode-id="337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/honesty-deception-moneymaking.html"><span data-dcnode-id="338" instrument_node="">Negative experiences in the alternative cancer treatment field</span></a><span data-dcnode-id="336" instrument_node="">).</span></p><span data-dcnode-id="334" instrument_node="">
</span><p data-dcnode-id="329"><span data-dcnode-id="333" instrument_node="">The “out sites” I currently most recommend are marked as such on the </span><a data-dcnode-id="331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/selfhealth-healingcancer-links.html"><span data-dcnode-id="332" instrument_node="">Links</span></a><span data-dcnode-id="330" instrument_node=""> page and throughout the Healing Cancer Naturally website.</span></p><span data-dcnode-id="328" instrument_node="">
</span><p data-dcnode-id="324"><strong data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">One of the main and major prerequisites for healing anything at all</span></strong><span data-dcnode-id="325" instrument_node=""> seems to be a firm determination to heal, coupled with an unshakeable belief that healing can be accomplished and a readiness to “do what it takes” to achieve it, even if it may (and it seems it often does) require a number of more or less profound changes to be applied in one’s diet, environment and accustomed lifestyle.</span></p><span data-dcnode-id="323" instrument_node="">
</span><p data-dcnode-id="318"><span data-dcnode-id="322" instrument_node="">As Nelson Boswell puts is, the "first and most important step towards success is the feeling that we can succeed." and as Elliot Yudenfriend (who like many others successfully healed himself of cancer, in his case lymphoma, years ago) and probably many other successful cancer victors have summarized it, </span><strong data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">“Cancer stands for Change”</span></strong><span data-dcnode-id="319" instrument_node=""> i.e. can be considered a wake-up call. Enlarging upon this is the following insight: </span></p><span data-dcnode-id="317" instrument_node="">
</span><p data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">“I believe disease is a call for our attention, a ‘knocking at the door’, so to speak. Disease asks us to look deeply within to find the answers, so we can heal our beings, our hearts, our souls-our life. It asks us to heal in a way that, perhaps, we would never have noticed until the illness demanded our attention.”</span></p><span data-dcnode-id="314" instrument_node="">
</span><p data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">I do stand by organic eating, ecological, “clean” living in body and soul and proper stress management being next-to-indispensable major health builders and maintainers, both on the personal and global-ecological level. I don’t consider it pure coincidence that concomitantly with the increasing man-made pollution of our biosphere, incidence of cancer and other degenerative diseases has dramatically risen as well.</span></p><span data-dcnode-id="311" instrument_node="">
</span><p data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">As can be surmised by analogy from observations of plants and animals, the basis of health IS the quality of food and soil, air, sunshine and, in my view particularly so in humans, the quality of their emotional, mental and spiritual life.</span></p><span data-dcnode-id="308" instrument_node="">
</span><p data-dcnode-id="273"><span data-dcnode-id="307" instrument_node="">See </span><a data-dcnode-id="305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/healing-cancer.html"><span data-dcnode-id="306" instrument_node="">Healing Cancer ... Naturally!!!</span></a><span data-dcnode-id="304" instrument_node="">, </span><a data-dcnode-id="302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/healing-inspirational-quotes.html"><span data-dcnode-id="303" instrument_node="">Inspirational quotes for empowering cancer patients</span></a><span data-dcnode-id="301" instrument_node="">, </span><a data-dcnode-id="299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/index-treatment-nature-heals.html"><span data-dcnode-id="300" instrument_node="">Nature Heals</span></a><span data-dcnode-id="298" instrument_node="">, </span><a data-dcnode-id="296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/index-treatment-nutrition.html"><span data-dcnode-id="297" instrument_node="">Nutrition</span></a><span data-dcnode-id="295" instrument_node="">, </span><a data-dcnode-id="293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/index-treatment-detoxification.html"><span data-dcnode-id="294" instrument_node="">Detoxification</span></a><span data-dcnode-id="292" instrument_node="">, </span><a data-dcnode-id="290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/index-holistic-emotions.html"><span data-dcnode-id="291" instrument_node="">Emotions</span></a><span data-dcnode-id="289" instrument_node="">, </span><a data-dcnode-id="287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/index-holistic-energetics.html"><span data-dcnode-id="288" instrument_node="">Energetics</span></a><span data-dcnode-id="286" instrument_node="">, </span><a data-dcnode-id="284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/index-holistic-mind.html"><span data-dcnode-id="285" instrument_node="">Mind</span></a><span data-dcnode-id="283" instrument_node="">, </span><a data-dcnode-id="281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/index-holistic-spirituality.html"><span data-dcnode-id="282" instrument_node="">Spirituality</span></a><span data-dcnode-id="280" instrument_node="">, </span><a data-dcnode-id="278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/co2-micronutrients-plants.html"><span data-dcnode-id="279" instrument_node="">Rising atmospheric CO 2 decreases micronutrients in plants</span></a><span data-dcnode-id="277" instrument_node="">, </span><a data-dcnode-id="275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/organic-versus-conventional-foods.html"><span data-dcnode-id="276" instrument_node="">Organic Food</span></a><span data-dcnode-id="274" instrument_node=""> etc.</span></p><span data-dcnode-id="272" instrument_node="">
</span><p data-dcnode-id="267"><span data-dcnode-id="271" instrument_node="">As Sandy L. who is successfully healing herself of cancer (7 years in remission from stage IV ovarian cancer in 2006), astutely observes, “I personally believe, instinctively that the 'cure' (whatever it is), is there [for] everyone of us, that perhaps it is not the same cure for everyone. I prefer to believe that the 'cure' is something attainable and available to everyone. I believe there are many. ‘Seek and Ye shall find.’ That is why I believe in the </span><a data-dcnode-id="269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healingcancernaturally.com/index-budwig.html"><span data-dcnode-id="270" instrument_node="">Dr Johanna Budwig protocol</span></a><span data-dcnode-id="268" instrument_node="">, because it is natural, attainable and inexpensive.</span></p><span data-dcnode-id="266" instrument_node="">
</span><p data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">After my cancer diagnosis, I was acutely sensitized to a spiritual power who was somehow, in a way difficult to explain, helping me, guiding me and 'in my soul' (so to speak) showing me the path and leading me to 'my' solutions for healing. People were sent to me and it was up to me to recognize this 'help in disguise'.”</span></p><span data-dcnode-id="263" instrument_node="">
</span><p data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">May you recognize in the same manner the assistance coming your way. Healing Cancer Naturally stands ready as a faithul companion in this journey to healing!</span></p><span data-dcnode-id="260" instrument_node="">
</span><p data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">Wishing you the very best of health!</span></p><span data-dcnode-id="257" instrument_node="">
