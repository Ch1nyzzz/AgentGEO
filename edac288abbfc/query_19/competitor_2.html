</span><div data-dcnode-id="1672" itemscope="" itemtype="https://schema.org/CreativeWork"><img alt="vulvar cancer" data-dcnode-id="1673" itemprop="image" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/article/main_image/what-should-i-do-after-vulvar-biopsy.jpg&amp;raw" title="vulvar cancer"></div><span data-dcnode-id="1671" instrument_node="">
</span><span class="lrgArtImgCap" data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">When vulvar cancer is detected and treated early, the cure rate is greater than 90 percent.</span></span></div><span data-dcnode-id="1667" instrument_node="">
</span><p data-dcnode-id="1665"></p><span data-dcnode-id="1664" instrument_node="">
</span><p data-dcnode-id="1656"><span data-dcnode-id="1663" instrument_node="">When vulvar </span><a data-dcnode-id="1661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/cancer/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="1662" instrument_node="">cancer</span></a><span data-dcnode-id="1660" instrument_node=""> is detected and treated early, the </span><strong data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">cure rate is greater than 90 percent</span></strong><span data-dcnode-id="1657" instrument_node="">. The key to a cure is to notify your doctor as soon as you notice any warning signs and to have a biopsy performed as soon as possible.</span></p><span data-dcnode-id="1655" instrument_node="">
</span><p data-dcnode-id="1650"><span data-dcnode-id="1654" instrument_node="">Vulvar </span><a class="slidelink" data-dcnode-id="1652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/cancer_101_pictures_slideshow/article.htm" onclick="wmdTrack('embd-lnk');" rel="slide" target="_blank" title="Educational Slideshow"><span data-dcnode-id="1653" instrument_node="">cancer</span></a><span data-dcnode-id="1651" instrument_node=""> affects less than one percent of women. While it is uncommon, it is very treatable, especially in the early stages.</span></p><span data-dcnode-id="1649" instrument_node="">
</span><ul data-dcnode-id="1620"><span data-dcnode-id="1648" instrument_node="">
</span><li data-dcnode-id="1640"><span data-dcnode-id="1647" instrument_node="">Vulvar </span><a class="quizlink" data-dcnode-id="1645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/cancer_quiz/quiz.htm" onclick="wmdTrack('embd-lnk');" rel="quiz" target="_blank" title="Learning Quiz"><span data-dcnode-id="1646" instrument_node="">cancer</span></a><span data-dcnode-id="1644" instrument_node=""> is a slow-growing </span><a data-dcnode-id="1642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/tumor_grade/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="1643" instrument_node="">tumor</span></a><span data-dcnode-id="1641" instrument_node=""> that usually develops over several years.</span></li><span data-dcnode-id="1639" instrument_node="">
</span><li data-dcnode-id="1634"><span data-dcnode-id="1638" instrument_node="">For a long time, </span><a class="slidelink" data-dcnode-id="1636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/cancer_101_pictures_slideshow/article.htm" onclick="wmdTrack('embd-lnk');" rel="slide" target="_blank" title="Educational Slideshow"><span data-dcnode-id="1637" instrument_node="">precancerous</span></a><span data-dcnode-id="1635" instrument_node=""> cells can grow on the surface of the vulvar skin. The term for this precancerous condition is vulvar intraepithelial neoplasia (VIN) or dysplasia.</span></li><span data-dcnode-id="1633" instrument_node="">
</span><li data-dcnode-id="1628"><span data-dcnode-id="1632" instrument_node="">VIN is nearly completely curable. Almost all patients with vulvar cancer that has not spread to the </span><a class="imglink" data-dcnode-id="1630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/image-collection/lymph_nodes_picture/picture.htm" onclick="wmdTrack('embd-lnk');" rel="img" target="_blank" title="Medical Image"><span data-dcnode-id="1631" instrument_node="">lymph nodes</span></a><span data-dcnode-id="1629" instrument_node=""> live for at least five years.</span></li><span data-dcnode-id="1627" instrument_node="">
</span><li data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">Because VIN or dysplasia can progress to vulvar cancer, treatment for this condition is critical.</span></li><span data-dcnode-id="1624" instrument_node="">
</span><li data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">If vulvar cancer has spread to the lymph nodes, the prognosis is determined by the number of lymph nodes affected.</span></li><span data-dcnode-id="1621" instrument_node="">
</span></ul><span data-dcnode-id="1619" instrument_node="">
</span><h4 data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">Outlook for vulvar cancer</span></h4><span data-dcnode-id="1616" instrument_node="">
</span><ul data-dcnode-id="1593"><span data-dcnode-id="1615" instrument_node="">
</span><li data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">The prognosis for vulval cancer is determined by factors, such as how far your cancer has spread, age, and overall health.</span></li><span data-dcnode-id="1612" instrument_node="">
</span><li data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">In general, approximately 6 out of 10 women diagnosed with vulval cancer will live for at least five years from the time of diagnosis (five-year survival).</span></li><span data-dcnode-id="1609" instrument_node="">
</span><li data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">Even after successful treatment, cancer can reoccur in up to one out of every three cases. You will need to see your doctor regularly to see if this is happening.</span></li><span data-dcnode-id="1606" instrument_node="">
</span><li data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">In the United States, a woman has a 1/333 chance of developing it, which accounts for 6,000 cases per year.</span></li><span data-dcnode-id="1603" instrument_node="">
</span><li data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">The five-year survival rate of cancer that has not spread to lymph nodes is greater than 80 percent.</span></li><span data-dcnode-id="1600" instrument_node="">
</span><li data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">Survival is less than 50 percent after five years if inguinal nodes are involved, and only 10 to 15 percent if other nodes are involved.</span></li><span data-dcnode-id="1597" instrument_node="">
</span><li data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">Patients older than 80 years are generally diagnosed at a later stage. Less aggressive treatments generally have a lower success rate.</span></li><span data-dcnode-id="1594" instrument_node="">
</span></ul><span data-dcnode-id="1592" instrument_node="">
</span></div><span data-dcnode-id="1590" instrument_node="">
</span><div class="apPage" data-dcnode-id="1357"><span data-dcnode-id="1589" instrument_node="">
</span><div class="wrapper" data-dcnode-id="1381"><p data-dcnode-id="1586"><b data-dcnode-id="1587"><a class="bookmark" data-dcnode-id="1588" name="treatment_options_for_vulvar_cancer"></a></b></p><div data-dcnode-id="1582" itemscope="" itemtype="https://schema.org/CreativeWork"><h3 data-dcnode-id="1583"><span data-dcnode-id="1584" itemprop="alternativeHeadline"><span data-dcnode-id="1585" instrument_node="">Treatment options for vulvar cancer</span></span></h3></div><p data-dcnode-id="1581"></p><span data-dcnode-id="1580" instrument_node="">
</span><p data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">Vulvar cancer typically develops over many years, but it is easier to treat at an early stage. Treatment may include:</span></p><span data-dcnode-id="1577" instrument_node="">
</span><ul data-dcnode-id="1561"><span data-dcnode-id="1576" instrument_node="">
</span><li data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">Surgery</span></li><span data-dcnode-id="1573" instrument_node="">
</span><li data-dcnode-id="1570"><a data-dcnode-id="1571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/radiation_therapy/article.htm" onclick="wmdTrack('embd-lnk');" rel="proc"><span data-dcnode-id="1572" instrument_node="">Radiation therapy</span></a></li><span data-dcnode-id="1569" instrument_node="">
</span><li data-dcnode-id="1566"><a data-dcnode-id="1567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/chemotherapy/article.htm" onclick="wmdTrack('embd-lnk');" rel="proc"><span data-dcnode-id="1568" instrument_node="">Chemotherapy</span></a></li><span data-dcnode-id="1565" instrument_node="">
</span><li data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">Combination treatment</span></li><span data-dcnode-id="1562" instrument_node="">
</span></ul><span data-dcnode-id="1560" instrument_node="">
</span><p data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Your doctor's treatment plan will be based on the results of your tests, the type of cancer, where the cancer is located, whether it has spread, your age, and your overall health.</span></p><span data-dcnode-id="1557" instrument_node="">
</span><p data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">You will be checked regularly to see if cancer has responded to treatment.</span></p><span data-dcnode-id="1554" instrument_node="">
</span><h4 data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">Surgery</span></h4><span data-dcnode-id="1551" instrument_node="">
</span><p data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">The goal of surgery is to remove cancer from the vulva while preserving as much normal tissue as possible.</span></p><span data-dcnode-id="1548" instrument_node="">
</span><ul data-dcnode-id="1504"><span data-dcnode-id="1547" instrument_node="">
</span><li data-dcnode-id="1540"><strong data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">Laser surgery: </span></strong><span data-dcnode-id="1544" instrument_node="">Instead of a scalpel, specialists use a laser beam to make </span><a data-dcnode-id="1542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/cuts_scrapes_and_puncture_wounds/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="1543" instrument_node="">cuts</span></a><span data-dcnode-id="1541" instrument_node=""> in tissue or to remove a surface lesion or tumor.</span></li><span data-dcnode-id="1539" instrument_node="">
</span><li data-dcnode-id="1535"><strong data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Wide local excision:</span></strong><span data-dcnode-id="1536" instrument_node=""> It involves the removal of cancer and a clear margin of normal tissue around it.</span></li><span data-dcnode-id="1534" instrument_node="">
</span><li data-dcnode-id="1530"><strong data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">Radical local excision:</span></strong><span data-dcnode-id="1531" instrument_node=""> When the cancer is more advanced, the surgical procedure to remove it may necessitate the removal of a large amount of normal tissue around it, as well as nearby lymph nodes in the groin.</span></li><span data-dcnode-id="1529" instrument_node="">
</span><li data-dcnode-id="1525"><strong data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">Vulvectomy:</span></strong><span data-dcnode-id="1526" instrument_node=""> A vulvectomy is a surgical procedure that removes a portion of the entire vulva.</span></li><span data-dcnode-id="1524" instrument_node="">
</span><li data-dcnode-id="1517"><strong data-dcnode-id="1519"><span data-dcnode-id="1523" instrument_node="">Surgical aspiration using </span><a data-dcnode-id="1521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/ultrasound/article.htm" onclick="wmdTrack('embd-lnk');" rel="proc"><span data-dcnode-id="1522" instrument_node="">ultrasound</span></a><span data-dcnode-id="1520" instrument_node="">:</span></strong><span data-dcnode-id="1518" instrument_node=""> The doctor may use fine sound vibrations to break up the tumor into small pieces during this surgical procedure. The small pieces of the tumor are washed away and suctioned out. This procedure causes less damage to the surrounding tissue.</span></li><span data-dcnode-id="1516" instrument_node="">
</span><li data-dcnode-id="1506"><strong data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">Pelvic exenteration:</span></strong><span data-dcnode-id="1513" instrument_node="">&nbsp;This surgery is reserved for patients with advanced-stage </span><a data-dcnode-id="1511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/vaginal_cancer/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="1512" instrument_node="">vaginal cancer</span></a><span data-dcnode-id="1510" instrument_node=""> (stage IV) or who have had a recurrence of their vaginal cancer despite conventional treatment. Pelvic exenteration surgery involves the removal of the lower colon, rectum, and bladder. The cervix, vagina, ovaries, and nearby lymph nodes are also removed. To allow urine and </span><a data-dcnode-id="1508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/stool_color_changes/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="1509" instrument_node="">stool</span></a><span data-dcnode-id="1507" instrument_node=""> to flow from the body into a collection bag, artificial openings (stomas) are created on the abdomen.</span></li><span data-dcnode-id="1505" instrument_node="">
</span></ul><span data-dcnode-id="1503" instrument_node="">
</span><p data-dcnode-id="1498"><span data-dcnode-id="1502" instrument_node="">Even if the doctor removes all visible cancer during the surgery, some patients may require additional chemotherapy or </span><a data-dcnode-id="1500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/radiation_therapy/article.htm" onclick="wmdTrack('embd-lnk');" rel="proc"><span data-dcnode-id="1501" instrument_node="">radiation</span></a><span data-dcnode-id="1499" instrument_node=""> therapy to kill any cancer cells that remain.</span></p><span data-dcnode-id="1497" instrument_node="">
</span><h4 data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">Radiation therapy</span></h4><span data-dcnode-id="1494" instrument_node="">
</span><p data-dcnode-id="1489"><span data-dcnode-id="1493" instrument_node="">Radiation therapy is a type of cancer treatment that uses high-energy </span><a data-dcnode-id="1491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/x-rays/article.htm" onclick="wmdTrack('embd-lnk');" rel="proc"><span data-dcnode-id="1492" instrument_node="">X-rays</span></a><span data-dcnode-id="1490" instrument_node=""> or other types of radiation to either kill or prevent cancer cells from growing.</span></p><span data-dcnode-id="1488" instrument_node="">
</span><p data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">Radiation therapy is classified into two types.&nbsp;</span></p><span data-dcnode-id="1485" instrument_node="">
</span><ol data-dcnode-id="1474"><span data-dcnode-id="1484" instrument_node="">
</span><li data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">External radiation therapy directs radiation to cancer using a machine located outside the body.</span></li><span data-dcnode-id="1481" instrument_node="">
</span><li data-dcnode-id="1476"><span data-dcnode-id="1480" instrument_node="">Internal radiation therapy, also called </span><a data-dcnode-id="1478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/brachytherapy/article.htm" onclick="wmdTrack('embd-lnk');" rel="proc"><span data-dcnode-id="1479" instrument_node="">brachytherapy</span></a><span data-dcnode-id="1477" instrument_node="">, involves the use of a radioactive substance that is sealed in needles, seeds, wires, or catheters that are inserted directly into or near cancer.</span></li><span data-dcnode-id="1475" instrument_node="">
</span></ol><span data-dcnode-id="1473" instrument_node="">
</span><h4 data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">Chemotherapy</span></h4><span data-dcnode-id="1470" instrument_node="">
</span><ul data-dcnode-id="1456"><span data-dcnode-id="1469" instrument_node="">
</span><li data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">Chemotherapy is a cancer treatment that employs medicines to halt the growth of cancer cells, either by killing them or preventing them from dividing.&nbsp;</span></li><span data-dcnode-id="1466" instrument_node="">
</span><li data-dcnode-id="1461"><span data-dcnode-id="1465" instrument_node="">Chemotherapy </span><a data-dcnode-id="1463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/drugs_what_you_should_know_about_your_drugs/article.htm" onclick="wmdTrack('embd-lnk');" rel="pharm"><span data-dcnode-id="1464" instrument_node="">drugs</span></a><span data-dcnode-id="1462" instrument_node=""> enter the bloodstream and can affect cancer cells throughout the body when taken orally or injected into a vein or muscle.&nbsp;</span></li><span data-dcnode-id="1460" instrument_node="">
</span><li data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">Topical chemotherapy, in the form of a cream or lotion, may sometimes be applied to the vagina.</span></li><span data-dcnode-id="1457" instrument_node="">
</span></ul><span data-dcnode-id="1455" instrument_node="">
</span><h4 data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">Immunotherapy</span></h4><span data-dcnode-id="1452" instrument_node="">
</span><ul data-dcnode-id="1441"><span data-dcnode-id="1451" instrument_node="">
</span><li data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">This type of cancer treatment employs your immune system to combat the disease.</span></li><span data-dcnode-id="1448" instrument_node="">
</span><li data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">Immunotherapy uses substances produced by your body or created in a laboratory to boost, direct, or rebuild the body's natural anti-cancer defenses.&nbsp;</span></li><span data-dcnode-id="1445" instrument_node="">
</span><li data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">Imiquimod is an immunotherapy that is applied to the skin in the form of a cream to treat vulvar lesions.</span></li><span data-dcnode-id="1442" instrument_node="">
</span></ul><span data-dcnode-id="1440" instrument_node="">
</span><h4 data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">Side effects of vulvar cancer treatments</span></h4><span data-dcnode-id="1437" instrument_node="">
</span><p data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">There may be some treatment complications you experience once the treatment is finished, which are:</span></p><span data-dcnode-id="1434" instrument_node="">
</span><ul data-dcnode-id="1382"><span data-dcnode-id="1433" instrument_node="">
</span><li data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">Change in bowel patterns</span></li><span data-dcnode-id="1430" instrument_node="">
</span><li data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">Infections</span></li><span data-dcnode-id="1427" instrument_node="">
</span><li data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">Changes in skin color around the vulva</span></li><span data-dcnode-id="1424" instrument_node="">
</span><li data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">Abnormal urination</span></li><span data-dcnode-id="1421" instrument_node="">
</span><li data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">Discomfort during sexual intercourse</span></li><span data-dcnode-id="1418" instrument_node="">
</span><li data-dcnode-id="1412"><a data-dcnode-id="1416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/fatigue/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="1417" instrument_node="">Fatigue</span></a><span data-dcnode-id="1415" instrument_node=""> and </span><a data-dcnode-id="1413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/weakness/symptoms.htm" onclick="wmdTrack('embd-lnk');" rel="sym"><span data-dcnode-id="1414" instrument_node="">weakness</span></a></li><span data-dcnode-id="1411" instrument_node="">
</span><li data-dcnode-id="1408"><a data-dcnode-id="1409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/dyspepsia/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="1410" instrument_node="">Upset stomach</span></a></li><span data-dcnode-id="1407" instrument_node="">
</span><li data-dcnode-id="1398"><a data-dcnode-id="1405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/diarrhea/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="1406" instrument_node="">Diarrhea</span></a><span data-dcnode-id="1404" instrument_node="">,&nbsp;</span><a data-dcnode-id="1402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/nausea_and_vomiting/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="1403" instrument_node="">nausea</span></a><span data-dcnode-id="1401" instrument_node="">, and </span><a data-dcnode-id="1399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/nausea_and_vomiting/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="1400" instrument_node="">vomiting</span></a></li><span data-dcnode-id="1397" instrument_node="">
</span><li data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">Low blood counts</span></li><span data-dcnode-id="1394" instrument_node="">
</span><li data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">Mouth or vaginal sores</span></li><span data-dcnode-id="1391" instrument_node="">
</span><li data-dcnode-id="1387"><span data-dcnode-id="1390" instrument_node="">Temporary </span><a data-dcnode-id="1388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/hair_loss/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="1389" instrument_node="">hair loss</span></a></li><span data-dcnode-id="1386" instrument_node="">
</span><li data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">Reduction of sexual desire or pleasure</span></li><span data-dcnode-id="1383" instrument_node="">
</span></ul></div><span data-dcnode-id="1380" instrument_node="">
</span><a class="mediaPrmo ss" data-dcnode-id="1363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/skin_cancer_pictures_slideshow/article.htm" onclick="wmdTrack('ssprmo-arttop');" target="_blank"><span data-dcnode-id="1379" instrument_node="">
</span><img data-dcnode-id="1378" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com//images/slideshow/skin_cancer_s1_warning_signs.jpg&amp;raw"><span data-dcnode-id="1377" instrument_node="">
</span><span class="skew" data-dcnode-id="1376"></span><span data-dcnode-id="1375" instrument_node="">
</span><span class="icon-slideshow" data-dcnode-id="1374"></span><span data-dcnode-id="1373" instrument_node="">
</span><h4 class="label" data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">SLIDESHOW</span></h4><span data-dcnode-id="1370" instrument_node="">
</span><span class="caption" data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">Skin Cancer Symptoms, Types, Images</span></span><span data-dcnode-id="1367" instrument_node="">
</span><span class="btn" data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">See Slideshow</span></span><span data-dcnode-id="1364" instrument_node="">
</span></a><span data-dcnode-id="1362" instrument_node="">
</span><div class="medianet" data-dcnode-id="1359" id="342852582-2"></div><span data-dcnode-id="1358" instrument_node="">
</span></div><div class="apPage" data-dcnode-id="979"><span data-dcnode-id="1356" instrument_node="">
</span><div class="wrapper" data-dcnode-id="1273"><p data-dcnode-id="1353"><b data-dcnode-id="1354"><a class="bookmark" data-dcnode-id="1355" name="what_is_vulvar_cancer"></a></b></p><div data-dcnode-id="1349" itemscope="" itemtype="https://schema.org/CreativeWork"><h3 data-dcnode-id="1350"><span data-dcnode-id="1351" itemprop="alternativeHeadline"><span data-dcnode-id="1352" instrument_node="">What is vulvar cancer?</span></span></h3></div><p data-dcnode-id="1348"></p><span data-dcnode-id="1347" instrument_node="">
</span><p data-dcnode-id="1342"><span data-dcnode-id="1346" instrument_node="">Vulvar cancer is characterized by the abnormal growth of </span><a class="slidelink" data-dcnode-id="1344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/cancer_101_pictures_slideshow/article.htm" onclick="wmdTrack('embd-lnk');" rel="slide" target="_blank" title="Educational Slideshow"><span data-dcnode-id="1345" instrument_node="">malignant</span></a><span data-dcnode-id="1343" instrument_node=""> cells in the vulva, which contains:</span></p><span data-dcnode-id="1341" instrument_node="">
</span><ul data-dcnode-id="1327"><span data-dcnode-id="1340" instrument_node="">
</span><li data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">Inner and outer vaginal lips</span></li><span data-dcnode-id="1337" instrument_node="">
</span><li data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">The clitoris</span></li><span data-dcnode-id="1334" instrument_node="">
</span><li data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">The vaginal opening</span></li><span data-dcnode-id="1331" instrument_node="">
</span><li data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">The vaginal glands</span></li><span data-dcnode-id="1328" instrument_node="">
</span></ul><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Vulvar cancer is a rare type of cancer that occurs when cancerous cells develop in any part of the vulva.</span></p><span data-dcnode-id="1323" instrument_node="">
</span><h4 data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">Common symptoms of vulvar cancer</span></h4><span data-dcnode-id="1320" instrument_node="">
</span><p data-dcnode-id="1316"><a data-dcnode-id="1318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/itch/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="1319" instrument_node="">Itching</span></a><span data-dcnode-id="1317" instrument_node=""> around the vaginal area is common in women with this condition and can last for years.</span></p><span data-dcnode-id="1315" instrument_node="">
</span><p data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">Other skin changes that may occur in the vicinity of the vulva are:</span></p><span data-dcnode-id="1312" instrument_node="">
</span><ul data-dcnode-id="1274"><span data-dcnode-id="1311" instrument_node="">
</span><li data-dcnode-id="1306"><span data-dcnode-id="1310" instrument_node="">Mole or </span><a class="slidelink" data-dcnode-id="1308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/skin_problems_pictures_slideshow/article.htm" onclick="wmdTrack('embd-lnk');" rel="slide" target="_blank" title="Educational Slideshow"><span data-dcnode-id="1309" instrument_node="">freckle</span></a><span data-dcnode-id="1307" instrument_node="">, which may be pink, red, white, or gray</span></li><span data-dcnode-id="1305" instrument_node="">
</span><li data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">Skin thickening or lump</span></li><span data-dcnode-id="1302" instrument_node="">
</span><li data-dcnode-id="1298"><a data-dcnode-id="1300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/pain_management/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="1301" instrument_node="">Pain</span></a><span data-dcnode-id="1299" instrument_node=""> or burning with urination</span></li><span data-dcnode-id="1297" instrument_node="">
</span><li data-dcnode-id="1293"><a class="quizlink" data-dcnode-id="1295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/pain_quiz/quiz.htm" onclick="wmdTrack('embd-lnk');" rel="quiz" target="_blank" title="Learning Quiz"><span data-dcnode-id="1296" instrument_node="">Pain</span></a><span data-dcnode-id="1294" instrument_node=""> with intercourse</span></li><span data-dcnode-id="1292" instrument_node="">
</span><li data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">Unusual odor</span></li><span data-dcnode-id="1289" instrument_node="">
</span><li data-dcnode-id="1284"><span data-dcnode-id="1288" instrument_node="">Wart-like </span><a data-dcnode-id="1286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/bumps_on_skin/symptoms.htm" onclick="wmdTrack('embd-lnk');" rel="sym"><span data-dcnode-id="1287" instrument_node="">bumps</span></a><span data-dcnode-id="1285" instrument_node="">, cauliflower-like growths or ulcers, or sores on the vulva that last more than a month</span></li><span data-dcnode-id="1283" instrument_node="">
</span><li data-dcnode-id="1279"><span data-dcnode-id="1282" instrument_node="">Burning or bleeding and discharge not related to your </span><a data-dcnode-id="1280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/menstruation/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="1281" instrument_node="">menstrual cycle</span></a></li><span data-dcnode-id="1278" instrument_node="">
</span><li data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">Enlarged lymph glands in your groin</span></li><span data-dcnode-id="1275" instrument_node="">
</span></ul></div><div class="wrapper" data-dcnode-id="1146"><p data-dcnode-id="1270"><b data-dcnode-id="1271"><a class="bookmark" data-dcnode-id="1272" name="what_are_the_risk_factors_of_vulvar_cancer"></a></b></p><div data-dcnode-id="1266" itemscope="" itemtype="https://schema.org/CreativeWork"><h3 data-dcnode-id="1267"><span data-dcnode-id="1268" itemprop="alternativeHeadline"><span data-dcnode-id="1269" instrument_node="">What are the risk factors of vulvar cancer?</span></span></h3></div><p data-dcnode-id="1265"></p><span data-dcnode-id="1264" instrument_node="">
</span><p data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">Although the specific cause of vulvar cancer is unknown, some risk factors appear to enhance your chances of developing the condition, including:</span></p><span data-dcnode-id="1261" instrument_node="">
</span><ul data-dcnode-id="1195"><span data-dcnode-id="1260" instrument_node="">
</span><li data-dcnode-id="1256"><strong data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">Increasing age:</span></strong><span data-dcnode-id="1257" instrument_node=""> Vulvar cancer risk increases with age although it can occur at any age. The average age at diagnosis is 65 years.</span></li><span data-dcnode-id="1255" instrument_node="">
</span><li data-dcnode-id="1237"><strong data-dcnode-id="1247"><span data-dcnode-id="1254" instrument_node="">Being exposed to </span><a data-dcnode-id="1252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/hpv_infection_human_papillomavirus/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="1253" instrument_node="">human papillomavirus</span></a><span data-dcnode-id="1251" instrument_node=""> (</span><a data-dcnode-id="1249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/hpv_infection_human_papillomavirus/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="1250" instrument_node="">HPV</span></a><span data-dcnode-id="1248" instrument_node="">): </span></strong><a class="imglink" data-dcnode-id="1245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/image-collection/genital_warts_hpv_picture/picture.htm" onclick="wmdTrack('embd-lnk');" rel="img" target="_blank" title="Medical Image"><span data-dcnode-id="1246" instrument_node="">HPV</span></a><span data-dcnode-id="1244" instrument_node=""> infection raises the risk of a variety of </span><a data-dcnode-id="1242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/cancer/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="1243" instrument_node="">cancers</span></a><span data-dcnode-id="1241" instrument_node="">, including vulval and </span><a data-dcnode-id="1239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/cervical_cancer/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="1240" instrument_node="">cervical cancer</span></a><span data-dcnode-id="1238" instrument_node="">. Many young, sexually active people are infected with HPV, but the infection usually resolves on its own. For some, the infection causes cell changes, increasing their risk of developing cancer in the future.</span></li><span data-dcnode-id="1236" instrument_node="">
</span><li data-dcnode-id="1224"><strong data-dcnode-id="1232"><a data-dcnode-id="1234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/smoking_and_quitting_smoking/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="1235" instrument_node="">Smoking</span></a><span data-dcnode-id="1233" instrument_node=""> cigarettes:</span></strong><span data-dcnode-id="1231" instrument_node=""> </span><a data-dcnode-id="1229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/smoking_and_quitting_smoking/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="1230" instrument_node="">Cigarette</span></a><span data-dcnode-id="1228" instrument_node=""> smoke consists of many cancer-causing chemicals. Both passive and active </span><a class="slidelink" data-dcnode-id="1226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/smoking_effects_pictures_slideshow/article.htm" onclick="wmdTrack('embd-lnk');" rel="slide" target="_blank" title="Educational Slideshow"><span data-dcnode-id="1227" instrument_node="">smoking</span></a><span data-dcnode-id="1225" instrument_node=""> can increase the risk of several cancers including vulval cancer.</span></li><span data-dcnode-id="1223" instrument_node="">
</span><li data-dcnode-id="1213"><strong data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Having a weakened immune system: </span></strong><span data-dcnode-id="1220" instrument_node="">People who take immunosuppressive medications, such as those who have had organ transplants and those who have immunosuppressive conditions, such as </span><a data-dcnode-id="1218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/human_immunodeficiency_virus_hiv/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="1219" instrument_node="">human immunodeficiency virus</span></a><span data-dcnode-id="1217" instrument_node=""> (</span><a data-dcnode-id="1215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/human_immunodeficiency_virus_hiv/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="1216" instrument_node="">HIV</span></a><span data-dcnode-id="1214" instrument_node="">), are at a higher risk of developing vulval cancer.</span></li><span data-dcnode-id="1212" instrument_node="">
</span><li data-dcnode-id="1208"><strong data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">Having a history of precancerous conditions of the vulva: </span></strong><span data-dcnode-id="1209" instrument_node="">A small number of vulvar intraepithelial neoplasia cases may progress to invasive vulvar cancer. As a result, your doctor may advise treatment to remove the abnormal cells and periodic follow-ups.</span></li><span data-dcnode-id="1207" instrument_node="">
</span><li data-dcnode-id="1197"><strong data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">Having a skin condition involving the vulva:</span></strong><span data-dcnode-id="1204" instrument_node=""> </span><a data-dcnode-id="1202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/lichen_sclerosus/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="1203" instrument_node="">Lichen sclerosus</span></a><span data-dcnode-id="1201" instrument_node="">, which causes thin and </span><a data-dcnode-id="1199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/itch/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="1200" instrument_node="">itchy</span></a><span data-dcnode-id="1198" instrument_node=""> vulval skin, raises the risk of vulval cancer.</span></li><span data-dcnode-id="1196" instrument_node="">
</span></ul><span data-dcnode-id="1194" instrument_node="">
</span><h4 data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">Tests to diagnose vulvar cancer</span></h4><span data-dcnode-id="1191" instrument_node="">
</span><ul data-dcnode-id="1153"><span data-dcnode-id="1190" instrument_node="">
</span><li data-dcnode-id="1183"><strong data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">X-ray of the chest:</span></strong><span data-dcnode-id="1187" instrument_node=""> Done to see if cancer has spread to the </span><a class="imglink" data-dcnode-id="1185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/image-collection/lungs_picture/picture.htm" onclick="wmdTrack('embd-lnk');" rel="img" target="_blank" title="Medical Image"><span data-dcnode-id="1186" instrument_node="">lungs</span></a><span data-dcnode-id="1184" instrument_node="">.</span></li><span data-dcnode-id="1182" instrument_node="">
</span><li data-dcnode-id="1175"><strong data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">Computed tomography scan:</span></strong><span data-dcnode-id="1179" instrument_node=""> Done to detect large vulvar tumors or </span><a data-dcnode-id="1177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/swollen_lymph_nodes/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="1178" instrument_node="">enlarged lymph nodes</span></a><span data-dcnode-id="1176" instrument_node="">.</span></li><span data-dcnode-id="1174" instrument_node="">
</span><li data-dcnode-id="1165"><strong data-dcnode-id="1170"><a data-dcnode-id="1172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/mri_scan/article.htm" onclick="wmdTrack('embd-lnk');" rel="proc"><span data-dcnode-id="1173" instrument_node="">Magnetic resonance imaging</span></a><span data-dcnode-id="1171" instrument_node="">:</span></strong><span data-dcnode-id="1169" instrument_node=""> Used to identify pelvic tumors and </span><a data-dcnode-id="1167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/swollen_lymph_nodes/symptoms.htm" onclick="wmdTrack('embd-lnk');" rel="sym"><span data-dcnode-id="1168" instrument_node="">enlarged lymph nodes</span></a><span data-dcnode-id="1166" instrument_node=""> in the groin. This test may not be required in patients with early vulvar cancer.</span></li><span data-dcnode-id="1164" instrument_node="">
</span><li data-dcnode-id="1160"><strong data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">Positron emission tomography scan:</span></strong><span data-dcnode-id="1161" instrument_node=""> This test generates three-dimensional images of the internal organs of the body. This test can detect cancer cells and determine whether cancer has spread to lymph nodes.</span></li><span data-dcnode-id="1159" instrument_node="">
</span><li data-dcnode-id="1155"><strong data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Sentinel node biopsy: </span></strong><span data-dcnode-id="1156" instrument_node="">A dye is injected near the tumor, and it travels to the lymph nodes via the lymph vessels. Sentinel node detection has increased to 95 percent or higher due to the dyes that make the nodes glow under special goggles. International trials are being led by researchers to validate the role of sentinel node biopsy in vulvar cancer.</span></li><span data-dcnode-id="1154" instrument_node="">
</span></ul><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Precancerous conditions on the vulva may be detected during a routine annual visit to the gynecologist before the onset of symptoms. Self-examination in front of a mirror may also aid in the early detection of vulvar abnormalities.</span></p><span data-dcnode-id="1149" instrument_node="">
</span><p data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Any new findings, especially raised, whitish, hyper-pigmented, or painful ulcers should be immediately reported to your doctor.</span></p></div><span data-dcnode-id="1145" instrument_node="">

</span><div class="wrapper" data-dcnode-id="889"><p data-dcnode-id="952"><b data-dcnode-id="953"><a class="bookmark" data-dcnode-id="954" name="what_are_the_common_types_of_vulvar_cancer"></a></b></p><div data-dcnode-id="948" itemscope="" itemtype="https://schema.org/CreativeWork"><h3 data-dcnode-id="949"><span data-dcnode-id="950" itemprop="alternativeHeadline"><span data-dcnode-id="951" instrument_node="">What are the common types of vulvar cancer?</span></span></h3></div><p data-dcnode-id="947"></p><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">There are various types of vulvar cancer. Doctors may be able to evaluate treatment strategies based on the type of cancer, including:</span></p><span data-dcnode-id="943" instrument_node="">
</span><ul data-dcnode-id="927"><span data-dcnode-id="942" instrument_node="">
</span><li data-dcnode-id="936"><strong data-dcnode-id="938"><a data-dcnode-id="940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/skin_cancer_overview/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="941" instrument_node="">Squamous cell carcinoma</span></a><span data-dcnode-id="939" instrument_node="">:</span></strong><span data-dcnode-id="937" instrument_node=""> Squamous cell carcinomas account for 80 percent of vulvar cancers and are typically found on the vaginal lips.</span></li><span data-dcnode-id="935" instrument_node="">
</span><li data-dcnode-id="929"><strong data-dcnode-id="931"><a class="slidelink" data-dcnode-id="933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/lung_cancer_pictures_slideshow/article.htm" onclick="wmdTrack('embd-lnk');" rel="slide" target="_blank" title="Educational Slideshow"><span data-dcnode-id="934" instrument_node="">Adenocarcinoma</span></a><span data-dcnode-id="932" instrument_node="">:</span></strong><span data-dcnode-id="930" instrument_node=""> Adenocarcinomas account for approximately eight percent of vulvar cancers and are typically found on the sides of the vaginal opening.</span></li><span data-dcnode-id="928" instrument_node="">
</span></ul><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Other types of vulvar cancer, accounting for less than 10 percent of all vulvar cancers, include:</span></p><span data-dcnode-id="923" instrument_node="">
</span><ul data-dcnode-id="890"><span data-dcnode-id="922" instrument_node="">
</span><li data-dcnode-id="913"><strong data-dcnode-id="918"><a data-dcnode-id="920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/melanoma/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="921" instrument_node="">Melanoma</span></a><span data-dcnode-id="919" instrument_node="">:</span></strong><span data-dcnode-id="917" instrument_node=""> </span><a class="quizlink" data-dcnode-id="915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/skin_cancer_melanoma_quiz/quiz.htm" onclick="wmdTrack('embd-lnk');" rel="quiz" target="_blank" title="Learning Quiz"><span data-dcnode-id="916" instrument_node="">Melanoma</span></a><span data-dcnode-id="914" instrument_node=""> of the pigment cells accounts for 6 out of every 100 vulvar cancers and is typically found on light-exposed areas of the body.</span></li><span data-dcnode-id="912" instrument_node="">
</span><li data-dcnode-id="905"><strong data-dcnode-id="907"><span data-dcnode-id="911" instrument_node="">Extramammary </span><a data-dcnode-id="909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/pagets_disease/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="910" instrument_node="">Paget disease</span></a><span data-dcnode-id="908" instrument_node="">:</span></strong><span data-dcnode-id="906" instrument_node=""> Accounts for less than two percent of all vulvar cancers.</span></li><span data-dcnode-id="904" instrument_node="">
</span><li data-dcnode-id="900"><strong data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Sarcomas: </span></strong><span data-dcnode-id="901" instrument_node="">Sarcomas account for less than 2 out of every 100 vulvar cancers. Vulvar sarcomas, unlike other vulvar cancers, can occur in females at any age, including childhood.</span></li><span data-dcnode-id="899" instrument_node="">
</span><li data-dcnode-id="892"><strong data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Basal cell carcinomas:</span></strong><span data-dcnode-id="896" instrument_node=""> The most common type of </span><a data-dcnode-id="894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/skin_cancer_overview/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="895" instrument_node="">skin cancer</span></a><span data-dcnode-id="893" instrument_node="">, basal cell, is frequently found on sun-exposed areas of the skin, but rarely on the vulva.</span></li><span data-dcnode-id="891" instrument_node="">
</span></ul></div><div class="wrapper" data-dcnode-id="854"><p data-dcnode-id="886"><b data-dcnode-id="887"><a class="bookmark" data-dcnode-id="888" name="what_are_the_different_stages_of_vulvar_cancer"></a></b></p><div data-dcnode-id="882" itemscope="" itemtype="https://schema.org/CreativeWork"><h3 data-dcnode-id="883"><span data-dcnode-id="884" itemprop="alternativeHeadline"><span data-dcnode-id="885" instrument_node="">What are the different stages of vulvar cancer?</span></span></h3></div><p data-dcnode-id="881"></p><span data-dcnode-id="880" instrument_node="">
</span><p data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">Doctors use the International Federation of Gynaecology and Obstetrics (FIGO) staging system for vulval cancer, which contains the following 4 stages:</span></p><span data-dcnode-id="877" instrument_node="">
</span><ol data-dcnode-id="855"><span data-dcnode-id="876" instrument_node="">
</span><li data-dcnode-id="872"><strong data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">Stage I:</span></strong><span data-dcnode-id="873" instrument_node=""> Cancer has spread to the vulva.</span></li><span data-dcnode-id="871" instrument_node="">
</span><li data-dcnode-id="867"><strong data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Stage II:</span></strong><span data-dcnode-id="868" instrument_node=""> Cancer has spread to other parts of the body, such as the lower vagina, anus, or lower urethra (the tube through which the urine exits the body), but the lymph nodes are unaffected.</span></li><span data-dcnode-id="866" instrument_node="">
</span><li data-dcnode-id="862"><strong data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Stage III:</span></strong><span data-dcnode-id="863" instrument_node=""> Cancer has spread to the lymph nodes nearby.</span></li><span data-dcnode-id="861" instrument_node="">
</span><li data-dcnode-id="857"><strong data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Stage IV:</span></strong><span data-dcnode-id="858" instrument_node=""> Cancer has spread to other parts of the body, including lymph nodes in distant locations. This could be to nearby organs, such as the bladder or bowel (Stage IVA), or to distant organs, such as the lungs (Stage IVB).</span></li><span data-dcnode-id="856" instrument_node="">
</span></ol></div><span data-dcnode-id="853" instrument_node="">

</span><li data-dcnode-id="709"><a data-dcnode-id="710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/how_long_does_a_vulvar_biopsy_take_to_heal/article.htm" onclick="wmdTrack('lr-top10_07');"><img data-dcnode-id="715" height="80" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-what-should-i-do-after-vulvar-biopsy.jpg&amp;raw" width="80"><h4 data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">How Long Does a Vulvar Biopsy Take to Heal?</span></h4><div class="relContent" data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">A vulval or vulvar biopsy is a surgical procedure in which your doctor/gynecologist will remove a small piece of tissue from the vulval skin or mucosal membranes for laboratory investigation.</span></div></a></li><span data-dcnode-id="708" instrument_node="">
</span><li data-dcnode-id="701"><a data-dcnode-id="702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/is_cancer_contagious/article.htm" onclick="wmdTrack('lr-top10_08');"><img data-dcnode-id="707" height="80" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-cancer-contagious.jpg&amp;raw" width="80"><h4 data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Is Cancer Contagious?</span></h4><div class="relContent" data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Cancer is an abnormal growth of cells. A variety of parasites and viruses have been linked to various cancers. Cancer may metastasize, spreading from its original location to other organs. If you have cancer, you should seek medical care immediately if you experience
high 
fever, 
shortness of breath, intense 
headaches, 
vomiting blood or passing blood rectally, 
chest pain or moderate to severe 
weakness, passing out (fainting), mental status changes, or 
seizures.</span></div></a></li><span data-dcnode-id="700" instrument_node="">
</span><li data-dcnode-id="693"><a data-dcnode-id="694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/skin_cancer_pictures_slideshow/article.htm" onclick="wmdTrack('lr-top10_09');"><img data-dcnode-id="699" height="80" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/slideshow/featured-slideshow/featured-skin-cancer.jpg&amp;raw" width="80"><h4 data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Skin Cancer Slideshow</span></h4><div class="relContent" data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Discover the causes, types, and treatments of skin cancer. Learn how to prevent skin cancer and how to check for melanoma, basal cell carcinoma, and squamous cell carcinoma. Also, find out how to spot the early signs of skin cancer.</span></div></a></li><span data-dcnode-id="692" instrument_node="">
</span><li data-dcnode-id="685"><a data-dcnode-id="686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/what_are_the_odds_of_getting_cancer/article.htm" onclick="wmdTrack('lr-top10_10');"><img data-dcnode-id="691" height="80" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-cancer-cells-1.jpg&amp;raw" width="80"><h4 data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">What Are the Odds of Getting Cancer?</span></h4><div class="relContent" data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">The term cancer refers to uncontrolled growth of cells in the body. There are trillions of cells in our body. Under normal circumstances, the cells grow and divide according to the body’s needs. When the cells become old or develop any abnormality, they die.</span></div></a></li><span data-dcnode-id="684" instrument_node="">
</span><li data-dcnode-id="677"><a data-dcnode-id="678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/what_are_the_three_top_cancer_killers/article.htm" onclick="wmdTrack('lr-top10_11');"><img data-dcnode-id="683" height="80" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-microscopic-cancer-cell-tumor-illustration-rendering.jpg&amp;raw" width="80"><h4 data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">What Are the Three Top Cancer Killers?</span></h4><div class="relContent" data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Cancer is a group of diseases that occur when abnormal cells spread uncontrollably throughout the body. The top three cancer killers are lung cancer, colorectal cancer, and breast cancer.</span></div></a></li><span data-dcnode-id="676" instrument_node="">
</span><li data-dcnode-id="669"><a data-dcnode-id="670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/what_is_the_most_survivable_cancer/article.htm" onclick="wmdTrack('lr-top10_12');"><img data-dcnode-id="675" height="80" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-anal-cancer-survival-rates-by-stage.jpg&amp;raw" width="80"><h4 data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">What Is the Most Survivable Cancer?</span></h4><div class="relContent" data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Most of the cancers, if diagnosed and treated in early stages, are definitely survivable. The main issue is timely detection. Many types of cancer are still very difficult to detect in early stages because of their location, vague symptoms and late reporting by patients. Higher survival rates are largely because of several factors including not only early detection but also better treatment approaches.</span></div></a></li><span data-dcnode-id="668" instrument_node="">
</span><li data-dcnode-id="661"><a data-dcnode-id="662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/what_should_i_do_after_a_vulvar_biopsy/article.htm" onclick="wmdTrack('lr-top10_13');"><img data-dcnode-id="667" height="80" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-what-should-i-do-after-vulvar-biopsy.jpg&amp;raw" width="80"><h4 data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">What Should I Do After a Vulvar Biopsy?</span></h4><div class="relContent" data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">A vulvar biopsy is a surgical procedure where a small piece of tissue is extracted from the vulva. A vulvar biopsy is performed on discolored areas, lumps, sores and genital warts that don't heal. After a vulvar biopsy, follow instructions to keep the area clean and dry, do not wash the biopsy region for 12 hours and apply direct pressure on the site if it bleeds.</span></div></a></li><span data-dcnode-id="660" instrument_node="">
</span><li data-dcnode-id="653"><a data-dcnode-id="654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/what_type_of_cancer_makes_you_very_tired/article.htm" onclick="wmdTrack('lr-top10_14');"><img data-dcnode-id="659" height="80" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/article/main_image/targeted-cancer-therapy.jpg&amp;raw" width="80"><h4 data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">What Type of Cancer Makes You Very Tired?</span></h4><div class="relContent" data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Extreme and recurrent tiredness is one of the common symptoms of most types of cancers. Tiredness is usually considered a warning sign of cancer progressing. Tiredness related to cancers usually does not get better with adequate rest or sleep.</span></div></a></li><span data-dcnode-id="652" instrument_node="">
</span><li data-dcnode-id="645"><a data-dcnode-id="646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/which_cancer_is_the_most_painful/article.htm" onclick="wmdTrack('lr-top10_15');"><img data-dcnode-id="651" height="80" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-cancer-cells-1.jpg&amp;raw" width="80"><h4 data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Which Cancer Is the Most Painful?</span></h4><div class="relContent" data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Cancer spreading to the bone is the most painful type of cancer. Pain can be caused by a tumor pressing on the nerves around the bone. As the tumor size increases, it can release chemicals that irritate the area around the tumor.</span></div></a></li><span data-dcnode-id="644" instrument_node="">
</span><li data-dcnode-id="637"><a data-dcnode-id="638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/which_is_the_deadliest_cancer/article.htm" onclick="wmdTrack('lr-top10_16');"><img data-dcnode-id="643" height="80" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-cancer-cells-1.jpg&amp;raw" width="80"><h4 data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">Which Is the Deadliest Cancer?</span></h4><div class="relContent" data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Lung cancer is considered to be the most deadly cancer. More people die from lung cancer each year than from breast, colorectal and prostate cancer combined.</span></div></a></li><span data-dcnode-id="636" instrument_node="">
</span></ul><div class="gradient" data-dcnode-id="634"></div><div class="more" data-dcnode-id="632"><span class="icon-arrow-right2" data-dcnode-id="633"></span></div><span data-dcnode-id="631" instrument_node="">
