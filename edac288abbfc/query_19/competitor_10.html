</span><span data-dcnode-id="1692"><span data-dcnode-id="1702" instrument_node="">
  If you are looking to find 100% medical or scientific backed-up data on how to cure cancer herbally, then this book is probably not for you.</span><br data-dcnode-id="1701"><br data-dcnode-id="1700"><span data-dcnode-id="1699" instrument_node="">However, if you are willing to sincerely listen to mostly anecdotal evidence, and learn about some proven botanical science on the chemical properties of the aloe arborescens plant (which is not the aloe vera more commonly found in nurseries), then this book will absolutely open your mind.  Over the past decades, Father Zago, a humble Franciscan friar, has collected the anecdotal knowledge of South America's natives, and reports that cancer can be cured with a simple herbal syrup that anyone can make at home, with the right ingredients.  The book is written in easy-to-read terms, and -- without confrontationally challenging traditional official western medicine -- advocates for natural approaches to treating cancer.</span><br data-dcnode-id="1698"><br data-dcnode-id="1697"><span data-dcnode-id="1696" instrument_node="">Whether you believe or not in alternative medicine, this book is packed with personal stories of people claiming to have been cured by aloe arborescens.</span><br data-dcnode-id="1695"><br data-dcnode-id="1694"><span data-dcnode-id="1693" instrument_node="">If you are confronted with cancer, and you feel that you are in a position of needing to choose between the surgery/chemo/radiation  therapy offered by a western medicine oncologist, vs. a more natural approach to trying a cure, then this book is a must.  You will be able to make a more informed decision for what you think will work best for you -- maybe even integrate the two approaches (canonical and herbal).
</span></span><span data-dcnode-id="1691" instrument_node="">
