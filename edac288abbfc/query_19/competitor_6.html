</span><p data-dcnode-id="1189"><a data-dcnode-id="1197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/leukemia_health/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="1198" instrument_node="">Leukemia</span></a><span data-dcnode-id="1196" instrument_node=""> is a </span><a data-dcnode-id="1194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/leukemia_health/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="1195" instrument_node="">cancer of the blood</span></a><span data-dcnode-id="1193" instrument_node=""> cells, usually the white blood cells though it can start in other types of blood cells. In patients with </span><a class="quizlink" data-dcnode-id="1191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/leukemia_quiz_iq/quiz.htm" onclick="wmdTrack('embd-lnk');" rel="quiz-em" target="_blank" title="Learning Quiz"><span data-dcnode-id="1192" instrument_node="">leukemia</span></a><span data-dcnode-id="1190" instrument_node="">, the bone marrow in the center of the bones produces abnormal blood cells that grow out of control and get into the bloodstream.&nbsp;</span></p><p data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">There are several types of leukemia, including:&nbsp; &nbsp;&nbsp;</span></p><ul data-dcnode-id="1151"><li data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">Acute lymphocytic leukemia (ALL)</span></li><li data-dcnode-id="1181"><a class="quizlink" data-dcnode-id="1183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/leukemia_quiz_iq/quiz.htm" onclick="wmdTrack('embd-lnk');" rel="quiz-em" target="_blank" title="Learning Quiz"><span data-dcnode-id="1184" instrument_node="">Acute myeloid leukemia</span></a><span data-dcnode-id="1182" instrument_node=""> (AML)</span></li><li data-dcnode-id="1177"><a class="quizlink" data-dcnode-id="1179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/leukemia_quiz_iq/quiz.htm" onclick="wmdTrack('embd-lnk');" rel="quiz-em" target="_blank" title="Learning Quiz"><span data-dcnode-id="1180" instrument_node="">Chronic lymphocytic leukemia</span></a><span data-dcnode-id="1178" instrument_node=""> (CLL)</span></li><li data-dcnode-id="1173"><a class="quizlink" data-dcnode-id="1175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/leukemia_quiz_iq/quiz.htm" onclick="wmdTrack('embd-lnk');" rel="quiz-em" target="_blank" title="Learning Quiz"><span data-dcnode-id="1176" instrument_node="">Chronic myeloid leukemia</span></a><span data-dcnode-id="1174" instrument_node=""> (CML)</span></li><li data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Chronic myelomonocytic leukemia (CMML) (uncommon)</span></li><li data-dcnode-id="1167"><a class="quizlink" data-dcnode-id="1169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/leukemia_quiz_iq/quiz.htm" onclick="wmdTrack('embd-lnk');" rel="quiz-em" target="_blank" title="Learning Quiz"><span data-dcnode-id="1170" instrument_node="">Hairy cell leukemia</span></a><span data-dcnode-id="1168" instrument_node=""> (HCL)</span></li><li data-dcnode-id="1163"><a class="quizlink" data-dcnode-id="1165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/leukemia_quiz_iq/quiz.htm" onclick="wmdTrack('embd-lnk');" rel="quiz-em" target="_blank" title="Learning Quiz"><span data-dcnode-id="1166" instrument_node="">Juvenile myelomonocytic leukemia</span></a><span data-dcnode-id="1164" instrument_node=""> (JMML) (uncommon)</span></li><li data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">Large granular lymphocytic (LGL) leukemia&nbsp;</span></li><li data-dcnode-id="1156"><span data-dcnode-id="1160" instrument_node="">Background Blastic plasmacytoid dendritic cell neoplasm (BPDCN) [formerly called natural killer (NK) cell leukemia/</span><a data-dcnode-id="1158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/lymphoma/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="1159" instrument_node="">lymphoma</span></a><span data-dcnode-id="1157" instrument_node="">]</span></li><li data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">B-cell prolymphocytic leukemia (B-PLL) (very rare)</span></li><li data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">T-cell prolymphocytic leukemia (T-PLL) (extremely rare)</span></li></ul><p data-dcnode-id="1143"><span data-dcnode-id="1150" instrument_node="">Some types of leukemia grow slowly ("chronic leukemias"), and others grow faster ("acute leukemias"). Patients may have a </span><a class="quizlink" data-dcnode-id="1148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/leukemia_quiz_iq/quiz.htm" onclick="wmdTrack('embd-lnk');" rel="quiz-em" target="_blank" title="Learning Quiz"><span data-dcnode-id="1149" instrument_node="">chronic leukemia</span></a><span data-dcnode-id="1147" instrument_node=""> at first and that later develops into a fast-growing </span><a class="quizlink" data-dcnode-id="1145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/leukemia_quiz_iq/quiz.htm" onclick="wmdTrack('embd-lnk');" rel="quiz-em" target="_blank" title="Learning Quiz"><span data-dcnode-id="1146" instrument_node="">acute leukemia</span></a><span data-dcnode-id="1144" instrument_node="">.</span></p></div><div class="wrapper" data-dcnode-id="1067"><p data-dcnode-id="1139"><b data-dcnode-id="1140"><a class="bookmark" data-dcnode-id="1141" name="what_are_symptoms_of_leukemia"></a></b></p><div data-dcnode-id="1135" itemscope="" itemtype="https://schema.org/CreativeWork"><h3 data-dcnode-id="1136"><span data-dcnode-id="1137" itemprop="alternativeHeadline"><span data-dcnode-id="1138" instrument_node="">What Are Symptoms of Leukemia?</span></span></h3></div><p data-dcnode-id="1134"></p><span data-dcnode-id="1133" instrument_node="">
</span><p data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Leukemia may not cause symptoms, especially at first. When symptoms of leukemia occur, they may include:</span></p><ul data-dcnode-id="1085"><li data-dcnode-id="1127"><span data-dcnode-id="1130" instrument_node="">Tiredness/</span><a data-dcnode-id="1128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/fatigue/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="1129" instrument_node="">fatigue</span></a></li><li data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">Weakness</span></li><li data-dcnode-id="1121"><a data-dcnode-id="1123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/wilderness_bleeding/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="1124" instrument_node="">Bleeding</span></a><span data-dcnode-id="1122" instrument_node=""> more easily than normal</span></li><li data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Getting sick from infections more easily than normal</span></li><li data-dcnode-id="1115"><a data-dcnode-id="1117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/dizziness/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="1118" instrument_node="">Dizziness</span></a><span data-dcnode-id="1116" instrument_node=""> or lightheadedness</span></li><li data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">Shortness of breath</span></li><li data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Pale skin</span></li><li data-dcnode-id="1107"><a data-dcnode-id="1109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/bruises/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="1110" instrument_node="">Bruises</span></a><span data-dcnode-id="1108" instrument_node=""> (or small red or purple spots) on the skin</span></li><li data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Bleeding, such as frequent or severe nosebleeds, bleeding gums, or heavy menstrual bleeding in women</span></li><li data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Clotting problems</span></li><li data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Swelling in the abdomen</span></li><li data-dcnode-id="1097"><span data-dcnode-id="1100" instrument_node="">Enlarged </span><a class="imglink" data-dcnode-id="1098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/image-gallery/lymph_nodes_picture/images.htm" onclick="wmdTrack('embd-lnk');" rel="emhimg" target="_blank" title="Medical Image"><span data-dcnode-id="1099" instrument_node="">lymph nodes</span></a></li><li data-dcnode-id="1093"><span data-dcnode-id="1096" instrument_node="">Bone or </span><a data-dcnode-id="1094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/joint_pain/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="1095" instrument_node="">joint pain</span></a></li><li data-dcnode-id="1089"><span data-dcnode-id="1092" instrument_node="">Feeling </span><a data-dcnode-id="1090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/colds/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="1091" instrument_node="">cold</span></a></li><li data-dcnode-id="1086"><a data-dcnode-id="1087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/mild_headache/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="1088" instrument_node="">Headaches</span></a></li></ul><p data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">Patients with leukemia may also have generalized symptoms such as:</span></p><ul data-dcnode-id="1068"><li data-dcnode-id="1080"><a data-dcnode-id="1081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/weight_loss_and_control/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="1082" instrument_node="">Weight loss</span></a></li><li data-dcnode-id="1077"><a data-dcnode-id="1078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/fever_in_adults/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="1079" instrument_node="">Fever</span></a></li><li data-dcnode-id="1074"><a data-dcnode-id="1075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/night_sweats/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="1076" instrument_node="">Night sweats</span></a></li><li data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">Loss of appetite</span></li><li data-dcnode-id="1069"><a class="slidelink" data-dcnode-id="1070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/slideshow_pictures_causes_of_fatigue/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emhsli" target="_blank" title="Educational Slideshow"><span data-dcnode-id="1071" instrument_node="">Fatigue</span></a></li></ul></div><span data-dcnode-id="1066" instrument_node="">
</span></div><span data-dcnode-id="1064" instrument_node="">
</span><div class="apPage" data-dcnode-id="907"><span data-dcnode-id="1063" instrument_node="">
</span><div class="wrapper" data-dcnode-id="927"><p data-dcnode-id="1060"><b data-dcnode-id="1061"><a class="bookmark" data-dcnode-id="1062" name="what_causes_leukemia"></a></b></p><div data-dcnode-id="1056" itemscope="" itemtype="https://schema.org/CreativeWork"><h3 data-dcnode-id="1057"><span data-dcnode-id="1058" itemprop="alternativeHeadline"><span data-dcnode-id="1059" instrument_node="">What Causes Leukemia?</span></span></h3></div><p data-dcnode-id="1055"></p><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Acute lymphocytic leukemia (ALL), acute myeloid leukemia (AML), chronic lymphocytic leukemia (CLL), and chronic myeloid leukemia (CML) are caused by genetic mutations.&nbsp;</span></p><p data-dcnode-id="1047"><span data-dcnode-id="1051" instrument_node="">Some cases of chronic myelomonocytic leukemia (CMML) are linked to </span><a data-dcnode-id="1049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/cancer_what_you_need_to_know/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="1050" instrument_node="">cancer</span></a><span data-dcnode-id="1048" instrument_node=""> treatment, but in most cases the cause is unknown.</span></p><p data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Risk factors for developing acute lymphocytic leukemia (ALL) include:</span></p><ul data-dcnode-id="1005"><li data-dcnode-id="1041"><a class="slidelink" data-dcnode-id="1043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/slideshow_pictures_cancer_101/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emhsli" target="_blank" title="Educational Slideshow"><span data-dcnode-id="1044" instrument_node="">Radiation</span></a><span data-dcnode-id="1042" instrument_node=""> exposure</span></li><li data-dcnode-id="1036"><span data-dcnode-id="1040" instrument_node="">Chemical exposure such as </span><a data-dcnode-id="1038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/chemotherapy/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="1039" instrument_node="">chemotherapy</span></a><span data-dcnode-id="1037" instrument_node=""> drugs and other chemicals, including benzene</span></li><li data-dcnode-id="1028"><span data-dcnode-id="1035" instrument_node="">Viral infections such as human T-cell </span><a class="slidelink" data-dcnode-id="1033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/slideshow_pictures_cancer_101/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emhsli" target="_blank" title="Educational Slideshow"><span data-dcnode-id="1034" instrument_node="">lymphoma</span></a><span data-dcnode-id="1032" instrument_node="">/leukemia virus-1 (HTLV-1) (not common in the U.S.), </span><a data-dcnode-id="1030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/epstein-barr_virus_infection/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="1031" instrument_node="">Epstein-Barr virus</span></a><span data-dcnode-id="1029" instrument_node=""> (EBV)&nbsp;</span></li><li data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Certain genetic conditions</span></li><li data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Age over 50</span></li><li data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Race/ethnicity – more common in Caucasians</span></li><li data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Gender – slightly more common in females</span></li><li data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Having an identical twin with ALL&nbsp;</span></li><li data-dcnode-id="1006"><span data-dcnode-id="1017" instrument_node="">Possible other risk factors</span><ul data-dcnode-id="1007"><li data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">Exposure to electromagnetic fields (such as living near power lines or using cell phones)</span></li><li data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Workplace exposure to diesel, gasoline, pesticides, and certain other chemicals</span></li><li data-dcnode-id="1010"><a data-dcnode-id="1011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/cigarette_smoking/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="1012" instrument_node="">Smoking</span></a></li><li data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">Exposure to hair dyes</span></li></ul></li></ul><p data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Risk factors for developing acute myeloid leukemia (AML) include:</span></p><ul data-dcnode-id="968"><li data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">Getting older</span></li><li data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">Being male</span></li><li data-dcnode-id="996"><a class="slidelink" data-dcnode-id="997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/slideshow_smoking_effects/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emhsli" target="_blank" title="Educational Slideshow"><span data-dcnode-id="998" instrument_node="">Smoking</span></a></li><li data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Exposure to certain chemicals, such as long-term exposure to benzene&nbsp;</span></li><li data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Certain chemotherapy drugs including alkylating agents and topoisomerase II inhibitors&nbsp;</span></li><li data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Exposure to radiation</span></li><li data-dcnode-id="982"><span data-dcnode-id="989" instrument_node="">Having certain </span><a class="quizlink" data-dcnode-id="987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/blood_and_bleeding_disorders_quiz_iq/quiz.htm" onclick="wmdTrack('embd-lnk');" rel="quiz-em" target="_blank" title="Learning Quiz"><span data-dcnode-id="988" instrument_node="">blood disorders</span></a><span data-dcnode-id="986" instrument_node=""> including chronic myeloproliferative disorders such as </span><a data-dcnode-id="984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/polycythemia_high_red_blood_cell_count/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="985" instrument_node="">polycythemia vera</span></a><span data-dcnode-id="983" instrument_node="">, essential thrombocythemia, and idiopathic myelofibrosis</span></li><li data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">Certain genetic syndromes</span></li><li data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">A family history</span></li><li data-dcnode-id="969"><span data-dcnode-id="977" instrument_node="">Possible other risk factors&nbsp;</span><ul data-dcnode-id="970"><li data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Exposure to electromagnetic fields (such as living near power lines)</span></li><li data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">Workplace exposure to diesel, gasoline, and certain other chemicals and solvents</span></li><li data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Exposure to herbicides or pesticides</span></li></ul></li></ul><p data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Risk factors for developing chronic lymphocytic leukemia (CLL) include:</span></p><ul data-dcnode-id="955"><li data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">Age over 50&nbsp;</span></li><li data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Exposure to certain chemicals, such as Agent Orange, radon, and possible certain pesticides</span></li><li data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Family history</span></li><li data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Gender – slightly more common in males</span></li><li data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Race/ethnicity - more common in North America and Europe than in Asia.</span></li></ul><p data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Risk factors for developing chronic myeloid leukemia (CML) include:</span></p><ul data-dcnode-id="944"><li data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Exposure to high-dose radiation (such as being a survivor of an atomic bomb blast or nuclear reactor accident)&nbsp;</span></li><li data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Getting older</span></li><li data-dcnode-id="945"><strong data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Gender</span></strong><span data-dcnode-id="946" instrument_node="">: slightly more common in males</span></li></ul><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Risk factors for developing chronic myelomonocytic leukemia (CMML) include:</span></p><ul data-dcnode-id="928"><li data-dcnode-id="938"><strong data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">Age</span></strong><span data-dcnode-id="939" instrument_node="">: CMML is rare in people under age 40. Most cases occur in people 60 and older.</span></li><li data-dcnode-id="934"><strong data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Gender</span></strong><span data-dcnode-id="935" instrument_node="">: Twice as common in men as in women</span></li><li data-dcnode-id="929"><span data-dcnode-id="933" instrument_node="">Prior </span><a class="slidelink" data-dcnode-id="931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/slideshow_pictures_cancer_101/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emhsli" target="_blank" title="Educational Slideshow"><span data-dcnode-id="932" instrument_node="">cancer</span></a><span data-dcnode-id="930" instrument_node=""> treatment with chemotherapy&nbsp;</span></li></ul></div><span data-dcnode-id="926" instrument_node="">

</span><div class="wrapper" data-dcnode-id="843"><p data-dcnode-id="903"><b data-dcnode-id="904"><a class="bookmark" data-dcnode-id="905" name="how_is_leukemia_diagnosed"></a></b></p><div data-dcnode-id="899" itemscope="" itemtype="https://schema.org/CreativeWork"><h3 data-dcnode-id="900"><span data-dcnode-id="901" itemprop="alternativeHeadline"><span data-dcnode-id="902" instrument_node="">How Is Leukemia Diagnosed?</span></span></h3></div><p data-dcnode-id="898"></p><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">Leukemia is diagnosed with tests such as:</span></p><ul data-dcnode-id="844"><li data-dcnode-id="881"><span data-dcnode-id="894" instrument_node="">Blood tests</span><ul data-dcnode-id="882"><li data-dcnode-id="887"><a data-dcnode-id="892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/complete_blood_count_cbc/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="893" instrument_node="">Complete blood count</span></a><span data-dcnode-id="891" instrument_node=""> (</span><a data-dcnode-id="889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/complete_blood_count_cbc/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="890" instrument_node="">CBC</span></a><span data-dcnode-id="888" instrument_node="">) and peripheral blood smear</span></li><li data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Blood chemistry tests</span></li><li data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Coagulation tests</span></li></ul></li><li data-dcnode-id="877"><a data-dcnode-id="879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/bone_marrow_biopsy/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="880" instrument_node="">Bone marrow aspiration</span></a><span data-dcnode-id="878" instrument_node=""> and biopsy&nbsp;</span></li><li data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Chromosome tests</span></li><li data-dcnode-id="868"><a data-dcnode-id="873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/spinal_tap/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="874" instrument_node="">Lumbar puncture</span></a><span data-dcnode-id="872" i trasound/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="849" instrument_node="">Ultrasound</span></a></li></ul></li></ul></div><div class="wrapper" data-dcnode-id="813"><p data-dcnode-id="840"><b data-dcnode-id="841"><a class="bookmark" data-dcnode-id="842" name="what_is_the_treatment_for_leukemia"></a></b></p><div data-dcnode-id="836" itemscope="" itemtype="https://schema.org/CreativeWork"><h3 data-dcnode-id="837"><span data-dcnode-id="838" itemprop="alternativeHeadline"><span data-dcnode-id="839" instrument_node="">What Is the Treatment for Leukemia?</span></span></h3></div><p data-dcnode-id="835"></p><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="829"><span data-dcnode-id="833" instrument_node="">There is technically no cure for leukemia, but treatment can help the </span><a class="quizlink" data-dcnode-id="831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/cancer_quiz_iq/quiz.htm" onclick="wmdTrack('embd-lnk');" rel="quiz-em" target="_blank" title="Learning Quiz"><span data-dcnode-id="832" instrument_node="">cancer</span></a><span data-dcnode-id="830" instrument_node=""> go into remission (also called “no evidence of disease”). It is not always possible to tell if any cancer cells remain in the body, which is why doctors often refer to “no evidence of disease” as remission rather than a cure. Whether or not remission occurs depends on the type of leukemia and the stage of the cancer.&nbsp;</span></p><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Treatment for leukemia can include one or more of the following:</span></p><ul data-dcnode-id="814"><li data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Chemotherapy&nbsp;</span></li><li data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Immunotherapy&nbsp;</span></li><li data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Targeted therapy</span></li><li data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Bone marrow transplant (also called "stem cell transplant")&nbsp;</span></li><li data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Radiation</span></li><li data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Surgery</span></li></ul></div><div class="wrapper" data-dcnode-id="789"><p data-dcnode-id="810"><b data-dcnode-id="811"><a class="bookmark" data-dcnode-id="812" name="what_are_complications_of_leukemia"></a></b></p><div data-dcnode-id="806" itemscope="" itemtype="https://schema.org/CreativeWork"><h3 data-dcnode-id="807"><span data-dcnode-id="808" itemprop="alternativeHeadline"><span data-dcnode-id="809" instrument_node="">What Are Complications of Leukemia? </span></span></h3></div><p data-dcnode-id="805"></p><span data-dcnode-id="804" instrument_node="">
