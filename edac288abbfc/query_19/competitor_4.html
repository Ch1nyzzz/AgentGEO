</span><div data-dcnode-id="1291" itemscope="" itemtype="https://schema.org/CreativeWork"><img alt="Gallbladder Cancer" data-dcnode-id="1292" itemprop="image" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/article/main_image/what-is-the-treatment-for-gallbladder-polyps.jpg&amp;raw" title="Gallbladder Cancer"></div><span data-dcnode-id="1290" instrument_node="">
</span><span class="lrgArtImgCap" data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">Gallbladder cancer can be cured if it is treated before the cancer spreads, making the prognosis of early diagnosis generally favorable. </span></span></div><span data-dcnode-id="1286" instrument_node="">
</span><p data-dcnode-id="1268"><span data-dcnode-id="1284" instrument_node="">Yes, </span><a data-dcnode-id="1282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/gallbladder_cancer/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="1283" instrument_node="">gallbladder cancer</span></a><span data-dcnode-id="1281" instrument_node=""> can be cured, but it is only possible if the </span><a data-dcnode-id="1279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/cancer/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="1280" instrument_node="">cancer</span></a><span data-dcnode-id="1278" instrument_node=""> has not spread beyond the gallbladder (metastasized). If the </span><a class="slidelink" data-dcnode-id="1276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/cancer_101_pictures_slideshow/article.htm" onclick="wmdTrack('embd-lnk');" rel="slide" target="_blank" title="Educational Slideshow"><span data-dcnode-id="1277" instrument_node="">cancer</span></a><span data-dcnode-id="1275" instrument_node=""> is localized, the person can be cured through the surgical removal of </span><a class="quizlink" data-dcnode-id="1273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/cancer_quiz/quiz.htm" onclick="wmdTrack('embd-lnk');" rel="quiz" target="_blank" title="Learning Quiz"><span data-dcnode-id="1274" instrument_node="">cancer</span></a><span data-dcnode-id="1272" instrument_node="">. In cases of </span><a class="slidelink" data-dcnode-id="1270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/cancer_101_pictures_slideshow/article.htm" onclick="wmdTrack('embd-lnk');" rel="slide" target="_blank" title="Educational Slideshow"><span data-dcnode-id="1271" instrument_node="">metastasis</span></a><span data-dcnode-id="1269" instrument_node="">, however, treatment is given to manage the symptoms and reduce the risk of complications (palliative management).</span></p><span data-dcnode-id="1267" instrument_node="">
</span><div class="wrapper" data-dcnode-id="1216"><p data-dcnode-id="1264"><b data-dcnode-id="1265"><a class="bookmark" data-dcnode-id="1266" name="how_is_gallbladder_cancer_treated"></a></b></p><div data-dcnode-id="1260" itemscope="" itemtype="https://schema.org/CreativeWork"><h3 data-dcnode-id="1261"><span data-dcnode-id="1262" itemprop="alternativeHeadline"><span data-dcnode-id="1263" instrument_node="">How is gallbladder cancer treated?</span></span></h3></div><p data-dcnode-id="1259"></p><span data-dcnode-id="1258" instrument_node="">
</span><p data-dcnode-id="1241"><span data-dcnode-id="1257" instrument_node="">The treatment of </span><a data-dcnode-id="1255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/gallbladder_cancer_symptoms_and_signs/symptoms.htm" onclick="wmdTrack('embd-lnk');" rel="sym"><span data-dcnode-id="1256" instrument_node="">gallbladder cancer</span></a><span data-dcnode-id="1254" instrument_node=""> depends on various factors including the stage of cancer, the patient’s general health, and whether cancer can be removed by surgery. Generally, the treatment involves surgery, </span><a data-dcnode-id="1252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/chemotherapy/article.htm" onclick="wmdTrack('embd-lnk');" rel="proc"><span data-dcnode-id="1253" instrument_node="">chemotherapy</span></a><span data-dcnode-id="1251" instrument_node="">, and </span><a data-dcnode-id="1249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/radiation_therapy/article.htm" onclick="wmdTrack('embd-lnk');" rel="proc"><span data-dcnode-id="1250" instrument_node="">radiation therapy</span></a><span data-dcnode-id="1248" instrument_node=""> used alone or in combination. Medications may also be given to manage symptoms, such as </span><a data-dcnode-id="1246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/pain_management/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="1247" instrument_node="">pain</span></a><span data-dcnode-id="1245" instrument_node=""> and </span><a data-dcnode-id="1243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/nausea_and_vomiting/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="1244" instrument_node="">vomiting</span></a><span data-dcnode-id="1242" instrument_node="">.</span></p><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1235"><span data-dcnode-id="1239" instrument_node="">Besides surgery, chemotherapy, and </span><a data-dcnode-id="1237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/radiation_therapy/article.htm" onclick="wmdTrack('embd-lnk');" rel="proc"><span data-dcnode-id="1238" instrument_node="">radiation</span></a><span data-dcnode-id="1236" instrument_node=""> therapy, several newer treatment options are also being developed, which include:</span></p><span data-dcnode-id="1234" instrument_node="">
</span><ul data-dcnode-id="1217"><span data-dcnode-id="1233" instrument_node="">
</span><li data-dcnode-id="1229"><strong data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Targeted therapy</span></strong><span data-dcnode-id="1230" instrument_node=""> (specifically targets the cancer cell depending on certain peculiarities that differentiate them from healthy cells)</span></li><span data-dcnode-id="1228" instrument_node="">
</span><li data-dcnode-id="1224"><strong data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">Radiation sensitizers</span></strong><span data-dcnode-id="1225" instrument_node=""> (involves making cancer cells more susceptible to the effect of radiation therapy)</span></li><span data-dcnode-id="1223" instrument_node="">
</span><li data-dcnode-id="1219"><strong data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Immunotherapy</span></strong><span data-dcnode-id="1220" instrument_node=""> (helps your immune system to fight the cancer cells)</span></li><span data-dcnode-id="1218" instrument_node="">
</span></ul></div><span data-dcnode-id="1215" instrument_node="">
</span></div><span data-dcnode-id="1213" instrument_node="">
</span><div class="apPage" data-dcnode-id="1073"><span data-dcnode-id="1212" instrument_node="">
</span><div class="wrapper" data-dcnode-id="1097"><p data-dcnode-id="1209"><b data-dcnode-id="1210"><a class="bookmark" data-dcnode-id="1211" name="what_are_the_stages_and_survival_rate_for_gallbladder_cancer"></a></b></p><div data-dcnode-id="1205" itemscope="" itemtype="https://schema.org/CreativeWork"><h3 data-dcnode-id="1206"><span data-dcnode-id="1207" itemprop="alternativeHeadline"><span data-dcnode-id="1208" instrument_node="">What are the stages and survival rate for gallbladder cancer?</span></span></h3></div><p data-dcnode-id="1204"></p><span data-dcnode-id="1203" instrument_node="">
</span><p data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">The survival rate of gallbladder cancer depends on several factors, such as:</span></p><span data-dcnode-id="1200" instrument_node="">
</span><ul data-dcnode-id="1177"><span data-dcnode-id="1199" instrument_node="">
</span><li data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">The stage of gallbladder cancer (depends on how far the cancer has spread in the body)</span></li><span data-dcnode-id="1196" instrument_node="">
</span><li data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">How early in the course of the disease the treatment was initiated</span></li><span data-dcnode-id="1193" instrument_node="">
</span><li data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">Whether cancer can be completely removed by surgery</span></li><span data-dcnode-id="1190" instrument_node="">
</span><li data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">The patient’s general health</span></li><span data-dcnode-id="1187" instrument_node="">
</span><li data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">The age of the person at the time of diagnosis</span></li><span data-dcnode-id="1184" instrument_node="">
</span><li data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Whether the gallbladder cancer has been diagnosed for the first time, or it has recurred (came back after treatment)</span></li><span data-dcnode-id="1181" instrument_node="">
</span><li data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">The microscopic appearance of the cancer cells</span></li><span data-dcnode-id="1178" instrument_node="">
</span></ul><span data-dcnode-id="1176" instrument_node="">
</span><p data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">Gallbladder cancer is a rare but aggressive type of cancer. The prognosis is better if the cancer is diagnosed early, but most cases are diagnosed in the advanced stages of the disease.</span></p><span data-dcnode-id="1173" instrument_node="">
</span><p data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">The survival rates are expressed as five-year survival rates, which means what percentage of people with the same stage and type of cancer have lived for at least five years. Thus, if the five-year survival rate for a particular stage is 50 percent, it means that people who have that stage of gallbladder cancer are, on average, about 50 percent as likely as people who do not have that cancer to live for at least five years after diagnosis.</span></p><span data-dcnode-id="1170" instrument_node="">
</span><p data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">These survival rates are approximations and may vary with people. They may differ based on various factors, such as general health, certain risk factors, and how well the patient has responded to treatment. Cancer research is growing by leaps and bounds, and these figures (from records at a particular time) may not be accurate at this moment.</span></p><span data-dcnode-id="1167" instrument_node="">

</span><p data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Signs and symptoms of gallbladder cancer vary from patient, however, common symptoms may include:</span></p><span data-dcnode-id="1060" instrument_node="">
</span><ul data-dcnode-id="1019"><span data-dcnode-id="1059" instrument_node="">
</span><li data-dcnode-id="1055"><a class="quizlink" data-dcnode-id="1057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/pain_quiz/quiz.htm" onclick="wmdTrack('embd-lnk');" rel="quiz" target="_blank" title="Learning Quiz"><span data-dcnode-id="1058" instrument_node="">Pain</span></a><span data-dcnode-id="1056" instrument_node=""> in the upper right abdomen</span></li><span data-dcnode-id="1054" instrument_node="">
</span><li data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Abdominal discomfort from bile duct blockage</span></li><span data-dcnode-id="1051" instrument_node="">
</span><li data-dcnode-id="1048"><a data-dcnode-id="1049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/dyspepsia/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="1050" instrument_node="">Indigestion</span></a></li><span data-dcnode-id="1047" instrument_node="">
</span><li data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Bilious vomit</span></li><span data-dcnode-id="1044" instrument_node="">

</span><li data-dcnode-id="1033"><a data-dcnode-id="1034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/loss_of_appetite/symptoms.htm" onclick="wmdTrack('embd-lnk');" rel="sym"><span data-dcnode-id="1035" instrument_node="">Loss of appetite</span></a></li><span data-dcnode-id="1032" instrument_node="">

</span><li data-dcnode-id="1025"><a data-dcnode-id="1026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/weight_loss/article.htm" onclick="wmdTrack('embd-lnk');" rel="sub"><span data-dcnode-id="1027" instrument_node="">Weight loss</span></a></li><span data-dcnode-id="1024" instrument_node="">
</span><li data-dcnode-id="1021"><a class="imglink" data-dcnode-id="1022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/image-collection/jaundice_picture/picture.htm" onclick="wmdTrack('embd-lnk');" rel="img" target="_blank" title="Medical Image"><span data-dcnode-id="1023" instrument_node="">Jaundice</span></a></li><span data-dcnode-id="1020" instrument_node="">
</span></ul><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1007"><span data-dcnode-id="1017" instrument_node="">Early symptoms may mimic inflammation in the gallbladder due to </span><a data-dcnode-id="1015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/gallstones/article.htm" onclick="wmdTrack('embd-lnk');" rel="dt"><span data-dcnode-id="1016" instrument_node="">gallstones</span></a><span data-dcnode-id="1014" instrument_node="">. While most people with gallbladder cancer do develop </span><a data-dcnode-id="1012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/gallstones_symptoms_and_signs/symptoms.htm" onclick="wmdTrack('embd-lnk');" rel="sym"><span data-dcnode-id="1013" instrument_node="">gallstones</span></a><span data-dcnode-id="1011" instrument_node="">, only 1 in 200 people with </span><a class="quizlink" data-dcnode-id="1009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/gallstones_iq/quiz.htm" onclick="wmdTrack('embd-lnk');" rel="quiz" target="_blank" title="Learning Quiz"><span data-dcnode-id="1010" instrument_node="">gallstones</span></a><span data-dcnode-id="1008" instrument_node=""> has gallbladder cancer.</span></p></div><span data-dcnode-id="1005" instrument_node="">

</span><li data-dcnode-id="756"><a data-dcnode-id="757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/best_foods_to_eat_when_you_have_gallstones/article.htm" onclick="wmdTrack('lr-top10_01');"><img data-dcnode-id="762" height="80" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-diabetes-diet.jpg&amp;raw" width="80"><h4 data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">What Are the Best Foods To Eat When You Have Gallstones? </span></h4><div class="relContent" data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">What Are Gallstones? Learn what foods you can eat to manage this condition.</span></div></a></li><span data-dcnode-id="755" instrument_node="">
</span><li data-dcnode-id="748"><a data-dcnode-id="749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/bile_duct_cancer_cholangiocarcinoma/article.htm" onclick="wmdTrack('lr-top10_02');"><img data-dcnode-id="754" height="80" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-bile-duct-cancer-cholangiocarcinoma.jpg&amp;raw" width="80"><h4 data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Bile Duct Cancer (Cholangiocarcinoma)</span></h4><div class="relContent" data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">Bile duct cancer (cholangiocarcinoma) is a rare type of cancer that arises from cells that line the drainage system from the liver and gallbladder to the intestine. Symptoms of bile duct cancer include jaundice, itching, weight loss, and abdominal pain. Physical examination, specialized blood tests, and imaging tests may be used to diagnose bile duct cancer. Treatment for bile duct cancer may include chemotherapy, radiation therapy, and photodynamic therapy. Bile duct cancer typically has a poor prognosis. Preventing liver damage may decrease the risk of developing bile duct cancer.</span></div></a></li><span data-dcnode-id="747" instrument_node="">
</span><li data-dcnode-id="740"><a data-dcnode-id="741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/bladder_cancer_pictures_slideshow/article.htm" onclick="wmdTrack('lr-top10_03');"><img data-dcnode-id="746" height="80" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/slideshow/featured-slideshow/featured-bladder-cancer.jpg&amp;raw" width="80"><h4 data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Bladder Cancer Slides</span></h4><div class="relContent" data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Bladder cancer occurs when cancerous cells, often from the lining of the bladder, begin to multiply. Find more information about bladder cancer, the stages of bladder cancer, and available treatment options.</span></div></a></li><span data-dcnode-id="739" instrument_node="">
</span><li data-dcnode-id="732"><a data-dcnode-id="733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/can_gallstones_go_away_on_their_own/article.htm" onclick="wmdTrack('lr-top10_04');"><img data-dcnode-id="738" height="80" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-gallstones-treatment.jpg&amp;raw" width="80"><h4 data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Can Gallstones Go Away on Their Own?</span></h4><div class="relContent" data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">The bile contents may sometimes crystallize and form gallstones. If there are no symptoms, a regular follow-up would suffice. Natural remedies and medical management may prevent worsening of the condition. Treatment is necessary if the stones cause pain or swelling of the gallbladder. Surgery may be required if nonsurgical treatments fail or there is a high risk of complications.</span></div></a></li><span data-dcnode-id="731" instrument_node="">
</span><li data-dcnode-id="724"><a data-dcnode-id="725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/cancer_quiz/quiz.htm" onclick="wmdTrack('lr-top10_05');"><img data-dcnode-id="730" height="80" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/quiz/featured-quiz/featured-cancer.jpg&amp;raw" width="80"><h4 data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Cancer Quiz</span></h4><div class="relContent" data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Take this quiz to learn the causes of cancer. Get the facts about the  causes, symptoms, and treatments for the world's most common cancers.</span></div></a></li><span data-dcnode-id="723" instrument_node="">
</span><li data-dcnode-id="716"><a data-dcnode-id="717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/colon_cancer_diet_foods_prevention/article.htm" onclick="wmdTrack('lr-top10_06');"><img data-dcnode-id="722" height="80" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/slideshow/featured-slideshow/featured-colon-cancer-diet-foods.jpg&amp;raw" width="80"><h4 data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Colon Cancer: How Your Food and Diet Can Affect Colorectal Cancer Health</span></h4><div class="relContent" data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Diet, including nutrient, antioxidant, and vitamin intake, affects colon cancer risk. Certain dietary factors either decrease or increase the risk of colorectal cancer, breast cancer, and other diseases. Dietary factors may either inhibit or stimulate the development of cancer cells. Have a nutrition plan that decreases the risk.</span></div></a></li><span data-dcnode-id="715" instrument_node="">
</span><li data-dcnode-id="708"><a data-dcnode-id="709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/colorectal_colon_cancer_quiz/quiz.htm" onclick="wmdTrack('lr-top10_07');"><img data-dcnode-id="714" height="80" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/quiz/colon-cancer/featured-colon-cancer.jpg&amp;raw" width="80"><h4 data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Colorectal (Colon) Cancer Quiz</span></h4><div class="relContent" data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">What is colorectal (colon) cancer and who gets it? Take this quiz to find out how this disease may be prevented.</span></div></a></li><span data-dcnode-id="707" instrument_node="">
</span><li data-dcnode-id="700"><a data-dcnode-id="701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/gallbladder_cancer/article.htm" onclick="wmdTrack('lr-top10_08');"><img data-dcnode-id="706" height="80" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-gallbladder-cancer.jpg&amp;raw" width="80"><h4 data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Gallbladder Cancer</span></h4><div class="relContent" data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Gallbladder cancer is a rare form of cancer with symptoms that include jaundice, abdominal pain, fever, nausea and vomiting, abdominal lumps, and bloating. Risk factors include being female and Native American. Treatment of gallbladder cancer depends upon the stage of the cancer, the type of gallbladder cancer, and whether the cancer can be removed by surgery.</span></div></a></li><span data-dcnode-id="699" instrument_node="">
</span><li data-dcnode-id="692"><a data-dcnode-id="693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/gallbladder_pain_gall_bladder_pain/article.htm" onclick="wmdTrack('lr-top10_09');"><img data-dcnode-id="698" height="80" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-gallbladder-pain.jpg&amp;raw" width="80"><h4 data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Gallbladder Pain: Relief, Causes, and Diet</span></h4><div class="relContent" data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Gallbladder pain (often misspelled "gall bladder") is generally produced by of five problems, biliary colic, cholecystitis, gallstones, and pancreatitis. Causes of gallbladder pain include intermittent blockage of ducts by gallstones or gallstone inflammation and/or sludge that also may involve irritation or infection of surrounding tissues, or when a bile duct is completely blocked. Treatment of gallbladder depends on the cause, which may include surgery.</span></div></a></li><span data-dcnode-id="691" instrument_node="">
</span><li data-dcnode-id="684"><a data-dcnode-id="685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/image-collection/gallbladder_picture/picture.htm" onclick="wmdTrack('lr-top10_10');"><img data-dcnode-id="690" height="80" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-gallbladder-illustration.jpg&amp;raw" width="80"><h4 data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Gallbladder Picture</span></h4><div class="relContent" data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Front View of the Gallbladder. The gallbladder is a small pouch that sits just under the liver. See a picture of the Gallbladder and learn more about the health topic.</span></div></a></li><span data-dcnode-id="683" instrument_node="">
</span><li data-dcnode-id="676"><a data-dcnode-id="677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/gallstones/article.htm" onclick="wmdTrack('lr-top10_11');"><img data-dcnode-id="682" height="80" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/thumb-gallstones.jpg&amp;raw" width="80"><h4 data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Gallstones </span></h4><div class="relContent" data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Gallstones 
are stones that form when substances in the bile harden. Gallstones (formed in 
the gallbladder) can be as small as a grain of sand or as large as a golf ball. 
There can be just one large stone, hundreds of tiny stones, or any combination. 
The majority of gallstones do not cause signs or symptoms; however, when they do 
occur the primary sign is biliary colic. Symptoms of biliary colic are constant 
pain for 15 minutes to 4-5 hours, and it may vary in intensity; nausea, severe 
pain that does not worsen with movement; and pain beneath the sternum. Treatment
