</span><div class="entry-main" data-dcnode-id="72"><span data-dcnode-id="371" instrument_node="">
</span><header class="entry-header" data-dcnode-id="351"><span data-dcnode-id="370" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="369"></h1><span data-dcnode-id="368" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="354"><span data-dcnode-id="367" instrument_node="">
				Posted on </span><a data-dcnode-id="364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//naturalcancertreatment.org/about/natural-healing/" rel="bookmark" title="12:17 am"><time class="entry-date" data-dcnode-id="365" datetime="2015-11-13T00:17:47+00:00"><span data-dcnode-id="366" instrument_node="">November 13, 2015</span></time></a><time class="updated" data-dcnode-id="362" datetime="2015-12-11T09:31:10+00:00"><span data-dcnode-id="363" instrument_node="">December 11, 2015</span></time><span data-dcnode-id="361" instrument_node=""> </span><span class="byline" data-dcnode-id="356"><span data-dcnode-id="360" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="357"><a class="url fn n" data-dcnode-id="358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//naturalcancertreatment.org/author/admin/" rel="author" title="View all posts by admin"><span data-dcnode-id="359" instrument_node="">admin</span></a></span></span><span data-dcnode-id="355" instrument_node=""> </span></div><span data-dcnode-id="352" instrument_node="">
</span></header><span data-dcnode-id="349" instrument_node="">
</span><div class="entry-content" data-dcnode-id="75"><span data-dcnode-id="348" instrument_node="">
</span><div class="panel-layout" data-dcnode-id="77" id="pl-33"><div class="panel-grid panel-no-style" data-dcnode-id="335" id="pg-33-0"><div class="panel-grid-cell" data-dcnode-id="336" id="pgc-33-0-0"><div class="so-panel widget widget_headline-widget panel-first-child panel-last-child" data-dcnode-id="337" data-index="0" id="panel-33-0-0-0"><span data-dcnode-id="347" instrument_node=""> </span><h1 data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">Steps to Natural Healing and Health</span></h1><span data-dcnode-id="344" instrument_node="">
</span><div class="decoration" data-dcnode-id="342"><div class="decoration-inside" data-dcnode-id="343"></div></div><span data-dcnode-id="341" instrument_node="">
</span><h3 data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">By Chris Barrett</span></h3><span data-dcnode-id="338" instrument_node="">
</span></div></div></div><div class="panel-grid panel-no-style" data-dcnode-id="78" id="pg-33-1"><div class="panel-grid-cell" data-dcnode-id="79" id="pgc-33-1-0"><div class="so-panel widget widget_sow-editor panel-first-child panel-last-child" data-dcnode-id="80" data-index="1" id="panel-33-1-0-0"><div class="so-widget-sow-editor so-widget-sow-editor-base" data-dcnode-id="81"><span data-dcnode-id="334" instrument_node="">
</span><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="83"><span data-dcnode-id="333" instrument_node="">
</span><p data-dcnode-id="327"><strong data-dcnode-id="328"><span data-dcnode-id="331" style="color: #39913c;"><span data-dcnode-id="332" instrument_node="">This information is intended as a documentary on a range of things people have chosen to do when confronted by serious illness.</span></span><span data-dcnode-id="330" instrument_node=""> This information is based on a combination of my own observations, reading, and research. </span><br data-dcnode-id="329"></strong></p><span data-dcnode-id="326" instrument_node="">
</span><p data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">&nbsp;</span></p><span data-dcnode-id="323" instrument_node="">
</span><p data-dcnode-id="319"><span data-dcnode-id="320" style="color: #39913c;"><strong data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">Cancer or any serious illness</span></strong></span></p><span data-dcnode-id="318" instrument_node="">
</span><p data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">Diseases seldom attack a healthy body. What this means is that being diagnosed with a serious illness or cancer is also a diagnosis that our body is out of balance. Cancer and serious illness is not necessarily a death sentence, but a challenge to reverse the processes that allowed the cancer to take hold.</span></p><span data-dcnode-id="315" instrument_node="">
</span><p data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">The imbalances or processes that cause illness may be in one, or many areas of our lives. It may be a combination of our diet and health practices, our stress levels, our attitude and thought processes, or our environment and overall lifestyle.</span></p><span data-dcnode-id="312" instrument_node="">
</span><p data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">Many have discovered that it is important not to attempt overcoming these diseases with one single method, supplement or change but instead using a combination.</span></p><span data-dcnode-id="309" instrument_node="">
</span><p data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">&nbsp;</span></p><span data-dcnode-id="306" instrument_node="">
</span><p data-dcnode-id="299"><span data-dcnode-id="300" style="color: #39913c;"><strong data-dcnode-id="301"><span data-dcnode-id="305" instrument_node="">A</span><b data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">lkalising</span></b><span data-dcnode-id="302" instrument_node=""> the system</span></strong></span></p><span data-dcnode-id="298" instrument_node="">
</span><p data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">Eating alkalising foods where possible.</span></p><span data-dcnode-id="295" instrument_node="">
</span><ul data-dcnode-id="278"><span data-dcnode-id="294" instrument_node="">
</span><li data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">Green vegetables</span></li><span data-dcnode-id="291" instrument_node="">
</span><li data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">Cabbage juice</span></li><span data-dcnode-id="288" instrument_node="">
</span><li data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">Boiled brown rice and the liquid from it.</span></li><span data-dcnode-id="285" instrument_node="">
</span><li data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">Lemons</span></li><span data-dcnode-id="282" instrument_node="">
</span><li data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">Black Cumin may increase your bone marrow production of immune cells and aid alkalising the body.</span></li><span data-dcnode-id="279" instrument_node="">
</span></ul><span data-dcnode-id="277" instrument_node="">
</span><p data-dcnode-id="273"><span data-dcnode-id="274" style="color: #39913c;"><strong data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">Boost the Immune System</span></strong></span></p><span data-dcnode-id="272" instrument_node="">
</span><ul data-dcnode-id="252"><span data-dcnode-id="271" instrument_node="">
</span><li data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">Maroon Bush tea</span></li><span data-dcnode-id="268" instrument_node="">
</span><li data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">Maroon Bush</span></li><span data-dcnode-id="265" instrument_node="">
</span><li data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Murin Murin</span></li><span data-dcnode-id="262" instrument_node="">
</span><li data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">Prickly Fan Flower</span></li><span data-dcnode-id="259" instrument_node="">
</span><li data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">Currant Bush</span></li><span data-dcnode-id="256" instrument_node="">
</span><li data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">Gurrburu tea</span></li><span data-dcnode-id="253" instrument_node="">
</span></ul><span data-dcnode-id="251" instrument_node="">
</span><p data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">These are Aboriginal bush medicines that have traditionally been used by Aboriginal people for the treatment of cancer, heart disease, intestinal trouble, urinary problems, kidney trouble and general illnesses. For more information on this you can see "Wajari Wisdom" by Estelle Leyland.</span></p><span data-dcnode-id="248" instrument_node="">
</span><p data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">Maroon Bush Tea: There have been no medical trials. Research shows anti-tumor activity (Dr P. Kerr &amp; Prof R. Longmore, Curtin Univ. 1991, Dr P. Kerr is now at Charles Sturt University) There are no known side effects and extremely low levels of toxicity.</span></p><span data-dcnode-id="245" instrument_node="">
</span><p data-dcnode-id="240"><span data-dcnode-id="242" style="color: #39913c;"><strong data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">Reducing Stress</span></strong></span><span data-dcnode-id="241" instrument_node=""> and any negative response to it “Stress” is a somewhat over-killed word, however the effects of worry, anxiety, fear, pressure and the hectic pace of life are seen by many as a major contributor to ill health. I encourage you to read the section titled meditation where I document some of my own journey and recovery from stress and burnout.</span></p><span data-dcnode-id="239" instrument_node="">
</span><p data-dcnode-id="234"><span data-dcnode-id="236" style="color: #39913c;"><strong data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">Adequate sleep</span></strong></span><span data-dcnode-id="235" instrument_node=""> is very important. Readers Digest, July 2006 page 124 &amp; 125 quote research that suggest adults need between 7 and 9 hours per night, and if you don’t get enough you may compromise your immune system.</span></p><span data-dcnode-id="233" instrument_node="">
</span><p data-dcnode-id="229"><span data-dcnode-id="230" style="color: #39913c;"><strong data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">Eating healthy foods</span></strong></span></p><span data-dcnode-id="228" instrument_node="">
</span><p data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">Fruit, vegetables and nuts.</span></p><span data-dcnode-id="225" instrument_node="">
</span><ul data-dcnode-id="181"><span data-dcnode-id="224" instrument_node="">
</span><li data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">Flax Seed Oil – Kept refrigerated. It can be mixed with other foods.</span></li><span data-dcnode-id="221" instrument_node="">
</span><li data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">Flax seeds. Also sprouted and eaten as any other sprout.</span></li><span data-dcnode-id="218" instrument_node="">
</span><li data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">Beetroot: This is best raw grated or as an additive to juice.</span></li><span data-dcnode-id="215" instrument_node="">
</span><li data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">Pomegranate. (Shown to reduce prostate specific antigen readings)</span></li><span data-dcnode-id="212" instrument_node="">
</span><li data-dcnode-id="210"><span data-dcnode-id="211" instrument_node="">Dark Grape juice, dark skinned grapes (some people eat the seeds as well)</span></li><span data-dcnode-id="209" instrument_node="">
</span><li data-dcnode-id="207"><span data-dcnode-id="208" instrument_node="">Blue Berries</span></li><span data-dcnode-id="206" instrument_node="">
</span><li data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">Other purple skinned foods you can use are: red cabbage, and purple onions,</span></li><span data-dcnode-id="203" instrument_node="">
</span><li data-dcnode-id="201"><span data-dcnode-id="202" instrument_node="">Avocado, coconut, coconut cream/milk</span></li><span data-dcnode-id="200" instrument_node="">
</span><li data-dcnode-id="198"><span data-dcnode-id="199" instrument_node="">Garlic</span></li><span data-dcnode-id="197" instrument_node="">
</span><li data-dcnode-id="195"><span data-dcnode-id="196" instrument_node="">Olive Oil - Extra Virgin, un-heat processed</span></li><span data-dcnode-id="194" instrument_node="">
</span><li data-dcnode-id="192"><span data-dcnode-id="193" instrument_node="">Brazil nuts: sprouted or soaked are a good source of selenium if grown in soils containing selenium</span></li><span data-dcnode-id="191" instrument_node="">
</span><li data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">Almonds</span></li><span data-dcnode-id="188" instrument_node="">
</span><li data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">Apricot kernels have been used as a cancer treatment.</span></li><span data-dcnode-id="185" instrument_node="">
</span><li data-dcnode-id="183"><span data-dcnode-id="184" instrument_node="">Papaya as a food</span></li><span data-dcnode-id="182" instrument_node="">
</span></ul><span data-dcnode-id="180" instrument_node="">
</span><p data-dcnode-id="176"><strong data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">Papaya Tea:</span></strong><span data-dcnode-id="177" instrument_node=""> Here's an old recipe: "To Make: Fill a saucepan with as many leaves as you can, cover with water and Simmer for 2 - 3 hours, drain and refrigerate the liquid. Drink one glassful three times a day." It does not taste nice, I’ve tried it! I'm sure people began with a small dose and increased it slowly.</span></p><span data-dcnode-id="175" instrument_node="">
</span><p data-dcnode-id="171"><span data-dcnode-id="172" style="color: #39913c;"><strong data-dcnode-id="173"><span data-dcnode-id="174" instrument_node="">Supplements and Extracts</span></strong></span></p><span data-dcnode-id="170" instrument_node="">
</span><p data-dcnode-id="168"><span data-dcnode-id="169" instrument_node="">Most of these will be available in your local health food shop, but some you will need to find and order online.</span></p><span data-dcnode-id="167" instrument_node="">
</span><ul data-dcnode-id="132"><span data-dcnode-id="166" instrument_node="">
</span><li data-dcnode-id="164"><span data-dcnode-id="165" instrument_node="">Omega 3</span></li><span data-dcnode-id="163" instrument_node="">
</span><li data-dcnode-id="161"><span data-dcnode-id="162" instrument_node="">Glucosomine. I prefer the hydrochloride based form, rather than sulfide based, but mix n match. It’s a personal choice.</span></li><span data-dcnode-id="160" instrument_node="">
</span><li data-dcnode-id="158"><span data-dcnode-id="159" instrument_node="">Vitamin C – up to 10 g per day. If you get diarrhea reduce the amount.</span></li><span data-dcnode-id="157" instrument_node="">
</span><li data-dcnode-id="155"><span data-dcnode-id="156" instrument_node="">Pancreatin tablets or capsules. If you have nausea and weakness that seems linked to the taking of these reduce your use temporarily.</span></li><span data-dcnode-id="154" instrument_node="">
</span><li data-dcnode-id="152"><span data-dcnode-id="153" instrument_node="">Enzyme Supplements to aid your digestion. Take these on an empty stomach before you eat. If you can, get some Betaine HCL and the HCL Activator to add to this even better.</span></li><span data-dcnode-id="151" instrument_node="">
</span><li data-dcnode-id="149"><span data-dcnode-id="150" instrument_node="">Another Product called Cellular Zeolite, may be worth getting. Check the internet. My research suggests the powdered form is cheaper and equally effective. Zeolite is purported to be very effective in removing heavy metals, herbicides etc from the body.</span></li><span data-dcnode-id="148" instrument_node="">
</span><li data-dcnode-id="146"><span data-dcnode-id="147" instrument_node="">Coenzyme Q10</span></li><span data-dcnode-id="145" instrument_node="">
</span><li data-dcnode-id="143"><span data-dcnode-id="144" instrument_node="">Green tea extract</span></li><span data-dcnode-id="142" instrument_node="">
</span><li data-dcnode-id="140"><span data-dcnode-id="141" instrument_node="">Selenium – I know someone who cured his cancer with selenium. Because it was not available in health food shops at the time he used the selenium from the agricultural supplier made for sheep!</span></li><span data-dcnode-id="139" instrument_node="">
</span><li data-dcnode-id="137"><span data-dcnode-id="138" instrument_node="">Vitamin E</span></li><span data-dcnode-id="136" instrument_node="">
</span><li data-dcnode-id="134"><span data-dcnode-id="135" instrument_node="">Green Barley Powder</span></li><span data-dcnode-id="133" instrument_node="">
</span></ul><span data-dcnode-id="131" instrument_node="">
</span><p data-dcnode-id="127"><span data-dcnode-id="128" style="color: #39913c;"><strong data-dcnode-id="129"><span data-dcnode-id="130" instrument_node="">Foods and things to Avoid or have in moderation.</span></strong></span></p><span data-dcnode-id="126" instrument_node="">
</span><ul data-dcnode-id="94"><span data-dcnode-id="125" instrument_node="">
</span><li data-dcnode-id="123"><span data-dcnode-id="124" instrument_node="">Cooked and processed foods</span></li><span data-dcnode-id="122" instrument_node="">
</span><li data-dcnode-id="120"><span data-dcnode-id="121" instrument_node="">Tomatoes, (in moderation unless they are acid free as in the Roma variety, or specific acid free ones)</span></li><span data-dcnode-id="119" instrument_node="">
</span><li data-dcnode-id="117"><span data-dcnode-id="118" instrument_node="">Sugar</span></li><span data-dcnode-id="116" instrument_node="">
</span><li data-dcnode-id="114"><span data-dcnode-id="115" instrument_node="">Legumes, nuts and whole grains: wheat, corn, barley, sorghum, and peanuts in moderation (these foods are high in phosphorus)</span></li><span data-dcnode-id="113" instrument_node="">
</span><li data-dcnode-id="111"><span data-dcnode-id="112" instrument_node="">Synthetic vitamins</span></li><span data-dcnode-id="110" instrument_node="">
</span><li data-dcnode-id="108"><span data-dcnode-id="109" instrument_node="">Foods high in phosphorus: meat, yeast, fish and seeds such as legumes, some nuts, and whole grain</span></li><span data-dcnode-id="107" instrument_node="">
</span><li data-dcnode-id="105"><span data-dcnode-id="106" instrument_node="">Heated fats and oils</span></li><span data-dcnode-id="104" instrument_node="">
</span><li data-dcnode-id="102"><span data-dcnode-id="103" instrument_node="">Chlorinated water</span></li><span data-dcnode-id="101" instrument_node="">
</span><li data-dcnode-id="99"><span data-dcnode-id="100" instrument_node="">Alcohol</span></li><span data-dcnode-id="98" instrument_node="">
</span><li data-dcnode-id="96"><span data-dcnode-id="97" instrument_node="">Smoking</span></li><span data-dcnode-id="95" instrument_node="">
</span></ul><span data-dcnode-id="93" instrument_node="">
</span><p data-dcnode-id="91"><span data-dcnode-id="92" instrument_node="">&nbsp;</span></p><span data-dcnode-id="90" instrument_node="">
</span><p data-dcnode-id="85"><strong data-dcnode-id="86"><span data-dcnode-id="88" style="color: #39913c;"><span data-dcnode-id="89" instrument_node="">Think positive, eat and drink healthy.</span></span><span data-dcnode-id="87" instrument_node=""> Live life to the full – it’s your life and your privilege.</span></strong></p><span data-dcnode-id="84" instrument_node="">
</span></div><span data-dcnode-id="82" instrument_node="">
</span></div></div></div></div></div><span data-dcnode-id="76" instrument_node=""> </span></div><span data-dcnode-id="73" instrument_node="">
