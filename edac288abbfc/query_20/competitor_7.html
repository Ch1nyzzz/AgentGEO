</span><p data-dcnode-id="852"><span data-dcnode-id="856" instrument_node="">The media often discusses cannabis’s potential to replace the need for long-term painkiller use, as well as many other prescription medications, like benzodiazepines (e.g., Valium, Xanax, Ativan, Klonopin) and barbiturates (e.g., Amytal, Butisol, Nembutal). There’s also the possibility that, for some people, it may replace or reduce the ingestion of </span><a data-dcnode-id="854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//leafwell.com/blog/cannabis-over-alcohol-pandemic/" rel="noopener" target="_blank"><span data-dcnode-id="855" instrument_node="">alcohol</span></a><span data-dcnode-id="853" instrument_node=""> and other recreational substances.</span></p><span data-dcnode-id="851" instrument_node="">
</span><p data-dcnode-id="843"><span data-dcnode-id="850" instrument_node="">However, few people have talked about cannabis’s potential to replace even the more benign, over-the-counter (OTC) drugs like </span><a data-dcnode-id="848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medium.com/%40Leafwell/cannabis-vs-anti-inflammatories-d8beb06d080f" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="849" instrument_node="">ibuprofen</span></a><span data-dcnode-id="847" instrument_node=""> and acetaminophen (e.g., Tylenol, Paracetamol). So, could getting an </span><a data-dcnode-id="845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//leafwell.com/medical-card/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="846" instrument_node="">MMJ card</span></a><span data-dcnode-id="844" instrument_node=""> help you reduce your intake of even OTC drugs?</span></p><span data-dcnode-id="842" instrument_node="">
</span><div class="tc pa-xxl pv-xl mb-xxl bg-grey-lighter" data-dcnode-id="817"><span data-dcnode-id="841" instrument_node="">
</span><h6 data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">Download Our Pros and Cons of Pot Vs Pills</span></h6><span data-dcnode-id="838" instrument_node="">
</span><div class="leafwell-hubspot-form" data-dcnode-id="819" data-form-id="f00fe6f6-5782-4bc3-80aa-638181eaf2bc" data-portal-id="7790175" data-wp-hubspot-form="" id="hbspt-form-1650647388000-4048830762"><form accept-charset="UTF-8" action="https://forms.hsforms.com/submissions/v3/public/submit/formsnext/multipart/7790175/f00fe6f6-5782-4bc3-80aa-638181eaf2bc" class="hs-form stacked hs-form-private hsForm_f00fe6f6-5782-4bc3-80aa-638181eaf2bc hs-form-f00fe6f6-5782-4bc3-80aa-638181eaf2bc hs-form-f00fe6f6-5782-4bc3-80aa-638181eaf2bc_5e574ebb-672c-43ca-ac7b-68642c0c9ae6" data-dcnode-id="820" data-form-id="f00fe6f6-5782-4bc3-80aa-638181eaf2bc" data-hs-cf-bound="true" data-portal-id="7790175" data-reactid=".hbspt-forms-0" enctype="multipart/form-data" id="hsForm_f00fe6f6-5782-4bc3-80aa-638181eaf2bc" method="POST" novalidate="" target="target_iframe_f00fe6f6-5782-4bc3-80aa-638181eaf2bc"><div class="hs_email hs-email hs-fieldtype-text field hs-form-field" data-dcnode-id="829" data-reactid=".hbspt-forms-0.1:$0"><label class="" data-dcnode-id="833" data-reactid=".hbspt-forms-0.1:$0.0" for="email-f00fe6f6-5782-4bc3-80aa-638181eaf2bc" id="label-email-f00fe6f6-5782-4bc3-80aa-638181eaf2bc" placeholder="Enter your Email"><span data-dcnode-id="836" data-reactid=".hbspt-forms-0.1:$0.0.0"><span data-dcnode-id="837" instrument_node="">Email</span></span><span class="hs-form-required" data-dcnode-id="834" data-reactid=".hbspt-forms-0.1:$0.0.1"><span data-dcnode-id="835" instrument_node="">*</span></span></label><legend class="hs-field-desc" data-dcnode-id="832" data-reactid=".hbspt-forms-0.1:$0.1" style="display:none;"></legend><div class="input" data-dcnode-id="830" data-reactid=".hbspt-forms-0.1:$0.$email"><input autocomplete="email" class="hs-input" data-dcnode-id="831" data-reactid=".hbspt-forms-0.1:$0.$email.0" id="email-f00fe6f6-5782-4bc3-80aa-638181eaf2bc" inputmode="email" name="email" placeholder="Enter Email" required="" type="email" value=""></div></div><noscript data-dcnode-id="828" data-reactid=".hbspt-forms-0.2"></noscript><div class="hs_submit hs-submit" data-dcnode-id="824" data-reactid=".hbspt-forms-0.5"><div class="hs-field-desc" data-dcnode-id="827" data-reactid=".hbspt-forms-0.5.0" style="display:none;"></div><div class="actions" data-dcnode-id="825" data-reactid=".hbspt-forms-0.5.1"><input class="hs-button primary large" data-dcnode-id="826" data-reactid=".hbspt-forms-0.5.1.0" type="submit" value="Download"></div></div><noscript data-dcnode-id="823" data-reactid=".hbspt-forms-0.6"></noscript><input data-dcnode-id="822" data-reactid=".hbspt-forms-0.7" name="hs_context" type="hidden" value="{&quot;rumScriptExecuteTime&quot;:3073.739999999816,&quot;rumServiceResponseTime&quot;:3777.735000003304,&quot;rumFormRenderTime&quot;:37.15999999985797,&quot;rumTotalRenderTime&quot;:3819.9600000007194,&quot;rumTotalRequestTime&quot;:699.1600000037579,&quot;disableCookieSubmission&quot;:true,&quot;renderRawHtml&quot;:&quot;true&quot;,&quot;lang&quot;:&quot;en&quot;,&quot;embedType&quot;:&quot;REGULAR&quot;,&quot;embedAtTimestamp&quot;:&quot;1650806677987&quot;,&quot;formDefinitionUpdatedAt&quot;:&quot;1611847530291&quot;,&quot;pageUrl&quot;:&quot;https://leafwell.com/blog/cannabis-vs-otc-medications-acetaminophen/&quot;,&quot;pageTitle&quot;:&quot;Cannabis vs. OTC Medications: Similarities and Differences&quot;,&quot;source&quot;:&quot;FormsNext-static-5.483&quot;,&quot;sourceName&quot;:&quot;FormsNext&quot;,&quot;sourceVersion&quot;:&quot;5.483&quot;,&quot;sourceVersionMajor&quot;:&quot;5&quot;,&quot;sourceVersionMinor&quot;:&quot;483&quot;,&quot;timestamp&quot;:1650806677987,&quot;userAgent&quot;:&quot;Mozilla/5.0 (Windows NT 6.1; WOW64) AppleWebKit/534+ (KHTML, like Gecko) BingPreview/1.0b&quot;,&quot;originalEmbedContext&quot;:{&quot;portalId&quot;:&quot;7790175&quot;,&quot;formId&quot;:&quot;f00fe6f6-5782-4bc3-80aa-638181eaf2bc&quot;,&quot;target&quot;:&quot;#hbspt-form-1650647388000-4048830762&quot;},&quot;renderedFieldsIds&quot;:[&quot;email&quot;],&quot;formTarget&quot;:&quot;#hbspt-form-1650647388000-4048830762&quot;,&quot;correlationId&quot;:&quot;4837be2e-830a-4312-a4a9-c598984cdba1&quot;,&quot;captchaStatus&quot;:&quot;NOT_APPLICABLE&quot;}"><iframe data-dcnode-id="821" data-reactid=".hbspt-forms-0.8" name="target_iframe_f00fe6f6-5782-4bc3-80aa-638181eaf2bc" style="display:none;"></iframe></form></div><span data-dcnode-id="818" instrument_node="">
</span></div><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">We use the term Tylenol throughout this article so people understand what we mean with greater clarity, but it should be remembered that this is a trade name. Acetaminophen is generally the preferred term, as trade names can be confusing for readers who are not familiar with a particular brand. However, as Tylenol and paracetamol are quite well-established terms now, they can be used interchangably with acetaminophen.</span></p><span data-dcnode-id="813" instrument_node="">
</span><h2 data-dcnode-id="811" id="What is Acetaminophen, aka Tylenol, Used For?"><span data-dcnode-id="812" instrument_node="">What is Acetaminophen, aka Tylenol, Used For?</span></h2><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="805"><span data-dcnode-id="809" instrument_node="">Now, you may be asking, “Tylenol? Really?” To which it is reasonable to say, “Yes, really.” Tylenol, in which the active ingredient is acetaminophen, is perhaps one of the most commonly used drugs in the world. Acetaminophen is usually used for reducing fever and the relief of mild-to-moderate pain arising from osteoarthritis, back pain, headaches, postoperative pain, dental pain, and many other kinds of acute or </span><a data-dcnode-id="807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//leafwell.com/blog/how-to-use-cannabis-to-manage-chronic-pain/" rel="noopener" target="_blank"><span data-dcnode-id="808" instrument_node="">chronic pain</span></a><span data-dcnode-id="806" instrument_node="">.</span></p><span data-dcnode-id="804" instrument_node="">
</span><h2 data-dcnode-id="802" id="How Does Tylenol Work?"><span data-dcnode-id="803" instrument_node="">How Does Tylenol Work?</span></h2><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Interestingly, the way in which Tylenol may work for some kinds of mild-to-moderate pain is because it inhibits the enzyme that breaks down anandamide (our bodies’ “bliss” molecule), meaning that there is more of this pain-relieveing bliss molecule in our blood. This means that tylenol works on cannabinoid receptors, and this could be one of the ways in which it alleviates pain.</span></p><span data-dcnode-id="798" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="797" instrument_node="">Compared to </span><a data-dcnode-id="795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//leafwell.com/blog/what-is-thc-tetrahydrocannabinol/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="796" instrument_node="">THC</span></a><span data-dcnode-id="794" instrument_node="">, Tylenol is not as psychoactive. Tylenol is thought to relieve inflammatory pain through </span><a data-dcnode-id="792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jneurosci.org/content/38/2/322" rel="noopener" target="_blank"><span data-dcnode-id="793" instrument_node="">CB1 receptors</span></a><span data-dcnode-id="791" instrument_node="">. It may also prevent the release of inflammatory lipids (called </span><em data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">prostaglandins</span></em><span data-dcnode-id="788" instrument_node="">), which reduces pain and body temperature.</span></p><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Beyond this, scientists and doctors do not know the precise mechanism of how Tylenol actually works, although this relatively recent discovery of interaction with cannabinoid receptors gives us one big clue!</span></p><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="759" style="text-align:center"><span data-dcnode-id="782" instrument_node="">
</span><span data-dcnode-id="780" instrument_node="">
</span><span class="hs-cta-wrapper" data-dcnode-id="763" id="hs-cta-wrapper-890b6a98-e168-4def-b315-067a16af2bfc"><span data-dcnode-id="779" instrument_node="">
</span><span class="hs-cta-node hs-cta-890b6a98-e168-4def-b315-067a16af2bfc" data-dcnode-id="770" id="890b6a98-e168-4def-b315-067a16af2bfc"><span data-dcnode-id="778" instrument_node="">
</span><span data-dcnode-id="776" instrument_node="">
</span><a data-dcnode-id="772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cta-redirect.hubspot.com/cta/redirect/7790175/890b6a98-e168-4def-b315-067a16af2bfc"><span data-dcnode-id="775" instrument_node="">
</span><img alt="New call-to-action" class="hs-cta-img" data-dcnode-id="774" id="hs-cta-img-890b6a98-e168-4def-b315-067a16af2bfc" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//no-cache.hubspot.com/cta/default/7790175/890b6a98-e168-4def-b315-067a16af2bfc.png&amp;raw" style="border-width:0px"><span data-dcnode-id="773" instrument_node="">
</span></a><span data-dcnode-id="771" instrument_node="">
</span></span><span data-dcnode-id="769" instrument_node="">
</span><span data-dcnode-id="767" instrument_node="">
</span><span data-dcnode-id="764" instrument_node="">
</span></span><span data-dcnode-id="762" instrument_node="">
</span><span data-dcnode-id="760" instrument_node="">
</span></p><span data-dcnode-id="758" instrument_node="">
</span><h2 data-dcnode-id="756" id="How Effective Is Tylenol?"><span data-dcnode-id="757" instrument_node="">How Effective Is Tylenol?</span></h2><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="750"><span data-dcnode-id="754" instrument_node="">The efficacy of Tylenol is very much up for debate. </span><a data-dcnode-id="752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4381278/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="753" instrument_node="">The US National Library of Medicine from the National Institutes of Health</span></a><span data-dcnode-id="751" instrument_node=""> found:</span></p><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">“Paracetamol [Tylenol] is ineffective in the treatment of low back pain and provides minimal short term benefit for people with osteoarthritis. These results support the reconsideration of recommendations to use paracetamol for patients with low back pain and osteoarthritis of the hip or knee in clinical practice guidelines.”</span></p><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="745" instrument_node="">These findings are verified by studies conducted around the globe. A review&nbsp;by </span><a data-dcnode-id="743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cochrane.org/CD012230/BACK_paracetamol-low-back-pain" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="744" instrument_node="">Cochrane UK</span></a><span data-dcnode-id="742" instrument_node=""> also comes to a similar conclusion:</span></p><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">“We found high-quality evidence that paracetamol (4 g per day) is no better than placebo for relieving acute LBP [lower back pain] in either the short or longer term. It also worked no better than placebo on the other aspects studied, such as quality of life and sleep quality. About one in five people reported side effects, though few were serious, and there was no difference between intervention and control groups.”</span></p><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="736" instrument_node="">There are times when Tylenol can be useful, such as fevers and different kinds of pain, such as </span><a data-dcnode-id="734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//leafwell.com/medical-conditions/migraine-headache-medical-marijuana/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="735" instrument_node="">migraines and tension headaches</span></a><span data-dcnode-id="733" instrument_node="">. So, it would seem that acetaminophen is useful for some health problems and injuries, but not necessarily all of them. Some of its benefits could come from the placebo effect.</span></p><span data-dcnode-id="731" instrument_node="">
</span><h2 data-dcnode-id="729" id="How Dangerous is Paracetamol? Can I Overdose on It?"><span data-dcnode-id="730" instrument_node="">How Dangerous is Paracetamol? Can I Overdose on It?</span></h2><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="727" instrument_node="">So, how dangerous is acetaminophen overall, and how many does it kill every year? First, it must be remembered that being ineffective and being dangerous and two very different things. However, adding a medication that is not necessarily needed can complicate matters and change the safety profile of a drug. Two pieces from ProPublica, “</span><a data-dcnode-id="725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.propublica.org/article/tylenol-mcneil-fda-use-only-as-directed" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="726" instrument_node="">Only Use as Directed</span></a><span data-dcnode-id="724" instrument_node="">”&nbsp;and “</span><a data-dcnode-id="722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.propublica.org/article/tylenol-mcneil-fda-behind-the-numbers" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="723" instrument_node="">Behind the Numbers</span></a><span data-dcnode-id="721" instrument_node="">,” also paint an interesting picture, as they draw their conclusions from several major studies from different organizations.</span></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">“Data obtained from the U.S. Centers for Disease Control and Prevention show that more than 300 people die annually as a result of acetaminophen poisoning…Beginning in 2006, according to the CDC, the number of people who died after accidentally taking too much acetaminophen surpassed the number who died from intentionally overdosing to commit suicide.</span></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">…The American Association of Poison Control Centers (AAPCC), a nonprofit that receives federal funds, shows about 113 people dying each year as a result of overdosing on medicines with acetaminophen. Since 2006, acetaminophen has accounted for more fatalities than all other over-the-counter pain relievers combined, according to AAPCC data.”</span></p><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Acetaminophen is not necessarily dangerous in small doses. However, in large doses or taken consistently over longer periods, it can cause fatal liver damage and, in some cases, kidney damage. Skin reactions like Stevens-Johnson syndrome are rare, but still possible. There are also some potential links between asthma and paracetamol use. Many experts claim that doses of up to 4,000 mg of acetaminophen a day are relatively safe for most people.</span></p><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">As for how many people die per year due to Tylenol (acetaminophen) poisoning, the number is around 113, but some numbers show around 300. Acetaminophen is often combined with opioid-based drugs for its synergistic effects (i.e. adding acetaminophen to opioids makes the opioids stronger), so some of the numbers may crossover into deaths associated with other drugs.</span></p><span data-dcnode-id="707" instrument_node="">
</span><h3 data-dcnode-id="705" id="Mixing Acetaminophen with Other Medications"><span data-dcnode-id="706" instrument_node="">Mixing Acetaminophen with Other Medications</span></h3><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="703" instrument_node="">There are wide discrepancies between the numbers because the FDA doesn’t necessarily demonstrate a causal relationship between a person’s death and a particular drug, just an association. The other problem is that paracetamol is such a commonly-used drug that is often used in combination with other medications to strengthen their effects (e.g., </span><a data-dcnode-id="701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.projectcbd.org/wellness/trade-your-ibuprofen-cannabis" rel="noopener" target="_blank"><span data-dcnode-id="702" instrument_node="">ibuprofen</span></a><span data-dcnode-id="700" instrument_node=""> and acetaminophen, Vicodin [acetaminophen and hydrocodone] and Co-Codamol [codeine and paracetamol]).</span></p><span data-dcnode-id="698" instrument_node="">
</span><figure aria-describedby="caption-attachment-7991" class="wp-caption aligncenter" data-dcnode-id="694" id="attachment_7991"><img alt="Acetaminophen (Tylenol, paracetamol) metabolization in the body." class="wp-image-7991 size-full" data-dcnode-id="697" height="621" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//admin.leafwell.com/app/uploads/2022/02/Acetaminophen_metabolism.jpg&amp;raw" width="865"><figcaption class="wp-caption-text" data-dcnode-id="695" id="caption-attachment-7991"><span data-dcnode-id="696" instrument_node="">How acetaminophen is metabolized by the human body. The liver processes acetaminophen.</span></figcaption></figure><span data-dcnode-id="693" instrument_node="">
</span><h3 data-dcnode-id="691" id="Mixing Tylenol with Alcohol"><span data-dcnode-id="692" instrument_node="">Mixing Tylenol with Alcohol</span></h3><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Acetaminophen can be quite dangerous when taken in combination with alcohol, which can increase the chances of liver failure. This means that, if acetaminophen was the cause of death (or at least a contributor), it is often “hidden” by other factors. Therefore, the number of deaths via acetaminophen could be higher than expected.</span></p><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">So, is the relatively benign acetaminophen/paracetamol/Tylenol dangerous? Not extremely, but it’s not exactly completely safe, either, especially when it’s taken with other drugs or alcohol. Of course, another problem is that a person may take a weak opioid, then take Tylenol at some point, and have much stronger effects than expected. Perhaps the real kicker is that, for many people with pain, paracetamol/Tylenol/acetaminophen may not even be that effective.</span></p><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="679"><span data-dcnode-id="683" instrument_node="">This leads to an ethical question for many doctors, as they can reasonably ask themselves, “Why should I prescribe this, when it won’t work for most people and could end up becoming dangerous?” It’s certainly a fine balancing act, and individuals can respond very differently to the same drug at the same dosage, and healthcare professionals are often mindful of this factor. </span><a data-dcnode-id="681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medpagetoday.com/hospitalbasedmedicine/generalhospitalpractice/35903" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="682" instrument_node="">Excessive acetaminophen/Tylenol dosing</span></a><span data-dcnode-id="680" instrument_node=""> is also common in hospitals, however, perhaps due to the relatively beningn nature of acetaminophen in healthcare settings.</span></p><span data-dcnode-id="678" instrument_node="">
</span><h2 data-dcnode-id="676" id="Mixing Medical Cannabis with Other Medications"><span data-dcnode-id="677" instrument_node="">Mixing Medical Cannabis with Other Medications</span></h2><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="670"><span data-dcnode-id="674" instrument_node="">We don’t precisely know all the different cross-reactions between medical marijuana and other drugs due to the lack of research, but we can safely say there likely will be. Cannabis, although it can be used to wean and taper a person off of opioids, may well have </span><a data-dcnode-id="672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.drugs.com/drug-interactions/cannabis.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="673" instrument_node="">negative reactions with painkillers</span></a><span data-dcnode-id="671" instrument_node=""> like propoxyphene (found in Darvocet, Darvon), buprenorphine (Butrans, Buprenex), buprenorphine (Subutex), and naloxone (Suboxone, which also contains buprenorphine).</span></p><span data-dcnode-id="669" instrument_node="">
</span><p data-dcnode-id="661"><span data-dcnode-id="668" instrument_node="">Cannabis also has negative interactions with alcohol, </span><a data-dcnode-id="666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/26114620" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="667" instrument_node="">benzodiazepines like Clobazam</span></a><span data-dcnode-id="665" instrument_node="">&nbsp; – which is often used for epilepsy – and may have a drug-drug interaction. CBD and benzos are both metabolized by the same liver enzyme (cytochrome P450), and </span><a data-dcnode-id="663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/3095648"><span data-dcnode-id="664" instrument_node="">barbiturates</span></a><span data-dcnode-id="662" instrument_node="">, which may interact with THC (but not necessarily CBD). The reason why cannabis may have a negative interaction with these other drugs is that they are all central nervous system (CNS) depressants, and cannabis may potentiate this effect.</span></p><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="655"><span data-dcnode-id="659" instrument_node="">Many doctors and pharmacists may also recommend patients avoid other drugs that affect </span><a data-dcnode-id="657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pharmacytimes.com/publications/issue/2014/december2014/drug-interactions-with-marijuana" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="658" instrument_node="">cytochrome enzymes</span></a><span data-dcnode-id="656" instrument_node=""> in the body. Patients who cannot metabolize CYP2C9 properly may want to be careful with amiodarone, cimetidine, and fluoxetine, as the body may inhibit THC elimination. Meanwhile, rifampin, which is a CYP3A4 inducer, may reduce THC levels.</span></p><span data-dcnode-id="654" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="653" instrument_node="">As for </span><a data-dcnode-id="651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//leafwell.com/blog/what-is-cbd/" rel="noopener" target="_blank"><span data-dcnode-id="652" instrument_node="">cannabidiol (CBD)</span></a><span data-dcnode-id="650" instrument_node="">, which is a substrate of CYP3A4 and CYP2C19, may also be inhibited by rifampin, with CBD levels in the blood reduced by 50% or more when ingested alongside CBD. Both </span><a data-dcnode-id="648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//leafwell.com/blog/what-is-thc-tetrahydrocannabinol/" rel="noopener" target="_blank"><span data-dcnode-id="649" instrument_node="">tetrahydrocannabinol (THC)</span></a><span data-dcnode-id="647" instrument_node=""> and CBD may have limited ability to inhibit the activity of CYP450 enzymes, although this is more often associated with CBD than THC.</span></p><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="637"><span data-dcnode-id="644" instrument_node="">Interestingly enough, smoked marijuana (as opposed to oral administration) has been shown to increase the metabolism of theophylline and chlorpromazine. This suggests that cannabis could have applicactions in chronic obstructive pulmonary disease (COPD), </span><a data-dcnode-id="642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//leafwell.com/medical-conditions/asthma-and-medical-cannabis/" rel="noopener" target="_blank"><span data-dcnode-id="643" instrument_node="">asthma</span></a><span data-dcnode-id="641" instrument_node="">, and psychosis. Counterintuitively, this means that, despite all the potential harms smoking burning carbon matter of any kind can do, </span><em data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">some people may find more benefit in smoking cannabis</span></em><span data-dcnode-id="638" instrument_node=""> (please note that this is a theory only).</span></p><span data-dcnode-id="636" instrument_node="">
</span><p data-dcnode-id="634"><img alt="Cannabis/Marijuana Plants Growing" class="size-full wp-image-28645" data-dcnode-id="635" height="960" loading="lazy" sizes="(max-width: 1280px) 100vw, 1280px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//admin.leafwell.com/app/uploads/2022/02/Marijuana_Plant_03.jpg&amp;raw" srcset="https://946256.smushcdn.com/2628119/app/uploads/2022/02/Marijuana_Plant_03.jpg?size=384x288&amp;lossy=1&amp;strip=1&amp;webp=1 384w, https://946256.smushcdn.com/2628119/app/uploads/2022/02/Marijuana_Plant_03-600x450.jpg?lossy=1&amp;strip=1&amp;webp=1 600w, https://946256.smushcdn.com/2628119/app/uploads/2022/02/Marijuana_Plant_03-768x576.jpg?lossy=1&amp;strip=1&amp;webp=1 768w, https://946256.smushcdn.com/2628119/app/uploads/2022/02/Marijuana_Plant_03-1024x768.jpg?lossy=1&amp;strip=1&amp;webp=1 1024w, https://946256.smushcdn.com/2628119/app/uploads/2022/02/Marijuana_Plant_03.jpg?size=1152x864&amp;lossy=1&amp;strip=1&amp;webp=1 1152w, https://946256.smushcdn.com/2628119/app/uploads/2022/02/Marijuana_Plant_03.jpg?lossy=1&amp;strip=1&amp;webp=1 1280w" width="1280"></p><span data-dcnode-id="633" instrument_node="">
</span><h2 data-dcnode-id="631" id="Can I Overdose on Marijuana?"><span data-dcnode-id="632" instrument_node="">Can I Overdose on Marijuana?</span></h2><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="625"><span data-dcnode-id="629" instrument_node="">Overall, we can safely assume that smoking any substance is going to be bad for most people’s health. As acetaminophen is usually orally administered, it could be considered safer than smoking cannabis in this regard. However, acetaminophen use, even when used on its own, has caused overdoses and killed people. On the other hand, </span><em data-dcnode-id="626"><a data-dcnode-id="627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.popsci.com/overdose-on-weed-marijuana/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="628" instrument_node="">no one has died via overdose on cannabis alone.</span></a></em></p><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Furthermore, there are other methods of delivery to avoid the negative effects of smoking marijuana. Many popular forms of ingestion include edibles, oils, and tinctures. Cannabis can even be applied topically as lotion or oil to provide relief for aching joints, sore muscles, and muscle spasms.</span></p><span data-dcnode-id="621" instrument_node="">
</span><h2 data-dcnode-id="619" id="Acetaminophen vs. Medical Marijuana for Mental Health"><span data-dcnode-id="620" instrument_node="">Acetaminophen vs. Medical Marijuana for Mental Health</span></h2><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">When it comes to the chances of overdose and death, cannabis is safer than acetaminophen for relieving physical aches and pains. But what about other concerns, like mental health?</span></p><span data-dcnode-id="615" instrument_node="">
</span><h3 data-dcnode-id="613" id="Acetaminophen and its Effect on Mental Health"><span data-dcnode-id="614" instrument_node="">Acetaminophen and its Effect on Mental Health</span></h3><span data-dcnode-id="612" instrument_node="">
</span><p data-dcnode-id="601"><span data-dcnode-id="611" instrument_node="">Some people have claimed&nbsp;</span><a data-dcnode-id="609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nhs.uk/news/mental-health/dont-take-paracetamol-for-painful-emotions/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="610" instrument_node="">paracetamol may be useful for emotional pain</span></a><span data-dcnode-id="608" instrument_node="">, but no studies have proven this to be true. There are also some case studies associated with </span><a data-dcnode-id="606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/4000376" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="607" instrument_node="">acute psychosis, codeine, and acetaminophen</span></a><span data-dcnode-id="605" instrument_node="">, but there isn’t anything definitive. Other studies have even suggested that using over-the-counter painkillers may </span><a data-dcnode-id="603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.medicaldaily.com/otc-painkiller-tylenol-acetaminophen-381445" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="604" instrument_node="">impair the brain’s ability to detect errors</span></a><span data-dcnode-id="602" instrument_node="">. Overall, there doesn’t seem to be any significant relationship between acetaminophen and mental health issues, but this doesn’t seem to be an area that’s researched very much.</span></p><span data-dcnode-id="600" instrument_node="">
</span><h3 data-dcnode-id="598" id="Medical Marijuana for Mental Health"><span data-dcnode-id="599" instrument_node="">Medical Marijuana for Mental Health</span></h3><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="592"><span data-dcnode-id="596" instrument_node="">Cannabis and mental health, on the other hand, has an interesting relationship. Although there is </span><a data-dcnode-id="594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bjp.rcpsych.org/content/178/2/116" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="595" instrument_node="">no definitive evidence</span></a><span data-dcnode-id="593" instrument_node=""> that cannabis is a cause of mental health issues for anyone, it doesn’t mean that it might not be a confounding factor for certain types of mental illness. Those who suffer from or have a family history of schizophrenia, for example, may want to avoid THC (although CBD may be an antipsychotic and can help those with schizophrenia). Similarly, for those with bipolar disorder, THC should ideally be avoided, especially during any manic phases.</span></p><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="584"><a data-dcnode-id="589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kclpure.kcl.ac.uk/portal/en/publications/associations-between-adolescent-cannabis-use-and-neuropsychological-decline%284eedc9c4-e223-4abe-99cd-c71c9ee0d75c%29.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="590" instrument_node="">Age may be a factor</span></a><span data-dcnode-id="588" instrument_node="">&nbsp;for the relationship between medical cannabis and mental health as well, as early, non-medical cannabis use by adolescents may cause some sort of neurological decline. However, for those who are older with fully-developed brains, cannabinoids may promote </span><a data-dcnode-id="586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jci.org/articles/view/25509" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="587" instrument_node="">neurogenesis and&nbsp;antidepressant-like effects</span></a><span data-dcnode-id="585" instrument_node="">! Cannabis and its benefits and problems with mental health need to be researched further.</span></p><span data-dcnode-id="583" instrument_node="">
</span><h2 data-dcnode-id="581" id="Is Medical Marijuana Safer Than Paracetamol?"><span data-dcnode-id="582" instrument_node="">Is Medical Marijuana Safer Than Paracetamol?</span></h2><span data-dcnode-id="580" instrument_node="">
</span><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">In terms of the potential of getting a fatal overdose, yes, medical marijuana is has a better safety profile. Using a cupboard full of cannabis on its own won’t kill you, whereas a cabinet full of Tylenol and other acetaminophen-containing products could if taken in sufficient amounts.</span></p><span data-dcnode-id="577" instrument_node="">
</span><div class="tc pa-xxl pv-xl mb-xxl bg-grey-lighter" data-dcnode-id="552"><span data-dcnode-id="576" instrument_node="">
</span><h6 data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Download Our Pros and Cons of Pot Vs Pills</span></h6><span data-dcnode-id="573" instrument_node="">
</span><div class="leafwell-hubspot-form" data-dcnode-id="554" data-form-id="f00fe6f6-5782-4bc3-80aa-638181eaf2bc" data-portal-id="7790175" data-wp-hubspot-form="" id="hbspt-form-1650647388000-8109280656"><form accept-charset="UTF-8" action="https://forms.hsforms.com/submissions/v3/public/submit/formsnext/multipart/7790175/f00fe6f6-5782-4bc3-80aa-638181eaf2bc" class="hs-form stacked hs-form-private hsForm_f00fe6f6-5782-4bc3-80aa-638181eaf2bc hs-form-f00fe6f6-5782-4bc3-80aa-638181eaf2bc hs-form-f00fe6f6-5782-4bc3-80aa-638181eaf2bc_3b95b60a-f323-4871-97bf-a280f5a46011" data-dcnode-id="555" data-form-id="f00fe6f6-5782-4bc3-80aa-638181eaf2bc" data-hs-cf-bound="true" data-portal-id="7790175" data-reactid=".hbspt-forms-1" enctype="multipart/form-data" id="hsForm_f00fe6f6-5782-4bc3-80aa-638181eaf2bc" method="POST" novalidate="" target="target_iframe_f00fe6f6-5782-4bc3-80aa-638181eaf2bc"><div class="hs_email hs-email hs-fieldtype-text field hs-form-field" data-dcnode-id="564" data-reactid=".hbspt-forms-1.1:$0"><label class="" data-dcnode-id="568" data-reactid=".hbspt-forms-1.1:$0.0" for="email-f00fe6f6-5782-4bc3-80aa-638181eaf2bc" id="label-email-f00fe6f6-5782-4bc3-80aa-638181eaf2bc" placeholder="Enter your Email"><span data-dcnode-id="571" data-reactid=".hbspt-forms-1.1:$0.0.0"><span data-dcnode-id="572" instrument_node="">Email</span></span><span class="hs-form-required" data-dcnode-id="569" data-reactid=".hbspt-forms-1.1:$0.0.1"><span data-dcnode-id="570" instrument_node="">*</span></span></label><legend class="hs-field-desc" data-dcnode-id="567" data-reactid=".hbspt-forms-1.1:$0.1" style="display:none;"></legend><div class="input" data-dcnode-id="565" data-reactid=".hbspt-forms-1.1:$0.$email"><input autocomplete="email" class="hs-input" data-dcnode-id="566" data-reactid=".hbspt-forms-1.1:$0.$email.0" id="email-f00fe6f6-5782-4bc3-80aa-638181eaf2bc" inputmode="email" name="email" placeholder="Enter Email" required="" type="email" value=""></div></div><noscript data-dcnode-id="563" data-reactid=".hbspt-forms-1.2"></noscript><div class="hs_submit hs-submit" data-dcnode-id="559" data-reactid=".hbspt-forms-1.5"><div class="hs-field-desc" data-dcnode-id="562" data-reactid=".hbspt-forms-1.5.0" style="display:none;"></div><div class="actions" data-dcnode-id="560" data-reactid=".hbspt-forms-1.5.1"><input class="hs-button primary large" data-dcnode-id="561" data-reactid=".hbspt-forms-1.5.1.0" type="submit" value="Download"></div></div><noscript data-dcnode-id="558" data-reactid=".hbspt-forms-1.6"></noscript><input data-dcnode-id="557" data-reactid=".hbspt-forms-1.7" name="hs_context" type="hidden" value="{&quot;rumScriptExecuteTime&quot;:3073.739999999816,&quot;rumServiceResponseTime&quot;:3780.6000000055064,&quot;rumFormRenderTime&quot;:2.79499999305699,&quot;rumTotalRenderTime&quot;:3912.739999999758,&quot;rumTotalRequestTime&quot;:696.300000003248,&quot;disableCookieSubmission&quot;:true,&quot;renderRawHtml&quot;:&quot;true&quot;,&quot;lang&quot;:&quot;en&quot;,&quot;embedType&quot;:&quot;REGULAR&quot;,&quot;embedAtTimestamp&quot;:&quot;1650806677987&quot;,&quot;formDefinitionUpdatedAt&quot;:&quot;1611847530291&quot;,&quot;pageUrl&quot;:&quot;https://leafwell.com/blog/cannabis-vs-otc-medications-acetaminophen/&quot;,&quot;pageTitle&quot;:&quot;Cannabis vs. OTC Medications: Similarities and Differences&quot;,&quot;source&quot;:&quot;FormsNext-static-5.483&quot;,&quot;sourceName&quot;:&quot;FormsNext&quot;,&quot;sourceVersion&quot;:&quot;5.483&quot;,&quot;sourceVersionMajor&quot;:&quot;5&quot;,&quot;sourceVersionMinor&quot;:&quot;483&quot;,&quot;timestamp&quot;:1650806677987,&quot;userAgent&quot;:&quot;Mozilla/5.0 (Windows NT 6.1; WOW64) AppleWebKit/534+ (KHTML, like Gecko) BingPreview/1.0b&quot;,&quot;originalEmbedContext&quot;:{&quot;portalId&quot;:&quot;7790175&quot;,&quot;formId&quot;:&quot;f00fe6f6-5782-4bc3-80aa-638181eaf2bc&quot;,&quot;target&quot;:&quot;#hbspt-form-1650647388000-8109280656&quot;},&quot;renderedFieldsIds&quot;:[&quot;email&quot;],&quot;formTarget&quot;:&quot;#hbspt-form-1650647388000-8109280656&quot;,&quot;correlationId&quot;:&quot;1e80ce52-2d6c-48b9-8c04-b8902ebc12ab&quot;,&quot;captchaStatus&quot;:&quot;NOT_APPLICABLE&quot;}"><iframe data-dcnode-id="556" data-reactid=".hbspt-forms-1.8" name="target_iframe_f00fe6f6-5782-4bc3-80aa-638181eaf2bc" style="display:none;"></iframe></form></div><span data-dcnode-id="553" instrument_node="">
</span></div><span data-dcnode-id="551" instrument_node="">
</span><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">On the other hand, using cannabis (and THC in particular) and operating heavy machinery is not recommended. This is not usually a problem when it comes to paracetamol, which does not normally affect day-to-day activities due to its lack of psychoactivity.</span></p><span data-dcnode-id="548" instrument_node="">
</span><p data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">On the mental health side, more research needs to be conducted to come to a definitive conclusion. For children, it seems that acetaminophen could be said to be preferable to higher doses of THC due to its psychoactivity, but for adults suffering from body aches, medical marijuana might have some uses.</span></p><span data-dcnode-id="545" instrument_node="">
</span><p data-dcnode-id="543"><img alt="tincture bottle and dropper" class="size-full wp-image-28646" data-dcnode-id="544" height="1024" loading="lazy" sizes="(max-width: 819px) 100vw, 819px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//admin.leafwell.com/app/uploads/2022/02/Homemade-Tincture.jpg&amp;raw" srcset="https://946256.smushcdn.com/2628119/app/uploads/2022/02/Homemade-Tincture.jpg?size=384x480&amp;lossy=1&amp;strip=1&amp;webp=1 384w, https://946256.smushcdn.com/2628119/app/uploads/2022/02/Homemade-Tincture-480x600.jpg?lossy=1&amp;strip=1&amp;webp=1 480w, https://946256.smushcdn.com/2628119/app/uploads/2022/02/Homemade-Tincture-768x960.jpg?lossy=1&amp;strip=1&amp;webp=1 768w, https://946256.smushcdn.com/2628119/app/uploads/2022/02/Homemade-Tincture.jpg?lossy=1&amp;strip=1&amp;webp=1 819w" width="819"></p><span data-dcnode-id="542" instrument_node="">
</span><p data-dcnode-id="528"><span data-dcnode-id="541" instrument_node="">There is another issue at play here, and that is “Are we making a fair and equal comparison?” We’re judging one drug, acetaminophen, with all the various moving parts and cannabinoids that make up the cannabis plant. Some cannabinoids could be safer than others on their own. For example, THC used alone is very uncomfortable for many people. On the other hand, the </span><a data-dcnode-id="539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//leafwell.com/blog/some-faqs-about-medical-marijuana/" rel="noopener" target="_blank"><span data-dcnode-id="540" instrument_node="">entourage effect</span></a><span data-dcnode-id="538" instrument_node=""> could well be providing a buffer against some of the more harmful aspects of cannabinoids taken by itself. Perhaps we should be asking, “Is </span><a data-dcnode-id="536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//leafwell.com/blog/how-does-cbd-work/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="537" instrument_node="">CBD</span></a><span data-dcnode-id="535" instrument_node=""> safer than paracetamol? What about THC, </span><a data-dcnode-id="533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//leafwell.com/blog/what-is-cbg-cannabigerol-medicinal-benefits-use/" rel="noopener" target="_blank"><span data-dcnode-id="534" instrument_node="">cannabigerol (CBG)</span></a><span data-dcnode-id="532" instrument_node="">, </span><a data-dcnode-id="530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//leafwell.com/blog/what-is-cannabichromene-cbc-a-rare-cannabinoid-with-huge-medical-potential/" rel="noopener" target="_blank"><span data-dcnode-id="531" instrument_node="">cannabichromene (CBC)</span></a><span data-dcnode-id="529" instrument_node="">, and so on?”</span></p><span data-dcnode-id="527" instrument_node="">
</span><p data-dcnode-id="519"><span data-dcnode-id="526" instrument_node="">Comparing one, highly purified, manufactured drug with a medicine that hasn’t been purified and has several different cannabinoids, </span><a data-dcnode-id="524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//leafwell.com/blog/what-are-terpenes-and-how-do-they-interact-with-cannabinoids/" rel="noopener" target="_blank"><span data-dcnode-id="525" instrument_node="">terpenoids</span></a><span data-dcnode-id="523" instrument_node="">, and </span><a data-dcnode-id="521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//leafwell.com/blog/what-are-flavonoids-the-unique-effects-of-cannabis-flavors/" rel="noopener" target="_blank"><span data-dcnode-id="522" instrument_node="">flavonoids</span></a><span data-dcnode-id="520" instrument_node=""> doesn’t necessarily seem fair. Rather, we ought to start looking at cannabis’s efficacy vs. other drugs and medications, both when cannabinoids and terpenoids are working together and working separately. This is the only way we’re going to get a true grasp of cannabis’s safety and efficacy profile, and where it is harmful and helpful.</span></p><span data-dcnode-id="518" instrument_node="">
</span><p data-dcnode-id="517" style="text-align:center"></p><article class="rounded-2xl grid gap-3 border p-6 gap-6 md:p-10 md:gap-10 border-lilac-50 bg-lilac-50 leafwell-card-cta md:gap-x-10 xl:gap-x-16 md:items-center md:content-center md:grid-cols-2 md:mt-12 md:!gap-x-3 md:!pr-4 mb-6 not-prose" data-dcnode-id="479"><div class="grid gap-y-3" data-dcnode-id="482"><h2 class="font-heading text-3xl sm:text-4xl leading-tight font-sans my-reset prose" data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Get Your Medical Card</span></h2><p class="font-sans prose my-reset" data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Connect with a licensed physician online in minutes.</span></p><section class="self-start grid gap-y-3" data-dcnode-id="483"><form class="grid sm:self-start gap-x-3 sm:grid-cols-inline-form sm:justify-between sm:max-w-md gap-y-2" data-dcnode-id="484" data-hs-cf-bound="true" novalidate=""><div class="grid gap-y-3" data-dcnode-id="493"><div class="grid gap-y-3 relative" data-dcnode-id="494"><label class="prose sr-only font-heading text-base leading-tight col-span-full" data-dcnode-id="511" for="stateCode-1bzt5h80u1650647357739"><span data-dcnode-id="512" instrument_node="">State</span></label><div class="relative" data-dcnode-id="495"><div class="leafwell-select css-2b097c-container" data-dcnode-id="497"><span aria-atomic="false" aria-live="polite" aria-relevant="additions text" class="css-7pg0cj-a11yText" data-dcnode-id="510"></span><div class="bg-white placeholder-gray-600 appearance-none border rounded outline-none focus:outline-none transition-colors border-gray-400 focus:border-green w-full p-3 bg-no-repeat bg-input-position flex items-center flex-wrap justify-between text-base pl-10 css-0" data-dcnode-id="499"><div class="grow flex-wrap select-value flex items-center flex-wrap relative overflow-hidden css-0" data-dcnode-id="503"><div class="absolute text-gray-600 max-w-full pr-3 whitespace-nowrap overflow-hidden overfl
