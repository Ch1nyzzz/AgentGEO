</span><article class="post-608155 post type-post status-publish format-standard has-post-thumbnail hentry category-alternative-medicine" data-dcnode-id="845" id="post-608155"><span data-dcnode-id="1064" instrument_node="">
</span><p data-dcnode-id="1056" id="breadcrumbs"><span data-dcnode-id="1057"><span data-dcnode-id="1058"><a data-dcnode-id="1062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creakyjoints.org/"><span data-dcnode-id="1063" instrument_node="">Home</span></a><span data-dcnode-id="1061" instrument_node=""> </span><span aria-current="page" class="breadcrumb_last" data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">Alternative Medicine</span></span></span></span></p><span data-dcnode-id="1055" instrument_node=""> </span><div class="single-post-categories" data-dcnode-id="1050"><span data-dcnode-id="1054" instrument_node="">
</span><a data-dcnode-id="1052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creakyjoints.org/category/alternative-medicine/" rel="category tag"><span data-dcnode-id="1053" instrument_node="">Alternative Medicine</span></a><span data-dcnode-id="1051" instrument_node=""> </span></div><span data-dcnode-id="1049" instrument_node="">
</span><h1 data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">Does CBD Interact or Interfere with Medication? What Arthritis Patients Must Know Now</span></h1><span data-dcnode-id="1046" instrument_node="">
</span><p class="date-author" data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">PUBLISHED 09/24/19						BY Susan Ince						</span></p><span data-dcnode-id="1043" instrument_node="">
</span><h3 class="excerpt" data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">If you use CBD products, you need to understand how they could interact with the other medications you take.</span></h3><span data-dcnode-id="1040" instrument_node="">
</span><div class="post-content-wrapper" data-dcnode-id="847"><span data-dcnode-id="1039" instrument_node="">
</span><div class="post-content" data-dcnode-id="849"><span data-dcnode-id="1038" instrument_node="">
</span><div class="blog-post-thumb" data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">
</span></div><span data-dcnode-id="1035" instrument_node="">
</span><div class="entry-content" data-dcnode-id="860"><span data-dcnode-id="1034" instrument_node="">
</span><p data-dcnode-id="1029"><a data-dcnode-id="1030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//creakyjoints.org//wp-content/uploads/0819_CBD_Interactions.jpg"><img alt="CBD Drug Interactions" class="aligncenter wp-image-615285 lazyloaded" data-dcnode-id="1033" data-sizes="(max-width: 800px) 100vw, 800px" data-src="http://creakyjoints.org//wp-content/uploads/0819_CBD_Interactions-300x200.jpg" data-srcset="https://creakyjoints.org/wp-content/uploads/0819_CBD_Interactions-300x200.jpg 300w, https://creakyjoints.org/wp-content/uploads/0819_CBD_Interactions-768x512.jpg 768w, https://creakyjoints.org/wp-content/uploads/0819_CBD_Interactions-1024x683.jpg 1024w" height="533" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//creakyjoints.org//wp-content/uploads/0819_CBD_Interactions-300x200.jpg&amp;raw" srcset="https://creakyjoints.org/wp-content/uploads/0819_CBD_Interactions-300x200.jpg 300w, https://creakyjoints.org/wp-content/uploads/0819_CBD_Interactions-768x512.jpg 768w, https://creakyjoints.org/wp-content/uploads/0819_CBD_Interactions-1024x683.jpg 1024w" width="800"><noscript data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">&lt;img class="aligncenter wp-image-615285" src="http://creakyjoints.org//wp-content/uploads/0819_CBD_Interactions-300x200.jpg" alt="CBD Drug Interactions" width="800" height="533" srcset="https://creakyjoints.org/wp-content/uploads/0819_CBD_Interactions-300x200.jpg 300w, https://creakyjoints.org/wp-content/uploads/0819_CBD_Interactions-768x512.jpg 768w, https://creakyjoints.org/wp-content/uploads/0819_CBD_Interactions-1024x683.jpg 1024w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript></a></p><span data-dcnode-id="1028" instrument_node="">
</span><p data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">CBD (cannabidiol) is seemingly everywhere, with oils, tinctures, pills, chocolates, gummy bears, and creams available all over the internet, at national drugstore chains, and perhaps at your local farmer’s market — even if you don’t live in a state where medical or recreational marijuana is legal.</span></p><span data-dcnode-id="1025" instrument_node="">
</span><p data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">CBD, a type of chemical known as a cannabinoid, is a mainingredient in hemp, one type of cannabis plant. Marijuana, another type of cannabis plant, also has some CBD but an abundance of THC (tetrahydrocannabinol), an intoxicating cannabinoid known for making users feel “stoned” or “high.” While CBD won’t get you high, it interacts with cannabinoid receptors in your body and may have effects that are sought by people with arthritis, such as pain relief, reduced inflammation, and improvements in sleep and anxiety.</span></p><span data-dcnode-id="1022" instrument_node="">
</span><p data-dcnode-id="1017"><span data-dcnode-id="1021" instrument_node="">According to CreakyJoints research presented at the 2019 Annual European Congress of Rheumatology meeting earlier this year, </span><a data-dcnode-id="1019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//creakyjoints.org/eular-2019/medical-marijuana-cbd-usage-arthritis-patients-study/"><span data-dcnode-id="1020" instrument_node="">52 percent of respondents reported having tried CBD for a medical reason</span></a><span data-dcnode-id="1018" instrument_node="">. Of those who did, 93 percent said it helped. More than half said they wanted more information on CBD from their doctor, but 58 percent of those who told their doctors about their CBD use did not get the information on safety, effectiveness, and dosing they were looking for.</span></p><span data-dcnode-id="1016" instrument_node="">
</span><p data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">One common concern among people with chronic illness who use CBD is whether CBD can interfere with prescription drugs you may take for arthritis or other conditions.</span></p><span data-dcnode-id="1013" instrument_node="">
</span><p data-dcnode-id="1008"><span data-dcnode-id="1012" instrument_node="">We put commonly asked questions to Nina M. Bemben, PharmD, BCPS, a specialist in drug interactions who is trying to educate other pharmacists about possible drug-drug interactions with CBD, as well as </span><a data-dcnode-id="1010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.drrachnapatel.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1011" instrument_node="">Rachna Patel, DO</span></a><span data-dcnode-id="1009" instrument_node="">, a physician who does consultations about medical marijuana and CBD and sells her own line of CBD products.</span></p><span data-dcnode-id="1007" instrument_node="">
</span><h2 data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">What kind of drug interactions can happen with CBD?</span></h2><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">A huge number of medications, including CBD, are broken down by the same large family of liver enzymes, called CYP450.</span></p><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">CBD inhibits some enzymes in this family. This makes them break down certain drugs more slowly, which could potentially increase side effects unless your doctor adjusts the dose. On the other hand, CBD induces other enzymes in this family, which speeds the breakdown of certain drugs so they may potentially be less effective unless the dose is increased.</span></p><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">As examples, you may experience increased side effects if CBD is used along with these drugs:</span></p><span data-dcnode-id="995" instrument_node="">
</span><ul data-dcnode-id="981"><span data-dcnode-id="994" instrument_node="">
</span><li data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Antidepressants (such as fluoxetine, or Prozac)</span></li><span data-dcnode-id="991" instrument_node="">
</span><li data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Medications that can cause drowsiness (antipsychotics, benzodiazepines)</span></li><span data-dcnode-id="988" instrument_node="">
</span><li data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Macrolide antibiotics (erythromycin, clarithromycin)</span></li><span data-dcnode-id="985" instrument_node="">
</span><li data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">Heart medications (some calcium channel blockers)</span></li><span data-dcnode-id="982" instrument_node="">
</span></ul><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">“There is still a lot of uncertainty about how CBD interacts with drug-metabolizing enzymes in the body. We know that there are some drug-metabolizing enzymes that are affected by CBD, some that are not, and many others where we just don’t have any information yet,” says Dr. Bemben.</span></p><span data-dcnode-id="977" instrument_node="">
</span><h2 data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">What do we know for sure about CBD’s interactions with other drugs?</span></h2><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">The most direct information comes from studies on the only FDA-approved CBD product, Epidiolex, which is used to treat rare forms of epilepsy. Epidiolex has been found to increase blood levels of the blood thinner warfarin about 30 percent, which raises the risk of bleeding. It also interacts with other medications used for epilepsy.</span></p><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">“The manufacturer of Epidiolex was asked by the FDA to conduct more drug-drug interaction studies, so we will learn more about CBD’s interactions with other drugs in the future,” says Dr. Bemben.</span></p><span data-dcnode-id="968" instrument_node="">
</span><h2 data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Can CBD interact with medications I take specifically for arthritis?</span></h2><span data-dcnode-id="965" instrument_node="">
</span><p data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">“Based on what we know now about the way CBD is metabolized, I would not expect significant drug-drug interactions with drugs commonly used in arthritis treatment, such as methotrexate, and most nonsteroidal anti-inflammatory drugs (NSAIDs). I would advise caution on one NSAID, diclofenac, because there isn’t information on how CBD affects — if at all — the enzyme that metabolizes it,” says Dr. Bemben.</span></p><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Rheumatologists are always on the alert for liver problems that may result from arthritis medications, and that includes CBD as well as NSAIDs and methotrexate.</span></p><span data-dcnode-id="959" instrument_node="">
</span><h2 data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Are older people more at risk of CBD drug interactions?</span></h2><span data-dcnode-id="956" instrument_node="">
</span><p data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Yes, for several reasons. “As we age, our livers and kidneys may be slower to eliminate drugs from the body. In addition, older patients and those with chronic health problems are more likely to be using multiple medications, so the risk for drug interactions increases,” says Dr. Bemben.</span></p><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Dr. Patel worries in particular about any side effects or interactions that result in dizziness and may increase the risk of falls in the elderly. For example, using the antidepressant fluoxetine together with cannabis products can increase dizziness and drowsiness.</span></p><span data-dcnode-id="950" instrument_node="">
</span><h2 data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Are there some people who should stay away from CBD?</span></h2><span data-dcnode-id="947" instrument_node="">
</span><p data-dcnode-id="942"><span data-dcnode-id="946" instrument_node="">Hold off if you have known liver damage, says Dr. Patel. In a study done on mice published earlier this year, the dose of CBD used to protect against seizures was found to induce liver damage. According to other animal research, CBD may increase levels of liver enzymes, raising concerns about </span><a data-dcnode-id="944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//creakyjoints.org/treatment/monitoring-methotrexate-use/"><span data-dcnode-id="945" instrument_node="">liver toxicity in patients taking methotrexate</span></a><span data-dcnode-id="943" instrument_node="">.</span></p><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">“We use other therapies that cause liver injury, like nonsteroidal anti-inflammatories (NSAIDs). If liver enzymes go up in someone on methotrexate, we would generally hold the drug other than methotrexate [for example, CBD or an NSAID] to see if the enzyme levels normalize,” says Michael Weinblatt, MD, professor of medicine at Harvard Medical School in Boston.</span></p><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">People who take Epidiolex for epilepsy are more likely to develop abnormal liver enzymes, as well as sleepiness and other symptoms, if they are also using valproic acid to control seizures.</span></p><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">“This is important for people with arthritis to know because valproic acid is sometimes used for pain that isn’t controlled by other medications,” says Dr. Patel.</span></p><span data-dcnode-id="932" instrument_node="">
</span><h2 data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">If I stick with a CBD cream, does that reduce the risk of drug interactions?</span></h2><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Probably, since little if any of a topical product is likely to be absorbed into your system. “Unfortunately, we just don’t have good information about how much of a topical CBD product gets absorbed. This can be influenced by the inactive ingredients in the product, where on the body it’s applied, and whether you apply a bandage over the area after applying it,” says Dr. Bemben.</span></p><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">While topical CBD products may not be absorbed deeply enough to raise concerns about drug interactions, that also means they may not be as effective for arthritis pain. “If you just have one joint hurting and it’s close to the surface, using a topical would be appropriate. It’s not as likely to help a hip or other deep joint,” says Dr. Patel.</span></p><span data-dcnode-id="923" instrument_node="">
</span><h2 data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Which health professionals need to know I’m trying CBD?</span></h2><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Tell your rheumatologist and anyone else who prescribes medication for you. If you need surgery, an anesthesiologist may choose a different dose or type of anesthesia if you’re using CBD.</span></p><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">“If you fill all of your medications at the same pharmacy, your pharmacist will be able to assess for drug interactions for all of them, regardless of who prescribed them. You should still let the pharmacist know about over-the-counter medications, herbs, and supplements — including CBD — that you don’t get through the pharmacy. It is important to bring the CBD product to your doctor and pharmacist so they can check the amount of CBD and other ingredients it contains,” says Dr. Bemben.</span></p><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">“While patients may be wary of stigma surrounding CBD products, I believe most health care providers understand this is a growing area and one strategy patients are trying in hopes of getting relief,” she says.</span></p><span data-dcnode-id="911" instrument_node="">
</span><h2 data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Is there an online source I can use to figure out which of my medications might interact with CBD?</span></h2><span data-dcnode-id="908" instrument_node="">
</span><p data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Online databases are available to help health professionals evaluate potential drug-drug interactions, at a price. “Freely available resources tend to be less reliable, and this highlights the importance of discussing all your medications, including CBD, with your doctor and pharmacist,” says Dr. Bemben.</span></p><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="900"><span data-dcnode-id="904" instrument_node="">One source available to patients is </span><a data-dcnode-id="902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.drugs.com/drug_interactions.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="903" instrument_node="">drugs.com</span></a><span data-dcnode-id="901" instrument_node="">, where you can plug in either cannabidiol (which will give you the FDA-approved oral product Epidiolex) or cannabis (which will give you both THC and CBD) and check for possible interactions with other medications you take.</span></p><span data-dcnode-id="899" instrument_node="">
</span><h2 data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Has anyone had a life-threatening drug interaction with CBD?</span></h2><span data-dcnode-id="896" instrument_node="">
</span><p data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">“There haven’t been reports of serious drug-drug interactions with over-the-counter CBD products. However, these products are relatively new and it typically takes time for reports to be published. We have very little information about over-the-counter CBD products and how they may interact with other drugs,” says Dr. Bemben.</span></p><span data-dcnode-id="893" instrument_node="">
