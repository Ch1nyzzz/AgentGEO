0.png 30w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/aldactone.png 800w" width="300"></picture></figure></div><span data-dcnode-id="4127" instrument_node="">
</span><h3 data-dcnode-id="4125" id="h3-peripheral-adrenergic-inhibitors-cbd-8"><span data-dcnode-id="4126" instrument_node="">Peripheral Adrenergic Inhibitors &amp; CBD</span></h3><span data-dcnode-id="4124" instrument_node="">
</span><ul data-dcnode-id="4115"><li data-dcnode-id="4120"><strong data-dcnode-id="4122"><span data-dcnode-id="4123" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="4121" instrument_node=""> ↑↑↑ Increased Effect (Agonistic)</span></li><li data-dcnode-id="4116"><strong data-dcnode-id="4118"><span data-dcnode-id="4119" instrument_node="">Severity:</span></strong><span data-dcnode-id="4117" instrument_node=""> Moderate</span></li></ul><span data-dcnode-id="4114" instrument_node="">
</span><p data-dcnode-id="4112"><span data-dcnode-id="4113" instrument_node="">These medications were some of the first blood pressure drugs ever invented. Reserpine has been around since the 1950s.</span></p><span data-dcnode-id="4111" instrument_node="">
</span><p data-dcnode-id="4109"><span data-dcnode-id="4110" instrument_node="">These drugs have a lot of negative side effects and are only used as a last resort these days (when other antihypertensives won’t work).</span></p><span data-dcnode-id="4108" instrument_node="">
</span><p data-dcnode-id="4106"><span data-dcnode-id="4107" instrument_node="">CBD may interact with these drugs by causing blood pressure to drop too low. It can also interfere with the metabolism of these drugs, which increases the chances of experiencing side effects. Negative interactions of peripheral adrenergic inhibitors and CBD is more common than many other blood pressure medications and should either be avoided or used with caution.</span></p><span data-dcnode-id="4105" instrument_node="">
</span><h4 data-dcnode-id="4103" id="h4-peripheral-adrenergic-inhibitors-that-may-interact-with-cbd-8"><span data-dcnode-id="4104" instrument_node="">Peripheral Adrenergic Inhibitors That May Interact With CBD</span></h4><span data-dcnode-id="4102" instrument_node="">
</span><ul data-dcnode-id="4086"><li data-dcnode-id="4098"><strong data-dcnode-id="4100"><span data-dcnode-id="4101" instrument_node="">Guanadrel</span></strong><span data-dcnode-id="4099" instrument_node=""> (Hylorel)</span></li><li data-dcnode-id="4091"><strong data-dcnode-id="4096"><span data-dcnode-id="4097" instrument_node="">Guanethidine</span></strong><span data-dcnode-id="4095" instrument_node=""> </span><strong data-dcnode-id="4093"><span data-dcnode-id="4094" instrument_node="">Monosulfate</span></strong><span data-dcnode-id="4092" instrument_node=""> (Ismelin)</span></li><li data-dcnode-id="4087"><strong data-dcnode-id="4089"><span data-dcnode-id="4090" instrument_node="">Reserpine</span></strong><span data-dcnode-id="4088" instrument_node=""> (Serpasil)</span></li></ul><span data-dcnode-id="4085" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="4080"><figure class="aligncenter size-large" data-dcnode-id="4081"><picture data-dcnode-id="4082"><source data-dcnode-id="4084" sizes="(max-width: 612px) 100vw, 612px" srcset="https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-7.png.webp 612w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-7-300x200.png.webp 300w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-7-180x120.png.webp 180w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-7-283x189.png.webp 283w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-7-54x36.png.webp 54w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-7-330x220.png.webp 330w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-7-420x280.png.webp 420w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-7-74x49.png.webp 74w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-7-45x30.png.webp 45w" type="image/webp"><img alt="" class="wp-image-27475 webpexpress-processed" data-dcnode-id="4083" height="408" loading="lazy" sizes="(max-width: 612px) 100vw, 612px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-7.png&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-7.png 612w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-7-300x200.png 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-7-180x120.png 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-7-283x189.png 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-7-54x36.png 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-7-330x220.png 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-7-420x280.png 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-7-74x49.png 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-7-45x30.png 45w" width="612"></picture></figure></div><span data-dcnode-id="4079" instrument_node="">
</span></div><div class="p_wrap" data-dcnode-id="3997"><amp-position-observer data-dcnode-id="4077" intersection-ratios="0" layout="nodisplay" on="scroll:h2-cbd-bloodthinners-5-offset.seekTo(percent=event.percent)"></amp-position-observer><h2 data-dcnode-id="4075" id="h2-cbd-bloodthinners-5"><span data-dcnode-id="4076" instrument_node="">CBD &amp; Bloodthinners</span></h2><span data-dcnode-id="4074" instrument_node="">
</span><ul data-dcnode-id="4065"><li data-dcnode-id="4070"><strong data-dcnode-id="4072"><span data-dcnode-id="4073" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="4071" instrument_node=""> Metabolic Competitor</span></li><li data-dcnode-id="4066"><strong data-dcnode-id="4068"><span data-dcnode-id="4069" instrument_node="">Severity:</span></strong><span data-dcnode-id="4067" instrument_node=""> High</span></li></ul><span data-dcnode-id="4064" instrument_node="">
</span><p data-dcnode-id="4056"><span data-dcnode-id="4063" instrument_node="">Blood thinners are a class of medications used to treat </span><a data-dcnode-id="4061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/best-cbd/heart-disease/"><span data-dcnode-id="4062" instrument_node="">heart disease</span></a><span data-dcnode-id="4060" instrument_node=""> and </span><a data-dcnode-id="4058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/best-cbd/stroke/"><span data-dcnode-id="4059" instrument_node="">stroke patients</span></a><span data-dcnode-id="4057" instrument_node="">. They work by blocking clotting factors or fibrinogen to prevent or dismantle blood clots that could become lodged in the arteries and cause a heart attack or stroke.</span></p><span data-dcnode-id="4055" instrument_node="">
</span><p data-dcnode-id="4050"><span data-dcnode-id="4054" instrument_node="">CBD doesn’t directly interact with blood thinners, nor does it produce similar effects. However, certain blood thinners, such as Warfarin (the most commonly prescribed blood thinner), have been reported to have negative interactions with CBD [</span><a data-dcnode-id="4052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5789126/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4053" instrument_node="">3</span></a><span data-dcnode-id="4051" instrument_node="">].</span></p><span data-dcnode-id="4049" instrument_node="">
</span><p data-dcnode-id="4047"><span data-dcnode-id="4048" instrument_node="">Warfarin is particularly difficult to metabolize by the body and requires the combined effort of many different CYP450 enzymes in the liver — primarily CYP3A4 and CYP2C19. Others include CYP1A1, CYP1A22, CYP2C19, CYP2D6, and CYP3A5.</span></p><span data-dcnode-id="4046" instrument_node="">
</span><p data-dcnode-id="4041"><span data-dcnode-id="4045" instrument_node="">CBD has been shown to compete for metabolism with all seven of these enzyme pathways [</span><a data-dcnode-id="4043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/21356216/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4044" instrument_node="">4</span></a><span data-dcnode-id="4042" instrument_node="">] and could lead to a sluggish metabolism of Warfarin. Over several days or weeks, Warfarin concentrations may increase in the bloodstream, leading to much higher chances of side effects of negative effects caused by the drug itself.&nbsp; These side effects can be life-threatening.</span></p><span data-dcnode-id="4040" instrument_node="">
</span><p data-dcnode-id="4038"><span data-dcnode-id="4039" instrument_node="">As a result, CBD should not be taken alongside blood thinners of any kind unless under the advice of your prescribing doctor.</span></p><span data-dcnode-id="4037" instrument_node="">
</span><h4 data-dcnode-id="4035" id="h4-blood-thinner-medications-that-may-interact-with-cbd-1"><span data-dcnode-id="4036" instrument_node="">Blood Thinner Medications That May Interact With CBD</span></h4><span data-dcnode-id="4034" instrument_node="">
</span><ul data-dcnode-id="4005"><li data-dcnode-id="4030"><strong data-dcnode-id="4032"><span data-dcnode-id="4033" instrument_node="">Apixaban</span></strong><span data-dcnode-id="4031" instrument_node=""> (Eliquis)</span></li><li data-dcnode-id="4026"><strong data-dcnode-id="4028"><span data-dcnode-id="4029" instrument_node="">Dabigatran</span></strong><span data-dcnode-id="4027" instrument_node=""> (Pradaxa)</span></li><li data-dcnode-id="4022"><strong data-dcnode-id="4024"><span data-dcnode-id="4025" instrument_node="">Enoxaparin</span></strong><span data-dcnode-id="4023" instrument_node=""> (Lovenox)</span></li><li data-dcnode-id="4019"><strong data-dcnode-id="4020"><span data-dcnode-id="4021" instrument_node="">Heparins</span></strong></li><li data-dcnode-id="4015"><strong data-dcnode-id="4017"><span data-dcnode-id="4018" instrument_node="">Rivaroxaban</span></strong><span data-dcnode-id="4016" instrument_node=""> (Xarelto)</span></li><li data-dcnode-id="4010"><strong data-dcnode-id="4012"><a data-dcnode-id="4013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/warfarin/"><span data-dcnode-id="4014" instrument_node="">Warfarin</span></a></strong><span data-dcnode-id="4011" instrument_node=""> (Coumadin &amp; Jantoven)</span></li><li data-dcnode-id="4006"><strong data-dcnode-id="4008"><span data-dcnode-id="4009" instrument_node="">Clopidogrel</span></strong><span data-dcnode-id="4007" instrument_node=""> (Plavix)</span></li></ul><span data-dcnode-id="4004" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3999"><figure class="aligncenter size-medium" data-dcnode-id="4000"><picture data-dcnode-id="4001"><source data-dcnode-id="4003" sizes="(max-width: 300px) 100vw, 300px" srcset="https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/pradaxa-300x300.png.webp 300w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/pradaxa-150x150.png.webp 150w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/pradaxa-768x768.png.webp 768w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/pradaxa-180x180.png.webp 180w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/pradaxa-158x158.png.webp 158w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/pradaxa-80x80.png.webp 80w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/pradaxa-120x120.png.webp 120w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/pradaxa-70x70.png.webp 70w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/pradaxa-40x40.png.webp 40w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/pradaxa-283x283.png.webp 283w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/pradaxa-54x54.png.webp 54w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/pradaxa-330x330.png.webp 330w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/pradaxa-420x420.png.webp 420w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/pradaxa-74x74.png.webp 74w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/pradaxa-30x30.png.webp 30w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/pradaxa.png.webp 800w" type="image/webp"><img alt="" class="wp-image-34402 webpexpress-processed" data-dcnode-id="4002" height="300" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2021/10/pradaxa-300x300.png&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/pradaxa-300x300.png 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/pradaxa-150x150.png 150w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/pradaxa-768x768.png 768w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/pradaxa-180x180.png 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/pradaxa-158x158.png 158w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/pradaxa-80x80.png 80w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/pradaxa-120x120.png 120w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/pradaxa-70x70.png 70w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/pradaxa-40x40.png 40w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/pradaxa-283x283.png 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/pradaxa-54x54.png 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/pradaxa-330x330.png 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/pradaxa-420x420.png 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/pradaxa-74x74.png 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/pradaxa-30x30.png 30w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/pradaxa.png 800w" width="300"></picture></figure></div><span data-dcnode-id="3998" instrument_node="">
</span></div><div class="p_wrap" data-dcnode-id="3808"><amp-position-observer data-dcnode-id="3996" intersection-ratios="0" layout="nodisplay" on="scroll:h2-cbd-painkillers-6-offset.seekTo(percent=event.percent)"></amp-position-observer><h2 data-dcnode-id="3994" id="h2-cbd-painkillers-6"><span data-dcnode-id="3995" instrument_node="">CBD &amp; Painkillers</span></h2><span data-dcnode-id="3993" instrument_node="">
</span><p data-dcnode-id="3989"><a data-dcnode-id="3991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/best-cbd/pain/"><span data-dcnode-id="3992" instrument_node="">CBD is a powerful painkiller</span></a><span data-dcnode-id="3990" instrument_node=""> in its own right, but it works through completely separate mechanisms than most other painkillers. This means it’s not as likely to interact with common painkillers directly. With that said, there are a few ways CBD can interfere with different types of pain medications.</span></p><span data-dcnode-id="3988" instrument_node="">
</span><p data-dcnode-id="3986"><span data-dcnode-id="3987" instrument_node="">The most common is through competitive liver metabolism. CBD will interfere with the liver’s ability to metabolize pain medications, which could increase the chances of side effects from the medication — especially for drugs that are used regularly.</span></p><span data-dcnode-id="3985" instrument_node="">
</span><p data-dcnode-id="3983"><span data-dcnode-id="3984" instrument_node="">CBD also shares a similar set of side effects to these medications — such as sedation, dehydration, loss of appetite, diarrhea, and low blood pressure.</span></p><span data-dcnode-id="3982" instrument_node="">
</span><p data-dcnode-id="3980"><span data-dcnode-id="3981" instrument_node="">You should only take CBD alongside over-the-counter or prescription painkillers after consulting with a medical professional. It’s also likely the dose of CBD will need to be reduced when combined with painkillers.</span></p><span data-dcnode-id="3979" instrument_node="">
</span><h3 data-dcnode-id="3977" id="h3-opiate-painkillers-cbd-1"><span data-dcnode-id="3978" instrument_node="">Opiate Painkillers &amp; CBD</span></h3><span data-dcnode-id="3976" instrument_node="">
</span><ul data-dcnode-id="3967"><li data-dcnode-id="3972"><strong data-dcnode-id="3974"><span data-dcnode-id="3975" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="3973" instrument_node=""> Metabolic Competitor</span></li><li data-dcnode-id="3968"><strong data-dcnode-id="3970"><span data-dcnode-id="3971" instrument_node="">Severity:</span></strong><span data-dcnode-id="3969" instrument_node=""> Mild</span></li></ul><span data-dcnode-id="3966" instrument_node="">
</span><p data-dcnode-id="3964"><span data-dcnode-id="3965" instrument_node="">Opiate painkillers are very common. There are many different kinds of opiate drugs prescribed to manage the pain of all different origins. They work by activating the opioid pain receptors located in the spinal cord and brain. These receptors act as a gateway for pain signals traveling from the body to the brain. When they become activated, either by opioid drugs or the naturally-occurring opioids in our body (called endorphins), the gates close and reduce the pain signal before it reaches the brain.</span></p><span data-dcnode-id="3963" instrument_node="">
</span><p data-dcnode-id="3961"><span data-dcnode-id="3962" instrument_node="">Opioids are extremely effective painkillers, but they have a dark side. The opiate system is also intimately connected to our dopamine reward system. Activating opioid receptors causes feelings of euphoria and pleasure, which we can easily become addicted to.</span></p><span data-dcnode-id="3960" instrument_node="">
</span><p data-dcnode-id="3958"><span data-dcnode-id="3959" instrument_node="">CBD is often used as an alternative to opiate medications to prevent addiction — especially for long-term pain that will require regular treatment over the course of weeks, months, or years. Taking opiates for long periods of time dramatically increases the chances of becoming addicted.</span></p><span data-dcnode-id="3957" instrument_node="">
</span><p data-dcnode-id="3955"><span data-dcnode-id="3956" instrument_node="">Most opiates won’t interact strongly with CBD, but there is a potential for a negative interaction. CBD may increase the side-effects of opiates by competing with metabolism in the liver and could, therefore, increase the chances of overdose.</span></p><span data-dcnode-id="3954" instrument_node="">
</span><p data-dcnode-id="3952"><span data-dcnode-id="3953" instrument_node="">You should always speak with your doctor before taking CBD if you’re using opiate pain medications. Your doctor can advise you on a modified dose of both substances to reduce your risk of side effects.</span></p><span data-dcnode-id="3951" instrument_node="">
</span><h4 data-dcnode-id="3949" id="h4-opiate-analgesics-that-may-interact-with-cbd-1"><span data-dcnode-id="3950" instrument_node="">Opiate Analgesics That May Interact With CBD</span></h4><span data-dcnode-id="3948" instrument_node="">
</span><ul data-dcnode-id="3899"><li data-dcnode-id="3944"><strong data-dcnode-id="3946"><span data-dcnode-id="3947" instrument_node="">Buprenorphine</span></strong><span data-dcnode-id="3945" instrument_node=""> (Cizdol &amp; Brixadi)</span></li><li data-dcnode-id="3940"><strong data-dcnode-id="3941"><a data-dcnode-id="3942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/codeine/"><span data-dcnode-id="3943" instrument_node="">Codeine</span></a></strong></li><li data-dcnode-id="3936"><strong data-dcnode-id="3938"><span data-dcnode-id="3939" instrument_node="">Pethidine</span></strong><span data-dcnode-id="3937" instrument_node=""> (Meperidine &amp; Demerol)</span></li><li data-dcnode-id="3931"><strong data-dcnode-id="3933"><a data-dcnode-id="3934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/fentanyl/"><span data-dcnode-id="3935" instrument_node="">Fentanyl</span></a></strong><span data-dcnode-id="3932" instrument_node=""> (Abstral &amp; Actiq)</span></li><li data-dcnode-id="3926"><strong data-dcnode-id="3928"><a data-dcnode-id="3929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/hydrocodone/"><span data-dcnode-id="3930" instrument_node="">Hydrocodone</span></a></strong><span data-dcnode-id="3927" instrument_node=""> (Hysingla ER, Zohydro ER &amp; Hycodan)</span></li><li data-dcnode-id="3921"><strong data-dcnode-id="3923"><a data-dcnode-id="3924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/hydromorphone/"><span data-dcnode-id="3925" instrument_node="">Hydromorphone</span></a></strong><span data-dcnode-id="3922" instrument_node=""> (Dilaudid)</span></li><li data-dcnode-id="3917"><strong data-dcnode-id="3919"><span data-dcnode-id="3920" instrument_node="">Methadone</span></strong><span data-dcnode-id="3918" instrument_node=""> (Methadose &amp; Dolophine)</span></li><li data-dcnode-id="3913"><strong data-dcnode-id="3915"><span data-dcnode-id="3916" instrument_node="">Morphine</span></strong><span data-dcnode-id="3914" instrument_node=""> (Kadian &amp; Roxanol)</span></li><li data-dcnode-id="3905"><strong data-dcnode-id="3910"><a data-dcnode-id="3911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/oxycodone/"><span data-dcnode-id="3912" instrument_node="">Oxycodone</span></a></strong><span data-dcnode-id="3909" instrument_node=""> (Percodan, Endodan, Roxiprin, </span><a data-dcnode-id="3907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/percocet/"><span data-dcnode-id="3908" instrument_node="">Percocet</span></a><span data-dcnode-id="3906" instrument_node="">, Endocet, Roxicet &amp; OxyContin)</span></li><li data-dcnode-id="3900"><strong data-dcnode-id="3902"><a data-dcnode-id="3903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/tramadol/"><span data-dcnode-id="3904" instrument_node="">Tramadol</span></a></strong><span data-dcnode-id="3901" instrument_node=""> (Ultram, Ryzolt &amp; ConZip)</span></li></ul><span data-dcnode-id="3898" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3893"><figure class="aligncenter size-medium" data-dcnode-id="3894"><picture data-dcnode-id="3895"><source data-dcnode-id="3897" sizes="(max-width: 300px) 100vw, 300px" srcset="https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/oxycontin-bottle-300x225.png.webp 300w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/oxycontin-bottle-180x135.png.webp 180w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/oxycontin-bottle-283x212.png.webp 283w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/oxycontin-bottle-54x41.png.webp 54w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/oxycontin-bottle-330x248.png.webp 330w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/oxycontin-bottle-420x315.png.webp 420w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/oxycontin-bottle-74x56.png.webp 74w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/oxycontin-bottle-40x30.png.webp 40w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/oxycontin-bottle.png.webp 577w" type="image/webp"><img alt="" class="wp-image-33592 webpexpress-processed" data-dcnode-id="3896" height="225" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2021/10/oxycontin-bottle-300x225.png&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/oxycontin-bottle-300x225.png 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/oxycontin-bottle-180x135.png 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/oxycontin-bottle-283x212.png 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/oxycontin-bottle-54x41.png 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/oxycontin-bottle-330x248.png 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/oxycontin-bottle-420x315.png 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/oxycontin-bottle-74x56.png 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/oxycontin-bottle-40x30.png 40w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/oxycontin-bottle.png 577w" width="300"></picture></figure></div><span data-dcnode-id="3892" instrument_node="">
</span><h3 data-dcnode-id="3890" id="h3-nsaid-painkillers-cbd-2"><span data-dcnode-id="3891" instrument_node="">NSAID Painkillers &amp; CBD</span></h3><span data-dcnode-id="3889" instrument_node="">
</span><ul data-dcnode-id="3880"><li data-dcnode-id="3885"><strong data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="3886" instrument_node=""> ↑↑↑ Increased Effect (Agonistic)</span></li><li data-dcnode-id="3881"><strong data-dcnode-id="3883"><span data-dcnode-id="3884" instrument_node="">Severity:</span></strong><span data-dcnode-id="3882" instrument_node=""> Mild</span></li></ul><span data-dcnode-id="3879" instrument_node="">
</span><p data-dcnode-id="3877"><span data-dcnode-id="3878" instrument_node="">NSAID stands for “non-steroidal anti-inflammatory drug.” They’re the most common over-the-counter pain medications. Some of the most well-known examples are Advil, Aleve, and Aspirin.</span></p><span data-dcnode-id="3876" instrument_node="">
</span><p data-dcnode-id="3871"><span data-dcnode-id="3875" instrument_node="">These medications work by blocking the COX-1 or COX-2 enzymes, which are responsible for creating pro-inflammatory molecules. Blocking this enzyme halts the inflammation driving various forms of pain —&nbsp;such as injuries, </span><a data-dcnode-id="3873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/best-cbd/migraines/"><span data-dcnode-id="3874" instrument_node="">headaches</span></a><span data-dcnode-id="3872" instrument_node="">, or stomach pain.</span></p><span data-dcnode-id="3870" instrument_node="">
</span><p data-dcnode-id="3862"><span data-dcnode-id="3869" instrument_node="">Several studies have shown that CBD and NSAIDs work synergistically together [</span><a data-dcnode-id="3867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/16480822/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3868" instrument_node="">1</span></a><span data-dcnode-id="3866" instrument_node="">, </span><a data-dcnode-id="3864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/18810243/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3865" instrument_node="">2</span></a><span data-dcnode-id="3863" instrument_node="">] — which means they enhance each other’s benefits for reducing both pain and inflammation.</span></p><span data-dcnode-id="3861" instrument_node="">
</span><p data-dcnode-id="3859"><span data-dcnode-id="3860" instrument_node="">Many people use NSAID medications and CBD together, but caution should be advised. Because of the synergy between these two substances, it’s important to use a smaller dose to avoid side effects.</span></p><span data-dcnode-id="3858" instrument_node="">
</span><p data-dcnode-id="3856"><span data-dcnode-id="3857" instrument_node="">NSAID medications and CBD are metabolized through some of the same liver enzymes. Competition for liver enzymes causes both compounds to remain unmetabolized in the bloodstream for longer periods of time. This is only likely to cause issues if you’re using repetitive doses. Since NSAIDs are usually only used periodically or for a short period of time, it’s unlikely these drugs will increase toxic levels in the blood. Daily Aspirin is the exception here, but the dose is much lower and unlikely to cause problems.</span></p><span data-dcnode-id="3855" instrument_node="">
</span><p data-dcnode-id="3853"><span data-dcnode-id="3854" instrument_node="">If you’re using NSAIDS on a daily basis, you should consult with your doctor before taking CBD. If NSAID concentrations become too high, it can lead to severe liver damage.</span></p><span data-dcnode-id="3852" instrument_node="">
</span><h4 data-dcnode-id="3850" id="h4-nsaids-that-may-interact-with-cbd-2"><span data-dcnode-id="3851" instrument_node="">NSAIDs That May Interact With CBD</span></h4><span data-dcnode-id="3849" instrument_node="">
</span><ul data-dcnode-id="3816"><li data-dcnode-id="3844"><strong data-dcnode-id="3846"><a data-dcnode-id="3847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/aspirin/"><span data-dcnode-id="3848" instrument_node="">Aspirin</span></a></strong><span data-dcnode-id="3845" instrument_node=""> (Ascriptin, Aspergum, Aspirtab, Bayer, Easprin, Ecotrin, Ecpirin, Entercote)</span></li><li data-dcnode-id="3839"><strong data-dcnode-id="3841"><a data-dcnode-id="3842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/ibuprofen/"><span data-dcnode-id="3843" instrument_node="">Ibuprofen</span></a></strong><span data-dcnode-id="3840" instrument_node=""> (Motrin, Advil, Nuprin, Caldolor &amp; Neoprofen)</span></li><li data-dcnode-id="3834"><strong data-dcnode-id="3836"><a data-dcnode-id="3837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/celecoxib/"><span data-dcnode-id="3838" instrument_node="">Celecoxib</span></a></strong><span data-dcnode-id="3835" instrument_node=""> (Celebrex &amp; Onsenal)</span></li><li data-dcnode-id="3829"><strong data-dcnode-id="3831"><a data-dcnode-id="3832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/naproxen/"><span data-dcnode-id="3833" instrument_node="">Naproxen</span></a></strong><span data-dcnode-id="3830" instrument_node=""> (Aleve)</span></li><li data-dcnode-id="3825"><strong data-dcnode-id="3827"><span data-dcnode-id="3828" instrument_node="">Ketorolac</span></strong><span data-dcnode-id="3826" instrument_node=""> (Toradol)</span></li><li data-dcnode-id="3821"><strong data-dcnode-id="3823"><span data-dcnode-id="3824" instrument_node="">Etodolac</span></strong><span data-dcnode-id="3822" instrument_node=""> (Ultradol)</span></li><li data-dcnode-id="3817"><strong data-dcnode-id="3819"><span data-dcnode-id="3820" instrument_node="">Meloxicam</span></strong><span data-dcnode-id="3818" instrument_node=""> (Mobic)</span></li></ul><span data-dcnode-id="3815" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3810"><figure class="aligncenter size-medium" data-dcnode-id="3811"><picture data-dcnode-id="3812"><source data-dcnode-id="3814" sizes="(max-width: 300px) 100vw, 300px" srcset="https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/celebrex-300x300.png.webp 300w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/celebrex-150x150.png.webp 150w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/celebrex-768x768.png.webp 768w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/celebrex-180x180.png.webp 180w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/celebrex-158x158.png.webp 158w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/celebrex-80x80.png.webp 80w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/celebrex-120x120.png.webp 120w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/celebrex-70x70.png.webp 70w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/celebrex-40x40.png.webp 40w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/celebrex-283x283.png.webp 283w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/celebrex-54x54.png.webp 54w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/celebrex-330x330.png.webp 330w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/celebrex-420x420.png.webp 420w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/celebrex-74x74.png.webp 74w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/celebrex-30x30.png.webp 30w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/celebrex.png.webp 800w" type="image/webp"><img alt="" class="wp-image-34384 webpexpress-processed" data-dcnode-id="3813" height="300" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2021/10/celebrex-300x300.png&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/celebrex-300x300.png 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/celebrex-150x150.png 150w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/celebrex-768x768.png 768w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/celebrex-180x180.png 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/celebrex-158x158.png 158w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/celebrex-80x80.png 80w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/celebrex-120x120.png 120w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/celebrex-70x70.png 70w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/celebrex-40x40.png 40w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/celebrex-283x283.png 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/celebrex-54x54.png 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/celebrex-330x330.png 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/celebrex-420x420.png 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/celebrex-74x74.png 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/celebrex-30x30.png 30w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/celebrex.png 800w" width="300"></picture></figure></div><span data-dcnode-id="3809" instrument_node="">
</span></div><div class="p_wrap" data-dcnode-id="3631"><amp-position-observer data-dcnode-id="3807" intersection-ratios="0" layout="nodisplay" on="scroll:h2-cbd-antianxiety-medications-7-offset.seekTo(percent=event.percent)"></amp-position-observer><h2 data-dcnode-id="3805" id="h2-cbd-antianxiety-medications-7"><span data-dcnode-id="3806" instrument_node="">CBD &amp; Anti-Anxiety Medications</span></h2><span data-dcnode-id="3804" instrument_node="">
</span><p data-dcnode-id="3799"><span data-dcnode-id="3803" instrument_node="">One of the most </span><a data-dcnode-id="3801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/cbd-oil-benefits/"><span data-dcnode-id="3802" instrument_node="">well-known benefits of CBD</span></a><span data-dcnode-id="3800" instrument_node=""> is the ability to manage anxiety symptoms. It works by regulating the endocannabinoid system and a neurotransmitter known as GABA.</span></p><span data-dcnode-id="3798" instrument_node="">
</span><p data-dcnode-id="3796"><span data-dcnode-id="3797" instrument_node="">Prescription drugs used for managing anxiety also work through GABA — which can be considered the “brake pedal for the neurological system.” It’s responsible for slowing neurological activity down when it becomes too hyperactive (as is the case with anxiety).</span></p><span data-dcnode-id="3795" instrument_node="">
</span><p data-dcnode-id="3790"><span data-dcnode-id="3794" instrument_node="">Because CBD and anxiety medications share a similar mechanism of action, there’s a particularly high chance of the two interacting. It’s common for people to mix the two in order to allow for lower doses of prescription drugs to prevent the formation of </span><a data-dcnode-id="3792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/best-cbd/addiction/"><span data-dcnode-id="3793" instrument_node="">dependency and addiction</span></a><span data-dcnode-id="3791" instrument_node="">.</span></p><span data-dcnode-id="3789" instrument_node="">
</span><p data-dcnode-id="3787"><span data-dcnode-id="3788" instrument_node="">These substances should only be combined after consulting a medical professional. The dose of anxiety medications may need to be reduced to avoid the risk of side effects.</span></p><span data-dcnode-id="3786" instrument_node="">
</span><h3 data-dcnode-id="3784" id="h3-benzodiazepines-cbd-1"><span data-dcnode-id="3785" instrument_node="">Benzodiazepines &amp; CBD</span></h3><span data-dcnode-id="3783" instrument_node="">
</span><ul data-dcnode-id="3774"><li data-dcnode-id="3779"><strong data-dcnode-id="3781"><span data-dcnode-id="3782" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="3780" instrument_node=""> ↑↑↑ Increased Effect (Agonistic)</span></li><li data-dcnode-id="3775"><strong data-dcnode-id="3777"><span data-dcnode-id="3778" instrument_node="">Severity:</span></strong><span data-dcnode-id="3776" instrument_node=""> High</span></li></ul><span data-dcnode-id="3773" instrument_node="">
</span><p data-dcnode-id="3771"><span data-dcnode-id="3772" instrument_node="">Benzodiazepines are the most commonly prescribed class of drugs for managing anxiety. They work by increasing the binding ability of GABA to inhibit electrical activity in the brain. They’re highly effective for preventing or reversing anxiety attacks, as well as promoting sleep for people suffering from insomnia or reducing the frequency and severity of seizures.</span></p><span data-dcnode-id="3770" instrument_node="">
</span><p data-dcnode-id="3768"><span data-dcnode-id="3769" instrument_node="">Unfortunately, these drugs are also highly addictive. Some drugs, such as Xanax, can lead to dependency and addiction in as little as two weeks.</span></p><span data-dcnode-id="3767" instrument_node="">
</span><p data-dcnode-id="3765"><span data-dcnode-id="3766" instrument_node="">CBD is very likely to interact with benzodiazepines. The interaction increases the effects of both substances, which can make them too strong. People who take benzos and CBD report feeling more sedated than usual.</span></p><span data-dcnode-id="3764" instrument_node="">
</span><p data-dcnode-id="3759"><span data-dcnode-id="3763" instrument_node="">Some people are using </span><a data-dcnode-id="3761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/cbd-xanax/"><span data-dcnode-id="3762" instrument_node="">CBD to help wean off benzodiazepines</span></a><span data-dcnode-id="3760" instrument_node=""> by gradually increasing the dose of CBD and decreasing the dose of benzos over time.</span></p><span data-dcnode-id="3758" instrument_node="">
</span><p data-dcnode-id="3756"><span data-dcnode-id="3757" instrument_node="">Always consult a doctor before combining these drugs together for any reason.</span></p><span data-dcnode-id="3755" instrument_node="">
</span><h4 data-dcnode-id="3753" id="h4-benzodiazepines-that-may-interact-with-cbd-1"><span data-dcnode-id="3754" instrument_node="">Benzodiazepines That May Interact With CBD</span></h4><span data-dcnode-id="3752" instrument_node="">
</span><ul data-dcnode-id="3694"><li data-dcnode-id="3747"><strong data-dcnode-id="3749"><a data-dcnode-id="3750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/alprazolam/"><span data-dcnode-id="3751" instrument_node="">Alprazolam</span></a></strong><span data-dcnode-id="3748" instrument_node=""> (Xanax)</span></li><li data-dcnode-id="3743"><strong data-dcnode-id="3745"><span data-dcnode-id="3746" instrument_node="">Chlordiazepoxide</span></strong><span data-dcnode-id="3744" instrument_node=""> (Librium)</span></li><li data-dcnode-id="3738"><strong data-dcnode-id="3740"><a data-dcnode-id="3741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/clonazepam/"><span data-dcnode-id="3742" instrument_node="">Clonazepam</span></a></strong><span data-dcnode-id="3739" instrument_node=""> (Klonopin)</span></li><li data-dcnode-id="3734"><strong data-dcnode-id="3736"><span data-dcnode-id="3737" instrument_node="">Clorazepate</span></strong><span data-dcnode-id="3735" instrument_node=""> (Tranxene)</span></li><li data-dcnode-id="3729"><strong data-dcnode-id="3731"><a data-dcnode-id="3732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/diazepam/"><span data-dcnode-id="3733" instrument_node="">Diazepam</span></a></strong><span data-dcnode-id="3730" instrument_node=""> (Valium)</span></li><li data-dcnode-id="3724"><strong data-dcnode-id="3726"><a data-dcnode-id="3727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/estazolam/"><span data-dcnode-id="3728" instrument_node="">Estazolam</span></a></strong><span data-dcnode-id="3725" instrument_node=""> (Prosom)</span></li><li data-dcnode-id="3720"><strong data-dcnode-id="3722"><span data-dcnode-id="3723" instrument_node="">Flurazepam</span></strong><span data-dcnode-id="3721" instrument_node=""> (Dalmane)</span></li><li data-dcnode-id="3715"><strong data-dcnode-id="3717"><a data-dcnode-id="3718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/lorazepam/"><span data-dcnode-id="3719" instrument_node="">Lorazepam</span></a></strong><span data-dcnode-id="3716" instrument_node=""> (Ativan)</span></li><li data-dcnode-id="3711"><strong data-dcnode-id="3713"><span data-dcnode-id="3714" instrument_node="">Midazolam</span></strong><span data-dcnode-id="3712" instrument_node=""> (Versed)</span></li><li data-dcnode-id="3707"><strong data-dcnode-id="3709"><span data-dcnode-id="3710" instrument_node="">Oxazepam</span></strong><span data-dcnode-id="3708" instrument_node=""> (Serax)</span></li><li data-dcnode-id="3703"><strong data-dcnode-id="3705"><span data-dcnode-id="3706" instrument_node="">Temazepam</span></strong><span data-dcnode-id="3704" instrument_node=""> (Restoril)</span></li><li data-dcnode-id="3699"><strong data-dcnode-id="3701"><span data-dcnode-id="3702" instrument_node="">Triazolam</span></strong><span data-dcnode-id="3700" instrument_node=""> (Halcion)</span></li><li data-dcnode-id="3695"><strong data-dcnode-id="3697"><span data-dcnode-id="3698" instrument_node="">Quazepam</span></strong><span data-dcnode-id="3696" instrument_node=""> (Doral)</span></li></ul><span data-dcnode-id="3693" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3688"><figure class="aligncenter size-medium" data-dcnode-id="3689"><picture data-dcnode-id="3690"><source data-dcnode-id="3692" sizes="(max-width: 300px) 100vw, 300px" srcset="https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/xanax-tablets--300x200.png.webp 300w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/xanax-tablets--180x120.png.webp 180w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/xanax-tablets--283x189.png.webp 283w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/xanax-tablets--54x36.png.webp 54w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/xanax-tablets--330x220.png.webp 330w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/xanax-tablets--420x280.png.webp 420w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/xanax-tablets--74x49.png.webp 74w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/xanax-tablets--45x30.png.webp 45w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/xanax-tablets-.png.webp 612w" type="image/webp"><img alt="" class="wp-image-33637 webpexpress-processed" data-dcnode-id="3691" height="200" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2021/10/xanax-tablets--300x200.png&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/xanax-tablets--300x200.png 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/xanax-tablets--180x120.png 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/xanax-tablets--283x189.png 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/xanax-tablets--54x36.png 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/xanax-tablets--330x220.png 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/xanax-tablets--420x280.png 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/xanax-tablets--74x49.png 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/xanax-tablets--45x30.png 45w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/xanax-tablets-.png 612w" width="300"></picture></figure></div><span data-dcnode-id="3687" instrument_node="">
</span><h3 data-dcnode-id="3685" id="h3-barbiturates-cbd-2"><span data-dcnode-id="3686" instrument_node="">Barbiturates &amp; CBD</span></h3><span data-dcnode-id="3684" instrument_node="">
</span><ul data-dcnode-id="3675"><li data-dcnode-id="3680"><strong data-dcnode-id="3682"><span data-dcnode-id="3683" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="3681" instrument_node=""> ↑↑↑ Increased Effect (Agonistic)</span></li><li data-dcnode-id="3676"><strong data-dcnode-id="3678"><span data-dcnode-id="3679" instrument_node="">Severity:</span></strong><span data-dcnode-id="3677" instrument_node=""> High</span></li></ul><span data-dcnode-id="3674" instrument_node="">
</span><p data-dcnode-id="3672"><span data-dcnode-id="3673" instrument_node="">Barbiturates are an older class of anxiety, insomnia, and anticonvulsant medications. They’ve largely been replaced by benzodiazepines, which are both more effective and less dangerous.</span></p><span data-dcnode-id="3671" instrument_node="">
</span><p data-dcnode-id="3669"><span data-dcnode-id="3670" instrument_node="">This class of drugs has a similar effect on the body as both CBD and benzodiazepines. It’s not a good idea to combine CBD with barbiturates for any reason. The combination is very likely to lead to severe side effects.</span></p><span data-dcnode-id="3668" instrument_node="">
</span><h4 data-dcnode-id="3666" id="h4-barbiturates-that-may-interact-with-cbd-2"><span data-dcnode-id="3667" instrument_node="">Barbiturates That May Interact With CBD</span></h4><span data-dcnode-id="3665" instrument_node="">
</span><ul data-dcnode-id="3639"><li data-dcnode-id="3661"><strong data-dcnode-id="3663"><span data-dcnode-id="3664" instrument_node="">Amobarbital</span></strong><span data-dcnode-id="3662" instrument_node=""> (Amytal Sodium)</span></li><li data-dcnode-id="3657"><strong data-dcnode-id="3659"><span data-dcnode-id="3660" instrument_node="">Butabarbital</span></strong><span data-dcnode-id="3658" instrument_node=""> (Butisol Sodium)</span></li><li data-dcnode-id="3653"><strong data-dcnode-id="3655"><span data-dcnode-id="3656" instrument_node="">Mephobarbital</span></strong><span data-dcnode-id="3654" instrument_node=""> (Mebaral)</span></li><li data-dcnode-id="3649"><strong data-dcnode-id="3651"><span data-dcnode-id="3652" instrument_node="">Pentobarbital</span></strong><span data-dcnode-id="3650" instrument_node=""> (Nembutal Sodium)</span></li><li data-dcnode-id="3644"><strong data-dcnode-id="3646"><a data-dcnode-id="3647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/phenobarbital/"><span data-dcnode-id="3648" instrument_node="">Phenobarbital</span></a></strong><span data-dcnode-id="3645" instrument_node=""> (Luminal)</span></li><li data-dcnode-id="3640"><strong data-dcnode-id="3642"><span data-dcnode-id="3643" instrument_node="">Secobarbital</span></strong><span data-dcnode-id="3641" instrument_node=""> (Seconal)</span></li></ul><span data-dcnode-id="3638" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3633"><figure class="aligncenter size-large" data-dcnode-id="3634"><picture data-dcnode-id="3635"><source data-dcnode-id="3637" sizes="(max-width: 613px) 100vw, 613px" srcset="https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-4.png.webp 613w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-4-300x199.png.webp 300w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-4-180x120.png.webp 180w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-4-283x188.png.webp 283w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-4-54x36.png.webp 54w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-4-330x219.png.webp 330w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-4-420x279.png.webp 420w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-4-74x49.png.webp 74w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-4-45x30.png.webp 45w" type="image/webp"><img alt="" class="wp-image-27472 webpexpress-processed" data-dcnode-id="3636" height="407" loading="lazy" sizes="(max-width: 613px) 100vw, 613px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-4.png&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-4.png 613w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-4-300x199.png 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-4-180x120.png 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-4-283x188.png 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-4-54x36.png 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-4-330x219.png 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-4-420x279.png 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-4-74x49.png 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-4-45x30.png 45w" width="613"></picture></figure></div><span data-dcnode-id="3632" instrument_node="">
</span></div><div class="p_wrap" data-dcnode-id="3124"><amp-position-observer data-dcnode-id="3630" intersection-ratios="0" layout="nodisplay" on="scroll:h2-cbd-antidepressants-8-offset.seekTo(percent=event.percent)"></amp-position-observer><h2 data-dcnode-id="3628" id="h2-cbd-antidepressants-8"><span data-dcnode-id="3629" instrument_node="">CBD &amp; Antidepressants</span></h2><span data-dcnode-id="3627" instrument_node="">
</span><p data-dcnode-id="3620"><a data-dcnode-id="3625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/best-cbd/anxiety-depression/"><span data-dcnode-id="3626" instrument_node="">CBD is an excellent antidepressant</span></a><span data-dcnode-id="3624" instrument_node=""> — but only with long-term use. The benefits of CBD on depression take a long time to manifest. CBD supports hormone and neurochemical balance and </span><a data-dcnode-id="3622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/best-cbd/inflammation/"><span data-dcnode-id="3623" instrument_node="">alleviates inflammation</span></a><span data-dcnode-id="3621" instrument_node=""> in the brain that could be contributing to depressive symptoms.</span></p><span data-dcnode-id="3619" instrument_node="">
</span><p data-dcnode-id="3617"><span data-dcnode-id="3618" instrument_node="">Most prescription antidepressants work through completely separate mechanisms and are unlikely to directly interact with CBD. Instead, most of the dangers associated with combining these substances come from competition for liver metabolism.</span></p><span data-dcnode-id="3616" instrument_node="">
</span><p data-dcnode-id="3614"><span data-dcnode-id="3615" instrument_node="">Antidepressants are used on a daily basis, so any changes in the rate of metabolism of these drugs could lead to gradually increasing concentrations in the blood. If left unchecked, drug concentrations can reach toxic levels —&nbsp;leading to severe side-effects such as serotonin syndrome.</span></p><span data-dcnode-id="3613" instrument_node="">
</span><p data-dcnode-id="3611"><span data-dcnode-id="3612" instrument_node="">CBD should only be used alongside antidepressants after consulting with your doctor.</span></p><span data-dcnode-id="3610" instrument_node="">
</span><h3 data-dcnode-id="3608" id="h3-ssri-medications-cbd-1"><span data-dcnode-id="3609" instrument_node="">SSRI Medications &amp; CBD</span></h3><span data-dcnode-id="3607" instrument_node="">
</span><ul data-dcnode-id="3598"><li data-dcnode-id="3603"><strong data-dcnode-id="3605"><span data-dcnode-id="3606" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="3604" instrument_node="">&nbsp; Metabolic Competitor</span></li><li data-dcnode-id="3599"><strong data-dcnode-id="3601"><span data-dcnode-id="3602" instrument_node="">Severity:</span></strong><span data-dcnode-id="3600" instrument_node=""> Moderate</span></li></ul><span data-dcnode-id="3597" instrument_node="">
</span><p data-dcnode-id="3595"><span data-dcnode-id="3596" instrument_node="">SSRIs stand for selective serotonin reuptake inhibitors — they’re the most common class of antidepressant drugs used today.</span></p><span data-dcnode-id="3594" instrument_node="">
</span><p data-dcnode-id="3592"><span data-dcnode-id="3593" instrument_node="">Serotonin is one of the key regulators of mood, so these drugs are used to increase the concentrations of serotonin at the synapses in order to boost mood. Whenever serotonin is released, it’s reabsorbed into the synapses where it’s dismantled. SSRIs work by blocking the reabsorption of serotonin —&nbsp;allowing it to remain in the synapses for longer periods of time.</span></p><span data-dcnode-id="3591" instrument_node="">
</span><p data-dcnode-id="3587"><strong data-dcnode-id="3589"><span data-dcnode-id="3590" instrument_node="">Generally speaking, you can take CBD alongside antidepressants, but with caution. </span></strong><span data-dcnode-id="3588" instrument_node="">Most of the dangers of this combination come with long-term mixing. CBD can slow SSRI metabolism and cause them to build up in the bloodstream. If the dose becomes too high, it can cause something called serotonin syndrome — which is what happens when serotonin levels are too high.</span></p><span data-dcnode-id="3586" instrument_node="">
</span><p data-dcnode-id="3584"><span data-dcnode-id="3585" instrument_node="">The side effects of this condition can be severe and should be avoided at all costs.</span></p><span data-dcnode-id="3583" instrument_node="">
</span><p data-dcnode-id="3578"><span data-dcnode-id="3582" instrument_node="">If you’re going to mix CBD with SSRIs, make sure to stick to lower doses, take breaks every couple of days, and consult your doctor if you experience </span><em data-dcnode-id="3580"><span data-dcnode-id="3581" instrument_node="">any</span></em><span data-dcnode-id="3579" instrument_node=""> side effects whatsoever.</span></p><span data-dcnode-id="3577" instrument_node="">
</span><h4 data-dcnode-id="3575" id="h4-ssris-that-may-interact-with-cbd-1"><span data-dcnode-id="3576" instrument_node="">SSRIs That May Interact With CBD</span></h4><span data-dcnode-id="3574" instrument_node="">
</span><ul data-dcnode-id="3537"><li data-dcnode-id="3569"><strong data-dcnode-id="3571"><a data-dcnode-id="3572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/citalopram/"><span data-dcnode-id="3573" instrument_node="">Citalopram</span></a></strong><span data-dcnode-id="3570" instrument_node=""> (Cipramil &amp; Celexa)</span></li><li data-dcnode-id="3565"><strong data-dcnode-id="3567"><span data-dcnode-id="3568" instrument_node="">Dapoxetine</span></strong><span data-dcnode-id="3566" instrument_node=""> (Priligy)</span></li><li data-dcnode-id="3560"><strong data-dcnode-id="3562"><a data-dcnode-id="3563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/escitalopram/"><span data-dcnode-id="3564" instrument_node="">Escitalopram</span></a></strong><span data-dcnode-id="3561" instrument_node=""> (Cipralex &amp; Lexapro)</span></li><li data-dcnode-id="3555"><strong data-dcnode-id="3557"><a data-dcnode-id="3558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/fluoxetine/"><span data-dcnode-id="3559" instrument_node="">Fluoxetine</span></a></strong><span data-dcnode-id="3556" instrument_node=""> (Prozac, Rapiflux, Sarafem, Selfemra &amp; Oxactin)</span></li><li data-dcnode-id="3551"><strong data-dcnode-id="3553"><span data-dcnode-id="3554" instrument_node="">Fluvoxamine</span></strong><span data-dcnode-id="3552" instrument_node=""> (Faverin)</span></li><li data-dcnode-id="3547"><strong data-dcnode-id="3549"><span data-dcnode-id="3550" instrument_node="">Paroxetine</span></strong><span data-dcnode-id="3548" instrument_node=""> (Seroxat)</span></li><li data-dcnode-id="3542"><strong data-dcnode-id="3544"><a data-dcnode-id="3545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/sertraline/"><span data-dcnode-id="3546" instrument_node="">Sertraline</span></a></strong><span data-dcnode-id="3543" instrument_node=""> (Zoloft, Lustral)</span></li><li data-dcnode-id="3538"><strong data-dcnode-id="3540"><span data-dcnode-id="3541" instrument_node="">Vortioxetine</span></strong><span data-dcnode-id="3539" instrument_node=""> (Brintellix)</span></li></ul><span data-dcnode-id="3536" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3531"><figure class="aligncenter size-medium" data-dcnode-id="3532"><picture data-dcnode-id="3533"><source data-dcnode-id="3535" sizes="(max-width: 300px) 100vw, 300px" srcset="https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/zoloft1-300x300.png.webp 300w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/zoloft1-150x150.png.webp 150w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/zoloft1-180x180.png.webp 180w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/zoloft1-158x158.png.webp 158w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/zoloft1-80x80.png.webp 80w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/zoloft1-120x120.png.webp 120w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/zoloft1-70x70.png.webp 70w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/zoloft1-40x40.png.webp 40w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/zoloft1-283x283.png.webp 283w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/zoloft1-54x54.png.webp 54w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/zoloft1-330x330.png.webp 330w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/zoloft1-420x420.png.webp 420w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/zoloft1-74x74.png.webp 74w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/zoloft1-30x30.png.webp 30w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/zoloft1.png.webp 500w" type="image/webp"><img alt="" class="wp-image-33723 webpexpress-processed" data-dcnode-id="3534" height="300" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2021/10/zoloft1-300x300.png&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/zoloft1-300x300.png 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/zoloft1-150x150.png 150w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/zoloft1-180x180.png 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/zoloft1-158x158.png 158w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/zoloft1-80x80.png 80w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/zoloft1-120x120.png 120w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/zoloft1-70x70.png 70w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/zoloft1-40x40.png 40w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/zoloft1-283x283.png 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/zoloft1-54x54.png 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/zoloft1-330x330.png 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/zoloft1-420x420.png 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/zoloft1-74x74.png 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/zoloft1-30x30.png 30w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/zoloft1.png 500w" width="300"></picture></figure></div><span data-dcnode-id="3530" instrument_node="">
</span><h3 data-dcnode-id="3528" id="h3-snri-medications-cbd-2"><span data-dcnode-id="3529" instrument_node="">SNRI Medications &amp; CBD</span></h3><span data-dcnode-id="3527" instrument_node="">
</span><ul data-dcnode-id="3518"><li data-dcnode-id="3523"><strong data-dcnode-id="3525"><span data-dcnode-id="3526" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="3524" instrument_node="">&nbsp; Metabolic Competitor</span></li><li data-dcnode-id="3519"><strong data-dcnode-id="3521"><span data-dcnode-id="3522" instrument_node="">Severity:</span></strong><span data-dcnode-id="3520" instrument_node=""> Mild to Moderate</span></li></ul><span data-dcnode-id="3517" instrument_node="">
</span><p data-dcnode-id="3515"><span data-dcnode-id="3516" instrument_node="">SNRI stands for serotonin-norepinephrine reuptake inhibitors. They’re a secondary option for treating depression when SSRIs haven’t worked. SNRIs are also a good option for people who have both depression and anxiety.</span></p><span data-dcnode-id="3514" instrument_node="">
</span><p data-dcnode-id="3509"><span data-dcnode-id="3513" instrument_node="">These medications work through the same mechanism as SSRIs but with one distinct difference. These drugs increase the concentrations of both serotonin </span><em data-dcnode-id="3511"><span data-dcnode-id="3512" instrument_node="">and</span></em><span data-dcnode-id="3510" instrument_node=""> the related neurotransmitter norepinephrine.</span></p><span data-dcnode-id="3508" instrument_node="">
</span><p data-dcnode-id="3506"><span data-dcnode-id="3507" instrument_node="">CBD may interact with SNRI medications in two main ways —&nbsp;it competes for the metabolism of the drug in the liver (primarily at the CYP3A4 enzyme) and may negate some of the benefits of SNRIs (theoretical).</span></p><span data-dcnode-id="3505" instrument_node="">
</span><p data-dcnode-id="3503"><span data-dcnode-id="3504" instrument_node="">SNRIs follow a very specific dosage schedule, just like SSRIs. The dose is carefully administered to achieve consistent levels of the drug in the body. The dose is calculated based on weight and titrated to provide consistent levels for the patient’s individual metabolism.</span></p><span data-dcnode-id="3502" instrument_node="">
</span><p data-dcnode-id="3500"><span data-dcnode-id="3501" instrument_node="">When CBD is thrown into the mix, it can alter the rate of metabolism of the drugs. Over time, the concentration of the drugs may increase, eventually leading to signs of drug toxicity or overdose.</span></p><span data-dcnode-id="3499" instrument_node="">
</span><h4 data-dcnode-id="3497" id="h4-snris-that-may-interact-with-cbd-2"><span data-dcnode-id="3498" instrument_node="">SNRIs That May Interact With CBD</span></h4><span data-dcnode-id="3496" instrument_node="">
</span><ul data-dcnode-id="3471"><li data-dcnode-id="3492"><strong data-dcnode-id="3494"><span data-dcnode-id="3495" instrument_node="">Atomoxetine</span></strong><span data-dcnode-id="3493" instrument_node=""> (Strattera)</span></li><li data-dcnode-id="3488"><strong data-dcnode-id="3490"><span data-dcnode-id="3491" instrument_node="">Desvenlafaxine</span></strong><span data-dcnode-id="3489" instrument_node=""> (Pristiq, Khedezla)</span></li><li data-dcnode-id="3484"><strong data-dcnode-id="3486"><span data-dcnode-id="3487" instrument_node="">Duloxetine</span></strong><span data-dcnode-id="3485" instrument_node=""> (Cymbalta, Irenka)</span></li><li data-dcnode-id="3480"><strong data-dcnode-id="3482"><span data-dcnode-id="3483" instrument_node="">Levomilnacipran</span></strong><span data-dcnode-id="3481" instrument_node=""> (Fetzima)</span></li><li data-dcnode-id="3476"><strong data-dcnode-id="3478"><span data-dcnode-id="3479" instrument_node="">Milnacipran</span></strong><span data-dcnode-id="3477" instrument_node=""> (Savella)</span></li><li data-dcnode-id="3472"><strong data-dcnode-id="3474"><span data-dcnode-id="3475" instrument_node="">Venlafaxine</span></strong><span data-dcnode-id="3473" instrument_node=""> (Effexor XR)</span></li></ul><span data-dcnode-id="3470" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3465"><figure class="aligncenter size-medium" data-dcnode-id="3466"><picture data-dcnode-id="3467"><source data-dcnode-id="3469" sizes="(max-width: 300px) 100vw, 300px" srcset="https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/cymbalta-300x300.png.webp 300w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/cymbalta-150x150.png.webp 150w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/cymbalta-768x768.png.webp 768w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/cymbalta-180x180.png.webp 180w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/cymbalta-158x158.png.webp 158w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/cymbalta-80x80.png.webp 80w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/cymbalta-120x120.png.webp 120w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/cymbalta-70x70.png.webp 70w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/cymbalta-40x40.png.webp 40w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/cymbalta-283x283.png.webp 283w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/cymbalta-54x54.png.webp 54w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/cymbalta-330x330.png.webp 330w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/cymbalta-420x420.png.webp 420w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/cymbalta-74x74.png.webp 74w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/cymbalta-30x30.png.webp 30w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/cymbalta.png.webp 800w" type="image/webp"><img alt="" class="wp-image-34386 webpexpress-processed" data-dcnode-id="3468" height="300" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2021/10/cymbalta-300x300.png&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/cymbalta-300x300.png 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/cymbalta-150x150.png 150w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/cymbalta-768x768.png 768w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/cymbalta-180x180.png 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/cymbalta-158x158.png 158w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/cymbalta-80x80.png 80w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/cymbalta-120x120.png 120w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/cymbalta-70x70.png 70w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/cymbalta-40x40.png 40w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/cymbalta-283x283.png 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/cymbalta-54x54.png 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/cymbalta-330x330.png 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/cymbalta-420x420.png 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/cymbalta-74x74.png 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/cymbalta-30x30.png 30w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/cymbalta.png 800w" width="300"></picture></figure></div><span data-dcnode-id="3464" instrument_node="">
</span><h3 data-dcnode-id="3462" id="h3-tricyclic-antidepressants-cbd-3"><span data-dcnode-id="3463" instrument_node="">Tricyclic Antidepressants &amp; CBD</span></h3><span data-dcnode-id="3461" instrument_node="">
</span><ul data-dcnode-id="3452"><li data-dcnode-id="3457"><strong data-dcnode-id="3459"><span data-dcnode-id="3460" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="3458" instrument_node=""> Metabolic Competitor</span></li><li data-dcnode-id="3453"><strong data-dcnode-id="3455"><span data-dcnode-id="3456" instrument_node="">Severity:</span></strong><span data-dcnode-id="3454" instrument_node=""> Moderate</span></li></ul><span data-dcnode-id="3451" instrument_node="">
</span><p data-dcnode-id="3449"><span data-dcnode-id="3450" instrument_node="">Tricyclic antidepressants are an older class of depression medications. They’re still used today, but only when other treatments fail to produce results. They block the reuptake of serotonin and norepinephrine but also interact with other neurotransmitters. </span></p><span data-dcnode-id="3448" instrument_node="">
</span><p data-dcnode-id="3446"><span data-dcnode-id="3447" instrument_node="">They’re considered a “dirty drug” because they interact with receptors we don’t always want to target. This gives them a lot of extra side effects, other drugs like SSRIs or SNRIs don’t have.</span></p><span data-dcnode-id="3445" instrument_node="">
</span><p data-dcnode-id="3443"><span data-dcnode-id="3444" instrument_node="">CBD and tricyclics can be combined, but always consult a medical professional first. There’s a higher chance of causing severe side effects with higher doses of CBD compared to other antidepressant medications.</span></p><span data-dcnode-id="3442" instrument_node="">
</span><h4 data-dcnode-id="3440" id="h4-tricyclic-antidepressants-that-may-interact-with-cbd-3"><span data-dcnode-id="3441" instrument_node="">Tricyclic Antidepressants That May Interact With CBD</span></h4><span data-dcnode-id="3439" instrument_node="">
</span><ul data-dcnode-id="3406"><li data-dcnode-id="3435"><strong data-dcnode-id="3437"><span data-dcnode-id="3438" instrument_node="">Amitriptyline</span></strong><span data-dcnode-id="3436" instrument_node=""> (Elavil)</span></li><li data-dcnode-id="3431"><strong data-dcnode-id="3433"><span data-dcnode-id="3434" instrument_node="">Amoxapine</span></strong><span data-dcnode-id="3432" instrument_node=""> (Asendin)</span></li><li data-dcnode-id="3427"><strong data-dcnode-id="3429"><span data-dcnode-id="3430" instrument_node="">Desipramine</span></strong><span data-dcnode-id="3428" instrument_node=""> (Norpramin)</span></li><li data-dcnode-id="3423"><strong data-dcnode-id="3425"><span data-dcnode-id="3426" instrument_node="">Doxepin</span></strong><span data-dcnode-id="3424" instrument_node=""> (Sinequan, Quitaxon &amp; Aponal)</span></li><li data-dcnode-id="3419"><strong data-dcnode-id="3421"><span data-dcnode-id="3422" instrument_node="">Imipramine</span></strong><span data-dcnode-id="3420" instrument_node=""> (Tofranil)</span></li><li data-dcnode-id="3415"><strong data-dcnode-id="3417"><span data-dcnode-id="3418" instrument_node="">Nortriptyline</span></strong><span data-dcnode-id="3416" instrument_node=""> (Pamelor)</span></li><li data-dcnode-id="3411"><strong data-dcnode-id="3413"><span data-dcnode-id="3414" instrument_node="">Protriptyline</span></strong><span data-dcnode-id="3412" instrument_node=""> (Vivactil)</span></li><li data-dcnode-id="3407"><strong data-dcnode-id="3409"><span data-dcnode-id="3410" instrument_node="">Trimipramine</span></strong><span data-dcnode-id="3408" instrument_node=""> (Surmontil)</span></li></ul><span data-dcnode-id="3405" instrument_node="">
