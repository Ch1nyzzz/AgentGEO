ebp 420w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/jentadueto-74x74.png.webp 74w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/jentadueto-30x30.png.webp 30w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/jentadueto.png.webp 800w" type="image/webp"><img alt="" class="wp-image-34392 webpexpress-processed" data-dcnode-id="2730" height="300" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2021/10/jentadueto-300x300.png&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/jentadueto-300x300.png 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/jentadueto-150x150.png 150w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/jentadueto-768x768.png 768w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/jentadueto-180x180.png 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/jentadueto-158x158.png 158w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/jentadueto-80x80.png 80w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/jentadueto-120x120.png 120w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/jentadueto-70x70.png 70w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/jentadueto-40x40.png 40w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/jentadueto-283x283.png 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/jentadueto-54x54.png 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/jentadueto-330x330.png 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/jentadueto-420x420.png 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/jentadueto-74x74.png 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/jentadueto-30x30.png 30w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/jentadueto.png 800w" width="300"></picture></figure></div><span data-dcnode-id="2726" instrument_node="">
</span><h3 data-dcnode-id="2724" id="h3-dpp4-inhibitors-3"><span data-dcnode-id="2725" instrument_node="">DPP-4 Inhibitors</span></h3><span data-dcnode-id="2723" instrument_node="">
</span><ul data-dcnode-id="2714"><li data-dcnode-id="2719"><strong data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="2720" instrument_node=""> ↑↑↑ Increased Effect (Agonistic)</span></li><li data-dcnode-id="2715"><strong data-dcnode-id="2717"><span data-dcnode-id="2718" instrument_node="">Severity:</span></strong><span data-dcnode-id="2716" instrument_node=""> Mild</span></li></ul><span data-dcnode-id="2713" instrument_node="">
</span><p data-dcnode-id="2711"><span data-dcnode-id="2712" instrument_node="">DPP-4 stands for dipeptidyl Peptidase-4 — which is an enzyme tasked with breaking down a class of digestive enzymes called incretins. Incretins stimulate the production of insulin after a meal and block the production of glucagon (which works in opposition to insulin).</span></p><span data-dcnode-id="2710" instrument_node="">
</span><p data-dcnode-id="2708"><span data-dcnode-id="2709" instrument_node="">DPP-4 inhibitors block this enzyme, leading to an increase in the concentration of incretins. This is thought to promote higher insulin and reduce glucagon levels.</span></p><span data-dcnode-id="2707" instrument_node="">
</span><p data-dcnode-id="2702"><span data-dcnode-id="2706" instrument_node="">Many of these medications, particularly Saxagliptin and Sitagliptin, requires a lot of attention from liver enzymes such as the CYP3A4 and CYP3A5 enzymes [</span><a data-dcnode-id="2704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/25488788/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2705" instrument_node="">7</span></a><span data-dcnode-id="2703" instrument_node="">]. They also have a very long half-life.</span></p><span data-dcnode-id="2701" instrument_node="">
</span><p data-dcnode-id="2696"><span data-dcnode-id="2700" instrument_node="">This increases the risk of side effects when used in combination with any other substances that require metabolism from these enzymes — including CBD. Other DPP-4 inhibitors than Sacagliptin and Sitagliptin don’t have a strong reliance on these enzymes [</span><a data-dcnode-id="2698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3483791/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2699" instrument_node="">8</span></a><span data-dcnode-id="2697" instrument_node="">] and are much less likely to interfere with CBD.</span></p><span data-dcnode-id="2695" instrument_node="">
</span><p data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node="">DPP-4 inhibitors are used on a daily basis, so it’s possible that over time when used in conjunction with CBD, concentrations of the medication could build up to toxic levels in the bloodstream. This would lead to a higher rate of side-effects caused by the medication itself — which includes nausea, flu-like symptoms, or painful skin reactions.</span></p><span data-dcnode-id="2692" instrument_node="">
</span><p data-dcnode-id="2690"><span data-dcnode-id="2691" instrument_node="">Secondly, the main impact of DPP-4 inhibitors is a reduction in blood glucose levels. This could compound the hypoglycemic effects of CBD and lead to symptoms associated with low blood sugar.</span></p><span data-dcnode-id="2689" instrument_node="">
</span><h4 data-dcnode-id="2687" id="h4-dpp4-inhibitors-that-may-interact-with-cbd-3"><span data-dcnode-id="2688" instrument_node="">DPP-4 Inhibitors That May Interact With CBD</span></h4><span data-dcnode-id="2686" instrument_node="">
</span><ul data-dcnode-id="2669"><li data-dcnode-id="2682"><strong data-dcnode-id="2684"><span data-dcnode-id="2685" instrument_node="">Alogliptin</span></strong><span data-dcnode-id="2683" instrument_node=""> (Nesina, Kazano, Oseni)</span></li><li data-dcnode-id="2678"><strong data-dcnode-id="2680"><span data-dcnode-id="2681" instrument_node="">Linagliptin</span></strong><span data-dcnode-id="2679" instrument_node=""> (Tradjenta, Glyxambi, &amp; Jentadueto)</span></li><li data-dcnode-id="2674"><strong data-dcnode-id="2676"><span data-dcnode-id="2677" instrument_node="">Saxagliptin</span></strong><span data-dcnode-id="2675" instrument_node=""> (Onglyza, Kombiglyze XR)</span></li><li data-dcnode-id="2670"><strong data-dcnode-id="2672"><span data-dcnode-id="2673" instrument_node="">Sitagliptin</span></strong><span data-dcnode-id="2671" instrument_node=""> (Januvia, Janumet, &amp; Juvisync)</span></li></ul><span data-dcnode-id="2668" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2663"><figure class="aligncenter size-medium" data-dcnode-id="2664"><picture data-dcnode-id="2665"><source data-dcnode-id="2667" sizes="(max-width: 300px) 100vw, 300px" srcset="https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/janumet-metformin-300x300.png.webp 300w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/janumet-metformin-150x150.png.webp 150w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/janumet-metformin-180x180.png.webp 180w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/janumet-metformin-158x158.png.webp 158w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/janumet-metformin-80x80.png.webp 80w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/janumet-metformin-120x120.png.webp 120w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/janumet-metformin-70x70.png.webp 70w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/janumet-metformin-40x40.png.webp 40w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/janumet-metformin-283x283.png.webp 283w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/janumet-metformin-54x54.png.webp 54w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/janumet-metformin-330x330.png.webp 330w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/janumet-metformin-420x420.png.webp 420w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/janumet-metformin-74x74.png.webp 74w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/janumet-metformin-30x30.png.webp 30w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/janumet-metformin.png.webp 500w" type="image/webp"><img alt="" class="wp-image-33532 webpexpress-processed" data-dcnode-id="2666" height="300" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2021/10/janumet-metformin-300x300.png&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/janumet-metformin-300x300.png 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/janumet-metformin-150x150.png 150w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/janumet-metformin-180x180.png 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/janumet-metformin-158x158.png 158w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/janumet-metformin-80x80.png 80w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/janumet-metformin-120x120.png 120w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/janumet-metformin-70x70.png 70w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/janumet-metformin-40x40.png 40w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/janumet-metformin-283x283.png 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/janumet-metformin-54x54.png 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/janumet-metformin-330x330.png 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/janumet-metformin-420x420.png 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/janumet-metformin-74x74.png 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/janumet-metformin-30x30.png 30w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/janumet-metformin.png 500w" width="300"></picture></figure></div><span data-dcnode-id="2662" instrument_node="">
</span><h3 data-dcnode-id="2660" id="h3-glp1-receptor-agonists-cbd-4"><span data-dcnode-id="2661" instrument_node="">GLP-1 Receptor Agonists &amp; CBD</span></h3><span data-dcnode-id="2659" instrument_node="">
</span><ul data-dcnode-id="2650"><li data-dcnode-id="2655"><strong data-dcnode-id="2657"><span data-dcnode-id="2658" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="2656" instrument_node=""> ↑↑↑ Increased Effect (Agonistic)</span></li><li data-dcnode-id="2651"><strong data-dcnode-id="2653"><span data-dcnode-id="2654" instrument_node="">Severity:</span></strong><span data-dcnode-id="2652" instrument_node=""> Mild</span></li></ul><span data-dcnode-id="2649" instrument_node="">
</span><p data-dcnode-id="2647"><span data-dcnode-id="2648" instrument_node="">GLP-1 refers to glucagon-like peptide-1 — which is an incretin-based medication. These medications are similar to DPP-4 inhibitors, but instead of blocking the enzyme that destroys increments, it stimulates the incretin receptors with synthetic versions of these important hormones.</span></p><span data-dcnode-id="2646" instrument_node="">
</span><p data-dcnode-id="2644"><span data-dcnode-id="2645" instrument_node="">The effects are increased feelings of satiety and increased insulin secretion. They’re used for weight loss and blood sugar control.</span></p><span data-dcnode-id="2643" instrument_node="">
</span><p data-dcnode-id="2641"><span data-dcnode-id="2642" instrument_node="">GLP-1 agonists don’t exert a strong impact on CYP450 enzymes and are unlikely to have a strong interaction with CBD.</span></p><span data-dcnode-id="2640" instrument_node="">
</span><p data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">The main concern for potential interactions between CBD and GLP-1 receptor agonists is the anti-appetite effects. Both CBD and GLP-1 agonists reduce appetite.</span></p><span data-dcnode-id="2637" instrument_node="">
</span><h4 data-dcnode-id="2635" id="h4-glp1-receptor-agonists-that-may-interact-with-cbd-4"><span data-dcnode-id="2636" instrument_node="">GLP-1 Receptor Agonists That May Interact With CBD</span></h4><span data-dcnode-id="2634" instrument_node="">
</span><ul data-dcnode-id="2613"><li data-dcnode-id="2630"><strong data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">Albiglutide</span></strong><span data-dcnode-id="2631" instrument_node=""> (Tanzen)</span></li><li data-dcnode-id="2626"><strong data-dcnode-id="2628"><span data-dcnode-id="2629" instrument_node="">Dulaglutide</span></strong><span data-dcnode-id="2627" instrument_node=""> (Trulicity)</span></li><li data-dcnode-id="2622"><strong data-dcnode-id="2624"><span data-dcnode-id="2625" instrument_node="">Exenatide</span></strong><span data-dcnode-id="2623" instrument_node=""> (Byetta, Bydureon)</span></li><li data-dcnode-id="2618"><strong data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">Liraglutide</span></strong><span data-dcnode-id="2619" instrument_node=""> (Victoza)</span></li><li data-dcnode-id="2614"><strong data-dcnode-id="2616"><span data-dcnode-id="2617" instrument_node="">Semaglutide</span></strong><span data-dcnode-id="2615" instrument_node=""> (Ozempic)</span></li></ul><span data-dcnode-id="2612" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2607"><figure class="aligncenter size-medium" data-dcnode-id="2608"><picture data-dcnode-id="2609"><source data-dcnode-id="2611" sizes="(max-width: 300px) 100vw, 300px" srcset="https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ozempic-300x300.png.webp 300w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ozempic-150x150.png.webp 150w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ozempic-768x768.png.webp 768w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ozempic-180x180.png.webp 180w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ozempic-158x158.png.webp 158w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ozempic-80x80.png.webp 80w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ozempic-120x120.png.webp 120w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ozempic-70x70.png.webp 70w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ozempic-40x40.png.webp 40w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ozempic-283x283.png.webp 283w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ozempic-54x54.png.webp 54w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ozempic-330x330.png.webp 330w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ozempic-420x420.png.webp 420w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ozempic-74x74.png.webp 74w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ozempic-30x30.png.webp 30w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ozempic.png.webp 800w" type="image/webp"><img alt="" class="wp-image-34400 webpexpress-processed" data-dcnode-id="2610" height="300" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ozempic-300x300.png&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ozempic-300x300.png 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ozempic-150x150.png 150w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ozempic-768x768.png 768w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ozempic-180x180.png 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ozempic-158x158.png 158w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ozempic-80x80.png 80w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ozempic-120x120.png 120w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ozempic-70x70.png 70w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ozempic-40x40.png 40w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ozempic-283x283.png 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ozempic-54x54.png 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ozempic-330x330.png 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ozempic-420x420.png 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ozempic-74x74.png 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ozempic-30x30.png 30w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ozempic.png 800w" width="300"></picture></figure></div><span data-dcnode-id="2606" instrument_node="">
</span><h3 data-dcnode-id="2604" id="h3-meglitinides-cbd-5"><span data-dcnode-id="2605" instrument_node="">Meglitinides &amp; CBD</span></h3><span data-dcnode-id="2603" instrument_node="">
</span><ul data-dcnode-id="2594"><li data-dcnode-id="2599"><strong data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="2600" instrument_node=""> ↑↑↑ Increased Effect (Agonistic)</span></li><li data-dcnode-id="2595"><strong data-dcnode-id="2597"><span data-dcnode-id="2598" instrument_node="">Severity:</span></strong><span data-dcnode-id="2596" instrument_node=""> Mild</span></li></ul><span data-dcnode-id="2593" instrument_node="">
</span><p data-dcnode-id="2591"><span data-dcnode-id="2592" instrument_node="">Meglitinides work by stimulating the release of insulin in diabetic patients. They stimulate the beta cells of the pancreas directly where insulin is produced.</span></p><span data-dcnode-id="2590" instrument_node="">
</span><p data-dcnode-id="2588"><span data-dcnode-id="2589" instrument_node="">The chances of interactions between CBD and Meglitinides are very low — but not nonexistent. The combined impact of these substances on reducing blood sugar through the effects of insulin could lead to hypoglycemia (low blood sugar).</span></p><span data-dcnode-id="2587" instrument_node="">
</span><p data-dcnode-id="2585"><span data-dcnode-id="2586" instrument_node="">Meglitinides are primarily metabolized by CYP2C8 and CYP3A4. CBD has only been shown to compete for the former but is unlikely to lead to significant issues with competitive liver metabolism with this class of drugs.</span></p><span data-dcnode-id="2584" instrument_node="">
</span><h4 data-dcnode-id="2582" id="h4-meglitinides-that-may-interact-with-cbd-5"><span data-dcnode-id="2583" instrument_node="">Meglitinides That May Interact With CBD</span></h4><span data-dcnode-id="2581" instrument_node="">
</span><ul data-dcnode-id="2572"><li data-dcnode-id="2577"><strong data-dcnode-id="2579"><span data-dcnode-id="2580" instrument_node="">Nateglinide</span></strong><span data-dcnode-id="2578" instrument_node=""> (Starlix)</span></li><li data-dcnode-id="2573"><strong data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">Repaglinide</span></strong><span data-dcnode-id="2574" instrument_node=""> (Prandin, Prandimet)</span></li></ul><span data-dcnode-id="2571" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2566"><figure class="aligncenter size-medium" data-dcnode-id="2567"><picture data-dcnode-id="2568"><source data-dcnode-id="2570" sizes="(max-width: 300px) 100vw, 300px" srcset="https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/starlix1-300x300.png.webp 300w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/starlix1-150x150.png.webp 150w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/starlix1-768x768.png.webp 768w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/starlix1-180x180.png.webp 180w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/starlix1-158x158.png.webp 158w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/starlix1-80x80.png.webp 80w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/starlix1-120x120.png.webp 120w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/starlix1-70x70.png.webp 70w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/starlix1-40x40.png.webp 40w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/starlix1-283x283.png.webp 283w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/starlix1-54x54.png.webp 54w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/starlix1-330x330.png.webp 330w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/starlix1-420x420.png.webp 420w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/starlix1-74x74.png.webp 74w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/starlix1-30x30.png.webp 30w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/starlix1.png.webp 800w" type="image/webp"><img alt="" class="wp-image-34414 webpexpress-processed" data-dcnode-id="2569" height="300" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2021/10/starlix1-300x300.png&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/starlix1-300x300.png 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/starlix1-150x150.png 150w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/starlix1-768x768.png 768w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/starlix1-180x180.png 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/starlix1-158x158.png 158w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/starlix1-80x80.png 80w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/starlix1-120x120.png 120w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/starlix1-70x70.png 70w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/starlix1-40x40.png 40w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/starlix1-283x283.png 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/starlix1-54x54.png 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/starlix1-330x330.png 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/starlix1-420x420.png 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/starlix1-74x74.png 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/starlix1-30x30.png 30w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/starlix1.png 800w" width="300"></picture></figure></div><span data-dcnode-id="2565" instrument_node="">
</span><h3 data-dcnode-id="2563" id="h3-sglt2-inhibitors-cbd-6"><span data-dcnode-id="2564" instrument_node="">SGLT-2 Inhibitors &amp; CBD</span></h3><span data-dcnode-id="2562" instrument_node="">
</span><ul data-dcnode-id="2553"><li data-dcnode-id="2558"><strong data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="2559" instrument_node=""> ↑↑↑ Increased Effect (Agonistic)</span></li><li data-dcnode-id="2554"><strong data-dcnode-id="2556"><span data-dcnode-id="2557" instrument_node="">Severity:</span></strong><span data-dcnode-id="2555" instrument_node=""> Mild</span></li></ul><span data-dcnode-id="2552" instrument_node="">
</span><p data-dcnode-id="2550"><span data-dcnode-id="2551" instrument_node="">SGLT-2 stands for sodium-glucose transporter — which is involved with the reabsorption of sugar through the kidneys. Blood is first filtered through the kidneys, which removes various metabolites and sugar. A lot of the removed sugar is then reabsorbed later through the SGLT-2 transporters.</span></p><span data-dcnode-id="2549" instrument_node="">
</span><p data-dcnode-id="2547"><span data-dcnode-id="2548" instrument_node="">These medications block that transporter to prevent sugar from re-entering the system — leading to an overall reduction in blood sugar levels.</span></p><span data-dcnode-id="2546" instrument_node="">
</span><p data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">CBD is unlikely to interact negatively with these medications but theoretically could cause blood sugar to drop too low — leading to hypoglycemia (low blood sugar).</span></p><span data-dcnode-id="2543" instrument_node="">
</span><h4 data-dcnode-id="2541" id="h4-sglt2-inhibitors-that-may-interact-with-cbd-6"><span data-dcnode-id="2542" instrument_node="">SGLT-2 Inhibitors That May Interact With CBD</span></h4><span data-dcnode-id="2540" instrument_node="">

.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/invokana-74x74.png.webp 74w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/invokana-30x30.png.webp 30w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/invokana.png.webp 800w" type="image/webp"><img alt="" class="wp-image-34391 webpexpress-processed" data-dcnode-id="2520" height="300" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2021/10/invokana-300x300.png&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/invokana-300x300.png 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/invokana-150x150.png 150w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/invokana-768x768.png 768w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/invokana-180x180.png 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/invokana-158x158.png 158w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/invokana-80x80.png 80w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/invokana-120x120.png 120w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/invokana-70x70.png 70w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/invokana-40x40.png 40w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/invokana-283x283.png 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/invokana-54x54.png 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/invokana-330x330.png 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/invokana-420x420.png 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/invokana-74x74.png 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/invokana-30x30.png 30w, https://dailycbd.com/ </span><h3 data-dcnode-id="2514" id="h3-sulfonylureas-cbd-7"><span data-dcnode-id="2515" instrument_node="">Sulfonylureas &amp; CBD</span></h3><span data-dcnode-id="2513" instrument_node="">
</span><ul data-dcnode-id="2504"><li data-dcnode-id="2509"><strong data-dcnode-id="2511"><span data-dcnode-id="2512" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="2510" instrument_node=""> ↑↑↑ Increased Effect (Agonistic)</span></li><li data-dcnode-id="2505"><strong data-dcnode-id="2507"><span data-dcnode-id="2508" instrument_node="">Severity:</span></strong><span data-dcnode-id="2506" instrument_node=""> Mild</span></li></ul><span data-dcnode-id="2503" instrument_node="">
</span><p data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">Sulfonylureas medications work similarly to meglitinides by stimulating the secretion of insulin from the pancreas.</span></p><span data-dcnode-id="2500" instrument_node="">
</span><p data-dcnode-id="2498"><span data-dcnode-id="2499" instrument_node="">CBD is unlikely to interact with these medications directly, but it’s possible for the combination to lead to a stronger impact on blood sugar control that could cause levels to dip too low.</span></p><span data-dcnode-id="2497" instrument_node="">
</span><p data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">Hypoglycemia can cause dizziness, poor coordination, mood changes, and fainting.</span></p><span data-dcnode-id="2494" instrument_node="">
</span><h4 data-dcnode-id="2492" id="h4-sulfonylureas-drugs-that-may-interact-with-cbd-7"><span data-dcnode-id="2493" instrument_node="">Sulfonylureas Drugs That May Interact With CBD</span></h4><span data-dcnode-id="2491" instrument_node="">
</span><ul data-dcnode-id="2466"><li data-dcnode-id="2487"><strong data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">Glimepiride</span></strong><span data-dcnode-id="2488" instrument_node=""> (Amaryl, Duetact, Avandaryl)</span></li><li data-dcnode-id="2483"><strong data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">Glipizide</span></strong><span data-dcnode-id="2484" instrument_node=""> (Glucotrol, Metaglip)</span></li><li data-dcnode-id="2479"><strong data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">Glyburide</span></strong><span data-dcnode-id="2480" instrument_node=""> (DiaBeta, Glynase, Micronase, Glucovance)</span></li><li data-dcnode-id="2475"><strong data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">Chlorpropamide</span></strong><span data-dcnode-id="2476" instrument_node=""> (Diabinese)</span></li><li data-dcnode-id="2471"><strong data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">Tolazamide</span></strong><span data-dcnode-id="2472" instrument_node=""> (Tolinase)</span></li><li data-dcnode-id="2467"><strong data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node="">Tolbutamide</span></strong><span data-dcnode-id="2468" instrument_node=""> (Orinase, Tol-Tab)</span></li></ul><span data-dcnode-id="2465" instrument_node="">

ebp 420w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/glucotrol1-74x74.png.webp 74w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/glucotrol1-30x30.png.webp 30w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/glucotrol1.png.webp 800w" type="image/webp"><img alt="" class="wp-image-34415 webpexpress-processed" data-dcnode-id="2463" height="300" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2021/10/glucotrol1-300x300.png&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/glucotrol1-300x300.png 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/glucotrol1-150x150.png 150w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/glucotrol1-768x768.png 768w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/glucotrol1-180x180.png 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/glucotrol1-158x158.png 158w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/glucotrol1-80x80.png 80w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/glucotrol1-120x120.png 120w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/glucotrol1-70x70.png 70w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/glucotrol1-40x40.png 40w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/glucotrol1-283x283.png 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/glucotrol1-54x54.png 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/glucotrol1-330x330.png 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/glucotrol1-420x420.png 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/glucotrol1-74x74.png 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/glucotrol1-30x30.png 30w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/glucotrol1.png 800w" width="300"></picture></figure></div><span data-dcnode-id="2459" instrument_node="">
</span><h3 data-dcnode-id="2457" id="h3-thiazolidinediones-cbd-8"><span data-dcnode-id="2458" instrument_node="">Thiazolidinediones &amp; CBD</span></h3><span data-dcnode-id="2456" instrument_node="">
</span><ul data-dcnode-id="2447"><li data-dcnode-id="2452"><strong data-dcnode-id="2454"><span data-dcnode-id="2455" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="2453" instrument_node=""> Unknown interaction (avoid)</span></li><li data-dcnode-id="2448"><strong data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">Severity:</span></strong><span data-dcnode-id="2449" instrument_node=""> Mild</span></li></ul><span data-dcnode-id="2446" instrument_node="">
</span><p data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">Thiazolidinediones are a class of medications that bind and activate a receptor called peroxisome proliferator-activated receptor-gamma, which is located in the fat cells. This medication increases the maturation of fat cells and increases the conversion of sugar into stored fat — thus reducing systemic blood sugar levels. Weight gain is the main side-effect of these medications.</span></p><span data-dcnode-id="2443" instrument_node="">
</span><p data-dcnode-id="2441"><span data-dcnode-id="2442" instrument_node="">There are no known interactions with CBD and thiazolidinedione medications, but in theory, the combination could lead to an excessive drop in blood sugar levels.</span></p><span data-dcnode-id="2440" instrument_node="">
</span><p data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">Additionally, CBD has been shown to interact with the deposition of fat, which could interfere with the ability of these medications to exert their effects. This could negate the effectiveness of these medications.</span></p><span data-dcnode-id="2437" instrument_node="">
</span><p data-dcnode-id="2433"><span data-dcnode-id="2436" instrument_node="">Until more research is done, </span><strong data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">it’s not recommended that you combine CBD and thiazolidinediones unless under the advice of your doctor.</span></strong></p><span data-dcnode-id="2432" instrument_node="">
</span><h4 data-dcnode-id="2430" id="h4-thiazolidinedione-drugs-that-may-interact-with-cbd-8"><span data-dcnode-id="2431" instrument_node="">Thiazolidinedione Drugs That May Interact With CBD</span></h4><span data-dcnode-id="2429" instrument_node="">
</span><ul data-dcnode-id="2420"><li data-dcnode-id="2425"><strong data-dcnode-id="2427"><span data-dcnode-id="2428" instrument_node="">Rosiglitazone</span></strong><span data-dcnode-id="2426" instrument_node=""> (Avandia, Avandaryl, Amaryl M)</span></li><li data-dcnode-id="2421"><strong data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">Pioglitazone</span></strong><span data-dcnode-id="2422" instrument_node=""> (Actos, Oseni, Duetact)</span></li></ul><span data-dcnode-id="2419" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2414"><figure class="aligncenter size-large" data-dcnode-id="2415"><picture data-dcnode-id="2416"><source data-dcnode-id="2418" sizes="(max-width: 612px) 100vw, 612px" srcset="https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-13.png.webp 612w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-13-300x200.png.webp 300w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-13-180x120.png.webp 180w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-13-283x189.png.webp 283w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-13-54x36.png.webp 54w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-13-330x220.png.webp 330w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-13-420x280.png.webp 420w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-13-74x49.png.webp 74w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-13-45x30.png.webp 45w" type="image/webp"><img alt="" class="wp-image-27496 webpexpress-processed" data-dcnode-id="2417" height="408" loading="lazy" sizes="(max-width: 612px) 100vw, 612px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-13.png&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-13.png 612w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-13-300x200.png 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-13-180x120.png 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-13-283x189.png 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-13-54x36.png 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-13-330x220.png 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-13-420x280.png 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-13-74x49.png 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-13-45x30.png 45w" width="612"></picture></figure></div><span data-dcnode-id="2413" instrument_node="">
</span><h3 data-dcnode-id="2411" id="h3-insulin-cbd-9"><span data-dcnode-id="2412" instrument_node="">Insulin &amp; CBD</span></h3><span data-dcnode-id="2410" instrument_node="">
</span><ul data-dcnode-id="2401"><li data-dcnode-id="2406"><strong data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="2407" instrument_node=""> ↑↑↑ Increased Effect (Agonistic)</span></li><li data-dcnode-id="2402"><strong data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">Severity:</span></strong><span data-dcnode-id="2403" instrument_node=""> Mild</span></li></ul><span data-dcnode-id="2400" instrument_node="">
</span><p data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">Insulin is the primary treatment for patients with type I diabetes (juvenile-onset diabetes). People with this type of diabetes can’t make their own insulin.</span></p><span data-dcnode-id="2397" instrument_node="">
</span><p data-dcnode-id="2395"><span data-dcnode-id="2396" instrument_node="">Studies have shown CBD can reduce insulin resistance and blood sugar levels — but there’s no indication CBD blocks the effects of insulin or forces blood sugar levels to drop unnaturally.</span></p><span data-dcnode-id="2394" instrument_node="">
</span><p data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">With that said, most experts are cautious about mixing CBD and insulin in fear of causing issues with hypoglycemia.</span></p><span data-dcnode-id="2391" instrument_node="">

</span></div><div class="p_wrap" data-dcnode-id="2297"><amp-position-observer data-dcnode-id="2349" intersection-ratios="0" layout="nodisplay" on="scroll:h2-cbd-erectile-dysfunction-ed-medications-12-offset.seekTo(percent=event.percent)"></amp-position-observer><h2 data-dcnode-id="2347" id="h2-cbd-erectile-dysfunction-ed-medications-12"><span data-dcnode-id="2348" instrument_node="">CBD &amp; Erectile Dysfunction (ED) Medications</span></h2><span data-dcnode-id="2346" instrument_node="">
</span><p data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">Most erectile dysfunction medications work the same way. They promote the dilation of small blood vessels that supply blood flow to the penis. By widening the arteries, it’s easier for a man to achieve an erection.</span></p><span data-dcnode-id="2343" instrument_node="">
</span><p data-dcnode-id="2341"><span data-dcnode-id="2342" instrument_node="">CBD is unlikely to interact with these medications but could interfere with metabolism by competing for the CYP3A4. This would lead to stronger effects from CBD as well as the ED medications. This could increase the risk of side effects from these medications, which include headaches, indigestion, diarrhea, or priapism.</span></p><span data-dcnode-id="2340" instrument_node="">
</span><p data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">If taking any of these medications, make sure you’re using a more conservative dose of CBD than you might otherwise.</span></p><span data-dcnode-id="2337" instrument_node="">
</span><h4 data-dcnode-id="2335" id="h4-erectile-dysfunction-medications-that-may-interact-with-cbd-1"><span data-dcnode-id="2336" instrument_node="">Erectile Dysfunction Medications That May Interact With CBD</span></h4><span data-dcnode-id="2334" instrument_node="">

</span></div><div class="p_wrap" data-dcnode-id="2249"><amp-position-observer data-dcnode-id="2296" intersection-ratios="0" layout="nodisplay" on="scroll:h2-cbd-5aris-13-offset.seekTo(percent=event.percent)"></amp-position-observer><h2 data-dcnode-id="2294" id="h2-cbd-5aris-13"><span data-dcnode-id="2295" instrument_node="">CBD &amp; 5-ARIs</span></h2><span data-dcnode-id="2293" instrument_node="">
</span><p data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">5-ARI stands for 5-alpha-reductase inhibitors. They’re a class of drugs that block testosterone’s conversion into dihydrotestosterone (DHT) by blocking the enzyme that performs the conversion.</span></p><span data-dcnode-id="2290" instrument_node="">
</span><p data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">When testosterone is converted to DHT with the help of an enzyme called 5-alpha-reductase, it’s thought to alter the hair follicle’s lifecycle — causing hair to become shorter, thinner, and eventually stop growing entirely. In the prostate, it’s linked with a condition called benign prostatic hyperplasia (BPH) — which is an increase in tissue leading to a larger size of the organ.</span></p><span data-dcnode-id="2287" instrument_node="">
</span><p data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">5-alpha-reductase inhibitors are common medications for treating both male pattern balding and BPH.</span></p><span data-dcnode-id="2284" instrument_node="">
</span><p data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">CBD may interfere with the metabolism of these drugs at the CYP3A4 enzymes — though the likelihood of experiencing negative side-effects with this combination is rare — they aren’t nonexistent. Interactions could include increased risk of side-effects of the drugs — such as increased breast size, skin rashes, and decreased libido.</span></p><span data-dcnode-id="2281" instrument_node="">
</span><h4 data-dcnode-id="2279" id="h4-5alphareductase-inhibitors-that-may-interact-with-cbd-1"><span data-dcnode-id="2280" instrument_node="">5-Alpha-Reductase Inhibitors That May Interact With CBD</span></h4><span data-dcnode-id="2278" instrument_node="">

ntent/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/avodart-74x74.png.webp 74w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/avodart-30x30.png.webp 30w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/avodart.png.webp 800w" type="image/webp"><img alt="" class="wp-image-34381 webpexpress-processed" data-dcnode-id="2254" height="300" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2021/10/avodart-300x300.png&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/avodart-300x300.png 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/avodart-150x150.png 150w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/avodart-768x768.png 768w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/avodart-180x180.png 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/avodart-158x158.png 158w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/avodart-80x80.png 80w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/avodart-120x120.png 120w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/avodart-70x70.png 70w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/avodart-40x40.png 40w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/avodart-283x283.png 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/avodart-54x54.png 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/avodart-330x330.png 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/avodart-420x420.png 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/avodart-74x74.png 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/avodart-30x30.png 30w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/avodart.png 800w" width="300"></picture></figure></div><span data-dcnode-id="2250" instrument_node="">
</span></div><div class="p_wrap" data-dcnode-id="2185"><amp-position-observer data-dcnode-id="2248" intersection-ratios="0" layout="nodisplay" on="scroll:h2-cbd-statin-drugs-14-offset.seekTo(percent=event.percent)"></amp-position-observer><h2 data-dcnode-id="2246" id="h2-cbd-statin-drugs-14"><span data-dcnode-id="2247" instrument_node="">CBD &amp; Statin Drugs</span></h2><span data-dcnode-id="2245" instrument_node="">
</span><ul data-dcnode-id="2236"><li data-dcnode-id="2241"><strong data-dcnode-id="2243"><span data-dcnode-id="2244" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="2242" instrument_node=""> Metabolic Competitor (CYP3A4)</span></li><li data-dcnode-id="2237"><strong data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">Severity:</span></strong><span data-dcnode-id="2238" instrument_node=""> Moderate</span></li></ul><span data-dcnode-id="2235" instrument_node="">
</span><p data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">Statin drugs are used to reduce the production of cholesterol by the liver. They work by blocking an enzyme called HMG-CoA reductase.</span></p><span data-dcnode-id="2232" instrument_node="">
</span><p data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">While CBD isn’t likely to interact with statin drugs directly and has a completely separate set of effects, there’s a strong potential for CBD to interfere with the metabolism of statins — most of which rely heavily on the CYP3A4 enzymes in the liver.</span></p><span data-dcnode-id="2229" instrument_node="">
</span><p data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">Taking CBD and statins together could lead to an increase in serum concentrations of the drug over time.</span></p><span data-dcnode-id="2226" instrument_node="">
</span><p data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">Always speak with your doctor before using CBD with your statin medications.</span></p><span data-dcnode-id="2223" instrument_node="">
</span><h4 data-dcnode-id="2221" id="h4-statin-drugs-that-may-interact-with-cbd-1"><span data-dcnode-id="2222" instrument_node="">Statin Drugs That May Interact With CBD</span></h4><span data-dcnode-id="2220" instrument_node="">
</span><ul data-dcnode-id="2193"><li data-dcnode-id="2215"><strong data-dcnode-id="2217"><a data-dcnode-id="2218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/atorvastatin/"><span data-dcnode-id="2219" instrument_node="">Atorvastatin</span></a></strong><span data-dcnode-id="2216" instrument_node=""> (Lipitor)</span></li><li data-dcnode-id="2210"><strong data-dcnode-id="2212"><a data-dcnode-id="2213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/lovastatin/"><span data-dcnode-id="2214" instrument_node="">Lovastatin</span></a></strong><span data-dcnode-id="2211" instrument_node=""> (Altoprev)</span></li><li data-dcnode-id="2206"><strong data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">Pitavastatin</span></strong><span data-dcnode-id="2207" instrument_node=""> (Livalo, Zypitamag)</span></li><li data-dcnode-id="2202"><strong data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">Pravastatin</span></strong><span data-dcnode-id="2203" instrument_node=""> (Pravachol)</span></li><li data-dcnode-id="2198"><strong data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">Rosuvastatin</span></strong><span data-dcnode-id="2199" instrument_node=""> (Crestor &amp; Ezalor)</span></li><li data-dcnode-id="2194"><strong data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">Simvastatin</span></strong><span data-dcnode-id="2195" instrument_node=""> (Zocor)</span></li></ul><span data-dcnode-id="2192" instrument_node="">

or1-283x260.png 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/lipitor1-54x50.png 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/lipitor1-330x303.png 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/lipitor1-420x386.png 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/lipitor1-74x68.png 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/lipitor1-33x30.png 33w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/lipitor1.png 521w" width="300"></picture></figure></div><span data-dcnode-id="2186" instrument_node="">
</span></div><div class="p_wrap" data-dcnode-id="2116"><amp-position-observer data-dcnode-id="2184" intersection-ratios="0" layout="nodisplay" on="scroll:h2-proton-pump-inhibitors-ppis-15-offset.seekTo(percent=event.percent)"></amp-position-observer><h2 data-dcnode-id="2182" id="h2-proton-pump-inhibitors-ppis-15"><span data-dcnode-id="2183" instrument_node="">Proton Pump Inhibitors (PPIs)</span></h2><span data-dcnode-id="2181" instrument_node="">
</span><ul data-dcnode-id="2172"><li data-dcnode-id="2177"><strong data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="2178" instrument_node=""> Metabolic Competitor (CYP2C19)</span></li><li data-dcnode-id="2173"><strong data-dcnode-id="2175"><span data-dcnode-id="2176" instrument_node="">Severity:</span></strong><span data-dcnode-id="2174" instrument_node=""> Mild</span></li></ul><span data-dcnode-id="2171" instrument_node="">
</span><p data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">Proton pump inhibitors (PPIs) are the most commonly prescribed class of medications for managing heartburn, gastroesophageal reflux disease (GERD), and other stomach-acid-related conditions. They work by blocking the parietal cells in the stomach that secrete stomach acid.</span></p><span data-dcnode-id="2168" instrument_node="">
</span><p data-dcnode-id="2163"><span data-dcnode-id="2167" instrument_node="">PPI medications are largely metabolized by the CYP2C19 liver enzymes [</span><a data-dcnode-id="2165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6678684/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2166" instrument_node="">9</span></a><span data-dcnode-id="2164" instrument_node="">], which is also one of the substrates used to metabolize CBD — though to a lesser extent. This could be a source of negative interaction with CBD.</span></p><span data-dcnode-id="2162" instrument_node="">
</span><p data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">The most likely negative interaction is a stronger impact of CBD due to slower metabolism.</span></p><span data-dcnode-id="2159" instrument_node="">
</span><p data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">Opt for a smaller dose of CBD if you’re using proton pump inhibitors.</span></p><span data-dcnode-id="2156" instrument_node="">
</span><h4 data-dcnode-id="2154" id="h4-ppis-that-may-interact-with-cbd-1"><span data-dcnode-id="2155" instrument_node="">PPIs That May Interact With CBD</span></h4><span data-dcnode-id="2153" instrument_node="">
</span><ul data-dcnode-id="2124"><li data-dcnode-id="2149"><strong data-dcnode-id="2151"><span data-dcnode-id="2152" instrument_node="">Pantoprazole</span></strong><span data-dcnode-id="2150" instrument_node=""> (Protonix)</span></li><li data-dcnode-id="2145"><strong data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">Ranitidine</span></strong><span data-dcnode-id="2146" instrument_node=""> (Zantac)</span></li><li data-dcnode-id="2141"><strong data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">Omeprazole</span></strong><span data-dcnode-id="2142" instrument_node=""> (Prilosec, Prilosec OTC, Zegerid)</span></li><li data-dcnode-id="2137"><strong data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">Lansoprazole</span></strong><span data-dcnode-id="2138" instrument_node=""> (Prevacid)</span></li><li data-dcnode-id="2133"><strong data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">Rabeprazole</span></strong><span data-dcnode-id="2134" instrument_node=""> (Aciphex)</span></li><li data-dcnode-id="2129"><strong data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">Esomeprazole</span></strong><span data-dcnode-id="2130" instrument_node=""> (Nexium)</span></li><li data-dcnode-id="2125"><strong data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">Dexlansoprazole</span></strong><span data-dcnode-id="2126" instrument_node=""> (Dexilant)</span></li></ul><span data-dcnode-id="2123" instrument_node="">

</span></div><div class="p_wrap" data-dcnode-id="2056"><amp-position-observer data-dcnode-id="2115" intersection-ratios="0" layout="nodisplay" on="scroll:h2-cbd-asthma-medications-16-offset.seekTo(percent=event.percent)"></amp-position-observer><h2 data-dcnode-id="2113" id="h2-cbd-asthma-medications-16"><span data-dcnode-id="2114" instrument_node="">CBD &amp; Asthma Medications</span></h2><span data-dcnode-id="2112" instrument_node="">
</span><ul data-dcnode-id="2103"><li data-dcnode-id="2108"><strong data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="2109" instrument_node=""> ↓↓↓ Decreased Effect (Antagonistic)</span></li><li data-dcnode-id="2104"><strong data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">Severity:</span></strong><span data-dcnode-id="2105" instrument_node=""> Mild</span></li></ul><span data-dcnode-id="2102" instrument_node="">
</span><p data-dcnode-id="2098"><a data-dcnode-id="2100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/best-cbd/asthma/"><span data-dcnode-id="2101" instrument_node="">Asthma</span></a><span data-dcnode-id="2099" instrument_node=""> is a chronic immune disorder affecting the lungs. When exposed to an allergen, the immune system causes the airways to close and secrete a thick mucous that can make it difficult to breathe. Asthma medications are centered around blocking the immune response and forcing the airways to open in order to allow more air to flow into the lungs.</span></p><span data-dcnode-id="2097" instrument_node="">
</span><p data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">CBD interacts strongly with one asthma medication in particular — known as theophylline. CBD may speed up theophylline’s excretion from the body, leading to reduced effectiveness.</span></p><span data-dcnode-id="2094" instrument_node="">
</span><p data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">Other interactions may occur with steroid-type medications, such as albuterol and ipratropium bromide. CBD relaxes the sympathetic nervous system, which may counteract the effects of these medications — which rely on the activation of the sympathetic nervous system to widen the airway and treat symptoms.</span></p><span data-dcnode-id="2091" instrument_node="">
</span><p data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">Inhalable forms of CBD should be avoided by anybody with a history of asthma — including vaporizers.</span></p><span data-dcnode-id="2088" instrument_node="">
</span><h4 data-dcnode-id="2086" id="h4-asthma-medications-that-may-interact-with-cbd-1"><span data-dcnode-id="2087" instrument_node="">Asthma Medications That May Interact With CBD</span></h4><span data-dcnode-id="2085" instrument_node="">
</span><ul data-dcnode-id="2064"><li data-dcnode-id="2081"><strong data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">Albuterol</span></strong><span data-dcnode-id="2082" instrument_node=""> (Accuneb, Salbutamol, Proair, Proventil &amp; Ventolin)</span></li><li data-dcnode-id="2077"><strong data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">Fluticasone</span></strong><span data-dcnode-id="2078" instrument_node=""> (Flonase, Flovent &amp; Cutivate)</span></li><li data-dcnode-id="2073"><strong data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">Montelukast</span></strong><span data-dcnode-id="2074" instrument_node=""> (Singulair)</span></li><li data-dcnode-id="2069"><strong data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">Ipratropium bromide</span></strong><span data-dcnode-id="2070" instrument_node=""> (Atrovent)</span></li><li data-dcnode-id="2065"><strong data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">Theophylline</span></strong><span data-dcnode-id="2066" instrument_node=""> (Theo 24, Theochron, Elixophyllin, aminophylline, Uniphyl)</span></li></ul><span data-dcnode-id="2063" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2058"><figure class="aligncenter size-medium" data-dcnode-id="2059"><picture data-dcnode-id="2060"><source data-dcnode-id="2062" sizes="(max-width: 300px) 100vw, 300px" srcset="https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ventolin1-300x300.png.webp 300w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ventolin1-150x150.png.webp 150w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ventolin1-768x768.png.webp 768w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ventolin1-180x180.png.webp 180w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ventolin1-158x158.png.webp 158w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ventolin1-80x80.png.webp 80w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ventolin1-120x120.png.webp 120w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ventolin1-70x70.png.webp 70w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ventolin1-40x40.png.webp 40w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ventolin1-283x283.png.webp 283w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ventolin1-54x54.png.webp 54w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ventolin1-330x330.png.webp 330w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ventolin1-420x420.png.webp 420w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ventolin1-74x74.png.webp 74w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ventolin1-30x30.png.webp 30w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ventolin1.png.webp 800w" type="image/webp"><img alt="" class="wp-image-34417 webpexpress-processed" data-dcnode-id="2061" height="300" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ventolin1-300x300.png&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ventolin1-300x300.png 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ventolin1-150x150.png 150w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ventolin1-768x768.png 768w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ventolin1-180x180.png 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ventolin1-158x158.png 158w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ventolin1-80x80.png 80w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ventolin1-120x120.png 120w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ventolin1-70x70.png 70w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ventolin1-40x40.png 40w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ventolin1-283x283.png 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ventolin1-54x54.png 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ventolin1-330x330.png 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ventolin1-420x420.png 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ventolin1-74x74.png 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ventolin1-30x30.png 30w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ventolin1.png 800w" width="300"></picture></figure></div><span data-dcnode-id="2057" instrument_node="">
</span></div><div class="p_wrap" data-dcnode-id="1997"><amp-position-observer data-dcnode-id="2055" intersection-ratios="0" layout="nodisplay" on="scroll:h2-cbd-antimicrobials-17-offset.seekTo(percent=event.percent)"></amp-position-observer><h2 data-dcnode-id="2053" id="h2-cbd-antimicrobials-17"><span data-dcnode-id="2054" instrument_node="">CBD &amp; Antimicrobials</span></h2><span data-dcnode-id="2052" instrument_node="">
</span><ul data-dcnode-id="2043"><li data-dcnode-id="2048"><strong data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="2049" instrument_node=""> Mixed (Increased or Decreased Effect)</span></li><li data-dcnode-id="2044"><strong data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node="">Severity:</span></strong><span data-dcnode-id="2045" instrument_node=""> Mild</span></li></ul><span data-dcnode-id="2042" instrument_node="">
</span><p data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">There are four main types of antimicrobials —&nbsp;antibacterials, antifungals, antivirals, and antiparasitics (includes anthelmintics, antiamoebics, and antiprotozoals).</span></p><span data-dcnode-id="2039" instrument_node="">
</span><p data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">There are so many different compounds that act as antimicrobials it’s difficult to group them all together as one. Each compound works differently, is metabolized differently, and produces different side effects.</span></p><span data-dcnode-id="2036" instrument_node="">
</span><p data-dcnode-id="2028"><span data-dcnode-id="2035" instrument_node="">Some studies suggest </span><a data-dcnode-id="2033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/best-cbd/antibiotic-resistance/"><span data-dcnode-id="2034" instrument_node="">CBD may make certain antibiotics more effective</span></a><span data-dcnode-id="2032" instrument_node=""> and may offer a promising solution to the issue of antibiotic resistance [</span><a data-dcnode-id="2030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-020-60952-0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2031" instrument_node="">6</span></a><span data-dcnode-id="2029" instrument_node="">].</span></p><span data-dcnode-id="2027" instrument_node="">
</span><p data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">But this isn’t the case with all antimicrobials. Some antimicrobials compete for the same enzymes in the liver. All antimicrobials are different, so make sure you speak with your doctor about whether or not CBD is safe to take alongside your prescription or not.</span></p><span data-dcnode-id="2024" instrument_node="">
</span><p data-dcnode-id="2021"><strong data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">Antimicrobials That Could Interact With CBD: </span></strong></p><span data-dcnode-id="2020" instrument_node="">
</span><ul data-dcnode-id="2005"><li data-dcnode-id="2014"><strong data-dcnode-id="2016"><a data-dcnode-id="2018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/ivermectin/"><span data-dcnode-id="2019" instrument_node="">Ivermectin</span></a><span data-dcnode-id="2017" instrument_node=""> </span></strong><span data-dcnode-id="2015" instrument_node="">(Stromectol, Soolantra)</span></li><li data-dcnode-id="2010"><strong data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">Clarithromycin</span></strong><span data-dcnode-id="2011" instrument_node=""> (Biaxin)</span></li><li data-dcnode-id="2006"><strong data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">Metronidazole</span></strong><span data-dcnode-id="2007" instrument_node=""> (Flagyl)</span></li></ul><span data-dcnode-id="2004" instrument_node="">

</span><ul data-dcnode-id="1984"><li data-dcnode-id="1989"><strong data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="1990" instrument_node=""> ↑↑↑ Increased Effect (Agonistic)</span></li><li data-dcnode-id="1985"><strong data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">Severity:</span></strong><span data-dcnode-id="1986" instrument_node=""> Mild-Moderate</span></li></ul><span data-dcnode-id="1983" instrument_node="">
</span><p data-dcnode-id="1979"><a data-dcnode-id="1981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/best-cbd/nausea/"><span data-dcnode-id="1982" instrument_node="">CBD itself is a powerful antiemetic</span></a><span data-dcnode-id="1980" instrument_node="">, which could make it synergistic with other antiemetic medications — making the effects of both substances more effective. </span></p><span data-dcnode-id="1978" instrument_node="">
</span><p data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">However, there’s also a potential for negative interaction through other mechanisms. CBD could slow the metabolism of anti-emetic drugs, which could lead to toxic buildup if the medication is used on a daily basis. </span></p><span data-dcnode-id="1975" instrument_node="">
</span><p data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">Some anti-emetics work through the serotonergic system — so if they aren’t cleared from the body as expected, it could lead to a dangerous condition called serotonin syndrome.</span></p><span data-dcnode-id="1972" instrument_node="">

</span><ul data-dcnode-id="1913"><li data-dcnode-id="1918"><strong data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="1919" instrument_node=""> ↑↑↑ Increased Effect (Agonistic)</span></li><li data-dcnode-id="1914"><strong data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">Severity:</span></strong><span data-dcnode-id="1915" instrument_node=""> Mild</span></li></ul><span data-dcnode-id="1912" instrument_node="">
</span><p data-dcnode-id="1908"><a data-dcnode-id="1910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/alcohol-interactions/"><span data-dcnode-id="1911" instrument_node="">CBD has only a minor interaction with alcohol.</span></a><span data-dcnode-id="1909" instrument_node=""> Both substances have sedative and hypotensive actions. Taking them together can make these side effects more pronounced.</span></p><span data-dcnode-id="1907" instrument_node="">
</span><p data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">It’s rare for people to experience anything more than mild interactions with these two substances, but in some cases, the impact can be severe — leading to dizziness, loss of coordination, fainting, or lethargy and malaise.</span></p><span data-dcnode-id="1904" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1899"><figure class="aligncenter size-large" data-dcnode-id="1900"><picture data-dcnode-id="1901"><source data-dcnode-id="1903" sizes="(max-width: 942px) 100vw, 942px" srcset="https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-alcohol.png.webp 942w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-alcohol-300x84.png.webp 300w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-alcohol-768x216.png.webp 768w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-alcohol-180x51.png.webp 180w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-alcohol-283x80.png.webp 283w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-alcohol-54x15.png.webp 54w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-alcohol-330x93.png.webp 330w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-alcohol-420x118.png.webp 420w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-alcohol-74x21.png.webp 74w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-alcohol-107x30.png.webp 107w" type="image/webp"><img alt="" class="wp-image-27468 webpexpress-processed" data-dcnode-id="1902" height="265" loading="lazy" sizes="(max-width: 942px) 100vw, 942px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-alcohol.png&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-alcohol.png 942w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-alcohol-300x84.png 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-alcohol-768x216.png 768w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-alcohol-180x51.png 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-alcohol-283x80.png 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-alcohol-54x15.png 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-alcohol-330x93.png 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-alcohol-420x118.png 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-alcohol-74x21.png 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-alcohol-107x30.png 107w" width="942"></picture></figure></div><span data-dcnode-id="1898" instrument_node="">
</span></div><div class="p_wrap" data-dcnode-id="1875"><amp-position-observer data-dcnode-id="1896" intersection-ratios="0" layout="nodisplay" on="scroll:h2-summary-will-cbd-interact-with-my-medication-20-offset.seekTo(percent=event.percent)"></amp-position-observer><h2 data-dcnode-id="1894" id="h2-summary-will-cbd-interact-with-my-medication-20"><span data-dcnode-id="1895" instrument_node="">Summary: Will CBD Interact With My Medication?</span></h2><span data-dcnode-id="1893" instrument_node="">
</span><p data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">CBD is a very safe health supplement overall. It rarely produces anything more than mild side effects and has a low potential to interact with most drugs or other health supplements.</span></p><span data-dcnode-id="1890" instrument_node="">
</span><p data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">With that said, negative drug interactions are still possible.</span></p><span data-dcnode-id="1887" instrument_node="">
</span><p data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">There are three ways CBD can interact with other medications —&nbsp;it can increase the effects or side-effects of other drugs by having the same effect. It can negate the effects of a drug or substance by exerting opposite effects. Or it can interfere with the metabolism of certain drugs in the liver&nbsp;— causing concentrations of the drug to increase.</span></p><span data-dcnode-id="1884" instrument_node="">
</span><p data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">The most concerning drugs to be aware of when using CBD are benzodiazepines, barbiturates, immunosuppressants, or drugs used to reduce blood pressure.</span></p><span data-dcnode-id="1881" instrument_node="">
</span><p data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">If you’re taking any prescription medications, it’s a good idea to speak with your doctor about using CBD first. If you use CBD, start with a very low dose at first and only increase once you know how your body responds. If taking medications long-term, it’s also a good idea to take periodic breaks away from CBD every few days.</span></p><span data-dcnode-id="1878" instrument_node="">
