</span></div><div class="p_wrap" data-dcnode-id="4601"><amp-position-observer data-dcnode-id="4794" intersection-ratios="0" layout="nodisplay" on="scroll:h2-there-are-three-ways-cbd-can-interact-with-other-drugs-3-offset.seekTo(percent=event.percent)"></amp-position-observer><h2 data-dcnode-id="4792" id="h2-there-are-three-ways-cbd-can-interact-with-other-drugs-3"><span data-dcnode-id="4793" instrument_node="">There Are Three Ways CBD Can Interact With Other Drugs</span></h2><span data-dcnode-id="4791" instrument_node="">
</span><p data-dcnode-id="4788"><strong data-dcnode-id="4789"><span data-dcnode-id="4790" instrument_node="">Medications will usually fall into one or more of the following categories: </span></strong></p><span data-dcnode-id="4787" instrument_node="">
</span><ol data-dcnode-id="4774"><li data-dcnode-id="4783"><strong data-dcnode-id="4785"><span data-dcnode-id="4786" instrument_node="">Increased effect —</span></strong><span data-dcnode-id="4784" instrument_node=""> CBD makes the effects of the medication stronger.</span></li><li data-dcnode-id="4779"><strong data-dcnode-id="4781"><span data-dcnode-id="4782" instrument_node="">Decreased effect —</span></strong><span data-dcnode-id="4780" instrument_node="">&nbsp;CBD makes the effects of the medication weaker.</span></li><li data-dcnode-id="4775"><strong data-dcnode-id="4777"><span data-dcnode-id="4778" instrument_node="">Slowed metabolism —</span></strong><span data-dcnode-id="4776" instrument_node="">&nbsp;CBD interferes with the body’s ability to metabolize the medication efficiently.</span></li></ol><span data-dcnode-id="4773" instrument_node="">
</span><p data-dcnode-id="4771"><span data-dcnode-id="4772" instrument_node="">Depending on the type of push CBD has on a given medication, it could cause side effects to occur more easily; or it could stop the drug from being able to do its job. </span></p><span data-dcnode-id="4770" instrument_node="">
</span><p data-dcnode-id="4766"><strong data-dcnode-id="4768"><span data-dcnode-id="4769" instrument_node="">While most drugs don’t appear to have any significant adverse reaction with CBD, it’s best to err on the side of caution</span></strong><span data-dcnode-id="4767" instrument_node="">. </span></p><span data-dcnode-id="4765" instrument_node="">
</span><p data-dcnode-id="4763"><span data-dcnode-id="4764" instrument_node="">Side effects are always possible. </span></p><span data-dcnode-id="4762" instrument_node="">
</span><h3 data-dcnode-id="4760" id="h3-1-increased-chance-of-side-effects-or-drug-potency-agonistic-interaction-1"><span data-dcnode-id="4761" instrument_node="">1. Increased Chance of Side Effects or Drug Potency (Agonistic Interaction ↑↑↑)</span></h3><span data-dcnode-id="4759" instrument_node="">
</span><p data-dcnode-id="4757"><span data-dcnode-id="4758" instrument_node="">An agonistic interaction between two substances occurs when both substances have the same effect on the body. Together, both substances push on the same receptors or force a certain effect in the same direction.</span></p><span data-dcnode-id="4756" instrument_node="">
</span><p data-dcnode-id="4754"><span data-dcnode-id="4755" instrument_node="">A good example of this is CBD and blood pressure-lowering drugs. Both substances exert a force on the vascular system to reduce the pressure of the arteries. When both substances are used together, the force may be too strong — leading to low blood pressure that can cause side effects like dizziness or fainting.</span></p><span data-dcnode-id="4753" instrument_node="">
</span><h3 data-dcnode-id="4751" id="h3-2-decreased-drug-effect-antagonistic-interaction-2"><span data-dcnode-id="4752" instrument_node="">2. Decreased Drug Effect (Antagonistic Interaction ↓↓↓)</span></h3><span data-dcnode-id="4750" instrument_node="">
</span><p data-dcnode-id="4748"><span data-dcnode-id="4749" instrument_node="">An antagonistic interaction is the opposite of an agonistic interaction. This happens when two substances have opposite effects from each other. One might put a positive force on a bodily function, while the other negates this effect by pushing in the opposite direction.</span></p><span data-dcnode-id="4747" instrument_node="">
</span><p data-dcnode-id="4745"><span data-dcnode-id="4746" instrument_node="">Most of the negative effects of this interaction result from the absence of effects. You may be using a medication to treat something, but the effects of CBD negate these effects and make the medicine less effective. The symptoms you experience as a result come from the medication no longer working and your symptoms coming back.</span></p><span data-dcnode-id="4744" instrument_node="">
</span><p data-dcnode-id="4742"><span data-dcnode-id="4743" instrument_node="">An example of this is the interaction between CBD and stimulants.</span></p><span data-dcnode-id="4741" instrument_node="">
</span><p data-dcnode-id="4739"><span data-dcnode-id="4740" instrument_node="">CBD is a relaxant, causing neurological activity to decrease, which works in direct opposition to stimulants, which increase neurological activity. If you’re using stimulants to treat attention deficit disorders, CBD can negate this effect — causing you to feel the effects of your disorder more strongly.</span></p><span data-dcnode-id="4738" instrument_node="">
</span><h3 data-dcnode-id="4736" id="h3-3-slowed-metabolism-metabolic-competition-3"><span data-dcnode-id="4737" instrument_node="">3. Slowed Metabolism (Metabolic Competition)</span></h3><span data-dcnode-id="4735" instrument_node="">
</span><p data-dcnode-id="4733"><span data-dcnode-id="4734" instrument_node="">This is the most common interaction CBD has with other medications.</span></p><span data-dcnode-id="4732" instrument_node="">
</span><p data-dcnode-id="4730"><span data-dcnode-id="4731" instrument_node="">Virtually every substance you take is eventually metabolized by the liver. Compounds are absorbed into the bloodstream, where they float around the body to exert their effects. Eventually, they’re filtered through the liver. A specialized set of enzymes is tasked with disassembling the compound into a smaller form.</span></p><span data-dcnode-id="4729" instrument_node="">
</span><p data-dcnode-id="4727"><span data-dcnode-id="4728" instrument_node="">The resulting metabolites are then filtered out of the body by the kidneys.</span></p><span data-dcnode-id="4726" instrument_node="">
</span><p data-dcnode-id="4724"><span data-dcnode-id="4725" instrument_node="">There are dozens of enzymes in the liver, each one designed to disassemble a specific type of molecule. Most drugs require several of these enzymes to be broken down completely —&nbsp;including CBD.</span></p><span data-dcnode-id="4723" instrument_node="">
</span><p data-dcnode-id="4721"><span data-dcnode-id="4722" instrument_node="">If two or more compounds require the same enzymes to break down, they can end up competing for each other. This can slow the rate of metabolism for each compound — leading to a longer duration of effects and a buildup of each compound in the body.</span></p><span data-dcnode-id="4720" instrument_node="">
</span><p data-dcnode-id="4718"><span data-dcnode-id="4719" instrument_node="">Picture it like this. When you go to the food court at your local mall, there are many different places to order food. But you may have a preference for a certain type of food. If many other people in the mall prefer the same food, there will be a lineup for that stall, even if all the other nearby restaurants have no lines.</span></p><span data-dcnode-id="4717" instrument_node="">
</span><h4 data-dcnode-id="4715" id="h4-cbd-is-metabolized-by-the-following-liver-enzymes-1"><span data-dcnode-id="4716" instrument_node="">CBD is metabolized by the following liver enzymes:</span></h4><span data-dcnode-id="4714" instrument_node="">
</span><div class="t-old" data-dcnode-id="4662"><figure class="wp-block-table" data-dcnode-id="4663"><table data-dcnode-id="4664"><tbody data-dcnode-id="4665"><tr data-dcnode-id="4704"><td data-dcnode-id="4711"><strong data-dcnode-id="4712"><span data-dcnode-id="4713" instrument_node="">CYP Enzyme Group</span></strong></td><td data-dcnode-id="4708"><strong data-dcnode-id="4709"><span data-dcnode-id="4710" instrument_node="">IC50</span></strong></td><td data-dcnode-id="4705"><strong data-dcnode-id="4706"><span data-dcnode-id="4707" instrument_node="">Inhibition Potency</span></strong></td></tr><tr data-dcnode-id="4693"><td data-dcnode-id="4701"><strong data-dcnode-id="4702"><span data-dcnode-id="4703" instrument_node="">CYP2C19</span></strong></td><td data-dcnode-id="4696"><span data-dcnode-id="4700" instrument_node="">2.51 μΜ [</span><a data-dcnode-id="4698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S1347436715304225" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="4699" instrument_node="">13</span></a><span data-dcnode-id="4697" instrument_node="">]</span></td><td data-dcnode-id="4694"><span data-dcnode-id="4695" instrument_node="">Moderate</span></td></tr><tr data-dcnode-id="4682"><td data-dcnode-id="4690"><strong data-dcnode-id="4691"><span data-dcnode-id="4692" instrument_node="">CYP2D6</span></strong></td><td data-dcnode-id="4685"><span data-dcnode-id="4689" instrument_node="">6.52 μM [</span><a data-dcnode-id="4687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/21356216/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="4688" instrument_node="">12</span></a><span data-dcnode-id="4686" instrument_node="">]</span></td><td data-dcnode-id="4683"><span data-dcnode-id="4684" instrument_node="">Moderate</span></td></tr><tr data-dcnode-id="4674"><td data-dcnode-id="4679"><strong data-dcnode-id="4680"><span data-dcnode-id="4681" instrument_node="">CYP3A4</span></strong></td><td data-dcnode-id="4677"><span data-dcnode-id="4678" instrument_node="">11.7 μM [10]</span></td><td data-dcnode-id="4675"><span data-dcnode-id="4676" instrument_node="">Weak</span></td></tr><tr data-dcnode-id="4666"><td data-dcnode-id="4671"><strong data-dcnode-id="4672"><span data-dcnode-id="4673" instrument_node="">CYP3A5</span></strong></td><td data-dcnode-id="4669"><span data-dcnode-id="4670" instrument_node="">1.65 μM [10]</span></td><td data-dcnode-id="4667"><span data-dcnode-id="4668" instrument_node="">Moderate</span></td></tr></tbody></table></figure></div><span data-dcnode-id="4661" instrument_node="">
</span><p data-dcnode-id="4658"><strong data-dcnode-id="4659"><span data-dcnode-id="4660" instrument_node="">Other Minor CYP450 Pathways for CBD: </span></strong></p><span data-dcnode-id="4657" instrument_node="">
</span><ul data-dcnode-id="4648"><li data-dcnode-id="4655"><span data-dcnode-id="4656" instrument_node="">CYP1A1</span></li><li data-dcnode-id="4653"><span data-dcnode-id="4654" instrument_node="">CYP1A2</span></li><li data-dcnode-id="4651"><span data-dcnode-id="4652" instrument_node="">CYP1A22</span></li><li data-dcnode-id="4649"><span data-dcnode-id="4650" instrument_node="">CYP1B1</span></li></ul><span data-dcnode-id="4647" instrument_node="">
</span><h4 data-dcnode-id="4645" id="h4-cbd-has-a-relatively-low-ic50-value-for-cyp450-enzymes-2"><span data-dcnode-id="4646" instrument_node="">CBD Has A Relatively Low IC50 Value For CYP450 Enzymes</span></h4><span data-dcnode-id="4644" instrument_node="">
</span><p data-dcnode-id="4642"><span data-dcnode-id="4643" instrument_node="">The IC50 value is used to measure the amount of a certain compound needed to inhibit 50% of its target CYP450 enzymes. </span></p><span data-dcnode-id="4641" instrument_node="">
</span><p data-dcnode-id="4630"><span data-dcnode-id="4640" instrument_node="">The main enzyme group responsible for metabolizing CBD is CYP2D6 and CYP3A4. The IC50 value of CBD for inhibiting 2D6 was 6.52 μM [</span><a data-dcnode-id="4638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/21356216/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="4639" instrument_node="">12</span></a><span data-dcnode-id="4637" instrument_node="">], and the IC50 for the 3A4 enzymes is 11.7 μM [</span><a data-dcnode-id="4635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/21356216/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="4636" instrument_node="">10</span></a><span data-dcnode-id="4634" instrument_node="">]. The smaller the number, the stronger the inhibitory action. For example, a strong CYP3A4 inhibitor, ketoconazole, has an IC50 value of 0.047 [</span><a data-dcnode-id="4632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.rsc.org/en/content/articlepdf/2018/ra/c8ra06311g" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="4633" instrument_node="">11</span></a><span data-dcnode-id="4631" instrument_node="">]—&nbsp;which is several orders of magnitude stronger than CBD.</span></p><span data-dcnode-id="4629" instrument_node="">
</span><p data-dcnode-id="4627"><span data-dcnode-id="4628" instrument_node="">What this means is that CBD is unlikely to interact with other medications that require the same metabolic pathways unless either a very high dose of both substances are used, or the other medication has a very strong inhibitory effect (IC50 value less than 1 µM). </span></p><span data-dcnode-id="4626" instrument_node="">
</span><p data-dcnode-id="4623"><strong data-dcnode-id="4624"><span data-dcnode-id="4625" instrument_node="">Interpreting IC50 Values: </span></strong></p><span data-dcnode-id="4622" instrument_node="">
</span><ul data-dcnode-id="4609"><li data-dcnode-id="4618"><strong data-dcnode-id="4620"><span data-dcnode-id="4621" instrument_node="">Potent Inhibition = </span></strong><span data-dcnode-id="4619" instrument_node="">IC50 less than 1 µM</span></li><li data-dcnode-id="4614"><strong data-dcnode-id="4616"><span data-dcnode-id="4617" instrument_node="">Moderate inhibition =</span></strong><span data-dcnode-id="4615" instrument_node=""> IC50 between 1 and 10 µM</span></li><li data-dcnode-id="4610"><strong data-dcnode-id="4612"><span data-dcnode-id="4613" instrument_node="">Weak inhibition =</span></strong><span data-dcnode-id="4611" instrument_node=""> IC50 greater than 10 µM</span></li></ul><span data-dcnode-id="4608" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="4603"><figure class="aligncenter size-large" data-dcnode-id="4604"><picture data-dcnode-id="4605"><source data-dcnode-id="4607" sizes="(max-width: 612px) 100vw, 612px" srcset="https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-8.png.webp 612w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-8-300x200.png.webp 300w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-8-180x120.png.webp 180w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-8-283x189.png.webp 283w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-8-54x36.png.webp 54w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-8-330x220.png.webp 330w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-8-420x280.png.webp 420w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-8-74x49.png.webp 74w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/01/cbd-medications-8-45x30.png.webp 45w" type="image/webp"><img alt="" class="wp-image-27476 webpexpress-processed" data-dcnode-id="4606" height="408" loading="lazy" sizes="(max-width: 612px) 100vw, 612px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-8.png&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-8.png 612w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-8-300x200.png 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-8-180x120.png 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-8-283x189.png 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-8-54x36.png 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-8-330x220.png 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-8-420x280.png 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-8-74x49.png 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/01/cbd-medications-8-45x30.png 45w" width="612"></picture></figure></div><span data-dcnode-id="4602" instrument_node="">
</span></div><div class="p_wrap" data-dcnode-id="4078"><amp-position-observer data-dcnode-id="4600" intersection-ratios="0" layout="nodisplay" on="scroll:h2-cbd-blood-pressure-medications-4-offset.seekTo(percent=event.percent)"></amp-position-observer><h2 data-dcnode-id="4598" id="h2-cbd-blood-pressure-medications-4"><span data-dcnode-id="4599" instrument_node="">CBD &amp; Blood Pressure Medications</span></h2><span data-dcnode-id="4597" instrument_node="">
</span><p data-dcnode-id="4592"><span data-dcnode-id="4596" instrument_node="">CBD is unlikely to have any major negative interactions with this class of medication in general, but there’s always a chance of interaction due to the similarities in their effects. </span><a data-dcnode-id="4594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/best-cbd/hypertension/"><span data-dcnode-id="4595" instrument_node="">CBD has blood-pressure-reducing effects</span></a><span data-dcnode-id="4593" instrument_node=""> on its own, which could cause blood pressure to decrease even further when used in combination with prescription antihypertensives.</span></p><span data-dcnode-id="4591" instrument_node="">
</span><p data-dcnode-id="4589"><span data-dcnode-id="4590" instrument_node="">We only want blood pressure to drop until it’s within the healthy range (120/80). If it drops too low, there may not be enough pressure to pump blood against gravity into the brain. When we’re unable to push blood efficiently into the brain, we may become dizzy or lightheaded. In severe cases, it can cause us to faint.</span></p><span data-dcnode-id="4588" instrument_node="">
</span><h3 data-dcnode-id="4586" id="h3-ace-inhibitors-cbd-1"><span data-dcnode-id="4587" instrument_node="">ACE Inhibitors &amp; CBD</span></h3><span data-dcnode-id="4585" instrument_node="">
</span><ul data-dcnode-id="4576"><li data-dcnode-id="4581"><strong data-dcnode-id="4583"><span data-dcnode-id="4584" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="4582" instrument_node=""> ↑↑↑ Increased Effect (Agonistic)</span></li><li data-dcnode-id="4577"><strong data-dcnode-id="4579"><span data-dcnode-id="4580" instrument_node="">Severity:</span></strong><span data-dcnode-id="4578" instrument_node=""> Moderate</span></li></ul><span data-dcnode-id="4575" instrument_node="">
</span><p data-dcnode-id="4573"><span data-dcnode-id="4574" instrument_node="">ACE stands for angiotensin-converting enzyme. It’s responsible for converting angiotensin I into angiotensin II — a powerful vasoconstrictor (tightens the arteries and increases blood pressure).</span></p><span data-dcnode-id="4572" instrument_node="">
</span><p data-dcnode-id="4570"><span data-dcnode-id="4571" instrument_node="">ACE inhibitors block this enzyme to prevent the tightening of the arteries. They’re used to combat high blood pressure.</span></p><span data-dcnode-id="4569" instrument_node="">
</span><p data-dcnode-id="4567"><span data-dcnode-id="4568" instrument_node="">CBD is unlikely to directly interact with ACE inhibitors but may increase its effects. In some cases, blood pressure may drop too low — causing side effects such as dizziness or fainting.</span></p><span data-dcnode-id="4566" instrument_node="">
</span><h4 data-dcnode-id="4564" id="h4-ace-inhibitors-that-may-interact-with-cbd-1"><span data-dcnode-id="4565" instrument_node="">ACE Inhibitors That May Interact With CBD</span></h4><span data-dcnode-id="4563" instrument_node="">
</span><ul data-dcnode-id="4511"><li data-dcnode-id="4558"><strong data-dcnode-id="4560"><a data-dcnode-id="4561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/benazepril/"><span data-dcnode-id="4562" instrument_node="">Benazepril hydrochloride</span></a></strong><span data-dcnode-id="4559" instrument_node=""> (Lotensin)</span></li><li data-dcnode-id="4553"><strong data-dcnode-id="4555"><a data-dcnode-id="4556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/captopril/"><span data-dcnode-id="4557" instrument_node="">Captopril</span></a></strong><span data-dcnode-id="4554" instrument_node=""> (Capoten)</span></li><li data-dcnode-id="4545"><a data-dcnode-id="4547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/enalapril/"><strong data-dcnode-id="4551"><span data-dcnode-id="4552" instrument_node="">Enalapril</span></strong><span data-dcnode-id="4550" instrument_node=""> </span><strong data-dcnode-id="4548"><span data-dcnode-id="4549" instrument_node="">maleate</span></strong></a><span data-dcnode-id="4546" instrument_node=""> (Vasotec)</span></li><li data-dcnode-id="4537"><a data-dcnode-id="4539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/fosinopril/"><strong data-dcnode-id="4543"><span data-dcnode-id="4544" instrument_node="">Fosinopril</span></strong><span data-dcnode-id="4542" instrument_node=""> </span><strong data-dcnode-id="4540"><span data-dcnode-id="4541" instrument_node="">sodium</span></strong></a><span data-dcnode-id="4538" instrument_node=""> (Monopril)</span></li><li data-dcnode-id="4532"><strong data-dcnode-id="4534"><a data-dcnode-id="4535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/lisinopril/"><span data-dcnode-id="4536" instrument_node="">Lisinopril</span></a></strong><span data-dcnode-id="4533" instrument_node=""> (Prinivel &amp; Zestril)</span></li><li data-dcnode-id="4528"><strong data-dcnode-id="4530"><span data-dcnode-id="4531" instrument_node="">Moexipril</span></strong><span data-dcnode-id="4529" instrument_node=""> (Univasc)</span></li><li data-dcnode-id="4524"><strong data-dcnode-id="4526"><span data-dcnode-id="4527" instrument_node="">Perindopril</span></strong><span data-dcnode-id="4525" instrument_node=""> (Aceon)</span></li><li data-dcnode-id="4520"><strong data-dcnode-id="4522"><span data-dcnode-id="4523" instrument_node="">Quinapril Hydrochloride</span></strong><span data-dcnode-id="4521" instrument_node=""> (Accupril)</span></li><li data-dcnode-id="4516"><strong data-dcnode-id="4518"><span data-dcnode-id="4519" instrument_node="">Ramipril</span></strong><span data-dcnode-id="4517" instrument_node=""> (Altace)</span></li><li data-dcnode-id="4512"><strong data-dcnode-id="4514"><span data-dcnode-id="4515" instrument_node="">Trandolapril</span></strong><span data-dcnode-id="4513" instrument_node=""> (Mavik)</span></li></ul><span data-dcnode-id="4510" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="4505"><figure class="aligncenter size-medium" data-dcnode-id="4506"><picture data-dcnode-id="4507"><source data-dcnode-id="4509" sizes="(max-width: 300px) 100vw, 300px" srcset="https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/lotensin-300x300.png.webp 300w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/lotensin-150x150.png.webp 150w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/lotensin-768x768.png.webp 768w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/lotensin-180x180.png.webp 180w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/lotensin-158x158.png.webp 158w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/lotensin-80x80.png.webp 80w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/lotensin-120x120.png.webp 120w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/lotensin-70x70.png.webp 70w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/lotensin-40x40.png.webp 40w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/lotensin-283x283.png.webp 283w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/lotensin-54x54.png.webp 54w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/lotensin-330x330.png.webp 330w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/lotensin-420x420.png.webp 420w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/lotensin-74x74.png.webp 74w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/lotensin-30x30.png.webp 30w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/lotensin.png.webp 800w" type="image/webp"><img alt="" class="wp-image-34395 webpexpress-processed" data-dcnode-id="4508" height="300" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2021/10/lotensin-300x300.png&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/lotensin-300x300.png 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/lotensin-150x150.png 150w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/lotensin-768x768.png 768w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/lotensin-180x180.png 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/lotensin-158x158.png 158w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/lotensin-80x80.png 80w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/lotensin-120x120.png 120w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/lotensin-70x70.png 70w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/lotensin-40x40.png 40w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/lotensin-283x283.png 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/lotensin-54x54.png 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/lotensin-330x330.png 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/lotensin-420x420.png 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/lotensin-74x74.png 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/lotensin-30x30.png 30w, https://dailycbd.com/ </span><h3 data-dcnode-id="4502" id="h3-alphablockers-cbd-2"><span data-dcnode-id="4503" instrument_node="">Alpha-Blockers &amp; CBD</span></h3><span data-dcnode-id="4501" instrument_node="">
</span><ul data-dcnode-id="4492"><li data-dcnode-id="4497"><strong data-dcnode-id="4499"><span data-dcnode-id="4500" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="4498" instrument_node=""> ↑↑↑ Increased Effect (Agonistic)</span></li><li data-dcnode-id="4493"><strong data-dcnode-id="4495"><span data-dcnode-id="4496" instrument_node="">Severity:</span></strong><span data-dcnode-id="4494" instrument_node=""> Moderate</span></li></ul><span data-dcnode-id="4491" instrument_node="">
</span><p data-dcnode-id="4489"><span data-dcnode-id="4490" instrument_node="">The alpha-adrenergic receptors are located throughout the arterial system. When these receptors become active, the smooth muscles in the arteries contract — narrowing the arteries to increase blood pressure. This is one of the main responses of the body when we’re stressed.</span></p><span data-dcnode-id="4488" instrument_node="">
</span><p data-dcnode-id="4486"><span data-dcnode-id="4487" instrument_node="">Alpha-blockers inhibit the adrenergic receptors in the arteries and prevent high blood pressure caused by these receptors.</span></p><span data-dcnode-id="4485" instrument_node="">
</span><p data-dcnode-id="4483"><span data-dcnode-id="4484" instrument_node="">CBD may further decrease blood pressure and lead to hypotension — especially in the evenings or while the user is feeling particularly relaxed. Interactions are rare, but it may be necessary to reduce the dose of CBD while using alpha-blocker medications.</span></p><span data-dcnode-id="4482" instrument_node="">
</span><h4 data-dcnode-id="4480" id="h4-alphablockers-that-may-interact-with-cbd-2"><span data-dcnode-id="4481" instrument_node="">Alpha-Blockers That May Interact With CBD</span></h4><span data-dcnode-id="4479" instrument_node="">
</span><ul data-dcnode-id="4461"><li data-dcnode-id="4474"><strong data-dcnode-id="4476"><a data-dcnode-id="4477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/carvedilol/"><span data-dcnode-id="4478" instrument_node="">Carvedilol</span></a></strong><span data-dcnode-id="4475" instrument_node=""> (Coreg)</span></li><li data-dcnode-id="4470"><strong data-dcnode-id="4472"><span data-dcnode-id="4473" instrument_node="">Doxazosin Mesylate</span></strong><span data-dcnode-id="4471" instrument_node=""> (Cardura)</span></li><li data-dcnode-id="4466"><strong data-dcnode-id="4468"><span data-dcnode-id="4469" instrument_node="">Prazosin Hydrochloride</span></strong><span data-dcnode-id="4467" instrument_node=""> (Minipress)</span></li><li data-dcnode-id="4462"><strong data-dcnode-id="4464"><span data-dcnode-id="4465" instrument_node="">Terazosin Hydrochloride</span></strong><span data-dcnode-id="4463" instrument_node=""> (Hytrin)</span></li></ul><span data-dcnode-id="4460" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="4455"><figure class="aligncenter size-medium" data-dcnode-id="4456"><picture data-dcnode-id="4457"><source data-dcnode-id="4459" sizes="(max-width: 300px) 100vw, 300px" srcset="https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/minipress-300x300.png.webp 300w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/minipress-150x150.png.webp 150w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/minipress-768x768.png.webp 768w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/minipress-180x180.png.webp 180w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/minipress-158x158.png.webp 158w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/minipress-80x80.png.webp 80w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/minipress-120x120.png.webp 120w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/minipress-70x70.png.webp 70w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/minipress-40x40.png.webp 40w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/minipress-283x283.png.webp 283w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/minipress-54x54.png.webp 54w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/minipress-330x330.png.webp 330w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/minipress-420x420.png.webp 420w, htt 0.png 30w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/minipress.png 800w" width="300"></picture></figure></div><span data-dcnode-id="4454" instrument_node="">
</span><h3 data-dcnode-id="4452" id="h3-angiotensin-ii-receptor-blockers-cbd-3"><span data-dcnode-id="4453" instrument_node="">Angiotensin II Receptor Blockers &amp; CBD</span></h3><span data-dcnode-id="4451" instrument_node="">
</span><ul data-dcnode-id="4442"><li data-dcnode-id="4447"><strong data-dcnode-id="4449"><span data-dcnode-id="4450" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="4448" instrument_node=""> ↑↑↑ Increased Effect (Agonistic)</span></li><li data-dcnode-id="4443"><strong data-dcnode-id="4445"><span data-dcnode-id="4446" instrument_node="">Severity:</span></strong><span data-dcnode-id="4444" instrument_node=""> Mild</span></li></ul><span data-dcnode-id="4441" instrument_node="">
</span><p data-dcnode-id="4439"><span data-dcnode-id="4440" instrument_node="">Angiotensin II is created with the help of an enzyme called ACE. In most cases, ACE inhibitor drugs are used first, but if these don’t work, an angiotensin II receptor blocker can be used instead. The results are much the same — the drugs block the vasoconstrictive effects of angiotensin II to lower blood pressure.</span></p><span data-dcnode-id="4438" instrument_node="">
</span><p data-dcnode-id="4436"><span data-dcnode-id="4437" instrument_node="">CBD may interact with these drugs by boosting their effects. CBD is a known antihypertensive agent, which could cause pressure to dip too low and cause side-effects mimicking hypotension.</span></p><span data-dcnode-id="4435" instrument_node="">
</span><h4 data-dcnode-id="4433" id="h4-angiotensin-ii-receptor-blockers-that-may-interact-with-cbd-3"><span data-dcnode-id="4434" instrument_node="">Angiotensin II Receptor Blockers That May Interact With CBD</span></h4><span data-dcnode-id="4432" instrument_node="">
</span><ul data-dcnode-id="4407"><li data-dcnode-id="4428"><strong data-dcnode-id="4430"><span data-dcnode-id="4431" instrument_node="">Candesartan</span></strong><span data-dcnode-id="4429" instrument_node=""> (Atacand)</span></li><li data-dcnode-id="4424"><strong data-dcnode-id="4426"><span data-dcnode-id="4427" instrument_node="">Eprosartan Mesylate</span></strong><span data-dcnode-id="4425" instrument_node=""> (Teveten)</span></li><li data-dcnode-id="4420"><strong data-dcnode-id="4422"><span data-dcnode-id="4423" instrument_node="">Irbesartan</span></strong><span data-dcnode-id="4421" instrument_node=""> (Avapro)</span></li><li data-dcnode-id="4416"><strong data-dcnode-id="4418"><span data-dcnode-id="4419" instrument_node="">Losartan Potassium</span></strong><span data-dcnode-id="4417" instrument_node=""> (Cozaar)</span></li><li data-dcnode-id="4412"><strong data-dcnode-id="4414"><span data-dcnode-id="4415" instrument_node="">Telmisartan</span></strong><span data-dcnode-id="4413" instrument_node=""> (Micardis)</span></li><li data-dcnode-id="4408"><strong data-dcnode-id="4410"><span data-dcnode-id="4411" instrument_node="">Valsartan</span></strong><span data-dcnode-id="4409" instrument_node=""> (Diovan)</span></li></ul><span data-dcnode-id="4406" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="4401"><figure class="aligncenter size-medium" data-dcnode-id="4402"><picture data-dcnode-id="4403"><source data-dcnode-id="4405" sizes="(max-width: 300px) 100vw, 300px" srcset="https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/micardis-300x300.png.webp 300w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/micardis-150x150.png.webp 150w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/micardis-768x768.png.webp 768w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/micardis-180x180.png.webp 180w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/micardis-158x158.png.webp 158w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/micardis-80x80.png.webp 80w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/micardis-120x120.png.webp 120w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/micardis-70x70.png.webp 70w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/micardis-40x40.png.webp 40w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/micardis-283x283.png.webp 283w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/micardis-54x54.png.webp 54w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/micardis-330x330.png.webp 330w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/micardis-420x420.png.webp 420w, https://dailycbd en/wp-content/uploads/sites/7/2021/10/micardis.png 800w" width="300"></picture></figure></div><span data-dcnode-id="4400" instrument_node="">
</span><h3 data-dcnode-id="4398" id="h3-betablockers-cbd-4"><span data-dcnode-id="4399" instrument_node="">Beta-Blockers &amp; CBD</span></h3><span data-dcnode-id="4397" instrument_node="">
</span><ul data-dcnode-id="4388"><li data-dcnode-id="4393"><strong data-dcnode-id="4395"><span data-dcnode-id="4396" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="4394" instrument_node=""> ↑↑↑ Increased Effect (Agonistic)</span></li><li data-dcnode-id="4389"><strong data-dcnode-id="4391"><span data-dcnode-id="4392" instrument_node="">Severity:</span></strong><span data-dcnode-id="4390" instrument_node=""> Moderate</span></li></ul><span data-dcnode-id="4387" instrument_node="">
</span><p data-dcnode-id="4385"><span data-dcnode-id="4386" instrument_node="">Beta-blockers target the heart directly. They reduce the heart rate and the strength of each contraction. This puts less pressure on the arteries to reduce blood pressure overall.</span></p><span data-dcnode-id="4384" instrument_node="">
</span><p data-dcnode-id="4382"><span data-dcnode-id="4383" instrument_node="">CBD isn’t likely to interact with beta-blockers directly but may compete for metabolism in the liver and could cause blood pressure to dip too low due to the similarities in effects.</span></p><span data-dcnode-id="4381" instrument_node="">
</span><h4 data-dcnode-id="4379" id="h4-betablockers-that-may-interact-with-cbd-4"><span data-dcnode-id="4380" instrument_node="">Beta-Blockers That May Interact With CBD</span></h4><span data-dcnode-id="4378" instrument_node="">

.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/kerlone1-74x74.png.webp 74w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/kerlone1-30x30.png.webp 30w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/kerlone1.png.webp 800w" type="image/webp"><img alt="" class="wp-image-34411 webpexpress-processed" data-dcnode-id="4319" height="300" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2021/10/kerlone1-300x300.png&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/kerlone1-300x300.png 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/kerlone1-150x150.png 150w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/kerlone1-768x768.png 768w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/kerlone1-180x180.png 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/kerlone1-158x158.png 158w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/kerlone1-80x80.png 80w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/kerlone1-120x120.png 120w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/kerlone1-70x70.png 70w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/kerlone1-40x40.png 40w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/kerlone1-283x283.png 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/kerlone1-54x54.png 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/kerlone1-330x330.png 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/kerlone1-420x420.png 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/kerlone1-74x74.png 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/kerlone1-30x30.png 30w, https://dailycbd.com/ </span><h3 data-dcnode-id="4313" id="h3-calcium-channel-blockers-cbd-5"><span data-dcnode-id="4314" instrument_node="">Calcium Channel Blockers &amp; CBD</span></h3><span data-dcnode-id="4312" instrument_node="">
</span><ul data-dcnode-id="4303"><li data-dcnode-id="4308"><strong data-dcnode-id="4310"><span data-dcnode-id="4311" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="4309" instrument_node=""> ↑↑↑ Increased Effect (Agonistic)</span></li><li data-dcnode-id="4304"><strong data-dcnode-id="4306"><span data-dcnode-id="4307" instrument_node="">Severity:</span></strong><span data-dcnode-id="4305" instrument_node=""> Moderate</span></li></ul><span data-dcnode-id="4302" instrument_node="">
</span><p data-dcnode-id="4300"><span data-dcnode-id="4301" instrument_node="">Calcium channel blockers work by reducing the amount of calcium that enters the heart’s muscle cells. Calcium is required for the muscles to contract, so by reducing the concentrations of calcium in the heart cells; these medications can reduce the contractile force of the heart muscle.</span></p><span data-dcnode-id="4299" instrument_node="">
</span><p data-dcnode-id="4297"><span data-dcnode-id="4298" instrument_node="">Reducing the contractile power of the heart reduces systolic blood pressure in a similar way to beta-blocker medications.</span></p><span data-dcnode-id="4296" instrument_node="">
</span><p data-dcnode-id="4294"><span data-dcnode-id="4295" instrument_node="">CBD may slow the metabolism of calcium channel blockers, and could theoretically cause blood pressure to dip too low. With that said, it’s not common for people taking calcium channel blockers to experience negative interactions with CBD.</span></p><span data-dcnode-id="4293" instrument_node="">
</span><h4 data-dcnode-id="4291" id="h4-calcium-channel-blockers-that-may-interact-with-cbd-5"><span data-dcnode-id="4292" instrument_node="">Calcium Channel Blockers That May Interact With CBD</span></h4><span data-dcnode-id="4290" instrument_node="">
</span><ul data-dcnode-id="4253"><li data-dcnode-id="4286"><strong data-dcnode-id="4288"><span data-dcnode-id="4289" instrument_node="">Amlodipine Besylate</span></strong><span data-dcnode-id="4287" instrument_node=""> (Norvasc, Lotrel)</span></li><li data-dcnode-id="4282"><strong data-dcnode-id="4284"><span data-dcnode-id="4285" instrument_node="">Bepridil</span></strong><span data-dcnode-id="4283" instrument_node=""> (Vasocor)</span></li><li data-dcnode-id="4278"><strong data-dcnode-id="4280"><span data-dcnode-id="4281" instrument_node="">Diltiazem Hydrochloride</span></strong><span data-dcnode-id="4279" instrument_node=""> (Cardizem CD, Cardizem SR, Dilacor XR, Tiazac)</span></li><li data-dcnode-id="4274"><strong data-dcnode-id="4276"><span data-dcnode-id="4277" instrument_node="">Felodipine</span></strong><span data-dcnode-id="4275" instrument_node=""> (Plendil)</span></li><li data-dcnode-id="4270"><strong data-dcnode-id="4272"><span data-dcnode-id="4273" instrument_node="">Isradipine</span></strong><span data-dcnode-id="4271" instrument_node=""> (DynaCirc, DynaCirc CR)</span></li><li data-dcnode-id="4266"><strong data-dcnode-id="4268"><span data-dcnode-id="4269" instrument_node="">Nicardipine</span></strong><span data-dcnode-id="4267" instrument_node=""> (Cardene SR)</span></li><li data-dcnode-id="4262"><strong data-dcnode-id="4264"><span data-dcnode-id="4265" instrument_node="">Nifedipine</span></strong><span data-dcnode-id="4263" instrument_node=""> (Adalat CC, Procardia XL)</span></li><li data-dcnode-id="4258"><strong data-dcnode-id="4260"><span data-dcnode-id="4261" instrument_node="">Nisoldipine</span></strong><span data-dcnode-id="4259" instrument_node=""> (Solar)</span></li><li data-dcnode-id="4254"><strong data-dcnode-id="4256"><span data-dcnode-id="4257" instrument_node="">Verapamil Hydrochloride</span></strong><span data-dcnode-id="4255" instrument_node=""> (Calan SR, Covera HS, Isoptin SR, Verelan)</span></li></ul><span data-dcnode-id="4252" instrument_node="">

</span><h3 data-dcnode-id="4244" id="h3-central-agonists-cbd-6"><span data-dcnode-id="4245" instrument_node="">Central Agonists &amp; CBD</span></h3><span data-dcnode-id="4243" instrument_node="">
</span><ul data-dcnode-id="4234"><li data-dcnode-id="4239"><strong data-dcnode-id="4241"><span data-dcnode-id="4242" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="4240" instrument_node=""> ↑↑↑ Increased Effect (Agonistic)</span></li><li data-dcnode-id="4235"><strong data-dcnode-id="4237"><span data-dcnode-id="4238" instrument_node="">Severity:</span></strong><span data-dcnode-id="4236" instrument_node=""> Mild</span></li></ul><span data-dcnode-id="4233" instrument_node="">
</span><p data-dcnode-id="4231"><span data-dcnode-id="4232" instrument_node="">Central agonists do the same job as an alpha-blocker — preventing or reducing the contractility of the arteries to reduce blood pressure. They use a completely different mechanism and are usually prescribed if alpha-blockers don’t work.</span></p><span data-dcnode-id="4230" instrument_node="">
</span><p data-dcnode-id="4228"><span data-dcnode-id="4229" instrument_node="">CBD may interact with these medications because of the similarities in effects. However, the side effects of using these two medication classes are uncommon.</span></p><span data-dcnode-id="4227" instrument_node="">
</span><h4 data-dcnode-id="4225" id="h4-central-agonists-that-may-interact-with-cbd-6"><span data-dcnode-id="4226" instrument_node="">Central Agonists That May Interact With CBD</span></h4><span data-dcnode-id="4224" instrument_node="">
</span><ul data-dcnode-id="4207"><li data-dcnode-id="4220"><strong data-dcnode-id="4222"><span data-dcnode-id="4223" instrument_node="">Alpha Methyldopa</span></strong><span data-dcnode-id="4221" instrument_node=""> (Aldomet)</span></li><li data-dcnode-id="4216"><strong data-dcnode-id="4218"><span data-dcnode-id="4219" instrument_node="">Clonidine Hydrochloride</span></strong><span data-dcnode-id="4217" instrument_node=""> (Catapres)</span></li><li data-dcnode-id="4212"><strong data-dcnode-id="4214"><span data-dcnode-id="4215" instrument_node="">Guanabenz Acetate</span></strong><span data-dcnode-id="4213" instrument_node=""> (Wytensin)</span></li><li data-dcnode-id="4208"><strong data-dcnode-id="4210"><span data-dcnode-id="4211" instrument_node="">Guanfacine Hydrochloride</span></strong><span data-dcnode-id="4209" instrument_node=""> (Tenex)</span></li></ul><span data-dcnode-id="4206" instrument_node="">

ps://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/catapress-74x74.png.webp 74w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/catapress-30x30.png.webp 30w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/catapress.png.webp 800w" type="image/webp"><img alt="" class="wp-image-34383 webpexpress-processed" data-dcnode-id="4204" height="300" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2021/10/catapress-300x300.png&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/catapress-300x300.png 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/catapress-150x150.png 150w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/catapress-768x768.png 768w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/catapress-180x180.png 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/catapress-158x158.png 158w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/catapress-80x80.png 80w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/catapress-120x120.png 120w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/catapress-70x70.png 70w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/catapress-40x40.png 40w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/catapress-283x283.png 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/catapress-54x54.png 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/catapress-330x330.png 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/catapress-420x420.png 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/catapress-74x74.png 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/catapress-30x30.png 30w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/catapress.png 800w" width="300"></picture></figure></div><span data-dcnode-id="4200" instrument_node="">
</span><h3 data-dcnode-id="4198" id="h3-diuretics-cbd-7"><span data-dcnode-id="4199" instrument_node="">Diuretics &amp; CBD</span></h3><span data-dcnode-id="4197" instrument_node="">
</span><ul data-dcnode-id="4188"><li data-dcnode-id="4193"><strong data-dcnode-id="4195"><span data-dcnode-id="4196" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="4194" instrument_node=""> ↑↑↑ Increased Effect (Agonistic)</span></li><li data-dcnode-id="4189"><strong data-dcnode-id="4191"><span data-dcnode-id="4192" instrument_node="">Severity:</span></strong><span data-dcnode-id="4190" instrument_node=""> Mild</span></li></ul><span data-dcnode-id="4187" instrument_node="">
</span><p data-dcnode-id="4185"><span data-dcnode-id="4186" instrument_node="">Diuretics are a class of medications used to reduce blood pressure by promoting the loss of electrolytes and fluid from the vascular system. If the volume of fluid in the blood is decreased, blood pressure drops along with it.</span></p><span data-dcnode-id="4184" instrument_node="">
</span><p data-dcnode-id="4182"><span data-dcnode-id="4183" instrument_node="">CBD is unlikely to interact with these medications directly. However, CBD and diuretics produce the same results — lowered blood pressure. This means taking the two together could cause blood pressure to dip too low — resulting in dizziness and fainting.</span></p><span data-dcnode-id="4181" instrument_node="">
</span><h4 data-dcnode-id="4179" id="h4-diuretics-that-may-interact-with-cbd-7"><span data-dcnode-id="4180" instrument_node="">Diuretics That May Interact With CBD</span></h4><span data-dcnode-id="4178" instrument_node="">
</span><ul data-dcnode-id="4134"><li data-dcnode-id="4174"><strong data-dcnode-id="4176"><span data-dcnode-id="4177" instrument_node="">Chlorthalidone</span></strong><span data-dcnode-id="4175" instrument_node=""> (Hygroton)</span></li><li data-dcnode-id="4170"><strong data-dcnode-id="4172"><span data-dcnode-id="4173" instrument_node="">Chlorothiazide</span></strong><span data-dcnode-id="4171" instrument_node=""> (Diuril)</span></li><li data-dcnode-id="4166"><strong data-dcnode-id="4168"><span data-dcnode-id="4169" instrument_node="">Hydrochlorothiazide</span></strong><span data-dcnode-id="4167" instrument_node=""> (Esidrix, Hydrodiuril &amp; Microzide)</span></li><li data-dcnode-id="4162"><strong data-dcnode-id="4164"><span data-dcnode-id="4165" instrument_node="">Indapamide</span></strong><span data-dcnode-id="4163" instrument_node=""> (Lozol)</span></li><li data-dcnode-id="4158"><strong data-dcnode-id="4160"><span data-dcnode-id="4161" instrument_node="">Metolazone</span></strong><span data-dcnode-id="4159" instrument_node=""> (Mykrox &amp; Zaroxolyn)</span></li><li data-dcnode-id="4151"><strong data-dcnode-id="4156"><span data-dcnode-id="4157" instrument_node="">Amiloride</span></strong><span data-dcnode-id="4155" instrument_node=""> </span><strong data-dcnode-id="4153"><span data-dcnode-id="4154" instrument_node="">Hydrochloride</span></strong><span data-dcnode-id="4152" instrument_node=""> (Midamar)</span></li><li data-dcnode-id="4147"><strong data-dcnode-id="4149"><span data-dcnode-id="4150" instrument_node="">Spironolactone</span></strong><span data-dcnode-id="4148" instrument_node=""> (Aldactone)</span></li><li data-dcnode-id="4143"><strong data-dcnode-id="4145"><span data-dcnode-id="4146" instrument_node="">Triamterene</span></strong><span data-dcnode-id="4144" instrument_node=""> (Dyrenium)</span></li><li data-dcnode-id="4139"><strong data-dcnode-id="4141"><span data-dcnode-id="4142" instrument_node="">Furosemide</span></strong><span data-dcnode-id="4140" instrument_node=""> (Lasix)</span></li><li data-dcnode-id="4135"><strong data-dcnode-id="4137"><span data-dcnode-id="4138" instrument_node="">Bumetanide</span></strong><span data-dcnode-id="4136" instrument_node=""> (Bumex)</span></li></ul><span data-dcnode-id="4133" instrument_node="">
