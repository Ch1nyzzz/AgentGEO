ps://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/surmontil-74x74.png.webp 74w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/surmontil-30x30.png.webp 30w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/surmontil.png.webp 800w" type="image/webp"><img alt="" class="wp-image-34407 webpexpress-processed" data-dcnode-id="3403" height="300" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2021/10/surmontil-300x300.png&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/surmontil-300x300.png 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/surmontil-150x150.png 150w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/surmontil-768x768.png 768w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/surmontil-180x180.png 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/surmontil-158x158.png 158w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/surmontil-80x80.png 80w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/surmontil-120x120.png 120w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/surmontil-70x70.png 70w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/surmontil-40x40.png 40w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/surmontil-283x283.png 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/surmontil-54x54.png 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/surmontil-330x330.png 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/surmontil-420x420.png 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/surmontil-74x74.png 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/surmontil-30x30.png 30w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/surmontil.png 800w" width="300"></picture></figure></div><span data-dcnode-id="3399" instrument_node="">
</span><h3 data-dcnode-id="3397" id="h3-mao-inhibitors-cbd-4"><span data-dcnode-id="3398" instrument_node="">MAO Inhibitors &amp; CBD</span></h3><span data-dcnode-id="3396" instrument_node="">
</span><ul data-dcnode-id="3387"><li data-dcnode-id="3392"><strong data-dcnode-id="3394"><span data-dcnode-id="3395" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="3393" instrument_node=""> Metabolic Competitor</span></li><li data-dcnode-id="3388"><strong data-dcnode-id="3390"><span data-dcnode-id="3391" instrument_node="">Severity:</span></strong><span data-dcnode-id="3389" instrument_node=""> Mild</span></li></ul><span data-dcnode-id="3386" instrument_node="">
</span><p data-dcnode-id="3384"><span data-dcnode-id="3385" instrument_node="">MAO stands for monoamine oxidase — which is the primary enzyme responsible for breaking down the monoamine class of neurotransmitters. This includes serotonin, dopamine, and norepinephrine — all of which are involved in the regulation of mood.</span></p><span data-dcnode-id="3383" instrument_node="">
</span><p data-dcnode-id="3381"><span data-dcnode-id="3382" instrument_node="">MAO inhibitors are used to increase the concentration of neurotransmitters in the brain to boost mood.</span></p><span data-dcnode-id="3380" instrument_node="">
</span><p data-dcnode-id="3378"><span data-dcnode-id="3379" instrument_node="">This class of antidepressants isn’t as popular as SSRIs or SNRIs. They’re thought to be less effective and result in side effects more often than these other classes of drugs. Some people find this class of drug is more effective for regulating mood than the other antidepressants. Everybody is different, so it’s common for a doctor to try a few medications to see what works when treating a new patient with depression.</span></p><span data-dcnode-id="3377" instrument_node="">
</span><p data-dcnode-id="3375"><span data-dcnode-id="3376" instrument_node="">CBD does not directly interact with MAO but may compete for metabolism in the liver. Many MAO inhibitors are metabolized by the CYP2D6, CYP1A2, and CYP2C19 enzymes — all of which are affected by CBD as well.</span></p><span data-dcnode-id="3374" instrument_node="">
</span><p data-dcnode-id="3372"><span data-dcnode-id="3373" instrument_node="">Like all antidepressants, MAO inhibitors are used consistently on a daily basis. If metabolism is slowed enough for these medications to build up in the bloodstream, it could result in side effects or toxicity. It’s wise to take lower doses of CBD and periodic breaks if combining these two substances together.</span></p><span data-dcnode-id="3371" instrument_node="">
</span><p data-dcnode-id="3369"><span data-dcnode-id="3370" instrument_node="">You should also consult your doctor before taking any other substances if you’ve been prescribed MAO inhibitors.</span></p><span data-dcnode-id="3368" instrument_node="">
</span><h4 data-dcnode-id="3366" id="h4-mao-inhibitors-that-may-interact-with-cbd-4"><span data-dcnode-id="3367" instrument_node="">MAO Inhibitors That May Interact With CBD</span></h4><span data-dcnode-id="3365" instrument_node="">
</span><ul data-dcnode-id="3348"><li data-dcnode-id="3361"><strong data-dcnode-id="3363"><span data-dcnode-id="3364" instrument_node="">Isocarboxazid</span></strong><span data-dcnode-id="3362" instrument_node=""> (Marplan)</span></li><li data-dcnode-id="3357"><strong data-dcnode-id="3359"><span data-dcnode-id="3360" instrument_node="">Phenelzine</span></strong><span data-dcnode-id="3358" instrument_node=""> (Nardil)</span></li><li data-dcnode-id="3353"><strong data-dcnode-id="3355"><span data-dcnode-id="3356" instrument_node="">Selegiline</span></strong><span data-dcnode-id="3354" instrument_node=""> (Emsam)</span></li><li data-dcnode-id="3349"><strong data-dcnode-id="3351"><span data-dcnode-id="3352" instrument_node="">Tranylcypromine</span></strong><span data-dcnode-id="3350" instrument_node=""> (Parnate)</span></li></ul><span data-dcnode-id="3347" instrument_node="">
</span><h3 data-dcnode-id="3345" id="h3-sari-medications-cbd-5"><span data-dcnode-id="3346" instrument_node="">SARI Medications &amp; CBD</span></h3><span data-dcnode-id="3344" instrument_node="">
</span><ul data-dcnode-id="3335"><li data-dcnode-id="3340"><strong data-dcnode-id="3342"><span data-dcnode-id="3343" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="3341" instrument_node=""> Metabolic Competitor (CYP3A4)</span></li><li data-dcnode-id="3336"><strong data-dcnode-id="3338"><span data-dcnode-id="3339" instrument_node="">Severity:</span></strong><span data-dcnode-id="3337" instrument_node=""> Mild</span></li></ul><span data-dcnode-id="3334" instrument_node="">
</span><p data-dcnode-id="3332"><span data-dcnode-id="3333" instrument_node="">SARI stands for Serotonin antagonist and reuptake inhibitors. They’re a type of antidepressant, anxiolytic, and anti-insomnia medication. They’re rarely used as the first line of defense for depression but are commonly prescribed for patients with depression, anxiety, and insomnia together.</span></p><span data-dcnode-id="3331" instrument_node="">
</span><p data-dcnode-id="3329"><span data-dcnode-id="3330" instrument_node="">These medications block the 5-HT2A serotonin receptor and block serotonin transporters — leading to increased activity of serotonin in the brain.</span></p><span data-dcnode-id="3328" instrument_node="">
</span><p data-dcnode-id="3326"><span data-dcnode-id="3327" instrument_node="">These medications are heavily reliant on the CYP3A4 enzymes in the liver. When taken with CBD, the worry is that concentrations of this medication can increase, leading to a higher risk of side effects from the medication and higher chances of dependency forming on the drug.</span></p><span data-dcnode-id="3325" instrument_node="">
</span><p data-dcnode-id="3323"><span data-dcnode-id="3324" instrument_node="">The most common side effects of SARI medications include headaches, nausea, digestive issues, confusion, agitation, and sedation.</span></p><span data-dcnode-id="3322" instrument_node="">
</span><h4 data-dcnode-id="3320" id="h4-sari-medications-that-may-interact-with-cbd-5"><span data-dcnode-id="3321" instrument_node="">SARI Medications That May Interact With CBD</span></h4><span data-dcnode-id="3319" instrument_node="">
</span><ul data-dcnode-id="3310"><li data-dcnode-id="3315"><strong data-dcnode-id="3317"><span data-dcnode-id="3318" instrument_node="">Trazodone</span></strong><span data-dcnode-id="3316" instrument_node=""> (Desyrel &amp; Oleptro)</span></li><li data-dcnode-id="3311"><strong data-dcnode-id="3313"><span data-dcnode-id="3314" instrument_node="">Nefazodone</span></strong><span data-dcnode-id="3312" instrument_node=""> (Serzone)</span></li></ul><span data-dcnode-id="3309" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3304"><figure class="aligncenter size-medium" data-dcnode-id="3305"><picture data-dcnode-id="3306"><source data-dcnode-id="3308" sizes="(max-width: 300px) 100vw, 300px" srcset="https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/desyrel-300x300.png.webp 300w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/desyrel-150x150.png.webp 150w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/desyrel-768x768.png.webp 768w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/desyrel-180x180.png.webp 180w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/desyrel-158x158.png.webp 158w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/desyrel-80x80.png.webp 80w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/desyrel-120x120.png.webp 120w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/desyrel-70x70.png.webp 70w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/desyrel-40x40.png.webp 40w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/desyrel-283x283.png.webp 283w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/desyrel-54x54.png.webp 54w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/desyrel-330x330.png.webp 330w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/desyrel-420x420.png.webp 420w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/desyrel-74x74.png.webp 74w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/desyrel-30x30.png.webp 30w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/desyrel.png.webp 800w" type="image/webp"><img alt="" class="wp-image-34388 webpexpress-processed" data-dcnode-id="3307" height="300" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2021/10/desyrel-300x300.png&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/desyrel-300x300.png 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/desyrel-150x150.png 150w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/desyrel-768x768.png 768w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/desyrel-180x180.png 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/desyrel-158x158.png 158w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/desyrel-80x80.png 80w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/desyrel-120x120.png 120w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/desyrel-70x70.png 70w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/desyrel-40x40.png 40w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/desyrel-283x283.png 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/desyrel-54x54.png 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/desyrel-330x330.png 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/desyrel-420x420.png 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/desyrel-74x74.png 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/desyrel-30x30.png 30w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/desyrel.png 800w" width="300"></picture></figure></div><span data-dcnode-id="3303" instrument_node="">
</span><h3 data-dcnode-id="3301" id="h3-sda-medications-cbd-6"><span data-dcnode-id="3302" instrument_node="">SDA Medications &amp; CBD</span></h3><span data-dcnode-id="3300" instrument_node="">
</span><ul data-dcnode-id="3291"><li data-dcnode-id="3296"><strong data-dcnode-id="3298"><span data-dcnode-id="3299" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="3297" instrument_node=""> ↑↑↑ Increased Effect (Agonistic)</span></li><li data-dcnode-id="3292"><strong data-dcnode-id="3294"><span data-dcnode-id="3295" instrument_node="">Severity:</span></strong><span data-dcnode-id="3293" instrument_node=""> Moderate</span></li></ul><span data-dcnode-id="3290" instrument_node="">
</span><p data-dcnode-id="3288"><span data-dcnode-id="3289" instrument_node="">SDA stands for serotonin, dopamine antagonists. SDAs are used for treating schizophrenia, bipolar disorder, autism, and major depressive disorder. </span></p><span data-dcnode-id="3287" instrument_node="">
</span><p data-dcnode-id="3285"><span data-dcnode-id="3286" instrument_node="">These medications have a strong sedating effect, which makes them better for use in the evenings before bed. They work by blocking both dopamine and serotonin receptors in the brain. </span></p><span data-dcnode-id="3284" instrument_node="">
</span><p data-dcnode-id="3282"><span data-dcnode-id="3283" instrument_node="">There are a lot of side effects associated with these medications, many of which may be compounded when taken with CBD. Some examples include dry mouth, low blood pressure, and memory. It isn’t considered safe to mix CBD and SDA medications without consulting with your prescribing physician first. Patients that are above the age of 65 or have been diagnosed with dementia are the most at-risk. </span></p><span data-dcnode-id="3281" instrument_node="">
</span><p data-dcnode-id="3278"><strong data-dcnode-id="3279"><span data-dcnode-id="3280" instrument_node="">SDA Medications That May Interact With CBD</span></strong></p><span data-dcnode-id="3277" instrument_node="">
</span><ul data-dcnode-id="3255"><li data-dcnode-id="3273"><strong data-dcnode-id="3275"><span data-dcnode-id="3276" instrument_node="">Aripiprazole</span></strong><span data-dcnode-id="3274" instrument_node=""> (Abilify)</span></li><li data-dcnode-id="3269"><strong data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node="">Brexpiprazole</span></strong><span data-dcnode-id="3270" instrument_node=""> (Rexulti)</span></li><li data-dcnode-id="3265"><strong data-dcnode-id="3267"><span data-dcnode-id="3268" instrument_node="">Olanzapine</span></strong><span data-dcnode-id="3266" instrument_node=""> (Zyprexa)</span></li><li data-dcnode-id="3260"><strong data-dcnode-id="3262"><a data-dcnode-id="3263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/quetiapine/"><span data-dcnode-id="3264" instrument_node="">Quetiapine</span></a></strong><span data-dcnode-id="3261" instrument_node=""> (Seroquel)</span></li><li data-dcnode-id="3256"><strong data-dcnode-id="3258"><span data-dcnode-id="3259" instrument_node="">Ziprasidone</span></strong><span data-dcnode-id="3257" instrument_node=""> (Geodon)</span></li></ul><span data-dcnode-id="3254" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3249"><figure class="aligncenter size-medium" data-dcnode-id="3250"><picture data-dcnode-id="3251"><source data-dcnode-id="3253" sizes="(max-width: 300px) 100vw, 300px" srcset="https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/seroquel-300x224.png.webp 300w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/seroquel-180x135.png.webp 180w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/seroquel-283x212.png.webp 283w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/seroquel-54x40.png.webp 54w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/seroquel-330x247.png.webp 330w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/seroquel-74x55.png.webp 74w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/seroquel-40x30.png.webp 40w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/seroquel.png.webp 400w" type="image/webp"><img alt="" class="wp-image-33580 webpexpress-processed" data-dcnode-id="3252" height="224" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2021/10/seroquel-300x224.png&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/seroquel-300x224.png 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/seroquel-180x135.png 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/seroquel-283x212.png 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/seroquel-54x40.png 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/seroquel-330x247.png 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/seroquel-74x55.png 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/seroquel-40x30.png 40w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/seroquel.png 400w" width="300"></picture></figure></div><span data-dcnode-id="3248" instrument_node="">
</span><h3 data-dcnode-id="3246" id="h3-ndri-medications-cbd-7"><span data-dcnode-id="3247" instrument_node="">NDRI Medications &amp; CBD</span></h3><span data-dcnode-id="3245" instrument_node="">
</span><ul data-dcnode-id="3236"><li data-dcnode-id="3241"><strong data-dcnode-id="3243"><span data-dcnode-id="3244" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="3242" instrument_node=""> ↓↓↓ Decreased Effect (Antagonistic)</span></li><li data-dcnode-id="3237"><strong data-dcnode-id="3239"><span data-dcnode-id="3240" instrument_node="">Severity:</span></strong><span data-dcnode-id="3238" instrument_node=""> Mild</span></li></ul><span data-dcnode-id="3235" instrument_node="">
</span><p data-dcnode-id="3233"><span data-dcnode-id="3234" instrument_node="">NDRI stands for Noradrenalin-Dopamine Reuptake Inhibitors. They’re used to treat depression as well as a variety of other health conditions — including ADHD, narcolepsy, and Parkinson’s disease.</span></p><span data-dcnode-id="3232" instrument_node="">
</span><p data-dcnode-id="3230"><span data-dcnode-id="3231" instrument_node="">They work by increasing the concentration of dopamine and noradrenaline in the brain by blocking the reuptake channels that lead to their destruction.</span></p><span data-dcnode-id="3229" instrument_node="">
</span><p data-dcnode-id="3227"><span data-dcnode-id="3228" instrument_node="">CBD is unlikely to have any significant interactions with these medications — but may cause concentrations of NDRIs to increase if used on a consistent basis. CBD may interfere with the metabolism of these drugs, which require CYP2B6 enzymes. CBD does compete for these enzymes, but not as strong as it does for other enzymes.</span></p><span data-dcnode-id="3226" instrument_node="">
</span><p data-dcnode-id="3224"><span data-dcnode-id="3225" instrument_node="">Many of the effects of NDRI medications are stimulating in nature. CBD has more of an inhibitory effect on the brain, which could negate many of the benefits of the medications and reduce their effectiveness. Some suggest this effect is beneficial for alleviating some of the common side-effects of these medications. More research is needed to fully understand whether or not it’s safe to mix CBD with NDRI medications.</span></p><span data-dcnode-id="3223" instrument_node="">
</span><p data-dcnode-id="3218"><span data-dcnode-id="3222" instrument_node="">If using any psychiatric medication, you should </span><a data-dcnode-id="3220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/talk-to-your-doctor-cbd/"><span data-dcnode-id="3221" instrument_node="">speak with your doctor before you try CBD</span></a><span data-dcnode-id="3219" instrument_node="">.</span></p><span data-dcnode-id="3217" instrument_node="">
</span><h4 data-dcnode-id="3215" id="h4-ndri-medications-that-may-interact-with-cbd-6"><span data-dcnode-id="3216" instrument_node="">NDRI Medications That May Interact With CBD</span></h4><span data-dcnode-id="3214" instrument_node="">
</span><ul data-dcnode-id="3132"><li data-dcnode-id="3210"><strong data-dcnode-id="3212"><span data-dcnode-id="3213" instrument_node="">Bupropion</span></strong><span data-dcnode-id="3211" instrument_node=""> (Budeprion, Buproban, Wellbutrin &amp; Zyban)</span></li><li data-dcnode-id="3206"><strong data-dcnode-id="3208"><span data-dcnode-id="3209" instrument_node="">Amineptine</span></strong><span data-dcnode-id="3207" instrument_node=""> (Survector, Maneon, Directim)</span></li><li data-dcnode-id="3202"><strong data-dcnode-id="3204"><span data-dcnode-id="3205" instrument_node="">Desoxypipradrol</span></strong><span data-dcnode-id="3203" instrument_node=""> (2-DPMP)</span></li><li data-dcnode-id="3198"><strong data-dcnode-id="3200"><span data-dcnode-id="3201" instrument_node="">Dexmethylphenidate</span></strong><span data-dcnode-id="3199" instrument_node=""> (Focalin)</span></li><li data-dcnode-id="3194"><strong data-dcnode-id="3196"><span data-dcnode-id="3197" instrument_node="">Difemetorex</span></strong><span data-dcnode-id="3195" instrument_node=""> (Cleofil)</span></li><li data-dcnode-id="3190"><strong data-dcnode-id="3192"><span data-dcnode-id="3193" instrument_node="">Diphenylprolinol</span></strong><span data-dcnode-id="3191" instrument_node=""> (D2PM)</span></li><li data-dcnode-id="3187"><strong data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">Ethylphenidate</span></strong></li><li data-dcnode-id="3183"><strong data-dcnode-id="3185"><span data-dcnode-id="3186" instrument_node="">Fencamfamine</span></strong><span data-dcnode-id="3184" instrument_node=""> (Glucoenergan, Reactivan)</span></li><li data-dcnode-id="3179"><strong data-dcnode-id="3181"><span data-dcnode-id="3182" instrument_node="">Fencamine</span></strong><span data-dcnode-id="3180" instrument_node=""> (Altimina, Sicoclor)</span></li><li data-dcnode-id="3175"><strong data-dcnode-id="3177"><span data-dcnode-id="3178" instrument_node="">Lefetamine</span></strong><span data-dcnode-id="3176" instrument_node=""> (Santenol)</span></li><li data-dcnode-id="3171"><strong data-dcnode-id="3173"><span data-dcnode-id="3174" instrument_node="">Methylenedioxypyrovalerone</span></strong><span data-dcnode-id="3172" instrument_node=""> (MDPV)</span></li><li data-dcnode-id="3167"><strong data-dcnode-id="3169"><span data-dcnode-id="3170" instrument_node="">Methylphenidate</span></strong><span data-dcnode-id="3168" instrument_node=""> (Ritalin, Concerta, Metadate, Methylin, Rubifen, Stimdate)</span></li><li data-dcnode-id="3163"><strong data-dcnode-id="3165"><span data-dcnode-id="3166" instrument_node="">Nomifensine</span></strong><span data-dcnode-id="3164" instrument_node=""> (Merital)</span></li><li data-dcnode-id="3160"><strong data-dcnode-id="3161"><span data-dcnode-id="3162" instrument_node="">O-2172</span></strong></li><li data-dcnode-id="3156"><strong data-dcnode-id="3158"><span data-dcnode-id="3159" instrument_node="">Phenylpiracetam</span></strong><span data-dcnode-id="3157" instrument_node=""> (Phenotropil, Carphedon)</span></li><li data-dcnode-id="3152"><strong data-dcnode-id="3154"><span data-dcnode-id="3155" instrument_node="">Pipradrol</span></strong><span data-dcnode-id="3153" instrument_node=""> (Meretran)</span></li><li data-dcnode-id="3148"><strong data-dcnode-id="3150"><span data-dcnode-id="3151" instrument_node="">Prolintane</span></strong><span data-dcnode-id="3149" instrument_node=""> (Promotil, Katovit)</span></li><li data-dcnode-id="3144"><strong data-dcnode-id="3146"><span data-dcnode-id="3147" instrument_node="">Pyrovalerone</span></strong><span data-dcnode-id="3145" instrument_node=""> (Centroton, Thymergix)</span></li><li data-dcnode-id="3140"><strong data-dcnode-id="3142"><span data-dcnode-id="3143" instrument_node="">Solriamfetol</span></strong><span data-dcnode-id="3141" instrument_node=""> (Sunosi)</span></li><li data-dcnode-id="3136"><strong data-dcnode-id="3138"><span data-dcnode-id="3139" instrument_node="">Tametraline</span></strong><span data-dcnode-id="3137" instrument_node=""> (CP-24,411)</span></li><li data-dcnode-id="3133"><strong data-dcnode-id="3134"><span data-dcnode-id="3135" instrument_node="">WY-46824</span></strong></li></ul><span data-dcnode-id="3131" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3126"><figure class="aligncenter size-medium" data-dcnode-id="3127"><picture data-dcnode-id="3128"><source data-dcnode-id="3130" sizes="(max-width: 300px) 100vw, 300px" srcset="https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ritalin-300x300.png.webp 300w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ritalin-150x150.png.webp 150w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ritalin-768x768.png.webp 768w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ritalin-180x180.png.webp 180w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ritalin-158x158.png.webp 158w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ritalin-80x80.png.webp 80w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ritalin-120x120.png.webp 120w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ritalin-70x70.png.webp 70w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ritalin-40x40.png.webp 40w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ritalin-283x283.png.webp 283w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ritalin-54x54.png.webp 54w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ritalin-330x330.png.webp 330w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ritalin-420x420.png.webp 420w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ritalin-74x74.png.webp 74w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ritalin-30x30.png.webp 30w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/ritalin.png.webp 800w" type="image/webp"><img alt="" class="wp-image-34405 webpexpress-processed" data-dcnode-id="3129" height="300" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ritalin-300x300.png&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ritalin-300x300.png 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ritalin-150x150.png 150w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ritalin-768x768.png 768w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ritalin-180x180.png 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ritalin-158x158.png 158w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ritalin-80x80.png 80w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ritalin-120x120.png 120w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ritalin-70x70.png 70w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ritalin-40x40.png 40w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ritalin-283x283.png 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ritalin-54x54.png 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ritalin-330x330.png 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ritalin-420x420.png 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ritalin-74x74.png 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ritalin-30x30.png 30w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/ritalin.png 800w" width="300"></picture></figure></div><span data-dcnode-id="3125" instrument_node="">
</span></div><div class="p_wrap" data-dcnode-id="3016"><amp-position-observer data-dcnode-id="3123" intersection-ratios="0" layout="nodisplay" on="scroll:h2-cbd-stimulantseugeroics-9-offset.seekTo(percent=event.percent)"></amp-position-observer><h2 data-dcnode-id="3121" id="h2-cbd-stimulantseugeroics-9"><span data-dcnode-id="3122" instrument_node="">CBD &amp; Stimulants/Eugeroics</span></h2><span data-dcnode-id="3120" instrument_node="">
</span><ul data-dcnode-id="3111"><li data-dcnode-id="3116"><strong data-dcnode-id="3118"><span data-dcnode-id="3119" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="3117" instrument_node=""> ↓↓↓ Decreased Effect (Antagonistic)</span></li><li data-dcnode-id="3112"><strong data-dcnode-id="3114"><span data-dcnode-id="3115" instrument_node="">Severity:</span></strong><span data-dcnode-id="3113" instrument_node=""> Mild</span></li></ul><span data-dcnode-id="3110" instrument_node="">
</span><p data-dcnode-id="3105"><span data-dcnode-id="3109" instrument_node="">Stimulant drugs are used for managing conditions like </span><a data-dcnode-id="3107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/best-cbd/add-adhd/"><span data-dcnode-id="3108" instrument_node="">ADHD</span></a><span data-dcnode-id="3106" instrument_node="">, narcolepsy, or chronic fatigue syndrome. They’re often used off-label to boost focus and concentration at work or university. They work by increasing the secretion of neurotransmitters such as dopamine and norepinephrine.</span></p><span data-dcnode-id="3104" instrument_node="">
</span><p data-dcnode-id="3102"><span data-dcnode-id="3103" instrument_node="">Many people take CBD with stimulant medications as a way to negate some of the side effects of these drugs — which often include muscle tension and anxiety.</span></p><span data-dcnode-id="3101" instrument_node="">
</span><p data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">Caution is always advised when mixing substances that have conflicting effects like this — one pushes the nervous system into overdrive (stimulants), the other suppresses nervous system activity (CBD).</span></p><span data-dcnode-id="3098" instrument_node="">
</span><p data-dcnode-id="3096"><span data-dcnode-id="3097" instrument_node="">Serious interactions are unlikely when combining stimulants and CBD, but it’s wise to be cautious with the dose of both. Consult with your doctor first, and start with only a very small dose of CBD. You can increase the dose gradually by adding 2 mg of CBD to each of your daily doses until you find the right balance for your body.</span></p><span data-dcnode-id="3095" instrument_node="">
</span><p data-dcnode-id="3093"><span data-dcnode-id="3094" instrument_node="">It’s possible for CBD to reduce the effectiveness of stimulant medications, which could prevent the medications from doing their job.</span></p><span data-dcnode-id="3092" instrument_node="">
</span><p data-dcnode-id="3087"><span data-dcnode-id="3091" instrument_node="">Some of the other cannabinoids in cannabis plants may also interfere with stimulants —&nbsp;primarily THC (</span><a data-dcnode-id="3089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/thc-oil/"><span data-dcnode-id="3090" instrument_node="">tetrahydrocannabinol</span></a><span data-dcnode-id="3088" instrument_node="">).</span></p><span data-dcnode-id="3086" instrument_node="">
</span><p data-dcnode-id="3075"><span data-dcnode-id="3085" instrument_node="">Stimulants and THC are a bad combination and often result in side effects. Always make sure the cannabis products you’re using contain little to no THC or </span><a data-dcnode-id="3083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/cannabinoids/"><span data-dcnode-id="3084" instrument_node="">related cannabinoids</span></a><span data-dcnode-id="3082" instrument_node=""> such as </span><a data-dcnode-id="3080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/cbn/"><span data-dcnode-id="3081" instrument_node="">CBN</span></a><span data-dcnode-id="3079" instrument_node=""> or </span><a data-dcnode-id="3077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/thcv/"><span data-dcnode-id="3078" instrument_node="">THCV</span></a><span data-dcnode-id="3076" instrument_node="">.</span></p><span data-dcnode-id="3074" instrument_node="">
</span><h4 data-dcnode-id="3072" id="h4-stimulant-eugeroic-drugs-that-may-interact-with-cbd-1"><span data-dcnode-id="3073" instrument_node="">Stimulant &amp; Eugeroic Drugs That May Interact With CBD</span></h4><span data-dcnode-id="3071" instrument_node="">
</span><ul data-dcnode-id="3024"><li data-dcnode-id="3066"><strong data-dcnode-id="3068"><a data-dcnode-id="3069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/adderall/"><span data-dcnode-id="3070" instrument_node="">Amphetamine</span></a></strong><span data-dcnode-id="3067" instrument_node=""> (Adzenys ER, Adderall, Mydayis)</span></li><li data-dcnode-id="3058"><a data-dcnode-id="3060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/vyvanse/"><strong data-dcnode-id="3064"><span data-dcnode-id="3065" instrument_node="">Lisdexamfetamine</span></strong><span data-dcnode-id="3063" instrument_node=""> </span><strong data-dcnode-id="3061"><span data-dcnode-id="3062" instrument_node="">Dimesylate</span></strong></a><span data-dcnode-id="3059" instrument_node=""> (Vyvanse)</span></li><li data-dcnode-id="3054"><strong data-dcnode-id="3056"><span data-dcnode-id="3057" instrument_node="">Dextroamphetamine Sulfate</span></strong><span data-dcnode-id="3055" instrument_node=""> (Zenzedi &amp; Dexedrine)</span></li><li data-dcnode-id="3049"><strong data-dcnode-id="3051"><a data-dcnode-id="3052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/methylphenidate/"><span data-dcnode-id="3053" instrument_node="">Methylphenidate</span></a></strong><span data-dcnode-id="3050" instrument_node=""> (Ritalin)</span></li><li data-dcnode-id="3045"><strong data-dcnode-id="3047"><span data-dcnode-id="3048" instrument_node="">Atomoxetine</span></strong><span data-dcnode-id="3046" instrument_node=""> (Strattera)</span></li><li data-dcnode-id="3040"><strong data-dcnode-id="3042"><a data-dcnode-id="3043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/modafinil/"><span data-dcnode-id="3044" instrument_node="">Modafinil</span></a></strong><span data-dcnode-id="3041" instrument_node=""> (Provigil &amp; Nuvigil)</span></li><li data-dcnode-id="3035"><strong data-dcnode-id="3037"><a data-dcnode-id="3038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/nicotine/"><span data-dcnode-id="3039" instrument_node="">Nicotine</span></a></strong><span data-dcnode-id="3036" instrument_node=""> (Nicotrol)</span></li><li data-dcnode-id="3030"><strong data-dcnode-id="3032"><a data-dcnode-id="3033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/cocaine/"><span data-dcnode-id="3034" instrument_node="">Cocaine</span></a></strong><span data-dcnode-id="3031" instrument_node=""> (Neurocaine, Goprelto, Numbrino)</span></li><li data-dcnode-id="3025"><strong data-dcnode-id="3027"><a data-dcnode-id="3028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/caffeine/"><span data-dcnode-id="3029" instrument_node="">Caffeine</span></a></strong><span data-dcnode-id="3026" instrument_node=""> (Guaranine, Methyltheobromine, 1,3,7-Trimethylxanthine, Theine)</span></li></ul><span data-dcnode-id="3023" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3018"><figure class="aligncenter size-medium" data-dcnode-id="3019"><picture data-dcnode-id="3020"><source data-dcnode-id="3022" sizes="(max-width: 300px) 100vw, 300px" srcset="https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/dyanavel-xr-300x300.png.webp 300w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/dyanavel-xr-150x150.png.webp 150w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/dyanavel-xr-180x180.png.webp 180w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/dyanavel-xr-158x158.png.webp 158w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/dyanavel-xr-80x80.png.webp 80w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/dyanavel-xr-120x120.png.webp 120w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/dyanavel-xr-70x70.png.webp 70w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/dyanavel-xr-40x40.png.webp 40w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/dyanavel-xr-283x283.png.webp 283w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/dyanavel-xr-54x54.png.webp 54w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/dyanavel-xr-330x330.png.webp 330w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/dyanavel-xr-420x420.png.webp 420w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/dyanavel-xr-74x74.png.webp 74w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/dyanavel-xr-30x30.png.webp 30w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/dyanavel-xr.png.webp 500w" type="image/webp"><img alt="Dyanavel XR (amphetamine) pack. Medication used to treat attention deficit hyperactivity disorder" class="wp-image-34119 webpexpress-processed" data-dcnode-id="3021" height="300" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/wp-content/uploads/sites/7/2021/10/dyanavel-xr-300x300.png&amp;raw" srcset="https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/dyanavel-xr-300x300.png 300w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/dyanavel-xr-150x150.png 150w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/dyanavel-xr-180x180.png 180w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/dyanavel-xr-158x158.png 158w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/dyanavel-xr-80x80.png 80w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/dyanavel-xr-120x120.png 120w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/dyanavel-xr-70x70.png 70w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/dyanavel-xr-40x40.png 40w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/dyanavel-xr-283x283.png 283w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/dyanavel-xr-54x54.png 54w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/dyanavel-xr-330x330.png 330w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/dyanavel-xr-420x420.png 420w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/dyanavel-xr-74x74.png 74w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/dyanavel-xr-30x30.png 30w, https://dailycbd.com/en/wp-content/uploads/sites/7/2021/10/dyanavel-xr.png 500w" width="300"></picture></figure></div><span data-dcnode-id="3017" instrument_node="">
</span></div><div class="p_wrap" data-dcnode-id="2838"><amp-position-observer data-dcnode-id="3015" intersection-ratios="0" layout="nodisplay" on="scroll:h2-cbd-immunomodulators-10-offset.seekTo(percent=event.percent)"></amp-position-observer><h2 data-dcnode-id="3013" id="h2-cbd-immunomodulators-10"><span data-dcnode-id="3014" instrument_node="">CBD &amp; Immunomodulators</span></h2><span data-dcnode-id="3012" instrument_node="">
</span><p data-dcnode-id="3010"><span data-dcnode-id="3011" instrument_node="">Immunomodulators are drugs that interact with the immune system. Some increase immune activity, others suppress it. They’re used to block inflammation, treat allergic reactions, treat autoimmune disorders, or stimulate immune activity during infections or cancer therapy.</span></p><span data-dcnode-id="3009" instrument_node="">
</span><p data-dcnode-id="3007"><span data-dcnode-id="3008" instrument_node="">CBD has a strong correlation with the immune system but doesn’t interact with most immune system medications. A few exceptions include antihistamines and immunosuppressants.</span></p><span data-dcnode-id="3006" instrument_node="">
</span><h3 data-dcnode-id="3004" id="h3-antihistamines-cbd-1"><span data-dcnode-id="3005" instrument_node="">Antihistamines &amp; CBD</span></h3><span data-dcnode-id="3003" instrument_node="">
</span><ul data-dcnode-id="2994"><li data-dcnode-id="2999"><strong data-dcnode-id="3001"><span data-dcnode-id="3002" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="3000" instrument_node=""> ↑↑↑ Increased Effect(Agonistic)</span></li><li data-dcnode-id="2995"><strong data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">Severity:</span></strong><span data-dcnode-id="2996" instrument_node=""> Moderate</span></li></ul><span data-dcnode-id="2993" instrument_node="">
</span><p data-dcnode-id="2991"><span data-dcnode-id="2992" instrument_node="">Antihistamine medications are mainly used to treat allergic reactions. Histamine is a compound released by a special type of immune cell called mast cells.</span></p><span data-dcnode-id="2990" instrument_node="">
</span><p data-dcnode-id="2988"><span data-dcnode-id="2989" instrument_node="">These cells sit dormant until something triggers it (an allergen).</span></p><span data-dcnode-id="2987" instrument_node="">
</span><p data-dcnode-id="2985"><span data-dcnode-id="2986" instrument_node="">When they become active, mast cells burst open, releasing large amounts of histamine and other pro-inflammatory compounds. These compounds are what cause the symptoms we experience as an allergic reaction (runny nose, teary eyes, puffiness, itchiness, and sneezing or coughing).</span></p><span data-dcnode-id="2984" instrument_node="">
</span><p data-dcnode-id="2982"><span data-dcnode-id="2983" instrument_node="">One of the main side-effects of antihistamines is sedation. Histamine also plays a role in regulating mental alertness and stimulation, so blocking this compound can cause sedation and fatigue.</span></p><span data-dcnode-id="2981" instrument_node="">
</span><p data-dcnode-id="2976"><span data-dcnode-id="2980" instrument_node="">The </span><a data-dcnode-id="2978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/best-cbd/sleep/"><span data-dcnode-id="2979" instrument_node="">sedative and relaxing qualities of CBD</span></a><span data-dcnode-id="2977" instrument_node=""> may exaggerate the side effects of antihistamine drugs even further.</span></p><span data-dcnode-id="2975" instrument_node="">
</span><p data-dcnode-id="2973"><span data-dcnode-id="2974" instrument_node="">If you’re already experiencing the side effects of antihistamines, it’s wise to avoid using CBD. While this substance isn’t likely to result in any severe interactions, it’s likely to make the side effects you’re already experiencing even worse.</span></p><span data-dcnode-id="2972" instrument_node="">
</span><h4 data-dcnode-id="2970" id="h4-antihistamines-that-may-interact-with-cbd-1"><span data-dcnode-id="2971" instrument_node="">Antihistamines That May Interact With CBD</span></h4><span data-dcnode-id="2969" instrument_node="">

diphenhydramine/"><span data-dcnode-id="2935" instrument_node="">Diphenhydramine</span></a></strong><span data-dcnode-id="2932" instrument_node=""> (Benadryl)</span></li><li data-dcnode-id="2927"><strong data-dcnode-id="2929"><span data-dcnode-id="2930" instrument_node="">Fexofenadine</span></strong><span data-dcnode-id="2928" instrument_node=""> (Allegra)</span></li><li data-dcnode-id="2923"><strong data-dcnode-id="2925"><span data-dcnode-id="2926" instrument_node="">Loratadine</span></strong><span data-dcnode-id="2924" instrument_node=""> (Alavert &amp; Claritin)</span></li></ul><span data-dcnode-id="2921" instrument_node="">

</span><h3 data-dcnode-id="2913" id="h3-immunosuppressants-cbd-2"><span data-dcnode-id="2914" instrument_node="">Immunosuppressants &amp; CBD</span></h3><span data-dcnode-id="2912" instrument_node="">
</span><ul data-dcnode-id="2903"><li data-dcnode-id="2908"><strong data-dcnode-id="2910"><span data-dcnode-id="2911" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="2909" instrument_node=""> ↓↓↓ Decreased Effect (Antagonistic)</span></li><li data-dcnode-id="2904"><strong data-dcnode-id="2906"><span data-dcnode-id="2907" instrument_node="">Severity:</span></strong><span data-dcnode-id="2905" instrument_node=""> Severe</span></li></ul><span data-dcnode-id="2902" instrument_node="">
</span><p data-dcnode-id="2900"><span data-dcnode-id="2901" instrument_node="">CBD should never be used alongside immunosuppressants unless under direct recommendation by your prescribing doctor.</span></p><span data-dcnode-id="2899" instrument_node="">
</span><p data-dcnode-id="2897"><span data-dcnode-id="2898" instrument_node="">CBD has immune-stimulating properties, especially in people with suppressed immune function already. Taking CBD with immunosuppressants may counteract or negate the effects of immunosuppressant drugs. This can make the drugs ineffective, leading to a worsening of the underlying condition.</span></p><span data-dcnode-id="2896" instrument_node="">
</span><p data-dcnode-id="2894"><span data-dcnode-id="2895" instrument_node="">Since immunosuppressant medications are used for severe health conditions or to prevent rejection after an organ transplant — it can be very dangerous if the medications don’t work effectively.</span></p><span data-dcnode-id="2893" instrument_node="">
</span><h4 data-dcnode-id="2891" id="h4-immunosuppressants-that-may-interact-with-cbd-2"><span data-dcnode-id="2892" instrument_node="">Immunosuppressants That May Interact With CBD</span></h4><span data-dcnode-id="2890" instrument_node="">
</span><ul data-dcnode-id="2846"><li data-dcnode-id="2886"><strong data-dcnode-id="2888"><span data-dcnode-id="2889" instrument_node="">Azathioprine</span></strong><span data-dcnode-id="2887" instrument_node=""> (Imuran)</span></li><li data-dcnode-id="2879"><strong data-dcnode-id="2884"><span data-dcnode-id="2885" instrument_node="">Mycophenolate</span></strong><span data-dcnode-id="2883" instrument_node=""> </span><strong data-dcnode-id="2881"><span data-dcnode-id="2882" instrument_node="">Mofetil</span></strong><span data-dcnode-id="2880" instrument_node=""> (Cellcept)</span></li><li data-dcnode-id="2875"><strong data-dcnode-id="2877"><span data-dcnode-id="2878" instrument_node="">Cyclosporine</span></strong><span data-dcnode-id="2876" instrument_node=""> (Neoral, Sandimmune, Gengraf)</span></li><li data-dcnode-id="2871"><strong data-dcnode-id="2873"><span data-dcnode-id="2874" instrument_node="">Methotrexate</span></strong><span data-dcnode-id="2872" instrument_node=""> (Rheumatrex)</span></li><li data-dcnode-id="2867"><strong data-dcnode-id="2869"><span data-dcnode-id="2870" instrument_node="">Leflunomide</span></strong><span data-dcnode-id="2868" instrument_node=""> (Arava)</span></li><li data-dcnode-id="2862"><strong data-dcnode-id="2864"><a data-dcnode-id="2865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/prednisone/"><span data-dcnode-id="2866" instrument_node="">Prednisone</span></a></strong><span data-dcnode-id="2863" instrument_node=""> (Deltasone)</span></li><li data-dcnode-id="2858"><strong data-dcnode-id="2860"><span data-dcnode-id="2861" instrument_node="">Cyclophosphamide</span></strong><span data-dcnode-id="2859" instrument_node=""> (Cytoxan)</span></li><li data-dcnode-id="2854"><strong data-dcnode-id="2856"><span data-dcnode-id="2857" instrument_node="">Chlorambucil</span></strong><span data-dcnode-id="2855" instrument_node=""> (Leukeran)</span></li><li data-dcnode-id="2847"><strong 0"></picture></figure></div><span data-dcnode-id="2839" instrument_node="">
</span></div><div class="p_wrap" data-dcnode-id="2350"><amp-position-observer data-dcnode-id="2837" intersection-ratios="0" layout="nodisplay" on="scroll:h2-cbd-diabetes-medications-11-offset.seekTo(percent=event.percent)"></amp-position-observer><h2 data-dcnode-id="2835" id="h2-cbd-diabetes-medications-11"><span data-dcnode-id="2836" instrument_node="">CBD &amp; Diabetes Medications</span></h2><span data-dcnode-id="2834" instrument_node="">
</span><p data-dcnode-id="2829"><span data-dcnode-id="2833" instrument_node="">The CDC reports that roughly </span><a data-dcnode-id="2831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/diabetes/library/features/diabetes-stat-report.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2832" instrument_node="">1 in 10 Americans have been diagnosed with diabetes</span></a><span data-dcnode-id="2830" instrument_node=""> (2020). This makes diabetic medications one of the most common concerns for people looking to use CBD.</span></p><span data-dcnode-id="2828" instrument_node="">
</span><p data-dcnode-id="2826"><span data-dcnode-id="2827" instrument_node="">There are dozens of medications doctors can prescribe for managing diabetes, depending on the severity of the condition. Most of these medications won’t interact strongly with CBD directly — but it’s wise to start with a low dose of CBD when first starting to reduce the risk of negative interactions.</span></p><span data-dcnode-id="2825" instrument_node="">
</span><p data-dcnode-id="2821"><a data-dcnode-id="2823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/best-cbd/diabetes/"><span data-dcnode-id="2824" instrument_node="">CBD has some blood-sugar regulating effects</span></a><span data-dcnode-id="2822" instrument_node="">, which could cause blood pressure to drop too low when taking medications like Metformin or DPP-4 inhibitors. If blood pressure drops too low, it can lead to hypoglycemia and fainting — which can be dangerous.</span></p><span data-dcnode-id="2820" instrument_node="">
</span><p data-dcnode-id="2818"><span data-dcnode-id="2819" instrument_node="">Always speak with your doctor before using CBD if you’re taking anti-diabetic medications.</span></p><span data-dcnode-id="2817" instrument_node="">
</span><h3 data-dcnode-id="2815" id="h3-alphaglucosidase-inhibitors-1"><span data-dcnode-id="2816" instrument_node="">Alpha-Glucosidase Inhibitors</span></h3><span data-dcnode-id="2814" instrument_node="">
</span><ul data-dcnode-id="2805"><li data-dcnode-id="2810"><strong data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="2811" instrument_node=""> No significant interaction expected (mild agonistic effect possible)</span></li><li data-dcnode-id="2806"><strong data-dcnode-id="2808"><span data-dcnode-id="2809" instrument_node="">Severity:</span></strong><span data-dcnode-id="2807" instrument_node=""> Mild</span></li></ul><span data-dcnode-id="2804" instrument_node="">
</span><p data-dcnode-id="2802"><span data-dcnode-id="2803" instrument_node="">Alpha-glucosidase is an enzyme in the digestive system responsible for breaking down sugars so they can be absorbed. These medications are used to block the effects of this enzyme and reduce the amount of sugar that can enter the bloodstream.</span></p><span data-dcnode-id="2801" instrument_node="">
</span><p data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">CBD is unlikely to have a strong reaction to these medications. There’s a slight risk of the interaction, causing blood sugar levels to dip too low due to similar effects on blood sugar. It’s also possible that the absorption of CBD is affected when taking alpha-glucosidase inhibitors at the same time, leading to reduced effectiveness of the CBD.</span></p><span data-dcnode-id="2798" instrument_node="">
</span><h4 data-dcnode-id="2796" id="h4-alphaglucosidase-inhibitors-that-may-interact-with-cbd-1"><span data-dcnode-id="2797" instrument_node="">Alpha-glucosidase Inhibitors That May Interact With CBD</span></h4><span data-dcnode-id="2795" instrument_node="">
</span><ul data-dcnode-id="2786"><li data-dcnode-id="2791"><strong data-dcnode-id="2793"><span data-dcnode-id="2794" instrument_node="">Acarbose</span></strong><span data-dcnode-id="2792" instrument_node=""> (Precose)</span></li><li data-dcnode-id="2787"><strong data-dcnode-id="2789"><span data-dcnode-id="2790" instrument_node="">Miglitol</span></strong><span data-dcnode-id="2788" instrument_node=""> (Glyset)</span></li></ul><span data-dcnode-id="2785" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2780"><figure class="aligncenter size-medium" data-dcnode-id="2781"><picture data-dcnode-id="2782"><source data-dcnode-id="2784" sizes="(max-width: 300px) 100vw, 300px" srcset="https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/glyset-300x300.png.webp 300w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/glyset-150x150.png.webp 150w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/glyset-768x768.png.webp 768w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/glyset-180x180.png.webp 180w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/glyset-158x158.png.webp 158w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/glyset-80x80.png.webp 80w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/glyset-120x120.png.webp 120w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/glyset-70x70.png.webp 70w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/glyset-40x40.png.webp 40w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/glyset-283x283.png.webp 283w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/glyset-54x54.png.webp 54w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/glyset-330x330.png.webp 330w, https://dailycbd.com/en/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/sites/7/2021/10/glyset-420x420.png.webp 420w, https://dailycbd.com/en/wp-content/webp-ex 0"></picture></figure></div><span data-dcnode-id="2779" instrument_node="">
</span><h3 data-dcnode-id="2777" id="h3-biguanides-cbd-2"><span data-dcnode-id="2778" instrument_node="">Biguanides &amp; CBD</span></h3><span data-dcnode-id="2776" instrument_node="">
</span><ul data-dcnode-id="2767"><li data-dcnode-id="2772"><strong data-dcnode-id="2774"><span data-dcnode-id="2775" instrument_node="">Type of Interaction:</span></strong><span data-dcnode-id="2773" instrument_node=""> ↑↑↑ Increased Effect (Agonistic)</span></li><li data-dcnode-id="2768"><strong data-dcnode-id="2770"><span data-dcnode-id="2771" instrument_node="">Severity:</span></strong><span data-dcnode-id="2769" instrument_node=""> Mild</span></li></ul><span data-dcnode-id="2766" instrument_node="">
</span><p data-dcnode-id="2764"><span data-dcnode-id="2765" instrument_node="">There’s only one biguanide on the market today — called Metformin — which is not only the most common treatment for type II diabetes, it’s one of the most commonly prescribed medications in the world.</span></p><span data-dcnode-id="2763" instrument_node="">
</span><p data-dcnode-id="2761"><span data-dcnode-id="2762" instrument_node="">Metformin works by blocking glucose production in the liver to reduce blood sugar levels and increase the sensitivity (effectiveness) of insulin in the body.</span></p><span data-dcnode-id="2760" instrument_node="">
</span><p data-dcnode-id="2758"><span data-dcnode-id="2759" instrument_node="">There are two potential interactions between CBD and Metformin;</span></p><span data-dcnode-id="2757" instrument_node="">
</span><p data-dcnode-id="2755"><span data-dcnode-id="2756" instrument_node="">They both compete for the same liver enzymes (primarily CYP3A4), which could lead to increased concentrations of both substances taken in tandem.</span></p><span data-dcnode-id="2754" instrument_node="">
</span><p data-dcnode-id="2752"><span data-dcnode-id="2753" instrument_node="">The second interaction involves the effects of both substances on blood sugar levels. Both Metformin and CBD lead to an overall reduction in blood glucose — though they achieve this through completely different mechanisms.</span></p><span data-dcnode-id="2751" instrument_node="">
</span><p data-dcnode-id="2749"><span data-dcnode-id="2750" instrument_node="">It’s possible for CBD and Metformin to lead to hypoglycemia when used together.</span></p><span data-dcnode-id="2748" instrument_node="">
</span><p data-dcnode-id="2746"><span data-dcnode-id="2747" instrument_node="">With that said, many people take CBD with their Metformin without any side effects. Some reports even suggest CBD and Metformin have a positive interaction — leading to even better results when combined.</span></p><span data-dcnode-id="2745" instrument_node="">
</span><p data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">The risk of this interaction is low but not nonexistent. You should always ask your doctor about CBD before you take it if you’re using Metformin to treat your diabetes.</span></p><span data-dcnode-id="2742" instrument_node="">
</span><h4 data-dcnode-id="2740" id="h4-biguanides-that-may-interact-with-cbd-2"><span data-dcnode-id="2741" instrument_node="">Biguanides That May Interact With CBD</span></h4><span data-dcnode-id="2739" instrument_node="">
</span><ul data-dcnode-id="2733"><li data-dcnode-id="2734"><strong data-dcnode-id="2736"><a data-dcnode-id="2737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycbd.com/en/drug-interactions/metformin/"><span data-dcnode-id="2738" instrument_node="">Metformin</span></a></strong><span data-dcnode-id="2735" instrument_node=""> (Kazano, Invokamet, Xigduo XR, Synjardy, Glucovance, Jentadueto, Actoplus, PrandiMet, Avandamet, Kombiglyze XR, &amp; Janumet)</span></li></ul><span data-dcnode-id="2732" instrument_node="">
