</span><div class="single-text entry-content" data-dcnode-id="848"><span data-dcnode-id="1130" instrument_node=""> </span><p data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">The use of vitamin B17 is controversial but potentially beneficial in certain ways for human health.</span></p><span data-dcnode-id="1127" instrument_node=""> </span><h2 data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">What is Vitamin B17?</span></h2><span data-dcnode-id="1124" instrument_node=""> </span><p data-dcnode-id="1107"><span data-dcnode-id="1123" instrument_node="">Vitamin B17 is more commonly known as amygdalin, which is a chemical compound found in certain foods, most famously the pits of </span><a class="of-internal-link" data-dcnode-id="1121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/fruit/apricots.html"><span data-dcnode-id="1122" instrument_node="">apricots</span></a><span data-dcnode-id="1120" instrument_node="">, as well as </span><a class="of-internal-link" data-dcnode-id="1118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/fruit/health-benefits-of-apple.html"><span data-dcnode-id="1119" instrument_node="">apple</span></a><span data-dcnode-id="1117" instrument_node="">, </span><a class="of-internal-link" data-dcnode-id="1115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/fruit/pears.html"><span data-dcnode-id="1116" instrument_node="">pear</span></a><span data-dcnode-id="1114" instrument_node="">, </span><a class="of-internal-link" data-dcnode-id="1112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/fruit/health-benefits-of-plums.html"><span data-dcnode-id="1113" instrument_node="">plum</span></a><span data-dcnode-id="1111" instrument_node="">, and </span><a class="of-internal-link" data-dcnode-id="1109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/fruit/health-benefits-of-peach.html"><span data-dcnode-id="1110" instrument_node="">peach</span></a><span data-dcnode-id="1108" instrument_node=""> seeds. The reason that amygdalin is so well known is that it can partially be broken down into cyanide within the body, which can be potentially toxic, so excessive consumption of amygdalin is not recommended. However, it has also been used widely in traditional and more modern medical practices for the treatment of certain&nbsp;chronic illnesses.</span></p><span data-dcnode-id="1106" instrument_node=""> </span><div class="code-block code-block-11" data-dcnode-id="1099" style="margin: 16px 12px 8px 0; float: left; width: 336px; height: 280px;"><span data-dcnode-id="1105" instrument_node=""> </span><div data-dcnode-id="1104" data-fuse="22453978188"></div><span data-dcnode-id="1103" instrument_node=""> </span><span data-dcnode-id="1100" instrument_node=""> </span></div><span data-dcnode-id="1098" instrument_node=""> </span><p data-dcnode-id="1083"><span data-dcnode-id="1097" instrument_node="">However, there is a great deal of controversy surrounding vitamin B17, even regarding its classification as a vitamin. Many people also mistake vitamin B17 for&nbsp;laetrile, which is a synthetic variety of amygdalin. It is known for its controversial treatment of cancer. However, more </span><a data-dcnode-id="1095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK65988/" rel="external nofollow" target="_blank"><span data-dcnode-id="1096" instrument_node="">research </span></a><span data-dcnode-id="1094" instrument_node="">studies are required to corroborate the claim.</span><span class="ref-cite-link" data-dcnode-id="1089"><span data-dcnode-id="1093" instrument_node=""> </span><a data-dcnode-id="1090" data-index="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jamanetwork.com/journals/jama/article-abstract/348189%3Fredirect%3Dtrue"><sup data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">[1]</span></sup></a></span><span class="ref-cite-link" data-dcnode-id="1084"><span data-dcnode-id="1088" instrument_node=""> </span><a data-dcnode-id="1085" data-index="2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK65988/"><sup data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">[2]</span></sup></a></span></p><span data-dcnode-id="1082" instrument_node=""> </span><p data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">A study published in the Interdisciplinary Journal of Contemporary Research states that the main reason why this is considered effective for cancer is the production of hydrogen cyanide, that, according to the researcher, when given in small doses, can seek out cancerous cells while leaving other cells unharmed. This hasn’t been strongly corroborated by evidence, and in fact, has largely been disproved, but people still want to try this supposed miracle cure.</span></p><span data-dcnode-id="1079" instrument_node=""> </span><p data-dcnode-id="1072"><span data-dcnode-id="1078" instrument_node="">Due to the increase in demand for apricot kernels and the elevated risk for cyanide poisoning in those attempting to naturally heal themselves with amygdalin, vitamin B17 was deemed to be illegal in the United States in 1977. More specifically, it was cited that many of the claims were unfounded, and the risk of cyanide poisoning was too great. That being said, the debate over these supplements continues to this day, and it continues to be used in some cancer treatment programs in other parts of the world.</span><span class="ref-cite-link" data-dcnode-id="1073"><span data-dcnode-id="1077" instrument_node=""> </span><a data-dcnode-id="1074" data-index="3" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1129741/"><sup data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">[3]</span></sup></a></span></p><span data-dcnode-id="1071" instrument_node=""> </span><div class="wp-caption alignnone" data-dcnode-id="1067" id="attachment_113616" style="width: 710px"><img alt="A heart shape made using almonds, a white paper with text &quot;vitamin B17&quot; on it and stethoscope on a wooden paper" aria-describedby="caption-attachment-113616" class="wp-image-113616 size-full lazy keep-away" data-dcnode-id="1070" data-src="https://www.organicfacts.net/wp-content/uploads/vitaminb17.jpg" data-srcset="https://www.organicfacts.net/wp-content/uploads/vitaminb17.jpg 700w, https://www.organicfacts.net/wp-content/uploads/vitaminb17-320x240.jpg 320w, https://www.organicfacts.net/wp-content/uploads/vitaminb17-160x120.jpg 160w" height="525" sizes="(max-width: 700px) 100vw, 700px" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20700%20525'%3E%3C/svg%3E" srcset="https://www.organicfacts.net/wp-content/uploads/vitaminb17.jpg 700w, https://www.organicfacts.net/wp-content/uploads/vitaminb17-320x240.jpg 320w, https://www.organicfacts.net/wp-content/uploads/vitaminb17-160x120.jpg 160w" title="A heart shape made using almonds, a white paper with text &quot;vitamin B17&quot; on it and stethoscope on a wooden paper" width="700"><p class="wp-caption-text" data-dcnode-id="1068" id="caption-attachment-113616"><span data-dcnode-id="1069" instrument_node="">VitaminB17 Photo Credit: Shutterstock</span></p></div><span data-dcnode-id="1066" instrument_node=""> </span><h2 data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Vitamin B17 Benefits</span></h2><span data-dcnode-id="1063" instrument_node=""> </span><p data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">The potential benefits from vitamin B17, when taken in moderation include a reduction in blood pressure, a boosted immune system, relief from pain, and its supposed anticancer potential among others.</span></p><span data-dcnode-id="1060" instrument_node=""> </span><h3 data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Blood Pressure</span></h3><span data-dcnode-id="1057" instrument_node=""> </span><p data-dcnode-id="1044"><span data-dcnode-id="1056" instrument_node="">Some of the active compounds in vitamin B17 (amygdalin) do have other effects in the body, such as the production of thiocyanate, a well-known compound that can suppress the blood pressure. For those people suffering from hypertension, this can be an excellent way to keep your blood pressure in check and lower your risk of </span><a class="of-internal-link" data-dcnode-id="1054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/home-remedies/atherosclerosis.html"><span data-dcnode-id="1055" instrument_node="">atherosclerosis</span></a><span data-dcnode-id="1053" instrument_node="">, </span><a class="of-internal-link" data-dcnode-id="1051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/home-remedies/15-best-foods-for-a-healthy-heart.html"><span data-dcnode-id="1052" instrument_node="">heart</span></a><span data-dcnode-id="1050" instrument_node=""> attacks, stroke, and coronary heart diseases.</span><span class="ref-cite-link" data-dcnode-id="1045"><span data-dcnode-id="1049" instrument_node=""> </span><a data-dcnode-id="1046" data-index="4" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cancercure.ws/nitriloside.htm"><sup data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">[4]</span></sup></a></span></p><span data-dcnode-id="1043" instrument_node=""> </span><h3 data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Anticancer Potential</span></h3><span data-dcnode-id="1040" instrument_node=""> </span><p data-dcnode-id="1030"><span data-dcnode-id="1039" instrument_node="">This is the most controversial aspect of this vitamin since it is praised by some and denounced by others as an effective approach to cancer. While many experts say that it has little to no effect, leading to the banning of this substance in the United States, other more natural or holistic practitioners continue to use this vitamin in other parts of the world, claiming that the hydrogen cyanide is able to counter the effects of cancerous cells and neutralize them. Dr. Ramalingam, Vani Jaiswal (et al.), published a study in the Biochemistry and Biophysics Report, which stated that Vitamin 17 in certain doses can be the next step in cancer therapy, however, it should be administered through IV and not oral as the latter can result in toxicity. Studies are still ongoing to prove Vitamin 17’s role in reducing the </span><a class="of-internal-link" data-dcnode-id="1037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/home-remedies/15-ways-to-reduce-your-risk-of-cancer.html"><span data-dcnode-id="1038" instrument_node="">risk of cancer</span></a><span data-dcnode-id="1036" instrument_node="">.</span><span class="ref-cite-link" data-dcnode-id="1031"><span data-dcnode-id="1035" instrument_node=""> </span><a data-dcnode-id="1032" data-index="5" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5986699/"><sup data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">[5]</span></sup></a></span></p><span data-dcnode-id="1029" instrument_node=""> </span><h3 data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Immune System</span></h3><span data-dcnode-id="1026" instrument_node=""> </span><p data-dcnode-id="1019"><span data-dcnode-id="1025" instrument_node="">There is some evidence that tightly controlled use of this vitamin, particularly when acquired through natural sources, can help to boost your immune system and prevent a variety of infections and ailments.</span><span class="ref-cite-link" data-dcnode-id="1020"><span data-dcnode-id="1024" instrument_node=""> </span><a data-dcnode-id="1021" data-index="6" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//onlinelibrary.wiley.com/doi/10.1111/j.1365-2354.2007.00786.x/full"><sup data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">[6]</span></sup></a></span></p><span data-dcnode-id="1018" instrument_node=""> </span><h3 data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">Analgesic</span></h3><span data-dcnode-id="1015" instrument_node=""> </span><p data-dcnode-id="1008"><span data-dcnode-id="1014" instrument_node="">According to a report published in the Journal of Cancer Research and Therapeutics (August 2014), amygdalin&nbsp;is a promising antitumor drug. This vitamin (amygdalin) has been used in traditional medicine to soothe pain and is also known to lower the pain experienced during cancer and chemotherapy&nbsp;treatment.&nbsp;Again, the dose and efficacy are in question and further research is being undertaken to ascertain its use in reducing the progression and risk of cancer.</span><span class="ref-cite-link" data-dcnode-id="1009"><span data-dcnode-id="1013" instrument_node=""> </span><a data-dcnode-id="1010" data-index="7" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/25207888"><sup data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">[7]</span></sup></a></span></p><span data-dcnode-id="1007" instrument_node=""> </span><div class="code-block code-block-12" data-dcnode-id="1000" style="margin: 16px 12px 8px 0; float: left; width: 336px; height: 280px;"><span data-dcnode-id="1006" instrument_node=""> </span><div data-dcnode-id="1005" data-fuse="22453978194"></div><span data-dcnode-id="1004" instrument_node=""> </span><span data-dcnode-id="1001" instrument_node=""> </span></div><span data-dcnode-id="999" instrument_node=""> </span><h2 data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Vitamin B17 Sources</span></h2><span data-dcnode-id="996" instrument_node=""> </span><p data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">The primary source of B17 includes certain kernels and seeds of popular fruits that include:</span></p><span data-dcnode-id="993" instrument_node=""> </span><ul data-dcnode-id="976"><span data-dcnode-id="992" instrument_node=""> </span><li data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Apricots</span></li><span data-dcnode-id="989" instrument_node=""> </span><li data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Pears</span></li><span data-dcnode-id="986" instrument_node=""> </span><li data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Apples</span></li><span data-dcnode-id="983" instrument_node=""> </span><li data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Peaches</span></li><span data-dcnode-id="980" instrument_node=""> </span><li data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">Plums</span></li><span data-dcnode-id="977" instrument_node=""> </span></ul><span data-dcnode-id="975" instrument_node=""> </span><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">And this vitamin can be found in limited supply in other foods such as:</span></p><span data-dcnode-id="972" instrument_node=""> </span><ul data-dcnode-id="935"><span data-dcnode-id="971" instrument_node=""> </span><li data-dcnode-id="967"><a class="of-internal-link" data-dcnode-id="969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/cereal/health-benefits-of-millet.html"><span data-dcnode-id="970" instrument_node="">Millet</span></a><span data-dcnode-id="968" instrument_node=""> seeds</span></li><span data-dcnode-id="966" instrument_node=""> </span><li data-dcnode-id="963"><a class="of-internal-link" data-dcnode-id="964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/seed-and-nut/health-benefits-of-flaxseed.html"><span data-dcnode-id="965" instrument_node="">Flaxseeds</span></a></li><span data-dcnode-id="962" instrument_node=""> </span><li data-dcnode-id="958"><a class="of-internal-link" data-dcnode-id="960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/buckwheat.html"><span data-dcnode-id="961" instrument_node="">Buckwheat</span></a><span data-dcnode-id="959" instrument_node=""> seeds</span></li><span data-dcnode-id="957" instrument_node=""> </span><li data-dcnode-id="953"><a class="of-internal-link" data-dcnode-id="955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/fruit/squash.html"><span data-dcnode-id="956" instrument_node="">Squash</span></a><span data-dcnode-id="954" instrument_node=""> seeds</span></li><span data-dcnode-id="952" instrument_node=""> </span><li data-dcnode-id="949"><a class="of-internal-link" data-dcnode-id="950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/fruit/health-benefits-of-raspberry.html"><span data-dcnode-id="951" instrument_node="">Raspberries</span></a></li><span data-dcnode-id="948" instrument_node=""> </span><li data-dcnode-id="945"><a class="of-internal-link" data-dcnode-id="946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/fruit/health-benefits-of-blueberries.html"><span data-dcnode-id="947" instrument_node="">Blueberries</span></a></li><span data-dcnode-id="944" instrument_node=""> </span><li data-dcnode-id="941"><a class="of-internal-link" data-dcnode-id="942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/fruit/blackberries.html"><span data-dcnode-id="943" instrument_node="">Blackberries</span></a></li><span data-dcnode-id="940" instrument_node=""> </span><li data-dcnode-id="937"><a class="of-internal-link" data-dcnode-id="938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/fruit/strawberries.html"><span data-dcnode-id="939" instrument_node="">Strawberries</span></a></li><span data-dcnode-id="936" instrument_node=""> </span></ul><span data-dcnode-id="934" instrument_node=""> </span><p data-dcnode-id="915"><span data-dcnode-id="933" instrument_node="">Finally, seek out small amounts of amygdalin in </span><a class="of-internal-link" data-dcnode-id="931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/herbs-and-spices/eucalyptus.html"><span data-dcnode-id="932" instrument_node="">eucalyptus</span></a><span data-dcnode-id="930" instrument_node=""> leaves and the </span><a class="of-internal-link" data-dcnode-id="928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/seed-and-nut/sprouts.html"><span data-dcnode-id="929" instrument_node="">sprouts</span></a><span data-dcnode-id="927" instrument_node=""> of various plants, such as bamboo, </span><a class="of-internal-link" data-dcnode-id="925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/fava-beans.html"><span data-dcnode-id="926" instrument_node="">fava beans</span></a><span data-dcnode-id="924" instrument_node="">, </span><a class="of-internal-link" data-dcnode-id="922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/other/alfalfa.html"><span data-dcnode-id="923" instrument_node="">alfalfa</span></a><span data-dcnode-id="921" instrument_node="">, and mung beans.</span><span class="ref-cite-link" data-dcnode-id="916"><span data-dcnode-id="920" instrument_node=""> </span><a data-dcnode-id="917" data-index="8" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/0305197895974556"><sup data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">[8]</span></sup></a></span></p><span data-dcnode-id="914" instrument_node=""> </span><p data-dcnode-id="904"><span data-dcnode-id="913" instrument_node="">When you access vitamin B17 from natural sources, it is believed to be safer than using it in the form of supplements. This is because the cancer-fighting activities and other benefits will come in smaller forms, without the risk of cyanide toxicity. There is a reason that many of the foods where vitamin B17 can be found are also linked to cancer treatment or prevention. However, avoid&nbsp;eating&nbsp;these foods containing amygdalin if you&nbsp;are taking </span><a class="of-internal-link" data-dcnode-id="911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/vitamins/stocking-up-on-vitamin-b-rich-foods.html"><span data-dcnode-id="912" instrument_node="">Vitamin B</span></a><span data-dcnode-id="910" instrument_node=""> 17 tablets, says a report in Cancer Research UK.</span><span class="ref-cite-link" data-dcnode-id="905"><span data-dcnode-id="909" instrument_node=""> </span><a data-dcnode-id="906" data-index="9" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancerresearchuk.org/about-cancer/cancer-in-general/treatment/complementary-alternative-therapies/individual-therapies/laetrile"><sup data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">[9]</span></sup></a></span></p><span data-dcnode-id="903" instrument_node=""> </span><p data-dcnode-id="900"><strong data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Vitamin B17 Side Effects</span></strong></p><span data-dcnode-id="899" instrument_node=""> </span><p data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">There are some potentially dangerous (and deadly) side effects of vitamin B17, so it should be taken seriously, and moderation is absolutely essential. As mentioned above, vitamin B17 is another name for amygdalin, which is a cyanogenic glycoside. This means that it can be converted into hydrogen cyanide in the body, which is an extremely potent toxin.</span></p><span data-dcnode-id="896" instrument_node=""> </span><p data-dcnode-id="889"><span data-dcnode-id="895" instrument_node="">Cyanide&nbsp;poisoning has many unpleasant side effects that include:</span><span class="ref-cite-link" data-dcnode-id="890"><span data-dcnode-id="894" instrument_node=""> </span><a data-dcnode-id="891" data-index="10" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//europepmc.org/abstract/med/3530615"><sup data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">[10]</span></sup></a></span></p><span data-dcnode-id="888" instrument_node=""> </span><ul data-dcnode-id="862"><span data-dcnode-id="887" instrument_node=""> </span><li data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Weakness</span></li><span data-dcnode-id="884" instrument_node=""> </span><li data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Confusion</span></li><span data-dcnode-id="881" instrument_node=""> </span><li data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Sleep disorders</span></li><span data-dcnode-id="878" instrument_node=""> </span><li data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Headaches</span></li><span data-dcnode-id="875" instrument_node=""> </span><li data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">Shortness of breath</span></li><span data-dcnode-id="872" instrument_node=""> </span><li data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Dizziness</span></li><span data-dcnode-id="869" instrument_node=""> </span><li data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Abdominal pain</span></li><span data-dcnode-id="866" instrument_node=""> </span><li data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Nausea, and vomiting</span></li><span data-dcnode-id="863" instrument_node=""> </span></ul><span data-dcnode-id="861" instrument_node=""> </span><p data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Some people also report suicidal thoughts or nervous system impairment. If an excessive amount of hydrogen cyanide is produced in the body, it can be fatal.</span></p><span data-dcnode-id="858" instrument_node=""> </span><p data-dcnode-id="851"><span data-dcnode-id="857" instrument_node="">These side effects have led many people, particularly in the US, to completely dismiss the potential use of vitamin B17&nbsp;in reducing the risk of cancer or any other disease in any concentration. The book, Social Science &amp; Medicine. Part A: Medical Psychology &amp; Medical Sociology, co-authored by Gerald E.Markle and James C Peterson, states that the debate continues to rage on over the use, existence, and classification of vitamin B17. Depending on where you are in the world, you may be able to access it or hear different opinions from qualified doctors. The best advice you can follow is, if you use it, always practice extreme moderation that too under a doctor’s supervision.</span><span class="ref-cite-link" data-dcnode-id="852"><span data-dcnode-id="856" instrument_node=""> </span><a data-dcnode-id="853" data-index="11" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/0271712378900202"><sup data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">[11]</span></sup></a></span></p><span data-dcnode-id="849" instrument_node="">
</span></div><span data-dcnode-id="847" instrument_node="">

-cat="read-next" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/vitamins/vitamin-b1-or-thiamine.html"><img alt="Foods rich in vitamin B1 or thiamin (Milk, bread, beef, eggs, rice, oats, seeds, legumes) on a wooden table" data-dcnode-id="751" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/wp-content/uploads/thiamin-320x240.jpg&amp;raw" title="thiamin"></a></div><div class="col-md-9 read-next-content" data-dcnode-id="741"><a data-dcnode-id="746" data-ga-cat="read-next" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/vitamins/vitamin-b1-or-thiamine.html"><div class="read-next-post-title mt-0" data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">11 Impressive Vitamin B1 (Thiamine) Benefits</span></div></a><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Vitamin B1 or Thiamine plays a key role in maintaining a healthy nervous system and improving the cardiovascular health. It also improves appetite and prevents cataracts.</span></p><a data-dcnode-id="742" data-ga-cat="read-next" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/vitamins/vitamin-b1-or-thiamine.html"><span data-dcnode-id="743" instrument_node="">READ MORE</span></a></div></div><div class="row my-3" data-dcnode-id="728"><div class="col-md-3 read-next-img" data-dcnode-id="737"><a data-dcnode-id="738" data-ga-cat="read-next" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/vitamins/health-benefits-of-vitamin-b2-or-riboflavin.html"><img alt="Foods rich in vitamin B2 or riboflavin (Slices of beef, pork, and fish, mushrooms, almonds, eggs, sliced cheese, spinach, and a mug of milk) on a wooden table" data-dcnode-id="739" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/wp-content/uploads/riboflavin-320x240.jpg&amp;raw" title="riboflavin"></a></div><div class="col-md-9 read-next-content" data-dcnode-id="729"><a data-dcnode-id="734" data-ga-cat="read-next" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/vitamins/health-benefits-of-vitamin-b2-or-riboflavin.html"><div class="read-next-post-title mt-0" data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">13 Impressive Benefits of Riboflavin (Vitamin B2)</span></div></a><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Riboflavin or vitamin B2 aids in energy production, boosts the immune system, improves digestion, prevents acne, strengthens digestion, and protects the nervous system.</span></p><a data-dcnode-id="730" data-ga-cat="read-next" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/vitamins/health-benefits-of-vitamin-b2-or-riboflavin.html"><span data-dcnode-id="731" instrument_node="">READ MORE</span></a></div></div><div class="row my-3" data-dcnode-id="716"><div class="col-md-3 read-next-img" data-dcnode-id="725"><a data-dcnode-id="726" data-ga-cat="read-next" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/vitamin-d3.html"><img alt="Vitamin D3 written on a screen with ginger, tablets, and lemon on the top " data-dcnode-id="727" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/wp-content/uploads/vitamind3-320x240.jpg&amp;raw" title="vitamind3"></a></div><div class="col-md-9 read-next-content" data-dcnode-id="717"><a data-dcnode-id="722" data-ga-cat="read-next" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/vitamin-d3.html"><div class="read-next-post-title mt-0" data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">4 Surprising Benefits of Vitamin D3</span></div></a><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Benefits of vitamin D3 include improved bone density and brain health, strengthened immune system, weight loss, lower risk of Alzheimer's disease and autoimmune diseases</span></p><a data-dcnode-id="718" data-ga-cat="read-next" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/vitamin-d3.html"><span data-dcnode-id="719" instrument_node="">READ MORE</span></a></div></div><div class="row my-3" data-dcnode-id="704"><div class="col-md-3 read-next-img" data-dcnode-id="713"><a data-dcnode-id="714" data-ga-cat="read-next" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/vitamins/health-benefits-of-vitamin-c-or-ascorbic-acid.html"><img alt="Foods rich in vitamin C (whole and halved sweet limes, red and yellow chili pepper, red cherries) with glasses of sweet lime juice and cherries on a wooden table" data-dcnode-id="715" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/wp-content/uploads/vitaminc-320x240.jpg&amp;raw" title="vitaminc"></a></div><div class="col-md-9 read-next-content" data-dcnode-id="705"><a data-dcnode-id="710" data-ga-cat="read-next" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/vitamins/health-benefits-of-vitamin-c-or-ascorbic-acid.html"><div class="read-next-post-title mt-0" data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">11 Amazing Vitamin C (Ascorbic Acid) Benefits</span></div></a><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Vitamin C (ascorbic acid) helps to prevent &amp; treat scurvy, give relief from asthma, &amp; cold, boost immunity, treat lead toxicity, heal wounds, &amp; maintain skin elasticity.</span></p><a data-dcnode-id="706" data-ga-cat="read-next" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.organicfacts.net/health-benefits/vitamins/health-benefits-of-vitamin-c-or-ascorbic-acid.html"><span data-dcnode-id="707" instrument_node="">READ MORE</span></a></div></div></div></div><span data-dcnode-id="701" instrument_node="">
