data-dcnode-id="1031"><p class="p1" data-dcnode-id="2194"><span class="s1" data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">Cloves are enjoyed in many different type of cuisines from a South Asian rice pulao to a holiday ham in the West. The versatility of cloves shows in their adaption to baked goods as well as cold drinks like a sangria. Growing as flower buds on the tree, cloves are a multipurpose cooking spice used to excite numerous dishes and beverages. Known for their fresh yet sweet flavour cloves have made their way into many cultural dishes and remedies. Besides their exotic profile, cloves contain potent phytonutrients which have been extensively used as natural medicines by many generations. In this article, we’ll discuss this special ingredient and its abilities to improve all types of cooking creations as well as health.</span></span></p><p data-dcnode-id="2190"><noscript data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">&lt;img   alt="cloves and malt wine tea " width="1000" height="541" data-srcset="https://secureservercdn.net/198.71.233.202/z6x.a4f.myftpupload.com/wp-content/uploads/2018/09/cloves_malt_wine-200x108.jpg 200w, https://secureservercdn.net/198.71.233.202/z6x.a4f.myftpupload.com/wp-content/uploads/2018/09/cloves_malt_wine-300x162.jpg 300w, https://secureservercdn.net/198.71.233.202/z6x.a4f.myftpupload.com/wp-content/uploads/2018/09/cloves_malt_wine-400x216.jpg 400w, https://secureservercdn.net/198.71.233.202/z6x.a4f.myftpupload.com/wp-content/uploads/2018/09/cloves_malt_wine-500x271.jpg 500w, https://secureservercdn.net/198.71.233.202/z6x.a4f.myftpupload.com/wp-content/uploads/2018/09/cloves_malt_wine-600x325.jpg 600w, https://secureservercdn.net/198.71.233.202/z6x.a4f.myftpupload.com/wp-content/uploads/2018/09/cloves_malt_wine-700x379.jpg 700w, https://secureservercdn.net/198.71.233.202/z6x.a4f.myftpupload.com/wp-content/uploads/2018/09/cloves_malt_wine-768x415.jpg 768w, https://secureservercdn.net/ ></noscript><img alt="cloves and malt wine tea " class="lazyload aligncenter size-full wp-image-18750" data-dcnode-id="2191" data-sizes="(max-width: 1000px) 100vw, 1000px" data-src="https://secureservercdn.net/198.71.233.202/z6x.a4f.myftpupload.com/wp-content/uploads/2018/09/cloves_malt_wine.jpg" data-srcset="https://secureservercdn.net/198.71.233.202/z6x.a4f.myftpupload.com/wp-content/uploads/2018/09/cloves_malt_wine-200x108.jpg 200w, https://secureservercdn.net/198.71.233.202/z6x.a4f.myftpupload.com/wp-content/uploads/2018/09/cloves_malt_wine-300x162.jpg 300w, https://secureservercdn.net/198.71.233.202/z6x.a4f.myftpupload.com/wp-content/uploads/2018/09/cloves_malt_wine-400x216.jpg 400w, https://secureservercdn.net/198.71.233.202/z6x.a4f.myftpupload.com/wp-content/uploads/2018/09/cloves_malt_wine-500x271.jpg 500w, https://secureservercdn.net/198.71.233.202/z6x.a4f.myftpupload.com/wp-content/uploads/2018/09/cloves_malt_wine-600x325.jpg 600w, https://secureservercdn.net/198.71.233.202/z6x.a4f.myftpupload.com/wp-content/uploads/2018/09/cloves_malt_wine-700x379.jpg 700w, https://secureservercdn.net/198.71.233.202/z6x.a4f.myftpupload.com/wp-content/uploads/2018/09/cloves_malt_wine-768x415.jpg 768w, https://secureservercdn.net/198.71.233.202/z6x.a4f.myftpupload.com/wp-content/uploads/2018/09/cloves_malt_wine-800x433.jpg 800w, https://secureservercdn.net/198.71.233.202/z6x.a4f.myftpupload.com/wp-content/uploads/2018/09/cloves_malt_wine.jpg 1000w" height="541" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%201000%20541%22%3E%3C/svg%3E" width="1000"></p><h1 class="p3" data-dcnode-id="2186"><span class="s1" data-dcnode-id="2187"><b data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">What are Cloves?</span></b></span></h1><p class="p1" data-dcnode-id="2183"><span class="s1" data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">Cloves are small flower buds of a tree that have a unique aroma and taste, making it one of the versatile spices used around the globe.</span></span></p><p class="p1" data-dcnode-id="2180"><span class="s1" data-dcnode-id="2181"><span data-dcnode-id="2182" instrument_node="">The clove tree is indigenous to several Asian and East African countries. The product seen in grocery stores are the dried flower buds of the clove tree known as Syzygium aromaticum, which originated from Maluku Islands in Indonesia. It belongs to the plant family named Myrtaceae. [1] This evergreen tree grows in tropical climates year round. Clove tree has been used for thousands of years in folk medicine preparing remedies out of various parts of the plant including flower buds (cloves), stems and leaves.&nbsp;</span></span></p><p class="p1" data-dcnode-id="2177"><span class="s1" data-dcnode-id="2178"><span data-dcnode-id="2179" instrument_node="">Ancient Indian and Chinese medicines utilized cloves to treat various health conditions including tooth aches, infections, indigestion, muscle and joint pain. Popularity of cloves continued to grow with each generation, finding new medicinal application as a stand alone or as a spice tonic.&nbsp;</span></span></p><p class="p1" data-dcnode-id="2174"><span class="s1" data-dcnode-id="2175"><span data-dcnode-id="2176" instrument_node="">Cloves are excellent source of antioxidants ranking at the top of the list. Chemical makeup of cloves have identified 36 different active ingredients. Eugenol is cloves’ most active compound residing within its essential oil and is a big reason for its aroma and flavour. This active compound is also found in other spices including nutmeg, cinnamon, basil and bay leaf. However, clove flower buds and leaves contain highest levels of eugenol. Eugenol’s spicy yet sweet fragrance makes it a common ingredient of many perfumes, flavourings and aromatherapy essential oils. Due to its chemical properties, eugenol is also commonly used in dentistry. [2]&nbsp;</span></span></p><p class="p1" data-dcnode-id="2171"><span class="s1" data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">A natural phenolic molecule, eugenol is an antioxidant monster capable of directly scavenging and attacking free radicals; while protecting tissue from oxidative damage. It can also be used to produce or reconstruct other active compounds which all possess their own health benefits. [3]&nbsp;</span></span></p><p class="p1" data-dcnode-id="2168"><span class="s1" data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">Cloves also contain a variety of flavonoids which further enhance this spice’s anti-inflammatory and antioxidant properties. These flavonoids are often captured within clove essential oil, which has been extensively used in rejuvenating skin, relieving stress and congestion, blood pressure, diabetes and have been noted to fight mutations and cancers.</span></span></p><h1 class="p3" data-dcnode-id="2164"><span class="s1" data-dcnode-id="2165"><b data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">The History of Cloves</span></b></span></h1><p class="p1" data-dcnode-id="2158"><span class="s1" data-dcnode-id="2159"><span data-dcnode-id="2163" instrument_node="">As with many other spices around the world, cloves originated in Asia and date back centuries.</span><span class="Apple-converted-space" data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">&nbsp; </span></span><span data-dcnode-id="2160" instrument_node="">Native to Moluccas, the islands of Indonesia, the clove tree can grow up to ten meters tall, producing flower buds with an oily interior and sweet fragrance and taste. Due to its sense elevating abilities, clove flower buds quickly gained popularity with traders. Cloves have a long history with ancient Chinese as well as: </span></span></p><ul class="ul1" data-dcnode-id="2142"><li class="li1" data-dcnode-id="2155"><span class="s1" data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">Romans, who used them as fragrance and spice over 2000 years ago. </span></span></li><li class="li1" data-dcnode-id="2152"><span class="s1" data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">Cloves were found in ceramic pots during archeological excavations in Syria which date back to 1721 BCE. </span></span></li><li class="li1" data-dcnode-id="2149"><span class="s1" data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">Traditional Chinese medicine regards cloves for its strong ability to fight fungi and bacterial infections. </span></span></li><li class="li1" data-dcnode-id="2146"><span class="s1" data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">From ancient India, Ayurvedic healers used cloves to treat various digestive problems, fever, physical aches and respiratory issues. </span></span></li><li class="li1" data-dcnode-id="2143"><span class="s1" data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">Ancient Persians believed that cloves possessed libido properties and used clove oil as a love potion. </span></span></li></ul><p class="p1" data-dcnode-id="2139"><span class="s1" data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">Arab traders introduced cloves to Europe around 4th century. As with many spices, cloves’ stock drastically rose in popularity by the middle ages, where they were used as food spice, aroma infuser and medical remedy. During the 13th and 14th centuries, cloves were transported all the way from Indonesia to China, India, Persia, Africa, and Europe. As with all the spices, single source production and long sea transport resulted in very high clove prices, creating a strong desire for many European nations to get in and control this lucrative trade. By 16th and 17th century, numerous expeditions and conflicts were waged in order to gain control over clove and nutmeg industry.&nbsp;</span></span></p><p class="p1" data-dcnode-id="2136"><span class="s1" data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">The Dutch eventually emerged victorious taking hold of the Maluku Islands and maintaining it for a long time. Maintaining the clove monopoly, the Dutch eliminated competition by destroying clove trees outside their control territory. Such extermination practices caused an uprising within the native inhabitants who believed in special connection between themselves and the clove trees. In Moluccas tradition, a spiritual connection between people and nature was symbolized with planting a clove tree with the birth of each child. The health and wellbeing of a clove tree foreshadowed the same prosperity to each associated native islander.</span></span></p><p class="p5" data-dcnode-id="2133"><span class="s1" data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">However, the Dutch eventually lost their control over clove trade. In late 1700s, the French smuggled cloves from the East Indies to the Indian Ocean Islands and the New World. By the 18th century cloves were cultivated in many countries of similar climate to Muluccas including Zanzibar (island of Tanzania), Madagascar, Brazil, Mauritius, and Tanzania. With greater availability, the price of cloves gradually decreased, becoming readily available for many social classes and cuisines all over the world. </span></span></p><p class="p5" data-dcnode-id="2130"><span class="s1" data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">Today, Indonesia is still the biggest clove producing region, however other countries such as Madagascar, Tanzania, Comoros, Kenya, Sri Lanka and West Indies have also been commercially growing this spice. [4]</span></span></p><h1 class="p3" data-dcnode-id="2126"><span class="s1" data-dcnode-id="2127"><b data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">Cloves’ Powerful Benefits</span></b></span></h1><p class="p6" data-dcnode-id="2123"><span class="s1" data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">Cloves are an exiting and exotic spice enriching the senses and flavour profiles of foods while improving physical and psychological abilities. The native Moluccans believed in special connection to this symbolic tree and for good reasons. Today’s science has identified numerous active compounds within clove oil possessing abundant health benefits. Lets take a closer look, into the power of this aromatic flower.</span></span></p><h1 class="p7" data-dcnode-id="2120"><span class="s1" data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">Antioxidant Benefits</span></span></h1><h2 class="p1" data-dcnode-id="2116"><span class="s1" data-dcnode-id="2117"><b data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">What are free radicals? </span></b></span></h2><p class="p1" data-dcnode-id="2107"><span class="s1" data-dcnode-id="2108"><span data-dcnode-id="2115" instrument_node="">The body is an amazingly complex machine which creates, transforms, stores and uses energy through an overall process called metabolism. Metabolism consists of numerous biochemical pathways that converts energy from food (we eat), and oxygen (we breathe), to versions which the body can use (ATP) and store (triglycerides and glycogen). As the result of myriad metabolic reactions, the body also creates </span><i data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">unstable </span></i><span data-dcnode-id="2112" instrument_node="">oxygen containing particles called </span><i data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">reactive oxygen species (ROS)</span></i><span data-dcnode-id="2109" instrument_node="">—free radicals. </span></span></p><p class="p1" data-dcnode-id="2101"><span class="s1" data-dcnode-id="2102"><span data-dcnode-id="2106" instrument_node="">Having some free radicals is not a bad thing, as our immune system keeps a balanced radical/antioxidant reservoir for protection against foreign invaders. Whenever ROS levels rise, they react not only with antioxidant reserves but with all types molecules, by stealing electrons and destabilizing structural integrity of many DNA and cellular components. The body responds with inflammation in order to stop and repair the free radical damage. The imbalance of free radicals in the body is often referred to as </span><i data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">oxidative stress</span></i><span data-dcnode-id="2103" instrument_node="">. [5]</span></span></p><h2 class="p1" data-dcnode-id="2097"><span class="s1" data-dcnode-id="2098"><b data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">Why are antioxidants important?</span></b></span></h2><p class="p1" data-dcnode-id="2089"><span class="s1" data-dcnode-id="2090"><span data-dcnode-id="2096" instrument_node="">Number of environmental factors such as diet, smoking, poor air quality, emotional stress or extreme physical exercise further contribute to free-radical production and oxidative stress. This produces continuous or </span><i data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">chronic</span></i><span data-dcnode-id="2093" instrument_node=""> inflammation which has been identified as a common link in causation of various illnesses. From seasonal allergies to life threatening diseases such as dementia, metabolic syndrome and cancers have attributed to elevated oxidative stress and chronic inflammation. </span><b data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">This is where antioxidants play a vital role by seeking out free radicals, neutralizing their harmful effects and protecting our tissues and systems.</span></b></span></p><h2 class="p1" data-dcnode-id="2085"><span class="s1" data-dcnode-id="2086"><b data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">Antioxidant Power of Cloves </span></b></span></h2><p class="p1" data-dcnode-id="2080"><span class="s1" data-dcnode-id="2081"><span data-dcnode-id="2084" instrument_node="">Cloves are full of powerful compounds and ranks #6 on the ORAC Scale for antioxidant value among all of the foods and beverages across the world. [6] The top four items on the scale are not common, and cloves ORAC value of 290,283 is simply incredible. Compared to</span><b data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node=""> other superfoods: cloves are 3 times more potent than acai berry pulp (102,700), more than 5 times stronger than unsweetened cocoa (55,653), and 30 times more concentrated than blueberries (9,621) in antioxidants.</span></b></span></p><p class="p1" data-dcnode-id="2065"><span class="s1" data-dcnode-id="2066"><span data-dcnode-id="2079" instrument_node="">The powerful antioxidants within cloves are located predominantly within its oily interior. These compounds include vitamins (such as Vitamin A and C), minerals and other active compounds.</span><span class="Apple-converted-space" data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">&nbsp; </span></span><span data-dcnode-id="2076" instrument_node="">Vitamin C has been extensively shown to react with free radicals, decreasing overall oxidative stress. [7] Cloves contain other well researched antioxidants like anthocyanin, quercetin and eugenol. Eugenol has been a focus of numerous studies showing strong antioxidant properties.</span><span class="Apple-converted-space" data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">&nbsp; </span></span><span data-dcnode-id="2073" instrument_node="">In fact, tests found </span><b data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">eugenol is 5 times more effective in combating free radicals than vitamin E (another potent antioxidant). </span></b><span data-dcnode-id="2070" instrument_node="">[8]</span><span class="Apple-converted-space" data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">&nbsp; </span></span><span data-dcnode-id="2067" instrument_node="">An antioxidant research study compared 26 various spices and showed cloves to be one of the highest concentrations among other powerful superfoods such as garlic, thyme, rosemary and oregano. [9]</span></span></p><p class="p1" data-dcnode-id="2047"><span class="s1" data-dcnode-id="2048"><span data-dcnode-id="2064" instrument_node="">Eugenol was also found to increase activity of antioxidant enzymes activity which like— </span><i data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">superoxide dismutase </span></i><span data-dcnode-id="2061" instrument_node="">(SOD), </span><i data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">catalase </span></i><span data-dcnode-id="2058" instrument_node="">(CAT), </span><i data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">glutathione peroxidase </span></i><span data-dcnode-id="2055" instrument_node="">(GPx), </span><i data-dcnode-id="2053"><span data-dcnode-id="2054" instrument_node="">gluthatione-S-transferase </span></i><span data-dcnode-id="2052" instrument_node="">(GST) and polyphenol oxidase</span><i data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node=""> </span></i><span data-dcnode-id="2049" instrument_node="">(PPO)—further protect cell structures while decreasing the oxidative stress. [10]</span></span></p><h1 class="p7" data-dcnode-id="2044"><span class="s1" data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">Digestive Aid and Protection</span></span></h1><p class="p1" data-dcnode-id="2041"><span class="s1" data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">Adding cloves to your recipes will not only elevate flavour of food, it will improve the overall digestive process. Cloves are loaded with potent phytonutrients which stimulate secretion of digestive enzymes. Used for centuries by traditional medicines, cloves reduce stomach issues such as bloating, flatulence, gastric irritability, and dyspepsia. Also, folk remedies often applied clove oil to relieve motion or morning sickness causing nausea and vomiting. The active ingredients within clove oil have been shown to relax the smooth lining of the GI tract which eases the indigestion symptoms. </span></span></p><p class="p1" data-dcnode-id="2032"><span class="s1" data-dcnode-id="2033"><span data-dcnode-id="2040" instrument_node="">Clove oils have also been shown to treat stomach ulcers. These painful sores (also known as peptic ulcers) develop on the inside lining of the stomach and upper portion of the small intestine. Bacterium </span><i data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">Helicobacter pulori</span></i><span data-dcnode-id="2037" instrument_node=""> (H. pulori) is often the cause for peptic ulcers which is often treated by non-steroidal anti-inflammatory drugs (NSAIDs) like aspirin, ibuprofen (advil) and acetaminophen (tylenol). Combination of NSAIDs and bacteria cause thinning of the stomach’s inner lining, exposing delicate tissue which gets inflamed, resulting in sensitivity, discomfort and pain. Despite popular belief, stress and spicy foods </span><b data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">do not </span></b><span data-dcnode-id="2034" instrument_node="">cause peptic ulcers, but may only aggravate already existing symptoms. [11]&nbsp;</span></span></p><p class="p1" data-dcnode-id="2026"><span class="s1" data-dcnode-id="2027"><span data-dcnode-id="2031" instrument_node="">Scientific research shows that phytochemicals within clove oil help ulcer treatment by increasing production of mucus in the stomach.[12] The gastric mucus acts as a protective barrier preventing the thin stomach lining being exposed to strong digestive (bile and gastric) acids. [13]</span><span class="Apple-converted-space" data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">&nbsp; </span></span><span data-dcnode-id="2028" instrument_node="">Some animal models showed clove extracts produce similar effects as anti-ulcer medications during treatment. [14]</span></span></p><h1 class="p7" data-dcnode-id="2023"><span class="s1" data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">Treats All Inflammation</span></span></h1><p class="p1" data-dcnode-id="2017"><span class="s1" data-dcnode-id="2018"><span data-dcnode-id="2022" instrument_node="">Cloves possess powerful anti-inflammatory properties. This is due to many active chemicals often referred to phytochemicals or polyphenols. These two names are interchangeably used throughout many texts, but what do they mean exactly.</span><span class="Apple-converted-space" data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">&nbsp; </span></span><span data-dcnode-id="2019" instrument_node="">Well, lets have a quick recap of what polyphenols are and why are they important.</span></span></p><h1 class="p3" data-dcnode-id="2013"><span class="s1" data-dcnode-id="2014"><b data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">Polyphenols vs. Phytochemicals—detailed explanation </span></b></span></h1><p class="p1" data-dcnode-id="2010"><span class="s1" data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">Phytochemicals are natural occurring compounds found primarily in plants, many of which possess antioxidant properties. So far, scientists have identified 10,000+ phytochemicals, and many more still to come. [15] Phytochemicals is an umbrella term for any biological compound in plants that can effect something (be it another molecule, organelle, cell, organ, system or an organism (like bacteria)). Some of these compounds can act in many places, where’s others are very selective (specific key for a particular door). [16,17]&nbsp;</span></span></p><p class="p1" data-dcnode-id="2007"><span class="s1" data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">Generally phytochemicals can:</span></span></p><ul class="ul1" data-dcnode-id="1982"><li class="li1" data-dcnode-id="2004"><span class="s1" data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">act as antioxidants (as discussed within this article, and elsewhere on our site),</span></span></li><li class="li1" data-dcnode-id="2001"><span class="s1" data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">imitate hormone response (by looking very similar (structure wise) to some specific hormones, reacting and influencing certain endocrine pathways),</span></span></li><li class="li1" data-dcnode-id="1998"><span class="s1" data-dcnode-id="1999"><span data-dcnode-id="2000" instrument_node="">increasing enzyme activity (as seen in the liver, some compounds can and do increase enzymatic activity within various organs),</span></span></li><li class="li1" data-dcnode-id="1989"><span class="s1" data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">disrupting DNA replication (this was also mentioned during cancer topics, of how some active compounds interfere with replication of DNA in tumor cells and decreasing metastasis: eg: </span></span><a data-dcnode-id="1992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dupischai.com/health-benefits-black-pepper/" rel="noopener noreferrer" target="_blank"><span class="s3" data-dcnode-id="1993"><b data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node="">piperine in black pepper</span></b></span></a><span class="s1" data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">).</span></span></li><li class="li1" data-dcnode-id="1986"><span class="s1" data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">anti-bacterial response (disrupting bacteria’s growth),</span></span></li><li class="li1" data-dcnode-id="1983"><span class="s1" data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">anti-pathogen response (some phytochemicals bind physically to cell walls and act as a barrier preventing other microorganisms such as bacteria, viruses from binding to human cells). </span></span></li></ul><p class="p1" data-dcnode-id="1979"><span class="s1" data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">Now, lets focus on the “antioxidant component” which are phytochemicals that protect the body against free radicals (aka ROS). There are 3 main categories: </span></span></p><ol class="ol1" data-dcnode-id="1963"><li class="li1" data-dcnode-id="1974"><span class="s1" data-dcnode-id="1975"><b data-dcnode-id="1977"><span data-dcnode-id="1978" instrument_node="">Carotenoids</span></b><span data-dcnode-id="1976" instrument_node=""> – are compounds which give pigments of bright red, yellow and orange to many fruits and vegetables. [18] If you ever heard a nutritionist or dietitian saying to “eating the rainbow” they refer to consuming variety coloured foods, therefore increasing various types of carotenoids.</span></span></li><li class="li1" data-dcnode-id="1969"><span class="s1" data-dcnode-id="1970"><b data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">Allyl Sulfides </span></b><span data-dcnode-id="1971" instrument_node="">– common to the onion family, these fight cancer progression by targeting certain enzymes and reducing or stopping their actions.</span></span></li><li class="li1" data-dcnode-id="1964"><span class="s1" data-dcnode-id="1965"><b data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">Polyphenols</span></b><span data-dcnode-id="1966" instrument_node=""> – (here we are) also known as phenolics.</span></span></li></ol><p class="p1" data-dcnode-id="1954"><span class="s1" data-dcnode-id="1955"><span data-dcnode-id="1962" instrument_node="">Think of phytochemicals as a large oak, dragon’s blood or baobab tree. The massive trunk contains all the components which begin to span upwards and downwards into big branches and roots. These big branches then spread out into smaller branches which diversify into</span><span class="Apple-converted-space" data-dcnode-id="1960"><span data-dcnode-id="1961" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1959" instrument_node="">organs with specific abilities. Some of these organs such as leaves convert sunlight into energy or implant genetic material in seeds of fruits, flowers and pollen. While other organs in roots absorb water and nutrients from soil. Each of these organs has a purpose and all interact in a relationship for overall tree development. </span><b data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">This tree example visualizes phytochemicals and various categories which “branch out” into specific groups such as polyphenols.&nbsp;</span></b><span data-dcnode-id="1956" instrument_node="">&nbsp;</span></span></p><p class="p1" data-dcnode-id="1948"><span class="s1" data-dcnode-id="1949"><span data-dcnode-id="1953" instrument_node="">So, polyphenol is a type of antioxidant, which is a type of phytochemical. Polyphenols are the largest group of phytochemicals with over 8000 identified compounds thus far. Just as the name suggests, all of these compounds have similar chemical structure made from multiple phenol groups (which is hydroxyl [OH-] groups attached to aromatic benzene [also called </span><i data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">phenyl</span></i><span data-dcnode-id="1950" instrument_node="">] rings in different ways). [15,19] Just like “the tree branching out” example, polyphenols can be further broken down into four types. These types are based on structural size (number of phenol rings that contain a structural elements which bind to them), which are: </span></span></p><ol class="ol1" data-dcnode-id="1906"><li class="li1" data-dcnode-id="1937"><span class="s1" data-dcnode-id="1938"><b data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">Flavonoids</span></b><span data-dcnode-id="1945" instrument_node="">: the largest group of polyphenols with over 4,000 identified compounds.</span><span class="Apple-converted-space" data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1942" instrument_node="">Flavonoids possess powerful antioxidant and anti-inflammatory abilities and are found in many fruits, vegetables, legumes, red wine and teas. Some of the well known flavonoids include: </span><i data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">flavones, flavonols, flavanones, isoflavones, anthocyanidins, chalcones, catechins.</span></i><span data-dcnode-id="1939" instrument_node=""> [15, 20, 21]&nbsp;</span></span></li><li class="li1" data-dcnode-id="1929"><span class="s1" data-dcnode-id="1930"><b data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">Stilbenes</span></b><span data-dcnode-id="1934" instrument_node="">: found in red wine (grape’s skin), berries (raspberries, blueberries, mulberries), peanuts and pomegranate. Stilbenes are strong antioxidants possessing anti-carcinogenic properties. Most famous stilbene is </span><i data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">resveratrol</span></i><span data-dcnode-id="1931" instrument_node=""> which has been extensively studied in various chronic inflammation conditions, including various forms of cancers, metabolic syndrome and neurodegenerative illnesses. [22, 23]</span></span></li><li class="li1" data-dcnode-id="1918"><span class="s1" data-dcnode-id="1919"><b data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">Lignans</span></b><span data-dcnode-id="1926" instrument_node="">: found in many seeds (flax, sesame), legumes, whole grains (rye, wheat, oat and barley), some fruits (apricots, strawberries) and vegetables (broccoli, cabbage). Common lignans are </span><i data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">enterolignant, enterodiol </span></i><span data-dcnode-id="1923" instrument_node="">and </span><i data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">enterolactone</span></i><span data-dcnode-id="1920" instrument_node="">. [23][24] These antioxidants have been the focus of many cancer studies, especially in suppression and prevention of breast tumors. [23, 25, 26, 27]</span></span></li><li class="li1" data-dcnode-id="1907"><span class="s1" data-dcnode-id="1908"><b data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">Phenolic acids</span></b><span data-dcnode-id="1915" instrument_node="">: include </span><i data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">hydroxybenzoic acids</span></i><span data-dcnode-id="1912" instrument_node=""> (found in tea) and </span><i data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">hydroxycinnamic acids </span></i><span data-dcnode-id="1909" instrument_node="">(common antioxidant in cinnamon, coffee, blueberries, kiwi, apples, citrus fruits, cherries, plums and onions to name a few). [28] In plants these acids have been linked to many important jobs, from nutrient uptake to energy production. For our purposes, studies show phenolic acids as potent antioxidants which directly engage free radicals, and protection against oxidative stress diseases such as coronary heat disease, stroke, acquired immunodeficiency syndrome (AIDS), and several types of cancers. [29]</span></span></li></ol><h1 class="p3" data-dcnode-id="1902"><span class="s1" data-dcnode-id="1903"><b data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">Polyphenols in Cloves</span></b></span></h1><p class="p1" data-dcnode-id="1890"><span class="s1" data-dcnode-id="1891"><span data-dcnode-id="1901" instrument_node="">As we see, polyphenols are powerful antioxidants that include compounds like </span><i data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">curcumin</span></i><span data-dcnode-id="1898" instrument_node=""> (found in turmeric and ginger)</span><i data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">, eugenol, resveratrol, terpenoids</span></i><span data-dcnode-id="1895" instrument_node=""> (found in cloves, cinnamon, ginger)</span><i data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">, epigallocatechin-3-gallate (EGCG)</span></i><span data-dcnode-id="1892" instrument_node=""> (found in green, white and black teas). These micronutrients play an important roles in fighting chronic inflammation by directly reacting with ROS, increasing antioxidant enzyme activity and influencing several important messaging pathways, which treat digestive issues, diabetes, brain and cardiovascular related diseases. [30]</span></span></p><p class="p1" data-dcnode-id="1884"><span class="s1" data-dcnode-id="1885"><span data-dcnode-id="1889" instrument_node="">2010 research study compared 100 foods rich in polyphenols, and cloves had the most amount.</span><span class="Apple-converted-space" data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1886" instrument_node="">Cloves contained a monstrous 15,188 mg of polyphenols per 100 g. Peppermint came a far second (with 11,960 mg) and star anise settled for third (with 5,460 mg) for polyphenol content respectively. [31] These micronutrient concentrations are simply colossal when compared to other top berry, non-berry fruits and vegetables. For example, cloves have over 27 times more polyphenols than blueberries (560 mg), over 30 times more than pecans (493 mg), 40 times more than plums (377 mg), 112 times more than apples (136 mg) and 257 times more than black beans (59 mg). [31, 32, 33]</span></span></p><h1 class="p3" data-dcnode-id="1880"><span class="s1" data-dcnode-id="1881"><b data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">Boosts Immune System</span></b></span></h1><p class="p1" data-dcnode-id="1877"><span class="s1" data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">Cloves contain the highest antioxidant ingredients compared to other superfoods. [31] The active ingredients found in clove oil extracts contain antibacterial and antiviral properties that boost the immune system and help reduce and/or prevent microbe infections. Cloves are often used as essential oil treatments against common cold and flue. [34]</span></span></p><p class="p1" data-dcnode-id="1874"><span class="s1" data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">Ayurvedic medicine uses cloves extensively to boost immune system. The oil within this “nail shaped” flower bud contains polyphenols that can increase white blood cell count, resulting in stronger immune response against bacterial and viral infections. [35]</span></span></p><h1 class="p3" data-dcnode-id="1870"><span class="s1" data-dcnode-id="1871"><b data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">Cures Toothache and Decay</span></b></span></h1><p class="p1" data-dcnode-id="1867"><span class="s1" data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">One of the most well established and popular remedies for toothaches uses cloves. Cloves remedy has been used by the ancient Chinese medicine some 2000 years ago as homeopathic treatment against tooth pain and decay. In the West, it was first documented in 1640 in French text “Practice of Physic”. [36]&nbsp;</span></span></p><p class="p1" data-dcnode-id="1864"><span class="s1" data-dcnode-id="1865"><span data-dcnode-id="1866" instrument_node="">Cloves studies showed improvement in dental hygiene and health. Today, cloves are accepted as a reliable treatment in relieving discomfort and pain within several dental disorders. Research into clove essential oils shown to treat gum diseases like gingivitis and periodontitis. [37] Clove oil can also produce same numbing effect as other topical ointments (such as benzocaine) which are used for dental procedures. [38] </span></span></p><p class="p1" data-dcnode-id="1861"><span class="s1" data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">Eugenol is the main active compound within clove oil, and (along with its chemical cousin eugenyl acetate) produce antimicrobial, anti-inflammatory, and restorative properties. When mixed with other materials such as zinc oxide, eugenol has been extensively used in dental and prosthodontics materials. Also, eugenol is shown to decrease decalcification and erosion of teeth. This particular study noted that eugenol reversed some of the damage commonly seen with fluoride use, by remineralizing teeth. [39]</span></span></p><h1 class="p3" data-dcnode-id="1857"><span class="s1" data-dcnode-id="1858"><b data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">Helps Fight Bacterial Infections</span></b></span></h1><p class="p1" data-dcnode-id="1854"><span class="s1" data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">As seen with toothaches, cloves have been used for thousands of years for their antibacterial properties to treat many oral related conditions. A mouthwash study tested herbal remedies containing cloves, tea tree oil and basil for 21 days, showing improved gum health as well as decreased plaque build up and mouth bacteria. [40]</span></span></p><p class="p1" data-dcnode-id="1848"><span class="s1" data-dcnode-id="1849"><span data-dcnode-id="1853" instrument_node="">Cloves contain high levels of antibacterial and antimicrobial phytonutrients preventing the spread of various human infections. [41] Test tube studies also demonstrated clove oil ability to fight common bacteria including </span><i data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">Escherichia </span></i><span data-dcnode-id="1850" instrument_node="">coli (E. coli) strain which can cause digestive discomfort, cramps, diarrhea and fatigue. [42] Cloves’ antibacterial properties extend to all types of bacteria, including the strains which are resistant to antibiotics. These strains included Staphylococcus aureus (causes skin acne) and Pseudomonas aeruginosa (causes pneumonia). [42]</span></span></p><p class="p1" data-dcnode-id="1836"><span class="s1" data-dcnode-id="1837"><span data-dcnode-id="1847" instrument_node="">Candida is a yeast fungus inside our body which helps with nutrient digestion and absorption.</span><span class="Apple-converted-space" data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1844" instrument_node="">Often candida lives inside the skin and mucous membranes of genital and intestinal tracts without causing any harm. </span><i data-dcnode-id="1842"><span data-dcnode-id="1843" instrument_node="">Candida albicans</span></i><span data-dcnode-id="1841" instrument_node=""> (C. albicans) being the most common yeast strain responsible for human infections. Overgrowth of C. albicans can cause wide range of health problems. Animal studies showed that clove oil is a potent anti-fungal treatment against C. albicans overgrowth, and as effective as some commonly prescribed anti-yeast drugs, like nystatin. The only difference is that drugs like nystatin come with variety of unpleasant side effects (such as: diarrhea, vomiting, nausea, rash, skin irritation, slow heart rate, muscle pain and facial swelling to name a few)—none of which are generated by clove use. [43] Besides eliminating candida yeast, eugenol within clove oil was proven to be an effective killing machine against intestinal parasites like </span><i data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">Leishmania donovani (L. donovani)</span></i><span data-dcnode-id="1838" instrument_node="">. Eugenol based extracts cause internal cell death (apoptosis) within such this bacteria and other parasitic strains. [44]</span></span></p><h1 class="p3" data-dcnode-id="1832"><span class="s1" data-dcnode-id="1833"><b data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">Strong Anti-Cancer Agent</span></b></span></h1><p class="p1" data-dcnode-id="1829"><span class="s1" data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">As an ancient remedy in traditional medicines, cloves have powerful antioxidant and anti-inflammatory properties which have shown to be effective anti-carcinogenic agents. As clove oil contains over 80 percent eugenol, it has been the focus of much research. Series of test tube and animal experiments identified eugenol’s effectiveness in slowing the growth of colon and lung cancer tumors by initiating internal cell death (apoptosis). [45]</span></span></p><p class="p1" data-dcnode-id="1814"><span class="s1" data-dcnode-id="1815"><span data-dcnode-id="1828" instrument_node="">Eugenol within cloves was also shown to protect against DNA damage from free radials. This includes preventing free radicals from attacking lipids imbedded in cell walls; while increasing activity of antioxidant enzymes such as </span><i data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">superoxide dismutase</span></i><span data-dcnode-id="1825" instrument_node=""> (SOD), </span><i data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">catalase</span></i><span data-dcnode-id="1822" instrument_node=""> and </span><i data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">glutathione</span></i><span data-dcnode-id="1819" instrument_node=""> (GSH). The anticancer action of eugenol is also seen in several protein-protein messaging networks, decreasing several inflammation causing enzymes (COX-2), cytokines (IL1-beta), as well as B-cell lymphoma 2 (Bcl-2) family of regulator proteins. [46] </span><i data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">Bcl-2</span></i><span data-dcnode-id="1816" instrument_node=""> protein family regulate cell death, and initiate apoptosis with lower levels. [47] The eugenol/cancer cell interactions resulted in 80 percent of cell death rate within prostate, esophageal, breast and cancer cells. [48] Eugenol was also noted to decrease the spread (metastasis) of cervical tumors, and early stage lung cancer. [46, 49]</span></span></p><h1 class="p3" data-dcnode-id="1810"><span class="s1" data-dcnode-id="1811"><b data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">Anti-Inflammatory – prevents mutations</span></b></span></h1><p class="p1" data-dcnode-id="1804"><span class="s1" data-dcnode-id="1805"><span data-dcnode-id="1809" instrument_node="">Mutagen is a physical or chemical agent that is able to effect or change the genetic material (usually DNA) of another organism, be it virus, bacterium, animal or human. As previously discussed, cloves are packed with powerful phytonutrients possessing various antioxidant and anti-inflammatory effects. Some of these nutrients called </span><i data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">phenylpropanoids</span></i><span data-dcnode-id="1806" instrument_node="">, also contain anti-mutagenic properties. </span></span></p><p class="p1" data-dcnode-id="1792"><span class="s1" data-dcnode-id="1793"><span data-dcnode-id="1803" instrument_node="">Phenylpropanoids are small compounds made by plants from two amino acids (phenylalanine and tyrosine). Phenylpropanoids contain phenyl group (benzene ring with hydroxyl group attachment) and are one of the middle steps in the process for plants to making polyphenols (variety of flavonoids, lignans and phenolic acids). [50] Test tube (in vitro) studies used phenylpropanoids against mutagenized treated bacterium (</span><i data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">Salmonella typhimurium). </span></i><span data-dcnode-id="1800" instrument_node="">Two phenylpropanoids (</span><i data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">trans-confer aldehyde</span></i><span data-dcnode-id="1797" instrument_node="">, and </span><i data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">dehydrodieugenol</span></i><span data-dcnode-id="1794" instrument_node="">) showed such ability suppressing up to 58 percent of mutation within Samonella t. [51] </span></span></p><h1 class="p3" data-dcnode-id="1788"><span class="s1" data-dcnode-id="1789"><b data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">Anti-Inflammatory – protects liver</span></b></span></h1><p class="p1" data-dcnode-id="1785"><span class="s1" data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">Powerful antioxidants within clove oils and extracts have been used as natural detox agents. Liver is the main detoxification organ that uses many enzymes to process, filter and remove body’s byproducts and toxins. Because of such highly specific and complex function, liver is often subjected to various levels of stress, leading to greater production of free radicals. If not corrected, such stress becomes chronic or oxidative in nature, leading to several metabolic imbalances. </span></span></p><p class="p1" data-dcnode-id="1782"><span class="s1" data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">As previously noted, the free radical influx creates an immune response and release of several signalling proteins called cytokines. These cytokines such as transforming growth factor-beta (TGF-beta), interleukin-6 (IL-6), and tumor necrosis factor-alpha (TNF-alpha) are important parts of the immune system but, in large quantities can lead to destruction of healthy tissue. In the liver, chronic overflow of these cytokines destroys tissues leading to several diseases. Researchers monitor levels of some of these cytokines as markers during studies to measure effectiveness of a testing compound.</span></span></p><p class="p1" data-dcnode-id="1779"><span class="s1" data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">Cloves anti-inflammation studies have shown improvement in liver’s health and function. As clove oil consists mostly out of eugenol, it appears to be the main driving force behind these benefits. Animal studies using fatty liver disease tested both clove oil and eugenol seeing improvement of many fatty liver markers (like TNF-alpha). Both mixtures reduced inflammation and oxidative stress while increasing detoxification enzyme activity and overall liver function. [52]&nbsp;</span></span></p><p class="p1" data-dcnode-id="1776"><span class="s1" data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">Being a potent antioxidant, eugenol is shown to decrease anti-inflammation—restoring organ capacity and engaging liver conditions. Cloves active compounds combat roaming free radicals as well as production and deposit of fat inside liver tissues. This action reduces oxidative stress and improves chronic liver disease symptoms. [53] Eugenol is once again, the main antioxidant workhorse which positively effects damaged liver tissue. Animal study found eugenol to improve damaged tissue and reverse signs of liver cirrhosis (extensive scarring of the liver). [54]</span></span></p><p class="p1" data-dcnode-id="1773"><span class="s1" data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">Cloves have become a scientifically proven entity to treat various inflammatory conditions. The first ever published study using animal model into liver damage proving that eugenol within clove oil is a very powerful anti-inflammatory agent. A study showed that small eugenol amounts can protect liver against disease. Eugenol reduced numerous cytokines (TNF-alpha) and transcription protein (hepatic NF-kB p65 and cascade-3) markers, often seen in chronic inflammation and hepatic tissue damage. The results of this study showed that eugenol was able to reverse inflammation and protect cellular integrity and function. However, some words of caution. Researches noted that large doses of eugenol may be harmful to the digestive lining, lowering some detox enzyme activity (like glutathione – GHS) and can irritate sensitive skin, if used as external ointment. As with all essential oils, clove oils are highly concentrated, so exercise caution when using such products. [55]</span></span></p><h1 class="p3" data-dcnode-id="1769"><span class="s1" data-dcnode-id="1770"><b data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">Lowers High-blood Pressure</span></b></span></h1><p class="p1" data-dcnode-id="1763"><span class="s1" data-dcnode-id="1764"><span data-dcnode-id="1768" instrument_node="">Ayurvedic and other traditional medicines have been using cloves to increase blood circulation while lowering high blood pressure. This is due to clove’s phytonutrient profile with potent anti-inflammatory profiles which are capable of elevating heart health, blood flow and overall circulation of nutrients and gases throughout the body. As mighty antioxidant, eugenol has been shown to decrease overall blood pressure, heart rate and several other common markers of hypertension. Eugenol is able to enhance </span><i data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">vasomodulation</span></i><span data-dcnode-id="1765" instrument_node=""> (neuronal regulation of blood flow) by interacting with Calcium (Ca2+) and Potassium (K+) ion channels and relaxing aorta walls of small animals. [56]&nbsp;</span></span></p><p class="p1" data-dcnode-id="1757"><span class="s1" data-dcnode-id="1758"><span data-dcnode-id="1762" instrument_node="">Another cloves’ compound called </span><i data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">acetyl eugenol</span></i><span data-dcnode-id="1759" instrument_node=""> has been identified with impressive circulatory benefits. A close chemical relative of eugenol, this acetyl (CH3CO) variety was found to decrease platelet aggregation (platelets clumping together in the blood). [57] Platelet aggregation is one of the conditions leading to thrombus or blood clots. Clove oil is known to act as a natural blood thinner and may be used as possible treatment for such conditions in the future. </span></span></p><h1 class="p3" data-dcnode-id="1753"><span class="s1" data-dcnode-id="1754"><b data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">Regulates Blood Sugar</span></b></span></h1><p class="p1" data-dcnode-id="1744"><span class="s1" data-dcnode-id="1745"><span data-dcnode-id="1752" instrument_node="">Cloves have been used as traditional remedies to treat various conditions including diabetes.</span><span class="Apple-converted-space" data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1749" instrument_node="">Diabetes is a metabolic disorder that occurs when the pancreas (one of the body glands) is either not producing hormone </span><i data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">insulin</span></i><span data-dcnode-id="1746" instrument_node=""> or, the body cells are not responding property to insulin (insulin resistance). Insulin is the main switch in the body that shuttles sugars from blood into cells and is critical to healthy carbohydrate metabolism.&nbsp;</span></span></p><p class="p1" data-dcnode-id="1735"><span class="s1" data-dcnode-id="1736"><span data-dcnode-id="1743" instrument_node="">Science is looking at all the angles in how to fight and prevent various diseases, including genetic activation of key pathways, processes and compounds. Research uncovered an important family group of protein receptors called </span><i data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">peroxisome proliferator-activated receptor (PPAR)</span></i><span data-dcnode-id="1740" instrument_node=""> which play a big role in activating the genes for various cellular development and metabolism. [58]</span><span class="Apple-converted-space" data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1737" instrument_node="">One particular version PPARγ (gamma) has been identified as a strong regulator of adipogenesis, and offers immense potential as it plays significant roles in improving insulin resistance, anti-inflammatory response and even decreasing cancer growth. Cloves research identified eight-forms of eugenol that interact with PPARγ which activates pathways to decrease blood sugar levels (hypoglycemia). This study showed cloves’ potential as a powerful natural anti-diabetic ingredient. [59] </span></span></p><p class="p1" data-dcnode-id="1720"><span class="s1" data-dcnode-id="1721"><span data-dcnode-id="1734" instrument_node="">Clove studies also showed its ability to regulate blood sugar levels by imitating insulin in the body and lowering activity of several glucose producing enzymes (such as </span><i data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">phosphoenolpyruvate carboxykinase</span></i><span data-dcnode-id="1731" instrument_node=""> [PEPCK] and </span><i data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">glucose 6-phosphatase</span></i><span data-dcnode-id="1728" instrument_node=""> [G6Pase]). [60] Eugenol is once again the main topic of research. In vivo (animal) studies showed eugenol’s ability to significantly decrease plasma sugar (glucose) while increasing insulin. Eugenol’s control of high blood sugar levels (hyperglycemia) has been linked to modifying activity of carbohydrate metabolism including number of enzymes which produce glucose, and the ones that brake it down for energy. [61]</span><span class="Apple-converted-space" data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1725" instrument_node="">Another active compound in cloves called </span><i data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">nigricin</span></i><span data-dcnode-id="1722" instrument_node=""> has been identified to have anti-diabetic properties. Animal and test-tube studies showed that nigricin was able to increase the transport of sugar from bloodstream to muscle cells (human and small animal), and simultaneously improve pancreatic function and insulin secretion. [62]</span></span></p><h1 class="p3" data-dcnode-id="1716"><span class="s1" data-dcnode-id="1717"><b data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">Promotes Bone Health</span></b></span></h1><p class="p1" data-dcnode-id="1713"><span class="s1" data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">Cloves have extensive antioxidant and anti-inflammation properties and have been used for centuries as remedies against different type of swelling, bruises and scrapes. But, cloves can also heal and improve functionality of various body tissue including bone. Though much of the research is predominantly done in test-tubes and animal models, the results are promising. Low bone mass is a condition that affects tens of millions of people in North America and can lead to greater risk of injury and development of bone diseases like osteoporosis. Osteoporosis is a condition where the body begins to lose bone mass, produces too little bone tissue or both.&nbsp;</span></span></p><p class="p1" data-dcnode-id="1704"><span class="s1" data-dcnode-id="1705"><span data-dcnode-id="1712" instrument_node="">Research is looking at cloves’ active ingredients as treatment against low bone mass conditions. </span><span class="Apple-converted-space" data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1709" instrument_node="">Manganese (Mn) is a mineral involved in formation of bone tissue and is a critical component in overall bone health. Manganese supplements alone have been shown to improve bone mineral density and bone development in small animals. [63]</span><span class="Apple-converted-space" data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1706" instrument_node="">Cloves are rich in manganese, providing an astonishing 98 percent of the daily recommended intake, in just one tablespoon (6 grams) of ground cloves. [64]&nbsp;</span></span></p><p class="p1" data-dcnode-id="1701"><span class="s1" data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">Besides manganese, cloves are packed with numerous phenolic type antioxidants which all appear to have positive impact on bone metabolism. Eugenol leads the way in protecting bone tissue and lowering several markers of osteoporosis while increasing bone density. Other polyphenols such as flavone, isoflavones and flavonoids also increase mineral content and density (strength) of the bones. [65]</span></span></p><h1 class="p3" data-dcnode-id="1697"><span class="s1" data-dcnode-id="1698"><b data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">Reduces Allergies and Congestion</span></b></span></h1><p class="p1" data-dcnode-id="1691"><span class="s1" data-dcnode-id="1692"><span data-dcnode-id="1696" instrument_node="">Ayurveda and other traditional medicines have been using spiced teas to treat symptoms of colds and flu. Cloves are often used on their own by steeping or in combination of other spices, making a potent blend rich in phytonutrients. These clove based teas have been used to reduce or prevent respiratory type infections. Antibacterial and anti-inflammatory properties found in cloves produce powerful tea elixirs which help cough up phlegm, while soothing the throat.</span><span class="Apple-converted-space" data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1693" instrument_node="">Such remedies have extensively been used for generations relieving respiratory infections and other type of inflammation including sinusitis and headaches. The fragrant aroma of clove based teas creates a calming effect and promotes hormonal release that regulates stress levels, improves cognition and mood while reducing anxiety. [66]</span></span></p><p class="p1" data-dcnode-id="1688"><span class="s1" data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Allergies are hypersensitive response by immune system to typically harmless things (allergens) in the environment. An allergen can be many things including food, dust particles and plants among others often causing stuffy and runny nose, itchy skin, sneezing, watery eyes and sore throat and coughing. When your immune system overreact to an allergen, it produces antibodies called Immunoglobulin E (igE). There are different types of IgEs, and each one specific to a particular allergen. The IgEs travel to cells causing allergic reactions in the nose, lungs, throat or on the skin. [67]</span></span></p><p class="p1" data-dcnode-id="1682"><span class="s1" data-dcnode-id="1683"><span data-dcnode-id="1687" instrument_node="">Studies with hypersensitive and allergic tendency animals showed that using cloves extract can</span><span class="Apple-converted-space" data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1684" instrument_node="">decrease the allergic response (anaphylaxis). Active ingredients within cloves are shown to interfere with IgE signalling, causing reduction of overall histamine release. [68]</span></span></p><h1 class="p3" data-dcnode-id="1678"><span class="s1" data-dcnode-id="1679"><b data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">Promotes Healthy Skin</span></b></span></h1><p class="p1" data-dcnode-id="1673"><span class="s1" data-dcnode-id="1674"><span data-dcnode-id="1677" instrument_node="">Cloves contain many powerful antioxidants which can also reduce the signs of aging. Skin is the largest organ in the body, made up of numerous structural and specialized cells and compounds. Free radicals react with skin cells causing damage and premature aging. Cloves’ influential antioxidants engage free radicals and decrease or stop the damage, keeping skin looking youthful.</span><span class="Apple-converted-space" data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">&nbsp; &nbsp;</span></span></span></p><p class="p1" data-dcnode-id="1667"><span class="s1" data-dcnode-id="1668"><span data-dcnode-id="1672" instrument_node="">Some of the phytonutrients in cloves contain antibacterial properties. Due to these bacterial fighting abilities, clove essential oils are often found as one of the ingredients for ache as well as pimple treatment creams and ointments. As dirt and bacteria collect on the skin causing inflammation in and around the pores, s</span><i data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">taphylococcus aureus</span></i><span data-dcnode-id="1669" instrument_node=""> (S. aureus) is one of several bacterial strains identified to cause acne. [69] Clove oil has been shown to effectively destroy S. aureus bacteria in either free floating (planktonic cells) state, or in a structured community where numerous bacteria cells are attached to each other (sessile or biofilm). [70]</span></span></p><h1 class="p3" data-dcnode-id="1663"><span class="s1" data-dcnode-id="1664"><b data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">Improves Sex Drive</span></b></span></h1><p class="p1" data-dcnode-id="1660"><span class="s1" data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">Spices such as cloves are often referred to as “hot” foods, as they are said to posses aphrodisiac properties. Unami Medicine, also referred to as Greeco-Arab medicine is a traditional system of medicine practiced in Mughal India and in Muslim culture of South and Central Asia subcontinents. Since ancient times, Unami medicine used cloves to treat male sexual disorders. [71] Research shows that cloves can significantly improve libido and potency in small animals. Cloves are naturally aromatic which also helps with decreasing stress, and relaxing the mind and body. The exact mechanism is not fully understood, but use of cloves appears to be safe. [71] When mixed with other “hot foods” such as nutmeg, the aphrodisiac results were even stronger in terms of increasing mating behaviour, sexual function and activity in tested animals. [72]</span></span></p><h1 class="p3" data-dcnode-id="1656"><span class="s1" data-dcnode-id="1657"><b data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">Micronutrient Profile</span></b></span></h1><p class="p1" data-dcnode-id="1650"><span class="s1" data-dcnode-id="1651"><span data-dcnode-id="1655" instrument_node="">Cloves are a true superfood, packed with an expansive profile filled with powerful ingredients.</span><span class="Apple-converted-space" data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1652" instrument_node="">As with all spices, cloves carry little calories, but hold micronutrients which boost metabolism, internal health and immunity. Just one teaspoon (2 grams) of ground cloves contains:</span></span></p><ul class="ul1" data-dcnode-id="1637"><li class="li1" data-dcnode-id="1647"><span class="s1" data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">about 6.5 Calories</span></span></li><li class="li1" data-dcnode-id="1644"><span class="s1" data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">1.2 grams of Carbohydrates, most of which is Fiber (0.7 grams)</span></span></li><li class="li1" data-dcnode-id="1641"><span class="s1" data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">no sugar</span></span></li><li class="li1" data-dcnode-id="1638"><span class="s1" data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">0.4 grams of fats, a big chunk of which are essential fats (omega-3 and omega-6)</span></span></li></ul><p class="p1" data-dcnode-id="1628"><span class="s1" data-dcnode-id="1629"><span data-dcnode-id="1636" instrument_node="">Cloves are also an excellent source of [1 tbsp]: Manganese (30% of daily value (DV)), and good source of Vitamin K (4% of DV), and Vitamin C (3% of DV). [64]</span><span class="Apple-converted-space" data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1633" instrument_node="">As mentioned before, manganese is a key component of maintaining a healthy brain and strong bones. [73, 74]</span><span class="Apple-converted-space" data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1630" instrument_node="">Vitamin C is a powerful antioxidant playing numerous roles in improving immune response, and protecting the body against free radical damage. [75] Vitamin K is an important family group of compounds which are essential blood coagulators during immune response. [76]</span></span></p><p class="p1" data-dcnode-id="1625"><span class="s1" data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">Here’s a more complete list of macro-, micro- and phytonutrients [64]:</span></span></p><ul class="ul1" data-dcnode-id="1555"><li class="li1" data-dcnode-id="1622"><span class="s1" data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">protein</span></span></li><li class="li1" data-dcnode-id="1619"><span class="s1" data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">carbohydrates</span></span></li><li class="li1" data-dcnode-id="1616"><span class="s1" data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">dietary fiber</span></span></li><li class="li1" data-dcnode-id="1613"><span class="s1" data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">omega-3 fatty acids</span></span></li><li class="li1" data-dcnode-id="1610"><span class="s1" data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">omega-6 fatty acids</span></span></li><li class="li1" data-dcnode-id="1607"><span class="s1" data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">vitamin A</span></span></li><li class="li1" data-dcnode-id="1604"><span class="s1" data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">vitamin B3 (niacin)</span></span></li><li class="li1" data-dcnode-id="1601"><span class="s1" data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">vitamin B9 (folate)</span></span></li><li class="li1" data-dcnode-id="1598"><span class="s1" data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">vitamin C (L-ascorbic acid)</span></span></li><li class="li1" data-dcnode-id="1595"><span class="s1" data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">vitamin E (alpha tocopherol)</span></span></li><li class="li1" data-dcnode-id="1592"><span class="s1" data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">vitamin K</span></span></li><li class="li1" data-dcnode-id="1589"><span class="s1" data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">choline</span></span></li><li class="li1" data-dcnode-id="1586"><span class="s1" data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">betaine</span></span></li><li class="li1" data-dcnode-id="1583"><span class="s1" data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">calcium</span></span></li><li class="li1" data-dcnode-id="1580"><span class="s1" data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">potassium</span></span></li><li class="li1" data-dcnode-id="1577"><span class="s1" data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">phosphorus</span></span></li><li class="li1" data-dcnode-id="1574"><span class="s1" data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">magnesium</span></span></li><li class="li1" data-dcnode-id="1571"><span class="s1" data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">manganese</span></span></li><li class="li1" data-dcnode-id="1568"><span class="s1" data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">zinc</span></span></li><li class="li1" data-dcnode-id="1565"><span class="s1" data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">selenium</span></span></li><li class="li1" data-dcnode-id="1562"><span class="s1" data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">phosphorus</span></span></li><li class="li1" data-dcnode-id="1559"><span class="s1" data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">iron</span></span></li><li class="li1" data-dcnode-id="1556"><span class="s1" data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">phytosterols</span></span></li></ul><p class="p1" data-dcnode-id="1552"><span class="s1" data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">Besides vitamins and minerals, cloves extracts contain powerful antioxidants, including: falvonoids, hexane, methylene chloride, ethanol, thymol, eugenol and other benzene based compound. All of such compounds were shown to possess potent antioxidant, tissue-protective, anti-microbial and anti-inflammatory properties. [77]</span></span></p><h1 class="p3" data-dcnode-id="1548"><span class="s1" data-dcnode-id="1549"><b data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">Possible Drawbacks</span></b></span></h1><p class="p1" data-dcnode-id="1545"><span class="s1" data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">Cloves have been used for centuries and deemed safe to consume. However, as with anything, a word of caution is warranted when using cloves and/or clove oil products.</span></span></p><p class="p1" data-dcnode-id="1542"><span class="s1" data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">Eugenol within cloves has shown some anticoagulant and anti-platelet properties which may counteract some of the blood clotting response. Clove oil contains high concentration of eugenol and people with such disorder or after surgical procedures should use caution. [57]</span></span></p><p class="p1" data-dcnode-id="1539"><span class="s1" data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">Pure clove oil is concentrated with eugenol, which may cause skin irritation if applied for topical use. Often, clove oils are diluted or mixed with other oils such as coconut in order to minimize the exposure. Also, clove oil is not generally recommended for children under age of two. [78]</span></span></p><h1 class="p3" data-dcnode-id="1535"><span class="s1" data-dcnode-id="1536"><b data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Final Thoughts</span></b></span></h1><p class="p1" data-dcnode-id="1532"><span class="s1" data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">Cloves are unique flower buds that carry a beautiful smell, delicious in taste while possessing many health benefits. Ancient medicinal practices used this spice to heal numerous conditions from toothaches to regulating blood pressure.</span></span></p><p class="p1" data-dcnode-id="1529"><span class="s1" data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">Clove essential oil is packed with its main active ingredient—eugenol. It prevents inflammation, oxidative stress and holds enormous potential in fighting many serious diseases like diabetes, cancers and other virus causing infections. Science has dubbed cloves as an anti-inflammatory natural ingredient, and showed it to have most amount of antioxidants compared to other superfoods. Such impressive polyphenols, vitamins and minerals within cloves, boost immune response, bone density and have been known to improve sex drive.</span></span></p><p class="p1" data-dcnode-id="1526"><span class="s1" data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">Cloves are delicious bringing warm and aromatic flavours to various dishes and teas. It’s a wonderful spice to have around, capable of enhancing all kitchen creations as well as internal health and wellness.</span></span></p><h1 class="p3" data-dcnode-id="1522"><span class="s1" data-dcnode-id="1523"><b data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">DUPIsCHAI blends</span></b></span></h1><p class="p1" data-dcnode-id="1516"><span class="s1" data-dcnode-id="1517"><span data-dcnode-id="1521" instrument_node="">The philosophy of Dupi’s Chai, is to craft unique tea and spice blends with extensive health benefits. Our blends are inspired by past traditions, combined with modern science, producing</span><span class="Apple-converted-space" data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">&nbsp; </span></span><span data-dcnode-id="1518" instrument_node="">amazing chai that is smooth, fragrant, tasty and most importantly—healthy. We extensively researched and tested our blends, perfecting each formula.&nbsp;</span></span></p><p class="p1" data-dcnode-id="1505"><span class="s1" data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">Cloves are one of the seven spices in the </span></span><span class="s4" data-dcnode-id="1511" style="color: #ff00ff;"><b data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">Arise Chai</span></b></span><span class="s6" data-dcnode-id="1508"><b data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">.</span></b></span><span class="s1" data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node=""> This blend is packed with antioxidants and other ingredients scientifically proven to boost metabolism, improve memory and cognition, combat inflammation, fight infections, elevate organ health and function.</span></span></p><p class="p1" data-dcnode-id="1501"><span class="s1" data-dcnode-id="1502"><b data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">References:</span></b></span></p><ol class="ol1" data-dcnode-id="1032"><
