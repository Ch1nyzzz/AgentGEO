</span><h1 class="c-title--lg t-element-margin--top-bottom--variant entry-title" data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Skin Cancer – Natural Treatment Options</span></h1><span data-dcnode-id="1060" instrument_node="">

</span><div class="c-title--md t-element-margin--bottom t-txt-color--black-040 t-text--italic" data-dcnode-id="1051" style="font-weight: 400"><span data-dcnode-id="1055" instrument_node="">

</span><time class="published" data-dcnode-id="1046" datetime="2015-05-21 19:40-0300" style="display:none;"><span data-dcnode-id="1047" instrument_node="">7:40pm on May 21st, 2015</span></time><span data-dcnode-id="1045" instrument_node="">
</span><time class="updated" data-dcnode-id="1043" datetime="2018-06-11 17:19-0300" style="display:none;"><span data-dcnode-id="1044" instrument_node="">5:19pm on June 11th, 2018</span></time><span data-dcnode-id="1042" instrument_node="">
</span></header><span data-dcnode-id="1040" instrument_node="">
</span><div class="c-single" data-dcnode-id="588"><span data-dcnode-id="1039" instrument_node="">
</span><div class="c-special-article__content" data-dcnode-id="604"><span data-dcnode-id="1038" instrument_node="">
</span><div class="c-paragraph entry-content" data-dcnode-id="690"><span data-dcnode-id="1037" instrument_node="">
</span><div class="caixaTexto" data-dcnode-id="692"><span data-dcnode-id="1036" instrument_node="">
</span><p class="alignCenter" data-dcnode-id="1031"><a class="external" data-dcnode-id="1034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.medicinenet.com/image-collection/skin_cancer_picture/picture.htm" target="_blank"><img alt="http://images.medicinenet.com/images/slideshow/summerskin_rm_collage_of_precancerous_skin_growths_s17.jpg" border="0" data-dcnode-id="1035" height="335" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drsircus.com/wp-content/uploads/2015/05/skin.jpg&amp;raw" width="493"></a><strong data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node=""> </span></strong></p><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1025"><span data-dcnode-id="1029" instrument_node=""> </span><a class="external external_icon" data-dcnode-id="1027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.medicinenet.com/image-collection/skin_cancer_picture/picture.htm" target="_blank"><span data-dcnode-id="1028" instrument_node="">Skin  cancer</span></a><span data-dcnode-id="1026" instrument_node=""> is the most commonly diagnosed cancer among men and women. Over one  million cases are diagnosed each year, with more young people having skin  cancer than ever before. When you have any irregularity on the skin pulling  attention to it, then you have two immediate choices.</span></p><span data-dcnode-id="1024" instrument_node="">
</span><p data-dcnode-id="1016"><span data-dcnode-id="1023" instrument_node="">  One, you can begin to abuse yourself, with  western oncology, which will start tests that can lead to provoking cancer even  if there is not cancer already present. Biopsies and all tests that employ  radiation are not perfectly safe. Certainly their </span><a data-dcnode-id="1021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drsircus.com/medicine/cancer/zelboraf-skin-cancer-drug"><span data-dcnode-id="1022" instrument_node="">medications</span></a><span data-dcnode-id="1020" instrument_node=""> and treatments are </span><a data-dcnode-id="1018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drsircus.com/medicine/the-end-of-toxic-chemo-and-radiation"><span data-dcnode-id="1019" instrument_node="">dangerous  and not highly effective</span></a><span data-dcnode-id="1017" instrument_node=""> though in most cases skin cancer is easily treated  with simple precedures.</span></p><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1010"><span data-dcnode-id="1014" instrument_node="">  Your second option is to cut to the chase,  meaning assume the worst and starting that same day to treat oneself with a  list of natural agents that are safe and effective in returning skin to its  former healthy self you can begin to apply what might just save the day before  one can even turn around and take some </span><a class="external external_icon" data-dcnode-id="1012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cancer.gov/types/skin/patient/skin-treatment-pdq%23section/all" target="_blank"><span data-dcnode-id="1013" instrument_node="">dangerous  allopathic tests</span></a><span data-dcnode-id="1011" instrument_node="">.</span></p><span data-dcnode-id="1009" instrument_node="">
</span><p data-dcnode-id="1004"><span data-dcnode-id="1008" instrument_node="">  Though it is true that most skin cancers  are detected and cured before they spread it is better to do this first on your  own with </span><a data-dcnode-id="1006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drsircus.com/medicine/natural-oncology"><span data-dcnode-id="1007" instrument_node="">natural  oncology</span></a><span data-dcnode-id="1005" instrument_node=""> methods, outlined below, than western medicine&nbsp; that surgically excises small tumors by  removal with skin scraping and electric current cauterization, frozen with  liquid nitrogen, or killed with low-dose radiation.</span></p><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="995"><span data-dcnode-id="1002" instrument_node="">  Once one  gets involved with the medical system one starts down a </span><a data-dcnode-id="1000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drsircus.com/medicine/cancer/oncologists-conceal-toxicity-issues-bias"><span data-dcnode-id="1001" instrument_node="">slippery  slope</span></a><span data-dcnode-id="999" instrument_node=""> because none of their methods address the broad fundamental  etiologies behind cancer and its formation. The official covering statement  from the medical establishment about skin cancer is that standard treatments  for localized basal cell and squamous cell carcinomas are safe and effective  and cause few side effects. Few side effects means there are hidden costs  instead of powerful positive effects that come with the use of </span><a data-dcnode-id="997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drsircus.com/medicine/nutrition/concentrated-nutritional-medicine-2"><span data-dcnode-id="998" instrument_node="">medicinals  that address nutritional deficiencies</span></a><span data-dcnode-id="996" instrument_node="">(that cause cancer). These same medicinals, like iodine, selenium,  bicarbonate and magnesium treat and help remove tumors while they address the  fundamental problems behind the cancer.</span></p><span data-dcnode-id="994" instrument_node="">
</span><p data-dcnode-id="986"><span data-dcnode-id="993" instrument_node="">  Before we take another step we need to  understand that the main paradigm western medicine has is to stay away from the  dangerous sun. No doubt the sun is dangerous in any excess skin burning amounts  but it is important to realize that </span><a class="external external_icon" data-dcnode-id="991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Dl8txNSY5kmo" target="_blank"><span data-dcnode-id="992" instrument_node="">not enough sun and thus  inadequate vitamin D, can also cause cancer.</span></a><span data-dcnode-id="990" instrument_node=""> Any understanding of skin  cancer and its treatment has to incorporate solar wisdom, not untrustworthy  propaganda from the dermatologists who will turn you into a sun avoider pushing  you into </span><a data-dcnode-id="988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drsircus.com/medicine/vitamin-d-ebola-infectious-disease-processes"><span data-dcnode-id="989" instrument_node="">vitamin  D deficiency</span></a><span data-dcnode-id="987" instrument_node="">.</span></p><span data-dcnode-id="985" instrument_node="">
</span><p data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">  The more serious the skin cancer (the less  well you feel) the deeper into the protocol one must go. Translating this into  straight common language, the more afraid you are the more you are going to  need to do. If you have any fear that your cancer, if you have it, could spread  the more of an emergency situation you have on your hands. This means you have  to throw the kitchen sink at your body and skin employing many powerful  therapies whose overlapping medical firepower can return you and your skin to  health.</span></p><span data-dcnode-id="982" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="981" instrument_node="">  Everyone who does overexpose their skin to  the sun needs to know that CBD cream or salve, that is </span><a data-dcnode-id="979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drsircus.com/books/e-book/medical-marijuana"><span data-dcnode-id="980" instrument_node="">medical marijuana</span></a><span data-dcnode-id="978" instrument_node=""> without the often illegal THC, is the best medicine to treat sunburn and that  makes sense because medical marijuana is one of the </span><a data-dcnode-id="976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drsircus.com/medicine/cannabis-cures-cancer"><span data-dcnode-id="977" instrument_node="">best medicines  available to treat cancer</span></a><span data-dcnode-id="975" instrument_node="">, and </span><a data-dcnode-id="973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drsircus.com/medicine/transdermal-medical-marijuana-skin-cancer-treatment"><span data-dcnode-id="974" instrument_node="">in  topical form especially skin cancer</span></a><span data-dcnode-id="972" instrument_node="">. Taken in enough dosage medical  marijuana is a </span><a data-dcnode-id="970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drsircus.com/medicine/cancer/natural-allopathic-medicine"><span data-dcnode-id="971" instrument_node="">natural  alternative to chemotherapy</span></a><span data-dcnode-id="969" instrument_node="">. For the skin it is one of the best medicines  to treat skin cancer because it actually </span><a data-dcnode-id="967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drsircus.com/medicine/cancer/cannabis-destroys-cancer-cells"><span data-dcnode-id="968" instrument_node="">kills  cancer cells</span></a><span data-dcnode-id="966" instrument_node=""> as </span><a data-dcnode-id="964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drsircus.com/medicine/cancer/thyroid-cancer-iodine"><span data-dcnode-id="965" instrument_node="">iodine does</span></a><span data-dcnode-id="963" instrument_node="">.  Dr. Tullio Simoncini, an oncologist in Rome, uses iodine to treat skin cancer.  Both can be applied topically. Both can be used almost around the clock to  great effect. (See testimony below)</span></p><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="956"><span data-dcnode-id="960" instrument_node="">  An entire generation of women has grown up  schooled on the critical importance of sunscreen yet more people are being  diagnosed with skin cancer than ever. Fifty years ago, when I was young and  before the advent of modern sunscreens, everyone baked in the sun without fear  and we did not have skin cancer rates going off the charts. The </span><a class="external external_icon" data-dcnode-id="958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yahoo.com/health/the-scary-causes-behind-the-rise-in-skin-cancer-118288125190.html" target="_blank"><span data-dcnode-id="959" instrument_node="">official  view of skin cancer and its cause</span></a><span data-dcnode-id="957" instrument_node=""> is perverted and obviously dead wrong.</span></p><span data-dcnode-id="955" instrument_node="">
</span><h2 data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Skin Cancer and Infectious Microbes</span></h2><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="941"><span data-dcnode-id="951" instrument_node="">  It is important to realize that many  scientists believe viruses, fungi and bacteria are all different stages of the  microbe life cycle and are directly involved in all forms of cancer including  skin and </span><a class="external external_icon" data-dcnode-id="949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.3rdmisc.com/pdf/3rdmisc201301enpp8-11.pdf" target="_blank"><span data-dcnode-id="950" instrument_node="">breast  cancer</span></a><span data-dcnode-id="948" instrument_node="">. A significant number of </span><a class="external external_icon" data-dcnode-id="946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.alternative-cancer-care.com/cancer-fungus-link.html" target="_blank"><span data-dcnode-id="947" instrument_node="">cancer  researchers have found evidence</span></a><span data-dcnode-id="945" instrument_node=""> supporting the </span><a data-dcnode-id="943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drsircus.com/medicine/cancer/is-cancer-a-fungus"><span data-dcnode-id="944" instrument_node="">cancer fungus  link</span></a><span data-dcnode-id="942" instrument_node=""> so using bicarbonate and iodine, both antifungal medicines, is  intelligent.</span></p><span data-dcnode-id="940" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">  Non-melanoma skin cancer is the most common  type of cancer among men and women. The most common types of skin cancer  include: </span></p><span data-dcnode-id="937" instrument_node="">
</span><ul data-dcnode-id="890"><span data-dcnode-id="936" instrument_node="">
</span><li data-dcnode-id="931"><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">Basal       cell</span></p><span data-dcnode-id="932" instrument_node="">
</span></li><span data-dcnode-id="930" instrument_node="">
</span><li data-dcnode-id="898"><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Squamous       cell</span></p><span data-dcnode-id="926" instrument_node="">
</span><div class="bb-cc-single" data-dcnode-id="900"><span data-dcnode-id="925" instrument_node="">
</span><div class="bb-cc-single__image" data-dcnode-id="911"><span data-dcnode-id="924" instrument_node="">

</span><div class="bb-cc-single__text" data-dcnode-id="902"><span data-dcnode-id="909" instrument_node="">
</span><p data-dcnode-id="907" style="font-family: tk-source-sans-pro-n4; color: white; text-align: justify; margin-bottom: 16px;"><span data-dcnode-id="908" instrument_node="">Special Offer: My 100 lesson course on cancer at eighty percent off the regular price of 500 dollars. So your cost will be only 99 dollars. The course is part of a doctoral program at Da Vinci University and, when taken for credit, costs 1,000 Euros for both parts.</span></p><span data-dcnode-id="906" instrument_node="">

</span><p data-dcnode-id="869"><span data-dcnode-id="873" instrument_node="">  Natural Allopathic Medicine has </span><a data-dcnode-id="871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drsircus.com/medicine/natural-allopathic-medicine-protocol-components"><span data-dcnode-id="872" instrument_node="">protocol  recommendations</span></a><span data-dcnode-id="870" instrument_node=""> for treatments of these cancers that put to work the most  effective and natural substances against the growth and metastases of cancer  cells. The primary substances used in this protocol include: </span></p><span data-dcnode-id="868" instrument_node="">
</span><ul data-dcnode-id="837"><span data-dcnode-id="867" instrument_node="">
</span><li data-dcnode-id="859"><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="861"><span data-dcnode-id="865" instrument_node="">Transdermal       Magnesium Therapy using Ancient Minerals Magnesium Oil, lotions and bath       flakes. Follow the same recommendations used for </span><a data-dcnode-id="863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drsircus.com/medicine/cancer/transdermal-breast-cancer-treatments"><span data-dcnode-id="864" instrument_node="">transdermal       treatment of breast cancer</span></a><span data-dcnode-id="862" instrument_node="">. </span></p><span data-dcnode-id="860" instrument_node="">
</span></li><span data-dcnode-id="858" instrument_node="">
</span><li data-dcnode-id="853"><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Sodium       bicarbonate used orally to increase the body pH. When used orally the pH       needs to be raised to 8 for a week to ten days, a break is then taken and       this round of treatment is then resumed, until cancer is confirmed to be       remediated. </span></p><span data-dcnode-id="854" instrument_node="">

</span><p data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">Sodium       Bicarbonate used as a paste applied to the cancerous lesions multiple       times per day till dry. </span></p><span data-dcnode-id="848" instrument_node="">
</span></li><span data-dcnode-id="846" instrument_node="">
</span><li data-dcnode-id="839"><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="841"><a data-dcnode-id="843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drsircus.com/medicine/magnesium/principles-and-practices-of-transdermal-therapy"><span data-dcnode-id="844" instrument_node="">Iodine       used orally and topically</span></a><span data-dcnode-id="842" instrument_node=""> applied to the affected area multiple times       per day, alternating with the sodium bicarbonate applications. Dr. Tullio       Simoncini states, “Every tumour of the skin can be completely removed with       iodine tincture 7%, brushed many times (10-20) once a day.</span></p><span data-dcnode-id="840" instrument_node="">
</span></li><span data-dcnode-id="838" instrument_node="">
</span></ul><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Dr. Simoncini  explains:</span></p><span data-dcnode-id="833" instrument_node="">
</span><p class="leftCitation" data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">“For  epithileomas, basaliomas and melanomas, the treatment to choose is iodine  solution at seven% as it is capable of precipitating the proteins of the body  of the fungus and destroying them completely in a short time. If the lesions  are fairly small, they must be painted with the solution 10-20-30 times twice a  day for five days and then once for another ten days so that they become very  dark. When the eschar is formed and it is higher than the epidermic plane, it  is necessary to continue to paint under and above it, even if at first a strong  pain is sensed.”</span></p><span data-dcnode-id="830" instrument_node="">
</span><p class="leftCitation" data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">“When the crust  is formed, don’t take it away, but treat the area continuously and wait until  it falls without any other intervention except the iodine tincture. When the  crust falls down the third time, the patient is healed.” When a scab forms over  the affected area it is allowed to drop off naturally until no further lesion  is seen. (Usually after three scabs form and fall off) This process may need to  be repeated multiple times.”</span></p><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">  Note: Tinctures  of Iodine are not suitable for oral ingestion and should be used transdermally  only. Many iodine products are marked “not for oral ingestion” so please heed  this caution. </span></p><span data-dcnode-id="824" instrument_node="">

</span><li data-dcnode-id="813"><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="821" instrument_node="">Cannabidiols-CBD,       oil, creams, lotions or </span><a data-dcnode-id="819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drsircus.com/medicine/cancer/cannabinoids-cancer-treatment"><span data-dcnode-id="820" instrument_node="">medical       marijuana</span></a><span data-dcnode-id="818" instrument_node=""> with THC where legally available. High dose CBD oils are       available at a discount to Dr. Sircus’ online clinic clients.&nbsp; Also see this essay:&nbsp; </span><a class="external external_icon" data-dcnode-id="816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unitedpatientsgroup.com/blog/2014/07/15/is-cannabis-oil-a-viable-treatment-for-skin-cancer/" target="_blank"><span data-dcnode-id="817" instrument_node="">http://www.unitedpatientsgroup.com/blog/2014/07/15/is-cannabis-oil-a-viable-treatment-for-skin-cancer/</span></a></p><span data-dcnode-id="814" instrument_node="">
</span></li><span data-dcnode-id="812" instrument_node="">

</span><p data-dcnode-id="803"><span data-dcnode-id="810" instrument_node="">Treatment       with infrared therapy (with </span><a class="tracked external external_icon" data-dcnode-id="808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//medicalbiomats.com/" target="_blank"><span data-dcnode-id="809" instrument_node="">BioMats</span></a><span data-dcnode-id="807" instrument_node="">)       provides thermotherapy that can be effective for all cancers for it raises </span><a data-dcnode-id="805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drsircus.com/medicine/low-body-temperature-symptoms-causes-treat"><span data-dcnode-id="806" instrument_node="">low       body temperature</span></a><span data-dcnode-id="804" instrument_node=""> dramatically increasing the immune system’s ability       to clear the body of cancer. According to Professor Abo Touru of Nagata       University our immune functions are improved by 40% when we increase our       body temperature by 1 degree. Infrared heat (light induced heat) relieves       pain by expanding blood vessels and increasing blood circulation. Better       circulation carries off metabolic waste products and delivers oxygen-rich       blood to oxygen depleted cells, reduces pain and speeds up the healing       process. </span></p><span data-dcnode-id="802" instrument_node="">
</span></li><span data-dcnode-id="800" instrument_node="">
</span><li data-dcnode-id="790"><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="792"><a class="tracked external external_icon" data-dcnode-id="797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.whnstore.com/Revici-Selenated-Tung-Oil-p/sup-tsel-1oz.htm%3Fclick%3D159" target="_blank"><span data-dcnode-id="798" instrument_node="">Liquid       Selenium</span></a><span data-dcnode-id="796" instrument_node="">. Even at low dosages       selenium dramatically reduces our chances of dying from cancer. Taken in       the safest form, high dosages treat cancer and should be part of every       cancer patient’s protocol. Very few doctors       or people understand enough about selenium and how useful it is. I       recommend for selenium the </span><a data-dcnode-id="794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drsircus.com/books/e-book/selenium-medicine/"><span data-dcnode-id="795" instrument_node="">only book</span></a><span data-dcnode-id="793" instrument_node=""> in       the world on selenium. </span></p><span data-dcnode-id="791" instrument_node="">
</span></li><span data-dcnode-id="789" instrument_node="">
</span></ul><span data-dcnode-id="787" instrument_node="">
</span><p class="leftCitation" data-dcnode-id="783"><a class="external external_icon" data-dcnode-id="785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//drrevici.com/" target="_blank"><span data-dcnode-id="786" instrument_node="">Dr. Emanuel Revici</span></a><span data-dcnode-id="784" instrument_node="">’s greatest discovery was that if we want to deliver a nutrient to a sick  cell – attach it to a fat.&nbsp; Unsaturated  fats are the ultimate and perfect vehicle to deliver nutrients to stressed  cells.&nbsp; Revici used a special molecular  form of selenium (bivalent-negative selenium) incorporated in a molecule of  fatty acid. In this form, he can administer up to 1 gram of selenium per day,  which corresponds to 1 million micrograms per day, reportedly with no toxic  side effects. In contrast, too much selenite (hexavalent-positive selenium) has  toxic effects on animals, so human intake of commercial selenite is limited to  a dosage of only 100 to 150 micrograms by mouth. Dr. Revici often administered  his nontoxic form of selenium by injection, usually considered to be four times  more powerful than the form given orally.</span></p><span data-dcnode-id="782" instrument_node="">
</span><p class="leftCitation" data-dcnode-id="777"><span data-dcnode-id="781" instrument_node="">  Revici’s use of selenium in the treatment of  cancer predates mainstream interest in this mineral by more than twenty years.  Selenium is one of the major trace elements </span><a class="external external_icon" data-dcnode-id="779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.healthy.net/Health/Article/Revici_Therapy/2013/3" target="_blank"><span data-dcnode-id="780" instrument_node="">always found  deficient in cancer-prone populations</span></a><span data-dcnode-id="778" instrument_node="">. Research has shown that it is of value not  only in preventing cancer but also in treating it. In this form, he  administered up to 1 gram of selenium per day, which corresponds to 1 million  micrograms per day, reportedly with no toxic side effects. In contrast, too  much selenite (hexavalent-positive selenium) has toxic effects on animals, so  human intake of commercial selenite is limited to a dosage of only 100 to 150 micrograms  by mouth.</span></p><span data-dcnode-id="776" instrument_node="">
</span><p class="leftCitation" data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">  In 1954, Revici’s fund-raising organization  financed the purchase of Beth David Hospital in Manhattan. Renamed Trafalgar  Hospital, this general-care facility employing over 200 resident and visiting  physicians enabled Revici, as the chief of oncology, to provide round-the-clock  care for critically ill patients.</span></p><span data-dcnode-id="773" instrument_node="">

</span><p data-dcnode-id="765"><a data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drsircus.com/medicine/cancer/using-vitamin-c-for-heart-disease-cancer-and-cell-protection"><span data-dcnode-id="770" instrument_node="">Vitamin       C</span></a><span data-dcnode-id="768" instrument_node=""> and </span><a data-dcnode-id="766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drsircus.com/medicine/vitamin-d-ebola-infectious-disease-processes"><span data-dcnode-id="767" instrument_node="">D       in high dosages</span></a></p><span data-dcnode-id="764" instrument_node="">
</span></li><span data-dcnode-id="762" instrument_node="">
</span><li data-dcnode-id="749"><span data-dcnode-id="761" instrument_node="">

</span><li data-dcnode-id="727"><span data-dcnode-id="736" instrument_node="">
</span><p data-dcnode-id="729"><a data-dcnode-id="734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drsircus.com/medicine/cancer/pulsed-electromagnetic-field-therapy-cancer-pain"><span data-dcnode-id="735" instrument_node="">PEMF       Therapy</span></a><span data-dcnode-id="733" instrument_node="">: There is little doubt in the medical world that pulsed       electromagnetic therapy is helpful in the resolution of cancer. This is </span><a class="external external_icon" data-dcnode-id="731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earthpulse.net/%23a_aid%3Ddrsircus" target="_blank"><span data-dcnode-id="732" instrument_node="">frequency       medicine at its best</span></a><span data-dcnode-id="730" instrument_node=""> without all the cost often inherent in this       approach. </span></p><span data-dcnode-id="728" instrument_node="">

</span><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Skin-cancer  rates have been on the rise for 30 years, despite decades of lectures about  sunscreen. Skin cancer is the most common cancer in this country. Nearly 5  million Americans are treated for the disease each year, and the incidence rate  is up 300 percent from 1994. Indoor tanning alone is linked to 419,000 cases of  skin cancer a year in the U.S. Though melanoma represents only a small  percentage of diagnoses, it can spread fast and be lethal, and it’s the most  common form of cancer among young adults aged 25 to 29. </span></p><span data-dcnode-id="710" instrument_node="">

</span><div data-dcnode-id="304" id="postCompatContainer"><div class="comment__wrapper" data-dcnode-id="414"><div class="comment__name clearfix" data-dcnode-id="428"><img class="comment__avatar" data-dcnode-id="433" height="32" src="https://c.disquscdn.com/uploads/users/20099/3017/avatar92.jpg?1458398397" width="32"/><strong data-dcnode-id="430"><a data-dcnode-id="431" href=""><span data-dcnode-id="432" instrument_node="">Missouri Patriot</span></a></strong><span data-dcnode-id="429" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="415"><p data-dcnode-id="416"><span data-dcnode-id="427" instrument_node="">Dr. Sircus,</span><br data-dcnode-id="426"/><span data-dcnode-id="425" instrument_node="">Can the CBD Oil be used right on the tumor?</span><br data-dcnode-id="424"/><span data-dcnode-id="423" instrument_node="">I have a horse that has a baseball sized SCC. He is also 30 years old so I want to be careful of using destructive methods here. This thing was misdiagnosed for years and got angry this spring (2020). Now its huge and I'm trying to help him through this. He pretty healthy otherwise and I am also using homeopathy but need to keep the cost reasonable.</span><br data-dcnode-id="422"/><span data-dcnode-id="421" instrument_node="">Thank you for any thoughts you can share.</span><br data-dcnode-id="420"/><span data-dcnode-id="419" instrument_node="">Long time reader and user of your advice on many levels :-)</span><br data-dcnode-id="418"/><span data-dcnode-id="417" instrument_node="">15gdmclaugh@gmail.com</span></p></div></div><div class="comment__wrapper" data-dcnode-id="396"><div class="comment__name clearfix" data-dcnode-id="408"><img class="comment__avatar" data-dcnode-id="413" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="410"><a data-dcnode-id="411" href=""><span data-dcnode-id="412" instrument_node="">John Martin</span></a></strong><span data-dcnode-id="409" instrument_node=""> • 2 years ago
        </span></div><div class="comment__content" data-dcnode-id="397"><p data-dcnode-id="398"><span data-dcnode-id="407" instrument_node="">Hi,</span><br data-dcnode-id="406"/><span data-dcnode-id="405" instrument_node="">I was just diagnosed with a basal Cell cancer - thought it was a spider bite originally but then it started growing.  I had been reading about how well raw garlic works against any type of cancer, so I elected to try a garlic/DMSO mix to kill the surface cells and anything that might be hiding underneath.  In a day, the pink, innocuous looking growth looked like it had been in a war.</span><br data-dcnode-id="404"/><span data-dcnode-id="403" instrument_node="">the doc wants to cut it off but I think I might not need any help.  Has anybody tried this and do you have any suggestions?  </span><br data-dcnode-id="402"/><span data-dcnode-id="401" instrument_node="">After a few days, I'm giving it a break as the skin around the growth has taken a bit of a beating from the garlic.  so, I'm thinking  I'll go with sodium bicarb paste and iodine until the surrounding skin heals.</span><br data-dcnode-id="400"/><span data-dcnode-id="399" instrument_node="">Any further ideas would be greatly appreciated.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="386"><div class="comment__name clearfix" data-dcnode-id="390"><img class="comment__avatar" data-dcnode-id="395" height="32" src="https://c.disquscdn.com/uploads/users/16383/8368/avatar92.jpg?1435792755" width="32"/><strong data-dcnode-id="392"><a data-dcnode-id="393" href=""><span data-dcnode-id="394" instrument_node="">Bob</span></a></strong><span data-dcnode-id="391" instrument_node=""> • 4 years ago
        </span></div><div class="comment__content" data-dcnode-id="387"><p data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Mag Oil from the source you recommend is very high salinity which kills off the good bacteria...better to use Dead Sea version...also, as for infrared saunas, one manufacturer, High Tech Health, has a disclaimer not to use them if there are existing adrenal fatigue issues, as the sauna could stress them out even more leading to thyroid problems.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="376"><div class="comment__name clearfix" data-dcnode-id="380"><img class="comment__avatar" data-dcnode-id="385" height="32" src="https://c.disquscdn.com/uploads/users/10847/7321/avatar92.jpg?1401198158" width="32"/><strong data-dcnode-id="382"><a data-dcnode-id="383" href=""><span data-dcnode-id="384" instrument_node="">Susan K</span></a></strong><span data-dcnode-id="381" instrument_node=""> • 5 years ago
        </span></div><div class="comment__content" data-dcnode-id="377"><p data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">Wow, I have been using 7% iodine to treat self diagnosed skin cancer on my nose, treatment is painful and taking some time now that I am down to the tip of my nose and can clearly see the tumor area, but treatment stalled and I had this painful dried spot that was very slowing becoming smaller, but sometimes seemed to be unaffected. I read this and started alternating 3% peroxide and 7% iodine on the tumor and right away I could feel it wrapping around the tumor and pulling it from my flesh, hurt like hell, but the edges are more defined on a visibly smaller tumor in just a few hours. AMAZING.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="366"><div class="comment__name clearfix" data-dcnode-id="370"><img class="comment__avatar" data-dcnode-id="375" height="32" src="https://c.disquscdn.com/uploads/users/10672/7700/avatar92.jpg?1451072115" width="32"/><strong data-dcnode-id="372"><a data-dcnode-id="373" href=""><span data-dcnode-id="374" instrument_node="">robbyh1</span></a></strong><span data-dcnode-id="371" instrument_node=""> • 4 years ago
        </span></div><div class="comment__content" data-dcnode-id="367"><p data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">Hi Susan, I have been applying a sodium bicarbonate/coconut oil home-brew paste mix to a BCC on the side of my nose for a month now and have been seeing good results with the tumor flattening, crusting over and flaking away in cycles. However, I am now experimenting with....believe it or not....VANISH OXY-ACTION GOLD fabric stain-removal granules w water. From the research I have done, cancer cannot survive in a high alkaline environment. An abundance of oxygen is equally important as well in causing death to cancer cells. Vanish Oxy-action introduces high amounts of oxygen as well as being EXTREMELY alkaline. Sounds like a no-brainer to me....I'll let you know how I get on with this...but I'll also be applying the soda paste. Also, I think it's VERY important to allow 'healing days' where nothing is applied to the area whatsoever. This allows the abnormal cells to dry out so that they can flake away from the surface.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="356"><div class="comment__name clearfix" data-dcnode-id="360"><img class="comment__avatar" data-dcnode-id="365" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="362"><a data-dcnode-id="363" href=""><span data-dcnode-id="364" instrument_node="">Carolyn McDowell</span></a></strong><span data-dcnode-id="361" instrument_node=""> • 6 years ago
        </span></div><div class="comment__content" data-dcnode-id="357"><p data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">I have a couple of moles (light brown irregular spots) on my legs that I am concerned might be cancer. I've had a case of basil cell carcinoma (it was light reddish irregular spot)on my arm  about 2 years ago. So not sure if these new spots are cancer. I know if I go to my dermatologist, she will have them biopsied and remove them immediately by scraping, digging them out, etc.  That is what she did with my basil cell and still have a big scar on my arm from that procedure. What natural treatment would be wise to use if you are not sure they are cancer. Thank so much.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="340"><div class="comment__name clearfix" data-dcnode-id="350"><img class="comment__avatar" data-dcnode-id="355" height="32" src="https://c.disquscdn.com/uploads/users/5444/2053/avatar92.jpg?1650720767" width="32"/><strong data-dcnode-id="352"><a data-dcnode-id="353" href=""><span data-dcnode-id="354" instrument_node="">Mark Sircus</span></a></strong><span data-dcnode-id="351" instrument_node=""> • 6 years ago

        </span></div><div class="comment__content" data-dcnode-id="331"><p data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Very interesting article, thank you for writing and posting it! Can you tell me where, in the U.S., can one obtain a 7% iodine for topical use?</span></p></div></div><div class="comment__wrapper" data-dcnode-id="319"><div class="comment__name clearfix" data-dcnode-id="324"><img class="comment__avatar" data-dcnode-id="329" height="32" src="https://c.disquscdn.com/uploads/users/3595/899/avatar92.jpg?1435569967" width="32"/><strong data-dcnode-id="326"><a data-dcnode-id="327" href=""><span data-dcnode-id="328" instrument_node="">ElainePl</span></a></strong><span data-dcnode-id="325" instrument_node=""> • 5 years ago
