Hi to Brian who asks help re his melanoma on his thigh. My advice is to go and have it removed by a dermatologist for analysis in order to find out if it is cancerous and if so, the kind and the size of the growth. They do not do anything further until the growth has been properly analysed and assessed for degree of advance of tumour. After this process is over you can then begin to use alternative treatment strategies. But you need proper diagnosis first. The mainstream medics are excellent at this, whatever about the treatment offered afterwards. So use all means at your disposal to offer yourself the best results. Unless you have the growth removed initially, any treatment option is likely to fail because the cancer will have begun it's ruthless course. Remove the cancer first, then change your diet and lifestyle to give yourself the best chances of stalling all future growth of the cancer.</span></p><span data-dcnode-id="3714" instrument_node="">
</span><p data-dcnode-id="3712"><span data-dcnode-id="3713" instrument_node="">That's the course I took for my melanoma. I'm three years cancer free except for a new small black nevus now on my left index finger. I'm going to my derma in two weeks to have it removed and analysed. It might not be what I think it is, unless I have it examined professionally. Good luck and keep us updated.</span></p><span data-dcnode-id="3711" instrument_node="">

</span><img align="baseline" alt="5 out of 5 stars" data-dcnode-id="3617" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/images/stars/5.png&amp;raw" title="5 out of 5 stars"><p data-dcnode-id="3615"><span data-dcnode-id="3616" instrument_node=""> </span></p><p data-dcnode-id="3613"><span data-dcnode-id="3614" instrument_node="">
I use hydrogen peroxide in a spray bottle I got from the dollar store all the time now. I had melanoma skin cancer and was researching alternative methods and came across Bill Munro's site. I used full strength 35% hydrogen peroxide on my melanoma spot on my leg. I applied it directly with an eye dropper. It fizzed and grew to the size of a quarter. The cancer is like an iceberg, small spot on top, big cancerous triangle below. It took a month and stopped fizzing. The mole is still there and is dark but when I test it no fizz. If dark moles fizz when you put hydrogen peroxide on them, you know you have a problem.</span></p><span data-dcnode-id="3612" instrument_node="">
</span><p data-dcnode-id="3610"><span data-dcnode-id="3611" instrument_node="">Now to stay healthy and virus free ( I use to be a teacher and got sick every time a kid coughed on me) I keep a spray bottle of 3% hydrogen peroxide next to my tooth paste and spray my mouth 5-6 pumps whenever I go to the mirror or brush my teeth. I spray then swallow it down with a glass of water. I haven't had a cold in 9 years now. This stuff is great. I don't prescribe to the flu shot, or any kind of drugs ever and all is well.</span></p><span data-dcnode-id="3609" instrument_node="">

</span></span><span data-dcnode-id="2795" instrument_node="">
</span><img align="baseline" alt="5 out of 5 stars" data-dcnode-id="2794" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/images/stars/5.png&amp;raw" title="5 out of 5 stars"><p data-dcnode-id="2792"><span data-dcnode-id="2793" instrument_node=""> </span></p><p data-dcnode-id="2790"><span data-dcnode-id="2791" instrument_node="">
I had 3 moles on my arm very close to one another. One mole was a dark melanoma mole, the second a pink, fleshy mole and the other a pink hard mole. I've had these moles since I was a child and wanted to really remove the black mole and since the other moles were right beside it, I treated all the moles at the same time. One word of warning is to use vaseline up to the base of the moles, I did protect the surrounding skin, but not up to the base, actually on the mole and I received some nasty chemical burns on all three moles. </span></p><p data-dcnode-id="2788"><span data-dcnode-id="2789" instrument_node="">They all did change color within the first day, it took about 4 days for them to scab up but took 2 to 3 weeks to heal from the chemical burn. I believe it will scar, and the scar will be bigger than the moles were. I am applying emu oil, iodine and other moisturizers daily to reduce the appearance of the scars. I am glad the moles are gone, just wish I had been more careful about the surrounding skin and I wouldn't have been so vigorious in applying the HP, patience is the key.</span></p><span data-dcnode-id="2787" instrument_node="">

</span><img align="baseline" alt="5 out of 5 stars" data-dcnode-id="2730" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/images/stars/5.png&amp;raw" title="5 out of 5 stars"><p data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node=""> </span></p><p data-dcnode-id="2726"><span data-dcnode-id="2727" instrument_node="">
35% Food Grade Hydrogen Peroxide--</span></p><span data-dcnode-id="2725" instrument_node="">
</span><p data-dcnode-id="2723"><span data-dcnode-id="2724" instrument_node="">I had crippling rheumatoid arthritis in 1985, where all the joints in my right arm were locked up and would not move. I was in constant, horrible pain and got no sleep for over 3 months. I began drinking extremely dilute amounts of the 35% HP DROPS in PURE WATER (NOT Tap Water!!)I also had candida albicans, and my cholesterol level was 465 as tested by my MD friend. Within 1 week the pain in my joints on my right arm was GONE and I was sleeping like a baby! Within one month I had free range of motion in all joints--from my fingers to my shoulder. My cholesterol was down to 289 and the candida symptoms were greatly reduced. By the end of the second month, my cholesterol was 155 (normal and safe) and all symptoms of candida albicans infestation were GONE. That was 28 YEARS ago, and I have had NO reoccurances of any of the above problems. I call that a "CURE!"</span></p><span data-dcnode-id="2722" instrument_node="">
</span><p data-dcnode-id="2720"><span data-dcnode-id="2721" instrument_node="">H2O2 amounts taken: Begin first day with ONE DROP H2O2 in 8 oz. PURE WATER. Second day: two drops H2O2. Third day: three drops H2O2...and so on until you reach 10 drops per day. Now, if the taste is too bad, split the HP drops into 5 in the morning, and 5 in the evening--near bed time. Work back taking 10 drops twice a day, THEN split it into THIRDS, AND begin taking 7 drops THREE times a day, or whatever you can handle. Slowly work back up to taking 10 drops THREE times a day. Don't go much higher than that, or you might want to stay at 7 drops, three times a day. Let your body determine your amount.</span></p><span data-dcnode-id="2719" instrument_node="">
</span><p data-dcnode-id="2717"><span data-dcnode-id="2718" instrument_node="">ALSO, do NOT drink any H2O2 water 45 minutes BEFORE OR AFTER EATING A MEAL OR TAKING SUPPLIMENTS! You may throw up (vomit.)</span></p><span data-dcnode-id="2716" instrument_node="">
</span><p data-dcnode-id="2714"><span data-dcnode-id="2715" instrument_node="">ALSO, take 500 mg. of Vitamin C once a day to neutralize any free radical formations that may have occured. The oxygen in the H2O2 attacks the iron in the blood and causes that reaction. The Vitamin C will clean it up, and Selenium may also be substituted for the Vitamin C.</span></p><span data-dcnode-id="2713" instrument_node="">
</span><p data-dcnode-id="2708"><span data-dcnode-id="2712" instrument_node="">MY</span><strong data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node=""> SKIN CANCER</span></strong><span data-dcnode-id="2709" instrument_node=""> (Melanoma) "erased" with topical application of 35% Food Grade HP: I had several dark mole-like formations on my forearms come up after being out in the Texas sun a lot. They itched, and my doctor friend said they were Melanomas and that I should see a professional about them. I knew what HP would do for them, so I took a nail file and GENTLY abraded the surface of these dark bumps, and then I applied straight 35% Food Grade HP to the spots with a Q-Tip (cotton swab on a stick) UNTIL THEY TURNED WHITE IN COLOR. I did this 3 times a day for a week. By the end of the week, they had turned to powder or dust, and were FLAT and GONE! There was no itching, NO pain, and they left a slightly lightened spot on my arm where they used to be. They never came back again, and that was over 20 YEARS ago!</span></p><span data-dcnode-id="2707" instrument_node="">
</span><p data-dcnode-id="2705"><span data-dcnode-id="2706" instrument_node="">ARTHRITIS IN MY KNEES: 17 years ago, I developed rhumatoid arthritis in both knees. I began the HP method by washing my knees with soap and water to remove any body oil, then MISTED them with a 3% solution of HP that was diluted down from 35% Food Grade HP (12:1) with PURE WATER. I wore shorts and then misted my knees, then waited until they were dry, then misted them again while I watched Television or did Computer work. I did this for at least 30 minutes at a time, and I did 4 HP misting sessions a day. My knees were back to NORMAL WITH NO PAIN in ONE WEEK!! I was so happy! I told my friends who had similar problems, and they said that they tried SOAKING their finger and elbow joints in 3% Food Grade HP by pouring the 3% HP solution into a shallow bowl and soaking them for 30 minutes 3-4 times a day. When finished, they would pour the 3% HP solution back into a one gallon plastic jug. The last soaking, they put it in the refrigerator for safe keeping overnight. The next day, they would remove the HP jug from the refrigerator and let it sit out until it had warmed to room temperature, then use in in the bowl to soak their joints until the evening. Worked great!! If you make up one gallon of 3% solution and keep it in the refrigerator, it should last at least one month before you need to make another gallon of it.</span></p><span data-dcnode-id="2704" instrument_node="">
</span><p data-dcnode-id="2698"><span data-dcnode-id="2703" instrument_node="">IN DALLAS, TEXAS, I found 35% Food Grade HP at "Roy's Natural Market" 6025 Royal Ln. Ste 130</span><br data-dcnode-id="2702"><span data-dcnode-id="2701" instrument_node="">Dallas, TX 75230-8857</span><br data-dcnode-id="2700"><span data-dcnode-id="2699" instrument_node="">Phone: (214) 987-0213. They have been selling HP for many years, and it is about $16.00 (US) for one quart, which will last a long time when you are spraying it.</span></p><span data-dcnode-id="2697" instrument_node="">
</span><p data-dcnode-id="2695"><span data-dcnode-id="2696" instrument_node="">Enjoy being pain-free!</span></p><span data-dcnode-id="2694" instrument_node="">

Interesting about the nail polish. There's another theory that you might not have heard of which is previous injury to the area. I have spoken to a few friends over the years who reported that they got melanoma on areas of the body that they had injured a few years before. As I understand it, cells in the area of injury get damaged and no longer differentiate. Among the canine greyhound rescue community, it is widely known that greyhounds are susceptible to bone cancer after they retire from the racetrack. The dogs don't typically get bone cancer where they had broken a bone (bone fractures usually heal well when set right) but they do get cancer in the area that had a severe injury but not a break. So keep that in mind because you could have stubbed a toe repeatedly or if you wore tight shoes that jammed your toes as this might have something to do with it.</span></p><span data-dcnode-id="2139" instrument_node="">
</span><p data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">Needless to say, be good to your feet from now on and careful of the shoes you wear. Melanoma is nothing to mess around with. Best of luck. Do let us know how you are doing.</span></p><span data-dcnode-id="2136" instrument_node="">

I started with melanoma in 2005 on my face. Had extensive surgery but they could not get it all. In March 2007 it had spread to my chest behind my heart. Had another extensive surgery to remove it. In August 2007 found out it had spread to my face/neck/and chest. Doctor told me that they couldn't operate. Did some internet research and read about hydrogen peroxide and how it puts oxygen back into your cells. Rejuvenating them. Well, decided to try it. I either take a 1/2 bottle and soak my feet in it with warm water or take a whole bottle and take a bath in it. Well, last petscan in November there were no new growths and the ones from August were less intense. My LDH also has dropped to an all time low of 113!! Is it the peroxide, can't say for sure but I won't stop it. Will try to keep you posted on my progress. What an easy cure this would be. Better than dying from metastisized malignant melanoma. Good Luck!! I am not a doctor just a normal person trying to help myself. I also started wearing magnetic jewelry. Who knows!!!</span></p><span data-dcnode-id="1901" instrument_node="">

</span><img align="baseline" alt="5 out of 5 stars" data-dcnode-id="1728" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/images/stars/5.png&amp;raw" title="5 out of 5 stars"><p data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node=""> </span></p><p data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">
NOTE: I don't know what the laws are and I don't want to get sued. Use my information at your own risk. I'm just trying to help in any way I can, because NO ONE should have to go through what I went through - numbing devastation and fear. If this helps you, PLEASE spread the word! </span></p><span data-dcnode-id="1723" instrument_node="">
</span><p data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">3 skin cancer growths on my face cured in a WEEK of applying Hydrogen Peroxide on them - HOW YOU APPLY could mean the difference between EFFECTIVE, or NOT (read further for detailed explanation). (NOTE: I use a lot of repetition, to make sure you understand exactly what I'm referring to.) </span></p><span data-dcnode-id="1720" instrument_node="">
</span><p data-dcnode-id="1715"><span data-dcnode-id="1719" instrument_node="">I would definitely recommend trying this before you try </span><a data-dcnode-id="1717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/remedies/bloodroot.html"><span data-dcnode-id="1718" instrument_node="">bloodroot</span></a><span data-dcnode-id="1716" instrument_node="">.</span></p><span data-dcnode-id="1714" instrument_node="">
</span><p data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">THANK GOD!! WOW! I'm still shocked it worked and it took only a WEEK!!! How is this possible that people don't know about this and a truth so simple is not known by everyone is beyond me.</span></p><span data-dcnode-id="1711" instrument_node="">
</span><p data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">My story and how I used Hydrogen Peroxide 3% to cure my skin cancers: Over the period of two years two cancerous growths appeared on my face (nose); one of them was growing very slow the other one faster. Then in less then a year another one appeared on my face as well - on the side of my nose very close to my eye. That one was growing at an alarming rate. All those growths hurt with unusual intensity when touched and had tiny veins but they were not moles. They were kind of the color of my skin except more red and at times really red. I applied just about every fruit on them I could think of with what seemed no effect. I was getting worried and felt helpless. I begged God to help me and I searched a lot. I found this great site and read that there have been reports that Hydrogen Peroxide cured melanoma. I was going to try the eggplant and white vinegar remedy, but was worried about the fumes from the vinegar being so close to my eye. So I decided to try the Hydrogen Peroxide first. At first it didn't seem to have any effect at all. I was getting so worried by that point because the spot close to my eye was growing even faster and by then it was about 5 millimeters in diameter and just few months ago it was a tiny spot. In my helplessness.</span></p><span data-dcnode-id="1708" instrument_node="">
</span><p data-dcnode-id="1705"><strong data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">HOW I USED IT:</span></strong></p><span data-dcnode-id="1704" instrument_node="">
</span><p data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">I took a cotton swab and soaked it in Hydrogen Peroxide and kept rubbing the cancerous growth with the Hydrogen Peroxide soaked cotton swab until the growth was soaked in the Hydrogen Peroxide and was white. It stung badly, but I didn't care, I just wanted these things gone. I was so desperate, my eyes watered every time I looked at the spots on my face. After the soaking of the growths I applied cotton soaked in Hydrogen Peroxide on them. NOTE: when soaking the skin with Hydrogen Peroxide make sure you don't do it to the healthy skin, because even though it is more resistant to getting white and soaked with the Hydrogen Peroxide, it will also get white after a while. If healthy tissue gets white like that, let it air out until it regains its normal color. So do the soaking to the unhealthy tissue only or as close as you can get. After soaking and making it white apply soaked in Hydrogen Peroxide cotton ball on the growth and when the cotton gets dry, wet it with more Hydrogen Peroxide. How it worked was: the soaked cancerous growth after a while formed as crust much like what happens with a normal sore. The strangest thing is I see no scars it flattened it out like it was never there..IN A WEEK!!! Even the fast growing one!! I'M STILL IN SHOCK. I tried SO many things. THANK GOD. THANK GOD!!!"</span></p><span data-dcnode-id="1701" instrument_node="">
</span><p data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">John writes again: "In my previous email to you, I forgot to mention:</span></p><span data-dcnode-id="1698" instrument_node="">
</span><p data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">1. I stopped drinking tap water and started drinking purified water when I was doing my Hydrogen Peroxide therapy.</span></p><span data-dcnode-id="1695" instrument_node="">
</span><p data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">2. I tried applying the Raspberry Skin Cream well known to cure skin cancer to the cancerous growths on my face for weeks, but it didn't work for me - I noticed no difference. I have heard the Raspberry Skin Cream worked well for many people after about two weeks.</span></p><span data-dcnode-id="1692" instrument_node="">

</span><p data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">Love the site and have been using for a while as am I a student naturopath. Ok my partner was 6 months pregnant in 2009 and had flown her back from UK to Oz to have our baby with her family. I arrived about 2 weeks before proposed date (which was way out, they come when they ready) and she told me that at one of her checkups the doctor had suggested to her she go to a skin clinic for the itchy hang mole that was growing under her hair and skin on her scalp. The GP said it may be cancerous.</span></p><span data-dcnode-id="1504" instrument_node="">
</span><p data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">This was stressing her out lots which was not great as she was of course due to give birth so as soon as I could, I looked at the problem then deicided on a safer remedy than what had we gone down the GP suggested route would have undoubtedly ended up with surgical removal.</span></p><span data-dcnode-id="1501" instrument_node="">
</span><p data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">I shaved the area and daily applied drops of pure 35% H202 on the the mole/melanoma which was actualy growing almost daily. It instantly reacted by turning orange and began to get flaky and eventully fell of completey and died after 4 days.</span></p><span data-dcnode-id="1498" instrument_node="">
</span><p data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">Understanding that cancerous cells simply cannot survive in a high oxygen evironment made this obvious and only route as had we taken gp advice would have led to drugs n surgery.</span></p><span data-dcnode-id="1495" instrument_node="">
</span><p data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">Thanks for your work,</span></p><span data-dcnode-id="1492" instrument_node="">

I need help with information about the use of interferon for melanoma. My 19 year old daughter has been diagnosed with a Meltump, it was biopsied, they did surgery to check for any further growth, of which doctor said was clear, they biopsied 6 lymph nodes, they found a .2 mm tumor on her sentinel node. The doctor now wants to run a organ scan, and start her up on interferon, which is required to give herself 3 injections a day, and would have to deal with flu like symptoms for up to a month or so. we have elected to go to Tiajuana Mexico to the Bio-Medical Clinic, they have had great success with skin melanomas. </span></p><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">My question is, has anyone had experience with the use of Interferon, its side effects?? Any other Information would be great. </span></p><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">Has anyone had experience with the Bio-Medical Clinic in Tiajuana??? They use the Huxley formula, they moved to Mexico from Texas because they were being harrassed. Please help because we also have another doctor that say we should definitely use Interferon. </span></p><span data-dcnode-id="1260" instrument_node="">
</span><p data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">Please please please help with this, I have a beautiful young 19 year old daughter here, and I want to have her to able to live a great and long life. Any suggestions??? Any thoughts about where to go or we right to go to the Bio-Medical Clinic. We are going this Tuesday any information would be great.</span></p><span data-dcnode-id="1257" instrument_node="">

</span><p data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">
I tried interferon in 2009, after 3 weeks of high-dose my liver enzymes went out-of-whack and my liver started to shut down. While on the treatment I had massive headaches, flu-like symptoms, and my personality changed (short tempered, mad at my family for no reason and very mean). I stopped the treatment and it all went away within a week. My oncologist said there was only a 10% chance it would reduce a recurrence and asked if I wanted to try self-dosing (epipen) every day at a lower dose, I denied and carried on with my life. Before the interferon I had a wide margin dissection where the mole was and a sentinal lymph node biopsy, the node came back negative. I had a recurrence in 2011 which resulted in surgery to remove the lumps and had radiation in the area. </span></p><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">There is no right or wrong answer as to what to do, at first diagnosis you reach for answers and cures other than surgery, chemo (which doesn't work for melanoma) and radiation. I personally don't believe alot of the crap that is on the internet about natural cures, actually the internet will only fill your head with false hope and promises and you'll waste alot of money at the same time. A good website for help is MRF (Melanoma Research Foundation), there is alot of knowledge there from patients and their families. I wish you my blessings, never lose hope or give up, a positive attitude is everything!</span></p><span data-dcnode-id="1072" instrument_node="">

There are a lot of people sharing their similar experiences and successful treatments and CURES of Melanoma with a more natural approach. It does not sound as if you have given any of the alternative treatments the possibility of a fair try. EarthClininc is a good start in reading about ones experience using natural remedies for a variety of aliments including cancer.</span></p><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">I hope at some point you do investigate it with an open mind as there are hundreds (if not more around the world) of people sharing their testimony of their cures with corresponding oncology diagnosis and follow-up results after treatments, proving a factual basis that the cancer was cured with out the using any of the approved methods like chemo, radiation or cutting.</span></p><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">The "reality" most people are familiar with cancer is created and governed by the FDA with their corresponding laws regarding claims and approved cancer treatments. All the "approved" data taken in through television, news media and set standards in the medical and pharmaceutical establishments, writes our perception of cancer reality IF we do not stop to think for ourselves, questions "reality" and research, discern a wider spectrum of cancer reality.</span></p><span data-dcnode-id="1012" instrument_node="">
</span><p data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">For those who have yet to do so, this will not make sense as "everyone knows the earth is flat" but eventually the true nature of reality will show cancer it treatable with natural remedies including high dosage of Vitamin C in an IV, clean healthy organic diet, the removal of toxicity in the body and environment, replenishing the body with minerals not present in the food supply due to soil erosion.</span></p><span data-dcnode-id="1009" instrument_node="">

Hi, Here's another Melanoma story that may help someone. I found a dodgy mole when I was pregnant with my first child at the age of 30.. It looked like the magazine photos but not as bad but as I was pregnant and in and out of the docs frequently I showed it to the doc who humoured me and sent me to the check in centre at hospital. It was a melanoma I had 2 I biopsy and 2 surgeries.. For a small mole a large chunk was removed from my calf. As I was pregnant that was my treatment, it was 1996 so 15 years ago. No lymph nodes or scans were done, it was low grade. I went for 2 hands on healing sessions. When people found out a few collegues and friends of friends told me they had been treated for melanoma too often in places that were not exposed to the sun. I now think it is a deficiency in selenium maybe vit d and c. I remember before my mole I had a strange mole/spot that I had squeezed! Before that when I was around 16 I had a strange sort of sweat burn from using a sunbed. My consultant at the time told me to go away and live my life he said they still did not know the cause and that the sun was one of many lines of study. </span><br data-dcnode-id="956"><span data-dcnode-id="955" instrument_node="">I hope this helps x</span></p><span data-dcnode-id="953" instrument_node="">

I used Iodine for my </span><strong data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">malignant melanoma</span></strong><span data-dcnode-id="835" instrument_node=""> on my right cheek. Not good. I almost killed myself in the process.</span></p><span data-dcnode-id="833" instrument_node="">
</span><p data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">ONLY use Iodine for non-malignant melanoma. My melanoma spread to my brain, and when I put Iodine on my cheek topically, it must've been trying to attack the cancer in my brain as well, and I started having such severe dizzy spells, that I thought I was going to die.</span></p><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">These dizzy spells lasted for weeks. Unlike anything I have ever experienced. They were so crippling, that I thought any day could be my last.</span></p><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">I had to heal my cancer from the inside out. Low carb, alkaline diet, eating right for my blood type O, plenty of meditation, exercise, sunlight, sleep, and love.</span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">The biggest thing for me was going on a low carb, high vegetable diet. I feel like candida/poor digestion played a huge role in the formation of my cancer.</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">It took months of super strict eating and super clean living, but, it worked. Iodine, on the other hand, damn near killed me.</span></p><span data-dcnode-id="818" instrument_node="">
