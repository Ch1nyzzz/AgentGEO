</span><p data-dcnode-id="917"><span data-dcnode-id="920" style="font-size: 12pt;"><span data-dcnode-id="921" instrument_node="">Dr Otto

his&nbsp;ground-breaking&nbsp;discovery on cancer.</span></span></p><p data-dcnode-id="911"><span data-dcnode-id="912" style="font-size: 12pt"><span data-dcnode-id="916" instrument_node="">What he discovered was cancer cannot survive in an aerobic (oxygenated) environment. But it will survive and flourish very nicely in an anaerobic (acid) environment. </span><a data-dcnode-id="913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sites.google.com/site/ganodermareview/the-root-cause-of-cancer" onclick="return FIX.track(this);" rel="noopener nofollow" target="_blank"><span data-dcnode-id="914" style="font-size: 8px;"><span data-dcnode-id="915" instrument_node="">2</span></span></a></span></p><p data-dcnode-id="908"><span data-dcnode-id="909" style="font-size: 12pt"><span data-dcnode-id="910" instrument_node="">So what exactly does this mean?</span></span></p><p data-dcnode-id="905"><span data-dcnode-id="906" style="font-size: 12pt"><span data-dcnode-id="907" instrument_node="">Well, think about algae. It doesn’t survive out in the ocean where there's plenty of oxygen in the water. But wherever you find lots of stagnant water, you'll find algae growing and thriving.</span></span></p><p data-dcnode-id="902"><span data-dcnode-id="903" style="font-size: 12pt"><span data-dcnode-id="904" instrument_node="">So think of cancer as algae. If your body is stagnant (poorly oxygenated) cancer will grow and thrive. But if it stays oxygenated (alkaline), cancer is dead in the water!</span></span></p><span data-dcnode-id="901" instrument_node="">

</span><p data-dcnode-id="890" style="text-align: left;"><span data-dcnode-id="891" style="font-size: 12pt"><span data-dcnode-id="892" instrument_node="">So what is the body’s “perfect” oxygenated or alkaline level then?</span></span></p><p data-dcnode-id="887" style="text-align: left;"><span data-dcnode-id="888" style="font-size: 12pt;"><span data-dcnode-id="889" instrument_node="">Well, you’ve no doubt heard of the need to maintain the correct pH level for a swimming pool? (pH goes on a scale from zero to fourteen. Seven is neutral. Anything below seven is acidic and anything above seven is alkaline). </span></span></p><p data-dcnode-id="881" style="text-align: left;"><span data-dcnode-id="882" style="font-size: 12pt"><span data-dcnode-id="886" instrument_node="">The human body also has a pH level. And it must be maintained above the neutral level (7.35-7.45 to be exact) at all times for optimum health. But here's the most amazing part. By </span><a data-dcnode-id="884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//geni.us/pHstrips" onclick="return FIX.track(this);" rel="noopener nofollow" target="_blank"><span data-dcnode-id="885" instrument_node="">keeping your pH above seven</span></a><span data-dcnode-id="883" instrument_node="">, the body then acts as a "natural cancer treatment" for itself and goes to work to break down and dispose of any cancerous tumors!&nbsp;</span></span></p><span data-dcnode-id="880" instrument_node="">

</span><p data-dcnode-id="872"><span data-dcnode-id="873" style="font-size: 12pt"><span data-dcnode-id="874" instrument_node="">A pH level below 7 is definitely the worst possible outcome. This results in “Acidosis” of the body, which is a very dangerous and potentially life-threatening problem (I would be willing to bet that the vast majority of the population would fall into the "acidosis" category). </span></span></p><p data-dcnode-id="869"><span data-dcnode-id="870" style="font-size: 12pt"><span data-dcnode-id="871" instrument_node="">So in this acidic environment, cancer will not just grow, it will flourish!</span></span></p><p data-dcnode-id="866"><span data-dcnode-id="867" style="font-size: 12pt"><span data-dcnode-id="868" instrument_node="">Listen to what renowned health expert and founder of The Optimum Health Clinic in London, Alex Howard, says about maintaining your correct pH level and why it's so important…</span></span></p><p data-dcnode-id="857"><span data-dcnode-id="860" style="font-size: 12pt;"><em data-dcnode-id="861"><span data-dcnode-id="865" instrument_node="">&nbsp;“Acidosis” refers
