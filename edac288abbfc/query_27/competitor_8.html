nav-menu-overlay" data-dcnode-id="746"></div><div class="scroll-to-top" data-dcnode-id="745"></div><div class="hdr-spacer" data-dcnode-id="744"></div><span data-dcnode-id="743" instrument_node=""> </span><span data-dcnode-id="740" instrument_node=""> </span><div class="content-area" data-dcnode-id="199" id="primary"><div class="background-single" data-dcnode-id="736"></div><div class="row row-visible-flex" data-dcnode-id="495"><div class="col-2-3 transform" data-dcnode-id="538"><div class="page-single" data-dcnode-id="541"><main class="site-main" data-dcnode-id="542" id="main"><div class="breadcrumbs" data-dcnode-id="716"><ul class="" data-dcnode-id="717" itemscope="" itemtype="http://schema.org/BreadcrumbList"><span data-dcnode-id="735" instrument_node=""> </span><li data-dcnode-id="726" itemprop="itemListElement" itemscope="" itemtype="http://schema.org/ListItem"><span data-dcnode-id="733" instrument_node=""> </span><a data-dcnode-id="727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wayofleaf.com/blog" itemprop="item"><span data-dcnode-id="732" instrument_node=""> </span><span data-dcnode-id="730" itemprop="name"><span data-dcnode-id="731" instrument_node="">Blog</span></span><meta content="3" data-dcnode-id="729" itemprop="position"><span data-dcnode-id="728" instrument_node=""> </span></a></li><span data-dcnode-id="725" instrument_node=""> </span><span data-dcnode-id="723" instrument_node=""> </span></ul></div><div class="single-save-post" data-dcnode-id="713"><div class="save-post-button" data-dcnode-id="714" data-id="22777"><span data-dcnode-id="715" instrument_node=""> Save and Read Later</span></div></div><h1 data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Cannabis Tampons – Do They Really Work Or Are They A Complete Joke?</span></h1><div class="post-info-author" data-dcnode-id="699"><span data-dcnode-id="710" instrument_node=""> </span><img alt="" class="avatar avatar-96 wp-user-avatar wp-user-avatar-96 alignnone photo" data-dcnode-id="709" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wayofleaf.com/wp-content/uploads/2020/12/image1-1-min-2.jpg&amp;raw" width="96"><div class="post-info-box" data-dcnode-id="700"><div class="post-info-box-item" data-dcnode-id="708"></div><div class="post-info-box-item" data-dcnode-id="701"><span data-dcnode-id="707" instrument_node=""> </span><span class="post-info-span" data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Written by</span></span><span data-dcnode-id="704" instrument_node=""> </span><a class="tag-author-name" data-dcnode-id="702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wayofleaf.com/about-us/dylan"><span data-dcnode-id="703" instrument_node="">Dylan Baker, B.S.</span></a></div></div></div><div class="post-info-tags" data-dcnode-id="690"><div class="tag-post-date" data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Updated on: 3 Sep, 2020</span></div><div class="tag-read" data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">6 min read</span></div><div class="tag-comment" data-dcnode-id="691"><span data-dcnode-id="694" instrument_node="">4</span><span data-dcnode-id="692"><span data-dcnode-id="693" instrument_node=""> comments</span></span></div></div><article data-dcnode-id="543"><div class="entry-content" data-dcnode-id="544"><p data-dcnode-id="685"><span data-dcnode-id="689" instrument_node="">If you dread ‘that time of the month’ because of the terrible pain that accompanies your menstrual cycle, you’re not alone. Data from the UN and the Simmons National Consumer Survey shows the prevalence of </span><a data-dcnode-id="687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wayofleaf.com/cannabis/ailments/thc-for-pain-relief"><span data-dcnode-id="688" instrument_node="">premenstrual syndrome</span></a><span data-dcnode-id="686" instrument_node=""> (PMS). It found that almost 32 million women in the United States alone reported PMS or period pain in 2019. Other data shows that up to 90% of women experience menstrual pains.</span></p><p data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">It is no secret that the level of pain ranges from mild to crippling. Those who suffer from the latter understand that it has a severe effect on their lives. Despite the prevalence of the problem, however, it isn’t taken particularly seriously. There are treatments available, but most are basic and come with side effects. However, things are about to change thanks to a fantastic new treatment: Cannabis tampons!</span></p><h2 class="listItem-0" data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">What are Cannabis Tampons?</span></h2><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">They are special tampons infused with marijuana! The idea is to absorb the weed into your body via the vagina. In theory, it works to remove the pain you feel during the menstrual cycle. It sounds like a fantastic innovation, but there are still a couple of problems that manufacturers must work out.</span></p><p data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Few firms sell cannabis tampons. Foria has practically owned the market from the beginning. However, a new brand called Daye has started up and will soon offer CBD tampons. For an increasing number of women, these suppositories take the place of pain pills.</span></p><p data-dcnode-id="672"><span data-dcnode-id="676" instrument_node="">You insert them vaginally as you would with a tampon without an applicator. Most marijuana tampons include cocoa butter, hemp oil, and coconut oil in their list of ingredients. These allow the suppository to soften and melt in the body. From there, </span><a data-dcnode-id="674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wayofleaf.com/education/cbd-vs-thc"><span data-dcnode-id="675" instrument_node="">cannabinoids such as THC and CBD</span></a><span data-dcnode-id="673" instrument_node=""> enter the bloodstream through the vagina’s mucosa. An increasing number of researchers have found that cannabinoids from weed and hemp impact the endocannabinoid system (ECS).</span></p><p data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">While the ECS is located throughout the body, it is most prevalent in our reproductive system. This includes the uterus, fallopian tubes, and ovaries. Perhaps this is why marijuana suppositories genuinely seem to help with pelvic pain. A cannabis tampon may reduce the inflammatory response and contractions of the uterus.</span></p><h2 class="listItem-1" data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">How Quickly Will These Hemp Tampons Work?</span></h2><p data-dcnode-id="663"><span data-dcnode-id="667" instrument_node="">First and foremost, a person’s response to cannabinoids depends on their unique ECS. Therefore, what ‘works’ for one individual may not achieve a similar effect on someone else. However, even those who didn’t feel an impact when using a cannabis tampon for PMS have found another use. As cannabinoids could relax the muscles in the pelvic floor, it may </span><a data-dcnode-id="665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wayofleaf.com/cannabis/best-picks/best-marijuana-strains-for-a-wild-night-of-sex"><span data-dcnode-id="666" instrument_node="">reduce pain felt during penetrative sex</span></a><span data-dcnode-id="664" instrument_node="">.</span></p><p data-dcnode-id="661"><img alt="cannabis tampons" class="lazyload size-full wp-image-60052 aligncenter" data-dcnode-id="662" data-sizes="(max-width: 900px) 100vw, 900px" data-src="https://wayofleaf.com/wp-content/uploads/2018/04/how-quickly-will-these-hemp-tampons-work.jpg" data-srcset="https://wayofleaf.com/wp-content/uploads/2018/04/how-quickly-will-these-hemp-tampons-work.jpg 900w, https://wayofleaf.com/wp-content/uploads/2018/04/how-quickly-will-these-hemp-tampons-work-270x180.jpg 270w, https://wayofleaf.com/wp-content/uploads/2018/04/how-quickly-will-these-hemp-tampons-work-768x512.jpg 768w, https://wayofleaf.com/wp-content/uploads/2018/04/how-quickly-will-these-hemp-tampons-work-440x293.jpg 440w" height="600" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20900%20600%22%3E%3C/svg%3E" width="900"></p><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Foria Relief cannabis tampons are the biggest seller in the industry. However, they are not FDA-approved. There is no evidence of efficacy in the form of clinical trials. Staci Gruber of Harvard Medical School announced a plan to conduct an observational study of 400 women. They began using Foria’s Relief suppositories over several months back in 2018.</span></p><p data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Each tampon contains 60mg of THC and 10mg of CBD. The women in the study were supposed to track menstrual symptoms to determine if Foria Relief is effective. It is the first step in a plan to ultimately conduct a clinical trial involving placebos. The results were slated for release last year, but we still (as of the time of writing) have not found any news in terms of statistical outcome.</span></p><h3 class="listItem-2" data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Anecdotal Results</span></h3><p data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">If nothing else, the response to these CBD tampons is overwhelmingly positive. According to some customer reviews we read online, Foria’s hemp tampons began to relieve cramps in just eight minutes. One user even said the product left her feeling ‘decidedly dreamy.’ We’re not sure exactly what that means, but we’ll take it as good news!</span></p><p data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">Other users have suggested the CBD tampons work in around 20 minutes. They smell similar to cookie butter or cookie dough, which is yet another bonus. Moreover, according to Foria, you can use a traditional suppository with their cannabis tampons. Put in the Foria Relief tampon, keep it in for around 15 minutes, and then insert a ‘normal’ tampon.</span></p><p data-dcnode-id="646"><span data-dcnode-id="650" instrument_node="">The widely-recognized </span><a data-dcnode-id="648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wayofleaf.com/blog/important-medical-cannabis-studies-to-know-about"><span data-dcnode-id="649" instrument_node="">medicinal properties</span></a><span data-dcnode-id="647" instrument_node=""> of the marijuana plant should provide hope to women with PMS. Until we get clinical evidence of cannabis tampons, however, don’t expect government approval.</span></p><h3 class="listItem-3" data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Where to Buy CBD Tampons for Sale</span></h3><p data-dcnode-id="639"><span data-dcnode-id="643" instrument_node="">“Won’t these cannabis tampons get me high?” The answer is no! Foria Relief’s ingredients include a </span><a data-dcnode-id="641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wayofleaf.com/cbd/101/cbd-isolate-vs-full-spectrum-oil"><span data-dcnode-id="642" instrument_node="">CBD isolate</span></a><span data-dcnode-id="640" instrument_node=""> that uses CO2-extracted cannabis oil and organic cocoa butter. Each tampon contains 60 mg of THC, which is a significant amount. However, the 10mg of CBD helps reduce any potential intoxicating effects of the THC. According to Foria, the ‘majority’ of users do NOT experience a psychoactive high.</span></p><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Also, when you use these CBD tampons, the ingredients activate the pelvic region’s cannabinoid receptors.&nbsp; The product ensures that the nerves in the ovaries, cervix, and uterus block cramp-induced pain. It is a unique delivery system whereby the cannabinoids go to where they are needed to relieve pain at the actual site.</span></p><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">While Foria reigns supreme in this limited niche, Daye has emerged as a possible contender. The UK-based brand offers CBD suppositories for those who don’t want to ingest THC. Each one contains a whopping 150mg of CBD. At present, it is a subscription-only service. Subscribers receive 12, 14, or 18 tampons via mail each month in the United Kingdom. The company has yet to finalize a pricing model.</span></p><h3 class="listItem-4" data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Buying Foria Relief</span></h3><p data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Foria Wellness is a California-based startup. It offers its ‘Relief’ cannabis tampons in packs of four for $40. Unfortunately, their availability is limited. Foria Relief cannabis tampons were initially released in California and Colorado. You also needed a medical marijuana card to buy them. However, the MMJ card is no longer necessary in these states since weed became legal for recreational use.</span></p><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">You can buy the CBD tampons, but we were astonished to find several vendors were sold out of Foria Relief! Prospective customers face a significant problem. United States federal law doesn’t allow the transport of THC products across state lines. This is even the case between states where it is legal for recreational use.</span></p><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">As a result, Foria sells it at a select group of vendors in physical stores. Only residents of Colorado or California can buy cannabis tampons at present. In these states, you can purchase the cannabis tampons in recreational dispensaries (if aged 21 or over).</span></p><h3 class="listItem-5" data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">I Don’t Live in Colorado or California … How Do I Get Hemp Tampons!?</span></h3><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">If you don’t live in Colorado or California, you can’t legally buy Foria Relief CBD tampons. However, you can try to make them at home!</span></p><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">You can replicate the Foria recipe by using 0.5 cups of Cocoa Butter, and 0.25 cups of Coconut Oil. Add in 1 gram of concentrate weed (or approximately 5 grams of raw bud). Place the marijuana plant in boiling water to clean and sterilize it, strain the pot, and dry it.</span></p><p data-dcnode-id="616"><span data-dcnode-id="620" instrument_node="">Next, heat the finely ground matter to around 225 degrees Fahrenheit. At this temperature, the inactive </span><a data-dcnode-id="618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wayofleaf.com/education/decarboxylation"><span data-dcnode-id="619" instrument_node="">THCA is converted to the active THC</span></a><span data-dcnode-id="617" instrument_node="">. Make sure you cover the material when heating it above the boiling point, though. Otherwise, you will reduce the potency. Also, make sure you remain below 350 degrees Fahrenheit or risk boiling the cannabinoids to the point of ineffectiveness.</span></p><p data-dcnode-id="611"><span data-dcnode-id="615" instrument_node="">After you’ve done this, place the coconut oil in a clean container (preferably a mason jar) seal it, and place it in warm water for 60 minutes. Cool the container to room temperature first and then put it in the freezer overnight. If using raw weed, defrost, and place in hot water again before straining. This process is unnecessary if using hash or </span><a data-dcnode-id="613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wayofleaf.com/cannabis/101/how-safe-is-bho-wax-revealed"><span data-dcnode-id="614" instrument_node="">BHO concentrate</span></a><span data-dcnode-id="612" instrument_node="">.</span></p><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">Melt the cocoa butter in a microwave until it has a liquid texture. Be careful not to leave it in too long! After you add the coconut oil and stir the mixture, take an ice cube tray (or another kind of mold) and pour in the liquid. Wait for it to cool and set before using it. Ideally, you will use one of these homemade cannabis tampons internally then add another one externally on the abdomen. While you’re using weed, the THC dose is so low per tampon that you’re in no danger of getting high.</span></p><h2 class="listItem-6" data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Final Thoughts on CBD Tampons &amp; Pain Relief</span></h2><p data-dcnode-id="599"><span data-dcnode-id="606" instrument_node="">Within the bounds of reason, there isn’t much that a woman </span><em data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">wouldn’t </span></em><span data-dcnode-id="603" instrument_node="">do to find relief during a particularly painful menstrual cycle. The pain is usually crippling and is sometimes so bad that you call in sick to work. The CBD tampons offered by Foria are a real life-saver for women that have </span><a data-dcnode-id="601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wayofleaf.com/cannabis/ailments/thc-for-pain-relief"><span data-dcnode-id="602" instrument_node="">excruciatingly painful periods</span></a><span data-dcnode-id="600" instrument_node="">.</span></p><p data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">The cannabinoids in weed work wonderfully with your ECS. When the cannabis tampons touch your skin, its ingredients make their way directly to where they are needed the most. Pain relief usually lasts for well over an hour, and it starts to work within minutes. If you’re not lucky enough to live in Colorado or California, don’t despair! You can try to make hemp tampons by following the instructions above.</span></p><div class="related-article-box" data-dcnode-id="584"><div class="related-article-box-title" data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">Related article</span></div><div class="related-article" data-dcnode-id="585"><span data-dcnode-id="594" instrument_node=""> </span><a data-dcnode-id="586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wayofleaf.com/cannabis/ailments/medical-marijuana-treatment-pms"><div class="related-article-image" data-dcnode-id="593" data-lazystyle="background-image: url(https://wayofleaf.com/wp-content/uploads/2019/08/wol-banner-5-marijuana-strains-for-instant-pms-pain-relief.jpg);"></div><div class="related-article-info" data-dcnode-id="588"><div class="related-article-info-title" data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">5 Marijuana Strains for Instant PMS Pain Relief</span></div><p class="related-article-info-description" data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">Is it that time of the month a…</span></p></div><span data-dcnode-id="587" instrument_node=""> </span></a></div></div><div class="hiddencontent" data-dcnode-id="548"><div class="hiddencontent-title" data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Article Sources:</span></div><div class="hiddencontent-cnt encoded" data-dcnode-id="549" id="hiddencontent-cnt"><span data-dcnode-id="581" instrument_node="">
