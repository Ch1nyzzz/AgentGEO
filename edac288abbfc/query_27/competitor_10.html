ata-dcnode-id="826" instrument_node="">Home</span></a></li><li class="breadcrumb-item mb-2 mb-sm-0" data-dcnode-id="821"><a data-dcnode-id="822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannabis.wiki/news"><span data-dcnode-id="823" instrument_node="">News</span></a></li><li class="breadcrumb-item mb-2 mb-sm-0" data-dcnode-id="818"><a data-dcnode-id="819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannabis.wiki/recipes"><span data-dcnode-id="820" instrument_node="">Recipes</span></a></li></ol></nav></div><div class="row split" data-dcnode-id="84"><div class="col-lg-9 content" data-dcnode-id="367"><div class="container" data-dcnode-id="812"><a data-dcnode-id="813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//expo.cannabis.wiki/" rel="sponsored nofollow" target="_blank"><img alt="CANNABIS WIKI CONFERENCE &amp; EXPO" class="figure-img img-fluid" data-dcnode-id="814" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mientzu-cdn.sfo2.cdn.digitaloceanspaces.com/static/public/ads/Cannabis%2520Wiki%2520Expo%2520-%2520Banner.jpeg&amp;raw"></a></div><article class="post" data-dcnode-id="661"><h1 class="post__title" data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">How to make topical THC oil for pain </span></h1><div class="post__fulldate" data-dcnode-id="807"><span data-dcnode-id="809" instrument_node="">Published </span><span data-dcnode-id="808" instrument_node="">Aug 13, 2019 10:29 a.m. ET</span></div><div class="post__info" data-dcnode-id="790"><a class="post__info-author" data-dcnode-id="805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannabis.wiki/author/annette"><span data-dcnode-id="806" instrument_node="">Annette Felix</span></a><span class="separator" data-dcnode-id="804"></span><div class="post__info-tag" data-dcnode-id="800"><span data-dcnode-id="803" instrument_node="">In </span><a data-dcnode-id="801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannabis.wiki/recipes"><span data-dcnode-id="802" instrument_node="">Recipes</span></a></div><span class="separator" data-dcnode-id="799"></span><span data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Updated</span></span><time data-dcnode-id="795" datetime="2019-08-13T07:29:00-07:00" title="2019/08/13 07:29"><span data-dcnode-id="796" instrument_node="">3 years ago</span></time><span class="separator" data-dcnode-id="794"></span><span data-dcnode-id="791"><span data-dcnode-id="793" instrument_node="">3</span><span data-dcnode-id="792" instrument_node=""> min read</span></span></div><div class="post__info" data-dcnode-id="784"><div class="tag-cloud" data-dcnode-id="785"><a class="tag" data-dcnode-id="788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannabis.wiki/tag/cannabis101"><span data-dcnode-id="789" instrument_node="">Cannabis101</span></a><a class="tag" data-dcnode-id="786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannabis.wiki/tag/recipes"><span data-dcnode-id="787" instrument_node="">Recipes</span></a></div></div><div class="post__body" data-dcnode-id="662"><div class="post__content" data-dcnode-id="663"><figure class="kg-card kg-image-card" data-dcnode-id="780"><img class="kg-image" data-dcnode-id="783" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.cannabis.wiki/medias/1564bc2840ad0abb5e26708b390244d4&amp;raw"><figcaption data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">iStock / Aleksandr_Kravtsov</span></figcaption></figure><p data-dcnode-id="774"><span data-dcnode-id="779" instrument_node="">Lotions balms and salves are exceptional items to keep on hand for anyone experiencing pain. THC infused lotions can provide relief from chronic pain or localized pain. Applying the topical directly to the affected area will not produce high feelings that can be experienced with other components of the cannabis plant. Using </span><em data-dcnode-id="776"><a data-dcnode-id="777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannabis.wiki/cannabis101/how-to-make-thc-vape-oil-for-an-e-cigarette-or-vape-pen-2"><span data-dcnode-id="778" instrument_node="">THC oil</span></a></em><span data-dcnode-id="775" instrument_node=""> externally is a perfect way to relieve pain when at work.</span></p><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Making a salve or lotion infused with THC is similar to making cannabis-infused butter or oil for cooking. The following is a simple DIY method of making your cannabis salve using all-natural ingredient.</span></p><p data-dcnode-id="769"><strong data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">Step by step guide on how to make topical THC oil for pain</span></strong></p><p data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Ingredients</span></p><span data-dcnode-id="766" instrument_node="">
</span><ul data-dcnode-id="752"><span data-dcnode-id="765" instrument_node="">
</span><li data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">10 grams of cannabis that has a high THC level (the Ghost Train Haze marijuana strain would be a good choice or ACDC which is also high in CBD)</span></li><span data-dcnode-id="762" instrument_node="">
</span><li data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">1 ½ cups of virgin coconut oil</span></li><span data-dcnode-id="759" instrument_node="">
</span><li data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">1/3 cup of pure organic beeswax</span></li><span data-dcnode-id="756" instrument_node="">
</span><li data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Few drops of essential oil (lavender)</span></li><span data-dcnode-id="753" instrument_node="">
</span></ul><span data-dcnode-id="751" instrument_node="">
</span><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Equipment needed</span></p><span data-dcnode-id="748" instrument_node="">
</span><ul data-dcnode-id="734"><span data-dcnode-id="747" instrument_node="">
</span><li data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Baking sheet</span></li><span data-dcnode-id="744" instrument_node="">
</span><li data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Double boiler</span></li><span data-dcnode-id="741" instrument_node="">
</span><li data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Jar</span></li><span data-dcnode-id="738" instrument_node="">
</span><li data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Cheesecloth</span></li><span data-dcnode-id="735" instrument_node="">
</span></ul><span data-dcnode-id="733" instrument_node="">
</span><p data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Method</span></p><span data-dcnode-id="730" instrument_node="">
</span><ol data-dcnode-id="707"><span data-dcnode-id="729" instrument_node="">
</span><li data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Pre-heat oven to 210 degrees F and spread your ground herb evenly on the baking sheet. This step is required to decarboxylate your cannabis, which activated your bud grind. Leave the cannabis in the oven for about 25 to 30 minutes</span></li><span data-dcnode-id="726" instrument_node="">
</span><li data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">During this time, place your organic coconut oil in your double boiler turn stove to low heat and stir continuously.</span></li><span data-dcnode-id="723" instrument_node="">
</span><li data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Add your decarboxylated weed to the pot and continue to stir the oil and cannabis mix for about 30 minutes. Make sure to keep the heat at a low temperature to ensure that the weed is not scorched.</span></li><span data-dcnode-id="720" instrument_node="">
</span><li data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Now you are ready to remove your mixture from the heat and strain into a glass jar. Use the aid of the cheesecloth as a filter.</span></li><span data-dcnode-id="717" instrument_node="">
</span><li data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">In the double boiler now add your organic beeswax and heat till melted.</span></li><span data-dcnode-id="714" instrument_node="">
</span><li data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Now you slowly pour your infused coconut oil to the pot and then add your favorite essential oil. Lavender is a perfect choice for relaxing qualities. You need only add a few drops.</span></li><span data-dcnode-id="711" instrument_node="">
</span><li data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">When beeswax and coconut oils are thoroughly combined, remove the pot from the heat and pour your cannabis THC infused salve into your containers.</span></li><span data-dcnode-id="708" instrument_node="">
</span></ol><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">If you are interested in making your THC salve into a THC infused lotion, you will need to add to your mix</span></p><a data-dcnode-id="700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//expo.cannabis.wiki/" rel="sponsored nofollow" target="_blank"><span data-dcnode-id="703" instrument_node="">
</span><img alt="CANNABIS WIKI CONFERENCE &amp; EXPO" class="figure-img img-fluid" data-dcnode-id="702" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mientzu-cdn.sfo2.cdn.digitaloceanspaces.com/static/public/ads/Cannabis%2520Wiki%2520Expo%2520-%2520Banner.jpeg&amp;raw"><span data-dcnode-id="701" instrument_node="">
</span></a><span data-dcnode-id="699" instrument_node="">
</span><ul data-dcnode-id="688"><span data-dcnode-id="698" instrument_node="">
</span><li data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">1 teaspoon of vitamin E oil</span></li><span data-dcnode-id="695" instrument_node="">
</span><li data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">2 tablespoons of shea butter</span></li><span data-dcnode-id="692" instrument_node="">
</span><li data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">1 cup of pure aloe Vera gel</span></li><span data-dcnode-id="689" instrument_node="">
</span></ul><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">The finished product will be quite thick and may not work well in a pump dispenser.</span></p><p data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">You now have you homemade THC infused lotion or salve. Remember to store your hard work in an appropriate place; a cool dark place is best. As it will help to increase the amount of time you can store your lotion.</span></p><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">As a side note, if you are using your salve to relieve the pain associated with arthritis, you can also add a small amount of cayenne pepper. This extra ingredient will provide a practical addition to helping control your pain. Remember, however, to store your cayenne added salve separate from your other lotions. The heat from the cayenne pepper additive may not be what you want to have on your face.</span></p><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Enjoy your DIY lotions yourself, or use them as an excellent gift to friends who need the help of THC infused creams to treat the pain that they are experiencing.</span></p><section class="embed-post embed-post-post" data-dcnode-id="664" id="embed-post-5c7ddf90d67b035ca05fad59"><span data-dcnode-id="678" instrument_node="">
</span><a data-dcnode-id="676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannabis.wiki/recipes/homemade-thc-bath-bombs-and-cannabis-bath-salts-recipes"><img alt="Homemade THC bath bombs and cannabis bath salts recipes" class="embed-post-img" data-dcnode-id="677" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.cannabis.wiki/medias/b1246e96989fbca43967b1a663ebf652&amp;raw"></a><span data-dcnode-id="675" instrument_node="">
