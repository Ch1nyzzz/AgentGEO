</span><h2 data-dcnode-id="2121"><span data-dcnode-id="2125" instrument_node="">Medicinal Cannabis for </span><span class="bluecus" data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">Pain</span></span><span data-dcnode-id="2122" instrument_node="">.</span></h2><span data-dcnode-id="2120" instrument_node="">
</span><p data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">Chronic pain is one of the most common reason for patients to consult with our clinic.</span></p><span data-dcnode-id="2117" instrument_node="">
</span><p data-dcnode-id="2112"><span data-dcnode-id="2116" instrument_node="">In NZ alone, it is thought that </span><a data-dcnode-id="2114" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arthritis.org.nz/wp-content/uploads/2018/09/120230-Pfizer-Chronic-Pain-Report-08-WEB.pdf" rel="noopener nofollow external noreferrer" target="_blank"><span data-dcnode-id="2115" instrument_node="">1 in 8 people</span></a><span data-dcnode-id="2113" instrument_node=""> are living with chronic pain. That is 800,000 people! Chronic pain can dramatically reduce your quality of life and cause a lot of stress and frustration.&nbsp;</span></p><span data-dcnode-id="2111" instrument_node="">
</span><p data-dcnode-id="2107"><a data-dcnode-id="2109" data-rich-text-format-boundary="true" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannabisclinic.co.nz/cbd-oil"><span data-dcnode-id="2110" instrument_node="">CBD oil</span></a><span data-dcnode-id="2108" instrument_node=""> for chronic pain&nbsp;is a great natural option as it can help relieve pain symptoms and inflammation, allowing you to enjoy more of what life brings.</span></p><span data-dcnode-id="2106" instrument_node="">
</span><p data-dcnode-id="2101"><span data-dcnode-id="2105" instrument_node="">While there are&nbsp;</span><a data-dcnode-id="2103" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthnavigator.org.nz/medicines/p/pain-relief-medications-chronic-pain/" rel="noopener nofollow external noreferrer" target="_blank"><span data-dcnode-id="2104" instrument_node="">many medications for pain</span></a><span data-dcnode-id="2102" instrument_node="">, chances are that you do not like the thought of pumping your body with pharmaceutical drugs, or that your body&nbsp; does not tolerate them.</span></p><span data-dcnode-id="2100" instrument_node="">
</span><p data-dcnode-id="2095"><span data-dcnode-id="2099" instrument_node="">Thankfully, research shows CBD can decrease pain without the risks that come with conventional pain relief medications. CBD alone has been shown </span><a data-dcnode-id="2097" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK546424/" rel="noopener nofollow external noreferrer" target="_blank"><span data-dcnode-id="2098" instrument_node="">to improve about 25% of people with chronic pain by itself</span></a><span data-dcnode-id="2096" instrument_node="">&nbsp;and a further 50% can be helped with the use of a combination of CBD and THC.</span></p><span data-dcnode-id="2094" instrument_node="">
</span><p data-dcnode-id="2089"><span data-dcnode-id="2093" instrument_node="">We have consulted with </span><a data-dcnode-id="2091" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannabisclinic.co.nz/patient-stories/" rel="noopener" target="_blank"><span data-dcnode-id="2092" instrument_node="">thousands of patients</span></a><span data-dcnode-id="2090" instrument_node=""> who have widespread chronic pain or pain localised in specific joints. We have also consulted with many patients who have chronic pain for unknown reasons.</span></p><span data-dcnode-id="2088" instrument_node="">
</span><p data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">The types of pain we have treated have also been diverse: from sharp, shooting and debilitating pain, to chronic aching that is affecting sleep and quality of life.</span></p><span data-dcnode-id="2085" instrument_node="">
</span><p data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2082" instrument_node="">
</span><h2 data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">Does CBD oil for pain work?</span></h2><span data-dcnode-id="2079" instrument_node="">
</span><p data-dcnode-id="2074"><span data-dcnode-id="2078" instrument_node="">Yes, CBD oil </span><a data-dcnode-id="2076" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2503660/" rel="noopener nofollow external noreferrer" target="_blank"><span data-dcnode-id="2077" instrument_node="">can help with pain</span></a><span data-dcnode-id="2075" instrument_node=""> and improve your quality of life. We have found that about 25% of people get benefit using CBD oil for pain.</span></p><span data-dcnode-id="2073" instrument_node="">
</span><p data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">Whatever the cause and type of the your pain is, you may use medicinal cannabis for pain relief. Pain conditions are varied and the list includes these most common conditions:</span></p><span data-dcnode-id="2070" instrument_node="">
</span><ul data-dcnode-id="2029"><span data-dcnode-id="2069" instrument_node="">
</span><li data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">Fibromyalgia</span></li><span data-dcnode-id="2066" instrument_node="">
</span><li data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">Complex regional pain syndrome</span></li><span data-dcnode-id="2063" instrument_node="">
</span><li data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">Injury related pain</span></li><span data-dcnode-id="2060" instrument_node="">
</span><li data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">Shoulder and neck pain</span></li><span data-dcnode-id="2057" instrument_node="">
</span><li data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">Back pain</span></li><span data-dcnode-id="2054" instrument_node="">
</span><li data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">Osteoarthritis</span></li><span data-dcnode-id="2051" instrument_node="">
</span><li data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">Rheumatoid arthitis</span></li><span data-dcnode-id="2048" instrument_node="">
</span><li data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node="">Psoriatic arthritis</span></li><span data-dcnode-id="2045" instrument_node="">
</span><li data-dcnode-id="2043"><span data-dcnode-id="2044" instrument_node="">Migraines</span></li><span data-dcnode-id="2042" instrument_node="">
</span><li data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">Neurogenic pain (caused by damage to nerves)</span></li><span data-dcnode-id="2039" instrument_node="">
</span><li data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">Muscle spasms</span></li><span data-dcnode-id="2036" instrument_node="">
</span><li data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">Cancer pain</span></li><span data-dcnode-id="2033" instrument_node="">
</span><li data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">Inflammation</span></li><span data-dcnode-id="2030" instrument_node="">
</span></ul><span data-dcnode-id="2028" instrument_node="">
</span><div class="gap-element clearfix" data-dcnode-id="2023" id="gap-549540134" style="display:block; height:auto;"><span data-dcnode-id="2027" instrument_node="">

</span><div class="col-inner" data-dcnode-id="1894"><span data-dcnode-id="1993" instrument_node="">
</span><h2 data-dcnode-id="1989" id="m_-1465161988548160341gmail-h-cbd-oil-for-chronic-pain"><span data-dcnode-id="1992" instrument_node="">CBD Oil for </span><span class="bluecus" data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">Chronic Pain</span></span></h2><span data-dcnode-id="1988" instrument_node="">
</span><div data-dcnode-id="1950"><span data-dcnode-id="1987" instrument_node="">
</span><p data-dcnode-id="1982"><span data-dcnode-id="1986" instrument_node="">Chronic pain is defined as pain present for at&nbsp;</span><a data-dcnode-id="1984" data-saferedirecturl="https://www.google.com/url?q=https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4450869/&amp;source=gmail&amp;ust=1614232461701000&amp;usg=AFQjCNHteGG-dnIvxa-pDTDs9_rl5Hkm_g" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4450869/" rel="noopener nofollow external noreferrer" target="_blank"><span data-dcnode-id="1985" instrument_node="">least three months or more</span></a><span data-dcnode-id="1983" instrument_node="">. If you have chronic pain, CBD oil could help provide some relief. It’s effective, safe, and well-tolerated.</span></p><span data-dcnode-id="1981" instrument_node="">
</span><p data-dcnode-id="1979"><span data-dcnode-id="1980" instrument_node="">Chronic pain can be caused by a number of conditions, such as previous injuries, arthritis or inflammation. The good news is that if you are suffering, medicinal cannabis and CBD oil for pain relief can help.</span></p><span data-dcnode-id="1978" instrument_node="">
</span><p data-dcnode-id="1970"><span data-dcnode-id="1977" instrument_node="">Of interest is that CBD oil can go from your stomach and through to your brain and alters your experience of pain. There’s a barrier that protects the brain between the blood and the brain, called the&nbsp;</span><a data-dcnode-id="1975" data-saferedirecturl="https://www.google.com/url?q=https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4292164/&amp;source=gmail&amp;ust=1614232461701000&amp;usg=AFQjCNHk2sDnDst3d0FGHWdjz_EjIJYygg" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4292164/" rel="noopener nofollow external noreferrer" target="_blank"><span data-dcnode-id="1976" instrument_node="">blood-brain barrier</span></a><span data-dcnode-id="1974" instrument_node="">. After crossing it, CBD affects a hormone called adenosine in your brain, and this is how CBD oil can help reduce chronic pain (</span><a data-dcnode-id="1972" data-saferedirecturl="https://www.google.com/url?q=https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2503660/&amp;source=gmail&amp;ust=1614232461701000&amp;usg=AFQjCNGPTY6k5iLulAizc79L50B1RTlhzg" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2503660/" rel="noopener nofollow external noreferrer" target="_blank"><span data-dcnode-id="1973" instrument_node="">2</span></a><span data-dcnode-id="1971" instrument_node="">).</span></p><span data-dcnode-id="1969" instrument_node="">
</span><div data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">&nbsp;</span></div><span data-dcnode-id="1966" instrument_node="">
</span><blockquote data-dcnode-id="1961"><span data-dcnode-id="1965" instrument_node="">
</span><p data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">CBD oil is not only useful for pain when taken orally, but it can also work if applied as a cream on the skin directly, also known as “topical application”.&nbsp;</span></p><span data-dcnode-id="1962" instrument_node="">
</span></blockquote><span data-dcnode-id="1960" instrument_node="">
</span><div data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">&nbsp;</span></div><span data-dcnode-id="1957" instrument_node="">
</span><p data-dcnode-id="1952"><span data-dcnode-id="1956" instrument_node="">Some products have CBD extracted and made into a cream specifically to target chronic pain in certain areas. This is an effective way we use cannabis and CBD oil for pain relief&nbsp;to help when the pain is localized to one area, such as your knee or wrist or finger. When researchers looked at how effective CBD on the skin is for pain, they found that pain from arthritis and neuropathic pain was reduced, with minimal side effects (</span><a data-dcnode-id="1954" data-saferedirecturl="https://www.google.com/url?q=https://www.frontiersin.org/articles/10.3389/fphar.2018.01259/full&amp;source=gmail&amp;ust=1614232461702000&amp;usg=AFQjCNGplgzg4V-pHVVL7NHjuyblWJKgjw" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/articles/10.3389/fphar.2018.01259/full" rel="noopener nofollow external noreferrer" target="_blank"><span data-dcnode-id="1955" instrument_node="">3</span></a><span data-dcnode-id="1953" instrument_node="">).&nbsp;</span></p><span data-dcnode-id="1951" instrument_node="">
</span></div><span data-dcnode-id="1949" instrument_node="">
</span><p data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1946" instrument_node="">
</span><h2 data-dcnode-id="1941" id="m_-1465161988548160341gmail-h-cbd-oil-for-chronic-pain"><span data-dcnode-id="1945" instrument_node="">CBD Oil for </span><span class="bluecus" data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">Back Pain</span></span><span data-dcnode-id="1942" instrument_node="">.</span></h2><span data-dcnode-id="1940" instrument_node="">
</span><div data-dcnode-id="1911"><span data-dcnode-id="1939" instrument_node="">
</span><div data-dcnode-id="1928"><span data-dcnode-id="1938" instrument_node="">
</span><p data-dcnode-id="1933"><span data-dcnode-id="1937" instrument_node="">Many Kiwis suffer from&nbsp;</span><a data-dcnode-id="1935" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthnavigator.org.nz/health-a-z/b/back-pain/" rel="noopener nofollow external noreferrer" target="_blank"><span data-dcnode-id="1936" instrument_node="">back pain</span></a><span data-dcnode-id="1934" instrument_node="">&nbsp;for a number of reasons. Back pain can be due to an old injury or previous surgery, or it can be due to a form of arthritis, such as osteoarthritis. Back pain can also be due to a pain syndrome which affects many different parts of the body, such as in fibromyalgia.&nbsp;</span></p><span data-dcnode-id="1932" instrument_node="">
</span><p data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">The good news is CBD oil and medicinal cannabis can help! Using a combination of both CBD and THC, we have had good success in treating back pain.</span></p><span data-dcnode-id="1929" instrument_node="">
</span></div><span data-dcnode-id="1927" instrument_node="">
</span><div data-dcnode-id="1913"><span data-dcnode-id="1926" instrument_node="">
</span><p data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">CBD is generally considered a pain-relief treatment that affects the whole body. While CBD oil doesn’t specifically target back pain, it can reduce the pain from this area, contributing to full-body relaxation.</span></p><span data-dcnode-id="1923" instrument_node="">
</span><p data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">Back pain affects many of us and can range from minor to severe, depending on the cause. While minor cases of back pain usually go away by themselves after a few weeks, it can still be inconvenient and painful.</span></p><span data-dcnode-id="1920" instrument_node="">
</span><p data-dcnode-id="1915"><span data-dcnode-id="1919" instrument_node="">Recent studies have shown promising results in CBD use for reducing inflammation and neuropathy, two factors that can contribute to neck and back pain (</span><a data-dcnode-id="1917" data-saferedirecturl="https://www.google.com/url?q=https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6494210/&amp;source=gmail&amp;ust=1614232461702000&amp;usg=AFQjCNEhktiC6EWqM8oK18VUykAK8yEdAQ" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6494210/" rel="noopener nofollow external noreferrer" target="_blank"><span data-dcnode-id="1918" instrument_node="">7</span></a><span data-dcnode-id="1916" instrument_node="">).&nbsp;</span></p><span data-dcnode-id="1914" instrument_node="">

</span><h2 data-dcnode-id="1875"><span data-dcnode-id="1879" instrument_node="">CBD Oil for </span><span class="bluecus" data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">Arthritis</span></span><span data-dcnode-id="1876" instrument_node="">.</span></h2><span data-dcnode-id="1874" instrument_node="">
</span><p data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">Arthritis is a type of inflammation in joints that can worsen with age. This often results in stiff and painful movements.</span></p><span data-dcnode-id="1871" instrument_node="">
</span><p data-dcnode-id="1866"><span data-dcnode-id="1870" instrument_node="">About&nbsp;</span><a data-dcnode-id="1868" data-saferedirecturl="https://www.google.com/url?q=https://healthcentral.nz/latest-statistics-indicate-more-kiwis-living-with-arthritis/%23:~:text%3DThe%2520most%2520common%2520form%2520of,7.7%2520per%2520cent%2520of%2520men.&amp;source=gmail&amp;ust=1614232461702000&amp;usg=AFQjCNHfs6sgjnqVljSQL5NNcmE7tIaRyQ" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthcentral.nz/latest-statistics-indicate-more-kiwis-living-with-arthritis/%23%3A~%3Atext%3DThe%2520most%2520common%2520form%2520of%2C7.7%2520per%2520cent%2520of%2520men." rel="noopener nofollow external noreferrer" target="_blank"><span data-dcnode-id="1869" instrument_node="">17% of adults in NZ</span></a><span data-dcnode-id="1867" instrument_node="">&nbsp;are affected by a form of arthritis in NZ. Arthritis can be due to many reasons, such as wear and tear or age related (as in osteoarthritis) or due to inflammation in the body, such as rheumatoid arthritis or psoriatic arthritis.&nbsp;</span></p><span data-dcnode-id="1865" instrument_node="">
</span><p data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">The good news is that CBD oil and medicinal cannabis can help with arthritis pain.&nbsp;</span></p><span data-dcnode-id="1862" instrument_node="">
</span><blockquote data-dcnode-id="1857"><span data-dcnode-id="1861" instrument_node="">
</span><p data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">CBD can help lower inflammation in your body, meaning CBD oil can be an excellent way to treat pain caused by arthritis.</span></p><span data-dcnode-id="1858" instrument_node="">
</span></blockquote><span data-dcnode-id="1856" instrument_node="">
</span><p data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">Studies on animals show that CBD may help with arthritis pain. However, more studies on humans are still needed. While animals are very similar to us in specific ways, research with humans is still the best way to decide what works best.</span></p><span data-dcnode-id="1853" instrument_node="">
</span><p data-dcnode-id="1848"><span data-dcnode-id="1852" instrument_node="">One of these animal studies includes a recent study on rats. Researchers found a link between CBD use and reduced inflammatory pain by CBD changing how pain receptors respond to stimuli (</span><a data-dcnode-id="1850" data-saferedirecturl="https://www.google.com/url?q=https://www.ncbi.nlm.nih.gov/pmc/articles/PMC3371734/&amp;source=gmail&amp;ust=1614232461702000&amp;usg=AFQjCNFp1w7rK5P5W2SOZq13r2Zxf_qbOw" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3371734/" rel="noopener nofollow external noreferrer" target="_blank"><span data-dcnode-id="1851" instrument_node="">6</span></a><span data-dcnode-id="1849" instrument_node="">).</span></p><span data-dcnode-id="1847" instrument_node="">

</span><h2 data-dcnode-id="1815"><span data-dcnode-id="1819" instrument_node="">CBD Oil for </span><span class="bluecus" data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">Cancer Related Pain</span></span><span data-dcnode-id="1816" instrument_node="">.</span></h2><span data-dcnode-id="1814" instrument_node="">
</span><div data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">&nbsp;</span></div><span data-dcnode-id="1811" instrument_node="">
</span><div data-dcnode-id="1806"><span data-dcnode-id="1810" instrument_node="">Dealing with pain is one of the more difficult side-effects of cancer treatments. About&nbsp;</span><a data-dcnode-id="1808" data-saferedirecturl="https://www.google.com/url?q=http://optimal%2520pain%2520management%2520for%2520patients%2520with%2520cancer%2520in%2520the%2520...%2520https/www.ncbi.nlm.nih.gov%2520%25E2%2580%25BA%2520articles%2520%25E2%2580%25BA%2520PMC5980731&amp;source=gmail&amp;ust=1614232461702000&amp;usg=AFQjCNF6_HU1eMXDj4IyDyFQ19nVJTsxNQ" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//optimal%2520pain%2520management%2520for%2520patients%2520with%2520cancer%2520in%2520the%2520...%2520https/www.ncbi.nlm.nih.gov%2520%25E2%2580%25BA%2520articles%2520%25E2%2580%25BA%2520PMC5980731" rel="noopener nofollow external noreferrer" target="_blank"><span data-dcnode-id="1809" instrument_node="">65% of people with cancer</span></a><span data-dcnode-id="1807" instrument_node="">&nbsp;suffer from chronic pain.</span></div><span data-dcnode-id="1805" instrument_node="">
</span><div data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">&nbsp;</span></div><span data-dcnode-id="1802" instrument_node="">
</span><div data-dcnode-id="1779"><span data-dcnode-id="1801" instrument_node="">
</span><p data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">The simple, ready-to-use, plant-based nature of CBD oil makes it an excellent choice for treating this type of pain, with the added benefit of minimal side effects.</span></p><span data-dcnode-id="1798" instrument_node="">
</span><p data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">For many people, pain during cancer treatment can really affect their quality of life. We have found that using a combination of CBD oil and THC can help reduce this pain significantly. The THC can also help improve appetite and reduce weight loss associated with cancer.&nbsp;</span></p><span data-dcnode-id="1795" instrument_node="">
</span><p data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">When researchers looked closer at the type of pain experienced during cancer and treatment, they discovered that cancer and inflammation often walk hand in hand.</span></p><span data-dcnode-id="1792" instrument_node="">
</span><p data-dcnode-id="1787"><span data-dcnode-id="1791" instrument_node="">On the one hand, chronic inflammation often leads to increased cancer risk, and on the other, cancer has also shown to promote inflammation throughout the body, increasing pain (</span><a data-dcnode-id="1789" data-saferedirecturl="https://www.google.com/url?q=https://www.ncbi.nlm.nih.gov/pmc/articles/PMC2828614/&amp;source=gmail&amp;ust=1614232461702000&amp;usg=AFQjCNGDxF4PiBRc0QGTAYBTq5Od_tlLFw" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2828614/" rel="noopener nofollow external noreferrer" target="_blank"><span data-dcnode-id="1790" instrument_node="">4</span></a><span data-dcnode-id="1788" instrument_node="">).&nbsp;</span></p><span data-dcnode-id="1786" instrument_node="">
</span><p data-dcnode-id="1781"><span data-dcnode-id="1785" instrument_node="">CBD can act as an anti-inflammatory by decreasing oxidative stress and systemic inflammation. Oxidative stress triggers your immune system, which can actually damage healthy cells. Lowering both of these symptoms reduces pain from inflammatory diseases like cancer (</span><a data-dcnode-id="1783" data-saferedirecturl="https://www.google.com/url?q=https://www.ncbi.nlm.nih.gov/pmc/articles/PMC7023045/%23:~:text%3DTherefore%252C%2520it%2520has%2520been%2520suggested,of%2520immune%2520cells%2520%255B66%255D.&amp;source=gmail&amp;ust=1614232461702000&amp;usg=AFQjCNFcgE1lRVAZfy3UVa29vNJMgQLKKg" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC7023045/%23%3A~%3Atext%3DTherefore%252C%2520it%2520has%2520been%2520suggested%2Cof%2520immune%2520cells%2520%255B66%255D." rel="noopener nofollow external noreferrer" target="_blank"><span data-dcnode-id="1784" instrument_node="">5</span></a><span data-dcnode-id="1782" instrument_node="">).&nbsp;</span></p><span data-dcnode-id="1780" instrument_node="">
</span></div><span data-dcnode-id="1778" instrument_node="">
</span><p data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1775" instrument_node="">

</span><h2 data-dcnode-id="1749"><span data-dcnode-id="1753" instrument_node="">Can CBD Oil Help </span><span class="bluecus" data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">Endometriosis Pain</span></span><span data-dcnode-id="1750" instrument_node="">?</span></h2><span data-dcnode-id="1748" instrument_node="">
</span><p data-dcnode-id="1743"><span data-dcnode-id="1747" instrument_node="">Endometriosis affects </span><a data-dcnode-id="1745" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nzendo.org.nz/endo-information/" rel="noopener nofollow external noreferrer" target="_blank"><span data-dcnode-id="1746" instrument_node="">1 in 10 women in NZ</span></a><span data-dcnode-id="1744" instrument_node="">! It is more common than is apparent in society. It is possible that you or a loved one suffers from endometriosis and knows this condition too well.&nbsp;&nbsp;</span></p><span data-dcnode-id="1742" instrument_node="">
</span><p data-dcnode-id="1737"><span data-dcnode-id="1741" instrument_node="">Endometriosis is due to cells that should only grow in the uterus start to grow in </span><a data-dcnode-id="1739" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5737931/" rel="noopener nofollow external noreferrer" target="_blank"><span data-dcnode-id="1740" instrument_node="">other areas of the abdomen</span></a><span data-dcnode-id="1738" instrument_node="">, including along the abdomen and on the intestines.&nbsp;</span></p><span data-dcnode-id="1736" instrument_node="">
</span><p data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">The most common symptoms women experience with endometriosis is severe period pain. The pain is so severe that women sometimes find it impossible to get on with their normal daily life. Once this occurs for 1-2 weeks of every month, it quickly becomes very disruptive and really diminishes quality of life.&nbsp;</span></p><span data-dcnode-id="1733" instrument_node="">
</span><p data-dcnode-id="1728"><span data-dcnode-id="1732" instrument_node="">The good news is that CBD oil &amp; medicinal cannabis can help. Endometriosis is one of the most common reasons we use medicinal cannabis </span><a data-dcnode-id="1730" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannabisclinic.co.nz/" rel="noopener" target="_blank"><span data-dcnode-id="1731" instrument_node="">in our clinic</span></a><span data-dcnode-id="1729" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="1727" instrument_node="">
</span><p data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">By using either CBD oil or a combination of both CBD and THC, the inflammation and pain associated with endometriosis can be significantly improved.&nbsp;</span></p><span data-dcnode-id="1724" instrument_node="">
</span><p data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">This is how Chelsea used CBD oil to help manage her endometriosis:</span></p><span data-dcnode-id="1721" instrument_node="">
</span><p data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1718" instrument_node="">
</span></div><span data-dcnode-id="1716" instrument_node="">

</span><h2 data-dcnode-id="1698"><span data-dcnode-id="1702" instrument_node="">Can CBD Oil Help With </span><span class="bluecus" data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">Migraines</span></span><span data-dcnode-id="1699" instrument_node="">?</span></h2><span data-dcnode-id="1697" instrument_node="">
</span><p data-dcnode-id="1692"><span data-dcnode-id="1696" instrument_node="">Migraines are severe headaches that occur with or without a specific trigger and are extremely debilitating. Sometimes the headache can last for several hours or even a day. In fact, migraines are one of the </span><a data-dcnode-id="1694" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5821623/" rel="noopener nofollow external noreferrer" target="_blank"><span data-dcnode-id="1695" instrument_node="">leading causes of disability</span></a><span data-dcnode-id="1693" instrument_node=""> in the world.</span></p><span data-dcnode-id="1691" instrument_node="">
</span><p data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">What can be more exhausting is the recover time after a headache. Usually, a person feels it takes a few days to recover from a bout of migraines.&nbsp;</span></p><span data-dcnode-id="1688" instrument_node="">
</span><p data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">There are multiple causes of migraines which involve a combination of genetic and environmental factors.</span></p><span data-dcnode-id="1685" instrument_node="">
</span><p data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">Migraine symptoms may include:</span></p><span data-dcnode-id="1682" instrument_node="">
</span><ul data-dcnode-id="1668"><span data-dcnode-id="1681" instrument_node="">
</span><li data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">Severe head aches</span></li><span data-dcnode-id="1678" instrument_node="">
</span><li data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">Sensitivity to light</span></li><span data-dcnode-id="1675" instrument_node="">
</span><li data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">Nausea</span></li><span data-dcnode-id="1672" instrument_node="">
</span><li data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">Dizziness</span></li><span data-dcnode-id="1669" instrument_node="">
</span></ul><span data-dcnode-id="1667" instrument_node="">
</span><blockquote data-dcnode-id="1659"><span data-dcnode-id="1666" instrument_node="">
</span><p data-dcnode-id="1661"><span data-dcnode-id="1665" instrument_node="">The good news is that CBD oil and medicinal cannabis </span><a data-dcnode-id="1663" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannabisclinic.co.nz/cbd-oil-migraines/" rel="noopener" target="_blank"><span data-dcnode-id="1664" instrument_node="">can help with migraines</span></a><span data-dcnode-id="1662" instrument_node="">! It is in fact a common reason we consult about.&nbsp;</span></p><span data-dcnode-id="1660" instrument_node="">
</span></blockquote><span data-dcnode-id="1658" instrument_node="">
</span><p data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">CBD oil contains anti-inflammatory properties and helps reduces tension and anxiety. It can also reduce the pain associated with a migraine.</span></p><span data-dcnode-id="1655" instrument_node="">
</span><p data-dcnode-id="1647"><span data-dcnode-id="1654" instrument_node="">This is important in migraines as reducing the tension and anxiety can itself reduce the frequency of migraines by itself. When episodes of migraines still occur even with </span><a data-dcnode-id="1652" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannabisclinic.co.nz/cbd-oil/" rel="noopener" target="_blank"><span data-dcnode-id="1653" instrument_node="">CBD oil</span></a><span data-dcnode-id="1651" instrument_node="">, we add in a low dose of </span><a data-dcnode-id="1649" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannabisclinic.co.nz/thc-oil-nz/" rel="noopener" target="_blank"><span data-dcnode-id="1650" instrument_node="">THC</span></a><span data-dcnode-id="1648" instrument_node=""> to treat the onset of a migraine. We do this at low doses to avoid the possibility of any side effects.</span></p><span data-dcnode-id="1646" instrument_node="">
</span><p data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">By using a starting point of CBD oil daily to help prevent migraines and a THC containing product at the start of an attack, medicinal cannabis has been an effective treatment for migraines at the clinic.</span></p><span data-dcnode-id="1643" instrument_node="">
</span><p data-dcnode-id="1640"><strong data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">What the research says about CBD oil and migraines:</span></strong></p><span data-dcnode-id="1639" instrument_node="">
</span><ul data-dcnode-id="1625"><span data-dcnode-id="1638" instrument_node="">
</span><li data-dcnode-id="1633"><span data-dcnode-id="1637" instrument_node="">In </span><a data-dcnode-id="1635" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/26749285/" rel="noopener nofollow external noreferrer" target="_blank"><span data-dcnode-id="1636" instrument_node="">a study</span></a><span data-dcnode-id="1634" instrument_node=""> published by the University of Colorado, researchers examined the effects of cannabis on 121 people with migraines. Their findings showed that 85.1% of patients experienced reductions in the number of migraines they experienced from 10.4 to 4.6 headaches per month, which is a significant decrease. Cannabis not only reduced migraine frequency but also stopped migraines from occurring if cannabis was taken during a migraine episode.</span></li><span data-dcnode-id="1632" instrument_node="">
</span><li data-dcnode-id="1627"><span data-dcnode-id="1631" instrument_node="">One large </span><a data-dcnode-id="1629" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/31195754/" rel="noopener nofollow external noreferrer" target="_blank"><span data-dcnode-id="1630" instrument_node="">observational study</span></a><span data-dcnode-id="1628" instrument_node=""> of 367 patients looked at how cannabis affects fibromyalgia patients. 80% of patients experienced improvements in sleep and depression. There were also significant improvements for general wellbeing and pain. Side effects included dizziness, dry mouth, nausea, vomiting, and hyperactivity in under 8% of patients.</span></li><span data-dcnode-id="1626" instrument_node="">
</span></ul><span data-dcnode-id="1624" instrument_node="">
</span><p data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1621" instrument_node="">

</span><h2 data-dcnode-id="1586"><span data-dcnode-id="1590" instrument_node="">Can CBD Oil Help With </span><span class="bluecus" data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">Fibromyalgia</span></span><span data-dcnode-id="1587" instrument_node="">?</span></h2><span data-dcnode-id="1585" instrument_node="">
</span><p data-dcnode-id="1580"><span data-dcnode-id="1584" instrument_node="">Fibromyalgia is more common than you think in NZ. It is thought that up to </span><a data-dcnode-id="1582" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.southerncross.co.nz/group/medical-library/fibromyalgia" rel="noopener nofollow external noreferrer" target="_blank"><span data-dcnode-id="1583" instrument_node="">6% of Kiwis</span></a><span data-dcnode-id="1581" instrument_node=""> have some form of this condition. While there is no physical cause for the pain to see, the severity and effects of the pain can be significant and reduces a persons functioning and quality of life quite dramatically.&nbsp;</span></p><span data-dcnode-id="1579" instrument_node="">
</span><p data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">The cause is unknown, although risk factors include pre-existing conditions and genetics. Fibromyalgia causes similar symptoms to arthritis. One distinct difference is that unlike arthritis, fibromyalgia causes soft tissue pain rather than direct damage to joints.</span></p><span data-dcnode-id="1576" instrument_node="">
</span><p data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">Symptoms of fibromyalgia include:</span></p><span data-dcnode-id="1573" instrument_node="">
</span><ul data-dcnode-id="1556"><span data-dcnode-id="1572" instrument_node="">
</span><li data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">Muscle stiffness and spasms</span></li><span data-dcnode-id="1569" instrument_node="">
</span><li data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">Extreme fatigue</span></li><span data-dcnode-id="1566" instrument_node="">
</span><li data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">Sensitivity to pain, which may be worse in certain areas</span></li><span data-dcnode-id="1563" instrument_node="">
</span><li data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">Cognitive difficulties such as impaired concentration</span></li><span data-dcnode-id="1560" instrument_node="">
</span><li data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Poor sleep and mood as a result of the above</span></li><span data-dcnode-id="1557" instrument_node="">
</span></ul><span data-dcnode-id="1555" instrument_node="">
</span><p data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">There is no current cure for fibromyalgia. That being said, one’s quality of life can be improved by taking pain relief medications and making appropriate lifestyle changes.</span></p><span data-dcnode-id="1552" instrument_node="">
</span><blockquote data-dcnode-id="1547"><span data-dcnode-id="1551" instrument_node="">
</span><p data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">The good news is that medicinal cannabis and CBD oil can help! Fibromyalgia is a common condition that we treat and deal with at the clinic. By using a combination of CBD oil and THC, we can help reduce the intensity and flares of the pain.</span></p><span data-dcnode-id="1548" instrument_node="">
</span></blockquote><span data-dcnode-id="1546" instrument_node="">
</span><p data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">About 25% of people respond to the CBD oil for pain alone. If the response is not sufficient then a product with more THC is added.</span></p><span data-dcnode-id="1543" instrument_node="">
</span><p data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">CBD oil does this by interacting with the body’s endocannabinoid system.</span></p><span data-dcnode-id="1540" instrument_node="">
</span><p data-dcnode-id="1535"><span data-dcnode-id="1539" instrument_node="">This system is comprised of enzymes, receptors, and endocannabinoids. The endocannabinoid system’s </span><a data-dcnode-id="1537" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/29533978/" rel="noopener nofollow external noreferrer" target="_blank"><span data-dcnode-id="1538" instrument_node="">CB1 and CB2 receptors</span></a><span data-dcnode-id="1536" instrument_node=""> are responsible for pain regulation. Cannabinoid receptors such as CB1 are distributed throughout the central nervous system and regions of the brain involved in pain signalling. The effects of cannabis on these receptors are central to how cannabis exerts its pain-relieving effects, which may help people with fibromyalgia.</span></p><span data-dcnode-id="1534" instrument_node="">
</span></div><span data-dcnode-id="1532" instrument_node="">

</span><h4 data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">Meet Dani</span></h4><span data-dcnode-id="1490" instrument_node="">
</span><p data-dcnode-id="1486"><span data-dcnode-id="1489" instrument_node="">Dani’s life as a mum and wife was severely limited due to fibromyalgia. With the help of medicinal cannabis for pain relief, she was able to live a much happier and painless life. </span><a data-dcnode-id="1487" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannabisclinic.co.nz/patient-stories/cbd-oil-fibromyalgia-endometriosis/" rel="noopener" target="_blank"><span data-dcnode-id="1488" instrument_node="">Click here to read Dani’s story.</span></a></p><span data-dcnode-id="1485" instrument_node="">

</span><h2 data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">How Does CBD Help With Pain?</span></h2><span data-dcnode-id="1470" instrument_node="">
</span><p data-dcnode-id="1465"><span data-dcnode-id="1469" instrument_node="">Every human has an endocannabinoid system (ECS), which is made up of endocannabinoids, cannabinoid receptors, and enzymes (</span><a data-dcnode-id="1467" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4789136/" rel="noopener nofollow external noreferrer" target="_blank"><span data-dcnode-id="1468" instrument_node="">9</span></a><span data-dcnode-id="1466" instrument_node="">).</span></p><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">These endocannabinoid receptors in your body receive signals and your cells then respond to these signals. The response in the endocannabinoid system from CBD consumption leads to anti-inflammatory and pain-relieving effects that can help you manage pain.</span></p><span data-dcnode-id="1461" instrument_node="">
</span><p data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1458" instrument_node="">
</span><h2 data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">How Can I Use CBD Oil For Pain?</span></h2><span data-dcnode-id="1455" instrument_node="">
</span><p data-dcnode-id="1450"><span data-dcnode-id="1454" instrument_node="">Before using CBD oil for pain relief, </span><a data-dcnode-id="1452" href="#book-now"><span data-dcnode-id="1453" instrument_node="">talking to a doctor can be helpful</span></a><span data-dcnode-id="1451" instrument_node="">. They will assess your pain needs individually and discuss how CBD can potentially help you.&nbsp;</span></p><span data-dcnode-id="1449" instrument_node="">
</span><p data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">There are many different ways of taking CBD, including capsules, vaping, and topical applications. An excellent way to take CBD is via a tincture, also known as taking CBD sublingually, where you place a few drops of CBD under your tongue. Your tongue is rich in capillaries, which allows for excellent absorption rates.</span></p><span data-dcnode-id="1446" instrument_node="">
</span><p data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">When incorporating CBD oil into your routine, it is essential to start slow, especially if you have never used CBD products before.</span></p><span data-dcnode-id="1443" instrument_node="">
</span><p data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">A suitable dosage of CBD for chronic pain should start at&nbsp;15-20mg per day. While this is a relatively low dose, it is best to start with a small amount to test CBD’s effects on your body before gradually increasing it based on the level of pain management you need.&nbsp;</span></p><span data-dcnode-id="1440" instrument_node="">
</span><p data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">Ultimately, the dosage required will depend on your body chemistry, weight, and pain severity, which will affect how well the CBD oil works.</span></p><span data-dcnode-id="1437" instrument_node="">
</span><h2 data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">Does CBD Oil Have Side Effects?</span></h2><span data-dcnode-id="1434" instrument_node="">
</span><p data-dcnode-id="1429"><span data-dcnode-id="1433" instrument_node="">While side effects will depend on the person, possible symptoms include changes in appetite, dizziness, nausea, and diarrhoea (</span><a data-dcnode-id="1431" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC7052834/" rel="noopener nofollow external noreferrer" target="_blank"><span data-dcnode-id="1432" instrument_node="">10</span></a><span data-dcnode-id="1430" instrument_node="">). CBD products can also interact with certain pain relief medications, so it’s a good idea to talk to a health professional if you’re concerned.&nbsp;</span></p><span data-dcnode-id="1428" instrument_node="">
</span><p data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">One way to decrease your chance of getting any negative side effects is to choose CBD oil products from reputable companies. Ideally, choose a CBD oil that has been tested by a third party and from a company that consistently produces high-quality products.</span></p><span data-dcnode-id="1425" instrument_node="">
</span><h2 data-dcnode-id="1420"><span data-dcnode-id="1424" instrument_node="">How Can The </span><span class="bluecus" data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">Cannabis Clinic </span></span><span data-dcnode-id="1421" instrument_node="">Help Me?</span></h2><span data-dcnode-id="1419" instrument_node="">
</span><p data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">We can help alleviate your symptoms by using CBD for chronic pain&nbsp;with low amounts of THC. CBD oil helps with the pain, but low dose THC also works effectively in conjunction with the CBD. The doses are low and not sufficient to make you high or impair your daily functioning.</span></p><span data-dcnode-id="1416" instrument_node="">
</span><p data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">We will work with you or your loved one to prescribe the most effective treatment plan for the specific type of pain that you experience.&nbsp;</span></p><span data-dcnode-id="1413" instrument_node="">
</span><p data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1410" instrument_node="">
