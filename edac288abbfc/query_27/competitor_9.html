</span><h1 data-dcnode-id="5134"><span data-dcnode-id="5135" id="How_to_Use_Marijuana_for_Pain_Relief"><span data-dcnode-id="5136" instrument_node="">How to Use Marijuana for Pain Relief</span></span></h1><span data-dcnode-id="5133" instrument_node="">
</span><h2 data-dcnode-id="5130"><span data-dcnode-id="5131" id="Cannabis_Is_Unpredictable_at_First"><span data-dcnode-id="5132" instrument_node="">Cannabis Is Unpredictable at First</span></span></h2><span data-dcnode-id="5129" instrument_node="">
</span><p data-dcnode-id="5127"><span data-dcnode-id="5128" instrument_node="">Figuring out how to use marijuana for pain relief requires a little trial and error. Start small. Be patient. Keep trying, because, in the end, many patients find it a better alternative to prescription medication.</span></p><div class="adace-slot-wrapper adace-after-paragraph adace-slot-wrapper-main" data-dcnode-id="5111"><span data-dcnode-id="5126" instrument_node="">
</span><div class="adace-disclaimer" data-dcnode-id="5124"><span data-dcnode-id="5125" instrument_node="">

</span><div class="adace_ad_6262a5053a0e0 adace-dont-remove" data-dcnode-id="5115"><span data-dcnode-id="5121" instrument_node="">
</span><a data-dcnode-id="5117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//prettypipeshop.com/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="5120" instrument_node="">
</span><img alt="" class="lazyloaded" data-dcnode-id="5119" data-expand="600" data-src="https://www.marijuanamommy.com/wp-content/uploads/2021/01/Pretty-Pipe-Shop-buy.jpg" height="502" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marijuanamommy.com/wp-content/uploads/2021/01/Pretty-Pipe-Shop-buy.jpg&amp;raw" width="600"><span data-dcnode-id="5118" instrument_node="">

</span><p data-dcnode-id="5108"><img alt="How to use marijuana for pain relief." class="aligncenter wp-image-27031 size-full lazyloaded" data-dcnode-id="5109" data-expand="600" data-pin-description="How to use marijuana for pain relief." data-src="https://www.marijuanamommy.com/wp-content/uploads/2016/05/woman-2609115_960_720-1.jpg" height="640" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marijuanamommy.com/wp-content/uploads/2016/05/woman-2609115_960_720-1.jpg&amp;raw" width="960"></p><span data-dcnode-id="5107" instrument_node="">
</span><h2 data-dcnode-id="5104"><span data-dcnode-id="5105" id="Donrsquot_ldquoJust_Go_Smoke_a_Jointrdquo"><span data-dcnode-id="5106" instrument_node="">Don’t “Just Go Smoke a Joint”</span></span></h2><span data-dcnode-id="5103" instrument_node="">
</span><p data-dcnode-id="5101"><span data-dcnode-id="5102" instrument_node="">I’ve been told by more than one patient, that their doctor advised them to “just go smoke a joint” and see if it helps their pain. This is not good advice!</span></p><span data-dcnode-id="5100" instrument_node="">
</span><p data-dcnode-id="5098"><span data-dcnode-id="5099" instrument_node="">Unfortunately, many healthcare professionals are still misinformed about cannabis. Pain treatment with medical marijuana is more complicated than picking up a random joint and smoking it. You really need to know exactly what–as in, which strain–you are consuming, and you need to be cautious about how much and the method in which you consume it.</span></p><div class="adace-slot-wrapper adace-after-paragraph-3 adace-align-center adace-slot-wrapper-main" data-dcnode-id="5084" style="text-align:center;"><span data-dcnode-id="5097" instrument_node="">
</span><div class="adace-disclaimer" data-dcnode-id="5095"><span data-dcnode-id="5096" instrument_node="">
</span></div><span data-dcnode-id="5094" instrument_node="">
</span><div class="adace-slot" data-dcnode-id="5086"><span data-dcnode-id="5093" instrument_node="">
</span><div class="adace_ad_6262a5053a9eb adace-dont-remove" data-dcnode-id="5088"><span data-dcnode-id="5092" instrument_node="">
</span><a data-dcnode-id="5090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//prettypipeshop.com/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="5091" instrument_node="">
</span></a><span data-dcnode-id="5089" instrument_node="">
</span></div><span data-dcnode-id="5087" instrument_node="">
</span></div><span data-dcnode-id="5085" instrument_node="">
</span></div><span data-dcnode-id="5083" instrument_node="">
</span><p data-dcnode-id="5078"><span data-dcnode-id="5082" instrument_node="">An entire joint is waaaay too much for new patients-especially if it’s a high-THC strain. This can cause a panic attack. Then new patients believe the anxiety is from cannabis and refuse to try it again. The </span><a data-dcnode-id="5080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marijuanamommy.com/how-much-cannabis-should-i-use-start-low-go-slow/"><span data-dcnode-id="5081" instrument_node="">dosage of marijuana</span></a><span data-dcnode-id="5079" instrument_node="">, like all medications, is very important. Too much&nbsp;is not good.</span></p><span data-dcnode-id="5077" instrument_node="">
</span><p data-dcnode-id="5075"><span data-dcnode-id="5076" instrument_node="">&nbsp;</span></p><span data-dcnode-id="5074" instrument_node="">
</span><h2 data-dcnode-id="5071"><span data-dcnode-id="5072" id="Cannabinoids_ndash_Important_Components_in_Cannabis"><span data-dcnode-id="5073" instrument_node="">Cannabinoids – Important Components in Cannabis</span></span></h2><span data-dcnode-id="5070" instrument_node="">
</span><p data-dcnode-id="5065"><span data-dcnode-id="5069" instrument_node="">Most people recognize the most famous cannabinoid, THC. THC is the main cannabinoid in marijuana that makes you feel high. You may have also heard of CBD. CBD is being widely researched (Did you know the </span><a data-dcnode-id="5067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//patents.google.com/patent/US6630507B1/en" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="5068" instrument_node="">US government owns a patent on CBD</span></a><span data-dcnode-id="5066" instrument_node="">?–True story!), and like THC, CBD has powerful health properties. But cannabis contains over 113 different cannabinoids and some don’t even have names yet.</span></p><span data-dcnode-id="5064" instrument_node="">

</span><h2 data-dcnode-id="4541"><span data-dcnode-id="4542" id="Not_All_Marijuana_is_the_Same"><span data-dcnode-id="4543" instrument_node="">Not All Marijuana is the Same</span></span></h2><span data-dcnode-id="4540" instrument_node="">
</span><p data-dcnode-id="4538"><span data-dcnode-id="4539" instrument_node="">Additionally, cannabinoids interact with other components in the plant, such as terpenes to produce what is commonly referred to as the “entourage effect”.</span></p><span data-dcnode-id="4537" instrument_node="">
</span><p data-dcnode-id="4532"><span data-dcnode-id="4536" instrument_node="">There are </span><a data-dcnode-id="4534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marijuanamommy.com/every-strain-of-cannabis-causes-a-different-physical-reaction/"><span data-dcnode-id="4535" instrument_node="">thousands of different chemovars, commonly called “strains” of marijuana</span></a><span data-dcnode-id="4533" instrument_node="">.</span></p><span data-dcnode-id="4531" instrument_node="">
</span><ol data-dcnode-id="4524"><li data-dcnode-id="4529"><span data-dcnode-id="4530" instrument_node="">Everyone responds differently to different cultivars. Sour Diesel gives me anxiety; for you, it may be blissful.</span></li><span data-dcnode-id="4528" instrument_node="">
</span><li data-dcnode-id="4526"><span data-dcnode-id="4527" instrument_node="">Each individual plant contains different types and varying amounts of cannabinoids, terpenes and other components that have a collective medicinal effect.</span></li><span data-dcnode-id="4525" instrument_node="">

</span><h3 data-dcnode-id="4513"><span data-dcnode-id="4514" id="Choosing_Cannabis_Products_Can_Be_Complicated"><span data-dcnode-id="4515" instrument_node="">Choosing Cannabis Products Can Be Complicated</span></span></h3><span data-dcnode-id="4512" instrument_node="">
</span><p data-dcnode-id="4510"><span data-dcnode-id="4511" instrument_node="">Historically, there were two types of cannabis: Sativa and Indica. Now, all chemovars (strains) available are hybrids–or combinations of the two. The classifications mean very little in today’s market.</span></p><span data-dcnode-id="4509" instrument_node="">
</span><p data-dcnode-id="4507"><span data-dcnode-id="4508" instrument_node="">Historically, indicas were considered to be sedating, while sativas were considered to be invigorating. Again, in today’s market, these categories mean very little, because it’s very difficult (probably impossible) to find true sativas or true indicas. All strains available now are hybrids, or mixes of the different types.</span></p><span data-dcnode-id="4506" instrument_node="">
</span><p data-dcnode-id="4501"><span data-dcnode-id="4505" instrument_node="">To make it more complicated, </span><a data-dcnode-id="4503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marijuanamommy.com/every-strain-of-cannabis-causes-a-different-physical-reaction/"><span data-dcnode-id="4504" instrument_node="">each strain of cannabis can cause a different physical reaction</span></a><span data-dcnode-id="4502" instrument_node="">, and those reactions, vary from person to person.</span></p><span data-dcnode-id="4500" instrument_node="">
</span><p data-dcnode-id="4495" style="text-align: center;"><span data-dcnode-id="4499" instrument_node="">Read this post to learn more about strains:&nbsp;</span><strong data-dcnode-id="4496"><a data-dcnode-id="4497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marijuanamommy.com/every-strain-of-cannabis-causes-a-different-physical-reaction/"><span data-dcnode-id="4498" instrument_node="">Strains of Cannabis Are All So Different</span></a></strong></p><span data-dcnode-id="4494" instrument_node="">
</span><p data-dcnode-id="4492"><span data-dcnode-id="4493" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4491" instrument_node="">
</span><p data-dcnode-id="4484"><strong data-dcnode-id="4489"><span data-dcnode-id="4490" instrument_node="">Remember</span></strong><span data-dcnode-id="4488" instrument_node="">, </span><strong data-dcnode-id="4486"><span data-dcnode-id="4487" instrument_node="">chemovar reactions are highly individualized</span></strong><span data-dcnode-id="4485" instrument_node="">. Also, keep in mind that there are no regulations for cannabis strains and there’s no accepted nomenclature. Which means, a strain available in CA named “Bubba Kush” does not mean it’s the same exact strain as the “Bubba Kush” being sold in NJ.</span></p><span data-dcnode-id="4483" instrument_node="">

ntent/uploads/2018/04/GHTV5940.jpg&amp;raw" srcset="https://www.marijuanamommy.com/wp-content/uploads/2018/04/GHTV5940.jpg 2090w, https://www.marijuanamommy.com/wp-content/uploads/2018/04/GHTV5940-250x250.jpg 250w, https://www.marijuanamommy.com/wp-content/uploads/2018/04/GHTV5940-300x300.jpg 300w, https://www.marijuanamommy.com/wp-content/uploads/2018/04/GHTV5940-768x768.jpg 768w, https://www.marijuanamommy.com/wp-content/uploads/2018/04/GHTV5940-1024x1024.jpg 1024w, https://www.marijuanamommy.com/wp-content/uploads/2018/04/GHTV5940-192x192.jpg 192w, https://www.marijuanamommy.com/wp-content/uploads/2018/04/GHTV5940-384x384.jpg 384w, https://www.marijuanamommy.com/wp-content/uploads/2018/04/GHTV5940-110x110.jpg 110w, https://www.marijuanamommy.com/wp-content/uploads/2018/04/GHTV5940-220x220.jpg 220w, https://www.marijuanamommy.com/wp-content/uploads/2018/04/GHTV5940-364x364.jpg 364w, https://www.marijuanamommy.com/wp-content/uploads/2018/04/GHTV5940-758x758.jpg 758w, https://www.marijuanamommy.com/wp-content/uploads/2018/04/GHTV5940-608x608.jpg 608w, https://www.marijuanamommy.com/wp-content/uploads/2018/04/GHTV5940-1152x1152.jpg 1152w, https://www.marijuanamommy.com/wp-content/uploads/2018/04/GHTV5940-311x311.jpg 311w, https://www.marijuanamommy.com/wp-content/uploads/2018/04/GHTV5940-313x313.jpg 313w, https://www.marijuanamommy.com/wp-content/uploads/2018/04/GHTV5940-48x48.jpg 48w, https://www.marijuanamommy.com/wp-content/uploads/2018/04/GHTV5940-96x96.jpg 96w" width="2090"></p><span data-dcnode-id="4480" instrument_node="">
</span><h3 data-dcnode-id="4477"><span data-dcnode-id="4478" id="How_to_Choose_a_Chemovar"><span data-dcnode-id="4479" instrument_node="">How to Choose a Chemovar</span></span></h3><span data-dcnode-id="4476" instrument_node="">
</span><p data-dcnode-id="4468"><span data-dcnode-id="4475" instrument_node="">Like most experts, I encourage friends and families to start with high CBD strains. </span><a data-dcnode-id="4473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marijuanamommy.com/actual-benefits-cbd/"><span data-dcnode-id="4474" instrument_node="">CBD, or cannabidiol</span></a><span data-dcnode-id="4472" instrument_node="">, is a powerful anti-inflammatory with few </span><a data-dcnode-id="4470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marijuanamommy.com/side-effects-thc/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4471" instrument_node="">side effects.</span></a><span data-dcnode-id="4469" instrument_node=""> Reducing inflammation can significantly reduce pain levels. Low-THC strains can be great for daytime use.&nbsp;A product with a 1:1 CBD-to-THC ratio is often a great place to start.</span></p><span data-dcnode-id="4467" instrument_node="">
</span><p data-dcnode-id="4465"><span data-dcnode-id="4466" instrument_node="">High-CBD strains are particularly appealing for cannabis-naive users. CBD can help reduce the risk of anxiety because CBD mitigates some of the intoxicating effects of THC.</span></p><span data-dcnode-id="4464" instrument_node="">
</span><p data-dcnode-id="4460" style="text-align: center;"><span data-dcnode-id="4463" instrument_node="">Read: </span><a data-dcnode-id="4461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marijuanamommy.com/cannabis-as-a-treatment-for-anxiety/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4462" instrument_node="">Can Cannabis Help Anxiety?</span></a></p><span data-dcnode-id="4459" instrument_node="">
</span><p data-dcnode-id="4457"><span data-dcnode-id="4458" instrument_node="">Unfortunately, high-CBD, low-THC strains are not always the most effective at eliminating pain. Many pain management patients require medium-THC to high-THC strains to effectively manage their pain. Most patients utilize a variety of chemovars and products in their plan of care. Personally, I love Juanita La Lagrimosa, (a high-CBD strain), The Hog (a medium-THC strain), and Death Star (a very high-THC strain).</span></p><span data-dcnode-id="4456" instrument_node="">
</span><p data-dcnode-id="4451"><span data-dcnode-id="4455" instrument_node="">The only way to know which product work best for you is to </span><strong data-dcnode-id="4453"><span data-dcnode-id="4454" instrument_node="">try</span></strong><span data-dcnode-id="4452" instrument_node=""> the different options.</span></p><span data-dcnode-id="4450" instrument_node="">
</span><p data-dcnode-id="4448"><span data-dcnode-id="4449" instrument_node="">The dispensary staff (depending on the dispensary) can offer guidance to help narrow down your options. Dispensaries with a medical focus tend to be more familiar with symptom management. Budtenders have access to local patient feedback about the specific strains available in their dispensary. They can often tell you what works for other patients.</span></p><span data-dcnode-id="4447" instrument_node="">
</span><p data-dcnode-id="4443"><strong data-dcnode-id="4445"><span data-dcnode-id="4446" instrument_node="">Remember</span></strong><span data-dcnode-id="4444" instrument_node=""> – everyone is different. I could function all day on the strain Death Star, while others might feel anxious and paranoid with one inhalation.</span></p><span data-dcnode-id="4442" instrument_node="">
</span><p data-dcnode-id="4440"><img alt="Smoking cannabis can help relieve anxiety for many." class="aligncenter size-full wp-image-25409 lazyloaded" data-dcnode-id="4441" data-expand="600" data-pin-description="Smoking cannabis can help relieve anxiety for many." data-sizes="(max-width: 5363px) 100vw, 5363px" data-src="https://www.marijuanamommy.com/wp-content/uploads/2018/03/jessie-MJ-MOM_15606.jpg" data-srcset="https://www.marijuanamommy.com/wp-content/uploads/2018/03/jessie-MJ-MOM_15606.jpg 5363w, https://www.marijuanamommy.com/wp-content/uploads/2018/03/jessie-MJ-MOM_15606-300x200.jpg 300w, https://www.marijuanamommy.com/wp-content/uploads/2018/03/jessie-MJ-MOM_15606-768x512.jpg 768w, https://www.marijuanamommy.com/wp-content/uploads/2018/03/jessie-MJ-MOM_15606-1024x683.jpg 1024w, https://www.marijuanamommy.com/wp-content/uploads/2018/03/jessie-MJ-MOM_15606-364x243.jpg 364w, https://www.marijuanamommy.com/wp-content/uploads/2018/03/jessie-MJ-MOM_15606-758x505.jpg 758w, https://www.marijuanamommy.com/wp-content/uploads/2018/03/jessie-MJ-MOM_15606-608x405.jpg 608w, https://www.marijuanamommy.com/wp-content/uploads/2018/03/jessie-MJ-MOM_15606-1152x768.jpg 1152w, https://www.marijuanamommy.com/wp-content/uploads/2018/03/jessie-MJ-MOM_15606-313x209.jpg 313w, https://www.marijuanamommy.com/wp-content/uploads/2018/03/jessie-MJ-MOM_15606-72x48.jpg 72w, https://www.marijuanamommy.com/wp-content/uploads/2018/03/jessie-MJ-MOM_15606-144x96.jpg 144w" height="3575" loading="lazy" sizes="(max-width: 5363px) 100vw, 5363px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marijuanamommy.com/wp-content/uploads/2018/03/jessie-MJ-MOM_15606.jpg&amp;raw" srcset="https://www.marijuanamommy.com/wp-content/uploads/2018/03/jessie-MJ-MOM_15606.jpg 5363w, https://www.marijuanamommy.com/wp-content/uploads/2018/03/jessie-MJ-MOM_15606-300x200.jpg 300w, https://www.marijuanamommy.com/wp-content/uploads/2018/03/jessie-MJ-MOM_15606-768x512.jpg 768w, https://www.ma </span><h2 data-dcnode-id="4431"><span data-dcnode-id="4432" id="Will_I_Feel_High_All_The_Time"><span data-dcnode-id="4433" instrument_node="">Will I Feel High All The Time?</span></span></h2><span data-dcnode-id="4430" instrument_node="">
</span><p data-dcnode-id="4425"><span data-dcnode-id="4429" instrument_node="">Many patients are </span><a data-dcnode-id="4427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marijuanamommy.com/why-afraid-of-cannabis/"><span data-dcnode-id="4428" instrument_node="">afraid to try cannabis</span></a><span data-dcnode-id="4426" instrument_node=""> because they worry about feeling high all the time.</span></p><span data-dcnode-id="4424" instrument_node="">
</span><p data-dcnode-id="4422"><span data-dcnode-id="4423" instrument_node="">In the beginning, new patients who have never tried cannabis before may feel significantly altered. This wears off because tolerance to THC builds quickly.</span></p><span data-dcnode-id="4421" instrument_node="">
</span><p data-dcnode-id="4419"><span data-dcnode-id="4420" instrument_node="">Many cannabis users can find a product, dosage, and a method that helps ease their pain without causing significant side effects. At the same time, patients should keep in mind that this is a medication and all medications can cause side effects.</span></p><span data-dcnode-id="4418" instrument_node="">
</span><p data-dcnode-id="4416"><span data-dcnode-id="4417" instrument_node="">Have you ever gotten a prescription medication with a warning that said,”don’t operate machinery until you are familiar with this medication”? The same should be said of cannabis. You never know how significantly a product will affect you until you try it.</span></p><div class="adace-slot-wrapper adace-middle-content adace-align-center adace-slot-wrapper-main" data-dcnode-id="4400" style="text-align:center;"><span data-dcnode-id="4415" instrument_node="">

</span><p data-dcnode-id="4384"><span data-dcnode-id="4385" instrument_node="">It’s important to remember, oral consumption is usually must stronger than vaping or smoking. Even for experienced users.</span></p><span data-dcnode-id="4383" instrument_node="">

</span><p data-dcnode-id="4344"><span data-dcnode-id="4345" instrument_node="">Whichever products you choose, start with very small doses and increase your dosage slowly.</span></p><span data-dcnode-id="4343" instrument_node="">
</span><p data-dcnode-id="4341"><span data-dcnode-id="4342" instrument_node="">If you’re vaping, take one inhalation and wait 20 minutes. If your pain isn’t addressed and you don’t feel too foggy, take another. (Again, do not “just go smoke a joint” that’s usually waaaay too much at first!!)</span></p><span data-dcnode-id="4340" instrument_node="">
</span><p data-dcnode-id="4335"><span data-dcnode-id="4339" instrument_node="">If you’re consuming orally, it’s often recommended that you eat a very small dose containing around 2.5 mg of THC. Keep in mind, </span><strong data-dcnode-id="4337"><span data-dcnode-id="4338" instrument_node="">eating is much more potent than smoking or vaping</span></strong><span data-dcnode-id="4336" instrument_node="">.</span></p><span data-dcnode-id="4334" instrument_node="">
</span><p data-dcnode-id="4332"><span data-dcnode-id="4333" instrument_node="">There are no hard rules when starting medical cannabis, except to start low and go slow. Medical marijuana as a pain treatment is not about getting high, it’s about eliminating pain, so pay attention to your symptoms and consume responsibly.</span></p><span data-dcnode-id="4331" instrument_node="">
</span><p data-dcnode-id="4329"><span data-dcnode-id="4330" instrument_node="">Don’t give up after one try. If your first attempt with medical marijuana doesn’t help, consider trying a different product or another method of consumption.</span></p><span data-dcnode-id="4328" instrument_node="">
</span><p data-dcnode-id="4326"><img alt="Can cannabis help pain?" class="lazyload aligncenter size-full wp-image-23531" data-dcnode-id="4327" data-expand="600" data-pin-description="Can cannabis help pain?" data-sizes="(max-width: 3021px) 100vw, 3021px" data-src="https://www.marijuanamommy.com/wp-content/uploads/2018/01/Snow-Weed.jpg" data-srcset="https://www.marijuanamommy.com/wp-content/uploads/2018/01/Snow-Weed.jpg 3021w, https://www.marijuanamommy.com/wp-content/uploads/2018/01/Snow-Weed-250x250.jpg 250w, https://www.marijuanamommy.com/wp-content/uploads/2018/01/Snow-Weed-300x300.jpg 300w, https://www.marijuanamommy.com/wp-content/uploads/2018/01/Snow-Weed-768x768.jpg 768w, https://www.marijuanamommy.com/wp-content/uploads/2018/01/Snow-Weed-1024x1024.jpg 1024w, https://www.marijuanamommy.com/wp-content/uploads/2018/01/Snow-Weed-192x192.jpg 192w, https://www.marijuanamommy.com/wp-content/uploads/2018/01/Snow-Weed-384x384.jpg 384w, https://www.marijuanamommy.com/wp-content/uploads/2018/01/Snow-Weed-110x110.jpg 110w, https://www.marijuanamommy.com/wp-content/uploads/2018/01/Snow-Weed-220x220.jpg 220w, https://www.marijuanamommy.com/wp-content/uploads/2018/01/Snow-Weed-364x364.jpg 364w, https://www.marijuanamommy.com/wp-content/uploads/2018/01/Snow-Weed-758x758.jpg 758w, https://www.marijuanamommy.com/wp-content/uploads/2018/01/Snow-Weed-608x608.jpg 608w, https://www.marijuanamommy.com/wp-content/uploads/2018/01/Snow-Weed-1152x1152.jpg 1152w, https://www.marijuanamommy.com/wp-content/uploads/2018/01/Snow-Weed-311x311.jpg 311w, https://www.marijuanamommy.com/wp-content/uploads/2018/01/Snow-Weed-313x313.jpg 313w, https://www.marijuanamommy.com/wp-content/uploads/2018/01/Snow-Weed-48x48.jpg 48w, https://www.marijuanamommy.com/wp-content/uploads/2018/01/Snow-Weed-96x96.jpg 96w" height="3021" loading="lazy" src="data:image/svg+xml;charset=utf-8,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%203021%203021'%2F%3E" width="3021"></p><span data-dcnode-id="4325" instrument_node="">
</span><h2 data-dcnode-id="4322"><span data-dcnode-id="4323" id="Stay_Ahead_of_the_Pain"><span data-dcnode-id="4324" instrument_node="">Stay Ahead of the Pain</span></span></h2><span data-dcnode-id="4321" instrument_node="">
</span><p data-dcnode-id="4319"><span data-dcnode-id="4320" instrument_node="">When treating chronic pain, it’s often wise to get ahead of the pain. Pain can behave like a snowball tumbling down a mountain. Stop it immediately or it can quickly grow unmanageable.</span></p><span data-dcnode-id="4318" instrument_node="">
</span><p data-dcnode-id="4316"><span data-dcnode-id="4317" instrument_node="">When treating pain with pharmaceuticals, healthcare providers usually prescribe a baseline pain medication to manage the constant pain. They also prescribe a stronger medication for “breakthrough pain”. I mimic this with cannabis.</span></p><span data-dcnode-id="4315" instrument_node="">
</span><p data-dcnode-id="4313"><span data-dcnode-id="4314" instrument_node="">I microdose, or take small doses of cannabis frequently throughout the day. I either consume approx 2.5-7 mgs of full-spectrum THC oil at regular intervals, or I vape every few hours. When my pain levels are high, I reach for higher doses and higher-THC chemovars.</span></p><span data-dcnode-id="4312" instrument_node="">
</span><p data-dcnode-id="4307"><span data-dcnode-id="4311" instrument_node="">In addition to medical marijuana, I also take 25-100 mgs of full-spectrum CBD hemp oil every day. I encourage my loved ones with health issues to take at least 25 mgs a day of full-spectrum CBD. Pleaes be careful when choosing a CBD supplement, there’re tons of low-quality products on the market. </span><a data-dcnode-id="4309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nursegrown.com/%3Fref%3Dpugyvom0bs3" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="4310" instrument_node="">NurseGrown</span></a><span data-dcnode-id="4308" instrument_node=""> is the CBD brand that I use.</span></p><span data-dcnode-id="4306" instrument_node="">
</span><p data-dcnode-id="4304"><span data-dcnode-id="4305" instrument_node="">Addressing pain can be tricky, even with traditional pharmaceuticals. It’s best to stay ahead of chronic pain.</span></p><span data-dcnode-id="4303" instrument_node="">
</span><p data-dcnode-id="4298" style="text-align: center;"><span data-dcnode-id="4302" instrument_node="">&nbsp;50+&nbsp;</span><a data-dcnode-id="4300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marijuanamommy.com/50-cannabis-gifts-stoner/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4301" instrument_node="">Gifts for Stoners</span></a><span data-dcnode-id="4299" instrument_node=""> you can buy for under $20 each.</span></p><span data-dcnode-id="4297" instrument_node="">

lumn-2" data-dcnode-id="4194"><span data-dcnode-id="4195" instrument_node="">More intense high – For some this may be a benefit</span></td></tr></tbody></table></div><span data-dcnode-id="4187" instrument_node="">
</span><h2 data-dcnode-id="4184"><span data-dcnode-id="4185" id="The_Uncomfortable_Reality_of_Cannabis"><span data-dcnode-id="4186" instrument_node="">The Uncomfortable Reality of Cannabis</span></span></h2><span data-dcnode-id="4183" instrument_node="">
</span><p data-dcnode-id="4181"><span data-dcnode-id="4182" instrument_node="">When my son’s 3rd-grade class learned about drugs, they learned from a very outdated health book.&nbsp; As the teacher reviewed marijuana’s status as an illegal and dangerous drug, my son interjected, “Hey – my mom uses marijuana!&nbsp; Marijuana is ALSO a medicine.”</span></p><span data-dcnode-id="4180" instrument_node="">
</span><p data-dcnode-id="4178"><span data-dcnode-id="4179" instrument_node="">I’m proud.&nbsp; He’s a quiet boy who shrinks into the background.&nbsp; It’s not easy for him to speak up.&nbsp; But he bravely helped fight a stigma by teaching his entire class.</span></p><span data-dcnode-id="4177" instrument_node="">
</span><p data-dcnode-id="4175"><span data-dcnode-id="4176" instrument_node="">I contacted his teacher to tell her I was proud.&nbsp; And (ok – let’s be honest) to make sure she knew that I’m a legal patient. She sent me a lovely response promising to reiterate the medical applications during the next health lesson.</span></p><span data-dcnode-id="4174" instrument_node="">
</span><p data-dcnode-id="4172"><span data-dcnode-id="4173" instrument_node="">Marijuana IS a medicine. The negative stigma nearly prevented me from trying medical marijuana. That would have been tragic because my results are fantastic.&nbsp; It’s not an easy medication to get or to figure out, but it’s changing the lives of patients around the world.</span></p><span data-dcnode-id="4171" instrument_node="">
</span><p data-dcnode-id="4167" style="text-align: center;"><span data-dcnode-id="4170" instrument_node="">Step-by-step guide: &nbsp;</span><a data-dcnode-id="4168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marijuanamommy.com/2/post/2016/08/guide-get-medical-marijuana-nj.html" rel="noopener noreferrer" target="_blank" title="Step-by-Step Guide to Getting Medical Marijuana in NJ"><span data-dcnode-id="4169" instrument_node="">How to Get a Medical Marijuana Card in NJ</span></a></p><span data-dcnode-id="4166" instrument_node="">
</span><h2 data-dcnode-id="4163"><span data-dcnode-id="4164" id="Conclusion"><span data-dcnode-id="4165" instrument_node="">Conclusion</span></span></h2><span data-dcnode-id="4162" instrument_node="">
</span><p data-dcnode-id="4160"><span data-dcnode-id="4161" instrument_node="">Medical marijuana doesn’t come with an instruction pamphlet that says that take two puffs every three hours. It’s very individualized.</span></p><span data-dcnode-id="4159" instrument_node="">
</span><p data-dcnode-id="4157"><span data-dcnode-id="4158" instrument_node="">Start low and go slow. There are a variety of methods of consumption and each one makes you feel little differently. Be patient and keep trying!</span></p><span data-dcnode-id="4156" instrument_node="">
</span><p data-dcnode-id="4154"><span data-dcnode-id="4155" instrument_node="">My goal was to eliminate as many daily pharmaceuticals as possible, starting with opioids and valium. I’ve had incredible success. I haven’t needed an opiate or valium since I started MMJ in November 2015. I hope you have as much success as I have.</span></p><span data-dcnode-id="4153" instrument_node="">
