ps%3A//assets-global.website-files.com/61d782c886371c541f58c332/61d782c886371c6a4c58c745_author-icon.png&amp;raw"><div bind="3beb1d6e-ef29-fb81-41cd-0bcf6ebd4831" class="text-block-18" data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Danyal Swan</span></div></div><div bind="f5d1c93b-e898-0946-9eac-8315886de929" class="blog-paragraph w-richtext" data-dcnode-id="791"><p data-dcnode-id="1111"><span data-dcnode-id="1116" instrument_node="">2018 was a promising year in the opioid epidemic. The National Institute on Drug Abuse noted a decrease in opioid overdose deaths – seemingly a win, with all hoping it to be the start of a downtrend. But then, COVID-19 struck. </span><br data-dcnode-id="1115"><span data-dcnode-id="1114" instrument_node=""> </span><br data-dcnode-id="1113"><span data-dcnode-id="1112" instrument_node="">From May of 2019 to May 2020, over 81,000 overdose deaths were recorded, according to the Centers for Disease Control and Prevention. While not all of these fatalities were due to opioids, the CDC notes a 38% increase in opioid overdoses year over year. Despite these statistics, opioids like hydrocodone, oxycontin, fentanyl, etc. remain the “go-to” for still remain the “go-to” for many doctors treating patients with chronic pain.</span></p><p data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">Long-term use of NSAIDs is proven to cause kidney disease, increased risk of gastrointestinal ulcers/bleeding, and even heart attack. Long-term use of acetaminophen also carries its own set of risks: gastrointestinal issues and liver disease. Overdoses, too, are common with these analgesics, and are one of the top reasons for calls to Poison Control, according to nonprofit National Capital Poison Center.</span></p><p data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">If you experience pain in any form, you know first-hand how debilitating it can be, and how the dulling or alleviation of pain becomes your top goal. It sometimes seems simpler to take an opioid or an OTC medication to relieve the pain, if only to get on with daily life. </span></p><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Unlike its competition, cannabis has no known detrimental internal effects from its use, nor does it show any signs for legitimate medical concern of chemical-based addiction/dependency (psychological addiction being the outlier). While it might seem like one needs a degree in biology or chemistry to understand the complexities of cannabis, that is not so; all one needs to make an educated, well-rounded decision for their own pain is a few simple “breakdowns” of the substance and its various applications.</span></p><h2 data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Breaking The Stigma Around Marijuana</span></h2><figure class="w-richtext-align-fullwidth w-richtext-figure-type-image" data-dcnode-id="1098" style="max-width:1200pxpx"><div data-dcnode-id="1101"><img alt="Breaking the Stigma Around Marijuana" data-dcnode-id="1102" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/61d782c886371c39d358c337/61d782c886371ce7df58ce4c_1200-MUV-FEB%2520%285%2520of%25206%29-color%2520correct.jpg&amp;raw"></div><figcaption data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">The stigma around cannabis is slowly breaking, opening cannabis as an option for those living with chronic pain.</span></figcaption></figure><p data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">One of the first steps to being open to the benefits of cannabis is to destigmatize its use. For years, it has been painted in the media as a kind of craze or dangerous fad that created addicts, degenerates, and criminals of its users. Even popular teen movies of the 2000s had characters who smoked marijuana portrayed as stupid, lazy, dirty, or any number of stereotypical behaviors attributed to those who use marijuana. Some who grew up with this mindset find it difficult to break from it. This stigma or demonization of the cannabis plant is largely why many opt for more “socially acceptable” over the counter or doctor-prescribed opioid pills, patches, and injections.</span></p><p data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">Thanks to the recent expansion of medical cannabis markets, more and more research is confirming the therapeutic potential of the plant. In Florida, marijuana is only legal for consumption with a medical marijuana (MMJ) card from a certified physician. To be eligible, one must meet one of the below qualifying conditions: </span></p><ul data-dcnode-id="1067" role="list"><li data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">ALS</span></li><li data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Cancer</span></li><li data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Chronic nonmalignant pain caused by a qualifying medical condition or that originates from a qualifying medical condition and persists beyond the usual course of that qualifying medical condition.</span></li><li data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Crohn’s disease</span></li><li data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Epilepsy</span></li><li data-dcnode-id="1081"><a data-dcnode-id="1082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.muvfl.com/post/cannabinoids-and-glaucoma-cannabis-and-cbd-for-glaucoma" target="_blank"><span data-dcnode-id="1083" instrument_node="">Glaucoma</span></a></li><li data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">HIV / AIDS</span></li><li data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Medical conditions of the same kind or class as or comparable to the others listed.</span></li><li data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">MS (Multiple Sclerosis)</span></li><li data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">Parkinson’s disease</span></li><li data-dcnode-id="1070"><a data-dcnode-id="1071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.muvfl.com/post/cannabis-mdma-ptsd" target="_blank"><span data-dcnode-id="1072" instrument_node="">PTSD</span></a></li><li data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">Terminal condition diagnosed by a physician other than the qualified physician issuing the physician certification.</span></li></ul><p data-dcnode-id="1062"><span data-dcnode-id="1066" instrument_node="">If you believe you meet one of the above conditions and are interested in medical cannabis, you can </span><a data-dcnode-id="1064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.muvfl.com/physician-finder" target="_blank"><span data-dcnode-id="1065" instrument_node="">find a physician near you</span></a><span data-dcnode-id="1063" instrument_node=""> to schedule an appointment. Recommending physicians are the only physicians approved to recommend cannabis under Florida’s laws.</span></p><h2 data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">The Science Behind Cannabis</span></h2><p data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">To understand the science behind cannabis and how it works with the body, it helps to have a brief history of some important scientific discoveries. Did you know your body is made to interact with cannabis? And that THC and CBD were discovered before this internal system and the endogenous compounds that interact with it?</span></p><p data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">CBD was first isolated in the early 1900s, followed by THC in the ‘60s. Both were structurally defined and eventually led to the identification of receptors with which they interact. As the compounds were dubbed cannabinoids (canna- as they came from the cannabis plant), the receptors they interact with were named cannabinoid receptor 1 and 2, or CB1 and CB2 for short. These receptors are found throughout the human body, with CB1 receptors prevalent in the central nervous system and CB2 the peripheral, comprising what is known as the endocannabinoid system (ECS). Interestingly, the human body, too, produces compounds that interact with the ECS named endocannabinoids (endo- as they are cannabinoids produced within the body). &nbsp; </span></p><p data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">Today, there are 568 distinctive molecules inside cannabis of any species, with 60+ being specifically cannabinoids. Significantly more research is needed to explore the potential of these cannabinoids, but there is enough to indicate some positive effects from THC and CBD. </span></p><h2 data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Best Marijuana For Pain Relief: CBD Or THC Strains?</span></h2><figure class="w-richtext-align-fullwidth w-richtext-figure-type-image" data-dcnode-id="1047" style="max-width:1200pxpx"><div data-dcnode-id="1050"><img alt="Best Marijuana for Pain Relief" data-dcnode-id="1051" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/61d782c886371c39d358c337/61d782c886371c466a58cd8a_1200-ACDC%2520forest%2520copy.jpg&amp;raw"></div><figcaption data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">There are a few factors to consider when determining the best strain for pain, like the person using and their experience, terpene profile and the consumption method.</span></figcaption></figure><p data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">THC is associated heavily with the euphoric or “high” of marijuana and what is usually (and erroneously) depicted in media as the sole function and purpose of marijuana use. THC has specific pain-relieving properties and is also key in helping to alleviate nausea and promote appetite, which is especially helpful for those undergoing chemotherapy for cancer. The compound interacts and locks with the CB1 receptors found throughout the body, providing a range of benefits.</span></p><p data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">CBD, on the other hand, is enjoying much more social acceptance. It is primarily used in soft-chews, tinctures, among other methods to help with inflammation, anxiety, insomnia, and a host of other ailments. CBD interacts with the CB2 receptors to provide these benefits, and potentially offset the cerebral effects of THC.</span></p><p data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">But, what are the best marijuana strains for pain?</span></p><p data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">To really understand the effects of cannabis on pain, you must look at three things: </span></p><h3 data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">The Person Using Cannabis</span></h3><p data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">The person using the product is the first step in determining efficacy. When one uses marijuana, they might experience something altogether different than a person next to them using the exact same ratio/product. The person's experience with cannabis is also worth considering - someone experienced may require higher doses, as will someone who has used opioids to manage pain.</span></p><p data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">In addition, some may be wary of the psychoactive effects of cannabis. For these patients, CBD or 1:1 ratios of THC/CBD are an ideal starting place. CBD does not produce the “high” feeling that goes hand-in-hand with cannabis and can even counteract some of it when taken in conjunction, in a 1:1 tincture or vape, for example.</span></p><h3 data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">The Terpenes</span></h3><p data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">When in a medical marijuana dispensary, you will see the creative and clever names associated with the different “strains” of marijuana, but what you should focus on is the terpene content. Research is beginning to confirm that it is these precious essential oils produced in the cannabis plant that drive the strain-specific effects described by the terms “sativa” and “indica.” Terpenes are found in many other plants, too - linalool is abundant in lavender, and some cannabis strains. Some of the most abundant terpenes found in cannabis and their potential therapeutic benefits are: </span></p><ul data-dcnode-id="1016" role="list"><li data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Caryophyllene - analgesic, anti-inflammatory, antispasmodic, sedative</span></li><li data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Humulene - analgesic, anti-bacterial, anti-inflammatory</span></li><li data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Limonene - analgesic, anti-epileptic, anxiolytic</span></li><li data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Linalool - analgesic, anti-epileptic, anxiolytic</span></li><li data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Myrcene - analgesic, anti-bacterial, anti-inflammatory, sedative</span></li><li data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">Pinene - analgesic, anti-epileptic, anxiolytic</span></li></ul><p data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Like with cannabinoids, more research is needed to unlock the full potential of these compounds, but the evidence is telling enough to use terpenes as a guide in your strain selection. </span></p><h3 data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">The Consumption Method</span></h3><p data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Some cannabis consumption methods have longer-lasting effects when compared to others. The duration of effects is key for patients living with pain, as longer-lasting effects require less overall medicating.</span></p><h2 data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">What Strainprint Tells Us About Cannabis And Pain</span></h2><p data-dcnode-id="1004"><a data-dcnode-id="1006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.muvfl.com/post/muv-and-strainprint-revolutionizing-medical-cannabis" target="_blank"><span data-dcnode-id="1007" instrument_node="">Strainprint</span></a><span data-dcnode-id="1005" instrument_node=""> is one of the greatest resources in determining the best products in alleviating symptoms. The mobile app measures cannabis strains and products as a percentage efficacy for specific symptoms, calculated by indicating symptom level on a scale of 1-10 before medicating, and after medicating. </span></p><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">The app is incredibly granular - you don’t track for a blanket “pain” symptom - it’s lower back pain or upper, joint or muscle. And, Strainprint relays the average efficacy of all cannabis products recorded. Out of these symptoms, this is what Florida patients have reported so far*:</span></p><p data-dcnode-id="997"><strong data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Joint Pain (Avg. Efficacy 49%)</span></strong><br data-dcnode-id="999"><span data-dcnode-id="998" instrument_node="">1:1 Patch - 53% efficacy</span></p><p data-dcnode-id="988"><strong data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">Muscle Pain (Avg. 46%)</span></strong><br data-dcnode-id="994"><span data-dcnode-id="993" instrument_node="">Sour Jack Flower - 61% efficacy</span><br data-dcnode-id="992"><span data-dcnode-id="991" instrument_node="">Velvet Glove Flower - 58% efficacy</span><br data-dcnode-id="990"><span data-dcnode-id="989" instrument_node="">Cherry Punch - 51% efficacy </span></p><p data-dcnode-id="981"><strong data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">General Discomfort (Avg. 49%)</span></strong><br data-dcnode-id="985"><span data-dcnode-id="984" instrument_node="">Cherry Punch - 56% efficacy</span><br data-dcnode-id="983"><span data-dcnode-id="982" instrument_node="">Slurricane - 53% efficacy</span></p><p data-dcnode-id="972"><strong data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Lower Back Pain (Avg. 45%)</span></strong><br data-dcnode-id="978"><span data-dcnode-id="977" instrument_node="">Guru - 55% efficacy</span><br data-dcnode-id="976"><span data-dcnode-id="975" instrument_node="">Modified Grapes - 51% efficacy</span><br data-dcnode-id="974"><span data-dcnode-id="973" instrument_node="">Triangle Kush - 51% efficacy</span></p><p data-dcnode-id="965"><strong data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Upper Back Pain (Avg. 49%)</span></strong><br data-dcnode-id="969"><span data-dcnode-id="968" instrument_node="">Püre Canna-Tsu - 69% efficacy</span><br data-dcnode-id="967"><span data-dcnode-id="966" instrument_node="">Strawberry Cough - 56% efficacy</span></p><p data-dcnode-id="962"><em data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">*Self-reported data tracked by patients via Strainprint</span></em></p><p data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">If you’re wondering why your favorite strain for a specific pain symptom isn’t on the list, keep in mind that the 5,000+ patients tracking are all using a different product for different symptoms. It takes a while to gather significant data! Learn how you can help further this research (and earn discounts, too) through our Patient Pioneer Program here.</span></p><h2 data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Methods Of Cannabis Delivery</span></h2><figure class="w-richtext-align-fullwidth w-richtext-figure-type-image" data-dcnode-id="953" style="max-width:1200pxpx"><div data-dcnode-id="956"><img alt="Methods of Cannabis Delivery" data-dcnode-id="957" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/61d782c886371c39d358c337/61d782c886371ced0058ce50_Group-Shot-Right%2520%281%29.png&amp;raw"></div><figcaption data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">MÜV&nbsp;produces an ample variety of cannabis applications in every category.</span></figcaption></figure><p data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">When entering a medical marijuana dispensary, finding the right ratio of CBD/THC and terpenes seems daunting enough, but the added confusion of products might send a person into information overload. Let us take some of the weight off and break it down even further:</span></p><h3 data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Inhaled Cannabis</span></h3><p data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Inhaling cannabis can be achieved in multiple ways, including smoking flower, vaping or even inhalers. </span></p><ul data-dcnode-id="944" role="list"><li data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">Smoking flower is perceived as the “traditional” way of consuming cannabis, whether it’s by sparking a joint or using a wooden or glass pipe to avoid added materials. Water pipes, or bongs, too, are a popular option for smoking flower due to their perceived cost-effective delivery.</span></li></ul><p data-dcnode-id="939"><em data-dcnode-id="940"><span data-dcnode-id="943" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; &nbsp;Typical Onset Time: 5-10 minutes</span><br data-dcnode-id="942"><span data-dcnode-id="941" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Duration of Effects: ~2-4 hours</span></em></p><ul data-dcnode-id="936" role="list"><li data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Others may prefer vaping flower, or the method of heating whole flower until the desired cannabinoids and terpenes vaporize to a water vapor to be inhaled. Marijuana vape cartridges and concentrates, too, are heated to the point of vaporization of the desired compounds.</span></li></ul><p data-dcnode-id="930"><span data-dcnode-id="935" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span><em data-dcnode-id="931"><span data-dcnode-id="934" instrument_node="">&nbsp;&nbsp; &nbsp;&nbsp;Typical Onset Time: 5-10 minutes</span><br data-dcnode-id="933"><span data-dcnode-id="932" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; &nbsp;&nbsp;Duration of Effects: ~2-4 hours</span></em></p><ul data-dcnode-id="927" role="list"><li data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">Smoking and vaping aren’t ideal consumption methods (nor are they recommended) for those with chronic obstructive pulmonary disease (COPD), emphysema, lung cancer or severe asthma or allergies due to the fact that they may exacerbate or trigger symptoms. Instead, cannabis inhalers are recommended, as they are easier on those with these conditions, with the added bonus of THC’s potential as a bronchodilator (though it is never recommended to replace your inhaler with a cannabis inhaler!).</span></li></ul><p data-dcnode-id="921"><span data-dcnode-id="926" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span><em data-dcnode-id="922"><span data-dcnode-id="925" instrument_node="">&nbsp;Typical Onset Time: 3-5 minutes</span><br data-dcnode-id="924"><span data-dcnode-id="923" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Duration of Effects: ~2-4 hours</span></em></p><p data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">It's worth noting that each of these delivery methods can be "stacked" with the others mentioned below. Because smoking flower, vaporizing cannabis in various forms or using an inhaler provides immediate onset of effects, these can be used to manage breakthrough pain.</span></p><h3 data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Edibles</span></h3><p data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Edibles are exactly as they seem – foods you eat, infused with cannabis. Many patients choose edibles or other orally consumed methods to manage pain due to the longer-lasting effects when compared to inhaled forms of cannabis.</span></p><p data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">There are ways of infusing regular culinary ingredients (such as butter or syrup) with cannabis for use in home cooking, but it’s much less time-consuming and significantly more convenient to buy them at a medical dispensary. Common edible/consumable products are baked items (cookies, cake, brownies), chocolates, lozenges, lollipops or suckers, drinks, soft-chews, and powders to be mixed in with shakes and drinks. Always remember to start low and go slow with this method (and keep CBD tincture on hand), as the first-pass effect makes the 10mg dose you take feel more like 50mg!</span></p><p data-dcnode-id="908"><em data-dcnode-id="909"><span data-dcnode-id="912" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Typical Onset Time: 30-60 minutes</span><br data-dcnode-id="911"><span data-dcnode-id="910" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Duration of Effects: ~4-8 hours</span></em></p><h3 data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Tinctures and Other Oral Methods</span></h3><p data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">Tinctures have been used in medicine for thousands of years, and are traditionally made by dissolving the medicinal compound in grain alcohol, or ethanol. Typically, the tincture oil is placed sublingually (under your tongue) to access the arterial vein directly for maximum absorption. Tinctures can also be found in oral spray formats.</span></p><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">There are other oral delivery methods, as well:</span></p><ul data-dcnode-id="899" role="list"><li data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Encapsulated Tinctures - Encaps™ patented technology encases the desired cannabinoids in a water-soluble shell. This allows for tinctures with onset times of just 15 minutes, with the added bonus of the capability of adding it to your favorite beverage for onset times comparable to edibles.</span></li></ul><p data-dcnode-id="893"><span data-dcnode-id="898" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span><em data-dcnode-id="894"><span data-dcnode-id="897" instrument_node="">&nbsp; &nbsp;Typical Onset Time: 10-15 minutes</span><br data-dcnode-id="896"><span data-dcnode-id="895" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Duration of Effects: ~4-8 hours</span></em></p><ul data-dcnode-id="890" role="list"><li data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Encapsulated Cannabis Pills – There is a distinct difference between Encaps Cannabis Capsules vs. edibles. Encaps are isolated cannabinoids in pill form with a 1:1 THC/CBD ratio or other formulas which have varying cannabinoid mg by batch. Encaps use patented technology to render the capsule water soluble for fast-acting effects.</span></li></ul><p data-dcnode-id="884"><span data-dcnode-id="889" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span><em data-dcnode-id="885"><span data-dcnode-id="888" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Typical Onset Time: 15-30 minutes</span><br data-dcnode-id="887"><span data-dcnode-id="886" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Duration of Effects: ~4-6 hours</span></em></p><ul data-dcnode-id="881" role="list"><li data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">RSO Cannabis Syringe – Don’t worry, it’s not a shot! No cannabis method is injectable; the syringe is just used for accurate dosing. It is consumable on its own or with food and can provide much-needed sedative effects for those suffering from insomnia. Topically, it has shown to heal skin abrasions, lesions and may hold anti-cancerous qualities. It’s important to note that RSO contains all components of the cannabis plant and should never be inhaled.</span></li></ul><p data-dcnode-id="875"><span data-dcnode-id="880" instrument_node=""> </span><em data-dcnode-id="876"><span data-dcnode-id="879" instrument_node="">&nbsp;&nbsp;Typical Onset Time (Oral): 30-60 minutes</span><br data-dcnode-id="878"><span data-dcnode-id="877" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Duration of Effects (Oral): ~4-8 hours</span></em></p><p data-dcnode-id="869"><span data-dcnode-id="874" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span><em data-dcnode-id="870"><span data-dcnode-id="873" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Typical Onset Time (Topical): 15-20 minutes</span><br data-dcnode-id="872"><span data-dcnode-id="871" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Duration of Effects (Topical): ~6-10 hours</span></em></p><ul data-dcnode-id="866" role="list"><li data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Distillate Oil – Those who want to make their own edible products at home can use distillate oil, an isolated and concentrated form of THC, for easy incorporation into fat-based ingredients, like butter or oil. It can also be administered orally for edible-like effects, or inhaled with a vapor device for more immediate onset times.</span></li></ul><p data-dcnode-id="860"><span data-dcnode-id="865" instrument_node=""> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span><em data-dcnode-id="861"><span data-dcnode-id="864" instrument_node="">Typical Onset Time (Inhaled): 5-10 minutes</span><br data-dcnode-id="863"><span data-dcnode-id="862" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Duration of Effects (Inhaled): ~3-4 hours</span></em></p><p data-dcnode-id="855"><em data-dcnode-id="856"><span data-dcnode-id="859" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Typical Onset Time (Oral): 30-60 minutes</span><br data-dcnode-id="858"><span data-dcnode-id="857" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Duration of Effects (Oral): ~4-8 hours</span></em></p><ul data-dcnode-id="852" role="list"><li data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">RSO Tincture - RSO Syringes are an incredibly potent form of cannabis. RSO Tinctures, on the other hand, are the same potent syringe incorporated into MCT oil. This allows for more precise dosing, at lower milligrams-per-dose than the typical 25mg dose of RSO Syringe. Instead, the tincture allows for doses as low as you’d like, and up to 20mg per full dropper.</span></li></ul><p data-dcnode-id="846"><span data-dcnode-id="851" instrument_node=""> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span><em data-dcnode-id="847"><span data-dcnode-id="850" instrument_node="">&nbsp;&nbsp;Typical Onset Time: 20-60 minutes</span><br data-dcnode-id="849"><span data-dcnode-id="848" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Duration of Effects: ~4-8 hours</span></em></p><p data-dcnode-id="841"><span data-dcnode-id="845" instrument_node="">You might be wondering, </span><em data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">what tincture is best for pain?</span></em><span data-dcnode-id="842" instrument_node=""> Much like any product involving cannabis, this is based on personal preference. Tinctures, overall, are a great option for pain as they provide longer lasting effects than inhalants - typically 6 hours compared to the 4 expected from smoking or vaping. Some patients may prefer Encapsulated Cannabis Tinctures and their isolated THC/CBD due to their ability to combine with water, while others may seek RSO Tinctures as they are strain-specific and are a whole plant extract.</span></p><h3 data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">Topicals</span></h3><p data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Topicals are an extremely discreet form of cannabis, with no cerebral effects. Because THC and CBD are fat-soluble, they interact with the endocannabinoid receptors in the upper layers of the skin, and are unable to penetrate the watery bloodstream. This results in targeted, localized pain relief. Sports Gel is a popular option for patients as it is infused with arnica and peppermint for sensations similar to Icy Hot, in addition to 100mg THC and 100mg CBD. Though sports is in the name, it is by no means limited to sports-related aches and pains! Pain Relief Cream is formulated to give a hydrating, lotion-like feel, with 200mg THC and 200mg CBD. </span></p><p data-dcnode-id="832"><em data-dcnode-id="833"><span data-dcnode-id="836" instrument_node=""> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Typical Onset Time (Sports Gel): 5-10 minutes</span><br data-dcnode-id="835"><span data-dcnode-id="834" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Duration of Effects (Sports Gel): ~2-4 hours</span></em></p><p data-dcnode-id="827"><em data-dcnode-id="828"><span data-dcnode-id="831" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Typical Onset Time (Pain Relief Cream): 5-10 minutes</span><br data-dcnode-id="830"><span data-dcnode-id="829" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Duration of Effects (Pain Relief Cream): ~4-6 hours</span></em></p><h3 data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Transdermals</span></h3><p data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Transdermal application of medicine isn’t new, but it is for the cannabis space. Transdermals are topicals that are applied for systemic effects. These medicinals are usually in two formats: gels or patches. </span></p><p data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Transdermals at MÜV, like Cannabis Tincture, utilize patented Encaps encapsulation technology, which encases THC and CBD in a water-soluble shell. This allows the cannabinoids to penetrate the bloodstream when applied topically for systemic (whole body) effects. </span></p><ul data-dcnode-id="818" role="list"><li data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">MÜV Transdermal Patches last a remarkable 72 hours when applied, providing a steady release of just 0.24mg of cannabinoids per hour. Patches are a great starting point for newcomers to cannabis, as they are the only product that provides cannabis with an “off” button - effects dissipate 45 minutes after the removal of the patch. And, for those worried about the psychoactive properties of THC, CBD-only patches are available. </span></li></ul><p data-dcnode-id="812"><span data-dcnode-id="817" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span><em data-dcnode-id="813"><span data-dcnode-id="816" instrument_node="">Typical Onset Time: 10-15 minutes</span><br data-dcnode-id="815"><span data-dcnode-id="814" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Duration of Effects: ~72 hours</span></em></p><ul data-dcnode-id="809" role="list"><li data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Evolve Transdermal Gels can be thought of as a potent macrodose to the Patch’s microdose. The gel provides 8mg of cannabinoids per pump. The higher dose makes Evolve Gel an ideal item for breakthrough pain symptoms. &nbsp;</span></li></ul><p data-dcnode-id="803"><span data-dcnode-id="808" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span><em data-dcnode-id="804"><span data-dcnode-id="807" instrument_node="">&nbsp;Typical Onset Time: 10-15 minutes</span><br data-dcnode-id="806"><span data-dcnode-id="805" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Duration of Effects: ~2-4 hours</span></em></p><h2 data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">The Future Of Cannabis For Pain</span></h2><figure class="w-richtext-align-fullwidth w-richtext-figure-type-image" data-dcnode-id="798" style="max-width:1200pxpx"><div data-dcnode-id="799"><img alt="Cannabis for Pain" data-dcnode-id="800" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/61d782c886371c39d358c337/61d782c886371c37cb58cd7d_Pain_Relief_Cream_2020%2520copy.png&amp;raw"></div></figure><p data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">All of these delivery methods as well as the breakdown of the cannabis components like terpenes can seem like an intimidating prospect. Fortunately, with the advent of innovative (and discreet) methods of using cannabis like vapes and inhalers, cannabis is more approachable than ever. </span></p><p data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">As science continues to make headway into new territories and advocacy for availability grows more mainstream, dependency on opioids and OTC pills will soon become a thing of the past. For long-term, low-risk alleviation of pain, consult with your doctor about your options, as well as a reputable medical marijuana dispensary to find the cannabis product that is right for you and your pain management.</span></p><p data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">‍</span></p></div><div class="about-the-author w-clearfix" data-dcnode-id="784"><img alt="Danyal Swan" bind="83b3394d-b7c6-991a-86f9-9a77ff21f665" class="image-51" data-dcnode-id="790" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/61d782c886371c39d358c337/61d782c886371c590658cd30_dswan-headshot.jpg&amp;raw"><h3 bind="350591bb-99c7-3a79-b190-d9f137c6ce02" class="authorship-h4" data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Danyal Swan</span></h3><div bind="a83843c5-1741-984e-14a3-0a851e7b13c5" class="authorship w-richtext" data-dcnode-id="785"><p data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">Content Manager for MÜV Florida and Contributor for Zen Leaf Dispensaries. A cannabis connoisseur with a passion for explaining the miraculous possibility of the plant, Swan began her journey with cannabis as a recreational user and quickly realized its positive impact on her depression and severe anxiety. She joined the cannabis industry as Receptionist and MedTender and witnessed first-hand the immense potential of the plant for a wide variety of ailments, deepening her passion for alternative medicine. Swan is dedicated to self-education on the plant and sharing its potential with all. She holds a Journalism degree from the University of Iowa.</span></p></div></div><div class="about-the-author-mobile" data-dcnode-id="777"><img alt="Danyal Swan" bind="59631a58-1747-0055-2232-c437af39a0c2" class="author-headshot-mobile" data-dcnode-id="783" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/61d782c886371c39d358c337/61d782c886371c590658cd30_dswan-headshot.jpg&amp;raw"><h4 bind="59631a58-1747-0055-2232-c437af39a0c3" class="authorship-h4-mobile" data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">Danyal Swan</span></h4><div bind="59631a58-1747-0055-2232-c437af39a0c4" class="authorship-mobile w-richtext" data-dcnode-id="778"><p data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Content Manager for MÜV Florida and Contributor for Zen Leaf Dispensaries. A cannabis connoisseur with a passion for explaining the miraculous possibility of the plant, Swan began her journey with cannabis as a recreational user and quickly realized its positive impact on her depression and severe anxiety. She joined the cannabis industry as Receptionist and MedTender and witnessed first-hand the immense potential of the plant for a wide variety of ailments, deepening her passion for alternative medicine. Swan is dedicated to self-education on the plant and sharing its potential with all. She holds a Journalism degree from the University of Iowa.</span></p></div></div><div class="next-prev-post" data-dcnode-id="470"><a class="button-blue sm-button w-button" data-dcnode-id="775" href="#" id="previous_button"><span data-dcnode-id="776" instrument_node="">Previous Post</span></a><div bind="c65654af-5e06-1511-9ad9-a40464634a88" class="collection-list-wrapper-7 w-dyn-list" data-dcnode-id="473" id="post_list"><div bind="c65654af-5e06-1511-9ad9-a40464634a89" class="w-dyn-items" data-dcnode-id="474" role="list"><div bind="c65654af-5e06-1511-9ad9-a40464634a8a" class="w-dyn-item" data-dcnode-id="772" role="listitem"><a bind="2585acdf-185b-7e06-99dd-f2774c0ab922" data-dcnode-id="773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.muvfl.com/post/cannabis-chocolate-recipes"><span data-dcnode-id="774" instrument_node="">Chocolate and Cannabis: An Undeniable Pair</span></a></div><div bind="c65654af-5e06-1511-9ad9-a40464634a8a" class="w-dyn-item" data-dcnode-id="769" role="listitem"><a bind="2585acdf-185b-7e06-99dd-f2774c0ab922" data-dcnode-id="770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.muvfl.com/post/muv-cannabis-app"><span data-dcnode-id="771" instrument_node="">The MÜV Cannabis Rewards App</sp
