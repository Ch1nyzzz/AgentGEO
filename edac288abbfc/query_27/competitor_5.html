</span><article class="post-828 post type-post status-publish format-standard has-post-thumbnail hentry category-cannabis_chronic_pain category-cannabis-remedies category-cbd_cannabinoids_terpenes category-making_cannabis_remedies category-medical_cannabis tag-how-to-make-cannabis-capsules tag-ingesting-cannabis tag-making-cannabis-coconut-oil-capsules tag-marijuana-capsules" data-dcnode-id="764" id="post-828"><span data-dcnode-id="1055" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1024"><span data-dcnode-id="1054" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1052" style="font-size: 36px;"><span data-dcnode-id="1053" instrument_node="">How to Make Cannabis Coconut Oil Capsules</span></h1><span data-dcnode-id="1051" instrument_node="">
</span><br data-dcnode-id="1050"><div class="listmet" data-dcnode-id="1026"><span data-dcnode-id="1049" instrument_node="">Posted in </span><a data-dcnode-id="1047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//canna-base.com/category/cannabis_chronic_pain/" rel="category tag"><span data-dcnode-id="1048" instrument_node="">Cannabis for Chronic Pain</span></a><span data-dcnode-id="1046" instrument_node="">, </span><a data-dcnode-id="1044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//canna-base.com/category/cannabis-remedies/" rel="category tag"><span data-dcnode-id="1045" instrument_node="">Cannabis Remedies</span></a><span data-dcnode-id="1043" instrument_node="">, </span><a data-dcnode-id="1041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//canna-base.com/category/cbd_cannabinoids_terpenes/" rel="category tag"><span data-dcnode-id="1042" instrument_node="">CBD, Cannabinoids &amp; Terpenes</span></a><span data-dcnode-id="1040" instrument_node="">, </span><a data-dcnode-id="1038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//canna-base.com/category/making_cannabis_remedies/" rel="category tag"><span data-dcnode-id="1039" instrument_node="">Making Medicinal Cannabis Remedies</span></a><span data-dcnode-id="1037" instrument_node="">, </span><a data-dcnode-id="1035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//canna-base.com/category/medical_cannabis/" rel="category tag"><span data-dcnode-id="1036" instrument_node="">Medical Cannabis</span></a><span data-dcnode-id="1034" instrument_node=""> </span><span data-dcnode-id="1032" instrument_node=""> on </span><a data-dcnode-id="1029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//canna-base.com/make-cannabis-coconut-capsules/" rel="bookmark" title="7:04 pm"><time class="entry-date" data-dcnode-id="1030" datetime="2017-02-27T19:04:13+00:00"><span data-dcnode-id="1031" instrument_node="">February 27, 2017</span></time></a><span data-dcnode-id="1027" instrument_node="">.</span></div><span data-dcnode-id="1025" instrument_node="">
</span></header><span data-dcnode-id="1022" instrument_node="">
</span><div class="entry-content" data-dcnode-id="771"><span data-dcnode-id="1021" instrument_node="">
</span><p data-dcnode-id="1016"><span data-dcnode-id="1020" instrument_node="">In this recipe we will be using coconut oil as our Cannabis carrier oil. </span><a data-dcnode-id="1018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B01H1S7WMC/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3DB01H1S7WMC%26linkCode%3Das2%26tag%3Dsweet0c4-20%26linkId%3D220a56b465f1aa93fb8c8cf540c81a37"><span data-dcnode-id="1019" instrument_node="">Coconut oil</span></a><span data-dcnode-id="1017" instrument_node=""> is perfect for cannabis infusions because it contains plenty of essential fatty acids, beneficial saturated fats, and a high amount of lauric acid.</span></p><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">These help to increase the bio-availability of the Cannabinoids.</span></p><span data-dcnode-id="1012" instrument_node="">
</span><p data-dcnode-id="1007"><span data-dcnode-id="1011" instrument_node="">To further increase the bio-availability as well as adding to the overall nutritional profile, we are also going to add some </span><a data-dcnode-id="1009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B00J8ET8IO/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3DB00J8ET8IO%26linkCode%3Das2%26tag%3Dsweet0c4-20%26linkId%3Dfefc41d2079abff56ad63832ad7a2cbc"><span data-dcnode-id="1010" instrument_node="">sunflower lecithin</span></a><span data-dcnode-id="1008" instrument_node="">.&nbsp; Soy lecithin can also be used but soy is often a GMO product and excessive amounts can lead to interference with estrogen levels.</span></p><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1002"><a data-dcnode-id="1004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3405895/"><span data-dcnode-id="1005" instrument_node="">Studies</span></a><span data-dcnode-id="1003" instrument_node=""> have shown that Lecithin not only improves absorption but it also has health benefits of its own. It aides memory, lowers levels of bad cholesterol, repairs the liver and more.</span></p><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">So not only are we benefiting from the health benefits of Cannabis but coconut oil and lecithin too.</span></p><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="994"><strong data-dcnode-id="995"><u data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">How to Make Cannabis Coconut Capsules</span></u></strong></p><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Here is a list of supplies that you will need:</span></p><span data-dcnode-id="990" instrument_node="">
</span><ul data-dcnode-id="934"><span data-dcnode-id="989" instrument_node="">
</span><li data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">14 grams of cannabis (preferably buds but trim will work too)</span></li><span data-dcnode-id="986" instrument_node="">
</span><li data-dcnode-id="981"><span data-dcnode-id="985" instrument_node="">1/2 cup </span><a data-dcnode-id="983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B01H1S7WMC/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3DB01H1S7WMC%26linkCode%3Das2%26tag%3Dsweet0c4-20%26linkId%3D220a56b465f1aa93fb8c8cf540c81a37"><span data-dcnode-id="984" instrument_node="">organic coconut oil</span></a><span data-dcnode-id="982" instrument_node=""> (you could use a whole cup if you would like to make it weaker)</span></li><span data-dcnode-id="980" instrument_node="">
</span><li data-dcnode-id="976"><span data-dcnode-id="979" instrument_node="">1/2 tsp </span><a data-dcnode-id="977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B00J8ET8IO/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3DB00J8ET8IO%26linkCode%3Das2%26tag%3Dsweet0c4-20%26linkId%3Dfefc41d2079abff56ad63832ad7a2cbc"><span data-dcnode-id="978" instrument_node="">sunflower lecithin</span></a></li><span data-dcnode-id="975" instrument_node="">
</span><li data-dcnode-id="970"><span data-dcnode-id="974" instrument_node="">Grinder (a </span><a data-dcnode-id="972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B0043073WQ/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3DB0043073WQ%26linkCode%3Das2%26tag%3Dsweet0c4-20%26linkId%3D75030d131be63f77976daaa4a9f6a6e4"><span data-dcnode-id="973" instrument_node="">coffee grinder</span></a><span data-dcnode-id="971" instrument_node=""> is perfect)</span></li><span data-dcnode-id="969" instrument_node="">
</span><li data-dcnode-id="965"><a data-dcnode-id="967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B0000CCY14/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3DB0000CCY14%26linkCode%3Das2%26tag%3Dsweet0c4-20%26linkId%3D6748c513a643a93095c0d257912b3784"><span data-dcnode-id="968" instrument_node="">Slow cooker</span></a><span data-dcnode-id="966" instrument_node=""> (preferably a small one like this)</span></li><span data-dcnode-id="964" instrument_node="">
</span><li data-dcnode-id="961"><a data-dcnode-id="962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B00428B6X6/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3DB00428B6X6%26linkCode%3Das2%26tag%3Dsweet0c4-20%26linkId%3D4f6b78cc4a34496318cbaa5175918b10"><span data-dcnode-id="963" instrument_node="">Gelatin capsules size 00</span></a></li><span data-dcnode-id="960" instrument_node="">
</span><li data-dcnode-id="956"><a data-dcnode-id="958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B01LWT81UO/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3DB01LWT81UO%26linkCode%3Das2%26tag%3Dsweet0c4-20%26linkId%3D50d1ee769a2ac65116bf7c21145d2c02"><span data-dcnode-id="959" instrument_node="">Capsule Filling machine</span></a><span data-dcnode-id="957" instrument_node=""> (optional, but recommended)</span></li><span data-dcnode-id="955" instrument_node="">
</span><li data-dcnode-id="951"><span data-dcnode-id="954" instrument_node="">Syringe or </span><a data-dcnode-id="952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B004RILTDS/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3DB004RILTDS%26linkCode%3Das2%26tag%3Dsweet0c4-20%26linkId%3Df6ef924f88aa7533ba4bf81141aa581b"><span data-dcnode-id="953" instrument_node="">oral irrigator with tapered deep reach tip</span></a></li><span data-dcnode-id="950" instrument_node="">
</span><li data-dcnode-id="947"><a data-dcnode-id="948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B008EHMNSS/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3DB008EHMNSS%26linkCode%3Das2%26tag%3Dsweet0c4-20%26linkId%3D12374e46ab80802e870c6bfb7210af66"><span data-dcnode-id="949" instrument_node="">Small stainless steel bowl</span></a></li><span data-dcnode-id="946" instrument_node="">
</span><li data-dcnode-id="943"><a data-dcnode-id="944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B001KUWGDS/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3DB001KUWGDS%26linkCode%3Das2%26tag%3Dsweet0c4-20%26linkId%3Dc420c0b8cad52f05680fc61ed758977d"><span data-dcnode-id="945" instrument_node="">Baking paper/parchment paper</span></a></li><span data-dcnode-id="942" instrument_node="">
</span><li data-dcnode-id="939"><a data-dcnode-id="940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B001B14ODG/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3DB001B14ODG%26linkCode%3Das2%26tag%3Dsweet0c4-20%26linkId%3D393a841cf219503ce753a7495b5f36e7"><span data-dcnode-id="941" instrument_node="">Cheesecloth</span></a></li><span data-dcnode-id="938" instrument_node="">
</span><li data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Rubber band</span></li><span data-dcnode-id="935" instrument_node="">
</span></ul><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">&nbsp;</span></p><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="926"><strong data-dcnode-id="927"><u data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">Instructions</span></u></strong></p><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="920"><span data-dcnode-id="924" instrument_node="">The process of making our cannabis oil caps consists of three steps: decarboxylation, oil infusion and filling the </span><a data-dcnode-id="922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B00428B6X6/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3DB00428B6X6%26linkCode%3Das2%26tag%3Dsweet0c4-20%26linkId%3D4f6b78cc4a34496318cbaa5175918b10"><span data-dcnode-id="923" instrument_node="">capsules</span></a><span data-dcnode-id="921" instrument_node="">.</span></p><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="915"><strong data-dcnode-id="916"><u data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Decarboxylation</span></u></strong></p><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="909"><span data-dcnode-id="913" instrument_node="">If you need a recap on why decarboxylation is important </span><a data-dcnode-id="911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//canna-base.com/decarboxylation/"><span data-dcnode-id="912" instrument_node="">click here</span></a><span data-dcnode-id="910" instrument_node="">.</span></p><span data-dcnode-id="908" instrument_node="">
</span><ol data-dcnode-id="894"><span data-dcnode-id="907" instrument_node="">
</span><li data-dcnode-id="899"><span data-dcnode-id="906" instrument_node="">Preheat your oven to 220-235 degrees F .Use a </span><a data-dcnode-id="904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B0043073WQ/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3DB0043073WQ%26linkCode%3Das2%26tag%3Dsweet0c4-20%26linkId%3D75030d131be63f77976daaa4a9f6a6e4"><span data-dcnode-id="905" instrument_node="">coffee</span></a><span data-dcnode-id="903" instrument_node=""> or </span><a data-dcnode-id="901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B00700W0TW/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3DB00700W0TW%26linkCode%3Das2%26tag%3Dsweet0c4-20%26linkId%3D2a4c5868a12bbd7f3e86baf0015ab691"><span data-dcnode-id="902" instrument_node="">bud grinder</span></a><span data-dcnode-id="900" instrument_node=""> and grind your material up finely. Spread the grounds evenly across a sheet of baking paper that is sitting on the baking tray.</span></li><span data-dcnode-id="898" instrument_node="">
</span><li data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Bake the material for about 30-60 minutes. This will be sufficient for proper decarboxylation. Afterwards, pull the tray from the oven. We are ready to infuse the coconut oil.</span></li><span data-dcnode-id="895" instrument_node="">
</span></ol><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Remember there will be a strong smell from decarboxylating your Cannabis in the oven.</span></p><span data-dcnode-id="890" instrument_node="">
</span><p data-dcnode-id="886"><strong data-dcnode-id="887"><u data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Infusing the Oil</span></u></strong></p><span data-dcnode-id="885" instrument_node="">
</span><ol data-dcnode-id="871"><span data-dcnode-id="884" instrument_node="">
</span><li data-dcnode-id="876"><span data-dcnode-id="883" instrument_node="">Turn your </span><a data-dcnode-id="881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B0000CCY14/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3DB0000CCY14%26linkCode%3Das2%26tag%3Dsweet0c4-20%26linkId%3D6748c513a643a93095c0d257912b3784"><span data-dcnode-id="882" instrument_node="">slow cooker</span></a><span data-dcnode-id="880" instrument_node=""> to a low setting and add the de+carboxylated ground bud, the </span><a data-dcnode-id="878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B01H1S7WMC/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3DB01H1S7WMC%26linkCode%3Das2%26tag%3Dsweet0c4-20%26linkId%3D220a56b465f1aa93fb8c8cf540c81a37"><span data-dcnode-id="879" instrument_node="">coconut oil</span></a><span data-dcnode-id="877" instrument_node="">, and the sunflower lecithin.</span></li><span data-dcnode-id="875" instrument_node="">
</span><li data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">For proper infusion, you should allow the material to cook for at least 2-3 hours. Use the low setting on the slow cooker. Make sure that you stir the mix several times during the process and only use a wooden or metal spoon, not plastic.</span></li><span data-dcnode-id="872" instrument_node="">
</span></ol><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">&nbsp;</span></p><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="863"><strong data-dcnode-id="864"><u data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">Filling The Gelatin Capsules</span></u></strong></p><span data-dcnode-id="862" instrument_node="">
</span><p data-dcnode-id="854"><span data-dcnode-id="861" instrument_node="">Size 00 empty </span><a data-dcnode-id="859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B00428B6X6/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3DB00428B6X6%26linkCode%3Das2%26tag%3Dsweet0c4-20%26linkId%3D4f6b78cc4a34496318cbaa5175918b10"><span data-dcnode-id="860" instrument_node="">gelatin capsules</span></a><span data-dcnode-id="858" instrument_node=""> are best for this purpose. You can make yourself familiar with how to use the capsule machine while your oil is infusing in the </span><a data-dcnode-id="856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B0000CCY14/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3DB0000CCY14%26linkCode%3Das2%26tag%3Dsweet0c4-20%26linkId%3D6748c513a643a93095c0d257912b3784"><span data-dcnode-id="857" instrument_node="">slow cooker</span></a><span data-dcnode-id="855" instrument_node="">.</span></p><span data-dcnode-id="853" instrument_node="">
</span><p data-dcnode-id="848"><span data-dcnode-id="852" instrument_node="">You don’t need to use a </span><a data-dcnode-id="850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B01LWT81UO/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3DB01LWT81UO%26linkCode%3Das2%26tag%3Dsweet0c4-20%26linkId%3D50d1ee769a2ac65116bf7c21145d2c02"><span data-dcnode-id="851" instrument_node="">capsule filling machine</span></a><span data-dcnode-id="849" instrument_node=""> but it is a lot easier, faster and less messy than doing it by hand. They are relatively cheap and it will shave a lot of time off preparing your capsules.</span></p><span data-dcnode-id="847" instrument_node="">
</span><ol data-dcnode-id="812"><span data-dcnode-id="846" instrument_node="">
</span><li data-dcnode-id="838"><span data-dcnode-id="845" instrument_node="">Take the </span><a data-dcnode-id="843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B001B14ODG/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3DB001B14ODG%26linkCode%3Das2%26tag%3Dsweet0c4-20%26linkId%3D393a841cf219503ce753a7495b5f36e7"><span data-dcnode-id="844" instrument_node="">cheesecloth</span></a><span data-dcnode-id="842" instrument_node=""> and a rubber band and secure the cloth over the rim of a </span><a data-dcnode-id="840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B008EHMNSS/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3DB008EHMNSS%26linkCode%3Das2%26tag%3Dsweet0c4-20%26linkId%3D12374e46ab80802e870c6bfb7210af66"><span data-dcnode-id="841" instrument_node="">small bowl</span></a><span data-dcnode-id="839" instrument_node="">.</span></li><span data-dcnode-id="837" instrument_node="">
</span><li data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Strain the finished oil through the cheesecloth and into the small bowl. This will remove the plant matter, leaving you with your cannabis-infused oil.</span></li><span data-dcnode-id="834" instrument_node="">
</span><li data-dcnode-id="829"><span data-dcnode-id="833" instrument_node="">Make sure you squeeze the rest of the remaining oil out of the cheesecloth. Best to let it cool down before you do this so you don’t burn yourself and use rubber or </span><a data-dcnode-id="831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B00WK7GX8E/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3DB00WK7GX8E%26linkCode%3Das2%26tag%3Dsweet0c4-20%26linkId%3D3ac2044bc8d5373a47ccc70e4ee92c66"><span data-dcnode-id="832" instrument_node="">surgical gloves</span></a><span data-dcnode-id="830" instrument_node="">.</span></li><span data-dcnode-id="828" instrument_node="">
</span><li data-dcnode-id="823"><span data-dcnode-id="827" instrument_node="">Make sure you allow the oil to cool down to about 95 degrees F before you proceed with filling your </span><a data-dcnode-id="825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B004RILTDS/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3DB004RILTDS%26linkCode%3Das2%26tag%3Dsweet0c4-20%26linkId%3Df6ef924f88aa7533ba4bf81141aa581b"><span data-dcnode-id="826" instrument_node="">syringe</span></a><span data-dcnode-id="824" instrument_node="">. The reason for this is that gelatine capsules can melt if the oil is too hot. Likewise, do not allow the oil to cool down too much since it would solidify. Coconut oil will be in a liquid state anywhere above 76 degrees F.</span></li><span data-dcnode-id="822" instrument_node="">
</span><li data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">With the cannabis oil just at the right, warm temperature, fill your syringe. Fill the gelatine capsules one-at-a-time and repeat this process. If you use an oral irrigator with a tapered deep reach tip, filling the capsules will be even easier.</span></li><span data-dcnode-id="819" instrument_node="">
</span><li data-dcnode-id="814"><span data-dcnode-id="818" instrument_node="">Once you are finished with filling all capsules, close the capsules according to the instructions for the </span><a data-dcnode-id="816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B01LWT81UO/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3DB01LWT81UO%26linkCode%3Das2%26tag%3Dsweet0c4-20%26linkId%3D50d1ee769a2ac65116bf7c21145d2c02"><span data-dcnode-id="817" instrument_node="">capsule machine</span></a><span data-dcnode-id="815" instrument_node="">.</span></li><span data-dcnode-id="813" instrument_node="">
</span></ol><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">If you want to test the strength of the Cannabis infused coconut oil&nbsp;before loading them all into capsules you can use a syringe to fill some capsules beforehand&nbsp;while the mixture is still in the slow cooker. Just make sure it’s not still too warm or the gelatin capsule will disintegrate. If it is too strong simply add some more coconut oil and let it infuse on the warm setting for another 2 hours.</span></p><span data-dcnode-id="808" instrument_node="">
