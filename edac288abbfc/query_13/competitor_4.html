.3-2.4,1.4-4.4L172.1,82.1z" data-dcnode-id="2617"></path></svg><svg class="jw-svg-icon jw-svg-icon-fullscreen-on" data-dcnode-id="2614" focusable="false" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg"><path d="M96.3,186.1c1.9,1.9,1.3,4-1.4,4.4l-50.6,8.4c-1.8,0.5-3.7-0.6-4.2-2.4c-0.2-0.6-0.2-1.2,0-1.7l8.4-50.6c0.4-2.7,2.4-3.4,4.4-1.4l14.5,14.5l28.2-28.2l14.3,14.3l-28.2,28.2L96.3,186.1z M195.8,39.1l-50.6,8.4c-2.7,0.4-3.4,2.4-1.4,4.4l14.5,14.5l-28.2,28.2l14.3,14.3l28.2-28.2l14.5,14.5c1.9,1.9,4,1.3,4.4-1.4l8.4-50.6c0.5-1.8-0.6-3.6-2.4-4.2C197,39,196.4,39,195.8,39.1L195.8,39.1z" data-dcnode-id="2615"></path></svg><div class="jw-reset-text jw-tooltip jw-tooltip-fullscreen" data-dcnode-id="2612" dir="auto"><div class="jw-text" data-dcnode-id="2613"></div></div></div></div></div></div></div><div class="afs_ads ad-placement" data-dcnode-id="2605" style="width: 1px; height: 1px; position: absolute; background: transparent;"><span data-dcnode-id="2606" instrument_node="">&nbsp;</span></div></div><h2 class="heading main-title" data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">2. Current scenario and future burden of breast cancer</span></h2><span data-dcnode-id="2601" instrument_node="">
</span><p data-dcnode-id="2590" id="p3"><span data-dcnode-id="2600" instrument_node="">Cancer of the breast is among the most frequently diagnosed cancer and the leading cause of cancer-related deaths in females globally. According to International Agency for Research on Cancer (IARC’s) Globocan data on 2018, breast cancer caused 0.62 million deaths in 2018 and another 2.08 million new cases were identified, which is 11.6% of all cancer types recorded [</span><a class="ref-link" data-dcnode-id="2598" data-ref-style="bibr" href="#B5"><span data-dcnode-id="2599" instrument_node="">5</span></a><span data-dcnode-id="2597" instrument_node="">]. At the current rate, the number of incident cases is expected to rise to 3.05 million, and the mortality troll is expected to rise to a nerve-racking 6.99 million by 2040 [</span><a class="ref-link" data-dcnode-id="2595" data-ref-style="bibr" href="#B6"><span data-dcnode-id="2596" instrument_node="">6</span></a><span data-dcnode-id="2594" instrument_node="">]. Approximately 1 in 10 women is diagnosed with breast cancer at some time in their lives [</span><a class="ref-link" data-dcnode-id="2592" data-ref-style="bibr" href="#B3"><span data-dcnode-id="2593" instrument_node="">3</span></a><span data-dcnode-id="2591" instrument_node="">].</span></p><span data-dcnode-id="2589" instrument_node="">
</span><p data-dcnode-id="2575" id="p4"><span data-dcnode-id="2588" instrument_node="">Epidemiological observation shows that the incidence of breast cancer is continuously raising in both industrialized and developing countries [</span><a class="ref-link" data-dcnode-id="2586" data-ref-style="bibr" href="#B7"><span data-dcnode-id="2587" instrument_node="">7</span></a><span data-dcnode-id="2585" instrument_node="">]. Breast cancer is a disease largely triggered by environmental and lifestyle factors than genetic, which is believed to be responsible for only 10–15% of all breast cancer cases [</span><a class="ref-link" data-dcnode-id="2583" data-ref-style="bibr" href="#B8"><span data-dcnode-id="2584" instrument_node="">8</span></a><span data-dcnode-id="2582" instrument_node="">]. Various risk factors like age (&gt;50), family history of breast cancer, woman’s reproductive history such as early menarche, nulliparity or late pregnancy, and late menopause mainly aid to breast cancer onset [</span><a class="ref-link" data-dcnode-id="2580" data-ref-style="bibr" href="#B9"><span data-dcnode-id="2581" instrument_node="">9</span></a><span data-dcnode-id="2579" instrument_node="">]. In addition, prolonged use of oral contraceptive and hormone replacement therapy are also known risk factors of this disease among postmenopausal women [</span><a class="ref-link" data-dcnode-id="2577" data-ref-style="bibr" href="#B10"><span data-dcnode-id="2578" instrument_node="">10</span></a><span data-dcnode-id="2576" instrument_node="">].</span></p><span data-dcnode-id="2574" instrument_node="">
</span></div><span data-dcnode-id="2572" instrument_node="">
</span><div class="section" data-dcnode-id="2459" data-lvl="1" id="sec_3"><span data-dcnode-id="2571" instrument_node="">
</span><a class="ads-link" data-dcnode-id="2569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ehealthcaresolutions.com/contact-us/" target="_blank"><span data-dcnode-id="2570" instrument_node="">Advertisement</span></a><span data-dcnode-id="2568" instrument_node="">
</span><div class="ads" data-dcnode-id="2567" id="intechopen-intechopen-3"></div><h2 class="heading main-title" data-dcnode-id="2565"><span data-dcnode-id="2566" instrument_node="">3. Molecular feature of breast cancer occurrence, progression, and treatment</span></h2><span data-dcnode-id="2564" instrument_node="">
</span><p data-dcnode-id="2556" id="p5"><span data-dcnode-id="2563" instrument_node="">The onset of cancer is a result of several sequential molecular events. Most common of them is a mutation in a DNA molecule that codes for a protein that either triggers cell division, proliferation, and growth or that signals termination of all these molecular events [</span><a class="ref-link" data-dcnode-id="2561" data-ref-style="bibr" href="#B11"><span data-dcnode-id="2562" instrument_node="">11</span></a><span data-dcnode-id="2560" instrument_node="">]. Therefore, damage to DNA or a protein that regulates cell cycle may lead to uncontrolled division and growth of cells, the condition is cancer. It is a hyperproliferative disease that involves molecular alteration resulting in apoptosis dysregulation, proliferation, angiogenesis, and metastasis [</span><a class="ref-link" data-dcnode-id="2558" data-ref-style="bibr" href="#B12"><span data-dcnode-id="2559" instrument_node="">12</span></a><span data-dcnode-id="2557" instrument_node="">].</span></p><span data-dcnode-id="2555" instrument_node="">
</span><p data-dcnode-id="2528" id="p6"><span data-dcnode-id="2554" instrument_node="">Breast cancer is one of the commonest types of cancer and characterized by distinct pathological types with different clinical outcomes. It has different stages that arise from ductal hyperproliferation, which changes into ductal carcinoma </span><em data-dcnode-id="2551"><italic data-dcnode-id="2552" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="2553" instrument_node="">in situ</span></italic></em><span data-dcnode-id="2550" instrument_node=""> (DCIS), invasive carcinoma, and metastatic stage. In addition, based on the molecular mechanism of occurrence, breast cancer can be divided into estrogen receptor (ERα) and progesterone receptor (PR) expression and amplification of human epidermal growth factor receptor (HER2), also known as epidermal growth factor receptor 2 (ErbB2) [</span><a class="ref-link" data-dcnode-id="2548" data-ref-style="bibr" href="#B3"><span data-dcnode-id="2549" instrument_node="">3</span></a><span data-dcnode-id="2547" instrument_node="">]. Breast cancer 1 (BRCA1) and breast cancer 2 (BRCA2) are the two most important genes that code the proteins BRCA-1 and BRCA-2, which play a key role in DNA damage repair and in maintaining genomic stability [</span><a class="ref-link" data-dcnode-id="2545" data-ref-style="bibr" href="#B3"><span data-dcnode-id="2546" instrument_node="">3</span></a><span data-dcnode-id="2544" instrument_node="">]. Mutation in these genes leads to 15–20 fold increases the risk of breast cancer occurrence [</span><a class="ref-link" data-dcnode-id="2542" data-ref-style="bibr" href="#B13"><span data-dcnode-id="2543" instrument_node="">13</span></a><span data-dcnode-id="2541" instrument_node="">]. Additionally, tumor suppressor TP53 is another important gene that codes for the protein p53 that plays a major role in the regulation of cell cycle and in apoptosis induction. Mutation in the TP53 gene increases the risk of breast cancer as well as other cancer types. Breast cancer cell survival, proliferation, motility, and cell metabolism are controlled by various signaling cascades. In around 70% of breast cancers, the phosphatidylinositol 3-kinase (PI3K)/AKT pathway has shown to be mutated [</span><a class="ref-link" data-dcnode-id="2539" data-ref-style="bibr" href="#B14"><span data-dcnode-id="2540" instrument_node="">14</span></a><span data-dcnode-id="2538" instrument_node="">]. Other frequently mutated signaling cascades in breast cancer are Janus kinase (JAK)/signal transducer, activators of transcription (STAT), and nuclear factor κβ (NF-κβ) pathways [</span><a class="ref-link" data-dcnode-id="2536" data-ref-style="bibr" href="#B3"><span data-dcnode-id="2537" instrument_node="">3</span></a><span data-dcnode-id="2535" instrument_node="">]. Classification of breast cancer based on the molecular expression has therapeutic implication as it helps in deciding the treatment plan. Based on the relative expression of the above markers, patients either receives hormonal therapy or chemo/targeted therapies. The most promising way of dealing with cancer is to interfere with modulation stages of carcinogenesis—initiation, promotion, and progression as well as altering the carcinogenesis signaling pathways [</span><a class="ref-link" data-dcnode-id="2533" data-ref-style="bibr" href="#B15"><span data-dcnode-id="2534" instrument_node="">15</span></a><span data-dcnode-id="2532" instrument_node="">, </span><a class="ref-link" data-dcnode-id="2530" data-ref-style="bibr" href="#B16"><span data-dcnode-id="2531" instrument_node="">16</span></a><span data-dcnode-id="2529" instrument_node="">].</span></p><span data-dcnode-id="2527" instrument_node="">
</span><p data-dcnode-id="2498" id="p7"><span data-dcnode-id="2526" instrument_node="">Breast cancer therapeutics include drugs that protect genomic stability by preventing DNA damage, inhibit the cell cycle by disrupting cellular integrity or by inducing apoptotic cell death, and block certain pathways that are responsible for abnormal cell growth (</span><a class="ref-link" data-dcnode-id="2524" data-ref-style="table" href="#tab1"><span data-dcnode-id="2525" instrument_node="">Table 1</span></a><span data-dcnode-id="2523" instrument_node="">). Majority of breast cancer cases express the estrogen hormone receptor, which helps the cancer cells to proliferate rapidly by the growth-promoting effects of circulatory estrogens [</span><a class="ref-link" data-dcnode-id="2521" data-ref-style="bibr" href="#B17"><span data-dcnode-id="2522" instrument_node="">17</span></a><span data-dcnode-id="2520" instrument_node="">]. Therefore, current therapies are targeted at abrogating estrogen dependence for estrogen receptor (ER)-positive breast cancers [</span><a class="ref-link" data-dcnode-id="2518" data-ref-style="bibr" href="#B17"><span data-dcnode-id="2519" instrument_node="">17</span></a><span data-dcnode-id="2517" instrument_node="">]. One of the successful and efficient approaches is the employment of a selective estrogen receptor modulator (SERM) like tamoxifen, which binds to the ER that induces a conformational change in the receptor resulting in obstruction of estrogenic expression [</span><a class="ref-link" data-dcnode-id="2515" data-ref-style="bibr" href="#B18"><span data-dcnode-id="2516" instrument_node="">18</span></a><span data-dcnode-id="2514" instrument_node="">, </span><a class="ref-link" data-dcnode-id="2512" data-ref-style="bibr" href="#B19"><span data-dcnode-id="2513" instrument_node="">19</span></a><span data-dcnode-id="2511" instrument_node="">]. However, tamoxifen like SERMs exhibits many notable side effects including—secondary cancer, cardiovascular diseases by their estrogenic activity in other tissues and organs. The efficiency of tamoxifen is challenged by the development of highly potent third-generation aromatase inhibitors (AIs) that represents a promising approach in endocrine therapy of breast cancer [</span><a class="ref-link" data-dcnode-id="2509" data-ref-style="bibr" href="#B20"><span data-dcnode-id="2510" instrument_node="">20</span></a><span data-dcnode-id="2508" instrument_node="">]. The aromatase inhibitor drugs like anastrozole and letrozole reduce estrogen production by competitive inhibition of the enzyme aromatase, although the long-term health effects of AIs are doubtful [</span><a class="ref-link" data-dcnode-id="2506" data-ref-style="bibr" href="#B21"><span data-dcnode-id="2507" instrument_node="">21</span></a><span data-dcnode-id="2505" instrument_node="">]. Another effective strategy in breast cancer treatment is the implementation of a growth factor inhibitor. One of the first identified targets of these growth inhibitors was the epidermal growth factor receptor (EGFR) that plays a vital role in the survival of cancer cells and developing multidrug resistance [</span><a class="ref-link" data-dcnode-id="2503" data-ref-style="bibr" href="#B22"><span data-dcnode-id="2504" instrument_node="">22</span></a><span data-dcnode-id="2502" instrument_node="">]. The effectiveness of the small molecule EGFR tyrosine kinase inhibitor like gefitinib is highly appreciated for the treatment of breast cancer; however, it failed to produce notable improvement in advance stages of breast cancer [</span><a class="ref-link" data-dcnode-id="2500" data-ref-style="bibr" href="#B23"><span data-dcnode-id="2501" instrument_node="">23</span></a><span data-dcnode-id="2499" instrument_node="">].</span></p><span data-dcnode-id="2497" instrument_node="">
</span><div class="table-wrap" data-dcnode-id="2482" id="tab1"><div class="table-content" data-dcnode-id="2493"><div class="media-panel" data-dcnode-id="2494"><div class="media" data-dcnode-id="2495"><img alt="" class="figure-link" data-dcnode-id="2496" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/media/chapter/70593/media/Table1.png&amp;raw"></div></div></div><div class="table-caption" data-dcnode-id="2483"><h3 class="heading" data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">Table 1.</span></h3><div class="text" data-dcnode-id="2485"><p data-dcnode-id="2486" id="p8"><span data-dcnode-id="2490" instrument_node="">Commonly used breast cancer chemotherapeutic drugs, their targets, and mechanism of action [</span><a class="ref-link" data-dcnode-id="2488" data-ref-style="bibr" href="#B26"><span data-dcnode-id="2489" instrument_node="">26</span></a><span data-dcnode-id="2487" instrument_node="">].</span></p></div><div class="text" data-dcnode-id="2484"></div></div></div><span data-dcnode-id="2481" instrument_node="">
</span><p data-dcnode-id="2461" id="p9"><span data-dcnode-id="2480" instrument_node="">Approximately 20% of breast cancer cases show overexpression of the HER2 that results in aggressive disease and reduced survival [</span><a class="ref-link" data-dcnode-id="2478" data-ref-style="bibr" href="#B17"><span data-dcnode-id="2479" instrument_node="">17</span></a><span data-dcnode-id="2477" instrument_node="">]. In present, trastuzumab and lapatinib are the only marketed drugs used to inhibit the HER2-mediated growth and proliferation signaling [</span><a class="ref-link" data-dcnode-id="2475" data-ref-style="bibr" href="#B17"><span data-dcnode-id="2476" instrument_node="">17</span></a><span data-dcnode-id="2474" instrument_node="">]. Other than this, enzyme-mediated DNA damage is an effective approach used in cancer chemotherapy. Doxorubicin, an anthracycline drug, binds with DNA by intercalation with base pairs, which results in an elevated level of DNA-topoisomerase II covalent complexes inhibiting topoisomerase II activity [</span><a class="ref-link" data-dcnode-id="2472" data-ref-style="bibr" href="#B24"><span data-dcnode-id="2473" instrument_node="">24</span></a><span data-dcnode-id="2471" instrument_node="">]. Other anticancer drugs inhibit mitosis by interrupting the microtubule stability, hence blocking the transition from metaphase to anaphase [</span><a class="ref-link" data-dcnode-id="2469" data-ref-style="bibr" href="#B25"><span data-dcnode-id="2470" instrument_node="">25</span></a><span data-dcnode-id="2468" instrument_node="">]. Subsequently, the cell undergoes mitotic arrest or programmed cell death (apoptosis). For instance, vincristine and vinorelbine inhibit the polymerization of microtubules by binding to either the vinca domain or taxoid-binding domain that interferes between β- and α-subunit of tubulin [</span><a class="ref-link" data-dcnode-id="2466" data-ref-style="bibr" href="#B25"><span data-dcnode-id="2467" instrument_node="">25</span></a><span data-dcnode-id="2465" instrument_node="">]. On the other hand, microtubule-stabilizing drugs like paclitaxel hyperstabilizes the microtubule assembly by binding to the inner surface of the microtubule at a taxoid-binding site on β-tubulin resulting in mitotic arrest in the cell [</span><a class="ref-link" data-dcnode-id="2463" data-ref-style="bibr" href="#B25"><span data-dcnode-id="2464" instrument_node="">25</span></a><span data-dcnode-id="2462" instrument_node="">]. All these strategies helped in reducing mortality due to breast cancer and increased the survival rate; however, they appear with certain side effects that may be either low and short term or high and life threatening.</span></p><span data-dcnode-id="2460" instrument_node="">
</span></div><span data-dcnode-id="2458" instrument_node="">
</span><div class="section" data-dcnode-id="2358" data-lvl="1" id="sec_4"><span data-dcnode-id="2457" instrument_node="">
</span><a class="ads-link" data-dcnode-id="2455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ehealthcaresolutions.com/contact-us/" target="_blank"><span data-dcnode-id="2456" instrument_node="">Advertisement</span></a><span data-dcnode-id="2454" instrument_node="">
</span><div class="ads" data-dcnode-id="2453" id="intechopen-intechopen-4"></div><h2 class="heading main-title" data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">4. Chemotherapeutic-associated toxicity in breast cancer treatment</span></h2><span data-dcnode-id="2450" instrument_node="">
</span><p data-dcnode-id="2439" id="p10"><span data-dcnode-id="2449" instrument_node="">The role of chemotherapy in curing cancer is still doubtful [</span><a class="ref-link" data-dcnode-id="2447" data-ref-style="bibr" href="#B27"><span data-dcnode-id="2448" instrument_node="">27</span></a><span data-dcnode-id="2446" instrument_node="">]. Even it decreases the risk of recurrence and helps the patient to live longer with improved quality of life in case of metastatic breast cancer. But its use associated with certain risk factors or side effects—some of the side effects are short term and minor, whereas others may become more serious and life threatening [</span><a class="ref-link" data-dcnode-id="2444" data-ref-style="bibr" href="#B27"><span data-dcnode-id="2445" instrument_node="">27</span></a><span data-dcnode-id="2443" instrument_node="">]. </span><a class="ref-link" data-dcnode-id="2441" data-ref-style="table" href="#tab2"><span data-dcnode-id="2442" instrument_node="">Table 2</span></a><span data-dcnode-id="2440" instrument_node=""> describes a few commonly used chemotherapeutic drugs and their side effects.</span></p><span data-dcnode-id="2438" instrument_node="">
</span><div class="table-wrap" data-dcnode-id="2414" id="tab2"><div class="table-content" data-dcnode-id="2434"><div class="media-panel" data-dcnode-id="2435"><div class="media" data-dcnode-id="2436"><img alt="" class="figure-link" data-dcnode-id="2437" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/media/chapter/70593/media/Table2.png&amp;raw"></div></div></div><div class="table-caption" data-dcnode-id="2415"><h3 class="heading" data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">Table 2.</span></h3><div class="text" data-dcnode-id="2417"><p data-dcnode-id="2418" id="p11"><span data-dcnode-id="2431" instrument_node="">Frequently used chemotherapeutic drugs in breast cancer treatment and their common side effects associated with them [</span><a class="ref-link" data-dcnode-id="2429" data-ref-style="bibr" href="#B26"><span data-dcnode-id="2430" instrument_node="">26</span></a><span data-dcnode-id="2428" instrument_node="">, </span><a class="ref-link" data-dcnode-id="2426" data-ref-style="bibr" href="#B28"><span data-dcnode-id="2427" instrument_node="">28</span></a><span data-dcnode-id="2425" instrument_node="">, </span><a class="ref-link" data-dcnode-id="2423" data-ref-style="bibr" href="#B29"><span data-dcnode-id="2424" instrument_node="">29</span></a><span data-dcnode-id="2422" instrument_node="">, </span><a class="ref-link" data-dcnode-id="2420" data-ref-style="bibr" href="#B30"><span data-dcnode-id="2421" instrument_node="">30</span></a><span data-dcnode-id="2419" instrument_node="">].</span></p></div><div class="text" data-dcnode-id="2416"></div></div></div><span data-dcnode-id="2413" instrument_node="">
</span><p data-dcnode-id="2396" id="p12"><span data-dcnode-id="2412" instrument_node="">Among the most common side effects of chemotherapeutic drugs is its nonselective toxicity, where it destroys the normal body cells such as those in the hair follicle, bone marrow, and cells of other important organs along with the cancer cells. Quite a few chemotherapeutic drugs affect the nerve endings or synaptic gaps in hands and feet that may result into numbness, pain, burning or tingling, sensitivity to cold or heat, or weakness in your extremities [</span><a class="ref-link" data-dcnode-id="2410" data-ref-style="bibr" href="#B31"><span data-dcnode-id="2411" instrument_node="">31</span></a><span data-dcnode-id="2409" instrument_node="">]. Besides, chemotherapeutic drugs may severely damage the immune cells as wells as the brain cells, making the patient vulnerable to infectious diseases and impaired cognitive functions [</span><a class="ref-link" data-dcnode-id="2407" data-ref-style="bibr" href="#B32"><span data-dcnode-id="2408" instrument_node="">32</span></a><span data-dcnode-id="2406" instrument_node="">]. These side effects may be temporary and may disappear after a few months of completion of chemotherapy. Other critical side effects that arise due to certain chemotherapeutic drugs may last longer—infertility is one of them [</span><a class="ref-link" data-dcnode-id="2404" data-ref-style="bibr" href="#B33"><span data-dcnode-id="2405" instrument_node="">33</span></a><span data-dcnode-id="2403" instrument_node="">]. Chemotherapeutics that damage ovaries may lead to menopause symptoms, like hot flashes and vaginal dryness, where menstrual cycle becomes irregular or permanently ceases making pregnancy impossible [</span><a class="ref-link" data-dcnode-id="2401" data-ref-style="bibr" href="#B34"><span data-dcnode-id="2402" instrument_node="">34</span></a><span data-dcnode-id="2400" instrument_node="">]. Further, early menopause in premenopausal women due to the use of aromatase inhibitor agents in adjuvant therapy causes a hypoestrogenic condition that negatively impacts bone density resulting in osteopenia or osteoporosis [</span><a class="ref-link" data-dcnode-id="2398" data-ref-style="bibr" href="#B35"><span data-dcnode-id="2399" instrument_node="">35</span></a><span data-dcnode-id="2397" instrument_node="">].</span></p><span data-dcnode-id="2395" instrument_node="">
</span><p data-dcnode-id="2366" id="p13"><span data-dcnode-id="2394" instrument_node="">Besides, long-term chemotherapeutic toxicity results in cardiac diseases and may trigger secondary cancer such as marrow neoplasm or leukemia [</span><a class="ref-link" data-dcnode-id="2392" data-ref-style="bibr" href="#B36"><span data-dcnode-id="2393" instrument_node="">36</span></a><span data-dcnode-id="2391" instrument_node="">, </span><a class="ref-link" data-dcnode-id="2389" data-ref-style="bibr" href="#B37"><span data-dcnode-id="2390" instrument_node="">37</span></a><span data-dcnode-id="2388" instrument_node="">]. Chemotherapy-linked cardiotoxicity is another major setback of cancer therapy that increases the mortality rate because of the high prevalence of cardiovascular diseases in cancer patients [</span><a class="ref-link" data-dcnode-id="2386" data-ref-style="bibr" href="#B38"><span data-dcnode-id="2387" instrument_node="">38</span></a><span data-dcnode-id="2385" instrument_node="">]. The cardiotoxicity leads to congestive heart failure (CHF), which is more prevalence in young and elderly patients. It has been reported that the breast cancer patients aged between 65 and 70 years, who received adjuvant anthracycline chemotherapy, had significantly higher rates of CHF [</span><a class="ref-link" data-dcnode-id="2383" data-ref-style="bibr" href="#B39"><span data-dcnode-id="2384" instrument_node="">39</span></a><span data-dcnode-id="2382" instrument_node="">]. In another investigation, a widely used chemotherapeutic drug, doxorubicin, was reported to cause CHF in worryingly 26% of the patients suffering from breast carcinoma [</span><a class="ref-link" data-dcnode-id="2380" data-ref-style="bibr" href="#B40"><span data-dcnode-id="2381" instrument_node="">40</span></a><span data-dcnode-id="2379" instrument_node="">, </span><a class="ref-link" data-dcnode-id="2377" data-ref-style="bibr" href="#B41"><span data-dcnode-id="2378" instrument_node="">41</span></a><span data-dcnode-id="2376" instrument_node="">]. Additionally, it was observed that 0.5% of breast cancer patients developed different types of marrow neoplasm (MN) or leukemia after a few years of chemotherapy [</span><a class="ref-link" data-dcnode-id="2374" data-ref-style="bibr" href="#B42"><span data-dcnode-id="2375" instrument_node="">42</span></a><span data-dcnode-id="2373" instrument_node="">]. The risk of developing MN is higher in the first few years after chemotherapy. Furthermore, chemotherapeutic drugs may also disrupt the normal psychological state of patients in certain cases [</span><a class="ref-link" data-dcnode-id="2371" data-ref-style="bibr" href="#B43"><span data-dcnode-id="2372" instrument_node="">43</span></a><span data-dcnode-id="2370" instrument_node="">, </span><a class="ref-link" data-dcnode-id="2368" data-ref-style="bibr" href="#B44"><span data-dcnode-id="2369" instrument_node="">44</span></a><span data-dcnode-id="2367" instrument_node="">].</span></p><span data-dcnode-id="2365" instrument_node="">
</span><p data-dcnode-id="2360" id="p14"><span data-dcnode-id="2364" instrument_node="">The side effects that arise due the conventional chemotherapy is mainly due to lack of specificity of the drugs for cancer cells. Majority of the widely used chemotherapeutic drugs causes adverse damage to normal cells and key organs, which limits the dose of a drug that can be used [</span><a class="ref-link" data-dcnode-id="2362" data-ref-style="bibr" href="#B45"><span data-dcnode-id="2363" instrument_node="">45</span></a><span data-dcnode-id="2361" instrument_node="">]. This explains the reason why cancer drugs have a low therapeutic index. Several approaches are being considered to address this issue in order to improve the effectiveness of anticancer drugs. One of the popular approaches among them is searching for natural compounds that inhibit cancer cell growth without disrupting the functioning of healthy cells.</span></p><span data-dcnode-id="2359" instrument_node="">
</span></div><span data-dcnode-id="2357" instrument_node="">
</span><div class="section" data-dcnode-id="2313" data-lvl="1" id="sec_5"><span data-dcnode-id="2356" instrument_node="">
</span><a class="ads-link" data-dcnode-id="2354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ehealthcaresolutions.com/contact-us/" target="_blank"><span data-dcnode-id="2355" instrument_node="">Advertisement</span></a><span data-dcnode-id="2353" instrument_node="">
</span><div class="ads" data-dcnode-id="2352" id="intechopen-intechopen-6"></div><h2 class="heading main-title" data-dcnode-id="2350"><span data-dcnode-id="2351" instrument_node="">5. Ethnomedicine and herbal compounds used for cancer treatment</span></h2><span data-dcnode-id="2349" instrument_node="">
</span><p data-dcnode-id="2344" id="p15"><span data-dcnode-id="2348" instrument_node="">Plants have played a key role in the survival and evolution of human beings as they have provided the basic need of mankind like food, clothing, shelter, and medicine since the beginning of the human race. Plants have formed the basis of traditional medicine systems like Ayurveda, Unani, and Chinese traditional medicines that have served mankind with their health needs. A larger part of the population in developing and underdeveloped countries relies on herbal medicine for solving treating their primary health issues. Traditional herbal medicines become popular because of their cost-effectiveness, abundancy, and less or no side effects. In recent years, global emphasis on plant research has increased to find out drug-like substances from traditionally used medicinal plants. Moreover, several naturally occurring plant-based compounds like curcumin, resveratrol, quercetin, and many more showed promising anticancerous effects and are gaining interest as an adjuvant chemotherapeutic agent. Besides, naturally occurring compounds cause less toxicity to healthy cells and in certain cases show selective toxicity against abnormal or diseased cells [</span><a class="ref-link" data-dcnode-id="2346" data-ref-style="bibr" href="#B46"><span data-dcnode-id="2347" instrument_node="">46</span></a><span data-dcnode-id="2345" instrument_node="">]. This might be the reason that today a large number of drugs being marketed are structurally similar to the structure of naturally occurring compounds.</span></p><span data-dcnode-id="2343" instrument_node="">
</span><p data-dcnode-id="2335" id="p16"><span data-dcnode-id="2342" instrument_node="">Herbal compounds show a variety of anticancer activity mainly antioxidant, anti-inflammatory, antimutagenic, and apoptosis-inducing activity that may help prevent cancer development in the early stage (</span><a class="ref-link" data-dcnode-id="2340" data-ref-style="fig" href="#F1"><span data-dcnode-id="2341" instrument_node="">Figure 1</span></a><span data-dcnode-id="2339" instrument_node="">). Dietary consumption of adequate quantity of these herbal products may help in prevention and treatment of breast cancer by cell cycle arrest, induction of apoptosis, regulating carcinogen metabolism and oncogenic expression, inhibiting cell adhesion, proliferation and migration, and blocking signaling pathways that are essential for cancer progression [</span><a class="ref-link" data-dcnode-id="2337" data-ref-style="bibr" href="#B47"><span data-dcnode-id="2338" instrument_node="">47</span></a><span data-dcnode-id="2336" instrument_node="">].</span></p><span data-dcnode-id="2334" instrument_node="">
</span><figure class="media-panel" data-dcnode-id="2324" id="F1"><div class="media" data-dcnode-id="2332"><img alt="" class="figure-link" data-dcnode-id="2333" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/media/chapter/70593/media/F1.png&amp;raw"></div><figcaption class="caption" data-dcnode-id="2325"><h4 data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">Figure 1.</span></h4><p data-dcnode-id="2329"></p><p data-dcnode-id="2327" id="p17" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="2328" instrument_node="">Features of herbal compounds that attribute to their anticancer activity.</span></p><p data-dcnode-id="2326"></p></figcaption></figure><span data-dcnode-id="2323" instrument_node="">
</span><p data-dcnode-id="2315" id="p18"><span data-dcnode-id="2322" instrument_node="">Between the year 1981 and 2014, 136 anticancer drugs were brought to use around the globe, almost 83% of which were either herbal compounds or their derivatives [</span><a class="ref-link" data-dcnode-id="2320" data-ref-style="bibr" href="#B48"><span data-dcnode-id="2321" instrument_node="">48</span></a><span data-dcnode-id="2319" instrument_node="">]. A number of anticancer drugs have already in use for the treatment of breast cancer—including vincristine, vinblastine, paclitaxel, and docetaxel [</span><a class="ref-link" data-dcnode-id="2317" data-ref-style="bibr" href="#B49"><span data-dcnode-id="2318" instrument_node="">49</span></a><span data-dcnode-id="2316" instrument_node="">]. Despite the success of herbal products in curing breast cancer and its associated complexities, not many herbal products are making through preclinical or clinical trials. Hence, greater effort is necessary to successfully transfer these agents to an ideal clinical setting to assess their potential for herbal therapies.</span></p><span data-dcnode-id="2314" instrument_node="">
</span></div><span data-dcnode-id="2312" instrument_node="">
</span><div class="section" data-dcnode-id="2226" data-lvl="1" id="sec_6"><span data-dcnode-id="2311" instrument_node="">
</span><a class="ads-link" data-dcnode-id="2309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ehealthcaresolutions.com/contact-us/" target="_blank"><span data-dcnode-id="2310" instrument_node="">Advertisement</span></a><span data-dcnode-id="2308" instrument_node="">
</span><div class="ads" data-dcnode-id="2307" id="intechopen-intechopen-7"></div><h2 class="heading main-title" data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">6. Herbal products used for prevention of breast cancer</span></h2><span data-dcnode-id="2304" instrument_node="">
</span><p data-dcnode-id="2254" id="p19"><span data-dcnode-id="2303" instrument_node="">Breast cancer is a preventable disease [</span><a class="ref-link" data-dcnode-id="2301" data-ref-style="bibr" href="#B50"><span data-dcnode-id="2302" instrument_node="">50</span></a><span data-dcnode-id="2300" instrument_node="">]. Estrogens play a major role in promoting the proliferation of normal breast cells as well as neoplastic breast epithelium [</span><a class="ref-link" data-dcnode-id="2298" data-ref-style="bibr" href="#B51"><span data-dcnode-id="2299" instrument_node="">51</span></a><span data-dcnode-id="2297" instrument_node="">]. Almost 40–70% of breast cancers are estrogen receptor positive [</span><a class="ref-link" data-dcnode-id="2295" data-ref-style="bibr" href="#B52"><span data-dcnode-id="2296" instrument_node="">52</span></a><span data-dcnode-id="2294" instrument_node="">]. Hence, blocking the estrogen receptor for the treatment and chemoprevention of breast cancer is one of the significant approaches. Plant-based estrogen-like compounds or phytoestrogens were originally proposed as cancer-protective agents. This claim was strongly supported by an epidemiological study that revealed a low breast cancer incidence in the soy-consuming population [</span><a class="ref-link" data-dcnode-id="2292" data-ref-style="bibr" href="#B53"><span data-dcnode-id="2293" instrument_node="">53</span></a><span data-dcnode-id="2291" instrument_node="">, </span><a class="ref-link" data-dcnode-id="2289" data-ref-style="bibr" href="#B54"><span data-dcnode-id="2290" instrument_node="">54</span></a><span data-dcnode-id="2288" instrument_node="">]. Phytoestrogens are structural analogues of the mammalian hormone, estrogen, and thus can bind weakly to the hormone receptor [</span><a class="ref-link" data-dcnode-id="2286" data-ref-style="bibr" href="#B55"><span data-dcnode-id="2287" instrument_node="">55</span></a><span data-dcnode-id="2285" instrument_node="">]. Structurally, phytoestrogen can be grouped into flavones, flavanones, lignans, coumestans, and stilbenes [</span><a class="ref-link" data-dcnode-id="2283" data-ref-style="bibr" href="#B56"><span data-dcnode-id="2284" instrument_node="">56</span></a><span data-dcnode-id="2282" instrument_node="">]. The structure of important members of different classes of phytoestrogens is given in </span><a class="ref-link" data-dcnode-id="2280" data-ref-style="fig" href="#F2"><span data-dcnode-id="2281" instrument_node="">Figure 2</span></a><span data-dcnode-id="2279" instrument_node="">. Soybean and soy product is a rich source of isoflavones [</span><a class="ref-link" data-dcnode-id="2277" data-ref-style="bibr" href="#B57"><span data-dcnode-id="2278" instrument_node="">57</span></a><span data-dcnode-id="2276" instrument_node="">]. Other phytoestrogen classes are legumes and lignans found in seeds, nuts, whole grains, fruit, and vegetables [</span><a class="ref-link" data-dcnode-id="2274" data-ref-style="bibr" href="#B57"><span data-dcnode-id="2275" instrument_node="">57</span></a><span data-dcnode-id="2273" instrument_node="">]. Historically, the rate of breast cancer occurrence in the United States is 4–7 times higher than that of Asian population where the consumption of dietary isoflavones is comparatively as higher as 20 to 80 mg/d [</span><a class="ref-link" data-dcnode-id="2271" data-ref-style="bibr" href="#B58"><span data-dcnode-id="2272" instrument_node="">58</span></a><span data-dcnode-id="2270" instrument_node="">]. In addition, epidemiological observations also revealed a modest 30% reduction in breast cancer risk for women with a higher percentage of dietary lignan intake [</span><a class="ref-link" data-dcnode-id="2268" data-ref-style="bibr" href="#B57"><span data-dcnode-id="2269" instrument_node="">57</span></a><span data-dcnode-id="2267" instrument_node="">]. Therefore, consumption of phytoestrogen-rich diet is one of the many potential protective lifestyles against breast cancer. Recently, there are increasing pieces of evidence that phytoestrogen activity inhibits key steroidogenic enzymes activity involved in the synthesis of estradiol from circulating androgens and estrogen sulfate [</span><a class="ref-link" data-dcnode-id="2265" data-ref-style="bibr" href="#B7"><span data-dcnode-id="2266" instrument_node="">7</span></a><span data-dcnode-id="2264" instrument_node="">]. Consequently, this activity could play a major role in protection against breast cancer. Besides inhibiting the estrogenic activity, phytoestrogens were also reported to activate the G-protein coupled receptor, GPR30 or GPER-1, described as a novel estrogen receptor and play a significant role in estrogen-dependent diseases like breast cancer [</span><a class="ref-link" data-dcnode-id="2262" data-ref-style="bibr" href="#B59"><span data-dcnode-id="2263" instrument_node="">59</span></a><span data-dcnode-id="2261" instrument_node="">]. However, the activity of phytoestrogens is unclear and depends on more than one factors that include—its structure, metabolism, its relative availability compared to that of endogenous estrogen [</span><a class="ref-link" data-dcnode-id="2259" data-ref-style="bibr" href="#B60"><span data-dcnode-id="2260" instrument_node="">60</span></a><span data-dcnode-id="2258" instrument_node="">, </span><a class="ref-link" data-dcnode-id="2256" data-ref-style="bibr" href="#B57"><span data-dcnode-id="2257" instrument_node="">57</span></a><span data-dcnode-id="2255" instrument_node="">].</span></p><span data-dcnode-id="2253" instrument_node="">
</span><figure class="media-panel" data-dcnode-id="2240" id="F2"><div class="media" data-dcnode-id="2251"><img alt="" class="figure-link" data-dcnode-id="2252" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/media/chapter/70593/media/F2.png&amp;raw"></div><figcaption class="caption" data-dcnode-id="2241"><h4 data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">Figure 2.</span></h4><p data-dcnode-id="2248"></p><p data-dcnode-id="2243" id="p20" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="2247" instrument_node="">Some important members of different classes of phytoestrogens [</span><xref data-dcnode-id="2245" ref-type="bibr" rid="B61"><span data-dcnode-id="2246" instrument_node="">61</span></xref><span data-dcnode-id="2244" instrument_node="">].</span></p><p data-dcnode-id="2242"></p></figcaption></figure><span data-dcnode-id="2239" instrument_node="">
</span><p data-dcnode-id="2228" id="p21"><span data-dcnode-id="2238" instrument_node="">Naturally occurring phenolic compounds namely phenolic acids, flavonoids, tannins, quinones, anthocyanins, and others play an important role in cancer prevention and/or treatment [</span><a class="ref-link" data-dcnode-id="2236" data-ref-style="bibr" href="#B47"><span data-dcnode-id="2237" instrument_node="">47</span></a><span data-dcnode-id="2235" instrument_node="">]. These phenolic compounds are ubiquitous and rich in medicinal herbs and dietary plants. Several phenolic compounds contribute toward inhibiting carcinogenesis mechanism and show chemopreventive activities by their diverse range of biological activities [</span><a class="ref-link" data-dcnode-id="2233" data-ref-style="bibr" href="#B62"><span data-dcnode-id="2234" instrument_node="">62</span></a><span data-dcnode-id="2232" instrument_node="">] (</span><a class="ref-link" data-dcnode-id="2230" data-ref-style="table" href="#tab4"><span data-dcnode-id="2231" instrument_node="">Table 4</span></a><span data-dcnode-id="2229" instrument_node="">).</span></p><span data-dcnode-id="2227" instrument_node="">
</span></div><span data-dcnode-id="2225" instrument_node="">
</span><div class="section" data-dcnode-id="2090" data-lvl="1" id="sec_7"><span data-dcnode-id="2224" instrument_node="">
</span><a class="ads-link" data-dcnode-id="2222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ehealthcaresolutions.com/contact-us/" target="_blank"><span data-dcnode-id="2223" instrument_node="">Advertisement</span></a><span data-dcnode-id="2221" instrument_node="">
</span><div class="ads" data-dcnode-id="2220" id="intechopen-intechopen-8"></div><h2 class="heading main-title" data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">7. Herbal products used for treatment of breast cancer</span></h2><span data-dcnode-id="2217" instrument_node="">
</span><p data-dcnode-id="2212" id="p22"><span data-dcnode-id="2216" instrument_node="">A recent population-based survey showed that almost 80% of the women suffering from breast cancer use some form of complementary or alternative medicine for the treatment of cancer [</span><a class="ref-link" data-dcnode-id="2214" data-ref-style="bibr" href="#B63"><span data-dcnode-id="2215" instrument_node="">63</span></a><span data-dcnode-id="2213" instrument_node="">]. Herbal remedies are the most common and popular form of alternative medicine among them, which is frequently used by women suffering from breast cancer. Here is some evidence that can help to treat breast cancer and its associated toxicity:</span></p><span data-dcnode-id="2211" instrument_node="">
</span><div class="section" data-dcnode-id="2152" data-lvl="2" id="sec_7_2"><span data-dcnode-id="2210" instrument_node="">
</span><h3 class="heading section-title" data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">7.1 Choosing a selectively cytotoxic herbal cure</span></h3><span data-dcnode-id="2207" instrument_node="">
</span><p data-dcnode-id="2170" id="p23"><span data-dcnode-id="2206" instrument_node="">One of the interesting features for herbal remedies is their selective toxicity toward cancer cells. There are a number of phytocompounds reported that have selective toxicity toward breast cancer cells. Artemisinin is one among them, isolated from </span><em data-dcnode-id="2203"><italic data-dcnode-id="2204" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="2205" instrument_node="">Artemisia annua</span></italic></em><span data-dcnode-id="2202" instrument_node=""> L. proved to be selectively cytotoxic toward breast cancer cells when an adequate amount of iron (i.e., ferrous iron) is present in the cells. Because cancer cells have a higher iron influx, therefore, artemisinin and its analogues can selectively destroy cancer cells under high iron concentration [</span><a class="ref-link" data-dcnode-id="2200" data-ref-style="bibr" href="#B64"><span data-dcnode-id="2201" instrument_node="">64</span></a><span data-dcnode-id="2199" instrument_node="">]. Besides, polyphenols from </span><em data-dcnode-id="2196"><italic data-dcnode-id="2197" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="2198" instrument_node="">Artemisia annua</span></italic></em><span data-dcnode-id="2195" instrument_node=""> L. were reported to inhibit the adhesion and epithelial-mesenchymal transition (EMT) of highly metastatic breast cancer cells, MDA-MB-231 [</span><a class="ref-link" data-dcnode-id="2193" data-ref-style="bibr" href="#B65"><span data-dcnode-id="2194" instrument_node="">65</span></a><span data-dcnode-id="2192" instrument_node="">]. Other than this, polyphenol-rich extracts of </span><em data-dcnode-id="2189"><italic data-dcnode-id="2190" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="2191" instrument_node="">Hibiscus sabdariffa</span></italic></em><span data-dcnode-id="2188" instrument_node=""> and aqueous extract of </span><em data-dcnode-id="2185"><italic data-dcnode-id="2186" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="2187" instrument_node="">Brucea javanica</span></italic></em><span data-dcnode-id="2184" instrument_node=""> were also reported to show selective cytotoxicity toward </span><em data-dcnode-id="2181"><italic data-dcnode-id="2182" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="2183" instrument_node="">MCF7</span></italic></em><span data-dcnode-id="2180" instrument_node=""> and HTB-126 breast cancer cell lines, respectively [</span><a class="ref-link" data-dcnode-id="2178" data-ref-style="bibr" href="#B66"><span data-dcnode-id="2179" instrument_node="">66</span></a><span data-dcnode-id="2177" instrument_node="">, </span><a class="ref-link" data-dcnode-id="2175" data-ref-style="bibr" href="#B67"><span data-dcnode-id="2176" instrument_node="">67</span></a><span data-dcnode-id="2174" instrument_node="">]. However, further exploration is necessary to isolate the selective cytotoxic ingredients of these plants (</span><a class="ref-link" data-dcnode-id="2172" data-ref-style="table" href="#tab3"><span data-dcnode-id="2173" instrument_node="">Table 3</span></a><span data-dcnode-id="2171" instrument_node="">).</span></p><span data-dcnode-id="2169" instrument_node="">
</span><div class="table-wrap" data-dcnode-id="2154" id="tab3"><div class="table-content" data-dcnode-id="2165"><div class="media-panel" data-dcnode-id="2166"><div class="media" data-dcnode-id="2167"><img alt="" class="figure-link" data-dcnode-id="2168" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/media/chapter/70593/media/Table3.png&amp;raw"></div></div></div><div class="table-caption" data-dcnode-id="2155"><h3 class="heading" data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">Table 3.</span></h3><div class="text" data-dcnode-id="2157"><p data-dcnode-id="2158" id="p24"><span data-dcnode-id="2162" instrument_node="">Plant-based cancer therapeutics in different stages of clinical trials and research [</span><a class="ref-link" data-dcnode-id="2160" data-ref-style="bibr" href="#B68"><span data-dcnode-id="2161" instrument_node="">68</span></a><span data-dcnode-id="2159" instrument_node="">].</span></p></div><div class="text" data-dcnode-id="2156"></div></div></div><span data-dcnode-id="2153" instrument_node="">
</span></div><span data-dcnode-id="2151" instrument_node="">
</span><div class="section" data-dcnode-id="2111" data-lvl="2" id="sec_8_2"><span data-dcnode-id="2150" instrument_node="">
</span><h3 class="heading section-title" data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">7.2 Combination therapy by herbal remedies and synthetic drugs</span></h3><span data-dcnode-id="2147" instrument_node="">
</span><p data-dcnode-id="2113" id="p25"><span data-dcnode-id="2146" instrument_node="">Combination therapy of herbal therapy and synthetic drugs possibly be the last resource for patients in the final stage of breast cancer, where surgery is not possible [</span><a class="ref-link" data-dcnode-id="2144" data-ref-style="bibr" href="#B69"><span data-dcnode-id="2145" instrument_node="">69</span></a><span data-dcnode-id="2143" instrument_node="">]. The combinatory effect of a herbal drug with conventional cancer drugs might improve the bioavailability of one of them making the treatment more effective [</span><a class="ref-link" data-dcnode-id="2141" data-ref-style="bibr" href="#B69"><span data-dcnode-id="2142" instrument_node="">69</span></a><span data-dcnode-id="2140" instrument_node="">, </span><a class="ref-link" data-dcnode-id="2138" data-ref-style="bibr" href="#B70"><span data-dcnode-id="2139" instrument_node="">70</span></a><span data-dcnode-id="2137" instrument_node="">]. Additionally, the combinatory use of herbal remedies with chemotherapy will reduce the dose of standard medicine resulting in lower toxicity and side effects [</span><a class="ref-link" data-dcnode-id="2135" data-ref-style="bibr" href="#B71"><span data-dcnode-id="2136" instrument_node="">71</span></a><span data-dcnode-id="2134" instrument_node="">]. Several researchers have suggested that herbal compounds can be used in a therapeutic modality as it enhances the anticancer activity of current drugs. Curcumin, a renowned anticancer herbal compound down-regulated the expression of breast cancer markers </span><em data-dcnode-id="2131"><italic data-dcnode-id="2132" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="2133" instrument_node="">in vivo</span></italic></em><span data-dcnode-id="2130" instrument_node=""> and </span><em data-dcnode-id="2127"><italic data-dcnode-id="2128" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="2129" instrument_node="">in vitro</span></italic></em><span data-dcnode-id="2126" instrument_node=""> when administered along with chemotherapeutic drugs cyclophosphamide and paclitaxel that made the cancer cells more viable to the drugs [</span><a class="ref-link" data-dcnode-id="2124" data-ref-style="bibr" href="#B72"><span data-dcnode-id="2125" instrument_node="">72</span></a><span data-dcnode-id="2123" instrument_node="">, </span><a class="ref-link" data-dcnode-id="2121" data-ref-style="bibr" href="#B73"><span data-dcnode-id="2122" instrument_node="">73</span></a><span data-dcnode-id="2120" instrument_node="">]. Similarly, 20S-protopanaxadiol, a metabolite of ginsenosides, inhibited cell proliferation in MCF-7 cells by interfering with estrogenic gene expression when used in combination with tamoxifen [</span><a class="ref-link" data-dcnode-id="2118" data-ref-style="bibr" href="#B74"><span data-dcnode-id="2119" instrument_node="">74</span></a><span data-dcnode-id="2117" instrument_node="">]. Besides, this combination asynergistically improved the cytotoxicity of tamoxifen in an ER-independent manner [</span><a class="ref-link" data-dcnode-id="2115" data-ref-style="bibr" href="#B74"><span data-dcnode-id="2116" instrument_node="">74</span></a><span data-dcnode-id="2114" instrument_node="">]. Hence, the benefits of these herbal compounds in synergistic therapy are considerable, and this might help to overcome chemotherapeutic drug resistance and toxicity in breast cancer treatment.</span></p><span data-dcnode-id="2112" instrument_node="">
</span></div><span data-dcnode-id="2110" instrument_node="">
</span><div class="section" data-dcnode-id="2092" data-lvl="2" id="sec_9_2"><span data-dcnode-id="2109" instrument_node="">
</span><h3 class="heading section-title" data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">7.3 Herbal supplements and nutraceuticals for breast cancer therapy</span></h3><span data-dcnode-id="2106" instrument_node="">
</span><p data-dcnode-id="2094" id="p26"><span data-dcnode-id="2105" instrument_node="">Cancer has been shown to be a preventable disease with changes in nutrition and dietary changes. A previous investigation showed that almost 35% of cancers are related to diet [</span><a class="ref-link" data-dcnode-id="2103" data-ref-style="bibr" href="#B75"><span data-dcnode-id="2104" instrument_node="">75</span></a><span data-dcnode-id="2102" instrument_node="">]. There are several confirmations from epidemiological and laboratory studies that sufficient intake of fruit, vegetables, and herbal supplements is inversely linked with breast cancer occurrence. A diet composed of adequate quantity of phytoestrogens, polyphenols, and rich sources of other chemopreventive agents helps in reducing breast cancer risk. Dietary supplements of the herbal source are less toxic and easily metabolized. Besides, dietary consumption of these herbal remedies helps in fighting side effects in postchemotherapy patients. One of the primary symptoms of adjuvant chemotherapeutic damage in posttherapy breast cancer patients is hot flushes. Black cohosh or </span><em data-dcnode-id="2099"><italic data-dcnode-id="2100" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="2101" instrument_node="">Actaea racemosa</span></italic></em><span data-dcnode-id="2098" instrument_node=""> plant is popularly used by patients of breast cancer to treat hot flushes, which gives conflicting but promising results [</span><a class="ref-link" data-dcnode-id="2096" data-ref-style="bibr" href="#B76"><span data-dcnode-id="2097" instrument_node="">76</span></a><span data-dcnode-id="2095" instrument_node="">].</span></p><span data-dcnode-id="2093" instrument_node="">
</span></div><span data-dcnode-id="2091" instrument_node="">
</span></div><span data-dcnode-id="2089" instrument_node="">
</span><div class="section" data-dcnode-id="1954" data-lvl="1" id="sec_11"><span data-dcnode-id="2088" instrument_node="">
</span><a class="ads-link" data-dcnode-id="2086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ehealthcaresolutions.com/contact-us/" target="_blank"><span data-dcnode-id="2087" instrument_node="">Advertisement</span></a><span data-dcnode-id="2085" instrument_node="">
</span><div class="ads" data-dcnode-id="2084" id="intechopen-intechopen-9"></div><h2 class="heading main-title" data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">8. Molecular mechanism of anticancerous activity of herbal compounds on breast cancer</span></h2><span data-dcnode-id="2081" instrument_node="">
</span><p data-dcnode-id="2065" id="p27"><span data-dcnode-id="2080" instrument_node="">As discussed in the earlier section, herbal compounds show a verity of anticancer actions—including antioxidant, cytotoxic, antiproliferative, apoptotic activity, etc. Plant-based cancer agents broadly classified into five groups that include—methyltranferase inhibitors, DNA protecting agents, antioxidants, histone deacetylases inhibitors, and mitosis disruptors. Generally, plant-derived compounds contribute toward the anticarcinogenesis mechanism by their antioxidant, cytotoxic, antimitotic, and apoptotic activity (</span><a class="ref-link" data-dcnode-id="2078" data-ref-style="table" href="#tab4"><span data-dcnode-id="2079" instrument_node="">Table 4</span></a><span data-dcnode-id="2077" instrument_node="">). Others help in chemoprevention by preventing DNA damage, modulating carcinogenesis signaling, and inducing apoptotic cell death (</span><a class="ref-link" data-dcnode-id="2075" data-ref-style="table" href="#tab4"><span data-dcnode-id="2076" instrument_node="">Table 4</span></a><span data-dcnode-id="2074" instrument_node="">). Several </span><em data-dcnode-id="2071"><italic data-dcnode-id="2072" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="2073" instrument_node="">in vitro</span></italic></em><span data-dcnode-id="2070" instrument_node=""> and </span><em data-dcnode-id="2067"><italic data-dcnode-id="2068" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="2069" instrument_node="">in vivo</span></italic></em><span data-dcnode-id="2066" instrument_node=""> investigations support the activity of herbal compounds that linked with their anticancer activity. Here’s is a few examples of the anticancer mechanism of herbal compounds.</span></p><span data-dcnode-id="2064" instrument_node="">
</span><div class="table-wrap" data-dcnode-id="2044" id="tab4"><div class="table-content" data-dcnode-id="2060"><div class="media-panel" data-dcnode-id="2061"><div class="media" data-dcnode-id="2062"><img alt="" class="figure-link" data-dcnode-id="2063" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/media/chapter/70593/media/UF1.png&amp;raw"></div></div></div><div class="table-caption" data-dcnode-id="2045"><h3 class="heading" data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">Table 4.</span></h3><div class="text" data-dcnode-id="2047"><p data-dcnode-id="2048" id="p28"><span data-dcnode-id="2057" instrument_node="">Some novel compounds from herbal sources that showed promising anticancerous activity in both </span><em data-dcnode-id="2054"><italic data-dcnode-id="2055" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="2056" instrument_node="">in vivo</span></italic></em><span data-dcnode-id="2053" instrument_node=""> and </span><em data-dcnode-id="2050"><italic data-dcnode-id="2051" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="2052" instrument_node="">in vitro</span></italic></em><span data-dcnode-id="2049" instrument_node=""> studies.</span></p></div><div class="text" data-dcnode-id="2046"></div></div></div><span data-dcnode-id="2043" instrument_node="">
</span><div class="section" data-dcnode-id="2023" data-lvl="2" id="sec_11_2"><span data-dcnode-id="2042" instrument_node="">
</span><h3 class="heading section-title" data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">8.1 Antioxidant activity of herbal compounds</span></h3><span data-dcnode-id="2039" instrument_node="">
</span><p data-dcnode-id="2025" id="p29"><span data-dcnode-id="2038" instrument_node="">Antioxidant activity of herbal compounds of oxidative stress is developed when the balance between the production of reactive oxygen species (free radicals) and antioxidant defense is disturbed [</span><a class="ref-link" data-dcnode-id="2036" data-ref-style="bibr" href="#B77"><span data-dcnode-id="2037" instrument_node="">77</span></a><span data-dcnode-id="2035" instrument_node="">]. Oxidative stress development and consequent reactive oxygen species (ROS) generation are linked with several disease pathogenesis including cancer. Oxidative stress is dealt with by the body’s antioxidant mechanism and several herbal compounds help boosting this machinery. For instance, curcumin enhances the activity of antioxidant enzymes resulting in enhanced cellular resistance to oxidative damage [</span><a class="ref-link" data-dcnode-id="2033" data-ref-style="bibr" href="#B78"><span data-dcnode-id="2034" instrument_node="">78</span></a><span data-dcnode-id="2032" instrument_node="">]. In addition, curcumin was also found to rise hepatic GSH, SOD, GPx, GR, GST, and CAT activities in paracetamol-treated rats [</span><a class="ref-link" data-dcnode-id="2030" data-ref-style="bibr" href="#B79"><span data-dcnode-id="2031" instrument_node="">79</span></a><span data-dcnode-id="2029" instrument_node="">]. Other plant-based compounds like epigallocatechin gallate, a component of in green tea, found to reduce the levels of lipid peroxidation and protein carbonyl content in rats, possibly by enhancing the GSH redox status significantly when administered orally [</span><a class="ref-link" data-dcnode-id="2027" data-ref-style="bibr" href="#B80"><span data-dcnode-id="2028" instrument_node="">80</span></a><span data-dcnode-id="2026" instrument_node="">]. Likewise, several herbal compounds help to reduce oxidative stress, hence play a preventive role against cancer onset.</span></p><span data-dcnode-id="2024" instrument_node="">
</span></div><span data-dcnode-id="2022" instrument_node="">
</span><div class="section" data-dcnode-id="1996" data-lvl="2" id="sec_12_2"><span data-dcnode-id="2021" instrument_node="">
</span><h3 class="heading section-title" data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">8.2 Anti-angiogenesis activity of herbal compounds</span></h3><span data-dcnode-id="2018" instrument_node="">
</span><p data-dcnode-id="1998" id="p30"><span data-dcnode-id="2017" instrument_node="">Quite a few herbal compounds help to inhibit angiogenesis in breast cancer. Genistein, a flavonoid phytoestrogen, is the most potent angiogenesis inhibitor linked with reduced expression of VEGF, PDGF, uPA, and MMP-2 and MMP-9 [</span><a class="ref-link" data-dcnode-id="2015" data-ref-style="bibr" href="#B81"><span data-dcnode-id="2016" instrument_node="">81</span></a><span data-dcnode-id="2014" instrument_node="">]. Curcumin was even found to be an effective inhibitor of angiogenesis that reduces the expression of various proangiogenic proteins such as vascular endothelial growth factor (VEGF) and basic fibroblast growth factor [</span><a class="ref-link" data-dcnode-id="2012" data-ref-style="bibr" href="#B82"><span data-dcnode-id="2013" instrument_node="">82</span></a><span data-dcnode-id="2011" instrument_node="">]. Resveratrol and quercetin inhibited the migration and tube formation in bovine aorta endothelial cells consequently inhibiting angiogenesis in those cells [</span><a class="ref-link" data-dcnode-id="2009" data-ref-style="bibr" href="#B83"><span data-dcnode-id="2010" instrument_node="">83</span></a><span data-dcnode-id="2008" instrument_node="">, </span><a class="ref-link" data-dcnode-id="2006" data-ref-style="bibr" href="#B84"><span data-dcnode-id="2007" instrument_node="">84</span></a><span data-dcnode-id="2005" instrument_node="">]. In addition, catechin derivatives, such as epicatechin (EC), epigallocatechin (EGC), epicatechin-3-gallate (ECG), and epigallocatechin-3-gallate (EGCG), present in green tea are potent angiogenesis inhibitors [</span><a class="ref-link" data-dcnode-id="2003" data-ref-style="bibr" href="#B85"><span data-dcnode-id="2004" instrument_node="">85</span></a><span data-dcnode-id="2002" instrument_node="">]. The anti-angiogenic activity of EGCG was demonstrated by inhibition of vascular endothelial growth factor (VEGF) production and reduction of matrix metalloproteinase-2 (MMP-2) activity in MDA-MB231 breast cancer cells [</span><a class="ref-link" data-dcnode-id="2000" data-ref-style="bibr" href="#B85"><span data-dcnode-id="2001" instrument_node="">85</span></a><span data-dcnode-id="1999" instrument_node="">].</span></p><span data-dcnode-id="1997" instrument_node="">
</span></div><span data-dcnode-id="1995" instrument_node="">
</span><div class="section" data-dcnode-id="1956" data-lvl="2" id="sec_13_2"><span data-dcnode-id="1994" instrument_node="">
</span><h3 class="heading section-title" data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">8.3 Apoptosis-inducing activity of herbal compounds</span></h3><span data-dcnode-id="1991" instrument_node="">
</span><p data-dcnode-id="1967" id="p31"><span data-dcnode-id="1990" instrument_node="">The apoptosis-inducing activity of herbal compounds is another favorable feature that contributes toward their anticancer effect. Curcumin was found to inhibit the proliferation and inducing apoptosis in several cancer cell lines including breast cancer cells such as T47D, MCF7, MDA-MB-231, and MDA-MB-468 [</span><a class="ref-link" data-dcnode-id="1988" data-ref-style="bibr" href="#B115"><span data-dcnode-id="1989" instrument_node="">115</span></a><span data-dcnode-id="1987" instrument_node="">]. Curcumin inhibited the phosphorylation of protein kinase B (Akt)/mammalian target of rapamycin (mTOR), decreased BCL2 expression, and elevated BAX expression and cleavage of caspase 3, subsequently inducing apoptosis of breast cancer cells [</span><a class="ref-link" data-dcnode-id="1985" data-ref-style="bibr" href="#B115"><span data-dcnode-id="1986" instrument_node="">115</span></a><span data-dcnode-id="1984" instrument_node="">]. Protocatechuic acid was also found to be a potent apoptosis inducer in five types of human cancer cell lines including breast, lung, liver, cervix, and prostate cancer cells [</span><a class="ref-link" data-dcnode-id="1982" data-ref-style="bibr" href="#B111"><span data-dcnode-id="1983" instrument_node="">111</span></a><span data-dcnode-id="1981" instrument_node="">], which was confirmed by DNA fragmentation, changes in mitochondrial membrane potential, and measurement of caspase activity. The flavonoid 8-prenylnaringenin (8PN), a constituent of </span><em data-dcnode-id="1978"><italic data-dcnode-id="1979" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="1980" instrument_node="">Humulus lupulus</span></italic></em><span data-dcnode-id="1977" instrument_node="">, is an effective phytocompound known for its growth-inhibiting and apoptotic activity in various human cancer types including breast cancer [</span><a class="ref-link" data-dcnode-id="1975" data-ref-style="bibr" href="#B116"><span data-dcnode-id="1976" instrument_node="">116</span></a><span data-dcnode-id="1974" instrument_node="">]. This activity of 8PN in MCF7 breast cancer cells was possibly mediated by interference with an ER-associated PI3K pathway [</span><a class="ref-link" data-dcnode-id="1972" data-ref-style="bibr" href="#B116"><span data-dcnode-id="1973" instrument_node="">116</span></a><span data-dcnode-id="1971" instrument_node="">]. Other herbal compounds like lycopene inhibit cell cycle progression by reducing cyclin D expression and retention of p27 in cyclin E–cdk2, thus leading to inhibition of G1 CDK activities in human breast cell line MCF-7 and T-47D along with endometrial (ECC-1) cancer cells [</span><a class="ref-link" data-dcnode-id="1969" data-ref-style="bibr" href="#B108"><span data-dcnode-id="1970" instrument_node="">108</span></a><span data-dcnode-id="1968" instrument_node="">].</span></p><span data-dcnode-id="1966" instrument_node="">
</span><p data-dcnode-id="1958" id="p32"><span data-dcnode-id="1965" instrument_node="">Interestingly, artemisinin, which is an ancient Chinese herbal compound for malarial fevers, has been recently found to have potent and selective toxicity against cancer cells. It reacts with iron to form free radicals with alkylating capacity that can kill cells. As cancer cells require a large quantity of iron uptake to proliferate, making them more susceptible to the cytotoxic effect of artemisinin [</span><a class="ref-link" data-dcnode-id="1963" data-ref-style="bibr" href="#B117"><span data-dcnode-id="1964" instrument_node="">117</span></a><span data-dcnode-id="1962" instrument_node="">]. Besides, oral administration of artemisinin delayed the onset of breast cancer in 7, 12-dimethylbenz [a] anthracene (DMBA)-induced rats [</span><a class="ref-link" data-dcnode-id="1960" data-ref-style="bibr" href="#B118"><span data-dcnode-id="1961" instrument_node="">118</span></a><span data-dcnode-id="1959" instrument_node="">]. This encouraging results might lead to design novel chemotherapeutics with effective anticancer property and low toxicity.</span></p><span data-dcnode-id="1957" instrument_node="">
</span></div><span data-dcnode-id="1955" instrument_node="">
</span></div><span data-dcnode-id="1953" instrument_node="">
</span><div class="section" data-dcnode-id="1933" data-lvl="1" id="sec_15"><span data-dcnode-id="1952" instrument_node="">
</span><a class="ads-link" data-dcnode-id="1950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ehealthcaresolutions.com/contact-us/" target="_blank"><span data-dcnode-id="1951" instrument_node="">Advertisement</span></a><span data-dcnode-id="1949" instrument_node="">
</span><div class="ads" data-dcnode-id="1948" id="intechopen-intechopen-10"></div><h2 class="heading main-title" data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">9. Conclusion</span></h2><span data-dcnode-id="1945" instrument_node="">
</span><p data-dcnode-id="1935" id="p33"><span data-dcnode-id="1944" instrument_node="">Though, advances in healthcare research lead to the identification and characterization of most breast cancer types and corresponding cure. However, incidence and prevalence of breast cancer is rising in terrifying rate in both developed and developing countries because of various risk factors. Improved synthetic drugs and hormonal therapy emerged in a decline in breast cancer incidences, increased survival, and better life quality. However, prolonged use of synthetic anticancer drugs is linked with several health risks or side effects that consequence from the toxic effect of these drugs in normal cells. Chemoprevention by herbal compounds is of great interest and is considered to be an inexpensive, readily applicable, acceptable, and accessible approach to cancer control and management. Herbal remedies play a significant role in the management of breast cancer and the associated therapeutic toxicity. The adjunct use of herbal products and chemotherapy can be an efficient and cost-effective way to treat breast cancer. Such adjuvant therapy proved to produce a synergistic anticancer effect that reduced the drug toxicity, suppresses drug resistance, and provides quick drug action enhancing the quality of treatment. Besides, combinatory therapy might also increase the therapeutic index of the synthetic partner by improving the efficiency of the drug. Plant-derived anticancer drugs such as vinblastine, vincristine, taxols, etc. showed encouraging chemotherapeutic potential that is currently used in breast cancer treatment and a large number of them are in preclinical or in clinical trials. In the last decade, a vast number of phytochemicals were identified that showed encouraging anticancer activity </span><em data-dcnode-id="1941"><italic data-dcnode-id="1942" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="1943" instrument_node="">in vivo</span></italic></em><span data-dcnode-id="1940" instrument_node=""> and </span><em data-dcnode-id="1937"><italic data-dcnode-id="1938" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="1939" instrument_node="">in vitro</span></italic></em><span data-dcnode-id="1936" instrument_node=""> breast cancer models. Interestingly, several compounds like artemisinin and isothiocyanates showed selective toxicity toward cancer cells, which recommend clinical trials of these compounds. Furthermore, phytoestrogens with affinity and capacity to produce functional responses through estrogen receptors revealed unique possibilities of using them in hormone replacement therapy. Overall, this chapter can conclude that understanding the molecular mechanism of interaction between herbal compounds and cancer cells in the tumoral environment can help us to design novel anticancer drugs that are less toxic and affordable. This reflects the fact that these goals will only be attainable if the herbal compounds that showed promising anticancer activity can be successfully transferred to an ideal clinical setting for the use of herbal therapies.</span></p><span data-dcnode-id="1934" instrument_node="">
