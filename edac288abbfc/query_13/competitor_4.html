rinciples of collaboration, unobstructed discovery, and, most importantly, scientific progression. As PhD students, we found it difficult to access the research we needed, so we decided to create a new Open Access publisher that levels the playing field for scientists across the world. How? By making research easy to access, and puts the academic needs of the researchers before the business interests of publishers.</span></p></div><div class="drop-box" data-dcnode-id="3419" data-v-b33947ae=""><a class="drop-item" data-dcnode-id="3422" data-v-b33947ae="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/authors-and-editors"><span data-dcnode-id="3423" instrument_node="">Our authors and editors</span></a><p data-dcnode-id="3420" data-v-b33947ae=""><span data-dcnode-id="3421" instrument_node="">We are a community of more than 103,000 authors and editors from 3,291 institutions spanning 160 countries, including Nobel Prize winners and some of the world’s most-cited researchers. Publishing on IntechOpen allows authors to earn citations and find new collaborators, meaning more people see your work not only from your own field of study, but from other related fields too.</span></p></div><div class="drop-box" data-dcnode-id="3410" data-v-b33947ae=""><a class="drop-item" data-dcnode-id="3417" data-v-b33947ae="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/page/content-alerts"><span data-dcnode-id="3418" instrument_node="">Content Alerts</span></a><p data-dcnode-id="3415" data-v-b33947ae=""><span data-dcnode-id="3416" instrument_node="">Brief introduction to this section that descibes Open Access especially from an IntechOpen perspective</span></p><a class="nav-item" data-dcnode-id="3413" data-v-b33947ae="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/how-open-access-publishing-with-intechopen-works"><span data-dcnode-id="3414" instr ode="">
                            Advertisement
                        </span></a><div class="ads-link" data-dcnode-id="2966" data-v-e85dd3ce="" id="intechopen-intechopen-5" style="padding-bottom: 4.5rem;"></div></div></div></aside><div class="middle-col" data-dcnode-id="508" data-v-e85dd3ce=""><div class="intro" data-dcnode-id="2955" data-v-46823712="" data-v-e85dd3ce=""><h2 class="title" data-dcnode-id="2959" data-v-46823712=""><span data-dcnode-id="2960" instrument_node="">Abstract</span></h2><div class="body" data-dcnode-id="2956" data-v-46823712=""><p data-dcnode-id="2957" data-v-46823712=""><span data-dcnode-id="2958" instrument_node="">Breast cancer is among the most common type of cancer in women around the globe. Prevention of breast cancer is better than its treatment. Because of the molecular variation and complexity underlying breast cancer occurrence, its treatment by using chemotherapy and/or radiotherapy is very complicated and often leads to undesirable side effects. Plants and their extracts have been used for centuries for the treatment of almost every disease and breast cancer is not an exception. Herbal products can be trusted for cancer treatment because of their low toxicity. Besides, herbal remedies are easily accepted by the majority of woman suffering from breast cancer because of their easy availability and affordability. In the last decade, a large number of plants and their compounds were reported to show promising anticancerous effects against breast cancer cells in both in vivo and in vitro models. However, their beneficial effects on breast cancer treatment are still doubtful due to the lack of randomized clinical trials. This chapter is dedicated to reporting the potential of some herbal products for the prevention and/or treatment of breast cancer. Besides, it focused on the anticarcinogenic mechanism of those phytocompounds to report their potential chemotherapeutic role.</span></p></div></div><div class="keywords keywords-chapters" data-dcnode-id="2943" data-v-260fc791="" data-v-e85dd3ce=""><h3 class="subTitle" data-dcnode-id="2953" data-v-260fc791=""><span data-dcnode-id="2954" instrument_node="">Keywords</span></h3><ul data-dcnode-id="2944" data-v-260fc791=""><li class="item" data-dcnode-id="2951" data-v-260fc791=""><span data-dcnode-id="2952" instrument_node="">herbal remedies</span></li><li class="item" data-dcnode-id="2949" data-v-260fc791=""><span data-dcnode-id="2950" instrument_node=""> phytochemicals</span></li><li class="item" data-dcnode-id="2947" data-v-260fc791=""><span data-dcnode-id="2948" instrument_node=""> phytoestrogens</span></li><li class="item" data-dcnode-id="2945" data-v-260fc791=""><span data-dcnode-id="2946" instrument_node=""> breast cancer</span></li></ul></div><div class="info collapsed" data-dcnode-id="2908" data-v-7ab7a970="" data-v-e85dd3ce="" id="section-chapter-and-author"><div class="toggle-header" data-dcnode-id="2938" data-v-7ab7a970=""><h2 class="title" data-dcnode-id="2941" data-v-7ab7a970=""><span data-dcnode-id="2942" instrument_node="">Author Information</span></h2><a class="title" data-dcnode-id="2939" data-v-7ab7a970=""><span data-dcnode-id="2940" instrument_node="">Show +</span></a></div><div class="wrap" data-dcnode-id="2909" data-v-7ab7a970=""><ul data-dcnode-id="2912" data-v-7ab7a970=""><li class="authorsItem" data-dcnode-id="2930" data-v-7ab7a970=""><h4 class="author" data-dcnode-id="2935" data-v-7ab7a970=""><span data-dcnode-id="2937" instrument_node="">Yahyea Baktiar Laskar</span></h4><span class="position" data-dcnode-id="2931" data-v-7ab7a970=""><ul class="list" data-dcnode-id="2932"><li data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">Natural Product and Biomedicine Research Laboratory, Department of Biotechnology, Assam University, Cachar, Assam, India</span></li></ul></span></li><li class="authorsItem" data-dcnode-id="2922" data-v-7ab7a970=""><h4 class="author" data-dcnode-id="2927" data-v-7ab7a970=""><span data-dcnode-id="2929" instrument_node="">Romen Meitei Lou </span><div class="section" data-dcnode-id="2883" data-lvl="1" id="sec_1"><span data-dcnode-id="2905" instrument_node="">
</span><h2 class="heading main-title" data-dcnode-id="2903"><span data-dcnode-id="2904" instrument_node="">1. Introduction</span></h2><span data-dcnode-id="2902" instrument_node="">
</span><p data-dcnode-id="2885" id="p2"><span data-dcnode-id="2901" instrument_node="">According to World Health Organization (WHO), cancer is the second leading cause of death after cardiovascular diseases and a growing health issue globally. Breast cancer is the most commonly diagnosed type of cancer among females accounting for approximately one-quarter of cancers in females globally. Great research efforts are in place to understand the cause of breast cancer onset, to identify the critical molecular mechanism of its progression, and to define new ways of treating it with lower and limited toxicity. These efforts are certainly encouraging since overall survival has greatly improved in several breast cancer types during the last decade. Since 1990, mortality rates of breast cancer have reduced significantly by 25%, this is at least in part due to the significant improvement in its treatment [</span><a class="ref-link" data-dcnode-id="2899" data-ref-style="bibr" href="#B1"><span data-dcnode-id="2900" instrument_node="">1</span></a><span data-dcnode-id="2898" instrument_node="">]. Treatment of cancer mainly relies on chemotherapy that uses cytotoxic agents for killing cancer cells. However, these agents or drugs affect both cancer cells as well as healthy cells, causing an array of side effects during the therapy or after the therapy. To overcome these problems, current research is emphasized to explore herbal remedies that selectively targets cancer cells. Besides this, unlike other cancer types, breast cancer has diverse genetic mutations that affect several pathways [</span><a class="ref-link" data-dcnode-id="2896" data-ref-style="bibr" href="#B2"><span data-dcnode-id="2897" instrument_node="">2</span></a><span data-dcnode-id="2895" instrument_node="">]. These complexities aid to distinct pathological types with different clinical outcomes [</span><a class="ref-link" data-dcnode-id="2893" data-ref-style="bibr" href="#B3"><span data-dcnode-id="2894" instrument_node="">3</span></a><span data-dcnode-id="2892" instrument_node="">]. Therefore, response to a certain chemotherapeutic drug may differ in different patients and lack of proper treatment plan may increase the toxicity furthermore. One of the encouraging approaches to overcome drug toxicity is to look for alternative medicines that have less or selective toxicity toward cancer cells [</span><a class="ref-link" data-dcnode-id="2890" data-ref-style="bibr" href="#B4"><span data-dcnode-id="2891" instrument_node="">4</span></a><span data-dcnode-id="2889" instrument_node="">]. In recent years, many studies have demonstrated selective cytotoxicity of a variety of herbal compounds that can be used as potential chemotherapeutics [</span><a class="ref-link" data-dcnode-id="2887" data-ref-style="bibr" href="#B4"><span data-dcnode-id="2888" instrument_node="">4</span></a><span data-dcnode-id="2886" instrument_node="">]. Meanwhile, diverse herbal products were reported to prevent and/or palliate the side effects of treatment, improve quality of life, and reduce stress. However, the usefulness of herbal remedies for breast cancer prevention and/or treatment is still ambiguous due to the lack of randomized clinical trials. These objectives will be achievable only if the herbal compounds that showed promising anticancer activity can be successfully transferred to clinical trials.</span></p><span data-dcnode-id="2884" instrument_node="">
