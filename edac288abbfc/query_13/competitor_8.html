 data-dcnode-id="1335"><div class="fullwidth" data-dcnode-id="1336" id="Div_UnACure" style="overflow: hidden; height: auto;"><div class="inaddnew-box" data-dcnode-id="1337" title="Mylabris"><span data-dcnode-id="1338" instrument_node="">Mylabris</span></div></div></div></div><div class="cl" data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node=""> &nbsp;</span></div><div class="syptoms-con" data-dcnode-id="1320"><div data-dcnode-id="1330" style="Font-weight:bold;margin-bottom: 10px;"><span data-dcnode-id="1331" instrument_node=""> Sponsored Links </span></div><div data-dcnode-id="1321" style="margin-top:4px;"><span data-dcnode-id="1327" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-0803530076129388" data-ad-format="link" data-ad-slot="3011105800" data-dcnode-id="1326" style="display:block"></ins><span data-dcnode-id="1325" instrument_node=""> </span><span data-dcnode-id="1322" instrument_node=""> </span></div></div><div class="syptoms-con" data-dcnode-id="1266"><h3 data-dcnode-id="1318" style="margin-bottom:4px;"><span data-dcnode-id="1319" instrument_node="">Description</span></h3><div class="syptoms-row" data-dcnode-id="1268"><span data-dcnode-id="1317" instrument_node="">Esophageal Cancer is a disease of the Esophagus.</span><br data-dcnode-id="1316"><span data-dcnode-id="1315" instrument_node="">The cancer that originates from the lining of the Esophagus is Esophageal Cancer.</span><br data-dcnode-id="1314"><span data-dcnode-id="1313" instrument_node="">Esophagus is a food pipe.  It connects the Throat to the Stomach.  When the food is chewed in the mouth it goes through the Esophagus to the Stomach.   </span><br data-dcnode-id="1312"><span data-dcnode-id="1311" instrument_node="">Normally the cells are divided in a regular manner.  But if the cells are divided in an irregular manner it give rise to Cancer.  It may occur at any part of the Body.  It disrupts the normal function of that part.  Esophageal Cancer causes difficulty in swallowing and painful swallowing.</span><br data-dcnode-id="1310"><br data-dcnode-id="1309"><b data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">Types of Esophageal Cancer </span></b><br data-dcnode-id="1306"><b data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">Squamous Cell Carcinoma : </span></b><span data-dcnode-id="1303" instrument_node=""> It originates from the Squamous Cells of the Esophagus.  Squamous Cells are the thin epithelial flat cells.  They form the upper part of the Esophagus.</span><br data-dcnode-id="1302"><b data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">Adenocarcinoma : </span></b><span data-dcnode-id="1299" instrument_node=""> It occurs in the lower part of the Esophagus.  It occurs when there is abnormal growth of cells in the mucus secreting glands of the Esophagus.</span><br data-dcnode-id="1298"><span data-dcnode-id="1297" instrument_node=""> </span><br data-dcnode-id="1296"><b data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">Causes of Esophageal Cancer </span></b><span data-dcnode-id="1293" instrument_node=""> </span><br data-dcnode-id="1292"><span data-dcnode-id="1291" instrument_node="">Alcohol</span><br data-dcnode-id="1290"><span data-dcnode-id="1289" instrument_node="">Obesity</span><br data-dcnode-id="1288"><span data-dcnode-id="1287" instrument_node="">Smoking</span><br data-dcnode-id="1286"><span data-dcnode-id="1285" instrument_node="">Gene Mutation</span><br data-dcnode-id="1284"><span data-dcnode-id="1283" instrument_node="">Gastroesophageal Reflux Disease</span><br data-dcnode-id="1282"><span data-dcnode-id="1281" instrument_node=""> </span><br data-dcnode-id="1280"><b data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">If not treated properly, Esophageal Cancer may cause </span></b><br data-dcnode-id="1277"><span data-dcnode-id="1276" instrument_node="">Tracheoesophageal Fistula ( hole in the wind pipe )</span><br data-dcnode-id="1275"><br data-dcnode-id="1274"><b data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">Note : </span></b><span data-dcnode-id="1271" instrument_node=""> Find more information on Cancer by visiting the Cancer webpage on this website. </span><a data-dcnode-id="1269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//herbpathy.com/Herbal-Treatment-for-Cancer-Cid39" target="_blank"><span data-dcnode-id="1270" instrument_node="">Clink here to visit the Cancer webpage now.</span></a></div><span data-dcnode-id="1267" instrument_node=""> </span></div><div class="curedBy-row" data-dcnode-id="1248"><div class="inside-label" data-dcnode-id="1262"><h3 class="boldlabel" data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node=""> Common Names </span></h3><span data-dcnode-id="1263" instrument_node=""> </span></div><span data-dcnode-id="1261" instrument_node=""> </span><div class="inside1-box" data-dcnode-id="1249"><span data-dcnode-id="1260" instrument_node=""> </span><div class="fullwidth" data-dcnode-id="1250" id="Div_More" style="overflow: hidden; height: auto;"><div class="inaddnew-box" data-dcnode-id="1257"><a class="fl" data-dcnode-id="1258" href="javascript:void(0)" onclick="RdtDis('Cancer-Esophagus','2')" title="Cancer Esophagus"><span data-dcnode-id="1259" instrument_node="">Cancer Esophagu...</span></a></div><div class="inaddnew-box" data-dcnode-id="1254"><a class="fl" data-dcnode-id="1255" href="javascript:void(0)" onclick="RdtDis('Cancer-of-Esophagus','2')" title="Cancer of Esophagus"><span data-dcnode-id="1256" instrument_node="">Cancer of Esoph...</span></a></div><div class="inaddnew-box" data-dcnode-id="1251"><a class="fl" data-dcnode-id="1252" href="javascript:void(0)" onclick="RdtDis('Esophageal-Cancer','2')" title="Esophageal Cancer"><span data-dcnode-id="1253" instrument_node="">Esophageal Canc...</span></a></div></div></div></div><div class="curedBy-row" data-dcnode-id="1238"><div class="inside-labe ata-dcnode-id="976"><span data-dcnode-id="975" instrument_node="">3. Give him fresh glass of Carrot and Beetroot juice every day.</span><br data-dcnode-id="974"><span data-dcnode-id="973" instrument_node="">4. Give him a bowl of Soursop soup every day.</span><br data-dcnode-id="972"><span data-dcnode-id="971" instrument_node="">5. Add the ingredients in a pan, 1 tablespoon of dessi ghee, 1 tablespoon of Turmeric powder and a pinch of black pepper with some sugar candy. Heat it on low flames for 5 min. Give him 1 tablespoon every day.</span><br data-dcnode-id="970"><span data-dcnode-id="969" instrument_node="">6. Also give him 50 gm of ripen jack fruit every day. In Hindi it is known as kathal.</span><br data-dcnode-id="968"><span data-dcnode-id="967" instrument_node="">Follow this regimen at least for 45 days. And get his test done again. </span></div><span data-dcnode-id="965" instrument_node=""> </span><div class="clr" data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">&nbsp; </span></div><div class="greytxtReview" data-dcnode-id="961"><span data-dcnode-id="962" instrument_node=""> This advice is for educational purpose only. It is not intended to replace a doctor. Please consult your doctor before taking any herb. </span></div><div class="reviewRply" data-dcnode-id="959" disabled="" id="ReplyToReplyBtn11942" onclick="ReplyToReply('15983','4621','2','Herbpathy','11942')" style="display:none;"><span data-dcnode-id="960" instrument_node="">Reply</span></div><div class="reply_box" data-dcnode-id="957" id="Dv_ReplyToBox_11942" name="ReplyToBx" runat="server" style="Display:none;"><span data-dcnode-id="958" instrument_node=""> </span></div><div class="clr" data-dcnode-id="955"><span data-dcnode-id="956" instrument_node=""> &nbsp; </span></div></div></div></div></div><div class="article-herb-otr" data-dcnode-id="888"><div class="w100 fl" data-dcnode-id="942"><div class="herb-rews-otr-img" data-dcnode-id="945"><span class="herb-rews-img-txt" data-dcnode-i v><span class="herb-rews-date" data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">08 Aug 2018</span></span></div><div class="w100 fl mt12" data-dcnode-id="712"><div class="herb-rews-txt" data-dcnode-id="720"><span data-dcnode-id="723" instrument_node="">my father diagnosed with 3rd stage esophageal cancer. doctor suggest us for chemotherapy treatment but because of not permanent cure and other side effects we are afraid to go for it. Is there any other treatment</span><br data-dcnode-id="722"><span data-dcnode-id="721" instrument_node="">in ayurved or in homeopath  by which it can be cure painless. or should we choose chemotherapy? </span></div><span data-dcnode-id="719" instrument_node=""> </span><div class="reviewRply" data-dcnode-id="717" disabled="" id="ReplyBtn24221" onclick="ReplyBx('24221','4621','2','BHARAT KUMAR PRAJAPATI')" style="display:none;"><span data-dcnode-id="718" instrument_node="">Reply</span></div><div class="reply_box" data-dcnode-id="715" id="Dv_ReplyBox_24221" name="ReplyBx" runat="server" style="Display:none;"><span data-dcnode-id="716" instrument_node=""> </span></div><div class="clr" data-dcnode-id="713"><span data-dcnode-id="714" instrument_node=""> &nbsp; </span></div></div></div><div class="article-herb-otr" data-dcnode-id="691"><div class="w100 fl" data-dcnode-id="702"><div class="herb-rews-otr-img" data-dcnode-id="705"><span class="herb-rews-img-txt" data-dcnode-id="709"><span data-dcnode-id="710" instrument_node=""> Evan Pala</span></span><span data-dcnode-id="708" instrument_node=""> </span><span class="herb-rews-img-txt" data-dcnode-id="706" style="margin-left:5px;"><span data-dcnode-id="707" instrument_node="">( India ) </span></span></div><span class="herb-rews-date" data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">25 Sep 2018</span></span></div><div class="w100 fl mt12" data-dcnode-id="692"><div class="herb-rews-txt" data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Hello sir, m  after few days of 1st chemothery.  She take 1 chapati in lunch n 1 in dinner. But when she had her chemo last time she stopped her food </span><br data-dcnode-id="673"><br data-dcnode-id="672"><span data-dcnode-id="671" instrument_node="">Now that her 2nd chemo is due,  I need suggestions from I as to please suggest something so that her immune  turns strong n so that we can help her with side effects of 2nd chemo.  </span><br data-dcnode-id="670"><br data-dcnode-id="669"><span data-dcnode-id="668" instrument_node="">Also plz suggest something for hair growth n weight incremental </span><br data-dcnode-id="667"><span data-dcnode-id="666" instrument_node=""> </span></div><span data-dcnode-id="664" instrument_node=""> </span><div class="reviewRply" data-dcnode-id="662" disabled="" id="ReplyBtn25161" onclick="ReplyBx('25161','4621','2','ANSHIKA CHABRA')" style="display:none;"><span data-dcnode-id="663" instrument_node="">Reply</span></div><div class="reply_box" data-dcnode-id="660" id="Dv_ReplyBox_25161" name="ReplyBx" runat="server" style="Display:none;"><span data-dcnode-id="661" instrument_node=""> </span></div><div class="clr" data-dcnode-id="658"><span data-dcnode-id="659" instrument_node=""> &nbsp; </span></div></div></div><div class="article-herb-otr" data-dcnode-id="636"><div class="w100 fl" data-dcnode-id="647"><div class="herb-rews-otr-img" data-dcnode-id="650"><span class="herb-rews-img-txt" data-dcnode-id="654"><span data-dcnode-id="655" instrument_node=""> Salman</span></span><span data-dcnode-id="653" instrument_node=""> </span><span class="herb-rews-img-txt" data-dcnode-id="651" style="margin-left:5px;"><span data-dcnode-id="652" instrument_node="">( Canada ) </span></span></div><span class="herb-rews-date" data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">10 Dec 2018</span></span></div><div class="w100 fl mt12" data-dcnode-id="637"><div class="herb-rews-txt" data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">My Father (
