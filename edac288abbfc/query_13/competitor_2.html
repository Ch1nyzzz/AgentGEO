kickback schemes from pharmaceutical companies to doctors to precribe only expensive drugs for cancer. If there was a simple cure that ACTUALLY worked we would be happy to prescribe it for our patients and our loved ones. There would be NO way to keep this a secret throughout the millions of people that work in the healthcare field. When I say a cure that actually works I mean supported by good research studies not because your friend of a friend's aunt was miraculous cured. </span></span></p><span data-dcnode-id="3404" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3401" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3402" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3403" instrument_node="">As a board certified physician for the last 15 years I've seen many patients, friends and family members die of cancer. It's because it's CANCER!! It's a bad life threatening disease that's very difficult to treat most of the time. Even a billionaire like Steve Jobs will die of cancer because it's JUST NOT treatable... Not because we're trying to keep a miracle cure from you. </span></span></p><span data-dcnode-id="3400" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3397" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3398" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3399" instrument_node="">If you or your love ones are diagnosed with cancer I BEG of you to consult with a board certified oncologist and NOT go looking for a "natural" cure. While you're undergoing this bogus treatment your cancer will grow and spread and by the time you see a real cancer specialist it will be likely untreatable at that point. </span></span></p><span data-dcnode-id="3396" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3393" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3394" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3395" instrument_node="">Thank you. I'm getting off the soapbox now.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3311" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="3312" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="3313" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="3327" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="3359" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="3360" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="3370" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="3371" style="box-sizing: border-box; position: relative;"><button aria-label="118 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inlin u-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="2737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quora.com/What-drugs-exist-for-cancer-other-than-chemotherapy%3Fno_redirect%3D1" style="box-sizing: border-box; border-radius: inherit;" target="_top"><span data-dcnode-id="2738" instrument_node="">What drugs exist for cancer other than chemotherapy?</span></a></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--white qu-cursor--pointer ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="2664" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit;" tabindex="0" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="2665" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="2666" style="box-sizing: border-box; position: relative;"><div class="q-absolute qu-full qu-zIndex--base" data-dcnode-id="2735" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="2667" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="2707" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="2708" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="2709" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="2710" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="2711" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2732" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2733" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2734" instrument_node="">The range of cancer treatments extends far beyond chemotherapy today. There are more than a hundred chemotherapy drugs, some which have little in the way of the traditional chemotherapy side effects; no hair loss, no nausea, no vomiting.</span></span></p><span data-dcnode-id="2731" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2728" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2729" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2730" instrument_node="">For some cancers, there are no substitutes for chemotherapy. These include testicular cancer, ovarian cancer, some types and stages of breast cancer, colorectal cancer, aggressive lymphomas, some types and stages of lung cancer.</span></span></p><span data-dcnode-id="2727" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2724" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2725" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2726" instrument_node="">In many of the above, other treatments are added to chemotherapy in certain clinical situations but those treatments are not typically </span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="2712" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="2713" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="2714" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="2715" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="2716" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="2721" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="2722" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="2723" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="2717" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="2718"><svg data-dcnode-id="2719" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="2720" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="2668" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="2669" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="2670"><span class="q-box qu-userSelect--text" data-dcnode-id="2671" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2704" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2705" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2706" instrument_node="">The range of cancer treatments extends far beyond chemotherapy today. There are more than a hundred chemotherapy drugs, some which have little in the way of the traditional chemotherapy side effects; no hair loss, no nausea, no vomiting.</span></span></p><span data-dcnode-id="2703" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2700" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2701" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2702" instrument_node="">For some cancers, there are no substitutes for chemotherapy. These include testicular cancer, ovarian cancer, some types and stages of breast cancer, colorectal cancer, aggressive lymphomas, some types and stages of lung cancer.</span></span></p><span data-dcnode-id="2699" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2696" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2697" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2698" instrument_node="">In many of the above, other treatments are added to chemotherapy in certain clinical situations but those treatments are not typically give in lieu of chemotherapy.</span></span></p><span data-dcnode-id="2695" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2692" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2693" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2694" instrument_node="">Those non chemotherapy treatments are put into broad categories of targeted therapies and immunotherapies.</span></span></p><span data-dcnode-id="2691" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2688" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2689" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2690" instrument_node="">The advance in targeted therapies coincided with tumor gene/mutation sequencing with a gigantic effort from biotech and Pharma to develop drugs targeting those mutations. Examples of success include the targeting drugs and antibodies developed to target HER2 breast cancers (15%) and the targeting oral drugs for lung cancer that about 20–25% of patients have (EGFR, ALK, ROS1, and soon RET and MET).</span></span></p><span data-dcnode-id="2687" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2684" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2685" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2686" instrument_node="">The advances in immunotherapy have been simply remarkable as evidenced by President Carter’s remission from what was formerly an impossible to treat cancer, metastatic melanoma to the brain. These advances include the immunotherapy checkpoint inhibitors and CAR-T.</span></span></p><span data-dcnode-id="2683" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2680" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2681" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2682" instrument_node="">Immune checkpoint inhibitors are now available for most lung cancers, triple negative breast cancer, head and neck cancers, kidney cancers, melanoma, bladder cancer and some GYN cancers.</span></span></p><span data-dcnode-id="2679" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2676" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2677" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2678" instrument_node="">But for some patients, taking a targeting drug or immunotherapy is not necessarily a walk in the park and some have relatively rare but catastrophic side effects that lead to treatment related fatalities.</span></span></p><span data-dcnode-id="2675" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2672" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2673" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2674" instrument_node="">As in many things in life, chemotherapy isn’t black and white, and so with these other drugs. If in total, the benefits of treatment outweigh the risks, then they are used in the appropriate situation. If not, then the clinically astute oncologist will not recommend the treatment because the treatment should not be worse than the disease.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2595" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="2596" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="2597" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="2611" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="2638" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="2639" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="2649" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="2650" style="box-sizing: border-box; position: relative;"><button aria-label="26 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex rdBreak--break-word qu-textAlign--start" data-dcnode-id="2101" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2102" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2103" instrument_node="">To your question, yes.</span></span></p><ul class="q-box" data-dcnode-id="2085" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: disc; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="2098" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2099" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2100" instrument_node="">Many plant foods and herbs have useful in vitro and/or in vivo anti-cancer effects. Conversely, animal protein (including fish, chicken and dairy) may drive cancer progression. Avoid high glycemic foods and simple sugars.</span></span></li><li class="q-relative" data-dcnode-id="2095" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2096" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2097" instrument_node="">Exercise prolongs survival and decreases relapse for many cancers. Aim for a minimum of 25 MET per week.</span></span></li><li class="q-relative" data-dcnode-id="2092" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2093" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2094" instrument_node="">Not sure about research quality, but a few studies show immune system benefits from meditation and chi kung. If nothing else, these reduce stress.</span></span></li><li class="q-relative" data-dcnode-id="2089" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2090" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2091" instrument_node="">Psychotherapy to process trauma may be worthwhile given trauma’s possible role in inflammation and cancer, e.g. the ACES Study.</span></span></li><li class="q-relative" data-dcnode-id="2086" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="2087" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2088" instrument_node="">Some research suggests that chemo and radiation kill more tumor and less normal tissue in fasted patients.</span></span></li></ul><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2075" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2083" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2084" instrument_node="">Specifics are beyond scope here, but books and resources to get started include Radical Remission, Anti-Cancer a New Way of Living (?), Forks Over Knives, Fat, Sick and Nearly Dead, and </span></span><span class="q-inline" data-dcnode-id="2076" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="2081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//nutritionfacts.org/" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="nutritionfacts.org"><span data-dcnode-id="2082" instrument_node="">NutritionFacts.org | The Latest in Nutrition Related Research</span></a><span class="q-inlineBlock" data-dcnode-id="2077" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="2078"><svg data-dcnode-id="2079" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="2080" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span></p><span data-dcnode-id="2074" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2071" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2072" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2073" instrument_node="">Unfortunately, there's also a lot of garbage out there on this subject, so look for ideas that have peer reviewed research backing them.</span></span></p><span data-dcnode-id="2070" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2067" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2068" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2069" instrument_node="">That said, also be wary of, “if there's no research specifically proving it, it's nonsense.”</span></span></p><span data-dcnode-id="2066" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2063" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2064" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2065" instrument_node="">For example, while there may not be a study ‘proving’ plant based diets are better for cancer, though The China Study comes close, many studies suggest animal protein may be bad for cancer via mechanisms like IGF-1 signalling, and many studies suggest that specific foods, e.g. berries, greens and garlic have potent anti-cancer effects.</span></span></p><span data-dcnode-id="2062" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2059" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2060" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2061" instrument_node="">Academic researchers may have the time to wait for a verdict, but cancer survivors may be wiser to run with a reasonable hypothesis if it's not harmful.</span></span></p><span data-dcnode-id="2058" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2055" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2056" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2057" instrument_node="">Cancer is a grave illness, difficult to survive in its latter stages by any means, so it makes sense to stack the deck in your favor by checking as many complementary boxes as possible.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1983" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1984" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap -dcnode-id="1838" instrument_node="">How does it work?</span></span></p><span data-dcnode-id="1835" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1832" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1833" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1834" instrument_node="">Being a combination of varying wavelengths, it can act on various targets of the body such as scars, hair, skin and skin pigment.</span></span></p><span data-dcnode-id="1831" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1828" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1829" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1830" instrument_node="">What are the benefits of IPL?</span></span></p><span data-dcnode-id="1827" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1824" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1825" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1826" instrument_node="">It can be used for many cosmetic concerns like:</span></span></p><ul class="q-box" data-dcnode-id="1798" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: disc; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="1819" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="1822" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1823" instrument_node="">Laser hair reduction: </span></span><span data-dcnode-id="1820" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1821" instrument_node="">Not the first line treatment for LHR, but if required it can target thick hair growth.</span></span></li><li class="q-relative" data-dcnode-id="1814" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="1817" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1818" instrument_node="">Photodamaged skin: </span></span><span data-dcnode-id="1815" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1816" instrument_node="">The commonest cause of premature ageing is sun exposure. These changes are known as photoageing. It manifests as dry, atrophic skin, fine lines and wrinkles and superficial prominent capillaries known as telangiectasias. IPL can work on the haemoglobin inside blood vessels to reduce redness, skin capillaries and flushing. This is how it works as an antiageing facial.</span></span></li><li class="q-relative" data-dcnode-id="1809" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="1812" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1813" instrument_node="">Uneven skin tone</span></span><span data-dcnode-id="1810" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1811" instrument_node="">: It can also target dullness of skin.</span></span></li><li class="q-relative" data-dcnode-id="1804" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="1807" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1808" instrument_node="">Acne scars:</span></span><span data-dcnode-id="1805" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1806" instrument_node=""> Rarely, it is also used to improve acne scars and open pores.</span></span></li><li class="q-relative" data-dcnode-id="1799" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="1802" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1803" instrument_node="">Tattoo removal:</span></span><span data-dcnode-id="1800" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1801" instrument_node=""> Not the first choice for tattoo removal, but can be used.</span></span></li></ul></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1726" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1727" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="1728" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="1742" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="1764" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="1765" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="1775" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="1776" style="box-sizing: border-box; position: relative;"><button aria-label="2 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined q lass="q-relative" data-dcnode-id="1410" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="1411" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1412" instrument_node="">Exercise!!! Very important</span></span></li><li class="q-relative" data-dcnode-id="1407" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="1408" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1409" instrument_node="">Massage - should not hurt</span></span></li><li class="q-relative" data-dcnode-id="1404" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="1405" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1406" instrument_node="">Careful energy pacing</span></span></li><li class="q-relative" data-dcnode-id="1401" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="1402" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1403" instrument_node="">Meditation</span></span></li></ul><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1395" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1396" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1399" instrument_node=""></span><br data-dcnode-id="1398"><span data-dcnode-id="1397" instrument_node="">I also use daily medications for sleep.  Without good sleep I'm a mess. A comfortable mattress, such as memory foam, is also essential.</span></span></p></span></span></div><div data-dcnode-id="1391"></div></div></div></div><div class="q-text qu-dynamicFontSize--small qu-mt--small qu-color--gray_light qu-
