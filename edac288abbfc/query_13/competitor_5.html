</span><a aria-controls="fl-accordion-5cf02b7f138af-panel-0" class="fl-accordion-button-icon" data-dcnode-id="2616" href="#" id="fl-accordion-5cf02b7f138af-icon-0" tabindex="0"><i class="fl-accordion-button-icon fl-accordion-button-icon-right fas fa-minus" data-dcnode-id="2617"><span class="sr-only" data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">Collapse</span></span></i></a><span data-dcnode-id="2615" instrument_node="">
</span></div><span data-dcnode-id="2613" instrument_node="">
</span><div aria-hidden="false" aria-labelledby="fl-accordion-5cf02b7f138af-tab-0" aria-live="polite" class="fl-accordion-content fl-clearfix" data-dcnode-id="2595" id="fl-accordion-5cf02b7f138af-panel-0" role="tabpanel" style="display: block;"><p data-dcnode-id="2611"><span data-dcnode-id="2612" instrument_node="">This may be the most impressive and successful studies in cancer research. The study was conducted by the University of CA, San Diego and the Gerson Research Organization, title, “5-Year Survival Rates of Melanoma Patients treated by diet and therapy after the manner of Gerson.”</span></p><span data-dcnode-id="2610" instrument_node="">
</span><p data-dcnode-id="2606"><strong data-dcnode-id="2608"><span data-dcnode-id="2609" instrument_node="">CONCLUSIONS:</span></strong><span data-dcnode-id="2607" instrument_node=""> The 5-year survival rates reported here are considerably higher than those reported elsewhere. Stage IIIA/B males had exceptionally high survival rates compared with those reported by other centers.</span></p><span data-dcnode-id="2605" instrument_node="">
</span><p data-dcnode-id="2601"><strong data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node="">RESULTS SUMMARIZED:</span></strong><span data-dcnode-id="2602" instrument_node=""> Of 14 patients with stages I and II (localized) melanoma, 100% survived for 5 years, compared with 79%. Of 17 with stage IIIA (regionally metastasized) melanoma, 82% were alive at 5 years, in contrast to 39%. Of 33 with combined stages IIIA + IIIB (regionally metastasized) melanoma, 70% lived 5 years, compared with 41% of 134. Of 18 with stage IVA melanoma, 39% were alive at 5 years, compared with only 6%. Survival impact was not assessed for stage IVB.</span></p><span data-dcnode-id="2600" instrument_node="">
</span><p data-dcnode-id="2597"><a data-dcnode-id="2598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//chipsa.com/download/GRO5yrgs.pdf" rel="noopener" target="_blank"><span data-dcnode-id="2599" instrument_node="">http://chipsa.com/download/GRO5yrgs.pdf</span></a></p><span data-dcnode-id="2596" instrument_node="">
</span></div><span data-dcnode-id="2594" instrument_node="">

</span><div aria-controls="fl-accordion-5cf02b7f138af-panel-1" aria-expanded="false" aria-selected="false" class="fl-accordion-button" data-dcnode-id="2581" id="fl-accordion-5cf02b7f138af-tab-1" role="tab" tabindex="0"><span data-dcnode-id="2590" instrument_node="">
</span><a aria-controls="fl-accordion-5cf02b7f138af-panel-1" class="fl-accordion-button-label" data-dcnode-id="2588" href="#" id="fl-accordion-5cf02b7f138af-label-1" tabindex="0"><span data-dcnode-id="2589" instrument_node="">Gonzalez Pancreatic Pilot Study</span></a><span data-dcnode-id="2587" instrument_node="">
</span><a aria-controls="fl-accordion-5cf02b7f138af-panel-1" class="fl-accordion-button-icon" data-dcnode-id="2583" href="#" id="fl-accordion-5cf02b7f138af-icon-1" tabindex="0"><i class="fl-accordion-button-icon fl-accordion-button-icon-right fas fa-plus" data-dcnode-id="2584"><span class="sr-only" data-dcnode-id="2585"><span data-dcnode-id="2586" instrument_node="">Expand</span></span></i></a><span data-dcnode-id="2582" instrument_node="">
</span></div><span data-dcnode-id="2580" instrument_node="">
</span><div aria-hidden="true" aria-labelledby="fl-accordion-5cf02b7f138af-tab-1" aria-live="polite" class="fl-accordion-content fl-clearfix" data-dcnode-id="2559" id="fl-accordion-5cf02b7f138af-panel-1" role="tabpanel"><p data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">This pilot study most likely has the world’s best results for any study ever conducted on pancreatic cancer.</span></p><span data-dcnode-id="2577" instrument_node="">
</span><p data-dcnode-id="2573"><strong data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">RESULTS:</span></strong><span data-dcnode-id="2574" instrument_node=""> As of 12 January 1999, of 11 patients entered into the study, 9 (81%) survived one year, 5 (45%) survived two years, and at this time, 4 have survived three years. Two patients are alive and doing well: one at three years and the other at four years.</span></p><span data-dcnode-id="2572" instrument_node="">
</span><p data-dcnode-id="2568"><strong data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">CONCLUSION:</span></strong><span data-dcnode-id="2569" instrument_node=""> These results are far above the 25% survival at one year and 10% survival at two years for all stages of pancreatic adenocarcinoma reported in the National Cancer Data Base from 1995.</span></p><span data-dcnode-id="2567" instrument_node="">
</span><p data-dcnode-id="2564"><a data-dcnode-id="2565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dr-gonzalez.com/pilot_study_abstract.htm" rel="noopener" target="_blank"><span data-dcnode-id="2566" instrument_node="">http://www.dr-gonzalez.com/pilot_study_abstract.htm</span></a></p><span data-dcnode-id="2563" instrument_node="">
</span><p data-dcnode-id="2561"><span data-dcnode-id="2562" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2560" instrument_node="">

</span><div aria-controls="fl-accordion-5cf02b7f138af-panel-2" aria-expanded="false" aria-selected="false" class="fl-accordion-button" data-dcnode-id="2545" id="fl-accordion-5cf02b7f138af-tab-2" role="tab" tabindex="0"><span data-dcnode-id="2554" instrument_node="">
</span><a aria-controls="fl-accordion-5cf02b7f138af-panel-2" class="fl-accordion-button-label" data-dcnode-id="2552" href="#" id="fl-accordion-5cf02b7f138af-label-2" tabindex="0"><span data-dcnode-id="2553" instrument_node="">Spontaneous Remission Study</span></a><span data-dcnode-id="2551" instrument_node="">
</span><a aria-controls="fl-accordion-5cf02b7f138af-panel-2" class="fl-accordion-button-icon" data-dcnode-id="2547" href="#" id="fl-accordion-5cf02b7f138af-icon-2" tabindex="0"><i class="fl-accordion-button-icon fl-accordion-button-icon-right fas fa-plus" data-dcnode-id="2548"><span class="sr-only" data-dcnode-id="2549"><span data-dcnode-id="2550" instrument_node="">Expand</span></span></i></a><span data-dcnode-id="2546" instrument_node="">
</span></div><span data-dcnode-id="2544" instrument_node="">
</span><div aria-hidden="true" aria-labelledby="fl-accordion-5cf02b7f138af-tab-2" aria-live="polite" class="fl-accordion-content fl-clearfix" data-dcnode-id="2536" id="fl-accordion-5cf02b7f138af-panel-2" role="tabpanel"><p data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">Researchers at the University of Victoria in British Columbia did a careful follow up on 200 persons who underwent a “spontaneous regression of cancer”. They found that 87% of those persons had switched diets, usually to a vegetarian diet!!!</span></p><span data-dcnode-id="2541" instrument_node="">
</span><p data-dcnode-id="2538"><a data-dcnode-id="2539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ocra-oregon.org/foodsthatfightcancer.pdf" rel="noopener" target="_blank"><span data-dcnode-id="2540" instrument_node="">http://www.ocra-oregon.org/foodsthatfightcancer.pdf</span></a></p><span data-dcnode-id="2537" instrument_node="">
</span></div><span data-dcnode-id="2535" instrument_node="">
</span></div><span data-dcnode-id="2533" instrument_node="">
</span><div class="fl-accordion-item" data-dcnode-id="2508"><span data-dcnode-id="2532" instrument_node="">
</span><div aria-controls="fl-accordion-5cf02b7f138af-panel-3" aria-expanded="false" aria-selected="false" class="fl-accordion-button" data-dcnode-id="2522" id="fl-accordion-5cf02b7f138af-tab-3" role="tab" tabindex="0"><span data-dcnode-id="2531" instrument_node="">
</span><a aria-controls="fl-accordion-5cf02b7f138af-panel-3" class="fl-accordion-button-label" data-dcnode-id="2529" href="#" id="fl-accordion-5cf02b7f138af-label-3" tabindex="0"><span data-dcnode-id="2530" instrument_node="">Macrobiotics and Cancer</span></a><span data-dcnode-id="2528" instrument_node="">
</span><a aria-controls="fl-accordion-5cf02b7f138af-panel-3" class="fl-accordion-button-icon" data-dcnode-id="2524" href="#" id="fl-accordion-5cf02b7f138af-icon-3" tabindex="0"><i class="fl-accordion-button-icon fl-accordion-button-icon-right fas fa-plus" data-dcnode-id="2525"><span class="sr-only" data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">Expand</span></span></i></a><span data-dcnode-id="2523" instrument_node="">
</span></div><span data-dcnode-id="2521" instrument_node="">
</span><div aria-hidden="true" aria-labelledby="fl-accordion-5cf02b7f138af-tab-3" aria-live="polite" class="fl-accordion-content fl-clearfix" data-dcnode-id="2510" id="fl-accordion-5cf02b7f138af-panel-3" role="tabpanel"><p data-dcnode-id="2519"><span data-dcnode-id="2520" instrument_node="">1-year survival rate among patients with pancreatic cancer was significantly higher among those who modified their diet than among those who did not (17 months versus 6 months). The one-year survival rate was 54.2 percent in the macrobiotic patients versus 10.0 percent in the controls. All comparisons were statistically significant. For patients with metastatic prostate cancer, a case control study demonstrated that those who ate macrobiotically lived longer (177 months compared to 91 months) and enjoyed an improved quality of life.</span></p><span data-dcnode-id="2518" instrument_node="">
</span><p data-dcnode-id="2515"><a data-dcnode-id="2516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kushiinstitute.org/html/research.html%23two" rel="noopener" target="_blank"><span data-dcnode-id="2517" instrument_node="">http://www.kushiinstitute.org/html/research.html#two</span></a></p><span data-dcnode-id="2514" instrument_node="">
</span><p data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2511" instrument_node="">

</span><a aria-controls="fl-accordion-5cf02b7f138af-panel-4" class="fl-accordion-button-label" data-dcnode-id="2503" href="#" id="fl-accordion-5cf02b7f138af-label-4" tabindex="0"><span data-dcnode-id="2504" instrument_node="">Chemotherapy Study</span></a><span data-dcnode-id="2502" instrument_node="">
</span><a aria-controls="fl-accordion-5cf02b7f138af-panel-4" class="fl-accordion-button-icon" data-dcnode-id="2498" href="#" id="fl-accordion-5cf02b7f138af-icon-4" tabindex="0"><i class="fl-accordion-button-icon fl-accordion-button-icon-right fas fa-plus" data-dcnode-id="2499"><span class="sr-only" data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">Expand</span></span></i></a><span data-dcnode-id="2497" instrument_node="">
</span></div><span data-dcnode-id="2495" instrument_node="">
</span><div aria-hidden="true" aria-labelledby="fl-accordion-5cf02b7f138af-tab-4" aria-live="polite" class="fl-accordion-content fl-clearfix" data-dcnode-id="2487" id="fl-accordion-5cf02b7f138af-panel-4" role="tabpanel"><p data-dcnode-id="2493"><span data-dcnode-id="2494" instrument_node="">Want more information on chemotherapy specific to different types of cancer? This was a mega-study done by the Department of Radiation Oncology, Northern Sydney Cancer Centre…. RESULTS: The overall contribution of curative and adjuvant cytotoxic chemotherapy to 5-year survival in adults was estimated to be 2.3% in Australia and 2.1% in the USA. CONCLUSION: As the 5-year relative survival rate for cancer in Australia is now over 60%, it is clear that cytotoxic chemotherapy only makes a minor contribution to cancer survival. To justify the continued funding and availability of drugs used in cytotoxic chemotherapy, a rigorous evaluation of the cost-effectiveness and impact on quality of life is urgently required. – Full study attached.</span></p><span data-dcnode-id="2492" instrument_node="">
</span><p data-dcnode-id="2489"><a data-dcnode-id="2490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//fiocco59.altervista.org/ALLEGATI/MORGAN.PDF" rel="noopener" target="_blank"><span data-dcnode-id="2491" instrument_node="">http://fiocco59.altervista.org/ALLEGATI/MORGAN.PDF</span></a></p><span data-dcnode-id="2488" instrument_node="">
</span></div><span data-dcnode-id="2486" instrument_node="">
</span></div><span data-dcnode-id="2484" instrument_node="">

</span><div aria-controls="fl-accordion-5cf02b7f138af-panel-5" aria-expanded="false" aria-selected="false" class="fl-accordion-button" data-dcnode-id="2473" id="fl-accordion-5cf02b7f138af-tab-5" role="tab" tabindex="0"><span data-dcnode-id="2482" instrument_node="">
</span><a aria-controls="fl-accordion-5cf02b7f138af-panel-5" class="fl-accordion-button-label" data-dcnode-id="2480" href="#" id="fl-accordion-5cf02b7f138af-label-5" tabindex="0"><span data-dcnode-id="2481" instrument_node="">IPT Uruguay Study on Breast Cancer</span></a><span data-dcnode-id="2479" instrument_node="">
</span><a aria-controls="fl-accordion-5cf02b7f138af-panel-5" class="fl-accordion-button-icon" data-dcnode-id="2475" href="#" id="fl-accordion-5cf02b7f138af-icon-5" tabindex="0"><i class="fl-accordion-button-icon fl-accordion-button-icon-right fas fa-plus" data-dcnode-id="2476"><span class="sr-only" data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">Expand</span></span></i></a><span data-dcnode-id="2474" instrument_node="">
</span></div><span data-dcnode-id="2472" instrument_node="">
</span><div aria-hidden="true" aria-labelledby="fl-accordion-5cf02b7f138af-tab-5" aria-live="polite" class="fl-accordion-content fl-clearfix" data-dcnode-id="2461" id="fl-accordion-5cf02b7f138af-panel-5" role="tabpanel"><p data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">Is this the future of chemotherapy? In 2003, the first clinical trial for cancer treatment with IPT was published in Uruguay. It showed improved clinical outcome for patients with advanced breast cancer. Also, in a another study In 2009, a Bulgarian three-year study showed that IPT improved patients’ quality of life. The researchers stated that they “sincerely believe that the method presents a compelling opportunity for solving the problem with chemotherapy’s toxicity, for improving treatment effectiveness and quality of life.” Note – IPT is NOT yet approved by the FDA. Attached is the Uruguay study.</span></p><span data-dcnode-id="2469" instrument_node="">
</span><p data-dcnode-id="2466"><a data-dcnode-id="2467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//linchitzipt.com/files/uruguay2004.pdf" rel="noopener" target="_blank"><span data-dcnode-id="2468" instrument_node="">http://linchitzipt.com/files/uruguay2004.pdf</span></a></p><span data-dcnode-id="2465" instrument_node="">
</span><p data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2462" instrument_node="">

</span><a aria-controls="fl-accordion-5cf02b7f138af-panel-6" class="fl-accordion-button-label" data-dcnode-id="2454" href="#" id="fl-accordion-5cf02b7f138af-label-6" tabindex="0"><span data-dcnode-id="2455" instrument_node="">Small Cell Lung Cancer (Vitamins)</span></a><span data-dcnode-id="2453" instrument_node="">
</span><a aria-controls="fl-accordion-5cf02b7f138af-panel-6" class="fl-accordion-button-icon" data-dcnode-id="2449" href="#" id="fl-accordion-5cf02b7f138af-icon-6" tabindex="0"><i class="fl-accordion-button-icon fl-accordion-button-icon-right fas fa-plus" data-dcnode-id="2450"><span class="sr-only" data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">Expand</span></span></i></a><span data-dcnode-id="2448" instrument_node="">
</span></div><span data-dcnode-id="2446" instrument_node="">
</span><div aria-hidden="true" aria-labelledby="fl-accordion-5cf02b7f138af-tab-6" aria-live="polite" class="fl-accordion-content fl-clearfix" data-dcnode-id="2438" id="fl-accordion-5cf02b7f138af-panel-6" role="tabpanel"><p data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">Study by Jaakkola – RESULTS: From the time of diagnosis, at 6 months, the survival of the SEER (Conventional) group was 50% and the Nutrient group almost 95%; at 12 months, 20% of the SEER group and 85% of the Nutrient group was still alive; at 24 months, survival for the SEER group was only 10%, while 55% of the Nutrient group was still alive; at 30 months, only about 1% of the SEER group was still alive while 40% of the Nutrient group was still living, and ***finally at 6 years or 72 months, all of the SEER group had passed on, while 44% (8 of 18 patients) of the Nutrient group was still alive.***</span></p><span data-dcnode-id="2443" instrument_node="">
</span><p data-dcnode-id="2440"><a data-dcnode-id="2441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.townsendletter.com/Oct2011/intoncol1011.html" rel="noopener" target="_blank"><span data-dcnode-id="2442" instrument_node="">http://www.townsendletter.com/Oct2011/intoncol1011.html</span></a></p><span data-dcnode-id="2439" instrument_node="">

</span><a aria-controls="fl-accordion-5cf02b7f138af-panel-7" class="fl-accordion-button-label" data-dcnode-id="2431" href="#" id="fl-accordion-5cf02b7f138af-label-7" tabindex="0"><span data-dcnode-id="2432" instrument_node="">Vitamin C Study; Linus Pauling two-time Nobel Prize winner</span></a><span data-dcnode-id="2430" instrument_node="">
</span><a aria-controls="fl-accordion-5cf02b7f138af-panel-7" class="fl-accordion-button-icon" data-dcnode-id="2426" href="#" id="fl-accordion-5cf02b7f138af-icon-7" tabindex="0"><i class="fl-accordion-button-icon fl-accordion-button-icon-right fas fa-plus" data-dcnode-id="2427"><span class="sr-only" data-dcnode-id="2428"><span data-dcnode-id="2429" instrument_node="">Expand</span></span></i></a><span data-dcnode-id="2425" instrument_node="">
</span></div><span data-dcnode-id="2423" instrument_node="">
</span><div aria-hidden="true" aria-labelledby="fl-accordion-5cf02b7f138af-tab-7" aria-live="polite" class="fl-accordion-content fl-clearfix" data-dcnode-id="2412" id="fl-accordion-5cf02b7f138af-panel-7" role="tabpanel"><p data-dcnode-id="2421"><span data-dcnode-id="2422" instrument_node="">“100 terminal cancer patients – After 10 days of intravenous Vitamin C therapy, each patient was given 10 grams of vitamin C orally each day indefinitely. RESULTS: The mean survival time for the ascorbate group (Vitamin C) was 4.2 TIME MORE than the control subjects (more than 210 days compared to 50 days for the controls). An analysis of the survival-time curves indicated that deaths occurred for about 90% of the ascorbate-treated patients at one-third the rate for the controls and that the other 10% had a much greater survival time, averaging more than 20 times the controls. CONCLUSION: Cameron and Pauling concluded that high doses of vitamin C should be given to all cancer patients.” The full study is on page 62 of the PDF.</span></p><span data-dcnode-id="2420" instrument_node="">
</span><p data-dcnode-id="2417"><a data-dcnode-id="2418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.breastcancerchoices.org/files/Schachter_PDF_File_from_ICIM_Journal.pdf" rel="noopener" target="_blank"><span data-dcnode-id="2419" instrument_node="">http://www.breastcancerchoices.org/files/Schachter_PDF_File_from_ICIM_Journal.pdf</span></a></p><span data-dcnode-id="2416" instrument_node="">

</span><p data-dcnode-id="2300"><strong data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">The Effect of Vitamin D &amp; Celebrex® on Breast Cancer Biomarkers</span></strong></p><span data-dcnode-id="2299" instrument_node="">
</span><p data-dcnode-id="2296"><em data-dcnode-id="2297"><span data-dcnode-id="2298" instrument_node="">Breast Cancer Prevention Using Synergistic Prostaglandin Inhibitors (The Vitamin D/Celecoxib Study) (NCT01425476)</span></em></p><span data-dcnode-id="2295" instrument_node="">
</span><p data-dcnode-id="2292"><strong data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">Summary</span></strong></p><span data-dcnode-id="2291" instrument_node="">
</span><p data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">Some studies have suggested that inflammation in the body may increase breast cancer risk. Vitamin D helps the body absorb and maintain the right amount of calcium in the blood. It also helps control cell growth and reduce inflammation. Celecoxib (Celebrex®) is a drug that reduces inflammation by inhibiting an enzyme called COX-2. The purpose of this study is to determine if vitamin D alone or in combination with Celebrex decreases levels of certain biological markers (biomarkers) thought to be related to breast cell changes and breast cancer risk.</span></p><span data-dcnode-id="2288" instrument_node="">
</span></div><span data-dcnode-id="2286" instrument_node="">
</span></div><span data-dcnode-id="2284" instrument_node="">

</span><p data-dcnode-id="2270"><strong data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">Effect of Tumeric on Breast Tissue in Obese, High-Risk Women</span></strong></p><span data-dcnode-id="2269" instrument_node="">
</span><p data-dcnode-id="2266"><em data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">Nanoemulsion Curcumin for Obesity, Inflammation and Breast Cancer Prevention - a Pilot Trial (NCT01975363)</span></em></p><span data-dcnode-id="2265" instrument_node="">
</span><p data-dcnode-id="2262"><strong data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node="">Summary</span></strong></p><span data-dcnode-id="2261" instrument_node="">
</span><p data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">Laboratory studies suggest that tumeric (curcumin) may have anti-cancer effects. This may be because tumeric can reduce inflammation, which has been linked to cancer growth. Researchers think that tumeric may reduce inflammation in fat tissue and breast tissue, which may decrease breast cancer risk. This pilot study is looking at the effect that tumeric has on the breast tissue of obese women who are at high risk for breast cancer.</span></p><span data-dcnode-id="2258" instrument_node="">

</span><div class="fl-col fl-node-5db0942ebb3ca fl-col-small" data-dcnode-id="2207" data-node="5db0942ebb3ca"><span data-dcnode-id="2235" instrument_node="">

</span><p data-dcnode-id="2228"><strong data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node="">Reducing the Risk of Breast Cancer with Omega-3 Fatty Acids and Weight Loss</span></strong></p><span data-dcnode-id="2227" instrument_node="">
</span><p data-dcnode-id="2224"><em data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">Randomized Pilot Trial of Omega-3 Fatty Acids or Placebo in Peri- or Post-Menopausal Women at High Risk for Breast Cancer Undergoing a Weight Loss Intervention (NCT02101970)</span></em></p><span data-dcnode-id="2223" instrument_node="">
</span><p data-dcnode-id="2220"><strong data-dcnode-id="2221"><span data-dcnode-id="2222" instrument_node="">Summary</span></strong></p><span data-dcnode-id="2219" instrument_node="">
</span><p data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">Studies have found that women who are overweight are at increased risk for developing breast cancer. This may be because obesity is linked to chronic inflammation in breast tissue, which has been shown to increase breast cancer risk. Omega-3 fatty acids cannot be made by the body and must be obtained from food or supplements. Studies suggest that omega-3 fatty acids have the ability to resolve chronic inflammation. This study is investigating whether adding a high dose of omega-3 fatty acids to a weight loss program reduces inflammation in the breast in women who are at high risk for developing breast cancer.</span></p><span data-dcnode-id="2216" instrument_node="">
</span></div><span data-dcnode-id="2214" instrument_node="">
</span></div><span data-dcnode-id="2212" instrument_node="">

</span><div class="fl-col-content fl-node-content" data-dcnode-id="2179"><span data-dcnode-id="2204" instrument_node="">

</span><p data-dcnode-id="2198"><strong data-dcnode-id="2199"><span data-dcnode-id="2200" instrument_node="">Broccoli Sprout Extract For Treating ER+ Breast Cancer</span></strong></p><span data-dcnode-id="2197" instrument_node="">
</span><p data-dcnode-id="2194"><em data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">A Pilot Study of Broccoli Sprout Extract in Patients With Invasive Breast Cancer (NCT01753908)</span></em></p><span data-dcnode-id="2193" instrument_node="">
</span><p data-dcnode-id="2190"><strong data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">Summary</span></strong></p><span data-dcnode-id="2189" instrument_node="">
</span><p data-dcnode-id="2187"><span data-dcnode-id="2188" instrument_node="">Broccoli is a member of the brassicales family. Studies have found that plants and flowers that are part of this family contain chemicals, called isothiocyanates, that may prevent or slow the growth of certain cancers. This study is comparing broccoli sprout extract to a placebo in order to see whether broccoli sprout extract alters biological markers associated with cancer cell growth when it is given to postmenopausal women with early-stage ER+ breast cancer for two weeks prior to the start of their cancer treatment.</span></p><span data-dcnode-id="2186" instrument_node="">

</span><p data-dcnode-id="2156"><strong data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">Green Tea for Newly-Diagnosed DCIS</span></strong></p><span data-dcnode-id="2155" instrument_node="">
</span><p data-dcnode-id="2152"><em data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">A Pilot Study of Chemo-prevention of Green Tea in Women With Ductal Carcinoma in Situ (DCIS) (NCT01060345)</span></em></p><span data-dcnode-id="2151" instrument_node="">
</span><p data-dcnode-id="2148"><strong data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">Summary</span></strong></p><span data-dcnode-id="2147" instrument_node="">
</span><p data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">Studies have shown that women with ductal carcinoma in situ (DCIS) have inflammation in the breast tissue surrounding their DCIS. This finding supports the idea that there is a link between inflammation and cancer. Researchers are studying green tea because both laboratory and epidemiology studies suggest that green tea may have anti-cancer and anti-inflammatory effects. The purpose of this study is to find molecular signs (biomarkers) that will help researchers better understand the role of green tea as an anti-cancer and anti-inflammation agent in women with newly-diagnosed ductal carcinoma in situ (DCIS).</span></p><span data-dcnode-id="2144" instrument_node="">

</span><p class="c-article-section__title u-h2 js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2094" id="Abs1"><strong data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">Summary</span></strong></p><span data-dcnode-id="2093" instrument_node="">
</span><div class="c-article-section__content" data-dcnode-id="2073" id="Abs1-content"><span data-dcnode-id="2092" instrument_node="">
</span><p data-dcnode-id="2075"><span data-dcnode-id="2091" instrument_node="">Curcumin, a major active component of turmeric, has been reported to induce growth inhibition or apoptosis in many cancerous cells (</span><a aria-label="Reference Mehta et al., 1997" data-dcnode-id="2089" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/1204997%23ref-CR39" id="ref-link-section-d38885e1338" rel="noopener" target="_blank" title="Mehta K, Pantazis P, McQueen T, Aggarwal BB . 1997 Anticancer Drugs 8: 470–481"><span data-dcnode-id="2090" instrument_node="">Mehta et al., 1997</span></a><span data-dcnode-id="2088" instrument_node="">; </span><a aria-label="Reference Kuo et al., 1996" data-dcnode-id="2086" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/1204997%23ref-CR33" id="ref-link-section-d38885e1341" rel="noopener" target="_blank" title="Kuo ML, Huang TS, Lin JK . 1996 Biochim. Biophys. Acta. 1317: 95–100"><span data-dcnode-id="2087" instrument_node="">Kuo et al., 1996</span></a><span data-dcnode-id="2085" instrument_node="">; </span><a aria-label="Reference Jiang et al., 1996" data-dcnode-id="2083" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/1204997%23ref-CR25" id="ref-link-section-d38885e1344" rel="noopener" target="_blank" title="Jiang MC, Yang-Yen HF, Yen JJ, Lin JK . 1996 Nutr. Cancer 26: 111–120"><span data-dcnode-id="2084" instrument_node="">Jiang et al., 1996</span></a><span data-dcnode-id="2082" instrument_node="">; </span><a aria-label="Reference Chen and Huang, 1998" data-dcnode-id="2080" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/1204997%23ref-CR8" id="ref-link-section-d38885e1347" rel="noopener" target="_blank" title="Chen HW, Huang HC . 1998 Br. J. Pharmacol. 124: 1029–1040"><span data-dcnode-id="2081" instrument_node="">Chen and Huang, 1998</span></a><span data-dcnode-id="2079" instrument_node="">), by a mechanism that is not fully understood. Our results suggest a mechanism by which curcumin may mediate its effects. The chemopreventive activity of curcumin is well documented (</span><a aria-label="Reference Kawamori et al., 1999" data-dcnode-id="2077" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/1204997%23ref-CR29" id="ref-link-section-d38885e1350" rel="noopener" target="_blank" title="Kawamori T, Lubet R, Steele VE, Kelloff GJ, Kaskey RB, Rao CV, Reddy BS . 1999 Cancer Res. 59: 597–601"><span data-dcnode-id="2078" instrument_node="">Kawamori et al., 1999</span></a><span data-dcnode-id="2076" instrument_node="">). The fact that curcumin can be used to downregulate the cell survival mechanisms in prostate cancer and other cell types is very appealing.</span></p><span data-dcnode-id="2074" instrument_node="">

</span><p data-dcnode-id="1988"><span data-dcnode-id="2019" instrument_node="">The effects of enzymatic-digested Se-enriched broccoli extracts (SeB) and selenocompounds on growth and antioxidative status in human colon cancer cells was investigated in this study. HCT116 and HCT116+Chr.3 cells were treated with selenocompounds (sodium selenite, sodium selenate, Se-Met, MeSeCys) or SeB [high-Se (H-SeB) or low-Se (L-SeB)]. The cytotoxicity induced by selenocompounds in HCT116 cells was not associated with cellular H</span><sub data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">2</span></sub><span data-dcnode-id="2016" instrument_node="">O</span><sub data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">2</span></sub><span data-dcnode-id="2013" instrument_node=""> level, while the differential cytotoxicity observed by sodium selenite between HCT116 and HCT116+Chr.3 cell lines was related to cellular H</span><sub data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">2</span></sub><span data-dcnode-id="2010" instrument_node="">O</span><sub data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">2</span></sub><span data-dcnode-id="2007" instrument_node=""> production with the change in antioxidative enzyme activity, and the restoration of chromosome 3. H-SeB was found to reduce the cellular H</span><sub data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">2</span></sub><span data-dcnode-id="2004" instrument_node="">O</span><sub data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">2</span></sub><span data-dcnode-id="2001" instrument_node=""> content in HCT116+Chr.3 cells. The results in this study indicate that regardless of Se content, the cytotoxicity in HCT116 cells of both SeB forms appeared to be H</span><sub data-dcnode-id="1999"><span data-dcnode-id="2000" instrument_node="">2</span></sub><span data-dcnode-id="1998" instrument_node="">O</span><sub data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">2</span></sub><span data-dcnode-id="1995" instrument_node="">-independent, whereas the cytotoxicity in HCT116+Chr.3 of either SeB form appeared to be H</span><sub data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">2</span></sub><span data-dcnode-id="1992" instrument_node="">O</span><sub data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">2</span></sub><span data-dcnode-id="1989" instrument_node="">-dependent with an increase in antioxidative ability for H-SeB.</span></p><span data-dcnode-id="1987" instrument_node="">

</span><p data-dcnode-id="1933"><span data-dcnode-id="1943" instrument_node="">Isothiocyanates are a well-known class of cancer chemopreventive agents, and broccoli sprouts are a rich source of several isothiocyanates. We report herein that dietary administration to rats of a freeze-dried aqueous extract of broccoli sprouts significantly and dose-dependently inhibited bladder cancer development induced by </span><em data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">N</span></em><span data-dcnode-id="1940" instrument_node="">-butyl-</span><em data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">N</span></em><span data-dcnode-id="1937" instrument_node="">-(4-hydroxybutyl) nitrosamine. The incidence, multiplicity, size, and progression of bladder cancer were all inhibited by the extract, while the extract itself caused no histologic changes in the bladder. Moreover, inhibition of bladder carcinogenesis by the extract was associated with significant induction of glutathione </span><em data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">S</span></em><span data-dcnode-id="1934" instrument_node="">-transferase and NAD(P)H:quinone oxidoreductase 1 in the bladder, enzymes that are important protectants against oxidants and carcinogens.</span></p><span data-dcnode-id="1932" instrument_node="">

</span><p data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">According to research conducted by Ernest T. Krebs Jr. the mechanism of action is following: our body has one particular enzyme called Rhodanese found everywhere in the body except at the cancer cells, and the enzyme Beta-Glucosidase found in very large quantities only at the cancer cell but not found anywhere else in the body. If there is no cancer in the body there is no enzyme Beta-Glucosidase. Vitamin B17 is made up of 2 parts glucose, 1 part Hydrogen Cyanide and 1 part Benzaldehyde (analgesic/painkiller). When B17 is introduced to the body, it is broken down by the enzyme Rhodanese. The Rhodanese breaks the Hydrogen Cyanide and Benzaldehyde down into 2 by-products, Thiocyanate and Benzoic acid which are beneficial in nourishing healthy cells and forms the metabolic pool production for vitamin B12. When the B17 comes into contact with cancer cells, there is no Rhodanese to break it down and neutrelise it but instead, only the enzyme Beta-Gucosidase is present in very large quantities. When B17 and Beta-Glucosidase come into contact with each other, a chemical reaction occurs and the Hydrogen Cyanide and Benzaldehyde combine synergistically to produce a poison which destroys and kills the cancer cells</span></p><span data-dcnode-id="1855" instrument_node="">

</span><section aria-labelledby="Abs1" data-dcnode-id="1800" lang="en"><span data-dcnode-id="1814" instrument_node="">
</span><div class="c-article-section" data-dcnode-id="1802" id="Abs1-section"><span data-dcnode-id="1813" instrument_node="">
</span><p class="c-article-section__title u-h2 js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1810" id="Abs1"><strong data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">Summary</span></strong></p><span data-dcnode-id="1809" instrument_node="">
</span><div class="c-article-section__content" data-dcnode-id="1804" id="Abs1-content"><span data-dcnode-id="1808" instrument_node="">
</span><p data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">Epidemiological studies show that a high intake of anti-oxidant-rich foods is inversely related to cancer risk. While animal and cell cultures confirm the anticancer effects of antioxidants, intervention trials to determine their ability to reduce cancer risk have been inconclusive, although selenium and vitamin E reduced the risk of some forms of cancer, including prostate and colon cancer, and carotenoids have been shown to help reduce breast cancer risk. Cancer treatment by radiation and anticancer drugs reduces inherent antioxidants and induces oxidative stress, which increases with disease progression. Vitamins E and C have been shown to ameliorate adverse side effects associated with free radical damage to normal cells in cancer therapy, such as mucositis and fibrosis, and to reduce the recurrence of breast cancer. While clinical studies on the effect of anti-oxidants in modulating cancer treatment are limited in number and size, experimental studies show that antioxidant vitamins and some phytochemicals selectively induce apoptosis in cancer cells but not in normal cells and prevent angiogenesis and metastatic spread, suggesting a potential role for antioxidants as adjuvants in cancer therapy.</span></p><span data-dcnode-id="1805" instrument_node="">

</span><p class="publication-title u-h3" data-dcnode-id="1745" id="publication-title"><a class="publication-title-link" data-dcnode-id="1749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/journal/00937754" rel="noopener" target="_blank" title="Go to Seminars in Oncology on ScienceDirect"><span data-dcnode-id="1750" instrument_node="">Seminars in Oncology - </span></a><a data-dcnode-id="1747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/journal/00937754/37/3" rel="noopener" target="_blank" title="Go to table of contents for this volume/issue"><span data-dcnode-id="1748" instrument_node="">Volume 37, Issue 3</span></a><span data-dcnode-id="1746" instrument_node="">, June 2010, Pages 258-281</span></p><span data-dcnode-id="1744" instrument_node="">

</span><div class="column" data-dcnode-id="1674"><span data-dcnode-id="1724" instrument_node="">
</span><p data-dcnode-id="1676"><span data-dcnode-id="1723" instrument_node="">Botanical and nutritional compounds have been used for the treatment of cancer throughout history. These compounds also may be useful in the prevention of cancer. </span><a data-dcnode-id="1721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/population-research" rel="noopener" target="_blank" title="Learn more about Population Research from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1722" instrument_node="">Population studies</span></a><span data-dcnode-id="1720" instrument_node=""> suggest that a reduced risk of cancer is associated with high consumption of vegetables and fruits. Thus, the cancer chemopreventive potential of naturally occurring </span><a data-dcnode-id="1718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/phytochemical" rel="noopener" target="_blank" title="Learn more about Phytochemical from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1719" instrument_node="">phytochemicals</span></a><span data-dcnode-id="1717" instrument_node=""> is of great interest. There are numerous reports of cancer chemopreventive activity of dietary botanicals, including cruciferous vegetables such as </span><a data-dcnode-id="1715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/cabbage" rel="noopener" target="_blank" title="Learn more about Cabbage from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1716" instrument_node="">cabbage</span></a><span data-dcnode-id="1714" instrument_node=""> and </span><a data-dcnode-id="1712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/broccoli" rel="noopener" target="_blank" title="Learn more about Broccoli from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1713" instrument_node="">broccoli</span></a><span data-dcnode-id="1711" instrument_node="">, </span><em data-dcnode-id="1708"><a data-dcnode-id="1709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/allium" rel="noopener" target="_blank" title="Learn more about Allium from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1710" instrument_node="">Allium</span></a></em><span data-dcnode-id="1707" instrument_node=""> vegetables such as garlic and onion, green tea, </span><em data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">Citrus</span></em><span data-dcnode-id="1704" instrument_node=""> fruits, </span><a data-dcnode-id="1702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/soybean" rel="noopener" target="_blank" title="Learn more about Soybean from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1703" instrument_node="">soybeans</span></a><span data-dcnode-id="1701" instrument_node="">, tomatoes, berries, and </span><a data-dcnode-id="1699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/zingiber-officinale" rel="noopener" target="_blank" title="Learn more about Zingiber Officinale from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1700" instrument_node="">ginger</span></a><span data-dcnode-id="1698" instrument_node="">, as well as </span><a data-dcnode-id="1696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/medicinal-plant" rel="noopener" target="_blank" title="Learn more about Medicinal Plant from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1697" instrument_node="">medicinal plants</span></a><span data-dcnode-id="1695" instrument_node="">. Several lead compounds, such as </span><a data-dcnode-id="1693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/genistein" rel="noopener" target="_blank" title="Learn more about Genistein from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1694" instrument_node="">genistein</span></a><span data-dcnode-id="1692" instrument_node=""> (from soybeans), </span><a data-dcnode-id="1690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/lycopene" rel="noopener" target="_blank" title="Learn more about Lycopene from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1691" instrument_node="">lycopene</span></a><span data-dcnode-id="1689" instrument_node=""> (from tomatoes), brassinin (from cruciferous vegetables), </span><a data-dcnode-id="1687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/sulforaphane" rel="noopener" target="_blank" title="Learn more about Sulforaphane from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1688" instrument_node="">sulforaphane</span></a><span data-dcnode-id="1686" instrument_node=""> (from asparagus), indole-3-carbinol (from broccoli), and </span><a data-dcnode-id="1684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/resveratrol" rel="noopener" target="_blank" title="Learn more about Resveratrol from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1685" instrument_node="">resveratrol</span></a><span data-dcnode-id="1683" instrument_node="">(from grapes and peanuts) are in preclinical or clinical trials for cancer </span><a data-dcnode-id="1681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/chemoprophylaxis" rel="noopener" target="_blank" title="Learn more about Chemoprophylaxis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1682" instrument_node="">chemoprevention</span></a><span data-dcnode-id="1680" instrument_node="">. Phytochemicals have great potential in </span><a data-dcnode-id="1678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/cancer-prevention" rel="noopener" target="_blank" title="Learn more about Cancer Prevention from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1679" instrument_node="">cancer prevention</span></a><span data-dcnode-id="1677" instrument_node="">because of their safety, low cost, and oral bioavailability. In this review, we discuss potential natural cancer preventive compounds and their mechanisms of action.</span></p><span data-dcnode-id="1675" instrument_node="">

</span><p class="highwire-cite-title" data-dcnode-id="1643" id="page-title"><strong data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">Associations of Herbal and Specialty Supplements with Lung and Colorectal Cancer Risk in the VITamins And Lifestyle Study</span></strong></p><span data-dcnode-id="1642" instrument_node="">
</span><p data-dcnode-id="1633"><span class="metadata-label" data-dcnode-id="1639"><b data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">DOI:</span></b></span><span data-dcnode-id="1638" instrument_node=""> 10.1158/1055-9965.EPI-09-0038&nbsp;</span><span class="highwire-cite-metadata-date highwire-cite-metadata" data-dcnode-id="1634"><span class="metadata-label" data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">Published</span></span><span data-dcnode-id="1635" instrument_node=""> May 2009</span></span></p><span data-dcnode-id="1632" instrument_node="">

</span><div class="c-article-body" data-article-body="true" data-dcnode-id="1610" data-track-component="article body"><span data-dcnode-id="1627" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="1612" lang="en"><span data-dcnode-id="1626" instrument_node="">
</span><div class="c-article-section" data-dcnode-id="1614" id="Abs1-section"><span data-dcnode-id="1625" instrument_node="">
</span><p class="c-article-section__title u-h2 js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1622" id="Abs1"><strong data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">Summary</span></strong></p><span data-dcnode-id="1621" instrument_node="">
</span><div class="c-article-section__content" data-dcnode-id="1616" id="Abs1-content"><span data-dcnode-id="1620" instrument_node="">
</span><p data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">Millions of Americans use dietary supplements with little knowledge about their benefits or risks. We examined associations of various herbal/specialty supplements with lung and colorectal cancer risk. Men and women, 50 to 76 years, in the VITamins And Lifestyle cohort completed a 24-page baseline questionnaire that captured duration (years) and frequency (days per week) of use of commonly used herbal/specialty supplements.&nbsp; Any use of glucosamine and chondroitin, which have anti-inflammatory properties, over the previous 10 years, was associated with significantly lower lung cancer risk and colorectal cancer risk. There were also statistically significantly inverse associations of fish oil, methylsulfonylmethane, and St. John's wort with colorectal cancer risk. In contrast, garlic pills were associated with a statistically significant 35% elevated colorectal cancer risk. These results suggest that some herbal/specialty supplements may be associated with lung and colorectal cancer risk; however, these products should be used with caution.</span></p><span data-dcnode-id="1617" instrument_node="">

</span><div class="fl-rich-text" data-dcnode-id="1560"><span data-dcnode-id="1582" instrument_node="">
</span><h2 data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">How to do your own research:</span></h2><span data-dcnode-id="1579" instrument_node="">
</span><p data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">For those seeking more information regarding specific nutrients, simply use a search engine like Google Scholar to type in key words to find data. A simple search of "Curcumin and Cancer" brings over 236,000 results, so there ARE many nutritional therapies that DO have very valid supporting data. But remember, many alternative products and services are NOT going to have any researched data and there are several reasons for this:</span></p><span data-dcnode-id="1576" instrument_node="">
</span><ol data-dcnode-id="1565"><span data-dcnode-id="1575" instrument_node="">
</span><li data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">Good research involving double blind studies cost an enormous amount of money. Companies producing Rife machines, for instance, simply do not have $2-500,000 to fund a study.</span></li><span data-dcnode-id="1572" instrument_node="">
</span><li data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">Any real research study may take years to qualify and perform, needs to receive an IRB clearance from the FDA to test products on humans, and requires too many variables to control especially in the case of cancer. As an example, current Clinical Trials that drug companies run with new chemotherapy combinations can cost millions of dollars and can require individuals to have already "failed" standard care, i.e. they tried chemotherapy and it didn't work so this may enable them to qualify for a Clinical Trial.</span></li><span data-dcnode-id="1569" instrument_node="">
</span><li data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">In truth, even if I were to win the lottery, the FDA probably wouldn't approve any human clinical trials for Rife. It's simply the political situation we find ourselves in.</span></li><span data-dcnode-id="1566" instrument_node="">
</span></ol><span data-dcnode-id="1564" instrument_node="">
</span><p data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">So, when I refer to one "doing their own research" I am speaking of one searching data files of research already performed. Patients often ask me why such and such (like Rife) has little valid research supporting it and I need to explain today's reality as stated above.</span></p><span data-dcnode-id="1561" instrument_node="">
</span></div><span data-dcnode-id="1559" instrument_node="">
