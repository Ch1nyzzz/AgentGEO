</span><meta content="http://2.bp.blogspot.com/-AJMglV1pYWQ/Vpo0Cvw2eHI/AAAAAAAAC24/QqyKlXB2eno/s1600/herbal-remedies-for-weak-nerves.jpg" data-dcnode-id="3903" itemprop="image_url"><span data-dcnode-id="3902" instrument_node="">

</span><h3 class="post-title entry-title" data-dcnode-id="3894" itemprop="name"><span data-dcnode-id="3895" instrument_node="">
Nerve Weakness-  Types, Causes, Symptoms &amp; Herbal Remedies
</span></h3><span data-dcnode-id="3893" instrument_node="">
</span><div class="post-header" data-dcnode-id="3889"><span data-dcnode-id="3892" instrument_node="">
</span><div class="post-header-line-1" data-dcnode-id="3891"></div><span data-dcnode-id="3890" instrument_node="">
</span></div><span data-dcnode-id="3888" instrument_node="">
</span><div class="post-body entry-content" data-dcnode-id="3614" id="post-body-2993264488294221394" itemprop="articleBody"><span data-dcnode-id="3887" instrument_node="">
</span><div align="justify" data-dcnode-id="3618"><p data-dcnode-id="3878"><strong data-dcnode-id="3885"><span data-dcnode-id="3886" instrument_node="">Nerve Weakness </span></strong><span data-dcnode-id="3884" instrument_node="">also known as</span><strong data-dcnode-id="3882"><span data-dcnode-id="3883" instrument_node=""> </span></strong><em data-dcnode-id="3880"><span data-dcnode-id="3881" instrument_node="">nerve  palsy</span></em><span data-dcnode-id="3879" instrument_node=""> is a collective term for a range of nervous disorders that causes weakness or  immobility of nerves in some parts of the body. In some cases it is only  temporary and fades over time. However, sometimes it doesn’t respond well to  either the passing of time or various treatment options. In that case, nerve  weakness possesses a permanent health issue that must be dealt with care. Nerve  weakness means anything from a weakness to a complete paralysis. It can result  from any sort of damage to the nerve.</span></p><div class="separator" data-dcnode-id="3875" style="clear: both; text-align: center;"><a data-dcnode-id="3876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/-AJMglV1pYWQ/Vpo0Cvw2eHI/AAAAAAAAC24/QqyKlXB2eno/s1600/herbal-remedies-for-weak-nerves.jpg" imageanchor="1" style="margin-left: 1em; margin-right: 1em;"><img border="0" data-dcnode-id="3877" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/-AJMglV1pYWQ/Vpo0Cvw2eHI/AAAAAAAAC24/QqyKlXB2eno/s1600/herbal-remedies-for-weak-nerves.jpg&amp;raw"></a></div><h2 data-dcnode-id="3873"><span data-dcnode-id="3874" instrument_node="">THREE TYPES OF NERVES IN THE BODY ARE</span></h2><p data-dcnode-id="3869"><strong data-dcnode-id="3871"><span data-dcnode-id="3872" instrument_node="">Autonomic nerves</span></strong><span data-dcnode-id="3870" instrument_node=""> control the involuntary or partially voluntary activities of the body, including heart rate, blood pressure, digestion and temperature regulation.</span></p><p data-dcnode-id="3865"><strong data-dcnode-id="3867"><span data-dcnode-id="3868" instrument_node="">Motor nerves </span></strong><span data-dcnode-id="3866" instrument_node="">control the movements and actions by passing information from brain and spinal cord to muscles.</span></p><p data-dcnode-id="3861"><strong data-dcnode-id="3863"><span data-dcnode-id="3864" instrument_node="">Sensory nerves</span></strong><span data-dcnode-id="3862" instrument_node=""> relay information from skin and muscles back to your spinal cord and brain. The information is then processed to let the feel pain and other sensations.</span></p><p data-dcnode-id="3859"><span data-dcnode-id="3860" instrument_node="">Since nerves are essential, nerve pain, weakness and damage can seriously affect the quality of life.</span></p><h2 data-dcnode-id="3857"><span data-dcnode-id="3858" instrument_node="">CAUSES OF NERVE WEAKNESS</span></h2><ul data-dcnode-id="3826"><li data-dcnode-id="3855"><span data-dcnode-id="3856" instrument_node="">Autoimmune  diseases such as multiple sclerosis, Guillain-Barré syndrome (condition in  which the immune system attacks the peripheral nerves), myasthenia gravis,  lupus and inflammatory bowel disease</span></li><span data-dcnode-id="3854" instrument_node="">
</span><li data-dcnode-id="3852"><span data-dcnode-id="3853" instrument_node="">Cancer</span></li><span data-dcnode-id="3851" instrument_node="">
</span><li data-dcnode-id="3849"><span data-dcnode-id="3850" instrument_node="">Compression or  trauma</span></li><span data-dcnode-id="3848" instrument_node="">
</span><li data-dcnode-id="3846"><span data-dcnode-id="3847" instrument_node="">Diabetes and  diabetes neuropathy</span></li><span data-dcnode-id="3845" instrument_node="">
</span><li data-dcnode-id="3843"><span data-dcnode-id="3844" instrument_node="">Drug side  effects and toxic substances</span></li><span data-dcnode-id="3842" instrument_node="">
</span><li data-dcnode-id="3840"><span data-dcnode-id="3841" instrument_node="">Motor neuron  diseases</span></li><span data-dcnode-id="3839" instrument_node="">
</span><li data-dcnode-id="3837"><span data-dcnode-id="3838" instrument_node="">Nutritional  deficiencies</span></li><span data-dcnode-id="3836" instrument_node="">
</span><li data-dcnode-id="3828"><span data-dcnode-id="3835" instrument_node="">Infectious disease</span><strong data-dcnode-id="3833"><span data-dcnode-id="3834" instrument_node=""> </span></strong><span data-dcnode-id="3832" instrument_node="">like</span><strong data-dcnode-id="3830"><span data-dcnode-id="3831" instrument_node=""> </span></strong><span data-dcnode-id="3829" instrument_node="">Lyme  disease, the herpes viruses, HIV and hepatitis C </span></li><span data-dcnode-id="3827" instrument_node="">
</span></ul><h2 data-dcnode-id="3824"><span data-dcnode-id="3825" instrument_node="">SYMPTOMS OF NERVE DAMAGE</span></h2><h3 data-dcnode-id="3822"><span data-dcnode-id="3823" instrument_node="">Autonomic nerve damage or weakness may produce the following symptoms:</span></h3><ul data-dcnode-id="3800"><li data-dcnode-id="3820"><span data-dcnode-id="3821" instrument_node="">Inability to  sense chest pain such as angina or heart attack</span></li><span data-dcnode-id="3819" instrument_node="">
</span><li data-dcnode-id="3817"><span data-dcnode-id="3818" instrument_node="">Excessive  sweating or less sweating</span></li><span data-dcnode-id="3816" instrument_node="">
</span><li data-dcnode-id="3814"><span data-dcnode-id="3815" instrument_node="">Lightheadedness</span></li><span data-dcnode-id="3813" instrument_node="">
</span><li data-dcnode-id="3811"><span data-dcnode-id="3812" instrument_node="">Dry eyes and dry mouth</span></li><span data-dcnode-id="3810" instrument_node="">
</span><li data-dcnode-id="3808"><span data-dcnode-id="3809" instrument_node="">Constipation </span></li><span data-dcnode-id="3807" instrument_node="">
</span><li data-dcnode-id="3805"><span data-dcnode-id="3806" instrument_node="">Bladder dysfunction</span></li><span data-dcnode-id="3804" instrument_node="">
</span><li data-dcnode-id="3802"><span data-dcnode-id="3803" instrument_node="">Sexual dysfunction</span></li><span data-dcnode-id="3801" instrument_node="">
</span></ul><h3 data-dcnode-id="3798"><span data-dcnode-id="3799" instrument_node="">Motor nerves weakness may produce the following symptoms:</span></h3><ul data-dcnode-id="3785"><li data-dcnode-id="3796"><span data-dcnode-id="3797" instrument_node="">Fatigue </span></li><span data-dcnode-id="3795" instrument_node="">
</span><li data-dcnode-id="3793"><span data-dcnode-id="3794" instrument_node="">Muscle atrophy</span></li><span data-dcnode-id="3792" instrument_node="">
</span><li data-dcnode-id="3790"><span data-dcnode-id="3791" instrument_node="">Twitching or  fasciculation</span></li><span data-dcnode-id="3789" instrument_node="">
</span><li data-dcnode-id="3787"><span data-dcnode-id="3788" instrument_node="">Paralysis</span></li><span data-dcnode-id="3786" instrument_node="">
</span></ul><h3 data-dcnode-id="3783"><span data-dcnode-id="3784" instrument_node="">Sensory nerve damage and weakness may result in following symptoms:</span></h3><ul data-dcnode-id="3764"><li data-dcnode-id="3781"><span data-dcnode-id="3782" instrument_node="">Pain</span></li><span data-dcnode-id="3780" instrument_node="">
</span><li data-dcnode-id="3778"><span data-dcnode-id="3779" instrument_node="">Sensitivity</span></li><span data-dcnode-id="3777" instrument_node="">
</span><li data-dcnode-id="3775"><span data-dcnode-id="3776" instrument_node="">Numbness</span></li><span data-dcnode-id="3774" instrument_node="">
</span><li data-dcnode-id="3772"><span data-dcnode-id="3773" instrument_node="">Tingling or  prickling</span></li><span data-dcnode-id="3771" instrument_node="">
</span><li data-dcnode-id="3769"><span data-dcnode-id="3770" instrument_node="">Burning</span></li><span data-dcnode-id="3768" instrument_node="">
</span><li data-dcnode-id="3766"><span data-dcnode-id="3767" instrument_node="">Problems with  positional awareness</span></li><span data-dcnode-id="3765" instrument_node="">
</span></ul><h2 data-dcnode-id="3762"><span data-dcnode-id="3763" instrument_node="">TYPES OF NERVE WEAKNESS</span></h2><ul data-dcnode-id="3745"><li data-dcnode-id="3760"><span data-dcnode-id="3761" instrument_node="">Peroneal nerve  palsy</span></li><span data-dcnode-id="3759" instrument_node="">
</span><li data-dcnode-id="3757"><span data-dcnode-id="3758" instrument_node="">Ocular nerve  palsy </span></li><span data-dcnode-id="3756" instrument_node="">
</span><li data-dcnode-id="3754"><span data-dcnode-id="3755" instrument_node="">Cranial palsy </span></li><span data-dcnode-id="3753" instrument_node="">
</span><li data-dcnode-id="3751"><span data-dcnode-id="3752" instrument_node="">Ulna palsy</span></li><span data-dcnode-id="3750" instrument_node="">
</span><li data-dcnode-id="3747"><a data-dcnode-id="3748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.planetayurveda.com/ayurvedic-treatment-for-bells-palsy.htm" target="_blank"><span data-dcnode-id="3749" instrument_node="">Bell’s palsy</span></a></li><span data-dcnode-id="3746" instrument_node="">
</span></ul><p data-dcnode-id="3743"><span data-dcnode-id="3744" instrument_node="">These are other forms of Nerve weakness or nerve palsy that produces similar results, in which the nerves associated with the particular region becomes ineffectual and are not able to produce the desired function. </span></p><h2 data-dcnode-id="3741"><span data-dcnode-id="3742" instrument_node="">COMPLICATIONS</span></h2><p data-dcnode-id="3739"><span data-dcnode-id="3740" instrument_node="">Contractures of joints around the weak nerve may complicate motor nerve damage. Loss of sensation may lead to accidental burns or other injuries. Scarring may occur in and around the damaged nerve, resulting in the formation of neuroma. With imperfect healing and prolonged weakness, there may be paresthesias, changes in hot or cold sensitivity, paresis, or paralysis.</span></p><h2 data-dcnode-id="3737"><span data-dcnode-id="3738" instrument_node="">NERVE WEAKNESS HERBAL REMEDIES</span></h2><ol data-dcnode-id="3724"><li data-dcnode-id="3735"><span data-dcnode-id="3736" instrument_node="">Cap. Boswellia  Curcumin </span></li><span data-dcnode-id="3734" instrument_node="">
</span><li data-dcnode-id="3732"><span data-dcnode-id="3733" instrument_node="">Cap.  Ashwagandha </span></li><span data-dcnode-id="3731" instrument_node="">
</span><li data-dcnode-id="3729"><span data-dcnode-id="3730" instrument_node="">Tab. Yograj  Guggul </span></li><span data-dcnode-id="3728" instrument_node="">
</span><li data-dcnode-id="3726"><span data-dcnode-id="3727" instrument_node="">Medhya Churna </span></li><span data-dcnode-id="3725" instrument_node="">
</span></ol><div class="separator" data-dcnode-id="3721" style="clear: both; text-align: center;"><a data-dcnode-id="3722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.planetayurveda.com/" imageanchor="1" style="margin-left: 1em; margin-right: 1em;"><img border="0" data-dcnode-id="3723" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//4.bp.blogspot.com/-kAsz1cOa7y0/Vpo4HneEabI/AAAAAAAAC3E/wGW-3VLqs30/s1600/herbal-remedies-nerve-weakness.png&amp;raw"></a></div><h2 data-dcnode-id="3719"><span data-dcnode-id="3720" instrument_node="">PRODUCTS DESCRIPTION</span></h2><h3 data-dcnode-id="3714"><span data-dcnode-id="3718" instrument_node="">1) </span><a data-dcnode-id="3716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.planetayurveda.com/boswellia-curcumin.htm" target="_blank"><span data-dcnode-id="3717" instrument_node="">Cap. Boswellia Curcumin</span></a><span data-dcnode-id="3715" instrument_node=""> </span></h3><p data-dcnode-id="3712"><span data-dcnode-id="3713" instrument_node="">Boswellia-Curcumin is the combination of two anti-inflammatory and analgesic herbs, Boswellia serrata (shallaki) and curcumin (turmeric). These herbs not only relieve the joint pains but are also beneficial in reducing swelling and therefore improve flexibility. These herbs also increase circulation to the joints and promote health. </span></p><p data-dcnode-id="3708"><strong data-dcnode-id="3710"><span data-dcnode-id="3711" instrument_node="">Benefits and Uses</span></strong><span data-dcnode-id="3709" instrument_node=""> : Boswellia has anti-atherosclerotic properties making it a good herb for the cholesterol and heart. Boswellic acids have anti-inflammatory properties and are of supreme importance as they are very beneficial when used for aches and pains that are caused owing to different ailments. Curcumin is well known for its anti-inflammatory, antibacterial, antiviral, antifungal and anticancer properties and is used in various health conditions. It has therapeutic activities for a wide variety of conditions and diseases including those of pains, wounds, nerve weakness, pulmonary and gastrointestinal systems. It has strong antioxidant that removes toxins from the body.</span></p><p data-dcnode-id="3704"><strong data-dcnode-id="3706"><span data-dcnode-id="3707" instrument_node="">Dosage:</span></strong><span data-dcnode-id="3705" instrument_node=""> 1-2 capsules twice daily, after meals with plain water.</span></p><h3 data-dcnode-id="3699"><span data-dcnode-id="3703" instrument_node="">2) </span><a data-dcnode-id="3701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.planetayurveda.com/ashwagandhapowder.htm" target="_blank"><span data-dcnode-id="3702" instrument_node="">Cap. Ashwagandha</span></a><span data-dcnode-id="3700" instrument_node=""> </span></h3><p data-dcnode-id="3697"><span data-dcnode-id="3698" instrument_node="">Ashwagandha Capsules consists of root extract of ashwagandha (Withania somnifera) herb which is also known as Indian ginseng. It is known to possess miracle healing qualities. It is known as adaptogenic. Ashwagandha plant is 5000 ft tall with life span of 5 years. Leaves are small and oval shaped with yellowish green flowers and rough, strong, thick roots. Ashwagandha root powder extract is used in therapeutic procedures as it contains active components withanolides and withaferin A. It is the best herb for balancing vata which governs entire body movement and nerve impulses.</span></p><p data-dcnode-id="3693"><strong data-dcnode-id="3695"><span data-dcnode-id="3696" instrument_node="">Benefits and Uses</span></strong><span data-dcnode-id="3694" instrument_node=""> : Ashwagandha is useful in conditions such as chronic fatigue syndrome, stress, palpitation, restlessness, anxiety, nervousness, insomnia, ageing, diabetes neuropathy, sudden weight loss and weakness. Ashwagandha strengthens and relieves the nerves and muscles by calming down the nervous system. Being a nerve tonic it enhances physical and mental stamina. Ashwagandha works wonderfully for curing erectile dysfunction, low sperm count and premature ejaculation. Ashwagandha has anti-infective, anti-biotic qualities and is effective for treating all types of cancers and swollen glands.</span></p><p data-dcnode-id="3689"><strong data-dcnode-id="3691"><span data-dcnode-id="3692" instrument_node="">Dosage </span></strong><span data-dcnode-id="3690" instrument_node="">: 1-2 capsules twice daily with plain water after meals.</span></p><h3 data-dcnode-id="3684"><span data-dcnode-id="3688" instrument_node="">3) </span><a data-dcnode-id="3686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.planetayurveda.com/yograj-guggulu.htm" target="_blank"><span data-dcnode-id="3687" instrument_node="">Yoraj Guggul</span></a><span data-dcnode-id="3685" instrument_node=""> </span></h3><p data-dcnode-id="3682"><span data-dcnode-id="3683" instrument_node="">Yograj Guggul  is a herbal formulation comprised of Guggul, Ghee and 27 other herbs such as chitraka (Plumbago zeylanica), pippali (Piper longam), yawani (Trachyspermum ammi), jeeraka (Cuminum cyminum), devdaru (Cedrus deodra), chavya (Piper retrofractum), maricha (Piper nigrum) etc.</span></p><p data-dcnode-id="3680"><span data-dcnode-id="3681" instrument_node="">Yograj guggul is effective for the treatment of vata and kapha related disorders. Gum, resin and volatile oil are the active ingredients with medicinal effects. It is primarily used to treat a variety of musculo skeletal and nervous disorders. Nerve weakness is a painful condition of the nerves accompanied by inflammation, loss of sensation and stiffness, limiting the movement and mobility. Yograj guggul reduces pain, swelling and flushes out the toxins out of the body.</span></p><p data-dcnode-id="3676"><strong data-dcnode-id="3678"><span data-dcnode-id="3679" instrument_node="">Benefits and Uses </span></strong><span data-dcnode-id="3677" instrument_node="">: Yograj guggul tablets boosts immunity and is useful to treat musculo skeletal disorders, arthritis and various nervous disorders including nerve palsy or nerve weakness. It is beneficial in abnormal ligament and tendon tear. It relieves cervical spondylitis, fibromyalgia and nerve damage. It is also used in indigestion, constipation, flatulence and dyspepsia. It curbs obesity by detoxifying the body, removing the excess fats and toxins from the body.</span></p><p data-dcnode-id="3672"><strong data-dcnode-id="3674"><span data-dcnode-id="3675" instrument_node="">Dosage </span></strong><span data-dcnode-id="3673" instrument_node="">:  2 tablets twice or thrice daily with plain water or milk after meals.</span></p><h3 data-dcnode-id="3667"><span data-dcnode-id="3671" instrument_node="">4) </span><a data-dcnode-id="3669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.planetayurveda.com/medhya-churna.htm" target="_blank"><span data-dcnode-id="3670" instrument_node="">Medhya Churna</span></a><span data-dcnode-id="3668" instrument_node=""> </span></h3><p data-dcnode-id="3665"><span data-dcnode-id="3666" instrument_node="">Medhya churna is an excellent mixture of eleven herbs including vacha (Acorus calamus), ashwagandha (Withania somnifera), ajmoda (Apium graveolens), jeerak (Cuminum cyminum), patha (Cissampelos pareira), shankhpushpi (Convolvulus pluricaulis) and brahmi (Bacopa monnieri) and many more.  </span></p><p data-dcnode-id="3661"><strong data-dcnode-id="3663"><span data-dcnode-id="3664" instrument_node="">Ashwagandh </span></strong><span data-dcnode-id="3662" instrument_node="">treats stress related ailments and neurological disorders. It rejuvenates brain by curbing metabolic and emotional stress. Cortisol, the stress hormone contributes to mental ageing. Ashwagandha combats the stress by decreasing cortisol production. It also acts on endocrine system, encourages hormonal balance and reduces the hot flashes, anxiety and mood swings.</span></p><p data-dcnode-id="3656"><strong data-dcnode-id="3658"><a data-dcnode-id="3659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.planetayurveda.com/brahmipowder.htm" target="_blank"><span data-dcnode-id="3660" instrument_node="">Brahmi</span></a></strong><span data-dcnode-id="3657" instrument_node=""> effectively improves memory, recollection and retention of things. It calms down the mind and also treats anxiety, hallucination. Brahmi contains an active protein molecule bacoside B which strengthens nervous system and nourishes the brain. Brahmi has a positive effect on cognitive functions. Being an antioxidant brahmi protects the neural oxidative stress and stimulates brain's own chemicals that protect neurons from damaging. Brahmi contains bacoside A which protects the areas of the brain responsible for serotonin uptake and balances the neurotransmitter. Brahmi may help balance dopamine levels and stabilize certain chemicals in the brain.</span></p><p data-dcnode-id="3651"><strong data-dcnode-id="3653"><a data-dcnode-id="3654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.planetayurveda.com/convolvulus-pluricaulis.htm" target="_blank"><span data-dcnode-id="3655" instrument_node="">Shankhpushpi</span></a></strong><span data-dcnode-id="3652" instrument_node=""> prevents neurotoxicity and reduces stress. Alkloids in shankhpushpi boosts serotonin production and acts as a brain tonic, memory enhancer, promotes intelligence, eliminates hypertension, anxiety, stress-related disorders, epilepsy, insomnia and numerous neurodegenerative diseases. The herb works primarily by supporting the central nervous system.</span></p><p data-dcnode-id="3647"><strong data-dcnode-id="3649"><span data-dcnode-id="3650" instrument_node="">Benefits and Uses</span></strong><span data-dcnode-id="3648" instrument_node=""> :  Medhya churna helps in improving memory, recollecting and retaining things in a better way by rejuvenating the nervous system. It is effective as a nerve tonic for overall improvement of mental health. It is suitable to treat forgetfulness, cloudy thoughts and confused mind. Medhya churna is popularly used as a nerve tonic which helps to balance vata, pitta and kapha energies thus, improving concentration, alleviating stress and anxiety.</span></p><p data-dcnode-id="3643"><strong data-dcnode-id="3645"><span data-dcnode-id="3646" instrument_node="">Dosage</span></strong><span data-dcnode-id="3644" instrument_node=""> : 1 teaspoon twice daily with plain water.</span></p><h2 data-dcnode-id="3641"><span data-dcnode-id="3642" instrument_node="">INDICATIONS OF THESE HERBAL REMEDIES</span></h2><ul data-dcnode-id="3628"><li data-dcnode-id="3639"><span data-dcnode-id="3640" instrument_node="">For strong central nervous  system, respiratory system, immune system and digestive system.</span></li><span data-dcnode-id="3638" instrument_node="">
</span><li data-dcnode-id="3636"><span data-dcnode-id="3637" instrument_node="">To curb musculo - skeletal  ailments and nervous disorders.</span></li><span data-dcnode-id="3635" instrument_node="">
</span><li data-dcnode-id="3633"><span data-dcnode-id="3634" instrument_node="">To treat arthritis,  osteoarthritis, rheumatoid arthritis, spondylitis and rheumatism.</span></li><span data-dcnode-id="3632" instrument_node="">

 body sensation and for the past 3 days left hand going off to sleep sensation at least once or twice a day. Went to a neuro who said it is a minute stroke but what caused the stroke dont know, age 51, have Essential Thrombocytosis but currently platelet is 544 which is just slughtly above normal.  Could you help out why this happpened and what is cure for partial decreased sensation on left side of body and GAG Reflux.</span><br data-dcnode-id="3372"></p><span class="comment-actions secondary-text" data-dcnode-id="3365"><a class="comment-reply" data-comment-id="9006269945585015292" data-dcnode-id="3369" href="javascript:;" target="_self"><span data-dcnode-id="3370" instrument_node="">Reply</span></a><span class="item-control blog-admin blog-admin pid-133763437" data-dcnode-id="3366"><a data-dcnode-id="3367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blogger.com/delete-comment.g%3FblogID%3D3708265214721418298%26postID%3D9006269945585015292" target="_self"><span data-dcnode-id="3368" instrument_node="">Delete</span></a></span></span></div><div class="comment-replies" data-dcnode-id="3321"><div class="comment-thread inline-thread" data-dcnode-id="3322" id="c9006269945585015292-rt"><span class="thread-toggle thread-expanded" data-dcnode-id="3359"><span class="thread-arrow" data-dcnode-id="3363"></span><span class="thread-count" data-dcnode-id="3360"><a data-dcnode-id="3361" href="javascript:;" target="_self"><span data-dcnode-id="3362" instrument_node="">Replies</span></a></span></span><ol class="thread-chrome thread-expanded" data-dcnode-id="3323" id="c9006269945585015292-ra"><div data-dcnode-id="3327"><li class="comment" data-dcnode-id="3328" id="c6764489398637737450"><div class="avatar-image-container" data-dcnode-id="3357"><img alt="" data-dcnode-id="3358" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-SVUtqdP3mOg/YQvSkudtmKI/AAAAAAAAXnw/_NIiCf4zTQUk1n4zNHpsn65a2hDSd-wAACK4BGAYYCw/s
