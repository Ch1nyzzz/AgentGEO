</span><a class="a2a_button_email" data-dcnode-id="1435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.veterinarypracticenews.com/%23email" rel="nofollow noopener" target="_blank"><span class="a2a_svg a2a_s__default a2a_s_email" data-dcnode-id="1438" style="background-color: rgb(1, 102, 255); width: 36px; line-height: 36px; height: 36px; background-size: 36px; border-radius: 5px;"><svg aria-hidden="true" data-dcnode-id="1439" focusable="false" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><path d="M26 21.25v-9s-9.1 6.35-9.984 6.68C15.144 18.616 6 12.25 6 12.25v9c0 1.25.266 1.5 1.5 1.5h17c1.266 0 1.5-.22 1.5-1.5zm-.015-10.765c0-.91-.265-1.235-1.485-1.235h-17c-1.255 0-1.5.39-1.5 1.3l.015.14s9.035 6.22 10 6.56c1.02-.395 9.985-6.7 9.985-6.7l-.015-.065z" data-dcnode-id="1440" fill="#FFF"></path></svg></span><span class="a2a_label" data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">Email</span></span></a><span data-dcnode-id="1434" instrument_node="">

</span><p class="entry-date" data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">July 7, 2010</span></p><span data-dcnode-id="1426" instrument_node="">
</span></header><span data-dcnode-id="1424" instrument_node="">
</span><div class="post-inner" data-dcnode-id="1257"><span data-dcnode-id="1423" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1260"><span data-dcnode-id="1422" instrument_node="">
</span><p class="entry-byline" data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">By Jessica Tremayne</span></p><p data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node=""> With cancer blamed for as many as half of the canine and feline deaths in the U.S., veterinarians and owners are looking for solutions and are more frequently turning to supplements.</span></p><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node=""> As veterinarians find clinical evidence to support aggressive supplement use, organizations like Morris Animal Foundation and the American Kennel Club are on board as well.</span></p><span data-dcnode-id="1414" instrument_node="">
</span><p data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node=""> “My colleague Cheryl London is investigating the use of curcumin, a derivative of the popular Indian spice turmeric and has Morris funding,” says Ohio State University professor C. Guillermo Couto, DVM, Dipl. ACVIM. “Her research is separate from mine, but we are both investigating ways supplements can affect osteosarcoma.” London, DVM, Ph.D., Dipl. ACVIM (Oncology), also is an Ohio State professor.</span></p><span data-dcnode-id="1411" instrument_node="">
</span><p data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node=""> Dr. Couto is clinically evaluating the effects of artemisinin, also known as sweet wormwood, an herb that has killed human and canine cancer cells in the laboratory.</span></p><span data-dcnode-id="1408" instrument_node="">
</span><p data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node=""> “From what we’ve found with its effectiveness in test tubes, it should be achievable to arrest the cancer cell cycle of dogs with osteosarcomas,” Coutou says. “Incubation with dihydroartemisinin—the active metabolite of all artemisinin compounds—resulted in biological activity against canine osteosarcoma cell lines, which included induction of apoptosis and arrest of the cell cycle.”</span></p><span data-dcnode-id="1405" instrument_node="">
</span><p data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node=""> In a separate but related study, Couto worked with the AKC in testing artemisinin on dogs diagnosed with cancer.</span></p><span data-dcnode-id="1402" instrument_node="">
</span><p data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node=""> “We gave 20 dogs two different treatments using artemisinin and only one dog had a modest response,” he says. “We found the animals weren’t achieving the blood levels necessary to make a significant difference in their disease. We essentially were not giving a large enough dose and plan on conducting additional studies.”</span></p><span data-dcnode-id="1399" instrument_node="">
</span><p data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node=""> Coutou says absorption and metabolism may affect the use of artemisinin and could explain the difference between what was found in osteosarcoma canine cell lines and canine patients.</span></p><span data-dcnode-id="1396" instrument_node="">
</span><p data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node=""> Osteosarcoma is the most common primary bone tumor in dogs, accounting for about 85 percent of all bone tumors, says Dr. London, who notes that more than 10,000 new canine cases are diagnosed each year.</span></p><span data-dcnode-id="1393" instrument_node="">
</span><div class="inline_related" data-dcnode-id="1382" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="ue3d5cdd7db7ac747cb3f1612ab4d8b74" data-dcnode-id="1383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.veterinarypracticenews.com/trends-in-rehab-equipment/" rel="nofollow" target="_self"><div data-dcnode-id="1384" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">You May Also Like</span></span><span data-dcnode-id="1387" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">Trends in rehab equipment</span></span></div></a></div><p data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node=""> Osteosarcoma commonly affects Rottweilers, greyhounds, Scottish deerhounds and golden retrievers. London’s research was spurred because traditional treatment hasn’t substantially improved in the past 15 years and involves removal of the tumor, usually through limb amputation, followed by chemotherapy.</span></p><span data-dcnode-id="1379" instrument_node="">
</span><p data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node=""> Despite this aggressive approach, most patients don’t survive longer than two years after treatment because the tumor metastasizes to the dog’s lungs. However, Ohio State researchers have shown that STAT3, a protein important in a tumor cell’s ability to metastasize and resist chemotherapy, is essential for cancer cell survival. Curcumin, a component of the spice turmeric, inhibits STAT3 but is not well absorbed after ingestion.</span></p><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node=""> According to Morris Animal Foundation, researchers are evaluating a curcumin-derived compound developed at OSU for its ability to kill osteosarcoma cells. The compound and other compounds that target STAT3 represent cutting-edge research that could positively affect disease treatment in the future.</span></p><span data-dcnode-id="1373" instrument_node="">
</span><h3 data-dcnode-id="1369"><span data-dcnode-id="1372" instrument_node=""> </span><strong data-dcnode-id="1370" style="color: #800000; font-size: 10pt"><span data-dcnode-id="1371" instrument_node="">Be Careful</span></strong></h3><span data-dcnode-id="1368" instrument_node="">
</span><p data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node=""> Charles Loops, DVM, of Pittsboro, N.C., says using efficacious, quality supplements is a priority.</span></p><span data-dcnode-id="1365" instrument_node="">
</span><p data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node=""> “Two-thirds of my practice is consulting with owners of animals with cancer, by veterinary referral or word of mouth,” Dr. Loops says. “I don’t carry a lot of the supplements that I recommend, but I do give clients names of reliable places they can find the supplements.”</span></p><span data-dcnode-id="1362" instrument_node="">
</span><p data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node=""> Americans spent $1.4 billion in 2008 on supplements for animals.</span></p><span data-dcnode-id="1359" instrument_node="">
</span><p data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node=""> “Some clients want to purchase supplements from wholesale stores, but there is little regulation and you don’t know what’s in it,” says Carmine Bausone, DVM, of Acacia Animal Health Center in Escondido, Calif.</span></p><span data-dcnode-id="1356" instrument_node="">
</span><p data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node=""> “It is better to purchase supplements created for animals when that is the patient they are intended for. I carry everything I prescribe to patients or suggest they purchase the supplement carrying the NASC label. Some supplements, especially Chinese herbs, may carry high levels of lead, mercury or other toxins, depending on where they are grown.”</span></p><span data-dcnode-id="1353" instrument_node="">
</span><p data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node=""> The National Animal Supplement Council (NASC) is a non-profit trade organization comprising companies providing health and nutritional supplements that comply with a set of guidelines set by NASC for good manufacturing practices. While membership and compliance with the organization is optional, creating a regulatory environment that is fair, reasonable, responsible and nationally consistent is the council’s goal.</span></p><span data-dcnode-id="1350" instrument_node="">
</span><div class="inline_related" data-dcnode-id="1339" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="u6c78fbf6726dfbe76764239a2362a418" data-dcnode-id="1340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.veterinarypracticenews.com/pets-social-impact-for-children-with-adhd-to-be-explored-2/" rel="nofollow" target="_self"><div data-dcnode-id="1341" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">You May Also Like</span></span><span data-dcnode-id="1344" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">Pets’ social impact for children with ADHD to be explored</span></span></div></a></div><p data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node=""> “When the FDA sends a warning letter to a company, it means business,” says Bill Bookout, president of the NASC. “If a company has false claims on its website or label, the FDA will take action against it to protect consumers and their pets.”</span></p><span data-dcnode-id="1336" instrument_node="">
</span><p data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node=""> Bookout says a rule of thumb when looking at supplement labels is that if the claims seem to be too good to be true, they probably are; and cheap products are usually cheap for a reason.</span></p><span data-dcnode-id="1333" instrument_node="">
</span><p data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node=""> Using supplements as part of pharmaceuticals, surgery or chemotherapy is the route many pet owners go, Loops says.</span></p><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node=""> “I treat a lot of animals in conjunction with the use of chemo-therapy,” Loops says. “Radiation is performed by specialists who usually prefer that supplements aren’t given during the treatment. This preference is largely because oncologists don’t understand how to properly use supplements, but that is pretty common even with the American Veterinary Medical Association.”</span></p><span data-dcnode-id="1327" instrument_node="">
</span><p data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node=""> Loops says cancer is commonly found in older animals, but after 30 years in practice he’s seeing more young patients than ever.</span></p><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node=""> “Many veterinarians who use supplements in practice also push a healthier diet. Lena McCullough, DVM, CVA, of Seattle, helps identify the right diet and supplement combination for her cancer patients.</span></p><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node=""> Dr. McCullough serves as a referral veterinarian to practitioners who make a cancer diagnosis but need diet and supplementation support.</span></p><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node=""> “Some poor dogs come in on 20 supplements because the owner doesn’t realize you can have too much of a good thing,” McCullough says. “I consult with the owner to find what their expectations are with treatment, then go from there to determine the course of action.</span></p><span data-dcnode-id="1315" instrument_node="">
</span><p data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node=""> “Most of the patients I work with are either also using conventional drugs, had an adverse effect to conventional treatments or aren’t good candidates for harsher treatments. There isn’t one program that fits every cancer patient. Each supplement and treatment plan needs to be individualized.”</span></p><span data-dcnode-id="1312" instrument_node="">
</span><div class="inline_related" data-dcnode-id="1301" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="ua1e07f749d15e4c62f53a28764bec1f1" data-dcnode-id="1302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.veterinarypracticenews.com/improved-access-to-care-dvm-hiring-focus-of-newly-funded-start-ups/" rel="nofollow" target="_self"><div data-dcnode-id="1303" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">You May Also Like</span></span><span data-dcnode-id="1306" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">Improved access to care, DVM hiring focus of newly funded start-ups</span></span></div></a></div><p data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node=""> Just as many pet owners’ interest in animal supplements stems from their use of supplements, so did veterinarian Melissa Shelton’s decision to incorporate supplements into her practice.</span></p><span data-dcnode-id="1298" instrument_node="">
</span><p data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node=""> “After veterinary school I practiced traditional medicine for about eight years,” says Shelton, DVM,&nbsp; the owner of Crow River Animal Hospital in Howard Lake, Minn. “I was frustrated with the lack of response patients had to traditional drugs and started thinking, ‘Well, it works for me, why not dogs and cats?’ ”</span></p><span data-dcnode-id="1295" instrument_node="">
</span><h3 data-dcnode-id="1291"><span data-dcnode-id="1294" instrument_node=""> </span><strong data-dcnode-id="1292" style="color: #800000; font-size: 10pt"><span data-dcnode-id="1293" instrument_node="">Cancer Prevention</span></strong></h3><span data-dcnode-id="1290" instrument_node="">
</span><p data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node=""> Shelton recommends glucosamine for puppies to prevent the onset of joint problems later in life. The same theory exists with preventing cancer and other diseases.</span></p><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node=""> “I recommend whole-food supplements and essential oils,” Shelton says. “I’d rather clients put money into disease prevention instead of paying to try to slow it down once the animal has it. There is a role for supplements at every life stage. Even animals in hospice care can benefit. I might add pain medications or something to help reduce stomach upset, but supplements can help an animal have more quality days toward the end, too.”</span></p><span data-dcnode-id="1284" instrument_node="">
</span><p data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node=""> Alice Villalobos, DVM, PNAP, says most veterinarians who provide supplements for cancer patients aim to temper cancer’s fatal agenda using natural substances that inhibit common cancer pathways.&nbsp;</span></p><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node=""> “Supplements may inhibit angiogenesis, proliferation and metastasis or encourage the destruction of cancer cells by accelerating apoptosis,” Villalobos says. “In addition, some supplements such as beta glucans from mushrooms have been shown to increase the surveillance functions of the immune system to improve recognition and destruction of cancer cells.”</span></p><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1274"><span data-dcnode-id="1277" instrument_node=""> </span><a class="link_more" data-dcnode-id="1275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.veterinarypracticenews.com/"><span data-dcnode-id="1276" instrument_node="">&lt;HOME&gt;</span></a></p><span data-dcnode-id="1273" instrument_node="">

</span><table class="wt-cli-element cookielawinfo-row-cat-table cookielawinfo-winter" data-dcnode-id="572"><thead data-dcnode-id="617"><tr data-dcnode-id="618"><th class="cookielawinfo-column-1" data-dcnode-id="623" scope="col"><span data-dcnode-id="624" instrument_node="">Cookie</span></th><th class="cookielawinfo-column-3" data-dcnode-id="621" scope="col"><span data-dcnode-id="622" instrument_node="">Duration</span></th><th class="cookielawinfo-column-4" data-dcnode-id="619" scope="col"><span data-dcnode-id="620" instrument_node="">Description</span></th></tr></thead><tbody data-dcnode-id="573"><tr class="cookielawinfo-row" data-dcnode-id="610"><td class="cookielawinfo-column-1" data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">vuid</span></td><td class="cookielawinfo-column-3" data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">2 years</span></td><td class="cookielawinfo-column-4" data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Vimeo installs this cookie to collect tracking information by setting a unique ID to embed videos to the website.</span></td></tr><tr class="cookielawinfo-row" data-dcnode-id="603"><td class="cookielawinfo-column-1" data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">_ga</span></td><td class="cookielawinfo-column-3" data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">2 years</span></td><td class="cookielawinfo-column-4" data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">The _ga cookie, installed by Google Analytics, calculates visitor, session and campaign data and also keeps track of site usage for the site's analytics report. The cookie stores information anonymously and assigns a randomly generated number to recognize unique visitors.</span></td></tr><tr class="cookielawinfo-row" data-dcnode-id="596"><td class="cookielawinfo-column-1" data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">_gat</span></td><td class="cookielawinfo-column-3" data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">1 minute</span></td><td class="cookielawinfo-column-4" data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">This cookie is installed by Google Universal Analytics to restrain request rate and thus limit the collection of data on high traffic sites.</span></td></tr><tr class="cookielawinfo-row" data-dcnode-id="588"><td class="cookielawinfo-column-1" data-dcnode-id="593"><span data-dcnode-id="595" instrument_node="">_gat_UA-</span><property-id data-dcnode-id="594"></property-id></td><td class="cookielawinfo-column-3" data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">1 minute</span></td><td class="cookielawinfo-column-4" data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">A variation of the _gat cookie set by Google Analytics and Google Tag Manager to allow website owners to track visitor behaviour and measure site performance. The pattern element in the name contains the unique identity number of the account or website it relates to.</span></td></tr><tr class="cookielawinfo-row" data-dcnode-id="581"><td class="cookielawinfo-column-1" data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">_gid</span></td><td class="cookielawinfo-column-3" data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">1 day</span></td><td class="cookielawinfo-column-4" data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Installed by Google Analytics, _gid cookie stores information on how visitors use a website, while also creating an analytics report of the website's performance. Some of the data that are collected include the number of visitors, their source, and the pages they visit anonymously.</span></td></tr><tr class="cookielawinfo-row" data-dcnode-id="574"><td class="cookielawinfo-column-1" data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">__gads</span></td><td class="cookielawinfo-column-3" data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">1 year 24 days</span></td><td class="cookielawinfo-column-4" data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">The __gads cookie, set by Google, is stored under DoubleClick domain and tracks the number of times users see an advert, measures the success of the campaign and calculates its revenue. This cookie can only be read from the domain they are set on and will not track any data while browsing through other sites.</span></td></tr></tbody></table></div><span data-dcnode-id="570" instrument_node="">

</span><table class="wt-cli-element cookielawinfo-row-cat-table cookielawinfo-winter" data-dcnode-id="465"><thead data-dcnode-id="537"><tr data-dcnode-id="538"><th class="cookielawinfo-column-1" data-dcnode-id="543" scope="col"><span data-dcnode-id="544" instrument_node="">Cookie</span></th><th class="cookielawinfo-column-3" data-dcnode-id="541" scope="col"><span data-dcnode-id="542" instrument_node="">Duration</span></th><th class="cookielawinfo-column-4" data-dcnode-id="539" scope="col"><span data-dcnode-id="540" instrument_node="">Description</span></th></tr></thead><tbody data-dcnode-id="466"><tr class="cookielawinfo-row" data-dcnode-id="530"><td class="cookielawinfo-column-1" data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">ADV_u_id</span></td><td class="cookielawinfo-column-3" data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">3 months 8 days</span></td><td class="cookielawinfo-column-4" data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Unique customer identifier used to track unique ad views and interactions with some ads.</span></td></tr><tr class="cookielawinfo-row" data-dcnode-id="523"><td class="cookielawinfo-column-1" data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">anj</span></td><td class="cookielawinfo-column-3" data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">3 months</span></td><td class="cookielawinfo-column-4" data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">AppNexus sets the anj cookie that contains data stating whether a cookie ID is synced with partners.</span></td></tr><tr class="cookielawinfo-row" data-dcnode-id="516"><td class="cookielawinfo-column-1" data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">fr</span></td><td class="cookielawinfo-column-3" data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">3 months</span></td><td class="cookielawinfo-column-4" data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Facebook sets this cookie to show relevant advertisements to users by tracking user behaviour across the web, on sites that have Facebook pixel or Facebook social plugin.</span></td></tr><tr class="cookielawinfo-row" data-dcnode-id="509"><td class="cookielawinfo-column-1" data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">IDE</span></td><td class="cookielawinfo-column-3" data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">1 year 24 days</span></td><td class="cookielawinfo-column-4" data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Google DoubleClick IDE cookies are used to store information about how the user uses the website to present them with relevant ads and according to the user profile.</span></td></tr><tr class="cookielawinfo-row" data-dcnode-id="502"><td class="cookielawinfo-column-1" data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">loc</span></td><td class="cookielawinfo-column-3" data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">never</span></td><td class="cookielawinfo-column-4" data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">AddThis sets this geolocation cookie to help understand the location of users who share the information.</span></td></tr><tr class="cookielawinfo-row" data-dcnode-id="495"><td class="cookielawinfo-column-1" data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">OAGEO</span></td><td class="cookielawinfo-column-3" data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">session</span></td><td class="cookielawinfo-column-4" data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">OpenX sets this cookie to avoid the repeated display of the same ad.</span></td></tr><tr class="cookielawinfo-row" data-dcnode-id="488"><td class="cookielawinfo-column-1" data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">OAID</span></td><td class="cookielawinfo-column-3" data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">1 year</span></td><td class="cookielawinfo-column-4" data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Cookie set to record whether the user has opted out of the collection of information by the AdsWizz Service Cookies.</span></td></tr><tr class="cookielawinfo-row" data-dcnode-id="481"><td class="cookielawinfo-column-1" data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">test_cookie</span></td><td class="cookielawinfo-column-3" data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">15 minutes</span></td><td class="cookielawinfo-column-4" data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">The test_cookie is set by doubleclick.net and is used to determine if the user's browser supports cookies.</span></td></tr><tr class="cookielawinfo-row" data-dcnode-id="474"><td class="cookielawinfo-column-1" data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">uuid2</span></td><td class="cookielawinfo-column-3" data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">3 months</span></td><td class="cookielawinfo-column-4" data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">The uuid2 cookie is set by AppNexus and records information that helps in differentiating between devices and browsers. This information is used to pick out ads delivered by the platform and assess the ad performance and its attribute payment.</span></td></tr><tr class="cookielawinfo-row" data-dcnode-id="467"><td class="cookielawinfo-column-1" data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">_fbp</span></td><td class="cookielawinfo-column-3" data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">3 months</span></td><td class="cookielawinfo-column-4" data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">This cookie is set by Facebook to display advertisements when either on Facebook or on a digital platform powered by Facebook advertising, after visiting the website.</span></td></tr></tbody></table></div><span data-dcnode-id="463" instrument_node="">
