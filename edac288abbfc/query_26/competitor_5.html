</span><meta content="What is Depression?
Depression is a mental illness characterized by a sad, empty or irritable mood that is persistent over time and can affect how you think, feel and act.&nbsp;
In broader terms, depression is a mental state that affects a person’s thoughts, behaviour, feelings, perception and mood. It is associated with feelings of sadness, despair, loneliness, guilt, anxiety and restlessness. People suffering from depression may have problems in sleeping, eating and concentration. It interferes with day to day life making work, social interactions and relationships difficult.
Symptoms of Depression
The signs of depression are a little different from the symptoms of other mental disorders. While everyone is bound to experience a feeling of sadness or melancholy every now and then, it is always accompanied by positive feelings such as hope and determination to overcome the problem.&nbsp;
If a person develops a depressive illness, he/she will withdraw from friends and loved ones and lose interest in all the activities he/she used to enjoy doing.
“Am I depressed?” Well, given below are some signs of depression that you should be vigilant about.

Insomnia
Loss of appetite
Persistent feelings of sadness and hopelessness
Loss of interest in all activities
Loss of energy or persistent lethargy
Negative thoughts about oneself, others and the world in general
Suicidal tendencies
Change in sexual desires
Paranoid thoughts that develop into delusions or hallucinations
Withdrawal from others
Persistent feelings of guilt or worthlessness and an overall negative attitude towards life
A general sense of dissatisfaction and emptiness
Loss of energy and fatigue that is not alleviated by rest
Racing and sometimes uncontrollable thoughts and impulses such as dwelling on the past or worries about the future.
Difficulty concentrating, remembering details and making decisions.
Irritability and mood swings are often related to work, family or other relationships.

Causes of Depression
Depression is a medical condition in which a person feels sad, anxious, or empty nearly every day for at least two weeks and shows no interest in activities once enjoyed.&nbsp;
Many possible causes of depression have been suggested. Most can be grouped into three main classifications: biological factors, psychological factors, and early childhood experiences.&nbsp;
Biological factors include heredity, viruses, poisons and illnesses, physical and/or mental trauma, birth control pills and other drugs, or hormone imbalances.
Common psychological causes of depression include:

The loss of a loved one
A troubling event, such as the end of a relationship
The loss of one’s job
Being overwhelmed by financial hardship
Stressful life events

A traumatic experience can lead to long-term depression if the person doesn’t receive help for coping with the problem. Depression also can run in families.
How to Overcome Depression?
Mental health is something that is often taken lightly in today's age. We have come to an age where the only thing people need to do is buy the best medicine for depression and magically they are cured right? Well not really, depression is a form of mental illness and it occurs when there is a chemical imbalance in the brain and disrupts the normal functioning of nerve cells. Major depression is a serious illness that affects your mood, ability to think, sleep, eat, and feel pleasure. Depression can interfere with a person’s work, school, family, and social life. It can even lead to suicide.
The good news is that depression treatment is easily available either by consulting a therapist who can prescribe depression medicine specifically to treat your kind of depression. Studies have shown that antidepressant medicines can help most people with moderate to severe depression.&nbsp;
10 Herbs to Fight Depression
Depression is a mental disorder characterized by periods of low mood and a general loss of interest in activities. Depression is like a black hole, it completely engulfs you, making you feel as if you are never going to get out of this very state.
This mental disorder can occur at any age and has no specific cause or trigger. It can also occur in severe and mild forms. A severe form of depression is called clinical depression and it causes a person to feel very helpless and have suicidal thoughts and attempts.
A milder form of depression is called situational depression that occurs when an individual is under a lot of stress or is experiencing some events in their life that make them feel helpless.
When these things happen, you may start feeling isolated and hopeless with very low energy levels. This could cause you to develop depression.
Some studies have shown that few natural remedies like herbs are also useful to cure depression and related issues.
Herbs are considered healing plants that help in boosting your physical and mental health. Herbs are the parts of plants that are used to soothe and calm the human body, mind, and soul.
They come from various sources including trees, shrubs, flowers, and grasses.
It is very important to know that there are certain herbs that help fight against depression. Although they do not have the same effect as the drugs prescribed by the doctors, they have a soothing and calming effect on you. These herbs can be found in any pharmacy and can be easily found in India.
Let's look at some of the herbs for depression.
1.&nbsp;Garlic: Garlic is one herb that has been used in the kitchen for years. It is known for its strong smell and pungent taste. Garlic can be used to prevent various health and mental disorders. It can strengthen the body's immune system and help fight depression and chronic diseases like cancer.
2. Turmeric: Turmeric is another herb that is popular for its medicinal values. It is derived from the rhizome or root of Curcuma longa plant.
3.&nbsp;Saffron: Saffron is a bright coloured spice that has antioxidant properties and compounds like carotenoids crocin and crocetin. A study suggested that saffron has shown promising results for treating depression.
4.&nbsp;Lavender: Lavender flower and its extracts have been used, both internally and by olfaction, for centuries as a treatment for depression and related issues.
5.&nbsp;St. John’s Wort: St. John’s Wort is a popular herb that has shown promise in reducing mild and moderate levels of depression.
6.&nbsp;Kava Kava: Kava is an effective herb with good tolerability for the treatment of generalized anxiety, with some evidence for stress, depression and insomnia.
7.&nbsp;Passionflower: The passionflower is a perennial plant with potential therapeutic properties. Studies suggest that the passionflower itself, as well as its preparations, helps reduce stress and can therefore be helpful in the treatment of insomnia, anxiety, and depression.
8.&nbsp;Ginseng: Ginseng has a neuroprotective effect that may be useful in the prevention of depression.&nbsp;
9.&nbsp;Rhodiola: Rhodiola herb has gazillion health benefits including reduced depressive symptoms and an improved stress response, which can help your body adapt to stressful situations.
10.&nbsp;Ginkgo Biloba: If ginkgo herb is taken before an unavoidable stressful situation can nullify the after-effects of the situation. Thereby preventing depression and related issues.&nbsp;
Take Away
Depression in simple terms is a feeling of deep sadness and lack of interest in the activities that used to give you pleasure. Depression is a common mental illness that affects many people around the world. The result of this is the inability to perform certain tasks, lack of concentration, inability to think in a positive manner, hopelessness and suicidal thoughts to name a few. All these are signs of depression.
Depression needs a lot of time and energy to treat. As for now, there are many ways to fight depression, but many of them don’t seem to be effective. People who have tried all options they have and are still not able to fight depression can turn to herbal remedies, such as St. John's Wort, Kava Kava, Passionflower, etc. These herbs are very effective in fighting depression and as a result – people start feeling better." data-dcnode-id="2520" property="og:description"><meta content="http://cdn.shopify.com/s/files/1/0477/0345/7956/articles/WhatsApp_Image_2021-09-08_at_10.41.18_AM.jpg?v=1631097905" data-dcnode-id="2519" property="og:image"><span data-dcnode-id="2518" instrument_node="">

</span><h2 class="h3 article__title" data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">10 Herbs to fight depression</span></h2><span data-dcnode-id="1820" instrument_node="">
</span><p class="article__meta" data-dcnode-id="1806"><span data-dcnode-id="1819" instrument_node="">
</span><span class="meta--light" data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">By</span></span><span data-dcnode-id="1816" instrument_node="">

</span><span class="meta--light" data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">on</span></span><span data-dcnode-id="1810" instrument_node="">
</span><span class="meta--dark" data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">September 08, 2021</span></span><span data-dcnode-id="1807" instrument_node="">
</span></p><span data-dcnode-id="1805" instrument_node="">
</span></header><span data-dcnode-id="1803" instrument_node="">
</span><div class="rte" data-dcnode-id="1508"><span data-dcnode-id="1802" instrument_node="">
</span><h1 data-dcnode-id="1799"><b data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">What is Depression?</span></b></h1><span data-dcnode-id="1798" instrument_node="">
</span><p data-dcnode-id="1795"><span data-dcnode-id="1796" style="font-weight: 400;"><span data-dcnode-id="1797" instrument_node="">Depression is a mental illness characterized by a sad, empty or irritable mood that is persistent over time and can affect how you think, feel and act.&nbsp;</span></span></p><span data-dcnode-id="1794" instrument_node="">
</span><p data-dcnode-id="1791"><span data-dcnode-id="1792" style="font-weight: 400;"><span data-dcnode-id="1793" instrument_node="">In broader terms, depression is a mental state that affects a person’s thoughts, behaviour, feelings, perception and mood. It is associated with feelings of sadness, despair, loneliness, guilt, anxiety and restlessness. People suffering from depression may have problems in sleeping, eating and concentration. It interferes with day to day life making work, social interactions and relationships difficult.</span></span></p><span data-dcnode-id="1790" instrument_node="">
</span><h2 data-dcnode-id="1787"><b data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">Symptoms of Depression</span></b></h2><span data-dcnode-id="1786" instrument_node="">
</span><p data-dcnode-id="1783"><span data-dcnode-id="1784" style="font-weight: 400;"><span data-dcnode-id="1785" instrument_node="">The signs of depression are a little different from the symptoms of other mental disorders. While everyone is bound to experience a feeling of sadness or melancholy every now and then, it is always accompanied by positive feelings such as hope and determination to overcome the problem.&nbsp;</span></span></p><span data-dcnode-id="1782" instrument_node="">
</span><p data-dcnode-id="1779"><span data-dcnode-id="1780" style="font-weight: 400;"><span data-dcnode-id="1781" instrument_node="">If a person develops a depressive illness, he/she will withdraw from friends and loved ones and lose interest in all the activities he/she used to enjoy doing.</span></span></p><span data-dcnode-id="1778" instrument_node="">
</span><p data-dcnode-id="1775"><span data-dcnode-id="1776" style="font-weight: 400;"><span data-dcnode-id="1777" instrument_node="">“Am I depressed?” Well, given below are some signs of depression that you should be vigilant about.</span></span></p><span data-dcnode-id="1774" instrument_node="">
</span><ul data-dcnode-id="1708"><span data-dcnode-id="1773" instrument_node="">
</span><li data-dcnode-id="1770" style="font-weight: 400;"><span data-dcnode-id="1771" style="font-weight: 400;"><span data-dcnode-id="1772" instrument_node="">Insomnia</span></span></li><span data-dcnode-id="1769" instrument_node="">
</span><li data-dcnode-id="1766" style="font-weight: 400;"><span data-dcnode-id="1767" style="font-weight: 400;"><span data-dcnode-id="1768" instrument_node="">Loss of appetite</span></span></li><span data-dcnode-id="1765" instrument_node="">
</span><li data-dcnode-id="1762" style="font-weight: 400;"><span data-dcnode-id="1763" style="font-weight: 400;"><span data-dcnode-id="1764" instrument_node="">Persistent feelings of sadness and hopelessness</span></span></li><span data-dcnode-id="1761" instrument_node="">
</span><li data-dcnode-id="1758" style="font-weight: 400;"><span data-dcnode-id="1759" style="font-weight: 400;"><span data-dcnode-id="1760" instrument_node="">Loss of interest in all activities</span></span></li><span data-dcnode-id="1757" instrument_node="">
</span><li data-dcnode-id="1754" style="font-weight: 400;"><span data-dcnode-id="1755" style="font-weight: 400;"><span data-dcnode-id="1756" instrument_node="">Loss of energy or persistent lethargy</span></span></li><span data-dcnode-id="1753" instrument_node="">
</span><li data-dcnode-id="1750" style="font-weight: 400;"><span data-dcnode-id="1751" style="font-weight: 400;"><span data-dcnode-id="1752" instrument_node="">Negative thoughts about oneself, others and the world in general</span></span></li><span data-dcnode-id="1749" instrument_node="">
</span><li data-dcnode-id="1746" style="font-weight: 400;"><span data-dcnode-id="1747" style="font-weight: 400;"><span data-dcnode-id="1748" instrument_node="">Suicidal tendencies</span></span></li><span data-dcnode-id="1745" instrument_node="">
</span><li data-dcnode-id="1742" style="font-weight: 400;"><span data-dcnode-id="1743" style="font-weight: 400;"><span data-dcnode-id="1744" instrument_node="">Change in sexual desires</span></span></li><span data-dcnode-id="1741" instrument_node="">
</span><li data-dcnode-id="1738" style="font-weight: 400;"><span data-dcnode-id="1739" style="font-weight: 400;"><span data-dcnode-id="1740" instrument_node="">Paranoid thoughts that develop into delusions or hallucinations</span></span></li><span data-dcnode-id="1737" instrument_node="">
</span><li data-dcnode-id="1734" style="font-weight: 400;"><span data-dcnode-id="1735" style="font-weight: 400;"><span data-dcnode-id="1736" instrument_node="">Withdrawal from others</span></span></li><span data-dcnode-id="1733" instrument_node="">
</span><li data-dcnode-id="1730" style="font-weight: 400;"><span data-dcnode-id="1731" style="font-weight: 400;"><span data-dcnode-id="1732" instrument_node="">Persistent feelings of guilt or worthlessness and an overall negative attitude towards life</span></span></li><span data-dcnode-id="1729" instrument_node="">
</span><li data-dcnode-id="1726" style="font-weight: 400;"><span data-dcnode-id="1727" style="font-weight: 400;"><span data-dcnode-id="1728" instrument_node="">A general sense of dissatisfaction and emptiness</span></span></li><span data-dcnode-id="1725" instrument_node="">
</span><li data-dcnode-id="1722" style="font-weight: 400;"><span data-dcnode-id="1723" style="font-weight: 400;"><span data-dcnode-id="1724" instrument_node="">Loss of energy and fatigue that is not alleviated by rest</span></span></li><span data-dcnode-id="1721" instrument_node="">
</span><li data-dcnode-id="1718" style="font-weight: 400;"><span data-dcnode-id="1719" style="font-weight: 400;"><span data-dcnode-id="1720" instrument_node="">Racing and sometimes uncontrollable thoughts and impulses such as dwelling on the past or worries about the future.</span></span></li><span data-dcnode-id="1717" instrument_node="">
</span><li data-dcnode-id="1714" style="font-weight: 400;"><span data-dcnode-id="1715" style="font-weight: 400;"><span data-dcnode-id="1716" instrument_node="">Difficulty concentrating, remembering details and making decisions.</span></span></li><span data-dcnode-id="1713" instrument_node="">
</span><li data-dcnode-id="1710" style="font-weight: 400;"><span data-dcnode-id="1711" style="font-weight: 400;"><span data-dcnode-id="1712" instrument_node="">Irritability and mood swings are often related to work, family or other relationships.</span></span></li><span data-dcnode-id="1709" instrument_node="">
</span></ul><span data-dcnode-id="1707" instrument_node="">
</span><h2 data-dcnode-id="1704"><b data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">Causes of Depression</span></b></h2><span data-dcnode-id="1703" instrument_node="">
</span><p data-dcnode-id="1700"><span data-dcnode-id="1701" style="font-weight: 400;"><span data-dcnode-id="1702" instrument_node="">Depression is a medical condition in which a person feels sad, anxious, or empty nearly every day for at least two weeks and shows no interest in activities once enjoyed.&nbsp;</span></span></p><span data-dcnode-id="1699" instrument_node="">
</span><p data-dcnode-id="1696"><span data-dcnode-id="1697" style="font-weight: 400;"><span data-dcnode-id="1698" instrument_node="">Many possible causes of depression have been suggested. Most can be grouped into three main classifications: biological factors, psychological factors, and early childhood experiences.&nbsp;</span></span></p><span data-dcnode-id="1695" instrument_node="">
</span><p data-dcnode-id="1692"><span data-dcnode-id="1693" style="font-weight: 400;"><span data-dcnode-id="1694" instrument_node="">Biological factors include heredity, viruses, poisons and illnesses, physical and/or mental trauma, birth control pills and other drugs, or hormone imbalances.</span></span></p><span data-dcnode-id="1691" instrument_node="">
</span><p data-dcnode-id="1686"><strong data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Common psychological causes of depression include:</span></strong><span data-dcnode-id="1687" style="font-weight: 400;"><br data-dcnode-id="1688"></span></p><span data-dcnode-id="1685" instrument_node="">
</span><ul data-dcnode-id="1663"><span data-dcnode-id="1684" instrument_node="">
</span><li data-dcnode-id="1681" style="font-weight: 400;"><span data-dcnode-id="1682" style="font-weight: 400;"><span data-dcnode-id="1683" instrument_node="">The loss of a loved one</span></span></li><span data-dcnode-id="1680" instrument_node="">
</span><li data-dcnode-id="1677" style="font-weight: 400;"><span data-dcnode-id="1678" style="font-weight: 400;"><span data-dcnode-id="1679" instrument_node="">A troubling event, such as the end of a relationship</span></span></li><span data-dcnode-id="1676" instrument_node="">
</span><li data-dcnode-id="1673" style="font-weight: 400;"><span data-dcnode-id="1674" style="font-weight: 400;"><span data-dcnode-id="1675" instrument_node="">The loss of one’s job</span></span></li><span data-dcnode-id="1672" instrument_node="">
</span><li data-dcnode-id="1669" style="font-weight: 400;"><span data-dcnode-id="1670" style="font-weight: 400;"><span data-dcnode-id="1671" instrument_node="">Being overwhelmed by financial hardship</span></span></li><span data-dcnode-id="1668" instrument_node="">
</span><li data-dcnode-id="1665" style="font-weight: 400;"><span data-dcnode-id="1666" style="font-weight: 400;"><span data-dcnode-id="1667" instrument_node="">Stressful life events</span></span></li><span data-dcnode-id="1664" instrument_node="">
</span></ul><span data-dcnode-id="1662" instrument_node="">
</span><p data-dcnode-id="1659"><span data-dcnode-id="1660" style="font-weight: 400;"><span data-dcnode-id="1661" instrument_node="">A traumatic experience can lead to long-term depression if the person doesn’t receive help for coping with the problem. Depression also can run in families.</span></span></p><span data-dcnode-id="1658" instrument_node="">
</span><h2 data-dcnode-id="1655"><b data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">How to Overcome Depression?</span></b></h2><span data-dcnode-id="1654" instrument_node="">
</span><p data-dcnode-id="1651"><span data-dcnode-id="1652" style="font-weight: 400;"><span data-dcnode-id="1653" instrument_node="">Mental health is something that is often taken lightly in today's age. We have come to an age where the only thing people need to do is buy the best medicine for depression and magically they are cured right? Well not really, depression is a form of mental illness and it occurs when there is a chemical imbalance in the brain and disrupts the normal functioning of nerve cells. Major depression is a serious illness that affects your mood, ability to think, sleep, eat, and feel pleasure. Depression can interfere with a person’s work, school, family, and social life. It can even lead to suicide.</span></span></p><span data-dcnode-id="1650" instrument_node="">
</span><p data-dcnode-id="1647"><span data-dcnode-id="1648" style="font-weight: 400;"><span data-dcnode-id="1649" instrument_node="">The good news is that depression treatment is easily available either by consulting a therapist who can prescribe depression medicine specifically to treat your kind of depression. Studies have shown that antidepressant medicines can help most people with moderate to severe depression.&nbsp;</span></span></p><span data-dcnode-id="1646" instrument_node="">
</span><h2 data-dcnode-id="1643"><b data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">10 Herbs to Fight Depression</span></b></h2><span data-dcnode-id="1642" instrument_node="">
</span><p data-dcnode-id="1639"><span data-dcnode-id="1640" style="font-weight: 400;"><span data-dcnode-id="1641" instrument_node="">Depression is a mental disorder characterized by periods of low mood and a general loss of interest in activities. Depression is like a black hole, it completely engulfs you, making you feel as if you are never going to get out of this very state.</span></span></p><span data-dcnode-id="1638" instrument_node="">
</span><p data-dcnode-id="1635"><span data-dcnode-id="1636" style="font-weight: 400;"><span data-dcnode-id="1637" instrument_node="">This mental disorder can occur at any age and has no specific cause or trigger. It can also occur in severe and mild forms. A severe form of depression is called clinical depression and it causes a person to feel very helpless and have suicidal thoughts and attempts.</span></span></p><span data-dcnode-id="1634" instrument_node="">
</span><p data-dcnode-id="1631"><span data-dcnode-id="1632" style="font-weight: 400;"><span data-dcnode-id="1633" instrument_node="">A milder form of depression is called situational depression that occurs when an individual is under a lot of stress or is experiencing some events in their life that make them feel helpless.</span></span></p><span data-dcnode-id="1630" instrument_node="">
</span><p data-dcnode-id="1627"><span data-dcnode-id="1628" style="font-weight: 400;"><span data-dcnode-id="1629" instrument_node="">When these things happen, you may start feeling isolated and hopeless with very low energy levels. This could cause you to develop depression.</span></span></p><span data-dcnode-id="1626" instrument_node="">
</span><p data-dcnode-id="1618"><span data-dcnode-id="1624" style="font-weight: 400;"><span data-dcnode-id="1625" instrument_node="">Some </span></span><a data-dcnode-id="1621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4790408/"><span data-dcnode-id="1622" style="font-weight: 400;"><span data-dcnode-id="1623" instrument_node="">studies</span></span></a><span data-dcnode-id="1619" style="font-weight: 400;"><span data-dcnode-id="1620" instrument_node=""> have shown that few natural remedies like herbs are also useful to cure depression and related issues.</span></span></p><span data-dcnode-id="1617" instrument_node="">
</span><p data-dcnode-id="1614"><span data-dcnode-id="1615" style="font-weight: 400;"><span data-dcnode-id="1616" instrument_node="">Herbs are considered healing plants that help in boosting your physical and mental health. Herbs are the parts of plants that are used to soothe and calm the human body, mind, and soul.</span></span></p><span data-dcnode-id="1613" instrument_node="">
</span><p data-dcnode-id="1610"><span data-dcnode-id="1611" style="font-weight: 400;"><span data-dcnode-id="1612" instrument_node="">They come from various sources including trees, shrubs, flowers, and grasses.</span></span></p><span data-dcnode-id="1609" instrument_node="">
</span><p data-dcnode-id="1606"><span data-dcnode-id="1607" style="font-weight: 400;"><span data-dcnode-id="1608" instrument_node="">It is very important to know that there are certain herbs that help fight against depression. Although they do not have the same effect as the drugs prescribed by the doctors, they have a soothing and calming effect on you. These herbs can be found in any pharmacy and can be easily found in India.</span></span></p><span data-dcnode-id="1605" instrument_node="">
</span><p data-dcnode-id="1597"><span data-dcnode-id="1603" style="font-weight: 400;"><span data-dcnode-id="1604" instrument_node="">Let's look at some of the</span></span><a data-dcnode-id="1600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/nutrition/herbs-supplements-for-depression"><span data-dcnode-id="1601" style="font-weight: 400;"><span data-dcnode-id="1602" instrument_node=""> herbs for depression</span></span></a><span data-dcnode-id="1598" style="font-weight: 400;"><span data-dcnode-id="1599" instrument_node="">.</span></span></p><span data-dcnode-id="1596" instrument_node="">
</span><p data-dcnode-id="1592"><strong data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">1.&nbsp;Garlic:</span></strong><span data-dcnode-id="1593" instrument_node=""> Garlic is one herb that has been used in the kitchen for years. It is known for its strong smell and pungent taste. Garlic can be used to prevent various health and mental disorders. It can strengthen the body's immune system and help fight depression and chronic diseases like cancer.</span></p><span data-dcnode-id="1591" instrument_node="">
</span><p data-dcnode-id="1587"><strong data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">2. Turmeric:</span></strong><span data-dcnode-id="1588" instrument_node=""> Turmeric is another herb that is popular for its medicinal values. It is derived from the rhizome or root of Curcuma longa plant.</span></p><span data-dcnode-id="1586" instrument_node="">
</span><p data-dcnode-id="1574"><strong data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">3.&nbsp;</span></strong><span data-dcnode-id="1580" style="font-weight: 400;"><strong data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">Saffron:</span></strong><span data-dcnode-id="1581" instrument_node=""> Saffron is a bright coloured spice that has antioxidant properties and compounds like carotenoids crocin and crocetin. A </span></span><a data-dcnode-id="1577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4643654/"><span data-dcnode-id="1578" style="font-weight: 400;"><span data-dcnode-id="1579" instrument_node="">study</span></span></a><span data-dcnode-id="1575" style="font-weight: 400;"><span data-dcnode-id="1576" instrument_node=""> suggested that saffron has shown promising results for treating depression.</span></span></p><span data-dcnode-id="1573" instrument_node="">
</span><p data-dcnode-id="1564"><strong data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">4.&nbsp;</span></strong><span data-dcnode-id="1567" style="font-weight: 400;"><strong data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">Lavender:</span></strong><span data-dcnode-id="1568" instrument_node=""> </span></span><span data-dcnode-id="1565" style="font-weight: 400;"><span data-dcnode-id="1566" instrument_node="">Lavender flower and its extracts have been used, both internally and by olfaction, for centuries as a treatment for depression and related issues.</span></span></p><span data-dcnode-id="1563" instrument_node="">
</span><p data-dcnode-id="1559"><strong data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">5.&nbsp;St. John’s Wort:</span></strong><span data-dcnode-id="1560" instrument_node=""> St. John’s Wort is a popular herb that has shown promise in reducing mild and moderate levels of depression.</span></p><span data-dcnode-id="1558" instrument_node="">
</span><p data-dcnode-id="1553"><strong data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">6.&nbsp;Kava Kava: </span></strong><span data-dcnode-id="1554" style="font-weight: 400;"><span data-dcnode-id="1555" instrument_node="">Kava is an effective herb with good tolerability for the treatment of generalized anxiety, with some evidence for stress, depression and insomnia.</span></span></p><span data-dcnode-id="1552" instrument_node="">
</span><p data-dcnode-id="1543"><strong data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">7.&nbsp;</span></strong><span data-dcnode-id="1546" style="font-weight: 400;"><strong data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">Passionflower:</span></strong><span data-dcnode-id="1547" instrument_node=""> </span></span><span data-dcnode-id="1544" style="font-weight: 400;"><span data-dcnode-id="1545" instrument_node="">The passionflower is a perennial plant with potential therapeutic properties. Studies suggest that the passionflower itself, as well as its preparations, helps reduce stress and can therefore be helpful in the treatment of insomnia, anxiety, and depression.</span></span></p><span data-dcnode-id="1542" instrument_node="">
</span><p data-dcnode-id="1537"><strong data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">8.&nbsp;Ginseng: </span></strong><span data-dcnode-id="1538" style="font-weight: 400;"><span data-dcnode-id="1539" instrument_node="">Ginseng has a neuroprotective effect that may be useful in the prevention of depression.&nbsp;</span></span></p><span data-dcnode-id="1536" instrument_node="">
</span><p data-dcnode-id="1532"><strong data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">9.&nbsp;Rhodiola:</span></strong><span data-dcnode-id="1533" instrument_node=""> Rhodiola herb has gazillion health benefits including reduced depressive symptoms and an improved stress response, which can help your body adapt to stressful situations.</span></p><span data-dcnode-id="1531" instrument_node="">
</span><p data-dcnode-id="1522"><strong data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">10.&nbsp;</span></strong><span data-dcnode-id="1525" style="font-weight: 400;"><strong data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">Ginkgo Biloba:</span></strong><span data-dcnode-id="1526" instrument_node=""> If ginkgo herb is taken before</span></span><span data-dcnode-id="1523" style="font-weight: 400;"><span data-dcnode-id="1524" instrument_node=""> an unavoidable stressful situation can nullify the after-effects of the situation. Thereby preventing depression and related issues.&nbsp;</span></span></p><span data-dcnode-id="1521" instrument_node="">
</span><h2 data-dcnode-id="1518"><b data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">Take Away</span></b></h2><span data-dcnode-id="1517" instrument_node="">
</span><p data-dcnode-id="1514"><span data-dcnode-id="1515" style="font-weight: 400;"><span data-dcnode-id="1516" instrument_node="">Depression in simple terms is a feeling of deep sadness and lack of interest in the activities that used to give you pleasure. Depression is a common mental illness that affects many people around the world. The result of this is the inability to perform certain tasks, lack of concentration, inability to think in a positive manner, hopelessness and suicidal thoughts to name a few. All these are signs of depression.</span></span></p><span data-dcnode-id="1513" instrument_node="">
</span><p data-dcnode-id="1510"><span data-dcnode-id="1511" style="font-weight: 400;"><span data-dcnode-id="1512" instrument_node="">Depression needs a lot of time and energy to treat. As for now, there are many ways to fight depression, but many of them don’t seem to be effective. People who have tried all options they have and are still not able to fight depression can turn to herbal remedies, such as St. John's Wort, Kava Kava, Passionflower, etc. These herbs are very effective in fighting depression and as a result – people start feeling better.</span></span></p><span data-dcnode-id="1509" instrument_node="">
</span></div><span data-dcnode-id="1507" instrument_node="">

</span><a class="blog__tag" data-dcnode-id="1456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ghc.health/blogs/all-about-men/tagged/beard"><span data-dcnode-id="1457" instrument_node="">Beard</span></a><span data-dcnode-id="1455" instrument_node="">
