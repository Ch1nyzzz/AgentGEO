</span><h1 class="entry-title" data-dcnode-id="811" itemprop="headline"><span data-dcnode-id="812" instrument_node="">How Does CBD Oil Work?</span></h1><div class="entry-meta" data-dcnode-id="800"><span data-dcnode-id="810" instrument_node="">By </span><span class="posted-by vcard author" data-dcnode-id="802" itemprop="author" itemscope="itemscope" itemtype="https://schema.org/Person"><span data-dcnode-id="809" instrument_node=""> </span><a class="url fn n" data-dcnode-id="804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cbdoilgeek.com/author/cbdwpx/" itemprop="url" rel="author" title="View all posts by Will Anderson"><span data-dcnode-id="808" instrument_node="">
</span><span class="author-name" data-dcnode-id="806" itemprop="name"><span data-dcnode-id="807" instrument_node="">Will Anderson</span></span><span data-dcnode-id="805" instrument_node="">
</span></a><span data-dcnode-id="803" instrument_node="">
</span></span><span data-dcnode-id="801" instrument_node="">
</span></div><span data-dcnode-id="799" instrument_node=""> </span></div><span data-dcnode-id="797" instrument_node="">
</span></header><span data-dcnode-id="794" instrument_node="">
</span><div class="entry-content clear" data-dcnode-id="159" itemprop="text"><span data-dcnode-id="793" instrument_node="">
</span><div class="tve_flt tcb-style-wrap" data-dcnode-id="162" id="tve_flt"><div class="tve_shortcode_editor tar-main-content" data-dcnode-id="163" data-post-id="830" id="tve_editor"><div class="thrv_wrapper tve_image_caption" data-css="tve-u-16f57a341f1" data-dcnode-id="790" style=""><span class="tve_image_frame" data-dcnode-id="791"><img alt="how long does it take for cbd to start working" class="tve_image wp-image-831" data-css="tve-u-16f57a341f7" data-dcnode-id="792" data-id="831" height="517" sizes="(max-width: 920px) 100vw, 920px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cbdoilgeek.com/wp-content/uploads/2018/09/how-does-cbd-oil-work.jpg&amp;raw" srcset="https://cbdoilgeek.com/wp-content/uploads/2018/09/how-does-cbd-oil-work.jpg 920w, https://cbdoilgeek.com/wp-content/uploads/2018/09/how-does-cbd-oil-work-300x169.jpg 300w, https://cbdoilgeek.com/wp-content/uploads/2018/09/how-does-cbd-oil-work-768x432.jpg 768w" title="how does cbd oil work" width="920"></span></div><div class="thrv_wrapper tve_wp_shortcode" data-dcnode-id="164"><div class="tve_shortcode_raw" data-dcnode-id="789" style="display: none"></div><div class="tve_shortcode_rendered" data-dcnode-id="165"><p class="MsoNormal" data-dcnode-id="786"><span data-dcnode-id="787" lang="EN-US"><span data-dcnode-id="788" instrument_node="">You have probably noticed that one of the biggest health trends of 2018 has been the rise of CBD oil and other products containing this cannabinoid found in the cannabis plant. However, you may be wondering if it is just marketing hype or if there is any science to back up manufacturers’ claims. </span></span></p><span data-dcnode-id="785" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="781"><b data-dcnode-id="782" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="783" lang="EN-US"><span data-dcnode-id="784" instrument_node="">In fact, the science behind the health benefits of CBD oil may amaze you! </span></span></b></p><span data-dcnode-id="780" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="777"><span data-dcnode-id="778" lang="EN-US"><span data-dcnode-id="779" instrument_node="">In the late 1980’s scientists discovered the endocannabinoid system (ECS) and soon learned that it is responsible for maintaining the homeostasis (balance) of a huge variety of processes in the body. Turns out that everything from blood pressure to your immune system is regulated by the ECS. </span></span></p><span data-dcnode-id="776" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="773"><span data-dcnode-id="774" lang="EN-US"><span data-dcnode-id="775" instrument_node="">Because CBD interacts with that system it has become a molecule of great interest in the medical community. If you want to learn more about how CBD works in the body, you have come to the right place!</span></span></p><span data-dcnode-id="772" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="768"><b data-dcnode-id="769" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="770" lang="EN-US"><span data-dcnode-id="771" instrument_node="">In this article, I will address the following questions:</span></span></b></p><span data-dcnode-id="767" instrument_node="">
</span><p class="MsoListParagraphCxSpFirst" data-dcnode-id="759" style="text-indent: -18.0pt; mso-list: l0 level1 lfo4;"><span data-dcnode-id="762" lang="EN-US" style="font-family: Symbol; mso-fareast-font-family: Symbol; mso-bidi-font-family: Symbol;"><span data-dcnode-id="763" style="mso-list: Ignore;"><span data-dcnode-id="766" instrument_node="">·</span><span data-dcnode-id="764" style="font: 7.0pt 'Times New Roman';"><span data-dcnode-id="765" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></span></span></span><span data-dcnode-id="760" lang="EN-US"><span data-dcnode-id="761" instrument_node="">What is the endocannabinoid system?</span></span></p><span data-dcnode-id="758" instrument_node="">
</span><p class="MsoListParagraphCxSpMiddle" data-dcnode-id="750" style="text-indent: -18.0pt; mso-list: l0 level1 lfo4;"><span data-dcnode-id="753" lang="EN-US" style="font-family: Symbol; mso-fareast-font-family: Symbol; mso-bidi-font-family: Symbol;"><span data-dcnode-id="754" style="mso-list: Ignore;"><span data-dcnode-id="757" instrument_node="">·</span><span data-dcnode-id="755" style="font: 7.0pt 'Times New Roman';"><span data-dcnode-id="756" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></span></span></span><span data-dcnode-id="751" lang="EN-US"><span data-dcnode-id="752" instrument_node="">What is the “entourage effect”?</span></span></p><span data-dcnode-id="749" instrument_node="">
</span><p class="MsoListParagraphCxSpMiddle" data-dcnode-id="741" style="text-indent: -18.0pt; mso-list: l0 level1 lfo4;"><span data-dcnode-id="744" lang="EN-US" style="font-family: Symbol; mso-fareast-font-family: Symbol; mso-bidi-font-family: Symbol;"><span data-dcnode-id="745" style="mso-list: Ignore;"><span data-dcnode-id="748" instrument_node="">·</span><span data-dcnode-id="746" style="font: 7.0pt 'Times New Roman';"><span data-dcnode-id="747" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></span></span></span><span data-dcnode-id="742" lang="EN-US"><span data-dcnode-id="743" instrument_node="">What are some of the specific ways CBD interacts with the endocannabinoid system?</span></span></p><span data-dcnode-id="740" instrument_node="">
</span><p class="MsoListParagraphCxSpLast" data-dcnode-id="732" style="text-indent: -18.0pt; mso-list: l0 level1 lfo4;"><span data-dcnode-id="735" lang="EN-US" style="font-family: Symbol; mso-fareast-font-family: Symbol; mso-bidi-font-family: Symbol;"><span data-dcnode-id="736" style="mso-list: Ignore;"><span data-dcnode-id="739" instrument_node="">·</span><span data-dcnode-id="737" style="font: 7.0pt 'Times New Roman';"><span data-dcnode-id="738" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></span></span></span><span data-dcnode-id="733" lang="EN-US"><span data-dcnode-id="734" instrument_node="">What has science revealed about potential therapeutic targets of CBD oil?</span></span></p><span data-dcnode-id="731" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="728"><span data-dcnode-id="729" lang="EN-US"><span data-dcnode-id="730" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="727" instrument_node="">
</span><h2 data-dcnode-id="724"><span data-dcnode-id="725" lang="EN-US"><span data-dcnode-id="726" instrument_node="">The Endocannabinoid System</span></span></h2><span data-dcnode-id="723" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="712"><span data-dcnode-id="713" lang="EN-US"><span data-dcnode-id="722" instrument_node="">One of the most fascinating aspects of cannabis based medical research has been the </span><span class="MsoHyperlink" data-dcnode-id="719"><a data-dcnode-id="720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rstb.royalsocietypublishing.org/content/356/1407/381"><span data-dcnode-id="721" instrument_node="">discovery</span></a></span><span data-dcnode-id="718" instrument_node=""> in the late 1980’a of the body’s </span><span class="MsoHyperlink" data-dcnode-id="715"><a data-dcnode-id="716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Endocannabinoid_system"><span data-dcnode-id="717" instrument_node="">endocannabinoid system</span></a></span><span data-dcnode-id="714" instrument_node=""> (ECS) which is responsible for a variety of vital processes. The ECS includes four basic elements:</span></span></p><span data-dcnode-id="711" instrument_node="">
</span><p class="MsoListParagraphCxSpFirst" data-dcnode-id="700" style="text-indent: -18.0pt; mso-list: l3 level1 lfo1;"><span data-dcnode-id="706" lang="EN-US" style="font-family: Symbol; mso-fareast-font-family: Symbol; mso-bidi-font-family: Symbol;"><span data-dcnode-id="707" style="mso-list: Ignore;"><span data-dcnode-id="710" instrument_node="">·</span><span data-dcnode-id="708" style="font: 7.0pt 'Times New Roman';"><span data-dcnode-id="709" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></span></span></span><b data-dcnode-id="703" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="704" lang="EN-US"><span data-dcnode-id="705" instrument_node="">Endocannabinoids:</span></span></b><span data-dcnode-id="701" lang="EN-US"><span data-dcnode-id="702" instrument_node=""> Lipids that the body itself produces including anandamide and 2-arachidonoylglyderol (2-AG).</span></span></p><span data-dcnode-id="699" instrument_node="">
</span><p class="MsoListParagraphCxSpMiddle" data-dcnode-id="688" style="text-indent: -18.0pt; mso-list: l3 level1 lfo1;"><span data-dcnode-id="694" lang="EN-US" style="font-family: Symbol; mso-fareast-font-family: Symbol; mso-bidi-font-family: Symbol;"><span data-dcnode-id="695" style="mso-list: Ignore;"><span data-dcnode-id="698" instrument_node="">·</span><span data-dcnode-id="696" style="font: 7.0pt 'Times New Roman';"><span data-dcnode-id="697" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></span></span></span><b data-dcnode-id="691" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="692" lang="EN-US"><span data-dcnode-id="693" instrument_node="">Enzymes to break down Endocannabinoids:</span></span></b><span data-dcnode-id="689" lang="EN-US"><span data-dcnode-id="690" instrument_node=""> Including fatty acid amide hydrolase and monoacylglycerol lipase.</span></span></p><span data-dcnode-id="687" instrument_node="">
</span><p class="MsoListParagraphCxSpMiddle" data-dcnode-id="670" style="text-indent: -18.0pt; mso-list: l3 level1 lfo1;"><span data-dcnode-id="682" lang="EN-US" style="font-family: Symbol; mso-fareast-font-family: Symbol; mso-bidi-font-family: Symbol;"><span data-dcnode-id="683" style="mso-list: Ignore;"><span data-dcnode-id="686" instrument_node="">·</span><span data-dcnode-id="684" style="font: 7.0pt 'Times New Roman';"><span data-dcnode-id="685" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></span></span></span><b data-dcnode-id="679" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="680" lang="EN-US"><span data-dcnode-id="681" instrument_node="">Cannabinoid receptors:</span></span></b><span data-dcnode-id="671" lang="EN-US"><span data-dcnode-id="678" instrument_node=""> Including CB</span><sub data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">1</span></sub><span data-dcnode-id="675" instrument_node=""> and CB</span><sub data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">2</span></sub><span data-dcnode-id="672" instrument_node=""> found in the brain, central nervous system, peripheral nervous system and the immune system. </span></span></p><span data-dcnode-id="669" instrument_node="">
</span><p class="MsoListParagraphCxSpLast" data-dcnode-id="658" style="text-indent: -18.0pt; mso-list: l3 level1 lfo1;"><span data-dcnode-id="664" lang="EN-US" style="font-family: Symbol; mso-fareast-font-family: Symbol; mso-bidi-font-family: Symbol;"><span data-dcnode-id="665" style="mso-list: Ignore;"><span data-dcnode-id="668" instrument_node="">·</span><span data-dcnode-id="666" style="font: 7.0pt 'Times New Roman';"><span data-dcnode-id="667" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></span></span></span><b data-dcnode-id="661" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="662" lang="EN-US"><span data-dcnode-id="663" instrument_node="">Other neurons and neural pathways:</span></span></b><span data-dcnode-id="659" lang="EN-US"><span data-dcnode-id="660" instrument_node=""> These work in synergy with the other elements of the ECS. </span></span></p><span data-dcnode-id="657" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="654"><span data-dcnode-id="655" lang="EN-US"><span data-dcnode-id="656" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="653" instrument_node="">
</span><h3 data-dcnode-id="647"><span data-dcnode-id="648" lang="EN-US"><span data-dcnode-id="652" instrument_node="">CB</span><sub data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">1</span></sub><span data-dcnode-id="649" instrument_node=""> Receptor</span></span></h3><span data-dcnode-id="646" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="639"><span data-dcnode-id="640" lang="EN-US"><br data-dcnode-id="645"><span data-dcnode-id="644" instrument_node="">
The CB</span><sub data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">1</span></sub><span data-dcnode-id="641" instrument_node=""> Receptor is found mostly in the central and peripheral nervous system. Smaller amounts are also found in the spleen, endocrine gland, white blood cells and gastrointestinal and urinary tracts. There are even some found in the reproductive organs of both sexes. </span></span></p><span data-dcnode-id="638" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="635"><span data-dcnode-id="636" lang="EN-US"><span data-dcnode-id="637" instrument_node="">It can be activated by endocannabinoids such as anandamide and 2-AG. It is also activated by THC, a major cannabinoid found in cannabis. </span></span></p><span data-dcnode-id="634" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="624"><span data-dcnode-id="625" lang="EN-US"><span data-dcnode-id="633" instrument_node="">The CB</span><sub data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">1</span></sub><span data-dcnode-id="630" instrument_node=""> receptor is deactivated by the phytocannabinoid (also known as a terpene) </span><span class="MsoHyperlink" data-dcnode-id="627"><a data-dcnode-id="628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tetrahydrocannabivarin"><span data-dcnode-id="629" instrument_node="">THCV</span></a></span><span data-dcnode-id="626" instrument_node="">. This shows the complexity of how cannabinoids function in the ECS. </span></span></p><span data-dcnode-id="623" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="620"><span data-dcnode-id="621" lang="EN-US"><span data-dcnode-id="622" instrument_node="">Through a variety of mechanisms, the CB1 receptor appears to be implicated in a variety of key body functions, playing a role in regulating them to a balance point. These functions include both physical and psychological aspects and include regulation over:</span></span></p><span data-dcnode-id="619" instrument_node="">
</span><p class="MsoListParagraphCxSpFirst" data-dcnode-id="604" style="text-indent: -18.0pt; mso-list: l1 level1 lfo2;"><span data-dcnode-id="614" lang="EN-US" style="font-family: Symbol; mso-fareast-font-family: Symbol; mso-bidi-font-family: Symbol;"><span data-dcnode-id="615" style="mso-list: Ignore;"><span data-dcnode-id="618" instrument_node="">·</span><span data-dcnode-id="616" style="font: 7.0pt 'Times New Roman';"><span data-dcnode-id="617" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></span></span></span><span class="MsoHyperlink" data-dcnode-id="610"><span data-dcnode-id="611" lang="EN-US"><a data-dcnode-id="612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3206034/"><span data-dcnode-id="613" instrument_node="">Anxiety</span></a></span></span><span data-dcnode-id="605" lang="EN-US"><span data-dcnode-id="609" instrument_node=""> and </span><span class="MsoHyperlink" data-dcnode-id="606"><a data-dcnode-id="607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2889099/"><span data-dcnode-id="608" instrument_node="">stress</span></a></span></span></p><span data-dcnode-id="603" instrument_node="">
</span><p class="MsoListParagraphCxSpMiddle" data-dcnode-id="593" style="text-indent: -18.0pt; mso-list: l1 level1 lfo2;"><span data-dcnode-id="598" lang="EN-US" style="font-family: Symbol; mso-fareast-font-family: Symbol; mso-bidi-font-family: Symbol;"><span data-dcnode-id="599" style="mso-list: Ignore;"><span data-dcnode-id="602" instrument_node="">·</span><span data-dcnode-id="600" style="font: 7.0pt 'Times New Roman';"><span data-dcnode-id="601" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></span></span></span><span class="MsoHyperlink" data-dcnode-id="594"><span data-dcnode-id="595" lang="EN-US"><a data-dcnode-id="596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3705914/"><span data-dcnode-id="597" instrument_node="">Appetite</span></a></span></span></p><span data-dcnode-id="592" instrument_node="">
</span><p class="MsoListParagraphCxSpMiddle" data-dcnode-id="582" style="text-indent: -18.0pt; mso-list: l1 level1 lfo2;"><span data-dcnode-id="587" lang="EN-US" style="font-family: Symbol; mso-fareast-font-family: Symbol; mso-bidi-font-family: Symbol;"><span data-dcnode-id="588" style="mso-list: Ignore;"><span data-dcnode-id="591" instrument_node="">·</span><span data-dcnode-id="589" style="font: 7.0pt 'Times New Roman';"><span data-dcnode-id="590" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></span></span></span><span class="MsoHyperlink" data-dcnode-id="583"><span data-dcnode-id="584" lang="EN-US"><a data-dcnode-id="585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/nn.2974"><span data-dcnode-id="586" instrument_node="">Depression</span></a></span></span></p><span data-dcnode-id="581" instrument_node="">
</span><p class="MsoListParagraphCxSpMiddle" data-dcnode-id="571" style="text-indent: -18.0pt; mso-list: l1 level1 lfo2;"><span data-dcnode-id="576" lang="EN-US" style="font-family: Symbol; mso-fareast-font-family: Symbol; mso-bidi-font-family: Symbol;"><span data-dcnode-id="577" style="mso-list: Ignore;"><span data-dcnode-id="580" instrument_node="">·</span><span data-dcnode-id="578" style="font: 7.0pt 'Times New Roman';"><span data-dcnode-id="579" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></span></span></span><span class="MsoHyperlink" data-dcnode-id="572"><span data-dcnode-id="573" lang="EN-US"><a data-dcnode-id="574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0091305700002811%3Fvia%253Dihub"><span data-dcnode-id="575" instrument_node="">Motor control</span></a></span></span></p><span data-dcnode-id="570" instrument_node="">
</span><p class="MsoListParagraphCxSpLast" data-dcnode-id="560" style="text-indent: -18.0pt; mso-list: l1 level1 lfo2;"><span data-dcnode-id="565" lang="EN-US" style="font-family: Symbol; mso-fareast-font-family: Symbol; mso-bidi-font-family: Symbol;"><span data-dcnode-id="566" style="mso-list: Ignore;"><span data-dcnode-id="569" instrument_node="">·</span><span data-dcnode-id="567" style="font: 7.0pt 'Times New Roman';"><span data-dcnode-id="568" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></span></span></span><span class="MsoHyperlink" data-dcnode-id="561"><span data-dcnode-id="562" lang="EN-US"><a data-dcnode-id="563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/15992935"><span data-dcnode-id="564" instrument_node="">Addiction</span></a></span></span></p><span data-dcnode-id="559" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="556"><span data-dcnode-id="557" lang="EN-US"><span data-dcnode-id="558" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="555" instrument_node="">
</span><h3 data-dcnode-id="549"><span data-dcnode-id="550" lang="EN-US"><span data-dcnode-id="554" instrument_node="">CB</span><sub data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">2</span></sub><span data-dcnode-id="551" instrument_node=""> Receptor</span></span></h3><span data-dcnode-id="548" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="539"><span data-dcnode-id="540" lang="EN-US"><span data-dcnode-id="547" instrument_node="">CB</span><sub data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">2</span></sub><span data-dcnode-id="544" instrument_node=""> Receptors can also be found throughout the body, although they are more concentrated in the immune system with high levels in white blood cells, thymus gland, spleen, and the tonsils. They are also found in the central and peripheral nervous systems, although not as densely populated as CB</span><sub data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">1</span></sub><span data-dcnode-id="541" instrument_node=""> receptors. </span></span></p><span data-dcnode-id="538" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="535"><span data-dcnode-id="536" lang="EN-US"><span data-dcnode-id="537" instrument_node="">It is widely thought that the CB2 receptor is deeply connected to achieving a balance in the body’s natural healing mechanisms by regulating the immune system. However, the mechanisms are very complex and are still poorly understood. </span></span></p><span data-dcnode-id="534" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="525"><span data-dcnode-id="526" lang="EN-US"><span data-dcnode-id="533" instrument_node="">One of the reasons that researchers are excited about the therapeutic potential of manipulating CB</span><sub data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">2</span></sub><span data-dcnode-id="530" instrument_node=""> expression is because this receptor is not thought to be implicated in the psychoactive effects of THC. Thus, treatments developed with CB</span><sub data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">2</span></sub><span data-dcnode-id="527" instrument_node=""> receptors may offer options for therapy that do not have negative cognitive side effects. </span></span></p><span data-dcnode-id="524" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="517"><span data-dcnode-id="518" lang="EN-US"><span data-dcnode-id="523" instrument_node="">As a </span><span class="MsoHyperlink" data-dcnode-id="520"><a data-dcnode-id="521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4164977/"><span data-dcnode-id="522" instrument_node="">therapeutic target</span></a></span><span data-dcnode-id="519" instrument_node="">, the CB2 receptor may offer potential for treating a variety of conditions, including:</span></span></p><span data-dcnode-id="516" instrument_node="">
</span><p class="MsoListParagraphCxSpFirst" data-dcnode-id="506" style="text-indent: -18.0pt; mso-list: l2 level1 lfo3;"><span data-dcnode-id="511" lang="EN-US" style="font-family: Symbol; mso-fareast-font-family: Symbol; mso-bidi-font-family: Symbol;"><span data-dcnode-id="512" style="mso-list: Ignore;"><span data-dcnode-id="515" instrument_node="">·</span><span data-dcnode-id="513" style="font: 7.0pt 'Times New Roman';"><span data-dcnode-id="514" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></span></span></span><span class="MsoHyperlink" data-dcnode-id="507"><span data-dcnode-id="508" lang="EN-US"><a data-dcnode-id="509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/14657172"><span data-dcnode-id="510" instrument_node="">Alzheimer’s</span></a></span></span></p><span data-dcnode-id="505" instrument_node="">
</span><p class="MsoListParagraphCxSpMiddle" data-dcnode-id="495" style="text-indent: -18.0pt; mso-list: l2 level1 lfo3;"><span data-dcnode-id="500" lang="EN-US" style="font-family: Symbol; mso-fareast-font-family: Symbol; mso-bidi-font-family: Symbol;"><span data-dcnode-id="501" style="mso-list: Ignore;"><span data-dcnode-id="504" instrument_node="">·</span><span data-dcnode-id="502" style="font: 7.0pt 'Times New Roman';"><span data-dcnode-id="503" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></span></span></span><span class="MsoHyperlink" data-dcnode-id="496"><span data-dcnode-id="497" lang="EN-US"><a data-dcnode-id="498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3062638/"><span data-dcnode-id="499" instrument_node="">Inflammation</span></a></span></span></p><span data-dcnode-id="494" instrument_node="">
</span><p class="MsoListParagraphCxSpLast" data-dcnode-id="484" style="text-indent: -18.0pt; mso-list: l2 level1 lfo3;"><span data-dcnode-id="489" lang="EN-US" style="font-family: Symbol; mso-fareast-font-family: Symbol; mso-bidi-font-family: Symbol;"><span data-dcnode-id="490" style="mso-list: Ignore;"><span data-dcnode-id="493" instrument_node="">·</span><span data-dcnode-id="491" style="font: 7.0pt 'Times New Roman';"><span data-dcnode-id="492" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></span></span></span><span class="MsoHyperlink" data-dcnode-id="485"><span data-dcnode-id="486" lang="EN-US"><a data-dcnode-id="487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bmccancer.biomedcentral.com/articles/10.1186/s12885-018-4496-1"><span data-dcnode-id="488" instrument_node="">Cancer</span></a></span></span></p><span data-dcnode-id="483" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="480"><span data-dcnode-id="481" lang="EN-US"><span data-dcnode-id="482" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="479" instrument_node="">
</span><h2 data-dcnode-id="476"><span data-dcnode-id="477" lang="EN-US"><span data-dcnode-id="478" instrument_node="">The “Entourage Effect”: Synergistic Effects of CBD and THC</span></span></h2><span data-dcnode-id="475" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="468"><span data-dcnode-id="469" lang="EN-US"><span data-dcnode-id="474" instrument_node="">Although it still remains a somewhat controversial claim, many researchers believe that cannabinoids such as CBD and THC may have more potent and/or more effective therapeutic value when used in combination. This is known as the Entourage Effect after researchers coined the term in </span><span class="MsoHyperlink" data-dcnode-id="471"><a data-dcnode-id="472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pdfs.semanticscholar.org/f84f/b3a3ccf161f4bcdcbe15530ac2c62881b154.pdf"><span data-dcnode-id="473" instrument_node="">a landmark paper</span></a></span><span data-dcnode-id="470" instrument_node=""> in 1998. </span></span></p><span data-dcnode-id="467" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="460"><span data-dcnode-id="461" lang="EN-US"><span data-dcnode-id="466" instrument_node="">For example, we recently featured a news story demonstrating the Entourage Effect in the case of cannabis based </span><span class="MsoHyperlink" data-dcnode-id="463"><a data-dcnode-id="464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cbdoilgeek.com/full-spectrum-cbd-oil-better-for-epilepsy/"><span data-dcnode-id="465" instrument_node="">Epilepsy treatments</span></a></span><span data-dcnode-id="462" instrument_node="">. </span></span></p><span data-dcnode-id="459" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="456"><span data-dcnode-id="457" lang="EN-US"><span data-dcnode-id="458" instrument_node="">As researchers uncover more about the relationship between the various cannabinoids in cannabis (there are over 100 of them!) the odds are good that specific combinations of these compounds will be used to target specific diseases and/or symptoms. </span></span></p><span data-dcnode-id="455" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="452"><span data-dcnode-id="453" lang="EN-US"><span data-dcnode-id="454" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="451" instrument_node="">
</span><h2 data-dcnode-id="448"><span data-dcnode-id="449" lang="EN-US"><span data-dcnode-id="450" instrument_node="">How Does CBD Work?</span></span></h2><span data-dcnode-id="447" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="438"><span data-dcnode-id="439" lang="EN-US"><span data-dcnode-id="446" instrument_node="">It turns out that CBD does not work by binding to the cannabinoid receptors CB</span><sub data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">1</span></sub><span data-dcnode-id="443" instrument_node=""> or CB</span><sub data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">2</span></sub><span data-dcnode-id="440" instrument_node=""> directly. It works via receptor independent pathways, for example by modulating the binding capacity of the receptors and/or delaying the metabolism of key neurotransmitters in the endocannabinoid system. </span></span></p><span data-dcnode-id="437" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="430"><span data-dcnode-id="431" lang="EN-US"><span data-dcnode-id="436" instrument_node="">Although we are discovering the exact mechanisms through which CBD works, there is exciting news coming out of the latest research showing the various </span><span class="MsoHyperlink" data-dcnode-id="433"><a data-dcnode-id="434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cbdoilgeek.com/cbd-oil-benefits/"><span data-dcnode-id="435" instrument_node="">health benefits</span></a></span><span data-dcnode-id="432" instrument_node=""> of CBD. </span></span></p><span data-dcnode-id="429" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="426"><span data-dcnode-id="427" lang="EN-US"><span data-dcnode-id="428" instrument_node="">In order to get a better understanding of the many ways that CBD is working with the body’s ECS to promote better health, let’s take a look at a few of mechanisms emerging in the scientific research. </span></span></p><span data-dcnode-id="425" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="422"><span data-dcnode-id="423" lang="EN-US"><span data-dcnode-id="424" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="421" instrument_node="">
</span><h3 data-dcnode-id="415"><span data-dcnode-id="416" lang="EN-US"><span data-dcnode-id="420" instrument_node="">CBD and TRPV</span><sub data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">1</span></sub><span data-dcnode-id="417" instrument_node=""> Receptors</span></span></h3><span data-dcnode-id="414" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="405"><span data-dcnode-id="406" lang="EN-US"><span data-dcnode-id="413" instrument_node="">Also known as Vanilloid receptors, </span><span class="MsoHyperlink" data-dcnode-id="408"><a data-dcnode-id="409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/TRPV1"><span data-dcnode-id="412" instrument_node="">TRPV</span><sub data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">1</span></sub></a></span><span data-dcnode-id="407" instrument_node=""> receptors play a role in pain perception, body temperature, and inflammation responses. Although many medicinal plants contain compounds that interact with this receptor, perhaps the most famous is the humble vanilla bean thanks to the essential oil it contains called eugenol. This receptor also reacts to capsaicin, responsible for the heat in chili peppers!</span></span></p><span data-dcnode-id="404" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="397"><span data-dcnode-id="398" lang="EN-US"><span data-dcnode-id="403" instrument_node="">The Vanilloid receptor has long been a target for pain intervention, and since </span><span class="MsoHyperlink" data-dcnode-id="400"><a data-dcnode-id="401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC1575333/"><span data-dcnode-id="402" instrument_node="">CBD binds to this receptor</span></a></span><span data-dcnode-id="399" instrument_node="">, it shows promise as a treatment for nociceptive pain and inflammation. </span></span></p><span data-dcnode-id="396" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="388"><b data-dcnode-id="389" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="390" lang="EN-US"><span data-dcnode-id="395" instrument_node="">Want to learn more about CBD oil and pain management? Be sure to check out my informative article </span><span class="MsoHyperlink" data-dcnode-id="392"><a data-dcnode-id="393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cbdoilgeek.com/cbd-for-pain-relief/"><span data-dcnode-id="394" instrument_node="">here</span></a></span><span data-dcnode-id="391" instrument_node="">.</span></span></b></p><span data-dcnode-id="387" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="379"><b data-dcnode-id="380" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="381" lang="EN-US"><span data-dcnode-id="386" instrument_node="">In addition, CBD can be applied topically where it can also reduce pain by working through the skin. To learn more about that process, check </span><span class="MsoHyperlink" data-dcnode-id="383"><a data-dcnode-id="384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cbdoilgeek.com/best-cbd-pain-cream/"><span data-dcnode-id="385" instrument_node="">here</span></a></span><span data-dcnode-id="382" instrument_node="">.</span></span></b></p><span data-dcnode-id="378" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="375"><span data-dcnode-id="376" lang="EN-US"><span data-dcnode-id="377" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="374" instrument_node="">
</span><h3 data-dcnode-id="368"><span data-dcnode-id="369" lang="EN-US"><span data-dcnode-id="373" instrument_node="">CBD and 5-HT</span><sub data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">1A</span></sub><span data-dcnode-id="370" instrument_node=""> Receptors</span></span></h3><span data-dcnode-id="367" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="350"><span data-dcnode-id="351" lang="EN-US"><span data-dcnode-id="366" instrument_node="">You may not have heard of </span><span class="MsoHyperlink" data-dcnode-id="360"><a data-dcnode-id="361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/5-HT1A_receptor"><span data-dcnode-id="365" instrument_node="">5-HT</span><sub data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">1A</span></sub><span data-dcnode-id="362" instrument_node=""> receptors</span></a></span><span data-dcnode-id="359" instrument_node="">, but I bet you have heard of </span><span class="MsoHyperlink" data-dcnode-id="356"><a data-dcnode-id="357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serotonin"><span data-dcnode-id="358" instrument_node="">serotonin</span></a></span><span data-dcnode-id="355" instrument_node="">, the neurotransmitter that binds to this receptor. The interaction between the 5-HT</span><sub data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">1A</span></sub><span data-dcnode-id="352" instrument_node=""> and serotonin plays a critical role in mood. </span></span></p><span data-dcnode-id="349" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="342"><span data-dcnode-id="343" lang="EN-US"><span data-dcnode-id="348" instrument_node="">In fact, you may even be aware that many medications prescribed for depression are designed to actively increase the concentration of serotonin in our system by preventing it from being metabolized by our bodies. This class of drugs are known as </span><span class="MsoHyperlink" data-dcnode-id="344"><a data-dcnode-id="346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mayoclinic.org/diseases-conditions/depression/in-depth/ssris/art-20044825"><span data-dcnode-id="347" instrument_node="">Selective Serotonin Reuptake Inhibitors (SSRIs)</span></a><span data-dcnode-id="345" instrument_node="">. </span></span></span></p><span data-dcnode-id="341" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="331"><span data-dcnode-id="332" lang="EN-US"><span data-dcnode-id="340" instrument_node="">It turns out that CBD also interacts with the 5-HT</span><sub data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">1A</span></sub><span data-dcnode-id="337" instrument_node=""> receptor, exhibiting rapid anti-depressant effects in </span><span class="MsoHyperlink" data-dcnode-id="334"><a data-dcnode-id="335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/26711860"><span data-dcnode-id="336" instrument_node="">studies</span></a></span><span data-dcnode-id="333" instrument_node=""> on mice. Although more research needs to be done, there is evidence to believe that future research on CBD may have therapeutic value for those that suffer from depression and anxiety as a result of this interaction.</span></span></p><span data-dcnode-id="330" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="322"><b data-dcnode-id="323" style="mso-bidi-font-weight: normal;"><span data-dcnode-id="324" lang="EN-US"><span data-dcnode-id="329" instrument_node="">If you want to learn more about the latest research on CBD and depression and anxiety, be sure to check out my full article on the subject </span><span class="MsoHyperlink" data-dcnode-id="326"><a data-dcnode-id="327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cbdoilgeek.com/anxiety-and-depression/"><span data-dcnode-id="328" instrument_node="">here</span></a></span><span data-dcnode-id="325" instrument_node="">. </span></span></b></p><span data-dcnode-id="321" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="318"><span data-dcnode-id="319" lang="EN-US"><span data-dcnode-id="320" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="317" instrument_node="">
</span><h3 data-dcnode-id="311"><span data-dcnode-id="312" lang="EN-US"><span data-dcnode-id="316" instrument_node="">CBD and GPR</span><sub data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">55</span></sub><span data-dcnode-id="313" instrument_node=""> Receptors</span></span></h3><span data-dcnode-id="310" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="301"><span data-dcnode-id="302" lang="EN-US"><span data-dcnode-id="309" instrument_node="">Although scientists have not yet classified GPR55 receptors as part of the endocannabinoid system, it seems this receptor is sensitive to cannabinoids such as CBD. Here is where it gets really interesting – this receptor has been implicated in the </span><span class="MsoHyperlink" data-dcnode-id="306"><a data-dcnode-id="307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/onc2010502"><span data-dcnode-id="308" instrument_node="">aggressive spread</span></a></span><span data-dcnode-id="305" instrument_node=""> of certain kinds of cancer.</span><span data-dcnode-id="303" style="mso-spacerun: yes;"><span data-dcnode-id="304" instrument_node="">&nbsp; </span></span></span></p><span data-dcnode-id="300" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="289"><span data-dcnode-id="290" lang="EN-US"><span data-dcnode-id="299" instrument_node="">In addition, this receptor is related to </span><span class="MsoHyperlink" data-dcnode-id="296"><a data-dcnode-id="297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2737440/"><span data-dcnode-id="298" instrument_node="">bone health</span></a></span><span data-dcnode-id="295" instrument_node=""> because it can trigger the production of </span><span class="MsoHyperlink" data-dcnode-id="292"><a data-dcnode-id="293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Osteoclast"><span data-dcnode-id="294" instrument_node="">osteoclasts</span></a></span><span data-dcnode-id="291" instrument_node="">, a type of cell that breaks down bone tissue. </span></span></p><span data-dcnode-id="288" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="279"><span data-dcnode-id="280" lang="EN-US"><span data-dcnode-id="287" instrument_node="">Turns out that CBD is an antagonist of the GPR</span><sub data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">55</span></sub><span data-dcnode-id="284" instrument_node=""> receptor, meaning it keeps it in the “off” position. Although more research needs to be done to develop specific CBD treatments for degenerative bone disease and cancer, there is a reason to be hopeful that future medications may take advantage of this relationship between CBD oil and GPR</span><sub data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">55</span></sub><span data-dcnode-id="281" instrument_node=""> receptors. </span></span></p><span data-dcnode-id="278" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="275"><span data-dcnode-id="276" lang="EN-US"><span data-dcnode-id="277" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="274" instrument_node="">
</span><h2 data-dcnode-id="271"><span data-dcnode-id="272" lang="EN-US"><span data-dcnode-id="273" instrument_node="">More Health Benefits of CBD Oil</span></span></h2><span data-dcnode-id="270" instrument_node="">
