"css-1ggiqr2" data-dcnode-id="1078" href="#where-to-buy"><span data-dcnode-id="1079" instrument_node="">Where to buy</span></a></li><li class="css-t753mo" data-dcnode-id="1074"><a class="css-1ggiqr2" data-dcnode-id="1075" href="#takeaway"><span data-dcnode-id="1076" instrument_node="">Takeaway</span></a></li></ul></nav><article class="article-body css-d2znx6 undefined" data-dcnode-id="609"><div class="css-1u22pos" data-dcnode-id="847"><span data-dcnode-id="1071" style="font-size:0;line-height:0"></span><p data-dcnode-id="1061"><span data-dcnode-id="1070" instrument_node="">Lung cancer is the </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1063" rationale="Governmental authority" source="National Cancer Institute "><a aria-label=" (opens in a new tab)" class="content-link css-5r4717" data-dcnode-id="1065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancer.gov/types/common-cancers" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1069" instrument_node="">second most common</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1066"><span class="sro" data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1064"></span></hl-trusted-source><span data-dcnode-id="1062" instrument_node=""> type of cancer in the United States. Each year, more than 225,000 people receive a diagnosis of lung cancer. </span></p><p data-dcnode-id="1056"><span data-dcnode-id="1060" instrument_node="">While it’s typically treated with chemotherapy and other targeted therapies, newer research is examining whether cannabis oil could be used in the treatment of </span><a class="content-link css-5r4717" data-dcnode-id="1058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/lung-cancer"><span data-dcnode-id="1059" instrument_node="">lung cancer</span></a><span data-dcnode-id="1057" instrument_node="">. </span></p><p data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">Several small, limited studies suggest it may help stop cancer growth. Meanwhile, the oil is already being used to manage cancer symptoms and the side effects of cancer treatments. </span></p><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Read on to learn more about what cannabis oil can and can’t do when it comes to lung cancer. </span></p><div data-dcnode-id="854" id="md5a5c563-9be0-4fbd-afef-c24b61cbbbae"><div data-dcnode-id="855"><div class="myFinance-widget myFinance-ad-unit" data-campaign="hl-driver-amazon-prime-day" data-dcnode-id="856" data-sub-id="amazon_primeday_hl_fq_day1_38454" data-widget-id="6e0326e7-9f4f-4fdd-b0bf-52bc11e85d43"><iframe class="myFinance-iframe" data-dcnode-id="857" data-loaded="1" data-src="https://inline.healthline.com/r/ssr/6e0326e7-9f4f-4fdd-b0bf-52bc11e85d43?utm_campaign=hl-driver-amazon-prime-day&amp;utm_medium=embed&amp;selector=%23md5a5c563-9be0-4fbd-afef-c24b61cbbbae+%3E+div+%3E+div&amp;csid=8db66986-357a-4d95-a70f-50475f4dd89a&amp;caid=d6662cae-6a96-4280-a239-c370a9f56329&amp;ciid=a8c75a99-e3f6-4c41-b715-301a436ef191&amp;tenant=wk_1Tqf7EYzOKyxm4Gvq042rU0Uky0&amp;srckey=src_1Tqf7BF96WTbG5QbUndHWIgKoFo&amp;imre=aHR0cHM6Ly93d3cuaGVhbHRobGluZS5jb20vaGVhbHRoL2Nhbm5hYmlzLW9pbC1sdW5nLWNhbmNlcg%3D%3D&amp;_mfuuid_=79320abf-7e4f-4fd1-b904-00a4d9712d51&amp;width=584&amp;subId=amazon_primeday_hl_fq_day1_38454" id="MyFiAd" loading="lazy" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/r/ssr/6e0326e7-9f4f-4fdd-b0bf-52bc11e85d43%3Futm_campaign%3Dhl-driver-amazon-prime-day%26utm_medium%3Dembed%26selector%3D%2523md5a5c563-9be0-4fbd-afef-c24b61cbbbae%2B%253E%2Bdiv%2B%253E%2Bdiv%26csid%3D8db66986-357a-4d95-a70f-50475f4dd89a%26caid%3Dd6662cae-6a96-4280-a239-c370a9f56329%26ciid%3Da8c75a99-e3f6-4c41-b715-301a436ef191%26tenant%3Dwk_1Tqf7EYzOKyxm4Gvq042rU0Uky0%26srckey% </span><div data-dcnode-id="861" style="clear: both; display: block; height: 0px;"></div></body></html></iframe></div></div></div><div class="css-umsscj" data-dcnode-id="848"><aside class="css-0 css-0" data-dcnode-id="849"><div data-dcnode-id="850"><div class="css-10gx9pb" data-dcnode-id="851" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="853"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline2" data-dcnode-id="852" id="inline2__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="798"><span data-dcnode-id="846" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="842"><div data-dcnode-id="843"><a class="chartbeat-section" data-dcnode-id="844" name="oil-types"><span data-dcnode-id="845" instrument_node="">Are all cannabis oils the same?</span></a></div></h2><p data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">Before getting into the specific benefits of cannabis oil, it’s important to understand the different types of cannabis oil that are available. </span></p><p data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">Cannabis and hemp plants contain different cannabinoids. These are chemical components that have some effect on you when consumed.</span></p><p data-dcnode-id="833"><span data-dcnode-id="837" instrument_node="">The two most common cannabinoids are </span><a class="content-link css-5r4717" data-dcnode-id="835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/health/cbd-vs-thc"><span data-dcnode-id="836" instrument_node="">THC and CBD</span></a><span data-dcnode-id="834" instrument_node="">. Most tinctures, oils, and cannabis products today contain some ratio of THC and CBD. </span></p><p data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">THC is the one that produces the “high” most people associate with cannabis. CBD, on the other hand, is typically used for therapeutic purposes. </span></p><blockquote class="css-pc7ote" data-dcnode-id="807"><strong data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Cannabis oils 101</span></strong><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">The main types of cannabis oil include:</span></p><ul data-dcnode-id="808"><li data-dcnode-id="823"><strong data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">CBD oil.</span></strong><span data-dcnode-id="824" instrument_node=""> This is a nonpsychoactive cannabis product. It doesn’t contain THC, so it won’t produce a “high.” CBD oil is prized for its therapeutic effects, including easing anxiety, pain, and side effects of chemotherapy.</span></li><li data-dcnode-id="819"><strong data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Hemp-derived oil.</span></strong><span data-dcnode-id="820" instrument_node=""> Hemp is very similar to the cannabis plant, but it doesn’t have any THC. It can contain CBD, but its quality is usually considered inferior. Still, hemp-derived oil can be a good option if you live in an area that hasn’t legalized cannabis. </span></li><li data-dcnode-id="815"><strong data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Marijuana-derived oil. </span></strong><span data-dcnode-id="816" instrument_node="">Cannabis oil extracted from the same plant as dried marijuana leaves and buds has a higher ratio of THC. As a result, it has psychoactive effects. </span></li><li data-dcnode-id="809"><strong data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Rick Simpson oil (RSO). </span></strong><a class="content-link css-5r4717" data-dcnode-id="811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/health/rick-simpson-oil-cancer"><span data-dcnode-id="812" instrument_node="">RSO</span></a><span data-dcnode-id="810" instrument_node=""> contains high levels of THC with little to no CBD. </span></li></ul></blockquote><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">When choosing a cannabis oil, make sure to carefully look at the label so you know what ratio of THC to CBD you’re getting. </span></p><div class="css-1cg0byz" data-dcnode-id="799"><aside class="css-0 css-0" data-dcnode-id="800"><div data-dcnode-id="801"><div class="css-az6x7v" data-dcnode-id="802" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="804"></div><div class="css-itezwm" data-ad="true" data-adbridg-ad-class="inline5" data-dcnode-id="803" id="inline5__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="751"><span data-dcnode-id="797" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="793"><div data-dcnode-id="794"><a class="chartbeat-section" data-dcnode-id="795" name="cure"><span data-dcnode-id="796" instrument_node="">Can it cure cancer?</span></a></div></h2><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Experts don’t have a definitive answer, but they’ve found some promising evidence over that last few decades. </span></p><p data-dcnode-id="781"><span data-dcnode-id="790" instrument_node="">For example, a </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="783" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a aria-label=" (opens in a new tab)" class="content-link css-5r4717" data-dcnode-id="785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/1159836" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="789" instrument_node="">1975 study</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="786"><span class="sro" data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="784"></span></hl-trusted-source><span data-dcnode-id="782" instrument_node=""> reported that THC and another cannabinoid called cannabinol (CBN) slowed the growth of lung cancer in mice. </span></p><p data-dcnode-id="776"><span data-dcnode-id="780" instrument_node="">More recently, a </span><a aria-label=" (opens in a new tab)" class="content-link css-5r4717" data-dcnode-id="778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mct.aacrjournals.org/content/early/2014/11/12/1535-7163.MCT-14-0402" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="779" instrument_node="">2014 study</span></a><span data-dcnode-id="777" instrument_node=""> found that THC and CBD may help prime cancer cells to respond better to radiation therapy. However, this study was performed in cells, not in animals or humans.</span></p><p data-dcnode-id="771"><span data-dcnode-id="775" instrument_node="">There’s also a </span><a aria-label=" (opens in a new tab)" class="content-link css-5r4717" data-dcnode-id="773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.sagepub.com/doi/full/10.1177/2050313X19832160" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="774" instrument_node="">2019 case report</span></a><span data-dcnode-id="772" instrument_node=""> about a man who had lung cancer and declined conventional cancer treatment in favor of using CBD oil. His tumor appeared to respond to this alternative treatment. </span></p><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">However, this wasn’t a formal study involving controlled human clinical trials to test safety and efficacy. Many other factors may have played a role in the man’s results. Plus, these results haven’t been replicated in any kind of large-scale study. </span></p><p data-dcnode-id="764"><span data-dcnode-id="768" instrument_node="">Still, other research suggests cannabinoids may have a negative impact on cancer. In a </span><a aria-label=" (opens in a new tab)" class="content-link css-5r4717" data-dcnode-id="766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cancerres.aacrjournals.org/content/64/6/1943.long" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="767" instrument_node="">2004 study</span></a><span data-dcnode-id="765" instrument_node="">, THC actually increased how quickly certain lung and brain cancer cells grew.</span></p><blockquote class="css-pc7ote" data-dcnode-id="759"><strong data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">the verdict</span></strong><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">So far, there’s not enough evidence to say whether cannabis oil has the potential to cure cancer. Larger, long-term studies in humans are needed to determine whether it works and, if it does, how to use it safely and effectively. </span></p></blockquote><div data-dcnode-id="758" id="middle-of-article"></div><div class="css-umsscj" data-dcnode-id="752"><aside class="css-0 css-0" data-dcnode-id="753"><div data-dcnode-id="754"><div class="css-10gx9pb" data-dcnode-id="755" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="757"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline8" data-dcnode-id="756" id="inline8__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="713"><span data-dcnode-id="750" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="746"><div data-dcnode-id="747"><a class="chartbeat-section" data-dcnode-id="748" name="benefits"><span data-dcnode-id="749" instrument_node="">Can it help cancer symptoms?</span></a></div></h2><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">While there’s not enough evidence to suggest that cannabis oil can cure cancer, it may offer relief from a range of lung cancer symptoms, including:</span></p><ul data-dcnode-id="729"><li data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">pain</span></li><li data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">fatigue</span></li><li data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">nausea</span></li><li data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">anxiety</span></li><li data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">depression</span></li><li data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">headaches</span></li><li data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">nerve pain</span></li></ul><p data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Cannabis oil, including THC and CBD products, might also help manage the side effects of conventional cancer treatments, such as:</span></p><ul data-dcnode-id="716"><li data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">nausea</span></li><li data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">vomiting</span></li><li data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">pain</span></li><li data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">reduced appetite</span></li><li data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">fatigue</span></li></ul><div class="css-1sxbpyw" data-adbridg-ad-class="hl-incontent" data-dcnode-id="715" id="hl-incontent-video-ad"></div><div class="css-1h5aco8" data-dcnode-id="714" id="div-gpt-ad-out-of-page"></div></div><div class="css-0" data-dcnode-id="660"><span data-dcnode-id="712" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="708"><div data-dcnode-id="709"><a class="chartbeat-section" data-dcnode-id="710" name="side-effects"><span data-dcnode-id="711" instrument_node="">Does it have any side effects?</span></a></div></h2><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Cannabis oils are generally deemed safe, but they can cause some side effects of their own, especially those derived from marijuana. </span></p><p data-dcnode-id="701"><span data-dcnode-id="705" instrument_node="">The THC in marijuana-derived cannabis oil will produce a psychoactive response. This is the “</span><a class="content-link css-5r4717" data-dcnode-id="703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/health/what-does-it-feel-like-to-be-high"><span data-dcnode-id="704" instrument_node="">high</span></a><span data-dcnode-id="702" instrument_node="">” that’s commonly associated with marijuana use. </span></p><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">In addition, this type of cannabis oil may cause psychological side effects, such as:</span></p><ul data-dcnode-id="686"><li data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">paranoia</span></li><li data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">hallucinations</span></li><li data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">disorientation</span></li><li data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">anxiety</span></li><li data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">depression</span></li><li data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">irritability</span></li></ul><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Physical side effects are possible with THC products. They include:</span></p><ul data-dcnode-id="667"><li data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">dizziness</span></li><li data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">sleeping issues</span></li><li data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">low blood pressure</span></li><li data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">bloodshot eyes</span></li><li data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">impaired motor control</span></li><li data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">slowed reaction time</span></li><li data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">impaired memory</span></li><li data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">increased appetite</span></li></ul><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">The side effects are typically temporary and only last as long as the high remains. Generally, they don’t pose any long-term health risks. But they can be quite uncomfortable, especially if you aren’t used to them. </span></p><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">If you try a marijuana-derived oil and find the side effects are too strong, opt for a CBD-only oil or a product that has a higher ratio of CBD to THC. </span></p><p data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Hemp-derived cannabis oil isn’t known to cause any significant side effects, even at high doses. When people do have side effects, they tend to report diarrhea, stomach upset, and fatigue. </span></p></div><div class="css-0" data-dcnode-id="642"><span data-dcnode-id="659" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="655"><div data-dcnode-id="656"><a class="chartbeat-section" data-dcnode-id="657" name="how-to-use"><span data-dcnode-id="658" instrument_node="">How do I use it?</span></a></div></h2><p data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Cannabis oils are sold as concentrated liquid extracts. The chemicals and ratios of each cannabis oil vary. If you buy from a reputable seller, the ratios should be listed on the bottle.</span></p><p data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">You can apply drops of the oil to the tongue and swallow. The oil may taste bitter. You can mask the flavor by adding it to a tea or other beverage.</span></p><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Some cannabis oils can be vaped, but this can irritate your lungs. Plus, experts still aren’t sure about the long-term effects of vaping. Generally, vaping cannabis oil isn’t recommended if you have lung cancer.</span></p><div class="css-20w1gi" data-dcnode-id="643"><aside class="css-0 css-0" data-dcnode-id="644"><div data-dcnode-id="645"><div class="css-1sq15os" data-dcnode-id="646" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="648"></div><div class="css-1t05dkn" data-ad="true" data-adbridg-ad-class="inline15" data-dcnode-id="647" id="inline15__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="622"><span data-dcnode-id="641" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="637"><div data-dcnode-id="638"><a class="chartbeat-section" data-dcnode-id="639" name="where-to-buy"><span data-dcnode-id="640" instrument_node="">Where can I buy it?</span></a></div></h2><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">In 2018, the United States removed hemp from its list of controlled substances. </span></p><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">This means that hemp-derived oils, which don’t contain THC but offer modest amounts of CBD, are more widely available. But not all states have updated their laws to reflect this federal change. </span></p><p data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Marijuana-derived cannabis oil, on the other hand, is still illegal on a federal level. Some states have legalized or decriminalized it. In these states, you can find different types of cannabis oil at dispensaries, which are shops that sell cannabis products. </span></p><p data-dcnode-id="626"><span data-dcnode-id="630" instrument_node="">You can find detailed information about state laws </span><a aria-label=" (opens in a new tab)" class="content-link css-5r4717" data-dcnode-id="628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//norml.org/laws" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="629" instrument_node="">here</span></a><span data-dcnode-id="627" instrument_node="">. </span></p><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">You can also talk with your doctor about dronabinol (Marinol). This pharmaceutical-grade THC medicine is often prescribed to help people manage chemotherapy side effects. It’s legal in the United States, even where marijuana is not. </span></p><div data-dcnode-id="623" id="threequarter-of-article"></div></div><div class="css-0" data-dcnode-id="610"><span data-dcnode-id="621" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="617"><div data-dcnode-id="618"><a class="chartbeat-section" data-dcnode-id="619" name="takeaway"><span data-dcnode-id="620" instrument_node="">The bottom line</span></a></div></h2><p data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">There isn’t enough evidence to recommend cannabis as a treatment for cancer. </span></p><p data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">However, it may offer relief from cancer symptoms and traditional treatment side effects. Just make sure you study the laws in your area so you know your options. </span></p><p data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Even if cannabis oil seems to be having an effect on your cancer, don’t stop following your healthcare provider’s recommended treatment plan without talking to them first. Doing so could compromise future treatments and make the tumors more difficult to treat.</span></p></div></article><div data-dcnode-id="605" id="m44eb4f2f-432f-4b20-b077-68c97af26f48"><div data-dcnode-id="606"><div class="myFinance-widget myFinance-ad-unit" data-campaign="hl-cbd-mpl" data-dcnode-id="607" data-sub-id="CBD_CPC_Campaign_Widget_37470" data-widget-id="507d8e00-5d8a-43a4-8e9a-c81ffae1fee4 "><iframe class="myFinance-iframe" data-dcnode-id="608" data-loaded="0" data-src="https://inline.healthline.com/r/ssr/507d8e00-5d8a-43a4-8e9a-c81ffae1fee4?utm_campaign=hl-cbd-mpl&amp;utm_medium=embed&amp;selector=%23m44eb4f2f-432f-4b20-b077-68c97a
