</span><div data-dcnode-id="2968" id="tldr"><h2 data-dcnode-id="3024"><span data-dcnode-id="3025" style="font-weight: 400;"><img alt="" class="aligncenter wp-image-2114 size-full" data-dcnode-id="3026" height="1727" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cbdclinicals.com/wp-content/uploads/2020/05/kate-stone-matheson-uy5t-CJuIK4-unsplash.jpg&amp;raw" width="2560"></span></h2><span data-dcnode-id="3023" instrument_node="">
</span><h2 data-dcnode-id="3020" id="can-pet-owners-use-cbd-oil-to-treat-cats-with-cancer-is-it-safe"><span data-dcnode-id="3021" style="font-weight: 400;"><span data-dcnode-id="3022" instrument_node="">Can pet owners use CBD oil to treat cats with cancer? Is it safe?</span></span></h2><span data-dcnode-id="3019" instrument_node="">
</span><ul data-dcnode-id="2970"><span data-dcnode-id="3018" instrument_node="">
</span><li data-dcnode-id="3011" style="font-weight: 400;"><span data-dcnode-id="3012" style="font-weight: 400;"><span data-dcnode-id="3017" instrument_node="">Cancer affects cats in many ways and can drastically lower their quality of life. Symptoms such as persistent sores, changing lumps, lameness, unexplained bleeding, and loss of appetite are common among cats with cancer. </span><sup data-dcnode-id="3015"><span data-dcnode-id="3016" instrument_node="">(1</span></sup><sup data-dcnode-id="3013"><span data-dcnode-id="3014" instrument_node="">)</span></sup></span></li><span data-dcnode-id="3010" instrument_node="">
</span><li data-dcnode-id="3003" style="font-weight: 400;"><span data-dcnode-id="3004" style="font-weight: 400;"><span data-dcnode-id="3009" instrument_node="">Many medications are available to help alleviate the clinical signs of cancer, but can also cause adverse reactions to felines. Cannabidiol, also known as CBD, is a promising solution that could be a natural and safer remedy in treating cancer in cats. </span><sup data-dcnode-id="3007"><span data-dcnode-id="3008" instrument_node="">(2-3</span></sup><sup data-dcnode-id="3005"><span data-dcnode-id="3006" instrument_node="">)</span></sup></span></li><span data-dcnode-id="3002" instrument_node="">
</span><li data-dcnode-id="2985" style="font-weight: 400;"><span data-dcnode-id="2996" style="font-weight: 400;"><span data-dcnode-id="3001" instrument_node="">Several preliminary studies on CBD have shown that the phytocannabinoid might eliminate cancerous cells in the body </span><sup data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node="">(4</span></sup><sup data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">)</span></sup></span><span data-dcnode-id="2994" style="font-weight: 400;"><span data-dcnode-id="2995" instrument_node="">. </span></span><span data-dcnode-id="2992" style="font-weight: 400;"><span data-dcnode-id="2993" instrument_node="">Results also showed that CBD inhibited the growth of harmful tumors in a lab setting.</span></span><span data-dcnode-id="2991" instrument_node=""> </span><span data-dcnode-id="2986" style="font-weight: 400;"><sup data-dcnode-id="2989"><span data-dcnode-id="2990" instrument_node="">(5-6</span></sup><sup data-dcnode-id="2987"><span data-dcnode-id="2988" instrument_node="">)</span></sup></span></li><span data-dcnode-id="2984" instrument_node="">
</span><li data-dcnode-id="2972" style="font-weight: 400;"><span data-dcnode-id="2978" style="font-weight: 400;"><span data-dcnode-id="2983" instrument_node="">Despite the purported benefits of CBD oil, there is a lack of in-depth research regarding its use in animals. Cats that are given CBD formulations may experience side effects such as drowsiness </span><sup data-dcnode-id="2981"><span data-dcnode-id="2982" instrument_node="">(7</span></sup><sup data-dcnode-id="2979"><span data-dcnode-id="2980" instrument_node="">)</span></sup></span><span data-dcnode-id="2973" style="font-weight: 400;"><span data-dcnode-id="2977" instrument_node="">, </span><a data-dcnode-id="2975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cbdclinicals.com/best-cbd-oil-for-cat-anxiety/"><span data-dcnode-id="2976" instrument_node="">anxiety</span></a><span data-dcnode-id="2974" instrument_node="">, nausea, and disorientation.</span></span></li><span data-dcnode-id="2971" instrument_node="">

</span><h2 data-dcnode-id="1766" id="can-cats-with-cancer-use-cbd-oil"><span data-dcnode-id="1767" style="font-weight: 400;"><span data-dcnode-id="1768" instrument_node="">Can Cats with Cancer Use CBD Oil?</span></span></h2><span data-dcnode-id="1765" instrument_node="">
</span><p data-dcnode-id="1758"><span data-dcnode-id="1759" style="font-weight: 400;"><span data-dcnode-id="1764" instrument_node="">Cancer is one of the most feared health conditions today, and although it is not as common in cats as it is with dogs, it still affects many felines. Some of the symptoms of cancer in cats include persistent sores, lumps that change in size or shape, lameness, unexplained bleeding, and loss of appetite. </span><sup data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">(8</span></sup><sup data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">)</span></sup></span></p><span data-dcnode-id="1757" instrument_node="">
</span><p data-dcnode-id="1751"><span data-dcnode-id="1752" style="font-weight: 400;"><span data-dcnode-id="1756" instrument_node="">Despite having no cure, there are many medications available that can alleviate the clinical signs of </span><a data-dcnode-id="1754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cbdclinicals.com/best-cbd-oil-for-cancer/"><span data-dcnode-id="1755" instrument_node="">cancer</span></a><span data-dcnode-id="1753" instrument_node="">. However, these pharmaceutical drugs also bring with them adverse reactions and harmful side effects that can only worsen the condition of a pet.</span></span></p><span data-dcnode-id="1750" instrument_node="">
</span><p data-dcnode-id="1747"><span data-dcnode-id="1748" style="font-weight: 400;"><span data-dcnode-id="1749" instrument_node="">One particularly promising solution comes in the form of cannabidiol (CBD), which is the non-psychoactive component of cannabis and the main compound in the hemp plant.</span></span></p><span data-dcnode-id="1746" instrument_node="">
</span><p data-dcnode-id="1731"><span data-dcnode-id="1732" style="font-weight: 400;"><span data-dcnode-id="1745" instrument_node="">There is a growing number of owners that are beginning to look towards CBD-based cannabis products to ease </span><a data-dcnode-id="1743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cbdclinicals.com/cbd-oil-for-pain/"><span data-dcnode-id="1744" instrument_node="">pain</span></a><span data-dcnode-id="1742" instrument_node=""> and other conditions in their pets. </span><sup data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">(9</span></sup><sup data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">)</span></sup><span data-dcnode-id="1737" instrument_node=""> Although there is no precise data suggesting that CBD can cure cancer, there are studies that point towards its therapeutic potential and compatibility in small animals. </span><sup data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">(10</span></sup><sup data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">)</span></sup></span></p><span data-dcnode-id="1730" instrument_node="">
</span><p data-dcnode-id="1720"><span data-dcnode-id="1721" style="font-weight: 400;"><span data-dcnode-id="1729" instrument_node="">One study in 2018, for instance, shows encouraging results on the effects of hemp-based cannabidiol and terpenes on dogs suffering from </span><a data-dcnode-id="1727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cbdclinicals.com/best-cbd-oil-for-dogs-with-arthritis/"><span data-dcnode-id="1728" instrument_node="">osteoarthritis</span></a><span data-dcnode-id="1726" instrument_node="">. The majority of the dogs that consumed CBD oil during the trial experienced significantly less pain and better mobility overall. </span><sup data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">(11</span></sup><sup data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">)</span></sup></span></p><span data-dcnode-id="1719" instrument_node="">
</span><p data-dcnode-id="1709"><span data-dcnode-id="1710" style="font-weight: 400;"><span data-dcnode-id="1718" instrument_node="">The same study also shows that there were no side effects reported and that the </span><a data-dcnode-id="1716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cbdclinicals.com/cbd-dosage-for-dogs/"><span data-dcnode-id="1717" instrument_node="">dogs can tolerate a dosage</span></a><span data-dcnode-id="1715" instrument_node=""> of 2 mg per kilogram bodyweight of CBD oil twice each day. These findings may be an indication that the hemp-based nutraceutical is not dangerous for animals. </span><sup data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">(12</span></sup><sup data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">)</span></sup></span></p><span data-dcnode-id="1708" instrument_node="">
</span><p data-dcnode-id="1696"><span data-dcnode-id="1697" style="font-weight: 400;"><span data-dcnode-id="1707" instrument_node="">A study on the endocannabinoid system (ECS) reveals that humans and animals, with the exception of some insects and protozoans, share this same system in their bodies </span><sup data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">(13</span></sup><sup data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">)</span></sup><span data-dcnode-id="1702" instrument_node="">. The ECS is responsible for regulating the functions of the brain, endocrine, and immune tissues, while it also contains cannabinoid receptors. </span><sup data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">(14</span></sup><sup data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">)</span></sup></span></p><span data-dcnode-id="1695" instrument_node="">
</span><p data-dcnode-id="1692"><span data-dcnode-id="1693" style="font-weight: 400;"><span data-dcnode-id="1694" instrument_node="">Since animals and human beings also possess the same receptors, this means that cats can be naturally receptive to the cannabinoids present in CBD. This research on the ECS may be proof as to why the dogs in the study mentioned earlier did not experience any adverse effects upon consuming CBD oil.</span></span></p><span data-dcnode-id="1691" instrument_node="">
</span><h2 data-dcnode-id="1688" id="cbd-for-cats-with-cancer"><span data-dcnode-id="1689" style="font-weight: 400;"><span data-dcnode-id="1690" instrument_node="">CBD for Cats with Cancer</span></span></h2><span data-dcnode-id="1687" instrument_node="">
</span><p data-dcnode-id="1684"><span data-dcnode-id="1685" style="font-weight: 400;"><span data-dcnode-id="1686" instrument_node="">Three forms of CBD products for cats are available at this time. These include:</span></span></p><span data-dcnode-id="1683" instrument_node="">
</span><h3 data-dcnode-id="1680" id="cbd-oils-tinctures"><b data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">CBD Oils (Tinctures)</span></b></h3><span data-dcnode-id="1679" instrument_node="">
</span><p data-dcnode-id="1676"><span data-dcnode-id="1677" style="font-weight: 400;"><span data-dcnode-id="1678" instrument_node="">Oils are the most popular method in administering full-spectrum cannabidiol in cats. When people mention CBD oil for cats, this typically means using tinctures to help ease symptoms.</span></span></p><span data-dcnode-id="1675" instrument_node="">
</span><p data-dcnode-id="1669"><span data-dcnode-id="1670" style="font-weight: 400;"><span data-dcnode-id="1674" instrument_node="">Cat </span><a data-dcnode-id="1672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cbdclinicals.com/the-best-cbd-oil-for-cats/"><span data-dcnode-id="1673" instrument_node="">CBD oil</span></a><span data-dcnode-id="1671" instrument_node=""> is given by way of a dropper, which is easily applied in the mouth. There are various flavors available for CBD tinctures that pet owners can choose from today.</span></span></p><span data-dcnode-id="1668" instrument_node="">
</span><h3 data-dcnode-id="1665" id="cbd-capsules"><b data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">CBD Capsules</span></b></h3><span data-dcnode-id="1664" instrument_node="">
</span><p data-dcnode-id="1661"><span data-dcnode-id="1662" style="font-weight: 400;"><span data-dcnode-id="1663" instrument_node="">CBD in the form of capsules is an ideal alternative for use in cats as they are provided in pre-measured portions. Each pill can be administered once or twice a day, depending on the recommendation of a veterinarian.</span></span></p><span data-dcnode-id="1660" instrument_node="">
</span><p data-dcnode-id="1657"><span data-dcnode-id="1658" style="font-weight: 400;"><span data-dcnode-id="1659" instrument_node="">A capsule may contain 5 to 20 mg of CBD, so it is essential to consult a doctor before application. The pills can also be masked in pet food to make administration easier.</span></span></p><span data-dcnode-id="1656" instrument_node="">
</span><h3 data-dcnode-id="1653" id="cbd-cat-treats"><b data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">CBD Cat Treats</span></b></h3><span data-dcnode-id="1652" instrument_node="">
</span><p data-dcnode-id="1647"><span data-dcnode-id="1648" style="font-weight: 400;"><a data-dcnode-id="1650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cbdclinicals.com/best-cbd-cat-treats/"><span data-dcnode-id="1651" instrument_node="">CBD pet treats for cats</span></a><span data-dcnode-id="1649" instrument_node=""> are also another way to administer CBD to a feline friend conveniently. Cats enjoy consuming treats that are made for them, and this product makes the application process straightforward.</span></span></p><span data-dcnode-id="1646" instrument_node="">
</span><p data-dcnode-id="1640"><span data-dcnode-id="1641" style="font-weight: 400;"><span data-dcnode-id="1645" instrument_node="">Keep in mind, however, that the dosage in CBD treats may not be as accurate as with oils and capsules. Again, cat owners should talk to a veterinarian to know the </span><a data-dcnode-id="1643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cbdclinicals.com/cbd-oil-dosage-for-cats/"><span data-dcnode-id="1644" instrument_node="">proper dosage</span></a><span data-dcnode-id="1642" instrument_node=""> they should give to their pets.</span></span></p><span data-dcnode-id="1639" instrument_node="">
</span><h2 data-dcnode-id="1636" id="can-cbd-oil-treat-cancer-in-cats"><span data-dcnode-id="1637" style="font-weight: 400;"><span data-dcnode-id="1638" instrument_node="">Can CBD Oil Treat Cancer in Cats?</span></span></h2><span data-dcnode-id="1635" instrument_node="">
</span><p data-dcnode-id="1632"><span data-dcnode-id="1633" style="font-weight: 400;"><span data-dcnode-id="1634" instrument_node="">There are several clinical studies that were carried out, suggesting that CBD can fight the spread and growth of cancerous tumors in cats.</span></span></p><span data-dcnode-id="1631" instrument_node="">
</span><h3 data-dcnode-id="1628" id="cbd-might-help-eliminate-cancer-cells"><b data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">CBD Might Help Eliminate Cancer Cells</span></b></h3><span data-dcnode-id="1627" instrument_node="">
</span><p data-dcnode-id="1624"><span data-dcnode-id="1625" style="font-weight: 400;"><span data-dcnode-id="1626" instrument_node="">In 2011, researchers carried out an examination of how CBD would interact with breast cancer cells. Although the study was done in vitro, which means that it involved using either a sample dish or test tube instead of a live organism, the results were quite impressive.</span></span></p><span data-dcnode-id="1623" instrument_node="">
</span><p data-dcnode-id="1615"><span data-dcnode-id="1616" style="font-weight: 400;"><span data-dcnode-id="1622" instrument_node="">In the study, the scientists learned that CBD could help induce programmed death on the cancer cells without causing much damage to the healthy cells. </span><sup data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">(15</span></sup><sup data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">)</span></sup><span data-dcnode-id="1617" instrument_node=""> How CBD was able to do this is relatively unclear, but the compound was able to help destroy damaged tissues, and cause apoptosis or programmed cell death.</span></span></p><span data-dcnode-id="1614" instrument_node="">
</span><p data-dcnode-id="1611"><span data-dcnode-id="1612" style="font-weight: 400;"><span data-dcnode-id="1613" instrument_node="">Since cancer is primarily characterized by the abnormal growth of cells, the results of this study may be a hint that CBD can contribute in regulating cell growth.</span></span></p><span data-dcnode-id="1610" instrument_node="">
</span><h3 data-dcnode-id="1607" id="cbd-can-help-stop-tumor-growth"><b data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">CBD Can Help Stop Tumor Growth</span></b></h3><span data-dcnode-id="1606" instrument_node="">
</span><p data-dcnode-id="1603"><span data-dcnode-id="1604" style="font-weight: 400;"><span data-dcnode-id="1605" instrument_node="">The Breast Cancer Research and Treatment journal published a similar study in the same year regarding CBD and how it affects cancerous cells in the breast.</span></span></p><span data-dcnode-id="1602" instrument_node="">
</span><p data-dcnode-id="1595"><span data-dcnode-id="1596" style="font-weight: 400;"><span data-dcnode-id="1601" instrument_node="">The study, although carried out on mice, found that CBD can help slow down the growth of breast cancer cells in these rodents. Additionally, researchers also discovered that it could reduce metastasis or the development of secondary malignant growths. </span><sup data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">(16</span></sup><sup data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">)</span></sup></span></p><span data-dcnode-id="1594" instrument_node="">
</span><p data-dcnode-id="1587"><span data-dcnode-id="1588" style="font-weight: 400;"><span data-dcnode-id="1593" instrument_node="">Another study in 2003 revealed how there are cannabinoid receptors present in healthy and cancerous skin cells of mice. The researchers targeted these receptors and found that by activating the ECS with cannabinoids, the compounds contributed to cell death while helping slow down skin cancer growth. </span><sup data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">(17</span></sup><sup data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">)</span></sup></span></p><span data-dcnode-id="1586" instrument_node="">
</span><p data-dcnode-id="1579"><span data-dcnode-id="1580" style="font-weight: 400;"><span data-dcnode-id="1585" instrument_node="">There are also several studies regarding CBD and its ability to inhibit angiogenesis. Angiogenesis is the process that allows cancerous tumors to continue growing by way of developing new blood vessels. </span><sup data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">(18</span></sup><sup data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">)</span></sup></span></p><span data-dcnode-id="1578" instrument_node="">
</span><h2 data-dcnode-id="1575" id="side-effects-that-cbd-may-help-alleviate"><span data-dcnode-id="1576" style="font-weight: 400;"><span data-dcnode-id="1577" instrument_node="">Side Effects That CBD May Help Alleviate</span></span></h2><span data-dcnode-id="1574" instrument_node="">
</span><p data-dcnode-id="1571"><span data-dcnode-id="1572" style="font-weight: 400;"><span data-dcnode-id="1573" instrument_node="">CBD oil is not an approved treatment for cancer in cats. However, it is capable of providing relief to many of the side effects that come with cancer treatment.</span></span></p><span data-dcnode-id="1570" instrument_node="">
</span><p data-dcnode-id="1567"><span data-dcnode-id="1568" style="font-weight: 400;"><span data-dcnode-id="1569" instrument_node="">Three prevalent options for treating cancer in cats are done via surgery, chemotherapy, or radiation therapy. Although it is impressive to have these choices to manage cancer cells in felines, these treatments have a lot of undesirable effects, especially long-term.</span></span></p><span data-dcnode-id="1566" instrument_node="">
</span><p data-dcnode-id="1563"><span data-dcnode-id="1564" style="font-weight: 400;"><span data-dcnode-id="1565" instrument_node="">Below are the side effects that CBD may help alleviate in cat cancer treatment:</span></span></p><span data-dcnode-id="1562" instrument_node="">
</span><h3 data-dcnode-id="1559" id="nausea-and-vomiting"><b data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">Nausea and Vomiting</span></b></h3><span data-dcnode-id="1558" instrument_node="">
</span><p data-dcnode-id="1551"><span data-dcnode-id="1552" style="font-weight: 400;"><span data-dcnode-id="1557" instrument_node="">Nausea is a common outcome for cats that undergo chemotherapy and radiotherapy to control the growth of cancer in their bodies. During such treatment, cells that line the intestines and stomach of a cat can be affected, leading to nausea and vomiting. </span><sup data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">(19</span></sup><sup data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">)</span></sup></span></p><span data-dcnode-id="1550" instrument_node="">
</span><p data-dcnode-id="1547"><span data-dcnode-id="1548" style="font-weight: 400;"><span data-dcnode-id="1549" instrument_node="">There is encouraging evidence that demonstrates how the manipulation of the ECS in animals can regulate this digestive problem.</span></span></p><span data-dcnode-id="1546" instrument_node="">
</span><p data-dcnode-id="1539"><span data-dcnode-id="1540" style="font-weight: 400;"><span data-dcnode-id="1545" instrument_node="">A study in 2011 shows that a wide variety of animals have the capacity to use the anti-emetic effect of cannabinoids in their bodies. Additional evidence also reveals that cannabinoids may be useful in treating nausea caused by chemotherapy. </span><sup data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">(20</span></sup><sup data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">)</span></sup></span></p><span data-dcnode-id="1538" instrument_node="">
</span><p data-dcnode-id="1535"><span data-dcnode-id="1536" style="font-weight: 400;"><span data-dcnode-id="1537" instrument_node="">Since CBD is a phytocannabinoid, it is theoretically possible to use it to engage the ECS of cats after they receive chemotherapy to ease their gastrointestinal issues.</span></span></p><span data-dcnode-id="1534" instrument_node="">
</span><h3 data-dcnode-id="1531" id="chronic-pain"><b data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">Chronic Pain</span></b></h3><span data-dcnode-id="1530" instrument_node="">
</span><p data-dcnode-id="1527"><span data-dcnode-id="1528" style="font-weight: 400;"><span data-dcnode-id="1529" instrument_node="">Tumors that are present in any part of a cat’s body can cause mild to severe pain. Therapies such as radiotherapy, chemotherapy, and surgery can also lead to pain management issues.</span></span></p><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1517"><span data-dcnode-id="1520" style="font-weight: 400;"><span data-dcnode-id="1525" instrument_node="">Tramadol is a common analgesic given to cats that are suffering from cancer pain. However, its effectiveness is questionable in treating acute or traumatic pain, and its non-opioid mechanism may not work on felines. </span><sup data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">(21</span></sup><sup data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">) </span></sup></span><span data-dcnode-id="1518" style="font-weight: 400;"><span data-dcnode-id="1519" instrument_node="">The latest data suggests doses of 2 mg/kg are effective for tramadol.</span></span></p><span data-dcnode-id="1516" instrument_node="">
</span><p data-dcnode-id="1509"><span data-dcnode-id="1510" style="font-weight: 400;"><span data-dcnode-id="1515" instrument_node="">In 2018, a study on dogs that had osteoarthritis were given CBD oil products to see the safety and analgesic effect it had on canines. The final assessment showed that the dogs had significantly less pain after the CBD treatment and became more active. </span><sup data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">(22</span></sup><sup data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">)</span></sup></span></p><span data-dcnode-id="1508" instrument_node="">
</span><p data-dcnode-id="1501"><span data-dcnode-id="1502" style="font-weight: 400;"><span data-dcnode-id="1507" instrument_node="">This clinical trial also reported that there were no ill side effects observed despite being given 2 mg per kilo of body weight every twelve hours for four weeks. </span><sup data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">(23</span></sup><sup data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">)</span></sup></span></p><span data-dcnode-id="1500" instrument_node="">
</span><h3 data-dcnode-id="1497" id="inflammation"><b data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">Inflammation</span></b></h3><span data-dcnode-id="1496" instrument_node="">
</span><p data-dcnode-id="1489"><span data-dcnode-id="1494" style="font-weight: 400;"><span data-dcnode-id="1495" instrument_node="">Squamous cell carcinoma in felines can start as a small patch of sore skin</span></span><span data-dcnode-id="1492" style="font-weight: 400;"><span data-dcnode-id="1493" instrument_node=""> and oral tumors, </span></span><span data-dcnode-id="1490" style="font-weight: 400;"><span data-dcnode-id="1491" instrument_node="">which, if not healed, could be a sign of cancerous cells present in the body. Inflammation of the skin is one of the most common symptoms of squamous cell carcinoma in cats.</span></span></p><span data-dcnode-id="1488" instrument_node="">
</span><p data-dcnode-id="1478"><span data-dcnode-id="1479" style="font-weight: 400;"><span data-dcnode-id="1487" instrument_node="">Research in 2000 reveals that cannabinoids, particularly with CBD from the cannabis plant, have strong anti-inflammatory properties. This same study investigates cannabinoid efficacy on mice that had collagen-induced </span><a data-dcnode-id="1485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cbdclinicals.com/cbd-for-arthritis/"><span data-dcnode-id="1486" instrument_node="">arthritis</span></a><span data-dcnode-id="1484" instrument_node=""> and showed that it was able to improve the conditions on these rodents. </span><sup data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">(24</span></sup><sup data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">)</span></sup></span></p><span data-dcnode-id="1477" instrument_node="">
</span><p data-dcnode-id="1470"><span data-dcnode-id="1471" style="font-weight: 400;"><span data-dcnode-id="1476" instrument_node="">A follow-up experiment in 2004 using a novel synthetic cannabinoid acid on mice with arthritis generated the same results. The cannabinoid was found to have suppressive effects on cell immune responses while also producing pro-inflammatory mediators, a hint to its usefulness as a novel, anti-inflammatory product. </span><sup data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">(25</span></sup><sup data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">)</span></sup></span></p><span data-dcnode-id="1469" instrument_node="">
</span><h2 data-dcnode-id="1466" id="causes-of-cancer-in-cats"><span data-dcnode-id="1467" style="font-weight: 400;"><span data-dcnode-id="1468" instrument_node="">Causes of Cancer in Cats</span></span></h2><span data-dcnode-id="1465" instrument_node="">
</span><p data-dcnode-id="1462"><span data-dcnode-id="1463" style="font-weight: 400;"><span data-dcnode-id="1464" instrument_node="">There are several reasons why cancer can show up in the mammalian body of a cat.</span></span></p><span data-dcnode-id="1461" instrument_node="">
</span><h3 data-dcnode-id="1458" id="aging"><b data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">Aging</span></b></h3><span data-dcnode-id="1457" instrument_node="">
</span><p data-dcnode-id="1454"><span data-dcnode-id="1455" style="font-weight: 400;"><span data-dcnode-id="1456" instrument_node="">The process of getting older is one of the primary causes of cancer in many cats. There are several reasons as to why aging can cause a higher rate of cancer growth in the body.</span></span></p><span data-dcnode-id="1453" instrument_node="">
</span><p data-dcnode-id="1445"><span data-dcnode-id="1446" style="font-weight: 400;"><span data-dcnode-id="1452" instrument_node="">One theory is that the mutations on these cells accumulate over the years, which raises the likelihood of cancerous cell division to happen. </span><sup data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">(26</span></sup><sup data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">) </span></sup><span data-dcnode-id="1447" instrument_node="">Degeneration of the mammalian body is also another suspect.</span></span></p><span data-dcnode-id="1444" instrument_node="">
</span><p data-dcnode-id="1438"><span data-dcnode-id="1439" style="font-weight: 400;"><span data-dcnode-id="1443" instrument_node="">For instance, chronic inflammation experienced by cats over the years can damage DNA and weaken the </span><a data-dcnode-id="1441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cbdclinicals.com/cbd-for-the-immune-system/"><span data-dcnode-id="1442" instrument_node="">immune system</span></a><span data-dcnode-id="1440" instrument_node="">, leading to slow identification and elimination of harmful cells.</span></span></p><span data-dcnode-id="1437" instrument_node="">
</span><h3 data-dcnode-id="1434" id="fibrosarcoma"><b data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">Fibrosarcoma</span></b></h3><span data-dcnode-id="1433" instrument_node="">
</span><p data-dcnode-id="1426"><span data-dcnode-id="1427" style="font-weight: 400;"><span data-dcnode-id="1432" instrument_node="">Fibrosarcoma is a common soft tissue cancer in cats that is caused by a combination of genetic and environmental factors. Although no specific cause can be identified, most cats that have fibrosarcoma developed tumors at a prior injection site on their bodies. </span><sup data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">(27</span></sup><sup data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">)</span></sup></span></p><span data-dcnode-id="1425" instrument_node="">
</span><h3 data-dcnode-id="1422" id="intact-reproductive-organs"><b data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">Intact Reproductive Organs</span></b></h3><span data-dcnode-id="1421" instrument_node="">
</span><p data-dcnode-id="1414"><span data-dcnode-id="1415" style="font-weight: 400;"><span data-dcnode-id="1420" instrument_node="">Cats that are not spayed or neutered are at risk of developing cancer in their bodies. The spaying of female cats eliminates the possibility of breast and ovarian cancer, while neutering male ones reduce the incidence of prostate cancer. </span><sup data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">(28</span></sup><sup data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">)</span></sup></span></p><span data-dcnode-id="1413" instrument_node="">
</span><p data-dcnode-id="1406"><span data-dcnode-id="1407" style="font-weight: 400;"><span data-dcnode-id="1412" instrument_node="">Apart from reducing the risk of cancer development, cats can also live longer and healthier lives when they are spayed and neutered. </span><sup data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">(29</span></sup><sup data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">)</span></sup></span></p><span data-dcnode-id="1405" instrument_node="">
</span><h3 data-dcnode-id="1402" id="carcinogens"><b data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">Carcinogens</span></b></h3><span data-dcnode-id="1401" instrument_node="">
</span><p data-dcnode-id="1394"><span data-dcnode-id="1395" style="font-weight: 400;"><span data-dcnode-id="1400" instrument_node="">These chemicals are believed to cause mutations in the genes that eventually become cancerous cells in the body. Cats can be exposed to the same carcinogens as that of humans, which include those coming from tobacco smoke, asbestos, x-ray radiation, and benzene. </span><sup data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">(30</span></sup><sup data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">)</span></sup></span></p><span data-dcnode-id="1393" instrument_node="">
</span><h2 data-dcnode-id="1390" id="possible-side-effects-of-cbd-in-cats"><span data-dcnode-id="1391" style="font-weight: 400;"><span data-dcnode-id="1392" instrument_node="">Possible Side Effects of CBD in Cats</span></span></h2><span data-dcnode-id="1389" instrument_node="">
</span><p data-dcnode-id="1386"><span data-dcnode-id="1387" style="font-weight: 400;"><span data-dcnode-id="1388" instrument_node="">Prior to administering CBD to a cat, pet owners should understand its potential side effects so that they are fully aware and prepared for what could happen. Although studies did show that CBD did not cause any adverse reactions during the trials, every cat can have a different response, and there is always the risk of harm.</span></span></p><span data-dcnode-id="1385" instrument_node="">
</span><p data-dcnode-id="1382"><span data-dcnode-id="1383" style="font-weight: 400;"><span data-dcnode-id="1384" instrument_node="">The probability of these side effects can be higher with the improper use of CBD. Cat owners that notice a negative change in their pet’s attitude may consult a veterinarian to reduce their CBD dosage.</span></span></p><span data-dcnode-id="1381" instrument_node="">
</span><p data-dcnode-id="1373"><span data-dcnode-id="1374" style="font-weight: 400;"><span data-dcnode-id="1380" instrument_node="">A potential side effect of CBD hemp oil consumption is drowsiness. </span><sup data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">(31</span></sup><sup data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">)</span></sup><span data-dcnode-id="1375" instrument_node=""> In many cases, cats tend to portray sleepy behavior, which makes this reaction relatively difficult to notice at first.</span></span></p><span data-dcnode-id="1372" instrument_node="">
</span><p data-dcnode-id="1366"><span data-dcnode-id="1367" style="font-weight: 400;"><span data-dcnode-id="1371" instrument_node="">Nausea, </span><a data-dcnode-id="1369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cbdclinicals.com/best-cbd-oil-for-cat-anxiety/"><span data-dcnode-id="1370" instrument_node="">anxiety</span></a><span data-dcnode-id="1368" instrument_node="">, changes in appetite, vomiting, weight loss, and disorientation are also other possible side effects of CBD use in cats. Although these reactions are rare, owners should cease applying CBD and contact a veterinarian immediately when they notice these signs.</span></span></p><span data-dcnode-id="1365" instrument_node="">
</span><h2 data-dcnode-id="1362" id="conclusion"><span data-dcnode-id="1363" style="font-weight: 400;"><span data-dcnode-id="1364" instrument_node="">Conclusion</span></span></h2><span data-dcnode-id="1361" instrument_node="">
</span><p data-dcnode-id="1358"><span data-dcnode-id="1359" style="font-weight: 400;"><span data-dcnode-id="1360" instrument_node="">Cancer in cats may not be as common as they are with dogs, but the symptoms felines experience can lower their quality of life significantly. Some of these signs include persistent sores, lumps that change in shape or size, unexplained bleeding, loss of appetite, and lameness.</span></span></p><span data-dcnode-id="1357" instrument_node="">
</span><p data-dcnode-id="1354"><span data-dcnode-id="1355" style="font-weight: 400;"><span data-dcnode-id="1356" instrument_node="">There are many medications that pet owners can buy to help alleviate these symptoms. However, pharmaceutical drugs are known to cause adverse reactions that can only worsen the condition of a cat suffering from cancer.</span></span></p><span data-dcnode-id="1353" instrument_node="">
</span><p data-dcnode-id="1350"><span data-dcnode-id="1351" style="font-weight: 400;"><span data-dcnode-id="1352" instrument_node="">Cannabidiol (CBD) is a promising solution that offers many potential health benefits in easing the symptoms of cancer in felines. Many pet owners are beginning to look towards high-quality CBD-based products with less tetrahydrocannabinol (THC) to help reduce the pain, inflammation, and other conditions their pets are experiencing.</span></span></p><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1346"><span data-dcnode-id="1347" style="font-weight: 400;"><span data-dcnode-id="1348" instrument_node="">Preliminary research studies on pet CBD show impressive results with the phytocannabinoid being able to help inhibit and even eliminate cancerous cell growth in the body. CBD may also provide relief to several clinical signs related to feline cancer.</span></span></p><span data-dcnode-id="1345" instrument_node="">
</span><p data-dcnode-id="1342"><span data-dcnode-id="1343" style="font-weight: 400;"><span data-dcnode-id="1344" instrument_node="">However, the lack of in-depth studies on CBD use in animals leaves many questions unanswered, including the possible side effects of its use. Pet owners that notice any adverse reaction in using CBD should cease its application immediately and consult a veterinarian as soon as possible.</span></span></p><span data-dcnode-id="1341" instrument_node="">
