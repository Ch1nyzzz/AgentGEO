</span><h1 class="block boxed title page-title" data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">Cannabis Oil Not Wise for Skin Cancer</span></h1><span data-dcnode-id="188" instrument_node="">
</span><section class="region region-content" data-dcnode-id="90"><span data-dcnode-id="187" instrument_node="">
</span><article class="block block-system first last" data-dcnode-id="92" id="block-system-main"><span data-dcnode-id="186" instrument_node="">
</span><div class="block-content content" data-dcnode-id="94"><span data-dcnode-id="185" instrument_node="">
</span><article about="/site/node/118" class="node node-article node-promoted clearfix" data-dcnode-id="96" id="node-118" typeof="sioc:Item foaf:Document"><span data-dcnode-id="184" instrument_node="">
</span><div class="content clearfix" data-dcnode-id="98"><span data-dcnode-id="183" instrument_node="">
</span><div class="field field-name-body field-type-text-with-summary field-label-hidden" data-dcnode-id="100"><div class="field-items" data-dcnode-id="101"><div class="field-item even" data-dcnode-id="102" property="content:encoded"><p data-dcnode-id="181"><img alt="Cannabis Sativa illustrating an article discussing the lack of evidence for cannabis oil use" data-dcnode-id="182" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heiheihealth.com/site/sites/all/images/38146478334932500b43m-c4fcf8d4.jpg&amp;raw" style="float: left; margin: 20px;"></p><p data-dcnode-id="179"><span data-dcnode-id="180" instrument_node="">&nbsp;</span></p><p data-dcnode-id="177"><span data-dcnode-id="178" instrument_node="">A patient recently asked if Cannabis oil might be used to cure a small skin cancer.</span></p><p data-dcnode-id="174"><span data-dcnode-id="176" instrument_node="">Never having been asked this before, a thorough review of the available literature was carried out, but sadly there have been absolutely no published clinical trials to date so it is impossible to recommend this treatment.</span></p><p data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">Cannabinoids do bind to receptors which are present in many cells and there is some evidence in highly controlled laboratory circumstances that cannabinoids may inhibit some cancers.&nbsp; Sadly, there is also evidence that it may actually accelerate growth in others.&nbsp; There have been no useful trials in living humans and animal trials are not conclusive.&nbsp; The link at the end of this article gives more information and is maintained by the Uk Cancer Society so may be seen as a trusted and valid reference.</span></p><p data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">&nbsp;</span></p><p data-dcnode-id="168"><span data-dcnode-id="169" instrument_node="">&nbsp;</span></p><p data-dcnode-id="166"><span data-dcnode-id="167" instrument_node="">The proposed mechanisms of action of cannabis oil are plausible but unfortunately that does not make it safe or effective.</span></p><p data-dcnode-id="164"><span data-dcnode-id="165" instrument_node="">&nbsp;</span></p><p data-dcnode-id="162"><span data-dcnode-id="163" instrument_node="">A search of the internet lists many sites where people claim to have had skin cancers cured by cannabis oil.&nbsp; This effect may occur for one of the following reasons:</span></p><ol data-dcnode-id="153"><li data-dcnode-id="160"><span data-dcnode-id="161" instrument_node="">&nbsp;It is possible that the cannabis oil actually removed the cancer (a small proportion probably do get better as a result of treatment)</span></li><li data-dcnode-id="158"><span data-dcnode-id="159" instrument_node="">The act of rubbing itself can stimulate immune reactions which can deal with some skin cancers.</span></li><li data-dcnode-id="156"><span data-dcnode-id="157" instrument_node="">Some skin cancers will naturally go away on their own.</span></li><li data-dcnode-id="154"><span data-dcnode-id="155" instrument_node="">The skin cancer may actually have been something else entirely (misdiagnosis of these lesions is common)</span></li></ol><p data-dcnode-id="151"><span data-dcnode-id="152" instrument_node="">It is important to note that some of the cancers being illustrated as treated with the oil are of a type that can spread and potentially kill the patient.&nbsp; We feel that using a totally untrialled medication like cannabis oil in such circumstances is very unwise.&nbsp;</span></p><p data-dcnode-id="149"><span data-dcnode-id="150" instrument_node="">Cannabis oil is of course illegal in New Zealand so as a treatment option it is not valid in any case.&nbsp; Hemp oil contains cannabinoids but the concentration is much lower.&nbsp;</span></p><p data-dcnode-id="147"><span data-dcnode-id="148" instrument_node="">&nbsp;</span></p><p data-dcnode-id="145"><span data-dcnode-id="146" instrument_node="">The good news is that not all skin cancers need surgery - some may be suitable for treatment with cream, especially in older patients and in many cases, the treatment is fully funded.</span></p><p data-dcnode-id="143"><span data-dcnode-id="144" instrument_node="">If you think you may have a skin cancer, please make an appointment - our doctors are very good at skin diagnoses and can give you proper treatment advice from leaving harmless things alone through creams to surgical removal if required.</span></p><p data-dcnode-id="141"><span data-dcnode-id="142" instrument_node="">&nbsp;</span></p><p data-dcnode-id="136"><span data-dcnode-id="140" instrument_node="">We feel that it is important to point out that there is also good evidence that </span><span data-dcnode-id="138" style="text-decoration: underline;"><span data-dcnode-id="139" instrument_node="">smoking</span></span><span data-dcnode-id="137" instrument_node=""> cannabis (as opposed to a topical application) significantly increases the risk of lung and head and neck cancer, whether or not it is used in combination with tobacco.&nbsp; Whilst there may in the future be a place for medicinal use of cannabinoids, at present the evidence very strongly suggests that in almost all cases the side effects outweigh the benefits.</span></p><p data-dcnode-id="134"><span data-dcnode-id="135" instrument_node="">&nbsp;</span></p><p data-dcnode-id="127"><a data-dcnode-id="132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scienceblog.cancerresearchuk.org/2012/07/25/cannabis-cannabinoids-and-cancer-the-evidence-so-far/" target="_blank"><span data-dcnode-id="133" instrument_node="">Link to a really good, thorough, factual scientific article&nbsp;</span></a><a data-dcnode-id="130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scienceblog.cancerresearchuk.org/2012/07/25/cannabis-cannabinoids-and-cancer-the-evidence-so-far/" target="_blank"><span data-dcnode-id="131" instrument_node="">about cannabis</span></a><a data-dcnode-id="128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scienceblog.cancerresearchuk.org/2012/07/25/cannabis-cannabinoids-and-cancer-the-evidence-so-far/" target="_blank"><span data-dcnode-id="129" instrument_node=""> by the cancer society uk.</span></a></p><p data-dcnode-id="125"><span data-dcnode-id="126" instrument_node="">&nbsp;</span></p><p data-dcnode-id="123"><span data-dcnode-id="124" instrument_node="">Addendum September 2016:</span></p><p data-dcnode-id="112"><span data-dcnode-id="122" instrument_node="">We have been asked to provide evidence to support the statement that cannabis smoking causes cancer.&nbsp; The spectrum of carcinogens in cannabis smoke is similar to that in tobacco smoke.&nbsp; It is the inhaling of burned leaves that results in tar deposition in the lungs.&nbsp; Cannabis smoke is generally retained in the lungs for longer than tobacco smoke which may also explain how </span><a data-dcnode-id="120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ncbi.nlm.nih.gov/pubmed/27507173"><span data-dcnode-id="121" instrument_node="">cannabis causes chronic obstructive pulmonary disease</span></a><span data-dcnode-id="119" instrument_node="">.&nbsp; In a New Zealand study in 2008, it was found that </span><a data-dcnode-id="117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//erj.ersjournals.com/content/31/2/280.short"><span data-dcnode-id="118" instrument_node="">cannabis smoking was associated with similar, or higher rate of lung cancer than tobacco smoking</span></a><span data-dcnode-id="116" instrument_node="">.&nbsp; </span><a data-dcnode-id="114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4642772/"><span data-dcnode-id="115" instrument_node="">Cannabis has also been associated with testicular cancer</span></a><span data-dcnode-id="113" instrument_node="">.&nbsp;&nbsp; Recent evidence casts doubt on the assertion that head and neck cancers are caused by cannabis smoking though it is important to note that the development of head and neck cancer is very slow and often occurs in association with other risk-factors.&nbsp; Some studies have shown an association and some have not.&nbsp; It remains our advice that the smoking of any substance is profoundly unwise and there is no reason to believe that cannabis is any safer than tobacco.</span></p><p data-dcnode-id="110"><span data-dcnode-id="111" instrument_node="">&nbsp;</span></p><p data-dcnode-id="107"><strong data-dcnode-id="108"><span data-dcnode-id="109" instrument_node="">Credits:</span></strong></p><p data-dcnode-id="103"><span data-dcnode-id="106" instrument_node="">Cannabis Sativa: </span><a data-dcnode-id="104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//flic.kr/p/6P64Ue" target="_blank"><span data-dcnode-id="105" instrument_node="">Flores Y Plantas</span></a></p></div></div></div><span data-dcnode-id="99" instrument_node=""> </span></div><span data-dcnode-id="97" instrument_node="">
</span></article><span data-dcnode-id="95" instrument_node="">
