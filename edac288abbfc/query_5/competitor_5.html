</span><section class="article-body-wrap" data-dcnode-id="4159"><span data-dcnode-id="4377" instrument_node="">
</span><div class="body-text clearfix" data-dcnode-id="4229" itemprop="articleBody"><span data-dcnode-id="4376" instrument_node="">
</span><span class="entry-content" data-dcnode-id="4241"><h2 data-dcnode-id="4374"><img alt="chickpea-cancer-treatment-truth." class="aligncenter wp-image-2735 size-full" data-dcnode-id="4375" height="336" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cancermind.com/wp-content/uploads/2015/08/chickpea-cancer-treatment-truth.jpg&amp;raw" srcset="http://www.cancermind.com/wp-content/uploads/2015/08/chickpea-cancer-treatment-truth.jpg 800w, http://www.cancermind.com/wp-content/uploads/2015/08/chickpea-cancer-treatment-truth-300x126.jpg 300w" width="800"></h2><div data-dcnode-id="4348" style="padding-top: 50px;"><b data-dcnode-id="4349"><aside class="mashsb-container mashsb-main" data-dcnode-id="4351"><div class="mashsb-box" data-dcnode-id="4354"><div class="mashsb-count mash-large" data-dcnode-id="4369" style="float:left;"><div class="counts mashsbcount" data-dcnode-id="4372"><span data-dcnode-id="4373" instrument_node="">221</span></div><span class="mashsb-sharetext" data-dcnode-id="4370"><span data-dcnode-id="4371" instrument_node="">SHARES</span></span></div><div class="mashsb-buttons" data-dcnode-id="4355"><a class="mashicon-facebook mash-large mashsb-shadow" data-dcnode-id="4365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer.php%3Fu%3Dhttp%253A%252F%252Fwww.cancermind.com%252Fchickpea-cancer-treatment-cure%252F" rel="noopener nofollow" target="_blank"><span class="icon" data-dcnode-id="4368"></span><span class="text" data-dcnode-id="4366"><span data-dcnode-id="4367" instrument_node="">FACEbook</span></span></a><a class="mashicon-twitter mash-large mashsb-shadow" data-dcnode-id="4361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3DChickpea%2520Cancer%2520Treatment%2520Cure%2520Or%2520Hoax%253F%26url%3Dhttp%3A//www.cancermind.com/%3Fp%3D2730" rel="noopener nofollow" target="_blank"><span class="icon" data-dcnode-id="4364"></span><span class="text" data-dcnode-id="4362"><span data-dcnode-id="4363" instrument_node="">twiTTER</span></span></a><a class="mashicon-subscribe mash-large mashsb-shadow" data-dcnode-id="4357" href="#" rel="noopener nofollow" target="_blank"><span class="icon" data-dcnode-id="4360"></span><span class="text" data-dcnode-id="4358"><span data-dcnode-id="4359" instrument_node="">SUBscribe</span></span></a><div class="onoffswitch2 mash-large mashsb-shadow" data-dcnode-id="4356" style="display:none;"></div></div></div><span data-dcnode-id="4353" instrument_node="">
</span><div data-dcnode-id="4352" style="clear:both;"></div></aside><span data-dcnode-id="4350" instrument_node="">
</span></b></div><span data-dcnode-id="4347" instrument_node="">
</span><p data-dcnode-id="4345"><span data-dcnode-id="4346" instrument_node="">I have come across countless cancer remedies over the years. Some of them completely outrageous, some very promising, and others falling somewhere in-between. When coming across the chickpea cancer treatment I didn’t know exactly&nbsp;where it fits.</span></p><span data-dcnode-id="4344" instrument_node="">
</span><p data-dcnode-id="4342"><span data-dcnode-id="4343" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4341" instrument_node="">
</span><h2 data-dcnode-id="4339"><span data-dcnode-id="4340" instrument_node="">Chickpea Cancer Cure?</span></h2><span data-dcnode-id="4338" instrument_node="">
</span><p data-dcnode-id="4336"><span data-dcnode-id="4337" instrument_node="">The presentation used by George E. Ashkar, PH.D was pretty horrible. I first found this cancer remedy from a friend that let me borrow a soft covered 20 page book that the doctor published. It looked like a low budget attempt all around. It felt low quality and lacked the credibility to discuss such serious things like cancer cures. That leads me to the second thing I didn’t like. He used the words CANCER CURE. The second I see the words CANCER CURE I completely start to lose interest.</span></p><span data-dcnode-id="4335" instrument_node="">
</span><p data-dcnode-id="4333"><span data-dcnode-id="4334" instrument_node="">Lastly I didn’t agree with his reasoning on why the chickpea cancer treatment would work. It’s hard to believe a treatment will work if you question the entire understanding he has on cancer in general. But I Tried. And what I realized is the chickpea cancer treatment in theory&nbsp;is plausible. But not exactly how the doctor claims.</span></p><span data-dcnode-id="4332" instrument_node="">
</span><p data-dcnode-id="4330"><img alt="Chickpea-cancer-treatment-remedy." class="aligncenter size-full wp-image-2737" data-dcnode-id="4331" height="360" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cancermind.com/wp-content/uploads/2015/08/Chickpea-cancer-treatment-remedy.jpg&amp;raw" srcset="http://www.cancermind.com/wp-content/uploads/2015/08/Chickpea-cancer-treatment-remedy.jpg 500w, http://www.cancermind.com/wp-content/uploads/2015/08/Chickpea-cancer-treatment-remedy-300x216.jpg 300w" width="500"></p><span data-dcnode-id="4329" instrument_node="">
</span><p data-dcnode-id="4327"><span data-dcnode-id="4328" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4326" instrument_node="">
</span><h2 data-dcnode-id="4324"><span data-dcnode-id="4325" instrument_node="">Chickpea Cancer Treatment.</span></h2><span data-dcnode-id="4323" instrument_node="">
</span><p data-dcnode-id="4321"><span data-dcnode-id="4322" instrument_node="">The treatment details are probably something you never heard before. You don’t eat or ingest the chickpea in any way. The chickpea is used to put into an open wound you create on your own leg. You create the open wound by putting a clove of garlic on your skin for about 8 hrs to create a blister. Once you have a blister you cut off the dead skin from&nbsp;the top. The doctor claims this will not be painful. A chickpea is then inserted into your wound. Then a wrap is used that contains a piece of cabbage to retain moisture. This is done so the wound doesn’t have a chance to heal. That way you can change the chickpea daily. That pretty much sums up the chickpea cancer treatment.&nbsp;This sounds pretty crazy so far doesn’t it? But does the chickpea cancer treatment have any merit what so ever?</span></p><span data-dcnode-id="4320" instrument_node="">
</span><p data-dcnode-id="4318"><span data-dcnode-id="4319" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4317" instrument_node="">
</span><a class="fw-video-link fw-video-link-image" data-dcnode-id="4314" data-video="http://www.youtube.com/embed/MaKXAEvIve0?autoplay=1&amp;wmode=transparent" href="#"><i class="ss-play" data-dcnode-id="4316"></i><img alt="" data-dcnode-id="4315" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cancermind.com/wp-content/uploads/2015/08/chickpea-cancer-treatment-video.jpg&amp;raw"></a><span data-dcnode-id="4313" instrument_node="">
</span><p data-dcnode-id="4311"><span data-dcnode-id="4312" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4310" instrument_node="">
</span><h2 data-dcnode-id="4308"><span data-dcnode-id="4309" instrument_node="">Why The Doctor Says It Works.</span></h2><span data-dcnode-id="4307" instrument_node="">
</span><p data-dcnode-id="4305"><span data-dcnode-id="4306" instrument_node="">He goes over a lot of theories about how chemicals and carcinogens cause cancer. Which is true but we now know that isn’t the only cause. Most of his theories are based on information we had in the 1990’s. Since then we know a lot more about cancer then we did in 1990. That’s just another thing that works against him. Without getting into to much detail, his claim was that the chickpea is removing the toxins from the body and in turn healing you from cancer. I personally do not agree with this concept. But I do think it’s plausible that putting a foreign object in your body like a chickpea might create an immune response. And that immune response would be the reason for any anti-cancer effect.</span></p><span data-dcnode-id="4304" instrument_node="">
</span><p data-dcnode-id="4298"><span data-dcnode-id="4303" instrument_node="">We know that the immune system is capable of reversing cancer because </span><span data-dcnode-id="4300" style="text-decoration: underline;"><a data-dcnode-id="4301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cancermind.com/pd-l1-anti-pd-1-immunotherapy/" target="_blank"><span data-dcnode-id="4302" instrument_node="">new age cancer drugs like Anti-PD-1</span></a></span><span data-dcnode-id="4299" instrument_node=""> are immune specific. The immune system is very powerful and is capable of things we never thought possible. Infections causing spontaneous regressions&nbsp;have been documented through out the years. Of course the chickpea cancer treatment is an unproven theory. Even though in theory it can work, just remember a lot of other things were suspected to work in theory and failed when scientifically tested. The best thing would be to have the chickpea cancer treatment tested in a human study and verify its effectiveness. But honestly I don’t see that happening because the entire procedure is not&nbsp;entirely credible or user friendly. Serious infection will always be a risk and concern. The entire thing just doesn’t look like it would be adopted by the medical community or the public for that matter. For now we just have to go by the information we have. And at this point it’s not much.</span></p><span data-dcnode-id="4297" instrument_node="">
</span><p data-dcnode-id="4295"><span data-dcnode-id="4296" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4294" instrument_node="">
</span><h2 data-dcnode-id="4292" style="text-align: center;"><span data-dcnode-id="4293" instrument_node="">What Do You Think?</span></h2><span data-dcnode-id="4291" instrument_node="">
</span><p data-dcnode-id="4289" style="text-align: center;"><span data-dcnode-id="4290" instrument_node="">Is it possible for the&nbsp;Chickpea Cancer Treatment to be effective?</span></p><span data-dcnode-id="4288" instrument_node="">

</span><p data-dcnode-id="3971"><span data-dcnode-id="3972" instrument_node="">Thank you for your comment. However, when you use wording like “100 percent effective” especially with no data to back it up, it sounds nothing more than a hyped up claim. Also, saying things like drugs never cure cancer only discourage cancer patients against seeking real medical help. In reality, chemotherapy, radiation, and surgery all have their issues but have actually saved lives. And this is a fact that has been shown in real studies which is more than i can say about your supposed cancer cure. If you really want to help cancer patients then avoid using terms that can discourage patients from choosing what option is best for their specific situation. No treatment will ever be 100% effective because no cancer is 100% the same. And because you don’t even understand that simple concept, your treatment is extremely hard to take seriously.</span></p><span data-dcnode-id="3970" instrument_node="">

</span><p data-dcnode-id="3893"><span data-dcnode-id="3894" instrument_node="">Natalia, </span></p><span data-dcnode-id="3892" instrument_node="">
</span><p data-dcnode-id="3890"><span data-dcnode-id="3891" instrument_node="">I don’t see any doctor telling you that doing the chickpea method while also doing chemotherapy is a good idea. If you do both at the same time you are almost guaranteed a serious infection that can lead to death. Chemotherapy usually lowers the immune system and having an open wound will increase chance of infection dramatically. In fact, something as simple as eating raw fruits and vegetables that aren’t washed properly can result in an infection while undergoing chemotherapy never mind having a hole in the leg. Extremely risky. </span></p><span data-dcnode-id="3889" instrument_node="">
</span><p data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">If you read more about the chickpea method you will learn that it would be pointless to do both at the same time since dr, ashkar says the chickpea method removes toxins from the body which in turn reverses cancer. He also states that chemotherapy is a poison which would make it a toxin in the body which is exactly what he says should be removed and limited in the first place.</span></p><span data-dcnode-id="3886" instrument_node="">

</span><span class="comment-reply" data-dcnode-id="3518"><a aria-label="Reply to Paula" class="comment-reply-link" data-dcnode-id="3519" href="#comment-452" onclick="return addComment.moveForm( &quot;comment-452&quot;, &quot;452&quot;, &quot;respond&quot;, &quot;2730&quot; )" rel="nofollow"><span data-dcnode-id="3520" instrument_node="">Reply</span></a></span><span data-dcnode-id="3517" instrument_node=""> </span></div><span data-dcnode-id="3515" instrument_node="">

</span><div class="comment-body" data-dcnode-id="3502"><span data-dcnode-id="3512" instrument_node="">
</span><p data-dcnode-id="3510"><span data-dcnode-id="3511" instrument_node="">While there is no need to “bash” conventional treatments there is also NO need to “bash” natural treatments. My father was diagnosed with stage 3 lung cancer, after extensive chemotherapy and radiation, the doctor had told us that their most aggressive treatment had not worked. She informed us my father has less than five months too live. </span></p><span data-dcnode-id="3509" instrument_node="">
</span><p data-dcnode-id="3507"><span data-dcnode-id="3508" instrument_node="">WHEN you are faced with such news, DO NOT listen to the doctors and take your loved one straight to hospice, TRY ANYTHING AT ALL THAT MIGHT HELP. It’s not “false” hope, it’s hope and I cannot stress enough how important it is to have faith and not give up.</span></p><span data-dcnode-id="3506" instrument_node="">
</span><p data-dcnode-id="3504"><span data-dcnode-id="3505" instrument_node="">My father and I came across this method and decided to try it because it cannot hurt whether it helps or not. Since the doctors gave us no more options we continued with this method since, and its been well over a couple months and my father is looking better than ever so this method is helping and I’m thankful. And “wounds” always heal, it’s ridiculous to be worried about a small wound while trying to battle something as big as cancer. Again, anything natural is worth a try, we cannot always put our 100% trust to doctors and pharmacies.</span></p><span data-dcnode-id="3503" instrument_node="">

</span><img alt="" class="avatar avatar-100 photo" data-dcnode-id="3492" height="100" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.gravatar.com/avatar/49078e22278b55d1d98d6da1400d6862%3Fs%3D100%26d%3Dmm%26r%3Dg&amp;raw" srcset="http://1.gravatar.com/avatar/49078e22278b55d1d98d6da1400d6862?s=200&amp;d=mm&amp;r=g 2x" width="100"><span data-dcnode-id="3491" instrument_node=""> </span><span class="tooltip" data-dcnode-id="3488" style="margin-left: -28px;"><span data-dcnode-id="3490" instrument_node="">Author</span><span class="arrow" data-dcnode-id="3489"></span></span><span data-dcnode-id="3487" instrument_node="">

</span><span class="comment-reply" data-dcnode-id="3473"><a aria-label="Reply to Cancermind" class="comment-reply-link" data-dcnode-id="3474" href="#comment-458" onclick="return addComment.moveForm( &quot;comment-458&quot;, &quot;458&quot;, &quot;respond&quot;, &quot;2730&quot; )" rel="nofollow"><span data-dcnode-id="3475" instrument_node="">Reply</span></a></span><span data-dcnode-id="3472" instrument_node=""> </span></div><span data-dcnode-id="3470" instrument_node="">
</span></div><span data-dcnode-id="3468" instrument_node="">
</span><div class="comment-body" data-dcnode-id="3451"><span data-dcnode-id="3467" instrument_node="">
</span><p data-dcnode-id="3465"><span data-dcnode-id="3466" instrument_node="">Paula, </span></p><span data-dcnode-id="3464" instrument_node="">
</span><p data-dcnode-id="3462"><span data-dcnode-id="3463" instrument_node="">First, I Agree with not bashing natural treatments that have some type of data, research, or any evidence that support its use against cancer. Even natural treatments that have no evidence are not bashed on this site but only exposed by the lack of data. All therapies are treated equally based on the amount of credible data that is available for that particular treatment. Stating the obvious facts about what data is missing is not bashing. It is merely pointing out the reality and giving the readers the option to make their own decision. </span></p><span data-dcnode-id="3461" instrument_node="">
</span><p data-dcnode-id="3459"><span data-dcnode-id="3460" instrument_node="">While i agree with hope and not giving up, i do not agree with trying anything as long as it’s natural. I started this site so cancer patients will have a place that provides factual data on all types of treatments so they can make the best decision for themselves. That means not trying the first treatment they hear about or see on the internet but actually comparing treatments to see which have a better chance of being effective. Some cancer patients might only have time for one last try at a treatment and i would think they would want that treatment to have the best possible odds of working.</span></p><span data-dcnode-id="3458" instrument_node="">
</span><p data-dcnode-id="3456"><span data-dcnode-id="3457" instrument_node="">Trying just anything that is natural can be just as bad as trying nothing at all. That’s what most people don’t see or understand. Why pick a treatment that has an unknown potential vs a treatment that has a documented and known potential? If someone decides to take that gamble with knowing that a particular treatment might have a 0% chance of working then fine. They can take that risk if they desire. But to be told that a treatment will work when in fact the treatment has an unknown potential is just plain wrong. And when someone says a treatment has a 100% cure rate without “ANY” supporting evidence, it’s fraudulent to say the least. </span></p><span data-dcnode-id="3455" instrument_node="">
</span><p data-dcnode-id="3453"><span data-dcnode-id="3454" instrument_node="">I would like nothing more to find a 100% cancer cure, but with all the con artists in this world we need a little more then someones word. Otherwise people can be using their last chance on the chickpea cancer treatment which can possibly turn out to be nothing more than a bogus story.</span></p><span data-dcnode-id="3452" instrument_node="">

</span><p data-dcnode-id="2720"><span data-dcnode-id="2721" instrument_node="">George, </span></p><span data-dcnode-id="2719" instrument_node="">
</span><p data-dcnode-id="2717"><span data-dcnode-id="2718" instrument_node="">I have pointed out many contradictions that you have made on this page and you continue to just repeat the same thing over and over again. You have failed to address any of the things I have mentioned. I have no idea if this has to do with the language barrier or if you just don’t have a clear understanding of your own hypothesis or treatment. </span></p><span data-dcnode-id="2716" instrument_node="">
</span><p data-dcnode-id="2714"><span data-dcnode-id="2715" instrument_node="">I see that some people have commented that they have used the chickpea method with positive results. However, like johns comment above that states his sister used the chickpea method after surgery means that the chickpea method was not the only treatment that she received. Surgery is a form of treatment and even though surgery is usually not enough, it has been documented that it can be effective. And I’m sure that most patients that try the chickpea method will be using other treatments conventional and natural alike. Due to this fact it is very difficult to distinguish whether the response is from those other treatments or the chickpea cancer treatment. That is why testimonials are not an effective way to base an opinion on treatments of any kind. They lack information and usually contain opinions, estimates and a personal bias. This doesn’t even take into account the placebo effect. Just like your reasoning for why this treatment works is bias and has no support. </span></p><span data-dcnode-id="2713" instrument_node="">
</span><p data-dcnode-id="2711"><span data-dcnode-id="2712" instrument_node="">Have you tested carcinogen levels before and after the chickpea cancer treatment to verify this hypothesis? Have you tested the chickpea to see what it is absorbing? Have you checked immune function before and after? Have you checked antioxidant levels? I’m sure you have done none of these. And yet you talk about all of these results as if it has been already proven by you. If you believe in this treatment so much why don’t you actually start doing something that gives it some credibility? Maybe you will start understanding it better and might paint a more clearer picture when talking about it. You might even find out it’s working for an entirely different reason. And maybe that different reason is more scientifically acceptable.</span></p><span data-dcnode-id="2710" instrument_node="">

</span><p data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">Ask yourself, how many time during pumping gas you’ve saw the sign that says “chemicals known in this facility can cause cancer or birth defects”, or at factories or refineries and etc.. Rate of people getting Cancer is getting higher and higher and cancer death is plunging with no mercy and killing thousands daily all over the world. </span></p><span data-dcnode-id="1913" instrument_node="">
</span><p data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">Honestly I have never heard from any medical doctors that cancer is curable, they just can delay the death but none of them claimed that they can cure cancer for 100%, meaning they can slow it down but can not get rid of it. Back to the logic of NIA or chickpea, removing carcinogen from body will eliminate, at first to get cancer second if you have cancer, by removing carcinogen you are cutting-off the feed for cancerous cells and by doing that you are eliminating the spread of cancer cells to other parts of body. </span></p><span data-dcnode-id="1910" instrument_node="">
</span><p data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">Dr Ashkar is proving that when in present of carcinogen a bad or damage cell can be attach to a healthy cell and cause cancerous cell, carcinogen atoms attacking the good cell atoms and by stealing electrons, causing the good cell atoms to be positive and attracted the bad cell, these cells combined together will create cancerous cell. Well we can not eliminate our good cells (our life depends on them) bad (damaged) cells are there in our body due to age, sickness, sadness, smoking, alcohol drinking and etc.. but what we can do is to eliminate the unwanted, an alien substance name carcinogen, and the only way to do that is use NIA method unless someone else to tell us how this can be done differently. Chickpea role is to keep the wound open and absorb the carcinogen, it causes one way flow, flow from body to outside, nothing can go back inside so there is no deadly infection, my dad is diabetic, with this kind of wounds on both his legs after 3 months he suppose to have gangrene and having both legs to be amputated, but he walks about 1- 2 miles a day, he feels good and well, once a while he complains about some aches here and there and my respond is I have much more of these aches than you dad. </span></p><span data-dcnode-id="1907" instrument_node="">
</span><p data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">We both I and Vahe will not stop to do researching and reaching out and get educated about cancer, and so far what we have learned is that medical science has failed in this criteria. My mother in-law dies two and half years ago by Lymphoma cancer, back then I did not have the knowledge of chickpea method, we had her to do chemotherapy and she died after 8 months in pain and agony, she had the best oncologist doctors and she was treated in one of the best cancer treatment centers in US (City of Hope). I will not let my father to go to the same path, because I saw what he will face if he goes to conventional treatment process. </span></p><span data-dcnode-id="1904" instrument_node="">

</span><p data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">Vrej, </span></p><span data-dcnode-id="1600" instrument_node="">
</span><p data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">Some people don’t have 8 months to wait. Furthermore, be careful in believing blindly in something because you run the risk in using up all your time on a treatment that might not work. Things don’t always work out perfectly in life and you have to be ready to adapt. I know that you and your brother are bias on this treatment because your dads life is on the line and that’s perfectly understandable. Trust me i was in the same position.</span></p><span data-dcnode-id="1597" instrument_node="">
</span><p data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">Even though i am not a believer in this treatment for many reasons, i still genuinely hope it does help your dad. No matter what the outcome, do know that your honest feedback will help many people. Lets let the results speak for themselves and avoid finding excuses why the treatment didn’t work. I think we should be fair to all the people reading these comments knowing that what they read will in someway affect their decision. Thanks again for sharing your results with the world.</span></p><span data-dcnode-id="1594" instrument_node="">

</span><p data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">Vahe, </span></p><span data-dcnode-id="1508" instrument_node="">
</span><p data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">Thank you for understanding. I also would have liked to have more information on some of the treatments my mom tried but did not work. Unfortunately, precious time is wasted with every treatment that a cancer patient tries. The web is filed with all the good outcomes that sometimes make you feel a certain treatment is better than it really is. Not enough resources show all the times a treatment didn’t work. That is why i started this site. So people can see both sides and then make a better decision. </span></p><span data-dcnode-id="1505" instrument_node="">
</span><p data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">There are hundreds of treatments just like the chickpea method and they are all said to be cancer cures. Problem is they all can’t be cancer cures.</span></p><span data-dcnode-id="1502" instrument_node="">

</span><p data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">Hi Kim,</span></p><span data-dcnode-id="1405" instrument_node="">
</span><p data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">I’m sorry I haven’t commented here for a while now. I wanted to give everyone an update: </span></p><span data-dcnode-id="1402" instrument_node="">
</span><p data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">My dad’s latest scan results suggest that cancer has increased just a bit to one in his lungs. He did have the same type of cancer in his colon which was missed on the initial scan (WOW) which is unfortunately more active than the one from his lung. The colon one has spread from 1 to 3 places but not too much but is active. </span></p><span data-dcnode-id="1399" instrument_node="">
</span><p data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">His brain scan shows that he may have something behind his right eye that may be cancerous. We are taking him to city of hope in Pasadena tomorrow 4/11/18 to possibly perform the gamma radiation to get rid of it as needed if possible… </span></p><span data-dcnode-id="1396" instrument_node="">
</span><p data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">He’s still driving and living his normal daily life so we are fighting.. I’ll check back in here in a few days to provide more update. </span></p><span data-dcnode-id="1393" instrument_node="">
</span><p data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">I don’t know if the cheakpea method has slowed down the cancer… We are in our 6th month now… he still keeps changing his bandages everyday. </span></p><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">Good health to you all</span></p><span data-dcnode-id="1387" instrument_node="">
</span><p data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">Best,</span></p><span data-dcnode-id="1384" instrument_node="">

</span><p data-dcnode-id="1342"><span data-dcnode-id="1345" instrument_node="">I am very sorry to know that the cancer has metastasized. I was very hoping it would have been a more positive report but I am very optimistic that it can be controlled and he will continue to live a good life. I agree the chickpeas probably plays a part in slowing it down. But while you do the chickpeas therpy consult your doctor on what to do.</span><br data-dcnode-id="1344"><span data-dcnode-id="1343" instrument_node="">

</span><div class="comment-body" data-dcnode-id="1290"><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">Every one is telling me about precious time !!! What precious time ? We all know that medical science has no cure for cancer , unless they know about it in very early stage . If the tumor is on a organ such as breast or one kidney they operate and remove it but if the tumor spreads and whole body and vital organs are involved then medical science can delay the death by chemotherapy, there is no cure for such cancer. My point is you tell a 30-40 years old cancer patient we will keep you alive for another 2-3 years with chemotherapy but these 2-3 years life will be miserable, you will loose your hair, your weight, constant vomiting and diarrhea and like lab mouse we will inject you with more chemicals till you die in pain and agony. That is the patient destiny, and how about relatives and friends and children of these patient? What kind of impact it will have on them? Chickpeas method required time and whoever took this path he or she knows that the cure does not come in a day or weeks or a month, as I said before time will do the job, just need to wait and follow the treatment because it cures the damn illness 100%. My Dad results are not a happy results but what else can we offer him to guarantee his wellness? So we are continuing the chickpeas method till we get the result even it takes several months or years.</span></p><span data-dcnode-id="1291" instrument_node="">

</span><img alt="" class="avatar avatar-100 photo" data-dcnode-id="1280" height="100" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.gravatar.com/avatar/49078e22278b55d1d98d6da1400d6862%3Fs%3D100%26d%3Dmm%26r%3Dg&amp;raw" srcset="http://1.gravatar.com/avatar/49078e22278b55d1d98d6da1400d6862?s=200&amp;d=mm&amp;r=g 2x" width="100"><span data-dcnode-id="1279" instrument_node=""> </span><span class="tooltip" data-dcnode-id="1276" style="margin-left: -28px;"><span data-dcnode-id="1278" instrument_node="">Author</span><span class="arrow" data-dcnode-id="1277"></span></span><span data-dcnode-id="1275" instrument_node="">

</span><span class="comment-reply" data-dcnode-id="1261"><a aria-label="Reply to Cancermind" class="comment-reply-link" data-dcnode-id="1262" href="#comment-778" onclick="return addComment.moveForm( &quot;comment-778&quot;, &quot;778&quot;, &quot;respond&quot;, &quot;2730&quot; )" rel="nofollow"><span data-dcnode-id="1263" instrument_node="">Reply</span></a></span><span data-dcnode-id="1260" instrument_node=""> </span></div><span data-dcnode-id="1258" instrument_node="">

</span><div class="comment-body" data-dcnode-id="1242"><span data-dcnode-id="1255" instrument_node="">
</span><p data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">Vrej, </span></p><span data-dcnode-id="1252" instrument_node="">
</span><p data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Let me be very clear, I didn’t even mention chemotherapy or conventional treatment in my previous comments. Just because i wrote time is precious you automatically assumed i was talking about mainstream medicine which i was not. I meant exactly what i said, time is precious since no matter what treatment you choose (conventional, natural, or no treatment at all), cancer can keep growing. </span></p><span data-dcnode-id="1249" instrument_node="">
</span><p data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">Just because i am not a fan of this chickpea treatment doesn’t mean i love chemotherapy or think it is good for everyone. I agree chemotherapy sucks. And it is not for everyone especially for certain situations and types of cancer. However, this is the choice of the patient. It’s also your choice to continue the chickpea pea cancer method as long as you like. No one here is telling you to do other wise. We should be here to help and learn from each other and not bicker back and forth. The only thing that matters is your father and all the other cancer patients reading these comments. Lets do them a favor and provide unbiased information so they make their own decision. For example: lets not say…..ohh it didn’t work so far but the treatment is still 100% cure. We only need to know if it worked or not and if it’s helping. We don’t need to hear the same “cancer cure” stuff we hear all over the internet. Thousands of people say they have cure for cancer and most of them are frauds. Millions of people with curable cancer use fake cancer cures only to waste time and in the end die because they listened to someone on the internet. People need to be careful and you need to respect that. You also have to respect you don’t know their medical condition or history so you really don’t know what’s best for them. They might have a curable early stage cancer. Let them decide. Stop playing god. </span></p><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">Many other natural treatments exist. Yes, just like chickpea method but with actual proof that it can be effective against cancer. So it’s not only a choice between chemotherapy or chickpea but a variety of other natural treatments that have real research to support its use against cancer. So again please respect that other patients ( even though they shouldn’t) are using these comments to make life changing decisions.</span></p><span data-dcnode-id="1243" instrument_node="">

</span><div class="comment-body" data-dcnode-id="980"><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Dr. Ashkar lost his patience with doubtful Thomases. His guesses as to how exactly this method works add to the confusion. I will say only this much. It works! It makes me furious, when doctors from the approved side are so quick to laugh, but not s single one offers to do research on the method. Garlic, hahaha, chickpea, hahaha, cabbage, how quaint. No one says, let’s test the fluid that’s coming out. What’s in it? How it differs from person to person. Only desperate folks try it, and the majority is happy. Dr. Ashkar warns, that people with diabetes need to be very careful while doing this treatment, because diabetes brings in another set of factors. Vahe’s Dad is diabetic and that changes a game. Immune system went after this disease first. Plus age and the length of time he was sick. The method was just challenged with too many problems. Including “missed” by doctors metastasized cancers. Sad, that nobody is bothered by that. Time needed to cure it was bigger than speed of the illness. But it worked for my family. </span></p><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">I cured myself of polymiositis. Completely. I will not regain muscle tissue, that disease ate away, but while people I waited in waiting room with to see the doctor for it all died, I’m not only alive, but illness free. A family member had prostate cancer. It was removed using the robot, and immediately started growing back. That’s when we learned about the method. It took three months of using it, to have all signs of regrowth gone. And that on top of rheumatoid arthritis’ pain. He could finally drive the car and walk the stairs in one attempt and no pain. Another person in the family had breast cancer at young age, it disappeared in eight to nine months. So yes, I know and can vouch it works. It even removes cellulite, as a side effect. hahaha! Why not push for the establishment to study it, analyze the goo that is coming out and compare the content to the person’s health history. It is easy to smirk and dismiss, and big pharma loves the smirkers for it. Yet this method killed no one, and cured many. Google NIA for cancer and you will see all those enthusiastic testimonials. Try it BEFORE it is your only hope left.</span></p><span data-dcnode-id="981" instrument_node="">

</span><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Doctor was speechless seeing that the cancer was getting smaller every time. After two years of treatment I was announced clear and up to now stay like this. My left kidney is not working but still can lead very active life.</span></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">God gave me new life. Chickpea treatment was for me a miracle. From 5 weeks I live 4 years.</span></p><span data-dcnode-id="939" instrument_node="">
