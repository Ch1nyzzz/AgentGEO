</span><div class="region region-content" data-dcnode-id="491"><span data-dcnode-id="773" instrument_node="">
</span><div class="block block-system block-system-main-block" data-dcnode-id="493" id="block-mskcc-content"><span data-dcnode-id="772" instrument_node="">
</span><article class="node node--type-news node--view-mode-full" data-dcnode-id="495" role="article"><span data-dcnode-id="771" instrument_node="">
</span><p class="byline" data-dcnode-id="760"><span data-dcnode-id="770" instrument_node="">
By
</span><span class="byline__author" data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Maureen Salamon</span></span><span data-dcnode-id="767" instrument_node="">
</span><strong class="byline__date" data-dcnode-id="762"><span data-dcnode-id="766" instrument_node="">
</span><time class="date date--simple" data-dcnode-id="764" datetime="2015-08-25T00:00:00-0400"><span data-dcnode-id="765" instrument_node="">Tuesday, August 25, 2015</span></time><span data-dcnode-id="763" instrument_node="">
</span></strong><span data-dcnode-id="761" instrument_node="">
</span></p><span data-dcnode-id="759" instrument_node="">
</span><div class="node__content" data-dcnode-id="500"><span data-dcnode-id="758" instrument_node="">
</span><div class="container-image" data-dcnode-id="742"><span data-dcnode-id="757" instrument_node="">
</span><figure class="msk-figure" data-dcnode-id="744"><span data-dcnode-id="756" instrument_node="">
</span><picture class="msk-image" data-dcnode-id="752"><span data-dcnode-id="755" instrument_node="">
</span><img alt="Cannabis oil is often heralded as an alternative cure for cancer " class="msk-image__img msk-markup-image-ignore" data-dcnode-id="754" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mskcc.org/sites/default/files/styles/large/public/node/107628/3x2/droppers.jpg&amp;raw" srcset="https://www.mskcc.org/sites/default/files/styles/width_200/public/node/107628/3x2/droppers.jpg 200w,https://www.mskcc.org/sites/default/files/styles/width_300/public/node/107628/3x2/droppers.jpg 300w,https://www.mskcc.org/sites/default/files/styles/width_400/public/node/107628/3x2/droppers.jpg 400w,https://www.mskcc.org/sites/default/files/styles/width_500/public/node/107628/3x2/droppers.jpg 500w,https://www.mskcc.org/sites/default/files/styles/width_600/public/node/107628/3x2/droppers.jpg 600w,https://www.mskcc.org/sites/default/files/styles/width_700/public/node/107628/3x2/droppers.jpg 700w,https://www.mskcc.org/sites/default/files/styles/width_800/public/node/107628/3x2/droppers.jpg 800w"><span data-dcnode-id="753" instrument_node="">
</span></picture><span data-dcnode-id="751" instrument_node="">
</span><figcaption class="msk-figure__text" data-dcnode-id="746"><span data-dcnode-id="750" instrument_node="">
</span><p class="msk-figure__body" data-dcnode-id="748"><span data-dcnode-id="749" instrument_node=""> Cannabis oil is often heralded as a treatment for cancer and other diseases, but there’s no science to support these claims.
</span></p><span data-dcnode-id="747" instrument_node="">
</span></figcaption><span data-dcnode-id="745" instrument_node="">
</span></figure><span data-dcnode-id="743" instrument_node="">
</span></div><span data-dcnode-id="741" instrument_node="">
</span><div class="clearfix text-formatted field field-node--body field-name-body field-type-text-with-summary" data-dcnode-id="529" id="body-7936"><span data-dcnode-id="740" instrument_node="">
</span><a data-dcnode-id="739" name="body-7936"></a><span data-dcnode-id="738" instrument_node="">
</span><div class="field-items" data-dcnode-id="531"><span data-dcnode-id="737" instrument_node="">
</span><div class="field-item" data-dcnode-id="533"><div class="msk-markup" data-dcnode-id="534"><span data-dcnode-id="736" instrument_node="">
</span><aside data-dcnode-id="675"><div class="msk-grid" data-dcnode-id="677" data-grid-type-large="50:50" data-grid-type-medium="50:50" data-grid-type-small="100"><span data-dcnode-id="735" instrument_node="">
</span><div class="msk-grid__item" data-dcnode-id="724"><span data-dcnode-id="734" instrument_node="">
</span><div class="abstract-summary__title" data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Summary</span></div><span data-dcnode-id="731" instrument_node="">
</span><div class="msk-summary" data-dcnode-id="726"><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Therapies such as acupuncture and massage can be a useful complement to conventional methods of treating cancer. But “cure-all” solutions that claim to eliminate disease naturally aren’t proven to work — and can actually be dangerous for people with cancer.</span></p><span data-dcnode-id="727" instrument_node="">
</span></div><span data-dcnode-id="725" instrument_node="">
</span></div><span data-dcnode-id="723" instrument_node="">
</span><div class="msk-grid__item" data-dcnode-id="679"><span data-dcnode-id="722" instrument_node="">
</span><div class="msk-highlight" data-dcnode-id="681"><span data-dcnode-id="721" instrument_node="">
</span><div class="msk-highlight__title" data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Highlights</span></div><span data-dcnode-id="718" instrument_node="">
</span><div class="msk-highlight__inner" data-dcnode-id="683"><span data-dcnode-id="717" instrument_node="">
</span><div class="clearfix" data-dcnode-id="684"><span data-dcnode-id="716" instrument_node="">
</span><ul class="msk-list msk-list--unordered" data-dcnode-id="685"><li class="msk-list-item" data-dcnode-id="711"><span data-dcnode-id="715" instrument_node="">
</span><span class="msk-list-item__content" data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">
Complementary therapies can be used as adjuncts to mainstream cancer care.
</span></span><span data-dcnode-id="712" instrument_node="">
</span></li><span data-dcnode-id="710" instrument_node="">
</span><li class="msk-list-item" data-dcnode-id="705"><span data-dcnode-id="709" instrument_node="">
</span><span class="msk-list-item__content" data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">
But using unproven cures can be harmful for cancer patients.
</span></span><span data-dcnode-id="706" instrument_node="">
</span></li><span data-dcnode-id="704" instrument_node="">
</span><li class="msk-list-item" data-dcnode-id="699"><span data-dcnode-id="703" instrument_node="">
</span><span class="msk-list-item__content" data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">
They also haven’t been shown to work.
</span></span><span data-dcnode-id="700" instrument_node="">
</span></li><span data-dcnode-id="698" instrument_node="">
</span><li class="msk-list-item" data-dcnode-id="693"><span data-dcnode-id="697" instrument_node="">
</span><span class="msk-list-item__content" data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">
Some of these can hamper the effectiveness of treatment.
</span></span><span data-dcnode-id="694" instrument_node="">
</span></li><span data-dcnode-id="692" instrument_node="">
</span><li class="msk-list-item" data-dcnode-id="687"><span data-dcnode-id="691" instrument_node="">
</span><span class="msk-list-item__content" data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">
Mainstream therapies are more successful and less damaging than ever.
</span></span><span data-dcnode-id="688" instrument_node="">
</span></li><span data-dcnode-id="686" instrument_node="">
</span></ul></div></div><span data-dcnode-id="682" instrument_node="">
</span></div><span data-dcnode-id="680" instrument_node="">
</span></div><span data-dcnode-id="678" instrument_node="">
</span></div><span data-dcnode-id="676" instrument_node="">
</span></aside><p data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">The Internet is full of “miracle cures” for cancer and alleged surefire ways to prevent it, and well-meaning people may urge cancer patients to just try them out in hopes of eliminating their disease. Some patients, worried that conventional treatments won’t work or pose significant side effects, seek a treatment whose effectiveness isn’t actually supported by scientific evidence or may even prove dangerous.&nbsp;During a time of uncertainty and anxiety, it’s understandable that any hope for a cure —&nbsp;even if it isn’t medically proven — is tempting.</span></p><p data-dcnode-id="668"><span data-dcnode-id="672" instrument_node="">“Patients want something ‘natural’ to try to treat their cancer or prevent their cancer from coming back,” says Memorial Sloan Kettering pharmacist and herbalist </span><a data-dcnode-id="670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mskcc.org/profile/k-simon-yeung"><span data-dcnode-id="671" instrument_node="">K. Simon Yeung</span></a><span data-dcnode-id="669" instrument_node="">. “But the people promoting these treatments might not necessarily have a medical or oncology background. In addition, patients who try these therapies may find, when they come back to seek mainstream treatment, that it’s too late and their cancer has already spread.”</span></p><p data-dcnode-id="660"><span data-dcnode-id="667" instrument_node="">Dr. Yeung is manager of the </span><a data-dcnode-id="665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mskcc.org/cancer-care/diagnosis-treatment/symptom-management/integrative-medicine/herbs/search"><span data-dcnode-id="666" instrument_node="">About Herbs database</span></a><span data-dcnode-id="664" instrument_node="">, created and maintained by </span><a data-dcnode-id="662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mskcc.org/cancer-care/diagnosis-treatment/symptom-management/integrative-medicine"><span data-dcnode-id="663" instrument_node="">MSK’s Integrative Medicine Service</span></a><span data-dcnode-id="661" instrument_node="">. The service provides complementary therapies such as acupuncture, music therapy, and massage that are used in addition to — not as alternatives for — mainstream cancer approaches such as chemotherapy, radiation, and surgery.</span></p><p data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Here, Dr. Yeung explains the hype and the scientific evidence surrounding three highly publicized but unproven therapies: cannabis oil, Laetrile, and a pH-manipulation (also known as alkaline) diet.</span></p><span data-dcnode-id="657" instrument_node="">
</span><h2 class="right-rail__subtitle" data-dcnode-id="655" id="cannabis-oil"><span data-dcnode-id="656" instrument_node="">Cannabis Oil</span></h2><span data-dcnode-id="654" instrument_node="">
</span><p data-dcnode-id="650"><strong data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">The hype:</span></strong><span data-dcnode-id="651" instrument_node=""> Cannabis oil is often heralded as a treatment to destroy or shrink cancerous tumors, as well as a cure for diabetes, ulcers, arthritis, migraines, insomnia, infections, and many other diseases. Also called marijuana oil or hemp oil, it’s extracted from marijuana plants, often with higher proportion of a compound known as CBD (cannabidiol), which has less of a psychoactive effect than the more-famous THC (tetrahydrocannabinol) compound that gets marijuana users high.</span></p><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Cannabis oil is available in several forms with different potencies. It can be infused into cooking oil that users squirt under the tongue or mix into food. Its vapors can also be inhaled. By federal law, cannabis products are illegal, though several states have enacted laws to legalize their medical use. &nbsp;</span></p><p data-dcnode-id="644"><strong data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">The evidence:</span></strong><span data-dcnode-id="645" instrument_node=""> While commercially available cannabis compounds are FDA-approved to reduce cancer treatment–related side effects such as nausea and vomiting and to improve appetite, no clinical trials have shown that cannabis products can treat cancer.</span></p><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Claims that cannabis oil cures cancer are anecdotal and largely unsupportable, based on scant research done in mice and in labs. Side effects can include memory and attention loss. Perhaps most important, there is evidence that cannabis compounds may inhibit enzymes that patients need to metabolize other anticancer drugs, thereby increasing their toxicity or reducing their effectiveness. &nbsp;&nbsp;</span></p><p data-dcnode-id="636"><strong data-dcnode-id="638"><span data-dcnode-id="641" instrument_node="">The verdict:</span><em data-dcnode-id="639"><span data-dcnode-id="640" instrument_node=""> </span></em></strong><span data-dcnode-id="637" instrument_node="">“So far, there are no human studies that show cannabis oil can be used as cancer treatment,” Dr. Yeung says. “Patients who are using it — or any form of marijuana — should let their doctors know so they can advise you properly.”</span></p><span data-dcnode-id="635" instrument_node="">
</span><a class="msk-back-to-top" data-dcnode-id="627" href="#"><span data-dcnode-id="634" instrument_node="">
</span><span class="msk-back-to-top__text" data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Back to top</span></span><span data-dcnode-id="631" instrument_node="">
</span><svg aria-hidden="true" class="msk-icon" data-dcnode-id="629" height="7" viewBox="0 0 30 20" width="10" xmlns="http://www.w3.org/2000/svg"><path d="M30 15.914c0 1.1-.272 1.923-1.087 2.746-1.633 1.371-3.81 1.097-5.17-.274l-8.43-9.606-8.978 10.155c-1.36 1.37-3.537 1.37-5.168.274-1.361-1.372-1.633-3.57-.273-5.214L12.32 1.097C12.864.274 13.95 0 15.04 0c1.09 0 1.906.549 2.72 1.097l11.154 12.624c.815.547 1.087 1.37 1.087 2.193z" data-dcnode-id="630"></path></svg><span data-dcnode-id="628" instrument_node="">
</span></a><span data-dcnode-id="626" instrument_node="">
</span><h2 class="right-rail__subtitle" data-dcnode-id="624" id="laetrile"><span data-dcnode-id="625" instrument_node="">Laetrile</span></h2><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="619"><strong data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">The hype:</span></strong><span data-dcnode-id="620" instrument_node=""> Laetrile, first popularized as a cancer therapy in Russia and the United States more than a century ago, is the trade name for a purified form of amygdalin, an extract derived from apricot pits and some nuts and plants. Intestinal enzymes break down Laetrile to produce cyanide, which proponents claim kills cancer cells and leaves normal tissue unharmed. Some also claim that Laetrile is actually a vitamin called B-17 and that deficiencies can cause certain cancers. Banned in the United States, an oral form of Laetrile is available in other countries.</span></p><p data-dcnode-id="615"><strong data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">The evidence:</span></strong><span data-dcnode-id="616" instrument_node=""> Laetrile indeed breaks down into cyanide, but the poison doesn’t just selectively strike cancer cells — it can sicken or kill patients as well. Clinical studies done in the 1970s and 1980s, including those sponsored by the National Institutes of Health, indicated that Laetrile didn’t reduce malignant tumors’ size or growth, but some patients experienced cyanide poisoning.&nbsp;&nbsp;&nbsp;</span></p><p data-dcnode-id="609"><strong data-dcnode-id="611"><span data-dcnode-id="614" instrument_node="">The verdict:</span><em data-dcnode-id="612"><span data-dcnode-id="613" instrument_node=""> </span></em></strong><span data-dcnode-id="610" instrument_node="">“Laetrile has not been proven to be effective against cancer and can even be dangerous to some patients,” Dr. Yeung says. “If amygdalin is eventually used in an anticancer drug, it will have to be in a different form, because the oral form is toxic and too dangerous to use.”</span></p><span data-dcnode-id="608" instrument_node="">
</span><a class="msk-back-to-top" data-dcnode-id="600" href="#"><span data-dcnode-id="607" instrument_node="">
</span><span class="msk-back-to-top__text" data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Back to top</span></span><span data-dcnode-id="604" instrument_node="">
</span><svg aria-hidden="true" class="msk-icon" data-dcnode-id="602" height="7" viewBox="0 0 30 20" width="10" xmlns="http://www.w3.org/2000/svg"><path d="M30 15.914c0 1.1-.272 1.923-1.087 2.746-1.633 1.371-3.81 1.097-5.17-.274l-8.43-9.606-8.978 10.155c-1.36 1.37-3.537 1.37-5.168.274-1.361-1.372-1.633-3.57-.273-5.214L12.32 1.097C12.864.274 13.95 0 15.04 0c1.09 0 1.906.549 2.72 1.097l11.154 12.624c.815.547 1.087 1.37 1.087 2.193z" data-dcnode-id="603"></path></svg><span data-dcnode-id="601" instrument_node="">
</span></a><span data-dcnode-id="599" instrument_node="">
</span><h2 class="right-rail__subtitle" data-dcnode-id="597" id="manipulating-p-h-levels-through-diet"><span data-dcnode-id="598" instrument_node="">Manipulating pH Levels through Diet</span></h2><span data-dcnode-id="596" instrument_node="">
</span><p data-dcnode-id="592"><strong data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">The hype:</span></strong><span data-dcnode-id="593" instrument_node=""> Based on the scientific observation that cancer cells thrive in an acidic environment — meaning low pH levels — some people contend that highly “acidic” foods such as meat, cheese, and grain products raise the risk of cancer by reducing pH levels in the blood. They claim that eating “alkaline” foods such as fruit, green vegetables, and other plant-based products discourages the growth of cancer cells by raising blood pH levels and tout the benefits of the alkaline diet (also known as the alkaline ash diet or alkaline acid diet).</span></p><p data-dcnode-id="588"><strong data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">The evidence:</span></strong><span data-dcnode-id="589" instrument_node=""> Cancer cells create an acidic microenvironment due to a high metabolic rate. Cancer cells can’t live in a highly alkaline environment, but neither can healthy cells. Your body works to keep pH levels constant, and changing your diet is not going to substantially change the pH levels of your blood, which are tightly regulated by the kidneys and lungs regardless of foods consumed.</span></p><p data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">The pH of bodily fluids, such as saliva and urine, does change temporarily depending on the foods you eat, but that doesn’t affect blood pH levels (or, hence, the environment of cancer cells in the body). In fact, any significant deviation in blood pH levels can cause serious, even life-threatening conditions known as acidosis (low pH) or alkalosis (high pH)</span></p><p data-dcnode-id="582"><strong data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">The verdict:</span></strong><span data-dcnode-id="583" instrument_node=""> “There is no evidence that changing your diet to alter pH levels affects cancer growth,” Dr. Yeung says. “The actual science has been misinterpreted. Changing the pH in your saliva doesn’t mean your blood pH changes. Some patients try using chemicals to modify their blood pH, but that can be extremely dangerous.”</span></p><span data-dcnode-id="581" instrument_node="">
</span><a class="msk-back-to-top" data-dcnode-id="573" href="#"><span data-dcnode-id="580" instrument_node="">
</span><span class="msk-back-to-top__text" data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Back to top</span></span><span data-dcnode-id="577" instrument_node="">
</span><svg aria-hidden="true" class="msk-icon" data-dcnode-id="575" height="7" viewBox="0 0 30 20" width="10" xmlns="http://www.w3.org/2000/svg"><path d="M30 15.914c0 1.1-.272 1.923-1.087 2.746-1.633 1.371-3.81 1.097-5.17-.274l-8.43-9.606-8.978 10.155c-1.36 1.37-3.537 1.37-5.168.274-1.361-1.372-1.633-3.57-.273-5.214L12.32 1.097C12.864.274 13.95 0 15.04 0c1.09 0 1.906.549 2.72 1.097l11.154 12.624c.815.547 1.087 1.37 1.087 2.193z" data-dcnode-id="576"></path></svg><span data-dcnode-id="574" instrument_node="">
</span></a><span data-dcnode-id="572" instrument_node="">
</span><h2 class="right-rail__subtitle" data-dcnode-id="570" id="the-bottom-line"><span data-dcnode-id="571" instrument_node="">The Bottom Line</span></h2><span data-dcnode-id="569" instrument_node="">
</span><p data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">“Natural” cancer therapies should be regarded with great caution because most are unsupported by evidence. Many people offering testimonials to the effectiveness of such treatments may attribute benefits to them simply because their condition improved after using them — when the actual cause for the improvement is unrelated.</span></p><p data-dcnode-id="553"><span data-dcnode-id="566" instrument_node="">The good news is that mainstream cancer therapies are safer and more effective than ever. New </span><a data-dcnode-id="564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mskcc.org/cancer-care/diagnosis-treatment/cancer-treatments/chemotherapy"><span data-dcnode-id="565" instrument_node="">chemotherapies</span></a><span data-dcnode-id="563" instrument_node=""> work better with fewer side effects, and novel drugs target specific mutations in cancer cells to minimize harm to healthy cells. Highly precise forms of </span><a data-dcnode-id="561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mskcc.org/cancer-care/diagnosis-treatment/cancer-treatments/radiation-therapy"><span data-dcnode-id="562" instrument_node="">radiation therapy</span></a><span data-dcnode-id="560" instrument_node=""> destroy tumors while sparing normal tissue. New approaches </span><a data-dcnode-id="558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mskcc.org/cancer-care/diagnosis-treatment/cancer-treatments/immunotherapy"><span data-dcnode-id="559" instrument_node="">harness the body’s own immune powers</span></a><span data-dcnode-id="557" instrument_node=""> to destroy cancer cells. And new </span><a data-dcnode-id="555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mskcc.org/cancer-care/diagnosis-treatment/cancer-treatments/surgery"><span data-dcnode-id="556" instrument_node="">surgical techniques</span></a><span data-dcnode-id="554" instrument_node=""> are making it possible to remove tumors more safely while minimizing both risk of recurrence and recovery times. &nbsp;</span></p><p data-dcnode-id="545"><span data-dcnode-id="552" instrument_node="">If you’re considering using a complementary therapy in addition to your traditional cancer treatments, always check with a reputable source such as our </span><a data-dcnode-id="550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mskcc.org/cancer-care/diagnosis-treatment/symptom-management/integrative-medicine/herbs"><span data-dcnode-id="551" instrument_node="">About Herbs</span></a><span data-dcnode-id="549" instrument_node=""> database or the </span><a data-dcnode-id="547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cancer.gov/"><span data-dcnode-id="548" instrument_node="">National Cancer Institute</span></a><span data-dcnode-id="546" instrument_node="">, and always tell your doctor.</span></p><span data-dcnode-id="544" instrument_node="">
</span><a class="msk-back-to-top" data-dcnode-id="536" href="#"><span data-dcnode-id="543" instrument_node="">
