</span><h2 class="page-title" data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Integrative Oncology</span></h2><span data-dcnode-id="493" instrument_node="">
</span></div><span data-dcnode-id="491" instrument_node="">
</span></section><span data-dcnode-id="489" instrument_node="">
</span><article class="article" data-dcnode-id="435"><span data-dcnode-id="488" instrument_node="">
</span><div data-dcnode-id="437" id="content_box"><span data-dcnode-id="487" instrument_node="">
</span><div class="g post post-438 page type-page status-publish" data-dcnode-id="439" id="post-438"><span data-dcnode-id="486" instrument_node="">
</span><div class="single_page" data-dcnode-id="441"><span data-dcnode-id="485" instrument_node="">
</span><div class="post-content" data-dcnode-id="443"><span data-dcnode-id="484" instrument_node="">
</span><div class="container" data-dcnode-id="445"><span data-dcnode-id="483" instrument_node="">
</span><p data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">Integrative oncology physicians are trained to use natural and supportive therapies to reduce side effects, to help optimize conventional care and prevent recurrence.</span></p><span data-dcnode-id="480" instrument_node="">
</span><p data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Combining naturopathic and conventional medicine, supports the pursuit of best possible outcomes for patients.</span></p><span data-dcnode-id="477" instrument_node="">
</span><p data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">Integrative oncology care at AIMS Institute provides state-of-the-science therapies based on genomics, anti-cancer immunity, individual biochemistry and psychospiritual status. We provide phytotherapies, immunotherapies, physical medicine and mind body therapies based on current practice and research and provided by medical experts. We work closely with medical oncologists to provide truly integrative care.  Committed to investigation and improving patient outcomes, we conduct and publish our clinical outcomes studies. </span></p><span data-dcnode-id="474" instrument_node="">
</span><p data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Each of the treatments commonly used is designed to influence some aspect of tumor inhibition including anti-inflammatory, immunomodulatory, anti-angiogenic, or anti-metastatic activity. Our therapies are based on state-of-the science molecular biology, genomics, immunology, pharmacology and mind-body medicine. The core approaches used at the AIMS Institute include nutraceutical therapy, dietary, botanical therapy, as well as physical and psychological rehabilitation and specialty palliative care after primary cancer treatment. NDs are important advisors in this collaborative approach, offering safe, evidence-informed guidance for patients and their conventional providers about options for natural and supportive care.</span></p><span data-dcnode-id="471" instrument_node="">
</span><p data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Our integrative oncology team is led by Dr. Leanna J. Standish, PhD, ND, LAc, FABNO. Dr. Standish is a neuroscientist and a naturopathic physician who is board certified in naturopathic oncology. Her research is focused on the Asian medicinal mushroom Trametes versicolor in the treatment of breast and prostate cancer; functional brain imaging in the treatment of brain cancer; and the development of integrative oncology outcomes studies. New projects using IV Resveratrol and IV Curcumin to treat cancer are being developed.</span></p><span data-dcnode-id="468" instrument_node="">
</span><p data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">She has provided adjunctive naturopathic medical care to hundreds of cancer patients, and has worked collaboratively with Seattle area oncologists to provide integrated conventional/CAM care. A founding board member of the Oncology Association of Naturopathic Physicians, Dr. Standish was board certified in naturopathic oncology in 2006. Her recognition by the oncology community as an expert in naturopathic medicine is evidenced by her being voted one of Seattle’s Best Physicians in the Seattle Metropolitan Magazine in 2002, 2004 and 2008. She has been a member of both the NIH and the Department of Defense study sections for scientific review of CAM research in cancer. Dr. Standish has served as a CAM oncology advisor to MD Anderson Cancer Center.</span></p><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Patients who seek integrative oncology will be evaluated by Dr. Standish’s team to evaluate the anti-cancer, immunotherapy and mind body therapies needed for healing.</span></p><span data-dcnode-id="462" instrument_node="">
</span><p data-dcnode-id="453"><strong data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Integrative Oncology Team Members</span></strong><br data-dcnode-id="459"><span data-dcnode-id="458" instrument_node="">
Sonia Malani, ND (Second-year resident, PGY-2)</span><br data-dcnode-id="457"><span data-dcnode-id="456" instrument_node="">
Julianna Giles, ND (First-year resident, PGY-1)</span><br data-dcnode-id="455"><span data-dcnode-id="454" instrument_node="">
Chris Duhon, ND (ClearMind Seattle, owner) </span></p><span data-dcnode-id="452" instrument_node="">
</span><p data-dcnode-id="447"><span data-dcnode-id="451" instrument_node="">Dr. Standish and her team are currently recruiting for the AIMS Cancer Outcomes Study. To learn more about this study, </span><a data-dcnode-id="449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aimsinstitute.net/acos/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="450" instrument_node="">click here</span></a><span data-dcnode-id="448" instrument_node="">.   </span></p><span data-dcnode-id="446" instrument_node="">
