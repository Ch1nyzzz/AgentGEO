</span><h2 class="section__heading" data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">Integrative Oncology Partners</span></h2><span data-dcnode-id="848" instrument_node="">
</span><div class="clearfix section__flex section__flex--center" data-dcnode-id="609"><span data-dcnode-id="847" instrument_node="">
</span><div class="accordion left aos-init" data-aos="fade" data-dcnode-id="658"><span data-dcnode-id="846" instrument_node="">
</span><div class="accordion__item active" data-dcnode-id="826" id="about-section"><span data-dcnode-id="845" instrument_node="">
</span><div class="clearfix accordion__header o-track__about-main" data-dcnode-id="837"><span data-dcnode-id="844" instrument_node="">
</span><h3 data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">About</span></h3><span data-dcnode-id="841" instrument_node="">
</span><span class="accordion__icon" data-dcnode-id="839"><i class="fa fa-chevron-up" data-dcnode-id="840"></i></span><span data-dcnode-id="838" instrument_node="">
</span></div><span data-dcnode-id="836" instrument_node="">
</span><div class="accordion__body" data-dcnode-id="828" style="display: block;"><span data-dcnode-id="835" instrument_node="">
</span><p data-dcnode-id="830"><span data-dcnode-id="834" instrument_node="">
                        The growth of integrative oncology around the world has been driven by patients and stems from the latest cancer research. It is estimated that today, over 80% of cancer patients incorporate various modalities, supportive aids and supplementation into their traditional oncology treatments. The goal is improved health, reduced side effects and improved treatment outcomes. 
                        </span><br data-dcnode-id="833"><br data-dcnode-id="832"><span data-dcnode-id="831" instrument_node="">
                        In 2015 we piloted South Africa’s first integrative oncology programme. The success of the programme, patient demand and the learning resulted in the evolution of an official integrative oncology programme and today our services are available to patients and their oncologists around the country.
                    </span></p><span data-dcnode-id="829" instrument_node="">
</span></div><span data-dcnode-id="827" instrument_node="">
</span></div><span data-dcnode-id="825" instrument_node="">
</span><div class="accordion__item" data-dcnode-id="766" id="benefits"><span data-dcnode-id="824" instrument_node="">
</span><div class="clearfix accordion__header o-track__about-benefits" data-dcnode-id="816"><span data-dcnode-id="823" instrument_node="">
</span><h3 data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Benefits</span></h3><span data-dcnode-id="820" instrument_node="">
</span><span class="accordion__icon" data-dcnode-id="818"><i class="fa fa-chevron-down" data-dcnode-id="819"></i></span><span data-dcnode-id="817" instrument_node="">
</span></div><span data-dcnode-id="815" instrument_node="">
</span><div class="accordion__body" data-dcnode-id="768"><span data-dcnode-id="814" instrument_node="">
</span><p data-dcnode-id="809"><span data-dcnode-id="813" instrument_node="">
                        Patients have access to a professional team which supports them using an integrative approach throughout their treatment journey. Our purpose is to keep patients healthy, safe and to remove the stress and guess work. It is important to note we are not oncologists, we are a supportive team working with oncologists, allowing them to focus on their core treatment. We work hand-in-hand.
                        </span><br data-dcnode-id="812"><br data-dcnode-id="811"><span data-dcnode-id="810" instrument_node="">
</span></p><span data-dcnode-id="808" instrument_node="">
</span><div class="accordion__body--cols clearfix" data-dcnode-id="770"><span data-dcnode-id="807" instrument_node="">
</span><div class="col" data-dcnode-id="790"><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="792"><strong data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">We cover</span></strong><span data-dcnode-id="803" instrument_node="">
</span><br data-dcnode-id="802"><span data-dcnode-id="801" instrument_node="">
                                Nutrition 
                                </span><br data-dcnode-id="800"><span data-dcnode-id="799" instrument_node="">
                                Supplementation
                                </span><br data-dcnode-id="798"><span data-dcnode-id="797" instrument_node="">
                                Lifestyle
                                </span><br data-dcnode-id="796"><span data-dcnode-id="795" instrument_node="">
</span><br data-dcnode-id="794"><span data-dcnode-id="793" instrument_node="">
</span></p><span data-dcnode-id="791" instrument_node="">
</span></div><span data-dcnode-id="789" instrument_node="">
</span><div class="col" data-dcnode-id="772"><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="774"><strong data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">We offer</span></strong><span data-dcnode-id="785" instrument_node="">
</span><br data-dcnode-id="784"><span data-dcnode-id="783" instrument_node="">
                                Personalised and tailored advice 
                                </span><br data-dcnode-id="782"><span data-dcnode-id="781" instrument_node="">
                                Simple to use and access 
                                </span><br data-dcnode-id="780"><span data-dcnode-id="779" instrument_node="">
                                A single solution
                                </span><br data-dcnode-id="778"><span data-dcnode-id="777" instrument_node="">
</span><br data-dcnode-id="776"><span data-dcnode-id="775" instrument_node="">

</span><h3 data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">How it works</span></h3><span data-dcnode-id="760" instrument_node="">
</span><span class="accordion__icon" data-dcnode-id="758"><i class="fa fa-chevron-down" data-dcnode-id="759"></i></span><span data-dcnode-id="757" instrument_node="">
</span></div><span data-dcnode-id="755" instrument_node="">
</span><div class="accordion__body" data-dcnode-id="718"><span data-dcnode-id="754" instrument_node="">
</span><ul data-dcnode-id="740"><span data-dcnode-id="753" instrument_node="">
</span><li data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Step 1: A professional refers you to the programme, or you make direct contact.</span></li><span data-dcnode-id="750" instrument_node="">
</span><li data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Step 2: You complete a digital questionnaire that provides the background. This takes 5 – 10min.</span></li><span data-dcnode-id="747" instrument_node="">
</span><li data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Step 3: We set up your first consultation. Either in person or digitally.</span></li><span data-dcnode-id="744" instrument_node="">
</span><li data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Step 4: The consultation results in personalised advice for you to follow.</span></li><span data-dcnode-id="741" instrument_node="">
</span></ul><span data-dcnode-id="739" instrument_node="">
</span><br data-dcnode-id="738"><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="736" instrument_node="">
</span><strong data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Important to note</span></strong><span data-dcnode-id="733" instrument_node="">
</span></p><span data-dcnode-id="731" instrument_node="">
</span><ol data-dcnode-id="720"><span data-dcnode-id="730" instrument_node="">
</span><li data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">This is not a once-off. You can set up further consultations and communicate with us at any time. We are here to support you all the way!</span></li><span data-dcnode-id="727" instrument_node="">
</span><li data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">A healthcare professional will be allocated to you who will have access to the resources of an entire team.</span></li><span data-dcnode-id="724" instrument_node="">
</span><li data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">There is no direct cost or obligation. The programme is fully funded by Coyne Healthcare.</span></li><span data-dcnode-id="721" instrument_node="">
</span></ol><span data-dcnode-id="719" instrument_node="">
</span></div><span data-dcnode-id="717" instrument_node="">
</span></div><span data-dcnode-id="715" instrument_node="">
</span><div class="accordion__item" data-dcnode-id="660" id="areas-of-expertise"><span data-dcnode-id="714" instrument_node="">
</span><div class="clearfix accordion__header o-track__about-expertise" data-dcnode-id="706"><span data-dcnode-id="713" instrument_node="">
</span><h3 data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Our areas of expertise</span></h3><span data-dcnode-id="710" instrument_node="">
</span><span class="accordion__icon" data-dcnode-id="708"><i class="fa fa-chevron-down" data-dcnode-id="709"></i></span><span data-dcnode-id="707" instrument_node="">
</span></div><span data-dcnode-id="705" instrument_node="">
</span><div class="accordion__body" data-dcnode-id="662"><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="664"><span data-dcnode-id="703" instrument_node="">
</span><strong data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Nutrition</span></strong><span data-dcnode-id="700" instrument_node="">
</span><br data-dcnode-id="699"><span data-dcnode-id="698" instrument_node="">
                        The link between what we put in our mouths and our health is undeniable. We provide guidance on how and what to eat.
                        </span><br data-dcnode-id="697"><br data-dcnode-id="696"><span data-dcnode-id="695" instrument_node="">
</span><strong data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Vitamins and Minerals</span></strong><span data-dcnode-id="692" instrument_node="">
</span><br data-dcnode-id="691"><span data-dcnode-id="690" instrument_node="">
                        Cancer patients often have multiple deficiencies, all of which directly affect their treatment and well-being. Vitamins and minerals are often depleted through treatment or the cancer itself. We identify deficiencies and assist in correcting these. 
                        </span><br data-dcnode-id="689"><br data-dcnode-id="688"><span data-dcnode-id="687" instrument_node="">
</span><strong data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Phytotherapy</span></strong><span data-dcnode-id="684" instrument_node="">
</span><br data-dcnode-id="683"><span data-dcnode-id="682" instrument_node="">
                        Cancer patients are increasingly using plant-based medicines. This is understandable considering up to 50% of cancer drugs approved over the last 30 years are either directly or indirectly sourced from natural products. 
                        </span><br data-dcnode-id="681"><br data-dcnode-id="680"><span data-dcnode-id="679" instrument_node="">
                        Today, patients commonly use substances such as turmeric or curcumin, cannabis, green tea, various extracts or whole plants as a part of their treatment and to maintain health. 
                        </span><br data-dcnode-id="678"><br data-dcnode-id="677"><span data-dcnode-id="676" instrument_node="">
                        It is important to know how to use these substances and whether any of them are in fact counterproductive to treatment or contra-indicated. We provide guidance in this respect, ensuring patients remain safe and on the right track. 
                        </span><br data-dcnode-id="675"><br data-dcnode-id="674"><span data-dcnode-id="673" instrument_node="">
</span><strong data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Lifestyle</span></strong><span data-dcnode-id="670" instrument_node="">
</span><br data-dcnode-id="669"><span data-dcnode-id="668" instrument_node="">
                        Cancer requires lifestyle changes including obvious action such as reduced exposure to carcinogens and smoking or more subtle changes like improved sleep or reduced stress. 
                        </span><br data-dcnode-id="667"><br data-dcnode-id="666"><span data-dcnode-id="665" instrument_node="">
                        We identify lifestyle changes to help improve patients’short-term and long-term health.
                    </span></p><span data-dcnode-id="663" instrument_node="">
</span></div><span data-dcnode-id="661" instrument_node="">
</span></div><span data-dcnode-id="659" instrument_node="">

</span><h3 data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">CANCER TODAY</span></h3><span data-dcnode-id="539" instrument_node="">
</span><p data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">
                    There is a shift in understanding the body as a whole and the role played by nutrition...
                </span></p><span data-dcnode-id="536" instrument_node="">
</span><span class="services__readmore" data-dcnode-id="529"><span data-dcnode-id="535" instrument_node="">
</span><a data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Learn More</span></a><span data-dcnode-id="532" instrument_node="">
</span><span data-dcnode-id="530" instrument_node="">
</span></span><span data-dcnode-id="528" instrument_node="">
</span><div class="services__content" data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">
                    Cancer needs no introduction. As long as cancer has been a part of our lives, researchers and clinicians have sought to find effective treatment regimens to assist those affected. Cancer today has far greater outcomes than ever before. There is a shift in understanding the body as a whole and the role played by nutrition, lifestyle, emotional well-being and other key contributors -- all of which affect our state of health and ability to heal.
                </span></div><span data-dcnode-id="525" instrument_node="">
</span></div><span data-dcnode-id="523" instrument_node="">
</span><div class="services__item o-track__solution-treatment" data-dcnode-id="499"><span data-dcnode-id="522" instrument_node="">

</span><h3 data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">TREATMENT</span></h3><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Treatment is no longer one dimensional. A growing body of evidence indicates that a combined approach...
                </span></p><span data-dcnode-id="511" instrument_node="">
</span><span class="services__readmore" data-dcnode-id="504"><span data-dcnode-id="510" instrument_node="">
</span><a data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Learn More</span></a><span data-dcnode-id="507" instrument_node="">
</span><span data-dcnode-id="505" instrument_node="">
</span></span><span data-dcnode-id="503" instrument_node="">
</span><div class="services__content" data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">
                    Treatment is no longer one dimensional. A growing body of evidence indicates that a combined approach to cancer treatment, utilizing conventional methods as well as specialized integrative therapy, provides the best possible outcomes for cancer patients. Conventional treatment by an oncologist utilises the latest scientifically researched allopathic medicine such as chemotherapy, radiotherapy, immunotherapy and surgery. Oncologists spend many years of study and practice to specialise in these treatments. They are able to provide the best possible treatment conventional medicine and science has to offer.
                </span></div><span data-dcnode-id="500" instrument_node="">

</span></span><span data-dcnode-id="478" instrument_node="">
</span><div class="services__content" data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">
                    Patients use many additional therapies and forms of medicine including nutrition or dietary changes, lifestyle management, phytotherapy nutraceuticals, exercise and emotional counselling. The challenge, however, with respect to non-conventional treatment, is that while there are many beneficial approaches, products and protocols, there are as many which are counterproductive or offer very little benefit. It makes sense to work with experts in these fields who are professionally trained and able to provide tailored advice for the individual.
                </span></div><span data-dcnode-id="475" instrument_node="">
</span></div><span data-dcnode-id="473" instrument_node="">
</span><div class="services__item o-track__solution-approach" data-dcnode-id="449"><span data-dcnode-id="472" instrument_node="">
</span><div class="services__icon" data-dcnode-id="468"><span data-dcnode-id="471" instrument_node="">
</span><span class="approach" data-dcnode-id="470"></span><span data-dcnode-id="469" instrument_node="">
</span></div><span data-dcnode-id="467" instrument_node="">
</span><h3 data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">OUR APPROACH</span></h3><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Many patients become overwhelmed by the variety of treatment options as well as the opinions of experts and friends...
                </span></p><span data-dcnode-id="461" instrument_node="">
</span><span class="services__readmore" data-dcnode-id="454"><span data-dcnode-id="460" instrument_node="">
</span><a data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">Learn More</span></a><span data-dcnode-id="457" instrument_node="">
</span><span data-dcnode-id="455" instrument_node="">
</span></span><span data-dcnode-id="453" instrument_node="">
</span><div class="services__content" data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">
                    Many patients become overwhelmed by the variety of treatment options as well as the opinions of experts and friends, making it extremely difficult to choose what is best for them.
                    Integrative oncology combines conventional treatment with other forms of supportive therapy, and clinicians work collectively in the best interest of the specific patient.
                    Successful cancer prevention and treatment requires the most comprehensive approach possible which is integrative oncology.
                </span></div><span data-dcnode-id="450" instrument_node="">
</span></div><span data-dcnode-id="448" instrument_node="">
</span></div><span data-dcnode-id="446" instrument_node="">
</span></div><span data-dcnode-id="444" instrument_node="">
</span></div><span data-dcnode-id="442" instrument_node="">
</span></section><span data-dcnode-id="440" instrument_node=""> </span><section class="section__founder aos-init" data-aos="fade" data-aos-offset="0" data-dcnode-id="386"><span data-dcnode-id="439" instrument_node="">
</span><div class="founder" data-dcnode-id="388"><span data-dcnode-id="438" instrument_node="">
</span><div class="founder__image clearfix" data-dcnode-id="390"><span data-dcnode-id="437" instrument_node="">
</span><img alt="Integrative Oncology Founder" class="founder__img" data-dcnode-id="436" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.integrativeoncology.co.za/images/founder-img.jpg&amp;raw"><span data-dcnode-id="435" instrument_node="">
</span><div class="founder__active-state" data-dcnode-id="415" style="opacity: 0; transform: matrix(1, 0, 0, 1, -500, 0);"><span data-dcnode-id="434" instrument_node="">
</span><div class="founder__name" data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">
                    Kevin Coyne - Founder
                </span></div><span data-dcnode-id="431" instrument_node="">
</span><div class="founder__full" data-dcnode-id="417"><span data-dcnode-id="430" instrument_node="">
</span><p data-dcnode-id="422"><span data-dcnode-id="429" instrument_node="">
</span><strong data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Like you</span></strong><span data-dcnode-id="426" instrument_node="">, cancer has personally touched my life. My mother, Kay, was diagnosed with ovarian cancer in October 2006. Fortunately, my career is focussed on nutrition and healthcare and we were able to access not only the best oncological care but also the best in complementary therapy. Once the correct integrated approach was introduced, my mother’s health improved dramatically. After experiencing the turnaround in my own family, I was inspired to make available the same options to those seeking an integrative approach to treatment. Our integrative oncology programme was born in 2015 with the purpose of delivering a professional, safe and ethical solution to integrative oncology treatment. Coyne Healthcare is connected to an international and local network of healthcare professionals specialising in nutrition, integrative medicine, phytotherapy and nutraceuticals. 
                        </span><br data-dcnode-id="425"><br data-dcnode-id="424"><span data-dcnode-id="423" instrument_node="">
                        We provide access to the best collaborative and complementary team, removing the stress and pressure from searching for answers. We work alongside oncologists, allowing them to focus on their area of expertise and complementing their treatment. We are able to guide you, ensuring you have access to the necessary tools to get you into the best possible state of health and to achieve the best possible outcome for your treatment.
                    </span></p><span data-dcnode-id="421" instrument_node="">
</span><a class="founder__close" data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">Close Story</span></a><span data-dcnode-id="418" instrument_node="">
</span></div><span data-dcnode-id="416" instrument_node="">
</span></div><span data-dcnode-id="414" instrument_node="">
</span><div class="founder__blur" data-dcnode-id="413"></div><span data-dcnode-id="412" instrument_node="">
</span><div class="founder__content right" data-dcnode-id="392"><span data-dcnode-id="411" instrument_node="">
</span><div class="founder__quote" data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">
                    This precipitated the birth of our company in 2013 and a passion and commitment to serving cancer patients
                </span></div><span data-dcnode-id="408" instrument_node="">
</span><div class="founder__summary" data-dcnode-id="400"><span data-dcnode-id="407" instrument_node="">
</span><p data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">
                        “The personal need arose for me after experiencing first-hand the challenges cancer patients and their care-givers faced when my mother became a patient herself. I was fortunate to have the resources I did
                        and a background in healthcare. This afforded my mom and my family a privilege and outcome I wish to share with others going through the same experience”
                    </span></p><span data-dcnode-id="404" instrument_node="">
</span><a class="founder__readmore" data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Full Story</span></a><span data-dcnode-id="401" instrument_node="">

</span><h2 data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">What is Integrative Oncology?</span></h2><span data-dcnode-id="378" instrument_node="">
</span><p data-dcnode-id="370"><span data-dcnode-id="377" instrument_node="">
                    Integrative medicine is a philosophy based on treating patients by focusing on the whole person and using both conventional and complementary therapies in a multidisciplinary approach. There is open communication between practitioners and the various modalities and traditions. 
                    </span><br data-dcnode-id="376"><br data-dcnode-id="375"><span data-dcnode-id="374" instrument_node="">
                    An integrative approach to cancer treatment has grown so extensively that today it’s estimated over 80% of cancer patients use complementary and integrative treatment along with conventional therapy. This growth has been driven by patients who want to overcome cancer with greater success, reduce negative side effects and improve overall health. Today, there is also a far greater understanding of how lifestyle choices and nutrition impact on health and cancer. 
                    </span><br data-dcnode-id="373"><br data-dcnode-id="372"><span data-dcnode-id="371" instrument_node="">
                    Our integrative oncology programme offers patients access to a professional team which guides them through their cancer journey. We work alongside oncologists, focussing on conventional treatment andensuring there are no contraindications and that the patient's overall health is well managed. We focus primarily on nutrition, supportive supplementation, lifestyle modification and emotional well-being.
                </span></p><span data-dcnode-id="369" instrument_node="">
</span></div><span data-dcnode-id="367" instrument_node="">
