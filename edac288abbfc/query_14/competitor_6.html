</span><noscript data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">&lt;img src="https://images.squarespace-cdn.com/content/v1/6034b812404e83020b69757d/1615235691504-CSSLMSBJPTGN91JH63IQ/CatherineZollman.jpg" alt="CatherineZollman.jpg" /&gt;</span></noscript><img alt="CatherineZollman.jpg" class="thumb-image loaded" data-dcnode-id="226" data-image="https://images.squarespace-cdn.com/content/v1/6034b812404e83020b69757d/1615235691504-CSSLMSBJPTGN91JH63IQ/CatherineZollman.jpg" data-image-dimensions="1802x2048" data-image-focal-point="0.5,0.5" data-image-id="60468a6b20d1a4422d5f4c12" data-image-resolution="500w" data-load="false" data-src="https://images.squarespace-cdn.com/content/v1/6034b812404e83020b69757d/1615235691504-CSSLMSBJPTGN91JH63IQ/CatherineZollman.jpg" data-type="image" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.squarespace-cdn.com/content/v1/6034b812404e83020b69757d/1615235691504-CSSLMSBJPTGN91JH63IQ/CatherineZollman.jpg%3Fformat%3D500w&amp;raw" style="left: 0%; top: -0.00140978%; width: 100%; height: 100.003%; position: absolute;"><span data-dcnode-id="225" instrument_node="">

<span data-dcnode-id="202" instrument_node="">For many years Dr Zollman&nbsp;was a Trustee of the British Holistic Medical Association. She is a Council Member of the College of Medicine and is on the Steering Committee of the British Society of Integrative Oncology. She has a longstanding interest in medical education and in promoting and disseminating good quality research into integrative medical approaches.</span></p><p class="" data-dcnode-id="199" style="white-space:pre-wrap;"><span data-dcnode-id="200" instrument_node="">&nbsp;Dr Zollman&nbsp;believes that all medical encounters are an opportunity to help people learn how to how build their own resilience as a key part of managing their symptoms and improving their health. In 2016 she was shortlisted for Outstanding Achievement in the Bristol Post Heath and Care Awards.</span></p><span data-dcnode-id="198" instrument_node="">
