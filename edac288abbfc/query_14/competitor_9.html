</span><article class="article" data-dcnode-id="1231"><span data-dcnode-id="7352" instrument_node="">
</span><div class="hlFld-Abstract" data-dcnode-id="7341"><a data-dcnode-id="7351" name="abstract" onfocus="hideAuthor();"></a><div class="sectionInfo abstractSectionHeading" data-dcnode-id="7348"><h2 class="sectionHeading" data-dcnode-id="7349"><span data-dcnode-id="7350" instrument_node="">Abstract</span></h2></div><div class="abstractSection abstractInFull" data-dcnode-id="7342"><p data-dcnode-id="7343"><span data-dcnode-id="7347" instrument_node="">Today, more than ever before, millions of people are seeking an approach to medicine and health care that is more comprehensive, more holistic and integrative, and more compassionate and sensitive to their needs as a whole person. This is particularly true for those dealing with cancer. Changing patient demographics, heightened consumer demand for complementary and alternative medicine (CAM) products and services, advances in medical science and technology, expanding access to the Internet and health information, and other factors have contributed to a wave of transformation that is unprecedented in its impact on the entire health care system. These trends have fueled the emerging fields of integrative medicine and oncology, which are growing rapidly. As these fields continue to evolve, they will move beyond the present integrative model to a broader vision of whole-person, multidimensional care that will more fully and coherently address and embrace all dimensions of the human experience. This article describes 6 major driving forces behind the wave of transformation presently under way in medicine and health care. It provides a brief, historical overview of integrative medicine and oncology and summarizes the present status of these emerging fields. It discusses the future of integrative medicine and oncology, including a multidimensional approach to care, and highlights 5 key elements that underlie this approach. Finally, it describes The Seven Levels of Healing</span><i data-dcnode-id="7345"><span data-dcnode-id="7346" instrument_node="">—</span></i><span data-dcnode-id="7344" instrument_node=""> a model of multidimensional care—and concludes with a discussion of 3 important challenges and opportunities for medicine and health care that lie on the horizon.</span></p></div></div><span data-dcnode-id="7340" instrument_node="">
