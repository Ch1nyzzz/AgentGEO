</span><div class="et_pb_text_inner" data-dcnode-id="1496"><h2 data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">What will I learn?</span></h2></div><span data-dcnode-id="1495" instrument_node="">
</span></div><div class="et_pb_module et_pb_text et_pb_text_4 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1479"><span data-dcnode-id="1493" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1481"><p data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">The programme will look at movement during cancer treatment and the importance of staying active. It will also address the role of fasting and gut microbiome modulation for immunotherapy support and how nutrition interventions may play a role in supporting best outcomes.</span></p><span data-dcnode-id="1490" instrument_node="">
</span><p data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">There will be 3 parallel workshops focussing on reducing anxiety and building resilience using integrative approaches; discussing case studies in precision integrative oncology; and the role of supplements during chemotherapy and radiotherapy.</span></p><span data-dcnode-id="1487" instrument_node="">
</span><p data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Speakers will discuss the mechanisms, evidence and clinical practice of incorporating mistletoe into a cancer care plan and the clinical pearls and research in including medical cannabis as part of an integrative approach.</span></p><span data-dcnode-id="1484" instrument_node="">
</span><p data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">Delegates will hear about the importance of yoga and yoga therapy in cancer care, the benefits and safety precautions and hear experts discussing an international perspective on education and driving integration in clinical practice.</span></p></div><span data-dcnode-id="1480" instrument_node="">
</span></div><span data-dcnode-id="1478" instrument_node="">
</span></div><div class="et_pb_column et_pb_column_1_2 et_pb_column_4 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="1435"><span data-dcnode-id="1476" instrument_node="">

</span><div class="et_pb_text_inner" data-dcnode-id="1439"><p data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">Delegates will leave with:</span></p><span data-dcnode-id="1472" instrument_node="">
</span><ul data-dcnode-id="1467"><span data-dcnode-id="1471" instrument_node="">
</span><li data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">An understanding of the science and evidence base underpinning lifestyle and complementary approaches.</span></li><span data-dcnode-id="1468" instrument_node="">
</span></ul><span data-dcnode-id="1466" instrument_node="">
</span><p data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1463" instrument_node="">
</span><ul data-dcnode-id="1458"><span data-dcnode-id="1462" instrument_node="">
</span><li data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Simple, practical tools that you can use in your daily practice to support and activate patients who might benefit from lifestyle changes and increased resilience.</span></li><span data-dcnode-id="1459" instrument_node="">
</span></ul><span data-dcnode-id="1457" instrument_node="">
</span><p data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1454" instrument_node="">
</span><ul data-dcnode-id="1449"><span data-dcnode-id="1453" instrument_node="">
</span><li data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">Information on how and where to refer patients safely and appropriately for further integrative support.</span></li><span data-dcnode-id="1450" instrument_node="">
</span></ul><span data-dcnode-id="1448" instrument_node="">
