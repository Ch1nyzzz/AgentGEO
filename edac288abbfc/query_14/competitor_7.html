</span><p data-dcnode-id="812"><span data-dcnode-id="815" instrument_node="">• Conventional Medicine also referred to as allopathic, Western, or modern medicine;</span><br data-dcnode-id="814"><span data-dcnode-id="813" instrument_node="">
• Alternative Medicine also referred to as natural or holistic medicine.</span></p><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">With regard to cancer, The Center for Advanced Medicine’s integrative approach provides a wider palette of therapies and treatments. It is a necessary step forward in the progression of how we treat a disease which does not respond well to purely conventional or alternative approaches alone.</span></p><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">There are a lot of great aspects of Western medicine, and we focus on the best of conventional medicine. We also embrace the best of a more natural approach. The Center for Advanced Medicine combines those for each patient, individually. That’s really what integrative means — the best of both worlds’ approach where we’re integrating both conventional and natural medicine.</span></p><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">What integrative oncology seeks to do is pick up where conventional oncology leaves off, and improve it greatly by incorporating evidence-based therapies from the natural and alternative realms. The value lies in offering a best-of-both-worlds approach to treating cancer.</span></p><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">The Center for Advanced Medicine does this by utilizing treatments which are within the standard of care, as well as many which are not necessarily within those standards but have shown some level of promise against cancer.</span></p><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">We do not — and must not — abandon evidence-based medicine, but we are willing to evaluate that evidence through a different lens.</span></p><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">The general principle behind integrative oncology is that we take the best aspects of modern medicine and the best aspects of natural medicine, and we combine these two philosophies in a strategic way so that the treatment protocol is personalized for each patient. We do not reject any treatment unless we feel that the potential harms outweigh the potential benefits.</span></p><span data-dcnode-id="793" instrument_node="">
</span><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Unfortunately, this reasonable approach is not common in cancer treatment today. Providers on both “sides” tend to embrace one philosophy while completely rejecting the other. This is neither evidence-based nor is it fair to patients who are, many times, desperate for a comprehensive treatment program which addresses their treatment goals.</span></p></div><span data-dcnode-id="789" instrument_node="">
</span></div><span data-dcnode-id="787" instrument_node=""> </span><span data-dcnode-id="785" instrument_node="">
</span></div><span data-dcnode-id="783" instrument_node=""> </span><span data-dcnode-id="781" instrument_node="">
</span></div><span data-dcnode-id="779" instrument_node=""> </span><div class="et_pb_row et_pb_row_1" data-dcnode-id="720"><span data-dcnode-id="777" instrument_node="">
</span><div class="et_pb_column et_pb_column_1_2 et_pb_column_1 et_pb_css_mix_blend_mode_passthrough" data-dcnode-id="749"><span data-dcnode-id="776" instrument_node="">
</span><div class="et_pb_module et_pb_image et_pb_image_0" data-dcnode-id="771"><span data-dcnode-id="775" instrument_node="">
</span><span class="et_pb_image_wrap" data-dcnode-id="773"><img alt="" class="wp-image-25015" data-dcnode-id="774" height="auto" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tcfam.com/wp-content/uploads/2018/09/Cancer-Stats-600x450.jpg&amp;raw" srcset="https://tcfam.com/wp-content/uploads/2018/09/Cancer-Stats-600x450.jpg 600w, https://tcfam.com/wp-content/uploads/2018/09/Cancer-Stats-600x450-300x225.jpg 300w, https://tcfam.com/wp-content/uploads/2018/09/Cancer-Stats-600x450-510x382.jpg 510w" title="" width="auto"></span><span data-dcnode-id="772" instrument_node="">
</span></div><div class="et_pb_module et_pb_text et_pb_text_1 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="753"><span data-dcnode-id="770" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="755"><h3 data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Sobering facts about cancer</span></h3><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">• Cancer is quickly becoming the number one killer of people in developed countries, overtaking heart disease.</span></p><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">• The lifetime risk for any person developing cancer has increased dramatically; today, the risk is nearly 1 out of 2.</span></p><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">• Despite billions of dollars spent to find a cure, the death rate from cancer has not significantly improved.</span></p><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Something must be done to address this …</span></p></div><span data-dcnode-id="754" instrument_node="">
</span></div><span data-dcnode-id="752" instrument_node=""> </span><span data-dcnode-id="750" instrument_node="">
</span></div><span data-dcnode-id="748" instrument_node=""> </span><div class="et_pb_column et_pb_column_1_2 et_pb_column_2 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="724"><span data-dcnode-id="746" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_2 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="728"><span data-dcnode-id="745" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="730"><h2 data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Problems with the Current Standard of Care</span></h2><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">As it stands today, we know more about cancer than ever before in history. We have made tremendous strides in the field of radiology, in the development of new chemotherapy and immunotherapy drugs, and in the precision with which we perform surgical procedures. The standards of care today are evidenced-based with an overwhelming amount of good science and rigorous studies to back up their use.</span></p><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">However, this does not mean that the way that we treat cancer is not without its shortcomings. Particularly, in light of the disappointing statistics, we realize that for all of our research and knowledge, we still are not winning the war on cancer. In fact, we are losing badly.</span></p><span data-dcnode-id="736" instrument_node="">
</span><p data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">As it turns out, there is still plenty we do not know, and we stand to learn a lot. While conventional oncology today does all it can within its purview, there is more that can be done. It is my sincere belief, based on my training and clinical practice, that we can do far better.</span></p><span data-dcnode-id="733" instrument_node="">
</span><p data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">To start with, it is helpful to know what the process looks like for someone who is diagnosed with cancer.</span></p></div><span data-dcnode-id="729" instrument_node="">
</span></div><span data-dcnode-id="727" instrument_node=""> </span><span data-dcnode-id="725" instrument_node="">
</span></div><span data-dcnode-id="723" instrument_node=""> </span><span data-dcnode-id="721" instrument_node="">
</span></div><span data-dcnode-id="719" instrument_node=""> </span><div class="et_pb_row et_pb_row_2" data-dcnode-id="687"><span data-dcnode-id="717" instrument_node="">
</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_3 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="691"><span data-dcnode-id="716" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_3 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="695"><span data-dcnode-id="715" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="697"><p data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">If you are a woman, and you feel a lump in your breast, you will hopefully have either your OB-GYN, family doctor or internist examine the lump. Your doctor will likely order a mammogram and an ultrasound, and if it still looks suspicious, you will typically have a biopsy to confirm cancer.</span></p><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">If the biopsy is positive, your doctor will refer you to a medical oncologist and a surgical oncologist. You might also be referred to a radiation oncologist. The order of referral might vary some degree. Sometimes, the medical oncologist will coordinate both surgery and radiation consults.</span></p><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Often, the process between diagnosis and treatment moves very quickly. Following their first trip to a medical oncologist, many patients are scheduled to begin treatment within a few days. This haste is large because the protocols for cancer treatment are well established within conventional oncology. For example, if you have a certain type of breast cancer, and it is at a specific stage, there is what is known as a first-line treatment. This will include treatments that are known to work best for this specific kind of cancer at this stage. If that series of treatments are unsuccessful, your oncologist will likely recommend second-line treatments, which entails a different combination also thought to have efficacy against your particular cancer.</span></p><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">This can be thought of as “flow chart” medicine, or “cookbook” medicine. It is very much a one-size-fits-all approach to treating cancer. There is a general lack of personalization or tailoring of treatment to each patient. This may be an efficient way of treating cancer if your intent is to treat as many patients as possible, but it certainly generalizes the entire patient population and makes assumptions about commonalities between patients.</span></p><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Your cancer is as unique as your fingerprint. No one else’s is exactly like yours. And that’s a big shift from what a lot of people are getting from their oncologist in terms of this is your diagnosis and this is your treatment, and they look around the room and everyone else with their diagnosis is getting the exact same treatment.</span></p><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">As a result of this individuality, each case comes with its own share of hurdles and challenges. By denying this individuality, conventional oncology probably affects many of its outcomes negatively. This is not to say that conventional oncology does not receive good outcomes, necessarily. However, we have learned that by tailoring treatment to the individual patient, you are able to target cancer in a way that most effectively treats it, minimize collateral damage, and give the best chance at a good outcome.</span></p></div><span data-dcnode-id="696" instrument_node="">
</span></div><span data-dcnode-id="694" instrument_node=""> </span><span data-dcnode-id="692" instrument_node="">
</span></div><span data-dcnode-id="690" instrument_node=""> </span><span data-dcnode-id="688" instrument_node="">
</span></div><span data-dcnode-id="686" instrument_node=""> </span><span data-dcnode-id="684" instrument_node="">
</span></div><span data-dcnode-id="682" instrument_node=""> </span><div class="et_pb_section et_pb_section_1 et_pb_with_background et_pb_fullwidth_section et_section_regular" data-dcnode-id="652"><span data-dcnode-id="680" instrument_node="">
</span><section class="et_pb_module et_pb_fullwidth_header et_pb_fullwidth_header_0 et_pb_section_parallax et_pb_text_align_center et_pb_bg_layout_dark" data-dcnode-id="654"><span data-dcnode-id="679" instrument_node="">
</span><span class="et_parallax_bg_wrap" data-dcnode-id="677"><span class="et_parallax_bg" data-dcnode-id="678" style="background-image: url(&quot;https://tcfam.com/wp-content/uploads/2018/09/Oncologist-1600x1000.jpg&quot;); height: 2151.2px; transform: translate(0px, 584.1px);"></span></span><span data-dcnode-id="676" instrument_node="">
</span><div class="et_pb_fullwidth_header_container center" data-dcnode-id="660"><span data-dcnode-id="675" instrument_node="">
</span><div class="header-content-container center" data-dcnode-id="662"><span data-dcnode-id="674" instrument_node="">
</span><div class="header-content" data-dcnode-id="664"><span data-dcnode-id="673" instrument_node="">
</span><h1 class="et_pb_module_header" data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">'Looking through a periscope'</span></h1><span data-dcnode-id="670" instrument_node="">
</span><span class="et_pb_fullwidth_header_subhead" data-dcnode-id="668"><span data-dcnode-id="669" instrument_node=""> evaluating evidence through a different lens</span></span><span data-dcnode-id="667" instrument_node="">
</span><div class="et_pb_header_content_wrapper" data-dcnode-id="666"></div><span data-dcnode-id="665" instrument_node="">
</span></div><span data-dcnode-id="663" instrument_node="">
</span></div><span data-dcnode-id="661" instrument_node="">
</span></div><span data-dcnode-id="659" instrument_node="">
</span><div class="et_pb_fullwidth_header_overlay" data-dcnode-id="658"></div><span data-dcnode-id="657" instrument_node="">
</span><div class="et_pb_fullwidth_header_scroll" data-dcnode-id="656"></div><span data-dcnode-id="655" instrument_node="">
</span></section><span data-dcnode-id="653" instrument_node="">
</span></div><span data-dcnode-id="651" instrument_node=""> </span><div class="et_pb_section et_pb_section_2 et_section_regular" data-dcnode-id="578"><span data-dcnode-id="649" instrument_node="">
</span><div class="et_pb_row et_pb_row_3" data-dcnode-id="582"><span data-dcnode-id="648" instrument_node="">
</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_4 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="586"><span data-dcnode-id="647" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_4 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="590"><span data-dcnode-id="646" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="592"><h2 data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">What You Will and Will Not Hear From Your Oncologist</span></h2><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">In the short period of time between diagnosis and the start of treatment, there are a few things that you likely will hear from your oncologist:</span></p><span data-dcnode-id="640" instrument_node="">
</span><ul data-dcnode-id="623"><span data-dcnode-id="639" instrument_node="">
</span><li data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Discuss prognosis and chances of success based on existing data.</span></li><span data-dcnode-id="636" instrument_node="">
</span><li data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">Surgery, if you are thought to be a good candidate.</span></li><span data-dcnode-id="633" instrument_node="">
</span><li data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">The best course of chemotherapy, what side effects to be prepared for, and how to best mitigate them.</span></li><span data-dcnode-id="630" instrument_node="">
</span><li data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Often, your oncologist will go ahead and write prescriptions for drugs that help with the side effects of chemotherapy and/or immunotherapy, such as nausea, vomiting, diarrhea, and fatigue.</span></li><span data-dcnode-id="627" instrument_node="">
</span><li data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">If radiation is appropriate, that will be discussed as well. You will get referrals and a schedule for upcoming treatments within this standard of care.</span></li><span data-dcnode-id="624" instrument_node="">
</span></ul><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="617"><span data-dcnode-id="621" instrument_node="">What you will most certainly </span><em data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">not</span></em><span data-dcnode-id="618" instrument_node=""> hear about is anything related to nutrition, supplementation, exercise, stress reduction, or any other natural or alternative therapies. At the most, your oncologist might ask you about the supplements you are taking, if any, for fear of them interfering with the chemotherapy treatment or other prescription drugs.</span></p><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">As far as diet is concerned, no nutritional information is typically offered by conventional oncology. In fact, if you ask your oncologist about diet, most will tell you that it does not matter what you eat, at least as far as your treatment is concerned.</span></p><span data-dcnode-id="613" instrument_node="">
</span><p data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">This is inexcusable for any physician who claims to practice evidence-based medicine! At most, you will get warnings about losing too much weight during treatment. Anything in addition to that, in terms of diet, is ignored.</span></p><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Sometimes, an oncologist will refer patients to a nutritionist. Sadly, much of the advice issued by nutritionists is fairly poor, particularly when it comes to a diet that would potentially help fight against cancer.</span></p><span data-dcnode-id="607" instrument_node="">
</span><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">The fact that we do not have randomized, double-blind, placebo-controlled studies on the efficacy of diet is frustrating, simply because there is some good evidence that diet and nutrition play a key role in cancer treatment.</span></p><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">However, it serves to underscore perhaps one of the biggest flaws in conventional oncology: many in the field possess an inability to accept anything that has not been taught to them as the standard of care.</span></p><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Moreover, most will not even entertain the notion that other modalities might be beneficial in some regard — all while watching many of their patients die. We are still left not knowing what we do not know. It is a scary thought to reflect on what we do not know when it comes to optimal cancer treatment.</span></p><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">What we know for a fact — including chemotherapy, radiation, immunotherapy, and surgery, for example — we know very well. We know how they work, and in many cases, how well they are likely to work. But we are clearly missing something, as evidenced by the lack of significant progress in treatment outcomes.</span></p><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">In presentations, I often describe the typical approach to cancer treatment as looking through a periscope. We can see a lot when we look through a periscope — far more than if we only look underwater. But the fact remains that we certainly cannot see everything. The danger lies in assuming that what we see through the periscope is all that exists.</span></p></div><span data-dcnode-id="591" instrument_node="">
</span></div><span data-dcnode-id="589" instrument_node=""> </span><span data-dcnode-id="587" instrument_node="">
</span></div><span data-dcnode-id="585" instrument_node=""> </span><span data-dcnode-id="583" instrument_node="">
</span></div><span data-dcnode-id="581" instrument_node=""> </span><span data-dcnode-id="579" instrument_node="">
</span></div><span data-dcnode-id="577" instrument_node=""> </span><div class="et_pb_section et_pb_section_3 et_pb_with_background et_pb_fullwidth_section et_section_regular" data-dcnode-id="547"><span data-dcnode-id="575" instrument_node="">
</span><section class="et_pb_module et_pb_fullwidth_header et_pb_fullwidth_header_1 et_pb_section_parallax et_pb_text_align_center et_pb_bg_layout_dark" data-dcnode-id="549"><span data-dcnode-id="574" instrument_node="">
</span><span class="et_parallax_bg_wrap" data-dcnode-id="572"><span class="et_parallax_bg" data-dcnode-id="573" style="background-image: url(&quot;https://tcfam.com/wp-content/uploads/2018/09/Plant-Based-Diet.jpg&quot;); height: 2137.2px; transform: translate(0px, 19.5px);"></span></span><span data-dcnode-id="571" instrument_node="">
</span><div class="et_pb_fullwidth_header_container center" data-dcnode-id="555"><span data-dcnode-id="570" instrument_node="">
</span><div class="header-content-container center" data-dcnode-id="557"><span data-dcnode-id="569" instrument_node="">
</span><div class="header-content" data-dcnode-id="559"><span data-dcnode-id="568" instrument_node="">
</span><h1 class="et_pb_module_header" data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Therapies for a Foundation</span></h1><span data-dcnode-id="565" instrument_node="">
</span><span class="et_pb_fullwidth_header_subhead" data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">holistic approach — treating the whole person, the whole body</span></span><span data-dcnode-id="562" instrument_node="">
</span><div class="et_pb_header_content_wrapper" data-dcnode-id="561"></div><span data-dcnode-id="560" instrument_node="">
</span></div><span data-dcnode-id="558" instrument_node="">
</span></div><span data-dcnode-id="556" instrument_node="">
</span></div><span data-dcnode-id="554" instrument_node="">
</span><div class="et_pb_fullwidth_header_overlay" data-dcnode-id="553"></div><span data-dcnode-id="552" instrument_node="">
</span><div class="et_pb_fullwidth_header_scroll" data-dcnode-id="551"></div><span data-dcnode-id="550" instrument_node="">
</span></section><span data-dcnode-id="548" instrument_node="">
</span></div><span data-dcnode-id="546" instrument_node=""> </span><div class="et_pb_section et_pb_section_4 et_section_regular" data-dcnode-id="449"><span data-dcnode-id="544" instrument_node="">
</span><div class="et_pb_row et_pb_row_4" data-dcnode-id="453"><span data-dcnode-id="543" instrument_node="">
</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_5 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="457"><span data-dcnode-id="542" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_5 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="461"><span data-dcnode-id="541" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="463"><h2 data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Similarities between Conventional and Integrative Oncology</span></h2><span data-dcnode-id="538" instrument_node="">
</span><p data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">In the interest of taking a best-of-both-worlds approach, integrative oncology incorporates many of the same diagnostic and treatment tools as does conventional oncology. Diagnostically, we really do not change anything. Patients still need to have appropriate biopsies. We embrace biopsies and conventional lab testing such as tumor markers (for example, CA 15-3, CA 19-9, CA 27.29, CA 125, CEA, AFP, etc.).</span></p><span data-dcnode-id="535" instrument_node="">
</span><p data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Appropriate imaging, such as PET scans, CT scans, MRIs, and X-rays, is important as well. Getting a proper diagnosis of cancer is a critical first step in treating cancer, and having all of the pertinent information using as many tools as possible is critical to know what we are dealing with. It makes no sense going into battle without specific information as to who our foe is.</span></p><span data-dcnode-id="532" instrument_node="">
</span><p data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Once a proper diagnosis of cancer is made, including its stage, we begin to discuss treatment options. In my integrative oncology practice, we still use chemotherapy, although we use it in a way which I believe is more targeted and safer. We also embrace tools such as radiation and surgery, when indicated.</span></p><span data-dcnode-id="529" instrument_node="">
</span><p data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">It is important for people — particularly those who are more natural-minded — to remember that these are tested and proven methods for dealing with cancer. It makes little sense to abandon these therapies simply because they are not ideal or perfect, especially when dealing with a complex and aggressive disease such as cancer.</span></p><span data-dcnode-id="526" instrument_node="">
</span><p data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Surgery, in particular, is often a critical first step in treating cancer. Many patients come into our office having avoided surgery, even after a diagnosis of cancer, sometimes years prior. Many of these cases had remarkably good prognoses at the time of diagnosis and still would be it not for patients delaying surgery indefinitely.</span></p><span data-dcnode-id="523" instrument_node="">
</span><p data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">Many people simply do not want to have surgery, for a variety of reasons including a fear of anesthesia, concerns over an infection, and the belief that surgery spreads cancer.</span></p><span data-dcnode-id="520" instrument_node="">
</span><p data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">Simply put, if a patient is a good candidate for surgery and the pros of a surgical procedure outweigh the cons, surgery is a critical first step in the treatment of cancer. An unwillingness to have surgery will likely make their journey much more difficult.</span></p><span data-dcnode-id="517" instrument_node="">
</span><p data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">I am a firm believer in reviewing the conventional standard of care with any patient I see for consultation in my office. We discuss what the conventional approach would be based on the specifics of the diagnosis. I tell patients that we should consider these treatments as part of the plan.</span></p><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Some patients choose to take the purely conventional route, and if that is their choice, I always make the proper referrals. For some cancers which respond remarkably well to conventional treatment alone, I feel that this is a reasonable choice.</span></p><span data-dcnode-id="511" instrument_node="">
</span><p data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">For patients who choose to follow the integrative route, how we progress from that point differs dramatically from what a conventional protocol offers.</span></p><span data-dcnode-id="508" instrument_node="">
</span><h2 data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">A Different Approach to Fighting Cancer</span></h2><span data-dcnode-id="505" instrument_node="">
</span><p data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Integrative oncology sees the battle with cancer as having two fronts that must be addressed simultaneously. The first front is against a tumor (or, depending on the stage of disease, tumors). To this end, we have tools such as surgery to remove the tumor and tools like chemotherapy and radiation which can shrink the tumor and/or kill cancer cells.</span></p><span data-dcnode-id="502" instrument_node="">
</span><p data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Conventional oncology is well adept at fighting cancer in this regard. Another front to the battle against cancer, however, is against the systemic burden of cancer.</span></p><span data-dcnode-id="499" instrument_node="">
</span><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Cancerous tumors release what are called circulating tumor cells, or CTCs. A component of CTCs, known as cancer stem cells (or CSCs), can be thought of as synonymous for our purposes here. These cells are cancerous cells that can be found throughout the bloodstream, and are released by a tumor well before that tumor is able to be detected.</span></p><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Because of the nature of cancer cells, these cells are essentially immortal; they will not die unless we kill them, and they are floating around the body waiting on the right opportunity to form a tumor elsewhere. This spread from the primary site is known as metastasis.</span></p><span data-dcnode-id="493" instrument_node="">
</span><p data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Interestingly, conventional oncology largely ignores this systemic burden of cancer, especially in early-stage cancers where the tumor is largely confined to one area. One of the biggest concerns with cancer is that even after successful treatment seemingly eliminates all traces of the disease, it can return years later.</span></p><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Because conventional oncology ignores these circulating tumor cells, we see that people can have surgery, full-dose chemotherapy, and/or radiation, and be told they are “cancer-free,” “cured,” or “in remission,” but get cancer again months or years later.</span></p><span data-dcnode-id="487" instrument_node="">
</span><p data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">In integrative oncology, we measure these levels of CTCs routinely, because they are critical for accurate diagnosis, appropriate treatment, and thorough monitoring. Many of the additional therapies we employ are aimed at killing these types of cells, as well as altering the “terrain” which provided an environment for cancer to grow and flourish.</span></p><span data-dcnode-id="484" instrument_node="">
</span><h2 data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">Cancer as a Metabolic Disease</span></h2><span data-dcnode-id="481" instrument_node="">
</span><p data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">Another fundamental difference between integrative and conventional oncology is that integrative oncology treats cancer as a metabolic disease. Generally speaking, when we refer to metabolism, we are referring to how the body uses food to create energy.</span></p><span data-dcnode-id="478" instrument_node="">
</span><p data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">However, for our purposes, we need to think of metabolism on the cellular level; namely, the mechanisms by which cells obtain fuel and grow. At its core, treating cancer as a metabolic disease means that we attack the way cancer cells manufacture energy.</span></p><span data-dcnode-id="475" instrument_node="">
</span><p data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">All cells — healthy cells and cancer cells — have a metabolic process by which they create energy. That energy currency is known as adenosine triphosphate or ATP. Healthy cells produce upwards of 36 units of ATP as the result of their metabolic processes. Because cancer cells are so reliant on glucose, they have more glucose and insulin receptors on their surface.</span></p><span data-dcnode-id="472" instrument_node="">
</span><p data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">We can use these characteristics of cancer cells to our advantage, in a variety of ways. Another way we can use cancer’s metabolic processes against it is by going after one of its primary metabolic byproducts, lactic acid. Cancer cells create an abundance of lactic acid as a result of their metabolism.</span></p><span data-dcnode-id="469" instrument_node="">
</span><p data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">This lactic acid can be thought of as a waste product. In order for a cancer cell to survive, that acid must be thrust out of the cell. Subsequently, we see that the areas surrounding cancer cells are far more acidic than the areas surrounding healthy cells. This is largely where you hear about the importance of pH in cancer development. We can use this in our favor.</span></p><span data-dcnode-id="466" instrument_node="">
</span><p data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">By targeting cancer’s ability to remove lactic acid from the cells, and by targeting the acidic environment that surrounds cancer tumors and promotes their growth, we open ourselves up to more potentially effective treatment options.</span></p></div><span data-dcnode-id="462" instrument_node="">
</span></div><span data-dcnode-id="460" instrument_node=""> </span><span data-dcnode-id="458" instrument_node="">
</span></div><span data-dcnode-id="456" instrument_node=""> </span><span data-dcnode-id="454" instrument_node="">

</span></div><span data-dcnode-id="448" instrument_node=""> </span><div class="et_pb_section et_pb_section_5 et_pb_with_background et_pb_fullwidth_section et_section_regular" data-dcnode-id="418"><span data-dcnode-id="446" instrument_node="">

</span><h1 class="et_pb_module_header" data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Evaluate All Potential Therapies</span></h1><span data-dcnode-id="436" instrument_node="">
</span><span class="et_pb_fullwidth_header_subhead" data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">comprehensive programs to addresses treatment goals</span></span><span data-dcnode-id="433" instrument_node="">

</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_6 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="364"><span data-dcnode-id="413" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_6 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="368"><span data-dcnode-id="412" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="370"><h2 data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">Open-Minded Skepticism</span></h2><span data-dcnode-id="409" instrument_node="">
</span><p data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">While the methods used today to diagnose and treat cancer have a tremendous body of research which supports their use, there are many other methods used in integrative cancer treatment which have shown promise but have not been studied on the scale necessary to become mainstream.</span></p><span data-dcnode-id="406" instrument_node="">
</span><p data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">To ignore these types of studies is shortsighted in my opinion, especially given the fact that the outcomes from standard treatments have not significantly improved since President Nixon “declared war” on cancer nearly 50 years ago.</span></p><span data-dcnode-id="403" instrument_node="">
</span><p data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">In evaluating potential treatments for my patients, I approach each one carefully, with open-minded skepticism. The paradigm of integrative oncology requires this open-minded skepticism. If a treatment has shown promise clinically and/or in a study, and if we believe that it could potentially provide benefit with a low likelihood of causing harm, why would we not at least consider its use?</span></p><span data-dcnode-id="400" instrument_node="">
</span><p data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">This approach should be contrasted with closed-minded skepticism, which is typically how conventional oncology views any cancer treatment outside of the standard of care, as well as open-minded acceptance, which is often how alternative medicine proponents view any natural treatment that has claims of effectiveness.</span></p><span data-dcnode-id="397" instrument_node="">
</span><p data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">In integrative oncology, we seek to critically evaluate all potential therapies. This entails being open to their potential benefit, while also requiring that there be a solid scientific basis for how and why they work.</span></p><span data-dcnode-id="394" instrument_node="">
</span><p data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">In my practice, I offer a wide range of therapies which I think are all necessary.</span></p><span data-dcnode-id="391" instrument_node="">
</span><p data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">• When we look at treating cancer cells themselves, the physical part of it, we, of course, are looking at fractionated chemotherapy, and we use insulin potentiation therapy, or IPT, with that. We feel like it targets those medications better to the cancer cells.</span></p><span data-dcnode-id="388" instrument_node="">
</span><p data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">• We talk about IV vitamin C which we know kills cancer cells, and it works really well in tandem with chemotherapy. We found the outcomes are better when patients receive both.</span></p><span data-dcnode-id="385" instrument_node="">
</span><p data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">• And of course, we talk about supplementation and nutrition. Those are all very valuable therapies that really form the foundation of our physical approach to treating cancer.</span></p><span data-dcnode-id="382" instrument_node="">
</span><p data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">• On the other side, we have the mental and the emotional and the spiritual part. Mind, body, medicine is sort of a term for that, but we know there’s a great link between the mind and the body. And so patient stressors, their fears, their beliefs play a significant role in not only developing cancer but also healing from cancer.</span></p><span data-dcnode-id="379" instrument_node="">
</span><p data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">I found hypnotherapy to be extremely valuable, which we offer in our office, as well as health coaching. So I have health coaches that meet with my patients as well and work on those underlying issues maybe that are there. Sometimes there can be blocks that are keeping patients from getting well, from having their immune system work as well as it could. So this is obviously a long-term approach to getting at some of these issues, but I found it to be essential.</span></p><span data-dcnode-id="376" instrument_node="">
</span><p data-dcnode-id="371"><span data-dcnode-id="375" instrument_node="">So this really is a </span><em data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">holistic</span></em><span data-dcnode-id="372" instrument_node=""> approach. The word holistic gets thrown around a lot, but I view holistically as meaning we’re treating the whole person, the whole body — a physical perspective, a mental perspective, an emotional perspective, and surely a spiritual perspective. We have to address all those things if we’re going to give you the best chance of a good outcome.</span></p></div><span data-dcnode-id="369" instrument_node="">
</span></div><span data-dcnode-id="367" instrument_node=""> </span><span data-dcnode-id="365" instrument_node="">

</span><p data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">The Center for Advanced Medicine is the leader in Integrative Oncology. We offer highly customized programs focused on individual needs and care.</span></p><span data-dcnode-id="322" instrument_node="">
</span><p data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">Each program is designed using comprehensive, evidence based, integrative healthcare strategies to treat the whole person and not just a single disease. TCFAM understands the unique and critical role that medical doctors have in addressing the patient as a whole human being.</span></p><span data-dcnode-id="319" instrument_node="">
</span><p data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">TCFAM sees the Physical, Spiritual and Emotional aspects of the patient as interdependent and requiring attention to all parts to make a whole.</span></p><span data-dcnode-id="316" instrument_node="">
