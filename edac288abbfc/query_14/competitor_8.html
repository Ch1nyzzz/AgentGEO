 Confronting a diagnosis of cancer is one of the most shocking and stressful realities that a person can face. With so much confusing 'information' and opinions available online, it's hard to know where to turn for the right help. A growing body of scientific research is repeatedly confirming that the selective integration of specific Complementary Therapies provides significant benefit to patients with cancer.</span></p><p data-dcnode-id="478" style="text-align: justify;"><span data-dcnode-id="482" instrument_node="">
 At Melbourne Integrative Oncology Group we work alongside your Medical Oncology Team by providing the most contemporary Evidence-Based Complementary Care that is tailored to your individual and unique needs.&nbsp; Our Naturopaths, Nutritionists, Psychologists and other Allied Health Professionals are all experienced in Integrative Cancer Care and all share the same goal:</span><strong data-dcnode-id="480"><span data-dcnode-id="481" instrument_node=""> to help reduce the side effects of your cancer treatment, improve treatment outcomes and support the overall wellbeing</span></strong><span data-dcnode-id="479" instrument_node=""> of patients with cancer before, during and after treatment.</span></p></div></div></div><div class="image" data-dcnode-id="463" id="ece9a34ab" style="position:relative;"><div class="image-module-container" data-dcnode-id="464" id="image-module-container-ece9a34ab"><div data-dcnode-id="465"><div class="img-wrapper-container twc-align-right" data-dcnode-id="467"><div class="mediabox" data-dcnode-id="468" style="text-align: right;"><a data-dcnode-id="469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.miog.com.au/cancer-and-complementary-therapies.html"><img alt="Read more about MIOG" class="col-img img-responsive twc-flex-img lazyloaded" data-dcnode-id="472" data-src="https://assets.cdn.thewebconsole.com/S3WEB8763/images/bnt-read-more.png?m=98a75f4a3dbf9321f21131fb4f4bb50f" data-srcset="https://assets.cdn.thewebconsole.com/S3WEB8763/images/bnt-read-more.png?m=98a75f4a3dbf9321f21131fb4f4bb50f&amp;geometry(320>) 320w,https://assets.cdn.thewebconsole.com/S3WEB8763/images/bnt-read-more.png?m=98a75f4a3dbf9321f21131fb4f4bb50f&amp;geometry(480>) 480w,https://assets.cdn.thewebconsole.com/S3WEB8763/images/bnt-read-more.png?m=98a75f4a3dbf9321f21131fb4f4bb50f&amp;geometry(640>) 640w,https://assets.cdn.thewebconsole.com/S3WEB8763/images/bnt-read-more.png?m=98a75f4a3dbf9321f21131fb4f4bb50f&amp;geometry(768>) 768w,https://a
