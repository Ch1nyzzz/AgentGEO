 data-dcnode-id="2785" instrument_node="">study records</span></span><span data-dcnode-id="2783" instrument_node=""> that contain these words.</span></div></li><li class="glossary__item" data-dcnode-id="2761"><button aria-controls="glossary-content-65" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2779" tabindex="-1"><span data-dcnode-id="2780" instrument_node="">Outcome measure</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2762" id="glossary-content-65" style="display: none;"><span data-dcnode-id="2778" instrument_node="">For </span><span class="term" data-dcnode-id="2776" data-term="clinical trial" tabindex="-1" title="Click to define"><span data-dcnode-id="2777" instrument_node="">clinical trials</span></span><span data-dcnode-id="2775" instrument_node="">, a planned measurement described in the protocol that is used to determine the effect of an </span><span class="term" data-dcnode-id="2773" data-term="intervention/treatment" tabindex="-1" title="Click to define"><span data-dcnode-id="2774" instrument_node="">intervention/treatment</span></span><span data-dcnode-id="2772" instrument_node=""> on participants. For </span><span class="term" data-dcnode-id="2770" data-term="observational study" tabindex="-1" title="Click to define"><span data-dcnode-id="2771" instrument_node="">observational studies</span></span><span data-dcnode-id="2769" instrument_node="">, a measurement or observation that is used to describe patterns of diseases or traits, or associations with exposures, risk factors, or treatment. Types of outcome measures include </span><span class="term" data-dcnode-id="2767" data-term="primary outcome measure" tabindex="-1" title="Click to define"><span data-dcnode-id="2768" instrument_node="">primary outcome measure</span></span><span data-dcnode-id="2766" instrument_node=""> and </span><span class="term" data-dcnode-id="2764" data-term="secondary outcome measure" tabindex="-1" title="Click to define"><span data-dcnode-id="2765" instrument_node="">secondary outcome measure</span></span><span data-dcnode-id="2763" instrument_node="">.</span></div></li><li class="glossary__item" data-dcnode-id="2753"><button aria-controls="glossary-content-66" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2759" tabindex="-1"><span data-dcnode-id="2760" instrument_node="">Parallel assignment</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2754" id="glossary-content-66" style="display: none;"><span data-dcnode-id="2758" instrument_node="">A type of </span><span class="term" data-dcnode-id="2756" data-term="intervention model" tabindex="-1" title="Click to define"><span data-dcnode-id="2757" instrument_node="">intervention model</span></span><span data-dcnode-id="2755" instrument_node=""> describing a clinical trial in which two or more groups of participants receive different interventions. For example, a two-arm parallel assignment involves two groups of participants. One group receives drug A, and the other group receives drug B. So during the trial, participants in one group receive drug A "in parallel" to participants in the other group, who receive drug B.</span></div></li><li class="glossary__item" data-dcnode-id="2742"><button aria-controls="glossary-content-67" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2751" tabindex="-1"><span data-dcnode-id="2752" instrument_node="">Participant flow</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2743" id="glossary-content-67" style="display: none;"><span data-dcnode-id="2750" instrument_node="">A summary of the progress of participants through each stage of a clinical study, by study </span><span class="term" data-dcnode-id="2748" data-term="arm" tabindex="-1" title="Click to define"><span data-dcnode-id="2749" instrument_node="">arm</span></span><span data-dcnode-id="2747" instrument_node=""> or </span><span class="term" data-dcnode-id="2745" data-term="group/cohort" tabindex="-1" title="Click to define"><span data-dcnode-id="2746" instrument_node="">group/cohort</span></span><span data-dcnode-id="2744" instrument_node="">. This includes the number of participants who started, completed, and dropped out of the study.</span></div></li><li class="glossary__item" data-dcnode-id="2734"><button aria-controls="glossary-content-68" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2740" tabindex="-1"><span data-dcnode-id="2741" instrument_node="">Patient registry</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2735" id="glossary-content-68" style="display: none;"><span data-dcnode-id="2739" instrument_node="">A type of </span><span class="term" data-dcnode-id="2737" data-term="observational study" tabindex="-1" title="Click to define"><span data-dcnode-id="2738" instrument_node="">observational study</span></span><span data-dcnode-id="2736" instrument_node=""> that collects information about patients' medical conditions and/or treatments to better understand how a condition or treatment affects patients in the real world.</span></div></li><li class="glossary__item" data-dcnode-id="2708"><button aria-controls="glossary-content-69" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2732" tabindex="-1"><span data-dcnode-id="2733" instrument_node="">Phase</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2709" id="glossary-content-69" style="display: none;"><span data-dcnode-id="2731" instrument_node="">The stage of a clinical trial studying a drug or biological product, based on definitions developed by the </span><span class="term" data-dcnode-id="2729" data-term="u.s. food and drug administration (fda)" tabindex="-1" title="Click to define"><span data-dcnode-id="2730" instrument_node="">U.S. Food and Drug Administration (FDA)</span></span><span data-dcnode-id="2728" instrument_node="">. The phase is based on the study's objective, the number of participants, and other characteristics. There are five phases: </span><span class="term" data-dcnode-id="2726" data-term="early phase 1 (formerly listed as phase 0)" tabindex="-1" title="Click to define"><span data-dcnode-id="2727" instrument_node="">Early Phase 1 (formerly listed as Phase 0)</span></span><span data-dcnode-id="2725" instrument_node="">, </span><span class="term" data-dcnode-id="2723" data-term="phase 1" tabindex="-1" title="Click to define"><span data-dcnode-id="2724" instrument_node="">Phase 1</span></span><span data-dcnode-id="2722" instrument_node="">, </span><span class="term" data-dcnode-id="2720" data-term="phase 2" tabindex="-1" title="Click to define"><span data-dcnode-id="2721" instrument_node="">Phase 2</span></span><span data-dcnode-id="2719" instrument_node="">, </span><span class="term" data-dcnode-id="2717" data-term="phase 3" tabindex="-1" title="Click to define"><span data-dcnode-id="2718" instrument_node="">Phase 3</span></span><span data-dcnode-id="2716" instrument_node="">, and </span><span class="term" data-dcnode-id="2714" data-term="phase 4" tabindex="-1" title="Click to define"><span data-dcnode-id="2715" instrument_node="">Phase 4</span></span><span data-dcnode-id="2713" instrument_node="">. </span><span class="term" data-dcnode-id="2711" data-term="phase not applicable" tabindex="-1" title="Click to define"><span data-dcnode-id="2712" instrument_node="">Not Applicable</span></span><span data-dcnode-id="2710" instrument_node=""> is used to describe trials without FDA-defined phases, including trials of devices or behavioral interventions.</span></div></li><li class="glossary__item" data-dcnode-id="2697"><button aria-controls="glossary-content-70" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2706" tabindex="-1"><span data-dcnode-id="2707" instrument_node="">Phase 1</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2698" id="glossary-content-70" style="display: none;"><span data-dcnode-id="2705" instrument_node="">A </span><span class="term" data-dcnode-id="2703" data-term="phase" tabindex="-1" title="Click to define"><span data-dcnode-id="2704" instrument_node="">phase</span></span><span data-dcnode-id="2702" instrument_node=""> of research to describe clinical trials that focus on the safety of a drug. They are usually conducted with healthy volunteers, and the goal is to determine the drug's most frequent and </span><span class="term" data-dcnode-id="2700" data-term="serious adverse event" tabindex="-1" title="Click to define"><span data-dcnode-id="2701" instrument_node="">serious adverse events</span></span><span data-dcnode-id="2699" instrument_node=""> and, often, how the drug is broken down and excreted by the body. These trials usually involve a small number of participants.</span></div></li><li class="glossary__item" data-dcnode-id="2680"><button aria-controls="glossary-content-71" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2695" tabindex="-1"><span data-dcnode-id="2696" instrument_node="">Phase 2</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2681" id="glossary-content-71" style="display: none;"><span data-dcnode-id="2694" instrument_node="">A </span><span class="term" data-dcnode-id="2692" data-term="phase" tabindex="-1" title="Click to define"><span data-dcnode-id="2693" instrument_node="">phase</span></span><span data-dcnode-id="2691" instrument_node=""> of research to describe clinical trials that gather preliminary data on whether a drug works in people who have a certain </span><span class="term" data-dcnode-id="2689" data-term="condition/disease" tabindex="-1" title="Click to define"><span data-dcnode-id="2690" instrument_node="">condition/disease</span></span><span data-dcnode-id="2688" instrument_node=""> (that is, the drug's effectiveness). For example, participants receiving the drug may be compared to similar participants receiving a different treatment, usually an inactive substance (called a </span><span class="term" data-dcnode-id="2686" data-term="placebo" tabindex="-1" title="Click to define"><span data-dcnode-id="2687" instrument_node="">placebo</span></span><span data-dcnode-id="2685" instrument_node="">) or a different drug. Safety continues to be evaluated, and short-term </span><span class="term" data-dcnode-id="2683" data-term="adverse event" tabindex="-1" title="Click to define"><span data-dcnode-id="2684" instrument_node="">adverse events</span></span><span data-dcnode-id="2682" instrument_node=""> are studied.</span></div></li><li class="glossary__item" data-dcnode-id="2672"><button aria-controls="glossary-content-72" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2678" tabindex="-1"><span data-dcnode-id="2679" instrument_node="">Phase 3</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2673" id="glossary-content-72" style="display: none;"><span data-dcnode-id="2677" instrument_node="">A </span><span class="term" data-dcnode-id="2675" data-term="phase" tabindex="-1" title="Click to define"><span data-dcnode-id="2676" instrument_node="">phase</span></span><span data-dcnode-id="2674" instrument_node=""> of research to describe clinical trials that gather more information about a drug's safety and effectiveness by studying different populations and different dosages and by using the drug in combination with other drugs. These studies typically involve more participants.</span></div></li><li class="glossary__item" data-dcnode-id="2664"><button aria-controls="glossary-content-73" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2670" tabindex="-1"><span data-dcnode-id="2671" instrument_node="">Phase 4</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2665" id="glossary-content-73" style="display: none;"><span data-dcnode-id="2669" instrument_node="">A </span><span class="term" data-dcnode-id="2667" data-term="phase" tabindex="-1" title="Click to define"><span data-dcnode-id="2668" instrument_node="">phase</span></span><span data-dcnode-id="2666" instrument_node=""> of research to describe clinical trials occurring after FDA has approved a drug for marketing. They include postmarket requirement and commitment studies that are required of or agreed to by the study sponsor. These trials gather additional information about a drug's safety, efficacy, or optimal use.</span></div></li><li class="glossary__item" data-dcnode-id="2656"><button aria-controls="glossary-content-74" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2662" tabindex="-1"><span data-dcnode-id="2663" instrument_node="">Phase Not Applicable</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2657" id="glossary-content-74" style="display: none;"><span data-dcnode-id="2661" instrument_node="">Describes trials without FDA-defined </span><span class="term" data-dcnode-id="2659" data-term="phase" tabindex="-1" title="Click to define"><span data-dcnode-id="2660" instrument_node="">phases</span></span><span data-dcnode-id="2658" instrument_node="">, including trials of devices or behavioral interventions.</span></div></li><li class="glossary__item" data-dcnode-id="2648"><button aria-controls="glossary-content-75" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2654" tabindex="-1"><span data-dcnode-id="2655" instrument_node="">Placebo</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2649" id="glossary-content-75" style="display: none;"><span data-dcnode-id="2653" instrument_node="">An inactive substance or treatment that looks the same as, and is given in the same way as, an active drug or </span><span class="term" data-dcnode-id="2651" data-term="intervention/treatment" tabindex="-1" title="Click to define"><span data-dcnode-id="2652" instrument_node="">intervention/treatment</span></span><span data-dcnode-id="2650" instrument_node=""> being studied.</span></div></li><li class="glossary__item" data-dcnode-id="2637"><button aria-controls="glossary-content-76" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2646" tabindex="-1"><span data-dcnode-id="2647" instrument_node="">Placebo comparator arm</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2638" id="glossary-content-76" style="display: none;"><span data-dcnode-id="2645" instrument_node="">An </span><span class="term" data-dcnode-id="2643" data-term="arm type" tabindex="-1" title="Click to define"><span data-dcnode-id="2644" instrument_node="">arm type</span></span><span data-dcnode-id="2642" instrument_node=""> in which a group of participants receives a </span><span class="term" data-dcnode-id="2640" data-term="placebo" tabindex="-1" title="Click to define"><span data-dcnode-id="2641" instrument_node="">placebo</span></span><span data-dcnode-id="2639" instrument_node=""> during a clinical trial.</span></div></li><li class="glossary__item" data-dcnode-id="2626"><button aria-controls="glossary-content-77" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2635" tabindex="-1"><span data-dcnode-id="2636" instrument_node="">Primary completion date</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2627" id="glossary-content-77" style="display: none;"><span data-dcnode-id="2634" instrument_node="">The date on which the last participant in a clinical study was examined or received an intervention to collect final data for the </span><span class="term" data-dcnode-id="2632" data-term="primary outcome measure" tabindex="-1" title="Click to define"><span data-dcnode-id="2633" instrument_node="">primary outcome measure</span></span><span data-dcnode-id="2631" instrument_node="">. Whether the clinical study ended according to the </span><span class="term" data-dcnode-id="2629" data-term="protocol" tabindex="-1" title="Click to define"><span data-dcnode-id="2630" instrument_node="">protocol</span></span><span data-dcnode-id="2628" instrument_node=""> or was terminated does not affect this date. For clinical studies with more than one primary outcome measure with different completion dates, this term refers to the date on which data collection is completed for all the primary outcome measures. The "estimated" primary completion date is the date that the researchers think will be the primary completion date for the study. </span></div></li><li class="glossary__item" data-dcnode-id="2615"><button aria-controls="glossary-content-78" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2624" tabindex="-1"><span data-dcnode-id="2625" instrument_node="">Primary outcome measure</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2616" id="glossary-content-78" style="display: none;"><span data-dcnode-id="2623" instrument_node="">In a clinical study's </span><span class="term" data-dcnode-id="2621" data-term="protocol" tabindex="-1" title="Click to define"><span data-dcnode-id="2622" instrument_node="">protocol</span></span><span data-dcnode-id="2620" instrument_node="">, the planned outcome measure that is the most important for evaluating the effect of an </span><span class="term" data-dcnode-id="2618" data-term="intervention/treatment" tabindex="-1" title="Click to define"><span data-dcnode-id="2619" instrument_node="">intervention/treatment</span></span><span data-dcnode-id="2617" instrument_node="">. Most clinical studies have one primary outcome measure, but some have more than one.</span></div></li><li class="glossary__item" data-dcnode-id="2607"><button aria-controls="glossary-content-79" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2613" tabindex="-1"><span data-dcnode-id="2614" instrument_node="">Primary purpose</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2608" id="glossary-content-79" style="display: none;"><span data-dcnode-id="2612" instrument_node="">The main reason for the </span><span class="term" data-dcnode-id="2610" data-term="clinical trial" tabindex="-1" title="Click to define"><span data-dcnode-id="2611" instrument_node="">clinical trial</span></span><span data-dcnode-id="2609" instrument_node="">. The types of primary purpose are: treatment, prevention, diagnostic, supportive care, screening, health services research, basic science, and other.</span></div></li><li class="glossary__item" data-dcnode-id="2602"><button aria-controls="glossary-content-80" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2605" tabindex="-1"><span data-dcnode-id="2606" instrument_node="">Principal investigator (PI)</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2603" id="glossary-content-80" style="display: none;"><span data-dcnode-id="2604" instrument_node="">The person who is responsible for the scientific and technical direction of the entire clinical study.</span></div></li><li class="glossary__item" data-dcnode-id="2597"><button aria-controls="glossary-content-81" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2600" tabindex="-1"><span data-dcnode-id="2601" instrument_node="">Protocol</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2598" id="glossary-content-81" style="display: none;"><span data-dcnode-id="2599" instrument_node="">The written description of a clinical study. It includes the study's objectives, design, and methods. It may also include relevant scientific background and statistical information.</span></div></li><li class="glossary__item" data-dcnode-id="2583"><button aria-controls="glossary-content-82" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2595" tabindex="-1"><span data-dcnode-id="2596" instrument_node="">Quality control (QC) review</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2584" id="glossary-content-82" style="display: none;"><span data-dcnode-id="2594" instrument_node="">National Library of Medicine (NLM) staff perform a limited review of submitted </span><span class="term" data-dcnode-id="2592" data-term="study record" tabindex="-1" title="Click to define"><span data-dcnode-id="2593" instrument_node="">study records</span></span><span data-dcnode-id="2591" instrument_node=""> for apparent errors, deficiencies, or inconsistencies. NLM staff identify potential major and advisory issues and provide comments directly to the study sponsor or investigator. Major issues identified in QC review must be addressed or corrected (see </span><span class="term" data-dcnode-id="2589" data-term="first submitted that met qc criteria" tabindex="-1" title="Click to define"><span data-dcnode-id="2590" instrument_node="">First submitted that met QC criteria</span></span><span data-dcnode-id="2588" instrument_node=""> and </span><span class="term" data-dcnode-id="2586" data-term="results first submitted that met qc criteria" tabindex="-1" title="Click to define"><span data-dcnode-id="2587" instrument_node="">Results first submitted that met QC criteria</span></span><span data-dcnode-id="2585" instrument_node="">). Advisory issues are suggestions to help improve the clarity of the record. NLM staff do not verify the scientific validity or relevance of the submitted information. The study sponsor or investigator is responsible for ensuring that the studies follow all applicable laws and regulations.</span></div></li><li class="glossary__item" data-dcnode-id="2572"><button aria-controls="glossary-content-83" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2581" tabindex="-1"><span data-dcnode-id="2582" instrument_node="">Randomized allocation</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2573" id="glossary-content-83" style="display: none;"><span data-dcnode-id="2580" instrument_node="">A type of </span><span class="term" data-dcnode-id="2578" data-term="allocation" tabindex="-1" title="Click to define"><span data-dcnode-id="2579" instrument_node="">allocation</span></span><span data-dcnode-id="2577" instrument_node=""> strategy in which participants are assigned to the </span><span class="term" data-dcnode-id="2575" data-term="arm" tabindex="-1" title="Click to define"><span data-dcnode-id="2576" instrument_node="">arms</span></span><span data-dcnode-id="2574" instrument_node=""> of a clinical trial by chance.</span></div></li><li class="glossary__item" data-dcnode-id="2528"><button aria-controls="glossary-content-84" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2570" tabindex="-1"><span data-dcnode-id="2571" instrument_node="">Recruitment status</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2529" id="glossary-content-84" style="display: none;"><ul data-dcnode-id="2530"><li data-dcnode-id="2566"><strong data-dcnode-id="2568"><span data-dcnode-id="2569" instrument_node="">Not yet recruiting:</span></strong><span data-dcnode-id="2567" instrument_node=""> The study has not started recruiting participants.</span></li><li data-dcnode-id="2562"><strong data-dcnode-id="2564"><span data-dcnode-id="2565" instrument_node="">Recruiting:</span></strong><span data-dcnode-id="2563" instrument_node=""> The study is currently recruiting participants.</span></li><li data-dcnode-id="2558"><strong data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node="">Enrolling by invitation:</span></strong><span data-dcnode-id="2559" instrument_node=""> The study is selecting its participants from a population, or group of people, decided on by the researchers in advance. These studies are not open to everyone who meets the eligibility criteria but only to people in that particular population, who are specifically invited to participate.</span></li><li data-dcnode-id="2554"><strong data-dcnode-id="2556"><span data-dcnode-id="2557" instrument_node="">Active, not recruiting:</span></strong><span data-dcnode-id="2555" instrument_node=""> The study is ongoing, and participants are receiving an intervention or being examined, but potential participants are not currently being recruited or enrolled.</span></li><li data-dcnode-id="2550"><strong data-dcnode-id="2552"><span data-dcnode-id="2553" instrument_node="">Suspended:</span></strong><span data-dcnode-id="2551" instrument_node=""> The study has stopped early but may start again.</span></li><li data-dcnode-id="2546"><strong data-dcnode-id="2548"><span data-dcnode-id="2549" instrument_node="">Terminated:</span></strong><span data-dcnode-id="2547" instrument_node=""> The study has stopped early and will not start again. Participants are no longer being examined or treated.</span></li><li data-dcnode-id="2542"><strong data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">Completed:</span></strong><span data-dcnode-id="2543" instrument_node=""> The study has ended normally, and participants are no longer being examined or treated (that is, the last participant's last visit has occurred).</span></li><li data-dcnode-id="2538"><strong data-dcnode-id="2540"><span data-dcnode-id="2541" instrument_node="">Withdrawn:</span></strong><span data-dcnode-id="2539" instrument_node=""> The study stopped early, before enrolling its first participant.</span></li><li data-dcnode-id="2531"><strong data-dcnode-id="2536"><span data-dcnode-id="2537" instrument_node="">Unknown:</span></strong><span data-dcnode-id="2535" instrument_node=""> A study on ClinicalTrials.gov whose last known status was recruiting; not yet recruiting; or active, not recruiting but that has passed its completion date, and the status has not been </span><span class="term" data-dcnode-id="2533" data-term="last verified" tabindex="-1" title="Click to define"><span data-dcnode-id="2534" instrument_node="">last verified</span></span><span data-dcnode-id="2532" instrument_node=""> within the past 2 years.</span></li></ul></div></li><li class="glossary__item" data-dcnode-id="2517"><button aria-controls="glossary-content-85" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2526" tabindex="-1"><span data-dcnode-id="2527" instrument_node="">Registration</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2518" id="glossary-content-85" style="display: none;"><span data-dcnode-id="2525" instrument_node="">The process of submitting and updating summary information about a clinical study and its </span><span class="term" data-dcnode-id="2523" data-term="protocol" tabindex="-1" title="Click to define"><span data-dcnode-id="2524" instrument_node="">protocol</span></span><span data-dcnode-id="2522" instrument_node="">, from its beginning to end, to a structured, public Web-based </span><span class="term" data-dcnode-id="2520" data-term="study registry" tabindex="-1" title="Click to define"><span data-dcnode-id="2521" instrument_node="">study registry</span></span><span data-dcnode-id="2519" instrument_node=""> that is accessible to the public, such as ClinicalTrials.gov.</span></div></li><li class="glossary__item" data-dcnode-id="2506"><button aria-controls="glossary-content-86" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2515" tabindex="-1"><span data-dcnode-id="2516" instrument_node="">Removed location countries</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2507" id="glossary-content-86" style="display: none;"><span data-dcnode-id="2514" instrument_node="">Countries that appeared under </span><span class="term" data-dcnode-id="2512" data-term="listed location countries" tabindex="-1" title="Click to define"><span data-dcnode-id="2513" instrument_node="">listed location countries</span></span><span data-dcnode-id="2511" instrument_node=""> but were removed from the </span><span class="term" data-dcnode-id="2509" data-term="study record" tabindex="-1" title="Click to define"><span data-dcnode-id="2510" instrument_node="">study record</span></span><span data-dcnode-id="2508" instrument_node=""> by the sponsor or investigator.</span></div></li><li class="glossary__item" data-dcnode-id="2501"><button aria-controls="glossary-content-87" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2504" tabindex="-1"><span data-dcnode-id="2505" instrument_node="">Reporting group</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2502" id="glossary-content-87" style="display: none;"><span data-dcnode-id="2503" instrument_node="">A grouping of participants in a clinical study that is used for summarizing the data collected during the study. This grouping may be the same as or different from a study arm or group.</span></div></li><li class="glossary__item" data-dcnode-id="2496"><button aria-controls="glossary-content-88" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2499" tabindex="-1"><span data-dcnode-id="2500" instrument_node="">Responsible party</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2497" id="glossary-content-88" style="display: none;"><span data-dcnode-id="2498" instrument_node="">The person responsible for submitting information about a clinical study to ClinicalTrials.gov and updating that information. Usually the study sponsor or investigator.</span></div></li><li class="glossary__item" data-dcnode-id="2487"><button aria-controls="glossary-content-89" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2494" tabindex="-1"><span data-dcnode-id="2495" instrument_node="">Results database</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2488" id="glossary-content-89" style="display: none;"><span data-dcnode-id="2493" instrument_node="">A structured online system, such as the ClinicalTrials.gov results database, that provides the public with access to registration and summary results information for completed or terminated clinical studies. A study with results available on ClinicalTrials.gov is described as having the results "posted." </span><p data-dcnode-id="2489"><strong data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">Note:</span></strong><span data-dcnode-id="2490" instrument_node=""> The ClinicalTrials.gov results database became available in September 2008. Older studies are unlikely to have results available in the database.</span></p></div></li><li class="glossary__item" data-dcnode-id="2476"><button aria-controls="glossary-content-90" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2485" tabindex="-1"><span data-dcnode-id="2486" instrument_node="">Results delayed</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2477" id="glossary-content-90" style="display: none;"><span data-dcnode-id="2484" instrument_node="">Indicates that the sponsor or investigator submitted a </span><span class="term" data-dcnode-id="2482" data-term="certification" tabindex="-1" title="Click to define"><span data-dcnode-id="2483" instrument_node="">certification</span></span><span data-dcnode-id="2481" instrument_node=""> or </span><span class="term" data-dcnode-id="2479" data-term="extension request" tabindex="-1" title="Click to define"><span data-dcnode-id="2480" instrument_node="">extension request</span></span><span data-dcnode-id="2478" instrument_node="">.</span></div></li><li class="glossary__item" data-dcnode-id="2465"><button aria-controls="glossary-content-91" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2474" tabindex="-1"><span data-dcnode-id="2475" instrument_node="">Results first posted</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2466" id="glossary-content-91" style="display: none;"><span data-dcnode-id="2473" instrument_node="">The date on which summary results information was first available on ClinicalTrials.gov after National Library of Medicine (NLM) </span><a data-dcnode-id="2471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//prsinfo.clinicaltrials.gov/ResultsDetailedReviewItems.pdf" style="text-decoration:underline dotted" tabindex="-1" target="_blank"><span data-dcnode-id="2472" instrument_node="">quality control (QC) review</span></a><span data-dcnode-id="2470" instrument_node=""> has concluded. There is typically a delay between the date the study sponsor or investigator first submits summary results information (the results first submitted date) and the results first posted date. Some results information may be available at an earlier date if </span><span class="term" data-dcnode-id="2468" data-term="results first posted with qc comments" tabindex="-1" title="Click to define"><span data-dcnode-id="2469" instrument_node="">Results First Posted with QC Comments</span></span><span data-dcnode-id="2467" instrument_node="">.</span></div></li><li class="glossary__item" data-dcnode-id="2457"><button aria-controls="glossary-content-92" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2463" tabindex="-1"><span data-dcnode-id="2464" instrument_node="">Results first posted with QC comments</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2458" id="glossary-content-92" style="display: none;"><span data-dcnode-id="2462" instrument_node="">The date on which summary results information was first available on ClinicalTrials.gov with quality control review comments from the National Library of Medicine (NLM) identifying major issues that must be addressed by the sponsor or investigator. As of January 1, 2020, initial results submissions for applicable clinical trials (ACTs) that do not meet </span><a data-dcnode-id="2460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//prsinfo.clinicaltrials.gov/ResultsDetailedReviewItems.pdf" style="text-decoration:underline dotted" tabindex="-1" target="_blank"><span data-dcnode-id="2461" instrument_node="">quality control review criteria</span></a><span data-dcnode-id="2459" instrument_node=""> will be publicly posted on ClinicalTrials.gov with brief standardized major comments. Accordingly, the Results First Posted with QC Comments date may be earlier than the Results First Posted date for an ACT with summary results information that is not consistent with NLM quality control review criteria.</span></div></li><li class="glossary__item" data-dcnode-id="2446"><button aria-controls="glossary-content-93" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2455" tabindex="-1"><span data-dcnode-id="2456" instrument_node="">Results first submitted</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2447" id="glossary-content-93" style="display: none;"><span data-dcnode-id="2454" instrument_node="">The date on which the study sponsor or investigator first submits a </span><span class="term" data-dcnode-id="2452" data-term="study record" tabindex="-1" title="Click to define"><span data-dcnode-id="2453" instrument_node="">study record</span></span><span data-dcnode-id="2451" instrument_node=""> with summary results information. There is typically a delay between the results first submitted date and when summary results information becomes available on ClinicalTrials.gov (the </span><span class="term" data-dcnode-id="2449" data-term="results first posted" tabindex="-1" title="Click to define"><span data-dcnode-id="2450" instrument_node="">results first posted</span></span><span data-dcnode-id="2448" instrument_node=""> date).</span></div></li><li class="glossary__item" data-dcnode-id="2435"><button aria-controls="glossary-content-94" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2444" tabindex="-1"><span data-dcnode-id="2445" instrument_node="">Results first submitted that met QC criteria</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2436" id="glossary-content-94" style="display: none;"><span data-dcnode-id="2443" instrument_node="">The date on which the study sponsor or investigator first submits a </span><span class="term" data-dcnode-id="2441" data-term="study record" tabindex="-1" title="Click to define"><span data-dcnode-id="2442" instrument_node="">study record</span></span><span data-dcnode-id="2440" instrument_node=""> with summary results information that is consistent with National Library of Medicine (NLM) </span><span class="term" data-dcnode-id="2438" data-term="quality control (qc) review" tabindex="-1" title="Click to define"><span data-dcnode-id="2439" instrument_node="">quality control (QC) review</span></span><span data-dcnode-id="2437" instrument_node=""> criteria. The sponsor or investigator may need to revise and submit results information one or more times before NLM's QC review criteria are met. It is the responsibility of the sponsor or investigator to ensure that the study record is consistent with the NLM QC review criteria.</span></div></li><li class="glossary__item" data-dcnode-id="2424"><button aria-controls="glossary-content-95" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2433" tabindex="-1"><span data-dcnode-id="2434" instrument_node="">Results returned after quality control review</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2425" id="glossary-content-95" style="display: none;"><span data-dcnode-id="2432" instrument_node="">The date on which the National Library of Medicine provided </span><span class="term" data-dcnode-id="2430" data-term="quality control (qc) review" tabindex="-1" title="Click to define"><span data-dcnode-id="2431" instrument_node="">quality control (QC) review</span></span><span data-dcnode-id="2429" instrument_node=""> comments to the study sponsor or investigator. The sponsor or investigator must address major issues identified in the review comments. If there is a date listed for results returned after quality control review, but there is not a subsequent date listed for </span><span class="term" data-dcnode-id="2427" data-term="results submitted to clinicaltrials.gov" tabindex="-1" title="Click to define"><span data-dcnode-id="2428" instrument_node="">results submitted to ClinicalTrials.gov</span></span><span data-dcnode-id="2426" instrument_node="">, this means that the submission is pending changes by the sponsor or investigator.</span></div></li><li class="glossary__item" data-dcnode-id="2411"><button aria-controls="glossary-content-96" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2422" tabindex="-1"><span data-dcnode-id="2423" instrument_node="">Results submitted to ClinicalTrials.gov</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2412" id="glossary-content-96" style="display: none;"><span data-dcnode-id="2421" instrument_node="">Indicates that the study sponsor or investigator has submitted summary results information for a clinical study to ClinicalTrials.gov but the </span><span class="term" data-dcnode-id="2419" data-term="quality control (qc) review" tabindex="-1" title="Click to define"><span data-dcnode-id="2420" instrument_node="">quality control (QC) review</span></span><span data-dcnode-id="2418" instrument_node=""> process has not concluded.</span><p data-dcnode-id="2413"><span data-dcnode-id="2417" instrument_node="">The results submitted date indicates when the study sponsor or investigator first submitted summary results information or submitted changes to summary results information. Submissions with changes are typically in response to  QC review comments from the National Library of Medicine (NLM). If there is a date listed for results submitted to ClinicalTrials.gov, but there is not a subsequent date listed for </span><span class="term" data-dcnode-id="2415" data-term="results returned after quality control review" tabindex="-1" title="Click to define"><span data-dcnode-id="2416" instrument_node="">results returned after quality control review</span></span><span data-dcnode-id="2414" instrument_node="">, this means that the submission is pending review by NLM.</span></p></div></li><li class="glossary__item" data-dcnode-id="2403"><button aria-controls="glossary-content-97" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2409" tabindex="-1"><span data-dcnode-id="2410" instrument_node="">Secondary outcome measure</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2404" id="glossary-content-97" style="display: none;"><span data-dcnode-id="2408" instrument_node="">In a clinical study's </span><span class="term" data-dcnode-id="2406" data-term="protocol" tabindex="-1" title="Click to define"><span data-dcnode-id="2407" instrument_node="">protocol</span></span><span data-dcnode-id="2405" instrument_node="">, a planned outcome measure that is not as important as the primary outcome measure for evaluating the effect of an intervention but is still of interest. Most clinical studies have more than one secondary outcome measure.</span></div></li><li class="glossary__item" data-dcnode-id="2395"><button aria-controls="glossary-content-98" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2401" tabindex="-1"><span data-dcnode-id="2402" instrument_node="">Serious adverse event</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2396" id="glossary-content-98" style="display: none;"><span data-dcnode-id="2400" instrument_node="">An </span><span class="term" data-dcnode-id="2398" data-term="adverse event" tabindex="-1" title="Click to define"><span data-dcnode-id="2399" instrument_node="">adverse event</span></span><span data-dcnode-id="2397" instrument_node=""> that results in death, is life-threatening, requires inpatient hospitalization or extends a current hospital stay, results in an ongoing or significant incapacity or interferes substantially with normal life functions, or causes a congenital anomaly or birth defect. Medical events that do not result in death, are not life-threatening, or do not require hospitalization may be considered serious adverse events if they put the participant in danger or require medical or surgical intervention to prevent one of the results listed above.</span></div></li><li class="glossary__item" data-dcnode-id="2384"><button aria-controls="glossary-content-99" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2393" tabindex="-1"><span data-dcnode-id="2394" instrument_node="">Sex</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2385" id="glossary-content-99" style="display: none;"><span data-dcnode-id="2392" instrument_node="">A type of </span><span class="term" data-dcnode-id="2390" data-term="eligibility criteria" tabindex="-1" title="Click to define"><span data-dcnode-id="2391" instrument_node="">eligibility criteria</span></span><span data-dcnode-id="2389" instrument_node=""> that indicates the sex of people who may participate in a clinical study (all, female, male). Sex is a person's classification as female or male based on biological distinctions. Sex is distinct from </span><span class="term" data-dcnode-id="2387" data-term="gender-based eligibility" tabindex="-1" title="Click to define"><span data-dcnode-id="2388" instrument_node="">gender-based eligibility</span></span><span data-dcnode-id="2386" instrument_node="">.</span></div></li><li class="glossary__item" data-dcnode-id="2376"><button aria-controls="glossary-content-100" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2382" tabindex="-1"><span data-dcnode-id="2383" instrument_node="">Sham comparator arm</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2377" id="glossary-content-100" style="display: none;"><span data-dcnode-id="2381" instrument_node="">An </span><span class="term" data-dcnode-id="2379" data-term="arm type" tabindex="-1" title="Click to define"><span data-dcnode-id="2380" instrument_node="">arm type</span></span><span data-dcnode-id="2378" instrument_node=""> in which a group of participants receives a procedure or device that appears to be the same as the actual procedure or device being studied but does not contain active processes or components.</span></div></li><li class="glossary__item" data-dcnode-id="2368"><button aria-controls="glossary-content-101" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2374" tabindex="-1"><span data-dcnode-id="2375" instrument_node="">Single group assignment</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2369" id="glossary-content-101" style="display: none;"><span data-dcnode-id="2373" instrument_node="">A type of </span><span class="term" data-dcnode-id="2371" data-term="intervention model" tabindex="-1" title="Click to define"><span data-dcnode-id="2372" instrument_node="">intervention model</span></span><span data-dcnode-id="2370" instrument_node=""> describing a clinical trial in which all participants receive the same intervention/treatment.</span></div></li><li class="glossary__item" data-dcnode-id="2355"><button aria-controls="glossary-content-102" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2366" tabindex="-1"><span data-dcnode-id="2367" instrument_node="">Sort studies by</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2356" id="glossary-content-102" style="display: none;"><span data-dcnode-id="2365" instrument_node="">In Advanced Search, the Sort studies by option is used to change the order of studies listed on the Search Results page. You can sort by Relevance or Newest First: </span><ul data-dcnode-id="2357"><li data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">Relevance: Studies that best match your search terms appear higher in the search results list. This is the default display for all searches.</span></li><li data-dcnode-id="2358"><span data-dcnode-id="2362" instrument_node="">Newest First: Studies with the most recent </span><span class="term" data-dcnode-id="2360" data-term="first posted" tabindex="-1" title="Click to define"><span data-dcnode-id="2361" instrument_node="">First posted</span></span><span data-dcnode-id="2359" instrument_node=""> dates appear higher in the search results list.</span></li></ul></div></li><li class="glossary__item" data-dcnode-id="2350"><button aria-controls="glossary-content-103" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2353" tabindex="-1"><span data-dcnode-id="2354" instrument_node="">Sponsor</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2351" id="glossary-content-103" style="display: none;"><span data-dcnode-id="2352" instrument_node="">The organization or person who initiates the study and who has authority and control over the study.</span></div></li><li class="glossary__item" data-dcnode-id="2342"><button aria-controls="glossary-content-104" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2348" tabindex="-1"><span data-dcnode-id="2349" instrument_node="">State</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2343" id="glossary-content-104" style="display: none;"><span data-dcnode-id="2347" instrument_node="">In the search feature, the State field is used to find clinical studies with locations in a specific state within the United States. If you choose United States in the </span><span class="term" data-dcnode-id="2345" data-term="country" tabindex="-1" title="Click to define"><span data-dcnode-id="2346" instrument_node="">Country</span></span><span data-dcnode-id="2344" instrument_node=""> field, you can search for studies with locations in a specific state.</span></div></li><li class="glossary__item" data-dcnode-id="2334"><button aria-controls="glossary-content-105" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2340" tabindex="-1"><span data-dcnode-id="2341" instrument_node="">Statistical analysis plan (SAP)</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2335" id="glossary-content-105" style="display: none;"><span data-dcnode-id="2339" instrument_node="">The written description of the statistical considerations and methods for analyzing the data collected in the </span><span class="term" data-dcnode-id="2337" data-term="clinical study" tabindex="-1" title="Click to define"><span data-dcnode-id="2338" instrument_node="">clinical study</span></span><span data-dcnode-id="2336" instrument_node="">.</span></div></li><li class="glossary__item" data-dcnode-id="2323"><button aria-controls="glossary-content-106" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2332" tabindex="-1"><span data-dcnode-id="2333" instrument_node="">Status</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2324" id="glossary-content-106" style="display: none;"><span data-dcnode-id="2331" instrument_node="">Indicates the current </span><span class="term" data-dcnode-id="2329" data-term="recruitment status" tabindex="-1" title="Click to define"><span data-dcnode-id="2330" instrument_node="">recruitment status</span></span><span data-dcnode-id="2328" instrument_node=""> or the </span><span class="term" data-dcnode-id="2326" data-term="expanded access status" tabindex="-1" title="Click to define"><span data-dcnode-id="2327" instrument_node="">expanded access status</span></span><span data-dcnode-id="2325" instrument_node="">.</span></div></li><li class="glossary__item" data-dcnode-id="2306"><button aria-controls="glossary-content-107" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2321" tabindex="-1"><span data-dcnode-id="2322" instrument_node="">Study completion date</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2307" id="glossary-content-107" style="display: none;"><span data-dcnode-id="2320" instrument_node="">The date on which the last participant in a clinical study was examined or received an </span><span class="term" data-dcnode-id="2318" data-term="intervention/treatment" tabindex="-1" title="Click to define"><span data-dcnode-id="2319" instrument_node="">intervention/treatment</span></span><span data-dcnode-id="2317" instrument_node=""> to collect final data for the </span><span class="term" data-dcnode-id="2315" data-term="primary outcome measure" tabindex="-1" title="Click to define"><span data-dcnode-id="2316" instrument_node="">primary outcome measures</span></span><span data-dcnode-id="2314" instrument_node="">, </span><span class="term" data-dcnode-id="2312" data-term="secondary outcome measure" tabindex="-1" title="Click to define"><span data-dcnode-id="2313" instrument_node="">secondary outcome measures</span></span><span data-dcnode-id="2311" instrument_node="">, and </span><span class="term" data-dcnode-id="2309" data-term="adverse event" tabindex="-1" title="Click to define"><span data-dcnode-id="2310" instrument_node="">adverse events</span></span><span data-dcnode-id="2308" instrument_node=""> (that is, the last participant's last visit). The "estimated" study completion date is the date that the researchers think will be the study completion date.</span></div></li><li class="glossary__item" data-dcnode-id="2301"><button aria-controls="glossary-content-108" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2304" tabindex="-1"><span data-dcnode-id="2305" instrument_node="">Study design</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2302" id="glossary-content-108" style="display: none;"><span data-dcnode-id="2303" instrument_node="">The investigative methods and strategies used in the clinical study.</span></div></li><li class="glossary__item" data-dcnode-id="2284"><button aria-controls="glossary-content-109" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2299" tabindex="-1"><span data-dcnode-id="2300" instrument_node="">Study documents</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2285" id="glossary-content-109" style="display: none;"><span data-dcnode-id="2298" instrument_node="">Refers to the type of documents that the study sponsor or principal investigator may add to their </span><span class="term" data-dcnode-id="2296" data-term="study record" tabindex="-1" title="Click to define"><span data-dcnode-id="2297" instrument_node="">study record</span></span><span data-dcnode-id="2295" instrument_node="">. These include a study </span><span class="term" data-dcnode-id="2293" data-term="protocol" tabindex="-1" title="Click to define"><span data-dcnode-id="2294" instrument_node="">protocol</span></span><span data-dcnode-id="2292" instrument_node="">, </span><span class="term" data-dcnode-id="2290" data-term="statistical analysis plan (sap)" tabindex="-1" title="Click to define"><span data-dcnode-id="2291" instrument_node="">statistical analysis plan</span></span><span data-dcnode-id="2289" instrument_node="">, and </span><span class="term" data-dcnode-id="2287" data-term="informed consent form (icf)" tabindex="-1" title="Click to define"><span data-dcnode-id="2288" instrument_node="">informed consent form</span></span><span data-dcnode-id="2286" instrument_node="">.</span></div></li><li class="glossary__item" data-dcnode-id="2270"><button aria-controls="glossary-content-110" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2282" tabindex="-1"><span data-dcnode-id="2283" instrument_node="">Study IDs</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2271" id="glossary-content-110" style="display: none;"><span data-dcnode-id="2281" instrument_node="">Identifiers that are assigned to a clinical study by the study's </span><span class="term" data-dcnode-id="2279" data-term="sponsor" tabindex="-1" title="Click to define"><span data-dcnode-id="2280" instrument_node="">sponsor</span></span><span data-dcnode-id="2278" instrument_node="">, funders, or others. They include unique identifiers from other trial </span><span class="term" data-dcnode-id="2276" data-term="study registry" tabindex="-1" title="Click to define"><span data-dcnode-id="2277" instrument_node="">study registries</span></span><span data-dcnode-id="2275" instrument_node=""> and National Institutes of Health grant numbers. Note: ClinicalTrials.gov assigns a unique identification code to each clinical study registered on ClinicalTrials.gov. Also called the </span><span class="term" data-dcnode-id="2273" data-term="nct number" tabindex="-1" title="Click to define"><span data-dcnode-id="2274" instrument_node="">NCT number</span></span><span data-dcnode-id="2272" instrument_node="">, the format is "NCT" followed by an 8-digit number (for example, NCT00000419).</span></div></li><li class="glossary__item" data-dcnode-id="2259"><button aria-controls="glossary-content-111" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2268" tabindex="-1"><span data-dcnode-id="2269" instrument_node="">Study record</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2260" id="glossary-content-111" style="display: none;"><span data-dcnode-id="2267" instrument_node="">An entry on ClinicalTrials.gov that contains a summary of a clinical study's protocol information, including the </span><span class="term" data-dcnode-id="2265" data-term="recruitment status" tabindex="-1" title="Click to define"><span data-dcnode-id="2266" instrument_node="">recruitment status</span></span><span data-dcnode-id="2264" instrument_node="">; eligibility criteria; contact information; and, in some cases, summary results. Each study record is assigned a ClinicalTrials.gov identifier, or </span><span class="term" data-dcnode-id="2262" data-term="nct number" tabindex="-1" title="Click to define"><span data-dcnode-id="2263" instrument_node="">NCT number</span></span><span data-dcnode-id="2261" instrument_node="">.</span></div></li><li class="glossary__item" data-dcnode-id="2254"><button aria-controls="glossary-content-112" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2257" tabindex="-1"><span data-dcnode-id="2258" instrument_node="">Study registry</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2255" id="glossary-content-112" style="display: none;"><span data-dcnode-id="2256" instrument_node="">A structured online system, such as ClinicalTrials.gov, that provides the public with access to summary information about ongoing and completed clinical studies.</span></div></li><li class="glossary__item" data-dcnode-id="2228"><button aria-controls="glossary-content-113" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2252" tabindex="-1"><span data-dcnode-id="2253" instrument_node="">Study results</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2229" id="glossary-content-113" style="display: none;"><span data-dcnode-id="2251" instrument_node="">A </span><span class="term" data-dcnode-id="2249" data-term="study record" tabindex="-1" title="Click to define"><span data-dcnode-id="2250" instrument_node="">study record</span></span><span data-dcnode-id="2248" instrument_node=""> that includes the summary results posted in the ClinicalTrials.gov </span><span class="term" data-dcnode-id="2246" data-term="results database" tabindex="-1" title="Click to define"><span data-dcnode-id="2247" instrument_node="">results database</span></span><span data-dcnode-id="2245" instrument_node="">. Summary results information includes </span><span class="term" data-dcnode-id="2243" data-term="participant flow" tabindex="-1" title="Click to define"><span data-dcnode-id="2244" instrument_node="">participant flow</span></span><span data-dcnode-id="2242" instrument_node="">, </span><span class="term" data-dcnode-id="2240" data-term="baseline characteristics" tabindex="-1" title="Click to define"><span data-dcnode-id="2241" instrument_node="">baseline characteristics</span></span><span data-dcnode-id="2239" instrument_node="">, </span><span class="term" data-dcnode-id="2237" data-term="outcome measure" tabindex="-1" title="Click to define"><span data-dcnode-id="2238" instrument_node="">outcome measures</span></span><span data-dcnode-id="2236" instrument_node="">, and </span><span class="term" data-dcnode-id="2234" data-term="adverse event" tabindex="-1" title="Click to define"><span data-dcnode-id="2235" instrument_node="">adverse events</span></span><span data-dcnode-id="2233" instrument_node=""> (including </span><span class="term" data-dcnode-id="2231" data-term="serious adverse event" tabindex="-1" title="Click to define"><span data-dcnode-id="2232" instrument_node="">serious adverse events</span></span><span data-dcnode-id="2230" instrument_node="">).</span></div></li><li class="glossary__item" data-dcnode-id="2223"><button aria-controls="glossary-content-114" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2226" tabindex="-1"><span data-dcnode-id="2227" instrument_node="">Study start date</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2224" id="glossary-content-114" style="display: none;"><span data-dcnode-id="2225" instrument_node="">The actual date on which the first participant was enrolled in a clinical study. The "estimated" study start date is the date that the researchers think will be the study start date.</span></div></li><li class="glossary__item" data-dcnode-id="2203"><button aria-controls="glossary-content-115" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2221" tabindex="-1"><span data-dcnode-id="2222" instrument_node="">Study type</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2204" id="glossary-content-115" style="display: none;"><span data-dcnode-id="2220" instrument_node="">Describes the nature of a </span><span class="term" data-dcnode-id="2218" data-term="clinical study" tabindex="-1" title="Click to define"><span data-dcnode-id="2219" instrument_node="">clinical study</span></span><span data-dcnode-id="2217" instrument_node="">. Study types include </span><span class="term" data-dcnode-id="2215" data-term="interventional study (clinical trial)" tabindex="-1" title="Click to define"><span data-dcnode-id="2216" instrument_node="">interventional studies</span></span><span data-dcnode-id="2214" instrument_node=""> (also called clinical trials), </span><span class="term" data-dcnode-id="2212" data-term="observational study" tabindex="-1" title="Click to define"><span data-dcnode-id="2213" instrument_node="">observational studies</span></span><span data-dcnode-id="2211" instrument_node=""> (including </span><span class="term" data-dcnode-id="2209" data-term="patient registry" tabindex="-1" title="Click to define"><span data-dcnode-id="2210" instrument_node="">patient registries</span></span><span data-dcnode-id="2208" instrument_node="">), and </span><span class="term" data-dcnode-id="2206" data-term="expanded access" tabindex="-1" title="Click to define"><span data-dcnode-id="2207" instrument_node="">expanded access</span></span><span data-dcnode-id="2205" instrument_node="">.</span></div></li><li class="glossary__item" data-dcnode-id="2198"><button aria-controls="glossary-content-116" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2201" tabindex="-1"><span data-dcnode-id="2202" instrument_node="">Submitted date</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2199" id="glossary-content-116" style="display: none;"><span data-dcnode-id="2200" instrument_node="">The date on which the study sponsor or investigator submitted a study record that is consistent with National Library of Medicine (NLM) quality control (QC) review criteria.</span></div></li><li class="glossary__item" data-dcnode-id="2190"><button aria-controls="glossary-content-117" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2196" tabindex="-1"><span data-dcnode-id="2197" instrument_node="">Title</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2191" id="glossary-content-117" style="display: none;"><span data-dcnode-id="2195" instrument_node="">The official title of a </span><span class="term" data-dcnode-id="2193" data-term="protocol" tabindex="-1" title="Click to define"><span data-dcnode-id="2194" instrument_node="">protocol</span></span><span data-dcnode-id="2192" instrument_node=""> used to identify a clinical study or a short title written in language intended for the lay public.</span></div></li><li class="glossary__item" data-dcnode-id="2185"><button aria-controls="glossary-content-118" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2188" tabindex="-1"><span data-dcnode-id="2189" instrument_node="">Title acronym</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2186" id="glossary-content-118" style="display: none;"><span data-dcnode-id="2187" instrument_node="">The acronym or initials used to identify a clinical study (not all studies have one). For example, the title acronym for the Women's Health Initiative is "WHI."</span></div></li><li class="glossary__item" data-dcnode-id="2180"><button aria-controls="glossary-content-119" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2183" tabindex="-1"><span data-dcnode-id="2184" instrument_node="">U.S. Agency for Healthcare Research and Quality (AHRQ)</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2181" id="glossary-content-119" style="display: none;"><span data-dcnode-id="2182" instrument_node="">An agency within the U.S. Department of Health and Human Services. AHRQ's mission is to produce evidence to make health care safer, higher quality, more accessible, equitable, and affordable, and to work within the U.S. Department of Health and Human Services and with other partners to make sure that the evidence is understood and used.</span></div></li><li class="glossary__item" data-dcnode-id="2175"><button aria-controls="glossary-content-120" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2178" tabindex="-1"><span data-dcnode-id="2179" instrument_node="">U.S. Food and Drug Administration (FDA)</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2176" id="glossary-content-120" style="display: none;"><span data-dcnode-id="2177" instrument_node="">An agency within the U.S. Department of Health and Human Services. The FDA is responsible for protecting the public health by making sure that human and veterinary drugs, vaccines and other biological products, medical devices, the Nation's food supply, cosmetics, dietary supplements, and products that give off radiation are safe, effective, and secure.</span></div></li><li class="glossary__item" data-dcnode-id="2167"><button aria-controls="glossary-content-121" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2173" tabindex="-1"><span data-dcnode-id="2174" instrument_node="">Unknown</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2168" id="glossary-content-121" style="display: none;"><span data-dcnode-id="2172" instrument_node="">A type of </span><span class="term" data-dcnode-id="2170" data-term="recruitment status" tabindex="-1" title="Click to define"><span data-dcnode-id="2171" instrument_node="">recruitment status</span></span><span data-dcnode-id="2169" instrument_node="">. It identifies a study on ClinicalTrials.gov whose last known status was recruiting; not yet recruiting; or active, not recruiting but that has passed its completion date, and the status has not been verified within the past 2 years. Studies with an unknown status are considered closed studies.</span></div></li></ul><span data-dcnode-id="2165" instrument_node="">

</span><div class="ct-body3" data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">Brief Summary:</span></div><span data-dcnode-id="1483" instrument_node="">
</span><div class="ct-body3 tr-indent2" data-dcnode-id="1477"><p data-dcnode-id="1481" style="margin-top:1ex; margin-bottom:1ex;"><span data-dcnode-id="1482" instrument_node="">This study is about Prostate Health Cocktail, a combination supplement that contains vitamin D3, vitamin E, selenium, green tea extract, saw palmetto, lycopene, and soy derivatives. This product is currently available on the market, as herb and vitamin supplements are not regulated by the FDA. Each ingredient has been studied in prostate cancer cells and/or in patients with prostate cancer. At the doses included in this supplement, no serious side effects have been reported.</span></p><span data-dcnode-id="1480" instrument_node="">
</span><p data-dcnode-id="1478" style="margin-top:0ex; margin-bottom:1ex;"><span data-dcnode-id="1479" instrument_node="">The purpose of this study is to find out whether Prostate Health Cocktail can lower your PSA. Additionally, we will be looking to see whether taking this treatment causes any unexpected side effects, and whether certain blood tests can inform us about your disease status in addition to your PSA</span></p></div><br data-dcnode-id="1476"><span data-dcnode-id="1475" instrument_node="">

</span><div class="ct-body3 tr-indent2" data-dcnode-id="1395"><p data-dcnode-id="1411" style="margin-top:1ex; margin-bottom:1ex;"><span data-dcnode-id="1412" instrument_node="">Objectives of this study are:</span></p><span data-dcnode-id="1410" instrument_node="">
</span><ul data-dcnode-id="1396" style="margin-top:1ex; margin-bottom:1ex;"><span data-dcnode-id="1409" instrument_node="">
</span><li data-dcnode-id="1407" style="margin-top:0.7ex;"><span data-dcnode-id="1408" instrument_node="">To assess the PSA response in prostate cancer patients who have a PSA-only disease recurrence after curative local therapy, during treatment with a combination herbal supplement.</span></li><span data-dcnode-id="1406" instrument_node="">
</span><li data-dcnode-id="1404" style="margin-top:0.7ex;"><span data-dcnode-id="1405" instrument_node="">To qualitatively and quantitatively describe the toxicity profile of this herbal supplement.</span></li><span data-dcnode-id="1403" instrument_node="">
</span><li data-dcnode-id="1401" style="margin-top:0.7ex;"><span data-dcnode-id="1402" instrument_node="">To assess changes in PSA doubling time for subjects treated with this supplement.</span></li><span data-dcnode-id="1400" instrument_node="">
</span><li data-dcnode-id="1398" style="margin-top:0.7ex;"><span data-dcnode-id="1399" instrument_node="">To measure tissue GRP78, serum neuroendocrine markers, and circulating tumor cells, for correlation with treatment response and prostate cancer outcomes</span></li><span data-dcnode-id="1397" instrument_node="">
</span></ul></div><span data-dcnode-id="1394" instrument_node="">
