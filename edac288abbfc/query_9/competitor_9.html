ument_node="">intervention/treatment</span></span><span data-dcnode-id="3503" instrument_node=""> considered to be effective (or active) by health care providers.</span></div></li><li class="glossary__item" data-dcnode-id="3493"><button aria-controls="glossary-content-2" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3499" tabindex="-1"><span data-dcnode-id="3500" instrument_node="">Adverse event</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3494" id="glossary-content-2" style="display: none;"><span data-dcnode-id="3498" instrument_node="">An unfavorable change in the health of a participant, including abnormal laboratory findings, that happens during a clinical study or within a certain amount of time after the study has ended. This change may or may not be caused by the </span><span class="term" data-dcnode-id="3496" data-term="intervention/treatment" tabindex="-1" title="Click to define"><span data-dcnode-id="3497" instrument_node="">intervention/treatment</span></span><span data-dcnode-id="3495" instrument_node=""> being studied.</span></div></li><li class="glossary__item" data-dcnode-id="3476"><button aria-controls="glossary-content-3" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3491" tabindex="-1"><span data-dcnode-id="3492" instrument_node="">Age or age group</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3477" id="glossary-content-3" style="display: none;"><span data-dcnode-id="3490" instrument_node="">A type of </span><span class="term" data-dcnode-id="3488" data-term="eligibility criteria" tabindex="-1" title="Click to define"><span data-dcnode-id="3489" instrument_node="">eligibility criteria</span></span><span data-dcnode-id="3487" instrument_node=""> that indicates the age a person must be to participate in a clinical study. This may be indicated by a specific age or the following age groups:</span><p data-dcnode-id="3485"><span data-dcnode-id="3486" instrument_node="">The age groups are: </span></p><ul data-dcnode-id="3478"><li data-dcnode-id="3483"><span data-dcnode-id="3484" instrument_node="">Child (birth-17)</span></li><li data-dcnode-id="3481"><span data-dcnode-id="3482" instrument_node="">Adult (18-64)</span></li><li data-dcnode-id="3479" style="margin-bottom:-.4em;"><span data-dcnode-id="3480" instrument_node="">Older Adult (65+)</span></li></ul></div></li><li class="glossary__item" data-dcnode-id="3471"><button aria-controls="glossary-content-4" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3474" tabindex="-1"><span data-dcnode-id="3475" instrument_node="">All-cause mortality</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3472" id="glossary-content-4" style="display: none;"><span data-dcnode-id="3473" instrument_node="">A measure of all deaths, due to any cause, that occur during a clinical study.</span></div></li><li class="glossary__item" data-dcnode-id="3463"><button aria-controls="glossary-content-5" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3469" tabindex="-1"><span data-dcnode-id="3470" instrument_node="">Allocation</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3464" id="glossary-content-5" style="display: none;"><span data-dcnode-id="3468" instrument_node="">A method used to assign participants to an arm of a clinical study. The types of allocation are </span><span class="term" data-dcnode-id="3466" data-term="randomized allocation" tabindex="-1" title="Click to define"><span data-dcnode-id="3467" instrument_node="">randomized allocation</span></span><span data-dcnode-id="3465" instrument_node=""> and nonrandomized.</span></div></li><li class="glossary__item" data-dcnode-id="3452"><button aria-controls="glossary-content-6" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3461" tabindex="-1"><span data-dcnode-id="3462" instrument_node="">Arm</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3453" id="glossary-content-6" style="display: none;"><span data-dcnode-id="3460" instrument_node="">A group or subgroup of participants in a clinical trial that receives a specific </span><span class="term" data-dcnode-id="3458" data-term="intervention/treatment" tabindex="-1" title="Click to define"><span data-dcnode-id="3459" instrument_node="">intervention/treatment</span></span><span data-dcnode-id="3457" instrument_node="">, or no intervention, according to the trial's </span><span class="term" data-dcnode-id="3455" data-term="protocol" tabindex="-1" title="Click to define"><span data-dcnode-id="3456" instrument_node="">protocol</span></span><span data-dcnode-id="3454" instrument_node="">.</span></div></li><li class="glossary__item" data-dcnode-id="3432"><button aria-controls="glossary-content-7" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3450" tabindex="-1"><span data-dcnode-id="3451" instrument_node="">Arm type</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3433" id="glossary-content-7" style="display: none;"><span data-dcnode-id="3449" instrument_node="">A general description of the clinical trial arm. It identifies the role of the intervention that participants receive. Types of arms include </span><span class="term" data-dcnode-id="3447" data-term="experimental arm" tabindex="-1" title="Click to define"><span data-dcnode-id="3448" instrument_node="">experimental arm</span></span><span data-dcnode-id="3446" instrument_node="">, </span><span class="term" data-dcnode-id="3444" data-term="active comparator arm" tabindex="-1" title="Click to define"><span data-dcnode-id="3445" instrument_node="">active comparator arm</span></span><span data-dcnode-id="3443" instrument_node="">, </span><span class="term" data-dcnode-id="3441" data-term="placebo comparator arm" tabindex="-1" title="Click to define"><span data-dcnode-id="3442" instrument_node="">placebo comparator arm</span></span><span data-dcnode-id="3440" instrument_node="">, </span><span class="term" data-dcnode-id="3438" data-term="sham comparator arm" tabindex="-1" title="Click to define"><span data-dcnode-id="3439" instrument_node="">sham comparator arm</span></span><span data-dcnode-id="3437" instrument_node="">, and </span><span class="term" data-dcnode-id="3435" data-term="no intervention arm" tabindex="-1" title="Click to define"><span data-dcnode-id="3436" instrument_node="">no intervention arm</span></span><span data-dcnode-id="3434" instrument_node="">.</span></div></li><li class="glossary__item" data-dcnode-id="3427"><button aria-controls="glossary-content-8" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3430" tabindex="-1"><span data-dcnode-id="3431" instrument_node="">Baseline characteristics</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3428" id="glossary-content-8" style="display: none;"><span data-dcnode-id="3429" instrument_node="">Data collected at the beginning of a clinical study for all participants and for each arm or comparison group. These data include demographics, such as age, sex/gender, race and ethnicity, and study-specific measures (for example, systolic blood pressure, prior antidepressant treatment).</span></div></li><li class="glossary__item" data-dcnode-id="3413"><button aria-controls="glossary-content-9" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3425" tabindex="-1"><span data-dcnode-id="3426" instrument_node="">Canceled submission</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3414" id="glossary-content-9" style="display: none;"><span data-dcnode-id="3424" instrument_node="">Indicates that the study sponsor or investigator recalled a submission of </span><span class="term" data-dcnode-id="3422" data-term="study results" tabindex="-1" title="Click to define"><span data-dcnode-id="3423" instrument_node="">study results</span></span><span data-dcnode-id="3421" instrument_node=""> before </span><span class="term" data-dcnode-id="3419" data-term="quality control (qc) review" tabindex="-1" title="Click to define"><span data-dcnode-id="3420" instrument_node="">quality control (QC) review</span></span><span data-dcnode-id="3418" instrument_node=""> took place. If the submission was canceled on or after May 8, 2018, the date is shown. After submission of study results, a </span><span class="term" data-dcnode-id="3416" data-term="study record" tabindex="-1" title="Click to define"><span data-dcnode-id="3417" instrument_node="">study record</span></span><span data-dcnode-id="3415" instrument_node=""> cannot be modified until QC review is completed, unless the submission is canceled.</span></div></li><li class="glossary__item" data-dcnode-id="3402"><button aria-controls="glossary-content-10" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3411" tabindex="-1"><span data-dcnode-id="3412" instrument_node="">Certain agreements</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3403" id="glossary-content-10" style="display: none;"><span data-dcnode-id="3410" instrument_node="">Information required by the </span><span class="term" data-dcnode-id="3408" data-term="food and drug administration amendments act of 2007, section 801 (fdaaa 801)" tabindex="-1" title="Click to define"><span data-dcnode-id="3409" instrument_node="">Food and Drug Administration Amendments Act of 2007</span></span><span data-dcnode-id="3407" instrument_node="">. In general, this is a description of any agreement between the sponsor of a clinical study and the </span><span class="term" data-dcnode-id="3405" data-term="principal investigator (pi)" tabindex="-1" title="Click to define"><span data-dcnode-id="3406" instrument_node="">principal investigator</span></span><span data-dcnode-id="3404" instrument_node=""> (PI) that does not allow the PI to discuss the results of the study or publish the study results in a scientific or academic journal after the study is completed.</span></div></li><li class="glossary__item" data-dcnode-id="3391"><button aria-controls="glossary-content-11" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3400" tabindex="-1"><span data-dcnode-id="3401" instrument_node="">Certification</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3392" id="glossary-content-11" style="display: none;"><span data-dcnode-id="3399" instrument_node="">A sponsor or investigator may submit a certification to delay submission of results information if they are applying for FDA approval of a new drug or device, or new use of an already approved drug or device. A sponsor or investigator who submits a certification can delay results submission up to 2 years after the </span><span class="term" data-dcnode-id="3397" data-term="certification/extension first submitted" tabindex="-1" title="Click to define"><span data-dcnode-id="3398" instrument_node="">certification/extension first submitted</span></span><span data-dcnode-id="3396" instrument_node=""> date, unless certain events occur sooner. See </span><a data-dcnode-id="3394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//prsinfo.clinicaltrials.gov/results_definitions.html%23DelayResultsType" style="text-decoration:underline dotted" tabindex="-1" target="_blank"><span data-dcnode-id="3395" instrument_node="">Delay Results Type</span></a><span data-dcnode-id="3393" instrument_node=""> in the Results Data Element definitions for more information about this certification.</span></div></li><li class="glossary__item" data-dcnode-id="3377"><button aria-controls="glossary-content-12" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3389" tabindex="-1"><span data-dcnode-id="3390" instrument_node="">Certification/extension first posted</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3378" id="glossary-content-12" style="display: none;"><span data-dcnode-id="3388" instrument_node="">The date on which information about a </span><span class="term" data-dcnode-id="3386" data-term="certification" tabindex="-1" title="Click to define"><span data-dcnode-id="3387" instrument_node="">certification</span></span><span data-dcnode-id="3385" instrument_node=""> to delay submission of results or an </span><span class="term" data-dcnode-id="3383" data-term="extension request" tabindex="-1" title="Click to define"><span data-dcnode-id="3384" instrument_node="">extension request</span></span><span data-dcnode-id="3382" instrument_node=""> was first available on ClinicalTrials.gov. ClinicalTrials.gov does not indicate whether the submission was a certification or extension request. There is typically a delay between the date the study sponsor or investigator submitted the certification or extension request and the </span><span class="term" data-dcnode-id="3380" data-term="first posted" tabindex="-1" title="Click to define"><span data-dcnode-id="3381" instrument_node="">first posted date</span></span><span data-dcnode-id="3379" instrument_node="">.</span></div></li><li class="glossary__item" data-dcnode-id="3363"><button aria-controls="glossary-content-13" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3375" tabindex="-1"><span data-dcnode-id="3376" instrument_node="">Certification/extension first submitted</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3364" id="glossary-content-13" style="display: none;"><span data-dcnode-id="3374" instrument_node="">The date on which the study sponsor or investigator first submitted a </span><span class="term" data-dcnode-id="3372" data-term="certification" tabindex="-1" title="Click to define"><span data-dcnode-id="3373" instrument_node="">certification</span></span><span data-dcnode-id="3371" instrument_node=""> or an </span><span class="term" data-dcnode-id="3369" data-term="extension request" tabindex="-1" title="Click to define"><span data-dcnode-id="3370" instrument_node="">extension request</span></span><span data-dcnode-id="3368" instrument_node=""> to delay submission of results. A sponsor or investigator who submits a certification can delay results submission up to 2 years after this date, unless certain events occur sooner. There is typically a delay between the date the certification or extension request was submitted and the date the information is first available on ClinicalTrials.gov (</span><span class="term" data-dcnode-id="3366" data-term="certification/extension first posted" tabindex="-1" title="Click to define"><span data-dcnode-id="3367" instrument_node="">certification/extension first posted</span></span><span data-dcnode-id="3365" instrument_node="">).</span></div></li><li class="glossary__item" data-dcnode-id="3349"><button aria-controls="glossary-content-14" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3361" tabindex="-1"><span data-dcnode-id="3362" instrument_node="">Certification/extension first submitted that met QC criteria</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3350" id="glossary-content-14" style="display: none;"><span data-dcnode-id="3360" instrument_node="">The date on which the study sponsor or investigator first submitted a </span><span class="term" data-dcnode-id="3358" data-term="certification" tabindex="-1" title="Click to define"><span data-dcnode-id="3359" instrument_node="">certification</span></span><span data-dcnode-id="3357" instrument_node=""> or an </span><span class="term" data-dcnode-id="3355" data-term="extension request" tabindex="-1" title="Click to define"><span data-dcnode-id="3356" instrument_node="">extension request</span></span><span data-dcnode-id="3354" instrument_node=""> that is consistent with National Library of Medicine (NLM) </span><span class="term" data-dcnode-id="3352" data-term="quality control (qc) review" tabindex="-1" title="Click to define"><span data-dcnode-id="3353" instrument_node="">quality control (QC) review</span></span><span data-dcnode-id="3351" instrument_node=""> criteria. The sponsor or investigator may need to revise and submit a certification or extension request one or more times before NLM's QC review criteria are met. It is the responsibility of the sponsor or investigator to ensure that the study record is consistent with the NLM QC review criteria. Meeting QC criteria for an extension request does not mean that the National Institutes of Health (NIH) has determined that the request demonstrates good cause. The process for review and granting of extension requests by the NIH is being developed.</span></div></li><li class="glossary__item" data-dcnode-id="3341"><button aria-controls="glossary-content-15" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3347" tabindex="-1"><span data-dcnode-id="3348" instrument_node="">City and distance</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3342" id="glossary-content-15" style="display: none;"><span data-dcnode-id="3346" instrument_node="">In the search feature, the City field is used to find clinical studies with locations in a specific city. The Distance field is used to find studies with locations within the specified distance from a city in number of miles. For example, if you choose Illinois as the </span><span class="term" data-dcnode-id="3344" data-term="state" tabindex="-1" title="Click to define"><span data-dcnode-id="3345" instrument_node="">state</span></span><span data-dcnode-id="3343" instrument_node="">, identifying "Chicago" as the city and "100 miles" as the distance will find all studies listing a location within 100 miles of Chicago.</span></div></li><li class="glossary__item" data-dcnode-id="3330"><button aria-controls="glossary-content-16" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3339" tabindex="-1"><span data-dcnode-id="3340" instrument_node="">Clinical study</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3331" id="glossary-content-16" style="display: none;"><span data-dcnode-id="3338" instrument_node="">A research study involving human volunteers (also called participants) that is intended to add to medical knowledge. There are two types of clinical studies: </span><span class="term" data-dcnode-id="3336" data-term="interventional study (clinical trial)" tabindex="-1" title="Click to define"><span data-dcnode-id="3337" instrument_node="">interventional studies</span></span><span data-dcnode-id="3335" instrument_node=""> (also called clinical trials) and </span><span class="term" data-dcnode-id="3333" data-term="observational study" tabindex="-1" title="Click to define"><span data-dcnode-id="3334" instrument_node="">observational studies</span></span><span data-dcnode-id="3332" instrument_node="">.</span></div></li><li class="glossary__item" data-dcnode-id="3322"><button aria-controls="glossary-content-17" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3328" tabindex="-1"><span data-dcnode-id="3329" instrument_node="">Clinical trial</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3323" id="glossary-content-17" style="display: none;"><span data-dcnode-id="3327" instrument_node="">Another name for an </span><span class="term" data-dcnode-id="3325" data-term="interventional study (clinical trial)" tabindex="-1" title="Click to define"><span data-dcnode-id="3326" instrument_node="">interventional study</span></span><span data-dcnode-id="3324" instrument_node="">.</span></div></li><li class="glossary__item" data-dcnode-id="3314"><button aria-controls="glossary-content-18" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3320" tabindex="-1"><span data-dcnode-id="3321" instrument_node="">ClinicalTrials.gov identifier (NCT number)</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3315" id="glossary-content-18" style="display: none;"><span data-dcnode-id="3319" instrument_node="">The unique identification code given to each clinical study upon </span><span class="term" data-dcnode-id="3317" data-term="registration" tabindex="-1" title="Click to define"><span data-dcnode-id="3318" instrument_node="">registration</span></span><span data-dcnode-id="3316" instrument_node=""> at ClinicalTrials.gov. The format is "NCT" followed by an 8-digit number (for example, NCT00000419).</span></div></li><li class="glossary__item" data-dcnode-id="3306"><button aria-controls="glossary-content-19" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3312" tabindex="-1"><span data-dcnode-id="3313" instrument_node="">Collaborator</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3307" id="glossary-content-19" style="display: none;"><span data-dcnode-id="3311" instrument_node="">An organization other than the </span><span class="term" data-dcnode-id="3309" data-term="sponsor" tabindex="-1" title="Click to define"><span data-dcnode-id="3310" instrument_node="">sponsor</span></span><span data-dcnode-id="3308" instrument_node=""> that provides support for a clinical study. This support may include activities related to funding, design, implementation, data analysis, or reporting.</span></div></li><li class="glossary__item" data-dcnode-id="3301"><button aria-controls="glossary-content-20" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3304" tabindex="-1"><span data-dcnode-id="3305" instrument_node="">Condition/disease</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3302" id="glossary-content-20" style="display: none;"><span data-dcnode-id="3303" instrument_node="">The disease, disorder, syndrome, illness, or injury that is being studied. On ClinicalTrials.gov, conditions may also include other health-related issues, such as lifespan, quality of life, and health risks.</span></div></li><li class="glossary__item" data-dcnode-id="3296"><button aria-controls="glossary-content-21" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3299" tabindex="-1"><span data-dcnode-id="3300" instrument_node="">Contact</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3297" id="glossary-content-21" style="display: none;"><span data-dcnode-id="3298" instrument_node="">The name and contact information for the person who can answer enrollment questions for a clinical study. Each location where the study is being conducted may also have a specific contact, who may be better able to answer those questions.</span></div></li><li class="glossary__item" data-dcnode-id="3285"><button aria-controls="glossary-content-22" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3294" tabindex="-1"><span data-dcnode-id="3295" instrument_node="">Country</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3286" id="glossary-content-22" style="display: none;"><span data-dcnode-id="3293" instrument_node="">In the search feature, the Country field is used to find clinical studies with locations in a specific country. For example,  if you choose the United States, you can then narrow your search by selecting a </span><span class="term" data-dcnode-id="3291" data-term="state" tabindex="-1" title="Click to define"><span data-dcnode-id="3292" instrument_node="">state</span></span><span data-dcnode-id="3290" instrument_node=""> and identifying a </span><span class="term" data-dcnode-id="3288" data-term="city and distance" tabindex="-1" title="Click to define"><span data-dcnode-id="3289" instrument_node="">city and distance</span></span><span data-dcnode-id="3287" instrument_node="">.</span></div></li><li class="glossary__item" data-dcnode-id="3277"><button aria-controls="glossary-content-23" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3283" tabindex="-1"><span data-dcnode-id="3284" instrument_node="">Cross-over assignment</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3278" id="glossary-content-23" style="display: none;"><span data-dcnode-id="3282" instrument_node="">A type of </span><span class="term" data-dcnode-id="3280" data-term="intervention model" tabindex="-1" title="Click to define"><span data-dcnode-id="3281" instrument_node="">intervention model</span></span><span data-dcnode-id="3279" instrument_node=""> describing a clinical trial in which groups of participants receive two or more interventions in a specific order. For example, two-by-two cross-over assignment involves two groups of participants. One group receives drug A during the initial phase of the trial, followed by drug B during a later phase. The other group receives drug B during the initial phase, followed by drug A. So during the trial, participants "cross over" to the other drug. All participants receive drug A and drug B at some point during the trial but in a different order, depending on the group to which they are assigned.</span></div></li><li class="glossary__item" data-dcnode-id="3269"><button aria-controls="glossary-content-24" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3275" tabindex="-1"><span data-dcnode-id="3276" instrument_node="">Data Monitoring Committee (DMC)</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3270" id="glossary-content-24" style="display: none;"><span data-dcnode-id="3274" instrument_node="">A group of independent scientists who monitor the safety and scientific integrity of a </span><span class="term" data-dcnode-id="3272" data-term="clinical trial" tabindex="-1" title="Click to define"><span data-dcnode-id="3273" instrument_node="">clinical trial</span></span><span data-dcnode-id="3271" instrument_node="">. The DMC can recommend to the sponsor that the trial be stopped if it is not effective, is harming participants, or is unlikely to serve its scientific purpose. Members are chosen based on the scientific skills and knowledge needed to monitor the particular trial. Also called a data safety and monitoring board, or DSMB.</span></div></li><li class="glossary__item" data-dcnode-id="3258"><button aria-controls="glossary-content-25" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3267" tabindex="-1"><span data-dcnode-id="3268" instrument_node="">Early Phase 1 (formerly listed as Phase 0)</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3259" id="glossary-content-25" style="display: none;"><span data-dcnode-id="3266" instrument_node="">A </span><span class="term" data-dcnode-id="3264" data-term="phase" tabindex="-1" title="Click to define"><span data-dcnode-id="3265" instrument_node="">phase</span></span><span data-dcnode-id="3263" instrument_node=""> of research used to describe exploratory trials conducted before traditional </span><span class="term" data-dcnode-id="3261" data-term="phase 1" tabindex="-1" title="Click to define"><span data-dcnode-id="3262" instrument_node="">phase 1</span></span><span data-dcnode-id="3260" instrument_node=""> trials to investigate how or whether a drug affects the body. They involve very limited human exposure to the drug and have no therapeutic or diagnostic goals (for example, screening studies, microdose studies).</span></div></li><li class="glossary__item" data-dcnode-id="3238"><button aria-controls="glossary-content-26" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3256" tabindex="-1"><span data-dcnode-id="3257" instrument_node="">Eligibility criteria</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3239" id="glossary-content-26" style="display: none;"><span data-dcnode-id="3255" instrument_node="">The key requirements that people who want to participate in a clinical study must meet or the characteristics they must have. Eligibility criteria consist of both </span><span class="term" data-dcnode-id="3253" data-term="inclusion criteria" tabindex="-1" title="Click to define"><span data-dcnode-id="3254" instrument_node="">inclusion criteria</span></span><span data-dcnode-id="3252" instrument_node=""> (which are required for a person to participate in the study) and </span><span class="term" data-dcnode-id="3250" data-term="exclusion criteria" tabindex="-1" title="Click to define"><span data-dcnode-id="3251" instrument_node="">exclusion criteria</span></span><span data-dcnode-id="3249" instrument_node=""> (which prevent a person from participating). Types of eligibility criteria include whether a study </span><span class="term" data-dcnode-id="3247" data-term="accepts healthy volunteers" tabindex="-1" title="Click to define"><span data-dcnode-id="3248" instrument_node=""> accepts healthy volunteers</span></span><span data-dcnode-id="3246" instrument_node="">, has </span><span class="term" data-dcnode-id="3244" data-term="age or age group" tabindex="-1" title="Click to define"><span data-dcnode-id="3245" instrument_node="">age or age group</span></span><span data-dcnode-id="3243" instrument_node=""> requirements, or is limited by </span><span class="term" data-dcnode-id="3241" data-term="sex" tabindex="-1" title="Click to define"><span data-dcnode-id="3242" instrument_node="">sex</span></span><span data-dcnode-id="3240" instrument_node="">.</span></div></li><li class="glossary__item" data-dcnode-id="3233"><button aria-controls="glossary-content-27" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3236" tabindex="-1"><span data-dcnode-id="3237" instrument_node="">Enrollment</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3234" id="glossary-content-27" style="display: none;"><span data-dcnode-id="3235" instrument_node="">The number of participants in a clinical study. The "estimated" enrollment is the target number of participants that the researchers need for the study.</span></div></li><li class="glossary__item" data-dcnode-id="3225"><button aria-controls="glossary-content-28" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3231" tabindex="-1"><span data-dcnode-id="3232" instrument_node="">Exclusion criteria</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3226" id="glossary-content-28" style="display: none;"><span data-dcnode-id="3230" instrument_node="">A type of </span><span class="term" data-dcnode-id="3228" data-term="eligibility criteria" tabindex="-1" title="Click to define"><span data-dcnode-id="3229" instrument_node="">eligibility criteria</span></span><span data-dcnode-id="3227" instrument_node="">. These are reasons that a person is not allowed to participate in a clinical study.</span></div></li><li class="glossary__item" data-dcnode-id="3209"><button aria-controls="glossary-content-29" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3223" tabindex="-1"><span data-dcnode-id="3224" instrument_node="">Expanded access</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3210" id="glossary-content-29" style="display: none;"><span data-dcnode-id="3222" instrument_node="">A way for patients with serious diseases or conditions who cannot participate in a clinical trial to gain access to a medical product that has not been approved by the </span><span class="term" data-dcnode-id="3220" data-term="u.s. food and drug administration (fda)" tabindex="-1" title="Click to define"><span data-dcnode-id="3221" instrument_node="">U.S. Food and Drug Administration (FDA)</span></span><span data-dcnode-id="3219" instrument_node="">. Also called compassionate use.  There are different </span><span class="term" data-dcnode-id="3217" data-term="expanded access type" tabindex="-1" title="Click to define"><span data-dcnode-id="3218" instrument_node="">expanded access types</span></span><span data-dcnode-id="3216" instrument_node="">. </span><p data-dcnode-id="3211" style="margin-bottom:-.4em;"><span data-dcnode-id="3215" instrument_node="">For more information, see FDA </span><a data-dcnode-id="3213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fda.gov/news-events/public-health-focus/expanded-access" style="text-decoration:underline dotted" tabindex="-1" target="_blank"><span data-dcnode-id="3214" instrument_node="">Expanded Access: Information for Patients</span></a><span data-dcnode-id="3212" instrument_node="">.</span></p></div></li><li class="glossary__item" data-dcnode-id="3176"><button aria-controls="glossary-content-30" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3207" tabindex="-1"><span data-dcnode-id="3208" instrument_node="">Expanded access status</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3177" id="glossary-content-30" style="display: none;"><ul data-dcnode-id="3178"><li data-dcnode-id="3200"><strong data-dcnode-id="3205"><span data-dcnode-id="3206" instrument_node="">Available:</span></strong><span data-dcnode-id="3204" instrument_node=""> </span><span class="term" data-dcnode-id="3202" data-term="expanded access" tabindex="-1" title="Click to define"><span data-dcnode-id="3203" instrument_node="">Expanded access</span></span><span data-dcnode-id="3201" instrument_node=""> is currently available for this investigational treatment, and patients who are not participants in the clinical study may be able to gain access to the drug, biologic, or medical device being studied.</span></li><li data-dcnode-id="3193"><strong data-dcnode-id="3198"><span data-dcnode-id="3199" instrument_node="">No longer available:</span></strong><span data-dcnode-id="3197" instrument_node=""> </span><span class="term" data-dcnode-id="3195" data-term="expanded access" tabindex="-1" title="Click to define"><span data-dcnode-id="3196" instrument_node="">Expanded access</span></span><span data-dcnode-id="3194" instrument_node=""> was available for this intervention previously but is not currently available and will not be available in the future.</span></li><li data-dcnode-id="3186"><strong data-dcnode-id="3191"><span data-dcnode-id="3192" instrument_node="">Temporarily not available:</span></strong><span data-dcnode-id="3190" instrument_node=""> </span><span class="term" data-dcnode-id="3188" data-term="expanded access" tabindex="-1" title="Click to define"><span data-dcnode-id="3189" instrument_node="">Expanded access</span></span><span data-dcnode-id="3187" instrument_node=""> is not currently available for this intervention but is expected to be available in the future.</span></li><li data-dcnode-id="3179"><strong data-dcnode-id="3184"><span data-dcnode-id="3185" instrument_node="">Approved for marketing:</span></strong><span data-dcnode-id="3183" instrument_node=""> The intervention has been approved by the </span><span class="term" data-dcnode-id="3181" data-term="u.s. food and drug administration (fda)" tabindex="-1" title="Click to define"><span data-dcnode-id="3182" instrument_node=""> U.S. Food and Drug Administration</span></span><span data-dcnode-id="3180" instrument_node=""> for use by the public.</span></li></ul></div></li><li class="glossary__item" data-dcnode-id="3139"><button aria-controls="glossary-content-31" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3174" tabindex="-1"><span data-dcnode-id="3175" instrument_node="">Expanded access type</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3140" id="glossary-content-31" style="display: none;"><span data-dcnode-id="3173" instrument_node="">Describes the category of </span><span class="term" data-dcnode-id="3171" data-term="expanded access" tabindex="-1" title="Click to define"><span data-dcnode-id="3172" instrument_node="">expanded access</span></span><span data-dcnode-id="3170" instrument_node=""> under </span><span class="term" data-dcnode-id="3168" data-term="u.s. food and drug administration (fda)" tabindex="-1" title="Click to define"><span data-dcnode-id="3169" instrument_node="">U.S. Food and Drug Administration (FDA)</span></span><span data-dcnode-id="3167" instrument_node=""> regulations. There are three types of expanded access: </span><ul data-dcnode-id="3141"><li data-dcnode-id="3160"><strong data-dcnode-id="3165"><span data-dcnode-id="3166" instrument_node="">Individual Patients</span></strong><span data-dcnode-id="3164" instrument_node="">: Allows a single patient, with a serious disease or condition who cannot participate in a clinical trial, access to a drug or biological product that has not been approved by the </span><span class="term" data-dcnode-id="3162" data-term="u.s. food and drug administration (fda)" tabindex="-1" title="Click to define"><span data-dcnode-id="3163" instrument_node="">FDA</span></span><span data-dcnode-id="3161" instrument_node="">. This category also includes access in an emergency situation.</span></li><li data-dcnode-id="3150"><strong data-dcnode-id="3158"><span data-dcnode-id="3159" instrument_node="">Intermediate-size Population</span></strong><span data-dcnode-id="3157" instrument_node="">: Allows more than one patient (but generally fewer patients than through a Treatment IND/Protocol) access to a drug or biological product that has not been approved by the </span><span class="term" data-dcnode-id="3155" data-term="u.s. food and drug administration (fda)" tabindex="-1" title="Click to define"><span data-dcnode-id="3156" instrument_node="">FDA</span></span><span data-dcnode-id="3154" instrument_node="">.  This type of expanded access is used when multiple patients with the same disease or condition seek access to a specific drug or biological product that has not been approved by the </span><span class="term" data-dcnode-id="3152" data-term="u.s. food and drug administration (fda)" tabindex="-1" title="Click to define"><span data-dcnode-id="3153" instrument_node="">FDA</span></span><span data-dcnode-id="3151" instrument_node="">.</span></li><li data-dcnode-id="3142"><strong data-dcnode-id="3147"><a data-dcnode-id="3149" id="treatment-ind" tabindex="-1"></a><span data-dcnode-id="3148" instrument_node="">Treatment IND/Protocol</span></strong><span data-dcnode-id="3146" instrument_node="">: Allows a large, widespread population access to a drug or biological product that has not been approved by the </span><span class="term" data-dcnode-id="3144" data-term="u.s. food and drug administration (fda)" tabindex="-1" title="Click to define"><span data-dcnode-id="3145" instrument_node="">FDA</span></span><span data-dcnode-id="3143" instrument_node="">. This type of expanded access can only be provided if the product is already being developed for marketing for the same use as the expanded access use.</span></li></ul></div></li><li class="glossary__item" data-dcnode-id="3128"><button aria-controls="glossary-content-32" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3137" tabindex="-1"><span data-dcnode-id="3138" instrument_node="">Experimental arm</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3129" id="glossary-content-32" style="display: none;"><span data-dcnode-id="3136" instrument_node="">An </span><span class="term" data-dcnode-id="3134" data-term="arm type" tabindex="-1" title="Click to define"><span data-dcnode-id="3135" instrument_node="">arm type</span></span><span data-dcnode-id="3133" instrument_node=""> in which a group of participants receives the </span><span class="term" data-dcnode-id="3131" data-term="intervention/treatment" tabindex="-1" title="Click to define"><span data-dcnode-id="3132" instrument_node="">intervention/treatment</span></span><span data-dcnode-id="3130" instrument_node=""> that is the focus of the clinical trial.</span></div></li><li class="glossary__item" data-dcnode-id="3114"><button aria-controls="glossary-content-33" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3126" tabindex="-1"><span data-dcnode-id="3127" instrument_node="">Extension request</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3115" id="glossary-content-33" style="display: none;"><span data-dcnode-id="3125" instrument_node="">In certain circumstances, a sponsor or investigator may request an extension to delay the standard results submission deadline (generally one year after the </span><span class="term" data-dcnode-id="3123" data-term="primary completion date" tabindex="-1" title="Click to define"><span data-dcnode-id="3124" instrument_node="">primary completion date</span></span><span data-dcnode-id="3122" instrument_node="">). The request for an extension must demonstrate good cause (for example, the need to preserve the scientific integrity of an ongoing </span><span class="term" data-dcnode-id="3120" data-term="masking" tabindex="-1" title="Click to define"><span data-dcnode-id="3121" instrument_node="">masked</span></span><span data-dcnode-id="3119" instrument_node=""> trial). All requests must be reviewed and granted by the National Institutes of Health. This process for review and granting of extension requests is being developed. See </span><a data-dcnode-id="3117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//prsinfo.clinicaltrials.gov/results_definitions.html%23DelayResultsType" style="text-decoration:underline dotted" tabindex="-1" target="_blank"><span data-dcnode-id="3118" instrument_node="">Delay Results Type</span></a><span data-dcnode-id="3116" instrument_node=""> in the Results Data Element definitions for more information.</span></div></li><li class="glossary__item" data-dcnode-id="3106"><button aria-controls="glossary-content-34" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3112" tabindex="-1"><span data-dcnode-id="3113" instrument_node="">Factorial assignment</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3107" id="glossary-content-34" style="display: none;"><span data-dcnode-id="3111" instrument_node="">A type of </span><span class="term" data-dcnode-id="3109" data-term="intervention model" tabindex="-1" title="Click to define"><span data-dcnode-id="3110" instrument_node="">intervention model</span></span><span data-dcnode-id="3108" instrument_node=""> describing a clinical trial in which groups of participants receive one of several combinations of interventions. For example, two-by-two factorial assignment involves four groups of participants. Each group receives one of the following pairs of interventions: (1) drug A and drug B, (2) drug A and a placebo, (3) a placebo and drug B, or (4) a placebo and a placebo. So during the trial, all possible combinations of the two drugs (A and B) and the placebos are given to different groups of participants.</span></div></li><li class="glossary__item" data-dcnode-id="3085"><button aria-controls="glossary-content-35" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3104" tabindex="-1"><span data-dcnode-id="3105" instrument_node="">FDAAA 801 Violations</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3086" id="glossary-content-35" style="display: none;"><span data-dcnode-id="3103" instrument_node="">A FDAAA 801 Violation is shown on a study record when the U.S. Food and Drug Administration (FDA) has issued a Notice of Noncompliance to the responsible party of an applicable clinical trial. A Notice of Noncompliance indicates that the FDA has determined the responsible party was not in compliance with the registration or results reporting requirements for the clinical trial under the Food and Drug Administration Amendments Act of 2007, Section 801 (FDAAA 801).</span><p data-dcnode-id="3101"><span data-dcnode-id="3102" instrument_node="">The National Library of Medicine (NLM) is required by FDAAA 801 to add information to a study record about any FDAAA 801 Violation. This information is provided by the FDA. There are three categories of information that may be included:</span></p><ul data-dcnode-id="3087"><li data-dcnode-id="3092"><span data-dcnode-id="3100" instrument_node="">Violation: Shown when the FDA issues a Notice of Noncompliance and posts the Notice of Noncompliance on its designated webpage. There are three types of violations:</span><ul data-dcnode-id="3093"><li data-dcnode-id="3098"><span data-dcnode-id="3099" instrument_node="">Failure to submit required clinical trial information</span></li><li data-dcnode-id="3096"><span data-dcnode-id="3097" instrument_node="">Submission of false or misleading clinical trial information</span></li><li data-dcnode-id="3094"><span data-dcnode-id="3095" instrument_node="">Failure to submit primary and secondary outcomes</span></li></ul></li><li data-dcnode-id="3090"><span data-dcnode-id="3091" instrument_node="">Correction: Shown when the FDA confirms that the responsible party has updated the study record to correct the violation and posts the correction notice on its designated webpage.  Because of the time for FDA review and processing, there may be a delay between the date when the study record was updated and the addition of correction information to the FDAAA 801 Violation information. </span></li><li data-dcnode-id="3088"><span data-dcnode-id="3089" instrument_node="">Penalty: Shown when the FDA imposes a penalty for the violation and posts the penalty notice on its designated webpage.</span></li></ul></div></li><li class="glossary__item" data-dcnode-id="3077"><button aria-controls="glossary-content-36" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3083" tabindex="-1"><span data-dcnode-id="3084" instrument_node="">First posted</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3078" id="glossary-content-36" style="display: none;"><span data-dcnode-id="3082" instrument_node="">The date on which the study record was first available on ClinicalTrials.gov after National Library of Medicine (NLM) </span><a data-dcnode-id="3080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//prsinfo.clinicaltrials.gov/ResultsDetailedReviewItems.pdf" style="text-decoration:underline dotted" tabindex="-1" target="_blank"><span data-dcnode-id="3081" instrument_node="">quality control (QC) review</span></a><span data-dcnode-id="3079" instrument_node=""> has concluded. There is typically a delay of a few days between the date the study sponsor or investigator submitted the study record and the first posted date.</span></div></li><li class="glossary__item" data-dcnode-id="3072"><button aria-controls="glossary-content-37" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3075" tabindex="-1"><span data-dcnode-id="3076" instrument_node="">First submitted</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3073" id="glossary-content-37" style="display: none;"><span data-dcnode-id="3074" instrument_node="">The date on which the study sponsor or investigator first submitted a study record to ClinicalTrials.gov. There is typically a delay of a few days between the first submitted date and the record's availability on ClinicalTrials.gov (the first posted date).</span></div></li><li class="glossary__item" data-dcnode-id="3061"><button aria-controls="glossary-content-38" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3070" tabindex="-1"><span data-dcnode-id="3071" instrument_node="">First submitted that met QC criteria</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3062" id="glossary-content-38" style="display: none;"><span data-dcnode-id="3069" instrument_node="">The date on which the study sponsor or investigator first submits a </span><span class="term" data-dcnode-id="3067" data-term="study record" tabindex="-1" title="Click to define"><span data-dcnode-id="3068" instrument_node="">study record</span></span><span data-dcnode-id="3066" instrument_node=""> that is consistent with National Library of Medicine (NLM) </span><span class="term" data-dcnode-id="3064" data-term="quality control (qc) review" tabindex="-1" title="Click to define"><span data-dcnode-id="3065" instrument_node="">quality control (QC) review</span></span><span data-dcnode-id="3063" instrument_node=""> criteria. The sponsor or investigator may need to revise and submit a study record one or more times before NLM's QC review criteria are met. It is the responsibility of the sponsor or investigator to ensure that the study record is consistent with the NLM QC review criteria.</span></div></li><li class="glossary__item" data-dcnode-id="3050"><button aria-controls="glossary-content-39" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3059" tabindex="-1"><span data-dcnode-id="3060" instrument_node="">Food and Drug Administration Amendments Act of 2007, Section 801 (FDAAA 801)</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3051" id="glossary-content-39" style="display: none;"><span data-dcnode-id="3058" instrument_node="">U.S. Public Law 110-85, which was enacted on September 27, 2007. Section 801 of FDAAA amends Section 402 of the U.S. Public Health Service Act to expand ClinicalTrials.gov and create a clinical study </span><span class="term" data-dcnode-id="3056" data-term="results database" tabindex="-1" title="Click to define"><span data-dcnode-id="3057" instrument_node="">results database</span></span><span data-dcnode-id="3055" instrument_node="">. For more information on FDAAA 801, see the </span><a data-dcnode-id="3053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//clinicaltrials.gov/ct2/about-site/history" style="text-decoration:underline dotted" tabindex="-1" target="_blank"><span data-dcnode-id="3054" instrument_node="">History, Policies, and Laws</span></a><span data-dcnode-id="3052" instrument_node=""> page on this site.</span></div></li><li class="glossary__item" data-dcnode-id="3030"><button aria-controls="glossary-content-40" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3048" tabindex="-1"><span data-dcnode-id="3049" instrument_node="">Funder type</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3031" id="glossary-content-40" style="display: none;"><span data-dcnode-id="3047" instrument_node="">Describes the organization that provides funding or support for a clinical study. This support may include activities related to funding, design, implementation, data analysis, or reporting. Organizations listed as </span><span class="term" data-dcnode-id="3045" data-term="sponsor" tabindex="-1" title="Click to define"><span data-dcnode-id="3046" instrument_node="">sponsors</span></span><span data-dcnode-id="3044" instrument_node=""> and </span><span class="term" data-dcnode-id="3042" data-term="collaborator" tabindex="-1" title="Click to define"><span data-dcnode-id="3043" instrument_node="">collaborators</span></span><span data-dcnode-id="3041" instrument_node=""> for a study are considered the funders of the study. ClinicalTrials.gov refers to four types of funders: </span><ul data-dcnode-id="3032"><li data-dcnode-id="3039"><span data-dcnode-id="3040" instrument_node="">U.S. National Institutes of Health</span></li><li data-dcnode-id="3037"><span data-dcnode-id="3038" instrument_node="">Other U.S. Federal agencies (for example, Food and Drug Administration, Centers for Disease Control and Prevention, or U.S. Department of Veterans Affairs)</span></li><li data-dcnode-id="3035"><span data-dcnode-id="3036" instrument_node="">Industry (for example: pharmaceutical and device companies)</span></li><li data-dcnode-id="3033"><span data-dcnode-id="3034" instrument_node="">All others (including individuals, universities, and community-based organizations)</span></li></ul></div></li><li class="glossary__item" data-dcnode-id="3019"><button aria-controls="glossary-content-41" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3028" tabindex="-1"><span data-dcnode-id="3029" instrument_node="">Gender-based eligibility</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3020" id="glossary-content-41" style="display: none;"><span data-dcnode-id="3027" instrument_node="">A type of </span><span class="term" data-dcnode-id="3025" data-term="eligibility criteria" tabindex="-1" title="Click to define"><span data-dcnode-id="3026" instrument_node="">eligibility criteria</span></span><span data-dcnode-id="3024" instrument_node=""> that indicates whether eligibility to participate in a clinical study is based a person's self-representation of gender identity or gender (yes, no). Gender is distinct from </span><span class="term" data-dcnode-id="3022" data-term="sex" tabindex="-1" title="Click to define"><span data-dcnode-id="3023" instrument_node="">sex</span></span><span data-dcnode-id="3021" instrument_node="">.</span></div></li><li class="glossary__item" data-dcnode-id="3011"><button aria-controls="glossary-content-42" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3017" tabindex="-1"><span data-dcnode-id="3018" instrument_node="">Group/cohort</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="3012" id="glossary-content-42" style="display: none;"><span data-dcnode-id="3016" instrument_node="">A group or subgroup of participants in an </span><span class="term" data-dcnode-id="3014" data-term="observational study" tabindex="-1" title="Click to define"><span data-dcnode-id="3015" instrument_node="">observational study</span></span><span data-dcnode-id="3013" instrument_node=""> that is assessed for biomedical or health outcomes.</span></div></li><li class="glossary__item" data-dcnode-id="2995"><button aria-controls="glossary-content-43" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="3009" tabindex="-1"><span data-dcnode-id="3010" instrument_node="">Human subjects protection review board</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2996" id="glossary-content-43" style="display: none;"><span data-dcnode-id="3008" instrument_node="">A group of people who review, approve, and monitor the clinical study's </span><span class="term" data-dcnode-id="3006" data-term="protocol" tabindex="-1" title="Click to define"><span data-dcnode-id="3007" instrument_node="">protocol</span></span><span data-dcnode-id="3005" instrument_node="">. Their role is to protect the rights and welfare of people participating in a study (referred to as human research subjects), such as reviewing the </span><span class="term" data-dcnode-id="3003" data-term="informed consent form (icf)" tabindex="-1" title="Click to define"><span data-dcnode-id="3004" instrument_node="">informed consent form</span></span><span data-dcnode-id="3002" instrument_node="">. The group typically includes people with varying backgrounds, including a community member, to make sure that research activities conducted by an organization are completely and adequately reviewed. Also called an institutional review board, or IRB, or an ethics committee.</span><p data-dcnode-id="2997"><span data-dcnode-id="3001" instrument_node="">For more information, see </span><a data-dcnode-id="2999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//clinicaltrials.gov/ct2/about-studies/learn%23Participating" style="text-decoration:underline dotted" tabindex="-1" target="_blank"><span data-dcnode-id="3000" instrument_node="">Participating in Studies</span></a><span data-dcnode-id="2998" instrument_node=""> on this site.</span></p></div></li><li class="glossary__item" data-dcnode-id="2987"><button aria-controls="glossary-content-44" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2993" tabindex="-1"><span data-dcnode-id="2994" instrument_node="">Inclusion criteria</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2988" id="glossary-content-44" style="display: none;"><span data-dcnode-id="2992" instrument_node="">A type of </span><span class="term" data-dcnode-id="2990" data-term="eligibility criteria" tabindex="-1" title="Click to define"><span data-dcnode-id="2991" instrument_node="">eligibility criteria</span></span><span data-dcnode-id="2989" instrument_node="">. These are the reasons that a person is allowed to participate in a clinical study.</span></div></li><li class="glossary__item" data-dcnode-id="2977"><button aria-controls="glossary-content-45" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2985" tabindex="-1"><span data-dcnode-id="2986" instrument_node="">Informed consent</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2978" id="glossary-content-45" style="display: none;"><span data-dcnode-id="2984" instrument_node="">A process used by researchers to communicate to potential and enrolled participants the risks and potential benefits of participating in a clinical study. </span><p data-dcnode-id="2979"><span data-dcnode-id="2983" instrument_node="">For more information, see </span><a data-dcnode-id="2981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//clinicaltrials.gov/ct2/about-studies/learn%23Participating" style="text-decoration:underline dotted" tabindex="-1" target="_blank"><span data-dcnode-id="2982" instrument_node="">Participating in Studies</span></a><span data-dcnode-id="2980" instrument_node=""> on this site.</span></p></div></li><li class="glossary__item" data-dcnode-id="2969"><button aria-controls="glossary-content-46" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2975" tabindex="-1"><span data-dcnode-id="2976" instrument_node="">Informed consent form (ICF)</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2970" id="glossary-content-46" style="display: none;"><span data-dcnode-id="2974" instrument_node="">The document used in the </span><span class="term" data-dcnode-id="2972" data-term="informed consent" tabindex="-1" title="Click to define"><span data-dcnode-id="2973" instrument_node="">informed consent</span></span><span data-dcnode-id="2971" instrument_node=""> or process.</span></div></li><li class="glossary__item" data-dcnode-id="2952"><button aria-controls="glossary-content-47" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2967" tabindex="-1"><span data-dcnode-id="2968" instrument_node="">Intervention model</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2953" id="glossary-content-47" style="display: none;"><span data-dcnode-id="2966" instrument_node="">The general design of the strategy for assigning interventions to participants in a clinical study. Types of intervention models include: </span><span class="term" data-dcnode-id="2964" data-term="single group assignment" tabindex="-1" title="Click to define"><span data-dcnode-id="2965" instrument_node="">single group assignment</span></span><span data-dcnode-id="2963" instrument_node="">, </span><span class="term" data-dcnode-id="2961" data-term="parallel assignment" tabindex="-1" title="Click to define"><span data-dcnode-id="2962" instrument_node="">parallel assignment</span></span><span data-dcnode-id="2960" instrument_node="">, </span><span class="term" data-dcnode-id="2958" data-term="cross-over assignment" tabindex="-1" title="Click to define"><span data-dcnode-id="2959" instrument_node="">cross-over assignment</span></span><span data-dcnode-id="2957" instrument_node="">, and </span><span class="term" data-dcnode-id="2955" data-term="factorial assignment" tabindex="-1" title="Click to define"><span data-dcnode-id="2956" instrument_node="">factorial assignment</span></span><span data-dcnode-id="2954" instrument_node="">.</span></div></li><li class="glossary__item" data-dcnode-id="2947"><button aria-controls="glossary-content-48" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2950" tabindex="-1"><span data-dcnode-id="2951" instrument_node="">Intervention/treatment</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2948" id="glossary-content-48" style="display: none;"><span data-dcnode-id="2949" instrument_node="">A process or action that is the focus of a clinical study. Interventions include drugs, medical devices, procedures, vaccines, and other products that are either investigational or already available. Interventions can also include noninvasive approaches, such as education or modifying diet and exercise.</span></div></li><li class="glossary__item" data-dcnode-id="2933"><button aria-controls="glossary-content-49" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2945" tabindex="-1"><span data-dcnode-id="2946" instrument_node="">Interventional study (clinical trial)</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2934" id="glossary-content-49" style="display: none;"><span data-dcnode-id="2944" instrument_node="">A type of </span><span class="term" data-dcnode-id="2942" data-term="clinical study" tabindex="-1" title="Click to define"><span data-dcnode-id="2943" instrument_node="">clinical study</span></span><span data-dcnode-id="2941" instrument_node=""> in which participants are assigned to groups that receive one or more </span><span class="term" data-dcnode-id="2939" data-term="intervention/treatment" tabindex="-1" title="Click to define"><span data-dcnode-id="2940" instrument_node="">intervention/treatment</span></span><span data-dcnode-id="2938" instrument_node=""> (or no intervention) so that researchers can evaluate the effects of the interventions on biomedical or health-related outcomes. The assignments are determined by the study's </span><span class="term" data-dcnode-id="2936" data-term="protocol" tabindex="-1" title="Click to define"><span data-dcnode-id="2937" instrument_node="">protocol</span></span><span data-dcnode-id="2935" instrument_node="">. Participants may receive diagnostic, therapeutic, or other types of interventions.</span></div></li><li class="glossary__item" data-dcnode-id="2925"><button aria-controls="glossary-content-50" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2931" tabindex="-1"><span data-dcnode-id="2932" instrument_node="">Investigator</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2926" id="glossary-content-50" style="display: none;"><span data-dcnode-id="2930" instrument_node="">A researcher involved in a clinical study. Related terms include site principal investigator, site sub-investigator, study chair, study director, and study </span><span class="term" data-dcnode-id="2928" data-term="principal investigator (pi)" tabindex="-1" title="Click to define"><span data-dcnode-id="2929" instrument_node="">principal investigator</span></span><span data-dcnode-id="2927" instrument_node="">.</span></div></li><li class="glossary__item" data-dcnode-id="2914"><button aria-controls="glossary-content-51" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2923" tabindex="-1"><span data-dcnode-id="2924" instrument_node="">Last update posted</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2915" id="glossary-content-51" style="display: none;"><span data-dcnode-id="2922" instrument_node="">The most recent date on which changes to a </span><span class="term" data-dcnode-id="2920" data-term="study record" tabindex="-1" title="Click to define"><span data-dcnode-id="2921" instrument_node="">study record</span></span><span data-dcnode-id="2919" instrument_node=""> were made available on ClinicalTrials.gov. There may be a delay between when the changes were submitted to ClinicalTrials.gov by the study's sponsor or investigator (the </span><span class="term" data-dcnode-id="2917" data-term="last update submitted" tabindex="-1" title="Click to define"><span data-dcnode-id="2918" instrument_node="">last update submitted</span></span><span data-dcnode-id="2916" instrument_node=""> date) and the last update posted date.</span></div></li><li class="glossary__item" data-dcnode-id="2903"><button aria-controls="glossary-content-52" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2912" tabindex="-1"><span data-dcnode-id="2913" instrument_node="">Last update submitted</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2904" id="glossary-content-52" style="display: none;"><span data-dcnode-id="2911" instrument_node="">The most recent date on which the study sponsor or investigator submitted changes to a </span><span class="term" data-dcnode-id="2909" data-term="study record" tabindex="-1" title="Click to define"><span data-dcnode-id="2910" instrument_node="">study record</span></span><span data-dcnode-id="2908" instrument_node=""> to ClinicalTrials.gov. There is typically a delay of a few days between the last update submitted date and when the date changes are posted on ClinicalTrials.gov (the </span><span class="term" data-dcnode-id="2906" data-term="last update posted" tabindex="-1" title="Click to define"><span data-dcnode-id="2907" instrument_node="">last update posted</span></span><span data-dcnode-id="2905" instrument_node=""> date).</span></div></li><li class="glossary__item" data-dcnode-id="2892"><button aria-controls="glossary-content-53" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2901" tabindex="-1"><span data-dcnode-id="2902" instrument_node="">Last update submitted that met QC criteria</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2893" id="glossary-content-53" style="display: none;"><span data-dcnode-id="2900" instrument_node="">The most recent date on which the study sponsor or investigator submitted changes to a </span><span class="term" data-dcnode-id="2898" data-term="study record" tabindex="-1" title="Click to define"><span data-dcnode-id="2899" instrument_node="">study record</span></span><span data-dcnode-id="2897" instrument_node=""> that are consistent with National Library of Medicine (NLM) </span><span class="term" data-dcnode-id="2895" data-term="quality control (qc) review" tabindex="-1" title="Click to define"><span data-dcnode-id="2896" instrument_node="">quality control (QC) review</span></span><span data-dcnode-id="2894" instrument_node=""> criteria. It is the responsibility of the sponsor or investigator to ensure that the study record is consistent with the NLM QC review criteria.</span></div></li><li class="glossary__item" data-dcnode-id="2878"><button aria-controls="glossary-content-54" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2890" tabindex="-1"><span data-dcnode-id="2891" instrument_node="">Last verified</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2879" id="glossary-content-54" style="display: none;"><span data-dcnode-id="2889" instrument_node="">The most recent date on which the study sponsor or investigator confirmed the information about a clinical study on ClinicalTrials.gov as accurate and current. If a study with a </span><span class="term" data-dcnode-id="2887" data-term="recruitment status" tabindex="-1" title="Click to define"><span data-dcnode-id="2888" instrument_node="">recruitment status</span></span><span data-dcnode-id="2886" instrument_node=""> of recruiting; not yet recruiting; or active, not recruiting has not been confirmed within the past 2 years, the study's </span><span class="term" data-dcnode-id="2884" data-term="recruitment status" tabindex="-1" title="Click to define"><span data-dcnode-id="2885" instrument_node="">recruitment status</span></span><span data-dcnode-id="2883" instrument_node=""> is shown as </span><span class="term" data-dcnode-id="2881" data-term="unknown" tabindex="-1" title="Click to define"><span data-dcnode-id="2882" instrument_node="">unknown</span></span><span data-dcnode-id="2880" instrument_node="">.</span></div></li><li class="glossary__item" data-dcnode-id="2864"><button aria-controls="glossary-content-55" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2876" tabindex="-1"><span data-dcnode-id="2877" instrument_node="">Listed location countries</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2865" id="glossary-content-55" style="display: none;"><span data-dcnode-id="2875" instrument_node="">Countries in which research facilities for a study are located. A country is listed only once, even if there is more than one facility in the country. The list includes all countries as of the </span><span class="term" data-dcnode-id="2873" data-term="last update submitted" tabindex="-1" title="Click to define"><span data-dcnode-id="2874" instrument_node="">last update submitted</span></span><span data-dcnode-id="2872" instrument_node=""> date; any country for which all facilities were removed from the </span><span class="term" data-dcnode-id="2870" data-term="study record" tabindex="-1" title="Click to define"><span data-dcnode-id="2871" instrument_node="">study record</span></span><span data-dcnode-id="2869" instrument_node=""> are listed under </span><span class="term" data-dcnode-id="2867" data-term="removed location countries" tabindex="-1" title="Click to define"><span data-dcnode-id="2868" instrument_node="">removed location countries</span></span><span data-dcnode-id="2866" instrument_node="">.</span></div></li><li class="glossary__item" data-dcnode-id="2856"><button aria-controls="glossary-content-56" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2862" tabindex="-1"><span data-dcnode-id="2863" instrument_node="">Location terms</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2857" id="glossary-content-56" style="display: none;"><span data-dcnode-id="2861" instrument_node="">In the search feature, the Location terms field is used to narrow a search by location-related terms other than Country, State, and City or distance. For example, you may enter a specific facility name (such as National Institutes of Health Clinical Center) or a part of a facility name (such as Veteran for studies listing Veterans Hospital or Veteran Affairs in the facility name). Note: Not all </span><span class="term" data-dcnode-id="2859" data-term="study record" tabindex="-1" title="Click to define"><span data-dcnode-id="2860" instrument_node="">study records</span></span><span data-dcnode-id="2858" instrument_node=""> include this level of detail about locations.</span></div></li><li class="glossary__item" data-dcnode-id="2851"><button aria-controls="glossary-content-57" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2854" tabindex="-1"><span data-dcnode-id="2855" instrument_node="">Masking</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2852" id="glossary-content-57" style="display: none;"><span data-dcnode-id="2853" instrument_node="">A clinical trial design strategy in which one or more parties involved in the trial, such as the investigator or participants, do not know which participants have been assigned which interventions. Types of masking include: open label, single blind masking, and double-blind masking.</span></div></li><li class="glossary__item" data-dcnode-id="2843"><button aria-controls="glossary-content-58" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2849" tabindex="-1"><span data-dcnode-id="2850" instrument_node="">NCT number</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2844" id="glossary-content-58" style="display: none;"><span data-dcnode-id="2848" instrument_node="">A unique identification code given to each clinical study record registered on ClinicalTrials.gov. The format is "NCT" followed by an 8-digit number (for example, NCT00000419). Also called the </span><span class="term" data-dcnode-id="2846" data-term="clinicaltrials.gov identifier (nct number)" tabindex="-1" title="Click to define"><span data-dcnode-id="2847" instrument_node="">ClinicalTrials.gov identifier</span></span><span data-dcnode-id="2845" instrument_node="">.</span></div></li><li class="glossary__item" data-dcnode-id="2832"><button aria-controls="glossary-content-59" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2841" tabindex="-1"><span data-dcnode-id="2842" instrument_node="">No intervention arm</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2833" id="glossary-content-59" style="display: none;"><span data-dcnode-id="2840" instrument_node="">An </span><span class="term" data-dcnode-id="2838" data-term="arm type" tabindex="-1" title="Click to define"><span data-dcnode-id="2839" instrument_node="">arm type</span></span><span data-dcnode-id="2837" instrument_node=""> in which a group of participants does not receive any </span><span class="term" data-dcnode-id="2835" data-term="intervention/treatment" tabindex="-1" title="Click to define"><span data-dcnode-id="2836" instrument_node="">intervention/treatment</span></span><span data-dcnode-id="2834" instrument_node=""> during the clinical trial.</span></div></li><li class="glossary__item" data-dcnode-id="2816"><button aria-controls="glossary-content-60" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2830" tabindex="-1"><span data-dcnode-id="2831" instrument_node="">Observational study</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2817" id="glossary-content-60" style="display: none;"><span data-dcnode-id="2829" instrument_node="">A type of </span><span class="term" data-dcnode-id="2827" data-term="clinical study" tabindex="-1" title="Click to define"><span data-dcnode-id="2828" instrument_node="">clinical study</span></span><span data-dcnode-id="2826" instrument_node=""> in which participants are identified as belonging to study groups and are assessed for biomedical or health outcomes. Participants may receive diagnostic, therapeutic, or other types of interventions, but the investigator does not assign participants to a specific </span><span class="term" data-dcnode-id="2824" data-term="intervention/treatment" tabindex="-1" title="Click to define"><span data-dcnode-id="2825" instrument_node="">interventions/treatment</span></span><span data-dcnode-id="2823" instrument_node="">.</span><p data-dcnode-id="2818"><span data-dcnode-id="2822" instrument_node="">A </span><span class="term" data-dcnode-id="2820" data-term="patient registry" tabindex="-1" title="Click to define"><span data-dcnode-id="2821" instrument_node="">patient registry</span></span><span data-dcnode-id="2819" instrument_node=""> is a type of observational study.</span></p></div></li><li class="glossary__item" data-dcnode-id="2808"><button aria-controls="glossary-content-61" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2814" tabindex="-1"><span data-dcnode-id="2815" instrument_node="">Observational study model</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2809" id="glossary-content-61" style="display: none;"><span data-dcnode-id="2813" instrument_node="">The general design of the strategy for identifying and following up with participants during an </span><span class="term" data-dcnode-id="2811" data-term="observational study" tabindex="-1" title="Click to define"><span data-dcnode-id="2812" instrument_node="">observational study</span></span><span data-dcnode-id="2810" instrument_node="">. Types of observational study models include cohort, case-control, case-only, case-cross-over, ecologic or community studies, family-based, and other.</span></div></li><li class="glossary__item" data-dcnode-id="2797"><button aria-controls="glossary-content-62" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2806" tabindex="-1"><span data-dcnode-id="2807" instrument_node="">Other adverse event</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2798" id="glossary-content-62" style="display: none;"><span data-dcnode-id="2805" instrument_node="">An </span><span class="term" data-dcnode-id="2803" data-term="adverse event" tabindex="-1" title="Click to define"><span data-dcnode-id="2804" instrument_node="">adverse event</span></span><span data-dcnode-id="2802" instrument_node=""> that is not a </span><span class="term" data-dcnode-id="2800" data-term="serious adverse event" tabindex="-1" title="Click to define"><span data-dcnode-id="2801" instrument_node="">serious adverse event</span></span><span data-dcnode-id="2799" instrument_node="">, meaning that it does not result in death, is not life-threatening, does not require inpatient hospitalization or extend a current hospital stay, does not result in an ongoing or significant incapacity or interfere substantially with normal life functions, and does not cause a congenital anomaly or birth defect; it also does not put the participant in danger and does not require medical or surgical intervention to prevent one of the results listed above.</span></div></li><li class="glossary__item" data-dcnode-id="2789"><button aria-controls="glossary-content-63" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2795" tabindex="-1"><span data-dcnode-id="2796" instrument_node="">Other study IDs</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2790" id="glossary-content-63" style="display: none;"><span data-dcnode-id="2794" instrument_node="">Identifiers or ID numbers other than the </span><span class="term" data-dcnode-id="2792" data-term="nct number" tabindex="-1" title="Click to define"><span data-dcnode-id="2793" instrument_node="">NCT number</span></span><span data-dcnode-id="2791" instrument_node=""> that are assigned to a clinical study by the study's sponsor, funders, or others. These numbers may include unique identifiers from other trial registries and National Institutes of Health grant numbers.</span></div></li><li class="glossary__item" data-dcnode-id="2781"><button aria-controls="glossary-content-64" aria-expanded="false" class="data-glossary-term glossary__term" data-dcnode-id="2787" tabindex="-1"><span data-dcnode-id="2788" instrument_node="">Other terms</span></button><div aria-hidden="true" class="glossary__definition" data-dcnode-id="2782" id="glossary-content-64" style="display: none;"><span data-dcnode-id="2786" instrument_node="">In the search feature, the Other terms field is used to narrow a search. For example, you may enter the name of a drug or the NCT number of a clinical study to limit the search to </span><span class="term" data-dcnode-id="2784" data-term="study record" tabindex="-1" title="Click to define"><span
