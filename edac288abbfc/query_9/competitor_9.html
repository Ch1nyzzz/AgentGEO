</span><table class="ct-layout_table tr-tableStyle tr-studyInfo" data-dcnode-id="800"><caption data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">Layout table for eligibility information</span></caption><thead data-dcnode-id="832"><tr data-dcnode-id="834"><th data-dcnode-id="838" id="elgType"></th><th data-dcnode-id="836" id="elgData"></th></tr></thead><tbody data-dcnode-id="802"><tr data-dcnode-id="822"><td class="ct-nowrap" data-dcnode-id="827" headers="elgType"><span data-dcnode-id="828" instrument_node="">Ages Eligible for Study: &nbsp; </span></td><td data-dcnode-id="824" headers="elgData" style="padding-left:1em"><span data-dcnode-id="825" instrument_node="">18 Years and older &nbsp; (Adult, Older Adult)</span></td></tr><tr data-dcnode-id="813"><td class="ct-nowrap" data-dcnode-id="818" headers="elgType"><span data-dcnode-id="819" instrument_node="">Sexes Eligible for Study: &nbsp; </span></td><td data-dcnode-id="815" headers="elgData" style="padding-left:1em"><span data-dcnode-id="816" instrument_node="">Male</span></td></tr><tr data-dcnode-id="804"><td class="ct-nowrap" data-dcnode-id="809" headers="elgType"><span data-dcnode-id="810" instrument_node="">Accepts Healthy Volunteers: &nbsp; </span></td><td data-dcnode-id="806" headers="elgData" style="padding-left:1em"><span data-dcnode-id="807" instrument_node="">No</span></td></tr></tbody></table><span data-dcnode-id="799" instrument_node="">
</span><div class="ct-header3" data-dcnode-id="797" style="margin-top:2ex"><span data-dcnode-id="798" instrument_node="">Criteria</span></div><span data-dcnode-id="796" instrument_node="">
</span><div class="tr-indent2" data-dcnode-id="622"><p data-dcnode-id="794" style="margin-top:1ex; margin-bottom:1ex;"><span data-dcnode-id="795" instrument_node="">Inclusion Criteria::</span></p><span data-dcnode-id="793" instrument_node="">
</span><ul data-dcnode-id="647" style="margin-top:1ex; margin-bottom:1ex;"><span data-dcnode-id="792" instrument_node="">
</span><li data-dcnode-id="790" style="margin-top:0.7ex;"><span data-dcnode-id="791" instrument_node="">Age greater than or equal to 18</span></li><span data-dcnode-id="789" instrument_node="">
</span><li data-dcnode-id="787" style="margin-top:0.7ex;"><span data-dcnode-id="788" instrument_node="">Histologically documented adenocarcinoma of the prostate</span></li><span data-dcnode-id="786" instrument_node="">
</span><li data-dcnode-id="769" style="margin-top:0.7ex;"><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="783" style="margin-top:0ex; margin-bottom:1ex;"><span data-dcnode-id="784" instrument_node="">Initial treatment with radical prostatectomy or external beam radiation</span></p><span data-dcnode-id="782" instrument_node="">
</span><ul data-dcnode-id="771" style="margin-top:1ex; margin-bottom:1ex;"><span data-dcnode-id="781" instrument_node="">
</span><li data-dcnode-id="779" style="margin-top:0.7ex;"><span data-dcnode-id="780" instrument_node="">Neoadjuvant/Adjuvant Androgen Deprivation therapy allowable, provided it was for a maximum of 24 months, with the last dose of medication at least 12 months previously</span></li><span data-dcnode-id="778" instrument_node="">
</span><li data-dcnode-id="776" style="margin-top:0.7ex;"><span data-dcnode-id="777" instrument_node="">Neoadjuvant or adjuvant chemotherapy allowable, provided it was for a maximum of 6 months, with the last dose of medication at least 12 months previously</span></li><span data-dcnode-id="775" instrument_node="">
</span><li data-dcnode-id="773" style="margin-top:0.7ex;"><span data-dcnode-id="774" instrument_node="">Adjuvant radiation after radical prostatectomy is allowed, provided at least 6 months have elapsed between completion of radiation and enrollment in study</span></li><span data-dcnode-id="772" instrument_node="">
</span></ul><span data-dcnode-id="770" instrument_node="">
</span></li><span data-dcnode-id="768" instrument_node="">
</span><li data-dcnode-id="721" style="margin-top:0.7ex;"><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="765" style="margin-top:0ex; margin-bottom:1ex;"><span data-dcnode-id="766" instrument_node="">PSA recurrence, with a rising PSA, as defined by:</span></p><span data-dcnode-id="764" instrument_node="">
</span><ul data-dcnode-id="723" style="margin-top:1ex; margin-bottom:1ex;"><span data-dcnode-id="763" instrument_node="">
</span><li data-dcnode-id="743" style="margin-top:0.7ex;"><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="760" style="margin-top:0ex; margin-bottom:1ex;"><span data-dcnode-id="761" instrument_node="">Post Radiation Therapy:</span></p><span data-dcnode-id="759" instrument_node="">
</span><ul data-dcnode-id="745" style="margin-top:1ex; margin-bottom:1ex;"><span data-dcnode-id="758" instrument_node="">
</span><li data-dcnode-id="756" style="margin-top:0.7ex;"><span data-dcnode-id="757" instrument_node="">Absolute PSA &gt;2.0 ng/mL</span></li><span data-dcnode-id="755" instrument_node="">
</span><li data-dcnode-id="753" style="margin-top:0.7ex;"><span data-dcnode-id="754" instrument_node="">PSA nadir &lt;4 ng/mL after radiation</span></li><span data-dcnode-id="752" instrument_node="">
</span><li data-dcnode-id="750" style="margin-top:0.7ex;"><span data-dcnode-id="751" instrument_node="">Absolute rise of at least 0.5 ng/mL total</span></li><span data-dcnode-id="749" instrument_node="">
</span><li data-dcnode-id="747" style="margin-top:0.7ex;"><span data-dcnode-id="748" instrument_node="">At least 2 increases in PSA, separated by at least 2 weeks; these can be separated by a PSA value which declines provided the second rising value is higher than the first rising value.</span></li><span data-dcnode-id="746" instrument_node="">
</span></ul><span data-dcnode-id="744" instrument_node="">
</span></li><span data-dcnode-id="742" instrument_node="">
</span><li data-dcnode-id="725" style="margin-top:0.7ex;"><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="739" style="margin-top:0ex; margin-bottom:1ex;"><span data-dcnode-id="740" instrument_node="">Post Prostatectomy:</span></p><span data-dcnode-id="738" instrument_node="">
</span><ul data-dcnode-id="727" style="margin-top:1ex; margin-bottom:1ex;"><span data-dcnode-id="737" instrument_node="">
</span><li data-dcnode-id="735" style="margin-top:0.7ex;"><span data-dcnode-id="736" instrument_node="">Absolute PSA &gt;1.0 ng/mL</span></li><span data-dcnode-id="734" instrument_node="">
</span><li data-dcnode-id="732" style="margin-top:0.7ex;"><span data-dcnode-id="733" instrument_node="">Absolute rise of at least 1 ng/mL total from nadir</span></li><span data-dcnode-id="731" instrument_node="">
</span><li data-dcnode-id="729" style="margin-top:0.7ex;"><span data-dcnode-id="730" instrument_node="">At least 2 increases in PSA separated by at least 2 weeks; these can be separated by a PSA value which declines provided the second rising value is higher than the first value</span></li><span data-dcnode-id="728" instrument_node="">
</span></ul><span data-dcnode-id="726" instrument_node="">
</span></li><span data-dcnode-id="724" instrument_node="">
</span></ul><span data-dcnode-id="722" instrument_node="">
</span></li><span data-dcnode-id="720" instrument_node="">
</span><li data-dcnode-id="694" style="margin-top:0.7ex;"><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="717" style="margin-top:0ex; margin-bottom:1ex;"><span data-dcnode-id="718" instrument_node="">PSA Doubling Time (PSA DT) more than 3 months and less than 36 months</span></p><span data-dcnode-id="716" instrument_node="">
</span><ul data-dcnode-id="696" style="margin-top:1ex; margin-bottom:1ex;"><span data-dcnode-id="715" instrument_node="">
</span><li data-dcnode-id="698" style="margin-top:0.7ex;"><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="712" style="margin-top:0ex; margin-bottom:1ex;"><span data-dcnode-id="713" instrument_node="">PSA DT to be calculated using the web-based calculator at http://kevin.phys.unm.edu/psa/ with the following constraints:</span></p><span data-dcnode-id="711" instrument_node="">
</span><ul data-dcnode-id="700" style="margin-top:1ex; margin-bottom:1ex;"><span data-dcnode-id="710" instrument_node="">
</span><li data-dcnode-id="708" style="margin-top:0.7ex;"><span data-dcnode-id="709" instrument_node="">At least 3 values, but no more than 6</span></li><span data-dcnode-id="707" instrument_node="">
</span><li data-dcnode-id="705" style="margin-top:0.7ex;"><span data-dcnode-id="706" instrument_node="">All values must be &gt;0.2</span></li><span data-dcnode-id="704" instrument_node="">
</span><li data-dcnode-id="702" style="margin-top:0.7ex;"><span data-dcnode-id="703" instrument_node="">Values must be separated by at least 2 months</span></li><span data-dcnode-id="701" instrument_node="">
</span></ul><span data-dcnode-id="699" instrument_node="">
</span></li><span data-dcnode-id="697" instrument_node="">
</span></ul><span data-dcnode-id="695" instrument_node="">
</span></li><span data-dcnode-id="693" instrument_node="">
</span><li data-dcnode-id="691" style="margin-top:0.7ex;"><span data-dcnode-id="692" instrument_node="">No radiographically evident bony or soft tissue metastases</span></li><span data-dcnode-id="690" instrument_node="">
</span><li data-dcnode-id="688" style="margin-top:0.7ex;"><span data-dcnode-id="689" instrument_node="">Documented discussion between subject and physician about the option to pursue hormone therapy and/or salvage local therapy rather than enroll in this study</span></li><span data-dcnode-id="687" instrument_node="">
</span><li data-dcnode-id="670" style="margin-top:0.7ex;"><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="684" style="margin-top:0ex; margin-bottom:1ex;"><span data-dcnode-id="685" instrument_node="">Patients who received treatment with androgen deprivation for biochemical recurrence are eligible provided:</span></p><span data-dcnode-id="683" instrument_node="">
</span><ul data-dcnode-id="672" style="margin-top:1ex; margin-bottom:1ex;"><span data-dcnode-id="682" instrument_node="">
</span><li data-dcnode-id="680" style="margin-top:0.7ex;"><span data-dcnode-id="681" instrument_node="">They did not document castration resistance (defined as 2 rising PSA values while testosteron &lt; 50</span></li><span data-dcnode-id="679" instrument_node="">
</span><li data-dcnode-id="677" style="margin-top:0.7ex;"><span data-dcnode-id="678" instrument_node="">They have been off androgen deprivation for at least 3 months and have recovered their testosterone (&gt;150)</span></li><span data-dcnode-id="676" instrument_node="">
</span><li data-dcnode-id="674" style="margin-top:0.7ex;"><span data-dcnode-id="675" instrument_node="">They have decided,in conjunction with their treating physician that they do not want to resume androgen deprivation</span></li><span data-dcnode-id="673" instrument_node="">
</span></ul><span data-dcnode-id="671" instrument_node="">
</span></li><span data-dcnode-id="669" instrument_node="">
</span><li data-dcnode-id="667" style="margin-top:0.7ex;"><span data-dcnode-id="668" instrument_node="">ECOG Performance Status 0-2</span></li><span data-dcnode-id="666" instrument_node="">
</span><li data-dcnode-id="664" style="margin-top:0.7ex;"><span data-dcnode-id="665" instrument_node="">Life expectancy &gt; 12 months</span></li><span data-dcnode-id="663" instrument_node="">
</span><li data-dcnode-id="661" style="margin-top:0.7ex;"><span data-dcnode-id="662" instrument_node="">Adequate hepatic function (AST, ALT, bilirubin &lt;1.5 x ULN)</span></li><span data-dcnode-id="660" instrument_node="">
</span><li data-dcnode-id="658" style="margin-top:0.7ex;"><span data-dcnode-id="659" instrument_node="">Adequate renal function (eGFR by Cockcroft-Gault or comparable calculation &gt;50 ml/min)</span></li><span data-dcnode-id="657" instrument_node="">
</span><li data-dcnode-id="655" style="margin-top:0.7ex;"><span data-dcnode-id="656" instrument_node="">Willing to discontinue all nutritional supplements and 5-alpha reductase inhibitors (finasteride, dutasteride) for the duration of study treatment, unless the medication is being used to control symptoms of BPH and the patient has been taking the medication for more than 6 weeks</span></li><span data-dcnode-id="654" instrument_node="">
</span><li data-dcnode-id="652" style="margin-top:0.7ex;"><span data-dcnode-id="653" instrument_node="">Willing to discontinue all weight control medications for the duration of study treatment</span></li><span data-dcnode-id="651" instrument_node="">
</span><li data-dcnode-id="649" style="margin-top:0.7ex;"><span data-dcnode-id="650" instrument_node="">Signed informed consent</span></li><span data-dcnode-id="648" instrument_node="">
</span></ul><span data-dcnode-id="646" instrument_node="">
</span><p data-dcnode-id="644" style="margin-top:0ex; margin-bottom:1ex;"><span data-dcnode-id="645" instrument_node="">Exclusion Criteria:</span></p><span data-dcnode-id="643" instrument_node="">
</span><ul data-dcnode-id="623" style="margin-top:1ex; margin-bottom:1ex;"><span data-dcnode-id="642" instrument_node="">
</span><li data-dcnode-id="640" style="margin-top:0.7ex;"><span data-dcnode-id="641" instrument_node="">Atypical prostate carcinoma histology (ex: small cell, adenoid cystic)</span></li><span data-dcnode-id="639" instrument_node="">
</span><li data-dcnode-id="637" style="margin-top:0.7ex;"><span data-dcnode-id="638" instrument_node="">Evidence of bony or soft tissue metastatic disease on CT/MRI or bone scan or PET/CT</span></li><span data-dcnode-id="636" instrument_node="">
</span><li data-dcnode-id="634" style="margin-top:0.7ex;"><span data-dcnode-id="635" instrument_node="">Other invasive malignancy within prior 3 years, except for fully treated basal cell or squamous cell carcinoma of the skin.</span></li><span data-dcnode-id="633" instrument_node="">
</span><li data-dcnode-id="631" style="margin-top:0.7ex;"><span data-dcnode-id="632" instrument_node="">Full-dose anticoagulation therapy (warfarin or low molecular weight heparin) or antiplatelet therapy (clopidogrel or ticlopidine), with the exception of low-dose aspirin therapy (81 mg).</span></li><span data-dcnode-id="630" instrument_node="">
</span><li data-dcnode-id="628" style="margin-top:0.7ex;"><span data-dcnode-id="629" instrument_node="">Significant cardiac disease, included but not limited to angina, myocardial infarction, cardiomyopathy, congestive heart failure, and coronary artery disease which has required bypass surgery, angioplasty or stent placement.</span></li><span data-dcnode-id="627" instrument_node="">
</span><li data-dcnode-id="625" style="margin-top:0.7ex;"><span data-dcnode-id="626" instrument_node="">Significant uncontrolled comorbid condition which, in the opinion of the treating physician would compromise the subject's ability to comply with protocol requirements, or would pose undue risk for experiencing adverse events.</span></li><span data-dcnode-id="624" instrument_node="">
</span></ul></div><span data-dcnode-id="621" instrument_node="">
