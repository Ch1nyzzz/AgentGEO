dcnode-id="5268" instrument_node="">It originates from the lining of the Milk Ducts.  It causes swelling and redness of the Skin.  </span><br data-dcnode-id="5267"><br data-dcnode-id="5266"><span data-dcnode-id="5265" instrument_node="">Normally the cells divide in a regular manner.  But if the division of the cells is not under control, then it give rise to Cancer. </span><br data-dcnode-id="5264"><br data-dcnode-id="5263"><b data-dcnode-id="5261"><span data-dcnode-id="5262" instrument_node="">Breast Tumor:  </span></b><span data-dcnode-id="5260" instrument_node=""> When the cells growin an abnormal way and form a solid mass in the Breast, it is termed as Breast Tumor.  The best remedies for Breast Tumor are Blood Root, Chimaphila Umbellata and Figwort. </span><br data-dcnode-id="5259"><br data-dcnode-id="5258"><b data-dcnode-id="5256"><span data-dcnode-id="5257" instrument_node="">Causes of Breast Cancer</span></b><br data-dcnode-id="5255"><span data-dcnode-id="5254" instrument_node="">Old age</span><br data-dcnode-id="5253"><span data-dcnode-id="5252" instrument_node="">Obesity</span><br data-dcnode-id="5251"><span data-dcnode-id="5250" instrument_node="">Genetically</span><br data-dcnode-id="5249"><span data-dcnode-id="5248" instrument_node="">Nulliparity </span><br data-dcnode-id="5247"><span data-dcnode-id="5246" instrument_node="">Lumps in Breast</span><br data-dcnode-id="5245"><span data-dcnode-id="5244" instrument_node="">Acidic Metabolism</span><br data-dcnode-id="5243"><span data-dcnode-id="5242" instrument_node="">Estrogen exposure</span><br data-dcnode-id="5241"><span data-dcnode-id="5240" instrument_node="">Radiation exposure</span><br data-dcnode-id="5239"><span data-dcnode-id="5238" instrument_node="">Dense breast tissue</span><br data-dcnode-id="5237"><span data-dcnode-id="5236" instrument_node="">Inherited gene mutations</span><br data-dcnode-id="5235"><span data-dcnode-id="5234" instrument_node="">Hormone Replacement Therapy</span><br data-dcnode-id="5233"><br data-dcnode-id="5232"><b data-dcnode-id="5230"><span data-dcnode-id="5231" instrument_node="">If not treated properly, Breast Cancer may cause</span></b><br data-dcnode-id="5229"><span data-dcnode-id="5228" instrument_node="">Metastasis</span><br data-dcnode-id="5227"><span data-dcnode-id="5226" instrument_node="">Lymphedema</span><br data-dcnode-id="5225"><span data-dcnode-id="5224" instrument_node="">Chest pain</span><br data-dcnode-id="5223"><span data-dcnode-id="5222" instrument_node="">Destruction of the Breast</span><br data-dcnode-id="5221"><br data-dcnode-id="5220"><b data-dcnode-id="5218"><span data-dcnode-id="5219" instrument_node="">Prevention </span></b><br data-dcnode-id="5217"><span data-dcnode-id="5216" instrument_node="">Alkalize or Suffer</span><br data-dcnode-id="5215"><span data-dcnode-id="5214" instrument_node="">Manjakani is good</span><br data-dcnode-id="5213"><br data-dcnode-id="5212"><span data-dcnode-id="5211" instrument_node="">A visit to the doctor is a must.</span><br data-dcnode-id="5210"><br data-dcnode-id="5209"><b data-dcnode-id="5207"><span data-dcnode-id="5208" instrument_node="">Note : </span></b><span data-dcnode-id="5206" instrument_node=""> Find more information on Cancer by visiting the Cancer webpage on this website. </span><a data-dcnode-id="5204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//herbpathy.com/Herbal-Treatment-for-Cancer-Cid39" target="_blank"><span data-dcnode-id="5205" instrument_node="">Clink here to visit the Cancer webpage now.</span></a><br data-dcnode-id="5203"><br data-dcnode-id="5202"></div><span data-dcnode-id="5200" instrument_node=""> </span></div><div class="curedBy-row" data-dcnode-id="5166"><div class="inside-label" data-dcnode-id="5195"><h3 class="boldlabel" data-dcnode-id="5197"><span data-dcnode-id="5198" instrument_node=""> Common Names </span></h3><span data-dcnode-id="5196" instrument_node=""> </span></div><span data-dcnode-id="5194" instrument_node ument_node=""> </span><div class="syptoms-row" data-dcnode-id="5035"><span data-dcnode-id="5036" instrument_node=""> Have extracts of Black Cohosh. </span></div><span data-dcnode-id="5034" instrument_node=""> </span><div class="syptoms-con" data-dcnode-id="5029" style="margin-bottom:0px;"><span data-dcnode-id="5033" instrument_node=""> </span><h2 data-dcnode-id="5031"><span data-dcnode-id="5032" instrument_node=""> Green Tea for Breast Cancer </span></h2><span data-dcnode-id="5030" instrument_node=""> </span></div><span data-dcnode-id="5028" instrument_node=""> </span><div class="syptoms-row" data-dcnode-id="5026"><span data-dcnode-id="5027" instrument_node=""> Drink 2-3 cups of Green tea everyday. </span></div><span data-dcnode-id="5025" instrument_node=""> </span><div class="syptoms-con" data-dcnode-id="5018" style="margin-bottom:0px;"><span data-dcnode-id="5024" instrument_node=""> </span><h2 data-dcnode-id="5020"><a data-dcnode-id="5022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//herbpathy.com/Uses-and-Benefits-of-Turmeric-Cid387" title="Turmeric"><span data-dcnode-id="5023" instrument_node="">Turmeric ( Haldi )</span></a><span data-dcnode-id="5021" instrument_node=""> for breast cancer </span></h2><span data-dcnode-id="5019" instrument_node=""> </span></div><span data-dcnode-id="5017" instrument_node=""> </span><div class="syptoms-row" data-dcnode-id="5013"><span data-dcnode-id="5016" instrument_node=""> Turmeric ( Haldi ) is a rich source of Curcumin.  Curcumin and its derivatives combat the growth of Breast Cancer Cells.  It also prevents the development of cancer cells in the bones.   </span><br data-dcnode-id="5015"><span data-dcnode-id="5014" instrument_node="">Consume half a tablespoon of Turmeric ( Haldi ) in your daily diet.  It is quite potent in fighting Breast Cancer Cells. </span></div><span data-dcnode-id="5012" instrument_node=""> </span><div class="syptoms-con" data-dcnode-id="5005" style="margin-bottom:0px;"><span data-dcnode-id="5011" instrument_node=""> </span><h2 data-dcnode-id="5007"><a data-dcnode-id="5009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//herbpathy.com/Uses-and-Benefits-of-Fagonia-Cretica-Cid4236" title="Fagonia Cretica"><span data-dcnode-id="5010" instrument_node="">Fagonia Cretica</span></a><span data-dcnode-id="5008" instrument_node=""> for Breast Cancer </span></h2><span data-dcnode-id="5006" instrument_node=""> </span></div><span data-dcnode-id="5004" instrument_node=""> </span><div class="syptoms-row" data-dcnode-id="5002"><span data-dcnode-id="5003" instrument_node=""> Prepare a tea from the dried herb.  Take it, twice a day. </span></div><span data-dcnode-id="5001" instrument_node=""> </span><div class="syptoms-con" data-dcnode-id="4994" style="margin-bottom:0px;"><span data-dcnode-id="5000" instrument_node=""> </span><h2 data-dcnode-id="4996"><a data-dcnode-id="4998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//herbpathy.com/Uses-and-Benefits-of-Soursop-Cid2759" title="Soursop"><span data-dcnode-id="4999" instrument_node="">Soursop</span></a><span data-dcnode-id="4997" instrument_node=""> for Cancer </span></h2><span data-dcnode-id="4995" instrument_node=""> </span></div><span data-dcnode-id="4993" instrument_node=""> </span><div class="syptoms-row" data-dcnode-id="4983"><span data-dcnode-id="4992" instrument_node=""> Soursop is a very effective remedy for cancer. Cancer may be anywhere in the body, the remedy is Soursop.  It helps treat cancer more effectively than Chemotherapy.  It kills only the cancer cells, not the healthy cells.  Hence, no hair fall or any other deterioration in health.  It may be used as the main remedy or it may be used in conjunction with Chemotherapy.</span><br data-dcnode-id="4991"><span data-dcnode-id="4990" instrument_node="">It has very strong Anticancer and Antitumor properties.</span><br data-dcnode-id="4989"><span data-dcnode-id="4988" instrument_node="">It kills cancer cells naturally without any side effects as associated with Chemotherapy.</span><br data-dcnode-id="4987"><span data-dcnode-id="4986" instrument_node="">Soursop Fruit can be eaten to prevent or treat cancer. Fresh soursop juice can also be used for this purpose. Soursop tea is also a way to fight against cancer.</span><br data-dcnode-id="4985"><span data-dcnode-id="4984" instrument_node="">Chop some fresh stems and leaves of Soursop.&nbsp; Boil them in 1 liter water until water is reduced to half.  Strain.&nbsp;  Drink 100 ml twice a day.&nbsp; You may add Honey. </span></div><span data-dcnode-id="4982" instrument_node=""> </span><div class="syptoms-con" data-dcnode-id="4975" style="margin-bottom:0px;"><span data-dcnode-id="4981" instrument_node=""> </span><h2 data-dcnode-id="4977"><a data-dcnode-id="4979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//herbpathy.com/Uses-and-Benefits-of-Verbascum-Thapsus-Cid2841" title="Verbascum Thapsus"><span data-dcnode-id="4980" instrument_node="">Verbascum Thapsus</span></a><span data-dcnode-id="4978" instrument_node=""> for Breast Cancer </span></h2><span data-dcnode-id="4976" instrument_node=""> </span></div><span data-dcnode-id="4974" instrument_node=""> </span><div class="syptoms-row" data-dcnode-id="4972"><span data-dcnode-id="4973" instrument_node=""> Take three tablespoon of Mullein and one tablespoon of Lobelia.  Use it as a fomentation. Change the fomentation every day. Repeat this for one month. </span></div><span data-dcnode-id="4971" instrument_node=""> </span><div class="syptoms-con" data-dcnode-id="4964" style="margin-bottom:0px;"><span data-dcnode-id="4970" instrument_node=""> </span><h2 data-dcnode-id="4966"><a data-dcnode-id="4968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//herbpathy.com/Uses-and-Benefits-of-Echinacea-Cid465" title="Echinacea"><span data-dcnode-id="4969" instrument_node="">Echinacea</span></a><span data-dcnode-id="4967" instrument_node=""> for Breast Cancer </span></h2><span data-dcnode-id="4965" instrument_node=""> </span></div><span data-dcnode-id="4963" instrument_node=""> </span><div class="syptoms-row" data-dcnode-id="4961"><span data-dcnode-id="4962" instrument_node=""> Prepare a decoction of the roots of Echinacea.  Have one  glass two times a day. </span></div><span data-dcnode-id="4960" instrument_node=""> </span><div class="syptoms-con" data-dcnode-id="4953" style="margin-bottom:0px;"><span data-dcnode-id="4959" instrument_node=""> </span><h2 data-dcnode-id="4955"><a data-dcnode-id="4957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//herbpathy.com/Uses-and-Benefits-of-Spinach-Cid2518" title="Spinach"><span data-dcnode-id="4958" instrument_node="">Spinach ( Palak )</span></a><span data-dcnode-id="4956" instrument_node=""> for Breast Cancer </span></h2><span data-dcnode-id="4954" instrument_node=""> </span></div><span data-dcnode-id="4952" instrument_node=""> </span><div class="syptoms-row" data-dcnode-id="4950"><span data-dcnode-id="4951" instrument_node=""> Take fresh leaves of Spinach ( Palak ).  Prepare soup.   Have one cup a day. </span></div><span data-dcnode-id="4949" instrument_node=""> </span><div class="syptoms-con" data-dcnode-id="4944" style="margin-bottom:0px;"><span data-dcnode-id="4948" instrument_node=""> </span><h2 data-dcnode-id="4946"><span data-dcnode-id="4947" instrument_node=""> Sugarcane ( Ganne ) Juice for Cancer </span></h2><span data-dcnode-id="4945" instrument_node=""> </span></div><span data-dcnode-id="4943" instrument_node=""> </span><div class="syptoms-row" data-dcnode-id="4939"><span data-dcnode-id="4942" instrument_node=""> Sugarcane ( Ganne ) Juice has cancer fighting properties; especially Breast Cancer and Prostate Cancer.</span><br data-dcnode-id="4941"><span data-dcnode-id="4940" instrument_node="">Drink one glass of fresh Sugarcane ( Ganne ) Juice twice a day and stay away from cancer. </span></div><span data-dcnode-id="4938" instrument_node=""> </span><div class="syptoms-con" data-dcnode-id="4933" style="margin-bottom:0px;"><span data-dcnode-id="4937" instrument_node=""> </span><h2 data-dcnode-id="4935"><span data-dcnode-id="4936" instrument_node=""> Bael ( Villi ) Fruit for Breast Cancer </span></h2><span data-dcnode-id="4934" instrument_node=""> </span></div><span data-dcnode-id="4932" instrument_node=""> </span><div class="syptoms-row" data-dcnode-id="4930"><span data-dcnode-id="4931" instrument_node=""> Bael ( Villi ) Fruit contains antiproliferative property which inhibits the cancer cell's growth.  Consumption of Bael ( Villi ) Fruit keeps the females away from Breast Cancer. </span></div><span data-dcnode-id="4929" instrument_node=""> </span><div class="syptoms-con" data-dcnode-id="4922" style="margin-bottom:0px;"><span data-dcnode-id="4928" instrument_node=""> </span><h2 data-dcnode-id="4924"><a data-dcnode-id="4926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//herbpathy.com/Uses-and-Benefits-of-Manjakani-Cid4790" title="Manjakani"><span data-dcnode-id="4927" instrument_node="">Manjakani</span></a><span data-dcnode-id="4925" instrument_node=""> for Breast Cancer </span></h2><span data-dcnode-id="4923" instrument_node=""> </span></div><span data-dcnode-id="4921" instrument_node=""> </span><div class="syptoms-row" data-dcnode-id="4919"><span data-dcnode-id="4920" instrument_node=""> Take 1 to 2 teaspoon powder of Manjakani and pour it into a glass of boiled water. Coll and filter, drink it twice a day. </span></div><div class="cl" data-dcnode-id="4917"><span data-dcnode-id="4918" instrument_node=""> &nbsp;</span></div><div data-dcnode-id="4915" style="Font-weight:bold; text-align:left;"><span data-dcnode-id="4916" instrument_node=""> Sponsored Links </span></div><div data-dcnode-id="4907" style="margin-top:4px;"><span data-dcnode-id="4912" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-080353007612 leaves of Cleavers and Flax seeds. Make Poultice. Repeat it daily for one month. </span></div><span data-dcnode-id="4881" instrument_node=""> </span></div><div class="syptoms-con" data-dcnode-id="4872" style="margin-bottom:0px;"><span data-dcnode-id="4879" instrument_node=""> </span><h2 data-dcnode-id="4877"><span data-dcnode-id="4878" instrument_node="">Herbal Treatment For Breast Cancer 2 </span></h2><span data-dcnode-id="4876" instrument_node=""> </span><div class="syptoms-row" data-dcnode-id="4874"><span data-dcnode-id="4875" instrument_node="">Take out the leaves of Comfery and the roots of Marshmallow.  Quantity should be equal.  Boil it in 1/2 liter of water for about 15 minutes. Fomentation with this water daily. </span></div><span data-dcnode-id="4873" instrument_node=""> </span></div><div class="syptoms-con" data-dcnode-id="4860" style="margin-bottom:0px;"><span data-dcnode-id="4871" instrument_node=""> </span><h2 data-dcnode-id="4869"><span data-dcnode-id="4870" instrument_node="">Herbal Treatment For Breast Cancer 3 </span></h2><span data-dcnode-id="4868" instrument_node=""> </span><div class="syptoms-row" data-dcnode-id="4862"><span data-dcnode-id="4867" instrument_node="">The fusion of Withania Somnifera and Mimosa Pudica is proved effective in treating Breast Cancer. </span><br data-dcnode-id="4866"><span data-dcnode-id="4865" instrument_node="">Take dried roots of Withania Somnifera and Mimosa Pudica.  Make a paste of the roots.  Apply the paste on your breast once a day.</span><br data-dcnode-id="4864"><span data-dcnode-id="4863" instrument_node="">Note : Go for check up after applying the application for 1 month. </span></div><span data-dcnode-id="4861" instrument_node=""> </span></div></div></div><span data-dcnode-id="4857" instrument_node="">

<span class="herb-rews-img-txt" data-dcnode-id="4810"><span data-dcnode-id="4811" instrument_node=""> Paramjit Singh</span></span><span data-dcnode-id="4809" instrument_node=""> </span></div><span class="herb-rews-date" data-dcnode-id="4806"><span data-dcnode-id="4807" instrument_node="">03 Feb 2016</span></span></div><div class="w100 fl mt12" data-dcnode-id="4724"><div class="herb-rews-txt" data-dcnode-id="4803"><span data-dcnode-id="4804" instrument_node="">My wife diagnosed with stage 1 Breast Cancer. Onco Surgen removed Lumps ( 1.7cm.) from Breast. Now they asked for Chemotherapy. Please guide us what do I do to avoid Chemotherapy. </span></div><span data-dcnode-id="4802" instrument_node=""> </span><div class="reviewRply" data-dcnode-id="4800" disabled="" id="ReplyBtn2825" onclick="ReplyBx('2825','2775','2','Paramjit Singh')" style="display:none;"><span data-dcnode-id="4801" instrument_node="">Reply</span></div><div class="reply_box" data-dcnode-id="4798" id="Dv_ReplyBox_2825" name="ReplyBx" runat="server" style="Display:none;"><span data-dcnode-id="4799" instrument_node=""> </span></div><div class="clr" data-dcnode-id="4796"><span data-dcnode-id="4797" instrument_node=""> &nbsp; </span></div><div class="article-herb-otr1" data-dcnode-id="4725"><div class="w100 fl" data-dcnode-id="4790"><div class="herb-rews-otr-img" data-dcnode-id="4793"><span class="herb-rews-img-txt" data-dcnode-id="4794"><span data-dcnode-id="4795" instrument_node=""> Herbpathy Research Team </span></span></div><span class="herb-rews-date" data-dcnode-id="4791"><span data-dcnode-id="4792" instrument_node="">03 Feb 2016</span></span></div><div class="w100 fl mt12" data-dcnode-id="4726"><div class="herb-rews-txt" data-dcnode-id="4774"><span data-dcnode-id="4789" instrument_node="">Dear Paramjit Singh</span><br data-dcnode-id="4788"><span data-dcnode-id="4787" instrument_node="">We suggest you, Please do not go for Chemotherapy. It will effect her badly and she will suffer from extreme pains and Hair fall. To know more about Chemo you may read our Cancer page. To fight with Cancer, you may follow the Regimen.</span><br data-dcnode-id="4786"><span data-dcnode-id="4785" instrument_node="">1. Fresh Wheat Grass juice shots. It will be better if you grow Wheat Grass of your own. 2. Turmeric tincture. Know how to make Tincture, Go to Glossary on this page, Type Tincture and follow the process. Start giving her after one week. 3. Give her 1 Apricot Kernel daily.</span><br data-dcnode-id="4784"><span data-dcnode-id="4783" instrument_node="">4. Give her two glasses of Carrot Juice Daily. 5. Give her Cannabis Indica ( Tincture ). This you can easily find on internet. Start with small doses. give her five drops morning evening.</span><br data-dcnode-id="4782"><span data-dcnode-id="4781" instrument_node="">6. Punrnava extract. Give her 10 drops in a day. Give her these remedies for one month and study the results. Write us back with results. </span><br data-dcnode-id="4780"><span data-dcnode-id="4779" instrument_node="">Regards</span><br data-dcnode-id="4778"><span data-dcnode-id="4777" instrument_node="">Herbpathy Research Team</span><br data-dcnode-id="4776"><span data-dcnode-id="4775" instrument_node="">( Make Life Healthy ) </span></div><span data-dcnode-id="4773" instrument_node=""> </span><div class="clr" data-dcnode-id="4771"><span data-dcnode-id="4772" instrument_node="">&nbsp; </span></div><div class="greytxtReview" data-dcnode-id="4769"><span data-dcnode-id="4770" instrument_node=""> This advice is for educational purpose only. It is not intended to replace a doctor. Please consult your doctor before taking any herb. </span></div><div class="reviewRply" data-dcnode-id="4767" disabled="" id="ReplyToReplyBtn401" onclick="ReplyToReply('2825','2775','2','Herbpathy Research Team','401')" style="display:none;"><span data-dcnode-id="4768" instrument_node="">Reply</span></div><div class="reply_box" data-dcnode-id="4765" id="Dv_ReplyToBox_401" name="ReplyToBx" runat ></div><div class="clr" data-dcnode-id="4652"><span data-dcnode-id="4653" instrument_node=""> &nbsp; </span></div><div class="article-herb-otr1" data-dcnode-id="4629"><div class="w100 fl" data-dcnode-id="4646"><div class="herb-rews-otr-img" data-dcnode-id="4649"><span class="herb-rews-img-txt" data-dcnode-id="4650"><span data-dcnode-id="4651" instrument_node=""> Herbpathy Research Team  </span></span></div><span class="herb-rews-date" data-dcnode-id="4647"><span data-dcnode-id="4648" instrument_node="">08 Feb 2016</span></span></div><div class="w100 fl mt12" data-dcnode-id="4630"><div class="herb-rews-txt" data-dcnode-id="4642"><span data-dcnode-id="4645" instrument_node="">Dear Marion Could you please explain that which herb are you talking about? Is it the treatment that we have mentioned for Breast Cancer to Anaxviii or the Meteria Medica that we have given for this Disease. Regards</span><br data-dcnode-id="4644"><span data-dcnode-id="4643" instrument_node="">Herbpathy Research Team ( Make Life Healthy ) </span></div><span data-dcnode-id="4641" instrument_node=""> </span><div class="clr" data-dcnode-id="4639"><span data-dcnode-id="4640" instrument_node="">&nbsp; </span></div><div class="greytxtReview" data-dcnode-id="4637"><span data-dcnode-id="4638" instrument_node=""> This advice is for educational purpose only. It is not intended to replace a doctor. Please consult your doctor before taking any herb. </span></div><div class="reviewRply" data-dcnode-id="4635" disabled="" id="ReplyToReplyBtn459" onclick="ReplyToReply('2870','2775','2','Herbpathy Research Team ','459')" style="display:none;"><span data-dcnode-id="4636" instrument_node="">Reply</span></div><div class="reply_box" data-dcnode-id="4633" id="Dv_ReplyToBox_459" name="ReplyToBx" runat="server" style="Display:none;"><span data-dcnode-id="4634" instrument_node=""> </span></div><div class="clr" data-dcnode-id="4631"><span data-dcnode-id="4632" instrument_node=""> &nbsp; </span></div></div></div></div></div><div class="article-herb-otr" data-dcnode-id="4557"><div class="w100 fl" data-dcnode-id="4620"><div class="herb-rews-otr-img" data-dcnode-id="4623"><span class="herb-rews-img-txt" data-dcnode-id="4625"><span data-dcnode-id="4626" instrument_node=""> Zaheer</span></span><span data-dcnode-id="4624" instrument_node=""> </span></div><span class="herb-rews-date" data-dcnode-id="4621"><span data-dcnode-id="4622" instrument_node="">14 Feb 2016</span></span></div><div class="w100 fl mt12" data-dcnode-id="4558"><div class="herb-rews-txt" data-dcnode-id="4566"><span data-dcnode-id="4619" instrument_node="">Awesome site for all the herbal needs. </span><br data-dcnode-id="4618"><br data-dcnode-id="4617"><span data-dcnode-id="4616" instrument_node="">Very good work. Truly outstanding. </span><br data-dcnode-id="4615"><br data-dcnode-id="4614"><span data-dcnode-id="4613" instrument_node="">Dear herbpathy research team, </span><br data-dcnode-id="4612"><br data-dcnode-id="4611"><span data-dcnode-id="4610" instrument_node="">My mother is suffering from breast cancer. </span><br data-dcnode-id="4609"><br data-dcnode-id="4608"><span data-dcnode-id="4607" instrument_node="">She was diagnosed with breast cancer in 2012</span><br data-dcnode-id="4606"><br data-dcnode-id="4605"><span data-dcnode-id="4604" instrument_node="">Doctors said it's 4th stage cancer. </span><br data-dcnode-id="4603"><br data-dcnode-id="4602"><span data-dcnode-id="4601" instrument_node="">They gave 2 chemo doses and did surgery then after they gave 6 chemo doses. </span><br data-dcnode-id="4600"><br data-dcnode-id="4599"><span data-dcnode-id="4598" instrument_node="">Then the doctor said me to give radiation. </span><br data-dcnode-id="4597"><br data-dcnode-id="4596"><span data-dcnode-id="4595" instrument_node="">He said if you give radiation we can guarantee your mother will live for 1 more year and if you don't give radiation she will die in 3-4 months. </span><br data-dcnode-id="4594"><br data-dcnode-id="4593"><span data-dcnode-id="4592" instrument_node="">The statement made my life finished. </span><br data-dcnode-id="4591"><span data-dcnode-id="4590" instrument_node="">But I have not given radiation to my mother. </span><br data-dcnode-id="4589"><br data-dcnode-id="4588"><span data-dcnode-id="4587" instrument_node="">I said doctor you have done your part now let God  do His part. </span><br data-dcnode-id="4586"><br data-dcnode-id="4585"><span data-dcnode-id="4584" instrument_node="">And took my mother back home. </span><br data-dcnode-id="4583"><br data-dcnode-id="4582"><span data-dcnode-id="4581" instrument_node="">This happen in 2013.</span><br data-dcnode-id="4580"><br data-dcnode-id="4579"><span data-dcnode-id="4578" instrument_node="">And now in 2015 January she felt again some hardness in her breast the same location when doctor did surgery and put stitches. </span><br data-dcnode-id="4577"><br data-dcnode-id="4576"><span data-dcnode-id="4575" instrument_node="">It became big and swelled. Like Tumor. </span><br data-dcnode-id="4574"><br data-dcnode-id="4573"><span data-dcnode-id="4572" instrument_node="">Then I applied copper acetate powder mixed in petroleum jelly. It acts like flesh eater. And it ate the skin and make the wound open and all green blue brown coloured blood came out. </span><br data-dcnode-id="4571"><br data-dcnode-id="4570"><span data-dcnode-id="4569" instrument_node="">My mother was suffering from pain. </span><br data-dcnode-id="4568"><span data-dcnode-id="4567" instrument_node="">But after that all liquid came out she felt little relaxed. </span></div><span data-dcnode-id="4565" instrument_node=""> </span><div class="reviewRply" data-dcnode-id="4563" disabled="" id="ReplyBtn3006" onclick="ReplyBx('3006','2775','2','Zaheer')" style="display:none;"><span data-dcnode-id="4564" instrument_node="">Reply</span></div><div class="reply_box" data-dcnode-id="4561" id="Dv_ReplyBox_3006" name="ReplyBx" runat="server" style="Display:none;"><span data- nd that Tumor wound is also giving pain. </span><br data-dcnode-id="4525"><br data-dcnode-id="4524"><br data-dcnode-id="4523"><span data-dcnode-id="4522" instrument_node="">Kindly help me. </span><br data-dcnode-id="4521"><br data-dcnode-id="4520"><span data-dcnode-id="4519" instrument_node="">Note: her kidney is also weak. She is having history of high creatinine. </span><br data-dcnode-id="4518"><br data-dcnode-id="4517"><span data-dcnode-id="4516" instrument_node="">She suffered 8 chemo doses. But recovered well. </span><br data-dcnode-id="4515"><br data-dcnode-id="4514"><span data-dcnode-id="4513" instrument_node="">Now daily she is suffering coz of that Tumor pain. And bleeding. </span><br data-dcnode-id="4512"><br data-dcnode-id="4511"><span data-dcnode-id="4510" instrument_node="">What to do...? </span><br data-dcnode-id="4509"><br data-dcnode-id="4508"><span data-dcnode-id="4507" instrument_node="">Help me. </span><br data-dcnode-id="4506"><br data-dcnode-id="4505"><br data-dcnode-id="4504"><span data-dcnode-id="4503" instrument_node="">Zaheer </span></div><span data-dcnode-id="4501" instrument_node=""> </span><div class="reviewRply" data-dcnode-id="4499" disabled="" id="ReplyBtn3007" onclick="ReplyBx('3007','2775','2','Zaheer')" style="display:none;"><span data-dcnode-id="4500" instrument_node="">Reply</span></div><div class="reply_box" data-dcnode-id="4497" id="Dv_ReplyBox_3007" name="ReplyBx" runat="server" style="Display:none;"><span data-dcnode-id="4498" instrument_node=""> </span></div><div class="clr" data-dcnode-id="4495"><span data-dcnode-id="4496" instrument_node=""> &nbsp; </span></div><div class="article-herb-otr1" data-dcnode-id="4355"><div class="w100 fl" data-dcnode-id="4489"><div class="herb-rews-otr-img" data-dcnode-id="4492"><span class="herb-rews-img-txt" data-dcnode-id="4493"><span data-dcnode-id="4494" instrument_node=""> Herbpathy Research Team </span></span></div><span class="herb-rews-date" data-dcnode-id="4490"><span data-dcnode-id=" ply('0','2775','2','Dazy','3615')" style="display:none;"><span data-dcnode-id="3802" instrument_node="">Reply</span></div><div class="reply_box" data-dcnode-id="3799" id="Dv_ReplyToReplyBox_3615" name="ReplyToReplyBx" runat="server" style="Display:none;"><span data-dcnode-id="3800" instrument_node=""> </span></div><div class="clr" data-dcnode-id="3797"><span data-dcnode-id="3798" instrument_node=""> &nbsp; </span></div></div></div></div></div></div></div><div class="article-herb-otr" data-dcnode-id="3702"><div class="w100 fl" data-dcnode-id="3782"><div class="herb-rews-otr-img" data-dcnode-id="3785"><span class="herb-rews-img-txt" data-dcnode-id="3789"><span data-dcnode-id="3790" instrument_node=""> Natraj</span></span><span data-dcnode-id="3788" instrument_node=""> </span><span class="herb-rews-img-txt" data-dcnode-id="3786" style="margin-left:5px;"><span data-dcnode-id="3787" instrument_node="">( India/ Tamilnadu ) </span></span></div><span class="herb-rews-date" data-dcnode-id="3783"><span data-dcnode-id="3784" instrument_node="">13 Jul 2016</span></span></div><div class="w100 fl mt12" data-dcnode-id="3703"><div class="herb-rews-txt" data-dcnode-id="3767"><span data-dcnode-id="3781" instrument_node="">Respected Doctor,</span><br data-dcnode-id="3780"><br data-dcnode-id="3779"><span data-dcnode-id="3778" instrument_node="">My mother is 83 years old. This february'2016 she noticed a lump 6.0 mm in diameter in her left breast. FNAV &amp; Tricut investigation was done. FNAV test resulted as malignant carcinoma but Tricut did not reveal as cancer. </span><br data-dcnode-id="3777"><br data-dcnode-id="3776"><span data-dcnode-id="3775" instrument_node="">Also this May'2016 she underwent right knee total replacement. The surgeon who did the replacement is insisting to remove her left breast. He also states that if the lump bursts my mother may experience lots of suffering &amp; removal will be difficult. </span><br data-dcnode-id="3774"><span data-dcnode-id="3773" instrument_node="">Due to age factor our family doctor has advised not to go for and chemo or radiation and leave as it is. Nowadays my mother is experiencing thirst, tiredness, back pain, cough with thick phlegm, pain in the left arm &amp; feels to be sleeping in the bed. In her days she was very active. Seeing her condition makes me very sad. We have sent the reports to Jains cow urine therapy Indore for consultation. To my knowledge it will take atleast 10 days for their response. </span><br data-dcnode-id="3772"><span data-dcnode-id="3771" instrument_node="">Can you please give some good opinion &amp; also first aid to keep her well being avoiding further spreading of the cancer cells.</span><br data-dcnode-id="3770"><br data-dcnode-id="3769"><span data-dcnode-id="3768" instrument_node="">Note: This is genetic. My mothers younger sister passed away few years back due to cancer. Also I lost my </span></div><span data-dcnode-id="3766" instrument_node=""> </span><div class="reviewRply" data-dcnode-id="3764" disabled="" id="ReplyBtn6449" onclick="ReplyBx('6449','2775','2','Natraj')" style="display:none;"><span data-dcnode-id="3765" instrument_node="">Reply</span></div><div class="reply_box" data-dcnode-id="3762" id="Dv_ReplyBox_6449" name="ReplyBx" runat="server" style="Display:none;"><span data-dcnode-id="3763" instrument_node=""> </span></div><div class="clr" data-dcnode-id="3760"><span data-dcnode-id="3761" instrument_node=""> &nbsp; </span></div><div class="article-herb-otr1" data-dcnode-id="3704"><div class="w100 fl" data-dcnode-id="3754"><div class="herb-rews-otr-img" data-dcnode-id="3757"><span class="herb-rews-img-txt" data-dcnode-id="3758"><span data-dcnode-id="3759" instrument_node=""> Suman </span></span></div><span class="herb-rews-date" data-dcnode-id="3755"><span data-dcnode-id="3756" instrument_node="">14 Jul 2016</span></span></div><div class="w100 fl mt12" data-dcnode-id="3705"><div class="herb-rews-txt" data-dcnode-id="3740"><span data-dcnode-id="3753" instrument_node="">Dear Natraj</span><br data-dcnode-id="3752"><span data-dcnode-id="3751" instrument_node="">Sorry to hear about your mother. Her condition seems very bad. And she is 83 now, and I just don't understand why the doctor is insisting you to remove her breast? Because I don't think the lump is such big? I would advise to to take another opinion too. May be it may get dried by some medicines or Herbs. Anyhow, I can suggest you few herbs that are good to prevent the abnormal growth of cells or cancer cells. And also the herbs which may combat the side effects of Chemotherapy. Follow the Regimen.</span><br data-dcnode-id="3750"><span data-dcnode-id="3749" instrument_node="">Herbs to combat the side effects of Chemotherapy are given below.</span><br data-dcnode-id="3748"><span data-dcnode-id="3747" instrument_node="">1. Ginger for Digestive Disorders : Drink Ginger tea or chew a few slices of Ginger in the Morning. It will also help in Nausea.</span><br data-dcnode-id="3746"><span data-dcnode-id="3745" instrument_node="">2. Beetroot for Anemia: Add Beetroot to your Salad. Or take fresh Beetroot juice.</span><br data-dcnode-id="3744"><span data-dcnode-id="3743" instrument_node="">3. Passion Flower for Anxiety: Drink the decoction made of Passion Flower Leaves.</span><br data-dcnode-id="3742"><span data-dcnode-id="3741" instrument_node="">4. Astragalus for Weak Immune System. Take extract. </span></div><span data-dcnode-id="3739" instrument_node=""> </span><div class="reviewRply" data-dcnode-id="3737" disabled="" id="ReplyToReplyBtn2904" onclick="ReplyToReply('6449','2775','2','Suman','2904')" style="display:none;"><span data-dcnode-id="3738" instrument_node="">Reply</span></div><div class="reply_box" data-dcnode-id="3735" id="Dv_ReplyToBox_2904" name="ReplyToBx" runat="server" style="Display:none;"><span data-dcnode-id="3736" instrument_node=""> </span></div><div class="clr" data-dcnode-id="3733"><span data-dcnode-id="3734" instrument_node=""> &nbsp; </span></ cial knee. He also mentioned that the lump has to be removed else it will form as fungus and affect the artificial knee.I need your opinion on this. </span><br data-dcnode-id="3683"><span data-dcnode-id="3682" instrument_node="">Once again I thank you very much</span><br data-dcnode-id="3681"><span data-dcnode-id="3680" instrument_node=""> </span></div><span data-dcnode-id="3678" instrument_node=""> </span><div class="reviewRply" data-dcnode-id="3676" disabled="" id="ReplyBtn6475" onclick="ReplyBx('6475','2775','2','Natraj')" style="display:none;"><span data-dcnode-id="3677" instrument_node="">Reply</span></div><div class="reply_box" data-dcnode-id="3674" id="Dv_ReplyBox_6475" name="ReplyBx" runat="server" style="Display:none;"><span data-dcnode-id="3675" instrument_node=""> </span></div><div class="clr" data-dcnode-id="3672"><span data-dcnode-id="3673" instrument_node=""> &nbsp; </span></div><div class="article-herb-otr1" data-dcnode-id="3651"><div class="w100 fl" data-dcnode-id="3666"><div class="herb-rews-otr-img" data-dcnode-id="3669"><span class="herb-rews-img-txt" data-dcnode-id="3670"><span data-dcnode-id="3671" instrument_node=""> Suman </span></span></div><span class="herb-rews-date" data-dcnode-id="3667"><span data-dcnode-id="3668" instrument_node="">21 Jul 2016</span></span></div><div class="w100 fl mt12" data-dcnode-id="3652"><div class="herb-rews-txt" data-dcnode-id="3660"><span data-dcnode-id="3665" instrument_node="">Dear Natraj</span><br data-dcnode-id="3664"><span data-dcnode-id="3663" instrument_node="">No need to add Milk, You may add 2 to 3 fresh slices of ginger and boil it for 5 to 10 min. Drink that tea without milk.</span><br data-dcnode-id="3662"><span data-dcnode-id="3661" instrument_node="">For Eczema, you may apply Olive Oil. I can't say about Knee replacement, But yes you may take these herbs with cow urine therapy. I would like to suggest you to please consult your doctor. </span></div><span data-dcnode-id="3659" instrument_node=""> </s em. Take extract.</span><br data-dcnode-id="2909"><span data-dcnode-id="2908" instrument_node="">To combat the side effects of Chemo....</span><br data-dcnode-id="2907"><span data-dcnode-id="2906" instrument_node="">1. Ginger for Digestive Disorders : Drink Ginger tea or chew a few slices of Ginger in the Morning. It will also help in Nausea.</span><br data-dcnode-id="2905"><span data-dcnode-id="2904" instrument_node="">2. Beetroot for Anemia: Add Beetroot to your Salad. Or take fresh Beetroot juice.</span><br data-dcnode-id="2903"><span data-dcnode-id="2902" instrument_node="">3. Passion Flower for Anxiety: Drink the decoction made of Passion Flower Leaves. </span></div><span data-dcnode-id="2900" instrument_node=""> </span><div class="clr" data-dcnode-id="2898"><span data-dcnode-id="2899" instrument_node="">&nbsp; </span></div><div class="greytxtReview" data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node=""> This advice is for educational purpose only. It is not intended to replace a doctor. Please consult your doctor before taking any herb. </span></div><div class="reviewRply" data-dcnode-id="2894" disabled="" id="ReplyToReplyBtn5929" onclick="ReplyToReply('9453','2775','2','Herbpathy','5929')" style="display:none;"><span data-dcnode-id="2895" instrument_node="">Reply</span></div><div class="reply_box" data-dcnode-id="2892" id="Dv_ReplyToBox_5929" name="ReplyToBx" runat="server" style="Display:none;"><span data-dcnode-id="2893" instrument_node=""> </span></div><div class="clr" data-dcnode-id="2890"><span data-dcnode-id="2891" instrument_node=""> &nbsp; </span></div><div class="article-herb-otr1" data-dcnode-id="2838"><div class="w100 fl" data-dcnode-id="2884"><div class="herb-rews-otr-img" data-dcnode-id="2887"><span class="herb-rews-img-txt" data-dcnode-id="2888"><span data-dcnode-id="2889" instrument_node=""> Herbpathy </span></span></div><span class="herb-rews-date" data-dcnode-id="2885"><span data-dcnode-id="2886" instrument_node="">01 Nov 2016< cancer was gone and the patient recovered back to normal.</span><br data-dcnode-id="2469"><span data-dcnode-id="2468" instrument_node="">3.	3 Apricot Kernels 3 times in a day.</span><br data-dcnode-id="2467"><span data-dcnode-id="2466" instrument_node="">4.	Turmeric with Black Pepper.</span><br data-dcnode-id="2465"><span data-dcnode-id="2464" instrument_node="">5.	Fresh Soursoup Juice daily.</span><br data-dcnode-id="2463"><span data-dcnode-id="2462" instrument_node="">Take these herbs for 1 month and get her test done. </span></div><span data-dcnode-id="2460" instrument_node=""> </span><div class="clr" data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">&nbsp; </span></div><div class="greytxtReview" data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node=""> This advice is for educational purpose only. It is not intended to replace a doctor. Please consult your doctor before taking any herb. </span></div><div class="reviewRply" data-dcnode-id="2454" disabled="" id="ReplyToReplyBtn6807" onclick="ReplyToReply('10334','2775','2','Herbpathy','6807')" style="display:none;"><span data-dcnode-id="2455" instrument_node="">Reply</span></div><div class="reply_box" data-dcnode-id="2452" id="Dv_ReplyToBox_6807" name="ReplyToBx" runat="server" style="Display:none;"><span data-dcnode-id="2453" instrument_node=""> </span></div><div class="clr" data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node=""> &nbsp; </span></div></div></div></div></div><div class="article-herb-otr" data-dcnode-id="2368"><div class="w100 fl" data-dcnode-id="2437"><div class="herb-rews-otr-img" data-dcnode-id="2440"><span class="herb-rews-img-txt" data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node=""> K.vijaya</span></span><span data-dcnode-id="2443" instrument_node=""> </span><span class="herb-rews-img-txt" data-dcnode-id="2441" style="margin-left:5px;"><span data-dcnode-id="2442" instrument_node="">( India/Andhra ) </span></span></div><span class="her xt" data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node=""> Herbpathy </span></span></div><span class="herb-rews-date" data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">10 Mar 2017</span></span></div><div class="w100 fl mt12" data-dcnode-id="2101"><div class="herb-rews-txt" data-dcnode-id="2113"><span data-dcnode-id="2120" instrument_node="">Dear Natraj</span><br data-dcnode-id="2119"><span data-dcnode-id="2118" instrument_node="">Arsenic Alb is her medicine. Buy Arsenic Alb in LM potency like 0/1, 0/3 and 0/5. Start with 0/1 once in a day for her pains. Give it for 10 to 15 days.</span><br data-dcnode-id="2117"><span data-dcnode-id="2116" instrument_node="">Then give her 0/3 for 10 days and 0/5 for 10 days.</span><br data-dcnode-id="2115"><span data-dcnode-id="2114" instrument_node="">If you keep giving her Arsenic 200, she will become restlessness. Study the results and write us after 45 days. </span></div><span data-dcnode-id="2112" instrument_node=""> </span><div class="clr" data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">&nbsp; </span></div><div class="greytxtReview" data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node=""> This advice is for educational purpose only. It is not intended to replace a doctor. Please consult your doctor before taking any herb. </span></div><div class="reviewRply" data-dcnode-id="2106" disabled="" id="ReplyToReplyBtn8322" onclick="ReplyToReply('11917','2775','2','Herbpathy','8322')" style="display:none;"><span data-dcnode-id="2107" instrument_node="">Reply</span></div><div class="reply_box" data-dcnode-id="2104" id="Dv_ReplyToBox_8322" name="ReplyToBx" runat="server" style="Display:none;"><span data-dcnode-id="2105" instrument_node=""> </span></div><div class="clr" data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node=""> &nbsp; </span></div></div></div></div></div><div class="article-herb-otr" data-dcnode-id="2015"><div class="w100 fl" data-dcnode-id="2089"><div class="herb-rews-otr-img" data-dcnode-id="2092"><span class="herb-rews-img-txt" data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node=""> Mohinder Singh</span></span><span data-dcnode-id="2095" instrument_node=""> </span><span class="herb-rews-img-txt" data-dcnode-id="2093" style="margin-left:5px;"><span data-dcnode-id="2094" instrument_node="">( India/ Chandigarh ) </span></span></div><span class="herb-rews-date" data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">18 Mar 2017</span></span></div><div class="w100 fl mt12" data-dcnode-id="2016"><div class="herb-rews-txt" data-dcnode-id="2080"><span data-dcnode-id="2088" instrument_node="">My wife has breast cancer Stage 2. She is taking treatment from PGI Chandigarh. 5 out of 8 chemotherapies have been given. 6th chemotherapy will be given on 24th March. It is really painful and a has lot of side-effects. She will be operated upon after the chemotherapy which includes removal of both the breasts. We have been told that the treatment will last for approximately 5 years, which includes radiation therapy and hormones etc. </span><br data-dcnode-id="2087"><span data-dcnode-id="2086" instrument_node="">The treatment, you are suggesting, can be  given along with the chemotherapy ? Please suggest. </span><br data-dcnode-id="2085"><br data-dcnode-id="2084"><span data-dcnode-id="2083" instrument_node="">Mohinder Singh,</span><br data-dcnode-id="2082"><span data-dcnode-id="2081" instrument_node="">Chandigarh. </span></div><span data-dcnode-id="2079" instrument_node=""> </span><div class="reviewRply" data-dcnode-id="2077" disabled="" id="ReplyBtn12184" onclick="ReplyBx('12184','2775','2','Mohinder Singh')" style="display:none;"><span data-dcnode-id="2078" instrument_node="">Reply</span></div><div class="reply_box" data-dcnode-id="2075" id="Dv_ReplyBox_12184" name="ReplyBx" runat="server" style="Display:none;"><span data-dcnode-id="2076" instrument_node=""> </span></div><div class="clr" data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node=""> &nbsp; </span></div><div class="article-herb-otr1" data-dcnode-id="2017"><div class="w100 fl" data-dcnode-id="2067"><div class="herb-rews-otr-img" data-dcnode-id="2070"><span class="herb-rews-img-txt" data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node=""> Herbpathy </span></span></div><span class="herb-rews-date" data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">20 Mar 2017</span></span></div><div class="w100 fl mt12" data-dcnode-id="2018"><div class="herb-rews-txt" data-dcnode-id="2051"><span data-dcnode-id="2066" instrument_node="">Dear Mohinder Singh</span><br data-dcnode-id="2065"><span data-dcnode-id="2064" instrument_node="">Herbs to combat the side effects of Chemotherapy are given below.</span><br data-dcnode-id="2063"><span data-dcnode-id="2062" instrument_node="">1. Drink Ginger tea or chew a few slices of Ginger to treat digestive disorders. 2. Beetroot helps to deal with Anemia, Add Beetroot to your Salad. 3. Have a cup of Passion Flower tea for Anxiety.</span><br data-dcnode-id="2061"><span data-dcnode-id="2060" instrument_node="">The mentioned Herbs will fight against Cancer cells and prevent the further growth of Cancer. 1. A shot of fresh Wheat Grass Juice.</span><br data-dcnode-id="2059"><span data-dcnode-id="2058" instrument_node="">2. Drink a glass of carrot juice 3 times in a day.</span><br data-dcnode-id="2057"><span data-dcnode-id="2056" instrument_node="">3. 3 Apricot Kernels 3 times in a day.</span><br data-dcnode-id="2055"><span data-dcnode-id="2054" instrument_node="">4. Turmeric with Black Pepper.</span><br data-dcnode-id="2053"><span data-dcnode-id="2052" instrument_node="">5. Have a cup of Fagonia tea daily. </span></div><span data-dcnode-id="2050" instrument_node=""> </span><div class="clr" data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">&nbsp; </span></div><div class="greytxtReview" data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node=""> This advice is for educational purpose only. It is not intended to replace a doctor. Please consult your doctor before taking any herb. </span></div><div class="reviewRply" data-dcnode-id="2044" disabled="" id="ReplyToReplyBtn8517" onclick="ReplyToReply('12184','2775','2','Herbpathy','8517')" style="display:none;"><span data-dcnode-id="2045" instrument_node="">Reply</span></div><div class="reply_box" data-dcnode-id="2042" id="Dv_ReplyToBox_8517" name="ReplyToBx" runat="server" style="Display:none;"><span data-dcnode-id="2043" instrument_node=""> </span></div><div class="clr" data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node=""> &nbsp; </span></div><div class="article-herb-otr1" data-dcnode-id="2019"><div class="w100 fl" data-dcnode-id="2034"><div class="herb-rews-otr-img" data-dcnode-id="2037"><span class="herb-rews-img-txt" data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node=""> Mohinder Singh, Chandigarh. </span></span></div><span class="herb-rews-date" data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">20 Mar 2017</span></span></div><div class="w100 fl mt12" data-dcnode-id="2020"><div class="herb-rews-txt" data-dcnode-id="2028"><span data-dcnode-id="2033" instrument_node="">Thank you very much,Team Herbpathy.</span><br data-dcnode-id="2032"><span data-dcnode-id="2031" instrument_node="">We will go as per your advice.</span><br data-dcnode-id="2030"><span data-dcnode-id="2029" instrument_node="">Do we need to inform the treating doctor regarding this treatment? </span></div><span data-dcnode-id="2027" instrument_node=""> </span><div class="reviewRply" data-dcnode-id="2025" id="ReplyToReplyofReplyBtn8522" onclick="ReplyToReplyofReply('0','2775','2','Mohinder Singh, Chandigarh.','8522')" style="display:none;"><span data-dcnode-id="2026" instrument_node="">Reply</span></div><div class="reply_box" data-dcnode-id="2023" id="Dv_ReplyToReplyBox_8522" name="ReplyToReplyBx" runat="server" style="Display:none;"><span data-dcnode-id="2024" instrument_node=""> </span></div><div class="clr" data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node=""> &nbsp; </span></div></div></div></div></div></div></div><div class="article-herb-otr" data-dcnode-id="1962"><div class="w100 fl" data-dcnode-id="2006"><div class="herb-rews-otr-img" data-dcnode-id="2009"><span class="herb-rews-img-txt" data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node=""> Alefiya</span></span><span data-dcnode-id="2012" instrument_node=""> </span><span class="herb-rews-img-txt" data-dcnode-id="2010" style="margin-left:5px;"><span data-dcnode-id="2011" instrument_node="">( Gujarat ) </span></span></div><span class="herb-rews-date" data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">30 Mar 2017</span></span></div><div class="w100 fl mt12" data-dcnode-id="1963"><div class="herb-rews-txt" data-dcnode-id="2002"><span data-dcnode-id="2005" instrument_node="">Dr.. </span><br data-dcnode-id="2004"><span data-dcnode-id="2003" instrument_node="">My mom has been diagnosed with triple negative  breast cancer.4 stage....she has finished 4 chemos...til the 3 chemo she was treated with taxel...n from 4  she was treated with taxel n carboplatin.....can u pl recommend something for fast healing n gud immune system... </span></div><span data-dcnode-id="2001" instrument_node=""> </span><div class="reviewRply" data-dcnode-id="1999" disabled="" id="ReplyBtn12511" onclick="ReplyBx('12511','2775','2','Alefiya')" style="display:none;"><span data-dcnode-id="2000" instrument_node="">Reply</span></div><div class="reply_box" data-dcnode-id="1997" id="Dv_ReplyBox_12511" name="ReplyBx" runat="server" style="Display:none;"><span data-dcnode-id="1998" instrument_node=""> </span></div><div class="clr" data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node=""> &nbsp; </span></div><div class="article-herb-otr1" data-dcnode-id="1964"><div class="w100 fl" data-dcnode-id="1989"><div class="herb-rews-otr-img" data-dcnode-id="1992"><span class="herb-rews-img-txt" data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node=""> Kirandeep </span></span></div><span class="herb-rews-date" data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">03 Apr 2017</span></span></div><div class="w100 fl mt12" data-dcnode-id="1965"><div class="herb-rews-txt" data-dcnode-id="1973"><span data-dcnode-id="1988" instrument_node="">Dear Alefiya</span><br data-dcnode-id="1987"><span data-dcnode-id="1986" instrument_node="">Try the following Regimen.</span><br data-dcnode-id="1985"><span data-dcnode-id="1984" instrument_node="">To boost her Immunity Take Echinacea and Goldenseal. Buy tablets or tincture. Have 1 tablet or 10 drops 2 times in a glass of water.</span><br data-dcnode-id="1983"><span data-dcnode-id="1982" instrument_node="">Have a cup of Fagonia Cretica tea every day. It is one of the best remedy for Breast Cancer.</span><br data-dcnode-id="1981"><span data-dcnode-id="1980" instrument_node="">Have a fresh shot of Wheat grass juice every day.</span><br data-dcnode-id="1979"><span data-dcnode-id="1978" instrument_node="">Have a glass of fresh Carrot juice and beetroot every day.</span><br data-dcnode-id="1977"><span data-dcnode-id="1976" instrument_node="">Have 1 teaspoon of Ashwagandha daily with a glass of water.</span><br data-dcnode-id="1975"><span data-dcnode-id="1974" instrument_node="">Eat healthy and stay positive. </span></div><span data-dcnode-id="1972" instrument_node=""> </span><div class="reviewRply" data-dcnode-id="1970" disabled="" id="ReplyToReplyBtn8868" onclick="ReplyToReply('12511','2775','2','Kirandeep','8868')" style="display:none;"><span data-dcnode-id="1971" instrument_node="">Reply</span></div><div class="reply_box" data-dcnode-id="1968" id="Dv_ReplyToBox_8868" name="ReplyToBx" runat="server" style="Display:none;"><span data-dcnode-id="1969" instrument_node=""> </span></div><div class="clr" data-dcnode-id="1966"> ata-dcnode-id="1941" instrument_node="">Primary illness: Acute gastroenteritis with hypotension &amp; Sepsis.</span><br data-dcnode-id="1940"><span data-dcnode-id="1939" instrument_node="">Associated disease: CA breast with secondaries, 2. Systemic hypertension(I 10)3. S/P TKR Right (May 2015)</span><br data-dcnode-id="1938"><span data-dcnode-id="1937" instrument_node="">Chief complaint: passing stools  -3 times, breathlessness*</span><br data-dcnode-id="1936"><span data-dcnode-id="1935" instrument_node="">Past history: Systemic hypertension&gt;4years</span><br data-dcnode-id="1934"><span data-dcnode-id="1933" instrument_node="">alignancy-CA breast left side with lung and liver secondaries. Drughistory: Tab Ativan, 1mg. becozyn C forte, syrup betonin and Stimuliv,........Continued</span><br data-dcnode-id="1932"><br data-dcnode-id="1931"><span data-dcnode-id="1930" instrument_node=""> , </span></div><span data-dcnode-id="1928" instrument_node=""> </span><div class="reviewRply" data-dcnode-id="1926" disabled="" id="ReplyBtn13213" onclick="ReplyBx('13213','2775','2','Natraj')" style="display:none;"><span data-dcnode-id="1927" instrument_node="">Reply</span></div><div class="reply_box" data-dcnode-id="1924" id="Dv_ReplyBox_13213" name="ReplyBx" runat="server" style="Display:none;"><span data-dcnode-id="1925" instrument_node=""> </span></div><div class="clr" data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node=""> &nbsp; </span></div></div></div><div class="article-herb-otr" data-dcnode-id="1879"><div class="w100 fl" data-dcnode-id="1913"><div class="herb-rews-otr-img" data-dcnode-id="1916"><span class="herb-rews-img-txt" data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node=""> Natraj</span></span><span data-dcnode-id="1917" instrument_node=""> </span></div><span class="herb-rews-date" data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">27 Apr 2017</span></span></div><div class="w100 fl mt12" data-dcnode-id="1880"><div class="h an data-dcnode-id="873" instrument_node=""> Herbpathy </span></span></div><span class="herb-rews-date" data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">09 Oct 2019</span></span></div><div class="w100 fl mt12" data-dcnode-id="801"><div class="herb-rews-txt" data-dcnode-id="852"><span data-dcnode-id="867" instrument_node="">Dera Shekela We are sorry to hear about your condition. You must be going through a lot. But, do not worry, everything will be set right.</span><br data-dcnode-id="866"><span data-dcnode-id="865" instrument_node="">Just have faith.</span><br data-dcnode-id="864"><span data-dcnode-id="863" instrument_node="">The moment you feed your faith, the fear will starve. And then, there you go, overcoming this challenge, like any other challenges you must have so far in your life. </span><br data-dcnode-id="862"><span data-dcnode-id="861" instrument_node="">Please take the following, every day for the next 1 month. </span><br data-dcnode-id="860"><span data-dcnode-id="859" instrument_node="">1. Baking Soda: Mix half a teaspoon of baking soda in a glass of water. Drink it in the morning and evening. </span><br data-dcnode-id="858"><span data-dcnode-id="857" instrument_node="">2. Turmeric Lehyam: Also called turmeric halwa. As turmeric is not soluble in milk or water. Take organic turmeric, mix it with ghee and heat it up, stir, to avoid the over roasting of paste. Store it in a jar and consume this lehyam daily with warm milk.</span><br data-dcnode-id="856"><span data-dcnode-id="855" instrument_node="">3. Ganoderma: You can buy a herb called Ganoderma ( Reishi Mushroom ), it is a Chinese Herb having amazing anti-cancer properties. Easily available online. </span><br data-dcnode-id="854"><span data-dcnode-id="853" instrument_node="">TO BE CONTINUED ... </span></div><span data-dcnode-id="851" instrument_node=""> </span><div class="clr" data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">&nbsp; </span></div><div class="greytxtRevi k fruit every day. Make sure you have ripened fruit not raw.</span><br data-dcnode-id="825"><span data-dcnode-id="824" instrument_node="">- Take a bowl of soursop soup every day. - Take massive doses of Vitamin C every day. </span><br data-dcnode-id="823"><span data-dcnode-id="822" instrument_node="">You would have to include these herbs in your daily diet. And I am sure, the results would be amazing. </span><br data-dcnode-id="821"><span data-dcnode-id="820" instrument_node="">Just don't forget, that the recovery is brought about by the patient himself, and not the health care provider. </span><br data-dcnode-id="819"><span data-dcnode-id="818" instrument_node="">Patient heals himself, by his own will power, and hope. You see, it works exactly as the person walks, talks, eats, sleeps on his own. </span><br data-dcnode-id="817"><span data-dcnode-id="816" instrument_node="">Take Care!!! </span></div><span data-dcnode-id="814" instrument_node=""> </span><div class="clr" data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">&nbsp; </span></div><div class="greytxtReview" data-dcnode-id="810"><span data-dcnode-id="811" instrument_node=""> This advice is for educational purpose only. It is not intended to replace a doctor. Please consult your doctor before taking any herb. </span></div><div class="reviewRply" data-dcnode-id="808" id="ReplyToReplyofReplyBtn16537" onclick="ReplyToReplyofReply('0','2775','2','Herbpathy','16537')" style="display:none;"><span data-dcnode-id="809" instrument_node="">Reply</span></div><div class="reply_box" data-dcnode-id="806" id="Dv_ReplyToReplyBox_16537" name="ReplyToReplyBx" runat="server" style="Display:none;"><span data-dcnode-id="807" instrument_node=""> </span></div><div class="clr" data-dcnode-id="804"><span data-dcnode-id="805" instrument_node=""> &nbsp; </span></div></div></div></div></div></div></div><div class="article-herb-otr" data-dcnode-id="742"><div class="w100 fl" data-dcnode-id="789"><div class="herb-rews-otr-img id="666" instrument_node="">3. Have a cup of fresh wheat grass juice every day.</span><br data-dcnode-id="665"><span data-dcnode-id="664" instrument_node="">4. Take fresh carrot, beetroot, celery, oranges, lemon and add a few drops of Hemp oil on it. Give a bowl of salad every day.</span><br data-dcnode-id="663"><span data-dcnode-id="662" instrument_node="">5. Give massive doses of Vitamin C every day.</span><br data-dcnode-id="661"><span data-dcnode-id="660" instrument_node="">6. Take carrot juice, 2-3 glasses every day, regularly for 8 weeks. This is so effective that it can even reverse the Cancer.</span><br data-dcnode-id="659"><span data-dcnode-id="658" instrument_node="">Follow it for 2-3 months. </span></div><span data-dcnode-id="656" instrument_node=""> </span><div class="clr" data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">&nbsp; </span></div><div class="greytxtReview" data-dcnode-id="652"><span data-dcnode-id="653" instrument_node=""> This advice is for educational purpose only. It is not intended to replace a doctor. Please consult your doctor before taking any herb. </span></div><div class="reviewRply" data-dcnode-id="650" disabled="" id="ReplyToReplyBtn17528" onclick="ReplyToReply('29840','2775','2','Herbpathy','17528')" style="display:none;"><span data-dcnode-id="651" instrument_node="">Reply</span></div><div class="reply_box" data-dcnode-id="648" id="Dv_ReplyToBox_17528" name="ReplyToBx" runat="server" style="Display:none;"><span data-dcnode-id="649" instrument_node=""> </span></div><div class="clr" data-dcnode-id="646"><span data-dcnode-id="647" instrument_node=""> &nbsp; </span></div></div></div></div></div><div class="article-herb-otr" data-dcnode-id="622"><div class="w100 fl" data-dcnode-id="633"><div class="herb-rews-otr-img" data-dcnode-id="636"><span class="herb-rews-img-txt" data-dcnode-id="640"><span data-dcnode-id="641" instrument_node=""> Mrs Wasif</span></span><span data-dcnode-id="639" instrument_node=""> </span><span c rently taking. What would you recommend she take at this current stage? </span></div><span data-dcnode-id="610" instrument_node=""> </span><div class="reviewRply" data-dcnode-id="608" disabled="" id="ReplyBtn30883" onclick="ReplyBx('30883','2775','2','Joseph')" style="display:none;"><span data-dcnode-id="609" instrument_node="">Reply</span></div><div class="reply_box" data-dcnode-id="606" id="Dv_ReplyBox_30883" name="ReplyBx" runat="server" style="Display:none;"><span data-dcnode-id="607" instrument_node=""> </span></div><div class="clr" data-dcnode-id="604"><span data-dcnode-id="605" instrument_node=""> &nbsp; </span></div><div class="article-herb-otr1" data-dcnode-id="569"><div class="w100 fl" data-dcnode-id="598"><div class="herb-rews-otr-img" data-dcnode-id="601"><span class="herb-rews-img-txt" data-dcnode-id="602"><span data-dcnode-id="603" instrument_node=""> Herbpathy </span></span></div><span class="herb-rews-date" data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">15 Jul 2020</span></span></div><div class="w100 fl mt12" data-dcnode-id="570"><div class="herb-rews-txt" data-dcnode-id="582"><span data-dcnode-id="597" instrument_node="">Dear Joseph</span><br data-dcnode-id="596"><span data-dcnode-id="595" instrument_node="">Please follow the following:</span><br data-dcnode-id="594"><span data-dcnode-id="593" instrument_node="">- Cleavers: The homeopathic form of herb- Galium Aparium mother tincture. Take 3 drops in a glass of water.</span><br data-dcnode-id="592"><span data-dcnode-id="591" instrument_node="">- Fagonia Cretica: Take tea from the dried herb.</span><br data-dcnode-id="590"><span data-dcnode-id="589" instrument_node="">- Garlic: Eat 1 raw Garlic clove daily in the morning. Crush it with a wooden tool.</span><br data-dcnode-id="588"><span data-dcnode-id="587" instrument_node="">- Turmeric: Have Turmeric milk or Turmeric water.</span><br data-dcnode-id="586"><span data-dcnode-id="585" instrument_node="">- Soursop: Eat it as fruit, juice, or chop some fresh stems and leaves of Soursop. Boil them in 1-liter water until water is reduced to half. Strain. Drink 100 ml twice a day. You may add Honey.</span><br data-dcnode-id="584"><span data-dcnode-id="583" instrument_node="">Add immunity boosters to diet as Indian gooseberry, Vitamin C, Carrot juice daily (2-3 glass). </span></div><span data-dcnode-id="581" instrument_node=""> </span><div class="clr" data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">&nbsp; </span></div><div class="greytxtReview" data-dcnode-id="577"><span data-dcnode-id="578" instrument_node=""> This advice is for educational purpose only. It is not intended to replace a doctor. Please consult your doctor before taking any herb. </span></div><div class="reviewRply" data-dcnode-id="575" disabled="" id="ReplyToReplyBtn18171" onclick="ReplyToReply('30883','2775','2','Herbpathy','18171')" style="display:none;"><span data-dcnode-id="576" instrument_node="">Reply</span></div><div class="reply_box" data-dcnode-id="573" id="Dv_ReplyToBox_18171" name="ReplyToBx" runat="server" style="Display:none;"><span data-dcnode-id="574" instrument_node=""> </span></div><div class="clr" data-dcnode-id="571"><span data-dcnode-id="572" instrument_node=""> &nbsp; </span></div></div></div></div></div></div><span data-dcnode-id="565" instrument_node="">
