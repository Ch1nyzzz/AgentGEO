 instrument_node="">Chronic pain relief</span></a></li><li class="css-t753mo" data-dcnode-id="1329"><a class="css-1xe63ky" data-dcnode-id="1330" href="#anti-anxiety"><span data-dcnode-id="1331" instrument_node="">Anti-anxiety</span></a></li><li class="css-t753mo" data-dcnode-id="1326"><a class="css-1xe63ky" data-dcnode-id="1327" href="#chemotherapy-side-effects"><span data-dcnode-id="1328" instrument_node="">Chemotherapy side-effects</span></a></li><li class="css-t753mo" data-dcnode-id="1323"><a class="css-1xe63ky" data-dcnode-id="1324" href="#substance-use-disorder"><span data-dcnode-id="1325" instrument_node="">Substance use disorder</span></a></li><li class="css-t753mo" data-dcnode-id="1320"><a class="css-1xe63ky" data-dcnode-id="1321" href="#ptsd"><span data-dcnode-id="1322" instrument_node="">PTSD</span></a></li><li class="css-t753mo" data-dcnode-id="1317"><a class="css-1xe63ky" data-dcnode-id="1318" href="#depression"><span data-dcnode-id="1319" instrument_node="">Depression</span></a></li><li class="css-t753mo" data-dcnode-id="1314"><a class="css-1xe63ky" data-dcnode-id="1315" href="#side-effects"><span data-dcnode-id="1316" instrument_node="">Side effects</span></a></li><li class="css-t753mo" data-dcnode-id="1311"><a class="css-1xe63ky" data-dcnode-id="1312" href="#summary"><span data-dcnode-id="1313" instrument_node="">Summary</span></a></li></ul></nav><article class="article-body css-d2znx6 undefined" data-dcnode-id="718"><div class="css-1u22pos" data-dcnode-id="1266"><span data-dcnode-id="1308" style="font-size:0;line-height:0"></span><div data-dcnode-id="1305"><p class="css-dmtxcr" data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">Cannabidiol (CBD) oil and other CBD products have become increasingly popular with consumers looking for an alternative treatment for a range of ailments, conditions, and diseases. </span></p></div><p data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">Cannabis plants contain a group of substances called cannabinoids. Although there are more than 100 cannabinoids, the two most studied cannabinoids are tetrahydrocannabinol (THC) and CBD.</span></p><p data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">THC is a psychoactive compound that is responsible for most of the psychological effects and the high that people often associate with marijuana. CBD is not psychoactive in the same way. </span></p><p data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">While THC does have psychoactive effects, it does not lead to high or euphoric feelings, and other such effects associated with recreational cannabis smoking. </span></p><p data-dcnode-id="1296"><a class="content-link css-1pg8eb5" data-dcnode-id="1297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/327270"><span data-dcnode-id="1298" instrument_node="">Learn more about what it feels like to be high here.</span></a></p><p data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">Researchers are studying CBD as a treatment for a wide range of conditions, but research supporting its benefits is limited.</span></p><p data-dcnode-id="1276"><span data-dcnode-id="1293" instrument_node="">Currently, the </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1286" rationale="Governmental authority" source="Food and Drug Administration (FDA)"><a class="content-link css-1pg8eb5" data-dcnode-id="1288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fda.gov/news-events/press-announcements/fda-approves-first-drug-comprised-active-ingredient-derived-marijuana-treat-rare-severe-forms" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1292" instrument_node="">Food and Drug Administration (FDA)</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1289"><span class="sro" data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1287"></span></hl-trusted-source><span data-dcnode-id="1285" instrument_node=""> has only approved one drug that contains CBD. The </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1278" rationale="Governmental authority" source="Food and Drug Administration (FDA)"><a class="content-link css-1pg8eb5" data-dcnode-id="1280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fda.gov/consumers/consumer-updates/what-you-need-know-and-what-were-working-find-out-about-products-containing-cannabis-or-cannabis" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1284" instrument_node="">FDA</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1281"><span class="sro" data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1279"></span></hl-trusted-source><span data-dcnode-id="1277" instrument_node=""> also state that it is illegal to sell CBD as a dietary supplement or food additive.</span></p><p data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">Keep reading to learn more about some of the potential effects of CBD oil that researchers are investigating, as well as the risks and side effects.</span></p><div data-dcnode-id="1273" id="onequarter-of-article"></div><div class="css-umsscj" data-dcnode-id="1267"><aside class="css-0 css-0" data-dcnode-id="1268"><div data-dcnode-id="1269"><div class="css-10gx9pb" data-dcnode-id="1270" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="1272"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline2" data-dcnode-id="1271" id="inline2__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="1214"><span data-dcnode-id="1265" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1261"><div data-dcnode-id="1262"><a class="chartbeat-section" data-dcnode-id="1263" name="reduces-epileptic-seizures"><span data-dcnode-id="1264" instrument_node="">1. Reduces epileptic seizures</span></a></div></h2><div data-dcnode-id="1246"><figure class="css-yhe8zq" data-dcnode-id="1247"><span class="css-rwmw5v" data-dcnode-id="1250"><span class="css-mjp0j9" data-dcnode-id="1255"><picture class="css-16pk1is" data-dcnode-id="1256"><source data-dcnode-id="1260" media="(min-width: 1190px)" srcset="//i0.wp.com/post.medicalnewstoday.com/wp-content/uploads/sites/3/2020/07/261359-CBD-for-anxiety-What-to-know_header-1024x575.jpg?w=1575 750w"><source data-dcnode-id="1259" media="(min-width: 990px)" srcset="//i0.wp.com/post.medicalnewstoday.com/wp-content/uploads/sites/3/2020/07/261359-CBD-for-anxiety-What-to-know_header-1024x575.jpg?w=1575 750w"><source data-dcnode-id="1258" media="(min-width: 768px)" srcset="//i0.wp.com/post.medicalnewstoday.com/wp-content/uploads/sites/3/2020/07/261359-CBD-for-anxiety-What-to-know_header-1024x575.jpg?w=1845 879w"><img alt="an engraved drawing showing how to use cbd for anxiety" class="css-1jytyml" data-dcnode-id="1257" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/post.medicalnewstoday.com/wp-content/uploads/sites/3/2020/07/261359-CBD-for-anxiety-What-to-know_header-1024x575.jpg%3Fw%3D1155%26h%3D1528&amp;raw"></picture></span><hl-share-overlay class="css-18moxll" data-dcnode-id="1251"><a class="icon-hl-pinterest css-1ieaq17" data-dcnode-id="1252" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-pin-href="https://www.pinterest.com/pin/create/button?guid=v0EejDt3ebyd-1&amp;url=https%3A%2F%2Fwww.medicalnewstoday.com%2Farticles%2Fcbd-oil-effects&amp;media=https%3A%2F%2Fpost.medicalnewstoday.com%2Fwp-content%2Fuploads%2Fsites%2F3%2F2020%2F07%2F261359-CBD-for-anxiety-What-to-know_header-1024x575.jpg&amp;description=CBD%20oil%3A%20Effects%20and%20side%20effects" data-pin-log="button_pinit" data-share-url="https://post.medicalnewstoday.com/wp-content/uploads/sites/3/2020/07/261359-CBD-for-anxiety-What-to-know_header-1024x575.jpg" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span><figcaption class="css-1wtn3ae" data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">More research is necessary to understand the full effects of CBD oil.</span></figcaption></figure></div><p data-dcnode-id="1241"><span data-dcnode-id="1245" instrument_node="">In 2018, the FDA approved </span><a class="content-link css-1pg8eb5" data-dcnode-id="1243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/326061.php"><span data-dcnode-id="1244" instrument_node="">Epidiolex</span></a><span data-dcnode-id="1242" instrument_node=""> as the first pharmaceutical-grade CBD medication.</span></p><p data-dcnode-id="1236"><span data-dcnode-id="1240" instrument_node="">Epidiolex treats seizures in two rare and severe </span><a class="content-link css-1pg8eb5" data-dcnode-id="1238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/8947"><span data-dcnode-id="1239" instrument_node="">epilepsy</span></a><span data-dcnode-id="1237" instrument_node=""> types called Lennox-Gastaut syndrome and Dravet syndrome in people age 2 years and older.</span></p><p data-dcnode-id="1223"><span data-dcnode-id="1235" instrument_node="">Clinical trials found that when people with Lennox-Gastaut and Dravet syndromes take Epidiolex with other seizure medications, they have </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1228" rationale="Governmental authority" source="Food and Drug Administration (FDA)"><a class="content-link css-1pg8eb5" data-dcnode-id="1230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fda.gov/drugs/drug-approvals-and-databases/drug-trials-snapshots-epidiolex" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1234" instrument_node="">fewer seizures</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1231"><span class="sro" data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1229"></span></hl-trusted-source><span data-dcnode-id="1227" instrument_node=""> than people taking a </span><a class="content-link css-1pg8eb5" data-dcnode-id="1225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/306437"><span data-dcnode-id="1226" instrument_node="">placebo</span></a><span data-dcnode-id="1224" instrument_node=""> with other seizure medications.</span></p><p data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">There is not enough research to confirm whether CBD would help people with other, more common forms of epilepsy.</span></p><div class="css-1cg0byz" data-dcnode-id="1215"><aside class="css-0 css-0" data-dcnode-id="1216"><div data-dcnode-id="1217"><div class="css-az6x7v" data-dcnode-id="1218" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="1220"></div><div class="css-itezwm" data-ad="true" data-adbridg-ad-class="inline5" data-dcnode-id="1219" id="inline5__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="986"><span data-dcnode-id="1213" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1209"><div data-dcnode-id="1210"><a class="chartbeat-section" data-dcnode-id="1211" name="chronic-pain-relief"><span data-dcnode-id="1212" instrument_node="">2. May relieve chronic pain</span></a></div></h2><p data-dcnode-id="1205"><span data-dcnode-id="1208" instrument_node="">People around the world have used cannabis for medicinal purposes, including pain relief, since around </span><a class="content-link css-1pg8eb5" data-dcnode-id="1206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.liebertpub.com/doi/10.1089/can.2017.0017" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1207" instrument_node="">2900 B.C.</span></a></p><p data-dcnode-id="1200"><span data-dcnode-id="1204" instrument_node="">Researchers have suggested that cannabinoids may be </span><a class="content-link css-1pg8eb5" data-dcnode-id="1202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dovepress.com/pharmacotherapeutic-considerations-for-use-of-cannabinoids-to-relieve--peer-reviewed-article-JPR" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1203" instrument_node="">responsible</span></a><span data-dcnode-id="1201" instrument_node=""> for the pain-relieving effects associated with cannabis. However, few studies have currently tested how CBD independently affects pain.</span></p><p data-dcnode-id="1192"><span data-dcnode-id="1199" instrument_node="">A </span><a class="content-link css-1pg8eb5" data-dcnode-id="1197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.lww.com/pain/Abstract/2018/10000/Cannabis_and_cannabinoids_for_the_treatment_of.6.aspx" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1198" instrument_node="">2018 review</span></a><span data-dcnode-id="1196" instrument_node=""> examined 47 studies, including 4,743 people, of using cannabis and cannabinoids for chronic pain other than </span><a class="content-link css-1pg8eb5" data-dcnode-id="1194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/323648"><span data-dcnode-id="1195" instrument_node="">cancer</span></a><span data-dcnode-id="1193" instrument_node=""> pain. The review found moderate evidence that cannabinoids reduce pain when compared with placebo groups. </span></p><p data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">Adverse side effects were more common in people taking cannabinoids than placebo.</span></p><p data-dcnode-id="1169"><span data-dcnode-id="1189" instrument_node="">A review of observational studies in the </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1182" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6413425/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1188" instrument_node="">Journal of Central Nervous System Disease</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1185"><span class="sro" data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1183"></span></hl-trusted-source><span data-dcnode-id="1181" instrument_node=""> </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1174" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6413425/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1180" instrument_node="">research</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1177"><span class="sro" data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1175"></span></hl-trusted-source><span data-dcnode-id="1173" instrument_node=""> supports the use of nabiximols (Sativex), an oral spray containing THC and CBD, combined with other therapies for </span><a class="content-link css-1pg8eb5" data-dcnode-id="1171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/37556"><span data-dcnode-id="1172" instrument_node="">multiple sclerosis</span></a><span data-dcnode-id="1170" instrument_node="">-related pain. Some countries have approved Sativex, but the FDA has not yet approved Sativex for use in the U.S.</span></p><p data-dcnode-id="1159"><span data-dcnode-id="1168" instrument_node="">The </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1161" rationale="Governmental authority" source="National Center for Complementary and Integrative Health"><a class="content-link css-1pg8eb5" data-dcnode-id="1163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nccih.nih.gov/news/press-releases/nih-to-investigate-minor-cannabinoids-and-terpenes-for-potential-painrelieving-properties" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1167" instrument_node="">National Center for Complementary and Integrative Health (NCCIH)</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1164"><span class="sro" data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1162"></span></hl-trusted-source><span data-dcnode-id="1160" instrument_node=""> is funding new research into cannabinoids and their potential in pain management. </span></p><p data-dcnode-id="1150"><hl-trusted-source class="css-ngo64e" data-dcnode-id="1152" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/31793418/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1158" instrument_node="">Studies</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1155"><span class="sro" data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1153"></span></hl-trusted-source><span data-dcnode-id="1151" instrument_node=""> also show that pain from peripheral neuropathy may also ease with CBD use.</span></p><p data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">New clinical trials are also in the pipeline to individually test CBD for chronic pain, particularly neuropathic pain.</span></p><div class="css-crmikf" data-dcnode-id="1138" id="widget_call_out_6bc3e855-c72d-425d-93f3-9956acb5911b"><span data-dcnode-id="1147" style="font-size:0;line-height:0"></span><div class="css-10550dw" data-dcnode-id="1139"><div data-dcnode-id="1140"><div class="css-1vyzxqe" data-dcnode-id="1141"><p class="standout--body" data-dcnode-id="1142"><span data-dcnode-id="1146" instrument_node="">For more information and resources on CBD and CBD products, please visit our </span><a class="content-link css-1pg8eb5" data-dcnode-id="1144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/cbd"><span data-dcnode-id="1145" instrument_node="">dedicated hub</span></a><span data-dcnode-id="1143" instrument_node="">.</span></p></div></div></div></div><div data-dcnode-id="993" id="m298b74e9-195f-4190-b821-0118827c4959"><div data-dcnode-id="994"><div class="myFinance-widget myFinance-ad-unit" data-campaign="mnt-cbd-quiz" data-dcnode-id="995" data-sub-id="cbd_quiz_mnt_mid_embedded_34279" data-widget-id="77bc6878-c3e0-4ab8-86ef-e60b194f594e"><iframe class="myFinance-iframe" data-dcnode-id="996" data-loaded="1" data-src="https://inline.medicalnewstoday.com/r/ssr/77bc6878-c3e0-4ab8-86ef-e60b194f594e?utm_campaign=mnt-cbd-quiz&amp;utm_medium=embed&amp;selector=%23m298b74e9-195f-4190-b821-0118827c4959+%3E+div+%3E+div&amp;csid=49b3ba5f-7281-42a0-9cc4-647b26fe45f1&amp;caid=236bcc6d-26f3-4c5e-a23e-ef9af718b1dd&amp;ciid=fb9829fc-2b33-4000-ab08-373484d029d6&amp;tenant=wk_1Tq ata-v-7f20d968="" style="max-height: 300px;"><div class="v-image__image v-image__image--preload v-image__image--contain" data-dcnode-id="1054" style="background-position: center center;"></div><div class="v-responsive__content" data-dcnode-id="1053"></div></div></div><span data-dcnode-id="1050" instrument_node=""> </span><div class="col col-12" data-dcnode-id="1046" data-v-7f20d968=""><div class="mf-body--md" data-dcnode-id="1047" data-v-7f20d968=""><p data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Take a short quiz about what type of CBD you are interested in and we'll share our top product picks, vetted by experts.</span></p></div></div><span data-dcnode-id="1045" instrument_node=""> </span><div class="col col-12" data-dcnode-id="1041" data-v-7f20d968=""><button class="v-btn v-btn--block v-btn--has-bg theme--light v-size--x-large primary mf-cta" data-dcnode-id="1042" data-v-7f20d968="" type="button"><span class="v-btn__content" data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">LET'S GET STARTED</span></span></button></div></div></div><span data-dcnode-id="1038" instrument_node=""> </span></div></div><span data-dcnode-id="1034" instrument_node=""> </span><div class="footer-disclaimer-box px-5" data-dcnode-id="1032" data-v-2552d994=""><div data-dcnode-id="1033" data-v-2552d994=""></div></div></div><span data-dcnode-id="1030" instrument_node=""> </span><span data-dcnode-id="1026" instrument_node=""> </span></div></div><span data-dcnode-id="1022" instrument_node=""> </span><form action="https://www.platejoy.com/onboarding/healthline" data-dcnode-id="1021" data-v-2552d994="" method="post" target="_blank"></form></div><span data-dcnode-id="1019" instrument_node=""> </span><hr aria-orientation="horizontal" class="mx-5 divider--footer v-divider theme--light" data-dcnode-id="1018" data-v-2552d994="" role="separator"/></div></div></main></div></div><span data-dcnode-id="1012" instrument_node="">

</span><div data-dcnode-id="1000" style="clear: both; display: block; height: 0px;"></div></body></html></iframe></div></div></div><div class="css-umsscj" data-dcnode-id="987"><aside class="css-0 css-0" data-dcnode-id="988"><div data-dcnode-id="989"><div class="css-10gx9pb" data-dcnode-id="990" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="992"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline8" data-dcnode-id="991" id="inline8__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="939"><span data-dcnode-id="985" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="981"><div data-dcnode-id="982"><a class="chartbeat-section" data-dcnode-id="983" name="anti-anxiety"><span data-dcnode-id="984" instrument_node="">3. Might reduce anxiety</span></a></div></h2><p data-dcnode-id="967"><span data-dcnode-id="980" instrument_node="">The relationship between cannabis and </span><a class="content-link css-1pg8eb5" data-dcnode-id="978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.medicalnewstoday.com/articles/323454"><span data-dcnode-id="979" instrument_node="">anxiety</span></a><span data-dcnode-id="977" instrument_node=""> can be inconsistent. An article in </span><em data-dcnode-id="969"><hl-trusted-source class="css-ngo64e" data-dcnode-id="970" rationale="Highly respected journal,Expert written journal,Peer reviewed journal" source="Nature"><a class="content-link css-1pg8eb5" data-dcnode-id="972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/npp20116" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="976" instrument_node="">Neuropsychopharmacology</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="973"><span class="sro" data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="971"></span></hl-trusted-source></em><span data-dcnode-id="968" instrument_node=""> notes that some users of cannabis report that the main reason that they use it is to reduce anxiety. However, others report panic and anxiety as side effects.</span></p><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">These conflicting results may be because low doses of THC in cannabis are linked with reducing anxiety, while high doses seem to cause anxiety.</span></p><p data-dcnode-id="960"><span data-dcnode-id="964" instrument_node="">The article in </span><em data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Neuropsychopharmacology</span></em><span data-dcnode-id="961" instrument_node=""> also indicates that CBD decreases the anxiety-causing effects of THC. In animal studies, CBD also appears to inhibit anxiety in a similar way to other anti-anxiety drugs.</span></p><p data-dcnode-id="947"><span data-dcnode-id="959" instrument_node="">The study of </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="952" rationale="Highly respected journal,Expert written journal,Peer reviewed journal" source="Nature"><a class="content-link css-1pg8eb5" data-dcnode-id="954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/npp20116" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="958" instrument_node="">24 people </span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="955"><span class="sro" data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="953"></span></hl-trusted-source><span data-dcnode-id="951" instrument_node="">with generalized </span><a class="content-link css-1pg8eb5" data-dcnode-id="949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.medicalnewstoday.com/articles/176891"><span data-dcnode-id="950" instrument_node="">social anxiety disorder</span></a><span data-dcnode-id="948" instrument_node=""> found that those who took 600 mg of CBD before a simulated public speaking test had less anxiety than those who took a placebo.</span></p><p data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">Although the results of this study were promising, researchers need to conduct more studies involving more people to see if they yield similar results.</span></p><p data-dcnode-id="942"><a class="content-link css-1pg8eb5" data-dcnode-id="943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.medicalnewstoday.com/articles/319622"><span data-dcnode-id="944" instrument_node="">Learn more about CBD oil and anxiety here. </span></a></p><div class="css-1sxbpyw" data-adbridg-ad-class="hl-incontent" data-dcnode-id="941" id="hl-incontent-video-ad"></div><div class="css-1h5aco8" data-dcnode-id="940" id="div-gpt-ad-out-of-page"></div></div><div class="css-0" data-dcnode-id="898"><span data-dcnode-id="938" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="934"><div data-dcnode-id="935"><a class="chartbeat-section" data-dcnode-id="936" name="chemotherapy-side-effects"><span data-dcnode-id="937" instrument_node="">4. Could ease chemotherapy side effects</span></a></div></h2><p data-dcnode-id="929"><span data-dcnode-id="933" instrument_node="">Cancer treatments, such as </span><a class="content-link css-1pg8eb5" data-dcnode-id="931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.medicalnewstoday.com/articles/158401"><span data-dcnode-id="932" instrument_node="">chemotherapy</span></a><span data-dcnode-id="930" instrument_node="">, can cause nausea and vomiting. Doctors often treat chemotherapy-induced nausea and vomiting (CINV) with a medicine called an antiemetic.</span></p><p data-dcnode-id="919"><span data-dcnode-id="928" instrument_node="">One earlier </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="921" rationale="Peer reviewed journal" source="Wiley"><a class="content-link css-1pg8eb5" data-dcnode-id="923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bpspubs.onlinelibrary.wiley.com/doi/full/10.1111/j.1365-2125.2010.03743.x" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="927" instrument_node="">study</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="924"><span class="sro" data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="922"></span></hl-trusted-source><span data-dcnode-id="920" instrument_node=""> found that compared to placebo, adding a combination of THC and CBD to conventional antiemetic treatment provided better protection against delayed CINV.</span></p><p data-dcnode-id="911"><span data-dcnode-id="918" instrument_node="">A </span><a class="content-link css-1pg8eb5" data-dcnode-id="916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eneuro.org/content/5/4/ENEURO.0256-18.2018" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="917" instrument_node="">2018 study</span></a><span data-dcnode-id="915" instrument_node=""> in rats observed that treatment with CBD prevented a surge in </span><a class="content-link css-1pg8eb5" data-dcnode-id="913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.medicalnewstoday.com/articles/232248"><span data-dcnode-id="914" instrument_node="">serotonin</span></a><span data-dcnode-id="912" instrument_node=""> levels in the rats’ interoceptive insular cortex (IIC) following an injection of a nauseating chemical compound. </span></p><p data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">In humans, the IIC is the region of the brain that is responsible for nausea. These findings indicate that scientists could potentially develop CBD into antinausea treatments for people having chemotherapy.</span></p><p data-dcnode-id="901"><span data-dcnode-id="908" instrument_node="">According to a </span><a class="content-link css-1pg8eb5" data-dcnode-id="906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.futuremedicine.com/doi/abs/10.2217/fon-2018-0530" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="907" instrument_node="">2019 article</span></a><span data-dcnode-id="905" instrument_node=""> in </span><em data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">Future Oncology</span></em><span data-dcnode-id="902" instrument_node="">, cannabinoids may also prevent other side effects of chemotherapy, including pain, loss of appetite, and organ toxicity.</span></p><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Studies examining CBD as an antinausea treatment are relatively new, and scientists need to carry out more research before they can confirm whether CBD prevents chemotherapy side effects.</span></p></div><div class="css-0" data-dcnode-id="853"><span data-dcnode-id="897" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="893"><div data-dcnode-id="894"><a class="chartbeat-section" data-dcnode-id="895" name="substance-use-disorder"><span data-dcnode-id="896" instrument_node="">5. May help treat substance use disorder</span></a></div></h2><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Substance use disorder affects a person’s brain and behavior and may make them unable to control their use of legal or illegal medication or drugs. </span></p><p data-dcnode-id="883"><span data-dcnode-id="890" instrument_node="">According to a </span><a class="content-link css-1pg8eb5" data-dcnode-id="888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.sagepub.com/doi/10.4137/SART.S25081" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="889" instrument_node="">2015 systematic review</span></a><span data-dcnode-id="887" instrument_node="">, CBD may influence some of the brain circuits involved in </span><a class="content-link css-1pg8eb5" data-dcnode-id="885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.medicalnewstoday.com/articles/323465"><span data-dcnode-id="886" instrument_node="">addiction</span></a><span data-dcnode-id="884" instrument_node=""> and drug-seeking behaviors and regulate stress response and compulsive behaviors.</span></p><p data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">The review of animal and human studies showed that CBD might help with addiction to opioids and psychostimulants and could benefit cannabis and tobacco dependence.</span></p><p data-dcnode-id="871"><span data-dcnode-id="880" instrument_node="">In 2018, researchers conducted a </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="873" rationale="Highly respected journal,Expert written journal,Peer reviewed journal" source="Nature"><a class="content-link css-1pg8eb5" data-dcnode-id="875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41386-018-0050-8" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="879" instrument_node="">study</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="876"><span class="sro" data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="874"></span></hl-trusted-source><span data-dcnode-id="872" instrument_node=""> in rats to see whether CBD prevented relapse to drug use. </span></p><p data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">The researchers discovered that CBD reduced relapse provoked by drug and stress cues and decreased anxiety and impulsivity. Furthermore, relapse remained reduced 5 months after the experiment.</span></p><p data-dcnode-id="864"><span data-dcnode-id="868" instrument_node="">A </span><a class="content-link css-1pg8eb5" data-dcnode-id="866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ajp.psychiatryonline.org/doi/10.1176/appi.ajp.2019.18101191" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="867" instrument_node="">2019 double-blind randomized placebo-controlled trial</span></a><span data-dcnode-id="865" instrument_node=""> indicates that CBD may be helpful for people with heroin use disorder. </span></p><p data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">In drug-abstinent people with heroin use disorder, CBD reduced the anxiety and craving induced by drug cues compared to placebo. CBD also decreased physiological measures, such as heart rate and salivary cortisol levels. The researchers also observed these effects a week later, which may suggest that the results are long-lasting.</span></p><p data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Researchers need to conduct follow-up studies to investigate the use of CBD for substance use disorder.</span></p><div class="css-20w1gi" data-dcnode-id="854"><aside class="css-0 css-0" data-dcnode-id="855"><div data-dcnode-id="856"><div class="css-1sq15os" data-dcnode-id="857" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="859"></div><div class="css-1t05dkn" data-ad="true" data-adbridg-ad-class="inline15" data-dcnode-id="858" id="inline15__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="829"><span data-dcnode-id="852" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="848"><div data-dcnode-id="849"><a class="chartbeat-section" data-dcnode-id="850" name="ptsd"><span data-dcnode-id="851" instrument_node="">6. PTSD treatment</span></a></div></h2><p data-dcnode-id="843"><span data-dcnode-id="847" instrument_node="">Studies have shown that alongside psychiatric treatment, CBD can reduce symptoms of </span><a class="content-link css-1pg8eb5" data-dcnode-id="845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.medicalnewstoday.com/articles/156285"><span data-dcnode-id="846" instrument_node="">post-traumatic stress disorder</span></a><span data-dcnode-id="844" instrument_node="">. </span></p><p data-dcnode-id="833"><span data-dcnode-id="842" instrument_node="">One recent </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="835" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6482919/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="841" instrument_node="">study</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="838"><span class="sro" data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="836"></span></hl-trusted-source><span data-dcnode-id="834" instrument_node="">, in particular, found that participants saw a reduction in trouble sleeping and nightmares. All participants continued to use CBD throughout the study and experienced no side effects. </span></p><p data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">That said, researchers noted that many more studies must take place before there is conclusive evidence. </span></p><div data-dcnode-id="830" id="threequarter-of-article"></div></div><div class="css-0" data-dcnode-id="800"><span data-dcnode-id="828" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="824"><div data-dcnode-id="825"><a class="chartbeat-section" data-dcnode-id="826" name="depression"><span data-dcnode-id="827" instrument_node="">7. Depression</span></a></div></h2><p data-dcnode-id="811"><span data-dcnode-id="823" instrument_node="">A </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="816" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6161644/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="822" instrument_node="">2018 review</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="819"><span class="sro" data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="817"></span></hl-trusted-source><span data-dcnode-id="815" instrument_node=""> notes that some studies indicate </span><a class="content-link css-1pg8eb5" data-dcnode-id="813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.medicalnewstoday.com/articles/248320"><span data-dcnode-id="814" instrument_node="">antidepressant</span></a><span data-dcnode-id="812" instrument_node=""> activity after CBD intake in animal models.</span></p><p data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">Researchers state that CBD exhibits a clear anti-stress effect after short- or long-term use, and in some tests, CBD acted as an antidepressant.</span></p><p data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">That said, human testing must take place before researchers make any definitive conclusions. </span></p><div class="css-umsscj" data-dcnode-id="801"><aside class="css-0 css-0" data-dcnode-id="802"><div data-dcnode-id="803"><div class="css-10gx9pb" data-dcnode-id="804" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="806"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline20" data-dcnode-id="805" id="inline20__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="735"><span data-dcnode-id="799" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="795"><div data-dcnode-id="796"><a class="chartbeat-section" data-dcnode-id="797" name="side-effects"><span data-dcnode-id="798" instrument_node="">Risks and side effects</span></a></div></h2><p data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">The FDA has only approved one CBD product, Epidiolex, for two rare forms of epilepsy, and there is still limited evidence about how CBD affects the body.</span></p><p data-dcnode-id="783"><span data-dcnode-id="792" instrument_node="">During the review and approval process for Epidiolex, using CBD was found to have potential </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="785" rationale="Governmental authority" source="Food and Drug Administration (FDA)"><a class="content-link css-1pg8eb5" data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fda.gov/consumers/consumer-updates/what-you-need-know-and-what-were-working-find-out-about-products-containing-cannabis-or-cannabis" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="791" instrument_node="">risks and side effects</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="788"><span class="sro" data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="786"></span></hl-trusted-source><span data-dcnode-id="784" instrument_node="">, such as:</span></p><ul data-dcnode-id="768"><li data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">causing liver injury</span></li><li data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">interacting with other medications, which may cause severe side effects</span></li><li data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">increasing the risk of sedation and drowsiness when taken with alcohol or medicines to treat anxiety, stress, panic, or sleep disorders</span></li><li data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">changing alertness</span></li><li data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">decreasing appetite</span></li><li data-dcnode-id="769"><span data-dcnode-id="772" instrument_node="">causing </span><a class="content-link css-1pg8eb5" data-dcnode-id="770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.medicalnewstoday.com/articles/158634"><span data-dcnode-id="771" instrument_node="">diarrhea</span></a></li></ul><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Also, many aspects of using CBD remain unanswered, such as:</span></p><ul data-dcnode-id="753"><li data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">What happens with the sustained use of CBD?</span></li><li data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">What dosage of CBD triggers known risks?</span></li><li data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Does the method of consumption affect intake (orally, smoking, vaping, or topical)?</span></li><li data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Does CBD affect the developing brain?</span></li><li data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">How does CBD affect the developing fetus and breastfed babies?</span></li><li data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Does CBD affect male fertility, as some studies in animals have indicated?</span></li></ul><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">CBD products are widely available and marketed as drugs, dietary supplements, food, cosmetics, and health products for animals. </span></p><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Unlike FDA-approved drug products, any unapproved products have not been subjected to FDA evaluation to determine whether they are effective at treating the condition they claim to treat. Also, the FDA would not have assessed the products for proper dosage or side effects and safety concerns.</span></p><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">False claims may lead people not to take their conventional medicine or put off getting medical care from a healthcare professional. A person should always discuss the best way to treat diseases or conditions with their doctor.</span></p><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">People may also raise questions about the quality of some CBD products. Some unapproved products that the FDA tested did not contain the CBD levels that the manufacturers claimed. Others may contain unsafe contaminants.</span></p><p data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Doctors and healthcare providers also recommend only using products that have been tested by a third party for potency and contaminants, such as pesticides. </span></p><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">As CBD is relatively new, many of the available products may not be what they appear, or may not have undergone quality control assessments. </span></p><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Most CBD product websites should have a Certificate of Authenticity. We advise avoiding those that do not.</span></p><p data-dcnode-id="736"><a class="content-link css-1pg8eb5" data-dcnode-id="737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.medicalnewstoday.com/articles/best-cbd-oil"><span data-dcnode-id="738" instrument_node="">See our guide to top CBD oils here.</span></a></p></div><div class="css-0" data-dcnode-id="719"><span data-dcnode-id="734" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="730"><div data-dcnode-id="731"><a class="chartbeat-section" data-dcnode-id="732" name="summary"><span data-dcnode-id="733" instrument_node="">Summary</span></a></div></h2><p data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">The FDA has approved one CBD product for use in two rare and severe forms of epilepsy. They have not currently approved any other CBD products for any purpose.</span></p><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">At this time, it is illegal to market CBD by labeling it as a dietary supplement or adding it to food.</span></p><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Studies examining CBD to treat various conditions and diseases are still in the early stages, and more research is required to draw any conclusions.</span></p><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Some CBD products are of unknown quality and marketed with unproven medical claims.</span></p><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">There is limited information about the risks and side effects of CBD.</span></p></div></article><div data-dcnode-id="714" id="m5cf2809e-8f38-4cf5-9020-63e01449a545"><div data-dcnode-id="715"><div class="myFinance-widget myFinance-ad-unit" data-campaign="mnt-cbd-quiz-bottom" data-dcnode-id="716" data-sub-id="cbd_quiz_mnt_bot_embedded_34474" data-widget-id="77bc6878-c3e0-4ab8-86ef-e60b194f594e"><iframe class="myFinance-iframe" data-dcnode-id="717" data-loaded="0" data-src="https://inline.medicalnewstoday.com/r/ssr/77bc6878-c3e0-4ab8-86ef-e60b194f594e?utm_campaign=mnt-cbd-quiz-bottom&amp;utm_medium=embed&amp;selector=%23m5cf2809e-8f38-4cf5-9020-63e01449a545+%3E+div+%3E+div&amp;csid=49b3ba5f-7281-42a0-9cc4-647b26fe45f1&amp;caid=236bcc6d-26f3-4c5e-a23e-ef9af718b1dd&amp;ciid=fb9829fc-2b33-4000-ab08-373484d029d6&amp;tenant=wk_1TqfDFRGHn0jTtfOmLxhMNY4pTU&amp;srckey=src_1TqfDEuTgPdTNAD39WZ0B6LTadQ&amp;imre=aHR0cHM6Ly93d3cubWVkaWNhbG5ld3N0b2RheS5jb20vYXJ0aWNsZXMvY2JkLW9pbC1lZmZlY3Rz&amp;_mfuuid_=ad27d5ae-79cf-40f4-a7ba-a989415fc18f&amp;width=584&amp;subId=cbd_quiz_mnt_bot_embedded_34474" loading="lazy" title="Advertisement"></iframe></div></div></div></div><p class="css-1kir5of" data-dcnode-id="710"><span data-dcnode-id="711"><span data-dcnode-id="712" instrument_node=""> Last medically re
