e to get the&nbsp;</span><strong data-dcnode-id="7260"><span data-dcnode-id="7261" instrument_node="">TRUTH</span></strong><span data-dcnode-id="7259" instrument_node="">&nbsp;by&nbsp;</span><a data-dcnode-id="7256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thetruthaboutcancer.com/join-free/" rel="noopener" target="_blank"><strong data-dcnode-id="7257"><span data-dcnode-id="7258" instrument_node="">subscribing to our email list</span></strong></a><span data-dcnode-id="7255" instrument_node="">.&nbsp;&nbsp;</span><strong data-dcnode-id="7253"><span data-dcnode-id="7254" instrument_node="">It’s free</span></strong><span data-dcnode-id="7252" instrument_node="">.</span></em></p><p data-dcnode-id="7248"><img alt="divider1" class="size-full wp-image-40019 aligncenter" data-dcnode-id="7249" height="26" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thetruthaboutvaccines.com/wp-content/uploads/divider1.png&amp;raw" width="437"></p></div><p data-dcnode-id="7245"><span data-dcnode-id="7246" instrument_node="">The cannabis&nbsp;plant (also known as the hemp plant) has been used in just about every culture for centuries. In fact, cannabis is included in the 50 fundamental herbs within the cornucopia of Traditional Chinese Medicine. It has been cited in ancient texts as having a healing effect on over 100 ailments. In recent years in the United States, the collective mood is changing in regards to cannabis/hemp (aka “marijuana”).</span></p><p data-dcnode-id="7240"><span data-dcnode-id="7244" instrument_node="">Personally, I prefer to use the term “hemp” or&nbsp;“cannabis” since those are proper names for the plant, and the truth is that the term “marijuana” (derived from the Mexican slang&nbsp;“marihuana”) was popularized in the early 1930s by the Federal Bureau of Narcotics (which later became the DEA) in order to make this amazing plant sound sinister and to&nbsp;elude the public’s existing familiarity and comfort level with the plant&nbsp;and the medical application of cannabis/hemp tinctures. “Marijuana” was </span><strong data-dcnode-id="7242"><span data-dcnode-id="7243" instrument_node="">not</span></strong><span data-dcnode-id="7241" instrument_node=""> a commonly smoked recreational drug at the time.</span></p><p data-dcnode-id="7238"><span data-dcnode-id="7239" instrument_node="">Currently there are over 3 dozen states where it is legal for patients to use “marijuana” for medical purposes.&nbsp;Pending federal legislation may open up opportunities for federally-funded medical research, including human clinical trials. This will further prove cannabis’ track-record when it comes to healing a number of disease conditions − including cancer.</span></p><p data-dcnode-id="6630" style="text-align: center;"><img alt="" class="aligncenter size-full wp-image-43655" data-dcnode-id="7237" height="81" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.thetruthaboutcancer.com/wp-content/uploads/20200929235540/watch-this-video.gif&amp;raw" width="381"><br data-dcnode-id="7236"><span data-dcnode-id="7235" instrument_node=""> </span><iframe allowfullscreen="allowfullscreen" data-dcnode-id="6631" frameborder="0" height="315" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/xPxBMPhO70w&amp;raw" width="560"><html data-cast-api-enabled="true" data-dcnode-id="6633" dir="ltr" lang="en"><head data-dcnode-id="7211"><meta charset="utf-8"><meta content="width=device-width, initial-scale=1" data-dcnode-id="7231" name="viewport"/><meta content="noindex" data-dcnode-id="7230" name="robots"/><link data-dcnode-id="7225" href="https://www.youtube.com/s/player/596ef930/www-player.css" name="www-player" nonce="6runkoxHvMBHX5Vj6ibvFw" rel="stylesheet"/><title data-dcnode-id="7212">YouTube</title></meta></head><body class="date-20220426 en_US ltr site-center-aligned site-as-giant-card" data-dcnode-id="6634" dir="ltr"><div data-dc ody></html></iframe></p><h2 data-dcnode-id="6626" style="text-align: center;"><strong data-dcnode-id="6627"><span data-dcnode-id="6628" style="color: #008000;"><span data-dcnode-id="6629" instrument_node="">Cannabis&nbsp;and The Endocannabinoid System</span></span></strong></h2><p data-dcnode-id="6618"><span data-dcnode-id="6625" instrument_node="">In the mid-1990s, renowned Israeli researcher Dr. Ralph Mechaoulam, professor of Medicinal Chemistry at Hebrew University in Jerusalem, made an exciting discovery that would forever change how we look at our biological relationship to plant medicine. Dr. Mechaoulam discovered </span><strong data-dcnode-id="6623"><span data-dcnode-id="6624" instrument_node="">a subtle system within the body that seemed to have a balancing effect on every other system</span></strong><span data-dcnode-id="6622" instrument_node="">. He called it the </span><em data-dcnode-id="6620"><span data-dcnode-id="6621" instrument_node="">Endocannabinoid (EC) System</span></em><span data-dcnode-id="6619" instrument_node=""> and it can be found in all mammals, including humans.</span></p><p data-dcnode-id="6616"><span data-dcnode-id="6617" instrument_node="">The EC system consists of a series of molecular receptors that are designed to receive cannabinoids. In particular this includes cannabidiol (CBD) and tetrahydrocannabinol (THC) as well as other related substances such as cannabigerol (CBG) and cannabinol (CBN).</span></p><p data-dcnode-id="6608"><span data-dcnode-id="6615" instrument_node="">Prior research in the 1980s led Mechaoulam and others to pinpoint two main receptors for cannabinoids − cannabinoid 1 (CB1) and cannabinoid 2 (CB2). Researchers at the time also defined the natural substances called </span><em data-dcnode-id="6613"><span data-dcnode-id="6614" instrument_node="">endocannabinoids</span></em><span data-dcnode-id="6612" instrument_node="">, which our body produces on its own in a similar way it produces endorphins. </span><em data-dcnode-id="6610"><span data-dcnode-id="6611" instrument_node="">Phytocannabinoids</span></em><span data-dcnode-id="6609" instrument_node=""> (namely THC, CBD, and their variants), on the other hand, come directly from the cannabis&nbsp;plant.</span></p><p data-dcnode-id="6606"><span data-dcnode-id="6607" instrument_node="">Cannabinoid receptors CB1 and CB2 are designed by the body to be specific targets for THC, while our natural endocannabinoids help to synthesize it. The process of THC-cannabinoid receptor binding and what this does for the body is what researchers have been studying for over two decades. They are doing this in order to find out exactly how cannabis works in healing cancer.</span></p><p data-dcnode-id="6601"><span data-dcnode-id="6605" instrument_node="">Microbiologist Dr. Christine Sanchez of Compultense Univeristy in Madrid, Spain has been studying cannabinoids and cancer since the early 2000s. She was the first to discover </span><strong data-dcnode-id="6603"><span data-dcnode-id="6604" instrument_node="">the antitumor effects of cannabinoids</span></strong><span data-dcnode-id="6602" instrument_node="">.</span></p><p data-dcnode-id="6595"><em data-dcnode-id="6599"><span data-dcnode-id="6600" instrument_node="">“We now know that the endocannabinoid system regulates a lot of biological functions such as appetite, food intake, motor function, reproduction and many others and that is why the plant has such a wide therapeutic potential,”</span></em><span data-dcnode-id="6598" instrument_node=""> says Dr. Sanchez in a video interview for the web-based cable channel </span><em data-dcnode-id="6596"><span data-dcnode-id="6597" instrument_node="">Cannabis Planet.</span></em></p><p data-dcnode-id="6076" style="text-align: center;"><iframe allowfullscreen="allowfullscreen" data-dcnode-id="6077" frameborder="0" height="315" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/VB5nYLrPNRs&amp;raw" width="560"><htm 6 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="6099" id="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="6094"><use class="ytp-svg-shadow" data-dcnode-id="6096" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="6097" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="6095" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="6081"><span data-dcnode-id="6082" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=VB5nYLrPNRs" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></p><h2 data-dcnode-id="6072" style="text-align: center;"><strong data-dcnode-id="6073"><span data-dcnode-id="6074" style="color: #008000;"><span data-dcnode-id="6075" instrument_node="">Cannabis &amp; Cancer: Tumor Growth</span></span></strong></h2><p data-dcnode-id="6066"><em data-dcnode-id="6070"><span data-dcnode-id="6071" instrument_node="">“We observed that when we treated [astrocytoma, a type of brain tumor] cells with cannabinoids, the THC…was killing the cells in our Petri dishes,”</span></em><span data-dcnode-id="6069" instrument_node=""> Dr. Sanchez says. </span><em data-dcnode-id="6067"><span data-dcnode-id="6068" instrument_node="">“We…decided to analyze these components in animal models of breast and brain tumors. The results we are obtaining are telling us that cannabinoids may be useful for the treatment of Breast Cancer.”</span></em></p><p data-dcnode-id="6063"><strong data-dcnode-id="6064"><span data-dcnode-id="6065" instrument_node="">Sanchez and other researchers have confirmed that the most potent effects against tumor growth occur when THC and CBD are combined.</span></strong></p><p data-dcnode-id="6058"><span data-dcnode-id="6062" instrument_node="">Cannabidiol, or CBD, which does not have a psychoactive effect, has long been known as a potent anti-cancer agent. This is because of its ability to interfere with cellular communication in tumors as well as in its ability to instigate apoptosis, or programmed cancer cell death. Some research studies, including </span><em data-dcnode-id="6060"><span data-dcnode-id="6061" instrument_node="">in vitro</span></em><span data-dcnode-id="6059" instrument_node=""> and animal-based trials conducted by San Francisco-based researchers at the California Pacific Medical Center, have also shown that CBD may affect genes involved in aggressive metastasis. It does this by helping to shut down cellular growth receptors.</span></p><p data-dcnode-id="6055"><a data-dcnode-id="6056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thetruthaboutcancer.com/join-free" rel="attachment wp-att-15227"><img alt="QUOTE-CANNABIS-hemp-Sanchez-Chemotherapy" class="aligncenter size-full wp-image-15227" data-dcnode-id="6057" height="781" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.thetruthaboutcancer.com/wp-content/uploads/20190125172100/QUOTE-CANNABIS-hemp-Sanchez-Chemotherapy.jpg&amp;raw" width="900"></a></p><p data-dcnode-id="6044"><span data-dcnode-id="6054" instrument_node="">Δ9-Tetrahydrocannabinol (i.e. THC), the psychoactive counterpart to CBD, has been shown to reduce tumor growth as well. It has also shown to </span><strong data-dcnode-id="6052"><span data-dcnode-id="6053" instrument_node="">have an effect on the rate of metastasis, including for non-small cell lung cancer </span></strong><span data-dcnode-id="6051" instrument_node="">− the leading cause of cancer deaths globally. A 2007 study on THC and highly-aggressive epidermal growth factor receptor-overexpressing (EGF-expressing) </span><a data-dcnode-id="6049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thetruthaboutcancer.com/survivor-story-kevin-irish/"><span data-dcnode-id="6050" instrument_node="">lung cancer</span></a><span data-dcnode-id="6048" instrument_node=""> conducted by Harvard Medical School found that certain EGF lung cancer cells express CB1 and CB2 cannabinoid receptors. They found that the presence of THC effected metastasis of these cells by reducing the </span><em data-dcnode-id="6046"><span data-dcnode-id="6047" instrument_node="">“focal adhesion complex,”</span></em><span data-dcnode-id="6045" instrument_node=""> which plays a vital role in cancer migration.</span></p><p data-dcnode-id="6037"><span data-dcnode-id="6043" instrument_node="">Studies have also been conducted on the combined effect of CBD and THC on lung, </span><a data-dcnode-id="6041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thetruthaboutcancer.com/prostate-cancer-prevention/"><span data-dcnode-id="6042" instrument_node="">prostate</span></a><span data-dcnode-id="6040" instrument_node="">, colon, pancreatic, liver, bladder, cervical, blood-based, brain, and other forms of cancer. </span><strong data-dcnode-id="6038"><span data-dcnode-id="6039" instrument_node="">These studies lend increasing evidence to the fact that cannabinoids are not only antioxidant phytonutrients but powerful “herbal chemo” agents.</span></strong></p><p data-dcnode-id="6033"><span data-dcnode-id="6036" instrument_node="">Says Dr. Sanchez: </span><em data-dcnode-id="6034"><span data-dcnode-id="6035" instrument_node="">“One of the advantages of cannabinoid-based medicines would be that they target specifically tumor cells. They don’t have any toxic effect on normal non-tumoral cells. This is an advantage with respect to standard chemotherapy that targets basically everything.”</span></em></p><h2 data-dcnode-id="6029" style="text-align: center;"><strong data-dcnode-id="6030"><span data-dcnode-id="6031" style="color: #008000;"><span data-dcnode-id="6032" instrument_node="">If You Use Cannabis&nbsp;for Cancer, Do it Right</span></span></strong></h2><p data-dcnode-id="6027"><span data-dcnode-id="6028" instrument_node="">Because cannabinoid therapy is relatively new in the mainstream, a current challenge for patients regarding its use is lack of regulation. This may change, however, with the possible passing of the Compassionate Access, Research Expansion, and Respect States (CARERS) Act, which has the support of 37 members of Congress.</span></p><p data-dcnode-id="6017"><span data-dcnode-id="6026" instrument_node="">CARERS would remove “marijuana” from the Controlled Substances Act Schedule I drug category, where it has been since 1970 − on par with heroin and cocaine. This classification is ridiculous&nbsp;since, by definition,&nbsp;Schedule I drugs have “</span><em data-dcnode-id="6022"><span data-dcnode-id="6025" instrument_node="">no currently accepted </span><strong data-dcnode-id="6023"><span data-dcnode-id="6024" instrument_node="">medical uses</span></strong></em><span data-dcnode-id="6021" instrument_node="">” and the Department of Health and Human Services (HHS) holds a patent&nbsp;(U.S. Patent 6630507) on cannabis oil for </span><strong data-dcnode-id="6019"><span data-dcnode-id="6020" instrument_node="">medical use</span></strong><span data-dcnode-id="6018" instrument_node="">!</span></p><p data-dcnode-id="6015"><img alt="" class="size-full wp-image-43007 aligncenter" data-dcnode-id="6016" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.thetruthaboutcancer.com/wp-content/uploads/20200617150309/us-marijuana-patent.jpg&amp;raw"></p><p data-dcnode-id="6007"><span data-dcnode-id="6014" instrument_node="">Think about it. How can HHS hold a </span><strong data-dcnode-id="6012"><span data-dcnode-id="6013" instrument_node="">medical use</span></strong><span data-dcnode-id="6011" instrument_node=""> patent for cannabis oil if there are </span><strong data-dcnode-id="6009"><span data-dcnode-id="6010" instrument_node="">no medical uses </span></strong><span data-dcnode-id="6008" instrument_node="">for cannabis? OK, enough of the logic lesson. Let’s just say that there are some serious logic deficiencies in these laws.</span></p><p data-dcnode-id="6005"><span data-dcnode-id="6006" instrument_node="">If “marijuana” is rightfully removed from a Schedule I drug, this would open the door for more targeted, federally-funded research as well as increased patient access to this amazing healing plant.</span></p><p data-dcnode-id="6002"><strong data-dcnode-id="6003"><span data-dcnode-id="6004" instrument_node="">In the meantime, if you are on a cancer-healing path and are considering using cannabinoids, here are some general guidelines that experts agree are worth considering:</span></strong></p><ol data-dcnode-id="5972"><li data-dcnode-id="5998"><strong data-dcnode-id="6000"><span data-dcnode-id="6001" instrument_node="">Do your own research.</span></strong><span data-dcnode-id="5999" instrument_node=""> The best way to learn about the power of cannabis in healing cancer is to start digging. There are approximately 500 articles on Pubmed alone relating to cannabis and cancer. Learn about strains, qualified targeted research studies, what method of administration may be right for you, and the importance of balancing the Endocannabinoid System.</span></li><li data-dcnode-id="5988"><strong data-dcnode-id="5996"><span data-dcnode-id="5997" instrument_node="">Know your source.</span></strong><span data-dcnode-id="5995" instrument_node=""> Unfortunately, because the medical cannabis industry is largely unregulated, charlatans selling bogus products definitely exist. You should not have to pay exorbitant amounts of money for any cannabis product that you buy from regulated pharmacies or online. Also, make </span><em data-dcnode-id="5993"><span data-dcnode-id="5994" instrument_node="">quality</span></em><span data-dcnode-id="5992" instrument_node=""> a priority for you. Be sure that your product comes from an organic source and that you know that the plant has not been </span><a data-dcnode-id="5990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thetruthaboutcancer.com/pesticides-and-cancer/"><span data-dcnode-id="5991" instrument_node="">grown or processed using pesticides</span></a><span data-dcnode-id="5989" instrument_node="">.</span></li><li data-dcnode-id="5984"><strong data-dcnode-id="5986"><span data-dcnode-id="5987" instrument_node="">Stick with natural cannabis products.</span></strong><span data-dcnode-id="5985" instrument_node=""> Synthetically-produced cannabinoids such as Marinol are commercially available. However, anecdotal evidence has found that these do not work as efficiently as natural substances do.</span></li><li data-dcnode-id="5980"><strong data-dcnode-id="5982"><span data-dcnode-id="5983" instrument_node="">Work with a professional healthcare provider trained in cannabinoid therapy.</span></strong><span data-dcnode-id="5981" instrument_node=""> These professionals are out there in increasing numbers, especially in states where the medical cannabis industry is well established or growing, such as California and Colorado. Reach out to a patient advocate group online if no qualified professionals are in your area.</span></li><li data-dcnode-id="5973"><strong data-dcnode-id="5978"><span data-dcnode-id="5979" instrument_node="">Make cannabis therapy an important part of your overall cancer-healing toolbox.</span></strong><span data-dcnode-id="5977" instrument_node=""> A well-rounded naturally-based cancer healing protocol involves working with the body’s own healing mechanisms through a variety of means. For you, this may mean changes to your diet and lifestyle, reducing stress, getting quality sleep, moving your body, intense </span><a data-dcnode-id="5975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thetruthaboutcancer.com/video-detoxification-for-cancer-patients/"><span data-dcnode-id="5976" instrument_node="">detoxing protocols</span></a><span data-dcnode-id="5974" instrument_node="">, and using other supplements and proven natural methods in addition to the powerful healing power of cannabis.</span></li></ol><p data-dcnode-id="5964"><b data-dcnode-id="5970"><span data-dcnode-id="5971" instrument_node="">This information is being suppressed from you by the mainstream media and the medical establishment. Be notified each week when cutting-edge articles are added by clicking </span></b><a data-dcnode-id="5967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thetruthaboutcancer.com/join-free/"><b data-dcnode-id="5968"><span data-dcnode-id="5969" instrument_node="">here</span></b></a><b data-dcnode-id="5965"><span data-dcnode-id="5966" instrument_node="">. You’ll be glad you did.</span></b></p><p data-dcnode-id="5962"><span data-dcnode-id="5963" instrument_node="">&nbsp;</span></p><p data-dcnode-id="5959"><em data-dcnode-id="5960"><span data-dcnode-id="5961" instrument_node="">Editor’s Note: This article was initially published in September 2016 and has been updated in June and November 2020.</span></em></p><p data-dcnode-id="5957"><span data-dcnode-id="5958" instrument_node="">&nbsp;</span></p><div class="code-block code-block-28" data-dcnode-id="5926" style="margin: 8px auto; text-align: center; display: block; clear: both;"><h3 data-dcnode-id="5935"><strong data-dcnode-id="5936"><span data-dcnode-id="5956" instrument_node="">The system is </span><em data-dcnode-id="5953"><span data-dcnode-id="5954" style="color: #ff0000;"><span data-dcnode-id="5955" instrument_node="">broken</span></span></em><span data-dcnode-id="5952" instrument_node="">. Our healthcare systems, the pharmaceutical industry, our government and its regulatory bodies, our media, and even the technology sector have all been </span><span data-dcnode-id="5949" style="color: #ff0000;"><em data-dcnode-id="5950"><span data-dcnode-id="5951" instrument_node="">corrupted</span></em></span><span data-dcnode-id="5948" instrument_node="">. We are in the middle of an information war, with coverups and censorship at an all-time high. Check out the trailer for our new docu-series: </span><span data-dcnode-id="5945" style="color: #ff0000;"><em data-dcnode-id="5946"><span data-dcnode-id="5947" instrument_node="">PROPAGANDA EXPOSED!</span></em></span><span data-dcnode-id="5944" instrument_node=""> Discover the truth that Big Pharma and the Mainstream Media </span><span data-dcnode-id="5942" style="text-decoration: underline;"><span data-dcnode-id="5943" instrument_node="">DON'T</span></span><span data-dcnode-id="5941" instrument_node=""> want you to see.&nbsp;</span><span data-dcnode-id="5938" style="color: #ff0000;"><em data-dcnode-id="5939"><span data-dcnode-id="5940" instrument_node="">It’s 100% free to watch</span></em></span><span data-dcnode-id="5937" instrument_node="">… and it may just save your life.</span></strong></h3><h2 data-dcnode-id="5930" style="text-align: center;"><strong data-dcnode-id="5931"><em data-dcnode-id="5932"><a data-dcnode-id="5933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.propaganda-exposed.com/"><span data-dcnode-id="5934" instrument_node="">GRAB YOUR SEAT NOW.</span></a></em></strong></h2><span data-dcnode-id="5929" instrument_node=""> </span><a data-dcnode-id="5927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.propaganda-exposed.com/"><img alt="" class="aligncenter size-full wp-image-47208" data-dcnode-id="5928" height="236" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.thetruthaboutcancer.com/wp-content/uploads/20220420170237/002_Logo_Animation_PE_GIF_v2.gif&amp;raw" width="420"></a></div><div class="code-block code-block-34" data-dcnode-id="5916" style="margin: 8px 0; c patients to use “marijuana” for medical purposes. Pending legislation may open up opportunities for federally-funded medical research, including human clinical trials.</span></p></li><li data-dcnode-id="5903"><p data-dcnode-id="5904"><span data-dcnode-id="5907" instrument_node="">In the mid-1990s, an Israeli researcher&nbsp;discovered a subtle system within the body that seemed to have a balancing effect on every other system. He called it the Endocannabinoid (EC) System</span><em data-dcnode-id="5905"><span data-dcnode-id="5906" instrument_node="">.</span></em></p></li><li data-dcnode-id="5900"><p data-dcnode-id="5901"><span data-dcnode-id="5902" instrument_node="">The EC system consists of a series of molecular receptors that are designed to receive cannabinoids. Our bodies produce some cannabinoids. Others come directly from the cannabis&nbsp;plant.</span></p></li><li data-dcnode-id="5897"><p data-dcnode-id="5898"><span data-dcnode-id="5899" instrument_node="">Spanish microbiologist Dr. Christine Sanchez was the first to discover the antitumor effects of cannabinoids. Cannabidiol, or CBD, which does not have a psychoactive effect, has long been known as a potent anti-cancer agent because of its ability to interfere with cellular communication in tumors as well as in its ability to instigate apoptosis (programmed cancer cell death).</span></p></li><li data-dcnode-id="5894"><p data-dcnode-id="5895"><span data-dcnode-id="5896" instrument_node="">THC (the psychoactive counterpart to CBD) has been shown to reduce tumor growth as well.&nbsp;Studies have been conducted on the combined effect of CBD and THC on a number of types of&nbsp;cancer. These studies are showing evidence of&nbsp;cannabinoids being&nbsp;powerful “herbal chemo” agents.</span></p></li><li data-dcnode-id="5880"><p data-dcnode-id="5892"><span data-dcnode-id="5893" instrument_node="">If you have cancer and are considering using cannabinoids, here are some general guidelines that experts agree are worth considering:</span></p><ol data-dcnode-id="5881"><li data-dcnode-id="5890"><span data-dcnode-id="5891" instrument_node="">Do your own research</span></li><li data-dcnode-id="5888"><span data-dcnode-id="5889" instrument_node="">Know your source</span></li><li data-dcnode-id="5886"><span data-dcnode-id="5887" instrument_node="">Stick with natural cannabinoid products over synthetic</span></li><li data-dcnode-id="5884"><span data-dcnode-id="5885" instrument_node="">Work with a professional healthcare provider trained in cannabinoid therapy</span></li><li data-dcnode-id="5882"><span data-dcnode-id="5883" instrument_node="">Work with your&nbsp;body’s own healing mechanisms through a variety of means</span></li></ol></li></ul></div></div><footer class="entry-footer" data-dcnode-id="5876"></footer></article><div class="genesis-box widget-area after-post" data-dcnode-id="406"><div class="ttac-reference-listing-box" data-dcnode-id="5842"><h2 data-dcnode-id="5872"><a class="ttac-reference-box-toggle" data-dcnode-id="5873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/VB5nYLrPNRs"><span data-dcnode-id="5874" instrument_node="">[+] Sources and References</span></a></h2><div class="ttac-reference-listing-box-content" data-dcnode-id="5843"><ul data-dcnode-id="5844"><li data-dcnode-id="5869"><a class="ttac-reference-link" data-dcnode-id="5870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//reset.me/story/beginners-guide-to-the-endocannabinoid-system/" target="_blank"><span data-dcnode-id="5871" instrument_node="">Beginner’s Guide to the Endocannabinoid System</span></a></li><li data-dcnode-id="5866"><a class="ttac-reference-link" data-dcnode-id="5867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ncbi.nlm.nih.gov/pubmed/21410463" target="_blank"><span data-dcnode-id="5868" instrument_node="">The endocannabinoid system and cancer: therapeutic implication</span></a></li>< ode="">Next</span></div><a data-dcnode-id="5764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thetruthaboutcancer.com/naturally-manage-depression-reducing-inflammation/" rel="next"><span data-dcnode-id="5765" instrument_node="">Naturally Manage Depression by Reducing Inflammation</span></a></div></div><span data-dcnode-id="5761" instrument_node=""> </span><br data-dcnode-id="5760"><div class="ttac-author-box" data-dcnode-id="5749"><div class="ttac-author-box-name" data-dcnode-id="5755"><span data-dcnode-id="5759" instrument_node=""> </span><img class="ttac-author-box-image" data-dcnode-id="5758" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.thetruthaboutcancer.com/wp-content/uploads/20190125173015/Ty-Bollinger-150x150.png&amp;raw"><h4 data-dcnode-id="5756"><span data-dcnode-id="5757" instrument_node="">About Ty Bollinger</span></h4></div><div class="ttac-author-box-wrapper" data-dcnode-id="5751"><div class="ttac-author-box-bio" data-dcnode-id="5752"><p data-dcnode-id="5753"><span data-dcnode-id="5754" instrument_node="">Ty Bollinger is a happily married husband, the father of four wonderful children, devoted Christian, best-selling author, medical researcher, talk radio host, health freedom advocate, former competitive bodybuilder and also a certified public accountant.After losing several family members to cancer (including his mother and father), Ty refused to accept the notion that chemotherapy, radiation, and surgery were the most effective treatments available for cancer patients. He began a quest to learn all he possibly could about alternative cancer treatments and the medical industry. Ty has now made it his life mission to share the most remarkable discovery he made on his quest: the vast majority of all diseases (including cancer) can be easily prevented and even cured without drugs or surgery.Ty speaks frequently to health groups, at seminars, expos, conferences, churches, and is a regular guest on multiple radio shows and writes for numerous magazines and websites. Speaking from personal experience and extensive research, Ty has touched the hearts and changed the lives of thousands of people around the world.</span></p></div></div><div data-dcnode-id="5750" style="clear:both"></div></div><section class="widget widget_rp4wp_related_posts_widget" data-dcnode-id="5710" id="rp4wp_related_posts_widget-3"><div class="widget-wrap" data-dcnode-id="5711"><div class="rp4wp-related-posts rp4wp-related-post" data-dcnode-id="5713"><h3 data-dcnode-id="5747"><span data-dcnode-id="5748" instrument_node="">You may also like to read...</span></h3><ul class="rp4wp-posts-list" data-dcnode-id="5714"><div class="related-posts-box-container" data-dcnode-id="5739"><span data-dcnode-id="5746" instrument_node=""> </span><a data-dcnode-id="5740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thetruthaboutcancer.com/flaxseeds-can-prevent-help-heal-body-cancer/"><span data-dcnode-id="5745" instrument_node=""> </span><img alt="" class="attachment-related-posts-thumbnail size-related-posts-thumbnail wp-post-image" data-dcnode-id="5744" height="120" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.thetruthaboutcancer.com/wp-content/uploads/20190125173143/Flax-seeds1-180x120.jpg&amp;raw" width="180"><li data-dcnode-id="5742"><span data-dcnode-id="5743" instrument_node=""> How Flaxseeds Can Help Heal Your Body From Cancer</span></li><span data-dcnode-id="5741" instrument_node=""> </span></a></div><div class="related-posts-box-container" data-dcnode-id="5731"><span data-dcnode-id="5738" instrument_node=""> </span><a data-dcnode-id="5732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thetruthaboutcancer.com/cannabis-cancer-video/"><span data-dcnode-id="5737" instrument_node=""> </span><img alt="" class="attachment-related-posts-thumbnail size-related-posts-thumbnail wp-post-image" data-dcnode-id="573 p="url"><span data-dcnode-id="4932" instrument_node="">June 23, 2020 at 10:14 AM</span></a></time></p></header><div class="comment-content" data-dcnode-id="4923" itemprop="text"><p data-dcnode-id="4924"><span data-dcnode-id="4927" instrument_node="">Dr. Neil McKinney, Vital Victoria Naturopathic Clinic Ltd. In Victoria BC. He is a holistic oncologist. Helped my friend with stomach cancer. After surgery she had no chemo or radiation treatments. Many years later, doing very well. He has written four books on Naturopathic Cancer Care. Call him at 250 386-3534 or 1 888 722-6401.</span><br data-dcnode-id="4926"><span data-dcnode-id="4925" instrument_node=""> All the best.</span></p></div><div class="comment-reply" data-dcnode-id="4920"><a aria-label="Reply to Joy" class="comment-reply-link" data-dcnode-id="4921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/VB5nYLrPNRs%23comment-182143" onclick="return addComment.moveForm( &quot;comment-182143&quot;, &quot;182143&quot;, &quot;respond&quot;, &quot;15030&quot; )" rel="nofollow"><span data-dcnode-id="4922" instrument_node="">Reply</span></a></div></article></li></ul></li><li class="comment odd alt thread-odd thread-alt depth-1" data-dcnode-id="4895" id="comment-15836"><article data-dcnode-id="4896" itemprop="comment" itemscope="" itemtype="https://schema.org/Comment"><header class="comment-header" data-dcnode-id="4903"><p class="comment-author" data-dcnode-id="4908" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="4915" instrument_node=""> </span><img alt="" class="avatar avatar-48wp-user-avatar wp-user-avatar-48 alignnone photo avatar-default" data-dcnode-id="4914" height="48" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/293d13e7040b01425beac69745a707d5%3Fs%3D48%26d%3Dmm%26r%3Dg&amp;raw" width="48"><span data-dcnode-id="4912" itemprop="name"><span data-dcnode-id="4913" instrument_node="">Peggy</span></span><span data-dcnode-id="4911" instrument_node=""> </span><span class="says" data-dcnode-id="4909"><span data-dcnode-id="4910" instrument_node="">says</span></span></p><p class="comment-meta" data-dcnode-id="4904"><time class="comment-time" data-dcnode-id="4905" datetime="2016-09-22T13:57:09+00:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="4906" href="#comment-15836" itemprop="url"><span data-dcnode-id="4907" instrument_node="">September 22, 2016 at 1:57 PM</span></a></time></p></header><div class="comment-content" data-dcnode-id="4900" itemprop="text"><p data-dcnode-id="4901"><span data-dcnode-id="4902" instrument_node="">I have never understood why cannabis was such a “big deal”.  It was always called an entry “drug”, but it wouldn’t be an entry drug if it wasn’t illegal.  Yes, people can do things they shouldn’t such as DUI but it’s done every day under the influence of alcohol and, personally, I’d rather be with a smoothed out person that a raging alcoholic; because, trust me, I’ve been around both.  As an RN, I’ve seen situations that I would have much rather trusted a “weed” than a manufactured drug!  Especially with children.</span></p></div><div class="comment-reply" data-dcnode-id="4897"><a aria-label="Reply to Peggy" class="comment-reply-link" data-dcnode-id="4898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/VB5nYLrPNRs%23comment-15836" onclick="return addComment.moveForm( &quot;comment-15836&quot;, &quot;15836&quot;, &quot;respond&quot;, &quot;15030&quot; )" rel="nofollow"><span data-dcnode-id="4899" instrument_node="">Reply</span></a></div></article></li><li class="comment even thread-even depth-1" data-dcnode-id="4826" id="comment-15968"><article data-dcnode-id="4873" itemprop="comment" itemscope="" itemtype="https://schema.org/Comment"><header class="comment-header" data-dcnode-id="4882"><p class="comment-author" data-dcnode-id="4887" itemprop ng such things as pain (where conventional drugs are toxic and can lead to dependency), glaucoma, and yes cancers of various kinds.</span><br data-dcnode-id="4777"><span data-dcnode-id="4776" instrument_node=""> Sense needs to be restored to this issue and people who need to use it as medicine should NOT be penalised and treated like criminals.</span></p></div><div class="comment-reply" data-dcnode-id="4771"><a aria-label="Reply to Andrew J. Cutler D.B.Th; MCMA, Registered consultant medical herbalist" class="comment-reply-link" data-dcnode-id="4772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/VB5nYLrPNRs%23comment-16015" onclick="return addComment.moveForm( &quot;comment-16015&quot;, &quot;16015&quot;, &quot;respond&quot;, &quot;15030&quot; )" rel="nofollow"><span data-dcnode-id="4773" instrument_node="">Reply</span></a></div></article><ul class="children" data-dcnode-id="4748"><li class="comment odd alt depth-2" data-dcnode-id="4749" id="comment-33895"><article data-dcnode-id="4750" itemprop="comment" itemscope="" itemtype="https://schema.org/Comment"><header class="comment-header" data-dcnode-id="4757"><p class="comment-author" data-dcnode-id="4762" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="4769" instrument_node=""> </span><img alt="" class="avatar avatar-48wp-user-avatar wp-user-avatar-48 alignnone photo avatar-default" data-dcnode-id="4768" height="48" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/f0c25af82df281cf38bbad9141946f98%3Fs%3D48%26d%3Dmm%26r%3Dg&amp;raw" width="48"><span data-dcnode-id="4766" itemprop="name"><span data-dcnode-id="4767" instrument_node="">Gepe</span></span><span data-dcnode-id="4765" instrument_node=""> </span><span class="says" data-dcnode-id="4763"><span data-dcnode-id="4764" instrument_node="">says</span></span></p><p class="comment-meta" data-dcnode-id="4758"><time class="comm mtype="https://schema.org/Comment"><header class="comment-header" data-dcnode-id="4489"><p class="comment-author" data-dcnode-id="4494" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="4501" instrument_node=""> </span><img alt="TTAC Customer Support" class="avatar avatar-48 wp-user-avatar wp-user-avatar-48 alignnone photo" data-dcnode-id="4500" height="48" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.thetruthaboutcancer.com/wp-content/uploads/20190125172939/TTAC-logo-100x100.png&amp;raw" width="48"><span data-dcnode-id="4498" itemprop="name"><span data-dcnode-id="4499" instrument_node="">TTAC Customer Support</span></span><span data-dcnode-id="4497" instrument_node=""> </span><span class="says" data-dcnode-id="4495"><span data-dcnode-id="4496" instrument_node="">says</span></span></p><p class="comment-meta" data-dcnode-id="4490"><time class="comment-time" data-dcnode-id="4491" datetime="2017-03-11T12:06:44+00:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="4492" href="#comment-28719" itemprop="url"><span data-dcnode-id="4493" instrument_node="">March 11, 2017 at 12:06 PM</span></a></time></p></header><div class="comment-content" data-dcnode-id="4482" itemprop="text"><p data-dcnode-id="4483"><span data-dcnode-id="4488" instrument_node="">Hi Ashley,</span><br data-dcnode-id="4487"><span data-dcnode-id="4486" instrument_node=""> The best advice we can give you is to consult with one of the doctors/experts that we interviewed in our Global Quest Series. Here is a link to get their information: </span><a data-dcnode-id="4484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thetruthaboutcancer.com/experts-info-sheet/" rel="nofollow"><span data-dcnode-id="4485" instrument_node="">https://thetruthaboutcancer.com/experts-info-sheet/</span></a></p></div><div class="comment-reply" data-dcnode-id="4479"><a aria-label="Reply to TTAC Customer Support" class="comment-reply-link" data-dcnode-id="4480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/VB5nYLrPNRs%23comment-28719" onclick="return addComment.moveForm( &quot;comment-28719&quot;, &quot;28719&quot;, &quot;respond&quot;, &quot;15030&quot; )" rel="nofollow"><span data-dcnode-id="4481" instrument_node="">Reply</span></a></div></article></li></ul></li><li class="comment even thread-even depth-1" data-dcnode-id="4414" id="comment-29291"><article data-dcnode-id="4439" itemprop="comment" itemscope="" itemtype="https://schema.org/Comment"><header class="comment-header" data-dcnode-id="4462"><p class="comment-author" data-dcnode-id="4467" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="4474" instrument_node=""> </span><img alt="" class="avatar avatar-48wp-user-avatar wp-user-avatar-48 alignnone photo avatar-default" data-dcnode-id="4473" height="48" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/fd81e74cb57284f2ef3dcb40e5971f9d%3Fs%3D48%26d%3Dmm%26r%3Dg&amp;raw" width="48"><span data-dcnode-id="4471" itemprop="name"><span data-dcnode-id="4472" instrument_node="">Alvaro</span></span><span data-dcnode-id="4470" instrument_node=""> </span><span class="says" data-dcnode-id="4468"><span data-dcnode-id="4469" instrument_node="">says</span></span></p><p class="comment-meta" data-dcnode-id="4463"><time class="comment-time" data-dcnode-id="4464" datetime="2017-03-22T18:26:00+00:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="4465" href="#comment-29291" itemprop="url"><span data-dcnode-id="4466" instrument_node="">March 22, 2017 at 6:26 PM</span></a></time></p></header><div class="comment-content" data-dcnode-id="4443" itemprop="text"><p data-dcnode-id="4460"><span data-dcnode-id="4461" instrument_node="">Hello Everybody</span></p><p data-dcnode-id="4444"><span data-dcnode-id="4459" instrument_node="">I was diagnosed to having Waldenstroms Macroglobulinemia (a type of Non-Hodgkins Lymphoma, a blood cancer) stage 4 on September 2015. I was 60 years old then, I will turn 62 this coming June. I was prescribed to have six chemotherapy sessions. Every fourth week I went to a facility to have chemotherapy infusions .</span><br data-dcnode-id="4458"><span data-dcnode-id="4457" instrument_node=""> After the first chemotherapy nothing happened. After the second chemotherapy I felt as If I was close to dying. I don’t want to remember the experience. I read in the Internet that Cannabis oil was proven to be very effective counter-acting chemotherapy effects. I got myself more informed and end up going to a doctor that issued a Medical Cannabis recommendation (this is legal in California, where I live). By coincidence I ended up receiving and taking my first dose of Cannabis Oil the very same day as my third infusion…</span><br data-dcnode-id="4456"><span data-dcnode-id="4455" instrument_node=""> The effects of my third chemotherapy was very mild, worse than the first but totally mild comparing it with the effects of the second chemotherapy. Chemotherapies 4, 5, and 6 increased in severity consecutively but there were tolerable.</span><br data-dcnode-id="4454"><span data-dcnode-id="4453" instrument_node=""> I could work during my treatment, I only skipped work during my chemo sessions and two days after the second chemotherapy.</span><br data-dcnode-id="4452"><span data-dcnode-id="4451" instrument_node=""> After the sixth chemo I was found to be in total remission. Thanks God I am still in total remission.</span><br data-dcnode-id="4450"><span data-dcnode-id="4449" instrument_node=""> I have been taking, orally, a small amount of Cannabis oil since I started doing it (the very same day I was administered my third chemo)</span><br data-dcnode-id="4448"><span data-dcnode-id="4447" instrument_node=""> I read the testimony of Dennis Hill, that lead me to decide to use a dose the size of ‘grain or rice’. I have gone to three doctors and none of them was able, or willing, to critique the dose that I am taking, either way (very disappointing)</span><br data-dcnode-id="4446"><span data-dcnode-id="4445" instrument_node=""> I feel very good right now, I am going to continue to take a ‘grain of rice’ every night of cannabis oil.</span></p></div><div class="comment-reply" data-dcnode-id="4440"><a aria-label="Reply to Alvaro" class="comment-reply-link" data-dcnode-id="4441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/VB5nYLrPNRs%23comment-29291" onclick="return addComment.moveForm( &quot;comment-29291&quot;, &quot;29291&quot;, &quot;respond&quot;, &quot;15030&quot; )" rel="nofollow"><span data-dcnode-id="4442" instrument_node="">Reply</span></a></div></article><ul class="children" data-dcnode-id="4415"><li class="comment odd alt depth-2" data-dcnode-id="4416" id="comment-55559"><article data-dcnode-id="4417" itemprop="comment" itemscope="" itemtype="https://schema.org/Comment"><header class="comment-header" data-dcnode-id="4426"><p class="comment-author" data-dcnode-id="4431" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="4438" instrument_node=""> </span><img alt="" class="avatar avatar-48wp-user-avatar wp-user-avatar-48 alignnone photo avatar-default" data-dcnode-id="4437" height="48" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/8e18aad8db464ad837eb8b26ecd11b1c%3Fs%3D48%26d%3Dmm%26r%3Dg&amp;raw" width="48"><span data-dcnode-id="4435" itemprop="name"><span data-dcnode-id="4436" instrument_node="">Majid</span></span><span data-dcnode-id="4434" instrument_node=""> </span><span class="says" data-dcnode-id="4432"><span data-dcnode-id="4433" instrument_node="">says</span></span></p><p class="comment-meta" data-dcnode-id="4427"><time class="comment-time" data-dcnode-id="4428" datetime="2018-09-20T16:04:03+0 data-dcnode-id="4290" instrument_node="">June 27, 2018 at 10:16 AM</span></a></time></p></header><div class="comment-content" data-dcnode-id="4283" itemprop="text"><p data-dcnode-id="4284"><span data-dcnode-id="4285" instrument_node="">I like how you suggested doing your own research when it comes to medical marijuana. I have been considering getting a medical marijuana card to help treat my bowl disease. I appreciate the information on medical cannabis.</span></p></div><div class="comment-reply" data-dcnode-id="4280"><a aria-label="Reply to Sutton Turner" class="comment-reply-link" data-dcnode-id="4281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/VB5nYLrPNRs%23comment-45016" onclick="return addComment.moveForm( &quot;comment-45016&quot;, &quot;45016&quot;, &quot;respond&quot;, &quot;15030&quot; )" rel="nofollow"><span data-dcnode-id="4282" instrument_node="">Reply</span></a></div></article></li><li class="comment even thread-odd thread-alt depth-1" data-dcnode-id="4227" id="comment-48473"><article data-dcnode-id="4250" itemprop="comment" itemscope="" itemtype="https://schema.org/Comment"><header class="comment-header" data-dcnode-id="4265"><p class="comment-author" data-dcnode-id="4270" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="4277" instrument_node=""> </span><img alt="" class="avatar avatar-48wp-user-avatar wp-user-avatar-48 alignnone photo avatar-default" data-dcnode-id="4276" height="48" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/605959256c90305217430defe182fb69%3Fs%3D48%26d%3Dmm%26r%3Dg&amp;raw" width="48"><span data-dcnode-id="4274" itemprop="name"><span data-dcnode-id="4275" instrument_node="">Olivia</span></span><span data-dcnode-id="4273" instrument_node=""> </span><span class="says" data-dcnode-id="4271"><span data-dcnode-id="4272" instrument_node="">says</span></span></p><p class="comment-meta" data-dcnode-id="4266"><time class="comment-time" data-dcnode-id="4267" datetime="2018-07-31T13:59:43+00:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="4268" href="#comment-48473" itemprop="url"><span data-dcnode-id="4269" instrument_node="">July 31, 2018 at 1:59 PM</span></a></time></p></header><div class="comment-content" data-dcnode-id="4254" itemprop="text"><p data-dcnode-id="4261"><span data-dcnode-id="4264" instrument_node="">I would like to comment on the following section:</span><br data-dcnode-id="4263"><span data-dcnode-id="4262" instrument_node=""> #2. Know your source. Unfortunately, because the medical cannabis industry is largely unregulated, charlatans selling bogus products definitely exist. You should not have to pay exorbitant amounts of money for any cannabis product that you buy from regulated pharmacies or online. Also, make quality a priority for you. Be sure that your product comes from an organic source and that you know that the plant has not been grown or processed using pesticides.</span></p><p data-dcnode-id="4257"><span data-dcnode-id="4260" instrument_node="">To begin with, the medical cannabis industry is highly regulated.  All states that have programs have strict regulations that must be implemented and followed before even obtaining a certificate of operations.  States also have mandatory inventory tracking systems that track the plant from (literally) seed to sale.</span><br data-dcnode-id="4259"><span data-dcnode-id="4258" instrument_node=""> As for the bit about quality – no cannabis can actually be certified “organic” as defined by the USDA.  Because cannabis is still federally illegal, despite state law, it is not recognized by the USDA as an actually crop for consumption.  As for the use of pesticides, all products that are for sale in the medical marijuana must pass stringent lab testing, including testing for pesticide residue.  Many states with medical marijuana programs even have regulations about the use of pesticides (which ones can be used and for how long).</span></p><p data-dcnode-id="4255"><span data-dcnode-id="4256" instrument_node="">To me, Ty’s remarks made it sound like the world of medical marijuana is much more loose than it actually is, when in fact, it is filled with regulators, lawyers, scientists.  The medical marijuana field may be a big one, but the more that one does research and make themselves aware, the better.  In the medical marijuana field, knowledge truly is power.</span></p></div><div class="comment-reply" data-dcnode-id="4251"><a aria-label="Reply to Olivia" class="comment-reply-link" data-dcnode-id="4252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/VB5nYLrPNRs%23comment-48473" onclick="return addComment.moveForm( &quot;comment-48473&quot;, &quot;48473&quot;, &quot;respond&quot;, &quot;15030&quot; )" rel="nofollow"><span data-dcnode-id="4253" instrument_node="">Reply</span></a></div></article><ul class="children" data-dcnode-id="4228"><li class="comment byuser comment-author-aubreywilson odd alt depth-2" data-dcnode-id="4229" id="comment-50605"><article data-dcnode-id="4230" itemprop="comment" itemscope="" itemtype="https://schema.org/Comment"><header class="comment-header" data-dcnode-id="4237"><p class="comment-author" data-dcnode-id="4242" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="4249" instrument_node=""> </span><img alt="Customer Success" class="avatar avatar-48 wp-user-avatar wp-user-avatar-48 alignnone photo" data-dcnode-id="4248" height="48" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.thetruthaboutcancer.com/wp-content/uploads/20190205143852/TTAC-logo-100x100-1.png&amp;raw" width="48"><span data-dcnode-id="4246" itemprop="name"><span data-dcnode-id="4247" instrument_node="">Customer Success</span></span><span data-dcnode-id="4245" instrument_node=""> </span><span class="says" data-dcnode-i "" class="avatar avatar-48wp-user-avatar wp-user-avatar-48 alignnone photo avatar-default" data-dcnode-id="3323" height="48" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/49c0f3daa500e000204c26fe3efc5e0a%3Fs%3D48%26d%3Dmm%26r%3Dg&amp;raw" width="48"><span data-dcnode-id="3321" itemprop="name"><span data-dcnode-id="3322" instrument_node="">Joe Robeck</span></span><span data-dcnode-id="3320" instrument_node=""> </span><span class="says" data-dcnode-id="3318"><span data-dcnode-id="3319" instrument_node="">says</span></span></p><p class="comment-meta" data-dcnode-id="3313"><time class="comment-time" data-dcnode-id="3314" datetime="2018-09-19T21:18:20+00:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="3315" href="#comment-55427" itemprop="url"><span data-dcnode-id="3316" instrument_node="">September 19, 2018 at 9:18 PM</span></a></time></p></header><div class="comment-content" data-dcnode-id="3309" itemprop="text"><p data-dcnode-id="3310"><span data-dcnode-id="3311" instrument_node="">I don’t know if this has been said or not, but Hemp and Marijuana are in the same family of plants, but are not the same thing. Please give us the correct definition for both, thank you. For example; Hemp is completely different from marijuana in its function, cultivation and application. But these differences didn’t stop our political leaders from getting confused and accidentally grouping all Cannabis species as a Schedule I Drug and banning it in 1970 under the Controlled Substances Act. Even after 45 years, the government still seems to have some confusion in distinguishing the two plants. Although legislation is being made, progress has been slow.In its application, hemp and marijuana serve completely different purposes. Marijuana, as it is widely known, is used for medicinal or recreational purposes. Hemp is used in variety of other applications that marijuana couldn’t possibly be used in. These include healthy dietary supplements, skin products, clothing, and accessories. Overall, hemp is known to have over 25,000 possible applications. (Taken from ministryofhemp.com)</span></p></div><div class="comment-reply" data-dcnode-id="3306"><a aria-label="Reply to Joe Robeck" class="comment-reply-link" data-dcnode-id="3307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/VB5nYLrPNRs%23comment-55427" onclick="return addComment.moveForm( &quot;comment-55427&quot;, &quot;55427&quot;, &quot;respond&quot;, &quot;15030&quot; )" rel="nofollow"><span data-dcnode-id="3308" instrument_node="">Reply</span></a></div></article></li><li class="comment even thread-even depth-1" data-dcnode-id="3281" id="comment-55440"><article data-dcnode-id="3282" itemprop="comment" itemscope="" itemtype="https://schema.org/Comment"><header class="comment-header" data-dcnode-id="3291"><p class="comment-author" data-dcnode-id="3296" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="3303" instrument_node=""> </span><img alt="" class="avatar avatar-48wp-user-avatar wp-user-avatar-48 alignnone photo avatar-default" data-dcnode-id="3302" height="48" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/de1e2a99bbcce7de608326b56f1e6c05%3Fs%3D48%26d%3Dmm%26r%3Dg&amp;raw" width="48"><span data-dcnode-id="3300" itemprop="name"><span data-dcnode-id="3301" instrument_node="">Jan</span></span><span data-dcnode-id="3299" instrument_node=""> </span><span class="says" data-dcnode-id="3297"><span data-dcnode-id="3298" instrument_node="">says</span></span></p><p class="comment-meta" data-dcnode-id="3292"><time class="comment-time" data-dcnode-id="3293" datetime="2018-09-19T22:43:54+00:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="3294" href="#comment-55440" itemprop="url"><span data-dcnode-id="3295" instrument_node="">September 19, 2018 at 10:43 PM</span></ itude – so instead of asking others’, ‘oh god, what do I take, or do ?’… slow down, smarten up, and get your guts back… if you can’t use your own intuition AND ALL THE INFO IS OUT THERE if you can not follow the signs… then relax and let yourself die, because brother, I’m not responsible to keep your sorry dumb arse alive, so stop asking stoopid questions. Pete, self healed own research and super alive</span></p></div><div class="comment-reply" data-dcnode-id="3058"><a aria-label="Reply to Pete Petersen" class="comment-reply-link" data-dcnode-id="3059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/VB5nYLrPNRs%23comment-55736" onclick="return addComment.moveForm( &quot;comment-55736&quot;, &quot;55736&quot;, &quot;respond&quot;, &quot;15030&quot; )" rel="nofollow"><span data-dcnode-id="3060" instrument_node="">Reply</span></a></div></article><ul class="children" data-dcnode-id="2993"><li class="comment odd alt depth-2" data-dcnode-id="3036" id="comment-57781"><article data-dcnode-id="3037" itemprop="comment" itemscope="" itemtype="https://schema.org/Comment"><header class="comment-header" data-dcnode-id="3044"><p class="comment-author" data-dcnode-id="3049" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="3056" instrument_node=""> </span><img alt="" class="avatar avatar-48wp-user-avatar wp-user-avatar-48 alignnone photo avatar-default" data-dcnode-id="3055" height="48" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/46bfd39cb0e1865b2b6d9848aff13b06%3Fs%3D48%26d%3Dmm%26r%3Dg&amp;raw" width="48"><span data-dcnode-id="3053" itemprop="name"><span data-dcnode-id="3054" instrument_node="">Alexander</span></span><span data-dcnode-id="3052" instrument_node=""> </span><span class="says" data-dcnode-id="3050"><span data-dcnode-id="3051" instrument_node="">says</span></span></p><p class="comment-meta" data-dcnode-id="3045"><time class="comment-time" data-dcnode-id="3046" datetime="2018-10-05T02:29:07+00:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="3047" href="#comment-57781" itemprop="url"><span data-dcnode-id="3048" instrument_node="">October 5, 2018 at 2:29 AM</span></a></time></p></header><div class="comment-content" data-dcnode-id="3041" itemprop="text"><p data-dcnode-id="3042"><span data-dcnode-id="3043" instrument_node="">Good on ya Pete.I am 88 years young and it is exactly as you say in your post why I am still alive and kicking. No ifs or buts.</span></p></div><div class="comment-reply" data-dcnode-id="3038"><a aria-label="Reply to Alexander" class="comment-reply-link" data-dcnode-id="3039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/VB5nYLrPNRs%23comment-57781" onclick="return addComment.moveForm( &quot;comment-57781&quot;, &quot;57781&quot;, &quot;respond&quot;, &quot;15030&quot; )" rel="nofollow"><span data-dcnode-id="3040" instrument_node="">Reply</span></a></div></article></li><li class="comment even depth-2" data-dcnode-id="3015" id="comment-89893"><article data-dcnode-id="3016" itemprop="comment" itemscope="" itemtype="https://schema.org/Comment"><header class="comment-header" data-dcnode-id="3023"><p class="comment-author" data-dcnode-id="3028" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="3035" instrument_node=""> </span><img alt="" class="avatar avatar-48wp-user-avatar wp-user-avatar-48 alignnone photo avatar-default" data-dcnode-id="3034" height="48" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/dcc318efacbe792d41904187cd9e215e%3Fs%3D48%26d%3Dmm%26r%3Dg&amp;raw" width="48"><span data-dcnode-id="3032" itemprop="name"><span data-dcnode-id="3033" instrument_node="">Jody</span></span><span data-dcnode-id="3031" instrument_node=""> </span><span class="says" data-dcnode-id="3029"><span data-dcnode-id="3030" instrument_node="">says</span></span></p><p class="comment-meta" data-dcnode-id="3024"><time class="comment-time" data-dcnode-id="3025" datetime="2019-01-07T15:02:41+00:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="3026" href="#comment-89893" itemprop="url"><span data-dcnode-id="3027" instrument_node="">January 7, 2019 at 3:02 PM</span></a></time></p></header><div class="comment-content" data-dcnode-id="3020" itemprop="text"><p data-dcnode-id="3021"><span data-dcnode-id="3022" instrument_node="">Oh Pete, you are very fortunate, and also seem to be very proud of your accomplishment–as you should be.  But you also seem to have forgotten about compassion, and your comment to “let yourself die” is very cruel and callous. Are you able to feel joyous for your own recovery and also encourage others? Could you share your healing journey with a true will to help others? Can you heal yourself and also remain compassionate? Healing is an inside job, you are right. But not everyone is in the same place, space or frame of mind as you. Your comment seems to me to be more hurtful than helpful. Perhaps you could reflect on what it means to truly heal.</span></p></div><div class="comment-reply" data-dcnode-id="3017"><a aria-label="Reply to Jody" class="comment-reply-link" data-dcnode-id="3018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/VB5nYLrPNRs%23comment-89893" onclick="return addComment.moveForm( &quot;comment-89893&quot;, &quot;89893&quot;, &quot;respond&quot;, &quot;15030&quot; )" rel="nofollow"><span data-dcnode-id="3019" instrument_node="">Reply</span></a></div></article></li><li class="comment odd alt depth-2" data-dcnode-id="2994" id="comment-167885"><article data-dcnode-id="2995" itemprop="comment" itemscope="" itemtype="https://schema.org/Comment"><header class="comment-header" data-dcnode-id="3002"><p class="comment-author" data-dcnode-id="3007" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="3014" instrument_node=""> </span><img alt="" class="avatar avatar-48wp-user-avatar wp-user-avatar-48 alignnone photo avatar-default" data-dcnode-id="3013" height="48" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/f602830ab9a629c55e8f6de0c3c62df3%3Fs%3D48%26d%3Dmm%26r%3Dg&amp;raw" width="48"><span data-dcnode-id="3011" itemprop="name"><span data-dcnode-id="3012" instrument_node="">Darlene Taylor</span></span><span data-dcnode-id="3010" instrument_node=""> </span><span class="says" data-dcnode-id="3008"><span data-dcnode-id="3009" instrument_node="">says</span></span></p><p class="comment-meta" data-dcnode-id="3003"><time class="comment-time" data-dcnode-id="3004" datetime="2020-01-26T21:46:47+00:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="3005" href="#comment-167885" itemprop="url"><span data-dcnode-id="3006" instrument_node="">January 26, 2020 at 9:46 PM</span></a></time></p></header><div class="comment-content" data-dcnode-id="2999" itemprop="text"><p data-dcnode-id="3000"><span data-dcnode-id="3001" instrument_node="">Pete, Cancer as a diagnosis is overwhelming. In that diagnosis, we are often paralyzed with fear; It can frustrate or intimidate so completely that a person can’t think clearly or move in a positive direction. A word of compassion and a testimony from someone who has faced the challenges that cancer brings can be the difference between hope and despair. Please be compassionate in your remarks. You would want someone to show concern and compassion for someone you love if they were facing the same situation . Don’t mean to preach to you, just asking you to be a little kinder. God Bless you</span></p></div><div class="comment-reply" data-dcnode-id="2996"><a aria-label="Reply to Darlene Taylor" class="comment-reply-link" data-dcnode-id="2997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A/ s%23comment-101031" onclick="return addComment.moveForm( &quot;comment-101031&quot;, &quot;101031&quot;, &quot;respond&quot;, &quot;15030&quot; )" rel="nofollow"><span data-dcnode-id="2236" instrument_node="">Reply</span></a></div></article><ul class="children" data-dcnode-id="2093"><li class="comment odd alt depth-2" data-dcnode-id="2094" id="comment-101217"><article data-dcnode-id="2095" itemprop="comment" itemscope="" itemtype="https://schema.org/Comment"><header class="comment-header" data-dcnode-id="2220"><p class="comment-author" data-dcnode-id="2225" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="2232" instrument_node=""> </span><img alt="" class="avatar avatar-48wp-user-avatar wp-user-avatar-48 alignnone photo avatar-default" data-dcnode-id="2231" height="48" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/%3Fs%3D48%26d%3Dmm%26r%3Dg&amp;raw" width="48"><span data-dcnode-id="2229" itemprop="name"><span data-dcnode-id="2230" instrument_node="">Customer Support</span></span><span data-dcnode-id="2228" instrument_node=""> </span><span class="says" data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">says</span></span></p><p class="comment-meta" data-dcnode-id="2221"><time class="comment-time" data-dcnode-id="2222" datetime="2019-02-14T15:45:29+00:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="2223" href="#comment-101217" itemprop="url"><span data-dcnode-id="2224" instrument_node="">February 14, 2019 at 3:45 PM</span></a></time></p></header><div class="comment-content" data-dcnode-id="2099" itemprop="text"><p data-dcnode-id="2102"><span data-dcnode-id="2219" instrument_node="">Hi Edith –&nbsp;</span><br data-dcnode-id="2218"><span data-dcnode-id="2217" instrument_node=""> &nbsp;</span><br data-dcnode-id="2216"><span data-dcnode-id="2215" instrument_node=""> We appreciate you reaching out to us about this.</span><br data-dcnode-id="2214"><span data-dcnode-id="2213" instrument_node=""> &nbsp;</span><br data-dcnode-id="2212"><span data-dcnode-id="2211" instrument_node=""> I’m so sorry to hear about your mother – I’ll be sure to pray for her.</span><br data-dcnode-id="2210"><span data-dcnode-id="2209" instrument_node=""> &nbsp;</span><br data-dcnode-id="2208"><span data-dcnode-id="2207" instrument_node=""> Unfortunately, we are unable to give any kind of medical advice. The best advice we can give you is to consult with one of the doctors we interviewed in the Global series.</span><br data-dcnode-id="2206"><span data-dcnode-id="2205" instrument_node=""> &nbsp;</span><br data-dcnode-id="2204"><span data-dcnode-id="2203" instrument_node=""> Please note that we are not able to select an expert for you. &nbsp;</span><br data-dcnode-id="2202"><span data-dcnode-id="2201" instrument_node=""> &nbsp;</span><br data-dcnode-id="2200"><span data-dcnode-id="2199" instrument_node=""> We’ve created a page with the experts’ contact info as it was available to us.&nbsp;</span><br data-dcnode-id="2198"><span data-dcnode-id="2197" instrument_node=""> &nbsp;</span><br data-dcnode-id="2196"><span data-dcnode-id="2195" instrument_node=""> Here’s the link to the actual webpage:&nbsp;</span><br data-dcnode-id="2194"><span data-dcnode-id="2193" instrument_node=""> </span><a data-dcnode-id="2191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thetruthaboutcancer.com/experts-info-sheet/" rel="nofollow"><span data-dcnode-id="2192" instrument_node="">http://thetruthaboutcancer.com/experts-info-sheet/</span></a><br data-dcnode-id="2190"><span data-dcnode-id="2189" instrument_node=""> &nbsp;</span><br data-dcnode-id="2188"><span data-dcnode-id="2187" instrument_node=""> We do have one more resource you may be interested in. During our Live Event 2017 series, Dr. Patrick Quillin suggested contacting The Institute of Functional Medicine to locate a practitioner in your area.&nbsp;</span><br data-dcnode-id="2186"><span data-dcnode-id="2185" instrument_node=""> &nbsp;</span><br data-dcnode-id="2184"><span data-dcnode-id="2183" instrument_node=""> If you are interested, here is the link to search for a Functional Medicine Practitioner in your area:&nbsp;https://www.ifm.org/find-a-practitioner/</span><br data-dcnode-id="2182"><span data-dcnode-id="2181" instrument_node=""> &nbsp;</span><br data-dcnode-id="2180"><span data-dcnode-id="2179" instrument_node=""> I’m also attaching the info about the Hope4Cancer clinic in Tijuana, MX if you’d like to reach out to them.</span><br data-dcnode-id="2178"><span data-dcnode-id="2177" instrument_node=""> &nbsp;</span><br data-dcnode-id="2176"><span data-dcnode-id="2175" instrument_node=""> </span><a data-dcnode-id="2173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hope4cancer.com/" rel="nofollow"><span data-dcnode-id="2174" instrument_node="">http://www.hope4cancer.com/</span></a><br data-dcnode-id="2172"><span data-dcnode-id="2171" instrument_node=""> </span><a data-dcnode-id="2169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hope4cancer.com/schedule-a-call/" rel="nofollow"><span data-dcnode-id="2170" instrument_node="">https://hope4cancer.com/schedule-a-call/</span></a><br data-dcnode-id="2168"><span data-dcnode-id="2167" instrument_node=""> &nbsp;</span><br data-dcnode-id="2166"><span data-dcnode-id="2165" instrument_node=""> Please also see the resources below in case they will be helpful to you.</span><br data-dcnode-id="2164"><span data-dcnode-id="2163" instrument_node=""> &nbsp;</span><br data-dcnode-id="2162"><span data-dcnode-id="2161" instrument_node=""> From our beginning, we have supported charities that really help these cancer patients.</span><br data-dcnode-id="2160"><span data-dcnode-id="2159" instrument_node=""> &nbsp;</span><br data-dcnode-id="2158"><span data-dcnode-id="2157" instrument_node=""> HealingStrong:</span><br data-dcnode-id="2156"><span data-dcnode-id="2155" instrument_node=""> </span><a data-dcnode-id="2153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//healingstrong.com/" rel="nofollow"><span data-dcnode-id="2154" instrument_node="">http://healingstrong.com/</span></a><br data-dcnode-id="2152"><span data-dcnode-id="2151" instrument_node=""> </span><a data-dcnode-id="2149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/healingstrong" rel="nofollow"><span data-dcnode-id="2150" instrument_node="">https://www.facebook.com/healingstrong</span></a><br data-dcnode-id="2148"><span data-dcnode-id="2147" instrument_node=""> &nbsp;</span><br data-dcnode-id="2146"><span data-dcnode-id="2145" instrument_node=""> HealingStrong supports MANY cancer patients and are amazing. HealingStrong, a nonprofit organization, is supported 100% by volunteers, who are experienced in using natural strategies. The organization’s mission is to educate, encourage, equip, and empower those seeking comprehensive natural strategies to heal strong and stay strong.&nbsp;</span><br data-dcnode-id="2144"><span data-dcnode-id="2143" instrument_node=""> &nbsp;</span><br data-dcnode-id="2142"><span data-dcnode-id="2141" instrument_node=""> HealingStrong Connect Groups meet monthly in various areas of the U.S. and South Australia to link others interested in natural strategies, holistic protocols, and local resources. Their groups focus on mind, body and emotional healing based on Biblical promises, as they believe the God of the Bible is our healer.&nbsp; For more information on how to start a group, or become involved in one, please go to: </span><a data-dcnode-id="2139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.healingstrong.org/groups" rel="nofollow"><span data-dcnode-id="2140" instrument_node="">http://www.healingstrong.org/groups</span></a><span data-dcnode-id="2138" instrument_node="">, and like us on Facebook at </span><a data-dcnode-id="2136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.facebook.com/healingstrong" rel="nofollow"><span data-dcnode-id="2137" instrument_node="">http://www.facebook.com/healingstrong</span></a><span data-dcnode-id="2135" instrument_node="">.</span><br data-dcnode-id="2134"><span data-dcnode-id="2133" instrument_node=""> &nbsp;</span><br data-dcnode-id="2132"><span data-dcnode-id="2131" instrument_node=""> Cancer Crackdown is so awesome and helps patients without a lot of money get supplements and treatments and even helps them raise money:</span><br data-dcnode-id="2130"><span data-dcnode-id="2129" instrument_node=""> </span><a data-dcnode-id="2127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cancercrackdown.org/" rel="nofollow"><span data-dcnode-id="2128" instrument_node="">http://cancercrackdown.org/</span></a><br data-dcnode-id="2126"><span data-dcnode-id="2125" instrument_node=""> </span><a data-dcnode-id="2123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/CancerCrackdown" rel="nofollow"><span data-dcnode-id="2124" instrument_node="">https://www.facebook.com/CancerCrackdown</span></a><br data-dcnode-id="2122"><span data-dcnode-id="2121" instrument_node=""> &nbsp;</span><br data-dcnode-id="2120"><span data-dcnode-id="2119" instrument_node=""> Also, the Independent Cancer Research Foundation is another charity that we support, also known as Cancer Tutor. They have been a TREMENDOUS help for cancer patients and have a TON of life saving information they give out freely and they do real research into treatments for cancer that are outside of the toxic Big Pharma Big 3:</span><br data-dcnode-id="2118"><span data-dcnode-id="2117" instrument_node=""> </span><a data-dcnode-id="2115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.theicrf.com/" rel="nofollow"><span data-dcnode-id="2116" instrument_node="">http://www.theicrf.com/</span></a><br data-dcnode-id="2114"><span data-dcnode-id="2113" instrument_node=""> &nbsp;</span><br data-dcnode-id="2112"><span data-dcnode-id="2111" instrument_node=""> The best that we can suggest is to contact Healing Strong and Cancer Crackdown for any need in financial resources.&nbsp;</span><br data-dcnode-id="2110"><span data-dcnode-id="2109" instrument_node=""> &nbsp;</span><br data-dcnode-id="2108"><span data-dcnode-id="2107" instrument_node=""> We also support Mary Beth’s “Nick Gonzalez Foundation” which is bringing Nick’s protocol to the people…which is one of the most powerful cancer killing protocols out there.</span><br data-dcnode-id="2106"><span data-dcnode-id="2105" instrument_node=""> &nbsp;</span><br data-dcnode-id="2104"><span data-dcnode-id="2103" instrument_node=""> I hope this is helpful! Please don’t hesitate to reach out to us again if there’s anything else we can help with.</span></p><p data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">Wishing you endless blessings and love!</span></p></div><div class="comment-reply" data-dcnode-id="2096"><a aria-label="Reply to Customer Support" class="comment-reply-link" data-dcnode-id="2097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/VB5nYLrPNRs%23comment-101217" onclick="return addComment.moveForm( &quot;comment-101217&quot;, &quot;101217&quot;, &quot;respond&quot;, &quot;15030&quot; )" rel="nofollow"><span data-dcnode-id="2098" instrument_node="">Reply</span></a></div></article></li></ul></li><li class="comment even thread-odd thread-alt depth-1" data-dcnode-id="2071" id="comment-102548"><article data-dcnode-id="2072" itemprop="comment" itemscope="" itemtype="https://schema.org/Comment"><header class="comment-header" data-dcnode-id="2079"><p class="comment-author" data-dcnode-id="2084" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="2091" instrument_node=""> </spa
