tcancer.com/experts-info-sheet/</span></a><br data-dcnode-id="1764"><span data-dcnode-id="1763" instrument_node=""> &nbsp;</span><br data-dcnode-id="1762"><span data-dcnode-id="1761" instrument_node=""> We do have one more resource you may be interested in. During our Live Event 2017 series, Dr. Patrick Quillin suggested contacting The Institute of Functional Medicine to locate a practitioner in your area.&nbsp;</span><br data-dcnode-id="1760"><span data-dcnode-id="1759" instrument_node=""> &nbsp;</span><br data-dcnode-id="1758"><span data-dcnode-id="1757" instrument_node=""> If you are interested, here is the link to search for a Functional Medicine Practitioner in your area:&nbsp;https://www.ifm.org/find-a-practitioner/</span><br data-dcnode-id="1756"><span data-dcnode-id="1755" instrument_node=""> &nbsp;</span><br data-dcnode-id="1754"><span data-dcnode-id="1753" instrument_node=""> I’m also attaching the info about the Hope4Cancer clinic in Tijuana, MX if you’d like to reach out to them.</span><br data-dcnode-id="1752"><span data-dcnode-id="1751" instrument_node=""> &nbsp;</span><br data-dcnode-id="1750"><span data-dcnode-id="1749" instrument_node=""> </span><a data-dcnode-id="1747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hope4cancer.com/" rel="nofollow"><span data-dcnode-id="1748" instrument_node="">http://www.hope4cancer.com/</span></a><br data-dcnode-id="1746"><span data-dcnode-id="1745" instrument_node=""> </span><a data-dcnode-id="1743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hope4cancer.com/schedule-a-call/" rel="nofollow"><span data-dcnode-id="1744" instrument_node="">https://hope4cancer.com/schedule-a-call/</span></a><br data-dcnode-id="1742"><span data-dcnode-id="1741" instrument_node=""> &nbsp;</span><br data-dcnode-id="1740"><span data-dcnode-id="1739" instrument_node=""> Please also see the resources below in case they will be helpful to you.</span><br data-dcnode-id="1738"><span data-dcnode-id="1737" instrument_node=""> &nbsp;</span><br data-dcnode-id="1736"><span data-dcnode-id="1735" instrument_node=""> From our beginning, we have supported charities that really help these cancer patients.</span><br data-dcnode-id="1734"><span data-dcnode-id="1733" instrument_node=""> &nbsp;</span><br data-dcnode-id="1732"><span data-dcnode-id="1731" instrument_node=""> HealingStrong:</span><br data-dcnode-id="1730"><span data-dcnode-id="1729" instrument_node=""> </span><a data-dcnode-id="1727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//healingstrong.com/" rel="nofollow"><span data-dcnode-id="1728" instrument_node="">http://healingstrong.com/</span></a><br data-dcnode-id="1726"><span data-dcnode-id="1725" instrument_node=""> </span><a data-dcnode-id="1723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/healingstrong" rel="nofollow"><span data-dcnode-id="1724" instrument_node="">https://www.facebook.com/healingstrong</span></a><br data-dcnode-id="1722"><span data-dcnode-id="1721" instrument_node=""> &nbsp;</span><br data-dcnode-id="1720"><span data-dcnode-id="1719" instrument_node=""> HealingStrong supports MANY cancer patients and are amazing. HealingStrong, a nonprofit organization, is supported 100% by volunteers, who are experienced in using natural strategies. The organization’s mission is to educate, encourage, equip, and empower those seeking comprehensive natural strategies to heal strong and stay strong.&nbsp;</span><br data-dcnode-id="1718"><span data-dcnode-id="1717" instrument_node=""> &nbsp;</span><br data-dcnode-id="1716"><span data-dcnode-id="1715" instrument_node=""> HealingStrong Connect Groups meet monthly in various areas of the U.S. and South Australia to link others interested in natural strategies, holistic protocols, and local resources. Their groups focus on mind, body and emotional healing based on Biblical promises, as they believe the God of the Bible is our healer.&nbsp; For more information on how to start a group, or become involved in one, please go to </span><a data-dcnode-id="1713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.healingstrong.org/groups" rel="nofollow"><span data-dcnode-id="1714" instrument_node="">http://www.healingstrong.org/groups</span></a><span data-dcnode-id="1712" instrument_node="">, and like us on Facebook at </span><a data-dcnode-id="1710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.facebook.com/healingstrong" rel="nofollow"><span data-dcnode-id="1711" instrument_node="">http://www.facebook.com/healingstrong</span></a><span data-dcnode-id="1709" instrument_node="">.</span><br data-dcnode-id="1708"><span data-dcnode-id="1707" instrument_node=""> &nbsp;</span><br data-dcnode-id="1706"><span data-dcnode-id="1705" instrument_node=""> Cancer Crackdown is so awesome and helps patients without a lot of money get supplements and treatments and even helps them raise money:</span><br data-dcnode-id="1704"><span data-dcnode-id="1703" instrument_node=""> </span><a data-dcnode-id="1701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cancercrackdown.org/" rel="nofollow"><span data-dcnode-id="1702" instrument_node="">http://cancercrackdown.org/</span></a><br data-dcnode-id="1700"><span data-dcnode-id="1699" instrument_node=""> </span><a data-dcnode-id="1697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/CancerCrackdown" rel="nofollow"><span data-dcnode-id="1698" instrument_node="">https://www.facebook.com/CancerCrackdown</span></a><br data-dcnode-id="1696"><span data-dcnode-id="1695" instrument_node=""> &nbsp;</span><br data-dcnode-id="1694"><span data-dcnode-id="1693" instrument_node=""> Also, the Independent Cancer Research Foundation is another charity that we support, also known as Cancer Tutor. They have been a TREMENDOUS help for cancer patients and have a TON of life-saving information they give out freely and they do real research into treatments for cancer that are outside of the toxic Big Pharma Big 3:</span><br data-dcnode-id="1692"><span data-dcnode-id="1691" instrument_node=""> </span><a data-dcnode-id="1689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thetruthaboutcancer.com/independent-cancer-research-foundation/" rel="nofollow"><span data-dcnode-id="1690" instrument_node="">https://thetruthaboutcancer.com/independent-cancer-research-foundation/</span></a><br data-dcnode-id="1688"><span data-dcnode-id="1687" instrument_node=""> &nbsp;</span><br data-dcnode-id="1686"><span data-dcnode-id="1685" instrument_node=""> The best that we can suggest is to contact Healing Strong and Cancer Crackdown for any need in financial resources.&nbsp;</span><br data-dcnode-id="1684"><span data-dcnode-id="1683" instrument_node=""> &nbsp;</span><br data-dcnode-id="1682"><span data-dcnode-id="1681" instrument_node=""> We also support Mary Beth’s “Nick Gonzalez Foundation” which is bringing Nick’s protocol to the people…which is one of the most powerful cancer-killing protocols out there.</span><br data-dcnode-id="1680"><span data-dcnode-id="1679" instrument_node=""> &nbsp;</span><br data-dcnode-id="1678"><span data-dcnode-id="1677" instrument_node=""> I hope this is helpful! Please don’t hesitate to reach out to us again if there’s anything else we can help with.</span></p><p data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">Wishing you endless blessings and love!</span></p></div><div class="comment-reply" data-dcnode-id="1670"><a aria-label="Reply to Customer Support" class="comment-reply-link" data-dcnode-id="1671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/VB5nYLrPNRs%23comment-140309" onclick="return addComment.moveForm( &quot;comment-140309&quot;, &quot;140309&quot;, &quot;respond&quot;, &quot;15030&quot; )" rel= -dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">Hi,my brother in law.suffering with lunch cancer. May I request to have some suggestions please.</span></p></div><div class="comment-reply" data-dcnode-id="1604"><a aria-label="Reply to Zed" class="comment-reply-link" data-dcnode-id="1605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/VB5nYLrPNRs%23comment-147726" onclick="return addComment.moveForm( &quot;comment-147726&quot;, &quot;147726&quot;, &quot;respond&quot;, &quot;15030&quot; )" rel="nofollow"><span data-dcnode-id="1606" instrument_node="">Reply</span></a></div></article><ul class="children" data-dcnode-id="1493"><li class="comment odd alt depth-2" data-dcnode-id="1494" id="comment-147968"><article data-dcnode-id="1495" itemprop="comment" itemscope="" itemtype="https://schema.org/Comment"><header class="comment-header" data-dcnode-id="1590"><p class="comment-author" data-dcnode-id="1595" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="1602" instrument_node=""> </span><img alt="" class="avatar avatar-48wp-user-avatar wp-user-avatar-48 alignnone photo avatar-default" data-dcnode-id="1601" height="48" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/%3Fs%3D48%26d%3Dmm%26r%3Dg&amp;raw" width="48"><span data-dcnode-id="1599" itemprop="name"><span data-dcnode-id="1600" instrument_node="">Customer Support</span></span><span data-dcnode-id="1598" instrument_node=""> </span><span class="says" data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">says</span></span></p><p class="comment-meta" data-dcnode-id="1591"><time class="comment-time" data-dcnode-id="1592" datetime="2019-09-30T06:10:11+00:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="1593" href="#comment-147968" itemprop="url"><span data-dcnode-id="1594" instrument_node="">September 30, 2019 at 6:10 AM</span></a></time></p></header><div class="comment-content" data-dcnode-id="1499" itemprop="text"><p data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">Hi Zed –</span></p><p data-dcnode-id="1532"><span data-dcnode-id="1587" instrument_node="">We appreciate you reaching out to us about this.</span><br data-dcnode-id="1586"><span data-dcnode-id="1585" instrument_node=""> &nbsp;</span><br data-dcnode-id="1584"><span data-dcnode-id="1583" instrument_node=""> I’m so sorry to hear about your brother-in-law. I’ll be sure to pray for him.</span><br data-dcnode-id="1582"><span data-dcnode-id="1581" instrument_node=""> &nbsp;</span><br data-dcnode-id="1580"><span data-dcnode-id="1579" instrument_node=""> Unfortunately, we are unable to give any kind of medical advice. The best advice we can give you is to consult with one of the doctors we interviewed in the Global series.</span><br data-dcnode-id="1578"><span data-dcnode-id="1577" instrument_node=""> &nbsp;</span><br data-dcnode-id="1576"><span data-dcnode-id="1575" instrument_node=""> Please note that we are not able to select an expert for you. &nbsp;</span><br data-dcnode-id="1574"><span data-dcnode-id="1573" instrument_node=""> &nbsp;</span><br data-dcnode-id="1572"><span data-dcnode-id="1571" instrument_node=""> We’ve created a page with the experts’ contact info as it was available to us.&nbsp;</span><br data-dcnode-id="1570"><span data-dcnode-id="1569" instrument_node=""> &nbsp;</span><br data-dcnode-id="1568"><span data-dcnode-id="1567" instrument_node=""> Here’s the link to the actual webpage:&nbsp;</span><br data-dcnode-id="1566"><span data-dcnode-id="1565" instrument_node=""> </span><a data-dcnode-id="1563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thetruthaboutcancer.com/experts-info-sheet/" rel="nofollow"><span data-dcnode-id="1564" instrument_node="">http://thetruthaboutcancer.com/experts-info-sheet/</span></a><br data-dcnode-id="1562"><span data-dcnode-id="1561" instrument_node=""> &nbsp;</span><br data-dcnode-id="1560"><span data-dcnode-id="1559" instrument_node=""> Also, during our Live Event 2017 series, Dr. Patrick Quillin suggested contacting The Institute of Functional Medicine to locate a practitioner in your area.&nbsp;</span><br data-dcnode-id="1558"><span data-dcnode-id="1557" instrument_node=""> &nbsp;</span><br data-dcnode-id="1556"><span data-dcnode-id="1555" instrument_node=""> If you are interested, here is the link to search for a Functional Medicine Practitioner in your area:&nbsp;https://www.ifm.org/find-a-practitioner/</span><br data-dcnode-id="1554"><span data-dcnode-id="1553" instrument_node=""> &nbsp;</span><br data-dcnode-id="1552"><span data-dcnode-id="1551" instrument_node=""> I’m also attaching the info about the Hope4Cancer clinic in Tijuana, MX if you’d like to reach out to them.</span><br data-dcnode-id="1550"><span data-dcnode-id="1549" instrument_node=""> &nbsp;</span><br data-dcnode-id="1548"><span data-dcnode-id="1547" instrument_node=""> </span><a data-dcnode-id="1545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hope4cancer.com/" rel="nofollow"><span data-dcnode-id="1546" instrument_node="">http://www.hope4cancer.com/</span></a><br data-dcnode-id="1544"><span data-dcnode-id="1543" instrument_node=""> </span><a data-dcnode-id="1541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hope4cancer.com/schedule-a-call/" rel="nofollow"><span data-dcnode-id="1542" instrument_node="">https://hope4cancer.com/schedule-a-call/</span></a><br data-dcnode-id="1540"><span data-dcnode-id="1539" instrument_node=""> &nbsp;</span><br data-dcnode-id="1538"><span data-dcnode-id="1537" instrument_node=""> Please also see the resources below in case they will be helpful to you.</span><br data-dcnode-id="1536"><span data-dcnode-id="1535" instrument_node=""> &nbsp;</span><br data-dcnode-id="1534"><span data-dcnode-id="1533" instrument_node=""> From our beginning, we have supported charities that really help these cancer patients.</span></p><p data-dcnode-id="1502"><span data-dcnode-id="1531" instrument_node="">Cancer Crackdown is so awesome and helps patients without a lot of money get supplements and treatments and even helps them raise money:</span><br data-dcnode-id="1530"><span data-dcnode-id="1529" instrument_node=""> </span><a data-dcnode-id="1527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cancercrackdown.org/" rel="nofollow"><span data-dcnode-id="1528" instrument_node="">http://cancercrackdown.org/</span></a><br data-dcnode-id="1526"><span data-dcnode-id="1525" instrument_node=""> </span><a data-dcnode-id="1523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/CancerCrackdown" rel="nofollow"><span data-dcnode-id="1524" instrument_node="">https://www.facebook.com/CancerCrackdown</span></a><br data-dcnode-id="1522"><span data-dcnode-id="1521" instrument_node=""> &nbsp;</span><br data-dcnode-id="1520"><span data-dcnode-id="1519" instrument_node=""> Also, the Independent Cancer Research Foundation is another charity that we support, also known as Cancer Tutor. They have been a TREMENDOUS help for cancer patients and have a TON of life-saving information they give out freely and they do real research into treatments for cancer that are outside of the toxic Big Pharma Big 3:</span><br data-dcnode-id="1518"><span data-dcnode-id="1517" instrument_node=""> </span><a data-dcnode-id="1515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thetruthaboutcancer.com/independent-cancer-research-foundation/" rel="nofollow"><span data-dcnode-id="1516" instrument_node="">https://thetruthaboutcancer.com/independent-cancer-research-foundation/</span></a><br data-dcnode-id="1514"><span data-dcnode-id="1513" instrument_node=""> &nbsp;</span><br data-dcnode-id="1512"><span data-dcnode-id="1511" instrument_node=""> The best that we can suggest is to contact Healing Strong and Cancer Crackdown for any need in financial resources.&nbsp;</span><br data-dcnode-id="1510"><span data-dcnode-id="1509" instrument_node=""> &nbsp;</span><br data-dcnode-id="1508"><span data-dcnode-id="1507" instrument_node=""> We also support Mary Beth’s “Nick Gonzalez Foundation” which is bringing Nick’s protocol to the people…which is one of the most powerful cancer-killing protocols out there.</span><br data-dcnode-id="1506"><span data-dcnode-id="1505" instrument_node=""> &nbsp;</span><br data-dcnode-id="1504"><span data-dcnode-id="1503" instrument_node=""> I hope this is helpful! Please don’t hesitate to reach out to us again if there’s anything else we can help with.</span></p><p data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Wishing you endless blessings and love!</span></p></div><div class="comment-reply" data-dcnode-id="1496"><a aria-label="Reply to Customer Support" class="comment-reply-link" data-dcnode-id="1497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/VB5nYLrPNRs%23comment-147968" onclick="return addComment.moveForm( &quot;comment-147968&quot;, &quot;147968&quot;, &quot;respond&quot;, &quot;15030&quot; )" rel="nofollow"><span data-dcnode-id="1498" instrument_node="">Reply</span></a></div></article></li></ul></li><li class="comment even thread-odd thread-alt depth-1" data-dcnode-id="1356" id="comment-155608"><article data-dcnode-id="1471" itemprop="comment" itemscope="" itemtype="https://schema.org/Comment"><header class="comment-header" data-dcnode-id="1478"><p class="comment-author" data-dcnode-id="1483" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="1491" instrument_node=""> </span><img alt="" class="avatar avatar-48wp-user-avatar wp-user-avatar-48 alignnone photo avatar-default" data-dcnode-id="1490" height="48" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.g wn" rel="nofollow"><span data-dcnode-id="1388" instrument_node="">https://www.facebook.com/CancerCrackdown</span></a><br data-dcnode-id="1386"><span data-dcnode-id="1385" instrument_node=""> &nbsp;</span><br data-dcnode-id="1384"><span data-dcnode-id="1383" instrument_node=""> Also, the Independent Cancer Research Foundation is another charity that we support, also known as Cancer Tutor. They have been a TREMENDOUS help for cancer patients and have a TON of life-saving information they give out freely and they do real research into treatments for cancer that are outside of the toxic Big Pharma Big 3:</span><br data-dcnode-id="1382"><span data-dcnode-id="1381" instrument_node=""> </span><a data-dcnode-id="1379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thetruthaboutcancer.com/independent-cancer-research-foundation/" rel="nofollow"><span data-dcnode-id="1380" instrument_node="">https://thetruthaboutcancer.com/independent-cancer-research-foundation/</span></a><br data-dcnode-id="1378"><span data-dcnode-id="1377" instrument_node=""> &nbsp;</span><br data-dcnode-id="1376"><span data-dcnode-id="1375" instrument_node=""> We suggest contacting Cancer Crackdown for any need in financial resources.&nbsp;</span><br data-dcnode-id="1374"><span data-dcnode-id="1373" instrument_node=""> &nbsp;</span><br data-dcnode-id="1372"><span data-dcnode-id="1371" instrument_node=""> We also support Mary Beth’s “Nick Gonzalez Foundation” which is bringing Nick’s protocol to the people…which is one of the most powerful cancer-killing protocols out there.</span><br data-dcnode-id="1370"><span data-dcnode-id="1369" instrument_node=""> &nbsp;</span><br data-dcnode-id="1368"><span data-dcnode-id="1367" instrument_node=""> I hope this is helpful! Please don’t hesitate to reach out to us again if there’s anything else we can help with.</span></p><p data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">Wishing you endless blessings and love!</span></p binoids as antioxidants and neuroprotectants. Most people would simply refer to this as medical marijuana. Who got that patent? The US government gave this patent to itself.</span></p><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Jul 19, 2012 What Happened When Portugal Decriminalized *ALL* Drugs?</span></p><p data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Portugal became the first European nation to take the brave step of decriminalizing possession of all drugs within its borders—from marijuana to heroin, and everything in between.</span></p><p data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">There are no less than *SIX MAJOR INDUSTRIES* whose income is threatened by cannabis legalization</span></p><p data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">✓ Cancer Treatment Industry</span></p><p data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">✓ Biotech Industry</span></p><p data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">✓ Prison Industry</span></p><p data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">✓ Asset seizure &amp; Forfeiture Industry</span></p><p data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">✓ Alcohol Industry</span></p><p data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">✓ Pharmaceutical Industry</span></p><p data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Cannabis suppression is about *CONTROL* and comes from the industries affected or potentially affected. Any one by itself has the lobbying power to perpetuate suppression and keep it illegal. I doubt the coffee industry is worried about it.</span></p></div><div class="comment-reply" data-dcnode-id="833"><a aria-label="Reply to Brian James" class="comment-reply-link" data-dcnode-id="834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/VB5nYLrPNRs%23comment-183216" onclick="return addComment.moveForm( &quot;comment-183216&quot;, &quot;183216&quot;, &quot;respond&quot;, &quot;15030&quot; )" rel="nofollow"><span data-dcnode-id="835" instrument_node="">Reply</span></a></div></article></li><li class="comment even thread-odd thread-alt depth-1" data-dcnode-id="809" id="comment-184332"><article data-dcnode-id="810" itemprop="comment" itemscope="" itemtype="https://schema.org/Comment"><header class="comment-header" data-dcnode-id="817"><p class="comment-author" data-dcnode-id="822" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="830" instrument_node=""> </span><img alt="" class="avatar avatar-48wp-user-avatar wp-user-avatar-48 alignnone photo avatar-default" data-dcnode-id="829" height="48" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/92e758be8482b45edfe80f27a5169591%3Fs%3D48%26d%3Dmm%26r%3Dg&amp;raw" width="48"><span data-dcnode-id="826" itemprop="name"><a class="comment-author-link" data-dcnode-id="827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//The%2520truth%2520about%2520cancer/cannabis-and-cancer" itemprop="url" rel="external nofollow"><span data-dcnode-id="828" instrument_node="">Tony Wyllie</span></a></span><span data-dcnode-id="825" instrument_node=""> </span><span class="says" data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">says</span></span></p><p class="comment-meta" data-dcnode-id="818"><time class="comment-time" data-dcnode-id="819" datetime="2020-07-27T04:39:53+00:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="820" href="#comment-184332" itemprop="url"><span data-dcnode-id="821" instrument_node="">July 27, 2020 at 4:39 AM</span></a></time></p></header><div class="comment-content" data-dcnode-id="814" itemprop="text"><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">I have stage 4 cancer, primary source stomach cancer that has spread to
