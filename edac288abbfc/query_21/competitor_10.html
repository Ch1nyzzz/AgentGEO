</span><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Ten years ago, if you had heard the word cannabis, you may have had a preconceived notion in your head who might be using this crazy plant. Maybe the vivid picture in your head was of Cheech and Chong in a cloud of smoke hanging out with Willie Nelson passing the symbolic joint around.&nbsp;</span></p><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">However, in today’s society, cannabis has lost a lot of the stigma surrounding it for decades. When you hear that same word, cannabis, you may think of CBD; maybe even medical marijuana crosses your mind. CBD is legalized nationwide, and the use of medicinal marijuana is not far behind. The marijuana industry is currently taking the world by storm, and we have more information available to us than there ever was.&nbsp;&nbsp;</span></p><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Cannabis has been used in traditional eastern medicine for almost 5000 years. It is regaining its popularity in natural medicine mainly because of advocates toting the medical benefits, and current research is promising. Cannabis might also have a place and be a piece of the puzzle in the fight against cancer.&nbsp; We will break everything down from the lingo, Rick Simpson Oil, to what the science is currently saying.&nbsp;</span></p><span data-dcnode-id="978" instrument_node="">
</span><h2 data-dcnode-id="975"><strong data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">Cannabis 101: CBD, THC, and Hemp</span></strong></h2><div class="h2-content-anchor" data-dcnode-id="974" id="cannabis-101-cbd-thc-and-hemp"></div><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Hemp, THC, CBD, strains, and hybrids are enough verbiage to make any sane person's head spin. We have you covered and will give you the 101 on the basics.&nbsp;&nbsp;</span></p><span data-dcnode-id="970" instrument_node="">
</span><p data-dcnode-id="965"><span data-dcnode-id="969" instrument_node="">The cannabis plant comes from the genus </span><em data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">Cannabis</span></em><span data-dcnode-id="966" instrument_node="">. All living things fall under taxonomy, which is made up of; kingdom, phylum, class, order, family, genus, species. Got it? Good (if not keep reading, it will make sense later).</span></p><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Three species make up the cannabis plant: [1]</span></p><span data-dcnode-id="961" instrument_node="">
</span><ul data-dcnode-id="954"><li data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">Indica (known for full-body effects including increasing deep relaxation)&nbsp;</span></li><li data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Sativa (known for its energizing effects)&nbsp;</span></li><li data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Ruderalis</span></li></ul><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">The species Indica and Sativa, along with their hybrids (crossbreeds of both species), make up the typical products you will see for medicinal and recreational uses. Some popular hybrids include Pineapple Express, Kandy Kush, and Blue Dream.&nbsp;</span></p><span data-dcnode-id="950" instrument_node="">
</span><p data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">The species Ruderalis is the weed of the weed family. It is a ruderal species, which means you would typically see in the wild and is naturally low in cannabinoids. [1]</span></p><span data-dcnode-id="947" instrument_node="">
</span><p data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">Now you’re probably thinking, “Ok, so what is a cannabinoid?” Cannabinoids are chemical compounds found in the cannabis plant that act on the endocannabinoid receptors throughout your body.&nbsp;</span></p><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Two of the most known cannabinoids are Delta-9 Tetrahydrocannabinol (THC) and Cannabidiol (CBD). THC is the cannabinoid that is the main psychoactive component in marijuana that gets people “high,” and CBD does not. So far, experts have found 113 different cannabinoids within the cannabis plant, which each cannabinoid having a different effect.&nbsp;&nbsp;</span></p><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Your endocannabinoid system (ESC) hosts your endocannabinoid receptors and is very complicated.&nbsp; Experts think the endocannabinoid system is believed to be the main component of keeping your body in homeostasis and is linked to the following functions: [2-3]&nbsp;</span></p><span data-dcnode-id="938" instrument_node="">
</span><ul data-dcnode-id="907"><li data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">appetite and digestion</span></li><li data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">metabolism&nbsp;</span></li><li data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">chronic pain</span></li><li data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">inflammation and other immune system responses</span></li><li data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">mood&nbsp;</span></li><li data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">learning and memory&nbsp;</span></li><li data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">motor control</span></li><li data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">sleep</span></li><li data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">cardiovascular system function&nbsp;</span></li><li data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">muscle formation&nbsp;</span></li><li data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">bone remodeling and growth</span></li><li data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">liver function</span></li><li data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">reproductive system function</span></li><li data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">stress</span></li><li data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">skin and nerve function&nbsp;</span></li></ul><span data-dcnode-id="906" instrument_node="">
</span><p data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">Your body possesses an endocannabinoid system even if you do not use cannabis.&nbsp;</span></p><span data-dcnode-id="903" instrument_node="">
</span><h2 data-dcnode-id="900"><strong data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">CBD oil vs. Hemp oil&nbsp;</span></strong></h2><div class="h2-content-anchor" data-dcnode-id="899" id="cbd-oil-vs-hemp-oil"></div><span data-dcnode-id="898" instrument_node="">
</span><p data-dcnode-id="894"><a class="pretty-link-keyword" data-dcnode-id="896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancertutor.com/recommends/OrganicHempOil" rel="nofollow" target="_blank" title="Organic Hemp Oil"><span data-dcnode-id="897" instrument_node="">Hemp oil</span></a><span data-dcnode-id="895" instrument_node=""> and CBD oil are, in fact, not the same, it's like comparing apples to oranges. Why does that matter? If you have cancer or are looking to take CBD oil for medicinal uses and you happen to search for hemp, you may find some very outdated information or possibly the wrong products. There are hundreds of old articles that refer to CBD oil as hemp oil. This is because of the lack of education in the past.&nbsp;&nbsp;</span></p><span data-dcnode-id="893" instrument_node="">
</span><figure class="wp-block-embed-wordpress wp-block-embed is-type-wp-embed is-provider-cancer-tutor" data-dcnode-id="760"><div class="wp-block-embed__wrapper" data-dcnode-id="761"><span data-dcnode-id="892" instrument_node="">

</span></div></figure><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">In 2018 The Farm Bill passed legalizing CBD; hemp, however, has been used in everyday products for decades. With both products being closely related, they are regularly compared side by side, and it’s no wonder they are often confused. Both hemp oil and CBD oil come from the cannabis plant, and both come from the same species (Indica). However, they come from different strains. Hemp plants are naturally low in cannabinoids with 0.3% or lower THC and 3.5% or lower CBD.</span></p><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">However, CBD oil can have a wide range of cannabinoids with THC content varying and as much as 20% CBD content.&nbsp; Hemp oil is also produced from the hemp seeds, while CBD oil is produced from the flower. [1]</span></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">The everyday uses for hemp and CBD are also drastically different. People typically use CBD oil for its medicinal purposes because of the active cannabinoids that it possesses (CBD and THC). Hemp oil is often used as a food product like olive oil or coconut oil and is high in vitamins and minerals. It is also used for industrial purposes and can be found in shampoos, soaps, lotions, fuel, paint, and plastics. [1]&nbsp;</span></p><span data-dcnode-id="750" instrument_node="">
</span><h2 data-dcnode-id="747"><strong data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Rick Simpson Oil</span></strong></h2><div class="h2-content-anchor" data-dcnode-id="746" id="rick-simpson-oil"></div><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">If you have ever looked into cannabis for medicinal purposes, chances are you may have heard of Rick Simpson Oil or RSO for short.&nbsp;</span></p><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Rick Simpson is a Canadian marijuana activist and engineer. In 1977 while working in a hospital broiler room, he fell off his ladder and hit his head. He lost consciousness, and when he woke up, his coworkers took him to the ER. This accident caused him years of dizzy spells and ringing in his ears. His doctors had prescribed him various medications, none of which help his symptoms, with some only making them worse.&nbsp;</span></p><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">He had later stumbled upon a documentary highlighting the different benefits of medical cannabis and decided to give it a try. He first approached his doctor to get a prescription, which was prompted with a hard “No.” Only then, he decided to source it on his own and saw a significant improvement to his ailments, which he claimed had dissipated. [4]&nbsp;</span></p><span data-dcnode-id="736" instrument_node="">
</span><p data-dcnode-id="729"><span data-dcnode-id="735" instrument_node="">Then in 2003, Rick was diagnosed with basal cell carcinoma, a form of skin cancer. He did some research and found a published study from 1975 that tested mice with </span><span class="word-tooltip" data-dcnode-id="731"><span data-dcnode-id="734" instrument_node="">adenocarcinoma</span><span class="word-definition" data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Cancer that begins in glandular (secretory) cells. Most cancers of the breast, pancreas, lung, prostate, and colon are adenocarcinomas.</span></span></span><span data-dcnode-id="730" instrument_node=""> (lung cancer) and the effects that THC had on cancer. The study resulted in a tumor reduction after a 20-day oral administration of THC. [5]&nbsp;</span></p><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">That is when Simpson created the cannabis oil concentrate, now known as Rick Simpson Oil, and started applying it to his cancerous spots topically. He claims that after only four days of topical use, the cancerous spots had gone away.&nbsp;</span></p><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="724" instrument_node="">Simpson states on his website that he does not sell RSO because of complications with legality issues and recommends users make their own. [6] The main component that makes the RSO different from other cannabis oils is that it contains a higher level of tetrahydrocannabinol (THC) than other medical cannabis extracts.&nbsp; According to Simpson, to make the oil correctly, you have to use cannabis from the </span><em data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Cannabis Indica </span></em><span data-dcnode-id="721" instrument_node="">strains, to produce a more sedative and relaxed state that helps the body heal.</span></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">RSO advocates also claim it can help treat cancer and treat other conditions such as:</span></p><span data-dcnode-id="716" instrument_node="">
</span><ul data-dcnode-id="699"><li data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">multiple sclerosis</span></li><li data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">high blood pressure</span></li><li data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">inflammation&nbsp;</span></li><li data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">infections</span></li><li data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">depression</span></li><li data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">arthritis&nbsp;</span></li><li data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">asthma</span></li><li data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">drug addiction&nbsp;</span></li></ul><span data-dcnode-id="698" instrument_node="">
</span><h2 data-dcnode-id="695"><strong data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Cancer and cannabis: What does current research say?</span></strong></h2><div class="h2-content-anchor" data-dcnode-id="694" id="cancer-and-cannabis-what-does-current-research-say"></div><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">While there is a lack of research on Rick Simpson Oil, there are plenty of preclinical studies (test tube and animal) that have been done on cannabinoids. There is still a lack and a need for clinical studies, but with the mild and temporary side effects of THC, and the legal and social complications, it is hard to use in a medical setting.&nbsp;</span></p><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="678"><span data-dcnode-id="689" instrument_node="">An increasing amount of preclinical studies show that THC and other cannabinoids inhibit the proliferation and growth of cancerous cells. </span><span class="word-tooltip" data-dcnode-id="685"><span data-dcnode-id="688" instrument_node="">In vitro</span><span class="word-definition" data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">This means "outside the body" – or in the laboratory.</span></span></span><span data-dcnode-id="684" instrument_node=""> and </span><span class="word-tooltip" data-dcnode-id="680"><span data-dcnode-id="683" instrument_node="">in vivo</span><span class="word-definition" data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">This means "in the body."</span></span></span><span data-dcnode-id="679" instrument_node=""> animal studies have shown a selective anti-cancer activity in a wide range of cancer cell lines including, leukemia, lymphoma, prostate, breast, cervical, colon, and brain cancers. [7]</span></p><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Alas, there are always contradicting studies; in 2004, a test-tube study showed cannabinoids accelerated cancerous growth in glioblastoma and lung carcinoma. [8]&nbsp;</span></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="667"><span data-dcnode-id="673" instrument_node="">With cancer, some patients experience debilitating side effects, including pain, nausea, loss of appetite, </span><span class="word-tooltip" data-dcnode-id="669"><span data-dcnode-id="672" instrument_node="">cachexia</span><span class="word-definition" data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Weakness and wasting of the body due to severe chronic illness, also known as Wasting Syndrome, is a sign of diseases, such as advanced chronic obstructive pulmonary disease (COPD), AIDS, cancer, or heart failure.</span></span></span><span data-dcnode-id="668" instrument_node="">, and unfortunately, there can be a laundry list of other possible other cancer-related symptoms. Symptoms could be from cancer itself or side effects from prescription drugs and other therapies.</span></p><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">According to research, between 50%-80% of cancer patients have some form of cachexia and is responsible for 25% of cancer-related deaths. [9] Many times, cachexia is undertreated and undiagnosed. Cachexia symptoms can include weight loss, lack of appetite, muscle loss, decreased strength, and fatigue.&nbsp;&nbsp;</span></p><span data-dcnode-id="663" instrument_node="">
</span><p data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Research shows that cannabis has the potential to improve body weight, body fat, improve appetite, and mood. [9] More specific clinical research needs to be done, but it may be another tool to help patients who suffer from cachexia or other related symptoms.&nbsp;&nbsp;</span></p><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">There is also evidence that cannabinoids can support the reduction of inflammation in cancer patients. This is important because 20% of cancer-associated deaths are related to cancer-induced inflammation. [7]</span></p><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Research has only touched the tip of the iceberg when it comes to cannabis and cancer. With the stigma lessening and legislation changing in favor of the legalization of marijuana, the much-needed clinical research will be available.&nbsp;</span></p><span data-dcnode-id="654" instrument_node="">
</span><p data-dcnode-id="647"><span data-dcnode-id="653" instrument_node="">For John and Corinne Malanca finding themselves advocating for medical cannabis was something out of the left field. It all began in 2011 when Corinne’s father (77 years old) had Stage IV lung cancer with </span><span class="word-tooltip" data-dcnode-id="649"><span data-dcnode-id="652" instrument_node="">metastasis</span><span class="word-definition" data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">The spread of cancer cells from the place where they first formed to another part of the body. In metastasis, cancer cells break away from the original (primary) tumor, travel through the blood or lymph system, and form a new tumor in other organs or tissues of the body. The new, metastatic tumor is the same type of cancer as the primary tumor. For example, if breast cancer spreads to the lung, the cancer cells in the lung are breast cancer cells, not lung cancer cells.</span></span></span><span data-dcnode-id="648" instrument_node=""> to the brain. He was malnourished, on oxygen, declining rapidly, and only had weeks to live.</span></p><span data-dcnode-id="646" instrument_node="">
</span><p data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">John had recently heard about medical marijuana and reluctantly brought the subject up to their physician. With what John describes as trial and error (or lack of error), they blindly researched and found the information and products they would use.</span></p><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">2011 was still a time when marijuana of any form was widely frowned upon. They initially used a raw Indica cannabis with a coconut oil base, in a pill form with a low content THC and a high CBD content. Within 24 hours, their father was eating again, and remarkably after day eight; he was out of bed without his oxygen.</span></p><span data-dcnode-id="640" instrument_node="">
</span><p data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">John jokes and remembers telling his father-in-law not to be “too cocky.” They were thrilled with the results they witnessed. After six months, he was released from hospice. They then switched him to a higher THC content but ended up giving it to him at night to help him sleep through any side effects the THC might render.</span></p><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">At the nine months scan, they got the news that every cancer patient wants to hear. He no longer showed evidence of recurrent disease and was cancer-free. To this day, his father in law is still alive and living cancer-free.</span></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Corinne and John decided that they needed to help and educate others on cannabis. They founded The United Patients Group to help educate patients, doctors, and pharmacists on cannabis. They were the first cannabis organization to be asked by the government to speak at the capital during a United Patients Group day of education event.</span></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Currently, they are partnering with pharmacy and nursing schools to help further education on the subject. John always shares with people that he doesn't want to give any false hope and that this is not a cure-all.</span></p><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Unfortunately, Corinne passed away in 2017, four months after being diagnosed with pancreatic cancer. John has seen the plant work in some cases and not in others. This is his passion, and he continues to help further research and educate others through his organization.&nbsp;&nbsp;</span></p><span data-dcnode-id="625" instrument_node="">
</span><h2 data-dcnode-id="622"><strong data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Side effects and risks of RSO</span></strong></h2><div class="h2-content-anchor" data-dcnode-id="621" id="side-effects-and-risks-of-rso"></div><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">Since there is a high content of THC in RSO, there are some side effects that should be noted. THC is the primary psychoactive substance that gives people the “high” that people associate with the use of marijuana, and some people are more sensitive to THC than others. Like drinking alcohol, you should not operate machinery when you are using RSO, THC can cause temporary mental impairment. Some other side effects include:</span></p><span data-dcnode-id="617" instrument_node="">
</span><ul data-dcnode-id="596"><li data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">paranoia and anxiety&nbsp;</span></li><li data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">dry mouth (aka “cottonmouth”)&nbsp;</span></li><li data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">red eyes</span></li><li data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">impaired memory&nbsp;</span></li><li data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">increased hunger (aka “the munchies”)&nbsp;</span></li><li data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">lethargy and sleepiness</span></li><li data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">dizziness</span></li><li data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">low blood pressured</span></li><li data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">disorientation</span></li><li data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">impaired motor control and reaction time</span></li></ul><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">This list of side effects is typically only temporary and should last only a few hours after the THC leaves the body.&nbsp;</span></p><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">There is no clinical evidence that shows Rick Simpson Oil can cure cancer. The most significant risks that are associated with RSO is the actual production itself. When creating the oil, the process involves using solvents, and an open spark could easily cause an explosion.</span></p><span data-dcnode-id="589" instrument_node="">
</span><p data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Furthermore, the solvents can leave behind cancer-causing residue if they are not appropriately handled. Some local dispensaries sell RSO, and you may consider buying a premade RSO if available.&nbsp;</span></p><span data-dcnode-id="586" instrument_node="">
</span><h2 data-dcnode-id="583"><strong data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">FAQ’s&nbsp;</span></strong></h2><div class="h2-content-anchor" data-dcnode-id="582" id="faqs"></div><span data-dcnode-id="581" instrument_node="">
</span><div class="schema-faq wp-block-yoast-faq-block" data-dcnode-id="542"><div class="schema-faq-section" data-dcnode-id="573" id="faq-question-1597687634122"><strong class="schema-faq-question" data-dcnode-id="578"><strong data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">What is Rick Simpson Oil?</span></strong></strong><span data-dcnode-id="577" instrument_node=""> </span><p class="schema-faq-answer" data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">RSO is a cannabis concentrate that advocates claim can cure cancer.</span></p><span data-dcnode-id="574" instrument_node=""> </span></div><span data-dcnode-id="572" instrument_node=""> </span><div class="schema-faq-section" data-dcnode-id="563" id="faq-question-1597687615044"><strong class="schema-faq-question" data-dcnode-id="568"><strong data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Will cannabis or Rick Simpson Oil cure cancer</span></strong><span data-dcnode-id="569" instrument_node="">?</span></strong><span data-dcnode-id="567" instrument_node=""> </span><p class="schema-faq-answer" data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">There is not enough clinical evidence at this point to definitively say cannabis can cure cancer.&nbsp;</span></p><span data-dcnode-id="564" instrument_node=""> </span></div><span data-dcnode-id="562" instrument_node=""> </span><div class="schema-faq-section" data-dcnode-id="553" id="faq-question-1597687649151"><strong class="schema-faq-question" data-dcnode-id="558"><strong data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Will RSO get me “high</span></strong><span data-dcnode-id="559" instrument_node="">?”</span></strong><span data-dcnode-id="557" instrument_node=""> </span><p class="schema-faq-answer" data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Since the THC content of RSO is high, it will give you that “high” feeling</span></p><span data-dcnode-id="554" instrument_node=""> </span></div><span data-dcnode-id="552" instrument_node=""> </span><div class="schema-faq-section" data-dcnode-id="544" id="faq-question-1597687677558"><strong class="schema-faq-question" data-dcnode-id="549"><strong data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Is CBD and hemp oil the same?</span></strong></strong><span data-dcnode-id="548" instrument_node=""> </span><p class="schema-faq-answer" data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">No, CBD and hemp oil are vastly different substances. CBD is typically used for its medicinal purposes, and hemp generally is used in food products and for its industrial purposes.</span></p><span data-dcnode-id="545" instrument_node=""> </span></div><span data-dcnode-id="543" instrument_node=""> </span></div><span data-dcnode-id="541" instrument_node="">
