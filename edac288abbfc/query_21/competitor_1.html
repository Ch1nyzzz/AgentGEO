</span><a data-dcnode-id="845" href="#the-bottom-line-on-cannabis-and-cancer"><span data-dcnode-id="846" instrument_node="">The bottom line on cannabis and cancer</span></a><span data-dcnode-id="844" instrument_node="">

</span><span class="title" data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Was this article helpful?</span></span><span data-dcnode-id="834" instrument_node="">
</span><a class="btn survey" data-dcnode-id="832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//weedmaps.az1.qualtrics.com/jfe/form/SV_5cO4ZFOJNa7kb9H" target="_blank"><span data-dcnode-id="833" instrument_node="">Give Feedback</span></a><span data-dcnode-id="831" instrument_node="">

</span></aside><span data-dcnode-id="826" instrument_node="">
</span><div class="wm-article-content" data-dcnode-id="672"><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Every year, nearly 2 million people in the United States are diagnosed with some form of cancer. As challenging to treat as it is common to diagnose, cancer can occur anywhere in the body but most often affects the breasts, lungs, and colon.&nbsp;</span></p><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="817"><span data-dcnode-id="821" instrument_node="">Medical cannabis has emerged as an alternative treatment option for a number of </span><a aria-label="(opens in a new tab)" data-dcnode-id="819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//weedmaps.com/news/2019/09/cannabis-and-parkinsons-disease/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="820" instrument_node="">ailments including Parkinson's disease</span></a><span data-dcnode-id="818" instrument_node=""> and diabetes. Can marijuana help treat a disease as complex as cancer? In this article, we'll examine the current research on cannabis for cancer and hear what the experts have to say.&nbsp;</span></p><span data-dcnode-id="816" instrument_node="">
</span><div class="wm-article-table-of-contents-header-container" data-dcnode-id="811"><h2 class="wm-article-table-of-contents-header" data-dcnode-id="814" id="an-overview-of-the-research"><span data-dcnode-id="815" instrument_node="">
	An overview of the research</span></h2><p data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">The cannabinoids and other compounds found in cannabis have shown to be potentially beneficial in the treatment of cancerous tumors. Both in vitro (petri dish) and in vivo (animal) studies have demonstrated how medicinal cannabis, including whole-plant extract and hemp, may be useful tools in the battle against cancer.&nbsp;</span></p></div><span data-dcnode-id="810" instrument_node="">
</span><span data-dcnode-id="809" instrument_node="">
</span><div class="wm-article-table-of-contents-header-container" data-dcnode-id="771"><h2 class="wm-article-table-of-contents-header" data-dcnode-id="807" id="studies-on-cannabis-and-cancer"><span data-dcnode-id="808" instrument_node="">
	Studies on cannabis and cancer</span></h2><p data-dcnode-id="802"><span data-dcnode-id="806" instrument_node="">One comprehensive 2020 study published in the scientific journal Cancers analyzed the </span><a aria-label="(opens in a new tab)" data-dcnode-id="804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC7409346/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="805" instrument_node="">anti-cancer efficacy of different chemical compounds present in cannabis</span></a><span data-dcnode-id="803" instrument_node="">. These included prominent cannabinoids such as THC and CBD, as well as the lesser-known CBG and CBN, in addition to potent flavonoids and terpenes. The researchers concluded that, while cannabis would not likely succeed as a stand-alone therapy, “...many of the compounds present in cannabis could be part of a therapeutic solution for patients living with and beyond cancer.”</span></p><figure class="wp-block-image" data-dcnode-id="790"><span data-dcnode-id="801" instrument_node=""> </span><a aria-label="(opens in a new tab)" data-dcnode-id="795" data-modal-open="lightbox_992" id="lightbox_992__trigger-A" rel="noopener noreferrer" role="button" tabindex="0" target="_blank"><span data-dcnode-id="800" instrument_node="">
</span><img alt="cannabis and cancer" class="jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="799" data-lazy-loaded="1" loading="eager" sizes="(min-width: 768px) 476px, (min-width: 1218px) 772px, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/weedmaps.com/learn/wp-content/uploads/2020/07/CRTV-2216_News-Science-Research_144.jpg%3Ffit%3D640%252C427%26ssl%3D1&amp;raw" title="Click to see a larger version of the image"><noscript data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">&lt;img src="https://i0.wp.com/weedmaps.com/learn/wp-content/uploads/2020/07/CRTV-2216_News-Science-Research_144.jpg?fit=640%2C427&amp;ssl=1" srcset="https://i0.wp.com/weedmaps.com/learn/wp-content/uploads/2020/07/CRTV-2216_News-Science-Research_144.jpg?w=1600&amp;ssl=1 1600w, https://i0.wp.com/weedmaps.com/learn/wp-content/uploads/2020/07/CRTV-2216_News-Science-Research_144.jpg?resize=300%2C200&amp;ssl=1 300w, https://i0.wp.com/weedmaps.com/learn/wp-content/uploads/2020/07/CRTV-2216_News-Science-Research_144.jpg?resize=1024%2C682&amp;ssl=1 1024w, https://i0.wp.com/weedmaps.com/learn/wp-content/uploads/2020/07/CRTV-2216_News-Science-Research_144.jpg?resize=768%2C512&amp;ssl=1 768w, https://i0.wp.com/weedmaps.com/learn/wp-content/uploads/2020/07/CRTV-2216_News-Science-Research_144.jpg?resize=1536%2C1023&amp;ssl=1 1536w, https://i0.wp.com/weedmaps.com/learn/wp-content/uploads/2020/07/CRTV-2216_News-Science-Research_144.jpg?w=1280&amp;ssl=1 1280w" sizes="(min-width: 768px) 476px, (min-width: 1218px) 772px, 100vw" alt="cannabis and cancer" title="Click to see a larger version of the image"&gt;</span></noscript><span data-dcnode-id="796" instrument_node="">
</span></a><figcaption data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">While cannabis would not likely succeed as a stand-alone therapy, it could be part of a therapeutic solution for patients living with cancer.</span></figcaption><cite data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Photo by: Gina Coleman/Weedmaps</span></cite></figure><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Here are some highlights of the study's findings:</span></p><ul data-dcnode-id="777"><li data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">Linalool, a common terpene in cannabis, was found to reduce the viability of oral cancer cells</span></li><li data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Limonene, another abundant terpene in cannabis, exhibited anti-cancer effects by reducing tumor enlargement and suppressing the growth of bladder and colon cancer cells</span></li><li data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">CBD, a non-intoxicating cannabinoid derived from hemp, inhibited the metastasis of lung cancer cells&nbsp;</span></li><li data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">THC, a psychoactive cannabinoid, decreased the viability of pancreatic cancer cells</span></li><li data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">Dronabinol, a synthetic marijuana-based drug, aided in reducing nausea in patients undergoing chemotherapy while also reducing the viability of leukemia cells</span></li></ul><p data-dcnode-id="772"><span data-dcnode-id="776" instrument_node="">Additional 2020 research published in the International Journal of Molecular Sciences examined the potential </span><a aria-label="(opens in a new tab)" data-dcnode-id="774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/32839414/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="775" instrument_node="">role of cannabinoids in combating melanoma</span></a><span data-dcnode-id="773" instrument_node=""> (skin cancer). Researchers considered the results of six in vivo studies before determining that “...cannabinoids, individually or combined, reduced tumor growth” in addition to inducing the death of melanoma cells.</span></p></div><span data-dcnode-id="770" instrument_node="">
</span><span data-dcnode-id="769" instrument_node="">
</span><span data-dcnode-id="768" instrument_node=""> </span><span data-dcnode-id="767" instrument_node="">
</span><span data-dcnode-id="766" instrument_node="">
</span><span data-dcnode-id="765" instrument_node="">
</span><span data-dcnode-id="764" instrument_node="">
</span><div class="wm-article-table-of-contents-header-container" data-dcnode-id="747"><h2 class="wm-article-table-of-contents-header" data-dcnode-id="762" id="medical-cannabis-patients-share-their-stories"><span data-dcnode-id="763" instrument_node="">
	Medical cannabis patients share their stories</span></h2><p data-dcnode-id="757"><span data-dcnode-id="761" instrument_node="">Singer Olivia Newton-John was </span><a aria-label="(opens in a new tab)" data-dcnode-id="759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medpagetoday.com/blogs/celebritydiagnosis/81740" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="760" instrument_node="">diagnosed with breast cancer in 2013</span></a><span data-dcnode-id="758" instrument_node=""> and has tried several therapies to manage the associated pain. Cannabis medicine is one treatment supplement that has worked well for Newton-John, now 72. She told MedPage Today in 2019, “I really believe cannabis has made a huge difference. If I don't take the drops, I can feel the pain, so I know it's working.”</span></p><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">The pain that Newton-John is referring to stems not only from breast cancer but also from a tumor in her sacrum which left her wheelchair-bound and dependent on morphine. Along with marijuana, Newton-John relies on herbs, hormone suppression therapy, and meditation to manage her pain. She cites her use of cannabis oil as a primary factor in weaning off morphine.</span></p><p data-dcnode-id="750"><span data-dcnode-id="754" instrument_node="">At just 23 years old, Cheyann Shaw was </span><a aria-label="(opens in a new tab)" data-dcnode-id="752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/ovarian-cancer/medical-cannabis-helped-me-beat-cancer%23A-mental-break%2C-as-well-as-a-physical-one" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="753" instrument_node="">diagnosed with stage 4 ovarian cancer</span></a><span data-dcnode-id="751" instrument_node="">. The Florida native has shared her story on social media and on Healthline in a 2019 article titled, “I Tried Medical Cannabis During Chemo, and Here's What Happened.” Shaw wrote, “The world often felt like too much, and my anxiety would kick in. But when I took my THC and CBD pills, both the exhaustion (thanks to sleep) and the anxiety would go away.” Now 26 years old, Shaw is still battling cancer after a period of remission.&nbsp;</span></p><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">It should go without saying that any cancer patient who wishes to use medical cannabis as a supplemental treatment should consult with a qualified physician first.&nbsp;</span></p></div><span data-dcnode-id="746" instrument_node="">
</span><span data-dcnode-id="745" instrument_node="">
</span><span data-dcnode-id="744" instrument_node="">
</span><span data-dcnode-id="743" instrument_node="">
</span><span data-dcnode-id="742" instrument_node="">
</span><div class="wm-article-table-of-contents-header-container" data-dcnode-id="692"><h2 class="wm-article-table-of-contents-header" data-dcnode-id="740" id="what-the-experts-say-about-cannabis-and-cancer"><span data-dcnode-id="741" instrument_node="">
	What the experts say about cannabis and cancer</span></h2><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">Dr. Adie Rae, a neuroscientist and scientific adviser to Weedmaps, reiterated the importance of cancer patients consulting with their physicians. “Clinical studies are complicated. Although cannabis-using cancer patients typically have better outcomes (overall survival and tumors take longer to develop), cannabis has major interactions with the immune system. Most traditional cancer therapies are immuno-modulators. If a patient is on immunomodulatory medications, cannabis could interfere with their effectiveness. So, it's very important to discuss cannabis use with the oncologist.”</span></p><figure class="wp-block-image" data-dcnode-id="726"><span data-dcnode-id="737" instrument_node=""> </span><a aria-label="(opens in a new tab)" data-dcnode-id="731" data-modal-open="lightbox_1770" id="lightbox_1770__trigger-A" rel="noopener noreferrer" role="button" tabindex="0" target="_blank"><span data-dcnode-id="736" instrument_node="">
</span><img alt="cannabis and medication" class="jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="735" data-lazy-loaded="1" loading="eager" sizes="(min-width: 768px) 476px, (min-width: 1218px) 772px, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/weedmaps.com/learn/wp-content/uploads/2020/07/180416_MJDC_RxBottles_33-1-2.jpg%3Ffit%3D640%252C427%26ssl%3D1&amp;raw" title="Click to see a larger version of the image"><noscript data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">&lt;img src="https://i0.wp.com/weedmaps.com/learn/wp-content/uploads/2020/07/180416_MJDC_RxBottles_33-1-2.jpg?fit=640%2C427&amp;ssl=1" srcset="https://i0.wp.com/weedmaps.com/learn/wp-content/uploads/2020/07/180416_MJDC_RxBottles_33-1-2.jpg?w=1600&amp;ssl=1 1600w, https://i0.wp.com/weedmaps.com/learn/wp-content/uploads/2020/07/180416_MJDC_RxBottles_33-1-2.jpg?resize=300%2C200&amp;ssl=1 300w, https://i0.wp.com/weedmaps.com/learn/wp-content/uploads/2020/07/180416_MJDC_RxBottles_33-1-2.jpg?resize=1024%2C682&amp;ssl=1 1024w, https://i0.wp.com/weedmaps.com/learn/wp-content/uploads/2020/07/180416_MJDC_RxBottles_33-1-2.jpg?resize=768%2C512&amp;ssl=1 768w, https://i0.wp.com/weedmaps.com/learn/wp-content/uploads/2020/07/180416_MJDC_RxBottles_33-1-2.jpg?resize=1536%2C1023&amp;ssl=1 1536w, https://i0.wp.com/weedmaps.com/learn/wp-content/uploads/2020/07/180416_MJDC_RxBottles_33-1-2.jpg?w=1280&amp;ssl=1 1280w" sizes="(min-width: 768px) 476px, (min-width: 1218px) 772px, 100vw" alt="cannabis and medication" title="Click to see a larger version of the image"&gt;</span></noscript><span data-dcnode-id="732" instrument_node="">
</span></a><figcaption data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">If a patient is on immunomodulatory medications, cannabis could interfere with their effectiveness.</span></figcaption><cite data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Photo by: Gina Coleman/Weedmaps</span></cite></figure><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Expanding on how medical cannabis could benefit cancer patients, Rae said, “Not all cancers are alike, but many of them do respond to the molecules found in cannabis by one or more key mechanisms (limiting cell size, cell survival, cell proliferation, angiogenesis, metastases, etc).”</span></p><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">In addition, Rae pointed out that medical marijuana can serve as an indirect treatment for the symptoms that cancer patients often experience, which are also symptomatic of many chronic diseases. Some of these symptoms may include:</span></p><ul data-dcnode-id="711"><li data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Pain</span></li><li data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Anxiety</span></li><li data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Sleep issues</span></li><li data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Decreased quality of life</span></li><li data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Chemo-induced problems</span></li></ul><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Rae said, “Chemotherapy often causes nausea, and cannabis is great for chemo-induced nausea and vomiting. Chemo can also cause neuropathy, which is very painful. Cannabis is good for neuropathic pain.”</span></p><figure class="wp-block-image" data-dcnode-id="697"><span data-dcnode-id="708" instrument_node=""> </span><a aria-label="(opens in a new tab)" data-dcnode-id="702" data-modal-open="lightbox_1713" id="lightbox_1713__trigger-A" rel="noopener noreferrer" role="button" tabindex="0" target="_blank"><span data-dcnode-id="707" instrument_node="">
</span><img alt="man smoking joint" class="jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="706" data-lazy-loaded="1" loading="eager" sizes="(min-width: 768px) 476px, (min-width: 1218px) 772px, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/weedmaps.com/learn/wp-content/uploads/2020/07/CRTV-2901_How-to-roll-a-joint_12-2.jpg%3Ffit%3D640%252C360%26ssl%3D1&amp;raw" title="Click to see a larger version of the image"><noscript data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">&lt;img src="https://i0.wp.com/weedmaps.com/learn/wp-content/uploads/2020/07/CRTV-2901_How-to-roll-a-joint_12-2.jpg?fit=640%2C360&amp;ssl=1" srcset="https://i0.wp.com/weedmaps.com/learn/wp-content/uploads/2020/07/CRTV-2901_How-to-roll-a-joint_12-2.jpg?w=1600&amp;ssl=1 1600w, https://i0.wp.com/weedmaps.com/learn/wp-content/uploads/2020/07/CRTV-2901_How-to-roll-a-joint_12-2.jpg?resize=300%2C169&amp;ssl=1 300w, https://i0.wp.com/weedmaps.com/learn/wp-content/uploads/2020/07/CRTV-2901_How-to-roll-a-joint_12-2.jpg?resize=1024%2C576&amp;ssl=1 1024w, https://i0.wp.com/weedmaps.com/learn/wp-content/uploads/2020/07/CRTV-2901_How-to-roll-a-joint_12-2.jpg?resize=768%2C432&amp;ssl=1 768w, https://i0.wp.com/weedmaps.com/learn/wp-content/uploads/2020/07/CRTV-2901_How-to-roll-a-joint_12-2.jpg?resize=1536%2C864&amp;ssl=1 1536w, https://i0.wp.com/weedmaps.com/learn/wp-content/uploads/2020/07/CRTV-2901_How-to-roll-a-joint_12-2.jpg?w=1280&amp;ssl=1 1280w" sizes="(min-width: 768px) 476px, (min-width: 1218px) 772px, 100vw" alt="man smoking joint" title="Click to see a larger version of the image"&gt;</span></noscript><span data-dcnode-id="703" instrument_node="">
</span></a><figcaption data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Tobacco smoking, and co-smoking tobacco and cannabis is definitely associated with lung cancer, but cannabis smoke alone does not appear to cause lung cancer.</span></figcaption><cite data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Photo by: Gina Coleman/Weedmaps</span></cite></figure><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">One question that may concern cancer patients is whether smoking cannabis can cause lung cancer. Vaping has also received a negative reputation in the media, but are the worries based on fact? Rae responded, “Tobacco smoking, and co-smoking tobacco and cannabis is definitely associated with lung cancer, but cannabis smoke alone does not appear to cause lung cancer.”</span></p><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">However, anyone with conditions such as emphysema or chronic bronchitis should refrain from smoking cannabis, regardless of any cancer diagnosis.&nbsp;</span></p></div><span data-dcnode-id="691" instrument_node="">
</span><span data-dcnode-id="690" instrument_node="">

</span><div class="wm-article-table-of-contents-header-container" data-dcnode-id="675"><h2 class="wm-article-table-of-contents-header" data-dcnode-id="678" id="the-bottom-line-on-cannabis-and-cancer"><span data-dcnode-id="679" instrument_node="">
	The bottom line on cannabis and cancer</span></h2><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Medical cannabis has shown to be a helpful supplemental treatment when it comes to managing cancer-related pain and chemotherapy-induced nausea and improving overall quality of life for some patients. Each cancer diagnosis is unique, and patients should discuss the prospect of medical marijuana with their physicians before beginning a regimen.&nbsp;</span></p></div><span data-dcnode-id="674" instrument_node="">
