</span><p data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">Depending on your relationship with the plant or where you went to high school or college (if you remember much from those years), then cannabis may be something of a religion to you. But what do the major world religions actually say about cannabis and should you consider converting?</span></p><span data-dcnode-id="1819" instrument_node="">
</span><span class="c-post-toc__anchor" data-dcnode-id="1818" id="cannabis_from_ancient_times_to_today_"></span><h2 data-dcnode-id="1816" id="h-cannabis-from-ancient-times-to-today"><span data-dcnode-id="1817" instrument_node="">Cannabis from Ancient times to today&nbsp;</span></h2><span data-dcnode-id="1815" instrument_node="">
</span><p data-dcnode-id="1805"><span data-dcnode-id="1814" instrument_node="">The oldest recorded </span><a data-dcnode-id="1812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannigma.com/cannabis-news/modern-cannabis-originated-in-east-asia/"><span data-dcnode-id="1813" instrument_node="">human use of cannabis comes from East Asia</span></a><span data-dcnode-id="1811" instrument_node="">, as far back as the Stone Age in Taiwan. Those findings indicate that cannabis was already being used then to produce hemp fiber, but what about for religious or spiritual purposes in ancient times?</span><span class="easy-footnote-margin-adjust" data-dcnode-id="1810" id="easy-footnote-1-39459"></span><span class="easy-footnote" data-dcnode-id="1806"><a aria-describedby="qtip-0" data-dcnode-id="1807" data-hasqtip="0" href="#easy-footnote-bottom-1-39459" oldtitle="Abel, E. L. Marihuana: The First Twelve Thousand Years. Springer Science &amp;amp; Business Media, 2013." title=""><sup data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">1</span></sup></a></span></p><div class="code-block code-block-1" data-dcnode-id="1797" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1804" instrument_node="">
</span><div class="engver" data-dcnode-id="1798" data-mantis-zone="cannigma_incontent_feb_responsive_728x90_300x250" id="mantis_ad_8"><div data-dcnode-id="1799" style="padding: 0px; margin: 0px; border: 0px; display: inline-block; width: 100%; max-width: 728px;"><div data-dcnode-id="1802" style="height: 0px; overflow: hidden; padding-bottom: 12.3626%;"><iframe data-dcnode-id="1803" style="padding: 0px; margin: 0px; border: 0px; width: 100%; height: 90px;"></iframe></div><img data-dcnode-id="1801" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ecs.mantisadnetwork.com/track/impression%3Fe%3Dp-91b77abd-d7e7-4ad5-8196-e12a05e2049a%26p%3D5fb0ee2a4ef6f80015b62c3b%26q%3D7768d450-dce7-4d5c-9ab0-2ce5c478729e%26b%3D5b15cb4b-d491-41e7-ae95-99d5f87d5ad9%26r%3D7%26c%3D6260549c41b5000018a38cdc&amp;raw" style="display: none !important;"><img data-dcnode-id="1800" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ecs.mantisadnetwork.com/track/visible%3Fe%3Dp-91b77abd-d7e7-4ad5-8196-e12a05e2049a%26p%3D5fb0ee2a4ef6f80015b62c3b%26q%3D7768d450-dce7-4d5c-9ab0-2ce5c478729e%26b%3D5b15cb4b-d491-41e7-ae95-99d5f87d5ad9%26r%3D7%26c%3D6260549c41b5000018a38cdc%26l%3D1&amp;raw" style="display: none !important;"></div></div></div><span data-dcnode-id="1796" instrument_node="">
</span><p data-dcnode-id="1786"><span data-dcnode-id="1795" instrument_node="">In a remote region of western </span><a data-dcnode-id="1793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannigma.com/regulation/cannabis-laws-china/"><span data-dcnode-id="1794" instrument_node="">China</span></a><span data-dcnode-id="1792" instrument_node=""> in 2019, researchers uncovered evidence that smoking cannabis was a central component in burial ceremonies as far back as 500 BCE.</span><span class="easy-footnote-margin-adjust" data-dcnode-id="1791" id="easy-footnote-2-39459"></span><span class="easy-footnote" data-dcnode-id="1787"><a aria-describedby="qtip-1" data-dcnode-id="1788" data-hasqtip="1" href="#easy-footnote-bottom-2-39459" oldtitle="Ren, Meng, et al. “The Origins of Cannabis Smoking: Chemical Residue Evidence from the First Millennium BCE in the Pamirs.” Science Advances, June 2019. world, www.science.org, https://www.science.org/doi/abs/10.1126/sciadv.aaw1391." title=""><sup data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">2</span></sup></a></span></p><span data-dcnode-id="1785" instrument_node="">
</span><p data-dcnode-id="1778"><span data-dcnode-id="1784" instrument_node="">In ancient Greece, the Greek writer Herodotus wrote in the fifth century BCE of residents of the region of Scythia who inhaled the smoke of burning hemp seeds and rejoiced in a sort of ecstatic dance.</span><span class="easy-footnote-margin-adjust" data-dcnode-id="1783" id="easy-footnote-3-39459"></span><span class="easy-footnote" data-dcnode-id="1779"><a aria-describedby="qtip-2" data-dcnode-id="1780" data-hasqtip="2" href="#easy-footnote-bottom-3-39459" oldtitle="The Internet Classics Archive | The History of Herodotus by Herodotus. http://classics.mit.edu/Herodotus/history.4.iv.html. Accessed 3 Sept. 2021." title=""><sup data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">3</span></sup></a></span></p><span data-dcnode-id="1777" instrument_node="">
</span><p data-dcnode-id="1764"><span data-dcnode-id="1776" instrument_node="">Beyond its use as a religious sacrament, cannabis has a long and storied history as a form of medicine in the ancient world. In </span><a data-dcnode-id="1774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannigma.com/history/egypt-has-a-rich-medical-cannabis-history-discover-why/"><span data-dcnode-id="1775" instrument_node="">Egypt</span></a><span data-dcnode-id="1773" instrument_node="">, where it was known as </span><em data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">shemshemet </span></em><span data-dcnode-id="1770" instrument_node="">– cannabis was used in Pharaonic times to treat a variety of illnesses including ailments of the eyes, migraines, and gynecological disorders. And while examining the remains of a mummy dating from around 950 B.C.E scientists found a “significant deposition” of THC, nicotine, and even cocaine in the several internal organs.</span><span class="easy-footnote-margin-adjust" data-dcnode-id="1769" id="easy-footnote-4-39459"></span><span class="easy-footnote" data-dcnode-id="1765"><a aria-describedby="qtip-3" data-dcnode-id="1766" data-hasqtip="3" href="#easy-footnote-bottom-4-39459" oldtitle="Nerlich, A. G., et al. “Extensive Pulmonary Haemorrhage in an Egyptian Mummy.” Virchows Archiv, vol. 427, no. 4, Dec. 1995, pp. 423–29. Springer Link, https://doi.org/10.1007/BF00199392." title=""><sup data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">4</span></sup></a></span></p><span data-dcnode-id="1763" instrument_node="">
</span><p data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">Eastwards across the Nile Delta, cannabis was also in use by ancient Israelites during the Kingdom of Judah around 700 B.C.E. These findings were part of a report by researchers from May, 2020, who described finding cannabis residue at a religious shrine in southern Israel, including THC, CBD, CBN, and a variety of terpenes.&nbsp;</span></p><span data-dcnode-id="1760" instrument_node="">
</span><p data-dcnode-id="1753"><span data-dcnode-id="1759" instrument_node="">The researchers stated that the cannabis was likely used “as a deliberate psychoactive, to stimulate ecstasy as part of cultic ceremonies.”</span><span class="easy-footnote-margin-adjust" data-dcnode-id="1758" id="easy-footnote-5-39459"></span><span class="easy-footnote" data-dcnode-id="1754"><a aria-describedby="qtip-4" data-dcnode-id="1755" data-hasqtip="4" href="#easy-footnote-bottom-5-39459" oldtitle="Arie, Eran, et al. “Cannabis and Frankincense at the Judahite Shrine of Arad.” Tel Aviv, vol. 47, no. 1, Jan. 2020, pp. 5–28. Taylor and Francis+NEJM, https://doi.org/10.1080/03344355.2020.1732046." title=""><sup data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">5</span></sup></a></span></p><span data-dcnode-id="1752" instrument_node="">
</span><p data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">But while archaeological finds and ancient manuscripts provide evidence of the use of cannabis in antiquity, what do the world’s major religions actually say about the plant?</span></p><span data-dcnode-id="1749" instrument_node="">
</span><span class="c-post-toc__anchor" data-dcnode-id="1748" id="what_does_christianity_say_about_cannabis"></span><h2 data-dcnode-id="1746" id="h-what-does-christianity-say-about-cannabis"><span data-dcnode-id="1747" instrument_node="">What does Christianity say about cannabis?</span></h2><span data-dcnode-id="1745" instrument_node="">
</span><p data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">Though the religion is based on the teachings of a man who espoused turning the other cheek and helping your fellow man, Christianity does not actually make any specific mention of cannabis. Nonetheless, it is for the most part spurned by conservative Christian denominations.&nbsp;</span></p><span data-dcnode-id="1742" instrument_node="">
</span><p data-dcnode-id="1737"><span data-dcnode-id="1741" instrument_node="">Case in point, in 2018, the Southern Baptist Convention – a stalwart of evangelical christinaity and the largest protestant denomination in the United States – issued </span><a data-dcnode-id="1739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//erlc.com/resource-library/articles/what-you-should-know-about-the-2018-sbc-state-convention-resolutions/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1740" instrument_node="">a number of resolutions </span></a><span data-dcnode-id="1738" instrument_node="">against cannabis and cannabis legalization.&nbsp;</span></p><span data-dcnode-id="1736" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1731"><figure class="aligncenter size-large" data-dcnode-id="1732"><img alt="17th annual cannabis parade made its way along Broadway to Union Square Park where activists encouraged legalization of marijuana" class="wp-image-39464 lazyload" data-dcnode-id="1735" data-srcset="https://cannigma.imgix.net/2021/09/Activists-and-Christian-evangelists-scaled.jpg?auto=compress%2Cformat&amp;fit=scale&amp;h=683&amp;ixlib=php-3.3.1&amp;q=45&amp;w=1024&amp;wpsize=large" height="1320" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannigma.imgix.net/2021/09/Activists-and-Christian-evangelists-scaled.jpg%3Fauto%3Dcompress%252Cformat%26fit%3Dscale%26h%3D683%26ixlib%3Dphp-3.3.1%26q%3D45%26w%3D1024%26wpsize%3Dlarge&amp;raw" srcset="https://cannigma.imgix.net/2021/09/Activists-and-Christian-evangelists-scaled.jpg?auto=compress%2Cformat&amp;fit=scale&amp;h=683&amp;ixlib=php-3.3.1&amp;q=45&amp;w=1024&amp;wpsize=large" width="1980"><figcaption data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">Activists and Christian evangelists debate at the annual Cannabis parade in New York City (Shutterstock)</span></figcaption></figure></div><span data-dcnode-id="1730" instrument_node="">
</span><p data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">But to what extent is this opposition based on the Christian liturgy?&nbsp;</span></p><span data-dcnode-id="1727" instrument_node="">
</span><p data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">One verse that is commonly cited – and increasingly outdated in the era of legalization – is Romans 13:12, which states “let every soul be subject to the governing authorities. For there is no authority except from God, and the authorities that exist are appointed by God. Therefore whoever resists the authority resists the ordinance of God.”</span></p><span data-dcnode-id="1724" instrument_node="">
</span><p data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">But another verse is not beholden to the shifting sands of secular law. The verse 1 Corinthians 6:19-20 states that “your body is a temple of the Holy Spirit” and calls for believers to “glorify God in your body.”</span></p><span data-dcnode-id="1721" instrument_node="">
</span><p data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">This verse could potentially be seen as an edict to heal and safeguard the body – including with plant-based medicines – but can also be seen as calling for abstinence in the use of mind-altering chemicals and drugs that can potentially harm the body.&nbsp;</span></p><span data-dcnode-id="1718" instrument_node="">
</span><p data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">In Galatians 5:19-21, the scripture lists “the deeds of the flesh” that will keep one from inheriting the kingdom of God, including “drunkenness” and “carousing,” both of which can be interpreted as admonishment of any sort of intoxication, including that provided by high THC cannabis.&nbsp;</span></p><div class="code-block code-block-2" data-dcnode-id="1713" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1715" instrument_node="">
</span><div data-dcnode-id="1714" data-mantis-video=""></div></div><span data-dcnode-id="1712" instrument_node="">
</span><p data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">But if, like in Psalm 104:14-15 God created wine “to gladden the heart of man,” could not the same be said of cannabis?&nbsp;</span></p><span data-dcnode-id="1709" instrument_node="">
</span><p data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">Considering that the overwhelming majority of people in a predominantly Christian country like the US approve of marijuana legalization, a good case can be made for just that.&nbsp;</span></p><span data-dcnode-id="1706" instrument_node="">

</span><span class="c-post-toc__anchor" data-dcnode-id="1645" id="what_does_judaism_say_about_cannabis"></span><h2 data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">What does Judaism say about cannabis?</span></h2><span data-dcnode-id="1642" instrument_node="">
</span><p data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">Very, very early in the Old Testament, God made it clear that he likes to share his herb.&nbsp;</span></p><span data-dcnode-id="1639" instrument_node="">
</span><p data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">Genesis 1:29-30 reads “then God said, “I give you every seed-bearing plant on the face of the whole earth and every tree that has fruit with seed in it. They will be yours for food. And to all the beasts of the earth and all the birds in the sky and all the creatures that move along the ground—everything that has the breath of life in it—I give every green plant for food.”</span></p><span data-dcnode-id="1636" instrument_node="">
</span><p data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">This could be understood to include cannabis, at least in its most natural, unprocessed forms.&nbsp;</span></p><span data-dcnode-id="1633" instrument_node="">
</span><p data-dcnode-id="1622"><span data-dcnode-id="1632" instrument_node="">But cannabis makes much more explicit cameos in the Bible, including in the book of Exodus, where in chapter 30 verse 23, a number of holy anointing oils are described, including a very familiar-sounding one named </span><em data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">kanei bosem</span></em><span data-dcnode-id="1629" instrument_node="">. Literally translated as reed (“</span><em data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">kanei”)</span></em><span data-dcnode-id="1626" instrument_node=""> and fragrant (“</span><em data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">bosem” – </span></em><span data-dcnode-id="1623" instrument_node="">also the word for cologne/perfume in today’s Hebrew), the plant is mentioned in instructions God gives Moses for anointing the Hebrew’s tabernacle.&nbsp;</span></p><span data-dcnode-id="1621" instrument_node="">
</span><p data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">These mentions in the liturgy, along with archaeological finds from the Kingdom of Judah mentioned above provide evidence of an honored place for cannabis in ancient Jewish ritual, but where do things stand in modern times?</span></p><span data-dcnode-id="1618" instrument_node="">
</span><p data-dcnode-id="1613"><span data-dcnode-id="1617" instrument_node="">In Israel today, tens of thousands of people receive legal medical marijuana on a regular basis, and the country has a remarkably vibrant illicit recreational marijuana market. And it would probably not surprise the late former president </span><a data-dcnode-id="1615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//abcnews.go.com/GMA/story%3Fid%3D126236%26page%3D1" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1616" instrument_node="">Richard Nixon </span></a><span data-dcnode-id="1614" instrument_node="">(“every one of the bastards that are out for legalizing marijuana is Jewish. What the Christ is the matter with the Jews”) to know that there are many Jews in the legal cannabis industry today.&nbsp;</span></p><span data-dcnode-id="1612" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1607"><figure class="aligncenter size-large" data-dcnode-id="1608"><img alt="Orthodox hassidic Jews pray in a holiday robe and tallith" class="wp-image-39578 lazyload" data-dcnode-id="1611" data-srcset="https://cannigma.imgix.net/2021/09/shutterstock_725789149.jpg?auto=compress%2Cformat&amp;fit=scale&amp;h=680&amp;ixlib=php-3.3.1&amp;q=45&amp;w=1024&amp;wpsize=large" height="664" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannigma.imgix.net/2021/09/shutterstock_725789149.jpg%3Fauto%3Dcompress%252Cformat%26fit%3Dscale%26h%3D680%26ixlib%3Dphp-3.3.1%26q%3D45%26w%3D1024%26wpsize%3Dlarge&amp;raw" srcset="https://cannigma.imgix.net/2021/09/shutterstock_725789149.jpg?auto=compress%2Cformat&amp;fit=scale&amp;h=680&amp;ixlib=php-3.3.1&amp;q=45&amp;w=1024&amp;wpsize=large" width="1000"><figcaption data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">There is evidence of an honored place for cannabis in ancient Jewish ritual (Shutterstock)</span></figcaption></figure></div><span data-dcnode-id="1606" instrument_node="">
</span><p data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">But what does Jewish law and Jewish religious leaders say?&nbsp;</span></p><span data-dcnode-id="1603" instrument_node="">
</span><p data-dcnode-id="1599"><a data-dcnode-id="1601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.timesofisrael.com/getting-baked-on-passover-not-just-for-matzah-rabbi-rules/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1602" instrument_node="">According to the Times of Israel</span></a><span data-dcnode-id="1600" instrument_node="">, in 2013 Rabbi Efraim Zalmanovich, the rabbi of the Israeli town of Mazkeret Batya said that distributing and using medical marijuana is allowed, but consuming cannabis for fun or “to escape this world” is forbidden.&nbsp;</span></p><div class="code-block code-block-3" data-dcnode-id="1591" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1598" instrument_node="">
</span><div class="engver" data-dcnode-id="1592" data-mantis-zone="cannigma_incontent_may_responsive_728x90_300x250_3rd" id="mantis_ad_7"><div data-dcnode-id="1593" style="padding: 0px; margin: 0px; border: 0px; display: inline-block; width: 100%; max-width: 728px;"><div data-dcnode-id="1596" style="height: 0px; overflow: hidden; padding-bottom: 12.3626%;"><iframe data-dcnode-id="1597" style="padding: 0px; margin: 0px; border: 0px; width: 100%; height: 90px;"></iframe></div><img data-dcnode-id="1595" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ecs.mantisadnetwork.com/track/impression%3Fe%3Dp-91b77abd-d7e7-4ad5-8196-e12a05e2049a%26p%3D5fb0ee2a4ef6f80015b62c3b%26q%3D7768d450-dce7-4d5c-9ab0-2ce5c478729e%26b%3Deb1227a6-da3f-4ebb-a3a7-b228660c5d8e%26r%3D7%26c%3D624232b2b1676e000fd0530f&amp;raw" style="display: none !important;"><img data-dcnode-id="1594" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ecs.mantisadnetwork.com/track/visible%3Fe%3Dp-91b77abd-d7e7-4ad5-8196-e12a05e2049a%26p%3D5fb0ee2a4ef6f80015b62c3b%26q%3D7768d450-dce7-4d5c-9ab0-2ce5c478729e%26b%3Deb1227a6-da3f-4ebb-a3a7-b228660c5d8e%26r%3D7%26c%3D624232b2b1676e000fd0530f%26l%3D1&amp;raw" style="display: none !important;"></div></div></div><span data-dcnode-id="1590" instrument_node="">
</span><p data-dcnode-id="1585"><span data-dcnode-id="1589" instrument_node="">A few years later, no less an authority than Rabbi Chaim Kanievsky, considered the leading authority on Jewish law in the ultra-Orthodoxworld said that cannabis can be consumed over the 8 days of the Passover holiday, when strict dietary laws are in effect. And in</span><a data-dcnode-id="1587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannigma.com/cannabis-news/cannabis-can-be-kosher/"><span data-dcnode-id="1588" instrument_node=""> an interview with The Cannigma</span></a><span data-dcnode-id="1586" instrument_node="">, kosher supervisor Rabbi Yaakov Cohen said that as a plant cannabis is inherently kosher, as long as there are no bugs on the flowers.&nbsp;</span></p><span data-dcnode-id="1584" instrument_node="">
</span><p data-dcnode-id="1579"><span data-dcnode-id="1583" instrument_node="">This doesn’t mean that all observant Jews are on board with cannabis – far from it. Any substance that causes intoxication could prevent someone from fulfilling the </span><em data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">mitzvot </span></em><span data-dcnode-id="1580" instrument_node="">(“commandments’ ‘) required of Judaism, and could distract them from studying torah.</span></p><span data-dcnode-id="1578" instrument_node="">
</span><p data-dcnode-id="1570"><span data-dcnode-id="1577" instrument_node="">In addition, where cannabis is illegal, consuming it could violate the concept of </span><em data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">dina d’malchuta</span></em><span data-dcnode-id="1574" instrument_node="">, </span><a data-dcnode-id="1572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jewishjournal.com/news/united-states/189623/california-may-soon-legalize-pot-jewish-law-say/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1573" instrument_node="">described in the Jewish Journal</span></a><span data-dcnode-id="1571" instrument_node=""> as the concept that Jews should obey secular authorities as well as rabbinical ones.</span></p><span data-dcnode-id="1569" instrument_node="">
</span><p data-dcnode-id="1562"><span data-dcnode-id="1568" instrument_node="">But Judaism is consistent in it’s adherence to tradition and while the legal status of cannabis is changing in countries around the world, there will remain many Jews – observant or otherwise – who will continue to consider it </span><em data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">treifah</span></em><span data-dcnode-id="1565" instrument_node=""> (unkosher/forbidden)</span><em data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">.</span></em></p><div class="code-block code-block-4" data-dcnode-id="1554" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1561" instrument_node="">
</span><div class="engver" data-dcnode-id="1555" data-mantis-zone="cannigma_incontent_may_responsive_728x90_300x250_4th" id="mantis_ad_6"><div data-dcnode-id="1556" style="padding: 0px; margin: 0px; border: 0px; display: inline-block; width: 100%; max-width: 728px;"><div data-dcnode-id="1559" style="height: 0px; overflow: hidden; padding-bottom: 12.3626%;"><iframe data-dcnode-id="1560" style="padding: 0px; margin: 0px; border: 0px; width: 100%; height: 90px;"></iframe></div><img data-dcnode-id="1558" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ecs.mantisadnetwork.com/track/impression%3Fe%3Dp-91b77abd-d7e7-4ad5-8196-e12a05e2049a%26p%3D5fb0ee2a4ef6f80015b62c3b%26q%3D7768d450-dce7-4d5c-9ab0-2ce5c478729e%26b%3D9ca0fa96-ee9a-47cf-9827-015743012610%26r%3D7%26c%3D623a6188468f0d001c1fa28c&amp;raw" style="display: none !important;"><img data-dcnode-id="1557" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ecs.mantisadnetwork.com/track/visible%3Fe%3Dp-91b77abd-d7e7-4ad5-8196-e12a05e2049a%26p%3D5fb0ee2a4ef6f80015b62c3b%26q%3D7768d450-dce7-4d5c-9ab0-2ce5c478729e%26b%3D9ca0fa96-ee9a-47cf-9827-015743012610%26r%3D7%26c%3D623a6188468f0d001c1fa28c%26l%3D1&amp;raw" style="display: none !important;"></div></div></div><span data-dcnode-id="1553" instrument_node="">
</span><span class="c-post-toc__anchor" data-dcnode-id="1552" id="what_does_islam_say_about_cannabis"></span><h2 data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">What does Islam say about cannabis?</span></h2><span data-dcnode-id="1549" instrument_node="">
</span><p data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">Islam’s prohibition on alcohol is very well-known, buit what about cannabis?&nbsp;</span></p><span data-dcnode-id="1546" instrument_node="">
</span><p data-dcnode-id="1541"><span data-dcnode-id="1545" instrument_node="">While cannabis isn’t mentioned in the Quran, the question of whether or not it is </span><em data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">haram</span></em><span data-dcnode-id="1542" instrument_node=""> (forbidden) is still a hot topic.&nbsp;</span></p><span data-dcnode-id="1540" instrument_node="">
</span><p data-dcnode-id="1529"><span data-dcnode-id="1539" instrument_node="">According to </span><a data-dcnode-id="1537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hadithoftheday.com/can-i-smoke-marijuana-is-it-allowed-in-islam/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1538" instrument_node="">a post on</span></a><span data-dcnode-id="1536" instrument_node=""> Hadithoftheday.com, because the use of cannabis is considered potentially harmful to mental and physical health, and cognitive functioning, it is </span><em data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">haram</span></em><span data-dcnode-id="1533" instrument_node="">. The site also quotes verse 2:195 of the Quran, which states “do not put yourselves into destruction, and do good,” as well as the verse from </span><em data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">Sahih Muslim</span></em><span data-dcnode-id="1530" instrument_node=""> that states that “every intoxicant is khamr (wine) and every khamr is ḥaram (prohibited).”</span></p><span data-dcnode-id="1528" instrument_node="">
</span><p data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">But what about if you use cannabis for medical reasons? According to the site, it is only permitted “if there is no other islamically permissible alternative medication to treat the ailment.”&nbsp;</span></p><span data-dcnode-id="1525" instrument_node="">
</span><p data-dcnode-id="1520"><span data-dcnode-id="1524" instrument_node="">Michigan is home to one of America’s most prominent Muslim communities, and is also a state that has legalized medical and recreatonal cannabis. A </span><a data-dcnode-id="1522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arabamericannews.com/2016/04/22/Marijuana-Arab-Smokers-religious-scholars-weigh-in/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1523" instrument_node="">2016 article</span></a><span data-dcnode-id="1521" instrument_node=""> interviewed Muslims in the city of Dearborn, Michigan, – which has the largest proportion of Arab Americans in the United States – and found that the question mainly revolved around the intent of cannabis use.&nbsp;</span></p><span data-dcnode-id="1519" instrument_node="">
</span><p data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">The Dearborn-based Imam Mohammed Elahi is quoted in the piece sas saying that while in general, things that are harmful to the health are haram, “It should be permissible only if that is the only option in a medical condition prescribed by medical experts.”</span></p><span data-dcnode-id="1516" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1511"><figure class="aligncenter size-large" data-dcnode-id="1512"><img alt="Religious muslim man praying with rosary beads" class="wp-image-39583 lazyload" data-dcnode-id="1515" data-srcset="https://cannigma.imgix.net/2021/09/Muslim-countires-scaled.jpg?auto=compress%2Cformat&amp;fit=scale&amp;h=683&amp;ixlib=php-3.3.1&amp;q=45&amp;w=1024&amp;wpsize=large" height="1320" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannigma.imgix.net/2021/09/Muslim-countires-scaled.jpg%3Fauto%3Dcompress%252Cformat%26fit%3Dscale%26h%3D683%26ixlib%3Dphp-3.3.1%26q%3D45%26w%3D1024%26wpsize%3Dlarge&amp;raw" srcset="https://cannigma.imgix.net/2021/09/Muslim-countires-scaled.jpg?auto=compress%2Cformat&amp;fit=scale&amp;h=683&amp;ixlib=php-3.3.1&amp;q=45&amp;w=1024&amp;wpsize=large" width="1980"><figcaption data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">Hashish has been a feature of daily life for countless people in Muslim countries (Shutterstock)</span></figcaption></figure></div><span data-dcnode-id="1510" instrument_node="">
</span><p data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">Another Imam took a different stance, saying that “this permissibility of marijuana being used for medicine has the potential of leading to abuse and the potential of people making money off it.”</span></p><span data-dcnode-id="1507" instrument_node="">
</span><p data-dcnode-id="1498"><a data-dcnode-id="1505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6153265/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1506" instrument_node="">A study</span></a><span data-dcnode-id="1504" instrument_node=""> from 2018 that looked at Islamic attitudes towards cannabis in Iran, a predominantly Shi’a muslim country. The researchers wrote that “Islamic jurisprudence and, especially, shi‘ate jurisprudence has adopted a flexible and open-ended approach, for instance, with regards to cannabis.” They also describe centuries of vibrant debate about cannabis in the Middle East in Iran.</span><span class="easy-footnote-margin-adjust" data-dcnode-id="1503" id="easy-footnote-6-39459"></span><span class="easy-footnote" data-dcnode-id="1499"><a aria-describedby="qtip-5" data-dcnode-id="1500" data-hasqtip="5" href="#easy-footnote-bottom-6-39459" oldtitle="Ghiabi, Maziyar, et al. “Islam and Cannabis: Legalisation and Religious Debate in Iran.” The International Journal on Drug Policy, vol. 56, June 2018, pp. 121–27. PubMed Central, https://doi.org/10.1016/j.drugpo.2018.03.009." title=""><sup data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">6</span></sup></a></span></p><span data-dcnode-id="1497" instrument_node="">
</span><p data-dcnode-id="1489"><span data-dcnode-id="1496" instrument_node="">For centuries, hashish has bene a feature of daily life for countless people in Muslim countries such as Egypt, Morocco, Turkey, Lebanon, Afghanistan, and Iran. Three of those countries – Morocco, Lebanon, and Afghanistan, are among the world’s leading producers and exporters of illicit hash, and both </span><a data-dcnode-id="1494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannigma.com/cannabis-news/morocco-passes-medical-cannabis-legalization-bill/"><span data-dcnode-id="1495" instrument_node="">Morocco</span></a><span data-dcnode-id="1493" instrument_node=""> and </span><a data-dcnode-id="1491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannigma.com/cannabis-news/lebanon-passes-bill-to-legalize-medical-marijuana-cultivation/"><span data-dcnode-id="1492" instrument_node="">Lebanon</span></a><span data-dcnode-id="1490" instrument_node=""> have made big legislative moves towards legalization in the past two years.&nbsp;</span></p><span data-dcnode-id="1488" instrument_node="">
</span><p data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">While religious scholars may disagree about when and how cannabis is allowed, it is clearly part of the history and the fabric of daily life in much of the Islamic world, and is here to stay.&nbsp;</span></p><span data-dcnode-id="1485" instrument_node="">
</span><span class="c-post-toc__anchor" data-dcnode-id="1484" id="rastafarianism_we_have_a_good_idea_what_they_think_of_cannabis_"></span><h2 data-dcnode-id="1480"><span data-dcnode-id="1483" instrument_node="">Rastafarianism – we have a good idea what they think of cannabis</span><strong data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">&nbsp;</span></strong></h2><span data-dcnode-id="1479" instrument_node="">
</span><p data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">There’s a good likelihood that when you think of Rastafarianism you think of ganja, and most adherents of the religion would probably forgive you for that.&nbsp;</span></p><span data-dcnode-id="1476" instrument_node="">
</span><p data-dcnode-id="1471"><span data-dcnode-id="1475" instrument_node="">Ganja is of great religious significance to Rastafarians and is used in meetings and as </span><a data-dcnode-id="1473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/religion/religions/rastafari/customs/customs_1.shtml" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1474" instrument_node="">a communal sacrament</span></a><span data-dcnode-id="1472" instrument_node=""> to provide inspiration and a heightened feeling of togetherness.&nbsp;</span></p><span data-dcnode-id="1470" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1465"><figure class="aligncenter size-large" data-dcnode-id="1466"><img alt="African Rastafarian smokes weed and showing heart symbol and shape with hands" class="wp-image-39472 lazyload" data-dcnode-id="1469" data-srcset="https://cannigma.imgix.net/2021/09/In-some-countries-authorities-scaled.jpg?auto=compress%2Cformat&amp;fit=scale&amp;h=683&amp;ixlib=php-3.3.1&amp;q=45&amp;w=1024&amp;wpsize=large" height="1320" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannigma.imgix.net/2021/09/In-some-countries-authorities-scaled.jpg%3Fauto%3Dcompress%252Cformat%26fit%3Dscale%26h%3D683%26ixlib%3Dphp-3.3.1%26q%3D45%26w%3D1024%26wpsize%3Dlarge&amp;raw" srcset="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAxIDEnPjwvc3ZnPg== 100w" width="1980"><figcaption data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">In some countries authorities have legalized cannabis for use by Rastafairans in their religious practices (Shutterstock)</span></figcaption></figure></div><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1454"><span data-dcnode-id="1463" instrument_node="">As </span><a data-dcnode-id="1461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/242248515_The_significance_of_the_use_of_ganja_as_a_religious_ritual_in_the_Rastafari_movement" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1462" instrument_node="">a 2006 study</span></a><span data-dcnode-id="1460" instrument_node=""> put it, the significance of ganja to Rastafarians “lies in the experience associated with an altered state of consciousness when ganja is used. A spiritual enlightenment or revelation of God is obtained during this altered state of consciousness, that is, a closeness or oneness with Jah.”</span><span class="easy-footnote-margin-adjust" data-dcnode-id="1459" id="easy-footnote-7-39459"></span><span class="easy-footnote" data-dcnode-id="1455"><a aria-describedby="qtip-6" data-dcnode-id="1456" data-hasqtip="6" href="#easy-footnote-bottom-7-39459" oldtitle="Pretorius, S. P. “The Significance of the Use of Ganja as a Religious Ritual in the Rastafari Movement.” Verbum et Ecclesia, vol. 27, no. 3, Sept. 2006, pp. 1012–30. verbumetecclesia.org.za, https://doi.org/10.4102/ve.v27i3.199." title=""><sup data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">7</span></sup></a></span></p><span data-dcnode-id="1453" instrument_node="">
</span><p data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">This intoxication also produces a spiritual/psychological healing or transformation and “seems to bring relief and relaxation on this road to freedom. The use of ganja has a long history as a vehicle to enlightenment, ultimate Rasta salvation and restoration of the self.”</span></p><span data-dcnode-id="1450" instrument_node="">
</span><p data-dcnode-id="1445"><span data-dcnode-id="1449" instrument_node="">Rastafarianism </span><a data-dcnode-id="1447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uri.org/kids/world-religions/rastafarianism" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1448" instrument_node="">is quite new</span></a><span data-dcnode-id="1446" instrument_node="">, and only dates back to the 1930s in Jamaica. It is most associated with Jamaica, though Ethiopia is also a center of the religion (and the country’s former emperor Haile Selassie is seen as a sacred figure in Rastafarianism) and it has many adherents across Africa and the wider African diaspora.&nbsp;</span></p><span data-dcnode-id="1444" instrument_node="">
</span><p data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">In a number of these countries – especially in the Caribbean – the authorities have legalized cannabis for use by Rastafarians in their religious practices.&nbsp;</span></p><span data-dcnode-id="1441" instrument_node="">
</span><span class="c-post-toc__anchor" data-dcnode-id="1440" id="marijuana_in_eastern_religions_buddhism_and_hinduism_"></span><h2 data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">Marijuana in eastern religions – Buddhism and Hinduism&nbsp;</span></h2><span data-dcnode-id="1437" instrument_node="">
</span><p data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">What is the perception of cannabis in its birthplace in the far East? In Buddhism, there is no doctrine that opposes marijuana and none of the strict prohibitions that one may associate with religions like Judaism or Islam.&nbsp;</span></p><span data-dcnode-id="1434" instrument_node="">
</span><p data-dcnode-id="1426"><span data-dcnode-id="1433" instrument_node="">Arguably though, it could potentially conflict with </span><a data-dcnode-id="1431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/sila-Buddhism" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1432" instrument_node="">Sīla</span></a><span data-dcnode-id="1430" instrument_node="">, the five precepts or five rules of training that are central to the Buddhist system of morality. One of these is “refrain from intoxicants that cloud the mind,” which could arguably be construed to include cannabis. Much like how the effects of cannabis could potentially make it more difficult for observant Jews to observe </span><em data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">mitzvot</span></em><span data-dcnode-id="1427" instrument_node="">, it could also in theory make it harder for Buddhists to reach enlightenment.&nbsp;</span></p><span data-dcnode-id="1425" instrument_node="">
</span><p data-dcnode-id="1420"><span data-dcnode-id="1424" instrument_node="">As one respondent on </span><a data-dcnode-id="1422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//newbuddhist.com/discussion/7139/buddhist-views-on-marijuana" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1423" instrument_node="">this Buddhist message board</span></a><span data-dcnode-id="1421" instrument_node=""> explained it, “Buddhism is about getting to the root of suffering and overcoming suffering. weed is putting a happy-faced band-aid on suffering and not having enough concentration to overcome the munchies, let alone suffering.”</span></p><span data-dcnode-id="1419" instrument_node="">
</span><p data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">So not everyone is on board. On the other hand, this would not seem to apply to non-intoxicating cannabinoids like CBD.&nbsp;</span></p><span data-dcnode-id="1416" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1411"><figure class="aligncenter size-large" data-dcnode-id="1412"><img alt="Incense for praying Buddha or Hindu gods to show respect" class="wp-image-39591 lazyload" data-dcnode-id="1415" data-srcset="https://cannigma.imgix.net/2021/09/Ayurvedic-medicine-scaled.jpg?auto=compress%2Cformat&amp;fit=scale&amp;h=683&amp;ixlib=php-3.3.1&amp;q=45&amp;w=1024&amp;wpsize=large" height="1320" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannigma.imgix.net/2021/09/Ayurvedic-medicine-scaled.jpg%3Fauto%3Dcompress%252Cformat%26fit%3Dscale%26h%3D683%26ixlib%3Dphp-3.3.1%26q%3D45%26w%3D1024%26wpsize%3Dlarge&amp;raw" srcset="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAxIDEnPjwvc3ZnPg== 100w" width="1980"><figcaption data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">Cannabis is one of the more well-known remedies in the alternative system of medicine known as Ayurvedic medicine (Shutterstock)
</span></figcaption></figure></div><span data-dcnode-id="1410" instrument_node="">
</span><p data-dcnode-id="1393"><span data-dcnode-id="1409" instrument_node="">Countless followers of Hinduism are familiar with </span><a data-dcnode-id="1406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/travel/article/20170307-the-intoxicating-drug-of-an-indian-god" rel="noreferrer noopener nofollow" target="_blank"><em data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">Bhang</span></em></a><span data-dcnode-id="1405" instrument_node="">, a milk-based drink that includes a mix of cannabis and spices and comes in a wide variety of flavors. Bhang and other forms of cannabis have been used since antiquity as part of </span><a data-dcnode-id="1403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/22742944/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1404" instrument_node="">ritual worship</span></a><span class="easy-footnote-margin-adjust" data-dcnode-id="1402" id="easy-footnote-8-39459"></span><span class="easy-footnote" data-dcnode-id="1398"><a aria-describedby="qtip-7" data-dcnode-id="1399" data-hasqtip="7" href="#easy-footnote-bottom-8-39459" oldtitle="Godlaski, Theodore M. “Shiva, Lord of Bhang.” Substance Use &amp;amp; Misuse, vol. 47, no. 10, Aug. 2012, pp. 1067–72. PubMed, https://doi.org/10.3109/10826084.2012.684308." title=""><sup data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">8</span></sup></a></span><span data-dcnode-id="1397" instrument_node=""> of the god Shiva, who is said to have been an enthusiastic cannabis user. Also, in the collection of sacred Hindu texts known as Atharva Veda, cannabis is </span><a data-dcnode-id="1395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mediaindia.eu/tag/atharva-veda-describes-cannabis-as-one-of-the-five-most-sacred-plants/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1396" instrument_node="">described as</span></a><span data-dcnode-id="1394" instrument_node=""> “one of the five most sacred plants.”&nbsp;</span></p><span data-dcnode-id="1392" instrument_node="">
</span><p data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">In addition, cannabis is one of the more well-known remedies in the alternative system of medicine known as Ayurvedic medicine, which has been practiced for more than 3,000 years.&nbsp;&nbsp;</span></p><span data-dcnode-id="1389" instrument_node="">
</span><span class="c-post-toc__anchor" data-dcnode-id="1388" id="how_cannabis_can_help_with_prayer_"></span><h2 data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">How cannabis can help with prayer&nbsp;</span></h2><span data-dcnode-id="1385" instrument_node="">
</span><p data-dcnode-id="1380"><span data-dcnode-id="1384" instrument_node="">Cannabis can potentially help with a wide variety of spiritual pursuits simply through its ability to cause euphoria and relaxation. By putting the mind at ease (unless you’re the type who gets anxious or paranoid when high), it can help people shut out the concerns of their daily life, and the stress that keeps them from reaching inner peace. This is one of the reasons that many people look to cannabis as </span><a data-dcnode-id="1382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannigma.com/treatment/cannabis-and-meditation-will-it-help-or-harm-your-practice/"><span data-dcnode-id="1383" instrument_node="">a meditation aid</span></a><span data-dcnode-id="1381" instrument_node="">.</span></p><span data-dcnode-id="1379" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1374"><figure class="aligncenter size-large" data-dcnode-id="1375"><img alt="Praying and Praise together at ChurcH" class="wp-image-39468 lazyload" data-dcnode-id="1378" data-srcset="https://cannigma.imgix.net/2021/09/Cannabis-has-the-potential-scaled.jpg?auto=compress%2Cformat&amp;fit=scale&amp;h=576&amp;ixlib=php-3.3.1&amp;q=45&amp;w=1024&amp;wpsize=large" height="1114" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannigma.imgix.net/2021/09/Cannabis-has-the-potential-scaled.jpg%3Fauto%3Dcompress%252Cformat%26fit%3Dscale%26h%3D576%26ixlib%3Dphp-3.3.1%26q%3D45%26w%3D1024%26wpsize%3Dlarge&amp;raw" srcset="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAxIDEnPjwvc3ZnPg== 100w" width="1980"><figcaption data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">Cannabis has the potential to cause relaxation and euphoria (Shutterstock)</span></figcaption></figure></div><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1366"><span data-dcnode-id="1372" instrument_node="">At the same time, while there may not be a causational link, a 2018 study found that adults who more frequently attend religious services show lower rates of cannabis use.</span><span class="easy-footnote-margin-adjust" data-dcnode-id="1371" id="easy-footnote-9-39459"></span><span class="easy-footnote" data-dcnode-id="1367"><a aria-describedby="qtip-8" data-dcnode-id="1368" data-hasqtip="8" href="#easy-footnote-bottom-9-39459" oldtitle="Burdette, Amy M., et al. “Religious Involvement and Marijuana Use for Medical and Recreational Purposes.” Journal of Drug Issues, vol. 48, no. 3, July 2018, pp. 421–34. PubMed Central, https://doi.org/10.1177/0022042618770393." title=""><sup data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">9</span></sup></a></span></p><span data-dcnode-id="1365" instrument_node="">
</span><p data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">Ultimately, while how your religion views cannabis is probably outside of your control, how you responds spirituality to the effects of marijuana is a wholly personal experience, no matter what&nbsp;the liturgy says.</span></p><span data-dcnode-id="1362" instrument_node="">
