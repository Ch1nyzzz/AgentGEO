m-object-page menu-item-7339" data-dcnode-id="261" id="menu-item-7339"><a data-dcnode-id="262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannabiscure.info/health-benefits-of-juicing-cannabis/"><span data-dcnode-id="263" instrument_node="">Medical Cannabis – Juicing</span></a></li></ul></li></ul></li></ul></div></nav></header><main class="site-main" data-dcnode-id="153" id="primary"><article class="post-6820 page type-page status-publish has-post-thumbnail hentry" data-dcnode-id="154" id="post-6820"><header class="hero entry-header" data-dcnode-id="244"><span data-dcnode-id="252" instrument_node=""> </span><noscript data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">&lt;img width="650" height="350" src="https://cannabiscure.info/wp-content/uploads/2017/12/cannabis-cure-info-featured-19.jpg" class="attachment-full size-full wp-post-image" alt="Rick Simpson Oil" srcset="https://cannabiscure.info/wp-content/uploads/2017/12/cannabis-cure-info-featured-19.jpg 650w, https://cannabiscure.info/wp-content/uploads/2017/12/cannabis-cure-info-featured-19-300x162.jpg 300w" sizes="(max-width: 650px) 100vw, 650px" /&gt;</span></noscript><img alt="Rick Simpson Oil" class="attachment-full size-full wp-post-image lazyloaded" data-dcnode-id="249" data-sizes="(max-width: 650px) 100vw, 650px" data-src="https://cannabiscure.info/wp-content/uploads/2017/12/cannabis-cure-info-featured-19.jpg" data-srcset="https://cannabiscure.info/wp-content/uploads/2017/12/cannabis-cure-info-featured-19.jpg 650w, https://cannabiscure.info/wp-content/uploads/2017/12/cannabis-cure-info-featured-19-300x162.jpg 300w" height="350" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannabiscure.info/wp-content/uploads/2017/12/cannabis-cure-info-featured-19.jpg&amp;raw" srcset="https://cannabiscure.info/wp-content/uploads/2017/12/cannabis-cure-info-featured-19.jpg 650w, https://cannabiscure.info/wp-content/uploads/2017/12/cannabis-cure-info-featured-19-300x162.jpg 300w" width="650"><div class="overlay" data-dcnode-id="245"><div class="position" data-dcnode-id="246"><h1 class="entry-title" data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">Rick Simpson Oil (RSO) – The 90 Day Cancer Dosing Protocol</span></h1></div></div></header><div class="entry-content" data-dcnode-id="155"><h5 data-dcnode-id="242"><span data-dcnode-id="243" instrument_node="">Introduction</span></h5><p data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">We receive a lot of questions from our visitors regarding RSO cannabis oil and the effectiveness of ingesting 60 grams of RSO cannabis oil during a 90-day course to treat their cancer. Here we explain the standard protocol to follow.</span></p><p data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">RSO cannabis oil&nbsp;is mainly used as an alternative to cancer treatments. But the oil has also been used to treat a variety of other health issues including asthma, multiple sclerosis, anxiety, depression, inflammation and a variety of other conditions. Since RSO is high in THC, it possesses similar medicinal qualities to the compound itself.&nbsp;THC has been known to potentially treat&nbsp;the same conditions and many more – including Alzheimer’s, Parkinson’s disease and even eating disorders.</span></p><div class="wp-block-image is-style-default" data-dcnode-id="233"><figure class="aligncenter size-full is-resized" data-dcnode-id="234"><noscript data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">&lt;img src="https://cannabiscure.info/wp-content/uploads/2021/09/Picture8.jpg" alt="" class="wp-image-6815" width="202" height="202"/&gt;</span></noscript><img alt="" class="wp-image-6815 lazyloaded" data-dcnode-id="235" data-src="https://cannabiscure.info/wp-content/uploads/2021/09/Picture8.jpg" height="202" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannabiscure.info/wp-content/uploads/2021/09/Picture8.jpg&amp;raw" width="202"></figure></div><h5 data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">RSO Dosage &amp; The Best Way To Take RSO</span></h5><p data-dcnode-id="228"><em data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">It is recommended that RSO is taken sublingually, which means it is dissolved under the tongue.</span></em></p><p data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">Never take more than the recommended dosage until you absolutely know how Rick Simpson Oil affects you. It usually takes the average person about 90 days to ingest the full 60 gram or 60 ml oil treatment.</span></p><p data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">The Rick Simpson method recommends people start with three doses per day, each dose about the size of half a grain of short-grained dry rice. The patient should take this dosage every 8 hours: early in the morning, again in the afternoon, and then they should take their final dose of the day, about an hour before bedtime.</span></p><p data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">After four days at this dosage (taken three times a day), most people are then able to increase their doses by doubling the amount of their dosage every four days.</span></p><p data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">By following this simple procedure, many patients have reported that they did not experience the high, which this oil can cause. But in truth, no two people are the same and we all have different tolerances, so some will naturally be able to up their dosages more quickly than others.</span></p><p data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">An average person takes anywhere from 3 to 5 weeks to get to the point where they can ingest 1 gram or 1 ml of oil per day.</span></p><p data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">Once patients reach this dosage they can continue at this rate until their medical issues are brought under control. By this point, patients tend to build a tolerance for ingesting the oil, making it much easier to consume larger quantities at a time.</span></p><p data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">Children often take the same dosage as adults with no detrimental effects, although you should always consult with your doctor or healthcare physician first, where possible.</span></p><h5 data-dcnode-id="211"><strong data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">Can RSO Be Taken In Less Than 90 Days?</span></strong></h5><p data-dcnode-id="209"><span data-dcnode-id="210" instrument_node="">The simple answer is yes, we know many patients that have completed the protocol in 30 or 60 days. The 90-day protocol is suggested as it allows the body to build up tolerance slowly. The more the patient can consume the better, but as Rick Simpson says, “When people are ingesting the oil, I like to see them stay within their comfort zone, but the truth is, the faster you take the oil the better your chance of surviving if are suffering from a serious condition such as cancer”.</span></p><h5 data-dcnode-id="206"><strong data-dcnode-id="207"><span data-dcnode-id="208" instrument_node="">RSO via Suppositories</span></strong></h5><p data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">We should also note that some patients will decide to take their oil via a suppository (up the backside). Hoping to avoid the THC high, as the oil is bypassing the liver. We have mixed feedback over the years, everybody seems to react differently. There is certainly a strong argument to say that if you are treating cancer such as prostate or bowel cancer, then we believe it could indeed be more beneficial to use the RSO in this manner.</span></p><figure class="wp-block-image size-full is-resized" data-dcnode-id="200"><noscript data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">&lt;img src="https://cannabiscure.info/wp-content/uploads/2021/12/90DayRSOProtcol.png" alt="" class="wp-image-8013" width="409" height="1207" srcset="https://cannabiscure.info/wp-content/uploads/2021/12/90DayRSOProtcol.png 347w, https://cannabiscure.info/wp-content/uploads/2021/12/90DayRSOProtcol-102x300.png 102w" sizes="(max-width: 409px) 100vw, 409px" /&gt;</span></noscript><img alt="" class="wp-image-8013 lazyloaded" data-dcnode-id="201" data-sizes="(max-width: 409px) 100vw, 409px" data-src="https://cannabiscure.info/wp-content/uploads/2021/12/90DayRSOProtcol.png" data-srcset="https://cannabiscure.info/wp-content/uploads/2021/12/90DayRSOProtcol.png 347w, https://cannabiscure.info/wp-content/uploads/2021/12/90DayRSOProtcol-102x300.png 102w" height="1207" sizes="(max-width: 409px) 100vw, 409px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannabiscure.info/wp-content/uploads/2021/12/90DayRSOProtcol.png&amp;raw" srcset="https://cannabiscure.info/wp-content/uploads/2021/12/90DayRSOProtcol.png 347w, https://cannabiscure.info/wp-content/uploads/2021/12/90DayRSOProtcol-102x300.png 102w" width="409"></figure><h5 data-dcnode-id="198"><span data-dcnode-id="199" instrument_node="">What Is The Difference Between Normal CBD OIL and Rick Simpson (RSO) Oil?</span></h5><p data-dcnode-id="195"><em data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">The main difference between CBD oil and RSO cannabis oil is in its cannabinoid profile.</span></em></p><h2 class="has-text-align-center has-mid-green-color has-text-color" data-dcnode-id="190"><strong data-dcnode-id="193"><span data-dcnode-id="194" instrument_node="">**** Please Note – CBD Oil Alone Will NOT Cure Cancer. To Treat Cancer RSO Must Be Used – Period ****</span></strong><em data-dcnode-id="191"><br data-dcnode-id="192"></em></h2><p data-dcnode-id="188"><span data-dcnode-id="189" instrument_node="">CBD oil, also known as hemp oil, as it’s typically derived from the hemp plant, contains a great deal of the arguably beneficial cannabinoid CBD and almost none of the illegal and psychoactive tetrahydrocannabinol (THC). You cannot get high from CBD, and purchasing it is completely legal in many countries worldwide.</span></p><p data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">RSO cannabis oil typically contains a high percentage of THC (around 60 to 90 percent) and very little CBD, depending on the strain of cannabis used for the extract. This means that alongside THC and CBD it also contains all the healthy fatty acids, terpenes, and minor cannabinoids that science is showing work in symbiosis to act as a cure.</span></p><figure class="wp-block-image size-full" data-dcnode-id="182"><noscript data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">&lt;img width="541" height="1024" src="https://cannabiscure.info/wp-content/uploads/2021/12/CannabisComparision.png" alt="" class="wp-image-8015" srcset="https://cannabiscure.info/wp-content/uploads/2021/12/CannabisComparision.png 541w, https://cannabiscure.info/wp-content/uploads/2021/12/CannabisComparision-158x300.png 158w" sizes="(max-width: 541px) 100vw, 541px" /&gt;</span></noscript><img alt="" class="wp-image-8015 lazyloaded" data-dcnode-id="183" data-sizes="(max-width: 541px) 100vw, 541px" data-src="https://cannabiscure.info/wp-content/uploads/2021/12/CannabisComparision.png" data-srcset="https://cannabiscure.info/wp-content/uploads/2021/12/CannabisComparision.png 541w, https://cannabiscure.info/wp-content/uploads/2021/12/CannabisComparision-158x300.png 158w" height="1024" sizes="(max-width: 541px) 100vw, 541px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannabiscure.info/wp-content/uploads/2021/12/CannabisComparision.png&amp;raw" srcset="https://cannabiscure.info/wp-content/uploads/2021/12/CannabisComparision.png 541w, https://cannabiscure.info/wp-content/uploads/2021/12/CannabisComparision-158x300.png 158w" width="541"></figure><h5 data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">RSO Maintenance Dosing (After Completing The 90 Day Protocol)</span></h5><p data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">We strongly recommend after completing the 90-day protocol, that a maintenance dose is continued to be taken for a sustained period.&nbsp; Typically, somebody who is classed as in ‘remission of cancer’, will have no signs of cancer returning in a 5-year period.&nbsp; Therefore, we suggest a maintenance dose should be taken daily, of 1 -2 drops before bedtime (Typically 1 – 2 grams per month).</span></p><h5 data-dcnode-id="176" id="Anchor-1"><span data-dcnode-id="177" instrument_node="">Further reading</span></h5><p data-dcnode-id="173"><a data-dcnode-id="174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannabiscure.info/buy-cannabis-oil-online/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="175" instrument_node="">How and where to safely buy RSO medical cannabis oil online</span></a></p><p data-dcnode-id="170"><a data-dcnode-id="171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannabiscure.info/overview-of-medical-cannabis/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="172" instrument_node="">Introduction to Medical Cannabis</span></a></p><h5 class="has-mid-green-color has-text-color" data-dcnode-id="168"><span data-dcnode-id="169" instrument_node="">Help and Advise</span></h5><p class="has-mid-green-color has-text-color" data-dcnode-id="160"><span data-dcnode-id="167" instrument_node="">If you need advice or help with Medical Cannabis, please use the&nbsp;</span><a data-dcnode-id="165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannabiscure.info/contact/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="166" instrument_node="">contact form</span></a><span data-dcnode-id="164" instrument_node="">.</span><br data-dcnode-id="163"><br data-dcnode-id="162"><span data-dcnode-id="161" instrument_node="">We try to answer all emails within 24 hours and are happy to help and provide advice on all aspects of Medical Cannabis treatments in complete confidence.</span></p><p class="has-mid-green-color has-text-color" data-dcnode-id="156"><span data-dcnode-id="159" instrument_node="">Disclaimer:&nbsp;</span><em data-dcnode-id="157"><span data-dcnode-id="158" instrument_node="">Please note that whilst we consider ourselves subject matter experts regarding Medical Cannabis, we are not medically trained professionals. We are an information resource and there is still limited evidence that Medical Cannabis can cure all the illnesses we discuss here. We recommend you do as much research as possible, and where practical seek professional medical advice before proceeding with Medical Cannabis oil. &nbsp;In short, always do your homework.</span></em></p></div></article></main><footer class="site-footer" data-dcnode-id="137" id="colophon"><div class="container" data-dcnode-id="140"><section class="business-details footer-widget" data-dcnode-id="152"></section><section class="widget footer-widget widget_nav_menu" data-dcnode-id="141" id="nav_menu-3"><h4 class="widget-title" data-dcnode-id="150"><span data-dcnode-id="151" instrument_node="">Website Information</span></h4><div class="menu-useful-links-container" data-dcnode-id="142"><ul class="menu" data-dcnode-id="143" id="menu-useful-links"><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-privacy-policy menu-item-6461" data-dcnode-id="147" id="menu-item-6461"><a data-dcnode-id="148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannabiscure.info/privacy-policy/"><span data-dcnode-id="149" instrument_node="">Privacy Policy</span></a></li><li class="menu-item menu-item-type-custom menu-item-object-custom menu-item-6463" data-dcnode-id="144" id="menu-item-646
