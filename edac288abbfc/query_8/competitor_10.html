</span><div data-dcnode-id="5656"><div align="center" class="wcustomhtml" data-dcnode-id="5658" id="692870117891502499" style="width: 100%; overflow-y: hidden;"><h1 data-dcnode-id="5659"><span data-dcnode-id="5660" instrument_node="">How Cannabis Oil Works to Kill Cancer Cells
</span></h1></div><span data-dcnode-id="5657" instrument_node="">
</span></div><span data-dcnode-id="5655" instrument_node="">
</span><div data-dcnode-id="5649"><div data-dcnode-id="5654" style="height: 0px; overflow: hidden; width: 80%;"></div><span data-dcnode-id="5653" instrument_node="">
</span><hr class="styled-hr" data-dcnode-id="5652" style="width:80%;"><span data-dcnode-id="5651" instrument_node="">
</span><div data-dcnode-id="5650" style="height: 30px; overflow: hidden; width: 80%;"></div></div><span data-dcnode-id="5648" instrument_node="">
</span><span class="imgPusher" data-dcnode-id="5647" style="float:left;height:0px"></span><span data-dcnode-id="5642" style="display: table;width:auto;position:relative;float:left;max-width:100%;;clear:left;margin-top:3px;*margin-top:6px"><a data-dcnode-id="5645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cureyourowncancer.org/uploads/1/1/6/9/11695594/7014509_orig.jpg" onclick="if (!lightboxLoaded) return false" rel="lightbox"><img alt="Picture" class="galleryImageBorder wsite-image" data-dcnode-id="5646" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cureyourowncancer.org/uploads/1/1/6/9/11695594/7014509.jpg%3F181&amp;raw" style="margin-top: 5px; margin-bottom: 10px; margin-left: 0px; margin-right: 10px; border-width:1px;padding:3px; max-width:100%"></a><span class="wsite-caption" data-dcnode-id="5643" style="display: table-caption; caption-side: bottom; font-size: 90%; margin-top: -10px; margin-bottom: 10px; text-align: center;"><span data-dcnode-id="5644" instrument_node="">Bio-chemist Dennis Hill</span></span></span><span data-dcnode-id="5641" instrument_node="">
</span><div class="paragraph" data-dcnode-id="5618" style="text-align:justify;display:block;"><font color="#050000" data-dcnode-id="5620"><font data-dcnode-id="5637" size="2"><span data-dcnode-id="5640" instrument_node="">By: </span><a data-dcnode-id="5638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dl.dropboxusercontent.com/u/27713298/Web/cure/How_It_Works.html" target="_blank" title=""><span data-dcnode-id="5639" instrument_node="">Dennis Hill</span></a></font><br data-dcnode-id="5636"><br data-dcnode-id="5635"><font data-dcnode-id="5633" size="3"><span data-dcnode-id="5634" instrument_node="">First let’s look at what keeps cancer cells alive, then we will come back and examine how the cannabinoids&nbsp;CBD (cannabidiol) and THC (tetrahydrocannabinol) unravels cancer’s aliveness.&nbsp;</span></font><br data-dcnode-id="5632"><br data-dcnode-id="5631"><font data-dcnode-id="5629" size="3"><span data-dcnode-id="5630" instrument_node="">In every cell there is a family of interconvertible&nbsp;sphingolipids&nbsp;that specifically manage the life and death of that cell. This profile of factors is called the “Sphingolipid Rheostat.” If endogenous&nbsp;ceramide(a signaling metabolite of&nbsp;sphingosine-1-phosphate) is high, then cell death (apoptosis) is imminent. If ceramide&nbsp;is low, the cell is strong in its vitality.&nbsp;</span></font><br data-dcnode-id="5628"><br data-dcnode-id="5627"><font data-dcnode-id="5625" size="3"><span data-dcnode-id="5626" instrument_node="">Very simply, when THC connects to the CB1 or CB2 cannabinoid receptor site on the cancer cell, it causes an increase in ceramide synthesis which drives cell death. A normal healthy cell does not produce ceramide in the presence of THC, thus is not affected by the cannabinoid.</span></font><br data-dcnode-id="5624"><br data-dcnode-id="5623"><font data-dcnode-id="5621" size="3"><span data-dcnode-id="5622" instrument_node="">The cancer cell dies, not because of cytotoxic chemicals, but because of a tiny little shift in the mitochondria. Within most cells there is a cell nucleus, numerous mitochondria (hundreds to thousands), and various other organelles in the cytoplasm. The purpose of the mitochondria is to produce energy (ATP) for cell use. As ceramide starts to accumulate, turning up the Sphingolipid Rheostat, it increases the mitochondrial membrane pore permeability to&nbsp;cytochrome c, a critical protein in energy synthesis. Cytochrome c is pushed out of the mitochondria, killing the source of energy for the cell.&nbsp;</span></font></font><br data-dcnode-id="5619"></div><span data-dcnode-id="5617" instrument_node="">
</span><hr data-dcnode-id="5616" style="width:100%;clear:both;visibility:hidden;"><span data-dcnode-id="5615" instrument_node="">
</span></td><td class="wsite-multicol-col" data-dcnode-id="5584" style="width:35.813104281754%; padding:0 10px;"><span data-dcnode-id="5612" instrument_node="">
</span><div data-dcnode-id="5602"><div class="wsite-image wsite-image-border-thin" data-dcnode-id="5603" style="padding-top:10px;padding-bottom:10px;margin-left:0;margin-right:0;text-align:center"><span data-dcnode-id="5611" instrument_node="">
</span><a data-dcnode-id="5607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cureyourowncancer.org/uploads/1/1/6/9/11695594/5708528_orig.jpg" onclick="if (!lightboxLoaded) return false" rel="lightbox"><span data-dcnode-id="5610" instrument_node="">
</span><img alt="Picture" data-dcnode-id="5609" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cureyourowncancer.org/uploads/1/1/6/9/11695594/5708528.jpg%3F129&amp;raw" style="width:auto;max-width:100%"><span data-dcnode-id="5608" instrument_node="">
</span></a><span data-dcnode-id="5606" instrument_node="">

</span><a data-dcnode-id="5596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cureyourowncancer.org/uploads/1/1/6/9/11695594/9267449_orig.png" onclick="if (!lightboxLoaded) return false" rel="lightbox"><span data-dcnode-id="5599" instrument_node="">
</span><img alt="Picture" data-dcnode-id="5598" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cureyourowncancer.org/uploads/1/1/6/9/11695594/9267449.png%3F298&amp;raw" style="width:auto;max-width:100%"><span data-dcnode-id="5597" instrument_node="">

</span><div data-dcnode-id="5586"><div align="center" class="wcustomhtml" data-dcnode-id="5588" id="912766360946945864" style="width: 100%; overflow-y: hidden;"><iframe allowtransparency="true" data-dcnode-id="5589" frameborder="0" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/plugins/likebox.php%3Fhref%3Dhttp%253A%252F%252Fwww.facebook.com%252FCure.Your.Own.Cancer%26width%3D292%26height%3D590%26show_faces%3Dtrue%26colorscheme%3Dlight%26stream%3Dtrue%26border_color%26header%3Dtrue&amp;raw" style="border:none; overflow:hidden; width:292px; height:590px;"></iframe></div><span data-dcnode-id="5587" instrument_node="">

</span><div data-dcnode-id="2150"><div class="wsite-multicol" data-dcnode-id="2151"><div class="wsite-multicol-table-wrap" data-dcnode-id="2152" style="margin:0 -15px;"><span data-dcnode-id="5572" instrument_node="">
</span><span data-dcnode-id="5571" instrument_node="">

</span><span data-dcnode-id="5564" instrument_node=""> </span><span data-dcnode-id="2164" instrument_node=""> </span><span data-dcnode-id="2159" instrument_node=""> </span><span data-dcnode-id="2157" instrument_node="">
</span><span data-dcnode-id="2155" instrument_node="">
</span><table class="wsite-multicol-table" data-dcnode-id="2154"><tbody class="wsite-multicol-tbody" data-dcnode-id="2156"><tr class="wsite-multicol-tr" data-dcnode-id="2158"><td class="wsite-multicol-col" data-dcnode-id="5565" style="width:1.6277791356017%; padding:0 15px;"><span data-dcnode-id="5568" instrument_node="">
</span><div class="wsite-spacer" data-dcnode-id="5567" style="height:50px;"></div><span data-dcnode-id="5566" instrument_node="">
</span></td><td class="wsite-multicol-col" data-dcnode-id="2165" style="width:93.456974509544%; padding:0 15px;"><span data-dcnode-id="5563" instrument_node="">
</span><div class="paragraph" data-dcnode-id="5550" style="text-align:justify;"><font color="#080808" data-dcnode-id="5552" size="3"><span data-dcnode-id="5562" instrument_node="">Ceramide also causes genotoxic stress in the cancer cell nucleus generating a protein called p53, whose job it is to disrupt calcium metabolism in the mitochondria. If this weren’t enough, ceramide disrupts the cellular&nbsp;lysosome, the cell’s digestive system that provides nutrients for all cell functions. Ceramide, and other sphingolipids, actively inhibit pro-survival pathways in the cell leaving no possibility at all of cancer cell survival.</span><br data-dcnode-id="5561"><br data-dcnode-id="5560"><span data-dcnode-id="5559" instrument_node="">The key to this process is the accumulation of ceramide in the system. This means taking therapeutic amounts of CBD and THC, steadily, over a period of time, keeping metabolic pressure on this cancer cell death pathway.&nbsp;</span><br data-dcnode-id="5558"><br data-dcnode-id="5557"><span data-dcnode-id="5556" instrument_node="">How did this pathway come to be? Why is it that the body can take a simple plant enzyme and use it for profound healing in many different physiological systems? This endocannabinoid system exists in all animal life, just waiting for its matched exocannabinoid activator.&nbsp;This is interesting. Our own endocannabinoid system covers all cells and nerves; it is the messenger of information flowing between our immune system and the central nervous system (CNS). It is responsible for neuroprotection, and micro-manages the immune system. This is the primary control system that maintains homeostasis; our well being.&nbsp;</span><br data-dcnode-id="5555"><br data-dcnode-id="5554"><span data-dcnode-id="5553" instrument_node="">Just out of curiosity, how does the work get done at the cellular level, and where does the body make the endocannabinoids? Here we see that endocannabinoids have their origin in nerve cells right at the synapse. When the body is compromised through illness or injury it calls insistently to the endocannabinoid system and directs the immune system to bring healing. If these homeostatic systems are weakened, it should be no surprise that exocannabinoids are therapeutic. It helps the body in the most natural way possible.</span></font><br data-dcnode-id="5551"></div><span data-dcnode-id="5549" instrument_node="">
</span><div data-dcnode-id="2172"><div class="wsite-multicol" data-dcnode-id="2173"><div class="wsite-multicol-table-wrap" data-dcnode-id="2174" style="margin:0 -20px;"><span data-dcnode-id="5548" instrument_node="">
</span><span data-dcnode-id="5547" instrument_node="">
</span><span data-dcnode-id="5546" instrument_node="">
</span><span data-dcnode-id="5545" instrument_node="">
</span><span data-dcnode-id="5377" instrument_node=""> </span><span data-dcnode-id="2181" instrument_node=""> </span><span data-dcnode-id="2179" instrument_node="">
</span><span data-dcnode-id="2177" instrument_node="">
</span><table class="wsite-multicol-table" data-dcnode-id="2176"><tbody class="wsite-multicol-tbody" data-dcnode-id="2178"><tr class="wsite-multicol-tr" data-dcnode-id="2180"><td class="wsite-multicol-col" data-dcnode-id="5378" style="width:69.454545454545%; padding:0 20px;"><span data-dcnode-id="5544" instrument_node="">
</span><div class="paragraph" data-dcnode-id="5529" style="text-align:justify;"><br data-dcnode-id="5543"><font color="#070707" data-dcnode-id="5532" size="3"><span data-dcnode-id="5542" instrument_node="">To see how this works we visualize the cannabinoid as a three dimensional molecule, where one part of the molecule is configured to fit the nerve or immune cell receptor site just like a key in a lock. There are at least two types of cannabinoid receptor sites, CB1 (CNS) and CB2 (immune). In general CB1 activates the CNS messaging system, and CB2 activates the immune system, but it’s much more complex than this. Both THC and anandamide activate both receptor sites. Other cannabinoids activate one or the other receptor sites.&nbsp;Among the strains of Cannabis, C.&nbsp;sativa&nbsp;tends toward the CB1 receptor, and C.&nbsp;indica&nbsp;tends toward CB2. So&nbsp;sativa&nbsp;is more neuroactive, and&nbsp;indica&nbsp;is more immunoactive. Another factor here is that&nbsp;sativa&nbsp;is dominated by THC cannabinoids, and&nbsp;indica&nbsp;is predominately CBD (cannabidiol).</span><br data-dcnode-id="5541"><br data-dcnode-id="5540"><span data-dcnode-id="5539" instrument_node="">It is known that THC and CBD are biomimetic to anandamide, that is, the body can use both interchangeably. Thus, when stress, injury, or illness demand more from endogenous anandamide than can be produced by the body, its mimetic exocannabinoids are activated. If the stress is transitory, then the treatment can be transitory. If the demand is sustained, such as in cancer, then treatment needs to provide sustained pressure of the modulating agent on the homeostatic systems.&nbsp;</span><br data-dcnode-id="5538"><br data-dcnode-id="5537"><span data-dcnode-id="5536" instrument_node="">Typically CBD gravitates to the densely packed CB2 receptors in the spleen, home to the body’s immune system. From there, immune cells seek out and destroy cancer cells. Interestingly, it has been shown that THC and CBD cannabinoids have the ability to kill cancer cells directly without going through immune intermediaries. THC and CBD hijack the lipoxygenase pathway to directly inhibit tumor growth. As a side note, it has been discovered that CBD inhibits anandamide reuptake. Here we see that cannabidiol helps the body preserve its own natural endocannabinoid by inhibiting the enzyme that breaks down anandamide.</span><br data-dcnode-id="5535"><br data-dcnode-id="5534"><span data-dcnode-id="5533" instrument_node="">This brief survey touches lightly on a few essential concepts. Mostly I would like to leave you with an appreciation that nature has designed the perfect medicine that fits exactly with our own immune system of receptors and signaling metabolites to provide rapid and complete immune response for systemic integrity and metabolic homeostasis. &nbsp;</span></font><br data-dcnode-id="5531"><br data-dcnode-id="5530"></div><span data-dcnode-id="5528" instrument_node="">
