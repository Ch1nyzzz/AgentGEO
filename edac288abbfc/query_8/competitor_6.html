</span><article class="post-52919 post type-post status-publish format-standard has-post-thumbnail hentry category-articles-cannabis category-cancer tag-cancer-en tag-cannabinoides-en tag-cannabinoids tag-cannabinoids-treatment tag-cbd-en tag-cbd-oil-en tag-cdb-en tag-rick-simpson-oil tag-rso-en tag-thc-en" data-dcnode-id="451" id="post-52919"><span data-dcnode-id="1220" instrument_node="">

</span><header class="entry-header" data-dcnode-id="1192"><span data-dcnode-id="1217" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">Rick Simpson Oil: “the cure for cancer”</span></h1><span data-dcnode-id="1214" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1195"><span data-dcnode-id="1213" instrument_node="">
</span><div data-dcnode-id="1197" id="breadcrumbs"><span data-dcnode-id="1198"><span data-dcnode-id="1199"><a data-dcnode-id="1211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kalapa-clinic.com/en/"><span data-dcnode-id="1212" instrument_node="">Home</span></a><span data-dcnode-id="1210" instrument_node=""> » </span><span data-dcnode-id="1200"><a data-dcnode-id="1208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kalapa-clinic.com/en/news/"><span data-dcnode-id="1209" instrument_node="">News</span></a><span data-dcnode-id="1207" instrument_node=""> » </span><span data-dcnode-id="1201"><a data-dcnode-id="1205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kalapa-clinic.com/en/category/articles-cannabis/"><span data-dcnode-id="1206" instrument_node="">Articles and publications</span></a><span data-dcnode-id="1204" instrument_node=""> » </span><strong aria-current="page" class="breadcrumb_last" data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">Rick Simpson Oil: “the cure for cancer”</span></strong></span></span></span></span></div><span data-dcnode-id="1196" instrument_node="">
</span></div><span data-dcnode-id="1193" instrument_node="">
</span></header><span data-dcnode-id="1190" instrument_node="">

</span><div class="row" data-dcnode-id="496"><span data-dcnode-id="1185" instrument_node="">
</span><div class="container" data-dcnode-id="498" style="display:flex;"><span data-dcnode-id="1184" instrument_node="">
</span><div class="entry-content col-md" data-dcnode-id="859"><span data-dcnode-id="1183" instrument_node="">
</span><img alt="" class="attachment-large size-large wp-post-image" data-dcnode-id="1182" height="683" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kalapa-clinic.com/wp-content/uploads/2020/10/aceite-de-rick-simpson-Rick-Simpson-Oil-1024x683.png&amp;raw" srcset="https://www.kalapa-clinic.com/wp-content/uploads/2020/10/aceite-de-rick-simpson-Rick-Simpson-Oil-1024x683.png 1024w, https://www.kalapa-clinic.com/wp-content/uploads/2020/10/aceite-de-rick-simpson-Rick-Simpson-Oil-300x200.png 300w, https://www.kalapa-clinic.com/wp-content/uploads/2020/10/aceite-de-rick-simpson-Rick-Simpson-Oil-768x512.png 768w, https://www.kalapa-clinic.com/wp-content/uploads/2020/10/aceite-de-rick-simpson-Rick-Simpson-Oil-1536x1024.png 1536w, https://www.kalapa-clinic.com/wp-content/uploads/2020/10/aceite-de-rick-simpson-Rick-Simpson-Oil-2048x1366.png 2048w" width="1024"><span data-dcnode-id="1181" instrument_node="">
</span><p data-dcnode-id="1173"><span data-dcnode-id="1180" instrument_node="">Concentrated cannabis extracts, also known as cannabis oils due to their viscous and sticky look, are always more popular between self-medicated patients, that sometimes claim it as a “cancer cure”. Generally, cannabis oils manufacturing methods are quite simple and don’t require specific equipment. In this field, the most known example of this kind of products is that called “</span><strong data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">Rick Simpson oil</span></strong><span data-dcnode-id="1177" instrument_node="">”, also known with the acronym of </span><strong data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">RSO</span></strong><span data-dcnode-id="1174" instrument_node="">.</span></p><span data-dcnode-id="1172" instrument_node="">
</span><h2 data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">Rick Simpson’s history and the birth of his oil</span></h2><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">In 1997, Rick Simpson worked as an engineer in Canada and, due to a work accident, he started suffering from constant headaches and tinnitus. Despite several controls at the hospital, prescribed drugs were not able to provide him any relief.</span></p><span data-dcnode-id="1166" instrument_node="">
</span><p data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">In 1999, after having viewed a TV show talking about medical cannabis, Rick called one of his friends so that he would let him try a joint. He was really surprised noticing the relief felt, far stronger than when he was using all of those prescribed drugs. For this reason, he asked to receive a marijuana prescription from his doctor, but unfortunately it had been absolutely denied.</span></p><span data-dcnode-id="1163" instrument_node="">
</span><p data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">During the following years, the symptoms of the illness were getting worse, preventing Rick from having a normal life. After having some suicidal thoughts, he decided to find on his own an alternative cure for himself. He remembered that when smoking marijuana, he noted a high relief and he was wondering about what effects a concentration of cannabinoids, in form of oil, can produce.</span></p><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">Then, he started growing cannabis plants and manufacturing an extraction from the flowers that he was taking daily, starting at very low doses. According to what stated by Rick, the symptoms of the lesion were quickly mitigated, his sleep had improved and pain and blood pressure were decreased. Furthermore, Rick lost most of his extra weight and appeared to be even more in good shape. He came back to normal life!</span></p><span data-dcnode-id="1157" instrument_node="">
</span><p data-dcnode-id="1152"><span data-dcnode-id="1156" instrument_node="">In 2002, he was diagnosticated with a basal-cell carcinoma</span><sup data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">1</span></sup><span data-dcnode-id="1153" instrument_node=""> (the most common malignant skin tumour that doctors usually suggest to remove surgically, with a 98% cure rate2).</span></p><span data-dcnode-id="1151" instrument_node="">
</span><p data-dcnode-id="1146"><span data-dcnode-id="1150" instrument_node="">In 2003, he underwent surgery, but few weeks after, the tumour had already reappeared. After the poor success of conventional treatments, Simpson entrusted to THC oil, in the attempt to be cured. Because of this, thanks to his marijuana experience, and after having read “</span><a data-dcnode-id="1148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/jnci/article-abstract/55/3/597/912322"><span data-dcnode-id="1149" instrument_node="">Antineoplastic Activity of Cannabinoids</span></a><span data-dcnode-id="1147" instrument_node="">” a study published on the Journal of the National Cancer Institute, Rick came back choosing cannabis as a treatment of his illness. Rick so tried his marijuana oil directly on his affected skin:</span></p><span data-dcnode-id="1145" instrument_node="">
</span><p data-dcnode-id="1140"><span data-dcnode-id="1144" instrument_node="">“</span><em data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">Why do not put some oil on the other two cancers and see what happens? I applied the oil, covered the affected areas with a bandage and I left it staying for four days. In the meantime, I didn’t feel anything happen, so I was thinking it was not working</span></em><span data-dcnode-id="1141" instrument_node="">”.</span></p><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">Simpson states that after only four days his skin cancer was gone and he has been in remission ever since. So, enthusiast for this great news, Rick wanted to try helping his mother with psoriasis, and started applying some of his oil on the infected skin. In a few weeks, her injuries disappeared and the skin was healed. At that point, Rick decided to free share his cannabis oil with all patients who were asking for it.</span></p><span data-dcnode-id="1136" instrument_node="">
</span><p data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">During the first year, Rick had already treated between 50 and 60 people, for several skin problems. In a few years, Rick Simpson propose his marijuana oil to more than 5000 patients, who was suffering from many pathologies, including all kinds of cancer, leukaemia, melanoma, diabetes, chronic pain, warts, viral and bacterial infections. Rick stated that about the 70% of his patients, who were following his protocol, got free from cancer, assuming 60 grams of his high-quality cannabis oil. Furthermore, Rick specified that in case it is unfortunately too late for cure the ailment, his oil allows to improve the quality of the end of life in the patient, so that at least he can die with dignity.</span></p><span data-dcnode-id="1133" instrument_node="">
</span><h2 data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">What is Rick Simpson Oil?</span></h2><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">Rick Simpson Oil (RSO) is a cannabis derived oil, which presents a very high concentration of THC. This fact makes the oil completely different from that we usually find on the market, since it has a high concentration of THC.</span></p><span data-dcnode-id="1127" instrument_node="">
</span><h2 data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">Anecdotal uses and benefits of RSO</span></h2><span data-dcnode-id="1124" instrument_node="">
</span><p data-dcnode-id="1119"><span data-dcnode-id="1123" instrument_node="">According to what is published on the Rick Simpson’s website</span><strong data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">,</span></strong><span data-dcnode-id="1120" instrument_node=""> RSO is mainly used as an alternative cancer treatment, but a part from cancer, it can also treat:</span></p><span data-dcnode-id="1118" instrument_node="">
</span><ul data-dcnode-id="1090"><span data-dcnode-id="1117" instrument_node="">
</span><li data-dcnode-id="1114"><a data-dcnode-id="1115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kalapa-clinic.com/en/medical-cannabis-multiple-sclerosis/"><span data-dcnode-id="1116" instrument_node="">Multiple Sclerosis</span></a></li><span data-dcnode-id="1113" instrument_node="">
</span><li data-dcnode-id="1110"><a data-dcnode-id="1111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kalapa-clinic.com/en/treatment-arthritis-medical-cannabis/"><span data-dcnode-id="1112" instrument_node="">Arthritis</span></a></li><span data-dcnode-id="1109" instrument_node="">
</span><li data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Infections</span></li><span data-dcnode-id="1106" instrument_node="">
</span><li data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">Inflammations</span></li><span data-dcnode-id="1103" instrument_node="">
</span><li data-dcnode-id="1100"><a data-dcnode-id="1101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kalapa-clinic.com/en/cbd-blood-pressure/"><span data-dcnode-id="1102" instrument_node="">High blood pressure</span></a></li><span data-dcnode-id="1099" instrument_node="">
</span><li data-dcnode-id="1096"><a data-dcnode-id="1097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kalapa-clinic.com/en/depression-therapy-medical-cannabis/"><span data-dcnode-id="1098" instrument_node="">Depression</span></a></li><span data-dcnode-id="1095" instrument_node="">
</span><li data-dcnode-id="1092"><a data-dcnode-id="1093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kalapa-clinic.com/en/insomnia-reasons-and-treatment-to-sleep/"><span data-dcnode-id="1094" instrument_node="">Insomnia</span></a></li><span data-dcnode-id="1091" instrument_node="">
</span></ul><span data-dcnode-id="1089" instrument_node="">
</span><p data-dcnode-id="1081"><span data-dcnode-id="1088" instrument_node="">Although Rick claims they are the most common pathologies that can be treated using his oil</span><sup data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">1</span></sup><span data-dcnode-id="1085" instrument_node="">, it is necessary to understand that </span><a data-dcnode-id="1083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kalapa-clinic.com/en/tetrahydrocannabinol/"><span data-dcnode-id="1084" instrument_node="">Delta-9-tetrahydrocannabinol (Delta-9-THC)</span></a><span data-dcnode-id="1082" instrument_node="">, the main psychoactive compound of marijuana, could also cause a range of psychological and physical symptoms:</span></p><span data-dcnode-id="1080" instrument_node="">
</span><ul data-dcnode-id="1063"><span data-dcnode-id="1079" instrument_node="">
</span><li data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Psychoactivity</span></li><span data-dcnode-id="1076" instrument_node="">
</span><li data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">Paranoia</span></li><span data-dcnode-id="1073" instrument_node="">
</span><li data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">Anxiety</span></li><span data-dcnode-id="1070" instrument_node="">
</span><li data-dcnode-id="1065"><span data-dcnode-id="1069" instrument_node="">Cannabis hyperemesis syndrome</span><sup data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">3</span></sup><span data-dcnode-id="1066" instrument_node="">.</span></li><span data-dcnode-id="1064" instrument_node="">
</span></ul><span data-dcnode-id="1062" instrument_node="">
</span><p data-dcnode-id="1054"><span data-dcnode-id="1061" instrument_node="">At the same time, it is important to mention, that “Antineoplastic activity of cannabinoids” remains under investigation</span><sup data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">4</span></sup><span data-dcnode-id="1058" instrument_node="">. Indeed, the main risk associated with RSO is the lack in evidence proving its effectiveness in cancer treatments. This becomes even more dangerous if the patient stops following doctors’ conventional recommendations for treating his cancer. </span><strong data-dcnode-id="1055"><u data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">&nbsp;</span></u></strong></p><span data-dcnode-id="1053" instrument_node="">
</span><h3 data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">What science states about Rick Simpson Oil</span></h3><span data-dcnode-id="1050" instrument_node="">
</span><p data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Before following Simpson’s path, it is necessary to know how the scientific community evaluates the efficiency of cannabis and especially of Rick Simpson’s oil as a cancer cure.</span></p><span data-dcnode-id="1047" instrument_node="">
</span><p data-dcnode-id="1039"><span data-dcnode-id="1046" instrument_node="">According to what was published on the </span><em data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Cancer Research UK</span></em><span data-dcnode-id="1043" instrument_node="">, the world´s largest independent cancer research clarity, there is no general consensus within the scientific community regarding the use of cannabis as an effective treatment for cancer</span><sup data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">5</span></sup><span data-dcnode-id="1040" instrument_node="">.</span></p><span data-dcnode-id="1038" instrument_node="">
</span><h3 data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Open Letter: Dr. Franjo Grotenhermen’s criticisms of RSO</span></h3><span data-dcnode-id="1035" instrument_node="">
</span><p data-dcnode-id="1027"><span data-dcnode-id="1034" instrument_node="">The doctor in medicine, </span><a data-dcnode-id="1032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nachtschatten.ch/authors/author_137.html"><span data-dcnode-id="1033" instrument_node="">Franjo Grotenhermen</span></a><span data-dcnode-id="1031" instrument_node="">, founder of the </span><a data-dcnode-id="1029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cannabis-med.org/%3Flng%3Den"><span data-dcnode-id="1030" instrument_node="">International Association for Cannabinoid Medicine</span></a><span data-dcnode-id="1028" instrument_node="">s, sent a letter to Rick Simpson, in which he urges Simpson to caution, especially regarding his claims and healing promises, considered excessive by the doctor.</span></p><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">In the first part of the letter, Dr Franjo noted how, nowadays, many desperate people, who suffer from cancer and other severe disorders, rely and entrust their hopes on Simpson’s recommendations. At the same time, he agrees with Simpson’s wiliness to preserve humanity survival and prosperity, with the aim to share the truth with as many people as possible, in order to obtain a substantial change.</span></p><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Nevertheless, in the second part of the same letter, Dr Franjo highlights six main critic points regarding Simpson’s approach:</span></p><span data-dcnode-id="1020" instrument_node="">
</span><h4 data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">1. Lack of knowledge</span></h4><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">The main criticism that Franjo identified comes from Simpson’s words. He states that decarboxylation occurs when the molecules within the oil convert to the delta-9 position, when undergone to a heating process, so that they turn into their medicinally active form (Pos. 717, Kindle).</span></p><span data-dcnode-id="1014" instrument_node="">
</span><p data-dcnode-id="1006"><span data-dcnode-id="1013" instrument_node="">Franjo retorts that prior to </span><a data-dcnode-id="1011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kalapa-clinic.com/en/cannabinoid-acids-thca-and-cbda/"><span data-dcnode-id="1012" instrument_node="">decarboxylation</span></a><span data-dcnode-id="1010" instrument_node="">, the substance is already delta-9-THC, while the process just involves the removal of carbon dioxide from the molecule, converting the </span><a data-dcnode-id="1008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kalapa-clinic.com/en/thca-cannabinoid-2/"><span data-dcnode-id="1009" instrument_node="">naturally present THC acid (THCA)</span></a><span data-dcnode-id="1007" instrument_node=""> into phenolic THC, responsible for most of the medical benefits of delta-9-THC. In addition, Franjo clarifies that it is not a protein contained in the cannabis plant the one in charge of cancer-fighting properties, but the phytochemicals, may have such activities.</span></p><span data-dcnode-id="1005" instrument_node="">
</span><h4 data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">2. Mistaken beliefs</span></h4><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">In addition, Simpson shows even further mistaken beliefs talking about the importance of administer the oil as close as possible to a tumour, emphasizing the stronger effect that can be obtained in this way (Pos. 1012, Kindle). However, cannabinoids reach the cancer through the body´s cardiovascular system, Franjo replies.</span></p><span data-dcnode-id="999" instrument_node="">
</span><h4 data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">3. Confusing amount and concentration</span></h4><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">According to Simpson, it’s impossible that a cannabis tincture can be as powerful as an extract. The truth is, that the effect doesn’t depend on the concentration, but it does on the absolute amount ingested.</span></p><span data-dcnode-id="993" instrument_node="">
</span><h4 data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">4. Missing and misleading data</span></h4><span data-dcnode-id="990" instrument_node="">
</span><p data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Simpson confesses that there is about one person in ten who publicly tells what is experienced, but the majority of patients don’t do it. Since 2003 – Simpson follows – he has administered his extract to about 5000 people, suffering from various medical problems, and most of these people have been controlled and cured using this oil (Pos. 1377, Kindle).</span></p><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">This affirmation already shows many critical issues. Even if Simpson affirms and complains about the fact that he didn’t hear back from most of his patients. However, he intrepidly states that most of his patients with cancer, included those from which he didn’t receive any news, were totally cured or under control with his oil. Affirmations based on such limited data directly converts into absurd, especially considering that there are about 1000 different kind of classified cancers – Franjo counters.</span></p><span data-dcnode-id="984" instrument_node="">
</span><h4 data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">5. THC fixation</span></h4><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Simpson always recommends high-grade cannabis extracts, with THC levels of about 80-90%. The higher the quality of the oil, the more pronounced will be its healing effect (Pos. 368, Kindle).</span></p><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="968"><span data-dcnode-id="977" instrument_node="">Nowadays, several studies are showing cancer-inhibiting properties of other cannabinoids, in particular of the </span><strong data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">non-psychoactive cannabinoid, </span></strong><a data-dcnode-id="973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kalapa-clinic.com/en/cannabidiol-cannabis-oil/"><span data-dcnode-id="974" instrument_node="">Cannabidiol (CBD)</span></a><span data-dcnode-id="972" instrument_node="">. There are evidences that CBD may play a more important role than THC in some types of tumours. Moreover, the well-known </span><a data-dcnode-id="970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kalapa-clinic.com/en/entourage-effect-medical-cannabis/"><span data-dcnode-id="971" instrument_node="">entourage effect</span></a><span data-dcnode-id="969" instrument_node="">, and especially the combination of THC and CBD together, can offer more effective benefits than just THC isolated. Among other factors, CBD can be of great importance when THC is not well tolerated, and clearly big dosage are out of the question. In these cases, a treatment using high dosage of CBD can be attempted, both for reducing the psychoactive effect of THC and for the proper properties of CBD against certain types of cancers.</span></p><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="966" instrument_node="">Simpson developed his theory 15 years ago, when CBD was not yet taken into great account. However, the actual knowledge of the </span><a data-dcnode-id="964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kalapa-clinic.com/en/entourage-effect-medical-cannabis-2/"><span data-dcnode-id="965" instrument_node="">effectiveness of the whole phytocomplex of cannabis plant</span></a><span data-dcnode-id="963" instrument_node=""> in the treatment of cancer are of preliminary nature, and researchers and doctors have to always take new data into consideration, in order to offer the most up to date advice and treatments possible to patients.</span></p><span data-dcnode-id="961" instrument_node="">
</span><h4 data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">6. Warning against effective conventional therapies</span></h4><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="954"><span data-dcnode-id="957" instrument_node="">Simpson writes that most of the people who contact him have been badly damaged by the medical system, due to chemotherapy and radiation, etc. Damage caused by these treatments have a lasting effect on patients, making them harder to cure. Nonetheless, he affirms, his oil still has a 70 to 80% success rate (Pos. 970, Kindle)</span><sup data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">.</span></sup></p><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">This is one of the most important topics for Franjo. The German doctor strongly critics Simpson’s recommendations for his patients to avoid conventional treatments, because chemo and radio therapies both cause heavy damage.</span></p><span data-dcnode-id="950" instrument_node="">
</span><p data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Though – replies Franjo – while nobody knows the success rate of this oil, due to the poor volume of feedback. The effectiveness of standard therapies is widely accepted by the medical community, showing so far, a success rate at around 55%.</span></p><span data-dcnode-id="947" instrument_node="">
</span><p data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">In addition, Franjo also wants to highlight the great possibilities coming from a combination of cannabinoids and conventional therapies, instead of only relying on cannabis.</span></p><span data-dcnode-id="944" instrument_node="">
</span><h2 data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Conclusions</span></h2><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">At the end of the letter, Franjo want to clarify that the fact that Simpson presents erroneous data, by not understanding the basis of chemical, physiology and medicine, is not what he holds against Rick. However, even if one doesn’t need to know all the details, this is a question of life and death, and it is clear that he is not living up to his responsibility and therefore his own aspiration”.</span></p><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="935"><em data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">“This is about the wellbeing of individuals who turn to us. They have a right to the best possible and most recent information, as well the best possible advice. When it comes to medical treatment, especially when confronted with serious illness, it is not enough to treat patients by relying on good intentions and vehemently presenting a conviction.</span></em></p><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="926"><em data-dcnode-id="929"><span data-dcnode-id="933" instrument_node="">I am convinced that your reputation among supporters would improve if you were able to revise and update your advice. I am convinced that cannabis and cannabinoid therapies are of value in the treatment of cancer. Let us address their potential with great care and consciousness!”</span><sup data-dcnode-id="931"><span data-dcnode-id="932" instrument_node=""> 6</span></sup><span data-dcnode-id="930" instrument_node="">.</span></em><strong data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">&nbsp;&nbsp; </span></strong></p><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="920"><span data-dcnode-id="924" instrument_node="">Criticisms shown by Franjo are completely shared by the whole medical team at </span><strong data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Kalapa Clinic</span></strong><span data-dcnode-id="921" instrument_node="">. Due to different morphologies and physiological functions involved in cancer, the “curative” effect of cannabinoids remains in poor knowledge. Even though, there is a complete support for conventional treatments, such as radio and chemo therapy, as well as for the medical use of cannabinoids as an adjuvant therapy.</span></p><span data-dcnode-id="919" instrument_node="">
</span><div data-dcnode-id="915"><strong data-dcnode-id="916"><em data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Did you like the post? Give us some feedback! This post has been done based on existent research to the date of publication of the article. Due to the increase in studies based on medical cannabis, the information provided can vary over time and we’ll keep informing in further writings.</span></em></strong></div><span data-dcnode-id="914" instrument_node="">
