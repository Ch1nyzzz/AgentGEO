</span></div></div><article class="post-[id] podcast type-podcast status-publish entry effect8" data-dcnode-id="473" itemscope="" itemtype="http://schema.org/CreativeWork"><header class="entry-header" data-dcnode-id="676"><h2 class="entry-title" data-dcnode-id="677" itemprop="headline" style="display:none;"><a data-dcnode-id="678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learntruehealth.com/how-to-prevent-cancer/" rel="bookmark"><span data-dcnode-id="679" instrument_node="">141: How To Prevent Cancer?</span></a></h2></header><div class="entry-content" data-dcnode-id="475" itemprop="text"><p data-dcnode-id="675"></p><h2 data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">How to Prevent Cancer Naturally</span></h2><p data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">I have a very impactful and mind-blowing interview for you today on how to prevent cancer and how to beat cancer.</span></p><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">I sat down with Valerie Warwick, who is a nurse and has been a nurse oncologist for over 17 years wherein she started to see how people cure their cancer naturally.</span></p><p data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">Eventually, she quit her job and focused on methods on how to beat cancer and how to prevent cancer naturally.</span></p><p data-dcnode-id="662"><span data-dcnode-id="666" instrument_node="">Warwick and I also talked about “The Truth About Cancer” documentary series, and she is from that documentary. If you’d like to watch that series on how to prevent cancer and how to beat cancer, please go to </span><a data-dcnode-id="664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.learntruehealth.com/cancer"><span data-dcnode-id="665" instrument_node="">www.learntruehealth.com/cancer</span></a><span data-dcnode-id="663" instrument_node="">, and it is free for you to watch.</span></p><h3 data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Dealing With Cancer In The Past</span></h3><p data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">When Warwick was growing up, her mom and grandmother were both a nurse. So it felt like a natural progression for her to go into nursing. When I was in my 20s, Warwick’s mother had multiple sclerosis, and her father has throat cancer.</span></p><p data-dcnode-id="657"></p><center data-dcnode-id="653"><img alt="how to prevent cancer" class="alignnone size-medium wp-image-8831 lazyloaded" data-dcnode-id="656" data-lazy-sizes="(max-width: 600px) 100vw, 600px" data-lazy-src="https://i2.wp.com/learntruehealth.com/wp-content/uploads/how-to-prevent-cancer-600x339.png?resize=600%2C339" data-lazy-srcset="https://i1.wp.com/www.learntruehealth.com/wp-content/uploads/how-to-prevent-cancer.png?w=600&amp;ssl=1 600w, https://i1.wp.com/www.learntruehealth.com/wp-content/uploads/how-to-prevent-cancer.png?w=240&amp;ssl=1 240w, https://i1.wp.com/www.learntruehealth.com/wp-content/uploads/how-to-prevent-cancer.png?w=673&amp;ssl=1 673w" data-recalc-dims="1" data-was-processed="true" height="339" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i2.wp.com/learntruehealth.com/wp-content/uploads/how-to-prevent-cancer-600x339.png%3Fresize%3D600%252C339&amp;raw" srcset="https://i1.wp.com/www.learntruehealth.com/wp-content/uploads/how-to-prevent-cancer.png?w=600&amp;ssl=1 600w, https://i1.wp.com/www.learntruehealth.com/wp-content/uploads/how-to-prevent-cancer.png?w=240&amp;ssl=1 240w, https://i1.wp.com/www.learntruehealth.com/wp-content/uploads/how-to-prevent-cancer.png?w=673&amp;ssl=1 673w" width="600"><noscript data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">&lt;img class="alignnone size-medium wp-image-8831" src="https://i2.wp.com/learntruehealth.com/wp-content/uploads/how-to-prevent-cancer-600x339.png?resize=600%2C339" alt="how to prevent cancer" width="600" height="339" srcset="https://i1.wp.com/www.learntruehealth.com/wp-content/uploads/how-to-prevent-cancer.png?w=600&amp;amp;ssl=1 600w, https://i1.wp.com/www.learntruehealth.com/wp-content/uploads/how-to-prevent-cancer.png?w=240&amp;amp;ssl=1 240w, https://i1.wp.com/www.learntruehealth.com/wp-content/uploads/how-to-prevent-cancer.png?w=673&amp;amp;ssl=1 673w" sizes="(max-width: 600px) 100vw, 600px" data-recalc-dims="1" /&gt;</span></noscript></center><p data-dcnode-id="652"></p><p data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Warwick took care of her parents for a long time and eventually went to nursing school. That led her into oncology. I got a lot of experiences on how to prevent cancer and how to beat cancer in the allopathic world for 17 years.</span></p><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">When Warwick’s friend was diagnosed with stage 4 colon cancer, she knew the traditional treatments would not work on her friend. So that propelled Warwick to start doing research.</span></p><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">First it started with diet, and eventually, Warwick learned about alternative treatments on how to prevent cancer and how to beat the cancer that was working for people.</span></p><h3 data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Understanding Cancer</span></h3><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">The more Warwick learned about integrative oncology; she didn’t see people as sick patients because of cancer. But she saw them as someone who has been wiped out by chemotherapy.</span></p><p data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">One day, Warwick met two people in different interactions. They both cured their cancer with cannabis oil in four months, and they did not change their diet.</span></p><p data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">When we have cancer, we need to build a team around us with members who are experienced, knowledgeable and can support us to navigate our treatment. Do not stop in one opinion.</span></p><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">In 2009 Warwick ‘s focus began to change after experiencing her health challenges. Using whole food nutrition, and the principles and practices of Functional and Orthomolecular Medicine, Warwick realized a change in her health as she did the same practices into her own life.</span></p><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">Warwick also realized that treating cancer by suppressing symptoms and the body’s immune system never brought healing to anyone.</span></p><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Warwick realized that micronutrient deficiencies and toxins are the most widespread and dangerous health condition in this generation. Hence, we need to remove the burden of toxins and restore the immune system through nutrients, movement, real – nutrient dense food, sunlight, water, oxygen, spiritual awareness and the joy of healthy loving relationships.</span></p><h3 data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Cannabis Oil</span></h3><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Warwick says there are different ways to use cannabis. The oil extract can be used orally or rectally. And it can be used topically. So if you have a skin condition, you can use cannabis oil directly on the skin.</span></p><p data-dcnode-id="627"></p><center data-dcnode-id="623"><img alt="how to prevent cancer" class="alignnone size-medium wp-image-8832 lazyloaded" data-dcnode-id="626" data-lazy-sizes="(max-width: 600px) 100vw, 600px" data-lazy-src="https://i2.wp.com/learntruehealth.com/wp-content/uploads/how-to-prevent-cancer-1-600x363.png?resize=600%2C363" data-lazy-srcset="https://i1.wp.com/www.learntruehealth.com/wp-content/uploads/how-to-prevent-cancer-1.png?w=600&amp;ssl=1 600w, https://i1.wp.com/www.learntruehealth.com/wp-content/uploads/how-to-prevent-cancer-1.png?w=240&amp;ssl=1 240w, https://i1.wp.com/www.learntruehealth.com/wp-content/uploads/how-to-prevent-cancer-1.png?w=712&amp;ssl=1 712w" data-recalc-dims="1" data-was-processed="true" height="363" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i2.wp.com/learntruehealth.com/wp-content/uploads/how-to-prevent-cancer-1-600x363.png%3Fresize%3D600%252C363&amp;raw" srcset="https://i1.wp.com/www.learntruehealth.com/wp-content/uploads/how-to-prevent-cancer-1.png?w=600&amp;ssl=1 600w, https://i1.wp.com/www.learntruehealth.com/wp-content/uploads/how-to-prevent-cancer-1.png?w=240&amp;ssl=1 240w, https://i1.wp.com/www.learntruehealth.com/wp-content/uploads/how-to-prevent-cancer-1.png?w=712&amp;ssl=1 712w" width="600"><noscript data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">&lt;img class="alignnone size-medium wp-image-8832" src="https://i2.wp.com/learntruehealth.com/wp-content/uploads/how-to-prevent-cancer-1-600x363.png?resize=600%2C363" alt="how to prevent cancer" width="600" height="363" srcset="https://i1.wp.com/www.learntruehealth.com/wp-content/uploads/how-to-prevent-cancer-1.png?w=600&amp;amp;ssl=1 600w, https://i1.wp.com/www.learntruehealth.com/wp-content/uploads/how-to-prevent-cancer-1.png?w=240&amp;amp;ssl=1 240w, https://i1.wp.com/www.learntruehealth.com/wp-content/uploads/how-to-prevent-cancer-1.png?w=712&amp;amp;ssl=1 712w" sizes="(max-width: 600px) 100vw, 600px" data-recalc-dims="1" /&gt;</span></noscript></center><p data-dcnode-id="622"></p><p data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">There are different strains–Cannabis Sativa and Cannabis Indicia. The Sativa is more stimulating, and the Indicia is more sedating.</span></p><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">“You can use the high THC strains to help sleep well at night. It keeps your blood levels more consistent,” explains Warwick. “When you take them rectally as a suppository, it bypasses the first phase of the liver breakdown. And you’re able to take a higher dose.”</span></p><p data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Warwick also says there was a child who had an inoperable brain tumor. Cannabis is excellent for brain tumors because it doesn’t cause swelling. It causes cancer cells to die cleanly.</span></p><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">I lost my mom to cancer when I was 22 years old. So I made it my life’s mission to help people learn about all these natural remedies on how to prevent cancer and how to beat cancer.</span></p><h3 data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Testing For Cancer</span></h3><p data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">“A lot of people don’t realize that there’s testing that you can get, that will help guide the practitioner and you to know which substance to focus on,” said Warwick. “From the testing, you can formulate a treatment plan. No two cancers are the same.”</span></p><p data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">This comes down to what cancer is. Is it a gene-disease? Or a disease of genetics? Or is it because of environmental toxins?</span></p><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">But if the disease is genetic, wouldn’t the new generation get healthier? Because the weaker people die off and the stronger genes get passed on. So why are we getting sicker especially in the past 50 years?</span></p><p data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">“The cancers we see today are the result of environmental toxins and poor nutrition. It’s an environmental disease and disease of lifestyle,” Warwick said.</span></p><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Warwick also says that if you’re looking for answers through genetics manipulation like allopathic medicine is, you’re looking in the wrong direction. If you deprive cells of oxygen, the cells change metabolism.</span></p><p data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Our body is so resilient, such that it can survive despite the chemotherapy. It is so powerful and can heal. We need to adopt that mindset.</span></p><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">“Radiation makes cancer cells more aggressive. Because radiation doesn’t kill the stem cells,” Warwick reveals. “Not all cancer cells have the ability to form a tumor. There are also studies right now saying repeated mammograms cause cancer.”</span></p><p data-dcnode-id="597"></p><center data-dcnode-id="593"><img alt="how to prevent cancer" class="alignnone size-medium wp-image-8833 lazyloaded" data-dcnode-id="596" data-lazy-sizes="(max-width: 600px) 100vw, 600px" data-lazy-src="https://i0.wp.com/learntruehealth.com/wp-content/uploads/how-to-prevent-cancer1-600x300.jpg?resize=600%2C300" data-lazy-srcset="https://i1.wp.com/www.learntruehealth.com/wp-content/uploads/how-to-prevent-cancer1.jpg?w=600&amp;ssl=1 600w, https://i1.wp.com/www.learntruehealth.com/wp-content/uploads/how-to-prevent-cancer1.jpg?w=240&amp;ssl=1 240w, https://i1.wp.com/www.learntruehealth.com/wp-content/uploads/how-to-prevent-cancer1.jpg?w=768&amp;ssl=1 768w, https://i1.wp.com/www.learntruehealth.com/wp-content/uploads/how-to-prevent-cancer1.jpg?w=909&amp;ssl=1 909w" data-recalc-dims="1" data-was-processed="true" height="300" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/learntruehealth.com/wp-content/uploads/how-to-prevent-cancer1-600x300.jpg%3Fresize%3D600%252C300&amp;raw" srcset="https://i1.wp.com/www.learntruehealth.com/wp-content/uploads/how-to-prevent-cancer1.jpg?w=600&amp;ssl=1 600w, https://i1.wp.com/www.learntruehealth.com/wp-content/uploads/how-to-prevent-cancer1.jpg?w=240&amp;ssl=1 240w, https://i1.wp.com/www.learntruehealth.com/wp-content/uploads/how-to-prevent-cancer1.jpg?w=768&amp;ssl=1 768w, https://i1.wp.com/www.learntruehealth.com/wp-content/uploads/how-to-prevent-cancer1.jpg?w=909&amp;ssl=1 909w" width="600"><noscript data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">&lt;img class="alignnone size-medium wp-image-8833" src="https://i0.wp.com/learntruehealth.com/wp-content/uploads/how-to-prevent-cancer1-600x300.jpg?resize=600%2C300" alt="how to prevent cancer" width="600" height="300" srcset="https://i1.wp.com/www.learntruehealth.com/wp-content/uploads/how-to-prevent-cancer1.jpg?w=600&amp;amp;ssl=1 600w, https://i1.wp.com/www.learntruehealth.com/wp-content/uploads/how-to-prevent-cancer1.jpg?w=240&amp;amp;ssl=1 240w, https://i1.wp.com/www.learntruehealth.com/wp-content/uploads/how-to-prevent-cancer1.jpg?w=768&amp;amp;ssl=1 768w, https://i1.wp.com/www.learntruehealth.com/wp-content/uploads/how-to-prevent-cancer1.jpg?w=909&amp;amp;ssl=1 909w" sizes="(max-width: 600px) 100vw, 600px" data-recalc-dims="1" /&gt;</span></noscript></center><p data-dcnode-id="592"></p><h3 data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">Thermogram Option</span></h3><p data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Warwick says that a better option is a thermogram. It detects heat and inflammation in the body, giving us more time on figuring out how to prevent cancer and how to beat cancer.</span></p><p data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Thermograms can be used for the abdomen, as well as the jaw and neck. That’s a great tool, used along with a simple test called oncoblot. This test will detect 28 types of cancers early, 8 to 10 years before they develop.</span></p><p data-dcnode-id="583"><strong data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Tips for Prevention</span></strong></p><p data-dcnode-id="575"><span data-dcnode-id="582" instrument_node="">• Take vitamins like vitamin C</span><br data-dcnode-id="581"><span data-dcnode-id="580" instrument_node=""> • Eat more vegetables</span><br data-dcnode-id="579"><span data-dcnode-id="578" instrument_node=""> • Take supplements</span><br data-dcnode-id="577"><span data-dcnode-id="576" instrument_node=""> • Take a good dose of Omega 3 product</span></p><h3 data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">My Wellness Tutor</span></h3><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Warwick’s specialization is chronic disease prevention and health management. She also educates her clients on how to influence specific genes and how they are expressed. You may refer to her website for various services.</span></p><p data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">She explains that all of us are born with a particular genetic code, and we can influence the expression of those genes by turning them on or off using environmental influences.</span></p><p data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">A combination of moderate exercise, improved nutrition, stress management techniques and increased social support can turn on or off over 500 gene expressions in a matter of a few months.</span></p><p data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Valerie graduated with her nursing degree in 1997. Her nursing career led her into Oncology where she spent 17 years in direct patient care, in both the inpatient and outpatient setting. During that time Valerie obtained her certification as an Oncology Nurse Specialist and developed a strong clinical background in all aspects of patient care.</span></p><h3 data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Get Connected With Valerie Warwick!</span></h3><p data-dcnode-id="558"><span data-dcnode-id="559" style="text-decoration: underline;"><strong data-dc
