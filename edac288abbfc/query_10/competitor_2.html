</span><p data-dcnode-id="4405"></p><h2 data-dcnode-id="4403"><span data-dcnode-id="4404" instrument_node="">What is Prostate Cancer?</span></h2><span data-dcnode-id="4402" instrument_node="">
</span><p data-dcnode-id="4400"><span data-dcnode-id="4401" instrument_node="">Prostate cancer is the single most common form of cancer among men in the United States. Problematically, symptoms of prostate cancer are nearly invisible early on, which can give the cancer time to advance and become metastatic, which is why regular prostate exams are recommended for all men over 40 years of age (rectal exam and/or PSA test).</span></p><span data-dcnode-id="4399" instrument_node="">
</span><p data-dcnode-id="4397"><span data-dcnode-id="4398" instrument_node="">As with all cancers, prostate cancer is an uncontrolled growth of cells, in this case among the cells of the prostate gland. This is a gland that is associated with urination and male reproduction (women do not have a prostate) and encircles the urethra as it exits the bladder. As the prostatic tumor's mass increases, it can begin to restrict the space around the urethra, making urination more difficult. Other prostatic cancer symptoms include erectile dysfunction, painful ejaculation, and blood in the urine.</span></p><span data-dcnode-id="4396" instrument_node="">
</span><div data-dcnode-id="4391" id="943725766"><span data-dcnode-id="4395" instrument_node="">
</span><span data-dcnode-id="4392" instrument_node="">
</span></div><p data-dcnode-id="4389"><span data-dcnode-id="4390" instrument_node="">After lung cancer, prostate cancer is the second leading cause of cancer death among men. However, survival rates are improving and surgical techniques are multiplying and advancing.</span></p><span data-dcnode-id="4388" instrument_node="">
</span><h2 data-dcnode-id="4386"><span data-dcnode-id="4387" instrument_node="">Natural Therapy and Natural Remedies</span></h2><span data-dcnode-id="4385" instrument_node="">
</span><p data-dcnode-id="4383"><span data-dcnode-id="4384" instrument_node="">A low-fat or vegetarian anti-cancer diet is important for prostate cancer treatment as well as natural hormone therapy.&nbsp; Valuable natural remedies for prostate cancer include cayenne pepper capsules, corn silk tea, pumpkin seeds, and saw palmetto. </span></p></div><span data-dcnode-id="4381" instrument_node="">

Posted by Gavin (Manganui, Northland, New Zealand) on 12/28/2011</span><br data-dcnode-id="4078"><span data-dcnode-id="4077" instrument_node="">
</span></span><span data-dcnode-id="4075" instrument_node="">
</span><br data-dcnode-id="4074"><span data-dcnode-id="4073" instrument_node=""> </span><p data-dcnode-id="4071"><span data-dcnode-id="4072" instrument_node="">
If you maintain your ph at 7 that will stop the cancer, the cancer cells don't divide at a ph of 7. If you can maintain a PH of 8.5 for a few days at the ph over 7 the cells start to die off. Using Baking soda and a sugar carrier like molasses. You have to get some litmus strips to measure your ph. And be prepared for some side effects like headaches and loose bowels. Mix two tabelspoons of baking soda, thats soda not powder! In a cup of water in a pan stir till it clears then add a tablespoon of molasses. Let it cool and then drink it down. Build it up to three a day untill the ph is 8 or above. </span></p><span data-dcnode-id="4070" instrument_node="">
</span><p data-dcnode-id="4068"><span data-dcnode-id="4069" instrument_node="">Mild headaches nausea and yellow stools might be the side effects that show up when the cancer is being excreated. This regime dropped a bloggers psa from 25 to 1 who had advanced prostate cancer that had metasisised to his bones.. The mri scan showed no bone cancer, after he was diagnosed as terminal before the regime by two doctors. After one regime of this soda treatment. But as always its up to you to decide and do your own reasearch.</span></p><span data-dcnode-id="4067" instrument_node="">

I was diagnosed with prostate cancer 11 years ago. After my PSA climbed higher the DR. sent me for radiation treatment to burn it out. I backed out and told them I just wanted to monitor my condition and give my body a chance to heal its self. The Dr. said it was slow growing and it would be o.k. for a while. My PSA checked high, a 8 or 9, and every Dr. I went to, wanted to remove it. I changed my diet, took vitamins, juiced and tried to eat very healthy. The Dr. gave me shots to lower my testosterone, which made me feel like I was slowly dying. I lost muscle, gained fat, couldn't think very well, felt lousy all the time. When I went back for my next visit, I refused to take the shot, regardless of what could happen.</span></p><span data-dcnode-id="3711" instrument_node="">
</span><p data-dcnode-id="3709"><span data-dcnode-id="3710" instrument_node="">Don't do let them do a biopsy when ever they want to either. If it is cancer it will get larger, they can measure your prostate fairly easy. And guess what,, I still have my prostate and I am now clear of prostate cancer, my Dr. says to just forget I ever had it.</span></p><span data-dcnode-id="3708" instrument_node="">

My name is Charles. I was diagnosed and treated with IMRT Radiation in 2012 for Prostate Cancer. In January (about) 2016 my PSA began to increase. Long story short ,I went to a Natural Practitioner as I read years before about hi dose pro-oxidative Vitamin C and began the treatment. I was already on a diet and he added organic foods. I read about Baking Soda and ACV in the dose of 1/8 tsp and 2 tsp but I don't add water. I do it on an empty stomach as the first thing then followed by other vitamins for absorption. My wife is saying I should not do this long term but I don't see a problem. Has it helped me? Too hard to say with all the prayers and other supplements and juice I take. It is a full time job to keep up my health. I feel fine and thank Jesus every day for that. I think at times I should have done this instead of radiation but it's too late now. Hope this is some data you might use. God Bless you all!</span></p><span data-dcnode-id="3208" instrument_node="">

John Curry claims to have reverse prostate cancer with bicarbonate. I have been searching for evidence that bicarbonate works but beyond these 2 individuals it seems anecdotal. I tried baking soda, the last 2 days at high dosage I.e. 6 tsp. Then I measured my PSA. Unfortunately within these 8 days it went from 5 to 6. My guess is that it may work with some people but not for all . The best way is to try it and measure your PSA before and after. If your PSA hasn't gone down, I would question continuing with bicarbonate.</span></p><span data-dcnode-id="1867" instrument_node="">
</span><p data-dcnode-id="1865"><span data-dcnode-id="1866" instrument_node="">I have been able to delay biopsy for about 3 years using many of the methodologies that people talk about here I.e. diet, eliminating meat, dairy etc, taking supplements. Unfortunately, cancer is smarter than this. It works for some people but only for a while. Then for some lucky ones it works for a very long time. Thus the secret for most is to find what works and try to change different protocols, with an eye toward delaying the inevitable. I would love to hear about other peoples protocols as well as if anyone can confirm that bicarbonate has worked for them (I mean for longer that a few months)</span></p><span data-dcnode-id="1864" instrument_node="">

</span><br data-dcnode-id="1146"><span data-dcnode-id="1145" instrument_node=""> </span><p data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">
I personally visited Dr. Johanna Budwig in Germany in the year 2000. She passed away in 2003 at the age of 95 from a fall. Dr. Budwig was nominated 7 times for the Nobel Prize Dr. Budwig had over a 90% success rate with this protocol with all kinds of cancer patients over a 50 year period. Dr. Budwig worked with many patients who were terminally ill and some who had only hours to live. Dr. Budwig explained in her books that her healing plan works on improving the cells of the body. It doesn't matter where the cancer cells are located or what name if given to your cancer because the Budwig program gives cells what is needed in order for them to normalize in their functioning process. Her approach successfully treated the cause of all types of cancer, such as breast cancer, lung cancer, brain cancer, prostate cancer, Bone cancer, Carcinoma, bladder cancer, cervical cancer, esophageal cancer, stomach cancer, Leukemia, Hodgkin's disease, skin cancer, etc., and other common serious illnesses such as such as Arthritis, Asthma, Fibromyalgia, Diabetes, Blood Pressure, Multiple sclerosis, Heart Disease, Psoriasis, Eczema, Acne, and so on. She used a unique formula of cold pressed flaxseed oil and low fat cottage cheese with a little honey. Many people of heard of Dr. Budwig and may even have tried to follow her recipe. However unfortunately there is a lot of misinformation on her protocol on the Internet and if it is not followed exactly as she discovered and explained in her research the results could be very disappointing. As I obtained copies of all her research and have shared it with many others todate I would be happy to share her exact formula with any who request it on this forum. I often write about Dr. Budwigs formula for a local English Newspaper here in Southern Spain.</span></p><span data-dcnode-id="1142" instrument_node="">

</span><img align="baseline" alt="5 out of 5 stars" data-dcnode-id="1072" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/images/stars/5.png&amp;raw" title="5 out of 5 stars"><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node=""> </span></p><p data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">
How I Reduced My PSA Level by over 50% without Prescription Drugs: From November 1998 to early November 1999, my PSA level climbed from 1.7 to 5.1, and a month later jumped to 6.15. My doctor made an appointment with a urologist, who said that my prostate was slightly enlarged and scheduled me for a biopsy to test for prostate cancer in early December 1999. During my discussion with the urologist, he indicated that there was considerable research that showed a high correlation between consumption of red meat and that of cancer, in general, including prostate cancer. </span></p><span data-dcnode-id="1067" instrument_node="">
</span><p data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">In the meantime, I became aware of the work of Dr. Johanna Budwig, a German biochemist and Nobel prize nominee, who did extensive research in the benefits of flaxseed oil combined with sulphurated protein in the diet. She helped many seriously ill individuals, who had been given up as terminal, to regain their health. The program that she used was flaxseed oil blended with quark, the German form of cottage cheese. </span></p><span data-dcnode-id="1064" instrument_node="">
</span><p data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">In early December 1999, I began a program of flaxseed oil and low fat cottage cheese. Specifically, in the morning, I took five doses, each consisting of two 1,000 mg softgels of flaxseed oil with one teaspoon of low fat cottage cheese. I repeated this in the evening, so that my total daily dosage was twenty softgels of flaxseed oil and ten teaspoons of low fat cottage cheese. In the one year since I began this program, my PSA level has dropped from 6.15 to 2.4. I have now reduced my total daily dosage to two softgels of flaxseed oil and one teaspoon of low fat cottage cheese.</span></p><span data-dcnode-id="1061" instrument_node="">
</span><p data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">The source for the flaxseed oil that I used is Nature's Distributors, Inc., phone number 1-800-624-7114, or on the internet at www.naturesdistributors.com. This company often sells many of their products at a 2 for 1 price. If you call them, ask about their new Vita-Flax product, which is available in 1 lb. containers. This product is not only more economical, but it also replaces both the flaxseed oil AND the cottage cheese. It is also claimed to be superior in many ways to the flaxseed oil, since it is lower in fat and is rich in soluble fiber and also contains lignans, which reportedly have significant anti-cancer properties. </span></p><span data-dcnode-id="1058" instrument_node="">
</span><p data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">CONCLUSION: In my case, I was able to reduce my PSA level by over 50% without surgery or prescription drugs. The only change that I made besides the program described above is that I reduced my intake of red meat in favor of fish and poultry.</span></p><span data-dcnode-id="1055" instrument_node="">
