</span><div data-dcnode-id="3494" id="intro"><span data-dcnode-id="3567" instrument_node="">
</span><p data-dcnode-id="3565"><span data-dcnode-id="3566" instrument_node="">Whether you’ve just been diagnosed with bone cancer or have been dealing with the diagnosis for some time now, you likely have encountered a number of different suggestions for treatment. With such a myriad of different opinions, it can be difficult to determine the best plan for yourself. Following a plan that involves medical supervision paired with complementary treatment options, such as strontium, magnesium, omega-3, and even acupuncture can help.</span></p><span data-dcnode-id="3564" instrument_node="">
</span><h2 data-dcnode-id="3562"><span data-dcnode-id="3563" instrument_node="">What Is Bone Cancer?</span></h2><span data-dcnode-id="3561" instrument_node="">
</span><p data-dcnode-id="3559"><span data-dcnode-id="3560" instrument_node="">Mayo Clinic defines bone cancer as an uncommon cancer that first forms in your bones. The condition may begin in any bone in your body, but it most often affects the long bones of your arms and legs. It does not include cancer that begins elsewhere in your body and then spreads to the bone but only that which begins in your bones. Common symptoms include bone pain, swelling or tenderness, broken bones, fatigue, and unintended weight loss.</span></p><span data-dcnode-id="3558" instrument_node="">
</span><h2 data-dcnode-id="3556"><span data-dcnode-id="3557" instrument_node="">What Are the Best Natural Treatment Options for Bone Cancer?</span></h2><span data-dcnode-id="3555" instrument_node="">
</span><p data-dcnode-id="3553"><span data-dcnode-id="3554" instrument_node="">Treating bone cancer is especially difficult, which is why it is important to explore all of your options for treatment. Each of our suggested natural treatments is intended to be used in conjunction with regular medical treatment to garner the biggest benefit. Several medical professionals suggest treating bone cancer with vitamins and nutrients like calcium, strontium, magnesium, and omega-3 as well as using acupuncture and massage to cope with symptoms.</span></p><span data-dcnode-id="3552" instrument_node="">
</span><h3 data-dcnode-id="3550"><span data-dcnode-id="3551" instrument_node="">1. Calcium</span></h3><span data-dcnode-id="3549" instrument_node="">
</span><p data-dcnode-id="3547"><span data-dcnode-id="3548" instrument_node="">The American Cancer Society suggests that calcium is an effective nutritional supplement for preventing and treating bone deterioration. Calcium supplements are part of a balanced diet that also help reduce your risk for certain types of cancer. The recommended dietary allowance (RDA) is 1,000 milligrams for an adult aged 19 to 50, which you can get from a supplement as well as a nutritional diet.</span></p><span data-dcnode-id="3546" instrument_node="">
</span><h3 data-dcnode-id="3544"><span data-dcnode-id="3545" instrument_node="">2. Strontium</span></h3><span data-dcnode-id="3543" instrument_node="">
</span><p data-dcnode-id="3541"><span data-dcnode-id="3542" instrument_node="">According to an article written by a member of the Independent Cancer Research Foundation, strontium is one of the most important nutrients to take in addition to calcium. This nutrient helps your body convert calcium into its most useful form to aid in preserving healthy bone. You can take strontium in a capsule form as well.</span></p><span data-dcnode-id="3540" instrument_node="">
</span><h3 data-dcnode-id="3538"><span data-dcnode-id="3539" instrument_node="">3. Magnesium</span></h3><span data-dcnode-id="3537" instrument_node="">
</span><div data-dcnode-id="3532" id="943725766"><span data-dcnode-id="3536" instrument_node="">
</span><span data-dcnode-id="3533" instrument_node="">
</span></div><p data-dcnode-id="3530"><span data-dcnode-id="3531" instrument_node="">Magnesium is another mineral suggested by the Independent Cancer Research Foundation. Magnesium is another option that helps your body better utilize calcium and promotes bone health. You can often find this treatment in an individual supplement or in conjunction with calcium.</span></p><span data-dcnode-id="3529" instrument_node="">
</span><h3 data-dcnode-id="3527"><span data-dcnode-id="3528" instrument_node="">4. Omega-3</span></h3><span data-dcnode-id="3526" instrument_node="">
</span><p data-dcnode-id="3495"><span data-dcnode-id="3525" instrument_node="">Among other things, omega-3 helps prevent deterioration of your bones, which serves as an important treatment option for bone cancer. You can find omega-3 supplements like fish oil, or simply try to incorporate more omega-3 fats in your diet via healthy oils and food sources.</span><br data-dcnode-id="3524"><span data-dcnode-id="3523" instrument_node="">
</span><br data-dcnode-id="3522"><span data-dcnode-id="3521" instrument_node="">
The American Cancer Society supports other complementary treatments such as acupuncture, massage, and vitamin C supplementation, but you can also find other reader-contributed suggestions by reading on below.</span><br data-dcnode-id="3520"><span data-dcnode-id="3519" instrument_node="">

NOV. 29, 2013 : APPLE CIDAR VINEGAR TO TREAT CANCER.</span></p><span data-dcnode-id="3416" instrument_node="">
</span><p data-dcnode-id="3414"><span data-dcnode-id="3415" instrument_node="">Thank you all for the information you posted here on the Earth Clinic on the CURE OF CANCER WITH APPLE CIDER VINEGAR. Apart from one woman who wrote, that her husband took two teaspoons every night for one week and got better, and now takes one teaspoon at night once a week, nobody gave any dosage or how to take the ACV for healing to take place.</span></p><span data-dcnode-id="3413" instrument_node="">
</span><p data-dcnode-id="3411"><span data-dcnode-id="3412" instrument_node="">Please, when you put something out here, give us the whole informatiom: the dosage to take, how many times a day (before or after meal ) and for how long (although this depends on individual cases).</span></p><span data-dcnode-id="3410" instrument_node="">
</span><p data-dcnode-id="3408"><span data-dcnode-id="3409" instrument_node="">Somebody posted this: Sun Chlorella, and medicinal mushrooms (Shutaki, reshi and mitake, cordyceps) for natural cancer treatment without side effects. This information does not help us because it is incomplete. Are these used combined or individually and at what dosage? When you post an information like this, you are not helping anybody. We come to this site to look for help, because we are in need. If you just throw out an information that is not complete, you are not helping anybody.</span></p><span data-dcnode-id="3407" instrument_node="">
</span><p data-dcnode-id="3405"><span data-dcnode-id="3406" instrument_node="">I have started using ACV two teaspoons at night. Somebody should tell me if this is alright and also for how long. I am treating bone marrow cancer with chemo therapy. The cancer produces much toxins and the kidneys are unable to excrete them. So, I am also going through dialysis to help the kidneys eliminate the toxins. Somebody out there, please tell me if you have had or you know somebody who has had an experience with bone marrow cancer. I am eager to read your posts, because I seriously need help.</span></p><span data-dcnode-id="3404" instrument_node="">
</span><p data-dcnode-id="3402"><span data-dcnode-id="3403" instrument_node="">Thank you and God bless.</span></p><span data-dcnode-id="3401" instrument_node="">

Broken-hearted: The Chlorella and Shitake Mushrooms are consider medicinal foods and it's not really a big deal about dosage like it is w/ pharm meds; simply take them w/ your meals or as directed on the labels. All supplements are labeled w/ "suggested use". Also, to help your bone marrow and the toxicity issues take NAC as directed plus Astragalus herb as directed. The Astragalus will raise your body temp about two degrees so be sure to not do too much.</span></p><span data-dcnode-id="3284" instrument_node=""> </span><p data-dcnode-id="3282"><span data-dcnode-id="3283" instrument_node="">There are many suggestions for therapy but what you want to achieve mostly is maximizing your nutrition levels and the single best way to do this is take a very good multivitamin/mineral w/ whole foods and digestive enzymes; the more ingredients the better. This helps your body detox and improves health on every level. Juicing veggies is also recommended. NADH is recommended (20mg daily) to reduce the toxicity of chemo (works great w/ the NAC) as well as increasing cell energy.</span></p><span data-dcnode-id="3281" instrument_node=""> </span><p data-dcnode-id="3279"><span data-dcnode-id="3280" instrument_node="">Back to juicing, do read and try the Asparagus/Beet fast. Protein is critical for health in times like you're in so do consider a high quality undenatured whey protein w/ added Branch Chain Amino Acids.</span></p><span data-dcnode-id="3278" instrument_node=""> </span><p data-dcnode-id="3276"><span data-dcnode-id="3277" instrument_node="">Extra Vit-E in the form of Tocotreinols will help overall cell protection plus empower the lifespan of the red blood or erythrocytes.</span></p><span data-dcnode-id="3275" instrument_node=""> </span><p data-dcnode-id="3273"><span data-dcnode-id="3274" instrument_node="">All these suggestion will help you and maybe considerably, so do take heart and try and be positive. There are many good and caring folks here on E.C. that will help you on your journey, so do keep us updated.</span></p><span data-dcnode-id="3272" instrument_node="">

I ordered from essiacproducts.com (located in Canada). They offer capsules, powder, and extract. The owner is so helpful and called me directly to discuss my needs and go over instructions on how much to take and how to take it. I do have the tea here, but don't care for it, so it's hard to drink it every day. I went online looking for capsule options. I questioned the owner about how a capsule can compare to a carefully brewed tea. He said they brew the tea, boil it down, and package the ‘grounds' in the capsule. And gave this analogy - “Imagine if you ate flour, sugar, and eggs and expected it to be equivalent to a baked cake. We make the ‘cake' according to the recipe and put it in the capsule.”</span></p><span data-dcnode-id="3011" instrument_node="">

My hubby had bone cancer 23years ago. he refused chemo. I told the doctor to trick him. I told the doctor to say you need fluids and then antibiotics. Instead his doctor gave him chemo, but my hubby figured it out too quick and refused treatment. They only gave him a year. A cousin was treating a dog with tremors with Essiac tea. I felt the tremors. The were gone in a month. I gave the tea to my hubby. Snuck it in anything I could. I put it in his coffee, his tea, his food. Now I know this dilutes the tea.... But it worked. He went into remission. Then he had a motorcycle accident and crushed his leg and foot. About 1 year later his cancer was back. We don't know but we think the bad bone marrow was put back into his system. Don't know... But I gave him the tea.... Now the doctor is calling hospice and the VA is telling us he is in stage 3 bone cancer... I was at my wits end. The tea did its job and he is in remission again. Now the VA wants to know what I gave him. All he would tell them is a tea... But its funny now the FDA has pulled the tea from the US Market from what I hear. Anyway if you have cancer and you want to live drink the tea is all I have to say.</span></p><span data-dcnode-id="2965" instrument_node="">

I encourage you to read up on the Budwig Protocol and follow it to the letter. It's an anti-cancer diet with a long track record of curing the various forms of cancer. The diet is not difficult to follow (such as avoiding sugar and eating raw vegetables), and it is combined with a simple-to-make compound of flaxseed oil emulsified with sulphur using common cottage cheese. As I understand it, this sulphurated omega-3 combo invigorates your attack cells in the blood and ramps up your body's ability to heal itself. The protocol is low cost, too. I personally know of three acquaintances who used this protocol to rid themselves of cancer -- one had been 'given-up on' and sent home to die. Supposedly had only three-weeks to live. I recently heard that he is alive today, 4-years later.</span></p><span data-dcnode-id="2637" instrument_node="">

I was diagnosed with Stage 4 secondary bone cancer in Dec 2013.. I took 12 months of Zometa treatments and a hormone blocker pill all of 2014. In 2015 I made the decision to try natural alternatives. Essiac Tea was part of my daily routine until the last year when I stopped taking it regularly. I did well until the last month and now the dr is suggesting I take Zometa treatemets again, plus radiation, plus hormone blocker since my original cancer was breast cancer. I do not want chemo or radiation if I can avoid it at all. I will increase my essaic tea and turmeric but wondering if there might be other natural treatments that some of you had used successfully.</span></p><span data-dcnode-id="2244" instrument_node="">

My relative was diagnosed with Multiple Myeloma (which is a form of bone marrow and blood cancer). She began taking two Grapefruit Seed Extract supplements a day, and drinking two green teas a day. The green teas were plain, with nothing else added to them. Her cancer regressed when she did that, and now she does not have it anymore. She had done nothing else differently aside from that, so I attribute it to that. So yes, I would say that the Grapefruit Seed Extract definitely helps, at least in her case, as well as green tea. You can by the GSE for about $9 a bottle on Amazon, and she just used plain ol' Lipton green tea bags. Hope this helps someone.</span></p><span data-dcnode-id="2142" instrument_node="">

Dear Ted, thank you so much for this web and your advice, I have found a lot of info here. But, I am little bit confused what to do first (sugar, I know) and what not to do/eat. I got osteosarcoma diagnose 2 month before. I refused operation and I started with urina fasting 21days, then 1 week raw food (unfortunatelly including fruits), then mms1+mms2 for 19days and now Budwig diet. I am 27 years old. Yesterday a got new results, surprisingly(at least for me) very bad. The femoral bone is very week and with every movement I risk broken neck in my hip. Maybe there is some connection with hard eczema and corticoids last year (now ok, no medicaments). I have some questions I am trying to get lysine, is it possible use dmso with smth. Else (afraid of odor in flat), is very bad add black currant to Budwig cottage? how to strengthen bones - can I use crushed egg shells to get calcium? could help vit. C infusion or oral use is enough? thank you very much! Greetings from Central Europe. Alena</span></p><span data-dcnode-id="1848" instrument_node="">

You have to boost your immune system. One way is to take large dose of crushed garlic (2/3 bulbs for 1/2 liter) in a jus of carrots or tomatoes -you are supposed to sip it through the day if not you will vomit.</span></p><span data-dcnode-id="1793" instrument_node="">
</span><p data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">Eating vegetables will reduce the amount of energy to process the food so energy will be available to fight the cancer.</span></p><span data-dcnode-id="1790" instrument_node="">
</span><p data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">You have also to clean your blood -drink 2 cups of stinging nettle, 4 cups of yarrow (the yarrow stimulates stem cells creation) and 2 cups calendula tea each day. To three of the tea cups add one tablespoon of Swedish Bitter and drink half cup one hour before each meal and half cup 1/2 hour after it. For each cup of boiling water use a heaped teaspoon of plant -fresh plants are the best- infuse the plants for 4 minutes max.</span></p><span data-dcnode-id="1787" instrument_node="">
</span><p data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">Also massage your body in the region of the cancer with a mixture of yarrow tincture and Swdish Bitter (equal parts) multiples time a day.</span></p><span data-dcnode-id="1784" instrument_node="">
</span><p data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">For the calcium you can use cleaned egg shell that you grind and soak in lemon juice for a few days in the fridge -you have to filter out impurities before you start taking the resulted mix -1 tablespoon a day.</span></p><span data-dcnode-id="1781" instrument_node="">

Hi Everyone. . . As promised, here is a further update on my friend's cancer and what we are doing about it. There has been much confusion by the doctors on how it started -- But I believe that it wasn't lymphoma but was originally a bone cancer that started on his backbone and spread to his lymph glands causing secondary lymphoma cancer. After he had had a few 'expensive' X-ray pictures taken of his body and further radiation therapy, my friend was simply given aspirin and Panadol and sent on his way home by the doctor's in Hong Kong. Such Hippocratic dedication is truly disappointing. It is notable, regarding cancer and metastasis, that the medical fraternity has nothing whatsoever in its meager medical arsenal that can defeat any cancer once it has metastased and spread virally. The exact figures(which took some finding believe me) for cancers being cured 5 years after metastasis and even after remission are about 2-3%. They simply have no drugs or procedures that can cope with cancer metastasis. Other symptoms that I also had to take careful account of were my cancer friend's other problems. The doctor's told him that he had had about ten tiny heart attacks or strokes in his head, causing loss of feeling, drooping, loss of motor use on one side of his body for short periods. I have incorporated certain other things into the therapy to help his heart -- not least being the megadose Lysine/Vitamin C which, according to Linus Pauling's exact same therapy, should clear his heart problems gently but quickly over time. Also, one of the side-effects of the Panadol has been constipation. Anyway, the purpose of this post is simply to broadcast exactly what I'm doing to help stop and defeat these post-metastased cancers(4 of them, on his ribs, near the backbone) in my friend's body. I have to admit that my friend with cancer was unable to purchase either Azoxystrobin or BHT in Hong kong, so I had to adapt, relying now only on high dose Lysine, Vitamin C(Ascorbate form) and Protease Enzymes for the main assault on the cancer and Essiac tablets which provide the Tannic Acid to decloak the cancer, halt cancer growth, prevent angiogenesis etc. To this effect, and to help other people, I have written up a daily protocol(which my cancer friend is following now) in simple table format and I have put it in a shared folder on Google Docs that anyone can have a look at. Here is the link:</span></p><p data-dcnode-id="1651"><a data-dcnode-id="1654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//docs.google.com/leaf%3Fid%3D0B8GpBF_xWPFYYTk0MGRlOGMtNjA2Yy00NmZjLTg1NjMtOGFmOTMzODNjZGNl%26hl%3Den_GB"><span data-dcnode-id="1656" instrument_node="">Bill's Daily Cancer Protocol Schedule</span><br data-dcnode-id="1655"></a><br data-dcnode-id="1653"><span data-dcnode-id="1652" instrument_node="">Or</span></p><p data-dcnode-id="1648"><a data-dcnode-id="1649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//docs.google.com/leaf%3Fid%3D0B8GpBF_xWPFYYTk0MGRlOGMtNjA2Yy00NmZjLTg1NjMtOGFmOTMzODNjZGNl%26hl%3Den_GB"><span data-dcnode-id="1650" instrument_node="">https://docs.google.com/leaf?id=0B8GpBF_xWPFYYTk0MGRlOGMtNjA2Yy00NmZjLTg1NjMtOGFmOTMzODNjZGNl&amp;hl=en_GB</span></a></p><span data-dcnode-id="1647" instrument_node="">
</span><p data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">And just to be clear, ALL the protocols that I use in this therapy are based on Ted from Bangkok's protocols. I must also add a huge thanks to Ted from Bangkok who has so generously and patiently answered every question that I have asked him through emails. The only deviation from his therapy is the Essiac tablets -- since I couldn't get the Tannic Acid -- so Ellagic acid will have to do. I will only have 3 weeks before my friend goes back to the expensive Hong Kong doctors, so this is why the protocol I've used is quite aggressive. After we discussed the protocol last Friday, my cancer friend started just the Lysine and Vitamin C megadoses yesterday and today he is laid up in bed with a slight fever, which I am happy about -- this means his immune system now actually sees and is fighting the cancer. His liver seems to be coping well because he still has a healthy appetite. But I am prepared to give protease enzymes, hydrochloric acid drops and Vitamin B100 if his appetite begins to slide. The Daily Protocol that my friend is using will change once he comes out of the Herx or cancer die-off reaction. I will be further increasing both the Lysine and Protease Enzyme doses, which is necessary to particularly defeat the bone cancer. If anyone wants to know more about this daily protocol schedule, I'll be glad to answer any questions on this ongoing remedy on EC, since this is all about passing on knowledge after all. I have also decided to keeping a daily journal of all symptoms, events, changes and remedies used and will eventually be putting this up on my Google Docs Shared Items. I will also update here on my friend's cancer status regularly. Be well.</span></p><span data-dcnode-id="1644" instrument_node="">

I am happy to be one of the many supporters of your efforts to heal your good friend. He's in the best of hands. I have learned much from your posts, and appreciate greatly the information and experience you have offered to us all. In the case of your good friend's protocol, I am offering a caveat that may not or may apply to his situation. ( I bring this up because I caused a regression in my own situation. ) Many of the compounds that we use contain Chlorides. (HCL, MgCl, Lysine and other amino acids, B complex, et al. ) Several months ago, I increased compounds with these acids and began to have increased pain associated with my conditions. I was confused about the why of it, but realized it when I examined a recent blood test. (sometimes they can present clues to people like me, with suppressed instincts). My chlorides were high normal, and my Co2, (indicates also oxygen and bicarbonates), was also high normal. I guessed that I had been over-supplementing with acidic compounds. This may not be true to your protocol, but in the interest of balance and healing, I introduce this possibility. Thank you, I hope for you both, the greatest success. Connie</span></p><span data-dcnode-id="1471" instrument_node="">

ans-serif;"><span data-dcnode-id="1264" instrument_node=""> </span></span></i></a><span data-dcnode-id="1260" instrument_node=""> </span><a class="followlink" data-dcnode-id="1256" href="#"><i class="fa fa-eye" data-dcnode-id="1259" data-toggle="tooltip" title="Follow this thread in your account"></i><span data-dcnode-id="1258" instrument_node=""> </span><span data-dcnode-id="1257"></span></a><span data-dcnode-id="1255" instrument_node=""> </span><a data-dcnode-id="1251" href="#" onclick="flagPost('725', '160695', 'Ted\'s Remedies', 'Feedback');return false;"><i class="fa fa-flag red" data-dcnode-id="1254" data-toggle="tooltip" title="Report this post"></i><span data-dcnode-id="1253" instrument_node=""> </span><span data-dcnode-id="1252"></span></a><span data-dcnode-id="1250" instrument_node=""> </span></div><div class="hidlink" data-dcnode-id="1248" style="display: table-cell; text-align:right;"></div></div><span data-dcnode-id="1246" instrument_node=""> </span></div><span data-dcnode-id="1244" instrument_node="">

</span><p data-dcnode-id="1223"><span data-dcnode-id="1228" instrument_node="">
Hi Jorge...The man I helped several years ago initially had a melanoma which eventually metastasized to his ribs and lymph. He was in stage 3 or 4 when he asked me for help. After the 11th day on my protocol, he was no longer bed-ridden and he was up and about and improving. Unfortunately, he suddenly flew to Hong Kong on the 12th day (no longer taking the protocol) to see his sons and daughters who all wanted him to take the chemo again. Three days after he left for Hong Kong I received notification by email from his family telling me that he had died. He had the chemo and it was too much for him.</span><br data-dcnode-id="1227"><span data-dcnode-id="1226" instrument_node="">
</span><br data-dcnode-id="1225"><span data-dcnode-id="1224" instrument_node="">
Regarding your son's bone cancer, the same rules always apply and these are:</span></p><span data-dcnode-id="1222" instrument_node="">
</span><p data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">*Thoroughly Oxygenate the the cells of the body</span></p><span data-dcnode-id="1219" instrument_node="">
</span><p data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">*Revive and boost the immune system to help fight the cancer</span></p><span data-dcnode-id="1216" instrument_node="">
</span><p data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">*Kill any organisms involved in aiding the cancer</span></p><span data-dcnode-id="1213" instrument_node="">
</span><p data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">* Improve the diet -- no sugar, fats or carbohydrates.</span></p><span data-dcnode-id="1210" instrument_node="">
</span><p data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">*Kill the cancer cells themselves.</span></p><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">I won't be recommending any of the herbs I used in the above case because they are local Filipino herbs and would be difficult to obtain. So what I shall relate here is mostly Ted from Bangkok's cure for bone cancer plus one or two other suggestions as well.</span></p><span data-dcnode-id="1204" instrument_node="">
</span><p data-dcnode-id="1197"><em data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">Lysine</span></em><span data-dcnode-id="1201" instrument_node=""> is supplemented at 1000mgs once every hour for four four hours in the morning and four times in the evening. You can also mix in 500 mgs(1/8 tspn) </span><em data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">vitamin C</span></em><span data-dcnode-id="1198" instrument_node=""> with this as well. Take them together with water and away from meals. So take this protocol 8 times a day. This will raise up your immune system and help to stop the cancer from spreading.</span></p><span data-dcnode-id="1196" instrument_node="">
</span><p data-dcnode-id="1188"><span data-dcnode-id="1195" instrument_node="">Take the </span><em data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Beta-Glucan</span></em><span data-dcnode-id="1192" instrument_node=""> twice a day. Get the powder form and mix it with the lysine and water etc for ease and convenience. The dose is half a teaspoon or 2000mgs twice a day. The </span><em data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">Beta Glucan</span></em><span data-dcnode-id="1189" instrument_node=""> helps the immune T-cells to recognize the cancer and ultimately to kill it.</span></p><span data-dcnode-id="1187" instrument_node="">
</span><p data-dcnode-id="1182"><span data-dcnode-id="1186" instrument_node="">To help oxygenate the cells, take one to three capfuls of </span><em data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">3% hydrogen peroxide</span></em><span data-dcnode-id="1183" instrument_node=""> in a liter of water. Drink one liter of this per day. This will help to reduce the pain as well as help to thoroughly oxygenate the body.</span></p><span data-dcnode-id="1181" instrument_node="">
</span><p data-dcnode-id="1170"><span data-dcnode-id="1180" instrument_node="">Supplement </span><em data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">chromium picolinate</span></em><span data-dcnode-id="1177" instrument_node=""> at 1000 mcg twice a day. This lowers the blood sugar and so helps to stop the growth and spread of the cancer. I would also add either </span><em data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Gymnema sylvestre tea</span></em><span data-dcnode-id="1174" instrument_node=""> or </span><em data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Chanca piedra tea</span></em><span data-dcnode-id="1171" instrument_node=""> to the protocol.This will help also to reduce blood pressure, reduce blood sugar and will help prevent heavy, sticky blood and also helps avoid heart problems.</span></p><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">Take niacin at 100 mgs three times a day with meals. This also helps to unclump the blood safely. Take the niacin with Lugols iodine or SSKI(Saturated Solution of Potassium Iodide) -- five drops taken with a glass of water will help the pain.</span></p><span data-dcnode-id="1166" instrument_node="">
</span><p data-dcnode-id="1149"><span data-dcnode-id="1165" instrument_node="">Lastly, once a day topically use </span><em data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">DMSO(Dimethyl Sulfoxide)</span></em><span data-dcnode-id="1162" instrument_node=""> on its own in a 70% solution over the area of the bone cancer. After it has been absorbed into the skin then just rub some aloe vera oil over the area to prevent skin irritation. The </span><em data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">DMSO</span></em><span data-dcnode-id="1159" instrument_node=""> helps to revert and differentiate cancer back to normal cells. If you wish to greatly enhance the </span><em data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">DMSO</span></em><span data-dcnode-id="1156" instrument_node=""> -- you can also optionally add a 1% solution of Gallium Nitrate in a 50-50 mix with the DMSO. The gallium nitrate acts like a trojan horse that will only kill cancer cells, not healthy cells. You can purchase a 14% solution of </span><em data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">Gallium Nitrate</span></em><span data-dcnode-id="1153" instrument_node=""> from </span><a data-dcnode-id="1151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//galliumnitrate.com/" target="_blank"><span data-dcnode-id="1152" instrument_node="">here</span></a><span data-dcnode-id="1150" instrument_node="">.</span></p><span data-dcnode-id="1148" instrument_node="">
</span><p data-dcnode-id="1140"><span data-dcnode-id="1147" instrument_node="">I would further take </span><em data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Selenium, Milk Thistle</span></em><span data-dcnode-id="1144" instrument_node=""> and </span><em data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">acetyl cysteine</span></em><span data-dcnode-id="1141" instrument_node=""> at regular dosages to help the liver and kidneys get rid of the cancer poisons safely.</span></p><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1132"><span data-dcnode-id="1138" instrument_node="">If there is any difficulty with appetite and your son cannot eat then double or quadruple dauly dosages of protease enzymes with pancreatin must be given with all meals together with </span><em data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">Betaine HCL</span></em><span data-dcnode-id="1135" instrument_node=""> and </span><em data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">B50 Complex. </span></em></p><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Perhaps the most important of all the information that I've given you up top is to keep your son's blood sugar below 90 mgs/decL. If you can achieve that every day then the cancer's growth and spread will be stopped in its tracks and you will have all the time in the world to kill the cancer itself.</span></p><span data-dcnode-id="1128" instrument_node="">

If I may add a few suggestions to Bill's great advice. Oxygenating the body is very difficult during a condition of acidosis (which is in all cases of cancer). So, the first step prior to H2O2 supplementation is alkalizing. Alkalizing alone can kill cancer and increases oxygen levels significantly by itself, so oxygen therapy will always work best fallowing alkalizing.</span></p><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Oral remedies for alkalizing are not suited for extreme cases like advanced cancer, so the best method is whole body hot baths with 1/4 cup Epsom Salt and 1/4 cup Borax daily until significant relief then slowly taper down. Hot Baths also are great for general detoxing as sweating removes toxins. Massaging the sore &amp; infected lymph glands during the bath will help much. Hot Baths also have a shocking effect on the entire body which acts as a kinda "reset" especially for the immune system. Lingering long in our modern comfort zones with all the impurities is like a stage for cancer to set up shop. The Borax has significant potential in cancer cases especially bone because Borax kills mycoplasma infections which are commonly found in joints &amp; bones. Borax will also mineralize the bones with Boron. Magnesium Sulfate is also a great alkalizer but also boost detoxification.</span></p><span data-dcnode-id="1012" instrument_node="">
</span><p data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">One more very important fact in the cancer treatment process is the need for Systemic Enzymes like Nattokinase or Serrapeptase, especially in bone diseases involving infections or cancer as these enzymes burst through protective barriers called Biofilms so the treatments can get inside the actual cancer cells. Bill has informed us well on the situation.</span></p><span data-dcnode-id="1009" instrument_node="">
</span><p data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">More on minerals and cancer, Potassium is disruptive to cancer and is also alkalizing. Potassium Gluconate will be taken up readily by the cancer cells hungry for glucose; take 1 90 mg tablet per day. Potassium Iodide should be used; Cesium Chloride is effective against cancer as it is a potent alkalizer.</span></p><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">More on minerals as they are particular to bone health. Probably the single greatest threat to bones is radioactive Strontium aka Strontium 90 which has been released into the environment from nuclear bombs, nuclear fallout or meltdown like Chernobyl and Fukushima. The greatest concentration of radioactive Strontium is in cows milk thus infecting all dairy foods in general and cheese especially. I have found oral administration of Strontium Citrate next to nothing compared to Powdered Strontium Carbonate taken one spoon in hot bath; and for maximum effect take 2 capsules of Sarsaparilla herb.</span></p><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">I feel apologetic going on about with minerals but there is even another significant fact in this case. From the readers end this information may not seem very important so I must elucidate more. The case of cancer is a case of acidity and acidity is a case of mineral loss. In a condition of chronic acidosis the bones leach out minerals like Boron, Manganese, Magnesium, Phosphorus, and most important Calcium. To replace the Calcium deficiency the bones will readily take up Strontium 90 from dairy foods. So if this situation is not addressed, IMHO the likelihood for reversing the cancer progress is very slim.</span></p><span data-dcnode-id="1000" instrument_node="">

Hi John... That request of yours took me back some -- that was a few years ago for sure. And I'm sorry to here about your mother-in-law.</span></p><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">I had to dig into my notes from that time to help get the exact facts. I managed to find the daily protocol that I used which is here:</span></p><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="866"><a data-dcnode-id="867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//docs.google.com/document/d/1GXMgcaMGAqf6M-XYN68GSMyFG4pf_beSYsc9IosDBNo/edit" target="_blank"><span data-dcnode-id="868" instrument_node="">Ted's Cancer Protocol</span></a></p><span data-dcnode-id="865" instrument_node="">
</span><p data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">I also used a Filipino herb called Makabuhay (Tinospora cordifolia) mixed equally with Chanca piedra or Sampa-sampalukan as a decoction twice a day (this form is stronger than a tea). Both of these herbs grow profusely all over the lowlands in the Philippines. So you can get these for free or you can also buy them in the herbal markets. I used both these herbs as anti-virals and anti-fungals and as a help to reduce sugar in the body. This is very important for people with cancer. If you can reduce the sugar and stop the cancer growing then it cannot spread, which gives you more time to get rid of it.</span></p><span data-dcnode-id="862" instrument_node="">
</span><p data-dcnode-id="854"><span data-dcnode-id="861" instrument_node="">Makabuhay is a vine that looks like </span><a data-dcnode-id="859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.stuartxchange.com/Makabuhay.html" target="_blank"><span data-dcnode-id="860" instrument_node="">this</span></a><span data-dcnode-id="858" instrument_node="">. And Samapa-sampalukan looks like </span><a data-dcnode-id="856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.stuartxchange.com/SampaSampalukan.html" target="_blank"><span data-dcnode-id="857" instrument_node="">this</span></a><span data-dcnode-id="855" instrument_node="">.</span></p><span data-dcnode-id="853" instrument_node="">
</span><p data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">The short list of nutrients that I used in the protocol is shown here:</span></p><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="845"><span data-dcnode-id="849" instrument_node="">* </span><strong data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">Lysine</span></strong><span data-dcnode-id="846" instrument_node=""> -- kills the cancer stops metastasis and lifts up the immune system</span></p><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="839"><span data-dcnode-id="843" instrument_node="">*</span><strong data-dcnode-id="841"><span data-dcnode-id="842" instrument_node=""> Threonine</span></strong><span data-dcnode-id="840" instrument_node=""> -- kills the cancer raises the immune system</span></p><span data-dcnode-id="838" instrument_node="">
</span><p data-dcnode-id="833"><span data-dcnode-id="837" instrument_node="">* </span><strong data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Green Tea or Green Tea Extract</span></strong><span data-dcnode-id="834" instrument_node=""> -- stops cancer growth and stops metastasis or spread.</span></p><span data-dcnode-id="832" instrument_node="">
</span><p data-dcnode-id="824"><span data-dcnode-id="831" instrument_node="">* </span><strong data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Vitamin</span></strong><span data-dcnode-id="828" instrument_node=""> </span><strong data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">C</span></strong><span data-dcnode-id="825" instrument_node="">-- helps to kill the cancer and raises the immune response to cancer</span></p><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="818"><span data-dcnode-id="822" instrument_node="">*</span><strong data-dcnode-id="820"><span data-dcnode-id="821" instrument_node=""> Beta Glucan</span></strong><span data-dcnode-id="819" instrument_node=""> -- kills the cancer and rapidly improves immune system defense.</span></p><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="812"><span data-dcnode-id="816" instrument_node="">*</span><strong data-dcnode-id="814"><span data-dcnode-id="815" instrument_node=""> Acetyl Cysteine</span></strong><span data-dcnode-id="813" instrument_node="">(very important) -- Reduces sugar metabolism in the body and starves the cancer of glucose, further halting cancer growth and spread. Needed to produce glutathione which helps to protect the lungs and liver.</span></p><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="810" instrument_node="">* </span><strong data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Lugols Iodine(optional but advised)</span></strong><span data-dcnode-id="807" instrument_node=""> -- Kills cancer, gives energy, reduces pain, boosts immune system.</span></p><span data-dcnode-id="805" instrument_node="">

</span><p data-dcnode-id="762"><span data-dcnode-id="766" instrument_node="">It would also benefit your mother-in-law if she drank a tea made from the Pink Perwinkle(Catharanthus roseus) or Sitchirika plant(also called Amnias, Atay-bia or Kantotan in different locales in the Philippines). The plant looks like </span><a data-dcnode-id="764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.stuartxchange.com/Tsitsirika.html" target="_blank"><span data-dcnode-id="765" instrument_node="">this</span></a><span data-dcnode-id="763" instrument_node="">. It grows all over the place in the lowlands and at the roadsides and is very common. I'm sure you must know this plant. Make a tea using four or five small leaves. Twice a day. This one is strongly anti-cancer. This plant is the source of natural vincamine, an alkaloid which was used in the 1950s as the basis to develop the chemical model for the patented Vinca drugs -- vincristine and vinblastine -- that are still being used in cancer chemo today. But whereas the patented chemo form is dangerous and debilitating for patients, the natural periwinkle tea form is as safe as houses and free.</span></p><span data-dcnode-id="761" instrument_node="">
