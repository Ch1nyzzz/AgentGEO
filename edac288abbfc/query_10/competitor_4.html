</span><li data-dcnode-id="1763" style="font-weight: 400;"><span data-dcnode-id="1764" instrument_node="">During the 17th century, apricot seeds were popularly used to treat ulcers and swellings. The English settlers brought apricot to the New World.</span></li><span data-dcnode-id="1762" instrument_node="">
</span><li data-dcnode-id="1757" style="font-weight: 400;"><span data-dcnode-id="1761" instrument_node="">The Egyptians also used apricots(</span><a data-dcnode-id="1759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/25416253" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1760" instrument_node="">1</span></a><span data-dcnode-id="1758" instrument_node="">). They used it to make a delicious drink named Amar al-dīn which had different healing powers.</span></li><span data-dcnode-id="1756" instrument_node="">
</span><li data-dcnode-id="1754" style="font-weight: 400;"><span data-dcnode-id="1755" instrument_node="">The apricot is a member of the rose family. It is a close relative of almonds as well.</span></li><span data-dcnode-id="1753" instrument_node="">

9/07/Apricot-Seeds..jpg?resize=740%2C490&amp;amp;ssl=1 740w, https://i1.wp.com/howtocure.com/wp-content/uploads/2019/07/Apricot-Seeds..jpg?resize=400%2C265&amp;amp;ssl=1 400w, https://i1.wp.com/howtocure.com/wp-content/uploads/2019/07/Apricot-Seeds..jpg?resize=73%2C48&amp;amp;ssl=1 73w" sizes="(max-width: 1000px) 100vw, 1000px" data-recalc-dims="1" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="1741" id="caption-attachment-37256"><span data-dcnode-id="1742" instrument_node="">Image:ShutterStock</span></figcaption></figure><span data-dcnode-id="1739" instrument_node="">
</span><p data-dcnode-id="1734"><span data-dcnode-id="1738" instrument_node="">Apricot seeds for cancer are considered to be effective in treating cancer. Scientists have found that apricot seeds contain a compound known as amygdaline. When put to clinical tests, it was found that it helps to curb the carcinogenic cells from spreading in the body. It also helps to eradicate tumors and suppress cancer(</span><a data-dcnode-id="1736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK9963/" rel="noopener nofollow noreferrer" target="_blank"><span data-dcnode-id="1737" instrument_node="">2</span></a><span data-dcnode-id="1735" instrument_node="">) symptoms.</span></p><span data-dcnode-id="1733" instrument_node="">
</span><p data-dcnode-id="1727" style="text-align: right;"><span data-dcnode-id="1732" instrument_node="">[Also Read: </span><a data-dcnode-id="1729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtocure.com/alternative-treatments-for-cancer/" rel="noopener noreferrer"><strong data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">Alternative Treatment for Cancer</span></strong></a><span data-dcnode-id="1728" instrument_node="">]
</span></p><p data-dcnode-id="1723"><span data-dcnode-id="1726" instrument_node="">According to a study in 2005, it was found that amygdalin usually inhibits genes which lead to cell proliferation. A few years back in 2012, laboratory tests showed that amygdaline infused with β-D-glycosidase is useful for </span><a data-dcnode-id="1724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtocure.com/therapies-curing-liver-cancer/" rel="noopener noreferrer"><span data-dcnode-id="1725" instrument_node="">liver cancer.</span></a></p><span data-dcnode-id="1722" instrument_node="">
</span><p data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">Another theory suggests that sometimes cancer is caused because of the lack of vitamins in the body. Amygdaline has a huge amount of Vitamin B17. This, in turn, helps to replenish the vitamin requirement in the body and strengthens the metabolic system. Therefore, the metabolism becomes much stronger to fight cancer.</span></p><span data-dcnode-id="1719" instrument_node="">

</span><p data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">Apricot seeds can be really beneficial for the body but at the same time, it can be harmful as well. Therefore you need to make sure that you consume it the right way. Have a look at these different ways to take apricot seeds.</span></p><span data-dcnode-id="1700" instrument_node="">
</span><ul data-dcnode-id="1692"><span data-dcnode-id="1699" instrument_node="">
</span><li data-dcnode-id="1697" style="font-weight: 400;"><span data-dcnode-id="1698" instrument_node="">Slice an apricot and take the seed out from the fruit. Now crush the seed with a nutcracker. Inside this nut, you will find lots of apricot seeds. That is what you will need to consume.</span></li><span data-dcnode-id="1696" instrument_node="">
</span><li data-dcnode-id="1694" style="font-weight: 400;"><span data-dcnode-id="1695" instrument_node="">Now you can eat the seeds just like that or you can choose to grind it in a mixer. Then mix this powdered seeds with water or milk and drink it.</span></li><span data-dcnode-id="1693" instrument_node="">
</span></ul><span data-dcnode-id="1691" instrument_node="">
</span><p data-dcnode-id="1685" style="text-align: right;"><span data-dcnode-id="1690" instrument_node="">[Also Read: </span><strong data-dcnode-id="1687"><a data-dcnode-id="1688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtocure.com/essential-oils-for-cancer/" rel="noopener noreferrer"><span data-dcnode-id="1689" instrument_node="">Essential Oils for Cancer Treatment</span></a></strong><span data-dcnode-id="1686" instrument_node="">]
</span></p><h2 data-dcnode-id="1683" id="RightDosage"><span data-dcnode-id="1684" instrument_node="">What Is the Right Dosage of Apricot Seeds?</span></h2><span data-dcnode-id="1682" instrument_node="">
</span><p data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">Remember that you should never consume more than 3 small apricot seeds per day if you are an adult. For children, the dosage should be half the seed per day and not more than that. Always consult a doctor before consuming apricot seeds; especially if you want to give it to your children.</span></p><div class="code-block code-block-2" data-dcnode-id="1669" style="margin: 8px auto 8px 0; text-align: left; display: block; clear: both;"><span data-dcnode-id="1679" instrument_node="">
</span><div data-dcnode-id="1670"><span data-dcnode-id="1678" instrument_node="">
</span><span data-dcnode-id="1676" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-6889236817594999" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="2635233943" data-dcnode-id="1675" style="display:block; text-align:center;"></ins><span data-dcnode-id="1674" instrument_node="">
</span><span data-dcnode-id="1671" instrument_node="">
</span></div></div><span data-dcnode-id="1668" instrument_node="">
</span><p data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">There have been several cases of illness among people who consumed too much apricot seeds. Apricot seeds for cancer can be effective in a way but too much of it releases high levels of toxins. This can result in various side effects on the human body. So these are the important tips about the right dosage for apricot seeds.</span></p><span data-dcnode-id="1665" instrument_node="">
</span><p data-dcnode-id="1660" style="text-align: right;"><span data-dcnode-id="1664" instrument_node="">[ Read: </span><strong data-dcnode-id="1661"><a data-dcnode-id="1662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtocure.com/cancer/" rel="noopener noreferrer"><span data-dcnode-id="1663" instrument_node="">Natural Ways To Cure Cancer]</span></a></strong></p><span data-dcnode-id="1659" instrument_node="">

</span></div><p data-dcnode-id="1625"></p><span data-dcnode-id="1624" instrument_node="">
</span><h4 data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">1. How Do Apricot Seeds Cure Cancer?</span></h4><span data-dcnode-id="1621" instrument_node="">
</span><p data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">Ans. Apricot seeds contain a very essential compound named as amygdaline. This compound helps to promote the incubation of Vitamin B17 and helps to heal damaged cells. Apricot seeds also suppress the effects of carcinogens.</span></p><span data-dcnode-id="1618" instrument_node="">
</span><h4 data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">2. Why Is Vitamin b17 Illegal?</span></h4><span data-dcnode-id="1615" instrument_node="">
</span><p data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">Ans. Amygdaline is a highly toxic compound which may or may not treat cancer effectively. Thus many governments have put a ban on the sale of B17. Overdose of this compound can result in serious illness or even death.</span></p><span data-dcnode-id="1612" instrument_node="">
[Also Read: ]
</span><h4 data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">3. Are Apricot Seeds Toxic?</span></h4><span data-dcnode-id="1609" instrument_node="">
</span><p data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">Ans. Yes. Apricot seeds are toxic in nature but if taken in regulated amounts then it is absolutely safe. However, if one consumes too much of these seeds then there will be too much of toxicity in the body. The compound amygdaline is toxic in nature and therefore too much of it is not good.</span></p><div class="code-block code-block-3" data-dcnode-id="1596" style="margin: 8px auto 8px 0; text-align: left; display: block; clear: both;"><span data-dcnode-id="1606" instrument_node="">
</span><div data-dcnode-id="1597"><span data-dcnode-id="1605" instrument_node="">

</span><span data-dcnode-id="1598" instrument_node="">
</span></div></div><span data-dcnode-id="1595" instrument_node="">
</span><h4 data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">4. Are Bitter Apricot Kernels Safe to Eat?</span></h4><span data-dcnode-id="1592" instrument_node="">
</span><p data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">Ans. Many medical experts consider that eating apricot seeds over time can lead to cyanide poisoning. But if you use them moderately at regulated compounds, then it will not be as dangerous as it seems.</span></p><span data-dcnode-id="1589" instrument_node="">
</span><p data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">Apricot seeds for cancer can be a safe alternative in the coming years. It still needs to be properly observed and researched. A few cases over the years where people have lost their life due to an overdose of apricot seeds have surfaced. Therefore, if you are planning to use these seeds for fighting cancer then it is better that you wait and see what scientists find out.</span></p><span data-dcnode-id="1586" instrument_node="">
