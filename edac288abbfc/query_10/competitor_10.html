</span><h1 class="entry-title" data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Alternative cancer treatments that also shrink tumors</span></h1><span data-dcnode-id="956" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="927"><span data-dcnode-id="955" instrument_node="">

</span><div class="entry-inner-content" data-dcnode-id="451"><span data-dcnode-id="925" instrument_node="">
</span><h4 data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">IMPORTANT NOTE:</span></h4><span data-dcnode-id="922" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="921" instrument_node="">There is a special article on dealing with dangerous tumors, such as tumors inside the lungs, brain tumors, etc. You should read both this article and the article on dangerous tumors before you decide on a plan of action. The plan will generally be driven by how dangerous the tumor is. Here is a link to the article on dangerous tumors:</span><b data-dcnode-id="917"><br data-dcnode-id="920"><a data-dcnode-id="918" href="#dangerous-tumors"><span data-dcnode-id="919" instrument_node="">Article on Dangerous Tumors</span></a></b></p><span data-dcnode-id="915" instrument_node="">
</span><h4 data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">How important is shrinking tumors?</span></h4><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">While there are some suggested alternative cancer treatments that may shrink tumors, the focus on alternative cancer treatments is generally on targeting and killing cancer cells, or reverting cancer cells into becoming normal cells. Shrinking tumors is generally secondary to alternative cancer treatments. But again, in some cases the tumor is life-threatening.</span></p><span data-dcnode-id="909" instrument_node="">
</span><p data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">For example, in some cases the tumor is pressing on a vital organ, causing pain, obstructing the flow of fluids, or for some other reason needs to be eliminated from the body. If the problem is life-threatening the solution is frequently solved with surgery because of the urgency of the situation.</span></p><span data-dcnode-id="906" instrument_node="">
</span><p data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">It is important to understand that there is no alternative cancer treatment that is guaranteed to shrink tumors significantly in a short amount of time. Tumors are very complex and there is nothing that will work every time.</span></p><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">When the size of a tumor is critical, it can be assumed you do not want to swell the tumor any more than it has already swollen. Most alternative cancer treatments will cause a tumor to swell temporarily, then it may start to shrink.</span></p><span data-dcnode-id="900" instrument_node="">
</span><h4 data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Cellect-Budwig (major protocol)</span></h4><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="889"><span data-dcnode-id="896" instrument_node="">The </span><a data-dcnode-id="894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancertutor.com/cellect_budwig/" title="Cellect-Budwig Protocol A Stage IV Cancer Treatment"><span data-dcnode-id="895" instrument_node="">Cellect-Budwig Protocol</span></a><span data-dcnode-id="893" instrument_node=""> contains the </span><a data-dcnode-id="891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancertutor.com/budwig/" title="The Budwig Diet Cottage Cheese and Flaxseed Oil"><span data-dcnode-id="892" instrument_node="">Budwig Diet</span></a><span data-dcnode-id="890" instrument_node="">, which consists of converting oil soluble omega 3 into water-soluble omega 3. This treatment is also part of the Bill Henderson Protocol, which will be mentioned in a moment.</span></p><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="883"><span data-dcnode-id="887" instrument_node="">Dr. Johanna Budwig claimed that tumors were created specifically because of a lack of electron-rich molecules on the surface of cell walls. In addition to the Budwig Diet, it is suggested the product Cellect can also shrink tumors. The Budwig Diet and Cellect have been said to be synergistic. Cellect contains, among many other products, </span><a class="pretty-link-keyword" data-dcnode-id="885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancertutor.com/recommends/SharkCartilage" rel="nofollow" target="_blank" title="Shark Cartilage"><span data-dcnode-id="886" instrument_node="">shark cartilage</span></a><span data-dcnode-id="884" instrument_node="">, which has been used in the hopes of shrinking tumors in the past.</span></p><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="877"><span data-dcnode-id="881" instrument_node="">Another part of the Cellect-Budwig protocol is </span><a class="pretty-link-keyword" data-dcnode-id="879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancertutor.com/recommends/BestJuicers" rel="nofollow" target="_blank" title="Best Juicers"><span data-dcnode-id="880" instrument_node="">vegetable juicing</span></a><span data-dcnode-id="878" instrument_node="">. Heavy vegetable juicing, especially carrot juice with a little beet juice, cabbage juice, broccoli juice and other anti-cancer juices, are suggested to help shrink tumors.</span></p><span data-dcnode-id="876" instrument_node="">
</span><h4 data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">Beta-1, 3D Glucan</span></h4><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="868"><span data-dcnode-id="872" instrument_node="">Your body's immune system is responsible for identifying </span><strong data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">metastasis</span></strong><span data-dcnode-id="869" instrument_node=""> [the spread of cancer cells] and growing tumors. A fully functional, healthy immune response is, generally, not strong enough to stop cancer from metastasizing. This is where Beta Glucan thrives.</span></p><span data-dcnode-id="867" instrument_node="">
</span><ul data-dcnode-id="861"><li data-dcnode-id="862"><em data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">“In one study, oral Beta-1,3D Glucan administered alone reduced tumor weight by nearly half … when used in conjunction with a monoclonal antibody, the average tumor weight shrank by more than 80 percent.”</span></em><br data-dcnode-id="864"><span data-dcnode-id="863" instrument_node="">– Gordon Ross, Ph.D. University of Louisville School of Medicine</span></li></ul><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">No other product modulates (enhances) the immune system like yeast derived, beta glucans. No other Beta Glucan even compares to Transfer Point's Brand.</span></p><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="850"><span data-dcnode-id="856" instrument_node="">The link below is the only source I endorse for this product, call 800.746.7640 and mention CancerTutor:</span><br data-dcnode-id="855"><a data-dcnode-id="853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.betterwayhealth.com/products/beta-glucan" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="854" instrument_node="">https://www.betterwayhealth.com/products/beta-gluca</span></a><a data-dcnode-id="851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.betterwayhealth.com/products/beta-glucan" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="852" instrument_node="">n</span></a></p><span data-dcnode-id="849" instrument_node="">
</span><h4 data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">DMSO/CD Protocol</span></h4><span data-dcnode-id="846" instrument_node="">
</span><p data-dcnode-id="839"><a class="pretty-link-keyword" data-dcnode-id="844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancertutor.com/recommends/DMSO" rel="nofollow" target="_blank" title="DMSO"><span data-dcnode-id="845" instrument_node="">DMSO</span></a><span data-dcnode-id="843" instrument_node=""> is a molecule as it can pass through the skin. It is suggested that it has the ability to carry things with it through the skin. </span><a data-dcnode-id="841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancertutor.com/recommends/DMSO"><span data-dcnode-id="842" instrument_node="">DMSO</span></a><span data-dcnode-id="840" instrument_node=""> is said to carry the chlorine dioxide with it through the skin (it is taken transdermally) and heads for the cancer cells.</span></p><span data-dcnode-id="838" instrument_node="">
</span><p data-dcnode-id="833"><span data-dcnode-id="837" instrument_node="">Here is the article:</span><br data-dcnode-id="836"><a data-dcnode-id="834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancertutor.com/chlorine_dioxide/" title="DMSO Information"><span data-dcnode-id="835" instrument_node="">DMSO/CD Protocol</span></a></p><span data-dcnode-id="832" instrument_node="">
</span><p data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">It is possible that DMSO mixed with baking soda may also be good for shrinking tumors, but we have no experience with doing this.</span></p><span data-dcnode-id="829" instrument_node="">
</span><h4 data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Avemar</span></h4><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Avemar, also known as H-86, has case studies where it has shrunk tumors within a few weeks.</span></p><span data-dcnode-id="823" instrument_node="">
</span><h4 data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Escozine</span></h4><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">This is a product specifically designed to shrink tumors. One of its major ingredients is Caribbean Blue Scorpion. Caribbean Blue Scorpion has been used for decades for a large number of health conditions.</span></p><span data-dcnode-id="817" instrument_node="">
</span><h4 data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">The Kelmun Protocol</span></h4><span data-dcnode-id="814" instrument_node="">
</span><p data-dcnode-id="809"><span data-dcnode-id="811" style="color: red;"><b data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">NOTICE:</span></b></span><span data-dcnode-id="810" instrument_node=""> A person should only be on one highly alkaline protocol at a time. So do not use this product if you are already on cesium, Cellect, or any other highly alkaline product.</span></p><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">The Kelmun Protocol (baking soda and maple syrup) has been suggested to be able to shrink tumors. It is described as being both a highly alkaline protocol and a “trojan horse” (maple syrup) to allow the baking soda to target cancer cells.</span></p><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">It is suggested to be combined with juicing (e.g. carrot juice with a tablespoon of beet juice) and green drinks along with an electromedicine protocol, such as the High RF Frequency Generator with Plasma Amplifer.</span></p><span data-dcnode-id="802" instrument_node="">

</span><p data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">The Bill Henderson Protocol is a suggested protocol that includes the Budwig Diet. It is based on the Johanna Budwig Diet of cottage cheese and flaxseed oil. The treatment also includes several other supplements and a special diet.</span></p><span data-dcnode-id="796" instrument_node="">

</span><h4 data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">Honey and Turmeric and Ginger</span></h4><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Honey is said to be a Trojan Horse to get microbe-killing substances inside of cancer cells, to revert cancer cells into normal cells.</span></p><span data-dcnode-id="781" instrument_node="">
</span><h4 data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Sister Mary Eymard Poydock, PhD Treatment</span></h4><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="770"><span data-dcnode-id="777" instrument_node="">This treatment is the result of decades of cancer research by Sister Mary Eymard Poydock, Ph.D., director of cancer research and former professor of biology at Mercyhurst College in Erie, Pennsylvania. Twenty years of work by Sister Eymard and her associates have indicated that a combination of vitamins C and B12 has an effect against tumors.&nbsp; The recipe is a mixture of </span><a class="pretty-link-keyword" data-dcnode-id="775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancertutor.com/recommends/PotassiumVitaminC" rel="nofollow" target="_blank" title="Potassium Vitamin C"><span data-dcnode-id="776" instrument_node="">Vitamin C</span></a><span data-dcnode-id="774" instrument_node=""> and </span><a class="pretty-link-keyword" data-dcnode-id="772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancertutor.com/recommends/SublingualB12" rel="nofollow" target="_blank" title="Sublingual Vitamin B12"><span data-dcnode-id="773" instrument_node="">Vitamin B12</span></a><span data-dcnode-id="771" instrument_node="">.</span></p><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">She also wanted to see if the C-B12 mixture would prolong the lives of animals already suffering from cancer. To find out, Sister Eymard and her colleagues injected the mixture near the cancerous growths of diseased mice for seven successive days. Treated animals lived longer than those mice not given C and B12. In fact, all the treated mice outlived the control group. It appeared that the combination of C and B12 not only inhibits the growth of cancer cells, but also prolongs the lives of animals impregnated with cancer.</span></p><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="761"><span data-dcnode-id="765" instrument_node="">See also:</span><br data-dcnode-id="764"><a data-dcnode-id="762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cforyourself.com/Conditions/Cancer/CancerRecipe.html" title="Cancer Cure Recipe"><span data-dcnode-id="763" instrument_node="">For More Information</span></a></p><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="759" instrument_node="">Here is one highly recommended Vitamin C vendor:</span><br data-dcnode-id="758"><a data-dcnode-id="755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancertutor.com/recommends/PotassiumVitaminC" rel="nofollow" title="Potassium Ascorbate"><br data-dcnode-id="757"><span data-dcnode-id="756" instrument_node="">Excellent Buffered Vitamin C Product</span></a></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="746"><span data-dcnode-id="752" instrument_node="">As with all vitamin C products, </span><b data-dcnode-id="747"><span data-dcnode-id="751" instrument_node="">keep this product </span><span data-dcnode-id="749" style="color: #ff0000;"><span data-dcnode-id="750" instrument_node="">out of the reach of children</span></span><span data-dcnode-id="748" instrument_node="">. It can be very dangerous if very high doses are taken.</span></b></p><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="740"><span data-dcnode-id="744" instrument_node="">This is an excellent source of Vitamin B12 which is highly absorbed:</span><br data-dcnode-id="743"><a data-dcnode-id="741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonderlabs.com/itemleft.php%3Fitemnum%3D3292" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="742" instrument_node=""> Sublingual Vitamin B12</span></a></p><span data-dcnode-id="739" instrument_node="">
</span><h4 data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Laetrile</span></h4><span data-dcnode-id="736" instrument_node="">
</span><p data-dcnode-id="726"><a class="pretty-link-keyword" data-dcnode-id="734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancertutor.com/recommends/ApricotKernals" rel="nofollow" target="_blank" title="Apricot Kernals - Apricot Power"><span data-dcnode-id="735" instrument_node="">Laetrile</span></a><span data-dcnode-id="733" instrument_node=""> is another natural product suggested to help shrink tumors. </span><a data-dcnode-id="731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancertutor.com/recommends/ApricotKernals"><span data-dcnode-id="732" instrument_node="">Vitamin B17, laetrile, and amygdalin</span></a><span data-dcnode-id="730" instrument_node=""> are all names for the same natural molecule. </span><a class="pretty-link-keyword" data-dcnode-id="728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancertutor.com/recommends/ApricotKernals" rel="nofollow" target="_blank" title="Apricot Kernals - Apricot Power"><span data-dcnode-id="729" instrument_node="">Apricot seeds</span></a><span data-dcnode-id="727" instrument_node=""> are very high in laetrile.</span></p><span data-dcnode-id="725" instrument_node="">
</span><h4 data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Zeolites</span></h4><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="718"><a class="pretty-link-keyword" data-dcnode-id="720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancertutor.com/recommends/Zeolite" rel="nofollow" target="_blank" title="Zeolite"><span data-dcnode-id="721" instrument_node="">Zeolites</span></a><span data-dcnode-id="719" instrument_node=""> are specific types of minerals which come from volcanoes. They are best known as chelating molecules, especially for mercury and other heavy minerals. But it turns out that they are suggested to also shrinking tumors.</span></p><span data-dcnode-id="717" instrument_node="">
</span><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">For centuries, the powdered forms of specific zeolites have been used as traditional remedies throughout Asia to promote overall health and well being. The story of the “volcanic rocks” has been passed down from generation-to-generation as more and more people have experienced its life-changing benefits.</span></p><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="707"><span data-dcnode-id="713" instrument_node="">Zeolites are natural volcanic minerals with an unique, complex crystalline structure. It's honeycomb framework of cavities and channels (like cages) works at the cellular level trapping heavy metals and </span><span class="word-tooltip" data-dcnode-id="709"><span data-dcnode-id="712" instrument_node="">toxins</span><span class="word-definition" data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">A poison made by certain bacteria, plants, or animals, including insects.</span></span></span><span data-dcnode-id="708" instrument_node="">. In fact, because it is one of the few negatively charged minerals in nature, zeolites are said to act as magnets drawing toxins to it, capturing them in its cage and removing them from the body.”</span></p><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Of interest is that they have been shown in some cases to shrink tumors very quickly. There is not enough evidence to depend on them exclusively to shrink tumors.</span></p><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="702" instrument_node="">See also:</span><br data-dcnode-id="701"><a data-dcnode-id="699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.newswithviews.com/Howenstine/james48.htm" rel="nofollow" title="Zeolite Information"><span data-dcnode-id="700" instrument_node="">Zeolite Article by an M.D.</span></a><span data-dcnode-id="698" instrument_node=""> [Part 1]</span><br data-dcnode-id="697"><a data-dcnode-id="695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.newswithviews.com/Howenstine/james49.htm" rel="nofollow" title="More Info"><span data-dcnode-id="696" instrument_node="">Zeolite Article by an M.D.</span></a><span data-dcnode-id="694" instrument_node=""> [Part 2]</span></p><span data-dcnode-id="692" instrument_node="">
</span><h4 data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">AIS MAX For Life</span></h4><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Curcumin is actually a wonder substance against cancer.&nbsp; As with zeolites, the evidence is not strong enough that it shrinks tumors (i.e. there is no “cure rate”) that it should be used by itself.</span></p><span data-dcnode-id="686" instrument_node="">
</span><h4 data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Sweet Wormwood Herb</span></h4><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="682" instrument_node="">A third product that may also shrink tumors very quickly is the </span><a data-dcnode-id="680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancertutor.com/recommends/WormwoodHerb"><span data-dcnode-id="681" instrument_node="">sweet wormwood herb</span></a><span data-dcnode-id="679" instrument_node="">. This is generally </span><b data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">not</span></b><span data-dcnode-id="676" instrument_node=""> used as a stand-alone treatment, however, it may be very effective at shrinking tumors.</span></p><span data-dcnode-id="674" instrument_node="">
</span><h4 data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Pau ‘d Arco</span></h4><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Pau ‘d Arco, also known as Lapacho or Taheebo Tea, has also been said to shrink tumors.</span></p><span data-dcnode-id="668" instrument_node="">
</span><h4 data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Essaic Tea</span></h4><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="661"><a data-dcnode-id="663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancertutor.com/recommends/EssiacTea"><span data-dcnode-id="664" instrument_node="">Essiac Tea</span></a><span data-dcnode-id="662" instrument_node=""> is one of the foremost alternative cancer treatments suggested to shrink tumors. A</span></p><span data-dcnode-id="660" instrument_node="">
</span><ul data-dcnode-id="649"><li data-dcnode-id="650"><i data-dcnode-id="653"><span data-dcnode-id="659" instrument_node="">“After word of Caisse's [the founder of Essiac Tea] impressive results spread to the United States, a leading diagnostician in Chicago introduced her to Dr. John Wolfer, director of the tumor clinic at Northwestern University Medical School. In 1937, Wolfer arranged for Rene to treat thirty terminal cancer patients under the direction of five doctors. Rene commuted across the border to Chicago, carrying her bottles of freshly prepared </span><span class="word-tooltip" data-dcnode-id="655"><span data-dcnode-id="658" instrument_node="">herbal</span><span class="word-definition" data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">A product made from a plant that is thought to be useful in treating a disease or staying healthy. Herbal supplements are taken by mouth.</span></span></span><span data-dcnode-id="654" instrument_node=""> brew. After supervising one and a half years of Essiac therapy, the Chicago doctors concluded that the herbal mixture prolonged life, shrank tumors, and relieved pain. “</span></i><br data-dcnode-id="652"><span data-dcnode-id="651" instrument_node="">http://www.healthy.net/</span></li></ul><span data-dcnode-id="648" instrument_node="">
</span><h4 data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Carrot Juice and Raw Food Diet</span></h4><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Vitamin A has been shown in studies to shrink the size of tumors. The best way to take Vitamin A is with carrot juice:</span></p><span data-dcnode-id="642" instrument_node="">
</span><ul data-dcnode-id="628"><li data-dcnode-id="637"><i data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">“Yellow to Deep Orange (carotenoids [Beta-carotene is the most famous] are a huge family of over 600 “colors” that make Vitamin A and help to shrink tumors):”</span></i><br data-dcnode-id="639"><span data-dcnode-id="638" instrument_node="">http://www.learningplaceonline.com/nutrition/food/ca-prevent/fruit-veg.htm</span></li><li data-dcnode-id="632"><i data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">“Cancer growths and sores appear in practically every part of the body and take a long time to heal. Since the body creates these conditions, it is essential to eliminate the food which feeds their development. From his long experience, Dr. Earp-Thomas was fully convinced that when cooked food was eaten it permitted tumors and growths to build within the body. Yet when living food was substituted, these tumors and growths immediately began to shrink for lack of nourishment. The most thrilling experience I can recall was to see cancer cells taken from a human body and thriving on cooked food but unable to survive on that same food when it was uncooked.”</span></i><br data-dcnode-id="634"><span data-dcnode-id="633" instrument_node="">http://www.karlloren.com/</span></li><li data-dcnode-id="629"><i data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">“There are numerous reports/claims that a diet consisting almost entirely of a diversity of vegetables can cause cancer tumors to shrink or even vanish. If these reports are correct, they make sense in the context of the theory that is presented here. I am postulating anaerobic metabolism and thus cancer can be caused by the blockage of the aerobic process at any point in the Kreb's cycle or the respiratory chain. There are numerous chemical steps that are involved in sequence and if any of them is blocked you have the potential of arresting the entire aerobic process. Each of these steps are catalyzed by specific enzymes and regulated by other enzymes. If any of these are missing, aerobic metabolism could stop.”</span></i></li></ul><span data-dcnode-id="627" instrument_node="">
</span><h4 data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Ellagic Acid</span></h4><span data-dcnode-id="624" instrument_node="">
</span><ul data-dcnode-id="591"><li data-dcnode-id="609"><i data-dcnode-id="612"><span data-dcnode-id="623" instrument_node="">“Multiple studies have discovered that </span><span class="word-tooltip" data-dcnode-id="619"><span data-dcnode-id="622" instrument_node="">phytonutrients</span><span class="word-definition" data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">Phytonutrients give plants their pigments. Among the benefits of phytonutrients are antioxidant and anti-inflammatory activities, may enhance immunity and intercellular communication, repair DNA damage from exposure to toxins, detoxify carcinogens, and alter estrogen metabolism.</span></span></span><span data-dcnode-id="618" instrument_node=""> found in raspberries can protect us from cancer and can even shrink some types of cancer tumors. These substances can also act as an </span><span class="word-tooltip" data-dcnode-id="614"><span data-dcnode-id="617" instrument_node="">antibacterial</span><span class="word-definition" data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">A substance that kills bacteria or stops them from growing and causing disease.</span></span></span><span data-dcnode-id="613" instrument_node=""> and as an antiviral agent. Does this sound too good to be true? One particular substance found in this natural “medicine chest”, is a series of compounds called ellagitannins. The highest levels are found in raspberries, but the ellagitannins are also in certain types of grapes, strawberries, blackberries, blueberries and some nuts too. Recent work (2001), published by Dr. Gary Stoner at Ohio State University, showed that components in the seeds and berry, but particularly ellagitannins, inhibited the initiation and promotion/progression stages of esophageal cancer. This is an extremely important finding, considering the potential benefits.”</span></i><br data-dcnode-id="611"><span data-dcnode-id="610" instrument_node="">http://www.smdi.org/new_page_3.htm</span></li><li data-dcnode-id="592"><i data-dcnode-id="595"><span data-dcnode-id="608" instrument_node="">“The studies found in the left column [of this web page] were compiled by Susan Thorpe-Vargas Ph.D. and represent a summation of EA's known medical properties:</span><br data-dcnode-id="607"><span data-dcnode-id="606" instrument_node="">EA is an anticancer agent – it protects DNA from mutation.</span><br data-dcnode-id="605"><span data-dcnode-id="604" instrument_node="">EA shrinks tumors within 72 hours if the cancer is not caused by a mutation in the p53 or WAF 1/p21 genes.</span><br data-dcnode-id="603"><span data-dcnode-id="602" instrument_node="">EA is a natural phenolic antioxidant.</span><br data-dcnode-id="601"><span data-dcnode-id="600" instrument_node="">EA exerts actions that are both anti-bacterial and an anti-viral.</span><br data-dcnode-id="599"><span data-dcnode-id="598" instrument_node="">EA appears to inhibit liver fibrosis.</span><br data-dcnode-id="597"><span data-dcnode-id="596" instrument_node="">EA is cardioprotective and may prove useful in the treatment of myocarditis.”</span></i><br data-dcnode-id="594"><span data-dcnode-id="593" instrument_node="">http://health.centreforce.com/health/ellagic.html</span></li></ul><span data-dcnode-id="590" instrument_node="">
</span><p data-dcnode-id="587"><a data-dcnode-id="588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancertutor.com/recommends/EllagicAcid"><span data-dcnode-id="589" instrument_node="">Ellagic Acid Vendor</span></a></p><span data-dcnode-id="586" instrument_node="">
</span><h4 data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Coenzyme Q10 (CoQ10)</span></h4><span data-dcnode-id="583" instrument_node="">
</span><p data-dcnode-id="578"><span data-dcnode-id="582" instrument_node="">Studies conducted in Europe using high-dose </span><a class="pretty-link-keyword" data-dcnode-id="580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancertutor.com/recommends/CoQ10" rel="nofollow" target="_blank" title="COQ10"><span data-dcnode-id="581" instrument_node="">CoQ10</span></a><span data-dcnode-id="579" instrument_node=""> supplements showed significant regression of breast and prostate tumors.</span></p><span data-dcnode-id="577" instrument_node="">
</span><p data-dcnode-id="574"><a data-dcnode-id="575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancertutor.com/recommends/CoQ10"><span data-dcnode-id="576" instrument_node="">CoEnzyme Q10 (CoQ10)</span></a></p><span data-dcnode-id="573" instrument_node="">
</span><h4 data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Aloe Arborescens (i.e. Aloe Vera)</span></h4><span data-dcnode-id="570" instrument_node="">
</span><ul data-dcnode-id="564"><li data-dcnode-id="565"><i data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">“Michael Arrington was diagnosed with liver cancer. Doctors found 17 tumors on his liver. One was the size of a baseball. Doctors gave the cancer victim 4 to 21 days to live. Six months after Mr. Arrington began taking only Aloe Vera as a supplement, Doctors examining the patient's X-rays could not find [any] trace of the tumors.” </span></i><a data-dcnode-id="566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancertutor.com/info/StopCancer" title="Stop Cancer Now"><span data-dcnode-id="567" instrument_node="">http://stopcancer.com/</span></a></li></ul><span data-dcnode-id="563" instrument_node="">
</span><p data-dcnode-id="559"><span data-dcnode-id="562" instrument_node="">Aloe Vera is another one of those natural plants that is very difficult to process correctly to maintain its cancer-fighting properties. </span><a data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancertutor.com/aloearborescens/" title="Aloe Arborescens Plant"><span data-dcnode-id="561" instrument_node="">&nbsp;Aloe Arborescens</span></a></p><span data-dcnode-id="558" instrument_node="">
</span><h4 data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">High-Dose Vitamin C</span></h4><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">“It is said that the vitamin C is transported to the lungs in the blood where it is oxidized. It then is transported to the cells where it diffuses to the mitochondria and delivers its oxidation potential, powering the respiratory chain, and cycle repeats. It should be noted that there have been many reports where mega doses of vitamin C have been attributed to causing the shrinking of cancer tumors.”</span></p><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="544"><span data-dcnode-id="551" instrument_node="">It is suggested that it is best to take </span><a class="pretty-link-keyword" data-dcnode-id="549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancertutor.com/recommends/MSM" rel="nofollow" target="_blank" title="MSM - Organic Sulfur"><span data-dcnode-id="550" instrument_node="">MSM</span></a><span data-dcnode-id="548" instrument_node=""> whenever you take Vitamin C. Here is an article on using MSM with Vitamin C.</span><br data-dcnode-id="547"><a data-dcnode-id="545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancertutor.com/faq_msm/" title="Super MSM"><span data-dcnode-id="546" instrument_node="">MSM-Vitamin C protocol</span></a></p><span data-dcnode-id="543" instrument_node="">
</span><h4 data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Special case: Large numbers of tumors (e.g. large number of small tumors)</span></h4><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">When a patient has a large number of tumors it is suggested that they have a massive load of microbes and parasites in their body and organs.</span></p><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="523"><span data-dcnode-id="536" instrument_node="">When this is the case, some of these items are suggested:</span><br data-dcnode-id="535"><span data-dcnode-id="534" instrument_node="">1) Transfer Point (i.e. the Beta Glucan item) to build the immune system (mentioned above but required)</span><br data-dcnode-id="533"><span data-dcnode-id="532" instrument_node="">2) Liver flushes to kill the parasites in the organs (at least three or four).</span><br data-dcnode-id="531"><a data-dcnode-id="529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancertutor.com/liverflush/"><span data-dcnode-id="530" instrument_node="">Liver Flush Article</span></a><br data-dcnode-id="528"><span data-dcnode-id="527" instrument_node="">3) You must kill massive numbers of microbes in the bloodstream. Use multiple items in this article:</span><br data-dcnode-id="526"><a data-dcnode-id="524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancertutor.com/kill_microbes/"><span data-dcnode-id="525" instrument_node="">Kill Microbes Article</span></a></p><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="517"><span data-dcnode-id="521" instrument_node="">Ultraviolet light is suggested because it is so effective for the cost:</span><br data-dcnode-id="520"><a data-dcnode-id="518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancertutor.com/ultraviolet/"><span data-dcnode-id="519" instrument_node="">Ultraviolet Light</span></a></p><span data-dcnode-id="516" instrument_node="">
</span><p data-dcnode-id="511"><span data-dcnode-id="515" instrument_node="">After taking these items for a couple of weeks seek out a </span><a class="pretty-link-keyword" data-dcnode-id="513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancertutor.com/info/QuantumPulse" rel="nofollow" target="_blank" title="Quantum Pulse Site"><span data-dcnode-id="514" instrument_node="">Quantum Pulse</span></a><span data-dcnode-id="512" instrument_node=""> to re-energize the cells which were weakened.</span></p><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">A Quantum Pulse can be purchased but they are between $20,000 and $25,000.</span></p><span data-dcnode-id="507" instrument_node="">
</span><p data-dcnode-id="502"><span data-dcnode-id="506" instrument_node="">To find a Quantum Pulse for use, see:</span><br data-dcnode-id="505"><a data-dcnode-id="503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thequantumpulse.com/"><span data-dcnode-id="504" instrument_node="">Locations of Quantum Pulse</span></a></p><span data-dcnode-id="501" instrument_node="">
</span><h2 data-dcnode-id="497"><span data-dcnode-id="500" instrument_node="">&nbsp;</span><a data-dcnode-id="499" id="dangerous"></a><span data-dcnode-id="498" instrument_node="">Dangerous Tumors</span></h2><div class="h2-content-anchor" data-dcnode-id="496" id="dangerous-tumors"></div><span data-dcnode-id="495" instrument_node="">
</span><p data-dcnode-id="489"><span data-dcnode-id="494" instrument_node="">If the tumors create an immediate danger (e.g. tumors in the throat which might block a person's breathing), </span><b data-dcnode-id="491"><span data-dcnode-id="492" style="color: red;"><span data-dcnode-id="493" instrument_node="">seek medical help immediately.</span></span></b><span data-dcnode-id="490" instrument_node=""> Emergency rooms are required by law to deal with life-threatening situations. Do not depend on natural medicine to immediately shrink dangerous tumors.</span></p><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">“Dangerous tumors” are, by definition, tumors that can kill a patient by themselves. They include brain tumors, tumors inside the lungs, tumors that wrap around an artery, tumors in the throat, tumors associated with brain stem cancer and perhaps other very dangerous tumors.</span></p><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">A suggestion in dealing with dangerous tumors is to use the High RF Frequency Protocol, which was designed specifically for those with very advanced cancer and/or dangerous tumors. The High RF Frequency Protocol should always be used with a coaching consultation to make sure the “root cause” of cancer and the tumors is identified and dealt with so cancer and tumors will not come back.</span></p><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">For cancer patients who travel a lot, they can use both a plasma amplifier (while at home) and a linear amplifier (while traveling) with their high RF frequency generator. Another consideration is that one may want the broadcast system using the&nbsp;plasma amplifier&nbsp;for night time use while they are sleeping.</span></p><span data-dcnode-id="479" instrument_node="">
</span><p data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">The reason these devices are important is that because it is suggested they get rid of the “root cause” of cancer, the tumors will not come back because there is nothing to cause them to come back.</span></p><span data-dcnode-id="476" instrument_node="">
</span><p data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">When dealing with dangerous tumors, there are specific situations that need to be understood. You will have to decide which situation best fits your case.</span></p><span data-dcnode-id="473" instrument_node="">
</span><h4 data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Restore Your Health with Your Immune System</span></h4><span data-dcnode-id="470" instrument_node="">
</span><p data-dcnode-id="453"><span data-dcnode-id="469" instrument_node="">As I previously stated, it is suggested that patients restore their </span><a data-dcnode-id="467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancertutor.com/faq_immunity/"><span data-dcnode-id="468" instrument_node="">Immune System</span></a><span data-dcnode-id="466" instrument_node=""> to regenerate healthy tissue and organ functionality. We recommend a product suggested as being better at this task than any other I've ever mentioned (MGN-3, Immutol, Beta Gold, RM-10, you name it). For decades, studies from the </span><strong data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">University of Louisville</span></strong><span data-dcnode-id="463" instrument_node="">, </span><strong data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">Harvard</span></strong><span data-dcnode-id="460" instrument_node="">, and </span><strong data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">Tulane</span></strong><span data-dcnode-id="457" instrument_node=""> have studied the innumerable benefits of Transfer Point's Glucan 300® on Immune Response. I encourage my readers to look into these studies by clicking on the following link:</span><br data-dcnode-id="456"><a data-dcnode-id="454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.betterwayhealth.com/pages/what-is-beta-glucan" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="455" instrument_node="">https://www.betterwayhealth.com/pages/what-is-beta-glucan</span></a></p><span data-dcnode-id="452" instrument_node="">
</span></div><span data-dcnode-id="450" instrument_node="">
