</span><h1 class="entry-title" data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Breuss total cancer treatment</span></h1><span data-dcnode-id="509" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="480"><span data-dcnode-id="508" instrument_node="">

</span><h3 data-dcnode-id="475"><b data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">How the Breuss Total Cancer Treatment works</span></b></h3><span data-dcnode-id="474" instrument_node="">
</span><p data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">The Breuss Total Cancer Treatment is a very rigid diet of fruits, vegetables and herbs that a person takes in liquid form for 42 days. Because cancer cells have a very different metabolism than normal cells, the Breuss diet is designed to starve the cancer cells to death by not providing any solid food proteins. But the diet claims to not harm normal cells.</span></p><span data-dcnode-id="471" instrument_node="">
</span><h3 data-dcnode-id="468"><b data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">The Breuss Total Cancer Treatment</span></b></h3><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">The Breuss diet is based on a 42 day fast, but the definition of “fast” used in the Breuss diet actually includes certain types of foods, such as raw fruits and vegetable juices, all taken in liquid form. The theory is that cancer cells can only live on the protein of solid food. Therefore, if you drink nothing but vegetable juice and teas for 42 days the cancerous cells die while the normal cells continue to thrive.</span></p><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="461"><i data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Breuss juice vegetable juice that consists of 55 percent red beet root, 20 percent carrots, 20 percent celery root, 3 percent raw potato, 2 percent radishes … </span></i></p><span data-dcnode-id="460" instrument_node="">
</span><p data-dcnode-id="453"><span data-dcnode-id="459" instrument_node="">If you look at the formula for the Breuss juice during the fast, you will note that there is virtually no </span><span class="word-tooltip" data-dcnode-id="455"><span data-dcnode-id="458" instrument_node="">glucose</span><span class="word-definition" data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">A type of sugar; the chief source of energy for living organisms.</span></span></span><span data-dcnode-id="454" instrument_node=""> or other sugars in the formula. Since his diet was probably developed by trial and error, we find it curious that it evolved to exclude fruit juices and contains virtually zero glucose and other sugars. We believe the diet works for a different reason than Breuss thought. We think it works because cancer cells are very inefficient at processing glucose and other sugars and that the formula literally starves the cancer cells to death by depriving them of glucose and other sugars. Normal cells can survive on much less glucose and other sugars because they are much more efficient at processing these items.</span></p><span data-dcnode-id="452" instrument_node="">
</span></div><span data-dcnode-id="450" instrument_node="">
