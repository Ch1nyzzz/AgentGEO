</span><div data-dcnode-id="4955" id="intro"><span data-dcnode-id="5096" instrument_node="">
</span><img alt="Natural Remedies for Cancer" data-dcnode-id="5095" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/images/pages/natural-remedies-for-cancer.jpg&amp;raw" style="max-width: 300px;float: left;margin-right: 25px;margin-top: 55px;margin-bottom: 10px;" width="100%"><br data-dcnode-id="5094"><br data-dcnode-id="5093"><span data-dcnode-id="5092" instrument_node="">
</span><p data-dcnode-id="5090"><span data-dcnode-id="5091" instrument_node="">There are few conditions so sobering as cancer and with that few conditions so difficult to treat. Previously cancer treatment centered on one approach or the other: traditional or non-traditional such as using only natural remedies for cancer.. However, recent research shows that a combined or holistic approach that draws from both conventional medicine and naturalistic medicine, is the most effective combination.</span></p><span data-dcnode-id="5089" instrument_node="">
</span><p data-dcnode-id="5087"><span data-dcnode-id="5088" instrument_node="">A number of natural treatnebts, such as acupuncture, dietary changes, and aromatherapy and essential oils, have been identified by our readers as effective supports to common cancer treatment.</span></p><span data-dcnode-id="5086" instrument_node="">
</span><h2 data-dcnode-id="5084"><span data-dcnode-id="5085" instrument_node="">How Do Natural Remedies and Traditional Treatments Work Together?</span></h2><span data-dcnode-id="5083" instrument_node="">
</span><p data-dcnode-id="5081"><span data-dcnode-id="5082" instrument_node="">As cancer treatment began, the options were extremely limited and often ineffective. Today, however, we have a greater body or research as well as additional options for treatment. This research suggests that no one approach to cancer is best but that the approaches need to be combined to be most effective. The National Cancer Instituted calls this approach complementary and alternative medicine or CAM.</span></p><span data-dcnode-id="5080" instrument_node="">
</span><p data-dcnode-id="5078"><span data-dcnode-id="5079" instrument_node="">The Institute is conducting more research to solidify the evidence surrounding CAM, but the current anecdotal research is positive. The approach suggests the combination of alternative medicine, mind-body methods, as well as dietary methods to support wellness from all sides. The approach purports the idea that if overall wellness is improved, the body is more capable of fighting on all fronts – physical, mental, and even social.</span></p><span data-dcnode-id="5077" instrument_node="">
</span><h2 data-dcnode-id="5075"><span data-dcnode-id="5076" instrument_node="">What Kind of Treatments Are the Most Helpful?</span></h2><span data-dcnode-id="5074" instrument_node="">
</span><p data-dcnode-id="5072"><span data-dcnode-id="5073" instrument_node="">While a number of different combinations have been suggested, the National Cancer Institute most supports acupuncture and other traditional Chinese medicine approaches, mind-body methods, and nutritional methods. At present, these options have the greatest amount of support.</span></p><span data-dcnode-id="5071" instrument_node="">
</span><h3 data-dcnode-id="5069"><span data-dcnode-id="5070" instrument_node="">Acupuncture</span></h3><span data-dcnode-id="5068" instrument_node="">
</span><p data-dcnode-id="5066"><span data-dcnode-id="5067" instrument_node="">A recent study published in the Hematology/Oncology Clinics of North America as The Value of Acupuncture in Cancer Care reports that this treatment helps cancer patients deal with the side effects of traditional cancer treatment. Symptoms such as nausea, vomiting, post-operative pain, and cancer related pain are reduced when this method is implemented with treatment.</span></p><span data-dcnode-id="5065" instrument_node="">
</span><h3 data-dcnode-id="5063"><span data-dcnode-id="5064" instrument_node="">Aromatherapy</span></h3><span data-dcnode-id="5062" instrument_node="">
</span><p data-dcnode-id="5060"><span data-dcnode-id="5061" instrument_node="">There is even research to suggest that aromatherapy and other mind-body techniques support treatment. Essential oils such as Roman chamomile, geranium, lavender, and cedarwood help relieve the symptoms of cancer treatment as well as elevate the individual’s mood and emotions, enabling him or her to better fight the condition.</span></p><span data-dcnode-id="5059" instrument_node="">
</span><h3 data-dcnode-id="5057"><span data-dcnode-id="5058" instrument_node="">Dietary Changes</span></h3><span data-dcnode-id="5056" instrument_node="">
</span><p data-dcnode-id="5054"><span data-dcnode-id="5055" instrument_node="">A number of trials have been and are being conducted to determine the efficacy of nutritional methods. Among those trials is a study on the effects of selected vegetable and herb mix on lung cancer. The idea of this treatment is that nutrients better fortify the body to be able to fight off the condition and associated symptoms.</span></p><span data-dcnode-id="5053" instrument_node="">
</span><p data-dcnode-id="5051"><span data-dcnode-id="5052" instrument_node="">Cancer is a complex condition that needs to be treated holistically. If you are in the battle against cancer, consider a combined approach that includes traditional methods as well as natural treatments for the most effective treatment plan.</span></p><span data-dcnode-id="5050" instrument_node="">
</span><h2 data-dcnode-id="5048"><span data-dcnode-id="5049" instrument_node="">Natural Cancer Remedies on Earth Clinic</span></h2><span data-dcnode-id="5047" instrument_node="">
</span><p data-dcnode-id="5045"><span data-dcnode-id="5046" instrument_node="">Our readers share the best remedies that have helped after being diagnosed with cancer.</span></p><span data-dcnode-id="5044" instrument_node="">

</span><h2 data-dcnode-id="5023"><span data-dcnode-id="5024" instrument_node="">What Is Cancer?</span></h2><span data-dcnode-id="5022" instrument_node="">
</span><div data-dcnode-id="5017" id="943725766"><span data-dcnode-id="5021" instrument_node="">
</span><span data-dcnode-id="5018" instrument_node="">
</span></div><p data-dcnode-id="5015"><span data-dcnode-id="5016" instrument_node="">While almost everyone knows about or has heard of cancer, it may seem unnecessary to define cancer. Yet, cancer is such an elusive condition, any attempt we can make to better understand it is an effective pursuit.</span></p><span data-dcnode-id="5014" instrument_node="">
</span><p data-dcnode-id="5012"><span data-dcnode-id="5013" instrument_node="">At large, cancer is a term that is used for any type of disease that involves the uncontrolled division of abnormal cells. These multiplying cells then spread and invade other tissues via the blood and lymph system.</span></p><span data-dcnode-id="5011" instrument_node="">
</span><p data-dcnode-id="5009"><span data-dcnode-id="5010" instrument_node="">The term “cancer” encompasses more than 100 different forms of cancer, most of which are named for the organ or cell type with which they start. The main categories of cancer include carcinoma, sarcoma, leukemia, lymphoma or myeloma, and central nervous system cancers.</span></p><span data-dcnode-id="5008" instrument_node="">

Posted by P. Raghavan (Virudhunagar, Tn, India) on 01/16/2017</span><br data-dcnode-id="4694"><span data-dcnode-id="4693" instrument_node="">
</span></span><span data-dcnode-id="4691" instrument_node="">
</span><img align="baseline" alt="5 out of 5 stars" data-dcnode-id="4690" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/images/stars/5.png&amp;raw" title="5 out of 5 stars"><p data-dcnode-id="4688"><span data-dcnode-id="4689" instrument_node=""> </span></p><p data-dcnode-id="4682"><span data-dcnode-id="4687" instrument_node="">
</span><img align="left" data-dcnode-id="4686" id="editorschoice" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/images/editorschoice.jpg&amp;raw" style="padding-right:15px;" title="Editor\'s Choice" width="100"><span data-dcnode-id="4685" instrument_node="">
</span><strong data-dcnode-id="4683"><span data-dcnode-id="4684" instrument_node="">Protocol To Control / Cure Cancer</span></strong></p><span data-dcnode-id="4681" instrument_node="">
</span><p data-dcnode-id="4679"><span data-dcnode-id="4680" instrument_node="">I am suggesting a protocol to control/cure cancer. This is basically based on treatments suggested by Dr. Coldwell to cancer patients and also on research papers available on the net about cancer treatment. In my opinion, this protocol will control many types of cancer and it may cure some types of cancer. It is as follows:</span></p><span data-dcnode-id="4678" instrument_node="">
</span><p data-dcnode-id="4674"><span data-dcnode-id="4677" instrument_node="">1) </span><strong data-dcnode-id="4675"><span data-dcnode-id="4676" instrument_node="">KEEP THE BODY ALKALINE.</span></strong></p><span data-dcnode-id="4673" instrument_node="">
</span><p data-dcnode-id="4671"><span data-dcnode-id="4672" instrument_node="">Once the body becomes alkaline, cancer cell multiplications will come to complete stop. Cancer cells cannot survive in oxygenated cellular environment. The four minerals " calcium, magnesium, potassium and sodium " in proper proportion are needed to make the body alkaline. The body can absorb calcium and magnesium only when the vitamin D level in the blood is normal. If there is a deficiency of vitamin D in the blood, one may have to take one capsule of probiotic L. Reuteri per day to correct this problem. About 85 % of the population do not have L. Reuteri in their digestive system even though L. Reuteri is in the breast milk. If L. Reuteri is not available, one may take vitamin D3 Supplements.</span></p><span data-dcnode-id="4670" instrument_node="">
</span><p data-dcnode-id="4668"><span data-dcnode-id="4669" instrument_node="">An easy way to determine whether the body is alkaline or acidic is by measuring ph level of the urine in the morning:</span></p><span data-dcnode-id="4667" instrument_node="">
</span><p data-dcnode-id="4665"><span data-dcnode-id="4666" instrument_node="">1) If the urine ph level is from 6 to 7, the body is alkaline.</span></p><span data-dcnode-id="4664" instrument_node="">
</span><p data-dcnode-id="4662"><span data-dcnode-id="4663" instrument_node="">2) If the urine ph level is less than 5.5, the body is acidic.</span></p><span data-dcnode-id="4661" instrument_node="">
</span><p data-dcnode-id="4659"><span data-dcnode-id="4660" instrument_node="">All one need for this determination is a digital ph meter which are available online for about us dollar 20 in Amazon.com. There is no need to buy expensive ph meter for this purpose.</span></p><span data-dcnode-id="4658" instrument_node="">
</span><p data-dcnode-id="4656"><span data-dcnode-id="4657" instrument_node="">Some food items which are highly alkaline are : Lemon juice, Apple cider vinegar, Watermelon juice, Baking soda, etc. To make body alkaline, one can make a drink by mixing 2 teaspoon of apple cider vinegar and lemon juice from one lemon in a glass of water. This drink has to taken 2 to 3 times a day so that the urine ph level is maintained at 6.8 plus or minus 0.2. At this level, cancer cell multiplication will come to complete stop.</span></p><span data-dcnode-id="4655" instrument_node="">
</span><p data-dcnode-id="4651"><span data-dcnode-id="4654" instrument_node="">2) </span><strong data-dcnode-id="4652"><span data-dcnode-id="4653" instrument_node="">TAKE ANTIOXIDANTS TO NEUTRALIZE FREE RADICALS.</span></strong></p><span data-dcnode-id="4650" instrument_node="">
</span><p data-dcnode-id="4648"><span data-dcnode-id="4649" instrument_node="">Most free radicals are coming from oxygen atoms and are called reactive oxygen. The damages to cells caused by free radicals, especially the damage to DNA, may play a role in the development of cancer and other health conditions. There are three vitamin-based antioxidants:</span></p><span data-dcnode-id="4647" instrument_node="">
</span><p data-dcnode-id="4645"><span data-dcnode-id="4646" instrument_node="">1) Vitamin C</span></p><span data-dcnode-id="4644" instrument_node="">
</span><p data-dcnode-id="4642"><span data-dcnode-id="4643" instrument_node="">2) Vitamin E</span></p><span data-dcnode-id="4641" instrument_node="">
</span><p data-dcnode-id="4639"><span data-dcnode-id="4640" instrument_node="">3) Beta-carotene ( Vitamin A )</span></p><span data-dcnode-id="4638" instrument_node="">
</span><p data-dcnode-id="4636"><span data-dcnode-id="4637" instrument_node="">One may take 500 mg Vitamin C tablets for about three times a day to neutralize free radicals.</span></p><span data-dcnode-id="4635" instrument_node="">
</span><p data-dcnode-id="4631"><span data-dcnode-id="4634" instrument_node="">3) </span><strong data-dcnode-id="4632"><span data-dcnode-id="4633" instrument_node="">TRY TO CONVERT CANCER CELLS INTO NORMAL CELLS</span></strong></p><span data-dcnode-id="4630" instrument_node="">
</span><p data-dcnode-id="4628"><span data-dcnode-id="4629" instrument_node="">Chlorophyll will help in the synthesis and repair of cells in the body. Chlorophyll plays an important role in this protocol. A glass of chlorophyll-rich green drink can be made by using chlorophyll-rich foods like spinach, cilantro, parsley, kale, etc. You may add turmeric and a pinch of sea salt to this drink. This drink has to taken for three times a day.</span></p><span data-dcnode-id="4627" instrument_node="">
</span><p data-dcnode-id="4625"><span data-dcnode-id="4626" instrument_node="">The protocol has to be followed for about 10 to 16 weeks. If there is no improvements at the end of 10 th week, one may discontinue this protocol. You can try this protocol under the guidance of your doctor.</span></p><span data-dcnode-id="4624" instrument_node="">
</span><p data-dcnode-id="4622"><span data-dcnode-id="4623" instrument_node="">Best Wishes,</span></p><span data-dcnode-id="4621" instrument_node="">

Re: Alkalizing, Antioxidants and Chlorophyll for Cancer.</span></p><span data-dcnode-id="4563" instrument_node="">
</span><p data-dcnode-id="4561"><span data-dcnode-id="4562" instrument_node="">Alkalizing one's body is very critical for the treatment of any type of cancer. Ted mentioned six alkalizing formulas in EC. One can use anyone of these formulas to alkalize the body. Ted's favourite alkalizing formula uses Baking soda and Lemon. It is as follows: Squeeze one whole lemon. Add baking soda to the lemon juice slowly bit by bit until fizz stops. Then add water to one half glass. This has to be taken once in the morning and once before bedtime on an empty stomach.</span></p><span data-dcnode-id="4560" instrument_node="">
</span><p data-dcnode-id="4558"><span data-dcnode-id="4559" instrument_node="">There is anther formula mentioned in EC for Liver Cancer treatment. It is as follows: Take one cup of hot water. Add 1 tablespoon of Blackstrap molasses. Then add 1 tablespoon of baking soda. Stir and drink 3 times a day. I believe it has to be taken 30 minutes before meal or 2 hours after meal.</span></p><span data-dcnode-id="4557" instrument_node="">
</span><p data-dcnode-id="4555"><span data-dcnode-id="4556" instrument_node="">One can try these formulas for about 3 days per formula and select a formula that is most effective for you. The goal is to bring the pH level of morning urine in the range of 6.6 to 7.0. The people with cancer should avoid or reduce the consumption of highly acidic foods like : Artificial sweeteners, Red meat, Carbonated soft drink, Alcohol, White sugar, White flour, etc. They should also drink plenty of water since drinking water contains alkalizing minerals (calcium, magnesium, potassium and sodium). There is an article available in the net titled " The Indisputable Connection : Your pH level and Cancer Risk ".</span></p><span data-dcnode-id="4554" instrument_node="">
</span><p data-dcnode-id="4552"><span data-dcnode-id="4553" instrument_node="">Regarding Vitamin D, there is a list of diseases associated with Vitamin D deficiency:</span></p><span data-dcnode-id="4551" instrument_node="">
</span><p data-dcnode-id="4549"><span data-dcnode-id="4550" instrument_node="">1) Osteoporosis</span></p><span data-dcnode-id="4548" instrument_node="">
</span><p data-dcnode-id="4546"><span data-dcnode-id="4547" instrument_node="">2) 17 varieties of Cancer (including breast, prostate and colon cancer).</span></p><span data-dcnode-id="4545" instrument_node="">
</span><p data-dcnode-id="4543"><span data-dcnode-id="4544" instrument_node="">3) Heart disease.</span></p><span data-dcnode-id="4542" instrument_node="">
</span><p data-dcnode-id="4540"><span data-dcnode-id="4541" instrument_node="">4) Autoimmune diseases.</span></p><span data-dcnode-id="4539" instrument_node="">
</span><p data-dcnode-id="4537"><span data-dcnode-id="4538" instrument_node="">5) Asthma,</span></p><span data-dcnode-id="4536" instrument_node="">
</span><p data-dcnode-id="4534"><span data-dcnode-id="4535" instrument_node="">6) Crohn's disease,</span></p><span data-dcnode-id="4533" instrument_node="">
</span><p data-dcnode-id="4531"><span data-dcnode-id="4532" instrument_node="">7) Rheumatoid arthritis,</span></p><span data-dcnode-id="4530" instrument_node="">
</span><p data-dcnode-id="4528"><span data-dcnode-id="4529" instrument_node="">8) Rickets,</span></p><span data-dcnode-id="4527" instrument_node="">
</span><p data-dcnode-id="4525"><span data-dcnode-id="4526" instrument_node="">9) Bacterial vaginosis,</span></p><span data-dcnode-id="4524" instrument_node="">
</span><p data-dcnode-id="4522"><span data-dcnode-id="4523" instrument_node="">10) Multiple sclerosis, etc.</span></p><span data-dcnode-id="4521" instrument_node="">
</span><p data-dcnode-id="4519"><span data-dcnode-id="4520" instrument_node="">If there is a deficiency of Vitamin D, the body can not absorb calcium properly. Calcium deficiency will affect alkalization process. If a person with Vitamin D deficiency consumes more calcium, excess calcium may be deposited in the arteries, kidney and other parts of the body. Vitamin D deficiency can be corrected by one of the following two or both:</span></p><span data-dcnode-id="4518" instrument_node="">
</span><p data-dcnode-id="4516"><span data-dcnode-id="4517" instrument_node="">1) Take Vitamin D3 supplements - 4000 IU daily.</span></p><span data-dcnode-id="4515" instrument_node="">
</span><p data-dcnode-id="4513"><span data-dcnode-id="4514" instrument_node="">2) Take one L. Reuteri capsule per day.</span></p><span data-dcnode-id="4512" instrument_node="">
</span><p data-dcnode-id="4510"><span data-dcnode-id="4511" instrument_node="">The probiotic (Friendly) bacteria ' L. Reuteri ' will increase Vitamin D level by 25.5 % in a 9-week time. Also, L. Reuteri will synthesize Vitamin B12 thereby correcting Vitamin B12 deficiency. About 85 % of the population do not have L. Reuteri in their digestive system even though it is available in the breast milk of some people.</span></p><span data-dcnode-id="4509" instrument_node="">
</span><p data-dcnode-id="4507"><span data-dcnode-id="4508" instrument_node="">Once L. Reuteri colonises the digestive system, Vitamin D deficiency will be corrected. It is a semi-permanent solution for Vitamin D deficiency. This is due to the fact that Vitamin D deficiency will not occur as long as L. Reuteri is in the digestive system. There is an article available in the net titled " Top 13 Scientific Health Benefits of L. Reuteri" .</span></p><span data-dcnode-id="4506" instrument_node="">
</span><p data-dcnode-id="4504"><span data-dcnode-id="4505" instrument_node="">According to the Mayo Clinic, enlarged red blood cells is a non-specific medical condition that has a number of different causes. Among the most common causes are Vitamin B12 deficiency, folate deficiency, alcoholism, hypothyroidism and liver disease. But according to many research papers, it is most often due to Vitamin B12 and folate deficiencies. Enlarged red blood cells can be determined by measuring its mean corpuscular volume (MCV). Enlarged blood cells will not deliver oxygen efficiently to all cells in the body. Oxygen delivery is very important for any cancer treatment. Since L. Reuteri is important for the alkalization of the body and also for oxygen delivery to cells in the body, it appears that the deficiency of L. Reuteri is one of the risk factors associated with cancer.</span></p><span data-dcnode-id="4503" instrument_node="">
</span><p data-dcnode-id="4501"><span data-dcnode-id="4502" instrument_node="">Best wishes,</span></p><span data-dcnode-id="4500" instrument_node="">

A NEW PROTOCOL FOR CANCER.</span></p><span data-dcnode-id="4404" instrument_node="">
</span><p data-dcnode-id="4402"><span data-dcnode-id="4403" instrument_node="">The four main alkaline minerals are : calcium, magnesium, potassium and sodium. The recommended daily allowance for these minerals are given below:</span></p><span data-dcnode-id="4401" instrument_node="">
</span><p data-dcnode-id="4399"><span data-dcnode-id="4400" instrument_node="">1) Calcium = 1000 mg per day.</span></p><span data-dcnode-id="4398" instrument_node="">
</span><p data-dcnode-id="4396"><span data-dcnode-id="4397" instrument_node="">2) Magnesium = 350 mg per day.</span></p><span data-dcnode-id="4395" instrument_node="">
</span><p data-dcnode-id="4393"><span data-dcnode-id="4394" instrument_node="">3) Potassium = 4700 mg per day.</span></p><span data-dcnode-id="4392" instrument_node="">
</span><p data-dcnode-id="4390"><span data-dcnode-id="4391" instrument_node="">4) Sodium = 2300 mg per day.</span></p><span data-dcnode-id="4389" instrument_node="">
</span><p data-dcnode-id="4387"><span data-dcnode-id="4388" instrument_node="">The following five highly alkalizing items that are easily available are:</span></p><span data-dcnode-id="4386" instrument_node="">
</span><p data-dcnode-id="4384"><span data-dcnode-id="4385" instrument_node="">1) Lemon juice.</span></p><span data-dcnode-id="4383" instrument_node="">
</span><p data-dcnode-id="4381"><span data-dcnode-id="4382" instrument_node="">2) Apple cider vinegar.</span></p><span data-dcnode-id="4380" instrument_node="">
</span><p data-dcnode-id="4378"><span data-dcnode-id="4379" instrument_node="">3) Baking soda.</span></p><span data-dcnode-id="4377" instrument_node="">
</span><p data-dcnode-id="4375"><span data-dcnode-id="4376" instrument_node="">4) Water melon juice.</span></p><span data-dcnode-id="4374" instrument_node="">
</span><p data-dcnode-id="4372"><span data-dcnode-id="4373" instrument_node="">5) Blackstrap molasses.</span></p><span data-dcnode-id="4371" instrument_node="">
</span><p data-dcnode-id="4369"><span data-dcnode-id="4370" instrument_node="">There is a video available in the net titled " How to make baking soda molasses cancer protocol solutions " by Vernon Johnston. In this video, he explains how he cured his stage 4 prostate cancer by taking baking soda and molasses solution. Also, there are a number of articles in the net as well as in EC explaining how some people cured cancer using either baking soda and molasses or baking soda and maple syrup. I am suggesting a new improved protocol that will incorporate antioxidant and chlorophyll to the baking soda and molasses protocol. For this new protocol, one has to buy the following two separate instruments:</span></p><span data-dcnode-id="4368" instrument_node="">
</span><p data-dcnode-id="4366"><span data-dcnode-id="4367" instrument_node="">1) Pocket pH meter to determine how much alkaline our body is.</span></p><span data-dcnode-id="4365" instrument_node="">
</span><p data-dcnode-id="4363"><span data-dcnode-id="4364" instrument_node="">2) Pocket ORP ( Oxidation Reduction Potential ) meter to measure antioxidant capability of our body.</span></p><span data-dcnode-id="4362" instrument_node="">
</span><p data-dcnode-id="4360"><span data-dcnode-id="4361" instrument_node="">These two meters are available online and the total cost will be about US$ 100.</span></p><span data-dcnode-id="4359" instrument_node="">
</span><p data-dcnode-id="4357"><span data-dcnode-id="4358" instrument_node="">This new protocol is based on the following three basic principles:</span></p><span data-dcnode-id="4356" instrument_node="">
</span><p data-dcnode-id="4354"><span data-dcnode-id="4355" instrument_node="">1) Cancer can not survive in an oxygenated alkaline cellular environment. Once the body is sufficiently alkaline, cancer cell multiplication will stop completely.</span></p><span data-dcnode-id="4353" instrument_node="">
</span><p data-dcnode-id="4351"><span data-dcnode-id="4352" instrument_node="">2) Free radicals inside the body need to be neutralized by antioxidants since free radicals can damage DNA of normal cells and convert them into new cancer cells. Once the body has sufficient antioxidant capability, generation of new cancer cell will stop.</span></p><span data-dcnode-id="4350" instrument_node="">
</span><p data-dcnode-id="4348"><span data-dcnode-id="4349" instrument_node="">3) Chlorophyll is necessary to increase oxygen supply to all cells and it will also try to convert cancer cells into normal cells.</span></p><span data-dcnode-id="4347" instrument_node="">
</span><p data-dcnode-id="4345"><span data-dcnode-id="4346" instrument_node="">This protocol is to be followed for 16 weeks and it is as follows:</span></p><span data-dcnode-id="4344" instrument_node="">
</span><p data-dcnode-id="4342"><span data-dcnode-id="4343" instrument_node="">Take one cup of chlorophyll-rich food such as parsley, cilantro, spinach, wheatgrass, etc. Add one cup of drinking water. Extract green juice using a blender. Add lemon juice from one lemon and a pinch of sea salt. Then add one teaspoon of baking soda and one teaspoon of molasses to the green drink. stir well and drink it either one half hour before meal or two hours after meal. This drink has to taken twice a day. Also, take a 500 mg vitamin C tablet thrice a day. Since vitamin C is antioxidant, it will try to neutralize free radicals. Follow the above protocol for the first week.</span></p><span data-dcnode-id="4341" instrument_node="">
</span><p data-dcnode-id="4339"><span data-dcnode-id="4340" instrument_node="">From 2nd week to 16th week, we have to adjust the dosages of baking soda and vitamin C as follows:</span></p><span data-dcnode-id="4338" instrument_node="">
</span><p data-dcnode-id="4336"><span data-dcnode-id="4337" instrument_node="">1) Adjust the baking soda dosage so that the pH value of morning urine is in the range of 6.8 to 7.2. If one increases the baking soda dosage, PH value will go up. Opposite will happen if the dosage is decreased.</span></p><span data-dcnode-id="4335" instrument_node="">
</span><p data-dcnode-id="4333"><span data-dcnode-id="4334" instrument_node="">2) Adjust vitamin C dosage such that the morning urine ORP value is in the range of -175 mV to -300 mV (millivolt). If one increases vitamin C dosage, the absolute value of ORP will go up.</span></p><span data-dcnode-id="4332" instrument_node="">
</span><p data-dcnode-id="4330"><span data-dcnode-id="4331" instrument_node="">At the end of 10th week, find out whether the total volume of cancer cells in the body is increasing or decreasing by scan or other methods. If it is increasing, this protocol is not working for the particular person. If it is decreasing very slowly, one may take more chlorophyll-rich foods. At the end of 16th week, if there are no cancer cells in the body, you are cured and you have to follow maintenance protocol. If there are some cancer cells in the body, you may continue the above protocol for another 8 weeks.</span></p><span data-dcnode-id="4329" instrument_node="">
</span><p data-dcnode-id="4327"><span data-dcnode-id="4328" instrument_node="">In the maintenance protocol, you may take the drink once a day and the number of 500 mg vitamin C tablets should be adjusted to keep the following values:</span></p><span data-dcnode-id="4326" instrument_node="">
</span><p data-dcnode-id="4324"><span data-dcnode-id="4325" instrument_node="">1) The morning urine pH value should be in the range of 6.5 and 7.0.</span></p><span data-dcnode-id="4323" instrument_node="">
</span><p data-dcnode-id="4321"><span data-dcnode-id="4322" instrument_node="">2) The morning urine ORP value should be in the range of -120 mV and -300 mV.</span></p><span data-dcnode-id="4320" instrument_node="">
</span><p data-dcnode-id="4318"><span data-dcnode-id="4319" instrument_node="">I believe this protocol will try to cure many types of cancer. It is advisable to follow this protocol under the guidance of your doctor.</span></p><span data-dcnode-id="4317" instrument_node="">
</span><p data-dcnode-id="4315"><span data-dcnode-id="4316" instrument_node="">Best wishes</span></p><span data-dcnode-id="4314" instrument_node="">

</span><p data-dcnode-id="4192"><span data-dcnode-id="4193" instrument_node="">The ORP values are given in Earth Clinic under " Acidic pH remedies - Ted's Q&amp;A ". It is in the 33rd question - " ORP of Urine Negative ". The pH value of morning urine can be measured immediately; but the ORP value of morning urine should be measured exactly after one hour. According to Ted, the best way to get ORP in negative is take Vitamin C + baking soda + magnesium citrate. When the body pH is increased, ORP value also improve automatically. That is why there is no need for any adjustment in the first week. In the second week, adjust the baking soda dosage to bring morning urine pH level to the desired value. Then adjust vitamin C dosage to bring the morning urine ORP level to the desired value.</span></p><span data-dcnode-id="4191" instrument_node="">

RE: NEW SIMPLIFIED PROTOCOL FOR CANCER.</span></p><span data-dcnode-id="4128" instrument_node="">
</span><p data-dcnode-id="4126"><span data-dcnode-id="4127" instrument_node="">This protocol is based on the following two principles:</span></p><span data-dcnode-id="4125" instrument_node="">
</span><p data-dcnode-id="4123"><span data-dcnode-id="4124" instrument_node="">1) Cancer cannot survive in oxygenated alkaline cellular environment.</span></p><span data-dcnode-id="4122" instrument_node="">
</span><p data-dcnode-id="4120"><span data-dcnode-id="4121" instrument_node="">2) Excess free radicals over a prolonged period of time can cause cancer and they need to be neutralized.</span></p><span data-dcnode-id="4119" instrument_node="">
</span><p data-dcnode-id="4117"><span data-dcnode-id="4118" instrument_node="">This protocol calls for the following three steps:</span></p><span data-dcnode-id="4116" instrument_node="">
</span><p data-dcnode-id="4114"><span data-dcnode-id="4115" instrument_node="">1) Alkalize the body sufficiently so that cancer cell multiplication will come to complete stop.</span></p><span data-dcnode-id="4113" instrument_node="">
</span><p data-dcnode-id="4111"><span data-dcnode-id="4112" instrument_node="">2) Take sufficient antioxidants so that the body can neutralize most free radicals in the body. This will stop the generation of new cancer cells by free radicals.</span></p><span data-dcnode-id="4110" instrument_node="">
</span><p data-dcnode-id="4108"><span data-dcnode-id="4109" instrument_node="">3) Take sufficient chlorophyll so that the oxygen supply will increase to all cells in the body and chlorophyll will try to convert cancer cells into normal cells.</span></p><span data-dcnode-id="4107" instrument_node="">
</span><p data-dcnode-id="4105"><span data-dcnode-id="4106" instrument_node="">ALKALIZATION AND CHLOROPHYLL.</span></p><span data-dcnode-id="4104" instrument_node="">
</span><p data-dcnode-id="4102"><span data-dcnode-id="4103" instrument_node="">Lemon, watermelon, banana, spinach and wheatgrass juice are some of the alkaline foods. Lemon and watermelon are top two alkaline foods. pH value of watermelon juice is 8.8 which is very high. Wheatgrass juice and spinach juice are rich in chlorophyll also. One banana (118 gm weight) contains: 422 mg of potassium, 32 mg of magnesium, 6 mg of calcium and 1 mg of sodium. One cup of spinach contains: 839 mg of potassium, 156 mg of magnesium, 245 mg of calcium, 126 mg of sodium and 24 mg of chlorophyll. The recommended dosage of chlorophyll per day is about 200 mg for this protocol.</span></p><span data-dcnode-id="4101" instrument_node="">
</span><p data-dcnode-id="4099"><span data-dcnode-id="4100" instrument_node="">ANTIOXIDANTS.</span></p><span data-dcnode-id="4098" instrument_node="">
</span><p data-dcnode-id="4096"><span data-dcnode-id="4097" instrument_node="">Antioxidants are necessary to neutralize free radicals and they can be: Vitamins C, E and A (Betacarotene), Selenium, Alpha lipoic acid, Cq10, Polyphenols, etc. Oxidation Reduction Potential (ORP) meter can measure oxidant/antioxidant level of any liquid in milliVolt (mV). If the ORP meter reading is positive for any liquid, it means the liquid is oxidant-rich. If it is negative, it means the liquid is antioxidant-rich. Suppose a liquid shows an ORP reading of - 150 mV, it means it is antioxidant-rich and its antioxidant level is 150 milliVolt.</span></p><span data-dcnode-id="4095" instrument_node="">
</span><p data-dcnode-id="4093"><span data-dcnode-id="4094" instrument_node="">The followings are the approximate ORP levels for various liquids:</span></p><span data-dcnode-id="4092" instrument_node="">
</span><p data-dcnode-id="4090"><span data-dcnode-id="4091" instrument_node="">1) Tap water : + 250 mV to + 400 mV.</span></p><span data-dcnode-id="4089" instrument_node="">
</span><p data-dcnode-id="4087"><span data-dcnode-id="4088" instrument_node="">2) Cola / Soda : + 400 mV to + 600 mV.</span></p><span data-dcnode-id="4086" instrument_node="">
</span><p data-dcnode-id="4084"><span data-dcnode-id="4085" instrument_node="">3) R.O. Water / Distilled water : - 10 mV to + 10 mV.</span></p><span data-dcnode-id="4083" instrument_node="">
</span><p data-dcnode-id="4081"><span data-dcnode-id="4082" instrument_node="">4) Green tea : - 120 mV to - 250 mV.</span></p><span data-dcnode-id="4080" instrument_node="">
</span><p data-dcnode-id="4078"><span data-dcnode-id="4079" instrument_node="">5) Mother's Milk : - 70 mV.</span></p><span data-dcnode-id="4077" instrument_node="">
</span><p data-dcnode-id="4075"><span data-dcnode-id="4076" instrument_node="">6) Carrot juice : - 170 mV.</span></p><span data-dcnode-id="4074" instrument_node="">
</span><p data-dcnode-id="4072"><span data-dcnode-id="4073" instrument_node="">7) Wheatgrass juice : - 120 mV.</span></p><span data-dcnode-id="4071" instrument_node="">
</span><p data-dcnode-id="4069"><span data-dcnode-id="4070" instrument_node="">8) Orange juice : - 150 mV.</span></p><span data-dcnode-id="4068" instrument_node="">
</span><p data-dcnode-id="4066"><span data-dcnode-id="4067" instrument_node="">9) Castor oil : - 200 mV.</span></p><span data-dcnode-id="4065" instrument_node="">
</span><p data-dcnode-id="4063"><span data-dcnode-id="4064" instrument_node="">IF ONE SWITCHES FROM OXIDANT-RICH DRINKING WATER TO ANTIOXIDANT-RICH DRINKING WATER, THERE WILL BE CONSIDERABLE IMPROVEMENT SINCE AN AVERAGE ADULT CONSUMES ABOUT 4 LBS OF DRINKING WATER PER DAY.</span></p><span data-dcnode-id="4062" instrument_node="">
</span><p data-dcnode-id="4060"><span data-dcnode-id="4061" instrument_node="">Ordinary drinking water can be converted into antioxidant-rich drinking water. One of the methods is given below:</span></p><span data-dcnode-id="4059" instrument_node="">
</span><p data-dcnode-id="4057"><span data-dcnode-id="4058" instrument_node="">Orange peel and membranes contain antioxidants called citrus bioflavonoid. Citrus bioflavonoids belong to polyphenol group. Orange also contains vitamin C which is also an antioxidant. One organic orange is cut into small pieces and put them in a blender with one cup of water. Beat them in the blender so that particle size is reduced considerably. This will increase the contact area. Add about 9 cups of drinking water. Also, add about one-half teaspoon of himalayan salt or sea salt to the water in the evening. In the next day morning, the ORP level of drinking water is measured. It will be about - 400 mV. The goal is to bring ORP level of drinking water in the the range of - 120 mV to - 250 mV level similar to green tea by adding regular drinking water.</span></p><span data-dcnode-id="4056" instrument_node="">
</span><p data-dcnode-id="4054"><span data-dcnode-id="4055" instrument_node="">This antioxidant-rich drinking water is consumed during the day. This water should be stored in an air-tight non-metallic container since the antioxidants in the water may react with atmospheric oxygen and also, it can react with metals to degrade antioxidant level.</span></p><span data-dcnode-id="4053" instrument_node="">
</span><p data-dcnode-id="4051"><span data-dcnode-id="4052" instrument_node="">It appears that the antioxidants in the orange peel were released after about 8 to 14 hours of soaking in the the drinking water. The antioxidant level of this water is much greater than that of green tea. One can reduce the antioxidant level to a desired level by adding regular drinking water to the orange-soaked drinking water. I believe this orange-soaked drinking water will play an important role in this new protocol.</span></p><span data-dcnode-id="4050" instrument_node="">
</span><p data-dcnode-id="4048"><span data-dcnode-id="4049" instrument_node="">The flow of antioxidant in the body may be roughly explained as follows: Once the antioxidant-rich water reaches our digestive system, some significant portion of antioxidants will join the blood stream and they will reach all blood vessels in the body where they will try to neutralize free radicals. Finally, when the blood returns to kidney, residual antioxidants in the blood are released into the urine. If the urine is antioxidant-rich (ORP value negative), antioxidants in the urine will try to neutralize free radicals in the inner lining of urinary system (urine contact area). The residual antioxidants in the digestive system will flow through digestive track where the antioxidants will try to neutralize free radicals in the inner lining of digestive system and finally they will be excreted.</span></p><span data-dcnode-id="4047" instrument_node="">
</span><p data-dcnode-id="4045"><span data-dcnode-id="4046" instrument_node="">One can watch the following two videos regarding ORP level:</span></p><span data-dcnode-id="4044" instrument_node="">
</span><p data-dcnode-id="4042"><span data-dcnode-id="4043" instrument_node="">1) "Oxidation Reduction Potential (ORP) Testing"</span></p><span data-dcnode-id="4041" instrument_node="">
</span><p data-dcnode-id="4039"><span data-dcnode-id="4040" instrument_node="">2) " How to make Antioxidant-rich drinking water'.</span></p><span data-dcnode-id="4038" instrument_node="">
</span><p data-dcnode-id="4036"><span data-dcnode-id="4037" instrument_node="">According to an article available in the net titled "What are Bioflavonoids? " by F.M. Painter, bioflavonoids are are semi-essential nutrients and are useful in treatment and prevention of many health conditions. It also states that they have greater antioxidant effects than vitamins C, E, selenium and zinc.</span></p><span data-dcnode-id="4035" instrument_node="">
</span><p data-dcnode-id="4033"><span data-dcnode-id="4034" instrument_node="">SUMMARY OF NEW PROTOCOL.</span></p><span data-dcnode-id="4032" instrument_node="">
</span><p data-dcnode-id="4030"><span data-dcnode-id="4031" instrument_node="">1) Consume alkaline-rich foods like lemon, watermelon, bananas, spinach juice, wheatgrass juice, etc. as much as you can. Make sure you are taking about 200 mg of chlorophyll per day. If one can bring the pH level of morning urine in the range of 6.8 to 7.2, there is no need to take baking soda-molasses solution; otherwise, mix 1/4 teaspoon of baking soda and 1 teaspoon of molasses in warm water; drink this twice a day 30 minutes before meal. Adjust the dosage of baking soda so as to bring the morning urine pH level in the range of 6.8 t0 7.2.</span></p><span data-dcnode-id="4029" instrument_node="">
</span><p data-dcnode-id="4027"><span data-dcnode-id="4028" instrument_node="">2) Consume orange-soaked drinking water during the day. Also, take one 500 mg vitamin C tablet thrice a day. Adjust the ORP level of this water and vitamin C dosage so as to bring the ORP level of morning urine after one hour to about - 175 mV.</span></p><span data-dcnode-id="4026" instrument_node="">
</span><p data-dcnode-id="4024"><span data-dcnode-id="4025" instrument_node="">I hope the information provides here will be useful. This is a 16-week protocol.</span></p><span data-dcnode-id="4023" instrument_node="">
</span><p data-dcnode-id="4021"><span data-dcnode-id="4022" instrument_node="">Best wishes.</span></p><span data-dcnode-id="4020" instrument_node="">
</span><p data-dcnode-id="4018"><span data-dcnode-id="4019" instrument_node="">P. Raghavan.</span></p><span data-dcnode-id="4017" instrument_node="">

CANCER PREVENTION.</span></p><span data-dcnode-id="3963" instrument_node="">
</span><p data-dcnode-id="3961"><span data-dcnode-id="3962" instrument_node="">According to an article available in the net titled "Cancer Prevention" by W.H.O., "Between 30-50 % of all cancer cases are preventable. Prevention offers the most long-term cost-effective strategy." Tobacco, physical inactivity, dietary factors, obesity, overweight, alcohol, infectious agents, environmental pollution, occupational carcinogens and radiation will increase risk of cancer. Even if one avoids all those risk factors, there is a chance one may get cancer.</span></p><span data-dcnode-id="3960" instrument_node="">
</span><p data-dcnode-id="3958"><span data-dcnode-id="3959" instrument_node="">Researchers proved that excess free radicals over a prolonged period of time could trigger chronic diseases such as cancer, strokes, heart diseases, etc. Unfortunately there is no way one can avoid free radicals, but there is a lot one can do to reduce the numbers produced in the body, and to ensure that the maximum of those produced are neutralized. Antioxidants are necessary to neutralize free radicals. The body makes some of the antioxidants that it uses to neutralize free radicals. These antioxidants are called endogenous antioxidants. The endogenous antioxidants include : alpha lipoic acid, CoQ10, superoxide dismutase, catalase and glutathione peroxidase. However, the body relies on external (exogenous) sources primarily the diet, to obtain the rest of the antioxidants it needs. These exogenous antioxidants are commonly called dietary antioxidants. Fruits, vegetables and whole grains are rich sources of dietary antioxidants. If one takes more dietary antioxidants than necessary, extra dietary antioxidants will be released in the urine by the body. In this case, the urine will be antioxidant-rich. If the morning urine antioxidant level is at least 100 milliVolt (ORP level in the range of - 100 to - 300 mV), there is a very low probability of free radicals creating cancer cells. If the body is sufficiently alkaline, cancer cell, if any, will not multiply significantly. This basically implies that the morning urine pH level should be in the range of 6.5 to 7.0. There is a very low probability of getting cancer for a person if the following two conditions are satisfied:</span></p><span data-dcnode-id="3957" instrument_node="">
</span><p data-dcnode-id="3955"><span data-dcnode-id="3956" instrument_node="">1) Morning urine ORP level after one hour needs to be in the range of - 100 to - 300 mV.</span></p><span data-dcnode-id="3954" instrument_node="">
</span><p data-dcnode-id="3952"><span data-dcnode-id="3953" instrument_node="">2) Morning urine pH level needs to be in the range of 6.5 to 7.0.</span></p><span data-dcnode-id="3951" instrument_node="">
</span><p data-dcnode-id="3949"><span data-dcnode-id="3950" instrument_node="">These tests may be made at home for about 2 times in a month. You need a pocket ORP meter which will measure oxidant / antioxidant level of any liquid in milliVolt. If the ORP reading is negative for any liquid, it means the liquid is antioxidant-rich; otherwise, the liquid is oxidant-rich. You also need a pocket pH meter. Both are available online. If one or both conditions are not satisfied, the following methods can be used to improve them:</span></p><span data-dcnode-id="3948" instrument_node="">
</span><p data-dcnode-id="3946"><span data-dcnode-id="3947" instrument_node="">1) If the morning urine ORP level after one hour is not in the range of - 100 to - 300 mV, then the person has to consume more dietary antioxidants. The simplest way to achieve this is to drink antioxidant- rich orange / orange peel soaked drinking water which will have antioxidant level of about 400 milliVolt. This can be made as follows: Take one organic orange or its peel and cut them into small pieces. Put them in a blender with one cup of ordinary drinking water. Beat them in the blender so that particle size is very small. Then add 1/2 teaspoon of Himalayan salt or sea salt. Then add about 9 cups of ordinary drinking water. After about 8 to 14 hours of soaking, antioxidants in the orange peels will be released into the drinking water. The antioxidant level of drinking water will to about 400 milliVolt level (ORP level of about - 400 mV). This will definitely improve the morning urine ORP level. If one does want to consume orange / orange peel soaked drinking water, then the person can consume other antioxidant-rich foods like carrot juice, wheatgrass juice, goji berries, blueberries, blackberries, cranberries, grapes, etc. It is also necessary to reduce the consumption of high oxidant-rich foods like cola / soda and also drinking water with high positive ORP level (more than + 200 mV).</span></p><span data-dcnode-id="3945" instrument_node="">
</span><p data-dcnode-id="3943"><span data-dcnode-id="3944" instrument_node="">2) If a person wants to improve pH level of morning urine, the person can consume alkaline foods like lemon juice, watermelon, spinach juice, banana, wheatgrass juice, cucumbers, etc.</span></p><span data-dcnode-id="3942" instrument_node="">
</span><p data-dcnode-id="3940"><span data-dcnode-id="3941" instrument_node="">I believe this orange / orange peel soaked drinking water will play an important in cancer prevention and treatment. I hope the information provided here will be useful.</span></p><span data-dcnode-id="3939" instrument_node="">
</span><p data-dcnode-id="3937"><span data-dcnode-id="3938" instrument_node="">Best wishes.</span></p><span data-dcnode-id="3936" instrument_node="">
</span><p data-dcnode-id="3934"><span data-dcnode-id="3935" instrument_node="">P. Raghavan.</span></p><span data-dcnode-id="3933" instrument_node="">

Grape Seed and Green Drink for Cancer</span></p><span data-dcnode-id="3879" instrument_node="">
</span><p data-dcnode-id="3877"><span data-dcnode-id="3878" instrument_node="">This is a 16-week protocol. This protocol is based on the following two principles:</span></p><span data-dcnode-id="3876" instrument_node="">
</span><p data-dcnode-id="3874"><span data-dcnode-id="3875" instrument_node="">Excess free radicals can damage normal cells and may convert them into new cancer cells. Antioxidants are needed to neutralize free radicals in the body so that no new cancer cells will be created.</span></p><span data-dcnode-id="3873" instrument_node="">
</span><p data-dcnode-id="3871"><span data-dcnode-id="3872" instrument_node="">2 Existing cancer cells cannot survive in an oxygenated alkaline cellular environment.</span></p><span data-dcnode-id="3870" instrument_node="">
</span><p data-dcnode-id="3868"><span data-dcnode-id="3869" instrument_node="">For this protocol, one has to buy an Oxidation Reduction Potential (ORP) meter and a pH meter. The ORP meter measures oxidant/antioxidant level of any liquid in milliVolt(mV). If the reading is positive, the liquid is oxidant-rich. If it is negative, the liquid is antioxidant-rich. Both meters are available online. They are not expensive and simple to use. Just dip the meter in the collected urine up to the mark given in the meter and then switch on the meter.</span></p><span data-dcnode-id="3867" instrument_node="">
</span><p data-dcnode-id="3865"><span data-dcnode-id="3866" instrument_node="">ANTIOXIDANTS:</span></p><span data-dcnode-id="3864" instrument_node="">
</span><p data-dcnode-id="3862"><span data-dcnode-id="3863" instrument_node="">The following are some of the antioxidants:</span></p><span data-dcnode-id="3861" instrument_node="">
</span><p data-dcnode-id="3859"><span data-dcnode-id="3860" instrument_node="">1 Grape seeds.</span></p><span data-dcnode-id="3858" instrument_node="">
</span><p data-dcnode-id="3856"><span data-dcnode-id="3857" instrument_node="">2 Turmeric with black pepper.</span></p><span data-dcnode-id="3855" instrument_node="">
</span><p data-dcnode-id="3853"><span data-dcnode-id="3854" instrument_node="">3 Berries.</span></p><span data-dcnode-id="3852" instrument_node="">
</span><p data-dcnode-id="3850"><span data-dcnode-id="3851" instrument_node="">4 Carrot juice.</span></p><span data-dcnode-id="3849" instrument_node="">
</span><p data-dcnode-id="3847"><span data-dcnode-id="3848" instrument_node="">5 Graviola leaves.</span></p><span data-dcnode-id="3846" instrument_node="">
</span><p data-dcnode-id="3844"><span data-dcnode-id="3845" instrument_node="">6 Vitamins A, C and E.</span></p><span data-dcnode-id="3843" instrument_node="">
</span><p data-dcnode-id="3841"><span data-dcnode-id="3842" instrument_node="">7 Selenium.</span></p><span data-dcnode-id="3840" instrument_node="">
</span><p data-dcnode-id="3838"><span data-dcnode-id="3839" instrument_node="">8 Alpha Lipoic Acid.</span></p><span data-dcnode-id="3837" instrument_node="">
</span><p data-dcnode-id="3835"><span data-dcnode-id="3836" instrument_node="">9 Melatonin, etc.</span></p><span data-dcnode-id="3834" instrument_node="">
</span><p data-dcnode-id="3832"><span data-dcnode-id="3833" instrument_node="">Regarding grape seeds for the treatment of the cancer, one may read the following articles available in the net:</span></p><span data-dcnode-id="3831" instrument_node="">
</span><p data-dcnode-id="3829"><span data-dcnode-id="3830" instrument_node="">1)”Anticancer Effects of Grape Seed Extract on Human Cancer: A Review”.</span></p><span data-dcnode-id="3828" instrument_node="">
</span><p data-dcnode-id="3826"><span data-dcnode-id="3827" instrument_node="">2) “Grape Seed Extract Effective in Colorectal Cancer Treatment”.</span></p><span data-dcnode-id="3825" instrument_node="">
</span><p data-dcnode-id="3823"><span data-dcnode-id="3824" instrument_node="">3) “Grape Seed Procyanidin Extract against Lung Cancer”.</span></p><span data-dcnode-id="3822" instrument_node="">
</span><p data-dcnode-id="3820"><span data-dcnode-id="3821" instrument_node="">The recommended dosage for grape seed is about 200 mg per Kg of body weight per day. Consumption of large amount of antioxidants is neither necessary nor desirable for cancer treatment. One has to adjust the dosage of antioxidants such that the antioxidant level of morning urine after one hour is in the range of –100 milliVolt to – 140 milliVolt. If the antioxidant level of morning urine is very high ( -140mV to -300mV), one has to reduce the intake of antioxidants. If the antioxidant level of morning urine is very low (-0 mV to -100 mV), one has to increase the intake of antioxidants. Our body releases excess antioxidants in the urine. Even after taking sufficient antioxidants, the morning ORP level after one hour is either positive or low negative, then it is possible for a particular food/medicine consumed may create excessive amount of free radicals inside our body. To identify this, one can stop taking suspected food/medicine for one or two days. Then measure the antioxidant level of morning urine after one hour. If there is a considerable improvement in the antioxidant level, problem food/medicine is identified. One can apply antioxidant –rich castor oil in the painful area just before going to bed or first thing in the morning.</span></p><span data-dcnode-id="3819" instrument_node="">
</span><p data-dcnode-id="3817"><span data-dcnode-id="3818" instrument_node="">One has to avoid oxidant-rich items like 1) carbonated drink 2) Alcohol 3) Red meat 4) Shellfish 5) Oxidant-rich drinking water with high ORP level (+ 100 mV to + 300 mV), etc.</span></p><span data-dcnode-id="3816" instrument_node="">
</span><p data-dcnode-id="3814"><span data-dcnode-id="3815" instrument_node="">ALKALIZATION.</span></p><span data-dcnode-id="3813" instrument_node="">
</span><p data-dcnode-id="3811"><span data-dcnode-id="3812" instrument_node="">To alkalize the body, alkalizing minerals like magnesium, calcium, potassium, sodium, etc are needed. Some alkalizing items are given below:</span></p><span data-dcnode-id="3810" instrument_node="">
</span><p data-dcnode-id="3808"><span data-dcnode-id="3809" instrument_node="">1) Green drink. It can be made from spinach, parsley, broccoli, wheatgrass, cilantro, kale, etc.</span></p><span data-dcnode-id="3807" instrument_node="">
</span><p data-dcnode-id="3805"><span data-dcnode-id="3806" instrument_node="">2) Baking soda and maple syrup.</span></p><span data-dcnode-id="3804" instrument_node="">
</span><p data-dcnode-id="3802"><span data-dcnode-id="3803" instrument_node="">3) Lemon juice and/or baking soda,</span></p><span data-dcnode-id="3801" instrument_node="">
</span><p data-dcnode-id="3799"><span data-dcnode-id="3800" instrument_node="">4) Sprouts,</span></p><span data-dcnode-id="3798" instrument_node="">
</span><p data-dcnode-id="3796"><span data-dcnode-id="3797" instrument_node="">5) Cucumber,</span></p><span data-dcnode-id="3795" instrument_node="">
</span><p data-dcnode-id="3793"><span data-dcnode-id="3794" instrument_node="">6 Watermelon.</span></p><span data-dcnode-id="3792" instrument_node="">
</span><p data-dcnode-id="3790"><span data-dcnode-id="3791" instrument_node="">One has to consume two cups of green drink per day (one cup in the morning and one cup in the evening). The aim is to bring morning urine pH level in the range of 6.8 to 7.0. If the morning urine pH level is below 6.8, one may take other alkalizing items given above. But the best choice is baking soda and maple syrup. One can watch video titled “How might baking soda boost cancer therapy? ”</span></p><span data-dcnode-id="3789" instrument_node="">
</span><p data-dcnode-id="3787"><span data-dcnode-id="3788" instrument_node="">Once the body is sufficiently alkaline, cancer cell multiplication will come to complete stop. If the morning urine pH level is below 5.5, the body is considered acidic. If the body is acidic, cancer cell multiplication will increase.</span></p><span data-dcnode-id="3786" instrument_node="">
</span><p data-dcnode-id="3784"><span data-dcnode-id="3785" instrument_node="">CHLOROPHYLL</span></p><span data-dcnode-id="3783" instrument_node="">
</span><p data-dcnode-id="3781"><span data-dcnode-id="3782" instrument_node="">Green drinks are rich in chlorophyll. Chlorophyll will increase hemoglobin level in the blood. Hemoglobin will increase oxygen supply to all cells in the body including cancer cells. If one has Vitamin D deficiency, it will affect mineral absorption in the body. Therefore, Vitamin D deficiency needs to be corrected by sun-bathing and taking vitamin D3 supplements.</span></p><span data-dcnode-id="3780" instrument_node="">
</span><p data-dcnode-id="3778"><span data-dcnode-id="3779" instrument_node="">SOME OBSERVATIONS</span></p><span data-dcnode-id="3777" instrument_node="">
</span><p data-dcnode-id="3775"><span data-dcnode-id="3776" instrument_node="">Recently, I came to know three ladies about 60 years who were suffering from Stage 3 Stomach Cancer. First lady was given chemotherapy and radiation treatment. But there was no improvement and doctors gave her about 6 month time to live. She stopped chemotherapy and radiation therapy. She switched to graviola leaves and green drink treatment on the advice of some tribals from the state of Karnataka. But there was no improvement. Two of her brothers are medical doctors. They went through internet and recommended to her grape seeds and green drink. For grape seeds, she started taking dark raisins with multiple seeds in small quantities throughout the day like a snack. She took 2 cups of green drinks a day (one in the morning and one in the evening). She made good progress and is living more than two and half years.</span></p><span data-dcnode-id="3774" instrument_node="">
</span><p data-dcnode-id="3772"><span data-dcnode-id="3773" instrument_node="">The second lady consumed 6 graviola leaves per day and two green drinks per day. She cut 6 greviola leaves into small pieces and boiled them in 2 cups of water. Then she strained the water and consumed the water throughout the day. It worked very good for her. She is living more than 3 years and she is going great.</span></p><span data-dcnode-id="3771" instrument_node="">
</span><p data-dcnode-id="3769"><span data-dcnode-id="3770" instrument_node="">Chemotherapy and radiation therapy was given to the third lady. There was no progress. She lived for about 8 months and she is no more.</span></p><span data-dcnode-id="3768" instrument_node="">
</span><p data-dcnode-id="3766"><span data-dcnode-id="3767" instrument_node="">PROTOCOL SUMMARY</span></p><span data-dcnode-id="3765" instrument_node="">
</span><p data-dcnode-id="3763"><span data-dcnode-id="3764" instrument_node="">1) Take antioxidant –rich grape seeds or dark raisins with multiple seeds throughout the day.</span></p><span data-dcnode-id="3762" instrument_node="">
</span><p data-dcnode-id="3760"><span data-dcnode-id="3761" instrument_node="">One may also take one half teaspoon of turmeric with small quantity of black pepper one hour before going to bed. But dosage of grape seed/dark raisins with multiple seeds and turmeric should be adjusted so that the antioxidant level of morning urine after one hour should be in the range of – 100 milliVolt to – 140 milliVolt.</span></p><span data-dcnode-id="3759" instrument_node="">
</span><p data-dcnode-id="3757"><span data-dcnode-id="3758" instrument_node="">2) Alkalize the body by consuming 2 cups of green drinks (one cup in the morning and another cup in the evening). If the morning urine pH level is less than 6.8, then take baking soda and maple syrup. If maple syrup is not available, one can use molasses or honey in place of maple syrup. Adjust the dosage of baking soda so that the morning urine pH level is in the range of 6.8 to 7.0. Also, correct vitamin D deficiency if it is there.</span></p><span data-dcnode-id="3756" instrument_node="">
</span><p data-dcnode-id="3754"><span data-dcnode-id="3755" instrument_node="">3) Recent research has suggested that probiotics may be able to stop tumour growth since 80 percent of our immunity is provided by probiotic microbes in our digestive system.</span></p><span data-dcnode-id="3753" instrument_node="">
</span><p data-dcnode-id="3751"><span data-dcnode-id="3752" instrument_node="">CANCER PREVENTION</span></p><span data-dcnode-id="3750" instrument_node="">
</span><p data-dcnode-id="3748"><span data-dcnode-id="3749" instrument_node="">1) The same protocol can be used for cancer prevention. For prevention, one can take dark raisins with multiple seeds as a snack. Adjust the dosage of raisins so that the morning urine antioxidant level is in the range of – 100 mV and – 300 mV.</span></p><span data-dcnode-id="3747" instrument_node="">
</span><p data-dcnode-id="3745"><span data-dcnode-id="3746" instrument_node="">2) Take one cup of green drink per day so that the pH level of morning urine is in the range of 6.5 to 7.0. If needed. one may also take other alkalizing foods such as sprouts, cucumbers, watermelon or lemon juice to bring the morning urine pH level in the range of 6.5 to 7.0.</span></p><span data-dcnode-id="3744" instrument_node="">
</span><p data-dcnode-id="3742"><span data-dcnode-id="3743" instrument_node="">This kind of urine tests can be performed once a week. If the two conditions are satisfied, chances of getting cancer are extremely low.</span></p><span data-dcnode-id="3741" instrument_node="">
</span><p data-dcnode-id="3739"><span data-dcnode-id="3740" instrument_node="">Best Wishes.</span></p><span data-dcnode-id="3738" instrument_node="">

Grape Seed / Raisins with Grape Seed and Green Drink for Cancer – UPDATE.</span></p><span data-dcnode-id="3669" instrument_node="">
</span><p data-dcnode-id="3667"><span data-dcnode-id="3668" instrument_node="">I came across two articles available in the internet with the following titles:</span></p><span data-dcnode-id="3666" instrument_node="">
</span><p data-dcnode-id="3664"><span data-dcnode-id="3665" instrument_node="">1) “Cancer-Fighting Broccoli”.</span></p><span data-dcnode-id="3663" instrument_node="">
</span><p data-dcnode-id="3661"><span data-dcnode-id="3662" instrument_node="">2) ”Does Broccoli Really Fight Cancer”?</span></p><span data-dcnode-id="3660" instrument_node="">
</span><p data-dcnode-id="3658"><span data-dcnode-id="3659" instrument_node="">Broccoli performs the following four functions:</span></p><span data-dcnode-id="3657" instrument_node="">
</span><p data-dcnode-id="3655"><span data-dcnode-id="3656" instrument_node="">1) Broccoli alkalizes the body.</span></p><span data-dcnode-id="3654" instrument_node="">
</span><p data-dcnode-id="3652"><span data-dcnode-id="3653" instrument_node="">2) Broccoli is rich in chlorophyll.</span></p><span data-dcnode-id="3651" instrument_node="">
</span><p data-dcnode-id="3649"><span data-dcnode-id="3650" instrument_node="">3) Broccoli is an oxygen-rich food and can increase blood oxygen level.</span></p><span data-dcnode-id="3648" instrument_node="">
</span><p data-dcnode-id="3646"><span data-dcnode-id="3647" instrument_node="">4) Sulforaphane in broccoli will help in the synthesis of glutathione, an endogenous antioxidant. Endogenous antioxidants are produced by the body.</span></p><span data-dcnode-id="3645" instrument_node="">
</span><p data-dcnode-id="3643"><span data-dcnode-id="3644" instrument_node="">Broccoli sprouts (5 days after seeding) are about 30 times more powerful than broccoli (100 days after seeding). In my opinion broccoli sprouts can be classified as one of the super foods to treat cancer since it performs the above four functions. Susan Jones, UK also confirms that broccoli sprouts work very good for cancer treatment in this website from her experience. It is advisable to take one cup of green drink extracted from broccoli sprouts. One can buy broccoli seeds to make broccoli sprouts either online or at walmart. Broccoli sprouts will produce very good results. There are two videos available that will explain the method to make broccoli sprouts from broccoli seeds:</span></p><span data-dcnode-id="3642" instrument_node="">
</span><p data-dcnode-id="3640"><span data-dcnode-id="3641" instrument_node="">1) “How to sprout broccoli seeds” by Dr. Douglas Won.</span></p><span data-dcnode-id="3639" instrument_node="">
</span><p data-dcnode-id="3637"><span data-dcnode-id="3638" instrument_node="">2) “How to grow broccoli sprouts as discussed by Dr. Rhonda Patrick”.</span></p><span data-dcnode-id="3636" instrument_node="">
</span><p data-dcnode-id="3634"><span data-dcnode-id="3635" instrument_node="">In my opinion, there is also a super herb to treat cancer. It is turmeric with black pepper. There are many articles available in the net regarding cancer and turmeric.</span></p><span data-dcnode-id="3633" instrument_node="">
</span><p data-dcnode-id="3631"><span data-dcnode-id="3632" instrument_node="">If a person can maintain morning urine pH level and morning urine antioxidant level as follows for about 8 weeks, one can expect very good results:</span></p><span data-dcnode-id="3630" instrument_node="">
</span><p data-dcnode-id="3628"><span data-dcnode-id="3629" instrument_node="">1) Morning urine pH level in the range of 6.8 to 7.0.</span></p><span data-dcnode-id="3627" instrument_node="">
</span><p data-dcnode-id="3625"><span data-dcnode-id="3626" instrument_node="">2) Antioxidant level of morning urine after one hour in the range of -100 milliVolt to - 140 milliVolt.</span></p><span data-dcnode-id="3624" instrument_node="">
</span><p data-dcnode-id="3622"><span data-dcnode-id="3623" instrument_node="">There is another article available in the net titled “Another blood pressure medication recalled”. According to this article, FDA is recalling blood pressure medicine VALSARTAN and other related medicines because of cancer risk. It appears that they may contain oxidant-rich chemicals which can produce large amount of free radicals. If a person takes medicines that can generate large amount of free radicals, it will be very difficult to increase antioxidant level of morning urine. I hope the information provided here will be useful.</span></p><span data-dcnode-id="3621" instrument_node="">
</span><p data-dcnode-id="3619"><span data-dcnode-id="3620" instrument_node="">Best wishes.</span></p><span data-dcnode-id="3618" instrument_node="">
</span><p data-dcnode-id="3616"><span data-dcnode-id="3617" instrument_node="">P. Raghavan</span></p><span data-dcnode-id="3615" instrument_node="">

Posted by Tami (New Smyrna Beach) </span><br data-dcnode-id="3315"><span data-dcnode-id="3314" instrument_node="">

</span><img align="baseline" alt="5 out of 5 stars" data-dcnode-id="3311" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/images/stars/5.png&amp;raw" title="5 out of 5 stars"><p data-dcnode-id="3309"><span data-dcnode-id="3310" instrument_node=""> </span></p><p data-dcnode-id="3307"><span data-dcnode-id="3308" instrument_node="">
I LOVE APPLE CIDER VINEGAR! It helped cure my husband's cancer!! My husband had geosophical cancer and the supposedly top surgeon in Gainsville, Florida, told my husband and I that he had to abort the operation, because my husband supposedly had a "cement stomach?" (which no other doctor has heard of) and that he only had 2-4 weeks to live. We came back home and my husband continued with chemo and radiation and also drank and ate anything with vinegar. We went today to see the results of the last xrays and the tumor and cancer WAS GONE!!! His doctor can't explain it. We haven't told the doctor yet about the vinegar, because we wanted to see if it would actually work. AND IT DID!!! Now, we are going to tell the doctor, because it might and hopefully will help someone else. It has been 4 months and my husband looks pretty alive to me and acts like nothing ever happened. He can eat everything again with no problems at all! We have heard about vinegar for a lot of other things and have also used it a lot for many things, so we figured why not for this. So don't be afraid to try it for anything!</span></p><span data-dcnode-id="3306" instrument_node="">

e-id="3289" instrument_node=""> 14</span></span></i></a><span data-dcnode-id="3285" instrument_node=""> </span><a class="followlink" data-dcnode-id="3281" href="#"><i class="fa fa-eye" data-dcnode-id="3284" data-toggle="tooltip" title="Follow this thread in your account"></i><span data-dcnode-id="3283" instrument_node=""> </span><span data-dcnode-id="3282"></span></a><span data-dcnode-id="3280" instrument_node=""> </span><a data-dcnode-id="3276" href="#" onclick="flagPost('176', '5462', 'Apple Cider Vinegar', 'Feedback');return false;"><i class="fa fa-flag red" data-dcnode-id="3279" data-toggle="tooltip" title="Report this post"></i><span data-dcnode-id="3278" instrument_node=""> </span><span data-dcnode-id="3277"></span></a><span data-dcnode-id="3275" instrument_node=""> </span></div><div class="hidlink" data-dcnode-id="3273" style="display: table-cell; text-align:right;"></div></div><span data-dcnode-id="3271" instrument_node="">

</span></span><span data-dcnode-id="3250" instrument_node="">
</span><img align="baseline" alt="5 out of 5 stars" data-dcnode-id="3249" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/images/stars/5.png&amp;raw" title="5 out of 5 stars"><p data-dcnode-id="3247"><span data-dcnode-id="3248" instrument_node=""> </span></p><p data-dcnode-id="3245"><span data-dcnode-id="3246" instrument_node="">
Well, let see. Actually, I had made pickled eggs, with apple cider vinegar, 2 weeks prior to going to Gainsville and my husband said that when he got back from Gainsville, he was going to eat them, if the operation went ok. After we got back, and knowing what the doctor had said, he was disappointed and said that he probably couldn't eat the eggs. A friend of his at work told him to drink some apple cider vinegar and see what happens. So my husband came home that night and took 2 teaspoons of apple cider vinegar, every night for about the first week. Then he said he was feeling a little better and he was starting to eat more food. He then felt good enough to eat the pickled eggs. Then there was no stopping him! He ate about the whole gallon of them and dill pickles and then anything that had vinegar in it. Once a week, he would take a teaspoon of the apple cider vinegar by itself. He started to take the apple cider vinegar, about March 1, 2005. We found out about 4 months later, on June 27, 2005, that the tumor was gone and his cancer had gone into remission. We tell everyone about how the vinegar really helped my husband. I can also tell you ,that apple cider vinegar cures headaches. I know that from my own experience. I had a bad headache and it just wouldn't go away and I had taken some medicine and nothing happened. So I took 2 teaspoons of apple cider vinegar and amazingly about 1/2 hour later my headache was totally gone. More people should try the apple cider vinegar, because it DOES cure a lot of things. We are TRUE BELIEVERS of apple cider vinegar!!!</span></p><span data-dcnode-id="3244" instrument_node="">
</span><p data-dcnode-id="3242"><span data-dcnode-id="3243" instrument_node="">The recipe for the pickled eggs is really simple and anyone can do it..</span></p><span data-dcnode-id="3241" instrument_node="">
</span><p data-dcnode-id="3239"><span data-dcnode-id="3240" instrument_node="">Tami's Pickled Eggs</span></p><span data-dcnode-id="3238" instrument_node="">
</span><p data-dcnode-id="3230"><span data-dcnode-id="3237" instrument_node="">1 gallon jar</span><br data-dcnode-id="3236"><span data-dcnode-id="3235" instrument_node="">4 dozen eggs</span><br data-dcnode-id="3234"><span data-dcnode-id="3233" instrument_node="">about 1/2 gallon or less of Apple Cider Vinegar</span><br data-dcnode-id="3232"><span data-dcnode-id="3231" instrument_node="">a pinch of red pepper seeds</span></p><span data-dcnode-id="3229" instrument_node="">
</span><p data-dcnode-id="3219"><span data-dcnode-id="3228" instrument_node="">Boil all the eggs, crack them and put in gallon jar.</span><br data-dcnode-id="3227"><span data-dcnode-id="3226" instrument_node="">Add Apple Cider Vinegar, to fill jar. Make sure all of the eggs are covered.</span><br data-dcnode-id="3225"><span data-dcnode-id="3224" instrument_node="">Add red pepper seeds. Cover.</span><br data-dcnode-id="3223"><span data-dcnode-id="3222" instrument_node="">Let set in the refrigerator for about 1 month (or a little longer, if you want a stronger tasting egg).</span><br data-dcnode-id="3221"><span data-dcnode-id="3220" instrument_node="">Take out an enjoy. Make sure any remaining eggs in jar, are refrigerated.</span></p><span data-dcnode-id="3218" instrument_node="">
</span><p data-dcnode-id="3216"><span data-dcnode-id="3217" instrument_node="">It's that simple! Enjoy!</span></p><span data-dcnode-id="3215" instrument_node="">

Article from </span><a data-dcnode-id="2353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//articles.mercola.com/sites/articles/archive/2008/10/14/talcum-powder-linked-to-ovarian-cancer.aspx%3Fsource%3Dnl"><span data-dcnode-id="2354" instrument_node="">Dr. Mercola's site</span></a></p><span data-dcnode-id="2351" instrument_node="">
</span><p data-dcnode-id="2347"><strong data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">Talcum Powder Linked to Ovarian Cancer</span></strong><span data-dcnode-id="2348" instrument_node=""> </span></p><span data-dcnode-id="2346" instrument_node="">
</span><p data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">Women have been warned to immediately stop using talcum powder around their genitals, as new research suggests particles may travel to the ovaries and trigger a process of inflammation that allows cancer cells to flourish.</span></p><span data-dcnode-id="2343" instrument_node="">
</span><p data-dcnode-id="2341"><span data-dcnode-id="2342" instrument_node="">Previous studies have raised concerns over talc, but the latest findings suggest that women who use it are 40 percent more likely to get ovarian cancer.</span></p><span data-dcnode-id="2340" instrument_node="">
</span><p data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">Experts studied more than 3,000 women and found using talc merely once a week raised the risk of ovarian cancer by 36 percent. The danger rose to 41 percent for those applying powder every day. </span></p><span data-dcnode-id="2337" instrument_node="">
</span><p data-dcnode-id="2327"><span data-dcnode-id="2336" instrument_node="">Sources:</span><br data-dcnode-id="2335"><a data-dcnode-id="2333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thewest.com.au/aapstory.aspx%3FStoryName%3D518475"><span data-dcnode-id="2334" instrument_node="">The West Australian September 29, 2008</span></a><span data-dcnode-id="2332" instrument_node=""> </span><br data-dcnode-id="2331"><a data-dcnode-id="2329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cebp.aacrjournals.org/cgi/content/abstract/17/9/2436"><span data-dcnode-id="2330" instrument_node="">Cancer Epidemiology Biomarkers &amp; Prevention September 1, 2008, 17, 2436-2444</span></a><span data-dcnode-id="2328" instrument_node=""> </span></p><span data-dcnode-id="2326" instrument_node="">
