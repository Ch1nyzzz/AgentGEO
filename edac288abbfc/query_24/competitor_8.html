</span><p data-dcnode-id="4346"></p><h2 data-dcnode-id="4344"><span data-dcnode-id="4345" instrument_node="">What is Liver Cancer?</span></h2><span data-dcnode-id="4343" instrument_node="">
</span><p data-dcnode-id="4341"><span data-dcnode-id="4342" instrument_node="">Primary liver cancer begins in the liver and can be distinguished into four diseases depending on where and what cells are affected: cholangiocarcinoma of the bile ducts, hepatoblastoma in infants, angiosarcoma (hemangiosarcoma) of the blood vessels of the liver, and hepatocellular carcinoma (HCC liver cancer) of the main liver cells and is one of the more common forms of liver cancer worldwide. It is important to distinguish that liver cancer is tumor growth that begins in the liver cells, and metastatic liver cancer is cancer that begins in another part of the body and spreads to the liver.</span></p><span data-dcnode-id="4340" instrument_node="">
</span><p data-dcnode-id="4338"><span data-dcnode-id="4339" instrument_node="">If left untreated, the final stage of liver cancer is stage IV liver cancer; the liver shuts down completely and recovery requires a liver transplant.</span></p><span data-dcnode-id="4337" instrument_node="">
</span><p data-dcnode-id="4335"><span data-dcnode-id="4336" instrument_node="">Western Medicine's treatment of liver cancer includes a number of options: surgery that removes a portion of the liver, radiation therapy, drug therapy, injections of chemotherapy, heating or freezing cancer cells, and liver transplant surgery. Although surgery is currently the most successful way to treat liver cancer, alternative treatment methods do exist. These cancer treatments include supplements, home remedies, acupuncture and energy healing.</span></p><span data-dcnode-id="4334" instrument_node="">
</span><h2 data-dcnode-id="4332"><span data-dcnode-id="4333" instrument_node="">Natural Cures for Liver Cancer</span></h2><span data-dcnode-id="4331" instrument_node="">
</span><p data-dcnode-id="4329"><span data-dcnode-id="4330" instrument_node="">This page is for natural liver cancer remedies and discussions. If you know of any home or natural cures for liver cancer at any stage, please feel free to share it with us here.</span></p><span data-dcnode-id="4328" instrument_node="">
</span><p data-dcnode-id="4321"><strong data-dcnode-id="4326"><span data-dcnode-id="4327" instrument_node="">Selenium:</span></strong><span data-dcnode-id="4325" instrument_node=""> In the April 2013 issue of </span><em data-dcnode-id="4323"><span data-dcnode-id="4324" instrument_node="">Nutrients</span></em><span data-dcnode-id="4322" instrument_node="">, researchers at Penn State University looked at whether selenium, an essential micronutrient, was a possible treatment for cancer metastasis. They found that supplementing with selenium resulted in reduced microvessel density and metastasis, and concluded that that Selenium may be an anti-metastastatic element as well as being a cancer preventative agent.</span></p><span data-dcnode-id="4320" instrument_node="">
</span><div data-dcnode-id="4315" id="943725766"><span data-dcnode-id="4319" instrument_node="">
</span><span data-dcnode-id="4316" instrument_node="">
</span></div><p data-dcnode-id="4287"><strong data-dcnode-id="4313"><span data-dcnode-id="4314" instrument_node="">L-Carnitine</span></strong><span data-dcnode-id="4312" instrument_node="">: According to researchers at King Saud University in 2009, a deficiency of L-carnitine is a risk factor for liver cancer. The researchers also found that long term supplementation of L-Carnitine may </span><em data-dcnode-id="4310"><span data-dcnode-id="4311" instrument_node="">prevent</span></em><span data-dcnode-id="4309" instrument_node=""> the development of liver cancer. In a 2005 issue of the </span><em data-dcnode-id="4307"><span data-dcnode-id="4308" instrument_node="">International Journal of Cancer</span></em><span data-dcnode-id="4306" instrument_node="">, Japanese researchers found that L-carnitine protects the liver from the production of free radicals caused by inflammation.</span><br data-dcnode-id="4305"><span data-dcnode-id="4304" instrument_node="">
</span><br data-dcnode-id="4303"><span data-dcnode-id="4302" instrument_node="">

I recently heard about this from multiple people as my dad was just diagnosed.</span></p><span data-dcnode-id="4163" instrument_node="">
</span><p data-dcnode-id="4157"><span data-dcnode-id="4162" instrument_node="">This website is very detailed: </span><a data-dcnode-id="4160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.healingcancernaturally.com/aloe-vera-honey-rum-treatment.html"><span data-dcnode-id="4161" instrument_node="">www.healingcancernaturally.com/aloe-vera-honey-rum-treatment.html</span></a><br data-dcnode-id="4159"><span data-dcnode-id="4158" instrument_node="">For a quick measurement conversion:</span></p><span data-dcnode-id="4156" instrument_node="">
</span><p data-dcnode-id="4154"><span data-dcnode-id="4155" instrument_node="">300 grams of Aloe = 1. 3 Cups</span></p><span data-dcnode-id="4153" instrument_node="">
</span><p data-dcnode-id="4151"><span data-dcnode-id="4152" instrument_node="">500 grams of Honey = 2. 2 Cups.</span></p><span data-dcnode-id="4150" instrument_node="">
</span><p data-dcnode-id="4148"><span data-dcnode-id="4149" instrument_node="">If you are having trouble finding aloe leaves. You can find very large ones at any store selling hispanic products in the section with fruits and vegetables for about $1.50 a leaf. One leaf will give you one batch.</span></p><span data-dcnode-id="4147" instrument_node="">
</span><p data-dcnode-id="4145"><span data-dcnode-id="4146" instrument_node="">Because it is difficult to measure 1.3 cups of aloe, we just began putting chunks (as described on the site) in the food processor and then meausured out about 1.3 cups. Very important 10 days on 10 days off. You do not want to take this consistently. I do not know how this will help my dad. In the first ten days he seemed to have a lot of energy. But he is still in the early processes of being evaluated medically. He will be undergoing chemo/radiation. I've been reading that taking the aloe mix will significantly reduce the negative side effects but then again, we are not at that point yet. I will keep you updated.</span></p><span data-dcnode-id="4144" instrument_node="">
</span><p data-dcnode-id="4142"><span data-dcnode-id="4143" instrument_node="">A close friend originally told me about this. Her brother was diagnosed with very advanced liver cancer and given a week to live... he lasted 7 months.</span></p><span data-dcnode-id="4141" instrument_node="">

</span><img align="baseline" alt="5 out of 5 stars" data-dcnode-id="4046" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/images/stars/5.png&amp;raw" title="5 out of 5 stars"><p data-dcnode-id="4044"><span data-dcnode-id="4045" instrument_node=""> </span></p><p data-dcnode-id="4042"><span data-dcnode-id="4043" instrument_node="">
Hi my name is Tia Nelson my father had liver cancer and had surgery and got it cut out. Then last summer in Aug he went back to the doctors to check and make sure it was still gone after they cut it out and they told him it had come back so we were trying to find something natural for him to try so one of our family members got ahold of him and told him to try drinking baking soda blackstrap molasses and boiling water mix it all to gather... Now he was gonna go get treatment for it and they took one more MRI to look at it and then they were gonna get ahold of him to verify how big it was and where it was. So they call a couple weeks ago and told him his cancer was gone his liver was totally clear.... So we are sure that the drinks and what we were doing took it away..</span></p><span data-dcnode-id="4041" instrument_node="">
</span><p data-dcnode-id="4039"><span data-dcnode-id="4040" instrument_node="">So I want to share how to make the drink we were doing and how to do it I think with anyone with cancer should try this and really be positive and believe its working while you do it...</span></p><span data-dcnode-id="4038" instrument_node="">
</span><p data-dcnode-id="4036"><span data-dcnode-id="4037" instrument_node="">So in a coffee mug put 1 tablespoon of baking soda and 1 tablespoon of blackstrap molasses and boil some water then pour the water into coffee mug and add the molasses and baking soda stir and drink 3 times a day.</span></p><span data-dcnode-id="4035" instrument_node="">
</span><p data-dcnode-id="4033"><span data-dcnode-id="4034" instrument_node="">He also played tesla healing freq. they have to be 528 hz. He listened to it all day at the house and listened to it at night in bed while sleeping.</span></p><span data-dcnode-id="4032" instrument_node="">
</span><p data-dcnode-id="4030"><span data-dcnode-id="4031" instrument_node="">He also took 4 1000 mg of vitamin c, 4000 iu of vitamin d3, 1000 mg cayenne pepper, 1050 mg of maca root, 1 drop of iodine under tongue once a day, 1 tsp of silver biotics 3 times a day, immuplex 2 a day follow directions you can order on line... And there was prayer along with this as far as doctors say he is cancer free and they don't believe it so they are still testing to check and make sure.. My father isn't trying to convince anybody he just wants people to know what he did and hopefully it will help someone else just like it did my father. You have to try your hardest to stay positive through the whole thing and believe that its all working and that its going away every time you do a drink and listen to the music.</span></p><span data-dcnode-id="4029" instrument_node="">
</span><p data-dcnode-id="4027"><span data-dcnode-id="4028" instrument_node="">I hope whoever reads this that has cancer or knows somebody with it will try this thanks and good luck I hope all works as well as it did for my father...............</span></p><span data-dcnode-id="4026" instrument_node="">

Tie Nelson,</span></p><span data-dcnode-id="3971" instrument_node="">
</span><p data-dcnode-id="3969"><span data-dcnode-id="3970" instrument_node="">It is good to hear that your father was able to control liver cancer using Baking soda and Blackstrap molasses. I have some information to share with you. Dr. Coldwell suggested the following three step procedure to treat any type of cancer. They are as follows:</span></p><span data-dcnode-id="3968" instrument_node="">
</span><p data-dcnode-id="3966"><span data-dcnode-id="3967" instrument_node="">1) Keep the body alkaline ( To stop the multiplication of cancer cells ).</span></p><span data-dcnode-id="3965" instrument_node="">
</span><p data-dcnode-id="3963"><span data-dcnode-id="3964" instrument_node="">2) Take Vitamin C ( To neutralize free radicals that may cause cancer. )</span></p><span data-dcnode-id="3962" instrument_node="">
</span><p data-dcnode-id="3960"><span data-dcnode-id="3961" instrument_node="">3) Take Chlorophyll ( To oxygenate all cells in the body. )</span></p><span data-dcnode-id="3959" instrument_node="">
</span><p data-dcnode-id="3957"><span data-dcnode-id="3958" instrument_node="">His advice is based on the premises that cancer can not survive in an oxygenated alkaline cellular environment.</span></p><span data-dcnode-id="3956" instrument_node="">
</span><p data-dcnode-id="3954"><span data-dcnode-id="3955" instrument_node="">Your father took baking soda and blackstrap molasses to keep the body alkaline. He also took Vitamin D3 supplements to correct any Vitamin D deficiency. Vitamin D deficiency will affect the absorption of calcium and magnesium in the body. According to webmd, three-fourth of cancer patience have low level of Vitamin D. Your father satisfied the first step. According to you, he also took Vitamin C that will neutralize free radicals that may cause cancer. The second step is also satisfied.</span></p><span data-dcnode-id="3953" instrument_node="">
</span><p data-dcnode-id="3951"><span data-dcnode-id="3952" instrument_node="">Hemoglobin is a part of red blood cells and it is used to transport oxygen in the body. Hemoglobin and Chlorophyll have the same molecular structure except the central atom. The central atom of hemoglobin is iron whereas the central atom of chlorophyll is magnesium. Chlorophyll will help to oxygenate all cells in the body.</span></p><span data-dcnode-id="3950" instrument_node="">
</span><p data-dcnode-id="3948"><span data-dcnode-id="3949" instrument_node="">Using the three steps, I have written a protocol for the treatment of cancer in EC under the title " ALKALIZE, ANTIOXIDANT, CHLOROPHYLL PROTOCOL FOR CANCER". It seems that following two out of three steps helped your father to control liver cancer.</span></p><span data-dcnode-id="3947" instrument_node="">
</span><p data-dcnode-id="3945"><span data-dcnode-id="3946" instrument_node="">Best wishes to you and your father.</span></p><span data-dcnode-id="3944" instrument_node="">
</span><p data-dcnode-id="3942"><span data-dcnode-id="3943" instrument_node="">P. Raghavan.</span></p><span data-dcnode-id="3941" instrument_node="">

Tia Nelson,</span></p><span data-dcnode-id="3887" instrument_node="">
</span><p data-dcnode-id="3885"><span data-dcnode-id="3886" instrument_node="">There are many methods to alkalize the body. Your father chose Baking soda and Blackstrap molasses to alkalize his body. If you happen to know the pH level of your father's urine (the range of pH values) in the morning, it will be useful for others to follow your father's procedure. This pH value is a critical indication to determine how much alkaline one's body is.</span></p><span data-dcnode-id="3884" instrument_node="">
</span><p data-dcnode-id="3882"><span data-dcnode-id="3883" instrument_node="">In my opinion, the people with cancer should avoid or reduce the consumption highly acidic foods like :</span></p><span data-dcnode-id="3881" instrument_node="">
</span><p data-dcnode-id="3879"><span data-dcnode-id="3880" instrument_node="">1) Artificial sweeteners.</span></p><span data-dcnode-id="3878" instrument_node="">
</span><p data-dcnode-id="3876"><span data-dcnode-id="3877" instrument_node="">2) Red meat.</span></p><span data-dcnode-id="3875" instrument_node="">
</span><p data-dcnode-id="3873"><span data-dcnode-id="3874" instrument_node="">3) Carbonated soft drinks.</span></p><span data-dcnode-id="3872" instrument_node="">
</span><p data-dcnode-id="3870"><span data-dcnode-id="3871" instrument_node="">4) Alcohol.</span></p><span data-dcnode-id="3869" instrument_node="">
</span><p data-dcnode-id="3867"><span data-dcnode-id="3868" instrument_node="">5) White sugar.</span></p><span data-dcnode-id="3866" instrument_node="">
</span><p data-dcnode-id="3864"><span data-dcnode-id="3865" instrument_node="">6) White flour, etc.</span></p><span data-dcnode-id="3863" instrument_node="">
</span><p data-dcnode-id="3861"><span data-dcnode-id="3862" instrument_node="">If one wants to find whether a particular food is acidic or alkaline, the following procedure can be used:</span></p><span data-dcnode-id="3860" instrument_node="">
</span><p data-dcnode-id="3858"><span data-dcnode-id="3859" instrument_node="">1) First determine the pH value of one's urine. Consume the food and then wait for 30 minutes in case of liquid food or about 2 to 3 hours in case of solid food to complete digestion. No food should be taken in the waiting period.</span></p><span data-dcnode-id="3857" instrument_node="">
</span><p data-dcnode-id="3855"><span data-dcnode-id="3856" instrument_node="">2) Take a new sample of urine and determine its pH value. If the pH value is higher than the previous value, the food is alkaline. If there is a significant increase in the pH value, the food is highly alkaline. On the other hand, if the pH value is lower than the previous value, the food is acidic. If the pH value is significantly lower than the previous value, the food is highly acidic.</span></p><span data-dcnode-id="3854" instrument_node="">
</span><p data-dcnode-id="3852"><span data-dcnode-id="3853" instrument_node="">I hope this information will be useful.</span></p><span data-dcnode-id="3851" instrument_node="">
</span><p data-dcnode-id="3849"><span data-dcnode-id="3850" instrument_node="">Best wishes,</span></p><span data-dcnode-id="3848" instrument_node="">
</span><p data-dcnode-id="3846"><span data-dcnode-id="3847" instrument_node="">P. Raghavan.</span></p><span data-dcnode-id="3845" instrument_node="">

</span><a data-dcnode-id="2695" id="ds_51003" style="position: relative;top: -100px;"></a><span data-dcnode-id="2694" instrument_node="">
</span><div data-dcnode-id="2639" id="postwrap"><span data-dcnode-id="2693" instrument_node="">
</span><span data-dcnode-id="2689" id="postedby"><span data-dcnode-id="2692" instrument_node="">
Posted by Justpassingthrough (Cookeville, Tn, Usa) on 01/12/2011</span><br data-dcnode-id="2691"><span data-dcnode-id="2690" instrument_node="">
</span></span><span data-dcnode-id="2688" instrument_node="">
</span><br data-dcnode-id="2687"><span data-dcnode-id="2686" instrument_node=""> </span><p data-dcnode-id="2684"><span data-dcnode-id="2685" instrument_node="">
Read "The China Study", by T. Colin Campbell. Based upon a massive multi-year study of diet and health in over 6,400 Chinese counties, the book recommends a "whole-foods, plant-based diet". In rats they were able to turn cancer on and off like flipping a light switch, by changing their diet back and forth from the recommended one to one high in animal protein (similar to the typical American/western diet). This was regardless of carcinogen exposure. </span></p><span data-dcnode-id="2683" instrument_node="">
</span><p data-dcnode-id="2681"><span data-dcnode-id="2682" instrument_node="">In addition, among Filipino children exposed to chronic high doses of carcinogenic aflatoxin (from moldy peanuts in peanut-butter), only the ones whose families were wealthy and ate lots of animal protein had high rates of liver cancer. </span></p><span data-dcnode-id="2680" instrument_node="">
</span><p data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">Much, much more info in the book. Check it out, see what you think, and the very best to you and your family.</span></p><span data-dcnode-id="2677" instrument_node="">

My dad has primary liver cancer caused by hepatitis B. He has multiple nodules of cirrhosis thus surgical resection was not possible. My dad refused chemotherapy because he wanted to try other approaches. He was asymptomatic initially. Now, His liver and spleen are swollen after taking herbal supplements by Chris Teo (www.cacare.com). He experienced acute pain after starting on the medication and was hospitalized as the pain was so severe that he almost collapse. His condition seems to be getting worse due to the swelling. It interferes with his breathing. He still experiences pain and is taking painkillers daily for symptomatic relief. </span></p><span data-dcnode-id="2485" instrument_node="">
</span><p data-dcnode-id="2483"><span data-dcnode-id="2484" instrument_node="">Is there an alternative treatment to reduce his liver inflammation? The swelling seems to be the main cause of his discomfort now. And what should he take to fight his cancer cells?</span></p><span data-dcnode-id="2482" instrument_node="">

</span><p data-dcnode-id="2245"><span data-dcnode-id="2249" instrument_node="">
I just read about the value of K2 in liver cancer. It's from a book called </span><em data-dcnode-id="2247"><span data-dcnode-id="2248" instrument_node="">Vitamin K2 and the Calcium Paradox </span></em><span data-dcnode-id="2246" instrument_node="">by Dr. Kate Rheaume-Bleue.</span></p><span data-dcnode-id="2244" instrument_node="">
</span><p data-dcnode-id="2237"><span data-dcnode-id="2243" instrument_node="">In it she writes: </span><em data-dcnode-id="2238"><span data-dcnode-id="2242" instrument_node="">Hepatocellular carcinoma, a cancer that originates in the liver, is a common complication of hepatitis B and C. Vitamin K2 strongly </span><strong data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">induces the death of liver tumor cells</span></strong><span data-dcnode-id="2239" instrument_node="">, suggesting that it plays an important role in inhibiting tumor growth and invasiveness.</span></em></p><span data-dcnode-id="2236" instrument_node="">
</span><p data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">Natto (fermented soybeans), egg yolks, goose liver, hard cheeses (like Dutch gouda), soft cheeses (like Brie) are good sources of K2. There are others - you may want to do an Internet search. Natto is one of the best at over 1000 mcg per 3-1/2 ounces. It is, however, an acquired taste.</span></p><span data-dcnode-id="2233" instrument_node="">

Hi, Sarah; I am an undergraduate student in biology. I am not a doctor but one of the focuses of my studies has been several medical mushrooms that are used traditionally in Chinese herbal medicine to fight cancer. They have since been validated by every scientific study that has ever looked into them, which is hundreds.</span></p><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1202"><span data-dcnode-id="1206" instrument_node="">Your husband needs to immediately obtain a supply of as many of these fungi as possible and take them </span><strong data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">regularly. </span></strong><span data-dcnode-id="1203" instrument_node="">They are not necessarily cheap, although some can be wildcrafted for free if you can identify them, but they are a far better bet than chemo and cheaper besides.</span></p><span data-dcnode-id="1201" instrument_node="">
</span><p data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Ganoderma lucidum 'Reishi or ling chih', or Ganoderma applanatum 'Artist's conk' (much cheaper than true reishi but with the same medical effects. If you know what you are looking for you can probably pick it off trees in your nearest forest, I do all the time. ) This mushroom has shown strong abilities to fight cancer (through about 8 or 9 different mechanisms) but also to protect the liver from toxicity caused by cisplatin chemotherapy.</span></p><span data-dcnode-id="1198" instrument_node="">
</span><p data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">Inonotus obliquus 'Chaga'. This mushroom grows only on birch trees and the tea made from it is associated with extremely low cancer rates among peasants in Eastern Europe who were too poor to drink tea instead.</span></p><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Lentinula edodes 'Shiitake'. This one is pretty expensive unfortunately and he would need to be eating it as close to every day as he can.</span></p><span data-dcnode-id="1192" instrument_node="">
</span><p data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">Pleurotus ostreatus 'Oyster mushroom'. Has demonstrated very very strong medicinal abilities in many tests. Cheaper than shiitake.</span></p><span data-dcnode-id="1189" instrument_node="">
</span><p data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">Grifolia frondosa 'Maitake'. Same story as the above, more expensive.</span></p><span data-dcnode-id="1186" instrument_node="">
</span><p data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">Any one of these will help against cancer, and the more you combine the better your husband's chances will be. Read the book "Mycelium Running" by Paul Stamets and any doubts will be dispelled, which is important for any therapy.</span></p><span data-dcnode-id="1183" instrument_node="">
</span><p data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">Good luck;</span></p><span data-dcnode-id="1180" instrument_node="">
</span><p data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">Michael.</span></p><span data-dcnode-id="1177" instrument_node="">

</span><br data-dcnode-id="689"><span data-dcnode-id="688" instrument_node=""> </span><p data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">
According to alternative cancer pioneer Max Gerson, cancer only occurs in the presence of an impaired liver to begin with and any effective treatment, mainstream or otherwise, which destroys cancer cells will result in the release of toxins that further burden the liver. Chemo is also particularly hard on the liver and many supplements can be burdensome for the liver as well.</span></p><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Because of the importance of the role and health of the liver, before addressing which supplements may best help your pancreatic cancer (and there are at least two which are very promising), you should consider taking steps to protect and regenerate your liver as well as protect and keep the bile ducts open so that toxins can be efficiently processed and removed from the body (a primary function of the liver).</span></p><p data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Yucky as it sounds, coffee enemas have been found to be very effective in opening the bile duct. Coconut oil helps keep the bile ducts open also and beet juice is good for protecting the bile duct and regulating bile flow.</span></p><p data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">For the liver itself, milk thistle (silymarin) is the most effective supplement for both protecting and regenerating the liver and has been approved as effective at both by the German E Commission (their equivalent of the FDA when it comes to herbs). Lecithin with choline is wonderful for liver health and these herbs are also effective at protecting the liver: alpha lipoic acid, selenium and turmeric.</span></p><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">It should be noted that milk thistle, alpha lipoic acid and selenium are the three anti-oxidants which were used in the limited Berkson clinical trial where three women who were facing either chemo or liver transplants had their livers restored to normal functions with those anti-oxidants and healthy lifestyle changes. Furthermore, milk thistle, alpha-lipoic acid, selenium and turmeric are all regarded as cancer fighting supplements.</span></p><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">For more information, you may wish to read:</span></p><p data-dcnode-id="672"><span data-dcnode-id="675" instrument_node="">The Berkson Clinical Study </span><a data-dcnode-id="673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tbyil.com/berkson.htm"><span data-dcnode-id="674" instrument_node="">http://www.tbyil.com/berkson.htm</span></a></p><span data-dcnode-id="671" instrument_node="">
