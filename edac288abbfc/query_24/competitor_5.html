</span><div data-dcnode-id="3232" id="intro"><span data-dcnode-id="3362" instrument_node="">
</span><p data-dcnode-id="3360"><span data-dcnode-id="3361" instrument_node="">Any type of cancer can cause significant symptoms and concern; however, bladder cancer is one of the most often overlooked types of cancer despite its aggressive symptoms. If you suspect you may have a bladder issue, your first course of action should be to see a doctor. But, natural remedies, such as baking soda, blackstrap molasses, and lemon, are important treatment supports.</span></p><span data-dcnode-id="3359" instrument_node="">
</span><h2 data-dcnode-id="3357"><span data-dcnode-id="3358" instrument_node="">What Is Bladder Cancer?</span></h2><span data-dcnode-id="3356" instrument_node="">
</span><p data-dcnode-id="3350"><span data-dcnode-id="3355" instrument_node="">Bladder cancer is a fairly common condition that involves your bladder, or the organ in your pelvic region that contains urine. The condition generally begins in the cells that line the bladder and may spread to other parts of your system.</span><br data-dcnode-id="3354"><span data-dcnode-id="3353" instrument_node="">
</span><br data-dcnode-id="3352"><span data-dcnode-id="3351" instrument_node="">
While it is often unclear what causes bladder cancer, several related factors have been identified. Some of the primary suspects for causing cancer include smoking, parasitic infection, radiation, and chemical exposure. In any case, some factor causes the cells in your bladder to grow and divide abnormally. This abnormal growth leads to the development of a tumor or mass of abnormal cells.</span></p><span data-dcnode-id="3349" instrument_node="">
</span><h2 data-dcnode-id="3347"><span data-dcnode-id="3348" instrument_node="">What Are the Warning Signs for Bladder Cancer?</span></h2><span data-dcnode-id="3346" instrument_node="">
</span><p data-dcnode-id="3344"><span data-dcnode-id="3345" instrument_node="">A number of symptoms serve as warming signs that you may be developing bladder cancer. Some of the most common symptoms include blood in your urine, urine that appears dark brown or yellow or bright red in color, frequent urination, painful urination, back pain, and pelvic pain.</span></p><span data-dcnode-id="3343" instrument_node="">
</span><h2 data-dcnode-id="3341"><span data-dcnode-id="3342" instrument_node="">How is Bladder Cancer Treated Conventionally?</span></h2><span data-dcnode-id="3340" instrument_node="">
</span><p data-dcnode-id="3338"><span data-dcnode-id="3339" instrument_node="">Conventional treatment for bladder cancer varies depending on the severity of your condition, which is why it is so important to see a doctor. In early stages, bladder cancer can be treated via surgery to remove the tumor, parts of the bladder, or your entire bladder. Additionally, immune-stimulating bacterial treatments as well as synthetic immune system proteins are often used to trigger the body’s disease-fighting response.</span></p><span data-dcnode-id="3337" instrument_node="">
</span><h2 data-dcnode-id="3335"><span data-dcnode-id="3336" instrument_node="">Are There Any Effective Natural Remedies?</span></h2><span data-dcnode-id="3334" instrument_node="">
</span><p data-dcnode-id="3332"><span data-dcnode-id="3333" instrument_node="">Natural remedies are effective supports and go hand-in-hand with traditional medical treatment to treat bladder cancer safely and effectively. Some of the best natural remedies include baking soda, blackstrap molasses, and lemon. However, you may also benefit from a treatment known as the Budwig Diet; this is a treatment plan that focuses on feeding your body electron-rich foods to eradicate cancer cells.</span></p><span data-dcnode-id="3331" instrument_node="">
</span><h3 data-dcnode-id="3329"><span data-dcnode-id="3330" instrument_node="">1. Baking Soda</span></h3><span data-dcnode-id="3328" instrument_node="">
</span><p data-dcnode-id="3326"><span data-dcnode-id="3327" instrument_node="">Cancer cells thrive in an acidic environment, so one of the key components to treating cancer is to adjust your body’s pH.</span></p><span data-dcnode-id="3325" instrument_node="">
</span><p data-dcnode-id="3323"><span data-dcnode-id="3324" instrument_node="">You can effectively influence your pH positively by taking 1/4 - 1/2 teaspoon of baking soda diluted in 8 ounces of water daily. You can also use 1-2 cups of baking soda in a tubful of bath water to enhance your treatment even more.</span></p><span data-dcnode-id="3322" instrument_node="">
</span><p data-dcnode-id="3318"><span data-dcnode-id="3321" instrument_node="">Note: Baking Soda can cause side effects in some people, including intense detox symptoms (diarrhea) which can deplete your body of vital vitamins and minerals, like magnesium, potassium and B-12. Learn more </span><a data-dcnode-id="3319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/remedies/baking_soda.html"><span data-dcnode-id="3320" instrument_node="">here.</span></a></p><span data-dcnode-id="3317" instrument_node="">
</span><h3 data-dcnode-id="3315"><span data-dcnode-id="3316" instrument_node="">2. Blackstrap Molasses</span></h3><span data-dcnode-id="3314" instrument_node="">
</span><p data-dcnode-id="3312"><span data-dcnode-id="3313" instrument_node="">Blackstrap molasses also helps to balance your body’s pH level. You can effectively adopt this treatment by taking 1-2 tablespoons of the syrup by mouth daily. The molasses also contains a number of important nutrients that will boost your immune system.</span></p><span data-dcnode-id="3311" instrument_node="">
</span><p data-dcnode-id="3306"><span data-dcnode-id="3310" instrument_node="">Learn more about Blackstrap Molasses </span><a data-dcnode-id="3308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/remedies/molasses.html"><span data-dcnode-id="3309" instrument_node="">here</span></a><span data-dcnode-id="3307" instrument_node="">.</span></p><span data-dcnode-id="3305" instrument_node="">
</span><h3 data-dcnode-id="3303"><span data-dcnode-id="3304" instrument_node="">3. Lemon</span></h3><span data-dcnode-id="3302" instrument_node="">
</span><p data-dcnode-id="3300"><span data-dcnode-id="3301" instrument_node="">Lemon contains a potent amount of vitamin C – one of the most effective alternative cancer treatments.</span></p><span data-dcnode-id="3299" instrument_node="">
</span><div data-dcnode-id="3294" id="943725766"><span data-dcnode-id="3298" instrument_node="">
</span><span data-dcnode-id="3295" instrument_node="">
</span></div><p data-dcnode-id="3292"><span data-dcnode-id="3293" instrument_node="">Drinking lemon water daily and simply adding lemon juice to any variety of the dishes you eat is an effective way to boost your vitamin C intake and gain beneficial antioxidant effects.</span></p><span data-dcnode-id="3291" instrument_node="">
</span><h3 data-dcnode-id="3289"><span data-dcnode-id="3290" instrument_node="">4. Budwig Diet</span></h3><span data-dcnode-id="3288" instrument_node="">
</span><p data-dcnode-id="3286"><span data-dcnode-id="3287" instrument_node="">Johanna Budwig, a German biochemist, used a special blend of cottage cheese and flax seed oil to treat cancer. The blend must be freshly prepared and a good diet free of processed foods, sugars, and hydrogenated oils must accompany the cottage cheese and flax mixture.</span></p><span data-dcnode-id="3285" instrument_node="">
</span><p data-dcnode-id="3283"><span data-dcnode-id="3284" instrument_node="">To prepare the mixture:</span></p><span data-dcnode-id="3282" instrument_node="">
</span><ul data-dcnode-id="3253"><span data-dcnode-id="3281" instrument_node="">
</span><li data-dcnode-id="3276"><span data-dcnode-id="3280" instrument_node="">In a tall container place </span><strong data-dcnode-id="3278"><span data-dcnode-id="3279" instrument_node="">1/4 cup of low fat organic cottage cheese</span></strong><span data-dcnode-id="3277" instrument_node="">. &nbsp;</span></li><span data-dcnode-id="3275" instrument_node="">
</span><li data-dcnode-id="3270"><span data-dcnode-id="3274" instrument_node="">Add </span><strong data-dcnode-id="3272"><span data-dcnode-id="3273" instrument_node="">2 tablespoons of cold pressed flax seed</span></strong><span data-dcnode-id="3271" instrument_node="">. This must be stored in the refrigerator between uses.</span></li><span data-dcnode-id="3269" instrument_node="">
</span><li data-dcnode-id="3267"><span data-dcnode-id="3268" instrument_node="">Use an immersion blender to thoroughly blend the mixture together.</span></li><span data-dcnode-id="3266" instrument_node="">
</span><li data-dcnode-id="3264"><span data-dcnode-id="3265" instrument_node="">You may add 1 tablespoon of freshly ground flax seed to the mixture or some fresh organic fruit.</span></li><span data-dcnode-id="3263" instrument_node="">
</span><li data-dcnode-id="3261"><span data-dcnode-id="3262" instrument_node="">Do not add other herbs or ingredients to the mix.</span></li><span data-dcnode-id="3260" instrument_node="">
</span><li data-dcnode-id="3258"><span data-dcnode-id="3259" instrument_node="">The mix should be taken twice a day, though at first a smaller amount should be tried to make sure it suits you.</span></li><span data-dcnode-id="3257" instrument_node="">
</span><li data-dcnode-id="3255"><span data-dcnode-id="3256" instrument_node="">The mixture should be consumed fresh.</span></li><span data-dcnode-id="3254" instrument_node="">
</span></ul><span data-dcnode-id="3252" instrument_node="">
</span><p data-dcnode-id="3249"><br data-dcnode-id="3251"><span data-dcnode-id="3250" instrument_node="">
Cancer treatment often supports a holistic approach. Continue reading below for more suggestions from our readers. </span></p><h3 data-dcnode-id="3247"><span data-dcnode-id="3248" instrument_node="">Related Links:</span></h3><p data-dcnode-id="3234"><a data-dcnode-id="3245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/remedies/molasses.html"><span data-dcnode-id="3246" instrument_node="">50 Health Conditions Treated With Blackstrap Molasses</span></a><br data-dcnode-id="3244"><a data-dcnode-id="3242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/remedies/baking_soda.html"><span data-dcnode-id="3243" instrument_node="">Baking Soda Health Benefits</span></a><br data-dcnode-id="3241"><a data-dcnode-id="3239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/cures/cancer.html"><span data-dcnode-id="3240" instrument_node="">Natural Treatments for Cancer </span></a><br data-dcnode-id="3238"><a data-dcnode-id="3236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/remedies/alkalizing_formulas.html"><span data-dcnode-id="3237" instrument_node="">Ted's Famous Alkalizing Remedies</span></a><br data-dcnode-id="3235"></p><span data-dcnode-id="3233" instrument_node=""> </span></div><span data-dcnode-id="3231" instrument_node="">

</span><p data-dcnode-id="2890"><span data-dcnode-id="2891" instrument_node="">Half a tea spoon of sodium bi carbonate / baking soda with one lemon juice squeezed in and half a glass of water after thirty to forty min. of the meal should be taken. One can take twice a day. But if one wants to take it before the meal, then two hours before the meal.</span></p><span data-dcnode-id="2889" instrument_node="">
</span><p data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">One should also introduce flax seed and flax seed oil in the diet.</span></p><span data-dcnode-id="2886" instrument_node="">

</span><p data-dcnode-id="2599"><span data-dcnode-id="2600" instrument_node="">On 11-29-17 hubby had his yearly checkup, no tumors found. Two days later we received a call stating that cancer cells were found in his urine &amp; Doctor wanted to do another test. Hubby told him that he needed two weeks to try some things before having another test. Went in 12-15 for test but told it would take about a week for results. After a few calls we finally received wonderful news 1-5-18 that the cancer cells could not be found. The reason for the delay in the results was that they ran the tests several times because everyone was puzzled as to how cancer cells that were there were now gone in just a couple of weeks.</span></p><span data-dcnode-id="2598" instrument_node="">
</span><p data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node="">In addition to the baking soda drink, I added green smoothies to my husband's diet which included carrots, kale, apples &amp; other fruit to make it taste better. I made the asparagus for cancer from this site and the miracle drink for cancer, which is the juice of one beet root, one carrot, and one apple.</span></p><span data-dcnode-id="2595" instrument_node="">

</span><img align="baseline" alt="5 out of 5 stars" data-dcnode-id="2383" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/images/stars/5.png&amp;raw" title="5 out of 5 stars"><p data-dcnode-id="2381"><span data-dcnode-id="2382" instrument_node=""> </span></p><p data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node="">
Hi. For the third time in a year, my husband found himself with bladder tumors. The first time, he was told they were pre-cancerous. The second time: "developing cancer tumors". This time, the scan, which he was seeing too, showed one of them to be much, much worse--round with a lot of white looking bubbles. There were three in all. We were concerned. </span></p><span data-dcnode-id="2378" instrument_node="">
</span><p data-dcnode-id="2376"><span data-dcnode-id="2377" instrument_node="">The pre-surgery physician said they were low-grade cancer. </span></p><span data-dcnode-id="2375" instrument_node="">
</span><p data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">He was scheduled for surgery in three 1/2 weeks. I immediately put him on: </span></p><span data-dcnode-id="2372" instrument_node="">
</span><p data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">1) one teaspoon baking soda with one teaspoon molasses in water--twice a day. STIR WELL. It's recommended to heat it to make sure it's mixed well, though my husband didn't. I already knew that this helped one guy get rid of his high PSA, and saw a lot of other testimonies on the net. </span></p><span data-dcnode-id="2369" instrument_node="">
</span><p data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node="">2) 20 mg Astaxanthin--this is a powerful anti-oxidant, and is that which makes lobsters red. I had this gut feeling it also might help since I've read about a connection between inflammation and tumors! </span></p><span data-dcnode-id="2366" instrument_node="">
</span><p data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">Surgery was today.... And to the amazement of the surgeon, they were completely GONE. I wasn't amazed and all I could do was laugh. </span></p><span data-dcnode-id="2363" instrument_node="">
</span><p data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">I later asked the surgeon innocently (since allopathic doctors tend to yawn about alternative treatments): what do you think caused them to disappear? He said "they may have been inflammation, since inflammation and cancer look the same. " When I asked how could that just disappear, he was clueless. </span></p><span data-dcnode-id="2360" instrument_node="">
</span><p data-dcnode-id="2352"><span data-dcnode-id="2359" instrument_node="">Were they cancer or where they inflammation? All I know is that when you read scholary articles, </span><em data-dcnode-id="2357"><span data-dcnode-id="2358" instrument_node="">inflammation</span></em><span data-dcnode-id="2356" instrument_node=""> has long been associated with the development of </span><em data-dcnode-id="2354"><span data-dcnode-id="2355" instrument_node="">cancer</span></em><span data-dcnode-id="2353" instrument_node="">. They can be one and the same!!</span></p><span data-dcnode-id="2351" instrument_node="">
</span><p data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">So did the baking soda or the astaxanthin do this?? I don't know if it was one or both. BUT IT APPEARS TO HAVE WORKED. </span></p><p data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">I will keep him on baking soda (probaby without the molasses and a little less but twice a day) and astaxathin. I'll report how it goes as time goes by. </span></p><span data-dcnode-id="2346" instrument_node="">
</span><p data-dcnode-id="2339"><span data-dcnode-id="2345" instrument_node="">Inflammation and cancer (and MANY more on the net): </span><a data-dcnode-id="2343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jnci.oxfordjournals.org/content/early/2013/03/22/jnci.djt087" rel="nofollow"><span data-dcnode-id="2344" instrument_node="">http://jnci.oxfordjournals.org/content/early/2013/03/22/jnci.djt087</span></a><br data-dcnode-id="2342"><a data-dcnode-id="2340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencemag.org/content/339/6117/286.abstract" rel="nofollow"><span data-dcnode-id="2341" instrument_node="">http://www.sciencemag.org/content/339/6117/286.abstract</span></a></p><span data-dcnode-id="2338" instrument_node="">

</span></p><h3 data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">I UPDATED JAN 22 2018</span></h3><span data-dcnode-id="1463" instrument_node="">
</span><h3 data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">I'm 62 years old and cancer free! Read it! I remember getting planters warts because of all the marching with the new Navy issue shoes in boot camp. The doctors would shave the wart down daily then put a piece of hard foam with a hole in center over the wart to force it out with each step and kept shaving it down until the root would separate from the rest of the skin then grabbed it with tweezers and pulled it out! I did it myself many times after that. I'm planters wart free for over 40 years.</span></h3><span data-dcnode-id="1460" instrument_node="">
</span><h3 data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">I used borax to cure my cancer. I'm adding more information to this four months after I posted this.</span></h3><span data-dcnode-id="1457" instrument_node="">
</span><h3 data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Today is Jan 22,2018 and I want to add that the Doctors at the Veterans Hospital told my family If I didn't go through the entire procedure they recommended including scraping the tumors out of my bladder then after it healed to fill bladder and hold it in as long as I could or I'd die in 30 to 45 days.</span></h3><span data-dcnode-id="1454" instrument_node="">
</span><h3 data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Well after the doctors forced the large equipment (Video cameras needed to see what they were doing plus the scraping and burning equipment up my very small in diameter urinary track), they ripped it from tip of my male member all the way up to my bladder causing heavy bleeding which caused the catheter to get plugged up which caused a life threatening infection and tremendous pain. I begged doctors to cut my member off because it swelled to the size of a cucumber and was just as green. I told doctors I will not let their urinary doctors touch me again. Especially after the doctor pulled out the catheter from me as if he was trying to start a lawnmower that wouldn't start! I filed a report against him after I left the emergency room with Patient Advocate at the VA.</span></h3><span data-dcnode-id="1451" instrument_node="">
</span><h3 data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Well it's been just over 2 years since I was diagnosed with the cancer in 4 parts of my body and since I started treating my cancer with Borax. So I am living proof it works! The doctors did an ultrasound to locate the cancers they originally found on x-ray after I went to them because I saw blood in my urine. They wanted to find out if they could cut the cancers out. Well, they couldn't find any cancer! They wouldn't document when I told them of my curing it with Borax but they haven't done any more testing to try to locate it. I'm going to have my Primary care doctor put in an order for further tests to see if they can find any cancer in me. But they said I would be dead 30 to 45 days and it's 2 years now and I'm still here. I took a table spoon of Borax in a 2 liter plastic bottle from either Gatoraide or Poweraide. I drink it slowly over a few day period. I also recently found I've been getting erections for no reason throughout the day and night! (I'm celibate for many years I might add.) Which for me decreased with all the pain medications I was on. I haven't had this happen like this since grammar and High School!</span></h3><p data-dcnode-id="1448"></p><span data-dcnode-id="1447" instrument_node="">
</span><blockquote data-dcnode-id="1436"><p data-dcnode-id="1442"><b data-dcnode-id="1444"><span class="title1" data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">EC</span></span></b><span data-dcnode-id="1443" instrument_node="">: We just discovered this amazing comment on our borax video YouTube channel. It's from&nbsp;January 22, 2018. Someone recently replied that they discovered on Facebook that the&nbsp;pastor died last year (2020).&nbsp; It is the first testimonial about borax successfully treating cancer that we've come across!</span></p><span data-dcnode-id="1441" instrument_node="">

</span><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">
Hi Marty, my dad passed from this cancer 2 years ago very quickly so you have my sympathy. I can tell you what I have observed - dont do conventional treatment for this. My dad was a former athlete, still very fit drank no alcohol and ate everything in moderation. I would say follow teds advice and eat no sugar/ no carbs and measure your glucose levels 1 hour after eating. No foreign travel/ plane journeys as like ted said it does seem to aggravate this type of cancer. There is a lady in England called Mary Archer (who is married to a infamous English politician and author called Geffory archer) and she had this cancer and managed to have a bladder transplant and is fit and well now- so you may be able to google this and find out something useful. Good Luck and best wishes for your recovery, Heather x</span></p><span data-dcnode-id="1194" instrument_node="">

</span><p data-dcnode-id="1133"><span data-dcnode-id="1137" instrument_node="">The tea is an infusion of one heaped tsp per 1/4 litre of boiling water for 1/2 minute. </span><strong data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">Only two cups a day</span></strong><span data-dcnode-id="1134" instrument_node=""> are taken, 1 cup in the morning on an empty stomach, 1 cup in the evening, half an hour before the meal.</span></p><span data-dcnode-id="1132" instrument_node="">
</span><p data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">In Maria Treben's book "Health through God's Pharmacy" you can read about her experience on the Small Flowered Willow-herb.</span></p><span data-dcnode-id="1129" instrument_node="">

Ria, I am not sure if your question is about the Small Flowered Wilow but here is an extract of Maria Treben's book:</span></p><span data-dcnode-id="1021" instrument_node="">
</span><p data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Here is a general treatment for removing tumors:</span></p><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">A warm poultice of Horse tail applied above the tumor in the morning and afternoon each time for 2 hours. At noon apply Swedish Bitter as a compress.</span></p><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Drink 1 cup of Horse tail infusion 1/2 hour before breakfast and 1 cup 1/2 hour before supper. Also drink an infusion of Calendula, Yarrow and Stinging Nettle (ratio is 300g- 100g- 100g in 1. 5 liter of water). To each cup of this infusion you should add 3 to 6 drops of Wood Sorrel juice.</span></p><span data-dcnode-id="1012" instrument_node="">

I had a scare this spring after a appendicitis attack. |They discovered blood in my urine and thought I might have bladder cancer so they scheduled a procedure to scope the bladder. This kind of shocked me as I have been eating an organic diet for over 10 years. I have always been pretty extreme when it comes to what I put in my body.</span></p><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">I decided to put off the procedure for a month and try Ted's remedy for bladder cancer. My reasoning was IF they did find something I did not want them cutting into it and taking the risk of spreading. And if they did find something I knew I would not follow their protocol for treatment anyway.</span></p><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Took a bit of doing to find all the ingredients. Finally found the tannic acid at a wine making supply store. :o)</span></p><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="657"><span data-dcnode-id="660" instrument_node="">I did the regiment every hour for 4 hours twice a day. I also added in Astaxanthin after reading about other people success with it.</span><br data-dcnode-id="659"><span data-dcnode-id="658" instrument_node="">

</span><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">
I had a similar situation...all the signs of bladder cancer with no other explanation such as UTI, kidney stones, etc. Had an ultrasound and nothing was found. So they scheduled a scope and I was worried and I was in a lot of pain for months. Like you I wanted to cure it before something was found and they pressured me into their treatments. In an effort to cure myself, I put off the scope twice, extending my self treatment to 5 or 6 months. I already knew about Gerson and had seen a youtube video of Jay Kordich who cured his bladder cancer with carrot juice and granny smith apples. Googling bladder cancer and carrot juice led me to more information from a woman who describes her treatment by juicing 5 lbs of carrots a day. A man tried it as well and claimed it cured his bladder cancer. And when I looked further into it I learned there is an anti-cancer substance called farinicol found only in carrots. So thats what I did - I drank 5 lbs of carrot juice a day, cut out all other sugars, and took a teaspoon of baking soda in water in the morning. My skin turned orange, especially my hands. Having 2 young children I was very worried and didn't share with anyone what I feared. Drinking the carrot juice became somewhat addictive as my bladder would stop hurting when I drank it. After a while I was feeling better and not having much pain. I finally went in for the scope. When I got there they gave me a urinalysis and I became immediately hopeful when no microscopic blood was detected. This had not happened on the prior 6 urinalysis in the past year. The scope itself was painful but lucky for me it showed I was clear. I can't prove it, but I think I cured myself. The only alternate diagnosis I can come up with is Interstitial cystitis ( I am a medical provider.) I have not continued drinking the carrot juice regularly. Fortunately, I haven't had symptoms since but if I think I am getting any symptoms I will drink carrot juice again.</span></p><span data-dcnode-id="588" instrument_node="">
