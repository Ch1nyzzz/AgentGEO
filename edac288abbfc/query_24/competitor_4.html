Anti-Cancer Compounds Contained in Wheat Grass...</span></span></h3><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="736"><span data-dcnode-id="742" style="font-size: 12pt;"><span data-dcnode-id="743" instrument_node="">Cereal grasses such as wheat grass contain some extremely potent anti-cancer nutrients and chemicals, including abscisic acid, selenium and laetrile (B17). These have all been well documented for their ability to not only prevent cancers from developing, but also </span></span><span data-dcnode-id="740" style="font-size: 16px;"><span data-dcnode-id="741" instrument_node="">successfully</span></span><span data-dcnode-id="738" style="font-size: 12pt;"><span data-dcnode-id="739" instrument_node="">&nbsp;treat this disease. </span></span><br data-dcnode-id="737"></p><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="731"><span data-dcnode-id="733" style="font-size: 12pt"><span data-dcnode-id="734" instrument_node="">Two other recently discovered proteins, P4-D1 and D1-G1 are known to protect our cells from radiation and carcinogen damage by stimulating DNA repair. These are also found in abundance in wheat grass.</span></span><br data-dcnode-id="732"></p><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="725" style="font-size: 12pt;"><span data-dcnode-id="729" instrument_node="">Then let’s not forget about the huge amount of chlorophyll wheat grass contains. Chlorophyll is an exceptional “blood builder” and not only </span><u data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">protects</span></u><span data-dcnode-id="726" instrument_node=""> t</span></span><span data-dcnode-id="723" style="font-size: 12pt;"><span data-dcnode-id="724" instrument_node="">he body from cancer, it's actually considered by many health experts to be one of the best, if not </span></span><span data-dcnode-id="721" style="font-size: 12pt;text-decoration: none;"><span data-dcnode-id="722" instrument_node="">the</span></span><span data-dcnode-id="719" style="font-size: 12pt;"><span data-dcnode-id="720" instrument_node=""> best, cancer </span></span><span data-dcnode-id="717" style="font-size: 16px;"><span data-dcnode-id="718" instrument_node="">destroyers</span></span><span data-dcnode-id="715" style="font-size: 12pt;"><span data-dcnode-id="716" instrument_node="">&nbsp;going around!</span></span></p><span data-dcnode-id="713" instrument_node="">

Powerful Antioxidant Yet Discovered...</span></span></h3><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="706" style="font-size: 12pt"><span data-dcnode-id="707" instrument_node="">And finally, there's an enzyme in cereal grass that's believed to be the strongest detoxifier and antioxidant discovered so far... </span></span></p><p data-dcnode-id="701"><span data-dcnode-id="703" style="font-size: 12pt"><span data-dcnode-id="704" instrument_node="">Super-oxide dismutase (SOD) currently has researchers right around the world very excited. This remarkable enzyme has the ability to fully protect the body from degenerative diseases caused by free radical damage and toxic heavy metal overload (and yes, this includes cancer!)</span></span><span data-dcnode-id="702" instrument_node="">&nbsp;</span></p><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="697"><span data-dcnode-id="698" style="font-size: 12pt"><span data-dcnode-id="699" instrument_node="">This extract from research carried out by the Science University of Tokyo confirms the amazing power of SOD… </span></span></p><p data-dcnode-id="687"><span data-dcnode-id="688" style="font-size: 17px"><i data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">This enzyme has drawn tremendous attention from biologists, biochemists and other doctors in relation to cancer and carcinogenesis. Recently the importance of SOD has been extended to the study of some genetic diseases (bloom syndrome) and immune diseases. Its use in the medical field is being considered. Young barley plants contain a large amount of active SOD. This has been studied extensively and described in earlier reports. The barley SOD could be contributing to many of the phenomena young barley has shown so far. For example, superoxides inside the cells and surrounding the cells can cause damage to DNA. Older cells and environmentally or artificially damaged cells can have higher levels of superoxide and thus create more damage to cellular DNA. Green barley contains the enzyme SOD to remove superoxides and repair damaged DNA, together with lectin-like material to reactivate cells and tissues thus re-activating them as well as aiding in recovery from</span></i><span data-dcnode-id="694" instrument_node=""> </span><i data-dcnode-id="689"><span data-dcnode-id="693" instrument_node="">disease.</span><a data-dcnode-id="690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.goodhealth.com.au/wp-content/uploads/2009/08/barley-leaves-extract.pdf" onclick="return FIX.track(this);" rel="noopener nofollow" target="_blank"><span data-dcnode-id="691" style="font-size: 8px;"><span data-dcnode-id="692" instrument_node="">3</span></span></a></i></span></p><span data-dcnode-id="686" instrument_node="">
