</span><img alt="Baking Soda Remedy on Earth Clinic." data-dcnode-id="5354" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/images/pages/baking%2520soda%2520remedy.jpg&amp;raw" style="max-width: 300px;float: left;margin-right: 25px;margin-top: 55px;margin-bottom: 10px;" width="100%"><br data-dcnode-id="5353"><br data-dcnode-id="5352"><span data-dcnode-id="5351" instrument_node="">
</span><p data-dcnode-id="5349"><span data-dcnode-id="5350" instrument_node="">Alternative treatments for skin cancer, in addition to standard medical care, include topical applications of natural remedies like eggplant and baking soda as well as oral supplementation.</span></p><span data-dcnode-id="5348" instrument_node="">
</span><p data-dcnode-id="5346"><span data-dcnode-id="5347" instrument_node="">Some natural remedies, such as eggplant, possess unique healing compounds that can treat surface-level cancer cells.</span></p><span data-dcnode-id="5345" instrument_node="">
</span><p data-dcnode-id="5343"><span data-dcnode-id="5344" instrument_node="">Earth Clinic readers report success using baking soda and coconut oil, Curaderm (made from eggplant), and other holistic treatments for their skin conditions. However, other readers report that it is very important not to mess around with natural remedies when it comes to melanoma, and to seek urgent medical care.</span></p><span data-dcnode-id="5342" instrument_node="">
</span><h2 data-dcnode-id="5340"><span data-dcnode-id="5341" instrument_node="">What is Melanoma?</span></h2><span data-dcnode-id="5339" instrument_node="">
</span><p data-dcnode-id="5337"><span data-dcnode-id="5338" instrument_node="">The most severe kind of skin cancer, melanoma, develops at the site of melanin production. The melanocytes produce this natural component and give the skin its color, so melanoma is commonly located on skin exposed to the sun. Rarely, melanoma forms in the eyes or in the internal organs, including the intestines.</span></p><span data-dcnode-id="5336" instrument_node="">
</span><p data-dcnode-id="5334"><span data-dcnode-id="5335" instrument_node="">While the exact cause of melanoma is unclear, exposure to ultraviolet radiation increases the risk of the disease. The most common initial symptoms of melanoma include a change in an existing mole or the development of a new pigmented or abnormal-looking growth on the skin.</span></p><span data-dcnode-id="5333" instrument_node="">
</span><h2 data-dcnode-id="5331"><span data-dcnode-id="5332" instrument_node="">Alternative Treatments for Melanoma</span></h2><span data-dcnode-id="5330" instrument_node="">
</span><p data-dcnode-id="5328"><span data-dcnode-id="5329" instrument_node="">While the best treatment for melanoma is dependent on the stage of cancer and the individual’s overall health, alternative methods are often used in addition to standard medical care. Remedies like eggplant, bloodroot, and essiac tea have been found to deliver natural components to treat and eliminate the affected skin cells.</span></p><span data-dcnode-id="5327" instrument_node="">
</span><h3 data-dcnode-id="5325"><span data-dcnode-id="5326" instrument_node="">Eggplant</span></h3><span data-dcnode-id="5324" instrument_node="">
</span><p data-dcnode-id="5322"><span data-dcnode-id="5323" instrument_node="">Eggplant contains powerful phytonutrients that treat the affected cells involved in melanoma. The glycosides and glycoalkaloids contained in the eggplant penetrate and destroy cancer cells without harming healthy cells. Eggplant can be applied to the cells directly or macerated and mixed with vinegar for more effective treatment.</span></p><span data-dcnode-id="5321" instrument_node="">
</span><h3 data-dcnode-id="5319"><span data-dcnode-id="5320" instrument_node="">Bloodroot</span></h3><span data-dcnode-id="5318" instrument_node="">
</span><p data-dcnode-id="5316"><span data-dcnode-id="5317" instrument_node="">Bloodroot is a natural compound derived from the flowering perennial plant native to North America. The root contains special chemical sanguinarine. This compound causes apoptosis and kills the cancer cells while maintaining the health of normal cells.</span></p><span data-dcnode-id="5315" instrument_node="">
</span><h3 data-dcnode-id="5313"><span data-dcnode-id="5314" instrument_node="">Essiac Tea</span></h3><span data-dcnode-id="5312" instrument_node="">
</span><div data-dcnode-id="5307" id="943725766"><span data-dcnode-id="5311" instrument_node="">
</span><span data-dcnode-id="5308" instrument_node="">
</span></div><p data-dcnode-id="5305"><span data-dcnode-id="5306" instrument_node="">Essiac tea is a mixture of herbs including burdock root, slippery elm bark, sheep sorrel, and Indian rhubarb root. The tea made of the compound is shown to strengthen the immune system, relieve pain, and reduce tumor size. Additionally, essiac promotes cell repair and relieves inflammation.</span></p><span data-dcnode-id="5304" instrument_node="">
</span><p data-dcnode-id="5302"><span data-dcnode-id="5303" instrument_node="">Continue reading below for feedback from Earth Clinic readers who have tried various remedies over the years. Be sure to note the warnings they give as well.</span></p><span data-dcnode-id="5301" instrument_node="">

Hello</span></p><span data-dcnode-id="3813" instrument_node="">
</span><p data-dcnode-id="3811"><span data-dcnode-id="3812" instrument_node="">My daughter had 2 melanomas (5 years ago when she was 12 years old) and we removed them with blood root (topical salve), but it was clear when we removed them that one had gone very deep into the blood supply. I switched her to an alkaline diet, gave her large doses of Vitamin C and got her into the sunshine every day to boost her immune system. But I also gave her broccoli sprout juice everyday because I'd read that this actively reduces cancer and I didn't want the metastasized cells establishing themselves.</span></p><span data-dcnode-id="3810" instrument_node="">
</span><p data-dcnode-id="3808"><span data-dcnode-id="3809" instrument_node="">She ate like this for 5 months and drank what she considered to be horrible tasting broccoli sprout juice. It was a long 5 months and I didn't sleep well, but when we took her back for a scan she was cancer free. I wasn't sure that the broccoli sprout juice had been what had actually that cured her because we had also given her vitamin C until 3 years later.</span></p><span data-dcnode-id="3807" instrument_node="">
</span><p data-dcnode-id="3805"><span data-dcnode-id="3806" instrument_node="">I discovered that I had cancer (skin cancer, on my face) and I don't trust doctors so I decided to self-heal. I intuited that I needed broccoli sprout juice and to start with I drank about 100ml a day which is a lot then after a few weeks I intuited I needed less and so was drinking on average 50ml a day. After 2 months my lump disappeared and there is now just a teeny faint pink mark to remind me of how this wonderful juice healed me. As a result I drink this everyday and the best thing is, that the pains I had been having in one of my breasts (that I'd been ignoring for years) went away. I have no idea what was in my breast, but I can tell you it isn't now and I can tell you that I'm completely converted to the healing powers of broccoli sprout juice.</span></p><span data-dcnode-id="3804" instrument_node="">

</span><img align="baseline" alt="5 out of 5 stars" data-dcnode-id="3613" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/images/stars/5.png&amp;raw" title="5 out of 5 stars"><p data-dcnode-id="3611"><span data-dcnode-id="3612" instrument_node=""> </span></p><p data-dcnode-id="3607"><span data-dcnode-id="3610" instrument_node="">
</span><img align="left" data-dcnode-id="3609" id="editorschoice" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/images/editorschoice.jpg&amp;raw" style="padding-right:15px;" title="Editor\'s Choice" width="100"><span data-dcnode-id="3608" instrument_node="">
My 80 year old dad recently had 3 health issues going on. Gallbladder needed to be removed, a heart valve replacement as well as a cancerous growth all at the same time. Each doctor said the other issue had to be dealt with first so for 6 weeks his leg cancer grew until the point of doctor saying it required anesthesia and a huge area to be cut out! Because he is 80 I knew he needed a remedy that was easy to use and with something available in the kitchen.</span></p><span data-dcnode-id="3606" instrument_node="">
</span><p data-dcnode-id="3604"><span data-dcnode-id="3605" instrument_node="">He was becoming increasingly anxious about the painful cancer continuing to grow. After watching a youtube video, I offered a remedy to him and said I could not guarantee results but it was his decision alone. I was only "sharing a solution. The remedy is 50/50 baking SODA (sodium bicarbonate) and coconut oil, applied to area under a bandaid. I suggested changing the bandaid 2x a day. He decided to take a chance a did it diligently.</span></p><span data-dcnode-id="3603" instrument_node="">
</span><p data-dcnode-id="3601"><span data-dcnode-id="3602" instrument_node="">After 6 -9 days the pain completely disappeared and the sore started to shrink. After two weeks it was 85% smaller and he said he knew it was definitely healing. He didn't track the length of the treatment but I am pretty sure he put this "salve" on for about two full weeks. He said he could feel it working and the baking soda did feel like it was burning some. We decided it would be best to surround any non-cancerous skin with vaseline if he was to do it again. The baking soda somehow worked to create a highly alkaline environment where cancer could not survive and the coconut oil soothed the skin and was protective. I am posting pictures of before and after. Family members didn't really believe it could be true and said go back to the oncologist. My dad did go back in April for a followup and his doctor said 100% cured and that he was absolutely astonished.</span></p><span data-dcnode-id="3600" instrument_node="">
</span><p data-dcnode-id="3598"><span data-dcnode-id="3599" instrument_node="">So the picture with the purple dots is the area his doctor said would have to cut out under general anesthesia. The other photo is after the treatment.</span></p><span data-dcnode-id="3597" instrument_node="">

</span><br data-dcnode-id="3368"><span data-dcnode-id="3367" instrument_node=""> </span><p data-dcnode-id="3365"><span data-dcnode-id="3366" instrument_node="">
Looking for help with skin cancer lesions on foot.</span></p><span data-dcnode-id="3364" instrument_node="">
</span><p data-dcnode-id="3362"><span data-dcnode-id="3363" instrument_node="">My father has cancer on one of his feet, and gout that recurrs on his other foot. He has been on chemo for over a year. When the doctor suggested that the next step is radiation, he has chosen to continue the rest of his life without radiation. He is trying out something called Budwig protocol which is a natural remedy but so far no change after 1 week. We are concerned about the high dosage of omega 3. So I have scouted the site and have read about the use of DMSO to apply. In what form is it supposed to be? I have searched and found one type that is sold as a gel with 15gm of DMSO, 2.5gm D-Panthenol, and 0.33gm heparin sodium. Can this work? How much should we apply? By the way he is totally off sugar foods. He eats fruits as long as they do not have too much citric acid, since he says this triggers the gout by increasing the acidity levels. I have read about bomelain in fresh pineapples and I am going to suggest that he start on these.</span></p><span data-dcnode-id="3361" instrument_node="">

Earlier this summer I found a little bump on my forehead, about the size of 1/2 of a good sized pea. It was slightly crusty and there was crustiness around that area. I have since seen on the net that this matches one description for a precancerous skin condition. </span></p><span data-dcnode-id="3062" instrument_node="">
</span><p data-dcnode-id="3060"><span data-dcnode-id="3061" instrument_node="">I tried topical Iodine &amp; hydrogen peroxide with no success whatever. </span></p><span data-dcnode-id="3059" instrument_node="">
</span><p data-dcnode-id="3057"><span data-dcnode-id="3058" instrument_node="">I am not trying to get religious here but I feel I should give credit where credit is due. I prayed about what to do and felt YHWH brought me the word "eggplant" later out of the blue when I wasn't even thinking about the problem. </span></p><span data-dcnode-id="3056" instrument_node="">
</span><p data-dcnode-id="3054"><span data-dcnode-id="3055" instrument_node="">You can see on the net that there is an ingredient in eggplant that kills surface cancer cells - and they don't come back. </span></p><span data-dcnode-id="3053" instrument_node="">
</span><p data-dcnode-id="3051"><span data-dcnode-id="3052" instrument_node="">I started rubbing that bump &amp; much of the surrounding area with a slice of the eggplant every night. I used the white side, not the dark skin. I used no vinegar, just the eggplant slices plain &amp; simple. Within a few days the bump was shrinking. Within a month it was, and still is, totally gone. </span></p><span data-dcnode-id="3050" instrument_node="">
</span><p data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node="">Now I am going to get maybe a little bizarre. Since my sister has been found to have pre cancerous lesions in her colon, and since such things are very common, I have even taken to doing 2 retention enemas a week with eggplant added in after its been in the blender. I figure it can't hurt (and it hasn't, though whether it's a coincidence or not I can't say but I have become much more regular) and might help.</span></p><span data-dcnode-id="3047" instrument_node="">

I tried the eggplant and apple cider vinegar concoction for skin conditions I suspected were melanomas. One of the scars I treated with the concoction was a kelloid from a surgery I had about 30 years ago to remove an infected fibrocystic cyst on my stomach about two inches from my belly button and around my waistline. The kelloid started getting itchy and an even ugly scar was developing on top of the old scar. I started the daily treatment on September 12 up to this writing, October 6, 2012. My question is this, how long should I do this and how do I know that what I treated was in fact the deadly melanoma because I read a lot of strong warnings of the deadly melanoma. Thank you for any help or clarification!</span></p><span data-dcnode-id="2631" instrument_node="">

I too have what I suspect are melanoma on my back. They differ from the pics I've seen but have the itchiness and burning I've heard about. I stopped using the eggplant/vinegar after the pain was gone and after they started to heal. I still have some newer ones in an area that has several and there is definite pain and so I will continue until the pain is gone and the skin wants to heal. The ones that I treated earlier are gone. Most importantly I should go to a doctor, I haven't, personal reasons but this is our lives we're playing with so if you can go to a doc do.</span></p><span data-dcnode-id="2522" instrument_node="">

Posted by Anonymous (USA) on 12/22/2006</span><br data-dcnode-id="2416"><span data-dcnode-id="2415" instrument_node="">

</span><img align="baseline" alt="5 out of 5 stars" data-dcnode-id="2412" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/images/stars/5.png&amp;raw" title="5 out of 5 stars"><p data-dcnode-id="2410"><span data-dcnode-id="2411" instrument_node=""> </span></p><p data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">
A few years back when I was working in a village for aged,part of my job was to take residents to their doctor appointments. On one of these occasions the resident had a suspected melanoma on her leg. The doctor gave us a remedy you can buy in a tube (very expensive) or make it yourself. It got rid of the melanoma in about 2 wks. </span></p><span data-dcnode-id="2407" instrument_node="">
</span><p data-dcnode-id="2405"><span data-dcnode-id="2406" instrument_node="">Recipe: Ingredients </span></p><span data-dcnode-id="2404" instrument_node="">
</span><p data-dcnode-id="2400"><span data-dcnode-id="2403" instrument_node="">medium sized eggplant </span><br data-dcnode-id="2402"><span data-dcnode-id="2401" instrument_node="">white vinegar </span></p><span data-dcnode-id="2399" instrument_node="">
</span><p data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">Method: chop up eggplant &amp; place in a glass jar (not plastic) Pour in enough vinegar to cover eggplant, cover with a lid &amp; place in the door of the fridge for 3 days. </span></p><span data-dcnode-id="2396" instrument_node="">
</span><p data-dcnode-id="2394"><span data-dcnode-id="2395" instrument_node="">Every time you go to fridge for something, give the jar a little shake. After 3 days the liquid will turn a gold brown colour, strain the liquid &amp; keep refrigerated in the glass jar. How to use: Can be dabbed on to melanoma several times a day or can soak a cotton ball in the liquid, place on top of melanoma &amp; cover with tape (low allergenic kind) change at least twice a day. Need to do this for at least 2 weeks to kill off the melanoma. It only attacks the bad cells. The doctor said if it was a melanoma,after a few applications it could be quite painful when it goes after the nasties. If it didn't pain, unlikely to be of a menacing nature. (it also works on warts) Do it under a doctors supervision though. It definitely works,I have seen the wart disappear &amp; the resident I referred to had a painful healing for a few days but it cleared up after a couple of weeks.</span></p><span data-dcnode-id="2393" instrument_node="">

;"><span data-dcnode-id="2376" instrument_node=""> 8</span></span></i></a><span data-dcnode-id="2372" instrument_node=""> </span><a class="followlink" data-dcnode-id="2368" href="#"><i class="fa fa-eye" data-dcnode-id="2371" data-toggle="tooltip" title="Follow this thread in your account"></i><span data-dcnode-id="2370" instrument_node=""> </span><span data-dcnode-id="2369"></span></a><span data-dcnode-id="2367" instrument_node=""> </span><a data-dcnode-id="2363" href="#" onclick="flagPost('336', '10071', 'Eggplant and White Vinegar', 'Feedback');return false;"><i class="fa fa-flag red" data-dcnode-id="2366" data-toggle="tooltip" title="Report this post"></i><span data-dcnode-id="2365" instrument_node=""> </span><span data-dcnode-id="2364"></span></a><span data-dcnode-id="2362" instrument_node=""> </span></div><div class="hidlink" data-dcnode-id="2360" style="display: table-cell; text-align:right;"></div></div><span data-dcnode-id="2358" instrument_node="">

</span><p data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">
Interesting, but very dangerous, first of all, a melanoma can ONLY be diagnosed after excision by a pathologist and second of all, it is the most deadly skin cancer around, which can easily be cured with a little cut, when you are early enough.</span></p><span data-dcnode-id="2338" instrument_node="">
</span><p data-dcnode-id="2336"><span data-dcnode-id="2337" instrument_node="">I know, I had it and I would warn anyone who suspects (s)he has a melanoma; go to the docter and ask for it to be cut out, it's NOT worth the risk to lose time over it with self care which takes time you might regret later if you will die of this.</span></p><span data-dcnode-id="2335" instrument_node="">
</span><p data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">People tend to call a spot 'melanoma' without having 'hard core' evidence it is. This is very dangerous, cause 95% will die when metastised (and it does it fast) in a few years, most will die within 6 months.</span></p><span data-dcnode-id="2332" instrument_node="">
</span><p data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">But if your fast enough, and teh melanoma is small and cut out, your chances are almost 100 % to survive it.</span></p><span data-dcnode-id="2329" instrument_node="">
</span><p data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">Do not underestimate this cancer by thinking you can diagnose it yourself without any real knowledge and without a pathologist and then assume you can easily cure it with a 'potion': you may spread false information and someone might die as a result of your infornation.</span></p><span data-dcnode-id="2326" instrument_node="">

I am going to try the eggplant/vinegar recipe. Last winter I was diagnosed with breast cancer (non-aggressive). After my PET/PEM scan to determine any mets, I developed 3 spots on my skin that appeared to look like melanoma. That kind of cancer is not non-aggressive The one on my abdomen wasn't there at the time of diagnosis of my breast cancer but after the PET scan. I am using a variety of alternative supplements including: Protocel, Paw Paw, Graviola and Curcumin. I switched from Protocel 23 to 50 after finding the melanoma. I've applied protocel topically to the growths and they have gone away but not completely. The conventional medical community has nothing to offer but surgery, radiation (LOL) and chemo. My breast cancer started about the time I had extensive mammogramming procedures over 5 years ago. To the reader who cautioned others to seek conventional medical help... I will let you know if I survive.</span></p><span data-dcnode-id="2272" instrument_node="">

I went to a talk this weekend by one of the leading alternative cancer specialists in the country. I asked about bloodroot (cancema) as I've found all the info quite interesting on this and have a friend who used it for breast cancer and swears by it. The doctor said it was effective but a really painful way to get rid of (predominantly) melanoma. She said to put drops of Lugol's iodine on the spot instead and it would eventually kill it off - roots and all. Also works for warts. She said if you do opt to have the cancer removed surgically, make sure you take burdock root and other blood purifiers for at least a week after as some roots (of the cancer tumor) will break off or get left behind, they then make their way into the bloodstream, and then attach themselves to something else - like an organ - and it starts all over again. She also had some interesting things to say about lemons but I'll post those on the lemon remedies page.</span></p><span data-dcnode-id="2014" instrument_node="">

</span><p data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">
I am sorry for your loss... however, bitter much? I sure am, only I'm on the opposite side of the coin...let me share with you what happens in melanoma removal in my family. I lost my beloved father after he, at age 59, let surgeons follow the dots and cut out his melanoma on his shoulder. Well since they drug their feet between drawing their dot-to-dot and surgery, it spread PAST their little drawing over that 2 weeks and also went deeper and entered his lymph system. Two more weeks later it was in his liver and the size of a grapefruit. They then dropped the ball on starting his chemo soon enough.</span></p><span data-dcnode-id="1513" instrument_node="">
</span><p data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">Chemo by the way comes from mustard gas, MUSTARD GAS look it up! They started his chemo cocktail...round one...felt okay, round two, peeing blood and fever of 105,2 days into round 3 I pulled the plug on the chemo because there was more blood, lumps now showed up on his spine and skull, I had to help him to the commode and yet the chemo center was pleading with us to bring him in to pour more poison into his body, they called the house 4 times a day, even offered to bring that poison to the house and run it through his half dead body! I finally had to threaten to call the authorities if they called back, it was awful! I was his medical power of attorney. He had made me sign the paperwork knowing I would know when to pull the plug on the chemo and to this day I wish I'd pulled it after that first round!!</span></p><span data-dcnode-id="1510" instrument_node="">
</span><p data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">He insisted on 'trying' the chemo because he felt he had nothing to lose and that we, the family left behind, would always 'wonder' if he didn't try it. We had watched 7 other family members die from their side effects from chemo, not from their melanoma! Three more have died since daddy - same results! I was diagnosed with melanoma that same year as he was, yet I changed my diet and have used &amp; grasped any and every natural protocol I can get my hands on. Daddy died within 4 months with surgery &amp; medical intervention and 2 full rounds of the nasty! I am still here...currently 10 years later in 2017! Oh, and my aunt had it removed with same results, two cousins, same thing, chemo side effects killed them before they could finish their cocktails! ðŸ˜¢</span></p><span data-dcnode-id="1507" instrument_node="">
</span><p data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">Let me say this: you have to do the research! You have to use the right protocols inside and out and change your diet, gut health and stress level is crucial! One man's protocol is not the magic cure all for the next guy. AND..it takes time to see if a protocol is having an effect or not! No one can promise or guarantee that their particular protocol can cure, treat or heal your particular ailment, tumor, etc, it's all trial and error. But I'll take natural over mustard gas any day and twice on Sunday, esp after my years of research since losing my dad, husband and so many others to cancer! God has given us what we need to heal, treat, and cure ourselves from within and topically, and it's not a magic pill, radiation or nerve gas derivative &amp; it doesn't come at the price of taking a scalpel to our bodies, although if the time comes I can't shrink an internal tumor, I think I might consider removal, but never ever chemo! Natural is always ALWAYS best, you just have to research the correct natural protocol, and I'm truly sorry that whatever it was your daughter in law tried out did not work for her but did the opposite. It sounds like either she attacked an already large tumor with something that adversely made it grow, or perhaps the concoction had impure ingredients. Often I run across many who cannot get their hands on what they 'really need' for a protocol, so they'll substitute something close or a knockoff of the main ingredient. Another option could be that her 'type' of cancer tumor cell responded rapidly to treatment by enlarging, whereas a melanoma would have shrunk. This is to say that there are certain protocols for melanoma that only work for 'melanoma', just as there are protocols for basal cell cancer tumors that only work for that type of skin cancer and so on.</span></p><span data-dcnode-id="1504" instrument_node="">
</span><p data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">Again, I'm so sorry for your loss.</span></p><span data-dcnode-id="1501" instrument_node="">

</span><img align="baseline" alt="5 out of 5 stars" data-dcnode-id="1031" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/images/stars/5.png&amp;raw" title="5 out of 5 stars"><p data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node=""> </span></p><p data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">
I am 58 yr old female. I had an anomaly on my lower right leg a few inches above my ankle that appeared over the last 6-7 years as a light brown spot the size of a dime. I took my first photo of it in 2018 and had been keeping an eye on it. Late in 2021, I noticed that it had become darker and ominous. I had heard someone mention in passing in an online video that frankincense oil had been successful in treating melanoma. Sure enough, I looked online and found studies have been conducted.</span></p><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">I first tried dabbing frankincense essential oil on the anomaly 3-4 times a day. After two weeks and no noticeable improvement, I decided to add curcumin (an active ingredient in turmeric) which has also been studied on cancer. I did this by saturating a small piece of cotton with frankincense oil, and then opening a capsule of curcumin and sprinkling it on the saturated cotton. I then placed the cotton on the anomaly and a band-aid over it. I did this daily for almost four weeks and the anomaly is completely gone.</span></p><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">I recently had an annual checkup with my primary and showed them the photo before I started treating the anomaly and they concurred that it appeared to be melanoma and gave me a referral to a dermatologist even tho I showed them that it had disappeared.</span></p><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">I hope this is helpful. It took some dedication to treat, but was better than going thru a biopsy and subsequently having a chunk removed from my leg, not to mention the cost considering my insurance deductible is $7500.</span></p><span data-dcnode-id="1017" instrument_node="">
