</span><div class="floatleft" data-dcnode-id="1505"><a data-dcnode-id="1506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DPortal%3ATobacco" title="Portal:Tobacco"><img alt="Tobaccospin.jpg" data-dcnode-id="1507" decoding="async" height="157" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/images/1/16/Tobaccospin.jpg&amp;raw" width="84"></a></div><span data-dcnode-id="1504" instrument_node="">

</span><p data-dcnode-id="1493"><span data-dcnode-id="1500" instrument_node="">This article is part of the </span><a data-dcnode-id="1498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DPortal%3ATobacco" title="Portal:Tobacco"><span data-dcnode-id="1499" instrument_node="">Tobacco portal</span></a><span data-dcnode-id="1497" instrument_node=""> on Sourcewatch funded from 2006 - 2009 by the </span><a data-dcnode-id="1495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DAmerican_Legacy_Foundation" title="American Legacy Foundation"><span data-dcnode-id="1496" instrument_node="">American Legacy Foundation</span></a><span data-dcnode-id="1494" instrument_node="">.

</span></div><span data-dcnode-id="1484" instrument_node="">
</span><p data-dcnode-id="1461"><span data-dcnode-id="1483" instrument_node="">The </span><b data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">Alliance Defense Fund</span></b><span data-dcnode-id="1480" instrument_node=""> (ADF) was founded in 1994 by more than 30 Christian ministries, as a response to the </span><a data-dcnode-id="1478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DAmerican_Civil_Liberties_Union" title="American Civil Liberties Union"><span data-dcnode-id="1479" instrument_node="">American Civil Liberties Union</span></a><span data-dcnode-id="1477" instrument_node="">, to defend "family values." ADF's major focus is strategizing and coordinating with hundreds of lawyers and </span><a data-dcnode-id="1475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DRight-wing" title="Right-wing"><span data-dcnode-id="1476" instrument_node="">right-wing</span></a><span data-dcnode-id="1474" instrument_node=""> groups to defend what they define as "Christian legal issues." Examples include anti-gay cases like Boy Scouts of America v. Dale and Schenck v. Pro-Choice Network, and a national strategy to "protect marriage," following Vermont's decision to allow </span><a data-dcnode-id="1472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DSame-sex_marriage" title="Same-sex marriage"><span data-dcnode-id="1473" instrument_node="">same-sex civil unions</span></a><span data-dcnode-id="1471" instrument_node="">. </span><a data-dcnode-id="1469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DPeople_for_the_American_Way" title="People for the American Way"><span data-dcnode-id="1470" instrument_node="">People for the American Way</span></a><span data-dcnode-id="1468" instrument_node=""> notes that ADF's founding groups "are influential members of the Right, they are pro-life and anti-gay and their ultimate goal is to see the law and government of the US enshrined with </span><a class="new" data-dcnode-id="1466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DConservative%26action%3Dedit%26redlink%3D1" title="Conservative (page does not exist)"><span data-dcnode-id="1467" instrument_node="">conservative</span></a><span data-dcnode-id="1465" instrument_node=""> Christian principles." In 2004, ADF's total revenue was $17,921,146 (fiscal year ended June 2004), with net assets of $20,581,560. </span><a class="external autonumber" data-dcnode-id="1463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.charitynavigator.org/index.cfm/bay/search.summary/orgid/5495.htm" rel="nofollow"><span data-dcnode-id="1464" instrument_node="">[1]</span></a><span data-dcnode-id="1462" instrument_node="">
</span></p><p data-dcnode-id="1444"><span data-dcnode-id="1460" instrument_node="">"In 1994, ADF solicited funds on Christian radio with an ad claiming, 'Pro-life demonstrations may soon be illegal. ... Religious broadcasting may soon be censored. Hiring homosexuals in Christian schools, churches, and even as Sunday School teachers may soon become the law of the land. ... Don't let Christianity become a crime' ... In 2003, ADF President, CEO, and General Counsel </span><a data-dcnode-id="1458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DAlan_Sears" title="Alan Sears"><span data-dcnode-id="1459" instrument_node="">Alan Sears</span></a><span data-dcnode-id="1457" instrument_node=""> and ADF Vice President </span><a class="new" data-dcnode-id="1455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DCraig_Osten%26action%3Dedit%26redlink%3D1" title="Craig Osten (page does not exist)"><span data-dcnode-id="1456" instrument_node="">Craig Osten</span></a><span data-dcnode-id="1454" instrument_node=""> "expanded on that theme" in </span><i data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">The Homosexual Agenda: Exposing the Principal Threat to Religious Freedom Today</span></i><span data-dcnode-id="1451" instrument_node="">, "which ties homosexuality to pedophilia and other "disordered sexual behavior," according to the </span><a data-dcnode-id="1449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DSouthern_Poverty_Law_Center" title="Southern Poverty Law Center"><span data-dcnode-id="1450" instrument_node="">Southern Poverty Law Center</span></a><span data-dcnode-id="1448" instrument_node="">, </span><a class="external text" data-dcnode-id="1446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.splcenter.org/intel/intelreport/article.jsp%3Fpid%3D870" rel="nofollow"><span data-dcnode-id="1447" instrument_node="">2005</span></a><span data-dcnode-id="1445" instrument_node="">. 
</span></p><p data-dcnode-id="1436"><span data-dcnode-id="1443" instrument_node="">ADF claims a high success rate in their legal challenges: "God has granted wins in almost three out of four cases decided (John 15:5). Cases that strengthen our position in the battle for religious freedom, the sanctity of human life, and </span><a data-dcnode-id="1441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DTraditional_family_values" title="Traditional family values"><span data-dcnode-id="1442" instrument_node="">traditional family values</span></a><span data-dcnode-id="1440" instrument_node="">." </span><a class="external autonumber" data-dcnode-id="1438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.alliancedefensefund.org/lowercourt.php" rel="nofollow"><span data-dcnode-id="1439" instrument_node="">[2]</span></a><span data-dcnode-id="1437" instrument_node="">
</span></p><p data-dcnode-id="1430"><span data-dcnode-id="1435" instrument_node="">In its 2007 fiscal year, ADF spent $3,951,791 on direct litigation, according to Guidestar.</span><sup class="reference" data-dcnode-id="1432" id="cite_ref-1"><a data-dcnode-id="1433" href="#cite_note-1"><span data-dcnode-id="1434" instrument_node="">[1]</span></a></sup><span data-dcnode-id="1431" instrument_node="">
</span></p><span data-dcnode-id="1429" instrument_node="">
</span><div class="toc" data-dcnode-id="1254" id="toc"><input class="toctogglecheckbox" data-dcnode-id="1428" id="toctogglecheckbox" role="button" style="display:none" type="checkbox"><div class="toctitle" data-dcnode-id="1423" dir="ltr" lang="en"><h2 data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">Contents</span></h2><span class="toctogglespan" data-dcnode-id="1424"><label class="toctogglelabel" data-dcnode-id="1425" for="toctogglecheckbox"></label></span></div><span data-dcnode-id="1422" instrument_node="">

</span><h2 data-dcnode-id="1250"><span class="mw-headline" data-dcnode-id="1251" id="Programs"><span data-dcnode-id="1252" instrument_node="">Programs</span></span></h2><span data-dcnode-id="1249" instrument_node="">
</span><p data-dcnode-id="1244"><span data-dcnode-id="1248" instrument_node="">According to its website</span><a class="external autonumber" data-dcnode-id="1246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.alliancedefensefund.org/" rel="nofollow"><span data-dcnode-id="1247" instrument_node="">[3]</span></a><span data-dcnode-id="1245" instrument_node="">, ADF runs six programs:
</span></p><span data-dcnode-id="1243" instrument_node="">
</span><ul data-dcnode-id="1223"><li data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">National Litigation Academy - "a state-of-the-art lawyer training project" providing training to sympathetic lawyers so that they can handle "free-speech, religious liberty, or other matters involving constitutional law" of importance to ADF</span></li><span data-dcnode-id="1240" instrument_node="">
</span><li data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">Blackstone Fellowship - a "nine-week summer leadership development program in law and servant ministry" for law students, primarily those between their first and second year of law school, to "profoundly influence Christian law students to take their training and knowledge into positions of influence where they can bring about needed change in America's legal system"</span></li><span data-dcnode-id="1237" instrument_node="">
</span><li data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">Scholarships - the William Pew Religious Freedom Scholarship Competition, for law students, with awards of $500 to $5000</span></li><span data-dcnode-id="1234" instrument_node="">
</span><li data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">Case Funding - to help "people suffering religious discrimination," who can "not afford attorneys"</span></li><span data-dcnode-id="1231" instrument_node="">
</span><li data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">Case Litigation / Mentoring - "to train newly licensed attorneys in the fine art of litigating--and winning--legal matters protecting religious freedom, the sanctity of human life, and traditional family values"</span></li><span data-dcnode-id="1228" instrument_node="">
</span><li data-dcnode-id="1224"><span data-dcnode-id="1227" instrument_node="">Faith &amp; Freedom Sunday - "a national Church-based day of prayer and instruction - and a rapidly growing grassroots movement - to secure religious freedom in America"; the third observance is scheduled for October 3, 2004</span><a class="external autonumber" data-dcnode-id="1225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.faithandfreedomsunday.com/" rel="nofollow"><span data-dcnode-id="1226" instrument_node="">[4]</span></a></li></ul><span data-dcnode-id="1222" instrument_node="">
</span><h3 data-dcnode-id="1219"><span class="mw-headline" data-dcnode-id="1220" id="National_Litigation_Academy:_Training_Lawyers"><span data-dcnode-id="1221" instrument_node="">National Litigation Academy: Training Lawyers</span></span></h3><span data-dcnode-id="1218" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1217" instrument_node="">"What motivated </span><a class="mw-redirect" data-dcnode-id="1215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DD._James_Kennedy" title="D. James Kennedy"><span data-dcnode-id="1216" instrument_node="">D. James Kennedy</span></a><span data-dcnode-id="1214" instrument_node=""> and other conservatives—including </span><a class="mw-redirect" data-dcnode-id="1212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DJames_C._Dobson" title="James C. Dobson"><span data-dcnode-id="1213" instrument_node="">James C. Dobson</span></a><span data-dcnode-id="1211" instrument_node=""> of </span><a data-dcnode-id="1209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DFocus_on_the_Family" title="Focus on the Family"><span data-dcnode-id="1210" instrument_node="">Focus on the Family</span></a><span data-dcnode-id="1208" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="1206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DBill_Bright" title="Bill Bright"><span data-dcnode-id="1207" instrument_node="">William Bright</span></a><span data-dcnode-id="1205" instrument_node=""> of the </span><a data-dcnode-id="1203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DCampus_Crusade_for_Christ" title="Campus Crusade for Christ"><span data-dcnode-id="1204" instrument_node="">Campus Crusade for Christ</span></a><span data-dcnode-id="1202" instrument_node="">—to form the ADF was the impression that Christians were losing too many such battles," Peter Slevin </span><a class="external text" data-dcnode-id="1200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.washingtonpost.com/wp-dyn/content/article/2006/07/09/AR2006070900903_2.html" rel="nofollow"><span data-dcnode-id="1201" instrument_node="">wrote</span></a><span data-dcnode-id="1199" instrument_node=""> in the July 10, 2006, </span><i data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Washington Post</span></i><span data-dcnode-id="1196" instrument_node="">.
</span></p><p data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">"'It was just years of seeing the ACLU and its cronies attacking religious organizations or religious exercise,' Kennedy said. 'And, very frequently, there was nobody that even showed up to defend the Christian position.'
</span></p><p data-dcnode-id="1185"><span data-dcnode-id="1192" instrument_node="">"To change the equation, the alliance hired Reagan-era prosecutor </span><a data-dcnode-id="1190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DAlan_Sears" title="Alan Sears"><span data-dcnode-id="1191" instrument_node="">Alan Sears</span></a><span data-dcnode-id="1189" instrument_node="">. He later brought in corporate lawyer </span><a class="new" data-dcnode-id="1187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DJeffery_Ventrella%26action%3Dedit%26redlink%3D1" title="Jeffery Ventrella (page does not exist)"><span data-dcnode-id="1188" instrument_node="">Jeffery Ventrella</span></a><span data-dcnode-id="1186" instrument_node="">. Mostly under Ventrella's watch, the ADF has schooled more than 800 outside lawyers, each promising to donate 450 hours to the cause."
</span></p><span data-dcnode-id="1184" instrument_node="">
</span><h2 data-dcnode-id="1181"><span class="mw-headline" data-dcnode-id="1182" id="Against_student_fees"><span data-dcnode-id="1183" instrument_node="">Against student fees</span></span></h2><span data-dcnode-id="1180" instrument_node="">
</span><p data-dcnode-id="1163"><span data-dcnode-id="1179" instrument_node="">ADF has been involved in several university cases. In 1998, ADF filed a lawsuit claiming that religious groups at Ohio's Miami University did not have equal access to university funding and facilities. The </span><a class="new" data-dcnode-id="1177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DCenter_for_Campus_Free_Speech%26action%3Dedit%26redlink%3D1" title="Center for Campus Free Speech (page does not exist)"><span data-dcnode-id="1178" instrument_node="">Center for Campus Free Speech</span></a><span data-dcnode-id="1176" instrument_node=""> warned: "this attempt to ensure 'equal access' for all voices could be overshadowed by the broader strategy behind this case. It is an effort to limit debate on campus that is being driven by the Alliance Defense Fund (ADF). ADF is the right-wing legal foundation that is backing this suit and similar cases in Wisconsin and Minnesota attacking mandatory student fees. ADF's literature claims their lawsuits will 'eliminate millions of dollars from those who oppose biblical values, religious freedom, and the spread of the gospel'. They hope to forward their own political cause by dismantling student activities fees."</span><a class="external autonumber" data-dcnode-id="1174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.campusspeech.org/speech.asp%3Fid2%3D13114" rel="nofollow"><span data-dcnode-id="1175" instrument_node="">[5]</span></a><span data-dcnode-id="1173" instrument_node=""> Other groups that have used legal challenges in an attempt to limit the use of student fees include the </span><a data-dcnode-id="1171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DPacific_Legal_Foundation" title="Pacific Legal Foundation"><span data-dcnode-id="1172" instrument_node="">Pacific Legal Foundation</span></a><span data-dcnode-id="1170" instrument_node=""> and </span><a data-dcnode-id="1168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DIndividual_Rights_Foundation" title="Individual Rights Foundation"><span data-dcnode-id="1169" instrument_node="">Individual Rights Foundation</span></a><span data-dcnode-id="1167" instrument_node="">.</span><a class="external autonumber" data-dcnode-id="1165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.campusspeech.org/speech.asp%3Fid2%3D12432" rel="nofollow"><span data-dcnode-id="1166" instrument_node="">[6]</span></a><span data-dcnode-id="1164" instrument_node="">
</span></p><span data-dcnode-id="1162" instrument_node="">
</span><h2 data-dcnode-id="1158"><span data-dcnode-id="1161" id="Cupertino_case_--_the_&quot;banning&quot;_of_the_Declaration_of_Independence"></span><span class="mw-headline" data-dcnode-id="1159" id="Cupertino_case_--_the_.22banning.22_of_the_Declaration_of_Independence"><span data-dcnode-id="1160" instrument_node="">Cupertino case -- the "banning" of the Declaration of Independence</span></span></h2><span data-dcnode-id="1157" instrument_node="">
</span><p data-dcnode-id="1137"><span data-dcnode-id="1156" instrument_node="">On November 22, 2004, ADF lawyers filed suit on behalf of Stephen Williams against the Cupertino Union School District in Cupertino, California.  Williams,
a fifth-grade teacher at Stevens Creek Elementary School, had been told not to use class handouts that proselytized for Christianity.  His suit alleged that his First Amendment rights had been violated.  Because one of his handouts included excerpts from the Declaration of Independence making reference to God, the ADF's </span><a class="external text" data-dcnode-id="1154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.alliancedefensefund.org/news/default.aspx%3Fmid%3D800%26cid%3D3218" rel="nofollow"><span data-dcnode-id="1155" instrument_node="">press release</span></a><span data-dcnode-id="1153" instrument_node=""> about the case was headlined "Declaration of Independence Banned from Classroom".  </span><a data-dcnode-id="1151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DFox_News" title="Fox News"><span data-dcnode-id="1152" instrument_node="">Fox News</span></a><span data-dcnode-id="1150" instrument_node=""> and other conservative outlets gave heavy play to that distorted version of the story. </span><a class="external autonumber" data-dcnode-id="1148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mediamatters.org/items/200412090002" rel="nofollow"><span data-dcnode-id="1149" instrument_node="">[7]</span></a><span data-dcnode-id="1147" instrument_node=""> </span><a data-dcnode-id="1145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DAlan_Keyes" title="Alan Keyes"><span data-dcnode-id="1146" instrument_node="">Alan Keyes</span></a><span data-dcnode-id="1144" instrument_node=""> also repeated ADF's spin: "Someone was mentioning to me that there is a school district now in America where they will no longer teach the Declaration of Independence to the students. Why? Because it mentions God.  ...  [N]ow we’re being told that on account of some doctrine that has been promulgated by the courts, it is now unconstitutional to teach our children about the Declaration." </span><a class="external autonumber" data-dcnode-id="1142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.renewamerica.us/news/041207decatur.htm" rel="nofollow"><span data-dcnode-id="1143" instrument_node="">[8]</span></a><span data-dcnode-id="1141" instrument_node="">  The truth, as pointed out in an answering </span><a class="external text" data-dcnode-id="1139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cupertino.ca.campusgrid.net/home/NewsRelease113004.pdf" rel="nofollow"><span data-dcnode-id="1140" instrument_node="">press release</span></a><span data-dcnode-id="1138" instrument_node=""> from the school district, was that "The Declaration of Independence, sections of the United States Constitution, and other historical documents are re-printed in our textbooks, displayed in some of our school buildings, and taught in our social studies curriculum and lessons."
</span></p><span data-dcnode-id="1136" instrument_node="">
</span><h2 data-dcnode-id="1133"><span class="mw-headline" data-dcnode-id="1134" id="ADF_encourages_spiritual_leaders_to_endorse_candidates_from_the_pulpit"><span data-dcnode-id="1135" instrument_node="">ADF encourages spiritual leaders to endorse candidates from the pulpit</span></span></h2><span data-dcnode-id="1132" instrument_node="">
</span><p data-dcnode-id="1127"><span data-dcnode-id="1131" instrument_node="">In September, 2008 the ADF organized "Pulpit Freedom Sunday," which it described as "a legal effort designed to secure the First Amendment rights of pastors in the pulpit."  Pulpit Freedom Sunday is associated with the ADF Pulpit Initiative.  </span><a class="external autonumber" data-dcnode-id="1129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.telladf.org/UserDocs/WhatIsPI.pdf" rel="nofollow"><span data-dcnode-id="1130" instrument_node="">[9]</span></a><span data-dcnode-id="1128" instrument_node="">
</span></p><p data-dcnode-id="1118"><span data-dcnode-id="1126" instrument_node="">ADF encouraged the participating religious figures to send copies of their sermons to the </span><a data-dcnode-id="1124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DInternal_Revenue_Service" title="Internal Revenue Service"><span data-dcnode-id="1125" instrument_node="">Internal Revenue Service</span></a><span data-dcnode-id="1123" instrument_node="">, in hopes of inducing a challenge to the law barring religious organizations and other nonprofit groups that accept tax-deductible contributions from using their affiliation with the nonprofit to intervene or attempt to influence partisan political campaigns. </span><sup class="reference" data-dcnode-id="1120" id="cite_ref-2"><a data-dcnode-id="1121" href="#cite_note-2"><span data-dcnode-id="1122" instrument_node="">[2]</span></a></sup><span data-dcnode-id="1119" instrument_node="">
</span></p><p data-dcnode-id="1107"><span data-dcnode-id="1117" instrument_node="">The ADF claimed that the event was needed "to restore the rights of pastors to speak freely from the pulpit without fear of punishment by the government for doing what churches do:  speak on any number of cultural and societal issues from a biblical perspective." </span><a class="external autonumber" data-dcnode-id="1115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.alliancedefensefund.org/news/story.aspx%3Fcid%3D4690" rel="nofollow"><span data-dcnode-id="1116" instrument_node="">[10]</span></a><span data-dcnode-id="1114" instrument_node="">  ADF Senior Legal Counsel </span><a class="new" data-dcnode-id="1112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DErik_Stanley%26action%3Dedit%26redlink%3D1" title="Erik Stanley (page does not exist)"><span data-dcnode-id="1113" instrument_node="">Erik Stanley</span></a><span data-dcnode-id="1111" instrument_node=""> claimed that "ADF is not trying to get politics into the pulpit.  Churches can decide for themselves that they either do or don’t want their pastors to speak about electoral candidates.  The point of the Pulpit Initiative is very simple:  the IRS should not be the one making the decision by threatening to revoke a church’s tax-exempt status.  We need to get the government out of the pulpit." </span><a class="external autonumber" data-dcnode-id="1109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.alliancedefensefund.org/news/story.aspx%3Fcid%3D4690" rel="nofollow"><span data-dcnode-id="1110" instrument_node="">[11]</span></a><span data-dcnode-id="1108" instrument_node="">

</span><ul data-dcnode-id="801"><li data-dcnode-id="848"><a data-dcnode-id="855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DAmerican_Center_for_Law_and_Justice" title="American Center for Law and Justice"><span data-dcnode-id="856" instrument_node="">American Center for Law and Justice</span></a><span data-dcnode-id="854" instrument_node="">, founded by evangelist </span><a data-dcnode-id="852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DPat_Robertson" title="Pat Robertson"><span data-dcnode-id="853" instrument_node="">Pat Robertson</span></a><span data-dcnode-id="851" instrument_node=""> </span><a class="external autonumber" data-dcnode-id="849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.washingtonpost.com/wp-dyn/content/article/2006/07/09/AR2006070900903.html" rel="nofollow"><span data-dcnode-id="850" instrument_node="">[13]</span></a></li><span data-dcnode-id="847" instrument_node="">
</span><li data-dcnode-id="838"><a data-dcnode-id="845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DLiberty_Counsel" title="Liberty Counsel"><span data-dcnode-id="846" instrument_node="">Liberty Counsel</span></a><span data-dcnode-id="844" instrument_node="">, backed by the Rev. </span><a data-dcnode-id="842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DJerry_Falwell" title="Jerry Falwell"><span data-dcnode-id="843" instrument_node="">Jerry Falwell</span></a><span data-dcnode-id="841" instrument_node=""> </span><a class="external autonumber" data-dcnode-id="839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.washingtonpost.com/wp-dyn/content/article/2006/07/09/AR2006070900903.html" rel="nofollow"><span data-dcnode-id="840" instrument_node="">[14]</span></a></li><span data-dcnode-id="837" instrument_node="">
</span><li data-dcnode-id="832"><span data-dcnode-id="836" instrument_node="">A 2007 press release by Americans United for the Separation of Church and State states, "Alan Sears’ Alliance Defense Fund took in $26.1 million in 2006, an increase of $4.1 million over last year."</span><sup class="reference" data-dcnode-id="833" id="cite_ref-5"><a data-dcnode-id="834" href="#cite_note-5"><span data-dcnode-id="835" instrument_node="">[5]</span></a></sup></li><span data-dcnode-id="831" instrument_node="">
</span><li data-dcnode-id="826"><span data-dcnode-id="830" instrument_node="">Guidestar reports that in the fiscal year ending June 30, 2007 ADF has assets of $38,905,923 (from June 30, 2007 Form 990) and income of $31,674,124 (from June 30, 2007 Form 990).</span><sup class="reference" data-dcnode-id="827" id="cite_ref-6"><a data-dcnode-id="828" href="#cite_note-6"><span data-dcnode-id="829" instrument_node="">[6]</span></a></sup></li><span data-dcnode-id="825" instrument_node="">
</span><li data-dcnode-id="802"><span data-dcnode-id="824" instrument_node="">An April 1, 2007 article in the Washington Spectator by Sarah Posner says "Some of the [ADF's] major donors include the </span><a class="new" data-dcnode-id="822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DCovenant_Foundation%26action%3Dedit%26redlink%3D1" title="Covenant Foundation (page does not exist)"><span data-dcnode-id="823" instrument_node="">Covenant Foundation</span></a><span data-dcnode-id="821" instrument_node="">, financed by the "Granddaddy" of the Texas Christian Right, business mogul </span><a data-dcnode-id="819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DJames_R._Leininger" title="James R. Leininger"><span data-dcnode-id="820" instrument_node="">James Leininger</span></a><span data-dcnode-id="818" instrument_node="">; various members of the Amway-Prince Automotive empire, including the </span><a data-dcnode-id="816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DEdgar_and_Elsa_Prince_Foundation" title="Edgar and Elsa Prince Foundation"><span data-dcnode-id="817" instrument_node="">Edgar and Elsa Prince Foundation</span></a><span data-dcnode-id="815" instrument_node="">, whose vice president, </span><a data-dcnode-id="813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DErik_Prince" title="Erik Prince"><span data-dcnode-id="814" instrument_node="">Erik Prince</span></a><span data-dcnode-id="812" instrument_node=""> (Edgar and Elsa's son, and brother of Betsy DeVos, wife of the Amway magnate, right-wing financier, and unsuccessful Republican gubernatorial candidate Richard DeVos), founded the </span><a class="mw-redirect" data-dcnode-id="810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DBlackwater_USA" title="Blackwater USA"><span data-dcnode-id="811" instrument_node="">Blackwater USA</span></a><span data-dcnode-id="809" instrument_node=""> military-security firm; and the </span><a class="new" data-dcnode-id="807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sourcewatch.org/index.php%3Ftitle%3DBolthouse_Foundation%26action%3Dedit%26redlink%3D1" title="Bolthouse Foundation (page does not exist)"><span data-dcnode-id="808" instrument_node="">Bolthouse Foundation</span></a><span data-dcnode-id="806" instrument_node="">, which is underwritten chiefly with profits from Bolthouse Farms, a family-run California company whose products are often seen at organic markets and Whole Foods. Bolthouse requires recipients of its grants to pledge adherence to a statement of faith that includes the declaration that "man was created by a direct act of God in His image, not from previously existing creatures" and a belief in "the everlasting blessedness of the saved and the everlasting punishment of the lost."</span><sup class="reference" data-dcnode-id="803" id="cite_ref-7"><a data-dcnode-id="804" href="#cite_note-7"><span data-dcnode-id="805" instrument_node="">[7]</span></a></sup></li></ul><span data-dcnode-id="800" instrument_node="">
