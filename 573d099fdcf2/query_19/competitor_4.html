</span><p data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Law Enforcement is a diverse, American tapestry: We have families. We are made up of all colors, shapes, and sizes. And each day we put our lives on the line. Justice for police officers is justice for all.</span></p><span data-dcnode-id="659" instrument_node=""> </span></div><span data-dcnode-id="657" instrument_node="">

</span><p data-dcnode-id="639"><img alt="" class="alignright wp-image-219 size-medium" data-dcnode-id="640" height="200" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nationalcenterforpolicedefense.com/wp-content/uploads/2020/08/ncpd-homepage-content-image-two-300x200.jpg&amp;raw" srcset="https://nationalcenterforpolicedefense.com/wp-content/uploads/2020/08/ncpd-homepage-content-image-two-300x200.jpg 300w, https://nationalcenterforpolicedefense.com/wp-content/uploads/2020/08/ncpd-homepage-content-image-two.jpg 600w" width="300"></p><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">National Center for Police Defense, Inc isn’t only about legal defense for Law Enforcement. National Center for Police Defense, Inc. is about help! We provide many forms of support in the midst of an on-duty catastrophe.</span></p><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">National Center for Police Defense, Inc. is a non-profit, pro-law enforcement organization that helps protect police officers, sheriffs, peace officers, federal agents and first responders, including our military from the system that they protect and serve, during their time of crisis. The National Center for Police Defense, Inc. is dedicated to helping Law Enforcement Officers in their time of need.</span></p><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Our organization provides support during the legal process after traumatic and life-changing on-duty incidents, or when officers are severely injured and out on sick leave and need assistance until they are back on their feet.</span></p><span data-dcnode-id="632" instrument_node=""> </span></div><span data-dcnode-id="630" instrument_node="">
