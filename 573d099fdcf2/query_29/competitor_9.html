 data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="544"><p class="has-dropcap has-dropcap__lead-standard-heading" data-dcnode-id="733"><span data-dcnode-id="746" instrument_node="">The North Atlantic Treaty Organization, or </span><em class="small" data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">NATO</span></em><span data-dcnode-id="743" instrument_node="">, the largest and most powerful military alliance in history, is not usually fodder for election-year politicking. But </span><a class="external-link" data-dcnode-id="738" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;http://www.nytimes.com/2016/07/21/us/politics/donald-trump-issues.html&quot;}" data-offer-url="http://www.nytimes.com/2016/07/21/us/politics/donald-trump-issues.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nytimes.com/2016/07/21/us/politics/donald-trump-issues.html" rel="nofollow noopener" target="_blank"><span data-dcnode-id="742" instrument_node="">in an interview with the </span><em data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Times</span></em><span data-dcnode-id="739" instrument_node=""> earlier this week</span></a><span data-dcnode-id="737" instrument_node="">, Republican Presidential nominee Donald Trump said that the United States should not automatically honor </span><em class="small" data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">NATO</span></em><span data-dcnode-id="734" instrument_node="">’s core principle of mutual defense, specifically if Russia invaded several newer members of the alliance, the three strategic Baltic states and former Soviet republics—Lithuania, Latvia, and Estonia. In a sharp rebuke, White House spokesman Josh Earnest said Thursday that the principle of mutual defense is “ironclad.” He told reporters, “There should be no mistake or miscalculation made about this country’s commitment to the transatlantic alliance.”</span></p><div class="GenericCalloutWrapper-XXWD fAtWY callout--has-top-border inset-embedded-lede" data-dcnode-id="722" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;GenericCallout&quot;}" data-in-view="{&quot;pattern&quot;:&quot;GenericCallout&quot;}" data-include-experiments="true" data-testid="GenericCallout"><figure class="AssetEmbedWrapper-iLfYbx iclJOW asset-embed" data-dcnode-id="723"><div class="AssetEmbedAssetContainer-fogSSF kRpSOB asset-embed__asset-container" data-dcnode-id="729"><span class="SpanWrapper-kGGzGm fCMktF responsive-asset AssetEmbedResponsiveAsset-eqsnW ehcXJi asset-embed__responsive-asset" data-dcnode-id="730"><picture class="ResponsiveImagePicture-jIKgcS fJlKfN AssetEmbedResponsiveAsset-eqsnW ehcXJi asset-embed__responsive-asset responsive-image responsive-image--expandable" data-dcnode-id="731" style=""><img alt="Douglas Lute a retired U.S. Army lieutenant general has been the U.S. Ambassador to NATO since 2013." class="ResponsiveImageContainer-dlOMGF dnUTOP responsive-image__image" data-dcnode-id="732" sizes="100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.newyorker.com/photos/590978858b51cf59fc42363b/master/w_2560%252Cc_limit/Wright-WhatDoesNATODoAnyway.jpg&amp;raw" srcset="https://media.newyorker.com/photos/590978858b51cf59fc42363b/master/w_120,c_limit/Wright-WhatDoesNATODoAnyway.jpg 120w, https://media.newyorker.com/photos/590978858b51cf59fc42363b/master/w_240,c_limit/Wright-WhatDoesNATODoAnyway.jpg 240w, https://media.newyorker.com/photos/590978858b51cf59fc42363b/master/w_320,c_limit/Wright-WhatDoesNATODoAnyway.jpg 320w, https://media.newyorker.com/photos/590978858b51cf59fc42363b/master/w_640,c_limit/Wright-WhatDoesNATODoAnyway.jpg 640w, https://media.newyorker.com/photos/590978858b51cf59fc42363b/master/w_960,c_limit/Wright-WhatDoesNATODoAnyway.jpg 960w, https://media.newyorker.com/photos/590978858b51cf59fc42363b/master/w_1280,c_limit/Wright-WhatDoesNATODoAnyway.jpg 1280w, https://media.newyorker.com/photos/590978858b51cf59fc42363b/master/w_1600,c_limit/Wright-WhatDoesNATODoAnyway.jpg 1600w, https://media.newyorker.com/photos/590978858b51cf59fc42363b/master/w_1920,c_limit/Wright-WhatDoesNATODoAnyway.jpg 1920w, https://media.newyorker.com/photos/590978858b51cf59fc42363b/master/w_2240,c_limit/Wright-WhatDoesNATODoAnyway.jpg 2240w"></picture></span></div><div class="CaptionWrapper-brisHk hqrsSC caption AssetEmbedCaption-eXYFag gJkEYz asset-embed__caption" data-dcnode-id="724" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;Caption&quot;}" data-in-view="{&quot;pattern&quot;:&quot;Caption&quot;}" data-include-experiments="true"><span class="BaseWrap-sc-TURhJ BaseText-fFzBQt CaptionText-cOFJqa eTiIvU fYICFM hTa-dbB caption__text" data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Douglas Lute, a retired U.S. Army lieutenant general, has been the U.S. Ambassador to NATO since 2013.</span></span><span class="BaseWrap-sc-TURhJ BaseText-fFzBQt CaptionCredit-cTdqxu eTiIvU eCQuey fXWSOn caption__credit" data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Photograph by JOHN THYS / AFP / Getty</span></span></div></figure></div><p class="paywall" data-dcnode-id="709"><em class="small" data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">NATO</span></em><span data-dcnode-id="719" instrument_node="">’s Secretary General Jens Stoltenberg warned, “We defend one another. . . . Two world wars have shown that peace in Europe is also important for the security of the United States.” Solidarity among allies is “a key value for </span><em class="small" data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">NATO</span></em><span data-dcnode-id="716" instrument_node="">,” he said, </span><a class="external-link" data-dcnode-id="714" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.buzzfeed.com/albertonardelli/nato-chief-hits-back-after-trump-says-he-wouldnt-automatical?utm_term=.pkO2qyvB0#.rbpKBDGeE&quot;}" data-offer-url="https://www.buzzfeed.com/albertonardelli/nato-chief-hits-back-after-trump-says-he-wouldnt-automatical?utm_term=.pkO2qyvB0#.rbpKBDGeE" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buzzfeed.com/albertonardelli/nato-chief-hits-back-after-trump-says-he-wouldnt-automatical%3Futm_term%3D.pkO2qyvB0%23.rbpKBDGeE" rel="nofollow noopener" target="_blank"><span data-dcnode-id="715" instrument_node="">in a statement</span></a><span data-dcnode-id="713" instrument_node="">. Trump’s comments came under fire from fellow-Republicans, too. “Statements like these make the world more dangerous and the United States less safe,” </span><a class="external-link" data-dcnode-id="711" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;http://finance.yahoo.com/news/lindsey-graham-donald-trumps-nato-154747323.html&quot;}" data-offer-url="http://finance.yahoo.com/news/lindsey-graham-donald-trumps-nato-154747323.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//finance.yahoo.com/news/lindsey-graham-donald-trumps-nato-154747323.html" rel="nofollow noopener" target="_blank"><span data-dcnode-id="712" instrument_node="">Senator Lindsey Graham</span></a><span data-dcnode-id="710" instrument_node="">, a South Carolina Republican, tweeted.</span></p><p class="paywall" data-dcnode-id="693"><em class="small" data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">NATO</span></em><span data-dcnode-id="706" instrument_node=""> grew out of America’s Marshall Plan to help rebuild a stable and secure Europe after the Second World War. It came from&nbsp;a bipartisan effort by President Harry Truman and Senate Foreign Relations Committee Chairman Arthur Vandenberg, a Michigan Republican—and has had bipartisan support ever since. The original twelve members have since more than doubled to twenty-eight nations. One of the member nations’ biggest tasks today is the fight against the Islamic State in Iraq and Syria (</span><em class="small" data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">ISIS</span></em><span data-dcnode-id="703" instrument_node=""> or </span><em class="small" data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">ISIL</span></em><span data-dcnode-id="700" instrument_node="">). </span><em class="small" data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">NATO</span></em><span data-dcnode-id="697" instrument_node=""> members have been in Washington this week, convening with the U.S.-led coalition fighting the Islamic State, which is now preparing for the battle over strategic Mosul, Iraq, the largest city under </span><em class="small" data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">ISIS</span></em><span data-dcnode-id="694" instrument_node="">’s control.</span></p><p class="paywall" data-dcnode-id="682"><span data-dcnode-id="692" instrument_node="">Since 2013, Douglas Lute, a former three-star general and graduate of West Point, has been the U.S. Ambassador to </span><em class="small" data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">NATO</span></em><span data-dcnode-id="689" instrument_node="">, whose headquarters are in Brussels. In 2007, President George W. Bush appointed Lute to be deputy national security adviser for Iraq and Afghanistan, a position nicknamed the “war czar” during the U.S. surge in Iraq. He was one of three senior officials retained by President Obama, who later appointed him to be the top envoy to </span><em class="small" data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">NATO</span></em><span data-dcnode-id="686" instrument_node="">. Lute talked to me on Thursday about the role and history of </span><em class="small" data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">NATO</span></em><span data-dcnode-id="683" instrument_node="">. The interview has been condensed and edited for clarity.</span></p><p class="paywall" data-dcnode-id="676"><em data-dcnode-id="677"><span data-dcnode-id="681" instrument_node="">What role does </span><em class="small" data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">NATO</span></em><span data-dcnode-id="678" instrument_node=""> play in global security today?</span></em></p><p class="paywall" data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">After the Second World War, the U.S. and a set of eleven other countries joined together and said essentially, “We’re not doing that again. There’s got to be a better way forward. We can work together to prevent aggression against us and to insure we don’t aggress against each other.” The Washington Treaty was signed in 1949. The foundation of it is the “mutual defense” clause, Article Five, that says an attack on one nation is considered an attack on all of them.</span></p><div class="inline-recirc-wrapper inline-recirc-observer-target-1 viewport-monitor-anchor" data-attr-viewport-monitor="inline-recirc" data-dcnode-id="673" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-in-view="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-include-experiments="true"></div><p class="paywall" data-dcnode-id="668"><span data-dcnode-id="672" instrument_node="">And it’s worked. </span><em class="small" data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">NATO</span></em><span data-dcnode-id="669" instrument_node=""> has kept the peace in Europe and bound together the U.S., Canada, and European allies in a way that has been fundamentally stabilizing for the world order. It has had an outsized influence beyond that territory. It’s really served as the anchor for world security over the last sixty-seven years.</span></p><p class="paywall" data-dcnode-id="665"><em data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">When has Article Five been invoked?</span></em></p><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--article-mid-content" data-dcnode-id="662" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--article-mid-content consumer-marketing-unit__slot--in-content" data-dcnode-id="664"></div><div class="journey-unit" data-dcnode-id="663"></div></div><p class="paywall" data-dcnode-id="648"><span data-dcnode-id="661" instrument_node="">Only once in sixty-seven years. Throughout the Cold War it was never invoked. But on 9/11, with nearly three thousand people, not all Americans, lost in New York and Washington, the Council at </span><em class="small" data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">NATO</span></em><span data-dcnode-id="658" instrument_node=""> headquarters, in Brussels, unanimously agreed to offer its assistance to the United States under Article Five. This is quite ironic. </span><em class="small" data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">NATO</span></em><span data-dcnode-id="655" instrument_node=""> was founded on the premise of preventing an attack by the Soviet Union in Central Europe, where the U.S. would have to come to the aid of Europe. But the tables were completely turned. The one historic example we have of </span><em class="small" data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">NATO</span></em><span data-dcnode-id="652" instrument_node=""> in operation for its founding purpose—which is collective defense—had </span><em class="small" data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">NATO</span></em><span data-dcnode-id="649" instrument_node=""> coming to U.S. assistance after 9/11.</span></p><p class="paywall" data-dcnode-id="642"><em data-dcnode-id="643"><span data-dcnode-id="647" instrument_node="">Where has </span><em class="small" data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">NATO</span></em><span data-dcnode-id="644" instrument_node=""> been deployed, and why? How has it evolved?</span></em></p><p class="paywall" data-dcnode-id="616"><span data-dcnode-id="641" instrument_node="">I’d break down the history of </span><em class="small" data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">NATO</span></em><span data-dcnode-id="638" instrument_node=""> into three parts. For the first forty years, </span><em class="small" data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">NATO</span></em><span data-dcnode-id="635" instrument_node=""> focussed on its greatest risk—the threat that the Soviet Union posed to Western European security. When the Berlin Wall fell, in 1989, and, two years later, the Soviet Union broke apart, </span><em class="small" data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">NATO</span></em><span data-dcnode-id="632" instrument_node=""> took a few years to find itself. Its raison d’être had been removed. It became clear not long after 1991 that Europe faced new instability along its borders that could infect Europe itself, so </span><em class="small" data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">NATO</span></em><span data-dcnode-id="629" instrument_node=""> adapted. The earliest and most prominent case was the breakup of Yugoslavia. </span><em class="small" data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">NATO</span></em><span data-dcnode-id="626" instrument_node=""> was drawn in to stop the fighting in Bosnia and Herzegovina, in 1995. Sixty thousand </span><em class="small" data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">NATO</span></em><span data-dcnode-id="623" instrument_node=""> troops left the central front and moved into the Balkans. Four years later, in 1999, </span><em class="small" data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">NATO</span></em><span data-dcnode-id="620" instrument_node=""> stopped the humanitarian crisis in Kosovo and then stabilized the security situation. </span><em class="small" data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">NATO</span></em><span data-dcnode-id="617" instrument_node=""> still has five thousand troops in Kosovo keeping watch on a fragile security situation.</span></p><p class="paywall" data-dcnode-id="605"><span data-dcnode-id="615" instrument_node="">Then, in 2001, 9/11 takes place and </span><em class="small" data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">NATO</span></em><span data-dcnode-id="612" instrument_node=""> launches into its largest ever and longest ever combat operation in Afghanistan. </span><em class="small" data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">NATO</span></em><span data-dcnode-id="609" instrument_node=""> has over twelve thousand troops still stabilizing Afghanistan, training Afghan forces, and making sure that Afghanistan does not revert to a terrorist safe haven. So there’s a period of about the last twenty-five years where </span><em class="small" data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">NATO</span></em><span data-dcnode-id="606" instrument_node=""> has tried to promote stability beyond its territories and taken its military capacity beyond its periphery.</span></p><p class="paywall" data-dcnode-id="600"><span data-dcnode-id="604" instrument_node="">Today we may be on the edge of the next phase of </span><em class="small" data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">NATO</span></em><span data-dcnode-id="601" instrument_node="">. We have now a very different Russia than the Russia we were dealing with in the past two decades. It’s aggressed against a neighbor. It’s seized parts of Ukraine, the Crimean Peninsula, and destabilized other parts of Ukraine. It’s increased its military budget. It’s promoted more aggressive conventional- and nuclear-war-fighting doctrines. It has fundamentally torn up the rule book that has stabilized Europe since the end of World War II. It’s a very dramatic geostrategic shift of the security situation in Europe.</span></p><div class="Container-imGeBO ftlPuP" data-dcnode-id="588" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;CNEInterludeEmbed&quot;}" data-in-view="{&quot;pattern&quot;:&quot;CNEInterludeEmbed&quot;}" data-include-experiments="true"><figure class="VideoFigure-hZUgyy jbuRMw" data-dcnode-id="589" data-testid="cne-interlude-container"><p class="BaseWrap-sc-TURhJ BaseText-fFzBQt InterludeHeader-bqgsPm eTiIvU bBIcIl gJspkd" data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">Video From The New Yorker</span></p><a class="BaseWrap-sc-TURhJ BaseText-fFzBQt BaseLink-gZQqBA InterludeTitleLink-bfxTQh eTiIvU hPdaTG iYqWCq csoDwQ" data-dcnode-id="595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newyorker.com/video/watch/throwing-shade-through-crosswords" rel="noopener noreferrer" target="_blank"><p class="BaseWrap-sc-TURhJ BaseText-fFzBQt InterludeTitle-bLsuTB eTiIvU eHlqFt jGCXEq" data-dcnode-id="596"><span data-dcnode-id="597" instrument_node=""> Throwing Shade Through Crosswords</span></p></a><figure class="CneVideoEmbedFigure-bJIZil iOHMUe cne-video-embed" data-dcnode-id="590"><div data-dcnode-id="591" data-testid="script-container"><div class="cne-player-container" data-dcnode-id="593" id="78ba65d-8ff1-77d2-c22-acc165da5713" style="box-sizing:content-box;display:inline-block;height:0px;padding-top:56.25%;position:relative;transition:height 300ms ease-in-out;vertical-align:top;width:100%;"><iframe allowfullscreen="true" allowtransparency="true" data-dcnode-id="594" frameborder="0" msallowfullscreen="true" scrolling="no" style="height:1px !important;left:0px;min-height:100%;min-width:100%;position:absolute;top:0px;width:1px !important;" title="Video Player"></iframe></div></div></figure></figure></div><p class="paywall" data-dcnode-id="577"><span data-dcnode-id="587" instrument_node="">At the same time, just as this is happening, we’ve also seen the rise of </span><em class="small" data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">ISIS</span></em><span data-dcnode-id="584" instrument_node="">—and </span><em class="small" data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">ISIS</span></em><span data-dcnode-id="581" instrument_node=""> borders Europe. Turkey has a fifteen-hundred-kilometre border with Syria and Iraq. And along much of that border we’re fighting, contesting </span><em class="small" data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">ISIS</span></em><span data-dcnode-id="578" instrument_node="">.</span></p><div class="inline-recirc-wrapper inline-recirc-observer-target-2 viewport-monitor-anchor" data-attr-viewport-monitor="inline-recirc" data-dcnode-id="576" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-in-view="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-include-experiments="true"></div><p class="paywall" data-dcnode-id="565"><span data-dcnode-id="575" instrument_node="">Beyond that, all across the </span><em class="small" data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">NATO</span></em><span data-dcnode-id="572" instrument_node=""> periphery—east, southeast, and across the Mediterranean due south—you have a set of weak, failing, or failed states which further the instability for Europe. This is most prominently seen by returning foreign fighters from Syria and Iraq who have bombed European cities, but also from mass migration at a level which we haven’t seen since the Second World War. So the combination of Putin’s Russia and its aggressive actions, terrorism, and mass migration is causing </span><em class="small" data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">NATO</span></em><span data-dcnode-id="569" instrument_node=""> to go back to the basics—to the importance of security of the twenty-eight nations themselves and then looking at how we can promote stability among its neighbors. Today&nbsp;</span><em class="small" data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">NATO</span></em><span data-dcnode-id="566" instrument_node=""> is adapting again to these new challenges.</span></p><p class="paywall" data-dcnode-id="556"><em data-dcnode-id="557"><span data-dcnode-id="564" instrument_node="">What forces can </span><em class="small" data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">NATO</span></em><span data-dcnode-id="561" instrument_node=""> mobilize? A few years ago, </span><em class="small" data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">NATO</span></em><span data-dcnode-id="558" instrument_node=""> had some hundred and seventy thousand troops active on three continents.</span></em></p><p class="paywall" data-dcnode-id="545"><span data-dcnode-id="555" instrument_node="">Five years ago, the majority were in Afghanistan. </span><em class="small" data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">NATO</span></em><span data-dcnode-id="552" instrument_node=""> peaked in 2010 and 2011 at a hundred and forty thousand troops in Afghanistan. We also had troops in the Balkans. We also had maritime operations in the Mediterranean, and off the Horn of Africa to counter piracy. </span><em class="small" data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">NATO</span></em><span data-dcnode-id="549" instrument_node=""> is a ground power. It’s a maritime power. It’s an air power, and </span><em class="small" data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">NATO</span></em><span data-dcnode-id="546" instrument_node=""> has very substantial special operations forces.</span></p></div></div></div><div class="GridItem-buSdEM gKfJBS grid--item grid-layout__aside" data-dcnode-id="534"><aside class="PersistentAsideWrapper-OTtoN iRwLFv persistent-aside" data-dcnode-id="535" data-testid="PersistentAsideWrapper" style="position: absolute; top: 496.609px; height: 5534px;"><div class="StickyBoxWrapper-euhCxU hyXuto sticky-box" data-dcnode-id="536"><div class="StickyBoxPrimary-fEgDcn dFVkFO sticky-box__primary" data-dcnode-id="538"><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--display-rail" data-dcnode-id="539" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--display-rail" data-dcnode-id="541"></div><div class="journey-unit" data-dcnode-id="540"></div></div></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="537"></div></div></aside></div></div><div class="RowWrapper-egDQBE hVsKfd full-bleed-ad row-mid-content-ad" data-dcnode-id="532"></div><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ArticlePageChunksGrid-kRgPDq DBpfE grid-layout--adrail narrow wide-adrail" data-dcnode-id="395"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="403"><div class="BodyWrapper-ctnerm irSTVw body body__container article__body" data-dcnode-id="404" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="405"><p class="paywall" data-dcnode-id="518"><span data-dcnode-id="531" instrument_node="">Most folks don’t understand that </span><em class="small" data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">NATO</span></em><span data-dcnode-id="528" instrument_node=""> doesn’t have its own forces. The twenty-eight allies own the forces. What distinguishes </span><em class="small" data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">NATO</span></em><span data-dcnode-id="525" instrument_node=""> is that it </span><em data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">does</span></em><span data-dcnode-id="522" instrument_node=""> have, three hundred and sixty-five days a year, a command-and-control structure which makes it easy for those forces to adapt to a new mission, come together, and operate together. It always has been led by an American four-star general, which traces back to Eisenhower when he first led </span><em class="small" data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">NATO</span></em><span data-dcnode-id="519" instrument_node="">. Today, the Supreme Allied Commander is Army General Mike Scaparrotti.</span></p><p class="paywall" data-dcnode-id="512"><em data-dcnode-id="513"><span data-dcnode-id="517" instrument_node="">What role does </span><em class="small" data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">NATO</span></em><span data-dcnode-id="514" instrument_node=""> play in American security?</span></em></p><p class="paywall" data-dcnode-id="508"><em class="small" data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">NATO</span></em><span data-dcnode-id="509" instrument_node=""> essentially says to every American: you won’t have to fight alone. That gives America the great confidence that it will always be able to operate in a multinational setting with diverse allies that not only bring military capacity but also political weight to whatever security challenge it faces.</span></p><p class="paywall" data-dcnode-id="502"><em data-dcnode-id="503"><span data-dcnode-id="507" instrument_node="">How important is </span><em class="small" data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">NATO</span></em><span data-dcnode-id="504" instrument_node=""> in dealing with extremism or terrorism?</span></em></p><p class="paywall" data-dcnode-id="473"><span data-dcnode-id="501" instrument_node="">There are two major contributions that </span><em class="small" data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">NATO</span></em><span data-dcnode-id="498" instrument_node=""> makes. First, the reason that </span><em class="small" data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">NATO</span></em><span data-dcnode-id="495" instrument_node=""> went to Afghanistan and remains today is to deny safe haven to Al Qaeda and other groups. Closer to </span><em class="small" data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">NATO</span></em><span data-dcnode-id="492" instrument_node="">’s borders, it is a key contributor to the international coalition against </span><em class="small" data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">ISIL</span></em><span data-dcnode-id="489" instrument_node="">, which is taking the fight into Syria and Iraq. All twenty-eight </span><em class="small" data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">NATO</span></em><span data-dcnode-id="486" instrument_node=""> members are members of the counter-</span><em class="small" data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">ISIL</span></em><span data-dcnode-id="483" instrument_node=""> coalition. Another twenty-six countries that associate with </span><em class="small" data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">NATO</span></em><span data-dcnode-id="480" instrument_node="">—we refer to them as partners—are part of that coalition. So the vast majority of countries that are contributing to the coalition against </span><em class="small" data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">ISIL</span></em><span data-dcnode-id="477" instrument_node=""> are able to do so effectively because they know how to operate within </span><em class="small" data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">NATO</span></em><span data-dcnode-id="474" instrument_node="">.</span></p><div class="inline-recirc-wrapper inline-recirc-observer-target-3 viewport-monitor-anchor" data-attr-viewport-monitor="inline-recirc" data-dcnode-id="472" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-in-view="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-include-experiments="true"></div><p class="paywall" data-dcnode-id="466"><em data-dcnode-id="467"><span data-dcnode-id="471" instrument_node="">How does </span><em class="small" data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">NATO</span></em><span data-dcnode-id="468" instrument_node=""> divide financial responsibility?</span></em></p><p class="paywall" data-dcnode-id="452"><span data-dcnode-id="465" instrument_node="">Most of the defense spending in the alliance is national spending, not </span><em class="small" data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">NATO</span></em><span data-dcnode-id="462" instrument_node=""> defense spending. The military capabilities of </span><em class="small" data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">NATO</span></em><span data-dcnode-id="459" instrument_node=""> are owned, operated, and maintained by the nations themselves. </span><em class="small" data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">NATO</span></em><span data-dcnode-id="456" instrument_node="">’s common budget—to which all allies contribute—is actually quite small, about two billion dollars, to keep the command-and-control apparatus operational and run the standing headquarters. So, for example, the U.S. defense budget is about six hundred billion dollars for all U.S. global commitments; all the other allies combined are at about two hundred and fifty billion dollars. On a day-to-day basis, very little of these vast sums is committed to </span><em class="small" data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">NATO</span></em><span data-dcnode-id="453" instrument_node="">. Our cost share is twenty-two per cent. This is based on the agreed apportionment. The reality is that our G.D.P. is about equal to the other twenty-seven nations put together. If we did this strictly on the size of economies, our share of the common funding would be about fifty per cent.</span></p><p class="paywall" data-dcnode-id="440"><em data-dcnode-id="441"><span data-dcnode-id="451" instrument_node="">What influence do the political principles embraced by </span><em class="small" data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">NATO</span></em><span data-dcnode-id="448" instrument_node=""> have on member states? Secretary Kerry reminded President Erdoğan over the past week that, as a member of </span><em class="small" data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">NATO</span></em><span data-dcnode-id="445" instrument_node="">, Turkey has to commit, embrace, and practice its democratic principles. So what leverage does </span><em class="small" data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">NATO</span></em><span data-dcnode-id="442" instrument_node=""> have politically on its member states?</span></em></p><p class="paywall" data-dcnode-id="436"><em class="small" data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">NATO</span></em><span data-dcnode-id="437" instrument_node=""> is fundamentally a military alliance, but it is also a political alliance. It is an alliance of twenty-eight democracies. When a nation signs up to the Washington Treaty, as all twenty-eight have, they sign up to following principles, which are explicit in the preamble to the treaty and have been ratified by all members: democracy, individual liberty, and the rule of law.</span></p><p class="paywall" data-dcnode-id="431"><span data-dcnode-id="435" instrument_node="">Over the years, member states have gone through difficult periods, when democracy has been challenged. The preamble has served as a cornerstone or the bedrock of what is expected of a </span><em class="small" data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">NATO</span></em><span data-dcnode-id="432" instrument_node=""> member. We like to believe it has had an influence on all twenty-eight members abiding by those founding values. It’s playing a role today as some of our member states go through political challenges. This underlines that it is both a political and military alliance.</span></p><p class="paywall" data-dcnode-id="425"><em data-dcnode-id="426"><span data-dcnode-id="430" instrument_node="">What are </span><em class="small" data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">NATO</span></em><span data-dcnode-id="427" instrument_node=""> standards for defense spending so that the burden is evenly shared?</span></em></p><p class="paywall" data-dcnode-id="415"><em class="small" data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">NATO</span></em><span data-dcnode-id="422" instrument_node=""> established that two per cent of national G.D.P. should be allocated for defense spending. Leaders of </span><em class="small" data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">NATO</span></em><span data-dcnode-id="419" instrument_node=""> countries—President Obama and others who met at the Wales summit, in 2014—established this benchmark. Today only five of twenty-eight allies meet that benchmark. The U.S. is one of them. Of the remainder, nineteen allies over the last two years have reversed cuts in defense spending and have made real increases. So, after a long period of defense cuts among its members, </span><em class="small" data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">NATO</span></em><span data-dcnode-id="416" instrument_node=""> has turned the corner. The program agreed to in 2014 is a ten-year program. We’re at least headed in the right direction.</span></p><p class="paywall" data-dcnode-id="409"><em data-dcnode-id="410"><span data-dcnode-id="414" instrument_node="">What would it take for the United States to get out of </span><em class="small" data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">NATO</span></em><span data-dcnode-id="411" instrument_node="">? How would the United States undo a treaty?</span></em></p><div class="inline-recirc-wrapper inline-recirc-observer-target-4 viewport-monitor-anchor" data-attr-viewport-monitor="inline-recirc" data-dcnode-id="408" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-in-view="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-include-experiments="true"></div><p class="paywall" data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">Article Thirteen, the next-to-last article in the treaty, says that any member state may choose to depart the alliance and essentially give one year’s notice, and then other members will be informed. It’s one sentence. In sixty-seven years, Article Thirteen has never been invoked. It’s never happened.</span></p></div></div></div><div class="GridItem-buSdEM gKfJBS grid--item grid-layout__aside" data-dcnode-id="396"><div class="StickyBoxWrapper-euhCxU hyXuto sticky-box" data-dcnode-id="397"><div class="StickyBoxPrimary-fEgDcn dFVkFO sticky-box__primary" data-dcnode-id="399"><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--display-rail" data-dcnode-id="400" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--display-rail" data-dcnode-id="402"></div><div class="journey-unit" data-dcnode-id="401"></div></div></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="398"></div></div></div></div></div></div></div><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ContentWrapperGrid-haXkHn diFmFK grid-layout--adrail narrow wide-adrail" data-dcnode-id="387"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="388"><div class="body body__container" data-dcnod
