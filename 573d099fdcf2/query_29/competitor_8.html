</span><h1 class="elementor-heading-title elementor-size-default" data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">How Much Does The U.S. Pay For NATO?</span></h1><span data-dcnode-id="957" instrument_node=""> </span></div><span data-dcnode-id="955" instrument_node="">

</span><div class="elementor-element elementor-element-381caa1 elementor-widget elementor-widget-post-info" data-dcnode-id="924" data-element_type="widget" data-id="381caa1" data-widget_type="post-info.default"><span data-dcnode-id="952" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="926"><span data-dcnode-id="951" instrument_node="">
</span><ul class="elementor-inline-items elementor-icon-list-items elementor-post-info" data-dcnode-id="928"><span data-dcnode-id="950" instrument_node="">
</span><li class="elementor-icon-list-item elementor-repeater-item-93cdadf elementor-inline-item" data-dcnode-id="930" itemprop="about"><span data-dcnode-id="949" instrument_node="">
</span><span class="elementor-icon-list-text elementor-post-info__item elementor-post-info__item--type-terms" data-dcnode-id="932"><span data-dcnode-id="948" instrument_node="">
</span><span class="elementor-post-info__terms-list" data-dcnode-id="934"><span data-dcnode-id="947" instrument_node="">
</span><a class="elementor-post-info__terms-list-item" data-dcnode-id="945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldbeyondwar.org/category/close-bases/"><span data-dcnode-id="946" instrument_node="">Close Bases</span></a><span data-dcnode-id="944" instrument_node="">, </span><a class="elementor-post-info__terms-list-item" data-dcnode-id="942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldbeyondwar.org/category/why-end-war/economic-cost/"><span data-dcnode-id="943" instrument_node="">Economic Cost</span></a><span data-dcnode-id="941" instrument_node="">, </span><a class="elementor-post-info__terms-list-item" data-dcnode-id="939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldbeyondwar.org/category/world/europe/"><span data-dcnode-id="940" instrument_node="">Europe</span></a><span data-dcnode-id="938" instrument_node="">, </span><a class="elementor-post-info__terms-list-item" data-dcnode-id="936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldbeyondwar.org/category/world/north-america/"><span data-dcnode-id="937" instrument_node="">North America</span></a><span data-dcnode-id="935" instrument_node=""> </span></span><span data-dcnode-id="933" instrument_node="">

</span></div><span data-dcnode-id="923" instrument_node="">
</span><div class="elementor-element elementor-element-3e6c646 elementor-widget elementor-widget-theme-post-content" data-dcnode-id="848" data-element_type="widget" data-id="3e6c646" data-widget_type="theme-post-content.default"><span data-dcnode-id="922" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="850"><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="918"><a data-dcnode-id="919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldbeyondwar.org/wp-content/uploads/2019/01/peacereport1.jpg"><img alt="Source: https://www.nato.int/cps/en/natohq/topics_67655.htm" class="aligncenter size-full wp-image-23767" data-dcnode-id="920" height="800" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldbeyondwar.org/wp-content/uploads/2019/01/peacereport1.jpg&amp;raw" srcset="https://worldbeyondwar.org/wp-content/uploads/2019/01/peacereport1.jpg 1200w, https://worldbeyondwar.org/wp-content/uploads/2019/01/peacereport1-300x200.jpg 300w, https://worldbeyondwar.org/wp-content/uploads/2019/01/peacereport1-768x512.jpg 768w, https://worldbeyondwar.org/wp-content/uploads/2019/01/peacereport1-1024x683.jpg 1024w, https://worldbeyondwar.org/wp-content/uploads/2019/01/peacereport1-83x55.jpg 83w, https://worldbeyondwar.org/wp-content/uploads/2019/01/peacereport1-210x140.jpg 210w, https://worldbeyondwar.org/wp-content/uploads/2019/01/peacereport1-310x207.jpg 310w" width="1200"></a></p><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">By Will Griffin, January 22, 2019</span></p><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="910"><span data-dcnode-id="913" instrument_node="">From </span><a data-dcnode-id="911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thepeacereport.com/nato-spending-by-country/"><span data-dcnode-id="912" instrument_node="">The Peace Report</span></a></p><span data-dcnode-id="909" instrument_node="">
</span><p data-dcnode-id="898"><span data-dcnode-id="908" instrument_node="">There’s been a lot of talk about NATO spending recently, especially by Donald Trump. The New York Times recently&nbsp;</span><a data-dcnode-id="906" data-saferedirecturl="https://www.google.com/url?q=https://thepeacereport.us17.list-manage.com/track/click?u%3D26d90f03b33ec36827f0ca0a8%26id%3Dcbcf29ef04%26e%3D1f1801b25e&amp;source=gmail&amp;ust=1548355888617000&amp;usg=AFQjCNGPE9pcfu2vrRCwgs3u7jTMcXl4tw" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepeacereport.us17.list-manage.com/track/click%3Fu%3D26d90f03b33ec36827f0ca0a8%26id%3Dcbcf29ef04%26e%3D1f1801b25e" rel="noopener" target="_blank"><span data-dcnode-id="907" instrument_node="">published an article</span></a><span data-dcnode-id="905" instrument_node="">&nbsp;saying Trump has discussed pulling the U.S. out of NATO, the North Atlantic Treaty Organization. In July,&nbsp;</span><a data-dcnode-id="903" data-saferedirecturl="https://www.google.com/url?q=https://thepeacereport.us17.list-manage.com/track/click?u%3D26d90f03b33ec36827f0ca0a8%26id%3D4796181d3d%26e%3D1f1801b25e&amp;source=gmail&amp;ust=1548355888617000&amp;usg=AFQjCNFH8cDVcRYIWcJyc2PwTnOzxYflsg" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepeacereport.us17.list-manage.com/track/click%3Fu%3D26d90f03b33ec36827f0ca0a8%26id%3D4796181d3d%26e%3D1f1801b25e" rel="noopener" target="_blank"><span data-dcnode-id="904" instrument_node="">Trump said</span></a><span data-dcnode-id="902" instrument_node="">&nbsp;at the 2018 NATO Summit that the U.S. is paying “</span><b data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">probably 90 percent of the costs of NATO</span></b><span data-dcnode-id="899" instrument_node="">“. But what is NATO and how much is the U.S. actually paying?</span></p><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">NATO was created in 1949 as an intergovernmental military alliance for “mutual defense”. At least that’s what you might have been taught by a university or a high school teacher. Several countries signed onto the treaty to “protect” themselves from enemies states, but who and why?</span></p><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">NATO originally began with 12 states and has since expanded to 29 members in 2019. Its original purpose was to sweep up nations under the U.S. imperialist umbrella to keep them from Soviet influence or, to be more clear, socialist and communist influence. By keeping states under the umbrella of NATO, the U.S. held more control and influence over them, ultimately keeping their position as the leading imperialist state spreading the ideas of free-market ideologies and capitalism around the world.</span></p><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">The Soviet Union collapsed in 1991, so why does NATO still exist? Not just exist, why has it expanded all the way up to Russia’s border? For decades the Western world was told that a huge military establishment was necessary to contain an expansionist world communist movement that spread from Moscow to nearly half of the world. NATO was established to contain the Moscow influence. This was just the story told to justify the massive spending in military buildup and operations. Here’s the real deal.</span></p><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">NATO is a bargain for the United States. The U.S. only pays 22 percent of its cost. Having a huge intergovernmental military establishment under the umbrella of U.S. imperialism helps to keep the U.S. leading the charge around the world.</span></p><span data-dcnode-id="885" instrument_node="">
</span><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">In addition, NATO is used for interventions around the world. We’ve seen that since 2001 where states within NATO have invaded, unjustly and illegally, countries like Iraq, Afghanistan, Libya, Syria, and more. NATO does not need approval from the United Nations and is systematically used at the will of Washington. Whenever, and this is usually the case, the UN Security Council refuses to approve of an intervention, then NATO is used.</span></p><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">NATO is also a tool to lock Western European countries into the U.S. imperial system. It’s used to gain access to new parts of the world, selling weapons, gaining financial benefits, and capitalizing from more countries.</span></p><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">Since the collapse of the Soviet Union, NATO has expanded into former Soviet territories doing what imperialists do, dominating daily life of the local populations and exploiting them for profit.</span></p><span data-dcnode-id="876" instrument_node="">
</span><p data-dcnode-id="873"><a data-dcnode-id="874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldbeyondwar.org/wp-content/uploads/2019/01/peacereport-europe.jpg"><img alt="How much countries in Europe pay for NATO" class="aligncenter size-full wp-image-23768" data-dcnode-id="875" height="917" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldbeyondwar.org/wp-content/uploads/2019/01/peacereport-europe.jpg&amp;raw" srcset="https://worldbeyondwar.org/wp-content/uploads/2019/01/peacereport-europe.jpg 1200w, https://worldbeyondwar.org/wp-content/uploads/2019/01/peacereport-europe-300x229.jpg 300w, https://worldbeyondwar.org/wp-content/uploads/2019/01/peacereport-europe-768x587.jpg 768w, https://worldbeyondwar.org/wp-content/uploads/2019/01/peacereport-europe-1024x783.jpg 1024w, https://worldbeyondwar.org/wp-content/uploads/2019/01/peacereport-europe-72x55.jpg 72w, https://worldbeyondwar.org/wp-content/uploads/2019/01/peacereport-europe-310x237.jpg 310w, https://worldbeyondwar.org/wp-content/uploads/2019/01/peacereport-europe-60x45.jpg 60w" width="1200"></a></p><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="867"><span data-dcnode-id="871" instrument_node="">When the Soviet Union collapsed and the western capitalists expanded their markets into Eastern Europe bringing with them the great NATO forces and the free market, good fortunes did not come to the people there. Life got worse, much worse. To explain I think it’s best to use </span><a data-dcnode-id="869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepeacereport.us17.list-manage.com/track/click%3Fu%3D26d90f03b33ec36827f0ca0a8%26id%3D11c4e8487d%26e%3D1f1801b25e"><span data-dcnode-id="870" instrument_node="">the words of Michael Parenti</span></a><span data-dcnode-id="868" instrument_node=""> who reflected upon the overthrow of Communism. Notice he says overthrow and not the fall of Communism, that’s because the Soviet Union and the 2nd world did not collapse but was overthrown by Western imperialist forces. I hope you make time to listen to this entire speech:</span></p><span data-dcnode-id="866" instrument_node="">
</span><blockquote data-dcnode-id="861"><span data-dcnode-id="865" instrument_node="">
</span><p class="m_6215668533063884046m_-7338844255461599516null" data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">“So what has this bought for the many? A dramatic rise in unemployment, drug addiction, air and water pollution, tuberculosis, cholera, polio, prostitution, teenage rape, child abuse, and just about every other social ill. Beggars, pimps, dope pushers, and other hustlers plied their trade as never before. In countries like Russia and Hungary, the suicide rate has climbed 50 percent in just a few years. There’s been a decline in nutritional levels and a sharp deterioration in health. One-third of Russian men now never lived to the age of 60. The death rate has risen nearly 20 percent for East German women in their late 30s and nearly 30 percent for men of the same age. In contrast, where communist governments are still in power, Cuba and North Korea and Vietnam death rates continue to fall according to that communist publication the New York Times. That’s where I got that one. Prominently displayed on 24a , on the lower left hand side. It was the 26th paragraph of a long article.”</span></p><span data-dcnode-id="862" instrument_node="">
</span></blockquote><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="857"><a data-dcnode-id="858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldbeyondwar.org/wp-content/uploads/2019/01/peacereport3.jpg"><img alt="What countries pay for NATO" class="aligncenter size-full wp-image-23769" data-dcnode-id="859" height="1750" loading="lazy" sizes="(max-width: 1413px) 100vw, 1413px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldbeyondwar.org/wp-content/uploads/2019/01/peacereport3.jpg&amp;raw" srcset="https://worldbeyondwar.org/wp-content/uploads/2019/01/peacereport3.jpg 1413w, https://worldbeyondwar.org/wp-content/uploads/2019/01/peacereport3-242x300.jpg 242w, https://worldbeyondwar.org/wp-content/uploads/2019/01/peacereport3-768x951.jpg 768w, https://worldbeyondwar.org/wp-content/uploads/2019/01/peacereport3-827x1024.jpg 827w, https://worldbeyondwar.org/wp-content/uploads/2019/01/peacereport3-44x55.jpg 44w, https://worldbeyondwar.org/wp-content/uploads/2019/01/peacereport3-310x384.jpg 310w" width="1413"></a></p><span data-dcnode-id="856" instrument_node="">
</span><p data-dcnode-id="852"><a data-dcnode-id="854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldbeyondwar.org/notonato/"><span data-dcnode-id="855" instrument_node="">No to NATO — Yes to Peace FESTIVAL</span></a><span data-dcnode-id="853" instrument_node="">.</span></p><span data-dcnode-id="851" instrument_node="">
