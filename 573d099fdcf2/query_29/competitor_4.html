</span><p data-dcnode-id="6654"><span data-dcnode-id="6655" instrument_node="">Professor Nayef Al-Rodhan is a Philosopher, Neuroscientist and Geostrategist. He is Head of GCSP's Geopolitics and Global Futures Programme and Honorary Fellow of St. Antony's College at Oxford University, Oxford, United Kingdom.&nbsp;He was voted as one of the Top 30 most influential Neuroscientists in the world.</span></p><span data-dcnode-id="6653" instrument_node="">
</span><p data-dcnode-id="6651"><span data-dcnode-id="6652" instrument_node="">He holds an M.D. and a Ph.D. He trained in neurosurgery/neuroscience research at the Mayo Clinic, Yale University and Harvard University.</span></p><span data-dcnode-id="6650" instrument_node="">
</span><p data-dcnode-id="6648"><span data-dcnode-id="6649" instrument_node="">He founded the neurotechnology programme, headed translational research and founded the laboratory for cellular neurosurgery and neurosurgical technology at MGH, Harvard. He was on the faculty of the Harvard Medical School, has published extensively on neuroscience research and won several research prizes. These prizes include: The Sir James Spence Prize; The Gibb Prize; The Farquhar-Murray Prize; The American Association of Neurological Surgeon Poster Prize (twice); The Meninger Prize; The Annual Resident Prize of the Congress of Neurological Surgeons; The Young Investigator Prize of the American Association of Neurological Surgeons; The Annual Fellowship Prize of the Congress of Neurological Surgeons.</span></p><span data-dcnode-id="6647" instrument_node="">
</span><p data-dcnode-id="6643"><strong data-dcnode-id="6645"><span data-dcnode-id="6646" instrument_node="">His interests include:&nbsp;</span></strong><span data-dcnode-id="6644" instrument_node="">Geostrategy and Sustainable National and Global Security; The Role of Science, Aerospace and Strategic Technologies in Geopolitics and Human Destiny; Global Strategic Cascading Risks; Global Justice, Human Dignity and Transcultural Synergy; Philosophy of Good Governance, Philosophy of Human Nature, Philosophy of History and Collective Civilisational Triumph; the History of Ideas; the Neurochemical and Cellular Foundations and Predilections of Human Nature and Their Implications for Global Discourses and Moral and Political Cooperation.</span></p><span data-dcnode-id="6642" instrument_node="">

</span><p data-dcnode-id="6449"><span data-dcnode-id="6450" lang="EN-US"><span data-dcnode-id="6451"><span data-dcnode-id="6452"><span data-dcnode-id="6453" instrument_node="">Anna Brach is Head of Human Security at the GCSP.&nbsp;Her work focuses on issues of the evolution of security concept, environmental and health security with special emphasis on the climate change and security nexus. Her research interests include human security, human rights, environmental security, climate change, global public commons and resource management. She is responsible for developing and running the GCSP activities on the subject of human security, including executive courses, workshops, and high-level conferences in Geneva and internationally. She is also the Director of the GCSP advanced course on New Issues in Security.</span></span></span></span></p><span data-dcnode-id="6448" instrument_node="">
</span><p data-dcnode-id="6437"><span data-dcnode-id="6447" instrument_node="">Anna holds a Master's degree in Economy from the&nbsp;</span><a data-dcnode-id="6445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sgh.waw.pl/en/Pages/default.aspx"><span data-dcnode-id="6446" instrument_node="">Warsaw School of Economics</span></a><span data-dcnode-id="6444" instrument_node="">, a Master’s degree in Political Science from the&nbsp;</span><a data-dcnode-id="6442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//graduateinstitute.ch/fr/home.html"><span data-dcnode-id="6443" instrument_node="">Graduate Institute of International Studies</span></a><span data-dcnode-id="6441" instrument_node="">&nbsp;in Geneva and a Master’s degree in European Studies from the&nbsp;</span><a data-dcnode-id="6439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unige.ch/"><span data-dcnode-id="6440" instrument_node="">University of Geneva</span></a><span data-dcnode-id="6438" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="6436" instrument_node="">
</span><p data-dcnode-id="6428"><span data-dcnode-id="6435" instrument_node="">Prior to joining the GCSP, she worked for the private sector at the PR Department of&nbsp;</span><a data-dcnode-id="6433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nestle.pl/pl"><span data-dcnode-id="6434" instrument_node="">Nestlé Poland</span></a><span data-dcnode-id="6432" instrument_node="">&nbsp;in Warsaw and at&nbsp;</span><a data-dcnode-id="6430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.academyfinance.ch/"><span data-dcnode-id="6431" instrument_node="">Academy&amp;Finance</span></a><span data-dcnode-id="6429" instrument_node="">&nbsp;in Geneva. Her native language is Polish and she is fluent in English and French.</span></p><span data-dcnode-id="6427" instrument_node="">

</span><p data-dcnode-id="6253"><span data-dcnode-id="6256" lang="EN-US"><span data-dcnode-id="6257" instrument_node="">Benno </span></span><span data-dcnode-id="6254" lang="EN-GB"><span data-dcnode-id="6255" instrument_node="">Bühlmann serves as the Head of the Integrated Risk Management and Civil Protection at GCSP.</span></span></p><span data-dcnode-id="6252" instrument_node="">
</span><p data-dcnode-id="6241"><span data-dcnode-id="6242" lang="EN-GB"><span data-dcnode-id="6251" instrument_node="">With more than 30 years of experience, he has deep expertise spanning Leadership, Strategy, Change Management, Risk Management, Disaster Risk Reduction, Civil Protection, Critical Infrastructure Protection, Business Continuity Management, Secure Communication Systems, Crisis Management, CBRNe-Protection, Natural Hazards,</span><strong data-dcnode-id="6249"><span data-dcnode-id="6250" instrument_node=""> </span></strong><span data-dcnode-id="6248" instrument_node="">Environmental Protection, Climate Change, and</span><strong data-dcnode-id="6246"><span data-dcnode-id="6247" instrument_node=""> </span></strong><span data-dcnode-id="6245" instrument_node="">Sustainability.</span><strong data-dcnode-id="6243"><span data-dcnode-id="6244" instrument_node=""> </span></strong></span></p><span data-dcnode-id="6240" instrument_node="">
</span><p data-dcnode-id="6237"><span data-dcnode-id="6238" lang="EN-GB"><span data-dcnode-id="6239" instrument_node="">Benno holds a Master’s in Chemical Engineering and a Master’s in Natural Science from the Swiss Federal Institute of Technology in Zurich (ETHZ).</span></span></p><span data-dcnode-id="6236" instrument_node="">
</span><p data-dcnode-id="6233"><span data-dcnode-id="6234" lang="EN-GB"><span data-dcnode-id="6235" instrument_node="">From 2014 until 2020, he served as the Director General of the Federal Office for Civil Protection (FOCP) in the Swiss Department of Defense, Civil Protection and Sport (DDPS), also as a member of the board. The FOCP includes several branches such as Civil Protection, Spiez Laboratory, National Emergency Operations Centre, Training, and Telematics. </span></span></p><span data-dcnode-id="6232" instrument_node="">
</span><p data-dcnode-id="6229"><span data-dcnode-id="6230" lang="EN-GB"><span data-dcnode-id="6231" instrument_node="">During this time, he served as Chairman of the National Emergency Operations Staff in Civil Protection of Switzerland and Chairman of the Intervention Natural Hazards Staff. </span></span></p><span data-dcnode-id="6228" instrument_node="">
</span><p data-dcnode-id="6225"><span data-dcnode-id="6226" lang="EN-GB"><span data-dcnode-id="6227" instrument_node="">Furthermore, he was President of the Swiss National Commission for NBC-Protection.</span></span></p><span data-dcnode-id="6224" instrument_node="">
</span><p data-dcnode-id="6221"><span data-dcnode-id="6222" lang="EN-GB"><span data-dcnode-id="6223" instrument_node="">In former times, he was CEO and owner of his company Bühlmann Project Management GmbH. </span></span></p><span data-dcnode-id="6220" instrument_node="">
</span><p data-dcnode-id="6209"><span data-dcnode-id="6218" lang="EN-GB"><span data-dcnode-id="6219" instrument_node="">At the beginning of his career, Benno served as the Director of the Environmental Protection Agency of the Canton Uri, and in this function also as the</span></span><span data-dcnode-id="6216" lang="EN-GB"><span data-dcnode-id="6217" instrument_node=""> </span></span><span data-dcnode-id="6210" lang="EN-GB"><span data-dcnode-id="6215" instrument_node="">Deputy Chairman of the</span><strong data-dcnode-id="6212"><em data-dcnode-id="6213"><span data-dcnode-id="6214" instrument_node=""> </span></em></strong><span data-dcnode-id="6211" instrument_node="">Cantonal Emergency Operations Staff of the canton. Moreover, he was Chief of the Chemical Emergency Defence Department and Commander of a local fire brigade.</span></span></p><span data-dcnode-id="6208" instrument_node="">
</span><p data-dcnode-id="6203"><span data-dcnode-id="6206" lang="EN-GB"><span data-dcnode-id="6207" instrument_node="">He is married, father of two daughters and grandfather to two grandsons</span></span><span data-dcnode-id="6204" lang="EN-US"><span data-dcnode-id="6205" instrument_node="">.</span></span></p><span data-dcnode-id="6202" instrument_node="">

</span><p data-dcnode-id="6062"><span data-dcnode-id="6063" instrument_node="">Colonel Christian Bühlmann is the Chief of Staff. He is seconded from the Swiss Armed Forces.</span></p><span data-dcnode-id="6061" instrument_node="">
</span><p data-dcnode-id="6059"><span data-dcnode-id="6060" instrument_node="">Prior to this assignment, he gained extensive experience in the area of defence policy, politics, and military strategy as Senior Advisor to the Chief of Swiss Armed Forces. He has over 25 years of combined civilian and military experience. His previous appointments include : Head of Sales Defense at a major Swiss company (as a civilian) as well as head of doctrine research and development (as a regular officer).</span></p><span data-dcnode-id="6058" instrument_node="">
</span><p data-dcnode-id="6056"><span data-dcnode-id="6057" instrument_node="">He graduated from the École Polytechnique Fédérale in Lausanne (Master of Science in Computer Sciences), and the Swiss Military Academy. He received a Master of Arts in International Studies (King's College, London) after attending the Royal College of Defence Studies, London. In his spare time, he is working on a PhD thesis in political science assessing the influence of political ideas on the transformation of Swiss defence policy.</span></p><span data-dcnode-id="6055" instrument_node="">
</span><p data-dcnode-id="6053"><span data-dcnode-id="6054" instrument_node="">Christian Bühlmann co-authored a book on a Colonel Daniel Reichel, a maverick Swiss military thinker, and has published numerous article on doctrine, strategy, defence policy, and history.</span></p><span data-dcnode-id="6052" instrument_node="">
</span><p data-dcnode-id="6050"><span data-dcnode-id="6051" instrument_node="">He is a Swiss national; his mother tongue is French and he is proficient in German and English</span></p><span data-dcnode-id="6049" instrument_node="">
</span><p data-dcnode-id="6044"><span data-dcnode-id="6048" instrument_node="">Visit his personal </span><a data-dcnode-id="6046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.christianbuehlmann.com/"><span data-dcnode-id="6047" instrument_node="">website</span></a><span data-dcnode-id="6045" instrument_node="">.</span></p><span data-dcnode-id="6043" instrument_node="">

</span><p data-dcnode-id="5881"><span data-dcnode-id="5882"><span data-dcnode-id="5883"><span data-dcnode-id="5884"><span data-dcnode-id="5892" lang="EN-GB"><span data-dcnode-id="5893"><span data-dcnode-id="5894" instrument_node="">Peter is Head of Leadership at GCSP and&nbsp;Co-Founder of the&nbsp;</span></span></span><span data-dcnode-id="5888" lang="EN-CA"><a data-dcnode-id="5889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gcsp.ch/topics/leadership"><span data-dcnode-id="5890" lang="EN-GB"><span data-dcnode-id="5891" instrument_node="">Geneva Leadership Alliance</span></span></a></span><span data-dcnode-id="5885" lang="EN-GB"><span data-dcnode-id="5886"><span data-dcnode-id="5887" instrument_node="">,&nbsp;a network of associates and partner organisations working together to advance the understanding and practice of leadership&nbsp;for the benefit of peace and security worldwide. </span></span></span></span></span></span></p><span data-dcnode-id="5880" instrument_node="">
</span><p data-dcnode-id="5872"><span data-dcnode-id="5873"><span data-dcnode-id="5874"><span data-dcnode-id="5875"><span data-dcnode-id="5876" lang="EN-GB"><span data-dcnode-id="5877"><span data-dcnode-id="5878"><span data-dcnode-id="5879" instrument_node="">Peter has over 20 years of experience in leadership&nbsp;development, adult education, and executive coaching across private, public, and non-profit sectors.&nbsp;He is constantly seeking new, diverse, and innovative ways to bridge the study of leadership with the practice of leading, especially at international level and across cultural, geo-graphical, political and organisational divides. Leveraging his diverse experience and background, he creates safe spaces for learning and encourages brave spaces for application, enabling people to learn leadership mindsets and practices in transformative ways and adapt them to their own work and life.</span></span></span></span></span></span></span></p><span data-dcnode-id="5871" instrument_node="">
</span><p data-dcnode-id="5865"><span data-dcnode-id="5866" lang="EN-GB"><span data-dcnode-id="5867"><span data-dcnode-id="5868"><span data-dcnode-id="5869"><span data-dcnode-id="5870" instrument_node="">Peter was born in England, grew up in The Netherlands, honed his early&nbsp;professional skills in Australia and Asia Pacific, and is currently based in Geneva, Switzerland. He works in English, French and Dutch.</span></span></span></span></span></p><span data-dcnode-id="5864" instrument_node="">

</span><p data-dcnode-id="5737"><span data-dcnode-id="5742"><span data-dcnode-id="5743" instrument_node="">Since 2018, Dr Stephan Davidshofer has been working as Academic Advisor of the Master of Advanced Studies (MAS) in International and European Security jointly run by the GCSP and the Global Studies Institute (GSI) of the University of Geneva. With a PhD from Sciences Po Paris, Stephan has been researching and teaching in the field of Critical Security Studies for the past fifteen years. Interested about the challenges raised by the management of today’s transnational security threats, he has contributed to several research projects investigating the evolving European security landscape from the Peace Research institute in Oslo and the University of Geneva. Stephan is also currently a lecturer at the University of Geneva's Global Studies institute. Dr. Davidshofer speaks French, English and Portuguese.</span></span><span data-dcnode-id="5741" instrument_node=""> </span><span data-dcnode-id="5738"><span data-dcnode-id="5739"><span data-dcnode-id="5740" instrument_node=""> </span></span></span></p><span data-dcnode-id="5736" instrument_node="">

</span><div class="experts_content_block_text" data-dcnode-id="5587"><span data-dcnode-id="5623" instrument_node="">
</span><p data-dcnode-id="5620"><span data-dcnode-id="5621" lang="EN-US"><span data-dcnode-id="5622" instrument_node="">Paul Dziatkowiec was appointed Head of Diplomatic Dialogue in 2021. Prior to that, for nearly a decade he served as Project Manager in various roles at the Centre for Humanitarian Dialogue (HD), an organisation that mediates between protagonists in armed conflicts. </span></span></p><span data-dcnode-id="5619" instrument_node="">
</span><p data-dcnode-id="5613"><span data-dcnode-id="5614" lang="EN-US"><span data-dcnode-id="5618" instrument_node="">At HD, Paul was involved in mediation efforts in diverse conflict settings including Nigeria, Myanmar, Thailand and most recently Ukraine, where he led HD’s efforts to help find a solution to the conflict in Donbas. He was also engaged in various regional and geopolitical dialogue initiatives. </span><span data-dcnode-id="5616"><span data-dcnode-id="5617" instrument_node="">&nbsp;</span></span><span data-dcnode-id="5615" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="5612" instrument_node="">
</span><p data-dcnode-id="5609"><span data-dcnode-id="5610" lang="EN-US"><span data-dcnode-id="5611" instrument_node="">Also at HD, for five years Paul managed the Oslo Forum, the leading international mediation event that convenes peacemakers, world leaders (up to head of state level), peace process actors and conflict parties.</span></span></p><span data-dcnode-id="5608" instrument_node="">
</span><p data-dcnode-id="5605"><span data-dcnode-id="5606" lang="EN-US"><span data-dcnode-id="5607" instrument_node="">Paul had previously served in the Australian diplomatic service for over a decade. He was Australia’s Deputy Ambassador in Nairobi and, as Deputy and Acting Ambassador, covered a range of countries including Kenya, Somalia, Tanzania, Rwanda, Uganda and Burundi. Concurrently, he was Australia’s Deputy Permanent Representative to the United Nations in Nairobi. </span></span></p><span data-dcnode-id="5604" instrument_node="">
</span><p data-dcnode-id="5601"><span data-dcnode-id="5602" lang="EN-US"><span data-dcnode-id="5603" instrument_node="">During his diplomatic career, Paul engaged in various multilateral negotiations at the UN, in Geneva, New York, and Nairobi, which included negotiating resolutions and delivering statements on behalf of Australia, on political, security, human rights, and environmental questions. </span></span></p><span data-dcnode-id="5600" instrument_node="">
</span><p data-dcnode-id="5597"><span data-dcnode-id="5598" lang="EN-US"><span data-dcnode-id="5599" instrument_node="">Previously Paul was posted to the Australian Embassy in Tel Aviv, and acted periodically as Australian’s Representative to the Palestinian Authority in Ramallah, during the second intifada. </span></span></p><span data-dcnode-id="5596" instrument_node="">
</span><p data-dcnode-id="5593"><span data-dcnode-id="5594" lang="EN-US"><span data-dcnode-id="5595" instrument_node="">Paul has also represented the International Service for Human Rights in Geneva, and worked as a Human Rights Officer in the Australian Foreign Service, both during the formative years of the UN Human Rights Council. Earlier, after the signing of the Bougainville Peace Agreement he deployed as a Peace Monitor to Bougainville, Papua New Guinea, where he was involved in raising public awareness of the agreement, following up ceasefire violations, and arranging weapons disposal and community reconciliation processes. &nbsp;</span></span></p><span data-dcnode-id="5592" instrument_node="">
</span><p data-dcnode-id="5589"><span data-dcnode-id="5590" lang="EN-US"><span data-dcnode-id="5591" instrument_node="">Paul has a Bachelor’s degree in International Business from Queensland University, as well as three Master’s degrees in International Law, International Relations, and International Policy Studies from the Australian National University, the University of New South Wales, and the University of Sydney respectively.&nbsp;He has written a number of articles and publications on various aspects of mediation, humanitarian and human rights issues.</span></span></p><span data-dcnode-id="5588" instrument_node="">

</span><p data-dcnode-id="5467"><span data-dcnode-id="5471" instrument_node="">Marc Finaud is a former French diplomat who was seconded to the GCSP from 2004 to 2013 and is now a staff member. At the GCSP, Mr Finaud leads activities related to&nbsp;</span><a data-dcnode-id="5469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gcsp.ch/Topics-Initiatives/Emerging-Security-Challenges-Programme/Arms-Proliferation"><span data-dcnode-id="5470" instrument_node="">Arms Proliferation</span></a><span data-dcnode-id="5468" instrument_node="">.</span></p><span data-dcnode-id="5466" instrument_node="">
</span><p data-dcnode-id="5464"><span data-dcnode-id="5465" instrument_node="">He finished Secondary School in Marseille in 1970 and in Independence, Iowa (USA) in 1971. He holds the Certificate of Proficiency in English (With Merits) of the University of Cambridge, Great Britain (1974), as well as a Master's Degree in International Law of the University of Aix-en-Provence, France (1975) and he is a Graduate of the Paris Institute of Political Studies (1977).</span></p><span data-dcnode-id="5463" instrument_node="">
</span><p data-dcnode-id="5461"><span data-dcnode-id="5462" instrument_node="">He joined the French Ministry of Foreign Affairs in 1977, first at the Military Cooperation Division. In 1977-1978, he was Vice-Consul at the French Consulate-General in Leningrad (USSR). Back in Paris, he worked at the Directorate for Europe (Conference on Security and Cooperation in Europe -CSCE-) from 1979 to 1982. He was a member of the French Delegation to the CSCE Meeting in Madrid (1980-1982). In 1982-1983 he served as Chief of Staff of the Secretary-General of the Ministry of Foreign Affairs, before being appointed First Secretary at the French Embassy in Warsaw. In 1987-1988, he was the Secretary-General of the French Delegation to the CSCE Meeting in Vienna.</span></p><span data-dcnode-id="5460" instrument_node="">
</span><p data-dcnode-id="5458"><span data-dcnode-id="5459" instrument_node="">In 1989-1993 he served as Second Counsellor at the French Delegation to the Conference on Disarmament in Geneva and a member of the French Delegation to the First Committee of the General Assembly of the United Nations in New York. From 1993 to 1996 he was the Head of the Information Department (and alternate spokesman) of the Foreign Ministry in Paris. In 1995-1996, he was a lecturer on arms control and disarmament for a post-graduate course at the Marne-la-Vallée University. In 1996 was appointed Deputy Head of Mission at the French Embassy in Tel Aviv (Israel) where he joined the Team of Negotiators of the EU Special Envoy to the Middle East. He was transferred to Sydney as Consul-General for France in January, 2001, with jurisdiction over the whole of Australia.</span></p><span data-dcnode-id="5457" instrument_node="">
</span><p data-dcnode-id="5455"><span data-dcnode-id="5456" instrument_node="">Apart from French, he speaks English, Russian and Polish. He has published many articles, chapters and books on arms control and disarmament as well as on the Middle East and international humanitarian law.</span></p><span data-dcnode-id="5454" instrument_node="">
</span><p data-dcnode-id="5449"><span data-dcnode-id="5453" instrument_node="">In addition, from August 2013 to May 2015, Marc Finaud was Senior Resident Fellow at the&nbsp;</span><a data-dcnode-id="5451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unidir.ch/"><span data-dcnode-id="5452" instrument_node="">United Nations Institute for Disarmament Research</span></a><span data-dcnode-id="5450" instrument_node="">&nbsp;(UNIDIR).</span></p><span data-dcnode-id="5448" instrument_node="">

</span><p data-dcnode-id="5281"><span data-dcnode-id="5282"><span data-dcnode-id="5283"><span data-dcnode-id="5284"><span data-dcnode-id="5308" lang="EN-GB"><span data-dcnode-id="5309" instrument_node="">Ingrid </span></span><a data-dcnode-id="5301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/contacts/u/0/%23contact/3fe7d7fa0aab97c0"><span data-dcnode-id="5302" lang="EN-GB"><span data-dcnode-id="5303"><span data-dcnode-id="5304"><span data-dcnode-id="5305"><span data-dcnode-id="5306"><span data-dcnode-id="5307" instrument_node="">Gázquez</span></span></span></span></span></span></a><span data-dcnode-id="5298" lang="EN-GB"><span data-dcnode-id="5299"><span data-dcnode-id="5300" instrument_node=""> González</span></span></span><span data-dcnode-id="5296" lang="EN-GB"><span data-dcnode-id="5297" instrument_node="">, i</span></span><span data-dcnode-id="5294" lang="EN-GB"><span data-dcnode-id="5295" instrument_node="">s the Leadership Portfolio Manager for the Geneva Leadership Alliance, a partnership that combines </span></span><a data-dcnode-id="5291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gcsp.ch/topics/leadership"><span data-dcnode-id="5292" lang="EN-GB"><span data-dcnode-id="5293" instrument_node="">Geneva Centre for Security Policy (GCSP)</span></span></a><span data-dcnode-id="5289" lang="EN-GB"><span data-dcnode-id="5290" instrument_node=""> expertise on peace, security and global governance with the leadership development expertise of the </span></span><a data-dcnode-id="5286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ccl.org/"><span data-dcnode-id="5287" lang="EN-GB"><span data-dcnode-id="5288" instrument_node="">Center for Creative Leadership (CCL).</span></span></a><span data-dcnode-id="5285" instrument_node=""> </span></span></span></span></p><span data-dcnode-id="5280" instrument_node="">
</span><p data-dcnode-id="5274"><span data-dcnode-id="5275"><span data-dcnode-id="5276"><span data-dcnode-id="5277"><span data-dcnode-id="5278" lang="EN-GB"><span data-dcnode-id="5279" instrument_node="">The mission of this Alliance is to advance the understanding, practice and positive impact of leading in public, private, non-profit organizations and civil society.</span></span></span></span></span></p><span data-dcnode-id="5273" instrument_node="">
</span><p data-dcnode-id="5259"><span data-dcnode-id="5260"><span data-dcnode-id="5261"><span data-dcnode-id="5262"><span data-dcnode-id="5270" lang="EN-GB"><span data-dcnode-id="5271"><span data-dcnode-id="5272" instrument_node="">A lawyer by trade, Ingrid holds a Master’s Degree in Human Rights and International Adoption from the University of Barcelona and a second Master’s Degree in Communications and Marketing. She is currently pursuing an MBA with </span></span></span><span data-dcnode-id="5266" lang="EN-CA"><a data-dcnode-id="5267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thepowermba.com/en/"><span data-dcnode-id="5268" lang="EN-GB"><span data-dcnode-id="5269" instrument_node="">#ThePowerMBA</span></span></a></span><span data-dcnode-id="5263" lang="EN-GB"><span data-dcnode-id="5264"><span data-dcnode-id="5265" instrument_node="">.</span></span></span></span></span></span></p><span data-dcnode-id="5258" instrument_node="">
</span><p data-dcnode-id="5243"><span data-dcnode-id="5244"><span data-dcnode-id="5245"><span data-dcnode-id="5246"><span data-dcnode-id="5255" lang="EN-GB"><span data-dcnode-id="5256"><span data-dcnode-id="5257" instrument_node="">As a certified Project Manager Professional (PMP), she honed her change management and educational expertise when founding her own NGO: </span></span></span><span data-dcnode-id="5251" lang="EN-CA"><a data-dcnode-id="5252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.asociacionmundus.com/"><span data-dcnode-id="5253" lang="EN-GB"><span data-dcnode-id="5254" instrument_node="">Mundus</span></span></a></span><span data-dcnode-id="5247" lang="EN-GB"><span data-dcnode-id="5248"><span data-dcnode-id="5249"><span data-dcnode-id="5250" instrument_node="">. In its first 3 years, Mundus supported more than 1000 change makers to access "learning by doing" opportunities funded by the European Commission. Her entrepreneurial spirit has led her to engage with countless social enterprises and NGOs all around Europe confirming for her that community, government engagement and workforce development are essential enablers to make any social investment initiative successful. </span></span></span></span></span></span></span></p><span data-dcnode-id="5242" instrument_node="">
</span><p data-dcnode-id="5212"><span data-dcnode-id="5213"><span data-dcnode-id="5214"><span data-dcnode-id="5215"><span data-dcnode-id="5238" lang="EN-GB"><span data-dcnode-id="5239"><span data-dcnode-id="5240"><span data-dcnode-id="5241" instrument_node="">Earlier in her carrier, she worked for Mondelez (former Kraft foods) coordinating operations for their third party verified sustainability cocoa initiative, </span></span></span></span><a data-dcnode-id="5233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cocoalife.org/"><span data-dcnode-id="5234" lang="EN-GB"><span data-dcnode-id="5235"><span data-dcnode-id="5236"><span data-dcnode-id="5237" instrument_node="">Cocoa Life</span></span></span></span></a><span data-dcnode-id="5222" lang="EN-GB"><span data-dcnode-id="5223"><span data-dcnode-id="5224"><span data-dcnode-id="5225"><span data-dcnode-id="5232" instrument_node="">, a </span><span data-dcnode-id="5230"><span data-dcnode-id="5231" instrument_node="">400M$ </span></span><span data-dcnode-id="5229" instrument_node="">holistic program implemented in cocoa farming </span><span data-dcnode-id="5227"><span data-dcnode-id="5228" instrument_node="">communities </span></span><span data-dcnode-id="5226" instrument_node="">in Africa, Asia and Latin America to boost farmer’s skills and improve their livelihoods, strengthen</span></span></span></span></span><span data-dcnode-id="5216" lang="EN-GB"><span data-dcnode-id="5217"><span data-dcnode-id="5218"><span data-dcnode-id="5221" instrument_node=""> </span><span data-dcnode-id="5219"><span data-dcnode-id="5220" instrument_node="">their communities and inspire the new generation of cocoa farmers to use their land sustainably. </span></span></span></span></span></span></span></span></p><span data-dcnode-id="5211" instrument_node="">
</span><p data-dcnode-id="5203"><span data-dcnode-id="5204"><span data-dcnode-id="5205"><span data-dcnode-id="5206"><span data-dcnode-id="5207" lang="EN-GB"><span data-dcnode-id="5208"><span data-dcnode-id="5209"><span data-dcnode-id="5210" instrument_node="">In her previous role as Learning and Development Specialist at The Global Fund to fight AIDS, Malaria and Tuberculosis, she, together with Ministries of Health, designed and implemented capacity strengthening programs in more than 15 developing countries to improve the availability of medicines in the Global South. She’s passionate about shaping change through engaging with people and building their capabilities. Ingrid is behind the Engage-Design-Implement-Sustain (EDIS) Organizational Development Model, a process-driven approach to optimize workforce performance and improve commodity availability and health outcomes.</span></span></span></span></span></span></span></p><span data-dcnode-id="5202" instrument_node="">
</span><p data-dcnode-id="5194"><span data-dcnode-id="5195"><span data-dcnode-id="5196"><span data-dcnode-id="5197"><span data-dcnode-id="5198" lang="EN-GB"><span data-dcnode-id="5199"><span data-dcnode-id="5200"><span data-dcnode-id="5201" instrument_node="">Ingrid is a Spanish national and her mother tongue is Spanish. She is fluent in Catalan and has an intermediate level of French and German.</span></span></span></span></span></span></span></p><span data-dcnode-id="5193" instrument_node="">

</span><p data-dcnode-id="5039"><span data-dcnode-id="5040" instrument_node="">Isabelle Gillet is the Head of Community Engagement and leads, develops, and organizes the Centre’s community programmes in Geneva and abroad, including community-led projects. She aims to facilitate mutually beneficial and sustainable relationships between the GCSP and its alumni community.</span></p><span data-dcnode-id="5038" instrument_node="">
</span><p data-dcnode-id="5036"><span data-dcnode-id="5037" instrument_node="">Isabelle has joined the GCSP early 2008 and has held different positions throughout this period. She began at the Centre in the Protocol and Events department where she managed expert seminars, diplomatic dialogue, executive training workshops and major international conferences. In December 2013 she began working for the GCSP’s alumni development and introduced a new strategic plan and new technology to most effectively engage alumni in the life of the GCSP.</span></p><span data-dcnode-id="5035" instrument_node="">
</span><p data-dcnode-id="5033"><span data-dcnode-id="5034" instrument_node="">Prior to joining the GCSP, Isabelle worked for 14 years for Geneva Tourism &amp; Convention Bureau, where she started to work in the Sales and Promotions department. As its Manager in the later years, she was in charge of a cross-cultural team to brand and develop the destination’s leisure tourism sector. Herself responsible for the Asian market, she established Geneva’s partnerships in the Far East and implemented commercial strategies and promotional projects with an active participation at sales meetings, workshops trade shows and other task forces to further drive business.</span></p><span data-dcnode-id="5032" instrument_node="">
</span><p data-dcnode-id="5030"><span data-dcnode-id="5031" instrument_node="">Isabelle has a large international background and has continually evolved in a multi-cultural environment. Isabelle is Swiss and lived and worked in the US, UK, India, the Middle East, and the Far East.</span></p><span data-dcnode-id="5029" instrument_node="">
</span><p data-dcnode-id="5027"><span data-dcnode-id="5028" instrument_node="">She is trilingual in English, French and German and holds a degree in international hotel business management.</span></p><span data-dcnode-id="5026" instrument_node="">

</span><div class="experts_content_block_text" data-dcnode-id="4778"><span data-dcnode-id="4869" instrument_node="">
</span><p data-dcnode-id="4853"><strong data-dcnode-id="4866"><span data-dcnode-id="4867" lang="EN-GB"><span data-dcnode-id="4868" instrument_node="">Ambassador Thomas Greminger</span></span></strong><span data-dcnode-id="4861" lang="EN-GB"><span data-dcnode-id="4865" instrument_node=""> served as </span><strong data-dcnode-id="4863"><span data-dcnode-id="4864" instrument_node="">Secretary General of the Organization for Security and Co-operation in Europe </span></strong><span data-dcnode-id="4862" instrument_node="">(OSCE) from July 2017 until July 2020. </span></span><span data-dcnode-id="4854" lang="EN"><span data-dcnode-id="4860" instrument_node="">On May 1, 2021, he took over as </span><strong data-dcnode-id="4858"><span data-dcnode-id="4859" instrument_node="">Director </span></strong><span data-dcnode-id="4857" instrument_node="">of the</span><strong data-dcnode-id="4855"><span data-dcnode-id="4856" instrument_node=""> Geneva Centre for Security Policy (GCSP).</span></strong></span></p><span data-dcnode-id="4852" instrument_node="">
</span><p data-dcnode-id="4849"><span data-dcnode-id="4850" lang="EN-GB"><span data-dcnode-id="4851" instrument_node="">As Secretary General, he acted as an effective crisis manager supporting successive Chairmanships in an increasingly polarized environment. In the final months of his term, he dealt with the COVID-19 crisis, working to protect the health and safety of staff while ensuring that the OSCE continued to carry out its critical mandates and maintained business continuity.</span></span></p><span data-dcnode-id="4848" instrument_node="">
</span><p data-dcnode-id="4840"><span data-dcnode-id="4846" lang="EN-GB"><span data-dcnode-id="4847" instrument_node="">Despite the highly polarized political climate, Ambassador Greminger promoted dialogue among the 57 OSCE participating States as one of his key priorities. He s</span></span><span data-dcnode-id="4841" lang="EN-GB"><span data-dcnode-id="4845" instrument_node="">parked </span><span data-dcnode-id="4843"><span data-dcnode-id="4844" instrument_node="">informal discussions on emerging challenges and opportunities</span></span><span data-dcnode-id="4842" instrument_node=""> such as the importance of technology to all dimensions of security or the link between climate change and security.</span></span></p><span data-dcnode-id="4839" instrument_node="">
</span><p data-dcnode-id="4836"><span data-dcnode-id="4837" lang="EN-GB"><span data-dcnode-id="4838" instrument_node="">He supported the OSCE in maintaining field presences to support participating States in implementing OSCE commitments, and preventing or managing conflicts – notably the Special Monitoring Mission to Ukraine. He engaged in diplomatic efforts and supported those of various mediators addressing emerging and protracted conflicts in the OSCE area.</span></span></p><span data-dcnode-id="4835" instrument_node="">
</span><p data-dcnode-id="4828"><span data-dcnode-id="4833" lang="EN-GB"><span data-dcnode-id="4834" instrument_node="">Ambassador Greminger promoted effective multilateralism by strengthening ties with the OSCE’s partners among international and regional organizations. He h</span></span><span data-dcnode-id="4829" lang="EN-GB"><span data-dcnode-id="4832" instrument_node="">ighlighted the OSCE’s contribution in helping participating States to implement the </span><span data-dcnode-id="4830"><span data-dcnode-id="4831" instrument_node="">Sustainable Development Goals.</span></span></span></p><span data-dcnode-id="4827" instrument_node="">
</span><p data-dcnode-id="4816"><span data-dcnode-id="4825" lang="EN-GB"><span data-dcnode-id="4826" instrument_node="">In his capacity as OSCE Chief Administrative Officer, Ambassador Greminger introduced a “fit for purpose” agenda focused on adapting the OSCE to changing realities and new opportunities against a background of limited and declining resources. This included a management review of the OSCE Secretariat that resulted in procedural and structural improvements, including by making the best use of technology. He also introduced</span></span><span data-dcnode-id="4817" lang="EN-GB"><span data-dcnode-id="4824" instrument_node=""> an OSCE </span><span data-dcnode-id="4822"><span data-dcnode-id="4823" instrument_node="">gender parity strategy</span></span><span data-dcnode-id="4821" instrument_node=""> and openly addressed </span><span data-dcnode-id="4819"><span data-dcnode-id="4820" instrument_node="">sexual harassment</span></span><span data-dcnode-id="4818" instrument_node=""> and other challenges to creating a healthy and inclusive professional working environment. In view of his engagement, he was invited to join the International Gender Champions’ network.</span></span></p><span data-dcnode-id="4815" instrument_node="">
</span><p data-dcnode-id="4812"><span data-dcnode-id="4813" lang="EN-GB"><span data-dcnode-id="4814" instrument_node="">Previously, Ambassador Greminger served as Deputy Director General of the Swiss Agency for Development and Cooperation at the Federal Department of Foreign Affairs. As Head of South Cooperation, he oversaw cooperation with 21 partner countries and regions, entailing an annual budget of USD 730 million and 900 staff in Bern and abroad. In this function, he regularly represented Switzerland at international conferences as State Secretary. </span></span></p><span data-dcnode-id="4811" instrument_node="">
</span><p data-dcnode-id="4808"><span data-dcnode-id="4809" lang="EN-GB"><span data-dcnode-id="4810" instrument_node="">From 2010 to 2015, Ambassador Greminger served as the Permanent Representative of Switzerland to the OSCE, the United Nations and the International Organizations in Vienna. He was instrumental in devising the consecutive chairmanships and joint work plan of Switzerland (2014) and Serbia (2015). During the Swiss Chairmanship, he chaired the OSCE Permanent Council and played an active role in addressing the crisis in and around Ukraine that rapidly unfolded during the course of 2014. For the first time in years, the OSCE managed to achieve consensus on new OSCE operations – the most important being the Special Monitoring Mission to Ukraine. </span></span></p><span data-dcnode-id="4807" instrument_node="">
</span><p data-dcnode-id="4804"><span data-dcnode-id="4805" lang="EN-GB"><span data-dcnode-id="4806" instrument_node="">Ambassador Greminger was responsible for preparing the successful 2014 OSCE Ministerial Council in Basel, which yielded 21 consensus decisions and declarations. He chaired the OSCE Human Dimension Committee in 2011 and 2012. He introduced the structured agenda, substantive human dimension discussions as well as regular exchanges with OSCE institutions, field missions and UN mandate holders. As a member of the OSCE Troika, he chaired the OSCE Mediterranean Contact Group (2013) and the OSCE Asian Contact Group (2015).</span></span></p><span data-dcnode-id="4803" instrument_node="">
</span><p data-dcnode-id="4800"><span data-dcnode-id="4801" lang="EN-GB"><span data-dcnode-id="4802" instrument_node="">Through his comprehensive expertise in security policy, Ambassador Greminger marked a number of important achievements in the OSCE: he contributed significantly to Ministerial Council Decision 3/11 on the conflict cycle, and the subsequent development of mediation and facilitation capacities in the OSCE Conflict Prevention Center. </span></span></p><span data-dcnode-id="4799" instrument_node="">
</span><p data-dcnode-id="4796"><span data-dcnode-id="4797" lang="EN-GB"><span data-dcnode-id="4798" instrument_node="">During his term as Permanent Representative, Switzerland became the coordinator for the Vienna Document and introduced a number of modernization proposals. By strongly promoting partnership with the Geneva Centre for Democratic Control of Armed Forces (DCAF), he helped the OSCE Secretariat and field missions to build capacities in security sector governance and reform.</span></span></p><span data-dcnode-id="4795" instrument_node="">
</span><p data-dcnode-id="4792"><span data-dcnode-id="4793" lang="EN-GB"><span data-dcnode-id="4794" instrument_node="">From 2004 to 2010, he served as Head of the Human Security Division of the Federal Department of Foreign Affairs. The Division is the Department’s main competence center for peace, human rights and humanitarian and migration policy, with an annual budget of around USD 70 million and 100 staff in Bern and abroad. During his tenure, the division offered and supported facilitation and mediation services to more than half a dozen peace processes worldwide (including in the Middle East, Colombia, Nepal, Burundi, Uganda and Sudan) and launched a number of important diplomatic initiatives, including those which led to the creation of the UN Human Rights Council, the UN International Tracing Instrument for SALW, and the Geneva Declaration on Armed Violence and Development. </span></span></p><span data-dcnode-id="4791" instrument_node="">
</span><p data-dcnode-id="4788"><span data-dcnode-id="4789" lang="EN-GB"><span data-dcnode-id="4790" instrument_node="">Ambassador Greminger also served as Deputy Head of the Human Security Division from 2002 to 2004, and from 1999 to 2001 as Country Director at the Swiss Embassy in Maputo, Mozambique, where he managed Switzerland’s largest development cooperation programme with an annual budget of around USD 30 million and staff. </span></span></p><span data-dcnode-id="4787" instrument_node="">
</span><p data-dcnode-id="4784"><span data-dcnode-id="4785" lang="EN-GB"><span data-dcnode-id="4786" instrument_node="">From 1994 to 1998, he served in different posts in the Swiss Agency for Development and Cooperation, including Head of the Policy and Research Unit. </span></span></p><span data-dcnode-id="4783" instrument_node="">
</span><p data-dcnode-id="4780"><span data-dcnode-id="4781" lang="EN-GB"><span data-dcnode-id="4782" instrument_node="">Ambassador Greminger holds a PhD in history from the University of Zurich. He is Lieutenant Colonel GS (company and battalion commander of infantry unit of the Swiss Armed Forces; G6 and Deputy Chief of Staff of Infantry Brigade). He has authored numerous publications on military history, conflict management, peacekeeping, development and human rights. His mother tongue is German; he is fluent in English and French and has a good working knowledge of Portuguese. Ambassador Greminger was born in 1961 and has four daughters. </span></span></p><span data-dcnode-id="4779" instrument_node="">

</span><p data-dcnode-id="4671"><span data-dcnode-id="4674" lang="EN-GB"><span data-dcnode-id="4677" instrument_node="">Ms Fleur Heyworth leads the GCSP's executive education, dialogue and policy analysis on gender and inclusive security.&nbsp; Working closely with the GCSP's Leadership Alliance, she designs and facilitates courses on leadership for women, and for male and female leaders to create more inclusive working environments.&nbsp; She also delivers modules on gender and inclusive security to the multi-disciplinary, multi-cultural participants on GCSP's core courses, incorporating the frameworks of the Women Peace and Security Agenda, and the Sustainable Development Goals to apply a ‘gender lens’ to security policy.&nbsp; Fleur has published numerous policy analysis on topics ranging from gender, diversity and inclusion to women in mediation and has designed and facilitated customised courses for women mediator networks </span><a data-dcnode-id="4675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gcsp.ch/topics/gender-inclusive-security"><span data-dcnode-id="4676" instrument_node="">https://www.gcsp.ch/topics/gender-inclusive-security</span></a></span><span data-dcnode-id="4672" lang="EN-GB"><span data-dcnode-id="4673" instrument_node="">.&nbsp; </span></span></p><span data-dcnode-id="4670" instrument_node="">
</span><p data-dcnode-id="4648"><span data-dcnode-id="4665" lang="EN-GB"><span data-dcnode-id="4669" instrument_node="">Fleur also heads the International Gender Champions Secretariat (</span><a data-dcnode-id="4667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.genderchampions.com/"><span data-dcnode-id="4668" instrument_node="">www.genderchampions.com</span></a><span data-dcnode-id="4666" instrument_node="">), </span></span><span data-dcnode-id="4663" lang="EN-GB"><span data-dcnode-id="4664" instrument_node="">a </span></span><span data-dcnode-id="4661" lang="EN-GB"><span data-dcnode-id="4662" instrument_node="">global network of almost 300 leaders advancing gender equality, extending across six multilateral hubs, which is currently being incubated by the GCSP</span></span><span data-dcnode-id="4659" lang="EN-GB"><span data-dcnode-id="4660" instrument_node="">.&nbsp; </span></span><span data-dcnode-id="4657" lang="EN-GB"><span data-dcnode-id="4658" instrument_node="">In this capacity, Fleur </span></span><span data-dcnode-id="4655" lang="EN-GB"><span data-dcnode-id="4656" instrument_node="">leads</span></span><span data-dcnode-id="4653" lang="EN-GB"><span data-dcnode-id="4654" instrument_node=""> governance, partnerships, </span></span><span data-dcnode-id="4651" lang="EN-GB"><span data-dcnode-id="4652" instrument_node="">and the team responsible for </span></span><span data-dcnode-id="4649" lang="EN-GB"><span data-dcnode-id="4650" instrument_node="">programmatic and communications work, including the development of a new network wide pledge to speak up and stand up for zero tolerance of gender based violence, sexist attitudes and behaviour.&nbsp; Fleur regularly facilitates and moderates in person, virtual and hybrid meetings.</span></span></p><span data-dcnode-id="4647" instrument_node="">
</span><p data-dcnode-id="4644"><span data-dcnode-id="4645" lang="EN-GB"><span data-dcnode-id="4646" instrument_node="">Fleur began her professional career as a Barrister and spent 5 years advocating in court, representing government and private clients in family law proceedings in England and Wales.&nbsp; In Geneva, she worked at the UK Mission to the UN where she represented the UK government in negotiations in International Humanitarian Law at the Red Cross Conference 2015, and on a range of thematic topics during three Human Rights Council sessions including sexual violence in conflict, disasters and emergencies, and on gender equality.&nbsp; She also worked with NGOs during UPR sessions and drafted recommendations to CEDAW.&nbsp; Fleur has a Geography Degree from Cambridge University, and took her post-graduate studies in law at Nottingham Law School.</span></span></p><span data-dcnode-id="4643" instrument_node="">

</span><p data-dcnode-id="4439"><span data-dcnode-id="4468"><span data-dcnode-id="4469"><strong data-dcnode-id="4474"><span data-dcnode-id="4475" lang="EN-GB"><span data-dcnode-id="4476"><span data-dcnode-id="4477"><span data-dcnode-id="4478" instrument_node="">Ms Annika Hilding Norberg</span></span></span></span></strong><span data-dcnode-id="4470" lang="EN-GB"><span data-dcnode-id="4471"><span data-dcnode-id="4472"><span data-dcnode-id="4473" instrument_node="">&nbsp;is&nbsp;</span></span></span></span></span></span><span data-dcnode-id="4440"><span data-dcnode-id="4441"><span data-dcnode-id="4442"><span data-dcnode-id="4443"><span data-dcnode-id="4464" lang="EN-GB"><span data-dcnode-id="4465"><span data-dcnode-id="4466"><span data-dcnode-id="4467" instrument_node="">Head of Peace Operations and Peacebuilding at the GCSP, and&nbsp;leads GCSPs work&nbsp;on peace operations and peacebuilding&nbsp;dialogue and reflections,&nbsp;policy&nbsp;applicable research and&nbsp;development,&nbsp;and executive education and training. Annika’s focus is on strengthening leadership for peace at all levels with an emphasis on UN and EU civilian, military and police missions and operations, but also leadership for peace more broadly&nbsp;and women leadership in particular. She serves&nbsp;as a Member of the Board of Directors of the&nbsp;</span></span></span></span><span data-dcnode-id="4458" lang="EN-US"><a data-dcnode-id="4459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gcsp.ch/events/international-leadership-association-23rd-annual-global-conference"><span data-dcnode-id="4460" lang="EN-GB"><span data-dcnode-id="4461"><span data-dcnode-id="4462"><span data-dcnode-id="4463" instrument_node="">International Leadership Association</span></span></span></span></a></span><span data-dcnode-id="4454" lang="EN-GB"><span data-dcnode-id="4455"><span data-dcnode-id="4456"><span data-dcnode-id="4457" instrument_node="">&nbsp;and as a Member&nbsp;of&nbsp;the&nbsp;</span></span></span></span><span data-dcnode-id="4448" lang="EN-US"><a data-dcnode-id="4449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gpplatform.ch/"><span data-dcnode-id="4450" lang="EN-GB"><span data-dcnode-id="4451"><span data-dcnode-id="4452"><span data-dcnode-id="4453" instrument_node="">Geneva Peacebuilding Platform</span></span></span></span></a></span><span data-dcnode-id="4444" lang="EN-GB"><span data-dcnode-id="4445"><span data-dcnode-id="4446"><span data-dcnode-id="4447" instrument_node="">&nbsp;Management Committee.</span></span></span></span></span></span></span></span></p><span data-dcnode-id="4438" instrument_node="">
</span><p data-dcnode-id="4429"><span data-dcnode-id="4430"><span data-dcnode-id="4431"><span data-dcnode-id="4432"><span data-dcnode-id="4433"><span data-dcnode-id="4434" lang="EN-GB"><span data-dcnode-id="4435"><span data-dcnode-id="4436"><span data-dcnode-id="4437" instrument_node="">Prior to joining the GCSP, Annika was the Founder and Director of the International Forum for the Challenges of Peace Operations (Challenges Forum), a joint platform of then 22 countries, incl. the five Permanent Members of the UN&nbsp;Security Council, aimed at strengthening UN peace operations. Originating from when she served as President of the London School of Economics (LSE) International Relations Society, the Challenges Forum was founded in 1996 as part of Annika’s research studies at the LSE on comparative approaches to peace operations. Annika coordinated the Challenges Forum based at the LSE (1996-2000), the Swedish National Defence College (1997-2002) and the Folke Bernadotte Academy, an agency of the Swedish Ministry of Foreign Affairs (2003-2017). She served on the Board of Directors for the Peace Operations Training Institute (2010-2013). </span></span></span></span></span></span></span></span></p><span data-dcnode-id="4428" instrument_node="">
</span><p data-dcnode-id="4419"><span data-dcnode-id="4420"><span data-dcnode-id="4421"><span data-dcnode-id="4422"><span data-dcnode-id="4423"><span data-dcnode-id="4424" lang="EN-GB"><span data-dcnode-id="4425"><span data-dcnode-id="4426"><span data-dcnode-id="4427" instrument_node="">Annika has worked and /or studied in ten countries. She holds a BSc of International Relations from the LSE, an MA in International Politics from the Free University of Brussels and studied languages at the Moscow State University and the Universidad del Pais Vasco.&nbsp;Annika is main editor of some 80 Challenges Forum and other reports and policy briefs. In 2008, she was awarded the Silver Medal of the Royal Swedish Academy of War Sciences for her contributions to strengthening UN peacekeeping.&nbsp; &nbsp;</span></span></span></span></span></span></span></span></p><span data-dcnode-id="4418" instrument_node="">

</span><div class="experts_content_block_text" data-dcnode-id="3526"><span data-dcnode-id="3548" instrument_node="">
</span><p data-dcnode-id="3546"><span data-dcnode-id="3547" instrument_node="">Mr David Horobin is Head of the Crisis Management at GCSP. He has more than 25 years operational experience in emergency and crisis management in natural and conflict related contexts in both field and HQ functions. &nbsp;</span></p><span data-dcnode-id="3545" instrument_node="">
</span><p data-dcnode-id="3543"><span data-dcnode-id="3544" instrument_node="">As Head of Crisis Management his main tasks are designing, researching and delivering contemporary crisis management courses for decision makers, leaders, researchers and specialists in the government, humanitarian and corporate sectors.&nbsp;</span></p><span data-dcnode-id="3542" instrument_node="">
</span><p data-dcnode-id="3540"><span data-dcnode-id="3541" instrument_node="">From 2010- 2017, he held the position of Head of Crisis Management and Security at the International Committee of the Red Cross (ICRC) providing policy, training and operational support for 18,000 ICRC staff in 80 countries for all emergency and security related incidents.</span></p><span data-dcnode-id="3539" instrument_node="">
</span><p data-dcnode-id="3537"><span data-dcnode-id="3538" instrument_node="">From 2006- 2010, he was Head of the Rapid Deployment Unit at the ICRC. He designed, staffed and managed ICRC’s emergency response and surge capacity capability incorporating ICRC’s technical and managerial support internally and through Red Cross/Crescent networks consisting of 190 National Societies with 24 hours deployable expertise and ERU teams.</span></p><span data-dcnode-id="3536" instrument_node="">
</span><p data-dcnode-id="3534"><span data-dcnode-id="3535" instrument_node="">From 2003-2006, Mr Horobin was Director of the Operations Team (CHASE-OT) at the UK’s Governments Department for International Development (DFID). He lead the UK’s emergency response to major international emergencies and managed a team of 45 experts in technical, operational and advisory roles. During this time he chaired the International Humanitarian Partnership (IHP) and was appointed EU High Level coordinator for Hurricane Katrina.&nbsp;</span></p><span data-dcnode-id="3533" instrument_node="">
</span><p data-dcnode-id="3531"><span data-dcnode-id="3532" instrument_node="">Throughout his career, he developed first hand operational experience in natural and complex emergencies; Angola, Ethiopia, Rwanda, DRC, Philippines, Timor, Balkans, Iran, Afghanistan, Liberia, Japan, Asian Tsunami &nbsp;and global emergencies such as Ebola, H1N1 and NRBC events. Additionally, he was responsible for &nbsp;high level policy and operational coordination with UN, RCRC, governments and commercial operators.</span></p><span data-dcnode-id="3530" instrument_node="">
</span><p data-dcnode-id="3528"><span data-dcnode-id="3529" instrument_node="">A logistician by profession he is a Fellow of the Chartered Institute of Logistics (FCILT), and recently appointed Fellow and Advisory Board Member of the Institute of Strategic Risk Management (ISRM); he holds an MSc in Transport Engineering from Imperial College, London and a BSc in Social Science. He has attained accredited Senior People, Leadership and Management (PLM-CS), Ashridge, UK (2007-2010), and certified EU High Level Coordinator (EU DG ENV-2006). Mr Horobin has advanced kidnap and crisis management training.&nbsp;</span></p><span data-dcnode-id="3527" instrument_node="">

</span><p data-dcnode-id="3361"><span data-dcnode-id="3362"><span data-dcnode-id="3363"><span data-dcnode-id="3364" lang="EN-GB"><span data-dcnode-id="3365" instrument_node="">Gazmend was previously a doctoral student in Cyberspace Operations at the Swedish Defence University. Additionally, he was Director of Intelligence on Cyber-related issues in the Swedish Armed Forces. Prior to that, he was Head of the United Nation's Intelligence Cell in a mission area for several years. He is a military Veteran, with more than five years of duty in conflict and post-conflict areas including two tours to the Balkans and one in Central Asia. He holds a two-year Master of Science in Security &amp; Risk Management from the University of Leicester, and a two-year Master of Science in Information Security from Stockholm University.</span></span></span></span></p><span data-dcnode-id="3360" instrument_node="">
</span><p data-dcnode-id="3355"><span data-dcnode-id="3356"><span data-dcnode-id="3357"><span data-dcnode-id="3358" lang="EN-GB"><span data-dcnode-id="3359" instrument_node="">In addition, he is a graduate from the Harvard Kennedy School Executive Education program on Cybersecurity: The Intersection of Policy and Technology, and the Geneva Centre for Security Policy European Training Course (ETC). In 2014, he was awarded the best idea answering to EEAS Deputy Secretary General thread on the EU as a security provider. He has also academic training from Cranfield University, University of St. Andrews, the KTH Royal Institute of Technology, and professional training from the UN Department of Safety and Security (DSS). He was Chair of Research &amp; Development at ISACA Swedish Chapter and is a Certified Information Security Manager (CISM).</span></span></span></span></p><span data-dcnode-id="3354" instrument_node="">

</span><p data-dcnode-id="3223"><span data-dcnode-id="3224"><span data-dcnode-id="3225"><span data-dcnode-id="3226"><span data-dcnode-id="3227" lang="EN-US"><span data-dcnode-id="3228"><span data-dcnode-id="3229" instrument_node="">Jean-Pierre Keller is a Senior Analyst and Deputy at the Terrorism-Joint Analysis Group (T-JAG) at the Geneva Centre for Security Policy (GCSP). His research focuses on local terrorist networks, terrorist financing and inter-related terrorism threats. In his role Jean-Pierre developed projects, teaches and lectures in intelligence/counter-terrorism analysis and management. </span></span></span></span></span></span></p><span data-dcnode-id="3222" instrument_node="">
</span><p data-dcnode-id="3217"><span data-dcnode-id="3218"><span data-dcnode-id="3219"><span data-dcnode-id="3220" lang="EN-US"><span data-dcnode-id="3221" instrument_node="">Prior to joining the GCSP, Jean-Pierre gained more than 25 years of experience in the financial sector. He had the opportunity&nbsp;to work as a Foreign Exchange trader, Portfolio Manager and later as an Investment Advisor for individuals and entrepreneurs based in the Sub-Saharan Africa countries, where he traveled on a regular basis.</span></span></span></span></p><span data-dcnode-id="3216" instrument_node="">
</span><p data-dcnode-id="3209"><span data-dcnode-id="3210"><span data-dcnode-id="3211"><span data-dcnode-id="3212"><span data-dcnode-id="3213" lang="EN-US"><span data-dcnode-id="3214"><span data-dcnode-id="3215" instrument_node="">Jean-Pierre holds a Master of Advanced Studies (MAS) in Global Security and Conflict Resolution from the Global Studies Institute, University of Geneva. As GCSP Executive-in-Residence, he accomplished both GCSP &amp; FOCP crisis management trainings. Retired officer of the Swiss Army, he was a Company Commander, specialized in disaster relief and was trained as a UN military observer. Jean-Pierre is also head of the team leaders and co-responsible for the mountaineering education and training at Club Alpin Suisse – Geneva section.</span></span></span></span></span></span></p><span data-dcnode-id="3208" instrument_node="">

                                Former Permanent Representative of France to the United Nations in New York
                            </span></span><span data-dcnode-id="3129" instrument_node="">
</span></div><span data-dcnode-id="3127" instrument_node="">

</span><div class="experts_content_block_text" data-dcnode-id="3073"><span data-dcnode-id="3119" instrument_node="">
</span><p data-dcnode-id="3117"><span data-dcnode-id="3118" instrument_node="">Today a member of the Institut de France, Jean-David Levitte has had a distinguished and outstanding career in the French Foreign Service, serving on the staff of three French Presidents and holding key senior positions in the French Foreign Service.</span></p><span data-dcnode-id="3116" instrument_node="">
</span><p data-dcnode-id="3114"><span data-dcnode-id="3115" instrument_node="">From 2007 to 2012, Ambassador Levitte was the Senior Diplomatic Adviser and Sherpa of President Sarkozy.</span></p><span data-dcnode-id="3113" instrument_node="">
</span><p data-dcnode-id="3111"><span data-dcnode-id="3112" instrument_node="">He served as Ambassador to the United States, from 2003 to 2007 during the difficult period of the war in Iraq.</span></p><span data-dcnode-id="3110" instrument_node="">
</span><p data-dcnode-id="3108"><span data-dcnode-id="3109" instrument_node="">From 2000 to 2002, he was the French Ambassador to the United Nations. In New York, Ambassador Levitte successfully handled several international negotiations, including resolution 1441 on Iraq.</span></p><span data-dcnode-id="3107" instrument_node="">
</span><p data-dcnode-id="3103"><span data-dcnode-id="3106" instrument_node="">Ambassador Levitte served as Senior Diplomatic Adviser and Sherpa of President Chirac from 1995 to 2000.</span><br data-dcnode-id="3105"><span data-dcnode-id="3104" instrument_node="">
From 1990, he held senior positions in the French Foreign Ministry, first as Assistant Secretary for Asia and then as Undersecretary for Cultural and Scientific Cooperation.</span></p><span data-dcnode-id="3102" instrument_node="">
</span><p data-dcnode-id="3100"><span data-dcnode-id="3101" instrument_node="">In 1988, he was designated to his first position as Ambassador and served as the French Ambassador to the United Nations Office in Geneva.</span></p><span data-dcnode-id="3099" instrument_node="">
</span><p data-dcnode-id="3097"><span data-dcnode-id="3098" instrument_node="">Before 1988 Mr. Levitte was assigned as Deputy Chief of Staff to the Foreign Minister ; Deputy Assistant Secretary in the African Bureau ; Second Counsellor at the Permanent Mission of France to the United Nations in New York.</span></p><span data-dcnode-id="3096" instrument_node="">
</span><p data-dcnode-id="3094"><span data-dcnode-id="3095" instrument_node="">Mr. Levitte joined the Foreign Service in 1970. He was first posted in Hong Kong and Beijing in the early 1970's. A few months after his election in 1974, President Valery Giscard d'Estaing asked him to work on his staff at the Elysee Palace, where he stayed from 1975 to 1981.</span></p><span data-dcnode-id="3093" instrument_node="">
</span><p data-dcnode-id="3091"><span data-dcnode-id="3092" instrument_node="">Born in 1946 in the south of France, Ambassador Levitte earned a law degree and is a graduate of Sciences-Po (the renowned Institute for Political Science in Paris) and of the National School of Oriental Languages, where he studied Chinese and Indonesian.</span></p><span data-dcnode-id="3090" instrument_node="">
</span><p data-dcnode-id="3088"><span data-dcnode-id="3089" instrument_node="">Ambassador Levitte is married to Marie-Cécile Jonas and has two daughters and three grandchildren.</span></p><span data-dcnode-id="3087" instrument_node="">

</span><p data-dcnode-id="2944"><span data-dcnode-id="2945" instrument_node="">Dr Siobhán Martin joined the GCSP in 2006, and her primary focus is on curriculum design, development and delivery, in addition to outreach and research activities. She is currently the Director of the 8-month Leadership in International Security Course (LISC) and Co-Director of the Master of Advanced Studies in International and European Security (MAS), jointly run by the GCSP and the Global Studies Institute of the University of Geneva. She is also responsible for the development of GCSP’s Advanced Course series including the LISC, the European Security Course (ESC) and the New Issues in Security Course (NISC). Siobhán has a PhD in International Relations/Political Science from the Graduate Institute of International and Development Studies, Geneva. Her research interests focus on strategic intelligence, international cooperation, ethics, leadership issues, and transnational threats. She also holds a Master's Degree in International Relations as well as a Joint Bachelor's Degree in English and History from the University College Cork (UCC), Ireland. Prior to joining the GCSP, she held a number of positions in the private sector. Her native language is English, and she also speaks French.</span></p><span data-dcnode-id="2943" instrument_node="">

</span><p data-dcnode-id="2924"><span data-dcnode-id="2935" instrument_node="">“Spying in a Transparent World”, reprinted as Chapter 20 in&nbsp;</span><a data-dcnode-id="2932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.globethics.net/documents/4289936/13403236/Ge_Global_17_web_isbn9782889312641.pdf/"><em data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">Cyber Ethics 4.0: Serving Humanity With Values</span></em></a><span data-dcnode-id="2931" instrument_node="">, edited by Christoph Stükelberger/Pavan Duggal,&nbsp;</span><em data-dcnode-id="2929"><span data-dcnode-id="2930" instrument_node="">Globethics.net</span></em><span data-dcnode-id="2928" instrument_node="">&nbsp;</span><em data-dcnode-id="2926"><span data-dcnode-id="2927" instrument_node="">Global Series No. 17</span></em><span data-dcnode-id="2925" instrument_node="">, 2018</span></p><span data-dcnode-id="2923" instrument_node="">

</span><p data-dcnode-id="2743"><span data-dcnode-id="2744" lang="EN-US"><span data-dcnode-id="2745" instrument_node="">Ms&nbsp;Matas is the Senior Advisor and the Deputy&nbsp;Head of the Diplomatic Dialogue at the Geneva Centre for Security Policy.&nbsp;</span></span></p><span data-dcnode-id="2742" instrument_node="">
</span><p data-dcnode-id="2739"><span data-dcnode-id="2740" lang="EN-US"><span data-dcnode-id="2741" instrument_node="">Aimed at promoting inclusive dialogue on current geopolitical issues, and as a support to peace processes, the activities of the Diplomatic Dialogue&nbsp;bring&nbsp;together non-like-minded participants for discussion by providing a safe platform for discussion.</span></span></p><span data-dcnode-id="2738" instrument_node="">
</span><p data-dcnode-id="2735"><span data-dcnode-id="2736" lang="EN-US"><span data-dcnode-id="2737" instrument_node="">Ms Matas&nbsp;designs and oversees&nbsp;a number of dialogue&nbsp;processes in Geneva and internationally focused on relations between Russia and the West, European Security, the OSCE conflict prevention mechanisms, post-war reconstruction in Syria, as well as others. She is also the representative for the GCSP at the OSCE Network of Think Tanks and Academic Institutions.&nbsp;</span></span></p><span data-dcnode-id="2734" instrument_node="">
</span><p data-dcnode-id="2731"><span data-dcnode-id="2732" lang="EN-US"><span data-dcnode-id="2733" instrument_node="">Her research interests include European Security,the OSCE,&nbsp;and the relationships between Russia and other post-Soviet states.&nbsp;Through her expertise she is a regular contributor to international&nbsp;conferences and workshops,&nbsp;while also teaching various modules at the GCSP in courses such as the&nbsp;European Security Course (ESC),&nbsp;the&nbsp;Leadership in International Security Course (LISC),&nbsp;the&nbsp;Swiss Military Professional Officers Training (SPOT), as well as others.</span></span></p><span data-dcnode-id="2730" instrument_node="">
</span><p data-dcnode-id="2717"><span data-dcnode-id="2728" lang="EN-US"><span data-dcnode-id="2729" instrument_node="">During her time as head of the&nbsp;</span></span><span data-dcnode-id="2724"><a data-dcnode-id="2725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gcsp.ch/Topics-Initiatives/Regional-Perspectives-Programme/Effective-Governance"><span data-dcnode-id="2726" lang="EN-US"><span data-dcnode-id="2727" instrument_node="">Effective Governance&nbsp;</span></span></a></span><span data-dcnode-id="2722" lang="EN-US"><span data-dcnode-id="2723" instrument_node="">&nbsp;cluster at the GCSP, Ms Matas directed </span></span><span data-dcnode-id="2718" lang="EN-US"><span data-dcnode-id="2721" instrument_node="">executive education</span><span data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node=""> programmes in both English and French for State officials from different countries including Myanmar, Tunisia, Iraq, Cameroon and others.</span></span></span></p><span data-dcnode-id="2716" instrument_node="">
</span><p data-dcnode-id="2713"><span data-dcnode-id="2714" lang="EN-US"><span data-dcnode-id="2715" instrument_node="">Ms Matas joined the GCSP in January 2011 and coordinated activities&nbsp;for&nbsp;the Programmes on Security and Law, and WMD &amp; Disarmament, respectively.</span></span></p><span data-dcnode-id="2712" instrument_node="">
</span><p data-dcnode-id="2709"><span data-dcnode-id="2710" lang="EN-US"><span data-dcnode-id="2711" instrument_node="">Prior to joining the GCSP,&nbsp;Ms Matas&nbsp;worked at the World Association of Investment Promotion Agencies (WAIPA)&nbsp;on Foreign Direct Investments promotion. She also has experience working in&nbsp;the&nbsp;private sector&nbsp;for Crédit Suisse in their Trade Finance&nbsp;department.</span></span></p><span data-dcnode-id="2708" instrument_node="">
</span><p data-dcnode-id="2703"><span data-dcnode-id="2706" lang="EN-US"><span data-dcnode-id="2707" instrument_node="">Ms Matas&nbsp;holds a&nbsp;Master in International&nbsp;Affairs from the Graduate Institute of International and Development Studies (IHEID), Geneva. She also holds a Public Relations degree from the Russian State University of Physical Education, Sports and Tourism. </span></span><span data-dcnode-id="2704"><span data-dcnode-id="2705" instrument_node="">She speaks Russian, English,&nbsp;French&nbsp;and intermediate&nbsp;German.&nbsp;</span></span></p><span data-dcnode-id="2702" instrument_node="">

</span><p data-dcnode-id="2590"><span data-dcnode-id="2591" lang="EN-GB"><span data-dcnode-id="2592" instrument_node="">Emily Munro heads the work on Strategic Anticipation and leads projects on dialogue on emerging security issues at the Geneva Centre for Security Policy (GCSP). In this role Emily leads projects and contributes to courses, in particular in the area of strategic foresight and international security and on initiatives seeking to foster dialogue on cyber security and arms proliferation. She is a term facilitator and module responsible in the eight-month Leadership in International Security Course (LISC) and she directs an annual short courses on strategic foresight. She was the Course Director of the two-month New Issues in Security Course from 2017 to 2019.</span></span></p><span data-dcnode-id="2589" instrument_node="">
</span><p data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">Emily has been with the GCSP since 2003, in functions related to partnership development and governance issues, training and academic affairs, and courses and projects on peacebuilding and new issues in security.</span></p><span data-dcnode-id="2586" instrument_node="">
</span><p data-dcnode-id="2584"><span data-dcnode-id="2585" instrument_node="">She has previous professional experience at the International Organization for Migration (Geneva), the Global Forum for Health Research (Geneva) and the Liu Institute for Global Issues at the University of British Columbia (Vancouver, BC, Canada).</span></p><span data-dcnode-id="2583" instrument_node="">
</span><p data-dcnode-id="2581"><span data-dcnode-id="2582" instrument_node="">Emily holds a Master’s Degree in international relations from the Graduate Institute in Geneva and a Bachelor’s Degree in international relations and political science from the University of British Columbia in Vancouver. Emily is a Canadian and Swiss citizen and she speaks English (native language) and French.</span></p><span data-dcnode-id="2580" instrument_node="">

</span><p data-dcnode-id="2395"><span data-dcnode-id="2396" instrument_node="">Christina Orisich is the Deputy Director of GCSP and Head of &nbsp;GCSP’s “Executive Education” activities, developing and expanding the organisation’s comprehensive portfolio internationally.</span></p><span data-dcnode-id="2394" instrument_node="">
</span><p data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">Ms Orisich brings an extensive international experience in executive education to GCSP, as well as expertise in consulting in organizational and leadership development, change management, strategy and leading a business. She has a very good understanding of challenges leaders face in this complex and ever-changing world both in the private and public sector.</span></p><span data-dcnode-id="2391" instrument_node="">
</span><p data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node="">Prior to joining the GCSP, she worked for 12 years for the Center for Creative Leadership (CCL) - Europe, where she was Head of the Coaching and Leadership Development Practice, responsible for Europe, Middle East and Africa (EMEA). Previously as EMEA Design Practice Leader, she led a cross-cultural team of experienced instructional design faculty who delivered highly customized leadership solutions in response to very specific client challenges. In her role as Regional Director, responsible for Austria, Germany, Switzerland, Spain and France at CCL she was responsible for all CCL activities in these countries (multi-million businesses). She built extensive experience in partnering strategically with international global corporations and institutions to support them with their organizational, talent and leadership development challenges. She was Senior Lead Faculty for several client engagements and worked with most of the large international corporations from the Pharma, Health Care, Chemical, Automotive and Financial Services industry. She is also a very experienced Executive coach, and regularly worked with senior leaders from big blue chip corporations as well as international organizations.</span></p><span data-dcnode-id="2388" instrument_node="">
</span><p data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">Before this, Christina worked for PricewaterhouseCoopers (PwC Consulting) in Brussels and London leading EU financed projects in Russia, Ukraine, Estonia, Romania in the public and private sector. Christina also worked at the European Commission in Brussels, Ericsson in Vienna and the Austrian Trade Commission in New York City.</span></p><span data-dcnode-id="2385" instrument_node="">
</span><p data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">Christina has a broad international background and has always worked in multi-cultural environments across a wide range of industries, leading and working with cross-cultural teams. She is Austrian and has lived and worked in 13 countries (Austria, The Netherlands, Belgium, Romania, Spain, Portugal, Italy, France, Ukraine, Estonia, Russia and Poland). She speaks 8 languages.</span></p><span data-dcnode-id="2382" instrument_node="">
</span><p data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">She holds a degree in International Business Administration from the University of Economics and Business Administration in Vienna, Austria. She earned her postgraduate degree in European political studies, from the College of Europe in Bruges, Belgium. She is a certified Leadership Embodiment Coach and is certified by the International Coaching Federation.&nbsp;</span></p><span data-dcnode-id="2379" instrument_node="">
