</span><p data-dcnode-id="2246"><span data-dcnode-id="2253" instrument_node="">Anne-Caroline is the Head of&nbsp;the </span><a data-dcnode-id="2251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//gcsp.ch/gfi"><span data-dcnode-id="2252" instrument_node="">GCSP’s Global Fellowship Initiative</span></a><span data-dcnode-id="2250" instrument_node="">&nbsp;and </span><a data-dcnode-id="2248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//gcsp.ch/gcsp-experience%23the-creative-spark"><span data-dcnode-id="2249" instrument_node="">Creative Spark</span></a><span data-dcnode-id="2247" instrument_node="">. Anne-Caroline joined the GCSP in September 2003 and has held different positions throughout this time. She spent a number of years working with the Director of Special Programmes on diplomatic activities and training courses abroad. She then worked with the External Relations Team and, as its Manager, was in charge of the Centre’s external communications - GCSP website, media relations and publications. She later joined the&nbsp;Emerging Security Challenges Programme&nbsp;as a Senior Programme Officer responsible for the Security and Law activities of the Centre. Since 2015, Anne-Caroline coordinates the GCSP Global Fellowship Initiative and currently also heads the development of the Creative Spark.</span></p><span data-dcnode-id="2245" instrument_node="">
</span><p data-dcnode-id="2243"><span data-dcnode-id="2244" instrument_node="">She holds a Master’s Degree (LL.M.) in International Humanitarian Law, jointly awarded by the Law Faculty of the University of Geneva and the Graduate Institute of International Studies (HEI). She studied Law at Pierre Mendes France, University of Grenoble (France), and after her Maîtrise with specialisation in European Law, she obtained a Diploma from their European Summer Academy on "Europe in Transition".</span></p><span data-dcnode-id="2242" instrument_node="">
</span><p data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">Prior to her employment at the GCSP, she worked for the United Nations High Commissioner for Refugees (UNHCR) in Athens (Greece), and the World Organisation Against Torture (OMCT) in Geneva.</span></p><span data-dcnode-id="2239" instrument_node="">
</span><p data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">Anne-Caroline speaks English, French, Greek, Spanish, Italian and German.</span></p><span data-dcnode-id="2236" instrument_node="">

</span><p data-dcnode-id="2044"><span data-dcnode-id="2067"><span data-dcnode-id="2068"><span data-dcnode-id="2069" lang="EN-GB"><span data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">Dr&nbsp;Jean-Marc Rickli&nbsp;is the Head of </span></span></span></span></span><span data-dcnode-id="2066" instrument_node="">Global and Emerging Risks&nbsp;</span><span data-dcnode-id="2045"><span data-dcnode-id="2046"><span data-dcnode-id="2063" lang="EN-GB"><span data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">at the Geneva Centre for Security Policy (GCSP) in Geneva, Switzerland. He is the co-chair of the NATO Partnership for Peace Consortium emerging security challenges working group and a senior advisor for the AI (Artificial Intelligence) Initiative at the Future Society. He is also a member&nbsp;of The IEEE Global Initiative&nbsp;on Ethics of&nbsp;Autonomous and Intelligent Systems&nbsp;and represents the GCSP in the United Nations in the framework of the Governmental Group of Experts on Lethal Autonomous Weapons Systems (LAWS). He is a member of the advisory board of Tech4Trust, the first Swiss startup acceleration program in the field of digital trust and cybersecurity. In 2020, he was nominated as </span></span></span><a data-dcnode-id="2058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letemps.ch/monde/jeanmarc-rickli-monde-une-jungle-implacable-menaces-partout"><span data-dcnode-id="2059" lang="EN-GB"><span data-dcnode-id="2062" instrument_node="">one of the 100 most influential French-speaking Swiss by the Swiss newspaper&nbsp;</span><em data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">Le Temps</span></em></span></a><em data-dcnode-id="2054"><span data-dcnode-id="2055" lang="EN-GB"><span data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">.</span></span></span></em><span data-dcnode-id="2049" lang="EN-GB"><span data-dcnode-id="2050"><span data-dcnode-id="2053" instrument_node="">&nbsp;Prior to these appointments, Dr&nbsp;Rickli was an assistant professor at the Department of Defence Studies of King’s College London. Dr&nbsp;Rickli received his PhD and MPhil in International Relations from Oxford University, UK, where he was also a Berrow scholar at Lincoln College. His latest book published by Georgetown University Press is entitled&nbsp;</span><em data-dcnode-id="2051"><span data-dcnode-id="2052" instrument_node="">Surrogate Warfare: The Transformation of War in the Twenty-first Century.&nbsp;</span></em></span></span><span data-dcnode-id="2047" lang="EN-GB"><span data-dcnode-id="2048" instrument_node="">He has lived and worked in Europe, USA, Middle East and China.</span></span></span></span></p><span data-dcnode-id="2043" instrument_node="">

</span><p data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">Jean-Paul Rouiller was born on April 8, 1967 in Saint Maurice, Switzerland. He worked for the Swiss Federal Office of Police (Fedpol) from December 2003 to January 2010, creating the first Counter-terrorism Unit within the Swiss Federal Criminal Police (SFCP). He then developed the structures and concepts of the first counter-terrorism analysis unit of the SFCP (in charge of intelligence collection and risk analysis in the field of counter-terrorism and terrorism).</span></p><span data-dcnode-id="1863" instrument_node="">
</span><p data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">In 1994, Mr Rouiller joined the Swiss Intelligence Service as a junior country analyst. By 1996, Rouiller had taken responsibility for all terrorism files; these encompassed, among others, Radical Islamic organizations, the ‘ethno-nationalists’ groups (eg. IRA, PKK, LTTE or ETA) and the remnants of the far-left (eg. 17N phantom group in Greece). On a more technical level, he worked on a project dedicated to the research and treatment methods of both open and classified information (including the technique of cascading), as specifically applied to the field of terrorism. He was also involved in creating the first comprehensive anti-terrorism database used by the Swiss Intelligence Service.</span></p><span data-dcnode-id="1860" instrument_node="">
</span><p data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">From January to March 2000, he joined the Combined Strategic Intelligence Training Program (CSITP), an intelligence course developed by the US Defense Intelligence Agency (DIA). In this three month course, within a class composed of students from different countries and services, he expanded his understanding U.S. intelligence machinery, methods and operations.</span></p><span data-dcnode-id="1857" instrument_node="">
</span><p data-dcnode-id="1852"><span data-dcnode-id="1856" instrument_node="">Mr Rouiller left the Swiss Intelligence Service in October 2000 in order to join the Office of the Coordinator of Intelligence Services of Ambassador Jacques Pitteloud, as Adviser on Homeland Security (in german,&nbsp;</span><em data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">Referent Innere Sicherheit</span></em><span data-dcnode-id="1853" instrument_node="">).</span></p><span data-dcnode-id="1851" instrument_node="">
</span><p data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">The events that lead him to join the Swiss Federal Criminal Police unfolded in late 2001, following the 9/11 attacks. From December 2003 to December 2010, Mr Rouiller created, developed and lead no less than four different counter-terrorism units within the Swiss Federal Criminal Police. In 2011, he created the Geneva Centre for Training and Analysis of Terrorism.</span></p><span data-dcnode-id="1848" instrument_node="">
</span><p data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">In 2017, Mr Rouiller created the&nbsp;Terrorism Joint Analysis Group&nbsp;at the GCSP,&nbsp;to deliver timely analysis to both the public and private sectors on the global manifestations of terror.</span></p><span data-dcnode-id="1845" instrument_node="">

</span><p data-dcnode-id="1745"><span data-dcnode-id="1746" lang="EN-GB"><span data-dcnode-id="1747" instrument_node="">Colonel (GS) Markus Schneider has been seconded to the GCSP from the German Armed Forces in June 2020. </span></span></p><span data-dcnode-id="1744" instrument_node="">
</span><p data-dcnode-id="1737"><span data-dcnode-id="1738" lang="EN-GB"><span data-dcnode-id="1743" instrument_node="">Prior to joining the GCSP, Col Schneider supervised the Logistics department (G4) of the Rapid Forces Division in Stadtallendorf, one of the three divisions of the army which is responsible for Special Forces, Airborne operations and Army helicopters. In the field of logistics, he was also company and battalion commander in the Army and in the Joint Support Service. </span><span data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></span><br data-dcnode-id="1740"><span data-dcnode-id="1739" instrument_node="">
Col Schneider held an instructor and lecturer position for logistics at the Joint Operations department of the German Armed Forces Command and Staff College in Hamburg and was department head for logistics at battalion and brigade levels.</span></span></p><span data-dcnode-id="1736" instrument_node="">
</span><p data-dcnode-id="1725"><span data-dcnode-id="1726" lang="EN-GB"><span data-dcnode-id="1735" instrument_node="">Col Schneider spent three years at the Ministry of Defence in Berlin and worked in the department for arms control, disarmament and non-proliferation issues, most importantly in relation with the CFE Treaty, SALW and Iranian nuclear policy. He was later appointed Assistant Section Chief to the Permanent Representation of the German Armed Forces to NATO and the EU Military Committee in Brussels, dealing with EU Plans &amp; Policy and EU Operations. </span><span data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></span><br data-dcnode-id="1732"><span data-dcnode-id="1731" instrument_node="">
From 2016 to 2017 he took part in the 44th course of the Israeli National Defence College in Tel Aviv.</span><span data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></span><br data-dcnode-id="1728"><span data-dcnode-id="1727" instrument_node="">
In addition, he served twice in military operations, 2008 KFOR as battalion commander and 2018/19 as Head of the German Armed Forces in Iraq (OIR, CBI).</span></span></p><span data-dcnode-id="1724" instrument_node="">
</span><p data-dcnode-id="1717"><span data-dcnode-id="1718" lang="EN-GB"><span data-dcnode-id="1723" instrument_node="">Col Schneider started his career in the supply and transport units of the Army and studied Economics and Organisational Sciences at the Bundeswehr University in Munich (Dipl.-Kfm., WOW). He successfully graduated from the German Armed Forces Command and Staff College in Hamburg (Army's 43rd General Staff Course) and earned a M.A. in Political Science from the University of Haifa. </span><span data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></span><br data-dcnode-id="1720"><span data-dcnode-id="1719" instrument_node="">
He received the Bronze and Silver Cross of Honour of the Bundeswehr and was decorated with the Non-Article 5 NATO Medal – KFOR and the German Bronze Medal for Foreign Duty for his services with KFOR and Operation Inherent Resolve -Capacity Building Iraq.</span></span></p><span data-dcnode-id="1716" instrument_node="">
</span><p data-dcnode-id="1713"><span data-dcnode-id="1714" lang="EN-GB"><span data-dcnode-id="1715" instrument_node="">He speaks fluent German and English and has basic knowledge in French and Spanish.</span></span></p><span data-dcnode-id="1712" instrument_node="">

</span><p data-dcnode-id="1606"><span data-dcnode-id="1610" instrument_node="">Dr. Christina Schori Liang is Head of Terrorism and Preventing Violent Extremism at the Geneva Centre for Security Policy in Geneva, Switzerland. At the GCSP, she designs and directs courses on </span><a data-dcnode-id="1608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gcsp.ch/courses/building-national-strategy-preventing-violent-extremism-pve-virtual-learning-journey-2022"><span data-dcnode-id="1609" instrument_node="">Preventing Violent Extremism</span></a><span data-dcnode-id="1607" instrument_node=""> and on Transnational Organised Crime and Security, and she contributes to dialogue events and offers policy guidance for global security actors.</span></p><span data-dcnode-id="1605" instrument_node="">
</span><p data-dcnode-id="1593"><br data-dcnode-id="1604"><span data-dcnode-id="1603" instrument_node="">
She is the editor of </span><em data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">Europe for the Europeans: The Foreign and Security Policy of the Populist Radical Right</span></em><span data-dcnode-id="1600" instrument_node=""> and has contributed to the 2015, 2016, 2017, 2019 and 2022 </span><em data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">Global Terrorism Index</span></em><span data-dcnode-id="1597" instrument_node="">. She has recently co-edited a </span><em data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">Handbook on Security Science</span></em><span data-dcnode-id="1594" instrument_node=""> that will be published in July 2022 by Springer Verlag.</span></p><span data-dcnode-id="1592" instrument_node="">
</span><p data-dcnode-id="1589"><br data-dcnode-id="1591"><span data-dcnode-id="1590" instrument_node="">
Dr. Liang has testified for the US National Intelligence Council, the US State Department, the European Commission, and the European Forum for Urban Security and has given multiple presentations for the Munich Security Conference, the NATO Defense College in Rome and the OSCE Secretariat in Vienna.</span></p><span data-dcnode-id="1588" instrument_node="">
</span><p data-dcnode-id="1572"><br data-dcnode-id="1587"><span data-dcnode-id="1586" instrument_node="">
She is on the advisory board of the </span><a data-dcnode-id="1584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.resolvenet.org/network/research-advisory-council"><span data-dcnode-id="1585" instrument_node="">RESOLVE Network Research Advisory Council</span></a><span data-dcnode-id="1583" instrument_node=""> of the US Institute for Peace, an expert for the </span><a data-dcnode-id="1581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//globalinitiative.net/profile/christina-schori-liang/"><span data-dcnode-id="1582" instrument_node="">Global Initiative Against Transnational Organized Crime</span></a><span data-dcnode-id="1580" instrument_node="">, and she serves on the editorial team of </span><a data-dcnode-id="1577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cvir.st-andrews.ac.uk/about/editorialteam/"><em data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">Contemporary Voices</span></em></a><span data-dcnode-id="1576" instrument_node="">, the St. Andrews University Journal of International Relations, and the advisory board of </span><a data-dcnode-id="1574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cyberwatchfinland.fi/advisory-board/"><span data-dcnode-id="1575" instrument_node="">Cyberwatch Finland</span></a><span data-dcnode-id="1573" instrument_node="">.</span></p><span data-dcnode-id="1571" instrument_node="">
</span><p data-dcnode-id="1568"><br data-dcnode-id="1570"><span data-dcnode-id="1569" instrument_node="">
Dr. Liang was an Adjunct Faculty member for Boston University from 2008-2013 and is currently a Visiting Professor at the Paris School of International Affairs, Sciences Po, Paris.</span></p><span data-dcnode-id="1567" instrument_node="">
</span><p data-dcnode-id="1564"><br data-dcnode-id="1566"><span data-dcnode-id="1565" instrument_node="">
She holds a doctorate in International Relations and an MA in History and International Politics from the Graduate Institute of International and Development Studies, Geneva, Switzerland.</span></p><span data-dcnode-id="1563" instrument_node="">

</span><p data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Alexandra Thiry is GCSP’s Learning Innovation and Impact Lead. She manages projects that aim at enhancing the learning experience of participants to GCSP’s executive education activities. Specifically, she is responsible for streamlining GCSP’s approach to blended learning and building capacity to design and deliver extended learning journeys for impact.&nbsp;</span></p><span data-dcnode-id="1310" instrument_node="">
</span><p data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">Alexandra is a Certified Learning Professional from the “Swiss Competence Centre for Innovations in Learning” at the Institute of Business Education and Educational Management, University of St. Gallen. She possesses a passionate curiosity for learning and a strong commitment to advancing continuous learning and professional development at the international level. Alexandra is particularly interested in formats and methods that help learners apply new knowledge, skills and behaviours to their workplaces, as well as in opportunities arising from digitalisation and the possibilities of social learning.</span></p><span data-dcnode-id="1307" instrument_node="">
</span><p data-dcnode-id="1303"><span data-dcnode-id="1306" instrument_node="">Alexandra holds a Master’s Degree in “Peace and Conflict Studies and International Relations” from the University of Tuebingen (Germany) and a Bachelor’s Degree in “European Studies”. She has completed project management certificates, including in results based management. A German citizen Alexandra speaks English and French in addition to her native German. She is married and the proud mom of two sons.</span><br data-dcnode-id="1305"><span data-dcnode-id="1304" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="1302" instrument_node="">

</span><p data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Tobias&nbsp;Vestner leads GCSP’s Research and Policy Advice Department as well as the Security and Law Programme. He oversees and manages GCSP’s analysis and advice activities as well as researches and teaches on the intersection between security policy and international law. Tobias Vestner regularly advises governments, international organizations, and private firms on global security and legal issues. He has published several books and papers (see below) and provided insights to various media outlets, including the U.S. National Public Radio, NBC News, Neue Zürcher Zeitung, and RTS Geopolitis.</span></p><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1127"><br data-dcnode-id="1129"><span data-dcnode-id="1128" instrument_node="">
Tobias Vestner has many years of experience in international law, international relations, and policymaking. He is an Honorary Senior Research Fellow at Exeter University, a Fellow at Supreme Headquarters Allied Powers Europe (NATO), and a Non-Resident Fellow at the United Nations Institute for Disarmament Research (UNIDIR). A former reserve member of the Swiss Special Forces Command, he serves as reserve Legal Advisor at the Swiss Armed Forces Staff. He is member of the Board of Directors of the International Society for Military Law and the Law of War (ISMLLW) and member of the International Institute of Humanitarian Law (IIHL).</span></p><span data-dcnode-id="1126" instrument_node="">
</span><p data-dcnode-id="1123"><br data-dcnode-id="1125"><span data-dcnode-id="1124" instrument_node="">
Before joining the GCSP, Tobias Vestner was Research Affiliate and Global Futures Fellow at Georgetown University. Prior to that, he was Policy Advisor at the Swiss State Secretariat for Economic Affairs, where he managed political processes with regard to the export of conventional weapons, and participated in the UN negotiations of the Arms Trade Treaty. Previously, while at the Law of Armed Conflict Section at the Swiss Federal Department of Defence, Civil Protection and Sports, he contributed to bilateral negotiations on military cooperation, and trained military officers in international humanitarian law.</span></p><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1119"><br data-dcnode-id="1121"><span data-dcnode-id="1120" instrument_node="">
Tobias Vestner holds a Master of Science in Foreign Service from Georgetown University, a Master of Laws in International and European Law from the University of Geneva, and a Bachelor degree in Swiss law from the University of Lausanne. Tobias Vestner has Swiss and German nationality, and is fluent in English, French, and German.&nbsp;</span></p><span data-dcnode-id="1118" instrument_node="">
</span><p data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1115" instrument_node="">
