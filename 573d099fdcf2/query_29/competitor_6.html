</span><div class="mvp-post-soc-in" data-dcnode-id="1684"><span data-dcnode-id="2217" instrument_node="">
</span><div class="left relative" data-dcnode-id="1687" id="mvp-content-body"><span data-dcnode-id="2216" instrument_node="">
</span><div class="left relative" data-dcnode-id="1931" id="mvp-content-body-top"><span data-dcnode-id="2215" instrument_node="">
</span><div class="left relative" data-dcnode-id="2075" id="mvp-content-main"><span data-dcnode-id="2214" instrument_node="">
</span><div class="mailmunch-forms-before-post" data-dcnode-id="2213" style="display: none !important;"></div><span data-dcnode-id="2212" instrument_node="">
</span><p data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">A shift is taking place in global military thinking. NATO, arguably the most successful military alliance in history, is slowly but steadily edging toward casting China as an outright military competitor. Previously, the collective West avoided involving NATO in the context of the rising China.</span></p><span data-dcnode-id="2209" instrument_node="">
</span><p data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">Much changed with the advent of Donald Trump. NATO has been undergoing a profound evolution in which it is recalibrating its priorities. We are gradually moving toward a more global NATO with interests that spread beyond its classical zone—Europe—and into the Indo-Pacific region.</span></p><span data-dcnode-id="2206" instrument_node="">
</span><p data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">Many would argue that the foundation for a global NATO was established long ago. Indeed, for more than a decade, the alliance has been operating in Afghanistan, where it led the International Security Assistance Force (ISAF). NATO naval forces were among the first to fight off pirates via the OCEAN SHIELD operation along the east African coast in 2008.</span></p><span data-dcnode-id="2203" instrument_node="">
</span><p data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">Military training missions have been a common element of NATO involvement in the Middle East. The alliance also responds to terrorism, cyber-threats, and disinformation. Moreover, it enjoys special partnerships (consultative in nature) with Australia, New Zealand, South Korea, Japan, and Mongolia.</span></p><span data-dcnode-id="2200" instrument_node="">
</span><p data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">However, China’s military and economic rise, ambitious Belt and Road Initiative (BRI), and growing appetite in the Indian and Pacific Oceans in the last decade have brought it into sharp opposition with the US. The latter now sees NATO playing a bigger role in Eurasian affairs, which means taking a tougher stance toward Beijing through the development of a new vision for its outdated Euro-Atlantic-centric model.</span></p><span data-dcnode-id="2197" instrument_node="">
</span><p data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">This evolution in thinking is reflected in statements by NATO officials. Last December, at the NATO summit, China was declared a concern in a document that said: “[W]e [NATO] recognize that China’s growing influence and international policies present both opportunities and challenges that we need to address together as an Alliance.”</span></p><span data-dcnode-id="2194" instrument_node="">
</span><p data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">The reasons for this shift are fundamental in nature. It has been argued that China’s official $260 billion defense budget could mask far greater purchasing power, potentially reaching up to 70% of the US defense budget. China’s military cooperation with Russia continues to grow and now covers Central Asia, the Mediterranean, the Persian Gulf, and even the Baltic Sea. Moreover, Beijing’s expanding supply of nuclear weapons can now reach Europe, which, in NATO’s thinking, requires a rethinking of its approach to the Asian giant.</span></p><span data-dcnode-id="2191" instrument_node="">
</span><p data-dcnode-id="2186"><span data-dcnode-id="2190" instrument_node="">More painful for the alliance is the realization that China has made significant inroads into the European defense market. Recently, Serbian President Aleksandar Vucic announced his country’s purchase of six Chinese-built CH-92A combat drones (UCAVs). This will make the Serbian army the first European military to use Chinese combat drones. Economically, too, China’s rise in Europe is visible in its </span><a data-dcnode-id="2188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//besacenter.org/perspectives-papers/china-belt-road-italy/"><span data-dcnode-id="2189" instrument_node="">BRI-related cooperation with Italy</span></a><span data-dcnode-id="2187" instrument_node="">, purchase of ports in Greece, extensive relations with Turkey, and establishment of the 17+1 mechanism, which involves Central and Eastern European states.</span></p><span data-dcnode-id="2185" instrument_node="">
</span><p data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">It can be argued that it is China that came to NATO and not the other way around. China could, indeed, serve as a driver for cohesion within the alliance, which over the past few years has seen internal strife among its member states. NATO was created to counter the Soviet Union on the European mainland, but it must now rise to the new “China reality.” It will have to change its geographical scope and methods of activities.</span></p><div class="mailmunch-forms-in-post-middle" data-dcnode-id="2182" style="display: none !important;"></div><span data-dcnode-id="2181" instrument_node="">
</span><p data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">Though that shift in thinking is taking place within NATO, the alliance remains attached to its vision and wishes to avoid casting China as an outright military enemy. It leaves open the possibility for cooperation, as statements by NATO General Secretary Jens Stoltenberg attest. In recent interviews, Stoltenberg said, “[NATO] does not see China as the new enemy,” “This is not about moving NATO into the South China Sea,” and “It’s about taking into account that China is coming closer to us—in the Arctic, in Africa, investing heavily in our infrastructure in Europe, in cyberspace.”</span></p><span data-dcnode-id="2178" instrument_node="">
</span><p data-dcnode-id="2173"><span data-dcnode-id="2177" instrument_node="">China does not pose a direct military threat right now, and that is unlikely to change any time soon. But there is an inescapable geopolitical dimension in which China becomes more active in the Arctic, the African continent, and the </span><a data-dcnode-id="2175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//besacenter.org/perspectives-papers/indo-pacific/"><span data-dcnode-id="2176" instrument_node="">Indo-Pacific region</span></a><span data-dcnode-id="2174" instrument_node="">. In addition, Beijing is negotiating a mammoth trade and economic cooperation treaty with Tehran that will give China the ability to position itself in the Persian Gulf and the Arabian Sea—a major artery for its oil supplies. All of this will require greater coordination and cohesion within NATO.</span></p><span data-dcnode-id="2172" instrument_node="">
</span><p data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">Critical changes to elements of NATO’s vision could be forthcoming. As China’s power grows, there will be a greater need for the establishment of a NATO-China Council, similar to what the alliance has had with Russia since 1997.</span></p><span data-dcnode-id="2169" instrument_node="">
</span><p data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">Perhaps deeper engagement with its Pacific partners—Australia, New Zealand, the Republic of Korea, Japan, and Mongolia—will become a necessity. Even a permanent military presence could be negotiated.</span></p><span data-dcnode-id="2166" instrument_node="">
</span><p data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">Some elements of this future strategy are already here. Stoltenberg raised the need for the alliance to take on a greater political role in world affairs and even to help nations of the Indo-Pacific compete with China’s rise. “As we look to 2030, we need to work even more closely with like-minded countries like Australia, Japan, New Zealand, and [South] Korea to defend the global rules and institutions that have kept us safe for decades, to set norms and standards in space and cyberspace, on new technologies and global arms control,” Stoltenberg said.</span></p><span data-dcnode-id="2163" instrument_node="">
</span><p data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">We are witnessing a trend toward a more global NATO in which the alliance’s security agenda is no longer Europe- and North America-centric. This will take at least a decade. A shift in NATO’s vision will also mean that Moscow and its activities in Eurasia will be deemed to be at a lower level of threat.</span></p><span data-dcnode-id="2160" instrument_node="">
</span><p data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">NATO will have to move eastward. This does not necessarily mean stationing permanent military installations or personnel across Asia, but the alliance will have to pay more attention to Chinese activities. Doing so will draw it closer to Asia and the Indo-Pacific in particular.</span></p><span data-dcnode-id="2157" instrument_node="">
</span><p data-dcnode-id="2153"><span data-dcnode-id="2156" instrument_node="">Author’s note: first published at </span><a data-dcnode-id="2154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//besacenter.org/perspectives-papers/china-nato-pacific/"><span data-dcnode-id="2155" instrument_node="">BESA Center</span></a></p><span data-dcnode-id="2152" instrument_node="">

</span><img alt="" class="attachment- size- wp-post-image" data-dcnode-id="1617" height="534" loading="lazy" sizes="(max-width: 820px) 100vw, 820px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//moderndiplomacy.eu/wp-content/uploads/2019/06/BrahMos-missile.jpg&amp;raw" srcset="https://moderndiplomacy.eu/wp-content/uploads/2019/06/BrahMos-missile.jpg 820w, https://moderndiplomacy.eu/wp-content/uploads/2019/06/BrahMos-missile-600x391.jpg 600w, https://moderndiplomacy.eu/wp-content/uploads/2019/06/BrahMos-missile-300x195.jpg 300w, https://moderndiplomacy.eu/wp-content/uploads/2019/06/BrahMos-missile-768x500.jpg 768w" width="820"><span data-dcnode-id="1616" instrument_node=""> </span></div><span data-dcnode-id="1613" instrument_node="">
</span><div class="mvp-post-add-cont left relative" data-dcnode-id="1491"><span data-dcnode-id="1612" instrument_node="">
</span><div class="mvp-post-add-main right relative" data-dcnode-id="1502"><span data-dcnode-id="1611" instrument_node="">
</span><div class="mailmunch-forms-before-post" data-dcnode-id="1610" style="display: none !important;"></div><span data-dcnode-id="1609" instrument_node="">
</span><p data-dcnode-id="1604"><span data-dcnode-id="1608" instrument_node="">Irrespective of the real causes behind the Indian BrahMos </span><a data-dcnode-id="1606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D10lj66eRujA"><span data-dcnode-id="1607" instrument_node="">intruding</span></a><span data-dcnode-id="1605" instrument_node=""> 124 kilometers deep into the Pakistani airspace, the incident is being viewed with profound skepticism in Pakistan. Reasons: the decades-old hostility and prevalent distrust between the two countries; India’s long history of increasingly belligerent verbalized and force-development posturing vis-à-vis Pakistan; India’s abstruse attitude aimed at mystification instead of coming out transparent as to why the missile was launched.</span></p><span data-dcnode-id="1603" instrument_node="">
</span><p data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">At this moment in time, there are two widely prevalent discourses in Pakistan regarding the Indian BrahMos crashing into Pakistan:</span></p><span data-dcnode-id="1600" instrument_node="">
</span><p data-dcnode-id="1589"><span data-dcnode-id="1599" instrument_node="">The first discourse posits the launch of BrahMos as a deliberate act meant to check Pakistan’s response and that it features in the larger Indian stratagem of climbing one rung up the escalation ladder in each new crisis. The ultimate aim of the step-by-step strategy is to render Pakistan militarily acquiescent whilst dawdling below the war threshold. India’s much-publicized but categorically denied by Pakistan “surgical strikes” of 2016 were the first rung on the escalation ladder. In 2019, India stepped one more rung up the escalation ladder and used </span><a data-dcnode-id="1597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//moderndiplomacy.eu/2020/03/02/almost-to-the-brink-india-and-pakistan-during-the-pulwama-crisis/"><span data-dcnode-id="1598" instrument_node="">airpower</span></a><span data-dcnode-id="1596" instrument_node=""> to deliver ammunition inside mainland Pakistan. Then there are </span><a data-dcnode-id="1594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aljazeera.com/news/2021/10/19/pakistan-army-claims-detected-blocked-india-submarine-incursion"><span data-dcnode-id="1595" instrument_node="">recurrent</span></a><span data-dcnode-id="1593" instrument_node=""> attempts by the Indian Navy’s </span><a data-dcnode-id="1591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dawn.com/news/1678075"><span data-dcnode-id="1592" instrument_node="">submarines</span></a><span data-dcnode-id="1590" instrument_node=""> to intrude in Pakistan’s territorial waters only to be detected by Pakistan Navy.</span></p><span data-dcnode-id="1588" instrument_node="">
</span><p data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">Given the step-by-step escalatory context, an Indian BrahMos intruding deep into Pakistan and India subsequently acting with utmost flippancy, could not be anything except a deliberate Indian ploy to assess Pakistan’s potential response if India climbs one more rung up the escalation ladder and uses BrahMos or any other missile to hit some illusionary target in Pakistan – most likely for domestic political gains as previously has been the case.</span></p><span data-dcnode-id="1585" instrument_node="">
</span><p data-dcnode-id="1574"><span data-dcnode-id="1584" instrument_node="">The second </span><a data-dcnode-id="1582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strafasia.com/indias-missile-misadventure-accidental-or-intentional/"><span data-dcnode-id="1583" instrument_node="">discourse</span></a><span data-dcnode-id="1581" instrument_node=""> likewise argues that it was an advertent launch but the underlying cause being offered relates to India’s ”</span><a data-dcnode-id="1579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//watermark.silverchair.com/isec_a_00340.pdf%3Ftoken%3DAQECAHi208BE49Ooan9kkhW_Ercy7Dm3ZL_9Cf3qfKAc485ysgAAAr0wggK5BgkqhkiG9w0BBwagggKqMIICpgIBADCCAp8GCSqGSIb3DQEHATAeBglghkgBZQMEAS4wEQQMg11-VMP0xRX0ZYv_AgEQgIICcNWqqtcVWt1Lltm9egQ2ktGpSPImEJm2LtszqAkmetialsGy7DgfCq8t8liwpXFmg7DVnbmQnMn7rROeAWfw3fEuK9-jplsWzJefR1LzBUUjufwRPy0WPc0cSxBuz_j7vzIGaYotwM1oHcV8uvms0XV5nsxWyEMfTbXR69h5dOrVwr5wwK3P0jlCttwciwkij1Tt_p6-2ren39l6Yjr-deGMHQA4_u8mZIsQtq_0b3s824tkybG4FlaZX4tG3EyBOIqHDo-COW3JrIhhOVolFEVRbmhfYxLLmWmtIIHUBU8EuI2I_X8wxDZ1-Oto2fYNkJlLs0pE2GF2RwHRYx8HsfdgcIU7Oi4mS2qy5QGg_bHmXi0WV9wrei0oNh8sArRXAzDXEWqaL1Gd1hPfJaYQ8IKm25J5sSXJ36cMryBLTaMBHHkFWNaLmky52PIUgq5SXPjxlOYP4mXRtE7O-F_g5hBd7pq4xiTADIrSXJaAkaZHtufR-XoIHFMfW6z10yKach7X_Vs3smpY4eujjkX0DLqq_CmR1-BsBV4nTmne8vp2OkAd2WKLKtnYxsfpdm8ruyN8qM6RB3LYfn5p8NJRB80HeB1rsj86h0HpaHkf90yh7uSteWRidcYxN2LiZ6U-s6IfM25rRkOuzumgi7HrkkyJIzSjERqmAK5o0pas0HiIB_0EnKBL5fvE6A7cicnNNcBe5RQ5Y-HhQYYgHCSLASFUISPK0LYjrLK9lHhohIKPuShPlhDRn4cMWv9dbS71PBMV98eWeQztrWpmgoob_0u_pQWESPCHN6AWLjkKf2e9OsRPtlrwlevVlSAepoUV0A"><span data-dcnode-id="1580" instrument_node="">counterforce temptations</span></a><span data-dcnode-id="1578" instrument_node="">” and resulting force posture development. That India is quickly advancing to mature a dependable counterforce posture and provided BrahMos is dual-capable and claimed to be one of the most accurate weapons in India’s inventory, it suits aptly into the counterforce weapons category, especially to be used against Pakistan’s </span><a data-dcnode-id="1576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//direct.mit.edu/isec/article-abstract/39/3/118/30309/Pakistan-s-Battlefield-Nuclear-Policy-A-Risky%3FredirectedFrom%3Dfulltext%23.WLid5lXyuUk"><span data-dcnode-id="1577" instrument_node="">battlefield</span></a><span data-dcnode-id="1575" instrument_node=""> nuclear-capable weapons systems. Hence, the argument that the deliberate launch of an unarmed BrahMos was primarily aimed at assessing Pakistan’s military response to India’s potential counterforce adventures.</span></p><div class="mailmunch-forms-in-post-middle" data-dcnode-id="1573" style="display: none !important;"></div><span data-dcnode-id="1572" instrument_node="">
</span><p data-dcnode-id="1567"><span data-dcnode-id="1571" instrument_node="">As for the potential ramifications of the convictions and discourses (supra), there is widespread consensus among Pakistan’s strategic circles that had it not been an unarmed missile or had it hit some potential civilian or military target leading to casualties, Pakistan’s response would have been exactly in line with its declaratory policy of “Quid pro-Quo Plus”. In fact, as per some media reports, Pakistan did contemplate a </span><a data-dcnode-id="1569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bloomberg.com/news/articles/2022-03-15/errant-indian-missile-nearly-led-to-pakistan-retaliatory-strike"><span data-dcnode-id="1570" instrument_node="">retaliatory response</span></a><span data-dcnode-id="1568" instrument_node=""> to the intruding missile but only after inferring that it was an unarmed missile and that ultimately it did not cause any significant damage, did the authorities in Pakistan hold back.</span></p><span data-dcnode-id="1566" instrument_node="">
</span><p data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">However, the recent display of maturity and restraint is unlikely to become a customary Pakistani response to each Indian adventure or misadventure in the future. Provided Pakistan faces a militarily superior and bent on hegemonizing its neighbors’ adversary in India – which is always predisposed to draw erroneous conclusions about Pakistan’s resolve and capabilities – the “Quid pro-Quo Plus” is likely to come into play and unquestionably would have unsavory consequences for planners in New Delhi as was displayed in 2019.</span></p><span data-dcnode-id="1563" instrument_node="">
</span><p data-dcnode-id="1555"><span data-dcnode-id="1562" instrument_node="">Provided no missile defense system can </span><a data-dcnode-id="1560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/CISS_Islamabad/status/1517051481974841344%3Fref_src%3Dtwsrc%255Egoogle%257Ctwcamp%255Eserp%257Ctwgr%255Etweet"><span data-dcnode-id="1561" instrument_node="">intercept</span></a><span data-dcnode-id="1559" instrument_node=""> a supersonic cruise missile, the only way to dissuade India from embarking on a future BrahMos misadventure is “</span><a data-dcnode-id="1557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wiley.com/en-us/Deterrence-p-9780745631134"><span data-dcnode-id="1558" instrument_node="">deterrence through punishment</span></a><span data-dcnode-id="1556" instrument_node="">”, which entails that Pakistan should demonstrate ample capability and resolve to respond to any of India’s future shenanigans with double the ferocity so as not to allow the relevant circles in New Delhi to draw erroneous and misplaced inferences.</span></p><span data-dcnode-id="1554" instrument_node="">
</span><div class="mailmunch-forms-after-post" data-dcnode-id="1553" style="display: none !important;"></div><div class="sharedaddy sd-sharing-enabled" data-dcnode-id="1511"><div class="robots-nocontent sd-block sd-social sd-social-icon sd-sharing" data-dcnode-id="1512"><h3 class="sd-title" data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">Share this:</span></h3><div class="sd-content" data-dcnode-id="1513"><ul data-dcnode-id="1514" data-sharing-events-added="true"><li class="share-twitter" data-dcnode-id="1546"><a class="share-twitter sd-button share-icon no-text" data-dcnode-id="1547" data-shared="sharing-twitter-51380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//moderndiplomacy.eu/2022/04/25/indias-errant-brahmos-launch-and-potential-ramifications/%3Fshare%3Dtwitter%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Twitter"><span data-dcnode-id="1550"></span><span class="sharing-screen-reader-text" data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">Click to share on Twitter (Opens in new window)</span></span></a></li><li class="share-facebook" data-dcnode-id="1541"><a class="share-facebook sd-button share-icon no-text" data-dcnode-id="1542" data-shared="sharing-facebook-51380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//moderndiplomacy.eu/2022/04/25/indias-errant-brahmos-launch-and-potential-ramifications/%3Fshare%3Dfacebook%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Facebook"><span data-dcnode-id="1545"></span><span class="sharing-screen-reader-text" data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">Click to share on Facebook (Opens in new window)</span></span></a></li><li class="share-linkedin" data-dcnode-id="1536"><a class="share-linkedin sd-button share-icon no-text" data-dcnode-id="1537" data-shared="sharing-linkedin-51380" href="https://chatnoir-webcontent.chat </span><h1 class="mvp-post-title left" data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">Direct Energy Weapons and Hyper-Sonic Armaments: The Future of Warfare in the Indian Context</span></h1><span data-dcnode-id="1473" instrument_node="">

</span><img alt="" class="attachment- size- wp-post-image" data-dcnode-id="1426" height="523" loading="lazy" sizes="(max-width: 820px) 100vw, 820px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//moderndiplomacy.eu/wp-content/uploads/2019/07/hypersonic-weapons.jpg&amp;raw" srcset="https://moderndiplomacy.eu/wp-content/uploads/2019/07/hypersonic-weapons.jpg 820w, https://moderndiplomacy.eu/wp-content/uploads/2019/07/hypersonic-weapons-600x383.jpg 600w, https://moderndiplomacy.eu/wp-content/uploads/2019/07/hypersonic-weapons-300x191.jpg 300w, https://moderndiplomacy.eu/wp-content/uploads/2019/07/hypersonic-weapons-768x490.jpg 768w" width="820"><span data-dcnode-id="1425" instrument_node=""> </span></div><span data-dcnode-id="1422" instrument_node="">

</span><p data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">A Direct Energy Weapon or DEW is weaponry that uses highly focused energy, such as lasers, microwaves, or particle beams, to demolish, harm, impede or decapitate its target. DEW is a long-ranged weapon that damages its targets with highly focused energy. Lasers, microwaves, particle beams, and other similar weapons are a few contemporary examples of the same.</span></p><span data-dcnode-id="1415" instrument_node="">
</span><p data-dcnode-id="1411"><a data-dcnode-id="1413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aviationweek.com/defense-space/directed-energy-weapons-no-longer-science-fiction"><span data-dcnode-id="1414" instrument_node="">Historically speaking</span></a><span data-dcnode-id="1412" instrument_node="">, Archimedes is said to have used mirrors to direct sunlight to destroy warships during the Roman Empire’s campaign against his hometown of Syracuse, according to tradition. Since then, many historians have questioned the reality of such a claim.</span></p><span data-dcnode-id="1410" instrument_node="">
</span><p data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">In World War II, the German Army created weapons such as the sonic cannon, which caused lethal vibrations in the human body, causing nausea, vertigo, and other symptoms. Experiments employing X-rays as a base were also carried out to pre-ionize ignition in aircraft engines and, therefore, serve as anti-aircraft weapons. The CIA alleged that the Soviet Army employed laser-based weaponry against the Chinese during numerous Sino-Soviet conflicts throughout the Cold War.</span></p><span data-dcnode-id="1407" instrument_node="">
</span><p data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">Several governments in the Asia-Pacific area are caught up in the worldwide race to build hypersonic and directed-energy weapons, with several big powers developing or publicly announcing their ambitions. DEWs are new cutting-edge military technologies that have yet to be officially deployed by any military power but are expected to be important in future combat.</span></p><span data-dcnode-id="1404" instrument_node="">
</span><p data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">China and Russia have created unparalleled arsenals of precision-guided missiles and unmanned aerial vehicles (UAVs) to overwhelm India’s military defences, much like Russia is doing in Ukraine right now. Because of the magnitude of these threats, conventional kinetic systems such as Patriot missile batteries will be unable to protect US personnel in harm’s way. With the intent to defeat these threats, it will be necessary to combine non-kinetic, directed-energy devices such as high-energy lasers with kinetic defences.</span></p><span data-dcnode-id="1401" instrument_node="">
</span><p data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">China, predictably, is one of the countries concentrating its efforts in both areas. It is primarily regarded as the market leader in hypersonic weaponry, having previously deployed hypersonic armaments in the shape of the DF-17 hypersonic glide vehicle (HGV).</span></p><span data-dcnode-id="1398" instrument_node="">
</span><p data-dcnode-id="1393"><span data-dcnode-id="1397" instrument_node="">In late 2019, the DF-17 HGV made its first </span><a data-dcnode-id="1395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbsnews.com/news/china-parade-70th-anniversary-communist-party-new-high-tech-missiles-hypersonic-df-17-today-2019-10-01/"><span data-dcnode-id="1396" instrument_node="">public appearance</span></a><span data-dcnode-id="1394" instrument_node=""> at a military parade in Beijing, China’s capital. In its first stage, the weapon appears to use a typical ballistic missile booster to accelerate a glide craft, which is then used to strike an objective after re-entry. At a parade, the DF-17s were installed on a five-axle motorized transporter-erector-launcher. As a result, the unit, like much of the People’s Liberation Army’s ballistic missile armament, is road-mobile, making its use feasible and lethal to the strategic points of its opponents.</span></p><span data-dcnode-id="1392" instrument_node="">
</span><p data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">The development of DEWs is viewed as especially crucial in India’s deteriorating security situation, particularly its ties with China. According to Indian security experts, as technology advances in India’s neighbourhood, the country may become exposed. They also suggest that India look into the prospect of building combat capabilities in this area. Given the escalating security dynamics in the Indo-Pacific and beyond, many major nations, including India, are expected to step up their efforts to acquire these weapons.</span></p><span data-dcnode-id="1389" instrument_node="">
</span><p data-dcnode-id="1384"><span data-dcnode-id="1388" instrument_node="">The recent military conflict in eastern Ladakh reminds us of China’s threats to India. Beijing’s expanding military might, including capabilities in space, cyber, and electronic warfare, can significantly threaten its opponents, including India. DEW technologies are also being developed in China. As a result, India is indeed undoubtedly building its own DEWs. “DEWs are tremendously crucial today,” Dr G. Satheesh Reddy, the head of the DRDO, </span><a data-dcnode-id="1386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.drdo.gov.in/sites/default/files/drdo-news-documents/din-12august2019.pdf"><span data-dcnode-id="1387" instrument_node="">remarked</span></a><span data-dcnode-id="1385" instrument_node=""> during the 12th Air Chief Marshal L.M. Katre memorial lecture in August 2021. “The rest of the globe is pursuing them. We’re conducting many experiments in the country as well.” he further concluded by briefly showing light on India’s emphasis on the DEWs. Later in December 2021, India’s Defence Research and Development Organization (DRDO) also announced intentions to build directed energy weapons (DEWs) based on high-energy lasers and microwaves.</span></p><span data-dcnode-id="1383" instrument_node="">
</span><p data-dcnode-id="1378"><span data-dcnode-id="1382" instrument_node="">Further solidifying these claims, the Ministry of Defence </span><a data-dcnode-id="1380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mod.gov.in/technology-perspective-and-capability-roadmap"><span data-dcnode-id="1381" instrument_node="">launched</span></a><span data-dcnode-id="1379" instrument_node=""> its second edition of India’s “Technology Perspective and Capability Roadmap” in 2018, showcasing 200 technologies and concepts slated for introduction into the armed services in the mid-2020s. A “Tactical High Energy Laser System” for the Army and Air Force was among the ventures that business was encouraged to adopt.</span></p><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">The ministry envisaged a laser weapon system mounted on high-mobility vehicles that could “cause physical damage/destruction to [electronic warfare] systems, communications networks, quasi communication systems/radars and their antennae.” The armament should ultimately have a baseline range of 20 kilometres, target-locking technology, and the potential to operate as anti-satellite weaponry from both ground and air stations.</span></p><span data-dcnode-id="1374" instrument_node="">
</span><p data-dcnode-id="1369"><span data-dcnode-id="1373" instrument_node="">In line with the same, India has </span><a data-dcnode-id="1371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//economictimes.indiatimes.com/news/defence/government-refuses-information-on-kali-5000-citing-national-security/articleshow/50234073.cms%3Ffrom%3Dmdr"><span data-dcnode-id="1372" instrument_node="">established</span></a><span data-dcnode-id="1370" instrument_node=""> a linear electron accelerator system dubbed KALI, or the “kilo ampere linear injector,” for neutralizing long-range missiles. KALI is presumed to quickly dissipate impactful pulses of Relativistic Electron Beams (REB) that can destroy communications components on-board once a missile launch is spotted. Together the DRDO and the BARC worked to create KALI (BARC). Dr R. Chidambaram, the then-Director of BARC, recommended it in 1985. According to reports, construction on the project began in 1989. A high power pulse particle throttle KALI-5000 has been operational with an energy of 650 keV and an electron beam power of 40 GW, the BARC head declared at a BARC Foundation Day address in 2004.</span></p><div class="mailmunch-forms-in-post-middle" data-dcnode-id="1368" style="display: none !important;"></div><span data-dcnode-id="1367" instrument_node="">
</span><p data-dcnode-id="1362"><span data-dcnode-id="1366" instrument_node="">Furthermore, tactically speaking of what is more available as disclosed and non-confidential knowledge in public portals, as per the </span><a data-dcnode-id="1364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sgp.fas.org/crs/weapons/R45811.pdf"><span data-dcnode-id="1365" instrument_node="">Congressional report</span></a><span data-dcnode-id="1363" instrument_node="">, in a component of its Hypersonic Technology Demonstrator Vehicle project, India grows an indigenous, dual-capable (conventional and nuclear) hypersonic missile system. It has experimentally validated a Mach 6 scramjet in June 2019 and September 2020. “India has about 12 hypersonic wind tunnels that can test speeds up to Mach 13,” says the report.</span></p><span data-dcnode-id="1361" instrument_node="">
</span><p data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">Later in 2021, India finally joined the elite nations that have successfully tested the High-Speed Technology Demonstrator Vehicle (HSTDV) using an indigenously produced propulsion system. The successful test represented an essential step forward in establishing hypersonic delivery systems, including constructing a carrier vehicle for cruise missiles and the low-cost launch of satellite systems.</span></p><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1353"><span data-dcnode-id="1357" instrument_node="">The DRDO is also thought to be making progress on a hypersonic anti-ship missile identified as the BrahMos-II. According to a </span><a data-dcnode-id="1355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.colorado.edu/faculty/kantha/sites/default/files/attached-files/67552-116619_-_michael_riechers_-_dec_17_2015_1225_pm_-_dirscherl_riechers_sanders_final.pdf"><span data-dcnode-id="1356" instrument_node="">research</span></a><span data-dcnode-id="1354" instrument_node="">, hypersonic scramjet technology is projected to achieve speeds twice as fast as the BrahMos-1, thus exceeding Mach 6.</span></p><span data-dcnode-id="1352" instrument_node="">
</span><p data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">India undertook two significant missile launches in the latter months of 2021. The Shaurya hypersonic armament launch, which took place in October, was the first. The Agni-P missile test, which took place on Christmas Night, was the second. Both missile tests show that India is on track to develop a more advanced nuclear arsenal with a broader range of propulsion systems. These achievements have sparked a flurry of reactions, ranging from delight at the improved preparedness of India’s arsenal to dire predictions about what these missile developments could mean for geopolitical stability, mainly between India, China and Pakistan.</span></p><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1341"><span data-dcnode-id="1348" instrument_node="">India’s missile arsenal is improving to dissuade and deter the Army of the People’s Republic of China. India’s competencies at the time are much inferior to those of the latter. Beijing has </span><a data-dcnode-id="1346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.orfonline.org/research/chinas-xinjiang-policy-the-imperative-for-india/"><span data-dcnode-id="1347" instrument_node="">deployed</span></a><span data-dcnode-id="1345" instrument_node=""> its Dong-Feng (DF)-26 IRBMs in Western China’s Xinjiang province. China’s DF-17 HGV, with an operative ballpark range of 1,800-2,500km, is a significant threat. Beijing is reported to have been operating this since at least 2019, which is also a retaliation to India’s </span><a data-dcnode-id="1343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindustantimes.com/india-news/india-successfully-tests-nuclear-capable-shaurya-missile/story-fkYlozVJ5oq1MWO26GOwNN.html"><span data-dcnode-id="1344" instrument_node="">Shaurya</span></a><span data-dcnode-id="1342" instrument_node=""> hypersonic armament. Due to its limited geography, Pakistan is especially susceptible to strategic interception compared to China’s geographic and strategic depth. In any case, Beijing’s submarine-based nuclear-weapons provide it with a near-invulnerable second-strike capability, complicating India’s counter-force operations versus the Chinese nuclear targets. As a result, India’s hypersonic arsenal, Agni SRBM, and IRBM warheads maintain strategic deterrence and improve its position in South Asia’s geopolitical equilibrium.</span></p><span data-dcnode-id="1340" instrument_node="">
</span><p data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">DEWs and hypersonic missile systems, in my perspective, should indeed be considered as one component of a more considerable global military technological evolution. Directed-energy weapons will redefine how objectives are captured and attacked in years to come, much as electronic technology has progressed the speed and accuracy of the flow of information. Once the technological impediments outlined above are resolved, the future of this technology could have near-endless potential when it comes to engaging aerial targets like missiles or drones.</span></p><span data-dcnode-id="1337" instrument_node="">
</span><p data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">The DRDO’s objective and budgetary allocations primarily aim to establish and subsequently operate DEWs that are limited to terrestrial assignments. As a result, it’s possible that India won’t be able to produce the whole array of DEWs. Despite their current technological limitations, the DRDO and the administration will need to recognize which direct energy weapons are sustainable in the long run.</span></p><span data-dcnode-id="1334" instrument_node="">
</span><p data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">The Chinese are quickly developing and fielding DEWs for attacking and defending purposes. India will not be able to rely solely on defensive qualities to secure and safeguard its troops and equipment; it will also require aggressive DEW capacities, which may be minor but would require intensive and considerable attention.</span></p><span data-dcnode-id="1331" instrument_node="">
</span><p data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">Many specialists in the industry believe that directed-energy weapons will unravel new forms of lethal and nonlethal engagements in the long term. This, although, would entirely be determined by what is defined as “appropriate.” Despite decades of research into the practical applications of Direct Energy Weapons, they are still thought to be at the experimental stage, even though a few prototypes have been proclaimed to be functional by certain nations.</span></p><span data-dcnode-id="1328" instrument_node="">
</span><p data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">While the absence of a functional hypersonic missile defence system makes such capabilities appealing, research shows significant hurdles to overcome, such as the propulsion system and the intense heat generated by these weapon systems. G Satheesh Reddy, the DRDO’s chief, had stated that realising a comprehensive weapons system working for some advantage would take approximately four to five years.</span></p><span data-dcnode-id="1325" instrument_node="">
</span><p data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">While it is an apparent common understanding that the Indian ballistic system and hypersonic missile armaments are present in numbers of strength, there needs to be a constant upscaling to keep up with the ever-evolving warfare strategies and armament systems.</span></p><span data-dcnode-id="1322" instrument_node="">
</span><div class="mailmunch-forms-after-post" data-dcnode-id="1321" style="display: none !important;"></div><div class="sharedaddy sd-sharing-enabled" data-dcnode-id="1279"><div class="robots-nocontent sd-block sd-social sd-social-icon sd-sharing" data-dcnode-id="1280"><h3 class="sd-title" data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">Share this:</span></h3><div class="sd-content" data-dcnode-id="1281"><ul data-dcnode-id="1282" data-sharing-events-added="true"><li class="share-twitter" data-dcnode-id="1314"><a class="share-twitter sd-button share-icon no-text" data-dcnode-id="1315" data-shared="sharing-twitter-51315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//moderndiplomacy.eu/2022/04/21/direct-energy-weapons-and-hyper-sonic-armaments-the-future-of-warfare-in-the-indian-context/%3Fshare%3Dtwitter%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Twitter"><span data-dcnode-id="1318"></span><span class="sharing-screen-reader-text" data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Click to share on Twitter (Opens in new window)</span></span></a></li><li class="share-facebook" data-dcnode-id="1309"><a class="share-facebook sd-button share-icon no-text" data-dcnode-id="1310" data-shared="sharing-facebook-51315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//moderndiplomacy.eu/2022/04/21/direct-energy-weapons-and-hyper-sonic-armaments-the-future-of-warfare-in-the-indian-context/%3Fshare%3Dfacebook%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Facebook"><span data-dcnode-id="1313"></span><span class="sharing-screen-reader-text" data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Click to share on Facebook (Opens in new window)</span></span></a></li><li class="share-linkedin" data-dcnode-id="1304"><a class="share-linkedin sd-button share-icon no-text" data-dcnode-id="1305" data- </span></div><span data-dcnode-id="1197" instrument_node="">
</span><div class="mvp-post-add-body left relative" data-dcnode-id="1078"><span data-dcnode-id="1196" instrument_node="">
</span><div class="mvp-post-add-img left relative" data-dcnode-id="1192"><span data-dcnode-id="1195" instrument_node="">
</span><img alt="" class="attachment- size- wp-post-image" data-dcnode-id="1194" height="800" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//moderndiplomacy.eu/wp-content/uploads/2022/04/military-army.jpg&amp;raw" srcset="https://moderndiplomacy.eu/wp-content/uploads/2022/04/military-army.jpg 1200w, https://moderndiplomacy.eu/wp-content/uploads/2022/04/military-army-300x200.jpg 300w, https://moderndiplomacy.eu/wp-content/uploads/2022/04/military-army-1024x683.jpg 1024w, https://moderndiplomacy.eu/wp-content/uploads/2022/04/military-army-768x512.jpg 768w, https://moderndiplomacy.eu/wp-content/uploads/2022/04/military-army-600x400.jpg 600w" width="1200"><span data-dcnode-id="1193" instrument_node=""> </span></div><span data-dcnode-id="1190" instrument_node="">
</span><div class="mvp-post-add-cont left relative" data-dcnode-id="1081"><span data-dcnode-id="1189" instrument_node="">
</span><div class="mvp-post-add-main right relative" data-dcnode-id="1092"><span data-dcnode-id="1188" instrument_node="">
</span><div class="mailmunch-forms-before-post" data-dcnode-id="1187" style="display: none !important;"></div><span data-dcnode-id="1186" instrument_node="">
</span><p data-dcnode-id="1182"><span data-dcnode-id="1185" instrument_node="">Authors: He Jun and </span><a data-dcnode-id="1183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//moderndiplomacy.eu/author/chankung/"><span data-dcnode-id="1184" instrument_node="">Chan Kung</span></a></p><span data-dcnode-id="1181" instrument_node="">
</span><p data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">The war between Russia and Ukraine has lasted 35 days since it began on February 24. For a long time, Russia has had the image and influence as a great power, which is mainly reflected in its military strength, and in its 2,000 nuclear weapons, as well as its powerful conventional armed forces and combat effectiveness. However, judging from the actual progress of this war, although the Russian army is still on the proactive side of the war as a whole, its actual combat performance is quite different from what the world imagined it to be. To some extent, the Russian army was even “trapped” by the resistance of the Ukrainian army.</span></p><span data-dcnode-id="1178" instrument_node="">
</span><p data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">An important revelation brought by this war is that the world now sees clearly what are a country’s actual “strategic resources”.</span></p><span data-dcnode-id="1175" instrument_node="">
</span><p data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">According to a general understanding, “strategic resources” refer to human resources, natural resources, and artificial resources that play an important role in the overall situation of the war. Among them, human resources refer to the quantity and quality of the population with the necessary labor capacity, including the ability to perform military service. Natural resources include land resources, mineral resources, hydraulic resources, biological resources, and marine resources. Artificial resources are substances developed and processed by human beings, including means of production and consumption.</span></p><span data-dcnode-id="1172" instrument_node="">
</span><p data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">A country’s strategic resource status depends on its geographic location, land mass, population quality, topography, geological structure, as well as whether these resources can be reasonably developed, transported, stored, distributed, and consumed. Strategic resources are the material basis for preparing for and conducting wars. They determine a country’s potential ability to support wars, directly affect the process and outcome of wars, and are an important basis in formulating national and military strategies. When a country determines its strategic intentions, it must be based on the practical limits that strategic resources can provide. If the strategic attempt exceeds the limit of strategic resources, it will inevitably reduce the ability to continue the war and eventually lead to the defeat.</span></p><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">The above understanding is closer to research definition, which is a systematic description of national strategic resources and their roles. Strategic resources in actual warfare would have simpler answer. Looking at the war in Ukraine, researchers at ANBOUND believe that the “strategic resources” that matter to national security the most are energy, food, military, and industrial sectors that can be “weaponized”.</span></p><span data-dcnode-id="1166" instrument_node="">
</span><p data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">Undoubtedly, the importance of energy is not only the guarantee for the military’s combat operations but also the basic driving force for the economic and social operation of the country during wartime. In the Russia-Ukraine war, the importance of energy is extremely prominent. It is not only an important means for the United States to sanction Russia, but also a crucial weapon for Russia against European countries. For the world’s major energy-demanding countries, in the event of a war, ensuring basic energy security will be an extremely important issue.</span></p><div class="mailmunch-forms-in-post-middle" data-dcnode-id="1163" style="display: none !important;"></div><span data-dcnode-id="1162" instrument_node="">
</span><p data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Food is also a critical strategic resource in times of national war. Simply put, food is required during war time, not only to feed the army but also for the common people to survive. Widespread food shortages during war may cause more panic than the army losing a battle. Especially if the war continues, the nation’s ability to reserve and obtain food from various markets becomes as important as the ability to obtain weapons and ammunition.</span></p><span data-dcnode-id="1159" instrument_node="">
</span><p data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">The army is the protagonist and the most important strategic resource during the war. It involves the quantity, quality, combat effectiveness, morale, and cooperation of different branches of the military, and is also tied to a country’s ability to supply and train soldiers. In the Russia-Ukraine War, the size of the Russian Federation army exceeded 1 million (approximately 1.027 million), while the Ukrainian army was only about 200,000. Although the size of the Russian military is five times that of the Ukrainian military, the actual Russian troops that can be put into the Ukrainian battlefield are not more than 200,000. With the stalemate of the war, the number of troops available to Russia has become insufficient, thus troops from Russia’s Far East were also transferred to Ukraine. Russia later adjusted its war goals to focus on the Donbas, which had something to do with the lack of troops.</span></p><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">The weaponizable industrial sector is also an important key to the country’s strategic resources. It can be seen in the Russia-Ukraine war that energy has become an important weapon in the game between Russia and the West. The energy industry sector has also become a crucial strategic resource affecting the war. The industrial sectors that can be weaponized are not only energy. The semiconductor and electronics industry, various military industries, shipbuilding, aerospace, food production, and some mineral resource sectors can be included in national strategies resources as well.</span></p><span data-dcnode-id="1153" instrument_node="">
</span><p data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">For a long time, to gain the preferential treatment from national policy, “national security” has become ubiquitous label worldwide, where different sectors are claimed to be related to it. However, as soon as the war begins, the actual “national security” sectors will be revealed. Only the strategic resources that have real strategic value, affect the success or failure of wars and are related to national stability during wartime, such as energy, food, army, and industries that can be “weaponized”, are the real foundations of a country’s security.</span></p><span data-dcnode-id="1150" instrument_node="">
</span><p data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">It should be emphasized that a country’s shortcomings in strategic resources can become a its weakness in wartime. Even in peacetime, it will also become a flaw that may be exploited by others. In old Europe, in the case of France and Germany, their national policies were strongly constrained by Russia because of their energy dependence. Other countries in the world are affected by food shortage, and inflation has even led to the constraints of financial policies in some countries.</span></p><span data-dcnode-id="1147" instrument_node="">
</span><p data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">We must be soberly aware that any country’s resources are limited, and it is impossible to invest limited resources in too many areas. Therefore, the focus should be on areas that involve national security. This is the basis of a major national policy. From the perspective of China’s economic situation and resources, energy source and agriculture are the national foundations that will affect its national security in the future. These two strategic resource areas are not without incidents. Due to the high degree of external dependence, there are potential risks.</span></p><span data-dcnode-id="1144" instrument_node="">
</span><div class="mailmunch-forms-after-post" data-dcnode-id="1143" style="display: none !important;"></div><div class="sharedaddy sd-sharing-enabled" data-dcnode-id="1101"><div class="robots-nocontent sd-block sd-social sd-social-icon sd-sharing" data-dcnode-id="1102"><h3 class="sd-title" data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Share this:</span></h3><div class="sd-content" data-dcnode-id="1103"><ul data-dcnode-id="1104" data-sharing-events-added="true"><li class="share-twitter" data-dcnode-id="1136"><a class="share-twitter sd-button share-icon no-text" data-dcnode-id="1137" data-shared="sharing-twitter-51252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//moderndiplomacy.eu/2022/04/20/real-strategic-resources-for-national-security/%3Fshare%3Dtwitter%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Twitter"><span data-dcnode-id="1140"></span><span class="sharing-screen-reader-text" data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">Click to share on Twitter (Opens in new window)</span></span></a></li><li class="share-facebook" data-dcnode-id="1131"><a class="share-facebook sd-button share-icon no-text" data-dcnode-id="1132" data-shared="sharing-facebook-51252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//moderndiplomacy.eu/2022/04/20/real-strategic-resources-for-national-security/%3Fshare%3Dfacebook%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Facebook"><span data-dcnode-id="1135"></span><span class="sharing-screen-reader-text" data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">Click to share on Facebook (Opens in new window)</span></span></a></li><li class="share-linkedin" data-dcnode-id="1126"><a class="share-linkedin sd-button share-icon no-text" data-dcnode-id="1127" data-shared="sharing-linkedin-51252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&
