</span><section class="ga-content-block stacking-slide light-purple-section-background-color paragraphsection" data-dcnode-id="804" id="overview"><span data-dcnode-id="836" instrument_node="">
</span><div class="paragraph alignwide container meta-info-top" data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">
</span></div><span data-dcnode-id="833" instrument_node="">
</span><div class="paragraph alignwide container" data-dcnode-id="806"><span data-dcnode-id="832" instrument_node="">
</span><div class="row" data-dcnode-id="808"><span data-dcnode-id="831" instrument_node="">
</span><h2 class="toptitle" data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Overview</span></h2><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="827"></p><p data-dcnode-id="825"><img alt="text with image" class="alignleft wp-image-6005 size-medium" data-dcnode-id="826" height="195" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gpa-mprod-mwp.s3.amazonaws.com/uploads/sites/28/2021/07/About-NATO-Overview-section-300x195.jpeg&amp;raw" srcset="https://uploads.mwp.mprod.getusinfo.com/uploads/sites/28/2021/07/About-NATO-Overview-section-300x195.jpeg 300w, https://uploads.mwp.mprod.getusinfo.com/uploads/sites/28/2021/07/About-NATO-Overview-section-1024x666.jpeg 1024w, https://uploads.mwp.mprod.getusinfo.com/uploads/sites/28/2021/07/About-NATO-Overview-section-768x499.jpeg 768w, https://uploads.mwp.mprod.getusinfo.com/uploads/sites/28/2021/07/About-NATO-Overview-section-200x130.jpeg 200w, https://uploads.mwp.mprod.getusinfo.com/uploads/sites/28/2021/07/About-NATO-Overview-section-923x600.jpeg 923w, https://uploads.mwp.mprod.getusinfo.com/uploads/sites/28/2021/07/About-NATO-Overview-section.jpeg 1200w" width="300"></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Formed in 1949 with the signing of the Washington Treaty, NATO is a security alliance of 30 countries from North America and Europe. NATO’s fundamental goal is to safeguard the Allies’ freedom and security by political and military means. NATO remains the principal security instrument of the transatlantic community and expression of its common democratic values. It is the practical means through which the security of North America and Europe are permanently tied together. NATO enlargement has furthered the U.S. goal of a Europe whole, free, and at peace.</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="815"><a data-dcnode-id="817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nato.int/cps/en/natolive/official_texts_17120.htm" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="820" instrument_node="">Article 5 of the Washington Treaty</span><span data-dcnode-id="819" instrument_node=""> </span><i class="fas fa-external-link-alt" data-dcnode-id="818"></i></a><span data-dcnode-id="816" instrument_node="">&nbsp;— that an attack against one Ally is an attack against all — is at the core of the Alliance, a promise of collective defense. Article 4 of the treaty ensures consultations among Allies on security matters of common interest, which have expanded from a narrowly defined Soviet threat to the critical mission in Afghanistan, as well as peacekeeping in Kosovo and new threats to security such as cyber attacks, and global threats such as terrorism and piracy that affect the Alliance and its global network of partners.</span></p><span data-dcnode-id="814" instrument_node="">
</span><p data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">In addition to its traditional role in the territorial defense of Allied nations, NATO leads the UN-mandated International Security Assistance Force (ISAF) in Afghanistan and has ongoing missions in the Balkans and the Mediterranean; it also conducts extensive training exercises and offers security support to partners around the globe, including the European Union in particular but also the United Nations and the African Union.</span></p><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="810"></p><span data-dcnode-id="809" instrument_node="">
</span></div><span data-dcnode-id="807" instrument_node="">
</span></div><span data-dcnode-id="805" instrument_node="">
</span></section><span data-dcnode-id="803" instrument_node="">
</span><section class="ga-content-block stacking-slide light-blue-section-background-color paragraphsection" data-dcnode-id="763" id="member"><span data-dcnode-id="802" instrument_node="">
</span><span data-dcnode-id="801" instrument_node="">
</span><div class="paragraph alignwide container" data-dcnode-id="765"><span data-dcnode-id="800" instrument_node="">
</span><div class="row" data-dcnode-id="767"><span data-dcnode-id="799" instrument_node="">
</span><h2 class="toptitle" data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Member States</span></h2><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="795"></p><p data-dcnode-id="792"><img alt="" class="wp-image-5882 size-medium alignright" data-dcnode-id="794" height="292" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gpa-mprod-mwp.s3.amazonaws.com/uploads/sites/28/2021/07/Photos-About-Nato-Member-States-Section-300x292.jpg&amp;raw" srcset="https://uploads.mwp.mprod.getusinfo.com/uploads/sites/28/2021/07/Photos-About-Nato-Member-States-Section-300x292.jpg 300w, https://uploads.mwp.mprod.getusinfo.com/uploads/sites/28/2021/07/Photos-About-Nato-Member-States-Section-50x50.jpg 50w, https://uploads.mwp.mprod.getusinfo.com/uploads/sites/28/2021/07/Photos-About-Nato-Member-States-Section-200x194.jpg 200w, https://uploads.mwp.mprod.getusinfo.com/uploads/sites/28/2021/07/Photos-About-Nato-Member-States-Section-617x600.jpg 617w, https://uploads.mwp.mprod.getusinfo.com/uploads/sites/28/2021/07/Photos-About-Nato-Member-States-Section.jpg 720w" width="300"><span data-dcnode-id="793" instrument_node="">The NATO Alliance consists of 30 member states from North America and Europe. Article Five of the treaty states that if an armed attack occurs against one of the member states, it should be considered an attack against all members, and other members shall assist the attacked member, with armed forces if necessary.</span></p><span data-dcnode-id="791" instrument_node="">
</span><ul data-dcnode-id="783"><span data-dcnode-id="790" instrument_node="">
</span><li data-dcnode-id="785"><a data-dcnode-id="786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nato.int/cps/en/natolive/nato_countries.htm" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="789" instrument_node="">List of Member States</span><span data-dcnode-id="788" instrument_node=""> </span><i class="fas fa-external-link-alt" data-dcnode-id="787"></i></a></li><span data-dcnode-id="784" instrument_node="">
</span></ul><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Over the past two decades, the Alliance has developed a network of structured partnerships with countries from the Euro-Atlantic area, the Mediterranean and the Gulf region, as well as individual relationships with other partners across the globe. NATO pursues dialogue and practical cooperation with many partner countries and engages actively with other international actors and organisations on a wide range of political and security-related issues.</span></p><span data-dcnode-id="779" instrument_node="">
</span><ul data-dcnode-id="771"><span data-dcnode-id="778" instrument_node="">
</span><li data-dcnode-id="773"><a data-dcnode-id="774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nato.int/cps/en/natohq/51288.htm" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="777" instrument_node="">List of NATO Partners</span><span data-dcnode-id="776" instrument_node=""> </span><i class="fas fa-external-link-alt" data-dcnode-id="775"></i></a></li><span data-dcnode-id="772" instrument_node="">
</span></ul><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="769"></p><span data-dcnode-id="768" instrument_node="">
</span></div><span data-dcnode-id="766" instrument_node="">
</span></div><span data-dcnode-id="764" instrument_node="">
</span></section><span data-dcnode-id="762" instrument_node="">
</span><section class="ga-content-block stacking-slide light-grey-section-background-color paragraphsection" data-dcnode-id="730" id="structure"><span data-dcnode-id="761" instrument_node="">
</span><span data-dcnode-id="760" instrument_node="">
</span><div class="paragraph alignwide container" data-dcnode-id="732"><span data-dcnode-id="759" instrument_node="">
</span><div class="row" data-dcnode-id="734"><span data-dcnode-id="758" instrument_node="">
</span><h2 class="toptitle" data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Structure</span></h2><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="754"></p><div class="socialbar" data-dcnode-id="740"><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">NATO is comprised of two main parts, the political and military components.&nbsp;NATO Headquarters is where representatives from all the member states come together to make decisions on a consensus basis. It also offers a venue for dialogue and cooperation between partner countries and NATO member countries, enabling them to work together in their efforts to bring about peace and stability.The key elements of NATO’s military organisation are the Military Committee, composed of the Chiefs of Defence of NATO member countries, its executive body, the International Military Staff, and the military Command Structure (distinct from the Force Structure), which is composed of Allied Command Operations and Allied Command Transformation, headed respectively by the Supreme Allied Commander Europe (SACEUR) and the Supreme Allied Commander, Transformation (SACT).</span></p><span data-dcnode-id="750" instrument_node="">
</span><ul data-dcnode-id="742"><span data-dcnode-id="749" instrument_node="">
</span><li data-dcnode-id="744"><a data-dcnode-id="745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nato.int/cps/en/natohq/structure.htm%23CS" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="748" instrument_node="">NATO Organization Structure List</span><span data-dcnode-id="747" instrument_node=""> </span><i class="fas fa-external-link-alt" data-dcnode-id="746"></i></a></li><span data-dcnode-id="743" instrument_node="">
</span></ul><span data-dcnode-id="741" instrument_node="">
</span></div><span data-dcnode-id="739" instrument_node="">
</span><div class="at-below-post-page addthis_tool" data-dcnode-id="738" data-url="https://nato.usmission.gov/our-relationship/about-nato/structure/"></div><span data-dcnode-id="737" instrument_node="">

</span></div><span data-dcnode-id="733" instrument_node="">

</span><section class="ga-content-block stacking-slide light-purple-section-background-color paragraphsection" data-dcnode-id="681" id="exercises"><span data-dcnode-id="728" instrument_node="">
</span><span data-dcnode-id="727" instrument_node="">
</span><div class="paragraph alignwide container" data-dcnode-id="683"><span data-dcnode-id="726" instrument_node="">
</span><div class="row" data-dcnode-id="685"><span data-dcnode-id="725" instrument_node="">
</span><h2 class="toptitle" data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Exercises</span></h2><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="721"></p><p data-dcnode-id="718" style="text-align: left;"><img alt="" class="size-medium wp-image-5880 alignleft" data-dcnode-id="720" height="199" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gpa-mprod-mwp.s3.amazonaws.com/uploads/sites/28/2021/07/About-NATO-Exercises-Section-in-line-300x199.jpg&amp;raw" srcset="https://uploads.mwp.mprod.getusinfo.com/uploads/sites/28/2021/07/About-NATO-Exercises-Section-in-line-300x200.jpg 300w, https://uploads.mwp.mprod.getusinfo.com/uploads/sites/28/2021/07/About-NATO-Exercises-Section-in-line-1024x681.jpg 1024w, https://uploads.mwp.mprod.getusinfo.com/uploads/sites/28/2021/07/About-NATO-Exercises-Section-in-line-768x511.jpg 768w, https://uploads.mwp.mprod.getusinfo.com/uploads/sites/28/2021/07/About-NATO-Exercises-Section-in-line-200x133.jpg 200w, https://uploads.mwp.mprod.getusinfo.com/uploads/sites/28/2021/07/About-NATO-Exercises-Section-in-line-902x600.jpg 902w, https://uploads.mwp.mprod.getusinfo.com/uploads/sites/28/2021/07/About-NATO-Exercises-Section-in-line.jpg 1155w" width="300"><span data-dcnode-id="719" instrument_node="">The primary role of Alliance military forces is to protect peace and to guarantee the territorial integrity, political independence and security of the member states. Alliance forces must be able to deter and defend effectively. The Alliance remains subject to a wide variety of military and non-military risks that are multi-directional and often difficult to predict.</span></p><span data-dcnode-id="717" instrument_node="">
</span><ul data-dcnode-id="709"><span data-dcnode-id="716" instrument_node="">
</span><li data-dcnode-id="711"><a data-dcnode-id="712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shape.nato.int/nato-exercises" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="715" instrument_node="">List of current NATO Exercises</span><span data-dcnode-id="714" instrument_node=""> </span><i class="fas fa-external-link-alt" data-dcnode-id="713"></i></a></li><span data-dcnode-id="710" instrument_node="">
</span></ul><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">The term NATO Military Exercise includes all exercises for which NATO is the initiating or the joint initiating authority. Associated with NATO Military Exercises are building blocks, such as: seminars, study periods and workshops.</span></p><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">A NATO Military Exercise is scheduled by a NATO Commander. It aims to establish, enhance and display NATO’s Military Capability across the Alliance’s full mission spectrum which is based on the three Alliance military missions:</span></p><span data-dcnode-id="702" instrument_node="">
</span><ul data-dcnode-id="691"><span data-dcnode-id="701" instrument_node="">
</span><li data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Article 5 Collective Defence;</span></li><span data-dcnode-id="698" instrument_node="">
</span><li data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Non-Article 5 Crisis Response; and</span></li><span data-dcnode-id="695" instrument_node="">
</span><li data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Consultation and Co-operation.</span></li><span data-dcnode-id="692" instrument_node="">
</span></ul><span data-dcnode-id="690" instrument_node="">
</span><div class="at-below-post-page addthis_tool" data-dcnode-id="689" data-url="https://nato.usmission.gov/our-relationship/about-nato/exercises/"></div><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="687"></p><span data-dcnode-id="686" instrument_node="">
</span></div><span data-dcnode-id="684" instrument_node="">
</span></div><span data-dcnode-id="682" instrument_node="">
</span></section><span data-dcnode-id="680" instrument_node="">
</span><section class="ga-content-block stacking-slide light-blue-section-background-color paragraphsection" data-dcnode-id="646" id="operations"><span data-dcnode-id="679" instrument_node="">
</span><span data-dcnode-id="678" instrument_node="">
</span><div class="paragraph alignwide container" data-dcnode-id="648"><span data-dcnode-id="677" instrument_node="">
</span><div class="row" data-dcnode-id="650"><span data-dcnode-id="676" instrument_node="">
</span><h2 class="toptitle" data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">Operations</span></h2><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="672"></p><div class="socialbar" data-dcnode-id="667"><span data-dcnode-id="671" instrument_node="">
</span><div class="socialbar" data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">NATO is an active and leading contributor to peace and security on the international stage. It promotes democratic values and is committed to the peaceful resolution of disputes. However, if diplomatic efforts fail, it has the military capacity needed to undertake crisis-management operations, alone or in cooperation with other countries and international organisations. Through its crisis-management operations, the Alliance demonstrates both its willingness to act as a positive force for change and its capacity to meet the security challenges of the 21st century.</span></div><span data-dcnode-id="668" instrument_node="">
</span></div><span data-dcnode-id="666" instrument_node="">
</span><div class="socialbar" data-dcnode-id="665"></div><span data-dcnode-id="664" instrument_node="">
</span><div class="socialbar" data-dcnode-id="663"></div><span data-dcnode-id="662" instrument_node="">
</span><ul data-dcnode-id="654"><span data-dcnode-id="661" instrument_node="">
</span><li class="socialbar" data-dcnode-id="656"><a data-dcnode-id="657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nato.int/nato-on-duty/index.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="660" instrument_node="">Interactive Map of Current NATO Operations</span><span data-dcnode-id="659" instrument_node=""> </span><i class="fas fa-external-link-alt" data-dcnode-id="658"></i></a></li><span data-dcnode-id="655" instrument_node="">
</span></ul><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="652"></p><span data-dcnode-id="651" instrument_node="">
</span></div><span data-dcnode-id="649" instrument_node="">

</span><section class="ga-content-block stacking-slide light-grey-section-background-color paragraphsection" data-dcnode-id="618" id="ministerials"><span data-dcnode-id="644" instrument_node="">
</span><span data-dcnode-id="643" instrument_node="">

</span><div class="row" data-dcnode-id="622"><span data-dcnode-id="641" instrument_node="">
</span><h2 class="toptitle" data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">NATO Ministerials</span></h2><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="637"></p><p data-dcnode-id="635"><img alt="Foreign Ministers Meetings and Defense Ministers Meetings" class="size-medium wp-image-5886 alignleft" data-dcnode-id="636" height="208" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gpa-mprod-mwp.s3.amazonaws.com/uploads/sites/28/2021/07/About-NATO-Page-NATO-Ministerials-Summits-Section-replace-picture-currently-there-300x208.jpg&amp;raw" srcset="https://uploads.mwp.mprod.getusinfo.com/uploads/sites/28/2021/07/About-NATO-Page-NATO-Ministerials-Summits-Section-replace-picture-currently-there-300x208.jpg 300w, https://uploads.mwp.mprod.getusinfo.com/uploads/sites/28/2021/07/About-NATO-Page-NATO-Ministerials-Summits-Section-replace-picture-currently-there-200x139.jpg 200w, https://uploads.mwp.mprod.getusinfo.com/uploads/sites/28/2021/07/About-NATO-Page-NATO-Ministerials-Summits-Section-replace-picture-currently-there.jpg 709w" width="300"></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="626"><span data-dcnode-id="633" instrument_node="">Foreign Ministers Meetings and Defense Ministers Meetings provide an opportunity for NATO Allies to address many of NATO’s most pressing security challenges at the some of the highest levels of government. Key strategic issues discussed at these meetings have included Afghanista</span><span data-dcnode-id="631" style="font-size: 16px;"><span data-dcnode-id="632" instrument_node="">n, C</span></span><span data-dcnode-id="629" style="font-size: 16px;"><span data-dcnode-id="630" instrument_node="">apa</span></span><span data-dcnode-id="627" style="font-size: 16px;"><span data-dcnode-id="628" instrument_node="">bilities, Kosovo, and Missile Defense. Generally attended also by many of NATO’s partners, these meetings are a chance for NATO to strengthen its relationships around the world.</span></span></p><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="624"></p><span data-dcnode-id="623" instrument_node="">
</span></div><span data-dcnode-id="621" instrument_node="">
</span></div><span data-dcnode-id="619" instrument_node="">
</span></section><span data-dcnode-id="617" instrument_node="">
</span><section class="ga-content-block stacking-slide light-purple-section-background-color paragraphsection" data-dcnode-id="593" id="Matters"><span data-dcnode-id="616" instrument_node="">
</span><span data-dcnode-id="615" instrument_node="">
</span><div class="paragraph alignwide container" data-dcnode-id="595"><span data-dcnode-id="614" instrument_node="">
</span><div class="row" data-dcnode-id="597"><span data-dcnode-id="613" instrument_node="">
</span><h2 class="toptitle" data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Why NATO Matters</span></h2><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="609"></p><p data-dcnode-id="601"><img alt="" class="size-medium wp-image-5890 alignright" data-dcnode-id="608" height="202" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gpa-mprod-mwp.s3.amazonaws.com/uploads/sites/28/2021/07/Why-NATO-Matters-Page-Header-Image-300x202.jpg&amp;raw" srcset="https://uploads.mwp.mprod.getusinfo.com/uploads/sites/28/2021/07/Why-NATO-Matters-Page-Header-Image-300x202.jpg 300w, https://uploads.mwp.mprod.getusinfo.com/uploads/sites/28/2021/07/Why-NATO-Matters-Page-Header-Image-200x135.jpg 200w, https://uploads.mwp.mprod.getusinfo.com/uploads/sites/28/2021/07/Why-NATO-Matters-Page-Header-Image.jpg 730w" width="300"><span data-dcnode-id="607" instrument_node="">As a political and military alliance, what we do together at NATO directly contributes to the security, the prosperity, and liberty of the people of the United States and every Ally.Our NATO links are solid, forged over 70 years of history. NATO promotes democratic values and encourages consultation and cooperation on defense and security issues to build trust and, in the long run, prevent conflict. NATO is committed to the peaceful resolution of disputes. If diplomatic efforts fail, it has the military capacity needed to undertake crisis-management operations. These are carried out under&nbsp;</span><a data-dcnode-id="603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nato.int/cps/en/natolive/official_texts_17120.htm" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="606" instrument_node="">Article 5 of the Washington Treaty</span><span data-dcnode-id="605" instrument_node=""> </span><i class="fas fa-external-link-alt" data-dcnode-id="604"></i></a><span data-dcnode-id="602" instrument_node="">&nbsp;— NATO’s founding treaty — or under a UN mandate, alone or in cooperation with other countries and international organizations. In the history of NATO,&nbsp; Article 5 has been invoked just once, and that was in response to the 9/11 terrorist attacks in the United States.</span></p><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="599"></p><span data-dcnode-id="598" instrument_node="">
</span></div><span data-dcnode-id="596" instrument_node="">
