</span><h1 class="fs-huge" data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Active Engagement, Modern Defence</span></h1><span data-dcnode-id="1043" instrument_node="">
</span><h2 data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Strategic Concept for the Defence and Security of the Members of the North Atlantic Treaty Organisation adopted by Heads of State and Government in Lisbon</span></h2><span data-dcnode-id="1040" instrument_node="">
</span><ul class="list-meta" data-dcnode-id="1024"><span data-dcnode-id="1039" instrument_node="">

</span><section class="content cf" data-dcnode-id="582"><span data-dcnode-id="979" instrument_node="">
</span><p class="introtxt" data-dcnode-id="977"><span data-dcnode-id="978" instrument_node=""> </span></p><span data-dcnode-id="976" instrument_node="">
</span><span data-dcnode-id="974" instrument_node="">
</span><div class="box box-media box-media--stretched" data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">
</span></div><span data-dcnode-id="971" instrument_node="">
</span><div data-dcnode-id="584"><span data-dcnode-id="970" instrument_node="">
</span><h4 data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Preface</span></h4><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">We, the Heads of State and Government of the NATO nations, are determined that NATO will continue to play its unique and essential role in ensuring our common defence and security. This Strategic Concept will guide the next phase in NATO’s evolution, so that it continues to be effective in a changing world, against new threats, with new capabilities and new partners: </span></p><span data-dcnode-id="964" instrument_node="">
</span><ul data-dcnode-id="945"><span data-dcnode-id="963" instrument_node="">
</span><li data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">It reconfirms the bond between our nations to defend one another against attack, including against new threats to the safety of our citizens. </span></li><span data-dcnode-id="960" instrument_node="">
</span><li data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">It commits the Alliance to prevent crises, manage conflicts and stabilize post-conflict situations, including by working more closely with our international partners, most importantly the United Nations and the European Union. </span></li><span data-dcnode-id="957" instrument_node="">
</span><li data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">It offers our partners around the globe more political engagement with the Alliance, and a substantial role in shaping the NATO-led operations to which they contribute. </span></li><span data-dcnode-id="954" instrument_node="">
</span><li data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">It commits NATO to the goal of creating the conditions for a world without nuclear weapons – but reconfirms that, as long as there are nuclear weapons in the world, NATO will remain a nuclear Alliance. </span></li><span data-dcnode-id="951" instrument_node="">
</span><li data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">It restates our firm commitment to keep the door to NATO open to all European democracies that meet the standards of membership, because enlargement contributes to our goal of a Europe whole, free and at peace. </span></li><span data-dcnode-id="948" instrument_node="">
</span><li data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">It commits NATO to continuous reform towards a more effective, efficient and flexible Alliance, so that our taxpayers get the most security for the money they invest in defence. </span></li></ul><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">The citizens of our countries rely on NATO to defend Allied nations, to deploy robust military forces where and when required for our security, and to help promote common security with our partners around the globe. While the world is changing, NATO’s essential mission will remain the same: to ensure that the Alliance remains an unparalleled community of freedom, peace, security and shared values.</span></p><span data-dcnode-id="941" instrument_node="">
</span><hr data-dcnode-id="940"><span data-dcnode-id="939" instrument_node="">
</span><h4 data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Core Tasks and Principles</span></h4><span data-dcnode-id="936" instrument_node="">
</span><ol data-dcnode-id="897"><span data-dcnode-id="935" instrument_node="">
</span><li data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">NATO’s fundamental and enduring purpose is to safeguard the freedom and security of all its members by political and military means. Today, the Alliance remains an essential source of stability in an unpredictable world. </span></li><span data-dcnode-id="932" instrument_node="">
</span><li data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">NATO member states form a unique community of values, committed to the principles of individual liberty, democracy, human rights and the rule of law. The Alliance is firmly committed to the purposes and principles of the Charter of the United Nations, and to the Washington Treaty, which affirms the primary responsibility of the Security Council for the maintenance of international peace and security. </span></li><span data-dcnode-id="929" instrument_node="">
</span><li data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">The political and military bonds between Europe and North America have been forged in NATO since the Alliance was founded in 1949; the transatlantic link remains as strong, and as important to the preservation of Euro-Atlantic peace and security, as ever. The security of NATO members on both sides of the Atlantic is indivisible. We will continue to defend it together, on the basis of solidarity, shared purpose and fair burden-sharing. </span></li><span data-dcnode-id="926" instrument_node="">
</span><li data-dcnode-id="905"><span data-dcnode-id="925" instrument_node="">The modern security environment contains a broad and evolving set of challenges to the security of NATO’s territory and populations. In order to assure their security, the Alliance must and will continue fulfilling effectively three essential core tasks, all of which contribute to safeguarding Alliance members, and always in accordance with international law: 
</span><ol class="lower-alpha" data-dcnode-id="906"><span data-dcnode-id="924" instrument_node="">
</span><li data-dcnode-id="919"><strong data-dcnode-id="921"><em data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Collective defence</span></em></strong><span data-dcnode-id="920" instrument_node="">. NATO members will always assist each other against attack, in accordance with Article 5 of the Washington Treaty. That commitment remains firm and binding. NATO will deter and defend against any threat of aggression, and against emerging security challenges where they threaten the fundamental security of individual Allies or the Alliance as a whole. </span></li><span data-dcnode-id="918" instrument_node="">
</span><li data-dcnode-id="913"><em data-dcnode-id="915"><strong data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">Crisis management</span></strong></em><span data-dcnode-id="914" instrument_node="">. NATO has a unique and robust set of political and military capabilities to address the full spectrum of crises – before, during and after conflicts. NATO will actively employ an appropriate mix of those political and military tools to help manage developing crises that have the potential to affect Alliance security, before they escalate into conflicts; to stop ongoing conflicts where they affect Alliance security; and to help consolidate stability in post-conflict situations where that contributes to Euro-Atlantic security. </span></li><span data-dcnode-id="912" instrument_node="">
</span><li data-dcnode-id="907"><strong data-dcnode-id="909"><em data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">Cooperative security</span></em></strong><span data-dcnode-id="908" instrument_node="">. The Alliance is affected by, and can affect, political and security developments beyond its borders. The Alliance will engage actively to enhance international security, through partnership with relevant countries and other international organisations; by contributing actively to arms control, non-proliferation and disarmament; and by keeping the door to membership in the Alliance open to all European democracies that meet NATO’s standards.</span></li></ol></li><span data-dcnode-id="904" instrument_node="">
</span><li data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">NATO remains the unique and essential transatlantic forum for consultations on all matters that affect the territorial integrity, political independence and security of its members, as set out in Article 4 of the Washington Treaty. Any security issue of interest to any Ally can be brought to the NATO table, to share information, exchange views and, where appropriate, forge common approaches. </span></li><span data-dcnode-id="901" instrument_node="">
</span><li data-dcnode-id="898"><span data-dcnode-id="900" instrument_node="">In order to carry out the full range of NATO missions as effectively and efficiently as possible, Allies will engage in a continuous process of reform, modernisation and transformation.</span><br data-dcnode-id="899"></li></ol><span data-dcnode-id="896" instrument_node="">
</span><h4 data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">The Security Environment</span></h4><span data-dcnode-id="893" instrument_node="">
</span><ol data-dcnode-id="863" start="7"><span data-dcnode-id="892" instrument_node="">
</span><li data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Today, the Euro-Atlantic area is at peace and the threat of a conventional attack against NATO territory is low. That is an historic success for the policies of robust defence, Euro-Atlantic integration and active partnership that have guided NATO for more than half a century. </span></li><span data-dcnode-id="889" instrument_node="">
</span><li data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">However, the conventional threat cannot be ignored. Many regions and countries around the world are witnessing the acquisition of substantial, modern military capabilities with consequences for international stability and Euro-Atlantic security that are difficult to predict. This includes the proliferation of ballistic missiles, which poses a real and growing threat to the Euro-Atlantic area. </span></li><span data-dcnode-id="886" instrument_node="">
</span><li data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">The proliferation of nuclear weapons and other weapons of mass destruction, and their means of delivery, threatens incalculable consequences for global stability and prosperity. During the next decade, proliferation will be most acute in some of the world’s most volatile regions. </span></li><span data-dcnode-id="883" instrument_node="">
</span><li data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Terrorism poses a direct threat to the security of the citizens of NATO countries, and to international stability and prosperity more broadly. Extremist groups continue to spread to, and in, areas of strategic importance to the Alliance, and modern technology increases the threat and potential impact of terrorist attacks, in particular if terrorists were to acquire nuclear, chemical, biological or radiological capabilities. </span></li><span data-dcnode-id="880" instrument_node="">
</span><li data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">Instability or conflict beyond NATO borders can directly threaten Alliance security, including by fostering extremism, terrorism, and trans-national illegal activities such as trafficking in arms, narcotics and people. </span></li><span data-dcnode-id="877" instrument_node="">
</span><li data-dcnode-id="874"><a data-dcnode-id="876" id="cyber" name="cyber"></a><span data-dcnode-id="875" instrument_node="">Cyber attacks are becoming more frequent, more organised and more costly in the damage that they inflict on government administrations, businesses, economies and potentially also transportation and supply networks and other critical infrastructure; they can reach a threshold that threatens national and Euro-Atlantic prosperity, security and stability. Foreign militaries and intelligence services, organised criminals, terrorist and/or extremist groups can each be the source of such attacks. </span></li><span data-dcnode-id="873" instrument_node="">
</span><li data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">All countries are increasingly reliant on the vital communication, transport and transit routes on which international trade, energy security and prosperity depend. They require greater international efforts to ensure their resilience against attack or disruption. Some NATO countries will become more dependent on foreign energy suppliers and in some cases, on foreign energy supply and distribution networks for their energy needs. As a larger share of world consumption is transported across the globe, energy supplies are increasingly exposed to disruption. </span></li><span data-dcnode-id="870" instrument_node="">
</span><li data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">A number of significant technology-related trends – including the development of laser weapons, electronic warfare and technologies that impede access to space – appear poised to have major global effects that will impact on NATO military planning and operations. </span></li><span data-dcnode-id="867" instrument_node="">
</span><li data-dcnode-id="864"><span data-dcnode-id="866" instrument_node="">Key environmental and resource constraints, including health risks, climate change, water scarcity and increasing energy needs will further shape the future security environment in areas of concern to NATO and have the potential to significantly affect NATO planning and operations. </span><br data-dcnode-id="865"></li></ol><span data-dcnode-id="862" instrument_node="">
</span><h4 data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Defence and Deterrence</span></h4><span data-dcnode-id="859" instrument_node="">
</span><ol data-dcnode-id="802" start="16"><span data-dcnode-id="858" instrument_node="">
</span><li data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">The greatest responsibility of the Alliance is to protect and defend our territory and our populations against attack, as set out in Article 5 of the Washington Treaty. The Alliance does not consider any country to be its adversary. However, no one should doubt NATO’s resolve if the security of any of its members were to be threatened. </span></li><span data-dcnode-id="855" instrument_node="">
</span><li data-dcnode-id="852"><a data-dcnode-id="854" name="terrorism"></a><span data-dcnode-id="853" instrument_node="">Deterrence, based on an appropriate mix of nuclear and conventional capabilities, remains a core element of our overall strategy. The circumstances in which any use of nuclear weapons might have to be contemplated are extremely remote. As long as nuclear weapons exist, NATO will remain a nuclear alliance. </span></li><span data-dcnode-id="851" instrument_node="">
</span><li data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">The supreme guarantee of the security of the Allies is provided by the strategic nuclear forces of the Alliance, particularly those of the United States; the independent strategic nuclear forces of the United Kingdom and France, which have a deterrent role of their own, contribute to the overall deterrence and security of the Allies. </span></li><span data-dcnode-id="848" instrument_node="">
</span><li data-dcnode-id="803"><a data-dcnode-id="847" name="terrorism"></a><span data-dcnode-id="846" instrument_node="">We will ensure that NATO has the full range of capabilities necessary to deter and defend against any threat to the safety and security of our populations. Therefore, we will: 
</span><ul data-dcnode-id="804"><span data-dcnode-id="845" instrument_node="">
</span><li data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">maintain an appropriate mix of nuclear and conventional forces; </span></li><span data-dcnode-id="842" instrument_node="">
</span><li data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">maintain the ability to sustain concurrent major joint operations and several smaller operations for collective defence and crisis response, including at strategic distance; </span></li><span data-dcnode-id="839" instrument_node="">
</span><li data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">develop and maintain robust, mobile and deployable conventional forces to carry out both our Article 5 responsibilities and the Alliance’s expeditionary operations, including with the NATO Response Force; </span></li><span data-dcnode-id="836" instrument_node="">
</span><li data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">carry out the necessary training, exercises, contingency planning and information exchange for assuring our defence against the full range of conventional and emerging security challenges, and provide appropriate visible assurance and reinforcement for all Allies; </span></li><span data-dcnode-id="833" instrument_node="">
</span><li data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">ensure the broadest possible participation of Allies in collective defence planning on nuclear roles, in peacetime basing of nuclear forces, and in command, control and consultation arrangements; </span></li><span data-dcnode-id="830" instrument_node="">
</span><li data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">develop the capability to defend our populations and territories against ballistic missile attack as a core element of our collective defence, which contributes to the indivisible security of the Alliance. We will actively seek cooperation on missile defence with Russia and other Euro-Atlantic partners; </span></li><span data-dcnode-id="827" instrument_node="">
</span><li data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">further develop NATO’s capacity to defend against the threat of chemical, biological, radiological and nuclear weapons of mass destruction; </span></li><span data-dcnode-id="824" instrument_node="">
</span><li data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">develop further our ability to prevent, detect, defend against and recover from cyber-attacks, including by using the NATO planning process to enhance and coordinate national cyber-defence capabilities, bringing all NATO bodies under centralized cyber protection, and better integrating NATO cyber awareness, warning and response with member nations; </span></li><span data-dcnode-id="821" instrument_node="">
</span><li data-dcnode-id="818"><a data-dcnode-id="820" id="ct" name="ct"></a><span data-dcnode-id="819" instrument_node="">enhance the capacity to detect and defend against international terrorism, including through enhanced analysis of the threat, more consultations with our partners, and the development of appropriate military capabilities, including to help train local forces to fight terrorism themselves; </span></li><span data-dcnode-id="817" instrument_node="">
</span><li data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">develop the capacity to contribute to energy security, including protection of critical energy infrastructure and transit areas and lines, cooperation with partners, and consultations among Allies on the basis of strategic assessments and contingency planning; </span></li><span data-dcnode-id="814" instrument_node="">
</span><li data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">ensure that the Alliance is at the front edge in assessing the security impact of emerging technologies, and that military planning takes the potential threats into account; </span></li><span data-dcnode-id="811" instrument_node="">
</span><li data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">sustain the necessary levels of defence spending, so that our armed forces are sufficiently resourced; </span></li><span data-dcnode-id="808" instrument_node="">
</span><li data-dcnode-id="805"><span data-dcnode-id="807" instrument_node="">continue to review NATO’s overall posture in deterring and defending against the full range of threats to the Alliance, taking into account changes to the evolving international security environment.</span><br data-dcnode-id="806"></li></ul></li></ol><span data-dcnode-id="801" instrument_node="">
</span><h4 data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Security through Crisis Management</span></h4><span data-dcnode-id="798" instrument_node="">
</span><ol data-dcnode-id="756" start="20"><span data-dcnode-id="797" instrument_node="">
</span><li data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Crises and conflicts beyond NATO’s borders can pose a direct threat to the security of Alliance territory and populations. NATO will therefore engage, where possible and when necessary, to prevent crises, manage crises, stabilize post-conflict situations and support reconstruction. </span></li><span data-dcnode-id="794" instrument_node="">
</span><li data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">The lessons learned from NATO operations, in particular in Afghanistan and the Western Balkans, make it clear that a comprehensive political, civilian and military approach is necessary for effective crisis management. The Alliance will engage actively with other international actors before, during and after crises to encourage collaborative analysis, planning and conduct of activities on the ground, in order to maximise coherence and effectiveness of the overall international effort. </span></li><span data-dcnode-id="791" instrument_node="">
</span><li data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">The best way to manage conflicts is to prevent them from happening. NATO will continually monitor and analyse the international environment to anticipate crises and, where appropriate, take active steps to prevent them from becoming larger conflicts. </span></li><span data-dcnode-id="788" instrument_node="">
</span><li data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">Where conflict prevention proves unsuccessful, NATO will be prepared and capable to manage ongoing hostilities. NATO has unique conflict management capacities, including the unparalleled capability to deploy and sustain robust military forces in the field. NATO-led operations have demonstrated the indispensable contribution the Alliance can make to international conflict management efforts. </span></li><span data-dcnode-id="785" instrument_node="">
</span><li data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Even when conflict comes to an end, the international community must often provide continued support, to create the conditions for lasting stability. NATO will be prepared and capable to contribute to stabilisation and reconstruction, in close cooperation and consultation wherever possible with other relevant international actors. </span></li><span data-dcnode-id="782" instrument_node="">
</span><li data-dcnode-id="757"><span data-dcnode-id="781" instrument_node="">To be effective across the crisis management spectrum, we will: 
</span><ul data-dcnode-id="758"><span data-dcnode-id="780" instrument_node="">
</span><li data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">enhance intelligence sharing within NATO, to better predict when crises might occur, and how they can best be prevented; </span></li><span data-dcnode-id="777" instrument_node="">
</span><li data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">further develop doctrine and military capabilities for expeditionary operations, including counterinsurgency, stabilization and reconstruction operations; </span></li><span data-dcnode-id="774" instrument_node="">
</span><li data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">form an appropriate but modest civilian crisis management capability to interface more effectively with civilian partners, building on the lessons learned from NATO-led operations. This capability may also be used to plan, employ and coordinate civilian activities until conditions allow for the transfer of those responsibilities and tasks to other actors; </span></li><span data-dcnode-id="771" instrument_node="">
</span><li data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">enhance integrated civilian-military planning throughout the crisis spectrum, </span></li><span data-dcnode-id="768" instrument_node="">
</span><li data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">develop the capability to train and develop local forces in crisis zones, so that local authorities are able, as quickly as possible, to maintain security without international assistance; </span></li><span data-dcnode-id="765" instrument_node="">
</span><li data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">identify and train civilian specialists from member states, made available for rapid deployment by Allies for selected missions, able to work alongside our military personnel and civilian specialists from partner countries and institutions; </span></li><span data-dcnode-id="762" instrument_node="">
</span><li data-dcnode-id="759"><span data-dcnode-id="761" instrument_node="">broaden and intensify the political consultations among Allies, and with partners, both on a regular basis and in dealing with all stages of a crisis – before, during and after. </span><br data-dcnode-id="760"></li></ul></li></ol><span data-dcnode-id="755" instrument_node="">
</span><h4 data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Promoting International Security through Cooperation</span></h4><span data-dcnode-id="752" instrument_node="">
</span><h5 data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">Arms Control, Disarmament, and Non-Proliferation</span></h5><span data-dcnode-id="749" instrument_node="">
</span><ol data-dcnode-id="725" start="26"><span data-dcnode-id="748" instrument_node="">
</span><li data-dcnode-id="726"><span data-dcnode-id="747" instrument_node="">NATO seeks its security at the lowest possible level of forces. Arms control, disarmament and non-proliferation contribute to peace, security and stability, and should ensure undiminished security for all Alliance members. We will continue to play our part in reinforcing arms control and in promoting disarmament of both conventional weapons and weapons of mass destruction, as well as non-proliferation efforts: 
</span><ul data-dcnode-id="727"><span data-dcnode-id="746" instrument_node="">
</span><li data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">We are resolved to seek a safer world for all and to create the conditions for a world without nuclear weapons in accordance with the goals of the Nuclear Non-Proliferation Treaty, in a way that promotes international stability, and is based on the principle of undiminished security for all. </span></li><span data-dcnode-id="743" instrument_node="">
</span><li data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">With the changes in the security environment since the end of the Cold War, we have dramatically reduced the number of nuclear weapons stationed in Europe and our reliance on nuclear weapons in NATO strategy. We will seek to create the conditions for further reductions in the future. </span></li><span data-dcnode-id="740" instrument_node="">
</span><li data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">In any future reductions, our aim should be to seek Russian agreement to increase transparency on its nuclear weapons in Europe and relocate these weapons away from the territory of NATO members. Any further steps must take into account the disparity with the greater Russian stockpiles of short-range nuclear weapons. </span></li><span data-dcnode-id="737" instrument_node="">
</span><li data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">We are committed to conventional arms control, which provides predictability, transparency and a means to keep armaments at the lowest possible level for stability. We will work to strengthen the conventional arms control regime in Europe on the basis of reciprocity, transparency and host-nation consent. </span></li><span data-dcnode-id="734" instrument_node="">
</span><li data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">We will explore ways for our political means and military capabilities to contribute to international efforts to fight proliferation. </span></li><span data-dcnode-id="731" instrument_node="">
</span><li data-dcnode-id="728"><span data-dcnode-id="730" instrument_node="">National decisions regarding arms control and disarmament may have an impact on the security of all Alliance members. We are committed to maintain, and develop as necessary, appropriate consultations among Allies on these issues. </span><br data-dcnode-id="729"></li></ul></li></ol><span data-dcnode-id="724" instrument_node="">
</span><h5 data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Open Door</span></h5><span data-dcnode-id="721" instrument_node="">
</span><ol data-dcnode-id="712" start="27"><span data-dcnode-id="720" instrument_node="">
</span><li data-dcnode-id="713"><span data-dcnode-id="719" instrument_node="">NATO’s enlargement has contributed substantially to the security of Allies; the prospect of further enlargement and the spirit of cooperative security have advanced stability in Europe more broadly. Our goal of a Europe whole and free, and sharing common values, would be best served by the eventual integration of all European countries that so desire into Euro-Atlantic structures. 
</span><ul data-dcnode-id="714"><span data-dcnode-id="718" instrument_node="">
</span><li data-dcnode-id="715"><span data-dcnode-id="717" instrument_node="">The door to NATO membership remains fully open to all European democracies which share the values of our Alliance, which are willing and able to assume the responsibilities and obligations of membership, and whose inclusion can contribute to common security and stability. </span><br data-dcnode-id="716"></li></ul></li></ol><span data-dcnode-id="711" instrument_node="">
</span><h5 data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Partnerships </span></h5><span data-dcnode-id="708" instrument_node="">
</span><ol data-dcnode-id="622" start="28"><span data-dcnode-id="707" instrument_node="">
</span><li data-dcnode-id="704"><a data-dcnode-id="706" name="partners"></a><span data-dcnode-id="705" instrument_node="">The promotion of Euro-Atlantic security is best assured through a wide network of partner relationships with countries and organisations around the globe. These partnerships make a concrete and valued contribution to the success of NATO’s fundamental tasks. </span></li><span data-dcnode-id="703" instrument_node="">
</span><li data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Dialogue and cooperation with partners can make a concrete contribution to enhancing international security, to defending the values on which our Alliance is based, to NATO’s operations, and to preparing interested nations for membership of NATO. These relationships will be based on reciprocity, mutual benefit and mutual respect. </span></li><span data-dcnode-id="700" instrument_node="">
</span><li data-dcnode-id="685"><span data-dcnode-id="699" instrument_node="">We will enhance our partnerships through flexible formats that bring NATO and partners together – across and beyond existing frameworks: 
</span><ul data-dcnode-id="686"><span data-dcnode-id="698" instrument_node="">
</span><li data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">We are prepared to develop political dialogue and practical cooperation with any nations and relevant organisations across the globe that share our interest in peaceful international relations. </span></li><span data-dcnode-id="695" instrument_node="">
</span><li data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">We will be open to consultation with any partner country on security issues of common concern. </span></li><span data-dcnode-id="692" instrument_node="">
</span><li data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">We will give our operational partners a structural role in shaping strategy and decisions on NATO-led missions to which they contribute. </span></li><span data-dcnode-id="689" instrument_node="">
</span><li data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">We will further develop our existing partnerships while preserving their specificity.</span></li></ul></li><span data-dcnode-id="684" instrument_node="">
</span><li data-dcnode-id="672"><span data-dcnode-id="683" instrument_node="">Cooperation between NATO and the United Nations continues to make a substantial contribution to security in operations around the world. The Alliance aims to deepen political dialogue and practical cooperation with the UN, as set out in the UN-NATO Declaration signed in 2008, including through: 
</span><ul data-dcnode-id="673"><span data-dcnode-id="682" instrument_node="">
</span><li data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">enhanced liaison between the two Headquarters; </span></li><span data-dcnode-id="679" instrument_node="">
</span><li data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">more regular political consultation; and </span></li><span data-dcnode-id="676" instrument_node="">
</span><li data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">enhanced practical cooperation in managing crises where both organisations are engaged. </span></li></ul></li><span data-dcnode-id="671" instrument_node="">
</span><li data-dcnode-id="656"><span data-dcnode-id="670" instrument_node="">An active and effective European Union contributes to the overall security of the Euro-Atlantic area. Therefore the EU is a unique and essential partner for NATO. The two organisations share a majority of members, and all members of both organisations share common values. NATO recognizes the importance of a stronger and more capable European defence. We welcome the entry into force of the Lisbon Treaty, which provides a framework for strengthening the EU’s capacities to address common security challenges. Non-EU Allies make a significant contribution to these efforts. For the strategic partnership between NATO and the EU, their fullest involvement in these efforts is essential. NATO and the EU can and should play complementary and mutually reinforcing roles in supporting international peace and security. We are determined to make our contribution to create more favourable circumstances through which we will: 
</span><ul data-dcnode-id="657"><span data-dcnode-id="669" instrument_node="">
</span><li data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">fully strengthen the strategic partnership with the EU, in the spirit of full mutual openness, transparency, complementarity and respect for the autonomy and institutional integrity of both organisations; </span></li><span data-dcnode-id="666" instrument_node="">
</span><li data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">enhance our practical cooperation in operations throughout the crisis spectrum, from coordinated planning to mutual support in the field; </span></li><span data-dcnode-id="663" instrument_node="">
</span><li data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">broaden our political consultations to include all issues of common concern, in order to share assessments and perspectives; </span></li><span data-dcnode-id="660" instrument_node="">
</span><li data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">cooperate more fully in capability development, to minimise duplication and maximise cost-effectiveness.</span></li></ul></li><span data-dcnode-id="655" instrument_node="">
</span><li data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">NATO-Russia cooperation is of strategic importance as it contributes to creating a common space of peace, stability and security. NATO poses no threat to Russia. On the contrary: we want to see a true strategic partnership between NATO and Russia, and we will act accordingly, with the expectation of reciprocity from Russia. </span></li><span data-dcnode-id="652" instrument_node="">
</span><li data-dcnode-id="643"><span data-dcnode-id="651" instrument_node="">The NATO-Russia relationship is based upon the goals, principles and commitments of the NATO-Russia Founding Act and the Rome Declaration, especially regarding the respect of democratic principles and the sovereignty, independence and territorial integrity of all states in the Euro-Atlantic area. Notwithstanding differences on particular issues, we remain convinced that the security of NATO and Russia is intertwined and that a strong and constructive partnership based on mutual confidence, transparency and predictability can best serve our security. We are determined to: 
</span><ul data-dcnode-id="644"><span data-dcnode-id="650" instrument_node="">
</span><li data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">enhance the political consultations and practical cooperation with Russia in areas of shared interests, including missile defence, counter-terrorism, counter-narcotics, counter-piracy and the promotion of wider international security; </span></li><span data-dcnode-id="647" instrument_node="">
</span><li data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">use the full potential of the NATO-Russia Council for dialogue and joint action with Russia.</span></li></ul></li><span data-dcnode-id="642" instrument_node="">
</span><li data-dcnode-id="623"><span data-dcnode-id="641" instrument_node="">The Euro-Atlantic Partnership Council and Partnership for Peace are central to our vision of Europe whole, free and in peace. We are firmly committed to the development of friendly and cooperative relations with all countries of the Mediterranean, and we intend to further develop the Mediterranean Dialogue in the coming years. We attach great importance to peace and stability in the Gulf region, and we intend to strengthen our cooperation in the Istanbul Cooperation Initiative. We will aim to: 
</span><ul data-dcnode-id="624"><span data-dcnode-id="640" instrument_node="">
</span><li data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">enhance consultations and practical military cooperation with our partners in the Euro-Atlantic Partnership Council; </span></li><span data-dcnode-id="637" instrument_node="">
</span><li data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">continue and develop the partnerships with Ukraine and Georgia within the NATO-Ukraine and NATO-Georgia Commissions, based on the NATO decision at the Bucharest summit 2008, and taking into account the Euro-Atlantic orientation or aspiration of each of the countries; </span></li><span data-dcnode-id="634" instrument_node="">
</span><li data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">facilitate the Euro-Atlantic integration of the Western Balkans, with the aim to ensure lasting peace and stability based on democratic values, regional cooperation and good neighbourly relations; </span></li><span data-dcnode-id="631" instrument_node="">
</span><li data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">deepen the cooperation with current members of the Mediterranean Dialogue and be open to the inclusion in the Mediterranean Dialogue of other countries of the region; </span></li><span data-dcnode-id="628" instrument_node="">
</span><li data-dcnode-id="625"><span data-dcnode-id="627" instrument_node="">develop a deeper security partnership with our Gulf partners and remain ready to welcome new partners in the Istanbul Cooperation Initiative.</span><br data-dcnode-id="626"></li></ul></li></ol><span data-dcnode-id="621" instrument_node="">
</span><h5 data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Reform and Transformation</span></h5><span data-dcnode-id="618" instrument_node="">
</span><ol data-dcnode-id="594" start="36"><span data-dcnode-id="617" instrument_node="">
</span><li data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Unique in history, NATO is a security Alliance that fields military forces able to operate together in any environment; that can control operations anywhere through its integrated military command structure; and that has at its disposal core capabilities that few Allies could afford individually. </span></li><span data-dcnode-id="614" instrument_node="">
</span><li data-dcnode-id="595"><span data-dcnode-id="613" instrument_node="">NATO must have sufficient resources – financial, military and human – to carry out its missions, which are essential to the security of Alliance populations and territory. Those resources must, however, be used in the most efficient and effective way possible. We will: 
</span><ul data-dcnode-id="596"><span data-dcnode-id="612" instrument_node="">
</span><li data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">maximise the deployability of our forces, and their capacity to sustain operations in the field, including by undertaking focused efforts to meet NATO’s usability targets; </span></li><span data-dcnode-id="609" instrument_node="">
</span><li data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">ensure the maximum coherence in defence planning, to reduce unnecessary duplication, and to focus our capability development on modern requirements; </span></li><span data-dcnode-id="606" instrument_node="">
</span><li data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">develop and operate capabilities jointly, for reasons of cost-effectiveness and as a manifestation of solidarity; </span></li><span data-dcnode-id="603" instrument_node="">
</span><li data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">preserve and strengthen the common capabilities, standards, structures and funding that bind us together; </span></li><span data-dcnode-id="600" instrument_node="">
</span><li data-dcnode-id="597"><span data-dcnode-id="599" instrument_node="">engage in a process of continual reform, to streamline structures, improve working methods and maximise efficiency.</span><br data-dcnode-id="598"></li></ul></li></ol><span data-dcnode-id="593" instrument_node="">
</span><h5 data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">An Alliance for the 21st Century</span></h5><span data-dcnode-id="590" instrument_node="">
</span><ol data-dcnode-id="586" start="38"><span data-dcnode-id="589" instrument_node="">
</span><li data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">We, the political leaders of NATO, are determined to continue renewal of our Alliance so that it is fit for purpose in addressing the 21st Century security challenges. We are firmly committed to preserve its effectiveness as the globe’s most successful political-military Alliance. Our Alliance thrives as a source of hope because it is based on common values of individual liberty, democracy, human rights and the rule of law, and because our common essential and enduring purpose is to safeguard the freedom and security of its members. These values and objectives are universal and perpetual, and we are determined to defend them through unity, solidarity, strength and resolve.</span></li></ol><span data-dcnode-id="585" instrument_node="">
</span></div><span data-dcnode-id="583" instrument_node="">
</span></section><span data-dcnode-id="580" instrument_node="">
</span></div><span data-dcnode-id="577" instrument_node="">
</span><span data-dcnode-id="575" instrument_node="">
</span><aside class="col colspan-4 colspan-m-12 colspan-s-12 sidebar" data-dcnode-id="485"><span data-dcnode-id="574" instrument_node="">
</span><section class="teaser" data-dcnode-id="554"><span data-dcnode-id="573" instrument_node="">
</span><header data-dcnode-id="566"><span data-dcnode-id="572" instrument_node="">
</span><h1 data-dcnode-id="568"><span data-dcnode-id="571" instrument_node="">
</span><span class="icon icon-text" data-dcnode-id="570"></span><span data-dcnode-id="569" instrument_node="">
      From the event
    </span></h1><span data-dcnode-id="567" instrument_node="">
