</span></div><span class="marker before-article" data-dcnode-id="1701"></span><div class="md-sentinel--spy-target" data-dcnode-id="1700"></div><section data-dcnode-id="1634" data-has-spy="true" data-level="1" id="ref1"><p class="topic-paragraph" data-dcnode-id="1662"><strong data-dcnode-id="1697"><span data-dcnode-id="1699" id="ref251399"></span><span data-dcnode-id="1698" instrument_node="">Central Treaty Organization (CENTO)</span></strong><span data-dcnode-id="1696" instrument_node="">, formerly </span><strong data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Middle East Treaty Organization</span></strong><span data-dcnode-id="1693" instrument_node="">, or </span><strong data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">Baghdad Pact Organization</span></strong><span data-dcnode-id="1690" instrument_node="">,  mutual security organization dating from 1955 to 1979 and composed of </span><span data-dcnode-id="1689" id="ref251400"></span><a class="md-crosslink" data-dcnode-id="1688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/history-of-Turkey"></a><a class="md-crosslink autoxref" data-dcnode-id="1686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Turkey"><span data-dcnode-id="1687" instrument_node="">Turkey</span></a><span data-dcnode-id="1685" instrument_node="">, </span><span data-dcnode-id="1684" id="ref251401"></span><a class="md-crosslink" data-dcnode-id="1682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/history-of-Iran"><span data-dcnode-id="1683" instrument_node="">Iran</span></a><span data-dcnode-id="1681" instrument_node="">, </span><span data-dcnode-id="1680" id="ref251402"></span><a class="md-crosslink" data-dcnode-id="1678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/history-of-Pakistan"><span data-dcnode-id="1679" instrument_node="">Pakistan</span></a><span data-dcnode-id="1677" instrument_node="">, and the </span><span data-dcnode-id="1676" id="ref251403"></span><a class="md-crosslink" data-dcnode-id="1674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/history-of-United-Kingdom"><span data-dcnode-id="1675" instrument_node="">United Kingdom</span></a><span data-dcnode-id="1673" instrument_node="">. Until March 1959 the organization was known as the </span><a class="md-crosslink autoxref" data-dcnode-id="1671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Middle-East"><span data-dcnode-id="1672" instrument_node="">Middle East</span></a><span data-dcnode-id="1670" instrument_node=""> Treaty Organization, included </span><span data-dcnode-id="1669" id="ref251404"></span><a class="md-crosslink" data-dcnode-id="1667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/history-of-Iraq"><span data-dcnode-id="1668" instrument_node="">Iraq</span></a><span data-dcnode-id="1666" instrument_node="">, and had its headquarters in </span><a class="md-crosslink autoxref" data-dcnode-id="1664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Baghdad"><span data-dcnode-id="1665" instrument_node="">Baghdad</span></a><span data-dcnode-id="1663" instrument_node="">.</span></p><span class="marker p1" data-dcnode-id="1660"></span><span class="marker AM1 am-inline" data-dcnode-id="1658"></span><span class="marker MOD1 mod-inline" data-dcnode-id="1656"></span><p class="topic-paragraph" data-dcnode-id="1641"><span data-dcnode-id="1655" instrument_node="">Formed at the </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="1653" data-term="urging" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/urging"><span data-dcnode-id="1654" instrument_node="">urging</span></a><span data-dcnode-id="1652" instrument_node=""> of </span><a class="md-crosslink autoxref" data-dcnode-id="1650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/United-Kingdom"><span data-dcnode-id="1651" instrument_node="">Britain</span></a><span data-dcnode-id="1649" instrument_node=""> and the United States, the Central Treaty Organization was intended to counter the threat of Soviet expansion into vital Middle East oil-producing regions. It was never very effective. Iraq withdrew from the alliance in 1959 after its anti-Soviet monarchy was overthrown. That same year the </span><span data-dcnode-id="1648" id="ref251405"></span><a class="md-crosslink" data-dcnode-id="1646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/history-of-United-States"><span data-dcnode-id="1647" instrument_node="">United States</span></a><span data-dcnode-id="1645" instrument_node=""> became an associate member, the name of the organization was changed to CENTO, and its headquarters was moved to </span><a class="md-crosslink autoxref" data-dcnode-id="1643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Ankara"><span data-dcnode-id="1644" instrument_node="">Ankara</span></a><span data-dcnode-id="1642" instrument_node="">. Following the fall of the shah in 1979, Iran withdrew, and CENTO was dissolved.</span></p><span class="marker p2" data-dcnode-id="1639"></span><span class="marker AM2 am-inline" data-dcnode-id="1637"></span><span class="marker MOD2 mod-inline" data-dcnode-id="1635"></span></section><span data-dcnode-id="1633" instrument_node="">

</span></div><span class="marker before-article" data-dcnode-id="1122"></span><div class="md-sentinel--spy-target" data-dcnode-id="1121"></div><section data-dcnode-id="1092" data-has-spy="true" data-level="1" id="ref1"><p class="topic-paragraph" data-dcnode-id="1099"><strong data-dcnode-id="1118"><span data-dcnode-id="1120" id="ref220466"></span><span data-dcnode-id="1119" instrument_node="">John Foster Dulles</span></strong><span data-dcnode-id="1117" instrument_node="">,  (born Feb. 25, 1888, Washington, D.C.—died May 24, 1959, Washington, D.C.), U.S. secretary of state (1953–59) under President Dwight D. </span><span data-dcnode-id="1116" id="ref220467"></span><a class="md-crosslink" data-dcnode-id="1114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Dwight-D-Eisenhower"><span data-dcnode-id="1115" instrument_node="">Eisenhower</span></a><span data-dcnode-id="1113" instrument_node="">. He was the architect of many major elements of U.S. </span><a class="md-crosslink autoxref" data-dcnode-id="1111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/foreign-policy"><span data-dcnode-id="1112" instrument_node="">foreign policy</span></a><span data-dcnode-id="1110" instrument_node=""> in the </span><span data-dcnode-id="1109" id="ref220468"></span><a class="md-crosslink" data-dcnode-id="1107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/event/Cold-War"><span data-dcnode-id="1108" instrument_node="">Cold War</span></a><span data-dcnode-id="1106" instrument_node=""> with the </span><a class="md-crosslink autoxref" data-dcnode-id="1104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Soviet-Union"><span data-dcnode-id="1105" instrument_node="">Soviet Union</span></a><span data-dcnode-id="1103" instrument_node=""> after </span><a class="md-crosslink autoxref" data-dcnode-id="1101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/event/World-War-II"><span data-dcnode-id="1102" instrument_node="">World War II</span></a><span data-dcnode-id="1100" instrument_node="">.</span></p><span class="marker p1" data-dcnode-id="1097"></span><span class="marker AM1 am-inline" data-dcnode-id="1095"></span><span class="marker MOD1 mod-inline" data-dcnode-id="1093"></span></section><span data-dcnode-id="1091" instrument_node="">
</span><span class="marker h2" data-dcnode-id="1089"></span><div class="md-sentinel--spy-target" data-dcnode-id="1088"></div><section data-dcnode-id="1002" data-has-spy="true" data-level="1" id="ref1935"><h2 class="h1" data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Early career</span></h2><span data-dcnode-id="1084" instrument_node="">
</span><p class="topic-paragraph" data-dcnode-id="1070"><span data-dcnode-id="1083" instrument_node="">Dulles was one of five children of Allen Macy and Edith (Foster) Dulles. His maternal grandfather was </span><a class="md-crosslink autoxref" data-dcnode-id="1081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/John-W-Foster"><span data-dcnode-id="1082" instrument_node="">John Watson Foster</span></a><span data-dcnode-id="1080" instrument_node="">, who served as secretary of state under President </span><a class="md-crosslink autoxref" data-dcnode-id="1078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Benjamin-Harrison-president-of-United-States"><span data-dcnode-id="1079" instrument_node="">Benjamin Harrison</span></a><span data-dcnode-id="1077" instrument_node="">. </span><a class="md-crosslink autoxref" data-dcnode-id="1075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Robert-Lansing"><span data-dcnode-id="1076" instrument_node="">Robert Lansing</span></a><span data-dcnode-id="1074" instrument_node="">, Dulles’ uncle by marriage, was secretary of state in the Cabinet of President </span><a class="md-crosslink autoxref" data-dcnode-id="1072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Woodrow-Wilson"><span data-dcnode-id="1073" instrument_node="">Woodrow Wilson</span></a><span data-dcnode-id="1071" instrument_node="">.</span></p><span class="marker p2" data-dcnode-id="1068"></span><span class="marker AM2 am-inline" data-dcnode-id="1066"></span><span class="marker MOD2 mod-inline" data-dcnode-id="1064"></span><span data-dcnode-id="1063" instrument_node="">
</span><p class="topic-paragraph" data-dcnode-id="1049"><span data-dcnode-id="1062" instrument_node="">Dulles was educated in the public schools of </span><a class="md-crosslink autoxref" data-dcnode-id="1060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Watertown-New-York"><span data-dcnode-id="1061" instrument_node="">Watertown</span></a><span data-dcnode-id="1059" instrument_node="">, N.Y., where his father served as a Presbyterian minister. A brilliant student, he attended Princeton and </span><a class="md-crosslink autoxref" data-dcnode-id="1057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/George-Washington"><span data-dcnode-id="1058" instrument_node="">George Washington</span></a><span data-dcnode-id="1056" instrument_node=""> universities and the Sorbonne, and in 1911 he entered the </span><a class="md-crosslink autoxref" data-dcnode-id="1054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/New-York-state"><span data-dcnode-id="1055" instrument_node="">New York</span></a><span data-dcnode-id="1053" instrument_node=""> law firm of Sullivan and Cromwell, specializing in </span><a class="md-crosslink autoxref" data-dcnode-id="1051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/international-law"><span data-dcnode-id="1052" instrument_node="">international law</span></a><span data-dcnode-id="1050" instrument_node="">. By 1927 he was head of the firm.</span></p><span class="marker p3" data-dcnode-id="1047"></span><span class="marker AM3 am-inline" data-dcnode-id="1045"></span><span class="marker MOD3 mod-inline" data-dcnode-id="1043"></span><span data-dcnode-id="1042" instrument_node="">
</span><p class="topic-paragraph" data-dcnode-id="1031"><span data-dcnode-id="1041" instrument_node="">But Dulles, who never lost sight of his goal of becoming secretary of state, actually started his diplomatic career in 1907 when, aged 19, he accompanied his grandfather John Foster, then a private citizen representing China, to the second international peace conference at The Hague. At 30 years of age Dulles was named by President Woodrow Wilson as legal </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="1039" data-term="counsel" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/counsel"><span data-dcnode-id="1040" instrument_node="">counsel</span></a><span data-dcnode-id="1038" instrument_node=""> to the U.S. delegation to the Versailles Peace Conference, at the end of </span><a class="md-crosslink autoxref" data-dcnode-id="1036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/event/World-War-I"><span data-dcnode-id="1037" instrument_node="">World War I</span></a><span data-dcnode-id="1035" instrument_node="">, and afterward he served as a member of the </span><a class="md-crosslink autoxref" data-dcnode-id="1033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/reparations"><span data-dcnode-id="1034" instrument_node="">war reparations</span></a><span data-dcnode-id="1032" instrument_node=""> commission.</span></p><span class="marker p4" data-dcnode-id="1029"></span><span class="marker AM4 am-inline" data-dcnode-id="1027"></span><span class="marker MOD4 mod-inline" data-dcnode-id="1025"></span><span data-dcnode-id="1024" instrument_node="">
</span><p class="topic-paragraph" data-dcnode-id="1009"><span data-dcnode-id="1023" instrument_node="">In World War II, Dulles helped prepare the </span><span data-dcnode-id="1022" id="ref220469"></span><a class="md-crosslink" data-dcnode-id="1020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Charter-of-the-United-Nations"><span data-dcnode-id="1021" instrument_node="">United Nations charter</span></a><span data-dcnode-id="1019" instrument_node=""> at Dumbarton Oaks, in Washington, </span><a class="md-crosslink autoxref" data-dcnode-id="1017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Washington-DC"><span data-dcnode-id="1018" instrument_node="">D.C.</span></a><span data-dcnode-id="1016" instrument_node="">, and in 1945 served as a senior adviser at the San Francisco United Nations conference. When it became apparent that a peace treaty with Japan acceptable to the </span><a class="md-crosslink autoxref" data-dcnode-id="1014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/United-States"><span data-dcnode-id="1015" instrument_node="">United States</span></a><span data-dcnode-id="1013" instrument_node=""> could not be concluded with the participation of the Soviet Union, President Harry Truman and his secretary of state, </span><a class="md-crosslink autoxref" data-dcnode-id="1011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Dean-Acheson"><span data-dcnode-id="1012" instrument_node="">Dean Acheson</span></a><span data-dcnode-id="1010" instrument_node="">, decided not to call a peace conference to negotiate the treaty. Instead, they assigned to Dulles the difficult task of personally negotiating and concluding the treaty. Dulles traveled to the capitals of many of the nations involved, and in 1951 the previously agreed to treaty was signed in San Francisco by Japan and 48 other nations. In 1949 Dulles was appointed U.S. senator from New York to fill a vacancy, but he served for only four months before being defeated in the 1950 election.</span></p><span class="marker p5" data-dcnode-id="1007"></span><span class="marker AM5 am-inline" data-dcnode-id="1005"></span><span class="marker MOD5 mod-inline" data-dcnode-id="1003"></span></section><span data-dcnode-id="1001" instrument_node="">
</span><span class="marker h3" data-dcnode-id="999"></span><div class="md-sentinel--spy-target" data-dcnode-id="998"></div><section data-dcnode-id="849" data-has-spy="true" data-level="1" id="ref1936"><h2 class="h1" data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Secretary of state</span></h2><span data-dcnode-id="994" instrument_node="">
</span><p class="topic-paragraph" data-dcnode-id="983"><span data-dcnode-id="993" instrument_node="">Emboldened by his </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="991" data-term="formidable" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/formidable"><span data-dcnode-id="992" instrument_node="">formidable</span></a><span data-dcnode-id="990" instrument_node=""> achievements, Dulles viewed his appointment as secretary of state by President Eisenhower, in January 1953, as a </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="988" data-term="mandate" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/mandate"><span data-dcnode-id="989" instrument_node="">mandate</span></a><span data-dcnode-id="987" instrument_node=""> to originate foreign policy. “The State Department,” Dulles once told an aide, “can only keep control of foreign policy as long as we have ideas.” A man bent on realizing his ideas, he was an </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="985" data-term="assiduous" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/assiduous"><span data-dcnode-id="986" instrument_node="">assiduous</span></a><span data-dcnode-id="984" instrument_node=""> planner, and, once he enjoyed President Eisenhower’s complete confidence, policy planning flourished during his administration.</span></p><span class="marker p6" data-dcnode-id="981"></span><div class="assemblies" data-dcnode-id="966"><div class="w-100" data-dcnode-id="967"><figure class="md-assembly card print-false" data-assembly-id="97103" data-dcnode-id="968"><div class="md-assembly-wrapper card-media" data-dcnode-id="976" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="977" data-href="/media/1/173368/97103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/10/79810-050-AC800049/John-Foster-Dulles-1952.jpg" style="--aspect-ratio: 16/9"><img alt="Dulles, John Foster" data-dcnode-id="980" data-height="1600" data-width="1205" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/10/79810-050-AC800049/John-Foster-Dulles-1952.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="978"><em class="material-icons link-blue" data-dcnode-id="979" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="969"><a class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif media-overlay-link" data-dcnode-id="974" data-href="/media/1/173368/97103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/10/79810-050-AC800049/John-Foster-Dulles-1952.jpg"><span data-dcnode-id="975" instrument_node="">Dulles, John Foster</span></a><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">John Foster Dulles, 1952.</span></div><cite class="credit d-block mt-5" data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Encyclopædia Britannica, Inc.</span></cite></figcaption></figure></div></div><span class="marker AM6 am-inline" data-dcnode-id="964"></span><span class="marker MOD6 mod-inline" data-dcnode-id="962"></span><span data-dcnode-id="961" instrument_node="">
</span><div class="assemblies" data-dcnode-id="951"><div class="w-100" data-dcnode-id="952"><figure class="md-assembly card print-false" data-assembly-id="155297" data-dcnode-id="953"><div class="md-assembly-wrapper card-media" data-dcnode-id="959" data-type="audio"><audio controls="" data-dcnode-id="960" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/60/70160-005-76C1B61E/John-Foster-Dulles-Viet-Minh-forces-base-May-7-1954.mp3&amp;raw" type="audio/mpeg"></audio></div><figcaption class="card-body" data-dcnode-id="954"><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">John Foster Dulles speaking shortly after Viet Minh forces overran a French base in Dien Bien Phu, Viet., on May 7, 1954; the Viet Minh victory in the battle effectively ended the first Indochina War (1946–54).</span></div><cite class="credit d-block mt-5" data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Public Domain</span></cite></figcaption></figure></div></div><span class="marker AM6 am-inline" data-dcnode-id="949"></span><span class="marker MOD6 mod-inline" data-dcnode-id="947"></span><p class="topic-paragraph" data-dcnode-id="926"><span data-dcnode-id="946" instrument_node="">Dulles, fully aware that the </span><a class="md-crosslink autoxref" data-dcnode-id="944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/North-Atlantic-Treaty-Organization"><span data-dcnode-id="945" instrument_node="">North Atlantic Treaty Organization</span></a><span data-dcnode-id="943" instrument_node=""> (NATO) would be effective only for the defense of western Europe, leaving the </span><a class="md-crosslink autoxref" data-dcnode-id="941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Middle-East"><span data-dcnode-id="942" instrument_node="">Middle East</span></a><span data-dcnode-id="940" instrument_node="">, the Far East, and the Pacific islands unprotected, was eager to fill these gaps. He initiated the </span><span data-dcnode-id="939" id="ref220470"></span><span data-dcnode-id="938" instrument_node="">Manila conference in 1954, which resulted in the </span><span data-dcnode-id="937" id="ref220471"></span><a class="md-crosslink" data-dcnode-id="935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Southeast-Asia-Treaty-Organization"><span data-dcnode-id="936" instrument_node="">Southeast Asia Treaty Organization</span></a><span data-dcnode-id="934" instrument_node=""> (SEATO) pact that united eight nations either located in Southeast Asia or with interests there in a neutral defense pact. This treaty was followed in 1955 by the Baghdad Pact, later renamed the </span><span data-dcnode-id="933" id="ref220472"></span><a class="md-crosslink" data-dcnode-id="931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Central-Treaty-Organization"><span data-dcnode-id="932" instrument_node="">Central Treaty Organization</span></a><span data-dcnode-id="930" instrument_node=""> (CENTO), uniting the so-called northern </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="928" data-term="tier" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/tier"><span data-dcnode-id="929" instrument_node="">tier</span></a><span data-dcnode-id="927" instrument_node=""> countries of the Middle East—Turkey, Iraq, Iran, and Pakistan—in a defense organization.</span></p><span class="marker p7" data-dcnode-id="924"></span><span class="marker AM7 am-inline" data-dcnode-id="922"></span><span class="marker MOD7 mod-inline" data-dcnode-id="920"></span><span data-dcnode-id="919" instrument_node="">
</span><p class="topic-paragraph" data-dcnode-id="909"><span data-dcnode-id="918" instrument_node="">In Europe, Dulles was instrumental in putting into final form the </span><span data-dcnode-id="917" id="ref220473"></span><a class="md-crosslink" data-dcnode-id="915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Austrian-State-Treaty"><span data-dcnode-id="916" instrument_node="">Austrian State Treaty</span></a><span data-dcnode-id="914" instrument_node=""> (1955), restoring Austria’s pre-1938 frontiers and forbidding a future union between Germany and Austria, and the </span><span data-dcnode-id="913" id="ref220474"></span><a class="md-crosslink" data-dcnode-id="911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Trieste-agreement"><span data-dcnode-id="912" instrument_node="">Trieste agreement</span></a><span data-dcnode-id="910" instrument_node=""> (1954), providing for partition of the free territory between Italy and Yugoslavia.</span></p><span class="marker p8" data-dcnode-id="907"></span><span class="marker AM8 am-inline" data-dcnode-id="905"></span><span class="marker MOD8 mod-inline" data-dcnode-id="903"></span><span data-dcnode-id="902" instrument_node="">
</span><p class="topic-paragraph" data-dcnode-id="883"><span data-dcnode-id="901" instrument_node="">Three factors determined Dulles’ foreign policy: his profound detestation of Communism, which was in part based on his deep religious faith; his powerful personality, which often insisted on leading rather than following public opinion; and his strong belief, as an international lawyer, in the value of treaties. Of the three, passionate hostility to Communism was the leitmotiv of his policy. Wherever he went, he carried with him </span><a class="md-crosslink autoxref" data-dcnode-id="899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Joseph-Stalin"><span data-dcnode-id="900" instrument_node="">Joseph Stalin’s</span></a><span data-dcnode-id="898" instrument_node=""> </span><em data-dcnode-id="894"><span data-dcnode-id="897" id="ref220475"></span><a class="md-crosslink" data-dcnode-id="895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Problems-of-Leninism"><span data-dcnode-id="896" instrument_node="">Problems of Leninism</span></a></em><span data-dcnode-id="893" instrument_node=""> and impressed upon his aides the need to study it as a </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="891" data-term="blueprint" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/blueprint"><span data-dcnode-id="892" instrument_node="">blueprint</span></a><span data-dcnode-id="890" instrument_node=""> for conquest similar to </span><a class="md-crosslink autoxref" data-dcnode-id="888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Adolf-Hitler"><span data-dcnode-id="889" instrument_node="">Adolf Hitler’s</span></a><span data-dcnode-id="887" instrument_node=""> </span><em data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Mein Kampf.</span></em><span data-dcnode-id="884" instrument_node=""> He seemed to derive personal satisfaction from pushing the Soviet Union to the brink. In fact, in 1956 he wrote in a magazine article that “if you are scared to go to the brink, you are lost.” Once, during the Austrian State Treaty negotiations, he refused to compromise on some minor points, even though the Austrians themselves pleaded with him to do so for fear the Soviets would walk out. Dulles stood his ground, and the Soviets yielded.</span></p><span class="marker p9" data-dcnode-id="881"></span><span class="marker AM9 am-inline" data-dcnode-id="879"></span><span class="marker MOD9 mod-inline" data-dcnode-id="877"></span><span data-dcnode-id="876" instrument_node="">
</span><p class="topic-paragraph" data-dcnode-id="856"><span data-dcnode-id="875" instrument_node="">But Dulles could be equally </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="873" data-term="intransigent" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/intransigent"><span data-dcnode-id="874" instrument_node="">intransigent</span></a><span data-dcnode-id="872" instrument_node=""> with the allies of the United States. His insistence upon the establishment of the </span><span data-dcnode-id="871" id="ref220476"></span><a class="md-crosslink" data-dcnode-id="869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/European-Defense-Community"><span data-dcnode-id="870" instrument_node="">European Defense Community</span></a><span data-dcnode-id="868" instrument_node=""> (EDC) threatened to polarize the free world, when in 1953 he announced that failure to ratify EDC by France would result in an “agonizing reappraisal” of the United States’ relations with France. That expression, and Dulles’ announcement in a Paris speech that the United States would react with “massive </span><span data-dcnode-id="867" id="ref220477"></span><a class="md-crosslink" data-dcnode-id="865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/nuclear-weapon"><span data-dcnode-id="866" instrument_node="">nuclear</span></a><span data-dcnode-id="864" instrument_node=""> retaliation” to any Soviet aggression, found a permanent place in the vocabulary of U.S. foreign policy. It can also be argued that Dulles’ </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="862" data-term="brusque" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/brusque"><span data-dcnode-id="863" instrument_node="">brusque</span></a><span data-dcnode-id="861" instrument_node=""> rejection in July 1956 of the Egyptian president </span><span data-dcnode-id="860" id="ref220478"></span><a class="md-crosslink" data-dcnode-id="858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Gamal-Abdel-Nasser"><span data-dcnode-id="859" instrument_node="">Gamal Abdel Nasser</span></a><span data-dcnode-id="857" instrument_node="">’s request for aid in building the Aswān Dam was the beginning of the end of the influence that the U.S. had exerted in the Middle East. In a complete reversal of his former pro-Egyptian policy, Dulles claimed that Nasser was “nothing but a tin-horn Hitler.” Although Dulles later conceded that his refusal could have been more subtle, he never wavered in his belief that Nasser, who had already purchased arms from the Soviet bloc, was bound to turn decisively against the U.S. because he felt that he had the Soviet Union on his side.</span></p><span class="marker p10" data-dcnode-id="854"></span><span class="marker AM10 am-inline" data-dcnode-id="852"></span><span class="marker MOD10 mod-inline" data-dcnode-id="850"></span></section><span data-dcnode-id="848" instrument_node="">
</span><span class="marker h4" data-dcnode-id="846"></span><div class="md-sentinel--spy-target" data-dcnode-id="845"></div><section data-dcnode-id="822" data-has-spy="true" data-level="1" id="ref1937"><h2 class="h1" data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Legacy</span></h2><span data-dcnode-id="841" instrument_node="">
</span><p class="topic-paragraph" data-dcnode-id="833"><span data-dcnode-id="840" instrument_node="">Dulles’ detractors in the U.S. and abroad viewed him as harsh, inflexible, and a tactician, rather than an architect of international diplomacy. But President Eisenhower ignored all </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="838" data-term="criticisms" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/criticisms"><span data-dcnode-id="839" instrument_node="">criticisms</span></a><span data-dcnode-id="837" instrument_node="">. He said of his secretary of state, “He is one of the truly great men of our time.” Whatever their opinion of the man and his policies, many leading statesmen of the non-Communist nations have credited his firmness with having checkmated Communist Cold War </span><a class="md-crosslink autoxref" data-dcnode-id="835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/strategy-military"><span data-dcnode-id="836" instrument_node="">strategy</span></a><span data-dcnode-id="834" instrument_node="">. Seriously ill with cancer, Dulles resigned his Cabinet position on April 15, 1959. Shortly before he died in the following month, he was awarded the Medal of Freedom.</span></p><span class="marker p11" data-dcnode-id="831"></span><span class="marker AM11 am-inline" data-dcnode-id="829"></span><span class="marker MOD11 mod-inline" data-dcnode-id="827"></span><span data-dcnode-id="826" instrument_node="">
</span><span class="md-signature" data-dcnode-id="823"><a data-dcnode-id="824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/contributor/Edward-Weintal/3148"><span data-dcnode-id="825" instrument_node="">Edward Weintal</span></a></span></section><span data-dcnode-id="821" instrument_node="">
