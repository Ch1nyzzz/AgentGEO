ue" class="icon-ic_search search_icon" data-dcnode-id="2332" role="presentation"></span><input class="document_search" data-dcnode-id="2331" id="document_search" name="document_search" placeholder="Search document" type="text" value=""></div></label></div></div></div><div class="wrapper__doc_page_webpack_doc_page_shared_tooltips_tooltip tooltip_component" data-dcnode-id="2322"><button aria-label="Fullscreen" class="wrapper__text_button fullscreen_button" data-dcnode-id="2323" data-e2e="text-button" type="button"><span class="font_icon_container" data-dcnode-id="2324"><span aria-hidden="true" class="icon icon-ic_fullscreen_window" data-dcnode-id="2325"></span></span></button></div></div></div><div class="document_container is_bot blurred_page" data-dcnode-id="2129"><h1 data-dcnode-id="2318"><span data-dcnode-id="2319" instrument_node="">We affirm the resolution Resolved: On balance, Turkey’s membership is beneficial to the</span></h1><p data-dcnode-id="2317"></p><h2 data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">North Atlantic Treaty Organization.</span></h2><p data-dcnode-id="2314"></p><p data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node="">Framework: lives</span></p><p data-dcnode-id="2311"></p><h2 data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">Contention one Russian deterrent:</span></h2><p data-dcnode-id="2308"></p><p data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">Uniqueness:</span></p><p data-dcnode-id="2296"><span data-dcnode-id="2305" instrument_node="">Aydogan, ‘21: Since becoming a NATO member in 1952 Turkey has been one of the alliance's</span><br data-dcnode-id="2304"><span data-dcnode-id="2303" instrument_node="">biggest contributing partners, with its second-largest army. Turkey remains as an "important</span><br data-dcnode-id="2302"><span data-dcnode-id="2301" instrument_node="">NATO ally," as stated by the alliance's secretary-general. You can just look at the map and</span><br data-dcnode-id="2300"><span data-dcnode-id="2299" instrument_node="">realize the importance of these lands, the landmass of Turkey. And also the only country, the</span><br data-dcnode-id="2298"><span data-dcnode-id="2297" instrument_node="">only NATO Ally that borders Iraq and Syria,"</span></p><p data-dcnode-id="2286"><span data-dcnode-id="2295" instrument_node="">Cakar states: Turkey’s unique location provides certain leverages for international influence.</span><br data-dcnode-id="2294"><span data-dcnode-id="2293" instrument_node="">Turkey is centrally situated between Europe, where much of the world’s political and economic</span><br data-dcnode-id="2292"><span data-dcnode-id="2291" instrument_node="">power is concentrated, and Asia, Turkey fully supports the Middle East Peace Process by</span><br data-dcnode-id="2290"><span data-dcnode-id="2289" instrument_node="">maintaining a balanced position that considers Turkey’s importance derives from the following</span><br data-dcnode-id="2288"><span data-dcnode-id="2287" instrument_node="">factors: it stabilizes the Black Sea region it controls the Straits</span></p><p data-dcnode-id="2278"><span data-dcnode-id="2285" instrument_node="">Kicking Turkey out of NATO means Turkey will align with Russia</span><br data-dcnode-id="2284"><span data-dcnode-id="2283" instrument_node="">Pry ‘19</span><br data-dcnode-id="2282"><span data-dcnode-id="2281" instrument_node="">  kick[ing] Turkey out of NATO [would] have its military power and strategic geography aligned with Russia .</span><br data-dcnode-id="2280"><span data-dcnode-id="2279" instrument_node="">Do we really want to            and                                                                        ?</span></p><p data-dcnode-id="2272"><span data-dcnode-id="2277" instrument_node="">First: Russian Aggression is INEVITABLE – Internal economic and political pressures combine</span><br data-dcnode-id="2276"><span data-dcnode-id="2275" instrument_node="">with a history of Russian warfighting to satiate(say-she-ate) domestic concerns. Under these</span><br data-dcnode-id="2274"><span data-dcnode-id="2273" instrument_node="">conditions, raising the cost of warfare through a Turkish outpost is a necessary deterrent.</span></p><p data-dcnode-id="2268"><span data-dcnode-id="2271" instrument_node="">Rosu, 2021 (Cristian, “How real is the Russian threat to the Baltic States?”, New Europe,</span><br data-dcnode-id="2270"><span data-dcnode-id="2269" instrument_node="">https://www.neweurope.eu/article/how-real-is-the-russian-threat-to-the-baltic-states/)</span></p><p data-dcnode-id="2256"><span data-dcnode-id="2267" instrument_node="">“During Georgia and Ukraine Russia demonstrated resolve in using brute force within</span><br data-dcnode-id="2266"><span data-dcnode-id="2265" instrument_node="">manageable risks. no military answer from NATO helped fuel the Kremlin’s confidence to carry</span><br data-dcnode-id="2264"><span data-dcnode-id="2263" instrument_node="">out warfare abroad.. Russia’s internal complexities push the Kremlin to search for temporary</span><br data-dcnode-id="2262"><span data-dcnode-id="2261" instrument_node="">solutions. Whenever Putin wants to relieve social pressure, he organizes a war offering the</span><br data-dcnode-id="2260"><span data-dcnode-id="2259" instrument_node="">prospect of a new Empire in the face of growing unrest.. The turmoil caused by COVID-19 to</span><br data-dcnode-id="2258"><span data-dcnode-id="2257" instrument_node="">Russia’s economy has overlapped with growing concerns over perpetual grip on power”</span></p><p data-dcnode-id="2248"><span data-dcnode-id="2255" instrument_node="">Next this aggression could easily lead to a Russian invasion of the eastern flank</span><br data-dcnode-id="2254"><span data-dcnode-id="2253" instrument_node="">fNardelli, 2021 (albero, “U.S. Warns Europe That Russia May Be Planning Ukraine Invasion”,</span><br data-dcnode-id="2252"><span data-dcnode-id="2251" instrument_node="">Bloomberg,https://www.bloomberg.com/news/articles/2021-11-11/u-s-warns-europe-that-</span><br data-dcnode-id="2250"><span data-dcnode-id="2249" instrument_node="">russian-troops-may-plan-ukraine-invasion)</span></p><p data-dcnode-id="2238"><span data-dcnode-id="2247" instrument_node="">The U.S. is raising the alarm with European Union allies that Russia may be weighing a</span><br data-dcnode-id="2246"><span data-dcnode-id="2245" instrument_node="">potential invasion of Ukraine as tensions flare between Moscow and the bloc over migrants and</span><br data-dcnode-id="2244"><span data-dcnode-id="2243" instrument_node="">energy supplies. With Washington closely monitoring a buildup of Russian forces near the</span><br data-dcnode-id="2242"><span data-dcnode-id="2241" instrument_node="">Ukrainian border, U.S. officials have briefed EU counterparts on their concerns over a possible</span><br data-dcnode-id="2240"><span data-dcnode-id="2239" instrument_node="">military operation, according to multiple people familiar with the matter.</span></p><p data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">If putin were to invade a NATO state then retribution would be swift because of</span></p><p data-dcnode-id="2232"><span data-dcnode-id="2235" instrument_node="">Article 5 which states: Collective defense means that an attack against one Ally is considered as</span><br data-dcnode-id="2234"><span data-dcnode-id="2233" instrument_node="">an attack against all Allies.</span></p><p data-dcnode-id="2228"><span data-dcnode-id="2231" instrument_node="">This would result in a NATO intervention which would lead to nuclear war because of</span><br data-dcnode-id="2230"><span data-dcnode-id="2229" instrument_node="">RUssia’s escalate to de-escalate policy which means Russia will strike.</span></p><p data-dcnode-id="2222"><span data-dcnode-id="2227" instrument_node="">The department of defense states “Moscow threatens and exercises limited nuclear first use,</span><br data-dcnode-id="2226"><span data-dcnode-id="2225" instrument_node="">suggesting an expectation that coercive nuclear threats or limited first use could paralyze the</span><br data-dcnode-id="2224"><span data-dcnode-id="2223" instrument_node="">United States and NATO.”</span></p><p data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">This would lead to a nuclear war which could lead to a world destroying war.</span></p><p data-dcnode-id="2214"><span data-dcnode-id="2219" instrument_node="">Rodriguez, ‘19, Researchers have estimated that a nuclear war that produced between</span><br data-dcnode-id="2218"><span data-dcnode-id="2217" instrument_node="">50 and 150 teragrams of smoke would make agriculture nearly impossible, causing</span><br data-dcnode-id="2216"><span data-dcnode-id="2215" instrument_node="">most people on Earth to starve to death.</span></p><p data-dcnode-id="2210"><span data-dcnode-id="2213" instrument_node="">Even if you don’t buy nuclear war, a conventional war, like World War 2, would still kill 60</span><br data-dcnode-id="2212"><span data-dcnode-id="2211" instrument_node="">million people.</span></p><p data-dcnode-id="2206"><span data-dcnode-id="2209" instrument_node="">And we provide solvency, Turkey has been successful battling Russia so Russian</span><br data-dcnode-id="2208"><span data-dcnode-id="2207" instrument_node="">wouldn’t invade knowing Turkey can defeat and defend allies effectively.</span></p><p data-dcnode-id="2200"><span data-dcnode-id="2205" instrument_node="">Ozkizilcik in 21 states “In recent years, Turkey has achieved several tactical and strategic</span><br data-dcnode-id="2204"><span data-dcnode-id="2203" instrument_node="">victories against Russia. In Syria, Turkey prevented Russia from implementing a military</span><br data-dcnode-id="2202"><span data-dcnode-id="2201" instrument_node="">solution.”</span></p><p data-dcnode-id="2199"></p><h2 data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">Contention 2: NATO bad, turkey good.</span></h2><p data-dcnode-id="2196"></p><p data-dcnode-id="2195"></p><h2 data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">First, there is no value to NATO.</span></h2><br data-dcnode-id="2192"><span data-dcnode-id="2191" instrument_node="">    a. NATO lack of shared purpose makes it chronically ineffective</span><br data-dcnode-id="2190"><span data-dcnode-id="2189" instrument_node="">Von Shirach 2009 (Paola Liebl Von Schirach, editor of the Schirach Report, 4-17-09, “Outside View: NATO's future --</span><br data-dcnode-id="2188"><span data-dcnode-id="2187" instrument_node="">Part 6”, UPI.)</span><br data-dcnode-id="2186"><span data-dcnode-id="2185" instrument_node="">fAllies think differently. This can be deduced from failure of member states to offer troops in</span><br data-dcnode-id="2184"><span data-dcnode-id="2183" instrument_node="">AfghanistanThere is major new action by NATO's member states planned the Atlantic alliance</span><br data-dcnode-id="2182"><span data-dcnode-id="2181" instrument_node="">has grown larger Yet NATO now lacks any real shared purpose the alliance has become</span><br data-dcnode-id="2180"><span data-dcnode-id="2179" instrument_node="">almost irrelevant except as a revered relic</span><p data-dcnode-id="2178"></p><p data-dcnode-id="2177"></p><h2 data-dcnode-id="2175"><span data-dcnode-id="2176" instrument_node="">NATO is on the decline Turkey is what is keep NATO worthy</span></h2><p data-dcnode-id="2174"></p><p data-dcnode-id="2160"><span data-dcnode-id="2173" instrument_node="">Bandow 2012 (Doug Bandow is a Senior Fellow at the Cato Institute. A former Special Assistant to</span><br data-dcnode-id="2172"><span data-dcnode-id="2171" instrument_node="">President Ronald Reagan, NATO and Libya: It's Time To Retire a Fading Alliance, Forbes, 1-2)</span><br data-dcnode-id="2170"><span data-dcnode-id="2169" instrument_node="">ill-equipped to take on even the decrepit Libyan forces Most NATO members contributed nothing of</span><br data-dcnode-id="2168"><span data-dcnode-id="2167" instrument_node="">consequence. Gates observed: European defense budgets “have been chronically starved fEurope turned</span><br data-dcnode-id="2166"><span data-dcnode-id="2165" instrument_node="">into a military pygmy.With the collapse of European finances military outlays are everywhere on the</span><br data-dcnode-id="2164"><span data-dcnode-id="2163" instrument_node="">chopping block Gates warned of “a dismal future for the alliance. there will be a dwindling appetite to</span><br data-dcnode-id="2162"><span data-dcnode-id="2161" instrument_node="">fund nations unwilling to be serious in defense.”</span></p><p data-dcnode-id="2159"></p><h2 data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">We control uniqueness on all impacts: NATO without turkey is worthless and</span></h2><br data-dcnode-id="2156"><span data-dcnode-id="2155" instrument_node="">Turkey is what makes it good</span><p data-dcnode-id="2154"></p><p data-dcnode-id="2130"><span data-dcnode-id="2153" instrument_node="">Aydogan in 21 states "I think it's also important to remember that Turkey is an</span><br data-dcnode-id="2152"><span data-dcnode-id="2151" instrument_node="">important NATO Ally. You can just look at the map and realize the importance of</span><br data-dcnode-id="2150"><span data-dcnode-id="2149" instrument_node="">these lands, the landmass of Turkey. And also the only country, the only NATO Ally</span><br data-dcnode-id="2148"><span data-dcnode-id="2147" instrument_node="">that borders Iraq and Syria," he said. Stoltenberg also hailed the country's</span><br data-dcnode-id="2146"><span data-dcnode-id="2145" instrument_node="">infrastructure and airports in fighting against Daesh while also noting that "Turkey</span><br data-dcnode-id="2144"><span data-dcnode-id="2143" instrument_node="">played an important role in the Global Coalition to Defeat ISIS and we continue to</span><br data-dcnode-id="2142"><span data-dcnode-id="2141" instrument_node="">work closely with the NATO ally, Turkey, in stabilizing our southern</span><br data-dcnode-id="2140"><span data-dcnode-id="2139" instrument_node="">neighborhood."He also underscored Turkey's significance in dealing with the</span><br data-dcnode-id="2138"><span data-dcnode-id="2137" instrument_node="">ongoing migrant and refugee crisis.Since 2016, Turkey has launched a trio of</span><br data-dcnode-id="2136"><span data-dcnode-id="2135" instrument_node="">successful anti-terror operations across its border in northern Syria to prevent the</span><br data-dcnode-id="2134"><span data-dcnode-id="2133" instrument_node="">formation of a terror corridor and to enable the peaceful settlement of residents:</span><br data-dcnode-id="2132"><span data-dcnode-id="2131" instrument_node="">Euphrates Shield (2016), Olive Branch (2018), and Peace Spring (2019).</span></p></div><div class="after_doc_wrapper is_bot" data-dcnode-id="2109"><div class="wrapper__doc_page_shared_related_categories related_categories_wrapper" data-dcnode-id="2110"><h2 class="title" data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">Related Interests</span></h2><ul class="links_container flex_row" data-dcnode-id="2111"><li class="link_wrapper" data-dcnode-id="2124"><a class="interest_link link" data-category_id="28566" data-dcnode-id="2125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scribd.com/interest/Nato/explore"><span data-dcnode-id="2126" instrument_node="">Nato</span></a></li><li class="link_wrapper" data-dcnode-id="2121"><a class="interest_link link" data-category_id="30043" data-dcnode-id="2122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scribd.com/interest/Nuclear-Warfare/explore"><span data-dcnode-id="2123" instrument_node="">Nuclear Warfare</span></a></li><li class="link_wrapper" data-dcnode-id="2118"><a class="int
