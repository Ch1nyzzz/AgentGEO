ization (CSTO) is a intergovernmental military alliance that is similar to NATO in many aspects.</span></span></p><span data-dcnode-id="4174" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4171" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4172" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4173" instrument_node="">The Treaty came into force on April 20, 1994. In April 1999, the Protocol on prolongation of the Collective Security Treaty was signed by six of them (except for Azerbaijan, Georgia and Uzbekistan who left the organisation).</span></span></p><span data-dcnode-id="4170" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4163" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4168" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4169" instrument_node="">It was decided to transform the CST into a full-fledged international organization – the Collective Security Treaty Organization (CSTO) at the Moscow session of the Collective Security Treaty on May 14, 2002. On October 7, 2002 the Charter of the Collective Security Treaty Organization and the Agreement on legal status of the CSTO were signed in Kishinev and came into force on September 18, 2003.</span></span><a class="q-text qu-dynamicFontSize--tiny qu-verticalAlign--super" data-dcnode-id="4164" href="#ILPnp" id="cite-ILPnp" style="box-sizing: border-box; line-height: 1;"><span data-dcnode-id="4167" instrument_node="">[</span><span data-dcnode-id="4166" instrument_node="">1</span><span data-dcnode-id="4165" instrument_node="">]</span></a></p><span data-dcnode-id="4162" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--b ox; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3856" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3857" instrument_node="">Source: Telegram Channel:</span></span><span data-dcnode-id="3854" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3855" instrument_node=""> Prelims Specific Notes for IAS (these are key words to be used in the search bar of the Telegram App).</span></span></p><span data-dcnode-id="3852" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3843" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3850" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3851" instrument_node="">Context:</span></span><span data-dcnode-id="3848" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3849" instrument_node=""> India’s Defence Minister is visiting Moscow from September 3-5, 2020 at the invitation of Defence Minister of Russian Federation to attend the combined meeting of Defence Ministers of Shanghai Cooperation Organisation (SCO), </span></span><span data-dcnode-id="3846" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3847" instrument_node="">Collective Security Treaty Organisation (CSTO)</span></span><span data-dcnode-id="3844" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3845" instrument_node=""> and Commonwealth of Independent States (CIS) member States in commemoration of the 75th Anniversary of victory in the World War II.</span></span></p><span data-dcnode-id="3842" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3839" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3840" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3841" instrument_node="">Analysis</span></span></p><span data-dcnode-id="3838" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3831" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3836" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3837" instrument_node="">The Collective Security Treaty Organization (CSTO) is a </span></span><span data-dcnode-id="3834" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3835" instrument_node="">Russia-led military alliance</span></span><span data-dcnode-id="3832" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3833" instrument_node=""> of seven former Soviet states that was created in 2002.</span></span></p><span data-dcnode-id="3830" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3823" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3828" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3829" instrument_node="">The CSTO’s purpose is to ensure the </span></span><span data-dcnode-id="3826" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3827" instrument_node="">collective defence </span></span><span data-dcnode-id="3824" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3825" instrument_node="">of any member that faces external aggression.</span></span></p><span data-dcnode-id="3822" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3811" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3820" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3821" instrument_node="">It has been described by political scientists as the </span></span><span data-dcnode-id="3818" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3819" instrument_node="">Eurasian counterpart of NATO</span></span><span data-dcnode-id="3816" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3817" instrument_node="">, which has 30 member states </span></span><span data-dcnode-id="3814" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3815" instrument_node="">(North Macedonia joined NATO in 2020),</span></span><span data-dcnode-id="3812" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3813" instrument_node=""> while the CSTO has just six.</span></span></p><span data-dcnode-id="3810" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3805" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3808" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3809" instrument_node="">Current CSTO members are </span></span><span data-dcnode-id="3806" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3807" instrument_node="">Armenia, Belarus, Kazakhstan, Kyrgyzstan, the Russian Federation and Tajikistan.</span></span></p><span data-dcnode-id="3804" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3801" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3802" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3803" instrument_node="">Uzbekistan again became a CSTO member in 2006 but then withdrew its membership in 2012.</span></span></p><span data-dcnode-id="3800" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3795" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3798" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3799" instrument_node="">Afghanistan and Serbia</span></span><span data-dcnode-id="3796" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3797" instrument_node=""> hold observer status in the CSTO.</span></span></p><span data-dcnode-id="3794" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3787" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3792" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3793" instrument_node="">The organization uses a </span></span><span data-dcnode-id="3790" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3791" instrument_node="">rotating presidency system</span></span><span data-dcnode-id="3788" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3789" instrument_node=""> in which the state leading the CSTO changes every year.</span></span></p><span data-dcnode-id="3786" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3783" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3784" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3785" instrument_node="">Beyond mutual defence, Members also use the organization to counter cyber warfare, narcotics trafficking, the illegal circulation of weapons, transnational crime, and terrorism.</span></span></p><span data-dcnode-id="3782" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3779" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3780" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3781" instrument_node="">What Does CSTO Membership Provide?</span></span></p><span data-dcnode-id="3778" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3771" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3776" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3777" instrument_node="">While CSTO membership means that </span></span><span data-dcnode-id="3774" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3775" instrument_node="">member states are barred from joining other military alliances</span></span><span data-dcnode-id="3772" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3773" instrument_node="">, limiting, for example, their relationship with NATO, members receive discounts, subsidies, and other incentives to buy Russian arms, facilitating military cooperation.</span></span></p><span data-dcnode-id="3770" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3767" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3768" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3769" instrument_node="">Most importantly, membership presumes certain key security assurances – the most significant of which is deterring military aggression by third countries. In the CSTO, aggression against one signatory is perceived as aggression against all.</span></span></p><span data-dcnode-id="3766" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3763" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3764" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3765" instrument_node="">In particular, the organization has given Russia the power to block NATO operations in the region and provided a way for Russia to contain Chinese military influence in the region.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3696" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="3697" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="3698" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="3712" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="3734" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="3735" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="3745" style= white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="2986" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="2987" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="2992" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="2993" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="2994" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="2988" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="2989"><svg data-dcnode-id="2990" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="2991" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="2957" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="2958" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="2959"><span class="q-box qu-userSelect--text" data-dcnode-id="2960" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2975" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2976" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2977" instrument_node="">Any organization that have China, Russia and India as it member would be an important organization. Shanghai Cooperation Organization (SCO) has four nuclear powers, two permanent members of Security Council, four most populous country out of top 10 most populous countries, four biggest country out of top 10 biggest countries, top two fastest large economies and top 3 economies out of top 12 economies.</span></span></p><span data-dcnode-id="2974" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2969" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2972" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2973" instrument_node="">SCO constitutes of roughly 67% of world area and 48% of world population.</span></span><span data-dcnode-id="2970" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2971" instrument_node=""> This statistic itself tells us why SCO is important. SCO is an important platform for maintaining security and economic co-operation in vast Eurasian land mass (mainly Central Asia and its adjoining region). SCO can become a milestone in development of Central Asia in future. Initially SCO was all about Central Asian republics and their two giant neighbors Russia and China. But now with India and Pakistan joining SCO and Iran as a possible member, SCO has expanded beyond Central Asia and may play an important role in economic and security development of whole Eurasian landmass.</span></span></p><span data-dcnode-id="2968" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2965" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2966" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2967" instrument_node="">SCO is another platform to China to showcase its growing status in world. It is an important platform for Russia to look east &amp; South when west has imposed sanctions on Russia. Similarly, Russia can still have leverage on Central Asian Republics which was part of Soviet Union. SCO can also act as a platform to diffuse some tension between India and China to a major extent. Indian and China gets another platform apart from BRICS to understand each other better. India would get access to mineral rich Central Asia and Pakistan may give India land route access to Central Asia due to SCO. India can also act as a counter wright to China and SCO and stop SCO becoming China centric. Pakistan has another platform to get benefit from regional co-operation. Land-locked Central Asian republics gets most benefit out of SCO as SO can at as their ticket to economic advantage and security guaranty. SCO will not solve all India-China issue and India will remain friendly with America and Japan with relation to China.</span></span></p><span data-dcnode-id="2964" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2961" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2962" style="font-weight: normal; font-styl 1990s, and wanted to open up towards the United States, something it could not do as part of the CSTO, and wanted to avoid further aligment with Russia’s aims in Central Asia:</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="2031" style="box-sizing: border-box; position: relative; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2033" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2038" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2039" instrument_node="">Uzbekistan objects to “the CSTO’s strategic plans on Afghanistan” and “plans for boosting military cooperation between the CSTO states,” </span></span><span data-dcnode-id="2036" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2037" instrument_node="">Kommersant</span></span><span data-dcnode-id="2034" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2035" instrument_node=""> said, citing sources in the Uzbek Foreign Ministry. The move may signal that the Central Asian country wants to host a U.S. base on its territory after U.S. troop</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="2032" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="2019" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="2020" style="box-sizin CssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="2025"><svg data-dcnode-id="2026" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="2027" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="1973" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="1974" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="1975"><span class="q-box qu-userSelect--text" data-dcnode-id="1976" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2011" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2012" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2013" instrument_node="">It quit in 2012: it seems the Uzbek leadership harbored doubts about the future of the organization since the late 1990s, and wanted to open up towards the United States, something it could not do as part of the CSTO, and wanted to avoid further aligment with Russia’s aims in Central Asia:</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="1990" style="box-sizing: border-box; position: relative; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2000" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2009" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2010" instrument_node="">Uzbekistan objects to “the CSTO’s strategic plans on Afghanistan” and “plans for boosting military cooperation between the CSTO states,” </span></span><span data-dcnode-id="2007" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2008" instrument_node="">Kommersant</span></span><span data-dcnode-id="2005" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2006" instrument_node=""> said, citing sources in the Uzbek Foreign Ministry. The move may signal that the Central Asian country wants to host a U.S. base on its territory after U.S. troops withdraw from Afghanistan in 2014, </span></span><span data-dcnode-id="2003" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2004" instrument_node="">Kommersant</span></span><span data-dcnode-id="2001" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2002" instrument_node=""> reported. But under CSTO agreements, a member state would have to consult with the other members before hosting the armed forces of a non-CSTO country.</span></span></p><span data-dcnode-id="1999" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1992" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1997" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1998" instrument_node="">Tashkent had already used its right to opt out of the organization at any time: in 1999 it refused to extend the treaty but in August of 1999 it restored its CSTO membership. In 2009 Uzbekistan’s President Islam Karimov refused to sign the agreement on the Collective Forces of Operative Reaction (CFOR) within the CSTO treaty and brought cooperation with the Collective Security Treaty Organization to a minimum. Possibly, Russia’s plans to open a military base in Kyrgyzstan that Uzbekistan was strongly against, served as a reason. There are rather strained relations between Bishkek and Tashkent, which is explained by the existence of 58 disputable areas on the Kyrgyz-Uzbek border. In addition to this, the inter-ethnic clashes that occurred in the city of Osh in Kyrgyzstan in 2010 cooled the relations between the two countries even more.</span></span><a class="q-text qu-dynamicFontSize--tiny qu-verticalAlign--super" data-dcnode-id="1993" href="#ONGvj" id="cite-ONGvj" style="box-sizing: border-box; line-height: 1;"><span data-dcnode-id="1996" instrument_node="">[</span><span data-dcnode-id="1995" instrument_node="">1</span><span data-dcnode-id="1994" instrument_node="">]</span></a></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="1991" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-bold qu-pb--small" data-dcnode-id="1988" style="box-sizing: border-box; margin-top: 1em;"><span data-dcnode-id="1989" instrument_node="">Footnotes</span></p><div class="q-text qu-mb--small qu-wordBreak--break-word" data-dcnode-id="1977" id="ONGvj" style="box-sizing: border-box;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1984" href="#cite-ONGvj" style="box-sizing: border-box; border-radius: inherit;" target="_top"><span data-dcnode-id="1987" instrument_node="">[</span><span data-dcnode-id="1986" instrument_node="">1</span><span data-dcnode-id="1985" instrument_node="">] </span></a><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//gca.satrapia.com/uzbekistan-suspends-its-membership-in-csto" rel="noope xtAlign--start" data-dcnode-id="1592" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1593" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1594" instrument_node="">The five permanent security council members are, in no particular order, the United States of America, the People’s Republic of China, the Russian Federation, the United Kingdom of Great Britain and Northern Ireland and the French Republic.</span></span></p><span data-dcnode-id="1591" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1588" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1589" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1590" instrument_node="">The rest of the Security Council is composed of rotating members of the rest of the world who are in the United Nations and are officially considered ‘countries’.</span></span></p><span data-dcnode-id="1587" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1584" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1585" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1586" instrument_node="">The Security Council decides on matters that can affect the whole world.</span></span></p><span data-dcnode-id="1583" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1580" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1581" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1582" instrument_node="">Though I would argue that the Security Council is strong not because of its deciding power but because of its members. I mean, the 2003 Iraq war wasn’t approved but the US went in anyway.</span></span></p><span data-dcnode-id="1579" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1576" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1577" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1578" instrument_node="">America is already a powerhouse in terms of economic, cultural and media influence and it has a powerful military. Now we have China who is the 2nd largest economic power and has a growing military power. Russia, while not as economically powerful as during its Soviet times, still has a powerful military and more importantly a vast arsenal of nuclear weapons. The UK and France, while not as economically and militarily powerful as the other three, still have cultural influences of their own.</span></span></p><span data-dcnode-id="1575" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1572" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1573" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1574" instrument_node="">Should those five get together seriously, there’s a lot they could do.</span></span></p><span data-dcnode-id="1571" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1568" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1569" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1570" instrument_node="">But the Security Council also provides a check on each side. If just one member of the Security Council vetoes a decision, then the entire discussion is scrapped or disapproved. Thus, it maintains a somewhat careful balance of power.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1501" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1502" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="1503" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="1517" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="1539" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="1540" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="1550" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="1551" style="box-sizing: border-box; position: relative;"><button aria-label="Upvote" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--bg--darken qu-hover--textDecoration--none" data-dcnode-id="1552" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 10px; height: 30px; transition-duration: 60ms; "q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1384" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1385" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1386" instrument_node="">Both terms are often used interchangeably, but there are some nuanced differences between them.</span></span></p><span data-dcnode-id="1383" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1380" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1381" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1382" instrument_node="">Collective self-defense is authorized, along with individual self-defense, by Article 51 of the United Nations Charter. Put simply, if a country in the international system has suffered an armed attack, then any other country has the right, but not the duty, to use armed force against the aggressor in reliance upon the principle of self-defense. Collective self- defense expands this by treaties or defense alliances in which both parts gaurantees support if the fall victim for war. Traditionally only for interstate war.</span></span></p><span data-dcnode-id="1379" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1376" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1377" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1378" instrument_node="">In contrast, collective security involves the use of force to maintain or restore international peace and security. This is more based on cooperation and preemptive action rather than after war has begun. Can be about war but can  a statement of policy (and desire) by the signing president.  There are treaties that have been signed by several US presidents but subsequently not ratified by the US Senate.  Legally speaking, until a treaty is ratified, it's completely meaningless under American law even if signed by the President beforehand.  Thus, the Presidents' signatures may appear on a number of treaties, but subsequently left unenforceable/unrecognised under American law.</span></span></p><span data-dcnode-id="663" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="651" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="661" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="662" instrument_node="">Each nation is different, but most nations require the Head of State and their Legislature to ratify treaties (again, each nation is different).  Originally, the Senate was the "embassy of the states" with each senator being appointed by the State legislatures to represent the will of the state government(s).  As such, this gave each state a say in the international dealings of the USA -- by having sole approval authority for treaties (2/3 vote) and for federal appointments (50%+1).  It still retains that power even after the passage of the </span></span><span class="q-inline" data-dcnode-id="654" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Seventeenth_Amendment_to_the_United_States_Constitution" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="660" instrument_node="">Seventeenth Amendment</span></a><span class="q-inlineBlock" data-dcnode-id="655" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="656"><svg data-dcnode-id="657" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="658" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="652" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="653" instrument_node=""> which took power away from the state legislatures and handed it directly to the people of each state.  </span></span></p><span data-dcnode-id="650" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="641" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="648" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="649" instrument_node="">Anyway, this is eminently </span></span><span data-dcnode-id="646" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="647" instrument_node="">googlable</span></span><span data-dcnode-id="642" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="645" instrument_node="">.  But suffice it to say, there are a few high profile treaties that have not been ratified by the USA:</span><br data-dcnode-id="644"><span data-dcnode-id="643" instrument_node=""></span></span></p><ul class="q-box" data-dcnode-id="524" style="
