</span><link data-dcnode-id="2142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/wp-content/themes/html5blank-stable/styles/mathjax.css&amp;raw" rel="stylesheet" type="text/css"><link data-dcnode-id="2141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/wp-content/themes/html5blank-stable/styles/mathjax.css&amp;raw" rel="stylesheet" type="text/css"><p data-dcnode-id="2133"><span data-dcnode-id="2139" style="font-weight: 400;"><span data-dcnode-id="2140" instrument_node="">The North Atlantic Treaty Organization (NATO) is an intergovernmental military alliance based on the North Atlantic Treaty which was signed in 1949. This article talks about NATO and its importance for the </span></span><a data-dcnode-id="2136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/ias-exam/"><span data-dcnode-id="2137" style="font-weight: 400;"><span data-dcnode-id="2138" instrument_node="">IAS Exam</span></span></a><span data-dcnode-id="2134" style="font-weight: 400;"><span data-dcnode-id="2135" instrument_node="">.</span></span></p><span data-dcnode-id="2132" instrument_node="">
</span><p data-dcnode-id="2119"><span data-dcnode-id="2130" style="font-weight: 400;"><span data-dcnode-id="2131" instrument_node="">International organisations and groupings are an important part of the International Relations section of the General Studies paper-2 in the </span></span><a data-dcnode-id="2127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/ias/upsc-syllabus/"><span data-dcnode-id="2128" style="font-weight: 400;"><span data-dcnode-id="2129" instrument_node="">UPSC Syllabus</span></span></a><span data-dcnode-id="2125" style="font-weight: 400;"><span data-dcnode-id="2126" instrument_node="">. International relations is a very dynamic part and is crucial for multiple papers in Prelims and Mains. Students preparing for UPSC 2022 and other </span></span><a data-dcnode-id="2122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/govt-exams/"><span data-dcnode-id="2123" style="font-weight: 400;"><span data-dcnode-id="2124" instrument_node="">Government Exams</span></span></a><span data-dcnode-id="2120" style="font-weight: 400;"><span data-dcnode-id="2121" instrument_node=""> must be aware of the topic.</span></span></p><span data-dcnode-id="2118" instrument_node="">
</span><p data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">Latest News: Following the Russian Invasion of Ukraine, NATO Chief Jens Stoltenberg announced on 25th February, 2022 that the alliance would be deploying its rapid response force to bolster Ukraine defences. In addition. to this several members such as France and Germany have stepped up in sending arms and ammunition to Ukraine.</span></p><span data-dcnode-id="2115" instrument_node="">
</span><p data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">Sweden and Finland have considered joining NATO recently. The announcement was met with a harsh response from Russia who threatened military and political consequences if that was to happen. Both Stockholm and Helsinki brushed of Moscow’s warning on the matter.</span></p><span data-dcnode-id="2112" instrument_node="">

</span><h2 data-dcnode-id="2055"><span data-dcnode-id="2056" style="font-weight: 400;"><span data-dcnode-id="2057" instrument_node="">What is the North Atlantic Treaty Organization (NATO)?</span></span></h2><span data-dcnode-id="2054" instrument_node="">
</span><ul data-dcnode-id="2048"><span data-dcnode-id="2053" instrument_node="">
</span><li aria-level="1" data-dcnode-id="2050" style="font-weight: 400;"><span data-dcnode-id="2051" style="font-weight: 400;"><span data-dcnode-id="2052" instrument_node="">NATO stands for the North Atlantic Treaty Organization which is also called the North Atlantic Alliance.</span></span></li><span data-dcnode-id="2049" instrument_node="">
</span></ul><span data-dcnode-id="2047" instrument_node="">
</span><p data-dcnode-id="2045"><img alt="North Atlantic Treaty Organisation (NATO)" class="alignright wp-image-1257036 size-medium" data-dcnode-id="2046" height="141" sizes="(max-width: 250px) 100vw, 250px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn1.byjus.com/wp-content/uploads/2020/02/nATO-250x141.png&amp;raw" srcset="https://cdn1.byjus.com/wp-content/uploads/2020/02/nATO-250x141.png 250w, https://cdn1.byjus.com/wp-content/uploads/2020/02/nATO-768x432.png 768w, https://cdn1.byjus.com/wp-content/uploads/2020/02/nATO-700x394.png 700w, https://cdn1.byjus.com/wp-content/uploads/2020/02/nATO-120x68.png 120w, https://cdn1.byjus.com/wp-content/uploads/2020/02/nATO.png 800w" width="250"></p><span data-dcnode-id="2044" instrument_node="">
</span><ul data-dcnode-id="2030"><span data-dcnode-id="2043" instrument_node="">
</span><li aria-level="1" data-dcnode-id="2040" style="font-weight: 400;"><span data-dcnode-id="2041" style="font-weight: 400;"><span data-dcnode-id="2042" instrument_node="">It is an intergovernmental military alliance based on the North Atlantic Treaty which was signed on 4 April 1949.</span></span></li><span data-dcnode-id="2039" instrument_node="">
</span><li aria-level="1" data-dcnode-id="2036" style="font-weight: 400;"><span data-dcnode-id="2037" style="font-weight: 400;"><span data-dcnode-id="2038" instrument_node="">The organization constitutes a system of collective defence whereby its member states agree to mutual defence in response to an attack by a non-member external party.&nbsp;</span></span></li><span data-dcnode-id="2035" instrument_node="">
</span><li aria-level="1" data-dcnode-id="2032" style="font-weight: 400;"><span data-dcnode-id="2033" style="font-weight: 400;"><span data-dcnode-id="2034" instrument_node="">NATO’s headquarters are located at Boulevard Leopold III in the city of Brussels, Belgium, where the Supreme Allied Commander resides.</span></span></li><span data-dcnode-id="2031" instrument_node="">
</span></ul><span data-dcnode-id="2029" instrument_node="">
</span><p data-dcnode-id="2021"><span data-dcnode-id="2027" style="font-weight: 400;"><span data-dcnode-id="2028" instrument_node="">Also read, the </span></span><a data-dcnode-id="2024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/free-ias-prep/g20/"><span data-dcnode-id="2025" style="font-weight: 400;"><span data-dcnode-id="2026" instrument_node="">G20 </span></span></a><span data-dcnode-id="2022" style="font-weight: 400;"><span data-dcnode-id="2023" instrument_node="">Summit 2020 and India’s role in it.</span></span></p><span data-dcnode-id="2020" instrument_node="">
</span><h3 data-dcnode-id="2017"><span data-dcnode-id="2018" style="font-weight: 400;"><span data-dcnode-id="2019" instrument_node="">Why was NATO formed?</span></span></h3><span data-dcnode-id="2016" instrument_node="">
</span><p data-dcnode-id="2003"><span data-dcnode-id="2014" style="font-weight: 400;"><span data-dcnode-id="2015" instrument_node="">The organisation was formed as a means to ensure collective security in western Europe. Even though World War 2 had come to an end, the deteriorating relations between two former allies, the United States and the USSR would eventually lead to the </span></span><a data-dcnode-id="2011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/free-ias-prep/cold-war/"><span data-dcnode-id="2012" style="font-weight: 400;"><span data-dcnode-id="2013" instrument_node="">Cold War</span></span></a><span data-dcnode-id="2009" style="font-weight: 400;"><span data-dcnode-id="2010" instrument_node="">. The USSR sought to expand its influence in Europe through the spread of </span></span><a data-dcnode-id="2006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/free-ias-prep/communism/"><span data-dcnode-id="2007" style="font-weight: 400;"><span data-dcnode-id="2008" instrument_node="">communism</span></span></a><span data-dcnode-id="2004" style="font-weight: 400;"><span data-dcnode-id="2005" instrument_node="">, while the US saw the ideology of the USSR as a threat to its way of life. Hence it saw the need to form NATO.</span></span></p><span data-dcnode-id="2002" instrument_node="">
</span><p data-dcnode-id="1999"><a data-dcnode-id="2000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/free-ias-prep/upsc-2022/"><img alt="UPSC 2022" class="alignnone" data-dcnode-id="2001" height="322" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn1.byjus.com/wp-content/uploads/2021/12/UPSC-IAS-2022.png&amp;raw" width="1188"></a></p><span data-dcnode-id="1998" instrument_node="">
</span><h3 data-dcnode-id="1995"><span data-dcnode-id="1996" style="font-weight: 400;"><span data-dcnode-id="1997" instrument_node="">NATO – A Brief Background</span></span></h3><span data-dcnode-id="1994" instrument_node="">
</span><ul data-dcnode-id="1967"><span data-dcnode-id="1993" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1990" style="font-weight: 400;"><span data-dcnode-id="1991" style="font-weight: 400;"><span data-dcnode-id="1992" instrument_node="">The Treaty of Brussels, signed on 17 March 1948 by Belgium, the Netherlands, Luxembourg, France, and the United Kingdom, is considered the precursor to the NATO agreement. This treaty established a military alliance, later to become the Western European Union</span></span></li><span data-dcnode-id="1989" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1986" style="font-weight: 400;"><span data-dcnode-id="1987" style="font-weight: 400;"><span data-dcnode-id="1988" instrument_node="">North Atlantic Treaty, which was signed in Washington, DC on 4 April 1949, was a result of the talks for the military alliance. It included the five Treaty of Brussels states, United States, Canada, Portugal, Italy, Norway, Denmark and Iceland</span></span></li><span data-dcnode-id="1985" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1982" style="font-weight: 400;"><span data-dcnode-id="1983" style="font-weight: 400;"><span data-dcnode-id="1984" instrument_node="">Three years later, on 18 February 1952, Greece and Turkey also joined</span></span></li><span data-dcnode-id="1981" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1978" style="font-weight: 400;"><span data-dcnode-id="1979" style="font-weight: 400;"><span data-dcnode-id="1980" instrument_node="">The incorporation of West Germany into the organisation on 9 May 1955 was described as “a decisive turning point in the history of our continent” by Halvard Lange, Foreign Minister of Norway at the time</span></span></li><span data-dcnode-id="1977" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1969" style="font-weight: 400;"><span data-dcnode-id="1975" style="font-weight: 400;"><span data-dcnode-id="1976" instrument_node="">One of its immediate results was the creation of the Warsaw Pact, signed on 14 May 1955 by the </span></span><a data-dcnode-id="1972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/free-ias-prep/soviet-union/"><span data-dcnode-id="1973" style="font-weight: 400;"><span data-dcnode-id="1974" instrument_node="">Soviet Union</span></span></a><span data-dcnode-id="1970" style="font-weight: 400;"><span data-dcnode-id="1971" instrument_node=""> and its satellite states as a formal response to this event, firmly establishing the two opposing sides of the Cold War</span></span></li><span data-dcnode-id="1968" instrument_node="">
</span></ul><span data-dcnode-id="1966" instrument_node="">
</span><h3 data-dcnode-id="1963"><span data-dcnode-id="1964" style="font-weight: 400;"><span data-dcnode-id="1965" instrument_node="">Pre and Post Cold War Impact</span></span></h3><span data-dcnode-id="1962" instrument_node="">
</span><ul data-dcnode-id="1927"><span data-dcnode-id="1961" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1953" style="font-weight: 400;"><span data-dcnode-id="1959" style="font-weight: 400;"><span data-dcnode-id="1960" instrument_node="">During most of the duration of the </span></span><a data-dcnode-id="1956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/free-ias-prep/cold-war/"><span data-dcnode-id="1957" style="font-weight: 400;"><span data-dcnode-id="1958" instrument_node="">Cold War</span></span></a><span data-dcnode-id="1954" style="font-weight: 400;"><span data-dcnode-id="1955" instrument_node="">, NATO maintained a holding pattern with no actual military engagement as an organisation. On 1 July 1968, the Nuclear Non-Proliferation Treaty was opened for signature</span></span></li><span data-dcnode-id="1952" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1949" style="font-weight: 400;"><span data-dcnode-id="1950" style="font-weight: 400;"><span data-dcnode-id="1951" instrument_node="">On 30 May 1978, NATO countries officially defined two complementary aims of the Alliance, to maintain security and pursue détente</span></span></li><span data-dcnode-id="1948" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1945" style="font-weight: 400;"><span data-dcnode-id="1946" style="font-weight: 400;"><span data-dcnode-id="1947" instrument_node="">However, on 12 December 1979, in light of a build-up of Warsaw Pact nuclear capabilities in Europe, ministers approved the deployment of US Cruise and Pershing II theatre nuclear weapons in Europe. This policy was called the Dual Track policy</span></span></li><span data-dcnode-id="1944" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1941" style="font-weight: 400;"><span data-dcnode-id="1942" style="font-weight: 400;"><span data-dcnode-id="1943" instrument_node="">The end of the Cold War, the dissolution of the Warsaw Pact in 1991, removed the de facto main adversary of NATO. This caused a strategic re-evaluation of NATO’s purpose, nature and tasks</span></span></li><span data-dcnode-id="1940" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1937" style="font-weight: 400;"><span data-dcnode-id="1938" style="font-weight: 400;"><span data-dcnode-id="1939" instrument_node="">The first post-Cold War expansion of NATO came with the reunification of Germany on 3 October 1990, when former East Germany became part of the Federal Republic of Germany and the alliance</span></span></li><span data-dcnode-id="1936" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1933" style="font-weight: 400;"><span data-dcnode-id="1934" style="font-weight: 400;"><span data-dcnode-id="1935" instrument_node="">On 24 March 1999, NATO saw its first broad-scale military engagement in the Kosovo War, where it waged an 11-week bombing campaign against what was then the Federal Republic of Yugoslavia. The conflict ended on 11 June 1999, when Yugoslavian leader Slobodan Milošević agreed to NATO’s demands by accepting UN resolution 1244</span></span></li><span data-dcnode-id="1932" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1929" style="font-weight: 400;"><span data-dcnode-id="1930" style="font-weight: 400;"><span data-dcnode-id="1931" instrument_node="">The expansion of the activities and geographical reach of NATO grew even further as an outcome of the September 11 attacks</span></span></li><span data-dcnode-id="1928" instrument_node="">
</span></ul><span data-dcnode-id="1926" instrument_node="">
</span><p data-dcnode-id="1923"><a data-dcnode-id="1924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/free-ias-prep/daily-news/"><img alt="Daily News" class="alignnone" data-dcnode-id="1925" height="322" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn1.byjus.com/wp-content/uploads/2021/12/Daily-Comprehensive-News-Analysis-Current-Affairs-Updates-For-IAS-Bank-SSC-RRB-Other-Government-Exams-2022.png&amp;raw" width="1188"></a></p><span data-dcnode-id="1922" instrument_node="">
</span><h3 data-dcnode-id="1919"><span data-dcnode-id="1920" style="font-weight: 400;"><span data-dcnode-id="1921" instrument_node="">NATO Members</span></span></h3><span data-dcnode-id="1918" instrument_node="">
</span><p data-dcnode-id="1915"><span data-dcnode-id="1916" style="font-weight: 400;"><span data-dcnode-id="1917" instrument_node="">NATO has 30 member countries with Montenegro as its newest member. It became a part of NATO in 2017.</span></span></p><span data-dcnode-id="1914" instrument_node="">

</span><h3 data-dcnode-id="1746"><span data-dcnode-id="1747" style="font-weight: 400;"><span data-dcnode-id="1748" instrument_node="">NATO – Latest Updates (2020-2021)</span></span></h3><span data-dcnode-id="1745" instrument_node="">
</span><ol data-dcnode-id="1718"><span data-dcnode-id="1744" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1741" style="font-weight: 400;"><span data-dcnode-id="1742" style="font-weight: 400;"><span data-dcnode-id="1743" instrument_node="">Jens Stoltenberg, NATO secretary-general, stressed that 2020 would be the sixth consecutive year in which total defence spending by European allies and Canada would rise, this time by 4.3 per cent in real terms.&nbsp;</span></span></li><span data-dcnode-id="1740" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1737" style="font-weight: 400;"><span data-dcnode-id="1738" style="font-weight: 400;"><span data-dcnode-id="1739" instrument_node="">Defence ministers of ten Nato allies have launched a multinational initiative to explore a ground-based air defence (GBAD) modular solution. The project is part of the expanding multinational High Visibility Projects (HVPs) portfolio, which is supported by Nato to deliver defence capability for alliance security. It will be able to counter very short range, short-range and medium-range threats.</span></span></li><span data-dcnode-id="1736" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1733" style="font-weight: 400;"><span data-dcnode-id="1734" style="font-weight: 400;"><span data-dcnode-id="1735" instrument_node="">Russian recently gave out a statement that they are open for constructive work on minimizing the negative consequences of the collapse of the INF [Intermediate-Range Nuclear Forces] Treaty on the basis of the principles of equal and indivisible security and the respect for the balance of the parties’ interests.</span></span></li><span data-dcnode-id="1732" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1724" style="font-weight: 400;"><span data-dcnode-id="1730" style="font-weight: 400;"><span data-dcnode-id="1731" instrument_node="">NATO allies France and Turkey traded angry recriminations as international tensions mounted over the fiercest clashes between Azerbaijan and ethnic Armenian forces since the mid-1990s. Some of Turkey‘s NATO allies are increasingly alarmed by Ankara’s stance on </span></span><a data-dcnode-id="1727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/free-ias-prep/nagorno-karabakh-conflict/"><span data-dcnode-id="1728" style="font-weight: 400;"><span data-dcnode-id="1729" instrument_node="">Nagorno-Karabakh</span></span></a><span data-dcnode-id="1725" style="font-weight: 400;"><span data-dcnode-id="1726" instrument_node="">, a breakaway region inside Turkey‘s close ally Azerbaijan that is run by ethnic Armenians but is not recognised by any country as an independent republic.</span></span></li><span data-dcnode-id="1723" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1720" style="font-weight: 400;"><span data-dcnode-id="1721" style="font-weight: 400;"><span data-dcnode-id="1722" instrument_node="">Tensions between Russia and NATO reached new heights when satellite images discovered Russian forces massing near the Ukraine border. Although the Russian government has claimed that their forces were conducting a military exercise in the region, NATO allies have remained vary of the claim.</span></span></li><span data-dcnode-id="1719" instrument_node="">
</span></ol><span data-dcnode-id="1717" instrument_node="">

</span><h3 data-dcnode-id="1649"><span data-dcnode-id="1650" style="font-weight: 400;"><span data-dcnode-id="1651" instrument_node="">Multiple Choice Question</span></span></h3><span data-dcnode-id="1648" instrument_node="">
</span><p data-dcnode-id="1645"><span data-dcnode-id="1646" style="font-weight: 400;"><span data-dcnode-id="1647" instrument_node="">Consider the following statements</span></span></p><span data-dcnode-id="1644" instrument_node="">
</span><ol data-dcnode-id="1626"><span data-dcnode-id="1643" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1640" style="font-weight: 400;"><span data-dcnode-id="1641" style="font-weight: 400;"><span data-dcnode-id="1642" instrument_node="">NATO stands for the North Atlantic Treaty Organization which is also called the North Atlantic Alliance. It is an intergovernmental military alliance based on the North Atlantic Treaty which was signed on 4 April 1949.NATO’s headquarters are located at Boulevard Leopold III in the city of Brussels, Belgium, where the Supreme Allied Commander resides.</span></span></li><span data-dcnode-id="1639" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1636" style="font-weight: 400;"><span data-dcnode-id="1637" style="font-weight: 400;"><span data-dcnode-id="1638" instrument_node="">In 1985, Mikhail Gorbachev rose to become the leader of the USSR. He initiates capitalist reforms known as perestroika and glasnost. He also let the Berlin Wall crumble on October 30, 1989. Finally, in 1991, the Soviet Union was disbanded and new countries Russia and others emerged as independent nations.</span></span></li><span data-dcnode-id="1635" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1632" style="font-weight: 400;"><span data-dcnode-id="1633" style="font-weight: 400;"><span data-dcnode-id="1634" instrument_node="">The NAM is an international forum of 120 developing countries that believe in the idea of non-alignment with the major power blocs. It was established in 1961 in Belgrade, former Yugoslavia under the leadership of the then Indian Prime Minister Pandit Jawaharlal Nehru, President of Egypt Gamal Abdel Nasser and the President of Yugoslavia Josip Broz Tito.</span></span></li><span data-dcnode-id="1631" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1628" style="font-weight: 400;"><span data-dcnode-id="1629" style="font-weight: 400;"><span data-dcnode-id="1630" instrument_node="">The most recent member state to be added to NATO was North Macedonia on 27 March 2020. NATO currently recognizes Bosnia and Herzegovina, Georgia, and Ukraine as aspiring members. An additional 20 countries participate in NATO’s Partnership for Peace program, with 15 other countries involved in institutionalized dialogue programs. The combined military spending of all NATO members constitutes over 70% of the global total.</span></span></li><span data-dcnode-id="1627" instrument_node="">
</span></ol><span data-dcnode-id="1625" instrument_node="">
</span><p data-dcnode-id="1622"><span data-dcnode-id="1623" style="font-weight: 400;"><span data-dcnode-id="1624" instrument_node="">Choose the correct answer from the below-given options</span></span></p><span data-dcnode-id="1621" instrument_node="">
</span><ol data-dcnode-id="1603"><span data-dcnode-id="1620" instrument_node="">
</span><li data-dcnode-id="1617"><span data-dcnode-id="1618" style="font-weight: 400;"><span data-dcnode-id="1619" instrument_node="">A) All the above statements are true.</span></span></li><span data-dcnode-id="1616" instrument_node="">
</span><li data-dcnode-id="1613"><span data-dcnode-id="1614" style="font-weight: 400;"><span data-dcnode-id="1615" instrument_node="">B) Only statements 2, 3, and 4 are true.</span></span></li><span data-dcnode-id="1612" instrument_node="">
</span><li data-dcnode-id="1609"><span data-dcnode-id="1610" style="font-weight: 400;"><span data-dcnode-id="1611" instrument_node="">C) Only statements 1, 3, and 4 are true.</span></span></li><span data-dcnode-id="1608" instrument_node="">
</span><li data-dcnode-id="1605"><span data-dcnode-id="1606" style="font-weight: 400;"><span data-dcnode-id="1607" instrument_node="">D) None of the above statements are true.</span></span></li><span data-dcnode-id="1604" instrument_node="">
</span></ol><span data-dcnode-id="1602" instrument_node="">

</span><p data-dcnode-id="1593"></p><div class="faq-section mb30" data-dcnode-id="1569" id="Frequently-Asked-Questions-on-NATO"><h2 data-dcnode-id="1590"><span data-dcnode-id="1591" style="color: #800080;"><span data-dcnode-id="1592" instrument_node="">Frequently Asked Questions on NATO</span></span></h2><div class="faq-schema" data-dcnode-id="1570"><div data-dcnode-id="1571" itemscope="" itemtype="https://schema.org/FAQPage"><section data-dcnode-id="1584" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><h3 data-dcnode-id="1588" itemprop="name text"><span data-dcnode-id="1589" instrument_node="">Q 1. What is the purpose of the North Atlantic Treaty Organization?</span></h3><div data-dcnode-id="1585" itemprop="suggestedAnswer acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><div data-dcnode-id="1586" itemprop="text"><span data-dcnode-id="1587" instrument_node="">Ans. The North Atlantic Treaty Organization (NATO) is established as an intergovernmental military alliance based on the North Atlantic Treaty which was signed on 4 April 1949. NATO’s essential and enduring purpose is to safeguard the freedom and security of all its members by political and military means. Collective defence is at the heart of the Alliance and creates a spirit of solidarity and cohesion among its members.</span></div></div></section><section data-dcnode-id="1578" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><h3 data-dcnode-id="1582" itemprop="name text"><span data-dcnode-id="1583" instrument_node="">Q 2. Is India a NATO ally?</span></h3><div data-dcnode-id="1579" itemprop="suggestedAnswer acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><div data-dcnode-id="1580" itemprop="text"><span data-dcnode-id="1581" instrument_node="">Ans. In September 2011, the NATO alliance invited India to be a partner in its ballistic missile defence (BMD).</span></div></div></section><section data-dcnode-id="1572" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><h3 data-dcnode-id="1576" itemprop="name text"><span data-dcnode-id="1577" instrument_node="">Q 3. Which country recently joined NATO?</span></h3><div data-dcnode-id="1573" itemprop="suggestedAnswer acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><div data-dcnode-id="1574" itemprop="text"><span data-dcnode-id="1575" instrument_node="">Ans. Montenegro became NATO’s latest member in the year 2017. North Macedonia is expected to enter the alliance as the 30th member in the first quarter of 2020. Spain has still yet to ratify the accession protocol.</span></div></div></section></div></div></div><p data-dcnode-id="1568"></p><span data-dcnode-id="1567" instrument_node="">
