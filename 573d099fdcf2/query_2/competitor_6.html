</span><div class="featured-image page-header-image-single grid-container grid-parent" data-dcnode-id="1066"><span data-dcnode-id="1069" instrument_node="">
</span><img alt="Third World" class="attachment-full size-full wp-post-image jetpack-lazy-image jetpack-lazy-image--handled lazyloaded" data-dcnode-id="1068" data-lazy-loaded="1" data-ll-status="loaded" height="335" itemprop="image" loading="eager" sizes="(max-width: 660px) 100vw, 660px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.politicalscienceview.com/wp-content/uploads/2018/05/Third-World-in-International-relations.jpg%3Ffit%3D660%252C335%26ssl%3D1%26is-pending-load%3D1&amp;raw" srcset="https://i0.wp.com/www.politicalscienceview.com/wp-content/uploads/2018/05/Third-World-in-International-relations.jpg?w=660&amp;ssl=1 660w, https://i0.wp.com/www.politicalscienceview.com/wp-content/uploads/2018/05/Third-World-in-International-relations.jpg?resize=300%2C152&amp;ssl=1 300w" width="660"><span data-dcnode-id="1067" instrument_node=""> </span></div><span data-dcnode-id="1065" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1044"><span data-dcnode-id="1064" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1062" itemprop="headline"><span data-dcnode-id="1063" instrument_node="">Third World in International Relations</span></h1><span data-dcnode-id="1061" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="1046"><span data-dcnode-id="1060" instrument_node="">
</span><span class="posted-on" data-dcnode-id="1055"><time class="updated" data-dcnode-id="1058" datetime="2021-09-05T10:04:25+00:00" itemprop="dateModified"><span data-dcnode-id="1059" instrument_node="">September 5, 2021</span></time><time class="entry-date published" data-dcnode-id="1056" datetime="2018-05-07T06:56:31+00:00" itemprop="datePublished"><span data-dcnode-id="1057" instrument_node="">May 7, 2018</span></time></span><span data-dcnode-id="1054" instrument_node=""> </span><span class="byline" data-dcnode-id="1048"><span data-dcnode-id="1053" instrument_node="">by </span><span class="author vcard" data-dcnode-id="1049" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><a class="url fn n" data-dcnode-id="1050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politicalscienceview.com/author/politicalscience/" itemprop="url" rel="author" title="View all posts by politicalscience"><span class="author-name" data-dcnode-id="1051" itemprop="name"><span data-dcnode-id="1052" instrument_node="">politicalscience</span></span></a></span></span><span data-dcnode-id="1047" instrument_node=""> </span></div><span data-dcnode-id="1045" instrument_node="">
</span></header><span data-dcnode-id="1043" instrument_node="">
</span><div class="entry-content" data-dcnode-id="743" itemprop="text"><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1024"><span data-dcnode-id="1041" instrument_node="">The Third World emerged in the post-World War II era in </span><a data-dcnode-id="1039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.politicalscienceview.com/nature-purpose-and-scope-of-international-relations/"><span data-dcnode-id="1040" instrument_node="">international relations</span></a><span data-dcnode-id="1038" instrument_node=""> and conditions when the world was divided into opposite ideological blocs. During those days, the process of </span><a data-dcnode-id="1036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politicalscienceview.com/de-colonization/"><span data-dcnode-id="1037" instrument_node="">decolonization</span></a><span data-dcnode-id="1035" instrument_node=""> was at its zenith, as a result of which many Asian and African countries got independence, and they joined the international community as </span><a data-dcnode-id="1033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politicalscienceview.com/sovereignty/"><span data-dcnode-id="1034" instrument_node="">sovereign</span></a><span data-dcnode-id="1032" instrument_node=""> entities.</span><br data-dcnode-id="1031"><span data-dcnode-id="1030" instrument_node="">
</span><iframe class="lazyloaded" data-dcnode-id="1029" data-ll-status="loaded" data-rocket-lazyload="fitvidscompatible" frameborder="0" loading="lazy" marginheight="0" marginwidth="0" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ws-na.amazon-adsystem.com/widgets/q%3FServiceVersion%3D20070822%26OneJS%3D1%26Operation%3DGetAdHtml%26MarketPlace%3DUS%26source%3Dss%26ref%3Das_ss_li_til%26ad_type%3Dproduct_link%26tracking_id%3Danisurrups-20%26language%3Den_US%26marketplace%3Damazon%26region%3DUS%26placement%3D0691126402%26asins%3D0691126402%26linkId%3Dd4ede4bf5e6aa8f566d3d78d994576e0%26show_border%3Dtrue%26link_opens_in_new_window%3Dtrue&amp;raw" style="width: 120px; height: 240px;"></iframe><noscript data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">&lt;iframe style="width: 120px; height: 240px;" src="//ws-na.amazon-adsystem.com/widgets/q?ServiceVersion=20070822&amp;amp;OneJS=1&amp;amp;Operation=GetAdHtml&amp;amp;MarketPlace=US&amp;amp;source=ss&amp;amp;ref=as_ss_li_til&amp;amp;ad_type=product_link&amp;amp;tracking_id=anisurrups-20&amp;amp;language=en_US&amp;amp;marketplace=amazon&amp;amp;region=US&amp;amp;placement=0691126402&amp;amp;asins=0691126402&amp;amp;linkId=d4ede4bf5e6aa8f566d3d78d994576e0&amp;amp;show_border=true&amp;amp;link_opens_in_new_window=true" frameborder="0" marginwidth="0" marginheight="0" scrolling="no"&gt;&lt;/iframe&gt;</span></noscript><br data-dcnode-id="1026"><span data-dcnode-id="1025" instrument_node="">
These newly independent countries had their own political, social, and economic problems such as poverty, malnutrition, unemployment, overpopulation, economic backwardness, the danger of neo-colonialism, political instability and insecurity, keeping aloof from the cold war by adopting non aligned policy, social discrimination, illiteracy, etc.</span></p><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">To grapple with these issues and to achieving economic development, they decided to pursue their own path. They subscribed neither fully to the Western liberal capitalistic system nor the East bloc’s totalitarian communist system.</span></p><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Thus as against the First World of industrially and economically developed Western countries and the Second World of communist countries, a Third World comprising a large population of the globe came into being. The First World was led by the United States and mainly consisted of developed countries located in Western Europe and North America, who believed in democracy, human liberty, equality, and full enterprise.</span></p><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">The Second World was headed by the Soviet Union and embraced Eastern Europe’s socialist countries and other areas that had authoritarian regimes. They believed in achieving socio-economic development through the proletariat party and bureaucratic central planning.</span></p><span data-dcnode-id="1014" instrument_node="">
</span><p data-dcnode-id="1009"><span data-dcnode-id="1013" instrument_node="">Most of these Third World countries were also </span><a data-dcnode-id="1011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politicalscienceview.com/non-alignment/"><span data-dcnode-id="1012" instrument_node="">non-aligned</span></a><span data-dcnode-id="1010" instrument_node=""> countries. They are also treated as synonymous, which is not correct because some countries belonging to the Third World were not non-aligned. The concept of the Third World, therefore, was characterized more by economic contents than political undertones.</span></p><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">The aspirations, problems, objectives, interests, resources,s, etc., are quite distinct from old, established, and developed nations. The genesis of this difference is the yawning gap of wealth and income between the developed rich and underdeveloped poor.</span></p><span data-dcnode-id="1005" instrument_node="">
</span><p data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">If countries of the First and Second World were developed from an industrial and economic point of view, then countries of the Third World were pretty backward in this respect and were yearning for their industrial and economic development.</span></p><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">In this way, Third World comprises of those underdeveloped and developing monies of Asia, Africa, and Latin America which attained ire dependence in the post-war period. Barring a few, air-nos all, these countries are non-aligned and are situated in the Southern hemisphere.</span></p><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">No doubt there are some exceptions also. For example, some of the nations of the Soviet bloc, such as Albania, Yugoslavia, and Cuba, also joined the Third World Countries. Similarly, some non-European nations that were never under colonial rule were also known as Third World countries.</span></p><span data-dcnode-id="996" instrument_node="">
</span><h2 data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Nature, Goals, And Role Of The Third World:</span></h2><span data-dcnode-id="993" instrument_node="">
</span><h3 data-dcnode-id="990"><strong data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Worldwide inequality of Wealth and Income:</span></strong></h3><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Kegley and Wittkopf have defined the Third World keeping in view global disparities in income and wealth. In their words, The Third World comprises the poorer, economically less developed countries of the world. So numerous are they that it is easier to say who is developed than to say who is not.</span></p><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="981"><span data-dcnode-id="985" instrument_node="">The underdeveloped countries include all of Asia and Oceania except Japan, Australia, and New Zealand, all of Africa except South Africa, and all of the Western Hemisphere except Canada and the United States. Some formulations also include a few European nations in developing economies (Portugal. Spain, Greece, Turkey, Yugoslavia, and Romania)</span><span data-dcnode-id="983" style="color: #ff0000;"><span data-dcnode-id="984" instrument_node="">1</span></span><span data-dcnode-id="982" instrument_node="">.</span></p><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">The Third World consists of about 75 percent of the World’s population. But it produces barely 20 percent of the world’s goods and services, as measured by gross national product (GNP). On a per-capita basis, this implies that the average annual income for the Third World as a whole is less than $2000 while the average income for the First and Second Worlds is well more than this amount. This shows the vast disparity in the distribution of the world’s population and the wealth owned by them.</span></p><span data-dcnode-id="977" instrument_node="">
</span><h3 data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Rejection of a World divided into Capitalism and Communism:</span></h3><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="973" instrument_node="">In the opinion of Calvocoressi, It was a Third World because it rejected the notion of a world divided into two worlds in which only the United States and the USSR counted, and everybody else had to declare for the one or the other. It feared the power of the superpowers, exemplified and magnified by nuclear weapons. It distrusted their intentions, envied their superior wealth, and rejected their insistence that in one case in democratic capitalism and the other in communism, they had discovered a way of life which others need do no more than a copy.</span><span data-dcnode-id="971" style="color: #ff0000;"><span data-dcnode-id="972" instrument_node="">2</span></span></p><span data-dcnode-id="969" instrument_node="">
</span><p data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">Thus, Third World countries rejected both Moscow’s rigid communist dogmatism and Washington’s increasingly. Rigid anti-communism. They were obliged neither to the USA nor to the USSR for their independence from the colonial yoke, which they achieved with their own efforts and with great speed.</span></p><span data-dcnode-id="966" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="965" instrument_node="">In short, the term Third World refers to all those poor, underdeveloped, and backward countries who are endeavoring hard for economic independence and development without aligning themselves with any of the two power blocs. They are described as Third World countries based on their economic situation rather than their political alignment, ideological orientation, and governmental structure. They are poor, unstable, new, non-white, and weak.</span><span data-dcnode-id="963" style="color: #ff0000;"><span data-dcnode-id="964" instrument_node="">3</span></span></p><span data-dcnode-id="961" instrument_node="">
</span><h3 data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">North-South Conflict:</span></h3><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">The appellation of rich and developing nations has been replaced by North and South countries. Incidentally, most of the rich and developed countries are located in the northern hemisphere, and the geographical location of most poor Third World countries is in the southern hemisphere. Consequently, the economic division of the world between rich and poor is known as the North-South divide. The struggle of the Third World countries for economic independence and justice is known as the North-South conflict. If the East-West conflict of the cold war days is over, the North-South conflict continues to persist.</span></p><span data-dcnode-id="955" instrument_node="">
</span><h2 data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Goals of the Third World:</span></h2><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="949"><strong data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">The chief goals of the Third World countries can be listed as below:</span></strong></p><span data-dcnode-id="948" instrument_node="">
</span><h3 data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">1.Economic and technological development.</span></h3><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="944" instrument_node="">The developing </span><span class="_5yl5" data-dcnode-id="940"><span data-dcnode-id="943" instrument_node="">nations of Asia, Africa, and Latin America have evolved a common identity and a unity of purpose. Their goal is economic and technological development. Technological dependence is the main reason that keeps developing nations at the bottom of the world development ladder. Singer and Ansari argue that if the technological gap is not overcome, the developing countries will remain dependent on the rich economies, and no form of assistance, trade concessions, grants, technical assistance, or fortuitous price rises will prove to the lasting value. International cooperation policies must be devised which serve to remove this fundamental obstacle in the path of development</span><span data-dcnode-id="941" style="color: #ff0000;"><span data-dcnode-id="942" instrument_node="">.4</span></span></span></p><span data-dcnode-id="938" instrument_node="">
</span><h3 data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">2. New International Economic Order:</span></h3><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">Third World countries’ policy prescriptions for dealing with the issues relating to trade and pricing mechanisms came to be known collectively in diplomatic circles during the 19705 as the demand for a New International Economic Order (NIEO), an international economic system fundamentally different from the present one. This goal was set from the relative deprivation Third World countries see in their position in the present structure of international economic relations and the continuance of nee-colonial relationship between the world’s rich and poor. Kegley and Wittkopf explain Third World nations see the current system as an instrument of their continued oppression.</span></p><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="928"><span data-dcnode-id="931" instrument_node="">They would like to be equal to the more advanced countries in the global community, in fact, not just in law. The NIEO is viewed as an alternative to the present exploitative system. If the NIEO were implemented as envisioned by the developing nations, the net effect would be a substantial redistribution of income and wealth from such nations to the poor.</span><span data-dcnode-id="929" style="color: #ff0000;"><span data-dcnode-id="930" instrument_node="">5</span></span></p><span data-dcnode-id="927" instrument_node="">
</span><h3 data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">3. Political Autonomy:</span></h3><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">The demand for equality extends beyond economics to politics. Equality of dignity and equality of influence are also their objectives. Wriggins rightly observe: Many (Third World) leaders are tired of being ignored, of never being invited to the international high table, or of pressing their views and having them regularly rebuffed. More substantially, many are hostile to the notion that the state system should be organized in its present sharply hierarchical fashion, in which a few with wealth, industrial and technological strength, and the capability to apply force regularly make decisions that so profoundly affect the conditions and well being of even distant states.</span></p><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">They are coming to insist upon participating in the making of decisions that affect them. Along with equality, these nations are equally interested in their autonomy and independence. Wiggins vividly explains this goal in these words, Each state, it is held, should be able to manage its own political and economic affairs without interference from outside each should be in a position to decide for itself how its resources should be utilized, what policies industrial and agricultural enterprises operating within its borders should follow, and such economic matters as interest rates for loans, rates of exchange, and export subsidies? Thus these countries are keen to save themselves from any domination.</span></p><span data-dcnode-id="918" instrument_node="">
</span><h3 data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">4. Non-alignment:</span></h3><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="911"><span data-dcnode-id="914" instrument_node="">To safeguard their political independence and insulate themselves from any domination, most of these nations preferred nonalignment in the world’s East-West division. During the cold war days when military alliances were being formed, these countries declined to join either: With time Nonaligned Movement (NAM) became a force to be reckoned with, and more and more Third World countries joined it. Out of about 122 Third World countries, 103 declared themselves as non-alignment. The various aspects of non-alignment have already been discussed in the </span><a data-dcnode-id="912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.politicalscienceview.com/non-alignment/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="913" instrument_node="">previous article.</span></a></p><span data-dcnode-id="910" instrument_node="">
</span><h2 data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Role and Impact of Third World in International Relations:</span></h2><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">The points discussed therein bear a close analogy to the role of the Third World in international relations. Hence the same is dealt with here in brief. The Third World countries changed the nature and scope of international relations and made them global in a true sense. They played a significant role in ending colonialism, racialism, bipolarism, military alliances, the cold war, etc.</span></p><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">They influenced the course of international relations by indulging in numerous regional conflicts on the one hand and by launching regional organizations of cooperation (e.g., ASEAN, O.A.U., SAARC, etc.) on the other. They evolved the concept of nonalignment and expanded it in the form of a movement (NAM). They strengthened the U.N.O and influenced its working by their sheer numerical strength. Although there were several causes for detente coming, the Third World’s contribution is no less significant.</span></p><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="897"><span data-dcnode-id="900" instrument_node="">Third World has also given several new centers of power. It also became. First, there is neocolonialism and later a crusader against this evil by initiating a North-South dialogue. The third World is playing its role by struggling for the New International Economic Order and New Communication Order to bring economic justice and equality. In this respect, the Third World’s role has mainly been an Opinion mobilizing role, the goal of which has been to legitimize the concern that they share among themselves and to explore the possibilities of an alternative emerging out of such legitimacy.</span><span data-dcnode-id="898" style="color: #ff0000;"><span data-dcnode-id="899" instrument_node="">7</span></span></p><span data-dcnode-id="896" instrument_node="">
</span><h2 data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Rise Of The Fourth World:</span></h2><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">The main change in the Third World countries is the increased prominence of the Arab nations. The oil-producing and exporting nations of the world are still typically regarded by many scholars as members of the Third World, despite the enormous increases in income they have realized in recent years because they generally lack the indigenous industrial capability and also have relatively low standards of living as measured by nonincome indicators. As these features change, the appropriateness of the label Third World will become irrelevant.</span></p><span data-dcnode-id="890" instrument_node="">
</span><p data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Calvocoressi has already declared the Third World as an obsolete concept. In his words, A new group of countries had come into being whose wealth distinguished them dramatically from the world’s poor and whose solidarity enabled them to play a forceful role in international affairs.</span></p><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="883"><span data-dcnode-id="886" instrument_node="">This was the Fourth World of OPEC (Organization of Petroleum Exporting Countries) whose members owed their wealth to oil and their political and economic clout because, although very different in geographical extent population, they were few enough and united enough to subordinate their differences to common action. In the seventies, they raised the oil price so steeply to make all their customers, rich and poor, tremble for their economic future.</span><span data-dcnode-id="884" style="color: #ff0000;"><span data-dcnode-id="885" instrument_node="">8</span></span></p><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">The OPEC countries no longer remained poor developing countries, but they were now rich in cash. They were rich differently, rich from selling an exhaustible resource, not rich from the inexhaustible repeatable manufacturing processes. They foresaw a fixed tenure of their years of richness. Their objectives in forcing up the price of their commodity were economic (to collect money for development, affluence, and ostentation), strategic (to pile armaments), and political (to put anti-Israeli pressure on customers, a majority of OPEC’s, thirteen members being Arab).</span></p><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">The rise in oil prices badly disturbed the world economy and polity as the same coincided with the intensified other unsettling economic factors: a decline in the dollar value (especially after the Vietnam war), the collapse of the Bretton Woods system, and international inflation. Many OPEC members made more money than they knew what to do within their relatively underdeveloped and underpopulated countries.</span></p><span data-dcnode-id="876" instrument_node="">
</span><p data-dcnode-id="872"><span data-dcnode-id="875" instrument_node="">By investing their huge surpluses in an unstable industrialized world, they found themselves acquiring a property that, partly due to their own actions, was being gradually devalued while their price increases were squeezing their customers to the point where these must cut their purchases. Furthermore, the massive transfer of capital from countries that could use it productively to countries that could not arise from the industrial world to OPEC members -blocked resources and so caused a shrinkage of the world economy.</span><span data-dcnode-id="873" style="color: #ff0000;"><span data-dcnode-id="874" instrument_node="">9</span></span></p><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">With the rise of this so-called Fourth World, the Third World suffered a dual disadvantage. First, the price hike of oil was so exorbitant that it adversely hit their economies. Second, the prospects of getting financial accommodation from industrialized countries and their private banks became remote.</span></p><span data-dcnode-id="868" instrument_node="">
</span><p data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">With the collapse of the socialist model and the socialist bloc and its increasing inclination towards a free market economy, Second World is fast disappearing. Under the circumstances, it does not appear pertinent to designate the Third World as such. If Second World gradually merges into the First World and oil-rich countries or the Fourth World step into its shoes, the Third World Countries would maintain their designation and nomenclature.</span></p><span data-dcnode-id="865" instrument_node="">
</span><h3 data-dcnode-id="862"><span data-dcnode-id="863" style="color: #ff0000;"><span data-dcnode-id="864" instrument_node="">REFERENCES:</span></span></h3><span data-dcnode-id="861" instrument_node="">
</span><p data-dcnode-id="857"><span data-dcnode-id="859" style="color: #ff0000;"><span data-dcnode-id="860" instrument_node="">1.</span></span><span data-dcnode-id="858" instrument_node=""> Charles W.Kegley, Jr. 5: Eugene R. Wittkopf, World Politics Trend and Transformation (New York, 1981), p 23.</span></p><span data-dcnode-id="856" instrument_node="">
</span><p data-dcnode-id="852"><span data-dcnode-id="854" style="color: #ff0000;"><span data-dcnode-id="855" instrument_node="">2.</span></span><span data-dcnode-id="853" instrument_node=""> Peter Calvocoressi, World Politics since l945 (New York, 1982) 4th ed., p. 94.</span></p><span data-dcnode-id="851" instrument_node="">
</span><p data-dcnode-id="847"><span data-dcnode-id="849" style="color: #ff0000;"><span data-dcnode-id="850" instrument_node="">3.</span></span><span data-dcnode-id="848" instrument_node=""> Quoted by J.D.B. Miller, Sisir Gupta’s View of the Third Word in MS. Ranjan and Shivaji Ganguly (Ed.), Great Power Relations, World Order and the Third World (New Delhi, 1981), p.193.</span></p><span data-dcnode-id="846" instrument_node="">
</span><p data-dcnode-id="842"><span data-dcnode-id="844" style="color: #ff0000;"><span data-dcnode-id="845" instrument_node="">4.</span></span><span data-dcnode-id="843" instrument_node=""> Hans W. Singer and Javed, A. Ansari, Rich, and Poor Countries (Baltimore, 1977).</span></p><span data-dcnode-id="841" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="839" style="color: #ff0000;"><span data-dcnode-id="840" instrument_node="">5.</span></span><span data-dcnode-id="838" instrument_node=""> Op. cit. n. 1, p.94.</span></p><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="832"><span data-dcnode-id="834" style="color: #ff0000;"><span data-dcnode-id="835" instrument_node="">6.</span></span><span data-dcnode-id="833" instrument_node=""> W.Howard Wriggins, ” Third World Strategies for Change: The Political Context of North-South Interdependence” in W. Howard. Wiggins and Gunnar Adler-Karlsson. Reducing Global inequities (New York. 1978), pp. 19-117.</span></p><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="827"><span data-dcnode-id="829" style="color: #ff0000;"><span data-dcnode-id="830" instrument_node="">7.</span></span><span data-dcnode-id="828" instrument_node=""> Anam Jaitly, International Politics-Major Contemporary Trends and Issues (New Delhi, 1984), p.152.</span></p><span data-dcnode-id="826" instrument_node="">
