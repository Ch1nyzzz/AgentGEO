</span><meta content="The definition of a veteran differs greatly from nation to nation, having been shaped by the history of war, the nature of conflicts, casualties, invo…" data-dcnode-id="2321" property="og:description"><span data-dcnode-id="2320" instrument_node="">
</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;abs0010&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;abssec0010&quot;><p id=&quot;abspara0010&quot;>The definition of a veteran differs greatly from nation to nation, having been shaped by the history of war, the nature of conflicts, casualties, involvement of the civil population in wars, and the set of sociopolitical regulations and means applied in that particular country. All these factors have an impact on who is legally considered a veteran and who is eligible for support and programs provided to mitigate difficulties in transitioning from the military system to the civilian society. However, these official definitions may exclude some service members that might experience difficulties in the transition process. One of the important factors influencing all service members is the military culture. Service members of different branches of the military or voluntary military organizations will have internalized the ideals and patterns of military culture to some extent and are influenced by it. Military culture will have important implications for how a service member transitions back into civilian life. It is also important for the society to know and share an understanding of the military and its culture to smooth the transition from the military-to-civilian society. A lack of shared military culture understanding has important implications for the type of support the veteran will need for a smooth and successful transition process.</p></div></div></div>" data-dcnode-id="2319" lang="en" name="citation_abstract"><span data-dcnode-id="2318" instrument_node="">

ass="button-text" data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">Cite</span></span></button></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="1998" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="2001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/B978-0-12-815312-3.00002-4" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="2002" instrument_node="">https://doi.org/10.1016/B978-0-12-815312-3.00002-4</span></a><a class="rights-and-content" data-dcnode-id="1999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DB9780128153123000024%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2000" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="1997"></section><section class="ReferencedArticles" data-dcnode-id="1996"></section><div class="PageDivider" data-dcnode-id="1995"></div><div class="Abstracts u-font-serif" data-dcnode-id="1988" id="abstracts"><div class="abstract author" data-dcnode-id="1989" id="abs0010" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">Abstract</span></h2><div data-dcnode-id="1990" id="abssec0010"><p data-dcnode-id="1991" id="abspara0010"><span data-dcnode-id="1992" instrument_node="">The definition of a veteran differs greatly from nation to nation, having been shaped by the history of war, the nature of conflicts, casualties, involvement of the civil population in wars, and the set of sociopolitical regulations and means applied in that particular country. All these factors have an impact on who is legally considered a veteran and who is eligible for support and programs provided to mitigate difficulties in transitioning from the military system to the civilian society. However, these official definitions may exclude some service members that might experience difficulties in the transition process. One of the important factors influencing all service members is the military culture. Service members of different branches of the military or voluntary military organizations will have internalized the ideals and patterns of military culture to some extent and are influenced by it. Military culture will have important implications for how a service member transitions back into civilian life. It is also important for the society to know and share an understanding of the military and its culture to smooth the transition from the military-to-civilian society. A lack of shared military culture understanding has important implications for the type of support the veteran will need for a smooth and successful transition process.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="1965" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="1977"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="1978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780128153123000012"><svg class="icon icon-navigate-left" data-dcnode-id="1986" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="1987"></path></svg><span class="button-alternative-text" data-dcnode-id="1979"><strong data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">chapter</span></span><span class="extra-detail-2" data-dcnode-id="1980"><span data-dcnode- wrd0030"><span data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">NATO</span></span></div><div class="keyword" data-dcnode-id="1945" id="kwrd0035"><span data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">Veteran</span></span></div></div></div><span data-dcnode-id="1942" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="1643" id="body"><span class="list" data-dcnode-id="1909"><span data-dcnode-id="1941" instrument_node="">Outline</span><dl data-dcnode-id="1910"><dd class="list-description" data-dcnode-id="1936"><p data-dcnode-id="1937" id="p0005x"><span data-dcnode-id="1940" instrument_node="">The definition of veteran, why does it matter in the transition process? </span><a class="workspace-trigger" data-dcnode-id="1938" href="#s0010" name="bs0010"><span data-dcnode-id="1939" instrument_node="">6</span></a></p></dd><dd class="list-description" data-dcnode-id="1931"><p data-dcnode-id="1932" id="p0010x"><span data-dcnode-id="1935" instrument_node="">Transitioning back to civilian society </span><a class="workspace-trigger" data-dcnode-id="1933" href="#s0020" name="bs0020"><span data-dcnode-id="1934" instrument_node="">14</span></a></p></dd><dd class="list-description" data-dcnode-id="1926"><p data-dcnode-id="1927" id="p0015x"><span data-dcnode-id="1930" instrument_node="">The veteran as an immigrant </span><a class="workspace-trigger" data-dcnode-id="1928" href="#s0025" name="bs0025"><span data-dcnode-id="1929" instrument_node="">14</span></a></p></dd><dd class="list-description" data-dcnode-id="1921"><p data-dcnode-id="1922" id="p0020x"><span data-dcnode-id="1925" instrument_node="">Transitioning back to the civilian community: avoiding the bumps </span><a class="workspace-trigger" data-dcnode-id="1923" href="#s0030" name="bs0030"><span data-dcnode-id="1924" instrument_node="">16</span></a></p></dd><dd class="list-description" data-dcnode-id="1916"><p data-dcnode-id="1917" id="p0025x"><span data-dcnode-id="1920" instrument_node="">Conclusion </span><a class="workspace-trigger" data-dcnode-id="1918" href="#s0035" name="bs0035"><span data-dcnode-id="1919" instrument_node="">18</span></a></p></dd><dd class="list-description" data-dcnode-id="1911"><p data-dcnode-id="1912" id="p0030x"><span data-dcnode-id="1915" instrument_node="">References </span><a class="workspace-trigger" data-dcnode-id="1913" href="#cebib0010" name="bcebib0010"><span data-dcnode-id="1914" instrument_node="">18</span></a></p></dd></dl></span><div data-dcnode-id="1644"><section data-dcnode-id="1819" id="s0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1907" id="cesectitle0010"><span data-dcnode-id="1908" instrument_node="">The definition of veteran, why does it matter in the transition process?</span></h2><p data-dcnode-id="1902" id="p0010"><span data-dcnode-id="1906" instrument_node="">In 2014, at the NATO summit in Wales, the heads of state and government acknowledged the demanding nature of military service and reaffirmed their nation's support to the men and women of the armed forces and their families, while still serving, but also after service (</span><a class="workspace-trigger" data-dcnode-id="1904" href="#bib19" name="bbib19"><span data-dcnode-id="1905" instrument_node="">NATO, 2014</span></a><span data-dcnode-id="1903" instrument_node="">). While this document does not include the word “veteran,” it certainly includes veterans in its scope. The reason is simple. In an international context, using the term “veteran” would cause undue confusion, as nations have defined who is a veteran quite differently, let&nbsp;alone the differences in who the public in any given country considers to be a veteran. Because this book is about military veterans transitioning to civilian life, we are going to take a closer look at who do we mean when discussing issues connected to military–civilian transition. Who exactly are veterans?</span></p><p data-dcnode-id="1895" id="p0015"><span data-dcnode-id="1901" instrument_node="">Generally speaking, the definition of a veteran is based on either the length or the nature of the service, ranging from broadly inclusive to quite narrowly exclusive (</span><a class="workspace-trigger" data-dcnode-id="1899" href="#bib9" name="bbib9"><span data-dcnode-id="1900" instrument_node="">Dandeker, Wessely, Iversen, &amp; Ross, 2006</span></a><span data-dcnode-id="1898" instrument_node="">). The most inclusive and broad definition of a veteran encompasses all those who have served in the armed forces for any period of time. For example, in the United Kingdom, the length of service to qualify as a veteran is a single day. In this case, the underlying factors are the intent and initiative of the person to serve and the subsequent acceptance of service by the armed forces. In essence, a life-long binding contract exists after a single day of service. For other nations, like the United States, the length of service is 2</span><span data-dcnode-id="1897" instrument_node="">&nbsp;</span><span data-dcnode-id="1896" instrument_node="">years, yet that service must have occurred on active duty, along&nbsp;with having served “honorably” during the entire time of service.</span></p><p data-dcnode-id="1893" id="p0020"><span data-dcnode-id="1894" instrument_node="">The most exclusive or strict definition of a veteran only includes those who have served in combat. Many nations even make the further distinction between being a “combat veteran” or simply a “veteran,” with the former obviously being seen in a more favorably light than the latter. In practice, however, most nations include as veterans those who have served on any type of operational mission (i.e., deployed outside of their home nation). For example, the Dutch and Australians, as well as many other nations, define a veteran either as a former or current military service member who has served on a peacekeeping or peace enforcement mission in another nation. Indeed, this definition of a veteran appears to be the most widely accepted.</span></p><p data-dcnode-id="1889" id="p0025"><span data-dcnode-id="1892" instrument_node="">Both extremes of the definition spectrum have drawbacks, as well as advantages. More inclusive definitions are clearer and can potentially allow even the newest members of the armed forces to position themselves as a part of a larger veteran community. Yet, at </span><span data-dcnode-id="1891" id="p7"></span><span data-dcnode-id="1890" instrument_node="">the same time, calling someone a veteran who had not even successfully completed basic combat training may diminish the contributions of other service members who did. Likewise, referring to service members who may have been dishonorably discharged from the military may also diminish the status of being a veteran.</span></p><p data-dcnode-id="1883" id="p0030"><span data-dcnode-id="1888" instrument_node="">Paradoxically, a strict or narrower definition of a veteran can also create unintended drawbacks. For instance, in the United States, someone who has served honorably in the National Guard or reserves, yet never served on active duty for the required 2</span><span data-dcnode-id="1887" instrument_node="">&nbsp;</span><span data-dcnode-id="1886" instrument_node="">years, would not be considered a veteran, even if they served for 30</span><span data-dcnode-id="1885" instrument_node="">&nbsp;</span><span data-dcnode-id="1884" instrument_node="">years. Such a situation would also be true for those nations that require serving on an operational deployment to be considered a veteran. Determining who is and is not a veteran is important, as being a veteran often determines the level and eligibility of support that a service member leaving the military will receive.</span></p><p data-dcnode-id="1875" id="p0035"><span data-dcnode-id="1882" instrument_node="">There are a range of aspects that determine whom a nation acknowledges as a veteran, including the nation's history, civil–military relations, force structure (</span><a class="workspace-trigger" data-dcnode-id="1880" href="#bib9" name="bbib9"><span data-dcnode-id="1881" instrument_node="">Dandeker et&nbsp;al., 2006</span></a><span data-dcnode-id="1879" instrument_node="">), and social factors such as economic wealth and the social welfare system that exists within the nation (</span><a class="workspace-trigger" data-dcnode-id="1877" href="#bib10" name="bbib10"><span data-dcnode-id="1878" instrument_node="">Danilova, 2010</span></a><span data-dcnode-id="1876" instrument_node="">). The historical background of a nation can include many factors. For example, veteran status may be linked to participating in a specific war or conflict, with specific service required during a specific time period. If the service member served during that period, then they are acknowledged as a veteran of that conflict. The Croatian definition is one that can be given as an example in this context, as veterans are those who participated in the Croatian Homeland War 1991–95, members of National Liberation Movement (i.e., partisans) in WWII, members of Home Guard in WWII, and former active duty personnel who served after 1996 (Survey). The Croatian example also includes people who technically were not members of the official armed forces but nevertheless participated as combatants in an armed conflict. Therefore, some nations may include individuals who never wore the uniform.</span></p><p data-dcnode-id="1865" id="p0040"><span data-dcnode-id="1874" instrument_node="">Estonia can be given as an example when considering the force structure of the definition of veteran. Estonian Defence Forces are structured according to the principle of a reserve force, employing conscription and voluntary service for its Defence League and reserve units. Thus, the Estonian definition includes those who have participated in the military defense of the country as part of the Defence Forces (which in the Estonian case is a part of the definition looking into the future), a person who has participated as part of the Defence Forces on either international or collective defense operations and those who have sustained permanent incapacity for work while discharging duties in the Defence Forces or as an active </span><span data-dcnode-id="1873" id="p8"></span><span data-dcnode-id="1872" instrument_node="">member of the Defence League. Thus, the definition supports the logic of the national defense model and also takes into account the contribution to national defense made by conscripts, Defence League members, and reservists (</span><a class="workspace-trigger" data-dcnode-id="1870" href="#bib27" name="bbib27"><span data-dcnode-id="1871" instrument_node="">Veterans Policy, 2012</span></a><span data-dcnode-id="1869" instrument_node="">). Countries with historically controversial civil-military relations are trying to find a different way of how to frame and understand the new emerging group of veterans. This process adds a specific set of challenges (</span><a class="workspace-trigger" data-dcnode-id="1867" href="#bib17" name="bbib17"><span data-dcnode-id="1868" instrument_node="">Michael, Nicola, &amp; Naser-Lather, 2018</span></a><span data-dcnode-id="1866" instrument_node="">).</span></p><p data-dcnode-id="1857" id="p0045"><span data-dcnode-id="1864" instrument_node="">The official definitions of veteran may be viewed as political statements. How one defines a veteran can be used to promote veteran issues to help those who need help, but they can always be used to further other political goals. There are some groups of former military service members who have not been recognized by their nation as “veterans.” Typically, these former service members denied veteran status participated in unpopular or controversial conflicts and wars. For example, during the Soviet–Afghan War, because it was considered to be unsuccessful one already while it was still going on, those service members killed in action were sent home in closed zinc coffins and families had to bury them in the dead of night (</span><a class="workspace-trigger" data-dcnode-id="1862" href="#bib1" name="bbib1"><span data-dcnode-id="1863" instrument_node="">Aleksievich, 1992</span></a><span data-dcnode-id="1861" instrument_node="">). These veterans were only later recognized by the current Russian government, with some arguing purely for political gains (</span><a class="workspace-trigger" data-dcnode-id="1859" href="#bib20" name="bbib20"><span data-dcnode-id="1860" instrument_node="">Porter, 2017</span></a><span data-dcnode-id="1858" instrument_node="">).</span></p><p data-dcnode-id="1852" id="p0050"><span data-dcnode-id="1856" instrument_node="">Definition of veteran frames not only how we as individuals but also as societies understand and relate to the men and women who come under this definition. It determines who is eligible to receive financial support and services, public recognition, and private gratitude. In other words, definitions influence governmental policies and distribution of and access to resources—that is the sociological framework and more widely the social inclusion or exclusion within any given society (</span><a class="workspace-trigger" data-dcnode-id="1854" href="#bib6" name="bbib6"><span data-dcnode-id="1855" instrument_node="">Burdett et&nbsp;al., 2013</span></a><span data-dcnode-id="1853" instrument_node="">). In short, how a nation defines a veteran will determine how that nation recognizes and supports that service member after their military service is completed.</span></p><p data-dcnode-id="1846" id="p0055"><span data-dcnode-id="1851" instrument_node="">Because of the fact that some countries have a strict as opposed to a broad (</span><a class="workspace-trigger" data-dcnode-id="1849" href="#bib9" name="bbib9"><span data-dcnode-id="1850" instrument_node="">Dandeker et&nbsp;al., 2006</span></a><span data-dcnode-id="1848" instrument_node="">) definition of veteran, not all military service members are entitled to the same services and support. Indeed, even veterans from different wars may be entitled to different services and support, depending on the laws of that nation. In the United States, for example, the highly popular and successful education program that supports veterans obtaining an advanced college degree, known as the GI Bill, varies from one conflict to another, with the veterans of WWII receiving more generous support to attend the college or university of their choice compared with the veterans of the Vietnam War of those who served in Iraq or Afghanistan.</span><span data-dcnode-id="1847" id="p9"></span></p><p data-dcnode-id="1838" id="p0060"><span data-dcnode-id="1845" instrument_node="">Despite the importance of how veteran status is defined, our aim here is to show that regardless of how each nation defines a veteran, all service members leaving the military will require some level of support as they are transitioning back into civilian life. Transitions can be stressful, and military transitions in particular entail moving from the military culture to the civilian culture, producing changes in relationships, assumptions, work context, and personal and social identity (</span><a class="workspace-trigger" data-dcnode-id="1843" href="#bib7" name="bbib7"><span data-dcnode-id="1844" instrument_node="">Castro &amp; Kintzle, 2014</span></a><span data-dcnode-id="1842" instrument_node="">). An unsuccessful transition will be a burden on the social networks of the veteran and a burden for the community and for the state. So when discussing different aspects of the transition process, it is important to bear in mind that in terms of transition, the most inclusive idea of who is a veteran should be applied.</span><a class="workspace-trigger" data-dcnode-id="1839" href="#fn1" name="bfn1"><sup data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">1</span></sup></a></p><p data-dcnode-id="1825" id="p0065"><span data-dcnode-id="1837" instrument_node="">It should be kept in mind that research shows most military service members do not experience major difficulties in their transition process (see </span><a class="workspace-trigger" data-dcnode-id="1835" href="#bib12" name="bbib12"><span data-dcnode-id="1836" instrument_node="">Elnitsky, Fisher, &amp; Blevins, 2017</span></a><span data-dcnode-id="1834" instrument_node="">, for a comprehensive review). In addition to the more obvious reasons as to why some transitioning military service members need support, such as mental and physical health issues that they acquired during their military service, it has been proposed that transitioning from the military culture back to the civilian culture plays a significant role. </span><a class="workspace-trigger" data-dcnode-id="1832" href="#bib5" name="bbib5"><span data-dcnode-id="1833" instrument_node="">Bergman, Burdett, and Greenberg (2014)</span></a><span data-dcnode-id="1831" instrument_node=""> propose that there is a “reverse” culture shock that separating service members experience. The “first” cultural shock being the one experienced when joining the military. Cultural shock denotes the feelings of unease and stress that people experience when the cultural practices that they are used to no longer serve them well in a new environment, causing them to rethink and adjust the competences they used to thrive in one cultural context to another cultural context (</span><a class="workspace-trigger" data-dcnode-id="1829" href="#bib22" name="bbib22"><span data-dcnode-id="1830" instrument_node="">Raud, 2013</span></a><span data-dcnode-id="1828" instrument_node="">). In the case of military service personnel, we can frame their experience as a reverse culture shock as they are in fact returning to a civilian culture where they used to have cultural competences, much like someone who has spent a significant amount of time abroad will have to readjust to their country of origin once they return. Although it can be argued that for those who have joined the military at a young age, culture shock may be more salient than reverse culture </span><span data-dcnode-id="1827" id="p10"></span><span data-dcnode-id="1826" instrument_node="">shock because they are in fact transferring into a culture where they have never gained competence or capital as grown-ups.</span></p><p data-dcnode-id="1820" id="p0070"><span data-dcnode-id="1824" instrument_node="">Arguably, the militaries of nations employ different force and organizational structures between the different services of the armed forces, let&nbsp;alone the armed forces of different countries. Nonetheless, various military organizations share certain traits that stem from the unique purpose of militaries, namely that the primary goal is to produce operationally ready units (</span><a class="workspace-trigger" data-dcnode-id="1822" href="#bib24" name="bbib24"><span data-dcnode-id="1823" instrument_node="">Siebold, 2001</span></a><span data-dcnode-id="1821" instrument_node="">) and thus the occupational culture of militaries is subjugated to that ultimate goal.</span></p></section><section data-dcnode-id="1715" id="s0015"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1817" id="cesectitle0015"><span data-dcnode-id="1818" instrument_node="">Military-to-civilian transition seen through the lens of cultural transition</span></h2><p data-dcnode-id="1799" id="p0075"><span data-dcnode-id="1816" instrument_node="">To begin our short discussion on how military culture influences transitioning military service members, we need to determine what is culture or rather how we see culture within the context of this chapter. Culture has been much used and at times overused and has not always been clearly or well defined (</span><a class="workspace-trigger" data-dcnode-id="1814" href="#bib18" name="bbib18"><span data-dcnode-id="1815" instrument_node="">Minkov, 2012</span></a><span data-dcnode-id="1813" instrument_node="">). There are also those who have denied the utility of using the concept of culture (</span><a class="workspace-trigger" data-dcnode-id="1811" href="#bib4" name="bbib4"><span data-dcnode-id="1812" instrument_node="">Barber, 2008</span></a><span data-dcnode-id="1810" instrument_node="">). However, we propose to use </span><a class="workspace-trigger" data-dcnode-id="1808" href="#bib22" name="bbib22"><span data-dcnode-id="1809" instrument_node="">Raud's (2013)</span></a><span data-dcnode-id="1807" instrument_node=""> fairly straightforward definition of culture: it is a loosely tied set of representations, texts, and practices that give meaning to a person's environment. Cultural practices are the things that people do and actively participate in, creating meaning and maintaining meaning. Culture is always learned and essentially a group phenomenon. Another useful definition that will help understanding the role of culture in transitioning between cultures is that proposed by </span><a class="workspace-trigger" data-dcnode-id="1805" href="#bib15" name="bbib15"><span data-dcnode-id="1806" instrument_node="">Hofstede, Hofstede, and Minkov (2010)</span></a><span data-dcnode-id="1804" instrument_node="">, with culture being “the software of the mind,” the sources of this software lie within the environments not only where people grew up but also where they collected their life experiences. This software allows us to make sense of the loosely connected sets of texts, representations, and practices within our cultural environments, but for those with different software or cultural background our environment might seem different or even not make sense at all (</span><a class="workspace-trigger" data-dcnode-id="1802" href="#bib22" name="bbib22"><span data-dcnode-id="1803" instrument_node="">Raud, 2013</span></a><span data-dcnode-id="1801" instrument_node="">). Military culture as any culture can be discussed on micro- and macrolevels, but, in this chapter, we are going to discuss culture more on the macrolevel, yet acknowledging that culture is practiced and performed by individuals in different and sometimes even contradicting ways even within the same cultural environment and among people with the same essential software.</span><span data-dcnode-id="1800" id="p11"></span></p><p data-dcnode-id="1776" id="p0080"><span data-dcnode-id="1798" instrument_node="">So what makes the military culture distinct and separate from other occupational cultures? As the military is a large and constant organization in most countries, it has been the focal point of a lot of research and there have been various attempts in trying to establish what military culture is. </span><a class="workspace-trigger" data-dcnode-id="1796" href="#bib13" name="bbib13"><span data-dcnode-id="1797" instrument_node="">Grimell (2015)</span></a><span data-dcnode-id="1795" instrument_node=""> points out that the commonalities of military cultures across militaries include traits such as valuing the collective, having an anti-individualistic perspective, as the group is placed above the individual and camaraderie is re-enforced as much as possible. These bonds are more often than not mainly within the military culture, forming a strong in-group identity (</span><a class="workspace-trigger" data-dcnode-id="1793" href="#bib26" name="bbib26"><span data-dcnode-id="1794" instrument_node="">Tajfel, 1974</span></a><span data-dcnode-id="1792" instrument_node="">). The people in the in-group form close psychological attachments to each other. This often leads to forming a psychological distance between the military and civilian worlds (</span><a class="workspace-trigger" data-dcnode-id="1790" href="#bib8" name="bbib8"><span data-dcnode-id="1791" instrument_node="">Coll, Weiss, &amp; Yarvis, 2011</span></a><span data-dcnode-id="1789" instrument_node="">). Military culture generally promotes qualities such as unity, discipline, physical fitness, duty, and self-sacrifice, where the latter two are prominent among military personnel (</span><a class="workspace-trigger" data-dcnode-id="1787" href="#bib13" name="bbib13"><span data-dcnode-id="1788" instrument_node="">Grimell, 2015</span></a><span data-dcnode-id="1786" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="1784" href="#bib21" name="bbib21"><span data-dcnode-id="1785" instrument_node="">Rahbek-Clemmensen et&nbsp;al., 2012</span></a><span data-dcnode-id="1783" instrument_node="">). At the same time, military culture also has values that conventionally are not often associated with the military mind-set, values that seemingly clash with common idea of what the military is. </span><a class="workspace-trigger" data-dcnode-id="1781" href="#bib8" name="bbib8"><span data-dcnode-id="1782" instrument_node="">Coll et&nbsp;al. (2011)</span></a><span data-dcnode-id="1780" instrument_node=""> bring out that armed forces also value restraint, obedience, and peacefulness. They explain that peacefulness is valued through preserving harmony that in some cases also means waging war to re-establish balance, restraint in using lethal power only as a last resort. Obedience to orders has to be seen as more complicated than simple compliance, as only orders that are just and morally justified should be carried out, though as </span><a class="workspace-trigger" data-dcnode-id="1778" href="#bib8" name="bbib8"><span data-dcnode-id="1779" instrument_node="">Coll et&nbsp;al. (2011)</span></a><span data-dcnode-id="1777" instrument_node=""> concede it is unlikely that a direct order by a superior will be challenged.</span></p><p data-dcnode-id="1764" id="p0085"><span data-dcnode-id="1775" instrument_node="">One way of discussing military culture is through considering cultural dimensions that Hofstede produced in his large-scale research on culture in different organizations and countries. </span><a class="workspace-trigger" data-dcnode-id="1773" href="#bib15" name="bbib15"><span data-dcnode-id="1774" instrument_node="">Hofstede et&nbsp;al. (2010)</span></a><span data-dcnode-id="1768"><span data-dcnode-id="1772" instrument_node=""> present the idea that cultures, especially national cultures, have four dimensions, i.e., aspects of culture, which can be measured relative to other cultures. These dimensions are power distance, </span><a class="topic-link" data-dcnode-id="1770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/collectivism" title="Learn more about collectivism from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1771" instrument_node="">collectivism</span></a><span data-dcnode-id="1769" instrument_node=""> versus individualism, femininity versus masculinity, and uncertainty avoidance. Later, on Minkov's research, two more dimensions were added, which are the long-term versus short-term orientation and indulgence versus restraint (</span></span><a class="workspace-trigger" data-dcnode-id="1766" href="#bib15" name="bbib15"><span data-dcnode-id="1767" instrument_node="">Hofstede et&nbsp;al., 2010</span></a><span data-dcnode-id="1765" instrument_node="">).</span></p><p data-dcnode-id="1757" id="p0090"><span data-dcnode-id="1763" instrument_node="">Hofstede is careful to point out that national culture dimensions are not fully applicable when explaining organizational cultures, if only because people usually do not grow up in organizations. However, </span><a class="workspace-trigger" data-dcnode-id="1761" href="#bib25" name="bbib25"><span data-dcnode-id="1762" instrument_node="">Soeters, Winslow, and Weibull (2006)</span></a><span data-dcnode-id="1760" instrument_node=""> have demonstrated </span><span data-dcnode-id="1759" id="p12"></span><span data-dcnode-id="1758" instrument_node="">in their research that national cultures have a strong influence on their militaries. At the same time, as pointed out earlier, it is the purpose of the military organization to produce operationally ready units, an aim that underlies all the activities taking place within the military organization. This singular purpose gives the militaries of different nations a starting point that reaches beyond the national borders and forms a military culture that shares commonalities across nations. That is to say that not all military cultures are the same, but as discussed above, there are universal traits that all militaries share.</span></p><p data-dcnode-id="1740" id="p0095"><span data-dcnode-id="1756" instrument_node="">The first dimension that </span><a class="workspace-trigger" data-dcnode-id="1754" href="#bib15" name="bbib15"><span data-dcnode-id="1755" instrument_node="">Hofstede et&nbsp;al. (2010)</span></a><span data-dcnode-id="1753" instrument_node=""> discuss is the way cultures handle that people are in fact unequal. This is measured by the power distance index; in countries where the power distance is low, there is a smaller emotional distance between superiors and subordinates and thus subordinates have fewer trepidations in approaching or contradicting their superiors. The collectivism (</span><a class="workspace-trigger" data-dcnode-id="1751" href="#bib15" name="bbib15"><span data-dcnode-id="1752" instrument_node="">Hofstede et&nbsp;al. 2010</span></a><span data-dcnode-id="1750" instrument_node="">) refers to the power of the group, how willing are people to put the collective, common good above the needs of the individual. </span><a class="workspace-trigger" data-dcnode-id="1748" href="#bib15" name="bbib15"><span data-dcnode-id="1749" instrument_node="">Hofstede et&nbsp;al. (2010)</span></a><span data-dcnode-id="1747" instrument_node=""> see masculinity in cultural dimensions as referring to traits such as assertiveness and competiveness that are highly valued within the cultural environment. Avoidance of uncertainty according to </span><a class="workspace-trigger" data-dcnode-id="1745" href="#bib15" name="bbib15"><span data-dcnode-id="1746" instrument_node="">Hofstede et&nbsp;al. (21010)</span></a><span data-dcnode-id="1744" instrument_node=""> refers to how tolerant cultures are to ambiguous and uncertain situations. They continue that long-term goal orientation stands for the fostering of virtues oriented toward future rewards—in particular, perseverance and thrift, but also include such traits as willingness to subordinate oneself for a purpose, respect for circumstance, and concern with personal adaptiveness. The last and final dimension that </span><a class="workspace-trigger" data-dcnode-id="1742" href="#bib15" name="bbib15"><span data-dcnode-id="1743" instrument_node="">Hofstede et&nbsp;al. (2010)</span></a><span data-dcnode-id="1741" instrument_node=""> bring forth deals with restraint, which reflects a conviction that instant gratification needs are to be curbed and regulated by strict social norms. Indulgence here refers to the disposition in cultures to have fun and enjoy life, not indiscriminately gratifying human desires.</span></p><p data-dcnode-id="1733" id="p0100"><span data-dcnode-id="1739" instrument_node="">Military culture tends to be more masculine, collective, with greater power distance, less tolerance for ambiguity, and geared toward restraint. These were also findings in </span><a class="workspace-trigger" data-dcnode-id="1737" href="#bib25" name="bbib25"><span data-dcnode-id="1738" instrument_node="">Soeters et&nbsp;al.’s (2006)</span></a><span data-dcnode-id="1736" instrument_node=""> research, which also showed that cultural dimensions within the military culture are at least to an extent explained by the differences in cultural dimensions of national cultures. It is quite plausible that transitioning from a more collective military culture into a strongly individualistic national culture will present certain readjustment issues. The same difficulties can be found when considering all the cultural dimensions that we have discussed. Relatively high ambiguity avoidance within the military culture is not an easy match for </span><span data-dcnode-id="1735" id="p13"></span><span data-dcnode-id="1734" instrument_node="">the fast paced and changing societal life of contemporary western societies.</span></p><p data-dcnode-id="1725" id="p0105"><span data-dcnode-id="1732" instrument_node="">We have so far concentrated on the military culture, but as pointed out by </span><a class="workspace-trigger" data-dcnode-id="1730" href="#bib2" name="bbib2"><span data-dcnode-id="1731" instrument_node="">Atuel and Castro (2018)</span></a><span data-dcnode-id="1729" instrument_node="">, military identity can be considered as a role identity that develops within the military cultural environment. Research has shown that military identity can supersede that of race and ethnicity, but at the same time there is little research to establish a direct causal link. Without question, the rigorous training and the socialization into military values and culture leaves a lasting mark. Whether individuals who self-select into the military already possess military values and integrate these values into their lives also remains a possibility. It is clear that the military aims to create through a rigorous socialization process a strong collective identity. One of the purposes of collective identity is to create strong emotional attachment to the group; this emotional attachment makes them loyal to the group (</span><a class="workspace-trigger" data-dcnode-id="1727" href="#bib11" name="bbib11"><span data-dcnode-id="1728" instrument_node="">Ellemers, Kortekaas, &amp; Ouwerkerk, 1999</span></a><span data-dcnode-id="1726" instrument_node="">), which in the case of militaries all over the world is a desirable goal. Still this very same loyalty to the group and one's own identity connected to the military group and culture is one of the more difficult transitions that a former service member will experience after leaving the armed forces.</span></p><p data-dcnode-id="1720" id="p0110"><span data-dcnode-id="1724" instrument_node="">In the often-discussed transition from a civilian to a soldier, the new recruit's perceptions, goals, motives, and behaviors will come under the influence of military culture and military leaders (</span><a class="workspace-trigger" data-dcnode-id="1722" href="#bib14" name="bbib14"><span data-dcnode-id="1723" instrument_node="">Halonen, 2007</span></a><span data-dcnode-id="1721" instrument_node="">), but when the transition into a civilian happens, then there is no such rigorous training program to undergo, although some militaries do use some forms of re-acculturation programs. At the same time, it is clear that some form of cultural readjustment will take place, regardless of the period of time spent serving in the military, and the rate and success of such an adjustment also depends on the willingness to unlearn some of the cultural competences and in the case of a military service member transitioning back into his or her original cultural environment, to relearn forgotten or changed cultural competences that are important within the civilian culture that they are returning to. There is some research on the obstacles to a successful transition, usually involving people who have physical or mental-health hampering transition into their civilian live. There is less research on an average transition and we have tried to show that looking at the military as culture can add to the understanding that all members of the military experience some form of transitional difficulties when they move from one cultural environment to another.</span></p><p data-dcnode-id="1716" id="p0115"><span data-dcnode-id="1719" instrument_node="">There is no one typical veteran or former military service member, just as there is no one typical veteran, but veterans carry some </span><span data-dcnode-id="1718" id="p14"></span><span data-dcnode-id="1717" instrument_node="">values and traits of military culture just as a member of a nation carries some values of his or her national culture, but not all. Some of these values and traits can be of great use in a transition process, whereas others might be a hindrance.</span></p></section><section data-dcnode-id="1699" id="s0020"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1713" id="cesectitle0020"><span data-dcnode-id="1714" instrument_node="">Transitioning back to civilian society</span></h2><p data-dcnode-id="1708" id="p0120"><span data-dcnode-id="1712" instrument_node="">As noted earlier, research shows that most veterans ultimately transition back to their civilian communities successfully (cf. </span><a class="workspace-trigger" data-dcnode-id="1710" href="#bib12" name="bbib12"><span data-dcnode-id="1711" instrument_node="">Elnitsky et&nbsp;al., 2017</span></a><span data-dcnode-id="1709" instrument_node="">). It has been argued that skills obtained during military service aid the veteran in this transition process (see Castro &amp; Kintzle, 2016), as many of these skills have direct application to civilian jobs. Other skills that aid veterans in transition include adaptability, enhanced decision-making, and tolerance for ambiguity, among others.</span></p><p data-dcnode-id="1700" id="p0125"><span data-dcnode-id="1707" instrument_node="">This is not suggested even for these veterans transitioning successfully that there will not be bumps in the road to transition. The transition from military service back to civilian life has been described as a reverse “culture shock” (see Beverly, </span><a class="workspace-trigger" data-dcnode-id="1705" href="#bib5" name="bbib5"><span data-dcnode-id="1706" instrument_node="">Bergman, Howard, Burdett &amp; Greenberg, 2014</span></a><span data-dcnode-id="1704" instrument_node="">), with the initial cultural shock occurring with the veteran first joining the military. The reversed cultural shock is dramatic for a number of reasons, including loss of status on leaving the armed forces. However, often not appreciated is that veterans feel like strangers in their own country, with many veterans reporting that they “just don't fit in” (</span><a class="workspace-trigger" data-dcnode-id="1702" href="#bib7" name="bbib7"><span data-dcnode-id="1703" instrument_node="">Castro &amp; Kintzle, 2014</span></a><span data-dcnode-id="1701" instrument_node="">).</span></p></section><section data-dcnode-id="1674" id="s0025"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1697" id="cesectitle0025"><span data-dcnode-id="1698" instrument_node="">The veteran as an immigrant</span></h2><p data-dcnode-id="1693" id="p0130"><span data-dcnode-id="1696" instrument_node="">In this section, we use “the immigrant” as a metaphor for elucidating the many challenges that all veterans will be confronted with as they leave the military and rejoin their civilian communities, recognizing, of course, that military veterans are not immigrants, yet having to deal with many of the challenges that all immigrants must deal with. Therefore, if one were to immigrate to another country, what are the things that they would have to sort out to have a successful transition? First, they would need a job and place to live. Next, they would have to figure out where to shop, where to bank, and where they would receive their health care. If they had a spouse and children, they would have to figure out where they would go to school and where their spouse might work. There are literally thousands of details, both big and small, that someone immigrating </span><span data-dcnode-id="1695" id="p15"></span><span data-dcnode-id="1694" instrument_node="">to another country would need to figure out. For a service member transitioning back to civilian life, they too have to figure out all of these details. Therefore, in a very real sense, service members transitioning back to civilian life are like new-comers in their own country.</span></p><p data-dcnode-id="1691" id="p0135"><span data-dcnode-id="1692" instrument_node="">As noted earlier, the military has its own distinct culture, differing in many ways from its civilian counterpart. However, often not appreciated is that the military also consists of a different economic structure as well. Namely, the military is basically a socialist system, existing in most cases within a civilian culture that is capitalistic. Like the nuclear family in nearly every society in the world, the military strives to meet every need of the service member (and to a lesser extent their families). Albeit, some armed forces, especially those of smaller countries’, would be more closely connected with their parent society and a larger integration is promoted.</span></p><p data-dcnode-id="1687" id="p0140"><span data-dcnode-id="1690" instrument_node="">First and foremost, every service member in the military has a job. While this might seem obvious as serving in the military is a job, the military culture differs from the civilian culture in many important respects. The military goes beyond just providing employment to all its service members. The military is structured so that every entry position in the military can lead to a career lasting 20 to 30</span><span data-dcnode-id="1689" instrument_node="">&nbsp;</span><span data-dcnode-id="1688" instrument_node="">years until retirement. In the civilian world, this is not the case. While a civilian may have a job for life, many of these civilian positions are not ones that would be considered a career. In addition to every job in the military leading to a career, most career pathways in the military come with required education and training that is provided by the military, while most civilians have to figure out for themselves what career they want and the educational requirements for obtaining it.</span></p><p data-dcnode-id="1685" id="p0145"><span data-dcnode-id="1686" instrument_node="">Service members’ careers are also actively managed by trained professionals so that they are provided increasingly challenging assignments that prepare them for promotion. Once again, civilians are expected to figure this out for themselves unless they are in a trainee position, while service members have someone to do this for them. Furthermore, when a service member desires a career change, there is typically a structure to help the service member change their career, all the while remaining in the military. For example, many militaries have processes whereby an infantryman may become an intelligence officer. If a civilian wants to make a career change, they have to figure out how do it by themselves and typically have to leave the organization in which they are working to do so.</span></p><p data-dcnode-id="1681" id="p0150"><span data-dcnode-id="1684" instrument_node="">In addition to the military providing a highly structured career and promotion processes, the military also provides other services that are indicative of a social system. Key among these include food, housing, and health care, which are typically provided free to all </span><span data-dcnode-id="1683" id="p16"></span><span data-dcnode-id="1682" instrument_node="">service members. Even in nations where there is a national health care system, there is typically a parallel military health care system that provides priority support to service members.</span></p><p data-dcnode-id="1679" id="p0155"><span data-dcnode-id="1680" instrument_node="">Once a service member leaves the military, they must figure out where they will live and how to access the civilian health care system. In the United States, former service members must pay for their health care, including their dental care, which was provided free when they were in the military. Oftentimes, service members have very little concept of the costs of food, housing, and health care, because these are provided either for free or at greatly reduced costs to them. Other services may be provided by some militaries such as commissaries, military shopping centers, schools for their children, and day cares, which are also heavily subsidized, which masks the true costs of these services. For civilians, managing all of these expenses is just part of life. Many service members leaving the military lack the practical experience to appreciate these costs.</span></p><p data-dcnode-id="1677" id="p0160"><span data-dcnode-id="1678" instrument_node="">Furthermore, employment in the civilian culture is very individualistic. Unlike in the military culture where a premium is placed on working as a team, the civilian culture is more interested in individual achievements and skills. This can lead many veterans to view “civilian” employment as self-promoting, with a “dog-eat-dog” mentality. Many military skills have no direct civilian equivalent, which makes it difficult for former military personnel to obtain a job and leaving them with the feeling that their military skills are not appreciated by civilians.</span></p><p data-dcnode-id="1675" id="p0165"><span data-dcnode-id="1676" instrument_node="">Finally, military pay and benefits are standardized. No matter how “good” a service member thinks they are, they will receive exactly the same pay and benefits as every other service member of the same rank and time they have been in the military. For example, there are over 40,000 sergeants (E-5) in the U.S. Army, and the best sergeant receives exactly the same pay and benefits as the worst sergeant, as would be expected in a socialist system. In civilian society, this would not be the case. There would be significant pay and benefit differences based on performance. Yet, while the best sergeant is likely to be promoted to the next rank earlier than the worst sergeants, there is still a degree of frustration that can set in that can demoralize a service member that causes them not to give 100% effort, a situation that is frequently seen among workers in socialist systems.</span></p></section><section data-dcnode-id="1650" id="s0030"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1672" id="cesectitle0030"><span data-dcnode-id="1673" instrument_node="">Transitioning back to the civilian community: avoiding the bumps</span></h2><p data-dcnode-id="1668" id="p0170"><span data-dcnode-id="1671" instrument_node="">Despite the challenges in transitioning from a military culture back to a civilian culture, most former service members do </span><span data-dcnode-id="1670" id="p17"></span><span data-dcnode-id="1669" instrument_node="">eventually transition successfully, albeit with a few bumps along the way. To have the smoothest transition possible, service members must remember that the military culture differs significantly from most civilian cultures. Therefore, they must plan every aspect of their transition as if they were moving to another country. Second, service members must maintain their aggressive, competitive spirit. Separating service members should not expect anything to be handed to them. They must expect to compete for everything they want, including their civilian job. In short, they must maintain their hustle. Third, they must learn to adapt their military identity to their new civilian culture. Civilians are not their enemies. Approaches and behaviors that were successful in a military culture may not be successful in a civilian culture, and in fact some aspects of a military culture might interfere or impede a successful transition.</span></p><p data-dcnode-id="1660" id="p0175"><span data-dcnode-id="1667" instrument_node="">Identity shift that will inevitably occur when transitioning from the military to civilian culture is likely to be just as difficult as it is for immigrants who struggle to embrace the new culture that they find themselves in. Part of the difficulty is the difference of the military ethos, the particular combination of a number of core values, which differ from the ethos of the society as </span><a class="workspace-trigger" data-dcnode-id="1665" href="#bib3" name="bbib3"><span data-dcnode-id="1666" instrument_node="">Bar-Tal (2000)</span></a><span data-dcnode-id="1664" instrument_node=""> has termed it. </span><a class="workspace-trigger" data-dcnode-id="1662" href="#bib28" name="bbib28"><span data-dcnode-id="1663" instrument_node="">Ehala (2017)</span></a><span data-dcnode-id="1661" instrument_node=""> points out that when core values are questioned or come under attack, it instigates moral outrage and this makes identity shifts particularly difficult to navigate.</span></p><p data-dcnode-id="1654" id="p0180"><span data-dcnode-id="1659" instrument_node="">The military must support service members in the transition process. The most important thing that militaries can do is to provide adequate time for service members to prepare for their transition. This might include the time to retrain or obtain critical certifications or education that will allow the former service member to compete for job and career opportunities as a civilian. Regardless, if the service member is leaving the military after 1</span><span data-dcnode-id="1658" instrument_node="">&nbsp;</span><span data-dcnode-id="1657" instrument_node="">week or 30</span><span data-dcnode-id="1656" instrument_node="">&nbsp;</span><span data-dcnode-id="1655" instrument_node="">years, every service member needs time and support to have a successful transition. Indeed, the shorter the length of service, the more support a service member typically needs.</span></p><p data-dcnode-id="1651" id="p0185"><span data-dcnode-id="1653" instrument_node="">Governments and local communities also have an important role in assisting former service members in their transition. At the governmental level, essential programs and services must be provided to separating service members, particularly housing and employment programs. Local communities must anticipate veterans returning to their communities and welcome them back. Civilians who have not served must understand that while some veterans might have mental and/or behavioral health issues, most do not. Veterans overall make an important contribution to every community that they are a member of.</span><span data-dcnode-id="1652" id="p18"></span></p></section><section data-dcnode-id="1645" id="s0035"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1648" id="cesectitle0035"><span data-dcnode-id="1649" instrument_node="">Conclusion</span></h2><p data-dcnode-id="1646" id="p0190"><span data-dcnode-id="1647" instrument_node="">The military represents a unique culture. Service members leaving the military are in essence moving from one culture, the military culture, to another, the civilian culture. There are aspects of the military culture that can result in challenges that a former service member has not encountered before. Yet, through individual preparation and support by the military, government, and local community, every former service member can have a successful transition, with minimal bumps along the way.</span></p></section></div></div><div class="related-content-links u-hide-from-md" data-dcnode-id="1639"><button class="button button-anchor" data-dcnode-id="1640" type="button"><span class="button-text" data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="275"><section class="bibliography u-font-serif text-s" data-dcnode-id="276" id="cebib0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="277" id="cebibsec0010"><dl class="references" data-dcnode-id="278" id="reference-links-cebibsec0010"><dt class="label" data-dcnode-id="1634"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="1635" href="#bbib1" id="ref-id-bib1">
