</span><p data-dcnode-id="501"><a data-dcnode-id="518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eh.net/encyclopedia/article/eloranta.military%23_ednref2" name="_edn2"><span data-dcnode-id="519" instrument_node="">[2]</span></a><span data-dcnode-id="517" instrument_node=""> See Paul Kennedy, </span><em data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">The Rise and Fall of the Great Powers: Economic Change and Military Conflict from 1500 to 2000</span></em><span data-dcnode-id="514" instrument_node=""> (London: Fontana, 1989). Kennedy calls this type of approach, following David Landes, “large history.” On criticism of Kennedy’s “theory,” see especially Todd Sandler and Keith Hartley, </span><em data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">The Economics of Defense</span></em><span data-dcnode-id="511" instrument_node="">, ed. Mark Perlman, </span><em data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">Cambridge Surveys of Economic Literature</span></em><span data-dcnode-id="508" instrument_node=""> (Cambridge: Cambridge University Press, 1995) and the studies listed in it. Other examples of long-run explanations can be found in, e.g., Maurice Pearton, </span><em data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">The Knowledgeable State: Diplomacy, War, and Technology since 1830</span></em><span data-dcnode-id="505" instrument_node=""> (London: Burnett Books: Distributed by Hutchinson, 1982) and William H. McNeill, </span><em data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">The Pursuit of Power: Technology, Armed Force, and Society since A.D. 1000</span></em><span data-dcnode-id="502" instrument_node=""> (Chicago: University of Chicago Press, 1982).</span></p><span data-dcnode-id="500" instrument_node="">
</span><p data-dcnode-id="493"><a data-dcnode-id="498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eh.net/encyclopedia/article/eloranta.military%23_ednref3" name="_edn3"><span data-dcnode-id="499" instrument_node="">[3]</span></a><span data-dcnode-id="497" instrument_node=""> Jari Eloranta, “Kriisien ja konfliktien tutkiminen kvantitatiivisena ilmiönä: Poikkitieteellisyyden haaste suomalaiselle sotahistorian tutkimukselle (The Study of Crises and Conflicts as Quantitative Phenomenon: The Challenge of Interdisciplinary Approaches to Finnish Study of Military History),” in </span><em data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">Toivon historia – Toivo Nygårdille omistettu juhlakirja</span></em><span data-dcnode-id="494" instrument_node="">, ed. Kalevi Ahonen, et al. (Jyväskylä: Gummerus Kirjapaino Oy, 2003a).</span></p><span data-dcnode-id="492" instrument_node="">
</span><p data-dcnode-id="479"><a data-dcnode-id="490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eh.net/encyclopedia/article/eloranta.military%23_ednref4" name="_edn4"><span data-dcnode-id="491" instrument_node="">[4]</span></a><span data-dcnode-id="489" instrument_node=""> See Mark Harrison, ed., </span><em data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">The Economics of World War II: Six Great Powers in International Comparisons</span></em><span data-dcnode-id="486" instrument_node=""> (Cambridge, UK: Cambridge University Press, 1998b). Classic studies of this type are Alan Milward’s works on the European war economies; see e.g. Alan S. Milward, </span><em data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">The German Economy at War</span></em><span data-dcnode-id="483" instrument_node=""> (London: Athlon Press, 1965) and Alan S. Milward, </span><em data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">War, Economy and Society 1939-1945</span></em><span data-dcnode-id="480" instrument_node=""> (London: Allen Lane, 1977).</span></p><span data-dcnode-id="478" instrument_node="">

</span><p data-dcnode-id="200"><a data-dcnode-id="208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eh.net/encyclopedia/article/eloranta.military%23_ednref32" name="_edn32"><span data-dcnode-id="209" instrument_node="">[32]</span></a><span data-dcnode-id="207" instrument_node=""> Eloranta, “External Security by Domestic Choices: Military Spending as an Impure Public Good Among Eleven European States, 1920-1938,” Eloranta, “National Defense”. See also Ferguson, </span><em data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">The Cash Nexus.</span></em><span data-dcnode-id="204" instrument_node="">. On the military spending patterns of Great Powers in particular, see J. M. Hobson, “The Military-Extraction Gap and the Wary Titan: The Fiscal Sociology of British Defence Policy 1870-1914,” </span><em data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">Journal of European Economic History</span></em><span data-dcnode-id="201" instrument_node=""> 22, no. 3 (1993).</span></p><span data-dcnode-id="199" instrument_node="">
</span><p data-dcnode-id="186"><a data-dcnode-id="197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eh.net/encyclopedia/article/eloranta.military%23_ednref33" name="_edn33"><span data-dcnode-id="198" instrument_node="">[33]</span></a><span data-dcnode-id="196" instrument_node=""> The practice of total war, of course, is as old as civilizations themselves, ranging from the Punic Wars to the more modern conflicts. Here total war refers to the twentieth century connotation of this term, embodying the use of all economic, political, and military might of a nation to destroy another in war. Therefore, even though the destruction of Carthage certainly qualifies as an </span><em data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">action</span></em><span data-dcnode-id="193" instrument_node=""> of total war, it is only in the nineteenth and twentieth centuries that this type of warfare and strategic thinking comes to full fruition. For example, the famous ancient military genius Sun Tzu advocated caution and planning in warfare, rather than using all means possible to win a war: “Thus, those skilled in war subdue the enemy’s army without battle. They capture his cities without assaulting them and overthrow his state without protracted operations.” Sun Tzu, </span><em data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">The Art of War</span></em><span data-dcnode-id="190" instrument_node=""> (Oxford: Oxford University Press, 1963), 79. With the ideas put forth by Clausewitz (see Carl von Clausewitz, </span><em data-dcnode-id="188"><span data-dcnode-id="189" instrument_node="">On War</span></em><span data-dcnode-id="187" instrument_node=""> (London: Penguin Books, 1982, e.g. Book Five, Chapter II) in the century century, the French Revolution, and Napoleon, the nature of warfare began to change. Clausewitz’s absolute war did not go as far as prescribing indiscriminate slaughter or other ruthless means to subdue civilian populations, but did contribute to the new understanding of the means of warfare and military strategy in the industrial age. The generals and despots of the twentieth century drew their own conclusions, and thus total war came to include not only subjugating the domestic economy to the needs of the war effort but also propaganda, destruction of civilian (economic) targets, and genocide.</span></p><span data-dcnode-id="185" instrument_node="">
</span><p data-dcnode-id="175"><a data-dcnode-id="183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eh.net/encyclopedia/article/eloranta.military%23_ednref34" name="_edn34"><span data-dcnode-id="184" instrument_node="">[34]</span></a><span data-dcnode-id="182" instrument_node=""> Rondo Cameron and Larry Neal, </span><em data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">A Concise Economic History of the World: From Paleolithic Times to the Present</span></em><span data-dcnode-id="179" instrument_node="">, 4th ed. (Oxford: The Oxford University Press, 2003), 339. Thus, the estimate in e.g. Eloranta, “National Defense” is a hypothetical minimum estimate originally expressed in Gerard J. de Groot, </span><em data-dcnode-id="177"><span data-dcnode-id="178" instrument_node="">The First World War</span></em><span data-dcnode-id="176" instrument_node=""> (New York: Palgrave, 2001).</span></p><span data-dcnode-id="174" instrument_node="">
