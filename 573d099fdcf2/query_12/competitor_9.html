</span><ul class="txt" data-dcnode-id="1453"><li data-dcnode-id="1487"><a data-dcnode-id="1488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rand.org/topics/children-families-and-communities.html" title="RAND research addresses child health and how families and neighborhoods affect child well-being. Other family-focused research covers topics such as immigration, caregiving, and household finances. Through studies on families as well as community resilience, RAND develops solutions to public policy challenges to help make communities throughout the world safer and more secure, healthier and more prosperous."><span data-dcnode-id="1489" instrument_node="">Children, Families, and Communities</span></a></li><li data-dcnode-id="1484"><a data-dcnode-id="1485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rand.org/topics/cyber-and-data-sciences.html" title="RAND was at the forefront of early computing and data science. In the 1950s, we built computers to improve researchers' analytic and modeling capabilities. We also developed data communications technologies that were forerunners of the internet. Today, RAND experts recommend policies and best practices to support safe and secure technological innovation and adoption."><span data-dcnode-id="1486" instrument_node="">Cyber and Data Sciences</span></a></li><li data-dcnode-id="1481"><a data-dcnode-id="1482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rand.org/topics/education-and-literacy.html" title="RAND research on early childhood, K-12, and higher education covers issues such as assessment and accountability, choice-based and standards-based reform, school leadership, teacher effectiveness, technology, and vocational training. RAND also explores life skills, such as media, health, and financial literacy, as well as how time spent outside the classroom impacts student outcomes."><span data-dcnode-id="1483" instrument_node="">Education and Literacy</span></a></li><li data-dcnode-id="1478"><a data-dcnode-id="1479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rand.org/topics/energy-and-environment.html" title="RAND energy and environmental analyses examine the implications of existing and proposed energy policies on the environment. Building on a long history of policy research, RAND helps balance the need for environmental protections and economic development."><span data-dcnode-id="1480" instrument_node="">Energy and Environment</span></a></li><li data-dcnode-id="1475"><a data-dcnode-id="1476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rand.org/topics/health-health-care-and-aging.html" title="RAND advances understanding of health and health behaviors, and examines how the organization and financing of care affect costs, quality, and access. Our body of research includes innovative studies of health insurance, health care reform, and health information technology, as well as obesity, substance abuse, and PTSD. RAND findings also help inform policies that aim to improve the health of seniors and the care they receive."><span data-dcnode-id="1477" instrument_node="">Health, Health Care, and Aging</span></a></li><li data-dcnode-id="1472"><a data-dcnode-id="1473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rand.org/topics/homeland-security-and-public-safety.html" title="RAND conducts analyses and makes recommendations to strengthen the U.S. Department of Homeland Security across its full set of missions to prevent terrorism and enhance security, secure and manage America's borders, enforce and administer immigration laws, safeguard and secure cyberspace, and strengthen preparedness and resilience. In the area of public safety, RAND research addresses drug policy, crime, prison reform, and prisoner reentry, and other topics."><span data-dcnode-id="1474" instrument_node="">Homeland Security and Public Safety</span></a></li><li data-dcnode-id="1469"><a data-dcnode-id="1470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rand.org/topics/infrastructure-and-transportation.html" title="RAND research addresses the challenges of developing, managing, and protecting energy, transportation, water, communications, and other critical infrastructure throughout the world."><span data-dcnode-id="1471" instrument_node="">Infrastructure and Transportation</span></a></li><li data-dcnode-id="1466"><a data-dcnode-id="1467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rand.org/topics/international-affairs.html" title="RAND's international affairs research comprises a range of cross-cutting issues, including global economies and trade, space and maritime security, diplomacy, global health and education, nation building, and regional security and stability. RAND also analyzes the policies and effectiveness of international organizations such as the UN, NATO, European Union, and ASEAN."><span data-dcnode-id="1468" instrument_node="">International Affairs</span></a></li><li data-dcnode-id="1463"><a data-dcnode-id="1464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rand.org/topics/law-and-business.html" title="RAND work in law, business, and regulation includes analyses of alternative dispute resolution, asbestos litigation, workers' compensation, insurance, and other civil justice matters. This research often has implications for the private sector, such as entrepreneurs facing legal and regulatory hurdles, or multinational corporations dealing with corporate ethics and governance issues."><span data-dcnode-id="1465" instrument_node="">Law and Business</span></a></li><li data-dcnode-id="1460"><a data-dcnode-id="1461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rand.org/topics/national-security-and-terrorism.html" title="RAND conducts a broad array of national security research for the U.S. Department of Defense and allied ministries of defense. Our federally funded research and development centers (FFRDCs) explore threat assessment, military acquisition, technology, recruitment and personnel management, counterinsurgency, intelligence, and readiness. RAND is a world leader in terrorism research. Studies address such topics as terrorism financing and strategies to undermine violent extremism."><span data-dcnode-id="1462" instrument_node="">National Security and Terrorism</span></a></li><li data-dcnode-id="1457"><a data-dcnode-id="1458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rand.org/topics/science-and-technology.html" title="RAND experts have often been among the pioneers of key scientific research, including computer analysis, satellite development, military technology, and the foundations of the Internet. RAND's research has also resulted in the development of new methodologies and ways of analyzing policy issues, from the Delphi method to Robust Decision Making."><span data-dcnode-id="1459" instrument_node="">Science and Technology</span></a></li><li data-dcnode-id="1454"><a data-dcnode-id="1455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rand.org/topics/workers-and-the-workplace.html" title="Demand for educated, versatile workers who can interpret complex information and adapt to innovation is higher than ever. RAND pursues research that helps people, organizations, and governments understand how workers can remain engaged and productive in a changing global economy. Studies address workforce development, gender equity in the workplace, working conditions, and workplace wellness programs."><span data-dcnode-id="1456" instrument_node="">Workers and the Workplace</span></a></li></ul><span data-dcnode-id="1452" instrument_node="">

</span><div class="abstract product-page-abstract" data-dcnode-id="622"><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">This paper situates cyber threats within the wider context of a continued shift towards multi-domain concepts by NATO Allies and adversaries alike. These emerging concepts emphasise the importance of integration for achieving advantage; however, with greater connectivity and network-dependency comes greater potential vulnerability and consequences from disruption.This paper considers challenges associated with closer integration within and across military domains and examines how potential adversaries (Russia and China) are embracing variations on multi-domain and systems thinking and prioritising offensive cyber capabilities to exploit seams and vulnerabilities to disorientate, paralyse and demoralise NATO in any future conflict. Acknowledging that cyber attacks do not exist in a vacuum, this paper places discussions of cyber threats in the context of how the Alliance plans to operate, fight and win in future competition and conflict. In doing so, it highlights the adversary's perspective on how, when and why it might employ cyber capabilities to gain an advantage over NATO forces. The paper then considers the implications for NATO in terms of internal barriers, limitations and vulnerabilities that challenge the Alliance's ability to respond to these threats. Improved understanding of the interlinkages between these external threats and internal vulnerabilities is essential in achieving the genuine and wide-reaching transformation required for the Alliance to bolster its cohesion, improve its strategic resilience and ensure its ability to realise its ambitions in cyberspace and across all domains.</span></p></div><span data-dcnode-id="621" instrument_node="">
