</span><p data-dcnode-id="1850" style="text-align: center;"><span data-dcnode-id="1854" instrument_node="">&nbsp;&nbsp;</span><img alt="body-NATO-flag" data-dcnode-id="1853" sizes="(max-width: 512px) 100vw, 512px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.prepscholar.com/hs-fs/hubfs/body-NATO-flag.jpg%3Fwidth%3D512%26name%3Dbody-NATO-flag.jpg&amp;raw" srcset="https://blog.prepscholar.com/hs-fs/hubfs/body-NATO-flag.jpg?width=256&amp;name=body-NATO-flag.jpg 256w, https://blog.prepscholar.com/hs-fs/hubfs/body-NATO-flag.jpg?width=512&amp;name=body-NATO-flag.jpg 512w, https://blog.prepscholar.com/hs-fs/hubfs/body-NATO-flag.jpg?width=768&amp;name=body-NATO-flag.jpg 768w, https://blog.prepscholar.com/hs-fs/hubfs/body-NATO-flag.jpg?width=1024&amp;name=body-NATO-flag.jpg 1024w, https://blog.prepscholar.com/hs-fs/hubfs/body-NATO-flag.jpg?width=1280&amp;name=body-NATO-flag.jpg 1280w, https://blog.prepscholar.com/hs-fs/hubfs/body-NATO-flag.jpg?width=1536&amp;name=body-NATO-flag.jpg 1536w" style="width: 512px; display: block; margin: 0px auto;" width="512"><em data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">NATO's official flag</span></em></p><span data-dcnode-id="1849" instrument_node="">
</span><p data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1846" instrument_node="">
</span><h2 data-dcnode-id="1843"><strong data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">NATO’s Purpose Today</span></strong></h2><span data-dcnode-id="1842" instrument_node="">
</span><p data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">Although NATO was formed as a deterrent for the USSR’s expansion and the spread of communism, NATO didn’t disband when the USSR collapsed in 1991. Instead, NATO continues to fulfill the NATO definition of defending its members and supporting democracy to this day.</span></p><span data-dcnode-id="1839" instrument_node="">
</span><p data-dcnode-id="1831"><span data-dcnode-id="1838" instrument_node="">In a </span><a data-dcnode-id="1836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/lisbon2010/strategic-concept-2010-eng.pdf"><span data-dcnode-id="1837" instrument_node="">2010 Strategic Concept</span></a><span data-dcnode-id="1835" instrument_node=""> agreement,</span><strong data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node=""> NATO states its three core tasks as collective defense, crisis management, and cooperative security. </span></strong><span data-dcnode-id="1832" instrument_node="">These three goals form the backbone of NATO and steer its decisions. In the next section, we’ll take a look at each of these three pillars more closely.</span></p><span data-dcnode-id="1830" instrument_node="">
</span><p data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1827" instrument_node="">
</span><h3 data-dcnode-id="1824"><strong data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">Collective Defense</span></strong></h3><span data-dcnode-id="1823" instrument_node="">
</span><p data-dcnode-id="1818"><span data-dcnode-id="1822" instrument_node="">First and foremost, </span><strong data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">NATO serves as a defensive alliance founded on upholding democratic values and principles. </span></strong><span data-dcnode-id="1819" instrument_node="">Its primary purpose is creating a network of collective defense, which means that member nations work together to ensure that all countries in the alliance are secure from outside threats. NATO does this by sharing knowledge, financial, and personnel resources with member nations. This includes sharing intelligence, but it also involves more practical tactics like bringing countries’ military technology up to date.</span></p><span data-dcnode-id="1817" instrument_node="">
</span><p data-dcnode-id="1804"><span data-dcnode-id="1816" instrument_node="">While NATO’s first goal is to resolve international conflicts diplomatically, the alliance is also set up to use military force to defend allied nations when necessary. </span><a data-dcnode-id="1813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natohq/topics_110496.htm"><strong data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">This aspect of collective defense </span></strong></a><strong data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">(also </span></strong><a data-dcnode-id="1808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/news/nato-article-5-meaning-history-world-war-2"><strong data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">known as NATO’s Article 5</span></strong></a><strong data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">) and was the major reason NATO was founded in 1949.</span></strong><span data-dcnode-id="1805" instrument_node=""> This principle states that if one nation is attacked by an outside force, the alliance will view it as an attack on every member nation.</span></p><span data-dcnode-id="1803" instrument_node="">
</span><p data-dcnode-id="1798"><span data-dcnode-id="1802" instrument_node="">In other words,</span><strong data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node=""> attacking one member of NATO means that all the countries in the alliance will respond. </span></strong><span data-dcnode-id="1799" instrument_node="">This allows bigger, more powerful countries in the alliance to protect its smaller NATO allies. In turn, smaller nations give NATO better tactical positioning in relationship to potentially adversarial global powers (like Russia and China). By essentially surrounding potential adversaries with allied nations, NATO disincentivises territorial expansion.</span></p><span data-dcnode-id="1797" instrument_node="">
</span><p data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1794" instrument_node="">
</span><h3 data-dcnode-id="1791"><strong data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">Crisis Management</span></strong></h3><span data-dcnode-id="1790" instrument_node="">
</span><p data-dcnode-id="1780"><span data-dcnode-id="1789" instrument_node="">Because NATO is committed to maintaining global peace by promoting security, the organization is also </span><a data-dcnode-id="1787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natohq/topics_49192.htm"><span data-dcnode-id="1788" instrument_node="">committed to responding to global crises before, during, and after they arise.</span></a><span data-dcnode-id="1786" instrument_node=""> This includes a mix of military and non-military tactics which are tailored to each crisis, which in turn dictates the scope and scale of NATO’s response. </span><strong data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">NATO is also positioned to help other political allies, like the United Nations, in their responses to global crises. </span></strong><span data-dcnode-id="1783" instrument_node="">Most recently,</span><a data-dcnode-id="1781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Libyan_Crisis_%282011%25E2%2580%2593present%29"><span data-dcnode-id="1782" instrument_node=""> NATO implemented the UN’s resolution to protect civilians in Libya during its civil war.</span></a></p><span data-dcnode-id="1779" instrument_node="">
</span><p data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">Finally, because crisis management supports NATO’s commitment to security, NATO helps its member nations and political allies train in crisis management techniques. This ensures that NATO can respond quickly with an international effort whenever an international crisis arises.</span></p><span data-dcnode-id="1776" instrument_node="">
</span><p data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1773" instrument_node="">
</span><h3 data-dcnode-id="1770"><strong data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">Cooperative Security</span></strong></h3><span data-dcnode-id="1769" instrument_node="">
</span><p data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">NATO’s last, and newest, core task is cooperative security. Introduced in 2010, this task focuses on creating an extended network of cooperation between member and non-member countries to tackle global problems quickly and efficiently.</span></p><span data-dcnode-id="1766" instrument_node="">
</span><p data-dcnode-id="1762"><span data-dcnode-id="1765" instrument_node="">To do this, NATO focuses on strengthening its relationships with partner nations. These are countries who aren’t part of NATO but work with NATO to tackle security problems in their region and across the world. </span><a data-dcnode-id="1763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natohq/51288.htm"><span data-dcnode-id="1764" instrument_node="">As of 2019, NATO works with 40 other nations in some capacity. </span></a></p><span data-dcnode-id="1761" instrument_node="">
</span><p data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">The goal of these partnerships is to share information, knowledge, and other resources in order to create more stability and security across the globe.</span></p><span data-dcnode-id="1758" instrument_node="">
</span><p data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">Additionally, NATO makes sure that all of its member nations have fairly equal military and technological capabilities. This also includes training: all member nations have access to NATO trainers to make sure countries have the knowledge and skills they need to respond to security threats. By making sure all member nations are capable partners, NATO as a whole becomes stronger.</span></p><span data-dcnode-id="1755" instrument_node="">
</span><p data-dcnode-id="1751"><br data-dcnode-id="1754"><br data-dcnode-id="1753"><img alt="body-NATO-NAC-meeting-2010" data-dcnode-id="1752" sizes="(max-width: 512px) 100vw, 512px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.prepscholar.com/hs-fs/hubfs/body-NATO-NAC-meeting-2010.jpg%3Fwidth%3D512%26name%3Dbody-NATO-NAC-meeting-2010.jpg&amp;raw" srcset="https://blog.prepscholar.com/hs-fs/hubfs/body-NATO-NAC-meeting-2010.jpg?width=256&amp;name=body-NATO-NAC-meeting-2010.jpg 256w, https://blog.prepscholar.com/hs-fs/hubfs/body-NATO-NAC-meeting-2010.jpg?width=512&amp;name=body-NATO-NAC-meeting-2010.jpg 512w, https://blog.prepscholar.com/hs-fs/hubfs/body-NATO-NAC-meeting-2010.jpg?width=768&amp;name=body-NATO-NAC-meeting-2010.jpg 768w, https://blog.prepscholar.com/hs-fs/hubfs/body-NATO-NAC-meeting-2010.jpg?width=1024&amp;name=body-NATO-NAC-meeting-2010.jpg 1024w, https://blog.prepscholar.com/hs-fs/hubfs/body-NATO-NAC-meeting-2010.jpg?width=1280&amp;name=body-NATO-NAC-meeting-2010.jpg 1280w, https://blog.prepscholar.com/hs-fs/hubfs/body-NATO-NAC-meeting-2010.jpg?width=1536&amp;name=body-NATO-NAC-meeting-2010.jpg 1536w" style="width: 512px; display: block; margin: 0px auto;" width="512"></p><span data-dcnode-id="1750" instrument_node="">
</span><p data-dcnode-id="1744" style="text-align: center;"><em data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">A meeting of the North Atlantic Council in 2010&nbsp;</span></em><em data-dcnode-id="1745"><a data-dcnode-id="1746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/d6/NATO_Ministers_of_Defense_and_of_Foreign_Affairs_meet_at_NATO_headquarters_in_Brussels_2010.jpg/640px-NATO_Ministers_of_Defense_and_of_Foreign_Affairs_meet_at_NATO_headquarters_in_Brussels_2010.jpg"><span data-dcnode-id="1747" instrument_node="">Wikimedia</span></a></em></p><span data-dcnode-id="1743" instrument_node="">
</span><p data-dcnode-id="1741" style="text-align: center;"><span data-dcnode-id="1742" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1740" instrument_node="">
</span><h2 data-dcnode-id="1737"><strong data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">NATO’s Command Structure</span></strong></h2><span data-dcnode-id="1736" instrument_node="">
</span><p data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">NATO nations are committed to working together as part of the alliance and work together on a daily basis. In terms of the alliance’s operational structure, NATO is split into two major categories: the NATO diplomatic delegations and the military representatives.</span></p><span data-dcnode-id="1733" instrument_node="">
</span><p data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">Let’s take a closer look at both to see how NATO nations work together to make decisions and work together toward their common goals.</span></p><span data-dcnode-id="1730" instrument_node="">
</span><p data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1727" instrument_node="">
</span><h3 data-dcnode-id="1724"><strong data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">NATO Diplomatic Delegations and the North Atlantic Council</span></strong></h3><span data-dcnode-id="1723" instrument_node="">
</span><p data-dcnode-id="1718"><span data-dcnode-id="1722" instrument_node="">The diplomatic delegations represent the political arm of NATO. Each NATO member nation sends a delegation to represent their country to </span><a data-dcnode-id="1720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/ie/natohq/topics_49284.htm"><span data-dcnode-id="1721" instrument_node="">NATO’s headquarters in Brussels, Belgium. </span></a><span data-dcnode-id="1719" instrument_node="">These representatives attend around 6,000 meetings a year!</span></p><span data-dcnode-id="1717" instrument_node="">
</span><p data-dcnode-id="1713"><span data-dcnode-id="1716" instrument_node="">The most important element of NATO’s political arm is the North Atlantic Council, or the NAC. This council oversees the political and military processes that affect the alliance. To this end, </span><strong data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">the NAC serves as the political decision-making body of NATO. In other words, any NATO decision—whether that’s an initiative, resolution, or military action—is voted on by the NAC.</span></strong></p><span data-dcnode-id="1712" instrument_node="">
</span><p data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">To keep representation equal, each member nation has one seat on the NAC, which meets once a week. And just like collective defense, the NAC operates through collective decision making. Unlike the U.S. legislature, where decisions are approved by majority vote, the NAC only implements policies that are “agreed upon on the basis of unanimity and common accord.” In other words, the NAC makes decisions through consensus, and those decisions represent the will of every member country on the council.</span></p><span data-dcnode-id="1709" instrument_node="">
</span><p data-dcnode-id="1700"><strong data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">The diplomatic branch of NATO has one other notable subcommittee called the </span></strong><a data-dcnode-id="1704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/em/natohq/topics_50069.htm"><strong data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">Nuclear Planning Group</span></strong></a><strong data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node=""> (NPG). </span></strong><span data-dcnode-id="1701" instrument_node="">Like the NAC, every NATO member nation (with the exception of France, which decided not to participate) has representation within the committee whether they have nuclear capabilities or not. The group’s goal is to monitor nuclear forces around the globe while shaping NATO’s own nuclear policies in regards to arms control and nuclear proliferation.</span></p><span data-dcnode-id="1699" instrument_node="">
</span><p data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">Thus, the NPG deals specifically with nuclear issues and reports to the NAC, who makes the final decision on anything the Nuclear Planning Group puts forward.</span></p><span data-dcnode-id="1696" instrument_node="">
</span><p data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1693" instrument_node="">
</span><p data-dcnode-id="1689" style="text-align: center;"><img alt="body-military-committee-meeting" data-dcnode-id="1692" sizes="(max-width: 450px) 100vw, 450px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.prepscholar.com/hs-fs/hubfs/body-military-committee-meeting.jpg%3Fwidth%3D450%26name%3Dbody-military-committee-meeting.jpg&amp;raw" srcset="https://blog.prepscholar.com/hs-fs/hubfs/body-military-committee-meeting.jpg?width=225&amp;name=body-military-committee-meeting.jpg 225w, https://blog.prepscholar.com/hs-fs/hubfs/body-military-committee-meeting.jpg?width=450&amp;name=body-military-committee-meeting.jpg 450w, https://blog.prepscholar.com/hs-fs/hubfs/body-military-committee-meeting.jpg?width=675&amp;name=body-military-committee-meeting.jpg 675w, https://blog.prepscholar.com/hs-fs/hubfs/body-military-committee-meeting.jpg?width=900&amp;name=body-military-committee-meeting.jpg 900w, https://blog.prepscholar.com/hs-fs/hubfs/body-military-committee-meeting.jpg?width=1125&amp;name=body-military-committee-meeting.jpg 1125w, https://blog.prepscholar.com/hs-fs/hubfs/body-military-committee-meeting.jpg?width=1350&amp;name=body-military-committee-meeting.jpg 1350w" style="width: 450px; display: block; margin: 0px auto;" width="450"><em data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">The NATO Military Committee delivers remarks to the press</span></em></p><span data-dcnode-id="1688" instrument_node="">
</span><p data-dcnode-id="1683" style="text-align: center;"><em data-dcnode-id="1684"><a data-dcnode-id="1686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dod.defense.gov/News/Article/Article/1416012/nato-partner-defense-chiefs-discuss-afghanistan-iraq-command-structures/"><span data-dcnode-id="1687" instrument_node="">Dominique A. Piniero</span></a><span data-dcnode-id="1685" instrument_node="">/U.S. Department of Defense</span></em></p><span data-dcnode-id="1682" instrument_node="">
</span><p data-dcnode-id="1680" style="text-align: center;"><span data-dcnode-id="1681" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1679" instrument_node="">
</span><h3 data-dcnode-id="1676"><strong data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">Military Representatives and the Military Committee</span></strong></h3><span data-dcnode-id="1675" instrument_node="">
</span><p data-dcnode-id="1655"><span data-dcnode-id="1674" instrument_node="">Because NATO is a defense alliance, NATO has a military branch of operation, too.</span><strong data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node=""> This branch is comprised of three operational groups: the </span></strong><a data-dcnode-id="1669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/su/natohq/topics_49633.htm"><strong data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">Military Committee (MC)</span></strong></a><strong data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">, </span></strong><a data-dcnode-id="1664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/ua/natohq/topics_52091.htm"><strong data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">Allied Command Operations (ACO)</span></strong></a><strong data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">, and</span></strong><a data-dcnode-id="1659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/"><strong data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node=""> Allied Command Transformation (ACT)</span></strong></a><strong data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">. </span></strong><span data-dcnode-id="1656" instrument_node="">Let’s take a look at all three groups and their unique responsibilities.</span></p><span data-dcnode-id="1654" instrument_node="">
</span><p data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1651" instrument_node="">
</span><p data-dcnode-id="1648"><strong data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">The Military Committee</span></strong></p><span data-dcnode-id="1647" instrument_node="">
</span><p data-dcnode-id="1643"><span data-dcnode-id="1646" instrument_node="">This committee advises the NAC on military policy and strategy and is charged with enacting all of NAC’s military-based decisions. </span><strong data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">Its main job is to oversee NATO’s military operations and translate the NAC’s decisions into military direction.</span></strong></p><span data-dcnode-id="1642" instrument_node="">
</span><p data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">Similar to the NAC, each nation has one representative that sits on the Military Committee. These seats are held by each member state’s Chief of Defense (or their proxy) and meet at least once a week to discuss ongoing operations and ongoing security concerns. Additionally, the Military Committee oversees the other two groups of the military branch: Allied Command Operations and Allied Command Transformation.</span></p><span data-dcnode-id="1639" instrument_node="">
</span><p data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1636" instrument_node="">
</span><h4 data-dcnode-id="1633"><strong data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">Allied Command Operations</span></strong></h4><span data-dcnode-id="1632" instrument_node="">
</span><p data-dcnode-id="1627"><span data-dcnode-id="1631" instrument_node="">NATO’s ACO is headquartered in Mons, Belgium at the Supreme Headquarters Allied Powers Europe (SHAPE), and it’s run by the Supreme Allied Commander Europe (SACEUR). </span><strong data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">The ACO is responsible for the planning and execution of all Alliance operations </span></strong><span data-dcnode-id="1628" instrument_node="">and reports to the Military Committee. So once the NAC decides to use military force for crisis management, the control of the operation is turned over to the ACO, which runs the operation from beginning to end.</span></p><span data-dcnode-id="1626" instrument_node="">
</span><p data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">To do this, ACO has three overlapping operational levels: strategic, operational, and tactical. This allows ACO to run complete military operations, including the command of both NATO and joint military forces (which are military forces “donated” to NATO by member nations for use in NATO-sanctioned operations).</span></p><span data-dcnode-id="1623" instrument_node="">
</span><p data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">But as the world changes, so has the ACO’s role in NATO. The newest responsibility of ACO was assigned by the North Atlantic Council in 2018. After their meeting in Brussels, the NAC decided to establish a Cyberspace Operations Centre dedicated to defending member nations against cyber attacks from outside forces, too.</span></p><span data-dcnode-id="1620" instrument_node="">
</span><p data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1617" instrument_node="">
</span><h4 data-dcnode-id="1614"><strong data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">Allied Command Transformation</span></strong></h4><span data-dcnode-id="1613" instrument_node="">
</span><p data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">NATO’s ACT is the second branch of military command in NATO and was formed in 2003 to help NATO address future threats. It is located in Norfolk, Virginia and is run by the Supreme Allied Commander Transformation, or SACT. Like the ACO, the SACT reports to the Military Committee and is responsible for making sure that ACT and NATO are preparing for modern and future threats to the security of its member nations.</span></p><span data-dcnode-id="1610" instrument_node="">
</span><p data-dcnode-id="1605"><span data-dcnode-id="1609" instrument_node="">Put another way, the goal of ACT is to plan for the future. </span><strong data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">Its job is to lay the groundwork for NATO’s military forces to adapt quickly to changing threats and prepare for security issues looming on the horizon. </span></strong><span data-dcnode-id="1606" instrument_node="">This includes reporting to the Military Committee and advising them on current tactics and future problems.</span></p><span data-dcnode-id="1604" instrument_node="">
</span><p data-dcnode-id="1599"><span data-dcnode-id="1603" instrument_node="">Additionally,</span><strong data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">&nbsp;ACT is charged with bringing all member nations up to speed in terms of their military capabilities. </span></strong><span data-dcnode-id="1600" instrument_node="">Not only do they provide training to member nations’ military forces, they serve as a sort of lobby group to persuade member nations’ governments to invest in security and military preparedness, too.</span></p><span data-dcnode-id="1598" instrument_node="">
</span><p data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1595" instrument_node="">
</span><p data-dcnode-id="1591" style="text-align: center;"><img alt="Body-Spanish-F-18-Bosnian-War" data-dcnode-id="1594" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.prepscholar.com/hubfs/Body-Spanish-F-18-Bosnian-War.jpg&amp;raw" style="width: 512px; display: block; margin: 0px auto;" width="0"><em data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">A Spanish F-18 takes off on a&nbsp;NATO bombing run during the Bosnian War</span></em></p><span data-dcnode-id="1590" instrument_node="">
</span><p data-dcnode-id="1585" style="text-align: center;"><em data-dcnode-id="1586"><a data-dcnode-id="1588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nara.getarchive.net/media/a-spanish-air-force-ef-18-aircraft-takes-off-for-nato-airstrikes-against-the-7d6f6b"><span data-dcnode-id="1589" instrument_node="">Dixie Trawick</span></a><span data-dcnode-id="1587" instrument_node="">/U.S. National Archives</span></em></p><span data-dcnode-id="1584" instrument_node="">
</span><p data-dcnode-id="1582" style="text-align: center;"><span data-dcnode-id="1583" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1581" instrument_node="">
</span><h2 data-dcnode-id="1578"><strong data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">Key Moments in NATO History</span></strong></h2><span data-dcnode-id="1577" instrument_node="">
</span><p data-dcnode-id="1573"><span data-dcnode-id="1576" instrument_node="">Ever since its founding in 1949, NATO has been a key actor in global political, military, and peacekeeping efforts. </span><strong data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">Here are some of the most pivotal moments in NATO’s seventy-year history.</span></strong></p><span data-dcnode-id="1572" instrument_node="">
</span><p data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1569" instrument_node="">
</span><h3 data-dcnode-id="1566"><strong data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">1991: Collapse of the USSR</span></strong></h3><span data-dcnode-id="1565" instrument_node="">
</span><p data-dcnode-id="1560"><span data-dcnode-id="1564" instrument_node="">In 1991, </span><a data-dcnode-id="1562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//history.state.gov/milestones/1989-1992/collapse-soviet-union"><span data-dcnode-id="1563" instrument_node="">the USSR officially disbanded</span></a><span data-dcnode-id="1561" instrument_node="">, granting each of its formerly-sovereign nations back their independence. This brought NATO’s original operating mission (and The Cold War) to an end; after all, NATO was originally created to stop the USSR and the spread of communism. Instead of disbanding, NATO nations decided to continue NATO’s mission of promoting peace, freedom, and collective security.</span></p><span data-dcnode-id="1559" instrument_node="">
</span><p data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1556" instrument_node="">
</span><h3 data-dcnode-id="1553"><strong data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">1995: The Bosnian War</span></strong></h3><span data-dcnode-id="1552" instrument_node="">
</span><p data-dcnode-id="1548"><a data-dcnode-id="1550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/event/Bosnian-conflict"><span data-dcnode-id="1551" instrument_node="">The Bosnian War </span></a><span data-dcnode-id="1549" instrument_node="">began in 1992 with the breakup of Yugoslavia. As the situation deteriorated, the United Nations called for a no-fly zone to be set up over Bosnia and Herzegovina. NATO stepped in to manage the operation on behalf of the UN and took its first military action when NATO shot down four Bosnian Serb aircraft that were violating the no-fly zone.</span></p><span data-dcnode-id="1547" instrument_node="">
</span><p data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1544" instrument_node="">
</span><h3 data-dcnode-id="1541"><strong data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">1999: Kosovo Intervention</span></strong></h3><span data-dcnode-id="1540" instrument_node="">
</span><p data-dcnode-id="1536"><a data-dcnode-id="1538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/event/Kosovo-conflict"><span data-dcnode-id="1539" instrument_node="">The Kosovo War </span></a><span data-dcnode-id="1537" instrument_node="">began in 1998, and soon after the fighting began, reports began to trickle in about the displacement of more than 250,000 Albanians. The United Nations responded with a resolution calling for a ceasefire. When the resolution failed to stop the conflict, NATO issued an “activation warning,” which meant NATO was prepared to use military force to mitigate the conflict. When peace talks deteriorated, NATO launched an air campaign that included bombing of key targets. NATO also played a key role in negotiating the end of the war and helping restore stability by stationing 30,000 troops in Kosovo.</span></p><span data-dcnode-id="1535" instrument_node="">
</span><p data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1532" instrument_node="">
</span><h3 data-dcnode-id="1529"><strong data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">2001: September 11th, 2001</span></strong></h3><span data-dcnode-id="1528" instrument_node="">
</span><p data-dcnode-id="1524"><span data-dcnode-id="1527" instrument_node="">The terrorist attacks that brought down the Twin Towers in New York were the first foreign attack on U.S. soil since the bombing of Pearl Harbor during World War II. The attacks led NATO to invoke Article 5—which states that an attack on one ally is an attack on all—within 24 hours. In doing so, “</span><a data-dcnode-id="1525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natohq/topics_110496.htm"><span data-dcnode-id="1526" instrument_node="">NATO members showed their solidarity toward the United States and condemned, in the strongest possible way, the terrorist attacks against the United States.”</span></a></p><span data-dcnode-id="1523" instrument_node="">
</span><p data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1520" instrument_node="">
</span><h3 data-dcnode-id="1517"><strong data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">2003: War in Afghanistan</span></strong></h3><span data-dcnode-id="1516" instrument_node="">
</span><p data-dcnode-id="1511"><span data-dcnode-id="1515" instrument_node="">As a result of Article 5, NATO nations rallied to support the </span><a data-dcnode-id="1513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/timeline/us-war-afghanistan"><span data-dcnode-id="1514" instrument_node="">United States’ conflict in Afghanistan</span></a><span data-dcnode-id="1512" instrument_node="">. NATO agreed to eight official actions/missions, which included the deployment of troops, military support, and supplies to the region. In 2003, NATO also agrees to take command of the ISAF, or International Security Assistance Force, in Afghanistan, which marks the first NATO crisis management mission outside of the North Atlantic region.</span></p><span data-dcnode-id="1510" instrument_node="">
</span><p data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1507" instrument_node="">
</span><h3 data-dcnode-id="1504"><strong data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">2011: Libya Intervention</span></strong></h3><span data-dcnode-id="1503" instrument_node="">
</span><p data-dcnode-id="1499"><a data-dcnode-id="1501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Libyan_Civil_War_%282011%29"><span data-dcnode-id="1502" instrument_node="">The Libyan Civil War </span></a><span data-dcnode-id="1500" instrument_node="">begins when Libyan protests against their totalitarian government bubble over into a full-blown revolution. The United Nations called for a ceasefire and authorized military measures to protect Libyan civilians. NATO began enforcing the UN’s resolution in March 2011, which included creating a no-fly zone over the country and 9,500 air strikes. After the rebel’s victory, NATO agreed to provide training for the new Libyan government and consult on security issues.</span></p><span data-dcnode-id="1498" instrument_node="">
</span><p data-dcnode-id="1489" style="text-align: center;"><br data-dcnode-id="1497"><br data-dcnode-id="1496"><img alt="body-books-mahendra-kumar-unsplash" data-dcnode-id="1495" sizes="(max-width: 512px) 100vw, 512px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.prepscholar.com/hs-fs/hubfs/body-books-mahendra-kumar-unsplash.jpg%3Fwidth%3D512%26name%3Dbody-books-mahendra-kumar-unsplash.jpg&amp;raw" srcset="https://blog.prepscholar.com/hs-fs/hubfs/body-books-mahendra-kumar-unsplash.jpg?width=256&amp;name=body-books-mahendra-kumar-unsplash.jpg 256w, https://blog.prepscholar.com/hs-fs/hubfs/body-books-mahendra-kumar-unsplash.jpg?width=512&amp;name=body-books-mahendra-kumar-unsplash.jpg 512w, https://blog.prepscholar.com/hs-fs/hubfs/body-books-mahendra-kumar-unsplash.jpg?width=768&amp;name=body-books-mahendra-kumar-unsplash.jpg 768w, https://blog.prepscholar.com/hs-fs/hubfs/body-books-mahendra-kumar-unsplash.jpg?width=1024&amp;name=body-books-mahendra-kumar-unsplash.jpg 1024w, https://blog.prepscholar.com/hs-fs/hubfs/body-books-mahendra-kumar-unsplash.jpg?width=1280&amp;name=body-books-mahendra-kumar-unsplash.jpg 1280w, https://blog.prepscholar.com/hs-fs/hubfs/body-books-mahendra-kumar-unsplash.jpg?width=1536&amp;name=body-books-mahendra-kumar-unsplash.jpg 1536w" style="width: 512px; display: block; margin: 0px auto;" width="512"><br data-dcnode-id="1494"><em data-dcnode-id="1490"><a data-dcnode-id="1492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unsplash.com/photos/fkhesK9SRVU%3Futm_source%3Dunsplash%26utm_medium%3Dreferral%26utm_content%3DcreditCopyText"><span data-dcnode-id="1493" instrument_node="">Mahendra Kumar</span></a><span data-dcnode-id="1491" instrument_node="">/Unsplash</span></em></p><span data-dcnode-id="1488" instrument_node="">
</span><p data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1485" instrument_node="">
</span><h2 data-dcnode-id="1482"><strong data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">Resources for Further Reading</span></strong></h2><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">Want to learn even more about the Cold War and NATO history? We’ve found four super helpful resources just for you!</span></p><span data-dcnode-id="1478" instrument_node="">
</span><p data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1475" instrument_node="">
</span><h3 data-dcnode-id="1472"><strong data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">NATO’s Official Website</span></strong></h3><span data-dcnode-id="1471" instrument_node="">
</span><p data-dcnode-id="1452"><a data-dcnode-id="1469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/ie/natohq/declassified_139339.htm"><span data-dcnode-id="1470" instrument_node="">NATO’s official website</span></a><span data-dcnode-id="1468" instrument_node=""> offers a </span><strong data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">thorough overview of NATO’s history along with its current policies, operations, and strategic missions.</span></strong><span data-dcnode-id="1465" instrument_node=""> This is a great place to start if you want up-to-the-minute news about NATO’s current actions and international positions. (Don’t forget to check out NATO’s official </span><a data-dcnode-id="1463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.facebook.com/NATO"><span data-dcnode-id="1464" instrument_node="">Facebook</span></a><span data-dcnode-id="1462" instrument_node="">, </span><a data-dcnode-id="1460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.youtube.com/NATO"><span data-dcnode-id="1461" instrument_node="">Youtube</span></a><span data-dcnode-id="1459" instrument_node="">, and </span><a data-dcnode-id="1457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/NATO"><span data-dcnode-id="1458" instrument_node="">Twitter</span></a><span data-dcnode-id="1456" instrument_node=""> accounts, too.) It also </span><a data-dcnode-id="1454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/nato-welcome/index.html"><span data-dcnode-id="1455" instrument_node="">has a fantastic chart </span></a><span data-dcnode-id="1453" instrument_node="">that explains NATO’s operating structure!</span></p><span data-dcnode-id="1451" instrument_node="">
</span><p data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1448" instrument_node="">
</span><h3 data-dcnode-id="1445"><strong data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">The U.S. State Department’s NATO Overview</span></strong></h3><span data-dcnode-id="1444" instrument_node="">
</span><p data-dcnode-id="1437"><span data-dcnode-id="1443" instrument_node="">The U.S State Department’s </span><a data-dcnode-id="1441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//history.state.gov/milestones/1945-1952/nato"><span data-dcnode-id="1442" instrument_node="">overview of America’s involvement with NATO</span></a><span data-dcnode-id="1440" instrument_node=""> offers a more U.S. centered view on NATO’s formation, including the signing of the North American Treaty. </span><strong data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">For a short NATO history overview with a more American focus, this is a good place to start!</span></strong></p><span data-dcnode-id="1436" instrument_node="">
</span><p data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1433" instrument_node="">
</span><h3 data-dcnode-id="1427"><em data-dcnode-id="1430"><strong data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">Defense of the West </span></strong></em><strong data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">by Stanley Sloan</span></strong></h3><span data-dcnode-id="1426" instrument_node="">
</span><p data-dcnode-id="1419"><strong data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">If you’re wanting a more comprehensive, in-depth look at the history of NATO from its formation to modern day,</span></strong><span data-dcnode-id="1423" instrument_node=""> </span><a data-dcnode-id="1421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.manchesteruniversitypress.co.uk/9781526105769"><span data-dcnode-id="1422" instrument_node="">Stanley Sloan’s book should be your first stop</span></a><span data-dcnode-id="1420" instrument_node="">. Sloan, a Senior Fellow in the Scowcroft Center at the Atlantic Council of the United States, dives into NATO’s definition, founding principles, and continued role on the world stage. He also discusses NATO’s future, especially as its member nations face new and complicated challenges to their security.</span></p><span data-dcnode-id="1418" instrument_node="">
</span><p data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1415" instrument_node="">
</span><h3 data-dcnode-id="1409"><em data-dcnode-id="1412"><strong data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">Understanding NATO in the 21st Century </span></strong></em><strong data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">edited by Graeme P. Herd and John Kriendler </span></strong></h3><span data-dcnode-id="1408" instrument_node="">
</span><p data-dcnode-id="1400"><span data-dcnode-id="1407" instrument_node="">If you really want to dig deeper into NATO’s role in the 21st century, </span><a data-dcnode-id="1405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.crcpress.com/Understanding-NATO-in-the-21st-Century-Alliance-Strategies-Security-and/Herd-Kriendler/p/book/9781138831889"><span data-dcnode-id="1406" instrument_node="">look no further than Graeme P. Herd and John Kriendler’s book</span></a><span data-dcnode-id="1404" instrument_node="">.</span><strong data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node=""> This book compiles&nbsp;essays from many different academics and historians to give readers a better, more thorough sense of NATO’s current role in global politics and the current challenges facing the organization.</span></strong><span data-dcnode-id="1401" instrument_node=""> This is definitely an academic book, but the essays offer interesting new insights into NATO’s evolving role on the global stage.</span></p><span data-dcnode-id="1399" instrument_node="">
</span><br data-dcnode-id="1398"><br data-dcnode-id="1397"><span data-dcnode-id="1396" instrument_node="">
</span><h2 data-dcnode-id="1393"><strong data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">What’s Next? </span></strong></h2><span data-dcnode-id="1392" instrument_node="">
</span><ul data-dcnode-id="1356"><span data-dcnode-id="1391" instrument_node="">
</span><li data-dcnode-id="1379"><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1381"><span data-dcnode-id="1389" instrument_node="">NATO is just one pivotal part of modern history...and it’s just one topic you might find on an AP History exam. </span><strong data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">To get a better understanding of U.S. history,</span></strong><a data-dcnode-id="1384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.prepscholar.com/best-ap-us-history-books"><strong data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node=""> check out some of these books on our AP History Exam reading list</span></strong></a><strong data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">. </span></strong></p><span data-dcnode-id="1380" instrument_node="">
</span></li><span data-dcnode-id="1378" instrument_node="">
</span><li data-dcnode-id="1369"><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1371"><span data-dcnode-id="1376" instrument_node="">Of course, one of the best ways to learn more about U.S. history is to make sure you’re taking history classes.</span><strong data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node=""> Most high schools offer a variety of history classes, </span></strong><a data-dcnode-id="1372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.prepscholar.com/the-high-school-history-classes-you-should-take"><span data-dcnode-id="1373" instrument_node="">so make sure you’re taking the right ones for you. </span></a></p><span data-dcnode-id="1370" instrument_node="">
</span></li><span data-dcnode-id="1368" instrument_node="">
</span><li data-dcnode-id="1358"><span data-dcnode-id="1367" instrument_node="">
</span><p data-dcnode-id="1360"><span data-dcnode-id="1366" instrument_node="">AP exams aren’t the only specialized tests available for college-bound high school students hoping to earn some college credit. </span><strong data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">Did you know that the SAT offers subject exams, too? </span></strong><a data-dcnode-id="1362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.prepscholar.com/ap-exams-vs-sat-subject-tests"><span data-dcnode-id="1363" instrument_node="">This article will teach you more about the SAT subject tests</span></a><span data-dcnode-id="1361" instrument_node=""> and help you decide whether you should take them.</span></p><span data-dcnode-id="1359" instrument_node="">
</span></li><span data-dcnode-id="1357" instrument_node="">
</span></ul><span data-dcnode-id="1355" instrument_node="">
