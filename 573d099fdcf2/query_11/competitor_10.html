 style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4938" instrument_node="">Sep 18, 2014 ... Some of the world's most important people are wooing India's new Prime ... But with China flexing the political and military muscles it has..</span></span></p><span data-dcnode-id="4935" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4932" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4933" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4934" instrument_node="">SO THESE WERE SOME SHORT COVERS NOW TO UNDERSTAND BETTER READ BELOW :</span></span></p><span data-dcnode-id="4931" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4928" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4929" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4930" instrument_node="">The Modi government’s last minute decision to postpone the signature of a Logistics Supply Agreement with the US during the visit of US Defence secretary Ashton Carter to India last week is the most recent manifestation of the confusion that grips India’s foreign policy today .</span></span></p><span data-dcnode-id="4927" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4924" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4925" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4926" instrument_node="">The government has given no explanation for its sudden turnabout, so most analysts have concluded that it got cold feet because the agreement would have made India a party, even if passively, to all of the US’ future military operations in the region. This had aroused serious misgivings in the country and invited a vigorous attack by the Congress party.</span></span></p><span data-dcnode-id="4923" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4920" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4921" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4922" instrument_node="">But the fact that Defence minister Manohar Parrikar visited China only days after Carter’s visit to reassure Beijing that India would not let relations with ‘third countries’ affect its relations with China, suggests that it was a Chinese reminder that India could not run with the hare and hunt with the hounds indefinitely that may have provoked its second thoughts on signing the agreement.</span></span></p><span data-dcnode-id="4919" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4916" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4917" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4918" instrument_node="">It is doubtful whether the Chinese will be reassured though, for this is only the latest of a succession of about turns that Modi has made in the 22 months that he has been prime minister. In August 2014, he reversed a decade of steady improvement in relations with Pakistan by rejecting all the understandings that the UPA had reached with it and the Hurriyat over the future of Kashmir. Today, he is trying to rebuild those relations once again.</span></span></p><span data-dcnode-id="4915" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4912" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4913" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4914" instrument_node="">Six months ago, Modi reversed five decades of Indian support for Nepal’s evolution into a modern nation state by imposing, or at least doing nothing to prevent, an oil blockade of that landlocked state. Nepal’s riposte was to repudiate Indian bilateralism, formally welcome China into Nepal and join its One Belt One Road initiative.</span></span></p><span data-dcnode-id="4911" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4908" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4909" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4910" instrument_node="">But nothing is likely to prove more costly than its ambivalence towards China. Modi has spared no effort to deepen India’s relations with China. But he has simultaneously deepened India’s military cooperation with the US, Japan and Australia whose stated purpose is to contain China’s rise, militarily if necessary.</span></span></p><span data-dcnode-id="4907" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4904" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4905" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4906" instrument_node="">To Indian policy makers this may look like a clever balancing act but, coming on top of the UPA government’s gradual distancing of India from its old allies, such as Russia and secular nations in the Arab world, in favour of the US, the gulf sheikhdoms and Israel, it is giving the rest of the world the impression that India does not understand where its long term national interest lies, and is therefore a country that no one can rely upon.</span></span></p><span data-dcnode-id="4903" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4900" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4901" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4902" instrument_node="">China has already signaled its distrust of India’s moves by moving swiftly to Nepal’s aid, and blocking the designation of Masood Azhar as a terrorist by the UN. It seems also to have lost interest in getting India to join its One Belt, One Road initiative.</span></span></p><span data-dcnode-id="4899" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4896" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4897" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4898" instrument_node="">Two epic developments are responsible for these power shifts. The first is Globalization – the migration of manufacturing from the high wage economies of Europe and North America to Asia — that began in the 1970s. The second is the victory of the transatlantic alliance in the Cold war and breakup of the Soviet Union in 1991.</span></span></p><span data-dcnode-id="4895" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4892" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4893" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4894" instrument_node="">Globalisation</span></span></p><span data-dcnode-id="4891" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4888" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4889" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4890" instrument_node="">Over four decades, gradual de-industrialisation has hollowed out the economic base of the West’s military power by shrinking its revenue base just when its social security expenditure has been pushed through the roof by longer life spans and rising unemployment.</span></span></p><span data-dcnode-id="4887" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4884" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4885" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4886" instrument_node="">In Asia the hectic industrial development triggered by globalisation has done the opposite. First Taiwan, then Singapore, Hongkong, South Korea and Malaysia , and finally and most spectacularly China, have run budget and foreign trade surpluses, and accumulated massive reserves of Capital that have become the base of huge economic power. China has been able to leverage these into growing military power and hegemonic influence.</span></span></p><span data-dcnode-id="4883" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4880" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4881" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4882" instrument_node="">Had the resulting power shift been gradual the world could have adjusted to it peacefully. But the economic weakening of the West virtually coincided with its victory in the Cold War. This created a sense of entitlement to the fruits of victory, that enabled the US to launch, or support, a succession of attacks on so called ‘rogue nations’, with scant regard for the UN charter or the sanction of the Security Council.</span></span></p><span data-dcnode-id="4879" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4876" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4877" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4878" instrument_node="">Goes back to Kosovo</span></span></p><span data-dcnode-id="4875" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4872" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4873" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4874" instrument_node="">Beginning with Kosovo in 1999, it has launched, or supported, a succession of assaults on nations that posed no threat to it or any of its allies–Afghanistan, Iraq, Libya Syria, Lebanon, Palestine, and Yemen. Not one of these has created a democracy, protected human rights or promoted freedom. What they have done is to destroy the tenuous system of international law that upheld the Westphalian state system that the UN charter had underpinned.</span></span></p><span data-dcnode-id="4871" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4868" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4869" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4870" instrument_node="">American, and several Indian, analysts have made light of the destruction of the Westphalian state system. “The West’s victory in the cold war”, they say, “has created a unipolar world. We therefore need a new paradigm of international relations“.</span></span></p><span data-dcnode-id="4867" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4864" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4865" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4866" instrument_node="">This seemingly profound observation relies upon ignorance of history, to gain its spurious credibility. For the Westphalian system was created to put a check on precisely the propensity for conflict between nation states that has dragged the world into chaos today.</span></span></p><span data-dcnode-id="4863" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4860" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4861" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4862" instrument_node="">This propensity springs from fact that the modern European state was born in war and territorial conquest. Since the boundaries created by conquest did not coincide with ethnic fault lines they had to be continually defended. This was done by creating standing armies to defend them and erasing pre-existing ethnic loyalties to create a new loyalty to “the Nation”. The constant need for coercion to maintain it gave the nascent Nation-State System a built in propensity for war .</span></span></p><span data-dcnode-id="4859" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4856" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4857" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4858" instrument_node="">Like the League of Nations and the United Nations three centuries later, the Treaty of Westphalia, which was signed in 1648 after the ruinous Thirty Year War, was designed to prevent this from ever happening again. To this end the signatories agreed to respect each others’ sovereignty, not to interfere in each other’s internal affairs and to resort to war only as a weapon of last resort.</span></span></p><span data-dcnode-id="4855" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4852" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4853" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4854" instrument_node="">The Westphalian precepts were still taking root when the rise of industrial capitalism in the 18</span></span></p><span data-dcnode-id="4851" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4848" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4849" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4850" instrument_node="">th</span></span></p><span data-dcnode-id="4847" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4844" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4845" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4846" instrument_node="">century gave a fillip to the propensity for war by giving inter-State rivalry an economic dimension that it had lacked until then. Competitive industrialisation behind tariff barriers further hardened frontiers, and set off a race to colonize large parts of the world to ensure access to raw materials and create new markets for their products.</span></span></p><span data-dcnode-id="4843" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4838" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4841" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4842" instrument_node="">Despite this, peace was maintained for a hundred years after the Napoleonic wars by a tacit acceptance of British hegemony, backed by an international network of bankers who were perfectly willing to finance colonial expansion but demanded peace within Europe in return. Karl Polanyi collectively labelled them </span></span><span data-dcnode-id="4839" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4840" instrument_node="">Haute Finance.</span></span></p><span data-dcnode-id="4837" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4834" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4835" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4836" instrument_node="">Unstable peace</span></span></p><span data-dcnode-id="4833" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4830" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4831" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4832" instrument_node="">But the peace these created was an unstable one. By the end of the 19</span></span></p><span data-dcnode-id="4829" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4826" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4827" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4828" instrument_node="">th</span></span></p><span data-dcnode-id="4825" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4822" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4823" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4824" instrument_node="">century Britain’s hegemony had begun to be challenged by Germany and the US. When the space for further expansion of nation-based capitalist systems was exhausted, competition boiled over again into not one but two world wars in a space of 31 years that claimed at least 70 million lives. Peace did not return till 1945 when hegemony within the capitalist system passed to the USA.</span></span></p><span data-dcnode-id="4821" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4818" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4819" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4820" instrument_node="">US hegemony was based upon the reputation it gained during the second world war as a defender of freedom , democracy and human rights, and cemented by its lead role in the framing of the UN Charter. But till 1991 its exercise of hegemony was constrained by the challenge of Communism and non-alignment. By the time these failed and the US was able to resume its quest for global hegemony, the Vietnam war and Globalization had sapped much of its economic strength.</span></span></p><span data-dcnode-id="4817" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4814" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4815" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4816" instrument_node="">Victory in the Cold War nevertheless re-awakened the US’ hegemonic ambitions just when, as Paul Wolfowitz noted in a Defence Policy Planning paper as early as 1987, the economic base needed to sustain them was shrinking. Wolfowitz’s solution, which soon became the mantra for both political parties in the US and was enshrined as a new security doctrine by President George W Bush in 2002, was to use military power pre-emptively to destroy potential rivals before they developed the capacity to challenge its supremacy.</span></span></p><span data-dcnode-id="4813" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4810" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4811" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4812" instrument_node="">This is the true genesis of the US’ cavalier disregard for the UN charter and its determination to build a hegemonic world order. What US policy makers, other than President Obama, have still not realized is that hegemony is not the same thing as military dominance, and the resort to the second inevitably destroys the first by making the lives of peoples and nations less and less secure.</span></span></p><span data-dcnode-id="4809" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4806" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4807" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4808" instrument_node="">A quarter century after the end of the Cold War, it is no longer possible to ignore the fact that the effort to re-establish western hegemony has created not a new world order but chaos. Both the Westphalian and the unipolar world order are history. What has survived is the mindset, of constant suspicion and barely restrained aggression that characterizes relations between nation-states. This mindset views any improvement in a neighbour’s capabilities as a potential threat to itself, and therefore reduces international relations to a zero sum game in which if you gain anything I must necessarily be losing something, even if I cannot identify what it is.</span></span></p><span data-dcnode-id="4805" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4802" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4803" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4804" instrument_node="">This is the mindset that must change if humanity is to survive and rebuild a peaceful, livable world. Today when the merest whiff of trouble makes foreign investors rush out of a country, starting a war with, or intervening clandestinely to secure regime change in, another country is an act of suicide.</span></span></p><span data-dcnode-id="4801" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4798" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4799" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4800" instrument_node="">The first requirement therefore must be to banish unilateral war and return to negotiation as the way to settle disputes. As Iran’s foreign minister Husain Jawad Zarif reminded an invited audience in Delhi in January 2015, this will only happen when negotiators eschew win-lose outcomes and start exploring bottom lines to find compromise solutions that leave both parties better off than before.</span></span></p><span data-dcnode-id="4797" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4794" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4795" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4796" instrument_node="">In his speech to West Point graduates in 2014 and, more concretely, in his dogged determination to push the Iran-EU nuclear deal through, President Obama has shown that he wants the US to eschew Bush’s pre-emptive first strike security doctrine and to abandon the pursuit of a unipolar world order in favour of a multi-polar order. But his term is ending and, as of now, even Hilary Clinton has said nothing that suggests that she understands the need for a radical change of direction. Until that happens, India will do well to steer clear of a closer involvement with it or its allies in the Middle East.</span></span></p><span data-dcnode-id="4793" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4790" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4791" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4792" instrument_node="">What the world needs now is not a new paradigm of international relations, but a powerful reaffirmation of the Westphalian paradigm with modifications to make it meet the needs of a culturally integrated world. So long as the West resists this, or tries only to broad-base its quest for uni-polarity by forming ‘coalitions of the willing’, it and its friends will remain on the wrong side of history.</span></span></p><span data-dcnode-id="4789" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4786" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4787" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4788" instrument_node="">Russia, Iran committed to multipolar world</span></span></p><span data-dcnode-id="4785" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4782" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4783" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4784" instrument_node="">By the same token today it is Russia, China and Iran that are on the right side of history, for it is they who are most committed to building a multipolar world. This is apparent from the popularity Russia and Iran have gained by going decisively to the assistance of Syria and Iraq in the fight against the Islamic State. For no fault of its own India found itself on the wrong side of history during the Cold War. It must not make the same mistake again.</span></span></p><span data-dcnode-id="4781" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4778" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4779" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4780" instrument_node="">But this does not mean that it should simply switch sides. The role that it is best fitted to play is that of a mediator that can moderate conflict and bring warring nations back to sanity. This is a leadership role of a different kind from what India aspires to today, but it is one that it is ideally situated to play. This is not only because it is vast, democratic and unthreatening even to its immediate neighbours, but because it is the only modern state that has not been built through conquest and ethnic homogenization, but through negotiation and accommodation of differences. It is therefore comfortable with compromise and does not have to overcome the zero-sum mentality embedded in European nation states by their history and circumstances of birth, before initiating the quest for peace</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="4706" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="4707" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="4708" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="4722" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="4744" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="4745" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="4755" style="box-sizing: border-box; pointer-events: all;">< ls that two border nations are eating away at their border. So a prominent strategy is to be against terrorism. This narrative has helped India to have support at the world stage. Eg. Kashmiri militants - ISI funding, naxal-communism linkages.</span></span></p><span data-dcnode-id="4541" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4538" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4539" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4540" instrument_node="">Oil - Perhaps the largest economic pain is the dependency on oil. New sanctions forces India to let the coveted “rupee” deal with Iran go. A good strategy has been to focus on renewable “solar” and “wind”.</span></span></p><span data-dcnode-id="4537" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4534" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4535" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4536" instrument_node="">Job creation - India has a youn</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="4522" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="4523" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="4524" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppete  - Perhaps the largest economic pain is the dependency on oil. New sanctions forces India to let the coveted “rupee” deal with Iran go. A good strategy has been to focus on renewable “solar” and “wind”.</span></span></p><span data-dcnode-id="4505" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4502" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4503" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4504" instrument_node="">Job creation - India has a young workforce and not enough jobs to go for them. If young blood gets restless or frustrated enough - it may lead to a civil war. With acceptance of market reforms comes new ways of making this happen. So politics has been to let new companies set up shop in India.</span></span></p><span data-dcnode-id="4501" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4498" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4499" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4500" instrument_node="">India uses various politics to address the issue of pain-points:</span></span></p><span data-dcnode-id="4497" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4494" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4495" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4496" instrument_node="">Demography: India boasts a rich “diversity” of religion and ethnic population. This helps/hurts when making relations with other nations for trade. Think of oil - Middle East used to be biggest exporter of oil. Often times, princes of Saudi receive warm welcome in India. But then again there is a sunni/shia divide in these countries. India uses “young” demographic imagery to attract businesses.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="4427" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="4428" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="4429" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="4443" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="4465" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="4466" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="4476" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="4477" style="box-sizing: border-box; position: relative;"><button aria-label="Upvote" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--bg--darken qu-hover--textDecoration--none" data-dcnode-id="4478" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 10px; height: 30px; transition-duration: 60ms; transit inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="4290" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="4295" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="4296" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="4297" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="4291" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="4292"><svg data-dcnode-id="4293" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="4294" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="4229" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="4230" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="4231"><span class="q-box qu-userSelect--text" data-dcnode-id="4232" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4278" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4279" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4280" instrument_node="">This is possible but not at all easy. For the sake of long-term analysis, let's neglect some of India's current weaknesses which may get resolved in 10-20 years, but focus on fundamentals and their manifestations.</span></span></p><span data-dcnode-id="4277" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4272" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4275" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4276" instrument_node="">India's economy</span></span><span data-dcnode-id="4273" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4274" instrument_node=""> is projected to reach the #3 spot by 2020 (by at least some analysts and metrics; it's already there by PPP), surpassing Japan, and trailing only China (#1) and the US (#2). In view of China's recent economic troubles and suspicious accounting, China's ascent is in doubt, but India's upward path seems more certain (say, by 2030), as its excesses have been smaller so far. Of course, India's economy must become more robust and structurally sound, while the legal system must strengthen as well, and corruption must be addressed. Going forward, India has huge potential due to its large population, a long-standing tradition of democracy and stable government system with non-violent transitions, convenient location for trade, proximity to major oil exporters, decent standing in the world, a large English-speaking population, massive engineering education that is gradually improving in quality, and a system of R&amp;D institutions. India's current weakness is limited global reach. In particular, the BRICS group is looking less and less promising due to significant divergence between its members (some are in deep recession, some need oil to be expensive, while others prefer cheap oil, etc). However, G20 has been increasingly relevant. Should India and China reach the status of developed economies (perhaps in 20 years), they may be added to the G7 forum. In general, faster development of the world economy should help developing countries to catch up, but in a slower world economy the developed countries will preserve their lead.</span></span></p><span data-dcnode-id="4271" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4266" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4269" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4270" instrument_node="">India's military </span></span><span data-dcnode-id="4267" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4268" instrument_node="">is ranked #4 in 2015 by Global Firepower after the US, Russia and China, and followed by the UK. While this is unlikely to change by 2020, I expect Russia to drop out from the top three in 10-20 years, due to the effects of protracted financial crisis, economic stagnation, and deteriorating demographics. In contrast, both India and the UK are primed to significantly increase their military strength by 2025. With two new super-carriers, the UK will have a stronger Navy (currently, UK's Navy is considered slightly weaker than Indian). The recently-announced massive new purchase program for strike aircraft can make the UK Air Force stronger as well (it is currently judged weaker than India's, and is a lot smaller). India's initial bet on Russian fifth-gen fighters (PAK FA) has gone sour. The supersonic cruise missile Brahmos jointly developed by India and Russia isn't deployed by Russia for some reason (despite its availability) and does not have direct analogues in NATO countries, while NATO can technically develop one. This raises doubts about the operational effectiveness of this primarily-anti-ship missile.</span></span></p><span data-dcnode-id="4265" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4253" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4263" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4264" instrument_node="">Even today, India cannot project power away from its borders nearly as efficiently as the UK can (due to UK's bases and close defense relations with NATO).And India has no military alliences like NATO and the </span></span><span class="q-inline" data-dcnode-id="4256" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="4261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Five_Eyes" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="4262" instrument_node="">Five Eyes</span></a><span class="q-inlineBlock" data-dcnode-id="4257" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="4258"><svg data-dcnode-id="4259" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="4260" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="4254" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4255" instrument_node="">. India is likely to remain the #4 military power through 2030, but if Russia is replaced by the UK in the top 3, this can increase India's significance because the UK is a part of the already-strong NATO. It's really hard to guess the military developments by 2050, but the NATO militaries will clearly become increasingly unmanned, negating population handicaps and leveraging new technology, while other countries are likely to lag behind. The extent of this trend will be determined by specific technology developments and economic health of the countries involved.</span></span></p><span data-dcnode-id="4252" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4247" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4250" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4251" instrument_node="">India's diplomatic standing and international reach</span></span><span data-dcnode-id="4248" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4249" instrument_node="">. India has been uninvolved in many international conflicts and also has relatively little political influence on other countries (despite being the third largest contributor to UN Peacekeeping Forces worldwide). This may start changing as India's economy and international trade grow. The big diplomatic prize would be an enhanced status in the UN. India is arguing for a permanent seat in the UN Security Council, but any UN SC reform seems impossible in the next five years. Some changes may become realistic by 2025, especially after major political upheavals that some predict for this timeframe. A UN reform is looking more likely by 2050, especially if 20 years pass without major conflicts. Here, the key for India is to wisely navigate between other world powers, make good bets, avoid major pitfalls, while contributing to the world peace in essential and unique ways. The current conflict with Pakistan is a serious shackle, as it confines India to the status of a regional power and limits India's support among Muslim nations (India's collaboration with Israel on defense matters is another issue for Muslim nations).</span></span></p><span data-dcnode-id="4246" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4237" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4244" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4245" instrument_node="">The rule of three.</span></span><span data-dcnode-id="4242" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4243" instrument_node=""> I'd like to postulate that </span></span><span data-dcnode-id="4240" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4241" instrument_node="">there can be at most three global superpowers on this planet</span></span><span data-dcnode-id="4238" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4239" instrument_node=""> (with more comparable powers, each will hold too little sway to count as a superpower). There is little doubt that the US will remain a superpower, even if China's economy becomes larger. As of 2025, the EU will likely become the second global superpower, and some may argue that it already is (the EU economy is currently larger than the US economy, the EU definitely has global political, diplomatic and economy-related reach, while enjoying two seats on the UN Security Council, etc). It is not clear if there will be a third superpower, especially that the US and the EU are so tightly allied in most regards. But the main candidates are China and India (Russia's economy is way too small, and its global reach has significantly shrunk in 2014-2015 due to political adventurism and bad bets, while the overall trajectory remains negative). Both China and India have limited global reach today, and both are trying to reach the status of developed economies. Both need to provide better education to their citizens, improve their legal/enforcement systems and cut down corruption. Both have questionable human-rights records, although India seems in a better shape. Both have thorny relations with some of their neighbors that are unlikely to get resolved. China has a head start on the economy size, while India has a head start on the political system. In the short-term, economy is more tangible, but in the long term the political system is at least as important (as this is critical to fixing the legal system, setting up effective law enforcement, and rooting out corruption).</span></span></p><span data-dcnode-id="4236" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4233" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4234" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4235" instrument_node="">So, will China or India be the third superpower? Or neither?</span></span></p></span></span></div></div></div></div></div></div></div><di
