</span><h1 class="article-headline" data-dcnode-id="2535"><span data-dcnode-id="2536" instrument_node="">The role of NATO in today's world</span></h1><span data-dcnode-id="2534" instrument_node="">
</span><div class="article-subhead" data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node=""> NATO can adapt to threats, but we should be careful about what we want it to be.&nbsp;</span></div><span data-dcnode-id="2531" instrument_node="">
</span><div class="article-byline-mod" data-dcnode-id="2520"><span data-dcnode-id="2530" instrument_node="">

</span><div class="article-body resizeFont" data-dcnode-id="2318"><span data-dcnode-id="2364" instrument_node="">
</span><p class="Text_Body" data-dcnode-id="2362" style="font-size: 100%;"><span data-dcnode-id="2363" instrument_node="">The question of whether NATO is in crisis has been around for decades. There have been complaints since the start of the Afghanistan mission that allies were not doing their fair share. Some criticize Europeans’ lower overall defense spending as a sign that they want a free ride. Many Americans wonder why NATO intervened in Libya but has not in Syria.</span></p><span data-dcnode-id="2361" instrument_node="">
</span><p class="Text_Body" data-dcnode-id="2359" style="font-size: 100%;"><span data-dcnode-id="2360" instrument_node="">At the same time, some policy thinkers, seeking to keep NATO relevant in the face of the U.S. policy “pivot” toward Asia, repeat worn ideas about broad geographic, political or even economic roles for the organization that our allies reject.</span></p><span data-dcnode-id="2358" instrument_node="">
</span><p class="Text_Body" data-dcnode-id="2356" style="font-size: 100%;"><span data-dcnode-id="2357" instrument_node="">NATO plays an important role protecting the security that has enabled decades of European and North American peace and prosperity. But looking for an overly expansive role for it risks undermining its strength and lessening its value.</span></p><span data-dcnode-id="2355" instrument_node="">
</span><p class="Text_Body" data-dcnode-id="2353" style="font-size: 100%;"><span data-dcnode-id="2354" instrument_node="">Many Americans — even elected officials and policymakers — don’t spend much time thinking about NATO, despite its importance. And unfortunately, many who do think about it approach issues from a NATO-centric and U.S.-centric view, distorting the conversation.</span></p><span data-dcnode-id="2352" instrument_node="">
</span><p class="Text_Body" data-dcnode-id="2350" style="font-size: 100%;"><span data-dcnode-id="2351" instrument_node="">We should start by looking at our global security needs, asking what instruments best meet those needs, rather than looking at NATO and asking what role we might devise for it. We also must engage our allies in meaningful conversation about where NATO fits into their national priorities. Finally, we have to consider the outlook of NATO’s neighbors, friend and foe. NATO can remain a vital part of our international security apparatus only if we are careful about what we want it to be and do.</span></p><span data-dcnode-id="2349" instrument_node="">
</span><p class="Text_Body" data-dcnode-id="2347" style="font-size: 100%;"><span data-dcnode-id="2348" instrument_node="">It is worth remembering where NATO started. After World War II, the United States intended to withdraw from Europe, but the European nations most afflicted by centuries of war wanted us to stay. We often think of NATO’s Cold War origins, but to the five countries that first signed a collective security agreement in 1948, then asked us to join, the concerns were as much about Germany as the Soviet Union.</span></p><span data-dcnode-id="2346" instrument_node="">
</span><p class="Text_Body" data-dcnode-id="2344" style="font-size: 100%;"><span data-dcnode-id="2345" instrument_node="">NATO was conceived not just to protect Western European countries (and the United States and Canada) from outside attack, but also to create a sense of security that would enable peace and prosperity. NATO became an important part of Western Europe’s recovery and contributed to the fall of communism. But that is only part of the story.</span></p><span data-dcnode-id="2343" instrument_node="">
</span><p class="Text_Body" data-dcnode-id="2341" style="font-size: 100%;"><span data-dcnode-id="2342" instrument_node="">For most Europeans, the story of the European Union is just as important. For all its current troubles, the E.U. has played a critical role promoting European economic growth and political stability — and peace. When former communist countries gained their freedom, they sought (and we encouraged) membership not just in NATO, but also in the E.U.</span></p><span data-dcnode-id="2340" instrument_node="">
</span><p class="Text_Body" data-dcnode-id="2338" style="font-size: 100%;"><span data-dcnode-id="2339" instrument_node="">We and our European allies viewed integration into European economic and political structures as the best route to democracy. As the E.U. has grown, the United States has expanded its ties, from trade and investment to homeland security and regional peace-building. For us, as for the Europeans, NATO is not the only instrument for security or engagement in the region.</span></p><span data-dcnode-id="2337" instrument_node="">
</span><p class="Text_Body" data-dcnode-id="2335" style="font-size: 100%;"><span data-dcnode-id="2336" instrument_node="">While Europeans may not be as NATO-centric as Americans in their thinking, opinion polls show higher support in some European countries than in the U.S. But many see NATO’s founding purposes as still the cornerstone of its existence — a concern for collective defense and a desire for a broad security umbrella.</span></p><span data-dcnode-id="2334" instrument_node="">
</span><p class="Text_Body" data-dcnode-id="2332" style="font-size: 100%;"><span data-dcnode-id="2333" instrument_node="">There are differences among the allies, of course. Some countries still cast a wary eye toward Russia. Others harbor lingering concerns about Germany. Stability is elusive in parts of the Balkans and a rising concern across the Mediterranean. Many Europeans want NATO focused on its core regional tasks.</span></p><span data-dcnode-id="2331" instrument_node="">
</span><p class="Text_Body" data-dcnode-id="2329" style="font-size: 100%;"><span data-dcnode-id="2330" instrument_node="">Europeans are wary of war for a reason — they are not far removed from the devastation of World War II. The structures that helped stop the cycle of war they had endured for centuries are worth preserving. Creating stability in Europe has been good for the United States as well, both economically and politically, and NATO still has a role in maintaining this.</span></p><span data-dcnode-id="2328" instrument_node="">
</span><p class="Text_Body" data-dcnode-id="2326" style="font-size: 100%;"><span data-dcnode-id="2327" instrument_node="">Yes, NATO should adapt as threats change. But expansive notions about NATO that detract from its core mission have been rejected by our allies in the past and risk undermining the good in what we have — one valuable instrument for regional security, but not the core of our engagement in the world.</span></p><span data-dcnode-id="2325" instrument_node="">
</span><p class="Text_Body" data-dcnode-id="2323" style="font-size: 100%;"><span data-dcnode-id="2324" instrument_node="">--------------------------</span></p><span data-dcnode-id="2322" instrument_node="">
</span><p class="Text_Endnote" data-dcnode-id="2320" style="font-size: 100%;"><span data-dcnode-id="2321" instrument_node="">Mary T. Curtin was a U.S. Department of State foreign service officer from 1986 to 2011.</span></p><span data-dcnode-id="2319" instrument_node="">
</span></div><span data-dcnode-id="2317" instrument_node="">
