" data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Jul 2018</span></span></li><li class="nova-legacy-e-list__item nova-legacy-v-publication-item__meta-data-item" data-dcnode-id="832"><span class="" data-dcnode-id="833"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-decorated" data-dcnode-id="834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/journal/Defence-Studies-1470-2436"><span data-dcnode-id="835" instrument_node="">Defence Stud</span></a></span></li></ul></div></div></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="817"><ul class="nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__person-list" data-dcnode-id="818"><li class="nova-legacy-e-list__item" data-dcnode-id="819"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Alexander-Mattelaer"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="821"><span class="lite-person-inline-item__image" data-dcnode-id="824"><picture class="lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full" data-dcnode-id="825"><span data-dcnode-id="827" instrument_node=""> </span><img alt="Alexander Mattelaer" class="lite-image" data-dcnode-id="826" data-src="https://i1.rgstatic.net/ii/profile.image/278780993130519-1443477976909_Q64/Alexander-Mattelaer.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Alexander Mattelaer</span></span></span></a></li></ul></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="813"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description" data-dcnode-id="814"><span class="js-target-abstract-626caad4176ab lite-page-hidden" data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">This article explores the relevance of geography in NATO defence planning. Historical analysis of strategic concepts and other planning documents suggests a pendulum movement from treating geography as the central organising principle within the alliance, to downplaying its role in favour of functional considerations, and back. In view of mounting tensions alongside Europe’s eastern and southern flanks, this argument acquires contemporary relevance with regards to how alliance responsibilities can be (re)distributed. Rediscovering the early principle that allies should concentrate on those tasks for which they are the most geographically suited offers a promising approach for a new division of labour.</span></span></div></div></div></div><footer class="nova-legacy-v-publication-item__footer" data-dcnode-id="797"><div class="nova-legacy-v-publication-item__footer-actions" data-dcnode-id="798"><div class="nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle" data-dcnode-id="799"><div class="nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group" data-dcnode-id="800"><div class="nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions" data-dcnode-id="801"><div class="nova-legacy-c-button-group__item" data-dcnode-id="807"><a class="nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-le ode-id="783" instrument_node="">Oct 2015</span></span></li></ul></div></div></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="761"><ul class="nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__person-list" data-dcnode-id="762"><li class="nova-legacy-e-list__item" data-dcnode-id="768"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Julien-Pomarede-2"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="770"><span class="lite-person-inline-item__image" data-dcnode-id="773"><picture class="lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full" data-dcnode-id="774"><span data-dcnode-id="776" instrument_node=""> </span><img alt="Julien Pomarède" class="lite-image" data-dcnode-id="775" data-src="https://c5.rgstatic.net/m/4671872220764/images/template/default/profile/profile_default_m.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Julien Pomarède</span></span></span></a></li><li class="nova-legacy-e-list__item" data-dcnode-id="763"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/scientific-contributions/Thea-Schjodt-2082044265"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="765"><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Théa Schjødt</span></span></span></a></li></ul></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="757"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description" data-dcnode-id="758"><span class="js-target-abstract-626caad41784e lite-page-hidden" data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">This article explores NATO’s support mission to the African Union’s peacekeeping operation in Darfur, Sudan between 2005 and 2007. NATO policies are commonly presented as functional responses to events, but how did a conflict on the African continent become the Atlantic Alliance’s business? In this essay, a poststructuralist practice-oriented approach is used to understand the way in which discursive practices progressively establish a policy option as ‘natural’ in a given situation. It is argued that the normalization of NATO’s support mission to the African Union in Darfur and the integration of this operation in NATO’s security identity were the result of complex and conflict-ridden social interactions between different discursive practices supported by different actors.</span></span></div></div></div></div><footer class="nova-legacy-v-publication-item__footer" data-dcnode-id="741"><div class="nova-legacy-v-publication-item__footer-actions" data-dcnode-id="742"><div class="nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle" data-dcnode-id="743"><div class="nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group" data-dcnode-id="744"><div class="nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions" data-dcnode-id="745"><div class="nova-legacy-c-button-group__item" data-dcnode-id="751"><a sition to fulfill a global mission as well as regional missions leads to answers that underscore the observation that a strong NATO will continue to keep Europe at peace. </span></div><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent publication-recommendation-item__more publication-recommendation-item__more--redesign" data-dcnode-id="610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/248996532_NATO_and_Transatlantic_Security_An_Overview"><span data-dcnode-id="611" instrument_node="">Read more</span></a></div></div></div></div><div class="nova-legacy-o-grid__column nova-legacy-o-grid__column--width-6/12@m-up publication-recommendation-item__item" data-dcnode-id="574"><div class="nova-legacy-c-card nova-legacy-c-card--spacing-m nova-legacy-c-card--elevation-none" data-dcnode-id="575"><div class="nova-legacy-c-card__body nova-legacy-c-card__body--spacing-inherit" data-dcnode-id="576"><div class="publication-recommendation-item publication-recommendation-item--redesign" data-dcnode-id="577"><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-xxs nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-center@s-up nova-legacy-l-flex--justify-content-flex-start@s-up nova-legacy-l-flex--wrap-wrap@s-up publication-recommendation-item__item-badges" data-dcnode-id="602"><div class="nova-legacy-l-flex__item" data-dcnode-id="603"><span class="nova-legacy-e-badge nova-legacy-e-badge--color-green nova-legacy-e-badge--display-inline nova-legacy-e-badge--luminosity-high nova-legacy-e-badge--size-m nova-legacy-e-badge--theme-solid nova-legacy-e-badge--radius-m" data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Article</span></span></div></div><h3 class="nova-legacy-e-text nova-legacy-e-text--size-l nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-xs nova-legacy-e-text--color-inherit publication-recommendation-item__title" data-dcnode-id="599"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare gtm-recommendation-item-link" data-dcnode-id="600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/285813791_Is_NATO_an_effective_alliance_On_the_relationship_between_collective_defence_and_international_operations"><span data-dcnode-id="601" instrument_node="">Is NATO an effective alliance? On the relationship between collective defence and international oper...</span></a></h3><div class="nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-xs nova-legacy-e-text--color-grey-500" data-dcnode-id="596"><span data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">March 2015</span></span></div><ul class="nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-auto" data-dcnode-id="586"><li class="nova-legacy-e-list__item" data-dcnode-id="587"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="588"><span class="lite-person-inline-item__image" data-dcnode-id="592"><picture class="lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full" data-dcnode-id="593"><span data-dcnode-id="595" instrument_node=""> </span><img alt="Bjørn Olav Knutsen" class="lite-image" data-dcnode-id="594" data-src="https://i1.rgstatic.net/ii/profile.image/357745829138434-1462304660642_Q64/Bjorn-Olav-Knutsen.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="589"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Bjorn-Olav-Knutsen"><span data-dcnode-id="591" instrument_node="">Bjørn Olav Knutsen</span></a></span></span></li></ul><div class="nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-grey-500 publication-recommendation-item__abstract" data-dcnode-id="580"><span data-dcnode-id="585" instrument_node="">What determines Nato's effectiveness as an alliance, and why is it that it is considered by many as best suited to remaining a collective defence alliance? Taking a liberal-institutionalist approach, this article studies the relationship between Nato's core task of collective defence and the other tasks it has conducted since the end of the Cold War, primarily international stabilisation </span><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent js-lite-click" data-dcnode-id="583" data-lite="{&quot;click&quot;:[{&quot;t&quot;:&quot;.js-target-626caad417db0&quot;,&quot;a&quot;:&quot;tc(lite-page-hidden)&quot;},{&quot;t&quot;:&quot;self&quot;,&quot;a&quot;:&quot;ac(lite-page-hidden)&quot;}]}"><span data-dcnode-id="584" instrument_node="">... [Show full abstract]</span></a><span class="lite-page-hidden js-target-626caad417db0" data-dcnode-id="581"><span data-dcnode-id="582" instrument_node=""> operations. The article concludes that one of the main challenges to alliance solidarity, as we have witnessed in several Nato operations, is that Nato, which was initially established to ensure US commitment to European security, has been transformed during recent years into an alliance where the European allies have become more engaged in United States' global engagements. I argue that if in coming years Nato is to be an effective alliance, the European influence within it must become stronger and its primary task must be a return to collective defence.</span></span></div><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent publication-recommendation-item__more publication-recommendation-item__more--redesign" data-dcnode-id="578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/285813791_Is_NATO_an_effective_alliance_On_the_relationship_between_collective_defence_and_international_operations"><span data-dcnode-id="579" instrument_node="">Read more</span></a></div></div></div></div><div class="nova-legacy-o-grid__column nova-legacy-o-grid__column--width-6/12@m-up publication-recommendation-item__item" data-dcnode-id="538"><div class="nova-legacy-c-card nova-legacy-c-card--spacing-m nova-legacy-c-card--elevation-none" data-dcnode-id="539"><div class="nova-legacy-c-card__body nova-legacy-c-card__body--spacing-inherit" data-dcnode-id="540"><div class="publication-recommendation-item publication-recommendation-item--redesign" data-dcnode-id="541"><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-xxs nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-center@s-up nova-legacy-l-flex--justify-content-flex-start@s-up nova-legacy-l-flex--wrap-wrap@s-up publication-recommendation-item__item-badges" data-dcnode-id="570"><div class="nova-legacy-l-flex__item" data-dcnode-id="571"><span class="nova-legacy-e-badge nova-legacy-e-badge--color-green nova-legacy-e-badge--display-inline nova-legacy-e-badge--luminosity-high nova-legacy-e-badge--size-m nova-legacy-e-badge--theme-solid nova-legacy-e-badge--radius-m" data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">Article</span></span></div></div><h3 class="nova-legacy-e-text nova-legacy-e-text--size-l nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-xs nova-legacy-e-text--color-inherit publication-recommendation-item__title" data-dcnode-id="567"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare gtm-recommendation-item-link" data-dcnode-id="568" href="https://chatnoir-webcon article concludes that one of the main challenges to alliance solidarity; as we have witnessed in several Nato operations, is that Nato, which was initially established to ensure US commitment to European security, has been transformed during recent years into an alliance where the European allies have become more engaged in United States' global engagements. I argue that if in coming years Nato is to be an effective alliance, the European influence within it must become stronger and its primary task must be a return to collective defence.</span></span></div><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent publication-recommendation-item__more publication-recommendation-item__more--redesign" data-dcnode-id="493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/286628469_Is_NATO_an_effective_alliance_On_the_relationship_between_collective_defence_and_international_operations"><span data-dcnode-id="494" instrument_node="">Read more</span></a></div></div></div></div><div class="nova-legacy-o-grid__column nova-legacy-o-grid__column--width-6/12@m-up publication-recommendation-item__item" data-dcnode-id="467"><div class="nova-legacy-c-card nova-legacy-c-card--spacing-m nova-legacy-c-card--elevation-none" data-dcnode-id="468"><div class="nova-legacy-c-card__body nova-legacy-c-card__body--spacing-inherit" data-dcnode-id="469"><div class="publication-recommendation-item publication-recommendation-item--redesign" data-dcnode-id="470"><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-xxs nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-center@s-up nova-legacy-l-flex--justify-content-flex-start@s-up nova-legacy-l-flex--wrap-wrap@s-up publication-recommendation-item__item-badges" data-dcnode-id="485"><div class="nova-legacy-l-flex__item" data-dcnode-id="486"><span class="nova-legacy-e-badge nova-legacy-e-badge--color-green
