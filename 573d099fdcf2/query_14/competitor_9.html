</span></span></p><span data-dcnode-id="3759" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3756" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3757" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3758" instrument_node="">Only to the extent that neo-colonialism derives from colonialism.</span></span></p><span data-dcnode-id="3755" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3752" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3753" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3754" instrument_node="">There's is the unremitting, rampant looting of Africa. By Africans as well as by outside multinationals. And governments.</span></span></p><span data-dcnode-id="3751" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3748" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3749" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3750" instrument_node="">Africa is a victim of natural resources, which the rest of the world, mainly the West, has vowed to have for nothing. So…there's the serious insidious, pervasive agenda to disrupt development in Africa. To ensure that Africa fits their stereotype.</span></span></p><span data-dcnode-id="3747" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3744" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3745" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3746" instrument_node="">There are many, outside of Africa, actively working to see that their narratives of Africa - poverty, etc - remain. Instigating, fueling, fanning civil wars, strife, etc. in Africa.</span></span></p><span data-dcnode-id="3743" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3740" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3741" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3742" instrument_node="">But they don't matter. They can’t sustain their agenda. Their time is fast running out.</span></span></p><span data-dcnode-id="3739" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3732" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3737" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3738" instrument_node="">For they </span></span><span data-dcnode-id="3735" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3736" instrument_node="">cannot </span></span><span data-dcnode-id="3733" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3734" instrument_node="">stop the time…</span></span></p><span data-dcnode-id="3731" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3728" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3729" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3730" instrument_node="">The truth of the matter is closer home, with us, in Africa…</span></span></p><span data-dcnode-id="3727" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3720" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3725" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3726" instrument_node="">Since after Independence, the artificial colonial contraptions of Africa, in the midst of internal strife and confusion, have been in search of their respective souls. Groping in the dark for a sense of self. To evolve a </span></span><span data-dcnode-id="3723" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="3724" instrument_node="">national ideology, </span></span><span data-dcnode-id="3721" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3722" instrument_node="">if not necessarily by design.</span></span></p><span data-dcnode-id="3719" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3716" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3717" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3718" instrument_node="">In this journey, every country have arrived at different stages.</span></span></p><span data-dcnode-id="3715" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3712" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3713" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3714" instrument_node="">Rwanda, after a bitter civil war, is a shining example of progress.</span></span></p><span data-dcnode-id="3711" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3708" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3709" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3710" instrument_node="">Kenya, Tanzania, Ethiopia, Uganda are other examples in East Africa, of countries coming in from the cold.</span></span></p><span data-dcnode-id="3707" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3704" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3705" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3706" instrument_node="">In West Africa, Ghana and Senegal stands out. Nigeria remain largely a sleeping giant but also a secret well kept from the world. We, Nigerians, like it like that, at least for now.</span></span></p><span data-dcnode-id="3703" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3700" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3701" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3702" instrument_node="">Yes, I dare to believe the story is changing for the better.</span></span></p><span data-dcnode-id="3699" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3696" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3697" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3698" instrument_node="">But up till now…</span></span></p><span data-dcnode-id="3695" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3692" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3693" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3694" instrument_node="">The African people, largely, are not mobilized for the serious task of all round development - culturally, politically and economically.</span></span></p><span data-dcnode-id="3691" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3688" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3689" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3690" instrument_node="">African countries are generally behind developmentally because of the absence of a sense of nationhood, much less consciousness, in most of them.</span></span></p><span data-dcnode-id="3687" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3684" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3685" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3686" instrument_node="">Those who are supposed to lead at various levels of society, the intelligentsia, are products of an education system anchored on a curriculum without an ideological fulcrum. Indeed a legacy of the colonial past.</span></span></p><span data-dcnode-id="3683" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3680" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3681" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3682" instrument_node="">Beyond this, their mental diet consist of an overdose of foreign literature, media, - TIME, Newsweek, The Economist, CNN, BBC, VOA, Hollywood, etc, the submissions and analysis about themselves, of which they take subconsciously, as gospel - thus their worldview and frames of reference hardly does their respective communities any good. Indeed they are strangers to their countries. Their views about their countries and immediate African communities, even those who live in Africa, is shaped by these media.</span></span></p><span data-dcnode-id="3679" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3676" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3677" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3678" instrument_node="">A disoriented intelligentsia can only make for a disoriented society. This is major reason why governance in Africa is a onerous task. There is the serious initial task of changing the way the African sees himself. His poor sense of self-identity, as an African, especially against the buffeting gale of willful ignorance, lies, half-truths and contrary mental pictures projected from the outside.</span></span></p><span data-dcnode-id="3675" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3672" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3673" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3674" instrument_node="">Leadership at different levels in Africa - political, social, business, the press, even religious - can hardly be said to be in touch with their roots. There is a major disconnect. These leaders have their eyes and attention outside. Their money is spent there. The responsibility for a better Africa is pushed to the next man.</span></span></p><span data-dcnode-id="3671" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3668" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3669" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3670" instrument_node="">The result? A typical African will sell his country for pieces of silver.</span></span></p><span data-dcnode-id="3667" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3664" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3665" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3666" instrument_node="">We copy and paste foreign models, concepts and adopt them with little, if any material, adaptation. We pride ourselves on our conspicuous consumption of foreign cultural and consumer products.</span></span></p><span data-dcnode-id="3663" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3656" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3661" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3662" instrument_node="">The lack of </span></span><span data-dcnode-id="3659" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3660" instrument_node="">grund norm </span></span><span data-dcnode-id="3657" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3658" instrument_node="">means a colossal vacuum. It means a lack of a philosophy or ideology to anchor national cultural, political and economic development. The presence of which makes China a mobilized people, an unbeatable force. To the chargrin of the haters.</span></span></p><span data-dcnode-id="3655" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3648" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3653" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3654" instrument_node="">We must evolve a genuine African </span></span><span data-dcnode-id="3651" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3652" instrument_node="">ethos</span></span><span data-dcnode-id="3649" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3650" instrument_node="">. The African must come to a place of belief. In himself; in the collective ability of his country men and women. Nothing will happen until that happens.</span></span></p><span data-dcnode-id="3647" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3642" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3645" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3646" instrument_node="">We must liberate ourselves from mental slavery; from </span></span><span data-dcnode-id="3643" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3644" instrument_node="">kolo-mentality. None but ourselves can free our minds.</span></span></p><span data-dcnode-id="3641" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3638" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3639" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3640" instrument_node="">This is what gives rise to the situation aptly verbalized purportedly by Vladimir Putin. So long as this persists, we'll remain behind the rest of the world.</span></span></p><span data-dcnode-id="3637" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3634" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3635" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3636" instrument_node="">It does not matter whether Vladimir Putin said these words or not, (I doubt if did), the fact is it is the bare truth:</span></span></p><ul class="q-box" data-dcnode-id="3618" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: disc; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="3631" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3632" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3633" instrument_node="">“Africans believe in Europeans, Americans and Chinese more than themselves–they don’t trust themselves at all.</span></span></li><li class="q-relative" data-dcnode-id="3628" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3629" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3630" instrument_node="">A white man will commit crime in Africa but no action will be taken because Africa authorities view us as semi-gods, far from the truth.</span></span></li><li class="q-relative" data-dcnode-id="3625" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3626" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3627" instrument_node="">A blackman can be abducted in Europe, get harrassed or even killed but no African authority will question.</span></span></li><li class="q-relative" data-dcnode-id="3622" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3623" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3624" instrument_node="">Africans present themselves as weak people with no hope especially when dealing with Europeans and Americans.</span></span></li><li class="q-relative" data-dcnode-id="3619" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="3620" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3621" instrument_node="">They are their own enemies. They hate each other and that gives their colonial masters power to continue exploiting African resources.”</span></span></li></ul><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3615" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3616" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3617" instrument_node="">When the Jews got sick and tired of being the doormat and scapegoat of Europeans, they rediscovered themselves and found the State of Israel.</span></span></p><span data-dcnode-id="3614" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3611" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3612" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3613" instrument_node="">For Africa to change, the African must change.</span></span></p><span data-dcnode-id="3610" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3605" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3608" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3609" instrument_node="">The African needs a new sense of </span></span><span data-dcnode-id="3606" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="3607" instrument_node="">self-identity.</span></span></p><span data-dcnode-id="3604" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3601" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3602" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="3603" instrument_node="">A strong self-identity.</span></span></p><span data-dcnode-id="3600" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3597" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3598" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3599" instrument_node="">He must deliberately, consciously reject and replace the current weak one, overshadowed by deep-seated inferiority complex, given him by outsiders and his physical circumstances.</span></span></p><ul class="q-box" data-dcnode-id="3593" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: disc; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="3594" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="3595" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="3596" instrument_node="">“…until you change the African person, injected in him a notion of national awareness, and consciousness…change their attitude towards work, towards themselves, towards their country, change the man on the street… change people like me…All these are necessary before any substantial change in Africa can take place…”</span></span></li></ul><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3588" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3591" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3592" instrument_node="">Words of Somalian writer, </span></span><span data-dcnode-id="3589" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="3590" instrument_node="">Nurudeen Farah.</span></span></p><span data-dcnode-id="3587" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3584" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3585" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3586" instrument_node="">No fiction. No idle imagination: this is what happened in China to rouse it to its potential.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3502" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="3503" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-be  direction: ltr;"><span data-dcnode-id="3406" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3407" instrument_node="">European colonialists tried to impose Western culture where they were in “contact” with Africans : cities they built, protestant and catholic missions they founded, compounds they built for their workers etc.</span></span></p><span data-dcnode-id="3404" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3401" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3402" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3403" instrument_node="">They achieved mixed results as the vast majority of us never accepted to become the dark ghosts of Europeans.</span></span></p><span data-dcnode-id="3400" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3393" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3398" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3399" instrument_node="">We adopted</span></span><span data-dcnode-id="3396" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3397" instrument_node=""> some </span></span><span data-dcnode-id="3394" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3395" instrument_node="">aspects of Western culture (languages, types of foods, styles of infrastructure etc.).</span></span></p><span data-dcnode-id="3392" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3389" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3390" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3391" instrument_node="">Bu</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="3377" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="3378" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="3379" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="3380" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="3381" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="3386" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu- zing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3366" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3367" instrument_node="">European colonialists tried to impose Western culture where they were in “contact” with Africans : cities they built, protestant and catholic missions they founded, compounds they built for their workers etc.</span></span></p><span data-dcnode-id="3364" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3361" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3362" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3363" instrument_node="">They achieved mixed results as the vast majority of us never accepted to become the dark ghosts of Europeans.</span></span></p><span data-dcnode-id="3360" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3353" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3358" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3359" instrument_node="">We adopted</span></span><span data-dcnode-id="3356" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3357" instrument_node=""> some </span></span><span data-dcnode-id="3354" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3355" instrument_node="">aspects of Western culture (languages, types of foods, styles of infrastructure etc.).</span></span></p><span data-dcnode-id="3352" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3349" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3350" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3351" instrument_node="">But, we rejected most of it.</span></span></p><span data-dcnode-id="3348" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3345" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3346" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3347" instrument_node="">Europeans who go to Africa for the first time will get a culture shock because our values, world views and our traditions have very little in common with the Western culture. The vast majority of us still speak our local languages we are very proud of. Not many Westerners speak or understand our languages. African foods, arts, dances, songs, textile traditions, dress etc. are quite distinct from Western culture.</span></span></p><span data-dcnode-id="3344" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3341" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3342" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3343" instrument_node="">Africans, we are culturally miles apart from Westerners.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3259" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="3260" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dc sus, and we petty men walked under his huge legs and peeped about to find ourselves dishonorable graves.</span></span></p><span data-dcnode-id="2983" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2980" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2981" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2982" instrument_node="">On the other hand, there is the realization that our woes are not entirely the white man’s doing, that there is much to like in this world created by colonialism, and that most of us, if given the chance, would not willing live as our forbears did.</span></span></p><span data-dcnode-id="2979" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2976" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2977" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2978" instrument_node="">My </span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="2964" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="2965" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="2966" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="2967" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="2968" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="2973" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="2974" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="2975" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="2969" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="2970"><svg data-dcnode-id="2971" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="2972" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="2896" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="2897" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="2898"><span class="q-box qu-userSelect--text" data-dcnode-id="2899" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2956" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2957" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2958" instrument_node="">Interesting question!</span></span></p><span data-dcnode-id="2955" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2952" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2953" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2954" instrument_node="">On one hand there is the longing and nostalgia for an idealized pre-colonial life, before complexities of modernity, before the dilution of traditional culture, before the white man did bestride the narrow world like a colossus, and we petty men walked under his huge legs and peeped about to find ourselves dishonorable graves.</span></span></p><span data-dcnode-id="2951" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2948" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2949" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2950" instrument_node="">On the other hand, there is the realization that our woes are not entirely the white man’s doing, that there is much to like in this world created by colonialism, and that most of us, if given the chance, would not willing live as our forbears did.</span></span></p><span data-dcnode-id="2947" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2936" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2945" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2946" instrument_node="">My very sense of identity is a legacy of colonialism. There was no such thing as Cote d’Ivoire before the French arrived. 150 years ago, I would have seen myself as a Dioula, with not much in common with a Baoule. Today, I see myself as an Ivorian first. I am not fluent in Dioula. When I rail against colonization, it is </span></span><span data-dcnode-id="2943" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2944" instrument_node="">in French </span></span><span data-dcnode-id="2941" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2942" instrument_node="">or </span></span><span data-dcnode-id="2939" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2940" instrument_node="">in English</span></span><span data-dcnode-id="2937" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2938" instrument_node=""> that I do it. I have no idea how to make sacrifices to the spirits of an ancestral village I have visited only twice. I have never undergone any traditional rite of passage. And what few traditional customs I am familiar with seem quaint to me. For instance, I am vaguely aware that I am of the noble caste, but I have no idea what privileges and duties that might have entailed in the pre-colonial world, other than the fact that my daughters would not have been able to marry a non-noble.</span></span></p><span data-dcnode-id="2935" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2932" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2933" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2934" instrument_node="">I am, admittedly, an extreme case. I left my birth country at age 15 and I’ve been living in the US since. If colonization had some winners and losers, I am unquestionable among the former. But other than very old people, everyone I grew up around was some degree of hybrid of their African and French colonial heritage. Most of the kids I went to school with were not fluent in their African language. They might have been able to understand it when it was spoken to them, but they would never know it well enough to speak it to their own children.</span></span></p><span data-dcnode-id="2931" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2928" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2929" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2930" instrument_node="">The cultivated men of old were able to have entire conversations by quoting proverbs to one another. That was the mark of erudition and wisdom. Today, it the knowledge of Western literature of political values that marks a man of culture.</span></span></p><span data-dcnode-id="2927" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2924" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2925" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2926" instrument_node="">And yet the sense of anger at the former colonial powers should not be so easily dismissed. It is real, fueled not only colonization itself, but by a first-hand familiarity with the pernicious effects of neo-colonialism long after colonization was supposed to have officially ended. Simply put, the colonies were created for the purposes of providing cheap raw materials and of purchasing finished goods from the mother country, roles that they are still playing to this day. At least in the case of France, the defense of business interests has always trumped any other consideration in diplomatic relations with the former colonies. It is hard enough for democracy to flourish in the absence of foreign meddling; it is harder still when there is a rich nation willing and able to support any dictatorial regime compliant enough to give its firms favorable business deals. The deals that are struck between corrupt African governments and French multinationals create a lof of wealth for a lot of very well-connected people in both continents. These people have a perverse incentive to use their vast wealth to keep these networks of corruption in place. This is a major reason for the failure of democracy in Africa, though by no means the only one.</span></span></p><span data-dcnode-id="2923" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2920" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2921" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2922" instrument_node="">Of course, the average French citizen knows little of this. How would they learn of it and why should they care? But Africans don’t have the luxury of not knowing. And this knowledge is contributing to rising anti-French anger and resentment.</span></span></p><span data-dcnode-id="2919" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2916" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2917" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2918" instrument_node="">Considering this, overall, was the colonial experience a net positive or a net negative for Africans?</span></span></p><span data-dcnode-id="2915" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2912" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2913" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2914" instrument_node="">Opinions will differ. My own controversial opinion, for which I have been attacked more times than I care to remember, is that all in all, we’re better off than we would have been without it. Julius Caesar may not have conquered Gaul for the benefit of its inhabitants and there was much devastation caused by the initial conquest but in the long run, The land that became France did benefit immensely from being brought into the Roman orbit.</span></span></p><span data-dcnode-id="2911" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2908" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2909" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2910" instrument_node="">I am reminded of this scene in Monty Python’s Life of Brian:</span></span></p><span data-dcnode-id="2907" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2904" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2905" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2906" instrument_node="">All right... all right... but apart from better sanitation and medicine and education and irrigation and public health and roads and a freshwater system and baths and public order... what have the Romans done for us?</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="2900" style="box-sizing: border-box;"><div class="q-relative qu-cursor--pointer" data-dcnode-id="2901" data-embed-type="youtube" style="box-sizing: border-box; position: relative; margin-bottom: 1em;" type="youtube"><div class="q-box qu-bg--gray_ultralight" data-dcnode-id="2903" style="box-sizing: border-box; background-image: url(&quot;https://img.youtube.com/vi/Y7tvauOJMHo/0.jpg&quot;); width: 100%; box-shadow: rgba(0, 0, 0, 0.05) 0px 0px 0px 1px inset; transition-property: background-image; transition-duration: 180ms; transition-timing-function: ease-in-out; background-position: center center; background-size: cover; background-repeat: no-repeat; padding-top: 56.25%;" width="100%"></div><div class="q-absolute qu-full qu-zIndex--qtext_overlay" data-dcnode-id="2902" style="box-sizing: border-box; position: absolute; pointer-events: none; background: url(&quot;/static/ans_frontend_assets/images/play3.png&quot;) center center no-repeat transparent;"></div></div></div></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2818" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="2819" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="2820" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" dat ent_node=""> </span><a class="q-box qu-cursor--pointer qu-hover--textDecoration--none Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="2672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rep.routledge.com/articles/thematic/egyptian-philosophy-influence-on-ancient-greek-thought/v-1" rel="noopener nofollow" style="box-sizing: border-box; margin-bottom: 1em; border-radius: inherit;" target="_blank" title="www.rep.routledge.com"><div class="q-relative qu-borderAll qu-borderWidth--retinaOverride qu-borderWidth--regular qu-borderRadius--medium qu-overflow--hidden" data-dcnode-id="2673" style="box-sizing: border-box; position: relative; margin-bottom: 1em;"><div class="q-flex qu-justifyContent--space-between" data-dcnode-id="2675" style="box-sizing: border-box; display: flex; min-height: 100px;"><div class="q-box qu-p--medium qu-hover--bg--darken qu-overflow--hidden" data-dcnode-id="2676" style="box-sizing: border-box; width: 100%;" width="100%"><div class="q-flex qu-verticalAlign--middle qu-alignItems--center" data-dcnode-id="2677" style="box-sizing: border-box; display: flex; height: 100%;"><div class="q-box qu-overflow--hidden" data-dcnode-id="2678" style="box-sizing: border-box;"><div class="q-text qu-truncateLines--3 qu-bold qu-color--gray_dark_dim qu-wordBreak--break-word" data-dcnode-id="2688" style="box-sizing: border-box;"><span data-dcnode-id="2689" instrument_node="">Egyptian philosophy: influence on ancient Greek thought</span></div><div class="q-text qu-dynamicFontSize--small qu-truncateLines--1 qu-color--gray qu-mt--tiny" data-dcnode-id="2686" style="box-sizing: border-box;"><span data-dcnode-id="2687" instrument_node="">Egyptian philosophy: influence on ancient Greek thought DOI 10.4324/9780415249126-Z015-1 DOI: 10.4324/9780415249126-Z015-1 Version: v1,&nbsp;&nbsp;Published online: 1998 Retrieved April 10, 2022, from https://www.rep.routledge.com/articles/thematic/egyptian-philosophy-influence-on-ancient-greek-thought/v-1 Article Summary Before the decipherment of hieroglyphics (a process only completed in the 1830s), it was widely believed that many famous Greek philosophers had studied in Egypt and that Greek philosophy was ultimately derived from a lost ’Egyptian mystery system’. This belief was derived in part from ancient sources, which described how certain Greek philosophers had studied with Egyptian priests. The notion that these individual sessions were part of an extensive formal programme of education derives from an historical novel, Séthos (1731), by the Abbé Jean Terrasson. This book, which pretended to be based on lost original sources, offered a detailed portrait of a complex Egyptian university system. It was translated into several European languages and widely popularized in the rituals and mythology of Freemasonry. The existence of such a formal Egyptian mystery system of education was not confirmed by actual Egyptian sources once they could be read and translated. The myth has been given a new lease of life in revisionist histories of the ancient world composed by writers whose ancestors had been brought to the New World as slaves. These writers sought to show that Greek philosophy was derived from Egyptian philosophy and that what has been recognized as Western civilization stems from Africa. This entry reviews the evidence for these claims and concludes that although the Greeks had great respect for Egyptian wisdom and piety, what has always been known as Greek philosophy derives from the original work of Greeks. It finds moreover that if the Greek philosophers who lived in Ionia were influenced by any outside ideas, these came to them through the monotheistic religions of other peoples living in the Near East. Citing this article: Lefkowitz, Mary R.. Egyptian philosophy: influence on ancient Greek thought, 1998, doi:10.4324/9780415249126-Z015-1. Routledge Encyclopedia of Philosophy, Taylor and Francis, https://www.rep.routledge.com/articles/thematic/egyptian-phi ti &amp; Hamilton County, 1853–2003 . Wilmington, Ohio: Orange Frazer Press. ISBN 1-882203-91-7 . ^ Leonard, John William (1914). Woman's Who's who of America, 1914-1915. Volume 1 . American Commonwealth Co. p.&nbsp;394. ^ Hodges, Nathanial Dana Carlile (1909). "The Public Library System" (PDF) . Club Woman's Magazine : 6–8 . Retrieved 13 February 2016 . ^ "ALA's Past Presidents" . American Library Association. 2007-11-20 . Retrieved 10 February 2016 . ^ "ALA Presidents, Treasurers, Secretaries, and Executive Directors" . American Library Association . 2010-01-19 . Retrieved 13 February 2016 . ^ "Notable Ohio Librarians in the Hall of Fame" (PDF) . Ohio Library Council . Retrieved 13 February 2016 . ^ Annual reports of the president and treasurer of Harvard college, 1879-1880 . [google books]: John Wilson and Sons. 1880. p.&nbsp;5. External links [ edit ]</span></div><div class="q-flex qu-mt--small qu-justifyContent--space-between qu-verticalAlign--middle qu-alignItems--center" data-dcnode-id="2657" style="box-sizing: border-box; display: flex;"><span class="q-inlineBlock" data-dcnode-id="2660" name="EditorLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-right: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="2661"><svg data-dcnode-id="2662" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-fill_as_stroke" d="M16.316 10.241c-.006-.016.017-.042.041-.066l1.103-1.098c1.351-1.363.93-3.652-.816-4.443a2.767 2.767 0 0 0-3.098.545l-3.293 3.282c-.769.784-1 1.733-.662 2.775s1.087 1.658 2.165 1.874c.15.03.304.034.461.051v1.378l-.477-.032A4.07 4.07 0 0 1 9.073 13.1c-.771-.891-1.103-1.932-.994-3.103.093-1.002.513-1.853 1.229-2.563l3.25-3.23c.859-.847 1.906-1.246 3.11-1.199a4.01 4.01 0 0 1 2.678 1.128 4.01 4.01 0 0 1 1.302 3.112 3.996 3.996 0 0 1-1.161 2.7 s--center" data-dcnode-id="2556" style="box-sizing: border-box; display: flex; height: 100%;"><div class="q-box qu-overflow--hidden" data-dcnode-id="2557" style="box-sizing: border-box;"><div class="q-text qu-truncateLines--3 qu-bold qu-color--gray_dark_dim qu-wordBreak--break-word" data-dcnode-id="2567" style="box-sizing: border-box;"><span data-dcnode-id="2568" instrument_node="">Egyptian philosophy: influence on ancient Greek thought</span></div><div class="q-text qu-dynamicFontSize--small qu-truncateLines--1 qu-color--gray qu-mt--tiny" data-dcnode-id="2565" style="box-sizing: border-box;"><span data-dcnode-id="2566" instrument_node="">Egyptian philosophy: influence on ancient Greek thought DOI 10.4324/9780415249126-Z015-1 DOI: 10.4324/9780415249126-Z015-1 Version: v1,&nbsp;&nbsp;Published online: 1998 Retrieved April 10, 2022, from https://www.rep.routledge.com/articles/thematic/egyptian-philosophy-influence-on-ancient-greek-thought/v-1 Article Summary Before the decipherment of hieroglyphics (a process only completed in the 1830s), it was widely believed that many famous Greek philosophers had studied in Egypt and that Greek philosophy was ultimately derived from a lost ’Egyptian mystery system’. This belief was derived in part from ancient sources, which described how certain Greek philosophers had studied with Egyptian priests. The notion that these individual sessions were part of an extensive formal programme of education derives from an historical novel, Séthos (1731), by the Abbé Jean Terrasson. This book, which pretended to be based on lost original sources, offered a detailed portrait of a complex Egyptian university system. It was translated into several European languages and widely popularized in the rituals and mythology of Freemasonry. The existence of such a formal Egyptian mystery system of education was not confirmed by actual Egyptian sources once they could be read and translated. The myth has been given a new lease of life in revisionist histories of the ancient world composed by writers whose ancestors had been brought to the New World as slaves. These writers sought to show that Greek philosophy was derived from Egyptian philosophy and that what has been recognized as Western civilization stems from Africa. This entry reviews the evidence for these claims and concludes that although the Greeks had great respect for Egyptian wisdom and piety, what has always been known as Greek philosophy derives from the original work of Greeks. It finds moreover that if the Greek philosophers who lived in Ionia were influenced by any outside ideas, these came to them through the monotheistic religions of other peoples living in the Near East. Citing this article: Lefkowitz, Mary R.. Egyptian philosophy: influence on ancient Greek thought, 1998, doi:10.4324/9780415249126-Z015-1. Routledge Encyclopedia of Philosophy, Taylor and Francis, https://www.rep.routledge.com/articles/thematic/egyptian-philosophy-influence-on-ancient-greek-thought/v-1. Copyright © 1998-2022 Routledge.</span></div><div class="q-flex qu-mt--small qu-justifyContent--space-between qu-verticalAlign--middle qu-alignItems--center" data-dcnode-id="2558" style="box-sizing: border-box; display: flex;"><span class="q-inlineBlock" data-dcnode-id="2561" name="EditorLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-right: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="2562"><svg data-dcnode-id="2563" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-fill_as_stroke" d="M16.316 10.241c-.006-.016.017-.042.041-.066l1.103-1.098c1.351-1.363.93-3.652-.816-4.443a2.767 2.767 0 0 0-3.098.545l-3.293 3.282c-.769.784-1 1.733-.662 2.775s1.087 1.658 2.165 1.874c.15.03.304.034.461.051v1.378l-.477-.032A4.07 4.07 0 0 1 9.073 13.1c-.771-.891-1.103-1.932  bachelor's degree in 1874 and his master's degree in 1879. He was appointed to be an assistant in Physics at Harvard University in 1879. [2] Hodges went on to teach at Worcester Polytechnic Institute from 1882 to 1883 and served as editor of Science Magazine from 1885 to 1894. [3] [4] He became the Library Director of the Cincinnati Public Library in 1900 and retired from that position in 1924. [5] Hodges served as the president of the American Library Association from 1909 to 1910. [6] [7] Hodges was named a Notable Ohio Librarians in the Hall of Fame in 1980. [8] [9] See also [ edit ] References [ edit ] ^ Matthews, John (1991). Complete American Armoury and Blue Book . Clearfield. ISBN 080634573X . ^ Browman, David L.; Williams, Stephen (2013). Anthropology at Harvard . Peabody Museum Press. p.&nbsp;240. ISBN 9780873659130 . ^ Fleischman, John (November 2002). Free &amp; Public: One Hundred and Fifty Years at the Public Library of Cincinnati &amp; Hamilton County, 1853–2003 . Wilmington, Ohio: Orange Frazer Press. ISBN 1-882203-91-7 . ^ Leonard, John William (1914). Woman's Who's who of America, 1914-1915. Volume 1 . American Commonwealth Co. p.&nbsp;394. ^ Hodges, Nathanial Dana Carlile (1909). "The Public Library System" (PDF) . Club Woman's Magazine : 6–8 . Retrieved 13 February 2016 . ^ "ALA's Past Presidents" . American Library Association. 2007-11-20 . Retrieved 10 February 2016 . ^ "ALA Presidents, Treasurers, Secretaries, and Executive Directors" . American Library Association . 2010-01-19 . Retrieved 13 February 2016 . ^ "Notable Ohio Librarians in the Hall of Fame" (PDF) . Ohio Library Council . Retrieved 13 February 2016 . ^ Annual reports of the president and treasurer of Harvard college, 1879-1880 . [google books]: John Wilson and Sons. 1880. p.&nbsp;5. External links [ edit ]</span></div><div class="q-flex qu-mt--small qu-justifyContent--space-between qu-verticalAlign--middle qu-alignItems--center" data-dcnode-id="2536" style="box-sizing: border-bo data-dcnode-id="2504" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2505" instrument_node="">AFRICA,</span></span><span data-dcnode-id="2502" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2503" instrument_node=""> the oldest of the continents, containing the earliest remains of man, and</span></span><span data-dcnode-id="2500" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2501" instrument_node=""> the birthplace of European civilization, </span></span><span data-dcnode-id="2498" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2499" instrument_node="">is the last to be explored. Long before the temples of India or the palaces of Nineveh were built, before the hanging garden of Babylon was planted, the pyramids of Cheops and Cephren had been constructed, the temples of Palmyra and Thebes filled with worshippers.</span></span></p><span data-dcnode-id="2496" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2491" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2494" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2495" instrument_node="">Greece owes its civilization to Egyp</span></span><span data-dcnode-id="2492" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2493" instrument_node="">t: its beautiful orders of architecture came from the land of the Nile. The civilization of Egypt had grown old, and was in its decay, when Rome was born. Think what a vast abyss of time separates us from the days of Romulus and Remus! And yet the pyramids of Egypt were then older by a thousand years than all the centuries that have passed since then.</span></span></p><span data-dcnode-id="2490" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2487" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2488" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2489" instrument_node="">….</span></span></p><span data-dcnode-id="2486" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2479" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2484" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2485" instrument_node="">We know that Africa is capable of the very highest civilization; that </span></span><span data-dcnode-id="2482" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2483" instrument_node="">it was the birthplace of all civilization</span></span><span data-dcnode-id="2480" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2481" instrument_node="">. To it we are indebted for the origin of all our arts and sciences, and it possesses to-day the most wonderful works of man. I believe that Africa, whose morning was so bright, and whose night has been so dark, will yet live to see the light of another and a higher civilization.</span></span></p><a class="q-box qu-cursor--pointer qu-hover--textDecoration--none Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="2461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cruel.org/econthought/texts/carlyle/millnegro.html" rel="noopener nofollow" style="box-sizing: border-box; margin-bottom: 1em; border-radius: inherit;" target="_blank" title="cruel.org"><div class="q-relative qu-borderAll qu-borderWidth--retinaOverride qu-borderWidth--regular qu-borderRadius--medium qu-overflow--hidde
