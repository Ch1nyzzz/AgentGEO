s="q-box qu-p--medium qu-hover--bg--darken qu-overflow--hidden" data-dcnode-id="2443" style="box-sizing: border-box; width: 100%;" width="100%"><div class="q-flex qu-verticalAlign--middle qu-alignItems--center" data-dcnode-id="2444" style="box-sizing: border-box; display: flex; height: 100%;"><div class="q-box qu-overflow--hidden" data-dcnode-id="2445" style="box-sizing: border-box;"><div class="q-text qu-truncateLines--3 qu-bold qu-color--gray_dark_dim qu-wordBreak--break-word" data-dcnode-id="2455" style="box-sizing: border-box;"><span data-dcnode-id="2456" instrument_node="">John Stuart Mill - Wikipedia</span></div><div class="q-text qu-dynamicFontSize--small qu-truncateLines--1 qu-color--gray qu-mt--tiny" data-dcnode-id="2453" style="box-sizing: border-box;"><span data-dcnode-id="2454" instrument_node="">British philosopher and political economist (1806–1873) John Stuart Mill In office 25 July 1865&nbsp;– 17 November 1868 Preceded by De Lacy Evans Succeeded by William Henry Smith Personal details Born ( 1806-05-20 ) 20 May 1806 Pentonville , Middlesex , England Died 7 May 1873 (1873-05-07) (aged&nbsp;66) Avignon , Vaucluse , France Political party Liberal Spouse(s) Parent(s) Alma mater University College London Philosophy career Era 19th-century philosophy Classical economics Region Western philosophy School Empiricism Utilitarianism Consequentialism Psychologism Classical liberalism Main interests Political philosophy , ethics, economics, inductive logic Notable ideas Public / private sphere , social liberty , hierarchy of pleasures in utilitarianism , rule utilitarianism , classical liberalism , early liberal feminism , harm principle , Mill's Methods , direct reference theory , Millian theory of proper names , emergentism Signature John Stuart Mill (20 May 1806 – 7 May 1873) [10] was an English philosopher , political economist , Member of Parliament (MP) and civil servant. One of the most influential thinkers in the history of classical liberalism , he contributed widely to social theory , political theory , and political economy. Dubbed "the most influential English-speaking philosopher of the nineteenth century", [11] he conceived of liberty as justifying the freedom of the individual in opposition to unlimited state and social control . [12] Mill was a proponent of utilitarianism , an ethical theory developed by his predecessor Jeremy Bentham . He contributed to the investigation of scientific methodology , though his knowledge of the topic was based on the writings of others, notably William Whewell , John Herschel , and Auguste Comte , and research carried out for Mill by Alexander Bain . He engaged in written debate with Whewell. [13] A member of the Liberal Party and author of the early feminist work The Subjection of Women , Mill was also the second Member of Parliament to call for women's suffrage after Henry Hunt in 1832. [14] [15] Biography [ edit ] John Stuart Mill was born at 13 Rodney Street in Pentonville , Middlesex , the eldest son of Harriet Barrow and the Scottish philosopher , historian, and economist James Mill . John Stuart was educated by his father, with the advice and assistance of Jeremy Bentham and Francis Place . He was given an extremely rigorous upbringing, and was deliberately shielded from association with children his own age other than his siblings. His father, a follower of Bentham and an adherent of associationism , had as his explicit aim to create a genius intellect that would carry on the cause of utilitarianism and its implementation after he and Bentham had died. [16] Mill was a notably precocious child. He describes his education in his autobiography. At the age of three he was taught Greek . [17] By the age of eight, he had read Aesop's Fables , Xenophon 's Anabasis , [17] and the whole of Herodotus , [17] and</span></div><div class="q-flex qu-mt--small qu-justifyContent--space-between qu-verticalAlign--middle qu-alignItems--center" data-dcnode-id="2446" style="box-sizing: border-box; display: flex;"><span class="q-inlineBlock" data-dcnode-id="2449" name="EditorLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-right: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="2450"><svg data-dcnode-id="2451" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-fill_as_stroke" d="M16.316 10.241c-.006-.016.017-.042.041-.066l1.103-1.098c1.351-1.363.93-3.652-.816-4.443a2.767 2.767 0 0 0-3.098.545l-3.293 3.282c-.769.784-1 1.733-.662 2.775s1.087 1.658 2.165 1.874c.15.03.304.034.461.051v1.378l-.477-.032A4.07 4.07 0 0 1 9.073 13.1c-.771-.891-1.103-1.932-.994-3.103.093-1.002.513-1.853 1.229-2.563l3.25-3.23c.859-.847 1.906-1.246 3.11-1.199a4.01 4.01 0 0 1 2.678 1.128 4.01 4.01 0 0 1 1.302 3.112 3.996 3.996 0 0 1-1.161 2.77l-1.421 1.418a.256.256 0 0 1-.032.027l-.719-1.217zm-8.784 3.697-.973.969a2.744 2.744 0 0 0-.028 3.881 2.77 2.77 0 0 0 3.909.044l3.31-3.301c.764-.782.987-1.732.651-2.769s-1.083-1.651-2.155-1.871l-.137-.021V9.508c.383.031.511.031.774.111 1.639.502 2.648 1.578 2.973 3.237.274 1.395-.124 2.637-1.123 3.658l-3.311 3.301c-.725.715-1.607 1.101-2.625 1.175-2.082.152-3.982-1.284-4.365-3.323-.264-1.409.106-2.652 1.098-3.695l1.413-1.411c.011-.011.474.813.78 1.204l-.192.174z" data-dcnode-id="2452" fill="#666" fill-rule="evenodd"></path></svg></span></span><div class="q-text qu-dynamicFontSize--small qu-truncateLines--1 qu-wordBreak--break-all qu-color--gray_light qu-passColorToLinks" data-dcnode-id="2447" style="box-sizing: border-box; width: 100%;" width="100%"><span data-dcnode-id="2448" instrument_node="">https://en.wikipedia.org/wiki/John_Stuart_Mill</span></div></div></div></div></div></div><div class="q-absolute qu-hover--cursor--pointer qu-hover--bg--darken qu-zIndex--base qu-display--flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="2441" style="box-sizing: border-box; position: absolute; inset: 0px;"></div></div></a><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2436" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2437" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2438" instrument_node="">"The Negro Question" by [John Stuart Mill] 1850</span></span></p><span data-dcnode-id="2435" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2432" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2433" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2434" instrument_node="">Fraser's Magazine for Town and Country</span></span></p><span data-dcnode-id="2431" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2406" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2429" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2430" instrument_node="">It is curious, withal, that the </span></span><span data-dcnode-id="2427" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="2428" instrument_node="">earliest known civilization was</span></span><span data-dcnode-id="2425" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2426" instrument_node="">, we have the strongest reason to believe, </span></span><span data-dcnode-id="2423" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="2424" instrument_node="">a negro civilization.</span></span><span data-dcnode-id="2421" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2422" instrument_node=""> </span></span><span data-dcnode-id="2419" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="2420" instrument_node="">The original Egyptians</span></span><span data-dcnode-id="2417" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2418" instrument_node=""> are inferred, from the evidence of their sculptures, to </span></span><span data-dcnode-id="2415" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="2416" instrument_node="">have been a negro race:</span></span><span data-dcnode-id="2413" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2414" instrument_node=""> it </span></span><span data-dcnode-id="2411" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="2412" instrument_node="">was from negroes</span></span><span data-dcnode-id="2409" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2410" instrument_node="">, therefore, that the Greeks learnt their first lessons in civilization; and to the records and traditions of these negroes did the Greek philosophers to the very end of their career resort</span></span><span data-dcnode-id="2407" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2408" instrument_node=""> (I do not say with much fruit) as a treasury of mysterious wisdom.</span></span></p><span data-dcnode-id="2405" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2402" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2403" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2404" instrument_node="">But I again renounce all advantage from facts: were the whites born ever so superior in intelligence to the blacks, and competent by nature to instruct and advise them, it would not be the less monstrous to assert that they had therefore a right either to subdue them by force, or circumvent them by superior skill; to throw upon them the toils and hardships of life, reserving for themselves, under the misapplied name of work, its agreeable excitements.</span></span></p><span data-dcnode-id="2401" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2398" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2399" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2400" instrument_node="">Three powerful quotes on ancient Egypt and Hamites reclassified from Blacks to Whites.</span></span></p><ol class="q-box" data-dcnode-id="2388" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: decimal; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="2395" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2396" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2397" instrument_node="">Hamites" cursed as "blacks" now become "white" and therefore the just progenitors of civilization in Africa, beginning with Egypt.</span></span></li><li class="q-relative" data-dcnode-id="2392" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2393" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2394" instrument_node="">The Hamite went from being the cursed father of African people, doomed to slavery, to being some superior, civilizing white or near white race in order to rationalize the presence of civilization in Egypt.</span></span></li><li class="q-relative" data-dcnode-id="2389" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="2390" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2391" instrument_node="">Eurocentrics classify Ham as all "black" people first (to justify slavery and colonization) then they all magically became "white" people after that point so that they could claim Egypt for themselves</span></span></li></ol><a class="q-box qu-cursor--pointer qu-hover--textDecoration--none Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="2367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.msafropolitan.com/2015/11/ancient-egypt-was-black-african.html" rel="noopener nofollow" style="box-sizing: border-box; margin-bottom: 1em; border-radius: inherit;" target="_blank" title="www.msafropolitan.com"><div class="q-relative qu-borderAll qu-borderWidth--retinaOverride qu-borderWidth--regular qu-borderRadius--medium qu-overflow--hidden" data-dcnode-id="2368" style="box-sizing: border-box; position: relative; margin-bottom: 1em;"><div class="q-flex qu-justifyContent--space-between" data-dcnode-id="2370" style="box-sizing: border-box; display: flex; min-height: 100px;"><div class="q-relative qu-overflow--hidden" data-dcnode-id="2385" style="box-sizing: border-box; position: relative; flex: 0 0 100px;"><div class="q-box qu-bg--darken" data-dcnode-id="2387" style="box-sizing: border-box; background-image: url(&quot;http://msafropolitan.com/wp-content/uploads/2015/11/MusiciansatabanquetMuralfromthetombofRekhmirevizierunderThutmosisIII1490-1439BCEandAmenophisII1439-1413BCE18thDynastyNewKingdomEgypt-1024x802.jpg?x97770&quot;); height: 100%; transition-property: background-image; transition-duration: 180ms; transition-timing-function: ease-in-out; background-position: center center; background-size: cover; background-repeat: no-repeat;"></div><div class="q-absolute qu-fullY qu-borderLeft" data-dcnode-id="2386" style="box-sizing: border-box; position: absolute; right: 0px; border-color: rgba(0, 0, 0, 0.1); z-index: 1;"></div></div><div class="q-box qu-p--medium qu-hover--bg--darken qu-overflow--hidden" data-dcnode-id="2371" style="box-sizing: border-box; width: 100%;" width="100%"><div class="q-flex qu-verticalAlign--middle qu-alignItems--center" data-dcnode-id="2372" style="box-sizing: border-box; display: flex; height: 100%;"><div class="q-box qu-overflow--hidden" data-dcnode-id="2373" style="box-sizing: border-box;"><div class="q-text qu-truncateLines--3 qu-bold qu-color--gray_dark_dim qu-wordBreak--break-word" data-dcnode-id="2383" style="box-sizing: border-box;"><span data-dcnode-id="2384" instrument_node="">In which even the university of Cambridge admits that ancient Egypt was Black African</span></div><div class="q-text qu-dynamicFontSize--small qu-truncateLines--1 qu-color--gray qu-mt--tiny" data-dcnode-id="2381" style="box-sizing: border-box;"><span data-dcnode-id="2382" instrument_node="">In which even the university of Cambridge admits that ancient Egypt was Black African November 13, 2015 By MsAfropolitan 79 Comments Musicians at a banquet. Mural from the tomb of Rekhmire, vizier under Thutmosis III (1490-1439 BCE) and Amenophis II (1439-1413 BCE). 18th Dynasty, New Kingdom, Egypt. In 2006, the Cambridge University art and antiquities museum, Fitzwilliam , did&nbsp;a commendable thing when they, following a £1.5 million renewal project, launched their new Egypt galleries .&nbsp;The idea was to showcase ancient Egyptian religion, magic, writing, ritual and to redisplay the collections in a contemporary and dynamic way. But that was not all. In a rare condemnation of the historical revision of ancient Egypt, the&nbsp;Fitzwilliam Museum admitted that, not only does Egyptology have a European bias, but that&nbsp;the bias means that our understanding of the earliest human civilisation is gravely erroneous. As they put it , “People mainly look at Ancient Egypt through a European bias. This is because the majority of books on Egyptology are written by researchers of European, or North-American backgrounds.” Instead, the Fitzwilliam Museum decided to adopt an Africa-Centred approach to ancient Egypt. What does an Africa-centred approach to Egyptology mean? Well , first of all, it acknowledges&nbsp;that Ancient Egypt&nbsp;“is part of African culture” and that while the word ‘Egypt’ is what&nbsp;the Ancient Greeks named ancient Egypt, the original inhabitants called it ‘Kemet’, which literally means ‘the black land’. Therefore, by naming the museum gallery “Virtual Kemet”, the curators intended&nbsp;to remind people that Ancient Egypt is an “African civilization and that whilst the culture had contact with people from other civilizations, it was essentially African in its culture and well as its geographical placement.” The museum insists, “There are many links between ancient Egyptian and modern African culture, ranging from objects such as headrests to hairstyles such as the side lock, and this and other evidence support the idea that it was an African culture in addition to being geographically in Africa . For these reasons Egypt is seen by people of African descent as part of their cultural heritage and history. […] Egypt was an African country, and their artists depicted the Egyptians as Africans, with black skin and tightly curled hair. ” [Emphases mine] If there remains any doubt about the heritage of&nbsp;ancient Egyptians,&nbsp;the museum declares,&nbsp;“If&nbsp;we look at the skin colour and also facial features on representations of Egyptians, many are what we would consider today to be Black African.” However, even if “we leave colour aside for a moment, we can also find out a great deal from looking at the facial features shown on Egyptian statues. Here, there can be no doubt that we are dealing with people who were African. Faces were broad with high cheekbones and the jaws are typically strong. The noses are also broad and the lips are generally full and fleshy in appearance.” It ma</span></div><div class="q-flex qu-mt--small qu-justifyContent--space-between qu-verticalAlign--middle qu-alignItems--center" data-dcnode-id="2374" style="box-sizing: border-box; display: flex;"><span class="q-inlineBlock" data-dcnode-id="2377" name="EditorLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-right: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="2378"><svg data-dcnode-id="2379" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-fill_as_stroke" d="M16.316 10.241c-.006-.016.017-.042.041-.066l1.103-1.098c1.351-1.363.93-3.652-.816-4.443a2.767 2.767 0 0 0-3.098.545l-3.293 3.282c-.769.784-1 1.733-.662 2.775s1.087 1.658 2.165 1.874c.15.03.304.034.461.051v1.378l-.477-.032A4.07 4.07 0 0 1 9.073 13.1c-.771-.891-1.103-1.932-.994-3.103.093-1.002.513-1.853 1.229-2.563l3.25-3.23c.859-.847 1.906-1.246 3.11-1.199a4.01 4.01 0 0 1 2.678 1.128 4.01 4.01 0 0 1 1.302 3.112 3.996 3.996 0 0 1-1.161 2.77l-1.421 1.418a.256.256 0 0 1-.032.027l-.719-1.217zm-8.784 3.697-.973.969a2.744 2.744 0 0 0-.028 3.881 2.77 2.77 0 0 0 3.909.044l3.31-3.301c.764-.782.987-1.732.651-2.769s-1.083-1.651-2.155-1.871l-.137-.021V9.508c.383.031.511.031.774.111 1.639.502 2.648 1.578 2.973 3.237.274 1.395-.124 2.637-1.123 3.658l-3.311 3.301c-.725.715-1.607 1.101-2.625 1.175-2.082.152-3.982-1.284-4.365-3.323-.264-1.409.106-2.652 1.098-3.695l1.413-1.411c.011-.011.474.813.78 1.204l-.192.174z" data-dcnode-id="2380" fill="#666" fill-rule="evenodd"></path></svg></span></span><div class="q-text qu-dynamicFontSize--small qu-truncateLines--1 qu-wordBreak--break-all qu-color--gray_light qu-passColorToLinks" data-dcnode-id="2375" styl -160374862.jpg&quot;); height: 100%; transition-property: background-image; transition-duration: 180ms; transition-timing-function: ease-in-out; background-position: center center; background-size: cover; background-repeat: no-repeat;"></div><div class="q-absolute qu-fullY qu-borderLeft" data-dcnode-id="2362" style="box-sizing: border-box; position: absolute; right: 0px; border-color: rgba(0, 0, 0, 0.1); z-index: 1;"></div></div><div class="q-box qu-p--medium qu-hover--bg--darken qu-overflow--hidden" data-dcnode-id="2347" style="box-sizing: border-box; width: 100%;" width="100%"><div class="q-flex qu-verticalAlign--middle qu-alignItems--center" data-dcnode-id="2348" style="box-sizing: border-box; display: flex; height: 100%;"><div class="q-box qu-overflow--hidden" data-dcnode-id="2349" style="box-sizing: border-box;"><div class="q-text qu-truncateLines--3 qu-bold qu-color--gray_dark_dim qu-wordBreak--break-word" data-dcnode-id="2359" style="box-sizing: border-box;"><span data-dcnode-id="2360" instrument_node="">Paris, par Isis ?</span></div><div class="q-text qu-dynamicFontSize--small qu-truncateLines--1 qu-color--gray qu-mt--tiny" data-dcnode-id="2357" style="box-sizing: border-box;"><span data-dcnode-id="2358" instrument_node="">Nous allons quitter l’Égypte. Mais comme Charles Aznavour fait durer ses adieux à la scène, nos adieux à l’Égypte, nous allons les savourer, et ils  vont prendre plusieurs formes.</span></div><div class="q-flex qu-mt--small qu-justifyContent--space-between qu-verticalAlign--middle qu-alignItems--center" data-dcnode-id="2350" style="box-sizing: border-box; display: flex;"><span class="q-inlineBlock" data-dcnode-id="2353" name="EditorLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-right: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="2354"><svg data-dcnode-id="235 "font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2342" instrument_node="">Courtesy of Google Translate</span></span></p><span data-dcnode-id="2339" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2332" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2337" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2338" instrument_node="">|…] because Egypt is the source of many civilizations.</span></span><span data-dcnode-id="2335" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2336" instrument_node=""> The Greeks went there to draw their main sources of philosophy, mathematics, health, art of living, </span></span><span data-dcnode-id="2333" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2334" instrument_node="">the Hebrews drew their monotheism, their alphabet there, the Africans preserved customs, rites, elements of language. .. Finally, among the Ethiopians, in the Coptic churches, there is a good chance that during the Coptic mass, which lasts 6 hours at least, we hear the sacred song of the pharaohs, the magic song of the vowels of which Plato spoke.</span></span></p><span data-dcnode-id="2331" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2328" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2329" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2330" instrument_node="">….</span></span></p><span class="q-inline" data-dcnode-id="2321" style="box-sizing: border-box; display: inline;"><a class="q-box qu-wordBreak--break-word qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t .com/How-does-past-colonialism-continue-to-affect-Africa" style="box-sizing: border-box; border-radius: inherit;" target="_blank"><div class="q-click-wrapper qu-display--block qu-tapHighlight--white qu-cursor--pointer qu-hover--textDecoration--underline ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="1721" style="box-sizing: border-box; font: inherit; padding: 0px; color: inherit; text-align: inherit;" tabindex="0"><div class="q-flex qu-flexDirection--row" data-dcnode-id="1722" style="box-sizing: border-box; display: flex;"><div class="q-inline qu-flexWrap--wrap" data-dcnode-id="1723" style="box-sizing: border-box; display: inline; max-width: 100%;"><div class="q-text qu-truncateLines--5 puppeteer_test_question_title" data-dcnode-id="1724" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="1725" style="box-sizing: border-box;"><span data-dcnode-id="1726" style="background: none;"><span data-dcnode-id="1727" instrument_node="">How does past colonialism continue to affect Africa?</span></span></span></div></div></div></div></a></span></span></div></div></div></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--white qu-cursor--pointer ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="1517" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit;" tabindex="0" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="1518" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="1519" style="box-sizing: border-box; position: relative;"><div class="q-absolute qu-full qu-zIndex--base" data-dcnode-id="1713" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="1520" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="1691" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="1692" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="1693" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="1694" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="1695" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1708" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1709" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1712" instrument_node="">When Sékou Touré of Guinea decided in 1958 to get out of french colonial empire, and opted for the country independence, the french colonial elite in Paris got so furious, and in a historic act of fury the french administration in Guinea destroyed everything in the country which represented what they called the benefits from french colonization.</span><br data-dcnode-id="1711"><span data-dcnode-id="1710" instrument_node="">Three thousand French left the country, taking all their property and destroying anything that which could not be moved: schools, nurseries, public administration buildings were crumbled; cars, books, medicine, research institute instruments, tractors </span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="1696" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="1697" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="1698" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="1699" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="1700" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="1705" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="1706" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="1707" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="1701" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="1702"><svg data-dcnode-id="1703" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="1704" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="1521" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="1522" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="1523"><span class="q-box qu-userSelect--text" data-dcnode-id="1524" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1596" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1683" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1690" instrument_node="">When Sékou Touré of Guinea decided in 1958 to get out of french colonial empire, and opted for the country independence, the french colonial elite in Paris got so furious, and in a historic act of fury the french administration in Guinea destroyed everything in the country which represented what they called the benefits from french colonization.</span><br data-dcnode-id="1689"><span data-dcnode-id="1688" instrument_node="">Three thousand French left the country, taking all their property and destroying anything that which could not be moved: schools, nurseries, public administration buildings were crumbled; cars, books, medicine, research institute instruments, tractors were crushed and sabotaged; horses, cows in the farms were killed, and food in warehouses were burned or poisoned.</span><br data-dcnode-id="1687"><span data-dcnode-id="1686" instrument_node="">The purpose of this outrageous act was to send a clear message to all other colonies that the consequences for rejecting France would be very high.</span><br data-dcnode-id="1685"><span data-dcnode-id="1684" instrument_node="">Slowly fear spread trough the african elite, and none after the Guinea events ever found the courage to follow the example of Sékou Touré, whose slogan was </span></span><span data-dcnode-id="1681" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1682" instrument_node="">“We prefer freedom in poverty to opulence in slavery.”</span></span><span data-dcnode-id="1677" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1680" instrument_node=""></span><br data-dcnode-id="1679"><span data-dcnode-id="1678" instrument_node=""></span></span><span class="q-inline" data-dcnode-id="1670" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Sylvanus_Olympio" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="1676" instrument_node="">Sylvanus Olympio</span></a><span class="q-inlineBlock" data-dcnode-id="1671" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1672"><svg data-dcnode-id="1673" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1674" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="1666" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1669" instrument_node="">, the first president of the Republic of Togo, a tiny country in west Africa, found a middle ground solution with the French.</span><br data-dcnode-id="1668"><span data-dcnode-id="1667" instrument_node="">He didn’t want his country to continue to be a french dominion, therefore he refused to sign the colonisation continuation pact </span></span><span class="q-inline" data-dcnode-id="1659" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Charles_de_Gaulle" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="1665" instrument_node="">De Gaule</span></a><span class="q-inlineBlock" data-dcnode-id="1660" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1661"><svg data-dcnode-id="1662" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1663" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="1655" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1658" instrument_node=""> proposed, but agree to pay an annual debt to France for the so called benefits Togo got from french colonization.</span><br data-dcnode-id="1657"><span data-dcnode-id="1656" instrument_node=""></span></span><span data-dcnode-id="1653" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1654" instrument_node="">It was the only conditions for the French not to destroy the country before leaving.</span></span><span data-dcnode-id="1647" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1652" instrument_node=""> However, the amount estimated by France was so big that the reimbursement of the so called “colonial debt” was close to 40% of the country budget in 1963.</span><br data-dcnode-id="1651"><span data-dcnode-id="1650" instrument_node="">The financial situation of the newly independent Togo was very unstable, so in order to get out the situation, Olympio decided to get out the french colonial money FCFA (the franc for french african colonies), and issue the country own currency.</span><br data-dcnode-id="1649"><span data-dcnode-id="1648" instrument_node="">On January 13, 1963, three days after he started printing his country own currency, a squad of illiterate soldiers backed by France killed the first elected president of newly independent Africa. Olympio was killed by an ex French Foreign Legionnaire army sergeant called </span></span><span class="q-inline" data-dcnode-id="1640" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.telegraph.co.uk/news/obituaries/1483018/Gnassingbe-Eyadema.html" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.telegraph.co.uk"><span data-dcnode-id="1646" instrument_node="">Etienne Gnassingbe</span></a><span class="q-inlineBlock" data-dcnode-id="1641" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1642"><svg data-dcnode-id="1643" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1644" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="1634" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1639" instrument_node=""> who supposedly received a bounty of $612 from the local French embassy for the hit man job.</span><br data-dcnode-id="1638"><span data-dcnode-id="1637" instrument_node="">Olympio’s dream was to build an independent and self-sufficient and self-reliant country. But the French didn’t like the idea.</span><br data-dcnode-id="1636"><span data-dcnode-id="1635" instrument_node="">On June 30, 1962, </span></span><span class="q-inline" data-dcnode-id="1627" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Modibo_Ke%25C3%25AFta" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="1633" instrument_node="">Modiba Keita</span></a><span class="q-inlineBlock" data-dcnode-id="1628" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1629"><svg data-dcnode-id="1630" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1631" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="1623" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1626" instrument_node=""> , the first president of the Republic of Mali, decided to withdraw from the  french colonial currency FCFA which was imposed on 12 newly independent African countries. For the Malian president, who was leaning more to a socialist economy, it was clear that colonisation continuation pact with France was a trap, a burden for the country development.</span><br data-dcnode-id="1625"><span data-dcnode-id="1624" instrument_node="">On November 19, 1968, like, Olympio, Keita will be the victim of a coup carried out by another ex French Foreign legionnaire, the Lieutenant </span></span><span class="q-inline" data-dcnode-id="1616" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Moussa_Traor%25C3%25A9" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="1622" instrument_node="">Moussa Traoré</span></a><span class="q-inlineBlock" data-dcnode-id="1617" name="ExternalLink" style="box-sizing: border-box; display: inline t-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1175" instrument_node=""> worth 333 billion, more than seven times the value of the aid that went in the opposite direction</span></span></p><span data-dcnode-id="1172" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1169" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1170" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1171" instrument_node="">………</span></span></p><span data-dcnode-id="1168" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1163" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1166" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1167" instrument_node="">That looting machine has been modernized.</span></span><span data-dcnode-id="1164" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1165" instrument_node=""> Where once treaties signed at gunpoint dispossessed Africa’s inhabitants of their land, gold, and diamonds, today phalanxes of lawyers representing oil and mineral companies with annual revenues in the hundreds of billions of dollars impose miserly terms on African governments and employ tax dodges to bleed profit from destitute nations. In the place of the old empires are hidden networks of multinationals, middlemen, and African potentates. These networks fuse state and corporate power. They are aligned to no nation and belong instead to the transnational elites that have flourished in the era of globalization. Above all, they serve their own enrichment</span></span></p><span class="q-inline" data-dcnode-id="1156" style="box-sizing: border-box; display: inline;"><a class="q-box qu-wordBreak--break-word qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//topdocumentaryfilms.com/stealing-africa/" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit;" target="_blank" title="topdocumentaryfilms.com"><span data-dcnode-id="1162" instrument_node="">https://topdocumentaryfilms.com/stealing-africa/</span></a><span class="q-inlineBlock" data-dcnode-id="1157" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1158"><svg data-dcnode-id="1159" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1160" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1153" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1154" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1155" instrument_node="">Tax avoidance by corporations costs poor countries and estimated $160 billion a year, almost double what they receive in international aid. That's enough to save the lives of 350,000 children aged five or under every year.</span></span></p><span data-dcnode-id="1152" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1147" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1150" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1151" instrument_node="">For every $1 given in aid to a poor country, $10 drains out</span></span><span data-dcnode-id="1148" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1149" instrument_node="">. Vital money that could help a poor country pay for healthcare, schools, pensions and infrastructure. Money that would make them less reliant on aid</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1080" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1081" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="1082" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="1096" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="1118" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="1119" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="1129" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="1130" style="box-sizing: border-box; position: relative;"><button aria-label="Upvote" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu  enterprise. On the other hand, when this Literature is written by Africans, it sets out to respond to the colonial master. Its tries as much to show the colonialists that the African too can write. This is why some critics consider this literature as borrowing slavishly from Western models. Furthermore, this literature written by Africans projects the African worldview, culture and identity in the face of a European self imposed authenticity and superiority.</span></span></p><span data-dcnode-id="978" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="975" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="976" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="977" instrument_node="">Some works you might want to consider include:</span></span></p><ol class="q-box" data-dcnode-id="962" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: decimal; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="972" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="973" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="974" instrument_node="">Heart of Darkness by Joseph Conrad</span></span></li><li class="q-relative" data-dcnode-id="969" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="970" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="971" instrument_node="">Master Harold and the Boys by Athol Fugard</span></span></li><li class="q-relative" data-dcnode-id="966" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="967" style="font-weight: normal; font-style: normal; background:
