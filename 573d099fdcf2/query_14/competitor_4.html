</span><p class="just" data-dcnode-id="1316"><i data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">Bainbridge</span></i><span data-dcnode-id="1338" instrument_node="">, and </span><i data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">Leahy </span></i><span data-dcnode-id="1335" instrument_node="">Classes were redesignated as guided missile cruisers (CG/CGN). The </span><i data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">Coontz</span></i><span data-dcnode-id="1332" instrument_node=""> Class was redesignated as Guided Missile Destroyers (DDG).  The ocean escorts (DE), consisting of the </span><i data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">Perry</span></i><span data-dcnode-id="1329" instrument_node="">, </span><i data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">Brooke</span></i><span data-dcnode-id="1326" instrument_node="">, </span><i data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Knox</span></i><span data-dcnode-id="1323" instrument_node="">, </span><i data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">Garcia</span></i><span data-dcnode-id="1320" instrument_node="">, and </span><i data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">Bronstein</span></i><span data-dcnode-id="1317" instrument_node=""> Classes, were redesignated as frigates (FF). </span></p><span data-dcnode-id="1315" instrument_node="">
</span><p class="just" data-dcnode-id="1311" id="LinkTarget_8949"><strong data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">7.1.10 Major In-Service Upgrades</span></strong><span data-dcnode-id="1312" instrument_node=""> </span></p><span data-dcnode-id="1310" instrument_node="">
</span><p class="just" data-dcnode-id="1302"><span data-dcnode-id="1309" instrument_node="">During the late 1970's and through the 1980's several modifications were made to the former DLG/DLGNs to upgrade their ability to meet changing threats and add new capabilities.  This illustrates the necessity for a cruiser design to have flexibility to evolve during its service life. The Soviet Navy had developed the SS-N-2 Styx missile late in the 1950's and deployed it aboard a small missile patrol boat of the Komar class in 1961.  With a 1,000kilogram shaped charge and a speed of Mach 0.9, the Soviets believed that two of these missiles could sink a destroyer.  An important development in warship design came during the Six-Day War in 1967 with the sinking of the Israeli destroyer Eilat by three Egyptian Styx missiles, the first warship to be destroyed in this manner.  This event had a great impact on the U.S. Navy as it illustrated the vulnerability of large surface ships to a relatively cheap weapon.  This lesson was reinforced by the British experience in 1982 in the Falklands against the Exocet missile. As a counter to the cruise missile threat, the existing cruisers were fitted with several systems to provide a point defense capability.  One was the Phalanx Close-InWeapons-System (CIWS) which provided a hardkill capability and was a modern day counterpart of the 20mm and 40mm guns used in WWII.  Electronic warfare systems were also upgraded with the installation of SRBOC chaff launchers and the SLQ-32(V)3 system with active jamming capability. Some classes also received selective armoring against fragmentation threats to avoid a "cheap kill" as happened to the </span><i data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">USS Worden </span></i><span data-dcnode-id="1306" instrument_node="">(DLG 18) off Vietnam (ironically from an accidentally fired US Shrike missile)</span><sup data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">lix</span></sup><span data-dcnode-id="1303" instrument_node="">. All the cruisers were provided with dual quad launchers for the Harpoon cruise missile, giving them a capability against surface targets beyond gun range.  These were normally installed in place of the existing 3-inch guns.  In addition, several of the CG 26 class and the CGN's had a signal exploitation capability added with the Classic Outboard system. </span></p><span data-dcnode-id="1301" instrument_node="">
</span><img alt="cruiser" data-dcnode-id="1300" height="432" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.navalmarinearchive.com/research/cruisers/cr_ims/cr_img_24.jpg&amp;raw" width="608"><span data-dcnode-id="1299" instrument_node="">
</span><p class="just" data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">Finally, the New Threat Upgrade (NTU) program provided additional capability beyond the original Terrier and Tarter missile fire control systems in two ways.  Targets could be engaged at longer range due to the use of the autopilot in the SM-2 missile which could be updated during flight via a data link (similar to Aegis) and fly a more energy efficient interception path.  Also, with NTU (similar to Aegis) the illuminators were only required for the terminal phase of missile flight (instead of during the entire flight time), allowing a greater number of targets to be engaged simultaneously.   </span></p><span data-dcnode-id="1296" instrument_node="">
</span><h3 data-dcnode-id="1294" id="LinkTarget_8960"><span data-dcnode-id="1295" instrument_node="">7.2 Aviation Capability Evolution</span></h3><span data-dcnode-id="1293" instrument_node="">
</span><p class="just" data-dcnode-id="1289"><strong data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">7.2.1 	DASH to LAMPS</span></strong><span data-dcnode-id="1290" instrument_node=""> </span></p><span data-dcnode-id="1288" instrument_node="">
</span><p class="just" data-dcnode-id="1280"><span data-dcnode-id="1287" instrument_node="">The Drone Anti-Submarine Helicopter or DASH was developed starting in the late 1950's to deliver an anti-submarine torpedo or a nuclear depth charge out to a range that matched the expected ranges from the new sonars being developed and which was further than ASROC was capable of.  Although primarily assigned to smaller ships, the DLG 26 class was also intended to operate DASH.  DASH had a poor reputation in service and suffered a high crash rate.  In retrospect, some of the reasons seem to be lack of redundancy in the control systems (intended to reduce cost), rapid turnover in maintenance and operations personnel and being a system operated by the surface community but depending on support from the aviation community.  Before being retired in 1970 however, some of the drones were modified to carry a television camera and a telemetry system.  These "Snoopy" drones were used to spot naval gunfire in Vietnam and were an early version of today's VTUAV's.</span><sup data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">lx </span></sup><span data-dcnode-id="1284" instrument_node="">DASH was replaced in the early 1970's by the SH-2 </span><i data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">Seasprite </span></i><span data-dcnode-id="1281" instrument_node="">LAMPS I manned helicopter which were converted from existing airframes.  LAMPS provided additional capabilities and could accomplish additional missions beyond DASH.  These capabilities were extended further with the purpose built and larger SH-60 LAMPS III which became part of the CG 47 outfit. </span></p><span data-dcnode-id="1279" instrument_node="">
</span><p class="just" data-dcnode-id="1275"><strong data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">7.2.2 	NATO Aviation Capable Cruisers</span></strong><span data-dcnode-id="1276" instrument_node=""> </span></p><span data-dcnode-id="1274" instrument_node="">
</span><p class="just" data-dcnode-id="1258"><span data-dcnode-id="1273" instrument_node="">Starting in the late 1950's, three NATO navies built or converted cruisers with a large flight deck aft capable of operating a large number of helicopters, usually in the anti-submarine role.  An alternate role for some of them was as a commando carrier with marines embarked. The first built was the </span><i data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">Jeanne D"Arc</span></i><span data-dcnode-id="1270" instrument_node=""> by France which was also used in peacetime as a training ship for naval cadets.</span><sup data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">lxi </span></sup><span data-dcnode-id="1267" instrument_node="">The Italian Navy built three of this type in two different classes, two of the </span><i data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">Andrea Doria </span></i><span data-dcnode-id="1264" instrument_node="">class and an improved version, the </span><i data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">Vittorio Veneto</span></i><span data-dcnode-id="1261" instrument_node="">. These ships included a Terrier missile system forward, giving them an AAW capability as well.</span><sup data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">lxii </span></sup></p><span data-dcnode-id="1257" instrument_node="">
</span><p class="just" data-dcnode-id="1247"><span data-dcnode-id="1256" instrument_node="">In the late 1960's, the Royal Navy converted two of the previously discussed (see 6.6) </span><i data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">Tiger</span></i><span data-dcnode-id="1253" instrument_node=""> class into command helicopter cruisers by removing the aft six-inch mount and replacing it with a flight deck and hangar capable of carrying four </span><i data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">Sea King </span></i><span data-dcnode-id="1250" instrument_node="">helicopters.  They also had extensive command and control facilities and acted as the flagships for ASW task forces.  They could also carry Royal Marines and act as a commando carrier.</span><sup data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">lxiii </span></sup></p><span data-dcnode-id="1246" instrument_node="">
</span><p class="just" data-dcnode-id="1233"><span data-dcnode-id="1245" instrument_node="">As a replacement for the </span><i data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">Tiger</span></i><span data-dcnode-id="1242" instrument_node="">'s, the Royal Navy developed the </span><i data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">Invincible</span></i><span data-dcnode-id="1239" instrument_node=""> class of "Through-Deck" Cruisers. These are now classified as light or anti-submarine carriers and many believe that calling them a cruiser was a subterfuge because the British government had cancelled an earlier carrier program.  However, they were originally fitted with the Sea Dart AAW missile system which compromised the flight deck somewhat (since removed) and the decision to order the </span><i data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Sea Harrier</span></i><span data-dcnode-id="1236" instrument_node=""> fighter was not made until 1975, two years after the first ship was ordered, providing some evidence that they were really intended for the NATO ASW mission.</span><sup data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">lxiv </span></sup></p><span data-dcnode-id="1232" instrument_node="">
</span><img alt="cruiser" data-dcnode-id="1231" height="411" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.navalmarinearchive.com/research/cruisers/cr_ims/cr_img_25.jpg&amp;raw" width="576"><span data-dcnode-id="1230" instrument_node="">
</span><p align="center" data-dcnode-id="1226" id="LinkTarget_8975"><span data-dcnode-id="1229" instrument_node="">Figure 23 </span><i data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">HMS Invincible. </span></i></p><span data-dcnode-id="1225" instrument_node="">
</span><h3 data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">7.3 	Soviet Union Developments</span></h3><span data-dcnode-id="1222" instrument_node="">
</span><p class="just" data-dcnode-id="1218"><strong data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">7.3.1 	Pre-1960 Developments</span></strong><span data-dcnode-id="1219" instrument_node=""> </span></p><span data-dcnode-id="1217" instrument_node="">
</span><p class="just" data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">While Soviet Russia inherited a number of ships from the Imperial Russian Navy, it was for most of its existence radically different in function from a conventional navy.  More like France or post-WWI Germany, the Soviet Union pursued a sea denial rather than a sea control strategy.  The Soviet Navy's main function was to defend the Russian homeland by stopping enemy warships before they could get close enough to carry out any aggressive intention.  This mission was variously interpreted over the time span of Soviet history, but remained fairly consistent in principle.</span></p><span data-dcnode-id="1214" instrument_node="">
</span><p class="just" data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">During Stalin's rule,  Soviet naval activity was oriented towards creating a large conventional fleet, with cruisers, destroyers, and a small number of battle cruisers and aircraft carriers (the latter never completed).  Submarines were an important element of this force, but not the predominant one, and all types were intended for sea denial functions even though their design was not necessarily different from foreign "equivalents" with different functions.</span></p><span data-dcnode-id="1211" instrument_node="">
</span><p class="just" data-dcnode-id="1200"><span data-dcnode-id="1210" instrument_node="">In the 1950s the Russian Navy had in service fourteen </span><i data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">Sverdlov</span></i><span data-dcnode-id="1207" instrument_node=""> class light cruisers (17,000 tons full load, twelve 6 inch guns) from Stalin's cancelled big ship building program.  USN analysis of those ships tracked their technical ancestry back to a 1930s collaboration between the Italians and the Russians on the </span><i data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">Kirov</span></i><span data-dcnode-id="1204" instrument_node=""> class (not to be confused with the later </span><i data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">Kirov</span></i><span data-dcnode-id="1201" instrument_node=""> discussed in 7.3.3.)  The Italian influence resulted in ships that were fast and heavily armed with some sacrifices in ruggedness and range. However, they remained a threat-in-being for convoy raiding and even bad weather attacks against USN carrier battle groups (quite possible in long winter North Atlantic nights) which kept USN gun cruisers in the inventory as a counter.  Late in their careers, they took on a super-AGI role following US carrier groups in peacetime since, unlike the trawler hull intelligence ships, they could not be run away from (either by speed directly or running them out of fuel).</span></p><span data-dcnode-id="1199" instrument_node="">
</span><p class="just" data-dcnode-id="1192" id="LinkTarget_8982"><span data-dcnode-id="1198" instrument_node="">Stalin died in 1953 and with him died the fleet he envisioned.  Under Nikita Khruschev, his successor, who is famous for saying that cruisers were only useful for carrying political leaders on state visits, most of Stalin's program was cancelled (although completed </span><i data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">Sverdlovs</span></i><span data-dcnode-id="1195" instrument_node=""> were kept in service), and the challenge to the Soviet navy was to develop new, less expensive weapons to counter the U.S. Fleet, particularly the aircraft carriers which had a strategic strike role.</span><sup data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">lxv </span></sup></p><span data-dcnode-id="1191" instrument_node="">
</span><p class="just" data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">The Soviet navy met this challenge by developing two different anti-ship cruise missiles (the SS-N-2 Styx and the larger SS-N-3 Shaddock [originally a land attack weapon similar to the US Regulus]) and a fleet dominated by submarines, small combatants and patrol craft to carry them.  As discussed previously, defeating the cruise missile threat later drove modifications to the U.S. cruiser fleet as well as development of the Aegis system. </span></p><span data-dcnode-id="1188" instrument_node="">
</span><p class="just" data-dcnode-id="1180"><span data-dcnode-id="1187" instrument_node="">Starting in 1959 and continuing until 1965 the Soviets built four RKR's (</span><i data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">raketnyy kreyser</span></i><span data-dcnode-id="1184" instrument_node=""> or rocket cruiser) of the </span><i data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Kynda</span></i><span data-dcnode-id="1181" instrument_node=""> class of 5,500 tons, armed with the large SS-N-3 Shaddock as well as a SAM system and 76.2mm guns.  At the time, the U.S. Navy classified these and subsequent similar ships as DLG's until the U.S. dropped that designation in 1975 at which time they were labeled guided missile cruisers. </span></p><span data-dcnode-id="1179" instrument_node="">
</span><p class="just" data-dcnode-id="1175"><strong data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">7.3.2 	1960's &amp; early 70's Developments</span></strong><span data-dcnode-id="1176" instrument_node=""> </span></p><span data-dcnode-id="1174" instrument_node="">
</span><p class="just" data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">The Soviet Union accelerated their naval construction during the 1960's while U.S. programs were reduced due to the financial constraints of the Vietnam War. By 1970 the Soviet Navy was a modern force with only 1% of its vessels older than 20 years. The U.S. Navy, in the meantime, had a naval force with 58% of its vessels older than 20 years. </span></p><span data-dcnode-id="1171" instrument_node="">
</span><p class="just" data-dcnode-id="1157"><span data-dcnode-id="1170" instrument_node="">Starting in the mid-1960's the </span><i data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">Kynda</span></i><span data-dcnode-id="1167" instrument_node=""> class was followed by four larger </span><i data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Kresta I </span></i><span data-dcnode-id="1164" instrument_node="">class RKR's which had a displacement around 7,500 tons and again carried SS-N-3 Shaddock missiles as well as SAM's but now supported by an organic targeting helicopter. The </span><i data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">Kresta I</span></i><span data-dcnode-id="1161" instrument_node="">s had two twin launchers that were armed with the SS-N-3 surface-to-surface missiles with no reloads compared to eight launch tubes plus eight reloads on the preceding </span><i data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">Kyndas</span></i><span data-dcnode-id="1158" instrument_node=""> . </span></p><span data-dcnode-id="1156" instrument_node="">
</span><p class="just" data-dcnode-id="1151"><span data-dcnode-id="1155" instrument_node="">At this point in time, the emphasis in Soviet cruiser design shifted to antisubmarine warfare (the anti-carrier role was shifted to cruise missile armed aircraft and submarines</span><sup data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">lxvi</span></sup><span data-dcnode-id="1152" instrument_node="">) due to the U.S. Navy's threat to the Soviet homeland shifting from carrier aviation to the submarine launched Polaris missile.  Later on, as the Soviets developed their own missile submarines, protecting them from U.S. and British attack submarines also became a mission.   </span></p><span data-dcnode-id="1150" instrument_node="">
</span><p class="just" data-dcnode-id="1124"><span data-dcnode-id="1149" instrument_node="">Reflecting this change in mission, the </span><i data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Kresta II</span></i><span data-dcnode-id="1146" instrument_node="">s were introduced starting in 1970. A slightly larger version of </span><i data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Kresta I</span></i><span data-dcnode-id="1143" instrument_node="">, these vessels carried two quadruple launchers that were armed with the SS-N-14 anti-submarine missiles (originally  thought to be a new type of anti-ship missile though</span><sup data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">lxvii</span></sup><span data-dcnode-id="1140" instrument_node="">) and a powerful antiaircraft battery of Surface to Air Missiles (SAM).  Reflecting the change in mission the Soviets designated these ships as BPK's (</span><i data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">Bol'shoy Protivolodochnyy Korabl" </span></i><span data-dcnode-id="1137" instrument_node="">(Large Antisubmarine Ships).  Ten of the </span><i data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">Kresta II</span></i><span data-dcnode-id="1134" instrument_node=""> ships were built.</span><sup data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">lxviii</span></sup><span data-dcnode-id="1131" instrument_node="">  These ships carry the Kamov Ka-25 helicopter that was designed for anti-submarine work, but could also be used for mid-course guidance for anti-ship missiles.  The SAN-1 Goa SAMs in the </span><i data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Kresta I</span></i><span data-dcnode-id="1128" instrument_node=""> cruisers were replaced with the improved long-range SAN-3 Goblet SAMs in the </span><i data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Kresta II</span></i><span data-dcnode-id="1125" instrument_node=""> cruisers.  </span></p><span data-dcnode-id="1123" instrument_node="">
</span><p class="just" data-dcnode-id="1103"><span data-dcnode-id="1122" instrument_node="">Moving into the 1970's, construction of the seven </span><i data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">Kara</span></i><span data-dcnode-id="1119" instrument_node=""> Class BPK's overlapped with the </span><i data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">Kresta II</span></i><span data-dcnode-id="1116" instrument_node="">. They were almost the size of the </span><i data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">Spruance</span></i><span data-dcnode-id="1113" instrument_node="">-class destroyers and had an armament similar to the </span><i data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Kresta II</span></i><span data-dcnode-id="1110" instrument_node=""> cruisers. The </span><i data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Kara</span></i><span data-dcnode-id="1107" instrument_node=""> cruisers were powered by gas turbines vice the steam plant of the earlier classes.  The extra displacement was used to mount two retractable SAN-4 SAM twin launchers, and the gun armament was increased from 57-mm in the </span><i data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Kresta</span></i><span data-dcnode-id="1104" instrument_node="">s to 76 mm. </span></p><span data-dcnode-id="1102" instrument_node="">
</span><p class="just" data-dcnode-id="1094"><span data-dcnode-id="1101" instrument_node="">Although these Soviet cruisers were more heavily armed than their American counterparts, the American cruisers of the </span><i data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Leahy</span></i><span data-dcnode-id="1098" instrument_node=""> and </span><i data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Belknap </span></i><span data-dcnode-id="1095" instrument_node="">classes had a greater endurance and sustainability.  The American cruisers were intended to be antisubmarine and antiaircraft escorts, whereas the Soviet cruisers were intended to protect against the more sophisticated American submarines and aircraft, but still be capable of mounting a long-range anti-ship attack.  As a result they may not have been able to function in battle as well as the less cramped American vessels. </span></p><span data-dcnode-id="1093" instrument_node="">
</span><p class="just" data-dcnode-id="1080"><span data-dcnode-id="1092" instrument_node="">The Soviets also introduced hybrid cruisers with a significant aviation capability with the introduction of the </span><i data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Moskva</span></i><span data-dcnode-id="1089" instrument_node=""> (1967) and the </span><i data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">Kiev</span></i><span data-dcnode-id="1086" instrument_node=""> (four ships, commissioned starting in 1975).  Although usually classified in Western literature as carriers, both of these classes were called cruisers by the Soviets and carried a significant missile armament and both hull and variable depth sonars.  The </span><i data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Moskva</span></i><span data-dcnode-id="1083" instrument_node="">-class helicopter carriers were designed to counter the threat of the NATO nuclear-powered submarines armed with ballistic missiles and were based in the Black Sea with periodic operations primarily in the Mediterranean.  They were not intended to be deployed alone and, therefore, were not armed with surface-to-surface missiles (SSM). They were designed to carry 14 Kamov Ka-25 Hormone anti-submarine helicopters.  Probably due to the increasing range of the submarine ballistic missiles which moved the operating areas of the submarines carrying them further away from the Soviet Union's home waters, this class was terminated after only two units.</span><sup data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">lxix</span></sup></p><span data-dcnode-id="1079" instrument_node="">
</span><p class="just" data-dcnode-id="1069"><span data-dcnode-id="1078" instrument_node=""> The </span><i data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Kiev</span></i><span data-dcnode-id="1075" instrument_node="">-class was significantly larger (43,000 tons) and designed to handle the first Soviet V/STOL aircraft as well as helicopters.  She was also a very heavily armed ship with eight SSM launchers on her forecastle and missiles of other kinds along her flight deck.  New radars were carried and she was equipped with a bow sonar that is different from US aircraft-carrier practice.  The </span><i data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">Kiev</span></i><span data-dcnode-id="1072" instrument_node=""> allows the projection of Soviet air power at sea and a marked departure from Soviet strategy in the mid-1960s.  Soviet tactics up to 1980, however, were still oriented towards ASW and supporting their own submarines by keeping Western surface forces away from them.  "Power projection" ideas were confined to 'showing the flag" to influence Third World nations to lean more towards the Communist bloc.</span><sup data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">lxx </span></sup></p><span data-dcnode-id="1068" instrument_node="">
</span><h3 data-dcnode-id="1066" id="LinkTarget_9000"><span data-dcnode-id="1067" instrument_node="">7.3.3 Final Soviet Cruiser Developments</span></h3><span data-dcnode-id="1065" instrument_node="">
</span><p class="just" data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">The 1980's saw two final classes of Soviet cruisers introduced before the Cold War ended and the breakup of the Soviet Union. </span></p><span data-dcnode-id="1062" instrument_node="">
</span><p class="just" data-dcnode-id="1054"><span data-dcnode-id="1061" instrument_node="">The emergence of the</span><i data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node=""> Kirov</span></i><span data-dcnode-id="1058" instrument_node=""> class missile cruisers in 1980 marked a significant addition to the Russian Navy.  The four ships of the class are the world's largest surface combatants built since WWII except for aircraft carriers and have been referred to as "battle cruisers."  The design has capabilities to search for and than engage NATO ballistic missile submarines.  </span><i data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">Kirov's</span></i><span data-dcnode-id="1055" instrument_node=""> mission also includes engaging large surface ships (U.S. carriers) and providing air and antisubmarine protection to naval forces with the introduction of the Granit (SS-N-19) anti-ship missile system.  The ships of the class are not identical.  </span></p><span data-dcnode-id="1053" instrument_node="">
</span><p class="just" data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">These ships are heavily armed with multiple types of surface to surface, surface to air and anti-submarine weapons.  They also carry three helicopters as opposed to only one in earlier Soviet cruisers. </span></p><span data-dcnode-id="1050" instrument_node="">
</span><p class="just" data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">This was the first Russian surface warship with nuclear power.  The ship's propulsion system is based on a combination of nuclear power and steam turbine, with two nuclear reactors and two auxiliary boilers.  The oil-fired boiler system was provided to provide a superheat capability that boosted the normal steam output by 50 percent.  However, according to some sources the two steam systems are separate and work on separate turbines.  The propulsion system provides a maximum speed of 31 knots.  When only operating on the auxiliary boilers, the ship's maximum speed is 14 knots with an endurance of 60 days. </span></p><span data-dcnode-id="1047" instrument_node="">
</span><p class="just" data-dcnode-id="1036"><span data-dcnode-id="1046" instrument_node="">The final class introduced was the </span><i data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Slava</span></i><span data-dcnode-id="1043" instrument_node=""> (now </span><i data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Moskva</span></i><span data-dcnode-id="1040" instrument_node="">).  This class, larger than the earlier </span><i data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">Kara</span></i><span data-dcnode-id="1037" instrument_node=""> class, was primarily intended for the anti-ship role with a load out of sixteen SS-N-12 (an improved version of the earlier Shaddock) missiles although it also has AAW and ASW capabilities.  Construction of this class coincided with the end of the Cold War and only a handful of the originally intended number were completed. </span></p><span data-dcnode-id="1035" instrument_node="">
</span><h3 data-dcnode-id="1033" id="LinkTarget_9014"><span data-dcnode-id="1034" instrument_node="">8. CRUISER DEVELOPMENT: AEGIS ERA AND BEYOND</span></h3><span data-dcnode-id="1032" instrument_node="">
</span><h3 data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">8.1 The Aegis Era</span></h3><span data-dcnode-id="1029" instrument_node="">
</span><p class="just" data-dcnode-id="1012"><span data-dcnode-id="1028" instrument_node="">The Aegis Era began in earnest on April 25</span><sup data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">th</span></sup><span data-dcnode-id="1025" instrument_node="">, 1981 with the launch of CG 47, the USS </span><i data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Ticonderoga</span></i><span data-dcnode-id="1022" instrument_node="">.  To be sure, the </span><i data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Ticonderoga </span></i><span data-dcnode-id="1019" instrument_node="">was not the first ship fitted with the Aegis system.  That distinction belongs to the USS </span><i data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">Norton Sound</span></i><span data-dcnode-id="1016" instrument_node="">, a WWII era seaplane tender converted to a guided missile test ship.  The </span><i data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Norton Sound</span></i><span data-dcnode-id="1013" instrument_node=""> was fitted with the Aegis system in 1974, and was also the first ship to fire a ship launched VLS missile. </span></p><span data-dcnode-id="1011" instrument_node="">
</span><img alt="cruiser" data-dcnode-id="1010" height="276" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.navalmarinearchive.com/research/cruisers/cr_ims/cr_img_26.jpg&amp;raw" width="419"><span data-dcnode-id="1009" instrument_node="">
</span><p class="just" data-dcnode-id="998"><span data-dcnode-id="1008" instrument_node="">The roots of the CG 47 class can be traced back to a paper written by Mr. R. Murray in 1965, who was then Assistant Secretary of Defense.  Mr. Murray contended that to control or reduce the costs of naval ship construction, modern manufacturing processes would have to be employed.  This led to the introduction of the DX/DXG Project, formally proposed by the Secretary of Defense, Mr. Robert McNamara, in the fall of 1966. Mr. McNamara initiated the Major Fleet Escort Study to determine what new family of destroyer types would be necessary for the Navy of the future.</span><sup data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">lxxii</span></sup><span data-dcnode-id="1005" instrument_node="">  The DX/DXG Program began to mature and take shape, eventually resulting in the design and construction of the DD 963 </span><i data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Spruance </span></i><span data-dcnode-id="1002" instrument_node="">Class destroyers. The DD 963 Class is pertinent to the current discussion because they were designed with the intention of following them with a new guided missile-equipped fleet escort (DDG or DLG) class, based on the DD 963 design (the U.S. Navy never ordered the DDG but ended up with four ships (the DDG 993 </span><i data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Kidd</span></i><span data-dcnode-id="999" instrument_node=""> class) originally ordered by the Shah of Iran). </span></p><span data-dcnode-id="997" instrument_node="">
</span><p class="just" data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">The objective was to save cost by retaining the same hull, hull arrangements, and machinery plant as the DD 963 in the new design.  The notion that 60 identical hulls with 40 of them equipped as austere ASW escorts and 20 as AAW escorts (the intended split in 1966) would cost less than two classes of 40 DD's and 20 DDG's was based on a primitive understanding of mass production.  It is likely that the savings by series production in 60 units was minuscule; true mass production requires far greater volumes, in the tens of thousands of units, to be effective.  Also, there were hidden costs in the commonality of the two designs. To leave adequate room for future upgrades and the AAW variant, the DD 963 Class was designed with larger  than normal space and weight margins.  While this left room for the as-yet-unnamed DDG or DLG metamorphosis, it resulted in a destroyer with overall dimensions much larger than needed for the light armament carried by most of the hulls. These margins later allowed major upgrades to the in-service DD 963 ships as well as development of the CG 47. </span></p><span data-dcnode-id="994" instrument_node="">
</span><p class="just" data-dcnode-id="981"><span data-dcnode-id="993" instrument_node="">As the first of the </span><i data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Spruance</span></i><span data-dcnode-id="990" instrument_node=""> Class hulls was being laid down, the Navy began to focus its attention on a new, powerful cruiser design designated as the CGSN Strike Cruiser, a completely new breed of American fighting ship.  The CSGN was first studied in the 1973-74 timeframe, with commissioning planned to be in 1984.  Although evolved from the earlier </span><i data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">California </span></i><span data-dcnode-id="987" instrument_node="">and </span><i data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Virginia </span></i><span data-dcnode-id="984" instrument_node="">Class cruisers originally designed as DLGN's and intended as screening ships for nuclear propelled aircraft carriers in high threat areas, it could also undertake independent operations.</span><sup data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">lxxiii </span></sup></p><span data-dcnode-id="980" instrument_node="">
</span><p class="just" data-dcnode-id="975"><span data-dcnode-id="979" instrument_node="">The CGSN was to be the first ship to carry the new Aegis advanced fleet defense system.  The classification of "Strike Cruiser" was developed to indicate the offensive capability of these ships.  The CSGN was envisaged to carry SM-2 surface to air missiles, Harpoon anti-ship missiles, and Tomahawk cruise missiles, as well as an advanced ASW suite.  A larger air capable version with an angled flight deck to support VSTOL aircraft and helicopters was also studied.</span><sup data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">lxxiv</span></sup><span data-dcnode-id="976" instrument_node=""> The downfall of the CGSN is attributable to the high price tag that came along with the offered capability. Specifically the use of nuclear propulsion, mandated by Congress in 1975 for use in all new strike force designs, drove costs outside of a range palatable by Congress.   </span></p><span data-dcnode-id="974" instrument_node="">
</span><p class="just" data-dcnode-id="964"><span data-dcnode-id="973" instrument_node="">With the cancellation of the CSGN, the Navy proposed the CGN 42, an improved </span><i data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Virginia</span></i><span data-dcnode-id="970" instrument_node=""> class with a new superstructure designed for the Aegis system and with a displacement of about 12,000 tons.</span><sup data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">lxxv</span></sup><span data-dcnode-id="967" instrument_node="">  Compared to the CSGN this design was not as survivable and had reduced command and control facilities for an embarked commander. Ultimately this design was also cancelled during the Carter Administration due to its increased cost compared to the non-nuclear DDG 47 (which became the CG 47) as well as the administration's plan to stop building nuclear carriers (overridden by Congress in FY80 and reversed by the Reagan Administration) which undermined the case for nuclear escorts.</span><sup data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">lxxvi </span></sup></p><span data-dcnode-id="963" instrument_node="">
</span><p class="just" data-dcnode-id="950"><span data-dcnode-id="962" instrument_node="">Starting in the early 1970's and in parallel with the Aegis nuclear cruiser design studies, a less expensive destroyer version was also studied.  This was in line with the philosophy of buying a "high-low" mix of ships and aircraft to achieve required force levels (the FFG 7, F-16 and F-18 also came out of this philosophy).  The CNO, Admiral Zumwalt, imposed a displacement limit of 5,000 tons as well as a cost constraint.  These limits turned out to be too constraining and ultimately the </span><i data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Ticonderoga,</span></i><span data-dcnode-id="959" instrument_node=""> an Aegis DDG based on the existing </span><i data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Spruance</span></i><span data-dcnode-id="956" instrument_node=""> hull using the growth margins incorporated in the original design was proposed to be built along with the CSGN/CGN 42.</span><sup data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">lxxvii</span></sup><span data-dcnode-id="953" instrument_node="">  It appears that this design may have originally been proposed in 1975 as a strike cruiser (CSG) before becoming a DDG. </span><sup data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">lxxviii </span></sup></p><span data-dcnode-id="949" instrument_node="">
</span><p class="just" data-dcnode-id="935"><span data-dcnode-id="948" instrument_node="">Twenty days before the DDG 47 hull was laid down and with the Aegis nuclear cruisers canceled, the </span><i data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Ticonderoga</span></i><span data-dcnode-id="945" instrument_node=""> was redesignated as the CG 47, a guided missile cruiser.  This action reflects that, although the hull of this class is the same as that of the </span><i data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Spruance </span></i><span data-dcnode-id="942" instrument_node="">Class, the </span><i data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">Ticonderoga </span></i><span data-dcnode-id="939" instrument_node="">Class has a full load displacement 1,225 tons greater than the </span><i data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Spruance</span></i><span data-dcnode-id="936" instrument_node="">, as well as a much greater combat capability than the ex-DLG cruisers then in the fleet.  Another feature that provides the CG 47 increased capabilities over destroyers is that she is fitted with a Unit Commander Stateroom and an area in CIC for his use.  A Unit Commander is a senior Captain, sometime given the position title of Commodore, who controls a small ad-hoc group of ships such as a merchant ship convoy or ESG escort group.  These facilities have also been used on occasion by a flag officer with a reduced size staff.  The CG 47 commanding officers are also sometimes assigned duties as anti-air warfare commanders within a battle group and use the additional command and control facilities in this role. </span></p><span data-dcnode-id="934" instrument_node="">
</span><p class="just" data-dcnode-id="920"><span data-dcnode-id="933" instrument_node="">The CG 47 </span><i data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Ticonderoga</span></i><span data-dcnode-id="930" instrument_node=""> was laid down on January 21</span><sup data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">st</span></sup><span data-dcnode-id="927" instrument_node="">, 1980, as the first of twelve new guided missile cruisers to be procured over the next five years.  Ultimately the class would consist of 27 cruisers, acquired through four upgraded baselines.  The </span><i data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Ticonderoga</span></i><span data-dcnode-id="924" instrument_node=""> was launched in March of 1981 and commissioned in January of 1983. She displaced about 9,500 tons at a length of 567 feet overall.  The </span><i data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Ticonderoga</span></i><span data-dcnode-id="921" instrument_node=""> carried 8 Harpoon missiles, and a mix of 88 Standard missiles and ASROCs as in two Mark 26 launching systems, a precursor to the modern VLS.  She can make better than 30 knots at 80,000 shp total of two shafts. </span></p><span data-dcnode-id="919" instrument_node="">
</span><img alt="cruiser" data-dcnode-id="918" height="463" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.navalmarinearchive.com/research/cruisers/cr_ims/cr_img_27.jpg&amp;raw" width="576"><span data-dcnode-id="917" instrument_node="">
</span><p class="just" data-dcnode-id="912"><span data-dcnode-id="916" instrument_node="">Starting with the CG 52, the </span><i data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Ticonderoga </span></i><span data-dcnode-id="913" instrument_node="">class replaced the Mark 26 system with the Mark 41 Vertical Launching System (VLS).  This had the immediate effect of increasing the missile load out to 122 as well as increasing reliability.  It also provided flexibility in accepting new weapons, increasing existing capability and providing new roles.  An example of this is the land attack mission when Tomahawk missiles are carried.  In addition, growth versions of the Standard missile provide both an increased engagement envelope in the AAW role and with modifications to the Aegis system, a missile defense capability.</span></p><span data-dcnode-id="911" instrument_node="">
</span><p class="just" data-dcnode-id="900"><span data-dcnode-id="910" instrument_node=""> The </span><i data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Ticonderoga </span></i><span data-dcnode-id="907" instrument_node="">class cruisers are the most capable surface combatants afloat in most respects.  The Aegis AAW system easily outclasses any other system in service, while the ships also have the most capable ASW suite available in the US Navy. However, due to being based on the existing </span><i data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Spruance </span></i><span data-dcnode-id="904" instrument_node="">hull, they lack the survivability features a larger ship would have, and had to be built with reduced service life allowances for weight and moment, limiting the amount of growth the Aegis system and VLS would otherwise allow.</span><sup data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">lxxx</span></sup><span data-dcnode-id="901" instrument_node="">. </span></p><span data-dcnode-id="899" instrument_node="">
</span><p class="just" data-dcnode-id="876"><span data-dcnode-id="898" instrument_node="">Eleven </span><i data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Ticonderoga</span></i><span data-dcnode-id="895" instrument_node=""> Class cruisers participated in Operation Desert Shield/Desert Storm in 1990-1991. During the war, on February 18</span><sup data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">th</span></sup><span data-dcnode-id="892" instrument_node="">, 1991, the </span><i data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Princeton</span></i><span data-dcnode-id="889" instrument_node=""> (CG 59) struck a bottom-laid influence mine in 16 meters of water that detonated causing a sympathetic detonation of a second nearby mine, damaging the ship.  USS </span><i data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Princeton </span></i><span data-dcnode-id="886" instrument_node="">restored her TLAM strike and Aegis AAW capabilities within two hours of the mine strike and reassumed duties as the local AAW commander, providing air defense for the Coalition MCM group for 30 additional hours until relieved by the USS </span><i data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Valley Forge</span></i><span data-dcnode-id="883" instrument_node="">. The damage to the </span><i data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Princeton</span></i><span data-dcnode-id="880" instrument_node=""> required her to be towed to port, although at no time was the ship in danger of sinking, and most of her combat systems remained operational.</span><sup data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">lxxxi </span></sup><span data-dcnode-id="877" instrument_node="">Operation of blue water assets in relatively shallow and confined waters continues to be a major operational challenge for the future fleet. </span></p><span data-dcnode-id="875" instrument_node="">
</span><h3 data-dcnode-id="873" id="LinkTarget_9052"><span data-dcnode-id="874" instrument_node="">8.2 The DDG 51 and Alternative Modern CG Studies</span></h3><span data-dcnode-id="872" instrument_node="">
</span><p class="just" data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">From the very first studies, the DDG was given two contradictory roles: 1) to be a smaller force-number-builder and 2) fix things that were perceived to be wrong with the CG 47.  Specifically, it was felt that a ship armed with Tomahawk, unlike a carrier escort, could fight while hurt.  Even if the ship were slowed and had lost a combat system capability in one or more areas, if it could receive Tomahawk targeting data and launch, the self-guiding missile would be fully functional.  Thus the DDG received a steel superstructure, increased blast overpressure resistance, more armor, a collective protection system and radar cross section reduction measures.  Thus there is a historically anomalous situation of the destroyer being a more survivable ship than the cruiser. </span></p><span data-dcnode-id="869" instrument_node="">
</span><p class="just" data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">A question that has continually come up is "what if a new cruiser, with weapons the same as the CG 47 class, were designed starting with the DDG and expanding into the cruiser mission?"  In order to have a math model of such a ship for future technology studies, Navy Preliminary design created the Cruiser Baseline (CGBL) shown in Figure 26.  The study also included weapons systems modularity and increased service life reserves.  The resulting ship had a waterline length of 600 feet, a beam of 69 feet, a displacement of about 13,500 tons plus a 30+ knot speed. </span></p><span data-dcnode-id="866" instrument_node="">
</span><img alt="cruiser" data-dcnode-id="865" height="447" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.navalmarinearchive.com/research/cruisers/cr_ims/cr_img_28.jpg&amp;raw" width="624"><span data-dcnode-id="864" instrument_node="">
</span><p class="just" data-dcnode-id="859"><span data-dcnode-id="863" instrument_node="">Another cruiser alternative studied in the late 1980s was variously entitled a Mission Essential Unit (MEU) or CG V/STOL.  In a return to the thoughts of the independent operations cruiser-carriers of the 1930s and the Russian </span><i data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Kiev</span></i><span data-dcnode-id="860" instrument_node=""> class, the ship was fitted with a hangar, elevators and a flight deck.  The mission systems were Aegis, SQS-53 sonar, 12 SV-22 ASW aircraft and 200 VLS cells.  The resulting ship had a waterline length of 700 feet, a waterline beam of 97 feet, and a displacement of about 25,000 tons. Figure 27 is a painting of that ship concept.  </span></p><span data-dcnode-id="858" instrument_node="">
</span><img alt="cruiser" data-dcnode-id="857" height="425" id="LinkTarget_9067" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.navalmarinearchive.com/research/cruisers/cr_ims/cr_img_29.jpg&amp;raw" width="624"><span data-dcnode-id="856" instrument_node="">
</span><h3 data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">8.3 Beyond the CG 47</span></h3><span data-dcnode-id="853" instrument_node="">
</span><p class="just" data-dcnode-id="849"><span data-dcnode-id="852" instrument_node="">The Twenty-First Century Surface Combatant (SC-21) Mission Need Statement (MNS) was approved by the Joint Requirements Oversight Council (JROC) in September 1994. Required capabilities called out in the MNS included: Power Projection; Battlespace Dominance; Command, Control and Surveillance; Joint Force Sustainment; Non-combat Operations; and Survivability / Mobility.  In January 1995 the Defense Acquisition Board (DAB) gave approval to Milestone 0 for SC-21 Acquisition Phase 0 (Concept Exploration and Definition).</span><sup data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">lxxxii </span></sup></p><span data-dcnode-id="848" instrument_node="">
</span><p class="just" data-dcnode-id="844"><span data-dcnode-id="847" instrument_node="">In February 1995, Mr. John Douglas, Assistant Secretary of the Navy initiated a Cost and Operational Effectiveness Analysis (COEA) effort to recommend a design for the 21st Century Surface Combatant (SC-21).  The COEA was under the direction of RADM Phil Coady and Mr. Ron Kiss, Deputy Assistant Secretary of the Navy.  The tasker required the COEA team to identify mission deficiencies, estimate the requirement for the naval surface forces, and to evaluate the costs and benefits of reasonable alternative designs for the new surface combatant.</span><sup data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">lxxxiii </span></sup></p><span data-dcnode-id="843" instrument_node="">
</span><p class="just" data-dcnode-id="839"><span data-dcnode-id="842" instrument_node="">The two-year study reported out in June 1997.  It recommended a new DD 21 Maritime Fire Support Ship concept whose missions included strike and long range precision fire support, and whose hull would be common with a follow-on CG 21.</span><sup data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">lxxxiv </span></sup></p><span data-dcnode-id="838" instrument_node="">
</span><img alt="cruiser" data-dcnode-id="837" height="180" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.navalmarinearchive.com/research/cruisers/cr_ims/cr_img_30.jpg&amp;raw" width="381"><span data-dcnode-id="836" instrument_node="">
</span><p class="just" data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Subsequent to these studies a design competition was held between two industry teams culminating in an award in 2002 to the team lead by Northrop Grumman Ship Systems.  Along the way, the ship was redesignated as the DD(X) with the CG(X) planned as a spiral development. </span></p><span data-dcnode-id="833" instrument_node="">
</span><p class="just" data-dcnode-id="829"><span data-dcnode-id="832" instrument_node="">As a descendant of the DD(X) program, it is envisioned to share with DD(X) a common propulsion architecture and hull form.  This hull form will contain an integrated all-electric power system that is more fuel efficient and flexible than today's propulsion systems, and provides more power capacity for future weapons.  CG(X) will also use many of the same transformational technologies used in DD(X) to reduce crew size and operating and support costs. CG(X) will maintain air superiority over the total force.  Larger, faster, and longer-range missiles will allow CG(X) to counter state-of-theart air threats hundreds of miles inland.  A generation of air defense radars is currently under development to counter low-radar cross section (RCS) threats at extended ranges; CG(X) will provide sustained air superiority, but potentially will also detect, track and engage ballistic missiles outside of the atmosphere.</span><sup data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">lxxxvi </span></sup></p><span data-dcnode-id="828" instrument_node="">
</span><h3 data-dcnode-id="826" id="LinkTarget_9088"><span data-dcnode-id="827" instrument_node="">9. CONCLUSIONS</span></h3><span data-dcnode-id="825" instrument_node="">
</span><p class="just" data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">This historical survey shows that ships with the name "cruiser" have covered a number of missions over the years:  </span></p><span data-dcnode-id="822" instrument_node="">
</span><ul data-dcnode-id="781" type="disc"><span data-dcnode-id="821" instrument_node="">
</span><li class="just" data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Foreign station ships, independently deployed, looked out for national interests around the world.  In addition to an extensive gun armament, the station ship had self-repair capability, long range, and "first-responder-to-disorder" equipment such as small arms for the crew and an extensive boat outfit.  The disorder could be a revolutionary situation or a natural disaster.  </span></li><span data-dcnode-id="818" instrument_node="">
</span><li class="just" data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">Sea denial ships, using their pre-deployed location, attacked other nations' trade routes.  Counter-raider merchant ship escorts would, in turn, try to stop enemy sea denial ships. </span></li><span data-dcnode-id="815" instrument_node="">
</span><li class="just" data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">The Washington Battleship construction limitation treaties made large cruisers into substitutes for battleships in an alternative battle line (especially for night time combat).  The attempt to forge a homogenous cruiser battle line ended up making US and Japanese "light" cruisers the same size and weight as "heavy" cruisers.  The French and Italian navies specialized in "interceptor" cruisers – sacrificing many other ship features, such as range, for speed and armament. The Soviet Union's first cruisers were based on Italian designs which explains their heavy armament on smaller displacements. </span></li><span data-dcnode-id="812" instrument_node="">
</span><li class="just" data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Cruisers have served as command ships at many levels, from small group leader to provisions for carrying the national command authority. </span></li><span data-dcnode-id="809" instrument_node="">
</span><li class="just" data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Cruisers have served as reconnaissance platforms (either directly as fast scout cruisers or via launching and retrieving smaller vehicles such as float planes). </span></li><span data-dcnode-id="806" instrument_node="">
</span><li class="just" data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">The "C" in CV reflects the fact some of the first carriers were armed with cruiser caliber guns for self-protection and thus thought of a part of the cruiser family. The CVs lost their gun armament in favor of more aircraft but depended on gun cruiser protection (prior to all weather day/night aircraft) when night/fog/bad weather left a carrier helpless against enemy surface combatants. </span></li><span data-dcnode-id="803" instrument_node="">
</span><li class="just" data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Smaller cruisers (CLAA) took on the role of gun armed AAW specialists able to keep up with the carriers regardless of sea conditions.   </span></li><span data-dcnode-id="800" instrument_node="">
</span><li class="just" data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">There have been several proposals for cruiser-aircraft carrier hybrids and one Japanese cruiser class was constructed to a float plane version of that concept. </span></li><span data-dcnode-id="797" instrument_node="">
</span><li class="just" data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">There have been a few highly specialized variants such as cruiser minelayers and dedicated training cruisers. </span></li><span data-dcnode-id="794" instrument_node="">
</span><li class="just" data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Cruisers served as anti-battleship (UK WWII) and anti-carrier (USSR 1950-60s) barrier picket ships and, once a target had been identified, as high-speed long-distance tattletales. </span></li><span data-dcnode-id="791" instrument_node="">
</span><li class="just" data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Cruisers supplied amphibious gunfire support to land forces at the start of wars until the more operationally expensive battleships could be reactivated. </span></li><span data-dcnode-id="788" instrument_node="">
</span><li class="just" data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">Currently, USN CGs and CGNs serve as aircraft carrier escorts, providing  AAW and ASW. </span></li><span data-dcnode-id="785" instrument_node="">
</span><li class="just" data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Independent land strike capability became a cruiser feature with the fitting of Tomahawk to the CG 52 onward. </span></li><span data-dcnode-id="782" instrument_node="">
</span></ul><span data-dcnode-id="780" instrument_node="">
</span><p class="just" data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">The displacement of USN cruisers was constrained during the Treaty period but grew rapidly during the WWII era, only to drop again with the new primary role of carrier escort (Figure 29 -  on next page). </span></p><span data-dcnode-id="777" instrument_node="">
</span><img alt="cruiser" data-dcnode-id="776" height="432" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.navalmarinearchive.com/research/cruisers/cr_ims/cr_img_31.jpg&amp;raw" width="577"><span data-dcnode-id="775" instrument_node="">
</span><p class="just" data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">There are modern analogs to the historical roles.  A forward deployed "Sea Swap" unit, with the carrier battle groups based in the United States instead on constant patrol, would return the cruiser to the independent station ship role.  We do not expect cruisers to serve as sea denial raiders in declared war because submarines are so much better at it.  However, a modern sea denial role is intercepting and searching merchant ship in remote ocean locations to see if they are transporting terrorists or serving as Trojan horses for destructive weapons to be delivered to a US port.  Future cruisers will not conduct anti-surface raider barrier patrols, but could provide a ballistic missile defense barrier, the modern equivalent.  This role requires a ship with the traditional cruiser virtues of endless boring patrolling (reliability, seakeeping, crew comfort) with the possibility of sudden unanticipated action (100% availability, time critical response, independent action). Future cruisers will not carry float planes, but they may be a launch/recovery platform for the modern analog of unmanned vehicles (air, surface or underwater). </span></p><span data-dcnode-id="772" instrument_node="">
</span><p class="just" data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">A summary of the changing mission assigned to ship designated as cruisers follows in Table 3. </span></p><span data-dcnode-id="769" instrument_node="">
</span><p align="center" data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Table 3: The Changing Roles of Cruisers </span></p><span data-dcnode-id="766" instrument_node="">
</span><img alt="" border="0" data-dcnode-id="765" height="463" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.navalmarinearchive.com/research/cruisers/cr_ims/cr_img_113.jpg&amp;raw" width="600"><span data-dcnode-id="764" instrument_node="">
</span><p class="just" data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">It appears that the consistent theme of all the historical missions was a ship with long endurance and the potential for independent operations.  Sometimes this theme was strongly emphasized as in ships for the foreign station, commerce raider and commerce defender roles.  Sometime those characteristics dwindled in ship customized for specialist roles such as the battle fleet scout cruiser of WWI, the cruiser minelayers and the highly optimized big carrier escorts of the US of the last half of the 20th century.    </span></p><span data-dcnode-id="761" instrument_node="">
</span><p class="just" data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">The difference between gun ship cruisers and their destroyer counterparts were fairly pronounced: an armor belt, bigger guns (6 to 8 in), four screw vice two, provision for float planes and command facilities.  Less obvious differences were a large boat outfit plus medical facilities along with marines and/or landing small arms for the sailors.  Those features allowed a cruiser to intervene ashore.  To maintain long patrols, cruisers were fitted with enhanced stores capacity and self-repair provisions.  The destroyers generally had sonars and depth charge racks which, except for all but a few of the smallest classes, cruisers did not.  The old destroyers were noticeably smaller than cruisers. </span></p><span data-dcnode-id="758" instrument_node="">
</span><p class="just" data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">The current generation of USN cruisers is optimized as a large aircraft carrier AAW/ASW escorts.  That role drives the designer towards a high speed, lightly or unarmored ship with relatively limited endurance, operating as a component of a deployed carrier battle group.  The assumption that the Navy needs a one-for-one replacement for those ships, focused on the carrier escort role, is in question due to the large number of DDG 51 class ships that exist (and are on order) which are carrier escort capable. The fact that the existing USN cruiser class (CG 47) was originally conceived as a big soft DDG, while the current DDG has cruiser-like toughness factors built into it, greatly confuses the cruiser name product line.  The DD(X) carrying two cruiser size 155mm (6.1 in) guns on a 14,000 ton hull is another confusing bit of nomenclature.  </span></p><span data-dcnode-id="755" instrument_node="">
</span><p class="just" data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">If a future cruiser is not a dedicated AAW/ASW carrier escort (directly replacing the CG 47 class in the force structure, intended to surge with the carrier battle groups), the ship design features that come from a return to historical mainline of cruiser missions would include: </span></p><span data-dcnode-id="752" instrument_node="">
</span><ul data-dcnode-id="732" type="disc"><span data-dcnode-id="751" instrument_node="">
</span><li class="just" data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Increased survivability, especially against ambush attacks, including a return to structural armor, </span></li><span data-dcnode-id="748" instrument_node="">
</span><li class="just" data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Increased stores and fuel loads for independent operations, </span></li><span data-dcnode-id="745" instrument_node="">
</span><li class="just" data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Increased self repair stores and shops to allow staying on station for an extended period while remaining fully capable,  </span></li><span data-dcnode-id="742" instrument_node="">
</span><li class="just" data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">First responder capabilities (such as limited medical facilities, small arms for the crew and an extensive boat/helo outfit), and  </span></li><span data-dcnode-id="739" instrument_node="">
</span><li class="just" data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Crew sized not only to operate the ship but to put small detachments ashore or onto seized merchant ships. </span></li><span data-dcnode-id="736" instrument_node="">
</span><li class="just" data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Provisions for carrying a small command staff and a senior officer (if assigned a role in the command structure).  </span></li><span data-dcnode-id="733" instrument_node="">
</span></ul><span data-dcnode-id="731" instrument_node="">
</span><p class="just" data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">The hull features listed above would noticeably increase ship size (dimensions and weight) compared to the current generation of lightly-protected aluminum superstructure ships bearing the cruiser name.  However, most of those features have relatively low construction costs and a relatively small life cycle cost impact.  Note that the associated higher manning level for self-repair, first responder role and detachment operations would carry a noticeable life cycle penalty.  A combined nuclear cruiser with gas turbine boost (CONAG) plant would increase initial cost and crew cost but, at the fleet level, might pay off by reducing the logistic train required to support a ship assigned to a remote station for long periods of time or eliminate the vulnerability caused by using regional port facilities.      </span></p><span data-dcnode-id="728" instrument_node="">
</span><h3 data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">APPENDIX A: THE DESIGN AND USE OF WOODEN FRIGATES AS "CRUISERS"</span></h3><span data-dcnode-id="725" instrument_node="">
</span><p class="just" data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">The cruiser as a ship type evolved from the frigate of the Age of Sail.  While the term is earlier, it is believed that the first British ships of frigate build were Unicorn and Lyme (1748). The capital ship of the Age of Sail, the ship of the line of First through Fourth Rates, had a basic design feature of multiple covered gun decks one above the other.  The lower gun deck was of necessity at least 4, and more commonly some 6 feet above the waterline. A ship of the line could have two, three, or occasionally four armed decks.  The frigate, on the other hand, had but one fully armed deck, the main deck. The deck below this one, the berth deck, was about at the waterline since it did not require any gun ports.  Inherently, this reduced ship depth, lowered the center of gravity, reduced freeboard with its attendant windage and weight, and reduced overall ship displacement because of the lesser number of guns, lesser scantlings required to hold up the guns' weight, and the lesser amounts of ballast required to maintain stability. </span></p><span data-dcnode-id="722" instrument_node="">
</span><p class="just" data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Frigates were typically of about the same length and beam as a small ship-of-theline.   Having the same hull length on which to mount sails meant they had the same propulsion power.   However, being of smaller hull depth and carrying fewer guns, they had a smaller displacement (hence, less drag) so the frigate could sail faster on every point of sail in almost all conditions.   The berth deck offered the better living condition of an unobstructed area for crew living as opposed to living among the guns on the larger ships.  The frigate also had a smaller crew compared to a ship-of-the-line of the same size. </span></p><span data-dcnode-id="719" instrument_node="">
</span><p class="just" data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">A frigate had lightly armed quarterdeck and forecastle decks above its main deck with the space below the quarterdeck providing accommodations suitable for a senior officer.   The 'tween decks of a corvette (the next smaller ship type), which also usually lacked even a non-armed  quarterdeck, were much less comfortable because it lacked opening windows. </span></p><span data-dcnode-id="716" instrument_node="">
</span><p class="just" data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">The USN produced the wooden equivalent of the German "pocket battleship" with the Constitution class frigates which were big enough and heavily armed enough to assure the defeat of British frigates, but also fast enough to run away from multi-deck ships-of-the-line.  The interim British counter was the razee, which was a small ship-ofthe-line with her upper decks cut away converting it into a large and powerful frigate. </span></p><span data-dcnode-id="713" instrument_node="">
</span><p class="just" data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">A contemporary British definition of a cruiser from 1815 is:</span></p><span data-dcnode-id="710" instrument_node="">
</span><blockquote data-dcnode-id="699"><blockquote data-dcnode-id="700"><span data-dcnode-id="709" instrument_node="">
</span><p class="just" data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">"CRUISER: a vessel employed in cruising. </span></p><span data-dcnode-id="706" instrument_node="">
</span><p class="just" data-dcnode-id="702"><span data-dcnode-id="705" instrument_node="">They are small men of war, employed to sail to and fro in the Channel, and elsewhere, to secure our merchant ships and vessels from the enemy's small frigates and privateers.  They are generally such as sail well, and are commonly well manned: indeed, the safety of the trade in the Channel, and up and down the Soundings and other places, absolutely require the constant keeping out of ships at sea. When the ships employed for this purpose, have arrived at their destined station, they traverse the sea backward and forward under an easy sail, and within a limited space, conjectured to be nearly in the track of their expected adversaries."</span><sup data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">lxxxvii </span></sup></p><span data-dcnode-id="701" instrument_node="">
</span></blockquote></blockquote><span data-dcnode-id="698" instrument_node="">
