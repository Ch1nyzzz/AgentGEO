</span><p class="just" data-dcnode-id="2935"><span data-dcnode-id="2960" instrument_node="">The British followed their </span><i data-dcnode-id="2958"><span data-dcnode-id="2959" instrument_node="">Kent</span></i><span data-dcnode-id="2957" instrument_node=""> and similar </span><i data-dcnode-id="2955"><span data-dcnode-id="2956" instrument_node="">London</span></i><span data-dcnode-id="2954" instrument_node=""> classes with a smaller heavy cruiser with only three big gun turrets.  This allowed, on a standard displacement of 8390 tons, for a 3 inch armor belt and other improvements.  Two ships were built; one, </span><i data-dcnode-id="2952"><span data-dcnode-id="2953" instrument_node="">Exeter,</span></i><span data-dcnode-id="2951" instrument_node=""> was later to achieve lasting fame in the Battle of the River Plate.  The Royal Navy's need for large numbers of cruisers for commerce protection and Imperial defense led them to create a large class of light cruisers, the </span><i data-dcnode-id="2949"><span data-dcnode-id="2950" instrument_node="">Leanders, </span></i><span data-dcnode-id="2948" instrument_node="">of which nine were built starting in 1933. They had four twin 6-inch/50's as main armament, a top speed of 32.5 knots, and varied between 6985 and 7270 tons standard.  Once the total tonnage of cruisers was limited by Treaty, the British reduced the size of this design to create the </span><i data-dcnode-id="2946"><span data-dcnode-id="2947" instrument_node="">Arethusa </span></i><span data-dcnode-id="2945" instrument_node="">class, of which six were built at 5250 tons, using the same technique that had worked with the County's: eliminating one turret.  Once the </span><i data-dcnode-id="2943"><span data-dcnode-id="2944" instrument_node="">Mogami's </span></i><span data-dcnode-id="2942" instrument_node="">capability became known, the British went into panic mode and built two maxed-out, 9100 ton (standard) light cruisers with twelve guns, </span><i data-dcnode-id="2940"><span data-dcnode-id="2941" instrument_node="">Southampton </span></i><span data-dcnode-id="2939" instrument_node="">and</span><i data-dcnode-id="2937"><span data-dcnode-id="2938" instrument_node=""> Newcastle,</span></i><span data-dcnode-id="2936" instrument_node=""> starting in 1937. More were built after war broke out. </span></p><span data-dcnode-id="2934" instrument_node="">
</span><p class="just" data-dcnode-id="2923"><span data-dcnode-id="2933" instrument_node="">These British cruisers were Mahan's "far distant, storm-beaten ships" in WWII as they had been in WWI, enforcing the blockade and stopping raiders. While the English Channel could be sealed off by light forces and mines, the wide straits to the north of England were covered by cruiser patrols, since only a cruiser size ship could remain on station for long periods in the brutal North Atlantic weather.  The cruisers were well armed enough to directly take on armored merchant raiders or German cruisers.  They also had enough sea speed to shadow larger units while calling on the main fleet such as when the </span><i data-dcnode-id="2931"><span data-dcnode-id="2932" instrument_node="">Suffolk</span></i><span data-dcnode-id="2930" instrument_node=""> and </span><i data-dcnode-id="2928"><span data-dcnode-id="2929" instrument_node="">Norfolk</span></i><span data-dcnode-id="2927" instrument_node=""> detected and tracked the </span><i data-dcnode-id="2925"><span data-dcnode-id="2926" instrument_node="">Bismarck</span></i><span data-dcnode-id="2924" instrument_node="">. </span></p><span data-dcnode-id="2922" instrument_node="">
</span><p class="just" data-dcnode-id="2917"><span data-dcnode-id="2921" instrument_node="">Drawing on his personal experience serving on a Royal Navy cruiser in WWII, the novelist Warren Tute (</span><i data-dcnode-id="2919"><span data-dcnode-id="2920" instrument_node="">The Cruiser</span></i><span data-dcnode-id="2918" instrument_node="">, 1955) attempted to define a cruiser to his layman readership with the quote in Table 1. </span></p><span data-dcnode-id="2916" instrument_node="">
</span><span data-dcnode-id="2915" instrument_node="">
</span><span data-dcnode-id="2914" instrument_node="">
</span><span data-dcnode-id="2893" instrument_node="">
</span><span data-dcnode-id="2891" instrument_node="">
</span><table align="center" border="1" cellpadding="2" cellspacing="2" data-dcnode-id="2889" summary="" width="600"><tbody data-dcnode-id="2890"><tr data-dcnode-id="2892"><td data-dcnode-id="2894"><span data-dcnode-id="2913" instrument_node="">
</span><p align="center" data-dcnode-id="2911"><span data-dcnode-id="2912" instrument_node="">Table 1 A Description of a Royal Navy cruiser </span></p><span data-dcnode-id="2910" instrument_node="">
</span><p class="just" data-dcnode-id="2908"><span data-dcnode-id="2909" instrument_node="">"Every man-of war is a compromise built for a special purpose – an agreed mixture of speed, armour, offensive and defensive weapons; seaworthiness and living accommodation.  A battleship has huge guns, is heavily armoured but is usually slow. A destroyer has no armour, light weapons and is very fast.  Midway between the two stands the cruiser – to me almost the ideal ship. </span></p><span data-dcnode-id="2907" instrument_node="">
</span><p class="just" data-dcnode-id="2905"><span data-dcnode-id="2906" instrument_node="">A cruiser is the smallest of the major war vessels.  She has all the essentials and none of the frills.  She carries a Surgeon, a Chaplain and a detachment of Royal Marines. She is an independent command in the charge of a four-ringed Captain R.N. </span></p><span data-dcnode-id="2904" instrument_node="">
</span><p class="just" data-dcnode-id="2902"><span data-dcnode-id="2903" instrument_node="">Her spick-and-span, spit-and-polish appearance and routine, while lacking the pomposities of a capital ship, are very far removed from the roll-top sweater and oil-stained cap of the sloop or corvette.  From one point of view a small maritime township; from another a most effective expression of naval power, a cruiser is comfortable to live in and is perhaps the most versatile warship the world has seen." </span></p><span data-dcnode-id="2901" instrument_node="">
</span><p align="center" data-dcnode-id="2896"><span data-dcnode-id="2900" instrument_node="">Warren Tute, </span><i data-dcnode-id="2898"><span data-dcnode-id="2899" instrument_node="">The Cruiser</span></i><span data-dcnode-id="2897" instrument_node="">, 1955, Author's Preface </span></p><span data-dcnode-id="2895" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="2888" instrument_node="">
</span><p class="just" data-dcnode-id="2872"><span data-dcnode-id="2887" instrument_node="">France had followed the </span><i data-dcnode-id="2885"><span data-dcnode-id="2886" instrument_node="">Duguay-Trouin's </span></i><span data-dcnode-id="2884" instrument_node="">with a similar heavy cruiser, </span><i data-dcnode-id="2882"><span data-dcnode-id="2883" instrument_node="">Duquesne. </span></i><span data-dcnode-id="2881" instrument_node="">This two ship class, commissioned in 1928, had 8-inch guns in the same arrangement as their predecessor, but with the hull enlarged to 10,000 tons standard, 185m (606.95") LBP, to support the heavier weapons and more AA guns.  Speed was 33.75 knots on 120,000 SHP (exceeded on trials).  Like the light cruisers, they had no armor, just a box of 30 mm plate around each magazine. The follow-on </span><i data-dcnode-id="2879"><span data-dcnode-id="2880" instrument_node="">Suffren</span></i><span data-dcnode-id="2878" instrument_node=""> class, commissioned starting in 1930, kept the same hull dimensions but traded off engine power for additional protection compared to the earlier class.  The French also completed the </span><i data-dcnode-id="2876"><span data-dcnode-id="2877" instrument_node="">Algerie</span></i><span data-dcnode-id="2875" instrument_node=""> in 1934 with better protection and an improved eight-inch gun.</span><sup data-dcnode-id="2873"><span data-dcnode-id="2874" instrument_node="">xxxvi</span></sup></p><span data-dcnode-id="2871" instrument_node="">
</span><p class="just" data-dcnode-id="2866"><span data-dcnode-id="2870" instrument_node=""> Italy's </span><i data-dcnode-id="2868"><span data-dcnode-id="2869" instrument_node="">Fiume </span></i><span data-dcnode-id="2867" instrument_node="">class, commissioned in 1931, was of 11,680 tons standard, but the government simply did not admit they had exceeded the limits.  These were probably the first cruisers to cheat outright on the Treaty.  They were armed like the French heavy cruisers with four twin 8-inch turrets, but much better protected. </span></p><span data-dcnode-id="2865" instrument_node="">
</span><p class="just" data-dcnode-id="2857"><span data-dcnode-id="2864" instrument_node=""> Japan's </span><i data-dcnode-id="2862"><span data-dcnode-id="2863" instrument_node="">Myoko</span></i><span data-dcnode-id="2861" instrument_node=""> class (1929) also exceeded Treaty limits at 10,940 standard.  With her ten 8-inch guns, eight 5-inch/40 DP guns, and 34-knot top speed, these were formidable warships.  The Japanese authorities were so happy with them that they refused to reduce any of their capabilities for the next class, </span><i data-dcnode-id="2859"><span data-dcnode-id="2860" instrument_node="">Takao</span></i><span data-dcnode-id="2858" instrument_node="">, and accordingly it exceeded the limit by even more at 11,350 tons (1932). </span></p><span data-dcnode-id="2856" instrument_node="">
</span><img alt="cruiser" data-dcnode-id="2855" height="424" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.navalmarinearchive.com/research/cruisers/cr_ims/cr_img_13.jpg&amp;raw" width="576"><span data-dcnode-id="2854" instrument_node="">
</span><p class="just" data-dcnode-id="2834"><span data-dcnode-id="2853" instrument_node="">Germany rearmed steadily as it was allowed by the Versailles Treaty ending WWI, commissioning the light cruiser </span><i data-dcnode-id="2851"><span data-dcnode-id="2852" instrument_node="">Emden</span></i><span data-dcnode-id="2850" instrument_node=""> in 1925. This was a 5600 standard ton ship with eight 5.9-inch (15cm) guns, some mounted in broadside like a WWI cruiser, and four torpedo tubes, with a top speed of 29 knots and a range of 5300 nm at 18 knots. The next class, </span><i data-dcnode-id="2848"><span data-dcnode-id="2849" instrument_node="">Konigsberg</span></i><span data-dcnode-id="2847" instrument_node="">, was almost 1000 tons larger; the Germans took advantage of the definition of standard displacement from the Washington Treaty to allow them to build bigger ships than the Versailles Treaty intended.  These ships also made extensive use of welding as a weight saving measure.</span><sup data-dcnode-id="2845"><span data-dcnode-id="2846" instrument_node="">xxxvii </span></sup><span data-dcnode-id="2844" instrument_node="">But, these ships were overloaded with three triple 5.9's and were not successful.  Then in 1929 the Germans started work on the </span><i data-dcnode-id="2842"><span data-dcnode-id="2843" instrument_node="">Deutschland</span></i><span data-dcnode-id="2841" instrument_node=""> class, a 10,000 ton ship with 11-inch (28-cm) guns in two` triple turrets. The size and armament of this ship was limited by the Versailles Treaty, and Germany was trying to get around these limitations.  Therefore, it is hard to say exactly what this ship should be called; armored cruiser seems the closest, since she was too slow at 26 knots to be a battle cruiser.  The Germans used the word "</span><i data-dcnode-id="2839"><span data-dcnode-id="2840" instrument_node="">panzerschiffe" </span></i><span data-dcnode-id="2838" instrument_node="">which just means armored ship. The British called them "pocket battleships." Diesel powered, these ships (3 were built, commissioned starting in 1933) had ranges of 10,000 miles, enough to be a formidable commerce raider.  The three ships were slightly different in dimensions, the later ones being beamier and even heavier.  Then after the Nazis took over Germany in 1933, the </span><i data-dcnode-id="2836"><span data-dcnode-id="2837" instrument_node="">Admiral Hipper</span></i><span data-dcnode-id="2835" instrument_node=""> class heavy cruisers were built, conventional units with four twin 8-inch turrets but, at 13,900 tons, far beyond their claimed Treaty displacement. </span></p><span data-dcnode-id="2833" instrument_node="">
</span><img alt="cruiser" data-dcnode-id="2832" height="439" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.navalmarinearchive.com/research/cruisers/cr_ims/cr_img_14.jpg&amp;raw" width="576"><span data-dcnode-id="2831" instrument_node="">
</span><p class="just" data-dcnode-id="2820" id="LinkTarget_8591"><span data-dcnode-id="2830" instrument_node="">The French, understandably worried about the German buildup, created a </span><i data-dcnode-id="2828"><span data-dcnode-id="2829" instrument_node="">croiseur de combat, </span></i><span data-dcnode-id="2827" instrument_node="">literally a battle cruiser, of 26,500 tons standard, and well-armed with two quadruple 13-inch/50 turrets, capable of nearly 30 knots but with only 9-inch armor. Commissioned in 1937, these </span><i data-dcnode-id="2825"><span data-dcnode-id="2826" instrument_node="">Dunkerque</span></i><span data-dcnode-id="2824" instrument_node=""> class ships had both the speed and firepower to overwhelm a </span><i data-dcnode-id="2822"><span data-dcnode-id="2823" instrument_node="">Deutschland</span></i><span data-dcnode-id="2821" instrument_node="">, but they were about twice the size and cost. </span></p><span data-dcnode-id="2819" instrument_node="">
</span><p class="just" data-dcnode-id="2799"><span data-dcnode-id="2818" instrument_node="">The Germans responded to this development by scrapping the last two of the </span><i data-dcnode-id="2816"><span data-dcnode-id="2817" instrument_node="">Deutschland</span></i><span data-dcnode-id="2815" instrument_node=""> class </span><i data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">panzerschiffe</span></i><span data-dcnode-id="2812" instrument_node="">, called D and E in official sources, and after a major redesign, laying new keels in 1935.  These were to become the much larger battleships </span><i data-dcnode-id="2810"><span data-dcnode-id="2811" instrument_node="">Scharnhorst</span></i><span data-dcnode-id="2809" instrument_node=""> and </span><i data-dcnode-id="2807"><span data-dcnode-id="2808" instrument_node="">Gneisenau</span></i><span data-dcnode-id="2806" instrument_node=""> (not to be confused with the WWI armored cruisers of the same names), 26,000 tonnes standard (31,500 at delivery), with full battleship-scale armor such as a 350-mm belt (13.8 inches, more than the USN's Iowa class battleships).</span><sup data-dcnode-id="2804"><span data-dcnode-id="2805" instrument_node="">xxxviii</span></sup><span data-dcnode-id="2803" instrument_node="">  These ships are sometimes called battle cruisers because their big guns were of smaller caliber than battleships serving in other navies at the time, but because of their full battleship protection it seems more correct to call them battleships, as German sources do.  Their top speed of 31-plus knots made them faster than most contemporary battleships but slower than most cruisers.  Hitler had earlier renounced all restrictions on military rearmament.  Later German warship construction included two units of an even larger </span><i data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">Bismarck</span></i><span data-dcnode-id="2800" instrument_node=""> class of battleships, 41,700 tonnes standard displacement with 15-inch guns.  These were commissioned in 1940 and 1941, and for the first time since WWI, gave Germany capital ships that were at least equal to any in the world.  However, German war strategy was to use even their capital ships as commerce raiders, more of a cruiser function as described earlier. </span></p><span data-dcnode-id="2798" instrument_node="">
</span><h3 data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">5.2 Wartime roles and missions</span></h3><span data-dcnode-id="2795" instrument_node="">
</span><p class="just" data-dcnode-id="2793"><span data-dcnode-id="2794" instrument_node="">World War II was, in many respects, two wars fought at the same time.  The war in Europe and the Atlantic was primarily a land war with the Navy either protecting convoys, searching for and sinking submarines and surface raiders, and providing naval gunfire and other support to the landings in Africa, Italy, and France.  The Pacific war, on the other hand, was primarily a naval war as the US and Japanese navies fought to gain or maintain control of the islands from Japan to Australia.   </span></p><span data-dcnode-id="2792" instrument_node="">
</span><p class="just" data-dcnode-id="2772"><span data-dcnode-id="2791" instrument_node="">In the Atlantic theater, the cruisers, along with destroyers (DD) and escort carriers (CVE), provided defensive screening support to Allied convoys and task forces. Cruisers played a huge role in hunting down German surface commerce raiders, a classic cruiser mission (counter-sea denial).  From the beginning of the war in 1939, three British cruisers (two light and one heavy) fought the </span><i data-dcnode-id="2789"><span data-dcnode-id="2790" instrument_node="">Deutschland</span></i><span data-dcnode-id="2788" instrument_node="">-class </span><i data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node="">Admiral Graf Spee </span></i><span data-dcnode-id="2785" instrument_node="">to a standstill in the Battle of the River Plate.  Other British cruisers played important roles in hunting down the battleships </span><i data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node="">Bismarck</span></i><span data-dcnode-id="2782" instrument_node=""> in 1941 (with HMS </span><i data-dcnode-id="2780"><span data-dcnode-id="2781" instrument_node="">Dorsetshire </span></i><span data-dcnode-id="2779" instrument_node="">actually torpedoing the sinking wreck) and </span><i data-dcnode-id="2777"><span data-dcnode-id="2778" instrument_node="">Scharnhorst</span></i><span data-dcnode-id="2776" instrument_node=""> in 1943.  The cruisers provided naval gunfire support to all the allied landings beginning with the landings in Africa. During the African landings the cruisers engaged and neutralized the French ships located in a nearby harbor. They also engaged the Italian Navy ships in the Mediterranean. They provided naval gunfire support as well as antiaircraft support to the landings in North Africa, Italy, and at Normandy.  The USS </span><i data-dcnode-id="2774"><span data-dcnode-id="2775" instrument_node="">Augusta,</span></i><span data-dcnode-id="2773" instrument_node=""> CA 31, served as President Franklin Roosevelt's personal flagship for his meetings with Winston Churchill at the beginning of the war in Newfoundland, and with Churchill and Stalin at Yalta near the end of the European war. </span></p><span data-dcnode-id="2771" instrument_node="">
</span><p class="just" data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">In the Pacific, the U.S. cruisers fulfilled multiple roles: fleet and task group flagships, carrier/task force screening, convoy escort and protection, surface task forces, naval gun fire support for the marine and army landings, and some merchant interdiction.   </span></p><span data-dcnode-id="2768" instrument_node="">
</span><p class="just" data-dcnode-id="2766"><span data-dcnode-id="2767" instrument_node="">In the Solomon Islands, the loss of the American battle line at Pearl Harbor lead to cruisers being the heaviest U.S. units available to face the Japanese forces (in some cases including battleships) trying to attack the U.S. forces ashore at Guadalcanal.  This lead to some extremely heavy losses until improved tactics using radar and properly coordinating the cruisers and destroyers were developed.  Subsequently as U.S. forces moved up the islands driving the Japanese forces back and establishing naval and air bases in the islands the cruisers were a major source of naval gunfire support to these island invasions as the war moved across the Pacific.  In the north Pacific the Japanese had occupied a few of the western Aleutian Islands threatening to move down the island chain and possibly attack mainland U.S. targets.  This advance was stopped and the Japanese invaders were eventually forced off the islands.  The naval support for this effort was primarily by surface task forces without carriers led by cruisers.  </span></p><span data-dcnode-id="2765" instrument_node="">
</span><p class="just" data-dcnode-id="2757"><span data-dcnode-id="2764" instrument_node="">During WWII, most cruisers carried four Curtis SOC </span><i data-dcnode-id="2762"><span data-dcnode-id="2763" instrument_node="">Seagull</span></i><span data-dcnode-id="2761" instrument_node=""> floatplanes (two on the catapults and two in the hangar). The SOC was a biplane and rather old but was more suitable for cruisers than the more modern OS2U </span><i data-dcnode-id="2759"><span data-dcnode-id="2760" instrument_node="">Kingfisher </span></i><span data-dcnode-id="2758" instrument_node="">because it had folding wings. </span></p><span data-dcnode-id="2756" instrument_node="">
</span><img alt="cruiser" data-dcnode-id="2755" height="703" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.navalmarinearchive.com/research/cruisers/cr_ims/cr_img_15.jpg&amp;raw" width="571"><span data-dcnode-id="2754" instrument_node="">
</span><p class="just" data-dcnode-id="2750"><span data-dcnode-id="2753" instrument_node="">The floatplanes had several different roles.  Even though the function of scouting for the enemy fleet had largely been taken over by carrier based aircraft, they were still used for anti-submarine patrols around the task force.  Other missions included delivering messages during times of radio silence, towing target sleeves for anti-aircraft practice, rescue of downed pilots and of course gunfire spotting for the cruiser. When escorting a carrier though, if an air attack was expected, flight operations were curtailed because the maneuvering required for launch and recovery would reduce the effectiveness of the anti-aircraft fire.</span><sup data-dcnode-id="2751"><span data-dcnode-id="2752" instrument_node="">xxxix </span></sup></p><span data-dcnode-id="2749" instrument_node="">
</span><p class="just" data-dcnode-id="2738"><span data-dcnode-id="2748" instrument_node="">One cruiser, USS </span><i data-dcnode-id="2746"><span data-dcnode-id="2747" instrument_node="">Indianapolis </span></i><span data-dcnode-id="2745" instrument_node="">CA 35, played an important part in the end of the war in the Pacific.  Following battle damage repairs in Mare Island, CA the </span><i data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">Indianapolis </span></i><span data-dcnode-id="2742" instrument_node="">received orders to proceed at high speed to Tinian, carrying parts and nuclear material to be used in the atomic bombs which were soon to be dropped on Hiroshima and Nagasaki. Due to the urgency of her mission, </span><i data-dcnode-id="2740"><span data-dcnode-id="2741" instrument_node="">Indianapolis </span></i><span data-dcnode-id="2739" instrument_node="">departed San Francisco on 16 July, foregoing her post repair shakedown period. Stopping briefly at Pearl Harbor 19 July 1945, she raced on unescorted and arrived Tinian 26 July, having set a record in covering some 5000 miles from San Francisco in only 10 days (an average of 21 knots). </span></p><span data-dcnode-id="2737" instrument_node="">
</span><p class="just" data-dcnode-id="2732"><span data-dcnode-id="2736" instrument_node="">During the war the US Navy lost ten cruisers, seven heavy cruisers (CA 26, 29, 30, 34, 35, 39, and 44), and three light cruisers (CL 50, 51, 52).  All but one of these losses was in the area of the Solomon Islands during the struggle for control of those islands. All these cruisers were sunk by hits from the Japanese Long Lance torpedo.  The lone exception was the loss of </span><i data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">Indianapolis</span></i><span data-dcnode-id="2733" instrument_node=""> less than two weeks before the end of the war to a submarine in the Philippine Sea after she delivered the atomic bomb material to Tinian. There were no cruisers lost to aircraft bombs or torpedoes, or to the Japanese suicide bombers.  </span></p><span data-dcnode-id="2731" instrument_node="">
</span><h3 data-dcnode-id="2729" id="LinkTarget_8610"><span data-dcnode-id="2730" instrument_node="">5.3 Wartime Design Evolution and Building Program</span></h3><span data-dcnode-id="2728" instrument_node="">
</span><p class="just" data-dcnode-id="2726"><span data-dcnode-id="2727" instrument_node="">During the period before the war from 1924 through 1941 the U.S. Navy commissioned 33 cruisers, an average of 1.8 new cruisers per year.  Eleven of these cruisers were commissioned in 1937 – 1939 (9 CLs &amp; 2 CAs) as part of the Roosevelt Administration's WPA "make-work" projects. But, by 1940, with the war going badly in Europe, even this rate of production seemed inadequate. When Congress authorized a 70% expansion of the Navy (the Vinson-Trammel Act) there was a scramble to increase production of all types of warships.  Accordingly, the Navy elected to make only those improvements that would not delay production, relying as much as possible on the existing designs which were considered satisfactory even if not optimum. </span></p><span data-dcnode-id="2725" instrument_node="">
</span><p class="just" data-dcnode-id="2702"><span data-dcnode-id="2724" instrument_node="">In 1942 eight CLs were commissioned and in 1943 seven more CLs and four CAs were commissioned.  This building rate continued through the end of the war with 11 cruisers commissioned in 1944 and 18 in 1945.  These cruisers were (mostly) divided into </span><i data-dcnode-id="2722"><span data-dcnode-id="2723" instrument_node="">Cleveland</span></i><span data-dcnode-id="2721" instrument_node=""> class light cruisers (improved </span><i data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">Brooklyns</span></i><span data-dcnode-id="2718" instrument_node="">) and </span><i data-dcnode-id="2716"><span data-dcnode-id="2717" instrument_node="">Baltimore</span></i><span data-dcnode-id="2715" instrument_node=""> class heavy cruisers (improved </span><i data-dcnode-id="2713"><span data-dcnode-id="2714" instrument_node="">Wichitas</span></i><span data-dcnode-id="2712" instrument_node="">).  The General Board was not entirely happy with either design; as a result of Treaty limitations and technological changes, the </span><i data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node="">Cleveland's</span></i><span data-dcnode-id="2709" instrument_node=""> were too slow compared to the </span><i data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">Iowa</span></i><span data-dcnode-id="2706" instrument_node=""> class battleships and the </span><i data-dcnode-id="2704"><span data-dcnode-id="2705" instrument_node="">Baltimores</span></i><span data-dcnode-id="2703" instrument_node=""> lacked protection against more recent 8-inch shells.  These arguments were swept away by "mobilization production fever."  Design activity continued, but could not be allowed to hamper production. </span></p><span data-dcnode-id="2701" instrument_node="">
</span><p class="just" data-dcnode-id="2675"><span data-dcnode-id="2700" instrument_node="">With the start of the war, all Treaty restrictions were no longer in force.  The U.S. Navy designed two new cruisers, the </span><i data-dcnode-id="2698"><span data-dcnode-id="2699" instrument_node="">Cleveland</span></i><span data-dcnode-id="2697" instrument_node=""> class light cruiser (CL) and the </span><i data-dcnode-id="2695"><span data-dcnode-id="2696" instrument_node="">Baltimore </span></i><span data-dcnode-id="2694" instrument_node="">class heavy Cruiser (CA).  </span><i data-dcnode-id="2692"><span data-dcnode-id="2693" instrument_node="">Cleveland</span></i><span data-dcnode-id="2691" instrument_node=""> was developed from the </span><i data-dcnode-id="2689"><span data-dcnode-id="2690" instrument_node="">Brooklyn</span></i><span data-dcnode-id="2688" instrument_node=""> design, while </span><i data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">Baltimore</span></i><span data-dcnode-id="2685" instrument_node=""> was based on the heavy cruiser </span><i data-dcnode-id="2683"><span data-dcnode-id="2684" instrument_node="">Wichita</span></i><span data-dcnode-id="2682" instrument_node="">, itself a </span><i data-dcnode-id="2680"><span data-dcnode-id="2681" instrument_node="">Brooklyn</span></i><span data-dcnode-id="2679" instrument_node=""> derivative.  The </span><i data-dcnode-id="2677"><span data-dcnode-id="2678" instrument_node="">Cleveland</span></i><span data-dcnode-id="2676" instrument_node=""> Class had twelve 6-inch/47 in four triple turrets (2 forward, 2 aft) and twelve 5-inch/38 in twin mounts (one each on the center line fore and aft and two each on either side of the ship). </span></p><span data-dcnode-id="2674" instrument_node="">
</span><p class="just" data-dcnode-id="2663"><span data-dcnode-id="2673" instrument_node="">The </span><i data-dcnode-id="2671"><span data-dcnode-id="2672" instrument_node="">Baltimore</span></i><span data-dcnode-id="2670" instrument_node=""> class was an enlarged </span><i data-dcnode-id="2668"><span data-dcnode-id="2669" instrument_node="">Wichita</span></i><span data-dcnode-id="2667" instrument_node="">. The </span><i data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">Baltimore</span></i><span data-dcnode-id="2664" instrument_node=""> class had three triple 8-inch/55 turrets (two forward and one aft) and six twin - 5-inch/38 mounts (one each on the centerline fore and aft, and two on each side).  </span></p><span data-dcnode-id="2662" instrument_node="">
</span><p class="just" data-dcnode-id="2642"><span data-dcnode-id="2661" instrument_node="">World War II saw a major increase in radar technology with new surface search, air search, and fire control radars being developed and installed on the cruisers throughout the war.  The growth of radar and the air threat created a need to assimilate a growing amount of information, evaluate it quickly, and then respond to multiple targets.  This led to the creation of Combat Information Centers (CIC) in combatants, which grew in the size and importance as technology proliferated.  Earlier cruisers had to find space for CIC in their superstructure, but later cruisers (</span><i data-dcnode-id="2659"><span data-dcnode-id="2660" instrument_node="">Fargo </span></i><span data-dcnode-id="2658" instrument_node="">(improved </span><i data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">Cleveland</span></i><span data-dcnode-id="2655" instrument_node="">), </span><i data-dcnode-id="2653"><span data-dcnode-id="2654" instrument_node="">Oregon City </span></i><span data-dcnode-id="2652" instrument_node="">(improved </span><i data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node="">Baltimore</span></i><span data-dcnode-id="2649" instrument_node="">), and </span><i data-dcnode-id="2647"><span data-dcnode-id="2648" instrument_node="">Juneau</span></i><span data-dcnode-id="2646" instrument_node=""> (improved </span><i data-dcnode-id="2644"><span data-dcnode-id="2645" instrument_node="">Atlanta</span></i><span data-dcnode-id="2643" instrument_node="">) classes) incorporated fully protected CICs inside the armored box.  </span></p><span data-dcnode-id="2641" instrument_node="">
</span><p class="just" data-dcnode-id="2636"><span data-dcnode-id="2640" instrument_node="">As the war proceeded it became clear that the anti-aircraft capabilities of the cruisers had to be improved.  This improvement generally involved removing the unreliable 1.1-inch rapid fire AA machine gun (which was complex and developed a poor reputation in service</span><sup data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">xl</span></sup><span data-dcnode-id="2637" instrument_node="">) and replacing them with the foreign designed 40mm and 20mm AA guns, as well as adding as many 40mm and 20mm guns as could be fitted on the ship without over loading the hull.  Additionally, open bridges were added to allow improved aircraft sight lines for directing the AAW efforts. Many of the cruisers were critically close to being overweight, so to compensate for the additional AAW guns being installed, items had to be removed, such as one of the two aircraft catapults, range finders from some of the turrets, and reducing the height of the masts.  When the Japanese began using kamikaze tactics the need for heavier AA weapons became apparent.  In addition to adding more AA weapons, multiple AA fire control directors were added.  To improve the ability to engage crossing targets, AA guns (usually 40mm) were mounted in the bow and on the stern.  </span></p><span data-dcnode-id="2635" instrument_node="">
</span><p class="just" data-dcnode-id="2621"><span data-dcnode-id="2634" instrument_node="">A cruiser hull also had the speed, endurance, and capacity to perform as a light carrier.  Nine USN light cruisers (</span><i data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">Cleveland</span></i><span data-dcnode-id="2631" instrument_node=""> class) were converted to CVL's (small aircraft carriers) while under construction.  These 14,750 ton ships became the </span><i data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">Independence </span></i><span data-dcnode-id="2628" instrument_node="">class. While a small carrier was limited in how many aircraft it could support, the need for additional sea-based air platforms in WWII was very great.  This use of cruiser hulls recalled conversions performed by the Royal Navy in the WWI era on the battle cruisers </span><i data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">Courageous, Glorious </span></i><span data-dcnode-id="2625" instrument_node="">and</span><i data-dcnode-id="2623"><span data-dcnode-id="2624" instrument_node=""> Furious.  </span></i><span data-dcnode-id="2622" instrument_node="">The US CVL's used the original cruiser machinery and basic hull, bulged to improve stability, but had all their armament and superstructures removed.  A hangar deck and flight deck were added, with funnels trunked over to starboard and a small island.  Top speed was 31.6 knots. Many of these ships served along with fleet carriers in Pacific task forces.  After the war, they were quickly decommissioned because they were near their stability and volume limits at delivery.  </span></p><span data-dcnode-id="2620" instrument_node="">
</span><p class="just" data-dcnode-id="2612" id="LinkTarget_8628"><span data-dcnode-id="2619" instrument_node="">However, a second, </span><i data-dcnode-id="2617"><span data-dcnode-id="2618" instrument_node="">Saipan</span></i><span data-dcnode-id="2616" instrument_node=""> class of CVL's was also built, based on the </span><i data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">Baltimore </span></i><span data-dcnode-id="2613" instrument_node="">class heavy cruiser hull widened on paper prior to the start of construction.  These 19,100 ton ships had much more growth potential and served as carriers or command ships into the 1970's.  </span></p><span data-dcnode-id="2611" instrument_node="">
</span><h3 data-dcnode-id="2609"><span data-dcnode-id="2610" instrument_node="">5.4 New US Wartime Designs</span></h3><span data-dcnode-id="2608" instrument_node="">
</span><p class="just" data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">In addition to cruiser types that had been in production prior to the war, additional types were introduced during the conflict.  These were a specialized minelayer, the battle cruiser, new only to the US Navy, and the antiaircraft cruiser. Also, small aircraft carriers were built on cruiser hulls. </span></p><span data-dcnode-id="2605" instrument_node="">
</span><p class="just" data-dcnode-id="2589"><span data-dcnode-id="2604" instrument_node="">Many light cruisers were fitted with weather deck mine rails in order to dash into enemy coastal waters and lay down a disruptive string of mines.  The mission was so highly thought of that the UK, after a conversion of an existing cruiser (the </span><i data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">Adventure</span></i><span data-dcnode-id="2601" instrument_node="">), built the six ships of </span><i data-dcnode-id="2599"><span data-dcnode-id="2600" instrument_node="">Abdiel</span></i><span data-dcnode-id="2598" instrument_node=""> class of cruiser-minelayers just before the war. These 4,000 full load ton ships, fitted with six 4 in AA guns, carried 100-156 mines within their hull.  The ship did not do much offensive mine laying in WWII (that role taken over by airplanes) but were found to be excellent fast, heavily-armed transports for emergency shipments of ammunition through the blockade of Malta.</span><sup data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node="">xli </span></sup><span data-dcnode-id="2595" instrument_node="">Separately, the USN constructed the 8640 ton full load </span><i data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">Terror</span></i><span data-dcnode-id="2592" instrument_node=""> (CM 5) (Figure 14), armed with four 5inch guns and built to cruiser standards, in 1941 for offensive laying of up to 800-875 mines. </span><sup data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">xlii </span></sup></p><span data-dcnode-id="2588" instrument_node="">
</span><img alt="cruiser" data-dcnode-id="2587" height="264" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.navalmarinearchive.com/research/cruisers/cr_ims/cr_img_16.jpg&amp;raw" width="576"><span data-dcnode-id="2586" instrument_node="">
</span><p class="just" data-dcnode-id="2563"><span data-dcnode-id="2585" instrument_node="">Prior to the start of the war the Navy began design work on a 12-inch gun cruiser in response to a belief that Japan was planning to build a 12 or 14-inch gun cruiser.  This design work evolved into the </span><i data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">Alaska</span></i><span data-dcnode-id="2582" instrument_node=""> Class battle cruiser (CB); the designator actually means large cruiser, as distinct from the battle cruisers that were cancelled in 1922, but functionally these ships were battle cruisers.  Six CBs were planned, three were launched, but only two were commissioned.  The </span><i data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">Alaska</span></i><span data-dcnode-id="2579" instrument_node="">, CB 1, and </span><i data-dcnode-id="2577"><span data-dcnode-id="2578" instrument_node="">Guam</span></i><span data-dcnode-id="2576" instrument_node="">, CB 2 were launched in 1944 and saw action in the Pacific.  Both were used primarily to provide protection to the carrier task groups and also to provide naval gunfire support. Construction of the third CB, the </span><i data-dcnode-id="2574"><span data-dcnode-id="2575" instrument_node="">Hawaii</span></i><span data-dcnode-id="2573" instrument_node="">, CB 3, was suspended in February 1947 when she was about 80 percent complete.  These ships were suitable to counter the threat of the </span><i data-dcnode-id="2571"><span data-dcnode-id="2572" instrument_node="">Deutschland</span></i><span data-dcnode-id="2570" instrument_node=""> class </span><i data-dcnode-id="2568"><span data-dcnode-id="2569" instrument_node="">panzerschiffe</span></i><span data-dcnode-id="2567" instrument_node=""> and </span><i data-dcnode-id="2565"><span data-dcnode-id="2566" instrument_node="">Scharnhorst </span></i><span data-dcnode-id="2564" instrument_node="">class battleships but sources conflict on whether this was a consideration in their design. </span></p><span data-dcnode-id="2562" instrument_node="">
</span><p class="just" data-dcnode-id="2536"><span data-dcnode-id="2561" instrument_node="">In 1935, an experimental modernization was carried out on two British cruisers of WWI vintage, </span><i data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">Coventry </span></i><span data-dcnode-id="2558" instrument_node="">and </span><i data-dcnode-id="2556"><span data-dcnode-id="2557" instrument_node="">Curlew</span></i><span data-dcnode-id="2555" instrument_node="">. Their 6-inch main armament was removed and replaced by 4-inch antiaircraft weapons, "for use in the Mediterranean as AA escorts."</span><sup data-dcnode-id="2553"><span data-dcnode-id="2554" instrument_node="">xliii</span></sup><span data-dcnode-id="2552" instrument_node="">  The idea of a specialized AA ship gained surprising traction with the Admiralty (considering how little experience then existed to show how important AA defense was to a fleet).  A new 5.25-inch dual purpose gun was being developed for the new </span><i data-dcnode-id="2550"><span data-dcnode-id="2551" instrument_node="">King George V</span></i><span data-dcnode-id="2549" instrument_node=""> class battleships, and a new small cruiser was designed, the </span><i data-dcnode-id="2547"><span data-dcnode-id="2548" instrument_node="">Dido </span></i><span data-dcnode-id="2546" instrument_node="">class, to mount 5 twin turrets of these on some 6850 tons full load displacement.  These little ships had 62,000 SHP in a 4-screw power plant, good for 32-plus knots top speed and 4240 miles of range at 16 knots.  They were adapted from a more conventional light cruiser design, the </span><i data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">Arethusa</span></i><span data-dcnode-id="2543" instrument_node=""> class, already mentioned in the prewar section.  </span><i data-dcnode-id="2541"><span data-dcnode-id="2542" instrument_node="">Arethusas </span></i><span data-dcnode-id="2540" instrument_node="">were successful as flotilla leaders.  </span><i data-dcnode-id="2538"><span data-dcnode-id="2539" instrument_node="">Didos</span></i><span data-dcnode-id="2537" instrument_node=""> were ordered in 1939 and 16 were produced; however, production of the ships outstripped production of the 5.25-inch guns, and some were commissioned with only 4 turrets while others had a turret removed later. </span></p><span data-dcnode-id="2535" instrument_node="">
</span><img alt="" border="0" data-dcnode-id="2534" height="215" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.navalmarinearchive.com/research/cruisers/cr_ims/cr_img_17.jpg&amp;raw" width="600"><span data-dcnode-id="2533" instrument_node="">
</span><p class="just" data-dcnode-id="2522"><span data-dcnode-id="2532" instrument_node="">The American version of the antiaircraft cruiser is the </span><i data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">Atlanta</span></i><span data-dcnode-id="2529" instrument_node=""> (CL 51) class. While its armament resembled the </span><i data-dcnode-id="2527"><span data-dcnode-id="2528" instrument_node="">Dido's</span></i><span data-dcnode-id="2526" instrument_node=""> in photos with three twin turrets forward of the bridge, the actual layout was much different with a total of 8 dual purpose, 5inch/38 twin turrets.   The propulsion plant was also much different with twin screw, 75,000 SHP for a similar top speed of 32.5 knots.  Both ships were adequately armored – </span><i data-dcnode-id="2524"><span data-dcnode-id="2525" instrument_node="">Atlanta </span></i><span data-dcnode-id="2523" instrument_node="">had a 3.75-inch belt and 1.25-inch deck, with both being part of the hull girder; she was larger at 8340 tons full load. </span></p><span data-dcnode-id="2521" instrument_node="">
</span><p class="just" data-dcnode-id="2504"><span data-dcnode-id="2520" instrument_node="">Perhaps coincidentally, one of the intended functions of the CL 51 class was to replace aging </span><i data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">Omaha</span></i><span data-dcnode-id="2517" instrument_node=""> class flotilla leaders for use in destroyer warfare.  A flotilla leader protects destroyers against enemy surface and air attack while the destroyers carry out a torpedo attack against enemy capital ships.  The type, sometimes called a destroyer leader, originated with HMS </span><i data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">Swift</span></i><span data-dcnode-id="2514" instrument_node=""> in 1907. High speed is usual in flotilla leaders, and </span><i data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">Atlanta </span></i><span data-dcnode-id="2511" instrument_node="">was less outstanding than the </span><i data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">Omaha's</span></i><span data-dcnode-id="2508" instrument_node=""> had been in this respect.  However, her ability to protect against air attack was excellent.  Unlike most US cruisers of the period she was equipped with torpedo tubes and depth charges, reflecting her destroyer-like mission.  But, </span><i data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">Atlantas </span></i><span data-dcnode-id="2505" instrument_node="">were also intended as close screens for the battle line, protecting the capital ships against destroyer attack. </span></p><span data-dcnode-id="2503" instrument_node="">
</span><img alt="" border="0" data-dcnode-id="2502" height="479" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.navalmarinearchive.com/research/cruisers/cr_ims/cr_img_18.jpg&amp;raw" width="600"><span data-dcnode-id="2501" instrument_node="">
</span><p class="just" data-dcnode-id="2496"><span data-dcnode-id="2500" instrument_node="">In common with many other cruisers, the </span><i data-dcnode-id="2498"><span data-dcnode-id="2499" instrument_node="">Atlantas </span></i><span data-dcnode-id="2497" instrument_node="">were sometimes used for different functions from those for which they were designed.  As a result, two of them were sunk by Japanese cruisers and destroyers while formed up in a battle line of larger US cruisers on 13 November, 1942.  The class was most successful as part of the AAW screen around fast carriers, foreshadowing the function of later DL and DLG designs. </span></p><span data-dcnode-id="2495" instrument_node="">
</span><h3 data-dcnode-id="2493" id="LinkTarget_8655"><span data-dcnode-id="2494" instrument_node="">6. CRUISER DEVELOPMENT POST WWII TO EARLY 1960'S</span></h3><span data-dcnode-id="2492" instrument_node="">
</span><h3 data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">6.1 Post WWII Political Environment and Fleet Employment</span></h3><span data-dcnode-id="2489" instrument_node="">
</span><p class="just" data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">When World War II ended in 1945, it appeared that air power had been the decisive element in achieving victory in both European and Pacific theaters.  Strategic bombing, it was claimed, had weakened the German war machine to the point that the D-Day invasion could succeed, and in the Pacific, of course, the surrender of Japan resulted from the dropping of two nuclear bombs from high-flying heavy bombers. While traditional functions of sea power had also played a very important role in keeping lines of communication with Britain open in the Battle of the Atlantic, and in getting control of the Pacific from Japan, these activities were less dramatic and perhaps less obvious to the non-expert.  The aircraft carrier had entirely displaced the battleship as the capital ship of major navies for sea control activities, although the latter still were favored for shore bombardment and antiaircraft screening of the carriers. </span></p><span data-dcnode-id="2486" instrument_node="">
</span><p class="just" data-dcnode-id="2484"><span data-dcnode-id="2485" instrument_node="">At the conclusion of World War II the United States had a large fleet that included light and heavy cruisers in commission with several more under construction. During the postwar period that followed, the United States had to transition from a war footing to a cold-war period of peace.  Planners for the military budgets began to question the need for such a large navy. In response, U.S. Navy spokesmen pointed to the need to defend the homeland, to maintain the Monroe Doctrine, and to have the United States preserve the peace of the world.  However, President Harry S. Truman wanted to cut deficit spending and ordered defense funding slashed, while relying on nuclear technology to keep the peace.   Many ships were decommissioned and even those remaining in service were not always adequately manned. </span></p><span data-dcnode-id="2483" instrument_node="">
</span><p class="just" data-dcnode-id="2479"><span data-dcnode-id="2482" instrument_node="">Tensions with the Soviet Union led to new commitments overseas in the late 1940's. In the Mediterranean, traditionally dominated by the Royal Navy, the United States picked up the slack when Great Britain cut their forces there.  Cruisers and other ships made numerous port visits, showing the flag and demonstrating U.S. support to local governments threatened by the Communists.  This small initial force ultimately became the Sixth Fleet and was a major commitment for the Atlantic Fleet through the Cold War.</span><sup data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">xliv </span></sup></p><span data-dcnode-id="2478" instrument_node="">
</span><p class="just" data-dcnode-id="2474"><span data-dcnode-id="2477" instrument_node="">In the Far East, the mission of the pre-war Asiatic Fleet was continued by Naval Forces Far East, based in Japan, and the Seventh Fleet in the Philippines.  These were both much smaller than the names imply and each had a single cruiser assigned as a flagship.  With the outbreak of the Korean War, these cruisers, supplemented by Royal Navy cruisers based in the Far East, quickly began shore bombardment duties, supporting the lightly equipped troops ashore.</span><sup data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">xlv </span></sup></p><span data-dcnode-id="2473" instrument_node="">
</span><h3 data-dcnode-id="2471" id="LinkTarget_8662"><span data-dcnode-id="2472" instrument_node="">6.2 Surface Warfare and Shore Bombardment Missions</span></h3><span data-dcnode-id="2470" instrument_node="">
</span><p class="just" data-dcnode-id="2468"><span data-dcnode-id="2469" instrument_node="">In this environment, it is ironic that in spite of budget cuts following the war, cruisers continued to be built, and some of them were intended for traditional cruiser missions. The reason for this was that during the war, the Bureau of Ships (BuShips, founded in 1940 from consolidation of the Bureau of Construction and Repair and the Bureau of Engineering) continued designing improved cruisers incorporating the lessons learned through war experience.  Freed from Treaty tonnage limits although still concerned about the rapid increase in ship size, BuShips designers attempted to improve main armament performance and survivability compared to the wartime "Tinclads."  Experience in night battles in the Solomon Islands showed that the lower rate of fire of 8-inch guns made it difficult to hit a high speed, maneuvering target, while 6-inch guns were deficient in range.   </span></p><span data-dcnode-id="2467" instrument_node="">
</span><h3 data-dcnode-id="2462"><span data-dcnode-id="2466" instrument_node="">6.2.1 Culmination of the Heavy Cruiser's Evolution: </span><i data-dcnode-id="2464"><span data-dcnode-id="2465" instrument_node="">Des Moines</span></i><span data-dcnode-id="2463" instrument_node=""> Class</span></h3><span data-dcnode-id="2461" instrument_node="">
</span><p class="just" data-dcnode-id="2456"><span data-dcnode-id="2460" instrument_node="">The key to the postwar heavy cruiser design was the fully automatic 8-inch 55cal. gun.  The Bureau of Ordnance (BuOrd), even prior to the war, had been working on larger guns firing cased ammunition, a 6-inch 47 dual purpose, and later (May 1943) the 8-inch 55.</span><sup data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">xlvi</span></sup><span data-dcnode-id="2457" instrument_node="">  The automatic loading equipment allowed a much higher rate of fire (7 rounds per minute per barrel by design, about twice what previous heavy cruisers could achieve); reloading could occur at any elevation, giving even this major caliber gun a limited antiaircraft capability. </span></p><span data-dcnode-id="2455" instrument_node="">
</span><p class="just" data-dcnode-id="2450"><span data-dcnode-id="2454" instrument_node="">In the design of the new heavy cruiser, both length and beam were allowed to increase to handle the added weight of the new gun turrets and better protection. Power remained the same at 120,000 SHP through 4 shafts, but because the hull was so much larger, it was possible to re-arrange the machinery spaces to have one boiler and one turbine set in each, similar to contemporary battleship practice.  Increased length of the hull reduced the wave drag enough that there was little effect on speed in spite of the increase in displacement compared to </span><i data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">Oregon City</span></i><span data-dcnode-id="2451" instrument_node=""> class cruisers.  The new machinery arrangement provided increased redundancy with reduced need for cross connects that could be damaged in the destroyer (and previous cruiser) arrangement "in echelon", where boiler rooms and engine rooms alternated (usually, in cruisers, with two turbine sets per engine room).  In addition, subdivision bulkheads within the central citadel were extra-thick at .75 inch and made of STS, highly resistant to splinters. The armor belt was 6 inch to 4 inch in thickness, with 5-inch bulkheads at fore and aft ends of the citadel, and a 3.5 -inch protective deck with, as in US battleships, a 1-inch "bursting deck" over it.  Internal subdivision was elaborate even above the V-lines, where an extensive series of fire doors could isolate damaged areas. </span></p><span data-dcnode-id="2449" instrument_node="">
</span><p class="just" data-dcnode-id="2447"><span data-dcnode-id="2448" instrument_node="">Like most World War II cruisers, the aircraft hangar was in the stern to reduce the risk of gasoline-fueled fires such as those that had engulfed many US cruisers in the surface actions of the war.  The hangar was accessed through a deck hatch with the aircraft lowered into it by a crane.  Two catapults were provided in the original design, but seem never to have been installed.  By 1948 the Sikorsky HO3S helicopter had begun to supplement the floatplanes on cruisers and had completely replaced them by 1949. The ships spent most of their sea time using the afterdeck as a boat facility (the aircraft crane served admirably for launching and recovering boats).  Scouting functions had shifted to aircraft carriers. </span></p><span data-dcnode-id="2446" instrument_node="">
</span><p class="just" data-dcnode-id="2429"><span data-dcnode-id="2445" instrument_node="">By the time the name-ship </span><i data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">Des Moines</span></i><span data-dcnode-id="2442" instrument_node=""> was commissioned (November 1948), the probability of a surface action with enemy cruisers was very small.  However, the three-ship class was admirably suited as fleet flagships and for shore bombardment.  All three ships served as flagships of the Sixth Fleet.  Only </span><i data-dcnode-id="2440"><span data-dcnode-id="2441" instrument_node="">Newport News </span></i><span data-dcnode-id="2439" instrument_node="">(CA 148), commissioned in Jan 1949, used her big guns extensively, and that was on the gun line in Vietnam. </span><i data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">Newport News</span></i><span data-dcnode-id="2436" instrument_node=""> and </span><i data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">Salem</span></i><span data-dcnode-id="2433" instrument_node=""> (CA 138) were air conditioned; the name-ship </span><i data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">Des Moines</span></i><span data-dcnode-id="2430" instrument_node=""> (CA 134) was not. </span></p><span data-dcnode-id="2428" instrument_node="">
</span><p class="just" data-dcnode-id="2420"><span data-dcnode-id="2427" instrument_node="">As classic heavy cruisers, these ships displayed superior firepower, speed, seakeeping, and protection.  They could have served as anti-surface raider screens for convoys or task forces in World War II type combat, although they lacked the speed to escape from the fastest of WWII battleships at 32+ knots on trials, and could not stand up to a </span><i data-dcnode-id="2425"><span data-dcnode-id="2426" instrument_node="">Deutschland</span></i><span data-dcnode-id="2424" instrument_node=""> or </span><i data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">Scharnhorst </span></i><span data-dcnode-id="2421" instrument_node="">class surface raider.  They did good service as flagships and were effective in shore bombardment, although for that mission it is questionable if the rapid fire feature of their big guns was of much benefit.  It should be noted that their ammunition capacity was not enhanced compared to WWII production heavy cruisers.  In fact, they were obsolescent at commissioning. </span></p><span data-dcnode-id="2419" instrument_node="">
</span><h3 data-dcnode-id="2417" id="LinkTarget_8677"><span data-dcnode-id="2418" instrument_node="">6.3 Task Force Air Defense Mission</span></h3><span data-dcnode-id="2416" instrument_node="">
</span><p class="just" data-dcnode-id="2414"><span data-dcnode-id="2415" instrument_node="">With the emergence of air power as the trump card in American military strategy, and the "revolt of the admirals" having been put down, naval carrier task forces assumed a tactical role equivalent to battleships in Mahan's classical doctrine. Both in blue water operations and in power projection missions where air strikes would be launched from the carrier against shore targets, there was an important anti-air warfare (AAW) role for screening ships to protect the carrier from enemy air attacks. Naturally, a carrier could launch short range fighters to provide air cover, but not in all weather conditions in which shore based aircraft could attack.  In World War II it became clear that a carrier group needed a deeper defense with surface ships equipped with radar and AAW weapons spread out around the carrier. </span></p><span data-dcnode-id="2413" instrument_node="">
</span><p class="just" data-dcnode-id="2399"><span data-dcnode-id="2412" instrument_node="">During this period the U.S. Navy also recognized the need to respond to new technology, the anti-ship missile and faster aircraft.  During the summer of 1943 the Germans introduced the FX-1400 air-launched, radio-controlled anti-ship missile.  These missiles weighed about 3,000 pounds and when launched from the correct height could attain a terminal velocity of 800 feet per second, similar to an artillery shell.  On 9 September 1943, the Italian Fleet was on its way to surrender to the Allies in Malta when one of Italy's newest battleships, </span><i data-dcnode-id="2410"><span data-dcnode-id="2411" instrument_node="">Roma,</span></i><span data-dcnode-id="2409" instrument_node=""> was hit with one of these missiles that caused one of the forward main gun magazines to explode.  The battleship broke in two and sank. Another exploded alongside the new battleship </span><i data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">Littorio,</span></i><span data-dcnode-id="2406" instrument_node=""> damaging its shell plating. During the invasion of Salerno the U.S. light cruiser </span><i data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">Savannah</span></i><span data-dcnode-id="2403" instrument_node=""> was struck by one of these missiles on 11 September 1943.  Although the missile exploded in the magazines of No. 3 turret, inrushing water prevented further explosions.  On 16 September 1943 the British battleship </span><i data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">Warspite</span></i><span data-dcnode-id="2400" instrument_node=""> was hit by two missiles off Salerno, one that passed through all decks, including the armor deck, and through Boiler Room No. 4, finally exploding in the double bottom.  This caused severe damage to the under bottom structure. A second bomb exploded in the water alongside Boiler Room No. 5, causing damage to the shell plating.  </span></p><span data-dcnode-id="2398" instrument_node="">
</span><p class="just" data-dcnode-id="2394"><span data-dcnode-id="2397" instrument_node="">Experience of Kamikaze attacks in World War II showed that for an airplane diving into a ship with the intention of crashing, an attack profile that resembled a guided missile's, hitting it with the short range AA guns of the period was not enough. The 40-mm Bofors mounts had an effective range of 2,500 to 3,000 yards.  The 20-mm Oerlikon was effective against aircraft at less than 1,000 yards. A direct hit from a 20 or 40-mm shell caused the kamikaze to break up, but the pieces continued on in a ballistic trajectory along with the burning fuel to hit the defending ship.  Even within this limited range, the majority of shells fired would still miss their intended target; 400 to 500 rounds of 40-mm was needed to achieve a kill.  It was necessary to hit the attacking aircraft when it was further away from the ship than the effective range of these smaller weapons of World War II. The 5-inch 38 had an effective range of 7,000 to 10,000 yards, and it could reliably stop a Kamikaze before it entered its final dive.  Its effectiveness increased by about a factor of five when the Variable Time/proximity (VT) fuse was introduced.</span><sup data-dcnode-id="2395"><span data-dcnode-id="2396" instrument_node="">xlvii </span></sup></p><span data-dcnode-id="2393" instrument_node="">
</span><p class="just" data-dcnode-id="2391"><span data-dcnode-id="2392" instrument_node="">The Japanese were also working on a "Baka" bomb, a manned suicide missile patterned on the German V-1 that because of its higher speed represented even a greater threat.  This combat experience drove the development of a number of new AA weapons that came into use in the postwar period.  One was the 3"/50 gun, chosen both for its longer effective range compared to the 40-mm guns it replaced and for its ability to carry the VT fuse.  </span></p><span data-dcnode-id="2390" instrument_node="">
</span><p data-dcnode-id="2387" id="LinkTarget_8689"><strong data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">6.3.1 	The Antiaircraft Cruiser</span></strong></p><span data-dcnode-id="2386" instrument_node="">
</span><p class="just" data-dcnode-id="2372"><span data-dcnode-id="2385" instrument_node="">Antiaircraft cruisers evolved during World War II and were discussed in a previous section.  The automatic 6-inch 47 gun mentioned earlier was mainly inspired by the need for a heavier, longer range AAW gun to attack heavy land-based bombers, then anti-ship missiles.  Accordingly, BuShips developed a new antiaircraft cruiser around this high angle gun.  However, the new cruiser proved to be much bigger than its 8500 ton predecessor. Because of the greater size of the turrets and the increased protection and sturdier construction incorporating war experience, the new ship was actually close to 18,000 tons, with the same power as the contemporary heavy cruiser (wartime light cruisers had been found to be slower than predicted, so more speed was another requirement for keeping station on a carrier).  There was no secondary battery, since the six twin turrets for the main armament were dual purpose, greatly simplifying fire direction.  Only two were built, </span><i data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">Worcester </span></i><span data-dcnode-id="2382" instrument_node="">(CL 144) and </span><i data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">Roanoke </span></i><span data-dcnode-id="2379" instrument_node="">(CL 145).  They were commissioned in 1948 and 1949 respectively and served only until 1958, being maintained in mothballs for a substantial time after that. The gun-armed antiaircraft cruiser proved to be a dead end in cruiser design.  The large automatic gun turned out to be unreliable, and as aircraft speeds increased and smaller, more agile fighter-bombers became more common, it became apparent that missiles or smaller guns were a better bet to defend the task force against air attack.  The </span><i data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">Worcester </span></i><span data-dcnode-id="2376" instrument_node="">class was obsolete when commissioned, and because of its low freeboard (an attempt to reduce the ships' huge size), had a reputation for being wet.  They did not, like the </span><i data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">Des Moines </span></i><span data-dcnode-id="2373" instrument_node="">class, find a secondary mission they could take over to prolong their useful lives. </span></p><span data-dcnode-id="2371" instrument_node="">
</span><img alt="cruiser" data-dcnode-id="2370" height="333" id="LinkTarget_8693" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.navalmarinearchive.com/research/cruisers/cr_ims/cr_img_19.jpg&amp;raw" width="576"><span data-dcnode-id="2369" instrument_node="">
</span><p data-dcnode-id="2366"><strong data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node="">6.3.2 	Missile developments</span></strong></p><span data-dcnode-id="2365" instrument_node="">
</span><p class="just" data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">Towards the end of World War II, in both theaters of the war, serious airborne threats appeared. In the European theater, the Germans deployed guided glider bombs (previously mentioned) that made it possible for a bomber to attack a ship without coming very close to it.  In the Pacific, the Japanese Kamikazes showed how much damage a guided missile could do if it hit a ship, as well as how much harder it was to shoot down the attackers compared to conventional bombers.  Since an aircraft carrier, especially in that time period when instrument flight was in its infancy and the carriers were much smaller than they are today, might under some weather conditions be unable to launch fighters, AAW capability in the surface screen was essential.  And with the new stand-off threat coupled with the indifferent performance of the 6-inch/47 automatic gun, it was evident well before 1950 that surface to air missiles were one promising answer.  Surface to surface missiles were also shown to be effective by experience with the German V-1 and V-2. </span></p><span data-dcnode-id="2362" instrument_node="">
</span><p class="just" data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">By 1944, a "Project Bumblebee" existed at the Applied Physics Lab (APL), to develop a ramjet-powered surface to air missile (SAM), eventually to see production as the Talos. Rear Adm. H. G. Bowen, who also had had a role in the 600-psi steam plant development before the war, headed the Navy's R &amp; D office in the postwar period.  He recognized that SAM's would require extensive ship volume to deploy.  Destroyers of the time were too small, battleships had more weight-carrying capacity than cruisers without so much more enclosed volume.  Cruisers seemed adequate to the task and, more important, there were a large number of them that were no longer needed for traditional cruiser missions with the disappearance of an enemy surface fleet. Battleship conversions would also have involved removal of some heavy armor to provide large enough spaces for missile handling; this would compromise survivability. By 1955-6, the Terrier missile would be ready to enter service after a high priority development program at APL and the Navy Research Lab (NRL). </span></p><span data-dcnode-id="2359" instrument_node="">
</span><p class="just" data-dcnode-id="2357"><span data-dcnode-id="2358" instrument_node="">A very serious drawback to the whole concept of a SAM was (and is) that in order for the missile to find its target, an incoming aircraft at first and later an incoming missile that could be much smaller, it was necessary to have a long range, high accuracy radar to find the target far enough away to give time to achieve a firing solution.  Also, a fire control radar (that could be the same device) had to track the SAM and the target during the flight of the SAM and either give the latter command guidance, or provide enough information that the SAM's warhead could calculate interception courses and guide itself to the target.  This led to enormous demands for complexity in the ship's electronic installation, and also to substantial electronic "smarts" in the missile itself, so that a small weapon could not contain the necessary equipment. The large size of the warhead dictated rather a big missile, with dire results in terms of high cost and large volumes required to install it in a ship.  Needless to say, there's only so much complexity that can be put into something that will only be used once.  And as hardware evolved, it became apparent that early SAM's were not very accurate or reliable. </span></p><span data-dcnode-id="2356" instrument_node="">
</span><h3 data-dcnode-id="2353" id="LinkTarget_8700"><strong data-dcnode-id="2354"><span data-dcnode-id="2355" instrument_node="">6.3.3 Electronics</span></strong></h3><span data-dcnode-id="2352" instrument_node="">
</span><p class="just" data-dcnode-id="2350"><span data-dcnode-id="2351" instrument_node="">One of the most significant developments in post-World War II cruiser design were the rapid advancements in electronics, both radar and sonar, that would be able to detect threats at longer ranges than had been possible in World War II.  The growth in electronic equipment had significant effects on ship size, configuration, powering, and cost.  All of the electronics and weapons had to be controlled by the ship's Command and Control system.  This greatly increased the volume of electronic spaces for communications, computers, and control equipment, particularly in the Combat Information Center (CIC).  This was important because with the increased speeds of the submarine, small missile boats, missiles, and aircraft, targets had to be identified at greater distances from the ship.  This also required correct placement of this equipment and antennas to minimize interference with each other.  The radiation emitted by these more powerful radars presented an increased hazard to personnel, restricting the admissible locations of the antennas and complicating superstructure and mast arrangements.  All of these topside electronic devices, guided missile installations, and the larger superstructures to support and house them resulted in higher vertical centers of gravity, affecting stability of the ship.  Therefore, aluminum superstructures were used in cruisers, destroyers, and frigates to reduce topside weight.  Topside weight also tended to lead to larger beam, changing the proportions of the ships. </span></p><span data-dcnode-id="2349" instrument_node="">
</span><p data-dcnode-id="2346" id="LinkTarget_8706"><strong data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">6.3.4 	Missile Cruiser Conversions</span></strong></p><span data-dcnode-id="2345" instrument_node="">
</span><p class="just" data-dcnode-id="2328"><span data-dcnode-id="2344" instrument_node="">Conversion plans were developed for the battle cruiser </span><i data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">Hawaii</span></i><span data-dcnode-id="2341" instrument_node=""> and the unfinished battleship </span><i data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">Kentucky.</span></i><span data-dcnode-id="2338" instrument_node="">  These plans were cancelled as it became apparent that the missiles were not sufficiently mature.  </span><i data-dcnode-id="2336"><span data-dcnode-id="2337" instrument_node="">Boston</span></i><span data-dcnode-id="2335" instrument_node=""> and </span><i data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">Canberra</span></i><span data-dcnode-id="2332" instrument_node="">, two </span><i data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">Baltimore-</span></i><span data-dcnode-id="2329" instrument_node="">class heavy cruisers from WWII production, were converted to CAG 1 and 2 respectively in 1952. Each ship had two Terrier launchers in X and Y (aft) positions, retaining A and B turrets with the original 8-inch guns.  The aft 8-inch turret (including its armored barbette) and the aft 5-inch /38 twin had been removed.  A lattice foremast carried an SPS-8 height-finding radar, while a new pole mainmast carried a CXRX hemispheric scan radar used for missile target acquisition.  Aft of that there were two illuminators; only two missiles could be airborne at a time, even though each launcher was doublearm.  Evidently, this was not a very good solution and could easily be saturated by even a small attack. </span></p><span data-dcnode-id="2327" instrument_node="">
</span><p class="just" data-dcnode-id="2310"><span data-dcnode-id="2326" instrument_node="">Next, BuShips sought a conversion candidate for the larger, ramjet-powered Talos missile.  The Talos antiaircraft missile was a long-range, ramjet, beam-riding surface to air missile with semi-active terminal homing; it was introduced in 1957.  The Talos missile was therefore larger than Terrier and called for even more elaborate guidance equipment.  Because of a belief, which seems rather irrational in hindsight, that there would eventually be numerous Talos conversions, the few heavy cruisers available were considered unsuitable for conversion because they didn"t provide a sufficient number of identical hulls.  Therefore, the Bureau picked the </span><i data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">Cleveland</span></i><span data-dcnode-id="2323" instrument_node=""> class light cruisers, all of them in reserve by this time, as candidates.  The first to be converted was </span><i data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">Galveston</span></i><span data-dcnode-id="2320" instrument_node="">, recommissioned in 1958</span><i data-dcnode-id="2318"><span data-dcnode-id="2319" instrument_node="">.</span></i><span data-dcnode-id="2317" instrument_node=""> The other two ships with similar conversions differed in that they had flag facilities; they were </span><i data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">Little Rock</span></i><span data-dcnode-id="2314" instrument_node=""> and </span><i data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node="">Oklahoma City</span></i><span data-dcnode-id="2311" instrument_node=""> (1960). In these conversions, the two aft 6-inch turrets and three aft 5–inch turrets were removed and a complete new aft superstructure was provided to house the missiles and guidance radars.  New search radars were also installed.  In the flag conversions, B turret was removed and two of the forward 5-inch guns were removed; one 5-inch twin was mounted in B position and the superstructure was expanded to provide accommodation. </span></p><span data-dcnode-id="2309" instrument_node="">
</span><p class="just" data-dcnode-id="2292"><span data-dcnode-id="2308" instrument_node="">Similar conversions were performed for Terrier from identical </span><i data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">Cleveland </span></i><span data-dcnode-id="2305" instrument_node="">class hulls, </span><i data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">Providence, Springfield, </span></i><span data-dcnode-id="2302" instrument_node="">and</span><i data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node=""> Topeka.</span></i><span data-dcnode-id="2299" instrument_node="">  These differed from the </span><i data-dcnode-id="2297"><span data-dcnode-id="2298" instrument_node="">Boston</span></i><span data-dcnode-id="2296" instrument_node=""> class in that they mounted only one Terrier launcher aft, but had substantially better electronics, including two missile control radars (one per launcher arm).  The light cruiser hulls were smaller than the </span><i data-dcnode-id="2294"><span data-dcnode-id="2295" instrument_node="">Baltimore</span></i><span data-dcnode-id="2293" instrument_node=""> class hull, and therefore could not support two launchers. </span></p><span data-dcnode-id="2291" instrument_node="">
</span><p class="just" data-dcnode-id="2280"><span data-dcnode-id="2290" instrument_node="">The air threat to a task force was still a dominant element in US strategic thinking, while the long term need for gunfire support had yet to register before Vietnam.  Also, actual missile combat experience was lacking, so that decision makers tended to believe the claims of a high kill ratio made by SAM proponents.  Accordingly, in 1962, the US commissioned its first "double-ended and double-sided" missile conversion of a heavy cruiser. This </span><i data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">Albany </span></i><span data-dcnode-id="2287" instrument_node="">class of 3 ships (two additional sisters were cancelled) had no guns at all as designed.  Two of these were </span><i data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">Oregon City</span></i><span data-dcnode-id="2284" instrument_node=""> class ships, (CA 123 and CA136), and one was </span><i data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">Baltimore </span></i><span data-dcnode-id="2281" instrument_node="">class (CA 74), all commissioned 1945-6 and identical after conversion.  With a futuristic superstructure of enormous height and the funnels and masts integrated into "macks", the main armament was Talos with launchers fore and aft, and Tartar, a new smaller missile, mounted in wing launchers port and starboard of the fore superstructure.  The Tartar supersonic surface-to-air missile was developed in the 1950's primarily for destroyers, and was designed to attack low altitude, high-speed threats.  Later improvements in the Tartar missile extended the range from 7.5 to 18 miles.  Tartar was later superseded by the Standard 1 (MR) missile. </span></p><span data-dcnode-id="2279" instrument_node="">
