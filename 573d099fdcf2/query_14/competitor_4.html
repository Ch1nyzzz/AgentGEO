</span><img alt="cruiser" data-dcnode-id="2278" height="475" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.navalmarinearchive.com/research/cruisers/cr_ims/cr_img_20.jpg&amp;raw" width="592"><span data-dcnode-id="2277" instrument_node="">
</span><p class="just" data-dcnode-id="2266" id="LinkTarget_8720"><span data-dcnode-id="2276" instrument_node="">These ships were intended to mount the Regulus surface to surface missile, but ASROC was substituted during construction in the space between the fore and aft superstructures; after completion, two 5-inch 38's were added amidships.  These ships were successful; </span><i data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">Chicago</span></i><span data-dcnode-id="2273" instrument_node=""> was credited with shooting down a MiG fighter at a range of 48 miles, off Vietnam in 1972.  </span><i data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">Albany</span></i><span data-dcnode-id="2270" instrument_node=""> was modernized in 1973-74, and became flagship of the Second Fleet afterwards</span><sup data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">xlviii</span></sup><span data-dcnode-id="2267" instrument_node="">. </span></p><span data-dcnode-id="2265" instrument_node="">
</span><p class="just" data-dcnode-id="2262"><strong data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node="">6.3.5 	DLG evolution</span></strong></p><span data-dcnode-id="2261" instrument_node="">
</span><p class="just" data-dcnode-id="2241"><span data-dcnode-id="2260" instrument_node="">The DLG 6 (</span><i data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">Farragut)</span></i><span data-dcnode-id="2257" instrument_node=""> class (also sometimes referred to as the </span><i data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">Coontz</span></i><span data-dcnode-id="2254" instrument_node=""> [DLG 9] class) was a continuation of the US response to the Soviet air threat to the carrier task force.  In parallel with the cruiser SAM installations, more launch platforms were needed to deal with the saturation attacks that might be possible in the late 1950's. Accordingly, tests of a Terrier installation on a </span><i data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">Gearing</span></i><span data-dcnode-id="2251" instrument_node=""> class destroyer were performed, and a follow-on to the DL 2 design (see the ASW section below) was proposed as an AAW frigate for task force defense.  Whether the DL 2 should be considered a destroyer or a cruiser might be argued, but in the DLG 6 design the size of the ship increased substantially, driven by the volume, weight, and electric power demands of the new, smaller Terrier system as well as by the need for high speeds in rougher sea states to overcome drawbacks to the World War II-era destroyers that, in their postwar overloaded condition, often could not keep station on the postwar carriers of the </span><i data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">Midway </span></i><span data-dcnode-id="2248" instrument_node="">and </span><i data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">Forrestal </span></i><span data-dcnode-id="2245" instrument_node="">classes. At the same time, ASW developments continuing the evolution of the CLK 1 (see below) created a larger, lower-frequency sonar and a weapon to take advantage of it, the Anti-Submarine ROCket (ASROC).  Both of these devices called for additional ship size to support their hydrodynamic drag, weight, and volume.  Early on in the design process, a BuShips footnote remarks that "installing the SQS-4 sonar on a CLAA class will give similar capabilities,"</span><sup data-dcnode-id="2243"><span data-dcnode-id="2244" instrument_node="">xlix</span></sup><span data-dcnode-id="2242" instrument_node=""> showing that designers of the time were well aware that they were entering cruiser territory. </span></p><span data-dcnode-id="2240" instrument_node="">
</span><p class="just" data-dcnode-id="2235" id="LinkTarget_8726"><span data-dcnode-id="2239" instrument_node="">The DLG 6 class commissioned starting in 1960 with a twin-arm Terrier launcher aft, a 5-inch /54 gun in A position, an ASROC "pepper box" launcher in B position, and to begin with, SPQ-55 illuminators for beam-riding control of the missiles.  This missile installation was less capable, both in guidance and in magazine capacity (40 rounds) compared to the cruiser conversions.  Two secondary 3-inch /50 guns were also carried. </span><i data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">Farragut </span></i><span data-dcnode-id="2236" instrument_node="">turned in an excellent performance on sea trials, running above 33 knots on essentially her designed power of 85,000 SHP at 5450 tons, only slightly below full load displacement of 5648 tons.  Design speed was 32 knots. </span></p><span data-dcnode-id="2234" instrument_node="">
</span><p class="just" data-dcnode-id="2229"><span data-dcnode-id="2233" instrument_node="">While </span><i data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">Farragut </span></i><span data-dcnode-id="2230" instrument_node="">class ships were never designated as cruisers (they were eventually redesignated as DDG's or guided missile destroyers), they are a link between the later DLG's that were redesignated as cruisers in 1975 and the wartime antiaircraft cruisers and have been included in this account. </span></p><span data-dcnode-id="2228" instrument_node="">
</span><h3 data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">6.4 Antisubmarine Warfare Mission</span></h3><span data-dcnode-id="2225" instrument_node="">
</span><p class="just" data-dcnode-id="2219"><strong data-dcnode-id="2220"><span data-dcnode-id="2224" instrument_node="">6.4.1 	The Hunter-Killer Cruiser </span><i data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">Norfolk</span></i><span data-dcnode-id="2221" instrument_node=""> (CLK 1)</span></strong></p><span data-dcnode-id="2218" instrument_node="">
</span><p class="just" data-dcnode-id="2213"><span data-dcnode-id="2217" instrument_node="">The end of World War II also produced new, deadlier submarine threats.  Late U-boats of the Type 21 (somewhat like the USN's postwar "Guppy" conversions, with better streamlining, more battery power, and a snorkel for charging batteries at periscope depth), and Walter type (powered when submerged by hydrogen peroxide, requiring no air for propulsion) had much higher submerged speed than wartime production models.  Postwar, the US Navy discovered that U-boats had had greater depth capability than our submarines, and the high-tech late U-boats were also deep divers.  The Type 21 had a maximum depth of over 900 feet.</span><sup data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">l</span></sup><span data-dcnode-id="2214" instrument_node="">  Like the late war airborne threats, these late war submarine threats suggested that World War II type escorts were inadequate and that new kinds of antisubmarine warfare (ASW) ships would have to be created. </span></p><span data-dcnode-id="2212" instrument_node="">
</span><p class="just" data-dcnode-id="2198"><span data-dcnode-id="2211" instrument_node="">One type was the "hunter-killer cruiser", using the new designation CLK. The Bureau of Ships developed the design from the wartime </span><i data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">Atlanta</span></i><span data-dcnode-id="2208" instrument_node=""> antiaircraft cruiser.  Its main features were large size and good seakeeping so that even in bad weather it could overhaul a 25-knot submarine.  It was to be armed with new, trainable Weapon Able (or Alpha) ASW rocket mounts whose size and ship impact was similar to a medium caliber gun turret, as well as homing torpedoes and an elaborate sonar for targeting.  All these features led to rather a cruiser-size ship, which is why BuShips picked </span><i data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">Atlanta</span></i><span data-dcnode-id="2205" instrument_node=""> as the starting point.  The ship had a double bottom that went up to the second deck – clearly a cruiser rather than destroyer feature.  The two machinery units were separated by 20 feet to improve survivability.  The ship was finally commissioned as USS </span><i data-dcnode-id="2203"><span data-dcnode-id="2204" instrument_node="">Norfolk </span></i><span data-dcnode-id="2202" instrument_node="">in 1953. She had four twin 3-inch /70 turrets as "main" armament, but the four Weapon A launchers and eight torpedo tubes were really her reason for being.  At 520 feet LWL and 6600 tons, this was a small cruiser even compared to its WWII prototype, with a twin 80,000 SHP powerplant that resembled the </span><i data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">Atlanta's</span></i><span data-dcnode-id="2199" instrument_node=""> except that it was 1200 psi. However, compared to wartime destroyers then in service which were in the 3000 ton range, it was something more than a destroyer. </span></p><span data-dcnode-id="2197" instrument_node="">
</span><p class="just" data-dcnode-id="2186"><span data-dcnode-id="2196" instrument_node="">The designator CLK 1 didn"t last long. The new category was abolished in 1951, and </span><i data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">Norfolk</span></i><span data-dcnode-id="2193" instrument_node=""> was redesignated as DL 1, with the </span><i data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">Mitscher</span></i><span data-dcnode-id="2190" instrument_node=""> class (formerly DD 927, a 4500 ton AAW destroyer of about the same date as </span><i data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">Norfolk</span></i><span data-dcnode-id="2187" instrument_node="">) becoming DL 2-5.  The new designator DL stood for "Destroyer Leader" – a term dating from before World War I, referring at that time to a destroyer flotilla leader.  But, in the postwar US Navy, the DL designator was associated with the term "frigate", and meant a type intermediate between destroyer and cruiser, functioning as a multi-role task group escort.  This designator continued to be used for mainly AAW battle group escorts into the 1970's. The confused terminology did not conceal the reality that a more cruiser-like ship was needed for both fleet AAW and ASW defense in the postwar era. </span></p><span data-dcnode-id="2185" instrument_node="">
</span><h3 data-dcnode-id="2183" id="LinkTarget_8735"><span data-dcnode-id="2184" instrument_node="">6.5 Command Cruiser Mission</span></h3><span data-dcnode-id="2182" instrument_node="">
</span><p class="just" data-dcnode-id="2179"><strong data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">6.5.1 	CA/CLG/CG Fleet Flagships</span></strong></p><span data-dcnode-id="2178" instrument_node="">
</span><p class="just" data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">In addition to the specialized command cruisers discussed in the next ship, WWII built cruisers served as flagships for the various numbered fleets until they reached the end of their service lives and were decommissioned in the 1960's and 1970's. The ships used in this role had extra volume built into their superstructures (with some armament removed as weight and moment compensation) to accommodate the staff and equipment.  They presented an impressive, powerful appearance, useful in showing the flag in foreign countries. </span></p><span data-dcnode-id="2175" instrument_node="">
</span><img alt="cruiser" data-dcnode-id="2174" height="489" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.navalmarinearchive.com/research/cruisers/cr_ims/cr_img_21.jpg&amp;raw" width="569"><span data-dcnode-id="2173" instrument_node="">
</span><p data-dcnode-id="2170" id="LinkTarget_8743"><strong data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">6.5.2 	Command Cruisers </span></strong></p><span data-dcnode-id="2169" instrument_node="">
</span><p class="just" data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">As aircraft range and speed and ship-mounted sensors' detection capabilities increased following World War II, coordinating the activity of a carrier group became more complicated.  Better facilities were required to sort through the detection and intelligence data, with additional personnel to select targets and manage fleet ships and aircraft in defense and offense in a coordinated manner.  If this facility was to stay with the carrier, it had to be on a high speed ship, and a rather large ship at that.  While one might suppose that the development of computers could in principle reduce the manpower required for these command functions, the space required for computers and sensors continued to increase in this time period, leading to a cruiser size ship being needed to perform the command ship function.  It is implicit in this description that the Admiral and his staff would be embarked on the command ship, which could act as the nerve center of the fleet. </span></p><span data-dcnode-id="2166" instrument_node="">
</span><p class="just" data-dcnode-id="2155"><span data-dcnode-id="2165" instrument_node="">In 1945, work had been stopped on the </span><i data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">Oregon City</span></i><span data-dcnode-id="2162" instrument_node=""> class heavy cruiser </span><i data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">Northampton,</span></i><span data-dcnode-id="2159" instrument_node=""> then some 54% complete. She was ordered completed as an AGC (amphibious group flagship)</span><sup data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">li</span></sup><span data-dcnode-id="2156" instrument_node=""> with fleet flagship capabilities. The ship was commissioned as CLC 1 in 1953.  She had been totally transformed from the original design, with an additional deck, a much reduced armament (four 5-inch /54's in single mounts, plus 3-inch /70's and 20-mm secondary batteries), and an extensive suite of radars and radios. Although amphibious assaults also needed sophisticated coordination, a high speed hull was not required for this mission.   </span></p><span data-dcnode-id="2154" instrument_node="">
</span><p class="just" data-dcnode-id="2149"><span data-dcnode-id="2153" instrument_node="">A subtext of the development of the command cruiser is the evolution of the aircraft carrier.  These ships, as their airplanes became bigger and heavier, were becoming overloaded, even as BuShips policy discouraged them from increasing too much in size in order to avoid an expensive infrastructure investment such as new drydocks and harbor dredging.  Also, in the immediate postwar period, before the adoption of angled decks, it appeared that islands would have to be reduced in size or possibly even eliminated, so that radars on carriers would have to be small or of limited number. While radars on the carriers themselves could do some of their own detection, </span><i data-dcnode-id="2151"><span data-dcnode-id="2152" instrument_node="">Northampton</span></i><span data-dcnode-id="2150" instrument_node=""> carried a more elaborate array, including SPS-2 long range air search, SPS3 zenith search, and SPS-8 height finder. This combination couldn"t fit on a carrier's island without interfering with each other.  Radio antennas and transceivers on the command cruiser could communicate with not only ships and aircraft in the battle group, but from most parts of the world, directly with Washington. Therefore, the command cruiser was equipped not only as a tactical flagship for the battle group surrounding it, but also to be a fleet or larger scale force or theater flagship. </span></p><span data-dcnode-id="2148" instrument_node="">
</span><p class="just" data-dcnode-id="2137"><span data-dcnode-id="2147" instrument_node="">"By 1960 the US Navy had five cruisers fully effective as flagships: one each for the two forward-deployed fleets, one relief for each fleet, and the </span><i data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">Northampton….</span></i><span data-dcnode-id="2144" instrument_node="">"</span><sup data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">lii</span></sup><span data-dcnode-id="2141" instrument_node=""> The missile cruisers were integrated into their respective carrier task force, providing significant AAW defense capability, while </span><i data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">Northampton</span></i><span data-dcnode-id="2138" instrument_node=""> provided sensor and processing ability only to any battle group she was in. </span></p><span data-dcnode-id="2136" instrument_node="">
</span><p class="just" data-dcnode-id="2110"><span data-dcnode-id="2135" instrument_node=""> After 1960, </span><i data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">Northampton </span></i><span data-dcnode-id="2132" instrument_node="">was modified as a National Emergency Command Post Afloat (NECPA), with most armament removed and additional communications equipment. The NECPA function, today performed by Air Force One and several reserve aircraft, is a position where the President and a small military command staff could be evacuated in the event of an impending attack on the capital.  From the NECPA, the entire war could theoretically be controlled for a substantial period of time. Whether this function was fully thought out is doubtful; however capable </span><i data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node="">Northampton </span></i><span data-dcnode-id="2129" instrument_node="">was of carrying out the C</span><sup data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">3</span></sup><span data-dcnode-id="2126" instrument_node="">I tasks required, an evacuation of VIPs from Washington in the amount of time after detection of missile launch by the Soviet Union and before those missiles hit their targets seems barely possible by air from Andrews.  It does not seem possible to make a connection with a warship in the Atlantic during that rather short time period.  A second NECPA was converted from the </span><i data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">Saipan</span></i><span data-dcnode-id="2123" instrument_node="">-class light carrier </span><i data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">Wright</span></i><span data-dcnode-id="2120" instrument_node="">, and recommissioned in 1963; designations changed to reflect this function, with </span><i data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">Northampton</span></i><span data-dcnode-id="2117" instrument_node=""> becoming CC 1 and </span><i data-dcnode-id="2115"><span data-dcnode-id="2116" instrument_node="">Wright </span></i><span data-dcnode-id="2114" instrument_node="">CC 2. It should be noted that </span><i data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">Wright,</span></i><span data-dcnode-id="2111" instrument_node=""> while built as a carrier, was also a WWII cruiser-based design, as mentioned earlier.   </span></p><span data-dcnode-id="2109" instrument_node="">
</span><p class="just" data-dcnode-id="2098"><span data-dcnode-id="2108" instrument_node="">Today, the command cruiser appears to be obsolete.  </span><i data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">Northampton</span></i><span data-dcnode-id="2105" instrument_node=""> and </span><i data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">Wright </span></i><span data-dcnode-id="2102" instrument_node="">have been scrapped and were never replaced.  With satellite communications becoming reliable, fairly secure, and associated equipment more compact, it no longer seems critical to have the fleet flagship with a battle group.  AEGIS cruisers (and even destroyers) can provide the AAW detection and coordination functions for which </span><i data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">Northampton</span></i><span data-dcnode-id="2099" instrument_node=""> was originally converted, because of a similar improvement in computer and radar equipment.  Today, it is common for an amphibious command ship (LCC) to act as a numbered fleet flagship – and to spend most of its time in harbor, since its 20knot top speed would not be satisfactory for it to accompany the battle group.  While there is still need for a special ship to carry out the command function, it does not seem that a ship as fast as a cruiser is required.  Since the LCC's in commission today are already cruiser size ships, even with their more modest speed, any future CC would probably be over 20,000 tons. </span></p><span data-dcnode-id="2097" instrument_node="">
</span><h3 data-dcnode-id="2095" id="LinkTarget_8763"><span data-dcnode-id="2096" instrument_node="">6.6 Parallel British Developments</span></h3><span data-dcnode-id="2094" instrument_node="">
</span><p class="just" data-dcnode-id="2083"><span data-dcnode-id="2093" instrument_node="">The Royal Navy had some incomplete cruiser hulls that were laid up upon the cessation of WWII. When mechanically-loaded dual-purpose six-inch and mechanically-loaded three inch mounts were developed, three hulls (</span><i data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">Lion</span></i><span data-dcnode-id="2090" instrument_node="">, </span><i data-dcnode-id="2088"><span data-dcnode-id="2089" instrument_node="">Tiger</span></i><span data-dcnode-id="2087" instrument_node=""> and </span><i data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">Blake</span></i><span data-dcnode-id="2084" instrument_node="">) were completed as anti-aircraft cruisers (two six-inch twin mounts, four three-inch twin mounts).  The rate of fire of the weapons was so high the barrels were fitted with water cooling.  </span></p><span data-dcnode-id="2082" instrument_node="">
</span><p class="just" data-dcnode-id="2071"><span data-dcnode-id="2081" instrument_node="">The RN studies of new generation guided missile ships (G.M.S) resulted in a very large (for the time) 6,000 ton destroyer.  During the requirements generation process, the RN naval architects were asked "what would change if the ships were considered cruisers instead of destroyers?"  Naval architect W.G. John produced, in October 1957, the comparison contained in Table 2.</span><sup data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">liii </span></sup><span data-dcnode-id="2078" instrument_node="">The </span><i data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">Royalist</span></i><span data-dcnode-id="2075" instrument_node=""> mentioned in the table is a member of the </span><i data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">Bellona</span></i><span data-dcnode-id="2072" instrument_node=""> class anti-aircraft cruisers (four 5.25-inch twin mounts) completed in 1943 with similar overall dimensions to the G.M.S. study.  The G.M.S. studies evolved into the eight ships of the "County" class DDGs of 6,800 tons full load.   </span></p><span data-dcnode-id="2070" instrument_node="">

</span><h3 data-dcnode-id="1814" id="LinkTarget_8794"><span data-dcnode-id="1815" instrument_node="">7. CRUISER DEVELOPMENT MID 1960'S TO EARLY 1980'S</span></h3><span data-dcnode-id="1813" instrument_node="">
</span><h3 data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">7.1 US Missile Cruiser Designs</span></h3><span data-dcnode-id="1810" instrument_node="">
</span><h3 data-dcnode-id="1806"><span data-dcnode-id="1809" instrument_node="">7.1.1 	CGN 9 </span><i data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">Long Beach</span></i></h3><span data-dcnode-id="1805" instrument_node="">
</span><p class="just" data-dcnode-id="1794"><span data-dcnode-id="1804" instrument_node="">With the introduction of the </span><i data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">Forrestal</span></i><span data-dcnode-id="1801" instrument_node=""> class supercarriers starting in 1955, aircraft carriers had reached such a size that weather hardly slowed them down and steaming endurance was far greater than could be provided for their escorts.  This created inherent logistic problems for the Fleet. One possible solution was to use nuclear power in the escorts, since nuclear fuel lasts a number of years.  Although nuclear propulsion had been successful in the submarine </span><i data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">Nautilus </span></i><span data-dcnode-id="1798" instrument_node="">(1954</span><i data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">)</span></i><span data-dcnode-id="1795" instrument_node="">, no suitable nuclear plant was available to power destroyers and cruisers </span></p><span data-dcnode-id="1793" instrument_node="">
</span><p class="just" data-dcnode-id="1788"><span data-dcnode-id="1792" instrument_node="">Informal work had been underway at the Bureau of Ships on a nuclear cruiser (CLGN-160), but it was not until Admiral Arleigh Burke became CNO (1955) that the nuclear cruiser program was given focus.  He wanted to investigate the feasibility of a nuclear cruiser capable of operating independently as well as supporting a nuclear carrier. With shipbuilding money at a premium in the late 1950's, it was felt that a nuclear cruiser should have both ASW and AAW capabilities and the </span><i data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">Long Beach</span></i><span data-dcnode-id="1789" instrument_node=""> was provided an SQS-23 sonar. </span></p><span data-dcnode-id="1787" instrument_node="">
</span><p class="just" data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">A problem, however, was the limited horsepower of the nuclear plants; the ship would have problems meeting a 30-knot design requirement.  As the ship design evolved, the deficiency in power became more evident and the ship length grew to provide a better speed-length ratio for reduced wave-making resistance to facilitate a 30-knot speed. The increased length allowed additional weapons systems to be accommodated including a RAT (rocket-assisted torpedo, replaced in the final design by ASROC) and the Regulus surface-to-surface cruise missile.  After Regulus was canceled, a Polaris missile armament located in eight silos amidships was proposed as alternate but was never installed.   </span></p><span data-dcnode-id="1784" instrument_node="">
</span><p class="just" data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">An issue of continuing debate during the design period was the mix of missiles and guns in the design. The Ship Characteristics Board wanted to retain the 5-inch/54 single mount (Mk 42) gun since it was believed that a missile-defense armament would be ineffective for close-range fire.  The type of missile armament was also debated.  The Talos missile ship was more desirable, since these had longer ranges than the Terrier missiles, but it resulted in a larger and more expensive ship.  However, more Terrier missiles could be carried than in the Talos version because missile stowage for the latter had to be horizontal, requiring a compartment 36 feet long.   </span></p><span data-dcnode-id="1781" instrument_node="">
</span><p class="just" data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">It was finally decided to provide two Terrier missile launchers forward and one Talos missile launcher aft to give this nuclear cruiser maximum antiaircraft capability. With the missiles and electronics specified, they could engage four air targets simultaneously.  As with several of the missile cruiser conversions, no guns were provided; however, as recounted later, this changed in service. </span></p><span data-dcnode-id="1778" instrument_node="">
</span><p class="just" data-dcnode-id="1770"><span data-dcnode-id="1777" instrument_node="">Special fixed-array radars, designated the SPS-32/33, were fitted on the sides of the superstructure.  With steerable beams, the distinctive flat-faced antennas could track automatically six medium and long-range targets simultaneously.  The great merit of electronic scanning is that no mechanical inertia is involved and high data rates are possible.  For the first time these radars were also integrated into a weapons direction system that was connected to the Naval Tactical Data System (NTDS).  However, radar technology on </span><i data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">Long Beach</span></i><span data-dcnode-id="1774" instrument_node=""> was in 1961 ahead of its time and suffered from a significant failure rate and very high cost.  The SPS 32/33 appeared on only one other ship, the carrier </span><i data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">Enterprise</span></i><span data-dcnode-id="1771" instrument_node="">. </span></p><span data-dcnode-id="1769" instrument_node="">
</span><p class="just" data-dcnode-id="1749"><span data-dcnode-id="1768" instrument_node="">The </span><i data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">Long Beach</span></i><span data-dcnode-id="1765" instrument_node="">, now designated CGN 9, was commissioned in 1961, the same year as </span><i data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">Enterprise</span></i><span data-dcnode-id="1762" instrument_node="">, CVA(N) 65, the world's first nuclear carrier.  A pivotal incident occurred, affecting </span><i data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">Long Beach</span></i><span data-dcnode-id="1759" instrument_node=""> as well as future CG/DLG designs, when the new frigate </span><i data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">Dewey</span></i><span data-dcnode-id="1756" instrument_node=""> (DLG 14) was assigned to shoot down a propeller drone during a fleet review that was witnessed by President John Kennedy.  Three Terrier missiles were fired at an approaching drone but all three missed their target.  Kennedy was alarmed at this failure and personally ordered the new missile cruisers to be equipped with guns. A ship alteration in 1962-1963 added two 5-inch/38 single gun mounts.  The 5-inch/38 guns in single mountings looked quite antiquated on such missile ships as </span><i data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">Albany</span></i><span data-dcnode-id="1753" instrument_node=""> and </span><i data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">Long Beach</span></i><span data-dcnode-id="1750" instrument_node="">, but the old weapons did give some defense capability absent in the ship as completed. </span></p><span data-dcnode-id="1748" instrument_node="">
</span><p class="just" data-dcnode-id="1737"><span data-dcnode-id="1747" instrument_node="">The combination of NTDS and Talos made </span><i data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">Long Beach</span></i><span data-dcnode-id="1744" instrument_node=""> an effective Positive Identification Radar Advisory Zone (PIRAZ) ship during the Vietnam War.  During May 1968, </span><i data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">Long Beach</span></i><span data-dcnode-id="1741" instrument_node=""> was given clearance to fire on a North Vietnamese MiG. Although she missed one on 11 May, twelve days later she fired two Talos missiles two minutes apart at a pair of these enemy aircraft some 65 miles away.  One MiG was destroyed by one missile and the second exploded among its debris.  This was the first occasion in which a ship destroyed a hostile aircraft with guided missiles, and also the first time that nuclear surface warships had scored a missile hit against an enemy.  In September 1968, </span><i data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">Long Beach</span></i><span data-dcnode-id="1738" instrument_node=""> shot down a second MiG at 61 miles.   However, many other Talos and Terrier shots missed.   </span></p><span data-dcnode-id="1736" instrument_node="">
</span><p class="just" data-dcnode-id="1725"><span data-dcnode-id="1735" instrument_node=""> In 1977 </span><i data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">Long Beach</span></i><span data-dcnode-id="1732" instrument_node=""> underwent a major overhaul during which her armament was changed to include the ability to land, but not stow a helicopter.  A conversion to the AEGIS system was contemplated, but not done due to the fact that her missile armament was obsolete and funds would have to be diverted from new construction ships such as the </span><i data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">Ticonderoga</span></i><span data-dcnode-id="1729" instrument_node=""> Class (CG 47) and the </span><i data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">Perry</span></i><span data-dcnode-id="1726" instrument_node=""> Class frigates.  Talos was removed in 1979 along with the Mk 77 guided missile fire-control system and replaced with Harpoon canister launchers and Tomahawk armored box launchers.   </span></p><span data-dcnode-id="1724" instrument_node="">
</span><p class="just" data-dcnode-id="1717"><i data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">Long Beach</span></i><span data-dcnode-id="1721" instrument_node=""> was the first nuclear-powered surface combatant and she was a technical success.  But, she was too big, too slow, and too expensive.  The nuclear frigates (later re-designated as cruisers) that would follow her were somewhat more affordable and better suited to task force defense.  In 1957 the shipbuilding budget of the U.S. Navy was under severe assault with missile programs proving far more expensive than had been anticipated.  Therefore, a repeat of the </span><i data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">Long Beach</span></i><span data-dcnode-id="1718" instrument_node="">, costing $187 million, was cancelled. </span></p><span data-dcnode-id="1716" instrument_node="">
</span><p data-dcnode-id="1711" id="LinkTarget_8842"><span data-dcnode-id="1715" instrument_node="">7.1.2 	</span><i data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">Leahy</span></i><span data-dcnode-id="1712" instrument_node=""> (DLG 16) Class These futuristic-looking U.S. cruisers were the first double-ended guided-missile launching surface ships in the U.S. Navy.  They originated at the suggestion of Admiral Sanders, Chairman of the Long-Range Shipbuilding and Conversion Committee.  Ships Characteristics Board Project Number 172 was promulgated as requiring a double-ended missile frigate.  Two designs were considered: one based on a hull like the </span></p><span data-dcnode-id="1710" instrument_node="">
</span><p class="just" data-dcnode-id="1706"><i data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">Norfolk</span></i><span data-dcnode-id="1707" instrument_node=""> (DL 1) and the other on a long forecastle-deck ship.  In the interests of costs, seakeeping, and stability, the long forecastle-deck design was chosen. </span></p><span data-dcnode-id="1705" instrument_node="">
</span><img alt="cruiser" data-dcnode-id="1704" height="420" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.navalmarinearchive.com/research/cruisers/cr_ims/cr_img_22.jpg&amp;raw" width="576"><span data-dcnode-id="1703" instrument_node="">
</span><p class="just" data-dcnode-id="1692"><span data-dcnode-id="1702" instrument_node="">One of the principal missions of these ships, like their predecessors, the </span><i data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">Farragut </span></i><span data-dcnode-id="1699" instrument_node="">Class (DLG 6), was to form part of the anti-air and antisubmarine screen for carrier task forces.  They were expected to be able to control aircraft from the carrier, vectoring them to their assigned targets.  With no 5-inch gun aboard, two 3-inch/50 twin mounts were the only gun battery.  The gun aspects were sacrificed to achieve a higher number of SAM's.  These ships carried two Terrier missile launchers, one forward and one aft. There were some early problems with the Terrier missiles that were very complex with 100 vacuum tubes and 1,000 resistors, all of which had to function under wildly varying conditions of shock, humidity, temperature, and pressure.  The missile weighed over a ton and achieved supersonic speed within three seconds.  After launch, the missile was captured by a radar beam and handed off to a guidance beam which the Terrier missile rode to its target.  One commanding officer of </span><i data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">Leahy</span></i><span data-dcnode-id="1696" instrument_node=""> commented on the missile control radars, "two of the four were installed were usually spare parts lockers for the two years that I was aboard.</span><sup data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">liv</span></sup><span data-dcnode-id="1693" instrument_node="">" </span></p><span data-dcnode-id="1691" instrument_node="">
</span><p class="just" data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">The spartan antisubmarine weapons system featured the Mk 32 triple torpedo tubes and an ASROC launcher with no reloads for either.  The ASROC required the AN/SQS-23 sonar system, which was mounted in a bow dome. </span></p><span data-dcnode-id="1688" instrument_node="">
</span><p class="just" data-dcnode-id="1680"><span data-dcnode-id="1687" instrument_node="">The endurance in these ships was increased, which was one of the major reasons for the growth in length over the DLG 6 Class.  During a high-speed deployment of a carrier task force, the </span><i data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">Leahy</span></i><span data-dcnode-id="1684" instrument_node=""> retained a higher percentage of her total fuel than did the heavy cruiser </span><i data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">Boston</span></i><span data-dcnode-id="1681" instrument_node=""> (CAG 1).  Although the steam propulsion plant of the DLG 6 was retained, the electrical plant experienced major growth because of the increases in the power requirements from the missile launchers and their requisite electronics.   </span></p><span data-dcnode-id="1679" instrument_node="">
</span><p class="just" data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">These ships introduced the "Mack" (combined stack and mast) on which the new radars could be mounted without smoke interference.  To provide a measure of ballistic protection and notch-tough steel, the sheer strake and outer deck strake on the 01 Level were constructed of HY 80 while the hull itself was HTS.   </span></p><span data-dcnode-id="1676" instrument_node="">
</span><p class="just" data-dcnode-id="1668"><span data-dcnode-id="1675" instrument_node="">These vessels were equipped with a knuckled hull forward to protect the forward Terrier launcher from green seas washing aboard.  They were excellent sea boats. The knuckle forward allows a very hollow, flared forefoot area without excessive beam at the weather deck.  It is a common feature of 20</span><sup data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">th </span></sup><span data-dcnode-id="1672" instrument_node="">century cruisers and appears to have originated with the British </span><i data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">Kent</span></i><span data-dcnode-id="1669" instrument_node=""> or County class in 1928. </span></p><span data-dcnode-id="1667" instrument_node="">
</span><p class="just" data-dcnode-id="1645"><span data-dcnode-id="1666" instrument_node="">The </span><i data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">Leahy</span></i><span data-dcnode-id="1663" instrument_node=""> class were the first close escorts of the </span><i data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">Midway</span></i><span data-dcnode-id="1660" instrument_node=""> (CVA 41) and </span><i data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">Forrestal </span></i><span data-dcnode-id="1657" instrument_node="">(CVA 59) carriers. Compared to the earlier </span><i data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">Farragut </span></i><span data-dcnode-id="1654" instrument_node="">class, the increased endurance improved their ability to stay with these carriers and provide the air and submarine defenses that these ships required.  This increased capability also was reflected in the fact that the </span><i data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">Leahy</span></i><span data-dcnode-id="1651" instrument_node="">'s and following DLG/DLGN were assigned captains (O-6) as commanding officers (following cruiser practice) instead of commanders (O-5) as the </span><i data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">Farragut</span></i><span data-dcnode-id="1648" instrument_node="">'s had.</span><sup data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">lv </span></sup></p><span data-dcnode-id="1644" instrument_node="">
</span><p class="just" data-dcnode-id="1637" id="LinkTarget_8862"><strong data-dcnode-id="1639"><span data-dcnode-id="1643" instrument_node="">7.1.3 	</span><i data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">Belknap</span></i><span data-dcnode-id="1640" instrument_node=""> (DLG 26) Class</span></strong><span data-dcnode-id="1638" instrument_node=""> </span></p><span data-dcnode-id="1636" instrument_node="">
</span><p class="just" data-dcnode-id="1631"><span data-dcnode-id="1635" instrument_node="">The explosive growth of electronics and guided-missile systems overtook the DLG 16 design, which exceeded its design displacement by some 400-500 tons. In the next purchase of guided missile frigates, several new weapons systems were available that altered the characteristics of the follow-on designs. The Drone Anti-submarine Helicopter (DASH), a new and more powerful sonar, AN/SQS-26, and Naval Tactical Data System were now available and enthusiastically supported for use by the Commander of the Cruiser Destroyer Force of the Pacific Fleet.  To aid in the placement of the combat system, the ASROC launcher was eliminated and its missiles loaded in the forward Terrier magazine, which was enlarged to handle 60 missiles instead of 40. This was done by the addition of a third 20-round horizontal carrousel to the two in the </span><i data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">Leahy's</span></i><span data-dcnode-id="1632" instrument_node=""> forward magazine.</span></p><span data-dcnode-id="1630" instrument_node="">
</span><p class="just" data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">There were many critics of the all-missile DLG 16 class as lacking a sufficient gun armament. Experience during the Cuban Missile crisis during the fall of 1962 confirmed the need for a gun armament.  Therefore, a 5-inch/54 gun was added in place of the aft Terrier launcher to provide a shore-bombardment capability, in addition to the anti-ship function, that was absent in the DLG 16 Class.  The tradeoff was that if the forward missile launcher malfunctioned or was damaged, the entire antiaircraft and antisubmarine capability of these ships would be lost.  Also it resulted in only having two missile directors instead of four, reducing the number of air targets that could be engaged simultaneously.</span></p><span data-dcnode-id="1627" instrument_node="">
</span><p class="just" data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">The DASH program was not successful and was ultimately replaced in the 1970's on the DLG 26 by one LAMPS Kaman SH-2D Seasprite helicopter in a hangar at the aft end of the superstructure.</span></p><span data-dcnode-id="1624" instrument_node="">
</span><p class="just" data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">The Naval Tactical Data System was provided starting with the DLG 28 and was backfitted to all earlier DLG's as well. The DLG 26 was basically a lengthened DLG 16 hull with the addition of a 14 foot insert between the forward engine room and after fire room.  Since the ship had significant curvature at the insertion point, the section was not a parallel-sided section but one with form.  Although the added length resulted in more frictional resistance, the ship had a more favorable speed/length ratio, so that speed loss was minor.</span></p><span data-dcnode-id="1621" instrument_node="">
</span><p class="just" data-dcnode-id="1616"><span data-dcnode-id="1620" instrument_node="">The engineering plant was the same one as in the previous </span><i data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">Leahy</span></i><span data-dcnode-id="1617" instrument_node=""> class with 1200 psi and 950°F steam conditions.  The maximum shaft horsepower was identical but the displacement was greater.  Therefore, maximum speed was 0.1 knots slower in the DLG 26, despite a more advantageous speed-to-length ratio.  The RPM's of the shafts were decreased to reduce propeller noise and achieve greater efficiency. The most significant difference was in the electrical generators where a 50% increase in KW was provided for the combat system specified for these ships. </span></p><span data-dcnode-id="1615" instrument_node="">
</span><p class="just" data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">To improve their capabilities when assigned as a flagship, three of the class were fitted with a tactical flag communications center (TFCC) from 1983-1985.  </span></p><span data-dcnode-id="1612" instrument_node="">
</span><p class="just" data-dcnode-id="1601"><span data-dcnode-id="1611" instrument_node="">The </span><i data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">Belknap</span></i><span data-dcnode-id="1608" instrument_node=""> was rebuilt after her collision with the carrier </span><i data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">John F. Kennedy</span></i><span data-dcnode-id="1605" instrument_node=""> in November 1975.  She was extensively modified to serve as a numbered fleet flagship for the 6</span><sup data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">th</span></sup><span data-dcnode-id="1602" instrument_node=""> Fleet.  She was equipped with a fleet command center (war room), improved communications, drafting and photographic facilities, additional berthing and messing for flag personnel, an office and reception area for a fleet commander and an expansion of the helicopter landing area aft to receive the SH-3 Sea King helicopter. The ship's hangar was converted into a berthing area. She did not receive the New Threat Upgrade (NTU) provided to other eight ships in her class.   </span></p><span data-dcnode-id="1600" instrument_node="">
</span><h3 data-dcnode-id="1595" id="LinkTarget_8866"><span data-dcnode-id="1599" instrument_node="">7.1.4 </span><i data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">Bainbridge</span></i><span data-dcnode-id="1596" instrument_node=""> (CGN 25)</span></h3><span data-dcnode-id="1594" instrument_node="">
</span><p class="just" data-dcnode-id="1589"><span data-dcnode-id="1593" instrument_node="">Early studies of destroyers with nuclear propulsion plants showed that such plants alone weighed as much as a World War II destroyer.  Because of the size ship that would be necessary to contain the space and weight of such a plant, it was not until the advent of the </span><i data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">Enterprise </span></i><span data-dcnode-id="1590" instrument_node="">(CVAN 65) that an intensive design effort was begun to provide nuclear escorts.  The design of nuclear surface ship escorts was complicated by the following factors:  </span></p><span data-dcnode-id="1588" instrument_node="">
</span><ul data-dcnode-id="1574" type="disc"><span data-dcnode-id="1587" instrument_node="">
</span><li class="just" data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">the space required for a nuclear plant, </span></li><span data-dcnode-id="1584" instrument_node="">
</span><li class="just" data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node=""> the manning for a nuclear plant was more than conventional power plants, </span></li><span data-dcnode-id="1581" instrument_node="">
</span><li class="just" data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">available nuclear power plants were too heavy for the power they produced to use in destroyer-sized ships, </span></li><span data-dcnode-id="1578" instrument_node="">
</span><li class="just" data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node=""> and they were more expensive to build than conventional plants.   </span></li><span data-dcnode-id="1575" instrument_node="">
</span></ul><span data-dcnode-id="1573" instrument_node="">
</span><p class="just" data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">Another problem was in the arrangement of the ship due to radiation hazards and the need to restrict the location of living spaces, which if adjacent to the reactor spaces could necessitate increased lead shielding.  However, it was recognized that nuclear power was, in some ways, the propulsion plant of the future.  </span></p><span data-dcnode-id="1570" instrument_node="">
</span><p class="just" data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">When Admiral Arleigh Burke became CNO in August 1955, he authorized studies to determine the feasibility of installing nuclear power plant in a DLG 6-type hull. These studies showed that the smallest hull, due to limitations in power, would be 540-feet long with an 8,500-ton displacement to achieve a 30-knot speed.  Smaller ships were studied, but it was found that nuclear propulsion was not possible in ships with less than 6,900-ton displacement.  The resultant ship platform had excessive weather deck area for the weapons suite specified.  The most unattractive factor in nuclear propulsion, however, was cost.  These ships with their special requirements cost some $20 to $30 million more in 1955 dollars than a conventional power plant of the same shaft horsepower and with the same weapons systems to achieve a 30-knot speed. Added to this was the heavier weight and higher vertical center of gravity of the machinery and shielding.  The hull of a nuclear destroyer had to have more beam to accommodate all of the propulsion plant and its auxiliaries as well as provide adequate stability. </span></p><span data-dcnode-id="1567" instrument_node="">
</span><p class="just" data-dcnode-id="1555"><i data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node=""> Bainbridge</span></i><span data-dcnode-id="1564" instrument_node=""> was, from her conception, the source of great contention within the destroyer force.  Although the Type Commander, Atlantic wanted her, his opposite number in the Pacific opposed it on the basis of cost.  He argued that one </span><i data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">Bainbridge </span></i><span data-dcnode-id="1561" instrument_node="">could buy three or four non nuclear equivalents.  Admiral Hyman Rickover was in favor of the ship, which may have been a factor in its approval.  His Code 08 designed a light-weight reactor especially for</span><i data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node=""> Bainbridge</span></i><sup data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">lvi</span></sup><span data-dcnode-id="1556" instrument_node="">. </span></p><span data-dcnode-id="1554" instrument_node="">
</span><p class="just" data-dcnode-id="1549"><span data-dcnode-id="1553" instrument_node="">The nuclear reactor meant that this ship could travel 5,000 hours at full power (3 or 4 years before refueling).  She traveled 75,000 miles during her first two years of service and 180,000 miles before her first nuclear refueling.  Improvements in the core of the reactors soon led to ones that would last ten years</span><sup data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">lvii</span></sup><span data-dcnode-id="1550" instrument_node="">. </span></p><span data-dcnode-id="1548" instrument_node="">
</span><p class="just" data-dcnode-id="1543"><span data-dcnode-id="1547" instrument_node="">Nuclear power provided a plentiful power source that was almost inexhaustible for the voracious demands of modern electronics and weapons.  Freedom from fossil-fuels allowed the </span><i data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">Bainbridge</span></i><span data-dcnode-id="1544" instrument_node=""> and other nuclear cruisers to travel faster, skirt storms, and avoid problems with dwindling fuel supplies on stability.  With the absence of stacks these ships also permitted a tighter protection against nuclear, biological, or chemical attack.  It also meant less problems from smoke and the ability to find better positions for the antennas.  But, the exhausts of the emergency diesel and the auxiliary boiler had to be made integral with her foremast upon which was mounted the surface search and 3-dimensional air search radars.  A two-dimensional air-search radar was mounted on a smaller lattice-type mast aft of her boat stowage.   </span></p><span data-dcnode-id="1542" instrument_node="">
</span><img alt="cruiser" data-dcnode-id="1541" height="435" id="LinkTarget_8898" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.navalmarinearchive.com/research/cruisers/cr_ims/cr_img_23.jpg&amp;raw" width="612"><span data-dcnode-id="1540" instrument_node="">
</span><p class="just" data-dcnode-id="1532"><span data-dcnode-id="1539" instrument_node="">The armament of the </span><i data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Bainbridge </span></i><span data-dcnode-id="1536" instrument_node="">was patterned after the </span><i data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">Leahy</span></i><span data-dcnode-id="1533" instrument_node=""> (DLG 16, later CG 16) Class with a few changes.  The nuclear escort was equipped with larger Terrier missile magazines; twin 3-inch/50 gun mounts were specified instead of single mounts; and there were no reloads provided for the ASROC launcher.   </span></p><span data-dcnode-id="1531" instrument_node="">
</span><h3 data-dcnode-id="1526"><span data-dcnode-id="1530" instrument_node="">7.1.5 </span><i data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">Truxtun</span></i><span data-dcnode-id="1527" instrument_node=""> (CGN 35)</span></h3><span data-dcnode-id="1525" instrument_node="">
</span><p class="just" data-dcnode-id="1514"><span data-dcnode-id="1524" instrument_node="">The actual cost of the</span><i data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node=""> Bainbridge</span></i><span data-dcnode-id="1521" instrument_node=""> was $60 million more than the $108 million initially estimated to build the U.S. Navy's first nuclear frigate. This development eroded support within the U.S. Navy for ships of her type.  During discussions on the Navy's Fiscal Year 1962 budget, however, Congress arbitrarily substituted a nuclear frigate for one of the ten ships the Navy had projected for the </span><i data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">Belknap</span></i><span data-dcnode-id="1518" instrument_node=""> (CG 26) class. A repeat of the </span><i data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">Bainbridge</span></i><span data-dcnode-id="1515" instrument_node=""> design was sought at first, but since the large AN/SQS-26 sonar was being introduced in the CG 26 class, it was decided that the nuclear version of these ships should be also equipped with the same sonar. </span></p><span data-dcnode-id="1513" instrument_node="">
</span><p class="just" data-dcnode-id="1502"><span data-dcnode-id="1512" instrument_node="">The hull form of the </span><i data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">Truxtun </span></i><span data-dcnode-id="1509" instrument_node="">was made similar to that of the </span><i data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">Bainbridge</span></i><span data-dcnode-id="1506" instrument_node="">, but with the addition of the SQS-26 dome.  The weapon arrangement was modified with the 5inch gun placed forward instead of aft as in the</span><i data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node=""> Belknap</span></i><span data-dcnode-id="1503" instrument_node=""> class.  The ASROC launcher was deleted as its missile could now be accommodated in the Terrier launcher and magazine. Since the Terrier launcher was located aft, the ASROC could only be launched in a forward quadrant not directly over the bow.  A Terrier launcher forward would have been better suited for anti-submarine operations.  </span></p><span data-dcnode-id="1501" instrument_node="">
</span><p class="just" data-dcnode-id="1487"><span data-dcnode-id="1500" instrument_node="">The </span><i data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">Truxtun</span></i><span data-dcnode-id="1497" instrument_node="">, like the </span><i data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">Bainbridge</span></i><span data-dcnode-id="1494" instrument_node="">, was a single ship class: a nuclear version of the </span><i data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">Belknap</span></i><span data-dcnode-id="1491" instrument_node=""> class.  As built the ship had two Mk 25 torpedo tubes  for 21-inch Mark 48 wire-guided torpedoes built into the stern structure with the provision of ten reloads.  They were subsequently removed. The </span><i data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">Truxtun</span></i><span data-dcnode-id="1488" instrument_node=""> was then equipped with Mk 32 tubes that were built into the after deckhouse. </span></p><span data-dcnode-id="1486" instrument_node="">
</span><p class="just" data-dcnode-id="1481"><span data-dcnode-id="1485" instrument_node="">A helicopter landing platform was provided aft just forward of the Terrier missile launcher at the aft end of the raised forecastle deck.  Although the </span><i data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">Truxtun</span></i><span data-dcnode-id="1482" instrument_node=""> had been intended to operate drone anti-submarine helicopters (DASH), cancellation of this program led to the redesign of the helicopter facility to handle the SH-2 LAMPS.  This helicopter could work with the long-range AN/SQS-26 active search and medium frequency sonar. </span></p><span data-dcnode-id="1480" instrument_node="">
</span><p class="just" data-dcnode-id="1473" id="LinkTarget_8907"><strong data-dcnode-id="1475"><span data-dcnode-id="1479" instrument_node="">7.1.6 	</span><i data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">California</span></i><span data-dcnode-id="1476" instrument_node=""> Class (CGN 36, ex-DLGN 36)</span></strong><span data-dcnode-id="1474" instrument_node=""> </span></p><span data-dcnode-id="1472" instrument_node="">
</span><p class="just" data-dcnode-id="1464"><span data-dcnode-id="1471" instrument_node="">These double ended, flush-deck ships were essentially nuclear-propelled versions of the guided missile frigates proposed in the early 1960's with the Tartar D missile system vice the more capable Talos and Terrier missile systems of the cruiser conversions.  Their construction was delayed because of opposition to nuclear ship construction by Secretary of Defense Robert McNamara and the fiscal demands of the Vietnam War. In June 1968 Congress, despite administration objections, insisted on ordering two nuclear frigates, </span><i data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">California</span></i><span data-dcnode-id="1468" instrument_node=""> (DLGN 36) and </span><i data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">South Carolina</span></i><span data-dcnode-id="1465" instrument_node=""> (DLGN 37). The </span></p><span data-dcnode-id="1463" instrument_node="">
</span><p class="just" data-dcnode-id="1458"><span data-dcnode-id="1462" instrument_node="">Preliminary Design of this Class was begun in mid-FY 64 as Ship Characteristics Board (SCB) Project No. 241.66. These ships were intended to be the first nuclear ships for series production. Although a third ship was authorized as part of the fiscal 1968 budget, it was not built due to rising costs and the emergence of the more capable </span><i data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Virginia</span></i><span data-dcnode-id="1459" instrument_node=""> class design.  </span></p><span data-dcnode-id="1457" instrument_node="">
</span><p class="just" data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">These were unquestionably capable ships with a displacement of 10,000 tons, armed with two Tartar / Standard missile launchers, and two of the new 5 inch Mk 45 gun mounts. The missile launchers were located forward and aft from superstructure at a significant distance to allow excellent arcs of fire and access for refueling the nuclear plant. The digital electronics suite was the most modern available with SPS 48A 3-D radar and a missile guidance system capable of controlling four missiles simultaneously. It was considered the most capable ship in the fleet even without AEGIS. As for its ASW capabilities, the ship mounted the SQS-26 sonar dome and was equipped with a quick reload ASROC launcher.  </span></p><span data-dcnode-id="1454" instrument_node="">
</span><p class="just" data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">These ships were provided with a large helicopter-landing platform aft, but were not equipped with a hangar or maintenance facilities for helicopters.   </span></p><span data-dcnode-id="1451" instrument_node="">
</span><p class="just" data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">The CGN 36 design was started amid the turmoil of the 1960's that included the introduction of "Concept Formulation/Contract Definition" and "Total Package Procurement" to weapon system procurement. At the same time, this approach was being applied to the DX Program, which resulted in the DD 963 design.  The Navy pursued the DLGN 36 design and it was planned to reap the advantages of nuclear power on a missile ship using the Tartar guided missile system, which was far less complex and bulky than the previous Terrier system and yet was considered a weapons system equal or more effective in providing area air defense. Congress had also stipulated that any combatant ship over 8,000 tons displacement had to be nuclear powered. </span></p><span data-dcnode-id="1448" instrument_node="">
</span><p class="just" data-dcnode-id="1443"><span data-dcnode-id="1447" instrument_node="">The design used the earlier DLGN 35 (USS </span><i data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">Truxtun</span></i><span data-dcnode-id="1444" instrument_node="">) as a parent ship and, although Terrier/Tartar competition existed during the Feasibility Study phase, the decision favoring the Tartar system (MK 13) was firmed up early in the preliminary design phase. </span></p><span data-dcnode-id="1442" instrument_node="">
</span><p class="just" data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">The resultant ship grew rather significantly over its parent ship e.g., about 30 feet in length, 2.5 feet in beam, and 900 tons in displacement, with essentially the same twin D2G pressurized water reactor propulsion plant improved to yield increased power and endurance.  Of course, the gun and missile systems and the inclusion of many upgraded weapon controls drove the topside configuration.  Other electronic systems affected the design and habitability standards were changed so that arrangements of CGN 36 were almost totally changed over those of CGN 35.   </span></p><span data-dcnode-id="1439" instrument_node="">
</span><p class="just" data-dcnode-id="1434"><span data-dcnode-id="1438" instrument_node="">These ships have anchor stowage integral with the keel to reduce excessive flare and prevent anchor fluke damage to the sonar dome.  This installation followed the concept first introduced in the </span><i data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">Knox</span></i><span data-dcnode-id="1435" instrument_node="">-class Frigates (FF 1052) Class. </span></p><span data-dcnode-id="1433" instrument_node="">
</span><p class="just" data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">During the ship design, the 5-inch /54 (Mk 45) lightweight gun had not progressed far enough for it to be used aboard this ship, so the 5-inch /54 guns (Mk 42) was specified instead.  This use of the heavier gun brought about a significant increase in crew since the lightweight version required only three men to operate. The gun location vis-à-vis the Mk 13 Tartar launchers and the superstructure, however, was a subject of debate until nearly the end of the preliminary design.  The inability to perfect an ASROC missile that could be launched from a Mk 13 Launcher dictated the inclusion of a trainable Mk 16 ASROC box launcher.  In order to provided reload capability and maintain clearance for reactor servicing, a distinctive structure, commonly termed the "Doghouse", was provided forward of the ASROC launcher close to gun mount No. 51.  </span></p><span data-dcnode-id="1430" instrument_node="">
</span><p class="just" data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">Subsequent to their Preliminary Design, these Nuclear Powered Guided Missile Frigates were re-designated as Nuclear Powered Guided Missile Cruisers on 30 June, 1975. Originally, three ships were planned for and actually authorized; however, the third ship was built to a different design as CGN 38.  While the class was under construction, the 5-inch /54 (Mk 45) lightweight gun was approved for service, so it was substituted for the heavier 5-inch/54 (Mk 42) that had been chosen in Preliminary Design. </span></p><span data-dcnode-id="1427" instrument_node="">
</span><p class="just" data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">It was planned to install Tomahawk missiles as an upgrade, but the project had to be canceled when it was determined that these ships could not sustain large increases in topside weights, which also prevented the use of the AEGIS system.   </span></p><span data-dcnode-id="1424" instrument_node="">
</span><p class="just" data-dcnode-id="1418" id="LinkTarget_8923"><strong data-dcnode-id="1419"><span data-dcnode-id="1423" instrument_node="">7.1.7 	</span><i data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">Virginia</span></i><span data-dcnode-id="1420" instrument_node=""> (CGN 38) Class </span></strong></p><span data-dcnode-id="1417" instrument_node="">
</span><p class="just" data-dcnode-id="1409"><span data-dcnode-id="1416" instrument_node="">The design of these ships was the result of several influences in the ongoing program of surface combatants during the 1960's and early 1970's.  They were an improved design, superior to their previous </span><i data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">California</span></i><span data-dcnode-id="1413" instrument_node=""> class with a flush deck, the Mk 26 missile launcher and an embarked helicopter.  The perfection of the Mk 26 guided missile launcher systems and the SM-1 Standard missile offered better performance in the face of electronic countermeasures, faster reaction times, and an increased kill probability.  The SM-1 still used the continuous rod warhead, but with a new fuse whose sensing cones and digital electronics triggered it to cause maximum damage depending on whether the target was a surface ship, jet bomber, or cruise missile.  Also under development was the SM-2 missile with a range of 100 miles and a programmable autopilot.  Although SM-2 was intended principally for Aegis ships, the Terrier and Tartar vessels could benefit from this asset as well when the new missile was coupled with better detection and tracking equipment.  The SM-2 first deployed on board </span><i data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">Wainwright</span></i><span data-dcnode-id="1410" instrument_node=""> (CG 28, ex DLG 28) in 1976. There were two novel features of the Mk 26 launcher, its fault isolating equipment and modular design. The former reduced maintenance down-time.  The modular design of the system allowed the entire launcher with its vertical rotating carousel with missiles to be "plugged in" to the ship.  The base of the module rested on prepared foundations within the ship.  Once lowered in, the system needed only electrical and utility connections. The effectiveness of the Standard missile was enhanced by the Mk 26 launcher. </span></p><span data-dcnode-id="1408" instrument_node="">
</span><p class="just" data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">Even in the worst sea conditions that could cause heavy pitch and roll, the launcher could fire in rapid succession several kinds of missiles that included variants of the Standard missile, Harpoon, and ASROC  A jettison device was fitted to shove any dud missile overboard. </span></p><span data-dcnode-id="1405" instrument_node="">
</span><p class="just" data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">Another influence in the CGN 38 cruisers was the DX/DXG Program that used a Concept Formulation/Contract Definition procurement strategy for the acquisition of surface combatants. This latter program resulted in the DX, which became the DD 963 Class ships.   </span></p><span data-dcnode-id="1402" instrument_node="">
</span><p class="just" data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">The "High End" of the DX Program was envisioned as a nuclear powered DXG, the DXGN, later, CGN.  The successful development of the Mk 26 guided missile launching system and the promise of early availability of the long awaited Advanced Surface Missile System (ASMS, later to be called AEGIS) led to the decision that a design based upon the as-yet-unbuilt DLGN 36 Class would fulfill the DXGN unit's role. Accordingly, the preliminary design of the CGN 38 (then called DLGN 38) commenced in late 1968. </span></p><span data-dcnode-id="1399" instrument_node="">
</span><p class="just" data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">The resulting ship was approximately 20 feet shorter than its predecessor but some 3 feet wider. The full load displacement was about 200 tons more than the earlier design with very nearly the same draft, but increased trim aft.  Due to unavailability of the ASMS, the missiles in the Mk 26 launchers were controlled by two Tartar D missile fire control systems fore and aft.  The helicopter facility was to consist of a landing area with refueling capability but without any hangar.   </span></p><span data-dcnode-id="1396" instrument_node="">
</span><p class="just" data-dcnode-id="1391"><span data-dcnode-id="1395" instrument_node="">During contract design some further modifications were made with the ASMS (later to be called AEGIS) included as a space and weight option.  An intensive effort was made to reduce the displacement to less than 10,000 tons. Important at this point of development was the inclusion of the SH-2 LAMPS helicopter.  There was some unassigned space in the stern and it was decided that this could be used as a below-deck hangar to house the helicopters plus the associated magazines, stowage, and ammunition. The concept was based upon the seaplane hangar arrangements used in the </span><i data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">Baltimore</span></i><span data-dcnode-id="1392" instrument_node=""> (CA 68) class and later cruisers.  The helicopter would land on the raised elevator platform; with the platform lowered the hangar would be enclosed by sliding doors or hatches.  In concept it seemed to be an excellent one, but in practice it proved to be unsuccessful.  The seals to the hatches enclosing the helicopter hangar leaked seawater onto the hangar area below onto the helicopters, necessitating extensive freshwater washdowns.  There were also problems with the elevators. The helicopter facility was later removed and Tomahawk box launchers were installed on the main deck where the elevator platform had been.  These launchers were mounted in armored box launchers at the transom with control spaces located below in the old hangar complex.  Earlier proposals to provide a VLS launcher for the Tomahawk missiles in place of the hangar were dropped. </span></p><span data-dcnode-id="1390" instrument_node="">
</span><p class="just" data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">The CGN 38 class had a distinctive bow anchor arrangement unlike their predecessors. Because of bow trim problems in early contract design, the keel-stowed anchor was eliminated and replaced with a bow-stowed anchor and an on-deck stowed lightweight anchor, based on German World War II experience with their battleships and battle cruisers.  The bow flare was increased slightly to allow these anchors to clear the AN/SQS 53A bow sonar dome and improve dryness of the foredeck area. </span></p><span data-dcnode-id="1387" instrument_node="">
</span><p class="just" data-dcnode-id="1382"><span data-dcnode-id="1386" instrument_node="">These guided-missile cruisers were the last nuclear-powered surface combatants, other than the nuclear carriers of the </span><i data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">Nimitz</span></i><span data-dcnode-id="1383" instrument_node=""> (CVN 68) class. Four ships were completed although the last two were completed much later than their earlier sisters due to substantial cost increases of $140 million.  The fifth ship, which would have featured the AEGIS weapons system was canceled as the result of costs and the emergence of a new "Strike Cruiser" (CSGN) concept.   </span></p><span data-dcnode-id="1381" instrument_node="">
</span><p class="just" data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">Three of the ships were slated for nuclear refueling, starting in Fiscal 1994, and a study was made in 1989 to also upgrade these ships.  As part of the refueling a complex overhaul was studied to have two 64-cell VLS launchers replace the Mk 26 launchers and the AEGIS SPY-1B radar complex would be installed.  The cost of refueling and the changes in the weapons and electronics were prohibitive and it was decided to scrap all four vessels. </span></p><span data-dcnode-id="1378" instrument_node="">
</span><h3 data-dcnode-id="1376" id="LinkTarget_8939"><span data-dcnode-id="1377" instrument_node="">7.1.8 	Vietnam Employment</span></h3><span data-dcnode-id="1375" instrument_node="">
</span><p class="just" data-dcnode-id="1371"><span data-dcnode-id="1374" instrument_node="">U.S. cruisers in the Vietnam conflict repeated their Korean War mission of providing naval bombardment both in the South, firing in support of friendly forces as well as in the North where they sometimes had their fire returned by North Vietnamese shore batteries. In addition, CG's and DLG's were stationed as radar pickets between the carriers and the coastline, maintaining a PIRAZ (Positive Identification Radar Advisory Zone) to maintain an air picture and guard against MIGs that might be attacking naval aircraft or the fleet.  The DLG's in addition served as forward platforms for SAR helicopters.</span><sup data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">lviii </span></sup></p><span data-dcnode-id="1370" instrument_node="">
</span><p class="just" data-dcnode-id="1366"><strong data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">7.1.9 	DLG Redesignation to CG</span></strong><span data-dcnode-id="1367" instrument_node=""> </span></p><span data-dcnode-id="1365" instrument_node="">
</span><p class="just" data-dcnode-id="1342"><span data-dcnode-id="1364" instrument_node="">Since the end of World War II, the US Navy had gone its own way in naming its ship types.  Once the CLK designator was deleted in 1951, and the DL and DLG designator introduced, US "frigates" became large, capable ships.  US destroyer escorts (DE), introduced during the war, were a mass production ASW ship generally smaller, slower, and less capable than a destroyer, and US cruiser production (once that CLK designator was retired) gradually petered out. In other navies, different terminology was in use.  No one used the DE designator.  British "corvettes" were extremely austere escorts, even smaller than our DE's.  Most European navies, including the RN, were calling their larger escorts "frigates."  Both these terms were re-used in the 20</span><sup data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">th</span></sup><span data-dcnode-id="1361" instrument_node=""> century from Age of Sail types of lighter craft, smaller than a ship of the line; they have been mentioned in Section 2.  By 1975, with US frigates growing bigger and bigger our terminology seemed even more out of line with that of other navies.  On June 30</span><sup data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">th</span></sup><span data-dcnode-id="1358" instrument_node="">, 1975, much of this changed.  All of the destroyer leader frigates (DL), except for the </span><i data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">Coontz </span></i><span data-dcnode-id="1355" instrument_node="">Class, consisting of the </span><i data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Virginia</span></i><span data-dcnode-id="1352" instrument_node="">, </span><i data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">California</span></i><span data-dcnode-id="1349" instrument_node="">, </span><i data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">Truxtun</span></i><span data-dcnode-id="1346" instrument_node="">, </span><i data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">Belknap</span></i><span data-dcnode-id="1343" instrument_node="">, </span></p><span data-dcnode-id="1341" instrument_node="">
