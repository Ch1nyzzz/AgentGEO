</span><p class="just" data-dcnode-id="3737"><span data-dcnode-id="3741" instrument_node="">The Treaty was one of the first steps of the United States Navy's conversion from a battleship fleet to an aircraft carrier-based force.  The United States was over the limits in capital ships when the Treaty was ratified, and had to decommission or disarm several older ships to comply.  The US was under the allowable tonnage for aircraft carriers since the only aircraft carrier in the US fleet before the Treaty was signed was USS </span><i data-dcnode-id="3739"><span data-dcnode-id="3740" instrument_node="">Langley</span></i><span data-dcnode-id="3738" instrument_node=""> (CV 1), a converted collier.  Not only did carriers have separate limits, but as an experimental vessel, Langley did not count against the tonnage restrictions. </span></p><span data-dcnode-id="3736" instrument_node="">
</span><p class="just" data-dcnode-id="3716" id="LinkTarget_8391"><span data-dcnode-id="3735" instrument_node="">Consequently, the US Navy had a free rein to build carriers, subject initially only to budget limitations.  The decision was made to halt construction on the current fleet of battle cruisers and convert the </span><i data-dcnode-id="3733"><span data-dcnode-id="3734" instrument_node="">USS Lexington</span></i><span data-dcnode-id="3732" instrument_node=""> and </span><i data-dcnode-id="3730"><span data-dcnode-id="3731" instrument_node="">USS Saratoga</span></i><span data-dcnode-id="3729" instrument_node=""> to aircraft carriers.  The </span><i data-dcnode-id="3727"><span data-dcnode-id="3728" instrument_node="">Constellation</span></i><span data-dcnode-id="3726" instrument_node="">, </span><i data-dcnode-id="3724"><span data-dcnode-id="3725" instrument_node="">United States</span></i><span data-dcnode-id="3723" instrument_node="">, </span><i data-dcnode-id="3721"><span data-dcnode-id="3722" instrument_node="">Constitution</span></i><span data-dcnode-id="3720" instrument_node="">, and </span><i data-dcnode-id="3718"><span data-dcnode-id="3719" instrument_node="">Ranger</span></i><span data-dcnode-id="3717" instrument_node=""> were scrapped. </span></p><span data-dcnode-id="3715" instrument_node="">
</span><p class="just" data-dcnode-id="3713"><span data-dcnode-id="3714" instrument_node="">For the US Navy the Treaty did indeed limit the production of capital ships but escalated the production of heavy cruisers and carriers.  Thus the Washington Naval Treaty had the fortunate effect of moving the US Navy towards carrier based warfare, though it would be several years before the full potential of this paradigm shift in ocean warfare was realized by the US and other Navies.  </span></p><span data-dcnode-id="3712" instrument_node="">
</span><h3 data-dcnode-id="3707"><span data-dcnode-id="3711" instrument_node="">4.3 1</span><sup data-dcnode-id="3709"><span data-dcnode-id="3710" instrument_node="">st</span></sup><span data-dcnode-id="3708" instrument_node=""> Generation Treaty Cruisers</span></h3><span data-dcnode-id="3706" instrument_node="">
</span><p class="just" data-dcnode-id="3702"><strong data-dcnode-id="3704"><span data-dcnode-id="3705" instrument_node="">4.3.1 	Foreign Activity</span></strong><span data-dcnode-id="3703" instrument_node=""> </span></p><span data-dcnode-id="3701" instrument_node="">
</span><p class="just" data-dcnode-id="3693"><span data-dcnode-id="3700" instrument_node="">The British </span><i data-dcnode-id="3698"><span data-dcnode-id="3699" instrument_node="">Arethusa </span></i><span data-dcnode-id="3697" instrument_node="">class, completed in 1914, introduced a number of new features. This was a small cruiser of only 3530 tons, armed pre-dreadnought style with two 6-inch/45 guns fore and aft and six 4-inch guns in broadside.  However, she had high speed turbine machinery and oil fired boilers, plus a novel weight saving feature: an armor belt that was built into the hull so that it contributed to longitudinal strength.</span><sup data-dcnode-id="3695"><span data-dcnode-id="3696" instrument_node="">xii </span></sup><span data-dcnode-id="3694" instrument_node="">Armor is generally bolted to the ship's structure.  The reason for this is that armor is generally not homogeneous: the outer surface is case-hardened using various chemical processes so that it has the greatest possible resistance to penetration, while below this hard surface the steel is maintained in a ductile condition to prevent the plate from becoming brittle and shattering if hit by a projectile that cannot be stopped by the surface. This process had different names and slightly different chemistry among the various producers of armor, such as "Harveyed" in Britain or "Krupp Cemented (KC)" in Germany. So as not to weaken the hardened surface, these plates needed to have a threaded rod screwed in from the rear into the ductile part.  This rod could later be passed through a corresponding hole in a layer of teak backing and the ship's structural plating, then secured with a washer and nut.  It was rarely practical to secure adjacent plates to each other, so belt armor was generally not watertight, and the backing and fasteners added weight. </span></p><span data-dcnode-id="3692" instrument_node="">
</span><p class="just" data-dcnode-id="3687"><span data-dcnode-id="3691" instrument_node="">But, by 1912, high tensile steel ("HTS", harder than mild steel through and through, but with substantial toughness as well) had become available.  For light armor under 4", this worked nearly as well as case-hardened plates.  The Royal Navy used HTS for </span><i data-dcnode-id="3689"><span data-dcnode-id="3690" instrument_node="">Arethusa's</span></i><span data-dcnode-id="3688" instrument_node=""> belt, riveted firmly into the surrounding plating so that it was part of the watertight envelope of the ship.  It therefore contributed to longitudinal strength, although this contribution was not huge since it was close to the neutral axis of the hull. The deck and bottom were the principal members of the "box girder" of the hull, when considered in longitudinal bending.  The added stiffness provided by the belt allowed some degree of weight saving in the rest of the structure, but probably more by eliminating fasteners and backing. </span></p><span data-dcnode-id="3686" instrument_node="">
</span><p class="just" data-dcnode-id="3681"><span data-dcnode-id="3685" instrument_node="">The </span><i data-dcnode-id="3683"><span data-dcnode-id="3684" instrument_node="">Arethusa</span></i><span data-dcnode-id="3682" instrument_node=""> was also the first British cruiser to be called a "light" cruiser; she later achieved fame as the flagship of Commodore (later Admiral) Sir Reginald Y. Tyrwhitt, CB, RN, commanding the "Harwich Force" of destroyers. </span></p><span data-dcnode-id="3680" instrument_node="">
</span><p class="just" data-dcnode-id="3675"><span data-dcnode-id="3679" instrument_node="">Japan received a visit by HMS </span><i data-dcnode-id="3677"><span data-dcnode-id="3678" instrument_node="">Hawkins</span></i><span data-dcnode-id="3676" instrument_node=""> shortly after the war, and she made a huge impression.  Accordingly, they adopted the 8-inch gun as the standard cruiser weapon, agreeing with soon-to-be-imposed Treaty limits. </span></p><span data-dcnode-id="3674" instrument_node="">
</span><p class="just" data-dcnode-id="3666"><span data-dcnode-id="3673" instrument_node="">In 1921 (before the Treaty took effect) they started building an innovative, experimental small cruiser, </span><i data-dcnode-id="3671"><span data-dcnode-id="3672" instrument_node="">Yubari, </span></i><span data-dcnode-id="3670" instrument_node="">that with a displacement of only 3309 tons, achieved 34.8 knots on trials and mounted six 5.5-inch guns and twin 24-inch torpedo tubes.  Like </span><i data-dcnode-id="3668"><span data-dcnode-id="3669" instrument_node="">Arethusa</span></i><span data-dcnode-id="3667" instrument_node="">, this ship had armor used as a strength member. </span></p><span data-dcnode-id="3665" instrument_node="">
</span><p class="just" data-dcnode-id="3660"><span data-dcnode-id="3664" instrument_node="">In 1922 Japan placed an order for a larger Treaty cruiser, mounting six 20-cm (7.4-inch) guns, 3-inch side armor and 34.5 knot speed, all on 7100 tons standard displacement.  Here too, armor was used as a strength member.  The name-ship </span><i data-dcnode-id="3662"><span data-dcnode-id="3663" instrument_node="">Kako </span></i><span data-dcnode-id="3661" instrument_node="">came out overweight, barely within Treaty limits at 9540 tonnes standard.  However, in spite of the extra weight, the two ships achieved their design speed on trials. </span></p><span data-dcnode-id="3659" instrument_node="">
</span><p class="just" data-dcnode-id="3654"><span data-dcnode-id="3658" instrument_node="">The British built their first class of Treaty cruisers in 1924-5, commissioned in 1928. This was the "County" or </span><i data-dcnode-id="3656"><span data-dcnode-id="3657" instrument_node="">Kent</span></i><span data-dcnode-id="3655" instrument_node=""> class. They were 9750 tons standard displacement, armed with four twin 8"/50's, four 4"/45 AA, two quadruple 2-pdrs, 2 quadruple 21inch torpedo tubes, and later one seaplane apiece.  Armor was extremely light, with a 1inch belt and additional 1 to 4 inch magazine box protection.  The main armor was concentrated in a 1.375-inch protective deck.  This lack of armor was a direct result of compromises inherent in the Treaty displacement limit coupled with the desire for high speed (31.5 knots on 80,000 SHP with 4 shafts.)  The Admiralty had earlier wanted 33 knots, and the Director of Naval Construction (DNC) had intended to delete the belt armor entirely; the reduced speed and light belt were a compromise.  (Why exactly the British chose to build a heavy cruiser so early in light of their later opposition to the type is somewhat mysterious.) </span></p><span data-dcnode-id="3653" instrument_node="">
</span><p class="just" data-dcnode-id="3642"><span data-dcnode-id="3652" instrument_node="">France authorized its </span><i data-dcnode-id="3650"><span data-dcnode-id="3651" instrument_node="">Duguay-Trouin</span></i><span data-dcnode-id="3649" instrument_node=""> class of 3 cruisers in 1922 (commissioned 1926-7). They had eight 155-mm (6.1 inch) guns in twin turrets and made 33 knots on trials, but had practically no armor.  At 7250 tons standard, 9350 full load, and carrying four 75mm secondary guns and twelve 21-inch torpedo tubes, they were well below Treaty limits and probably their lack of armor was the result of other considerations rather than Treaty compliance.  They were heavily powered at 100,000 SHP, 4 shafts, even more than the US </span><i data-dcnode-id="3647"><span data-dcnode-id="3648" instrument_node="">Omaha.</span></i><span data-dcnode-id="3646" instrument_node="">  Since they also had an advantage in length and were not much different in displacement, it is surprising they did not turn in a better trials speed. Endurance was only 3,000 miles at 15; </span><i data-dcnode-id="3644"><span data-dcnode-id="3645" instrument_node="">Omaha</span></i><span data-dcnode-id="3643" instrument_node=""> claimed more than twice as much, but endurance figures in this period were frequently criticized as inaccurate. </span></p><span data-dcnode-id="3641" instrument_node="">
</span><p class="just" data-dcnode-id="3634" id="LinkTarget_8410"><strong data-dcnode-id="3636"><span data-dcnode-id="3640" instrument_node="">4.3.2 	</span><i data-dcnode-id="3638"><span data-dcnode-id="3639" instrument_node="">Pensacola</span></i><span data-dcnode-id="3637" instrument_node=""> Class</span></strong><span data-dcnode-id="3635" instrument_node=""> </span></p><span data-dcnode-id="3633" instrument_node="">
</span><p class="just" data-dcnode-id="3629"><span data-dcnode-id="3632" instrument_node="">If the General Board had strongly favored cruisers before 1922, the Washington Treaty greatly increased its interest in them.  In effect the Treaty turned the 8-inch gun cruiser into a kind of junior capital ship. The old scouting role was, if anything, more important in the new kind of Pacific war the navy was then planning than it had been in the Atlantic. Perhaps as importantly, the prospect of losing a single capital ship out of the reduced number surviving under the Treaty would deter a commander from releasing single ships for such roles as convoy escort and shore bombardment.  In WWI there had been many obsolete battleships and armored cruisers available for even the riskiest assignments, but they had been wiped out at the conference table.  To fill their place, heavy cruisers, their numbers unlimited under the Treaty, would be required.</span><sup data-dcnode-id="3630"><span data-dcnode-id="3631" instrument_node="">xiii </span></sup></p><span data-dcnode-id="3628" instrument_node="">
</span><p class="just" data-dcnode-id="3621"><span data-dcnode-id="3627" instrument_node="">The General Board had evaluated a number of scout cruiser designs leading up to the Treaty limitations, and continued to evaluate alternatives up to 1924 with the authorization of the </span><i data-dcnode-id="3625"><span data-dcnode-id="3626" instrument_node="">Pensacola</span></i><span data-dcnode-id="3624" instrument_node="">. The General Board concluded that designs split into two categories depending on what function a cruiser would serve: protecting or destroying merchant ships, or operating with the fleet.  Ships in the former role required a speed of 32 to 34 knots, in the latter, 27 to 32 knots. Although opinions on guns and protection differed widely, the Board did agree that aircraft were secondary.</span><sup data-dcnode-id="3622"><span data-dcnode-id="3623" instrument_node="">xiv </span></sup></p><span data-dcnode-id="3620" instrument_node="">
</span><p class="just" data-dcnode-id="3606"><span data-dcnode-id="3619" instrument_node="">By December 1924 there was enough evidence of foreign willingness to begin a cruiser-building race that Congress authorized eight new cruisers, the </span><i data-dcnode-id="3617"><span data-dcnode-id="3618" instrument_node="">Pensacola</span></i><span data-dcnode-id="3616" instrument_node="">s (CA 24-25) and the </span><i data-dcnode-id="3614"><span data-dcnode-id="3615" instrument_node="">Northampton</span></i><span data-dcnode-id="3613" instrument_node="">s (CA 26-31). The first of the </span><i data-dcnode-id="3611"><span data-dcnode-id="3612" instrument_node="">Pensacola</span></i><span data-dcnode-id="3610" instrument_node=""> Class cruisers launched was the USS </span><i data-dcnode-id="3608"><span data-dcnode-id="3609" instrument_node="">Salt Lake City</span></i><span data-dcnode-id="3607" instrument_node=""> (CA 25) on January 23, 1929, with a design displacement of 11,568 tons. </span></p><span data-dcnode-id="3605" instrument_node="">
</span><img alt="cruiser" data-dcnode-id="3604" height="197" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.navalmarinearchive.com/research/cruisers/cr_ims/cr_img_5.jpg&amp;raw" width="360"><span data-dcnode-id="3603" instrument_node="">
</span><h3 data-dcnode-id="3599"><span data-dcnode-id="3602" instrument_node="">Figure 3 CA24 </span><i data-dcnode-id="3600"><span data-dcnode-id="3601" instrument_node="">Pensacola</span></i></h3><span data-dcnode-id="3598" instrument_node="">
</span><p class="just" data-dcnode-id="3594" id="LinkTarget_8416"><strong data-dcnode-id="3596"><span data-dcnode-id="3597" instrument_node="">4.3.3 	Northampton Class</span></strong><span data-dcnode-id="3595" instrument_node=""> </span></p><span data-dcnode-id="3593" instrument_node="">
</span><p class="just" data-dcnode-id="3574"><span data-dcnode-id="3592" instrument_node="">The development of an alternative design to the </span><i data-dcnode-id="3590"><span data-dcnode-id="3591" instrument_node="">Pensacola</span></i><span data-dcnode-id="3589" instrument_node=""> Class, which became the </span><i data-dcnode-id="3587"><span data-dcnode-id="3588" instrument_node="">Northampton</span></i><span data-dcnode-id="3586" instrument_node=""> Class, began even before the </span><i data-dcnode-id="3584"><span data-dcnode-id="3585" instrument_node="">Salt Lake City</span></i><span data-dcnode-id="3583" instrument_node=""> had been laid down. The new ships had two separate origins.  First, there was a feeling within C&amp;R that the </span><i data-dcnode-id="3581"><span data-dcnode-id="3582" instrument_node="">Salt Lake City</span></i><span data-dcnode-id="3580" instrument_node=""> design sacrificed too much in order to mount the maximum battery, ten 8-inch guns. No great improvement in protection could be achieved, but it did seem possible to improve the balance between firepower and seagoing characteristics.  That is, the earlier design had traded freeboard for extra guns.  Reducing the armament to 9 guns had a big effect on weight, armor area, and volume because this battery could be mounted in three triple turrets, rather than requiring four turrets of two different designs.  Also, the aircraft arrangements of the </span><i data-dcnode-id="3578"><span data-dcnode-id="3579" instrument_node="">Pensacola</span></i><span data-dcnode-id="3577" instrument_node=""> Class were not entirely satisfactory.</span><sup data-dcnode-id="3575"><span data-dcnode-id="3576" instrument_node="">xv </span></sup></p><span data-dcnode-id="3573" instrument_node="">
</span><p class="just" data-dcnode-id="3566"><span data-dcnode-id="3572" instrument_node="">The other and driving impulse behind a new cruiser came from the General Board. In 1926, with funds for three new cruisers in prospect, it sought improvement over the existing </span><i data-dcnode-id="3570"><span data-dcnode-id="3571" instrument_node="">Salt Lake City</span></i><span data-dcnode-id="3569" instrument_node=""> design to increase survivability.</span><sup data-dcnode-id="3567"><span data-dcnode-id="3568" instrument_node="">xvi </span></sup></p><span data-dcnode-id="3565" instrument_node="">
</span><p class="just" data-dcnode-id="3552"><span data-dcnode-id="3564" instrument_node="">There was considerable interest in habitability for the </span><i data-dcnode-id="3562"><span data-dcnode-id="3563" instrument_node="">Northampton</span></i><span data-dcnode-id="3561" instrument_node="">s. Volume studies showed an increase from the </span><i data-dcnode-id="3559"><span data-dcnode-id="3560" instrument_node="">Salt Lake City</span></i><span data-dcnode-id="3558" instrument_node=""> Class of about 15% per man.  The </span><i data-dcnode-id="3556"><span data-dcnode-id="3557" instrument_node="">Northampton</span></i><span data-dcnode-id="3555" instrument_node="">s were the first major US warships to be designed for bunks rather than hammocks.  Objections were raised: bunks would encroach upon open spaces used for recreation, assembly, and shelter in bad weather, as well as upon mess spaces.  Bunks above the second deck would be subject to splinter damage, though this danger was rationalized by Navy planners with a familiar ring to modern ears.</span><sup data-dcnode-id="3553"><span data-dcnode-id="3554" instrument_node="">xvii </span></sup></p><span data-dcnode-id="3551" instrument_node="">
</span><p class="just" data-dcnode-id="3549"><span data-dcnode-id="3550" instrument_node="">The rationale was that the crew should be at battle stations during action, and therefore the bunk spaces would be lightly, if at all, manned.  The fraction of the ship's time spent at war was miniscule compared with the time spent during peacetime.  In the event of war, the bunks could easily be removed and the sailors would put up with reduced accommodations as one of the obligatory sacrifices made necessary by war. </span></p><span data-dcnode-id="3548" instrument_node="">
</span><p class="just" data-dcnode-id="3546"><span data-dcnode-id="3547" instrument_node="">Even then, the Navy suffered from a high rate of desertion and poor reenlistment numbers. The improved habitability was one step in a far reaching effort to improve retention through quality of life that extends to today. </span></p><span data-dcnode-id="3545" instrument_node="">
</span><p class="just" data-dcnode-id="3537"><span data-dcnode-id="3544" instrument_node="">The first of the </span><i data-dcnode-id="3542"><span data-dcnode-id="3543" instrument_node="">Northampton</span></i><span data-dcnode-id="3541" instrument_node=""> class cruisers, the USS </span><i data-dcnode-id="3539"><span data-dcnode-id="3540" instrument_node="">Chester</span></i><span data-dcnode-id="3538" instrument_node=""> (CA 27), was launched July 3, 1927, with a design displacement of 11,574 tons. </span></p><span data-dcnode-id="3536" instrument_node="">
</span><img alt="cruiser" data-dcnode-id="3535" height="207" id="LinkTarget_8436" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.navalmarinearchive.com/research/cruisers/cr_ims/cr_img_6.jpg&amp;raw" width="360"><span data-dcnode-id="3534" instrument_node="">
</span><p align="center" data-dcnode-id="3530"><span data-dcnode-id="3533" instrument_node="">Figure 4 CA 29 </span><i data-dcnode-id="3531"><span data-dcnode-id="3532" instrument_node="">Chicago </span></i></p><span data-dcnode-id="3529" instrument_node="">
</span><p class="just" data-dcnode-id="3520"><strong data-dcnode-id="3521"><span data-dcnode-id="3528" instrument_node="">4.3.4 	The "Treaty Tinclads": </span><i data-dcnode-id="3526"><span data-dcnode-id="3527" instrument_node="">Pensacola</span></i><span data-dcnode-id="3525" instrument_node=""> and </span><i data-dcnode-id="3523"><span data-dcnode-id="3524" instrument_node="">Northampton</span></i><span data-dcnode-id="3522" instrument_node=""> Classes</span></strong></p><span data-dcnode-id="3519" instrument_node="">
</span><p class="just" data-dcnode-id="3487"><span data-dcnode-id="3518" instrument_node=""> The great irony was that, after the designs had been largely determined by the need to stay barely within Treaty limits, the ships came out grossly underweight, even after last-minute changes.  The full load delivery displacement of 10,666 tons for the </span><i data-dcnode-id="3516"><span data-dcnode-id="3517" instrument_node="">Salt Lake City</span></i><span data-dcnode-id="3515" instrument_node=""> was a full 900 tons underweight, the full load delivery displacement of the </span><i data-dcnode-id="3513"><span data-dcnode-id="3514" instrument_node="">Northampton</span></i><span data-dcnode-id="3512" instrument_node=""> of 10,965 tons a full 600 tons underweight.  This was a result of Preliminary Design's conservative estimating of the design weight and the concurrent implementation of the </span><i data-dcnode-id="3510"><span data-dcnode-id="3511" instrument_node="">Northampton</span></i><span data-dcnode-id="3509" instrument_node=""> class, which was already being built by the time the weight shortage in the </span><i data-dcnode-id="3507"><span data-dcnode-id="3508" instrument_node="">Salt Lake City </span></i><span data-dcnode-id="3506" instrument_node="">was fully realized.  As a result, the both classes had an excessive metacentric height.  The roll was, therefore, both short and deep which caused a disconcerting motion.</span><sup data-dcnode-id="3504"><span data-dcnode-id="3505" instrument_node="">xviii </span></sup><span data-dcnode-id="3503" instrument_node="">Very heavy snap rolling could even break the topmast, which was essential for long-range radio at this time.  This happened to the </span><i data-dcnode-id="3501"><span data-dcnode-id="3502" instrument_node="">Salt Lake City</span></i><span data-dcnode-id="3500" instrument_node=""> when she was en route from New York to Guantanamo early in 1931.  Anti-rolling tanks were installed experimentally in the </span><i data-dcnode-id="3498"><span data-dcnode-id="3499" instrument_node="">Pensacola</span></i><span data-dcnode-id="3497" instrument_node=""> and the </span><i data-dcnode-id="3495"><span data-dcnode-id="3496" instrument_node="">Northampton</span></i><span data-dcnode-id="3494" instrument_node="">. The tanks were not interconnected, rather, the tank on each side was open to the sea, with a vent pipe.</span><sup data-dcnode-id="3492"><span data-dcnode-id="3493" instrument_node="">xix </span></sup><span data-dcnode-id="3491" instrument_node="">There were also complaints of weak sternposts and excessive vibration aft at high speed, presumably due to weight savings in the hull structure and cured by structural stiffening. The ships seemed light, with serious damage inflicted on the hull of the ship when the three guns of a turret were fired together.</span><sup data-dcnode-id="3489"><span data-dcnode-id="3490" instrument_node="">xx</span></sup><span data-dcnode-id="3488" instrument_node="">  Thus the first two cruiser classes emerging from the Washington Naval Treaty were informally dubbed "Treaty tinclads." </span></p><span data-dcnode-id="3486" instrument_node="">
</span><p class="just" data-dcnode-id="3481"><span data-dcnode-id="3485" instrument_node="">The 8-inch gun cruisers brought a new capability to the fleet when they entered the service. They replaced the elderly battleships of the Scouting Force and served not merely as scouts but, perhaps much more importantly, as escorts for the new fast carriers in independent task force operations.  Another role these cruisers could fill was that of fleet flagship. The first three </span><i data-dcnode-id="3483"><span data-dcnode-id="3484" instrument_node="">Northampton</span></i><span data-dcnode-id="3482" instrument_node="">s were built as division flagships.  The last three were fleet flagships. </span></p><span data-dcnode-id="3480" instrument_node="">
</span><h3 data-dcnode-id="3475" id="LinkTarget_8445"><span data-dcnode-id="3479" instrument_node="">4.4 2</span><sup data-dcnode-id="3477"><span data-dcnode-id="3478" instrument_node="">nd</span></sup><span data-dcnode-id="3476" instrument_node=""> Generation Treaty Cruisers</span></h3><span data-dcnode-id="3474" instrument_node="">
</span><p class="just" data-dcnode-id="3467"><strong data-dcnode-id="3469"><span data-dcnode-id="3473" instrument_node="">4.4.1 	</span><i data-dcnode-id="3471"><span data-dcnode-id="3472" instrument_node="">Portland</span></i><span data-dcnode-id="3470" instrument_node=""> Class</span></strong><span data-dcnode-id="3468" instrument_node=""> </span></p><span data-dcnode-id="3466" instrument_node="">
</span><p class="just" data-dcnode-id="3449"><span data-dcnode-id="3465" instrument_node="">Almost from the first, there was certain dissatisfaction with the very limited protection of the 8-inch gun cruiser.  As it became evident that more weight was available than had originally been estimated, protection was improved as much as possible in the ships still under construction.</span><sup data-dcnode-id="3463"><span data-dcnode-id="3464" instrument_node="">xxi </span></sup><span data-dcnode-id="3462" instrument_node="">  The </span><i data-dcnode-id="3460"><span data-dcnode-id="3461" instrument_node="">Portland</span></i><span data-dcnode-id="3459" instrument_node=""> Class, originally slated as CA 32-36, was in effect an upgraded version of the </span><i data-dcnode-id="3457"><span data-dcnode-id="3458" instrument_node="">Northampton</span></i><span data-dcnode-id="3456" instrument_node=""> Class cruisers. The first </span><i data-dcnode-id="3454"><span data-dcnode-id="3455" instrument_node="">Portland</span></i><span data-dcnode-id="3453" instrument_node=""> Class cruiser launched was the USS </span><i data-dcnode-id="3451"><span data-dcnode-id="3452" instrument_node="">Indianapolis</span></i><span data-dcnode-id="3450" instrument_node="">, on 7 November, 1931.  She had a design full load displacement of 11,574 tons, a speed of 32.5 knots and an endurance range of 10,000 nm at 15 knots.  Her main battery consisted of nine 8-in/55 guns and an anti-aircraft battery of eight 5-in/25 guns and eight 0.50 caliber machine guns.  She actually came in heavy at a full load delivery displacement of 12,755 tons. </span></p><span data-dcnode-id="3448" instrument_node="">
</span><img alt="cruiser" data-dcnode-id="3447" height="240" id="LinkTarget_8454" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.navalmarinearchive.com/research/cruisers/cr_ims/cr_img_7.jpg&amp;raw" width="308"><span data-dcnode-id="3446" instrument_node="">
</span><p align="center" data-dcnode-id="3442"><span data-dcnode-id="3445" instrument_node="">Figure 5 CA 35 </span><i data-dcnode-id="3443"><span data-dcnode-id="3444" instrument_node="">Indianapolis </span></i></p><span data-dcnode-id="3441" instrument_node="">
</span><p class="just" data-dcnode-id="3434"><strong data-dcnode-id="3436"><span data-dcnode-id="3440" instrument_node="">4.4.2 	</span><i data-dcnode-id="3438"><span data-dcnode-id="3439" instrument_node="">New Orleans</span></i><span data-dcnode-id="3437" instrument_node=""> Class</span></strong><span data-dcnode-id="3435" instrument_node=""> </span></p><span data-dcnode-id="3433" instrument_node="">
</span><p class="just" data-dcnode-id="3404"><span data-dcnode-id="3432" instrument_node="">The follow on group to the </span><i data-dcnode-id="3430"><span data-dcnode-id="3431" instrument_node="">Portland</span></i><span data-dcnode-id="3429" instrument_node=""> Class cruisers, CA 37-41, exhibited such superior characteristics, that an attempt was made to reorder CA 32-36 to its specifications.  However, two ships, the </span><i data-dcnode-id="3427"><span data-dcnode-id="3428" instrument_node="">Portland</span></i><span data-dcnode-id="3426" instrument_node=""> and the </span><i data-dcnode-id="3424"><span data-dcnode-id="3425" instrument_node="">Indianapolis</span></i><span data-dcnode-id="3423" instrument_node=""> had been awarded to private builders and contract changes would be far too expensive.  The remaining three ships were all at Navy yards and could be modified without great expense.  Thus the </span><i data-dcnode-id="3421"><span data-dcnode-id="3422" instrument_node="">Portland</span></i><span data-dcnode-id="3420" instrument_node=""> Class was relegated to just two ships, while CA 37 became the lead ship for the new </span><i data-dcnode-id="3418"><span data-dcnode-id="3419" instrument_node="">New Orleans</span></i><span data-dcnode-id="3417" instrument_node=""> Class cruisers. The </span><i data-dcnode-id="3415"><span data-dcnode-id="3416" instrument_node="">New Orleans</span></i><span data-dcnode-id="3414" instrument_node=""> Class cruisers corrected the weight estimation deficiencies of the previous classes, and formed a much better protected and balanced cruiser design.  The </span><i data-dcnode-id="3412"><span data-dcnode-id="3413" instrument_node="">New Orleans</span></i><span data-dcnode-id="3411" instrument_node=""> Class was the first US cruisers built without torpedo tubes due to war gaming results from the Naval War College which indicated that the torpedoes were unlikely to be fired from a cruiser, and more a liability than an asset.  (These academic results were contradicted a number of times during World War II, when both Japanese and British cruisers used torpedoes rather effectively). The first ship of the </span><i data-dcnode-id="3409"><span data-dcnode-id="3410" instrument_node="">New Orleans</span></i><span data-dcnode-id="3408" instrument_node=""> class launched was the USS </span><i data-dcnode-id="3406"><span data-dcnode-id="3407" instrument_node="">San Francisco</span></i><span data-dcnode-id="3405" instrument_node="">, on March 9, 1933.  She had a full load displacement of 11,585 tons, a design speed of 32.7 knots, and a design range of 10,000 nm at 15 knots.  She had a main battery of nine 8inch/55 guns and an anti-aircraft battery of eight 5-inch/25 guns and eight 0.50 caliber machine guns. </span></p><span data-dcnode-id="3403" instrument_node="">
</span><img alt="cruiser" data-dcnode-id="3402" height="183" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.navalmarinearchive.com/research/cruisers/cr_ims/cr_img_8.jpg&amp;raw" width="379"><span data-dcnode-id="3401" instrument_node="">
</span><p align="center" data-dcnode-id="3397"><span data-dcnode-id="3400" instrument_node="">Figure 6 CA 38 </span><i data-dcnode-id="3398"><span data-dcnode-id="3399" instrument_node="">San Francisco </span></i></p><span data-dcnode-id="3396" instrument_node="">
</span><h3 data-dcnode-id="3394" id="LinkTarget_8460"><span data-dcnode-id="3395" instrument_node="">4.5 Geneva Summit and the London Naval Treaty of 1930</span></h3><span data-dcnode-id="3393" instrument_node="">
</span><p class="just" data-dcnode-id="3391"><span data-dcnode-id="3392" instrument_node="">The heavy cruiser race began in earnest in 1922 with Japan's announcement of a major construction program of cruisers, destroyers, and submarines.  The British, Americans, French and Italians soon followed suit.  The first attempts to curtail the buildup began in 1925 through the League of Nations.  These talks and a second series of talks in 1927 in Geneva both failed. The United States and Britain were fundamentally at odds on the issue of heavy cruiser buildup.  </span></p><span data-dcnode-id="3390" instrument_node="">
</span><p class="just" data-dcnode-id="3386"><span data-dcnode-id="3389" instrument_node="">The British preference was for smaller cruisers because they were easier to build and maintain across the vast British Empire.  The existence of heavy cruisers was an obvious threat to a predominantly light cruiser oriented British fleet.  The British did, however, need heavy cruisers for working with the fleet.  Therefore, their position was not to eliminate the heavy cruiser, but to limit its numbers.</span><sup data-dcnode-id="3387"><span data-dcnode-id="3388" instrument_node="">xxii </span></sup></p><span data-dcnode-id="3385" instrument_node="">
</span><p class="just" data-dcnode-id="3381"><span data-dcnode-id="3384" instrument_node="">For the American fleet, trade protection was not a major consideration.  The US needed to maintain naval communications out to the Philippines in the Far East. Large cruisers were vital, since American refueling facilities and naval bases in the Pacific were few.  The American position was to maintain the current restrictions set forth in the Washington Naval Treaty, but to control escalating costs by restricting the numbers built by the negotiating navies.</span><sup data-dcnode-id="3382"><span data-dcnode-id="3383" instrument_node=""> xxiii </span></sup></p><span data-dcnode-id="3380" instrument_node="">
</span><p class="just" data-dcnode-id="3376"><span data-dcnode-id="3379" instrument_node="">The Japanese had very little use for light cruisers as trade protection was not a major concern. They instead required cruisers which could work with the fleet.  The Japanese wanted parity with their American and British counterparts, and to maintain the Washington Naval Treaty restrictions concerning heavy cruisers.</span><sup data-dcnode-id="3377"><span data-dcnode-id="3378" instrument_node="">xxiv </span></sup></p><span data-dcnode-id="3375" instrument_node="">
</span><p class="just" data-dcnode-id="3373"><span data-dcnode-id="3374" instrument_node="">In the interim between the failed Geneva talks of 1927 and the London Naval Treaty of 1930, several key compromises were worked out between the negotiating parties. The United States agreed to restrict its total number of heavy cruisers to 18, and build the remainder of its tonnage allowance in light cruisers.  Japan gained a higher ratio of 10:7 against the American and British light cruisers and destroyers, and maintained the 10:6 ratios in heavy cruisers. The maximum armament allowed for subsequent light cruisers was set at 6-inch guns and maximum displacement 10,000 tons. </span></p><span data-dcnode-id="3372" instrument_node="">
</span><p class="just" data-dcnode-id="3368" id="LinkTarget_8470"><strong data-dcnode-id="3370"><span data-dcnode-id="3371" instrument_node="">4.5.1 	Flying-Deck Cruisers</span></strong><span data-dcnode-id="3369" instrument_node=""> </span></p><span data-dcnode-id="3367" instrument_node="">
</span><p class="just" data-dcnode-id="3354"><span data-dcnode-id="3366" instrument_node="">As part of the Washington Naval Treaty, the battle cruisers </span><i data-dcnode-id="3364"><span data-dcnode-id="3365" instrument_node="">Saratoga</span></i><span data-dcnode-id="3363" instrument_node=""> and </span><i data-dcnode-id="3361"><span data-dcnode-id="3362" instrument_node="">Lexington</span></i><span data-dcnode-id="3360" instrument_node=""> were both converted into aircraft carriers.  Unfortunately, these ships together used up nearly half the carrier tonnage quota allowed to the US Navy under the Treaty, so that less tonnage remained for future construction.  Furthermore, a frugal Congress kept naval appropriations so small that no new carriers could be built.  The result was that the Navy, well aware of the potential of the aircraft carrier for scouting and attack duties, began to consider aircraft carrier/cruiser hybrids.  Given that resources were too scarce to have both, the hope was to combine the best features of both ship types into a single cruiser class.</span><sup data-dcnode-id="3358"><span data-dcnode-id="3359" instrument_node="">xxv </span></sup><span data-dcnode-id="3357" instrument_node="">Within a few months of the conclusion of the London Naval Treaty, the Bureau of Construction and Repair was working on plans for what was called a flying-deck cruiser.  The design was to incorporate as much carrier capability as possible while sacrificing the least amount of cruiser capability. All of this in a ship whose displacement could not exceed 10,000 tons.</span><sup data-dcnode-id="3355"><span data-dcnode-id="3356" instrument_node="">xxvi </span></sup></p><span data-dcnode-id="3353" instrument_node="">
</span><p class="just" data-dcnode-id="3351"><span data-dcnode-id="3352" instrument_node="">With the election of Roosevelt and the implementation of the "New Deal", specifically manifested in the National Industrial Recovery Act of 1933, the US Navy suddenly found itself in the unexpected position of no longer needing to compromise between carriers and cruisers.  Given the funds necessary to build both types of ships, the flying-deck cruiser idea was scrapped. </span></p><span data-dcnode-id="3350" instrument_node="">
</span><p class="just" data-dcnode-id="3343" id="LinkTarget_8478"><strong data-dcnode-id="3345"><span data-dcnode-id="3349" instrument_node="">4.5.2 	</span><i data-dcnode-id="3347"><span data-dcnode-id="3348" instrument_node="">Erie</span></i><span data-dcnode-id="3346" instrument_node=""> Class Gunboats</span></strong><span data-dcnode-id="3344" instrument_node=""> </span></p><span data-dcnode-id="3342" instrument_node="">
</span><p class="just" data-dcnode-id="3319"><span data-dcnode-id="3341" instrument_node="">The </span><i data-dcnode-id="3339"><span data-dcnode-id="3340" instrument_node="">Erie</span></i><span data-dcnode-id="3338" instrument_node=""> Class gunboats were an updated version of the old peace cruiser with important additional wartime roles.  It is because these gunboats had a role usually filled by a cruiser that they are worth some mention in this report.  The roles the new gunboat would fill in a wartime setting were listed by Captain Ingersoll of Fleet Training as antisubmarine and anti-destroyer screening, high-speed minesweeping ahead of the battle fleet, tactical control of fleet submarines, plane guard duty for slow carriers, support of destroyer attacks made from ahead of an enemy fleet, convoy warfare, and fire support of amphibious operations.</span><sup data-dcnode-id="3336"><span data-dcnode-id="3337" instrument_node="">xxvii </span></sup><span data-dcnode-id="3335" instrument_node=""> Unfortunately the </span><i data-dcnode-id="3333"><span data-dcnode-id="3334" instrument_node="">Erie</span></i><span data-dcnode-id="3332" instrument_node=""> Class was too slow to perform most of these functions.  Although the ships were intended to spend most of their service in Asiatic or Caribbean waters, their design was governed by their proposed semi-cruiser employment in wartime. The </span><i data-dcnode-id="3330"><span data-dcnode-id="3331" instrument_node="">Erie </span></i><span data-dcnode-id="3329" instrument_node="">was designed to embark an aircraft because of the needs of the Asiatic station. The </span><i data-dcnode-id="3327"><span data-dcnode-id="3328" instrument_node="">Erie</span></i><span data-dcnode-id="3326" instrument_node=""> Class gunboats could augment the dwindling number of tender-based aircraft.  The hull was designed with a wide transom to facilitate minelaying or for carrying depth charges, while the rake and sheer of the bow resisted green water.  Diesel propulsion was considered but abandoned in favor of steam turbines because the turbines would fit in a smaller space, and </span><i data-dcnode-id="3324"><span data-dcnode-id="3325" instrument_node="">Erie</span></i><span data-dcnode-id="3323" instrument_node=""> was a tight design. One of the problems the General Board had in choosing a final design for the </span><i data-dcnode-id="3321"><span data-dcnode-id="3322" instrument_node="">Erie </span></i><span data-dcnode-id="3320" instrument_node="">Class concerned armor: did an armored ship violate the letter or the spirit of the Treaty? </span></p><span data-dcnode-id="3318" instrument_node="">
</span><p class="just" data-dcnode-id="3310"><span data-dcnode-id="3317" instrument_node="">The board convinced itself that it was allowed by their interpretation and the </span><i data-dcnode-id="3315"><span data-dcnode-id="3316" instrument_node="">Erie</span></i><span data-dcnode-id="3314" instrument_node=""> was designed to allow the ready addition of a 3 inch side belt in time of war. While it appears the belt was not fitted at delivery</span><sup data-dcnode-id="3312"><span data-dcnode-id="3313" instrument_node="">xxviii</span></sup><span data-dcnode-id="3311" instrument_node="">, photos from the war years seem to show it. </span></p><span data-dcnode-id="3309" instrument_node="">
</span><p class="just" data-dcnode-id="3304"><span data-dcnode-id="3308" instrument_node="">The </span><i data-dcnode-id="3306"><span data-dcnode-id="3307" instrument_node="">Erie</span></i><span data-dcnode-id="3305" instrument_node=""> class was not particularly successful.  It consisted of only 2 ships; the name-ship was torpedoed in November 1942 and after being towed to harbor, capsized and became a total loss.  Considering how small a ship this was, loss to one torpedo hit does not reflect badly on the design. The sister was decommissioned in 1946 after only 10 years of service.  </span></p><span data-dcnode-id="3303" instrument_node="">
</span><p class="just" data-dcnode-id="3296" id="LinkTarget_8484"><strong data-dcnode-id="3298"><span data-dcnode-id="3302" instrument_node="">4.5.3 	</span><i data-dcnode-id="3300"><span data-dcnode-id="3301" instrument_node="">Brooklyn</span></i><span data-dcnode-id="3299" instrument_node=""> Class Light Cruisers</span></strong><span data-dcnode-id="3297" instrument_node=""> </span></p><span data-dcnode-id="3295" instrument_node="">
</span><p class="just" data-dcnode-id="3281"><span data-dcnode-id="3294" instrument_node="">The London Naval Treaty (1930) had the immediate effect of triggering construction of the first seven </span><i data-dcnode-id="3292"><span data-dcnode-id="3293" instrument_node="">Brooklyn</span></i><span data-dcnode-id="3291" instrument_node=""> Class light cruisers.  These cruisers and the </span><i data-dcnode-id="3289"><span data-dcnode-id="3290" instrument_node="">Brooklyn</span></i><span data-dcnode-id="3288" instrument_node=""> based design for the </span><i data-dcnode-id="3286"><span data-dcnode-id="3287" instrument_node="">Wichita</span></i><span data-dcnode-id="3285" instrument_node=""> mark a defining moment in US cruiser design. Previous cruisers had evolved steadily under the limitations of the Washington Naval Treaty while the cruisers to follow would be unfettered by Treaty limitations.  The </span><i data-dcnode-id="3283"><span data-dcnode-id="3284" instrument_node="">Brooklyn</span></i><span data-dcnode-id="3282" instrument_node=""> Class undoubtedly would never have been built were it not for the influence of the London Treaty of 1930.  The US Navy suddenly found itself in the difficult situation of being obligated to build 6-inch gun cruisers regardless of the military value of such ships.  Absent the 1930 Treaty, there is little doubt that the US Navy would have preferred improved 8-inch gun cruisers. </span></p><span data-dcnode-id="3280" instrument_node="">
</span><p class="just" data-dcnode-id="3257"><span data-dcnode-id="3279" instrument_node="">The legacy of the London Treaty of 1930 stretched far beyond the </span><i data-dcnode-id="3277"><span data-dcnode-id="3278" instrument_node="">Brooklyn</span></i><span data-dcnode-id="3276" instrument_node=""> Class. Both major wartime classes, the </span><i data-dcnode-id="3274"><span data-dcnode-id="3275" instrument_node="">Clevelands</span></i><span data-dcnode-id="3273" instrument_node=""> and the </span><i data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node="">Baltimores</span></i><span data-dcnode-id="3270" instrument_node="">, share a direct lineage with the </span><i data-dcnode-id="3268"><span data-dcnode-id="3269" instrument_node="">Brooklyn</span></i><span data-dcnode-id="3267" instrument_node=""> Class cruisers.  This influence was principally channeled through the </span><i data-dcnode-id="3265"><span data-dcnode-id="3266" instrument_node="">Wichita</span></i><span data-dcnode-id="3264" instrument_node="">, an 8-inch </span><i data-dcnode-id="3262"><span data-dcnode-id="3263" instrument_node="">Brooklyn </span></i><span data-dcnode-id="3261" instrument_node="">Class variant. Consequently, the unrestricted wartime cruisers were heavily based on the Treaty-restricted </span><i data-dcnode-id="3259"><span data-dcnode-id="3260" instrument_node="">Brooklyn</span></i><span data-dcnode-id="3258" instrument_node=""> Class ships. </span></p><span data-dcnode-id="3256" instrument_node="">
</span><p class="just" data-dcnode-id="3254"><span data-dcnode-id="3255" instrument_node="">Following the ratification of the London Naval Treaty, C&amp;R began a study of possible 6-inch gun cruiser designs.  They were to have a speed equal to the 8-inch gun cruisers with as near a range to the 8-inch gun cruisers as was possible.  Acceptance of the US Navy eighteen ship limit stipulated in the 1930 agreement hinged on C&amp;R estimates that showed a well designed light cruiser could strike an acceptable balance between guns and protection.  C&amp;R believed the ship could be made to stand up to heavy cruiser fire, while retaining adequate armament.  This was based on the concept of "Immune Zone" protection, an idea which seems to have originated in the US Navy during or shortly after World War I.  It was originally applied to capital ships. </span></p><span data-dcnode-id="3253" instrument_node="">
</span><p class="just" data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node="">The immune zone was a range band within which a ship's armor was intended to defeat enemy projectiles, as shown in Figure 7.  For example, a certain cruiser might have armor designed to protect it against 8-inch shells from 15,000 yards to 22,000 yards. This means that for direct fire closer than 15,000 yards, an 8-inch shell was expected to have enough energy to penetrate the ship's side armor, but beyond 15,000 yards it did not. Beyond 15,000 yards, the shell would not have enough energy to penetrate the armor until the trajectory of the shell became so steep so that, as it plunged out of the sky, it had enough energy to penetrate the armor on the deck.  This happens at 22,000 yards in the example. At 21,000 yards, a shell may hit the deck, but the angle of impact and the armor on the armored deck were expected to be sufficient to prevent it from penetrating into the ship's vitals.  Also playing into the calculation of required protection was the range at which accuracy of the fire controls made hits so rare that protection at certain ranges was not warranted. </span></p><span data-dcnode-id="3250" instrument_node="">
</span><img alt="cruiser" data-dcnode-id="3249" height="181" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.navalmarinearchive.com/research/cruisers/cr_ims/cr_img_9.jpg&amp;raw" width="459"><span data-dcnode-id="3248" instrument_node="">
</span><h3 data-dcnode-id="3246"><span data-dcnode-id="3247" instrument_node="">Figure 7 Immune Zone</span></h3><span data-dcnode-id="3245" instrument_node="">
</span><p class="just" data-dcnode-id="3243"><span data-dcnode-id="3244" instrument_node="">The General Board desired a new cruiser with overmatched protection, a ship with protection against armament larger than her own.  This was essential due to the number of 8-inch gun cruisers already in service with other navies which could handily defeat a 6-inch gun cruiser designed for protection against her own armament.  The US Navy believed a 6-inch gun cruiser could be designed with acceptable armament while remaining protected from 8-inch shells from a heavy cruiser.  Indeed, as previously mentioned, this was the catalyst which provided US Navy acceptance of a limit of eighteen heavy cruisers, with all additional restricted to 6-inch gun maximum armament. </span></p><span data-dcnode-id="3242" instrument_node="">
</span><p class="just" data-dcnode-id="3237"><span data-dcnode-id="3241" instrument_node="">A number of candidate designs were developed for the new class of light cruisers.  The fundamental dilemma imposed by the naval treaties was determining the right balance between capability (i.e. displacement) and numbers of ships.  The US fleet would have widely differing characteristics were all of the Treaty tonnage allowance used on a large number of 6,000 ton ships versus fewer but more capable 10,000 ton ships. Also competing for Treaty tonnage would be the possible flight-deck cruisers, limiting the number of true cruisers.  Admiral Pratt, the CNO, wanted experimental flight-deck cruisers and large numbers of smaller cruisers.  He believed that cruisers should be used as rangers with the Scouting Fleet or with the Battle Fleet and would be able to retire back to the protection of the main fleet once they had secured the necessary information.  Friedman</span><sup data-dcnode-id="3239"><span data-dcnode-id="3240" instrument_node="">xxix</span></sup><span data-dcnode-id="3238" instrument_node=""> notes that this view seems slightly odd in view of the later concern for using small cruisers as an anti-destroyer screen for the battle line, and in view of Pratt's feeling that aircraft had displaced cruisers as the primary scouts. </span></p><span data-dcnode-id="3236" instrument_node="">
</span><p class="just" data-dcnode-id="3228"><span data-dcnode-id="3235" instrument_node="">The studies that brought about the genesis of the </span><i data-dcnode-id="3233"><span data-dcnode-id="3234" instrument_node="">Brooklyn</span></i><span data-dcnode-id="3232" instrument_node=""> Class were prepared in response to the Japanese </span><i data-dcnode-id="3230"><span data-dcnode-id="3231" instrument_node="">Mogami</span></i><span data-dcnode-id="3229" instrument_node=""> Class light cruisers.  The Japanese announced they would mount fifteen 6.1-inch guns (5 triple turrets) on a new cruiser that would make 37 knots at 8,500 standard tons. To accomplish this feat, Japanese designers resorted to the latest weight saving techniques, including light alloys in the superstructure and electric welding. On trials in 1935, the first two ships of the class had numerous problems.  Firing the guns caused the welded seams to open, and the turrets frequently jammed because of deformation in the hull girder.  Worse, the ships were dangerously unstable and some of the antiaircraft guns had to be removed.  Later, they were bulged to regain a safe degree of stability, and full load displacement grew to 11,200 standard tons (beyond Treaty limits) with speed dropping to 35 knots. </span></p><span data-dcnode-id="3227" instrument_node="">
</span><p class="just" data-dcnode-id="3222"><span data-dcnode-id="3226" instrument_node="">It never seems to have occurred to anyone at the time what would happen if a ship was over the Treaty limit at delivery; the answer, it soon developed, was nothing. This "loophole" was exploited more or less dramatically by most of the navies of the interwar period.  The </span><i data-dcnode-id="3224"><span data-dcnode-id="3225" instrument_node="">Mogami</span></i><span data-dcnode-id="3223" instrument_node=""> class "cheated" in another way: their turret mountings were designed to accept 8-inch twin turrets in place of the triple 6.1-inch to get around the Treaty limits on heavy cruisers.  This modification was performed before the war.   </span></p><span data-dcnode-id="3221" instrument_node="">
</span><p class="just" data-dcnode-id="3219"><span data-dcnode-id="3220" instrument_node="">However incorrect the declared specifications were, the announcement had the immediate effect of galvanizing the US Navy and setting the new design acceptable armament at a minimum of fifteen 6-inch guns.  Previous studies had shown a smaller number of guns, around twelve, would result in a better balanced ship.  These results were discarded in light of the new threat, and protection was to be sacrificed for increased armament, not speed. </span></p><span data-dcnode-id="3218" instrument_node="">
</span><p class="just" data-dcnode-id="3216"><span data-dcnode-id="3217" instrument_node="">This was a reversal of policy from heavy protection and moderate gun power towards heavy gun power at the expense of protection.  The US delegation at the 1930 London Naval Treaty had accepted the Treaty limitations on the assumption that a 6inch gun cruiser could be made to engage an 8-inch gun cruiser with some prospect of success, under the right conditions. </span></p><span data-dcnode-id="3215" instrument_node="">
</span><p class="just" data-dcnode-id="3213"><span data-dcnode-id="3214" instrument_node="">However, changes since 1930 had led to improved 8-inch gun cruiser designs to a point where guns, machinery, and magazines could be adequately protected within the 10,000 ton limit. Conversely, it was apparent that no fifteen gun light cruiser could be made with protection against attack by existing heavy cruisers.  A twelve gun light cruiser design showed a very small, 1,600 yard immunity zone against 8-inch shells, with possible improvement with design refinement. </span></p><span data-dcnode-id="3212" instrument_node="">
</span><p class="just" data-dcnode-id="3210"><span data-dcnode-id="3211" instrument_node="">The designs submitted by Preliminary Design in response to the new direction made concerted steps towards reducing weight as much as possible to be placed back in as increased protection.  Preliminary Design estimated that 280 tons could be moved towards protective measures by using longitudinal framing, and more general use of high-grade steels.  This foreshadowed the more daring weight control program eventually incorporated during design.  Weight reductions, however, were somewhat counterbalanced by the emergence of a new long 6-inch shell which threatened new designs with increased direct fire penetration power than previously assumed. Speed was held constant at 32.5 knots for all designs with armament and protection traded between various twelve, fifteen and sixteen gun schemes. </span></p><span data-dcnode-id="3209" instrument_node="">
</span><p class="just" data-dcnode-id="3201"><span data-dcnode-id="3208" instrument_node="">The final decision was solidified by a comparison between the twelve and fifteen gun US designs against the </span><i data-dcnode-id="3206"><span data-dcnode-id="3207" instrument_node="">Mogami</span></i><span data-dcnode-id="3205" instrument_node="">. The fifteen gun light cruiser was shown to be superior to the twelve gun light cruiser against the Japanese design, according to Naval War College analysis. Thus, the decision was made that the new </span><i data-dcnode-id="3203"><span data-dcnode-id="3204" instrument_node="">Brooklyn</span></i><span data-dcnode-id="3202" instrument_node=""> Class cruisers would mount fifteen 6-inch guns. </span></p><span data-dcnode-id="3200" instrument_node="">
</span><p class="just" data-dcnode-id="3186"><span data-dcnode-id="3199" instrument_node="">The design of the </span><i data-dcnode-id="3197"><span data-dcnode-id="3198" instrument_node="">Brooklyn</span></i><span data-dcnode-id="3196" instrument_node=""> cruisers differed sharply from existing US cruisers. They incorporated aft aviation features that were copied on all following heavy and light cruisers, excluding the </span><i data-dcnode-id="3194"><span data-dcnode-id="3195" instrument_node="">Alaska</span></i><span data-dcnode-id="3193" instrument_node="">.  They also incorporated longitudinal framing as a weight saving measure. They were the first ships in the fleet to be designed with the new 6-inch gun firing semi-fixed ammunition, a precursor to the automatic dual-purpose weapons introduced in the late WWII </span><i data-dcnode-id="3191"><span data-dcnode-id="3192" instrument_node="">Worcester</span></i><span data-dcnode-id="3190" instrument_node=""> and </span><i data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">Des Moines</span></i><span data-dcnode-id="3187" instrument_node=""> Classes. Increased protection was evaluated by lowering speed to 30 knots, but this was rejected since the slower ships would be unable to operate in formation with existing cruisers. </span></p><span data-dcnode-id="3185" instrument_node="">
</span><p class="just" data-dcnode-id="3174"><span data-dcnode-id="3184" instrument_node="">The weight saving pessimism seen on the </span><i data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">Portland</span></i><span data-dcnode-id="3181" instrument_node=""> and </span><i data-dcnode-id="3179"><span data-dcnode-id="3180" instrument_node="">New Orleans</span></i><span data-dcnode-id="3178" instrument_node=""> designs gave way to an undue optimism causing weight saving measures to be compulsory to stay beneath the 10,000 ton limit as the ship was further refined.  The forward belt was omitted and the acceptable hull stresses increased to further shave structural weight. The first seven </span><i data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">Brooklyn</span></i><span data-dcnode-id="3175" instrument_node=""> cruisers (CL 40 – 43, CL 46 – 49) were built to this design. </span></p><span data-dcnode-id="3173" instrument_node="">
</span><img alt="cruiser" data-dcnode-id="3172" height="199" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.navalmarinearchive.com/research/cruisers/cr_ims/cr_img_10.jpg&amp;raw" width="480"><span data-dcnode-id="3171" instrument_node="">
</span><h3 data-dcnode-id="3167"><span data-dcnode-id="3170" instrument_node="">Figure 8 CL 43 </span><i data-dcnode-id="3168"><span data-dcnode-id="3169" instrument_node="">Nashville</span></i></h3><span data-dcnode-id="3166" instrument_node="">
</span><p class="just" data-dcnode-id="3155"><span data-dcnode-id="3165" instrument_node="">The first of the </span><i data-dcnode-id="3163"><span data-dcnode-id="3164" instrument_node="">Brooklyn</span></i><span data-dcnode-id="3162" instrument_node=""> Class cruisers launched was the USS </span><i data-dcnode-id="3160"><span data-dcnode-id="3161" instrument_node="">Brooklyn</span></i><span data-dcnode-id="3159" instrument_node=""> on November 30</span><sup data-dcnode-id="3157"><span data-dcnode-id="3158" instrument_node="">th</span></sup><span data-dcnode-id="3156" instrument_node="">, 1936.  She displaced 11,581 long tons full load at a length of 608 feet overall. </span></p><span data-dcnode-id="3154" instrument_node="">
</span><p class="just" data-dcnode-id="3134"><span data-dcnode-id="3153" instrument_node="">The General Board considered next building a new class of cruisers with less displacement and armament, but a repeat of the </span><i data-dcnode-id="3151"><span data-dcnode-id="3152" instrument_node="">Brooklyn</span></i><span data-dcnode-id="3150" instrument_node=""> Class was ultimately decided upon. CL 49–50, USS </span><i data-dcnode-id="3148"><span data-dcnode-id="3149" instrument_node="">St Louis </span></i><span data-dcnode-id="3147" instrument_node="">and USS </span><i data-dcnode-id="3145"><span data-dcnode-id="3146" instrument_node="">Helena</span></i><span data-dcnode-id="3144" instrument_node="">, were constructed as the final hulls of the </span><i data-dcnode-id="3142"><span data-dcnode-id="3143" instrument_node="">Brooklyn</span></i><span data-dcnode-id="3141" instrument_node=""> Class. Friedman</span><sup data-dcnode-id="3139"><span data-dcnode-id="3140" instrument_node="">xxx</span></sup><span data-dcnode-id="3138" instrument_node=""> quotes the General Board in explaining their decision to repeat the </span><i data-dcnode-id="3136"><span data-dcnode-id="3137" instrument_node="">Brooklyn</span></i><span data-dcnode-id="3135" instrument_node=""> Class rather than a reduced capability ship as follows: </span></p><span data-dcnode-id="3133" instrument_node="">
</span><blockquote data-dcnode-id="3127"><blockquote data-dcnode-id="3128"><span data-dcnode-id="3132" instrument_node="">
</span><p class="just" data-dcnode-id="3130"><span data-dcnode-id="3131" instrument_node="">"Since the question of numbers is necessarily regulated by the total tonnage allowed and since that total tonnage after 1936 is largelyindefinite owing to the uncertainties of the 1935 Conference, the Board considers that for now the properties of the individual ship are of greater importance than the number of ships." </span></p><span data-dcnode-id="3129" instrument_node="">
</span></blockquote></blockquote><span data-dcnode-id="3126" instrument_node="">
</span><p class="just" data-dcnode-id="3124"><span data-dcnode-id="3125" instrument_node="">This was a fortunate decision given that the 1935 conference would limit new cruisers to 8,000 tons standard, with no concurrent total tonnage limit. </span></p><span data-dcnode-id="3123" instrument_node="">
</span><p class="just" data-dcnode-id="3101"><span data-dcnode-id="3122" instrument_node="">The </span><i data-dcnode-id="3120"><span data-dcnode-id="3121" instrument_node="">St Louis </span></i><span data-dcnode-id="3119" instrument_node="">and </span><i data-dcnode-id="3117"><span data-dcnode-id="3118" instrument_node="">Helena</span></i><span data-dcnode-id="3116" instrument_node=""> differed from the </span><i data-dcnode-id="3114"><span data-dcnode-id="3115" instrument_node="">Brooklyn</span></i><span data-dcnode-id="3113" instrument_node=""> Class in a few marked ways. They mounted the new 5-in/38 guns, rather than the 5-in/25.  They differed in internal machinery arrangement with two separated engine rooms made possible by smaller boilers using higher pressure, higher temperature steam. Because of these modifications, CL 49 &amp; 50 are usually referred to as the </span><i data-dcnode-id="3111"><span data-dcnode-id="3112" instrument_node="">St Louis</span></i><span data-dcnode-id="3110" instrument_node=""> Class cruisers.  The </span><i data-dcnode-id="3108"><span data-dcnode-id="3109" instrument_node="">St </span></i><i data-dcnode-id="3106"><span data-dcnode-id="3107" instrument_node="">Louis</span></i><span data-dcnode-id="3105" instrument_node=""> was launched April 15</span><sup data-dcnode-id="3103"><span data-dcnode-id="3104" instrument_node="">th</span></sup><span data-dcnode-id="3102" instrument_node="">, 1938.  She displaced 11,790 long tons full load at a length of 607 feet overall. </span></p><span data-dcnode-id="3100" instrument_node="">
</span><p class="just" data-dcnode-id="3092"><span data-dcnode-id="3099" instrument_node="">The </span><i data-dcnode-id="3097"><span data-dcnode-id="3098" instrument_node="">Brooklyn</span></i><span data-dcnode-id="3096" instrument_node=""> class was received favorably by the fleet.  The rapid fire 6-inch guns received wide acclaim in the ship reports coming back to Navy Headquarters. Seakeeping was also reported to be excellent.  However, it soon became apparent that in the name of weight saving, the structural integrity of the ship had been overly compromised.  The </span><i data-dcnode-id="3094"><span data-dcnode-id="3095" instrument_node="">Savannah</span></i><span data-dcnode-id="3093" instrument_node=""> ran over her anchor chain in a gale which sliced through her bow, causing severe damage.  This led to a weakening of confidence in the survivability of the design among the fleet.  </span></p><span data-dcnode-id="3091" instrument_node="">
</span><h3 data-dcnode-id="3086" id="LinkTarget_8527"><i data-dcnode-id="3089"><span data-dcnode-id="3090" instrument_node="">4.5.4 </span></i><i data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node="">USS Wichita</span></i></h3><span data-dcnode-id="3085" instrument_node="">
</span><p class="just" data-dcnode-id="3072"><span data-dcnode-id="3084" instrument_node="">Under the 1930 Treaty, a new heavy cruiser could be laid down in 1935.  This was to eventually be the </span><i data-dcnode-id="3082"><span data-dcnode-id="3083" instrument_node="">USS Wichita</span></i><span data-dcnode-id="3081" instrument_node="">, a design based on the </span><i data-dcnode-id="3079"><span data-dcnode-id="3080" instrument_node="">Brooklyn</span></i><span data-dcnode-id="3078" instrument_node=""> Class, 600-foot waterline hull, unlike (and longer than) any of the previous US heavy cruisers.  She foreshadowed the </span><i data-dcnode-id="3076"><span data-dcnode-id="3077" instrument_node="">Baltimore</span></i><span data-dcnode-id="3075" instrument_node=""> Class "production" heavy cruisers of WWII.</span><sup data-dcnode-id="3073"><span data-dcnode-id="3074" instrument_node="">xxxi </span></sup></p><span data-dcnode-id="3071" instrument_node="">
</span><p class="just" data-dcnode-id="3054"><span data-dcnode-id="3070" instrument_node="">In 1934 a modified </span><i data-dcnode-id="3068"><span data-dcnode-id="3069" instrument_node="">Brooklyn</span></i><span data-dcnode-id="3067" instrument_node=""> design was proposed which would mount 3 triple 8inch turrets, increase steaming radius, upgrade the secondary battery, and incorporate aviation aft.  She was expected to have better stability and survivability owing to her smaller main compartments and greater freeboard.</span><sup data-dcnode-id="3065"><span data-dcnode-id="3066" instrument_node="">xxxii</span></sup><span data-dcnode-id="3064" instrument_node="">  Protection was increased throughout the ship.  The advantage of split salvos in minimizing dispersion was also recognized around this time and the </span><i data-dcnode-id="3062"><span data-dcnode-id="3063" instrument_node="">Wichita</span></i><span data-dcnode-id="3061" instrument_node="">'s 8-inch turrets were designed specifically to permit the guns in it to be loaded and fired separately.  The </span><i data-dcnode-id="3059"><span data-dcnode-id="3060" instrument_node="">Wichita</span></i><span data-dcnode-id="3058" instrument_node=""> was launched November 16</span><sup data-dcnode-id="3056"><span data-dcnode-id="3057" instrument_node="">th</span></sup><span data-dcnode-id="3055" instrument_node="">, 1937 at a displacement of 11,581 long tons full load and a length of 608 feet. </span></p><span data-dcnode-id="3053" instrument_node="">
</span><p class="just" data-dcnode-id="3042"><span data-dcnode-id="3052" instrument_node="">The </span><i data-dcnode-id="3050"><span data-dcnode-id="3051" instrument_node="">Wichita</span></i><span data-dcnode-id="3049" instrument_node=""> was a one of a kind design, but greatly influenced following heavy cruiser designs starting with the </span><i data-dcnode-id="3047"><span data-dcnode-id="3048" instrument_node="">Baltimore</span></i><span data-dcnode-id="3046" instrument_node="">s, which started as improved </span><i data-dcnode-id="3044"><span data-dcnode-id="3045" instrument_node="">Wichita</span></i><span data-dcnode-id="3043" instrument_node="">s. </span></p><span data-dcnode-id="3041" instrument_node="">
</span><img alt="cruiser" data-dcnode-id="3040" height="241" id="LinkTarget_8538" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.navalmarinearchive.com/research/cruisers/cr_ims/cr_img_11.jpg&amp;raw" width="456"><span data-dcnode-id="3039" instrument_node="">
</span><p align="center" data-dcnode-id="3035"><span data-dcnode-id="3038" instrument_node="">Figure 9 CA45 </span><i data-dcnode-id="3036"><span data-dcnode-id="3037" instrument_node="">Wichita </span></i></p><span data-dcnode-id="3034" instrument_node="">
</span><h3 data-dcnode-id="3032"><span data-dcnode-id="3033" instrument_node="">4.6 The End of the Treaty Limited Cruisers</span></h3><span data-dcnode-id="3031" instrument_node="">
</span><p class="just" data-dcnode-id="3029"><span data-dcnode-id="3030" instrument_node="">The 1930 London Naval Treaty had specified that in 1935 another naval conference should be held between the parties.  As talks began, a clear delineation became apparent with the Anglo-American parties aligning against Japan's demands for full parity.  Japan walked out of the talks in 1936, leaving the United States, Great Britain, and France as the only signatories of the 1936 Treaty.  </span></p><span data-dcnode-id="3028" instrument_node="">
</span><p class="just" data-dcnode-id="3026"><span data-dcnode-id="3027" instrument_node="">The failure of Japan to abide by the Treaty's qualitative restrictions in building programs led the signatory powers to invoke the escape clauses in the Treaty.  By 1938 the 1936 Treaty was effectively no longer in effect and, since the 1930 Treaty had lapsed in 1936, naval limitations of any kind no longer existed. </span></p><span data-dcnode-id="3025" instrument_node="">
</span><p class="just" data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">By 1938 Hitler and Mussolini were firmly in power and headed on a direct course for war in Europe.  In the East, the steadily growing threat of Japanese Imperialism loomed larger with each passing month.  It is into this world that the United States emerged from the naval limitations treaties, and began its steady slide into the global conflict soon to erupt across the globe. </span></p><span data-dcnode-id="3022" instrument_node="">
</span><h3 data-dcnode-id="3020"><span data-dcnode-id="3021" instrument_node="">4.7 Inter-War U.S. Fleet Organization and Cruiser Employment</span></h3><span data-dcnode-id="3019" instrument_node="">
</span><p class="just" data-dcnode-id="3015"><span data-dcnode-id="3018" instrument_node="">After WWI, the United States concentrated its main battle fleet (the United States Fleet) in the Pacific, anticipating that the major future threat was Japan.  By the time war broke out, the heavy cruisers were primarily assigned to the Scouting Force and the light cruisers to the Battle Force.  Both were organized into divisions of three to five ships each commanded by a rear admiral.  Each of the destroyer flotillas (made up of multiple destroyer squadrons) had a light cruiser assigned as the flotilla flagship.</span><sup data-dcnode-id="3016"><span data-dcnode-id="3017" instrument_node="">xxxiii </span></sup></p><span data-dcnode-id="3014" instrument_node="">
</span><p class="just" data-dcnode-id="3012"><span data-dcnode-id="3013" instrument_node="">When this organization was adopted, the tactical doctrine was that the heavy cruiser was more versatile and suited by its heavier armament to range ahead in a scouting role and was assigned to the Scouting Force. After the enemy force was found and the fleet was getting ready for battle, the heavy cruiser took its place in the outer screen. The light cruisers stayed closer to the battle line to help defend against torpedo attacks by enemy destroyers.  In this role the volume of fire from the six inch guns was more important than the greater weight and range of the eight inch gun. </span></p><span data-dcnode-id="3011" instrument_node="">
</span><p class="just" data-dcnode-id="3000"><span data-dcnode-id="3010" instrument_node="">At the same time, the relatively soft aircraft carriers, also assigned to the Battle Force, were originally planned to stay to the rear of the battle line where they would be safe. However, as a result of fleet exercises and experimentation, it was discovered that the best use of the aircraft carriers was to seek out and destroy the enemy carriers, thereby blinding the enemy commander.  To do this, it was necessary for the carriers to operate independently and ahead of the battle line to scout for the enemy.  The concern was that the carriers would encounter the enemy's heavy cruisers at night or under some other condition where they could not use their aircraft to protect themselves.  The </span><i data-dcnode-id="3008"><span data-dcnode-id="3009" instrument_node="">Lexington </span></i><span data-dcnode-id="3007" instrument_node="">and </span><i data-dcnode-id="3005"><span data-dcnode-id="3006" instrument_node="">Saratoga </span></i><span data-dcnode-id="3004" instrument_node="">were initially armed with eight-inch guns for just this reason.</span><sup data-dcnode-id="3002"><span data-dcnode-id="3003" instrument_node="">xxxiv </span></sup><span data-dcnode-id="3001" instrument_node="">The answer ultimately adopted was a task force organization where a division of heavy cruisers was assigned to each carrier group. </span></p><span data-dcnode-id="2999" instrument_node="">
</span><p class="just" data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">A smaller group of ships, the Asiatic Fleet, represented the U.S. interests in the pre-war Far East.  Most of its units were based in the Philippines (at the time a U.S. colony) but it also included the Yangtze Patrol and the Fourth Marines, both based in China. </span></p><span data-dcnode-id="2996" instrument_node="">
</span><p class="just" data-dcnode-id="2976"><span data-dcnode-id="2995" instrument_node="">Through the 1930's and until the Asiatic Fleet ceased to exist in 1942, one modern heavy cruiser was the heaviest unit assigned and served as the flagship. The </span><i data-dcnode-id="2993"><span data-dcnode-id="2994" instrument_node="">USS Houston</span></i><span data-dcnode-id="2992" instrument_node=""> and </span><i data-dcnode-id="2990"><span data-dcnode-id="2991" instrument_node="">USS Augusta</span></i><span data-dcnode-id="2989" instrument_node=""> alternated in this role.  Both ships spent a significant amount of time in Chinese waters, showing the flag and on occasion landing Marines and sailors to protect U.S. interests.  They also visited other countries in the region including Japan a number of times.  On one of these visits, the </span><i data-dcnode-id="2987"><span data-dcnode-id="2988" instrument_node="">Augusta </span></i><span data-dcnode-id="2986" instrument_node="">represented the United States at the state funeral of Admiral Togo, the hero of the Russo-Japanese War.  As war between the Chinese and Japanese erupted in Shanghai, the </span><i data-dcnode-id="2984"><span data-dcnode-id="2985" instrument_node="">Augusta </span></i><span data-dcnode-id="2983" instrument_node="">observed at close range and sent back intelligence reports on Japanese capabilities.</span><sup data-dcnode-id="2981"><span data-dcnode-id="2982" instrument_node="">xxxv</span></sup><span data-dcnode-id="2980" instrument_node="">  In addition to the heavy cruiser, the Asiatic Fleet had one light cruiser of the </span><i data-dcnode-id="2978"><span data-dcnode-id="2979" instrument_node="">Omaha </span></i><span data-dcnode-id="2977" instrument_node="">class assigned. </span></p><span data-dcnode-id="2975" instrument_node="">
</span><img alt="cruiser" data-dcnode-id="2974" height="457" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.navalmarinearchive.com/research/cruisers/cr_ims/cr_img_12.jpg&amp;raw" width="576"><span data-dcnode-id="2973" instrument_node="">
</span><h3 data-dcnode-id="2971" id="LinkTarget_8557"><span data-dcnode-id="2972" instrument_node="">5. CRUISER DEVELOPMENT WWII</span></h3><span data-dcnode-id="2970" instrument_node="">
</span><h3 data-dcnode-id="2968"><span data-dcnode-id="2969" instrument_node="">5.1 Foreign threats</span></h3><span data-dcnode-id="2967" instrument_node="">
</span><p class="just" data-dcnode-id="2965"><span data-dcnode-id="2966" instrument_node="">The major foreign threat concern of the U.S. was Japan.  It was assumed that if war came, the U.S. would be fighting Japan in the Pacific without other allied support. </span></p><span data-dcnode-id="2964" instrument_node="">
</span><p class="just" data-dcnode-id="2962"><span data-dcnode-id="2963" instrument_node="">As previously discussed, the treaties agreed upon between World War I and World War II were intended to limit the potential naval arms race between the U.S., Great Britain, Japan, France, and Italy (Germany's navy was limited by the Treaty ending WWI). While the U.S. stayed strictly within the Treaty limits, Japan exceeded the limits by as much as 30 percent.   </span></p><span data-dcnode-id="2961" instrument_node="">
