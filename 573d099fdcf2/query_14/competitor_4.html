</span><p class="just" data-dcnode-id="4979"><span data-dcnode-id="4982" instrument_node="">Sims, Philip; Bosworth, Michael; Cable, Chris; Fireman, Howard. </span><a data-dcnode-id="4980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.navalmarinearchive.com/research/cruisers/cr_ims/cr_img_2.jpg"><span data-dcnode-id="4981" instrument_node="">Authors' signature page</span></a></p><span data-dcnode-id="4978" instrument_node="">
</span><p class="just" data-dcnode-id="4974"><span data-dcnode-id="4977" instrument_node="">Report Documentation Page - </span><a data-dcnode-id="4975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.navalmarinearchive.com/research/cruisers/pdf_docs/report_documentation_page.pdf"><span data-dcnode-id="4976" instrument_node="">in Adobe pdf format</span></a></p><span data-dcnode-id="4973" instrument_node="">
</span><h3 data-dcnode-id="4971"><span data-dcnode-id="4972" instrument_node="">ABSTRACT</span></h3><span data-dcnode-id="4970" instrument_node="">
</span><p class="just" data-dcnode-id="4968"><span data-dcnode-id="4969" instrument_node="">The purpose of this study was to survey the historical roles and mission of ships called "cruisers" in preparation for a Navy study of future class of cruisers.   The current generation of ships of that name are assigned an aircraft carrier escort mission and are specifically optimized for that role. However, the first role assigned to cruisers was as foreign station ships, independently deployed, looking out for national interests around the world. Other cruisers has been designed as sea denial ships, as counter-raider merchant ship escorts, as a substitutes for battleships in a battleline, command ships, and as reconnaissance platforms (either directly or via launched smaller vehicles). There have been several proposals for cruiser-aircraft carriers hybrids and one Japanese class was constructed to that concept.</span></p><span data-dcnode-id="4967" instrument_node="">
</span><h3 data-dcnode-id="4965"><span data-dcnode-id="4966" instrument_node="">EXECUTIVE SUMMARY</span></h3><span data-dcnode-id="4964" instrument_node="">
</span><p class="just" data-dcnode-id="4962"><span data-dcnode-id="4963" instrument_node="">"What is a cruiser?"  With the VLS versions of the CG 47 class in routine service, it would seem the answer is self-evident.  However, the CG 47 class is a recent specialized cruiser variant which is optimized as a large aircraft carrier AAW/ASW escort.  That role drove the designers towards a high speed, lightly or unarmored ship that is expected to receive supplies (hence, have limited endurance) as component of a deployed carrier battle group.  The Navy needs to examine the assumption that a one-for-one replacement for those ships (focused on the carrier escort role) is needed.  Due to large number of DDG 51 class ships, which are also carrier escort capable, it may be desirable to focus a future cruiser on different missions.  This study surveys the historical roles of ships called "cruisers" to develop a list of possible missions for a future cruiser.    If a future cruiser takes on some of the many other roles performed by cruisers in the past, it might be a much different design than the CG 47.  </span></p><span data-dcnode-id="4961" instrument_node="">
</span><p class="just" data-dcnode-id="4959"><span data-dcnode-id="4960" instrument_node="">The historical survey shows that ships with the name "cruiser" have covered these missions:  </span></p><span data-dcnode-id="4958" instrument_node="">
</span><ul data-dcnode-id="4943" type="disc"><span data-dcnode-id="4957" instrument_node="">
</span><li class="just" data-dcnode-id="4953"><span class="underline" data-dcnode-id="4955"><span data-dcnode-id="4956" instrument_node="">Foreign station ships</span></span><span data-dcnode-id="4954" instrument_node="">, independently deployed, looked out for national interests around the world.  In addition to an extensive gun armament, the station ship had self-repair capability, long range, and "first-responder-to-disorder" equipment such as small arms for the crew and an extensive boat outfit.  The disorder could be a revolutionary situation or a natural disaster.</span></li><span data-dcnode-id="4952" instrument_node="">
</span><li class="just" data-dcnode-id="4945"><span class="underline" data-dcnode-id="4950"><span data-dcnode-id="4951" instrument_node="">Sea denial ships, </span></span><span data-dcnode-id="4949" instrument_node="">using their pre-deployed location, attacked other nations' trade routes.  </span><span class="underline" data-dcnode-id="4947"><span data-dcnode-id="4948" instrument_node="">Counter-raider</span></span><span data-dcnode-id="4946" instrument_node=""> merchant ship escorts would, in turn, try to stop enemy sea denial ships.</span></li><span data-dcnode-id="4944" instrument_node="">
</span></ul><span data-dcnode-id="4942" instrument_node="">
</span><blockquote data-dcnode-id="4925"><span data-dcnode-id="4941" instrument_node="">
</span><ul data-dcnode-id="4927" type="circle"><span data-dcnode-id="4940" instrument_node="">
</span><li class="just" data-dcnode-id="4932"><span data-dcnode-id="4939" instrument_node="">The Washington Battleship construction limitation treaties made large cruisers into substitutes for battleships in an </span><span class="underline" data-dcnode-id="4937"><span data-dcnode-id="4938" instrument_node="">alternative battle line</span></span><span data-dcnode-id="4936" instrument_node=""> (especially for night time combat).  The attempt to forge a homogenous cruiser battle line ended up making US and Japanese "light" cruisers the same size and weight as "heavy" cruisers.  The French and Italian navies specialized in </span><span class="underline" data-dcnode-id="4934"><span data-dcnode-id="4935" instrument_node="">"interceptor" cruisers</span></span><span data-dcnode-id="4933" instrument_node=""> –</span></li><span data-dcnode-id="4931" instrument_node="">
</span><li class="just" data-dcnode-id="4929"><span data-dcnode-id="4930" instrument_node="">sacrificing many other ship features, such as range, for speed and armament. The Soviet Union's first cruisers were based on Italian designs which explains their heavy armament on smaller displacements. </span></li><span data-dcnode-id="4928" instrument_node="">
</span></ul><span data-dcnode-id="4926" instrument_node="">
</span></blockquote><span data-dcnode-id="4924" instrument_node="">
</span><ul data-dcnode-id="4857" type="disc"><span data-dcnode-id="4923" instrument_node="">
</span><li class="just" data-dcnode-id="4918"><span data-dcnode-id="4922" instrument_node="">Cruisers have served as </span><span class="underline" data-dcnode-id="4920"><span data-dcnode-id="4921" instrument_node="">command ships</span></span><span data-dcnode-id="4919" instrument_node=""> at many levels, from small group leader to provisions for carrying the national command authority.</span></li><span data-dcnode-id="4917" instrument_node="">
</span><li class="just" data-dcnode-id="4912"><span data-dcnode-id="4916" instrument_node="">Cruisers have served as </span><span class="underline" data-dcnode-id="4914"><span data-dcnode-id="4915" instrument_node="">reconnaissance platforms</span></span><span data-dcnode-id="4913" instrument_node=""> (either directly as fast scout cruisers or via launching and retrieving smaller vehicles such as float planes).</span></li><span data-dcnode-id="4911" instrument_node="">
</span><li class="just" data-dcnode-id="4903"><span data-dcnode-id="4910" instrument_node="">The "C" in CV reflects the fact some of </span><span class="underline" data-dcnode-id="4908"><span data-dcnode-id="4909" instrument_node="">the first aircraft carriers</span></span><span data-dcnode-id="4907" instrument_node=""> were armed with cruiser caliber guns for self-protection and thus thought of as part of the cruiser family.  The CVs lost their gun armament in favor of more aircraft but depended on gun cruiser protection (prior to all weather/day/</span><span class="underline" data-dcnode-id="4905"><span data-dcnode-id="4906" instrument_node="">night aircraft) when night/fog/bad weather </span></span><span data-dcnode-id="4904" instrument_node="">left a carrier helpless against enemy surface combatants. </span></li><span data-dcnode-id="4902" instrument_node="">
</span><li class="just" data-dcnode-id="4897"><span data-dcnode-id="4901" instrument_node="">Smaller cruisers (CLAA) took on the role of </span><span class="underline" data-dcnode-id="4899"><span data-dcnode-id="4900" instrument_node="">gun armed AAW specialists</span></span><span data-dcnode-id="4898" instrument_node=""> able to keep up with the carriers regardless of sea conditions.   </span></li><span data-dcnode-id="4896" instrument_node="">
</span><li class="just" data-dcnode-id="4891"><span data-dcnode-id="4895" instrument_node="">There have been several proposals for </span><span class="underline" data-dcnode-id="4893"><span data-dcnode-id="4894" instrument_node="">cruiser-aircraft carrier hybrids</span></span><span data-dcnode-id="4892" instrument_node=""> and one Japanese cruiser class was constructed to a float plane version of that concept. </span></li><span data-dcnode-id="4890" instrument_node="">
</span><li class="just" data-dcnode-id="4882"><span data-dcnode-id="4889" instrument_node="">There have been a few highly specialized variants such as </span><span class="underline" data-dcnode-id="4887"><span data-dcnode-id="4888" instrument_node="">cruiser minelayers</span></span><span data-dcnode-id="4886" instrument_node=""> and </span><span class="underline" data-dcnode-id="4884"><span data-dcnode-id="4885" instrument_node="">dedicated training cruisers</span></span><span data-dcnode-id="4883" instrument_node="">. </span></li><span data-dcnode-id="4881" instrument_node="">
</span><li class="just" data-dcnode-id="4873"><span data-dcnode-id="4880" instrument_node="">Cruisers served as anti-battleship (UK WWII) and anti-carrier (USSR 1950-60s) deep ocean </span><span class="underline" data-dcnode-id="4878"><span data-dcnode-id="4879" instrument_node="">barrier picket ships</span></span><span data-dcnode-id="4877" instrument_node=""> and, once a target had been identified, as </span><span class="underline" data-dcnode-id="4875"><span data-dcnode-id="4876" instrument_node="">high-speed long-distance tattletales</span></span><span data-dcnode-id="4874" instrument_node="">. </span></li><span data-dcnode-id="4872" instrument_node="">
</span><li class="just" data-dcnode-id="4870"><span data-dcnode-id="4871" instrument_node="">Cruisers supplied amphibious gunfire support to land forces at the start of wars until the more operationally expensive battleships could be reactivated. </span></li><span data-dcnode-id="4869" instrument_node="">
</span><li class="just" data-dcnode-id="4864"><span data-dcnode-id="4868" instrument_node="">Currently USN CGs and CGNs serve as aircraft carrier </span><span class="underline" data-dcnode-id="4866"><span data-dcnode-id="4867" instrument_node="">escorts providing AAW and ASW</span></span><span data-dcnode-id="4865" instrument_node="">. </span></li><span data-dcnode-id="4863" instrument_node="">
</span><li class="just" data-dcnode-id="4859"><span class="underline" data-dcnode-id="4861"><span data-dcnode-id="4862" instrument_node="">Independent land strike</span></span><span data-dcnode-id="4860" instrument_node=""> capability became a cruiser feature with the fitting of Tomahawk to the CG 52 onward. </span></li><span data-dcnode-id="4858" instrument_node="">
</span></ul><span data-dcnode-id="4856" instrument_node="">
</span><p class="just" data-dcnode-id="4854"><span data-dcnode-id="4855" instrument_node="">A summary of the changing mission assigned to ship designated as cruisers follows. </span></p><span data-dcnode-id="4853" instrument_node="">
</span><img alt="Cruiser table" data-dcnode-id="4852" height="465" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.navalmarinearchive.com/research/cruisers/cr_ims/cr_img_p6_1.jpg&amp;raw" width="600"><span data-dcnode-id="4851" instrument_node="">
</span><p class="just" data-dcnode-id="4849"><span data-dcnode-id="4850" instrument_node="">It appears that the consistent theme of all the traditional missions was a ship with long endurance and the potential for independent operations.  Sometimes this theme was strongly emphasized as in ships for the foreign station, commerce raider and commerce defender roles.  Sometime those characteristics dwindled in ship customized for specialist roles such as the battle fleet scout cruiser of WWI, the cruiser minelayers and the highly optimized big carrier escorts of the US of the last half of the 20th century.    </span></p><span data-dcnode-id="4848" instrument_node="">
</span><p class="just" data-dcnode-id="4846"><span data-dcnode-id="4847" instrument_node="">If a future cruiser is not a dedicated AAW/ASW carrier escort (intended to surge with the carrier battle groups), it may pick up modern versions of some of the historical roles: </span></p><span data-dcnode-id="4845" instrument_node="">
</span><ul data-dcnode-id="4831" type="disc"><span data-dcnode-id="4844" instrument_node="">
</span><li class="just" data-dcnode-id="4842"><span data-dcnode-id="4843" instrument_node="">A forward deployed "Sea Swap" unit, with the carrier battle groups based in the United States instead on constant patrol, would return the cruiser to the independent station ship role. </span></li><span data-dcnode-id="4841" instrument_node="">
</span><li class="just" data-dcnode-id="4839"><span data-dcnode-id="4840" instrument_node="">Future cruisers will not serve as sea denial raiders in declared wars because submarines are so much better at it.  However, a modern sea denial role is intercepting and searching merchant ships in remote ocean locations to see if they are transporting terrorists or serving as Trojan horses for destructive weapons to be delivered to a US port.  </span></li><span data-dcnode-id="4838" instrument_node="">
</span><li class="just" data-dcnode-id="4836"><span data-dcnode-id="4837" instrument_node="">Future cruisers will not conduct anti-surface raider barrier patrols, but could provide a ballistic missile defense barrier, the modern equivalent.  This role requires a ship with the traditional cruiser virtues of endless boring patrolling (reliability, seakeeping, crew comfort) with the possibility of sudden unanticipated action (100% availability, time critical response, independent action). </span></li><span data-dcnode-id="4835" instrument_node="">
</span><li class="just" data-dcnode-id="4833"><span data-dcnode-id="4834" instrument_node="">Future cruisers will not carry float planes, but they may be a launch/recovery platform for the modern analog of unmanned vehicles (air, surface or underwater). </span></li><span data-dcnode-id="4832" instrument_node="">
</span></ul><span data-dcnode-id="4830" instrument_node="">
</span><p class="just" data-dcnode-id="4828"><span data-dcnode-id="4829" instrument_node="">A return to other missions will, in turn, cause ship designers to put modern versions of other hull features, found in the previous cruisers types, into a new ship: </span></p><span data-dcnode-id="4827" instrument_node="">
</span><ul data-dcnode-id="4807" type="disc"><span data-dcnode-id="4826" instrument_node="">
</span><li class="just" data-dcnode-id="4824"><span data-dcnode-id="4825" instrument_node="">Increased survivability, especially against ambush attacks, including a return to structural armor, </span></li><span data-dcnode-id="4823" instrument_node="">
</span><li class="just" data-dcnode-id="4821"><span data-dcnode-id="4822" instrument_node="">Increased stores and fuel loads for independent operations, </span></li><span data-dcnode-id="4820" instrument_node="">
</span><li class="just" data-dcnode-id="4818"><span data-dcnode-id="4819" instrument_node="">Increased self repair stores and shops to allow staying on station for extended period while remaining fully capable,  </span></li><span data-dcnode-id="4817" instrument_node="">
</span><li class="just" data-dcnode-id="4815"><span data-dcnode-id="4816" instrument_node="">First responder capabilities (such as limited medical facilities, small arms for the crew and an extensive boat/helo outfit), and </span></li><span data-dcnode-id="4814" instrument_node="">
</span><li class="just" data-dcnode-id="4812"><span data-dcnode-id="4813" instrument_node="">Crew sized not only to operate the ship but to put small detachments ashore or on seized merchant ships. </span></li><span data-dcnode-id="4811" instrument_node="">
</span><li class="just" data-dcnode-id="4809"><span data-dcnode-id="4810" instrument_node="">Provisions for carrying a small command staff and a senior officer (if assigned a role in the command structure). </span></li><span data-dcnode-id="4808" instrument_node="">
</span></ul><span data-dcnode-id="4806" instrument_node="">
</span><p class="just" data-dcnode-id="4804"><span data-dcnode-id="4805" instrument_node="">The hull features listed above noticeably increase ship size (dimension and weight) compared to the current generation of lightly-protected aluminum superstructure ships bearing the cruiser name.  However, most of those features have relatively low construction costs and a relatively small life cycle cost impact.  Note that the associated higher manning level for self-repair, first responder role and detachment operations would carry a noticeable life cycle penalty.  A combined nuclear cruiser with gas turbine boost (CONAG) plant would increase initial cost and crew cost but, at the fleet level, might pay off by reducing the logistic train required to support a ship assigned to a remote station for long periods of time or eliminate the vulnerability caused by using regional port facilities. </span></p><span data-dcnode-id="4803" instrument_node="">

</span><h3 data-dcnode-id="4200" id="LinkTarget_8254"><span data-dcnode-id="4201" instrument_node="">1. INTRODUCTION</span></h3><span data-dcnode-id="4199" instrument_node="">
</span><p class="just" data-dcnode-id="4194"><span data-dcnode-id="4198" instrument_node="">Ships called "cruisers" have been part of world navies for over 150 years. Because of their long history everyone involved with the United States Navy (USN) has at least a general understanding of the ship type.  However, while there is widespread agreement among naval planners that the USN should have a new cruiser (CG(X)) to replace the existing </span><i data-dcnode-id="4196"><span data-dcnode-id="4197" instrument_node="">Ticonderoga</span></i><span data-dcnode-id="4195" instrument_node=""> class (CG 47) when they go out of service in 15-20 years, it is not clear exactly what they have in mind.  Is it the independent operations cruiser of the first half of the 20th century?  Is it a specialized large carrier escort characteristic of most USN cruisers of the last half of the 20th century?  Is it a sea-denial-to-the-enemy asset or a distant lanes-of-communications guardian?  Is it a "Sea Swap" first responder to a crisis which serves to contain it while awaiting the deployment of the major "Surge" battle groups? </span></p><span data-dcnode-id="4193" instrument_node="">
</span><p class="just" data-dcnode-id="4191"><span data-dcnode-id="4192" instrument_node="">Even the basic cruiser nomenclature is confusing.  What is a 'protected' vice 'armored' vice 'scout' vice 'battle' cruiser?  Why is a 1930's 'light cruiser' the same size and displacement as a 'heavy' cruiser?  Why were some cruisers as large as, or even larger than, the equivalent era battleships?  Why did ships that USN had long classified as big destroyers (DLs, DLGNs, DDG 47s) become cruisers overnight? </span></p><span data-dcnode-id="4190" instrument_node="">
</span><p class="just" data-dcnode-id="4188"><span data-dcnode-id="4189" instrument_node="">The purpose of this paper is to explore the history of the cruisers, looking at their performance characteristics, the roles they were formally assigned in force planning, and the actual missions that they were pressed into during wars and other emergencies. From this will be derived a checklist of potential cruiser roles to serve as a means of surveying naval planners "is this what you mean when you say 'cruiser'?".  If there is agreement that any future CG is a direct continuation of the CG 52-73 carrier escort (plus land attack missile role) product line, that will greatly simplify the amount of work in an Analysis of Alternatives (AoA). However, if use of the checklist shows a wide divergence in thought about other cruiser roles, then the AoA work will greatly expand and possibly result in recommending not just one CG but a family of ships to take on the various, sometimes incompatible, cruiser roles. </span></p><span data-dcnode-id="4187" instrument_node="">
</span><h3 data-dcnode-id="4185" id="LinkTarget_8259"><span data-dcnode-id="4186" instrument_node="">2. THE WOODEN SAILING SHIPS</span></h3><span data-dcnode-id="4184" instrument_node="">
</span><p class="just" data-dcnode-id="4182"><span data-dcnode-id="4183" instrument_node="">The word "cruiser" was first used in English in 1651.  It was derived from related terms in Dutch, Portuguese, and French, all of which had the meaning of "crossing", as in crossing back and forth across the entrance to a harbor to enforce a blockade, or crossing an ocean. In 1694, British Parliament documents indicate that 5th and 6th rate ships were detached from main fleets to "cruise" to protect merchant shipping. Documents of this period also mention independent "cruising" in search of enemy vessels.   </span></p><span data-dcnode-id="4181" instrument_node="">
</span><p class="just" data-dcnode-id="4179"><span data-dcnode-id="4180" instrument_node="">The suitability of a wooden sailing frigate to fill this role stemmed from its speed, one continuous gun deck, plus berth deck design features, and increased stores capacity [Appendix A]. It was suitable for long range operations in remote areas where crew comfort, self-reliance, seaworthiness, and endurance were important. The frigate's speed advantage made it useful for scouting and reconnaissance, as well as facilitating the long voyages for which its increased stores capacity per man also made it suitable. </span></p><span data-dcnode-id="4178" instrument_node="">
</span><p class="just" data-dcnode-id="4176"><span data-dcnode-id="4177" instrument_node="">Sailing frigates also had a role in fleet operations.  While their lighter scantlings made them too vulnerable to take a position in the column of capital ships, they could maneuver on the disengaged side of the line to transmit signals, or on the engaged side at a safe distance from the enemy to report his movements.  Because they had nearly the same sail power as a ship of the line, they could take a crippled capital ship under tow to disengage it from the battle, or rescue the crew of a sinking ship.  As a result of the loss of the French flagship at the Battle of the Saintes (1782), it became common for admirals to choose frigates as flagships so that, not being a primary target of the enemy's ships of the line, they could still maintain control of the battle.   </span></p><span data-dcnode-id="4175" instrument_node="">
</span><p class="just" data-dcnode-id="4173"><span data-dcnode-id="4174" instrument_node="">The commanding officer of a frigate was always a full Captain in the British Navy, a "post Captain", since during independent operations or as senior-officer-onstation in remote areas, important decisions about employing force would have to be made without directions from the Admiralty. </span></p><span data-dcnode-id="4172" instrument_node="">
</span><h3 data-dcnode-id="4170" id="LinkTarget_8265"><span data-dcnode-id="4171" instrument_node="">3. CRUISER DEVELOPMENT 1890'S TO WWI ERA</span></h3><span data-dcnode-id="4169" instrument_node="">
</span><h3 data-dcnode-id="4167"><span data-dcnode-id="4168" instrument_node="">3.1 Early Developments</span></h3><span data-dcnode-id="4166" instrument_node="">
</span><p class="just" data-dcnode-id="4164"><span data-dcnode-id="4165" instrument_node="">The cruiser as a named ship type evolved when the world's navies phased out sail propulsion and wooden hulls, creating the armored, steel battleship to replace the sailing ship of the line as the means of enforcing or seizing command of the sea in a fleet action.  Early battleships were big - the largest warships in history when introduced rather slow, and had relatively short endurance even when aided by auxiliary sail. These characteristics opened up a niche for various types of smaller warships.  The cruiser was created to fill several of these niches. </span></p><span data-dcnode-id="4163" instrument_node="">
</span><p class="just" data-dcnode-id="4161"><span data-dcnode-id="4162" instrument_node="">Very small ships were created at the same time for the sea denial mission.  Using newly developed underwater weapons such as mines and torpedoes, these ships could sink the largest ships and prevent a dominant power from taking advantage of control of the sea even after it had been achieved.  These very small ships, torpedo boats and submarines, had extremely limited range and even less seaworthiness.  Therefore, they were only helpful in what would today be called littoral warfare – breaking a blockade or countering a shore bombardment operation.  They were not capable of intercepting an enemy's merchant ships or fleet on the high seas. </span></p><span data-dcnode-id="4160" instrument_node="">
</span><p class="just" data-dcnode-id="4158"><span data-dcnode-id="4159" instrument_node="">With the emergence of a naval strategy using large battleships and small torpedo boats and submarines, the need arose for the functions of a middle-sized combatant, later to be called the cruiser.  One of these functions was that of a commerce raider, which had to have global range, and enough speed to outrun the fastest merchant ship or battleship. The commerce raider must also have enough capacity to house the crews of the captured or sunk merchant ships; in those days it would be considered unacceptable to leave them in their lifeboats.  Prize crews might also be required for ships carrying exceptionally valuable cargoes. </span></p><span data-dcnode-id="4157" instrument_node="">
</span><p class="just" data-dcnode-id="4155"><span data-dcnode-id="4156" instrument_node="">Another cruiser mission was to "show the flag" on a foreign station. While this would seem to be a mainly ceremonial function, in those days the "station ship" might also be required to take action to protect the interests of its nationals when their rights or property were infringed upon by irate locals in what would now be called the Third World, with or without approval from the local government. This "gunboat" mission would not be suitable for a ship as big and expensive as a battleship, and required somewhat different naval architecture than the commerce raider mission (speed had almost no value, for instance).  Nevertheless a mid-size vessel was still required to carry the naval representative (often a flag officer) and his staff, a Marine detachment, and sufficient personnel and equipment to do most of their own maintenance in remote, primitive areas not equipped to service mechanized hardware. An elegantly fitted-out wardroom and well-equipped galley was another requirement, since the gunboat was required to do substantial entertaining, of ambassadors and local dignitaries.  A full complement of boats was often needed to ferry the guests ashore if the ship had to anchor out for security or other operational reasons.  Depending on the level of threat on the foreign station or on how badly the diplomats handled foreign relations, the "gunboat" mission could escalate into a power projection operation, where the station ship would have to perform battleship-like functions of shore bombardment and sea control.  Evidently, this could quickly lead to a much more capable ship being called for, and actually sending a battleship might not be possible due to considerations of maintaining the "fleet in being." </span></p><span data-dcnode-id="4154" instrument_node="">
</span><p class="just" data-dcnode-id="4152"><span data-dcnode-id="4153" instrument_node="">The sea-denial functions of both cruisers and the small warships mentioned earlier called for a "counter-sea denial" function.  A mid-size warship was needed to escort merchant ships to drive off commerce-raiding cruisers and pirates, as well as to escort battleships to guard them against torpedo boats and submarines (and later destroyers).  These missions, like the commerce raider mission, called for substantial speed and seaworthiness so that the cruiser could keep station on the ship being escorted in all weathers, even if it could not necessarily match the speed of the sea denial vessel.  A cruiser need not overhaul such a craft in a stern chase; it just had to force it away from the ship being escorted without the cruiser itself being too easy a target. </span></p><span data-dcnode-id="4151" instrument_node="">
</span><p class="just" data-dcnode-id="4149"><span data-dcnode-id="4150" instrument_node="">Finally, in an age before spy satellites or airborne reconnaissance, cruisers had a scouting function.  The "scout cruiser" was a smaller vessel of extreme speed whose other main attribute was tall masts to hold up the spotters' tops and later the radio antennas with which the ship could report what it had seen.  It needed to be able to defend itself against lesser ships long enough that its report could get through to the force commander, so if we imagine this function as integrated with the fleet or helping the battleships to find their targets, a scout cruiser might not necessarily be small.  On the other hand, scouting could also be more like espionage, and for that function a small and less belligerent-looking ship would be more suitable. "Strategic scouting", providing advance warning of the departure of an enemy fleet from its base, might also call for a large number of units to provide sufficient coverage to shadow the enemy. This would again lead to many smaller, less expensive units, which still needed high speed capability. </span></p><span data-dcnode-id="4148" instrument_node="">
</span><p class="just" data-dcnode-id="4146"><span data-dcnode-id="4147" instrument_node="">Accordingly, ship designers developed cruisers as mid-size combatants to do these principal missions.  Different navies stressed some missions more than others, and most navies built cruisers in different sizes and configurations to suit the mission their doctrine put at the top of their priority list.  For example, British designers stressed the counter-sea denial and station ship/gunboat mission, while French and German designers preferred sea denial.  This was a natural consequence of the dominant position of the British Navy in the Victorian period and the second-rate character of the smaller European navies. </span></p><span data-dcnode-id="4145" instrument_node="">
</span><p class="just" data-dcnode-id="4143"><span data-dcnode-id="4144" instrument_node="">The United States entered the cruiser market late, without extensive experience of iron and steel ship construction.  But, our designers seem to have studied the activity of the foreign navies, especially the British, and even our earliest cruisers, dating to around 1890, showed the influence of European experience.   </span></p><span data-dcnode-id="4142" instrument_node="">
</span><p class="just" data-dcnode-id="4140"><span data-dcnode-id="4141" instrument_node="">From the beginning of steel navies, it was recognized that simply scaling down all functions uniformly from a capital ship would not produce a satisfactory cruiser. Such a ship would have guns that couldn"t penetrate battleship armor and armor that couldn"t protect against battleship gunfire; she would be slower than a battleship because of the disadvantage of a shorter waterline, and would still lack an advantage in range.  Therefore, such a ship would be hopelessly outclassed by hostile battleships and unable to keep in range of commerce raiding cruisers long enough to damage them. Such a ship would be more heavily armed than required for the station ship or scouting roles and more heavily armored than required against guns less potent than those mounted on battleships or shore batteries. </span></p><span data-dcnode-id="4139" instrument_node="">
</span><p class="just" data-dcnode-id="4131"><span data-dcnode-id="4138" instrument_node="">However, in the power projection or high threat gunboat role, it was apparent that the cruiser was a cheaper and less capable stand-in for a battleship.  This was the origin of the first class or "armored cruiser," a larger ship with substantial armor over most of its vital areas that was thinner than battleship armor, a scaled-down battleship-type armament, but an extra dose of speed and endurance so that it could theoretically run away from an encounter with a battleship.  From this description, it is implicit that the armored cruiser would not necessarily be smaller than a contemporary battleship, since speed and fuel capacity lead to increased ship size.  Armored cruisers varied substantially in size; our largest, the "Big Ten" of 1905-6, were over 15,000 tons and longer than contemporary battleships, which generally displaced less than 18,000. They were named after states in a further demonstration of their near-capital ship status.  The </span><i data-dcnode-id="4136"><span data-dcnode-id="4137" instrument_node="">Maine,</span></i><span data-dcnode-id="4135" instrument_node=""> whose destruction in Havana Harbor triggered the Spanish-American War, was designed as an armored cruiser (to a modified British design) but later redesignated a second class battleship; she was both smaller and slower than the contemporary armored cruiser </span><i data-dcnode-id="4133"><span data-dcnode-id="4134" instrument_node="">New York</span></i><span data-dcnode-id="4132" instrument_node="">, but carried heavier main armament. </span></p><span data-dcnode-id="4130" instrument_node="">
</span><p class="just" data-dcnode-id="4128"><span data-dcnode-id="4129" instrument_node="">Moving down the size scale, a "second class" or "protected cruiser" had less armor and was generally smaller than an armored cruiser. In most sources protected cruisers are described as having an armored protective deck but no waterline belt; US protected cruisers mostly followed this scheme, but one class had a 4-inch belt and all had additional armor around weapons and conning tower.  Protected cruisers were usually faster than armored cruisers but at least in the US, did not have more endurance.  They were more suitable for the sea denial and counter-sea denial missions that required high speed and long range gunfire, where a protective deck might help more than a waterline belt. </span></p><span data-dcnode-id="4127" instrument_node="">
</span><p class="just" data-dcnode-id="4125"><span data-dcnode-id="4126" instrument_node="">Smaller yet is the "third class cruiser" or "peace cruiser."  This was designed to be the station ship in areas of low threat.  These ships could be as small as 3,000 tons full load or even less, and they generally had light deck and localized gun armor, occasionally an armored conning tower, and sometimes even no armor at all.  In the 1890's many of these had quite modest top speeds, being unable to reach even 20 knots. While in their peacetime roles this was not a handicap, it could certainly be a danger if war broke out, because against many possible opponents these ships could neither fight nor run. </span></p><span data-dcnode-id="4124" instrument_node="">
</span><p class="just" data-dcnode-id="4119"><span data-dcnode-id="4123" instrument_node="">The "scout cruiser" was about the size of a protected cruiser; its main unique feature was a higher speed.  Scout cruisers introduced the tradition of quadruple screws for US cruisers.  Dividing the propulsion thrust up among 4 propellers reduced propeller loading and the tendency to cavitate at extreme speeds. Therefore, quadruple-screw cruisers could have higher speeds without excessive draft, and continued to be produced through World War II.  The most outstanding US scout cruiser was certainly the </span><i data-dcnode-id="4121"><span data-dcnode-id="4122" instrument_node="">Omaha</span></i><span data-dcnode-id="4120" instrument_node=""> class, discussed in a later section.  Once naval aviation began to provide float planes for use on cruisers and battleships, the scout cruiser's role declined in importance so that none were built after about 1925. </span></p><span data-dcnode-id="4118" instrument_node="">
</span><h3 data-dcnode-id="4116" id="LinkTarget_8284"><span data-dcnode-id="4117" instrument_node="">3.2 Shift from armored to unarmored</span></h3><span data-dcnode-id="4115" instrument_node="">
</span><p class="just" data-dcnode-id="4113"><span data-dcnode-id="4114" instrument_node="">Cruisers did not, of course, evolve in a vacuum; they were affected by the development of other warship types.  By 1890, the transition to steam and steel was complete in most navies.  "Classical" solutions to most of the ship types had been arrived at by experimentation and analysis, aided by war game experience in the absence of actual combat.  But the sea denial craft were still evolving rapidly, with surface torpedo boat speeds and seaworthiness increasing to the point that the British Royal Navy began to see these craft as a threat to the battle fleet.  (While submarines had been successfully deployed by the Confederacy in the American Civil War, they were still experimental in the 1890's and did not become a serious threat until around 1900). </span></p><span data-dcnode-id="4112" instrument_node="">
</span><p class="just" data-dcnode-id="4110"><span data-dcnode-id="4111" instrument_node="">The British sought an antidote, a "torpedo boat destroyer," and in 1893 the first group of 250-ton boats was commissioned.  These craft (later to be known as destroyers), had a designed top speed of 27 knots – faster than contemporary torpedo boats – and were also much larger and better armed.  Now destroyers became in their turn a threat to (as well as a defense for) the battle fleet.  Because the new craft were still relatively small and short range, they could not generally accompany the battle fleet on the high seas.  Their existence became a factor driving cruiser designers to increase the speed of cruisers that might act as escorts to the battle fleet.  This additional speed was generally achieved at the expense of armor protection and tended to drive designers towards lighter types of cruiser. </span></p><span data-dcnode-id="4109" instrument_node="">
</span><p class="just" data-dcnode-id="4101"><span data-dcnode-id="4108" instrument_node="">In 1906, the British Navy upset the status quo by introducing the battleship </span><i data-dcnode-id="4106"><span data-dcnode-id="4107" instrument_node="">Dreadnought,</span></i><span data-dcnode-id="4105" instrument_node=""> which gave its name to the modern type of battleship with a uniform main armament of the largest caliber, assisted by a secondary, anti-torpedo boat battery of much smaller guns and later by antiaircraft guns.  </span><i data-dcnode-id="4103"><span data-dcnode-id="4104" instrument_node="">Dreadnoughts</span></i><span data-dcnode-id="4102" instrument_node=""> were also capable of higher speeds than previous battleships, using the newer technology of steam turbines and the advantage of larger size. </span></p><span data-dcnode-id="4100" instrument_node="">
</span><p class="just" data-dcnode-id="4092"><span data-dcnode-id="4099" instrument_node="">At about the same time as the </span><i data-dcnode-id="4097"><span data-dcnode-id="4098" instrument_node="">Dreadnought</span></i><span data-dcnode-id="4096" instrument_node=""> battleship was introduced, the British Lord John Fisher also pushed the concept of the battle cruiser, a ship of higher speed but similar armament to the </span><i data-dcnode-id="4094"><span data-dcnode-id="4095" instrument_node="">Dreadnought</span></i><span data-dcnode-id="4093" instrument_node="">.  Battle cruisers were the same size or somewhat larger than battleships, but with much reduced armor.  In most navies that built them, they had 4 screws in a time period when battleships generally had 3 or 2.  It is likely that Fisher intended the battle cruisers to serve similar functions to the scout cruiser, but by being essentially invulnerable to cruiser gunfire, to be able to do so even when opposed by enemy cruisers and destroyers.  In addition, he probably recognized that a small unit of battle cruisers could perform maneuvers such as crossing the T of an enemy battle fleet while battleships prevented the enemy from concentrating fire on the battle cruisers.  It was never intended that battle cruisers were, in classical terms, "fit to lie in the line", i.e. to trade broadsides with an enemy capital ship.  But, perhaps because of their armament and styling – they carried battleship-sized guns, looked like battleships, and were at least as large – commanders did just that with them in World War I. But, they were not designed to survive battleship gunfire, and several of them blew up at Jutland (May 31, 1916). </span></p><span data-dcnode-id="4091" instrument_node="">
</span><p class="just" data-dcnode-id="4084"><span data-dcnode-id="4090" instrument_node="">The US did not complete a battle cruiser until much later; while several designs were developed during World War I, and one was approved in 1916, the Navy's bureaus absorbed the lessons of Jutland and the British </span><i data-dcnode-id="4088"><span data-dcnode-id="4089" instrument_node="">Hood</span></i><span data-dcnode-id="4087" instrument_node=""> as the prototype of the fast battleship. </span><sup data-dcnode-id="4085"><span data-dcnode-id="4086" instrument_node="">i </span></sup></p><span data-dcnode-id="4083" instrument_node="">
</span><p class="just" data-dcnode-id="4081"><span data-dcnode-id="4082" instrument_node="">However, the advent of battle cruisers changed the tactical environment for cruisers radically.  The battle cruiser's battleship-size guns could hit at ranges no conventional cruiser could reach, and penetrate any armor short of a battleship's even at long range.  Battle cruisers were faster than all but the fastest protected cruisers and of course the scout cruisers.  If there was any possibility of meeting a battle cruiser, an armored cruiser was at severe risk. </span></p><span data-dcnode-id="4080" instrument_node="">
</span><p class="just" data-dcnode-id="4063"><span data-dcnode-id="4079" instrument_node="">This reality was exposed starkly by the First Battle of the Falklands, in December 1914, where a German squadron under Admiral von Spee, centered around armored cruisers </span><i data-dcnode-id="4077"><span data-dcnode-id="4078" instrument_node="">Scharnhorst</span></i><span data-dcnode-id="4076" instrument_node=""> and </span><i data-dcnode-id="4074"><span data-dcnode-id="4075" instrument_node="">Gneisenau,</span></i><span data-dcnode-id="4073" instrument_node=""> was practically annihilated by two British battlecruisers, </span><i data-dcnode-id="4071"><span data-dcnode-id="4072" instrument_node="">Invincible</span></i><span data-dcnode-id="4070" instrument_node=""> and </span><i data-dcnode-id="4068"><span data-dcnode-id="4069" instrument_node="">Inflexible.</span></i><sup data-dcnode-id="4065"><i data-dcnode-id="4066"><span data-dcnode-id="4067" instrument_node="">ii</span></i></sup><span data-dcnode-id="4064" instrument_node=""> If cruisers in general were to be kept relatively small to maintain naval presence over huge areas, speed, rather than more armor and/or guns, was needed so that they could retreat when presented with an overwhelming threat like a battlecruiser.  Accordingly, shortly before and during World War I, the armoring of cruisers decreased in favor of higher speeds.  Some cruisers were produced with no armor at all; in many navies these were called "light cruisers." </span></p><span data-dcnode-id="4062" instrument_node="">
</span><p class="just" data-dcnode-id="4060"><span data-dcnode-id="4061" instrument_node="">However, armor of limited thickness still had a place in cruiser design. Performing the gunboat function, a ship might be exposed to small-arms fire or light artillery that could disable a ship far away from dockyards and supplies before much defensive action could be taken.  Also, a cruiser must not be disabled by a single hit from destroyer-size guns. </span></p><span data-dcnode-id="4059" instrument_node="">
</span><h3 data-dcnode-id="4057" id="LinkTarget_8304"><span data-dcnode-id="4058" instrument_node="">3.3 Communications</span></h3><span data-dcnode-id="4056" instrument_node="">
</span><p class="just" data-dcnode-id="4054"><span data-dcnode-id="4055" instrument_node="">Communications for cruisers and other naval vessels are of two fundamental types, short range for exchanging tactical signals between an embarked commander and other ships in the squadron and long range for receiving instructions from or reporting information to higher command. </span></p><span data-dcnode-id="4053" instrument_node="">
</span><p class="just" data-dcnode-id="4051"><span data-dcnode-id="4052" instrument_node="">During the day, tactical signals would usually be accomplished by signal flags, which had existed at least since the 1600's. Initially, colored lanterns or rockets were used at night.  Around 1880, electric lights were introduced, using a searchlight-like beam interrupted suitably to transmit the same Morse Code used in the telegraphs, greatly improving night signaling.  At this time, however, flag signals were still the primary means of daylight communication between ships.   </span></p><span data-dcnode-id="4050" instrument_node="">
</span><p class="just" data-dcnode-id="4048"><span data-dcnode-id="4049" instrument_node="">Long range communications had historically been accomplished through the use of written communications (dispatches) carried by fast ships or later, through the use of telegraphed messages to foreign ports where they could be picked up by the ships (this was the method used to instruct Admiral Dewey that hostilities with Spain had commenced and to proceed to the Philippines).  The next development was the evolution of "wireless telegraphy" or WT.  A two-way radio could transmit or receive a keyed, Morse code signal from a shore station or another ship.  This capability evolved gradually from the first experiments of Guglielmo Marconi in 1895 that required huge land-based towers to hold the antennas, gradually producing marine sets with (at first) very limited range, then gradually increasing performance.  Radio started being installed on cruisers routinely around 1900, and was on board most naval ships by the start of World War I. </span></p><span data-dcnode-id="4047" instrument_node="">
</span><p class="just" data-dcnode-id="4042"><span data-dcnode-id="4046" instrument_node="">However, radio communication, while it greatly augmented the value of a scout cruiser, perhaps even making specialized scout cruisers worthwhile,</span><sup data-dcnode-id="4044"><span data-dcnode-id="4045" instrument_node="">iii</span></sup><span data-dcnode-id="4043" instrument_node=""> also created entirely new problems of command and control.  In World War I, central naval commands and heads of state recognized that radio gave them the ability to give orders almost in real time to operational commanders.  This put the at-sea commander in a difficult situation, that is, he could be blamed for taking independent action without consulting London or Washington, but he could also be blamed if he followed radioed instructions and the instructions proved to be ill-advised because central authority didn"t understand the situation on the water.  Both of those situations developed in World War I, and a number of careers were ruined as a result. </span></p><span data-dcnode-id="4041" instrument_node="">
</span><p class="just" data-dcnode-id="4034"><span data-dcnode-id="4040" instrument_node="">In the maneuvers that led to the Gallipoli campaign, for instance, Vice-Admiral Troubridge decided not to engage the German battle cruiser </span><i data-dcnode-id="4038"><span data-dcnode-id="4039" instrument_node="">Goeben</span></i><span data-dcnode-id="4037" instrument_node=""> with a force of cruisers.  He was court-martialled, but acquitted based on the radioed orders he had received to avoid combat with "a superior force."  However, he never got another sea command.</span><sup data-dcnode-id="4035"><span data-dcnode-id="4036" instrument_node=""> iv </span></sup></p><span data-dcnode-id="4033" instrument_node="">
</span><h3 data-dcnode-id="4031" id="LinkTarget_8311"><span data-dcnode-id="4032" instrument_node="">4. CRUISER DEVELOPMENT 1920-1938</span></h3><span data-dcnode-id="4030" instrument_node="">
</span><p class="just" data-dcnode-id="4025"><span data-dcnode-id="4029" instrument_node="">The Washington Naval Treaty of 1922 significantly altered the progression of cruiser design in the United States.  The Treaty caused what can roughly be thought of as a 16 year long detour in cruiser design stretching from 1922 to around 1938, when the looming threat of WWII effectively rendered the treaties established during the previous years no longer in effect.  While the dissolution of the Treaty restrictions allowed unfettered design development, the cruisers developed post-1938 were largely derived from the Treaty-constrained </span><i data-dcnode-id="4027"><span data-dcnode-id="4028" instrument_node="">Brooklyn</span></i><span data-dcnode-id="4026" instrument_node=""> Class rather than the pre-1922 battle cruiser designs scrapped by the Treaty implementation.  Consequently the 16 year detour had far reaching implications extending well beyond 1938. </span></p><span data-dcnode-id="4024" instrument_node="">
</span><h3 data-dcnode-id="4022"><span data-dcnode-id="4023" instrument_node="">4.1 US Navy leading up to the Washington Naval Treaty</span></h3><span data-dcnode-id="4021" instrument_node="">
</span><p class="just" data-dcnode-id="4016"><span data-dcnode-id="4020" instrument_node="">US Navy cruiser design in the years leading up to 1920 was focused on two main types of new cruisers.  The first was a class of scout cruisers which would eventually become the </span><i data-dcnode-id="4018"><span data-dcnode-id="4019" instrument_node="">Omaha</span></i><span data-dcnode-id="4017" instrument_node=""> Class; the second was a new class of battle cruisers which was started, but never completed. </span></p><span data-dcnode-id="4015" instrument_node="">
</span><p class="just" data-dcnode-id="4008" id="LinkTarget_8320"><strong data-dcnode-id="4010"><span data-dcnode-id="4014" instrument_node="">4.1.1 	</span><i data-dcnode-id="4012"><span data-dcnode-id="4013" instrument_node="">Omaha</span></i><span data-dcnode-id="4011" instrument_node=""> Class</span></strong><span data-dcnode-id="4009" instrument_node=""> </span></p><span data-dcnode-id="4007" instrument_node="">
</span><p class="just" data-dcnode-id="3996"><span data-dcnode-id="4006" instrument_node="">The US Navy continued the pattern of deliberately designing cruisers with slightly increased performance over comparable foreign designs. Before WWI, the average cruiser in the world's navies displaced less than 5,000 tons and was armed with a few 6-inch guns in open shields.  The </span><i data-dcnode-id="4004"><span data-dcnode-id="4005" instrument_node="">Omaha</span></i><span data-dcnode-id="4003" instrument_node=""> Class design was greatly superior to such craft in battery, speed, and range. The </span><i data-dcnode-id="4001"><span data-dcnode-id="4002" instrument_node="">Omaha</span></i><span data-dcnode-id="4000" instrument_node=""> Class was designed specifically in response to the British </span><i data-dcnode-id="3998"><span data-dcnode-id="3999" instrument_node="">Centaur</span></i><span data-dcnode-id="3997" instrument_node=""> Class cruisers.  Although from a modern viewpoint a conflict between the US and Great Britain seems implausible, US Navy planners during this time and up to the mid-30's considered Britain to be a formidable rival for power in the Atlantic, and the possibility of armed conflict between the two countries plausible enough to merit appropriate planning measures. </span></p><span data-dcnode-id="3995" instrument_node="">
</span><p class="just" data-dcnode-id="3987"><span data-dcnode-id="3994" instrument_node="">Originally designed with eight 6-inch guns, this number was increased to a total of twelve during construction to counter the seven 6-inch guns aboard the </span><i data-dcnode-id="3992"><span data-dcnode-id="3993" instrument_node="">Centaur</span></i><span data-dcnode-id="3991" instrument_node="">. Ata design speed of 35 knots, the </span><i data-dcnode-id="3989"><span data-dcnode-id="3990" instrument_node="">Omaha</span></i><span data-dcnode-id="3988" instrument_node=""> was the fastest ship in the world, a full 3 knots faster than its closest British rival. </span></p><span data-dcnode-id="3986" instrument_node="">
</span><p class="just" data-dcnode-id="3981"><span data-dcnode-id="3985" instrument_node="">Launched in 1920, the </span><i data-dcnode-id="3983"><span data-dcnode-id="3984" instrument_node="">Omaha </span></i><span data-dcnode-id="3982" instrument_node="">(designated C4 and later CL 4) had a displacement of just over 7,100 long tons.  The cruisers emerged with a distinctly archaic appearance owing to their WWI-type stacked twin casemate-mount cannons and were among the last broadside cruisers designed anywhere. </span></p><span data-dcnode-id="3980" instrument_node="">
</span><p class="just" data-dcnode-id="3972"><span data-dcnode-id="3979" instrument_node="">As a result of the design changes placed on the ship mid-construction, the </span><i data-dcnode-id="3977"><span data-dcnode-id="3978" instrument_node="">Omaha </span></i><span data-dcnode-id="3976" instrument_node="">that entered the water in 1920 was a badly overloaded design that, even at the beginning, had been rather tight.</span><sup data-dcnode-id="3974"><span data-dcnode-id="3975" instrument_node="">v</span></sup><span data-dcnode-id="3973" instrument_node="">  The ships were insufficiently insulated, too hot in the tropics and too cold in the north.   Sacrifices in weight savings in the name of increased speed led to severe compromise in the habitability of the ship.  While described as a good ship in a seaway, the low freeboard led to frequent green water ingestion over the bow and in the torpedo compartments.  The lightly built hulls leaked, so that sustained high-speed steaming contaminated the oil tanks with sea water. </span></p><span data-dcnode-id="3971" instrument_node="">
</span><p class="just" data-dcnode-id="3963"><span data-dcnode-id="3970" instrument_node="">These drawbacks notwithstanding, the US Navy took a great deal of pride in the </span><i data-dcnode-id="3968"><span data-dcnode-id="3969" instrument_node="">Omaha</span></i><span data-dcnode-id="3967" instrument_node=""> Class. The </span><i data-dcnode-id="3965"><span data-dcnode-id="3966" instrument_node="">Omaha</span></i><span data-dcnode-id="3964" instrument_node=""> placed a high emphasis on underwater explosion protection from the threat of torpedoes.  She was designed with improved compartmentation while her magazines were the first to be placed on centerline, below the waterline. </span></p><span data-dcnode-id="3962" instrument_node="">
</span><p class="just" data-dcnode-id="3955"><span data-dcnode-id="3961" instrument_node="">Originally designed to serve as a scout, they served throughout the interwar period as leaders of fleet flotillas, helping them resist enemy destroyer attack.  Tactical scouting became the province of cruiser aircraft, and the distant scouting role was taken over by the new heavy cruisers spawned by the Washington Naval Treaty.  Thus, the </span><i data-dcnode-id="3959"><span data-dcnode-id="3960" instrument_node="">Omaha</span></i><span data-dcnode-id="3958" instrument_node="">s never performed their designed function.  They were relegated to the fleet-screening role, where their high speed and great volume of fire were most appreciated.</span><sup data-dcnode-id="3956"><span data-dcnode-id="3957" instrument_node="">vi </span></sup></p><span data-dcnode-id="3954" instrument_node="">
</span><img alt="cruiser" data-dcnode-id="3953" height="172" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.navalmarinearchive.com/research/cruisers/cr_ims/cr_img_3.jpg&amp;raw" width="256"><span data-dcnode-id="3952" instrument_node="">
</span><p align="center" data-dcnode-id="3948"><span data-dcnode-id="3951" instrument_node="">Figure 1 C10 </span><i data-dcnode-id="3949"><span data-dcnode-id="3950" instrument_node="">Concord </span></i></p><span data-dcnode-id="3947" instrument_node="">
</span><p data-dcnode-id="3943" id="LinkTarget_8325"><strong data-dcnode-id="3945"><span data-dcnode-id="3946" instrument_node="">4.1.2 	Pre-1922 Heavy Cruisers</span></strong><span data-dcnode-id="3944" instrument_node=""> </span></p><span data-dcnode-id="3942" instrument_node="">
</span><p class="just" data-dcnode-id="3910"><span data-dcnode-id="3941" instrument_node="">While the successful fielding of the </span><i data-dcnode-id="3939"><span data-dcnode-id="3940" instrument_node="">Omaha </span></i><span data-dcnode-id="3938" instrument_node="">Class cruisers gave the US a slight advantage against the </span><i data-dcnode-id="3936"><span data-dcnode-id="3937" instrument_node="">Centaur</span></i><span data-dcnode-id="3935" instrument_node=""> class cruisers, an additional threat to US Navy scout cruiser superiority loomed across the Atlantic which outmatched the </span><i data-dcnode-id="3933"><span data-dcnode-id="3934" instrument_node="">Omaha's </span></i><span data-dcnode-id="3932" instrument_node="">capabilities.  The British </span><i data-dcnode-id="3930"><span data-dcnode-id="3931" instrument_node="">Hawkins</span></i><span data-dcnode-id="3929" instrument_node=""> Class cruisers (1916) boasted seven 7.5-in/45 guns at a displacement of 9,750 tons at a sprint speed of 30 knots.  The </span><i data-dcnode-id="3927"><span data-dcnode-id="3928" instrument_node="">Hawkins</span></i><span data-dcnode-id="3926" instrument_node=""> was designed by the British to hunt down German commerce raiders, and had been given an unusually long-range weapon that might enable them to cripple such raiders before they could flee. This counter-raider had the unintended effect of upgrading foreign designs, partly because of its potential as a raider.</span><sup data-dcnode-id="3924"><span data-dcnode-id="3925" instrument_node="">vii </span></sup><span data-dcnode-id="3923" instrument_node="">For the US Navy, the </span><i data-dcnode-id="3921"><span data-dcnode-id="3922" instrument_node="">Hawkins</span></i><span data-dcnode-id="3920" instrument_node=""> became the standard for cruisers designed for independent operations, with planners demanding six 8-inch guns and a speed of 32.5 knots to counter the </span><i data-dcnode-id="3918"><span data-dcnode-id="3919" instrument_node="">Hawkins</span></i><span data-dcnode-id="3917" instrument_node=""> capabilities. The designs produced by the US Navy which were formulated in response to the </span><i data-dcnode-id="3915"><span data-dcnode-id="3916" instrument_node="">Hawkins</span></i><span data-dcnode-id="3914" instrument_node=""> Class would eventually lead to the USS </span><i data-dcnode-id="3912"><span data-dcnode-id="3913" instrument_node="">Pensacola</span></i><span data-dcnode-id="3911" instrument_node="">, the first of the so called "Treaty cruisers." </span></p><span data-dcnode-id="3909" instrument_node="">
</span><p data-dcnode-id="3905" id="LinkTarget_8335"><strong data-dcnode-id="3907"><span data-dcnode-id="3908" instrument_node="">4.1.3 	Pre-1922 Battle Cruisers</span></strong><span data-dcnode-id="3906" instrument_node=""> </span></p><span data-dcnode-id="3904" instrument_node="">
</span><p class="just" data-dcnode-id="3896"><span data-dcnode-id="3903" instrument_node="">In 1909, as discussed in a previous section, the British Navy had already fielded another extremely powerful ship.  </span><i data-dcnode-id="3901"><span data-dcnode-id="3902" instrument_node="">HMS Invincible</span></i><span data-dcnode-id="3900" instrument_node="">, the first battle cruiser, was designed to be superior to any normal cruiser then in existence. </span><i data-dcnode-id="3898"><span data-dcnode-id="3899" instrument_node="">Invincible</span></i><span data-dcnode-id="3897" instrument_node=""> was armed with a battleship's big guns, while at the same time having a speed superior to both battleships and armored cruisers.  Its role was to act as a superior scouting vessel, able to penetrate enemy cruiser screens while at the same time effectively screening her own battle force. She had secondary roles in hunting down and destroying enemy commerce raiders and in helping to reinforce the main battle line in a naval engagement. </span></p><span data-dcnode-id="3895" instrument_node="">
</span><p class="just" data-dcnode-id="3891"><span data-dcnode-id="3894" instrument_node="">In order to achieve the high speed necessary for the battle cruiser while carrying a sizable battery of heavy guns, the hull and machinery had to be bigger, more complicated, and more expensive than any vessel previously built.  However, armor protection had to be kept to a minimum to reduce weight.  Consequently, critics generally believed such a ship could not be used in a fleet action and was larger and more costly than necessary to carry out its other missions.  Chiefly because of these criticisms, the US Navy hesitated for several years before committing itself to building battle cruisers.</span><sup data-dcnode-id="3892"><span data-dcnode-id="3893" instrument_node="">viii </span></sup></p><span data-dcnode-id="3890" instrument_node="">
</span><p class="just" data-dcnode-id="3886"><span data-dcnode-id="3889" instrument_node="">Apparent validation of the battle cruiser concept came early in WWI.  In the First Battle of the Falklands, discussed in an earlier section, the superiority of the battle cruiser over the armored cruiser was clearly demonstrated.</span><sup data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">ix </span></sup></p><span data-dcnode-id="3885" instrument_node="">
</span><p class="just" data-dcnode-id="3871"><span data-dcnode-id="3884" instrument_node="">Development of a battle cruiser for the US Navy was very turbulent, with Navy planners following the capabilities of the British Navy, while Navy leaders wrestled with the political obstacles impeding the construction of the expensive and complex new class of ships.  Originally envisaged with 14-inch main guns, the US battle cruiser designs were modified during the pre-Treaty years to overmatch the </span><i data-dcnode-id="3882"><span data-dcnode-id="3883" instrument_node="">HMS Hood's</span></i><span data-dcnode-id="3881" instrument_node=""> 15inch guns with 16-inch guns. </span><i data-dcnode-id="3879"><span data-dcnode-id="3880" instrument_node=""> HMS Hood</span></i><span data-dcnode-id="3878" instrument_node=""> and the US Navy design were really more akin to fast battleships.  The US design had stalked the British battle cruiser designs as they moved from the lightly armored </span><i data-dcnode-id="3876"><span data-dcnode-id="3877" instrument_node="">HMS Invincible</span></i><span data-dcnode-id="3875" instrument_node="">, shown to be particularly vulnerable to an encounter with a battleship, to the heavily armored </span><i data-dcnode-id="3873"><span data-dcnode-id="3874" instrument_node="">HMS Hood</span></i><span data-dcnode-id="3872" instrument_node="">. </span></p><span data-dcnode-id="3870" instrument_node="">
</span><img alt="cruiser" data-dcnode-id="3869" height="373" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.navalmarinearchive.com/research/cruisers/cr_ims/cr_img_4.jpg&amp;raw" width="576"><span data-dcnode-id="3868" instrument_node="">
</span><p align="center" data-dcnode-id="3864"><span data-dcnode-id="3867" instrument_node="">Figure 2 Battle Cruiser </span><i data-dcnode-id="3865"><span data-dcnode-id="3866" instrument_node="">HMS Hood </span></i></p><span data-dcnode-id="3863" instrument_node="">
</span><p class="just" data-dcnode-id="3843"><span data-dcnode-id="3862" instrument_node="">Six keels of the new battle cruiser class were laid during 1920: </span><i data-dcnode-id="3860"><span data-dcnode-id="3861" instrument_node="">Constellation</span></i><span data-dcnode-id="3859" instrument_node="">, </span><i data-dcnode-id="3857"><span data-dcnode-id="3858" instrument_node="">Constitution</span></i><span data-dcnode-id="3856" instrument_node="">, </span><i data-dcnode-id="3854"><span data-dcnode-id="3855" instrument_node="">Saratoga</span></i><span data-dcnode-id="3853" instrument_node="">, </span><i data-dcnode-id="3851"><span data-dcnode-id="3852" instrument_node="">United States</span></i><span data-dcnode-id="3850" instrument_node="">, </span><i data-dcnode-id="3848"><span data-dcnode-id="3849" instrument_node="">Lexington</span></i><span data-dcnode-id="3847" instrument_node="">, and </span><i data-dcnode-id="3845"><span data-dcnode-id="3846" instrument_node="">Ranger</span></i><span data-dcnode-id="3844" instrument_node="">.  By the time they were begun it was already becoming clear to some of the more farsighted and politically oriented naval officers that they would probably never be completed. Construction lagged during 1921, and was nearly halted after the Washington Conference began its deliberations in November. </span></p><span data-dcnode-id="3842" instrument_node="">
</span><p class="just" data-dcnode-id="3834"><span data-dcnode-id="3841" instrument_node="">Thus begins the great detour in US cruiser production.  It would be another two decades before the </span><i data-dcnode-id="3839"><span data-dcnode-id="3840" instrument_node="">USS Alaska</span></i><span data-dcnode-id="3838" instrument_node=""> and </span><i data-dcnode-id="3836"><span data-dcnode-id="3837" instrument_node="">USS Guam</span></i><span data-dcnode-id="3835" instrument_node="">, the US Navy's first battle cruisers, would find their way into the waters of the Pacific Ocean just in time for the conclusion of WWII. </span></p><span data-dcnode-id="3833" instrument_node="">
</span><h3 data-dcnode-id="3831" id="LinkTarget_8348"><span data-dcnode-id="3832" instrument_node="">4.2 Washington Naval Treaty</span></h3><span data-dcnode-id="3830" instrument_node="">
</span><p class="just" data-dcnode-id="3828"><span data-dcnode-id="3829" instrument_node="">On November 12, 1921, the five principal naval powers of the post World War I world convened in Washington D.C. to discuss naval disarmament.  The United States, Great Britain, Italy, France, and Japan controlled the largest naval forces in the world at that time.  Each came to the conference seeking an advantageous settlement. This was especially true in the case of the United States government, which wanted a naval disarmament agreement that could curb the capital ship arms race, particularly the increasing trend towards expensive battle cruisers, while also limiting Japanese expansion in the Far East.  </span></p><span data-dcnode-id="3827" instrument_node="">
</span><p class="just" data-dcnode-id="3825"><span data-dcnode-id="3826" instrument_node="">The United States saw a potential threat from across both oceans. Britain had long been a dominant naval power, and was still warily regarded by naval planners all the way through the mid-1930's.  The British controlled a far reaching network of colonies across the globe, which gave Britain many bases for naval operations.  In a conflict against Britain, the US would have to steam considerably longer distances, with stretched supply lines.  US planners hoped to curb the number of ships Britain was building, and also to maintain the tradition of having superior ships. </span></p><span data-dcnode-id="3824" instrument_node="">
</span><p class="just" data-dcnode-id="3822"><span data-dcnode-id="3823" instrument_node="">Japan was just becoming a threat.  Japan's dramatic defeat of the Russian fleet in 1905 suddenly revealed Japan as a first class naval power.  Although an ally during WWI, Japan's influence was steadily growing in the Far East, making US planners nervous about American interests around the Philippines. </span></p><span data-dcnode-id="3821" instrument_node="">
</span><p class="just" data-dcnode-id="3819"><span data-dcnode-id="3820" instrument_node="">To counter the Japanese, American naval strategists began planning for the development of naval bases in the Philippines and on Guam, in addition to the naval construction program authorized by Congress in 1916. </span></p><span data-dcnode-id="3818" instrument_node="">
</span><p class="just" data-dcnode-id="3816"><span data-dcnode-id="3817" instrument_node="">Realizing that their position in the Western Pacific was weak, the American military was forced to adopt a holding strategy.  US Navy planners intended to be able to fight in two separate scenarios.  The first was a two ocean war, with the US Navy on the offensive in the Atlantic, while on the defensive in the Pacific.  The second was a one ocean war with the US Navy on the offensive in the Pacific. </span></p><span data-dcnode-id="3815" instrument_node="">
</span><p class="just" data-dcnode-id="3813"><span data-dcnode-id="3814" instrument_node="">The cornerstone of this strategy was the possession of a superior fleet, meaning a large number of battle cruisers capable of engaging and destroying Japanese cruisers. This was a cost that many American politicians were unwilling to underwrite.  In this context, the Washington Naval Treaty can be seen as the lesser of two evils, with diplomatic intrigue replacing military might as the weapon of choice.  </span></p><span data-dcnode-id="3812" instrument_node="">
</span><p class="just" data-dcnode-id="3810"><span data-dcnode-id="3811" instrument_node="">An agreement between the five powers was eventually reached, regulating the expansion of each nation's Navy.  The most critical factor in allowing the Treaty terms to be agreeable to all of the parties was the genuine desire for arms limitations felt by all. </span></p><span data-dcnode-id="3809" instrument_node="">
</span><p class="just" data-dcnode-id="3807"><span data-dcnode-id="3808" instrument_node="">After specifying some exceptions for ships in current use and under construction, the Treaty limited the total capital ship tonnage of each of the signatories.  The United States Navy and the Royal Navy could not exceed 525,000 tons, the French Navy and the Italian Navy were limited to 175,000 tons, and the Japanese Navy to 315,000 tons. No single ship could exceed 35,000 tons, and no ship could carry a gun in excess of 16 inches. </span></p><span data-dcnode-id="3806" instrument_node="">
</span><p class="just" data-dcnode-id="3804"><span data-dcnode-id="3805" instrument_node="">Aircraft carriers were addressed specifically with the total tonnage for carriers of the United States and the British Empire limited to 135,000 tons; for France and Italy 60,000 tons; and for Japan 81,000 tons.  Only two carriers per nation could exceed 27,000 tons, and those two were limited to 33,000 tons each.  The number of large guns carried by an aircraft carrier was sharply limited, meaning it was not legal to put a small aircraft on a battleship and call it an aircraft carrier. </span></p><span data-dcnode-id="3803" instrument_node="">
</span><p class="just" data-dcnode-id="3799"><span data-dcnode-id="3802" instrument_node="">As to fortifications and naval bases, the United States, the British Empire, and Japan agreed to maintain the status quo at the time of the signing.  No new fortifications or naval bases could be established, and existing bases and defenses could not be improved in the territories and possessions specified.  In general, the specified areas allowed construction on the main coasts of the countries, but not on smaller island territories.</span><sup data-dcnode-id="3800"><span data-dcnode-id="3801" instrument_node="">x </span></sup></p><span data-dcnode-id="3798" instrument_node="">
</span><p class="just" data-dcnode-id="3796"><span data-dcnode-id="3797" instrument_node="">This caused a change in strategy on the US side.  Unable to further fortify the Philippines or establish a solid base on Guam, the US effectively gave up a strong permanent presence in the Western Pacific.  This reduced land-based presence would have to be balanced by a greater sea based power projection. </span></p><span data-dcnode-id="3795" instrument_node="">
</span><p class="just" data-dcnode-id="3793"><span data-dcnode-id="3794" instrument_node="">All signatories pledged to maintain a balance in their respective capital fleets under a predetermined ratio:  </span></p><span data-dcnode-id="3792" instrument_node="">
</span><ul data-dcnode-id="3775" type="disc"><span data-dcnode-id="3791" instrument_node="">
</span><li class="just" data-dcnode-id="3789"><span data-dcnode-id="3790" instrument_node="">Britain 5 </span></li><span data-dcnode-id="3788" instrument_node="">
</span><li class="just" data-dcnode-id="3786"><span data-dcnode-id="3787" instrument_node="">United States 5 </span></li><span data-dcnode-id="3785" instrument_node="">
</span><li class="just" data-dcnode-id="3783"><span data-dcnode-id="3784" instrument_node="">Japan 3 </span></li><span data-dcnode-id="3782" instrument_node="">
</span><li class="just" data-dcnode-id="3780"><span data-dcnode-id="3781" instrument_node="">France 1.67 </span></li><span data-dcnode-id="3779" instrument_node="">
</span><li class="just" data-dcnode-id="3777"><span data-dcnode-id="3778" instrument_node="">Italy 1.67 </span></li><span data-dcnode-id="3776" instrument_node="">
</span></ul><span data-dcnode-id="3774" instrument_node="">
</span><p class="just" data-dcnode-id="3772"><span data-dcnode-id="3773" instrument_node="">The United States proposed to extend this ratio beyond just capital ships to apply to auxiliary ships, but was unable to get agreement from the other nations at the negotiating table. </span></p><span data-dcnode-id="3771" instrument_node="">
</span><p class="just" data-dcnode-id="3766"><span data-dcnode-id="3770" instrument_node="">Cruiser designs were capped at a maximum displacement of 10,000 long tons, with armament no larger than an 8-inch gun. (It is notable that these specifications correspond approximately to those of a </span><i data-dcnode-id="3768"><span data-dcnode-id="3769" instrument_node="">Hawkins</span></i><span data-dcnode-id="3767" instrument_node=""> class cruiser.)  While the aircraft carriers and capital ships were limited to a certain combined tonnage by the terms of the agreement, no such limitation was placed on cruisers. </span></p><span data-dcnode-id="3765" instrument_node="">
</span><p class="just" data-dcnode-id="3763"><span data-dcnode-id="3764" instrument_node="">The Treaty measured the displacement of the ships based on their 'standard displacement", a weight accounting methodology defined within the Treaty.  The intent of the standard displacement was to avoid unfairly penalizing Great Britain and the United States for the large steaming distances the two countries required.  Standard displacement did not count the weight of the fuel and reserve feed water needed for long range against the Treaty limits. </span></p><span data-dcnode-id="3762" instrument_node="">
</span><p class="just" data-dcnode-id="3760"><span data-dcnode-id="3761" instrument_node="">This had an immediate and dramatic effect on ship design within the United States.  For the first time, weight estimation, control, and reduction moved to the forefront of design drivers for new ship designs.  The US had not invested resources in investigating weight reduction measures in the years preceding the Treaty implementation.  Additionally, US designers were suddenly trying to design a ship that would be just under the Treaty limits without fuel weight, while meeting speed and range requirements which are naturally tied to the amount of fuel onboard. </span></p><span data-dcnode-id="3759" instrument_node="">
</span><p class="just" data-dcnode-id="3755"><span data-dcnode-id="3758" instrument_node="">The bizarre effects of the Treaty were also evident in all of the US Navy conceptual designs coming after the Treaty's implementation.  For each, the potable water, which might be excluded from standard displacement, was carried in the turret overhangs, and thus balance secured without added (Treaty) weight.</span><sup data-dcnode-id="3756"><span data-dcnode-id="3757" instrument_node="">xi </span></sup></p><span data-dcnode-id="3754" instrument_node="">
</span><p class="just" data-dcnode-id="3749"><span data-dcnode-id="3753" instrument_node="">The limitations on the cruiser displacement and armament were not arbitrarily assigned, rather they were a rationally arrived upon set of restrictions due to the world's intention to maintain parity with rival nations' capabilities.   By this time the US Navy had two years of experience designing 10,000 ton, 8-inch cruisers and had convinced itself that nothing smaller was really worth building, considering Pacific distances.  The British </span><i data-dcnode-id="3751"><span data-dcnode-id="3752" instrument_node="">Hawkins</span></i><span data-dcnode-id="3750" instrument_node=""> class cruisers had already made the 8-inch gun cruiser the standard for long range cruisers in every nation, and agreeing to the 10,000 ton displacement limit and 8-inch armament limitation was naturally amenable to the US. This had the immediate, if unintentional, effect of simultaneously creating both an upper and lower bound of future cruiser designs.  While the Treaty did indeed curtail the arms race of building capital ships, it inadvertently supplanted this contest with a new arms race of building "Treaty cruisers." </span></p><span data-dcnode-id="3748" instrument_node="">
</span><p class="just" data-dcnode-id="3743"><span data-dcnode-id="3747" instrument_node="">After the conference, cruisers carrying the 8-inch guns were re-designated as "Heavy Cruisers (CA)" because they carried the heaviest allowable armament under the Treaty limitations.  The </span><i data-dcnode-id="3745"><span data-dcnode-id="3746" instrument_node="">Omaha</span></i><span data-dcnode-id="3744" instrument_node=""> Class ships, with their 6-inch guns, were re-designated as "Light Cruisers (CL)." </span></p><span data-dcnode-id="3742" instrument_node="">
