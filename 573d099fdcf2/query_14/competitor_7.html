</span><span data-dcnode-id="6438" instrument_node="">
</span><span data-dcnode-id="6428" instrument_node="">
</span><span data-dcnode-id="6426" instrument_node="">
</span><table align="center" border="0" cellpadding="2" cellspacing="2" data-dcnode-id="6424"><tbody data-dcnode-id="6425"><tr data-dcnode-id="6453"><td data-dcnode-id="6461"><img alt="Image by Ivan Sache" border="1" data-dcnode-id="6462" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/fr_antif_b.gif&amp;raw" width="216"></td><td data-dcnode-id="6458"><span data-dcnode-id="6459" instrument_node="">&nbsp;&nbsp;&nbsp;</span></td><td data-dcnode-id="6455"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="6456" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/fr_antif_b2.gif&amp;raw" width="216"></td></tr><tr data-dcnode-id="6427"><td data-dcnode-id="6442"><div align="center" data-dcnode-id="6443"><span data-dcnode-id="6450" instrument_node="">Breton </span><i data-dcnode-id="6448"><span data-dcnode-id="6449" instrument_node="">Antifas</span></i><span data-dcnode-id="6447" instrument_node=""> Flag</span><br data-dcnode-id="6446"><font data-dcnode-id="6444" size="-1"><span data-dcnode-id="6445" instrument_node="">Type #1</span></font></div></td><td data-dcnode-id="6439"><span data-dcnode-id="6440" instrument_node="">&nbsp;&nbsp;&nbsp;</span></td><td data-dcnode-id="6429"><div align="center" data-dcnode-id="6430"><span data-dcnode-id="6437" instrument_node="">Breton </span><i data-dcnode-id="6435"><span data-dcnode-id="6436" instrument_node="">Antifas</span></i><span data-dcnode-id="6434" instrument_node=""> Flag</span><br data-dcnode-id="6433"><font data-dcnode-id="6431" size="-1"><span data-dcnode-id="6432" instrument_node="">Type #2</span></font></div></td></tr></tbody></table></div><p data-dcnode-id="6422"></p><span data-dcnode-id="6421" instrument_node="">
</span><p data-dcnode-id="6403"><font data-dcnode-id="6404" face="Arial"><span data-dcnode-id="6420" instrument_node="">Most European </span><i data-dcnode-id="6418"><span data-dcnode-id="6419" instrument_node="">antifa</span></i><span data-dcnode-id="6417" instrument_node=""> movements use the same emblem and flag, with appropriate modifications. The flags of Breton branch of </span><i data-dcnode-id="6415"><span data-dcnode-id="6416" instrument_node="">Action Antifasciste</span></i><span data-dcnode-id="6414" instrument_node=""> are good example of this. Notice the black flag has been replaced by a Breton flag, placed in front of the red flag. On the first flag, the ring bears the shorter name of the group </span><i data-dcnode-id="6412"><span data-dcnode-id="6413" instrument_node="">Breizh Antifa</span></i><span data-dcnode-id="6411" instrument_node="">. On the second one, the full name is inscribed in both Breton (</span><i data-dcnode-id="6409"><span data-dcnode-id="6410" instrument_node="">Breizh Enepfaskour</span></i><span data-dcnode-id="6408" instrument_node="">) and French (</span><i data-dcnode-id="6406"><span data-dcnode-id="6407" instrument_node="">Bretagne Antifasciste</span></i><span data-dcnode-id="6405" instrument_node="">).</span></font></p><font data-dcnode-id="6401" face="Arial"><a data-dcnode-id="6402" name="aca"></a></font></font></font></td></tr><tr data-dcnode-id="6336"><td align="center" data-dcnode-id="6370" width="20%"><font data-dcnode-id="6371" face="Arial"><br data-dcnode-id="6393"><img alt="Image by Pete Loeser and Tomislav Todorovic" border="1" data-dcnode-id="6392" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/us%257Daca1.gif&amp;raw" width="216"><br data-dcnode-id="6391"><i data-dcnode-id="6372"><span data-dcnode-id="6390" instrument_node="">ACA Flag (type #1)</span><br data-dcnode-id="6389"><br data-dcnode-id="6388"><img alt="Image by Pete Loeser and Tomislav Todorovi" border="1" data-dcnode-id="6387" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/us%257Daca2.gif&amp;raw" width="216"><br data-dcnode-id="6386"><span data-dcnode-id="6385" instrument_node="">ACA Flag (type #2)</span><br data-dcnode-id="6384"><br data-dcnode-id="6383"><img alt="Image by Pete Loeser and Tomislav Todorovi" border="1" data-dcnode-id="6382" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/us%257Daca3.gif&amp;raw" width="216"><br data-dcnode-id="6381"><span data-dcnode-id="6380" instrument_node="">ACA Flag (type #3)</span><br data-dcnode-id="6379"><br data-dcnode-id="6378"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="6377" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/us%257Daca4.gif&amp;raw" width="216"><br data-dcnode-id="6376"><span data-dcnode-id="6375" instrument_node="">ACA Flag (type #4)</span><br data-dcnode-id="6374"><br data-dcnode-id="6373"></i></font></td><td data-dcnode-id="6338" valign="top" width="80%"><b data-dcnode-id="6366"><font data-dcnode-id="6367" face="Arial" size="+1"><span data-dcnode-id="6368" instrument_node="">Anti-Communist Action (USA)</span></font></b><span data-dcnode-id="6365" instrument_node="">
</span><p data-dcnode-id="6362"><font data-dcnode-id="6363" face="Arial"><span data-dcnode-id="6364" instrument_node="">The Anti-Communist Action ("Anticom" for short) is a neo-Nazi group who attempts to represent themselves as not being neo-Nazi, but their philosophy is generally indistinguishable from various other white supremacist and neo-Nazi organizations. </span></font></p><font data-dcnode-id="6339" face="Arial"><span data-dcnode-id="6361" instrument_node="">
</span><p data-dcnode-id="6358"><font data-dcnode-id="6359" face="Arial"><span data-dcnode-id="6360" instrument_node="">The group name is an inversion of Anti-Racist Action (ARA), historically the largest network of anti-racist and anti-fascist dedicated to confronting the far-right and disrupting their events and rallies in the world. However, the main purpose of Anticom seems quite the oposite, as they serve as an "anti-communist" front for the wider internet-based neo-Nazi movement.  They encourage confronting the far-left and disrupting their events and rallies through direct action, including violence. On the Discord servers they seem to associate themselves closely with groups like Vanguard America, the TWP, and Identity Europa.  As part of the broader white nationalist Alt-Right Movement, Anticom members were a visible presence at the nationally televised Charlottesville Riots of 2017.</span></font></p><font data-dcnode-id="6340" face="Arial"><span data-dcnode-id="6357" instrument_node="">
</span><p data-dcnode-id="6354"><font data-dcnode-id="6355" face="Arial"><span data-dcnode-id="6356" instrument_node="">The black and yellow colors used on their flags are those of libertarianism and is reminiscent of various Imperial German era flags.  A variation of this flag (type #2) features a Hughes 500 helicopter dropping a figure from the sky, a reference to brutal tactics of suppressing dissent used by Augusto Pinochet. The falling person that appears in the logo, actually depicts a "death flight" which was a form of killing practised by South American military forces where victims were dropped to their death from airplanes or helicopters.</span></font></p><font data-dcnode-id="6341" face="Arial"><span data-dcnode-id="6353" instrument_node="">
</span><p data-dcnode-id="6350"><font data-dcnode-id="6351" face="Arial"><span data-dcnode-id="6352" instrument_node="">A third variant of the Anti-Communist Action Flag places a new version of their Anticom logo centered on a yellow field. A stylized black and gold stars and stripes is the main design featured on this new logo, circled in black with the words Anti-Communist Action in white block letters.</span></font></p><font data-dcnode-id="6342" face="Arial"><span data-dcnode-id="6349" instrument_node="">
</span><p data-dcnode-id="6343"><font data-dcnode-id="6344" face="Arial"><span data-dcnode-id="6348" instrument_node="">A variant of the Anti-Communist Action Flag (type #4) features in the logo a version of the twin flags with a silhouette of a Sikorsky UH-60 Black Hawk, a more modern helicopter than the Hughes 500 used in the earlier flag (type #2), but still based on the same brutal tactics of execution of rivals. This bed sheet version (logo centered on a plain white flag) of the Anticom flag is similar in general design to that used by such extreme-leftist opposition groups as the </span><a data-dcnode-id="6346" href="#fr-afa"><span data-dcnode-id="6347" instrument_node="">Anti-Fascist Action</span></a><span data-dcnode-id="6345" instrument_node=""> in France and other similar groups in Europe.</span></font></p></font></font></font></font></td></tr><tr data-dcnode-id="6301"><td align="center" data-dcnode-id="6324" width="20%"><font data-dcnode-id="6325" face="Arial"><br data-dcnode-id="6333"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="6332" height="115" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/us-apl.gif&amp;raw" width="216"><br data-dcnode-id="6331"><span data-dcnode-id="6330" instrument_node="">APL Flag</span><br data-dcnode-id="6329"><span data-dcnode-id="6328" instrument_node="">"The Grain and Gear"</span><br data-dcnode-id="6327"><br data-dcnode-id="6326"></font></td><td data-dcnode-id="6303" valign="top" width="80%"><b data-dcnode-id="6320"><font data-dcnode-id="6321" face="Arial" size="+1"><span data-dcnode-id="6322" instrument_node="">American Party of Labor (USA)</span></font></b><span data-dcnode-id="6319" instrument_node="">
</span><p data-dcnode-id="6316"><font data-dcnode-id="6317" face="Arial"><span data-dcnode-id="6318" instrument_node="">The American Party of Labor (APL) is a Communist organization started in the United States in 2007.  The party platform was established at the new Party's First General Congress on December 6, 2008, held in Milwaukee, Wisconsin.  Although the party claims membership across the United States, the largest party activity seems to be in the Atlanta and Milwaukee areas. The current APL General Secretary is Alexander I. Serpov.</span></font></p><font data-dcnode-id="6304" face="Arial"><span data-dcnode-id="6315" instrument_node="">
</span><p data-dcnode-id="6312"><font data-dcnode-id="6313" face="Arial"><span data-dcnode-id="6314" instrument_node="">Although the APL has not been linked with any violent activities, the party draws its inspiration from the teachings of Marx, Engels, Lenin, Stalin and Hoxha and calls for a workers' revolution to end national control of the rich "ruling class."  APL activities include a webpage, a newspaper called "The Red Phoenix," and the Red Star Library where they maintain a collection of Marxist-Leninist texts assembled or published by the APL to promote their version of Marxist-Leninist history and theory. The APL version of "Marxism-Leninism" seems to be closer to that of "Stalinism" and the "Hoxhaism" of Enver Hoxha of Albania.</span></font></p><font data-dcnode-id="6305" face="Arial"><span data-dcnode-id="6311" instrument_node="">
</span><p data-dcnode-id="6308"><font data-dcnode-id="6309" face="Arial"><span data-dcnode-id="6310" instrument_node="">The APL party calls its red flag "The Grain and Gear" because an ear of grain and a incomplete gear wheel are combined with the star of Communism into their emblem.</span></font></p><font data-dcnode-id="6306" face="Arial"><span data-dcnode-id="6307" instrument_node="">
</span></font></font></font></td></tr><tr data-dcnode-id="6267"><td align="center" data-dcnode-id="6291" width="20%"><font data-dcnode-id="6292" face="Arial"><br data-dcnode-id="6298"><img alt="Image from Metapedia" border="1" data-dcnode-id="6297" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/arne_ecuator.gif&amp;raw" width="216"><br data-dcnode-id="6296"><span data-dcnode-id="6295" instrument_node="">ARNE Flag</span><br data-dcnode-id="6294"><br data-dcnode-id="6293"></font></td><td data-dcnode-id="6269" valign="top" width="80%"><b data-dcnode-id="6282"><font data-dcnode-id="6283" face="Arial" size="+1"><span data-dcnode-id="6289" instrument_node="">Ecuadorian Nationalist Revolutionary Action (Ecuador) </span><br data-dcnode-id="6288"><small data-dcnode-id="6285"><em data-dcnode-id="6286"><span data-dcnode-id="6287" instrument_node="">Acción Revolucionaria Nacionalista Ecuatoriana</span></em></small><span data-dcnode-id="6284" instrument_node=""> </span></font></b><span data-dcnode-id="6281" instrument_node="">
</span><p data-dcnode-id="6275"><font data-dcnode-id="6276" face="Arial"><span data-dcnode-id="6280" instrument_node="">The </span><i data-dcnode-id="6278"><span data-dcnode-id="6279" instrument_node="">Acción Revolucionaria Nacionalista Ecuatoriana</span></i><span data-dcnode-id="6277" instrument_node=""> (ARNE) was a political movement founded in 1942; it was organized and militant, strongly doctrinaire; very unlike other movements and Ecuadorian political parties of the period who lacked a proper structure. </span></font></p><font data-dcnode-id="6270" face="Arial"><span data-dcnode-id="6274" instrument_node="">
</span><p data-dcnode-id="6271"><font data-dcnode-id="6272" face="Arial"><span data-dcnode-id="6273" instrument_node="">In 1942, a group of students founded the "Companies Functional National Revolutionary Offensive" (CONDOR).  This organization soon became the ARNE political movement, which supported revolutionary nationalism - Falange, fascism, etc. It was led by George Moon Yépes and under his leadership developed very rapidly among young Catholics and the industrial sectors. ARNE is regarded as one of the three major political forces of Ecuador in the second half of the 20th century. However in 1979, with the fall of the dictators, ARNE was denied legal recognition, and although somewhat active during the early 80s it never again was a political force of any importance.</span></font></p></font></td></tr><tr data-dcnode-id="6235"><td align="center" data-dcnode-id="6257" width="20%"><font data-dcnode-id="6258" face="Arial"><br data-dcnode-id="6264"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="6263" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/ansp.gif&amp;raw" width="216"><br data-dcnode-id="6262"><span data-dcnode-id="6261" instrument_node="">ANSP Flag</span><br data-dcnode-id="6260"><br data-dcnode-id="6259"></font></td><td data-dcnode-id="6237" valign="top" width="80%"><b data-dcnode-id="6253"><font data-dcnode-id="6254" face="Arial" size="+1"><span data-dcnode-id="6255" instrument_node="">American National Socialist Party  (USA)</span></font></b><span data-dcnode-id="6252" instrument_node="">
</span><p data-dcnode-id="6246"><font data-dcnode-id="6247" face="Arial"><span data-dcnode-id="6251" instrument_node="">In this country, the neo-Nazis keep splitting up and forming new factions.  The American National Socialist Party (ANSP) is one such splinter group. Their motto is "Raising up from the ashes, rebuilding the white race, one person at a time." They maintain several similar websites including "the one and only true Aryan Nations," and another for a youth group called "</span><a data-dcnode-id="6249" href="#an"><span data-dcnode-id="6250" instrument_node="">The Werewolf Youth Legion</span></a><span data-dcnode-id="6248" instrument_node="">." They are headquartered in Chillicothe, Ohio. </span></font></p><font data-dcnode-id="6238" face="Arial"><span data-dcnode-id="6245" instrument_node="">
</span><p data-dcnode-id="6242"><font data-dcnode-id="6243" face="Arial"><span data-dcnode-id="6244" instrument_node="">The ANSP flag is slightly reminiscent of the flag of the short-lived West German Socialist Reich Party of Germany of the early 1950s.  It has a red field with a fearsome-looking black eagle centered on it.  The eagle is defaced with a crossed sword and lightning bolt providing a frame for  the red letters ANSP.</span></font></p><font data-dcnode-id="6239" face="Arial"><span data-dcnode-id="6241" instrument_node="">
</span></font></font></td></tr><tr data-dcnode-id="6182"><td align="center" data-dcnode-id="6218" width="20%"><font data-dcnode-id="6219" face="Arial"><br data-dcnode-id="6232"><img align="MIDDLE" alt="Image by Marcus Schmöger" border="1" data-dcnode-id="6231" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/ans_na_2.jpg&amp;raw" width="216"><br data-dcnode-id="6230"><span data-dcnode-id="6229" instrument_node="">ANS-NA Flag</span><br data-dcnode-id="6228"><br data-dcnode-id="6227"><img align="MIDDLE" alt="Image by Marcus Schmöger" border="1" data-dcnode-id="6226" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/ans_na_1.jpg&amp;raw" width="216"><br data-dcnode-id="6225"><span data-dcnode-id="6224" instrument_node="">ANS-NA Flag</span><br data-dcnode-id="6223"><span data-dcnode-id="6222" instrument_node="">Variant</span><br data-dcnode-id="6221"><br data-dcnode-id="6220"></font></td><td data-dcnode-id="6184" valign="top" width="80%"><b data-dcnode-id="6210"><font data-dcnode-id="6211" face="Arial" size="+1"><span data-dcnode-id="6216" instrument_node="">Action Front Nationalist/National Activists (Germany)</span><br data-dcnode-id="6215"><small data-dcnode-id="6212"><em data-dcnode-id="6213"><span data-dcnode-id="6214" instrument_node="">Aktionsfront Nationaler Sozialisten/Nationale Aktivisten</span></em></small></font></b><span data-dcnode-id="6209" instrument_node="">
</span><p data-dcnode-id="6203"><font data-dcnode-id="6204" face="Arial"><span data-dcnode-id="6208" instrument_node="">The </span><i data-dcnode-id="6206"><span data-dcnode-id="6207" instrument_node="">Aktionsfront Nationaler Sozialisten/Nationale Aktivisten</span></i><span data-dcnode-id="6205" instrument_node=""> (ANS-NA) was a very active and violent German neo-Nazi organization.
	 </span></font></p><p data-dcnode-id="6199"><font data-dcnode-id="6200" face="Arial"><font data-dcnode-id="6201" face="Arial"><span data-dcnode-id="6202" instrument_node="">They were originally founded in 1977 by Michael Kühnen under the name of the "Action Front of National Socialists" (ANS). By 1979, their violent policies resulted in most of their leaders being arrested and jailed.</span></font></font></p><font data-dcnode-id="6185" face="Arial"><font data-dcnode-id="6186" face="Arial"><span data-dcnode-id="6198" instrument_node="">
</span><p data-dcnode-id="6192"><font data-dcnode-id="6193" face="Arial"><span data-dcnode-id="6197" instrument_node="">In 1983, they merged with the </span><i data-dcnode-id="6195"><span data-dcnode-id="6196" instrument_node="">Nationale Aktivisten</span></i><span data-dcnode-id="6194" instrument_node=""> (National Activists), an organization led by Thomas Brehl, and combined the names to form the Action Front of National Socialists/National Activists, or ANS/NA. The ANS/NA was in turn banned in 1983. At the time it had about 240 members.</span></font></p><font data-dcnode-id="6187" face="Arial"><span data-dcnode-id="6191" instrument_node="">
</span><p data-dcnode-id="6188"><font data-dcnode-id="6189" face="Arial"><span data-dcnode-id="6190" instrument_node=""> The group used two different flags.  One had a black-white-red horizontal triband with a rune-like "S" in the center; the other was a variant of the National Socialist flag called the "reverse swastika."  It is the red flag with the white disk, in which a hidden white swastika appears in parts with black accents in the background, shown to the left.  Squint your eyes and you'll begin to make out the hidden white swastika.</span></font></p></font></font></font></td></tr><tr data-dcnode-id="6104"><td align="center" data-dcnode-id="6151" width="20%"><font data-dcnode-id="6152" face="Arial"><br data-dcnode-id="6179"><img alt="Image by Vinson Nash" border="1" data-dcnode-id="6178" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/de_gab.gif&amp;raw" width="216"><br data-dcnode-id="6177"><span data-dcnode-id="6176" instrument_node="">AV (New Jersey Bund) Flag </span><br data-dcnode-id="6175"><br data-dcnode-id="6174"><img alt="Image from Pete Loeser" border="1" data-dcnode-id="6173" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/german_american_bund.gif&amp;raw" width="216"><br data-dcnode-id="6172"><span data-dcnode-id="6171" instrument_node="">AV (New York City Bund) Flag</span><br data-dcnode-id="6170"><br data-dcnode-id="6169"><img alt="Image by Tomislav Todorovic" border="0" data-dcnode-id="6168" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/de_gab_jd2.gif&amp;raw" width="216"><br data-dcnode-id="6167"><span data-dcnode-id="6166" instrument_node="">AV Youth Unit Flag</span><br data-dcnode-id="6165"><font data-dcnode-id="6163" size="-1"><span data-dcnode-id="6164" instrument_node="">(assumed to be a unit flag)</span></font><br data-dcnode-id="6162"><br data-dcnode-id="6161"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="6160" height="110" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/de_gab_jd1.gif&amp;raw" width="216"><br data-dcnode-id="6159"><span data-dcnode-id="6158" instrument_node="">AV Youth House Banner</span><br data-dcnode-id="6157"><font data-dcnode-id="6155" size="-1"><span data-dcnode-id="6156" instrument_node="">(assumed to be the general Flag)</span></font><br data-dcnode-id="6154"><br data-dcnode-id="6153"></font></td><td data-dcnode-id="6106" valign="top" width="80%"><b data-dcnode-id="6143"><font data-dcnode-id="6144" face="Arial" size="+1"><span data-dcnode-id="6149" instrument_node="">German American Bund 1936-1941 (USA) </span><br data-dcnode-id="6148"><small data-dcnode-id="6145"><em data-dcnode-id="6146"><span data-dcnode-id="6147" instrument_node="">Amerikadeutscher Volksbund (AV)</span></em></small></font></b><span data-dcnode-id="6142" instrument_node="">
</span><p data-dcnode-id="6136"><font data-dcnode-id="6137" face="Arial"><span data-dcnode-id="6141" instrument_node="">The German American Bund (AV), or "German American Federation," was a pre-World War II American Nazi organization active in New York between 1936-1939, whose roots can be found in the earlier Teutonia Club (1924-1933) and in the FDND ("Friends of New Germany" - </span><i data-dcnode-id="6139"><span data-dcnode-id="6140" instrument_node="">Freunde Des Neue Deutschland</span></i><span data-dcnode-id="6138" instrument_node="">) movement between 1933-1936.  An internal power struggle fought for control over the Friends in 1934 resulted in Heinz Spanknöbel, Alter Kämpfer, and Fritz Julius Kuhn starting the new German American Bund in Buffalo, New York.</span></font></p><font data-dcnode-id="6107" face="Arial"><span data-dcnode-id="6135" instrument_node="">
</span><p data-dcnode-id="6129"><font data-dcnode-id="6130" face="Arial"><span data-dcnode-id="6134" instrument_node="">The Bund established training camps in New Jersey, New York, and Wisconsin. Fritz Julius Kuhn was named Bund Leader (</span><i data-dcnode-id="6132"><span data-dcnode-id="6133" instrument_node="">Bundesfûhrer</span></i><span data-dcnode-id="6131" instrument_node="">), and under his leadership the Bund held rallies complete with Nazi insignia, emblems and rituals.  They vocally attacked and held demonstrations against Jews, Communist, trade unions and the Roosevelt administration. In the process they claimed their main goal was to promote a favorable view of Nazi Germany. However, the Bund received no financial or verbal support from Germany, and in 1938, the Nazi government actually declared that no Nazi emblems could be used by the organization.  This was done to distance Germany from the Bund which had become an embarrassment to the then current German government policies with some of its rhetoric and actions.  Naturally, the AV's public activities pretty well ended with the declaration of war against Nazi Germany in December of 1941.</span></font></p><font data-dcnode-id="6108" face="Arial"><span data-dcnode-id="6128" instrument_node="">
</span><p data-dcnode-id="6125"><font data-dcnode-id="6126" face="Arial"><span data-dcnode-id="6127" instrument_node="">The first two Bund flags shown here were seen at German-American Bund activities in New Jersey and in New York City.  The second flag seems to have been modeled after German military flags. Naturally, there were also large displays of both the Stars and Stripes and the NSDAP Swastika flag displayed at AV events.</span></font></p><font data-dcnode-id="6109" face="Arial"><span data-dcnode-id="6124" instrument_node="">
</span><p data-dcnode-id="6112"><font data-dcnode-id="6113" face="Arial"><span data-dcnode-id="6123" instrument_node="">The activities of the German-American Bund included several Bund Youth Groups, or DJ (</span><i data-dcnode-id="6121"><span data-dcnode-id="6122" instrument_node="">Jugendschaft</span></i><span data-dcnode-id="6120" instrument_node="">), who had (assumed) unit flags on black fields mirroring the German Youth Troop flags (</span><i data-dcnode-id="6118"><span data-dcnode-id="6119" instrument_node="">Fahnleinfahne</span></i><span data-dcnode-id="6117" instrument_node="">). These unit flags were of simple design and consisted of a single runic "S" thunderbolt on a black background.  (The assumption they were unit colors is based on the fact that this flag many times had unit numbers inscribed in red in the canton) The second type of Bund Youth Group flag consisted of a white runic "S" thunderbolt centered on the black field, surrounded by a white circle which was centered on a white cross.  This elongated banner seemed to have served the purpose of a general </span><i data-dcnode-id="6115"><span data-dcnode-id="6116" instrument_node="">Bund Jugendschaft</span></i><span data-dcnode-id="6114" instrument_node="">, or house flag, since no unit designations were present.</span></font></p><font data-dcnode-id="6110" face="Arial"><a data-dcnode-id="6111" name="awb"></a></font></font></font></font></td></tr><tr data-dcnode-id="6010"><td align="center" data-dcnode-id="6069" width="20%"><font data-dcnode-id="6070" face="Arial"><br data-dcnode-id="6101"><img alt="Image by  Tomislav Todorovic" border="1" data-dcnode-id="6100" height="129" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/za-awb.gif&amp;raw" width="216"><br data-dcnode-id="6099"><span data-dcnode-id="6098" instrument_node="">AWB Flag - Type #1</span><br data-dcnode-id="6097"><br data-dcnode-id="6096"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="6095" height="129" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/za-awb2.gif&amp;raw" width="216"><br data-dcnode-id="6094"><span data-dcnode-id="6093" instrument_node="">AWB Flag - Type #2</span><br data-dcnode-id="6092"><br data-dcnode-id="6091"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="6090" height="129" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/za-awb3.gif&amp;raw" width="216"><br data-dcnode-id="6089"><span data-dcnode-id="6088" instrument_node="">AWB Flag - Type #3 - Front</span><br data-dcnode-id="6087"><br data-dcnode-id="6086"><img alt="mage by Tomislav Todorovic" border="1" data-dcnode-id="6085" height="129" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/za-awb3r.gif&amp;raw" width="216"><br data-dcnode-id="6084"><span data-dcnode-id="6083" instrument_node="">AWB Flag - Type #3 - Back</span><br data-dcnode-id="6082"><br data-dcnode-id="6081"><img align="MIDDLE" alt="Image provided by Rick Prohaska" border="1" data-dcnode-id="6080" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/afrikaner_resistance_supporters.jpg&amp;raw" width="216"><br data-dcnode-id="6079"><span data-dcnode-id="6078" instrument_node="">Modern Afrikaner Resistance</span><br data-dcnode-id="6077"><font data-dcnode-id="6073" size="-1"><span data-dcnode-id="6076" instrument_node="">Aryan Guard - Blood and Iron</span><br data-dcnode-id="6075"><span data-dcnode-id="6074" instrument_node="">(Calgary, Canada)</span></font><br data-dcnode-id="6072"><br data-dcnode-id="6071"></font></td><td data-dcnode-id="6012" valign="top" width="80%"><b data-dcnode-id="6061"><font data-dcnode-id="6062" face="Arial" size="+1"><span data-dcnode-id="6067" instrument_node="">Afrikaner Resistance Movement (South Africa)</span><br data-dcnode-id="6066"><small data-dcnode-id="6063"><em data-dcnode-id="6064"><span data-dcnode-id="6065" instrument_node="">Afrikaner Weerstandsbeweging</span></em></small></font></b><span data-dcnode-id="6060" instrument_node="">
</span><p data-dcnode-id="6051"><font data-dcnode-id="6052" face="Arial"><span data-dcnode-id="6059" instrument_node="">Essentially a variation on the swastika, and popular for that reason, the </span><i data-dcnode-id="6057"><span data-dcnode-id="6058" instrument_node="">triskele</span></i><span data-dcnode-id="6056" instrument_node=""> was a symbol occasionally used by the Nazi regime, most notably as the insignia for a Waffen SS division composed of Belgian volunteers. After World War II, the "Three Sevens" version of the </span><i data-dcnode-id="6054"><span data-dcnode-id="6055" instrument_node="">triskele</span></i><span data-dcnode-id="6053" instrument_node=""> was popularized by white supremacists in Europe and South Africa.  The symbol is also used as part of the logo of the international racist skinhead group, "Blood &amp; Honour."</span></font></p><font data-dcnode-id="6013" face="Arial"><span data-dcnode-id="6050" instrument_node="">
</span><p data-dcnode-id="6041"><font data-dcnode-id="6042" face="Arial"><span data-dcnode-id="6049" instrument_node="">The </span><i data-dcnode-id="6047"><span data-dcnode-id="6048" instrument_node="">Afrikaner Weerstandsbeweging</span></i><span data-dcnode-id="6046" instrument_node=""> (Afrikaner Resistance Movement) or AWB, is a far right political organization and former paramilitary group in South Africa under the leadership of EugÃƒÂ¨ne Terre'Blanche. The AWB claims that the three sevens symbolized supremacy over the devil. They are committed to the restoration of an independent Boere-Afrikaner republic or "</span><i data-dcnode-id="6044"><span data-dcnode-id="6045" instrument_node="">Boerestaat</span></i><span data-dcnode-id="6043" instrument_node="">" within South Africa. In their heyday they received much publicity both in South Africa and abroad as an extremist white supremacist group.</span></font></p><font data-dcnode-id="6014" face="Arial"><span data-dcnode-id="6040" instrument_node="">
</span><p data-dcnode-id="6037"><font data-dcnode-id="6038" face="Arial"><span data-dcnode-id="6039" instrument_node="">The AWB Flag (Type #2) was introduced in 1979, but was withdrawn from official use after a short time in favor of already well-established flag with three 7's. The star was said to have represented the Star of Bethlehem, and the Christianity in general. The flag with three 7's (Type #1) was the original flag of the movement; although it was replaced with the flag charged with the stars and letters AW in 1979, it was reintroduced in same year and used ever since. The flag was designed by Jan Groenewald, one of the founders of the movement, and slightly modified by Dries Albert, who was in charge
 of the movement's propaganda.</span></font></p><font data-dcnode-id="6015" face="Arial"><span data-dcnode-id="6036" instrument_node="">
</span><p data-dcnode-id="6033"><font data-dcnode-id="6034" face="Arial"><span data-dcnode-id="6035" instrument_node="">According to Groenewald himself, the inspiration for the design did come from the Nazi flag, however, the three digits were always described as a Christian symbol, the number 777 having been described as the biblical symbol of perfection and of God himself, as opposed to the number 666 which symbolizes the Antichrist. 
 	</span></font></p><p data-dcnode-id="6029"><font data-dcnode-id="6030" face="Arial"><font data-dcnode-id="6031" face="Arial"><span data-dcnode-id="6032" instrument_node="">According to Groenewald, the color red on the flag stood for blood, white stood for the purity of the White race, and black stood for bravery.</span></font></font></p><font data-dcnode-id="6016" face="Arial"><font data-dcnode-id="6017" face="Arial"><span data-dcnode-id="6028" instrument_node="">
</span><p data-dcnode-id="6025"><font data-dcnode-id="6026" face="Arial"><span data-dcnode-id="6027" instrument_node="">The previous national flag of the South Africa was not much used by the AWB, having been generally considered the symbol of subjugation of Boer independence by the British Empire, so the flags of Boer republics were usually used instead. A flag derived from the national flag was used sometimes, on which the Union Jack was replaced with the AWB flag. The reverse of this flag was not identical to the front because three 7's were not mirrored, although the position of the whole AWB flag was (flags of the Boer republics were mirrored completely).</span></font></p><font data-dcnode-id="6018" face="Arial"><span data-dcnode-id="6024" instrument_node="">
</span><p data-dcnode-id="6021"><font data-dcnode-id="6022" face="Arial"><span data-dcnode-id="6023" instrument_node="">Modern White Supremacist supporters still occasionally fly a flag with a Nazi-like death head skull centered over the "Three Sevens" symbol.  Its most recent appearance is in Canada, where it is being used the neo-Nazi group "Blood and Iron," a successor group to the Aryan Guard, under the leadership of Kyle McKee, who has been called the "micro-furhrer of Calgary" by the police.</span></font></p><font data-dcnode-id="6019" face="Arial"><a data-dcnode-id="6020" name="asf"></a></font></font></font></font></font></font></font></td></tr><tr data-dcnode-id="5936"><td align="center" data-dcnode-id="5997" width="20%"><font data-dcnode-id="5998" face="Arial"><br data-dcnode-id="6007"><img align="MIDDLE" alt="Image by AntÃƒÂ³nio Martins" border="1" data-dcnode-id="6006" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/afrikaner_student_federation.jpg&amp;raw" width="216"><br data-dcnode-id="6005"><span data-dcnode-id="6004" instrument_node="">ASF Flag</span><br data-dcnode-id="6003"><br data-dcnode-id="6002"><img align="MIDDLE" alt="Image by Clive Nel" border="1" data-dcnode-id="6001" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/afrikaner_student_federation_variant.jpg&amp;raw" width="216"><br data-dcnode-id="6000"><span data-dcnode-id="5999" instrument_node="">ASF Flag (variant)</span></font></td><td data-dcnode-id="5938" valign="top" width="80%"><b data-dcnode-id="5989"><font data-dcnode-id="5990" face="Arial" size="+1"><span data-dcnode-id="5995" instrument_node="">Afrikaner Student Federation (South Africa)</span><br data-dcnode-id="5994"><small data-dcnode-id="5991"><em data-dcnode-id="5992"><span data-dcnode-id="5993" instrument_node="">Afrikaner Studentebond</span></em></small></font></b><span data-dcnode-id="5988" instrument_node="">
</span><p data-dcnode-id="5979"><font data-dcnode-id="5980" face="Arial"><span data-dcnode-id="5987" instrument_node="">The </span><i data-dcnode-id="5985"><span data-dcnode-id="5986" instrument_node="">odal</span></i><span data-dcnode-id="5984" instrument_node=""> rune is used by the South African African Student Federation. It is the last letter of </span><i data-dcnode-id="5982"><span data-dcnode-id="5983" instrument_node="">futhark</span></i><span data-dcnode-id="5981" instrument_node="">, the "modern" 16 letter viking rune set. </span></font></p><font data-dcnode-id="5939" face="Arial"><span data-dcnode-id="5978" instrument_node="">
</span><p data-dcnode-id="5972"><font data-dcnode-id="5973" face="Arial"><span data-dcnode-id="5977" instrument_node="">It was originally used by ethnic Germans (</span><i data-dcnode-id="5975"><span data-dcnode-id="5976" instrument_node="">Volksdeutsche</span></i><span data-dcnode-id="5974" instrument_node="">) from the Yugoslavia SS-regiment (The 7. SS Freiwillingen-Gebirgs - Division Prinz Eugen) operating during World War II in the Nazi Germany sponsored State of Croatia.</span></font></p><font data-dcnode-id="5940" face="Arial"><span data-dcnode-id="5971" instrument_node="">
</span><p data-dcnode-id="5962"><font data-dcnode-id="5963" face="Arial"><span data-dcnode-id="5970" instrument_node="">Today the </span><i data-dcnode-id="5968"><span data-dcnode-id="5969" instrument_node="">odal</span></i><span data-dcnode-id="5967" instrument_node=""> rune is widely used by right-wing nationalist youth groups like the </span><i data-dcnode-id="5965"><span data-dcnode-id="5966" instrument_node="">Wiking Jugend</span></i><span data-dcnode-id="5964" instrument_node=""> in Germany and other counties. It was banned in Germany in 1994.</span></font></p><font data-dcnode-id="5941" face="Arial"><span data-dcnode-id="5961" instrument_node="">
</span><p data-dcnode-id="5952"><font data-dcnode-id="5953" face="Arial"><span data-dcnode-id="5960" instrument_node="">The flag used by the </span><i data-dcnode-id="5958"><span data-dcnode-id="5959" instrument_node="">Wiking Jugend</span></i><span data-dcnode-id="5957" instrument_node=""> was black with a red </span><i data-dcnode-id="5955"><span data-dcnode-id="5956" instrument_node="">odal</span></i><span data-dcnode-id="5954" instrument_node=""> rune in its center.</span></font></p><font data-dcnode-id="5942" face="Arial"><span data-dcnode-id="5951" instrument_node="">
</span><p data-dcnode-id="5945"><font data-dcnode-id="5946" face="Arial"><span data-dcnode-id="5950" instrument_node="">The </span><i data-dcnode-id="5948"><span data-dcnode-id="5949" instrument_node="">odal</span></i><span data-dcnode-id="5947" instrument_node=""> Rune is sometimes referred to as "Odin's Rune." It is a symbol of a Pagan Religion called Odinism.  Neither the religion nor the symbol is racist, but both have been co-opted by certain sectors of the Far Right.</span></font></p><font data-dcnode-id="5943" face="Arial"><span data-dcnode-id="5944" instrument_node="">
</span></font></font></font></font></font></td></tr><tr data-dcnode-id="5874"><td align="center" data-dcnode-id="5921" width="20%"><font data-dcnode-id="5922" face="Arial"><br data-dcnode-id="5933"><img align="MIDDLE" alt="Image by A.H." border="1" data-dcnode-id="5932" height="123" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/all-germanic_heathens_front.jpg&amp;raw" width="216"><br data-dcnode-id="5931"><span data-dcnode-id="5930" instrument_node="">AHF Flag</span><br data-dcnode-id="5929"><br data-dcnode-id="5928"><img align="MIDDLE" alt="Image by A.H." border="1" data-dcnode-id="5927" height="119" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/german_heathens_front.jpg&amp;raw" width="216"><br data-dcnode-id="5926"><span data-dcnode-id="5925" instrument_node="">DHF Flag</span><br data-dcnode-id="5924"><br data-dcnode-id="5923"></font></td><td data-dcnode-id="5876" valign="top" width="80%"><b data-dcnode-id="5913"><font data-dcnode-id="5914" face="Arial" size="+1"><span data-dcnode-id="5919" instrument_node="">All-Germanic Heathens Front &amp; German Heathens Front (Germany)</span><br data-dcnode-id="5918"><small data-dcnode-id="5915"><em data-dcnode-id="5916"><span data-dcnode-id="5917" instrument_node="">Allgermanische Heidnische (AHF) &amp; Deutsche Heidnische Front (DHF)</span></em></small></font></b><small data-dcnode-id="5877"><span data-dcnode-id="5912" instrument_node="">
</span><p data-dcnode-id="5894"><font data-dcnode-id="5895" face="Arial"><span data-dcnode-id="5911" instrument_node="">The </span><i data-dcnode-id="5909"><span data-dcnode-id="5910" instrument_node="">Allgermanische Heidnische Front</span></i><span data-dcnode-id="5908" instrument_node=""> (AHF) was a far right militant Neopagan international organization espousing a philosophy influenced by Ásatrú (Odinism). Notice the strong resemblance of their flag to the flag of the </span><i data-dcnode-id="5906"><span data-dcnode-id="5907" instrument_node="">Hitler Jugend</span></i><span data-dcnode-id="5905" instrument_node="">, with the </span><i data-dcnode-id="5903"><span data-dcnode-id="5904" instrument_node="">alghiz</span></i><span data-dcnode-id="5902" instrument_node=""> rune replacing the swastika. The AHF was founded and initially led by Norwegian black metal musician and heathen Varg Vikernes, who founded the </span><i data-dcnode-id="5900"><span data-dcnode-id="5901" instrument_node="">Norsk Hedensk Front</span></i><span data-dcnode-id="5899" instrument_node=""> (Norwegian Heathen Front), which soon evolved into the AHF.  (Varg Vikernes later ceased to be involved with the organization) The group seek to restore ancient Germanic religion of Odinism and was strongly anti-Semitic. In 2001, the AHF claimed chapters in Norway, Sweden, Denmark, the Netherlands, Germany, the USA, Canada, Russia, and Flanders, but since 2006, the </span><i data-dcnode-id="5897"><span data-dcnode-id="5898" instrument_node="">Allgermanische Heidnische Front</span></i><span data-dcnode-id="5896" instrument_node=""> is apparently defunct.</span></font></p><font data-dcnode-id="5878" face="Arial"><span data-dcnode-id="5893" instrument_node="">
</span><p data-dcnode-id="5881"><font data-dcnode-id="5882" face="Arial"><span data-dcnode-id="5892" instrument_node="">The German chapter, </span><i data-dcnode-id="5890"><span data-dcnode-id="5891" instrument_node="">Deutsche Heidnische Front</span></i><span data-dcnode-id="5889" instrument_node=""> (DHF), was founded in 1998 by avowed neo-Nazi Hendrik Möbus. The group publishes a magazine </span><i data-dcnode-id="5887"><span data-dcnode-id="5888" instrument_node="">Tuisto</span></i><span data-dcnode-id="5886" instrument_node="">, which deals with pagan, cultural and historical themes.  Their flag's central image is the Eye of Wotan (Odin), and like the AHF flag, also uses the </span><i data-dcnode-id="5884"><span data-dcnode-id="5885" instrument_node="">algiz</span></i><span data-dcnode-id="5883" instrument_node=""> rune, in this case both upright and reversed.</span></font></p><font data-dcnode-id="5879" face="Arial"><a data-dcnode-id="5880" name="afm"></a></font></font></small></td></tr><tr data-dcnode-id="5820"><td align="center" data-dcnode-id="5853" width="20%"><font data-dcnode-id="5854" face="Arial"><br data-dcnode-id="5871"><img alt="" border="1" data-dcnode-id="5870" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/american_fascist_movement.gif&amp;raw" width="216"><br data-dcnode-id="5869"><span data-dcnode-id="5868" instrument_node="">AFM Flag</span><br data-dcnode-id="5867"><br data-dcnode-id="5866"><img alt="" border="1" data-dcnode-id="5865" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/american_fascist_movement_2.gif&amp;raw" width="216"><br data-dcnode-id="5864"><span data-dcnode-id="5863" instrument_node="">AFM Flag</span><br data-dcnode-id="5862"><br data-dcnode-id="5861"><img alt="" border="1" data-dcnode-id="5860" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/wwii/italy_isr.gif&amp;raw" width="216"><br data-dcnode-id="5859"><span data-dcnode-id="5858" instrument_node="">Italian Social Republic Flag</span><br data-dcnode-id="5857"><span data-dcnode-id="5856" instrument_node="">1944-45</span><p data-dcnode-id="5855"></p></font></td><td data-dcnode-id="5822" valign="top" width="80%"><b data-dcnode-id="5849"><font data-dcnode-id="5850" face="Arial" size="+1"><span data-dcnode-id="5851" instrument_node="">American Fascist Movement Flags (USA)</span></font></b><span data-dcnode-id="5848" instrument_node="">
</span><p data-dcnode-id="5845"><font data-dcnode-id="5846" face="Arial"><span data-dcnode-id="5847" instrument_node="">Lawrence Dennis, an American diplomat and author, advocated fascism and talked of founding the "American Fascist Party" in the years following the Great Depression, but the group never materialized. Dennis and others were later tried for sedition under the Smith Act in what became known as "The Great Sedition Trial of 1944." The case ended in a mistrial when the judge died of a heart-attack.</span></font></p><font data-dcnode-id="5823" face="Arial"><span data-dcnode-id="5844" instrument_node="">
</span><p data-dcnode-id="5841"><font data-dcnode-id="5842" face="Arial"><span data-dcnode-id="5843" instrument_node="">The presence or absence of elements of fascism in the United States since World War II has been a matter of continuing dispute. Groups identified as neo-fascist in the United States generally include neo-Nazi organizations such as the National Alliance and the American Nazi Party.</span></font></p><font data-dcnode-id="5824" face="Arial"><span data-dcnode-id="5840" instrument_node="">
</span><p data-dcnode-id="5837"><font data-dcnode-id="5838" face="Arial"><span data-dcnode-id="5839" instrument_node="">Some say the Fascist Movement is a secret group of Americans who want a strong military government to take control of the United States and put down the protesters, greeners, and ultra-liberals.  Others say an American Fascist party doesn't actually exist and its name is used just as a marketing ploy to sell Fascist memorabilia.</span></font></p><font data-dcnode-id="5825" face="Arial"><span data-dcnode-id="5836" instrument_node="">
</span><p data-dcnode-id="5833"><font data-dcnode-id="5834" face="Arial"><span data-dcnode-id="5835" instrument_node="">On their website, the current American Fascist Movement claims to be against racism and Nazism, materialism, globalism, capitalism and communism, and superficiality. They claim they are for  meritocracy, timocracy, sacrifice, nationalism, cooperation (State Corporatism), and virtue.
		</span></font></p><p data-dcnode-id="5826"><font data-dcnode-id="5827" face="Arial"><font data-dcnode-id="5828" face="Arial"><span data-dcnode-id="5832" instrument_node="">A large section of their website is dedicated to merchandising.  It is also interesting to note, that at the American Fascist Movement's website store, three flags are offered for sale, including a modern replica of the "Italian Social Republic Flag (1944-45)," a modern variant of the "Italian National Fascist Party Flag (1922-1943)," and what appears to be an Italian national flag with the </span><i data-dcnode-id="5830"><span data-dcnode-id="5831" instrument_node="">fasces</span></i><span data-dcnode-id="5829" instrument_node=""> superimposed in black on the white vertical stripe.</span></font></font></p></font></font></font></td></tr><tr data-dcnode-id="5782"><td align="center" data-dcnode-id="5810" width="20%"><font data-dcnode-id="5811" face="Arial"><br data-dcnode-id="5817"><img align="MIDDLE" alt="Image by Antonio Martins" border="1" data-dcnode-id="5816" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/brazilian_integralist_action.jpg&amp;raw" width="216"><br data-dcnode-id="5815"><span data-dcnode-id="5814" instrument_node="">AIB Flag</span><br data-dcnode-id="5813"><br data-dcnode-id="5812"></font></td><td data-dcnode-id="5784" valign="top" width="80%"><b data-dcnode-id="5802"><font data-dcnode-id="5803" face="Arial" size="+1"><span data-dcnode-id="5808" instrument_node="">Brazilian Integralist Action (Brazil)</span><br data-dcnode-id="5807"><font data-dcnode-id="5804" size="-1"><em data-dcnode-id="5805"><span data-dcnode-id="5806" instrument_node="">Ação Integralista Brasileira (AIB)</span></em></font></font></b><span data-dcnode-id="5801" instrument_node="">
</span><p data-dcnode-id="5795"><font data-dcnode-id="5796" face="Arial"><span data-dcnode-id="5800" instrument_node="">The </span><i data-dcnode-id="5798"><span data-dcnode-id="5799" instrument_node="">Ação Integralista Brasileira</span></i><span data-dcnode-id="5797" instrument_node=""> (AIB), also called the "Green Shirts" after their uniform shirt color, was a fascist movement founded in 1932 by Plínio Salgado after the 1930 revolution that brought Getúlio Vargas to power. Vargas banned all parties in 1937 and foiled an Integralist plot to seize power by force during the 1938 elections by declaring a state of siege. The AIB was revived in the guise of the PRP, one of the legal parties permitted after World War II, which were in turn abolished when the armed forces seized power from the elected civilian government in 1964.</span></font></p><font data-dcnode-id="5785" face="Arial"><span data-dcnode-id="5794" instrument_node="">
</span><p data-dcnode-id="5788"><font data-dcnode-id="5789" face="Arial"><span data-dcnode-id="5793" instrument_node="">Plínio Salgado was an admirer of Mussolini and Hitler. He tried to adapt some of the Nazi-Fascist elements into Integralism. The Green Shirts had a salute similar to the Nazi salute, but instead of the straight hand, they pointed the palm of the hand to the front and said "</span><i data-dcnode-id="5791"><span data-dcnode-id="5792" instrument_node="">Anaue</span></i><span data-dcnode-id="5790" instrument_node="">," meaning "You are my brother" in the native indian Tupi language.</span></font></p><font data-dcnode-id="5786" face="Arial"><a data-dcnode-id="5787" name="anp"></a></font></font></td></tr><tr data-dcnode-id="5632"><td align="center" data-dcnode-id="5714" width="20%"><font data-dcnode-id="5715" face="Arial"><br data-dcnode-id="5779"><span data-dcnode-id="5778" instrument_node="">

</span><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="5740" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/rockwell_campaign.gif&amp;raw" width="216"><br data-dcnode-id="5739"><span data-dcnode-id="5738" instrument_node="">Rockwell's Campaign Flag 1965</span><br data-dcnode-id="5737"><br data-dcnode-id="5736"><br data-dcnode-id="5735"><span data-dcnode-id="5734" instrument_node="">
</span><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="5733" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/nazi_bicentennial.gif&amp;raw" width="216"><br data-dcnode-id="5732"><span data-dcnode-id="5731" instrument_node="">NSWPP Bicentennial Flag 1976</span><br data-dcnode-id="5730"><font data-dcnode-id="5728" size="-1"><span data-dcnode-id="5729" instrument_node="">(ANP reorganized as NSWPP)</span></font><br data-dcnode-id="5727"><br data-dcnode-id="5726"><br data-dcnode-id="5725"><span data-dcnode-id="5724" instrument_node="">
</span><img alt="Image by Joe McMillan and Eugene Ipavec" border="1" data-dcnode-id="5723" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/anp2.gif&amp;raw" width="216"><br data-dcnode-id="5722"><span data-dcnode-id="5721" instrument_node="">13-Stars and Stripes Flag</span><br data-dcnode-id="5720"><font data-dcnode-id="5718" size="-1"><span data-dcnode-id="5719" instrument_node="">(rarely seen or used)</span></font><br data-dcnode-id="5717"><br data-dcnode-id="5716"></font></td><td data-dcnode-id="5634" valign="top" width="80%"><b data-dcnode-id="5710"><font data-dcnode-id="5711" face="Arial" size="+1"><span data-dcnode-id="5712" instrument_node="">American Nazi Party (USA)</span></font></b><span data-dcnode-id="5709" instrument_node="">
</span><p data-dcnode-id="5706"><font data-dcnode-id="5707" face="Arial"><span data-dcnode-id="5708" instrument_node="">The American Nazi Party, founded by George Lincoln Rockwell in 1959 and led by him until his death, had a flag like that of Nazi Germany with a small blue globe in the center of the swastika, representing the world being consumed by the swastika. The depiction of the globe on party flag and emblem varied: sometimes it was showing only the North America and some of neighboring regions, but it was sometimes also showing all continents, together with the meridians and parallels as in the current United Nations flag, and there were few of its depictions as in the original United Nations flag.  On many occasions, the globe was simplified to a blank solid blue circle, as can be seen in some early color photographs. Rockwell initially called his party the "World Union of Free Enterprise National Socialists" (WUFENS), but later renamed it the American Nazi Party in 1960 to attract maximum media attention. The party, headquartered in Arlington, Virginia, largely based its platform upon the ideals and policies of Adolf Hitler's NSDAP, but added a policy of Holocaust denial, and expressed allegiance to the Constitutional principles of the American Founding Fathers.</span></font></p><font data-dcnode-id="5635" face="Arial"><span data-dcnode-id="5705" instrument_node="">
</span><div align="center" data-dcnode-id="5667"><span data-dcnode-id="5704" instrument_node="">
</span><span data-dcnode-id="5703" instrument_node="">

</span><table align="center" border="0" cellpadding="2" cellspacing="2" data-dcnode-id="5668"><tbody data-dcnode-id="5669"><tr data-dcnode-id="5691"><td data-dcnode-id="5700"><div align="center" data-dcnode-id="5701"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="5702" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/anp5.gif&amp;raw" width="156"></div></td><td data-dcnode-id="5697"><span data-dcnode-id="5698" instrument_node="">&nbsp;&nbsp;&nbsp;</span></td><td data-dcnode-id="5693"><div align="center" data-dcnode-id="5694"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="5695" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/anp6.gif&amp;raw" width="156"></div></td></tr><tr data-dcnode-id="5671"><td data-dcnode-id="5683"><div align="center" data-dcnode-id="5684"><span data-dcnode-id="5688" instrument_node="">ANP Banner</span><br data-dcnode-id="5687"><font data-dcnode-id="5685" size="-1"><span data-dcnode-id="5686" instrument_node="">(also used by the new ANP)</span></font></div></td><td data-dcnode-id="5680"><span data-dcnode-id="5681" instrument_node="">&nbsp;&nbsp;&nbsp;</span></td><td data-dcnode-id="5673"><div align="center" data-dcnode-id="5674"><span data-dcnode-id="5678" instrument_node="">ANP Banner</span><br data-dcnode-id="5677"><font data-dcnode-id="5675" size="-1"><span data-dcnode-id="5676" instrument_node="">(Used in October 1961 demonstration)</span></font></div></td></tr></tbody></table></div><span data-dcnode-id="5666" instrument_node="">
</span><p data-dcnode-id="5663"><font data-dcnode-id="5664" face="Arial"><span data-dcnode-id="5665" instrument_node="">In a "Keep the Redskins White!" demonstration members of the American Nazi Party demonstrated against desegregating the Washington Redskins football team in October of 1961. At the time the Washington DC pro-football team was the last remaining all-white team in the league, and although desegregated today, it remains the only team in the NFL whose name is considered a racial slur.</span></font></p><span data-dcnode-id="5662" instrument_node="">
</span><p data-dcnode-id="5659"><font data-dcnode-id="5660" face="Arial"><span data-dcnode-id="5661" instrument_node="">In 1965, Rockwell ran for the governor of Virginia, finishing last among the four candidates. Although the ANP had already existed for six years, he ran as an independent candidate, probably in order to make himself more acceptable to the voters, and used a flag in his campaign which was derived from the Confederate flag by replacing the stars with the words ROCKWELL GOVERNOR in white. The flag was actually made from a real Confederate flag on which the stars were painted into blue before the letters were added.
	</span></font></p><p data-dcnode-id="5655"><font data-dcnode-id="5656" face="Arial"><font data-dcnode-id="5657" face="Arial"><span data-dcnode-id="5658" instrument_node="">In 1967, Rockwell was killed by John Patler, a former party member whom Rockwell had ejected from the party for allegedly trying to introduce Marxist doctrine into the party's platforms. The ANP name was changed to the National Socialist White People's Party (NSWPP) in 1967 shortly before Rockwell's assassination.</span></font></font></p><font data-dcnode-id="5636" face="Arial"><font data-dcnode-id="5637" face="Arial"><span data-dcnode-id="5654" instrument_node="">
</span><p data-dcnode-id="5648"><font data-dcnode-id="5649" face="Arial"><span data-dcnode-id="5653" instrument_node="">The so-called Bicentennial Flag of the National Socialist White Peoples Party was first seen in a demonstration in 1976 on the Fourth of July outside the White house. The NSWPP party claimed the flag celebrated America's Bicentennial and had nothing to do with any bicentennial of the National Socialist Movement which, of course, began in 1919. The red-white-blue Bicentennial flag was designed by Matt Koehl, the current leader of both the New Order and the World Union of National Socialists (WUNS).  Koehl has a long history of being in leadership positions in various extremist groups, including the National Renaissance Party (NRP), the United White Party (UWP), the National States' Rights Party (NSRP), and the American Nazi Party (ANP). In August 1967, Koehl succeeded the George Lincoln Rockwell as "Commander" of the National Socialist White People's Party (NSWPP), and renamed it the </span><a data-dcnode-id="5651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/hate2.html%23usno"><span data-dcnode-id="5652" instrument_node="">"New Order"</span></a><span data-dcnode-id="5650" instrument_node=""> in 1983. By then, several splits resulted in formation of new neo-Nazi groups, mostly due to Koehl's policies, based on his vision of Nazism as a religious movement rather than a political one. Since mid-1980s, the New Order has been headquartered in New Berlin, Wisconsin, preaching Nazism as a pseudo-religion, without any public political activities.</span></font></p><font data-dcnode-id="5638" face="Arial"><span data-dcnode-id="5647" instrument_node="">
</span><p data-dcnode-id="5644"><font data-dcnode-id="5645" face="Arial"><span data-dcnode-id="5646" instrument_node=""> Today, the name "American Nazi Party" has been adopted by an organization led by Rocky J. Suhayda, a former member of Rockwell's original party in 1960s,  and headquartered in Westland, Michigan.  Rocky Suhayda was later affiliated with a group in Detroit called the SS Action Group led By Ted Dunn in the 1980s. Dunn ran a kind of a soup kitchen operation feeding those who "fought" under his leadership. The new group claims George Lincoln Rockwell as their founder, but there seems no actual connection to the original ANP, apart from the fact that their website sells nostalgic reprints of Rockwell's 1960s-era magazine "The Stormtrooper" and replica flags of the original party.</span></font></p><font data-dcnode-id="5639" face="Arial"><span data-dcnode-id="5643" instrument_node="">
</span><p data-dcnode-id="5640"><font data-dcnode-id="5641" face="Arial"><span data-dcnode-id="5642" instrument_node="">The new American Nazi Party uses a version of the original ANP Flag (shown top left, with blue UN-style globe) on their website and a vertical banner (shown left) at their rallies. However, a few years ago, they sold flags of various countries and states with a swastika superimposed on their designs, including the 13-star United States flag shown on the left.</span></font></p></font></font></font></font></font></td></tr><tr data-dcnode-id="5563"><td align="center" data-dcnode-id="5610" width="20%"><font data-dcnode-id="5611" face="Arial"><br data-dcnode-id="5629"><img align="MIDDLE" alt="Image by Colonel Emerson Begolly" border="1" data-dcnode-id="5628" height="130" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/al_qaeda.jpg&amp;raw" width="216"><br data-dcnode-id="5627"><i data-dcnode-id="5625"><span data-dcnode-id="5626" instrument_node="">al-Qaeda</span></i><span data-dcnode-id="5624" instrument_node=""> Flag</span><br data-dcnode-id="5623"><br data-dcnode-id="5622"><img alt="" border="0" data-dcnode-id="5621" height="170" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/al_qaeda1.gif&amp;raw" width="216"><br data-dcnode-id="5620"><span data-dcnode-id="5619" instrument_node="">Syria-Iraq al-Qaida Flag</span><br data-dcnode-id="5618"><br data-dcnode-id="5617"><img alt="" border="0" data-dcnode-id="5616" height="170" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/isis.gif&amp;raw" width="216"><br data-dcnode-id="5615"><span data-dcnode-id="5614" instrument_node="">Syria-Iraq Isis/Isil Flag</span><br data-dcnode-id="5613"><br data-dcnode-id="5612"></font></td><td data-dcnode-id="5565" valign="top" width="80%"><b data-dcnode-id="5600"><font data-dcnode-id="5601" face="Arial" size="+1"><span data-dcnode-id="5608" instrument_node="">al-Qaeda "The Base" (Saudi Arabia)</span><br data-dcnode-id="5607"><span data-dcnode-id="5606" instrument_node="">Islamic State of Iraq ISIS or ISIL (Iraq and Syria)</span><br data-dcnode-id="5605"><font data-dcnode-id="5602" size="-1"><em data-dcnode-id="5603"><span data-dcnode-id="5604" instrument_node="">al-Qaeda/ad-Dawla al-Islamiyya fi al-'Iraq wa-sh-Sham/Da'ash</span></em></font></font></b><span data-dcnode-id="5599" instrument_node="">
</span><p data-dcnode-id="5590"><font data-dcnode-id="5591" face="Arial"><span data-dcnode-id="5598" instrument_node="">This flag sometimes has been used by cells of the extremist Arab terrorist organization </span><i data-dcnode-id="5596"><span data-dcnode-id="5597" instrument_node="">al-Qaeda</span></i><span data-dcnode-id="5595" instrument_node="">, who have been responsible for many senseless bombings and deaths.  It is black with the "long version" of the </span><i data-dcnode-id="5593"><span data-dcnode-id="5594" instrument_node="">Shahada</span></i><span data-dcnode-id="5592" instrument_node=""> in a yellowish color and a yellowish circle in the center.  A variant has the lettering and circle in white. The flag is never flown, but usually hung on a wall. This flag was used in the background of several beheading videos. In the videos it is not clear enough to tell whether the lettering and circle is white or yellow, but it probably differs depending on who made the particular flag. The flags are not machine-produced, but hand-made, usually from two pieces of black nylon with embroidered lettering and circle.</span></font></p><font data-dcnode-id="5566" face="Arial"><span data-dcnode-id="5589" instrument_node="">
</span><p data-dcnode-id="5583"><font data-dcnode-id="5584" face="Arial"><span data-dcnode-id="5588" instrument_node="">The second flag shown here is an example of an al-Qaeda flag that is seen in many parts of the Middle East, with variants displaying differing Arabic text. Normally the text on the top reads "There is no god but God." The white circle appearing in the center with inscription </span><i data-dcnode-id="5586"><span data-dcnode-id="5587" instrument_node="">Muhammad Rasul Allah</span></i><span data-dcnode-id="5585" instrument_node=""> is the seal of Messenger of God which he used on his letters. The text on the bottom of this example reads: "The Islamic State of Iraq and Ash-Sham."</span></font></p><font data-dcnode-id="5567" face="Arial"><span data-dcnode-id="5582" instrument_node="">
</span><p data-dcnode-id="5573"><font data-dcnode-id="5574" face="Arial"><span data-dcnode-id="5581" instrument_node="">What started in Saudi Arabia, gradually spread to western Iraq and Syria with violent extremist groups forming the Islamic State of Iraq and the Levant (</span><i data-dcnode-id="5579"><span data-dcnode-id="5580" instrument_node="">ad-Dawla al-Islamiyya fi al-'Iraq wa-sh-Sham</span></i><span data-dcnode-id="5578" instrument_node="">), abbreviated as ISIS or ISIL (</span><i data-dcnode-id="5576"><span data-dcnode-id="5577" instrument_node="">Da'ash</span></i><span data-dcnode-id="5575" instrument_node="">). In 2006, ISIS, acting as an umbrella organization for the Iraqi insurgent groups started by al-Qaida supporters and members, and taking advantage of the weakness of the states of Iraq and Syria following the Iraq Wars, managed to seize a fairly large portion of the area. What followed was a senseless regime of terror and destruction, resulting in the deaths of thousands of innocent people and the desecration of many irreplaceable historical monuments. Massive amounts of Syrians and Iraqi fled the war torn area resulting in a world wide refugee crisis.</span></font></p><font data-dcnode-id="5568" face="Arial"><span data-dcnode-id="5572" instrument_node="">
</span><p data-dcnode-id="5569"><font data-dcnode-id="5570" face="Arial"><span data-dcnode-id="5571" instrument_node="">The symbolism (in particular in the black flag and so-called seal of Muhammad) are modern-era inventions of jihadists that have neither historical basis nor Islamic tradition truly supporting them.</span></font></p></font></font></font></td></tr><tr data-dcnode-id="5535"><td align="center" data-dcnode-id="5553" width="20%"><font data-dcnode-id="5554" face="Arial"><br data-dcnode-id="5560"><img align="MIDDLE" alt="Image from Anti-Defamation League website" border="1" data-dcnode-id="5559" height="172" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/aryan_fist.jpg&amp;raw" width="216"><br data-dcnode-id="5558"><span data-dcnode-id="5557" instrument_node="">The Aryan Fist</span><br data-dcnode-id="5556"><br data-dcnode-id="5555"></font></td><td data-dcnode-id="5537" valign="top" width="80%"><b data-dcnode-id="5549"><font data-dcnode-id="5550" face="Arial" size="+1"><span data-dcnode-id="5551" instrument_node="">Aryan Fist (USA)</span></font></b><span data-dcnode-id="5548" instrument_node="">
</span><p data-dcnode-id="5545"><font data-dcnode-id="5546" face="Arial"><span data-dcnode-id="5547" instrument_node="">The Aryan Fist symbol is a twist on the fist representing the Black power movement and the battle against racial oppression. White Power (U.S. Nazi Skins) uses a logo consisting of a white fist upwards on a black field.</span></font></p><font data-dcnode-id="5538" face="Arial"><span data-dcnode-id="5544" instrument_node="">
</span><p data-dcnode-id="5541"><font data-dcnode-id="5542" face="Arial"><span data-dcnode-id="5543" instrument_node="">The Aryan fist is a symbol of white power used by hate groups who promote their racist agenda as white pride activism. The laurel wreath appearing in the "Aryan fist" Flag is actually not a racist symbol itself, but rather a separate common skinhead symbol stemming from the logo of a line of British clothing that became popular among skinheads. It is the white fist itself that is the symbol of intolerance. 
</span></font></p><font data-dcnode-id="5539" face="Arial"><a data-dcnode-id="5540" name="an"></a></font></font></td></tr><tr data-dcnode-id="5507"><td align="center" data-dcnode-id="5525" width="20%"><font data-dcnode-id="5526" face="Arial"><br data-dcnode-id="5532"><img align="MIDDLE" alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="5531" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/us-awd.gif&amp;raw" width="216"><br data-dcnode-id="5530"><span data-dcnode-id="5529" instrument_node="">AWD Flag</span><br data-dcnode-id="5528"><br data-dcnode-id="5527"></font></td><td data-dcnode-id="5509" valign="top" width="80%"><b data-dcnode-id="5521"><font data-dcnode-id="5522" face="Arial" size="+1"><span data-dcnode-id="5523" instrument_node="">Atomwaffen Division (US)</span></font></b><span data-dcnode-id="5520" instrument_node="">
</span><p data-dcnode-id="5517"><font data-dcnode-id="5518" face="Arial"><span data-dcnode-id="5519" instrument_node="">The Atomwaffen Division (AD), or Atomic Weapons Division (AWD), is a neo-Nazi terrorist, alt-right network, consisting of small groups mostly located in the Southern United States. They first appeared in 2015, but have since spread into pockets across the United States and even attracted followers in Canada, the United Kingdom, and reportedly even in Germany. According to the Southern Poverty Law Center (SPLC) "...members of the Atomwaffen Division have been held responsible for a number of murders, planned terrorist attacks, as well as other criminal actions."</span></font></p><font data-dcnode-id="5510" face="Arial"><span data-dcnode-id="5516" instrument_node="">
</span><p data-dcnode-id="5513"><font data-dcnode-id="5514" face="Arial"><span data-dcnode-id="5515" instrument_node="">The AWD flag is black, bearing a yellow saltire with arms widening towards the flag corners. Centered on the saltire is their logo consisting of a black shield fimbriated white and black. It is charged with the radiation hazard symbol in white. The shield is surrounded by an "endless" laurel wreath in white with black outline.</span></font></p><font data-dcnode-id="5511" face="Arial"><a data-dcnode-id="5512" name="an"></a></font></font></td></tr><tr data-dcnode-id="5358"><td align="center" data-dcnode-id="5456" width="20%"><font data-dcnode-id="5457" face="Arial"><br data-dcnode-id="5504"><img align="MIDDLE" alt=" Image by Pete Loeser and Tomislav Todorovic" border="1" data-dcnode-id="5503" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/aryan_nations.gif&amp;raw" width="216"><br data-dcnode-id="5502"><span data-dcnode-id="5501" instrument_node="">AN Flag</span><br data-dcnode-id="5500"><font data-dcnode-id="5498" size="-1"><span data-dcnode-id="5499" instrument_node="">(oblong variant)</span></font><br data-dcnode-id="5497"><br data-dcnode-id="5496"><br data-dcnode-id="5495"><img alt="Image by Pete Loeser and Tomislav Todorovic" border="1" data-dcnode-id="5494" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/aryan_nations1.gif&amp;raw" width="216"><br data-dcnode-id="5493"><span data-dcnode-id="5492" instrument_node="">AN Flag</span><br data-dcnode-id="5491"><font data-dcnode-id="5489" size="-1"><span data-dcnode-id="5490" instrument_node="">(13-striped variant)</span></font><br data-dcnode-id="5488"><br data-dcnode-id="5487"><br data-dcnode-id="5486"><img align="MIDDLE" alt="Image by Antonio Martins" border="1" data-dcnode-id="5485" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/aryan_nations2.gif&amp;raw" width="216"><br data-dcnode-id="5484"><span data-dcnode-id="5483" instrument_node="">AN Flag</span><br data-dcnode-id="5482"><font data-dcnode-id="5480" size="-1"><span data-dcnode-id="5481" instrument_node="">(black and white variant)</span></font><br data-dcnode-id="5479"><br data-dcnode-id="5478"><br data-dcnode-id="5477"><img align="MIDDLE" alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="5476" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/aryan_nations4.gif&amp;raw" width="216"><br data-dcnode-id="5475"><span data-dcnode-id="5474" instrument_node="">AN Flag</span><br data-dcnode-id="5473"><font data-dcnode-id="5471" size="-1"><span data-dcnode-id="5472" instrument_node="">(white flag with "The Shield" logo)</span></font><br data-dcnode-id="5470"><br data-dcnode-id="5469"><br data-dcnode-id="5468"><img align="MIDDLE" alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="5467" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/aryan_nations5.gif&amp;raw" width="216"><br data-dcnode-id="5466"><span data-dcnode-id="5465" instrument_node="">AN Flag</span><br data-dcnode-id="5464"><font data-dcnode-id="5462" size="-1"><span data-dcnode-id="5463" instrument_node="">(white flag with newer alternate logo)</span></font><br data-dcnode-id="5461"><br data-dcnode-id="5460"><p data-dcnode-id="5459"></p><span data-dcnode-id="5458" instrument_node="">
</span></font></td><td data-dcnode-id="5360" valign="top" width="80%"><b data-dcnode-id="5452"><font data-dcnode-id="5453" face="Arial" size="+1"><span data-dcnode-id="5454" instrument_node="">Aryan Nations (USA)</span></font></b><span data-dcnode-id="5451" instrument_node="">
</span><p data-dcnode-id="5448"><font data-dcnode-id="5449" face="Arial"><span data-dcnode-id="5450" instrument_node="">Aryan Nations (AN) is a white nationalist neo-Nazi organization founded in the 1974 by Richard Girnt Butler as the political arm of the Church of Jesus Christ-Christian (CJCC). As of December 2007 there were two main factions that claimed descent from Butler's group.</span></font></p><font data-dcnode-id="5361" face="Arial"><span data-dcnode-id="5447" instrument_node="">
</span><p data-dcnode-id="5444"><font data-dcnode-id="5445" face="Arial"><span data-dcnode-id="5446" instrument_node="">Aryan Nations was called a "terrorist threat" by the FBI, and the RAND Corporation called it the "first truly nationwide terrorist network." The organization has been at the center of violent racist activity since its inception in 1974.  During the 1980s and early 1990s, neo-Nazis, racist skinheads, Klansmen and other white nationalists convened regularly at the Aryan Nations Idaho compound for its annual "World Congress." However, during the early 2000s the group lost a very costly civil lawsuit against the Southern Poverty Law Center that depleted the AN´s  finances, and a slow decline followed that cumulated with the 2004 death of their founder Richard Butler. Today Aryan Nations has splintered into several smaller groups with various people in competition for the leadership of the movement.</span></font></p><font data-dcnode-id="5362" face="Arial"><span data-dcnode-id="5443" instrument_node="">

</span><p data-dcnode-id="5401"><font data-dcnode-id="5402" face="Arial"><span data-dcnode-id="5403" instrument_node="">The AN flag has appeared in both a square and rectangular shape, and is sometimes displayed with a gold fringe when used indoors. The square variant is called the Aryan Nations "Shield" and was carried in demonstrations in the form of a vertical banner. The AN also used a stripped version of the AN flag, as well as re-purposing for their demonstrations the more traditional Confederate Naval Ensign, the Christian Church Flag, and various versions of the Confederate Stars and Bars. The Aryan Nations also uses several white fielded flags: the first charged with "The Shield" and the second charged with an alternate emblem (sword over the letter N, both in blue, surrounded with a bicolor ring, top half of which is red and charged with the inscription ARYAN NATIONS, and bottom half is blue and charged with the inscription OUR RACE IS OUR NATION; the tip of the sword is set over the bottom of the ring, dividing it into two).</span></font></p><font data-dcnode-id="5363" face="Arial"><span data-dcnode-id="5400" instrument_node="">
