</span><p data-dcnode-id="3028"><font data-dcnode-id="3029" face="Arial"><span data-dcnode-id="3030" instrument_node="">The New Force flag is parted diagonally red over blue, which recalls the red berets and blue shirts worn by the members of Spanish Traditionalist Falange (FET/JONS), the single party during the rule of Francisco Franco. Initials FN in counterchanged colors, or both in white or yellow, may be added to usually plain fields.</span></font></p></font></td></tr><tr data-dcnode-id="2888"><td align="center" data-dcnode-id="2996" width="20%"><font data-dcnode-id="2997" face="Arial"><br data-dcnode-id="3021"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="3020" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/forza_nuova_1.gif&amp;raw" width="216"><br data-dcnode-id="3019"><span data-dcnode-id="3018" instrument_node="">FN Flag (Type #1)</span><br data-dcnode-id="3017"><br data-dcnode-id="3016"><br data-dcnode-id="3015"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="3014" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/forza_nuova_2.gif&amp;raw" width="216"><br data-dcnode-id="3013"><span data-dcnode-id="3012" instrument_node="">FN Flag (Type #2)</span><br data-dcnode-id="3011"><br data-dcnode-id="3010"><br data-dcnode-id="3009"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="3008" height="105" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/forza_nuova_3.gif&amp;raw" width="216"><br data-dcnode-id="3007"><span data-dcnode-id="3006" instrument_node="">FN Flag (Type #3)</span><br data-dcnode-id="3005"><br data-dcnode-id="3004"><br data-dcnode-id="3003"><img alt="Image by Marcus Schmöger" border="1" data-dcnode-id="3002" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.l </span><p data-dcnode-id="2981"><font data-dcnode-id="2982" face="Arial"><span data-dcnode-id="2986" instrument_node="">The </span><i data-dcnode-id="2984"><span data-dcnode-id="2985" instrument_node="">Forza Nuova</span></i><span data-dcnode-id="2983" instrument_node=""> (FN) is an Italian far right political party. Founded by Roberto Fiore and Massimo Morsello, and supporting the ideas of Julius Evola, the party is a member of the European National Front and was a part of the Social Alternative from 2003 to 2006.  The party policies are an interesting blend of National Socialist ideology and traditional Roman Catholicism.</span></font></p><font data-dcnode-id="2891" face="Arial"><span data-dcnode-id="2980" instrument_node="">
</span><p data-dcnode-id="2971"><font data-dcnode-id="2972" face="Arial"><span data-dcnode-id="2979" instrument_node="">New Force mostly uses two flags (Types #1 and #2) charged with its logo, which is a white rhomboid charged with party name initials in black and placed in center of a larger red rhomboid which also contains party name inscribed in white above and below the central device. This logo is based on a common template used also by other European ultra-rightist movements which are members of the European National Front. Of these flags, the one much more used has black field (Type #2) and the logo height equal with the flag width, although some photos seem to show a black fimbriation. (Also see: </span><a data-dcnode-id="2977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/hate2.html%23nu-s"><span data-dcnode-id="2978" instrument_node="">Nordic Youth of Sweden</span></a><span data-dcnode-id="2976" instrument_node=""> and the </span><a data-dcnode-id="2974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/hate2.html%23nr-rm"><span data-dcnode-id="2975" instrument_node="">
New Right of Romania [Type #3]</span></a><span data-dcnode-id="2973" instrument_node=""> for similar flags.)</span></font></p><font data-dcnode-id="2892" face="Arial"><span data-dcnode-id="2970" instrument_node="">

</span><p data-dcnode-id="2933"><font data-dcnode-id="2934" face="Arial"><span data-dcnode-id="2935" instrument_node="">At many New Force rallies, besides using the two main flags shown at the top left, a more traditional Italian Nazi Flag with the Sun Wheel (Type #5 and Type #6) has also been used both in red and black backgrounds. A NSDAP-style flag with the letters "FN" on a white disc also exists in variants of black and red colors, in fact, this variant can be found more frequently on the Web than the earlier one.</span></font></p><font data-dcnode-id="2893" face="Arial"><span data-dcnode-id="2932" instrument_node="">

</span><table align="center" border="0" cellpadding="2" cellspacing="2" data-dcnode-id="2899" width="400"><tbody data-dcnode-id="2900"><tr data-dcnode-id="2918"><td data-dcnode-id="2927"><div align="center" data-dcnode-id="2928"><img alt="Image by Marcus Schmöger" border="1" data-dcnode-id="2929" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/forza_nuova_7.gif&amp;raw" width="216"></div></td><td data-dcnode-id="2924"><span data-dcnode-id="2925" instrument_node="">&nbsp;&nbsp;&nbsp;</span></td><td data-dcnode-id="2920"><div align="center" data-dcnode-id="2921"><img alt="Image by Marcus Schmöger" border="1" data-dcnode-id="2922" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/forza_nuova_8.gif&amp;raw" width="216"></div></td></tr><tr data-dcnode-id="2902"><td data-dcnode-id="2912"><div align="center" data-dcnode-id="2913"><font data-dcnode-id="2914" face="Arial" size="3"><span data-dcnode-id="2915" instrument_node="">FN Flag (Type #7)</span></font></div></td><td data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">&nbsp;&nbsp;&nbsp;</span></td><td data-dcnode-id="2904"><div align="center" data-dcnode-id="2905"><font data-dcnode-id="2906" face="Arial" size="3"><span data-dcnode-id="2907" instrument_node="">FN Flag (Type #8)</span></font></div></td></tr></tbody></table><span data-dcnode-id="2898" instrument_node="">
</span><p data-dcnode-id="2894"><font data-dcnode-id="2895" face="Arial"><span data-dcnode-id="2897" instrument_node="">Either a black sun wheel or the letters FN, in somewhat different form, sometimes appear in the center stripe of the Italian Tricolor (Type #3). A sun wheel version (Type #4), the wheel usually in red, but also black, has also been reported.  Also reported are Types #7 and #8 with either light blue or black backgrounds and an off-center green, white, and red rondel placed slightly behind large white block letters "FN" and words "Forza Nuova" written directly below.</span><a data-dcnode-id="2896" name="fnu"></a></font></p></font></font></font></td></tr><tr data-dcnode-id="2841"><td align="center" data-dcnode-id="2878" width="20%"><font data-dcnode-id="2879" face="Arial"><br data-dcnode-id="2885"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="2884" height="140" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/ec-fnge.gif&amp;raw" width="216"><br data-dcnode-id="2883"><span data-dcnode-id="2882" instrument_node="">FNGE Flag</span><br data-dcnode-id="2881"><br data-dcnode-id="2880"></font></td><td data-dcnode-id="2843" valign="top" width="80%"><b data-dcnode-id="2870"><font data-dcnode-id="2875" face="Arial" size="+1"><span data-dcnode-id="2876" instrument_node="">Ecuadorian Garcian National Phalanx (Ecuador)</span></font><br data-dcnode-id="2874"><font data-dcnode-id="2871" size="-1"><i data-dcnode-id="2872"><span data-dcnode-id="2873" instrument_node="">Falange Nacional Garciana
 Ecuatoriana</span></i></font></b><span data-dcnode-id="2869" instrument_node="">
</span><p data-dcnode-id="2851"><font data-dcnode-id="2852" face="Arial"><span data-dcnode-id="2868" instrument_node="">The Ecuadorian Garcian National Phalanx was a </span><i data-dcnode-id="2866"><span data-dcnode-id="2867" instrument_node="">Falangist</span></i><span data-dcnode-id="2865" instrument_node=""> group in Ecuador apparently modeled after its Spanish and Latin American counterparts. Very little is known about this small and apparently short-lived movement, although we can speculate that the name </span><i data-dcnode-id="2863"><span data-dcnode-id="2864" instrument_node="">Gaciana</span></i><span data-dcnode-id="2862" instrument_node=""> was derived from the Spanish last name of GarcÃƒÆ’Ã‚Â­a, and suggests that the group was formed to honor a certain military man whose last-name was "GarcÃƒÆ’Ã‚Â­a".  Of course, "Phalanx" (</span><i data-dcnode-id="2860"><span data-dcnode-id="2861" instrument_node="">Falangist</span></i><span data-dcnode-id="2859" instrument_node=""> and </span><i data-dcnode-id="2857"><span data-dcnode-id="2858" instrument_node="">Falange</span></i><span data-dcnode-id="2856" instrument_node=""> in Spanish) is today defined as a "Spanish military, unionist, laborist, or anarchist" group. This particular Falangist group attempted to trace its origins back to the Falangism and Synarchism of the </span><i data-dcnode-id="2854"><span data-dcnode-id="2855" instrument_node="">Alianza Revolucionaria Nacionalista Ecuatoriana</span></i><span data-dcnode-id="2853" instrument_node=""> which was started by Jorge Luna in 1948, but there seems to be little actual similarity or real connection between the two groups.</span></font></p><font data-dcnode-id="2844" face="Arial"><span data-dcnode-id="2850" instrument_node="">
</span><p data-dcnode-id="2847"><font data-dcnode-id="2848" face="Arial"><span data-dcnode-id="2849" instrument_node="">The FNGE flag was a typical Falangist design incorporating a blue-red-blue vertical triband design with Falange black yoke and arrows on the red field.</span></font></p><font data-dcnode-id="2845" face="Arial"><a data-dcnode-id="2846" name="fnsh"></a></font></font></td></tr><tr data-dcnode-id="2796"><td align="center" data-dcnode-id="2826" width="20%"><font data-dcnode-id="2827" face="Arial"><br data-dcnode-id="2838"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="2837" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/mnstch.gif&amp;raw" width="216"><br data-dcnode-id="2836"><span data-dcnode-id="2835" instrument_node="">FNSH General Flag</span><br data-dcnode-id="2834"><br data-dcnode-id="2833"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="2832" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/fon.gif&amp;raw" width="216"><br data-dcnode-id="2831"><span data-dcnode-id="2830" instrument_node="">Chilean Division Flag</span><br data-dcnode-id="2829"><br data-dcnode-id="2828"></font></td><td data-dcnode-id="2798" valign="top" width="80%"><b data-dcnode-id="2818"><font data-dcnode-id="2819" face="Arial" size="+1"><span data-dcnode-id="2824" instrument_node="">Hispanic National Socialist Front (Chile and Mexico)</span><br data-dcnode-id="2823"><font data-dcnode-id="2820" size="-1"><em data-dcnode-id="2821"><span data-dcnode-id="2822" instrument_node="">Frente Nacional-Socialista Hispano (FNSH)</span></em></font></font></b><span data-dcnode-id="2817" instrument_node="">
</span><p data-dcnode-id="2811"><font data-dcnode-id="2812" face="Arial"><span data-dcnode-id="2816" instrument_node="">This apparent multi-national community of Hispanic-American neo-Nazis might be only active online and is most likely just a remnant of the Chilean </span><a data-dcnode-id="2814" href="#fon"><span data-dcnode-id="2815" instrument_node="">National Order Front</span></a><span data-dcnode-id="2813" instrument_node="">, which was disbanded in 2012. Their common symbol is actually the old flag of National Socialist Movement of Chilean Workers, while their Chilean division uses the flag adopted by the National Order Front in 2004, suggesting that this new National Socialist want-to-be was initiated in Chile.</span></font></p><font data-dcnode-id="2799" face="Arial"><span data-dcnode-id="2810" instrument_node="">
</span><div align="center" data-dcnode-id="2806"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="2809" height="120" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/mx_fnsh.gif&amp;raw" width="200"><br data-dcnode-id="2808"><span data-dcnode-id="2807" instrument_node="">Mexican Division Flag</span></div><span data-dcnode-id="2805" instrument_node="">
</span><p data-dcnode-id="2802"><font data-dcnode-id="2803" face="Arial"><span data-dcnode-id="2804" instrument_node="">The only other existing division, that of Mexico, uses the same flag design as that of Chile, but in Mexican national colors.</span></font></p><font data-dcnode-id="2800" face="Arial"><a data-dcnode-id="2801" name="fp"></a></font></font></td></tr><tr data-dcnode-id="2757"><td align="center" data-dcnode-id="2786" width="20%"><font data-dcnode-id="2787" face="Arial"><br data-dcnode-id="2793"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="2792" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/frn.gif&amp;raw" width="216"><br data-dcnode-id="2791"><span data-dcnode-id="2790" instrument_node="">FrN Flag</span><br data-dcnode-id="2789"><br data-dcnode-id="2788"></font></td><td data-dcnode-id="2759" valign="top" width="80%"><b data-dcnode-id="2778"><font data-dcnode-id="2779" face="Arial" size="+1"><span data-dcnode-id="2784" instrument_node="">National Front (Spain)</span><br data-dcnode-id="2783"><font data-dcnode-id="2780" size="-1"><i data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">Frente Nacional - FrN</span></i></font></font></b><span data-dcnode-id="2777" instrument_node="">
</span><p data-dcnode-id="2765"><font data-dcnode-id="2766" face="Arial"><span data-dcnode-id="2776" instrument_node="">The National Front operated under the name "The Phalanx" between 2006-2009 after a split in the Spanish neo-Phalangist </span><a data-dcnode-id="2774" href="#fe"><span data-dcnode-id="2775" instrument_node="">Phalanx Party</span></a><span data-dcnode-id="2773" instrument_node=""> (</span><i data-dcnode-id="2771"><span data-dcnode-id="2772" instrument_node="">La Falange</span></i><span data-dcnode-id="2770" instrument_node="">) left both factions using the same name until in 2009, when a court ruling awarded the rival faction the exclusive use of the name. After the court ruling the FrN party officially adopted the name National Front which it had previously only used to identify itself on ballots for the purpose of elections.  The split in </span><i data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">La Falange</span></i><span data-dcnode-id="2767" instrument_node=""> occurred due to a dispute about the leadership. The leader of the faction which eventually became the National Front, and of the National Front until the disbanding, was Jose Fernando Cantalapiedra. It never achieved any significant success after 2009 and disbanded itself in 2011.</span></font></p><font data-dcnode-id="2760" face="Arial"><span data-dcnode-id="2764" instrument_node="">
</span><p data-dcnode-id="2761"><font data-dcnode-id="2762" face="Arial"><span data-dcnode-id="2763" instrument_node="">The party flag was blue, with the party name inscribed in white in two rows and a yellow-red quartered oblique shield, fimbriated white and placed in the top fly corner. The shield and inscription on blue field were also used as the party logo. While yellow and red were used as the national colors, blue, as the color of Phalangist shirt, was probably the only remaining reference to the origins of the party.</span></font></p></font></td></tr><tr data-dcnode-id="2720"><td align="center" data-dcnode-id="2747" width="20%"><font data-dcnode-id="2748" face="Arial"><br data-dcnode-id="2754"><img alt="Image by Tomislav Todorovic/modified by Pete Loeser" border="1" data-dcnode-id="2753" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/sweden_fnu.gif&amp;raw" width="216"><br data-dcnode-id="2752"><span data-dcnode-id="2751" instrument_node="">FNU Flag</span><br data-dcnode-id="2750"><br data-dcnode-id="2749"></font></td><td data-dcnode-id="2722" valign="top" width="80%"><b data-dcnode-id="2739"><font data-dcnode-id="2740" face="Arial" size="+1"><span data-dcnode-id="2745" instrument_node="">National Youth League (Sweden)</span><br data-dcnode-id="2744"><font data-dcnode-id="2741" size="-1"><i data-dcnode-id="2742"><span data-dcnode-id="2743" instrument_node="">Förbundet Nationell Ungdom - FNU</span></i></font></font></b><span data-dcnode-id="2738" instrument_node="">
</span><p data-dcnode-id="2729"><font data-dcnode-id="2730" face="Arial"><span data-dcnode-id="2737" instrument_node="">The National Youth League is a neo-Nazi movement started in in 2011 by Robin Boström. It was started with financial help from the </span><a data-dcnode-id="2735" href="#fsp"><span data-dcnode-id="2736" instrument_node="">Party of the Swedes</span></a><span data-dcnode-id="2734" instrument_node=""> sponcered newspaper "National Today." The name was borrowed from the 1930s pro-Nazi National Youth League of Sweden (</span><i data-dcnode-id="2732"><span data-dcnode-id="2733" instrument_node="">Sveriges nationella ungdomsförbund, SNU</span></i><span data-dcnode-id="2731" instrument_node="">). There followed several other Nazi and neo-Nazi youth organizations with the same or similar names, the last being the National Youth, part of the Swedish Resistance Movement, which was dissolved in 2006.  The current organization describes itself as "a platform for educating young ethnic Swedes through workshops, lectures, and martial arts training." The FNU has six chapters and a national organization.</span></font></p><font data-dcnode-id="2723" face="Arial"><span data-dcnode-id="2728" instrument_node="">
</span><p data-dcnode-id="2724"><font data-dcnode-id="2725" face="Arial"><span data-dcnode-id="2727" instrument_node=""> Like many other similar Swedish groups, the FNU uses a flag in national colors, with a large gold Jeran rune on blue field. The proto-Germanic rune "Jeran" dates back to approximately AD 200-400 and means "good harvest." The flag was first seen in the town of Eskilstuna in 2012 at a demonstration organized jointly by the National Youth League and the Party of the Swedes.</span><a data-dcnode-id="2726" name="fon"></a></font></p></font></td></tr><tr data-dcnode-id="2646"><td align="center" data-dcnode-id="2697" width="20%"><font data-dcnode-id="2698" face="Arial"><br data-dcnode-id="2717"><font data-dcnode-id="2699" face="Arial"><br data-dcnode-id="2716"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="2715" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/mnstch.gif&amp;raw" width="216"><br data-dcnode-id="2714"><span data-dcnode-id="2713" instrument_node="">MNSTC Flag 2002</span><br data-dcnode-id="2712"><br data-dcnode-id="2711"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="2710" height="130" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/fon.gif&amp;raw" width="216"><br data-dcnode-id="2709"><span data-dcnode-id="2708" instrument_node="">FON Flag 2004</span><br data-dcnode-id="2707"><br data-dcnode-id="2706"><br data-dcnode-id="2705"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="2704" height="130" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/jns.gif&amp;raw" width="216"><br data-dcnode-id="2703"><span data-dcnode-id="2702" instrument_node="">JNS Flag</span><br data-dcnode-id="2701"><br data-dcnode-id="2700"></font></font></td><td data-dcnode-id="2648" valign="top" width="80%"><b data-dcnode-id="2690"><span data-dcnode-id="2695" instrument_node="">The National Order Front (Chile)</span><br data-dcnode-id="2694"><font data-dcnode-id="2691" size="-1"><em data-dcnode-id="2692"><span data-dcnode-id="2693" instrument_node="">Frente Orden Nacional</span></em></font></b><span data-dcnode-id="2689" instrument_node="">
</span><p data-dcnode-id="2680"><font data-dcnode-id="2681" face="Arial"><span data-dcnode-id="2688" instrument_node="">Originally known as the National Socialist Movement of Chilean Workers (</span><em data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">Movimiento Nacional Socialista de los Trabajadores Chilenos</span></em><span data-dcnode-id="2685" instrument_node=""> (MNSTC), founded in 2002, this movement declared National Socialism as the only thing standing against national and international threats of the Chilean people's way of life.  In 2004, the group renamed themselves the National Order Front (</span><i data-dcnode-id="2683"><span data-dcnode-id="2684" instrument_node="">Frente Orden Nacional</span></i><span data-dcnode-id="2682" instrument_node="">), or more simply FON.  In 2012, they would disbanded themselves, blaming the hostility of Chilean LGBT organizations for the "persecution" which made further operations impossible.</span></font></p><font data-dcnode-id="2649" face="Arial"><span data-dcnode-id="2679" instrument_node="">
</span><p data-dcnode-id="2670"><font data-dcnode-id="2671" face="Arial"><span data-dcnode-id="2678" instrument_node="">However, more recently, a questionable new group calling themselves the </span><a data-dcnode-id="2676" href="#fnsh"><span data-dcnode-id="2677" instrument_node="">Hispanic National Socialist Front</span></a><span data-dcnode-id="2675" instrument_node=""> (</span><em data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">Frente Nacional-Socialista Hispano</span></em><span data-dcnode-id="2672" instrument_node="">), or simply FNSH, has appeared on-line claiming to have "divisions" in both Chile and Mexico.</span></font></p><font data-dcnode-id="2650" face="Arial"><span data-dcnode-id="2669" instrument_node="">
</span><p data-dcnode-id="2666"><font data-dcnode-id="2667" face="Arial"><span data-dcnode-id="2668" instrument_node="">On National Order Front flags the letter "N", which stood for national socialism, was shown in the form of a ascending ray that pointed upward. Their original flag was red, with a large black thunderbolt placed over a white disc.  When the group renamed themselves the black thunderbolt symbol was re-colored into white and placed over a red-blue horizontal bicolor, thus displaying the national colors of Chile. The lightening bolt like symbol was claimed to represented the birth of the movement and their stated goal of creating a society based on the values of national socialism.</span></font></p><font data-dcnode-id="2651" face="Arial"><span data-dcnode-id="2665" instrument_node="">
</span><b data-dcnode-id="2658"><font data-dcnode-id="2659" face="Arial" size="+1"><span data-dcnode-id="2664" instrument_node=""> National Socialist Youth</span><br data-dcnode-id="2663"><font data-dcnode-id="2660" size="-1"><em data-dcnode-id="2661"><span data-dcnode-id="2662" instrument_node="">Juventud Nacional Socialista (JNS)</span></em></font></font></b><span data-dcnode-id="2657" instrument_node="">
</span><p data-dcnode-id="2654"><font data-dcnode-id="2655" face="Arial"><span data-dcnode-id="2656" instrument_node="">The FON youth wing striving to "instill habits of discipline" used special uniforms for those admitted to participate in their ranks. They felt the discipline and uniforms would lead to the "establishment of an egalitarian life," and be the "starting point" for all future Chileans to embrace National Socialism. Their youth organization flag displayed the same white thunderbolt as used by the FON, but placed it on a black field.</span></font></p><font data-dcnode-id="2652" face="Arial"><a data-dcnode-id="2653" name="fp"></a></font></font></font></font></td></tr><tr data-dcnode-id="2611"><td align="center" data-dcnode-id="2636" width="20%"><font data-dcnode-id="2637" face="Arial"><br data-dcnode-id="2643"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="2642" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/pe-falpe.gif&amp;raw" width="216"><br data-dcnode-id="2641"><span data-dcnode-id="2640" instrument_node="">FP Flag</span><br data-dcnode-id="2639"><br data-dcnode-id="2638"></font></td><td data-dcnode-id="2613" valign="top" width="80%"><b data-dcnode-id="2628"><font data-dcnode-id="2629" face="Arial" size="+1"><span data-dcnode-id="2634" instrument_node="">Peru Phalanx 2005-2012 (Peru)</span><br data-dcnode-id="2633"><font data-dcnode-id="2630" size="-1"><i data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">Falange Peru</span></i></font></font></b><span data-dcnode-id="2627" instrument_node="">
</span><p data-dcnode-id="2621"><font data-dcnode-id="2622" face="Arial"><span data-dcnode-id="2626" instrument_node="">The Peru Phalanx was a minor Peruvian Fascist political movement, active from 2005 to 2012, which seemed to have been modeled after the </span><a data-dcnode-id="2624" href="#fe"><span data-dcnode-id="2625" instrument_node="">Spanish Phalanx</span></a><span data-dcnode-id="2623" instrument_node="">. Their platform (political agenda) combined the national traditions of Spain and Peru with these of Fascist ideology.</span></font></p><font data-dcnode-id="2614" face="Arial"><span data-dcnode-id="2620" instrument_node="">
</span><p data-dcnode-id="2617"><font data-dcnode-id="2618" face="Arial"><span data-dcnode-id="2619" instrument_node="">Its flag, obviously derived from the Peruvian national flag, was defaced with the FP logo (a black emblem composed of five arrows behind an Iron Cross) which was centered on the white stripe.  It should be noted that the logo design is quite similar to that used by the Blue Division, the Spanish volunteers' unit in the German Army on the Eastern Front, during World War II.</span></font></p><font data-dcnode-id="2615" face="Arial"><a data-dcnode-id="2616" name="fsp"></a></font></font></td></tr><tr data-dcnode-id="2560"><td align="center" data-dcnode-id="2601" width="20%"><font data-dcnode-id="2602" face="Arial"><br data-dcnode-id="2608"><img align="MIDDLE" alt="Image by Pete Loeser and Tomislav Todorovic" border="1" data-dcnode-id="2607" height="124" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/peoples_front_sweden.gif&amp;raw" width="216"><br data-dcnode-id="2606"><span data-dcnode-id="2605" instrument_node="">FSP Flag</span><br data-dcnode-id="2604"><br data-dcnode-id="2603"></font></td><td data-dcnode-id="2562" valign="top" width="80%"><b data-dcnode-id="2593"><font data-dcnode-id="2594" face="Arial" size="+1"><span data-dcnode-id="2599" instrument_node="">People's Front Party 2008/Party of the Swedes 2009 (Sweden)</span><br data-dcnode-id="2598"><font data-dcnode-id="2595" size="-1"><em data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node="">Folkfronten/Svenskarnas parti</span></em></font></font></b><span data-dcnode-id="2592" instrument_node="">
</span><p data-dcnode-id="2577"><font data-dcnode-id="2578" face="Arial"><span data-dcnode-id="2591" instrument_node="">The Party of the Swedes is a nationalistic political party, active in Sweden. It was founded by members of the former </span><a data-dcnode-id="2589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/hate2.html%23nsf"><span data-dcnode-id="2590" instrument_node="">National Socialist Front</span></a><span data-dcnode-id="2588" instrument_node=""> in 2008 under the name People's Front, but was renamed in 2009 after it was revealed that a leftist party was already registered under that name. The leader of the party is Daniel Höglund, who was also one of the two leaders of the National Socialist Front. The FSP also has ties with a youth movement called the </span><a data-dcnode-id="2586" href="#fnu"><span data-dcnode-id="2587" instrument_node="">National Youth League</span></a><span data-dcnode-id="2585" instrument_node=""> (</span><i data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">Förbundet Nationell Ungdom</span></i><span data-dcnode-id="2582" instrument_node="">); although no official links exist with the party, they clearly have a close co-operation, and their leaders, according to the Swedish website </span><i data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">Expo Skola</span></i><span data-dcnode-id="2579" instrument_node="">, do have a common history of membership in the National Socialist Front.</span></font></p><font data-dcnode-id="2563" face="Arial"><span data-dcnode-id="2576" instrument_node="">
</span><p data-dcnode-id="2567"><font data-dcnode-id="2568" face="Arial"><span data-dcnode-id="2575" instrument_node="">The party flag uses a cross composed of </span><i data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">Algiz</span></i><span data-dcnode-id="2572" instrument_node=""> (elk) runes as its main design element. Karl Maria Wiligut was responsible its adoptions by the NSDAP and it was subsequently used widely on insignia and literature during the Third Reich. Various forms of the </span><i data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">Algiz</span></i><span data-dcnode-id="2569" instrument_node=""> rune are also commonly used by various Germanic Neo-pagan groups as a symbol of their religion. The flag field is yellow, the color which both symbolizes the sun and appears in the Swedish national flag.</span></font></p><font data-dcnode-id="2564" face="Arial"><span data-dcnode-id="2566" instrument_node=""> </span><a data-dcnode-id="2565" name="fv"></a></font></font></td></tr><tr data-dcnode-id="2497"><td align="center" data-dcnode-id="2538" width="20%"><font data-dcnode-id="2539" face="Arial"><br data-dcnode-id="2557"><img align="MIDDLE" alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="2556" height="124" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/ve-fv1.gif&amp;raw" width="216"><br data-dcnode-id="2555"><span data-dcnode-id="2554" instrument_node="">FV Flag</span><br data-dcnode-id="2553"><font data-dcnode-id="2551" size="-1"><span data-dcnode-id="2552" instrument_node="">(original version)</span></font><br data-dcnode-id="2550"><br data-dcnode-id="2549"><br data-dcnode-id="2548"><img align="MIDDLE" alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="2547" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/ve-fv.gif&amp;raw" width="216"><br data-dcnode-id="2546"><span data-dcnode-id="2545" instrument_node="">FV Flag</span><br data-dcnode-id="2544"><font data-dcnode-id="2542" size="-1"><span data-dcnode-id="2543" instrument_node="">(newer variant)</span></font><br data-dcnode-id="2541"><br data-dcnode-id="2540"></font></td><td data-dcnode-id="2499" valign="top" width="80%"><b data-dcnode-id="2530"><font data-dcnode-id="2535" face="Arial" size="+1"><span data-dcnode-id="2536" instrument_node="">Venezuelan Phalanx (Venezuela)</span></font><br data-dcnode-id="2534"><font data-dcnode-id="2531" size="-1"><i data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">Falange Venezolana</span></i></font></b><span data-dcnode-id="2529" instrument_node="">
</span><p data-dcnode-id="2520"><font data-dcnode-id="2521" face="Arial"><span data-dcnode-id="2528" instrument_node="">The Venezuelan Phalanx is a minor political movement modeled after the </span><a data-dcnode-id="2526" href="#fe"><span data-dcnode-id="2527" instrument_node="">Spanish Phalanx</span></a><span data-dcnode-id="2525" instrument_node="">. The use of the term </span><i data-dcnode-id="2523"><span data-dcnode-id="2524" instrument_node="">Falange</span></i><span data-dcnode-id="2522" instrument_node=""> refers to the ancient Spartan military formation and is used by several Fascist political movements and parties in Latin America.</span></font></p><font data-dcnode-id="2500" face="Arial"><span data-dcnode-id="2519" instrument_node="">
</span><p data-dcnode-id="2518"></p><div align="center" data-dcnode-id="2511"><img alt="Image by Blas Delgado Ortiz" border="1" data-dcnode-id="2517" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/pr-cross.gif&amp;raw" width="216"><br data-dcnode-id="2516"><span data-dcnode-id="2515" instrument_node="">Cross of Burgundy</span><br data-dcnode-id="2514"><font data-dcnode-id="2512" size="-1"><span data-dcnode-id="2513" instrument_node="">(Spanish historical)</span></font></div><p data-dcnode-id="2510"></p><span data-dcnode-id="2509" instrument_node="">
</span><p data-dcnode-id="2503"><font data-dcnode-id="2504" face="Arial"><span data-dcnode-id="2508" instrument_node="">The original FV flag has a black field charged with a large red arrow cross. A newer variant is modeled after the flag the Spanish Phalanx movement, but differs slightly in that it features an all-black field. This variant made its appearance in 2002. (Note: This flag is also similar in design to that of the defunct </span><a data-dcnode-id="2506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/hate2.html%23nsafp"><span data-dcnode-id="2507" instrument_node="">National Syndical American Falangist Party</span></a><span data-dcnode-id="2505" instrument_node="">.) Another flag commonly seen at FV rallies is the historical Spanish Cross of Burgundy Ensign.</span></font></p><font data-dcnode-id="2501" face="Arial"><a data-dcnode-id="2502" name="guard"></a></font></font></td></tr><tr data-dcnode-id="2368"><td align="center" data-dcnode-id="2460" width="20%"><font data-dcnode-id="2461" face="Arial"><br data-dcnode-id="2494"><img alt="Image by Pete Loeser and Tomislav Todorovic" border="1" data-dcnode-id="2493" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/ro%257Dfasc.gif&amp;raw" width="216"><br data-dcnode-id="2492"><span data-dcnode-id="2491" instrument_node="">Garda de Fier Flag 1927-1938</span><br data-dcnode-id="2490"><br data-dcnode-id="2489"><br data-dcnode-id="2488"><img alt="Image by Tomislav Todorovic and Mladen Mijatov" border="1" data-dcnode-id="2487" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/ro%257Dfasc5.gif&amp;raw" width="216"><br data-dcnode-id="2486"><span data-dcnode-id="2485" instrument_node="">Garda de Fier Flag 1938-1941</span><br data-dcnode-id="2484"><br data-dcnode-id="2483"><br data-dcnode-id="2482"><img alt="Image by Dan Anton Dima" border="1" data-dcnode-id="2481" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/ro%257Dfasc4.gif&amp;raw" width="216"><br data-dcnode-id="2480"><span data-dcnode-id="2479" instrument_node="">Garda de Fier Flag</span><br data-dcnode-id="2478"><span data-dcnode-id="2477" instrument_node="">(variant #1)</span><br data-dcnode-id="2476"><br data-dcnode-id="2475"><br data-dcnode-id="2474"><img alt="Image by Tomislav Todorovic and Mladen Mijatov" border="1" data-dcnode-id="2473" height="110" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/ro%257Dfasc6.gif&amp;raw" width="216"><br data-dcnode-id="2472"><span data-dcnode-id="2471" instrument_node="">"New" Garda de Fier Flag</span><br data-dcnode-id="2470"><font data-dcnode-id="2464" size="-1"><span data-dcnode-id="2469" instrument_node="">Not used by the original movement,</span><br data-dcnode-id="2468"><span data-dcnode-id="2467" instrument_node="">but by an organization using the same</span><br data-dcnode-id="2466"><span data-dcnode-id="2465" instrument_node="">name in the early 2000s. This variant would be also later used by the New Right Party.</span></font><br data-dcnode-id="2463"><br data-dcnode-id="2462"></font></td><td data-dcnode-id="2370" valign="top" width="80%"><b data-dcnode-id="2452"><font data-dcnode-id="2453" face="Arial" size="+1"><span data-dcnode-id="2458" instrument_node="">The Iron Guard 1927-c1940 (Romania)</span><br data-dcnode-id="2457"><font data-dcnode-id="2454" size="-1"><i data-dcnode-id="2455"><span data-dcnode-id="2456" instrument_node="">Garda de Fier</span></i></font></font></b><span data-dcnode-id="2451" instrument_node="">
</span><p data-dcnode-id="2439"><font data-dcnode-id="2440" face="Arial"><span data-dcnode-id="2450" instrument_node="">The Iron Guard was an ultra-nationalist, fascist, anti-communist, and extremist Orthodox Christian movement originally founded by Corneliu Zelea Codreanu, an anti-Semitic professor at the Bucharest University in 1927.  Originally known as "The Legion of the Archangel Michael" (</span><i data-dcnode-id="2448"><span data-dcnode-id="2449" instrument_node="">Legiunea Arhanghelului Mihail</span></i><span data-dcnode-id="2447" instrument_node="">), then renamed the "Everything for the Country" (</span><i data-dcnode-id="2445"><span data-dcnode-id="2446" instrument_node="">Totul pentru Tara</span></i><span data-dcnode-id="2444" instrument_node="">) Party, and the "The Legionnaire Movement" (</span><i data-dcnode-id="2442"><span data-dcnode-id="2443" instrument_node="">"Miscarea legionara</span></i><span data-dcnode-id="2441" instrument_node="">), but the name most commonly given to this far-right Romanian movement and political party was "The Iron Guard."</span></font></p><font data-dcnode-id="2371" face="Arial"><span data-dcnode-id="2438" instrument_node="">
</span><p data-dcnode-id="2429"><font data-dcnode-id="2430" face="Arial"><span data-dcnode-id="2437" instrument_node="">Its members wore green uniforms, thus were sometimes called "Greenshirts" (</span><i data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">Camasile verzi</span></i><span data-dcnode-id="2434" instrument_node="">), and greeted each other using the Fascist Roman salute. The main symbol used by the Iron Guard was a triple cross, standing for the prison bars of martyrdom, and sometimes referred to as the "Archangel Michael Cross" (</span><i data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">Crucea Arhanghelului Mihail</span></i><span data-dcnode-id="2431" instrument_node="">).</span></font></p><font data-dcnode-id="2372" face="Arial"><span data-dcnode-id="2428" instrument_node="">
</span><p data-dcnode-id="2422"><font data-dcnode-id="2423" face="Arial"><span data-dcnode-id="2427" instrument_node="">The Iron Guard differed from other fascist movements because its membership,  rather than the usual military veterans, came from the peasantry and students. However, the legionnaires shared the fascist love for violence and political assassinations. The black flag of the movement, with its swastika in a white circle, soon became well-known in Romania in the late 20s and the early 30s. It was originally used by the National Christian Party, a similar although less militant party, in whose founding Codreanu took part in 1923 before having broken away to found the Iron Guard.  (A tricolor with the swastika was used later by the National Christian Defense League and the </span><a data-dcnode-id="2425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/hate3.html%23pnc"><span data-dcnode-id="2426" instrument_node="">National Christian Party</span></a><span data-dcnode-id="2424" instrument_node="">) After 1938, the swastika symbol was replaced by the triple cross and the black field on their flags was normally replaced with a green, but occasionally a red one.</span></font></p><font data-dcnode-id="2373" face="Arial"><span data-dcnode-id="2421" instrument_node="">
</span><span data-dcnode-id="2420" instrument_node="">
</span><span data-dcnode-id="2419" instrument_node="">
</span><span data-dcnode-id="2415" instrument_node="">
</span><span data-dcnode-id="2412" instrument_node="">
</span><span data-dcnode-id="2408" instrument_node="">

</span><table align="center" border="0" cellpadding="2" cellspacing="2" data-dcnode-id="2386"><tbody data-dcnode-id="2387"><tr data-dcnode-id="2407"><td data-dcnode-id="2416"><div align="center" data-dcnode-id="2417"><img alt="Image by Dan Anton Dima" border="1" data-dcnode-id="2418" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/ro%257Dfasc2.gif&amp;raw" width="216"></div></td><td data-dcnode-id="2413"><span data-dcnode-id="2414" instrument_node="">&nbsp;&nbsp;&nbsp;</span></td><td data-dcnode-id="2409"><div align="center" data-dcnode-id="2410"><img alt="Image by Dan Anton Dima" border="1" data-dcnode-id="2411" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/ro%257Dfasc3.gif&amp;raw" width="216"></div></td></tr><tr data-dcnode-id="2389"><td data-dcnode-id="2400"><div align="center" data-dcnode-id="2401"><span data-dcnode-id="2404" instrument_node="">Garda de Fier Flag</span><br data-dcnode-id="2403"><span data-dcnode-id="2402" instrument_node="">(variant #2)</span></div></td><td data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">&nbsp;&nbsp;&nbsp;</span></td><td data-dcnode-id="2391"><div align="center" data-dcnode-id="2392"><span data-dcnode-id="2395" instrument_node="">Garda de Fier Flag</span><br data-dcnode-id="2394"><span data-dcnode-id="2393" instrument_node="">(variant #3)</span></div></td></tr></tbody></table><span data-dcnode-id="2385" instrument_node="">
</span><p data-dcnode-id="2382"><font data-dcnode-id="2383" face="Arial"><span data-dcnode-id="2384" instrument_node="">The movement took part in the Spanish Civil War, and they had two prominent martyrs, both close to Codreanu, who died in the battle of Majadahonda. In 1938, when Codreanu was assassinated after the Guard started its conflict with King Carol (Charles) II over his plans to convert the country into a fascist nation. A campaign of assassinations ensued by Guard "legionnaires" who formed death squads and even though they managed to kill the prime-minister, they were almost decimated in the process.  The black grid flag was completely banned by the Antonescu regime in 1941 and the new Guard leader, Horia Sima (Codreanu's successor), was sent to Buchenwald concentration camp.  He was released in 1944, became the head of the Romanian government in exile until 1945, but was never allowed to returned from exile and died in Spain.</span></font></p><font data-dcnode-id="2374" face="Arial"><span data-dcnode-id="2381" instrument_node="">
</span><p data-dcnode-id="2375"><font data-dcnode-id="2376" face="Arial"><span data-dcnode-id="2380" instrument_node="">A modern neo-Fascist successor to the Iron Guard calling themselves "</span><a data-dcnode-id="2378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/hate2.html%23nr-rm"><span data-dcnode-id="2379" instrument_node="">The New Right</span></a><span data-dcnode-id="2377" instrument_node="">" was founded in 2000.</span></font></p></font></font></font></font></td></tr><tr data-dcnode-id="2329"><td align="center" data-dcnode-id="2358" width="20%"><font data-dcnode-id="2359" face="Arial"><br data-dcnode-id="2365"><img alt="Image by Tomislav Todorovic" border="0" data-dcnode-id="2364" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/gjyp.gif&amp;raw" width="216"><br data-dcnode-id="2363"><span data-dcnode-id="2362" instrument_node="">GJYP Flag</span><br data-dcnode-id="2361"><br data-dcnode-id="2360"></font></td><td data-dcnode-id="2331" valign="top" width="80%"><b data-dcnode-id="2349"><font data-dcnode-id="2350" face="Arial" size="+1"><span data-dcnode-id="2356" instrument_node="">Great Japan Youth Party (Japan)</span><br data-dcnode-id="2355"><font data-dcnode-id="2352" size="-1"><em data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">Dai-Nippon Seinen-tō</span></em></font><span data-dcnode-id="2351" instrument_node="">
</span></font></b><span data-dcnode-id="2348" instrument_node="">
</span><p data-dcnode-id="2339"><font data-dcnode-id="2340" face="Arial"><span data-dcnode-id="2347" instrument_node="">"Great Japan Youth Party", later renamed "Great Japan Sincerity Association" (</span><em data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">Dai Nippon Sekisei-kai</span></em><span data-dcnode-id="2344" instrument_node="">), was founded in 1937 by Colonel Kingoro Hashimoto during his forced retirement from military service because of his involvement in the attempted coup d´etat of 1936. The organization was modeled after the Hitler Youth and its goal was turning Japan into a single-party totalitarian state modeled after the Third Reich. In 1940, it was grouped with other nationalist movements into the Imperial Rule Assistance Association (</span><em data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">Taisei Yokusankai</span></em><span data-dcnode-id="2341" instrument_node="">), where it served as the youth wing of the IRAA. The organization was dissolved in 1945 after the capitulation of Japan and Hashimoto was sentenced to life imprisonment.</span></font></p><font data-dcnode-id="2332" face="Arial"><span data-dcnode-id="2338" instrument_node="">
</span><p data-dcnode-id="2335"><font data-dcnode-id="2336" face="Arial"><span data-dcnode-id="2337" instrument_node="">The flag of Great Japan Youth Party was derived either from that of the Third Reich, by omitting the swastika, or from the Japanese national flag, by reversing the colors, or possibly from both of these flags. The pattern was also used on the armbands of the Nazi-style uniforms, as well as the decoration on the official documents of the party.</span></font></p><font data-dcnode-id="2333" face="Arial"><a data-dcnode-id="2334" name="gd"></a></font></font></td></tr><tr data-dcnode-id="1990"><td align="center" data-dcnode-id="2243" width="20%"><font data-dcnode-id="2293" face="Arial"><b data-dcnode-id="2322"><span data-dcnode-id="2326" instrument_node="">Golden Dawn Flags</span><br data-dcnode-id="2325"><u data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">with the Meander symbol</span></u></b><br data-dcnode-id="2321"><font data-dcnode-id="2314" size="-1"><span data-dcnode-id="2320" instrument_node="">also known as the Greek Key pattern</span><br data-dcnode-id="2319"><span data-dcnode-id="2318" instrument_node="">or the Greek fret (</span><i data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">maeandros</span></i><span data-dcnode-id="2315" instrument_node="">)</span></font><br data-dcnode-id="2313"><br data-dcnode-id="2312"><img align="MIDDLE" alt="Image by Thanos Tzikas" border="1" data-dcnode-id="2311" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/golden_dawn_pre2005_v1.jpg&amp;raw" width="216"><br data-dcnode-id="2310"><span data-dcnode-id="2309" instrument_node="">Golden Dawn Flag pre-2005</span><br data-dcnode-id="2308"><br data-dcnode-id="2307"><img align="MIDDLE" alt="Images by Thanos Tzikas, modified by Tomislav Todorovic &amp; Mladen Mijatov" border="1" data-dcnode-id="2306" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/golden_dawn_pre2005_v2.jpg&amp;raw" width="216"><br data-dcnode-id="2305"><span data-dcnode-id="2304" instrument_node="">Golden Dawn Flag pre-2005</span><br data-dcnode-id="2303"><br data-dcnode-id="2302"><img align="MIDDLE" alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="2301" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/golden_dawn_post2005_v1.jpg&amp;raw" width="216"><br data-dcnode-id="2300"><span data-dcnode-id="2299" instrument_node="">Golden Dawn Flag post-2007</span><br data-dcnode-id="2298"><br data-dcnode-id="2297"><img align="MIDDLE" alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="2296" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/golden_dawn_post2005_v2.jpg&amp;raw" width="216"><br data-dcnode-id="2295"><span data-dcnode-id="2294" instrument_node="">Golden Dawn Flag post-2007</span></font><br data-dcnode-id="2292"><br data-dcnode-id="2291"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="2290" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/gr_hrav9.gif&amp;raw" width="216"><br data-dcnode-id="2289"><span data-dcnode-id="2288" instrument_node="">Golden Dawn Flag 2010</span><br data-dcnode-id="2287"><br data-dcnode-id="2286"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="2285" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/gr_hrav10.gif&amp;raw" width="216"><br data-dcnode-id="2284"><span data-dcnode-id="2283" instrument_node="">Golden Dawn Flag 2010</span><br data-dcnode-id="2282"><font data-dcnode-id="2278" size="-1"><span data-dcnode-id="2281" instrument_node="">People's Association</span><br data-dcnode-id="2280"><span data-dcnode-id="2279" instrument_node="">of the Golden Dawn</span></font><br data-dcnode-id="2277"><br data-dcnode-id="2276"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="2275" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/gr_hrav10a.gif&amp;raw" width="216"><br data-dcnode-id="2274"><span data-dcnode-id="2273" instrument_node="">Golden Dawn 2012</span><br data-dcnode-id="2272"><font data-dcnode-id="2270" size="-1"><span data-dcnode-id="2271" instrument_node="">(Black and Gold Variant)</span></font><br data-dcnode-id="2269"><br data-dcnode-id="2268"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="2267" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/gr_hrav10b.gif&amp;raw" width="216"><br data-dcnode-id="2266"><span data-dcnode-id="2265" instrument_node="">Golden Dawn 2012</span><br data-dcnode-id="2264"><font data-dcnode-id="2262" size="-1"><span data-dcnode-id="2263" instrument_node="">(Red and White Variant)</span></font><br data-dcnode-id="2261"><br data-dcnode-id="2260"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="2259" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/gr_hrav19.gif&amp;raw" width="216"><br data-dcnode-id="2258"><span data-dcnode-id="2257" instrument_node="">Golden Dawn Flag 2013</span><br data-dcnode-id="2256"><font data-dcnode-id="2254" size="-1"><span data-dcnode-id="2255" instrument_node="">(Black and Red Variant)</span></font><br data-dcnode-id="2253"><br data-dcnode-id="2252"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="2251" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/gr_hrav20.gif&amp;raw" width="216"><br data-dcnode-id="2250"><span data-dcnode-id="2249" instrument_node="">Golden Dawn Flag 2013</span><br data-dcnode-id="2248"><font data-dcnode-id="2246" size="-1"><span data-dcnode-id="2247" instrument_node="">(Black and Red Variant without text)</span></font><br data-dcnode-id="2245"><br data-dcnode-id="2244"></td><td data-dcnode-id="1992" valign="top" width="80%"><b data-dcnode-id="2235"><font data-dcnode-id="2236" face="Arial" size="+1"><span data-dcnode-id="2241" instrument_node="">Golden Dawn (Greece)</span><br data-dcnode-id="2240"><font data-dcnode-id="2237" size="-1"><em data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">Χρυσή Αυγή (Chrysi Avyi)</span></em></font></font></b><span data-dcnode-id="2234" instrument_node="">
</span><p data-dcnode-id="2222"><font data-dcnode-id="2223" face="Arial"><span data-dcnode-id="2233" instrument_node="">The </span><i data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">Chrysi Avyi</span></i><span data-dcnode-id="2230" instrument_node=""> is the biggest extreme-rightist organization in Greece, not to be confused with the "Hermetic Order of the Golden Dawn," a peaceful society dedicated to the philosophical, spiritual, and psychic evolution of humanity.  The Greek "Golden Dawn" is anything but peaceful, and has been responsible for carrying out acts of violence and hate crimes against immigrants, political opponents and ethnic minorities.  The group favored the use of two symbols: the meander (an ancient Greek decorative pattern) and the Sun Wheel.  It ceased to exist as the separate organization in 2005, merging with the </span><i data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">Patriotiki Symmahia</span></i><span data-dcnode-id="2227" instrument_node=""> (Patriotic Alliance), which used different symbols. In 2007, the Patriotic Alliance ceased to exist and the Golden Dawn announced its re-activation (and reintroduction of the meander and sun wheel). Since then, the website of Golden Dawn has been regularly updated. The same is true for </span><i data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">Metopo Neolaeas</span></i><span data-dcnode-id="2224" instrument_node=""> (Youth Front) website, the youth wing of the organization.</span></font></p><font data-dcnode-id="1993" face="Arial"><span data-dcnode-id="2221" instrument_node="">
</span><center data-dcnode-id="2214"><font data-dcnode-id="2215" face="Arial"><b data-dcnode-id="2218"><u data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">Golden Dawn Sponsored Flags using the Sun Wheel (Celtic Cross)</span></u></b><br data-dcnode-id="2217"><span data-dcnode-id="2216" instrument_node="">These Sun Wheel variants are being used by a wide-variety of extremist groups today.</span></font></center><br data-dcnode-id="2213"><span data-dcnode-id="2212" instrument_node="">

></center></font></td></tr><tr data-dcnode-id="2108"><td data-dcnode-id="2117"><center data-dcnode-id="2118"><img align="MIDDLE" alt="Image by Tomislav Todorovic &amp; Mladen Mijatov" border="1" data-dcnode-id="2119" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/gr_hrav13.gif&amp;raw" width="216"></center></td><td data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">&nbsp;&nbsp;</span></td><td data-dcnode-id="2110"><center data-dcnode-id="2111"><img align="MIDDLE" alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="2112" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/green_wing.jpg&amp;raw" width="216"></center></td></tr><tr data-dcnode-id="2092"><td data-dcnode-id="2102"><font data-dcnode-id="2103" face="Arial"><center data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">Variant #7 (un-verified)</span></center></font></td><td data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">&nbsp;&nbsp;</span></td><td data-dcnode-id="2094"><font data-dcnode-id="2095" face="Arial"><center data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">Green Wing Youth</span></center></font></td></tr></tbody></table></center><span data-dcnode-id="2087" instrument_node="">

</span><p data-dcnode-id="2071"><font data-dcnode-id="2072" face="Arial"><span data-dcnode-id="2076" instrument_node="">The </span><i data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">Prasini Pteryga</span></i><span data-dcnode-id="2073" instrument_node=""> (Green Wing) is an ecologist organization founded by members of the youth wing of the Golden Dawn. It uses a green flag, charged with a white Celtic Cross with outer white and inner green fimbriations.</span></font></p><font data-dcnode-id="1994" face="Arial"><span data-dcnode-id="2070" instrument_node="">
</span><p data-dcnode-id="2058"><font data-dcnode-id="2059" face="Arial"><span data-dcnode-id="2069" instrument_node="">A new flag appearing in 2010 has blue field and is charged with a smaller </span><i data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">maeandros</span></i><span data-dcnode-id="2066" instrument_node=""> (meander) within a wreath, between the inscriptions </span><i data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">LAIKOS SYNDESMOS</span></i><span data-dcnode-id="2063" instrument_node=""> (People's
Association) and </span><i data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">H RYSI AYGI</span></i><span data-dcnode-id="2060" instrument_node=""> (Golden Dawn), possibly now the official name of the organization. 			
	</span></font></p><p data-dcnode-id="2054"><font data-dcnode-id="2055" face="Arial"><font data-dcnode-id="2056" face="Arial"><span data-dcnode-id="2057" instrument_node="">Another Golden Dawn flag (Variant #5), using a combination of a football (soccer) club colors (orange and blue), is now used by some fans of the Apoel Football Club of Nicosia, Cyprus.  This is an example of how ultra-rightists attempt to infiltrate normal society, and by introducing their flag to football fans as a non-political symbol, it provides them with a valuable tool of later indoctrination.</span></font></font></p><font data-dcnode-id="1995" face="Arial"><font data-dcnode-id="1996" face="Arial"><span data-dcnode-id="2053" instrument_node="">
