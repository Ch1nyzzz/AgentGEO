 Power-CSA</span></center></font></td></tr></tbody></table></center><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1093"><font data-dcnode-id="1094" face="Arial"><span data-dcnode-id="1095" instrument_node="">The variant KKK flag (red-white-red background with the center Blood Drop symbol) is commonly called the "Duke Flag" named for neo-Nazi, turned clan leader, David Duke. David Duke was also shown in KKK broadcast with a red flag (complete with centered white disk and black Sun Wheel) hanging on a wall behind him, apparently a holdover from his neo-Nazi days.</span></font></p><font data-dcnode-id="1088" face="Arial"><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1089"><font data-dcnode-id="1090" face="Arial"><span data-dcnode-id="1091" instrument_node="">In addition to the American and Confederate flags, there is a KKK "White Power" flag with fist emblem centered on a black field, that occasionally appears at Clan rallies. A new, but undocumented flag is a KKK/White Power/CSA Flag currently being sold.</span></font></p></font></font></font></td></tr><tr data-dcnode-id="1055"><td align="center" data-dcnode-id="1073" width="20%"><font data-dcnode-id="1074" face="Arial"><br data-dcnode-id="1080"><img align="MIDDLE" alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="1079" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/kkk_blue.gif&amp;raw" width="215"><br data-dcnode-id="1078"><span data-dcnode-id="1077" instrument_node="">NOKKKK Flag</span><br data-dcnode-id="1076"><br data-dcnode-id="1075"></font></td><td data-dcnode-id="1057" valign="top" width="80%"><b data-dcnode-id="1069"><font data-dcnode-id="1070" face="Arial" size="+1"><span data-dcnode-id="1071" instrument_node="">New Order Knights of the Ku Klux Klan (USA)</span></font></b><span data-dcnode-id="1068" instrument_node="">
</span><p data-dcnode-id="1065"><font data-dcnode-id="1066" face="Arial"><span data-dcnode-id="1067" instrument_node="">Another small splinter group (or individual) claiming to be part of the KKK are calling themselves the New Order Knights of the Ku Klux Klan.  Proclaiming themselves the "Blue Tunic Army," they claim that their mission is to preserve the white heritage, so future generations will know and learn from their history." They proclaim a strange combination of anti-semitism, national socialism, and Christianity claiming that National-Socialism is the way of the Aryan warrior, yet say their "dedication is to educate, not in hatred, but with pride for the race that (they) are a part of."  Not much is really known about this group.</span></font></p><font data-dcnode-id="1058" face="Arial"><span data-dcnode-id="1064" instrument_node="">
</span><p data-dcnode-id="1061"><font data-dcnode-id="1062" face="Arial"><span data-dcnode-id="1063" instrument_node="">Their flag has a silver eagle and wreath reminiscent of those used by the Third Reich centered on a light blue field, holding a KKK Blood Drop symbol where one would expect the swastika to appear.  The words "New Order Knights" in a black script are written above the badge, with the words "Ku Klux Klan" appearing below.</span></font></p><font data-dcnode-id="1059" face="Arial"><a data-dcnode-id="1060" name="lwk"></a></font></font></td></tr><tr data-dcnode-id="1016"><td align="center" data-dcnode-id="1039" width="20%"><font data-dcnode-id="1040" face="Arial"><br data-dcnode-id="1052"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="1051" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/lwk-kkk.gif&amp;raw" width="216"><br data-dcnode-id="1050"><span data-dcnode-id="1049" instrument_node="">LWK-KKK Flag 2012</span><br data-dcnode-id="1048"><br data-dcnode-id="1047"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="1046" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/lwk2-kkk.gif&amp;raw" width="216"><br data-dcnode-id="1045"><span data-dcnode-id="1044" instrument_node="">LWK-KKK Flag 2017</span><br data-dcnode-id="1043"><br data-dcnode-id="1042"><span data-dcnode-id="1041" instrument_node="">
</span></font></td><td data-dcnode-id="1018" valign="top" width="80%"><b data-dcnode-id="1035"><font data-dcnode-id="1036" face="Arial" size="+1"><span data-dcnode-id="1037" instrument_node="">Loyal White Knights of the Ku Klux Klan 2012 (USA)</span></font></b><span data-dcnode-id="1034" instrument_node="">
</span><p data-dcnode-id="1031"><font data-dcnode-id="1032" face="Arial"><span data-dcnode-id="1033" instrument_node="">Another off shoot of the Clan is the Loyal White Knights of the Ku Klux Klan, basically  another white supremacist and antisemitic neo-KKK group founded in 2012.  The Loyal White Knights of the Ku Klux Klan aims to "restore America to a White, Christian nation founded on God's word."</span></font></p><font data-dcnode-id="1019" face="Arial"><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1027"><font data-dcnode-id="1028" face="Arial"><span data-dcnode-id="1029" instrument_node="">As can be seen, the design of their 2012 flag resembles that of the Mississippi state flag, but with red at the top and blue at the bottom.  The Blood Drop emblem also differs from the one typically used on the other KKK flags. The cross of the blood drop is more similar to that of the Iron Cross, but with the colors reversed.</span></font></p><font data-dcnode-id="1020" face="Arial"><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1023"><font data-dcnode-id="1024" face="Arial"><span data-dcnode-id="1025" instrument_node="">The Loyal White Knights, as part of the broader white nationalist Alt-Right Movement, made it presence felt at the violent Charlottesville Riots of August 2017 flaunting a slightly different flag variant. Very similar to the original White Knight Flag of 2012, the new flag featured a lighter blue and red on the design than either the Confederate Battle Flag, the Mississippi State Flag, or that of the first National Stars and Bars of the Confederate States of America.</span></font></p><font data-dcnode-id="1021" face="Arial"><span data-dcnode-id="1022" instrument_node="">
</span></font></font></font></td></tr><tr data-dcnode-id="990"><td align="center" data-dcnode-id="1006" width="20%"><font data-dcnode-id="1007" face="Arial"><br data-dcnode-id="1013"><img alt="Image provided by Rick Prohaska" border="1" data-dcnode-id="1012" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/kkk_llc.gif&amp;raw" width="216"><br data-dcnode-id="1011"><span data-dcnode-id="1010" instrument_node="">KKK-LLC Flag</span><br data-dcnode-id="1009"><br data-dcnode-id="1008"></font></td><td data-dcnode-id="992" valign="top" width="80%"><b data-dcnode-id="1002"><font data-dcnode-id="1003" face="Arial" size="+1"><span data-dcnode-id="1004" instrument_node="">The Ku Klux Klan, LLC 2003 (USA)</span></font></b><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="998"><font data-dcnode-id="999" face="Arial"><span data-dcnode-id="1000" instrument_node="">Headquartered in Compton, Arkansas, the Ku Klux Klan Limited Liability Company (KKK LLC), is yet another attempt to legitimize the KKK.  A limited liability company (LLC) is a legal form of corporation that provides limited liability to its owners.  Chartered in the State of Arkansas, and working under a legal business structure, this branch of the KKK claims its actions are all completely legal and aboveboard. They pay taxes, keep legitimate financial records of all their activities, and claim to act only as a resource for Klan philosophy and its meaning.</span></font></p><font data-dcnode-id="993" face="Arial"><span data-dcnode-id="997" instrument_node="">
</span><p data-dcnode-id="994"><font data-dcnode-id="995" face="Arial"><span data-dcnode-id="996" instrument_node="">The emblem in the center of their flag is the "Triple Tau." They claim it is a symbol of Christianity dating back to the time of Christ.  According to the Klan the cross symbol (a H bisected by a T) represents the Cross, God and Christ. A variant of this flag does not have the gold border surrounding the red field.</span></font></p></font></td></tr><tr data-dcnode-id="961"><td align="center" data-dcnode-id="980" width="20%"><font data-dcnode-id="981" face="Arial"><br data-dcnode-id="987"><img align="MIDDLE" alt="Image by A.H." border="1" data-dcnode-id="986" height="130" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/libertarian_national_socialist_green_party.jpg&amp;raw" width="216"><br data-dcnode-id="985"><span data-dcnode-id="984" instrument_node="">Libertarian Green Party</span><br data-dcnode-id="983"><br data-dcnode-id="982"></font></td><td data-dcnode-id="963" valign="top" width="80%"><b data-dcnode-id="976"><font data-dcnode-id="977" face="Arial" size="+1"><span data-dcnode-id="978" instrument_node="">Libertarian National Socialist Green Party (USA)</span></font></b><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="972"><font data-dcnode-id="973" face="Arial"><span data-dcnode-id="974" instrument_node="">The Libertarian National Socialist Green Party (LNSGP), is an American organization that cites the National Socialist German Workers Party as its primary ideological inspiration, while also incorporating elements of Libertarianism and the Green movement.</span></font></p><font data-dcnode-id="964" face="Arial"><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="967"><font data-dcnode-id="968" face="Arial"><span data-dcnode-id="970" instrument_node="">It has not been established whether LNSGP has any activity or existence other than through its website. It doesn't appear to have any active membership.</span><a data-dcnode-id="969" name="lanc"></a></font></p><font data-dcnode-id="965" face="Arial"><span data-dcnode-id="966" instrument_node="">
</span></font></font></td></tr><tr data-dcnode-id="910"><td align="center" data-dcnode-id="944" width="20%"><font data-dcnode-id="945" face="Arial"><br data-dcnode-id="958"><br data-dcnode-id="957"><img alt="" border="1" data-dcnode-id="956" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/ro%257Dfasc.gif&amp;raw" width="250"><br data-dcnode-id="955"><span data-dcnode-id="954" instrument_node="">LANC Flag (1923-c.1927)</span><br data-dcnode-id="953"><br data-dcnode-id="952"><br data-dcnode-id="951"><img alt="" border="1" data-dcnode-id="950" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/ro%257Dpnc.gif&amp;raw" width="216"><br data-dcnode-id="949"><span data-dcnode-id="948" instrument_node="">LANC Flag (c.1927-1935)</span><br data-dcnode-id="947"><br data-dcnode-id="946"></font></td><td data-dcnode-id="912" valign="top" width="80%"><b data-dcnode-id="936"><font data-dcnode-id="941" face="Arial" size="+1"><span data-dcnode-id="942" instrument_node="">National Christian Defense League 1923-1935 (Romania)</span></font><br data-dcnode-id="940"><font data-dcnode-id="937" face="Arial" size="-1"><i data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Liga Apararii National Crestine - LANC</span></i></font></b><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="926"><font data-dcnode-id="927" face="Arial"><span data-dcnode-id="934" instrument_node="">National Christian Defense League was founded in 1923, by transformation of the National Christian Union </span><i data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">(Uniunea National Crestina)</span></i><span data-dcnode-id="931" instrument_node="">, which was founded previous year. Founder and leader of both parties was Alexandru C. Cuza, a politician already known after his extreme anti-Semitism, in service of which he was using even the proposals that would otherwise sound progressive for those times, like universal male suffrage and land reform. Second position in the new party was held by Corneliu Zelea Codreanu, whose political mentor Cuza was during previous years. The flag of National Christian Defense League was black with a white disc charged with a black swastika, all within a border in national colors. According to Codreanu, black field was the symbol of mourning, white disc symbolized the "hopes surrounded by the darkness they will have to conquer", while the swastika was adopted as the worldwide symbol of anti-Semitism. The last statement suggests that the symbol was actually borrowed from the Nazis of Germany, although Cuza later claimed that it was used in Romania since 1910, when he took part in founding of the Democratic Nationalist Party </span><i data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">(Partidul Nationalist Democrat)</span></i><span data-dcnode-id="928" instrument_node="">, from which he later broke away to found the National Christian Union, the party whose use of the swastika is indeed verified.</span></font></p><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="913"><font data-dcnode-id="914" face="Arial"><span data-dcnode-id="924" instrument_node="">Although the National Christian Defense League drew inspiration from Italian Fascism and German Nazism, it was not as militant as these movements and Cuza was constantly refusing Codreanu's proposals to turn the party into a militia. This eventually caused a split in 1927, when Codreanu broke away to found the Iron Guard. New movement quickly took many supporters from the National Christian Defense League, which managed to survive, although somewhat weakened, until 1935, when it merged with the National Agrarian Party </span><i data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">(Partidul National Agrar)</span></i><span data-dcnode-id="921" instrument_node=""> to form the </span><a data-dcnode-id="919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/hate3.html%23pnc"><span data-dcnode-id="920" instrument_node="">National Christian Party</span></a><span data-dcnode-id="918" instrument_node=""> </span><i data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">(Partidul National Crestin)</span></i><span data-dcnode-id="915" instrument_node="">. Some time after the split, the National Christian Defense League adopted a new flag, Romanian tricolor with a black swastika in the center, which it transferred to its successor in 1935.</span></font></p></td></tr><tr data-dcnode-id="874"><td align="center" data-dcnode-id="899" width="20%"><font data-dcnode-id="900" face="Arial"><br data-dcnode-id="907"><br data-dcnode-id="906"><img alt="Image from Pete Loeser" border="1" data-dcnode-id="905" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/pk-let.gif&amp;raw" width="218"><br data-dcnode-id="904"><span data-dcnode-id="903" instrument_node="">LeT Flag</span><br data-dcnode-id="902"><br data-dcnode-id="901"></font></td><td data-dcnode-id="876" valign="top" width="80%"><b data-dcnode-id="891"><font data-dcnode-id="896" face="Arial" size="+1"><span data-dcnode-id="897" instrument_node="">Army of the Good (Pakistan)</span></font><br data-dcnode-id="895"><font data-dcnode-id="892" face="Arial" size="-1"><i data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Lashkar-e-Taiba (LeT)</span></i></font></b><span data-dcnode-id="890" instrument_node="">
</span><p data-dcnode-id="884"><font data-dcnode-id="885" face="Arial"><span data-dcnode-id="889" instrument_node="">The </span><i data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Lashkar-e-Taiba</span></i><span data-dcnode-id="886" instrument_node="">, or Army of the Good (Righteous, Pure, etc.), is one of the largest and most active terrorist organizations in South Asia, operating mainly from Pakistan. It was founded in 1987 in Afghanistan, with funding from Osama Bin Laden. Its headquarters is in Muridke (Punjab province of Pakistan), but the group operates several training camps in Kashmir. 
	</span></font></p><p data-dcnode-id="877"><font data-dcnode-id="878" face="Arial"><font data-dcnode-id="879" face="Arial"><span data-dcnode-id="883" instrument_node=""> The LeT has been banned as a terrorist organization by India, the United States, the United Kingdom, the European Union, Russia, and Australia.  Although it's political arm, </span><i data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Jamat ud Dawah</span></i><span data-dcnode-id="880" instrument_node=""> (JUD), has also been banned since 2015, the Pakistani government seems to still allow it to work openly as a "charitable" organization.</span></font></font></p></td></tr><tr data-dcnode-id="734"><td align="center" data-dcnode-id="832" width="20%"><font data-dcnode-id="833" face="Arial"><br data-dcnode-id="871"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="870" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/lt_litas.gif&amp;raw" width="216"><br data-dcnode-id="869"><span data-dcnode-id="868" instrument_node="">LITAS Flag</span><br data-dcnode-id="867"><br data-dcnode-id="866"><br data-dcnode-id="865"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="864" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/lt_lnsv1.gif&amp;raw" width="216"><br data-dcnode-id="863"><span data-dcnode-id="862" instrument_node="">LNSVS Flag</span><br data-dcnode-id="861"><span data-dcnode-id="860" instrument_node="">(unverified)</span><br data-dcnode-id="859"><br data-dcnode-id="858"><br data-dcnode-id="857"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="856" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/unified_lithuanian_workers_movement1.gif&amp;raw" width="216"><br data-dcnode-id="855"><span data-dcnode-id="854" instrument_node="">VLNDS "National" Flag</span><br data-dcnode-id="853"><br data-dcnode-id="852"><br data-dcnode-id="851"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="850" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/unified_lithuanian_workers_movement2.gif&amp;raw" width="216"><br data-dcnode-id="849"><span data-dcnode-id="848" instrument_node="">VLNDS "Party" Flag</span><br data-dcnode-id="847"><br data-dcnode-id="846"><br data-dcnode-id="845"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="844" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/lt_ltds.gif&amp;raw" width="216"><br data-dcnode-id="843"><span data-dcnode-id="842" instrument_node="">LTDS Flag</span><br data-dcnode-id="841"><br data-dcnode-id="840"><br data-dcnode-id="839"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="838" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/lithuanian_national_socialist_party.gif&amp;raw" width="216"><br data-dcnode-id="837"><span data-dcnode-id="836" instrument_node="">LNSP Flag</span><br data-dcnode-id="835"><br data-dcnode-id="834"></font></td><td data-dcnode-id="736" valign="top" width="80%"><b data-dcnode-id="824"><font data-dcnode-id="829" face="Arial" size="+1"><span data-dcnode-id="830" instrument_node="">Lithuanian National Union (Lithuania)</span></font><br data-dcnode-id="828"><font data-dcnode-id="825" size="-1"><em data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Lietuviu` Tautos Sa`junga - LITAS</span></em></font></b><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="820"><font data-dcnode-id="821" face="Arial"><span data-dcnode-id="822" instrument_node="">The Lithuanian National Union, founded 2011, is the most current neo-Nazi party in Lithuania. It is the successor of a host of previous neo-Nazi organizations. To name a few:
</span></font></p><ul data-dcnode-id="787"><font data-dcnode-id="788" face="Arial"><span data-dcnode-id="819" instrument_node="">
</span><li data-dcnode-id="814"><span data-dcnode-id="818" instrument_node="">Lithuanian Union of National Socialist Unity (LNSVS) - </span><i data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">Lietuviu` Nacionalsocialine's Vienybe's Sa`junga</span></i><span data-dcnode-id="815" instrument_node=""> (1996-1999)</span></li><span data-dcnode-id="813" instrument_node="">
</span><li data-dcnode-id="808"><span data-dcnode-id="812" instrument_node="">Lithuanian National Democratic Party (LNDP) - </span><i data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Lietuvos Nacionaldemokratu` Partija</span></i><span data-dcnode-id="809" instrument_node=""> (founded independently 1999-2009)</span></li><span data-dcnode-id="807" instrument_node="">
</span><li data-dcnode-id="802"><span data-dcnode-id="806" instrument_node="">Lithuanian National Labour Union (LTDS) - </span><i data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Lietuviu` Tautinio Darbo Sa`junga</span></i><span data-dcnode-id="803" instrument_node=""> (1999-2000)</span></li><span data-dcnode-id="801" instrument_node="">
</span><li data-dcnode-id="796"><span data-dcnode-id="800" instrument_node="">Lithuanian National Socialist Party (LNSP) </span><i data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Lietuviu` Nacionalsocialine' Partija</span></i><span data-dcnode-id="797" instrument_node=""> (2000-2001)</span></li><span data-dcnode-id="795" instrument_node="">
</span><li data-dcnode-id="790"><span data-dcnode-id="794" instrument_node="">Unified Lithuanian National Workers Movement (VLNDS) - </span><i data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Vieningasis Lietuviu` Nacionaldarbininku` Sa`ju^dis</span></i><span data-dcnode-id="791" instrument_node=""> (2007-2011)</span></li><span data-dcnode-id="789" instrument_node="">
</span></font></ul><font data-dcnode-id="737" face="Arial"><span data-dcnode-id="786" instrument_node="">
All of these organizations, except the LNDP, were founded and led by the same man, Lithuanian neo-Nazi activist Mindaugas Murza (also known as Mindaugas Gervaldas). Each of these Lithuanian National Socialist Parties used a range of flags, many of which are derived from those of their predecessors.
Regardless of their varying names and flags, members of all these groups attacked Lithuania's minorities of Jews, Poles and Russians, and demanded that these minorities be made to leave Lithuania. They also advocated restrictions on immigration and on the import of foreign goods and expressed doubts about whether Lithuania should seek EU membership. Mindaugas Murza compared globalism to Zionism, and preaches hatred of the Jews (anti-Semitism) and other Nazi policies, including paraphrasing the German National Socialist slogan with "Lithuania, wake up!" Murza was imprisoned for his activities, but his followers still occasionally cause trouble.</span><p data-dcnode-id="785"></p><span data-dcnode-id="784" instrument_node="">

</span><span data-dcnode-id="751" instrument_node="">
</span><span data-dcnode-id="749" instrument_node="">
</span><table align="center" border="0" cellpadding="2" cellspacing="2" data-dcnode-id="747"><tbody data-dcnode-id="748"><tr data-dcnode-id="770"><td data-dcnode-id="779"><div align="center" data-dcnode-id="780"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="781" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/unified_lithuanian_workers_movement3.gif&amp;raw" width="216"></div></td><td data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;</span></td><td data-dcnode-id="772"><div align="center" data-dcnode-id="773"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="774" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/unified_lithuanian_workers_movement4.gif&amp;raw" width="216"></div></td></tr><tr data-dcnode-id="750"><td data-dcnode-id="762"><div align="center" data-dcnode-id="763"><span data-dcnode-id="767" instrument_node="">LNDP Flag</span><br data-dcnode-id="766"><font data-dcnode-id="764" size="-1"><span data-dcnode-id="765" instrument_node="">(also briefly used by VLNDS)</span></font></div></td><td data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;</span></td><td data-dcnode-id="752"><div align="center" data-dcnode-id="753"><span data-dcnode-id="757" instrument_node="">LNSVS Flag</span><br data-dcnode-id="756"><font data-dcnode-id="754" size="-1"><span data-dcnode-id="755" instrument_node="">(used by LNDP and VLNDS as a "heritage" flag)</span></font></div></td></tr></tbody></table><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="743"><font data-dcnode-id="744" face="Arial"><span data-dcnode-id="745" instrument_node="">The VLNDS flag most frequently used was originally described as the "National" flag. The party described the cross as the combination of two swastikas, one right-facing and one left-facing. The flag they called the "Honor" flag has never appeared in any public demonstrations and was perhaps only used during private meetings, if any copies were made at all, for its design was never made known to the public. The VLNDS "Party" flag ("Organizational" flag, as it was called by them) was shown at the party website, but its actual use was not verifed so far. It is derived from the flag used by the LNDP in 2001-2007 (while Murza and his followers were its members) and also by the VLNDS in early 2007, but the white disc and black cross of the original design were reduced in size and superimposed over a "Black Sun," a well-known Nazi symbol, depicted here in gold color. To denote its ideological heritage, the VLNDS also sometimes used the flags of the Lithuanian Union of National Socialist Unity and the Lithuanian National Socialist Party.</span></font></p><font data-dcnode-id="738" face="Arial"><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="739"><font data-dcnode-id="740" face="Arial"><span data-dcnode-id="741" instrument_node="">The flag of the Lithuanian Union of National Socialist Unity (LNSVS) which featured a white swastika on a white outlined red disc placed on a red field, was most likely the flag of some earlier neo-Nazi group, because it does seem to be more traditional, and there have been many similar organizations previously in Lithuania. Their verified flag was similar to that of the LNDP, but was charged with a cross crosslet instead of the cross potent. The Lithuanian National Labour Union (LTDS), founded by a re-organization of the Lithuanian Union of National Socialist Unity (LNSVS), but replaced almost imediately the next year, used a flag that had a red cross crosslet on white field which differed from most used among the neo-Nazi groups in Lithuania that all favored red fields. Its replacement, the Lithuanian National Socialist Party (LNSP), used a red flag charged with a white cross crosslet on a white outlined red disc; the dark shade of red was also sometimes attributed to other flags used, but was verified only for this one.</span></font></p></font></font></td></tr><tr data-dcnode-id="700"><td align="center" data-dcnode-id="723" width="20%"><font data-dcnode-id="724" face="Arial"><br data-dcnode-id="731"><img alt="Image by Ivan Sache" border="1" data-dcnode-id="730" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/fr_lorna.gif&amp;raw" width="150"><br data-dcnode-id="729"><span data-dcnode-id="728" instrument_node="">LN/PNF-L Flag</span><br data-dcnode-id="727"><br data-dcnode-id="726"></font></td><td data-dcnode-id="702" valign="top" width="80%"><b data-dcnode-id="714"><font data-dcnode-id="715" face="Arial" size="+1"><span data-dcnode-id="721" instrument_node="">Nationalist Lorraine (France)</span><br data-dcnode-id="720"><font data-dcnode-id="717" size="-1"><i data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Lorraine Nationaliste</span></i></font><span data-dcnode-id="716" instrument_node=""> </span></font></b><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="708"><font data-dcnode-id="709" face="Arial"><span data-dcnode-id="712" instrument_node="">Nationalist Lorraine was established in French region of Lorraine in December 2012 as the local branch of the French Work. After the latter was dissolved in 2013, the Nationalist Lorraine kept operating and eventually joined the newly formed </span><a data-dcnode-id="711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/hate3.html%23pnf"></a><span data-dcnode-id="710" instrument_node="">French Nationalist Party (PNF) in 2015, as the PNF Lorraine.</span></font></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="704"><font data-dcnode-id="705" face="Arial"><span data-dcnode-id="706" instrument_node="">The flag of Nationalist Lorraine / PNF Lorraine is derived from that of the French Work, by replacing original blue and red colors with red and yellow, respectively, and addition of a white alerion in each red quarter. An alerion is a heraldic charge which looks like a small and simplified image of an eagle and appears in the traditional heraldic banner of Lorraine, from which the arrangement of colors is also borrowed. The use of flags and arms of traditional provinces is widely spread among French ultra-rightists, many of whom wish to re-establish the traditional administrative division of the country.</span></font></p><a data-dcnode-id="703" name="loef"></a></td></tr><tr data-dcnode-id="634"><td align="center" data-dcnode-id="677" width="20%"><font data-dcnode-id="678" face="Arial"><br data-dcnode-id="697"><img alt="Image by Ivan Sache" border="1" data-dcnode-id="696" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/french_work1.gif&amp;raw" width="150"><br data-dcnode-id="695"><span data-dcnode-id="694" instrument_node="">LOEF Party Standard</span><br data-dcnode-id="693"><br data-dcnode-id="692"><img alt="Image by Ivan Sache and Tomislav Todorovic" border="1" data-dcnode-id="691" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/french_work3.gif&amp;raw" width="150"><br data-dcnode-id="690"><span data-dcnode-id="689" instrument_node="">LOEF Party Standard</span><br data-dcnode-id="688"><font data-dcnode-id="686" size="-1"><span data-dcnode-id="687" instrument_node="">(2008 variant)</span></font><br data-dcnode-id="685"><br data-dcnode-id="684"><img alt="Image by Ivan Sache" border="1" data-dcnode-id="683" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/french_work2.gif&amp;raw" width="150"><br data-dcnode-id="682"><span data-dcnode-id="681" instrument_node="">LOEF Secretariat flag</span><br data-dcnode-id="680"><br data-dcnode-id="679"></font></td><td data-dcnode-id="636" valign="top" width="80%"><b data-dcnode-id="668"><font data-dcnode-id="669" face="Arial" size="+1"><span data-dcnode-id="675" instrument_node="">The French Work (France)</span><br data-dcnode-id="674"><font data-dcnode-id="671" size="-1"><i data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">L'Œuvre française</span></i></font><span data-dcnode-id="670" instrument_node=""> </span></font></b><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="661"><font data-dcnode-id="662" face="Arial"><span data-dcnode-id="666" instrument_node="">The French Work is a French ultranationalist movement, founded in 1968 by Pierre Sidos. Sidos has a long history of founding, providing leadership, and memberships in a variety of different extremist groups such as Young Nation, the Nationalist Party, 13 May People's Movement, Organization of the Secrete Army, to name just a few. Most of these organizations were banned by the French government for being either anti-semitic, neo-Nazi, racist, or prone to violence. Somehow, the French Work has remained marginally legal in the French political picture. The </span><i data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">L'Œuvre française</span></i><span data-dcnode-id="663" instrument_node=""> main goal seems to be replacing the French Republic with a new monarchy whose goal would be to return France to its "historic role and civilizing mission."</span></font></p><font data-dcnode-id="637" face="Arial"><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="651"><font data-dcnode-id="652" face="Arial"><span data-dcnode-id="659" instrument_node="">On the </span><i data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">L'Œuvre française</span></i><span data-dcnode-id="656" instrument_node=""> website there is much discussion on the origins and meaning of the "Celtic Cross" and its meaning and use as the party standard, explaining that they "rightfully consider the Celtic Cross as their oldest national emblem, without fearing any kind of comparison," one would guess, to the </span><i data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">swastika</span></i><span data-dcnode-id="653" instrument_node=""> used by the German Third Reich and the Celtic Crosses used by many other neo-Nazi nationalist groups. Another symbol of the movement was the "Triple Ensign" - three plain square flags flown together, each in one of the national colors.</span></font></p><font data-dcnode-id="638" face="Arial"><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="644"><font data-dcnode-id="645" face="Arial"><span data-dcnode-id="649" instrument_node="">The Four-Quartered flag was reported to have been used as the emblem of the LOEF Secretariat during the Nationalist Congress (</span><i data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Congrés nationaliste</span></i><span data-dcnode-id="646" instrument_node="">), a gathering of various French ultra-rightist organizations which took place in year 2008. A variant of the party standard, with blue and red areas within the Celtic cross changed into gold, was used at the same event.</span></font></p><font data-dcnode-id="639" face="Arial"><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="640"><font data-dcnode-id="641" face="Arial"><span data-dcnode-id="642" instrument_node="">The French Work was banned in July 2013, along with several other ultra-rightist groups, after the street fighting which took place in Paris previous month resulted in death of one anti-Fascist. It had already been pushed aside in 2011, when Marine Le Pen became President of the National Front and decided to distance the party from more extremist groups, expelling the leaders of French Work and others with "double membership". After the dissolution, former members of the French Work have founded a number of new organizations, sometimes using its flag as the model for their new ones.</span></font></p></font></font></font></td></tr><tr data-dcnode-id="604"><td align="center" data-dcnode-id="626" width="20%"><font data-dcnode-id="627" face="Arial"><br data-dcnode-id="631"><img alt="Image by Ivan Sache and Tomislav Todorovic" border="1" data-dcnode-id="630" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/the_caryatids.gif&amp;raw" width="150"><br data-dcnode-id="629"><span data-dcnode-id="628" instrument_node="">LOEF Caryatids Flag</span></font></td><td data-dcnode-id="606" valign="top" width="80%"><b data-dcnode-id="617"><font data-dcnode-id="618" face="Arial" size="+1"><span data-dcnode-id="624" instrument_node="">The Caryatids (France)</span><br data-dcnode-id="623"><font data-dcnode-id="620" size="-1"><i data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Les Caryatides</span></i></font><span data-dcnode-id="619" instrument_node=""> </span></font></b><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="613"><font data-dcnode-id="614" face="Arial"><span data-dcnode-id="615" instrument_node="">The Caryatids was the women's wing of The French Work (LOEF), the ultranationalist movement founded in 1968 and banned in 2013. Not dissolved, The Caryatids kept operating and eventually joined the newly formed French Nationalist Party in 2015, to continue as its women's wing.</span></font></p><font data-dcnode-id="607" face="Arial"><span data-dcnode-id="612" instrument_node="">
</span><p data-dcnode-id="609"><font data-dcnode-id="610" face="Arial"><span data-dcnode-id="611" instrument_node="">The flag of The Caryatids is blue with a white Celtic cross, superimposed with a yellow cross flory, i.e. whose arms end with fleurs-de-lis. An orchid flower in proper colors is placed over all in center. The flag design is derived from that of the French Work.</span></font></p><span data-dcnode-id="608" instrument_node="">
</span></font></td></tr><tr data-dcnode-id="574"><td align="center" data-dcnode-id="596" width="20%"><font data-dcnode-id="597" face="Arial"><br data-dcnode-id="601"><img alt="Image by Ivan Sache" border="1" data-dcnode-id="600" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/nationalist_youth_france.gif&amp;raw" width="216"><br data-dcnode-id="599"><span data-dcnode-id="598" instrument_node="">LOEF-JN Flag</span></font></td><td data-dcnode-id="576" valign="top" width="80%"><b data-dcnode-id="587"><font data-dcnode-id="588" face="Arial" size="+1"><span data-dcnode-id="594" instrument_node="">Nationalist Youth (France)</span><br data-dcnode-id="593"><font data-dcnode-id="590" size="-1"><i data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Jeunesses Nationalistes</span></i></font><span data-dcnode-id="589" instrument_node=""> </span></font></b><span data-dcnode-id="586" instrument_node="">
</span><p data-dcnode-id="583"><font data-dcnode-id="584" face="Arial"><span data-dcnode-id="585" instrument_node="">The Nationalist Youth (JN) was established, as the youth branch of French Work (LOEF), in October 2011 during the 14th Forum of the Nation, organized in Lyon. Its activism, often leading to violence, eventually made it one of the organizations, together with the French Work, which were banned in July 2013.</span></font></p><font data-dcnode-id="577" face="Arial"><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="579"><font data-dcnode-id="580" face="Arial"><span data-dcnode-id="581" instrument_node="">The flag of the Nationalist Youth is white with the movement emblem: an eagle of Fascist inspiration, holding a fasces in its claws and surrounded by a wreath of laurel, all in gold color and set atop a black scroll bearing the movement name in golden letters. The laurel branches are, most probably, modelled on of the Fred Perry sportswear brand logo. Fred Perry shirts are equally prized by the skinheads and the antifas, as well as various other youth groups; the riot that eventually lead to dissolution of the French Work and Nationalist Youth 
had actually started when the two rival groups unexpectedly met at a Fred Perry private sale.</span></font></p><span data-dcnode-id="578" instrument_node="">
</span></font></td></tr><tr data-dcnode-id="527"><td align="center" data-dcnode-id="548" width="20%"><font data-dcnode-id="549" face="Arial"><br data-dcnode-id="567"><img alt="" border="1" data-dcnode-id="566" height="153" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/ug-lra.gif&amp;raw" width="217"><br data-dcnode-id="565"><span data-dcnode-id="564" instrument_node="">Speculative Flag of the LRA</span><br data-dcnode-id="563"><font data-dcnode-id="561" size="-1"><span data-dcnode-id="562" instrument_node="">(possible reported color pattern)</span></font><br data-dcnode-id="560"><br data-dcnode-id="559"><br data-dcnode-id="558"><img alt="Image by Pete Loeser" border="1" data-dcnode-id="557" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/lords_resistance_army.gif&amp;raw" width="216"><br data-dcnode-id="556"><span data-dcnode-id="555" instrument_node="">Speculative Flag of the LRA </span><br data-dcnode-id="554"><font data-dcnode-id="552" size="-1"><span data-dcnode-id="553" instrument_node="">(reported, but questioned)</span></font><br data-dcnode-id="551"><br data-dcnode-id="550"></font></td><td data-dcnode-id="529" valign="top" width="80%"><b data-dcnode-id="544"><font data-dcnode-id="545" face="Arial" size="+1"><span data-dcnode-id="546" instrument_node="">Lord's Resistance Army (Uganda)</span></font></b><span data-dcnode-id="543" instrument_node="">
</span><p data-dcnode-id="540"><font data-dcnode-id="541" face="Arial"><span data-dcnode-id="542" instrument_node="">The Lord's Resistance Army (Lord's Resistance Movement), led by Joseph Kony, who proclaims himself the spokes person of God and the Holy Spirit, is a militant terrorist group which was started in 1987 in the Acholi region of Northern Uganda. The LRA operates in northern Uganda, South Sudan, the Democratic Republic of Congo and the Central African Republic. The LRA has been blamed for widespread human rights violations, including reported murder, abduction, mutilation, cannibalism, sexual enslavement, and seizing child conscripts to participate their terrorists activities. The LRA forces are now shrunken in size and on the defensive, with Ugandan Defense Forces, aided by American Special Forces commando trainers, determined to put an end to their violent activities. The remaining LRA forces appear to be now mostly active in the Orientale province of the Democratic Republic of the Congo, where the DRC provides a safe zone and refuses to allow Ugandan troops to enter in pursuit of the LRA.</span></font></p><font data-dcnode-id="530" face="Arial"><span data-dcnode-id="539" instrument_node="">
</span><p data-dcnode-id="536"><font data-dcnode-id="537" face="Arial"><span data-dcnode-id="538" instrument_node="">The illustrated red-black-blue striped flag, although commonly presented as the LRA flag, might, according to Vexillologist Jaume Ollé, be a variant of a South Sudanese Liberation Movement flag photographed with South Sudanese guerrilla fighters operating within North Uganda and mistaken for the LRA.  The colors are, however, the same as those used by the Uganda People's Congress Party, but with the top red-black stripes reversed. Many Ugandans still associate the UPC party with the military excesses of the past and especially the rule of the Military Junta of the early 1980s and the resulting civil war.</span></font></p><font data-dcnode-id="531" face="Arial"><span data-dcnode-id="535" instrument_node="">
</span><p data-dcnode-id="532"><font data-dcnode-id="533" face="Arial"><span data-dcnode-id="534" instrument_node="">According to Ollé, the Lord's Resistance Army flag is a bicolored striped flag (either red-yellow or yellow-red) of two horizontal stripes (these colors are also present on the LRA uniforms). He adds that the flag is defaced with an emblem showing a half moon, a star, law tables, and a heart in the design. Unfortunately neither his red-yellow flag, or the commonly accepted red-black-blue flag, have been reliably documented, and since contact with the LRA is difficult, exactly which flag they are using, if any, remains a mystery.</span></font></p></font></font></td></tr><tr data-dcnode-id="489"><td align="center" data-dcnode-id="515" width="20%"><font data-dcnode-id="516" face="Arial"><br data-dcnode-id="524"><img align="MIDDLE" alt="Image by Antonio Martins" border="1" data-dcnode-id="523" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/new_right_party_romania_2.jpg&amp;raw" width="216"><br data-dcnode-id="522"><span data-dcnode-id="521" instrument_node="">MAN Flag</span><br data-dcnode-id="520"><span data-dcnode-id="519" instrument_node="">(Variant)</span><br data-dcnode-id="518"><br data-dcnode-id="517"></font></td><td data-dcnode-id="491" valign="top" width="80%"><b data-dcnode-id="507"><font data-dcnode-id="508" face="Arial" size="+1"><span data-dcnode-id="513" instrument_node="">National Action Movement (Portugal)</span><br data-dcnode-id="512"><font data-dcnode-id="509" size="-1"><em data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Movimento de Acção Nacional</span></em></font></font></b><span data-dcnode-id="506" instrument_node="">
</span><p data-dcnode-id="500"><font data-dcnode-id="501" face="Arial"><span data-dcnode-id="505" instrument_node="">The </span><i data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Movimento de Acção Nacional</span></i><span data-dcnode-id="502" instrument_node=""> (MAN) was a "classical" European-type neo-Nazi style movement, which operated from 1986 to 1992. They used a white lined Celtic Cross (Sun Wheel) on black flag. Technically, this was not a party, but a neo-fascist movement connected with groups of "skinheads" and football supporters.</span></font></p><font data-dcnode-id="492" face="Arial"><span data-dcnode-id="499" instrument_node="">
</span><p data-dcnode-id="495"><font data-dcnode-id="496" face="Arial"><span data-dcnode-id="498" instrument_node="">After the murder of a black man in Lisbon by these skinheads, they where outlawed by court order because the Portuguese constitution prohibits organized movements that promote fascist ideology.</span><a data-dcnode-id="497" name="mans"></a></font></p><font data-dcnode-id="493" face="Arial"><span data-dcnode-id="494" instrument_node="">
</span></font></font></td></tr><tr data-dcnode-id="453"><td align="center" data-dcnode-id="479" width="20%"><font data-dcnode-id="480" face="Arial"><br data-dcnode-id="486"><img align="MIDDLE" alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="485" height="130" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/mans_chile.gif&amp;raw" width="216"><br data-dcnode-id="484"><span data-dcnode-id="483" instrument_node="">MANS Flag</span><br data-dcnode-id="482"><br data-dcnode-id="481"></font></td><td data-dcnode-id="455" valign="top" width="80%"><b data-dcnode-id="470"><font data-dcnode-id="471" face="Arial" size="+1"><span data-dcnode-id="477" instrument_node="">Movement of National Socialist Action of Chile</span><br data-dcnode-id="476"><font data-dcnode-id="473" size="-1"><em data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Movimiento de Acción Nacional Socialista de Chile (MANS)</span></em></font><span data-dcnode-id="472" instrument_node=""> </span></font></b><span data-dcnode-id="469" instrument_node="">
</span><p data-dcnode-id="457"><font data-dcnode-id="458" face="Arial"><span data-dcnode-id="468" instrument_node="">Founded in 1996 as the Horst Wessel Standard (</span><i data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">Standarte Horst Wessel</span></i><span data-dcnode-id="465" instrument_node="">), this group adopted its present name in 2000. It claims the succession to the </span><a data-dcnode-id="463" href="#mnsc"><span data-dcnode-id="464" instrument_node="">National Socialist Movement of Chile</span></a><span data-dcnode-id="462" instrument_node=""> and the </span><a data-dcnode-id="460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/hate3.html%23pnso"><span data-dcnode-id="461" instrument_node="">National Socialist Workers Party of Chile</span></a><span data-dcnode-id="459" instrument_node="">. Its flag is red, with a large white disc in center, charged with an oak wreath surrounding a spade between two wheat-ears, all in black; the charges in center are borrowed from the flag used by the National Labour Service of the Third Reich, but are differently shaped. Abbreviation MANS is inscribed in white in canton.</span></font></p><span data-dcnode-id="456" instrument_node="">
</span></td></tr><tr data-dcnode-id="377"><td align="center" data-dcnode-id="428" width="20%"><font data-dcnode-id="429" face="Arial"><br data-dcnode-id="450"><img alt="Image by Pete Loeser" border="1" data-dcnode-id="449" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/pnsf.gif&amp;raw" width="216"><br data-dcnode-id="448"><span data-dcnode-id="447" instrument_node="">PNSF Flag</span><br data-dcnode-id="446"><br data-dcnode-id="445"><img alt="Image from NDNMP Website" border="1" data-dcnode-id="444" height="130" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/ndmp1.jpg&amp;raw" width="216"><br data-dcnode-id="443"><span data-dcnode-id="442" instrument_node="">NDNMP Flag</span><br data-dcnode-id="441"><br data-dcnode-id="440"><img alt="Image by Pete Loeser" border="1" data-dcnode-id="439" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/pdf.gif&amp;raw" width="216"><br data-dcnode-id="438"><span data-dcnode-id="437" instrument_node="">PDF Flag</span><br data-dcnode-id="436"><br data-dcnode-id="435"><img alt="Image by Pete Loeser" border="1" data-dcnode-id="434" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/pfnf1.gif&amp;raw" width="216"><br data-dcnode-id="433"><span data-dcnode-id="432" instrument_node="">PFNF Flag</span><br data-dcnode-id="431"><br data-dcnode-id="430"></font></td><td data-dcnode-id="379" valign="top" width="80%"><b data-dcnode-id="402"><font data-dcnode-id="409" face="Arial" size="+1"><span data-dcnode-id="426" instrument_node="">National Socialist Party of the Philippines 1930 (Philippines)</span><br data-dcnode-id="425"><font data-dcnode-id="422" size="-1"><i data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Partido Nacional Socialismo de Filipinas (PNSF)</span></i></font><br data-dcnode-id="421"><span data-dcnode-id="420" instrument_node="">Nationalist Democratic Maharlikan Party 2009</span><br data-dcnode-id="419"><font data-dcnode-id="416" size="-1"><i data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">Partido democrático nacionalista de Maharlikan (NDNMP)</span></i></font><br data-dcnode-id="415"><span data-dcnode-id="414" instrument_node="">Right-wing Party of the Philippines 2010</span><br data-dcnode-id="413"><font data-dcnode-id="410" size="-1"><i data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Partido Derechista de Filipinas (PDF)</span></i></font></font><br data-dcnode-id="408"><span data-dcnode-id="407" instrument_node="">National Fascist Party of the Philippines 2012</span><br data-dcnode-id="406"><font data-dcnode-id="403" size="-1"><i data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">Partido Fascista Nacional de Filipinas (PFNF)</span></i></font></b><span data-dcnode-id="401" instrument_node="">
</span><p data-dcnode-id="400"></p><div align="center" data-dcnode-id="396"><img alt="Image from NDNMP Website" border="1" data-dcnode-id="399" height="159" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/ndmp_logo.gif&amp;raw" width="158"><br data-dcnode-id="398"><span data-dcnode-id="397" instrument_node="">NDNMP Logo/Emblem</span></div><p data-dcnode-id="395"></p><span data-dcnode-id="394" instrument_node="">
</span><p data-dcnode-id="385"><font data-dcnode-id="386" face="Arial"><span data-dcnode-id="393" instrument_node="">There are a number of neo-Nazi and neo-Fascist web-based organizations, all hosted on FaceBook, that seem to all be the work of a small group of persons or person.  According to these closely affiliated and similar websites, they all support goals of "anti-communism, militarism, the abolition of democracy and its ideals, the abolition of the old system of corruption, a strong ultra-nationalistic fervor, glorification of the past, statism, and glorification of the nation." The term "maharlika" refers to a feudal peasant warrior class that once existed in the Philippines, but in modern Filipino the term has come to mean "royal nobility." and has been adopted by these Filipino extremist. The word </span><i data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">maharlika</span></i><span data-dcnode-id="390" instrument_node=""> was used during the </span><i data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Kilusang Bagong Lipunan</span></i><span data-dcnode-id="387" instrument_node=""> (New Society Movement) of Philippine President Ferdinand Marcos to describe Filipino nationalism, incorrectly indicating that it referred to the ancient Filipino kings and princes. </span></font></p><font data-dcnode-id="380" face="Arial"><span data-dcnode-id="384" instrument_node="">
</span><p data-dcnode-id="381"><font data-dcnode-id="382" face="Arial"><span data-dcnode-id="383" instrument_node="">On their flags they claim that "red symbolizes the blood of the Filipino race, the blood which the fathers of our nation shed to attain freedom; the sun represents the eternal sunshine of the Philippines and its people which will last thousands of years; the eight rays of the sun represent our aims...and the eagle represents the might of the Philippines and its people."</span></font></p></font></td></tr><tr data-dcnode-id="351"><td align="center" data-dcnode-id="367" width="20%"><font data-dcnode-id="368" face="Arial"><br data-dcnode-id="374"><img alt="Image by Juan Manuel Gabino VillascÃƒÆ’Ã‚Â¡n" border="1" data-dcnode-id="373" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/mexica_movement.gif&amp;raw" width="216"><br data-dcnode-id="372"><span data-dcnode-id="371" instrument_node="">Mexica Movement Flag</span><br data-dcnode-id="370"><br data-dcnode-id="369"></font></td><td data-dcnode-id="353" valign="top" width="80%"><b data-dcnode-id="363"><font data-dcnode-id="364" face="Arial" size="+1"><span data-dcnode-id="365" instrument_node="">Indigenous Movement of the People of Anahuac Flag (Mexico)</span></font></b><span data-dcnode-id="362" instrument_node="">
</span><p data-dcnode-id="359"><font data-dcnode-id="360" face="Arial"><span data-dcnode-id="361" instrument_node="">As the self-proclaimed "revolutionary voice" of the indigenous people of Mexican descent, the Mexica Movement wants to unite North and Central America into the "Nation of Anahuac" whose rightful inhabitants are indigenous Native Americans.  They advocate that all white Americans should return to their true homes in Europe, and leave the Americas to its original people. They view Latin Americans of Amerindian descent, Native Americans, and the Canadian First Nations as one people who are falsely divided by European-imposed borders.</span></font></p><font data-dcnode-id="354" face="Arial"><span data-dcnode-id="358" instrument_node="">
</span><p data-dcnode-id="355"><font data-dcnode-id="356" face="Arial"><span data-dcnode-id="357" instrument_node="">The black-and-white design in the center of their flag represents the Mayan depiction of duality (life and death, male and female, matter and spirit, etc.). The four colors of the flag represent both the four directions, and the two solstices and two equinoxes of the solar year, which all play an important part in all indigenous believes and religions.</span></font></p></font></td></tr><tr data-dcnode-id="315"><td align="center" data-dcnode-id="341" width="20%"><font data-dcnode-id="342" face="Arial"><br data-dcnode-id="348"><img align="MIDDLE" alt="Image by Antonio Martins" border="1" data-dcnode-id="347" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/hungarian_welfare_association.jpg&amp;raw" width="216"><br data-dcnode-id="346"><span data-dcnode-id="345" instrument_node="">MNS Flag</span><br data-dcnode-id="344"><br data-dcnode-id="343"></font></td><td data-dcnode-id="317" valign="top" width="80%"><b data-dcnode-id="332"><font data-dcnode-id="333" face="Arial" size="+1"><span data-dcnode-id="339" instrument_node="">Hungarian Welfare Association (Hungary)</span><br data-dcnode-id="338"><font data-dcnode-id="335" size="-1"><em data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">Magyar Népjóléti Szövetség</span></em></font><span data-dcnode-id="334" instrument_node=""> </span></font></b><span data-dcnode-id="331" instrument_node="">
</span><p data-dcnode-id="325"><font data-dcnode-id="326" face="Arial"><span data-dcnode-id="330" instrument_node="">The </span><i data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">Magyar Népjóléti Szövetség</span></i><span data-dcnode-id="327" instrument_node=""> (MNS) is a neo-fascist movement. It is small, but they are visible at public demonstrations on national days or anniversaries linked to World War II. The Hungarian Welfare Association, which has appeared under various names and in different guises, adheres openly to the legacy of the Hungarian fascist Arrow Cross, or Cross Star movement, led during the World War II by Ferenc Szalasi.</span></font></p><font data-dcnode-id="318" face="Arial"><span data-dcnode-id="324" instrument_node="">
</span><p data-dcnode-id="321"><font data-dcnode-id="322" face="Arial"><span data-dcnode-id="323" instrument_node="">Various small groups, such as "Blood &amp; Honour," are still active in organizing demonstrations on anniversaries linked to World War II and the legacy of Hungarian fascism.</span></font></p><font data-dcnode-id="319" face="Arial"><a data-dcnode-id="320" name="mnsc"></a></font></font></td></tr><tr data-dcnode-id="277"><td align="center" data-dcnode-id="305" width="20%"><font data-dcnode-id="308" face="Arial"><br data-dcnode-id="312"><img align="MIDDLE" alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="311" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/national_socialist_movement_chile.gif&amp;raw" width="192"><br data-dcnode-id="310"><span data-dcnode-id="309" instrument_node="">MNSC Flag 1932</span></font><br data-dcnode-id="307"><br data-dcnode-id="306"></td><td data-dcnode-id="279" valign="top" width="80%"><b data-dcnode-id="297"><font data-dcnode-id="298" face="Arial" size="+1"><span data-dcnode-id="303" instrument_node="">National Socialist Movement of Chile</span><br data-dcnode-id="302"><font data-dcnode-id="299" size="-1"><em data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">Movimiento Nacional Socialista de Chile (MNSC)</span></em></font></font></b><span data-dcnode-id="296" instrument_node="">
</span><p data-dcnode-id="284"><font data-dcnode-id="285" face="Arial"><span data-dcnode-id="295" instrument_node="">The </span><i data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">Movimiento Nacional Socialista de Chile</span></i><span data-dcnode-id="292" instrument_node=""> (MNSC) was formed in 1932 by General Diaz Valderrama, Carlos Keller, and Jorge González von Marées, who became leader. Initially supporting the ideas of Adolf Hitler, the party received financial support from the German population of Chile and claimed a membership of 20,000 people. The movement stressed what it saw as the need for one party rule and solidarity between classes, and soon set up its own paramilitary wing, the </span><i data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">Tropas Nacistas de Asalto</span></i><span data-dcnode-id="289" instrument_node="">. However, support for Hitler was abandoned in the late 1930s and anti-Semitism was scaled back, with a more domestic form of Fascism being offered publicly. The movement was active until 1938, when it merged into the Popular Liberating Alliance (</span><i data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">Alianza Popular Libertadora</span></i><span data-dcnode-id="286" instrument_node="">), a nationalist and populist party which eventually distanced itself from the Fascism.</span></font></p><span data-dcnode-id="283" instrument_node="">
</span><p data-dcnode-id="280"><font data-dcnode-id="281" face="Arial"><span data-dcnode-id="282" instrument_node="">The flag used by the MNSC was derived from the first Chilean flag by addition of a red thunderbolt pointing upwards. As the oldest Chilean Nazi flag, it was reused in 21st century by neo-Nazi groups such as the National Order Front.</span></font></p></td></tr><tr data-dcnode-id="246"><td align="center" data-dcnode-id="267" width="20%"><font data-dcnode-id="270" face="Arial"><br data-dcnode-id="274"><img align="MIDDLE" alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="273" height="130" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/mnsu_chile.gif&amp;raw" width="216"><br data-dcnode-id="272"><span data-dcnode-id="271" instrument_node="">MNSU Flag 1988</span></font><br data-dcnode-id="269"><br data-dcnode-id="268"></td><td data-dcnode-id="248" valign="top" width="80%"><b data-dcnode-id="259"><font data-dcnode-id="260" face="Arial" size="+1"><span data-dcnode-id="265" instrument_node="">United Nacional Socialist Movement of Chile</span><br data-dcnode-id="264"><font data-dcnode-id="261" size="-1"><em data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">Movimiento Nacional Socialista Unificado de Chile (MNSU)</span></em></font></font></b><span data-dcnode-id="258" instrument_node="">
</span><p data-dcnode-id="249"><font data-dcnode-id="250" face="Arial"><span data-dcnode-id="257" instrument_node="">United Nacional Socialist Movement of Chile was founded - or "refounded" - in 1988. Its flag is derived from that of the original National Socialist Movement of Chile, whose successor they claim to be, with a differently stylized thunderbolt and addition of a red </span><i data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">lauburu</span></i><span data-dcnode-id="254" instrument_node=""> symbol on blue field in the canton. According to them, the </span><i data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">lauburu</span></i><span data-dcnode-id="251" instrument_node=""> is a "Spanish solar symbol". In reality, it is a specifically Basque symbol, but was obviously chosen due to its resemblance with the swastika, which is why it was also attributed to the National Socialist Movement of the Basque Country, a non-existent Spanish neo-Nazi group.</span></font></p></td></tr><tr data-dcnode-id="200"><td align="center" data-dcnode-id="236" width="20%"><font data-dcnode-id="237" face="Arial"><br data-dcnode-id="243"><img alt="Image by Ivan Sache" border="1" data-dcnode-id="242" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/mnsvn.gif&amp;raw" width="216"><br data-dcnode-id="241"><span data-dcnode-id="240" instrument_node="">MNSVN Flag</span><br data-dcnode-id="239"><br data-dcnode-id="238"></font></td><td data-dcnode-id="202" valign="top" width="80%"><b data-dcnode-id="227"><font data-dcnode-id="228" face="Arial" size="+1"><span data-dcnode-id="234" instrument_node="">National Socialist Movement - National Vanguard Flag (Peru)</span><br data-dcnode-id="233"><font data-dcnode-id="230" size="-1"><em data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">Movimiento Nacional Socialista Vanguardia Nacional</span></em></font><span data-dcnode-id="229" instrument_node=""> </span></font></b><span data-dcnode-id="226" instrument_node="">
</span><p data-dcnode-id="214"><font data-dcnode-id="215" face="Arial"><span data-dcnode-id="225" instrument_node="">One of the newest neo-Nazi groups in Peru is the </span><i data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">Movimiento Nacional Socialista Vanguardia Nacional</span></i><span data-dcnode-id="222" instrument_node=""> (MNSVN) which was founded in 2010, with branches in Lima, La Libertad and 
Lambayeque. The National Vanguard uses a flag featuring a black arrow pointing upwards, said to be the "</span><i data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">tyr</span></i><span data-dcnode-id="219" instrument_node="">" rune (</span><i data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">tiwaz</span></i><span data-dcnode-id="216" instrument_node="">). The rune, shaped as a raised spear symbolizes power, resistance, determination and fighting spirit, according to the group.</span></font></p><font data-dcnode-id="203" face="Arial"><span data-dcnode-id="213" instrument_node="">
</span><p data-dcnode-id="204"><font data-dcnode-id="205" face="Arial"><span data-dcnode-id="212" instrument_node="">The flag, which is presented in the traditional National Socialists colors with red field, and white and black striped detailing, is reminiscent of one of the variants of the </span><i data-dcnode-id="210"><span data-dcnode-id="211" instrument_node="">Hitlerjugend</span></i><span data-dcnode-id="209" instrument_node=""> (Hitler Youth) House Flag, with the </span><i data-dcnode-id="207"><span data-dcnode-id="208" instrument_node="">tyr</span></i><span data-dcnode-id="206" instrument_node=""> rune replacing the swastika.</span></font></p></font></td></tr><tr data-dcnode-id="155"><td align="center" data-dcnode-id="185" width="20%"><font data-dcnode-id="186" face="Arial"><br data-dcnode-id="197"><img alt="Image by Eugene Ipavec" border="1" data-dcnode-id="196" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/fr-mnr1.gif&amp;raw" width="216"><br data-dcnode-id="195"><span data-dcnode-id="194" instrument_node="">MNR Flag</span><br data-dcnode-id="193"><br data-dcnode-id="192"><img alt="Image by Eugene Ipavec" border="1" data-dcnode-id="191" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/fr-mnr2.gif&amp;raw" width="216"><br data-dcnode-id="190"><span data-dcnode-id="189" instrument_node="">MNR Flag (unofficial variant)</span><br data-dcnode-id="188"><br data-dcnode-id="187"></font></td><td data-dcnode-id="157" valign="top" width="80%"><b data-dcnode-id="177"><font data-dcnode-id="182" face="Arial" size="+1"><span data-dcnode-id="183" instrument_node="">Republican National Movement (France)</span></font><br data-dcnode-id="181"><font data-dcnode-id="178" size="-1"><i data-dcnode-id="179"><span data-dcnode-id="180" instrument_node="">Mouvement national républicain</span></i></font></b><span data-dcnode-id="176" instrument_node="">
</span><p data-dcnode-id="170"><font data-dcnode-id="171" face="Arial"><span data-dcnode-id="175" instrument_node="">The Republican National Movement (MNR) was founded by Bruno Mégret in 1999 as a splinter of the extreme-right party National Front (FN or </span><i data-dcnode-id="173"><span data-dcnode-id="174" instrument_node="">front national</span></i><span data-dcnode-id="172" instrument_node="">). Although political observers have considered the MNR to be a far-right party, the MNR presents itself as classical liberal and nationalist. It opposes immigration, Islamisation, and the European Union, but, unlike the National Front, supports free markets and neoliberalism.</span></font></p><font data-dcnode-id="158" face="Arial"><span data-dcnode-id="169" instrument_node="">
</span><p data-dcnode-id="166"><font data-dcnode-id="167" face="Arial"><span data-dcnode-id="168" instrument_node="">The group  uses the emblem an oak leaf, usually within a French tricolor flag. According to the party's website, "the oak leaf within the tricolor flag is the symbol of the struggle for our identity, of the attachment to our roots and of the continuity of our country. The oak symbolizes strength, nobleness and justice. In ancient Rome, the oak represented the civic virtues. It is shown in the arms of the [French] monarchy as well as in the arms of the Republic."</span></font></p><font data-dcnode-id="159" face="Arial"><span data-dcnode-id="165" instrument_node="">
</span><p data-dcnode-id="162"><font data-dcnode-id="163" face="Arial"><span data-dcnode-id="164" instrument_node="">The flag of the MNR is vertically divided blue-red with, in the middle a white oak leaf with blue veins. The supporters of the MNR sometimes use another flag, probably unofficial, made of the French national flag charged in the middle of the white stripe with a tricolor oak leaf not reaching the horizontal edges of the flag.</span></font></p><font data-dcnode-id="160" face="Arial"><a data-dcnode-id="161" name="mnsdp"></a></font></font></font></td></tr><tr data-dcnode-id="92"><td align="center" data-dcnode-id="137" width="20%"><font data-dcnode-id="138" face="Arial"><br data-dcnode-id="152"><img align="MIDDLE" alt="Image by Ivan Sache" border="1" data-dcnode-id="151" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/nsd_peru.gif&amp;raw" width="216"><br data-dcnode-id="150"><span data-dcnode-id="149" instrument_node="">MNSDP Odal Rune Flag</span><br data-dcnode-id="148"><br data-dcnode-id="147"><img alt="Image by Blas Delgado Ortiz" border="1" data-dcnode-id="146" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/pr-cross.gif&amp;raw" width="216"><br data-dcnode-id="145"><span data-dcnode-id="144" instrument_node="">Cross of Burgundy flag</span><br data-dcnode-id="143"><font data-dcnode-id="141" size="-1"><span data-dcnode-id="142" instrument_node="">(Spanish historical)</span></font><br data-dcnode-id="140"><br data-dcnode-id="139"></font></td><td data-dcnode-id="94" valign="top" width="80%"><b data-dcnode-id="129"><font data-dcnode-id="130" face="Arial" size="+1"><span data-dcnode-id="135" instrument_node="">National Socialist Movement Awake Peru (Peru)</span><br data-dcnode-id="134"><font data-dcnode-id="131" size="-1"><em data-dcnode-id="132"><span data-dcnode-id="133" instrument_node="">Movimiento Nacional Socialista Despierta Perú (MNSDP)</span></em></font></font></b><span data-dcnode-id="128" instrument_node="">
</span><p data-dcnode-id="113"><font data-dcnode-id="114" face="Arial"><span data-dcnode-id="127" instrument_node="">The </span><i data-dcnode-id="125"><span data-dcnode-id="126" instrument_node="">Movimiento Nacional Socialista Despierta Perú</span></i><span data-dcnode-id="124" instrument_node=""> (MNSDP) is a radical neo-Nazi group in Peru whose activities center around Cieneguilla according to the Peruvian police.  Their motto of "Peru Awake" is obviously paraphrasing "</span><i data-dcnode-id="122"><span data-dcnode-id="123" instrument_node="">Deutschland erwache!</span></i><span data-dcnode-id="121" instrument_node="">" (Germany awake!). The MNSDP formed what they called a super "creole" neo-Nazi group to celebrate Hitler's 119th birthday called the </span><a data-dcnode-id="119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/hate3.html%23unsp"><span data-dcnode-id="120" instrument_node="">Peruvian National Socialist Union</span></a><span data-dcnode-id="118" instrument_node=""> (UNSP - </span><i data-dcnode-id="116"><span data-dcnode-id="117" instrument_node="">Unión Nacional Socialista Peruana</span></i><span data-dcnode-id="115" instrument_node="">) which briefly existed in 2008-2009.</span></font></p><font data-dcnode-id="95" face="Arial"><span data-dcnode-id="112" instrument_node="">
</span><p data-dcnode-id="103"><font data-dcnode-id="104" face="Arial"><span data-dcnode-id="111" instrument_node="">The National Socialist Movement Despierta, in the tradition of the original National Socialists German Workers Party, maintains a militant and lightly armed "Brown Brigade," complete with flags, brown uniform shirts, black ties, and red and white MNSDP arm bands with the "Odal Rune" logos prominently displayed on them. The Odal Rune is also widely used by right-wing nationalist youth groups like the "</span><a data-dcnode-id="109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/hate3.html%23wj"><span data-dcnode-id="110" instrument_node="">Wiking Jugend</span></a><span data-dcnode-id="108" instrument_node="">" in Germany and "</span><a data-dcnode-id="106" href="#asf"><span data-dcnode-id="107" instrument_node="">Afrikaner Student Federation</span></a><span data-dcnode-id="105" instrument_node="">" in South Africa.</span></font></p><font data-dcnode-id="96" face="Arial"><span data-dcnode-id="102" instrument_node="">
</span><p data-dcnode-id="99"><font data-dcnode-id="100" face="Arial"><span data-dcnode-id="101" instrument_node="">The historical Spanish Cross of Burgundy has also been used by the MNSDP during their rallies. (The Cross of Burgundy was used as a military ensign in New Spain by Cortes and the Spanish Conquistadores in their conquest of the Mexico and later California.)</span></font></p><font data-dcnode-id="97" face="Arial"><a data-dcnode-id="98" name="mnspr"></a></font></font></font></td></tr><tr data-dcnode-id="59"><td align="center" data-dcnode-id="82" width="20%"><font data-dcnode-id="85" face="Arial"><br data-dcnode-id="89"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="88" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/pr%257Dmnspr.gif&amp;raw" width="230"><br data-dcnode-id="87"><span data-dcnode-id="86" instrument_node="">MNSPR Flag (2000-c2005)</span></font><br data-dcnode-id="84"><br data-dcnode-id="83"></td><td data-dcnode-id="61" valign="top" width="80%"><b data-dcnode-id="74"><font data-dcnode-id="79" face="Arial" size="+1"><span data-dcnode-id="80" instrument_node="">National Syndicalist Movement of Puerto Rico (Puerto Rico)</span></font><br data-dcnode-id="78"><font data-dcnode-id="75" face="Arial" size="-1"><i data-dcnode-id="76"><span data-dcnode-id="77" instrument_node="">Movimiento Nacional Sindicalista de Puerto Rico</span></i></font></b><span data-dcnode-id="73" instrument_node="">
</span><p data-dcnode-id="67"><font data-dcnode-id="68" face="Arial"><span data-dcnode-id="72" instrument_node="">This movement was founded in 2000, as the re-foundation of </span><a data-dcnode-id="70" href="#fb"><span data-dcnode-id="71" instrument_node="">Falange Boricua</span></a><span data-dcnode-id="69" instrument_node="">. It never achieved any significant influence and seems not to have outlived the year 2005, since its website (existed 2004-2009) was not updated since then.</span></font></p><span data-dcnode-id="66" instrument_node="">
</span><p data-dcnode-id="63"><font data-dcnode-id="64" face="Arial"><span data-dcnode-id="65" instrument_node="">The MNSPR flag was a combination of those of the Falange Boricua and the Nationalist Party of Puerto Rico: red yoke and arrows, outlined black and superimposed on white cross potent, all on black field.</span></font></p><span data-dcnode-id="62" instrument_node="">
</span></td></tr></tbody></table></center><span data-dcnode-id="50" instrument_node="">
