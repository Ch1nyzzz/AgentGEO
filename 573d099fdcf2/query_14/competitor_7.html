</span><p data-dcnode-id="2003"><font data-dcnode-id="2004" face="Arial"><span data-dcnode-id="2017" instrument_node="">Two new Golden Dawn flags were introduced in 2011 and 2012. The first is charged with a large letter epsilon within a wreath, all black with white fimbriations, on a dark red field. The letter epsilon probably stands either for </span><i data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">Ellas</span></i><span data-dcnode-id="2014" instrument_node=""> (Greece), </span><i data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">Ethnos</span></i><span data-dcnode-id="2011" instrument_node=""> (Nation), or </span><i data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">Ethnikismos</span></i><span data-dcnode-id="2008" instrument_node=""> (Nationalism). The second Golden Dawn flag appeared in 2012 and has a black Meander symbol with white fimbriations placed on a red shield with white border, all centered within a red wreath on a black field. "Golden Dawn" (in Greek) is spelled in red block letters directly below the wreath.  </span><u data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">Note</span></u><span data-dcnode-id="2005" instrument_node="">: This second may only be an illustration used for Golden Dawn articles, its actual use as a flag is unverified.</span></font></p><font data-dcnode-id="1998" face="Arial"><span data-dcnode-id="2002" instrument_node="">
</span><p data-dcnode-id="1999"><font data-dcnode-id="2000" face="Arial"><span data-dcnode-id="2001" instrument_node="">In late 2013, a new flag with meander within a wreath, surrounded with
the full name of the party, has appeared. Its field is red and the charges are black, fimbriated white. The earliest photos can be found is also being increasingly used abroad, by ultra-rightists wishing to show the support to like-minded "persecutees", considering the criminal charges against the party and its members, a number of which was brought since 2012, merely as the "persecution" campaign.</span></font></p></font></http:></font></font></font></font></td></tr><tr data-dcnode-id="1949"><td align="center" data-dcnode-id="1980" width="20%"><font data-dcnode-id="1981" face="Arial"><br data-dcnode-id="1987"><img align="MIDDLE" alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="1986" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/groen_rechts.gif&amp;raw" width="216"><br data-dcnode-id="1985"><span data-dcnode-id="1984" instrument_node="">GR Flag</span><br data-dcnode-id="1983"><br data-dcnode-id="1982"></font></td><td data-dcnode-id="1951" valign="top" width="80%"><b data-dcnode-id="1971"><font data-dcnode-id="1972" face="Arial" size="+1"><span data-dcnode-id="1978" instrument_node="">Green Rights (Belgium)</span><br data-dcnode-id="1977"><font data-dcnode-id="1974" size="-1"><em data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">Groen Rechts</span></em></font><span data-dcnode-id="1973" instrument_node="">
</span></font></b><span data-dcnode-id="1970" instrument_node="">
</span><p data-dcnode-id="1961"><font data-dcnode-id="1962" face="Arial"><span data-dcnode-id="1969" instrument_node="">The </span><i data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">Groen Rechts</span></i><span data-dcnode-id="1966" instrument_node=""> (GR) is an Ecologist ultra-rightist organization. The Green Rights website contains almost no information about the group, although since the logo of N-SA appears at the bottom of all the pages it suggests that members of the </span><i data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">Nieuw-Solidaristisch Alternatief</span></i><span data-dcnode-id="1963" instrument_node=""> (Neo-Solidarist Alternative Movement) must have founded the GR. The flag of the Green Rights, with its black Celtic cross on a green field, also further suggest ties between two organizations.</span></font></p><font data-dcnode-id="1952" face="Arial"><span data-dcnode-id="1960" instrument_node="">
</span><p data-dcnode-id="1953"><font data-dcnode-id="1954" face="Arial"><span data-dcnode-id="1959" instrument_node="">The </span><i data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">Groen Rechts</span></i><span data-dcnode-id="1956" instrument_node=""> green flag has been prominently displayed at various Flemish rightist demonstrations in recent years, suggesting an active membership in the area. </span><a data-dcnode-id="1955" name="thor"></a></font></p></font></td></tr><tr data-dcnode-id="1919"><td align="center" data-dcnode-id="1940" width="20%"><font data-dcnode-id="1941" face="Arial"><br data-dcnode-id="1947"><img align="MIDDLE" alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="1946" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/mjolnir-thor.gif&amp;raw" width="216"><br data-dcnode-id="1945"><span data-dcnode-id="1944" instrument_node="">Mjölnir Flag</span><br data-dcnode-id="1943"><br data-dcnode-id="1942"></font></td><td data-dcnode-id="1921" valign="top" width="80%"><b data-dcnode-id="1931"><font data-dcnode-id="1932" face="Arial" size="+1"><span data-dcnode-id="1938" instrument_node="">Hammer of Thor (USA)</span><br data-dcnode-id="1937"><font data-dcnode-id="1934" size="-1"><em data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">Mjölnir</span></em></font><span data-dcnode-id="1933" instrument_node="">
</span></font></b><span data-dcnode-id="1930" instrument_node="">
</span><p data-dcnode-id="1927"><font data-dcnode-id="1928" face="Arial"><span data-dcnode-id="1929" instrument_node="">The symbol of Mjölnir appears on this black flag carried in 2017 by an alt-right protester in the violent "Unite the Right" Rally held in Charlottesville, Virginia.  In Norse mythology, Mjölnir is the mythical Hammer of Thor, the Norse god of thunder.</span></font></p><font data-dcnode-id="1922" face="Arial"><span data-dcnode-id="1926" instrument_node="">
</span><p data-dcnode-id="1923"><font data-dcnode-id="1924" face="Arial"><span data-dcnode-id="1925" instrument_node=""> Today, practitioners of Germanic neo-Pagan faiths wear Mjölnir pendants as a symbol of their faith and various renditions of Mjölnir are commonly used by these groups and individuals. Its use as a neo-Nazi symbol is widespread, and often quite misunderstood.</span></font></p></font></td></tr><tr data-dcnode-id="1871"><td align="center" data-dcnode-id="1899" width="20%"><font data-dcnode-id="1900" face="Arial"><br data-dcnode-id="1916"><img alt="Image by Pete Loeser and Tomislav Todorovic" border="1" data-dcnode-id="1915" height="140" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/us%257Dhs.gif&amp;raw" width="216"><br data-dcnode-id="1914"><span data-dcnode-id="1913" instrument_node="">Hammerskin-Crew 38 Flag</span><br data-dcnode-id="1912"><br data-dcnode-id="1911"><img alt="Image by Pete Loeser" border="1" data-dcnode-id="1910" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/us%257Dhsn.gif&amp;raw" width="216"><br data-dcnode-id="1909"><span data-dcnode-id="1908" instrument_node="">Hammerskin Nation Flag</span><br data-dcnode-id="1907"><br data-dcnode-id="1906"><img alt="Image by Pete Loeser" border="1" data-dcnode-id="1905" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/us%257Dchs.gif&amp;raw" width="216"><br data-dcnode-id="1904"><span data-dcnode-id="1903" instrument_node="">Confederate Hammerskin Flag</span><br data-dcnode-id="1902"><br data-dcnode-id="1901"></font></td><td data-dcnode-id="1873" valign="top" width="80%"><b data-dcnode-id="1895"><font data-dcnode-id="1896" face="Arial" size="+1"><span data-dcnode-id="1897" instrument_node="">Hammerskin Nation (USA)</span></font></b><span data-dcnode-id="1894" instrument_node="">
</span><p data-dcnode-id="1891"><font data-dcnode-id="1892" face="Arial"><span data-dcnode-id="1893" instrument_node="">The Hammerskins, or Hammerskin Nation, are a white supremacist group formed in 1988 by Sean Tarrant in Dallas, Texas.  Their primary focus seems to be the production and promotion of white power rock music, and many white power bands claim affiliation with them. The Hammerskins host several annual concerts, including the  "Summer of Hate" concert and the "Hammerfest" in honor of deceased Hammerskin Joe Rowan, the lead singer of the band Nordic Thunder, which has become an annual event in both the United States and Europe. </span></font></p><font data-dcnode-id="1874" face="Arial"><span data-dcnode-id="1890" instrument_node="">
</span><p data-dcnode-id="1887"><font data-dcnode-id="1888" face="Arial"><span data-dcnode-id="1889" instrument_node="">The Anti-Defamation League describes them as the best-organized neo-Nazi skinhead group in the United States. They claim six chapters in the United States: The Northwestern Hammerskin Chapter (NWHS), Western Hammerskin Chapter (WHS), Confederate Hammerskins (CHS), Northern Hammerskin Chapter (NHS), Eastern Hammerskin Chapter (EHS), and the Midland Hammerskins (MHS). The ISVG (Institute for the Study of Violent Groups) says the movement is now international, with chapters existing in Australia, Canada, Czech Republic, France, Germany, Hungary, Italy, New Zealand, Portugal, Slovakia, Spain, Sweden, and Switzerland. According to them there are about 200 members with group affiliations with the Aryan Nations, Ku Klux Klan, National Alliance, Vinlanders, Volksfront, and White Aryan Resistance. The Hammerskins also have what they call supporter chapters, known as Crew 38, for non-members who support their activities.</span></font></p><font data-dcnode-id="1875" face="Arial"><span data-dcnode-id="1886" instrument_node="">
</span><p data-dcnode-id="1883"><font data-dcnode-id="1884" face="Arial"><span data-dcnode-id="1885" instrument_node="">The Hammerskins logo, "depicting two claw hammers crossed to resemble goose-stepping legs," is based on the 1982 film Pink Floyd The Wall. Their logos and motto "Hammerskins Forever, Forever Hammerskins" (HFFH) often appear on their buttons, T-Shirts, posters and tattoos. Crew 38 and Hammerskins members also frequently identify themselves with the slogan "838," meaning "hail the crossed hammers" (the acronym HCH translates into the eighth, third, and eighth letters of the alphabet).</span></font></p><font data-dcnode-id="1876" face="Arial"><span data-dcnode-id="1882" instrument_node="">
</span><p data-dcnode-id="1879"><font data-dcnode-id="1880" face="Arial"><span data-dcnode-id="1881" instrument_node="">The first Hammerskin flag shown here was used at the Summer of Hate concert, organized by the Western Hammerskins, the Southern California branch of The Hammerskin Nation.  The second flag design has been also used as a badge and logo, and the Confederate Hammerskin flag has also reportedly been used as a square wall banner.</span></font></p><font data-dcnode-id="1877" face="Arial"><span data-dcnode-id="1878" instrument_node="">
</span></font></font></font></font></td></tr><tr data-dcnode-id="1822"><td align="center" data-dcnode-id="1855" width="20%"><font data-dcnode-id="1856" face="Arial"><br data-dcnode-id="1868"><br data-dcnode-id="1867"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="1866" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/si-gi1.gif&amp;raw" width="230"><br data-dcnode-id="1865"><span data-dcnode-id="1864" instrument_node="">IG Flag (type #1)</span><br data-dcnode-id="1863"><br data-dcnode-id="1862"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="1861" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/si-gi2.gif&amp;raw" width="230"><br data-dcnode-id="1860"><span data-dcnode-id="1859" instrument_node="">IG Flag (type #2)</span><br data-dcnode-id="1858"><br data-dcnode-id="1857"></font></td><td data-dcnode-id="1824" valign="top" width="80%"><b data-dcnode-id="1847"><font data-dcnode-id="1852" face="Arial" size="+1"><span data-dcnode-id="1853" instrument_node="">Identity Generation Flag (Slovenia)</span></font><br data-dcnode-id="1851"><small data-dcnode-id="1848"><i data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">Geberacija identitete</span></i></small></b><span data-dcnode-id="1846" instrument_node="">
</span><p data-dcnode-id="1837"><font data-dcnode-id="1838" face="Arial"><span data-dcnode-id="1845" instrument_node="">Identity Generation is Slovenian far-right movement modelled after the </span><a data-dcnode-id="1840" href="#bi-france"><span data-dcnode-id="1844" instrument_node="">Identitarian Bloc (</span><i data-dcnode-id="1842"><span data-dcnode-id="1843" instrument_node="">Bloc Identitaire</span></i><span data-dcnode-id="1841" instrument_node="">)</span></a><span data-dcnode-id="1839" instrument_node=""> of France. It has appeared in 2017 and is known to have operated through 2019, but seems to have ceased to exist by early 2020, its website being no longer online and Twitter account shut down (which actually might have happened while they were still active, if their activites were deemed unacceptable), while the VK account still exists, but has been long inactive.</span></font></p><font data-dcnode-id="1825" face="Arial"><span data-dcnode-id="1836" instrument_node="">
</span><p data-dcnode-id="1833"><font data-dcnode-id="1834" face="Arial"><span data-dcnode-id="1835" instrument_node="">Their political activities are typical for right-wing alt-right extremists in targeting socially progressive policies, the LGBT community, ethnic minorities from the Southern Balkans, and other European migrants. They have been responsible for multiple acts of violent extremism in Slovenia.</span></font></p><font data-dcnode-id="1826" face="Arial"><span data-dcnode-id="1832" instrument_node="">
</span><p data-dcnode-id="1829"><font data-dcnode-id="1830" face="Arial"><span data-dcnode-id="1831" instrument_node="">The flags, as used by the Identitarians in other countries, bear the
 "Spartan lambda" symbol, black on yellow field, or with reversed colors. The Slovenian national flag is also used by the group, as well as the flag of Carniola, which differs from the former only in the coat-of-arms which it bears and its placement in center instead of canton.  Local flags are also sometimes used, and even the flag of European Union, even though the Identitarians are generally hostile towards the EU, but since it has originally been introduced by the Council of Europe, perhaps they have seen it as the flag of Europe as the continent, rather than the European Union.</span></font></p><font data-dcnode-id="1827" face="Arial"><a data-dcnode-id="1828" name="us-ie"></a></font></font></font></td></tr><tr data-dcnode-id="1775"><td align="center" data-dcnode-id="1800" width="20%"><font data-dcnode-id="1801" face="Arial"><br data-dcnode-id="1819"><img alt="Image by Pete Loeser" border="1" data-dcnode-id="1818" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/identity-white.gif&amp;raw" width="230"><br data-dcnode-id="1817"><span data-dcnode-id="1816" instrument_node="">IE Flag (white and Blue)</span><br data-dcnode-id="1815"><br data-dcnode-id="1814"><br data-dcnode-id="1813"><img alt="Image by Pete Loeser" border="1" data-dcnode-id="1812" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/identity-blue.gif&amp;raw" width="230"><br data-dcnode-id="1811"><span data-dcnode-id="1810" instrument_node="">IE Flag (blue and white)</span><br data-dcnode-id="1809"><br data-dcnode-id="1808"><br data-dcnode-id="1807"><img alt="Image by  Tomislav Todorovic" border="1" data-dcnode-id="1806" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/identity-white-teal.gif&amp;raw" width="230"><br data-dcnode-id="1805"><span data-dcnode-id="1804" instrument_node="">IE Flag (teal and white)</span><br data-dcnode-id="1803"><br data-dcnode-id="1802"></font></td><td data-dcnode-id="1777" valign="top" width="80%"><b data-dcnode-id="1796"><font data-dcnode-id="1797" face="Arial" size="+1"><span data-dcnode-id="1798" instrument_node="">Identity Evropa (United States)</span></font></b><span data-dcnode-id="1795" instrument_node="">
</span><p data-dcnode-id="1792"><font data-dcnode-id="1793" face="Arial"><span data-dcnode-id="1794" instrument_node="">Identity Evropa is a white supremacist group founded by Nathan Damigo in 2016 and now headquartered in Oakdale, California. Damigo led the National Youth Front (the youth wing of the American Freedom Party) until it was disbanded.  Although a relatively small group, IE has been identified as a racist white supremacist organization by the Anti-Defamation League and is designated by the Southern Poverty Law Center as a hate group. It focuses on recruiting disaffected college-aged, white students with what they call "race realism." They especially target college campuses by distributing white nationalist slogans on fliers, posters, and stickers, often describing themselves as a fraternity or social club.</span></font></p><font data-dcnode-id="1778" face="Arial"><span data-dcnode-id="1791" instrument_node="">
</span><p data-dcnode-id="1790"></p><div align="center" data-dcnode-id="1786"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="1789" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/identity-teal-white.gif&amp;raw" width="230"><br data-dcnode-id="1788"><span data-dcnode-id="1787" instrument_node="">IE Flag (white and teal)</span></div><p data-dcnode-id="1785"></p><span data-dcnode-id="1784" instrument_node="">
</span><p data-dcnode-id="1781"><font data-dcnode-id="1782" face="Arial"><span data-dcnode-id="1783" instrument_node="">Part of the broader white nationalist Alt-Right Movement, their flags were prominently displayed at the nationally televised Charlottesville Riots of 2017. The depicted symbol on their flags is called "Dragon's Eye" and may be depicted either in form of an equilateral triangle, or an isosceles triangle with width larger than height, as Rudolf Koch originally depicted it in "The Book of Signs." The photos of flying flags usually do not allow for clear recognition of the shape, but the movement is known to use both variants of the symbol. The symbol on flags looks a bit off-center, much closer to bottom than top edge of the flag, but it was done in order to make its geometric center as close to the flag center as possible.</span></font></p><font data-dcnode-id="1779" face="Arial"><a data-dcnode-id="1780" name="us-id"></a></font></font></td></tr><tr data-dcnode-id="1743"><td align="center" data-dcnode-id="1765" width="20%"><font data-dcnode-id="1766" face="Arial"><br data-dcnode-id="1772"><img alt="Image by Pete Loeser" border="1" data-dcnode-id="1771" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/identity-dixie.gif&amp;raw" width="216"><br data-dcnode-id="1770"><span data-dcnode-id="1769" instrument_node="">ID Flag</span><br data-dcnode-id="1768"><br data-dcnode-id="1767"></font></td><td data-dcnode-id="1745" valign="top" width="80%"><b data-dcnode-id="1761"><font data-dcnode-id="1762" face="Arial" size="+1"><span data-dcnode-id="1763" instrument_node="">Identity Dixie   (United States)</span></font></b><span data-dcnode-id="1760" instrument_node="">
</span><p data-dcnode-id="1757"><font data-dcnode-id="1758" face="Arial"><span data-dcnode-id="1759" instrument_node="">Using a variation of the neo-Confederate Southern Nationalist flag, featuring a magnolia flower, Identity Dixie althought having a similar name to Identity Evropa is actually an offshoot of "The Right Stuffs" and not associated with Identity Evropa despite being at Charlottesville and having similar names.</span></font></p><font data-dcnode-id="1746" face="Arial"><span data-dcnode-id="1756" instrument_node="">
</span><p data-dcnode-id="1753"><font data-dcnode-id="1754" face="Arial"><span data-dcnode-id="1755" instrument_node="">Although also a relatively small group, ID has been identified as a racist white supremacist organization by the Anti-Defamation League and is also designated by the Southern Poverty Law Center as a hate group.</span></font></p><font data-dcnode-id="1747" face="Arial"><span data-dcnode-id="1752" instrument_node="">
</span><p data-dcnode-id="1750"><font data-dcnode-id="1751" face="Arial"></font></p><font data-dcnode-id="1748" face="Arial"><span data-dcnode-id="1749" instrument_node="">
</span></font></font></font></td></tr><tr data-dcnode-id="1676"><td align="center" data-dcnode-id="1724" width="20%"><font data-dcnode-id="1725" face="Arial"><br data-dcnode-id="1740"><img align="MIDDLE" alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="1739" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/hdj.gif&amp;raw" width="216"><br data-dcnode-id="1738"><span data-dcnode-id="1737" instrument_node="">HDJ Flag</span><br data-dcnode-id="1736"><br data-dcnode-id="1735"><br data-dcnode-id="1734"><br data-dcnode-id="1733"><br data-dcnode-id="1732"><span data-dcnode-id="1731" instrument_node="">
</span><img align="MIDDLE" alt="Image by Tomislav Todorovic" border="0" data-dcnode-id="1730" height="108" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/hdj2.gif&amp;raw" width="216"><br data-dcnode-id="1729"><span data-dcnode-id="1728" instrument_node="">HDJ Pennant</span><br data-dcnode-id="1727"><br data-dcnode-id="1726"></font></td><td data-dcnode-id="1678" valign="top" width="80%"><b data-dcnode-id="1715"><font data-dcnode-id="1716" face="Arial" size="+1"><span data-dcnode-id="1722" instrument_node="">German Youth Loyal to the Homeland (Germany)</span><br data-dcnode-id="1721"><font data-dcnode-id="1718" size="-1"><em data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">Heimattreue Deutsche Jugend (HDJ)</span></em></font><span data-dcnode-id="1717" instrument_node="">
</span></font></b><span data-dcnode-id="1714" instrument_node="">
</span><p data-dcnode-id="1708"><font data-dcnode-id="1709" face="Arial"><span data-dcnode-id="1713" instrument_node="">The </span><em data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">Heimattreue Deutsche Jugend</span></em><span data-dcnode-id="1710" instrument_node=""> (HDJ) is a neo-Nazi youth association offering Hitler youth-style camping holidays and other youth activities for children and young people that attempts to familiarize participants with Nazi thinking and teach children, as young as six, that foreigners and Jews are a threat to the nation, leading them into right-wing extremism.</span></font></p><font data-dcnode-id="1679" face="Arial"><span data-dcnode-id="1707" instrument_node="">
</span><p data-dcnode-id="1698"><font data-dcnode-id="1699" face="Arial"><span data-dcnode-id="1706" instrument_node="">The HDJ emerged from the "League of Youth Loyal to the Homeland - Free League" (</span><em data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">Bund Heimattreuer Jugend - Freibund</span></em><span data-dcnode-id="1703" instrument_node="">), an organization originating in late 1950s that was based on the traditions of early 20th-century German youth movements, and co-operated closely with the Viking Youth and other neo-Nazi organizations until the late 1980s when it began distancing from them, causing its most extreme members to break away in 1990 and found "The Youth Loyal to the Homeland" (</span><em data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">Die Heimattreue Jugend</span></em><span data-dcnode-id="1700" instrument_node="">), renamed the HDJ in 2000.</span></font></p><font data-dcnode-id="1680" face="Arial"><span data-dcnode-id="1697" instrument_node="">
</span><p data-dcnode-id="1691"><font data-dcnode-id="1692" face="Arial"><span data-dcnode-id="1696" instrument_node="">Involvement of Viking Youth members in their activities, as well as the members' participation in acts of violence, resulted first in a ban on wearing uniforms in 2007, which they declared they wouldn´t obey, and eventually by the complete banning of the group itself in 2009. The HDJ website claimed it fought "for an independent Germany, for traditional values and for a lifestyle reflected in a healthy body, spirit and character. It also [fought] the use of English in the German mother tongue." Its newspaper "Firebrand" (</span><em data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Funkenflug</span></em><span data-dcnode-id="1693" instrument_node="">) had a subtitle "Young, Stormy, Loyal to the People."</span></font></p><font data-dcnode-id="1681" face="Arial"><span data-dcnode-id="1690" instrument_node="">
</span><p data-dcnode-id="1684"><font data-dcnode-id="1685" face="Arial"><span data-dcnode-id="1689" instrument_node="">Since it is illegal to display Nazi symbols in Germany, the HDJ´s flag features a stylized campfire,  but maintains the traditional national socialist colors of red, black and white. On some reported variants of the flag a caption in a red ribbon is located below the campfire reading </span><em data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">Heimattreue Deutsche Jugend</span></em><span data-dcnode-id="1686" instrument_node=""> (German Youth Loyal to the Homeland).</span></font></p><font data-dcnode-id="1682" face="Arial"><a data-dcnode-id="1683" name="ifl"></a></font></font></font></font></td></tr><tr data-dcnode-id="1634"><td align="center" data-dcnode-id="1660" width="20%"><font data-dcnode-id="1661" face="Arial"><br data-dcnode-id="1673"><img align="MIDDLE" alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="1672" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/ie.gif&amp;raw" width="216"><br data-dcnode-id="1671"><span data-dcnode-id="1670" instrument_node="">IE Flag</span><br data-dcnode-id="1669"><br data-dcnode-id="1668"><font data-dcnode-id="1664" face="Arial"><img align="MIDDLE" alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="1667" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/ie2.gif&amp;raw" width="216"><br data-dcnode-id="1666"><span data-dcnode-id="1665" instrument_node="">Maltese Civil Flag Variant</span></font><br data-dcnode-id="1663"><br data-dcnode-id="1662"></font></td><td data-dcnode-id="1636" valign="top" width="80%"><b data-dcnode-id="1652"><font data-dcnode-id="1657" face="Arial" size="+1"><span data-dcnode-id="1658" instrument_node="">Empire Europe (Malta)</span></font><br data-dcnode-id="1656"><small data-dcnode-id="1653"><i data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">Imperium Europa (IE)</span></i></small></b><span data-dcnode-id="1651" instrument_node="">
</span><p data-dcnode-id="1640"><font data-dcnode-id="1641" face="Arial"><span data-dcnode-id="1650" instrument_node="">Empire Europe, more commonly called </span><i data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">Imperium Europa</span></i><span data-dcnode-id="1647" instrument_node="">, is a far-right Maltese political party, founded in 2000 by racist Norman Lowell. Its primary aim is to unite Europe into one political unit as a homeland for white people, organized similarly to the Holy Roman Empire, but ruled by "The Elite." Their goal is to see Europe "liberated from the enemy within and the enemy without." Lowell's beliefs were first published in an article, titled "Our Age", published in The Times of Malta in 1981. Their propaganda is written for those Lowell calls "Radical-Racialist-Right-Revolutionary-Reactionaries."</span><br data-dcnode-id="1646"><img align="bottom" alt="Image from ie website" border="0" data-dcnode-id="1645" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/ie-logo.gif&amp;raw" width="50"><span data-dcnode-id="1644" instrument_node=""> </span><font data-dcnode-id="1642" face="Arial"><span data-dcnode-id="1643" instrument_node="">Although the IE uses a symbol of a gold lightning bolt superimposed on a orange red filibrated sun called "The Lightning and the Sun" as a logo, they use a Nazi-style flag, with a black Maltese cross replacing the swastika.  The earliest appearances of these flags are in videos released by the party in 2012, so that year is probably when this flag was adopted. More recently, the Maltese Civil Ensign (a white Maltese Cross centered on a red field bordered with white) has been modified with a black cross replacing the white one, and has been reported in use at demonstrations.</span></font></font></p><font data-dcnode-id="1637" face="Arial"><font data-dcnode-id="1638" face="Arial"><a data-dcnode-id="1639" name="ifl"></a></font></font></td></tr><tr data-dcnode-id="1605"><td align="center" data-dcnode-id="1624" width="20%"><font data-dcnode-id="1625" face="Arial"><br data-dcnode-id="1631"><img align="MIDDLE" alt="Image by by Thierry Gilabert" border="1" data-dcnode-id="1630" height="109" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/imperial_fascist_league_uk.gif&amp;raw" width="216"><br data-dcnode-id="1629"><span data-dcnode-id="1628" instrument_node="">IFL Flag</span><br data-dcnode-id="1627"><br data-dcnode-id="1626"></font></td><td data-dcnode-id="1607" valign="top" width="80%"><b data-dcnode-id="1620"><font data-dcnode-id="1621" face="Arial" size="+1"><span data-dcnode-id="1622" instrument_node="">Imperial Fascist League (United Kingdom)</span></font></b><span data-dcnode-id="1619" instrument_node="">
</span><p data-dcnode-id="1616"><font data-dcnode-id="1617" face="Arial"><span data-dcnode-id="1618" instrument_node="">This was the flag of the Imperial Fascist League (IFL) a British Fascist movement led by Arnold Spencer Leese between 1928 until 1939. The IFL was a small group with never more than a few hundred members. They wore black shirts and were organized for street battles. Initially, they used the fasces as a symbol, but adopted the swastika superimposed on the Union Flag after Adolf Hitler came to power in Germany.</span></font></p><font data-dcnode-id="1608" face="Arial"><span data-dcnode-id="1615" instrument_node="">
</span><p data-dcnode-id="1609"><font data-dcnode-id="1610" face="Arial"><span data-dcnode-id="1614" instrument_node="">The group was in harsh competition with the British Union of Fascists, and more than once there were street battles between the two extremist groups. Eventually, the BUF proved too strong, and by 1939, the IFL had largely disappeared. Their flag regained brief notoriety when a picture of it being used in a 1938 pro-nazi demonstration in London was re-published in a 1997 edition of Newsweek magazine. The IFL flag variant, modified with text, was adopted by the new </span><a data-dcnode-id="1612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/hate2.html%23nsmb"><span data-dcnode-id="1613" instrument_node="">National Socialist Movement - Britanna (NSM).</span></a><span data-dcnode-id="1611" instrument_node=""> </span></font></p></font></td></tr><tr data-dcnode-id="1564"><td align="center" data-dcnode-id="1590" width="20%"><font data-dcnode-id="1591" face="Arial"><br data-dcnode-id="1602"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="1601" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/is%257Dfthj1.gif&amp;raw" width="208"><br data-dcnode-id="1600"><span data-dcnode-id="1599" instrument_node="">INP Flag (Type #1)</span><br data-dcnode-id="1598"><br data-dcnode-id="1597"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="1596" height="120" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/is%257Dfthj2.gif&amp;raw" width="216"><br data-dcnode-id="1595"><span data-dcnode-id="1594" instrument_node="">INP Flag (Type #2)</span><br data-dcnode-id="1593"><br data-dcnode-id="1592"></font></td><td data-dcnode-id="1566" valign="top" width="80%"><span data-dcnode-id="1588" instrument_node="">
</span><b data-dcnode-id="1581"><font data-dcnode-id="1586" face="Arial" size="+1"><span data-dcnode-id="1587" instrument_node="">Nationalist Party (Iceland)</span></font><br data-dcnode-id="1585"><font data-dcnode-id="1582" face="Arial" size="-1"><i data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">Flokkur Þjóðernissinna</span></i></font></b><span data-dcnode-id="1580" instrument_node="">
</span><p data-dcnode-id="1574"><font data-dcnode-id="1575" face="Arial"><span data-dcnode-id="1579" instrument_node="">Nationalist Party was founded in 1934 by fusion of the Icelandic Nationalist Movement </span><i data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">(Þjóðhreyfing Íslendinga)</span></i><span data-dcnode-id="1576" instrument_node="">, founded in 1933, and their breakaway members - the original Nationalist Party. The party believed in Aryan supremacy and anti-Semitism, and intended to make Iceland a Corporativist state, but never developed a personality cult of a supreme leader. The membership never exceeded 450. The British invasion of Iceland in World War II in 1940 caused a mass exit from the party which was officially disbanded in 1944. In Iceland today, membership in the Nationalist Party is a matter of embarrassment and very few objects, including the party flags, have been saved, except perhaps by a small number of collectors who are interested in this period of Icelandic history.</span></font></p><font data-dcnode-id="1567" face="Arial"><span data-dcnode-id="1573" instrument_node="">
</span><p data-dcnode-id="1570"><font data-dcnode-id="1571" face="Arial"><span data-dcnode-id="1572" instrument_node="">The Nationalist Party used two different flags in national colors. The first flag added the swastika to the 19th Century proposal from which the national flag was derived. The swastika was placed on a white diamond, conjoined with the cross into a single charge. The second flag had a typical Nazi design, with red swastika on a white disk in center of blue field.</span></font></p><font data-dcnode-id="1568" face="Arial"><span data-dcnode-id="1569" instrument_node="">
</span></font></font></td></tr><tr data-dcnode-id="1538"><td align="center" data-dcnode-id="1554" width="20%"><font data-dcnode-id="1557" face="Arial"><br data-dcnode-id="1561"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="1560" height="160" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/integralist_party_gb.gif&amp;raw" width="216"><br data-dcnode-id="1559"><span data-dcnode-id="1558" instrument_node="">IPGB Flag)</span></font><br data-dcnode-id="1556"><br data-dcnode-id="1555"></td><td data-dcnode-id="1540" valign="top" width="80%"><b data-dcnode-id="1550"><font data-dcnode-id="1551" face="Arial" size="+1"><span data-dcnode-id="1552" instrument_node="">Integralist Party of Great Britain and Northern Ireland (United Kingdom)</span></font></b><span data-dcnode-id="1549" instrument_node="">
</span><p data-dcnode-id="1546"><font data-dcnode-id="1547" face="Arial"><span data-dcnode-id="1548" instrument_node="">The Integralist Party of Great Britain and Northern Ireland, founded by Robert Stead and Benjamin Noyles, is a small political movement in Great Britain that seems to be a strange combination of neo-Fascistism, localism, traditionalism, trade unionism, corporatism, and environmentalism. It combines elements of both the political left and right, but claims not to be racist, although they do oppose mass immigration and what they call the EU "straightjacket."  They see the nation as an organic unity, and feel that there has been a social, political, and economic decline suffered in Great Britain that must be corrected.</span></font></p><font data-dcnode-id="1541" face="Arial"><span data-dcnode-id="1545" instrument_node="">
</span><p data-dcnode-id="1542"><font data-dcnode-id="1543" face="Arial"><span data-dcnode-id="1544" instrument_node="">Their flag has a green lightning-bolt or thunderbolt on a white circle, called "the lightning in the sun," placed on a plain green field. The Integralist claims their symbol is a modern adaptation of the British Union of FascistÃƒÂ¢Ã¢â€šÂ¬Ã¢â€žÂ¢s "action within unity" symbol, and although clearly derived from the BUF flag, the flag´s designer, Benjamin Noyles, once claimed the symbol isn't neo-Fascist in nature.</span></font></p></font></td></tr><tr data-dcnode-id="1508"><td align="center" data-dcnode-id="1528" width="20%"><font data-dcnode-id="1529" face="Arial"><br data-dcnode-id="1535"><img alt="" border="1" data-dcnode-id="1534" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/iranian_aryan_national_front.jpg&amp;raw" width="216"><br data-dcnode-id="1533"><span data-dcnode-id="1532" instrument_node="">IAMF Flag</span><br data-dcnode-id="1531"><br data-dcnode-id="1530"></font></td><td data-dcnode-id="1510" valign="top" width="80%"><b data-dcnode-id="1520"><font data-dcnode-id="1521" face="Arial" size="+1"><span data-dcnode-id="1526" instrument_node="">Iranian Aryan National Front (Iran)</span><br data-dcnode-id="1525"><font data-dcnode-id="1522" size="-1"><em data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">Jebhe Nasionalisti-ye Iranian-e Arya</span></em></font></font></b><span data-dcnode-id="1519" instrument_node="">
</span><p data-dcnode-id="1516"><font data-dcnode-id="1517" face="Arial"><span data-dcnode-id="1518" instrument_node="">The Jebhe Nasionalisti-ye Iranian-e Arya (IAMF) is an ultra-nationalistic organization with Iranian national ideals as its prerogative.  They emphasize Aryan Values and are definitely in support of the concept of Aryan Racial superiority.</span></font></p><font data-dcnode-id="1511" face="Arial"><span data-dcnode-id="1515" instrument_node="">
</span><p data-dcnode-id="1512"><font data-dcnode-id="1513" face="Arial"><span data-dcnode-id="1514" instrument_node="">Although the Iranian Aryan National Front is a new organization, they do supports a website with their views, agenda, and articles in a semi-organized format.</span></font></p></font></td></tr><tr data-dcnode-id="1478"><td align="center" data-dcnode-id="1498" width="20%"><font data-dcnode-id="1499" face="Arial"><br data-dcnode-id="1505"><img alt="Image by Klaus-Michael Schneider" border="1" data-dcnode-id="1504" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/tr_ibdac.gif&amp;raw" width="216"><br data-dcnode-id="1503"><span data-dcnode-id="1502" instrument_node="">IBDA-C Flag</span><br data-dcnode-id="1501"><br data-dcnode-id="1500"></font></td><td data-dcnode-id="1480" valign="top" width="80%"><b data-dcnode-id="1490"><font data-dcnode-id="1491" face="Arial" size="+1"><span data-dcnode-id="1496" instrument_node="">Great Eastern Islamic Raiders' Front (Turkey)</span><br data-dcnode-id="1495"><font data-dcnode-id="1492" size="-1"><em data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">Islami Büyükdogu Akincilar Cephesi</span></em></font></font></b><span data-dcnode-id="1489" instrument_node="">
</span><p data-dcnode-id="1486"><font data-dcnode-id="1487" face="Arial"><span data-dcnode-id="1488" instrument_node="">The Great Eastern Islamic Raiders' Front is an Islamic militant hate group that follows the teachings of Necip Fazil Kisakürek and his racial hate philosophy of Büyük Dogu (Great East). The group's goal is to create a new Sunni Caliphate in the Middle East. They claim credit for attacks on Shia, Alevi, Christian, and Jewish diplomatic, business, and religious interests in Istanbul. The group has defiantly moved from rhetoric to violence and is credited with a series of 90 bombings and attacks in the 1990s.</span></font></p><font data-dcnode-id="1481" face="Arial"><span data-dcnode-id="1485" instrument_node="">
</span><p data-dcnode-id="1482"><font data-dcnode-id="1483" face="Arial"><span data-dcnode-id="1484" instrument_node="">The flag of IBDA-C is blue with three white crescents arranged in a triangular pattern at hoist. The inner crescent is accompanied by a white 5-pointed star.</span></font></p></font></td></tr><tr data-dcnode-id="1442"><td align="center" data-dcnode-id="1468" width="20%"><font data-dcnode-id="1469" face="Arial"><br data-dcnode-id="1475"><img alt="" border="1" data-dcnode-id="1474" height="155" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/iranian_national_socialist_movement.jpg&amp;raw" width="216"><br data-dcnode-id="1473"><span data-dcnode-id="1472" instrument_node="">INSM Flag</span><br data-dcnode-id="1471"><br data-dcnode-id="1470"></font></td><td data-dcnode-id="1444" valign="top" width="80%"><b data-dcnode-id="1460"><font data-dcnode-id="1461" face="Arial" size="+1"><span data-dcnode-id="1466" instrument_node="">Iranian National Socialist Movement (Iran)</span><br data-dcnode-id="1465"><font data-dcnode-id="1462" size="-1"><em data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">Jonbesh-e Nasional Sosialist-e Iran</span></em></font></font></b><span data-dcnode-id="1459" instrument_node="">
</span><p data-dcnode-id="1453"><font data-dcnode-id="1454" face="Arial"><span data-dcnode-id="1458" instrument_node="">The </span><i data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">Jonbesh-e Nasional Sosialist-e Iran</span></i><span data-dcnode-id="1455" instrument_node=""> (INSM) is the latest addition to the Internet-based National Socialist organizations of Iran. Although the organization is Iranian, strangely enough they use the English script letters "INSM" centered on their flag standing for "Iranian National Socialist Movement." </span></font></p><font data-dcnode-id="1445" face="Arial"><span data-dcnode-id="1452" instrument_node="">
</span><p data-dcnode-id="1446"><font data-dcnode-id="1447" face="Arial"><span data-dcnode-id="1451" instrument_node="">The background colors on the flag (red-brown-black gold clockwise) are the colors used on the </span><i data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Derafsh-e-Kaviani</span></i><span data-dcnode-id="1448" instrument_node="">, the oldest Persian flag dating back to the Persian empire. According to legend, it had be made of a long rectangular leather apron used by national hero Kaveh the iron smith during the reign of King Fereidoun, and mounted on a spear.  This leather banner became the symbol of Iranian independence, resistance, resilience and the revolutionary momentum of the masses revolt against evil invaders.   Today it is known as the"Glorious Flag" of Iran.</span></font></p></font></td></tr><tr data-dcnode-id="1402"><td align="center" data-dcnode-id="1427" width="20%"><font data-dcnode-id="1428" face="Arial"><br data-dcnode-id="1439"><img alt="Image by Eugene Ipavec" border="1" data-dcnode-id="1438" height="155" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/il_nbp.gif&amp;raw" width="216"><br data-dcnode-id="1437"><span data-dcnode-id="1436" instrument_node="">INBP Flag (Type #1)</span><br data-dcnode-id="1435"><br data-dcnode-id="1434"><img alt="Image by Pete Loeser" border="1" data-dcnode-id="1433" height="155" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/il_inbp2.gif&amp;raw" width="216"><br data-dcnode-id="1432"><span data-dcnode-id="1431" instrument_node="">INBP Flag (Type #2)</span><br data-dcnode-id="1430"><br data-dcnode-id="1429"></font></td><td data-dcnode-id="1404" valign="top" width="80%"><b data-dcnode-id="1421"><font data-dcnode-id="1422" face="Arial" size="+1"><span data-dcnode-id="1425" instrument_node="">Israeli National Bolshevik Party (Israel)</span><br data-dcnode-id="1424"><span data-dcnode-id="1423" instrument_node="">also National Bolsheviks of Israel</span></font></b><span data-dcnode-id="1420" instrument_node="">
</span><p data-dcnode-id="1417"><font data-dcnode-id="1418" face="Arial"><span data-dcnode-id="1419" instrument_node="">The Israeli National Bolshevik Party is a strange contradictory one.  National
Bolsheviks in other countries generally have an anti-Zionist and pro-Palestinian attitude, but their Israeli counterparts are openly Zionist and frequently co-operate with other extreme Zionist groups. They also claim the heritage of Poalei Zion and other Jewish leftist organizations from the Russian 
Empire (most of their members are immigrants from ex-USSR countries). They also frequently express 
the solidarity with the "repressed" Russian NazBols, but generally seem not to be very close with most 
of their European counterparts, who, as mentioned, are generally very anti-Zionist and pro-Palestinian.</span></font></p><font data-dcnode-id="1405" face="Arial"><span data-dcnode-id="1416" instrument_node="">
</span><p data-dcnode-id="1413"><font data-dcnode-id="1414" face="Arial"><span data-dcnode-id="1415" instrument_node="">According to the INBP itself: "Israel was invented and founded by Red Zionists geopolitically as part of Eurasia, from the beginning oriented towards the Eurasian continent and developed as a Red proletarian communal republic. We, the National Bolsheviks of Israel, see our global mission in the resurrection and reworking of the idea of very great social justice for the Workers of Zion in the context of an interconnection with Russian National Bolshevism and the construction of a single imperial state free from the tyranny of globalism."</span></font></p><font data-dcnode-id="1406" face="Arial"><span data-dcnode-id="1412" instrument_node="">
</span><p data-dcnode-id="1409"><font data-dcnode-id="1410" face="Arial"><span data-dcnode-id="1411" instrument_node="">Along with their Type#1 flag, the party sometimes also uses the "generic" National Bolshevik flag (Type #2) with the hammer and sickle on a white disc. However, it seems to be done quite rarely, mostly because the Nazi-looking design of the flag, which must be quite unpopular in Israel.</span></font></p><font data-dcnode-id="1407" face="Arial"><a data-dcnode-id="1408" name="fnp"></a></font></font></font></td></tr><tr data-dcnode-id="1373"><td align="center" data-dcnode-id="1389" width="20%"><font data-dcnode-id="1390" face="Arial"><br data-dcnode-id="1399"><img align="MIDDLE" alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="1398" height="146" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/irm.gif&amp;raw" width="216"><br data-dcnode-id="1397"><span data-dcnode-id="1396" instrument_node="">French Nationalist Party</span><br data-dcnode-id="1395"><small data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">Roussillon Branch</span></small><br data-dcnode-id="1392"><br data-dcnode-id="1391"></font></td><td data-dcnode-id="1375" valign="top" width="80%"><b data-dcnode-id="1385"><font data-dcnode-id="1386" face="Arial" size="+1"><span data-dcnode-id="1387" instrument_node="">The Irminsul Symbol</span></font></b><span data-dcnode-id="1384" instrument_node="">
</span><p data-dcnode-id="1381"><font data-dcnode-id="1382" face="Arial"><span data-dcnode-id="1383" instrument_node="">Irminsul (mighty pillar) is a Germanic neo-pagan symbol frequently
used by the neo-Nazis. The name originated in old Saxony for a wooden pillar or tree trunk used as a place of worship. Little is known about their exact appearance, but the modern symbol is generally based on a 12th Century relief carved at the Externsteine Rock Formation near Detmold, Germany. The symbol, which vaguely resembles a palm tree, was first described as an "irminsul" in 1929 by archaeologist Wilhelm Teudt. He believed that the Externsteine site was a place of worship to commemorate the victory of Christianity over paganism. While no evidence exists to support his hypothesis, it caught on among the neo-Nazis.</span></font></p><font data-dcnode-id="1376" face="Arial"><span data-dcnode-id="1380" instrument_node="">
</span><p data-dcnode-id="1377"><font data-dcnode-id="1378" face="Arial"><span data-dcnode-id="1379" instrument_node="">This flag used by the French Nationalist Party in Roussillon, France, provides an example of the use of the irminsul by extremist.  Their flag depicts a white irminsul symbol within a white ring, placed on a black field.</span></font></p></font></td></tr><tr data-dcnode-id="1338"><td align="center" data-dcnode-id="1363" width="20%"><font data-dcnode-id="1364" face="Arial"><br data-dcnode-id="1370"><img alt="Image by Eugene Ipavec" border="1" data-dcnode-id="1369" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/ps_jau1.gif&amp;raw" width="216"><br data-dcnode-id="1368"><span data-dcnode-id="1367" instrument_node="">JAU Flag</span><br data-dcnode-id="1366"><br data-dcnode-id="1365"></font></td><td data-dcnode-id="1340" valign="top" width="80%"><b data-dcnode-id="1355"><font data-dcnode-id="1356" face="Arial" size="+1"><span data-dcnode-id="1361" instrument_node="">Army of the Nation (Palestine)</span><br data-dcnode-id="1360"><font data-dcnode-id="1357" size="-1"><em data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">Jaysh al Ummah</span></em></font></font></b><span data-dcnode-id="1354" instrument_node="">
</span><p data-dcnode-id="1348"><font data-dcnode-id="1349" face="Arial"><span data-dcnode-id="1353" instrument_node="">The Army of the Nation is a small terrorist group based in the southern Gaza town of Khan Yunis and led by a man known only as </span><i data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">Abu Hafss</span></i><span data-dcnode-id="1350" instrument_node="">.  The armed members of this group wear black robes over black pants with red or black "death squad" headbands. The group considers themselves "brothers" of the al-Qaida terror network and threaten not only to operate in the Giza-Tel Aviv  area, but "God willing" to take the fight to Washington. Hamas has supported and allowed such extremist groups as the JUA to train openly in Palestine.</span></font></p><font data-dcnode-id="1341" face="Arial"><span data-dcnode-id="1347" instrument_node="">
</span><p data-dcnode-id="1344"><font data-dcnode-id="1345" face="Arial"><span data-dcnode-id="1346" instrument_node="">Abu Hafss's group has claimed responsibility for several recent mortar
and rocket attacks on Israeli border communities, and is one of several small al-Qaida-inspired groups, such as the Army of the Nation and the Army of Islam, that have emerged in Gaza in recent years as the area goes deeper into poverty, which, of course, creates fertile ground for such militant groups.</span></font></p><font data-dcnode-id="1342" face="Arial"><a data-dcnode-id="1343" name="kach"></a></font></font></td></tr><tr data-dcnode-id="1277"><td align="center" data-dcnode-id="1322" width="20%"><font data-dcnode-id="1323" face="Arial"><br data-dcnode-id="1335"><img align="MIDDLE" alt="Image by Jaume OllÃƒÆ’Ã‚Â© " border="1" data-dcnode-id="1334" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/kach_movement_israel.jpg&amp;raw" width="216"><br data-dcnode-id="1333"><i data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">Kahane Chai</span></i><span data-dcnode-id="1330" instrument_node=""> Flag</span><br data-dcnode-id="1329"><br data-dcnode-id="1328"><font data-dcnode-id="1326" size="-1"><span data-dcnode-id="1327" instrument_node="">There several variants of this flag with various customized inscriptions in use.</span></font><br data-dcnode-id="1325"><br data-dcnode-id="1324"></font></td><td data-dcnode-id="1279" valign="top" width="80%"><b data-dcnode-id="1314"><font data-dcnode-id="1315" face="Arial" size="+1"><span data-dcnode-id="1320" instrument_node="">The "Thus Kahane Lives" Movement (Israel)</span><br data-dcnode-id="1319"><font data-dcnode-id="1316" size="-1"><em data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">Kach Kahane Chai</span></em></font></font></b><span data-dcnode-id="1313" instrument_node="">
</span><p data-dcnode-id="1307"><font data-dcnode-id="1308" face="Arial"><span data-dcnode-id="1312" instrument_node="">The </span><i data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">Kach</span></i><span data-dcnode-id="1309" instrument_node=""> Movement began as a far right political party in Israel, founded by Rabbi Meir Kahane in the early 1970s. It was barred from participating in elections after 1988 under Israeli elections laws that banned parties that incited racism. In 1990, Kahane was assassinated after making a speech in New York City.</span></font></p><font data-dcnode-id="1280" face="Arial"><span data-dcnode-id="1306" instrument_node="">
</span><p data-dcnode-id="1291"><font data-dcnode-id="1292" face="Arial"><span data-dcnode-id="1305" instrument_node="">After Kahane's assassination the party split with the </span><i data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">Kahane Chai</span></i><span data-dcnode-id="1302" instrument_node=""> breaking away from the main </span><i data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">Kach</span></i><span data-dcnode-id="1299" instrument_node=""> faction. Both the </span><i data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">Kach</span></i><span data-dcnode-id="1296" instrument_node=""> and </span><i data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">Kahane Chai</span></i><span data-dcnode-id="1293" instrument_node=""> Movements were banned outright in 1994, and today, both groups are considered terrorist organizations by Israel, Canada, the European Union, and the United States.</span></font></p><font data-dcnode-id="1281" face="Arial"><span data-dcnode-id="1290" instrument_node="">
</span><p data-dcnode-id="1284"><font data-dcnode-id="1285" face="Arial"><span data-dcnode-id="1289" instrument_node="">The group has been responsible for using explosives that has done damage to property, including an attempt to car bomb a Palestinian girls school in East Jerusalem, threatening and conspiring to carry out assassinations, and for soliciting funds and members for terrorist organizations.  Splinter groups of the Kach now include the Kahane Chai Organization in the USA and the </span><i data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">Ligue de Défense Juive</span></i><span data-dcnode-id="1286" instrument_node=""> in France.</span></font></p><font data-dcnode-id="1282" face="Arial"><a data-dcnode-id="1283" name="kekistan"></a></font></font></font></td></tr><tr data-dcnode-id="1250"><td align="center" data-dcnode-id="1266" width="20%"><font data-dcnode-id="1267" face="Arial"><br data-dcnode-id="1274"><img alt=" " border="1" data-dcnode-id="1273" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/kekistani.gif&amp;raw" width="230"><span data-dcnode-id="1272" instrument_node=""> </span><br data-dcnode-id="1271"><span data-dcnode-id="1270" instrument_node="">Kekistan Flag  (Fictitious)</span><br data-dcnode-id="1269"><br data-dcnode-id="1268"></font></td><td data-dcnode-id="1252" valign="top" width="80%"><b data-dcnode-id="1262"><font data-dcnode-id="1263" face="Arial" size="+1"><span data-dcnode-id="1264" instrument_node="">National Flag of Kekistan</span></font></b><span data-dcnode-id="1261" instrument_node="">
</span><p data-dcnode-id="1258"><font data-dcnode-id="1259" face="Arial"><span data-dcnode-id="1260" instrument_node="">The  fictitious nation of "Kekistan" even has a fictitious flag.  It mimics the German Nazi War Flag, with the Kek logo replacing the swastika and the green replacing the German red. It also has a 4chan logo is emblazoned in the upper left-hand corner. Alt-righters have become particularly fond of this fictitious flag because of the way its use bothers those able to recognize its Nazi-like design.</span></font></p><font data-dcnode-id="1253" face="Arial"><span data-dcnode-id="1257" instrument_node="">
</span><p data-dcnode-id="1254"><font data-dcnode-id="1255" face="Arial"><span data-dcnode-id="1256" instrument_node="">Since this flag is widely used among unaffiliated individuals and other American white supemacists it should not be affiliated any particular group.</span></font></p></font></td></tr><tr data-dcnode-id="1180"><td align="center" data-dcnode-id="1233" width="20%"><font data-dcnode-id="1245" face="Arial"><br data-dcnode-id="1247"><span data-dcnode-id="1246" instrument_node="">Knight's Party Flags</span></font><br data-dcnode-id="1244"><br data-dcnode-id="1243"><img alt="Image by Pete Loeser and Tomislav Todorovic" border="1" data-dcnode-id="1242" height="216" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/knights_2w.gif&amp;raw" width="105"><span data-dcnode-id="1241" instrument_node=""> &nbsp; </span><img alt="Image by Pete Loeser and Tomislav Todorovic" border="1" data-dcnode-id="1240" height="216" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/knights_2a.gif&amp;raw" width="80"><br data-dcnode-id="1239"><br data-dcnode-id="1238"><font data-dcnode-id="1236" size="-1"><span data-dcnode-id="1237" instrument_node="">(Variants for wall hanging)</span></font><br data-dcnode-id="1235"><br data-dcnode-id="1234"></td><td data-dcnode-id="1182" valign="top" width="80%"><b data-dcnode-id="1229"><font data-dcnode-id="1230" face="Arial" size="+1"><span data-dcnode-id="1231" instrument_node="">Knights' Party (USA)</span></font></b><span data-dcnode-id="1228" instrument_node="">
</span><p data-dcnode-id="1225"><font data-dcnode-id="1226" face="Arial"><span data-dcnode-id="1227" instrument_node="">The Knight's Party is now a registered political party whose purpose is to provide an avenue for the members of the Ku Klux Klan (see below) to run as political candidates in elections.  They host a new look for their website and now claim to be "peacefully" seeking to abolish all discriminatory affirmative action programs.  They wish to become known as the "White Rights Movement" and consider themselves as "the Last Hope for America." They are still in the same old business, but trying for a newer more "politically correct" look.</span></font></p><font data-dcnode-id="1183" face="Arial"><span data-dcnode-id="1224" instrument_node="">

</span><p data-dcnode-id="1184"><font data-dcnode-id="1185" face="Arial"><span data-dcnode-id="1186" instrument_node="">This new flag is clearly inspired by the traditional National Socialists design, but instead of white disc with a black swastika, it has a white diamond enclosing a black Sun Wheel. Flag variants include diamonds with black borders or without borders.</span></font></p></font></td></tr><tr data-dcnode-id="1083"><td align="center" data-dcnode-id="1160" width="20%"><font data-dcnode-id="1161" face="Arial"><br data-dcnode-id="1177"><img align="MIDDLE" alt="Image by Antonio Martins" border="1" data-dcnode-id="1176" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/kkk_blood_drop.jpg&amp;raw" width="216"><br data-dcnode-id="1175"><span data-dcnode-id="1174" instrument_node="">The Blood Drop Flag</span><br data-dcnode-id="1173"><br data-dcnode-id="1172"><img align="MIDDLE" alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="1171" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/kkk_blood_drop_v2.gif&amp;raw" width="216"><br data-dcnode-id="1170"><span data-dcnode-id="1169" instrument_node="">The Duke Flag</span><br data-dcnode-id="1168"><br data-dcnode-id="1167"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="1166" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/kkk2.gif&amp;raw" width="216"><br data-dcnode-id="1165"><span data-dcnode-id="1164" instrument_node="">The Sun Wheel Flag</span><br data-dcnode-id="1163"><br data-dcnode-id="1162"></font></td><td data-dcnode-id="1085" valign="top" width="80%"><b data-dcnode-id="1156"><font data-dcnode-id="1157" face="Arial" size="+1"><span data-dcnode-id="1158" instrument_node="">Knights of the Ku Klux Klan (USA)</span></font></b><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1152"><font data-dcnode-id="1153" face="Arial"><span data-dcnode-id="1154" instrument_node="">The Blood Drop symbol is most often used by various Klan organizations throughout the United States.  Usually at clan rallies there are actually a lot more United States Flags displayed than KKK flags, despite their very un-American racial beliefs.</span></font></p><font data-dcnode-id="1086" face="Arial"><span data-dcnode-id="1151" instrument_node="">
</span><p data-dcnode-id="1148"><font data-dcnode-id="1149" face="Arial"><span data-dcnode-id="1150" instrument_node="">The Ku Klux Klan was established in Tennessee in 1866. Most of the leaders were former members of the Confederate Army and the first Grand Wizard was Nathan Forrest, a confederate general during the American Civil War. In the late 1800s and early 1900s Clansmen wearing masks, white cardboard hats and draped in white sheets, have been responsible for torturing and killing black Americans and sympathetic whites.  The Civil Rights movement of the 1960s prompted a modern rebirth of the Ku Klux Klan activities that has persisted until the present day.</span></font></p><font data-dcnode-id="1087" face="Arial"><span data-dcnode-id="1147" instrument_node="">
