</span><p data-dcnode-id="5364"><font data-dcnode-id="5365" face="Arial"><span data-dcnode-id="5366" instrument_node="">The Werewolf Youth Legion (CJCC/AN-WYL) is the Aryan Nations Youth division whose purpose is to attract and sell to American youths the doctrines of their versions of National Socialism and White Supremacy.</span></font></p></font></font></font></td></tr><tr data-dcnode-id="5245"><td align="center" data-dcnode-id="5329" width="20%"><font data-dcnode-id="5330" face="Arial"><br data-dcnode-id="5355"><img align="MIDDLE" alt="Image by Antonio Martins" border="1" data-dcnode-id="5354" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/autonomous_bases_spain.jpg&amp;raw" width="216"><br data-dcnode-id="5353"><span data-dcnode-id="5352" instrument_node="">BBAA Flag</span><br data-dcnode-id="5351"><span data-dcnode-id="5350" instrument_node="">(Type 1)</span><br data-dcnode-id="5349"><br data-dcnode-id="5348"><img align="MIDDLE" alt="Image by Eugene Ipavec" border="1" data-dcnode-id="5347" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/autonomous_bases_spain_1.gif&amp;raw" width="216"><br data-dcnode-id="5346"><span data-dcnode-id="5345" instrument_node="">BBAA Flag</span><br data-dcnode-id="5344"><span data-dcnode-id="5343" instrument_node="">(Type 2)</span><br data-dcnode-id="5342"><br data-dcnode-id="5341"><img align="MIDDLE" alt="Image by Eugene Ipavec" border="1" data-dcnode-id="5340" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/autonomous_bases_spain_2.gif&amp;raw" width="216"><br data-dcnode-id="5339"><span data-dcnode-id="5338" instrument_node="">BBAA Flag</span><br data-dcnode-id="5337"><span data-dcnode-id="5336" instrument_node="">(Type 3)</span><br data-dcnode-id="5335"><br data-dcnode-id="5334"><font data-dcnode-id="5332" size="-1"><span data-dcnode-id="5333" instrument_node="">This group was very active hanging a wide variety of hate posters in the streets of cities like Madrid and Sevilla in the early 1990s</span></font><br data-dcnode-id="5331"></font></td><td data-dcnode-id="5247" valign="top" width="80%"><b data-dcnode-id="5321"><font data-dcnode-id="5322" face="Arial" size="+1"><span data-dcnode-id="5327" instrument_node="">Autonomous Bases (Spain)</span><br data-dcnode-id="5326"><font data-dcnode-id="5323" size="-1"><em data-dcnode-id="5324"><span data-dcnode-id="5325" instrument_node="">Bases Autónomas (BBAA)</span></em></font></font></b><span data-dcnode-id="5320" instrument_node="">
</span><p data-dcnode-id="5308"><font data-dcnode-id="5309" face="Arial"><span data-dcnode-id="5319" instrument_node="">The Spanish red-yellow-red flag defaced with a Celtic Cross (Sun Wheel) and/or a Carlist-like double eagle are flags of </span><i data-dcnode-id="5317"><span data-dcnode-id="5318" instrument_node="">Bases Autónomas</span></i><span data-dcnode-id="5316" instrument_node=""> (BBAA), a loose almost defunct neo-Nazi organization.  Although the BBAA disbanded, some sleeper cells are rumored to still exist in several cities, especially Madrid and Burgos. Most of the militant leaders of this neo-Nazi, anarchist, violent and clandestine organization now conduct their militant activities from within other groups, such as Resistance, the DN, </span><i data-dcnode-id="5314"><span data-dcnode-id="5315" instrument_node="">NuevOrden</span></i><span data-dcnode-id="5313" instrument_node="">, </span><i data-dcnode-id="5311"><span data-dcnode-id="5312" instrument_node="">Falangists</span></i><span data-dcnode-id="5310" instrument_node=""> and the Revolutionary Nationalist Coordinator.</span></font></p><font data-dcnode-id="5248" face="Arial"><span data-dcnode-id="5307" instrument_node="">
</span><p data-dcnode-id="5295"><font data-dcnode-id="5296" face="Arial"><span data-dcnode-id="5306" instrument_node="">Some BBAA-like Spanish cell organizations still exist, such as </span><i data-dcnode-id="5304"><span data-dcnode-id="5305" instrument_node="">Hermandad Nacionalsocialista Armagedón</span></i><span data-dcnode-id="5303" instrument_node=""> (Armageddon National Socialist Brotherhood), which is active in the Valencia area and split from </span><i data-dcnode-id="5301"><span data-dcnode-id="5302" instrument_node="">Acción Radical</span></i><span data-dcnode-id="5300" instrument_node=""> in 1998. The Armageddon Brotherhood has claimed responsibility for Molotov cocktail attacks against branches of the Popular, Socialist and </span><i data-dcnode-id="5298"><span data-dcnode-id="5299" instrument_node="">Izquierda Unida</span></i><span data-dcnode-id="5297" instrument_node=""> parties in some towns near Valencia.</span></font></p><font data-dcnode-id="5249" face="Arial"><span data-dcnode-id="5294" instrument_node="">

</span><div align="center" data-dcnode-id="5257"><span data-dcnode-id="5260" instrument_node="">Other variant flags reported as being used by the </span><i data-dcnode-id="5258"><span data-dcnode-id="5259" instrument_node="">Bases Autónomas</span></i></div><span data-dcnode-id="5256" instrument_node="">
</span><p data-dcnode-id="5250"><font data-dcnode-id="5251" face="Arial"><span data-dcnode-id="5255" instrument_node="">Other rumors about the </span><i data-dcnode-id="5253"><span data-dcnode-id="5254" instrument_node="">Bases Autónomas</span></i><span data-dcnode-id="5252" instrument_node=""> still circulate, such as ex-members of this defunct Spanish hate organization still allegedly having links to other fascist groups still operating in Italy. These various variants of their flags are still manufactured for ignorant tourists who still buy them as historical Spanish flags in souvenir shops throughout Spain.</span></font></p></font></font></td></tr><tr data-dcnode-id="5216"><td align="center" data-dcnode-id="5235" width="20%"><font data-dcnode-id="5236" face="Arial"><br data-dcnode-id="5242"><img alt="Image by Richard Knipel" border="0" data-dcnode-id="5241" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/black_moslem.gif&amp;raw" width="216"><br data-dcnode-id="5240"><span data-dcnode-id="5239" instrument_node="">Black Muslim Flag</span><br data-dcnode-id="5238"><br data-dcnode-id="5237"></font></td><td data-dcnode-id="5218" valign="top" width="80%"><b data-dcnode-id="5231"><font data-dcnode-id="5232" face="Arial" size="+1"><span data-dcnode-id="5233" instrument_node="">Black Muslim Movement Flag (USA)</span></font></b><span data-dcnode-id="5230" instrument_node="">
</span><p data-dcnode-id="5227"><font data-dcnode-id="5228" face="Arial"><span data-dcnode-id="5229" instrument_node="">Today, the Black Moslems are known as the "Nation of Islam" and are directed by Reverend Louis Farrakhan. They are not the militant organization of the past. In the early 60s, the Black Muslims were very active and violent extremist. In fact, Middle East Muslims rejected the American Black Muslim version of Islam, which was pretty much just a hate the white man movement.  Malcolm X, perhaps their most well-known leader, eventually abandoned many of these violent ideas and converted to true Sunni Islam. Because of this, he was gunned down in a mosque by two black men wielding shotguns.</span></font></p><font data-dcnode-id="5219" face="Arial"><span data-dcnode-id="5226" instrument_node="">
</span><p data-dcnode-id="5223"><font data-dcnode-id="5224" face="Arial"><span data-dcnode-id="5225" instrument_node="">Today, they describe their flag as "the symbol of unity of all Muslims throughout the World." It basically is a mirrored version of the Turkish national flag with an enlarged crescent and star.  The star is oriented with two points inside the crescent.  The symbols of the sun, moon, and the stars, represent the universe. The flag differs slightly from their logo which has the individual letters "F, J, E, and I" placed in the four corners.  They are said to stand for Freedom, Justice and Equality, and Islam.</span></font></p><font data-dcnode-id="5220" face="Arial"><span data-dcnode-id="5222" instrument_node="">
</span><a data-dcnode-id="5221" name="bm"></a></font></font></td></tr><tr data-dcnode-id="5178"><td align="center" data-dcnode-id="5201" width="20%"><font data-dcnode-id="5202" face="Arial"><br data-dcnode-id="5213"><img alt="Image by Tomislav Todorovic" border="0" data-dcnode-id="5212" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/gb-bm1.gif&amp;raw" width="216"><br data-dcnode-id="5211"><span data-dcnode-id="5210" instrument_node="">BM Flag</span><br data-dcnode-id="5209"><br data-dcnode-id="5208"><img alt="Image by Tomislav Todorovic" border="0" data-dcnode-id="5207" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/gb-bm2.gif&amp;raw" width="150"><br data-dcnode-id="5206"><span data-dcnode-id="5205" instrument_node="">BM Ceremonial Flag</span><br data-dcnode-id="5204"><br data-dcnode-id="5203"></font></td><td data-dcnode-id="5180" valign="top" width="80%"><b data-dcnode-id="5193"><font data-dcnode-id="5194" face="Arial" size="+1"><span data-dcnode-id="5199" instrument_node="">The British Movement (United Kingdom)</span><br data-dcnode-id="5198"><span data-dcnode-id="5197" instrument_node="">
</span><small data-dcnode-id="5195"><span data-dcnode-id="5196" instrument_node="">British National Socialist Movement</span></small></font></b><span data-dcnode-id="5192" instrument_node="">
</span><p data-dcnode-id="5189"><font data-dcnode-id="5190" face="Arial"><span data-dcnode-id="5191" instrument_node="">The British Movement (BM) was founded in 1968, by the former members of the British National Socialist Movement (BNSM), a similar organization founded in 1962. Active all through the 1970s, the group collapsed as a cohesive group in early 1980s, but remnants have managed to survive until the present time. Its flag is blue, charged with a red sun cross, or "sunwheel", on a white disc. Blue armbands with the same design were used.  This flag has occasionally seen more recent use by the British National Party (BNP).</span></font></p><font data-dcnode-id="5181" face="Arial"><span data-dcnode-id="5188" instrument_node="">
</span><p data-dcnode-id="5185"><font data-dcnode-id="5186" face="Arial"><span data-dcnode-id="5187" instrument_node="">The BM also used a ceremonial flag, or banner, which they called the "Honour Standard". It was charged with a white inscription BRITAIN (above) and another white inscription AWAKE (beneath) the sunwheel, and it had a white fringe. It was usually flown from a staff with the crossbar. A sunwheel style finial and name plate with the initials BM were usually mounted above the banner. Sometimes another similar name plate was attached beneath on the staff.  It was, of course, designed to be similar to the ceremonial banner used by the German National Socialist Movement (NSDAP) and helped identify the British Movement with its German predecessor. This ceremonial design was also used on hand-held flags.</span></font></p><font data-dcnode-id="5182" face="Arial"><span data-dcnode-id="5184" instrument_node="">
</span><a data-dcnode-id="5183" name="bnp"></a></font></font></td></tr><tr data-dcnode-id="5134"><td align="center" data-dcnode-id="5163" width="20%"><font data-dcnode-id="5164" face="Arial"><br data-dcnode-id="5175"><img alt="Image by Pete Loeser" border="1" data-dcnode-id="5174" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/bnp1.gif&amp;raw" width="216"><br data-dcnode-id="5173"><span data-dcnode-id="5172" instrument_node="">BNP Flag 1982</span><br data-dcnode-id="5171"><br data-dcnode-id="5170"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="5169" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/bnp2.gif&amp;raw" width="216"><br data-dcnode-id="5168"><span data-dcnode-id="5167" instrument_node="">BNP Flag 1999</span><br data-dcnode-id="5166"><br data-dcnode-id="5165"></font></td><td data-dcnode-id="5136" valign="top" width="80%"><b data-dcnode-id="5159"><font data-dcnode-id="5160" face="Arial" size="+1"><span data-dcnode-id="5161" instrument_node="">British National Party (Great Britain)</span></font></b><span data-dcnode-id="5158" instrument_node="">
</span><p data-dcnode-id="5152"><font data-dcnode-id="5153" face="Arial"><span data-dcnode-id="5157" instrument_node="">The British National Party is a far-right political party founded by John Tyndall in 1982 by merging several similar fascist parties including the old </span><a data-dcnode-id="5155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/hate2.html%23bnf"><span data-dcnode-id="5156" instrument_node="">National Front</span></a><span data-dcnode-id="5154" instrument_node="">. The BNP identified with Nazism with its activities, associations and publications, and its active denial of the Holocaust. Tyndall exclaimed "Mein Kampf is my bible." In 1999, Nick Griffin became the new leader of the BNP party and continued its policies of right-wing populism, white nationalism, and calling for "ethnic cleansing."  Although the BNP has described itself as British nationalist, racial nationalist and "ethno-nationalist." They still call for a "voluntary resettlement" of all immigrants and their descendants back to the countries of their origins, support all anti-immigration policies, demand a return of capital punishment, oppose all forms of gay and same-sex marriage, and what they call the "Islamification" of the UK.</span></font></p><font data-dcnode-id="5137" face="Arial"><span data-dcnode-id="5151" instrument_node="">
</span><p data-dcnode-id="5145"><font data-dcnode-id="5146" face="Arial"><span data-dcnode-id="5150" instrument_node="">In recent years the party has also concentrated on opposing Islam and actively campaigns against the establishment of mosques, </span><i data-dcnode-id="5148"><span data-dcnode-id="5149" instrument_node="">halal meat</span></i><span data-dcnode-id="5147" instrument_node=""> and what it calls the "Islamification" of the United Kingdom.</span></font></p><font data-dcnode-id="5138" face="Arial"><span data-dcnode-id="5144" instrument_node="">
</span><p data-dcnode-id="5141"><font data-dcnode-id="5142" face="Arial"><span data-dcnode-id="5143" instrument_node="">The original BNP party flag had a white circle centered on a blue field, with the block letters "BNP" in red centered in the circle. After Nick Griffin took over the leadership of the party the flag was design was changed to a plain white field, less bold lettering in red with a blue circle drawn around it.</span></font></p><font data-dcnode-id="5139" face="Arial"><a data-dcnode-id="5140" name="panthers"></a></font></font></font></td></tr><tr data-dcnode-id="5022"><td align="center" data-dcnode-id="5098" width="20%"><font data-dcnode-id="5099" face="Arial"><br data-dcnode-id="5131"><img alt="Image by Rick Wyatt" border="1" data-dcnode-id="5130" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/protest/african-american-flag.gif&amp;raw" width="216"><br data-dcnode-id="5129"><span data-dcnode-id="5128" instrument_node="">Afro-American Flag</span><br data-dcnode-id="5127"><br data-dcnode-id="5126"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="5125" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/black_panthers1.gif&amp;raw" width="216"><br data-dcnode-id="5124"><span data-dcnode-id="5123" instrument_node="">George Jackson Funeral 1971</span><br data-dcnode-id="5122"><br data-dcnode-id="5121"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="5120" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/black_panthers5.gif&amp;raw" width="216"><br data-dcnode-id="5119"><span data-dcnode-id="5118" instrument_node="">The "Free Huey" Flag</span><br data-dcnode-id="5117"><span data-dcnode-id="5116" instrument_node="">with white background</span><br data-dcnode-id="5115"><br data-dcnode-id="5114"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="5113" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/black_panthers4.gif&amp;raw" width="216"><br data-dcnode-id="5112"><span data-dcnode-id="5111" instrument_node="">The "Free Huey" Flag</span><br data-dcnode-id="5110"><span data-dcnode-id="5109" instrument_node="">with blue background</span><br data-dcnode-id="5108"><br data-dcnode-id="5107"><img alt="Image by Tomislav Todorovic" data-dcnode-id="5106" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/protest/african-american-flag3.gif&amp;raw" width="216"><br data-dcnode-id="5105"><span data-dcnode-id="5104" instrument_node="">Afro-American Variant</span><br data-dcnode-id="5103"><span data-dcnode-id="5102" instrument_node="">with red star</span><br data-dcnode-id="5101"><br data-dcnode-id="5100"></font></td><td data-dcnode-id="5024" valign="top" width="80%"><b data-dcnode-id="5094"><font data-dcnode-id="5095" face="Arial" size="+1"><span data-dcnode-id="5096" instrument_node="">Black Panther Party (USA)</span></font></b><span data-dcnode-id="5093" instrument_node="">
</span><p data-dcnode-id="5090"><font data-dcnode-id="5091" face="Arial"><span data-dcnode-id="5092" instrument_node="">The Black Panther Party, originally known as the Black Panther Party for Self-Defense, was an African-American revolutionary leftist organization founded in Oakland, California, by Huey Newton and Bobby Seale in 1966. The Black Panther Party achieved national and international notoriety through its involvement in the Black Power movement and in U.S. politics of the 1960s and 70s. The organization initially claimed to be protecting the African American neighborhoods from police brutality, but the leaders soon claimed to be followed Socialist and Maoist Communist doctrines. It was active in the United States from 1966 until 1982.</span></font></p><font data-dcnode-id="5025" face="Arial"><span data-dcnode-id="5089" instrument_node="">

</span><table align="center" border="0" cellpadding="2" cellspacing="2" data-dcnode-id="5055"><tbody data-dcnode-id="5056"><tr data-dcnode-id="5074"><td data-dcnode-id="5084"><div align="center" data-dcnode-id="5085"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="5086" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/black_panthers3.gif&amp;raw" width="216"></div></td><td data-dcnode-id="5081"><span data-dcnode-id="5082" instrument_node="">&nbsp;&nbsp;&nbsp;</span></td><td data-dcnode-id="5076"><div align="center" data-dcnode-id="5077"><font data-dcnode-id="5078" face="Arial"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="5079" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/black_panthers2.gif&amp;raw" width="216"></font></div></td></tr><tr data-dcnode-id="5058"><td data-dcnode-id="5068"><div align="center" data-dcnode-id="5069"><font data-dcnode-id="5070" face="Arial"><span data-dcnode-id="5071" instrument_node="">Black Panther with yellow background</span></font></div></td><td data-dcnode-id="5065"><span data-dcnode-id="5066" instrument_node="">&nbsp;&nbsp;&nbsp;</span></td><td data-dcnode-id="5060"><div align="center" data-dcnode-id="5061"><font data-dcnode-id="5062" face="Arial"><span data-dcnode-id="5063" instrument_node="">Black Panther with white background</span></font></div></td></tr></tbody></table><span data-dcnode-id="5054" instrument_node="">
</span><p data-dcnode-id="5048"><font data-dcnode-id="5049" face="Arial"><span data-dcnode-id="5053" instrument_node="">Although the Black Panthers were not noted for showing flags at their many rallies and demonstrations, the flag that is still most associated with them is the </span><a data-dcnode-id="5051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/protest.html%23garvey"><span data-dcnode-id="5052" instrument_node="">Afro-American Flag</span></a><span data-dcnode-id="5050" instrument_node="">. Another popular flag featured the springing black panther (the party logo designed by Emory Douglas) under the words "Free Huey", which was used at demonstrations against Newton's imprisonment. A variant of the flag made a reappearance at the 40th Reunion of the Black Panther Party on September 15, 2006, in Oakland, California.</span></font></p><font data-dcnode-id="5026" face="Arial"><span data-dcnode-id="5047" instrument_node="">
</span><p data-dcnode-id="5044"><font data-dcnode-id="5045" face="Arial"><span data-dcnode-id="5046" instrument_node="">A plain flag with just the springing Black Panther logo centered on it was used by the Lumpen, a music band which publicly supported the party c1970, and also at George Jackson's Funeral in Oakland (shot to death by prison guards in San Quentin Prison during an escape attempt) in 1971.</span></font></p><font data-dcnode-id="5027" face="Arial"><span data-dcnode-id="5043" instrument_node="">
</span><p data-dcnode-id="5040"><font data-dcnode-id="5041" face="Arial"><span data-dcnode-id="5042" instrument_node="">Over the years there have been many variants of the springing panther flag with differing fonts and panther designs. Because of the use of black and white photography during the Panther's heyday, many photos of the black panther flag appear to show white or gray background, although the flags frequently had light blue or even yellow fields.</span></font></p><font data-dcnode-id="5028" face="Arial"><span data-dcnode-id="5039" instrument_node="">
</span><p data-dcnode-id="5036"><font data-dcnode-id="5037" face="Arial"><span data-dcnode-id="5038" instrument_node="">The yellow used was the same as used on the Gadsen Flag, which in the sixties and seventies was used by radicals at opposite end of the spectrum than today's Tea Party. The light blue used was the same as used on the Viet Cong flag.</span></font></p><font data-dcnode-id="5029" face="Arial"><span data-dcnode-id="5035" instrument_node="">
</span><p data-dcnode-id="5032"><font data-dcnode-id="5033" face="Arial"><span data-dcnode-id="5034" instrument_node="">The last variant shown at the left is an Afro-American Flag with the addition of a red star on the black strip that was reportedly seen in Oakland in 1989 at the funeral of Huey Newton. It also saw use by the African People's Socialist Party (APSP), another Black Power party founded in 1972, as well as by the African Socialist International (ASI), which was founded by the APSP in 1982.</span></font></p><font data-dcnode-id="5030" face="Arial"><a data-dcnode-id="5031" name="bsun"></a></font></font></font></font></font></font></td></tr><tr data-dcnode-id="4972"><td align="center" data-dcnode-id="5003" width="20%"><font data-dcnode-id="5004" face="Arial"><br data-dcnode-id="5019"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="5018" height="130" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/black_sun.gif&amp;raw" width="216"><br data-dcnode-id="5017"><span data-dcnode-id="5016" instrument_node="">Sun Wheel Flag</span><br data-dcnode-id="5015"><br data-dcnode-id="5014"><br data-dcnode-id="5013"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="5012" height="130" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/black_sun_red.gif&amp;raw" width="130"><br data-dcnode-id="5011"><span data-dcnode-id="5010" instrument_node="">Sun Wheel Flag</span><br data-dcnode-id="5009"><small data-dcnode-id="5007"><span data-dcnode-id="5008" instrument_node="">(Red variant)</span></small><br data-dcnode-id="5006"><br data-dcnode-id="5005"></font></td><td data-dcnode-id="4974" valign="top" width="80%"><b data-dcnode-id="4995"><font data-dcnode-id="4996" face="Arial" size="+1"><span data-dcnode-id="5001" instrument_node="">The Black Sun</span><br data-dcnode-id="5000"><small data-dcnode-id="4997"><em data-dcnode-id="4998"><span data-dcnode-id="4999" instrument_node="">Schwarze Sonne</span></em></small></font></b><span data-dcnode-id="4994" instrument_node="">
</span><p data-dcnode-id="4991"><font data-dcnode-id="4992" face="Arial"><span data-dcnode-id="4993" instrument_node="">The Black Sun, or Sun Wheel, is an occult symbol modeled after the central pattern of the floor mosaic in a hall of Wewelsburg Castle in Germany.  Construction of a planned cult center for the German SS forces was planned there by Heinrich Himmler, but never completed.  It is not known whether or not the mosaic was placed on the floor during the work on the hall between 1938-1943, or if it was there previously.  Some scholars have tried to trace it back to the late Roman and early medieval periods, but this all remains speculation.</span></font></p><font data-dcnode-id="4975" face="Arial"><span data-dcnode-id="4990" instrument_node="">
</span><p data-dcnode-id="4984"><font data-dcnode-id="4985" face="Arial"><span data-dcnode-id="4989" instrument_node="">The symbol has, however, been adopted by neo-Nazi groups and placed on a variety of flags.  The name </span><em data-dcnode-id="4987"><span data-dcnode-id="4988" instrument_node="">Schwarze Sonne</span></em><span data-dcnode-id="4986" instrument_node=""> (Black Sun) came into use after World War II. It is not known what the original Nazis occult name for the symbol was or what it actually stood for.  It was especially promoted by Miguel Serrano, an esoteric neo-Nazi writer from Chile, as the symbol of an invisible source of spiritual energy which would repurify the blood of Aryans and bring on a new Golden Age. Serrano claimed that Aryans were descendants of extragalactic beings called Hyperboreans and they could restore their "blood-memory" in the light of the "Black Sun."</span></font></p><font data-dcnode-id="4976" face="Arial"><span data-dcnode-id="4983" instrument_node="">
</span><p data-dcnode-id="4977"><font data-dcnode-id="4978" face="Arial"><span data-dcnode-id="4982" instrument_node="">In 2016, the symbol colored in red also appeared on a flag with a black field. The flag  was square, or nearly square, and photographed in Roussillon, France, most likely used by members of the French Nationalist Party (Also see </span><a data-dcnode-id="4980" href="#fnp"><span data-dcnode-id="4981" instrument_node="">Irminsul Symbol</span></a><span data-dcnode-id="4979" instrument_node=""> on this page). The ratio of the symbol on the red variant also seemed to be slightly larger than in general use.</span></font></p></font></font></td></tr><tr data-dcnode-id="4944"><td align="center" data-dcnode-id="4962" width="20%"><font data-dcnode-id="4963" face="Arial"><br data-dcnode-id="4969"><img alt="Image by Matthew Wittmer" border="1" data-dcnode-id="4968" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/mt_carmel_waco_tx_1993.gif&amp;raw" width="216"><br data-dcnode-id="4967"><span data-dcnode-id="4966" instrument_node="">The Branch Flag</span><br data-dcnode-id="4965"><br data-dcnode-id="4964"></font></td><td data-dcnode-id="4946" valign="top" width="80%"><b data-dcnode-id="4958"><font data-dcnode-id="4959" face="Arial" size="+1"><span data-dcnode-id="4960" instrument_node="">The Branch Davidians (USA)</span></font></b><span data-dcnode-id="4957" instrument_node="">
</span><p data-dcnode-id="4954"><font data-dcnode-id="4955" face="Arial"><span data-dcnode-id="4956" instrument_node="">This is the flag flown at the Mt. Carmel Branch Davidian Compound during the infamous Waco Siege in 1993. The Branch Davidians, or simply "The Branch," were an extremist religious group that split from the Seventh-Day Adventist Church in 1930s.  The Davidians believed themselves to be living in the time of the Biblical Final Judgment and Christ's Second Coming. The group and its members were "excommunicated" by the Adventist Church after the split.</span></font></p><font data-dcnode-id="4947" face="Arial"><span data-dcnode-id="4953" instrument_node="">
</span><p data-dcnode-id="4950"><font data-dcnode-id="4951" face="Arial"><span data-dcnode-id="4952" instrument_node="">The Mt. Carmel Branch flag featured a stylized six-winged fiery serpent flying over the white earth below with the "Seven Seals" of Biblical prophecy lined up on the horizon in position to trigger the Apocalypse.  They gained national notoriety for their violent 51 day stand during the "Waco Siege of 1993."  During the seige, the FBI, ATF agents, and the Texas National Guard lay siege on the Mount Carmel Center near Waco, Texas, resulting in the deaths of their leader, David Koresh, and 82 of his followers, plus four Bureau of Alcohol, Tobacco, and Firearms (ATF) agents.</span></font></p><font data-dcnode-id="4948" face="Arial"><a data-dcnode-id="4949" name="boog"></a></font></font></td></tr><tr data-dcnode-id="4848"><td align="center" data-dcnode-id="4913" width="20%"><font data-dcnode-id="4914" face="Arial"><br data-dcnode-id="4941"><img alt="Image by Pete Loeser" border="1" data-dcnode-id="4940" height="130" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/boogaloo.gif&amp;raw" width="216"><br data-dcnode-id="4939"><span data-dcnode-id="4938" instrument_node="">Boogaloo Flag (Type #1)</span><br data-dcnode-id="4937"><br data-dcnode-id="4936"><br data-dcnode-id="4935"><font data-dcnode-id="4915" face="Arial"><img alt="Image by Pete Loeser" border="1" data-dcnode-id="4934" height="130" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/boogaloo2.gif&amp;raw" width="216"><br data-dcnode-id="4933"><span data-dcnode-id="4932" instrument_node="">Boogaloo Flag (Type #2)</span><br data-dcnode-id="4931"><span data-dcnode-id="4930" instrument_node="">with reversed igloo logo</span><br data-dcnode-id="4929"><br data-dcnode-id="4928"><br data-dcnode-id="4927"><img alt="Image by Pete Loeser" border="1" data-dcnode-id="4926" height="130" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/boogaloo3.gif&amp;raw" width="216"><br data-dcnode-id="4925"><span data-dcnode-id="4924" instrument_node="">Boogaloo Flag (Type #3)</span><br data-dcnode-id="4923"><br data-dcnode-id="4922"><br data-dcnode-id="4921"><img alt="Image by Pete Loeser" border="1" data-dcnode-id="4920" height="130" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/boogaloo4.gif&amp;raw" width="216"><br data-dcnode-id="4919"><span data-dcnode-id="4918" instrument_node="">Boogaloo Flag (Type #4)</span><br data-dcnode-id="4917"><br data-dcnode-id="4916"></font></font></td><td data-dcnode-id="4850" valign="top" width="80%"><b data-dcnode-id="4909"><font data-dcnode-id="4910" face="Arial" size="+1"><span data-dcnode-id="4911" instrument_node="">The Boogaloo Movement 2019 (USA)</span></font></b><span data-dcnode-id="4908" instrument_node="">
</span><p data-dcnode-id="4905"><font data-dcnode-id="4906" face="Arial"><span data-dcnode-id="4907" instrument_node="">The Boogaloos are a far-right anti-government extremist movement or milita. They are often referred to as "boogaloo boys" or "boogaloo bois." They often identify themselves as "libertarian" and say they seek to incite a second American Civil War which they call the "boogaloo."</span></font></p><font data-dcnode-id="4851" face="Arial"><span data-dcnode-id="4904" instrument_node="">
</span><p data-dcnode-id="4901"><font data-dcnode-id="4902" face="Arial"><span data-dcnode-id="4903" instrument_node="">According to the Southern Poverty Law Center, "the term 'Boogaloo' which began to predominate in far-right web spaces in early 2019, began as a shorthand for civil unrest following potential local or federal firearms confiscation and has been embraced by antigovernment and white nationalist communities."</span></font></p><font data-dcnode-id="4852" face="Arial"><span data-dcnode-id="4900" instrument_node="">
</span><p data-dcnode-id="4891"><font data-dcnode-id="4892" face="Arial"><span data-dcnode-id="4899" instrument_node="">The movement especially attracts a combination of gun rights, anti-government, white supremacist, neo-Nazi, and racists who believe that the impending unrest will become a race war. At demonstrations they appear heavily armed and often dressed in Hawaiian shirts and military fatigues.  They use logos and other imagery incorporating igloos, palm trees, and Hawaiian prints.  The members claim that the group and its ideology are nothing more than online jokes, similar to those used by the </span><a data-dcnode-id="4897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/hate3.html%23pb"><span data-dcnode-id="4898" instrument_node="">Proud Boys</span></a><span data-dcnode-id="4896" instrument_node="">, but militant members of the Boogaloo Movement have been charged with violent crimes, been linked to violent disruptions in the George Floyd and </span><a data-dcnode-id="4894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/protest3.html%23blm2"><span data-dcnode-id="4895" instrument_node="">Black Lives Matter</span></a><span data-dcnode-id="4893" instrument_node=""> protests, and the killing of two security and law enforcement officers.</span></font></p><font data-dcnode-id="4853" face="Arial"><span data-dcnode-id="4890" instrument_node="">
</span><div align="center" data-dcnode-id="4866"><span data-dcnode-id="4889" instrument_node="">

</span><table align="center" border="0" cellpadding="2" cellspacing="2" data-dcnode-id="4867"><tbody data-dcnode-id="4868"><tr data-dcnode-id="4880"><td data-dcnode-id="4884"><div align="center" data-dcnode-id="4885"><img alt="Image by Pete Loeser" border="1" data-dcnode-id="4886" height="130" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/boogaloo1.gif&amp;raw"></div></td></tr><tr data-dcnode-id="4870"><td data-dcnode-id="4874"><div align="center" data-dcnode-id="4875"><small data-dcnode-id="4876"><span data-dcnode-id="4877" instrument_node="">Boogaloo Flag (Type #1) with reversed Logo</span></small></div></td></tr></tbody></table></div><span data-dcnode-id="4865" instrument_node="">
</span><p data-dcnode-id="4862"><font data-dcnode-id="4863" face="Arial"><span data-dcnode-id="4864" instrument_node="">They often refer to their flag as either the "Big Igloo" or "Boogalloo" Flag.  The main flag (Type #1) used by the group is a modified black and white striped national flag where the canton features a white igloo on a black field. The stripe below the canton adds the only color to the flag done with a Hawaiian print. One variant Boogaloo flag (Type #2) adds the popular "Snake and Pepe the Frog" meme that has become popular with far-right extremist groups, above the igloo and the words "Come and Start It" below.</span></font></p><font data-dcnode-id="4854" face="Arial"><span data-dcnode-id="4861" instrument_node="">
</span><p data-dcnode-id="4858"><font data-dcnode-id="4859" face="Arial"><span data-dcnode-id="4860" instrument_node="">Another variant (type #3) features a palm tree and igloo in the black canton. The Type #4 variant uses a Betsy Ross circle of stars around the igloo in the black canton.  The Hawaiian prints differ in multitudes of variants, as does the overall flag designs.</span></font></p><font data-dcnode-id="4855" face="Arial"><span data-dcnode-id="4857" instrument_node="">
</span><a data-dcnode-id="4856" name="bi-france"></a></font></font></font></font></font></td></tr><tr data-dcnode-id="4729"><td align="center" data-dcnode-id="4821" width="20%"><font data-dcnode-id="4822" face="Arial"><br data-dcnode-id="4845"><br data-dcnode-id="4844"><img alt="Image by Pete Loeser" border="1" data-dcnode-id="4843" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/bloc_identitaire1.gif&amp;raw" width="216"><br data-dcnode-id="4842"><span data-dcnode-id="4841" instrument_node="">BI Flag (yellow)</span><br data-dcnode-id="4840"><br data-dcnode-id="4839"><br data-dcnode-id="4838"><br data-dcnode-id="4837"><img alt="Image by Pete Loeser" border="0" data-dcnode-id="4836" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/bloc_identitaire2.gif&amp;raw" width="216"><br data-dcnode-id="4835"><span data-dcnode-id="4834" instrument_node="">BI Flag (black)</span><br data-dcnode-id="4833"><br data-dcnode-id="4832"><br data-dcnode-id="4831"><br data-dcnode-id="4830"><img alt="Image from BI website" border="1" data-dcnode-id="4829" height="130" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/bloc_identitaire3.gif&amp;raw" width="216"><br data-dcnode-id="4828"><span data-dcnode-id="4827" instrument_node="">Current BI Logo</span><br data-dcnode-id="4826"><br data-dcnode-id="4825"><span data-dcnode-id="4824" instrument_node="">
</span></font></td><td data-dcnode-id="4731" valign="top" width="80%"><b data-dcnode-id="4812"><font data-dcnode-id="4813" face="Arial" size="+1"><span data-dcnode-id="4819" instrument_node="">The Identity Block (or Identitarian Bloc) (France)</span><br data-dcnode-id="4818"><span data-dcnode-id="4817" instrument_node=""> </span><font data-dcnode-id="4814" size="-1"><i data-dcnode-id="4815"><span data-dcnode-id="4816" instrument_node="">Bloc Identitaire</span></i></font></font></b><span data-dcnode-id="4811" instrument_node="">
</span><p data-dcnode-id="4793"><font data-dcnode-id="4794" face="Arial"><span data-dcnode-id="4810" instrument_node="">The </span><i data-dcnode-id="4808"><span data-dcnode-id="4809" instrument_node="">Bloc Identitaire</span></i><span data-dcnode-id="4807" instrument_node=""> is an extreme right French nationalist political group. It was founded in 2003 by former members of </span><i data-dcnode-id="4805"><span data-dcnode-id="4806" instrument_node="">Unité Radicale</span></i><span data-dcnode-id="4804" instrument_node=""> and several other nationalist groups. The </span><i data-dcnode-id="4802"><span data-dcnode-id="4803" instrument_node="">Bloc Identitaire</span></i><span data-dcnode-id="4801" instrument_node=""> claims to represent all "young French and Europeans who are proud of their roots and of their heritage." It opposes what it calls "miscegenation" and "imperialism" (both American and Moslem), and has organized campaigns and demonstrations, sometimes violent, against Moslems, Jews, Communists, and other non-white ethnic and political groups. The </span><i data-dcnode-id="4799"><span data-dcnode-id="4800" instrument_node="">Bloc identitaire</span></i><span data-dcnode-id="4798" instrument_node=""> runs the Nationalist Press Agency and website called </span><i data-dcnode-id="4796"><span data-dcnode-id="4797" instrument_node="">Novopress</span></i><span data-dcnode-id="4795" instrument_node="">, and identifies itself with other neo-Nazi and extremist groups in other parts of Western Europe and North America.</span></font></p><font data-dcnode-id="4732" face="Arial"><span data-dcnode-id="4792" instrument_node="">
</span><p data-dcnode-id="4783"><font data-dcnode-id="4784" face="Arial"><span data-dcnode-id="4791" instrument_node="">One of their more imaginative, and less violent, activities was the use of soups with pork as "identity soups" (</span><i data-dcnode-id="4789"><span data-dcnode-id="4790" instrument_node="">soupes identitaires</span></i><span data-dcnode-id="4788" instrument_node="">) to attack and belittle certain ethnic groups. The group has been banded as "discriminatory and xenophobic" by HALDE (High Authority for the Struggle Against Discrimination and for Equality - </span><i data-dcnode-id="4786"><span data-dcnode-id="4787" instrument_node="">Haute autorité de lutte contre les discriminations et pour l'égalité</span></i><span data-dcnode-id="4785" instrument_node="">) a French "independent administrative authority" which "has the right to judge all discrimination, direct or indirect, that is prohibited by law or an international agreement to which France is a signatory."</span></font></p><font data-dcnode-id="4733" face="Arial"><span data-dcnode-id="4782" instrument_node="">

</span><table align="center" border="0" cellpadding="2" cellspacing="2" data-dcnode-id="4748"><tbody data-dcnode-id="4749"><tr data-dcnode-id="4767"><td data-dcnode-id="4776"><div align="center" data-dcnode-id="4777"><img alt=" Image by Pierre Gay" border="1" data-dcnode-id="4778" height="100" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/misc/fr-lang.gif&amp;raw"></div></td><td data-dcnode-id="4773"><span data-dcnode-id="4774" instrument_node="">&nbsp;&nbsp;&nbsp;</span></td><td data-dcnode-id="4769"><div align="center" data-dcnode-id="4770"><img alt="Image by Jorge Candeias" border="1" data-dcnode-id="4771" height="100" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/misc/fr-rous.gif&amp;raw"></div></td></tr><tr data-dcnode-id="4751"><td data-dcnode-id="4761"><div align="center" data-dcnode-id="4762"><small data-dcnode-id="4763"><span data-dcnode-id="4764" instrument_node="">Traditional Flag of Languedoc Province</span></small></div></td><td data-dcnode-id="4758"><span data-dcnode-id="4759" instrument_node="">&nbsp;&nbsp;&nbsp;</span></td><td data-dcnode-id="4753"><div align="center" data-dcnode-id="4754"><small data-dcnode-id="4755"><span data-dcnode-id="4756" instrument_node="">Traditional Flag of Roussillon Province</span></small></div></td></tr></tbody></table></div><span data-dcnode-id="4746" instrument_node="">
</span><p data-dcnode-id="4734"><font data-dcnode-id="4735" face="Arial"><span data-dcnode-id="4745" instrument_node="">The flag most commonly attributed to the </span><i data-dcnode-id="4743"><span data-dcnode-id="4744" instrument_node="">Bloc Identitaire</span></i><span data-dcnode-id="4742" instrument_node=""> has either a yellow or black field, with the symbol of the </span><i data-dcnode-id="4740"><span data-dcnode-id="4741" instrument_node="">lambda Spartan</span></i><span data-dcnode-id="4739" instrument_node=""> centered on it in contrasting black or yellow. A number of these flags were used by the BI at the "Pigs' March," organized on May 14, 2011, in Lyon.  The BI, like many extremist groups, is perfectly willing to "hijack" traditional flags and symbols for their use.  The traditional flags of Languedoc and Roussillon Provinces would be perfect examples of this "borrowing to legitimize" by the </span><i data-dcnode-id="4737"><span data-dcnode-id="4738" instrument_node="">Bloc Identitaire</span></i><span data-dcnode-id="4736" instrument_node="">, who have displayed these flags during their demonstrations and parades. The newest BI Party symbol/logo is the black boar, but has yet failed to materialize on any flag.</span></font></p></font></font></td></tr><tr data-dcnode-id="4631"><td align="center" data-dcnode-id="4711" width="20%"><font data-dcnode-id="4712" face="Arial"><br data-dcnode-id="4726"><br data-dcnode-id="4725"><img alt="Image by Pete Loeser" border="1" data-dcnode-id="4724" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/de%257Didbe1.gif&amp;raw" width="216"><br data-dcnode-id="4723"><span data-dcnode-id="4722" instrument_node="">BI Flag (yellow)</span><br data-dcnode-id="4721"><br data-dcnode-id="4720"><br data-dcnode-id="4719"><br data-dcnode-id="4718"><img alt="Image by Pete Loeser" border="0" data-dcnode-id="4717" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/de%257Didbe2.gif&amp;raw" width="216"><br data-dcnode-id="4716"><span data-dcnode-id="4715" instrument_node="">BI Flag (black)</span><br data-dcnode-id="4714"><br data-dcnode-id="4713"></font></td><td data-dcnode-id="4633" valign="top" width="80%"><b data-dcnode-id="4702"><font data-dcnode-id="4703" face="Arial" size="+1"><span data-dcnode-id="4709" instrument_node="">Identitarian Bloc (Germany)</span><br data-dcnode-id="4708"><span data-dcnode-id="4707" instrument_node=""> </span><font data-dcnode-id="4704" size="-1"><i data-dcnode-id="4705"><span data-dcnode-id="4706" instrument_node="">Identitäre Bewegung</span></i></font></font></b><span data-dcnode-id="4701" instrument_node="">
</span><p data-dcnode-id="4698"><font data-dcnode-id="4699" face="Arial"><span data-dcnode-id="4700" instrument_node="">The Identitarian Movement is a German ultra-rightist movement modeled after the French movement of the same name. It was founded in 2012 and along with a shared ideology, it also uses the same symbols used by the French Identitarians on their flags: the black "Spartan lambda" on a yellow field, and the reversed colors of a yellow lambda on a black field.</span></font></p><font data-dcnode-id="4634" face="Arial"><span data-dcnode-id="4697" instrument_node="">

</span><table border="0" data-dcnode-id="4664" width="100%"><tbody data-dcnode-id="4665"><tr data-dcnode-id="4683"><td data-dcnode-id="4692"><div align="center" data-dcnode-id="4693"><img alt="Image by " border="1" data-dcnode-id="4694" height="100" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/german/de_pr1.gif&amp;raw"></div></td><td data-dcnode-id="4689"><span data-dcnode-id="4690" instrument_node="">&nbsp;&nbsp;&nbsp;</span></td><td data-dcnode-id="4685"><div align="center" data-dcnode-id="4686"><img alt="Image by " border="0" data-dcnode-id="4687" height="100" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/german/de-ba-m2.gif&amp;raw"></div></td></tr><tr data-dcnode-id="4667"><td data-dcnode-id="4677"><div align="center" data-dcnode-id="4678"><small data-dcnode-id="4679"><span data-dcnode-id="4680" instrument_node="">Josef Wirmer's Resistance Flag</span></small></div></td><td data-dcnode-id="4674"><span data-dcnode-id="4675" instrument_node="">&nbsp;&nbsp;&nbsp;</span></td><td data-dcnode-id="4669"><div align="center" data-dcnode-id="4670"><small data-dcnode-id="4671"><span data-dcnode-id="4672" instrument_node="">Munich Lozengy Flag (traditional)</span></small></div></td></tr></tbody></table></div><span data-dcnode-id="4662" instrument_node="">
</span><p data-dcnode-id="4659"><font data-dcnode-id="4660" face="Arial"><span data-dcnode-id="4661" instrument_node="">Along with their organization flags, the national flag of Germany is also widely used by the group.  Josef Wirmer's "Resistance Flag" (which has become popular among German ultra-rightists over the last several years) is also seen at times, as well as a variety of local flags, such as the black and yellow lozengy flag of Munich which has been frequently photographed in demonstrations outside that city, suggesting that the local Munich branch of the movement is very active nationwide.</span></font></p><font data-dcnode-id="4635" face="Arial"><span data-dcnode-id="4658" instrument_node="">
</span><b data-dcnode-id="4651"><font data-dcnode-id="4652" face="Arial" size="+1"><span data-dcnode-id="4657" instrument_node="">Identitarian Movement Austria (Austria)</span><br data-dcnode-id="4656"><font data-dcnode-id="4653" size="-1"><i data-dcnode-id="4654"><span data-dcnode-id="4655" instrument_node="">Identitäre Bewegung Österreichs</span></i></font></font></b><span data-dcnode-id="4650" instrument_node="">
</span><p data-dcnode-id="4638"><font data-dcnode-id="4639" face="Arial"><span data-dcnode-id="4649" instrument_node="">Using identical BI flags there is also the Identitarian Movement Austria (</span><i data-dcnode-id="4647"><span data-dcnode-id="4648" instrument_node="">Identitëre Bewegung Österreich</span></i><span data-dcnode-id="4646" instrument_node="">), sometimes spelled Identitarian Movement of Austria (</span><i data-dcnode-id="4644"><span data-dcnode-id="4645" instrument_node="">Identitäre Bewegung Österreichs</span></i><span data-dcnode-id="4643" instrument_node="">), also founded in 2012. It, like its German counterpart, is  modeled after the Identitarian Bloc (</span><i data-dcnode-id="4641"><span data-dcnode-id="4642" instrument_node="">Bloc Identitaire</span></i><span data-dcnode-id="4640" instrument_node="">) of France.</span></font></p><font data-dcnode-id="4636" face="Arial"><span data-dcnode-id="4637" instrument_node="">
</span></font></font></font></td></tr><tr data-dcnode-id="4606"><td align="center" data-dcnode-id="4621" width="20%"><font data-dcnode-id="4622" face="Arial"><br data-dcnode-id="4628"><img alt="Image by Antonio Martins" border="1" data-dcnode-id="4627" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/br.gif&amp;raw" width="216"><br data-dcnode-id="4626"><span data-dcnode-id="4625" instrument_node="">BR Flag</span><br data-dcnode-id="4624"><br data-dcnode-id="4623"></font></td><td data-dcnode-id="4608" valign="top" width="80%"><b data-dcnode-id="4613"><font data-dcnode-id="4614" face="Arial" size="+1"><span data-dcnode-id="4619" instrument_node="">Red Brigades (Italy)</span><br data-dcnode-id="4618"><font data-dcnode-id="4615" size="-1"><i data-dcnode-id="4616"><span data-dcnode-id="4617" instrument_node="">Brigate Rosse</span></i></font></font></b><span data-dcnode-id="4612" instrument_node="">
</span><p data-dcnode-id="4609"><font data-dcnode-id="4610" face="Arial"><span data-dcnode-id="4611" instrument_node="">The Red Brigades was an Italian Marxist-Leninist terrorist organization that was behind numerous violent incidents, assassinations, acts of sabotage, bank robberies, and kidnappings. The Red Brigades attained notoriety in the 1970s and early 1980s with these violent attempts to destabilize Italy.  First formed in 1967, this violent left wing extremist organization sought to create a "revolutionary" state through armed struggle, and to force  Italy to leave the North Atlantic Treaty Organization. In the late 1980s, the group was broken up by mass arrests and then slowly faded into insignificance as the leadership turned on each other.</span></font></p></td></tr><tr data-dcnode-id="4546"><td align="center" data-dcnode-id="4584" width="20%"><font data-dcnode-id="4585" face="Arial"><br data-dcnode-id="4603"><img align="MIDDLE" alt="Image by Antonio Martins" border="1" data-dcnode-id="4602" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/boer_resistance_movement.jpg&amp;raw" width="216"><br data-dcnode-id="4601"><span data-dcnode-id="4600" instrument_node="">BWB Flag (under von Maltitz)</span><br data-dcnode-id="4599"><br data-dcnode-id="4598"><img align="MIDDLE" alt="Image by Antonio Martins" border="1" data-dcnode-id="4597" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/boer_resistance_movement_%28bbw%29.jpg&amp;raw" width="216"><br data-dcnode-id="4596"><span data-dcnode-id="4595" instrument_node="">BWB Flag (under Ford)</span><br data-dcnode-id="4594"><br data-dcnode-id="4593"><span data-dcnode-id="4592" instrument_node="">
</span><img align="MIDDLE" alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="4591" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/boer_resistance_movement2.gif&amp;raw" width="216"><br data-dcnode-id="4590"><span data-dcnode-id="4589" instrument_node="">BWB Flag (current variant)</span><br data-dcnode-id="4588"><br data-dcnode-id="4587"><span data-dcnode-id="4586" instrument_node="">
</span></font></td><td data-dcnode-id="4548" valign="top" width="80%"><b data-dcnode-id="4576"><font data-dcnode-id="4577" face="Arial" size="+1"><span data-dcnode-id="4582" instrument_node="">Boer Resistance Movement (South Africa)</span><br data-dcnode-id="4581"><font data-dcnode-id="4578" size="-1"><em data-dcnode-id="4579"><span data-dcnode-id="4580" instrument_node="">Boere Weerstandsbeweging (BWB)</span></em></font></font></b><span data-dcnode-id="4575" instrument_node="">
</span><p data-dcnode-id="4569"><font data-dcnode-id="4570" face="Arial"><span data-dcnode-id="4574" instrument_node="">This was the flag of </span><i data-dcnode-id="4572"><span data-dcnode-id="4573" instrument_node="">Boere Weerstandsbeweging</span></i><span data-dcnode-id="4571" instrument_node=""> (BWB) which was black with white cross fimbrated red; in the center of the cross is a white circle fimbrated red with three black "7"s. The BWB was initially led by Eddie von Maltitz and subsequently by Andrew Ford. This flag and its symbol are now also being used by European Nazis as they have volunteered to fight in a race war in South Africa.</span></font></p><font data-dcnode-id="4549" face="Arial"><span data-dcnode-id="4568" instrument_node="">
</span><p data-dcnode-id="4565"><font data-dcnode-id="4566" face="Arial"><span data-dcnode-id="4567" instrument_node="">When Andrew Ford took over the leadership the flag was replaced by a similar one instead of having the three 7s, bears the letters BWB in white arranged in a triangular fashion (pointing downwards) on a similarly directed black triangle.</span></font></p><font data-dcnode-id="4550" face="Arial"><span data-dcnode-id="4564" instrument_node="">
</span><p data-dcnode-id="4561"><font data-dcnode-id="4562" face="Arial"><span data-dcnode-id="4563" instrument_node="">The group appeared either to have gone underground or had ceased to exist, because their public activities were curtailed after 1999, but a new website has appeared in 2012.  Until the appearance of this new website, their last public activity as the Boer Resistance Movement was when they offered to send a force of 35 volunteer soldiers to Yugoslavia in 1999 to help defend Serbia against "NATO aggression." It is unknown if anything ever came of this offer.</span></font></p><font data-dcnode-id="4551" face="Arial"><span data-dcnode-id="4560" instrument_node="">
</span><p data-dcnode-id="4557"><font data-dcnode-id="4558" face="Arial"><span data-dcnode-id="4559" instrument_node="">Their current BWB flag, which is featured on their website, has a cross composed of five black letters, four B's and one W, arranged on the white disc so as to give the abbreviation BWB both horizontally and vertically. The white cross is described as the symbol of faith and purity, its red borders as the symbol of both the blood Christ shed on the cross and the blood Boer people shed in struggle for freedom, and the black field as the symbol of courage and determination of Boer people.</span></font></p><font data-dcnode-id="4552" face="Arial"><span data-dcnode-id="4556" instrument_node="">
</span><p data-dcnode-id="4553"><font data-dcnode-id="4554" face="Arial"><span data-dcnode-id="4555" instrument_node="">How viable this new rebirth of the BWB is cannot yet be determined, but the website seems to be a serious recruitment effort.  On their website they state they hope to bring the Boer nation together, and point to the current South African government as "a sadistic and racist regime" that must be stopped, stating their main goal is to free the three Boer republics (Transvaal, North Natal, Free State) from the "Afrikaner betrayal."</span></font></p></font></font></font></font></td></tr><tr data-dcnode-id="4499"><td align="center" data-dcnode-id="4531" width="20%"><font data-dcnode-id="4532" face="Arial"><br data-dcnode-id="4543"><img align="MIDDLE" alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="4542" height="175" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/ch-bte.gif&amp;raw" width="175"><br data-dcnode-id="4541"><span data-dcnode-id="4540" instrument_node="">BTE Flag</span><br data-dcnode-id="4539"><br data-dcnode-id="4538"><img align="MIDDLE" alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="4537" height="120" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/ch-bte_d.gif&amp;raw" width="120"><br data-dcnode-id="4536"><span data-dcnode-id="4535" instrument_node="">Closeup of Initials</span><br data-dcnode-id="4534"><br data-dcnode-id="4533"></font></td><td data-dcnode-id="4501" valign="top" width="80%"><b data-dcnode-id="4522"><font data-dcnode-id="4523" face="Arial" size="+1"><span data-dcnode-id="4529" instrument_node="">League of True Confederates (Switzerland)</span><br data-dcnode-id="4528"><span data-dcnode-id="4527" instrument_node="">
</span><font data-dcnode-id="4524" size="-1"><em data-dcnode-id="4525"><span data-dcnode-id="4526" instrument_node="">Bund treuer Eidgenossen (BTE)</span></em></font></font></b><span data-dcnode-id="4521" instrument_node="">
</span><p data-dcnode-id="4507"><font data-dcnode-id="4508" face="Arial"><span data-dcnode-id="4520" instrument_node="">The full name of this Swiss extremist party was </span><em data-dcnode-id="4518"><span data-dcnode-id="4519" instrument_node="">Bund treuer Eidgenossen nationalsozialistischer Weltanschauung</span></em><span data-dcnode-id="4517" instrument_node="">, which translates loosely into the "League of True Confederates of the National Socialist Ideology." The party was founded in March of 1938 by former members of the </span><a data-dcnode-id="4515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/hate3.html%23snf"><span data-dcnode-id="4516" instrument_node="">Swiss National Front</span></a><span data-dcnode-id="4514" instrument_node="">, who thought that their old party was no longer truly following the Nazi ideology. It was led by Alfred Zander, who in September of 1938 attended the Nuremberg Rally (the annual convention of the Nazi party) and spoke in favor of the idea that Switzerland should join the Reich. </span><span data-dcnode-id="4512" instrument_node=""> In May of 1938, Bruno Oswald in Berne founded a local chapter with about 25 members, while the "national" membership of BTE would eventually  reach about 175 members. In July of 1939 Zander was arrested on his return from Germany and sentenced to jail, together with other BTE leaders and party members. In October of 1940 the party was disbanded and most of its remaining members joined the National Movement of Switzerland (</span><em data-dcnode-id="4510"><span data-dcnode-id="4511" instrument_node="">Nationale Bewegung der Schweiz</span></em><span data-dcnode-id="4509" instrument_node="">), another similar group which intended to become a unified Swiss Nazi party. The Swiss Government banned the group the following month.</span></font></p><font data-dcnode-id="4502" face="Arial"><span data-dcnode-id="4506" instrument_node="">
</span><p data-dcnode-id="4503"><font data-dcnode-id="4504" face="Arial"><span data-dcnode-id="4505" instrument_node="">Their flag was derived from that of the National Front, adding the initials BTE to the center of the cross, thus employing the full color set of colors used on the German NSDAP flag.</span></font></p></font></td></tr><tr data-dcnode-id="4451"><td align="center" data-dcnode-id="4483" width="20%"><font data-dcnode-id="4484" face="Arial"><br data-dcnode-id="4496"><img align="MIDDLE" alt="Image by Jan Oskar Engene" border="1" data-dcnode-id="4495" height="130" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/british_union_of_fascists_1932-35.jpg&amp;raw" width="216"><br data-dcnode-id="4494"><span data-dcnode-id="4493" instrument_node="">BUF Flag 1932</span><br data-dcnode-id="4492"><br data-dcnode-id="4491"><br data-dcnode-id="4490"><img align="MIDDLE" alt="Image by Jan Oskar Engene" border="1" data-dcnode-id="4489" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/british_union_of_fascists_1932-1940.jpg&amp;raw" width="216"><br data-dcnode-id="4488"><span data-dcnode-id="4487" instrument_node="">BUFNS Flag 1935</span><br data-dcnode-id="4486"><br data-dcnode-id="4485"></font></td><td data-dcnode-id="4453" valign="top" width="80%"><b data-dcnode-id="4479"><font data-dcnode-id="4480" face="Arial" size="+1"><span data-dcnode-id="4481" instrument_node="">British Union of Fascists 1932-1940 (United Kingdom)</span></font></b><span data-dcnode-id="4478" instrument_node="">
</span><p data-dcnode-id="4469"><font data-dcnode-id="4470" face="Arial"><span data-dcnode-id="4477" instrument_node="">The British Union of Fascists (BUF) was founded in 1932 by Sir Oswald Mosley, a former Labor government minister and former MP of the Conservative Party. BUF's emblem was the one used by Italian fascists and by other fascist movements, the </span><i data-dcnode-id="4475"><span data-dcnode-id="4476" instrument_node="">fasces</span></i><span data-dcnode-id="4474" instrument_node="">. In the British flag the </span><i data-dcnode-id="4472"><span data-dcnode-id="4473" instrument_node="">fasces</span></i><span data-dcnode-id="4471" instrument_node=""> was white placed over a gray disk on a red field.</span></font></p><font data-dcnode-id="4454" face="Arial"><span data-dcnode-id="4468" instrument_node="">
</span><p data-dcnode-id="4462"><font data-dcnode-id="4463" face="Arial"><span data-dcnode-id="4467" instrument_node="">In 1935, the party changed its name to the British Union of Fascists and National Socialists (BUFNS). Along with this name change appeared a new flag with the lightning flash emblem and the flag colors of the United Kingdom. The flash was white, set on a blue disk edged in white, appeared in the center of a red field. When the emblem was changed from the </span><i data-dcnode-id="4465"><span data-dcnode-id="4466" instrument_node="">fasces</span></i><span data-dcnode-id="4464" instrument_node=""> to the circle and lightning flash, the symbolism was stated to be "the flash of action, within the circle of unity."  Opponents of the party quickly named it "the flash in the pan." This flag was used until the party was dissolved in 1940.</span></font></p><font data-dcnode-id="4455" face="Arial"><span data-dcnode-id="4461" instrument_node="">
</span><p data-dcnode-id="4458"><font data-dcnode-id="4459" face="Arial"><span data-dcnode-id="4460" instrument_node="">Mosley modeled himself after Benito Mussolini and the BUF on Mussolini's National Fascist Party in Italy. Mosley instituted black uniforms for members, earning them the nickname "Blackshirts." The BUF was anti-communist and proposed replacing parliamentary democracy with elected executives having jurisdiction over specific industries, and by 1934 it had adopted antisemitism as official policy. In 1940, the BUF was banned outright by the government, and Mosley, along with 740 other fascists, were interned for much of World War II</span></font></p><font data-dcnode-id="4456" face="Arial"><a data-dcnode-id="4457" name="cnp"></a></font></font></font></td></tr><tr data-dcnode-id="4408"><td align="center" data-dcnode-id="4436" width="20%"><font data-dcnode-id="4437" face="Arial"><br data-dcnode-id="4448"><img align="MIDDLE" alt="Image by Pete Loeser" border="1" data-dcnode-id="4447" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/ca-cnp.gif&amp;raw" width="216"><br data-dcnode-id="4446"><span data-dcnode-id="4445" instrument_node="">CNP Flag</span><br data-dcnode-id="4444"><br data-dcnode-id="4443"><img align="MIDDLE" alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="4442" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/ca-cnp1.gif&amp;raw" width="216"><br data-dcnode-id="4441"><span data-dcnode-id="4440" instrument_node="">CNP Templar Flag</span><br data-dcnode-id="4439"><br data-dcnode-id="4438"></font></td><td data-dcnode-id="4410" valign="top" width="80%"><b data-dcnode-id="4428"><font data-dcnode-id="4429" face="Arial" size="+1"><span data-dcnode-id="4434" instrument_node="">Canadian Nationalist Party (Canada)</span><br data-dcnode-id="4433"><small data-dcnode-id="4430"><i data-dcnode-id="4431"><span data-dcnode-id="4432" instrument_node="">Parti Nationaliste Canadien</span></i></small></font></b><span data-dcnode-id="4427" instrument_node="">
</span><p data-dcnode-id="4424"><font data-dcnode-id="4425" face="Arial"><span data-dcnode-id="4426" instrument_node="">The Canadian Nationalist Party (CNP) was started in 2017 by Travis Patron in Redvers in Saskatchewan, Canada. The CNP is a far-right and white nationalist political party. In 2019, the CNP was registered as a federal party by the Elections Canada. Patron and two others ran under the Canadian Nationalist Party banner during the 2019 federal election in their electoral districts. All three were unsuccessful.</span></font></p><font data-dcnode-id="4411" face="Arial"><span data-dcnode-id="4423" instrument_node="">
</span><p data-dcnode-id="4420"><font data-dcnode-id="4421" face="Arial"><span data-dcnode-id="4422" instrument_node="">The CNP's goal is "to improve the social and economic conditions of an ethnocentric Canada by maintaining the demographic majority status of white Canadians whose interests would be prioritized by the party over that of ethnic minorities."</span></font></p><font data-dcnode-id="4412" face="Arial"><span data-dcnode-id="4419" instrument_node="">
</span><p data-dcnode-id="4416"><font data-dcnode-id="4417" face="Arial"><span data-dcnode-id="4418" instrument_node="">The Canadian Nationalist Party have been seen using two flags.  The first is a white and black horizontally striped flag charged with a red sunwheel centered on it. Their second flag is the black and red striped Beauceant Flag (meaning two-color), charged with a white iron cross center on it, which historically was the flag of the Knights of Templars, a famous medieval military order.</span></font></p><font data-dcnode-id="4413" face="Arial"><span data-dcnode-id="4415" instrument_node="">
</span><a data-dcnode-id="4414" name="cfpd"></a></font></font></font></td></tr><tr data-dcnode-id="4283"><td align="center" data-dcnode-id="4372" width="20%"><font data-dcnode-id="4373" face="Arial"><br data-dcnode-id="4405"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="4404" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/de%257Dcfpd1.gif&amp;raw" width="225"><br data-dcnode-id="4403"><span data-dcnode-id="4402" instrument_node="">CFPD Flag (2006-2009)</span><br data-dcnode-id="4401"><span data-dcnode-id="4400" instrument_node="">Type #1</span><br data-dcnode-id="4399"><br data-dcnode-id="4398"><br data-dcnode-id="4397"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="4396" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/de%257Dcfpd2.gif&amp;raw" width="225"><br data-dcnode-id="4395"><span data-dcnode-id="4394" instrument_node="">CFPD Flag (2006-2009)</span><br data-dcnode-id="4393"><span data-dcnode-id="4392" instrument_node="">Type #2</span><br data-dcnode-id="4391"><br data-dcnode-id="4390"><br data-dcnode-id="4389"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="4388" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/de%257Dcfpd3.gif&amp;raw" width="225"><br data-dcnode-id="4387"><span data-dcnode-id="4386" instrument_node="">CFPD Flag (2006-2009)</span><br data-dcnode-id="4385"><span data-dcnode-id="4384" instrument_node="">Type #3 (unverified)</span><br data-dcnode-id="4383"><br data-dcnode-id="4382"><br data-dcnode-id="4381"><img align="MIDDLE" alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="4380" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/de%257Dcfpd7.gif&amp;raw" width="225"><br data-dcnode-id="4379"><span data-dcnode-id="4378" instrument_node="">CFPD Flag (2006-2009)</span><br data-dcnode-id="4377"><span data-dcnode-id="4376" instrument_node="">Type #4</span><br data-dcnode-id="4375"><br data-dcnode-id="4374"></font></td><td data-dcnode-id="4285" valign="top" width="80%"><span data-dcnode-id="4370" instrument_node="">
</span><b data-dcnode-id="4363"><font data-dcnode-id="4368" face="Arial" size="+1"><span data-dcnode-id="4369" instrument_node="">Christian Falangist Party of Germany (2006-2009)</span></font><br data-dcnode-id="4367"><font data-dcnode-id="4364" face="Arial" size="-1"><i data-dcnode-id="4365"><span data-dcnode-id="4366" instrument_node="">Christlich Falangistische Partei Deutschlands (CFPD)</span></i></font></b><span data-dcnode-id="4362" instrument_node="">
</span><p data-dcnode-id="4356"><font data-dcnode-id="4357" face="Arial"><span data-dcnode-id="4361" instrument_node="">The Christian Falangist Party of Germany was founded in 2006, with the aid of the </span><a data-dcnode-id="4359" href="#cfpa"><span data-dcnode-id="4360" instrument_node="">Christian Falangist Party of America</span></a><span data-dcnode-id="4358" instrument_node="">, which saw it as the first step in transplanting of its ideas to other countries. However, it turned to be the last step as well, because the party has not been very successful and was disbanded in 2009, not long before its model. The party seat was in the city of Ingolstadt.</span></font></p><span data-dcnode-id="4355" instrument_node="">
</span><p data-dcnode-id="4352"><font data-dcnode-id="4353" face="Arial"><span data-dcnode-id="4354" instrument_node="">The Christian Falangist Party of Germany flags and emblems were derived from those of the Christian Falangist Party of America, whose leader Pat Bridges claimed to have designed them after having posted to a Flickr gallery several images showing different combinations of a modified German heraldic eagle with a CFPA crutch-cross. On the CFPD
party website, which is no longer online, a German tricolor, charged with the large black crutch-cross fimbriated in white and black (Type #1) was used. A variant flag (type #2) was also shown with the party name inscribed in red, above and beneath the cross. A third tricolor (Type #3), had large initials CFPD, inscribed in white on red field.</span></font></p><font data-dcnode-id="4286" face="Arial"><span data-dcnode-id="4351" instrument_node="">
</span><p data-dcnode-id="4348"><font data-dcnode-id="4349" face="Arial"><span data-dcnode-id="4350" instrument_node="">The Type #4 CFPD Flag uses a stylized tree centered on a white background and is obviously derived from the flag of the original Lebanese Falange. It is the only party flag not employing the national colors, gold being replaced with white.</span></font></p><font data-dcnode-id="4287" face="Arial"><span data-dcnode-id="4347" instrument_node="">

</span><p data-dcnode-id="4265"><font data-dcnode-id="4266" face="Arial"><span data-dcnode-id="4267" instrument_node="">The Canadian Fascist Party (CFP) was a fascist political party based in the Canadian city of Winnipeg. Although the party was a splinter group from the Canadian Nationalist Party and claimed to base its platform on the principles of corporativism, rather than the largely racial motivations of the Nationalist Party, many of the party membership were racially motivated.  The party was founded as the British Empire Union of Fascists and was affiliated with the British Union of Fascists. It later became known as the Canadian Union of Fascists and Canadian Union, for short. It published its own newspaper called "The Thunderbolt."</span></font></p><font data-dcnode-id="4262" face="Arial"><a data-dcnode-id="4264" name="cedade"></a><span data-dcnode-id="4263" instrument_node="">
</span></font></td></tr><tr data-dcnode-id="4227"><td align="center" data-dcnode-id="4249" width="20%"><font data-dcnode-id="4250" face="Arial"><br data-dcnode-id="4256"><img align="MIDDLE" alt="Image by Antonio Martins" border="1" data-dcnode-id="4255" height="130" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/spanish_circle_of_friends_of_europe.jpg&amp;raw" width="216"><br data-dcnode-id="4254"><span data-dcnode-id="4253" instrument_node="">CEDADE Flag</span><br data-dcnode-id="4252"><br data-dcnode-id="4251"></font></td><td data-dcnode-id="4229" valign="top" width="80%"><b data-dcnode-id="4241"><font data-dcnode-id="4242" face="Arial" size="+1"><span data-dcnode-id="4247" instrument_node="">Spanish Circle of Friends of Europe (Spain)</span><br data-dcnode-id="4246"><font data-dcnode-id="4243" size="-1"><em data-dcnode-id="4244"><span data-dcnode-id="4245" instrument_node="">CÃƒÂ­rculo EspaÃƒÂ±ol de Amigos de Europa (CEDADE)</span></em></font></font></b><span data-dcnode-id="4240" instrument_node="">
</span><p data-dcnode-id="4237"><font data-dcnode-id="4238" face="Arial"><span data-dcnode-id="4239" instrument_node="">The flag of the Spanish Circle of Friends (CEDADE) was probably the first "modern flag" of an European neo-nazi organization. </span></font></p><font data-dcnode-id="4230" face="Arial"><span data-dcnode-id="4236" instrument_node="">
</span><p data-dcnode-id="4233"><font data-dcnode-id="4234" face="Arial"><span data-dcnode-id="4235" instrument_node="">The official flag of CEDADE was all red with a golden eagle, holding a yoke in its claws and with a golden torch behind it. CEDADE was founded in 1966 and formally disbanded in 1993.</span></font></p><font data-dcnode-id="4231" face="Arial"><a data-dcnode-id="4232" name="cfpa"></a></font></font></td></tr><tr data-dcnode-id="3985"><td align="center" data-dcnode-id="4143" width="20%"><font data-dcnode-id="4144" face="Arial"><br data-dcnode-id="4224"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="4223" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/christian_falange_flag1.gif&amp;raw" width="216"><br data-dcnode-id="4222"><span data-dcnode-id="4221" instrument_node="">CFPA Flag (2000-2003)</span><br data-dcnode-id="4220"><font data-dcnode-id="4218" size="-1"><span data-dcnode-id="4219" instrument_node="">(Blue Battle Cross within a red ring)</span></font><br data-dcnode-id="4217"><br data-dcnode-id="4216"><br data-dcnode-id="4215"><span data-dcnode-id="4214" instrument_node="">
