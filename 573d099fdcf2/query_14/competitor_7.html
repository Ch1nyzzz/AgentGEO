</span><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="4149" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/christian_falange_flag11.gif&amp;raw" width="203"><br data-dcnode-id="4148"><span data-dcnode-id="4147" instrument_node="">Naval Ensign (2003-2009)</span><br data-dcnode-id="4146"><br data-dcnode-id="4145"></font></td><td data-dcnode-id="3987" valign="top" width="80%"><b data-dcnode-id="4139"><font data-dcnode-id="4140" face="Arial" size="+1"><span data-dcnode-id="4141" instrument_node="">Christian Falangist Party of America (USA)</span></font></b><span data-dcnode-id="4138" instrument_node="">
</span><p data-dcnode-id="4135"><font data-dcnode-id="4136" face="Arial"><span data-dcnode-id="4137" instrument_node="">The Christian Falangist Party of America (CFPA) was founded in Philadelphia in 2000 to replace the National Syndical American Falangist Party (NSAFP). They claimed to be dedicated "to fighting the "Forces of Darkness" which seek to destroy all of Western Judeo-Christian Civilization.</span></font></p><font data-dcnode-id="3988" face="Arial"><span data-dcnode-id="4134" instrument_node="">
</span><p data-dcnode-id="4131"><font data-dcnode-id="4132" face="Arial"><span data-dcnode-id="4133" instrument_node="">This new Falangist organization claimed that they no longer would condone acts of violence or hatred towards those of differing or opposing viewpoints and lifestyles, and they would no longer tolerate racism or anti-Semitism among their membership in any form. They severed their former ties to the Spanish Falange and all other "neo-Nazi/anti-Democratic/third position groups" who used the name Falange or Falangist. Instead of claiming succession from the NSAFP, they claimed to have derived their name from the Lebanese Falange, one of the oldest and strongest Christian parties from Lebanon, which, in fact, were originally modeled after the Spanish Falange, but gradually got rid of the Fascist "appearance" through the years, although its members still use a form of Roman salute. This new Christian Falangist Party claimed they believed only in the teachings of Jesus Christ and the Holy Bible. They supported the Constitution, the Bill of Rights, and nationalistic loyalty to the United States of America. Unfortunately, in practice, it soon turned out to be business as usual.</span></font></p><font data-dcnode-id="3989" face="Arial"><span data-dcnode-id="4130" instrument_node="">
</span><p data-dcnode-id="4121"><font data-dcnode-id="4122" face="Arial"><span data-dcnode-id="4129" instrument_node="">The original party flag was charged with a blue "Battle Cross" within a red ring, all on white field. The cross was derived from a similar one which was used by the Lebanese Forces, a former militia and current political party of Lebanese Christians, which was also partly modeled after the Lebanese Falange (borrowed their form of Roman salute, etc.). In 2003, The "Battle Cross" was replaced with a crutch-cross. This emblem was derived from that of the Fatherland Front (Austria 1934-1938), whose ideology was known as the Austro-Fascism, but although it was authoritarian and corporativist, it was generally less oppressive than most similar contemporary European regimes. It certainly was anti-Nazi and opposed the </span><i data-dcnode-id="4127"><span data-dcnode-id="4128" instrument_node="">Anschluss</span></i><span data-dcnode-id="4126" instrument_node="">; their first leader, Chancellor Engelbert Dollfuss, was killed by the Austrian Nazis during an unsuccessful coup in 1934 and his successor, Chancellor Kurt Schuschnigg, was sent to a concentration camp after the </span><i data-dcnode-id="4124"><span data-dcnode-id="4125" instrument_node="">Anschluss</span></i><span data-dcnode-id="4123" instrument_node="">. After the war, Schuschnigg moved to the USA and became a US citizen and the professor of Political Science at Saint Louis University. The Christian Integralist and anti-Nazi ideology of the Fatherland Front was chosen by the CFPA to be their new source of inspiration.</span></font></p><span data-dcnode-id="4120" instrument_node="">
</span><p data-dcnode-id="4117"><font data-dcnode-id="4118" face="Arial"><span data-dcnode-id="4119" instrument_node="">It should be pointed out here that the Crutch Cross a simplified version of the "Jerusalem Cross," or the "Crusader's Cross."  They are a heraldic cross and a Christian symbol consisting of a large Greek cross surrounded by four smaller Greek crosses, one in each quadrant. They, like many other historical symbols, have been commandeered by extremist groups in an attempt to legitimize their existence. The Jerusalem Cross is also used on the flag of Georgia.</span></font></p><span data-dcnode-id="4116" instrument_node="">
</span><p data-dcnode-id="4113"><font data-dcnode-id="4114" face="Arial"><span data-dcnode-id="4115" instrument_node="">Along with the Fatherland Front, the Lebanese Falange remained the model for the CFPA and an alternative party flag was introduced after 2003, using a stylized tree like the cedar of the Lebanese Falangists, but striped in red and blue on white field so as to display the US national colors. The "Battle Cross" has reappeared, in a slightly modified form and painted in red, on white flag of the "Christian Forces", a would-be militia or social organization which seems to never have been really operative (which makes it difficult to decide about their real nature), although an address was reserved for their planned website which never appeared, only their flag having been regularly presented along with the party flags. A rarely used variant of the official party flag was introduced in 2007, with much darker shades of blue and red and charged with the party name inscribed in white over the ring.</span></font></p><font data-dcnode-id="3990" face="Arial"><span data-dcnode-id="4112" instrument_node="">

</span><p data-dcnode-id="4045"><font data-dcnode-id="4046" face="Arial"><span data-dcnode-id="4047" instrument_node="">During the CFPA's active existence, their private militia security force called FALSEC (Falangist Security) has used three different flags. These were produced as a part of a whole range of flags, including a naval flag, called "jack" before the 2003 flag change and "ensign" afterwards, and a standard for the Directors (national and state heads of the party) since 2007.  Probably the strangest flag was "The flag we can never use", which was declared as banned on the party website because its design resembled some far-right flags too closely and might have misled visitors to attribute the site to a neo-Nazi group.</span></font></p><font data-dcnode-id="3991" face="Arial"><span data-dcnode-id="4044" instrument_node="">

</span><table align="center" border="0" cellpadding="2" cellspacing="2" data-dcnode-id="4007"><tbody data-dcnode-id="4008"><tr data-dcnode-id="4030"><td data-dcnode-id="4039"><div align="center" data-dcnode-id="4040"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="4041" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/christian_zionists_of_america.gif&amp;raw" width="206"></div></td><td data-dcnode-id="4036"><span data-dcnode-id="4037" instrument_node="">&nbsp;&nbsp;&nbsp;</span></td><td data-dcnode-id="4032"><div align="center" data-dcnode-id="4033"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="4034" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/christian_zionist_roman_catholics.gif&amp;raw" width="206"></div></td></tr><tr data-dcnode-id="4010"><td data-dcnode-id="4022"><div align="center" data-dcnode-id="4023"><span data-dcnode-id="4027" instrument_node="">Christian Zionists of America Flag</span><br data-dcnode-id="4026"><font data-dcnode-id="4024" size="-1"><span data-dcnode-id="4025" instrument_node="">(Blue Crutch Cross)</span></font></div></td><td data-dcnode-id="4019"><span data-dcnode-id="4020" instrument_node="">&nbsp;&nbsp;&nbsp;</span></td><td data-dcnode-id="4012"><div align="center" data-dcnode-id="4013"><span data-dcnode-id="4017" instrument_node="">Christian Zionist Roman Catholics</span><br data-dcnode-id="4016"><font data-dcnode-id="4014" size="-1"><span data-dcnode-id="4015" instrument_node="">(Blue Jerusalem Cross)</span></font></div></td></tr></tbody></table><span data-dcnode-id="4006" instrument_node="">
</span><p data-dcnode-id="4000"><font data-dcnode-id="4001" face="Arial"><span data-dcnode-id="4005" instrument_node="">In accordance with their anti-Muslim and pro-Israeli attitude, CFPA started a partner organization, the Christian Zionists of America (CZA), which adopted a flag derived from that of Israel.  A second partner was planned, the Christian Zionist Roman Catholics (CZRC), which would use a flag similar to that of the Christian Zionists of America, but with a Jerusalem Cross instead of the crutch-cross. The CZRC was never started, because the CFPA was officially disbanded in 2009. It has since re-invented its self as the </span><a data-dcnode-id="4003" href="#cpo"><span data-dcnode-id="4004" instrument_node="">Christian Phalange Organization</span></a><span data-dcnode-id="4002" instrument_node="">.</span></font></p><font data-dcnode-id="3992" face="Arial"><span data-dcnode-id="3999" instrument_node="">
</span><p data-dcnode-id="3993"><font data-dcnode-id="3994" face="Arial"><span data-dcnode-id="3998" instrument_node="">Between 2006-2009, an associated Christian Phalange group called the </span><a data-dcnode-id="3996" href="#cfpd"><span data-dcnode-id="3997" instrument_node="">Christian Falangist Party of Germany</span></a><span data-dcnode-id="3995" instrument_node=""> was organized in Germany, without much success.</span></font></p></font></font></font></font></font></td></tr><tr data-dcnode-id="3949"><td align="center" data-dcnode-id="3977" width="20%"><font data-dcnode-id="3978" face="Arial"><br data-dcnode-id="3982"><img alt="Image by Ivan Sache &amp; Tomislav Todorovic" border="1" data-dcnode-id="3981" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/fr_craf.gif&amp;raw" width="216"><br data-dcnode-id="3980"><span data-dcnode-id="3979" instrument_node="">CRAF Flag</span></font></td><td data-dcnode-id="3951" valign="top" width="80%"><b data-dcnode-id="3968"><font data-dcnode-id="3969" face="Arial" size="+1"><span data-dcnode-id="3975" instrument_node="">Royalist Center of French Action (France)</span><br data-dcnode-id="3974"><font data-dcnode-id="3971" size="-1"><i data-dcnode-id="3972"><span data-dcnode-id="3973" instrument_node="">Centre royaliste d'Action française (CRAF)</span></i></font><span data-dcnode-id="3970" instrument_node=""> </span></font></b><span data-dcnode-id="3967" instrument_node="">
</span><p data-dcnode-id="3960"><font data-dcnode-id="3962" face="Arial"><span data-dcnode-id="3966" instrument_node="">Founded in 1998 by Pierre Pujo, this is the ideological successor of the French Action (</span><i data-dcnode-id="3964"><span data-dcnode-id="3965" instrument_node="">Action française</span></i><span data-dcnode-id="3963" instrument_node="">), a nationalist, anti-republican and anti-Semitic movement founded in 1898 by Henri Vaugeois and Maurice Pujo (father of Pierre Pujo) during the Dreyfus affair, whose principal ideologist was Charles Maurras. By 1914, it has grown into one of the strongest far-right movements in France and remained such after the Great War, despite papal condemnation in 1926, due to opinion that it was just using the Catholicism for political goals, and the 1936 ban, together with other anti-democratic movements, which was lifted in 1939. Most of the members supported the Vichy regime during the World War II, although theoretically opposing the collaboration with the Third Reich, while the others left either to activelly collaborate or to join the resistance movement. The French Action was dissolved in 1944, Maurras and Pujo imprisoned after the war as the traitors, and the movement name was illegal to use for years, its ideas still being followed by a number of groups, including the CRAF.</span></font><span data-dcnode-id="3961" instrument_node="">
</span></p><span data-dcnode-id="3959" instrument_node="">
</span><p data-dcnode-id="3953"><font data-dcnode-id="3954" face="Arial"><span data-dcnode-id="3958" instrument_node="">Flag of CRAF is yellow, with its emblem in center: a large blue disc, charged with a stylized fleur-de-lis between the letters "A" and "F", all in yellow. These charges refer to the original </span><i data-dcnode-id="3956"><span data-dcnode-id="3957" instrument_node="">Action française</span></i><span data-dcnode-id="3955" instrument_node="">, as well as to the French royal arms.</span></font></p><span data-dcnode-id="3952" instrument_node="">
</span></td></tr><tr data-dcnode-id="3905"><td align="center" data-dcnode-id="3934" width="20%"><font data-dcnode-id="3935" face="Arial"><br data-dcnode-id="3946"><img alt="Image by Pete Loeser and Tomislav Todorovic" border="1" data-dcnode-id="3945" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/it-cpi.gif&amp;raw" width="216"><br data-dcnode-id="3944"><span data-dcnode-id="3943" instrument_node="">CPI Flag</span><br data-dcnode-id="3942"><br data-dcnode-id="3941"><img alt="mage by Tomislav Todorovic" border="1" data-dcnode-id="3940" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/it-bstud.gif&amp;raw" width="216"><br data-dcnode-id="3939"><span data-dcnode-id="3938" instrument_node="">Student Bloc Flag</span><br data-dcnode-id="3937"><br data-dcnode-id="3936"></font></td><td data-dcnode-id="3907" valign="top" width="80%"><b data-dcnode-id="3930"><font data-dcnode-id="3931" face="Arial" size="+1"><span data-dcnode-id="3932" instrument_node="">CasaPound Italy (Italy)</span></font></b><span data-dcnode-id="3929" instrument_node="">
</span><p data-dcnode-id="3926"><font data-dcnode-id="3927" face="Arial"><span data-dcnode-id="3928" instrument_node="">The neo-Fascist CasaPound Italy Movement began in 2003 with the occupation of a state-owned building in the Esquilino neighborhood of Rome. Their name referred to the American poet Ezra Pound who praised Mussolini's regime in the 1930s. Before 2006, CasaPound was associated with neo-Fascist Tricolor Flame Party, but has since become an independent movement. In 2011 it was estimated the CPI had as many as 5000 members.</span></font></p><font data-dcnode-id="3908" face="Arial"><span data-dcnode-id="3925" instrument_node="">
</span><p data-dcnode-id="3919"><font data-dcnode-id="3920" face="Arial"><span data-dcnode-id="3924" instrument_node="">Their flag is definitely Nazi-inspired, showing a black-white symbol on a red field. The symbol is a stylized tortoise, representing the ancient Roman battle tactic called the </span><i data-dcnode-id="3922"><span data-dcnode-id="3923" instrument_node="">testudo</span></i><span data-dcnode-id="3921" instrument_node=""> (Turtle), a formation where the soldiers would form a protective shield wall overhead and around themselves as protection from arrows and thrown spears.</span></font></p><font data-dcnode-id="3909" face="Arial"><span data-dcnode-id="3918" instrument_node="">
</span><p data-dcnode-id="3912"><font data-dcnode-id="3913" face="Arial"><span data-dcnode-id="3917" instrument_node="">The Student Bloc (</span><i data-dcnode-id="3915"><span data-dcnode-id="3916" instrument_node="">Blocco Studentesco</span></i><span data-dcnode-id="3914" instrument_node="">) is a neo-Fascist student organization which was founded in 2006 by the CasaPound Italy. Its flag is black, with large encircled lightning flash in white. The symbol is designed so as to resemble the 1935-1940 emblem of the British Union of Fascists and the meaning is also similar, with the ring standing for the unity in a collective and the lightning flash standing for the action. Since the Student Bloc is actually the student wing of CasaPound, its members frequently carry both flags together.</span></font></p><font data-dcnode-id="3910" face="Arial"><a data-dcnode-id="3911" name="cpo"></a></font></font></font></td></tr><tr data-dcnode-id="3860"><td align="center" data-dcnode-id="3886" width="20%"><font data-dcnode-id="3889" face="Arial"><br data-dcnode-id="3902"><br data-dcnode-id="3901"><img alt="Image by Tomislav Todorovic" border="0" data-dcnode-id="3900" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/christian_falange_flag2.gif&amp;raw" width="216"><br data-dcnode-id="3899"><span data-dcnode-id="3898" instrument_node="">CPO Flag 2009</span><br data-dcnode-id="3897"><font data-dcnode-id="3895" size="-1"><span data-dcnode-id="3896" instrument_node="">Based on the Lebanese Falange Flag</span></font><br data-dcnode-id="3894"><br data-dcnode-id="3893"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="3892" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/cpo-ncp5.gif&amp;raw" width="216"><br data-dcnode-id="3891"><span data-dcnode-id="3890" instrument_node="">NCP Flag 2012</span></font><br data-dcnode-id="3888"><br data-dcnode-id="3887"></td><td data-dcnode-id="3862" valign="top" width="80%"><b data-dcnode-id="3882"><font data-dcnode-id="3883" face="Arial" size="+1"><span data-dcnode-id="3884" instrument_node="">Christian Phalange Organization Flag (USA)</span></font></b><span data-dcnode-id="3881" instrument_node="">
</span><p data-dcnode-id="3875"><font data-dcnode-id="3876" face="Arial"><span data-dcnode-id="3880" instrument_node="">Formerly known as the </span><a data-dcnode-id="3878" href="#cfpa"><span data-dcnode-id="3879" instrument_node="">Christian Falangist Party of America</span></a><span data-dcnode-id="3877" instrument_node="">, the new Christian Phalange stated they were no longer a political party, but "a politically active social organization" in 2010. They claimed they changed their name because too many people associated the word "Falangist" with the neo-Fascist Spanish Falange and the neo-Nazis.</span></font></p><span data-dcnode-id="3874" instrument_node="">
</span><p data-dcnode-id="3871"><font data-dcnode-id="3872" face="Arial"><span data-dcnode-id="3873" instrument_node="">They now invited any Christian of any race or nationality to join the Christian Phalange and that their new goal is to stop the spread of Islam. Despite the name and goal change, they still remain, however, an extremist and very radical Christian Conservative organization. Although they say they are pro-Israeli and not at all racist or Nazi, their membership still really seems to have it in for gays and Muslims.</span></font></p><span data-dcnode-id="3870" instrument_node="">
</span><p data-dcnode-id="3867"><font data-dcnode-id="3868" face="Arial"><span data-dcnode-id="3869" instrument_node="">As the Christian Phalange cut back on their ultra-nationalistic symbolism, they also have abandoned their previous flags with the neo-Nazi-like appearance in favor of the one using a tree like the cedar of the Lebanese Falangists, but striped in red and blue, with a white star added on upper blue field.</span></font></p><span data-dcnode-id="3866" instrument_node="">
</span><p data-dcnode-id="3863"><font data-dcnode-id="3864" face="Arial"><span data-dcnode-id="3865" instrument_node="">However, the newest variant of the Christian Phalange flag to appear has a more natural looking tree (oak?) in blue, with a white star on its trunk, and the initials "NCP" (National Christian Phalange) placed in a centered red circle on white background. It appears to be the work of Pat Bridges, the leader of the CFPA/CP.</span></font></p></td></tr><tr data-dcnode-id="3821"><td align="center" data-dcnode-id="3849" width="20%"><font data-dcnode-id="3850" face="Arial"><br data-dcnode-id="3857"><span data-dcnode-id="3856" instrument_node=""> </span><img align="MIDDLE" alt="image by Eugene Ipavec and Santiago Tazon" border="1" data-dcnode-id="3855" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/spain_cei.gif&amp;raw" width="216"><br data-dcnode-id="3854"><span data-dcnode-id="3853" instrument_node="">CEI Flag</span><br data-dcnode-id="3852"><br data-dcnode-id="3851"></font></td><td data-dcnode-id="3823" valign="top" width="80%"><b data-dcnode-id="3841"><font data-dcnode-id="3842" face="Arial" size="+1"><span data-dcnode-id="3847" instrument_node="">Circle of Indo-European Studies (Spain)</span><br data-dcnode-id="3846"><font data-dcnode-id="3843" size="-1"><em data-dcnode-id="3844"><span data-dcnode-id="3845" instrument_node="">C´rculo de Estudios Indoeuropeos (CEI)</span></em></font></font></b><span data-dcnode-id="3840" instrument_node="">
</span><p data-dcnode-id="3831"><font data-dcnode-id="3832" face="Arial"><span data-dcnode-id="3839" instrument_node="">The </span><i data-dcnode-id="3837"><span data-dcnode-id="3838" instrument_node="">C´rculo de Estudios Indoeuropeos</span></i><span data-dcnode-id="3836" instrument_node=""> (CEI) is a national-socialist organization founded in 1997. The organization claims to be a cultural movement and is considered by most to be a continuation of the "</span><a data-dcnode-id="3834" href="#cedade"><span data-dcnode-id="3835" instrument_node="">Spanish Circle of Friends of Europe.</span></a><span data-dcnode-id="3833" instrument_node=""> (CEDADE)"
	</span></font></p><p data-dcnode-id="3824"><font data-dcnode-id="3825" face="Arial"><font data-dcnode-id="3826" face="Arial"><span data-dcnode-id="3830" instrument_node="">They use a "neo-Nazi style" flag: red field, central white circle with black symbol. The central emblem is composed of the joined letters "H" and a "A," standing for "</span><i data-dcnode-id="3828"><span data-dcnode-id="3829" instrument_node="">Hereditas Ambitusque</span></i><span data-dcnode-id="3827" instrument_node="">," which is Latin for "Inheritance and Scope."</span></font></font></p></td></tr><tr data-dcnode-id="3793"><td align="center" data-dcnode-id="3809" width="20%"><font data-dcnode-id="3810" face="Arial"><br data-dcnode-id="3818"><img align="MIDDLE" alt="Image by Antonio Martins" border="1" data-dcnode-id="3817" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/new_right_party_romania.jpg&amp;raw" width="216"><br data-dcnode-id="3816"><span data-dcnode-id="3815" instrument_node="">Celtic Cross Flag</span><br data-dcnode-id="3814"><span data-dcnode-id="3813" instrument_node="">(Variant)</span><br data-dcnode-id="3812"><br data-dcnode-id="3811"></font></td><td data-dcnode-id="3795" valign="top" width="80%"><b data-dcnode-id="3805"><font data-dcnode-id="3806" face="Arial" size="+1"><span data-dcnode-id="3807" instrument_node="">Celtic Cross (Sun-Wheel) Flag </span></font></b><span data-dcnode-id="3804" instrument_node="">
</span><p data-dcnode-id="3801"><font data-dcnode-id="3802" face="Arial"><span data-dcnode-id="3803" instrument_node="">Although not explicitly a racist symbol, the Celtic cross, or more properly the "Sun-Wheel," is often used by people in the white power movement, especially skinheads.  The cross pictured here is one most often used by racist groups.</span></font></p><font data-dcnode-id="3796" face="Arial"><span data-dcnode-id="3800" instrument_node="">
</span><p data-dcnode-id="3797"><font data-dcnode-id="3798" face="Arial"><span data-dcnode-id="3799" instrument_node="">Many New Right groups began using this type of flag, with the main symbol being the Celtic Cross, because it isn't outlawed in most countries and they can claim it as a heritage symbol. The term "New Right" is used as a descriptive term for various policies and/or groups that are to the extreme "far-right." It has also been used to describe the emergence of extremist Eastern European parties after the collapse of communism. </span></font></p></font></td></tr><tr data-dcnode-id="3721"><td align="center" data-dcnode-id="3764" width="20%"><font data-dcnode-id="3765" face="Arial"><br data-dcnode-id="3790"><img alt="Image by Tomislav Todorovic" border="0" data-dcnode-id="3789" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/chet1.gif&amp;raw" width="216"><br data-dcnode-id="3788"><span data-dcnode-id="3787" instrument_node="">Chetnik Flag</span><br data-dcnode-id="3786"><font data-dcnode-id="3784" size="-1"><span data-dcnode-id="3785" instrument_node="">(Type #1 - 1991-present)</span></font><br data-dcnode-id="3783"><br data-dcnode-id="3782"><img alt=" Image by Ivan Sarajcic" border="0" data-dcnode-id="3781" height="155" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/chet2.gif&amp;raw" width="216"><br data-dcnode-id="3780"><span data-dcnode-id="3779" instrument_node="">Chetnik Flag</span><br data-dcnode-id="3778"><font data-dcnode-id="3776" size="-1"><span data-dcnode-id="3777" instrument_node="">(Type #2 - 1991-1999)</span></font><br data-dcnode-id="3775"><br data-dcnode-id="3774"><img alt="Image from Pete Loeser" border="0" data-dcnode-id="3773" height="155" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/chet3.jpg&amp;raw" width="216"><br data-dcnode-id="3772"><span data-dcnode-id="3771" instrument_node="">Modern Variant Flag</span><br data-dcnode-id="3770"><font data-dcnode-id="3768" size="-1"><span data-dcnode-id="3769" instrument_node="">(Type #3 - actual use questionable)</span></font><br data-dcnode-id="3767"><br data-dcnode-id="3766"></font></td><td data-dcnode-id="3723" valign="top" width="80%"><b data-dcnode-id="3760"><font data-dcnode-id="3761" face="Arial" size="+1"><span data-dcnode-id="3762" instrument_node="">Flag of the Chetniks (Serbia)</span></font></b><span data-dcnode-id="3759" instrument_node="">
</span><p data-dcnode-id="3750"><font data-dcnode-id="3751" face="Arial"><span data-dcnode-id="3758" instrument_node="">Here is a flag with a long history that proves the rule, "one man's extremist is another man's patriot." In Serbia this flag served as a resistance flag against the World War II German occupation, but now has been opted by extremist groups and others to serve very different purposes. The </span><i data-dcnode-id="3756"><span data-dcnode-id="3757" instrument_node="">Chetniks</span></i><span data-dcnode-id="3755" instrument_node=""> (Troopers) were originally guerrilla groups which, since 1903, operated in areas still under the Ottoman rule, fighting not only against the Ottoman Empire, but also against similar Bulgarian groups. They also participated in the Balkan Wars (1912-1913) alongside the regular army, and again in World War I, in parts of Serbia which were occupied and annexed by Bulgaria (1915-1918). Along with Serbian national flags, they used black flags with skull and crossbones and inscriptions like </span><i data-dcnode-id="3753"><span data-dcnode-id="3754" instrument_node="">Sloboda ili smrt</span></i><span data-dcnode-id="3752" instrument_node=""> (Freedom or Death). (Similar flags were also used in the Macedonian uprising against the Ottoman Empire in 1903.)</span></font></p><font data-dcnode-id="3724" face="Arial"><span data-dcnode-id="3749" instrument_node="">
</span><p data-dcnode-id="3746"><font data-dcnode-id="3747" face="Arial"><span data-dcnode-id="3748" instrument_node="">In World War II and afterwards, the Chetnik flag came to be used by anti-Communist resistance fighters. Thanks largely to Communist propaganda against the Chetniks in Serbia they were labeled extremist. The name Chetniks also became a name used by various legitimate para-military groups in the bloody Yugoslav Wars in the 1990s, but unfortunately, also became a name used by groups of local thugs and criminals hiding under the name in order to get some impunity for their actions. Naturally this Communist over-propagandizing of the name also resulted in making the flag popular among various other groups, some of whom were extremists, some not, some merely patriotic, and some who were just plain thugs. In Serbia today it is sometimes hard to determine which was which.</span></font></p><font data-dcnode-id="3725" face="Arial"><span data-dcnode-id="3745" instrument_node="">
</span><p data-dcnode-id="3726"><font data-dcnode-id="3727" face="Arial"><span data-dcnode-id="3744" instrument_node="">The original World War II Chetnik flags usually had the inscription </span><i data-dcnode-id="3742"><span data-dcnode-id="3743" instrument_node="">S verom u Boga</span></i><span data-dcnode-id="3741" instrument_node=""> (With Faith in God) and </span><i data-dcnode-id="3739"><span data-dcnode-id="3740" instrument_node="">Za kralja i otadÃƒâ€¦Ã‚Â¾binu</span></i><span data-dcnode-id="3738" instrument_node=""> (For King and Fatherland), sometimes with places switched, because "For King and Fatherland" and "With Faith in God" had been inscribed on Serbian military colors until 1918. Two of the flags (Type #1 and #2) shown here were used during the Yugoslav Wars. The inscriptions at the top are </span><i data-dcnode-id="3736"><span data-dcnode-id="3737" instrument_node="">S verom u Boga</span></i><span data-dcnode-id="3735" instrument_node=""> (With Faith in God) and </span><i data-dcnode-id="3733"><span data-dcnode-id="3734" instrument_node="">Za Kralja i OtadÃƒâ€¦Ã‚Â¾binu</span></i><span data-dcnode-id="3732" instrument_node=""> (For King and Fatherland), respectively, and </span><i data-dcnode-id="3730"><span data-dcnode-id="3731" instrument_node="">Sloboda ili smrt</span></i><span data-dcnode-id="3729" instrument_node=""> (Freedom or Death) at the bottom. Variants of these flags, with differing text, are still also used freely by Serbian anti-Communist emigrants in Western countries as the symbol of a non-Communist resistance movement. The Type #3 variant is being sold, but its use is questionable, and has not been seen or documented in Serbia. </span><a data-dcnode-id="3728" name="hutaree"></a></font></p></font></font></td></tr><tr data-dcnode-id="3679"><td align="center" data-dcnode-id="3705" width="20%"><font data-dcnode-id="3706" face="Arial"><br data-dcnode-id="3718"><img alt="Image by Pete Loeser" border="1" data-dcnode-id="3717" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/hutaree1.jpg&amp;raw" width="216"><br data-dcnode-id="3716"><span data-dcnode-id="3715" instrument_node="">Colonial Christian Republic</span><br data-dcnode-id="3714"><br data-dcnode-id="3713"><span data-dcnode-id="3712" instrument_node="">
</span><img alt="Image by Pete Loeser" border="1" data-dcnode-id="3711" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/hutaree2.gif&amp;raw" width="216"><br data-dcnode-id="3710"><span data-dcnode-id="3709" instrument_node="">Hutaree Militia Flag</span><br data-dcnode-id="3708"><br data-dcnode-id="3707"></font></td><td data-dcnode-id="3681" valign="top" width="80%"><b data-dcnode-id="3701"><font data-dcnode-id="3702" face="Arial" size="+1"><span data-dcnode-id="3703" instrument_node="">Colonial Christian Republic (USA)</span></font></b><span data-dcnode-id="3700" instrument_node="">
</span><p data-dcnode-id="3697"><font data-dcnode-id="3698" face="Arial"><span data-dcnode-id="3699" instrument_node="">The Colonial Christian Republic, with its Hutaree Militia, is a militant Christian fundamentalist group based in Adrian, Michigan. The group was formed in early 2008. They claim "Hutaree" means "Christian Warriors."</span></font></p><font data-dcnode-id="3682" face="Arial"><span data-dcnode-id="3696" instrument_node="">
</span><p data-dcnode-id="3693"><font data-dcnode-id="3694" face="Arial"><span data-dcnode-id="3695" instrument_node="">The group is preparing for what they believed will be an apocalyptic battle with the forces of the Antichrist (the UN), who they believed is supported and defended by local, state and federal police departments. On their website, all police and military members who would support the current U.S. system of local, state or federal government are described as members of an evil brotherhood and are considered by the Hutaree to be their enemies. </span></font></p><font data-dcnode-id="3683" face="Arial"><span data-dcnode-id="3692" instrument_node="">
</span><p data-dcnode-id="3689"><font data-dcnode-id="3690" face="Arial"><span data-dcnode-id="3691" instrument_node="">The Hutaree insignia includes a sword, crossed spears, and the letters "CCR" which stands for "Colonial Christian Republic." The Hutaree Militia uses a dull low-visibility Combat flag and a strange system of paramilitary ranks with titles from highest to lowest: Radok, Boramander, Zulif, Arkon, Rifleman (three grades), Lukore, and Gunner (three grades).</span></font></p><font data-dcnode-id="3684" face="Arial"><span data-dcnode-id="3688" instrument_node="">
</span><p data-dcnode-id="3685"><font data-dcnode-id="3686" face="Arial"><span data-dcnode-id="3687" instrument_node="">In March of 2010, nine Hutaree members were arrested in police raids in Michigan, Ohio, and Indiana, for their alleged involvement in a plot to kill various police officers and possibly civilians using illegal explosives and firearms.</span></font></p></font></font></font></td></tr><tr data-dcnode-id="3651"><td align="center" data-dcnode-id="3667" width="20%"><font data-dcnode-id="3668" face="Arial"><br data-dcnode-id="3674"><img align="MIDDLE" alt="Image by Rick Wyatt" border="1" data-dcnode-id="3673" height="137" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/civil/navy_jack_1863.gif&amp;raw" width="216"><br data-dcnode-id="3672"><span data-dcnode-id="3671" instrument_node="">CSA Naval Jack (historic )</span><br data-dcnode-id="3670"><br data-dcnode-id="3669"></font></td><td data-dcnode-id="3653" valign="top" width="80%"><b data-dcnode-id="3663"><font data-dcnode-id="3664" face="Arial" size="+1"><span data-dcnode-id="3665" instrument_node="">Confederate States of America (USA)</span></font></b><span data-dcnode-id="3662" instrument_node="">
</span><p data-dcnode-id="3659"><font data-dcnode-id="3660" face="Arial"><span data-dcnode-id="3661" instrument_node="">Although the Confederate flag is seen by many Southerners simply as a symbol of Southern pride, it is often used by racists to represent white domination of African-Americans. The flag remains a subject of controversy because some Southern states still fly the flag from public buildings or incorporate it into their state flag's design.</span></font></p><font data-dcnode-id="3654" face="Arial"><span data-dcnode-id="3658" instrument_node="">
</span><p data-dcnode-id="3655"><font data-dcnode-id="3656" face="Arial"><span data-dcnode-id="3657" instrument_node="">The flag is also used by racists as an alternative to the American flag, which they consider to be an emblem of what they describe as the Jewish-controlled government.</span></font></p></font></td></tr><tr data-dcnode-id="3607"><td align="center" data-dcnode-id="3637" width="20%"><font data-dcnode-id="3638" face="Arial"><br data-dcnode-id="3648"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="3647" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/dk-dnsb.gif&amp;raw" width="216"><br data-dcnode-id="3646"><span data-dcnode-id="3645" instrument_node="">DNSB Flag</span><br data-dcnode-id="3644"><br data-dcnode-id="3643"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="3642" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/dk-dnsb2.gif&amp;raw" width="216"><br data-dcnode-id="3641"><span data-dcnode-id="3640" instrument_node="">DNSB Flag (Type #2)</span><br data-dcnode-id="3639"></font></td><td data-dcnode-id="3609" valign="top" width="80%"><b data-dcnode-id="3629"><font data-dcnode-id="3630" face="Arial" size="+1"><span data-dcnode-id="3635" instrument_node="">National Socialist Movement of Denmark 1991 (Denmark)</span><br data-dcnode-id="3634"><font data-dcnode-id="3631" size="-1"><i data-dcnode-id="3632"><span data-dcnode-id="3633" instrument_node="">Danmarks Nationalsocialistiske Bevaegelse</span></i></font></font></b><span data-dcnode-id="3628" instrument_node="">
</span><p data-dcnode-id="3622"><font data-dcnode-id="3623" face="Arial"><span data-dcnode-id="3627" instrument_node="">The National Socialist Movement of Denmark was founded in 1991 as the latest in the list of successor parties to the original National Socialist Workers' Party of Denmark (</span><i data-dcnode-id="3625"><span data-dcnode-id="3626" instrument_node="">Danmarks Nationalsocialistiske Arbejderparti</span></i><span data-dcnode-id="3624" instrument_node=""> - DNSAP), which was disbanded in 1945 after World War II ended. </span></font></p><font data-dcnode-id="3610" face="Arial"><span data-dcnode-id="3621" instrument_node="">
</span><p align="center" data-dcnode-id="3615"><img alt="Image by Antonio Martins" border="1" data-dcnode-id="3620" height="116" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/dk-dnsap.gif&amp;raw" width="116"><span data-dcnode-id="3619" instrument_node=""> &nbsp;&nbsp;&nbsp; </span><img alt="Image by Antonio Martins" border="1" data-dcnode-id="3618" height="116" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/dk-dnsa2.gif&amp;raw" width="116"><br data-dcnode-id="3617"><span data-dcnode-id="3616" instrument_node="">World War II era DNSAP Flags 1940-1945</span></p><span data-dcnode-id="3614" instrument_node="">
</span><p data-dcnode-id="3611"><font data-dcnode-id="3612" face="Arial"><span data-dcnode-id="3613" instrument_node="">The original DNSAP Flags were square (ratio 1:1) with reversed swastikas centered on them.  The present DNSB flag features a red field with a white swastika within a ring of white. </span></font></p></font></td></tr><tr data-dcnode-id="3565"><td align="center" data-dcnode-id="3586" width="20%"><font data-dcnode-id="3587" face="Arial"><br data-dcnode-id="3604"><img alt="Image by Viktor Lomantsov" border="1" data-dcnode-id="3603" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/dpni_1.gif&amp;raw" width="224"><br data-dcnode-id="3602"><span data-dcnode-id="3601" instrument_node="">DPNI Flag</span><br data-dcnode-id="3600"><font data-dcnode-id="3598" size="-1"><span data-dcnode-id="3599" instrument_node="">(in Romanov Imperial colors)</span></font><br data-dcnode-id="3597"><br data-dcnode-id="3596"><img alt="Image by Viktor Lomantsov" border="1" data-dcnode-id="3595" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/dpni_2.gif&amp;raw" width="225"><br data-dcnode-id="3594"><span data-dcnode-id="3593" instrument_node="">DPNI Flag</span><br data-dcnode-id="3592"><font data-dcnode-id="3590" size="-1"><span data-dcnode-id="3591" instrument_node="">(in Russsian National colors)</span></font><br data-dcnode-id="3589"><br data-dcnode-id="3588"></font></td><td data-dcnode-id="3567" valign="top" width="80%"><b data-dcnode-id="3582"><font data-dcnode-id="3583" face="Arial" size="+1"><span data-dcnode-id="3584" instrument_node="">Movement Against Illegal Immigration  (Russia)</span></font></b><span data-dcnode-id="3581" instrument_node="">
</span><p data-dcnode-id="3578"><font data-dcnode-id="3579" face="Arial"><span data-dcnode-id="3580" instrument_node="">The Movement Against Illegal Immigration (DPNI) is a Russian nationalist hate group and anti-Illegal immigration organization. The DPNI was founded in 2002 by Vladimir Basmanov, in 2008 leadership passed to Aleksandr Belov (Potkin), the former press spokesman for ultra-nationalist Pamyat's leader, Dmitry Vasilyev. In 2010 the leadership changed once again, and Vladimir Ermolaev now leads the group.
	</span></font></p><p data-dcnode-id="3574"><font data-dcnode-id="3575" face="Arial"><font data-dcnode-id="3576" face="Arial"><span data-dcnode-id="3577" instrument_node="">The Movement Against Illegal Immigration was created in 2002, in reaction to ethnic violence between residents of a Moscow's suburb and immigrants from the South Caucasus and Central Asia. The Movement Against Illegal Immigration organized a number of anti-immigrant rallies throughout Russia. It also took part in carrying out the annual Russian March, a Russian ethnic pride display and protest event. Aside from mass protests the movement was active in organizing public pressure to support ethnic Russians in number of high profile court cases involving crimes committed by the immigrants.</span></font></font></p><font data-dcnode-id="3568" face="Arial"><font data-dcnode-id="3569" face="Arial"><span data-dcnode-id="3573" instrument_node="">
</span><p data-dcnode-id="3570"><font data-dcnode-id="3571" face="Arial"><span data-dcnode-id="3572" instrument_node="">Human Rights Activists had filed complaints with the Russian authorities because they believed the DPNI was "pursuing a fascist agenda," exemplified by slogans such as "Russia is for Russians!" Because the Movement continued to repeatedly take part in events aimed at igniting inter-ethnic hatred, it was finally banned by the Moscow City Court in 2011. At the present time, a suspension of the activities of the organization remains in force. The Movement Against Illegal Immigration was one of the more active political organizations in Russia with about 5000 members in 30 different regions.</span></font></p></font></font></td></tr><tr data-dcnode-id="3533"><td align="center" data-dcnode-id="3555" width="20%"><font data-dcnode-id="3556" face="Arial"><br data-dcnode-id="3562"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="3561" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/ea.gif&amp;raw" width="216"><br data-dcnode-id="3560"><span data-dcnode-id="3559" instrument_node="">EA Flag</span><br data-dcnode-id="3558"><br data-dcnode-id="3557"></font></td><td data-dcnode-id="3535" valign="top" width="80%"><b data-dcnode-id="3547"><font data-dcnode-id="3548" face="Arial" size="+1"><span data-dcnode-id="3553" instrument_node="">European Action (Germany)</span><br data-dcnode-id="3552"><small data-dcnode-id="3549"><i data-dcnode-id="3550"><span data-dcnode-id="3551" instrument_node="">Europaeische Aktion</span></i></small></font></b><span data-dcnode-id="3546" instrument_node="">
</span><p data-dcnode-id="3543"><font data-dcnode-id="3544" face="Arial"><span data-dcnode-id="3545" instrument_node="">Although European Action calls itself an international organization, its activities are mainly held in Germany.  They have, however, demonstrated in nearby European countries such as Austria, Switzerland and Liechtenstein. They promote historical revisionism and Holocaust denial in the name of freedom of speech, call for the repatriation of all non-European immigrants, dissolution of the European Union which they want to replace by a confederation of "fully sovereign" countries. They want to defend "traditional" ways of life against "decadence" and support anti-LGBT activities.</span></font></p><font data-dcnode-id="3536" face="Arial"><span data-dcnode-id="3542" instrument_node="">
</span><p data-dcnode-id="3539"><font data-dcnode-id="3540" face="Arial"><span data-dcnode-id="3541" instrument_node="">The flag of European Action has a yellow Crutch Cross within a yellow ring that is centered on a blue field.  Interestingly enough, these are the same colors used on the European Union flag.</span></font></p><font data-dcnode-id="3537" face="Arial"><span data-dcnode-id="3538" instrument_node="">
</span></font></font></td></tr><tr data-dcnode-id="3457"><td align="center" data-dcnode-id="3513" width="20%"><font data-dcnode-id="3514" face="Arial"><br data-dcnode-id="3530"><img alt="Image by Antonio Martins and Tomislav Todorovic" border="0" data-dcnode-id="3529" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/eco-anarchist1.gif&amp;raw" width="216"><br data-dcnode-id="3528"><span data-dcnode-id="3527" instrument_node="">Eco-Anarchists Flag (Type #1)</span><br data-dcnode-id="3526"><br data-dcnode-id="3525"><img alt="Image by Antonio Martins and Tomislav Todorovic" border="0" data-dcnode-id="3524" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/eco-anarchist2.gif&amp;raw" width="216"><br data-dcnode-id="3523"><span data-dcnode-id="3522" instrument_node="">Eco-Anarchists Flag (Type #2)</span><br data-dcnode-id="3521"><br data-dcnode-id="3520"><img alt="Image by Victor Lomantsov" border="0" data-dcnode-id="3519" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/eco-anarchist5.gif&amp;raw" width="216"><br data-dcnode-id="3518"><span data-dcnode-id="3517" instrument_node="">Eco-Anarchists Flag (Type #5)</span><br data-dcnode-id="3516"><br data-dcnode-id="3515"></font></td><td data-dcnode-id="3459" valign="top" width="80%"><b data-dcnode-id="3509"><font data-dcnode-id="3510" face="Arial" size="+1"><span data-dcnode-id="3511" instrument_node="">Eco-Anarchists or Green Anarchists (Worldwide)</span></font></b><span data-dcnode-id="3508" instrument_node="">
</span><p data-dcnode-id="3505"><font data-dcnode-id="3506" face="Arial"><span data-dcnode-id="3507" instrument_node="">Green Anarchism, or Eco-Anarchism, is strange mixture of anarchism and environmental issues. Its multiple sources can be found in the teachings of such notables as Henry David Thoreau, Ralph Waldo Emerson, Leo Tolstoy and Élisée Reclus. This fusion of anarchism and naturist philosophies is now worldwide.</span></font></p><font data-dcnode-id="3460" face="Arial"><span data-dcnode-id="3504" instrument_node="">
</span><div align="center" data-dcnode-id="3470"><span data-dcnode-id="3503" instrument_node="">
</span><span data-dcnode-id="3499" instrument_node="">
</span><span data-dcnode-id="3496" instrument_node="">
</span><span data-dcnode-id="3492" instrument_node="">
</span><span data-dcnode-id="3490" instrument_node="">
</span><span data-dcnode-id="3489" instrument_node="">
</span><span data-dcnode-id="3484" instrument_node="">
</span><span data-dcnode-id="3481" instrument_node="">
</span><span data-dcnode-id="3476" instrument_node="">
</span><span data-dcnode-id="3474" instrument_node="">
</span><table align="center" border="0" cellpadding="2" cellspacing="2" data-dcnode-id="3472"><tbody data-dcnode-id="3473"><tr data-dcnode-id="3491"><td data-dcnode-id="3500"><div align="center" data-dcnode-id="3501"><img alt="Image by Antonio Martins and Tomislav Todorovic" border="0" data-dcnode-id="3502" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/eco-anarchist3.gif&amp;raw" width="216"></div></td><td data-dcnode-id="3497"><span data-dcnode-id="3498" instrument_node="">&nbsp;&nbsp;&nbsp;</span></td><td data-dcnode-id="3493"><div align="center" data-dcnode-id="3494"><img alt="Image by Antonio Martins and Tomislav Todorovic" border="0" data-dcnode-id="3495" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/eco-anarchist4.gif&amp;raw" width="216"></div></td></tr><tr data-dcnode-id="3475"><td data-dcnode-id="3485"><div align="center" data-dcnode-id="3486"><font data-dcnode-id="3487" face="Arial,Helvetica,sans-serif"><span data-dcnode-id="3488" instrument_node="">Eco-Anarchist Flag (Type #3)</span></font></div></td><td data-dcnode-id="3482"><span data-dcnode-id="3483" instrument_node="">&nbsp;&nbsp;&nbsp;</span></td><td data-dcnode-id="3477"><div align="center" data-dcnode-id="3478"><font data-dcnode-id="3479" face="Arial,Helvetica,sans-serif"><span data-dcnode-id="3480" instrument_node="">Eco-Anarchist Flag (Type#4)</span></font></div></td></tr></tbody></table><span data-dcnode-id="3471" instrument_node=""> </span></div><span data-dcnode-id="3469" instrument_node="">
</span><p data-dcnode-id="3466"><font data-dcnode-id="3467" face="Arial"><span data-dcnode-id="3468" instrument_node="">Unfortunately some Green Anarchists groups have engaged in direct action and acts of eco-terrorism. Groups like Earth First!, Root Force, the Animal Rights Militia, the Earth Liberation Front (ELF), the Earth Liberation Army (ELA), the Olga Cell, and the Animal Liberation Front (ALF) have taken direct action against "systems of oppression." There have been violent attacks on the logging industry, the meat and dairy industries, animal testing laboratories, genetic engineering facilities, and government institutions.</span></font></p><font data-dcnode-id="3461" face="Arial"><span data-dcnode-id="3465" instrument_node="">
</span><p data-dcnode-id="3462"><font data-dcnode-id="3463" face="Arial"><span data-dcnode-id="3464" instrument_node="">After attempted assassinations of nuclear scientists, and letter bombs sent to nano-tech and nuclear-tech facilities, many Eco-Anarchist groups, or their sub-groups, have been named as terrorist organizations.  Groups like the Animal Rights Militia, the "Justice Department" and "Revolutionary Cells" have even claim responsibility for these openly violent attacks.  It should be pointed out that not all Eco-Anarchist groups engage in these violent protest activities, but unfortunately, some do.</span></font></p></font></font></td></tr><tr data-dcnode-id="3408"><td align="center" data-dcnode-id="3442" width="20%"><font data-dcnode-id="3443" face="Arial"><br data-dcnode-id="3454"><img alt="Image by Ivan Sache" border="1" data-dcnode-id="3453" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/elam.gif&amp;raw" width="216"><br data-dcnode-id="3452"><span data-dcnode-id="3451" instrument_node="">ELAM Flag</span><br data-dcnode-id="3450"><br data-dcnode-id="3449"><img alt="Image by Ivan Sache" border="1" data-dcnode-id="3448" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/elam2.gif&amp;raw" width="216"><br data-dcnode-id="3447"><span data-dcnode-id="3446" instrument_node="">ELAM Flag</span><br data-dcnode-id="3445"><br data-dcnode-id="3444"></font></td><td data-dcnode-id="3410" valign="top" width="80%"><b data-dcnode-id="3434"><font data-dcnode-id="3435" face="Arial" size="+1"><span data-dcnode-id="3440" instrument_node="">The National Popular Front (Cyprus)</span><br data-dcnode-id="3439"><small data-dcnode-id="3436"><i data-dcnode-id="3437"><span data-dcnode-id="3438" instrument_node="">
Εθνικό Λαϊκό Μέτωπο (Ethniko Laiko Metopo)</span></i></small></font></b><span data-dcnode-id="3433" instrument_node="">
</span><p data-dcnode-id="3430"><font data-dcnode-id="3431" face="Arial"><span data-dcnode-id="3432" instrument_node="">The National Popular Front (ELAM) is an extreme-right political party founded in 2008 in Cyprus. ELAM described its platform as "popular and social nationalism" and promotes Greek nationalism. ELAM's activities include sometimes violent marches against Turkish Cypriots and attacks against immigrants and leftist progressive  students.</span></font></p><font data-dcnode-id="3411" face="Arial"><span data-dcnode-id="3429" instrument_node="">
</span><p data-dcnode-id="3424"><font data-dcnode-id="3425" face="Arial"><a data-dcnode-id="3427" href="#gd"><span data-dcnode-id="3428" instrument_node="">Golden Dawn</span></a><span data-dcnode-id="3426" instrument_node=""> leader Ilias Kasidiaris has described ELAM as the "Golden Dawn of Cyprus." and the two extremist groups work closely together.  Political racism of this sort is supported by about 4,000 people on Cyprus who regularly vote for ELAM. ELAM's members often rally at night in Larnaca dressed in black, waving Greek flags inciting anti-immigrant, racist violence, and some are members of the Cypriot National Guard.</span></font></p><font data-dcnode-id="3412" face="Arial"><span data-dcnode-id="3423" instrument_node="">
</span><p data-dcnode-id="3420"><font data-dcnode-id="3421" face="Arial"><span data-dcnode-id="3422" instrument_node="">ELAM uses a blue flag with a white cross charged in the center with the party's emblem, represented as a black old shield charged with a white sword pointing upwards.  On variant flags the vertical arm of the cross is sometimes wider than the horizontal one.</span></font></p><font data-dcnode-id="3413" face="Arial"><span data-dcnode-id="3419" instrument_node="">
</span><p data-dcnode-id="3416"><font data-dcnode-id="3417" face="Arial"><span data-dcnode-id="3418" instrument_node="">ELAM also uses a black flag with the white letters "ΕΛΑΜ" on it.</span></font></p><font data-dcnode-id="3414" face="Arial"><span data-dcnode-id="3415" instrument_node="">
</span></font></font></font></font></td></tr><tr data-dcnode-id="3377"><td align="center" data-dcnode-id="3398" width="20%"><font data-dcnode-id="3399" face="Arial"><br data-dcnode-id="3405"><img alt="Image from Wikipedia" border="1" data-dcnode-id="3404" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/english_mistery.png&amp;raw" width="216"><br data-dcnode-id="3403"><span data-dcnode-id="3402" instrument_node="">EM Flag</span><br data-dcnode-id="3401"><br data-dcnode-id="3400"></font></td><td data-dcnode-id="3379" valign="top" width="80%"><b data-dcnode-id="3394"><font data-dcnode-id="3395" face="Arial" size="+1"><span data-dcnode-id="3396" instrument_node="">English Mistery (United Kingdom)</span></font></b><span data-dcnode-id="3393" instrument_node="">
</span><p data-dcnode-id="3390"><font data-dcnode-id="3391" face="Arial"><span data-dcnode-id="3392" instrument_node="">The English Mistery (or English Mystery) was a political and esoteric group active in the United Kingdom of the 1930s. A "Conservative fringe group" in favor of bringing back the feudal system, it was described as a patriotic organization who proposed a ´Masculine Renaissance,´ espousing an ultra-reactionary, aristocratic Toryism with an addition reference to Nietzsche, elitism and eugenics." Its views have been characterized as "aristocratic, ultra-conservative, Tory integral nationalistic, anti-liberal democratic, reactionary ultra-royalist, and anti-democratic." (Enjoy that trip to the dictionary) Basically, it was against everything to do with welfare, the London School of Economics, and the United States.</span></font></p><font data-dcnode-id="3380" face="Arial"><span data-dcnode-id="3389" instrument_node="">
</span><p data-dcnode-id="3383"><font data-dcnode-id="3384" face="Arial"><span data-dcnode-id="3388" instrument_node="">It was founded by William Sanderson, and took its title from his 1930 book </span><i data-dcnode-id="3386"><span data-dcnode-id="3387" instrument_node="">That Which Was Lost: A Treatise on Freemasonry and the English Mistery</span></i><span data-dcnode-id="3385" instrument_node="">. Sanderson was a Freemason, but disaffected, and founded the group in 1930 to promote his views of "leadership."</span></font></p><font data-dcnode-id="3381" face="Arial"><span data-dcnode-id="3382" instrument_node="">
</span></font></font></td></tr><tr data-dcnode-id="3331"><td align="center" data-dcnode-id="3362" width="20%"><font data-dcnode-id="3363" face="Arial"><br data-dcnode-id="3374"><img alt="Image by Juan Manuel Gabino Villascán" border="1" data-dcnode-id="3373" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/mx_epr1.gif&amp;raw" width="216"><br data-dcnode-id="3372"><span data-dcnode-id="3371" instrument_node="">EPR Flag (type #1)</span><br data-dcnode-id="3370"><br data-dcnode-id="3369"><img alt="Image by Juan Manuel Gabino Villascán" border="1" data-dcnode-id="3368" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/mx_epr2.gif&amp;raw" width="216"><br data-dcnode-id="3367"><span data-dcnode-id="3366" instrument_node="">EPR Flag (type #2)</span><br data-dcnode-id="3365"><br data-dcnode-id="3364"></font></td><td data-dcnode-id="3333" valign="top" width="80%"><b data-dcnode-id="3354"><font data-dcnode-id="3355" face="Arial" size="+1"><span data-dcnode-id="3360" instrument_node="">Revolutionary People's Army (Mexico)</span><br data-dcnode-id="3359"><font data-dcnode-id="3356" size="-1"><i data-dcnode-id="3357"><span data-dcnode-id="3358" instrument_node="">Ejército Popular Revolucionario EPR</span></i></font></font></b><span data-dcnode-id="3353" instrument_node="">
</span><p data-dcnode-id="3347"><font data-dcnode-id="3348" face="Arial"><span data-dcnode-id="3352" instrument_node="">The Popular Revolutionary Army is a violent leftist movement in Mexico led by a masked leader who identifies himself as "Captain Emiliano." It was first formed in 1996 and after engaging police in a fire fight near the Guerrero capital of Chilpancingo,  "declared" war on the Mexican government in a document called the </span><i data-dcnode-id="3350"><span data-dcnode-id="3351" instrument_node="">Aguas Blancas</span></i><span data-dcnode-id="3349" instrument_node=""> Manifesto. The EPR guerrilla currently operates in the States of Guerrero, Oaxaca, Chiapas, Guanajuato, Tlaxcala and Veracruz.</span></font></p><font data-dcnode-id="3334" face="Arial"><span data-dcnode-id="3346" instrument_node="">
</span><div align="center" data-dcnode-id="3341"><p data-dcnode-id="3342"><img alt="Image by António Martins" border="1" data-dcnode-id="3345" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/mx_epr3.gif&amp;raw" width="216"><br data-dcnode-id="3344"><span data-dcnode-id="3343" instrument_node="">EPR Flag (type #3)</span></p></div><span data-dcnode-id="3340" instrument_node="">
</span><p data-dcnode-id="3337"><font data-dcnode-id="3338" face="Arial"><span data-dcnode-id="3339" instrument_node="">The main flag used by the EPR has a green field with a red star, superimposed over the star are crossed rifle, machete and hammer. Just off the three uppermost points of the star are the initials "EPR." Two other flags also reported in use are shown here.</span></font></p><font data-dcnode-id="3335" face="Arial"><a data-dcnode-id="3336" name="fb"></a></font></font></td></tr><tr data-dcnode-id="3296"><td align="center" data-dcnode-id="3322" width="20%"><font data-dcnode-id="3323" face="Arial"><br data-dcnode-id="3328"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="3327" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/pr%257Dfalbo.gif&amp;raw" width="220"><br data-dcnode-id="3326"><span data-dcnode-id="3325" instrument_node="">FB Flag (2000)</span><br data-dcnode-id="3324"></font></td><td data-dcnode-id="3298" valign="top" width="80%"><b data-dcnode-id="3314"><font data-dcnode-id="3315" face="Arial" size="+1"><span data-dcnode-id="3320" instrument_node="">Puerto Rican Phalanx (Puerto Rico)</span><br data-dcnode-id="3319"><font data-dcnode-id="3316" size="-1"><i data-dcnode-id="3317"><span data-dcnode-id="3318" instrument_node="">Falange Boricua</span></i></font></font></b><span data-dcnode-id="3313" instrument_node="">
</span><p data-dcnode-id="3307"><font data-dcnode-id="3308" face="Arial"><span data-dcnode-id="3312" instrument_node="">The name of this movement is loosely translated as "Puerto Rican Phalanx". It was founded in March 2000 as a Puerto Rican counterpart of the Spanish Phalanx and allegedly banned in May same year, after having attempted to blockade US military bases in Puerto Rico. It was soon reborn as the </span><a data-dcnode-id="3310" href="#mnspr"><span data-dcnode-id="3311" instrument_node="">National Syndicalist Movement of Puerto Rico</span></a><span data-dcnode-id="3309" instrument_node="">, but possibly ended its activities some time afterwards. The movement flag, as presented at their website (still existing), was charged with red yoke and arrows on black field. This flag might have inspired the Venezuelan Phalanx to adopt the same design in early 2002, claiming that it is the common flag of Latin American Phalangists.</span></font></p><span data-dcnode-id="3306" instrument_node="">
</span><p data-dcnode-id="3300"><font data-dcnode-id="3301" face="Arial"><span data-dcnode-id="3305" instrument_node="">Along with its own flag, the movement also used the Cross of Burgundy flag as the symbol of Hispanity </span><i data-dcnode-id="3303"><span data-dcnode-id="3304" instrument_node="">(Hispanidad)</span></i><span data-dcnode-id="3302" instrument_node="">, as well as the Grito de Lares flag and the flag of the Nationalist Party of Puerto Rico, which were both considered important national symbols.</span></font></p><span data-dcnode-id="3299" instrument_node="">
</span></td></tr><tr data-dcnode-id="3262"><td align="center" data-dcnode-id="3284" width="20%"><font data-dcnode-id="3285" face="Arial"><br data-dcnode-id="3293"><img align="MIDDLE" alt="Image by Peter Hagh" border="1" data-dcnode-id="3292" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/italy_nazi.jpg&amp;raw" width="216"><br data-dcnode-id="3291"><span data-dcnode-id="3290" instrument_node="">FDG Flag</span><br data-dcnode-id="3289"><span data-dcnode-id="3288" instrument_node="">(Sun Wheel variant)</span><br data-dcnode-id="3287"><br data-dcnode-id="3286"></font></td><td data-dcnode-id="3264" valign="top" width="80%"><b data-dcnode-id="3276"><font data-dcnode-id="3277" face="Arial" size="+1"><span data-dcnode-id="3282" instrument_node="">Youth Front (Italy)</span><br data-dcnode-id="3281"><font data-dcnode-id="3278" size="-1"><em data-dcnode-id="3279"><span data-dcnode-id="3280" instrument_node="">Fronte Della Gioventãƒâº</span></em></font></font></b><span data-dcnode-id="3275" instrument_node="">
</span><p data-dcnode-id="3272"><font data-dcnode-id="3273" face="Arial"><span data-dcnode-id="3274" instrument_node="">The Black Sun Wheel, or Celtic Cross, on a white disc has became the international symbol of the Youth Front, and adopted by other groups of young nationalist in several European countries. It is usually placed on a red field as is done with this Italian Youth Front flag.</span></font></p><font data-dcnode-id="3265" face="Arial"><span data-dcnode-id="3271" instrument_node="">
</span><p data-dcnode-id="3268"><font data-dcnode-id="3269" face="Arial"><span data-dcnode-id="3270" instrument_node="">Because this Celtic Cross was adopted by a prohibited neo-Nazi party in postwar Germany, its public display in Germany was banned along with the swastika under the federal criminal code, as part of legislation designed to forestall any revival of Nazism. However, it is still freely used in Italy and other countries.</span></font></p><font data-dcnode-id="3266" face="Arial"><a data-dcnode-id="3267" name="fe"></a></font></font></td></tr><tr data-dcnode-id="3162"><td align="center" data-dcnode-id="3236" width="20%"><font data-dcnode-id="3237" face="Arial"><br data-dcnode-id="3259"><img align="MIDDLE" alt="Image by Santiago Dotor" border="1" data-dcnode-id="3258" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/spanish_phalanx1.jpg&amp;raw" width="216"><br data-dcnode-id="3257"><span data-dcnode-id="3256" instrument_node="">FE Party 1933</span><br data-dcnode-id="3255"><span data-dcnode-id="3254" instrument_node="">(original version)</span><br data-dcnode-id="3253"><br data-dcnode-id="3252"><img align="MIDDLE" alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="3251" height="124" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/spanish_phalanx2.gif&amp;raw" width="216"><br data-dcnode-id="3250"><span data-dcnode-id="3249" instrument_node="">FE Party</span><br data-dcnode-id="3248"><span data-dcnode-id="3247" instrument_node="">(popular variant)</span><br data-dcnode-id="3246"><br data-dcnode-id="3245"><img align="MIDDLE" alt="Image provided by Rick Prohaska" border="1" data-dcnode-id="3244" height="124" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/spanish_flanagists.jpg&amp;raw" width="216"><br data-dcnode-id="3243"><span data-dcnode-id="3242" instrument_node="">FE Party</span><br data-dcnode-id="3241"><span data-dcnode-id="3240" instrument_node="">(modern variant)</span><br data-dcnode-id="3239"><br data-dcnode-id="3238"></font></td><td data-dcnode-id="3164" valign="top" width="80%"><b data-dcnode-id="3225"><font data-dcnode-id="3233" face="Arial" size="+1"><span data-dcnode-id="3234" instrument_node="">Spanish Phalanx 1933-1977 (Spain)</span></font><br data-dcnode-id="3232"><font data-dcnode-id="3226" size="-1"><i data-dcnode-id="3230"><span data-dcnode-id="3231" instrument_node="">La Falange</span></i><span data-dcnode-id="3229" instrument_node=""> or </span><i data-dcnode-id="3227"><span data-dcnode-id="3228" instrument_node="">Falange Española </span></i></font></b><span data-dcnode-id="3224" instrument_node="">
</span><p data-dcnode-id="3215"><font data-dcnode-id="3216" face="Arial"><span data-dcnode-id="3223" instrument_node="">The term </span><i data-dcnode-id="3221"><span data-dcnode-id="3222" instrument_node="">Falange</span></i><span data-dcnode-id="3220" instrument_node=""> is used by several political movements and parties dating from the 1930s, including the original Fascist movement in Spain. The word "Falange" actually means "phalanx," (a Macedonian or Spartan Greek military formation) in Spanish, and there are many small parties still calling themselves the </span><i data-dcnode-id="3218"><span data-dcnode-id="3219" instrument_node="">Falange</span></i><span data-dcnode-id="3217" instrument_node=""> Party today.  The warlike symbol of the phalanx was chosen due to the militaristic nature of these National Socialist type parties. It should be noted here that the yoke and the arrows both were taken from the Catholic King's emblems (the yoke for Ferdinand of Aragon and the arrows for Elizabeth of Castile) and the same symbols were readopted by Franco's regime.</span></font></p><font data-dcnode-id="3165" face="Arial"><span data-dcnode-id="3214" instrument_node="">
</span><p data-dcnode-id="3208"><font data-dcnode-id="3209" face="Arial"><span data-dcnode-id="3213" instrument_node="">The original Spanish </span><i data-dcnode-id="3211"><span data-dcnode-id="3212" instrument_node="">Falange</span></i><span data-dcnode-id="3210" instrument_node=""> movement was founded in 1933 by JosÃƒÆ’Ã‚Â© Antonio Primo de Rivera, who was the son of the former Spanish dictator, General Primo de Rivera. Their platform (political agenda) combined the national traditions of Spain with these of Fascist ideology.</span></font></p><font data-dcnode-id="3166" face="Arial"><span data-dcnode-id="3207" instrument_node="">
</span><p data-dcnode-id="3195"><font data-dcnode-id="3196" face="Arial"><span data-dcnode-id="3206" instrument_node="">The </span><i data-dcnode-id="3204"><span data-dcnode-id="3205" instrument_node="">Falange</span></i><span data-dcnode-id="3203" instrument_node=""> symbol was also used in World War II on a flag used by the soldiers of the </span><i data-dcnode-id="3201"><span data-dcnode-id="3202" instrument_node="">Divisio'n Azul</span></i><span data-dcnode-id="3200" instrument_node=""> (Blue Division), a Spanish volunteer unit in the German Army which fought on the Eastern Front. It was formed in 1941, and was disbanded 1943. Theirs was certainly not the only case of using of a flag with this design: there have been many flags with the </span><i data-dcnode-id="3198"><span data-dcnode-id="3199" instrument_node="">Falange</span></i><span data-dcnode-id="3197" instrument_node=""> symbol on them.</span></font></p><font data-dcnode-id="3167" face="Arial"><span data-dcnode-id="3194" instrument_node="">
</span><p data-dcnode-id="3173"><font data-dcnode-id="3174" face="Arial"><span data-dcnode-id="3193" instrument_node="">Today, decades after the fall of the Franco Fascist dictatorship, Spain still has several minor Falangist organizations, represented by a number of tiny political parties. Chief among these are the </span><i data-dcnode-id="3191"><span data-dcnode-id="3192" instrument_node="">Falange EspaÃƒÆ’Ã‚Â±ola</span></i><span data-dcnode-id="3190" instrument_node=""> (</span><i data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">de las Juntas de Ofensiva Nacionalsindicalista</span></i><span data-dcnode-id="3187" instrument_node="">), </span><i data-dcnode-id="3185"><span data-dcnode-id="3186" instrument_node="">Falange EspaÃƒÆ’Ã‚Â±ola de las JONS</span></i><span data-dcnode-id="3184" instrument_node="">, </span><i data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">Falange AutÃƒÆ’Ã‚Â©ntica</span></i><span data-dcnode-id="3181" instrument_node="">, </span><i data-dcnode-id="3179"><span data-dcnode-id="3180" instrument_node="">Falange EspaÃƒÆ’Ã‚Â±ola Independiente</span></i><span data-dcnode-id="3178" instrument_node="">, and </span><i data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">FE - La Falange</span></i><span data-dcnode-id="3175" instrument_node="">. </span></font></p><font data-dcnode-id="3168" face="Arial"><span data-dcnode-id="3172" instrument_node="">
</span><p data-dcnode-id="3169"><font data-dcnode-id="3170" face="Arial"><span data-dcnode-id="3171" instrument_node="">Following post-Francoist Spanish Falanges is a bit confusing, with their splitting and merging and use of similar names which have even led to several lawsuits. These fascist inspired parties are rarely seen publicly except on the ballots, in State funded TV election advertisements, and during demonstrations on historic dates, such as November 20 celebration the death of both Jose Antonio Primo de Rivera and General Francisco Franco. For example, in the 2004 national elections, these parties combined received less than 28,000 votes between all of them.</span></font></p></font></font></font></font></td></tr><tr data-dcnode-id="3129"><td align="center" data-dcnode-id="3152" width="20%"><font data-dcnode-id="3153" face="Arial"><br data-dcnode-id="3159"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="3158" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/mx-friba.gif&amp;raw" width="216"><br data-dcnode-id="3157"><span data-dcnode-id="3156" instrument_node="">FI Flag</span><br data-dcnode-id="3155"><br data-dcnode-id="3154"></font></td><td data-dcnode-id="3131" valign="top" width="80%"><b data-dcnode-id="3144"><font data-dcnode-id="3145" face="Arial" size="+1"><span data-dcnode-id="3150" instrument_node="">Ibero-American Front (Mexico)</span><br data-dcnode-id="3149"><font data-dcnode-id="3146" size="-1"><i data-dcnode-id="3147"><span data-dcnode-id="3148" instrument_node="">Frente Iberoamericano</span></i></font></font></b><span data-dcnode-id="3143" instrument_node="">
</span><p data-dcnode-id="3140"><font data-dcnode-id="3141" face="Arial"><span data-dcnode-id="3142" instrument_node="">The Ibero-American Front is a neo-Nazi group based in Mexico whose stated intention is to extend its activities to all Latin American countries. Although they claim to condemn all the genocides committed so far, their insistence on the "14 words of David Lane", as well as the Nazi-style graphics all over their website, clearly reveal their nature. Their stated goal is to "protect" the Creoles (Latin Americans of European origin) by formation of separate states for them wherever possible; these states would eventually gather in a Union of Sovereign and Independent Creole States.</span></font></p><font data-dcnode-id="3132" face="Arial"><span data-dcnode-id="3139" instrument_node="">
</span><p data-dcnode-id="3133"><font data-dcnode-id="3134" face="Arial"><span data-dcnode-id="3138" instrument_node="">The flag of Ibero-American Front is derived from the Cross of Burgundy flag, which is increasingly being used by Latin American ultra-rightists, with the addition a black and white cross. The cross is designed to resemble the German </span><i data-dcnode-id="3136"><span data-dcnode-id="3137" instrument_node="">Balkenkreuz</span></i><span data-dcnode-id="3135" instrument_node=""> which, along with the complete set of colors, is another reference to the Nazism.</span></font></p></font></td></tr><tr data-dcnode-id="3097"><td align="center" data-dcnode-id="3119" width="20%"><font data-dcnode-id="3120" face="Arial"><br data-dcnode-id="3126"><img alt="Image by Ben Cahoon" border="1" data-dcnode-id="3125" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/ca-flq.gif&amp;raw" width="216"><br data-dcnode-id="3124"><span data-dcnode-id="3123" instrument_node="">FLQ Flag</span><br data-dcnode-id="3122"><br data-dcnode-id="3121"></font></td><td data-dcnode-id="3099" valign="top" width="80%"><b data-dcnode-id="3111"><font data-dcnode-id="3112" face="Arial" size="+1"><span data-dcnode-id="3117" instrument_node="">Quebec Liberation Front (Canada)</span><br data-dcnode-id="3116"><font data-dcnode-id="3113" size="-1"><i data-dcnode-id="3114"><span data-dcnode-id="3115" instrument_node="">Front de LibÃƒÆ’Ã‚Â©ration du QuÃƒÆ’Ã‚Â©bec</span></i></font></font></b><span data-dcnode-id="3110" instrument_node="">
</span><p data-dcnode-id="3107"><font data-dcnode-id="3108" face="Arial"><span data-dcnode-id="3109" instrument_node="">The paramilitary group Quebec Liberation Front was founded in 1963 by Georges Schoeters, a Belgian revolutionary. The goal of the FLQ was to "free" Quebec from Canada and form an independent nation.  They were soon labeled a terrorist organization for their violent methods and were responsible for many violent incidents which killed eight people and injured many more, including a bombing of the Montreal Stock Exchange in 1969. In 1970, during the "October Crisis," they kidnapped James Cross, the British commercial envoy in Quebec, and assassinated Pierre LaPorte, the Labor Minister of Quebec province. By 1971, the Montreal Police Anti-terrorist Unit was able to arrest most of the FLQ leaders and dozens of members, after which the remaining FLQ broke up into several unorganized splinter groups.</span></font></p><font data-dcnode-id="3100" face="Arial"><span data-dcnode-id="3106" instrument_node="">
</span><p data-dcnode-id="3103"><font data-dcnode-id="3104" face="Arial"><span data-dcnode-id="3105" instrument_node="">The Quebec Liberation Front used a blue and white horizontal striped bicolor with a red star (bordered in gold) centered on the white fly that was seen at demonstrations between 1968-71 in Montreal and the U.S.</span></font></p><font data-dcnode-id="3101" face="Arial"><a data-dcnode-id="3102" name="nfi"></a></font></font></td></tr><tr data-dcnode-id="3024"><td align="center" data-dcnode-id="3081" width="20%"><font data-dcnode-id="3082" face="Arial"><br data-dcnode-id="3094"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="3093" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/es_fn1.gif&amp;raw" width="150"><br data-dcnode-id="3092"><span data-dcnode-id="3091" instrument_node="">FN Flag (Type #1)</span><br data-dcnode-id="3090"><br data-dcnode-id="3089"><br data-dcnode-id="3088"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="3087" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/es_fn2.gif&amp;raw" width="150"><br data-dcnode-id="3086"><span data-dcnode-id="3085" instrument_node="">FN Flag (Type #2)</span><br data-dcnode-id="3084"><br data-dcnode-id="3083"></font></td><td data-dcnode-id="3026" valign="top" width="80%"><b data-dcnode-id="3073"><font data-dcnode-id="3074" face="Arial" size="+1"><span data-dcnode-id="3079" instrument_node="">New Force (Spain)</span><br data-dcnode-id="3078"><font data-dcnode-id="3075" size="-1"><i data-dcnode-id="3076"><span data-dcnode-id="3077" instrument_node="">Fuerza Nueva</span></i></font></font></b><span data-dcnode-id="3072" instrument_node="">
</span><p data-dcnode-id="3066"><font data-dcnode-id="3067" face="Arial"><span data-dcnode-id="3071" instrument_node="">The New Force is the name of a far-right political association in Spain which was founded by Blas Piñar in 1966 with the aim of opposing any reforms of the Fascist regime of Spain, an authoritarian state dictatorship between 1939 to 1975, that existed under General Francisco Franco. From 1976 to 1982, New Force operated as a political party, hoping to stop the transition to democracy, but the lack of political success made it eventually disband itself, although it has reappeared under different names, always under the leadership of Blas Piñar, who is the honorary president of Spanish Alternative </span><i data-dcnode-id="3069"><span data-dcnode-id="3070" instrument_node="">(Alternativa Española)</span></i><span data-dcnode-id="3068" instrument_node=""> since 2003. The present association New Force is mainly dedicated to commemorating the anniversaries of beginning of Spanish Civil War (July 18th) and death of Francisco Franco (November 20th). Their calls to demonstrate on these dates have generally been supported by neo-Nazi, skinheads and other militants of the extreme right.</span></font></p><font data-dcnode-id="3027" face="Arial"><span data-dcnode-id="3065" instrument_node="">
