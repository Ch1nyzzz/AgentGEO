</span><p align="Justify" data-dcnode-id="7377"><font data-dcnode-id="7378" face="Arial"><span data-dcnode-id="7387" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;I agonized over these sections.  Whether to ignore these flags and what they stand for, or include them was a tough decision.  I feared including them would constitute legitimizing them, and certainly didn't want to do that.  In the end I thought it important that they be identified for what they stood for, because many times they have been unknowingly displayed or incorrectly identified as historical by unsuspecting or uninformed individuals or flag companies.  
</span><br data-dcnode-id="7386"><span data-dcnode-id="7385" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;These are flags that many times "migrate" from group to group, many of which rapidly appear and disappear as they change their  names, and this makes identification even more difficult. Many of these groups were (and are very small) and don't exist any longer, but their flags continue to be used by other modern extremists.  Unfortunately, there are a number of people who, like Ayn Rand's characters in "Atlas Shrugged," think there is something wrong in the world, that the world isn't following the right value system.  As an alternative, they get into extremist politics like anarchism, environmentalism, neo-fascism, and radical traditionalism.  The scary part is that this page only identifies a small portion of the Flags of Extremism being sold today. The sad truth be known, any flag or cultural symbol's true meaning can be used, then distorted and eventually destroyed by their misuse by these extremists groups. </span><br data-dcnode-id="7384"><span data-dcnode-id="7383" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Please be aware that in </span><b data-dcnode-id="7380"><u data-dcnode-id="7381"><span data-dcnode-id="7382" instrument_node="">NO WAY</span></u></b><span data-dcnode-id="7379" instrument_node=""> does this site support the beliefs, policies, or philosophies of these organizations, nor encourage the displaying of these flags.</span></font></p><font data-dcnode-id="26" face="Arial"><span data-dcnode-id="7376" instrument_node="">

</span><table bgcolor="#FFFFFF" border="2" bordercolor="Red" cellpadding="5" cellspacing="0" data-dcnode-id="52" width="100%"><tbody data-dcnode-id="53"><tr data-dcnode-id="7343"><td align="center" data-dcnode-id="7366" width="20%"><font data-dcnode-id="7367" face="Arial"><br data-dcnode-id="7373"><img alt="Image by Marcus Schmöger" border="1" data-dcnode-id="7372" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/gr%255Enov17.gif&amp;raw" width="215"><br data-dcnode-id="7371"><span data-dcnode-id="7370" instrument_node="">17-N Flag</span><br data-dcnode-id="7369"><br data-dcnode-id="7368"></font></td><td data-dcnode-id="7345" valign="top" width="80%"><b data-dcnode-id="7358"><font data-dcnode-id="7359" face="Arial" size="+1"><span data-dcnode-id="7364" instrument_node="">November 17 (Greece)</span><br data-dcnode-id="7363"><small data-dcnode-id="7360"><i data-dcnode-id="7361"><span data-dcnode-id="7362" instrument_node="">17 Νοεμβρίου</span></i></small></font></b><span data-dcnode-id="7357" instrument_node="">
</span><p data-dcnode-id="7351"><font data-dcnode-id="7352" face="Arial"><span data-dcnode-id="7356" instrument_node="">November 17 took its name from the date of an uprising of a group of students at the Polytechnical School in Athens in 1973. The student uprising was crushed by the Greek Military Junta (1967-1974) led by Colonel Georgios Papadopoulos, who had seized dictatorial powers in the </span><i data-dcnode-id="7354"><span data-dcnode-id="7355" instrument_node="">coup d´état</span></i><span data-dcnode-id="7353" instrument_node=""> of 1967.  The 17-N group was founded in 1975, one year after the fall of the military junta. Their first act of terrorism was the assassination of Richard Welch, the head of the CIA bureau in Athens. Over 21 people were later added to the murder and kill list of 17-N, including American, British and Turkish diplomats as well as Greek policemen, businessmen and politicians.</span></font></p><font data-dcnode-id="7346" face="Arial"><span data-dcnode-id="7350" instrument_node="">
</span><p data-dcnode-id="7347"><font data-dcnode-id="7348" face="Arial"><span data-dcnode-id="7349" instrument_node="">The group was dismantled with the help of an international task force led by Scotland Yard in 2002. The leaders of the group were Alexandre Giotopoulos, arrested in 2002 on the Island of Lipsos, and Dimitris Koufondinas, known as "the man with a thousand faces," who surrendered to police the same year.</span></font></p></font></td></tr><tr data-dcnode-id="7283"><td align="center" data-dcnode-id="7312" width="20%"><font data-dcnode-id="7313" face="Arial"><br data-dcnode-id="7340"><br data-dcnode-id="7339"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="7338" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/blueshirts.gif&amp;raw" width="216"><br data-dcnode-id="7337"><span data-dcnode-id="7336" instrument_node="">ACA Flag</span><br data-dcnode-id="7335"><br data-dcnode-id="7334"><br data-dcnode-id="7333"><img alt="Image by R-41, Wikipedia" border="1" data-dcnode-id="7332" height="115" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/blueshirts1.gif&amp;raw" width="216"><br data-dcnode-id="7331"><span data-dcnode-id="7330" instrument_node="">Variant ACA Flag</span><br data-dcnode-id="7329"><font data-dcnode-id="7327" size="-1"><span data-dcnode-id="7328" instrument_node="">(questionable ratio and color)</span></font><br data-dcnode-id="7326"><br data-dcnode-id="7325"><br data-dcnode-id="7324"><img alt="Image by Pete Loeser" border="1" data-dcnode-id="7323" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/england/saint_patrick_saltire.gif&amp;raw" width="216"><br data-dcnode-id="7322"><span data-dcnode-id="7321" instrument_node="">Saint Patrick's cross/saltire</span><br data-dcnode-id="7320"><font data-dcnode-id="7316" size="-1"><span data-dcnode-id="7319" instrument_node="">- Traditional Irish Flag -</span><br data-dcnode-id="7318"><span data-dcnode-id="7317" instrument_node="">(use by the Greenshirts unverified)</span></font><br data-dcnode-id="7315"><br data-dcnode-id="7314"></font></td><td data-dcnode-id="7285" valign="top" width="80%"><b data-dcnode-id="7302"><font data-dcnode-id="7303" face="Arial" size="+1"><span data-dcnode-id="7310" instrument_node="">Army Comrades Association (Ireland)</span><br data-dcnode-id="7309"><small data-dcnode-id="7304"><span data-dcnode-id="7308" instrument_node="">National Guard - Blueshirts (</span><i data-dcnode-id="7306"><span data-dcnode-id="7307" instrument_node="">Na Léinte Gorma</span></i><span data-dcnode-id="7305" instrument_node="">)</span></small></font></b><span data-dcnode-id="7301" instrument_node="">
</span><p data-dcnode-id="7298"><font data-dcnode-id="7299" face="Arial"><span data-dcnode-id="7300" instrument_node="">In 1932, a right-wing Irish organization, first called the Army Comrades Association (ACA), then the National Guard, and eventually merged into the Fine Gael Party, was started by Thomas F. O'Higgins and "General" Eoin O'Duffy, who where the first two leaders. Because the membership wore "St. Patrick´s blue," (sky blue) shirts, they soon became more popularly known by their nickname of "The Blueshirts."  The Blueshirts, at least on the surface, appeared to be the Irish equivalent of the German Brownshirts or Italian Blackshirts; they wore paramilitary-style uniforms, greeted each other with Roman salutes, and participated in street violence and fights, usually against the IRA.  Although they didn't seem to completely follow Fascist doctrine and didn't engage in political terrorism, the Blueshirts were declared an extremist and illegal organization by the Irish government.</span></font></p><font data-dcnode-id="7286" face="Arial"><span data-dcnode-id="7297" instrument_node="">
</span><p data-dcnode-id="7294"><font data-dcnode-id="7295" face="Arial"><span data-dcnode-id="7296" instrument_node="">After the banning in 1933, the National Guard has merged into the newly founded Fine Gael party, with O'Duffy as its first president who, after serious disagreements with other party leaders, resigned in 1934 and left to form the National Corporate Party, an openly Fascist organization nicknamed the "Greenshirts", in 1935. Only a minority of former Blueshirts followed him; most of them remained in the Fine Gael, which soon distanced itself from the extremism and evolved into a modern party of the center-right, participating in several coalition governments, including the current one (2011-present). O'Duffy later led Irish volunteers to aid the Nationalists in the Spanish Civil War (1936-1937) and had contacts with the Third Reich until his death in 1944, but his "Greenshirt" party was defunct by the end of 1937. The actual flag the Greenshirts used is currently unknown, although one undocumented source indicates they simply used the traditional Saint Patrick's Cross/Saltire Flag.</span></font></p><font data-dcnode-id="7287" face="Arial"><span data-dcnode-id="7293" instrument_node="">
</span><p data-dcnode-id="7290"><font data-dcnode-id="7291" face="Arial"><span data-dcnode-id="7292" instrument_node="">The Blueshirts´ flag, later also used briefly by the Fine Gael Party, was charged with the red saltire of St. Patrick on a field of light sky blue, the same color as used on the Blueshirts´ uniforms.  Contemporary black and white photos clearly show flags with dark saltire on a light field that match their shirts, which were worn with dark ties, trousers and caps. The surviving Blueshirts' uniforms confirm the use of the light sky blue.</span></font></p><font data-dcnode-id="7288" face="Arial"><a data-dcnode-id="7289" name="anarchist"></a></font></font></font></td></tr><tr data-dcnode-id="7126"><td align="center" data-dcnode-id="7253" width="20%"><font data-dcnode-id="7254" face="Arial"><br data-dcnode-id="7280"><img alt="" border="1" data-dcnode-id="7279" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/de-afa-01.gif&amp;raw" width="216"><br data-dcnode-id="7278"><span data-dcnode-id="7277" instrument_node="">AFA Type #1</span><br data-dcnode-id="7276"><br data-dcnode-id="7275"><img alt="" border="1" data-dcnode-id="7274" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/de-afa-02.gif&amp;raw" width="216"><br data-dcnode-id="7273"><span data-dcnode-id="7272" instrument_node="">AFA Type #2</span><br data-dcnode-id="7271"><br data-dcnode-id="7270"><img alt="" border="1" data-dcnode-id="7269" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/de-afa-03.gif&amp;raw" width="216"><br data-dcnode-id="7268"><span data-dcnode-id="7267" instrument_node="">AFA Type #3</span><br data-dcnode-id="7266"><br data-dcnode-id="7265"><img alt="" border="1" data-dcnode-id="7264" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/de-afa-04.gif&amp;raw" width="216"><br data-dcnode-id="7263"><span data-dcnode-id="7262" instrument_node="">AFA Type #4</span><br data-dcnode-id="7261"><br data-dcnode-id="7260"><img alt="" border="1" data-dcnode-id="7259" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/de-afa-05.gif&amp;raw" width="216"><br data-dcnode-id="7258"><span data-dcnode-id="7257" instrument_node="">AFA Type #5</span><br data-dcnode-id="7256"><br data-dcnode-id="7255"></font></td><td data-dcnode-id="7128" valign="top" width="80%"><b data-dcnode-id="7245"><font data-dcnode-id="7246" face="Arial" size="+1"><span data-dcnode-id="7251" instrument_node="">Anti-Fascist Action (Germany)</span><br data-dcnode-id="7250"><small data-dcnode-id="7247"><i data-dcnode-id="7248"><span data-dcnode-id="7249" instrument_node="">Antifaschistische Aktion</span></i></small></font></b><span data-dcnode-id="7244" instrument_node="">
</span><p data-dcnode-id="7241"><font data-dcnode-id="7242" face="Arial"><span data-dcnode-id="7243" instrument_node="">Antifaschistische Aktion, an umbrella organization for militant anti-fascists in Germany, was formed in 1932. It was sometimes called "Antifa". Although it did not survive the war, local anti-fascist committees were formed across Germany, typically by veterans of this organization, as Nazi rule crumbled in 1944, under the name "Antifa".[1] These anti-fascist committees often included communists, social democrats, and progressive Christians.[2] </span></font></p><font data-dcnode-id="7129" face="Arial"><span data-dcnode-id="7240" instrument_node="">

</span><p data-dcnode-id="7204"><font data-dcnode-id="7205" face="Arial"><span data-dcnode-id="7206" instrument_node=""> The modern Germany movement most commonly associated with anti-fascism originated in the late 1980s, growing out of West Germany's squatter scene and autonomism movement.[5] This movement ultimately has its origins in the student-based Außerparlamentarische Opposition and the values associated with the new social movements. Unlike the 1930s Antifaschistische Aktion, which was linked to the Communist Party of Germany, concerned with industrial working-class politics against Hitler's NSDAP, the late 1980s and early 1990s "autonomists" were instead independent "anti-authoritarian" Libertarian Marxists and anarcho-communists, not associated with any particular party. 

It was after German reunification in 1990, that most of the Antifa groups were formed.</span></font></p><font data-dcnode-id="7130" face="Arial"><span data-dcnode-id="7203" instrument_node="">

</span><p data-dcnode-id="7134"><font data-dcnode-id="7135" face="Arial"><span data-dcnode-id="7136" instrument_node="">In the 2010s, self-described antifa groups have become increasingly active in Western Europe and North America. These loose collectives first arose in the early 2010s in response to growing nationalism in countries including the United States, United Kingdom, Denmark, Germany, and France.</span></font></p><font data-dcnode-id="7131" face="Arial"><span data-dcnode-id="7133" instrument_node="">
</span><p data-dcnode-id="7132"></p></font></font></font></td></tr><tr data-dcnode-id="7057"><td align="center" data-dcnode-id="7100" width="20%"><font data-dcnode-id="7101" face="Arial"><br data-dcnode-id="7123"><img alt="" border="1" data-dcnode-id="7122" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/al-legion.jpg&amp;raw" width="216"><br data-dcnode-id="7121"><span data-dcnode-id="7120" instrument_node="">Flag of the Legion</span><br data-dcnode-id="7119"><br data-dcnode-id="7118"><img alt="" border="1" data-dcnode-id="7117" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/al-old-homeland.jpg&amp;raw" width="216"><br data-dcnode-id="7116"><span data-dcnode-id="7115" instrument_node="">Flag of the Old Homeland</span><br data-dcnode-id="7114"><small data-dcnode-id="7112"><span data-dcnode-id="7113" instrument_node="">(Based on the flag used 1825-1950)</span></small><br data-dcnode-id="7111"><br data-dcnode-id="7110"><img alt="" border="1" data-dcnode-id="7109" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/al-new-homeland.jpg&amp;raw" width="216"><br data-dcnode-id="7108"><span data-dcnode-id="7107" instrument_node="">Flag of the New Homeland</span><br data-dcnode-id="7106"><small data-dcnode-id="7104"><span data-dcnode-id="7105" instrument_node="">(Based on the flag of October 1820)</span></small><br data-dcnode-id="7103"><br data-dcnode-id="7102"></font></td><td data-dcnode-id="7059" valign="top" width="80%"><b data-dcnode-id="7092"><font data-dcnode-id="7093" face="Arial" size="+1"><span data-dcnode-id="7098" instrument_node="">Legionary Action (Peru)</span><br data-dcnode-id="7097"><small data-dcnode-id="7094"><i data-dcnode-id="7095"><span data-dcnode-id="7096" instrument_node="">Acción Legionaria</span></i></small></font></b><span data-dcnode-id="7091" instrument_node="">
</span><p data-dcnode-id="7088"><font data-dcnode-id="7089" face="Arial"><span data-dcnode-id="7090" instrument_node="">Legionary Action, popularly referred to as "The Black Shirts," is a fascist political organization in Peru founded on January 5, 2013. They trace their beginnings back to 1931 and the founding of the Revolutionary Union, a Peruvian political party founded by Luis Miguel Sànchez Cerro, the Brigade General of the Army of Peru. After Cerro's death it was led by Luis Alberto Flores Medina who has continued to followed Cerro's political philosophy. The modern AL's leaders include Lucio Rovegno, the paramount chief and highest authority of the organization and Enzo Fernandez Ciotola, who is the National leader of the Section of Press and Propaganda of Legionary Action.</span></font></p><font data-dcnode-id="7060" face="Arial"><span data-dcnode-id="7087" instrument_node="">
</span><p data-dcnode-id="7084"><font data-dcnode-id="7085" face="Arial"><span data-dcnode-id="7086" instrument_node="">The AL is characterized by its opposition to liberalism and communism, and regards the current government as decadent and corrupt. Under the slogan "neither left nor right", they support "Peruvian fascism" (National Corporatism), which is a political, economic and social doctrine that seeks to "...rebuild the nationality through a social discipline and spiritual awareness, the harmonization of social classes and the corporate organization of the State." (i.e. a Fascist Dictatorship)</span></font></p><font data-dcnode-id="7061" face="Arial"><span data-dcnode-id="7083" instrument_node="">
</span><p data-dcnode-id="7077"><font data-dcnode-id="7078" face="Arial"><span data-dcnode-id="7082" instrument_node="">There seem to be three different flags used by the </span><i data-dcnode-id="7080"><span data-dcnode-id="7081" instrument_node="">Acción Legionaria</span></i><span data-dcnode-id="7079" instrument_node=""> at their public demonstrations:</span></font></p><font data-dcnode-id="7062" face="Arial"><span data-dcnode-id="7076" instrument_node="">
</span><p data-dcnode-id="7073"><font data-dcnode-id="7074" face="Arial"><span data-dcnode-id="7075" instrument_node="">The Flag of the Legion "...flies next to our national flag in all demonstrations or events... It is a symbol of strength and past glories."</span></font></p><font data-dcnode-id="7063" face="Arial"><span data-dcnode-id="7072" instrument_node="">
</span><p data-dcnode-id="7069"><font data-dcnode-id="7070" face="Arial"><span data-dcnode-id="7071" instrument_node="">The Flag of the Old Homeland is used to honor the successful overthrow of the Spanish in 1821 by José de San Martín and "...our heroes, Grau, Bolognesi, Quiñones, Cáceres."</span></font></p><font data-dcnode-id="7064" face="Arial"><span data-dcnode-id="7068" instrument_node="">
</span><p data-dcnode-id="7065"><font data-dcnode-id="7066" face="Arial"><span data-dcnode-id="7067" instrument_node="">The Flag of the New Homeland is based on the flag used by the Peruvian people after 1824 when they formed an independent constitutional monarchy.</span></font></p></font></font></font></font></font></td></tr><tr data-dcnode-id="7009"><td align="center" data-dcnode-id="7042" width="20%"><font data-dcnode-id="7043" face="Arial"><br data-dcnode-id="7054"><img alt="Image by Pete Loeser" border="1" data-dcnode-id="7053" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/de-afd2a.gif&amp;raw" width="145"><br data-dcnode-id="7052"><span data-dcnode-id="7051" instrument_node="">AfD Banner</span><br data-dcnode-id="7050"><br data-dcnode-id="7049"><img alt="Image by Pete Loeser" border="1" data-dcnode-id="7048" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/de-afd3.gif&amp;raw" width="216"><br data-dcnode-id="7047"><span data-dcnode-id="7046" instrument_node="">AfD Flag</span><br data-dcnode-id="7045"><br data-dcnode-id="7044"></font></td><td data-dcnode-id="7010" valign="top" width="80%"><b data-dcnode-id="7035"><font data-dcnode-id="7036" face="Arial" size="+1"><span data-dcnode-id="7040" instrument_node="">Alternative for Germany</span><br data-dcnode-id="7039"><small data-dcnode-id="7037"><span data-dcnode-id="7038" instrument_node="">Alternative für Deutschland AfD</span></small></font></b><span data-dcnode-id="7034" instrument_node="">
</span><p data-dcnode-id="7028"><font data-dcnode-id="7029" face="Arial"><span data-dcnode-id="7033" instrument_node="">The Alternative for Germany (Alternative für Deutschland, AfD) is a right-wing political party in Germany, founded in February of 2013 by Bernd Lucke, Frauke Petry and Konrad Adam.  In the same year the AfD founded a youth organization called the "Young Alternative for Germany" (</span><i data-dcnode-id="7031"><span data-dcnode-id="7032" instrument_node="">Junge Alternative für Deutschland</span></i><span data-dcnode-id="7030" instrument_node=""> or JA), although not closely associating with its activities.  The AfD is added to these extremist pages as a good example of how a right-wing political movement can become associated with extremist views and policies.</span></font></p><font data-dcnode-id="7011" face="Arial"><span data-dcnode-id="7027" instrument_node="">
</span><p data-dcnode-id="7024"><font data-dcnode-id="7025" face="Arial"><span data-dcnode-id="7026" instrument_node="">The Afd began as a center-right conservative party of the middle class supporting a mild  Euroscepticism (opposition to the European Union), against Germany using the Euro currency, against any economic bail out for countries such as Greece, and were opposed gay marriage.  However the party soon became a magnet that attracted extremist, such as former members of National Democratic Party of Germany (NPD), and saw a shift to the extreme right with focus on issues such as anti-migration, Islam and strengthening ties to Russia. In May of 2015, Lucke and his followers left to found a new party, the Alliance for Progress and Renewal, citing the rise of xenophobic and pro-Russian sentiments in the party as the reason. After months of factional infighting Frauke Petry became the principal speaker. </span></font></p><font data-dcnode-id="7012" face="Arial"><span data-dcnode-id="7023" instrument_node="">
</span><p data-dcnode-id="7020"><font data-dcnode-id="7021" face="Arial"><span data-dcnode-id="7022" instrument_node="">In 2016, Petry suggested several times in public shooting refugees at the borders to Germany and the AfD has since adopted a policy platform based upon opposition to Islam, calling for the ban of all Islamic symbols including burkhas, minarets and the call to prayer, using the slogan "Islam is not a part of Germany". Other party leadership has been guity of posting anti-Semitic comments on Facebook, and has been closely associated with PEGIDA (Patriotic Europeans Against the Islamisation of the West).  The AfD's voiced desire to break with consensus-based politics and opposion to using politically correct terminology (claiming it undermines freedom of speech), does make it seem like much of the party has become a mouthpiece for right-wing populism in Germany.</span></font></p><font data-dcnode-id="7013" face="Arial"><span data-dcnode-id="7019" instrument_node="">
</span><p data-dcnode-id="7016"><font data-dcnode-id="7017" face="Arial"><span data-dcnode-id="7018" instrument_node="">In March of 2016, a NSDAP-style banner was displayed by the party in Magdeburg, and although unofficial, it has not helped the AfD's overall image.  Their blue and white official Party Flag does appear far less extremist in nature.</span></font></p><font data-dcnode-id="7014" face="Arial"><span data-dcnode-id="7015" instrument_node="">
</span></font></font></font></font></td></tr><tr data-dcnode-id="6980"><td align="center" data-dcnode-id="6999" width="20%"><font data-dcnode-id="7000" face="Arial"><br data-dcnode-id="7006"><img align="MIDDLE" alt="Image by Tomislav Todorovic" border="0" data-dcnode-id="7005" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/am-front.gif&amp;raw" width="216"><br data-dcnode-id="7004"><span data-dcnode-id="7003" instrument_node="">AF  Flag</span><br data-dcnode-id="7002"><br data-dcnode-id="7001"></font></td><td data-dcnode-id="6982" valign="top" width="80%"><b data-dcnode-id="6995"><font data-dcnode-id="6996" face="Arial" size="+1"><span data-dcnode-id="6997" instrument_node="">American Front (USA)</span></font></b><span data-dcnode-id="6994" instrument_node="">
</span><p data-dcnode-id="6988"><font data-dcnode-id="6989" face="Arial"><span data-dcnode-id="6993" instrument_node="">American Front was founded in San Francisco, California in 1984, which now makes it one of the longest continuously running white supremacist groups in the USA.  Its founder was Bob Heick who loosely modeled the AF after the </span><a data-dcnode-id="6991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/hate2.html%23bnf"><span data-dcnode-id="6992" instrument_node="">British National Front</span></a><span data-dcnode-id="6990" instrument_node="">.  Beside California, it has been active mainly in Oregon and Florida. </span></font></p><font data-dcnode-id="6983" face="Arial"><span data-dcnode-id="6987" instrument_node="">
</span><p data-dcnode-id="6984"><font data-dcnode-id="6985" face="Arial"><span data-dcnode-id="6986" instrument_node="">Its logo is a combination of Celtic cross and monogram AF, the latter often highlighted by using a different color (white over a gray Celtic cross, all on black field),  but may also be conjoined into a single shape, which is how it is depicted on the flag, in light gray (perhaps meant to represent silver) on black field. </span></font></p></font></td></tr><tr data-dcnode-id="6699"><td align="center" data-dcnode-id="6916" width="20%"><font data-dcnode-id="6917" face="Arial"><span data-dcnode-id="6977" instrument_node="">

</span><p data-dcnode-id="6908"><font data-dcnode-id="6909" face="Arial"><span data-dcnode-id="6910" instrument_node="">There are probably as many different kinds of Anarchist Movements as there are different ideologies or traditions in most normal societies. The term "anarchism" is basically used by people who want to abolish the government, abolish capitalism, abolish violence, abolish technology, abolish large-scale production, or abolish as existing society as whole. They seek to overturn, by violence if necessary, all constituted forms and institutions of society and government, with no plans for establishing any other system of order in the place of that destroyed. Basically, an anarchist is a person who promotes disorder or revolt against any established rule, law, or custom.</span></font></p><font data-dcnode-id="6702" face="Arial"><span data-dcnode-id="6907" instrument_node="">

></tr></tbody></table><span data-dcnode-id="6711" instrument_node="">
</span><p data-dcnode-id="6708"><font data-dcnode-id="6709" face="Arial"><span data-dcnode-id="6710" instrument_node="">These flags are examples of hundreds of flags used by a wide variety of Anarchist movements world-wide. The generic ones can be found with a large variety of defacements, usually with white lettering, messages, or emblems.</span></font></p><font data-dcnode-id="6703" face="Arial"><span data-dcnode-id="6707" instrument_node="">
</span><p data-dcnode-id="6704"><font data-dcnode-id="6705" face="Arial"><span data-dcnode-id="6706" instrument_node="">The flag of the Youth International Party (late 1960s-early 1970s) is an especially interesting combination: black field for anarchy, red star of socialism, and green Marijuana leaves. Not surprising since the party leaders were Abby Hoffman and Jerry Rubin.</span></font></p></font></font></td></tr><tr data-dcnode-id="6612"><td align="center" data-dcnode-id="6680" width="20%"><font data-dcnode-id="6690" face="Arial,Helvetica,sans-serif"><br data-dcnode-id="6696"><img alt="Image by Tomislav Todorovic" border="0" data-dcnode-id="6695" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/anarcho-feminists1.gif&amp;raw" width="216"><br data-dcnode-id="6694"><span data-dcnode-id="6693" instrument_node="">Anarcho-Feminists Flag</span><br data-dcnode-id="6692"><span data-dcnode-id="6691" instrument_node="">Type #1</span></font><br data-dcnode-id="6689"><br data-dcnode-id="6688"><img alt="Image by Tomislav Todorovic" border="0" data-dcnode-id="6687" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/anarcho-feminists2.gif&amp;raw" width="216"><br data-dcnode-id="6686"><span data-dcnode-id="6685" instrument_node="">Anarcho-Feminists Flag Type #2</span><br data-dcnode-id="6684"><span data-dcnode-id="6683" instrument_node="">(possibly flown upside down)</span><br data-dcnode-id="6682"><br data-dcnode-id="6681"></td><td data-dcnode-id="6614" valign="top" width="80%"><b data-dcnode-id="6676"><font data-dcnode-id="6677" face="Arial" size="+1"><span data-dcnode-id="6678" instrument_node="">Anarcho-Feminists Flags (worldwide)</span></font></b><span data-dcnode-id="6675" instrument_node="">
</span><p data-dcnode-id="6669"><font data-dcnode-id="6670" face="Arial"><span data-dcnode-id="6674" instrument_node="">The Anarcho-Feminism movement (</span><em data-dcnode-id="6672"><span data-dcnode-id="6673" instrument_node="">Anarcha-feminism</span></em><span data-dcnode-id="6671" instrument_node="">, anarchist feminism) basically combines anarchism with feminism. It views all "male dominated" society (patriarchies) as an "involuntary and coercive hierarchy" that should be replaced by "decentralized free association." Anarcho-feminists believe that the struggle against patriarchy is an essential part of class struggle and the state.</span></font></p><font data-dcnode-id="6615" face="Arial"><span data-dcnode-id="6668" instrument_node="">

</span><p data-dcnode-id="6618"><font data-dcnode-id="6619" face="Arial"><span data-dcnode-id="6623" instrument_node="">Because of the very nature of Anarchism itself, we included the Anarcho-Feminist's flag here, but there has been few documented examples of any violence associated with this movement. </span><u data-dcnode-id="6621"><span data-dcnode-id="6622" instrument_node="">Note</span></u><span data-dcnode-id="6620" instrument_node="">: The possibility exists that these are not four distinct variants, but the same design displayed differently.</span></font></p><font data-dcnode-id="6616" face="Arial"><a data-dcnode-id="6617" name="ma"></a></font></font></td></tr><tr data-dcnode-id="6531"><td align="center" data-dcnode-id="6586" width="20%"><font data-dcnode-id="6587" face="Arial"><br data-dcnode-id="6609"><img align="MIDDLE" alt="Image from Pete Loeser" border="0" data-dcnode-id="6608" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/ma-3.gif&amp;raw" width="216"><br data-dcnode-id="6607"><span data-dcnode-id="6606" instrument_node="">Market Anarchist Flag</span><br data-dcnode-id="6605"><span data-dcnode-id="6604" instrument_node="">("Black &amp; Gold" Flag)</span><br data-dcnode-id="6603"><br data-dcnode-id="6602"><img align="MIDDLE" alt="Image from Pete Loeser" border="0" data-dcnode-id="6601" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/ma-2.gif&amp;raw" width="216"><br data-dcnode-id="6600"><span data-dcnode-id="6599" instrument_node="">Anarcho-Capitalist Flag</span><br data-dcnode-id="6598"><span data-dcnode-id="6597" instrument_node="">("Rattlesnake" Flag)</span><br data-dcnode-id="6596"><br data-dcnode-id="6595"><img alt="Image by Tomislav Todorovic" border="0" data-dcnode-id="6594" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/ma-5.gif&amp;raw" width="216"><br data-dcnode-id="6593"><span data-dcnode-id="6592" instrument_node="">Anarcho-Capitalist Flag</span><br data-dcnode-id="6591"><span data-dcnode-id="6590" instrument_node="">("A over C" variant)</span><br data-dcnode-id="6589"><br data-dcnode-id="6588"></font></td><td data-dcnode-id="6533" valign="top" width="80%"><b data-dcnode-id="6582"><font data-dcnode-id="6583" face="Arial" size="+1"><span data-dcnode-id="6584" instrument_node="">Anarcho-Capitalists/Market Anarchists (worldwide)</span></font></b><span data-dcnode-id="6581" instrument_node="">
</span><p data-dcnode-id="6578"><font data-dcnode-id="6579" face="Arial"><span data-dcnode-id="6580" instrument_node="">Anarcho-capitalism (also known as Free-Market Anarchism, Market Anarchism, Anarcho-Syndicalism, Private-Property Anarchism, and a host of other names) basically wants some sort of stateless society, where an economic system based on uncontrolled market interactions exist without regulation. Within these divergent groups there are a multitude of views on property and labor relations that differ significantly, and while many consider themselves simply anti-capitalists and oppose private ownership of the means of production, others stress the necessity of protecting private property, describing this as an integral component of individual rights and a free market economy. In short, there seems to be little agreement among the groups about what happens when government ceases to exist, nor the means of accomplishing it.</span></font></p><font data-dcnode-id="6534" face="Arial"><span data-dcnode-id="6577" instrument_node="">

</span><p data-dcnode-id="6541"><font data-dcnode-id="6542" face="Arial"><span data-dcnode-id="6543" instrument_node="">In the United States combining the Market Anarchist Flag with the Gadsden Flag favored by the Tea Party seems to have caught on, although no connection between the two groups is apparent, and many variant designs exist. The Market Anarchist flag is also known as the "Black &amp; Gold" or "Black &amp; Yellow" flag, with the black representing Anarchy and the yellow/gold representing physical gold itself.</span></font></p><font data-dcnode-id="6535" face="Arial"><span data-dcnode-id="6540" instrument_node="">
</span><p data-dcnode-id="6536"><font data-dcnode-id="6537" face="Arial"><span data-dcnode-id="6539" instrument_node="">Another Anarcho-Capitalist flag to gain popularity in recent years is black, and charged with the golden letters A over C in the center. The symbol is clearly derived from Anarchist symbol of the encircled A.</span><a data-dcnode-id="6538" name="fr-afa"></a></font></p></font></font></td></tr><tr data-dcnode-id="6396"><td align="center" data-dcnode-id="6504" width="20%"><font data-dcnode-id="6505" face="Arial"><br data-dcnode-id="6528"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="6527" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/fr_antif.gif&amp;raw" width="216"><br data-dcnode-id="6526"><i data-dcnode-id="6524"><span data-dcnode-id="6525" instrument_node="">Antifas</span></i><span data-dcnode-id="6523" instrument_node=""> Flag, Type #1</span><br data-dcnode-id="6522"><br data-dcnode-id="6521"><br data-dcnode-id="6520"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="6519" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/fr_antif_2.gif&amp;raw" width="216"><br data-dcnode-id="6518"><i data-dcnode-id="6516"><span data-dcnode-id="6517" instrument_node="">Antifas</span></i><span data-dcnode-id="6515" instrument_node=""> Flag, Type #2</span><br data-dcnode-id="6514"><br data-dcnode-id="6513"><br data-dcnode-id="6512"><img alt="Image by Tomislav Todorovic" border="1" data-dcnode-id="6511" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loeser.us/flags/images/hate/fr_antif_3.gif&amp;raw" width="216"><br data-dcnode-id="6510"><i data-dcnode-id="6508"><span data-dcnode-id="6509" instrument_node="">Antifas</span></i><span data-dcnode-id="6507" instrument_node=""> Flag, Type #3</span><br data-dcnode-id="6506"></font></td><td data-dcnode-id="6398" valign="top" width="80%"><b data-dcnode-id="6496"><font data-dcnode-id="6497" face="Arial" size="+1"><span data-dcnode-id="6502" instrument_node="">Anti-Fascist Action (France)</span><br data-dcnode-id="6501"><small data-dcnode-id="6498"><i data-dcnode-id="6499"><span data-dcnode-id="6500" instrument_node="">Action antifasciste</span></i></small></font></b><span data-dcnode-id="6495" instrument_node="">
</span><p data-dcnode-id="6480"><font data-dcnode-id="6481" face="Arial"><span data-dcnode-id="6494" instrument_node=""> The Anti-Fascist Action (</span><i data-dcnode-id="6492"><span data-dcnode-id="6493" instrument_node="">Action antifasciste</span></i><span data-dcnode-id="6491" instrument_node="">), founded in 2008, is a network of French autonomous (extreme-leftist) antifascist groups. These groups and their members are known as </span><i data-dcnode-id="6489"><span data-dcnode-id="6490" instrument_node="">antifas</span></i><span data-dcnode-id="6488" instrument_node="">. The French </span><i data-dcnode-id="6486"><span data-dcnode-id="6487" instrument_node="">antifas</span></i><span data-dcnode-id="6485" instrument_node=""> are "affiliated" to an informal group of similar movements that emerged all over Europe (Denmark,  Netherlands, Sweden, Czech Republic, Slovakia, Spain etc.) in the 1990s. They are based on the German Communist </span><i data-dcnode-id="6483"><span data-dcnode-id="6484" instrument_node="">Antifaschistiche Aktion</span></i><span data-dcnode-id="6482" instrument_node=""> movement of the 1930s which was crushed by the Nazis after they got into power in 1933. Their main goal is to get rid extreme-rightist and neo-Nazi movements, stopping at nothing, including street violence and illegal acts.</span></font></p><font data-dcnode-id="6399" face="Arial"><span data-dcnode-id="6479" instrument_node="">
</span><p data-dcnode-id="6467"><font data-dcnode-id="6468" face="Arial"><span data-dcnode-id="6478" instrument_node="">The main flag of </span><i data-dcnode-id="6476"><span data-dcnode-id="6477" instrument_node="">Action antifasciste</span></i><span data-dcnode-id="6475" instrument_node=""> is red with the movement's logo, a red and a black flag placed on a white disk surrounded by a black ring charged with the name of the organization, written in white letters. The emblem is a modernization of the one used by the German </span><i data-dcnode-id="6473"><span data-dcnode-id="6474" instrument_node="">Antifaschstische Aktion</span></i><span data-dcnode-id="6472" instrument_node=""> in the 1930s, originally with two red flags and a red ring. The black color was added by the modern </span><i data-dcnode-id="6470"><span data-dcnode-id="6471" instrument_node="">antifa</span></i><span data-dcnode-id="6469" instrument_node=""> movements, symbolizing the union of Communists and Anarchists against Fascists. The flags with black field are also used, sometimes with the swapped places of two flags in the logo.</span></font></p><font data-dcnode-id="6400" face="Arial"><span data-dcnode-id="6466" instrument_node="">
</span><p data-dcnode-id="6465"></p><div align="center" data-dcnode-id="6423"><span data-dcnode-id="6464" instrument_node="">

</span><span data-dcnode-id="6451" instrument_node="">
