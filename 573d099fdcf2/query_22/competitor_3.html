</span><div class="padding-8-right author-byline" data-dcnode-id="1278"><span data-dcnode-id="1282" instrument_node="">
                    By 
                        </span><a class="bold author-name" data-dcnode-id="1280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//time.com/author/madeline-roache/"><span data-dcnode-id="1281" instrument_node="">

                </span></div><span data-dcnode-id="1274" instrument_node="">
</span></div><span data-dcnode-id="1272" instrument_node="">
</span></div><span data-dcnode-id="1270" instrument_node="">
</span><span data-dcnode-id="1268" instrument_node="">
</span><div class="article content body clearfix" data-dcnode-id="879" data-tracking-zone="body" id="article-body"><span data-dcnode-id="1267" instrument_node="">
</span><div class="padded" data-dcnode-id="881"><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1256"><span class="dropcap" data-dcnode-id="1264" role="presentation"><span data-dcnode-id="1265" instrument_node="">W</span></span><span data-dcnode-id="1263" instrument_node="">hen the U.S., Canada and 10 western European nations </span><a data-dcnode-id="1261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natohq/topics_111767.htm" target="_blank"><span data-dcnode-id="1262" instrument_node="">came together</span></a><span data-dcnode-id="1260" instrument_node=""> in 1949 to form the North Atlantic Treaty Organization, they had a clear goal. “Keep the Soviet Union out, the Americans in, and the Germans down,” </span><a data-dcnode-id="1258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natohq/declassified_137930.htm" target="_blank"><span data-dcnode-id="1259" instrument_node="">said</span></a><span data-dcnode-id="1257" instrument_node=""> Lord Hastings Lionel Ismay, NATO’s first Secretary General. The military alliance was intended to rebuild Europe from the rubble of World War II and to act as a buffer against Soviet aggression. </span></p><span data-dcnode-id="1255" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250;320x480 instream-ad mobile-ad" data-dcnode-id="1253" data-dimensions="300x250;320x480" data-tgxlazy="200" data-tgxtargeting="%7B%7D" data-tgxupdatecorrelator="true" id="ad-300x250_320x480_LL_m_1" role="complementary"><span data-dcnode-id="1254" instrument_node="">
</span></div><span data-dcnode-id="1252" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-728x90;300x250 instream-ad type-728-flex tablet-ad desktop-ad x2" data-dcnode-id="1250" data-dimensions="728x90;300x250" data-tgxlazy="200" data-tgxtargeting="%7B%7D" id="ad-728x90_300x250_LL_td_1" role="complementary"><span data-dcnode-id="1251" instrument_node="">
</span></div><span data-dcnode-id="1249" instrument_node="">
</span><p data-dcnode-id="1244"><span data-dcnode-id="1248" instrument_node="">But the collapse of the Soviet Union made NATO’s purpose less clear. In fact, in 1990, as the Cold War drew to a close, President Mikhail Gorbachev proposed the Soviet Union join NATO. At the time, Gorbachev was negotiating German reunification with the then U.S. Secretary of State James Baker. “You say that NATO is not directed against us,” he </span><a data-dcnode-id="1246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foreignaffairs.com/articles/russia-fsu/2014-08-11/broken-promise" target="_blank"><span data-dcnode-id="1247" instrument_node="">said</span></a><span data-dcnode-id="1245" instrument_node="">, referring to the rival Warsaw Pact, an alliance between the Soviet Union and Communist countries in Eastern Europe, “that it is simply a security structure that is adapting to new realities. Therefore, we propose to join NATO.” </span></p><span data-dcnode-id="1243" instrument_node=""> </span><p data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">Baker reportedly dismissed the proposal as a “dream” but it has been floated several times since. Giving Russia membership would have required NATO, which turned 70 on Thursday, to fundamentally redefine itself. Nevertheless, in the three decades since the end of the Cold War and the collapse of the Soviet Union, NATO has had to find a new raison d’être.</span></p><span data-dcnode-id="1240" instrument_node=""> </span><p data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">As NATO foreign ministers met in Washington to mark the anniversary, they faced questions about its future. Here’s what to know about the relationship between Russia and NATO.</span></p><span data-dcnode-id="1237" instrument_node=""> </span><h2 data-dcnode-id="1234"><b data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">After the Cold War, what happened between Russia and NATO? </span></b></h2><span data-dcnode-id="1233" instrument_node=""> </span><p data-dcnode-id="1228"><span data-dcnode-id="1232" instrument_node="">In 1991 Boris Yeltsin, the first president of the new Russian state, </span><a data-dcnode-id="1230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/1991/12/21/world/soviet-disarray-yeltsin-says-russia-seeks-to-join-nato.html" target="_blank"><span data-dcnode-id="1231" instrument_node="">wrote</span></a><span data-dcnode-id="1229" instrument_node=""> to NATO, reiterating Gorbachev’s proposal. He echoed calls made by former Warsaw Pact countries like Hungary to join the Western alliance, and called NATO membership a “long-term political aim” of Russia. </span></p><span data-dcnode-id="1227" instrument_node=""> </span><p data-dcnode-id="1222"><span data-dcnode-id="1226" instrument_node="">After the collapse of the Soviet Union though, NATO began to redefine its purpose. Vesko Garcevic, a former Montenegro ambassador to NATO, says the new mission became to ensure the democratization of newly post-communist republics, which the alliance considered crucial to guaranteeing a stable Europe. After joining NATO, most of the countries then became E.U. members</span><b data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">. </span></b><span data-dcnode-id="1223" instrument_node="">“It was no longer not just about security. It was also political. That’s why the alliance has survived for so many years,” he says. </span></p><span data-dcnode-id="1221" instrument_node=""> </span><p data-dcnode-id="1216"><span data-dcnode-id="1220" instrument_node="">In 1994, Russia officially signed up to the NATO Partnership for Peace, a program aimed at building trust between NATO and other European and former Soviet countries. President Bill Clinton </span><a data-dcnode-id="1218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nsarchive2.gwu.edu//dc.html%3Fdoc%3D4390825-Document-11-The-President-s-Meeting-with-Czech" target="_blank"><span data-dcnode-id="1219" instrument_node="">described it in January 1994</span></a><span data-dcnode-id="1217" instrument_node=""> as a “track that will lead to NATO membership.” </span></p><span data-dcnode-id="1215" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250;320x480 instream-ad mobile-ad" data-dcnode-id="1213" data-dimensions="300x250;320x480" data-tgxlazy="200" data-tgxtargeting="%7B%7D" data-tgxupdatecorrelator="true" id="ad-300x250_320x480_LL_m_2" role="complementary"><span data-dcnode-id="1214" instrument_node="">
</span></div><span data-dcnode-id="1212" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-728x90;300x250 instream-ad type-728-flex tablet-ad desktop-ad x2" data-dcnode-id="1210" data-dimensions="728x90;300x250" data-tgxlazy="200" data-tgxtargeting="%7B%7D" id="ad-728x90_300x250_LL_td_2" role="complementary"><span data-dcnode-id="1211" instrument_node="">
</span></div><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1204"><span data-dcnode-id="1208" instrument_node="">Russian President Vladimir Putin told filmmaker Oliver Stone in a 2017 </span><a data-dcnode-id="1206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DGfRhd3VEt78" target="_blank"><span data-dcnode-id="1207" instrument_node="">interview</span></a><span data-dcnode-id="1205" instrument_node=""> that he discussed the option with Clinton during the American president’s visit to Moscow in 2000. And when then-Danish Prime Minister Anders Fogh Rasmussen met with Putin in the early 2000s, he says he got the impression Russia was pro-Western and open to joining the transatlantic alliance. </span></p><span data-dcnode-id="1203" instrument_node=""> </span><p data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">Since the end of the Cold War, 13 countries have joined NATO; the Czech Republic, Hungary and Poland (1999), Bulgaria, Estonia, Latvia, Lithuania, Romania, Slovakia and Slovenia (2004), Albania and Croatia (2009), and Montenegro (2017).</span></p><span data-dcnode-id="1200" instrument_node=""> </span><div class="component inline image margin-32-tb align-img align-center" data-dcnode-id="1176"><span data-dcnode-id="1199" instrument_node="">
</span><div class="image-wrapper" data-dcnode-id="1178"><span data-dcnode-id="1198" instrument_node="">
</span><div class="component lazy-image no-upscale rendered image-loaded" data-alt="" data-crop="" data-dcnode-id="1180" data-height="378" data-shop-image="false" data-src="https://api.time.com/wp-content/uploads/2019/04/putin-and-nato-russia-council-meeting.jpg" data-title="" data-width="800"><span data-dcnode-id="1197" instrument_node="">
</span><noscript data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">
                        &lt;div class="inner-container"&gt;
                          &lt;img src="https://api.time.com/wp-content/uploads/2019/04/putin-and-nato-russia-council-meeting.jpg" Russian President Vladimir Putin talks during a press conference after the NATO-Russia Council meeting at the Parliament in Bucharest, Romania, on April 4, 2008." Russian President Vladimir Putin talks during a press conference after the NATO-Russia Council meeting at the Parliament in Bucharest, Romania, on April 4, 2008."&gt;
                        &lt;/div&gt;
                      </span></noscript><span data-dcnode-id="1194" instrument_node="">
</span><div class="inner-container js-inner-container" data-dcnode-id="1182" style="max-width: 800px;"><img alt="" data-dcnode-id="1193" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//api.time.com/wp-content/uploads/2019/04/putin-and-nato-russia-council-meeting.jpg%3Fw%3D800%26quality%3D85&amp;raw" style="width: 800px;" title=""><span data-dcnode-id="1192" instrument_node="">
</span><div class="image-wrap-container clearfix" data-dcnode-id="1184"><span data-dcnode-id="1191" instrument_node="">
</span><div class="credit body-caption padding-8-top" data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">Russian President Vladimir Putin talks during a press conference after the NATO-Russia Council meeting at the Parliament in Bucharest, Romania, on April 4, 2008.</span></div><span data-dcnode-id="1188" instrument_node="">
</span><div class="credit body-credit padding-8-top padding-8-bottom" data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">Natalia Kolesnikov - AFP/Getty Images</span></div><span data-dcnode-id="1185" instrument_node="">
</span></div><span data-dcnode-id="1183" instrument_node="">
</span></div><span data-dcnode-id="1181" instrument_node="">
</span></div><span data-dcnode-id="1179" instrument_node=""> </span></div><span data-dcnode-id="1177" instrument_node="">
</span></div><span data-dcnode-id="1175" instrument_node=""> </span><h2 data-dcnode-id="1172"><b data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">So why isn’t Russia a member of NATO?</span></b></h2><span data-dcnode-id="1171" instrument_node=""> </span><p data-dcnode-id="1166"><span data-dcnode-id="1170" instrument_node="">Despite Russia signaling its interest to join NATO, there has since been a lot of tension between them. “Once Russia can show it is upholding democracy and human rights, NATO can seriously consider its membership,”says Rasmussen, the former Danish Prime Minister who served as NATO Secretary General from 2009 to 2014. In the meantime, he adds “we tried to build strong cooperation with Moscow.” He cites the </span><a data-dcnode-id="1168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/nrc-website/en/about/index.html" target="_blank"><span data-dcnode-id="1169" instrument_node="">2002 Russia-NATO council</span></a><span data-dcnode-id="1167" instrument_node="">, a development of the 1997 Act, which serves as a mechanism for cooperation, consensus building and joint-decision making. “We do share common interests. We cooperated on counter terrorism in Afghanistan, counter narcotics and counter piracy,” says Rasmussen. </span></p><span data-dcnode-id="1165" instrument_node=""> </span><p data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">But Russia has repeatedly made a request that NATO has rejected: to refuse to accept new members in its “backyard” (or neighboring countries), says Rasmussen. “It wasn’t for the West or Moscow to decide whether those countries should join NATO. Each and every country has the right to decide its alliance and affiliation,” says the former NATO ambassador Garcevic.</span></p><span data-dcnode-id="1162" instrument_node=""> </span><p data-dcnode-id="1158"><span data-dcnode-id="1161" instrument_node="">By 1999, when it became clear that NATO and Russia had irreconcilable views over the future of the post-Soviet republics, the alliance “turned into a security challenge” for the Kremlin, according to Garcevic. It was a “critical turning point,”he says, noting that Russia started to become more anti-Western. As the years went on, nostalgia for the Soviet Union became more apparent. In 2005, Putin famously said the breakup of the Soviet Union </span><a data-dcnode-id="1159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.apnews.com/d36b368c6ad44bb2b8e883fc8d800514" target="_blank"><span data-dcnode-id="1160" instrument_node="">“was the greatest geopolitical catastrophe of the century.”</span></a></p><span data-dcnode-id="1157" instrument_node=""> </span><p data-dcnode-id="1152"><span data-dcnode-id="1156" instrument_node="">Eventually, actions rather than words made it clear that Russia saw NATO as an adversary. In April 2008, NATO </span><a data-dcnode-id="1154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/article/us-nato/nato-promises-ukraine-georgia-entry-one-day-idUSL0179714620080403" target="_blank"><span data-dcnode-id="1155" instrument_node="">promised membership</span></a><span data-dcnode-id="1153" instrument_node=""> to Georgia and Ukraine at the Bucharest summit, but a membership plan was not offered. In August 2008, Russia launched a five day invasion of Georgia on the pretext of defending the breakaway regions of South Ossetia and Abkhazia.  Eight hundred people were killed. South Ossetia and Abkhazia later declared their independence; Russia is one of the few countries in the world to recognize this. </span></p><span data-dcnode-id="1151" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250;320x480 instream-ad mobile-ad" data-dcnode-id="1149" data-dimensions="300x250;320x480" data-tgxlazy="200" data-tgxtargeting="%7B%7D" data-tgxupdatecorrelator="true" id="ad-300x250_320x480_LL_m_3" role="complementary"><span data-dcnode-id="1150" instrument_node="">
</span></div><span data-dcnode-id="1148" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-728x90;300x250 instream-ad type-728-flex tablet-ad desktop-ad x2" data-dcnode-id="1146" data-dimensions="728x90;300x250" data-tgxlazy="200" data-tgxtargeting="%7B%7D" id="ad-728x90_300x250_LL_td_3" role="complementary"><span data-dcnode-id="1147" instrument_node="">
</span></div><span data-dcnode-id="1145" instrument_node="">
</span><p data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">“We sent the wrong signal from Bucharest,” says Rasmussen, who believes an action plan for Georgia’s membership could have deterred the invasion. “Putin interpreted our actions as a lack of resolve and a lack of will to act if he tested that resolve.” </span></p><span data-dcnode-id="1142" instrument_node=""> </span><p data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Putin continued to test it. In 2014, he sent Russian troops to annex Crimea from Ukraine and sparked the ongoing conflict in the country’s east that has killed more than 13,000 people.</span></p><span data-dcnode-id="1139" instrument_node=""> </span><p data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">Former Kremlin adviser Sergei Karaganov tells TIME that history could have looked different. Not allowing Russia to join NATO was “one of the worst mistakes in political history,” says Karaganov. “It automatically put Russia and the West on a collision course, eventually sacrificing Ukraine.”</span></p><span data-dcnode-id="1136" instrument_node=""> </span><h2 data-dcnode-id="1133"><b data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">How does Russia feel about NATO today?</span></b></h2><span data-dcnode-id="1132" instrument_node=""> </span><p data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">Tensions skyrocketed between NATO and Russia after the 2014 annexation. “Now, countries bordering Russia, including the Baltics, are really fearful,” Karaganov says. If they had not joined NATO and stayed “neutral” they would have been “much more comfortable.”</span></p><span data-dcnode-id="1129" instrument_node=""> </span><p data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">Since 2014, Russia and NATO’s relations have reverted back to their Cold War hostility. But today the threat Russia poses is much more complex, says Rasmussen, the ex-NATO Secretary General. The security environment has transformed from a “predictable, bipolar confrontation” to a “multilayered, non-transparent picture of threats and challenges.” </span></p><span data-dcnode-id="1126" instrument_node=""> </span><p data-dcnode-id="1115"><span data-dcnode-id="1125" instrument_node="">In his view, Russia has become a “geopolitical spoiler” that seeks to undermine trust, confidence and stability in democratic society. </span><a data-dcnode-id="1123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/news/world-europe-45470460" target="_blank"><span data-dcnode-id="1124" instrument_node="">Russia’s war games </span></a><span data-dcnode-id="1122" instrument_node="">and regular military exercises have struck fear in its neighbors, including Poland and the Baltics. Even countries that are geographically far from Russia, such as the Balkans, fear Russia’s subtler methods of destabilization including </span><a data-dcnode-id="1120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//af.reuters.com/article/worldNews/idAFKCN1PU1OD" target="_blank"><span data-dcnode-id="1121" instrument_node="">disinformation</span></a><span data-dcnode-id="1119" instrument_node=""> and </span><a data-dcnode-id="1117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.eu/specials/scorecard/the_nightmare_of_the_dark_the_security_fears_that_keep_europeans_awake_at_n" target="_blank"><span data-dcnode-id="1118" instrument_node="">cyber warfare</span></a><span data-dcnode-id="1116" instrument_node="">.</span></p><span data-dcnode-id="1114" instrument_node=""> </span><p data-dcnode-id="1106"><span data-dcnode-id="1113" instrument_node="">Today, there is “no way” Moscow could join NATO, says Rasmussen, nor does Russia have any interest in joining an alliance that it perceives as a threat. In Putin’s </span><a data-dcnode-id="1111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.kremlin.ru/events/president/news/20603" target="_blank"><span data-dcnode-id="1112" instrument_node="">address</span></a><span data-dcnode-id="1110" instrument_node=""> to the Russian Parliament shortly after the Crimea annexation, he said Russia was humiliated by NATO’s expansion eastward after the fall of Communism. “They lied to us many times, made decisions behind our backs.” The Russian president has repeatedly </span><a data-dcnode-id="1108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uk.reuters.com/article/uk-russia-nato-putin/putin-warns-nato-against-closer-ties-with-ukraine-and-georgia-idUKKBN1K92K0" target="_blank"><span data-dcnode-id="1109" instrument_node="">warned </span></a><span data-dcnode-id="1107" instrument_node="">NATO against forging closer ties with Ukraine and Georgia, saying it was “irresponsible” and would have consequences for the alliance, which he did not specify.</span></p><span data-dcnode-id="1105" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250;320x480 instream-ad mobile-ad" data-dcnode-id="1103" data-dimensions="300x250;320x480" data-tgxlazy="200" data-tgxtargeting="%7B%7D" data-tgxupdatecorrelator="true" id="ad-300x250_320x480_LL_m_4" role="complementary"><span data-dcnode-id="1104" instrument_node="">
</span></div><span data-dcnode-id="1102" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-728x90;300x250 instream-ad type-728-flex tablet-ad desktop-ad x2" data-dcnode-id="1100" data-dimensions="728x90;300x250" data-tgxlazy="200" data-tgxtargeting="%7B%7D" id="ad-728x90_300x250_LL_td_4" role="complementary"><span data-dcnode-id="1101" instrument_node="">
</span></div><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">In theory, NATO’s door “remains open to any European country” that meets membership requirements. However, former Montenegro ambassador to NATO, Garcevic believes the reality is constrained by fear over a resurgent Russian threat. “I can’t see further NATO enlargement happening in the near future. European countries are very cautious about Russia’s reaction.”</span></p><span data-dcnode-id="1096" instrument_node=""> </span><div class="component inline image margin-32-tb align-img align-center" data-dcnode-id="1072"><span data-dcnode-id="1095" instrument_node="">

</span><div class="inner-container js-inner-container" data-dcnode-id="1078" style="max-width: 800px;"><img alt="" data-dcnode-id="1089" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//api.time.com/wp-content/uploads/2019/04/stoltenburg.jpg%3Fw%3D800%26quality%3D85&amp;raw" style="width: 800px;" title=""><span data-dcnode-id="1088" instrument_node="">

</span><div class="credit body-credit padding-8-top padding-8-bottom" data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">Picture Alliance - Picture Alliance via Getty Images</span></div><span data-dcnode-id="1081" instrument_node="">

</span></div><span data-dcnode-id="1071" instrument_node=""> </span><h2 data-dcnode-id="1068"><b data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Is NATO still effective in 2019?</span></b></h2><span data-dcnode-id="1067" instrument_node=""> </span><p data-dcnode-id="1056"><span data-dcnode-id="1066" instrument_node="">Rasmussen insists that “NATO has never been more needed.” And NATO members have shown some strategic unity in countering the Russian threat. Since 2014, the alliance has said “</span><a data-dcnode-id="1064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/docu/review/2019/Also-in-2019/nato-ready-for-anything-military-force/EN/index.htm" target="_blank"><span data-dcnode-id="1065" instrument_node="">readiness</span></a><span data-dcnode-id="1063" instrument_node="">” has been at the top of its agenda, which has led to security reinforcements of some </span><a data-dcnode-id="1061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/news/checkpoint/wp/2016/05/02/nato-considering-thousands-of-troops-near-russias-eastern-border/%3Fpostshare%3D9821462275499186%26tid%3Dss_fb" target="_blank"><span data-dcnode-id="1062" instrument_node="">4,000 additional troops</span></a><span data-dcnode-id="1060" instrument_node=""> on its eastern flank. Gustav Gressel, a Senior Policy Adviser at the European Council on Foreign Relations, </span><a data-dcnode-id="1058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecfr.eu/article/commentary_after_crimea_does_nato_have_the_means_to_defend_europe" target="_blank"><span data-dcnode-id="1059" instrument_node="">said</span></a><span data-dcnode-id="1057" instrument_node=""> these measures amount to reassurance, not deterrence. NATO members have unanimously refused to recognise the annexation of Crimea, and all have maintained economic sanctions despite regular criticism over the measures by Austria, Italy, Hungary and other member states. “But sanctions alone do not reflect a united strategy on dealing with Russia,” Gressel said. </span></p><span data-dcnode-id="1055" instrument_node=""> </span><p data-dcnode-id="1050"><span data-dcnode-id="1054" instrument_node="">NATO has not really risen to the Russian challenge, others agree. “We haven’t done enough,” Rasmussen says. Only a few NATO nations dared to militarily support the Ukrainian armed forces. Those that have, including the U.S., Canada, Poland, Slovakia, the Baltics and the U.K. have done so on a voluntary basis, and not as part of a NATO initiative. Hungary has </span><a data-dcnode-id="1052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/article/us-usa-russia-hungary/u-s-urges-hungary-not-to-block-ukraines-nato-engagement-idUSKBN1OC1KB" target="_blank"><span data-dcnode-id="1053" instrument_node="">blocked</span></a><span data-dcnode-id="1051" instrument_node=""> greater institutional relations between NATO and Ukraine. </span></p><span data-dcnode-id="1049" instrument_node=""> </span><p data-dcnode-id="1044"><span data-dcnode-id="1048" instrument_node="">After Russia annexed Crimea, Rasmussen says he was surprised at how some of the bigger European countries, including Germany and France “were very careful not to admit what was happening.” Since NATO can only act with a consensus from all its members, the alliance ultimately could not take action. Rasmussen believes Germany’s hesitation was connected to a “historical gratitude” for Russia </span><a data-dcnode-id="1046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//carnegie.ru/2018/06/06/russia-and-germany-from-estranged-partners-to-good-neighbors-pub-76540" target="_blank"><span data-dcnode-id="1047" instrument_node="">accepting its reunification</span></a><span data-dcnode-id="1045" instrument_node=""> in 1990, while France thinks “Russia’s interests should be respected because it is a big country.” In the U.K., he considers there is a more “realistic attitude” about the Kremlin’s geopolitical ambitions. “The U.S. and Europe need to take firm stance because the only language Putin understands is the language of power,” says Rasmussen. </span></p><span data-dcnode-id="1043" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250;320x480 instream-ad mobile-ad" data-dcnode-id="1041" data-dimensions="300x250;320x480" data-tgxlazy="200" data-tgxtargeting="%7B%7D" data-tgxupdatecorrelator="true" id="ad-300x250_320x480_LL_m_5" role="complementary"><span data-dcnode-id="1042" instrument_node="">
</span></div><span data-dcnode-id="1040" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-728x90;300x250 instream-ad type-728-flex tablet-ad desktop-ad x2" data-dcnode-id="1038" data-dimensions="728x90;300x250" data-tgxlazy="200" data-tgxtargeting="%7B%7D" id="ad-728x90_300x250_LL_td_5" role="complementary"><span data-dcnode-id="1039" instrument_node="">
</span></div><span data-dcnode-id="1037" instrument_node="">
</span><p data-dcnode-id="1029"><span data-dcnode-id="1036" instrument_node="">But for the first time in NATO’s history, a U.S. president has questioned the validity of the security alliance. Donald Trump has questioned Washington’s commitment to NATO, calling it </span><a data-dcnode-id="1034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2018/07/10/world/europe/trump-nato-summit-latvia-baltics.html" target="_blank"><span data-dcnode-id="1035" instrument_node="">“obsolete”</span></a><span data-dcnode-id="1033" instrument_node=""> and has suggested the alliance is a </span><a data-dcnode-id="1031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnbc.com/2018/07/11/trumps-nato-criticism-is-valid-europe-isnt-spending-enough-on-def.html" target="_blank"><span data-dcnode-id="1032" instrument_node="">bad bargain</span></a><span data-dcnode-id="1030" instrument_node=""> for the U.S. It is “extremely dangerous” when democratic leaders send doubtful messages about their resolve, says Rasmussen. “It leaves behind a vacuum that will be filled by the bad guys. Putin, Assad, Kim Jong-un will have more room to maneuver.” </span></p><span data-dcnode-id="1028" instrument_node=""> </span><p data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Rasmussen and Garcevic are confident NATO will continue to exist because “its task to protect democracy and human rights is eternal.” Collective security has never been more important, they say. But the alliance’s existence has also perhaps never been more threatened by a lack of unity among political leaders. NATO’s ability to protects its members is as much about political strength — sending the right signal — as military capability. </span></p><span data-dcnode-id="1025" instrument_node=""> </span><p data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1022" instrument_node=""> </span><div class="component inline-article-recirc" data-dcnode-id="957"><span data-dcnode-id="1021" instrument_node="">
