ns/thumb/b/b7/Flag_of_Europe.svg/68px-Flag_of_Europe.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b7/Flag_of_Europe.svg/90px-Flag_of_Europe.svg.png 2x" width="45"><br data-dcnode-id="8502"><a data-dcnode-id="8500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union" title="European Union"><span data-dcnode-id="8501" instrument_node="">European Union</span></a></th><th data-dcnode-id="8493" scope="col" style="width:50%; text-align:center; border-left:thin solid lightgrey;"><img alt="" class="thumbborder" data-dcnode-id="8497" data-file-height="720" data-file-width="960" decoding="async" height="30" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/37/Flag_of_NATO.svg/40px-Flag_of_NATO.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/37/Flag_of_NATO.svg/60px-Flag_of_NATO.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/37/Flag_of_NATO.svg/80px-Flag_of_NATO.svg.png 2x" width="40"><br data-dcnode-id="8496"><a data-dcnode-id="8494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="8495" instrument_node="">NATO</span></a></th></tr><tr data-dcnode-id="8488" style="display:none"><th colspan="2" data-dcnode-id="8489"><span data-dcnode-id="8490" instrument_node="">
</span></th></tr></tbody></table><span data-dcnode-id="8485" instrument_node="">
</span><p data-dcnode-id="8436"><span data-dcnode-id="8484" instrument_node="">The </span><a data-dcnode-id="8482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union" title="European Union"><span data-dcnode-id="8483" instrument_node="">European Union</span></a><span data-dcnode-id="8481" instrument_node=""> (EU) and the </span><a data-dcnode-id="8479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="8480" instrument_node="">North Atlantic Treaty Organisation</span></a><span data-dcnode-id="8478" instrument_node=""> (NATO) are two main treaty-based </span><a data-dcnode-id="8476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_world" title="Western world"><span data-dcnode-id="8477" instrument_node="">Western</span></a><span data-dcnode-id="8475" instrument_node=""> organisations for cooperation between member states, both headquartered in </span><a data-dcnode-id="8473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brussels" title="Brussels"><span data-dcnode-id="8474" instrument_node="">Brussels</span></a><span data-dcnode-id="8472" instrument_node="">, Belgium. Their natures are different and they operate in different spheres: NATO is a purely intergovernmental organisation functioning as a military alliance whose primary task</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="8465" style="white-space:nowrap;"><span data-dcnode-id="8471" instrument_node="">[</span><i data-dcnode-id="8467"><a data-dcnode-id="8468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="8469" title="This claim needs references to reliable sources. (March 2022)"><span data-dcnode-id="8470" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="8466" instrument_node="">]</span></sup><span data-dcnode-id="8464" instrument_node=""> is to implement article 5 in the </span><a data-dcnode-id="8462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Atlantic_Treaty" title="North Atlantic Treaty"><span data-dcnode-id="8463" instrument_node="">North Atlantic Treaty</span></a><span data-dcnode-id="8461" instrument_node=""> on collective territorial defence. The EU on the other hand is a partly supranational and partly intergovernmental </span><i data-dcnode-id="8459"><span data-dcnode-id="8460" instrument_node="">sui generis</span></i><span data-dcnode-id="8458" instrument_node=""> entity akin to a </span><a data-dcnode-id="8456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Confederation" title="Confederation"><span data-dcnode-id="8457" instrument_node="">confederation</span></a><sup class="reference" data-dcnode-id="8453" id="cite_ref-1"><a data-dcnode-id="8454" href="#cite_note-1"><span data-dcnode-id="8455" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="8450" id="cite_ref-2"><a data-dcnode-id="8451" href="#cite_note-2"><span data-dcnode-id="8452" instrument_node="">[2]</span></a></sup><span data-dcnode-id="8449" instrument_node=""> that entails wider economic and political </span><a data-dcnode-id="8447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_integration" title="European integration"><span data-dcnode-id="8448" instrument_node="">integration</span></a><span data-dcnode-id="8446" instrument_node="">. Unlike NATO, the EU pursues a </span><a data-dcnode-id="8444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Common_Foreign_and_Security_Policy" title="Common Foreign and Security Policy"><span data-dcnode-id="8445" instrument_node="">foreign policy</span></a><span data-dcnode-id="8443" instrument_node=""> in its own right - based on consensus, and member states have equipped it with tools in the field of defence and crisis management; the </span><a data-dcnode-id="8441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Common_Security_and_Defence_Policy" title="Common Security and Defence Policy"><span data-dcnode-id="8442" instrument_node="">Common Security and Defence Policy</span></a><span data-dcnode-id="8440" instrument_node=""> (CSDP) </span><a data-dcnode-id="8438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Structure_of_the_Common_Security_and_Defence_Policy" title="Structure of the Common Security and Defence Policy"><span data-dcnode-id="8439" instrument_node="">structure</span></a><span data-dcnode-id="8437" instrument_node="">.
</span></p><p data-dcnode-id="8415"><span data-dcnode-id="8435" instrument_node="">The EU and NATO have </span><a data-dcnode-id="8433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Member_state_of_the_European_Union" title="Member state of the European Union"><span data-dcnode-id="8434" instrument_node="">27</span></a><span data-dcnode-id="8432" instrument_node=""> and </span><a data-dcnode-id="8430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Member_states_of_NATO" title="Member states of NATO"><span data-dcnode-id="8431" instrument_node="">30</span></a><span data-dcnode-id="8429" instrument_node=""> member states, respectively — of which 21 are members of both. Another four NATO members are EU applicants—Albania, Montenegro, North Macedonia, and Turkey. Two others—Iceland and Norway—have opted to remain outside of the EU, but do participate in the </span><a data-dcnode-id="8427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Single_Market" title="European Single Market"><span data-dcnode-id="8428" instrument_node="">EU's single market</span></a><span data-dcnode-id="8426" instrument_node=""> as part of their </span><a data-dcnode-id="8424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Economic_Area" title="European Economic Area"><span data-dcnode-id="8425" instrument_node="">European Economic Area</span></a><span data-dcnode-id="8423" instrument_node=""> (EEA) membership. The memberships of the EU and NATO are distinct, and some EU member states are traditionally neutral on defence issues. Several EU member states were formerly members of the </span><a data-dcnode-id="8421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warsaw_Pact" title="Warsaw Pact"><span data-dcnode-id="8422" instrument_node="">Warsaw Pact</span></a><span data-dcnode-id="8420" instrument_node="">. Denmark has an opt-out from the CSDP.</span><sup class="reference" data-dcnode-id="8417" id="cite_ref-eda.europa1_3-0"><a data-dcnode-id="8418" href="#cite_note-eda.europa1-3"><span data-dcnode-id="8419" instrument_node="">[3]</span></a></sup><span data-dcnode-id="8416" instrument_node="">
</span></p><p data-dcnode-id="8392"><span data-dcnode-id="8414" instrument_node="">The EU has its own mutual defence clause in Articles 42(7) and 222 of the </span><a data-dcnode-id="8412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_on_European_Union" title="Treaty on European Union"><span data-dcnode-id="8413" instrument_node="">Treaty on European Union</span></a><span data-dcnode-id="8411" instrument_node=""> (TEU) and the </span><a data-dcnode-id="8409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_on_the_Functioning_of_the_European_Union" title="Treaty on the Functioning of the European Union"><span data-dcnode-id="8410" instrument_node="">Treaty on the Functioning of the European Union</span></a><span data-dcnode-id="8408" instrument_node=""> (TFEU), respectively. The </span><a data-dcnode-id="8406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Command_and_control_structure_of_the_European_Union" title="Command and control structure of the European Union"><span data-dcnode-id="8407" instrument_node="">CSDP command and control structure</span></a><span data-dcnode-id="8405" instrument_node=""> is however much smaller than the </span><a data-dcnode-id="8403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Structure_of_NATO%23Military_command_structure" title="Structure of NATO"><span data-dcnode-id="8404" instrument_node="">NATO Command Structure</span></a><span data-dcnode-id="8402" instrument_node=""> (NCS), and the extent to which the CSDP should evolve to form a full defence arm for the EU that is able to implement the EU mutual defence clause in its own right is a point of contention, and the </span><a data-dcnode-id="8400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Kingdom" title="United Kingdom"><span data-dcnode-id="8401" instrument_node="">United Kingdom</span></a><span data-dcnode-id="8399" instrument_node=""> (UK) has objected to this. At the UK's insistence in the negotiations leading to the </span><a data-dcnode-id="8397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_Lisbon" title="Treaty of Lisbon"><span data-dcnode-id="8398" instrument_node="">Treaty of Lisbon</span></a><span data-dcnode-id="8396" instrument_node="">, Article 42.2 of TEU also specifies that </span><a data-dcnode-id="8394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="8395" instrument_node="">NATO</span></a><span data-dcnode-id="8393" instrument_node=""> shall be the main forum for the implementation of collective self-defence for EU member states that are also NATO members.
</span></p><p data-dcnode-id="8383"><span data-dcnode-id="8391" instrument_node="">The 2002 </span><a data-dcnode-id="8389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Berlin_Plus_agreement" title="Berlin Plus agreement"><span data-dcnode-id="8390" instrument_node="">Berlin Plus agreement</span></a><span data-dcnode-id="8388" instrument_node=""> and 2018 Joint Declaration</span><sup class="reference" data-dcnode-id="8385" id="cite_ref-4"><a data-dcnode-id="8386" href="#cite_note-4"><span data-dcnode-id="8387" instrument_node="">[4]</span></a></sup><span data-dcnode-id="8384" instrument_node=""> provide for cooperation between the EU and NATO, including that that NCS resources may be used for the conduct of the EU's CSDP missions.
</span></p><span data-dcnode-id="8382" instrument_node="">

Since the end of </span><a data-dcnode-id="7779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="7780" instrument_node="">World War II</span></a><span data-dcnode-id="7778" instrument_node="">, </span><a data-dcnode-id="7776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sovereign_state" title="Sovereign state"><span data-dcnode-id="7777" instrument_node="">sovereign</span></a><span data-dcnode-id="7775" instrument_node=""> </span><a data-dcnode-id="7773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Europe" title="Europe"><span data-dcnode-id="7774" instrument_node="">European</span></a><span data-dcnode-id="7772" instrument_node=""> countries have entered into treaties and thereby co-operated and harmonised policies (or </span><i data-dcnode-id="7770"><span data-dcnode-id="7771" instrument_node="">pooled sovereignty</span></i><span data-dcnode-id="7769" instrument_node="">) in an increasing number of areas, in the </span><a data-dcnode-id="7767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_integration" title="European integration"><span data-dcnode-id="7768" instrument_node="">European integration project</span></a><span data-dcnode-id="7766" instrument_node=""> or the </span><i data-dcnode-id="7764"><span data-dcnode-id="7765" instrument_node="">construction of Europe</span></i><span data-dcnode-id="7763" instrument_node=""> (</span><a data-dcnode-id="7761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_language" title="French language"><span data-dcnode-id="7762" instrument_node="">French</span></a><span data-dcnode-id="7760" instrument_node="">: </span><i data-dcnode-id="7758" lang="fr"><span data-dcnode-id="7759" instrument_node="">la construction européenne</span></i><span data-dcnode-id="7757" instrument_node="">). The following timeline outlines the legal inception of the </span><a data-dcnode-id="7755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union" title="European Union"><span data-dcnode-id="7756" instrument_node="">European Union</span></a><span data-dcnode-id="7754" instrument_node=""> (EU)—the principal framework for this unification. The EU inherited many of its present responsibilities from the </span><a data-dcnode-id="7752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Communities" title="European Communities"><span data-dcnode-id="7753" instrument_node="">European Communities</span></a><span data-dcnode-id="7751" instrument_node=""> (EC), which were founded in the 1950s in the spirit of the </span><a data-dcnode-id="7749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Schuman_Declaration" title="Schuman Declaration"><span data-dcnode-id="7750" instrument_node="">Schuman Declaration</span></a><span data-dcnode-id="7748" instrument_node="">.

</span><div class="mw-collapsible mw-collapsed mw-made-collapsible" data-collapsetext="hide notes" data-dcnode-id="6912" data-expandtext="show notes" style="font-size: 85%;"><span aria-expanded="false" class="mw-collapsible-toggle mw-collapsible-toggle-default mw-collapsible-toggle-collapsed" data-dcnode-id="7006" role="button" tabindex="0"><a class="mw-collapsible-text" data-dcnode-id="7007"><span data-dcnode-id="7008" instrument_node="">show notes</span></a></span><div class="mw-collapsible-content" data-dcnode-id="6913" style="display: none;"><span data-dcnode-id="7005" instrument_node="">
</span><dl data-dcnode-id="6915"><dd data-dcnode-id="6979"><span data-dcnode-id="7004" instrument_node="">¹Although not EU treaties </span><i data-dcnode-id="7002"><span data-dcnode-id="7003" instrument_node="">per se</span></i><span data-dcnode-id="7001" instrument_node="">, these treaties affected the </span><a data-dcnode-id="6999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_the_Common_Security_and_Defence_Policy" title="History of the Common Security and Defence Policy"><span data-dcnode-id="7000" instrument_node="">development</span></a><span data-dcnode-id="6998" instrument_node=""> of the </span><a data-dcnode-id="6996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Common_Security_and_Defence_Policy" title="Common Security and Defence Policy"><span data-dcnode-id="6997" instrument_node="">EU defence arm</span></a><span data-dcnode-id="6995" instrument_node="">, a main part of the CFSP. The Franco-British alliance established by the Dunkirk Treaty was </span><i data-dcnode-id="6993"><span data-dcnode-id="6994" instrument_node="">de facto</span></i><span data-dcnode-id="6992" instrument_node=""> superseded by WU. The CFSP pillar was bolstered by some of the security structures that had been established within the remit of the 1955 </span><a data-dcnode-id="6990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_Brussels" title="Treaty of Brussels"><span data-dcnode-id="6991" instrument_node="">Modified Brussels Treaty</span></a><span data-dcnode-id="6989" instrument_node=""> (MBT). The Brussels Treaty was </span><a data-dcnode-id="6987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_European_Union%232009%25E2%2580%25932011%3A_Dissolution" title="Western European Union"><span data-dcnode-id="6988" instrument_node="">terminated</span></a><span data-dcnode-id="6986" instrument_node=""> in 2011, consequently dissolving the WEU, as the </span><a class="extiw" data-dcnode-id="6984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikisource.org/wiki/Consolidated_version_of_the_Treaty_on_European_Union/Title_V%3A_General_Provisions_on_the_Union%2527s_External_Action_Service_and_Specific_Provisions_on_the_Common_Foreign_and_Security_Policy%23Article_42" title="wikisource:Consolidated version of the Treaty on European Union/Title V: General Provisions on the Union's External Action Service and Specific Provisions on the Common Foreign and Security Policy"><span data-dcnode-id="6985" instrument_node="">mutual defence clause</span></a><span data-dcnode-id="6983" instrument_node=""> that the Lisbon Treaty provided for EU was considered to render the WEU superfluous. The EU thus </span><i data-dcnode-id="6981"><span data-dcnode-id="6982" instrument_node="">de facto</span></i><span data-dcnode-id="6980" instrument_node=""> superseded the WEU.</span></dd><span data-dcnode-id="6978" instrument_node="">
</span><dd data-dcnode-id="6967"><span data-dcnode-id="6977" instrument_node="">²The treaties of Maastricht and Rome form the EU's </span><a data-dcnode-id="6975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaties_of_the_European_Union" title="Treaties of the European Union"><span data-dcnode-id="6976" instrument_node="">legal basis</span></a><span data-dcnode-id="6974" instrument_node="">, and are also referred to as the </span><a data-dcnode-id="6972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_on_European_Union" title="Treaty on European Union"><span data-dcnode-id="6973" instrument_node="">Treaty on European Union</span></a><span data-dcnode-id="6971" instrument_node=""> (TEU) and the </span><a data-dcnode-id="6969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_on_the_Functioning_of_the_European_Union" title="Treaty on the Functioning of the European Union"><span data-dcnode-id="6970" instrument_node="">Treaty on the Functioning of the European Union</span></a><span data-dcnode-id="6968" instrument_node=""> (TFEU), respectively. They are amended by secondary treaties.</span></dd><span data-dcnode-id="6966" instrument_node="">
</span><dd data-dcnode-id="6958"><span data-dcnode-id="6965" instrument_node="">³The </span><a data-dcnode-id="6963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Communities" title="European Communities"><span data-dcnode-id="6964" instrument_node="">European Communities</span></a><span data-dcnode-id="6962" instrument_node=""> obtained common institutions and a shared </span><a data-dcnode-id="6960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Legal_person" title="Legal person"><span data-dcnode-id="6961" instrument_node="">legal personality</span></a><span data-dcnode-id="6959" instrument_node=""> (i.e. ability to e.g. sign treaties in their own right).</span></dd><span data-dcnode-id="6957" instrument_node="">
</span><dd data-dcnode-id="6952"><span data-dcnode-id="6956" instrument_node="">⁴Between the EU's founding in 1993 and consolidation in 2009, the union consisted of </span><a data-dcnode-id="6954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Three_pillars_of_the_European_Union" title="Three pillars of the European Union"><span data-dcnode-id="6955" instrument_node="">three pillars</span></a><span data-dcnode-id="6953" instrument_node="">, the first of which were the European Communities. The other two pillars consisted of additional areas of cooperation that had been added to the EU's remit.</span></dd><span data-dcnode-id="6951" instrument_node="">
</span><dd data-dcnode-id="6925"><span data-dcnode-id="6950" instrument_node="">⁵The consolidation meant that the EU inherited the European Communities' </span><a data-dcnode-id="6948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Legal_person" title="Legal person"><span data-dcnode-id="6949" instrument_node="">legal personality</span></a><span data-dcnode-id="6947" instrument_node=""> and that the </span><a data-dcnode-id="6945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Three_pillars_of_the_European_Union" title="Three pillars of the European Union"><span data-dcnode-id="6946" instrument_node="">pillar system was abolished</span></a><span data-dcnode-id="6944" instrument_node="">, resulting in the EU framework as such covering all policy areas. Executive/legislative power in each area was instead determined by a </span><a class="mw-redirect" data-dcnode-id="6942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Template%3AEU_competences" title="Template:EU competences"><span data-dcnode-id="6943" instrument_node="">distribution of competencies</span></a><span data-dcnode-id="6941" instrument_node=""> between </span><a data-dcnode-id="6939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Institutions_of_the_European_Union" title="Institutions of the European Union"><span data-dcnode-id="6940" instrument_node="">EU institutions</span></a><span data-dcnode-id="6938" instrument_node=""> and </span><a data-dcnode-id="6936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Member_state_of_the_European_Union" title="Member state of the European Union"><span data-dcnode-id="6937" instrument_node="">member states</span></a><span data-dcnode-id="6935" instrument_node="">. This distribution, as well as treaty provisions for policy areas in which unanimity is required and </span><a data-dcnode-id="6933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Double_majority%23European_Union" title="Double majority"><span data-dcnode-id="6934" instrument_node="">qualified majority voting</span></a><span data-dcnode-id="6932" instrument_node=""> is possible, reflects the depth of EU integration as well as the EU's partly </span><a data-dcnode-id="6930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supranational_union" title="Supranational union"><span data-dcnode-id="6931" instrument_node="">supranational</span></a><span data-dcnode-id="6929" instrument_node=""> and partly </span><a data-dcnode-id="6927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intergovernmentalism" title="Intergovernmentalism"><span data-dcnode-id="6928" instrument_node="">intergovernmental</span></a><span data-dcnode-id="6926" instrument_node=""> nature.</span></dd><span data-dcnode-id="6924" instrument_node="">
</span><dd data-dcnode-id="6916"><span data-dcnode-id="6923" instrument_node="">⁶Plans to establish a </span><a data-dcnode-id="6921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_establishing_the_European_Political_Community" title="Treaty establishing the European Political Community"><span data-dcnode-id="6922" instrument_node="">European Political Community</span></a><span data-dcnode-id="6920" instrument_node=""> (EPC) were shelved following the French failure to ratify the </span><a data-dcnode-id="6918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_establishing_the_European_Defence_Community" title="Treaty establishing the European Defence Community"><span data-dcnode-id="6919" instrument_node="">Treaty establishing the European Defence Community</span></a><span data-dcnode-id="6917" instrument_node=""> (EDC). The EPC would have combined the ECSC and the EDC.</span></dd></dl><span data-dcnode-id="6914" instrument_node="">
</span></div></div><span data-dcnode-id="6911" instrument_node="">
</span><h3 data-dcnode-id="6901"><span class="mw-headline" data-dcnode-id="6909" id="1954:_Failure_to_establish_an_autonomous_European_pillar_in_NATO"><span data-dcnode-id="6910" instrument_node="">1954: Failure to establish an autonomous European pillar in NATO</span></span><span class="mw-editsection" data-dcnode-id="6902"><span class="mw-editsection-bracket" data-dcnode-id="6907"><span data-dcnode-id="6908" instrument_node="">[</span></span><a data-dcnode-id="6905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEuropean_Union%25E2%2580%2593NATO_relations%26action%3Dedit%26section%3D3" title="Edit section: 1954: Failure to establish an autonomous European pillar in NATO"><span data-dcnode-id="6906" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6903"><span data-dcnode-id="6904" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6900" instrument_node="">
</span><link data-dcnode-id="6899" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6895" role="note"><span data-dcnode-id="6898" instrument_node="">Further information: </span><a data-dcnode-id="6896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_establishing_the_European_Defence_Community" title="Treaty establishing the European Defence Community"><span data-dcnode-id="6897" instrument_node="">Treaty establishing the European Defence Community</span></a></div><span data-dcnode-id="6894" instrument_node="">
</span><p data-dcnode-id="6892"><span data-dcnode-id="6893" instrument_node="">Had its founding treaty not failed to acquire ratification in the French Parliament in 1954, the European Defence Community would have entailed a pan-European military, divided into national components, and had a common budget, common arms, centralized military procurement, and institutions. The EDC would have had an integral link to NATO, forming an autonomous European pillar in the Atlantic alliance.
</span></p><span data-dcnode-id="6891" instrument_node="">
</span><div class="center" data-dcnode-id="6881"><div class="thumb tnone" data-dcnode-id="6882"><div class="thumbinner" data-dcnode-id="6883" style="width:502px;"><a class="image" data-dcnode-id="6889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOrganisation_of_the_European_Defence_Community.svg"><img alt="" class="thumbimage" data-dcnode-id="6890" data-file-height="411" data-file-width="794" decoding="async" height="259" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/09/Organisation_of_the_European_Defence_Community.svg/500px-Organisation_of_the_European_Defence_Community.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/09/Organisation_of_the_European_Defence_Community.svg/750px-Organisation_of_the_European_Defence_Community.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/09/Organisation_of_the_European_Defence_Community.svg/1000px-Organisation_of_the_European_Defence_Community.svg.png 2x" width="500"></a><span data-dcnode-id="6888" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6884"><div class="magnify" data-dcnode-id="6886"><a class="internal" data-dcnode-id="6887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOrganisation_of_the_European_Defence_Community.svg" title="Enlarge"></a></div><span data-dcnode-id="6885" instrument_node="">Diagram showing the functioning of the institutions provided for by the Treaty establishing the European Defence Community (EDC), the placing of Member States' armed forces (European Defence Forces) at the disposal of the Community, and the link between the EDC and the North Atlantic Treaty Organisation (NATO).</span></div></div></div></div><span data-dcnode-id="6880" instrument_node="">
</span><h3 data-dcnode-id="6870"><span class="mw-headline" data-dcnode-id="6878" id="1996-present:_Tensions_and_mutual_interests_as_EU_gains_autonomous_defence_structures"><span data-dcnode-id="6879" instrument_node="">1996-present: Tensions and mutual interests as EU gains autonomous defence structures</span></span><span class="mw-editsection" data-dcnode-id="6871"><span class="mw-editsection-bracket" data-dcnode-id="6876"><span data-dcnode-id="6877" instrument_node="">[</span></span><a data-dcnode-id="6874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEuropean_Union%25E2%2580%2593NATO_relations%26action%3Dedit%26section%3D4" title="Edit section: 1996-present: Tensions and mutual interests as EU gains autonomous defence structures"><span data-dcnode-id="6875" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6872"><span data-dcnode-id="6873" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6869" instrument_node="">
</span><link data-dcnode-id="6868" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6864" role="note"><span data-dcnode-id="6867" instrument_node="">Main article: </span><a data-dcnode-id="6865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Berlin_Plus_agreement" title="Berlin Plus agreement"><span data-dcnode-id="6866" instrument_node="">Berlin Plus agreement</span></a></div><span data-dcnode-id="6863" instrument_node="">
</span><p data-dcnode-id="6855"><span data-dcnode-id="6862" instrument_node="">Following the establishment of the ESDI and the St. Malo declaration, </span><a data-dcnode-id="6860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Secretary_of_State" title="United States Secretary of State"><span data-dcnode-id="6861" instrument_node="">US Secretary of State</span></a><span data-dcnode-id="6859" instrument_node=""> </span><a data-dcnode-id="6857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Madeleine_Albright" title="Madeleine Albright"><span data-dcnode-id="6858" instrument_node="">Madeleine Albright</span></a><span data-dcnode-id="6856" instrument_node=""> were among others who voiced concern that an independent European security pillar could undermine NATO, as she put forth the three famous D's:
</span></p><span data-dcnode-id="6854" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="6822"><p data-dcnode-id="6838"><span data-dcnode-id="6851" instrument_node="">Our [...] task is working together to develop [the ESDI] within [NATO], which the United States has strongly endorsed. We enthusiastically support any such measures that enhance European capabilities. The United States welcomes a more capable European partner, with modern, flexible military forces capable of putting out fires in Europe's own back yard and working with us through [NATO] to defend our common interests. The key to a successful initiative is to focus on practical military capabilities. Any initiative must avoid preempting [NATO] decision-making by </span><u data-dcnode-id="6848"><b data-dcnode-id="6849"><span data-dcnode-id="6850" instrument_node="">d</span></b></u><span data-dcnode-id="6847" instrument_node="">e-linking ESDI from NATO, avoid </span><u data-dcnode-id="6844"><b data-dcnode-id="6845"><span data-dcnode-id="6846" instrument_node="">d</span></b></u><span data-dcnode-id="6843" instrument_node="">uplicating existing efforts, and avoid </span><u data-dcnode-id="6840"><b data-dcnode-id="6841"><span data-dcnode-id="6842" instrument_node="">d</span></b></u><span data-dcnode-id="6839" instrument_node="">iscriminating against non-EU members. [...]</span></p><div class="templatequotecite" data-dcnode-id="6823"><span data-dcnode-id="6837" instrument_node="">— </span><cite data-dcnode-id="6824"><a data-dcnode-id="6835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Secretary_of_State" title="United States Secretary of State"><span data-dcnode-id="6836" instrument_node="">US Secretary of State</span></a><span data-dcnode-id="6834" instrument_node=""> </span><a data-dcnode-id="6832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Madeleine_Albright" title="Madeleine Albright"><span data-dcnode-id="6833" instrument_node="">Albright</span></a><span data-dcnode-id="6831" instrument_node="">, </span><a data-dcnode-id="6829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Atlantic_Council" title="North Atlantic Council"><span data-dcnode-id="6830" instrument_node="">North Atlantic Council</span></a><span data-dcnode-id="6828" instrument_node=""> (8 December 1998)</span><sup class="reference" data-dcnode-id="6825" id="cite_ref-6"><a data-dcnode-id="6826" href="#cite_note-6"><span data-dcnode-id="6827" instrument_node="">[6]</span></a></sup></cite></div></blockquote><span data-dcnode-id="6821" instrument_node="">
</span><h3 data-dcnode-id="6811"><span class="mw-headline" data-dcnode-id="6819" id="Eastern_enlargement"><span data-dcnode-id="6820" instrument_node="">Eastern enlargement</span></span><span class="mw-editsection" data-dcnode-id="6812"><span class="mw-editsection-bracket" data-dcnode-id="6817"><span data-dcnode-id="6818" instrument_node="">[</span></span><a data-dcnode-id="6815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEuropean_Union%25E2%2580%2593NATO_relations%26action%3Dedit%26section%3D5" title="Edit section: Eastern enlargement"><span data-dcnode-id="6816" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6813"><span data-dcnode-id="6814" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6810" instrument_node="">
</span><link data-dcnode-id="6809" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6802" role="note"><span data-dcnode-id="6808" instrument_node="">Further information: </span><a data-dcnode-id="6806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enlargement_of_the_European_Union" title="Enlargement of the European Union"><span data-dcnode-id="6807" instrument_node="">Enlargement of the European Union</span></a><span data-dcnode-id="6805" instrument_node=""> and </span><a data-dcnode-id="6803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enlargement_of_NATO" title="Enlargement of NATO"><span data-dcnode-id="6804" instrument_node="">Enlargement of NATO</span></a></div><span data-dcnode-id="6801" instrument_node="">

</span><link data-dcnode-id="6789" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6782" role="note"><span data-dcnode-id="6788" instrument_node="">Main articles: </span><a data-dcnode-id="6786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Berlin_Plus_agreement" title="Berlin Plus agreement"><span data-dcnode-id="6787" instrument_node="">Berlin Plus agreement</span></a><span data-dcnode-id="6785" instrument_node=""> and </span><a class="new" data-dcnode-id="6783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DJoint_declaration_on_EU-NATO_cooperation%26action%3Dedit%26redlink%3D1" title="Joint declaration on EU-NATO cooperation (page does not exist)"><span data-dcnode-id="6784" instrument_node="">Joint declaration on EU-NATO cooperation</span></a></div><span data-dcnode-id="6781" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6754"><div class="thumbinner" data-dcnode-id="6755" style="width:222px;"><a class="image" data-dcnode-id="6779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASACEUR_change_of_command_ceremony_130513-A-IL200-669.jpg"><img alt="" class="thumbimage" data-dcnode-id="6780" data-file-height="4309" data-file-width="6538" decoding="async" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/92/SACEUR_change_of_command_ceremony_130513-A-IL200-669.jpg/220px-SACEUR_change_of_command_ceremony_130513-A-IL200-669.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/92/SACEUR_change_of_command_ceremony_130513-A-IL200-669.jpg/330px-SACEUR_change_of_command_ceremony_130513-A-IL200-669.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/92/SACEUR_change_of_command_ceremony_130513-A-IL200-669.jpg/440px-SACEUR_change_of_command_ceremony_130513-A-IL200-669.jpg 2x" width="220"></a><span data-dcnode-id="6778" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6756"><div class="magnify" data-dcnode-id="6776"><a class="internal" data-dcnode-id="6777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASACEUR_change_of_command_ceremony_130513-A-IL200-669.jpg" title="Enlarge"></a></div><span data-dcnode-id="6775" instrument_node="">Change of command for the post of </span><a class="mw-redirect" data-dcnode-id="6773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Commander_Allied_Forces_Europe" title="Supreme Commander Allied Forces Europe"><span data-dcnode-id="6774" instrument_node="">Supreme Commander Allied Forces Europe</span></a><span data-dcnode-id="6772" instrument_node=""> (SACEUR) at </span><a data-dcnode-id="6770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Headquarters_Allied_Powers_Europe" title="Supreme Headquarters Allied Powers Europe"><span data-dcnode-id="6771" instrument_node="">Supreme Headquarters Allied Powers Europe</span></a><span data-dcnode-id="6769" instrument_node=""> (SHAPE), the main headquarters of the </span><a data-dcnode-id="6767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="6768" instrument_node="">North Atlantic Treaty Organisation</span></a><span data-dcnode-id="6766" instrument_node="">’s </span><a data-dcnode-id="6764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allied_Command_Operations" title="Allied Command Operations"><span data-dcnode-id="6765" instrument_node="">Allied Command Operations</span></a><span data-dcnode-id="6763" instrument_node=""> (ACO). SHAPE’s main building also flies the </span><a data-dcnode-id="6761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Flag_of_Europe" title="Flag of Europe"><span data-dcnode-id="6762" instrument_node="">EU flag</span></a><span data-dcnode-id="6760" instrument_node="">, reflecting the </span><a data-dcnode-id="6758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Berlin_Plus_agreement" title="Berlin Plus agreement"><span data-dcnode-id="6759" instrument_node="">Berlin Plus agreement</span></a><span data-dcnode-id="6757" instrument_node="">.</span></div></div></div><span data-dcnode-id="6753" instrument_node="">
</span><p data-dcnode-id="6736"><span data-dcnode-id="6752" instrument_node="">The </span><a data-dcnode-id="6750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Berlin_Plus_agreement" title="Berlin Plus agreement"><span data-dcnode-id="6751" instrument_node="">Berlin Plus agreement</span></a><span data-dcnode-id="6749" instrument_node=""> enables </span><a data-dcnode-id="6747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_military_and_civilian_missions_of_the_European_Union" title="List of military and civilian missions of the European Union"><span data-dcnode-id="6748" instrument_node="">EU operations</span></a><span data-dcnode-id="6746" instrument_node=""> to be planned and conducted at the military strategic and operational level with recourse to assets and capabilities in the </span><a data-dcnode-id="6744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Structure_of_NATO%23Military_command_structure" title="Structure of NATO"><span data-dcnode-id="6745" instrument_node="">NATO Command Structure</span></a><span data-dcnode-id="6743" instrument_node=""> (NCS). In such an event, an Operational Headquarters (OHQ) would be set up within NATO's </span><a data-dcnode-id="6741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Headquarters_Allied_Powers_Europe" title="Supreme Headquarters Allied Powers Europe"><span data-dcnode-id="6742" instrument_node="">Supreme Headquarters Allied Powers Europe</span></a><span data-dcnode-id="6740" instrument_node=""> (SHAPE) in Mons, Belgium. SHAPE is the main headquarters of </span><a data-dcnode-id="6738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allied_Command_Operations" title="Allied Command Operations"><span data-dcnode-id="6739" instrument_node="">Allied Command Operations</span></a><span data-dcnode-id="6737" instrument_node=""> (ACO).
</span></p><p data-dcnode-id="6731"><span data-dcnode-id="6735" instrument_node="">When the NCS provides the OHQ, the </span><a data-dcnode-id="6733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Allied_Commander_Europe%23Deputy" title="Supreme Allied Commander Europe"><span data-dcnode-id="6734" instrument_node="">Deputy Supreme Allied Commander Europe</span></a><span data-dcnode-id="6732" instrument_node=""> (DSACEUR) acts as Operation Commander (OpCdr).
</span></p><p data-dcnode-id="6715"><span data-dcnode-id="6730" instrument_node="">The Berlin Plus agreement requires that the use of NATO assets by the EU is subject to a "right of first refusal", i.e. NATO must first decline to intervene in a given crisis,</span><sup class="reference" data-dcnode-id="6727" id="cite_ref-7"><a data-dcnode-id="6728" href="#cite_note-7"><span data-dcnode-id="6729" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="6724" id="cite_ref-8"><a data-dcnode-id="6725" href="#cite_note-8"><span data-dcnode-id="6726" instrument_node="">[8]</span></a></sup><span data-dcnode-id="6723" instrument_node=""> and contingent on unanimous approval among NATO states, including those outside of the EU. For example, Turkish reservations about </span><a class="mw-redirect" data-dcnode-id="6721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_Concordia" title="Operation Concordia"><span data-dcnode-id="6722" instrument_node="">Operation Concordia</span></a><span data-dcnode-id="6720" instrument_node=""> using NATO assets delayed its deployment by more than five months.</span><sup class="reference" data-dcnode-id="6717" id="cite_ref-9"><a data-dcnode-id="6718" href="#cite_note-9"><span data-dcnode-id="6719" instrument_node="">[9]</span></a></sup><span data-dcnode-id="6716" instrument_node="">
</span></p><p data-dcnode-id="6698"><span data-dcnode-id="6714" instrument_node="">The </span><a data-dcnode-id="6712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_External_Action_Service" title="European External Action Service"><span data-dcnode-id="6713" instrument_node="">European External Action Service</span></a><span data-dcnode-id="6711" instrument_node="">'s (EEAS) </span><a data-dcnode-id="6709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union_Military_Staff" title="European Union Military Staff"><span data-dcnode-id="6710" instrument_node="">Military Staff</span></a><span data-dcnode-id="6708" instrument_node=""> (EUMS), situated in the </span><a data-dcnode-id="6706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kortenberg_building" title="Kortenberg building"><span data-dcnode-id="6707" instrument_node="">Kortenberg building</span></a><span data-dcnode-id="6705" instrument_node=""> in Brussels, has a permanent NATO liaison team and runs a permanent EU cell at NATO's </span><a data-dcnode-id="6703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Headquarters_Allied_Powers_Europe" title="Supreme Headquarters Allied Powers Europe"><span data-dcnode-id="6704" instrument_node="">Supreme Headquarters Allied Powers Europe</span></a><span data-dcnode-id="6702" instrument_node=""> (SHAPE) in </span><a data-dcnode-id="6700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mons" title="Mons"><span data-dcnode-id="6701" instrument_node="">Mons</span></a><span data-dcnode-id="6699" instrument_node="">.
</span></p><span data-dcnode-id="6697" instrument_node="">
</span><h2 data-dcnode-id="6687"><span class="mw-headline" data-dcnode-id="6695" id="Comparison"><span data-dcnode-id="6696" instrument_node="">Comparison</span></span><span class="mw-editsection" data-dcnode-id="6688"><span class="mw-editsection-bracket" data-dcnode-id="6693"><span data-dcnode-id="6694" instrument_node="">[</span></span><a data-dcnode-id="6691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEuropean_Union%25E2%2580%2593NATO_relations%26action%3Dedit%26section%3D7" title="Edit section: Comparison"><span data-dcnode-id="6692" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6689"><span data-dcnode-id="6690" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6686" instrument_node="">
</span><h3 data-dcnode-id="6676"><span class="mw-headline" data-dcnode-id="6684" id="Command_structures"><span data-dcnode-id="6685" instrument_node="">Command structures</span></span><span class="mw-editsection" data-dcnode-id="6677"><span class="mw-editsection-bracket" data-dcnode-id="6682"><span data-dcnode-id="6683" instrument_node="">[</span></span><a data-dcnode-id="6680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEuropean_Union%25E2%2580%2593NATO_relations%26action%3Dedit%26section%3D8" title="Edit section: Command structures"><span data-dcnode-id="6681" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6678"><span data-dcnode-id="6679" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6675" instrument_node="">
</span><p data-dcnode-id="6661"><span data-dcnode-id="6674" instrument_node="">The CSDP entails </span><a data-dcnode-id="6672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alliance" title="Alliance"><span data-dcnode-id="6673" instrument_node="">collective self-defence</span></a><span data-dcnode-id="6671" instrument_node=""> amongst member states. This responsibility is based on Article 42.7 of TEU, which states that this responsibility does not prejudice the specific character of the security and defence policy of certain member states, referring to policies of neutrality. See </span><a data-dcnode-id="6669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neutral_country%23European_Union" title="Neutral country"><span data-dcnode-id="6670" instrument_node="">Neutral country§European Union</span></a><span data-dcnode-id="6668" instrument_node=""> for discussion on this subject. According to the </span><a class="extiw" data-dcnode-id="6666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikisource.org/wiki/Consolidated_version_of_the_Treaty_on_European_Union/Title_V%3A_General_Provisions_on_the_Union%2527s_External_Action_Service_and_Specific_Provisions_on_the_Common_Foreign_and_Security_Policy%23SECTION_2%3A_PROVISIONS_ON_THE_COMMON_SECURITY_AND_DEFENCE_POLICY" title="s:Consolidated version of the Treaty on European Union/Title V: General Provisions on the Union's External Action Service and Specific Provisions on the Common Foreign and Security Policy"><span data-dcnode-id="6667" instrument_node="">Article 42.7</span></a><span data-dcnode-id="6665" instrument_node=""> "If a Member State is the victim of armed aggression on its territory, the other Member States shall have towards it an obligation of aid and assistance by all the means in their power, in accordance with Article 51 of the United Nations Charter. This shall not prejudice the specific character of the security and defence policy of certain Member States."  Article 42.2 furthermore specifies that </span><a data-dcnode-id="6663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="6664" instrument_node="">NATO</span></a><span data-dcnode-id="6662" instrument_node=""> shall be the main forum for the implementation of collective self-defence for EU member states that are also NATO members.
</span></p><p data-dcnode-id="6641"><span data-dcnode-id="6660" instrument_node="">The EU does not have a permanent military command structure similar to the </span><a class="mw-redirect" data-dcnode-id="6658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Atlantic_Treaty_Organization" title="North Atlantic Treaty Organization"><span data-dcnode-id="6659" instrument_node="">North Atlantic Treaty Organization</span></a><span data-dcnode-id="6657" instrument_node="">'s (NATO) </span><a data-dcnode-id="6655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allied_Command_Operations" title="Allied Command Operations"><span data-dcnode-id="6656" instrument_node="">Allied Command Operations</span></a><span data-dcnode-id="6654" instrument_node=""> (ACO), although it has been agreed that ACO resources may be used for the conduct of the EU's CSDP missions under the </span><a data-dcnode-id="6652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Berlin_Plus_agreement" title="Berlin Plus agreement"><span data-dcnode-id="6653" instrument_node="">Berlin Plus agreement</span></a><span data-dcnode-id="6651" instrument_node="">. The </span><a data-dcnode-id="6649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Military_Planning_and_Conduct_Capability" title="Military Planning and Conduct Capability"><span data-dcnode-id="6650" instrument_node="">Military Planning and Conduct Capability</span></a><span data-dcnode-id="6648" instrument_node=""> (MPCC), established in 2017 and to be strengthened in 2020, does however represent the EU's first step in developing a permanent military OHQ. In parallel, the newly established </span><a data-dcnode-id="6646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Defence_Fund" title="European Defence Fund"><span data-dcnode-id="6647" instrument_node="">European Defence Fund</span></a><span data-dcnode-id="6645" instrument_node=""> (EDF) marks the first time the </span><a data-dcnode-id="6643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Budget_of_the_European_Union" title="Budget of the European Union"><span data-dcnode-id="6644" instrument_node="">EU budget</span></a><span data-dcnode-id="6642" instrument_node=""> is used to finance multinational defence projects.
</span></p><span data-dcnode-id="6640" instrument_node="">

"></td><td colspan="6" data-dcnode-id="6120" rowspan="2" style="border:2px solid black;padding:0.2em;border: solid 1px"><span data-dcnode-id="6121" instrument_node="">Other CCs(**)</span></td></tr><tr data-dcnode-id="6115" style="height:1px;text-align:center"><td colspan="2" data-dcnode-id="6118" style="height:1em;width:2em"></td><td colspan="2" data-dcnode-id="6117" style="height:1em;width:2em"></td><td colspan="2" data-dcnode-id="6116" style="height:1em;width:2em"></td></tr><tr data-dcnode-id="6095" style="height:1px;text-align:center"><td colspan="2" data-dcnode-id="6113" rowspan="2" style="height:2em;width:2em"></td><td data-dcnode-id="6112" rowspan="2" style="border-right:1px solid black;height:2em;width:1em"></td><td data-dcnode-id="6111" rowspan="2" style="height:2em;width:1em"></td><td colspan="2" data-dcnode-id="6110" rowspan="2" style="height:2em;width:2em"></td><td colspan="2" data-dcnode-id="6109" rowspan="2" style="height:2em;width:2em"></td><td colspan="2" data-dcnode-id="6108" rowspan="2" style="height:2em;width:2em"></td><td data-dcnode-id="6107" rowspan="2" style="border-right:1px solid black;height:2em;width:1em"></td><td data-dcnode-id="6106" rowspan="2" style="height:2em;width:1em"></td><td colspan="2" data-dcnode-id="6105" rowspan="2" style="height:2em;width:2em"></td><td colspan="2" data-dcnode-id="6104" rowspan="2" style="height:2em;width:2em"></td><td colspan="2" data-dcnode-id="6103" rowspan="2" style="height:2em;width:2em"></td><td data-dcnode-id="6102" rowspan="2" style="border-right:1px solid black;height:2em;width:1em"></td><td data-dcnode-id="6101" rowspan="2" style="height:2em;width:1em"></td><td colspan="2" data-dcnode-id="6100" rowspan="2" style="height:2em;width:2em"></td><td colspan="2" data-dcnode-id="6099" rowspan="2" style="height:2em;width:2em"></td><td colspan="2" data-dcnode-id="6098" rowspan="2" style="height:2em;width:2em"></td><td data-dcnode-id="6097" rowspan="2" style="border-right:1px solid black;height:2em;width:1em"></td><td data-dcnode-id="6096" rowspan="2" style="height:2em;width:1em"></td></tr><tr data-dcnode-id="6094" style="height:1px;text-align:center"></tr><tr data-dcnode-id="6081" style="height:1px;text-align:center"><td colspan="6" data-dcnode-id="6091" rowspan="2" style="border:2px solid black;padding:0.2em;border: solid 1px"><span data-dcnode-id="6092" instrument_node="">Forces</span></td><td colspan="2" data-dcnode-id="6090" style="height:1em;border-bottom:1px dashed black;width:2em"></td><td colspan="6" data-dcnode-id="6088" rowspan="2" style="border:2px solid black;padding:0.2em;border: solid 1px"><span data-dcnode-id="6089" instrument_node="">Forces</span></td><td colspan="2" data-dcnode-id="6087" style="height:1em;border-bottom:1px dashed black;width:2em"></td><td colspan="6" data-dcnode-id="6085" rowspan="2" style="border:2px solid black;padding:0.2em;border: solid 1px"><span data-dcnode-id="6086" instrument_node="">Forces</span></td><td colspan="2" data-dcnode-id="6084" style="height:1em;border-bottom:1px dashed black;width:2em"></td><td colspan="6" data-dcnode-id="6082" rowspan="2" style="border:2px solid black;padding:0.2em;border: solid 1px"><span data-dcnode-id="6083" instrument_node="">Forces</span></td></tr><tr data-dcnode-id="6077" style="height:1px;text-align:center"><td colspan="2" data-dcnode-id="6080" style="height:1em;width:2em"></td><td colspan="2" data-dcnode-id="6079" style="height:1em;width:2em"></td><td colspan="2" data-dcnode-id="6078" style="height:1em;width:2em"></td></tr></tbody></table><span data-dcnode-id="6073" instrument_node="">
</span><p data-dcnode-id="6071"><br data-dcnode-id="6072"></p><div data-dcnode-id="6010" style="font-size:85%;"><span data-dcnode-id="6070" instrument_node="">
</span><dl data-dcnode-id="6064"><dd data-dcnode-id="6065"><span data-dcnode-id="6069" instrument_node="">*In the event of a CSDP Civilian Mission also being in the field, the relation with the </span><a data-dcnode-id="6067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civilian_Planning_and_Conduct_Capability" title="Civilian Planning and Conduct Capability"><span data-dcnode-id="6068" instrument_node="">Civilian Planning and Conduct Capability</span></a><span data-dcnode-id="6066" instrument_node=""> (CPCC) and its Civilian Operation Commander (Civ OpCdr), as well as the subordinate Head of Mission (HoM), are coordinated as shown.</span></dd></dl><span data-dcnode-id="6063" instrument_node="">
</span><dl data-dcnode-id="6057"><dd data-dcnode-id="6058"><span data-dcnode-id="6062" instrument_node="">**Other Component Commanders (CCs) and </span><a class="mw-redirect" data-dcnode-id="6060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Service_branch" title="Service branch"><span data-dcnode-id="6061" instrument_node="">service branches</span></a><span data-dcnode-id="6059" instrument_node=""> which may be established</span></dd></dl><span data-dcnode-id="6056" instrument_node="">
</span><dl data-dcnode-id="6047"><dd data-dcnode-id="6048"><span data-dcnode-id="6055" instrument_node="">***The MPCC is part of the EUMS and Dir MPCC is double-hatted as DGEUMS. Unless the MPCC is used as Operation Headquarters (OHQ), either a national OHQ offered by member states or the </span><a data-dcnode-id="6053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="6054" instrument_node="">NATO</span></a><span data-dcnode-id="6052" instrument_node=""> Command Structure (NCS) would serve this purpose. In the latter instance, </span><a data-dcnode-id="6050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Allied_Commander_Europe" title="Supreme Allied Commander Europe"><span data-dcnode-id="6051" instrument_node="">Deputy Supreme Allied Commander Europe</span></a><span data-dcnode-id="6049" instrument_node=""> (DSACEUR), rather than Dir MPCC, would serve as Operation Commander (OpCdr).</span></dd></dl><span data-dcnode-id="6046" instrument_node="">
</span><dl data-dcnode-id="6043"><dd data-dcnode-id="6044"><span data-dcnode-id="6045" instrument_node="">****Unless the MPCC is used as Operation Headquarters (OHQ), the MFCdr would be known as a Force Commander (FCdr), and direct a Force Headquarters (FHQ) rather than a MFHQ. Whereas the MFHQ would act both on the operational and tactical level, the FHQ would act purely on the operational level.</span></dd></dl><span data-dcnode-id="6042" instrument_node="">
</span><dl data-dcnode-id="6018"><dd data-dcnode-id="6019"><span data-dcnode-id="6041" instrument_node="">*****The political strategic level is not part of the C2 structure per se, but represents the political bodies, with associated support facilities, that determine the missions' general direction. The </span><a data-dcnode-id="6039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Council_of_the_European_Union" title="Council of the European Union"><span data-dcnode-id="6040" instrument_node="">Council</span></a><span data-dcnode-id="6038" instrument_node=""> determines the role of the </span><a data-dcnode-id="6036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/High_Representative_of_the_Union_for_Foreign_Affairs_and_Security_Policy" title="High Representative of the Union for Foreign Affairs and Security Policy"><span data-dcnode-id="6037" instrument_node="">High Representative</span></a><span data-dcnode-id="6035" instrument_node=""> (HR/VP), who serves as </span><a data-dcnode-id="6033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vice-President_of_the_European_Commission" title="Vice-President of the European Commission"><span data-dcnode-id="6034" instrument_node="">Vice-President</span></a><span data-dcnode-id="6032" instrument_node=""> of the </span><a data-dcnode-id="6030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Commission" title="European Commission"><span data-dcnode-id="6031" instrument_node="">European Commission</span></a><span data-dcnode-id="6029" instrument_node="">, attends </span><a data-dcnode-id="6027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Council" title="European Council"><span data-dcnode-id="6028" instrument_node="">European Council</span></a><span data-dcnode-id="6026" instrument_node=""> meetings, chairs the </span><a data-dcnode-id="6024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_Affairs_Council" title="Foreign Affairs Council"><span data-dcnode-id="6025" instrument_node="">Foreign Affairs Council</span></a><span data-dcnode-id="6023" instrument_node=""> (FAC) and may chair the </span><a data-dcnode-id="6021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political_and_Security_Committee" title="Political and Security Committee"><span data-dcnode-id="6022" instrument_node="">Political and Security Committee</span></a><span data-dcnode-id="6020" instrument_node=""> (PSC) in times of crisis. The HR/VP proposes and implements CSDP decisions.</span></dd></dl><span data-dcnode-id="6017" instrument_node="">
</span><dl data-dcnode-id="6011"><dd data-dcnode-id="6012"><span data-dcnode-id="6016" instrument_node="">******Same composition as </span><a data-dcnode-id="6014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Committee_of_Permanent_Representatives" title="Committee of Permanent Representatives"><span data-dcnode-id="6015" instrument_node="">Committee of Permanent Representatives</span></a><span data-dcnode-id="6013" instrument_node=""> (COREPER) II, which also prepares for the CSDP-related work of the FAC.</span></dd></dl></div><span data-dcnode-id="6009" instrument_node="">

</span></th><th colspan="3" data-dcnode-id="5274"><span class="flagicon" data-dcnode-id="5278"><img alt="" class="thumbborder" data-dcnode-id="5280" data-file-height="540" data-file-width="810" decoding="async" height="23" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b7/Flag_of_Europe.svg/35px-Flag_of_Europe.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b7/Flag_of_Europe.svg/53px-Flag_of_Europe.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b7/Flag_of_Europe.svg/70px-Flag_of_Europe.svg.png 2x" width="35"><span data-dcnode-id="5279" instrument_node="">&nbsp;</span></span><a data-dcnode-id="5276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union" title="European Union"><span data-dcnode-id="5277" instrument_node="">European Union</span></a><span data-dcnode-id="5275" instrument_node="">
</span></th><th data-dcnode-id="5266"><span class="flagicon" data-dcnode-id="5270"><img alt="" class="thumbborder" data-dcnode-id="5272" data-file-height="720" data-file-width="960" decoding="async" height="26" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/37/Flag_of_NATO.svg/35px-Flag_of_NATO.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/37/Flag_of_NATO.svg/53px-Flag_of_NATO.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/37/Flag_of_NATO.svg/70px-Flag_of_NATO.svg.png 2x" width="35"><span data-dcnode-id="5271" instrument_node="">&nbsp;</span></span><a data-dcnode-id="5268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="5269" instrument_node="">NATO</span></a><span data-dcnode-id="5267" instrument_node="">
</span></th></tr><tr data-dcnode-id="5231"><th data-dcnode-id="5261"><span data-dcnode-id="5262" instrument_node="">Mutual defence clause
</span></th><td data-dcnode-id="5258" rowspan="6" style="text-align:center"><span data-dcnode-id="5259" instrument_node="">N/A
</span></td><td colspan="2" data-dcnode-id="5245"><a class="extiw" data-dcnode-id="5255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikisource.org/wiki/Consolidated_version_of_the_Treaty_on_European_Union/Title_V%3A_General_Provisions_on_the_Union%2527s_External_Action_Service_and_Specific_Provisions_on_the_Common_Foreign_and_Security_Policy%23Article_42" title="wikisource:Consolidated version of the Treaty on European Union/Title V: General Provisions on the Union's External Action Service and Specific Provisions on the Common Foreign and Security Policy"><span data-dcnode-id="5256" instrument_node="">Article 42.7</span></a><span data-dcnode-id="5254" instrument_node=""> of the </span><a data-dcnode-id="5252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_on_European_Union" title="Treaty on European Union"><span data-dcnode-id="5253" instrument_node="">consolidated version of the Treaty on European Union</span></a><span data-dcnode-id="5251" instrument_node="">:
</span><p data-dcnode-id="5247"><i data-dcnode-id="5249"><span data-dcnode-id="5250" instrument_node="">"If a Member State is the victim of armed aggression on its territory, the other Member States shall have towards it an obligation of aid and assistance by all the means in their power, in accordance with Article 51 of the United Nations Charter. This shall not prejudice the specific character of the security and defence policy of certain Member States. [...]"</span></i><span data-dcnode-id="5248" instrument_node="">
</span></p><span data-dcnode-id="5246" instrument_node="">
</span></td><td data-dcnode-id="5232"><a class="extiw" data-dcnode-id="5242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikisource.org/wiki/North_Atlantic_Treaty%23Article_5" title="wikisource:North Atlantic Treaty"><span data-dcnode-id="5243" instrument_node="">Article 5</span></a><span data-dcnode-id="5241" instrument_node=""> of the </span><a data-dcnode-id="5239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Atlantic_Treaty" title="North Atlantic Treaty"><span data-dcnode-id="5240" instrument_node="">North Atlantic Treaty</span></a><span data-dcnode-id="5238" instrument_node="">:
</span><p data-dcnode-id="5234"><i data-dcnode-id="5236"><span data-dcnode-id="5237" instrument_node="">"The Parties agree that an armed attack against one or more of them [on their territory] shall be considered an attack against them all and consequently they agree that, if such an armed attack occurs, each of them, in exercise of the right of individual or collective self-defence recognised by Article 51 of the Charter of the United Nations, will assist the Party or Parties so attacked by taking forthwith, individually and in concert with the other Parties, such action as it deems necessary, including the use of armed force, to restore and maintain the security of the North Atlantic area. [...]"</span></i><span data-dcnode-id="5235" instrument_node="">
</span></p><span data-dcnode-id="5233" instrument_node="">
</span></td></tr><tr data-dcnode-id="5216"><th data-dcnode-id="5227"><span data-dcnode-id="5228" instrument_node="">Highest civilian/political position
</span></th><td colspan="2" data-dcnode-id="5222"><a data-dcnode-id="5224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/High_Representative_of_the_Union_for_Foreign_Affairs_and_Security_Policy" title="High Representative of the Union for Foreign Affairs and Security Policy"><span data-dcnode-id="5225" instrument_node="">High Representative</span></a><span data-dcnode-id="5223" instrument_node=""> (HR/VP)
</span></td><td data-dcnode-id="5217"><a data-dcnode-id="5219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Secretary_General_of_NATO" title="Secretary General of NATO"><span data-dcnode-id="5220" instrument_node="">Secretary General</span></a><span data-dcnode-id="5218" instrument_node="">
