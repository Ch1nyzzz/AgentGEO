</span><h1 class="fs-huge" data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">NATO’s role in energy security </span></h1><span data-dcnode-id="1724" instrument_node="">
</span><ul class="list-meta" data-dcnode-id="1714"><span data-dcnode-id="1723" instrument_node="">
</span><li data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">Last updated: 23 Jun. 2021 13:35</span></li><span data-dcnode-id="1720" instrument_node="">
</span><li class="last" data-dcnode-id="1716"><span data-dcnode-id="1719" instrument_node="">

</span></li><span data-dcnode-id="1715" instrument_node="">
</span></ul><span data-dcnode-id="1713" instrument_node="">
</span><ul class="list-i18n" data-dcnode-id="1690"><span data-dcnode-id="1712" instrument_node="">
</span><li data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">English</span></li><span data-dcnode-id="1709" instrument_node="">
</span><li data-dcnode-id="1704"><span data-dcnode-id="1708" instrument_node="">
</span><a data-dcnode-id="1706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natohq/topics_49208.htm%3FselectedLocale%3Dfr"><span data-dcnode-id="1707" instrument_node="">French</span></a><span data-dcnode-id="1705" instrument_node="">
</span></li><span data-dcnode-id="1703" instrument_node="">
</span><li data-dcnode-id="1698"><span data-dcnode-id="1702" instrument_node="">
</span><a data-dcnode-id="1700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natohq/topics_49208.htm%3FselectedLocale%3Dru"><span data-dcnode-id="1701" instrument_node="">Russian</span></a><span data-dcnode-id="1699" instrument_node="">

</span><li data-dcnode-id="1692"><span data-dcnode-id="1696" instrument_node="">
</span><a data-dcnode-id="1694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natohq/topics_49208.htm%3FselectedLocale%3Duk"><span data-dcnode-id="1695" instrument_node="">Ukrainian</span></a><span data-dcnode-id="1693" instrument_node="">

</span><div class="socialbar" data-dcnode-id="1679"><span data-dcnode-id="1688" instrument_node="">
</span><span data-dcnode-id="1686" instrument_node="">
</span><a class="icon icon-facebook" data-dcnode-id="1685" data-utm-medium="smcweb" data-utm-source="facebook" href="#"></a><span data-dcnode-id="1684" instrument_node="">
</span><a class="icon icon-twitter" data-dcnode-id="1683" data-utm-medium="smcweb" data-utm-source="twitter" href="#"></a><span data-dcnode-id="1682" instrument_node="">
</span><a class="icon icon-linkedin" data-dcnode-id="1681" data-utm-medium="smcweb" data-utm-source="linkedin" href="#"></a><span data-dcnode-id="1680" instrument_node="">
</span></div><span data-dcnode-id="1678" instrument_node=""> </span><span data-dcnode-id="1676" instrument_node="">
</span><section class="content cf" data-dcnode-id="1521"><span data-dcnode-id="1675" instrument_node="">
</span><p class="introtxt" data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">Energy security plays an important role in the common security of NATO Allies. The disruption of energy supply could affect security within the societies of NATO member and partner countries, and have an impact on NATO's military operations. While these issues are primarily the responsibility of national governments, NATO Allies regularly consult on energy security to enhance Allied awareness and resilience. NATO seeks to enhance its strategic awareness of energy developments with security implications; develop its capacity to support the protection of critical energy infrastructure; and ensure reliable energy supplies to the military.</span></p><span data-dcnode-id="1672" instrument_node="">
</span><div class="box box-media box-media--stretched" data-dcnode-id="1666"><span data-dcnode-id="1671" instrument_node="">
</span><span data-dcnode-id="1669" instrument_node="">
</span><img alt="" data-dcnode-id="1668" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/nato_static_fl2014/assets/pictures/topics_graphics/energy-security.jpg&amp;raw"><span data-dcnode-id="1667" instrument_node="">
</span></div><span data-dcnode-id="1665" instrument_node="">
</span><div data-dcnode-id="1639"><span data-dcnode-id="1664" instrument_node="">
</span><p data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1661" instrument_node="">
</span><div class="box--highlight" data-dcnode-id="1641"><span data-dcnode-id="1660" instrument_node="">
</span><ul data-dcnode-id="1649"><span data-dcnode-id="1659" instrument_node="">
</span><li data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">NATO’s role in energy security was first defined in 2008 at the Bucharest Summit and has since been strengthened. The NATO Energy Security Centre of Excellence in Vilnius, Lithuania has been supporting NATO’s work on energy security since 2012.</span></li><span data-dcnode-id="1656" instrument_node="">
</span><li data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">Energy security is a vital element of resilience and has become more important due to the emerging security challenges, such as cyber and hybrid threats to infrastructure.</span></li><span data-dcnode-id="1653" instrument_node="">
</span><li data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">In times of the global energy transition, energy efficiency and innovative energy solutions help the military to become more sustainable, while maintaining operational effectiveness.</span></li><span data-dcnode-id="1650" instrument_node="">
</span></ul><span data-dcnode-id="1648" instrument_node="">
</span><div data-dcnode-id="1643"><span data-dcnode-id="1647" instrument_node="">
</span><div data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">&nbsp;</span></div><span data-dcnode-id="1644" instrument_node="">
</span></div><span data-dcnode-id="1642" instrument_node="">
</span></div><span data-dcnode-id="1640" instrument_node="">
</span></div><span data-dcnode-id="1638" instrument_node="">
</span><div class="accordion-wrapper" data-dcnode-id="1572"><span data-dcnode-id="1637" instrument_node="">
</span><ul class="accordion" data-dcnode-id="1574"><span data-dcnode-id="1636" instrument_node="">
</span><li data-dcnode-id="1576"><span data-dcnode-id="1635" instrument_node="">
</span><h2 data-dcnode-id="1631"><a data-dcnode-id="1632" href="#"><span class="icon icon-arrow_accordion" data-dcnode-id="1634"></span><span data-dcnode-id="1633" instrument_node="">Activities</span></a></h2><span data-dcnode-id="1630" instrument_node="">
</span><div class="accordion-content" data-dcnode-id="1579"><span data-dcnode-id="1629" instrument_node="">
</span><div class="inner-content" data-dcnode-id="1581"><p data-dcnode-id="1626"><strong data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">Enhancing strategic awareness of the security implications of energy developments</span></strong></p><span data-dcnode-id="1625" instrument_node="">
</span><p data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">While NATO is not an energy institution, energy developments affect the international security environment and can have far-reaching security implications for some Allies. Given the global energy transition, a stable and reliable energy supply, the diversification of routes, suppliers and energy resources, and the interconnectivity of energy networks remain critically important for increased resilience.</span></p><span data-dcnode-id="1622" instrument_node="">
</span><p data-dcnode-id="1617"><span data-dcnode-id="1621" instrument_node="">NATO closely follows relevant energy trends and developments, and seeks to raise its strategic awareness in this area. This includes consultations on energy security among Allies and partner countries, enhancing intelligence-sharing and assessments, and expanding links with relevant international organisations, such as the International Energy Agency and the European Union. NATO also organises specific events, such as workshops, table-top exercises and briefings by external experts. Of particular importance in this regard are the North Atlantic Council’s bi-annual meetings on regional and global energy developments, NATO’s Annual Roundtable on Energy Security, as well as the annual </span><a data-dcnode-id="1619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.natoschool.nato.int/Academics/Resident-Courses/Course-Catalogue/Course-description%3FID%3D134"><span data-dcnode-id="1620" instrument_node="">Energy Security Strategic Awareness Course</span></a><span data-dcnode-id="1618" instrument_node=""> at the NATO School in Oberammergau, Germany.</span></p><span data-dcnode-id="1616" instrument_node="">
</span><p data-dcnode-id="1613"><strong data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">Supporting the protection of critical energy infrastructure</span></strong></p><span data-dcnode-id="1612" instrument_node="">
</span><p data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">All countries rely on energy infrastructure, for security. Energy infrastructure is also one of the most vulnerable assets, especially in areas of conflict. Since infrastructure networks extend beyond borders, attacks on complex energy infrastructure by hostile states, terrorists or hacktivists can have repercussions across regions. Since electricity is key to the global energy transition, power infrastructure security is becoming the cornerstone of energy security. For this reason, NATO seeks to increase its competence in supporting the protection of critical energy infrastructure, mainly through training and exercises.</span></p><span data-dcnode-id="1609" instrument_node="">
</span><p data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">Protecting energy infrastructure is primarily a national responsibility. However, since NATO forces are dependent on civilian energy infrastructure, it is important that Allies strengthen their infrastructure to take account of NATO’s requirements. Moreover, NATO organises exercises and exchanges best practices with partner countries, many of which are important energy producers or transit countries, and with other international institutions and the private sector. Since 2018, the NATO-Istanbul Cooperation Initiative (ICI) Regional Centre has been hosting the training course on the protection of critical energy infrastructure.</span></p><span data-dcnode-id="1606" instrument_node="">
</span><p data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">By protecting important sea lanes, NATO's counter-piracy operations have also made an indirect contribution to energy security. Furthermore, NATO is also supporting national authorities in enhancing their resilience against energy supply disruptions that could affect national and collective defence.</span></p><span data-dcnode-id="1603" instrument_node="">
</span><p data-dcnode-id="1600"><strong data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">Ensuring energy supply to the military</span></strong></p><span data-dcnode-id="1599" instrument_node="">
</span><p data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">Energy supplies to the military must be secured at all times. Since the military depends on civilian energy networks, it is important to ensure the security of critical energy infrastructures and supply chains, and develop innovative, resilient, efficient and autonomous energy solutions for the military, such as dedicated micro-grids with hybrid power generation.</span></p><span data-dcnode-id="1596" instrument_node="">
</span><p data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">In addition, the high fuel demand of combat forces can diminish their performance, increase their vulnerability, and may require the diverting of combat forces to protect supply lines. Hence, increased energy efficiency could offer benefits in terms of combat power and agility. In light of the global energy transition, NATO seeks to enhance energy efficiency and sustainability in the military while maintaining operational effectiveness.</span></p><span data-dcnode-id="1593" instrument_node="">
</span><p data-dcnode-id="1588"><span data-dcnode-id="1592" instrument_node="">NATO’s “</span><a data-dcnode-id="1590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//natolibguides.info/smartenergy"><span data-dcnode-id="1591" instrument_node="">Smart Energy</span></a><span data-dcnode-id="1589" instrument_node="">” work in this regard focuses on reducing the consumption of fossil fuels in deployed force infrastructure (i.e. camps), resulting in more autonomy, a lesser logistical burden and a smaller environmental footprint.</span></p><span data-dcnode-id="1587" instrument_node="">
</span><p data-dcnode-id="1582"><span data-dcnode-id="1586" instrument_node="">Allies are also reviewing the fuel supply chain, which includes the </span><a data-dcnode-id="1584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nspa.nato.int/about/ceps"><span data-dcnode-id="1585" instrument_node="">Central Europe Pipeline System</span></a><span data-dcnode-id="1583" instrument_node="">, to ensure reliable energy supplies to NATO forces across the Alliance in a more demanding security environment.</span></p></div><span data-dcnode-id="1580" instrument_node="">
</span></div><span data-dcnode-id="1577" instrument_node="">
</span></li><span data-dcnode-id="1575" instrument_node="">
</span></ul><span data-dcnode-id="1573" instrument_node="">
</span></div><span data-dcnode-id="1571" instrument_node="">
</span><div class="accordion-wrapper" data-dcnode-id="1523"><span data-dcnode-id="1570" instrument_node="">
</span><ul class="accordion" data-dcnode-id="1525"><span data-dcnode-id="1569" instrument_node="">
</span><li data-dcnode-id="1527"><span data-dcnode-id="1568" instrument_node="">
</span><h2 data-dcnode-id="1564"><a data-dcnode-id="1565" href="#"><span class="icon icon-arrow_accordion" data-dcnode-id="1567"></span><span data-dcnode-id="1566" instrument_node="">Evolution</span></a></h2><span data-dcnode-id="1563" instrument_node="">
</span><div class="accordion-content" data-dcnode-id="1530"><span data-dcnode-id="1562" instrument_node="">
</span><div class="inner-content" data-dcnode-id="1532"><p data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">At the Bucharest Summit in 2008, Allies agreed a report on "NATO's Role in Energy Security", which identified guiding principles and outlined options and recommendations for further activities. These were reiterated at subsequent summits, while at the same time giving NATO's role clearer focus and direction.</span></p><span data-dcnode-id="1559" instrument_node="">
</span><p data-dcnode-id="1554"><span data-dcnode-id="1558" instrument_node="">The 2010 Strategic Concept, the setting up of an Energy Security Section in the Emerging Security Challenges Division at NATO Headquarters that same year, and the accreditation of the </span><a data-dcnode-id="1556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//enseccoe.org/en"><span data-dcnode-id="1557" instrument_node="">NATO Energy Security Centre of Excellence</span></a><span data-dcnode-id="1555" instrument_node=""> in Lithuania in 2012 were major milestones in this process.</span></p><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1548"><span data-dcnode-id="1552" instrument_node="">The decision of Allies to "</span><em data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">integrate … energy security considerations in NATO's policies and activities</span></em><span data-dcnode-id="1549" instrument_node="">" (2010 Lisbon Summit Declaration) also meant the need for NATO to reflect energy security in its education and training efforts, as well as in its exercise scenarios. Since then, several exercises have included energy-related developments, and dedicated training courses have been stood up, both nationally and at the NATO School in Oberammergau.</span></p><span data-dcnode-id="1547" instrument_node="">
</span><p data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">At the Brussels Summit in July 2018, Allies underlined the important role energy security plays in their common security and agreed that it is essential to ensure that the members of the Alliance are not vulnerable to political or economic manipulation. In November 2019, Allies agreed a set of recommendations on consolidating NATO's role in energy security, which included a stronger focus on how to ensure a viable fuel supply to the military across the Alliance.</span></p><span data-dcnode-id="1544" instrument_node="">
</span><p data-dcnode-id="1539"><span data-dcnode-id="1543" instrument_node="">In March 2021, the Allies endorsed NATO's Climate Change and Security Agenda and, at the Brussels Summit in June, the </span><a data-dcnode-id="1541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natohq/topics_91048.htm"><span data-dcnode-id="1542" instrument_node="">Action Plan</span></a><span data-dcnode-id="1540" instrument_node=""> to implement it. This Agenda and Action Plan will help to boost NATO's efforts to increase military energy efficiency while maintaining operational effectiveness.</span></p><span data-dcnode-id="1538" instrument_node="">
</span><p data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">In the years to come, NATO Allies will continue to seek diversification in energy supplies, further enhance the strategic dialogue both among Allies and with partner countries, offer more education and training opportunities, and deepen ties with other international organisations, academia and the private sector.</span></p><span data-dcnode-id="1535" instrument_node="">
</span><p data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">Work on enhancing the resilience of energy, particularly electricity, infrastructure – including in hybrid scenarios – will also be given greater attention. With increased awareness of energy risks, enhanced capacity to support infrastructure protection, and a more energy-efficient military, NATO will be better prepared to respond to the security challenges of the 21st century.</span></p></div><span data-dcnode-id="1531" instrument_node="">
</span></div><span data-dcnode-id="1528" instrument_node="">
</span></li><span data-dcnode-id="1526" instrument_node="">

</span><span class="teaser-txt" data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">If you asked a man in the street in Europe whether he thought Ukraine should pay the market price for gas, he would probably have few strong feelings on the issue. However, if you told him that this question could decide whether his home would be warm or freezing in winter, he would probably show more interest. In this edition, we look at what effect Russia's manoeuvres in Ukraine could have further down the pipeline.</span></span><span data-dcnode-id="1202" instrument_node="">

</span><span class="teaser-txt" data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Many saw Russia's annexation of Crimea as a land grab, or securing a base for its Black Sea fleet, or just part of a plan to destabilize Ukraine. But there are major energy consequences too, as Frank Umbach explains.</span></span><span data-dcnode-id="1140" instrument_node="">

</span><span class="teaser-txt" data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">A possible energy standoff between Russia and the EU would be playing for high stakes. Europe could lose around a third of its energy supplies. Russia could lose about half of its state budget. Who should blink first - and why?</span></span><span data-dcnode-id="1109" instrument_node="">

</span><span class="teaser-txt" data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">The Ukraine-crisis has once again underlined Europe’s vulnerability due to its overdependence on Russian energy supplies. Europe is vulnerable in the short-term, but Russia has more to lose in the medium- and long-term. Could the crisis be an opportunity to further weaken Russia’s stranglehold over Europe’s energy sector?</span></span><span data-dcnode-id="1078" instrument_node="">

</span><span class="teaser-txt" data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">It's not yet clear how the events in Ukraine will impact on Europe's energy security. Or if it will change European priorities vis-à-vis renewable energy. So we asked our NATO Review cartoonist, Rytis Daukantas, to give us a sideways view of what he thought the potential changes could look like.</span></span><span data-dcnode-id="1047" instrument_node="">

</span><span class="teaser-txt" data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">A politico-military organization like NATO is not necessarily in its comfort zone when dealing with commercial energy deals, major pipeline projects and fossil fuel diversification. But as energy becomes an increasingly potent weapon in conflicts which can have a major impact on most of NATO's members, it's time for the Alliance to learn what it can do.</span></span><span data-dcnode-id="1016" instrument_node="">
