l text" data-dcnode-id="5944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//odkb-csto.org/" rel="nofollow"><span data-dcnode-id="5945" instrument_node="">odkb-csto.org</span></a></td></tr></tbody></table><span data-dcnode-id="5939" instrument_node="">
</span><p data-dcnode-id="5881"><span data-dcnode-id="5938" instrument_node="">The </span><b data-dcnode-id="5936"><span data-dcnode-id="5937" instrument_node="">Collective Security Treaty Organization</span></b><span data-dcnode-id="5935" instrument_node=""> (</span><b data-dcnode-id="5933"><span data-dcnode-id="5934" instrument_node="">CSTO</span></b><span data-dcnode-id="5932" instrument_node="">; </span><a data-dcnode-id="5930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_language" title="Russian language"><span data-dcnode-id="5931" instrument_node="">Russian</span></a><span data-dcnode-id="5929" instrument_node="">: </span><span data-dcnode-id="5927" lang="ru"><span data-dcnode-id="5928" instrument_node="">Организация Договора о коллективной безопасности</span></span><span data-dcnode-id="5926" instrument_node="">, </span><small data-dcnode-id="5922"><a data-dcnode-id="5924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Romanization_of_Russian" title="Romanization of Russian"><span data-dcnode-id="5925" instrument_node="">romanized</span></a><span data-dcnode-id="5923" instrument_node="">:&nbsp;</span></small><span data-dcnode-id="5919" title="Russian-language romanization"><i data-dcnode-id="5920" lang="ru-Latn"><span data-dcnode-id="5921" instrument_node="">Organizatsiya Dogovora o kollektivnoy bezopasnosti</span></i></span><span data-dcnode-id="5918" instrument_node="">; </span><a data-dcnode-id="5916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_language" title="Russian language"><span data-dcnode-id="5917" instrument_node="">Russian</span></a><span data-dcnode-id="5915" instrument_node="">: </span><span data-dcnode-id="5913" lang="ru"><span data-dcnode-id="5914" instrument_node="">ОДКБ</span></span><span data-dcnode-id="5912" instrument_node="">, </span><small data-dcnode-id="5908"><a data-dcnode-id="5910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Romanization_of_Russian" title="Romanization of Russian"><span data-dcnode-id="5911" instrument_node="">romanized</span></a><span data-dcnode-id="5909" instrument_node="">:&nbsp;</span></small><span data-dcnode-id="5905" title="Russian-language romanization"><i data-dcnode-id="5906" lang="ru-Latn"><span data-dcnode-id="5907" instrument_node="">ODKB</span></i></span><span data-dcnode-id="5904" instrument_node="">) is an </span><a data-dcnode-id="5902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intergovernmental_organization" title="Intergovernmental organization"><span data-dcnode-id="5903" instrument_node="">intergovernmental</span></a><span data-dcnode-id="5901" instrument_node=""> </span><a data-dcnode-id="5899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Military_alliance" title="Military alliance"><span data-dcnode-id="5900" instrument_node="">military alliance</span></a><span data-dcnode-id="5898" instrument_node=""> in </span><a data-dcnode-id="5896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eurasia" title="Eurasia"><span data-dcnode-id="5897" instrument_node="">Eurasia</span></a><span data-dcnode-id="5895" instrument_node="">. CSTO consists of select </span><a data-dcnode-id="5893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Post-Soviet_states" title="Post-Soviet states"><span data-dcnode-id="5894" instrument_node="">post-Soviet states</span></a><span data-dcnode-id="5892" instrument_node="">. The treaty had its origins in the </span><a data-dcnode-id="5890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Armed_Forces" title="Soviet Armed Forces"><span data-dcnode-id="5891" instrument_node="">Soviet Armed Forces</span></a><span data-dcnode-id="5889" instrument_node="">, which was gradually replaced by the United Armed Forces of the Commonwealth of Independent States. On 15 May 1992, six post-Soviet states belonging to the </span><a data-dcnode-id="5887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Commonwealth_of_Independent_States" title="Commonwealth of Independent States"><span data-dcnode-id="5888" instrument_node="">Commonwealth of Independent States</span></a><span data-dcnode-id="5886" instrument_node=""> — Russia, Armenia, Kazakhstan, Kyrgyzstan, Tajikistan, and Uzbekistan—signed the Collective Security Treaty (also referred to as the Tashkent Pact or Tashkent Treaty).</span><sup class="reference" data-dcnode-id="5883" id="cite_ref-4"><a data-dcnode-id="5884" href="#cite_note-4"><span data-dcnode-id="5885" instrument_node="">[3]</span></a></sup><span data-dcnode-id="5882" instrument_node="">
</span></p><p data-dcnode-id="5875"><span data-dcnode-id="5880" instrument_node="">Three other post-Soviet states—Azerbaijan, Belarus, and Georgia—signed in 1993 and the treaty took effect in 1994. In 1999, six of the nine—all but Azerbaijan, Georgia, and Uzbekistan—agreed to renew the treaty for five more years. In 2002, those six agreed to create the Collective Security Treaty Organization as a military alliance.</span><sup class="reference" data-dcnode-id="5877" id="cite_ref-:0_5-0"><a data-dcnode-id="5878" href="#cite_note-:0-5"><span data-dcnode-id="5879" instrument_node="">[4]</span></a></sup><span data-dcnode-id="5876" instrument_node="">
</span></p><p data-dcnode-id="5859"><span data-dcnode-id="5874" instrument_node="">The CSTO charter reaffirmed the desire of all participating states to abstain from the use or threat of force. Signatories would not be able to join other military alliances.</span><sup class="reference" data-dcnode-id="5871" id="cite_ref-6"><a data-dcnode-id="5872" href="#cite_note-6"><span data-dcnode-id="5873" instrument_node="">[5]</span></a></sup><span data-dcnode-id="5870" instrument_node=""> Similar to Article 5 of the </span><a data-dcnode-id="5868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Atlantic_Treaty" title="North Atlantic Treaty"><span data-dcnode-id="5869" instrument_node="">North Atlantic Treaty</span></a><span data-dcnode-id="5867" instrument_node="">, Article 4 of the Collective Security Treaty establishes that an aggression against one signatory would be perceived as an aggression against all. The CSTO holds yearly military command exercises for the CSTO nations to have an opportunity to improve inter-organization cooperation. A CSTO military exercise called "Rubezh 2008" was hosted in </span><a data-dcnode-id="5865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Armenia" title="Armenia"><span data-dcnode-id="5866" instrument_node="">Armenia</span></a><span data-dcnode-id="5864" instrument_node="">, where a combined total of 4,000 troops from all seven constituent CSTO member countries conducted operative, strategic and tactical training with an emphasis towards furthering efficiency of the collective security element of the CSTO partnership.</span><sup class="reference" data-dcnode-id="5861" id="cite_ref-7"><a data-dcnode-id="5862" href="#cite_note-7"><span data-dcnode-id="5863" instrument_node="">[6]</span></a></sup><span data-dcnode-id="5860" instrument_node="">
</span></p><p data-dcnode-id="5845"><span data-dcnode-id="5858" instrument_node="">The largest of such exercises was held in Southern Russia and central Asia in 2011, consisting of more than 10,000 troops and 70 combat aircraft.</span><sup class="reference" data-dcnode-id="5855" id="cite_ref-8"><a data-dcnode-id="5856" href="#cite_note-8"><span data-dcnode-id="5857" instrument_node="">[7]</span></a></sup><span data-dcnode-id="5854" instrument_node=""> In order to deploy military bases of a third country in the territory of the CSTO member-states, it is necessary to obtain the official consent of all its members.</span><sup class="reference" data-dcnode-id="5851" id="cite_ref-thehindu.com_9-0"><a data-dcnode-id="5852" href="#cite_note-thehindu.com-9"><span data-dcnode-id="5853" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5850" instrument_node=""> It also employs a "rotating presidency" system in which the country leading the CSTO alternates every year.</span><sup class="reference" data-dcnode-id="5847" id="cite_ref-10"><a data-dcnode-id="5848" href="#cite_note-10"><span data-dcnode-id="5849" instrument_node="">[9]</span></a></sup><span data-dcnode-id="5846" instrument_node="">
</span></p><span data-dcnode-id="5844" instrument_node="">

p;url=https%3A//en.wikipedia.org/wiki/Commonwealth_of_Independent_States" shape="rect" title="Commonwealth of Independent States"><area alt="Commonwealth of Independent States Free Trade Area" coords="22,218,68,231" data-dcnode-id="5636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Commonwealth_of_Independent_States_Free_Trade_Area" shape="rect" title="Commonwealth of Independent States Free Trade Area"><area alt="Baltic Assembly" coords="34,287,138,301" data-dcnode-id="5635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baltic_Assembly" shape="rect" title="Baltic Assembly"><area alt="Lithuania" coords="28,308,68,338" data-dcnode-id="5634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lithuania" shape="rect" title="Lithuania"><area alt="Latvia" coords="71,308,111,338" data-dcnode-id="5633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Latvia" shape="rect" title="Latvia"><area alt="Estonia" coords="114,308,154,338" data-dcnode-id="5632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Estonia" shape="rect" title="Estonia"><area alt="Community for Democracy and Rights of Nations" coords="177,285,292,338" data-dcnode-id="5631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Community_for_Democracy_and_Rights_of_Nations" shape="rect" title="Community for Democracy and Rights of Nations"><area alt="Transnistria" coords="295,314,332,345" data-dcnode-id="5630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Transnistria" shape="rect" title="Transnistria"><area alt="Abkhazia" coords="338,314,375,345" data-dcnode-id="5629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abkhazia" shape="rect" title="Abkhazia"><area alt="South Ossetia" coords="338,280,375,311" data-dcnode-id="5628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Ossetia" shape="rect" title="South Ossetia"><area alt="Republic of Artsakh" coords="295,280,332,311" data-dcnode-id="5627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republic_of_Artsakh" shape="rect" title="Republic of Artsakh"></map><img alt="" class="thumbimage" data-dcnode-id="5625" data-file-height="600" data-file-width="650" decoding="async" height="369" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/fa/Supranational_PostSoviet_Bodies-en.svg/400px-Supranational_PostSoviet_Bodies-en.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/fa/Supranational_PostSoviet_Bodies-en.svg/600px-Supranational_PostSoviet_Bodies-en.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/fa/Supranational_PostSoviet_Bodies-en.svg/800px-Supranational_PostSoviet_Bodies-en.svg.png 2x" usemap="#ImageMap_8a3823c6da86510b" width="400"></div><span data-dcnode-id="5623" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5603"><div class="magnify" data-dcnode-id="5621"><a class="internal" data-dcnode-id="5622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASupranational_PostSoviet_Bodies-en.svg" title="Enlarge"></a></div><span data-dcnode-id="5620" instrument_node="">An </span><a data-dcnode-id="5618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Euler_diagram" title="Euler diagram"><span data-dcnode-id="5619" instrument_node="">Euler diagram</span></a><span data-dcnode-id="5617" instrument_node=""> showing the relationships among various supranational organisations in the territory of the former Soviet Union</span><span data-dcnode-id="5604" style="float:right; font-weight:normal; font-size:xx-small;"><a data-dcnode-id="5614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Template%3ASupranational_PostSoviet_Bodies" title="Template:Supranational PostSoviet Bodies"><span data-dcnode-id="5615" title="View this template"><span data-dcnode-id="5616" instrument_node="">v</span></span></a><span data-dcnode-id="5613" instrument_node=""> • </span><a data-dcnode-id="5610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Template_talk%3ASupranational_PostSoviet_Bodies" title="Template talk:Supranational PostSoviet Bodies"><span data-dcnode-id="5611" title="Discuss this template"><span data-dcnode-id="5612" instrument_node="">d</span></span></a><span data-dcnode-id="5609" instrument_node=""> • </span><a class="external text" data-dcnode-id="5606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTemplate%3ASupranational_PostSoviet_Bodies%26action%3Dedit"><span data-dcnode-id="5607" style=";" title="Edit this template"><span data-dcnode-id="5608" instrument_node="">e</span></span></a><span data-dcnode-id="5605" instrument_node=""> </span></span></div></div></div><span data-dcnode-id="5600" instrument_node="">
</span><p data-dcnode-id="5561"><span data-dcnode-id="5599" instrument_node="">The CSTO grew out of the framework of the </span><a data-dcnode-id="5597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Commonwealth_of_Independent_States" title="Commonwealth of Independent States"><span data-dcnode-id="5598" instrument_node="">Commonwealth of Independent States</span></a><span data-dcnode-id="5596" instrument_node="">, and first began as the CIS Collective Security Treaty (CST) which was signed on 15 May 1992, by </span><a data-dcnode-id="5594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Armenia" title="Armenia"><span data-dcnode-id="5595" instrument_node="">Armenia</span></a><span data-dcnode-id="5593" instrument_node="">, </span><a data-dcnode-id="5591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kazakhstan" title="Kazakhstan"><span data-dcnode-id="5592" instrument_node="">Kazakhstan</span></a><span data-dcnode-id="5590" instrument_node="">, </span><a data-dcnode-id="5588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kyrgyzstan" title="Kyrgyzstan"><span data-dcnode-id="5589" instrument_node="">Kyrgyzstan</span></a><span data-dcnode-id="5587" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="5585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Federation" title="Russian Federation"><span data-dcnode-id="5586" instrument_node="">Russian Federation</span></a><span data-dcnode-id="5584" instrument_node="">, </span><a data-dcnode-id="5582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tajikistan" title="Tajikistan"><span data-dcnode-id="5583" instrument_node="">Tajikistan</span></a><span data-dcnode-id="5581" instrument_node=""> and </span><a data-dcnode-id="5579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uzbekistan" title="Uzbekistan"><span data-dcnode-id="5580" instrument_node="">Uzbekistan</span></a><span data-dcnode-id="5578" instrument_node="">, in the city of </span><a data-dcnode-id="5576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tashkent" title="Tashkent"><span data-dcnode-id="5577" instrument_node="">Tashkent</span></a><span data-dcnode-id="5575" instrument_node="">. </span><a data-dcnode-id="5573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Azerbaijan" title="Azerbaijan"><span data-dcnode-id="5574" instrument_node="">Azerbaijan</span></a><span data-dcnode-id="5572" instrument_node=""> signed the treaty on 24 September 1993, </span><a data-dcnode-id="5570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Georgia_%28country%29" title="Georgia (country)"><span data-dcnode-id="5571" instrument_node="">Georgia</span></a><span data-dcnode-id="5569" instrument_node=""> on 9 December and </span><a data-dcnode-id="5567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Belarus" title="Belarus"><span data-dcnode-id="5568" instrument_node="">Belarus</span></a><span data-dcnode-id="5566" instrument_node=""> on 31 December. The treaty came into effect on 20 April 1994.</span><sup class="reference" data-dcnode-id="5563" id="cite_ref-:0_5-1"><a data-dcnode-id="5564" href="#cite_note-:0-5"><span data-dcnode-id="5565" instrument_node="">[4]</span></a></sup><span data-dcnode-id="5562" instrument_node="">
</span></p><p data-dcnode-id="5542"><span data-dcnode-id="5560" instrument_node="">The CSTO was set to last for a 5-year period unless extended. On 2 April 1999, six members of the CST signed a protocol renewing the treaty for another five-year period – Azerbaijan, Georgia and Uzbekistan refused to sign and withdrew from the treaty instead.</span><sup class="reference" data-dcnode-id="5557" id="cite_ref-:0_5-2"><a data-dcnode-id="5558" href="#cite_note-:0-5"><span data-dcnode-id="5559" instrument_node="">[4]</span></a></sup><span data-dcnode-id="5556" instrument_node=""> At the same time Uzbekistan joined the </span><a data-dcnode-id="5554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/GUAM_Organization_for_Democracy_and_Economic_Development" title="GUAM Organization for Democracy and Economic Development"><span data-dcnode-id="5555" instrument_node="">GUAM</span></a><span data-dcnode-id="5553" instrument_node=""> group, established in 1997 by Georgia, </span><a data-dcnode-id="5551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukraine" title="Ukraine"><span data-dcnode-id="5552" instrument_node="">Ukraine</span></a><span data-dcnode-id="5550" instrument_node="">, Azerbaijan, and </span><a data-dcnode-id="5548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moldova" title="Moldova"><span data-dcnode-id="5549" instrument_node="">Moldova</span></a><span data-dcnode-id="5547" instrument_node="">, and largely seen as intending to counter Russian influence in the region.</span><sup class="reference" data-dcnode-id="5544" id="cite_ref-11"><a data-dcnode-id="5545" href="#cite_note-11"><span data-dcnode-id="5546" instrument_node="">[10]</span></a></sup><span data-dcnode-id="5543" instrument_node="">
</span></p><span data-dcnode-id="5541" instrument_node="">
</span><h3 data-dcnode-id="5531"><span class="mw-headline" data-dcnode-id="5539" id="2005_and_later"><span data-dcnode-id="5540" instrument_node="">2005 and later</span></span><span class="mw-editsection" data-dcnode-id="5532"><span class="mw-editsection-bracket" data-dcnode-id="5537"><span data-dcnode-id="5538" instrument_node="">[</span></span><a data-dcnode-id="5535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCollective_Security_Treaty_Organization%26action%3Dedit%26section%3D3" title="Edit section: 2005 and later"><span data-dcnode-id="5536" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5533"><span data-dcnode-id="5534" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5530" instrument_node="">
</span><p data-dcnode-id="5525"><span data-dcnode-id="5529" instrument_node="">During 2005, the CSTO partners conducted some common </span><a data-dcnode-id="5527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Military_exercise" title="Military exercise"><span data-dcnode-id="5528" instrument_node="">military exercises</span></a><span data-dcnode-id="5526" instrument_node="">.
</span></p><p data-dcnode-id="5519"><span data-dcnode-id="5524" instrument_node="">Uzbekistan later withdrew from GUAM in 2005 and joined the CSTO in 2006 as a full member and its membership was later ratified by the Uzbek parliament on 28 March 2008.</span><sup class="reference" data-dcnode-id="5521" id="cite_ref-12"><a data-dcnode-id="5522" href="#cite_note-12"><span data-dcnode-id="5523" instrument_node="">[11]</span></a></sup><span data-dcnode-id="5520" instrument_node="">
</span></p><p data-dcnode-id="5514"><span data-dcnode-id="5518" instrument_node="">In June 2007, </span><a data-dcnode-id="5516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kyrgyzstan" title="Kyrgyzstan"><span data-dcnode-id="5517" instrument_node="">Kyrgyzstan</span></a><span data-dcnode-id="5515" instrument_node=""> assumed the rotating CSTO presidency.
</span></p><p data-dcnode-id="5502"><span data-dcnode-id="5513" instrument_node="">In October 2007, the CSTO signed an agreement with the </span><a data-dcnode-id="5511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shanghai_Cooperation_Organisation" title="Shanghai Cooperation Organisation"><span data-dcnode-id="5512" instrument_node="">Shanghai Cooperation Organisation</span></a><span data-dcnode-id="5510" instrument_node=""> (SCO), in the Tajik capital of </span><a data-dcnode-id="5508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dushanbe" title="Dushanbe"><span data-dcnode-id="5509" instrument_node="">Dushanbe</span></a><span data-dcnode-id="5507" instrument_node="">, to broaden cooperation on issues such as security, crime, and drug trafficking.</span><sup class="reference" data-dcnode-id="5504" id="cite_ref-13"><a data-dcnode-id="5505" href="#cite_note-13"><span data-dcnode-id="5506" instrument_node="">[12]</span></a></sup><span data-dcnode-id="5503" instrument_node="">
</span></p><p data-dcnode-id="5493"><span data-dcnode-id="5501" instrument_node="">On 6 October 2007, CSTO members agreed to a major expansion of the organization that would create a CSTO peacekeeping force that could deploy under a </span><a class="mw-redirect" data-dcnode-id="5499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.N." title="U.N."><span data-dcnode-id="5500" instrument_node="">U.N.</span></a><span data-dcnode-id="5498" instrument_node=""> mandate or without one in its member states. The expansion would also allow all members to purchase Russian weapons at the same price as Russia.</span><sup class="reference" data-dcnode-id="5495" id="cite_ref-14"><a data-dcnode-id="5496" href="#cite_note-14"><span data-dcnode-id="5497" instrument_node="">[13]</span></a></sup><span data-dcnode-id="5494" instrument_node="">
</span></p><p data-dcnode-id="5481"><span data-dcnode-id="5492" instrument_node="">On 29 August 2008, Russia announced it would seek CSTO recognition of the independence of </span><a data-dcnode-id="5490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abkhazia" title="Abkhazia"><span data-dcnode-id="5491" instrument_node="">Abkhazia</span></a><span data-dcnode-id="5489" instrument_node=""> and </span><a data-dcnode-id="5487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Ossetia" title="South Ossetia"><span data-dcnode-id="5488" instrument_node="">South Ossetia</span></a><span data-dcnode-id="5486" instrument_node="">. Three days earlier, on 26 August, Russia recognized the independence of Georgia's breakaway regions of Abkhazia and South Ossetia.</span><sup class="reference" data-dcnode-id="5483" id="cite_ref-15"><a data-dcnode-id="5484" href="#cite_note-15"><span data-dcnode-id="5485" instrument_node="">[14]</span></a></sup><span data-dcnode-id="5482" instrument_node="">
</span></p><p data-dcnode-id="5466"><span data-dcnode-id="5480" instrument_node="">On 5 September 2008, </span><a data-dcnode-id="5478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Armenia" title="Armenia"><span data-dcnode-id="5479" instrument_node="">Armenia</span></a><span data-dcnode-id="5477" instrument_node=""> assumed the rotating CSTO presidency during a CSTO meeting in </span><a data-dcnode-id="5475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moscow" title="Moscow"><span data-dcnode-id="5476" instrument_node="">Moscow</span></a><span data-dcnode-id="5474" instrument_node="">, </span><a data-dcnode-id="5472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russia" title="Russia"><span data-dcnode-id="5473" instrument_node="">Russia</span></a><span data-dcnode-id="5471" instrument_node="">.</span><sup class="reference" data-dcnode-id="5468" id="cite_ref-16"><a data-dcnode-id="5469" href="#cite_note-16"><span data-dcnode-id="5470" instrument_node="">[15]</span></a></sup><span data-dcnode-id="5467" instrument_node="">
</span></p><p data-dcnode-id="5453"><span data-dcnode-id="5465" instrument_node="">In 2009, Belarus boycotted the CSTO summit due to their </span><a data-dcnode-id="5463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Milk_War" title="Milk War"><span data-dcnode-id="5464" instrument_node="">Milk War</span></a><span data-dcnode-id="5462" instrument_node=""> with Russia.</span><sup class="reference" data-dcnode-id="5459" id="cite_ref-17"><a data-dcnode-id="5460" href="#cite_note-17"><span data-dcnode-id="5461" instrument_node="">[16]</span></a></sup><span data-dcnode-id="5458" instrument_node=""> After refusing to attend a CSTO summit in 2009, Lukashenko said: "Why should my men fight in Kazakhstan? Mothers would ask me why I sent their sons to fight so far from Belarus. For what? For a unified energy market? That is not what lives depend on. No!"</span><sup class="reference" data-dcnode-id="5455" id="cite_ref-18"><a data-dcnode-id="5456" href="#cite_note-18"><span data-dcnode-id="5457" instrument_node="">[17]</span></a></sup><span data-dcnode-id="5454" instrument_node="">
</span></p><p data-dcnode-id="5429"><span data-dcnode-id="5452" instrument_node="">After </span><a data-dcnode-id="5450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kurmanbek_Bakiyev" title="Kurmanbek Bakiyev"><span data-dcnode-id="5451" instrument_node="">Kurmanbek Bakiyev</span></a><span data-dcnode-id="5449" instrument_node=""> was ousted from office as </span><a data-dcnode-id="5447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/President_of_Kyrgyzstan" title="President of Kyrgyzstan"><span data-dcnode-id="5448" instrument_node="">President of Kyrgyzstan</span></a><span data-dcnode-id="5446" instrument_node=""> as a result of </span><a class="mw-redirect" data-dcnode-id="5444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2010_Kyrgyzstani_riots" title="2010 Kyrgyzstani riots"><span data-dcnode-id="5445" instrument_node="">riots</span></a><span data-dcnode-id="5443" instrument_node=""> in </span><a data-dcnode-id="5441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kyrgyzstan" title="Kyrgyzstan"><span data-dcnode-id="5442" instrument_node="">Kyrgyzstan</span></a><span data-dcnode-id="5440" instrument_node=""> in April 2010, he was granted asylum in </span><a data-dcnode-id="5438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Belarus" title="Belarus"><span data-dcnode-id="5439" instrument_node="">Belarus</span></a><span data-dcnode-id="5437" instrument_node="">. Belarusian President </span><a data-dcnode-id="5435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alexander_Lukashenko" title="Alexander Lukashenko"><span data-dcnode-id="5436" instrument_node="">Alexander Lukashenko</span></a><span data-dcnode-id="5434" instrument_node=""> expressed doubt about the future of the CSTO for failing to prevent Bakiyev's overthrow, stating: "What sort of organization is this one, if there is bloodshed in one of our member states and an anticonstitutional coup d'état takes place, and this body keeps silent?"</span><sup class="reference" data-dcnode-id="5431" id="cite_ref-19"><a data-dcnode-id="5432" href="#cite_note-19"><span data-dcnode-id="5433" instrument_node="">[18]</span></a></sup><span data-dcnode-id="5430" instrument_node="">
</span></p><p data-dcnode-id="5411"><span data-dcnode-id="5428" instrument_node="">Lukashenko had previously accused </span><a data-dcnode-id="5426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russia" title="Russia"><span data-dcnode-id="5427" instrument_node="">Russia</span></a><span data-dcnode-id="5425" instrument_node=""> of punishing </span><a data-dcnode-id="5423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Belarus" title="Belarus"><span data-dcnode-id="5424" instrument_node="">Belarus</span></a><span data-dcnode-id="5422" instrument_node=""> with economic sanctions after Lukashenko's refusal to recognize the independence of </span><a data-dcnode-id="5420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abkhazia" title="Abkhazia"><span data-dcnode-id="5421" instrument_node="">Abkhazia</span></a><span data-dcnode-id="5419" instrument_node=""> and </span><a data-dcnode-id="5417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Ossetia" title="South Ossetia"><span data-dcnode-id="5418" instrument_node="">South Ossetia</span></a><span data-dcnode-id="5416" instrument_node="">, stating: "The economy serves as the basis for our common security. But if Belarus's closest CSTO ally is trying&nbsp;... to destroy this basis and de facto put the Belarusians on their knees, how can one talk about consolidating collective security in the CSTO space?"</span><sup class="reference" data-dcnode-id="5413" id="cite_ref-20"><a data-dcnode-id="5414" href="#cite_note-20"><span data-dcnode-id="5415" instrument_node="">[19]</span></a></sup><span data-dcnode-id="5412" instrument_node="">
</span></p><p data-dcnode-id="5378"><span data-dcnode-id="5410" instrument_node="">During a trip to </span><a data-dcnode-id="5408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukraine" title="Ukraine"><span data-dcnode-id="5409" instrument_node="">Ukraine</span></a><span data-dcnode-id="5407" instrument_node=""> to extend Russia's lease of the Crimean port </span><a data-dcnode-id="5405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sevastopol" title="Sevastopol"><span data-dcnode-id="5406" instrument_node="">Sevastopol</span></a><span data-dcnode-id="5404" instrument_node=""> in return for discounted </span><a class="mw-redirect" data-dcnode-id="5402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2010_Ukrainian%25E2%2580%2593Russian_Naval_Base_for_Natural_Gas_treaty" title="2010 Ukrainian–Russian Naval Base for Natural Gas treaty"><span data-dcnode-id="5403" instrument_node="">natural gas supplies</span></a><span data-dcnode-id="5401" instrument_node="">, Russian President </span><a data-dcnode-id="5399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dmitry_Medvedev" title="Dmitry Medvedev"><span data-dcnode-id="5400" instrument_node="">Dmitry Medvedev</span></a><span data-dcnode-id="5398" instrument_node=""> was asked about whether </span><a data-dcnode-id="5396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Belarus" title="Belarus"><span data-dcnode-id="5397" instrument_node="">Belarus</span></a><span data-dcnode-id="5395" instrument_node=""> could expect a similar deal and responded: "Real partnership is one thing and a declaration of intentions is another; reaching agreement on working seriously, meeting each other halfway, helping each other is one thing and making decisions about granting permanent residence to people who have lost their job is another." The Belarusian President defended himself against this criticism by citing former Russian President </span><a data-dcnode-id="5393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vladimir_Putin" title="Vladimir Putin"><span data-dcnode-id="5394" instrument_node="">Vladimir Putin</span></a><span data-dcnode-id="5392" instrument_node="">'s invitation of </span><a data-dcnode-id="5390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Askar_Akayev" title="Askar Akayev"><span data-dcnode-id="5391" instrument_node="">Askar Akayev</span></a><span data-dcnode-id="5389" instrument_node=""> to Russia after he was ousted as </span><a data-dcnode-id="5387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/President_of_Kyrgyzstan" title="President of Kyrgyzstan"><span data-dcnode-id="5388" instrument_node="">President of Kyrgyzstan</span></a><span data-dcnode-id="5386" instrument_node=""> during the 2005 </span><a data-dcnode-id="5384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tulip_Revolution" title="Tulip Revolution"><span data-dcnode-id="5385" instrument_node="">Tulip Revolution</span></a><span data-dcnode-id="5383" instrument_node="">.</span><sup class="reference" data-dcnode-id="5380" id="cite_ref-21"><a data-dcnode-id="5381" href="#cite_note-21"><span data-dcnode-id="5382" instrument_node="">[20]</span></a></sup><span data-dcnode-id="5379" instrument_node="">
</span></p><p data-dcnode-id="5352"><span data-dcnode-id="5377" instrument_node="">The following month, President Medvedev ordered the CEO of Russia's natural gas monopoly </span><a data-dcnode-id="5375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gazprom" title="Gazprom"><span data-dcnode-id="5376" instrument_node="">Gazprom</span></a><span data-dcnode-id="5374" instrument_node=""> to cut gas supplies to Belarus in a dispute over outstanding debts.</span><sup class="reference" data-dcnode-id="5371" id="cite_ref-22"><a data-dcnode-id="5372" href="#cite_note-22"><span data-dcnode-id="5373" instrument_node="">[21]</span></a></sup><span data-dcnode-id="5370" instrument_node=""> Subsequently, the Russian television channel </span><a data-dcnode-id="5368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NTV_%28Russia%29" title="NTV (Russia)"><span data-dcnode-id="5369" instrument_node="">NTV</span></a><span data-dcnode-id="5367" instrument_node="">, run by </span><a data-dcnode-id="5365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gazprom" title="Gazprom"><span data-dcnode-id="5366" instrument_node="">Gazprom</span></a><span data-dcnode-id="5364" instrument_node="">, aired a documentary film which compared Lukashenko to Bakiyev.</span><sup class="reference" data-dcnode-id="5361" id="cite_ref-23"><a data-dcnode-id="5362" href="#cite_note-23"><span data-dcnode-id="5363" instrument_node="">[22]</span></a></sup><span data-dcnode-id="5360" instrument_node=""> Then the Russian President's foreign policy adviser </span><a data-dcnode-id="5358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sergei_Eduardovich_Prikhodko" title="Sergei Eduardovich Prikhodko"><span data-dcnode-id="5359" instrument_node="">Sergei Prikhodko</span></a><span data-dcnode-id="5357" instrument_node=""> threatened to publish the transcript of a CSTO meeting where Lukashenko said that his administration would recognize Abkhazian and South Ossetian independence.</span><sup class="reference" data-dcnode-id="5354" id="cite_ref-24"><a data-dcnode-id="5355" href="#cite_note-24"><span data-dcnode-id="5356" instrument_node="">[23]</span></a></sup><span data-dcnode-id="5353" instrument_node="">
</span></p><p data-dcnode-id="5305"><span data-dcnode-id="5351" instrument_node="">In June 2010, </span><a class="mw-redirect" data-dcnode-id="5349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethnic_Violence_in_Southern_Kyrgyzstan_%282010%29" title="Ethnic Violence in Southern Kyrgyzstan (2010)"><span data-dcnode-id="5350" instrument_node="">ethnic clashes</span></a><span data-dcnode-id="5348" instrument_node=""> broke out between ethnic </span><a data-dcnode-id="5346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kyrgyz_people" title="Kyrgyz people"><span data-dcnode-id="5347" instrument_node="">Kyrgyz</span></a><span data-dcnode-id="5345" instrument_node=""> and </span><a data-dcnode-id="5343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uzbeks" title="Uzbeks"><span data-dcnode-id="5344" instrument_node="">Uzbeks</span></a><span data-dcnode-id="5342" instrument_node=""> in southern Kyrgyzstan, leading interim Kyrgyz President </span><a data-dcnode-id="5340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roza_Otunbayeva" title="Roza Otunbayeva"><span data-dcnode-id="5341" instrument_node="">Roza Otunbayeva</span></a><span data-dcnode-id="5339" instrument_node=""> to request the assistance of Russian troops to quell the disturbances. </span><a data-dcnode-id="5337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kurmanbek_Bakiyev" title="Kurmanbek Bakiyev"><span data-dcnode-id="5338" instrument_node="">Kurmanbek Bakiyev</span></a><span data-dcnode-id="5336" instrument_node=""> denied charges that his supporters were behind the ethnic conflict and called on the CSTO to intervene.</span><sup class="reference" data-dcnode-id="5333" id="cite_ref-25"><a data-dcnode-id="5334" href="#cite_note-25"><span data-dcnode-id="5335" instrument_node="">[24]</span></a></sup><span data-dcnode-id="5332" instrument_node=""> </span><a data-dcnode-id="5330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Askar_Akayev" title="Askar Akayev"><span data-dcnode-id="5331" instrument_node="">Askar Akayev</span></a><span data-dcnode-id="5329" instrument_node=""> also called for the CSTO to send troops, saying: "Our priority task right now should be to extinguish this flame of enmity. It is very likely that we will need CSTO peacekeepers to do that."</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5322" style="white-space:nowrap;"><span data-dcnode-id="5328" instrument_node="">[</span><i data-dcnode-id="5324"><a data-dcnode-id="5325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5326" title="This claim needs references to reliable sources. (December 2020)"><span data-dcnode-id="5327" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5323" instrument_node="">]</span></sup><span data-dcnode-id="5321" instrument_node=""> The organisation was considered by some</span><sup class="noprint Inline-Template" data-dcnode-id="5314" style="white-space:nowrap;"><span data-dcnode-id="5320" instrument_node="">[</span><i data-dcnode-id="5316"><a data-dcnode-id="5317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AManual_of_Style/Words_to_watch%23Unsupported_attributions" title="Wikipedia:Manual of Style/Words to watch"><span data-dcnode-id="5318" title="The material near this tag possibly uses too-vague attribution or weasel words. (January 2022)"><span data-dcnode-id="5319" instrument_node="">who?</span></span></a></i><span data-dcnode-id="5315" instrument_node="">]</span></sup><span data-dcnode-id="5313" instrument_node=""> a "</span><a data-dcnode-id="5311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paper_tiger" title="Paper tiger"><span data-dcnode-id="5312" instrument_node="">paper tiger</span></a><span data-dcnode-id="5310" instrument_node="">" since it failed to intervene.</span><sup class="reference" data-dcnode-id="5307" id="cite_ref-26"><a data-dcnode-id="5308" href="#cite_note-26"><span data-dcnode-id="5309" instrument_node="">[25]</span></a></sup><span data-dcnode-id="5306" instrument_node="">
</span></p><p data-dcnode-id="5283"><span data-dcnode-id="5304" instrument_node="">Russian President </span><a data-dcnode-id="5302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dmitry_Medvedev" title="Dmitry Medvedev"><span data-dcnode-id="5303" instrument_node="">Dmitry Medvedev</span></a><span data-dcnode-id="5301" instrument_node=""> said that "only in the case of a foreign intrusion and an attempt to externally seize power can we state that there is an attack against the CSTO", and that, "all the problems of Kyrgyzstan have internal roots", while CSTO Secretary General </span><a class="mw-redirect" data-dcnode-id="5299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nikolai_Bordyuzha" title="Nikolai Bordyuzha"><span data-dcnode-id="5300" instrument_node="">Nikolai Bordyuzha</span></a><span data-dcnode-id="5298" instrument_node=""> called the violence "purely a domestic affair".</span><sup class="reference" data-dcnode-id="5295" id="cite_ref-27"><a data-dcnode-id="5296" href="#cite_note-27"><span data-dcnode-id="5297" instrument_node="">[26]</span></a></sup><span data-dcnode-id="5294" instrument_node=""> Later, however, Bordyuzha admitted that the CSTO response may have been inadequate and claimed that "foreign mercenaries" provoked the </span><a data-dcnode-id="5292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kyrgyz_people" title="Kyrgyz people"><span data-dcnode-id="5293" instrument_node="">Kyrgyz</span></a><span data-dcnode-id="5291" instrument_node=""> violence against ethnic </span><a data-dcnode-id="5289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uzbeks" title="Uzbeks"><span data-dcnode-id="5290" instrument_node="">Uzbek</span></a><span data-dcnode-id="5288" instrument_node=""> minorities.</span><sup class="reference" data-dcnode-id="5285" id="cite_ref-28"><a data-dcnode-id="5286" href="#cite_note-28"><span data-dcnode-id="5287" instrument_node="">[27]</span></a></sup><span data-dcnode-id="5284" instrument_node="">
</span></p><p data-dcnode-id="5245"><span data-dcnode-id="5282" instrument_node="">On 21 July 2010, interim Kyrgyz President </span><a data-dcnode-id="5280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roza_Otunbayeva" title="Roza Otunbayeva"><span data-dcnode-id="5281" instrument_node="">Roza Otunbayeva</span></a><span data-dcnode-id="5279" instrument_node=""> called for the introduction of CSTO police units to southern </span><a data-dcnode-id="5277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kyrgyzstan" title="Kyrgyzstan"><span data-dcnode-id="5278" instrument_node="">Kyrgyzstan</span></a><span data-dcnode-id="5276" instrument_node=""> saying: "I think it's important to introduce CSTO police forces there, since we're unable to guarantee people's rights on our own." She also added: "I'm not seeking the CSTO's embrace and I don't feel like bringing them here to stay but the bloodletting there will continue otherwise."</span><sup class="reference" data-dcnode-id="5273" id="cite_ref-29"><a data-dcnode-id="5274" href="#cite_note-29"><span data-dcnode-id="5275" instrument_node="">[28]</span></a></sup><span data-dcnode-id="5272" instrument_node=""> Only weeks later the deputy chairman of Otubayeva's interim </span><a data-dcnode-id="5270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kyrgyz_people" title="Kyrgyz people"><span data-dcnode-id="5271" instrument_node="">Kyrgyz</span></a><span data-dcnode-id="5269" instrument_node=""> government complained that their appeals for help from the CSTO had been ignored.</span><sup class="reference" data-dcnode-id="5266" id="cite_ref-30"><a data-dcnode-id="5267" href="#cite_note-30"><span data-dcnode-id="5268" instrument_node="">[29]</span></a></sup><span data-dcnode-id="5265" instrument_node=""> The CSTO was unable to agree on providing military assistance to </span><a data-dcnode-id="5263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kyrgyzstan" title="Kyrgyzstan"><span data-dcnode-id="5264" instrument_node="">Kyrgyzstan</span></a><span data-dcnode-id="5262" instrument_node=""> at a meeting in </span><a data-dcnode-id="5260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yerevan" title="Yerevan"><span data-dcnode-id="5261" instrument_node="">Yerevan</span></a><span data-dcnode-id="5259" instrument_node="">, </span><a data-dcnode-id="5257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Armenia" title="Armenia"><span data-dcnode-id="5258" instrument_node="">Armenia</span></a><span data-dcnode-id="5256" instrument_node="">, which was attended by </span><a data-dcnode-id="5254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roza_Otunbayeva" title="Roza Otunbayeva"><span data-dcnode-id="5255" instrument_node="">Roza Otunbayeva</span></a><span data-dcnode-id="5253" instrument_node=""> as well as </span><a data-dcnode-id="5251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alexander_Lukashenko" title="Alexander Lukashenko"><span data-dcnode-id="5252" instrument_node="">Alexander Lukashenko</span></a><span data-dcnode-id="5250" instrument_node="">.</span><sup class="reference" data-dcnode-id="5247" id="cite_ref-31"><a data-dcnode-id="5248" href="#cite_note-31"><span data-dcnode-id="5249" instrument_node="">[30]</span></a></sup><span data-dcnode-id="5246" instrument_node="">
</span></p><span data-dcnode-id="5244" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5232"><div class="thumbinner" data-dcnode-id="5233" style="width:222px;"><a class="image" data-dcnode-id="5242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACSTO_Summit_03.jpg"><img alt="" class="thumbimage" data-dcnode-id="5243" data-file-height="1160" data-file-width="1880" decoding="async" height="136" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/82/CSTO_Summit_03.jpg/220px-CSTO_Summit_03.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/82/CSTO_Summit_03.jpg/330px-CSTO_Summit_03.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/82/CSTO_Summit_03.jpg/440px-CSTO_Summit_03.jpg 2x" width="220"></a><span data-dcnode-id="5241" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5234"><div class="magnify" data-dcnode-id="5239"><a class="internal" data-dcnode-id="5240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACSTO_Summit_03.jpg" title="Enlarge"></a></div><span data-dcnode-id="5238" instrument_node="">The CSTO meeting in </span><a data-dcnode-id="5236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nur-Sultan" title="Nur-Sultan"><span data-dcnode-id="5237" instrument_node="">Nur-Sultan</span></a><span data-dcnode-id="5235" instrument_node="">, Kazakhstan, 8 November 2018</span></div></div></div><span data-dcnode-id="5231" instrument_node="">
</span><p data-dcnode-id="5225"><span data-dcnode-id="5230" instrument_node="">On 10 December 2010, the member states approved a declaration establishing a CSTO peacekeeping force and a declaration of the CSTO member states, in addition to signing a package of joint documents.</span><sup class="reference" data-dcnode-id="5227" id="cite_ref-32"><a data-dcnode-id="5228" href="#cite_note-32"><span data-dcnode-id="5229" instrument_node="">[31]</span></a></sup><span data-dcnode-id="5226" instrument_node="">
</span></p><p data-dcnode-id="5219"><span data-dcnode-id="5224" instrument_node="">Since 21 December 2011, the Treaty parties can veto the establishment of new foreign military bases in the member states of the Collective Security Treaty Organization (CSTO). Additionally, Kazakhstan took over the rotating presidency of the CSTO from Belarus.</span><sup class="reference" data-dcnode-id="5221" id="cite_ref-thehindu.com_9-1"><a data-dcnode-id="5222" href="#cite_note-thehindu.com-9"><span data-dcnode-id="5223" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5220" instrument_node="">
</span></p><p data-dcnode-id="5213"><span data-dcnode-id="5218" instrument_node="">On 28 June 2012, Uzbekistan suspended its membership in the CSTO.</span><sup class="reference" data-dcnode-id="5215" id="cite_ref-33"><a data-dcnode-id="5216" href="#cite_note-33"><span data-dcnode-id="5217" instrument_node="">[32]</span></a></sup><span data-dcnode-id="5214" instrument_node="">
</span></p><p data-dcnode-id="5204"><span data-dcnode-id="5212" instrument_node="">In August 2014, 3,000 soldiers from the members of Armenia, Belarus, Kazakhstan, Kyrgyzstan, Russia and Tajikistan participated in psychological and </span><a data-dcnode-id="5210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cyberwarfare" title="Cyberwarfare"><span data-dcnode-id="5211" instrument_node="">cyber warfare</span></a><span data-dcnode-id="5209" instrument_node=""> exercises in Kazakhstan under war games managed by CSTO.</span><sup class="reference" data-dcnode-id="5206" id="cite_ref-34"><a data-dcnode-id="5207" href="#cite_note-34"><span data-dcnode-id="5208" instrument_node="">[33]</span></a></sup><span data-dcnode-id="5205" instrument_node="">
</span></p><p data-dcnode-id="5189"><span data-dcnode-id="5203" instrument_node="">On 19 March 2015, the CSTO Secretary General </span><a class="mw-redirect" data-dcnode-id="5201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nikolai_Bordyuzha" title="Nikolai Bordyuzha"><span data-dcnode-id="5202" instrument_node="">Nikolai Bordyuzha</span></a><span data-dcnode-id="5200" instrument_node=""> offered to send a </span><a data-dcnode-id="5198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peacekeeping" title="Peacekeeping"><span data-dcnode-id="5199" instrument_node="">peacekeeping</span></a><span data-dcnode-id="5197" instrument_node=""> mission to </span><a data-dcnode-id="5195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Donbas" title="Donbas"><span data-dcnode-id="5196" instrument_node="">Donbas</span></a><span data-dcnode-id="5194" instrument_node="">, Ukraine. "The CSTO has a peacekeeping capacity. Our peacekeepers continuously undergo corresponding training. If such a decision is taken by the United Nations, we stand ready to provide peacekeeping units".</span><sup class="reference" data-dcnode-id="5191" id="cite_ref-35"><a data-dcnode-id="5192" href="#cite_note-35"><span data-dcnode-id="5193" instrument_node="">[34]</span></a></sup><span data-dcnode-id="5190" instrument_node="">
</span></p><p data-dcnode-id="5177"><span data-dcnode-id="5188" instrument_node="">In July 2021, CTSO Secretary-General </span><a data-dcnode-id="5186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stanislav_Zas" title="Stanislav Zas"><span data-dcnode-id="5187" instrument_node="">Stanislav Zas</span></a><span data-dcnode-id="5185" instrument_node=""> was criticised by Armenian politicians for calling </span><a data-dcnode-id="5183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2021%25E2%2580%25932022_Armenia%25E2%2580%2593Azerbaijan_border_crisis" title="2021–2022 Armenia–Azerbaijan border crisis"><span data-dcnode-id="5184" instrument_node="">an incursion</span></a><span data-dcnode-id="5182" instrument_node=""> by Azerbaijani forces onto Armenian territory a "border incident", where the CTSO remained inactive during the conflict.</span><sup class="reference" data-dcnode-id="5179" id="cite_ref-36"><a data-dcnode-id="5180" href="#cite_note-36"><span data-dcnode-id="5181" instrument_node="">[35]</span></a></sup><span data-dcnode-id="5178" instrument_node="">
</span></p><p data-dcnode-id="5158"><span data-dcnode-id="5176" instrument_node="">In July 2021, Tajikistan appealed to members of CSTO for help in dealing with security challenges emerging from neighboring </span><a data-dcnode-id="5174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Afghanistan" title="Afghanistan"><span data-dcnode-id="5175" instrument_node="">Afghanistan</span></a><span data-dcnode-id="5173" instrument_node="">.</span><sup class="reference" data-dcnode-id="5170" id="cite_ref-37"><a data-dcnode-id="5171" href="#cite_note-37"><span data-dcnode-id="5172" instrument_node="">[36]</span></a></sup><span data-dcnode-id="5169" instrument_node=""> Thousands of Afghans, including police and government troops, fled to Tajikistan after </span><a data-dcnode-id="5167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Taliban" title="Taliban"><span data-dcnode-id="5168" instrument_node="">Taliban</span></a><span data-dcnode-id="5166" instrument_node=""> insurgents </span><a data-dcnode-id="5164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2021_Taliban_offensive" title="2021 Taliban offensive"><span data-dcnode-id="5165" instrument_node="">took control of many parts</span></a><span data-dcnode-id="5163" instrument_node=""> of Afghanistan.</span><sup class="reference" data-dcnode-id="5160" id="cite_ref-38"><a data-dcnode-id="5161" href="#cite_note-38"><span data-dcnode-id="5162" instrument_node="">[37]</span></a></sup><span data-dcnode-id="5159" instrument_node="">
</span></p><p data-dcnode-id="5145"><span data-dcnode-id="5157" instrument_node="">On 5 January 2022, CSTO peacekeepers were announced to be deployed to Kazakhstan in response to </span><a class="mw-redirect" data-dcnode-id="5155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2022_Kazakh_protests" title="2022 Kazakh protests"><span data-dcnode-id="5156" instrument_node="">anti-government unrest in the country</span></a><span data-dcnode-id="5154" instrument_node="">.</span><sup class="reference" data-dcnode-id="5151" id="cite_ref-39"><a data-dcnode-id="5152" href="#cite_note-39"><span data-dcnode-id="5153" instrument_node="">[38]</span></a></sup><span data-dcnode-id="5150" instrument_node=""> On 11 January the same year, CSTO forces began their withdrawal from Kazakhstan.</span><sup class="reference" data-dcnode-id="5147" id="cite_ref-40"><a data-dcnode-id="5148" href="#cite_note-40"><span data-dcnode-id="5149" instrument_node="">[39]</span></a></sup><span data-dcnode-id="5146" instrument_node="">
</span></p><span data-dcnode-id="5144" instrument_node="">

</span><h3 data-dcnode-id="4826"><span class="mw-headline" data-dcnode-id="4834" id="Potential_membership"><span data-dcnode-id="4835" instrument_node="">Potential membership</span></span><span class="mw-editsection" data-dcnode-id="4827"><span class="mw-editsection-bracket" data-dcnode-id="4832"><span data-dcnode-id="4833" instrument_node="">[</span></span><a data-dcnode-id="4830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCollective_Security_Treaty_Organization%26action%3Dedit%26section%3D8" title="Edit section: Potential membership"><span data-dcnode-id="4831" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4828"><span data-dcnode-id="4829" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4825" instrument_node="">
</span><p data-dcnode-id="4816"><span data-dcnode-id="4824" instrument_node="">In May 2007, the CSTO secretary-general Nikolai Bordyuzha suggested </span><a data-dcnode-id="4822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iran" title="Iran"><span data-dcnode-id="4823" instrument_node="">Iran</span></a><span data-dcnode-id="4821" instrument_node=""> could join the CSTO saying, "The CSTO is an open organization. If Iran applies in accordance with our charter, we will consider the application".</span><sup class="reference" data-dcnode-id="4818" id="cite_ref-41"><a data-dcnode-id="4819" href="#cite_note-41"><span data-dcnode-id="4820" instrument_node="">[40]</span></a></sup><span data-dcnode-id="4817" instrument_node=""> If Iran joined it would be the first state outside the former Soviet Union to become a member of the organization.
</span></p><p data-dcnode-id="4791"><span data-dcnode-id="4815" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="4813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Assembly_of_the_Republic_of_Serbia" title="National Assembly of the Republic of Serbia"><span data-dcnode-id="4814" instrument_node="">National Assembly of the Republic of Serbia</span></a><span data-dcnode-id="4812" instrument_node=""> and the </span><a data-dcnode-id="4810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/House_of_the_People_%28Afghanistan%29" title="House of the People (Afghanistan)"><span data-dcnode-id="4811" instrument_node="">Wolesi Jirga (lower house) of the National Assembly of the Islamic Republic of Afghanistan</span></a><span data-dcnode-id="4809" instrument_node=""> were accorded </span><a data-dcnode-id="4807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Observer_status" title="Observer status"><span data-dcnode-id="4808" instrument_node="">observer status</span></a><span data-dcnode-id="4806" instrument_node=""> in the CSTO Parliamentary Assembly in 2013, though the Islamic Republic collapsed in 2021 as the </span><a data-dcnode-id="4804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2021_Taliban_offensive" title="2021 Taliban offensive"><span data-dcnode-id="4805" instrument_node="">Taliban took over</span></a><span data-dcnode-id="4803" instrument_node="">.</span><sup class="reference" data-dcnode-id="4800" id="cite_ref-42"><a data-dcnode-id="4801" href="#cite_note-42"><span data-dcnode-id="4802" instrument_node="">[41]</span></a></sup><span data-dcnode-id="4799" instrument_node=""> Also, the </span><a data-dcnode-id="4797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Union_State" title="Union State"><span data-dcnode-id="4798" instrument_node="">Parliamentary Assembly of the Union of Belarus and Russia</span></a><span data-dcnode-id="4796" instrument_node=""> has observer status in the CSTO Parliamentary Assembly.</span><sup class="reference" data-dcnode-id="4793" id="cite_ref-43"><a data-dcnode-id="4794" href="#cite_note-43"><span data-dcnode-id="4795" instrument_node="">[42]</span></a></sup><span data-dcnode-id="4792" instrument_node="">
</span></p><p data-dcnode-id="4781"><span data-dcnode-id="4790" instrument_node="">In 2021, Uzbekistan, after becoming observer to EAEU on 11 December 2020,</span><sup class="reference" data-dcnode-id="4787" id="cite_ref-44"><a data-dcnode-id="4788" href="#cite_note-44"><span data-dcnode-id="4789" instrument_node="">[43]</span></a></sup><span data-dcnode-id="4786" instrument_node=""> conducted a bilateral military exercise with Russia and trilateral military exercise with Russia and Tajikistan, while its president joined a CSTO meeting as a guest, sparking rumours about potential reentry into CSTO.</span><sup class="reference" data-dcnode-id="4783" id="cite_ref-45"><a data-dcnode-id="4784" href="#cite_note-45"><span data-dcnode-id="4785" instrument_node="">[44]</span></a></sup><span data-dcnode-id="4782" instrument_node="">
</span></p><span data-dcnode-id="4780" instrument_node="">

</span><h3 data-dcnode-id="4689"><span class="mw-headline" data-dcnode-id="4697" id="Information_technology_and_cyber_security"><span data-dcnode-id="4698" instrument_node="">Information technology and cyber security</span></span><span class="mw-editsection" data-dcnode-id="4690"><span class="mw-editsection-bracket" data-dcnode-id="4695"><span data-dcnode-id="4696" instrument_node="">[</span></span><a data-dcnode-id="4693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCollective_Security_Treaty_Organization%26action%3Dedit%26section%3D11" title="Edit section: Information technology and cyber security"><span data-dcnode-id="4694" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4691"><span data-dcnode-id="4692" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4688" instrument_node="">
</span><p data-dcnode-id="4675"><span data-dcnode-id="4687" instrument_node="">The member states adopted measures to counter </span><a data-dcnode-id="4685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Computer_security" title="Computer security"><span data-dcnode-id="4686" instrument_node="">cyber security</span></a><span data-dcnode-id="4684" instrument_node=""> threats and information technology crimes in a Foreign Ministers Council meeting in Minsk, Belarus.</span><sup class="reference" data-dcnode-id="4681" id="cite_ref-cstocyber_47-0"><a data-dcnode-id="4682" href="#cite_note-cstocyber-47"><span data-dcnode-id="4683" instrument_node="">[46]</span></a></sup><span data-dcnode-id="4680" instrument_node=""> Foreign Minister Abdrakhmanov put forward a proposal to establishing a Cyber Shield system.</span><sup class="reference" data-dcnode-id="4677" id="cite_ref-cstocyber_47-1"><a data-dcnode-id="4678" href="#cite_note-cstocyber-47"><span data-dcnode-id="4679" instrument_node="">[46]</span></a></sup><span data-dcnode-id="4676" instrument_node="">
</span></p><span data-dcnode-id="4674" instrument_node="">
</span><h2 data-dcnode-id="4664"><span class="mw-headline" data-dcnode-id="4672" id="Collective_Rapid_Reaction_Force"><span data-dcnode-id="4673" instrument_node="">Collective Rapid Reaction Force</span></span><span class="mw-editsection" data-dcnode-id="4665"><span class="mw-editsection-bracket" data-dcnode-id="4670"><span data-dcnode-id="4671" instrument_node="">[</span></span><a data-dcnode-id="4668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCollective_Security_Treaty_Organization%26action%3Dedit%26section%3D12" title="Edit section: Collective Rapid Reaction Force"><span data-dcnode-id="4669" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4666"><span data-dcnode-id="4667" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4663" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="4657" role="note"><span data-dcnode-id="4660" instrument_node="">Main article: </span><a data-dcnode-id="4658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Collective_Rapid_Reaction_Force" title="Collective Rapid Reaction Force"><span data-dcnode-id="4659" instrument_node="">Collective Rapid Reaction Force</span></a></div><span data-dcnode-id="4656" instrument_node="">
</span><p data-dcnode-id="4644"><span data-dcnode-id="4655" instrument_node="">On 4 February 2009, an agreement to create the Collective Rapid Reaction Force (KSOR) (Russian: Коллекти́вные си́лы операти́вного реаги́рования (КСОР)) was reached by five of the seven members, with plans finalized on 14 June. The force is intended to be used to repulse military aggression, conduct anti-terrorist operations, fight </span><a data-dcnode-id="4653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Transnational_crime" title="Transnational crime"><span data-dcnode-id="4654" instrument_node="">transnational crime</span></a><span data-dcnode-id="4652" instrument_node=""> and drug trafficking, and neutralize the effects of natural disasters.</span><sup class="reference" data-dcnode-id="4649" id="cite_ref-:1_48-0"><a data-dcnode-id="4650" href="#cite_note-:1-48"><span data-dcnode-id="4651" instrument_node="">[47]</span></a></sup><sup class="reference" data-dcnode-id="4646" id="cite_ref-:2_49-0"><a data-dcnode-id="4647" href="#cite_note-:2-49"><span data-dcnode-id="4648" instrument_node="">[48]</span></a></sup><span data-dcnode-id="4645" instrument_node="">
</span></p><p data-dcnode-id="4631"><span data-dcnode-id="4643" instrument_node="">Belarus and Uzbekistan initially refrained from signing on to the agreement. Belarus did so because of a trade dispute with Russia, and Uzbekistan due to general concerns. Belarus signed the agreement the following October, while Uzbekistan has never done so. A source in the Russian delegation said Uzbekistan would not participate in the collective force on a permanent basis but would "delegate" its detachments to take part in operations on an </span><i data-dcnode-id="4640"><a data-dcnode-id="4641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ad_hoc" title="Ad hoc"><span data-dcnode-id="4642" instrument_node="">ad hoc</span></a></i><span data-dcnode-id="4639" instrument_node=""> basis.</span><sup class="reference" data-dcnode-id="4636" id="cite_ref-:1_48-1"><a data-dcnode-id="4637" href="#cite_note-:1-48"><span data-dcnode-id="4638" instrument_node="">[47]</span></a></sup><sup class="reference" data-dcnode-id="4633" id="cite_ref-:2_49-1"><a data-dcnode-id="4634" href="#cite_note-:2-49"><span data-dcnode-id="4635" instrument_node="">[48]</span></a></sup><span data-dcnode-id="4632" instrument_node="">
</span></p><p data-dcnode-id="4615"><span data-dcnode-id="4630" instrument_node="">
On 3 August 2009, the </span><a data-dcnode-id="4628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ministry_of_Foreign_Affairs_%28Uzbekistan%29" title="Ministry of Foreign Affairs (Uzbekistan)"><span data-dcnode-id="4629" instrument_node="">Ministry of Foreign Affairs</span></a><span data-dcnode-id="4627" instrument_node=""> of </span><a data-dcnode-id="4625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uzbekistan" title="Uzbekistan"><span data-dcnode-id="4626" instrument_node="">Uzbekistan</span></a><span data-dcnode-id="4624" instrument_node=""> criticized plans by </span><a data-dcnode-id="4622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russia" title="Russia"><span data-dcnode-id="4623" instrument_node="">Russia</span></a><span data-dcnode-id="4621" instrument_node=""> to establish a military base in southern </span><a data-dcnode-id="4619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kyrgyzstan" title="Kyrgyzstan"><span data-dcnode-id="4620" instrument_node="">Kyrgyzstan</span></a><span data-dcnode-id="4618" instrument_node=""> for the CSTO rapid reaction force, stating, </span></p><blockquote class="templatequote" data-dcnode-id="4609"><p data-dcnode-id="4610"><span data-dcnode-id="4614" instrument_node="">The implementation of such projects on complex and unpredictable territory, where the borders of three Central Asian republics directly converge, may give impetus to the strengthening of militarization processes and initiate all kinds of nationalistic confrontations. […] Also, it could lead to the appearance of radical extremist forces that could lead to serious destabilization in this vast region.</span><sup class="reference" data-dcnode-id="4611" id="cite_ref-50"><a data-dcnode-id="4612" href="#cite_note-50"><span data-dcnode-id="4613" instrument_node="">[49]</span></a></sup></p></blockquote><span data-dcnode-id="4608" instrument_node="">
</span><h2 data-dcnode-id="4598"><span class="mw-headline" data-dcnode-id="4606" id="Military_personnel"><span data-dcnode-id="4607" instrument_node="">Military personnel</span></span><span class="mw-editsection" data-dcnode-id="4599"><span class="mw-editsection-bracket" data-dcnode-id="4604"><span data-dcnode-id="4605" instrument_node="">[</span></span><a data-dcnode-id="4602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCollective_Security_Treaty_Organization%26action%3Dedit%26section%3D13" title="Edit section: Military personnel"><span data-dcnode-id="4603" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4600"><span data-dcnode-id="4601" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4597" instrument_node="">
