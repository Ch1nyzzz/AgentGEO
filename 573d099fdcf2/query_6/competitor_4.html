</span><div class="thumb tright" data-dcnode-id="2367"><div class="thumbinner" data-dcnode-id="2368" style="width:377px;"><a class="image" data-dcnode-id="2415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMilitary_Alliances.svg"><img alt="" class="thumbimage" data-dcnode-id="2416" data-file-height="477" data-file-width="940" decoding="async" height="190" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Military_Alliances.svg/375px-Military_Alliances.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Military_Alliances.svg/563px-Military_Alliances.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Military_Alliances.svg/750px-Military_Alliances.svg.png 2x" width="375"></a><span data-dcnode-id="2414" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2369"><div class="magnify" data-dcnode-id="2412"><a class="internal" data-dcnode-id="2413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMilitary_Alliances.svg" title="Enlarge"></a></div><span data-dcnode-id="2411" instrument_node="">Major security alliances </span><div class="legend" data-dcnode-id="2400"><span class="legend-color" data-dcnode-id="2407" style="background-color:#000080; color:white;"><span data-dcnode-id="2408" instrument_node="">&nbsp;</span></span><span data-dcnode-id="2406" instrument_node="">&nbsp;</span><a data-dcnode-id="2404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="2405" instrument_node="">NATO</span></a><span data-dcnode-id="2403" instrument_node="">, </span><a data-dcnode-id="2401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Common_Security_and_Defence_Policy" title="Common Security and Defence Policy"><span data-dcnode-id="2402" instrument_node="">CSDP</span></a></div><span data-dcnode-id="2399" instrument_node=""> </span><link data-dcnode-id="2398" href="mw-data:TemplateStyles:r981673959" rel="mw-deduplicated-inline-style"><div class="legend" data-dcnode-id="2389"><span class="legend-color" data-dcnode-id="2396" style="background-color:#008080; color:white;"><span data-dcnode-id="2397" instrument_node="">&nbsp;</span></span><span data-dcnode-id="2395" instrument_node="">&nbsp;</span><a data-dcnode-id="2393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shanghai_Cooperation_Organisation" title="Shanghai Cooperation Organisation"><span data-dcnode-id="2394" instrument_node="">SCO</span></a><span data-dcnode-id="2392" instrument_node="">, </span><a data-dcnode-id="2390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Collective_Security_Treaty_Organization" title="Collective Security Treaty Organization"><span data-dcnode-id="2391" instrument_node="">CSTO</span></a></div><span data-dcnode-id="2388" instrument_node=""> </span><link data-dcnode-id="2387" href="mw-data:TemplateStyles:r981673959" rel="mw-deduplicated-inline-style"><div class="legend" data-dcnode-id="2381"><span class="legend-color" data-dcnode-id="2385" style="background-color:#800000; color:white;"><span data-dcnode-id="2386" instrument_node="">&nbsp;</span></span><span data-dcnode-id="2384" instrument_node="">&nbsp;</span><a data-dcnode-id="2382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Council_of_South_American_Defense" title="Council of South American Defense"><span data-dcnode-id="2383" instrument_node="">Council of South American Defense</span></a></div><span data-dcnode-id="2380" instrument_node=""> </span><link data-dcnode-id="2379" href="mw-data:TemplateStyles:r981673959" rel="mw-deduplicated-inline-style"><div class="legend" data-dcnode-id="2370"><span class="legend-color" data-dcnode-id="2377" style="background-color:#008000; color:white;"><span data-dcnode-id="2378" instrument_node="">&nbsp;</span></span><span data-dcnode-id="2376" instrument_node="">&nbsp;</span><a data-dcnode-id="2374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peace_and_Security_Council" title="Peace and Security Council"><span data-dcnode-id="2375" instrument_node="">Peace and Security Council</span></a><span data-dcnode-id="2373" instrument_node=""> of the </span><a data-dcnode-id="2371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/African_Union" title="African Union"><span data-dcnode-id="2372" instrument_node="">African Union</span></a></div></div></div></div><span data-dcnode-id="2366" instrument_node="">
</span><p data-dcnode-id="2343"><b data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">Collective security</span></b><span data-dcnode-id="2363" instrument_node=""> can be understood as a security </span><a data-dcnode-id="2361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty" title="Treaty"><span data-dcnode-id="2362" instrument_node="">arrangement</span></a><span data-dcnode-id="2360" instrument_node="">, political, regional, or global, in which each state in the system accepts that the </span><a data-dcnode-id="2358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Security" title="Security"><span data-dcnode-id="2359" instrument_node="">security</span></a><span data-dcnode-id="2357" instrument_node=""> of one is the concern of all, and therefore commits to a collective response to threats to, and </span><a data-dcnode-id="2355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Breach_of_the_peace" title="Breach of the peace"><span data-dcnode-id="2356" instrument_node="">breaches</span></a><span data-dcnode-id="2354" instrument_node=""> of peace. Collective security is more ambitious than systems of </span><a data-dcnode-id="2352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Military_alliance" title="Military alliance"><span data-dcnode-id="2353" instrument_node="">alliance security</span></a><span data-dcnode-id="2351" instrument_node=""> or </span><a data-dcnode-id="2349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Defense_pact" title="Defense pact"><span data-dcnode-id="2350" instrument_node="">collective defense</span></a><span data-dcnode-id="2348" instrument_node=""> in that it seeks to encompass the totality of states within a region or indeed globally, and to address a wide range of possible threats. While collective security is an idea with a long history, its implementation in practice has proved problematic. Several prerequisites have to be met for it to have a chance of working. It is the theory or practice of states pledging to defend one another in order to deter aggression or to target a transgressor if international order has been breached.</span><sup class="reference" data-dcnode-id="2345" id="cite_ref-1"><a data-dcnode-id="2346" href="#cite_note-1"><span data-dcnode-id="2347" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2344" instrument_node="">
