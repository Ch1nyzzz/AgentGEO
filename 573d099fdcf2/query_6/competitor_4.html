</span><h3 data-dcnode-id="2205"><span class="mw-headline" data-dcnode-id="2213" id="Early_mentions"><span data-dcnode-id="2214" instrument_node="">Early mentions</span></span><span class="mw-editsection" data-dcnode-id="2206"><span class="mw-editsection-bracket" data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">[</span></span><a data-dcnode-id="2209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCollective_security%26action%3Dedit%26section%3D2" title="Edit section: Early mentions"><span data-dcnode-id="2210" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2204" instrument_node="">
</span><p data-dcnode-id="2193"><span data-dcnode-id="2203" instrument_node="">Collective security is one of the most promising approaches for peace and a valuable device for </span><a data-dcnode-id="2201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Power_%28social_and_political%29" title="Power (social and political)"><span data-dcnode-id="2202" instrument_node="">power</span></a><span data-dcnode-id="2200" instrument_node=""> management on an international scale. </span><a data-dcnode-id="2198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cardinal_Richelieu" title="Cardinal Richelieu"><span data-dcnode-id="2199" instrument_node="">Cardinal Richelieu</span></a><span data-dcnode-id="2197" instrument_node=""> proposed a scheme for collective security in 1629, which was partially reflected in the 1648 </span><a data-dcnode-id="2195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peace_of_Westphalia" title="Peace of Westphalia"><span data-dcnode-id="2196" instrument_node="">Peace of Westphalia</span></a><span data-dcnode-id="2194" instrument_node="">. In the eighteenth century many proposals were made for collective security arrangements, especially in Europe.
</span></p><p data-dcnode-id="2169"><span data-dcnode-id="2192" instrument_node="">The concept of a peaceful community of nations was outlined in 1795 in </span><a data-dcnode-id="2190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immanuel_Kant" title="Immanuel Kant"><span data-dcnode-id="2191" instrument_node="">Immanuel Kant</span></a><span data-dcnode-id="2189" instrument_node="">'s </span><i data-dcnode-id="2186"><a data-dcnode-id="2187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Perpetual_Peace%3A_A_Philosophical_Sketch" title="Perpetual Peace: A Philosophical Sketch"><span data-dcnode-id="2188" instrument_node="">Perpetual Peace: A Philosophical Sketch</span></a></i><span data-dcnode-id="2185" instrument_node="">.</span><sup class="reference" data-dcnode-id="2182" id="cite_ref-2"><a data-dcnode-id="2183" href="#cite_note-2"><span data-dcnode-id="2184" instrument_node="">[2]</span></a></sup><span data-dcnode-id="2181" instrument_node=""> Kant outlined the idea of a league of nations that would control conflict and promote peace between states.</span><sup class="reference" data-dcnode-id="2178" id="cite_ref-3"><a data-dcnode-id="2179" href="#cite_note-3"><span data-dcnode-id="2180" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2177" instrument_node=""> However, he argues for the establishment of a peaceful world community not in a sense that there be a </span><a class="mw-redirect" data-dcnode-id="2175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Global_government" title="Global government"><span data-dcnode-id="2176" instrument_node="">global government</span></a><span data-dcnode-id="2174" instrument_node=""> but in the hope that each state would declare itself as a free state that respects its citizens and welcomes foreign visitors as fellow rational beings. His key argument is that a union of free states would promote peaceful society worldwide: therefore, in his view, there can be a perpetual peace shaped by the international community rather than by a world government.</span><sup class="reference" data-dcnode-id="2171" id="cite_ref-4"><a data-dcnode-id="2172" href="#cite_note-4"><span data-dcnode-id="2173" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2170" instrument_node="">
</span></p><p data-dcnode-id="2138"><span data-dcnode-id="2168" instrument_node="">International cooperation to promote collective security originated in the </span><a data-dcnode-id="2166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Concert_of_Europe" title="Concert of Europe"><span data-dcnode-id="2167" instrument_node="">Concert of Europe</span></a><span data-dcnode-id="2165" instrument_node=""> that developed after the </span><a data-dcnode-id="2163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Napoleonic_Wars" title="Napoleonic Wars"><span data-dcnode-id="2164" instrument_node="">Napoleonic Wars</span></a><span data-dcnode-id="2162" instrument_node=""> in the nineteenth century in an attempt to maintain the </span><i data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">status quo</span></i><span data-dcnode-id="2159" instrument_node=""> between European states and so avoid war.</span><sup class="reference" data-dcnode-id="2156" id="cite_ref-FOOTNOTEReichard20069_5-0"><a data-dcnode-id="2157" href="#cite_note-FOOTNOTEReichard20069-5"><span data-dcnode-id="2158" instrument_node="">[5]</span></a></sup><sup class="reference" data-dcnode-id="2153" id="cite_ref-FOOTNOTERapoport1995498–500_6-0"><a data-dcnode-id="2154" href="#cite_note-FOOTNOTERapoport1995498%E2%80%93500-6"><span data-dcnode-id="2155" instrument_node="">[6]</span></a></sup><span data-dcnode-id="2152" instrument_node="">  This period also saw the development of international law with the first </span><a data-dcnode-id="2150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Geneva_Conventions" title="Geneva Conventions"><span data-dcnode-id="2151" instrument_node="">Geneva Conventions</span></a><span data-dcnode-id="2149" instrument_node=""> establishing laws about humanitarian relief during war and the international </span><a class="mw-redirect" data-dcnode-id="2147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hague_Conventions_%281899_and_1907%29" title="Hague Conventions (1899 and 1907)"><span data-dcnode-id="2148" instrument_node="">Hague Conventions</span></a><span data-dcnode-id="2146" instrument_node=""> of 1899 and 1907 governing rules of war and the peaceful settlement of international disputes.</span><sup class="reference" data-dcnode-id="2143" id="cite_ref-FOOTNOTEBouchet-SaulnierBravOlivier200714–134_7-0"><a data-dcnode-id="2144" href="#cite_note-FOOTNOTEBouchet-SaulnierBravOlivier200714%E2%80%93134-7"><span data-dcnode-id="2145" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="2140" id="cite_ref-FOOTNOTENorthedge198610_8-0"><a data-dcnode-id="2141" href="#cite_note-FOOTNOTENorthedge198610-8"><span data-dcnode-id="2142" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2139" instrument_node="">
</span></p><span data-dcnode-id="2137" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2125"><div class="thumbinner" data-dcnode-id="2126" style="width:222px;"><a class="image" data-dcnode-id="2135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWWIchartX.svg"><img alt="" class="thumbimage" data-dcnode-id="2136" data-file-height="912" data-file-width="1397" decoding="async" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/4e/WWIchartX.svg/220px-WWIchartX.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/4e/WWIchartX.svg/330px-WWIchartX.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/4e/WWIchartX.svg/440px-WWIchartX.svg.png 2x" width="220"></a><span data-dcnode-id="2134" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2127"><div class="magnify" data-dcnode-id="2132"><a class="internal" data-dcnode-id="2133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWWIchartX.svg" title="Enlarge"></a></div><span data-dcnode-id="2131" instrument_node="">European diplomatic alignments shortly before the </span><a data-dcnode-id="2129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_I" title="World War I"><span data-dcnode-id="2130" instrument_node="">World War I</span></a><span data-dcnode-id="2128" instrument_node="">. Germany and the Ottoman Empire allied after the outbreak of war.</span></div></div></div><span data-dcnode-id="2124" instrument_node="">
</span><p data-dcnode-id="2106"><span data-dcnode-id="2123" instrument_node="">The forerunner of the League of Nations, the </span><a data-dcnode-id="2121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inter-Parliamentary_Union" title="Inter-Parliamentary Union"><span data-dcnode-id="2122" instrument_node="">Inter-Parliamentary Union</span></a><span data-dcnode-id="2120" instrument_node=""> (IPU), was formed by peace activists </span><a class="mw-redirect" data-dcnode-id="2118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Randal_Cremer" title="William Randal Cremer"><span data-dcnode-id="2119" instrument_node="">William Randal Cremer</span></a><span data-dcnode-id="2117" instrument_node=""> and </span><a data-dcnode-id="2115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fr%25C3%25A9d%25C3%25A9ric_Passy" title="Frédéric Passy"><span data-dcnode-id="2116" instrument_node="">Frédéric Passy</span></a><span data-dcnode-id="2114" instrument_node=""> in 1889. The organization was international in scope with a third of the members of </span><a data-dcnode-id="2112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parliament" title="Parliament"><span data-dcnode-id="2113" instrument_node="">parliament</span></a><span data-dcnode-id="2111" instrument_node="">, in the 24 countries with parliaments, serving as members of the IPU by 1914. Its aims were to encourage governments to solve international disputes by peaceful means and arbitration and annual conferences were held to help governments refine the process of international arbitration. The IPU's structure consisted of a Council headed by a President which would later be reflected in the structure of the League.</span><sup class="reference" data-dcnode-id="2108" id="cite_ref-9"><a data-dcnode-id="2109" href="#cite_note-9"><span data-dcnode-id="2110" instrument_node="">[9]</span></a></sup><span data-dcnode-id="2107" instrument_node="">
</span></p><p data-dcnode-id="2076"><span data-dcnode-id="2105" instrument_node="">At the start of the twentieth century two power blocs emerged through alliances between the European </span><a class="mw-redirect" data-dcnode-id="2103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Powers" title="Great Powers"><span data-dcnode-id="2104" instrument_node="">Great Powers</span></a><span data-dcnode-id="2102" instrument_node="">. It was these alliances that came into effect at the </span><a class="mw-redirect" data-dcnode-id="2100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Origins_of_World_War_I" title="Origins of World War I"><span data-dcnode-id="2101" instrument_node="">start of the First World War</span></a><span data-dcnode-id="2099" instrument_node=""> in 1914, drawing all the major European powers into the war. This was the first major war in Europe between </span><a class="mw-redirect" data-dcnode-id="2097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Industrialized" title="Industrialized"><span data-dcnode-id="2098" instrument_node="">industrialized</span></a><span data-dcnode-id="2096" instrument_node=""> countries and the first time in Western Europe the results of </span><a class="mw-redirect" data-dcnode-id="2094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Industrialization" title="Industrialization"><span data-dcnode-id="2095" instrument_node="">industrialization</span></a><span data-dcnode-id="2093" instrument_node=""> (for example </span><a data-dcnode-id="2091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mass_production" title="Mass production"><span data-dcnode-id="2092" instrument_node="">mass production</span></a><span data-dcnode-id="2090" instrument_node="">) had been dedicated to war. The result of this </span><a data-dcnode-id="2088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Industrial_warfare" title="Industrial warfare"><span data-dcnode-id="2089" instrument_node="">industrial warfare</span></a><span data-dcnode-id="2087" instrument_node=""> was an unprecedented casualty level with eight and a half million members of </span><a class="mw-redirect" data-dcnode-id="2085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Armed_services" title="Armed services"><span data-dcnode-id="2086" instrument_node="">armed services</span></a><span data-dcnode-id="2084" instrument_node=""> dead, an estimated 21 million wounded, and approximately 10 million civilian deaths.</span><sup class="reference" data-dcnode-id="2081" id="cite_ref-FOOTNOTEBell200715–17_10-0"><a data-dcnode-id="2082" href="#cite_note-FOOTNOTEBell200715%E2%80%9317-10"><span data-dcnode-id="2083" instrument_node="">[10]</span></a></sup><sup class="reference" data-dcnode-id="2078" id="cite_ref-FOOTNOTENorthedge19861–2_11-0"><a data-dcnode-id="2079" href="#cite_note-FOOTNOTENorthedge19861%E2%80%932-11"><span data-dcnode-id="2080" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2077" instrument_node="">
</span></p><p data-dcnode-id="2044"><span data-dcnode-id="2075" instrument_node="">By the time the fighting ended in November 1918, the war had had a profound impact, affecting the social, political and economic systems of </span><a data-dcnode-id="2073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Europe" title="Europe"><span data-dcnode-id="2074" instrument_node="">Europe</span></a><span data-dcnode-id="2072" instrument_node=""> and inflicting psychological and physical damage on the continent.</span><sup class="reference" data-dcnode-id="2069" id="cite_ref-FOOTNOTEBell200716_12-0"><a data-dcnode-id="2070" href="#cite_note-FOOTNOTEBell200716-12"><span data-dcnode-id="2071" instrument_node="">[12]</span></a></sup><span data-dcnode-id="2068" instrument_node=""> Anti-war sentiment rose across the world; the First World War was described as "</span><a data-dcnode-id="2066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_war_to_end_war" title="The war to end war"><span data-dcnode-id="2067" instrument_node="">the war to end all wars</span></a><span data-dcnode-id="2065" instrument_node="">",</span><sup class="reference" data-dcnode-id="2062" id="cite_ref-FOOTNOTEArcher200114_13-0"><a data-dcnode-id="2063" href="#cite_note-FOOTNOTEArcher200114-13"><span data-dcnode-id="2064" instrument_node="">[13]</span></a></sup><sup class="reference" data-dcnode-id="2059" id="cite_ref-FOOTNOTENorthedge19861_14-0"><a data-dcnode-id="2060" href="#cite_note-FOOTNOTENorthedge19861-14"><span data-dcnode-id="2061" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2058" instrument_node=""> and its possible causes were vigorously investigated. The causes identified included </span><a data-dcnode-id="2056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arms_race" title="Arms race"><span data-dcnode-id="2057" instrument_node="">arms races</span></a><span data-dcnode-id="2055" instrument_node="">, alliances, secret diplomacy, and the freedom of </span><a data-dcnode-id="2053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sovereign_state" title="Sovereign state"><span data-dcnode-id="2054" instrument_node="">sovereign states</span></a><span data-dcnode-id="2052" instrument_node=""> to enter into war for their own benefit. The perceived remedies to these were seen as the creation of an international organization whose aim was to prevent future war through </span><a data-dcnode-id="2050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Disarmament" title="Disarmament"><span data-dcnode-id="2051" instrument_node="">disarmament</span></a><span data-dcnode-id="2049" instrument_node="">, open diplomacy, international co-operation, restrictions on the right to wage wars, and penalties that made war unattractive to nations.</span><sup class="reference" data-dcnode-id="2046" id="cite_ref-FOOTNOTEBell20078_15-0"><a data-dcnode-id="2047" href="#cite_note-FOOTNOTEBell20078-15"><span data-dcnode-id="2048" instrument_node="">[15]</span></a></sup><span data-dcnode-id="2045" instrument_node="">
</span></p><p data-dcnode-id="2032"><span data-dcnode-id="2043" instrument_node="">In a 1945 </span><i data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">American Political Science Review</span></i><span data-dcnode-id="2040" instrument_node=""> article, </span><a data-dcnode-id="2038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frederick_L._Schuman" title="Frederick L. Schuman"><span data-dcnode-id="2039" instrument_node="">Frederick L. Schuman</span></a><span data-dcnode-id="2037" instrument_node=""> criticized notions that a new collective security organization could contribute to world peace. Schuman pointed to examples from history of collective security organizations that failed to facilitate world peace. He argued that the organization that would become the United Nations could only facilitate world peace if the United States, the Soviet Union, and the United Kingdom worked in unison, but that the organization would fail if there were divisions between the three powers.</span><sup class="reference" data-dcnode-id="2034" id="cite_ref-16"><a data-dcnode-id="2035" href="#cite_note-16"><span data-dcnode-id="2036" instrument_node="">[16]</span></a></sup><span data-dcnode-id="2033" instrument_node="">
</span></p><span data-dcnode-id="2031" instrument_node="">
</span><h2 data-dcnode-id="2021"><span class="mw-headline" data-dcnode-id="2029" id="Theory"><span data-dcnode-id="2030" instrument_node="">Theory</span></span><span class="mw-editsection" data-dcnode-id="2022"><span class="mw-editsection-bracket" data-dcnode-id="2027"><span data-dcnode-id="2028" instrument_node="">[</span></span><a data-dcnode-id="2025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCollective_security%26action%3Dedit%26section%3D3" title="Edit section: Theory"><span data-dcnode-id="2026" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2020" instrument_node="">
</span><table class="box-No_footnotes plainlinks metadata ambox ambox-style ambox-No_footnotes" data-dcnode-id="1978" role="presentation"><tbody data-dcnode-id="1979"><tr data-dcnode-id="1980"><td class="mbox-image" data-dcnode-id="2017"><div data-dcnode-id="2018" style="width:52px"><img alt="" data-dcnode-id="2019" data-file-height="48" data-file-width="48" decoding="async" height="40" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Text_document_with_red_question_mark.svg/40px-Text_document_with_red_question_mark.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Text_document_with_red_question_mark.svg/60px-Text_document_with_red_question_mark.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Text_document_with_red_question_mark.svg/80px-Text_document_with_red_question_mark.svg.png 2x" width="40"></div></td><td class="mbox-text" data-dcnode-id="1981"><div class="mbox-text-span" data-dcnode-id="1982"><span data-dcnode-id="2016" instrument_node="">This article includes a </span><a data-dcnode-id="2014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACiting_sources" title="Wikipedia:Citing sources"><span data-dcnode-id="2015" instrument_node="">list of references</span></a><span data-dcnode-id="2013" instrument_node="">, related reading or </span><a data-dcnode-id="2011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AExternal_links" title="Wikipedia:External links"><span data-dcnode-id="2012" instrument_node="">external links</span></a><span data-dcnode-id="2010" instrument_node="">, </span><b data-dcnode-id="2006"><span data-dcnode-id="2009" instrument_node="">but its sources remain unclear because it lacks </span><a data-dcnode-id="2007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACiting_sources%23Inline_citations" title="Wikipedia:Citing sources"><span data-dcnode-id="2008" instrument_node="">inline citations</span></a></b><span data-dcnode-id="2005" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="1997"><span data-dcnode-id="2004" instrument_node=""> Please help to </span><a class="mw-redirect" data-dcnode-id="2002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AWikiProject_Fact_and_Reference_Check" title="Wikipedia:WikiProject Fact and Reference Check"><span data-dcnode-id="2003" instrument_node="">improve</span></a><span data-dcnode-id="2001" instrument_node=""> this article by </span><a data-dcnode-id="1999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AWhen_to_cite" title="Wikipedia:When to cite"><span data-dcnode-id="2000" instrument_node="">introducing</span></a><span data-dcnode-id="1998" instrument_node=""> more precise citations.</span></span><span data-dcnode-id="1996" instrument_node=""> </span><span class="date-container" data-dcnode-id="1990"><i data-dcnode-id="1991"><span data-dcnode-id="1995" instrument_node="">(</span><span class="date" data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">March 2022</span></span><span data-dcnode-id="1992" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="1983"><i data-dcnode-id="1984"><span data-dcnode-id="1989" instrument_node=""> (</span><small data-dcnode-id="1986"><a data-dcnode-id="1987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="1988" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="1985" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="1977" instrument_node="">
</span><p data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">Collective security can be understood as a security arrangement in which all states cooperate collectively to provide security for all by the actions of all against any states within the groups which might challenge the existing order by using force. That contrasts with self-help strategies of engaging in war for purely-immediate national interest. While collective security is possible, several prerequisites must be met for it to work.
</span></p><p data-dcnode-id="1947"><span data-dcnode-id="1974" instrument_node="">Collective security also contrasts with </span><a data-dcnode-id="1972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alliance" title="Alliance"><span data-dcnode-id="1973" instrument_node="">alliances</span></a><span data-dcnode-id="1971" instrument_node=""> by different ways. In a Ph.D dissertation by Andreatta, collective security is based on the perspective of all together in a group against any of them, rather than on </span><a data-dcnode-id="1969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unilateralism" title="Unilateralism"><span data-dcnode-id="1970" instrument_node="">unilateral</span></a><span data-dcnode-id="1968" instrument_node=""> idea of some against specific others.</span><sup class="reference" data-dcnode-id="1965" id="cite_ref-:0_17-0"><a data-dcnode-id="1966" href="#cite_note-:0-17"><span data-dcnode-id="1967" instrument_node="">[17]</span></a></sup><span data-dcnode-id="1964" instrument_node=""> Alliances have the form of two groups against each other, such as states A+B+C against states Y+Z; however, collective security takes the form of conducting one agreement between A+B+C+Y+Z against any of them. Moreover, it is also different from an alliance since collective security is made to focus on internal regulation required universal membership, but alliance is made to deter or reduce an outside threat as an exclusive institution. In an alliance, a state would see its allies as an </span><a data-dcnode-id="1962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Absolute_gain_%28international_relations%29" title="Absolute gain (international relations)"><span data-dcnode-id="1963" instrument_node="">absolute gain</span></a><span data-dcnode-id="1961" instrument_node=""> and its enemies as a </span><a data-dcnode-id="1959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Relative_gain_%28international_relations%29" title="Relative gain (international relations)"><span data-dcnode-id="1960" instrument_node="">relative gains</span></a><span data-dcnode-id="1958" instrument_node=""> without </span><a class="mw-redirect" data-dcnode-id="1956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Legal_obligation" title="Legal obligation"><span data-dcnode-id="1957" instrument_node="">legal obligation</span></a><span data-dcnode-id="1955" instrument_node="">. In contrast, collective security follows the case of neutrality, as the whole group is required to punish the aggressor in the hope for it not to violate general norms, which are beyond the states' control, rather than by their self-interest. The opposite of short-term interest in which allies fight against a common threat, collective security tends to use universal interests for </span><a class="mw-redirect" data-dcnode-id="1953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Global_peace" title="Global peace"><span data-dcnode-id="1954" instrument_node="">global peace</span></a><span data-dcnode-id="1952" instrument_node="">.</span><sup class="reference" data-dcnode-id="1949" id="cite_ref-:0_17-1"><a data-dcnode-id="1950" href="#cite_note-:0-17"><span data-dcnode-id="1951" instrument_node="">[17]</span></a></sup><span data-dcnode-id="1948" instrument_node="">
</span></p><p data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">Sovereign nations eager to maintain the status quo willingly co-operate and accept a degree of vulnerability and, in some cases for minor nations, also accede to the interests of the chief contributing nations organising the collective security. It is achieved by setting up an international co-operative organisation under the auspices of international law, which gives rise to a form of international collective governance, despite being limited in scope and effectiveness. The collective security organisation then becomes an arena for diplomacy, the balance of power, and the exercise of soft power. The use of hard power by states, unless legitimised by the collective security organisation, is considered illegitimate, reprehensible, and necessitating remediation of some kind. The collective security organisation not only gives cheaper security but also may be the only practicable means of security for smaller nations against more powerful threatening neighbours without needing to join the camp of the nations that balance their neighbours.
</span></p><p data-dcnode-id="1914"><span data-dcnode-id="1944" instrument_node="">The concept of "collective security" was pioneered by </span><a data-dcnode-id="1942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bah%25C3%25A1%25CA%25BCu%27ll%25C3%25A1h" title="Baháʼu'lláh"><span data-dcnode-id="1943" instrument_node="">Baháʼu'lláh</span></a><span data-dcnode-id="1941" instrument_node="">,</span><sup class="reference" data-dcnode-id="1938" id="cite_ref-Shoghi_18-0"><a data-dcnode-id="1939" href="#cite_note-Shoghi-18"><span data-dcnode-id="1940" instrument_node="">[18]</span></a></sup><span data-dcnode-id="1937" instrument_node=""> </span><a data-dcnode-id="1935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Michael_Joseph_Savage" title="Michael Joseph Savage"><span data-dcnode-id="1936" instrument_node="">Michael Joseph Savage</span></a><span data-dcnode-id="1934" instrument_node="">, </span><a data-dcnode-id="1932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martin_Wight" title="Martin Wight"><span data-dcnode-id="1933" instrument_node="">Martin Wight</span></a><span data-dcnode-id="1931" instrument_node="">, </span><a data-dcnode-id="1929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immanuel_Kant" title="Immanuel Kant"><span data-dcnode-id="1930" instrument_node="">Immanuel Kant</span></a><span data-dcnode-id="1928" instrument_node="">, and </span><a data-dcnode-id="1926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Woodrow_Wilson" title="Woodrow Wilson"><span data-dcnode-id="1927" instrument_node="">Woodrow Wilson</span></a><span data-dcnode-id="1925" instrument_node=""> and was deemed to apply interests in security in a broad manner to "avoid grouping powers into opposing camps, and refusing to draw dividing lines that would leave anyone out."</span><sup class="reference" data-dcnode-id="1922" id="cite_ref-19"><a data-dcnode-id="1923" href="#cite_note-19"><span data-dcnode-id="1924" instrument_node="">[19]</span></a></sup><span data-dcnode-id="1921" instrument_node=""> The term "collective security" has also been cited as a principle of the </span><a data-dcnode-id="1919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations" title="United Nations"><span data-dcnode-id="1920" instrument_node="">United Nations</span></a><span data-dcnode-id="1918" instrument_node=""> and earlier the </span><a data-dcnode-id="1916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/League_of_Nations" title="League of Nations"><span data-dcnode-id="1917" instrument_node="">League of Nations</span></a><span data-dcnode-id="1915" instrument_node="">. By employing a system of collective security, the United Nations hopes to dissuade any member state from acting in a manner likely to threaten peace and thus avoid a conflict.
</span></p><p data-dcnode-id="1892"><span data-dcnode-id="1913" instrument_node="">Collective security selectively incorporates the concept of both </span><a data-dcnode-id="1911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Balance_of_power_%28international_relations%29" title="Balance of power (international relations)"><span data-dcnode-id="1912" instrument_node="">balance of power</span></a><span data-dcnode-id="1910" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="1908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Global_government" title="Global government"><span data-dcnode-id="1909" instrument_node="">global government</span></a><span data-dcnode-id="1907" instrument_node="">. However, collective security is not the same as the balance of power, which is important in </span><a data-dcnode-id="1905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Realism_%28international_relations%29" title="Realism (international relations)"><span data-dcnode-id="1906" instrument_node="">realism</span></a><span data-dcnode-id="1904" instrument_node="">. According to Adreatta, the balance of power focuses on a state's unilateral interests in stopping aggression. Since states look at the world as having a security dilemma because of the fear of relative gain, a state does not want any state to become predominant and so causes a mutually-restraining equilibrium. In other words, the balance of power between states supports the decentralization of power. States are separate actors and do not subordinate their </span><a data-dcnode-id="1902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autonomy" title="Autonomy"><span data-dcnode-id="1903" instrument_node="">autonomy</span></a><span data-dcnode-id="1901" instrument_node=""> or sovereignty to a central government. "Singly or in combinations reflecting the coincidence of interests, States seek to influence the pattern of power distribution and to determine their own places within that pattern."</span><sup class="reference" data-dcnode-id="1898" id="cite_ref-20"><a data-dcnode-id="1899" href="#cite_note-20"><span data-dcnode-id="1900" instrument_node="">[20]</span></a></sup><span data-dcnode-id="1897" instrument_node=""> The expectations of order and peace come from the belief that competing powers will somehow balance and thereby neutralize one another to produce "deterrence through equilibration."</span><sup class="reference" data-dcnode-id="1894" id="cite_ref-Claude_222_21-0"><a data-dcnode-id="1895" href="#cite_note-Claude_222-21"><span data-dcnode-id="1896" instrument_node="">[21]</span></a></sup><span data-dcnode-id="1893" instrument_node=""> In contrast, under collective security, states share the long term goal of global peace, reversing relationship between individual and community goals mentioned in the balance of power theory, which fails to maintain stability. For example, it led to break down of war during the case of Napoleonic Wars and the World Wars, when states unilaterally decided to be unwilling or unable to fight.
</span></p><p data-dcnode-id="1875"><span data-dcnode-id="1891" instrument_node="">At the same time, the concept of global government is about centralization. Global government is a centralized institutional system that possesses the power use of force like a well-established sovereign nation-state. The concept strips states of their "standing as centers of power and policy, where issues of war and peace are concerned"</span><sup class="reference" data-dcnode-id="1888" id="cite_ref-Claude_222_21-1"><a data-dcnode-id="1889" href="#cite_note-Claude_222-21"><span data-dcnode-id="1890" instrument_node="">[21]</span></a></sup><span data-dcnode-id="1887" instrument_node=""> and superimposes on them "an institution possessed of the authority and capability to maintain, by unchallengeable force so far as may be necessary, the order and stability of a global community."</span><sup class="reference" data-dcnode-id="1884" id="cite_ref-Claude_222_21-2"><a data-dcnode-id="1885" href="#cite_note-Claude_222-21"><span data-dcnode-id="1886" instrument_node="">[21]</span></a></sup><span data-dcnode-id="1883" instrument_node=""> Despite different characteristics of balance of power theory, collective security selectively incorporates both concepts, centralization and decentralization, which can broil down to the phrase "order without government."</span><sup class="reference" data-dcnode-id="1880" id="cite_ref-22"><a data-dcnode-id="1881" href="#cite_note-22"><span data-dcnode-id="1882" instrument_node="">[22]</span></a></sup><span data-dcnode-id="1879" instrument_node=""> Thus, collective security seems to be more reliable alternative since it gathers power as a team to punish the aggressor, and it is an attempt to improve international relations and to provide solid rules under </span><a data-dcnode-id="1877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anarchy" title="Anarchy"><span data-dcnode-id="1878" instrument_node="">anarchy</span></a><span data-dcnode-id="1876" instrument_node="">.
</span></p><span data-dcnode-id="1874" instrument_node="">
</span><h3 data-dcnode-id="1864"><span class="mw-headline" data-dcnode-id="1872" id="Basic_assumptions_:"><span data-dcnode-id="1873" instrument_node="">Basic assumptions&nbsp;:</span></span><span class="mw-editsection" data-dcnode-id="1865"><span class="mw-editsection-bracket" data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">[</span></span><a data-dcnode-id="1868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCollective_security%26action%3Dedit%26section%3D4" title="Edit section: Basic assumptions&nbsp;:"><span data-dcnode-id="1869" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1863" instrument_node="">
</span><p data-dcnode-id="1857"><span data-dcnode-id="1862" instrument_node="">Organski (1960) lists five basic assumptions underlying the theory of collective security:</span><sup class="reference" data-dcnode-id="1859" id="cite_ref-23"><a data-dcnode-id="1860" href="#cite_note-23"><span data-dcnode-id="1861" instrument_node="">[23]</span></a></sup><span data-dcnode-id="1858" instrument_node="">
</span></p><span data-dcnode-id="1856" instrument_node="">
</span><ul data-dcnode-id="1841"><li data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">In an armed conflict, member nation-states can agree on which nation is the aggressor.</span></li><span data-dcnode-id="1853" instrument_node="">
</span><li data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">All member nation-states are equally committed to contain and constrain the aggression, irrespective of its source or origin.</span></li><span data-dcnode-id="1850" instrument_node="">
</span><li data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">All member nation-states have an identical freedom of action and ability to join in proceedings against the aggressor.</span></li><span data-dcnode-id="1847" instrument_node="">
</span><li data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">The cumulative power of the cooperating members of the alliance for collective security is adequate and sufficient to overpower the might of the aggressor.</span></li><span data-dcnode-id="1844" instrument_node="">
</span><li data-dcnode-id="1842"><span data-dcnode-id="1843" instrument_node="">In the light of the threat posed by the collective might of the nations of a collective security coalition, the aggressor nation will either modify its policies or be defeated.</span></li></ul><span data-dcnode-id="1840" instrument_node="">
</span><h3 data-dcnode-id="1830"><span class="mw-headline" data-dcnode-id="1838" id="Prerequisites"><span data-dcnode-id="1839" instrument_node="">Prerequisites</span></span><span class="mw-editsection" data-dcnode-id="1831"><span class="mw-editsection-bracket" data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">[</span></span><a data-dcnode-id="1834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCollective_security%26action%3Dedit%26section%3D5" title="Edit section: Prerequisites"><span data-dcnode-id="1835" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1829" instrument_node="">
</span><p data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">Morgenthau (1948) states that three prerequisites must be met for collective security to successfully prevent war:
</span></p><span data-dcnode-id="1826" instrument_node="">
</span><ul data-dcnode-id="1817"><li data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">The collective security system must be able to assemble military force in strength greatly in excess to that assembled by the aggressor(s), thereby deterring the aggressor(s) from attempting to change the world order that is defended by the collective security system.</span></li><span data-dcnode-id="1823" instrument_node="">
</span><li data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">Those nations, whose combined strength would be used for deterrence as mentioned in the first prerequisite, should have identical beliefs about the security of the world order that collective security is defending.</span></li><span data-dcnode-id="1820" instrument_node="">
</span><li data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">Nations must be willing to subordinate their conflicting interests to the common good defined in terms of the common defense of all member-states.</span></li></ul><span data-dcnode-id="1816" instrument_node="">
</span><h3 data-dcnode-id="1806"><span class="mw-headline" data-dcnode-id="1814" id="League_of_Nations"><span data-dcnode-id="1815" instrument_node="">League of Nations</span></span><span class="mw-editsection" data-dcnode-id="1807"><span class="mw-editsection-bracket" data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">[</span></span><a data-dcnode-id="1810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCollective_security%26action%3Dedit%26section%3D6" title="Edit section: League of Nations"><span data-dcnode-id="1811" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1805" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1781"><div class="thumbinner" data-dcnode-id="1782" style="width:222px;"><a class="image" data-dcnode-id="1803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABundesarchiv_Bild_183-R69173%2C_M%25C3%25BCnchener_Abkommen%2C_Staatschefs.jpg"><img alt="" class="thumbimage" data-dcnode-id="1804" data-file-height="548" data-file-width="800" decoding="async" height="151" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/9c/Bundesarchiv_Bild_183-R69173%252C_M%25C3%25BCnchener_Abkommen%252C_Staatschefs.jpg/220px-Bundesarchiv_Bild_183-R69173%252C_M%25C3%25BCnchener_Abkommen%252C_Staatschefs.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/9c/Bundesarchiv_Bild_183-R69173%2C_M%C3%BCnchener_Abkommen%2C_Staatschefs.jpg/330px-Bundesarchiv_Bild_183-R69173%2C_M%C3%BCnchener_Abkommen%2C_Staatschefs.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/9c/Bundesarchiv_Bild_183-R69173%2C_M%C3%BCnchener_Abkommen%2C_Staatschefs.jpg/440px-Bundesarchiv_Bild_183-R69173%2C_M%C3%BCnchener_Abkommen%2C_Staatschefs.jpg 2x" width="220"></a><span data-dcnode-id="1802" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1783"><div class="magnify" data-dcnode-id="1800"><a class="internal" data-dcnode-id="1801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABundesarchiv_Bild_183-R69173%2C_M%25C3%25BCnchener_Abkommen%2C_Staatschefs.jpg" title="Enlarge"></a></div><span data-dcnode-id="1799" instrument_node="">In 1938, France </span><a data-dcnode-id="1797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_betrayal" title="Western betrayal"><span data-dcnode-id="1798" instrument_node="">betrayed</span></a><span data-dcnode-id="1796" instrument_node=""> </span><a data-dcnode-id="1794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Czechoslovakia" title="Czechoslovakia"><span data-dcnode-id="1795" instrument_node="">Czechoslovakia</span></a><span data-dcnode-id="1793" instrument_node=""> and signed the </span><a data-dcnode-id="1791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Munich_Agreement" title="Munich Agreement"><span data-dcnode-id="1792" instrument_node="">Munich Agreement</span></a><span data-dcnode-id="1790" instrument_node=""> with </span><a data-dcnode-id="1788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nazi_Germany" title="Nazi Germany"><span data-dcnode-id="1789" instrument_node="">Nazi Germany</span></a><span data-dcnode-id="1787" instrument_node="">, effectively dishonoring the </span><a data-dcnode-id="1785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Little_Entente" title="Little Entente"><span data-dcnode-id="1786" instrument_node="">French-Czechoslovak alliance</span></a><span data-dcnode-id="1784" instrument_node="">.</span></div></div></div><span data-dcnode-id="1780" instrument_node="">
</span><p data-dcnode-id="1753"><span data-dcnode-id="1779" instrument_node="">After World War I, the first large-scale attempt to provide collective security in modern times was the establishment of the </span><a data-dcnode-id="1777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/League_of_Nations" title="League of Nations"><span data-dcnode-id="1778" instrument_node="">League of Nations</span></a><span data-dcnode-id="1776" instrument_node=""> in 1919 and 1920. The provisions of the </span><a class="mw-redirect" data-dcnode-id="1774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/League_of_Nations_Covenant" title="League of Nations Covenant"><span data-dcnode-id="1775" instrument_node="">League of Nations Covenant</span></a><span data-dcnode-id="1773" instrument_node=""> represented a weak system for decision making and collective action. According to Palmer and Perking, they pointed failure of the </span><a data-dcnode-id="1771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States" title="United States"><span data-dcnode-id="1772" instrument_node="">United States</span></a><span data-dcnode-id="1770" instrument_node=""> to join the League of Nations and the rise of the </span><a data-dcnode-id="1768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="1769" instrument_node="">Soviet Union</span></a><span data-dcnode-id="1767" instrument_node=""> outside the League as one of major reasons for its failure to enforce collective security.</span><sup class="reference" data-dcnode-id="1764" id="cite_ref-:1_24-0"><a data-dcnode-id="1765" href="#cite_note-:1-24"><span data-dcnode-id="1766" instrument_node="">[24]</span></a></sup><span data-dcnode-id="1763" instrument_node=""> Moreover, an example of the failure of the League of Nations' collective security was the </span><a class="mw-redirect" data-dcnode-id="1761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manchurian_Crisis" title="Manchurian Crisis"><span data-dcnode-id="1762" instrument_node="">Manchurian Crisis</span></a><span data-dcnode-id="1760" instrument_node="">, when </span><a data-dcnode-id="1758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Japan" title="Japan"><span data-dcnode-id="1759" instrument_node="">Japan</span></a><span data-dcnode-id="1757" instrument_node=""> occupied part of </span><a data-dcnode-id="1755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China" title="China"><span data-dcnode-id="1756" instrument_node="">China</span></a><span data-dcnode-id="1754" instrument_node="">, both of which were League members. After the invasion, members of the League passed a resolution that called for Japan to withdraw or face severe penalties. Since every nation had a veto power, Japan promptly vetoed the resolution, severely limiting the League's ability to respond. After one year of deliberation, the League passed a resolution condemning the invasion without committing its members to any action against it. The Japanese replied by quitting the League.
</span></p><p data-dcnode-id="1727"><span data-dcnode-id="1752" instrument_node="">The </span><a data-dcnode-id="1750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abyssinia_Crisis" title="Abyssinia Crisis"><span data-dcnode-id="1751" instrument_node="">Abyssinia Crisis</span></a><span data-dcnode-id="1749" instrument_node=""> occurred in 1935, when </span><a data-dcnode-id="1747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fascist_Italy_%281922%25E2%2580%25931943%29" title="Fascist Italy (1922–1943)"><span data-dcnode-id="1748" instrument_node="">Fascist Italy</span></a><span data-dcnode-id="1746" instrument_node=""> invaded the </span><a class="mw-redirect" data-dcnode-id="1744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abyssinian_Empire" title="Abyssinian Empire"><span data-dcnode-id="1745" instrument_node="">Abyssinian Empire</span></a><span data-dcnode-id="1743" instrument_node="">, now </span><a data-dcnode-id="1741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethiopia" title="Ethiopia"><span data-dcnode-id="1742" instrument_node="">Ethiopia</span></a><span data-dcnode-id="1740" instrument_node="">. In a similar process, sanctions were passed, but Italy would have vetoed any stronger resolution. Additionally, Britain and France sought to court Italy's government as a potential deterrent to </span><a class="mw-redirect" data-dcnode-id="1738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hitler" title="Hitler"><span data-dcnode-id="1739" instrument_node="">Hitler</span></a><span data-dcnode-id="1737" instrument_node=""> since </span><a class="mw-redirect" data-dcnode-id="1735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mussolini" title="Mussolini"><span data-dcnode-id="1736" instrument_node="">Mussolini</span></a><span data-dcnode-id="1734" instrument_node=""> had not yet joined the </span><a data-dcnode-id="1732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Axis_powers" title="Axis powers"><span data-dcnode-id="1733" instrument_node="">Axis powers</span></a><span data-dcnode-id="1731" instrument_node=""> of </span><a data-dcnode-id="1729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="1730" instrument_node="">World War II</span></a><span data-dcnode-id="1728" instrument_node="">. Thus, neither Britain nor France put any serious sanctions against the Italian government.
</span></p><p data-dcnode-id="1722"><span data-dcnode-id="1726" instrument_node="">In both cases, the absence of the United States deprived it of another major power that could have used economic leverage against either of the aggressor states. Inaction by the League subjected it to criticisms that it was weak and concerned more with European issues since most leading of its members were European, and it did not deter Hitler from his plans to dominate Europe. Abyssinian Emperor </span><a data-dcnode-id="1724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Haile_Selassie" title="Haile Selassie"><span data-dcnode-id="1725" instrument_node="">Haile Selassie</span></a><span data-dcnode-id="1723" instrument_node=""> continued to support collective security, as he assessed that impotence lay not in the principle but its covenantors' commitment to honor its tenets.
</span></p><p data-dcnode-id="1713"><span data-dcnode-id="1721" instrument_node="">One active and articulate exponent of collective security during the immediate prewar years was Soviet Foreign Minister </span><a data-dcnode-id="1719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maxim_Litvinov" title="Maxim Litvinov"><span data-dcnode-id="1720" instrument_node="">Maxim Litvinov</span></a><span data-dcnode-id="1718" instrument_node="">.</span><sup class="reference" data-dcnode-id="1715" id="cite_ref-25"><a data-dcnode-id="1716" href="#cite_note-25"><span data-dcnode-id="1717" instrument_node="">[25]</span></a></sup><span data-dcnode-id="1714" instrument_node="">
</span></p><p data-dcnode-id="1705"><span data-dcnode-id="1712" instrument_node="">After the </span><a data-dcnode-id="1710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Munich_Agreement" title="Munich Agreement"><span data-dcnode-id="1711" instrument_node="">Munich Agreement</span></a><span data-dcnode-id="1709" instrument_node=""> in September 1938 and the passivity of outside powers in the face of German occupation of the remainder of </span><a data-dcnode-id="1707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Czechoslovakia" title="Czechoslovakia"><span data-dcnode-id="1708" instrument_node="">Czechoslovakia</span></a><span data-dcnode-id="1706" instrument_node=""> in March 1939, Western powers were shown not to be prepared to engage in collective security with the Soviet Union against aggression by Germany.
</span></p><p data-dcnode-id="1691"><span data-dcnode-id="1704" instrument_node="">Soviet foreign policy was revised, and Litvinov was replaced as foreign minister in early May 1939 to facilitate the negotiations that led to the </span><a data-dcnode-id="1702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Molotov%25E2%2580%2593Ribbentrop_Pact" title="Molotov–Ribbentrop Pact"><span data-dcnode-id="1703" instrument_node="">Molotov–Ribbentrop Pact</span></a><span data-dcnode-id="1701" instrument_node=""> with Germany, which was signed by Litvinov's successor, </span><a data-dcnode-id="1699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vyacheslav_Molotov" title="Vyacheslav Molotov"><span data-dcnode-id="1700" instrument_node="">Vyacheslav Molotov</span></a><span data-dcnode-id="1698" instrument_node="">, on August 23. The war in Europe broke out a week later with the </span><a data-dcnode-id="1696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Invasion_of_Poland" title="Invasion of Poland"><span data-dcnode-id="1697" instrument_node="">invasion of Poland</span></a><span data-dcnode-id="1695" instrument_node="">, which started on September 1. Thus, collective security may not always work because of the lack of commitment and the unwillingness of states or the </span><a data-dcnode-id="1693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_community" title="International community"><span data-dcnode-id="1694" instrument_node="">international community</span></a><span data-dcnode-id="1692" instrument_node=""> to act in concert (Mingst 1999).
</span></p><span data-dcnode-id="1690" instrument_node="">
</span><h3 data-dcnode-id="1680"><span class="mw-headline" data-dcnode-id="1688" id="United_Nations"><span data-dcnode-id="1689" instrument_node="">United Nations</span></span><span class="mw-editsection" data-dcnode-id="1681"><span class="mw-editsection-bracket" data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">[</span></span><a data-dcnode-id="1684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCollective_security%26action%3Dedit%26section%3D7" title="Edit section: United Nations"><span data-dcnode-id="1685" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1679" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1661"><div class="thumbinner" data-dcnode-id="1662" style="width:222px;"><a class="image" data-dcnode-id="1677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACongressBuilding_SEATO.jpg"><img alt="" class="thumbimage" data-dcnode-id="1678" data-file-height="3223" data-file-width="4851" decoding="async" height="146" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/6f/CongressBuilding_SEATO.jpg/220px-CongressBuilding_SEATO.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/6f/CongressBuilding_SEATO.jpg/330px-CongressBuilding_SEATO.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/6f/CongressBuilding_SEATO.jpg/440px-CongressBuilding_SEATO.jpg 2x" width="220"></a><span data-dcnode-id="1676" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1663"><div class="magnify" data-dcnode-id="1674"><a class="internal" data-dcnode-id="1675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACongressBuilding_SEATO.jpg" title="Enlarge"></a></div><span data-dcnode-id="1673" instrument_node="">The leaders of some of the </span><a class="mw-redirect" data-dcnode-id="1671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/SEATO" title="SEATO"><span data-dcnode-id="1672" instrument_node="">SEATO</span></a><span data-dcnode-id="1670" instrument_node=""> nations in </span><a data-dcnode-id="1668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manila" title="Manila"><span data-dcnode-id="1669" instrument_node="">Manila</span></a><span data-dcnode-id="1667" instrument_node="">, hosted by Philippine President </span><a data-dcnode-id="1665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ferdinand_Marcos" title="Ferdinand Marcos"><span data-dcnode-id="1666" instrument_node="">Ferdinand Marcos</span></a><span data-dcnode-id="1664" instrument_node=""> on 24 October 1966</span></div></div></div><span data-dcnode-id="1660" instrument_node="">
</span><p data-dcnode-id="1648"><span data-dcnode-id="1659" instrument_node="">The 1945 </span><a class="mw-redirect" data-dcnode-id="1657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Charter" title="United Nations Charter"><span data-dcnode-id="1658" instrument_node="">United Nations Charter</span></a><span data-dcnode-id="1656" instrument_node=""> contains stronger provisions for decision-making and collective military action than those of the League of Nations Covenant, but it represents not a complete system of collective security but a balance between collective action and the continued operation of the states system, including the continued special roles of great powers. States in the UN collective security system are selective to support or oppose UN action in certain conflicts, based on their self-interests. The UN can be somehow seen as the platform for self-interest purposes for members in Security Council because of the permanent members' veto power and the excessive assistance or aid, which have made those states to act unilaterally and to ignore the approval of or to violate resolutions of the Security Council. The </span><a class="new" data-dcnode-id="1654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DIraq_Crisis%26action%3Dedit%26redlink%3D1" title="Iraq Crisis (page does not exist)"><span data-dcnode-id="1655" instrument_node="">Iraq Crisis</span></a><span data-dcnode-id="1653" instrument_node=""> is a clearer example: "Rather than seek the global interest of peace and security through stability in Iraq and the Middle East region, the domination oriented members amassed their vast economic, diplomatic and military resources, captured and brazenly subjugated Iraq to an unprecedented condominial regime serving their economic interest under Iraq Reconstruction Programme" (Eke 2007).</span><sup class="reference" data-dcnode-id="1650" id="cite_ref-:1_24-1"><a data-dcnode-id="1651" href="#cite_note-:1-24"><span data-dcnode-id="1652" instrument_node="">[24]</span></a></sup><span data-dcnode-id="1649" instrument_node=""> In addition, the lack of geographical spread of members in the Security Council causes an imbalance in the role of maintenance global peace and security. The voices of small countries can be heard, but policies are not adopted in response to them unless they serves the great powers' interests.
</span></p><p data-dcnode-id="1640"><span data-dcnode-id="1647" instrument_node="">However, collective security in the UN has not completely failed. The role of the UN and collective security in general is evolving with the rise of </span><a class="mw-redirect" data-dcnode-id="1645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_wars" title="Civil wars"><span data-dcnode-id="1646" instrument_node="">civil wars</span></a><span data-dcnode-id="1644" instrument_node="">. Since the end of World War II, there have been 111 military conflicts worldwide, but only 9 of them have involved two or more states going to war with one another. The others have been </span><a class="mw-redirect" data-dcnode-id="1642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_wars" title="Civil wars"><span data-dcnode-id="1643" instrument_node="">civil wars</span></a><span data-dcnode-id="1641" instrument_node=""> in which other states have intervened in some manner. That means that collective security may have to evolve towards providing a means to ensure stability and a fair international resolution to those internal conflicts. Whether that involves more powerful peacekeeping forces or a larger role for the UN diplomatically is likely to be judged on a case-by-case basis.
</span></p><span data-dcnode-id="1639" instrument_node="">
</span><h2 data-dcnode-id="1629"><span class="mw-headline" data-dcnode-id="1637" id="Collective_defense"><span data-dcnode-id="1638" instrument_node="">Collective defense</span></span><span class="mw-editsection" data-dcnode-id="1630"><span class="mw-editsection-bracket" data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">[</span></span><a data-dcnode-id="1633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCollective_security%26action%3Dedit%26section%3D8" title="Edit section: Collective defense"><span data-dcnode-id="1634" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1628" instrument_node="">
</span><div class="center" data-dcnode-id="1618"><div class="thumb tnone" data-dcnode-id="1619"><div class="thumbinner" data-dcnode-id="1620" style="width:212px;"><a class="image" data-dcnode-id="1626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANorth_Atlantic_Treaty_Organization_%28orthographic_projection%29.svg"><img alt="" class="thumbimage" data-dcnode-id="1627" data-file-height="550" data-file-width="550" decoding="async" height="210" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/06/North_Atlantic_Treaty_Organization_%2528orthographic_projection%2529.svg/210px-North_Atlantic_Treaty_Organization_%2528orthographic_projection%2529.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/06/North_Atlantic_Treaty_Organization_%28orthographic_projection%29.svg/315px-North_Atlantic_Treaty_Organization_%28orthographic_projection%29.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/06/North_Atlantic_Treaty_Organization_%28orthographic_projection%29.svg/420px-North_Atlantic_Treaty_Organization_%28orthographic_projection%29.svg.png 2x" width="210"></a><span data-dcnode-id="1625" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1621"><div class="magnify" data-dcnode-id="1623"><a class="internal" data-dcnode-id="1624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANorth_Atlantic_Treaty_Organization_%28orthographic_projection%29.svg" title="Enlarge"></a></div><span data-dcnode-id="1622" instrument_node="">Member states of NATO</span></div></div></div></div><span data-dcnode-id="1617" instrument_node="">
</span><p data-dcnode-id="1600"><span data-dcnode-id="1616" instrument_node="">Collective defense is an arrangement, usually formalized by a treaty and an organization, among participant states that commit support in defense of a member state if it is attacked by another state outside the organization. </span><a data-dcnode-id="1614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="1615" instrument_node="">NATO</span></a><span data-dcnode-id="1613" instrument_node=""> is the best-known collective defense organization; its famous Article 5 calls on (but does not fully commit) member states to assist another member under attack. This article was invoked only after the </span><a data-dcnode-id="1611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/September_11_attacks" title="September 11 attacks"><span data-dcnode-id="1612" instrument_node="">September 11 attacks</span></a><span data-dcnode-id="1610" instrument_node=""> on the </span><a data-dcnode-id="1608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States" title="United States"><span data-dcnode-id="1609" instrument_node="">United States</span></a><span data-dcnode-id="1607" instrument_node="">, after which other NATO members provided assistance to the US </span><a class="mw-redirect" data-dcnode-id="1605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_on_Terror" title="War on Terror"><span data-dcnode-id="1606" instrument_node="">War on Terror</span></a><span data-dcnode-id="1604" instrument_node=""> by participating in the </span><a class="mw-redirect" data-dcnode-id="1602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_in_Afghanistan_%282001%25E2%2580%2593present%29" title="War in Afghanistan (2001–present)"><span data-dcnode-id="1603" instrument_node="">War in Afghanistan</span></a><span data-dcnode-id="1601" instrument_node="">.
</span></p><p data-dcnode-id="1595"><span data-dcnode-id="1599" instrument_node="">Collective defense has its roots in multiparty </span><a data-dcnode-id="1597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political_alliance" title="Political alliance"><span data-dcnode-id="1598" instrument_node="">alliances</span></a><span data-dcnode-id="1596" instrument_node=""> and entails benefits as well as risks. On the one hand, by combining and pooling resources, it can reduce any single state's cost of providing fully for its security. Smaller members of NATO, for example, have leeway to invest a greater proportion of their budget on nonmilitary priorities, such as education or health, since they can count on other members to come to their defense, if needed.
</span></p><p data-dcnode-id="1572"><span data-dcnode-id="1594" instrument_node="">On the other hand, collective defense also involves risky commitments. Member states can become embroiled in costly wars benefiting neither the direct victim nor the aggressor. In </span><a data-dcnode-id="1592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_I" title="World War I"><span data-dcnode-id="1593" instrument_node="">World War I</span></a><span data-dcnode-id="1591" instrument_node="">, countries in the collective defense arrangement known as the </span><a data-dcnode-id="1589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Triple_Entente" title="Triple Entente"><span data-dcnode-id="1590" instrument_node="">Triple Entente</span></a><span data-dcnode-id="1588" instrument_node=""> (</span><a data-dcnode-id="1586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_Third_Republic" title="French Third Republic"><span data-dcnode-id="1587" instrument_node="">France</span></a><span data-dcnode-id="1585" instrument_node="">, </span><a data-dcnode-id="1583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Kingdom_of_Great_Britain_and_Ireland" title="United Kingdom of Great Britain and Ireland"><span data-dcnode-id="1584" instrument_node="">Britain</span></a><span data-dcnode-id="1582" instrument_node="">, </span><a data-dcnode-id="1580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Empire" title="Russian Empire"><span data-dcnode-id="1581" instrument_node="">Russia</span></a><span data-dcnode-id="1579" instrument_node="">) were pulled into war quickly when Russia started full mobilization against </span><a data-dcnode-id="1577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Austria-Hungary" title="Austria-Hungary"><span data-dcnode-id="1578" instrument_node="">Austria-Hungary</span></a><span data-dcnode-id="1576" instrument_node="">, whose ally, </span><a data-dcnode-id="1574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/German_Empire" title="German Empire"><span data-dcnode-id="1575" instrument_node="">Germany</span></a><span data-dcnode-id="1573" instrument_node="">, later declared war on Russia.
</span></p><span data-dcnode-id="1571" instrument_node="">
