</span><div class="entry-intro" data-dcnode-id="3788"><span data-dcnode-id="3789" instrument_node="">The M16 is one of the most iconic and prolific weapon's platforms on the planet. This rifle, despite a rocky start in the jungles of Vietnam, would go on to change the way nearly every Western nation outfitted their troops. Let's take a look at the storied history of the mighty M16.</span></div><span data-dcnode-id="3787" instrument_node="">

</span><p data-dcnode-id="3733"><span data-dcnode-id="3734" style="font-weight: 400;"><span data-dcnode-id="3735" instrument_node="">Mud-soaked GIs desperately field-stripping jammed guns in failing light. &nbsp;Businessmen-turned-bureaucrats facing off against dogged Pentagon officials in costly tangles of red tape. &nbsp;Meanwhile, a brilliant self-taught engineer struggling to maintain his invention’s integrity amid old-school bias. &nbsp;The story of the M16 is as dramatic and memorable as they come. &nbsp;</span></span></p><span data-dcnode-id="3732" instrument_node="">
</span><figure aria-describedby="caption-attachment-17810" class="wp-caption aligncenter" data-dcnode-id="3728" id="attachment_17810" style="width: 600px"><img alt="M16 Being Used in the Vietnam War" class="size-full wp-image-17810" data-dcnode-id="3731" height="375" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2017/10/M16-in-Vietnam-e1507337695982.jpg&amp;raw" width="600"><figcaption class="wp-caption-text" data-dcnode-id="3729" id="caption-attachment-17810"><span data-dcnode-id="3730" instrument_node="">M16 Being Used in the Vietnam War</span></figcaption></figure><span data-dcnode-id="3727" instrument_node="">
</span><p data-dcnode-id="3724"><span data-dcnode-id="3725" style="font-weight: 400;"><span data-dcnode-id="3726" instrument_node="">No other gun so captures the human condition, where need, drive and ego met error, ingenuity and hard-earned survival.</span></span></p><span data-dcnode-id="3723" instrument_node="">
</span><p data-dcnode-id="3720"><span data-dcnode-id="3721" style="font-weight: 400;"><span data-dcnode-id="3722" instrument_node="">It’s a story to make your head ache, your heart swell and your eyes blink. &nbsp;And while it’s from decades past, it carries all the markers of an equally conflicted present facing technological leaps and political division. &nbsp;</span></span></p><span data-dcnode-id="3719" instrument_node="">
</span><h2 data-dcnode-id="3716"><span data-dcnode-id="3717" style="font-weight: 400;"><span data-dcnode-id="3718" instrument_node="">The Quest for the All-In-One Military Firearm</span></span></h2><span data-dcnode-id="3715" instrument_node="">
</span><p data-dcnode-id="3712"><span data-dcnode-id="3713" style="font-weight: 400;"><span data-dcnode-id="3714" instrument_node="">Most historians point to the Korean conflict as a change point in defining optimal firepower in battle and in turn, what was then termed the modern battlefield. &nbsp;</span></span></p><span data-dcnode-id="3711" instrument_node="">
</span><p data-dcnode-id="3708"><span data-dcnode-id="3709" style="font-weight: 400;"><span data-dcnode-id="3710" instrument_node="">U.S. &nbsp;infantry soldiers armed with World War II-era semi-automatic M1 Garands and M1 carbines quickly found themselves both outmanned and outgunned. &nbsp;</span></span></p><span data-dcnode-id="3707" instrument_node="">
</span><figure aria-describedby="caption-attachment-22972" class="wp-caption aligncenter" data-dcnode-id="3703" id="attachment_22972" style="width: 600px"><img alt="Right Hand Man Hamilton" class="size-full wp-image-22972" data-dcnode-id="3706" height="322" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2018/02/Right-Hand-Man-e1519667990547.jpg&amp;raw" srcset="https://www.pewpewtactical.com/wp-content/uploads/2018/02/Right-Hand-Man-e1519667990547.jpg 600w, https://www.pewpewtactical.com/wp-content/uploads/2018/02/Right-Hand-Man-e1519667990547-300x161.jpg 300w" width="600"><figcaption class="wp-caption-text" data-dcnode-id="3704" id="caption-attachment-22972"><span data-dcnode-id="3705" instrument_node="">Outgunned, Outmanned, Outnumbered, Outplanned</span></figcaption></figure><span data-dcnode-id="3702" instrument_node="">
</span><p data-dcnode-id="3699"><span data-dcnode-id="3700" style="font-weight: 400;"><span data-dcnode-id="3701" instrument_node="">Picture it:</span></span></p><span data-dcnode-id="3698" instrument_node="">
</span><ul data-dcnode-id="3688"><span data-dcnode-id="3697" instrument_node="">
</span><li data-dcnode-id="3694"><span data-dcnode-id="3695" style="font-weight: 400;"><span data-dcnode-id="3696" instrument_node=""> An M1 semi-automatic rifle weighed 9½ pounds, was over 43 inches long and relied on en bloc eight-round clips of .30-06 ammo. &nbsp;It was powerful and accurate but no match for sheer numbers of enemy.</span></span></li><span data-dcnode-id="3693" instrument_node="">
</span><li data-dcnode-id="3690"><span data-dcnode-id="3691" style="font-weight: 400;"><span data-dcnode-id="3692" instrument_node=""> An M1 semi-automatic carbine was lighter—just under 6 pounds—with a 15-round clip of .30-caliber carbine. &nbsp;The M2 carbine offered selective fire and a 30-round banana clip. &nbsp;However, neither was able to stop a swarming enemy.</span></span></li><span data-dcnode-id="3689" instrument_node="">
</span></ul><span data-dcnode-id="3687" instrument_node="">
</span><p data-dcnode-id="3684"><span data-dcnode-id="3685" style="font-weight: 400;"><span data-dcnode-id="3686" instrument_node="">With lessons learned in Korea and the Vietnam conflict building, the Army knew it needed something better. &nbsp;The challenge was what that “better” would be and how it would be done.</span></span></p><span data-dcnode-id="3683" instrument_node="">
</span><p data-dcnode-id="3680"><span data-dcnode-id="3681" style="font-weight: 400;"><span data-dcnode-id="3682" instrument_node="">The overall goal was to have an all-in-one, one small arms weapon that—in the words of the M16’s creator Eugene Stoner—“could take the place of the M1 rifle, the carbine, the grease gun . &nbsp;. &nbsp;. &nbsp;the .45-caliber submachine gun and the BAR.”</span></span></p><span data-dcnode-id="3679" instrument_node="">
</span><figure aria-describedby="caption-attachment-17537" class="wp-caption aligncenter" data-dcnode-id="3675" id="attachment_17537" style="width: 600px"><img alt="M1 Garand with Bayonet" class="size-full wp-image-17537" data-dcnode-id="3678" height="274" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2017/09/M1-Garand-with-Bayonet-e1506810512923.png&amp;raw" width="600"><figcaption class="wp-caption-text" data-dcnode-id="3676" id="caption-attachment-17537"><span data-dcnode-id="3677" instrument_node="">M1 Garand with Bayonet</span></figcaption></figure><span data-dcnode-id="3674" instrument_node="">
</span><p data-dcnode-id="3671"><span data-dcnode-id="3672" style="font-weight: 400;"><span data-dcnode-id="3673" instrument_node="">Gee, is that all you wanted? &nbsp;Why didn’t you just say so, right?</span></span></p><span data-dcnode-id="3670" instrument_node="">
</span><h2 data-dcnode-id="3667"><span data-dcnode-id="3668" style="font-weight: 400;"><span data-dcnode-id="3669" instrument_node="">Rethinking Effective Range and Caliber</span></span></h2><span data-dcnode-id="3666" instrument_node="">
</span><p data-dcnode-id="3663"><span data-dcnode-id="3664" style="font-weight: 400;"><span data-dcnode-id="3665" instrument_node="">Researchers at Aberdeen Proving Ground’s Ballistics Research Laboratories (BRL) had been analyzing the lethality of ammunition, looking at mass and velocity since 1938. &nbsp;This may seem like dry stuff now, but then, these were radical ideas.</span></span></p><span data-dcnode-id="3662" instrument_node="">
</span><figure aria-describedby="caption-attachment-22979" class="wp-caption aligncenter" data-dcnode-id="3658" id="attachment_22979" style="width: 600px"><img alt="First Meeting of the Scientific Advisory Committee at the Ballistic Research Laboratory" class="size-full wp-image-22979" data-dcnode-id="3661" height="464" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2018/02/First-Meeting-of-the-Scientific-Advisory-Committee-at-the-Ballistic-Research-Laboratory-e1519678582172.gif&amp;raw" width="600"><figcaption class="wp-caption-text" data-dcnode-id="3659" id="caption-attachment-22979"><span data-dcnode-id="3660" instrument_node="">First Meeting of the Scientific Advisory Committee at the Ballistic Research Laboratory</span></figcaption></figure><span data-dcnode-id="3657" instrument_node="">
</span><p data-dcnode-id="3649"><span data-dcnode-id="3655" style="font-weight: 400;"><span data-dcnode-id="3656" instrument_node="">In particular, BRL engineer Donald Hall’s </span></span><i data-dcnode-id="3652"><span data-dcnode-id="3653" style="font-weight: 400;"><span data-dcnode-id="3654" instrument_node="">Effectiveness Study of the Infantry Rifle</span></span></i><span data-dcnode-id="3650" style="font-weight: 400;"><span data-dcnode-id="3651" instrument_node=""> released in March of 1952 revealed some unexpected realities unique to the modern battlefield:</span></span></p><span data-dcnode-id="3648" instrument_node="">
</span><ul data-dcnode-id="3634"><span data-dcnode-id="3647" instrument_node="">
</span><li data-dcnode-id="3644"><span data-dcnode-id="3645" style="font-weight: 400;"><span data-dcnode-id="3646" instrument_node=""> The range of rifle fire rarely exceeded 500 yards.</span></span></li><span data-dcnode-id="3643" instrument_node="">
</span><li data-dcnode-id="3640"><span data-dcnode-id="3641" style="font-weight: 400;"><span data-dcnode-id="3642" instrument_node=""> Rifle fire was most effective at about 120 yards or less.</span></span></li><span data-dcnode-id="3639" instrument_node="">
</span><li data-dcnode-id="3636"><span data-dcnode-id="3637" style="font-weight: 400;"><span data-dcnode-id="3638" instrument_node=""> The most lethal bullet would be high-velocity but small-caliber.</span></span></li><span data-dcnode-id="3635" instrument_node="">
</span></ul><span data-dcnode-id="3633" instrument_node="">
</span><p data-dcnode-id="3625"><span data-dcnode-id="3631" style="font-weight: 400;"><span data-dcnode-id="3632" instrument_node="">To second the motion, Johns Hopkins University’s Operations Research Office (ORO) released its </span></span><i data-dcnode-id="3628"><span data-dcnode-id="3629" style="font-weight: 400;"><span data-dcnode-id="3630" instrument_node="">Operations Requirements for an Infantry Hand Weapon</span></span></i><span data-dcnode-id="3626" style="font-weight: 400;"><span data-dcnode-id="3627" instrument_node=""> just three months later. &nbsp;Known as the Hitchman Report, its results were equally startling:</span></span></p><span data-dcnode-id="3624" instrument_node="">
</span><ul data-dcnode-id="3610"><span data-dcnode-id="3623" instrument_node="">
</span><li data-dcnode-id="3620"><span data-dcnode-id="3621" style="font-weight: 400;"><span data-dcnode-id="3622" instrument_node=""> Military rifles were effective only at 300 yards or less.</span></span></li><span data-dcnode-id="3619" instrument_node="">
</span><li data-dcnode-id="3616"><span data-dcnode-id="3617" style="font-weight: 400;"><span data-dcnode-id="3618" instrument_node=""> Most kills happened at less than 100 yards.</span></span></li><span data-dcnode-id="3615" instrument_node="">
</span><li data-dcnode-id="3612"><span data-dcnode-id="3613" style="font-weight: 400;"><span data-dcnode-id="3614" instrument_node=""> Small-caliber ammunition best performed the task.</span></span></li><span data-dcnode-id="3611" instrument_node="">
</span></ul><span data-dcnode-id="3609" instrument_node="">
</span><p data-dcnode-id="3606"><span data-dcnode-id="3607" style="font-weight: 400;"><span data-dcnode-id="3608" instrument_node="">Additional ORO research revealed two more crucial facts: </span></span></p><span data-dcnode-id="3605" instrument_node="">
</span><ul data-dcnode-id="3595"><span data-dcnode-id="3604" instrument_node="">
</span><li data-dcnode-id="3601"><span data-dcnode-id="3602" style="font-weight: 400;"><span data-dcnode-id="3603" instrument_node=""> Soldiers aimed only the first of their eight M1 rounds. &nbsp;</span></span></li><span data-dcnode-id="3600" instrument_node="">
</span><li data-dcnode-id="3597"><span data-dcnode-id="3598" style="font-weight: 400;"><span data-dcnode-id="3599" instrument_node=""> Despite aim, wounds inflicted in battle were not concentrated in targeted body parts but instead were surprisingly randomly distributed. &nbsp;</span></span></li><span data-dcnode-id="3596" instrument_node="">
</span></ul><span data-dcnode-id="3594" instrument_node="">
</span><p data-dcnode-id="3591"><span data-dcnode-id="3592" style="font-weight: 400;"><span data-dcnode-id="3593" instrument_node="">Again, the answer seemed to lie not in a long-range, highly accurate step-stopper but in a weapon that would fire a small-caliber bullet with high-velocity lethality—many of them in fact.</span></span></p><span data-dcnode-id="3590" instrument_node="">
</span><h2 data-dcnode-id="3587"><span data-dcnode-id="3588" style="font-weight: 400;"><span data-dcnode-id="3589" instrument_node="">M14—The First Try</span></span></h2><span data-dcnode-id="3586" instrument_node="">
</span><p data-dcnode-id="3583"><span data-dcnode-id="3584" style="font-weight: 400;"><span data-dcnode-id="3585" instrument_node="">At first, the story seems simple enough.</span></span></p><span data-dcnode-id="3582" instrument_node="">
</span><p data-dcnode-id="3579"><span data-dcnode-id="3580" style="font-weight: 400;"><span data-dcnode-id="3581" instrument_node="">Reluctant to accept the idea of small-caliber efficiency, the Army basically remade the M1 into the M14 by attempting to make it fully automatic. &nbsp;</span></span></p><span data-dcnode-id="3578" instrument_node="">
</span><figure aria-describedby="caption-attachment-22977" class="wp-caption aligncenter" data-dcnode-id="3574" id="attachment_22977" style="width: 600px"><img alt="M14" class="size-full wp-image-22977" data-dcnode-id="3577" height="138" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2018/02/M14-e1519678129217.jpg&amp;raw" srcset="https://www.pewpewtactical.com/wp-content/uploads/2018/02/M14-e1519678129217.jpg 600w, https://www.pewpewtactical.com/wp-content/uploads/2018/02/M14-e1519678129217-300x69.jpg 300w" width="600"><figcaption class="wp-caption-text" data-dcnode-id="3575" id="caption-attachment-22977"><span data-dcnode-id="3576" instrument_node="">M14</span></figcaption></figure><span data-dcnode-id="3573" instrument_node="">
</span><p data-dcnode-id="3570"><span data-dcnode-id="3571" style="font-weight: 400;"><span data-dcnode-id="3572" instrument_node="">The M14 had selective fire and a 20-round box magazine. &nbsp;It used the new 7.62x51mm NATO rounds, but that firepower still meant that a soldier on full automatic could aim only the first round. &nbsp;After that, recoil steadily forced the barrel up and up. &nbsp;</span></span></p><span data-dcnode-id="3569" instrument_node="">
</span><p data-dcnode-id="3566"><span data-dcnode-id="3567" style="font-weight: 400;"><span data-dcnode-id="3568" instrument_node="">To boot, it was long—over 44 inches long—and heavy, weighing in at over 10 pounds loaded. &nbsp;</span></span></p><span data-dcnode-id="3565" instrument_node="">
</span><p data-dcnode-id="3562"><span data-dcnode-id="3563" style="font-weight: 400;"><span data-dcnode-id="3564" instrument_node="">Nevertheless, the Army began issuing them in 1959 only to determine a few years later that their performance in the Vietnamese jungles just didn’t cut it when facing an enemy armed with AK-47 assault rifles. &nbsp;By 1963, the Department of Defense was seriously revisiting the M14’s former competition, a lightweight known as an AR.</span></span></p><span data-dcnode-id="3561" instrument_node="">
</span><figure aria-describedby="caption-attachment-22978" class="wp-caption aligncenter" data-dcnode-id="3557" id="attachment_22978" style="width: 600px"><img alt="AK-47" class="size-full wp-image-22978" data-dcnode-id="3560" height="214" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2018/02/AK-47-e1519678224387.jpg&amp;raw" srcset="https://www.pewpewtactical.com/wp-content/uploads/2018/02/AK-47-e1519678224387.jpg 600w, https://www.pewpewtactical.com/wp-content/uploads/2018/02/AK-47-e1519678224387-300x107.jpg 300w" width="600"><figcaption class="wp-caption-text" data-dcnode-id="3558" id="caption-attachment-22978"><span data-dcnode-id="3559" instrument_node="">AK-47</span></figcaption></figure><span data-dcnode-id="3556" instrument_node="">
</span><p data-dcnode-id="3553"><span data-dcnode-id="3554" style="font-weight: 400;"><span data-dcnode-id="3555" instrument_node="">Wait, you say. &nbsp;“Revisiting?”</span></span></p><span data-dcnode-id="3552" instrument_node="">
</span><p data-dcnode-id="3549"><span data-dcnode-id="3550" style="font-weight: 400;"><span data-dcnode-id="3551" instrument_node="">Yes. &nbsp;Revisiting. &nbsp;You see, the AR had been around for a while, but the casting calls for the high-performing outsider hadn’t gone particularly well.</span></span></p><span data-dcnode-id="3548" instrument_node="">
</span><h2 data-dcnode-id="3545"><span data-dcnode-id="3546" style="font-weight: 400;"><span data-dcnode-id="3547" instrument_node="">AR Is for ArmaLite</span></span></h2><span data-dcnode-id="3544" instrument_node="">
</span><p data-dcnode-id="3541"><span data-dcnode-id="3542" style="font-weight: 400;"><span data-dcnode-id="3543" instrument_node="">In the 1950s, the Fairchild Engine and Airplane Corporation decided to branch out into small arms. &nbsp;By 1954, ArmaLite was the start-up division, intent on designing and manufacturing a new generation of small arms from its base in Hollywood, California. &nbsp;</span></span></p><span data-dcnode-id="3540" instrument_node="">
</span><p data-dcnode-id="3537"><span data-dcnode-id="3538" style="font-weight: 400;"><span data-dcnode-id="3539" instrument_node="">Its first almost-sale was its AR-5, a .22-caliber bolt-action rifle designed for the Air Force. &nbsp;It weighed less than 3 pounds and could be broken apart to store the barrel and works in the plastic stock. &nbsp;It was to be the MA-1, but the sales never really happened.</span></span></p><span data-dcnode-id="3536" instrument_node="">
</span><figure aria-describedby="caption-attachment-20041" class="wp-caption aligncenter" data-dcnode-id="3532" id="attachment_20041" style="width: 600px"><img alt="AR-5" class="size-full wp-image-20041" data-dcnode-id="3535" height="197" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2017/12/AR-5.png&amp;raw" srcset="https://www.pewpewtactical.com/wp-content/uploads/2017/12/AR-5.png 600w, https://www.pewpewtactical.com/wp-content/uploads/2017/12/AR-5-300x99.png 300w" width="600"><figcaption class="wp-caption-text" data-dcnode-id="3533" id="caption-attachment-20041"><span data-dcnode-id="3534" instrument_node="">An AR-5</span></figcaption></figure><span data-dcnode-id="3531" instrument_node="">
</span><p data-dcnode-id="3528"><span data-dcnode-id="3529" style="font-weight: 400;"><span data-dcnode-id="3530" instrument_node="">Wanting to be taken seriously, ArmaLite recruited Eugene Stoner to become its chief engineer. &nbsp;Using his past experience in the aircraft industry, he’d been experimenting with using strong yet lightweight materials for firearms.</span></span></p><span data-dcnode-id="3527" instrument_node="">
</span><p data-dcnode-id="3524"><span data-dcnode-id="3525" style="font-weight: 400;"><span data-dcnode-id="3526" instrument_node="">At ArmaLite, he started with the gas-operated AR-10, completing it in 1955. &nbsp;At barely 7 pounds, it shot 20 rounds of 7.62x51mm NATO and had anodized aluminum receivers and a fiberglass composite stock. &nbsp;To reduce recoil, the barrel was in line with the stock and the sites raised to eye level. &nbsp;While the newcomer’s novel construction failed to sway ordnance officials in 1955, it didn’t disappear. &nbsp;</span></span></p><span data-dcnode-id="3523" instrument_node="">
</span><figure aria-describedby="caption-attachment-22984" class="wp-caption aligncenter" data-dcnode-id="3519" id="attachment_22984" style="width: 600px"><img alt="AR-10s" class="size-full wp-image-22984" data-dcnode-id="3522" height="429" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2018/02/AR-10s-e1519685170965.jpg&amp;raw" width="600"><figcaption class="wp-caption-text" data-dcnode-id="3520" id="caption-attachment-22984"><span data-dcnode-id="3521" instrument_node="">AR-10s</span></figcaption></figure><span data-dcnode-id="3518" instrument_node="">
</span><p data-dcnode-id="3515"><span data-dcnode-id="3516" style="font-weight: 400;"><span data-dcnode-id="3517" instrument_node="">It was simply the first time it fell beneath the heel of the Springfield Armory’s T44—or M14.</span></span></p><span data-dcnode-id="3514" instrument_node="">
</span><div class="in-post-ad" data-dcnode-id="3510" id="ppt_inpost_mid" style="display: block;"><span data-dcnode-id="3513" instrument_node="">
</span><div data-dcnode-id="3512" id="div-gpt-ad-1622125165565-0" style="min-width: 300px; min-height: 60px;"></div><span data-dcnode-id="3511" instrument_node="">
</span></div><h2 data-dcnode-id="3507"><span data-dcnode-id="3508" style="font-weight: 400;"><span data-dcnode-id="3509" instrument_node="">W Is for Wyman</span></span></h2><span data-dcnode-id="3506" instrument_node="">
</span><p data-dcnode-id="3503"><span data-dcnode-id="3504" style="font-weight: 400;"><span data-dcnode-id="3505" instrument_node="">Meanwhile, General Willard Wyman, a West Point graduate turned four-star Commanding General of Continental Army Command (CONARC), was impressed with ArmaLite’s AR-10. &nbsp;In fact, he was so impressed that in 1957, he visited Eugene Stoner, invited him to try again and offered funding in exchange for proprietary rights to create the AR-15.</span></span></p><span data-dcnode-id="3502" instrument_node="">
</span><p data-dcnode-id="3499"><span data-dcnode-id="3500" style="font-weight: 400;"><span data-dcnode-id="3501" instrument_node="">Wyman is a name worth knowing in this context because he integrated the Trainfire program and its then-novel ideas of modern warfare—lots of ammo at terrifyingly close ranges—into the Army’s basic training. &nbsp;He even requested delays on the T44 decision to allow time for the AR-15 under development, but it was not to be.</span></span></p><span data-dcnode-id="3498" instrument_node="">
</span><figure aria-describedby="caption-attachment-22985" class="wp-caption aligncenter" data-dcnode-id="3494" id="attachment_22985" style="width: 400px"><img alt="Willard Wyman" class="wp-image-22985" data-dcnode-id="3497" height="493" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2018/02/Willard-Wyman-e1519685312642.png&amp;raw" width="400"><figcaption class="wp-caption-text" data-dcnode-id="3495" id="caption-attachment-22985"><span data-dcnode-id="3496" instrument_node="">Willard Wyman</span></figcaption></figure><span data-dcnode-id="3493" instrument_node="">
</span><p data-dcnode-id="3490"><span data-dcnode-id="3491" style="font-weight: 400;"><span data-dcnode-id="3492" instrument_node="">While Wyman ordered 10 of Stoner’s AR-15s, Secretary of the Army Wilbur Brucker publicly adopted the T44 as the chosen M14. &nbsp;Wyman, however, kept the faith, and Stoner and ArmaLite kept working.</span></span></p><span data-dcnode-id="3489" instrument_node="">
</span><p data-dcnode-id="3486"><span data-dcnode-id="3487" style="font-weight: 400;"><span data-dcnode-id="3488" instrument_node="">In 1958, Wyman ordered the Army to test his AR-15s.</span></span></p><span data-dcnode-id="3485" instrument_node="">
</span><h2 data-dcnode-id="3482"><span data-dcnode-id="3483" style="font-weight: 400;"><span data-dcnode-id="3484" instrument_node="">ArmaLite’s AR-15</span></span></h2><span data-dcnode-id="3481" instrument_node="">
</span><p data-dcnode-id="3478"><span data-dcnode-id="3479" style="font-weight: 400;"><span data-dcnode-id="3480" instrument_node="">So, you ask, what were they testing?</span></span></p><span data-dcnode-id="3477" instrument_node="">
</span><p data-dcnode-id="3474"><span data-dcnode-id="3475" style="font-weight: 400;"><span data-dcnode-id="3476" instrument_node="">Stoner’s first AR-15 weighed just 6 pounds or so and was 37½ inches long. &nbsp;The hand guard around the barrel was Bakelite, and a three-pronged flash suppressor graced the tip of the skinny barrel.</span></span></p><span data-dcnode-id="3473" instrument_node="">
</span><figure aria-describedby="caption-attachment-22986" class="wp-caption aligncenter" data-dcnode-id="3469" id="attachment_22986" style="width: 600px"><img alt="Miss America 1962 with an Original AR-15" class="size-full wp-image-22986" data-dcnode-id="3472" height="400" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2018/02/Miss-America-1962-with-an-Original-AR-15-e1519685518638.jpg&amp;raw" width="600"><figcaption class="wp-caption-text" data-dcnode-id="3470" id="caption-attachment-22986"><span data-dcnode-id="3471" instrument_node="">Miss America 1962 with an Original AR-15</span></figcaption></figure><span data-dcnode-id="3468" instrument_node="">
</span><p data-dcnode-id="3465"><span data-dcnode-id="3466" style="font-weight: 400;"><span data-dcnode-id="3467" instrument_node="">Crafted from fiberglass, hard-anodized aluminum and steel, the AR-15 design was gas-operated. &nbsp;It cleverly ported gas from the charge through a tube to force the bolt carrier to the rear and eject the spent cartridge so that a fresh round could load.</span></span></p><span data-dcnode-id="3464" instrument_node="">
</span><p data-dcnode-id="3461"><span data-dcnode-id="3462" style="font-weight: 400;"><span data-dcnode-id="3463" instrument_node="">Selective fire, it had a 25-round magazine but used the smaller caliber .22s, making it highly controllable whether set on semi-automatic or fully automatic. &nbsp;</span></span></p><span data-dcnode-id="3460" instrument_node="">
</span><div data-dcnode-id="3453" id="pptOptin1" style="display: block;"><span data-dcnode-id="3459" instrument_node="">
</span><a class="optin" data-dcnode-id="3455" data-dripid="28051371" data-source="yellow-box" data-sourcetype="newsletter" data-target="#footerOptin" data-toggle="optin-modal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/offer/%3Fd%3D28051371%26h%3D%26sh%3D"><b data-dcnode-id="3457"><span data-dcnode-id="3458" instrument_node="">BONUS: Shoot better.</span></b><span data-dcnode-id="3456" instrument_node=""> Download our exclusive shooting targets for FREE ($47 value)</span></a><span data-dcnode-id="3454" instrument_node=""> </span></div><p data-dcnode-id="3450"><span data-dcnode-id="3451" style="font-weight: 400;"><span data-dcnode-id="3452" instrument_node="">Because of the pressures involved, the AR-15 needed a stronger case. &nbsp;Aberdeen Proving Ground and Robert Hutton helped design the 222 Special—a 55-grain full metal jacket boat-tail bullet made by Sierra Bullet Company and loaded by Remington Arms.</span></span></p><span data-dcnode-id="3449" instrument_node="">
</span><figure aria-describedby="caption-attachment-22987" class="wp-caption aligncenter" data-dcnode-id="3445" id="attachment_22987" style="width: 600px"><img alt="222 Remington" class="size-full wp-image-22987" data-dcnode-id="3448" height="600" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2018/02/222-Remington-e1519685805461.jpg&amp;raw" width="600"><figcaption class="wp-caption-text" data-dcnode-id="3446" id="caption-attachment-22987"><span data-dcnode-id="3447" instrument_node="">Now Widely Known as 222 Remington</span></figcaption></figure><span data-dcnode-id="3444" instrument_node="">
</span><p data-dcnode-id="3441"><span data-dcnode-id="3442" style="font-weight: 400;"><span data-dcnode-id="3443" instrument_node="">In operation, both the AR-15’s selective fire lever and its straight-drop magazine release were easily accessible from the pistol grip. &nbsp;All it took was the flick of a thumb or the press of a finger. &nbsp;</span></span></p><span data-dcnode-id="3440" instrument_node="">
</span><p data-dcnode-id="3437"><span data-dcnode-id="3438" style="font-weight: 400;"><span data-dcnode-id="3439" instrument_node="">The smaller caliber ammunition also helped with weight. &nbsp;Whereas an M14 and a standard 100 rounds weighed about 17 pounds, for the same load, you could carry an AR-15 and 280 rounds—nearly triple the ammo.</span></span></p><span data-dcnode-id="3436" instrument_node="">
</span><p data-dcnode-id="3433"><span data-dcnode-id="3434" style="font-weight: 400;"><span data-dcnode-id="3435" instrument_node="">A slick, light weapon plus plenty of rounds—what was not to like?</span></span></p><span data-dcnode-id="3432" instrument_node="">
</span><h2 data-dcnode-id="3429"><span data-dcnode-id="3430" style="font-weight: 400;"><span data-dcnode-id="3431" instrument_node="">The Politics of Firearms</span></span></h2><span data-dcnode-id="3428" instrument_node="">
</span><p data-dcnode-id="3425"><span data-dcnode-id="3426" style="font-weight: 400;"><span data-dcnode-id="3427" instrument_node="">New ideas can be problematic, and the AR-15 was no exception. &nbsp;In addition to General Wyman, several other personalities played significant roles in the M16’s path to service.</span></span></p><span data-dcnode-id="3424" instrument_node="">
</span><p data-dcnode-id="3421"><span data-dcnode-id="3422" style="font-weight: 400;"><span data-dcnode-id="3423" instrument_node="">Dr. &nbsp;Frederick Carten, head of the Army Ordnance Corps, wasn’t exactly enthusiastic about a small-caliber weapon made of plastic that felt—and looked—like a toy. &nbsp;</span></span></p><span data-dcnode-id="3420" instrument_node="">
</span><figure aria-describedby="caption-attachment-22988" class="wp-caption aligncenter" data-dcnode-id="3416" id="attachment_22988" style="width: 600px"><img alt="Original AR-15" class="size-full wp-image-22988" data-dcnode-id="3419" height="168" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2018/02/Original-AR-15-e1519685938624.jpg&amp;raw" width="600"><figcaption class="wp-caption-text" data-dcnode-id="3417" id="caption-attachment-22988"><span data-dcnode-id="3418" instrument_node="">Too Much Like a Toy Then, Too Scary Now</span></figcaption></figure><span data-dcnode-id="3415" instrument_node="">
</span><p data-dcnode-id="3412"><span data-dcnode-id="3413" style="font-weight: 400;"><span data-dcnode-id="3414" instrument_node="">By reputation, he was resistant to the idea of a small-caliber weapon developed outside of traditional channels—that is, Springfield Armory—using unproven materials like plastic and aluminum. &nbsp;He is often credited with obstructing the AR-15’s progress during testing and demanding modifications that degraded performance—primarily due to the Army’s distaste for a small-caliber weapon.</span></span></p><span data-dcnode-id="3411" instrument_node="">
</span><p data-dcnode-id="3398"><span data-dcnode-id="3409" style="font-weight: 400;"><span data-dcnode-id="3410" instrument_node="">When the AR-15 was put to the test in the Arctic in 1958, for example, Army Ordnance’s words of the day were </span></span><i data-dcnode-id="3406"><span data-dcnode-id="3407" style="font-weight: 400;"><span data-dcnode-id="3408" instrument_node="">inaccuracy</span></span></i><span data-dcnode-id="3404" style="font-weight: 400;"><span data-dcnode-id="3405" instrument_node=""> and </span></span><i data-dcnode-id="3401"><span data-dcnode-id="3402" style="font-weight: 400;"><span data-dcnode-id="3403" instrument_node="">malfunction</span></span></i><span data-dcnode-id="3399" style="font-weight: 400;"><span data-dcnode-id="3400" instrument_node="">. &nbsp;</span></span></p><span data-dcnode-id="3397" instrument_node="">
</span><p data-dcnode-id="3394"><span data-dcnode-id="3395" style="font-weight: 400;"><span data-dcnode-id="3396" instrument_node="">However, when Stoner flew to the location, he found that sites had been purposely disassembled and welding rods put in their place to misalign the firearm. &nbsp;A senior officer also put him on notice for trying to advance a small-caliber weapon that would surely endanger the soldier carrying it.</span></span></p><span data-dcnode-id="3393" instrument_node="">
</span><p data-dcnode-id="3390"><span data-dcnode-id="3391" style="font-weight: 400;"><span data-dcnode-id="3392" instrument_node="">Both the Army Infantry Board and the Arctic Test Board—in 1958 and 1959, respectively—recommended that the AR-15 be “considered as a potential replacement for the M14.”</span></span></p><span data-dcnode-id="3389" instrument_node="">
</span><figure aria-describedby="caption-attachment-22989" class="wp-caption aligncenter" data-dcnode-id="3385" id="attachment_22989" style="width: 400px"><img alt="Arctic Test Branch HQ" class="wp-image-22989" data-dcnode-id="3388" height="570" loading="lazy" sizes="(max-width: 400px) 100vw, 400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2018/02/Arctic-Test-Branch-HQ.jpg&amp;raw" srcset="https://www.pewpewtactical.com/wp-content/uploads/2018/02/Arctic-Test-Branch-HQ.jpg 585w, https://www.pewpewtactical.com/wp-content/uploads/2018/02/Arctic-Test-Branch-HQ-210x300.jpg 210w" width="400"><figcaption class="wp-caption-text" data-dcnode-id="3386" id="caption-attachment-22989"><span data-dcnode-id="3387" instrument_node="">Headquarters of the Arctic Test Branch</span></figcaption></figure><span data-dcnode-id="3384" instrument_node="">
</span><p data-dcnode-id="3381"><span data-dcnode-id="3382" style="font-weight: 400;"><span data-dcnode-id="3383" instrument_node="">By the end of testing, Carten assessed that the AR-15 “had not demonstrated sufficient technical merit and should not be developed by the Army,” In 1959, Army Chief of Staff Maxwell Taylor decided to play it safe, following the Ordnance Corps’ lead, and the M14 continued its reign.</span></span></p><span data-dcnode-id="3380" instrument_node="">
</span><h2 data-dcnode-id="3377"><span data-dcnode-id="3378" style="font-weight: 400;"><span data-dcnode-id="3379" instrument_node="">Colt Owns the AR-15</span></span></h2><span data-dcnode-id="3376" instrument_node="">
</span><p data-dcnode-id="3373"><span data-dcnode-id="3374" style="font-weight: 400;"><span data-dcnode-id="3375" instrument_node="">The AR-15’s future was looking grim. &nbsp;Fairchild was unhappy with its nearly million-and-a-half-dollar investment. &nbsp;By the end of 1958, Fairchild had claimed losses well over $17 million.</span></span></p><span data-dcnode-id="3372" instrument_node="">
</span><p data-dcnode-id="3369"><span data-dcnode-id="3370" style="font-weight: 400;"><span data-dcnode-id="3371" instrument_node="">On February 19, 1959, Fairchild sold the exclusive manufacturing and merchandising rights for the AR-15 to Colt’s Patent Firearms Manufacturing Company for $75,000 and a 4.5-percent royalty on future sales. &nbsp;</span></span></p><span data-dcnode-id="3368" instrument_node="">
</span><p data-dcnode-id="3365"><span data-dcnode-id="3366" style="font-weight: 400;"><span data-dcnode-id="3367" instrument_node="">In addition, Colt agreed to pay Cooper-MacDonald—a marketing group with ties in Southeast Asia—$250,000 and a 1-percent royalty per weapon as a finder’s fee.</span></span></p><span data-dcnode-id="3364" instrument_node="">
</span><figure aria-describedby="caption-attachment-22991" class="wp-caption aligncenter" data-dcnode-id="3360" id="attachment_22991" style="width: 600px"><img alt="Early Colt AR-15" class="size-full wp-image-22991" data-dcnode-id="3363" height="149" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2018/02/Early-Colt-AR-15-e1519686552134.jpg&amp;raw" width="600"><figcaption class="wp-caption-text" data-dcnode-id="3361" id="caption-attachment-22991"><span data-dcnode-id="3362" instrument_node="">Early Colt AR-15</span></figcaption></figure><span data-dcnode-id="3359" instrument_node="">
</span><p data-dcnode-id="3356"><span data-dcnode-id="3357" style="font-weight: 400;"><span data-dcnode-id="3358" instrument_node="">No, I didn’t mess up any zeroes. &nbsp;A very discouraged and in-debt Fairchild sold its $1.5-million baby for bird shot. &nbsp;By the way, Colt was still in the black but not by much, so the AR-15 investment and partnership with Cooper-MacDonald would be a gamble. &nbsp;</span></span></p><span data-dcnode-id="3355" instrument_node="">
</span><p data-dcnode-id="3352"><span data-dcnode-id="3353" style="font-weight: 400;"><span data-dcnode-id="3354" instrument_node="">Interestingly, in May of 1959, three months after Army Chief of Staff Taylor’s announcement, a report from the Combat Developments Experimentation Center at Fort Ord in California surfaced. &nbsp;It detailed stunning simulated battlefield test results for the AR-15 and even proposed the “early replacement of current rifles”—the M14s—with AR-15s.</span></span></p><span data-dcnode-id="3351" instrument_node="">
</span><p data-dcnode-id="3348"><span data-dcnode-id="3349" style="font-weight: 400;"><span data-dcnode-id="3350" instrument_node="">Did Colt have a clue? &nbsp;Who knows? &nbsp;What we do know is that Colt put its sales reps to work and petitioned the Ordnance Corps for a retrial. &nbsp;Initially, Ordnance denied the request, but events continued to stir the pot. &nbsp;</span></span></p><span data-dcnode-id="3347" instrument_node="">
</span><p data-dcnode-id="3344"><span data-dcnode-id="3345" style="font-weight: 400;"><span data-dcnode-id="3346" instrument_node="">For one, Colt co-hosted a Fourth of July AR-15-meets-watermelon extravaganza in 1960 that impressed then-Air Force Vice Chief of Staff General Curtis LeMay, who had documented the need for a more effective small arms weapon. &nbsp;When he became Air Force Chief of Staff in the summer of 1961, he applied his $2-million budget to an order of 80,000 AR-15 rifles to be procured over the next five years. &nbsp;</span></span></p><span data-dcnode-id="3343" instrument_node="">
</span><figure aria-describedby="caption-attachment-22992" class="wp-caption aligncenter" data-dcnode-id="3339" id="attachment_22992" style="width: 600px"><img alt="Field-Stripped Colt M16A1" class="size-full wp-image-22992" data-dcnode-id="3342" height="380" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2018/02/Field-Stripped-Colt-M16A1-e1519686700187.jpg&amp;raw" width="600"><figcaption class="wp-caption-text" data-dcnode-id="3340" id="caption-attachment-22992"><span data-dcnode-id="3341" instrument_node="">Field-Stripped M16A1</span></figcaption></figure><span data-dcnode-id="3338" instrument_node="">
</span><p data-dcnode-id="3335"><span data-dcnode-id="3336" style="font-weight: 400;"><span data-dcnode-id="3337" instrument_node="">Despite repeated favorable tests, what should have been an in-house no-brainer met opposition from the Pentagon, the House defense appropriations subcommittee and even eventually President Kennedy thanks once again to Army Chief of Staff General Taylor and the Department of Defense’s penchant for one large-bore caliber. &nbsp;</span></span></p><span data-dcnode-id="3334" instrument_node="">
</span><p data-dcnode-id="3331"><span data-dcnode-id="3332" style="font-weight: 400;"><span data-dcnode-id="3333" instrument_node="">On May 15, 1962, Congress finally granted the Air Force’s request. &nbsp;The Air Force had its AR-15s within 72 hours. &nbsp;It included orders for more in its budgets for 1963, 1964 and 1965 for the 80,000 total—all this for a firearm it had formally adopted as its standard basic weapon on January 2, 1962.</span></span></p><span data-dcnode-id="3330" instrument_node="">
</span><p data-dcnode-id="3327"><span data-dcnode-id="3328" style="font-weight: 400;"><span data-dcnode-id="3329" instrument_node="">The Air Force was on board, but the AR-15’s story was still developing.</span></span></p><span data-dcnode-id="3326" instrument_node="">
</span><h2 data-dcnode-id="3323"><span data-dcnode-id="3324" style="font-weight: 400;"><span data-dcnode-id="3325" instrument_node="">ARPA, AGILE and the AR-15</span></span></h2><span data-dcnode-id="3322" instrument_node="">
</span><p data-dcnode-id="3319"><span data-dcnode-id="3320" style="font-weight: 400;"><span data-dcnode-id="3321" instrument_node="">In 1958, the Defense Department had created the Advanced Research Projects Agency — DARPA — to supply the military with game-changing technology. &nbsp;</span></span></p><span data-dcnode-id="3318" instrument_node="">
</span><p data-dcnode-id="3316"><span data-dcnode-id="3317" instrument_node="">You may be familiar with DARPA from their work with Boston Dynamics on the Spot project:</span></p><span data-dcnode-id="3315" instrument_node="">
</span><p data-dcnode-id="3314"></p><center data-dcnode-id="2795"><iframe allowfullscreen="allowfullscreen" data-dcnode-id="2796" frameborder="0" height="315" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/M8YjvHYbZ9w&amp;raw" width="560"><html data-cast-api-enabled="true" data-dcnode-id="2798" dir="ltr" lang="en"><head data-dcnode-id="3288"><meta charset="utf-8"><meta content="width=device-width, initial-scale=1" data-dcnode-id="3308" name="viewport"/><link data-dcnode-id="3303" href="https://www.youtube.com/s/player/596ef930/www-player.css" name="www-player" nonce="qgfBr4lF45BL6GFlNyDElQ" rel="stylesheet"/><title data-dcnode-id="3290">YouTube</title><link data-dcnode-id="3289" href="https://www.youtube.com/watch?v=M8YjvHYbZ9w" rel="canonical"/></meta></head><body class="date-20220426 en_US ltr site-center-aligned site-as-giant-card webkit webkit-534" data-dcnode-id="2799" dir="ltr"><div data-dcnode-id="2806" id="player" style="width: 100%; height: 100%;"><div aria-label="YouTube Video Player" class="html5-video-player ytp-exp-bottom-control-flexbox ytp-title-enable-channel-logo ytp-embed ytp-embed-playlist unstarted-mode ytp-hide-controls" data-dcnode-id="2807" data-version="/s/player/596ef930/player_ias.vflset/en_US/base.js" id="movie_player" tabindex="-1"><div class="html5-video-container" data-dcnode-id="3286" data-layer="0"><video class="video-stream html5-main-video" controlslist="nodownload" data-dcnode-id="3287" playsinline="" style="width: 530px; height: 300px; left: 0px; top: -300px;" tabindex="-1" webkit-playsinline=""></video></div><div class="ytp-gradient-top" data-dcnode-id="3285" data-layer="1"></div><div class="ytp-chrome-top ytp-show-cards-title" data-dcnode-id="3210" data-layer="1"><div class="ytp-title-channel" data-dcnode-id="3275"><div class="ytp-title-beacon" data-dcnode-id="3284"></div><a aria-label="Photo image of Boston Dynamics" class="ytp-title-channel-logo" data-dcnode-id="
