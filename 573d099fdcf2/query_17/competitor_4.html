</span><p data-dcnode-id="2788"><span data-dcnode-id="2789" style="font-weight: 400;"><span data-dcnode-id="2790" instrument_node="">DARPA’s William Godel took note of Colt’s AR-15s and decided to send 10 to Saigon as a test. &nbsp;The response was enthusiastically positive, and in 1962, another thousand went to South Vietnam. &nbsp;Field test results from military advisers and a Ranger battalion praised the weapon’s stopping power and the round’s devastating effectiveness, citing it as “the best ‘all around’ firearm in existence.”</span></span></p><span data-dcnode-id="2787" instrument_node="">
</span><p data-dcnode-id="2784"><span data-dcnode-id="2785" style="font-weight: 400;"><span data-dcnode-id="2786" instrument_node="">Initially, the troops liked it! &nbsp;They really, really liked it!</span></span></p><span data-dcnode-id="2783" instrument_node="">
</span><p data-dcnode-id="2780"><span data-dcnode-id="2781" style="font-weight: 400;"><span data-dcnode-id="2782" instrument_node="">That alone, however, wouldn’t be enough.</span></span></p><span data-dcnode-id="2779" instrument_node="">
</span><h2 data-dcnode-id="2776"><span data-dcnode-id="2777" style="font-weight: 400;"><span data-dcnode-id="2778" instrument_node="">The McNamara Factor</span></span></h2><span data-dcnode-id="2775" instrument_node="">
</span><p data-dcnode-id="2772"><span data-dcnode-id="2773" style="font-weight: 400;"><span data-dcnode-id="2774" instrument_node="">The M16’s story simply cannot be told without a nod to Kennedy’s Secretary of Defense Robert McNamara. &nbsp;He was aware of conflicting assessments of the AR-15 and the Ordnance Corps’ decided lack of impartiality. &nbsp;As a former Ford executive versed in assembly-line efficiency, he also was an avid proponent of having one universal weapon for all services. &nbsp;</span></span></p><span data-dcnode-id="2771" instrument_node="">
</span><figure aria-describedby="caption-attachment-22993" class="wp-caption aligncenter" data-dcnode-id="2767" id="attachment_22993" style="width: 600px"><img alt="McNamara and JFK" class="size-full wp-image-22993" data-dcnode-id="2770" height="352" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2018/02/McNamara-and-JFK-e1519687169633.jpg&amp;raw" width="600"><figcaption class="wp-caption-text" data-dcnode-id="2768" id="caption-attachment-22993"><span data-dcnode-id="2769" instrument_node="">McNamara and JFK</span></figcaption></figure><span data-dcnode-id="2766" instrument_node="">
</span><p data-dcnode-id="2763"><span data-dcnode-id="2764" style="font-weight: 400;"><span data-dcnode-id="2765" instrument_node="">McNamara had authorized the Project AGILE shipment of 1,000 AR-15s to South Vietnam and along with his famous “whiz kids” had determined that the AR-15 should be that universal weapon.</span></span></p><span data-dcnode-id="2762" instrument_node="">
</span><p data-dcnode-id="2759"><span data-dcnode-id="2760" style="font-weight: 400;"><span data-dcnode-id="2761" instrument_node="">There was also an evaluation of the AR-15 compared with the M14 and AK-47. &nbsp;While results were mixed and analysis somewhat biased yet again, the report recommended that 1964’s budget include</span></span></p><span data-dcnode-id="2758" instrument_node="">
</span><ul data-dcnode-id="2748"><span data-dcnode-id="2757" instrument_node="">
</span><li data-dcnode-id="2754"><span data-dcnode-id="2755" style="font-weight: 400;"><span data-dcnode-id="2756" instrument_node=""> 50,000 to 100,000 AR-15s for special forces, airborne and air assault units and</span></span></li><span data-dcnode-id="2753" instrument_node="">
</span><li data-dcnode-id="2750"><span data-dcnode-id="2751" style="font-weight: 400;"><span data-dcnode-id="2752" instrument_node=""> “a sufficient number” of M14s to provide infantry squads with “automatic rifle capability.”</span></span></li><span data-dcnode-id="2749" instrument_node="">
</span></ul><span data-dcnode-id="2747" instrument_node="">
</span><p data-dcnode-id="2744"><span data-dcnode-id="2745" style="font-weight: 400;"><span data-dcnode-id="2746" instrument_node="">It also suggested reducing the M14 program while expediting further development of the AR-15.</span></span></p><span data-dcnode-id="2743" instrument_node="">
</span><p data-dcnode-id="2735"><span data-dcnode-id="2741" style="font-weight: 400;"><span data-dcnode-id="2742" instrument_node="">McNamara halted M14 production in January of 1963 and adopted the AR-15 in its current state as the weapon of issue for all services. &nbsp;McNamara designated the Army as the purchasing agent while ordering the services to cooperate. &nbsp;However, nothing is ever that easy. &nbsp;That word choice—</span></span><i data-dcnode-id="2738"><span data-dcnode-id="2739" style="font-weight: 400;"><span data-dcnode-id="2740" instrument_node="">current state</span></span></i><span data-dcnode-id="2736" style="font-weight: 400;"><span data-dcnode-id="2737" instrument_node="">—would come back to haunt everyone.</span></span></p><span data-dcnode-id="2734" instrument_node="">
</span><p data-dcnode-id="2726"><span data-dcnode-id="2732" style="font-weight: 400;"><span data-dcnode-id="2733" instrument_node="">Over the ensuing months, Ordnance, the services and McNamara’s staff haggled over more than 130 changes to the AR-15’s </span></span><i data-dcnode-id="2729"><span data-dcnode-id="2730" style="font-weight: 400;"><span data-dcnode-id="2731" instrument_node="">current state</span></span></i><span data-dcnode-id="2727" style="font-weight: 400;"><span data-dcnode-id="2728" instrument_node=""> to launch the M16.</span></span></p><span data-dcnode-id="2725" instrument_node="">
</span><div data-dcnode-id="2715" id="pptOptin2" style="display: block;"><span data-dcnode-id="2724" instrument_node="">
</span><a class="optin" data-dcnode-id="2717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//courses.pewpewtactical.com/" target="_blank"><b data-dcnode-id="2722"><span data-dcnode-id="2723" instrument_node="">New to guns?</span></b><span data-dcnode-id="2721" instrument_node=""> Check out our online&nbsp;</span><span data-dcnode-id="2719" style="text-decoration: underline;"><span data-dcnode-id="2720" instrument_node="">Beginner Handgun Course</span></span><span data-dcnode-id="2718" instrument_node=""> that teaches all the important stuff you need to know.</span></a><span data-dcnode-id="2716" instrument_node=""> </span></div><p data-dcnode-id="2712"><span data-dcnode-id="2713" style="font-weight: 400;"><span data-dcnode-id="2714" instrument_node="">Key among them was that the Army insisted upon a forward assist that would allow a round to be forced into the chamber. &nbsp;Think about this a minute. &nbsp;If the gun jammed, the forward assist would give you a way to double down—likely on a dirty or fouled chamber that was causing the problem in the first place. &nbsp;Anyway, this resulted in two different models—the M16 and the M16A1 with a forward assist.</span></span></p><span data-dcnode-id="2711" instrument_node="">
</span><figure aria-describedby="caption-attachment-22994" class="wp-caption aligncenter" data-dcnode-id="2707" id="attachment_22994" style="width: 600px"><img alt="M16 and M16A1" class="size-full wp-image-22994" data-dcnode-id="2710" height="319" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2018/02/M16-and-M16A1-e1519687899477.jpg&amp;raw" width="600"><figcaption class="wp-caption-text" data-dcnode-id="2708" id="caption-attachment-22994"><span data-dcnode-id="2709" instrument_node="">M16 (Top) vs M16A1 (Bottom)</span></figcaption></figure><span data-dcnode-id="2706" instrument_node="">
</span><p data-dcnode-id="2703"><span data-dcnode-id="2704" style="font-weight: 400;"><span data-dcnode-id="2705" instrument_node="">The other significant change affected the ammunition. &nbsp;Stoner’s original design called for IMR 4475 propellant. &nbsp;However, production issues and that overpowering military need for standardization and more oomph resulted in a 5.56x45mm M194 ball powder cartridge that burned brighter and reached peak pressure faster than the intended IMR 4475 stick powder. &nbsp;</span></span></p><span data-dcnode-id="2702" instrument_node="">
</span><p data-dcnode-id="2699"><span data-dcnode-id="2700" style="font-weight: 400;"><span data-dcnode-id="2701" instrument_node="">To compensate for the change in ammunition, the barrel was also altered from a twist rate of one turn in 14 inches to one turn in 12 inches.</span></span></p><span data-dcnode-id="2698" instrument_node="">
</span><p data-dcnode-id="2695"><span data-dcnode-id="2696" style="font-weight: 400;"><span data-dcnode-id="2697" instrument_node="">Despite these modifications and additional tweaks, other features of the weapon remained unchanged—namely, the chamber remained unchromed. &nbsp;Remember that these firearms were destined for the humid, steamy Vietnamese climate.</span></span></p><span data-dcnode-id="2694" instrument_node="">
</span><figure aria-describedby="caption-attachment-23002" class="wp-caption aligncenter" data-dcnode-id="2690" id="attachment_23002" style="width: 600px"><img alt="Rain Vietnam War" class="size-full wp-image-23002" data-dcnode-id="2693" height="338" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2018/02/Rain-Vietnam-War-e1519688107697.jpg&amp;raw" width="600"><figcaption class="wp-caption-text" data-dcnode-id="2691" id="caption-attachment-23002"><span data-dcnode-id="2692" instrument_node="">Not Exactly Dry</span></figcaption></figure><span data-dcnode-id="2689" instrument_node="">
</span><p data-dcnode-id="2686"><span data-dcnode-id="2687" style="font-weight: 400;"><span data-dcnode-id="2688" instrument_node="">Just go ahead and say it now: “Uh-oh.”</span></span></p><span data-dcnode-id="2685" instrument_node="">
</span><p data-dcnode-id="2682"><span data-dcnode-id="2683" style="font-weight: 400;"><span data-dcnode-id="2684" instrument_node="">Nevertheless, at the beginning of November of 1963, Colt received a $13.5 million tasty government contract for 104,000 rifles—19,000 M16s for the Air Force and 85,000 M16A1s with a forward assist for the Army and Marines.</span></span></p><span data-dcnode-id="2681" instrument_node="">
</span><p data-dcnode-id="2678"><span data-dcnode-id="2679" style="font-weight: 400;"><span data-dcnode-id="2680" instrument_node="">Hooah! &nbsp;The AR-15 was all grown up into an M16. &nbsp;Now, was it ready to serve?</span></span></p><span data-dcnode-id="2677" instrument_node="">
</span><figure aria-describedby="caption-attachment-23003" class="wp-caption aligncenter" data-dcnode-id="2673" id="attachment_23003" style="width: 600px"><img alt="Using M16s in Vietnam" class="size-full wp-image-23003" data-dcnode-id="2676" height="477" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2018/02/Using-M16s-in-Vietnam-e1519688225172.jpg&amp;raw" width="600"><figcaption class="wp-caption-text" data-dcnode-id="2674" id="caption-attachment-23003"><span data-dcnode-id="2675" instrument_node="">Using M16s in Vietnam</span></figcaption></figure><span data-dcnode-id="2672" instrument_node="">
</span><h2 data-dcnode-id="2669"><span data-dcnode-id="2670" style="font-weight: 400;"><span data-dcnode-id="2671" instrument_node="">Trial by Fire</span></span></h2><span data-dcnode-id="2668" instrument_node="">
</span><p data-dcnode-id="2665"><span data-dcnode-id="2666" style="font-weight: 400;"><span data-dcnode-id="2667" instrument_node="">By 1963, the U.S. &nbsp;had between 15,000 and 21,000 advisers and special forces troops in Vietnam. &nbsp;So far, the approach had been special ops, paramilitary training, and insurgency. &nbsp;However, the North was determined to expand its power base, and the South was ever more reliant on U.S. &nbsp;support as the conflict intensified.</span></span></p><span data-dcnode-id="2664" instrument_node="">
</span><p data-dcnode-id="2661"><span data-dcnode-id="2662" style="font-weight: 400;"><span data-dcnode-id="2663" instrument_node="">When the USS Maddox and USS Turner Joy were “attacked” in the Gulf of Tonkin in August of 1964, Congress quickly passed the Gulf of Tonkin Resolution—giving President Johnson unilateral power to conduct military operations in Southeast Asia.</span></span></p><span data-dcnode-id="2660" instrument_node="">
</span><p data-dcnode-id="2654"><span data-dcnode-id="2659" instrument_node="">It wouldn’t be until 40 years later that the truth of the </span><strong data-dcnode-id="2656"><a data-dcnode-id="2657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usni.org/magazines/navalhistory/2008-02/truth-about-tonkin" rel="noopener" target="_blank"><span data-dcnode-id="2658" instrument_node="">USS Maddox incident</span></a></strong><span data-dcnode-id="2655" instrument_node=""> would come to light. In short, the “attack” never happened.</span></p><span data-dcnode-id="2653" instrument_node="">
</span><figure aria-describedby="caption-attachment-23005" class="wp-caption aligncenter" data-dcnode-id="2649" id="attachment_23005" style="width: 600px"><img alt="Johnson Signing the Gulf of Tonkin Resolution" class="size-full wp-image-23005" data-dcnode-id="2652" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2018/02/Johnson-Signing-the-Gulf-of-Tonkin-Resolution-e1519688381586.jpg&amp;raw" width="600"><figcaption class="wp-caption-text" data-dcnode-id="2650" id="caption-attachment-23005"><span data-dcnode-id="2651" instrument_node="">Johnson Signing the Gulf of Tonkin Resolution</span></figcaption></figure><span data-dcnode-id="2648" instrument_node="">
</span><p data-dcnode-id="2645"><span data-dcnode-id="2646" style="font-weight: 400;"><span data-dcnode-id="2647" instrument_node="">In February of 1965, Johnson ordered sustained bombing on targets north of the 17th parallel. &nbsp;In March, he dispatched 3,500 Marines.</span></span></p><span data-dcnode-id="2644" instrument_node="">
</span><p data-dcnode-id="2641"><span data-dcnode-id="2642" style="font-weight: 400;"><span data-dcnode-id="2643" instrument_node="">By January 1966, the U.S. &nbsp;had 200,000 troops in Vietnam and over the course of the year doubled that number. &nbsp;All of them needed guns, and Colt was supplying them, at one point turning out 45,000 M16s a month. &nbsp;</span></span></p><span data-dcnode-id="2640" instrument_node="">
</span><p data-dcnode-id="2637"><span data-dcnode-id="2638" style="font-weight: 400;"><span data-dcnode-id="2639" instrument_node="">Vietnam became the M16’s crucible, and initially, the results weren’t pretty.</span></span></p><span data-dcnode-id="2636" instrument_node="">
</span><p data-dcnode-id="2633"><span data-dcnode-id="2634" style="font-weight: 400;"><span data-dcnode-id="2635" instrument_node="">The weapons became notorious for jamming—a soldier’s only option to field strip the M16 on the spot and hope to survive the experience. &nbsp;Pinned under enemy AK-47 fire, many tried, but it was an impossible task. &nbsp;</span></span></p><span data-dcnode-id="2632" instrument_node="">
</span><figure aria-describedby="caption-attachment-23008" class="wp-caption aligncenter" data-dcnode-id="2628" id="attachment_23008" style="width: 600px"><img alt="Vietnam M16 Jam Clearing Instructions Comic" class="size-full wp-image-23008" data-dcnode-id="2631" height="415" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2018/02/Vietnam-M16-Jam-Clearing-Instructions-Comic-e1519688632776.jpg&amp;raw" width="600"><figcaption class="wp-caption-text" data-dcnode-id="2629" id="caption-attachment-23008"><span data-dcnode-id="2630" instrument_node="">Comic Given to Troops in Vietnam to Teach Them How to Clear a Jam</span></figcaption></figure><span data-dcnode-id="2627" instrument_node="">
</span><p data-dcnode-id="2624"><span data-dcnode-id="2625" style="font-weight: 400;"><span data-dcnode-id="2626" instrument_node="">In May of 1967, Representative James J. &nbsp;Howard of New Jersey presented a letter from a Marine detailing how soldiers killed in the battle for Hill 881 died because their M16s had jammed. &nbsp;</span></span></p><span data-dcnode-id="2623" instrument_node="">
</span><p data-dcnode-id="2620"><span data-dcnode-id="2621" style="font-weight: 400;"><span data-dcnode-id="2622" instrument_node="">Additional reports of Marines found dead with cleaning rods in place to clear cartridges that refused to extract haunted the Hill Fights of Khe Sanh. &nbsp;Morale sank as survivors lost faith in the weapons that were supposed to protect them and instead left them vulnerable.</span></span></p><span data-dcnode-id="2619" instrument_node="">
</span><p data-dcnode-id="2616"><span data-dcnode-id="2617" style="font-weight: 400;"><span data-dcnode-id="2618" instrument_node="">In a letter, one soldier warned that “50 percent of the rifles fail to work” and cited “two Marines who died within 10 feet of the enemy, with jammed rifles” to prove his point.</span></span></p><span data-dcnode-id="2615" instrument_node="">
</span><p data-dcnode-id="2612"><span data-dcnode-id="2613" style="font-weight: 400;"><span data-dcnode-id="2614" instrument_node="">Another simply stated, “Practically every one of our dead was found with his rifle torn down next to him where he had been trying to fix it.”</span></span></p><span data-dcnode-id="2611" instrument_node="">
</span><p data-dcnode-id="2608"><span data-dcnode-id="2609" style="font-weight: 400;"><span data-dcnode-id="2610" instrument_node="">As the war progressed, time constraints meant that infantry troops often had insufficient training and experience with the M16 prior to having to use it. &nbsp;Making matters even worse, the firearm was initially touted as self-cleaning, with cleaning kits few and far between.</span></span></p><span data-dcnode-id="2607" instrument_node="">
</span><figure aria-describedby="caption-attachment-23007" class="wp-caption aligncenter" data-dcnode-id="2603" id="attachment_23007" style="width: 600px"><img alt="Tools for Your M16A1 Comic Vietnam War" class="size-full wp-image-23007" data-dcnode-id="2606" height="434" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2018/02/Tools-for-Your-M16A1-Comic-Vietnam-War-e1519688699882.jpg&amp;raw" width="600"><figcaption class="wp-caption-text" data-dcnode-id="2604" id="caption-attachment-23007"><span data-dcnode-id="2605" instrument_node="">But at Least They Had Comics Telling Them What That Cleaning Kit Should Contain</span></figcaption></figure><span data-dcnode-id="2602" instrument_node="">
</span><p data-dcnode-id="2599"><span data-dcnode-id="2600" style="font-weight: 400;"><span data-dcnode-id="2601" instrument_node="">The failures, however, were staggering, with 50-percent malfunction rates and countless requests for replacement weapons and ammunition. &nbsp;Estimates have attributed up to 90 percent of all malfunctions were due to failures to extract—that is, the bullet flew, but the cartridge remained stuck in place, jammed, and no forward assist was going to fix it.</span></span></p><span data-dcnode-id="2598" instrument_node="">
</span><p data-dcnode-id="2595"><span data-dcnode-id="2596" style="font-weight: 400;"><span data-dcnode-id="2597" instrument_node="">Something needed to be done—and fast.</span></span></p><span data-dcnode-id="2594" instrument_node="">
</span><figure aria-describedby="caption-attachment-23006" class="wp-caption aligncenter" data-dcnode-id="2590" id="attachment_23006" style="width: 600px"><img alt="Soldiers with M16s in Vietnam" class="size-full wp-image-23006" data-dcnode-id="2593" height="462" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2018/02/Soldiers-with-M16s-in-Vietnam-e1519688492656.jpg&amp;raw" width="600"><figcaption class="wp-caption-text" data-dcnode-id="2591" id="caption-attachment-23006"><span data-dcnode-id="2592" instrument_node="">The M16 Quickly Became Notorious for Jamming</span></figcaption></figure><span data-dcnode-id="2589" instrument_node="">
</span><h2 data-dcnode-id="2586"><span data-dcnode-id="2587" style="font-weight: 400;"><span data-dcnode-id="2588" instrument_node="">Failure To Extract</span></span></h2><span data-dcnode-id="2585" instrument_node="">
</span><p data-dcnode-id="2582"><span data-dcnode-id="2583" style="font-weight: 400;"><span data-dcnode-id="2584" instrument_node="">Numerous investigations began—some within Colt itself while others began within the Marines, Army and even Congress. &nbsp;</span></span></p><span data-dcnode-id="2581" instrument_node="">
</span><p data-dcnode-id="2578"><span data-dcnode-id="2579" style="font-weight: 400;"><span data-dcnode-id="2580" instrument_node="">Some—including generals—claimed nothing was wrong with the M16, going as far as to point the finger of blame and inadequacy at the soldiers themselves.</span></span></p><span data-dcnode-id="2577" instrument_node="">
</span><figure aria-describedby="caption-attachment-23010" class="wp-caption aligncenter" data-dcnode-id="2573" id="attachment_23010" style="width: 600px"><img alt="M16 Comic Vietnam War" class="size-full wp-image-23010" data-dcnode-id="2576" height="473" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2018/02/M16-Comic-Vietnam-War-e1519689594668.jpg&amp;raw" width="600"><figcaption class="wp-caption-text" data-dcnode-id="2574" id="caption-attachment-23010"><span data-dcnode-id="2575" instrument_node="">I mean, using comics as a training substitute probably didn’t help, though.</span></figcaption></figure><span data-dcnode-id="2572" instrument_node="">
</span><p data-dcnode-id="2564"><span data-dcnode-id="2570" style="font-weight: 400;"><span data-dcnode-id="2571" instrument_node="">However, certain facts remained, and the Congressional </span></span><i data-dcnode-id="2567"><span data-dcnode-id="2568" style="font-weight: 400;"><span data-dcnode-id="2569" instrument_node="">Report of the M16 Review Panel: History of the M16 Weapon System</span></span></i><span data-dcnode-id="2565" style="font-weight: 400;"><span data-dcnode-id="2566" instrument_node=""> painstakingly and in great detail sussed them out. &nbsp;Of note was the observation that “over 250 tests [had] been conducted” with “conflicting results,” varying validity and often little time. &nbsp;The battlefield, however, had proved quite conclusive, and the report homed in on two key inadequacies:</span></span></p><span data-dcnode-id="2563" instrument_node="">
</span><ol data-dcnode-id="2553"><span data-dcnode-id="2562" instrument_node="">
</span><li data-dcnode-id="2559"><span data-dcnode-id="2560" style="font-weight: 400;"><span data-dcnode-id="2561" instrument_node=""> &nbsp;The ball powder burned too fast, fouling the chamber as it pushed the cyclic rate from 700 to 800 rounds per minute to more like 1,000. &nbsp;It was also moisture-sensitive, swelling or even bursting cartridges in tropical humidity.</span></span></li><span data-dcnode-id="2558" instrument_node="">
</span><li data-dcnode-id="2555"><span data-dcnode-id="2556" style="font-weight: 400;"><span data-dcnode-id="2557" instrument_node=""> &nbsp;The seemingly cost-saving decision not to chrome-plate the chamber exacerbated the problem as the resulting rust, pitting and corrosion increased the likelihood of a malfunction.</span></span></li><span data-dcnode-id="2554" instrument_node="">
</span></ol><span data-dcnode-id="2552" instrument_node="">
</span><p data-dcnode-id="2549"><span data-dcnode-id="2550" style="font-weight: 400;"><span data-dcnode-id="2551" instrument_node="">In answer, cleaning kits were widely issued for the once-supposedly self-cleaning rifles, and retrofitting M16s with chrome-plated chambers and then chrome-plated bores as well became a priority.</span></span></p><span data-dcnode-id="2548" instrument_node="">
</span><p data-dcnode-id="2545"><span data-dcnode-id="2546" style="font-weight: 400;"><span data-dcnode-id="2547" instrument_node="">A few other changes helped to resolve issues and improve the M16 while allowing continued use of the ball powder:</span></span></p><span data-dcnode-id="2544" instrument_node="">
</span><ol data-dcnode-id="2526"><span data-dcnode-id="2543" instrument_node="">
</span><li data-dcnode-id="2540"><span data-dcnode-id="2541" style="font-weight: 400;"><span data-dcnode-id="2542" instrument_node=""> &nbsp;Lighter firing pins replaced the original, heavier ones that were prone to unintentional slam firing.</span></span></li><span data-dcnode-id="2539" instrument_node="">
</span><li data-dcnode-id="2536"><span data-dcnode-id="2537" style="font-weight: 400;"><span data-dcnode-id="2538" instrument_node=""> &nbsp;Weights and spacers added to the buffer eliminated the problem of cartridges struck but not fired and helped to slow the cyclic rate.</span></span></li><span data-dcnode-id="2535" instrument_node="">
</span><li data-dcnode-id="2532"><span data-dcnode-id="2533" style="font-weight: 400;"><span data-dcnode-id="2534" instrument_node=""> &nbsp;Parts like the bolt and disconnector were strengthened to better withstand the high velocities and impacts involved.</span></span></li><span data-dcnode-id="2531" instrument_node="">
</span><li data-dcnode-id="2528"><span data-dcnode-id="2529" style="font-weight: 400;"><span data-dcnode-id="2530" instrument_node=""> &nbsp;The more expensive 7075 T6 aluminum that Stoner originally intended to use for the receivers replaced the inferior 6061 T6 aluminum that corroded over time.</span></span></li><span data-dcnode-id="2527" instrument_node="">
</span></ol><span data-dcnode-id="2525" instrument_node="">
</span><p data-dcnode-id="2522"><span data-dcnode-id="2523" style="font-weight: 400;"><span data-dcnode-id="2524" instrument_node="">By 1968, the M16 was finally a gun that a soldier could take into action and depend upon.</span></span></p><span data-dcnode-id="2521" instrument_node="">
</span><figure aria-describedby="caption-attachment-23012" class="wp-caption aligncenter" data-dcnode-id="2517" id="attachment_23012" style="width: 600px"><img alt="Soldiers with M16s" class="size-full wp-image-23012" data-dcnode-id="2520" height="300" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2018/02/Soldiers-with-M16s-e1519689743482.jpg&amp;raw" width="600"><figcaption class="wp-caption-text" data-dcnode-id="2518" id="caption-attachment-23012"><span data-dcnode-id="2519" instrument_node="">Soldiers with M16s</span></figcaption></figure><span data-dcnode-id="2516" instrument_node="">
</span><h2 data-dcnode-id="2513"><span data-dcnode-id="2514" style="font-weight: 400;"><span data-dcnode-id="2515" instrument_node="">Ammunition Revisited</span></span></h2><span data-dcnode-id="2512" instrument_node="">
</span><p data-dcnode-id="2509"><span data-dcnode-id="2510" style="font-weight: 400;"><span data-dcnode-id="2511" instrument_node="">Throughout the M16’s development, ammunition played a key role, and that didn’t stop in 1968.</span></span></p><span data-dcnode-id="2508" instrument_node="">
</span><p data-dcnode-id="2505"><span data-dcnode-id="2506" style="font-weight: 400;"><span data-dcnode-id="2507" instrument_node="">In 1953, the 7.62×51mm NATO rifle cartridge—the round that both the M1 and Eugene Stoner’s original AR-10 fired—became the first standard NATO rifle cartridge. &nbsp;This was a large part of why Army Ordnance proved so resistant to Stoner’s AR-15.</span></span></p><span data-dcnode-id="2504" instrument_node="">
</span><p data-dcnode-id="2501"><span data-dcnode-id="2502" style="font-weight: 400;"><span data-dcnode-id="2503" instrument_node="">To achieve the performance levels required for the AR-15, Stoner worked with Sierra Bullet’s Frank Snow, Remington and Robert Hutton to devise the .222 Special, which became the .223 Remington and eventually “Cartridge, 5.56mm Ball, M193.”</span></span></p><span data-dcnode-id="2500" instrument_node="">
</span><figure aria-describedby="caption-attachment-23009" class="wp-caption aligncenter" data-dcnode-id="2496" id="attachment_23009" style="width: 600px"><img alt="223 Remington" class="size-full wp-image-23009" data-dcnode-id="2499" height="600" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2018/02/223-Remington-e1519688796662.jpg&amp;raw" width="600"><figcaption class="wp-caption-text" data-dcnode-id="2497" id="caption-attachment-23009"><span data-dcnode-id="2498" instrument_node="">223 Remington</span></figcaption></figure><span data-dcnode-id="2495" instrument_node="">
</span><p data-dcnode-id="2492"><span data-dcnode-id="2493" style="font-weight: 400;"><span data-dcnode-id="2494" instrument_node="">In 1977, NATO decided that it wanted a smaller caliber round to replace the 7.62x51mm cartridge. &nbsp;The .223 Remington was the inspiration, and the result was of Belgian design thanks to Fabrique Nationale Herstal and what came to be known in 1980 as the 5.56×45mm NATO round.</span></span></p><span data-dcnode-id="2491" instrument_node="">
</span><p data-dcnode-id="2488"><span data-dcnode-id="2489" style="font-weight: 400;"><span data-dcnode-id="2490" instrument_node="">By 1980, the Marines were requesting modification of the M16A1 so that it could fire the 5.56x45mm NATO round.</span></span></p><span data-dcnode-id="2487" instrument_node="">
</span><h2 data-dcnode-id="2484"><span data-dcnode-id="2485" style="font-weight: 400;"><span data-dcnode-id="2486" instrument_node="">The M16A2</span></span></h2><span data-dcnode-id="2483" instrument_node="">
</span><figure aria-describedby="caption-attachment-18391" class="wp-caption aligncenter" data-dcnode-id="2479" id="attachment_18391" style="width: 600px"><img alt="Marine Using an M16A2" class="size-full wp-image-18391" data-dcnode-id="2482" height="400" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2017/10/M16A2-used-by-marine.jpg&amp;raw" srcset="https://www.pewpewtactical.com/wp-content/uploads/2017/10/M16A2-used-by-marine.jpg 600w, https://www.pewpewtactical.com/wp-content/uploads/2017/10/M16A2-used-by-marine-300x200.jpg 300w" width="600"><figcaption class="wp-caption-text" data-dcnode-id="2480" id="caption-attachment-18391"><span data-dcnode-id="2481" instrument_node="">Marine Using an M16A2</span></figcaption></figure><span data-dcnode-id="2478" instrument_node="">
</span><p data-dcnode-id="2475"><span data-dcnode-id="2476" style="font-weight: 400;"><span data-dcnode-id="2477" instrument_node="">By November of 1983, the Marines had their M16A2, and by May of 1986, the Army had adopted it as well. &nbsp;The main differences entailed</span></span></p><span data-dcnode-id="2474" instrument_node="">
</span><ul data-dcnode-id="2436"><span data-dcnode-id="2473" instrument_node="">
</span><li data-dcnode-id="2470"><span data-dcnode-id="2471" style="font-weight: 400;"><span data-dcnode-id="2472" instrument_node=""> the option of a three-round burst rather than full automatic selection,</span></span></li><span data-dcnode-id="2469" instrument_node="">
</span><li data-dcnode-id="2466"><span data-dcnode-id="2467" style="font-weight: 400;"><span data-dcnode-id="2468" instrument_node=""> a heavier barrel,</span></span></li><span data-dcnode-id="2465" instrument_node="">
</span><li data-dcnode-id="2462"><span data-dcnode-id="2463" style="font-weight: 400;"><span data-dcnode-id="2464" instrument_node=""> rifling of one turn per every 7 inches, </span></span></li><span data-dcnode-id="2461" instrument_node="">
</span><li data-dcnode-id="2458"><span data-dcnode-id="2459" style="font-weight: 400;"><span data-dcnode-id="2460" instrument_node=""> a muzzle brake with a solid bottom rather than a vented flash suppressor,</span></span></li><span data-dcnode-id="2457" instrument_node="">
</span><li data-dcnode-id="2454"><span data-dcnode-id="2455" style="font-weight: 400;"><span data-dcnode-id="2456" instrument_node=""> a square front sight post,</span></span></li><span data-dcnode-id="2453" instrument_node="">
</span><li data-dcnode-id="2450"><span data-dcnode-id="2451" style="font-weight: 400;"><span data-dcnode-id="2452" instrument_node=""> canted slip ring for easier hand-guard removal,</span></span></li><span data-dcnode-id="2449" instrument_node="">
</span><li data-dcnode-id="2446"><span data-dcnode-id="2447" style="font-weight: 400;"><span data-dcnode-id="2448" instrument_node=""> a brass deflector,</span></span></li><span data-dcnode-id="2445" instrument_node="">
</span><li data-dcnode-id="2442"><span data-dcnode-id="2443" style="font-weight: 400;"><span data-dcnode-id="2444" instrument_node=""> a redesigned rear sight allowing adjustments for windage and elevation, and</span></span></li><span data-dcnode-id="2441" instrument_node="">
</span><li data-dcnode-id="2438"><span data-dcnode-id="2439" style="font-weight: 400;"><span data-dcnode-id="2440" instrument_node=""> a button-style forward assist.</span></span></li><span data-dcnode-id="2437" instrument_node="">
</span></ul><span data-dcnode-id="2435" instrument_node="">
</span><p data-dcnode-id="2432"><span data-dcnode-id="2433" style="font-weight: 400;"><span data-dcnode-id="2434" instrument_node="">Since Vietnam, the M16 has </span></span></p><span data-dcnode-id="2431" instrument_node="">
</span><ul data-dcnode-id="2417"><span data-dcnode-id="2430" instrument_node="">
</span><li data-dcnode-id="2427"><span data-dcnode-id="2428" style="font-weight: 400;"><span data-dcnode-id="2429" instrument_node=""> seen action in conflicts like Granada, Haiti, Panama, Bosnia, Somalia and Iraq;</span></span></li><span data-dcnode-id="2426" instrument_node="">
</span><li data-dcnode-id="2423"><span data-dcnode-id="2424" style="font-weight: 400;"><span data-dcnode-id="2425" instrument_node=""> gone through changes and iterations, from carbine Commandos to the M16A2; and </span></span></li><span data-dcnode-id="2422" instrument_node="">
</span><li data-dcnode-id="2419"><span data-dcnode-id="2420" style="font-weight: 400;"><span data-dcnode-id="2421" instrument_node=""> served as inspiration for its replacement—the M4.</span></span></li><span data-dcnode-id="2418" instrument_node="">
</span></ul><span data-dcnode-id="2416" instrument_node="">
</span><figure aria-describedby="caption-attachment-17161" class="wp-caption aligncenter" data-dcnode-id="2412" id="attachment_17161" style="width: 600px"><img alt="The evolution of the M16 and its offspring, the M4" class="size-full wp-image-17161" data-dcnode-id="2415" height="547" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2017/09/M16s-and-M4-e1505766176890.jpg&amp;raw" width="600"><figcaption class="wp-caption-text" data-dcnode-id="2413" id="caption-attachment-17161"><span data-dcnode-id="2414" instrument_node="">The evolution of the M16 and its offspring, the M4 (second from bottom)</span></figcaption></figure><span data-dcnode-id="2411" instrument_node="">
</span><p data-dcnode-id="2408"><span data-dcnode-id="2409" style="font-weight: 400;"><span data-dcnode-id="2410" instrument_node="">Each new development has demonstrated strengths and weaknesses, triumphs and flaws, yet as a whole, the story remains eternal. &nbsp;America is but one part of a world powered by conflict and but one player on an ever-changing battlefield. &nbsp;Innovation often comes at a price, with a learning curve and the impediments of bias. &nbsp;The M16 is a reminder of the dangers of a house divided against itself and the hope of what can be accomplished in unity. &nbsp;It is a reminder of the power of one gun in one soldier’s hands alone against an enemy who never entirely gives up or ceases to exist.</span></span></p><span data-dcnode-id="2407" instrument_node="">
</span><span class="ctx-article-root" data-dcnode-id="2406"></span><span data-dcnode-id="2405" instrument_node=""> </span></div><span data-dcnode-id="2403" instrument_node="">

</span><p data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">I agree some of his background information was not exact on however, the piece was about the basic history of the politics that the AR went through. If our government would of stepped aside and allowed the early engineers to do what they do without the political asswipes getting in their way, allot more of our soldiers would of come home in the early years of the South East Asia conflicts and the M16 would of never been. It would of been the AR-15 that would of been much closer to the M16A2 as our rifle choice at the onset of the Vietnam conflict. Our government always seems to forget that cheap means cheap like the cheap vehicles we have used in Afghanistan and Iraq without sufficient armor to protect from IED and RPG. More of my brother have been killed and permanently injured as a result of not spending the money to improve armor on our logistic and light duty vehicles. Also, better head and ear protection so that BTI can be reduced. It's always been the politics and the article was about that to me.</span></p><span data-dcnode-id="1307" instrument_node="">

</span><p data-dcnode-id="1273"><span data-dcnode-id="1278" instrument_node="">Man, this is a great historical review article. My very first introduction to the M16 came during JROTC in high school in the mid ‘70s. Didn’t have to learn to shoot them (firing pins removed) but we did have to study military history and battle tactics. Oh and we had to learn to completely disassemble one in under 30 seconds, clean it and reassemble it in 25 seconds. And whenever we were inspected in formation the rifle was assessed for cleanliness and function. At least one year of JROTC, with weapons training, was required by all male students for graduation; and you know what? No one was ever injured on campus and none of our graduates were ever implicated in what we call today - gun crime.</span><br data-dcnode-id="1277"><span data-dcnode-id="1276" instrument_node="">
</span><br data-dcnode-id="1275"><span data-dcnode-id="1274" instrument_node="">
Our HS ROTC program did sponsor a school rifle team where we did get to shoot an M16 - just for the experience - but shot competitively with very heavy all wooden and steel furniture competition designed rifles in .22LR. I didn’t go on to college ROTC but I did shoot on the college rifle team.</span></p><span data-dcnode-id="1272" instrument_node="">
