</span><img alt="Commenter Avatar" class="comment-avatar" data-dcnode-id="2582" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gravatar.com/avatar/ab9fd39987d38039b6f74fa90597affa%3Fd%3Dretro%26s%3D90&amp;raw"><span data-dcnode-id="2581" instrument_node="">
</span></div><span data-dcnode-id="2579" instrument_node="">
</span><div class="col-10 col-md-11" data-dcnode-id="2550"><span data-dcnode-id="2578" instrument_node="">
</span><div class="comment-author" data-dcnode-id="2576"><span data-dcnode-id="2577" instrument_node="">Wee Willy</span></div><span data-dcnode-id="2575" instrument_node="">
</span><p data-dcnode-id="2561"><span data-dcnode-id="2574" instrument_node="">Great discussion folks. I own a Springfield National Match M1A with a Krieger barrel which I have used in NRA competition for about 12 years. I load my own ammo from new components whenever I go to match. Here's what I've learned after 12 years of intimate marriage:</span><br data-dcnode-id="2573"><span data-dcnode-id="2572" instrument_node="">
</span><br data-dcnode-id="2571"><span data-dcnode-id="2570" instrument_node="">
First, she likes to eat only certain kinds of ammo. I know this differs from gun to gun because of all the odd mechanical claptrap which also differs from gun to gun. Ask any Camp Perry M1A shooter. This is one of the key reasons why the Army was unable to accurize these weapons effectively.</span><br data-dcnode-id="2569"><span data-dcnode-id="2568" instrument_node="">
</span><br data-dcnode-id="2567"><span data-dcnode-id="2566" instrument_node="">
Next, there is an Evil Kneval jump from the mouth of the 7.62 cartridge to the lands and grooves of the standard M1A (or any other 7.62 rifle) rifling. If there is ANY concentricity variance in the round you will have a flier on your hands. This is why any serious shooter of M1A match competitions will check EVERY ROUND for concentricity variations. </span><br data-dcnode-id="2565"><span data-dcnode-id="2564" instrument_node="">
</span><br data-dcnode-id="2563"><span data-dcnode-id="2562" instrument_node="">
There are several other items that can affect M1A accuracy which I won't go into here. Suffice to say she can be very accurate when she's treated as she demands.</span></p><span data-dcnode-id="2560" instrument_node="">

</span><p data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node="">I have a very old....springfield M1A with a TRW chrome GI barrel... I have had no problem with iron sights.. using surplus ammo hitting … consistently a two foot gong at 600... yes 600 yrds. This summer I had about 3 witnesses who after I walked away from the line... could not believe I could strike the gong consistently at that distance with only military iron sights.. NOT bragging... but this was with iron std sights and surplus ammo that was at least 40 yrs old. I do not waste my time going for groups with 40+ year old Spanish surplus ammo. It never was match grade when manufactured. And my Springfield M1A was their field grade... Not match anything with a chrome lined barrel.. Also I am an old timer too. So eye sight picture is challenging. Sorry to break the bad news to you... but it is not the rifle. My opinion is that it is a difficult toy to achieve its maximum accuracy. Not sure why. I lived in Illinois and I met jerk who owned the company and purchased this m1A from him... when he operated a retail shop in Illinois....he does hire craftsmen who can and do build an excellent toy... BUT... it takes skill to achieve results using iron sights. I prefer to challenge myself using iron sights.. The boys on the range who all use huge scopes on bolt guns could not believe my consistency...with an old not match chrome lined barreled M1A. If someone is looking for an M1A as an easy rifle to master.... although I do not have negative impressions... they should look else ware … or ask someone on the range if they could have a go at it with a borrowed model. Also, as designed by the military... the gas system was only designed to handle 147 grain projectile with fast burning powders.. Yes you can pump anything through it... but the gas system was not designed to handle slow burning powders with long heavy projectiles. Very interesting YouTube but it was painful to watch you not extract the accuracy expected and achievable... The problem I believe with these new M1A's is the price...Some makers want up to $6,500 bucks for one. I hope the buyers of those toys realize... that is a high price to pay for implied accuracy. Enjoyed the video.</span></p><span data-dcnode-id="2378" instrument_node="">

</span><p data-dcnode-id="2350"><span data-dcnode-id="2351" instrument_node="">Honestly I couldn't read all of this, but what I did seems like a lot of operator error. Frankly it gets a little annoying people talking poorly of this rifle or any other when 99% of the time, it is a bad shooter and or bad expectations. An M1a has an acceptable precision of 3moa and accuracy of 1.5moa. Yes there is a difference. Snipers in ww2 had even lower standards. This is what it comes down to with a m1a, shooter, then rounds, then trigger, then making sure all mounts are secure if if scoped. I have shot quite a few m1a rifles and all with decent ammo would shout 1.5moa precision with .75moa accuracy. That is plenty accurate to be an urban or close range sniper. No, a sniper does not need a precision rifle. They need a consistent, repeatable and fairly accurate one. If you can shoot this rifle, don't tell me you are getting .5moa with your 700 because you are not.</span></p><span data-dcnode-id="2349" instrument_node="">

</span><p data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">Straight up no BS. The M14 I shot in service compared to the m1a I purchased are two totally different dogs but they both like 162 and 168 grain bullets. And I have found shooting 150 and 180 grain that they send spoilers down range. But military surplus ammo and you will have better luck or at lest I did.</span></p><span data-dcnode-id="2259" instrument_node="">

</span><img alt="Commenter Avatar" class="comment-avatar" data-dcnode-id="2240" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gravatar.com/avatar/cf2bff77c0fd6c4d504fea214defa9cb%3Fd%3Dretro%26s%3D90&amp;raw"><span data-dcnode-id="2239" instrument_node="">

</span><div class="col-10 col-md-11" data-dcnode-id="2214"><span data-dcnode-id="2236" instrument_node="">
</span><div class="comment-author" data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">Ken</span></div><span data-dcnode-id="2233" instrument_node="">
</span><p data-dcnode-id="2225"><span data-dcnode-id="2232" instrument_node="">I’m not going to recite everything Duckford said but, the dude is on the mark</span><br data-dcnode-id="2231"><span data-dcnode-id="2230" instrument_node="">
He references head position. This is crucial to shooting consistent groups. The how too is, engage the stock with the same amount of facial surface area and the same pressure every time. Be sure to stay in there, head down on the gun, vision through the sights under recoil. I’m not saying you don’t know how to shoot, I am saying AR’s are the most forgiving platform, having been designed by an aero space engineer and all, they have great ergonomics and manage more recoil themselves than any other system to date.</span><br data-dcnode-id="2229"><span data-dcnode-id="2228" instrument_node="">
The one other thing I don’t see addressed in the comments below is dealing with the comment that, “ the gun wants to twist in my hand.” Every rifle must recoil the same every shot in order to shoot good groups. Preferably, almost necessarily straight back. To achieve this it is best to start by getting acquainted with a shooting sling and building a rock solid prone position. Then branch out to shooting over other objects. You still need something between the gun and the rock or you can develop both recoil direction issues as well as barrel harmonic issues. If the experience with the M1A’s is really in your head. Spend a few months of Saturday’s going to high power rifle matches. The knowledge base there has been handed down since the late 1800’s in America and Britain, and built on for generations since. These are the people that teach our nations sniper instructors. It’s not 3 gun fun, but you’ll notice the successful 3 gunners incorporate key element from high power.</span><br data-dcnode-id="2227"><span data-dcnode-id="2226" instrument_node="">
Lastly your article seems to discount the M1A as an almost unuseful relic, taking shots at every tiny thing. To the readers it sounds like excuses. As students of the gun we have to be competent with anything we pick up off the ground. No excuses. Hang in there, you’ll get it. You just found a new world to explore and it’s a little unnerving.</span></p><span data-dcnode-id="2224" instrument_node="">

</span><p data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">USMC 1967 -- M14 final qualification day -- good grouping from offhand, kneeling, and sitting -- excellent grouping, from prone @ 500 yards with iron sights -- M14 was a very reliable weapon (not on automatic, of course) -- resisted mud and dust well -- however, recoil was not favorably received if wearing tank top (!), but tank tops were not standard issue in RVN</span></p><span data-dcnode-id="2195" instrument_node="">

</span><div class="col-2 col-md-1" data-dcnode-id="2174"><span data-dcnode-id="2177" instrument_node="">
</span><img alt="Commenter Avatar" class="comment-avatar" data-dcnode-id="2176" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gravatar.com/avatar/52d148784e3cd69f67ebffa023b8875f%3Fd%3Dretro%26s%3D90&amp;raw"><span data-dcnode-id="2175" instrument_node="">
</span></div><span data-dcnode-id="2173" instrument_node="">
</span><div class="col-10 col-md-11" data-dcnode-id="2156"><span data-dcnode-id="2172" instrument_node="">
</span><div class="comment-author" data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">Bob Reed</span></div><span data-dcnode-id="2169" instrument_node="">
</span><p data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">Been shooting these little guys for three decades &amp; have found some quirks that need addressing before they shoot well. First of all, the 1.25 MOA that was finally obtained is acceptable even for 400m antelope shots but the one single issue that seems to affect this rifle the most is ammo. The 1-12 twist used in milspec and civilian barrels for many years was designed to stabilize the 147gr. ball projectile. The one you tested was a 1-11.25 twist however, few of these do a good job of stabilizing bullets much heavier than 165gr. Sierra has their 175gr. Matchking bullet for the M1 Garand &amp; M1-A but not all rifles shoot them well. At Aberdeen, the army figured a max effective range of 656 yards for these guns because that was the range at which bullets began to wobble a bit due to lack of stability. That said, there has also been quite a bit of chamber variation over the years which necessitates handloading brass which has been fire formed to a specific chamber and carefully checked for case stretching to obtain top accuracy. This is a pain for most shooters who want to buy ammo &amp; just go shoot. Many match shooters do this BUT Springfield warns very strongly against it for safety reasons. ( It even voids the factory warranty). They are great rifles with 300m kill shots being natural but their limitations need to be observed or buyer's remorse may set in.</span></p><span data-dcnode-id="2166" instrument_node="">
</span><div class="comment-meta" data-dcnode-id="2158"><span data-dcnode-id="2165" instrument_node="">
</span><span class="comment-date" data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">October 18, 2019 11:13 am</span></span><span data-dcnode-id="2162" instrument_node="">
</span><button class="btn btn-primary comment-reply-btn" data-dcnode-id="2160" data-id="43448" onclick="return replyComment(event)" type="button"><span data-dcnode-id="2161" instrument_node="">Reply

</span><li class="comment-item comment-item--hidden" data-dcnode-id="2107"><span data-dcnode-id="2150" instrument_node="">
</span><article class="comment-body row" data-dcnode-id="2109" id="div-comment-43306"><span data-dcnode-id="2149" instrument_node="">
</span><div class="col-2 col-md-1" data-dcnode-id="2145"><span data-dcnode-id="2148" instrument_node="">
</span><img alt="Commenter Avatar" class="comment-avatar" data-dcnode-id="2147" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gravatar.com/avatar/facf7b40f631d78c4438fd5a9c4dc73a%3Fd%3Dretro%26s%3D90&amp;raw"><span data-dcnode-id="2146" instrument_node="">
</span></div><span data-dcnode-id="2144" instrument_node="">
</span><div class="col-10 col-md-11" data-dcnode-id="2111"><span data-dcnode-id="2143" instrument_node="">
</span><div class="comment-author" data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">Duckford</span></div><span data-dcnode-id="2140" instrument_node="">
</span><p data-dcnode-id="2122"><span data-dcnode-id="2139" instrument_node="">The only thing I agree is backwards about the rifle is the exposed rod which can catch on things and cause malfunctions, and forces you to be careful where you hold the weapon. Otherwise, I don't agree with much else here written. Some of us prefer straight stocks, and done right the straight stock helps control and absorb recoil better than a lot of pistol grip set ups. (I have never have understood the popularity of pistol grips on shotguns with full power loads). The pistol grip only became "ergonomically superior" when the assault rifle concept came into play, where the grip is superior for moving assault cover fire. Outside of that, rifle to rifle, is the old grip inferior? NO. With ergonomics, the Garand and M14 family are sleek and well balanced rifles compared to others. </span><br data-dcnode-id="2138"><span data-dcnode-id="2137" instrument_node="">
</span><br data-dcnode-id="2136"><span data-dcnode-id="2135" instrument_node="">
The magazine insertion issue is easily resolved by standard 20 round magazines, with the extra length offering superior advantage and grip to rock the magazine in. Other well proven 1st rate designs like the FAL, G3, AKM are rockers. One can argue about value of a safety that is separate from the selector switch, one can leave a weapon on full automatic without having to fumble through, you can get your weapon on safety without having to push through two selections. A lot of safeties are rough on new rifles, guess what they break in with repeated regular use. The M14 is no different. Once worked in, the safety is quick and easy to disengage by simply pushing your trigger finger forward without losing your grip on the rifle, then have your finger ready for firing. The rifle may be different, but to act as if it is some sort of antique is laughable.</span><br data-dcnode-id="2134"><span data-dcnode-id="2133" instrument_node="">
</span><br data-dcnode-id="2132"><span data-dcnode-id="2131" instrument_node="">
As for accuracy, it is probably due to inexperience. Even if someone is a decent shot, it takes time to adapt to a different weapon both individually and model wise. If you shoot nothing but pistol grips, you might find the old stock hard to handle. Worse, if you hang your head way back on the stock instead of behind the sight directly when shooting on the bench at paper, don't be surprised when you aren't getting the best from the best iron sight system ever developed. Inconsistent cheek weld and sight picture is the usual problem with the kind of shot groups you were showing. More than likely shifting of head, where you sat your cheek, how you looked through the ring. ESPECIALLY considering your two shots hitting the same mark with the rest scattered, indicating the gun is on but the shooter's picture is probably off. The scope shooting helped to prove this, and that the National Match can shoot very well indeed. Combine that with shooting something new, I think the conclusions draw themselves.</span><br data-dcnode-id="2130"><span data-dcnode-id="2129" instrument_node="">
</span><br data-dcnode-id="2128"><span data-dcnode-id="2127" instrument_node="">
My GI M1a has done 2 inches off the bags even with cheap steel case at 100 yards. Same or better than my SA58 FAL or PTR91 with the same ammunition. And, when I do have problems with groups, I call my shots and realize that I, too, am making problems with how I'm sitting and how my sight picture isn't right. With good discipline they are the best irons ever put on a combat rifle, but sloppy cheek welds and head placement turn them into a nightmare. </span><br data-dcnode-id="2126"><span data-dcnode-id="2125" instrument_node="">
</span><br data-dcnode-id="2124"><span data-dcnode-id="2123" instrument_node="">
The G3 and FAL better battle rifles? I won't argue against that assertion. But I think the gun gets a bad rap it doesn't deserve. Old and outdated? The vaunted mid 20th century designed AR15 is over 60 years old, and only 25 years younger than the "antique" Garand design. It ain't the best rifle, but it sure isn't outdated or the worst.</span></p><span data-dcnode-id="2121" instrument_node="">

</span><div class="comment-author" data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">Chris</span></div><span data-dcnode-id="2094" instrument_node="">
</span><p data-dcnode-id="2084"><span data-dcnode-id="2093" instrument_node="">One thing I really like about the safety on the m14/M1A is that if you forget that the safety is on and put your finger on the trigger (which of course should only be done if you’re about to fire) your knuckle will hit the safety inside the trigger guard as an instant reminder that the gun is in fact NOT ready to fire. As someone who shoots a lot of handguns and thinks handguns should not have manual safeties (all long guns should of course, but with a handgun a good holster is your safety) i worry about forgetting the safety is switched on, this solves that problem. The fact it’s ambi is a plus too. For the record I also prefer a traditional stock over a pistol grip. </span><br data-dcnode-id="2092"><span data-dcnode-id="2091" instrument_node="">
</span><br data-dcnode-id="2090"><span data-dcnode-id="2089" instrument_node="">
Another thing- for me the ability to reload straight into an empty gun with stripper clips is a huge plus. Stripper clips are a great way to organize a bunch of ammo while having it “ready to go” (so to speak). All you need is 2 magazines (a ten rounder to get low and keep the rifle light and sleek (relatively speaking of course) for carrying and the 20 rounder for capacity and better grip) and the rest of your ammo on stripper clips. Less weight than a bunch of magazines and less magazines to maintain and worry about the springs wearing out or whatever. </span><br data-dcnode-id="2088"><span data-dcnode-id="2087" instrument_node="">
</span><br data-dcnode-id="2086"><span data-dcnode-id="2085" instrument_node="">
For the record I own the 18” scout model</span></p><span data-dcnode-id="2083" instrument_node="">

</span><p data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">I bought an M-14 from Springfield in the late 1980's. Handloaded it shot groups from .50 to .75 all day long. The action and barrel are geared for 168 gn bullets travelling at 2750- 2850fps. Any more or less and the accuracy becomes squirrely. I happened to try 168gn German machine gun ammo which was real hot. It blew the op-rod away from the bolt. No more of that! The gun liked a lot of sling pressure and shot better in prone than off the bench. A good Tam sling worked well in this aspect. Like everything else made today I suspect the fit and finish of the action is not up to par to the production from the 80's. Just my take</span></p><span data-dcnode-id="1958" instrument_node="">

</span><p data-dcnode-id="1795"><span data-dcnode-id="1840" instrument_node="">I own two of the Springfield's M1A. One is a the first SOCOM that came out with the 1913 rails it was just to heavy to shoot with the rails on the front end. The other is the standard which i bought a year after the SOCOM. </span><br data-dcnode-id="1839"><span data-dcnode-id="1838" instrument_node="">

</span><br data-dcnode-id="1821"><span data-dcnode-id="1820" instrument_node="">

</span><p data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">I have the Scout Squad, which is a hybrid of the socom and standard. With a 2-7 ler scope, on a good day I am 100% on 4" steel (yeah, the plate's kind of beat, hence the 4" chuncks on the chain) at 200 yards. In the plastic stock, shooting 150 imi, this gun was disappointing, but switching to a boyds thicker than GI walnut and bedding it made a huge difference, as well az tuning the gas block which seems to come severely overtightened from the factory. Got a sadlak guide rod and piston in it, and of my 18 guns, this one's my baby. If I want sub moa, the RPR comes out, if I want lightweight, the AR sbr comes out, but all in all, the m1a scout gets the most comments and provides the best day. Shooting nato surplus lately, malaysian mainly, some austrian in the que.</span></p><span data-dcnode-id="1765" instrument_node="">

</span><p data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">I have owned the National Match, Standard and Socom versions of the M1A, I had all the same issues, they are extremely finnicky with optics and mounts. I found Basset to be the most stable mount. I have some time on long range shooting, I’m accomplished at about a half mile, but even the national match failed me at what I would expect at 100 yards, for $2,500+ it should shoot sub moa, I couldn’t get below 2 moa. I also had a lot of FTE’s using Federal Match ammo. That being said, I really wish it lived up to it’s name as the rifle feels really good in hand. This was just my personal experience and 2 cents.</span></p><span data-dcnode-id="1614" instrument_node="">

</span><p data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">I bought a used but as new M1A national match. The guy I bought it from simply said he "couldn't get with it" and he was going back to his schmidt-rubin to shoot steel. I had the same problems with the thing and could not keep rounds on paper. One day I happened to notice that the rear sight assembly was loose somehow. After some internet research I determine that the rear sight spring was not fitted properly. I bought a new rear sight cover from Franklin and assembled and the thing shoots like a monster now. I'm a little surprised with Springfield's quality control that such a defect made it through the process on a $2,000 gun. That's disappointing. But now at least I have a rifle that shoots.</span></p><span data-dcnode-id="1585" instrument_node="">

</span><p data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">So much to say... so little time... As a (albeit also somewhat clunky and antiquated) Marine who clambered up, down and side-wise on the hills of the Central Highlands during what you so eloquently described as that "online shit-flinging fest" (I liked that!) carrying an M-14, I could write an article in response to yours... I won't do that. And while I appreciate your detractions, what I will do is cut straight to the chase. And here it is: It's ALL about what you've trained with! I shot 243 on qual day... 49 from the 500 Meter line. And for slinging shit, I would not have traded my "smoke pole" for a dozen M16s (which due to that damned recoil spring in the stock, I always thought it should have had "Mattel" stamped on the receiver.</span></p><span data-dcnode-id="1430" instrument_node="">

</span><img alt="Commenter Avatar" class="comment-avatar" data-dcnode-id="1410" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2019/08/A3_0014-96x96.jpg&amp;raw"><span data-dcnode-id="1409" instrument_node="">

</span><div class="comment-author" data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">John</span></div><span data-dcnode-id="1403" instrument_node="">
</span><p data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Thanks for sharing, Anthony! We don't doubt it at all - it seems the general consensus is that the M14 was, on average, a much better performing rifle than the M1A - though some folks still swear by their M1As as well. Still totally willing to accept a lack of training on my part, though! </span></p><span data-dcnode-id="1400" instrument_node="">

</span><article class="comment-body row" data-dcnode-id="1341" id="div-comment-42775"><span data-dcnode-id="1381" instrument_node="">
</span><div class="col-2 col-md-1" data-dcnode-id="1377"><span data-dcnode-id="1380" instrument_node="">
</span><img alt="Commenter Avatar" class="comment-avatar" data-dcnode-id="1379" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gravatar.com/avatar/1b2dd3d2e9c653f59f02fcd6d8c077a2%3Fd%3Dretro%26s%3D90&amp;raw"><span data-dcnode-id="1378" instrument_node="">
</span></div><span data-dcnode-id="1376" instrument_node="">
</span><div class="col-10 col-md-11" data-dcnode-id="1343"><span data-dcnode-id="1375" instrument_node="">
</span><div class="comment-author" data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Jar-Head</span></div><span data-dcnode-id="1372" instrument_node="">
</span><p data-dcnode-id="1354"><span data-dcnode-id="1371" instrument_node="">This was a great review. Absolutely spot on in my experience.</span><br data-dcnode-id="1370"><span data-dcnode-id="1369" instrument_node="">
I've been shooting M1A's since the early 90's. After the Marines, I sold my 'Super Match' equivalent that was hand built by a former USMC Armorer back in California (like in 1990). </span><br data-dcnode-id="1368"><span data-dcnode-id="1367" instrument_node="">
This was the rifle that I went to the National Matches (hence the small sights on the "National Match" line) at Camp Perry in '92 with. It was an amazing piece of machinery. It never failed me, shot 1/2 M.O.A. groups (yes, seriously) and I was able to accomplish some pretty cool scores in the Junior Division those thousands of years ago. The civilian market in High-Power competition only saw M1A's on the firing line, standard or highly accurized, through the late 1990's. Then AR-15's started taking over with free-floating handguards, and Extremely Low Drag bullets being pushed downrange at the 600 yard line. Lot less recoil, easier to maintain, and a lot cheaper.</span><br data-dcnode-id="1366"><span data-dcnode-id="1365" instrument_node="">
Fast forward to 2007ish and I bought a Brand New Springfield Armory Super Match at a local Gunshop. Nothing but problems; all encompassing what you guys experienced, and then the bolt froze into place, and I had to send it to them. Like you guys, excellent customer service, and once back in my hands, no problems (the bolt roller cam pin or something or other had broken after ~200-400 rounds), and I was able to get my full confidence back with the weapon, with ~3/4" M.O.A. with the right ammo.</span><br data-dcnode-id="1364"><span data-dcnode-id="1363" instrument_node="">
The M1A/M-14 platform is a ornery, grumpy, and non-linear rifle. Meaning no two are alike. Each has it's own characteristics and preferences. They are most definitely not like the AR-15's of today. You can't swap any parts between two different rifles. Once the rifle starts the build process, unless you are really lucky, and/or really, really know what you are doing, that rifle's parts are staying with that weapon, period. From all of my reading and talking to various folks over the years, one of the primary requirements for the M-16 platform back in the early 60's was the ability to swap out parts between rifles.</span><br data-dcnode-id="1362"><span data-dcnode-id="1361" instrument_node="">
As far as I know, the only guys that really used M-14's after Vietnam on the regular where Navy SE.A.L.'s and Army S.F. &amp; Delta. The issues you guys had with the stock was/is a huge problem (hence the pistol grips of the AR-15's), and thus the Sage Platforms for the weapon's furniture. Totally different way of handling the M-14/M1A platform (DuckDuckGo / G*^%&amp;e Sage Stocks and you will see what I mean). Both Army and Navy latched onto those platforms big time, although you can still see pictures in the aughts of super high-speed dudes over in O.I.F. and O.E.F. with the 'traditional' profile stocks, as in this review. From additional reading and talking to folks, the M-14 works quite well when wet (like emerging from the sea, weapons at the ready).</span><br data-dcnode-id="1360"><span data-dcnode-id="1359" instrument_node="">
Also, as the immediate need for longer-range S.D.M.'s emerged in Afghanistan in the early/mid aughts, a whole lot of M-14's were pulled from storage, accurized/updated by independent civilian contractors, and sent along with units so that they could engage targets ~600-800 yards out (with new scopes and cheek pieces). From my understanding, the 'lucky' S.D.M.'s that were issued these rifles had to do some pretty serious range time to get familiar with the platform (coming from using the M-16/M-4's from Basic onward). So the M-14/M1A platform saw a pretty serious re-emergence starting around 2004.</span><br data-dcnode-id="1358"><span data-dcnode-id="1357" instrument_node="">
Then the AR-10 platform got going at flank speed, and those accurized M-14's (as far as know) went back into storage.</span><br data-dcnode-id="1356"><span data-dcnode-id="1355" instrument_node="">
Again, this was an excellent, spot on review, mirroring the same issues I had, and then some.</span></p><span data-dcnode-id="1353" instrument_node="">
