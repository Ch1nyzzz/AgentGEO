</span><div class="entry-content" data-dcnode-id="4569"><span data-dcnode-id="6329" instrument_node="">
</span><div class="optin optin--hotdeals" data-dcnode-id="6324"><b data-dcnode-id="6325"><span data-dcnode-id="6328" instrument_node="">Trending: </span><a data-dcnode-id="6326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/best-easter-gun-ammo-deals/"><span data-dcnode-id="6327" instrument_node="">Best Easter Ammo &amp; Gun Deals [2022]</span></a></b></div><span data-dcnode-id="6323" instrument_node="">
</span><p data-dcnode-id="6321"><span data-dcnode-id="6322" instrument_node="">Is the steel and wood Springfield Armory M1A still a viable battle rifle?</span></p><span data-dcnode-id="6320" instrument_node="">
</span><p data-dcnode-id="6315"><span data-dcnode-id="6319" instrument_node="">Stick around, because we put a </span><em data-dcnode-id="6317"><span data-dcnode-id="6318" instrument_node="">ton</span></em><span data-dcnode-id="6316" instrument_node=""> of .308 through a National Match M1A and a SOCOM 16, and had a profoundly weird experience. </span></p><span data-dcnode-id="6314" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="6310"><img alt="" class="wp-image-45464" data-dcnode-id="6313" height="576" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2019/10/1.-Springfield-Armory-M1As-1-1024x576.jpg&amp;raw" width="1024"><figcaption data-dcnode-id="6311"><span data-dcnode-id="6312" instrument_node="">They sure are purdy, though. </span></figcaption></figure><span data-dcnode-id="6309" instrument_node="">
</span><p data-dcnode-id="6301"><span data-dcnode-id="6308" instrument_node="">First things first: Historical firearms </span><em data-dcnode-id="6305"><strong data-dcnode-id="6306"><span data-dcnode-id="6307" instrument_node="">are cool as hell</span></strong></em><strong data-dcnode-id="6303"><span data-dcnode-id="6304" instrument_node="">,</span></strong><span data-dcnode-id="6302" instrument_node=""> and there’s nothing quite like owning, holding, or shooting a wood-clad gat that’s got a story to tell, if only it could speak.&nbsp;</span></p><span data-dcnode-id="6300" instrument_node="">
</span><p data-dcnode-id="6296"><span data-dcnode-id="6299" instrument_node="">The M1A, obviously a civilian variant of the iconic M14, fits squarely in that niche – you can check our full video over on our </span><a data-dcnode-id="6297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/user/pewpewtactical" rel="noopener" target="_blank"><span data-dcnode-id="6298" instrument_node="">YouTube Channel!</span></a></p><span data-dcnode-id="6295" instrument_node="">

</span><div class="post-toc well" data-dcnode-id="5742"><p class="post-toc__title" data-dcnode-id="5774"><span data-dcnode-id="5775" instrument_node="">Table of Contents</span></p><ol class="list-unstyled" data-dcnode-id="5743" id="postToc"><li data-dcnode-id="5771"><a data-dcnode-id="5772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/U11URice_cM%23toc1" onclick=""><span data-dcnode-id="5773" instrument_node="">A Bit Of Background</span></a></li><li data-dcnode-id="5768"><a data-dcnode-id="5769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/U11URice_cM%23toc2" onclick=""><span data-dcnode-id="5770" instrument_node="">What About Today?</span></a></li><li data-dcnode-id="5765"><a data-dcnode-id="5766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/U11URice_cM%23toc3" onclick=""><span data-dcnode-id="5767" instrument_node="">The Two Models</span></a></li><li data-dcnode-id="5762"><a data-dcnode-id="5763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/U11URice_cM%23toc4" onclick=""><span data-dcnode-id="5764" instrument_node="">Ergonomics</span></a></li><li data-dcnode-id="5759"><a data-dcnode-id="5760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/U11URice_cM%23toc5" onclick=""><span data-dcnode-id="5761" instrument_node="">Shooting!</span></a></li><li data-dcnode-id="5756"><a data-dcnode-id="5757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/U11URice_cM%23toc6" onclick=""><span data-dcnode-id="5758" instrument_node="">Range Day #2</span></a></li><li data-dcnode-id="5753"><a data-dcnode-id="5754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/U11URice_cM%23toc7" onclick=""><span data-dcnode-id="5755" instrument_node="">Troubleshooting</span></a></li><li data-dcnode-id="5750"><a data-dcnode-id="5751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/U11URice_cM%23toc8" onclick=""><span data-dcnode-id="5752" instrument_node="">Range Trip #3</span></a></li><li data-dcnode-id="5747"><a data-dcnode-id="5748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/U11URice_cM%23toc9" onclick=""><span data-dcnode-id="5749" instrument_node="">By the Numbers</span></a></li><li data-dcnode-id="5744"><a data-dcnode-id="5745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/U11URice_cM%23toc10" onclick=""><span data-dcnode-id="5746" instrument_node="">Parting Shots</span></a></li></ol></div><span data-dcnode-id="5741" instrument_node="">
</span><h2 data-dcnode-id="5739" id="toc1"><span data-dcnode-id="5740" instrument_node="">A Bit Of Background</span></h2><span data-dcnode-id="5738" instrument_node="">
</span><p data-dcnode-id="5736"><span data-dcnode-id="5737" instrument_node="">Now, obviously the M1A is merely the civilian variant of the iconic M14, and the M14 itself is essentially only a slightly modified M1 Garand that was developed after WW2 to fill the niche for a fully automatic battle rifle. </span></p><span data-dcnode-id="5735" instrument_node="">
</span><p data-dcnode-id="5733"><span data-dcnode-id="5734" instrument_node="">While the countries in the newly formed North Atlantic Treaty Organization quickly agreed on a need to standardize small arms cartridges, a debate ensued over which exact cartridge that should be.&nbsp;</span></p><span data-dcnode-id="5732" instrument_node="">
</span><p data-dcnode-id="5730"><span data-dcnode-id="5731" instrument_node="">While the British focused on a smaller .280 cartridge out of concern for controllability in full auto, the US refused to adopt anything smaller than .30 caliber, citing concerns over diminished stopping power.&nbsp;</span></p><span data-dcnode-id="5729" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="5725"><img alt="Assorted 7.62x51mm (MEN 147gr, PPU 165gr, PPU 180gr, Gold Medal 168gr" class="wp-image-44559" data-dcnode-id="5728" height="683" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2019/09/31.-Assorted-7.62x51mm-MEN-147gr-PPU-165gr-PPU-180gr-Gold-Medal-168gr-1024x683.jpg&amp;raw" srcset="https://www.pewpewtactical.com/wp-content/uploads/2019/09/31.-Assorted-7.62x51mm-MEN-147gr-PPU-165gr-PPU-180gr-Gold-Medal-168gr-1024x683.jpg 1024w, https://www.pewpewtactical.com/wp-content/uploads/2019/09/31.-Assorted-7.62x51mm-MEN-147gr-PPU-165gr-PPU-180gr-Gold-Medal-168gr-300x200.jpg 300w, https://www.pewpewtactical.com/wp-content/uploads/2019/09/31.-Assorted-7.62x51mm-MEN-147gr-PPU-165gr-PPU-180gr-Gold-Medal-168gr-768x512.jpg 768w" width="1024"><figcaption data-dcnode-id="5726"><span data-dcnode-id="5727" instrument_node="">Assorted 7.62x51mm (MEN 147gr, PPU 165gr, PPU 180gr, Gold Medal 168gr</span></figcaption></figure><span data-dcnode-id="5724" instrument_node="">
</span><p data-dcnode-id="5719"><span data-dcnode-id="5723" instrument_node="">Fast forward a bit past a lot of bureaucracy and a point where the US </span><em data-dcnode-id="5721"><span data-dcnode-id="5722" instrument_node="">almost</span></em><span data-dcnode-id="5720" instrument_node=""> adopted the FN FAL, and finally we have NATO’s adoption of the 7.62x51mm cartridge as its official battle rifle round – and with it, the US adopted the M14 in the late 50s.</span></p><span data-dcnode-id="5718" instrument_node="">
</span><p data-dcnode-id="5716"><span data-dcnode-id="5717" instrument_node="">The M14, in theory, would simplify the makeup of the weapons fielded by the standard American infantry squad.&nbsp;</span></p><span data-dcnode-id="5715" instrument_node="">
</span><p data-dcnode-id="5713"><span data-dcnode-id="5714" instrument_node="">The leading brilliant minds of the time legitimately saw a future in which the M14 would replace the M3 grease gun and Thompson submachine guns, the BAR as a squad automatic weapon, the Springfield 1903 as a marksman rifle, and the M1 Garand and M1 carbine – a total overhaul of the ammunition and parts needed to keep a squad well supplied and operational. </span></p><span data-dcnode-id="5712" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="5707"><figure class="aligncenter" data-dcnode-id="5708"><img alt="" class="wp-image-45444" data-dcnode-id="5711" height="606" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2019/10/3.-Infantry-Squad-Weapons-Makeup-1024x606.jpg&amp;raw" srcset="https://www.pewpewtactical.com/wp-content/uploads/2019/10/3.-Infantry-Squad-Weapons-Makeup-1024x606.jpg 1024w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/3.-Infantry-Squad-Weapons-Makeup-300x178.jpg 300w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/3.-Infantry-Squad-Weapons-Makeup-768x455.jpg 768w" width="1024"><figcaption data-dcnode-id="5709"><span data-dcnode-id="5710" instrument_node="">Pictured: Very good ideas. </span></figcaption></figure></div><span data-dcnode-id="5706" instrument_node="">
</span><p data-dcnode-id="5704"><span data-dcnode-id="5705" instrument_node="">The gun was first fielded in Vietnam, and although 7.62 NATO proved great at punching through thick vegetation, the gun’s overall length was poorly suited for jungle warfare,&nbsp;it was basically uncontrollable in full auto, it’s wood stocks were subject to swelling from jungle humidity, which affected zero, and a DOD report found that the rifle overall was inferior to both the M1 Garand it descended from, and the soon to be introduced M16. </span></p><span data-dcnode-id="5703" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="5699"><img alt="" class="wp-image-45446" data-dcnode-id="5702" height="463" loading="lazy" sizes="(max-width: 720px) 100vw, 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2019/10/4.-M14-in-Vietnam.jpg&amp;raw" srcset="https://www.pewpewtactical.com/wp-content/uploads/2019/10/4.-M14-in-Vietnam.jpg 720w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/4.-M14-in-Vietnam-300x193.jpg 300w" width="720"><figcaption data-dcnode-id="5700"><span data-dcnode-id="5701" instrument_node="">*Creedence plays softly in the distance*</span></figcaption></figure><span data-dcnode-id="5698" instrument_node="">
</span><h2 data-dcnode-id="5696" id="toc2"><span data-dcnode-id="5697" instrument_node="">What About Today?</span></h2><span data-dcnode-id="5695" instrument_node="">
</span><p data-dcnode-id="5693"><span data-dcnode-id="5694" instrument_node="">So where’s that leave us?&nbsp;</span></p><span data-dcnode-id="5692" instrument_node="">
</span><p data-dcnode-id="5690"><span data-dcnode-id="5691" instrument_node="">Why, with an ensuing internet argument, of course!&nbsp;</span></p><span data-dcnode-id="5689" instrument_node="">
</span><p data-dcnode-id="5687"><span data-dcnode-id="5688" instrument_node="">We’ll just say this: The M14 and M1A have incredibly vocal supporters and detractors both – and if you have the misfortune of wading into Mekong Delta of that online shit-flinging fest, it’s probably going to be quite hard to discern how these guns actually perform in real life.&nbsp;</span></p><span data-dcnode-id="5686" instrument_node="">
</span><p data-dcnode-id="5676"><span data-dcnode-id="5685" instrument_node="">Springfield Armory was kind enough to send us both a </span><strong data-dcnode-id="5682"><a data-dcnode-id="5683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/go/sportsmans-warehouse/springfield-armory-m1a-nation-match/" label=" (opens in a new tab)" rel="sponsored noopener" target="_blank"><span data-dcnode-id="5684" instrument_node="">National Match M1A</span></a></strong><span data-dcnode-id="5681" instrument_node=""> and a </span><strong data-dcnode-id="5678"><a data-dcnode-id="5679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/go/sportsmans-warehouse/springfield-armory-m1a-socom/" label=" (opens in a new tab)" rel="sponsored noopener" target="_blank"><span data-dcnode-id="5680" instrument_node="">SOCOM16</span></a></strong><span data-dcnode-id="5677" instrument_node=""> to try out for ourselves – and we hoped that by the end, we’d have enough insight to give you a reasonable everyman opinion.</span></p><span data-dcnode-id="5675" instrument_node="">
</span><p data-dcnode-id="5673"><span data-dcnode-id="5674" instrument_node=""> Considering that you have folks claiming that these are sub MOA guns at 1,000 yards with irons on one side of the debate, and uhhhhh some nerd that won’t shutup about how the US should have adopted the FAL over the M14 on the other.&nbsp;</span></p><span data-dcnode-id="5672" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="5668"><img alt="" class="wp-image-45452" data-dcnode-id="5671" height="681" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2019/10/5.-FN-FAL-American-Soldier-1024x681.jpeg&amp;raw" srcset="https://www.pewpewtactical.com/wp-content/uploads/2019/10/5.-FN-FAL-American-Soldier-1024x681.jpeg 1024w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/5.-FN-FAL-American-Soldier-300x200.jpeg 300w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/5.-FN-FAL-American-Soldier-768x511.jpeg 768w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/5.-FN-FAL-American-Soldier.jpeg 1200w" width="1024"><figcaption data-dcnode-id="5669"><span data-dcnode-id="5670" instrument_node="">Silence, nerds. </span></figcaption></figure><span data-dcnode-id="5667" instrument_node="">
</span><h2 data-dcnode-id="5665" id="toc3"><span data-dcnode-id="5666" instrument_node="">The Two Models</span></h2><span data-dcnode-id="5664" instrument_node="">
</span><p data-dcnode-id="5662"><span data-dcnode-id="5663" instrument_node="">The National Match M1A is, according to Springfield, hand-built to win competitions. </span></p><span data-dcnode-id="5661" instrument_node="">

</span><figure class="wp-block-image" data-dcnode-id="5400"><img alt="" class="wp-image-45467" data-dcnode-id="5403" height="576" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2019/10/7.-M1A-SOCOM16-1024x576.jpg&amp;raw" width="1024"><figcaption data-dcnode-id="5401"><span data-dcnode-id="5402" instrument_node="">Tattooine vibe check.</span></figcaption></figure><span data-dcnode-id="5399" instrument_node="">

</span><div data-dcnode-id="5397" id="div-gpt-ad-1622125165565-0" style="min-width: 300px; min-height: 60px;"></div><span data-dcnode-id="5396" instrument_node="">
</span></div><h2 data-dcnode-id="5393" id="toc4"><span data-dcnode-id="5394" instrument_node="">Ergonomics</span></h2><span data-dcnode-id="5392" instrument_node="">
</span><p data-dcnode-id="5390"><span data-dcnode-id="5391" instrument_node="">First things first – in all honesty, these rifles are quite dated in terms of design ergonomics – as again, they’re civilian M14s, and the M14 was dated design-wise at the time even compared to the AK and FAL.&nbsp;</span></p><span data-dcnode-id="5389" instrument_node="">
</span><p data-dcnode-id="5387"><span data-dcnode-id="5388" instrument_node="">Considering you’ll be rocking the ergonomics of an 80 some odd-year-old rifle design, you can expect to feel out of place if you’re the type of dude that’s used to adjustable length of pull and a c-clamp style grip.&nbsp;</span></p><span data-dcnode-id="5386" instrument_node="">
</span><p data-dcnode-id="5384"><span data-dcnode-id="5385" instrument_node="">The rifles are heavy and quite cumbersome – weighing in at 8lbs for the SOC16 and 10lbs for the National Match, both unloaded.&nbsp;</span></p><span data-dcnode-id="5383" instrument_node="">
</span><p data-dcnode-id="5381"><span data-dcnode-id="5382" instrument_node="">Because of the op-rod placement, you’re likely going to have to jump your support hand out way further than what feels natural if you’re used to firing modern carbines – otherwise, you’ll be in for quite a shitty surprise when the gun bites you. </span></p><span data-dcnode-id="5380" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="5376"><img alt="" class="wp-image-45468" data-dcnode-id="5379" height="576" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2019/10/8.-M1A-Op-Rod-Bite-Danger-1024x576.jpg&amp;raw" srcset="https://www.pewpewtactical.com/wp-content/uploads/2019/10/8.-M1A-Op-Rod-Bite-Danger-1024x576.jpg 1024w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/8.-M1A-Op-Rod-Bite-Danger-300x169.jpg 300w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/8.-M1A-Op-Rod-Bite-Danger-768x432.jpg 768w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/8.-M1A-Op-Rod-Bite-Danger.jpg 1920w" width="1024"><figcaption data-dcnode-id="5377"><span data-dcnode-id="5378" instrument_node="">The weird ‘teacup’ fingers you’ve gotta do to keep your hand out of the way. </span></figcaption></figure><span data-dcnode-id="5375" instrument_node="">
</span><p data-dcnode-id="5373"><span data-dcnode-id="5374" instrument_node="">However, the sling mount kinda gets in the way of what, for me, feels like a natural hand placement – and you’ve got to keep your fingers away from the op-rod all the same.&nbsp;</span></p><span data-dcnode-id="5372" instrument_node="">
</span><p data-dcnode-id="5370"><span data-dcnode-id="5371" instrument_node="">The M1A’s safety is located within the trigger guard itself, and is essentially a metal tab that you press forward to disengage. </span></p><span data-dcnode-id="5369" instrument_node="">
</span><p data-dcnode-id="5364"><span data-dcnode-id="5368" instrument_node="">Again, a bit of antiquated design here – I don’t particularly care for a safety mechanism that I have to get my finger </span><em data-dcnode-id="5366"><span data-dcnode-id="5367" instrument_node="">near the trigger</span></em><span data-dcnode-id="5365" instrument_node=""> to operate, and the lever itself is quite stiff. </span></p><span data-dcnode-id="5363" instrument_node="">
</span><p data-dcnode-id="5361"><span data-dcnode-id="5362" instrument_node="">Kinda sketchy, and I prefer to use my left thumb to flick it forward.&nbsp;</span></p><span data-dcnode-id="5360" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="5356"><img alt="" class="wp-image-45469" data-dcnode-id="5359" height="576" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2019/10/9.-M1A-Safety-Lever-1024x576.jpg&amp;raw" srcset="https://www.pewpewtactical.com/wp-content/uploads/2019/10/9.-M1A-Safety-Lever-1024x576.jpg 1024w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/9.-M1A-Safety-Lever-300x169.jpg 300w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/9.-M1A-Safety-Lever-768x432.jpg 768w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/9.-M1A-Safety-Lever.jpg 1920w" width="1024"><figcaption data-dcnode-id="5357"><span data-dcnode-id="5358" instrument_node="">Eeep. </span></figcaption></figure><span data-dcnode-id="5355" instrument_node="">
</span><p data-dcnode-id="5353"><span data-dcnode-id="5354" instrument_node="">The swell of the rifle’s stock also creates a fulcrum point around your hand itself.</span></p><span data-dcnode-id="5352" instrument_node="">
</span><p data-dcnode-id="5350"><span data-dcnode-id="5351" instrument_node="">Whereas an AR platform is going to recoil directly back into the buffer tube, the M1A essentially uses your dominant hand as an anchor point for the muzzle when it climbs upwards. </span></p><span data-dcnode-id="5349" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="5345"><img alt="" class="wp-image-45470" data-dcnode-id="5348" height="576" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2019/10/10.-SOC16-Fulcrum-Point-1024x576.jpg&amp;raw" srcset="https://www.pewpewtactical.com/wp-content/uploads/2019/10/10.-SOC16-Fulcrum-Point-1024x576.jpg 1024w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/10.-SOC16-Fulcrum-Point-300x169.jpg 300w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/10.-SOC16-Fulcrum-Point-768x432.jpg 768w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/10.-SOC16-Fulcrum-Point.jpg 1920w" width="1024"><figcaption data-dcnode-id="5346"><span data-dcnode-id="5347" instrument_node="">The gun’s got a tendency to rotate around my right hand here</span></figcaption></figure><span data-dcnode-id="5344" instrument_node="">
</span><div data-dcnode-id="5337" id="pptOptin1" style="display: block;"><span data-dcnode-id="5343" instrument_node="">
</span><a class="optin" data-dcnode-id="5339" data-dripid="28051371" data-source="yellow-box" data-sourcetype="newsletter" data-target="#footerOptin" data-toggle="optin-modal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/offer/%3Fd%3D28051371%26h%3D%26sh%3D"><b data-dcnode-id="5341"><span data-dcnode-id="5342" instrument_node="">BONUS: Shoot better.</span></b><span data-dcnode-id="5340" instrument_node=""> Download our exclusive shooting targets for FREE ($47 value)</span></a><span data-dcnode-id="5338" instrument_node=""> </span></div><p data-dcnode-id="5335"><span data-dcnode-id="5336" instrument_node="">I also find that for me personally, the combination of hand and head placement when shooting from a rest position always winds up grabbing a bit of facial hair that the rifle takes with it when it fires, so make of that what you will.&nbsp;</span></p><span data-dcnode-id="5334" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="5330"><img alt="" class="wp-image-45471" data-dcnode-id="5333" height="576" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2019/10/11.-M1A-Beard-Problems-1024x576.jpg&amp;raw" srcset="https://www.pewpewtactical.com/wp-content/uploads/2019/10/11.-M1A-Beard-Problems-1024x576.jpg 1024w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/11.-M1A-Beard-Problems-300x169.jpg 300w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/11.-M1A-Beard-Problems-768x432.jpg 768w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/11.-M1A-Beard-Problems.jpg 1920w" width="1024"><figcaption data-dcnode-id="5331"><span data-dcnode-id="5332" instrument_node="">Mustache Pain Imminent</span></figcaption></figure><span data-dcnode-id="5329" instrument_node="">
</span><p data-dcnode-id="5327"><span data-dcnode-id="5328" instrument_node="">Additionally, the magazines are a bit wonky to insert at first. </span></p><span data-dcnode-id="5326" instrument_node="">
</span><p data-dcnode-id="5324"><span data-dcnode-id="5325" instrument_node="">You’ve got to rock them into the receiver sort of like an AK, but because the guns ship with short 10 rounders, you’ve really got to drive the front notch of the mag deep into the mag well, rock the rear of the mag back towards the trigger, and simultaneously push up to get the magazine seated correctly. </span></p><span data-dcnode-id="5323" instrument_node="">
</span><p data-dcnode-id="5321"><span data-dcnode-id="5322" instrument_node="">It’s not the end of the world, and it does get easier over time as the mags get broken in.</span></p><span data-dcnode-id="5320" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="5316"><img alt="" class="wp-image-45472" data-dcnode-id="5319" height="576" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2019/10/12.-M1A-Magazine-Insertion-1024x576.jpg&amp;raw" srcset="https://www.pewpewtactical.com/wp-content/uploads/2019/10/12.-M1A-Magazine-Insertion-1024x576.jpg 1024w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/12.-M1A-Magazine-Insertion-300x169.jpg 300w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/12.-M1A-Magazine-Insertion-768x432.jpg 768w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/12.-M1A-Magazine-Insertion.jpg 1920w" width="1024"><figcaption data-dcnode-id="5317"><span data-dcnode-id="5318" instrument_node="">Like so</span></figcaption></figure><span data-dcnode-id="5315" instrument_node="">
</span><p data-dcnode-id="5313"><span data-dcnode-id="5314" instrument_node="">So, yes – the design of the rifles isn’t super comfortable and feels antiquated, well, because it is. </span></p><span data-dcnode-id="5312" instrument_node="">
</span><p data-dcnode-id="5310"><span data-dcnode-id="5311" instrument_node="">But how do they shoot?&nbsp;</span></p><span data-dcnode-id="5309" instrument_node="">
</span><h2 data-dcnode-id="5307" id="toc5"><span data-dcnode-id="5308" instrument_node="">Shooting!</span></h2><span data-dcnode-id="5306" instrument_node="">

</span></div></div><p data-dcnode-id="5256"><span data-dcnode-id="5260" instrument_node="">We took these guns out to the desert to ring some 200-yard steel, and in all honesty…the results were </span><span data-dcnode-id="5258" style="text-decoration: underline;"><span data-dcnode-id="5259" instrument_node="">not fantastic</span></span><span data-dcnode-id="5257" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="5255" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="5251"><img alt="" class="wp-image-45473" data-dcnode-id="5254" height="576" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2019/10/13.-SOC16-Desert-Shooting-1024x576.jpg&amp;raw" srcset="https://www.pewpewtactical.com/wp-content/uploads/2019/10/13.-SOC16-Desert-Shooting-1024x576.jpg 1024w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/13.-SOC16-Desert-Shooting-300x169.jpg 300w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/13.-SOC16-Desert-Shooting-768x432.jpg 768w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/13.-SOC16-Desert-Shooting.jpg 1920w" width="1024"><figcaption data-dcnode-id="5252"><span data-dcnode-id="5253" instrument_node="">Blastin’ with the SOC16.</span></figcaption></figure><span data-dcnode-id="5250" instrument_node="">
</span><p data-dcnode-id="5248"><span data-dcnode-id="5249" instrument_node="">It seemed like no matter what type of .308 ammunition we used, from shitty PRVI to decent PM to federal gold medal match, we’d hit 1or 2 shots every 3-4 rounds using consistent holds on our steel target.&nbsp;</span></p><span data-dcnode-id="5247" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="5243"><img alt="" class="wp-image-45474" data-dcnode-id="5246" height="576" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2019/10/14.-M1A-.308-Ammo-Types-1024x576.jpg&amp;raw" srcset="https://www.pewpewtactical.com/wp-content/uploads/2019/10/14.-M1A-.308-Ammo-Types-1024x576.jpg 1024w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/14.-M1A-.308-Ammo-Types-300x169.jpg 300w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/14.-M1A-.308-Ammo-Types-768x432.jpg 768w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/14.-M1A-.308-Ammo-Types.jpg 1920w" width="1024"><figcaption data-dcnode-id="5244"><span data-dcnode-id="5245" instrument_node="">Various rounds we shot on Day 1</span></figcaption></figure><span data-dcnode-id="5242" instrument_node="">
</span><p data-dcnode-id="5240"><span data-dcnode-id="5241" instrument_node="">Admittedly, we are not marksmen, and while we all have a good amount of long-range shooting experience, our inability to hit relatively close targets with these guns seemed pretty damn wild. </span></p><span data-dcnode-id="5239" instrument_node="">
</span><p data-dcnode-id="5237"><span data-dcnode-id="5238" instrument_node="">The M1A’s worst critics online will tell you that the gun’s design itself literally prevents them from being accurized, due to the mechanics of how the rifle’s receiver fits into the stock itself. </span></p><span data-dcnode-id="5236" instrument_node="">
</span><p data-dcnode-id="5234"><span data-dcnode-id="5235" instrument_node="">There’s also an infamous study on the M14 that essentially says the same thing, noting that the US Army tried for a few decades and concluded, a couple million dollars later, that the M24 was a better weapon system than the marksman-tier M14 they tried to create.&nbsp;</span></p><span data-dcnode-id="5233" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="5229"><img alt="" class="wp-image-45454" data-dcnode-id="5232" height="533" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2019/10/15.-M14-EBR-Afghanistan.jpg&amp;raw" srcset="https://www.pewpewtactical.com/wp-content/uploads/2019/10/15.-M14-EBR-Afghanistan.jpg 800w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/15.-M14-EBR-Afghanistan-300x200.jpg 300w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/15.-M14-EBR-Afghanistan-768x512.jpg 768w" width="800"><figcaption data-dcnode-id="5230"><span data-dcnode-id="5231" instrument_node="">The M14 EBR in use with American SOF Personnel</span></figcaption></figure><span data-dcnode-id="5228" instrument_node="">
</span><p data-dcnode-id="5226"><span data-dcnode-id="5227" instrument_node=""> Could it really be us? Do we not understand the point of aim with M14 irons? Are they that different from the ARs and AKs we’re much more familiar with? Are we posers? Comment below if you think we’re posers. </span></p><span data-dcnode-id="5225" instrument_node="">
</span><p data-dcnode-id="5223"><span data-dcnode-id="5224" instrument_node="">We weren’t sure, but we did find that both the National Match M1A and the SOCOM 16 performed about the same in this department – with the SOC16’s ironsights being a bit worse considering they’re thicker and obscure most of the target at 200 yards. (You know, because it’s a CQB gun) </span></p><span data-dcnode-id="5222" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="5218"><img alt="" class="wp-image-45475" data-dcnode-id="5221" height="576" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2019/10/17.-M1A-Iron-Sight-Comparison-1024x576.jpg&amp;raw" srcset="https://www.pewpewtactical.com/wp-content/uploads/2019/10/17.-M1A-Iron-Sight-Comparison-1024x576.jpg 1024w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/17.-M1A-Iron-Sight-Comparison-300x169.jpg 300w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/17.-M1A-Iron-Sight-Comparison-768x432.jpg 768w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/17.-M1A-Iron-Sight-Comparison.jpg 1920w" width="1024"><figcaption data-dcnode-id="5219"><span data-dcnode-id="5220" instrument_node="">Iron Sight Comparison</span></figcaption></figure><span data-dcnode-id="5217" instrument_node="">
</span><p data-dcnode-id="5215"><span data-dcnode-id="5216" instrument_node="">
After a few mags, we decided to setup a shooting mat and rest to take some prone shots with an optic mounted to the SOC16’s scout mount to see if the irons themselves were just inexplicably way off. </span></p><span data-dcnode-id="5214" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="5210"><img alt="" class="wp-image-45476" data-dcnode-id="5213" height="576" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2019/10/18.-SOC16-with-Scout-Scope-1024x576.jpg&amp;raw" srcset="https://www.pewpewtactical.com/wp-content/uploads/2019/10/18.-SOC16-with-Scout-Scope-1024x576.jpg 1024w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/18.-SOC16-with-Scout-Scope-300x169.jpg 300w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/18.-SOC16-with-Scout-Scope-768x432.jpg 768w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/18.-SOC16-with-Scout-Scope.jpg 1920w" width="1024"><figcaption data-dcnode-id="5211"><span data-dcnode-id="5212" instrument_node="">Not a huge fan of scout optics, personally.</span></figcaption></figure><span data-dcnode-id="5209" instrument_node="">
</span><p data-dcnode-id="5207"><span data-dcnode-id="5208" instrument_node="">Unfortunately, we still weren’t getting great results, and the forward-mounted Picatinny rail on the SOC16 means that you’re essentially relegated to scout scopes with good eye relief. </span></p><span data-dcnode-id="5206" instrument_node="">
</span><p data-dcnode-id="5201"><span data-dcnode-id="5205" instrument_node="">Again – we totally accept that we are by no means amazing shooters, but this shouldn’t be </span><em data-dcnode-id="5203"><span data-dcnode-id="5204" instrument_node="">that</span></em><span data-dcnode-id="5202" instrument_node=""> hard. So what’s going on here? </span></p><span data-dcnode-id="5200" instrument_node="">
</span><p data-dcnode-id="5198"><span data-dcnode-id="5199" instrument_node="">Considering the fact that it was 100+ degrees on our shoot day and firing a shitton of .308 on guns with meat tenderizers on their buttplates isn’t the most pleasant thing in the world, we resigned ourselves to chill on the M1As and take them to a local range to shoot groups and get them dialed in. </span></p><span data-dcnode-id="5197" instrument_node="">
</span><h2 data-dcnode-id="5195" id="toc6"><span data-dcnode-id="5196" instrument_node="">Range Day #2</span></h2><span data-dcnode-id="5194" instrument_node="">
</span><p data-dcnode-id="5192"><span data-dcnode-id="5193" instrument_node="">Fast forward to our next shoot day! This time, we shot 100 yard groups with irons from the bench, and… the results were still pretty bizarre.&nbsp;</span></p><span data-dcnode-id="5191" instrument_node="">
</span><p data-dcnode-id="5189"><span data-dcnode-id="5190" instrument_node="">As you can see… the shot placement was all over the place.&nbsp;</span></p><span data-dcnode-id="5188" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="5184"><img alt="" class="wp-image-45477" data-dcnode-id="5187" height="576" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2019/10/19.-M1A-Groups-Burro-1024x576.jpg&amp;raw" srcset="https://www.pewpewtactical.com/wp-content/uploads/2019/10/19.-M1A-Groups-Burro-1024x576.jpg 1024w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/19.-M1A-Groups-Burro-300x169.jpg 300w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/19.-M1A-Groups-Burro-768x432.jpg 768w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/19.-M1A-Groups-Burro.jpg 1920w" width="1024"><figcaption data-dcnode-id="5185"><span data-dcnode-id="5186" instrument_node="">No, this isn’t a 12ga.</span></figcaption></figure><span data-dcnode-id="5183" instrument_node="">
</span><p data-dcnode-id="5181"><span data-dcnode-id="5182" instrument_node="">One of the weirdest parts of the entire experience was the tendency for both guns to pull off consecutive rounds either through the same hole or touching one another, only for the next round to be a complete flier somewhere else on the paper.&nbsp;</span></p><span data-dcnode-id="5180" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="5176"><img alt="" class="wp-image-45478" data-dcnode-id="5179" height="576" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2019/10/20.-M1A-Tight-Shots-1024x576.jpg&amp;raw" srcset="https://www.pewpewtactical.com/wp-content/uploads/2019/10/20.-M1A-Tight-Shots-1024x576.jpg 1024w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/20.-M1A-Tight-Shots-300x169.jpg 300w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/20.-M1A-Tight-Shots-768x432.jpg 768w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/20.-M1A-Tight-Shots.jpg 1920w" width="1024"><figcaption data-dcnode-id="5177"><span data-dcnode-id="5178" instrument_node="">Pictured: WAT</span></figcaption></figure><span data-dcnode-id="5175" instrument_node="">
</span><p data-dcnode-id="5172"><br data-dcnode-id="5174"><span data-dcnode-id="5173" instrument_node="">Again, we’re not so arrogant as to think that this isn’t our fault – but if so, why / how were we putting 2 rounds through the same hole only to completely fuck up the next round by several inches? At 100 yards from bench? </span></p><span data-dcnode-id="5171" instrument_node="">
</span><p data-dcnode-id="5168"><span data-dcnode-id="5170" instrument_node="">That seems pretty unlikely.&nbsp;</span><br data-dcnode-id="5169"></p><span data-dcnode-id="5167" instrument_node="">
</span><h2 data-dcnode-id="5165" id="toc7"><span data-dcnode-id="5166" instrument_node="">Troubleshooting</span></h2><span data-dcnode-id="5164" instrument_node="">
</span><p data-dcnode-id="5159"><span data-dcnode-id="5163" instrument_node="">Not wanting to publish a pretty damning review on 8 MOA guns, we wondered if there might be something wrong with the rifles themselves. We therefore reached out to Springfield to see if they had any idea what the case might be. </span><br data-dcnode-id="5162"><br data-dcnode-id="5161"><span data-dcnode-id="5160" instrument_node="">While they were alarmed at our results, they offered to bring the guns back and test them at their facilities to ensure we didn’t get flawed rifles for whatever reason.</span></p><span data-dcnode-id="5158" instrument_node="">
</span><p data-dcnode-id="5156"><span data-dcnode-id="5157" instrument_node="">Springfield’s techs looked the guns over and purportedly found zero issues with any aspect of them.&nbsp;</span></p><span data-dcnode-id="5155" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="5149"><img alt="" class="wp-image-45479" data-dcnode-id="5154" height="576" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2019/10/21.-Internal-Screaming-1024x576.jpg&amp;raw" width="1024"><figcaption data-dcnode-id="5150"><span data-dcnode-id="5153" instrument_node="">literally </span><em data-dcnode-id="5151"><span data-dcnode-id="5152" instrument_node="">how</span></em></figcaption></figure><span data-dcnode-id="5148" instrument_node="">
</span><p data-dcnode-id="5142"><span data-dcnode-id="5147" instrument_node="">Springfield then mounted optics to the rifles using a </span><strong data-dcnode-id="5144"><a data-dcnode-id="5145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2OWVcwi" label=" (opens in a new tab)" rel="sponsored noopener" target="_blank"><span data-dcnode-id="5146" instrument_node="">4th Gen Steel Receiver mount</span></a></strong><span data-dcnode-id="5143" instrument_node=""> and tested them thusly. </span></p><span data-dcnode-id="5141" instrument_node="">

</span><p data-dcnode-id="5031"><span data-dcnode-id="5032" instrument_node="">The National Match came in at 1.25 MOA with a Vortex 4-16x optic, and the SOC16 shot 2MOA with a Vortex 1-6 both at 100 yards.&nbsp;</span></p><span data-dcnode-id="5030" instrument_node="">
</span><p data-dcnode-id="5025"><span data-dcnode-id="5029" instrument_node="">Again, obviously </span><em data-dcnode-id="5027"><span data-dcnode-id="5028" instrument_node="">much</span></em><span data-dcnode-id="5026" instrument_node=""> better than the results that we were getting in the two different times we shot the guns previously.</span></p><span data-dcnode-id="5024" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="5022"><img alt="" class="wp-image-45480" data-dcnode-id="5023" height="576" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2019/10/22.-M1A-Scope-Mount-1024x576.jpg&amp;raw" srcset="https://www.pewpewtactical.com/wp-content/uploads/2019/10/22.-M1A-Scope-Mount-1024x576.jpg 1024w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/22.-M1A-Scope-Mount-300x169.jpg 300w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/22.-M1A-Scope-Mount-768x432.jpg 768w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/22.-M1A-Scope-Mount.jpg 1920w" width="1024"></figure><span data-dcnode-id="5021" instrument_node="">
</span><p data-dcnode-id="5019"><span data-dcnode-id="5020" instrument_node="">At this point, we were pretty blown away. </span></p><span data-dcnode-id="5018" instrument_node="">
</span><p data-dcnode-id="5014"><span data-dcnode-id="5017" instrument_node="">Is it really us? </span><strong data-dcnode-id="5015"><span data-dcnode-id="5016" instrument_node="">Do we really just suck that hard?&nbsp;</span></strong></p><span data-dcnode-id="5013" instrument_node="">
</span><p data-dcnode-id="5008"><span data-dcnode-id="5012" instrument_node="">Springfield offered to send the guns back to us for another round of testing, and we accepted. They even included the optics and mounts to ensure we’d be able to repeat their results. </span><br data-dcnode-id="5011"><br data-dcnode-id="5010"><span data-dcnode-id="5009" instrument_node="">Fast forward to range trip number 3, and close to 900 rounds of .308 later aaaaaaaaaaaaaaand we were finally able to get some usable numbers out of these guns!&nbsp;</span></p><span data-dcnode-id="5007" instrument_node="">
</span><p data-dcnode-id="5003"><em data-dcnode-id="5005"><span data-dcnode-id="5006" instrument_node="">Sweeet Jesus thank you</span></em><span data-dcnode-id="5004" instrument_node="">!</span></p><span data-dcnode-id="5002" instrument_node="">
</span><h2 data-dcnode-id="5000" id="toc8"><span data-dcnode-id="5001" instrument_node="">Range Trip #3</span></h2><span data-dcnode-id="4999" instrument_node="">
</span><div data-dcnode-id="4989" id="pptOptin2" style="display: block;"><span data-dcnode-id="4998" instrument_node="">
</span><a class="optin" data-dcnode-id="4991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//courses.pewpewtactical.com/" target="_blank"><b data-dcnode-id="4996"><span data-dcnode-id="4997" instrument_node="">New to guns?</span></b><span data-dcnode-id="4995" instrument_node=""> Check out our online&nbsp;</span><span data-dcnode-id="4993" style="text-decoration: underline;"><span data-dcnode-id="4994" instrument_node="">Beginner Handgun Course</span></span><span data-dcnode-id="4992" instrument_node=""> that teaches all the important stuff you need to know.</span></a><span data-dcnode-id="4990" instrument_node=""> </span></div><p data-dcnode-id="4987"><span data-dcnode-id="4988" instrument_node="">With the Vortex optics mounted we were now shooting about 1.5MOA out of the National Match, and ~2 MOA out of the SOC 16 using 168gr Gold Medal Match ammo. </span></p><span data-dcnode-id="4986" instrument_node="">
</span><p data-dcnode-id="4984"><span data-dcnode-id="4985" instrument_node="">PRVI 145 and 180 grain out of the SOC16 both still felt subpar however, and PMC Bronze was decent but did have a flier in the group you see on screen. </span></p><span data-dcnode-id="4983" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="4980"><figure class="aligncenter" data-dcnode-id="4981"><img alt="" class="wp-image-45481" data-dcnode-id="4982" height="1024" loading="lazy" sizes="(max-width: 498px) 100vw, 498px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2019/10/24.-SOC-16-Groups-with-Optic-498x1024.jpg&amp;raw" srcset="https://www.pewpewtactical.com/wp-content/uploads/2019/10/24.-SOC-16-Groups-with-Optic-498x1024.jpg 498w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/24.-SOC-16-Groups-with-Optic-146x300.jpg 146w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/24.-SOC-16-Groups-with-Optic-768x1580.jpg 768w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/24.-SOC-16-Groups-with-Optic.jpg 1960w" width="498"></figure></div><span data-dcnode-id="4979" instrument_node="">
</span><p data-dcnode-id="4977"><span data-dcnode-id="4978" instrument_node="">The National Match didn’t much like PRVI 145, but did okay with with PRVI 180, because literally nothing about any of this makes sense. </span></p><span data-dcnode-id="4976" instrument_node="">
</span><p data-dcnode-id="4973"><span data-dcnode-id="4975" instrument_node="">PMC was okay and Match was, of course, the best.&nbsp;&nbsp;</span><br data-dcnode-id="4974"></p><span data-dcnode-id="4972" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="4969"><figure class="aligncenter" data-dcnode-id="4970"><img alt="" class="wp-image-45483" data-dcnode-id="4971" height="498" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2019/10/23.-National-Match-Groups-With-Optic-1024x498.jpg&amp;raw" srcset="https://www.pewpewtactical.com/wp-content/uploads/2019/10/23.-National-Match-Groups-With-Optic-1024x498.jpg 1024w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/23.-National-Match-Groups-With-Optic-300x146.jpg 300w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/23.-National-Match-Groups-With-Optic-768x373.jpg 768w" width="1024"></figure></div><span data-dcnode-id="4968" instrument_node="">
</span><p data-dcnode-id="4966"><span data-dcnode-id="4967" instrument_node="">We should note though that you’ll likely want to invest in a cheek riser if you wind up using an optic on these rifles, as they tend to sit quite high above the bore.&nbsp;</span></p><span data-dcnode-id="4965" instrument_node="">
</span><h2 data-dcnode-id="4963" id="toc9"><span data-dcnode-id="4964" instrument_node="">By the Numbers</span></h2><span data-dcnode-id="4962" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="4954"><strong data-dcnode-id="4959"><span data-dcnode-id="4960" style="text-decoration: underline;"><span data-dcnode-id="4961" instrument_node="">Reliability</span></span></strong><span data-dcnode-id="4958" instrument_node="">: </span><strong data-dcnode-id="4955"><span data-dcnode-id="4956" style="text-decoration: underline;"><span data-dcnode-id="4957" instrument_node="">5/5</span></span></strong></p><span data-dcnode-id="4953" instrument_node="">
</span><p data-dcnode-id="4951"><span data-dcnode-id="4952" instrument_node="">For all of the weird issues we had with the M1As, reliability in terms of operation wasn’t one of them. We did experience one light primer strike on some of the poorer PRVI ammo, but are good to go outside of that. </span></p><span data-dcnode-id="4950" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="4945"><span data-dcnode-id="4949" instrument_node=""> </span><strong data-dcnode-id="4946"><span data-dcnode-id="4947" style="text-decoration: underline;"><span data-dcnode-id="4948" instrument_node="">Ergonomics: 3/5</span></span></strong></p><span data-dcnode-id="4944" instrument_node="">
</span><p data-dcnode-id="4942"><span data-dcnode-id="4943" instrument_node="">This feels a little bit odd to grade with a number value, as the rifle’s design is quite dated. It was par for the course during the 40s, but is it fair to judge an antiquated set up by modern standards? The gun will work just fine if you adapt your shooting style to it, but it is not the most comfortable experience in the world. </span></p><span data-dcnode-id="4941" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="4937"><strong data-dcnode-id="4938"><span data-dcnode-id="4939" style="text-decoration: underline;"><span data-dcnode-id="4940" instrument_node="">Accuracy: ?/5</span></span></strong></p><span data-dcnode-id="4936" instrument_node="">
</span><p data-dcnode-id="4934"><span data-dcnode-id="4935" instrument_node="">We’re genuinely super confused about what happened with the accuracy tests of the guns, and don’t feel particularly comfortable assigning this area a grade while the results were inconclusive. </span></p><span data-dcnode-id="4933" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="4929"><strong data-dcnode-id="4930"><span data-dcnode-id="4931" style="text-decoration: underline;"><span data-dcnode-id="4932" instrument_node="">Customization: 5/5</span></span></strong></p><span data-dcnode-id="4928" instrument_node="">
</span><p data-dcnode-id="4923"><span data-dcnode-id="4927" instrument_node="">There are a </span><em data-dcnode-id="4925"><span data-dcnode-id="4926" instrument_node="">ton</span></em><span data-dcnode-id="4924" instrument_node=""> of aftermarket accessories available for the M1A, such as radically different chassis that update its design ergonomics to something that feels much more modern if you can’t stand the old-school vibe.</span></p><span data-dcnode-id="4922" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="4918"><strong data-dcnode-id="4919"><span data-dcnode-id="4920" style="text-decoration: underline;"><span data-dcnode-id="4921" instrument_node="">Value: 3/5</span></span></strong></p><span data-dcnode-id="4917" instrument_node="">
</span><p data-dcnode-id="4915"><span data-dcnode-id="4916" instrument_node="">The M1A is a little bit pricey depending on model, but if you’re in the market for a .308 American service rifle, it’s essentially your only option. </span></p><span data-dcnode-id="4914" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="4910"><strong data-dcnode-id="4911"><span data-dcnode-id="4912" style="text-decoration: underline;"><span data-dcnode-id="4913" instrument_node="">Overall: 3/5</span></span></strong></p><span data-dcnode-id="4909" instrument_node="">
</span><h2 data-dcnode-id="4907" id="toc10"><span data-dcnode-id="4908" instrument_node="">Parting Shots</span></h2><span data-dcnode-id="4906" instrument_node="">
</span><p data-dcnode-id="4904"><span data-dcnode-id="4905" instrument_node="">Again…highly recommend you check out the video so you can see everything in motion.</span></p><span data-dcnode-id="4903" instrument_node="">
</span><figure class="wp-block-embed is-type-video is-provider-youtube wp-block-embed-youtube wp-embed-aspect-16-9 wp-has-aspect-ratio" data-dcnode-id="4900"><div class="wp-block-embed__wrapper" data-dcnode-id="4901"><span data-dcnode-id="4902" instrument_node="">
https://www.youtube.com/watch?v=U11URice_cM
</span></div></figure><span data-dcnode-id="4899" instrument_node="">
</span><p data-dcnode-id="4897"><span data-dcnode-id="4898" instrument_node="">
So the guns did okay and shot pretty close to what Springfield reported with the addition of optics.
</span></p><span data-dcnode-id="4896" instrument_node="">
</span><p data-dcnode-id="4894"><span data-dcnode-id="4895" instrument_node="">However, that makes the entire ordeal feel that much stranger?</span></p><span data-dcnode-id="4893" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="4891"><img alt="" class="wp-image-45493" data-dcnode-id="4892" height="576" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2019/10/25.-SOC16-Closeup-1024x576.jpg&amp;raw" srcset="https://www.pewpewtactical.com/wp-content/uploads/2019/10/25.-SOC16-Closeup-1024x576.jpg 1024w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/25.-SOC16-Closeup-300x169.jpg 300w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/25.-SOC16-Closeup-768x432.jpg 768w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/25.-SOC16-Closeup.jpg 1920w" width="1024"></figure><span data-dcnode-id="4890" instrument_node="">

</span><p data-dcnode-id="4753"><span data-dcnode-id="4754" instrument_node="">We really hope we don’t accidentally end up summoning the M14 defense squad by even suggesting that these guns are not the absurdly accurate sniper platforms it feels like a segment of pop culture has made them out to be, and for the umpteenth time we’re readily willing to accept that the problem may very well have been us.&nbsp;</span></p><span data-dcnode-id="4752" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="4750"><img alt="" class="wp-image-45495" data-dcnode-id="4751" height="576" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2019/10/29.-National-Match-on-top-of-Rocks-1024x576.jpg&amp;raw" srcset="https://www.pewpewtactical.com/wp-content/uploads/2019/10/29.-National-Match-on-top-of-Rocks-1024x576.jpg 1024w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/29.-National-Match-on-top-of-Rocks-300x169.jpg 300w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/29.-National-Match-on-top-of-Rocks-768x432.jpg 768w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/29.-National-Match-on-top-of-Rocks.jpg 1920w" width="1024"></figure><span data-dcnode-id="4749" instrument_node="">
</span><p data-dcnode-id="4747"><span data-dcnode-id="4748" instrument_node="">What sticks out as extremely odd for me personally though, is that we’ve never experienced issues quite like this with any of our other .308 guns, and the issues occurred across multiple reasonably experienced shooters. </span></p><span data-dcnode-id="4746" instrument_node="">
</span><p data-dcnode-id="4744"><span data-dcnode-id="4745" instrument_node="">It also seems unlikely that we’d be able to get two rounds to touch back to back if we weren’t decent shots to begin with, only to have a subsequent round end up nowhere near the previous two. </span></p><span data-dcnode-id="4743" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="4741"><img alt="M1A-Open-Bolt" class="wp-image-45496" data-dcnode-id="4742" height="576" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2019/10/27.-M1A-Open-Bolt-1024x576.jpg&amp;raw" srcset="https://www.pewpewtactical.com/wp-content/uploads/2019/10/27.-M1A-Open-Bolt-1024x576.jpg 1024w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/27.-M1A-Open-Bolt-300x169.jpg 300w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/27.-M1A-Open-Bolt-768x432.jpg 768w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/27.-M1A-Open-Bolt.jpg 1920w" width="1024"></figure><span data-dcnode-id="4740" instrument_node="">
</span><p data-dcnode-id="4735"><span data-dcnode-id="4739" instrument_node="">Springfield’s lead tech also managed to shoot a 1.25” group with the national match using irons, so blaming the iron sights doesn’t seem quite right either – although I think it’s fair to assume a tech at springfield is likely a </span><strong data-dcnode-id="4737"><span data-dcnode-id="4738" instrument_node="">goddamn pro with the M1A</span></strong><span data-dcnode-id="4736" instrument_node="">. </span></p><span data-dcnode-id="4734" instrument_node="">

</span><p data-dcnode-id="4618"><span data-dcnode-id="4625" instrument_node="">Truthfully, we have no idea, and we actually deliberated for a while on what approach we wanted to take with this review – because at the end of the day, it’s still sort of inconclusive. </span><br data-dcnode-id="4624"><br data-dcnode-id="4623"><span data-dcnode-id="4622" instrument_node="">It’d be easy to pretend like the entire gaff just never happened, but that’s super disingenuous, and we try to be as real with y’all as possible. </span><br data-dcnode-id="4621"><br data-dcnode-id="4620"><span data-dcnode-id="4619" instrument_node="">We will say that Springfield’s responsiveness in helping us sort out what was going on was fantastic, and worth letting all of you know about. </span></p><span data-dcnode-id="4617" instrument_node="">
</span><p data-dcnode-id="4612"><span data-dcnode-id="4616" instrument_node="">If for whatever reason you </span><em data-dcnode-id="4614"><span data-dcnode-id="4615" instrument_node="">do </span></em><span data-dcnode-id="4613" instrument_node="">have issues with your guns, it’s nice to know that the manufacturer is going to look into the issue and treat your concerns as valid.&nbsp;</span></p><span data-dcnode-id="4611" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="4609"><img alt="" class="wp-image-45497" data-dcnode-id="4610" height="576" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2019/10/28.-M1A-Fired-in-Rocks-1024x576.jpg&amp;raw" srcset="https://www.pewpewtactical.com/wp-content/uploads/2019/10/28.-M1A-Fired-in-Rocks-1024x576.jpg 1024w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/28.-M1A-Fired-in-Rocks-300x169.jpg 300w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/28.-M1A-Fired-in-Rocks-768x432.jpg 768w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/28.-M1A-Fired-in-Rocks.jpg 1920w" width="1024"></figure><span data-dcnode-id="4608" instrument_node="">
</span><p data-dcnode-id="4606"><span data-dcnode-id="4607" instrument_node="">That being said, it’s certainly frustrating to present a gun review where the results are sort of inconclusive. </span></p><span data-dcnode-id="4605" instrument_node="">
</span><p data-dcnode-id="4601"><span data-dcnode-id="4604" instrument_node="">Are we just miserable with iron sights? Did the guns get banged up in shipping? Are the guns haunted? Was mercury in retrograde? </span><strong data-dcnode-id="4602"><span data-dcnode-id="4603" instrument_node="">We may never know. </span></strong></p><span data-dcnode-id="4600" instrument_node="">
</span><p data-dcnode-id="4598"><span data-dcnode-id="4599" instrument_node="">As for the rifles themselves – they certainly have their niche. Guns that are a nod to the past are definitely a blast to own and shoot, and if you’re considering purchasing an M1A, we’d imagine it’s likely because you have some sort of sentimental or historical interest in the rifle –&nbsp;not because you’re looking for something that’s going to outperform an AR-10.</span></p><span data-dcnode-id="4597" instrument_node="">
</span><p data-dcnode-id="4595"><span data-dcnode-id="4596" instrument_node="">Additionally, most models of the M1A are naturally featureless if that’s a concern for you, although it certainly would have been fun to play with some of the wilder EBR style chassis.&nbsp;</span></p><span data-dcnode-id="4594" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="4592"><img alt="" class="wp-image-45498" data-dcnode-id="4593" height="576" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2019/10/30.-M1A-Crouched-Shooting-1024x576.jpg&amp;raw" srcset="https://www.pewpewtactical.com/wp-content/uploads/2019/10/30.-M1A-Crouched-Shooting-1024x576.jpg 1024w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/30.-M1A-Crouched-Shooting-300x169.jpg 300w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/30.-M1A-Crouched-Shooting-768x432.jpg 768w, https://www.pewpewtactical.com/wp-content/uploads/2019/10/30.-M1A-Crouched-Shooting.jpg 1920w" width="1024"></figure><span data-dcnode-id="4591" instrument_node="">
</span><p data-dcnode-id="4589"><span data-dcnode-id="4590" instrument_node="">That being said, the M1A is still a blast if you want a big, chunky battle rifle with ties back to the iconic M14 – though we’d certainly still recommend finding a way to try one out before you buy it just to make sure you know what exactly you’re getting yourself into.</span></p><span data-dcnode-id="4588" instrument_node="">
</span><p data-dcnode-id="4573"><strong data-dcnode-id="4574"><span data-dcnode-id="4587" instrument_node="">Let us know what you think of the M1A and how it went all wonky for us. If you’re committed to the M1A, you can check out the list of </span><a data-dcnode-id="4585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/best-springfield-armory-m1a-models" target="_blank"><span data-dcnode-id="4586" instrument_node="">Best Models</span></a><span data-dcnode-id="4584" instrument_node="">. And check out the </span><a data-dcnode-id="4582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/best-308-ammo/" label="Best .308 Ammo (opens in a new tab)" target="_blank"><span data-dcnode-id="4583" instrument_node="">Best .308 Ammo</span></a><span data-dcnode-id="4581" instrument_node="">, </span><a data-dcnode-id="4579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/best-ar-10s/" label="Best AR-10s (opens in a new tab)" target="_blank"><span data-dcnode-id="4580" instrument_node="">Best AR-10s</span></a><span data-dcnode-id="4578" instrument_node="">, and </span><a data-dcnode-id="4576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/best-308-762-semi-auto-rifles/" label="Best 7.62x51 Battle Rifles (opens in a new tab)" target="_blank"><span data-dcnode-id="4577" instrument_node="">Best 7.62×51 Battle Rifles</span></a><span data-dcnode-id="4575" instrument_node="">.</span></strong></p><span data-dcnode-id="4572" instrument_node="">

</span><p data-dcnode-id="3236"><span data-dcnode-id="3253" instrument_node="">Interesting review and a bummer about your results. I'd be disappointed too if I had those results.</span><br data-dcnode-id="3252"><span data-dcnode-id="3251" instrument_node="">
</span><br data-dcnode-id="3250"><span data-dcnode-id="3249" instrument_node="">
I am no sniper and I don't get to go out to the range much. I have a M1A Loaded that I bought used. Admittedly, my first experiences shooting it were not great. I am a skinny guy and I found out that a 308 rocks me back some. I have trouble shooting off a bench with it.</span><br data-dcnode-id="3248"><span data-dcnode-id="3247" instrument_node="">
</span><br data-dcnode-id="3246"><span data-dcnode-id="3245" instrument_node="">
I did make some modifications to it to improve accuracy. Nothing that involved extensive gunsmithing or modifications. Most of the stuff I did was learned from Youtube videos and the M14 Forum online. It just took me a while to find time to work on it.</span><br data-dcnode-id="3244"><span data-dcnode-id="3243" instrument_node="">
</span><br data-dcnode-id="3242"><span data-dcnode-id="3241" instrument_node="">
Next, I had to adjust my shooting style. I found I shoot it best while prone. I have to line my whole body behind the recoil for best results. I originally shot it using an ammo box with a piece of carpet for a front rest. This rifle does not like resting "hard-on-hard". I eventually started using a bipod. it did not take too much work to get a group about 1.25 inches at 100 yards.</span><br data-dcnode-id="3240"><span data-dcnode-id="3239" instrument_node="">
</span><br data-dcnode-id="3238"><span data-dcnode-id="3237" instrument_node="">
I still wonder what is going on with the rifles you reviewed. It's possible for any company to turn ot a lemon. But Springfield did respond to your inquiries. Like I said, I am no expert marksman by any means so I am not sure what happened. This one is a headscratcher.</span></p><span data-dcnode-id="3235" instrument_node="">

</span><p data-dcnode-id="3207"><span data-dcnode-id="3208" instrument_node="">Hi John, thanks for the review. I own an M1A Scout and had a totally different experience. My first real prolonged exposure to shooting was in the military, so I basically grew up on the AR platform. That being said, we used the M14 for drill and ceremony purposes and I had a desire to purchase one. I have to say I absolutely love my M1A Scout. The ergonomics of the rifle design suit me better I guess. It just feels good to me, and I find that I actually get a more consistent sight picture with the M1A than I do with ARs. Shooting iron sights I had no issues getting tight shot groups at both 100 and 200 yards. I later purchased a relatively inexpensive scout long eye relief scope from UTG. The rifle has proven to be a tack driver, making me look like a better shooter than I am. I also love the fact that the M1A is much less finicky with maintenance. This rifle actually likes to fire dirty, whereas you can't really say the same for an AR. I can't really pinpoint why we would have such differences in experience except to say that sometimes you just get used to a certain platform. The only complaint I have with the M1A is that I agree with you that the safety is very stiff and can be somewhat counter-intuitive, particularly if you have trained in CQB/MOUT shooting where you need to rapidly go from safe-to fire-to safe again. I would actually prefer a selector switch similar to the AR platform for that sole feature. Otherwise I actually prefer my M1A to my ARs. Just my experience and preference at this point.</span></p><span data-dcnode-id="3206" instrument_node="">

</span><img alt="Commenter Avatar" class="comment-avatar" data-dcnode-id="2887" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gravatar.com/avatar/92054f2604cd401fc81c5bb311bd704d%3Fd%3Dretro%26s%3D90&amp;raw"><span data-dcnode-id="2886" instrument_node="">
</span></div><span data-dcnode-id="2884" instrument_node="">
</span><div class="col-10 col-md-11" data-dcnode-id="2867"><span data-dcnode-id="2883" instrument_node="">
</span><div class="comment-author" data-dcnode-id="2881"><span data-dcnode-id="2882" instrument_node="">Chris</span></div><span data-dcnode-id="2880" instrument_node="">
</span><p data-dcnode-id="2878"><span data-dcnode-id="2879" instrument_node="">It is very likely your shooter not being familiar with the weapon system that got you the results that you achieved. I purchased a SOCOM 16 in 2010 and my first outing with it, I found the sights hardly needed to be adjusted. I regularly saw slightly over 1 MOA with iron sights and probably 1 MOA with an ACOG at distances less than 300 meters, probably 3-3.5 MOA out to 600 meters with 147 grain federal fmj, and I could get back down to that 1.5 MOA range with 168 blackhills. With practice, reloads can be just as fast as AR.....one thing I would like to mention, when I went through Marine Corps boot camp and infantry school, we were doing reloads with the shooting hand, and not the offhand. When you use the m14 platforms, as well as AK’s, you will find that there is a more natural use of controls using your shooting hand for everything. With the AR platform, I find I can keep magazines on my left and right side and reload with off or shooting hands very quickly, with using using just one.</span></p><span data-dcnode-id="2877" instrument_node="">

</span><p data-dcnode-id="2849"><span data-dcnode-id="2850" instrument_node="">I have a M1A National Match in 6.5 Creedmoor. I have to say my results are very different than yours. Out of the box I've found the weapon to be very accurate with iron sights. The looks are seconds to none. The feel is amazing. The fit and finish are great. I'll give it that inserting a magazine requires a little practice. Even a little wonky compared to my Smith &amp; Wesson M&amp;P 15, but shooting it is a hell of a lot more fun!</span></p><span data-dcnode-id="2848" instrument_node="">

</span><div class="comment-author" data-dcnode-id="2823"><span data-dcnode-id="2824" instrument_node="">Skabo</span></div><span data-dcnode-id="2822" instrument_node="">
</span><p data-dcnode-id="2820"><span data-dcnode-id="2821" instrument_node="">Thanks so much for doing this review. I have a standard m1a and love it. It shoots very reliably and I love the looks and history. The piece that always nagged at me is that it has never shot as accurately as I thought it should. I was worried there was something wrong with mine, but not enough to try to do anything about it. The results you were getting were similar to mine, but a bit worse. I think now what I’m seeing is more like an average typical Springfield m1a. My accuracy comparison is to a 30-30 lever gun and an sks both with iron sights at 100yds. One thing that might be useful for folks is that I found certain bullet weights to be more consistent than others. Mine really seems to like 147 grain PMC xtac. Also, it seems to be more consistent once it warms up. From cold to warm it seems to move a bit.</span></p><span data-dcnode-id="2819" instrument_node="">

</span><img alt="Commenter Avatar" class="comment-avatar" data-dcnode-id="2800" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gravatar.com/avatar/c1d49d6c65d12e7a947ab9c72bf2e6a3%3Fd%3Dretro%26s%3D90&amp;raw"><span data-dcnode-id="2799" instrument_node="">

</span><div class="comment-author" data-dcnode-id="2794"><span data-dcnode-id="2795" instrument_node="">Mike Henry</span></div><span data-dcnode-id="2793" instrument_node="">
</span><p data-dcnode-id="2791"><span data-dcnode-id="2792" instrument_node="">Hate to pick out just one thing...but this "ergonomics" thing...some people are Glock Fanatics, some are AR/M4 lovers...me not so much. But I am left handed. Maybe that makes a difference. The AR's charging handle is the most mis-placed of any in the firearms world. It cannot be operated from the shoulder at all. It is impossible to operate in a straight-line motion, without side loading the handle, with a scope that overhangs the handle. Also, and this surprised me more than anything you wrote...why...WHY would anyone want to disengage the safety WITHOUT putting their finger near the trigger? An AR with an ambi-safety (I am left handed) rubs my thumb/finger junction when I fire the weapon. The M1A's is perfection. Ready to fire? Finger in the trigger guard...push forward, safety is off...pull finger back and fire. Why have the safety where you have to move the safety off before finding the trigger? Think what (aside from reliability) made the Glock so attractive to police, military, etc. The safety was inside the trigger guard. Actually, on the trigger itself. How neat is that!?!?! So, the safety being operated from inside the trigger guard is not "dated" or inconvenient. It is exactly where it needs to be. So-called "modern technique" keeps the finger off the trigger until ready to fire...so what is wrong with having the safety in the same locale as the trigger? It worked for Glock, and most every modern hand gun manufacturer. Me-thinks you are an AR snob. Just sayin'.</span></p><span data-dcnode-id="2790" instrument_node="">

</span><div class="comment-author" data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node="">William Kuykendall</span></div><span data-dcnode-id="2732" instrument_node="">
</span><p data-dcnode-id="2728"><span data-dcnode-id="2731" instrument_node="">I totally enjoy your video on this every time I see it! </span><br data-dcnode-id="2730"><span data-dcnode-id="2729" instrument_node="">
The first time I was exposed to the M1A was when I qualified with it in Guam with the Marines back in 1980 or so. It was a semi-auto and had no full auto switch on it. I was on a sub so we had to know the .45, .12 gage and M1A. You had to be a torpedoman to play with full auto-anything. (Lucky bastids) As a kid from Texas this was a day doing one of my favorite things with a new rifle thrown in to boot. I don't remember the number of rounds fired for qualification but I'd fulfilled all my points before I was half way through so the rest was gravy. My friend pulling targets down in the pits said the Marine Sargent supervising and making sure no one's head became a desirable target asked if I was using a scope because my groups were so close. This was a 100 meter range so it was a little over 100 yards and, in all fairness, I had done some competitive shooting but only in small bore. The rifles were well cared for and I'm sure there was no "new" on any of the barrels but I told the guy assisting me right then an there that "I have GOT to get me one of these!!" Needless to say the Marines don't like it when Navy guys out shoot them. I have my Garand and it does need a buddy but I've not sprung for one yet. (Beware of the scammers on Craig's List!) Your video makes it just that much more of a thing to do one of these days!</span></p><span data-dcnode-id="2727" instrument_node="">

</span><img alt="Commenter Avatar" class="comment-avatar" data-dcnode-id="2708" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gravatar.com/avatar/d47d366fcf9f5278fdb99357cbb315d3%3Fd%3Dretro%26s%3D90&amp;raw"><span data-dcnode-id="2707" instrument_node="">

</span><img alt="Commenter Avatar" class="comment-avatar" data-dcnode-id="2679" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gravatar.com/avatar/e59afaadea3d152bf3214b0d30232eb6%3Fd%3Dretro%26s%3D90&amp;raw"><span data-dcnode-id="2678" instrument_node="">

</span><div class="comment-author" data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">Lloyd S Smith</span></div><span data-dcnode-id="2672" instrument_node="">
</span><p data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">I did enjoy the review on the M1A and this little short-barreled partner. Your review was very accurate been there done that. I've been playing with blinkers my whole life to include 23 years in the military. My love affair with a 308 as lasted my lifetime. But I have experienced the same thing as you have, are beautiful rifles and sexy as hell just not something I need around my house. I've shot and loaded 308 most of my life and I kind of know what works. If somebody wants a 308 battle rifle I always recommend just go buy a AR 10 and be done with it. I have one and loved it along with my 700. There are probably at least eight maybe 10 calibers that may outperform a 308 none of them are very interesting to me and I really don't like hearing about all the new stuff. I know what works for me and has my whole life. Interesting though, I've had a c308 laying around my closet for 2 years and really didn't like it even though I hadn't fired it. the pandemic hit and I need is something to keep my mind off so I tore it completely apart rebuilt it and made it something I don't know whether to call it a G3 or let's just call it Smitty's 308. Would love to send you a photo of it and I keep records of all my targets. I'm certain I made some changes that nobody has on a c308. Turned out the way a s*** ton more than it started off as even though it's shorter than it was. Wonderful rifle gives me lots of headaches on my reloading if I was more into people knowing or I lived and who I was I do a video on it myself but I try to stay to myself. Enjoy your review it was very accurate good job</span></p><span data-dcnode-id="2669" instrument_node="">
