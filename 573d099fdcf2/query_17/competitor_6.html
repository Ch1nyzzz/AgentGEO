</span></p><p data-dcnode-id="7726"><span data-dcnode-id="7743" instrument_node="">On 4 March following an emergency meeting of Foreign Ministers in Brussels, Stoltenberg rejected Zelenskyy's request to impose a </span><a data-dcnode-id="7741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/No-fly_zone" title="No-fly zone"><span data-dcnode-id="7742" instrument_node="">no-fly zone</span></a><span data-dcnode-id="7740" instrument_node=""> over the country, stating that it might lead to a full-fledged war between the Alliance and Russia, and he declined to involve NATO, saying: "We are not part of this conflict." US Secretary of State </span><a data-dcnode-id="7738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antony_Blinken" title="Antony Blinken"><span data-dcnode-id="7739" instrument_node="">Antony Blinken</span></a><span data-dcnode-id="7737" instrument_node=""> said the Alliance was "doing everything we can to give the Ukrainian people the means to defend themselves against Russia... Unless the Kremlin changes course, it will continue down the road of increasing isolation and economic pain." The EU's </span><a data-dcnode-id="7735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/High_Representative_of_the_Union_for_Foreign_Affairs_and_Security_Policy" title="High Representative of the Union for Foreign Affairs and Security Policy"><span data-dcnode-id="7736" instrument_node="">High Representative of the Union for Foreign Affairs and Security Policy</span></a><span data-dcnode-id="7734" instrument_node=""> </span><a data-dcnode-id="7732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Josep_Borrell" title="Josep Borrell"><span data-dcnode-id="7733" instrument_node="">Josep Borrell</span></a><span data-dcnode-id="7731" instrument_node=""> maintained "It’s Putin’s war, and only Putin can end it." Zelenskyy, incensed, replied:</span><sup class="reference" data-dcnode-id="7728" id="cite_ref-srnofly_140-0"><a data-dcnode-id="7729" href="#cite_note-srnofly-140"><span data-dcnode-id="7730" instrument_node="">[137]</span></a></sup><span data-dcnode-id="7727" instrument_node="">
</span></p><span data-dcnode-id="7725" instrument_node="">
</span><link data-dcnode-id="7724" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="7721"><p data-dcnode-id="7722"><span data-dcnode-id="7723" instrument_node="">"Today there was a NATO summit, a weak summit, a confused summit, a summit where it was clear that not everyone considers the battle for Europe's freedom to be the number one goal... Today, the leadership of the alliance gave the green light for further bombing of Ukrainian cities and villages, having refused to set up a no-fly zone.</span></p></blockquote><span data-dcnode-id="7720" instrument_node="">
</span><p data-dcnode-id="7711"><span data-dcnode-id="7719" instrument_node="">On 6 March Blinken raised the possibility of a three-way exchange between Poland, Ukraine and the US that would see Ukraine pilots fly Polish Mig-29s from a US airfield; in exchange for the Soviet-era jets Poland would receive used </span><a class="mw-redirect" data-dcnode-id="7717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/F-16" title="F-16"><span data-dcnode-id="7718" instrument_node="">F-16s</span></a><span data-dcnode-id="7716" instrument_node=""> from the USAF.</span><sup class="reference" data-dcnode-id="7713" id="cite_ref-f16m29_141-0"><a data-dcnode-id="7714" href="#cite_note-f16m29-141"><span data-dcnode-id="7715" instrument_node="">[138]</span></a></sup><span data-dcnode-id="7712" instrument_node="">
</span></p><p data-dcnode-id="7665"><span data-dcnode-id="7710" instrument_node="">On 8 March Poland offered to donate 28 </span><a class="mw-redirect" data-dcnode-id="7708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/MiG-29" title="MiG-29"><span data-dcnode-id="7709" instrument_node="">MiG-29</span></a><span data-dcnode-id="7707" instrument_node=""> fighter jets to Ukraine, "ready to deploy – immediately and free of charge – all their MiG-29 jets to the </span><a class="mw-redirect" data-dcnode-id="7705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ramstein_airbase" title="Ramstein airbase"><span data-dcnode-id="7706" instrument_node="">Ramstein airbase</span></a><span data-dcnode-id="7704" instrument_node="">" under US control in Germany.</span><sup class="reference" data-dcnode-id="7701" id="cite_ref-gnmm29_142-0"><a data-dcnode-id="7702" href="#cite_note-gnmm29-142"><span data-dcnode-id="7703" instrument_node="">[139]</span></a></sup><sup class="reference" data-dcnode-id="7698" id="cite_ref-wapom29_143-0"><a data-dcnode-id="7699" href="#cite_note-wapom29-143"><span data-dcnode-id="7700" instrument_node="">[140]</span></a></sup><span data-dcnode-id="7697" instrument_node=""> Press Secretary for the US </span><a class="mw-redirect" data-dcnode-id="7695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Department_of_Defense" title="Department of Defense"><span data-dcnode-id="7696" instrument_node="">Department of Defense</span></a><span data-dcnode-id="7694" instrument_node=""> </span><a data-dcnode-id="7692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Kirby_%28admiral%29" title="John Kirby (admiral)"><span data-dcnode-id="7693" instrument_node="">John Kirby</span></a><span data-dcnode-id="7691" instrument_node=""> rejected the surprise announcement, and said "we do not believe Poland’s proposal is a tenable one". The next day he said the US would oppose any such plan for NATO nations, and termed the idea "high-risk",</span><sup class="reference" data-dcnode-id="7688" id="cite_ref-f24m29_144-0"><a data-dcnode-id="7689" href="#cite_note-f24m29-144"><span data-dcnode-id="7690" instrument_node="">[141]</span></a></sup><span data-dcnode-id="7687" instrument_node=""> because it brought into question NATO's "co-combatant" status.</span><sup class="reference" data-dcnode-id="7684" id="cite_ref-nytm29_145-0"><a data-dcnode-id="7685" href="#cite_note-nytm29-145"><span data-dcnode-id="7686" instrument_node="">[142]</span></a></sup><span data-dcnode-id="7683" instrument_node=""> The idea was quickly shot down by </span><a data-dcnode-id="7681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antony_Blinken" title="Antony Blinken"><span data-dcnode-id="7682" instrument_node="">Antony Blinken</span></a><span data-dcnode-id="7680" instrument_node=""> and </span><a data-dcnode-id="7678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lloyd_Austin" title="Lloyd Austin"><span data-dcnode-id="7679" instrument_node="">Lloyd Austin</span></a><span data-dcnode-id="7677" instrument_node="">.</span><sup class="reference" data-dcnode-id="7674" id="cite_ref-nytm29_145-1"><a data-dcnode-id="7675" href="#cite_note-nytm29-145"><span data-dcnode-id="7676" instrument_node="">[142]</span></a></sup><span data-dcnode-id="7673" instrument_node=""> The </span><a data-dcnode-id="7671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mateusz_Morawiecki" title="Mateusz Morawiecki"><span data-dcnode-id="7672" instrument_node="">Polish Prime Minister</span></a><span data-dcnode-id="7670" instrument_node=""> said on 9 March that any decision about delivering offensive weapons must be made unanimously by NATO members.</span><sup class="reference" data-dcnode-id="7667" id="cite_ref-f24m29_144-1"><a data-dcnode-id="7668" href="#cite_note-f24m29-144"><span data-dcnode-id="7669" instrument_node="">[141]</span></a></sup><span data-dcnode-id="7666" instrument_node="">
</span></p><p data-dcnode-id="7653"><span data-dcnode-id="7664" instrument_node="">Also on 9 March, Zelenskyy's plea was reinforced by </span><a class="mw-redirect" data-dcnode-id="7662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Azov_battalion" title="Azov battalion"><span data-dcnode-id="7663" instrument_node="">Azov battalion</span></a><span data-dcnode-id="7661" instrument_node=""> Major Denis Prokopenko, who was tasked with the defense of </span><a data-dcnode-id="7659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mariupol" title="Mariupol"><span data-dcnode-id="7660" instrument_node="">Mariupol</span></a><span data-dcnode-id="7658" instrument_node="">: "If a no-fly zone over Ukraine is not provided soon we will not be able to manage the supply of water and food, medicine, as well as to evacuate people safely."</span><sup class="reference" data-dcnode-id="7655" id="cite_ref-vhnyt_146-0"><a data-dcnode-id="7656" href="#cite_note-vhnyt-146"><span data-dcnode-id="7657" instrument_node="">[143]</span></a></sup><span data-dcnode-id="7654" instrument_node="">
</span></p><p data-dcnode-id="7641"><span data-dcnode-id="7652" instrument_node="">At a press conference on 11 March, Stoltenberg was quoted: "President Putin’s war on Ukraine has shattered peace in Europe. It has shaken the international order. And it continues to take a devastating toll on the Ukrainian people. But Putin seriously underestimated Ukraine. And he seriously underestimated the strength and unity of NATO, and of our friends and partners around the world." At the same press conference, the </span><a data-dcnode-id="7650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prime_Minister_of_Canada" title="Prime Minister of Canada"><span data-dcnode-id="7651" instrument_node="">Prime Minister of Canada</span></a><span data-dcnode-id="7649" instrument_node=""> </span><a data-dcnode-id="7647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Justin_Trudeau" title="Justin Trudeau"><span data-dcnode-id="7648" instrument_node="">Justin Trudeau</span></a><span data-dcnode-id="7646" instrument_node=""> said that "Putin made a fundamental miscalculation. He thought Ukraine was weak, and he thought NATO was divided. He has been shown how wrong he is."</span><sup class="reference" data-dcnode-id="7643" id="cite_ref-jsjt_147-0"><a data-dcnode-id="7644" href="#cite_note-jsjt-147"><span data-dcnode-id="7645" instrument_node="">[144]</span></a></sup><span data-dcnode-id="7642" instrument_node="">
</span></p><p data-dcnode-id="7635"><span data-dcnode-id="7640" instrument_node="">On 24 March, the 30 NATO Heads of State held a meeting in Brussels and one result was a statement, which read in part:</span><sup class="reference" data-dcnode-id="7637" id="cite_ref-hoss_148-0"><a data-dcnode-id="7638" href="#cite_note-hoss-148"><span data-dcnode-id="7639" instrument_node="">[145]</span></a></sup><span data-dcnode-id="7636" instrument_node="">
</span></p><span data-dcnode-id="7634" instrument_node="">
</span><link data-dcnode-id="7633" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="7624"><p data-dcnode-id="7625"><span data-dcnode-id="7632" instrument_node="">Massive sanctions and heavy political costs have been imposed on Russia to bring an end to this war. We remain determined to maintain coordinated international pressure on Russia... We remain committed to the foundational principles underpinning European and global security, including that each nation has the right to choose its own security arrangements free from outside interference. We reaffirm our commitment to </span><a class="mw-redirect" data-dcnode-id="7630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO%2527s_Open_Door_Policy" title="NATO's Open Door Policy"><span data-dcnode-id="7631" instrument_node="">NATO's Open Door Policy</span></a><span data-dcnode-id="7629" instrument_node=""> under Article 10 of the </span><a data-dcnode-id="7627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Atlantic_Treaty" title="North Atlantic Treaty"><span data-dcnode-id="7628" instrument_node="">Washington Treaty</span></a><span data-dcnode-id="7626" instrument_node="">... We will continue to take all necessary steps to protect and defend the security of our Allied populations and every inch of Allied territory... We are also establishing four additional multinational battlegroups in Bulgaria, Hungary, Romania, and Slovakia... President Putin's choice to attack Ukraine is a strategic mistake, with grave consequences also for Russia and the Russian people.</span></p></blockquote><span data-dcnode-id="7623" instrument_node="">
</span><p data-dcnode-id="7614"><span data-dcnode-id="7622" instrument_node="">On 25 March, Stoltenberg was interviewed by </span><i data-dcnode-id="7620"><span data-dcnode-id="7621" instrument_node="">Euronews</span></i><span data-dcnode-id="7619" instrument_node="">. He spoke of the Alliance doing "as much as they can" to support Ukraine, chiefly "with advanced anti-tank weapons, air defence systems" and with "financial support, humanitarian support, but also military support".</span><sup class="reference" data-dcnode-id="7616" id="cite_ref-mcmaen_149-0"><a data-dcnode-id="7617" href="#cite_note-mcmaen-149"><span data-dcnode-id="7618" instrument_node="">[146]</span></a></sup><span data-dcnode-id="7615" instrument_node="">
</span></p><span data-dcnode-id="7613" instrument_node="">
</span><h2 data-dcnode-id="7603"><span class="mw-headline" data-dcnode-id="7611" id="Popular_opinion_in_Ukraine"><span data-dcnode-id="7612" instrument_node="">Popular opinion in Ukraine</span></span><span class="mw-editsection" data-dcnode-id="7604"><span class="mw-editsection-bracket" data-dcnode-id="7609"><span data-dcnode-id="7610" instrument_node="">[</span></span><a data-dcnode-id="7607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUkraine%25E2%2580%2593NATO_relations%26action%3Dedit%26section%3D11" title="Edit section: Popular opinion in Ukraine"><span data-dcnode-id="7608" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7605"><span data-dcnode-id="7606" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7602" instrument_node="">

</span><p data-dcnode-id="6762"><a data-dcnode-id="6774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Ukraine" title="Western Ukraine"><span data-dcnode-id="6775" instrument_node="">Western Ukraine</span></a><span data-dcnode-id="6773" instrument_node=""> has always been significantly more pro-NATO than the rest of the country.</span><sup class="reference" data-dcnode-id="6770" id="cite_ref-179"><a data-dcnode-id="6771" href="#cite_note-179"><span data-dcnode-id="6772" instrument_node="">[176]</span></a></sup><sup class="reference" data-dcnode-id="6767" id="cite_ref-RatingJuly12_156-3"><a data-dcnode-id="6768" href="#cite_note-RatingJuly12-156"><span data-dcnode-id="6769" instrument_node="">[153]</span></a></sup><sup class="reference" data-dcnode-id="6764" id="cite_ref-Nato_support_180-0"><a data-dcnode-id="6765" href="#cite_note-Nato_support-180"><span data-dcnode-id="6766" instrument_node="">[177]</span></a></sup><span data-dcnode-id="6763" instrument_node="">
</span></p><p data-dcnode-id="6751"><a data-dcnode-id="6760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Ukraine" title="Eastern Ukraine"><span data-dcnode-id="6761" instrument_node="">Eastern Ukraine</span></a><span data-dcnode-id="6759" instrument_node=""> is far more anti-NATO and pro-Russia than the rest of Ukraine.</span><sup class="reference" data-dcnode-id="6756" id="cite_ref-Nato_support_180-1"><a data-dcnode-id="6757" href="#cite_note-Nato_support-180"><span data-dcnode-id="6758" instrument_node="">[177]</span></a></sup><sup class="reference" data-dcnode-id="6753" id="cite_ref-GallupMarch_14,_2014_181-0"><a data-dcnode-id="6754" href="#cite_note-GallupMarch_14,_2014-181"><span data-dcnode-id="6755" instrument_node="">[178]</span></a></sup><span data-dcnode-id="6752" instrument_node="">
</span></p><p data-dcnode-id="6717"><span data-dcnode-id="6750" instrument_node="">A </span><a class="mw-redirect" data-dcnode-id="6748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gallup_poll" title="Gallup poll"><span data-dcnode-id="6749" instrument_node="">Gallup poll</span></a><span data-dcnode-id="6747" instrument_node=""> conducted in October 2008 showed that 43% of Ukrainians associated NATO as a threat to their country, while only 15% associated it with protection.</span><sup class="reference" data-dcnode-id="6744" id="cite_ref-182"><a data-dcnode-id="6745" href="#cite_note-182"><span data-dcnode-id="6746" instrument_node="">[179]</span></a></sup><span data-dcnode-id="6743" instrument_node=""> A November 2009 poll by Ukrainian Project System relieved 40.1% of Ukrainians polled said the </span><a data-dcnode-id="6741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Collective_Security_Treaty_Organization" title="Collective Security Treaty Organization"><span data-dcnode-id="6742" instrument_node="">Collective Security Treaty Organization</span></a><span data-dcnode-id="6740" instrument_node=""> (CSTO) was the best global security group for Ukraine to be a part of and 33.9% of the respondents supported Ukraine's full membership in CSTO; more than 36% of the respondents of the poll said that Ukraine should remain neutral and only 12.5% supported Ukraine's accession to NATO.</span><sup class="reference" data-dcnode-id="6737" id="cite_ref-Ukrainian_Project_System_poll_26_November_2009_183-0"><a data-dcnode-id="6738" href="#cite_note-Ukrainian_Project_System_poll_26_November_2009-183"><span data-dcnode-id="6739" instrument_node="">[180]</span></a></sup><span data-dcnode-id="6736" instrument_node=""> A 2009 Gallup poll showed that 40% of Ukrainian adults associate NATO with "Threat" and 17% with "Protection".</span><sup class="reference" data-dcnode-id="6733" id="cite_ref-Gallup52010_19-1"><a data-dcnode-id="6734" href="#cite_note-Gallup52010-19"><span data-dcnode-id="6735" instrument_node="">[19]</span></a></sup><span data-dcnode-id="6732" instrument_node=""> According to a poll by </span><a class="mw-redirect" data-dcnode-id="6730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Razumkov_Center" title="Razumkov Center"><span data-dcnode-id="6731" instrument_node="">Razumkov Center</span></a><span data-dcnode-id="6729" instrument_node=""> in March 2011 20.6% on average across Ukraine considered NATO a threat; this number was 51% in </span><a data-dcnode-id="6727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crimea" title="Crimea"><span data-dcnode-id="6728" instrument_node="">Crimea</span></a><span data-dcnode-id="6726" instrument_node="">.</span><sup class="reference" data-dcnode-id="6723" id="cite_ref-IamUkie_184-0"><a data-dcnode-id="6724" href="#cite_note-IamUkie-184"><span data-dcnode-id="6725" instrument_node="">[181]</span></a></sup><span data-dcnode-id="6722" instrument_node=""> A 2013 Gallup poll showed that 29% associated NATO with "Threat" and 17% with "Protection"; 44% viewed it as neither.</span><sup class="reference" data-dcnode-id="6719" id="cite_ref-GallupMarch_14,_2014_181-1"><a data-dcnode-id="6720" href="#cite_note-GallupMarch_14,_2014-181"><span data-dcnode-id="6721" instrument_node="">[178]</span></a></sup><span data-dcnode-id="6718" instrument_node="">
</span></p><p data-dcnode-id="6693"><span data-dcnode-id="6716" instrument_node="">Following the </span><a class="mw-redirect" data-dcnode-id="6714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_military_intervention_in_Ukraine_%282014%25E2%2580%2593present%29" title="Russian military intervention in Ukraine (2014–present)"><span data-dcnode-id="6715" instrument_node="">Russian military intervention of 2014</span></a><span data-dcnode-id="6713" instrument_node="">, </span><a data-dcnode-id="6711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Annexation_of_Crimea_by_the_Russian_Federation" title="Annexation of Crimea by the Russian Federation"><span data-dcnode-id="6712" instrument_node="">annexation of Crimea</span></a><span data-dcnode-id="6710" instrument_node=""> and the start of the </span><a class="mw-redirect" data-dcnode-id="6708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Donbass_War" title="Donbass War"><span data-dcnode-id="6709" instrument_node="">Donbass War</span></a><span data-dcnode-id="6707" instrument_node="">, many Ukrainians changed their views of NATO: polls from the middle of 2014 until 2016 showed that the majority of Ukrainians supported NATO membership.</span><sup class="reference" data-dcnode-id="6704" id="cite_ref-BsfNOTAaWiDa_20-2"><a data-dcnode-id="6705" href="#cite_note-BsfNOTAaWiDa-20"><span data-dcnode-id="6706" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="6701" id="cite_ref-BsfNOTAaWiDb_21-2"><a data-dcnode-id="6702" href="#cite_note-BsfNOTAaWiDb-21"><span data-dcnode-id="6703" instrument_node="">[21]</span></a></sup><sup class="reference" data-dcnode-id="6698" id="cite_ref-PUNR4215_22-2"><a data-dcnode-id="6699" href="#cite_note-PUNR4215-22"><span data-dcnode-id="6700" instrument_node="">[22]</span></a></sup><sup class="reference" data-dcnode-id="6695" id="cite_ref-185"><a data-dcnode-id="6696" href="#cite_note-185"><span data-dcnode-id="6697" instrument_node="">[182]</span></a></sup><span data-dcnode-id="6694" instrument_node="">
</span></p><p data-dcnode-id="6677"><span data-dcnode-id="6692" instrument_node="">An electronic petition to the president of Ukraine Petro Poroshenko was filed on 29 August 2015</span><sup class="reference" data-dcnode-id="6689" id="cite_ref-186"><a data-dcnode-id="6690" href="#cite_note-186"><span data-dcnode-id="6691" instrument_node="">[183]</span></a></sup><span data-dcnode-id="6688" instrument_node=""> requesting that a referendum on joining NATO be conducted. The petition achieved the required 25,000 votes to be considered. The president's reply stated that "One of the main priorities of </span><a data-dcnode-id="6686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukraine" title="Ukraine"><span data-dcnode-id="6687" instrument_node="">Ukraine</span></a><span data-dcnode-id="6685" instrument_node="">'s foreign policy is to deepen cooperation with </span><a data-dcnode-id="6683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="6684" instrument_node="">NATO</span></a><span data-dcnode-id="6682" instrument_node=""> to achieve the criteria required for membership in this organization. Today, we carry out security sector reform in Ukraine to reach NATO standards and to strengthen the country's defense system, which is necessary to counter Russian aggression. Once Ukraine fulfills all the necessary criteria to join the Alliance, final decision on this important issue will be approved by the Ukrainian people in a referendum."</span><sup class="reference" data-dcnode-id="6679" id="cite_ref-187"><a data-dcnode-id="6680" href="#cite_note-187"><span data-dcnode-id="6681" instrument_node="">[184]</span></a></sup><span data-dcnode-id="6678" instrument_node="">
</span></p><p data-dcnode-id="6671"><span data-dcnode-id="6676" instrument_node="">In February 2017, President Poroshenko announced that a referendum would be held during his presidency, with polls showing that 54% of Ukrainians favor such a move.</span><sup class="reference" data-dcnode-id="6673" id="cite_ref-188"><a data-dcnode-id="6674" href="#cite_note-188"><span data-dcnode-id="6675" instrument_node="">[185]</span></a></sup><span data-dcnode-id="6672" instrument_node="">
</span></p><p data-dcnode-id="6650"><span data-dcnode-id="6670" instrument_node="">According to a sociological survey conducted by the Ukrainian Institute for the Future together with the sociological company New Image Marketing Group in January 2022, 64% of </span><a data-dcnode-id="6668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukrainians" title="Ukrainians"><span data-dcnode-id="6669" instrument_node="">Ukrainians</span></a><span data-dcnode-id="6667" instrument_node=""> support Ukraine's accession to NATO, while 17% do not support it, 13% do not have an unequivocal opinion on this issue. In the </span><a data-dcnode-id="6665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Ukraine" title="Western Ukraine"><span data-dcnode-id="6666" instrument_node="">West of Ukraine</span></a><span data-dcnode-id="6664" instrument_node="">, in the city of </span><a data-dcnode-id="6662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kyiv" title="Kyiv"><span data-dcnode-id="6663" instrument_node="">Kyiv</span></a><span data-dcnode-id="6661" instrument_node=""> and in the </span><a data-dcnode-id="6659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Southern_Ukraine" title="Southern Ukraine"><span data-dcnode-id="6660" instrument_node="">South of Ukraine</span></a><span data-dcnode-id="6658" instrument_node="">, there were the most supporters of joining NATO – 73%, 71% and 59%. This idea is supported least of all in the </span><a data-dcnode-id="6656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Ukraine" title="Eastern Ukraine"><span data-dcnode-id="6657" instrument_node="">East of Ukraine</span></a><span data-dcnode-id="6655" instrument_node=""> – 47%.</span><sup class="reference" data-dcnode-id="6652" id="cite_ref-189"><a data-dcnode-id="6653" href="#cite_note-189"><span data-dcnode-id="6654" instrument_node="">[186]</span></a></sup><span data-dcnode-id="6651" instrument_node="">
</span></p><span data-dcnode-id="6649" instrument_node="">
</span><h2 data-dcnode-id="6639"><span class="mw-headline" data-dcnode-id="6647" id="Russian_opposition_to_Ukrainian_NATO_membership"><span data-dcnode-id="6648" instrument_node="">Russian opposition to Ukrainian NATO membership</span></span><span class="mw-editsection" data-dcnode-id="6640"><span class="mw-editsection-bracket" data-dcnode-id="6645"><span data-dcnode-id="6646" instrument_node="">[</span></span><a data-dcnode-id="6643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUkraine%25E2%2580%2593NATO_relations%26action%3Dedit%26section%3D12" title="Edit section: Russian opposition to Ukrainian NATO membership"><span data-dcnode-id="6644" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6641"><span data-dcnode-id="6642" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6638" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6587"><div class="thumbinner" data-dcnode-id="6588" style="width:302px;"><a class="image" data-dcnode-id="6636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANATO_enlargement.svg"><img alt="" class="thumbimage" data-dcnode-id="6637" data-file-height="691" data-file-width="897" decoding="async" height="231" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/91/NATO_enlargement.svg/300px-NATO_enlargement.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/91/NATO_enlargement.svg/450px-NATO_enlargement.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/91/NATO_enlargement.svg/600px-NATO_enlargement.svg.png 2x" width="300"></a><span data-dcnode-id="6635" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6589"><div class="magnify" data-dcnode-id="6633"><a class="internal" data-dcnode-id="6634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANATO_enlargement.svg" title="Enlarge"></a></div><div data-dcnode-id="6590"><span data-dcnode-id="6632" instrument_node=""> </span><span data-dcnode-id="6631" instrument_node=""> </span><span data-dcnode-id="6630" instrument_node=""> </span><span data-dcnode-id="6608" instrument_node=""> </span><table class="multicol" data-dcnode-id="6591" role="presentation" style="border-collapse: collapse; padding: 0; border: 0; background:transparent; width:100%;"><tbody data-dcnode-id="6592"><tr data-dcnode-id="6593"><td data-dcnode-id="6609" style="width: 50%;text-align: left; vertical-align: top;"><span data-dcnode-id="6629" instrument_node=""> </span><div class="legend" data-dcnode-id="6623"><span class="legend-color" data-dcnode-id="6625" style="background-color:darkblue; color:white;"><span data-dcnode-id="6626" instrument_node="">&nbsp;</span></span><span data-dcnode-id="6624" instrument_node="">&nbsp;NATO member countries</span></div><span data-dcnode-id="6622" instrument_node=""> </span><link data-dcnode-id="6621" href="mw-data:TemplateStyles:r981673959" rel="mw-deduplicated-inline-style"><div class="legend" data-dcnode-id="6617"><span class="legend-color" data-dcnode-id="6619" style="background-color:#2a7fff; color:black;"><span data-dcnode-id="6620" instrument_node="">&nbsp;</span></span><span data-dcnode-id="6618" instrument_node="">&nbsp;Countries in the process of accession</span></div><span data-dcnode-id="6616" instrument_node=""> </span><link data-dcnode-id="6615" href="mw-data:TemplateStyles:r981673959" rel="mw-deduplicated-inline-style"><div class="legend" data-dcnode-id="6611"><span class="legend-color" data-dcnode-id="6613" style="background-color:darkgreen; color:white;"><span data-dcnode-id="6614" instrument_node="">&nbsp;</span></span><span data-dcnode-id="6612" instrument_node="">&nbsp;Countries promised invitations</span></div><span data-dcnode-id="6610" instrument_node=""> </span></td><td data-dcnode-id="6594" style="width: 50%;text-align: left; vertical-align: top;"><span data-dcnode-id="6607" instrument_node=""> </span><link data-dcnode-id="6606" href="mw-data:TemplateStyles:r981673959" rel="mw-deduplicated-inline-style"><div class="legend" data-dcnode-id="6602"><span class="legend-color" data-dcnode-id="6604" style="background-color:#d40000; color:white;"><span data-dcnode-id="6605" instrument_node="">&nbsp;</span></span><span data-dcnode-id="6603" instrument_node="">&nbsp;Membership is not a goal</span></div><span data-dcnode-id="6601" instrument_node=""> </span><link data-dcnode-id="6600" href="mw-data:TemplateStyles:r981673959" rel="mw-deduplicated-inline-style"><div class="legend" data-dcnode-id="6596"><span class="legend-color" data-dcnode-id="6598" style="background-color:#918a6f; color:black;"><span data-dcnode-id="6599" instrument_node="">&nbsp;</span></span><span data-dcnode-id="6597" instrument_node="">&nbsp;Countries have not announced potential membership intentions</span></div><span data-dcnode-id="6595" instrument_node=""> </span></td></tr></tbody></table></div></div></div></div><span data-dcnode-id="6586" instrument_node="">
</span><p data-dcnode-id="6538"><span data-dcnode-id="6585" instrument_node="">Russia is strongly opposed to any eastward expansion of NATO.</span><sup class="reference" data-dcnode-id="6582" id="cite_ref-protest_190-0"><a data-dcnode-id="6583" href="#cite_note-protest-190"><span data-dcnode-id="6584" instrument_node="">[187]</span></a></sup><sup class="reference" data-dcnode-id="6579" id="cite_ref-191"><a data-dcnode-id="6580" href="#cite_note-191"><span data-dcnode-id="6581" instrument_node="">[188]</span></a></sup><span data-dcnode-id="6578" instrument_node=""> Past leaders such as Gorbachev and Yeltsin had both raised objections, the latter clashing publicly with the Clinton administration over the issue.</span><sup class="reference" data-dcnode-id="6575" id="cite_ref-192"><a data-dcnode-id="6576" href="#cite_note-192"><span data-dcnode-id="6577" instrument_node="">[189]</span></a></sup><span data-dcnode-id="6574" instrument_node=""> Nonetheless, the United States oversaw NATO's first round of expansion in 1999. A second wave including the Baltic states followed during the presidency of George W. Bush, who also supported the same idea for Georgia and Ukraine.</span><sup class="reference" data-dcnode-id="6571" id="cite_ref-193"><a data-dcnode-id="6572" href="#cite_note-193"><span data-dcnode-id="6573" instrument_node="">[190]</span></a></sup><span data-dcnode-id="6570" instrument_node=""> On 12 February 2008, then </span><a class="mw-redirect" data-dcnode-id="6568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_President" title="Russian President"><span data-dcnode-id="6569" instrument_node="">Russian President</span></a><span data-dcnode-id="6567" instrument_node=""> </span><a data-dcnode-id="6565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vladimir_Putin" title="Vladimir Putin"><span data-dcnode-id="6566" instrument_node="">Vladimir Putin</span></a><span data-dcnode-id="6564" instrument_node=""> said Russia may target its missiles at Ukraine if its neighbour joins NATO and accepts the deployment of a </span><a data-dcnode-id="6562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anti-ballistic_missile%23France%2C_Italy_and_United_Kingdom" title="Anti-ballistic missile"><span data-dcnode-id="6563" instrument_node="">US missile defence shield</span></a><span data-dcnode-id="6561" instrument_node="">.</span><sup class="reference" data-dcnode-id="6558" id="cite_ref-194"><a data-dcnode-id="6559" href="#cite_note-194"><span data-dcnode-id="6560" instrument_node="">[191]</span></a></sup><span data-dcnode-id="6557" instrument_node=""> Former </span><a class="mw-redirect" data-dcnode-id="6555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukrainian_President" title="Ukrainian President"><span data-dcnode-id="6556" instrument_node="">Ukrainian President</span></a><span data-dcnode-id="6554" instrument_node=""> </span><a data-dcnode-id="6552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Viktor_Yushchenko" title="Viktor Yushchenko"><span data-dcnode-id="6553" instrument_node="">Viktor Yushchenko</span></a><span data-dcnode-id="6551" instrument_node=""> has stated more than once his country would not allow foreign military bases on its territory;</span><sup class="reference" data-dcnode-id="6548" id="cite_ref-195"><a data-dcnode-id="6549" href="#cite_note-195"><span data-dcnode-id="6550" instrument_node="">[192]</span></a></sup><span data-dcnode-id="6547" instrument_node=""> as of December 2009, NATO was not planning to deploy military bases in Ukraine.</span><sup class="reference" data-dcnode-id="6544" id="cite_ref-196"><a data-dcnode-id="6545" href="#cite_note-196"><span data-dcnode-id="6546" instrument_node="">[193]</span></a></sup><span data-dcnode-id="6543" instrument_node=""> Along with Russia, China also strongly opposed to any eastward expansion of NATO.</span><sup class="reference" data-dcnode-id="6540" id="cite_ref-197"><a data-dcnode-id="6541" href="#cite_note-197"><span data-dcnode-id="6542" instrument_node="">[194]</span></a></sup><span data-dcnode-id="6539" instrument_node="">
</span></p><p data-dcnode-id="6524"><a data-dcnode-id="6536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prime_Minister_of_Russia" title="Prime Minister of Russia"><span data-dcnode-id="6537" instrument_node="">Prime Minister</span></a><span data-dcnode-id="6535" instrument_node=""> Putin reportedly declared at a NATO-Russia summit in 2008 that if Ukraine joined NATO his country could contend to annex the </span><a data-dcnode-id="6533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukraine" title="Ukraine"><span data-dcnode-id="6534" instrument_node="">Ukrainian East</span></a><span data-dcnode-id="6532" instrument_node=""> and </span><a data-dcnode-id="6530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crimea" title="Crimea"><span data-dcnode-id="6531" instrument_node="">Crimea</span></a><span data-dcnode-id="6529" instrument_node="">.</span><sup class="reference" data-dcnode-id="6526" id="cite_ref-198"><a data-dcnode-id="6527" href="#cite_note-198"><span data-dcnode-id="6528" instrument_node="">[195]</span></a></sup><span data-dcnode-id="6525" instrument_node="">
</span></p><p data-dcnode-id="6502"><span data-dcnode-id="6523" instrument_node="">During a NATO conference in </span><a class="mw-redirect" data-dcnode-id="6521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hungarian_Parliament" title="Hungarian Parliament"><span data-dcnode-id="6522" instrument_node="">Hungarian Parliament</span></a><span data-dcnode-id="6520" instrument_node=""> on 20 November 2008, Deputy Assistant Secretary-General Aurelia Bouchez said: "We should not make a choice between NATO enlargement and Russia as we need both"</span><sup class="reference" data-dcnode-id="6517" id="cite_ref-199"><a data-dcnode-id="6518" href="#cite_note-199"><span data-dcnode-id="6519" instrument_node="">[196]</span></a></sup><sup class="reference" data-dcnode-id="6514" id="cite_ref-200"><a data-dcnode-id="6515" href="#cite_note-200"><span data-dcnode-id="6516" instrument_node="">[197]</span></a></sup><span data-dcnode-id="6513" instrument_node=""> and </span><a data-dcnode-id="6511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Secretary_General_of_NATO" title="Secretary General of NATO"><span data-dcnode-id="6512" instrument_node="">NATO's Secretary General</span></a><span data-dcnode-id="6510" instrument_node="">, </span><a data-dcnode-id="6508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jaap_de_Hoop_Scheffer" title="Jaap de Hoop Scheffer"><span data-dcnode-id="6509" instrument_node="">Jaap de Hoop Scheffer</span></a><span data-dcnode-id="6507" instrument_node=""> told a conference in Spain twelve days later: "The emergence of independent states within the former Soviet space is a reality. The ability of these states to determine their own future is a litmus test for the new Europe. Do we have to choose between good relations with Russia and further enlargement? My answer is no – we will not choose, will not sacrifice one for the other. It would bring new dividing lines."</span><sup class="reference" data-dcnode-id="6504" id="cite_ref-201"><a data-dcnode-id="6505" href="#cite_note-201"><span data-dcnode-id="6506" instrument_node="">[198]</span></a></sup><span data-dcnode-id="6503" instrument_node="">
</span></p><p data-dcnode-id="6481"><span data-dcnode-id="6501" instrument_node="">In an interview with the </span><a data-dcnode-id="6499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/BBC" title="BBC"><span data-dcnode-id="6500" instrument_node="">BBC</span></a><span data-dcnode-id="6498" instrument_node=""> on 18 November 2014, Russian President Putin spokesmen </span><a data-dcnode-id="6496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dmitry_Peskov" title="Dmitry Peskov"><span data-dcnode-id="6497" instrument_node="">Dmitry Peskov</span></a><span data-dcnode-id="6495" instrument_node=""> called for "a 100% guarantee that no-one would think about Ukraine joining NATO"; 2 days later </span><a data-dcnode-id="6493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Secretary_General_of_NATO" title="Secretary General of NATO"><span data-dcnode-id="6494" instrument_node="">Secretary General of NATO</span></a><span data-dcnode-id="6492" instrument_node=""> </span><a data-dcnode-id="6490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jens_Stoltenberg" title="Jens Stoltenberg"><span data-dcnode-id="6491" instrument_node="">Jens Stoltenberg</span></a><span data-dcnode-id="6489" instrument_node=""> rejected this call stating it would be "violating the idea of respecting the sovereignty of Ukraine, which is a fundamental".</span><sup class="reference" data-dcnode-id="6486" id="cite_ref-202"><a data-dcnode-id="6487" href="#cite_note-202"><span data-dcnode-id="6488" instrument_node="">[199]</span></a></sup><sup class="reference" data-dcnode-id="6483" id="cite_ref-203"><a data-dcnode-id="6484" href="#cite_note-203"><span data-dcnode-id="6485" instrument_node="">[200]</span></a></sup><span data-dcnode-id="6482" instrument_node="">
</span></p><span data-dcnode-id="6480" instrument_node="">
</span><h3 data-dcnode-id="6469"><span data-dcnode-id="6479" id="Request_of_guarantees_of_Ukraine.27s_non-accession_to_NATO"></span><span class="mw-headline" data-dcnode-id="6477" id="Request_of_guarantees_of_Ukraine's_non-accession_to_NATO"><span data-dcnode-id="6478" instrument_node="">Request of guarantees of Ukraine's non-accession to NATO</span></span><span class="mw-editsection" data-dcnode-id="6470"><span class="mw-editsection-bracket" data-dcnode-id="6475"><span data-dcnode-id="6476" instrument_node="">[</span></span><a data-dcnode-id="6473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUkraine%25E2%2580%2593NATO_relations%26action%3Dedit%26section%3D13" title="Edit section: Request of guarantees of Ukraine's non-accession to NATO"><span data-dcnode-id="6474" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6471"><span data-dcnode-id="6472" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6468" instrument_node="">
</span><link data-dcnode-id="6467" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6463" role="note"><span data-dcnode-id="6466" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="6464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2021%25E2%2580%25932022_Russo-Ukrainian_crisis" title="2021–2022 Russo-Ukrainian crisis"><span data-dcnode-id="6465" instrument_node="">2021–2022 Russo-Ukrainian crisis</span></a></div><span data-dcnode-id="6462" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6446"><div class="thumbinner" data-dcnode-id="6447" style="width:302px;"><a class="image" data-dcnode-id="6460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARussian_forces_near_Ukraine%2C_2021-12-03_%28crop%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="6461" data-file-height="1912" data-file-width="2958" decoding="async" height="194" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/00/Russian_forces_near_Ukraine%252C_2021-12-03_%2528crop%2529.jpg/300px-Russian_forces_near_Ukraine%252C_2021-12-03_%2528crop%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/00/Russian_forces_near_Ukraine%2C_2021-12-03_%28crop%29.jpg/450px-Russian_forces_near_Ukraine%2C_2021-12-03_%28crop%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/00/Russian_forces_near_Ukraine%2C_2021-12-03_%28crop%29.jpg/600px-Russian_forces_near_Ukraine%2C_2021-12-03_%28crop%29.jpg 2x" width="300"></a><span data-dcnode-id="6459" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6448"><div class="magnify" data-dcnode-id="6457"><a class="internal" data-dcnode-id="6458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARussian_forces_near_Ukraine%2C_2021-12-03_%28crop%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="6456" instrument_node="">Map of the assessment of US intelligence on the movement of Russian troops near the border with Ukraine as of 3 December 2021. It is estimated that Russia has deployed about 70,000 troops, mostly at a distance of 100–200 km from the Ukrainian border. It is estimated that the number could increase to 175,000. Published: </span><i data-dcnode-id="6453"><a class="extiw" data-dcnode-id="6454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uk.wikipedia.org/wiki/The_Washington_Post" title="uk:The Washington Post"><span data-dcnode-id="6455" instrument_node="">The Washington Post</span></a></i><span data-dcnode-id="6452" instrument_node="">.</span><sup class="reference" data-dcnode-id="6449" id="cite_ref-wp-20211203_204-0"><a data-dcnode-id="6450" href="#cite_note-wp-20211203-204"><span data-dcnode-id="6451" instrument_node="">[201]</span></a></sup></div></div></div><span data-dcnode-id="6445" instrument_node="">
</span><p data-dcnode-id="6406"><span data-dcnode-id="6444" instrument_node="">On 30 November 2021, Russian President Putin stated that an expansion of NATO's presence in Ukraine, especially the deployment of any </span><a data-dcnode-id="6442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ballistic_missile" title="Ballistic missile"><span data-dcnode-id="6443" instrument_node="">long-range missiles</span></a><span data-dcnode-id="6441" instrument_node=""> capable of striking Russian cities or </span><a data-dcnode-id="6439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_national_missile_defense" title="United States national missile defense"><span data-dcnode-id="6440" instrument_node="">missile defense systems</span></a><span data-dcnode-id="6438" instrument_node=""> similar to those in Romania and Poland, would be a "red line" issue for Russia.</span><sup class="reference" data-dcnode-id="6435" id="cite_ref-205"><a data-dcnode-id="6436" href="#cite_note-205"><span data-dcnode-id="6437" instrument_node="">[202]</span></a></sup><sup class="reference" data-dcnode-id="6432" id="cite_ref-206"><a data-dcnode-id="6433" href="#cite_note-206"><span data-dcnode-id="6434" instrument_node="">[203]</span></a></sup><sup class="reference" data-dcnode-id="6429" id="cite_ref-207"><a data-dcnode-id="6430" href="#cite_note-207"><span data-dcnode-id="6431" instrument_node="">[204]</span></a></sup><span data-dcnode-id="6428" instrument_node=""> Putin asked U.S. President </span><a data-dcnode-id="6426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joe_Biden" title="Joe Biden"><span data-dcnode-id="6427" instrument_node="">Joe Biden</span></a><span data-dcnode-id="6425" instrument_node=""> for legal guarantees that NATO wouldn't expand eastward or put "weapons systems that threaten us in close vicinity to Russian territory."</span><sup class="reference" data-dcnode-id="6422" id="cite_ref-208"><a data-dcnode-id="6423" href="#cite_note-208"><span data-dcnode-id="6424" instrument_node="">[205]</span></a></sup><span data-dcnode-id="6421" instrument_node=""> According to Putin, "If some kind of strike systems appear on the territory of Ukraine, the flight time to Moscow will be seven to 10 minutes, and five minutes in the case of a hypersonic weapon being deployed."</span><sup class="reference" data-dcnode-id="6418" id="cite_ref-209"><a data-dcnode-id="6419" href="#cite_note-209"><span data-dcnode-id="6420" instrument_node="">[206]</span></a></sup><span data-dcnode-id="6417" instrument_node=""> NATO Secretary-General </span><a data-dcnode-id="6415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jens_Stoltenberg" title="Jens Stoltenberg"><span data-dcnode-id="6416" instrument_node="">Jens Stoltenberg</span></a><span data-dcnode-id="6414" instrument_node=""> replied that "It's only Ukraine and 30 NATO allies that decide when Ukraine is ready to join NATO. Russia has no veto, Russia has no say, and Russia has no right to establish a sphere of influence to try to control their neighbors."</span><sup class="reference" data-dcnode-id="6411" id="cite_ref-210"><a data-dcnode-id="6412" href="#cite_note-210"><span data-dcnode-id="6413" instrument_node="">[207]</span></a></sup><sup class="reference" data-dcnode-id="6408" id="cite_ref-211"><a data-dcnode-id="6409" href="#cite_note-211"><span data-dcnode-id="6410" instrument_node="">[208]</span></a></sup><span data-dcnode-id="6407" instrument_node="">
</span></p><p data-dcnode-id="6400"><span data-dcnode-id="6405" instrument_node="">On 1 December 2021, Russian President Vladimir Putin said he wanted to receive guarantees from the West that Ukraine would not join NATO. On 16 December, NATO Secretary General Jens Stoltenberg stated that the Alliance would not make concessions to Russia on the issue of Ukraine's accession. According to him, Ukraine has the right to protection and together with NATO will determine the issue of membership in the Alliance.</span><sup class="reference" data-dcnode-id="6402" id="cite_ref-212"><a data-dcnode-id="6403" href="#cite_note-212"><span data-dcnode-id="6404" instrument_node="">[209]</span></a></sup><span data-dcnode-id="6401" instrument_node="">
</span></p><p data-dcnode-id="6394"><span data-dcnode-id="6399" instrument_node="">On 17 December, the Russian Foreign Ministry unveiled a draft agreement between Russia and the United States on "security guarantees" and a draft agreement on measures to ensure the security of Russia and NATO member states. In particular, Russia proposes that NATO renounce the admission of Georgia and Ukraine into NATO, as well as "any military activity on the territory of Ukraine." Russia also urges the United States not to establish military bases in the former Soviet Union and not to accept these countries into NATO.</span><sup class="reference" data-dcnode-id="6396" id="cite_ref-213"><a data-dcnode-id="6397" href="#cite_note-213"><span data-dcnode-id="6398" instrument_node="">[210]</span></a></sup><span data-dcnode-id="6395" instrument_node="">
</span></p><p data-dcnode-id="6382"><span data-dcnode-id="6393" instrument_node="">On 9 January 2022, following a visit to Ukraine in January 2022 and a trip to the contact line in the east, EU High Representative </span><a data-dcnode-id="6391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Josep_Borrell" title="Josep Borrell"><span data-dcnode-id="6392" instrument_node="">Josep Borrell</span></a><span data-dcnode-id="6390" instrument_node=""> wrote in his blog on the European External Action Service website that some of the provisions of the so-called "draft agreements" on security guarantees for Russia, represented by the Kremlin in December 2021, contradicts the basic principles of the </span><a data-dcnode-id="6388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Helsinki_Accords" title="Helsinki Accords"><span data-dcnode-id="6389" instrument_node="">Helsinki Final Act of 1975</span></a><span data-dcnode-id="6387" instrument_node="">, so the willingness of NATO and Western countries to discuss these ideas does not mean their willingness to accept them:</span><sup class="reference" data-dcnode-id="6384" id="cite_ref-214"><a data-dcnode-id="6385" href="#cite_note-214"><span data-dcnode-id="6386" instrument_node="">[211]</span></a></sup><span data-dcnode-id="6383" instrument_node="">
</span></p><span data-dcnode-id="6381" instrument_node="">
</span><link data-dcnode-id="6380" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="6369"><p data-dcnode-id="6375"><span data-dcnode-id="6379" instrument_node="">The Russian leadership seems to intend to turn the clock backward to the old times of Cold War logics. This type of delimitation of spheres of influence does not belong in 2022: there cannot be a </span><a data-dcnode-id="6377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yalta_Conference" title="Yalta Conference"><span data-dcnode-id="6378" instrument_node="">Yalta</span></a><span data-dcnode-id="6376" instrument_node="">.</span></p><div class="templatequotecite" data-dcnode-id="6370"><span data-dcnode-id="6374" instrument_node="">— </span><cite data-dcnode-id="6371"><a data-dcnode-id="6372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Josep_Borrell" title="Josep Borrell"><span data-dcnode-id="6373" instrument_node="">Josep Borrell</span></a></cite></div></blockquote><span data-dcnode-id="6368" instrument_node="">
</span><p data-dcnode-id="6359"><span data-dcnode-id="6367" instrument_node="">In this regard, on 10 January 2022, US and Russian diplomats held security talks in Geneva to discuss the military activities of both countries and growing tensions around Ukraine. The head of the Russian delegation at a meeting in Geneva between the United States and Russia said that Russia needed "concrete guarantees" that Ukraine and Georgia would never become members of NATO, enshrined in the decision of the Madrid Summit of 2022. Earlier, Russian Deputy Foreign Minister </span><a data-dcnode-id="6365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sergei_Ryabkov" title="Sergei Ryabkov"><span data-dcnode-id="6366" instrument_node="">Sergei Ryabkov</span></a><span data-dcnode-id="6364" instrument_node=""> also said that "the risks of military confrontation should not be underestimated" and that the American side, refusing to not expand NATO, underestimates the seriousness of the situation.</span><sup class="reference" data-dcnode-id="6361" id="cite_ref-215"><a data-dcnode-id="6362" href="#cite_note-215"><span data-dcnode-id="6363" instrument_node="">[212]</span></a></sup><span data-dcnode-id="6360" instrument_node="">
</span></p><p data-dcnode-id="6353"><span data-dcnode-id="6358" instrument_node="">In turn, NATO Secretary General Jens Stoltenberg said that NATO will not compromise with Russia on Ukraine's membership and that Ukraine's membership in NATO will be decided by Ukraine and its allies. He assured that the Alliance helps Ukraine to meet the criteria necessary for membership in the organization.</span><sup class="reference" data-dcnode-id="6355" id="cite_ref-216"><a data-dcnode-id="6356" href="#cite_note-216"><span data-dcnode-id="6357" instrument_node="">[213]</span></a></sup><span data-dcnode-id="6354" instrument_node="">
</span></p><span data-dcnode-id="6352" instrument_node="">
</span><link data-dcnode-id="6351" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="6343"><p data-dcnode-id="6349"><span data-dcnode-id="6350" instrument_node="">The Alliance continues to provide Ukraine with political support for its territorial integrity and sovereignty, as well as practical assistance. It is also a clear signal that Ukraine has the right to defend itself.</span></p><div class="templatequotecite" data-dcnode-id="6344"><span data-dcnode-id="6348" instrument_node="">— </span><cite data-dcnode-id="6345"><a data-dcnode-id="6346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jens_Stoltenberg" title="Jens Stoltenberg"><span data-dcnode-id="6347" instrument_node="">Jens Stoltenberg</span></a></cite></div></blockquote><span data-dcnode-id="6342" instrument_node="">
</span><p data-dcnode-id="6333"><span data-dcnode-id="6341" instrument_node="">The lead American diplomat to the talks, </span><a data-dcnode-id="6339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wendy_Sherman" title="Wendy Sherman"><span data-dcnode-id="6340" instrument_node="">Wendy Sherman</span></a><span data-dcnode-id="6338" instrument_node="">, stated that "We will not allow anyone to slam closed NATO’s open door policy."  She said that Washington would not give up bilateral cooperation with sovereign states that want to work with the United States, and added that the U.S. government does not intend to decide about Ukraine without the participation of Ukraine, or about NATO without NATO.</span><sup class="reference" data-dcnode-id="6335" id="cite_ref-nytsherm_217-0"><a data-dcnode-id="6336" href="#cite_note-nytsherm-217"><span data-dcnode-id="6337" instrument_node="">[214]</span></a></sup><span data-dcnode-id="6334" instrument_node="">
</span></p><p data-dcnode-id="6327"><span data-dcnode-id="6332" instrument_node="">On 12 January 2022, a meeting of the Russia-NATO Council was held in Brussels, where representatives of Russia and 30 member states of the Alliance discussed the requirements of the Russian side to NATO. Jens Stoltenberg again stated that the decision on Ukraine's readiness to join NATO can only be made by Ukraine and 30 allies in the Alliance, NATO will "seriously think" about increasing its presence in Eastern Europe in the event of "new Russian aggression." NATO is also ready to reopen its representative office in Moscow, the Secretary General added.</span><sup class="reference" data-dcnode-id="6329" id="cite_ref-218"><a data-dcnode-id="6330" href="#cite_note-218"><span data-dcnode-id="6331" instrument_node="">[215]</span></a></sup><span data-dcnode-id="6328" instrument_node=""> Wendy Sherman noted that NATO will not abandon the policy of "open doors", Russia's demands are unacceptable. NATO allies will not agree with the impossibility of further expansion of the Alliance and a return to the configuration of the late twentieth century, which the Russian side insisted on during the negotiations, the US Deputy Secretary of State claims.
</span></p><p data-dcnode-id="6318"><span data-dcnode-id="6326" instrument_node="">Deputy Foreign Minister of Russia </span><a data-dcnode-id="6324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alexander_Grushko" title="Alexander Grushko"><span data-dcnode-id="6325" instrument_node="">Alexander Grushko</span></a><span data-dcnode-id="6323" instrument_node=""> said that NATO did not initially profess the "open door" policy, which the Alliance declares today, if it fails to fend off threats to its security with political measures, Russia will use military measures:</span><sup class="reference" data-dcnode-id="6320" id="cite_ref-219"><a data-dcnode-id="6321" href="#cite_note-219"><span data-dcnode-id="6322" instrument_node="">[216]</span></a></sup><span data-dcnode-id="6319" instrument_node="">
</span></p><span data-dcnode-id="6317" instrument_node="">
</span><link data-dcnode-id="6316" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="6308"><p data-dcnode-id="6314"><span data-dcnode-id="6315" instrument_node="">This policy appeared in 1994 and served very different purposes than building European security. We have a set of legal military-technical measures that we will apply if we feel a real threat to security, and we already feel if our territory is considered as a target for targeted strike weapons. Of course, we cannot agree with this. We will take all necessary measures to fend off the threat by military means, if political means fail.</span></p><div class="templatequotecite" data-dcnode-id="6309"><span data-dcnode-id="6313" instrument_node="">— </span><cite data-dcnode-id="6310"><a data-dcnode-id="6311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alexander_Grushko" title="Alexander Grushko"><span data-dcnode-id="6312" instrument_node="">Alexander Grushko</span></a></cite></div></blockquote><span data-dcnode-id="6307" instrument_node="">
</span><p data-dcnode-id="6298"><span data-dcnode-id="6306" instrument_node="">During the first OSCE meeting on 13 January 2022, Russia's permanent representative to the OSCE, </span><a class="new" data-dcnode-id="6304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAlexander_Lukashevich%26action%3Dedit%26redlink%3D1" title="Alexander Lukashevich (page does not exist)"><span data-dcnode-id="6305" instrument_node="">Alexander Lukashevich</span></a><span data-dcnode-id="6303" instrument_node="">, stated that the Russian Federation would be forced to take measures to "eliminate unacceptable threats to national security" if it did not hear a constructive response to its security proposals within a reasonable time:</span><sup class="reference" data-dcnode-id="6300" id="cite_ref-220"><a data-dcnode-id="6301" href="#cite_note-220"><span data-dcnode-id="6302" instrument_node="">[217]</span></a></sup><span data-dcnode-id="6299" instrument_node="">
</span></p><span data-dcnode-id="6297" instrument_node="">
</span><link data-dcnode-id="6296" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="6289"><p data-dcnode-id="6294"><span data-dcnode-id="6295" instrument_node="">If we do not hear a constructive response to the proposals made within a reasonable time, and the aggressive line of behavior against Russia continues, we will be forced to draw the appropriate conclusions and take all necessary measures to ensure a strategic balance and eliminate unacceptable threats to our national security.</span></p><div class="templatequotecite" data-dcnode-id="6290"><span data-dcnode-id="6293" instrument_node="">— </span><cite data-dcnode-id="6291"><span data-dcnode-id="6292" instrument_node="">Alexander Lukashevich</span></cite></div></blockquote><span data-dcnode-id="6288" instrument_node="">
</span><p data-dcnode-id="6275"><span data-dcnode-id="6287" instrument_node="">Foreign Minister Sergei Lavrov said at his annual foreign policy press conference that Moscow "has run out of patience" waiting for the West's response to the Kremlin's demands for "security guarantees", and therefore Russia is waiting for a written response within a week. Lavrov said the Kremlin would not wait "indefinitely" for a Western response to Moscow's demands that NATO not expand eastward and deploy troops in Ukraine and other countries of the former Soviet Union. Lavrov's comments came a day after the White House said the threat of a Russian invasion of Ukraine remains high, with about 100,000 Russian troops deployed.</span><sup class="reference" data-dcnode-id="6284" id="cite_ref-221"><a data-dcnode-id="6285" href="#cite_note-221"><span data-dcnode-id="6286" instrument_node="">[218]</span></a></sup><span data-dcnode-id="6283" instrument_node=""> The next day, White House spokeswoman </span><a data-dcnode-id="6281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jen_Psaki" title="Jen Psaki"><span data-dcnode-id="6282" instrument_node="">Jen Psaki</span></a><span data-dcnode-id="6280" instrument_node=""> said that the Russian authorities must choose which way to go: choose additional diplomacy or, in case of further aggressive actions, face economic measures that will be stricter than in 2014,</span><sup class="reference" data-dcnode-id="6277" id="cite_ref-222"><a data-dcnode-id="6278" href="#cite_note-222"><span data-dcnode-id="6279" instrument_node="">[219]</span></a></sup><span data-dcnode-id="6276" instrument_node="">
</span></p><p data-dcnode-id="6266"><span data-dcnode-id="6274" instrument_node="">In an interview with </span><a data-dcnode-id="6272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/La_Repubblica" title="La Repubblica"><span data-dcnode-id="6273" instrument_node="">La Repubblica</span></a><span data-dcnode-id="6271" instrument_node=""> on 14 January, NATO Secretary General Jens Stoltenberg said that Kyiv had already applied to join the military-political alliance, and in 2008 NATO decided that Ukraine and Georgia would become members, but has not yet determined when this is exactly what will happen.</span><sup class="reference" data-dcnode-id="6268" id="cite_ref-223"><a data-dcnode-id="6269" href="#cite_note-223"><span data-dcnode-id="6270" instrument_node="">[220]</span></a></sup><span data-dcnode-id="6267" instrument_node="">
</span></p><p data-dcnode-id="6257"><span data-dcnode-id="6265" instrument_node="">On 19 January, Russian Deputy Foreign Minister </span><a data-dcnode-id="6263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sergei_Ryabkov" title="Sergei Ryabkov"><span data-dcnode-id="6264" instrument_node="">Sergei Ryabkov</span></a><span data-dcnode-id="6262" instrument_node=""> made a proposal to the United States to assume legal obligations not to vote for NATO membership of countries whose membership is opposed by the Russian Federation, reducing NATO's non-enlargement requirements. The Kremlin is ready to exchange such an "offer" for the conditions that were put forward earlier – the so-called guarantees of the non-expansion of the Alliance to the east. He noted that the decision taken at the 2008 Bucharest summit "should be ruled out" and that the United States should provide unilateral legal guarantees that "this will never happen". The position that Ukraine and Georgia will never become members of the North Atlantic Alliance, Ryabkov said, is a priority for the Kremlin. According to him, America must have "enough political will" for such a step.</span><sup class="reference" data-dcnode-id="6259" id="cite_ref-224"><a data-dcnode-id="6260" href="#cite_note-224"><span data-dcnode-id="6261" instrument_node="">[221]</span></a></sup><span data-dcnode-id="6258" instrument_node="">
</span></p><p data-dcnode-id="6252"><span data-dcnode-id="6256" instrument_node="">On 22 February 2022 Russia recognized the rebel republics of Donbas, sending its army in the region; finally, on 24 February 2022 Russia launched a </span><a data-dcnode-id="6254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2022_Russian_invasion_of_Ukraine" title="2022 Russian invasion of Ukraine"><span data-dcnode-id="6255" instrument_node="">large-scale invasion of Ukraine</span></a><span data-dcnode-id="6253" instrument_node="">.
</span></p><span data-dcnode-id="6251" instrument_node="">
