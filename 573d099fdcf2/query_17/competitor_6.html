</span></p><p data-dcnode-id="8422"><span data-dcnode-id="8457" instrument_node="">On 29 August 2014, following reports that the </span><a class="mw-redirect" data-dcnode-id="8455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2014_Russian_military_intervention_in_Ukraine" title="2014 Russian military intervention in Ukraine"><span data-dcnode-id="8456" instrument_node="">Russian military was operating within Ukraine</span></a><span data-dcnode-id="8454" instrument_node="">, Ukrainian Prime Minister </span><a data-dcnode-id="8452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arseniy_Yatsenyuk" title="Arseniy Yatsenyuk"><span data-dcnode-id="8453" instrument_node="">Arsenii Yatseniuk</span></a><span data-dcnode-id="8451" instrument_node=""> announced that he would ask the Ukrainian parliament to put Ukraine on a path towards NATO membership.</span><sup class="reference" data-dcnode-id="8448" id="cite_ref-83"><a data-dcnode-id="8449" href="#cite_note-83"><span data-dcnode-id="8450" instrument_node="">[81]</span></a></sup><span data-dcnode-id="8447" instrument_node=""> The government has also signaled that it hopes for </span><a data-dcnode-id="8445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Major_non-NATO_ally" title="Major non-NATO ally"><span data-dcnode-id="8446" instrument_node="">major non-NATO ally</span></a><span data-dcnode-id="8444" instrument_node=""> status with the United States, NATO's largest military power and contributor.</span><sup class="reference" data-dcnode-id="8441" id="cite_ref-84"><a data-dcnode-id="8442" href="#cite_note-84"><span data-dcnode-id="8443" instrument_node="">[82]</span></a></sup><span data-dcnode-id="8440" instrument_node=""> As part of these efforts, and to rule out future Ukrainian membership in the </span><a data-dcnode-id="8438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eurasian_Economic_Union" title="Eurasian Economic Union"><span data-dcnode-id="8439" instrument_node="">Eurasian Economic Union</span></a><span data-dcnode-id="8437" instrument_node=""> and other Russian-led supranational entities, Yatseniuk also submitted a draft law to repeal Ukraine's non-bloc status previously instituted by Yanukovych.</span><sup class="reference" data-dcnode-id="8434" id="cite_ref-85"><a data-dcnode-id="8435" href="#cite_note-85"><span data-dcnode-id="8436" instrument_node="">[83]</span></a></sup><span data-dcnode-id="8433" instrument_node=""> Following </span><a data-dcnode-id="8431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2014_Ukrainian_parliamentary_election" title="2014 Ukrainian parliamentary election"><span data-dcnode-id="8432" instrument_node="">parliamentary elections</span></a><span data-dcnode-id="8430" instrument_node=""> in October 2014, the </span><a data-dcnode-id="8428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_Yatsenyuk_Government" title="Second Yatsenyuk Government"><span data-dcnode-id="8429" instrument_node="">new government</span></a><span data-dcnode-id="8427" instrument_node=""> made joining NATO a priority.</span><sup class="reference" data-dcnode-id="8424" id="cite_ref-rferl.org_8-1"><a data-dcnode-id="8425" href="#cite_note-rferl.org-8"><span data-dcnode-id="8426" instrument_node="">[8]</span></a></sup><span data-dcnode-id="8423" instrument_node="">
</span></p><span data-dcnode-id="8421" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="8406"><div class="thumbinner" data-dcnode-id="8407" style="width:222px;"><a class="image" data-dcnode-id="8419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASoldiers_of_6th_Squadron%2C_8th_Cavalry_Regiment%2C_2nd_Infantry_Brigade_Combat_Team%2C_3rd_Infantry_Division_train_Ukrainian_Soldiers_on_trigger_squeeze.jpg"><img alt="" class="thumbimage" data-dcnode-id="8420" data-file-height="2218" data-file-width="3164" decoding="async" height="154" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c6/Soldiers_of_6th_Squadron%252C_8th_Cavalry_Regiment%252C_2nd_Infantry_Brigade_Combat_Team%252C_3rd_Infantry_Division_train_Ukrainian_Soldiers_on_trigger_squeeze.jpg/220px-Soldiers_of_6th_Squadron%252C_8th_Cavalry_Regiment%252C_2nd_Infantry_Brigade_Combat_Team%252C_3rd_Infantry_Division_train_Ukrainian_Soldiers_on_trigger_squeeze.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c6/Soldiers_of_6th_Squadron%2C_8th_Cavalry_Regiment%2C_2nd_Infantry_Brigade_Combat_Team%2C_3rd_Infantry_Division_train_Ukrainian_Soldiers_on_trigger_squeeze.jpg/330px-Soldiers_of_6th_Squadron%2C_8th_Cavalry_Regiment%2C_2nd_Infantry_Brigade_Combat_Team%2C_3rd_Infantry_Division_train_Ukrainian_Soldiers_on_trigger_squeeze.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c6/Soldiers_of_6th_Squadron%2C_8th_Cavalry_Regiment%2C_2nd_Infantry_Brigade_Combat_Team%2C_3rd_Infantry_Division_train_Ukrainian_Soldiers_on_trigger_squeeze.jpg/440px-Soldiers_of_6th_Squadron%2C_8th_Cavalry_Regiment%2C_2nd_Infantry_Brigade_Combat_Team%2C_3rd_Infantry_Division_train_Ukrainian_Soldiers_on_trigger_squeeze.jpg 2x" width="220"></a><span data-dcnode-id="8418" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8408"><div class="magnify" data-dcnode-id="8416"><a class="internal" data-dcnode-id="8417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASoldiers_of_6th_Squadron%2C_8th_Cavalry_Regiment%2C_2nd_Infantry_Brigade_Combat_Team%2C_3rd_Infantry_Division_train_Ukrainian_Soldiers_on_trigger_squeeze.jpg" title="Enlarge"></a></div><span data-dcnode-id="8415" instrument_node="">Soldiers of the U.S. Army </span><a class="mw-redirect" data-dcnode-id="8413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/8th_Cavalry_Regiment_%28United_States%29" title="8th Cavalry Regiment (United States)"><span data-dcnode-id="8414" instrument_node="">6th Squadron, 8th Cavalry Regiment</span></a><span data-dcnode-id="8412" instrument_node="">, </span><a data-dcnode-id="8410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/3rd_Infantry_Division_%28United_States%29%23Current_status" title="3rd Infantry Division (United States)"><span data-dcnode-id="8411" instrument_node="">2nd Infantry Brigade Combat Team, 3rd Infantry Division</span></a><span data-dcnode-id="8409" instrument_node=""> train Ukrainian Soldiers on trigger squeeze during a 2016 drill.</span></div></div></div><span data-dcnode-id="8405" instrument_node="">
</span><p data-dcnode-id="8382"><span data-dcnode-id="8404" instrument_node="">On 23 December 2014, the Ukrainian parliament renounced Ukraine's </span><a class="mw-redirect" data-dcnode-id="8402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Country_neutrality_%28international_relations%29" title="Country neutrality (international relations)"><span data-dcnode-id="8403" instrument_node="">non-aligned status</span></a><span data-dcnode-id="8401" instrument_node="">, a step harshly condemned by Russia.</span><sup class="reference" data-dcnode-id="8398" id="cite_ref-result_of_Russia_UNR_6-2"><a data-dcnode-id="8399" href="#cite_note-result_of_Russia_UNR-6"><span data-dcnode-id="8400" instrument_node="">[6]</span></a></sup><sup class="reference" data-dcnode-id="8395" id="cite_ref-wsjends_86-0"><a data-dcnode-id="8396" href="#cite_note-wsjends-86"><span data-dcnode-id="8397" instrument_node="">[84]</span></a></sup><span data-dcnode-id="8394" instrument_node=""> The new law states that Ukraine's previous non-aligned status "proved to be ineffective in guaranteeing Ukraine's security and protecting the country from external aggression and pressure" and also aims to deepen Ukrainian cooperation with NATO "in order to achieve the criteria which are required for membership in the alliance".</span><sup class="reference" data-dcnode-id="8391" id="cite_ref-Xinhua_2014-12-24_87-0"><a data-dcnode-id="8392" href="#cite_note-Xinhua_2014-12-24-87"><span data-dcnode-id="8393" instrument_node="">[85]</span></a></sup><span data-dcnode-id="8390" instrument_node=""> On 29 December 2014, Poroshenko vowed to hold a </span><a class="mw-redirect" data-dcnode-id="8388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukrainian_NATO_membership_referendum" title="Ukrainian NATO membership referendum"><span data-dcnode-id="8389" instrument_node="">referendum on joining NATO</span></a><span data-dcnode-id="8387" instrument_node="">.</span><sup class="reference" data-dcnode-id="8384" id="cite_ref-88"><a data-dcnode-id="8385" href="#cite_note-88"><span data-dcnode-id="8386" instrument_node="">[86]</span></a></sup><span data-dcnode-id="8383" instrument_node="">
</span></p><p data-dcnode-id="8340"><span data-dcnode-id="8381" instrument_node="">A number of military exercises were planned between NATO members and Ukraine in 2015.</span><sup class="reference" data-dcnode-id="8378" id="cite_ref-uua_89-0"><a data-dcnode-id="8379" href="#cite_note-uua-89"><span data-dcnode-id="8380" instrument_node="">[87]</span></a></sup><span data-dcnode-id="8377" instrument_node=""> Among them were </span><a class="new" data-dcnode-id="8375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOperation_Fearless_Guardian%26action%3Dedit%26redlink%3D1" title="Operation Fearless Guardian (page does not exist)"><span data-dcnode-id="8376" instrument_node="">Operation Fearless Guardian</span></a><span data-dcnode-id="8374" instrument_node=""> (OFG) which totalled 2,200 participants, including 1,000 U.S. military. Initial personnel and equipment of the </span><a data-dcnode-id="8372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/173rd_Airborne_Brigade" title="173rd Airborne Brigade"><span data-dcnode-id="8373" instrument_node="">173rd Airborne Brigade</span></a><span data-dcnode-id="8371" instrument_node=""> arrived in </span><a data-dcnode-id="8369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yavoriv" title="Yavoriv"><span data-dcnode-id="8370" instrument_node="">Yavoriv</span></a><span data-dcnode-id="8368" instrument_node="">, </span><a data-dcnode-id="8366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lviv_Oblast" title="Lviv Oblast"><span data-dcnode-id="8367" instrument_node="">Lviv Oblast</span></a><span data-dcnode-id="8365" instrument_node="">, on 10 April 2015. OFG would train Ukraine's newly formed </span><a class="mw-redirect" data-dcnode-id="8363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukraine_National_Guard" title="Ukraine National Guard"><span data-dcnode-id="8364" instrument_node="">Ukraine National Guard</span></a><span data-dcnode-id="8362" instrument_node=""> under the Congress-approved </span><a data-dcnode-id="8360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Global_Security_Contingency_Fund" title="Global Security Contingency Fund"><span data-dcnode-id="8361" instrument_node="">Global Security Contingency Fund</span></a><span data-dcnode-id="8359" instrument_node="">. Under the program, the US Army was to train three battalions of Ukrainian troops over a six-month period beginning in April 2015,</span><sup class="reference" data-dcnode-id="8356" id="cite_ref-90"><a data-dcnode-id="8357" href="#cite_note-90"><span data-dcnode-id="8358" instrument_node="">[88]</span></a></sup><span data-dcnode-id="8355" instrument_node=""> Others initiatives include Exercise </span><i data-dcnode-id="8353"><span data-dcnode-id="8354" instrument_node="">Sea Breeze 2015</span></i><span data-dcnode-id="8352" instrument_node=""> (total 2,500 personnel of which 1,000 US military and 500 military from NATO or "</span><a data-dcnode-id="8350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Partnership_for_Peace" title="Partnership for Peace"><span data-dcnode-id="8351" instrument_node="">Partnership for Peace</span></a><span data-dcnode-id="8349" instrument_node="">" countries), "Saber Guardian/Rapid Trident – 2015" (total 2,100 members, including 500 US military and 600 NATO/PfP personnel), as well as the Ukrainian-Polish air exercise "Safe Skies – 2015" (total 350 participants, including 100 Polish military) and military police "Law and Order – 2015" (total 100 participants, 50 of which are Polish military).</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="8342" style="white-space:nowrap;"><span data-dcnode-id="8348" instrument_node="">[</span><i data-dcnode-id="8344"><a data-dcnode-id="8345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="8346" title="This claim needs references to reliable sources. (June 2015)"><span data-dcnode-id="8347" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="8343" instrument_node="">]</span></sup><span data-dcnode-id="8341" instrument_node="">
</span></p><p data-dcnode-id="8330"><span data-dcnode-id="8339" instrument_node="">In September 2015, NATO launched five trust funds for €5.4&nbsp;million for the Ukrainian army. €2&nbsp;million are planned to be sent for the modernization of communication systems, €1.2&nbsp;million – to reform the logistic and standardization systems, €845 thousand – for physical rehabilitation and prostheses, €815 thousand for cyber defense, and €410 thousand for retraining and resettlement.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="8332" style="white-space:nowrap;"><span data-dcnode-id="8338" instrument_node="">[</span><i data-dcnode-id="8334"><a data-dcnode-id="8335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="8336" title="This claim needs references to reliable sources. (February 2020)"><span data-dcnode-id="8337" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="8333" instrument_node="">]</span></sup><span data-dcnode-id="8331" instrument_node="">
</span></p><span data-dcnode-id="8329" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8317"><div class="thumbinner" data-dcnode-id="8318" style="width:222px;"><a class="image" data-dcnode-id="8327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUkraine_%25E2%2580%2593_NATO_Commission_chaired_by_Petro_Poroshenko_%282017-07-10%29_05.jpg"><img alt="" class="thumbimage" data-dcnode-id="8328" data-file-height="3515" data-file-width="5272" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Ukraine_%25E2%2580%2593_NATO_Commission_chaired_by_Petro_Poroshenko_%282017-07-10%29_05.jpg/220px-Ukraine_%25E2%2580%2593_NATO_Commission_chaired_by_Petro_Poroshenko_%282017-07-10%29_05.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Ukraine_%E2%80%93_NATO_Commission_chaired_by_Petro_Poroshenko_%282017-07-10%29_05.jpg/330px-Ukraine_%E2%80%93_NATO_Commission_chaired_by_Petro_Poroshenko_%282017-07-10%29_05.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Ukraine_%E2%80%93_NATO_Commission_chaired_by_Petro_Poroshenko_%282017-07-10%29_05.jpg/440px-Ukraine_%E2%80%93_NATO_Commission_chaired_by_Petro_Poroshenko_%282017-07-10%29_05.jpg 2x" width="220"></a><span data-dcnode-id="8326" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8319"><div class="magnify" data-dcnode-id="8324"><a class="internal" data-dcnode-id="8325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUkraine_%25E2%2580%2593_NATO_Commission_chaired_by_Petro_Poroshenko_%282017-07-10%29_05.jpg" title="Enlarge"></a></div><span data-dcnode-id="8323" instrument_node="">NATO Secretary General </span><a data-dcnode-id="8321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jens_Stoltenberg" title="Jens Stoltenberg"><span data-dcnode-id="8322" instrument_node="">Jens Stoltenberg</span></a><span data-dcnode-id="8320" instrument_node=""> and Petro Poroshenko, 10 July 2017</span></div></div></div><span data-dcnode-id="8316" instrument_node="">
</span><p data-dcnode-id="8304"><span data-dcnode-id="8315" instrument_node="">In March 2016, </span><a data-dcnode-id="8313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/President_of_the_European_Commission" title="President of the European Commission"><span data-dcnode-id="8314" instrument_node="">President of the European Commission</span></a><span data-dcnode-id="8312" instrument_node=""> </span><a data-dcnode-id="8310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jean-Claude_Juncker" title="Jean-Claude Juncker"><span data-dcnode-id="8311" instrument_node="">Jean-Claude Juncker</span></a><span data-dcnode-id="8309" instrument_node=""> stated that it would take at least 20–25 years for Ukraine to join the EU and NATO.</span><sup class="reference" data-dcnode-id="8306" id="cite_ref-91"><a data-dcnode-id="8307" href="#cite_note-91"><span data-dcnode-id="8308" instrument_node="">[89]</span></a></sup><span data-dcnode-id="8305" instrument_node="">
</span></p><p data-dcnode-id="8287"><span data-dcnode-id="8303" instrument_node="">On 8 June 2017 the </span><a data-dcnode-id="8301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Verkhovna_Rada" title="Verkhovna Rada"><span data-dcnode-id="8302" instrument_node="">Verkhovna Rada</span></a><span data-dcnode-id="8300" instrument_node=""> passed a law making integration with NATO a foreign policy priority.</span><sup class="reference" data-dcnode-id="8297" id="cite_ref-vrprio_92-0"><a data-dcnode-id="8298" href="#cite_note-vrprio-92"><span data-dcnode-id="8299" instrument_node="">[90]</span></a></sup><span data-dcnode-id="8296" instrument_node=""> In July 2017 Poroshenko announced that he would seek the opening of negotiations on a MAP with NATO.</span><sup class="reference" data-dcnode-id="8293" id="cite_ref-93"><a data-dcnode-id="8294" href="#cite_note-93"><span data-dcnode-id="8295" instrument_node="">[91]</span></a></sup><span data-dcnode-id="8292" instrument_node=""> In that same month President Poroshenko began proposing a 'patronage system', tying individual regions with European States.</span><sup class="reference" data-dcnode-id="8289" id="cite_ref-ppps_94-0"><a data-dcnode-id="8290" href="#cite_note-ppps-94"><span data-dcnode-id="8291" instrument_node="">[92]</span></a></sup><span data-dcnode-id="8288" instrument_node="">
</span></p><p data-dcnode-id="8256"><span data-dcnode-id="8286" instrument_node="">On 10 March 2018 </span><a data-dcnode-id="8284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="8285" instrument_node="">NATO</span></a><span data-dcnode-id="8283" instrument_node=""> added </span><a data-dcnode-id="8281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukraine" title="Ukraine"><span data-dcnode-id="8282" instrument_node="">Ukraine</span></a><span data-dcnode-id="8280" instrument_node=""> in the list of </span><a data-dcnode-id="8278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="8279" instrument_node="">NATO</span></a><span data-dcnode-id="8277" instrument_node=""> aspiring members (others including </span><a data-dcnode-id="8275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bosnia_and_Herzegovina" title="Bosnia and Herzegovina"><span data-dcnode-id="8276" instrument_node="">Bosnia and Herzegovina</span></a><span data-dcnode-id="8274" instrument_node=""> and </span><a data-dcnode-id="8272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Georgia_%28country%29" title="Georgia (country)"><span data-dcnode-id="8273" instrument_node="">Georgia</span></a><span data-dcnode-id="8271" instrument_node="">). Several months later, in late June, Ukraine's </span><a data-dcnode-id="8269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Verkhovna_Rada" title="Verkhovna Rada"><span data-dcnode-id="8270" instrument_node="">Verkhovna Rada</span></a><span data-dcnode-id="8268" instrument_node=""> passed a National Security bill: the bill defines the principles of state policy on national security and defence as well as focusing on Ukraine's integration into the European security, economic and legal system; improvement in mutual relations with other states and eventual membership in EU and </span><a data-dcnode-id="8266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="8267" instrument_node="">NATO</span></a><span data-dcnode-id="8265" instrument_node="">.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="8258" style="white-space:nowrap;"><span data-dcnode-id="8264" instrument_node="">[</span><i data-dcnode-id="8260"><a data-dcnode-id="8261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="8262" title="This claim needs references to reliable sources. (March 2022)"><span data-dcnode-id="8263" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="8259" instrument_node="">]</span></sup><span data-dcnode-id="8257" instrument_node="">
</span></p><p data-dcnode-id="8250"><span data-dcnode-id="8255" instrument_node="">On 20 September 2018, the Ukrainian parliament approved amendments to the constitution that would make the accession of the country to NATO and the EU a central goal and the main foreign policy objective.</span><sup class="reference" data-dcnode-id="8252" id="cite_ref-pushes_95-0"><a data-dcnode-id="8253" href="#cite_note-pushes-95"><span data-dcnode-id="8254" instrument_node="">[93]</span></a></sup><span data-dcnode-id="8251" instrument_node="">
</span></p><p data-dcnode-id="8231"><span data-dcnode-id="8249" instrument_node="">On 7 February 2019, the </span><a data-dcnode-id="8247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Verkhovna_Rada" title="Verkhovna Rada"><span data-dcnode-id="8248" instrument_node="">Ukrainian parliament</span></a><span data-dcnode-id="8246" instrument_node=""> voted with a majority of 334 out of 385 to change the </span><a data-dcnode-id="8244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitution_of_Ukraine" title="Constitution of Ukraine"><span data-dcnode-id="8245" instrument_node="">Ukrainian constitution</span></a><span data-dcnode-id="8243" instrument_node=""> to help Ukraine to join NATO and the </span><a data-dcnode-id="8241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union" title="European Union"><span data-dcnode-id="8242" instrument_node="">European Union</span></a><span data-dcnode-id="8240" instrument_node="">.</span><sup class="reference" data-dcnode-id="8237" id="cite_ref-vrconst_96-0"><a data-dcnode-id="8238" href="#cite_note-vrconst-96"><span data-dcnode-id="8239" instrument_node="">[94]</span></a></sup><span data-dcnode-id="8236" instrument_node=""> After the vote, Poroshenko declared: "This is the day when the movement of Ukraine to the European Union and the North Atlantic Alliance will be consolidated in the Constitution as a foreign political landmark."</span><sup class="reference" data-dcnode-id="8233" id="cite_ref-porodecl_97-0"><a data-dcnode-id="8234" href="#cite_note-porodecl-97"><span data-dcnode-id="8235" instrument_node="">[95]</span></a></sup><span data-dcnode-id="8232" instrument_node="">
</span></p><span data-dcnode-id="8230" instrument_node="">
</span><h3 data-dcnode-id="8219"><span data-dcnode-id="8229" id="Presidency_of_Volodymyr_Zelenskyy_.28from_2019.29"></span><span class="mw-headline" data-dcnode-id="8227" id="Presidency_of_Volodymyr_Zelenskyy_(from_2019)"><span data-dcnode-id="8228" instrument_node="">Presidency of Volodymyr Zelenskyy (from 2019)</span></span><span class="mw-editsection" data-dcnode-id="8220"><span class="mw-editsection-bracket" data-dcnode-id="8225"><span data-dcnode-id="8226" instrument_node="">[</span></span><a data-dcnode-id="8223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUkraine%25E2%2580%2593NATO_relations%26action%3Dedit%26section%3D9" title="Edit section: Presidency of Volodymyr Zelenskyy (from 2019)"><span data-dcnode-id="8224" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8221"><span data-dcnode-id="8222" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8218" instrument_node="">
</span><link data-dcnode-id="8217" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8207" role="note"><span data-dcnode-id="8216" instrument_node="">See also: </span><a data-dcnode-id="8214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Minsk_agreements" title="Minsk agreements"><span data-dcnode-id="8215" instrument_node="">Minsk agreements</span></a><span data-dcnode-id="8213" instrument_node="">, </span><a data-dcnode-id="8211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Normandy_Format%23Phases" title="Normandy Format"><span data-dcnode-id="8212" instrument_node="">Normandy_Format §&nbsp;Phases</span></a><span data-dcnode-id="8210" instrument_node="">, and </span><a data-dcnode-id="8208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trilateral_Contact_Group_on_Ukraine" title="Trilateral Contact Group on Ukraine"><span data-dcnode-id="8209" instrument_node="">Trilateral Contact Group on Ukraine</span></a></div><span data-dcnode-id="8206" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8194"><div class="thumbinner" data-dcnode-id="8195" style="width:222px;"><a class="image" data-dcnode-id="8204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVolodymyr_Zelensky_visits_Brussels_2019.jpg"><img alt="" class="thumbimage" data-dcnode-id="8205" data-file-height="2000" data-file-width="3000" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/ad/Volodymyr_Zelensky_visits_Brussels_2019.jpg/220px-Volodymyr_Zelensky_visits_Brussels_2019.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/ad/Volodymyr_Zelensky_visits_Brussels_2019.jpg/330px-Volodymyr_Zelensky_visits_Brussels_2019.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/ad/Volodymyr_Zelensky_visits_Brussels_2019.jpg/440px-Volodymyr_Zelensky_visits_Brussels_2019.jpg 2x" width="220"></a><span data-dcnode-id="8203" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8196"><div class="magnify" data-dcnode-id="8201"><a class="internal" data-dcnode-id="8202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVolodymyr_Zelensky_visits_Brussels_2019.jpg" title="Enlarge"></a></div><span data-dcnode-id="8200" instrument_node="">Ukrainian President </span><a data-dcnode-id="8198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Volodymyr_Zelenskyy" title="Volodymyr Zelenskyy"><span data-dcnode-id="8199" instrument_node="">Volodymyr Zelenskyy</span></a><span data-dcnode-id="8197" instrument_node=""> with NATO Secretary General Stoltenberg in June 2019</span></div></div></div><span data-dcnode-id="8193" instrument_node="">
</span><p data-dcnode-id="8170"><span data-dcnode-id="8192" instrument_node="">Ukrainian President </span><a data-dcnode-id="8190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Volodymyr_Zelenskyy" title="Volodymyr Zelenskyy"><span data-dcnode-id="8191" instrument_node="">Volodymyr Zelenskyy</span></a><span data-dcnode-id="8189" instrument_node=""> was inaugurated on 20 May 2019.</span><sup class="reference" data-dcnode-id="8186" id="cite_ref-rflz_98-0"><a data-dcnode-id="8187" href="#cite_note-rflz-98"><span data-dcnode-id="8188" instrument_node="">[96]</span></a></sup><span data-dcnode-id="8185" instrument_node=""> On 12 June 2020, Ukraine joined NATO's </span><a class="mw-redirect" data-dcnode-id="8183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enhanced_opportunity_partner" title="Enhanced opportunity partner"><span data-dcnode-id="8184" instrument_node="">enhanced opportunity partner</span></a><span data-dcnode-id="8182" instrument_node=""> interoperability program.</span><sup class="reference" data-dcnode-id="8179" id="cite_ref-100"><a data-dcnode-id="8180" href="#cite_note-100"><span data-dcnode-id="8181" instrument_node="">[nb 3]</span></a></sup><sup class="reference" data-dcnode-id="8176" id="cite_ref-natoukraine30667898_99-1"><a data-dcnode-id="8177" href="#cite_note-natoukraine30667898-99"><span data-dcnode-id="8178" instrument_node="">[97]</span></a></sup><span data-dcnode-id="8175" instrument_node=""> According to an official NATO statement, the new status "does not prejudge any decisions on NATO membership."</span><sup class="reference" data-dcnode-id="8172" id="cite_ref-natoukraine30667898_99-2"><a data-dcnode-id="8173" href="#cite_note-natoukraine30667898-99"><span data-dcnode-id="8174" instrument_node="">[97]</span></a></sup><span data-dcnode-id="8171" instrument_node="">
</span></p><p data-dcnode-id="8151"><span data-dcnode-id="8169" instrument_node="">On 14 September 2020, Zelenskyy approved Ukraine's new National Security Strategy, "which provides for the development of the distinctive partnership with NATO with the aim of membership in NATO."</span><sup class="reference" data-dcnode-id="8166" id="cite_ref-101"><a data-dcnode-id="8167" href="#cite_note-101"><span data-dcnode-id="8168" instrument_node="">[98]</span></a></sup><sup class="reference" data-dcnode-id="8163" id="cite_ref-102"><a data-dcnode-id="8164" href="#cite_note-102"><span data-dcnode-id="8165" instrument_node="">[99]</span></a></sup><sup class="reference" data-dcnode-id="8160" id="cite_ref-103"><a data-dcnode-id="8161" href="#cite_note-103"><span data-dcnode-id="8162" instrument_node="">[100]</span></a></sup><span data-dcnode-id="8159" instrument_node=""> On 8 October 2020, during a meeting with British Prime Minister </span><a data-dcnode-id="8157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boris_Johnson" title="Boris Johnson"><span data-dcnode-id="8158" instrument_node="">Boris Johnson</span></a><span data-dcnode-id="8156" instrument_node=""> in London, Zelenskyy stated that Ukraine needed a NATO MAP, as NATO membership will contribute to Ukraine's security and defense.</span><sup class="reference" data-dcnode-id="8153" id="cite_ref-104"><a data-dcnode-id="8154" href="#cite_note-104"><span data-dcnode-id="8155" instrument_node="">[101]</span></a></sup><span data-dcnode-id="8152" instrument_node="">
</span></p><p data-dcnode-id="8142"><span data-dcnode-id="8150" instrument_node="">On 1 December 2020, the Minister of Defense of Ukraine </span><a data-dcnode-id="8148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andriy_Taran" title="Andriy Taran"><span data-dcnode-id="8149" instrument_node="">Andriy Taran</span></a><span data-dcnode-id="8147" instrument_node=""> stated that Ukraine clearly outlines its ambitions to obtain the NATO MAP and hopes for comprehensive political and military support for such a decision at the next Alliance Summit in 2021. Addressing the ambassadors and military attaches of NATO member states, as well as representatives of the NATO office in Ukraine, they were urged to inform their capitals that Ukraine would hope for their full politico-military support in reaching such a decision at the next NATO Summit in 2021. This should be a practical step and a demonstration of commitment to the 2008 Bucharest Summit.</span><sup class="reference" data-dcnode-id="8144" id="cite_ref-bucha_105-0"><a data-dcnode-id="8145" href="#cite_note-bucha-105"><span data-dcnode-id="8146" instrument_node="">[102]</span></a></sup><span data-dcnode-id="8143" instrument_node="">
</span></p><p data-dcnode-id="8126"><span data-dcnode-id="8141" instrument_node="">At the end of November 2020, it became known that the NATO Summit in 2021 will consider the issue of returning to "open door policy", including the issue of providing </span><a data-dcnode-id="8139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Georgia_%28country%29" title="Georgia (country)"><span data-dcnode-id="8140" instrument_node="">Georgia</span></a><span data-dcnode-id="8138" instrument_node=""> with a MAP. On 9 February 2021, the Prime Minister of Ukraine, </span><a data-dcnode-id="8136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Denys_Shmyhal" title="Denys Shmyhal"><span data-dcnode-id="8137" instrument_node="">Denys Shmyhal</span></a><span data-dcnode-id="8135" instrument_node="">, stated that he hoped that Ukraine would be able to receive an action plan for NATO membership at the same time as Georgia.</span><sup class="reference" data-dcnode-id="8132" id="cite_ref-106"><a data-dcnode-id="8133" href="#cite_note-106"><span data-dcnode-id="8134" instrument_node="">[103]</span></a></sup><span data-dcnode-id="8131" instrument_node=""> In response, the NATO Secretary-General confirmed during Shmyhal's visit to Brussels that Ukraine is a candidate for NATO membership.</span><sup class="reference" data-dcnode-id="8128" id="cite_ref-kmu_107-0"><a data-dcnode-id="8129" href="#cite_note-kmu-107"><span data-dcnode-id="8130" instrument_node="">[104]</span></a></sup><span data-dcnode-id="8127" instrument_node="">
</span></p><span data-dcnode-id="8125" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8113"><div class="thumbinner" data-dcnode-id="8114" style="width:222px;"><a class="image" data-dcnode-id="8123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A%25D0%25A0%25D0%25BE%25D0%25B1%25D0%25BE%25D1%2587%25D0%25B8%25D0%25B9_%25D0%25B2%25D1%2596%25D0%25B7%25D0%25B8%25D1%2582_%25D0%259F%25D1%2580%25D0%25B5%25D0%25B7%25D0%25B8%25D0%25B4%25D0%25B5%25D0%25BD%25D1%2582%25D0%25B0_%25D0%25A3%25D0%25BA%25D1%2580%25D0%25B0%25D1%2597%25D0%25BD%25D0%25B8_%25D0%25B4%25D0%25BE_%25D0%25A2%25D1%2583%25D1%2580%25D0%25B5%25D1%2586%25D1%258C%25D0%25BA%25D0%25BE%25D1%2597_%25D0%25A0%25D0%25B5%25D1%2581%25D0%25BF%25D1%2583%25D0%25B1%25D0%25BB%25D1%2596%25D0%25BA%25D0%25B8_05.jpg"><img alt="" class="thumbimage" data-dcnode-id="8124" data-file-height="695" data-file-width="1043" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/79/%25D0%25A0%25D0%25BE%25D0%25B1%25D0%25BE%25D1%2587%25D0%25B8%25D0%25B9_%25D0%25B2%25D1%2596%25D0%25B7%25D0%25B8%25D1%2582_%25D0%259F%25D1%2580%25D0%25B5%25D0%25B7%25D0%25B8%25D0%25B4%25D0%25B5%25D0%25BD%25D1%2582%25D0%25B0_%25D0%25A3%25D0%25BA%25D1%2580%25D0%25B0%25D1%2597%25D0%25BD%25D0%25B8_%25D0%25B4%25D0%25BE_%25D0%25A2%25D1%2583%25D1%2580%25D0%25B5%25D1%2586%25D1%258C%25D0%25BA%25D0%25BE%25D1%2597_%25D0%25A0%25D0%25B5%25D1%2581%25D0%25BF%25D1%2583%25D0%25B1%25D0%25BB%25D1%2596%25D0%25BA%25D0%25B8_05.jpg/220px-%25D0%25A0%25D0%25BE%25D0%25B1%25D0%25BE%25D1%2587%25D0%25B8%25D0%25B9_%25D0%25B2%25D1%2596%25D0%25B7%25D0%25B8%25D1%2582_%25D0%259F%25D1%2580%25D0%25B5%25D0%25B7%25D0%25B8%25D0%25B4%25D0%25B5%25D0%25BD%25D1%2582%25D0%25B0_%25D0%25A3%25D0%25BA%25D1%2580%25D0%25B0%25D1%2597%25D0%25BD%25D0%25B8_%25D0%25B4%25D0%25BE_%25D0%25A2%25D1%2583%25D1%2580%25D0%25B5%25D1%2586%25D1%258C%25D0%25BA%25D0%25BE%25D1%2597_%25D0%25A0%25D0%25B5%25D1%2581%25D0%25BF%25D1%2583%25D0%25B1%25D0%25BB%25D1%2596%25D0%25BA%25D0%25B8_05.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/79/%D0%A0%D0%BE%D0%B1%D0%BE%D1%87%D0%B8%D0%B9_%D0%B2%D1%96%D0%B7%D0%B8%D1%82_%D0%9F%D1%80%D0%B5%D0%B7%D0%B8%D0%B4%D0%B5%D0%BD%D1%82%D0%B0_%D0%A3%D0%BA%D1%80%D0%B0%D1%97%D0%BD%D0%B8_%D0%B4%D0%BE_%D0%A2%D1%83%D1%80%D0%B5%D1%86%D1%8C%D0%BA%D0%BE%D1%97_%D0%A0%D0%B5%D1%81%D0%BF%D1%83%D0%B1%D0%BB%D1%96%D0%BA%D0%B8_05.jpg/330px-%D0%A0%D0%BE%D0%B1%D0%BE%D1%87%D0%B8%D0%B9_%D0%B2%D1%96%D0%B7%D0%B8%D1%82_%D0%9F%D1%80%D0%B5%D0%B7%D0%B8%D0%B4%D0%B5%D0%BD%D1%82%D0%B0_%D0%A3%D0%BA%D1%80%D0%B0%D1%97%D0%BD%D0%B8_%D0%B4%D0%BE_%D0%A2%D1%83%D1%80%D0%B5%D1%86%D1%8C%D0%BA%D0%BE%D1%97_%D0%A0%D0%B5%D1%81%D0%BF%D1%83%D0%B1%D0%BB%D1%96%D0%BA%D0%B8_05.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/79/%D0%A0%D0%BE%D0%B1%D0%BE%D1%87%D0%B8%D0%B9_%D0%B2%D1%96%D0%B7%D0%B8%D1%82_%D0%9F%D1%80%D0%B5%D0%B7%D0%B8%D0%B4%D0%B5%D0%BD%D1%82%D0%B0_%D0%A3%D0%BA%D1%80%D0%B0%D1%97%D0%BD%D0%B8_%D0%B4%D0%BE_%D0%A2%D1%83%D1%80%D0%B5%D1%86%D1%8C%D0%BA%D0%BE%D1%97_%D0%A0%D0%B5%D1%81%D0%BF%D1%83%D0%B1%D0%BB%D1%96%D0%BA%D0%B8_05.jpg/440px-%D0%A0%D0%BE%D0%B1%D0%BE%D1%87%D0%B8%D0%B9_%D0%B2%D1%96%D0%B7%D0%B8%D1%82_%D0%9F%D1%80%D0%B5%D0%B7%D0%B8%D0%B4%D0%B5%D0%BD%D1%82%D0%B0_%D0%A3%D0%BA%D1%80%D0%B0%D1%97%D0%BD%D0%B8_%D0%B4%D0%BE_%D0%A2%D1%83%D1%80%D0%B5%D1%86%D1%8C%D0%BA%D0%BE%D1%97_%D0%A0%D0%B5%D1%81%D0%BF%D1%83%D0%B1%D0%BB%D1%96%D0%BA%D0%B8_05.jpg 2x" width="220"></a><span data-dcnode-id="8122" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8115"><div class="magnify" data-dcnode-id="8120"><a class="internal" data-dcnode-id="8121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A%25D0%25A0%25D0%25BE%25D0%25B1%25D0%25BE%25D1%2587%25D0%25B8%25D0%25B9_%25D0%25B2%25D1%2596%25D0%25B7%25D0%25B8%25D1%2582_%25D0%259F%25D1%2580%25D0%25B5%25D0%25B7%25D0%25B8%25D0%25B4%25D0%25B5%25D0%25BD%25D1%2582%25D0%25B0_%25D0%25A3%25D0%25BA%25D1%2580%25D0%25B0%25D1%2597%25D0%25BD%25D0%25B8_%25D0%25B4%25D0%25BE_%25D0%25A2%25D1%2583%25D1%2580%25D0%25B5%25D1%2586%25D1%258C%25D0%25BA%25D0%25BE%25D1%2597_%25D0%25A0%25D0%25B5%25D1%2581%25D0%25BF%25D1%2583%25D0%25B1%25D0%25BB%25D1%2596%25D0%25BA%25D0%25B8_05.jpg" title="Enlarge"></a></div><span data-dcnode-id="8119" instrument_node="">Zelenskyy and Turkish President </span><a data-dcnode-id="8117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Recep_Tayyip_Erdo%25C4%259Fan" title="Recep Tayyip Erdoğan"><span data-dcnode-id="8118" instrument_node="">Recep Tayyip Erdoğan</span></a><span data-dcnode-id="8116" instrument_node=""> exchange signed documents on 16 October 2020</span></div></div></div><span data-dcnode-id="8112" instrument_node="">
</span><p data-dcnode-id="8104"><span data-dcnode-id="8111" instrument_node="">On 7 April 2021, after the start of the build-up of Russian troops near the Ukrainian border, Lithuanian Foreign Minister </span><a data-dcnode-id="8109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gabrielius_Landsbergis" title="Gabrielius Landsbergis"><span data-dcnode-id="8110" instrument_node="">Gabrielius Landsbergis</span></a><span data-dcnode-id="8108" instrument_node=""> told a press conference with his Spanish counterpart </span><a data-dcnode-id="8106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arancha_Gonz%25C3%25A1lez_Laya" title="Arancha González Laya"><span data-dcnode-id="8107" instrument_node="">Arancha González Laya</span></a><span data-dcnode-id="8105" instrument_node=""> that Lithuania intends to ask its NATO allies to provide Ukraine with a MAP:
</span></p><span data-dcnode-id="8103" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="8098"><p data-dcnode-id="8099"><span data-dcnode-id="8100" instrument_node="">In the near future, we should again turn to our colleagues with a letter to consider the possibility of granting MAP to Ukraine. I am convinced, and we have already begun to discuss this issue with our colleagues from the Baltic states, NATO could repeat its proposal to provide Ukraine with a membership plan. This step will become a "strong signal for Russia", in particular, that Ukraine has chosen the transatlantic direction for itself, is appreciated and has support in the NATO countries. – emphasized Landsbergis.</span></p></blockquote><span data-dcnode-id="8097" instrument_node="">
</span><p data-dcnode-id="8084"><span data-dcnode-id="8096" instrument_node="">For her part, the Spanish Foreign Minister, despite the fact that Ukraine is not a member of the Alliance, said that the Allies' relations with it are already "fruitful, useful and are a symbol of NATO's vision of a peaceful neighborhood." She also added that the issue of Ukraine should be discussed at the summit of the North Atlantic Alliance, which is scheduled for June this year.</span><sup class="reference" data-dcnode-id="8093" id="cite_ref-108"><a data-dcnode-id="8094" href="#cite_note-108"><span data-dcnode-id="8095" instrument_node="">[105]</span></a></sup><span data-dcnode-id="8092" instrument_node=""> Following in the footsteps of his Lithuanian counterpart, Latvian Foreign Minister </span><a data-dcnode-id="8090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edgars_Rink%25C4%2593vi%25C4%258Ds" title="Edgars Rinkēvičs"><span data-dcnode-id="8091" instrument_node="">Edgars Rinkēvičs</span></a><span data-dcnode-id="8089" instrument_node=""> said on 7 April that NATO should provide Ukraine with a MAP:</span><sup class="reference" data-dcnode-id="8086" id="cite_ref-wtn_109-0"><a data-dcnode-id="8087" href="#cite_note-wtn-109"><span data-dcnode-id="8088" instrument_node="">[106]</span></a></sup><span data-dcnode-id="8085" instrument_node="">
</span></p><span data-dcnode-id="8083" instrument_node="">
</span><link data-dcnode-id="8082" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="8079"><p data-dcnode-id="8080"><span data-dcnode-id="8081" instrument_node="">We are watching closely as Russia draws troops to Ukraine's borders. It is not clear at this time what this is: a show of force or real aggression. But there is every reason to worry ... Ukraine has been trying to join NATO for 15 years by obtaining an Membership Action Plan. Apparently, it is time to provide this Plan to Ukraine. This will be at least a signal from us [NATO] that Ukrainians will not be left without support. I will definitely support this decision...</span></p></blockquote><span data-dcnode-id="8078" instrument_node="">
</span><p data-dcnode-id="8072"><span data-dcnode-id="8077" instrument_node="">At the same April meeting, Stoltenberg said that "NATO firmly supports sovereignty and the territorial integrity of Ukraine."</span><sup class="reference" data-dcnode-id="8074" id="cite_ref-wtn_109-1"><a data-dcnode-id="8075" href="#cite_note-wtn-109"><span data-dcnode-id="8076" instrument_node="">[106]</span></a></sup><span data-dcnode-id="8073" instrument_node="">
</span></p><p data-dcnode-id="8056"><span data-dcnode-id="8071" instrument_node="">On 10 April 2021, the Minister of Defense of Ukraine </span><a data-dcnode-id="8069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andriy_Taran" title="Andriy Taran"><span data-dcnode-id="8070" instrument_node="">Andriy Taran</span></a><span data-dcnode-id="8068" instrument_node=""> stated that the top priority of the Ukrainian political leadership is to obtain the Action Plan for Membership (MAP) in the North Atlantic Alliance in 2021. According to the head of the Ukrainian Ministry of Defense, the most convincing and effective mechanism for communicating the position of the international community to Moscow is "accelerating the implementation of the decision of the 2008 NATO Bucharest Summit on our membership in the Alliance."</span><sup class="reference" data-dcnode-id="8065" id="cite_ref-110"><a data-dcnode-id="8066" href="#cite_note-110"><span data-dcnode-id="8067" instrument_node="">[107]</span></a></sup><span data-dcnode-id="8064" instrument_node=""> Also receiving the MAP for Ukraine was supported by Turkish President </span><a data-dcnode-id="8062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Recep_Tayyip_Erdo%25C4%259Fan" title="Recep Tayyip Erdoğan"><span data-dcnode-id="8063" instrument_node="">Recep Tayyip Erdogan</span></a><span data-dcnode-id="8061" instrument_node=""> in a joint declaration of the Ninth High-Level Strategic Council between Ukraine and the Republic of Turkey.</span><sup class="reference" data-dcnode-id="8058" id="cite_ref-turk_111-0"><a data-dcnode-id="8059" href="#cite_note-turk-111"><span data-dcnode-id="8060" instrument_node="">[108]</span></a></sup><span data-dcnode-id="8057" instrument_node="">
</span></p><p data-dcnode-id="8043"><span data-dcnode-id="8055" instrument_node="">At a briefing in Kyiv in May 2021, Democrat Senator </span><a data-dcnode-id="8053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chris_Murphy" title="Chris Murphy"><span data-dcnode-id="8054" instrument_node="">Chris Murphy</span></a><span data-dcnode-id="8052" instrument_node=""> said at a briefing in Kyiv following a meeting with Zelenskyy that granting Ukraine a MAP would be the next logical step toward NATO membership. He stressed that Ukraine has already made several reforms necessary to become a member of NATO, as well as to carry out additional reforms.</span><sup class="reference" data-dcnode-id="8049" id="cite_ref-murphy_112-0"><a data-dcnode-id="8050" href="#cite_note-murphy-112"><span data-dcnode-id="8051" instrument_node="">[109]</span></a></sup><span data-dcnode-id="8048" instrument_node=""> He also noted that if Ukraine and Georgia had received the MAP in 2008, there would have been no conflict with Russia at all:</span><sup class="reference" data-dcnode-id="8045" id="cite_ref-113"><a data-dcnode-id="8046" href="#cite_note-113"><span data-dcnode-id="8047" instrument_node="">[110]</span></a></sup><span data-dcnode-id="8044" instrument_node=""> Murphy stated:
</span></p><span data-dcnode-id="8042" instrument_node="">
</span><link data-dcnode-id="8041" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="8038"><p data-dcnode-id="8039"><span data-dcnode-id="8040" instrument_node="">I understand NATO's concern about the prospect of integrating with a country in conflict. But, frankly, if Ukraine and Georgia had received the MAP in 2008, I don't think there would have been a conflict at all.</span></p></blockquote><span data-dcnode-id="8037" instrument_node="">
</span><p data-dcnode-id="8031"><span data-dcnode-id="8036" instrument_node="">On 2 June, Zelenskyy called one of the potential threats that could strengthen Russia's position in Europe: the failure to give Ukraine a clear signal and specific deadlines for obtaining an MAP for NATO membership.</span><sup class="reference" data-dcnode-id="8033" id="cite_ref-114"><a data-dcnode-id="8034" href="#cite_note-114"><span data-dcnode-id="8035" instrument_node="">[111]</span></a></sup><span data-dcnode-id="8032" instrument_node="">
</span></p><p data-dcnode-id="8018"><span data-dcnode-id="8030" instrument_node="">At the June </span><a data-dcnode-id="8028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2021_Brussels_summit" title="2021 Brussels summit"><span data-dcnode-id="8029" instrument_node="">2021 Brussels summit</span></a><span data-dcnode-id="8027" instrument_node="">, NATO leaders reiterated the decision taken at the 2008 Bucharest Summit that Ukraine would become a member of the Alliance with the NATO MAP as an integral part of the process and Ukraine's right to determine its own future and foreign policy course without outside interference.</span><sup class="reference" data-dcnode-id="8024" id="cite_ref-:0_11-1"><a data-dcnode-id="8025" href="#cite_note-:0-11"><span data-dcnode-id="8026" instrument_node="">[11]</span></a></sup><span data-dcnode-id="8023" instrument_node=""> Secretary-General Stoltenberg also stressed that Russia will not be able to veto Ukraine's accession to NATO, as we will not return to the era of spheres of interest, when large countries decide what smaller ones should do:</span><sup class="reference" data-dcnode-id="8020" id="cite_ref-:1_12-1"><a data-dcnode-id="8021" href="#cite_note-:1-12"><span data-dcnode-id="8022" instrument_node="">[12]</span></a></sup><span data-dcnode-id="8019" instrument_node="">
</span></p><span data-dcnode-id="8017" instrument_node="">
</span><link data-dcnode-id="8016" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="8013"><p data-dcnode-id="8014"><span data-dcnode-id="8015" instrument_node="">Each country chooses its own path, and this also applies to joining NATO. It is up to Ukraine and the 30 NATO members to decide whether it aspires to be a member of the Alliance. Russia has no say in whether Ukraine should be a member of the Alliance. They cannot veto the decisions of their neighbors. We will not return to the era of spheres of interest, when large countries decide what to do with smaller ones.</span></p></blockquote><p data-dcnode-id="8005"><span data-dcnode-id="8012" instrument_node="">
On 28 June 2021, Ukraine and NATO forces launched joint naval drills in the Black Sea codenamed </span><i data-dcnode-id="8010"><span data-dcnode-id="8011" instrument_node="">Sea Breeze 2021</span></i><span data-dcnode-id="8009" instrument_node="">. Russia had condemned the drills, with the Russian Defence Ministry saying it would closely monitor them.</span><sup class="reference" data-dcnode-id="8006" id="cite_ref-115"><a data-dcnode-id="8007" href="#cite_note-115"><span data-dcnode-id="8008" instrument_node="">[112]</span></a></sup></p><div class="thumb tright" data-dcnode-id="7996"><div class="thumbinner" data-dcnode-id="7997" style="width:222px;"><a class="image" data-dcnode-id="8003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVolodymyr_Zelenskyi_and_Jens_Stoltenberg.jpg"><img alt="" class="thumbimage" data-dcnode-id="8004" data-file-height="695" data-file-width="1043" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Volodymyr_Zelenskyi_and_Jens_Stoltenberg.jpg/220px-Volodymyr_Zelenskyi_and_Jens_Stoltenberg.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Volodymyr_Zelenskyi_and_Jens_Stoltenberg.jpg/330px-Volodymyr_Zelenskyi_and_Jens_Stoltenberg.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Volodymyr_Zelenskyi_and_Jens_Stoltenberg.jpg/440px-Volodymyr_Zelenskyi_and_Jens_Stoltenberg.jpg 2x" width="220"></a><span data-dcnode-id="8002" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7998"><div class="magnify" data-dcnode-id="8000"><a class="internal" data-dcnode-id="8001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVolodymyr_Zelenskyi_and_Jens_Stoltenberg.jpg" title="Enlarge"></a></div><span data-dcnode-id="7999" instrument_node="">President of Ukraine Volodymyr Zelenskyy and NATO Secretary General Jens Stoltenberg. Brussels, 16 December 2021</span></div></div></div><span data-dcnode-id="7995" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7983"><div class="thumbinner" data-dcnode-id="7984" style="width:222px;"><a class="image" data-dcnode-id="7993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A210831-D-BM568-1056_%2851416775770%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="7994" data-file-height="4024" data-file-width="6048" decoding="async" height="146" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/df/210831-D-BM568-1056_%252851416775770%2529.jpg/220px-210831-D-BM568-1056_%252851416775770%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/df/210831-D-BM568-1056_%2851416775770%29.jpg/330px-210831-D-BM568-1056_%2851416775770%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/df/210831-D-BM568-1056_%2851416775770%29.jpg/440px-210831-D-BM568-1056_%2851416775770%29.jpg 2x" width="220"></a><span data-dcnode-id="7992" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7985"><div class="magnify" data-dcnode-id="7990"><a class="internal" data-dcnode-id="7991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A210831-D-BM568-1056_%2851416775770%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="7989" instrument_node="">Zelenskyy and U.S. Secretary of Defense </span><a data-dcnode-id="7987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lloyd_Austin" title="Lloyd Austin"><span data-dcnode-id="7988" instrument_node="">Lloyd Austin</span></a><span data-dcnode-id="7986" instrument_node=""> on 31 August 2021</span></div></div></div><span data-dcnode-id="7982" instrument_node="">
</span><p data-dcnode-id="7976"><span data-dcnode-id="7981" instrument_node="">On 28 November Ukraine warned that Russia had massed nearly 92,000 troops near its borders, and speculated that Putin intended an offensive at the end of January or early February. Russia accused Ukraine of a military build-up of its own, and demanded "legal guarantees" that it would never join NATO.</span><sup class="reference" data-dcnode-id="7978" id="cite_ref-ndtv_116-0"><a data-dcnode-id="7979" href="#cite_note-ndtv-116"><span data-dcnode-id="7980" instrument_node="">[113]</span></a></sup><span data-dcnode-id="7977" instrument_node="">
</span></p><p data-dcnode-id="7944"><span data-dcnode-id="7975" instrument_node="">On 30 November Putin stated that an expansion of NATO's presence in Ukraine, especially the deployment of any </span><a data-dcnode-id="7973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ballistic_missile" title="Ballistic missile"><span data-dcnode-id="7974" instrument_node="">long-range missiles</span></a><span data-dcnode-id="7972" instrument_node=""> capable of striking Moscow or </span><a data-dcnode-id="7970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_national_missile_defense" title="United States national missile defense"><span data-dcnode-id="7971" instrument_node="">missile defence systems</span></a><span data-dcnode-id="7969" instrument_node=""> similar to those in Romania and Poland, would be a "red line" issue for the Kremlin. Putin argued that these missile-defense systems may be converted into launchers of offensive </span><a data-dcnode-id="7967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tomahawk_%28missile%29" title="Tomahawk (missile)"><span data-dcnode-id="7968" instrument_node="">Tomahawk</span></a><span data-dcnode-id="7966" instrument_node=""> long-range cruise missiles.</span><sup class="reference" data-dcnode-id="7963" id="cite_ref-guard30_117-0"><a data-dcnode-id="7964" href="#cite_note-guard30-117"><span data-dcnode-id="7965" instrument_node="">[114]</span></a></sup><sup class="reference" data-dcnode-id="7960" id="cite_ref-drive_118-0"><a data-dcnode-id="7961" href="#cite_note-drive-118"><span data-dcnode-id="7962" instrument_node="">[115]</span></a></sup><sup class="reference" data-dcnode-id="7957" id="cite_ref-punato_119-0"><a data-dcnode-id="7958" href="#cite_note-punato-119"><span data-dcnode-id="7959" instrument_node="">[116]</span></a></sup><span data-dcnode-id="7956" instrument_node=""> He said that "In a dialogue with the United States and its allies, we will insist on working out specific agreements that would exclude any further NATO moves eastward and the deployment of weapons systems that threaten us in close vicinity to Russian territory."</span><sup class="reference" data-dcnode-id="7953" id="cite_ref-usnews_120-0"><a data-dcnode-id="7954" href="#cite_note-usnews-120"><span data-dcnode-id="7955" instrument_node="">[117]</span></a></sup><span data-dcnode-id="7952" instrument_node=""> Stoltenberg replied that "It's only Ukraine and 30 NATO allies that decide when Ukraine is ready to join NATO. Russia has no veto, Russia has no say, and Russia has no right to establish a sphere of influence to try to control their neighbors."</span><sup class="reference" data-dcnode-id="7949" id="cite_ref-axios_121-0"><a data-dcnode-id="7950" href="#cite_note-axios-121"><span data-dcnode-id="7951" instrument_node="">[118]</span></a></sup><sup class="reference" data-dcnode-id="7946" id="cite_ref-bbcuk_122-0"><a data-dcnode-id="7947" href="#cite_note-bbcuk-122"><span data-dcnode-id="7948" instrument_node="">[119]</span></a></sup><span data-dcnode-id="7945" instrument_node="">
</span></p><p data-dcnode-id="7938"><span data-dcnode-id="7943" instrument_node="">On 17 December, Russia put forward proposals to limit US and NATO influence on former Soviet states.</span><sup class="reference" data-dcnode-id="7940" id="cite_ref-ndtv_116-1"><a data-dcnode-id="7941" href="#cite_note-ndtv-116"><span data-dcnode-id="7942" instrument_node="">[113]</span></a></sup><span data-dcnode-id="7939" instrument_node="">
</span></p><p data-dcnode-id="7929"><span data-dcnode-id="7937" instrument_node="">On 11 January 2022, it became known that a group of Republican congressmen intended to introduce a bill declaring Ukraine a NATO-plus country and initiating a review of the advisability of declaring Russia a state sponsor of terrorism. The authors of the bill argue that recognizing Ukraine as a "NATO+ country" will make it possible to quickly make decisions on the provision and sale of American defense goods and services to Ukraine. In particular, according to Mike Rogers, co-author of the bill, this rule concerns the provision of anti-ship and air defense systems. In addition, this bill proposes to create a mechanism for the rapid imposition of sanctions against </span><a data-dcnode-id="7935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nord_Stream_2" title="Nord Stream 2"><span data-dcnode-id="7936" instrument_node="">Nord Stream 2</span></a><span data-dcnode-id="7934" instrument_node=""> in the event of a full-scale Russian invasion of Ukraine. The authors of the bill are convinced that in this way they will forever block the commissioning of the pipeline. Also, if adopted, the United States is obliged to consider and vote on whether to grant Russia the status of a "country-sponsor of international terrorism."</span><sup class="reference" data-dcnode-id="7931" id="cite_ref-golos_123-0"><a data-dcnode-id="7932" href="#cite_note-golos-123"><span data-dcnode-id="7933" instrument_node="">[120]</span></a></sup><span data-dcnode-id="7930" instrument_node="">
</span></p><p data-dcnode-id="7924"><span data-dcnode-id="7928" instrument_node="">On 14 January </span><a data-dcnode-id="7926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andriy_Yermak" title="Andriy Yermak"><span data-dcnode-id="7927" instrument_node="">Andrii Yermak</span></a><span data-dcnode-id="7925" instrument_node="">, Chairman of the Office of the President of Ukraine, praised the preparation of sanctions in the event of a Russian invasion, but warned that such an invasion "would be a great tragedy." He also said that the Ukrainian authorities hope to hear specific conditions for joining the North Atlantic Alliance:
</span></p><span data-dcnode-id="7923" instrument_node="">
</span><link data-dcnode-id="7922" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="7919"><p data-dcnode-id="7920"><span data-dcnode-id="7921" instrument_node="">Ukraine has shown to its principles and positions that we are fully prepared and able to be a member of NATO. This means that at the Madrid summit this year we hope to see and hear very specific conditions and information about this, because today, especially today, I would like to repeat that now this is a matter of life and death for our country.</span></p></blockquote><span data-dcnode-id="7918" instrument_node="">
</span><p data-dcnode-id="7908"><span data-dcnode-id="7917" instrument_node="">On 17 January Russian troops joined their Belarusian counterparts for an exercise aimed at "thwarting external aggression".</span><sup class="reference" data-dcnode-id="7914" id="cite_ref-ndtv_116-2"><a data-dcnode-id="7915" href="#cite_note-ndtv-116"><span data-dcnode-id="7916" instrument_node="">[113]</span></a></sup><span data-dcnode-id="7913" instrument_node=""> The exercise began on 10 February.</span><sup class="reference" data-dcnode-id="7910" id="cite_ref-ndtv_116-3"><a data-dcnode-id="7911" href="#cite_note-ndtv-116"><span data-dcnode-id="7912" instrument_node="">[113]</span></a></sup><span data-dcnode-id="7909" instrument_node="">
</span></p><p data-dcnode-id="7899"><span data-dcnode-id="7907" instrument_node="">On 25 January papers a NATO response was prepared which "firmly ruled out Moscow's core demand against further NATO expansion." Russia sought an end to NATO's "long-standing open-door policy for new member countries" and that it remove troops and equipment from Eastern Europe. </span><a data-dcnode-id="7905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dmitry_Peskov" title="Dmitry Peskov"><span data-dcnode-id="7906" instrument_node="">Dmitry Peskov</span></a><span data-dcnode-id="7904" instrument_node=""> said that "before there is any understanding of how we will continue, we need to get the text."</span><sup class="reference" data-dcnode-id="7901" id="cite_ref-wapo25_124-0"><a data-dcnode-id="7902" href="#cite_note-wapo25-124"><span data-dcnode-id="7903" instrument_node="">[121]</span></a></sup><span data-dcnode-id="7900" instrument_node="">
</span></p><p data-dcnode-id="7893"><span data-dcnode-id="7898" instrument_node="">On 27 January NATO submitted a proposal to Russia for the security of the latter, "that dismissed Moscow's central demands."</span><sup class="reference" data-dcnode-id="7895" id="cite_ref-wapo27_125-0"><a data-dcnode-id="7896" href="#cite_note-wapo27-125"><span data-dcnode-id="7897" instrument_node="">[122]</span></a></sup><span data-dcnode-id="7894" instrument_node="">
</span></p><p data-dcnode-id="7887"><span data-dcnode-id="7892" instrument_node="">On 28 January Putin said the West has ignored "Russia's fundamental concerns" on NATO's expansion and said that NATO had "strike weapons systems near Russia's borders".</span><sup class="reference" data-dcnode-id="7889" id="cite_ref-ndtv_116-4"><a data-dcnode-id="7890" href="#cite_note-ndtv-116"><span data-dcnode-id="7891" instrument_node="">[113]</span></a></sup><span data-dcnode-id="7888" instrument_node="">
</span></p><p data-dcnode-id="7862"><span data-dcnode-id="7886" instrument_node="">On 31 January at a tense meeting of the </span><a class="mw-redirect" data-dcnode-id="7884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UN_Security_Council" title="UN Security Council"><span data-dcnode-id="7885" instrument_node="">UN Security Council</span></a><span data-dcnode-id="7883" instrument_node="">, the </span><i data-dcnode-id="7880"><a class="mw-redirect" data-dcnode-id="7881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Washington_Post" title="Washington Post"><span data-dcnode-id="7882" instrument_node="">Washington Post</span></a></i><span data-dcnode-id="7879" instrument_node=""> reported that "Russia has demanded a Western commitment to exclude Ukraine from its security umbrella and the removal of NATO forces and equipment from Eastern Europe and the Baltic States" and according to Ambassador </span><a data-dcnode-id="7877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Linda_Thomas-Greenfield" title="Linda Thomas-Greenfield"><span data-dcnode-id="7878" instrument_node="">Linda Thomas-Greenfield</span></a><span data-dcnode-id="7876" instrument_node=""> "has threatened to take military action should its demands not be met." Ambassador </span><a data-dcnode-id="7874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vasily_Nebenzya" title="Vasily Nebenzya"><span data-dcnode-id="7875" instrument_node="">Vasily Nebenzya</span></a><span data-dcnode-id="7873" instrument_node=""> denied any plans for invasion and said Russia was within its rights to station troops anywhere within its own territory. He stated "Not a single Russian politician, not a single public figure, not a single person said that we are planning to attack Ukraine." On the same day Russian Foreign Minister </span><a class="mw-redirect" data-dcnode-id="7871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sergei_Lavrov" title="Sergei Lavrov"><span data-dcnode-id="7872" instrument_node="">Sergei Lavrov</span></a><span data-dcnode-id="7870" instrument_node=""> said "The main question is our clear message that we consider further NATO expansion to the East and weapons deployment, which can threaten the Russian Federation, unacceptable." Stoltenberg said "Russia has used military exercises before as a disguise, as a cover... military buildup, exercises, threatening rhetoric and a track record... all of that together, of course, make this a serious threat."</span><sup class="reference" data-dcnode-id="7867" id="cite_ref-wapo31_126-0"><a data-dcnode-id="7868" href="#cite_note-wapo31-126"><span data-dcnode-id="7869" instrument_node="">[123]</span></a></sup><sup class="reference" data-dcnode-id="7864" id="cite_ref-unsc8960_127-0"><a data-dcnode-id="7865" href="#cite_note-unsc8960-127"><span data-dcnode-id="7866" instrument_node="">[124]</span></a></sup><span data-dcnode-id="7863" instrument_node="">
</span></p><p data-dcnode-id="7856"><span data-dcnode-id="7861" instrument_node="">On 16 February, NATO's commanders were instructed by Secretary-General Stoltenberg to work out the details of a battlegroup deployment to the alliance's southeastern flank because there were no signs of a Russian de-escalation yet.</span><sup class="reference" data-dcnode-id="7858" id="cite_ref-128"><a data-dcnode-id="7859" href="#cite_note-128"><span data-dcnode-id="7860" instrument_node="">[125]</span></a></sup><span data-dcnode-id="7857" instrument_node="">
</span></p><p data-dcnode-id="7844"><span data-dcnode-id="7855" instrument_node="">On 19 February at the </span><a data-dcnode-id="7853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Munich_Security_Conference" title="Munich Security Conference"><span data-dcnode-id="7854" instrument_node="">Munich Security Conference</span></a><span data-dcnode-id="7852" instrument_node=""> Stoltenberg remarked that despite NATO's "strong diplomatic efforts to find a political solution [to the Ukrainian crisis]... we have seen no sign of withdrawal or de-escalation so far. On the contrary, Russia’s build-up continues." He said "we have made written proposals to the Putin administration to reduce risks and increase transparency of military activities, address space and cyber threats, and engage on arms control, including on nuclear weapons and missiles... [Putin] is attempting to roll back history. And recreate [the] spheres of influence. [He] wants to limit NATO’s right to collective defence... and demands that we should remove all our forces and infrastructure from the countries that joined NATO after the fall of the Berlin Wall... wants to deny sovereign countries the right to choose their own path. And their own security arrangements. For Ukraine – but also for other countries, such as Finland and Sweden. And for the first time, we now see Beijing joining Moscow in calling on NATO to stop admitting new members. It is an attempt to control the fate of free nations. To rewrite the international rulebook. And impose their own authoritarian models of governance."</span><sup class="reference" data-dcnode-id="7849" id="cite_ref-jsmun22_129-0"><a data-dcnode-id="7850" href="#cite_note-jsmun22-129"><span data-dcnode-id="7851" instrument_node="">[126]</span></a></sup><span data-dcnode-id="7848" instrument_node=""> On the dais with him was </span><a data-dcnode-id="7846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ursula_von_der_Leyen" title="Ursula von der Leyen"><span data-dcnode-id="7847" instrument_node="">Ursula von der Leyen</span></a><span data-dcnode-id="7845" instrument_node="">. Together they proceeded to give an interview to the witness audience.
</span></p><p data-dcnode-id="7838"><span data-dcnode-id="7843" instrument_node="">On 20 February, France and Germany called on their nationals to leave Ukraine.</span><sup class="reference" data-dcnode-id="7840" id="cite_ref-ndtv_116-5"><a data-dcnode-id="7841" href="#cite_note-ndtv-116"><span data-dcnode-id="7842" instrument_node="">[113]</span></a></sup><span data-dcnode-id="7839" instrument_node="">
</span></p><span data-dcnode-id="7837" instrument_node="">
</span><h3 data-dcnode-id="7827"><span class="mw-headline" data-dcnode-id="7835" id="Invasion_of_Ukraine"><span data-dcnode-id="7836" instrument_node="">Invasion of Ukraine</span></span><span class="mw-editsection" data-dcnode-id="7828"><span class="mw-editsection-bracket" data-dcnode-id="7833"><span data-dcnode-id="7834" instrument_node="">[</span></span><a data-dcnode-id="7831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUkraine%25E2%2580%2593NATO_relations%26action%3Dedit%26section%3D10" title="Edit section: Invasion of Ukraine"><span data-dcnode-id="7832" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7829"><span data-dcnode-id="7830" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7826" instrument_node="">
</span><p data-dcnode-id="7791"><a data-dcnode-id="7824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prelude_to_the_2022_Russian_invasion_of_Ukraine" title="Prelude to the 2022 Russian invasion of Ukraine"><span data-dcnode-id="7825" instrument_node="">Amid rising tensions between Russia and Ukraine in early 2022</span></a><span data-dcnode-id="7823" instrument_node="">, the </span><a class="mw-redirect" data-dcnode-id="7821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federation_Council" title="Federation Council"><span data-dcnode-id="7822" instrument_node="">Federation Council</span></a><span data-dcnode-id="7820" instrument_node=""> of Russia recognised the Luhansk and Donetsk people's republics on 22 February 2022,</span><sup class="reference" data-dcnode-id="7817" id="cite_ref-theguardian1_130-0"><a data-dcnode-id="7818" href="#cite_note-theguardian1-130"><span data-dcnode-id="7819" instrument_node="">[127]</span></a></sup><sup class="reference" data-dcnode-id="7814" id="cite_ref-tass_131-0"><a data-dcnode-id="7815" href="#cite_note-tass-131"><span data-dcnode-id="7816" instrument_node="">[128]</span></a></sup><span data-dcnode-id="7813" instrument_node=""> after on 16 February the </span><a data-dcnode-id="7811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/State_Duma" title="State Duma"><span data-dcnode-id="7812" instrument_node="">State Duma</span></a><span data-dcnode-id="7810" instrument_node=""> called on Putin to recognize the breakaway territories,</span><sup class="reference" data-dcnode-id="7807" id="cite_ref-rfeapp_132-0"><a data-dcnode-id="7808" href="#cite_note-rfeapp-132"><span data-dcnode-id="7809" instrument_node="">[129]</span></a></sup><span data-dcnode-id="7806" instrument_node=""> the deputies passing the motion 351 to 16.</span><sup class="reference" data-dcnode-id="7803" id="cite_ref-133"><a data-dcnode-id="7804" href="#cite_note-133"><span data-dcnode-id="7805" instrument_node="">[130]</span></a></sup><span data-dcnode-id="7802" instrument_node=""> On 21 February Putin signed decrees to recognize two self-proclaimed entities in the temporarily occupied territories of </span><a data-dcnode-id="7800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Donetsk" title="Donetsk"><span data-dcnode-id="7801" instrument_node="">Donetsk</span></a><span data-dcnode-id="7799" instrument_node=""> and </span><a data-dcnode-id="7797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Luhansk" title="Luhansk"><span data-dcnode-id="7798" instrument_node="">Luhansk</span></a><span data-dcnode-id="7796" instrument_node=""> regions of Ukraine."</span><sup class="reference" data-dcnode-id="7793" id="cite_ref-bukrinf_134-0"><a data-dcnode-id="7794" href="#cite_note-bukrinf-134"><span data-dcnode-id="7795" instrument_node="">[131]</span></a></sup><span data-dcnode-id="7792" instrument_node="">
</span></p><p data-dcnode-id="7781"><span data-dcnode-id="7790" instrument_node="">On 21 February Zelenskiy had accused Putin of "wrecking peace talks and ruled out making any territorial concessions".</span><sup class="reference" data-dcnode-id="7787" id="cite_ref-theguardian1_130-1"><a data-dcnode-id="7788" href="#cite_note-theguardian1-130"><span data-dcnode-id="7789" instrument_node="">[127]</span></a></sup><span data-dcnode-id="7786" instrument_node=""> The same day, Stoltenberg advised Russia "in the strongest possible terms, to choose the path of diplomacy, and to immediately reverse its massive military build-up in and around Ukraine."</span><sup class="reference" data-dcnode-id="7783" id="cite_ref-slprdpr_135-0"><a data-dcnode-id="7784" href="#cite_note-slprdpr-135"><span data-dcnode-id="7785" instrument_node="">[132]</span></a></sup><span data-dcnode-id="7782" instrument_node="">
</span></p><p data-dcnode-id="7765"><span data-dcnode-id="7780" instrument_node="">Also on 22 February 2022, Russian president </span><a data-dcnode-id="7778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vladimir_Putin" title="Vladimir Putin"><span data-dcnode-id="7779" instrument_node="">Vladimir Putin</span></a><span data-dcnode-id="7777" instrument_node=""> declared that the </span><a class="mw-redirect" data-dcnode-id="7775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Minsk_Agreements" title="Minsk Agreements"><span data-dcnode-id="7776" instrument_node="">Minsk Agreements</span></a><span data-dcnode-id="7774" instrument_node=""> "no longer existed", and that Ukraine, not Russia, was to blame for their collapse.</span><sup class="reference" data-dcnode-id="7771" id="cite_ref-fgfg56_136-0"><a data-dcnode-id="7772" href="#cite_note-fgfg56-136"><span data-dcnode-id="7773" instrument_node="">[133]</span></a></sup><span data-dcnode-id="7770" instrument_node=""> Stoltenberg condemned Putin's declaration: "This further undermines Ukraine’s sovereignty and territorial integrity, erodes efforts towards a resolution of the conflict, and violates the Minsk agreements, to which Russia is a party."</span><sup class="reference" data-dcnode-id="7767" id="cite_ref-theguardian1_130-2"><a data-dcnode-id="7768" href="#cite_note-theguardian1-130"><span data-dcnode-id="7769" instrument_node="">[127]</span></a></sup><span data-dcnode-id="7766" instrument_node="">
</span></p><p data-dcnode-id="7756"><span data-dcnode-id="7764" instrument_node="">On 24 February 2022 Russia </span><a data-dcnode-id="7762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2022_Russian_invasion_of_Ukraine" title="2022 Russian invasion of Ukraine"><span data-dcnode-id="7763" instrument_node="">invaded Ukraine</span></a><span data-dcnode-id="7761" instrument_node=""> again.</span><sup class="reference" data-dcnode-id="7758" id="cite_ref-sdsds44_137-0"><a data-dcnode-id="7759" href="#cite_note-sdsds44-137"><span data-dcnode-id="7760" instrument_node="">[134]</span></a></sup><span data-dcnode-id="7757" instrument_node="">
</span></p><p data-dcnode-id="7744"><span data-dcnode-id="7755" instrument_node="">On 1 March Stoltenberg convinced the </span><a data-dcnode-id="7753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andrzej_Duda" title="Andrzej Duda"><span data-dcnode-id="7754" instrument_node="">President of Poland</span></a><span data-dcnode-id="7752" instrument_node=""> to forgo sending any fighter aircraft to Ukraine because of the risk of attracting Russian attacks onto its territory, which would likely cause NATO to invoke Article 5 of its constitution.</span><sup class="reference" data-dcnode-id="7749" id="cite_ref-eurm29_138-0"><a data-dcnode-id="7750" href="#cite_note-eurm29-138"><span data-dcnode-id="7751" instrument_node="">[135]</span></a></sup><sup class="reference" data-dcnode-id="7746" id="cite_ref-polim29_139-0"><a data-dcnode-id="7747" href="#cite_note-polim29-139"><span data-dcnode-id="7748" instrument_node="">[136]</span></a></sup><span data-dcnode-id="7745" instrument_node="">
