_node="">
</span><p data-dcnode-id="9602"><span data-dcnode-id="9679" instrument_node="">Relations between </span><a data-dcnode-id="9677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukraine" title="Ukraine"><span data-dcnode-id="9678" instrument_node="">Ukraine</span></a><span data-dcnode-id="9676" instrument_node=""> and the </span><a data-dcnode-id="9674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="9675" instrument_node="">North Atlantic Treaty Organization</span></a><span data-dcnode-id="9673" instrument_node=""> (NATO) started in 1992.</span><sup class="reference" data-dcnode-id="9670" id="cite_ref-natoppf_1-0"><a data-dcnode-id="9671" href="#cite_note-natoppf-1"><span data-dcnode-id="9672" instrument_node="">[1]</span></a></sup><span data-dcnode-id="9669" instrument_node=""> Ukraine applied to integrate with a </span><a class="mw-redirect" data-dcnode-id="9667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO_Membership_Action_Plan" title="NATO Membership Action Plan"><span data-dcnode-id="9668" instrument_node="">NATO Membership Action Plan</span></a><span data-dcnode-id="9666" instrument_node=""> (MAP) in 2008.</span><sup class="reference" data-dcnode-id="9663" id="cite_ref-2"><a data-dcnode-id="9664" href="#cite_note-2"><span data-dcnode-id="9665" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="9660" id="cite_ref-3"><a data-dcnode-id="9661" href="#cite_note-3"><span data-dcnode-id="9662" instrument_node="">[3]</span></a></sup><span data-dcnode-id="9659" instrument_node=""> Plans for NATO membership were shelved by Ukraine following the </span><a data-dcnode-id="9657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2010_Ukrainian_presidential_election" title="2010 Ukrainian presidential election"><span data-dcnode-id="9658" instrument_node="">2010 presidential election</span></a><span data-dcnode-id="9656" instrument_node=""> in which </span><a data-dcnode-id="9654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Viktor_Yanukovych" title="Viktor Yanukovych"><span data-dcnode-id="9655" instrument_node="">Viktor Yanukovych</span></a><span data-dcnode-id="9653" instrument_node="">, who preferred to keep the country non-aligned, was elected </span><a data-dcnode-id="9651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/President_of_Ukraine" title="President of Ukraine"><span data-dcnode-id="9652" instrument_node="">President</span></a><span data-dcnode-id="9650" instrument_node="">.</span><sup class="reference" data-dcnode-id="9647" id="cite_ref-4"><a data-dcnode-id="9648" href="#cite_note-4"><span data-dcnode-id="9649" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="9644" id="cite_ref-glo_5-0"><a data-dcnode-id="9645" href="#cite_note-glo-5"><span data-dcnode-id="9646" instrument_node="">[5]</span></a></sup><span data-dcnode-id="9643" instrument_node=""> Amid the </span><a data-dcnode-id="9641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Euromaidan" title="Euromaidan"><span data-dcnode-id="9642" instrument_node="">Euromaidan</span></a><span data-dcnode-id="9640" instrument_node=""> unrest, Yanukovych fled Ukraine in February 2014.</span><sup class="reference" data-dcnode-id="9637" id="cite_ref-result_of_Russia_UNR_6-0"><a data-dcnode-id="9638" href="#cite_note-result_of_Russia_UNR-6"><span data-dcnode-id="9639" instrument_node="">[6]</span></a></sup><span data-dcnode-id="9636" instrument_node=""> The interim </span><a data-dcnode-id="9634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Yatsenyuk_government" title="First Yatsenyuk government"><span data-dcnode-id="9635" instrument_node="">Yatseniuk Government</span></a><span data-dcnode-id="9633" instrument_node=""> which came to power initially said, with reference to the country's non-aligned status, that it had no plans to join NATO.</span><sup class="reference" data-dcnode-id="9630" id="cite_ref-NNUIU29314_7-0"><a data-dcnode-id="9631" href="#cite_note-NNUIU29314-7"><span data-dcnode-id="9632" instrument_node="">[7]</span></a></sup><span data-dcnode-id="9629" instrument_node=""> However, following the </span><a data-dcnode-id="9627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russo-Ukrainian_War" title="Russo-Ukrainian War"><span data-dcnode-id="9628" instrument_node="">Russian military invasion in Ukraine</span></a><span data-dcnode-id="9626" instrument_node=""> and </span><a data-dcnode-id="9624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2014_Ukrainian_parliamentary_election" title="2014 Ukrainian parliamentary election"><span data-dcnode-id="9625" instrument_node="">parliamentary elections</span></a><span data-dcnode-id="9623" instrument_node=""> in October 2014, the new government made joining NATO a priority.</span><sup class="reference" data-dcnode-id="9620" id="cite_ref-rferl.org_8-0"><a data-dcnode-id="9621" href="#cite_note-rferl.org-8"><span data-dcnode-id="9622" instrument_node="">[8]</span></a></sup><span data-dcnode-id="9619" instrument_node=""> On 21 February 2019, the </span><a data-dcnode-id="9617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitution_of_Ukraine" title="Constitution of Ukraine"><span data-dcnode-id="9618" instrument_node="">Constitution of Ukraine</span></a><span data-dcnode-id="9616" instrument_node=""> was amended, the norms on the strategic course of Ukraine for membership in the </span><a data-dcnode-id="9614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union" title="European Union"><span data-dcnode-id="9615" instrument_node="">European Union</span></a><span data-dcnode-id="9613" instrument_node=""> and </span><a data-dcnode-id="9611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="9612" instrument_node="">NATO</span></a><span data-dcnode-id="9610" instrument_node=""> are enshrined in the preamble of the Basic Law, three articles and transitional provisions.</span><sup class="reference" data-dcnode-id="9607" id="cite_ref-9"><a data-dcnode-id="9608" href="#cite_note-9"><span data-dcnode-id="9609" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="9604" id="cite_ref-10"><a data-dcnode-id="9605" href="#cite_note-10"><span data-dcnode-id="9606" instrument_node="">[10]</span></a></sup><span data-dcnode-id="9603" instrument_node="">
</span></p><p data-dcnode-id="9577"><span data-dcnode-id="9601" instrument_node="">At the June </span><a data-dcnode-id="9599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2021_Brussels_summit" title="2021 Brussels summit"><span data-dcnode-id="9600" instrument_node="">2021 Brussels summit</span></a><span data-dcnode-id="9598" instrument_node="">, NATO leaders reiterated the decision taken at the </span><a data-dcnode-id="9596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2008_Bucharest_summit" title="2008 Bucharest summit"><span data-dcnode-id="9597" instrument_node="">2008 Bucharest summit</span></a><span data-dcnode-id="9595" instrument_node=""> that Ukraine would become a member of the Alliance with the MAP as an integral part of the process and Ukraine's right to determine its future and foreign policy, of course without outside interference.</span><sup class="reference" data-dcnode-id="9592" id="cite_ref-:0_11-0"><a data-dcnode-id="9593" href="#cite_note-:0-11"><span data-dcnode-id="9594" instrument_node="">[11]</span></a></sup><span data-dcnode-id="9591" instrument_node=""> </span><a data-dcnode-id="9589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Secretary_General_of_NATO" title="Secretary General of NATO"><span data-dcnode-id="9590" instrument_node="">NATO Secretary General</span></a><span data-dcnode-id="9588" instrument_node=""> </span><a data-dcnode-id="9586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jens_Stoltenberg" title="Jens Stoltenberg"><span data-dcnode-id="9587" instrument_node="">Jens Stoltenberg</span></a><span data-dcnode-id="9585" instrument_node=""> also stressed that Russia will not be able to veto Ukraine's accession to NATO "as we will not return to the era of </span><a data-dcnode-id="9583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sphere_of_influence" title="Sphere of influence"><span data-dcnode-id="9584" instrument_node="">spheres of interest</span></a><span data-dcnode-id="9582" instrument_node="">, when large countries decide what smaller ones should do."</span><sup class="reference" data-dcnode-id="9579" id="cite_ref-:1_12-0"><a data-dcnode-id="9580" href="#cite_note-:1-12"><span data-dcnode-id="9581" instrument_node="">[12]</span></a></sup><span data-dcnode-id="9578" instrument_node="">
</span></p><p data-dcnode-id="9572"><span data-dcnode-id="9576" instrument_node="">Before further actions on NATO membership were taken </span><a data-dcnode-id="9574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2022_Russian_invasion_of_Ukraine" title="2022 Russian invasion of Ukraine"><span data-dcnode-id="9575" instrument_node="">Ukraine was invaded by Russia on 24 February 2022</span></a><span data-dcnode-id="9573" instrument_node="">.
</span></p><p data-dcnode-id="9525"><span data-dcnode-id="9571" instrument_node="">According to polls conducted between 2005 and 2013, Ukrainian public support of NATO membership remained low.</span><sup class="reference" data-dcnode-id="9568" id="cite_ref-13"><a data-dcnode-id="9569" href="#cite_note-13"><span data-dcnode-id="9570" instrument_node="">[13]</span></a></sup><sup class="reference" data-dcnode-id="9565" id="cite_ref-14"><a data-dcnode-id="9566" href="#cite_note-14"><span data-dcnode-id="9567" instrument_node="">[14]</span></a></sup><sup class="reference" data-dcnode-id="9562" id="cite_ref-unian_15-0"><a data-dcnode-id="9563" href="#cite_note-unian-15"><span data-dcnode-id="9564" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="9559" id="cite_ref-16"><a data-dcnode-id="9560" href="#cite_note-16"><span data-dcnode-id="9561" instrument_node="">[16]</span></a></sup><sup class="reference" data-dcnode-id="9556" id="cite_ref-17"><a data-dcnode-id="9557" href="#cite_note-17"><span data-dcnode-id="9558" instrument_node="">[17]</span></a></sup><sup class="reference" data-dcnode-id="9553" id="cite_ref-18"><a data-dcnode-id="9554" href="#cite_note-18"><span data-dcnode-id="9555" instrument_node="">[18]</span></a></sup><sup class="reference" data-dcnode-id="9550" id="cite_ref-Gallup52010_19-0"><a data-dcnode-id="9551" href="#cite_note-Gallup52010-19"><span data-dcnode-id="9552" instrument_node="">[19]</span></a></sup><span data-dcnode-id="9549" instrument_node=""> However, since the </span><a data-dcnode-id="9547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russo-Ukrainian_War" title="Russo-Ukrainian War"><span data-dcnode-id="9548" instrument_node="">Russo-Ukrainian War</span></a><span data-dcnode-id="9546" instrument_node=""> and </span><a data-dcnode-id="9544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Annexation_of_Crimea_by_the_Russian_Federation" title="Annexation of Crimea by the Russian Federation"><span data-dcnode-id="9545" instrument_node="">Annexation of Crimea</span></a><span data-dcnode-id="9543" instrument_node="">, public support for Ukrainian membership in NATO has risen greatly. Since June 2014, polls showed that about 50% of those asked supported Ukrainian NATO membership.</span><sup class="reference" data-dcnode-id="9540" id="cite_ref-BsfNOTAaWiDa_20-0"><a data-dcnode-id="9541" href="#cite_note-BsfNOTAaWiDa-20"><span data-dcnode-id="9542" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="9537" id="cite_ref-BsfNOTAaWiDb_21-0"><a data-dcnode-id="9538" href="#cite_note-BsfNOTAaWiDb-21"><span data-dcnode-id="9539" instrument_node="">[21]</span></a></sup><sup class="reference" data-dcnode-id="9534" id="cite_ref-PUNR4215_22-0"><a data-dcnode-id="9535" href="#cite_note-PUNR4215-22"><span data-dcnode-id="9536" instrument_node="">[22]</span></a></sup><sup class="reference" data-dcnode-id="9531" id="cite_ref-M16UNp_23-0"><a data-dcnode-id="9532" href="#cite_note-M16UNp-23"><span data-dcnode-id="9533" instrument_node="">[23]</span></a></sup><span data-dcnode-id="9530" instrument_node=""> Some 69% of Ukrainians want to join NATO, according to a June 2017 poll by the Democratic Initiatives Foundation, compared to 28% support in 2012 when Yanukovych was in power.</span><sup class="reference" data-dcnode-id="9527" id="cite_ref-R1707_24-0"><a data-dcnode-id="9528" href="#cite_note-R1707-24"><span data-dcnode-id="9529" instrument_node="">[24]</span></a></sup><span data-dcnode-id="9526" instrument_node="">

</span><h3 data-dcnode-id="9334"><span data-dcnode-id="9344" id="Presidency_of_Leonid_Kravchuk_.281991.E2.80.931994.29"></span><span class="mw-headline" data-dcnode-id="9342" id="Presidency_of_Leonid_Kravchuk_(1991–1994)"><span data-dcnode-id="9343" instrument_node="">Presidency of Leonid Kravchuk (1991–1994)</span></span><span class="mw-editsection" data-dcnode-id="9335"><span class="mw-editsection-bracket" data-dcnode-id="9340"><span data-dcnode-id="9341" instrument_node="">[</span></span><a data-dcnode-id="9338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUkraine%25E2%2580%2593NATO_relations%26action%3Dedit%26section%3D2" title="Edit section: Presidency of Leonid Kravchuk (1991–1994)"><span data-dcnode-id="9339" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9336"><span data-dcnode-id="9337" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9333" instrument_node="">
</span><p data-dcnode-id="9316"><span data-dcnode-id="9332" instrument_node="">Relations between Ukraine and NATO were formally established in 1992, when Ukraine joined the North Atlantic Cooperation Council after regaining its independence, later renamed the Euro-Atlantic Partnership Council.</span><sup class="reference" data-dcnode-id="9329" id="cite_ref-nevoukr_25-0"><a data-dcnode-id="9330" href="#cite_note-nevoukr-25"><span data-dcnode-id="9331" instrument_node="">[25]</span></a></sup><span data-dcnode-id="9328" instrument_node=""> On 22 and 23 February 1992, NATO Secretary-General </span><a data-dcnode-id="9326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manfred_W%25C3%25B6rner" title="Manfred Wörner"><span data-dcnode-id="9327" instrument_node="">Manfred Wörner</span></a><span data-dcnode-id="9325" instrument_node=""> paid an official visit to Kyiv, and on 8 July 1992, Kravchuk visited NATO Headquarters in Brussels. An important event in the development of relations between Ukraine and NATO was the opening in September 1992 of the Embassy of Ukraine in Brussels, which was a link in contacts between Ukraine and NATO.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="9318" style="white-space:nowrap;"><span data-dcnode-id="9324" instrument_node="">[</span><i data-dcnode-id="9320"><a data-dcnode-id="9321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="9322" title="This claim needs references to reliable sources. (March 2022)"><span data-dcnode-id="9323" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="9319" instrument_node="">]</span></sup><span data-dcnode-id="9317" instrument_node="">
</span></p><p data-dcnode-id="9298"><span data-dcnode-id="9315" instrument_node="">A few years later, in February 1994, Ukraine was the first post-Soviet country to conclude a framework agreement with NATO in the framework of the </span><a data-dcnode-id="9313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Partnership_for_Peace" title="Partnership for Peace"><span data-dcnode-id="9314" instrument_node="">Partnership for Peace</span></a><span data-dcnode-id="9312" instrument_node=""> initiative, supporting the initiative of Central and Eastern European countries to join NATO.</span><sup class="reference" data-dcnode-id="9309" id="cite_ref-рсмд54_26-0"><a data-dcnode-id="9310" href="#cite_note-%D1%80%D1%81%D0%BC%D0%B454-26"><span data-dcnode-id="9311" instrument_node="">[26]</span></a></sup><sup class="reference" data-dcnode-id="9306" id="cite_ref-nevoukr_25-1"><a data-dcnode-id="9307" href="#cite_note-nevoukr-25"><span data-dcnode-id="9308" instrument_node="">[25]</span></a></sup><sup class="reference" data-dcnode-id="9303" id="cite_ref-Serhy_27-0"><a data-dcnode-id="9304" href="#cite_note-Serhy-27"><span data-dcnode-id="9305" instrument_node="">[27]</span></a></sup><sup class="reference" data-dcnode-id="9300" id="cite_ref-natoppf_1-1"><a data-dcnode-id="9301" href="#cite_note-natoppf-1"><span data-dcnode-id="9302" instrument_node="">[1]</span></a></sup><span data-dcnode-id="9299" instrument_node="">
</span></p><span data-dcnode-id="9297" instrument_node="">
</span><h3 data-dcnode-id="9286"><span data-dcnode-id="9296" id="Presidency_of_Leonid_Kuchma_.281994.E2.80.932005.29"></span><span class="mw-headline" data-dcnode-id="9294" id="Presidency_of_Leonid_Kuchma_(1994–2005)"><span data-dcnode-id="9295" instrument_node="">Presidency of Leonid Kuchma (1994–2005)</span></span><span class="mw-editsection" data-dcnode-id="9287"><span class="mw-editsection-bracket" data-dcnode-id="9292"><span data-dcnode-id="9293" instrument_node="">[</span></span><a data-dcnode-id="9290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUkraine%25E2%2580%2593NATO_relations%26action%3Dedit%26section%3D3" title="Edit section: Presidency of Leonid Kuchma (1994–2005)"><span data-dcnode-id="9291" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9288"><span data-dcnode-id="9289" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9285" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="9267"><div class="thumbinner" data-dcnode-id="9268" style="width:302px;"><a class="image" data-dcnode-id="9283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARumsfeld_und_Leonid_Kutschma.jpg"><img alt="" class="thumbimage" data-dcnode-id="9284" data-file-height="1960" data-file-width="3008" decoding="async" height="195" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/ff/Rumsfeld_und_Leonid_Kutschma.jpg/300px-Rumsfeld_und_Leonid_Kutschma.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/ff/Rumsfeld_und_Leonid_Kutschma.jpg/450px-Rumsfeld_und_Leonid_Kutschma.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/ff/Rumsfeld_und_Leonid_Kutschma.jpg/600px-Rumsfeld_und_Leonid_Kutschma.jpg 2x" width="300"></a><span data-dcnode-id="9282" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9269"><div class="magnify" data-dcnode-id="9280"><a class="internal" data-dcnode-id="9281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARumsfeld_und_Leonid_Kutschma.jpg" title="Enlarge"></a></div><span data-dcnode-id="9279" instrument_node="">US Secretary of Defense </span><a data-dcnode-id="9277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Donald_Rumsfeld" title="Donald Rumsfeld"><span data-dcnode-id="9278" instrument_node="">Donald Rumsfeld</span></a><span data-dcnode-id="9276" instrument_node=""> and President of Ukraine Leonid Kuchma. </span><a data-dcnode-id="9274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Partenit" title="Partenit"><span data-dcnode-id="9275" instrument_node="">Partenit</span></a><span data-dcnode-id="9273" instrument_node="">, </span><a data-dcnode-id="9271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autonomous_Republic_of_Crimea" title="Autonomous Republic of Crimea"><span data-dcnode-id="9272" instrument_node="">Autonomous Republic of Crimea</span></a><span data-dcnode-id="9270" instrument_node="">, 13 August 2004</span></div></div></div><span data-dcnode-id="9266" instrument_node="">
</span><p data-dcnode-id="9252"><a data-dcnode-id="9264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leonid_Kuchma" title="Leonid Kuchma"><span data-dcnode-id="9265" instrument_node="">Leonid Kuchma</span></a><span data-dcnode-id="9263" instrument_node="">, who had arrived at the Presidency in July 1994, signed the quadripartite </span><a data-dcnode-id="9261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Budapest_Memorandum_on_Security_Assurances" title="Budapest Memorandum on Security Assurances"><span data-dcnode-id="9262" instrument_node="">Memorandum on security assurances in connection with Ukraine's accession to the Treaty on the Non-Proliferation of Nuclear Weapons</span></a><span data-dcnode-id="9260" instrument_node=""> on 5 December. The memorandum prohibited the Russian Federation, the United Kingdom and the United States from threatening or using military force or economic coercion against Ukraine, "except in self-defence or otherwise in accordance with the Charter of the United Nations." As a result of other agreements and the memorandum, between 1993 and 1996, Ukraine gave up its nuclear weapons.</span><sup class="reference" data-dcnode-id="9257" id="cite_ref-harahan-2014_28-0"><a data-dcnode-id="9258" href="#cite_note-harahan-2014-28"><span data-dcnode-id="9259" instrument_node="">[28]</span></a></sup><sup class="reference" data-dcnode-id="9254" id="cite_ref-bmemo_29-0"><a data-dcnode-id="9255" href="#cite_note-bmemo-29"><span data-dcnode-id="9256" instrument_node="">[29]</span></a></sup><span data-dcnode-id="9253" instrument_node="">
</span></p><p data-dcnode-id="9243"><span data-dcnode-id="9251" instrument_node="">In the summer of 1995 NATO stepped up to help to mitigate consequences of the </span><a class="mw-redirect" data-dcnode-id="9249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1995_Kharkiv_Drinking_Water_Disaster" title="1995 Kharkiv Drinking Water Disaster"><span data-dcnode-id="9250" instrument_node="">Kharkiv Drinking Water Disaster</span></a><span data-dcnode-id="9248" instrument_node="">. This was the first cooperation between NATO and Ukraine.</span><sup class="reference" data-dcnode-id="9245" id="cite_ref-30"><a data-dcnode-id="9246" href="#cite_note-30"><span data-dcnode-id="9247" instrument_node="">[30]</span></a></sup><span data-dcnode-id="9244" instrument_node="">
</span></p><p data-dcnode-id="9233"><span data-dcnode-id="9242" instrument_node="">On 7 May 1997 the official NATO Information and Documentation Center opened in Kyiv, aimed to foster transparency about the alliance.</span><sup class="reference" data-dcnode-id="9239" id="cite_ref-31"><a data-dcnode-id="9240" href="#cite_note-31"><span data-dcnode-id="9241" instrument_node="">[31]</span></a></sup><span data-dcnode-id="9238" instrument_node=""> A Ukrainian public opinion poll of 6 May showed 37% in favor of joining NATO with 28% opposed and 34% undecided.</span><sup class="reference" data-dcnode-id="9235" id="cite_ref-32"><a data-dcnode-id="9236" href="#cite_note-32"><span data-dcnode-id="9237" instrument_node="">[32]</span></a></sup><span data-dcnode-id="9234" instrument_node="">
</span></p><p data-dcnode-id="9227"><span data-dcnode-id="9232" instrument_node="">On 9 July 1997 a NATO-Ukraine Commission was established.</span><sup class="reference" data-dcnode-id="9229" id="cite_ref-33"><a data-dcnode-id="9230" href="#cite_note-33"><span data-dcnode-id="9231" instrument_node="">[33]</span></a></sup><span data-dcnode-id="9228" instrument_node="">
</span></p><p data-dcnode-id="9212"><span data-dcnode-id="9226" instrument_node="">In 2002 relations with the government of the United States and other NATO countries deteriorated after one of the recordings made during the </span><a data-dcnode-id="9224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cassette_Scandal" title="Cassette Scandal"><span data-dcnode-id="9225" instrument_node="">Cassette Scandal</span></a><span data-dcnode-id="9223" instrument_node=""> revealed an alleged transfer of a sophisticated Ukrainian defense system to </span><a data-dcnode-id="9221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saddam_Hussein" title="Saddam Hussein"><span data-dcnode-id="9222" instrument_node="">Saddam Hussein</span></a><span data-dcnode-id="9220" instrument_node="">'s </span><a data-dcnode-id="9218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ba%2527athist_Iraq" title="Ba'athist Iraq"><span data-dcnode-id="9219" instrument_node="">Iraq</span></a><span data-dcnode-id="9217" instrument_node="">.</span><sup class="reference" data-dcnode-id="9214" id="cite_ref-Serhy_27-1"><a data-dcnode-id="9215" href="#cite_note-Serhy-27"><span data-dcnode-id="9216" instrument_node="">[27]</span></a></sup><span data-dcnode-id="9213" instrument_node="">
</span></p><p data-dcnode-id="9179"><span data-dcnode-id="9211" instrument_node="">At the NATO enlargement </span><a data-dcnode-id="9209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Summit_%28meeting%29" title="Summit (meeting)"><span data-dcnode-id="9210" instrument_node="">summit</span></a><span data-dcnode-id="9208" instrument_node=""> in November 2002, the NATO–Ukraine commission adopted a NATO-Ukraine Action Plan.</span><sup class="reference" data-dcnode-id="9205" id="cite_ref-nukap_34-0"><a data-dcnode-id="9206" href="#cite_note-nukap-34"><span data-dcnode-id="9207" instrument_node="">[34]</span></a></sup><span data-dcnode-id="9204" instrument_node=""> President </span><a class="mw-redirect" data-dcnode-id="9202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kuchma" title="Kuchma"><span data-dcnode-id="9203" instrument_node="">Kuchma</span></a><span data-dcnode-id="9201" instrument_node="">'s declaration that Ukraine wanted to join NATO (also in 2002) and the sending of </span><a class="mw-redirect" data-dcnode-id="9199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Multinational_force_in_Iraq%23List_of_nations_in_the_coalition" title="Multinational force in Iraq"><span data-dcnode-id="9200" instrument_node="">Ukrainian troops to Iraq</span></a><span data-dcnode-id="9198" instrument_node=""> in 2003</span><sup class="reference" data-dcnode-id="9195" id="cite_ref-Serhy_27-2"><a data-dcnode-id="9196" href="#cite_note-Serhy-27"><span data-dcnode-id="9197" instrument_node="">[27]</span></a></sup><span data-dcnode-id="9194" instrument_node=""> could not mend relations between Kuchma and NATO.</span><sup class="reference" data-dcnode-id="9191" id="cite_ref-Serhy_27-3"><a data-dcnode-id="9192" href="#cite_note-Serhy-27"><span data-dcnode-id="9193" instrument_node="">[27]</span></a></sup><span data-dcnode-id="9190" instrument_node=""> Until 2006 the </span><a class="mw-redirect" data-dcnode-id="9188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukrainian_Armed_Forces" title="Ukrainian Armed Forces"><span data-dcnode-id="9189" instrument_node="">Ukrainian Armed Forces</span></a><span data-dcnode-id="9187" instrument_node=""> worked with </span><a data-dcnode-id="9185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="9186" instrument_node="">NATO</span></a><span data-dcnode-id="9184" instrument_node=""> in Iraq.</span><sup class="reference" data-dcnode-id="9181" id="cite_ref-35"><a data-dcnode-id="9182" href="#cite_note-35"><span data-dcnode-id="9183" instrument_node="">[35]</span></a></sup><span data-dcnode-id="9180" instrument_node="">
</span></p><p data-dcnode-id="9177"><span data-dcnode-id="9178" instrument_node="">On 6 April 2004, the Verkhovna Rada adopted a law on the free access of NATO forces to the territory of Ukraine.
</span></p><p data-dcnode-id="9171"><span data-dcnode-id="9176" instrument_node="">On 15 June 2004, in the second edition of the Military Doctrine of Ukraine, approved by the decree of Kuchma, a provision appeared on the implementation by Ukraine of a policy of Euro-Atlantic integration, the ultimate goal of which was to join NATO. However, already on 15 July 2004, following a meeting of the Ukraine-NATO commission, President Kuchma issued a decree stating that joining NATO was no longer the country's goal – only "a significant deepening of relations with NATO and the European Union as guarantors of security and stability in Europe".</span><sup class="reference" data-dcnode-id="9173" id="cite_ref-36"><a data-dcnode-id="9174" href="#cite_note-36"><span data-dcnode-id="9175" instrument_node="">[36]</span></a></sup><span data-dcnode-id="9172" instrument_node="">
</span></p><span data-dcnode-id="9170" instrument_node="">
</span><h3 data-dcnode-id="9159"><span data-dcnode-id="9169" id="Presidency_of_Viktor_Yushchenko_.282005.E2.80.932010.29"></span><span class="mw-headline" data-dcnode-id="9167" id="Presidency_of_Viktor_Yushchenko_(2005–2010)"><span data-dcnode-id="9168" instrument_node="">Presidency of Viktor Yushchenko (2005–2010)</span></span><span class="mw-editsection" data-dcnode-id="9160"><span class="mw-editsection-bracket" data-dcnode-id="9165"><span data-dcnode-id="9166" instrument_node="">[</span></span><a data-dcnode-id="9163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUkraine%25E2%2580%2593NATO_relations%26action%3Dedit%26section%3D4" title="Edit section: Presidency of Viktor Yushchenko (2005–2010)"><span data-dcnode-id="9164" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9161"><span data-dcnode-id="9162" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9158" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="9146"><div class="thumbinner" data-dcnode-id="9147" style="width:222px;"><a class="image" data-dcnode-id="9156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADefense.gov_News_Photo_051024-F-5586B-016.jpg"><img alt="" class="thumbimage" data-dcnode-id="9157" data-file-height="2940" data-file-width="4512" decoding="async" height="143" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/54/Defense.gov_News_Photo_051024-F-5586B-016.jpg/220px-Defense.gov_News_Photo_051024-F-5586B-016.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/54/Defense.gov_News_Photo_051024-F-5586B-016.jpg/330px-Defense.gov_News_Photo_051024-F-5586B-016.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/54/Defense.gov_News_Photo_051024-F-5586B-016.jpg/440px-Defense.gov_News_Photo_051024-F-5586B-016.jpg 2x" width="220"></a><span data-dcnode-id="9155" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9148"><div class="magnify" data-dcnode-id="9153"><a class="internal" data-dcnode-id="9154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADefense.gov_News_Photo_051024-F-5586B-016.jpg" title="Enlarge"></a></div><span data-dcnode-id="9152" instrument_node="">US Secretary of Defense Donald Rumsfeld and US Ambassador to NATO </span><a data-dcnode-id="9150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Victoria_Nuland" title="Victoria Nuland"><span data-dcnode-id="9151" instrument_node="">Victoria Nuland</span></a><span data-dcnode-id="9149" instrument_node=""> at the NATO–Ukraine consultations in Vilnius, Lithuania, on 24 October 2005</span></div></div></div><span data-dcnode-id="9145" instrument_node="">
</span><p data-dcnode-id="9117"><span data-dcnode-id="9144" instrument_node="">After the </span><a data-dcnode-id="9142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Orange_Revolution" title="Orange Revolution"><span data-dcnode-id="9143" instrument_node="">Orange Revolution</span></a><span data-dcnode-id="9141" instrument_node=""> in 2004 Kuchma was replaced by President </span><a data-dcnode-id="9139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Viktor_Yushchenko" title="Viktor Yushchenko"><span data-dcnode-id="9140" instrument_node="">Viktor Yushchenko</span></a><span data-dcnode-id="9138" instrument_node=""> who is a keen supporter of Ukraine's NATO membership.</span><sup class="reference" data-dcnode-id="9135" id="cite_ref-37"><a data-dcnode-id="9136" href="#cite_note-37"><span data-dcnode-id="9137" instrument_node="">[37]</span></a></sup><span data-dcnode-id="9134" instrument_node=""> In January 2008 the second </span><a data-dcnode-id="9132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yulia_Tymoshenko" title="Yulia Tymoshenko"><span data-dcnode-id="9133" instrument_node="">Yulia Tymoshenko</span></a><span data-dcnode-id="9131" instrument_node=""> </span><a data-dcnode-id="9129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Government_of_Ukraine" title="Government of Ukraine"><span data-dcnode-id="9130" instrument_node="">cabinet</span></a><span data-dcnode-id="9128" instrument_node="">'s proposal for Ukraine to join </span><a data-dcnode-id="9126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="9127" instrument_node="">NATO</span></a><span data-dcnode-id="9125" instrument_node="">'s MAP was met with opposition. A </span><a data-dcnode-id="9123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Petition" title="Petition"><span data-dcnode-id="9124" instrument_node="">petition</span></a><span data-dcnode-id="9122" instrument_node=""> of over 2 million signatures has called for a referendum on Ukraine's membership proposal to join NATO. The opposition has called for a national referendum to be held on any steps towards further involvement with NATO. In February 2008 57.8% of Ukrainians supported the idea of a national referendum on joining NATO, against 38.6% in February 2007.</span><sup class="reference" data-dcnode-id="9119" id="cite_ref-38"><a data-dcnode-id="9120" href="#cite_note-38"><span data-dcnode-id="9121" instrument_node="">[38]</span></a></sup><span data-dcnode-id="9118" instrument_node="">
</span></p><p data-dcnode-id="9115"><span data-dcnode-id="9116" instrument_node="">On 21 April 2005, in Vilnius, as part of an informal meeting of the Foreign Ministers of the NATO countries, a meeting of the Ukraine-NATO Commission was held, which opened a new stage in Ukraine's relations with the alliance – "intensive dialogue", which was intended to be the first step towards Ukraine's entry into NATO.
</span></p><p data-dcnode-id="9113"><span data-dcnode-id="9114" instrument_node="">During President Viktor Yushchenko's first official visit to the United States, President George W. Bush declared: "I am a supporter of the idea of Ukraine's membership in NATO." In a joint official statement by the presidents of Ukraine and the United States, it was said that Washington supports the proposal to start an intensive dialogue on Ukraine's accession to the NATO via a MAP.
</span></p><p data-dcnode-id="9111"><span data-dcnode-id="9112" instrument_node="">In April 2005, Viktor Yushchenko returned to Ukraine's military doctrine the mention of Ukraine's strategic goal – "full membership in NATO and the European Union." The new text read as follows: "Based on the fact that NATO and the EU are the guarantors of security and stability in Europe, Ukraine is preparing for full membership in these organizations." As in the previous version, the task of "deeply reforming the defense sphere of the state in accordance with European standards" was called "one of the most important priorities of domestic and foreign policy."
</span></p><p data-dcnode-id="9106"><span data-dcnode-id="9110" instrument_node="">On 20 January 2006 in Budapest, following a meeting of defense ministers of Central European countries – NATO members – Hungary, the Czech Republic, Poland and Slovakia (which was attended by the Minister of Defense of Ukraine </span><a data-dcnode-id="9108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anatoliy_Hrytsenko" title="Anatoliy Hrytsenko"><span data-dcnode-id="9109" instrument_node="">Anatolii Hrytsenko</span></a><span data-dcnode-id="9107" instrument_node="">) – it was announced that these states were ready to support Ukraine's entry into NATO. As stated, a necessary condition for this should be the support of this step by the Ukrainian society and the achievement of internal stability in Ukraine.
</span></p><p data-dcnode-id="9104"><span data-dcnode-id="9105" instrument_node="">On 27 April 2006, at a meeting of NATO foreign ministers, the representative of the NATO Secretary General, James Appathurai, stated that all members of the alliance support the speedy integration of Ukraine into NATO. Russia, for its part, expressed concern about this development. As the official representative of the Russian Foreign Ministry Mikhail Kamynin stated, "de facto, we will talk about a serious military-political shift affecting the interests of Russia, which will require significant funds for the corresponding reorientation of military potentials, the reorganization of the system of military-industrial relations. Arrangements in the field of arms control may be affected.”
</span></p><p data-dcnode-id="9099"><span data-dcnode-id="9103" instrument_node="">After the Party of Regions received the largest number of votes in the </span><a data-dcnode-id="9101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2006_Ukrainian_parliamentary_election" title="2006 Ukrainian parliamentary election"><span data-dcnode-id="9102" instrument_node="">2006 Ukrainian parliamentary election</span></a><span data-dcnode-id="9100" instrument_node=""> and the new government, headed by Viktor Yushchenko's political rival Viktor Yanukovych, was formed, there was a turn in Ukraine's foreign policy. By the end of 2006, not a single representative of the pro-presidential Our Ukraine bloc remained in the government. Viktor Yanukovych's foreign policy statements contradicted Yushchenko's course.
</span></p><p data-dcnode-id="9085"><span data-dcnode-id="9098" instrument_node="">Yanukovych's premiership ended following </span><a data-dcnode-id="9096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2007_Ukrainian_parliamentary_election" title="2007 Ukrainian parliamentary election"><span data-dcnode-id="9097" instrument_node="">2007 parliamentary election</span></a><span data-dcnode-id="9095" instrument_node="">, when </span><a data-dcnode-id="9093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yulia_Tymoshenko_Bloc" title="Yulia Tymoshenko Bloc"><span data-dcnode-id="9094" instrument_node="">Yulia Tymoshenko Bloc</span></a><span data-dcnode-id="9092" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="9090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Our_Ukraine-People%2527s_Self-Defense_Bloc" title="Our Ukraine-People's Self-Defense Bloc"><span data-dcnode-id="9091" instrument_node="">Our Ukraine-People's Self-Defense Bloc</span></a><span data-dcnode-id="9089" instrument_node=""> formed a </span><a class="mw-redirect" data-dcnode-id="9087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_Tymoshenko_Government" title="Second Tymoshenko Government"><span data-dcnode-id="9088" instrument_node="">coalition government</span></a><span data-dcnode-id="9086" instrument_node="">, with Yulia Tymoshenko as Prime Minister.
</span></p><span data-dcnode-id="9084" instrument_node="">
</span><h4 data-dcnode-id="9074"><span class="mw-headline" data-dcnode-id="9082" id="Applying_for_Ukraine_to_join_the_NATO_Membership_Action_Plan"><span data-dcnode-id="9083" instrument_node="">Applying for Ukraine to join the NATO Membership Action Plan</span></span><span class="mw-editsection" data-dcnode-id="9075"><span class="mw-editsection-bracket" data-dcnode-id="9080"><span data-dcnode-id="9081" instrument_node="">[</span></span><a data-dcnode-id="9078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUkraine%25E2%2580%2593NATO_relations%26action%3Dedit%26section%3D5" title="Edit section: Applying for Ukraine to join the NATO Membership Action Plan"><span data-dcnode-id="9079" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9076"><span data-dcnode-id="9077" instrument_node="">]</span></span></span></h4><span data-dcnode-id="9073" instrument_node="">
</span><p data-dcnode-id="9058"><span data-dcnode-id="9072" instrument_node="">In January 2008, US Senator </span><a data-dcnode-id="9070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_Lugar" title="Richard Lugar"><span data-dcnode-id="9071" instrument_node="">Richard Lugar</span></a><span data-dcnode-id="9069" instrument_node=""> said: "Ukrainian President Viktor Yushchenko, Prime Minister Yulia Tymoshenko and </span><a data-dcnode-id="9067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chairman_of_the_Verkhovna_Rada" title="Chairman of the Verkhovna Rada"><span data-dcnode-id="9068" instrument_node="">Parliamentary chairman</span></a><span data-dcnode-id="9066" instrument_node=""> </span><a data-dcnode-id="9064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arseniy_Yatsenyuk" title="Arseniy Yatsenyuk"><span data-dcnode-id="9065" instrument_node="">Arsenii Yatseniuk</span></a><span data-dcnode-id="9063" instrument_node=""> have signed the statement calling for consideration on Ukraine's entry into the NATO via the MAP programme at the Bucharest summit."</span><sup class="reference" data-dcnode-id="9060" id="cite_ref-39"><a data-dcnode-id="9061" href="#cite_note-39"><span data-dcnode-id="9062" instrument_node="">[39]</span></a></sup><span data-dcnode-id="9059" instrument_node="">
</span></p><p data-dcnode-id="9042"><span data-dcnode-id="9057" instrument_node="">The Ukrainian parliament headed by </span><a data-dcnode-id="9055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arseniy_Yatsenyuk" title="Arseniy Yatsenyuk"><span data-dcnode-id="9056" instrument_node="">Arsenii Yatseniuk</span></a><span data-dcnode-id="9054" instrument_node=""> was unable to hold its regular parliamentary session following the decision of the parliamentary opposition to prevent the parliament from functioning in a protest against joining </span><a data-dcnode-id="9052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="9053" instrument_node="">NATO</span></a><span data-dcnode-id="9051" instrument_node="">. The parliament was blocked from 25 January 2008</span><sup class="reference" data-dcnode-id="9048" id="cite_ref-40"><a data-dcnode-id="9049" href="#cite_note-40"><span data-dcnode-id="9050" instrument_node="">[40]</span></a></sup><span data-dcnode-id="9047" instrument_node=""> till 4 March 2008 (on 29 February 2008 faction leaders agreed on a protocol of mutual understanding).</span><sup class="reference" data-dcnode-id="9044" id="cite_ref-41"><a data-dcnode-id="9045" href="#cite_note-41"><span data-dcnode-id="9046" instrument_node="">[41]</span></a></sup><span data-dcnode-id="9043" instrument_node="">
</span></p><p data-dcnode-id="9008"><span data-dcnode-id="9041" instrument_node="">US President </span><a data-dcnode-id="9039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_W._Bush" title="George W. Bush"><span data-dcnode-id="9040" instrument_node="">George W. Bush</span></a><span data-dcnode-id="9038" instrument_node=""> and both nominees for President of the United States in the </span><a data-dcnode-id="9036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2008_United_States_presidential_election" title="2008 United States presidential election"><span data-dcnode-id="9037" instrument_node="">2008 election</span></a><span data-dcnode-id="9035" instrument_node="">, U.S. senator </span><a data-dcnode-id="9033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barack_Obama" title="Barack Obama"><span data-dcnode-id="9034" instrument_node="">Barack Obama</span></a><span data-dcnode-id="9032" instrument_node=""> and U.S. senator </span><a data-dcnode-id="9030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_McCain" title="John McCain"><span data-dcnode-id="9031" instrument_node="">John McCain</span></a><span data-dcnode-id="9029" instrument_node="">, did offer backing to Ukraine's membership of NATO.</span><sup class="reference" data-dcnode-id="9026" id="cite_ref-42"><a data-dcnode-id="9027" href="#cite_note-42"><span data-dcnode-id="9028" instrument_node="">[42]</span></a></sup><sup class="reference" data-dcnode-id="9023" id="cite_ref-43"><a data-dcnode-id="9024" href="#cite_note-43"><span data-dcnode-id="9025" instrument_node="">[43]</span></a></sup><sup class="reference" data-dcnode-id="9020" id="cite_ref-44"><a data-dcnode-id="9021" href="#cite_note-44"><span data-dcnode-id="9022" instrument_node="">[44]</span></a></sup><span data-dcnode-id="9019" instrument_node=""> Russian reactions were negative. In April 2008, Russian President </span><a data-dcnode-id="9017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vladimir_Putin" title="Vladimir Putin"><span data-dcnode-id="9018" instrument_node="">Vladimir Putin</span></a><span data-dcnode-id="9016" instrument_node=""> spoke out against Ukraine's membership in NATO.</span><sup class="reference" data-dcnode-id="9013" id="cite_ref-45"><a data-dcnode-id="9014" href="#cite_note-45"><span data-dcnode-id="9015" instrument_node="">[45]</span></a></sup><sup class="reference" data-dcnode-id="9010" id="cite_ref-46"><a data-dcnode-id="9011" href="#cite_note-46"><span data-dcnode-id="9012" instrument_node="">[46]</span></a></sup><span data-dcnode-id="9009" instrument_node="">
</span></p><span data-dcnode-id="9007" instrument_node="">
</span><h4 data-dcnode-id="8996"><span data-dcnode-id="9006" id="Bucharest_summit:_2008.E2.80.932009"></span><span class="mw-headline" data-dcnode-id="9004" id="Bucharest_summit:_2008–2009"><span data-dcnode-id="9005" instrument_node="">Bucharest summit: 2008–2009</span></span><span class="mw-editsection" data-dcnode-id="8997"><span class="mw-editsection-bracket" data-dcnode-id="9002"><span data-dcnode-id="9003" instrument_node="">[</span></span><a data-dcnode-id="9000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUkraine%25E2%2580%2593NATO_relations%26action%3Dedit%26section%3D6" title="Edit section: Bucharest summit: 2008–2009"><span data-dcnode-id="9001" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8998"><span data-dcnode-id="8999" instrument_node="">]</span></span></span></h4><span data-dcnode-id="8995" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="8989" role="note"><span data-dcnode-id="8992" instrument_node="">Main article: </span><a data-dcnode-id="8990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2008_Bucharest_summit" title="2008 Bucharest summit"><span data-dcnode-id="8991" instrument_node="">2008 Bucharest summit</span></a></div><span data-dcnode-id="8988" instrument_node="">
</span><p data-dcnode-id="8972"><span data-dcnode-id="8987" instrument_node="">At the NATO summit in Bucharest in April 2008, NATO decided it would not yet offer membership to </span><a data-dcnode-id="8985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Georgia_%28country%29" title="Georgia (country)"><span data-dcnode-id="8986" instrument_node="">Georgia</span></a><span data-dcnode-id="8984" instrument_node=""> and Ukraine; nevertheless, NATO Secretary-General </span><a data-dcnode-id="8982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jaap_de_Hoop_Scheffer" title="Jaap de Hoop Scheffer"><span data-dcnode-id="8983" instrument_node="">Jaap de Hoop Scheffer</span></a><span data-dcnode-id="8981" instrument_node=""> said that Georgia and Ukraine would eventually become members.</span><sup class="reference" data-dcnode-id="8978" id="cite_ref-47"><a data-dcnode-id="8979" href="#cite_note-47"><span data-dcnode-id="8980" instrument_node="">[47]</span></a></sup><span data-dcnode-id="8977" instrument_node=""> Resistance was reportedly met from France and Germany.</span><sup class="reference" data-dcnode-id="8974" id="cite_ref-48"><a data-dcnode-id="8975" href="#cite_note-48"><span data-dcnode-id="8976" instrument_node="">[48]</span></a></sup><span data-dcnode-id="8973" instrument_node="">
</span></p><p data-dcnode-id="8912"><span data-dcnode-id="8971" instrument_node="">In November 2008, </span><a class="mw-redirect" data-dcnode-id="8969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chancellor_Merkel" title="Chancellor Merkel"><span data-dcnode-id="8970" instrument_node="">Chancellor Merkel</span></a><span data-dcnode-id="8968" instrument_node="">, Prime Minister Tymoshenko and Ukrainian minister of defence </span><a data-dcnode-id="8966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anatoliy_Hrytsenko" title="Anatoliy Hrytsenko"><span data-dcnode-id="8967" instrument_node="">Anatoliy Hrytsenko</span></a><span data-dcnode-id="8965" instrument_node=""> doubted Ukraine would be granted a NATO MAP at the December meeting.</span><sup class="reference" data-dcnode-id="8962" id="cite_ref-ukra1_49-0"><a data-dcnode-id="8963" href="#cite_note-ukra1-49"><span data-dcnode-id="8964" instrument_node="">[49]</span></a></sup><span data-dcnode-id="8961" instrument_node=""> In a </span><i data-dcnode-id="8958"><a data-dcnode-id="8959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Times" title="The Times"><span data-dcnode-id="8960" instrument_node="">Times of London</span></a></i><span data-dcnode-id="8957" instrument_node=""> interview in late November, Yushchenko stated: "Ukraine has done everything it had to do. We are devoted to this pace. Everything else is an issue of political will of those allies who represent NATO."</span><sup class="reference" data-dcnode-id="8954" id="cite_ref-50"><a data-dcnode-id="8955" href="#cite_note-50"><span data-dcnode-id="8956" instrument_node="">[50]</span></a></sup><span data-dcnode-id="8953" instrument_node=""> Although NATO Deputy Assistant Secretary-General </span><a data-dcnode-id="8951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aurelia_Bouchez" title="Aurelia Bouchez"><span data-dcnode-id="8952" instrument_node="">Aurelia Bouchez</span></a><sup class="reference" data-dcnode-id="8948" id="cite_ref-52"><a data-dcnode-id="8949" href="#cite_note-52"><span data-dcnode-id="8950" instrument_node="">[nb 1]</span></a></sup><span data-dcnode-id="8947" instrument_node=""> and Secretary-General Scheffer</span><sup class="reference" data-dcnode-id="8944" id="cite_ref-54"><a data-dcnode-id="8945" href="#cite_note-54"><span data-dcnode-id="8946" instrument_node="">[nb 2]</span></a></sup><span data-dcnode-id="8943" instrument_node=""> still supported Ukraine's NATO bid at the time. However, the </span><a class="mw-redirect" data-dcnode-id="8941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_W._Bush_administration" title="George W. Bush administration"><span data-dcnode-id="8942" instrument_node="">Bush administration</span></a><span data-dcnode-id="8940" instrument_node=""> seemed not to push for </span><a class="mw-redirect" data-dcnode-id="8938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO-Georgia_relations" title="NATO-Georgia relations"><span data-dcnode-id="8939" instrument_node="">Georgian</span></a><span data-dcnode-id="8937" instrument_node=""> and Ukrainian MAPs in late November 2008. </span><a data-dcnode-id="8935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Condoleezza_Rice" title="Condoleezza Rice"><span data-dcnode-id="8936" instrument_node="">Condoleezza Rice</span></a><span data-dcnode-id="8934" instrument_node=""> told a press conference, "We believe that the NATO-Georgia Commission and the NATO-Ukraine Commission can be the bodies with which we intensify our dialogue and our activities. And, therefore, there does not need at this point in time to be any discussion of MAP."</span><sup class="reference" data-dcnode-id="8931" id="cite_ref-55"><a data-dcnode-id="8932" href="#cite_note-55"><span data-dcnode-id="8933" instrument_node="">[53]</span></a></sup><span data-dcnode-id="8930" instrument_node=""> </span><a data-dcnode-id="8928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/President_of_Russia" title="President of Russia"><span data-dcnode-id="8929" instrument_node="">President of Russia</span></a><span data-dcnode-id="8927" instrument_node=""> </span><a data-dcnode-id="8925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dmitry_Medvedev" title="Dmitry Medvedev"><span data-dcnode-id="8926" instrument_node="">Dmitry Medvedev</span></a><span data-dcnode-id="8924" instrument_node=""> responded that "reason has prevailed".</span><sup class="reference" data-dcnode-id="8921" id="cite_ref-dmunian_56-0"><a data-dcnode-id="8922" href="#cite_note-dmunian-56"><span data-dcnode-id="8923" instrument_node="">[54]</span></a></sup><span data-dcnode-id="8920" instrument_node=""> On 3 December 2008 NATO decided on an Annual National Programme of providing assistance to Ukraine to implement reforms required to accede the alliance without referring to MAP.</span><sup class="reference" data-dcnode-id="8917" id="cite_ref-nomap_57-0"><a data-dcnode-id="8918" href="#cite_note-nomap-57"><span data-dcnode-id="8919" instrument_node="">[55]</span></a></sup><sup class="reference" data-dcnode-id="8914" id="cite_ref-ukratp_58-0"><a data-dcnode-id="8915" href="#cite_note-ukratp-58"><span data-dcnode-id="8916" instrument_node="">[56]</span></a></sup><span data-dcnode-id="8913" instrument_node="">
</span></p><p data-dcnode-id="8900"><span data-dcnode-id="8911" instrument_node="">At the NATO-Ukraine consultations at the level of Defense Ministers held at the NATO headquarters in </span><a data-dcnode-id="8909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brussels" title="Brussels"><span data-dcnode-id="8910" instrument_node="">Brussels</span></a><span data-dcnode-id="8908" instrument_node=""> in November 2009, NATO Secretary-General </span><a data-dcnode-id="8906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anders_Fogh_Rasmussen" title="Anders Fogh Rasmussen"><span data-dcnode-id="8907" instrument_node="">Anders Fogh Rasmussen</span></a><span data-dcnode-id="8905" instrument_node=""> praised Ukraine's first Annual National Program, which outlined the steps it intended to take to accelerate internal reform and alignment with Euro-Atlantic standards, as an important step on Ukraine's path to becoming a member of the Alliance.</span><sup class="reference" data-dcnode-id="8902" id="cite_ref-afranp_59-0"><a data-dcnode-id="8903" href="#cite_note-afranp-59"><span data-dcnode-id="8904" instrument_node="">[57]</span></a></sup><span data-dcnode-id="8901" instrument_node="">
</span></p><span data-dcnode-id="8899" instrument_node="">
</span><h3 data-dcnode-id="8888"><span data-dcnode-id="8898" id="Presidency_of_Viktor_Yanukovych_.282010.E2.80.932014.29"></span><span class="mw-headline" data-dcnode-id="8896" id="Presidency_of_Viktor_Yanukovych_(2010–2014)"><span data-dcnode-id="8897" instrument_node="">Presidency of Viktor Yanukovych (2010–2014)</span></span><span class="mw-editsection" data-dcnode-id="8889"><span class="mw-editsection-bracket" data-dcnode-id="8894"><span data-dcnode-id="8895" instrument_node="">[</span></span><a data-dcnode-id="8892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUkraine%25E2%2580%2593NATO_relations%26action%3Dedit%26section%3D7" title="Edit section: Presidency of Viktor Yanukovych (2010–2014)"><span data-dcnode-id="8893" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8890"><span data-dcnode-id="8891" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8887" instrument_node="">

ent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2010_Ukrainian_presidential_election" title="2010 Ukrainian presidential election"><span data-dcnode-id="8684" instrument_node="">2010 presidential election</span></a><span data-dcnode-id="8682" instrument_node=""> and </span><a data-dcnode-id="8680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Party_of_Regions" title="Party of Regions"><span data-dcnode-id="8681" instrument_node="">Party of Regions</span></a><span data-dcnode-id="8679" instrument_node=""> leader </span><a data-dcnode-id="8677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Viktor_Yanukovych" title="Viktor Yanukovych"><span data-dcnode-id="8678" instrument_node="">Viktor Yanukovych</span></a><span data-dcnode-id="8676" instrument_node=""> stated during 2010 presidential election-campaign that the current level of Ukraine's cooperation with NATO was sufficient and that the question of the country's accession to the alliance was therefore not urgent.</span><sup class="reference" data-dcnode-id="8673" id="cite_ref-theworldreporter.com_60-0"><a data-dcnode-id="8674" href="#cite_note-theworldreporter.com-60"><span data-dcnode-id="8675" instrument_node="">[58]</span></a></sup><sup class="reference" data-dcnode-id="8670" id="cite_ref-61"><a data-dcnode-id="8671" href="#cite_note-61"><span data-dcnode-id="8672" instrument_node="">[59]</span></a></sup><span data-dcnode-id="8669" instrument_node="">
</span></p><p data-dcnode-id="8662"><span data-dcnode-id="8667" instrument_node="">Following the election, on 14 February 2010, Yanukovych said that Ukraine's relations with NATO were currently "well-defined", and that there was "no question of Ukraine joining NATO". He said the issue of Ukrainian membership of NATO might "emerge at some point, but we will not see it in the immediate future."</span><sup class="reference" data-dcnode-id="8664" id="cite_ref-glo_5-1"><a data-dcnode-id="8665" href="#cite_note-glo-5"><span data-dcnode-id="8666" instrument_node="">[5]</span></a></sup><span data-dcnode-id="8663" instrument_node="">
</span></p><p data-dcnode-id="8649"><span data-dcnode-id="8661" instrument_node="">On 1 March 2010, during his visit to </span><a data-dcnode-id="8659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brussels" title="Brussels"><span data-dcnode-id="8660" instrument_node="">Brussels</span></a><span data-dcnode-id="8658" instrument_node="">, Yanukovych said that there would be no change to Ukraine's status as a member of the alliance's outreach program.</span><sup class="reference" data-dcnode-id="8655" id="cite_ref-ykp_62-0"><a data-dcnode-id="8656" href="#cite_note-ykp-62"><span data-dcnode-id="8657" instrument_node="">[60]</span></a></sup><span data-dcnode-id="8654" instrument_node=""> He later reiterated during a trip to Moscow that Ukraine would remain a "European, non-aligned state."</span><sup class="reference" data-dcnode-id="8651" id="cite_ref-ypk_63-0"><a data-dcnode-id="8652" href="#cite_note-ypk-63"><span data-dcnode-id="8653" instrument_node="">[61]</span></a></sup><span data-dcnode-id="8650" instrument_node="">
</span></p><p data-dcnode-id="8626"><span data-dcnode-id="8648" instrument_node="">As of May 2010, NATO and Ukraine continued to cooperate in the framework of the </span><i data-dcnode-id="8646"><span data-dcnode-id="8647" instrument_node="">Annual National Program</span></i><span data-dcnode-id="8645" instrument_node="">,</span><sup class="reference" data-dcnode-id="8642" id="cite_ref-64"><a data-dcnode-id="8643" href="#cite_note-64"><span data-dcnode-id="8644" instrument_node="">[62]</span></a></sup><span data-dcnode-id="8641" instrument_node=""> including </span><a data-dcnode-id="8639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Military_exercise" title="Military exercise"><span data-dcnode-id="8640" instrument_node="">joint exercises</span></a><span data-dcnode-id="8638" instrument_node="">.</span><sup class="reference" data-dcnode-id="8635" id="cite_ref-65"><a data-dcnode-id="8636" href="#cite_note-65"><span data-dcnode-id="8637" instrument_node="">[63]</span></a></sup><span data-dcnode-id="8634" instrument_node=""> According to Ukraine the continuation of Ukraine-NATO cooperation does not exclude the development of a strategic </span><a data-dcnode-id="8632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russia%25E2%2580%2593Ukraine_relations" title="Russia–Ukraine relations"><span data-dcnode-id="8633" instrument_node="">partnership with Russia</span></a><span data-dcnode-id="8631" instrument_node="">.</span><sup class="reference" data-dcnode-id="8628" id="cite_ref-66"><a data-dcnode-id="8629" href="#cite_note-66"><span data-dcnode-id="8630" instrument_node="">[64]</span></a></sup><span data-dcnode-id="8627" instrument_node="">
</span></p><p data-dcnode-id="8620"><span data-dcnode-id="8625" instrument_node="">On 27 May 2010, Yanukovych stated that he considered Ukraine's relations with NATO as a partnership, "And Ukraine can't live without this [partnership], because Ukraine is a large country".</span><sup class="reference" data-dcnode-id="8622" id="cite_ref-NATOlove_67-0"><a data-dcnode-id="8623" href="#cite_note-NATOlove-67"><span data-dcnode-id="8624" instrument_node="">[65]</span></a></sup><span data-dcnode-id="8621" instrument_node="">
</span></p><p data-dcnode-id="8603"><span data-dcnode-id="8619" instrument_node="">On 3 June 2010, the Ukrainian parliament passed a bill proposed by the President that excluded the goal of "integration into Euro-Atlantic security and NATO membership" from the country's national security strategy.</span><sup class="reference" data-dcnode-id="8616" id="cite_ref-radanonato_68-0"><a data-dcnode-id="8617" href="#cite_note-radanonato-68"><span data-dcnode-id="8618" instrument_node="">[66]</span></a></sup><span data-dcnode-id="8615" instrument_node=""> The law precluded Ukraine's membership of any military bloc, but allowed for co-operation with alliances such as NATO.</span><sup class="reference" data-dcnode-id="8612" id="cite_ref-69"><a data-dcnode-id="8613" href="#cite_note-69"><span data-dcnode-id="8614" instrument_node="">[67]</span></a></sup><span data-dcnode-id="8611" instrument_node=""> "</span><a class="mw-redirect" data-dcnode-id="8609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukraine_and_the_European_Union" title="Ukraine and the European Union"><span data-dcnode-id="8610" instrument_node="">European integration</span></a><span data-dcnode-id="8608" instrument_node="">" is still part of Ukraine's national security strategy.</span><sup class="reference" data-dcnode-id="8605" id="cite_ref-radanonato_68-1"><a data-dcnode-id="8606" href="#cite_note-radanonato-68"><span data-dcnode-id="8607" instrument_node="">[66]</span></a></sup><span data-dcnode-id="8604" instrument_node="">
</span></p><p data-dcnode-id="8590"><span data-dcnode-id="8602" instrument_node="">On 24 June 2010, the </span><a class="mw-redirect" data-dcnode-id="8600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukrainian_Cabinet_of_Ministers" title="Ukrainian Cabinet of Ministers"><span data-dcnode-id="8601" instrument_node="">Ukrainian Cabinet of Ministers</span></a><span data-dcnode-id="8599" instrument_node=""> approved an action plan to implement an annual national program of cooperation with NATO in 2010.</span><sup class="reference" data-dcnode-id="8596" id="cite_ref-NATO2010_70-0"><a data-dcnode-id="8597" href="#cite_note-NATO2010-70"><span data-dcnode-id="8598" instrument_node="">[68]</span></a></sup><span data-dcnode-id="8595" instrument_node=""> This included:</span><sup class="reference" data-dcnode-id="8592" id="cite_ref-NATO2010_70-1"><a data-dcnode-id="8593" href="#cite_note-NATO2010-70"><span data-dcnode-id="8594" instrument_node="">[68]</span></a></sup><span data-dcnode-id="8591" instrument_node="">
</span></p><span data-dcnode-id="8589" instrument_node="">
</span><ul data-dcnode-id="8565"><li data-dcnode-id="8587"><span data-dcnode-id="8588" instrument_node="">Involvement of Ukrainian aviation and transport material in the transportation of cargo and personnel of the armed forces of NATO's member states and partners participating in NATO-led peacekeeping missions and operations</span></li><span data-dcnode-id="8586" instrument_node="">
</span><li data-dcnode-id="8582"><span data-dcnode-id="8585" instrument_node="">The continuation of Ukraine's participation in a </span><a data-dcnode-id="8583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kosovo_Force" title="Kosovo Force"><span data-dcnode-id="8584" instrument_node="">peacekeeping operation in Kosovo</span></a></li><span data-dcnode-id="8581" instrument_node="">
</span><li data-dcnode-id="8574"><span data-dcnode-id="8580" instrument_node="">Possible reinforcing of Ukraine's </span><a data-dcnode-id="8578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Security_Assistance_Force" title="International Security Assistance Force"><span data-dcnode-id="8579" instrument_node="">peacekeeping contingents in Afghanistan</span></a><span data-dcnode-id="8577" instrument_node=""> and </span><a data-dcnode-id="8575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO_Training_Mission_%25E2%2580%2593_Iraq" title="NATO Training Mission – Iraq"><span data-dcnode-id="8576" instrument_node="">Iraq</span></a></li><span data-dcnode-id="8573" instrument_node="">
</span><li data-dcnode-id="8571"><span data-dcnode-id="8572" instrument_node="">Ukraine's participation in a number of international events organized by NATO</span></li><span data-dcnode-id="8570" instrument_node="">
</span><li data-dcnode-id="8566"><span data-dcnode-id="8569" instrument_node="">Training of Ukrainian troops in the structures of </span><a class="mw-redirect" data-dcnode-id="8567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO_members" title="NATO members"><span data-dcnode-id="8568" instrument_node="">NATO members</span></a></li></ul><span data-dcnode-id="8564" instrument_node="">
</span><p data-dcnode-id="8558"><span data-dcnode-id="8563" instrument_node="">Ukraine and NATO continued to hold joint seminars and joint tactical and strategical exercises and operations during Yanukovych Presidency.</span><sup class="reference" data-dcnode-id="8560" id="cite_ref-securityexer_71-0"><a data-dcnode-id="8561" href="#cite_note-securityexer-71"><span data-dcnode-id="8562" instrument_node="">[69]</span></a></sup><span data-dcnode-id="8559" instrument_node="">
</span></p><span data-dcnode-id="8557" instrument_node="">
</span><h3 data-dcnode-id="8546"><span data-dcnode-id="8556" id="Presidency_of_Petro_Poroshenko_.282014.E2.80.932019.29"></span><span class="mw-headline" data-dcnode-id="8554" id="Presidency_of_Petro_Poroshenko_(2014–2019)"><span data-dcnode-id="8555" instrument_node="">Presidency of Petro Poroshenko (2014–2019)</span></span><span class="mw-editsection" data-dcnode-id="8547"><span class="mw-editsection-bracket" data-dcnode-id="8552"><span data-dcnode-id="8553" instrument_node="">[</span></span><a data-dcnode-id="8550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUkraine%25E2%2580%2593NATO_relations%26action%3Dedit%26section%3D8" title="Edit section: Presidency of Petro Poroshenko (2014–2019)"><span data-dcnode-id="8551" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8548"><span data-dcnode-id="8549" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8545" instrument_node="">
</span><p data-dcnode-id="8487"><span data-dcnode-id="8544" instrument_node="">Yanukovych fled Ukraine amid the </span><a data-dcnode-id="8542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Euromaidan" title="Euromaidan"><span data-dcnode-id="8543" instrument_node="">Euromaidan</span></a><span data-dcnode-id="8541" instrument_node=""> uprising in February 2014.</span><sup class="reference" data-dcnode-id="8538" id="cite_ref-result_of_Russia_UNR_6-1"><a data-dcnode-id="8539" href="#cite_note-result_of_Russia_UNR-6"><span data-dcnode-id="8540" instrument_node="">[6]</span></a></sup><span data-dcnode-id="8537" instrument_node=""> As a result of this </span><a class="mw-redirect" data-dcnode-id="8535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2014_Ukrainian_revolution" title="2014 Ukrainian revolution"><span data-dcnode-id="8536" instrument_node="">revolution</span></a><span data-dcnode-id="8534" instrument_node="">, the interim </span><a data-dcnode-id="8532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Yatsenyuk_government" title="First Yatsenyuk government"><span data-dcnode-id="8533" instrument_node="">Yatseniuk Government</span></a><span data-dcnode-id="8531" instrument_node=""> came to power on 26 February in Ukraine.</span><sup class="reference" data-dcnode-id="8528" id="cite_ref-IU26214GNU_72-0"><a data-dcnode-id="8529" href="#cite_note-IU26214GNU-72"><span data-dcnode-id="8530" instrument_node="">[70]</span></a></sup><sup class="reference" data-dcnode-id="8525" id="cite_ref-73"><a data-dcnode-id="8526" href="#cite_note-73"><span data-dcnode-id="8527" instrument_node="">[71]</span></a></sup><span data-dcnode-id="8524" instrument_node=""> The Yatseniuk Government initially stated it did not have the intention of making Ukraine a member of NATO.</span><sup class="reference" data-dcnode-id="8521" id="cite_ref-NNUIU29314_7-1"><a data-dcnode-id="8522" href="#cite_note-NNUIU29314-7"><span data-dcnode-id="8523" instrument_node="">[7]</span></a></sup><span data-dcnode-id="8520" instrument_node=""> </span><a data-dcnode-id="8518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Petro_Poroshenko" title="Petro Poroshenko"><span data-dcnode-id="8519" instrument_node="">Petro Poroshenko</span></a><span data-dcnode-id="8517" instrument_node=""> was </span><a data-dcnode-id="8515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2014_Ukrainian_presidential_election" title="2014 Ukrainian presidential election"><span data-dcnode-id="8516" instrument_node="">elected president on 25 May 2014</span></a><span data-dcnode-id="8514" instrument_node="">.</span><sup class="reference" data-dcnode-id="8511" id="cite_ref-wp_74-0"><a data-dcnode-id="8512" href="#cite_note-wp-74"><span data-dcnode-id="8513" instrument_node="">[72]</span></a></sup><sup class="reference" data-dcnode-id="8508" id="cite_ref-75"><a data-dcnode-id="8509" href="#cite_note-75"><span data-dcnode-id="8510" instrument_node="">[73]</span></a></sup><sup class="reference" data-dcnode-id="8505" id="cite_ref-76"><a data-dcnode-id="8506" href="#cite_note-76"><span data-dcnode-id="8507" instrument_node="">[74]</span></a></sup><sup class="reference" data-dcnode-id="8502" id="cite_ref-77"><a data-dcnode-id="8503" href="#cite_note-77"><span data-dcnode-id="8504" instrument_node="">[75]</span></a></sup><sup class="reference" data-dcnode-id="8499" id="cite_ref-78"><a data-dcnode-id="8500" href="#cite_note-78"><span data-dcnode-id="8501" instrument_node="">[76]</span></a></sup><sup class="reference" data-dcnode-id="8496" id="cite_ref-79"><a data-dcnode-id="8497" href="#cite_note-79"><span data-dcnode-id="8498" instrument_node="">[77]</span></a></sup><span data-dcnode-id="8495" instrument_node=""> On 1 October 2014, </span><a data-dcnode-id="8493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jens_Stoltenberg" title="Jens Stoltenberg"><span data-dcnode-id="8494" instrument_node="">Jens Stoltenberg</span></a><span data-dcnode-id="8492" instrument_node=""> took over the position of NATO Secretary-General.</span><sup class="reference" data-dcnode-id="8489" id="cite_ref-natojens_80-0"><a data-dcnode-id="8490" href="#cite_note-natojens-80"><span data-dcnode-id="8491" instrument_node="">[78]</span></a></sup><span data-dcnode-id="8488" instrument_node="">
</span></p><span data-dcnode-id="8486" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8469"><div class="thumbinner" data-dcnode-id="8470" style="width:222px;"><a class="image" data-dcnode-id="8484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APoroschenko_Merkel_and_Biden_Security_Conference_February_2015.jpg"><img alt="" class="thumbimage" data-dcnode-id="8485" data-file-height="2407" data-file-width="3714" decoding="async" height="143" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/fc/Poroschenko_Merkel_and_Biden_Security_Conference_February_2015.jpg/220px-Poroschenko_Merkel_and_Biden_Security_Conference_February_2015.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/fc/Poroschenko_Merkel_and_Biden_Security_Conference_February_2015.jpg/330px-Poroschenko_Merkel_and_Biden_Security_Conference_February_2015.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/fc/Poroschenko_Merkel_and_Biden_Security_Conference_February_2015.jpg/440px-Poroschenko_Merkel_and_Biden_Security_Conference_February_2015.jpg 2x" width="220"></a><span data-dcnode-id="8483" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8471"><div class="magnify" data-dcnode-id="8481"><a class="internal" data-dcnode-id="8482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APoroschenko_Merkel_and_Biden_Security_Conference_February_2015.jpg" title="Enlarge"></a></div><a data-dcnode-id="8479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Petro_Poroshenko" title="Petro Poroshenko"><span data-dcnode-id="8480" instrument_node="">Petro Poroshenko</span></a><span data-dcnode-id="8478" instrument_node=""> with German Chancellor </span><a data-dcnode-id="8476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Angela_Merkel" title="Angela Merkel"><span data-dcnode-id="8477" instrument_node="">Angela Merkel</span></a><span data-dcnode-id="8475" instrument_node=""> and Vice President of the United States </span><a data-dcnode-id="8473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joe_Biden" title="Joe Biden"><span data-dcnode-id="8474" instrument_node="">Joe Biden</span></a><span data-dcnode-id="8472" instrument_node="">, February 2015</span></div></div></div><span data-dcnode-id="8468" instrument_node="">
</span><p data-dcnode-id="8458"><span data-dcnode-id="8467" instrument_node="">NATO officials vowed support for Ukraine and worked to downplay tensions between the bloc and Russia, which refused to recognize the impeachment of Yanukovych or the Yatseniuk Government.</span><sup class="reference" data-dcnode-id="8464" id="cite_ref-81"><a data-dcnode-id="8465" href="#cite_note-81"><span data-dcnode-id="8466" instrument_node="">[79]</span></a></sup><span data-dcnode-id="8463" instrument_node=""> In late February 2014, Secretary-General Rasmussen reaffirmed that NATO membership is still an option for Ukraine.</span><sup class="reference" data-dcnode-id="8460" id="cite_ref-82"><a data-dcnode-id="8461" href="#cite_note-82"><span data-dcnode-id="8462" instrument_node="">[80]</span></a></sup><span data-dcnode-id="8459" instrument_node="">
