</span><div class="optin optin--hotdeals" data-dcnode-id="9383"><b data-dcnode-id="9384"><span data-dcnode-id="9393" instrument_node="">Trending: </span><a data-dcnode-id="9391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/best-ar-15/"><span data-dcnode-id="9392" instrument_node="">Best AR-15s</span></a><span data-dcnode-id="9390" instrument_node="">, </span><a data-dcnode-id="9388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/best-places-to-buy-ammo-online/"><span data-dcnode-id="9389" instrument_node="">Best Places to Buy Ammo Online</span></a><span data-dcnode-id="9387" instrument_node="">, &amp; </span><a data-dcnode-id="9385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/best-concealed-carry-guns-caliber/"><span data-dcnode-id="9386" instrument_node="">Best Concealed Carry Guns</span></a></b></div><span data-dcnode-id="9382" instrument_node="">
</span><p data-dcnode-id="9380"><span data-dcnode-id="9381" instrument_node="">Over-penetration in a home defense situation can cause more harm than the original threat.</span></p><span data-dcnode-id="9379" instrument_node="">
</span><p data-dcnode-id="9377"><span data-dcnode-id="9378" instrument_node="">If, God forbid, someone should break into your home, you will have a million thoughts racing through your head, and a stress level some people may never feel in their life.&nbsp;</span></p><span data-dcnode-id="9376" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="9372"><img alt="" class="wp-image-48237" data-dcnode-id="9375" height="768" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2020/01/300blk1-1024x768.jpg&amp;raw" width="1024"><figcaption data-dcnode-id="9373"><span data-dcnode-id="9374" instrument_node="">My .300 Blackout HD Pistol</span></figcaption></figure><span data-dcnode-id="9371" instrument_node="">
</span><p data-dcnode-id="9369"><span data-dcnode-id="9370" instrument_node="">While you are nice and safe reading this article, this is EXACTLY the time to think about over-penetration and the liability that comes with it. </span></p><span data-dcnode-id="9368" instrument_node="">
</span><p data-dcnode-id="9366"><span data-dcnode-id="9367" instrument_node="">In this article, I will be discussing over-penetration with 12-gauge shotgun loads, 9mm and .45 ACP handguns, and finally 5.56 NATO/.223, and .300 BLK AR-15s.&nbsp;</span></p><span data-dcnode-id="9365" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="9361"><img alt="" class="wp-image-48238" data-dcnode-id="9364" height="768" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2020/01/45lineup-1024x768.jpg&amp;raw" width="1024"><figcaption data-dcnode-id="9362"><span data-dcnode-id="9363" instrument_node="">Less than 1/5th of the ammo I tested. Buckle up.</span></figcaption></figure><span data-dcnode-id="9360" instrument_node="">
</span><p data-dcnode-id="9355"><span data-dcnode-id="9359" instrument_node="">This is not a test of the firearms, but rather a </span><span data-dcnode-id="9357" style="text-decoration: underline"><span data-dcnode-id="9358" instrument_node="">test of what the firearms are shooting</span></span><span data-dcnode-id="9356" instrument_node="">. </span></p><span data-dcnode-id="9354" instrument_node="">
</span><p data-dcnode-id="9352"><span data-dcnode-id="9353" instrument_node="">Assuming you are looking at roughly the same barrel lengths, the exact firearm using these cartridges will be approximately the same.</span></p><span data-dcnode-id="9351" instrument_node="">
</span><p data-dcnode-id="9349"><span data-dcnode-id="9350" instrument_node="">Penetration testing was done these loads through real, current building materials, and I will cover the pros and cons of each caliber/load and how they performed in testing.</span></p><span data-dcnode-id="9348" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="9346"><img alt="science" class="wp-image-48236" data-dcnode-id="9347" height="166" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2020/01/science.gif&amp;raw" width="400"></figure><span data-dcnode-id="9345" instrument_node="">
</span><p data-dcnode-id="9343"><span data-dcnode-id="9344" instrument_node="">This is a long article, but it’s important and worth the full read. </span></p><span data-dcnode-id="9342" instrument_node="">
</span><p data-dcnode-id="9340"><span data-dcnode-id="9341" instrument_node="">We’re going to dispel some fudd lore and provide real data to help you make the best decision for your family in your home.</span></p><span data-dcnode-id="9339" instrument_node="">
</span><div class="post-toc well" data-dcnode-id="9287"><p class="post-toc__title" data-dcnode-id="9337"><span data-dcnode-id="9338" instrument_node="">Table of Contents</span></p><ol class="list-unstyled" data-dcnode-id="9288" id="postToc"><li data-dcnode-id="9334"><a data-dcnode-id="9335" href="#toc1" onclick=""><span data-dcnode-id="9336" instrument_node="">The Setup</span></a></li><li data-dcnode-id="9331"><a data-dcnode-id="9332" href="#toc2" onclick=""><span data-dcnode-id="9333" instrument_node="">Shotgun Over-Penetration Testing</span></a></li><li data-dcnode-id="9328"><a data-dcnode-id="9329" href="#toc3" onclick=""><span data-dcnode-id="9330" instrument_node="">Best 12 Gauge Home Defense Loads</span></a></li><li data-dcnode-id="9325"><a data-dcnode-id="9326" href="#toc4" onclick=""><span data-dcnode-id="9327" instrument_node="">Pros and Cons for The Shotgun</span></a></li><li data-dcnode-id="9322"><a data-dcnode-id="9323" href="#toc5" onclick=""><span data-dcnode-id="9324" instrument_node="">Final Shotgun Grade</span></a></li><li data-dcnode-id="9319"><a data-dcnode-id="9320" href="#toc6" onclick=""><span data-dcnode-id="9321" instrument_node="">Handgun Over-Penetration Testing</span></a></li><li data-dcnode-id="9316"><a data-dcnode-id="9317" href="#toc7" onclick=""><span data-dcnode-id="9318" instrument_node="">Best 9mm Home Defense Loads:</span></a></li><li data-dcnode-id="9313"><a data-dcnode-id="9314" href="#toc8" onclick=""><span data-dcnode-id="9315" instrument_node="">Best .45 ACP Home Defense Loads:</span></a></li><li data-dcnode-id="9310"><a data-dcnode-id="9311" href="#toc9" onclick=""><span data-dcnode-id="9312" instrument_node="">Pros and Cons for The Handgun</span></a></li><li data-dcnode-id="9307"><a data-dcnode-id="9308" href="#toc10" onclick=""><span data-dcnode-id="9309" instrument_node="">Final Handgun Grade</span></a></li><li data-dcnode-id="9304"><a data-dcnode-id="9305" href="#toc11" onclick=""><span data-dcnode-id="9306" instrument_node="">Rifle Over-Penetration Testing</span></a></li><li data-dcnode-id="9301"><a data-dcnode-id="9302" href="#toc12" onclick=""><span data-dcnode-id="9303" instrument_node="">Best 5.56 NATO/.223 Remington Home Defense Loads:</span></a></li><li data-dcnode-id="9298"><a data-dcnode-id="9299" href="#toc13" onclick=""><span data-dcnode-id="9300" instrument_node="">Best .300 Black Out Home Defense Loads:</span></a></li><li data-dcnode-id="9295"><a data-dcnode-id="9296" href="#toc14" onclick=""><span data-dcnode-id="9297" instrument_node="">Pros and Cons for The Rifle</span></a></li><li data-dcnode-id="9292"><a data-dcnode-id="9293" href="#toc15" onclick=""><span data-dcnode-id="9294" instrument_node="">Final Rifle Grade</span></a></li><li data-dcnode-id="9289"><a data-dcnode-id="9290" href="#toc16" onclick=""><span data-dcnode-id="9291" instrument_node="">Parting Shots</span></a></li></ol></div><span data-dcnode-id="9286" instrument_node="">
</span><h2 data-dcnode-id="9284" id="toc1"><span data-dcnode-id="9285" instrument_node="">The Setup</span></h2><span data-dcnode-id="9283" instrument_node="">
</span><p data-dcnode-id="9281"><span data-dcnode-id="9282" instrument_node="">To simulate a real home, I made 2’x2’ frames with 2″x4″ studs and then sheeted them with 3/8″ drywall on each side to simulate an interior wall. </span></p><span data-dcnode-id="9280" instrument_node="">
</span><p data-dcnode-id="9278"><span data-dcnode-id="9279" instrument_node="">I also built a simulated exterior wall by framing a 2’x4′ wall sheeted in 3/8″ drywall and 1/2″ plywood on the exterior side. Inside of the exterior wall, R13 insulation was added for added realism.</span></p><span data-dcnode-id="9277" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="9273"><img alt="" class="wp-image-48216" data-dcnode-id="9276" height="753" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2020/01/HD-Over-pen-test-set-up-1024x753.jpg&amp;raw" width="1024"><figcaption data-dcnode-id="9274"><span data-dcnode-id="9275" instrument_node="">Author’s set up, simulating an “intruder” with an interior and exterior wall panel behind the target.</span></figcaption></figure><span data-dcnode-id="9272" instrument_node="">
</span><p data-dcnode-id="9270"><span data-dcnode-id="9271" instrument_node="">A card table was placed with a 12″ long 10% ballistic gel block 12 inches in front of the interior wall panel. </span></p><span data-dcnode-id="9269" instrument_node="">
</span><p data-dcnode-id="9263"><span data-dcnode-id="9268" instrument_node="">This 12″ of ballistic gel is used to simulate an intruder’s chest cavity. The gel was calibrated per FBI specs for 10% ballistic gel and can be found at </span><a data-dcnode-id="9265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.clearballistics.com/" rel="noopener" target="_blank"><strong data-dcnode-id="9266"><span data-dcnode-id="9267" instrument_node="">Clear Ballistics</span></strong></a><span data-dcnode-id="9264" instrument_node="">.</span></p><span data-dcnode-id="9262" instrument_node="">
</span><p data-dcnode-id="9260"><span data-dcnode-id="9261" instrument_node="">Ten feet behind the interior wall, the exterior wall was placed. All shots were taken 10 feet away from the 12″ ballistic gel “torso”. </span></p><span data-dcnode-id="9259" instrument_node="">
</span><p data-dcnode-id="9254"><span data-dcnode-id="9258" instrument_node="">If a round made it through the gel and both walls, it </span><strong data-dcnode-id="9256"><span data-dcnode-id="9257" instrument_node="">failed</span></strong><span data-dcnode-id="9255" instrument_node=""> the test for over-penetration. A “clean miss” was also shot with every load to test over-penetration when the shot did not encounter the ballistic gel block.</span></p><span data-dcnode-id="9253" instrument_node="">
</span><p data-dcnode-id="9251"><span data-dcnode-id="9252" instrument_node="">Here’s a hint. Don’t miss. </span></p><span data-dcnode-id="9250" instrument_node="">
</span><p data-dcnode-id="9248"><span data-dcnode-id="9249" instrument_node="">Soft tissue does a heck of a great job with slowing down projectiles and destabilizing them for potential fracturing. Every load with exception of the #9 Birdshot, blew through both walls and “exited the house” when there was a clean miss.</span></p><span data-dcnode-id="9247" instrument_node="">
</span><h3 data-dcnode-id="9245"><span data-dcnode-id="9246" instrument_node="">Disclaimer</span></h3><span data-dcnode-id="9244" instrument_node="">
</span><p data-dcnode-id="9242"><span data-dcnode-id="9243" instrument_node="">I understand that all homes are different, so before people start chiming in what their home is made of, I think my choices show current common materials that are used in the manner they are most often employed. </span></p><span data-dcnode-id="9241" instrument_node="">
</span><p data-dcnode-id="9239"><span data-dcnode-id="9240" instrument_node="">You may have brick, cinderblock, plaster and lathe, or have open floor plans in your Scrooge McDuck mansion. My setup would be more typical for smaller single-family homes.</span></p><span data-dcnode-id="9238" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="9234"><img alt="" class="wp-image-48239" data-dcnode-id="9237" height="370" loading="lazy" sizes="(max-width: 887px) 100vw, 887px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2020/01/McMansion.jpg&amp;raw" srcset="https://www.pewpewtactical.com/wp-content/uploads/2020/01/McMansion.jpg 887w, https://www.pewpewtactical.com/wp-content/uploads/2020/01/McMansion-300x125.jpg 300w, https://www.pewpewtactical.com/wp-content/uploads/2020/01/McMansion-768x320.jpg 768w" width="887"><figcaption data-dcnode-id="9235"><span data-dcnode-id="9236" instrument_node="">If this is your home, you might want to look into something in belt-fed so that you can cover the front yard.</span></figcaption></figure><span data-dcnode-id="9233" instrument_node="">
</span><p data-dcnode-id="9231"><span data-dcnode-id="9232" instrument_node="">It should also be pointed out that ballistic gel does not represent a human well, it has no bone, fat layer, clothing, or muscle. </span></p><span data-dcnode-id="9230" instrument_node="">
</span><p data-dcnode-id="9228"><span data-dcnode-id="9229" instrument_node="">All of these are somewhat different for each person, and exact shot placement will also matter, so real-world results will have a degree of variation to them that we cannot replicate.</span></p><span data-dcnode-id="9227" instrument_node="">
</span><p data-dcnode-id="9222"><span data-dcnode-id="9226" instrument_node="">The point of the gel is to give a consistent medium that is dense enough yet soft enough to effectively test munitions. The primary goal is </span><strong data-dcnode-id="9224"><span data-dcnode-id="9225" instrument_node="">standardization</span></strong><span data-dcnode-id="9223" instrument_node="">, not perfect replication.</span></p><span data-dcnode-id="9221" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="9217"><img alt="44 mag gel test bad day" class="wp-image-28617" data-dcnode-id="9220" height="360" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2018/06/44-mag-gel-test-bad-day.gif&amp;raw" width="640"><figcaption data-dcnode-id="9218"><span data-dcnode-id="9219" instrument_node="">Gel is also fun. FYI, .44 Magnum will mess you and your gel up!</span></figcaption></figure><span data-dcnode-id="9216" instrument_node="">
</span><p data-dcnode-id="9214"><span data-dcnode-id="9215" instrument_node="">Results will also have slight differences depending on the firearm you use. But it shouldn’t be hugely different. The design and overall specs of a cartridge are more important.</span></p><span data-dcnode-id="9213" instrument_node="">
</span><p data-dcnode-id="9211"><span data-dcnode-id="9212" instrument_node="">Lastly, please actually read to the end of the article before you start writing your dissertation on why you think I’m wrong. </span></p><span data-dcnode-id="9210" instrument_node="">
</span><p data-dcnode-id="9205"><span data-dcnode-id="9209" instrument_node="">And remember that </span><span data-dcnode-id="9207" style="text-decoration: underline"><span data-dcnode-id="9208" instrument_node="">I actually tested all of this</span></span><span data-dcnode-id="9206" instrument_node="">, have you?</span></p><span data-dcnode-id="9204" instrument_node="">
</span><p data-dcnode-id="9200"><strong data-dcnode-id="9202"><span data-dcnode-id="9203" instrument_node="">EDITOR’S NOTE:</span></strong><span data-dcnode-id="9201" instrument_node=""> Please forgive the parts where Ken reiterates himself, we wanted to make sure that if you the reader only jump to one section to read the results, you would have the critical information needed. As such, we describe in short the set-up and testing multiple times.</span></p><span data-dcnode-id="9199" instrument_node="">
</span><p data-dcnode-id="9197"><span data-dcnode-id="9198" instrument_node="">With that out of the way, time for the fun stuff!</span></p><span data-dcnode-id="9196" instrument_node="">
</span><h2 data-dcnode-id="9194" id="toc2"><span data-dcnode-id="9195" instrument_node="">Shotgun Over-Penetration Testing</span></h2><span data-dcnode-id="9193" instrument_node="">
</span><h3 data-dcnode-id="9191"><span data-dcnode-id="9192" instrument_node="">The Shotgun And The Shells</span></h3><span data-dcnode-id="9190" instrument_node="">
</span><p data-dcnode-id="9188"><span data-dcnode-id="9189" instrument_node="">The shotgun that I had for testing was supplied by Remington Arms. It is their 870 DM Predator with an 18″ barrel in a Highlander Kryptek finish. It has a thumbhole stock and utilizes a 3 round or 6 round detachable magazines.</span></p><span data-dcnode-id="9187" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="9183"><img alt="HD Overpen test 870 shotgun and ammo" class="wp-image-48217" data-dcnode-id="9186" height="768" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2020/01/HD-Overpen-test-870-shotgun-and-ammo-1024x768.jpg&amp;raw" width="1024"><figcaption data-dcnode-id="9184"><span data-dcnode-id="9185" instrument_node="">The 870 DM Predator shotgun and the types of shotgun shells tested.</span></figcaption></figure><span data-dcnode-id="9182" instrument_node="">
</span><p data-dcnode-id="9180"><span data-dcnode-id="9181" instrument_node="">Cycling has been reliable, and I have really enjoyed the shotgun while hunting, or running defensive drills with it. It also has proven itself to me from multiple hunts with hogs, turkeys, and coyotes. </span></p><span data-dcnode-id="9179" instrument_node="">

</span><p data-dcnode-id="9058"><strong data-dcnode-id="9059"><span data-dcnode-id="9060" instrument_node="">Shotgun Results</span></strong></p><span data-dcnode-id="9057" instrument_node="">

</span><h3 data-dcnode-id="8980"><span data-dcnode-id="8981" instrument_node="">Remington 2 3/4″ #9 Target Loads – PASS… KIND OF</span></h3><span data-dcnode-id="8979" instrument_node="">
</span><p data-dcnode-id="8977"><span data-dcnode-id="8978" instrument_node="">I wanted to test birdshot first to clear up some possible misconceptions. A lot of people who worry about over-penetration consider low brass, birdshot loads to be a perfect choice for home defense. This is a bit of a gray area in my opinion.</span></p><span data-dcnode-id="8976" instrument_node="">
</span><p data-dcnode-id="8974"><span data-dcnode-id="8975" instrument_node="">Lethality has been proven to be less than desirable and fluctuate depending on the range to the target. </span></p><span data-dcnode-id="8973" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="8969"><img alt="12ga Birdshot, Opened" class="wp-image-44574" data-dcnode-id="8972" height="683" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2019/09/46.-12ga-Birdshot-Opened-1024x683.jpg&amp;raw" width="1024"><figcaption data-dcnode-id="8970"><span data-dcnode-id="8971" instrument_node="">12ga Birdshot, Opened</span></figcaption></figure><span data-dcnode-id="8968" instrument_node="">
</span><p data-dcnode-id="8966"><span data-dcnode-id="8967" instrument_node="">While I don’t think you will ever meet someone that would want to be hit by birdshot within 20 feet, lethality is an important topic. </span></p><span data-dcnode-id="8965" instrument_node="">
</span><p data-dcnode-id="8963"><span data-dcnode-id="8964" instrument_node="">If someone is actively trying to take your life, a load needs to have adequate penetration to reach vital organs.</span></p><span data-dcnode-id="8962" instrument_node="">
</span><p data-dcnode-id="8960"><span data-dcnode-id="8961" instrument_node="">While this load did not over-penetrate after it hit 12″ of ballistic gel, on a real human target with fat, dense muscle tissue, and a rib cage, it may not get the job done due to small shot size and shot deformation. </span></p><span data-dcnode-id="8959" instrument_node="">

</span><h3 data-dcnode-id="8840"><span data-dcnode-id="8841" instrument_node="">Remington 2 3/4″ 00 Buck – FAIL</span></h3><span data-dcnode-id="8839" instrument_node="">
</span><p data-dcnode-id="8837"><span data-dcnode-id="8838" instrument_node="">00 Buck has always been a popular option, but the problem is that most people do not consider over-penetration. While it has devastating terminal ballistics, the dense and fast-flying .33 caliber pellets do not stop after encountering soft tissue. </span></p><span data-dcnode-id="8836" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="8832"><img alt="Winchester 12ga 00 Buckshot" class="wp-image-44592" data-dcnode-id="8835" height="683" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2019/09/64.-Winchester-12ga-00-Buckshot-1024x683.jpg&amp;raw" width="1024"><figcaption data-dcnode-id="8833"><span data-dcnode-id="8834" instrument_node="">Winchester 12ga 00 Buckshot, each pellet is .33 caliber</span></figcaption></figure><span data-dcnode-id="8831" instrument_node="">
</span><p data-dcnode-id="8829"><span data-dcnode-id="8830" instrument_node="">Testing these loads proved that after encountering 12″ of 10% ballistic gel, the pellets continued through the first interior wall and easily passed through the exterior wall.</span></p><span data-dcnode-id="8828" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="8824"><img alt="HD overpen test buckshot exterior wall" class="wp-image-48219" data-dcnode-id="8827" height="769" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2020/01/HD-overpen-test-buckshot-exterior-wall-1024x769.jpg&amp;raw" width="1024"><figcaption data-dcnode-id="8825"><span data-dcnode-id="8826" instrument_node="">00 Buck can be a viable option, but over-penetration can be a liability.</span></figcaption></figure><span data-dcnode-id="8823" instrument_node="">
</span><p data-dcnode-id="8817"><span data-dcnode-id="8822" instrument_node="">Since this test deals specifically with over-penetration, </span><span data-dcnode-id="8819" style="text-decoration: underline"><strong data-dcnode-id="8820"><span data-dcnode-id="8821" instrument_node="">00 Buck gets a failing grade for home defense</span></strong></span><span data-dcnode-id="8818" instrument_node="">. </span></p><span data-dcnode-id="8816" instrument_node="">

</span><h3 data-dcnode-id="8703"><span data-dcnode-id="8704" instrument_node="">Barnes 2 3/4″ Expander Slug – FAIL</span></h3><span data-dcnode-id="8702" instrument_node="">
</span><p data-dcnode-id="8698"><strong data-dcnode-id="8700"><span data-dcnode-id="8701" instrument_node=""> </span></strong><span data-dcnode-id="8699" instrument_node="">Loading the Barnes Expander slugs into the 870 DM’s magazine I hoped for the best. </span></p><span data-dcnode-id="8697" instrument_node="">
</span><p data-dcnode-id="8695"><span data-dcnode-id="8696" instrument_node="">I thought that there could possibly be a chance that due to their design, the slug would have enough rapid expansion that they could slow enough to not punch through both interior and exterior walls.&nbsp;</span></p><span data-dcnode-id="8694" instrument_node="">
</span><p data-dcnode-id="8692"><span data-dcnode-id="8693" instrument_node="">All hopes were shattered after my first shot. Once again, the slug pile-drive through a fresh 12″ of 10% ballistic gel without a hiccup and sliced through each wall with little effort.</span></p><span data-dcnode-id="8691" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="8687"><img alt="HD overpen test slug ex wall" class="wp-image-48220" data-dcnode-id="8690" height="768" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2020/01/HD-overpen-test-slug-ex-wall-1024x768.jpg&amp;raw" width="1024"><figcaption data-dcnode-id="8688"><span data-dcnode-id="8689" instrument_node=""> The Barnes Expander did not have enough expansion to prevent over-penetration. Even on this exterior wall, it was almost totally unexpanded.</span></figcaption></figure><span data-dcnode-id="8686" instrument_node="">
</span><p data-dcnode-id="8684"><span data-dcnode-id="8685" instrument_node="">The velocity and the mass of the slugs create a deadly mix of incredibly high muzzle energy, which translates into serious over-penetration through barriers. </span></p><span data-dcnode-id="8683" instrument_node="">

</span><h3 data-dcnode-id="8567"><span data-dcnode-id="8568" instrument_node="">Federal Premium 2 3/4″#4 Buck – PASS</span></h3><span data-dcnode-id="8566" instrument_node="">
</span><p data-dcnode-id="8562"><strong data-dcnode-id="8564"><span data-dcnode-id="8565" instrument_node=""> </span></strong><span data-dcnode-id="8563" instrument_node="">After witnessing the last loads fail the test, I didn’t have much hope anymore that a shotgun load in 12 gauge could meet requirements of deadly lethality, and not blow through multiple walls and exit a simulated home. </span></p><span data-dcnode-id="8561" instrument_node="">
</span><p data-dcnode-id="8559"><span data-dcnode-id="8560" instrument_node="">Hope soon returned to me though after firing Federal Premium’s #4 Buck out of the Remington 870 DM Predator.</span></p><span data-dcnode-id="8558" instrument_node="">
</span><p data-dcnode-id="8556"><span data-dcnode-id="8557" instrument_node="">&nbsp;This load is loved by many coyote hunters because the pattern and range work well, and the size of the pellets perform well on soft tissue.</span></p><span data-dcnode-id="8555" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="8551"><img alt="HD Overpen testing #4 Buck inner wall" class="wp-image-48221" data-dcnode-id="8554" height="768" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2020/01/HD-Overpen-testing-4-Buck-inner-wall-1024x768.jpg&amp;raw" width="1024"><figcaption data-dcnode-id="8552"><span data-dcnode-id="8553" instrument_node="">#4 Buck stopped by the inner wall</span></figcaption></figure><span data-dcnode-id="8550" instrument_node="">
</span><p data-dcnode-id="8548"><span data-dcnode-id="8549" instrument_node="">With most of the 29 pellets either lodging themselves within the 12” gel block or being stuck within the interior wall, this type of load is in the “goldilocks zone” of terminal ballistics and lacks severe over-penetration like 00-Buck.</span></p><span data-dcnode-id="8547" instrument_node="">
</span><p data-dcnode-id="8545"><span data-dcnode-id="8546" instrument_node="">Firing into the 12″ ballistic block, it was apparent that not all the .24 caliber pellets passed through the first wall. Upon visual inspection, some of the pellets stayed within the 12″ of gel, while some were planted into the first sheet of drywall. </span></p><span data-dcnode-id="8544" instrument_node="">

</span></div><h2 data-dcnode-id="8052" id="toc4"><span data-dcnode-id="8053" instrument_node="">Pros and Cons for The Shotgun</span></h2><span data-dcnode-id="8051" instrument_node="">
</span><p data-dcnode-id="8049"><span data-dcnode-id="8050" instrument_node="">The 12-gauge shotgun is a proven weapon that has been fielded by the military, law enforcement, and millions of Americans out in the field while hunting. </span></p><span data-dcnode-id="8048" instrument_node="">
</span><p data-dcnode-id="8046"><span data-dcnode-id="8047" instrument_node="">It is a formidable weapon that has impeccable power within short to moderate range, depending on the load being used.</span></p><span data-dcnode-id="8045" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="8041"><img alt="12ga Shotgun Shells, Opened (L to R: Bird, Buck, Slug)" class="wp-image-44573" data-dcnode-id="8044" height="683" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2019/09/45.-12ga-Shotgun-Shells-Opened-Bird-Buck-Slug-1024x683.jpg&amp;raw" width="1024"><figcaption data-dcnode-id="8042"><span data-dcnode-id="8043" instrument_node="">12ga Shotgun Shells, Opened (L to R: Bird, Buck, Slug)</span></figcaption></figure><span data-dcnode-id="8040" instrument_node="">
</span><p data-dcnode-id="8038"><span data-dcnode-id="8039" instrument_node="">Multiple loads are one of the biggest advantages to the shotgun since a shooter can have a very diverse choice between birdshot, buckshot, slugs, and honestly even less-than-lethal offerings with bean bag or rubber shot loads. </span></p><span data-dcnode-id="8037" instrument_node="">
</span><p data-dcnode-id="8035"><span data-dcnode-id="8036" instrument_node="">The shotgun is highly adaptive, and there is no wonder why some people would choose it for self-defense in the home.</span></p><span data-dcnode-id="8034" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="8030"><img alt="Gun Bed!" class="wp-image-12547" data-dcnode-id="8033" height="250" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2016/11/Gun-Bed.gif&amp;raw" width="400"><figcaption data-dcnode-id="8031"><span data-dcnode-id="8032" instrument_node="">Gun Bed!</span></figcaption></figure><span data-dcnode-id="8029" instrument_node="">
</span><p data-dcnode-id="8027"><span data-dcnode-id="8028" instrument_node="">It would seem odd to consider power being a detriment to home defense with a firearm, but a 12-gauge shotgun must be wielded responsibly. </span></p><span data-dcnode-id="8026" instrument_node="">
</span><p data-dcnode-id="8024"><span data-dcnode-id="8025" instrument_node="">A higher level of recoil should be considered as well as over-penetration. #4 Buckshot is really the only load that I would recommend in a home defense situation.</span></p><span data-dcnode-id="8023" instrument_node="">
</span><p data-dcnode-id="8021"><span data-dcnode-id="8022" instrument_node="">When you also consider magazine capacity, and the substantial recoil of the 12-gauge compared to a carbine or short-barreled AR15, the cons add up quickly. </span></p><span data-dcnode-id="8020" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="8018"><img alt="" class="wp-image-48222" data-dcnode-id="8019" height="763" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2020/01/HD-overpen-test-HD-shotgun-1024x763.jpg&amp;raw" width="1024"></figure><span data-dcnode-id="8017" instrument_node="">
</span><p data-dcnode-id="8015"><span data-dcnode-id="8016" instrument_node="">With any weapon, train with it to minimize any user error issues that are common with the pump shotgun like short-stroking.</span></p><span data-dcnode-id="8014" instrument_node="">
</span><p data-dcnode-id="8012"><span data-dcnode-id="8013" instrument_node="">With regards to over-penetration though, the more lethal loads must be used responsibly, and you need to know your home. Keep in mind, 10% ballistic gel is still not a human being. </span></p><span data-dcnode-id="8011" instrument_node="">
</span><p data-dcnode-id="8009"><span data-dcnode-id="8010" instrument_node="">This is the most scientific way to replicate a home intruder shooting, and YMMV.</span></p><span data-dcnode-id="8008" instrument_node="">
</span><h2 data-dcnode-id="8006" id="toc5"><span data-dcnode-id="8007" instrument_node="">Final Shotgun Grade</span></h2><span data-dcnode-id="8005" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="8002"><strong data-dcnode-id="8003"><span data-dcnode-id="8004" instrument_node="">Terminal Ballistics – 5/5</span></strong></p><span data-dcnode-id="8001" instrument_node="">
</span><p data-dcnode-id="7999"><span data-dcnode-id="8000" instrument_node="">Depending on the load, the shotgun is an absolute powerhouse when it comes to terminal ballistics, shock, and awe. But keep in mind, you need to use the proper ammunition if over-penetration is a concern with you.</span></p><span data-dcnode-id="7998" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="7995"><strong data-dcnode-id="7996"><span data-dcnode-id="7997" instrument_node="">Wound Channels – 4/5</span></strong></p><span data-dcnode-id="7994" instrument_node="">
</span><p data-dcnode-id="7992"><span data-dcnode-id="7993" instrument_node="">A slug is a game-ender, but when it comes to better loads for home defense the #4 Buck is still a solid performer. </span></p><span data-dcnode-id="7991" instrument_node="">
</span><div data-dcnode-id="7984" id="pptOptin1" style="display: block;"><span data-dcnode-id="7990" instrument_node="">
</span><a class="optin" data-dcnode-id="7986" data-dripid="28051371" data-source="yellow-box" data-sourcetype="newsletter" data-target="#footerOptin" data-toggle="optin-modal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/offer/%3Fd%3D28051371%26h%3D%26sh%3D"><b data-dcnode-id="7988"><span data-dcnode-id="7989" instrument_node="">BONUS: Shoot better.</span></b><span data-dcnode-id="7987" instrument_node=""> Download our exclusive shooting targets for FREE ($47 value)</span></a><span data-dcnode-id="7985" instrument_node=""> </span></div><p data-dcnode-id="7982"><span data-dcnode-id="7983" instrument_node="">#9 Birdshot, if it is the only thing available, is not a horrible option in terms of over-penetration, but it must be understood that it will not be effective on soft tissue unless the range to target is within a few feet.</span></p><span data-dcnode-id="7981" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="7978"><strong data-dcnode-id="7979"><span data-dcnode-id="7980" instrument_node="">Over-Penetration – 2/5</span></strong></p><span data-dcnode-id="7977" instrument_node="">
</span><p data-dcnode-id="7975"><span data-dcnode-id="7976" instrument_node="">Overall, the 12-gauge shotgun has either way too much over-penetration or lacks terminal performance in birdshot loads. </span></p><span data-dcnode-id="7974" instrument_node="">
</span><p data-dcnode-id="7972"><span data-dcnode-id="7973" instrument_node="">The goldilocks shell is the #4 Buck loads that were tested. If your trusty scattergun is loaded with #4 Buck, there are worse ideas with protecting your home and family.</span></p><span data-dcnode-id="7971" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="7968"><strong data-dcnode-id="7969"><span data-dcnode-id="7970" instrument_node="">Recoil Management – 3/5</span></strong></p><span data-dcnode-id="7967" instrument_node="">
</span><p data-dcnode-id="7965"><span data-dcnode-id="7966" instrument_node="">With training and blood sacrifices to Jerry Miculek, anything is possible. The shotgun can be harnessed with enough time behind it, but it is still much stouter than a typical defensive carbine or handgun.</span></p><span data-dcnode-id="7964" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="7961"><strong data-dcnode-id="7962"><span data-dcnode-id="7963" instrument_node="">Overall for Home Defense – 3.5/5</span></strong></p><span data-dcnode-id="7960" instrument_node="">
</span><p data-dcnode-id="7958"><span data-dcnode-id="7959" instrument_node="">The shotgun is a powerhouse and at close range, it can be an absolute game-changer, but it must be used with the correct ammunition to avoid over-penetration. Recoil is something to be aware of if follow up shots are needed in quick order. Magazine capacity is limited and reloads must be practiced to be efficient.</span></p><span data-dcnode-id="7957" instrument_node="">
</span><h2 data-dcnode-id="7955" id="toc6"><span data-dcnode-id="7956" instrument_node="">Handgun Over-Penetration Testing</span></h2><span data-dcnode-id="7954" instrument_node="">
</span><p data-dcnode-id="7952"><span data-dcnode-id="7953" instrument_node="">Between home defense, and self-defense outside of the home, the handgun can be a great choice to protect yourself. </span></p><span data-dcnode-id="7951" instrument_node="">
</span><p data-dcnode-id="7948"><strong data-dcnode-id="7949"><span data-dcnode-id="7950" instrument_node="">Or is it? </span></strong></p><span data-dcnode-id="7947" instrument_node="">
</span><p data-dcnode-id="7945"><span data-dcnode-id="7946" instrument_node="">The set-up is the same for the shotgun, 12” 10% ballistic gel block that is calibrated to the FBI’s specifications.</span></p><span data-dcnode-id="7944" instrument_node="">
</span><p data-dcnode-id="7942"><span data-dcnode-id="7943" instrument_node="">Behind the ballistic gel, I placed a simulated interior wall built of common construction materials. Ten feet behind the interior wall, I placed a larger exterior wall composed of 2”x4” studs, 3/8” drywall sheeting, R13 insulation, and ½” plywood. </span></p><span data-dcnode-id="7941" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="7937"><img alt="" class="wp-image-48223" data-dcnode-id="7940" height="725" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2020/01/HD-overpen-testing-setup-1024x725.jpg&amp;raw" width="1024"><figcaption data-dcnode-id="7938"><span data-dcnode-id="7939" instrument_node="">The setup during construction</span></figcaption></figure><span data-dcnode-id="7936" instrument_node="">
</span><p data-dcnode-id="7934"><span data-dcnode-id="7935" instrument_node="">Calibers that were tested included the 9x19mm, and the venerable .45 ACP.</span></p><span data-dcnode-id="7933" instrument_node="">
</span><p data-dcnode-id="7931"><span data-dcnode-id="7932" instrument_node="">How did they stack up? </span></p><span data-dcnode-id="7930" instrument_node="">
</span><p data-dcnode-id="7928"><span data-dcnode-id="7929" instrument_node="">Let’s find out if pistol calibers tear through soft tissue and drywall like a wet tissue.</span></p><span data-dcnode-id="7927" instrument_node="">
</span><h3 data-dcnode-id="7925"><span data-dcnode-id="7926" instrument_node="">The Handguns and Ammo</span></h3><span data-dcnode-id="7924" instrument_node="">
</span><p data-dcnode-id="7922"><span data-dcnode-id="7923" instrument_node="">With this test, I chose 2 common handgun calibers for better experimental accuracy. Striker-fired, semi-automatics were chosen due to their popularity. </span></p><span data-dcnode-id="7921" instrument_node="">
</span><p data-dcnode-id="7911"><span data-dcnode-id="7920" instrument_node="">For the 9x19mm, a </span><strong data-dcnode-id="7917"><a data-dcnode-id="7918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/polymer80-glock-guide/" label=" (opens in a new tab)" target="_blank"><span data-dcnode-id="7919" instrument_node="">Polymer 80 PF940Cv1 80% frame</span></a></strong><span data-dcnode-id="7916" instrument_node=""> was used that was sent to me by </span><a data-dcnode-id="7913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jsdsupply.com/" rel="noopener" target="_blank"><strong data-dcnode-id="7914"><span data-dcnode-id="7915" instrument_node="">JSD Supply</span></strong></a><span data-dcnode-id="7912" instrument_node="">. They supplied the barrel, frame and all the part kits associated with a Glock 19 build. The PATMOS barrel has proven to be very accurate.&nbsp;</span></p><span data-dcnode-id="7910" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="7906"><img alt="HD overpen test 9mm 80 percent glock" class="wp-image-48224" data-dcnode-id="7909" height="744" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2020/01/HD-overpen-test-9mm-80-percent-glock-1024x744.jpg&amp;raw" width="1024"><figcaption data-dcnode-id="7907"><span data-dcnode-id="7908" instrument_node="">Polymer 80 Glock build and the tested ammo!</span></figcaption></figure><span data-dcnode-id="7905" instrument_node="">
</span><p data-dcnode-id="7899"><span data-dcnode-id="7904" instrument_node="">The slide and the Trijicon RMR was furnished by Brownell’s. Aesthetically, I love the look of the </span><strong data-dcnode-id="7901"><a data-dcnode-id="7902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/go/brownells/brownells-glock-19-17-rmr-cut-slides/" label=" (opens in a new tab)" rel="sponsored noopener" target="_blank"><span data-dcnode-id="7903" instrument_node="">Brownell’s slide</span></a></strong><span data-dcnode-id="7900" instrument_node="">. I am a fan of keeping it simple, and the slide is stylish and functional. </span></p><span data-dcnode-id="7898" instrument_node="">

</span><h3 data-dcnode-id="7255"><span data-dcnode-id="7256" instrument_node="">2. Lehigh Defense 105-grain Maximum Expansion </span></h3><span data-dcnode-id="7254" instrument_node="">
</span><p data-dcnode-id="7244"><span data-dcnode-id="7253" instrument_node="">The </span><a data-dcnode-id="7250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lehighdefense.com/collections/ammo/handgun%2Bmaximum-expansion" rel="noopener" target="_blank"><strong data-dcnode-id="7251"><span data-dcnode-id="7252" instrument_node="">Lehigh Defense Maximum Expansion</span></strong></a><span data-dcnode-id="7249" instrument_node=""> line is something to truly behold for self-defense. It truly lives up to its name of </span><strong data-dcnode-id="7246"><a data-dcnode-id="7247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lehighdefense.com/9mm-luger-105gr-maximum-expansion-ammo9mm-luger-105gr-maximum-expansion-ammo" label=" (opens in a new tab)" rel="noopener" target="_blank"><span data-dcnode-id="7248" instrument_node="">Maximum Expansion</span></a></strong><span data-dcnode-id="7245" instrument_node="">. </span></p><span data-dcnode-id="7243" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="7239"><img alt="" class="wp-image-48421" data-dcnode-id="7242" height="576" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2020/01/lehighdef9mm-1024x576.jpg&amp;raw" width="1024"><figcaption data-dcnode-id="7240"><span data-dcnode-id="7241" instrument_node="">Lehigh Defense 105-grain Maximum Expansion 9mm</span></figcaption></figure><span data-dcnode-id="7238" instrument_node="">
</span><p data-dcnode-id="7236"><span data-dcnode-id="7237" instrument_node="">I tested this ammunition a few times to make sure that there wasn’t a fluke. Each time, penetration was 10.5” inside of the 12” of ballistic gel and expansion was predictable.&nbsp;</span></p><span data-dcnode-id="7235" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="7231"><img alt="Lehigh Defense 45 ACP and 9mm" class="wp-image-48226" data-dcnode-id="7234" height="768" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2020/01/Lehigh-Defense-45-ACP-and-9mm-1024x768.jpg&amp;raw" width="1024"><figcaption data-dcnode-id="7232"><span data-dcnode-id="7233" instrument_node="">Lehigh Defense .45 ACP and 9mm, both with amazing expansion.</span></figcaption></figure><span data-dcnode-id="7230" instrument_node="">
</span><p data-dcnode-id="7228"><span data-dcnode-id="7229" instrument_node="">Each copper projectile opened its four petals causing impressive wound channels, and I can’t even imagine what they might do to soft tissue. </span></p><span data-dcnode-id="7227" instrument_node="">

</span><h3 data-dcnode-id="7111"><span data-dcnode-id="7112" instrument_node="">3. Hornady 124-grain Critical Defense </span></h3><span data-dcnode-id="7110" instrument_node="">
</span><p data-dcnode-id="7105"><strong data-dcnode-id="7107"><a data-dcnode-id="7108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.luckygunner.com/9mm-124-gr-jhp-hornady-critical-duty-25-rounds%3Futm_source%3Dpewpewtactical" label="Hornady Critical Defense (opens in a new tab)" rel="noopener" target="_blank"><span data-dcnode-id="7109" instrument_node="">Hornady Critical Defense</span></a></strong><span data-dcnode-id="7106" instrument_node=""> didn’t disappoint. </span></p><span data-dcnode-id="7104" instrument_node="">
</span><p data-dcnode-id="7102"><span data-dcnode-id="7103" instrument_node="">After passing through the 12” of gel, the expanded slug impacted the interior wall and passed only through the first sheet of 3/8” drywall. </span></p><span data-dcnode-id="7101" instrument_node="">
</span><p data-dcnode-id="7099"><span data-dcnode-id="7100" instrument_node="">After removing the sheet of drywall, I found the slug resting on the bottom 2×4 plate of the simulated wall.&nbsp;</span></p><span data-dcnode-id="7098" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="7091"><img alt="" class="wp-image-48415" data-dcnode-id="7097" height="576" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2020/01/hornadycriticaldef9mm-1024x576.jpg&amp;raw" width="1024"><figcaption data-dcnode-id="7092"><span data-dcnode-id="7096" instrument_node="">With the flex tip unrecoverable, the recovered slug of the </span><strong data-dcnode-id="7093"><a data-dcnode-id="7094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.luckygunner.com/9mm-124-gr-jhp-hornady-critical-duty-25-rounds%3Futm_source%3Dpewpewtactical" label="Hornady Critical Defense 9mm (opens in a new tab)" rel="noopener" target="_blank"><span data-dcnode-id="7095" instrument_node="">Hornady Critical Defense 9mm</span></a></strong></figcaption></figure><span data-dcnode-id="7090" instrument_node="">
</span><p data-dcnode-id="7088"><span data-dcnode-id="7089" instrument_node="">It was still hot as well! </span></p><span data-dcnode-id="7087" instrument_node="">
</span><p data-dcnode-id="7085"><span data-dcnode-id="7086" instrument_node="">The expansion was not quite as large as the Federal Premium, or the Lehigh Defense, but in terms of over-penetration, this round performed great. </span></p><span data-dcnode-id="7084" instrument_node="">
</span><div class="ap" data-dcnode-id="6956" data-id="48433" data-price="22" data-slugs="" id="ap48433"><span data-dcnode-id="7083" instrument_node="">

</span><h3 data-dcnode-id="6841"><span data-dcnode-id="6842" instrument_node="">1. Federal Premium 230-grain Hydra-Shok Tactical </span></h3><span data-dcnode-id="6840" instrument_node="">
</span><p data-dcnode-id="6834"><span data-dcnode-id="6839" instrument_node="">Just like the 9mm, the </span><strong data-dcnode-id="6836"><a data-dcnode-id="6837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.luckygunner.com/45-acp-230-gr-jhp-hydra-shok-federal-premium-20-rounds%3Futm_source%3Dpewpewtactical" label=" (opens in a new tab)" rel="noopener" target="_blank"><span data-dcnode-id="6838" instrument_node="">bigger brother in .45 ACP</span></a></strong><span data-dcnode-id="6835" instrument_node=""> performed amazingly. Expansion was even more significant with the larger bullet. </span></p><span data-dcnode-id="6833" instrument_node="">
</span><p data-dcnode-id="6831"><span data-dcnode-id="6832" instrument_node="">The bullet, after penetrating 12” of gel, was stopped by the first interior wall and was found lying on the ground. Expansion was large, and the wound channel was impressive after cutting open the block later.</span></p><span data-dcnode-id="6830" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="6826"><img alt="FedHST" class="wp-image-48227" data-dcnode-id="6829" height="746" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2020/01/FedHST-1024x746.jpg&amp;raw" width="1024"><figcaption data-dcnode-id="6827"><span data-dcnode-id="6828" instrument_node="">Federal HST .45 ACP (left) and HST 9mm (right). Both expanded perfectly with near 100% mass retention.</span></figcaption></figure><span data-dcnode-id="6825" instrument_node="">
</span><p data-dcnode-id="6823"><span data-dcnode-id="6824" instrument_node="">I tested this round a few times, and every time there was no surprise. Expansion was the same, and the first wall always was able to stop the projectile from flying downrange. </span></p><span data-dcnode-id="6822" instrument_node="">

</span><h3 data-dcnode-id="6709"><span data-dcnode-id="6710" instrument_node="">2. Lehigh Defense 174-grain Maximum Expansion</span></h3><span data-dcnode-id="6708" instrument_node="">
</span><p data-dcnode-id="6702"><span data-dcnode-id="6707" instrument_node="">The </span><a data-dcnode-id="6704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lehighdefense.com/45-acp-p-174gr-maximum-expansion-ammo" label=" (opens in a new tab)" rel="noopener" target="_blank"><strong data-dcnode-id="6705"><span data-dcnode-id="6706" instrument_node="">Maximum Expansion</span></strong></a><span data-dcnode-id="6703" instrument_node=""> in .45 ACP was surprising. After firing, it was obvious that the bullet did not penetrate out of the 12” of ballistic gel. </span></p><span data-dcnode-id="6701" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="6697"><img alt="" class="wp-image-48416" data-dcnode-id="6700" height="576" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2020/01/lehighdef45-1024x576.jpg&amp;raw" width="1024"><figcaption data-dcnode-id="6698"><span data-dcnode-id="6699" instrument_node=""> Lehigh Defense 174-grain Maximum Expansion .45 ACP</span></figcaption></figure><span data-dcnode-id="6696" instrument_node="">
</span><p data-dcnode-id="6694"><span data-dcnode-id="6695" instrument_node="">Cutting open the block revealed that 10.5” of penetration was achieved, but the expansion was what was even more notable. The .45 caliber projectile opened to double its size with four large, sharp, copper petals.</span></p><span data-dcnode-id="6693" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="6689"><img alt="Lehigh Defense 45 ACP and 9mm" class="wp-image-48226" data-dcnode-id="6692" height="768" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2020/01/Lehigh-Defense-45-ACP-and-9mm-1024x768.jpg&amp;raw" width="1024"><figcaption data-dcnode-id="6690"><span data-dcnode-id="6691" instrument_node="">Lehigh Defense .45 ACP and 9mm</span></figcaption></figure><span data-dcnode-id="6688" instrument_node="">
</span><p data-dcnode-id="6686"><span data-dcnode-id="6687" instrument_node="">The bullet is designed not to expand with harder materials such as bone, wood, and auto glass, but expands rapidly within soft tissue. </span></p><span data-dcnode-id="6685" instrument_node="">

</span><p data-dcnode-id="6436"><span data-dcnode-id="6437" instrument_node="">It is purposely designed to be a jack of all trades, and in my testing, it proved a viable option for home defense.</span></p><span data-dcnode-id="6435" instrument_node="">
</span><h2 data-dcnode-id="6433" id="toc9"><span data-dcnode-id="6434" instrument_node="">Pros and Cons for The Handgun</span></h2><span data-dcnode-id="6432" instrument_node="">
</span><p data-dcnode-id="6430"><span data-dcnode-id="6431" instrument_node="">The handgun is an extremely popular firearm. </span></p><span data-dcnode-id="6429" instrument_node="">
</span><p data-dcnode-id="6427"><span data-dcnode-id="6428" instrument_node="">Many people who carry a handgun day-to-day will naturally gravitate towards this firearm for home defense. </span></p><span data-dcnode-id="6426" instrument_node="">
</span><p data-dcnode-id="6424"><span data-dcnode-id="6425" instrument_node="">A handgun is a compact, light firearm that is a good choice for home defense, but it does have its weaknesses.</span></p><span data-dcnode-id="6423" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="6419"><img alt="" class="wp-image-31654" data-dcnode-id="6422" height="589" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2018/10/0C8A7539-e1548829950844-1024x589.jpg&amp;raw" width="1024"><figcaption data-dcnode-id="6420"><span data-dcnode-id="6421" instrument_node="">A lot of options when it comes to handguns…</span></figcaption></figure><span data-dcnode-id="6418" instrument_node="">
</span><p data-dcnode-id="6416"><span data-dcnode-id="6417" instrument_node="">Projectiles for a handgun are large, short, and heavy by nature. With a clean miss, slugs tend to keep barreling through barriers. </span></p><span data-dcnode-id="6415" instrument_node="">
</span><p data-dcnode-id="6413"><span data-dcnode-id="6414" instrument_node="">But, a properly designed self-defense bullet has shown to be suitable for home defense when the projectile encounters soft tissue in my testing.&nbsp;</span></p><span data-dcnode-id="6412" instrument_node="">
</span><p data-dcnode-id="6410"><span data-dcnode-id="6411" instrument_node="">In a high-stress situation like a home invasion, acquiring your sights in low light may be problematic. While a red dot mounted on the slide of a handgun is a quick way to get on target, keeping rounds on target can still be a challenge when your heart rate is off the charts. </span></p><span data-dcnode-id="6409" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="6400"><img alt="Tested Pistol Red Dots" class="wp-image-27650" data-dcnode-id="6408" height="617" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2018/01/Tested-Pistol-Red-Dots-1024x617.jpg&amp;raw" width="1024"><figcaption data-dcnode-id="6401"><span data-dcnode-id="6407" instrument_node="">Some of the </span><strong data-dcnode-id="6403"><a data-dcnode-id="6405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/best-pistol-red-dot-sights/" label=" (opens in a new tab)" target="_blank"><span data-dcnode-id="6406" instrument_node="">Best Pistol Red Dots</span></a><span data-dcnode-id="6404" instrument_node=""> </span></strong><span data-dcnode-id="6402" instrument_node="">we’ve tested!</span></figcaption></figure><span data-dcnode-id="6399" instrument_node="">
</span><p data-dcnode-id="6397"><span data-dcnode-id="6398" instrument_node="">Not having a stock planted in your shoulder is a major drawback in an accurate volume of fire.&nbsp;</span></p><span data-dcnode-id="6396" instrument_node="">
</span><p data-dcnode-id="6394"><span data-dcnode-id="6395" instrument_node="">Terminal ballistics are also not comparable to a rifle cartridge either. Law enforcement and self-defense shootings show that multiple rounds are needed to incapacitate someone in a defensive situation. </span></p><span data-dcnode-id="6393" instrument_node="">
</span><p data-dcnode-id="6391"><span data-dcnode-id="6392" instrument_node="">Shot placement is key with a handgun so regular training behind a handgun is important.</span></p><span data-dcnode-id="6390" instrument_node="">
</span><h2 data-dcnode-id="6388" id="toc10"><span data-dcnode-id="6389" instrument_node="">Final Handgun Grade</span></h2><span data-dcnode-id="6387" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="6384"><strong data-dcnode-id="6385"><span data-dcnode-id="6386" instrument_node="">Kinetic Energy: 3/5</span></strong></p><span data-dcnode-id="6383" instrument_node="">
</span><p data-dcnode-id="6381"><span data-dcnode-id="6382" instrument_node="">Regardless if you shoot the baby 9mm, or your 1911 won back to back World Wars, kinetic energy is lacking compared to the shotgun and rifle. It will get the job done, but shot placement is key.</span></p><span data-dcnode-id="6380" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="6377"><strong data-dcnode-id="6378"><span data-dcnode-id="6379" instrument_node="">Wound Channels: 3.5/5</span></strong></p><span data-dcnode-id="6376" instrument_node="">
</span><p data-dcnode-id="6374"><span data-dcnode-id="6375" instrument_node="">Velocity levels are relatively low in most pistol cartridges, so wound channels and temporary wound channels tend to be less than a centerfire rifle. The larger a projectile expands though, the more damage a slug can do.</span></p><span data-dcnode-id="6373" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="6370"><strong data-dcnode-id="6371"><span data-dcnode-id="6372" instrument_node="">Over-Penetration: 4/5</span></strong></p><span data-dcnode-id="6369" instrument_node="">
</span><p data-dcnode-id="6367"><span data-dcnode-id="6368" instrument_node="">While it should be widely known that FMJs over-penetrate soft tissue, quality self-defense ammunition slows quickly due to rapid expansion. </span></p><span data-dcnode-id="6366" instrument_node="">
</span><p data-dcnode-id="6364"><span data-dcnode-id="6365" instrument_node="">A clean miss is going to blow through multiple walls without issue, but if you make the hit count, it is going to stop within the target or stay in the first wall it encounters.</span></p><span data-dcnode-id="6363" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="6360"><strong data-dcnode-id="6361"><span data-dcnode-id="6362" instrument_node="">Recoil Management: 4/5</span></strong></p><span data-dcnode-id="6359" instrument_node="">
</span><div data-dcnode-id="6349" id="pptOptin2" style="display: block;"><span data-dcnode-id="6358" instrument_node="">
</span><a class="optin" data-dcnode-id="6351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//courses.pewpewtactical.com/" target="_blank"><b data-dcnode-id="6356"><span data-dcnode-id="6357" instrument_node="">New to guns?</span></b><span data-dcnode-id="6355" instrument_node=""> Check out our online&nbsp;</span><span data-dcnode-id="6353" style="text-decoration: underline;"><span data-dcnode-id="6354" instrument_node="">Beginner Handgun Course</span></span><span data-dcnode-id="6352" instrument_node=""> that teaches all the important stuff you need to know.</span></a><span data-dcnode-id="6350" instrument_node=""> </span></div><p data-dcnode-id="6347"><span data-dcnode-id="6348" instrument_node="">Recoil in most common defensive cartridges is manageable. It does require training, and proper grip though. An AR in a PCC would make recoil much more manageable for home defense.</span></p><span data-dcnode-id="6346" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="6343"><strong data-dcnode-id="6344"><span data-dcnode-id="6345" instrument_node="">Overall for Home Defense: 3.5/5</span></strong></p><span data-dcnode-id="6342" instrument_node="">
</span><p data-dcnode-id="6340"><span data-dcnode-id="6341" instrument_node="">In the right hands, and with the right load, a handgun can be a viable weapon to defend your home with. I can’t stress enough that training needs to happen in preparation. </span></p><span data-dcnode-id="6339" instrument_node="">
</span><p data-dcnode-id="6337"><span data-dcnode-id="6338" instrument_node="">Shooting under stress with a handgun can be difficult, and if you need to defend yourself, you need to make the hits count.</span></p><span data-dcnode-id="6336" instrument_node="">
</span><h2 data-dcnode-id="6334" id="toc11"><span data-dcnode-id="6335" instrument_node="">Rifle Over-Penetration Testing</span></h2><span data-dcnode-id="6333" instrument_node="">
</span><p data-dcnode-id="6331"><span data-dcnode-id="6332" instrument_node="">Some people are highly skeptical of a rifle, specifically the AR-15, for home defense. Some consider it a bad fit for home defense, due to over-penetration. </span></p><span data-dcnode-id="6330" instrument_node="">
</span><p data-dcnode-id="6328"><span data-dcnode-id="6329" instrument_node="">To find out, I went about setting up a test just like the shotgun and handgun. It involves shooting a 12” 10% ballistic gel block that is calibrated to FBI specifications.&nbsp;</span></p><span data-dcnode-id="6327" instrument_node="">
</span><p data-dcnode-id="6325"><span data-dcnode-id="6326" instrument_node="">Behind the ballistic gel, I placed a simulated interior wall used of common construction materials. </span></p><span data-dcnode-id="6324" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="6320"><img alt="" class="wp-image-48216" data-dcnode-id="6323" height="753" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2020/01/HD-Over-pen-test-set-up-1024x753.jpg&amp;raw" width="1024"><figcaption data-dcnode-id="6321"><span data-dcnode-id="6322" instrument_node=""> Author’s set up, simulating an “intruder” with an interior and exterior wall panel behind the target. </span></figcaption></figure><span data-dcnode-id="6319" instrument_node="">
</span><p data-dcnode-id="6317"><span data-dcnode-id="6318" instrument_node="">Ten feet behind the interior wall, I placed a larger exterior wall composed of 2”x4” studs, 3/8” drywall sheeting, R13 insulation, and ½” plywood. Calibers tested include 5.56 NATO/.223 Remington, and the .300 Blackout.</span></p><span data-dcnode-id="6316" instrument_node="">
</span><p data-dcnode-id="6314"><span data-dcnode-id="6315" instrument_node="">Is the AR15 the best defensive weapon for your home? </span></p><span data-dcnode-id="6313" instrument_node="">
</span><p data-dcnode-id="6311"><span data-dcnode-id="6312" instrument_node="">Or are you at risk of shooting your neighbor’s neighbor? Does it over-penetrate like a railgun from Eraser with Arnold Schwarzenegger? </span></p><span data-dcnode-id="6310" instrument_node="">
</span><p data-dcnode-id="6308"><span data-dcnode-id="6309" instrument_node="">Let’s find out below!</span></p><span data-dcnode-id="6307" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="6305"><img alt="eraser railgun" class="wp-image-47565" data-dcnode-id="6306" height="300" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2019/12/eraser-railgun.jpg&amp;raw" srcset="https://www.pewpewtactical.com/wp-content/uploads/2019/12/eraser-railgun.jpg 600w, https://www.pewpewtactical.com/wp-content/uploads/2019/12/eraser-railgun-300x150.jpg 300w" width="600"></figure><span data-dcnode-id="6304" instrument_node="">
</span><h3 data-dcnode-id="6302"><span data-dcnode-id="6303" instrument_node="">The Rifles and Ammo</span></h3><span data-dcnode-id="6301" instrument_node="">
</span><p data-dcnode-id="6299"><span data-dcnode-id="6300" instrument_node="">For the 5.56 NATO, the rifle I used in testing was a Bushmaster Minimalist. </span></p><span data-dcnode-id="6298" instrument_node="">
</span><p data-dcnode-id="6296"><span data-dcnode-id="6297" instrument_node="">With its mil-spec receivers, 16” nitride barrel, proprietary “tear-drop” free-floated handguard, and lightweight Mission First Tactical Minimalist stock, it made a great test rifle to use for home defense.</span></p><span data-dcnode-id="6295" instrument_node="">

</span><h2 data-dcnode-id="5723" id="toc12"><span data-dcnode-id="5724" instrument_node="">Best 5.56 NATO/.223 Remington Home Defense Loads:</span></h2><span data-dcnode-id="5722" instrument_node="">
</span><h3 data-dcnode-id="5720"><span data-dcnode-id="5721" instrument_node="">1. Remington 62-grain Ultimate Defense PSP (Bonded) </span></h3><span data-dcnode-id="5719" instrument_node="">
</span><p data-dcnode-id="5717"><span data-dcnode-id="5718" instrument_node="">Shooting this load proved that Remington accomplished everything it claims. </span></p><span data-dcnode-id="5716" instrument_node="">
</span><p data-dcnode-id="5714"><span data-dcnode-id="5715" instrument_node="">My first shot had perfect expansion and imbedded into the first sheet of drywall after passing through the 12” of ballistic gel. </span></p><span data-dcnode-id="5713" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="5709"><img alt="rem62grain3" class="wp-image-48230" data-dcnode-id="5712" height="768" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2020/01/rem62grain3-1024x768.jpg&amp;raw" width="1024"><figcaption data-dcnode-id="5710"><span data-dcnode-id="5711" instrument_node="">62-grain Remington Ultimate Defense expanded and stopped by the first layer of drywall.</span></figcaption></figure><span data-dcnode-id="5708" instrument_node="">
</span><p data-dcnode-id="5706"><span data-dcnode-id="5707" instrument_node="">I was so impressed that I later fired 5 more shots into a 16” block of 10% ballistic gel.&nbsp;</span></p><span data-dcnode-id="5705" instrument_node="">
</span><p data-dcnode-id="5699"><span data-dcnode-id="5704" instrument_node="">Every single time, the </span><strong data-dcnode-id="5701"><a data-dcnode-id="5702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/go/psa/remington-62gr-223-rem-core-lokt/" label="62-grain bonded bullet (opens in a new tab)" rel="sponsored noopener" target="_blank"><span data-dcnode-id="5703" instrument_node="">62-grain bonded bullet</span></a></strong><span data-dcnode-id="5700" instrument_node=""> expanded into a 5-leaf clover shape and had 12” of penetration. </span></p><span data-dcnode-id="5698" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="5694"><img alt="rem62grain2" class="wp-image-48231" data-dcnode-id="5697" height="768" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2020/01/rem62grain2-1024x768.jpg&amp;raw" width="1024"><figcaption data-dcnode-id="5695"><span data-dcnode-id="5696" instrument_node="">Awesome expansion on the Remington Ultimate Defense </span></figcaption></figure><span data-dcnode-id="5693" instrument_node="">
</span><p data-dcnode-id="5691"><span data-dcnode-id="5692" instrument_node="">The metallurgical bonding of the copper jacketing and lead core makes for a lethal combination in a pointed soft point with great terminal ballistics.</span></p><span data-dcnode-id="5690" instrument_node="">

</span><p data-dcnode-id="5435"><span data-dcnode-id="5436" instrument_node="">This frangible option with Inceptor is a relatively new design of bullet. It is made of a polymer and copper matrix. </span></p><span data-dcnode-id="5434" instrument_node="">
</span><p data-dcnode-id="5432"><span data-dcnode-id="5433" instrument_node="">It is designed to disintegrate upon striking anything harder than itself. It did not over-penetrate through the simulated walls of the “house” though even though some shots fragmented more than others, probably depending on how it tumbled through the first wall.</span></p><span data-dcnode-id="5431" instrument_node="">
</span><p data-dcnode-id="5425"><span data-dcnode-id="5430" instrument_node="">After encountering soft tissue, the </span><strong data-dcnode-id="5427"><a data-dcnode-id="5428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.midwayusa.com/product/1019860012" label=" (opens in a new tab)" rel="noopener" target="_blank"><span data-dcnode-id="5429" instrument_node="">Inceptor 35-grain bullet</span></a></strong><span data-dcnode-id="5426" instrument_node=""> tumbled violently.</span></p><span data-dcnode-id="5424" instrument_node="">
</span><p data-dcnode-id="5422"><span data-dcnode-id="5423" instrument_node="">When firing a “clean miss”, this load was the only cartridge that did not over-penetrate, although it did hit a stud. A copper-colored dust cloud was all that remained on the other side of the interior wall. </span></p><span data-dcnode-id="5421" instrument_node="">

</span><h2 data-dcnode-id="5202" id="toc13"><span data-dcnode-id="5203" instrument_node="">Best .300 Black Out Home Defense Loads:</span></h2><span data-dcnode-id="5201" instrument_node="">
</span><h3 data-dcnode-id="5199"><span data-dcnode-id="5200" instrument_node="">1. Barnes 110-grain VOR-TX TAC-TX</span></h3><span data-dcnode-id="5198" instrument_node="">
</span><p data-dcnode-id="5192"><span data-dcnode-id="5197" instrument_node="">This </span><strong data-dcnode-id="5194"><a data-dcnode-id="5195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/go/pa/barnes-vor-tx-110gr-300-blk/" label=" (opens in a new tab)" rel="sponsored noopener" target="_blank"><span data-dcnode-id="5196" instrument_node="">Barnes load is maximized for the .300 Blackout</span></a></strong><span data-dcnode-id="5193" instrument_node="">, and it was the top contender for this caliber. Expansion proved to be reliable, and penetration ended in the first wall after passing through the 12” of ballistic gel. </span></p><span data-dcnode-id="5191" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="5187"><img alt="300barnesimpact" class="wp-image-48234" data-dcnode-id="5190" height="483" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2020/01/300barnesimpact-1024x1013.jpg&amp;raw" width="489"><figcaption data-dcnode-id="5188"><span data-dcnode-id="5189" instrument_node="">Say what you want, that’s a big bullet getting stopped by dry wall. Awesome display of how much energy it dumped into the gel block!</span></figcaption></figure><span data-dcnode-id="5186" instrument_node="">
</span><p data-dcnode-id="5184"><span data-dcnode-id="5185" instrument_node="">With a whopping 1350 ft. lbs. of kinetic energy at the muzzle, and the amount of expansion, the terminal ballistics on this load are impressive.</span></p><span data-dcnode-id="5183" instrument_node="">
</span><p data-dcnode-id="5181"><span data-dcnode-id="5182" instrument_node="">I can not recommend this load highly enough, and it exceeded expectations from a rifle cartridge for home defense. </span></p><span data-dcnode-id="5180" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="5173"><img alt="" class="wp-image-48418" data-dcnode-id="5179" height="576" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2020/01/barnestactx300-1024x576.jpg&amp;raw" width="1024"><figcaption data-dcnode-id="5174"><span data-dcnode-id="5178" instrument_node="">Amazing performance from </span><strong data-dcnode-id="5175"><a data-dcnode-id="5176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/go/pa/barnes-vor-tx-110gr-300-blk/" label="Barnes Vor-Tx 110gr .300 Blk (opens in a new tab)" rel="sponsored noopener" target="_blank"><span data-dcnode-id="5177" instrument_node="">Barnes Vor-Tx 110gr .300 Blk</span></a></strong></figcaption></figure><span data-dcnode-id="5172" instrument_node="">
</span><p data-dcnode-id="5170"><span data-dcnode-id="5171" instrument_node="">Not only that, but literally ANY .300 BLK barrel has shot this load with insane precision. For hunting, or for home defense, Barnes would be my top choice.</span></p><span data-dcnode-id="5169" instrument_node="">

</span><p data-dcnode-id="5052"><span data-dcnode-id="5057" instrument_node="">Where the 62-grain .223 load failed, the </span><strong data-dcnode-id="5054"><a data-dcnode-id="5055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lehighdefense.com/index.php%3F_route_%3D300-aac-blackout-whisper-115gr-high-velocity-controlled-chaos-ammo" label=" (opens in a new tab)" rel="noopener" target="_blank"><span data-dcnode-id="5056" instrument_node="">115-grain .300 BLK</span></a></strong><span data-dcnode-id="5053" instrument_node=""> load pulled through. Both bullets expanded and had great terminal ballistics, but the base of the .223 over-penetrated through both walls. </span></p><span data-dcnode-id="5051" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="5047"><img alt="lehighcontrolCHAOS" class="wp-image-48235" data-dcnode-id="5050" height="768" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2020/01/lehighcontrolCHAOS-1024x768.jpg&amp;raw" width="1024"><figcaption data-dcnode-id="5048"><span data-dcnode-id="5049" instrument_node="">The fragmented petals of the Lehigh Defense 115-grain Controlled Chaos </span></figcaption></figure><span data-dcnode-id="5046" instrument_node="">
</span><p data-dcnode-id="5044"><span data-dcnode-id="5045" instrument_node="">The .300 BLK expanded and then fragmented within the first 6” of gel.&nbsp;</span></p><span data-dcnode-id="5043" instrument_node="">
</span><p data-dcnode-id="5041"><span data-dcnode-id="5042" instrument_node="">These petals caused secondary wound channels that stayed within the 12” of gel. The base of the projectile passed through the interior wall but ended its travel within the exterior wall. </span></p><span data-dcnode-id="5040" instrument_node="">
