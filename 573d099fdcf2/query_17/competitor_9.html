</span><h2 data-dcnode-id="4804" id="toc14"><span data-dcnode-id="4805" instrument_node="">Pros and Cons for The Rifle</span></h2><span data-dcnode-id="4803" instrument_node="">
</span><p data-dcnode-id="4801"><span data-dcnode-id="4802" instrument_node="">Where the handgun comes up short with kinetic energy, and terminal ballistics, the rifle takes the lead. Due to the much faster velocities capable with a rifle cartridge, terminal ballistics are substantially more devastating than a typical handgun cartridge. </span></p><span data-dcnode-id="4800" instrument_node="">
</span><p data-dcnode-id="4798"><span data-dcnode-id="4799" instrument_node="">Furthermore, stability with a stock or pistol brace under stress is much easier than a handgun.</span></p><span data-dcnode-id="4797" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="4793"><img alt="Then again, jeans worked for Keanu..." class="wp-image-30641" data-dcnode-id="4796" height="278" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2018/08/Keanu-Reeves-Shooting.gif&amp;raw" width="495"><figcaption data-dcnode-id="4794"><span data-dcnode-id="4795" instrument_node="">A stock helps. A lot. But training helps more!</span></figcaption></figure><span data-dcnode-id="4792" instrument_node="">
</span><p data-dcnode-id="4790"><span data-dcnode-id="4791" instrument_node="">While the shotgun has impressive terminal ballistics, it takes proper training to stay on target and mitigate recoil. Between a 5.56 NATO or a .300 Blackout, recoil levels aren’t in the same class as the shotgun and require less training to be proficient. </span></p><span data-dcnode-id="4789" instrument_node="">
</span><p data-dcnode-id="4787"><span data-dcnode-id="4788" instrument_node="">Given the proper ammunition selection, the rifle also has less over-penetration than the 12-gauge shotgun.</span></p><span data-dcnode-id="4786" instrument_node="">
</span><p data-dcnode-id="4784"><span data-dcnode-id="4785" instrument_node="">There are drawbacks to using a rifle cartridge though. Using a typical AR-15 with a muzzle device will produce eardrum piercing and disorienting concussive blasts in smaller rooms and hallways with no hearing protection. </span></p><span data-dcnode-id="4783" instrument_node="">
</span><p data-dcnode-id="4781"><span data-dcnode-id="4782" instrument_node="">This can be dropped to safer levels with a suppressor but could be cost-prohibitive to a lot of people. </span></p><span data-dcnode-id="4780" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4776"><img alt="Transparent suppressor" class="wp-image-40664" data-dcnode-id="4779" height="408" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2019/03/Transparent-suppressor.gif&amp;raw" width="728"><figcaption data-dcnode-id="4777"><span data-dcnode-id="4778" instrument_node="">Transparent suppressor</span></figcaption></figure><span data-dcnode-id="4775" instrument_node="">
</span><p data-dcnode-id="4773"><span data-dcnode-id="4774" instrument_node="">Also, most carbine length ARs are substantially longer than a handgun and require training to properly navigate around corners and around obstacles.</span></p><span data-dcnode-id="4772" instrument_node="">
</span><h2 data-dcnode-id="4769" id="toc15"><strong data-dcnode-id="4770"><span data-dcnode-id="4771" instrument_node="">Final Rifle Grade</span></strong></h2><span data-dcnode-id="4768" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="4765"><strong data-dcnode-id="4766"><span data-dcnode-id="4767" instrument_node="">Kinetic Energy: 5/5</span></strong></p><span data-dcnode-id="4764" instrument_node="">
</span><p data-dcnode-id="4762"><span data-dcnode-id="4763" instrument_node="">Kinetic Energy is off the charts with centerfire cartridges compared to the handgun. To get the full advantage of the kinetic energy on target, proper ammunition must be used.</span></p><span data-dcnode-id="4761" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="4758"><strong data-dcnode-id="4759"><span data-dcnode-id="4760" instrument_node="">Wound Channels: 4.5/5</span></strong></p><span data-dcnode-id="4757" instrument_node="">
</span><p data-dcnode-id="4755"><span data-dcnode-id="4756" instrument_node="">Wound channels, especially temporary wound channels, are also much more devastating compared to the handgun, or even some shotgun defensive loads. The high velocity of centerfire cartridges, especially in 5.56 NATO are the reason for this.</span></p><span data-dcnode-id="4754" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="4751"><strong data-dcnode-id="4752"><span data-dcnode-id="4753" instrument_node="">Over-Penetration: 4/5</span></strong></p><span data-dcnode-id="4750" instrument_node="">
</span><p data-dcnode-id="4748"><span data-dcnode-id="4749" instrument_node="">Clean misses still have major over-penetration, but the projectiles destabilize much more quickly and lose energy compared to the handgun and shotgun. Especially with 5.56 NATO, due to its long and thin profile.</span></p><span data-dcnode-id="4747" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="4744"><strong data-dcnode-id="4745"><span data-dcnode-id="4746" instrument_node="">Recoil Management: 5/5</span></strong></p><span data-dcnode-id="4743" instrument_node="">
</span><p data-dcnode-id="4741"><span data-dcnode-id="4742" instrument_node="">Recoil management, whether in 5.56 NATO or .300 BLK is some of the easiest to deal with. Using a stock, or a pistol brace helps stabilize the weapon in the shoulder, and fast follow up shots are a breeze without much training behind a weapon.</span></p><span data-dcnode-id="4740" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="4737"><strong data-dcnode-id="4738"><span data-dcnode-id="4739" instrument_node="">Overall for Home Defense: 4.5/5</span></strong></p><span data-dcnode-id="4736" instrument_node="">
</span><p data-dcnode-id="4734"><span data-dcnode-id="4735" instrument_node="">The SBR/Pistol or carbine sized AR15 is one of the absolute best defensive weapons to have at your disposal for home defense. </span></p><span data-dcnode-id="4733" instrument_node="">
</span><p data-dcnode-id="4731"><span data-dcnode-id="4732" instrument_node="">While there are cons to the platform, especially with the muzzle report in smaller rooms, overall for performance the AR15 is hard to beat in comparison with the handgun or shotgun.</span></p><span data-dcnode-id="4730" instrument_node="">
</span><h2 data-dcnode-id="4727" id="toc16"><strong data-dcnode-id="4728"><span data-dcnode-id="4729" instrument_node="">Parting Shots</span></strong></h2><span data-dcnode-id="4726" instrument_node="">
</span><p data-dcnode-id="4724"><span data-dcnode-id="4725" instrument_node="">Okay. We’re done.</span></p><span data-dcnode-id="4723" instrument_node="">
</span><p data-dcnode-id="4721"><span data-dcnode-id="4722" instrument_node="">A huge amount of time, effort, and testing went into these results and I think we covered all of the important stuff.</span></p><span data-dcnode-id="4720" instrument_node="">
</span><p data-dcnode-id="4715"><span data-dcnode-id="4719" instrument_node="">What works for you and your home will differ, but now at least you have the tools needed to make the best decision. Maybe you’re already using the best set-up, maybe you need to rethink your home defense plan, either way–you can now do so with confidence and </span><strong data-dcnode-id="4717"><span data-dcnode-id="4718" instrument_node="">tested </span></strong><span data-dcnode-id="4716" instrument_node="">results.</span></p><span data-dcnode-id="4714" instrument_node="">
</span><p data-dcnode-id="4711"><strong data-dcnode-id="4712"><span data-dcnode-id="4713" instrument_node="">What do you think of our testing method? Our results? Does this information change what your HD plan is? Let us know in the comments! For more information on the best home defense ammo, take a look at these articles!</span></strong></p><span data-dcnode-id="4710" instrument_node="">

</span><p data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">Really nice job on this test and article - thank you. You mentioned the dangerous noise levels surrounding use of a rifle in an enclosed space, which is absolutely true. To that end, one of the big advantages of the 300 BLK round is that it can had in subsonic bullet weights - add in a suppressor and you're good to go. As I just built my very first AR pistol, I admit to being a bit disappointed you didn't test at least one subsonic load in this caliber.</span></p><span data-dcnode-id="2457" instrument_node="">

</span><div class="comment-author" data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">Ken Whitmore</span></div><span data-dcnode-id="2430" instrument_node="">
</span><p data-dcnode-id="2428"><span data-dcnode-id="2429" instrument_node="">Keep in mind the limitations of subsonic loads in .300 BLK. While it's great suppressed, it neuters the cartridge for terminal ballistics. By all means, it is still adequate for defensive use, but the terminal ballistics mimic more of a pistol cartridge due to the velocity drop keeping it subsonic. Not trying to persuade you either way. Just something to think about and to know! Thanks for reading my article!</span></p><span data-dcnode-id="2427" instrument_node="">

</span><img alt="Commenter Avatar" class="comment-avatar" data-dcnode-id="2341" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewpewtactical.com/wp-content/uploads/2018/07/David-Lane-96x96.jpg&amp;raw"><span data-dcnode-id="2340" instrument_node="">
</span></div><span data-dcnode-id="2338" instrument_node="">
</span><div class="col-10 col-md-11" data-dcnode-id="2313"><span data-dcnode-id="2337" instrument_node="">
</span><div class="comment-author" data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">David, PPT Editor</span></div><span data-dcnode-id="2334" instrument_node="">
</span><p data-dcnode-id="2324"><span data-dcnode-id="2333" instrument_node="">20ga is perfectly suitable for HD! Generally, the performance of a shell will not change much based on gauge. Federal Premium #4 buck in .410, #4 buck in 20ga, and #4 buck in 12ga are all rated at 1,100 FPS. They will all have basically the same penetration and terminal effect on target.</span><br data-dcnode-id="2332"><span data-dcnode-id="2331" instrument_node="">
</span><br data-dcnode-id="2330"><span data-dcnode-id="2329" instrument_node="">
The difference is how much shot each actually carries. #4 buck in .410 only has 9 pellets, 20ga has 24 pellets, and 12ga has 34 pellets. Since it is a shotgun more shot means a denser pattern, but this can be alleviated a bit with the use of a good choke. Also, since this is for HD and the range is likely going to be on the short side then pattern density shouldn't be too much of a concern. </span><br data-dcnode-id="2328"><span data-dcnode-id="2327" instrument_node="">
</span><br data-dcnode-id="2326"><span data-dcnode-id="2325" instrument_node="">
Granted, more shot is always better for putting down a bad guy -- overkill is underrated. But if a weapon is unmanageable, then downsizing to something that is manageable is critical.</span></p><span data-dcnode-id="2323" instrument_node="">

</span><div class="col-10 col-md-11" data-dcnode-id="1810"><span data-dcnode-id="1842" instrument_node="">
</span><div class="comment-author" data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">TomC</span></div><span data-dcnode-id="1839" instrument_node="">
</span><p data-dcnode-id="1821"><span data-dcnode-id="1838" instrument_node="">Talking about 12gauge birdshot the article says: "While this load did not over-penetrate after it hit 12″ of ballistic gel, on a real human target with fat, dense muscle tissue, and a rib cage, it may not get the job done due to small shot size and shot deformation."</span><br data-dcnode-id="1837"><span data-dcnode-id="1836" instrument_node="">
</span><br data-dcnode-id="1835"><span data-dcnode-id="1834" instrument_node="">
I realize that this article was designed to semi-scientifically test "over penetration" and that lethality wasn't examined in detail, but there is no need to guess about "may or may not get the job done" when others have done equally semi-scientific testing on the lethality of birdshot at practical home defense distances. </span><br data-dcnode-id="1833"><span data-dcnode-id="1832" instrument_node="">
</span><br data-dcnode-id="1831"><span data-dcnode-id="1830" instrument_node="">
Of course there are others, but I think most would grant that Paul Harrell's approach is closer to realistic rather than shooting at wood stakes or even ballistic gelatin.</span><br data-dcnode-id="1829"><span data-dcnode-id="1828" instrument_node="">
</span><br data-dcnode-id="1827"><span data-dcnode-id="1826" instrument_node="">
You are absolutely correct that birdshot is highly range-dependent, so it is important to consider realistic "home defense" distances, and also important to recognize that realistic distances can vary greatly depending on both the home being defended and the defense strategy chosen by the defender. </span><br data-dcnode-id="1825"><span data-dcnode-id="1824" instrument_node="">
</span><br data-dcnode-id="1823"><span data-dcnode-id="1822" instrument_node="">
As an instructor, I was limited to teaching the state-mandated curriculum, which did not address home defense strategy; but when questions on that topic did come up I was generally a strong advocate of the Ensconced Defender strategy and always discouraged a "defender" going looking for any intruders.</span></p><span data-dcnode-id="1820" instrument_node="">

Wall construction FYI. I am in the construction business in Virginia. Other regions may have different standards, but here 5/8" drywall &amp; 3/4" plywood are typically used for exterior walls. Interior wall construction can vary depending on the "cheapness" of the owner/contractor but I have never seen something as thin as 3/8" drywall used.</span><br data-dcnode-id="1413"><span data-dcnode-id="1412" instrument_node="">
Just my 2 cents worth but you guys did a very scientific test. Thank you!</span></p><span data-dcnode-id="1410" instrument_node="">

</span><br data-dcnode-id="1379"><span data-dcnode-id="1378" instrument_node="">
