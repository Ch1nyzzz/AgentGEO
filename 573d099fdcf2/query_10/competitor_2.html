</span><p class="chapter-para" data-dcnode-id="1893"><span data-dcnode-id="1899" instrument_node="">Although the tanks had already displayed their offensive potential in World War I, tank technology was far from mature at that point.</span><span class="xrefLink" data-dcnode-id="1898" id="jumplink-FN32"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1895" data-google-interstitial="false" data-open="FN32" href="javascript:;" reveal-id="FN32"><sup data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">32</span></sup></a><span data-dcnode-id="1894" instrument_node=""> Mechanical difficulties arose with a number of tanks deployed in the conflict and others were insufficiently bulky to cruise over physical obstructions in their path. Moreover, tanks of the period had relatively weak armor and consequently vulnerable to artillery fire. These were knotty problems for English and French military theorists, and split them into two main camps; one regarded tanks as suitable for supporting infantry assaults and acting as mobile firing points, and also to take the place of cavalry on missions requiring a high degree of mobility. The second saw the role of the tank as purely tactical, believing that it would not have revolutionary impact or alter the basic battle format.</span></p><p class="chapter-para" data-dcnode-id="1881"><span data-dcnode-id="1892" instrument_node="">English and French military circles engaged in considerable debate about the role of the tank. J.F.C. Fuller, Basil H. Liddell Hart, Charles de Gaulle and other radicals strongly criticized military theorists for their disregard of technological development and underestimation of the tank's potential. These were the men who recognized the revolutionary impact that the tank would have on modern warfare; they argued that rather playing a supporting role to the infantry, tanks should be used to beef up the whole offensive force.</span><span class="xrefLink" data-dcnode-id="1891" id="jumplink-FN33"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1888" data-google-interstitial="false" data-open="FN33" href="javascript:;" reveal-id="FN33"><sup data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">33</span></sup></a><span data-dcnode-id="1887" instrument_node=""> Because J.F.C. Fuller and the others were only mid-level officers and lacked the support of conservative military leaders, however, their ability to influence policy was limited. Rather then forming tank divisions or armies, the decision makers of the time established tank brigades and battalions assigned to infantry divisions. These units were to support infantry assaults and be used for reconnaissance and cover.</span><span class="xrefLink" data-dcnode-id="1886" id="jumplink-FN34"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1883" data-google-interstitial="false" data-open="FN34" href="javascript:;" reveal-id="FN34"><sup data-dcnode-id="1884"><span data-dcnode-id="1885" instrument_node="">34</span></sup></a><span data-dcnode-id="1882" instrument_node=""> This kind of formation made it impossible fully to exploit the mobility advantage that tanks provided.</span></p><p class="chapter-para" data-dcnode-id="1875"><span data-dcnode-id="1880" instrument_node="">In Allied military circles, defensive thinking began to influence all areas of military activity. The French implemented a short-term military service system and constructed the Maginot line. French military academies instructed officers to avoid risk-taking and to limit any activities that might result in an encounter with the enemy. In Britain, the prevalence of defensive thinking went so far as to influence the engineering of the tank. After World War I, Britain mainly produced light tanks designed to replace the reconnaissance function of cavalry. These tanks were very fast, but lightly armored and with limited firepower, making them highly vulnerable to enemy artillery fire. The French went to the opposite extreme by overlooking the importance of mobile operations in their attempts to maximize the defensive potential of the tank. The unwieldy vehicles they produced lacked mobility and firepower, and as such were ill-suited for the task of assaulting the enemy interior.</span><span class="xrefLink" data-dcnode-id="1879" id="jumplink-FN35"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1876" data-google-interstitial="false" data-open="FN35" href="javascript:;" reveal-id="FN35"><sup data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">35</span></sup></a></p><p class="chapter-para" data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">Britain and France's limited appreciation of the tank's potential and their decisions to make it subordinate to infantry embodied an attitude that overemphasized defense and neglected offense. It was this overly conservative policy that undermined the Allied war effort.</span></p><span data-dcnode-id="1872" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="1870" id="4178418" scrollto-destination="4178418"><span data-dcnode-id="1871" instrument_node="">The Development of German Offensive Strategy</span></h3><span data-dcnode-id="1869" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">After World War I, the Germans, unlike the French and the English, invested considerable time and energy in finding ways to shift from positional to mobile warfare. In the 1920s, the mechanized war theory of Fuller and others attracted the attention of Heinz Guderian and others in the German army.</span></p><p class="chapter-para" data-dcnode-id="1862"><span data-dcnode-id="1866" instrument_node="">General Guderian argued that tanks eliminated the quagmire of trench warfare. He utilized Fuller and Liddell Hart's pioneering theories on mechanized warfare to address the German Armored Forces in a series of works about the merits of tank-based warfare. In 1937, he published ‘</span><em data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">Achtung-Panzer</span></em><span data-dcnode-id="1863" instrument_node="">!’, which laid out the fundamental military theory to be employed by the German army in its impending campaign.</span></p><p class="chapter-para" data-dcnode-id="1851"><span data-dcnode-id="1861" instrument_node="">In 1934, General Guderian organized a demonstration of miniature, motorized tanks in an effort to illustrate his theories and convince Hitler that tank-led assaults, combined with coordinated air support, were the future of modern warfare. Shortly after, Adolf Hitler authorized the Wehrmacht to establish independent tank and motorized divisions.</span><span class="xrefLink" data-dcnode-id="1860" id="jumplink-FN36"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1857" data-google-interstitial="false" data-open="FN36" href="javascript:;" reveal-id="FN36"><sup data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">36</span></sup></a><span data-dcnode-id="1856" instrument_node=""> By the September 1939 invasion of Poland, the German army had assembled six tank divisions and ten auxiliary tank regiments; a total of 2800 vehicles. Prior to the May 1940 invasion of France, four more tank divisions were added, and an armored army was organized.</span><span class="xrefLink" data-dcnode-id="1855" id="jumplink-FN37"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1852" data-google-interstitial="false" data-open="FN37" href="javascript:;" reveal-id="FN37"><sup data-dcnode-id="1853"><span data-dcnode-id="1854" instrument_node="">37</span></sup></a></p><p class="chapter-para" data-dcnode-id="1845"><span data-dcnode-id="1850" instrument_node="">The blitzkrieg theory of warfare provided the standard that would guide Germany's new offensive strategy. Composed of three essential elements—surprise, speed and concentration—blitzkrieg called for the coordination of air forces and paratroopers in launching concentrated surprise attacks designed to destroy the enemy's ability to resist. It emphasized speed of maneuver and the importance of attacking the enemy's weakest points. By employing this strategy, the Wehrmacht secured large victories in the early stages of World War II. In the 23-month period between the invasion of Poland and the attack on the Soviet Union, the German army swept across Europe, killing close to 8 million enemy soldiers in the process. Blitzkrieg proved to be far more successful than anyone could ever have imagined.</span><span class="xrefLink" data-dcnode-id="1849" id="jumplink-FN38"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1846" data-google-interstitial="false" data-open="FN38" href="javascript:;" reveal-id="FN38"><sup data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">38</span></sup></a></p><span data-dcnode-id="1844" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="1842" id="4178423" scrollto-destination="4178423"><span data-dcnode-id="1843" instrument_node="">The Battle for France: A Technical and Strategic Testing Ground</span></h3><span data-dcnode-id="1841" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">The conflict between France and Germany served as a technical and strategic testing ground for two of the largest military powers in Europe. In many respects, France's rapid defeat testifies to the success of Germany's prewar strategic transition.</span></p><p class="chapter-para" data-dcnode-id="1827"><span data-dcnode-id="1838" instrument_node="">The principles of blitzkrieg were seamlessly grafted on Germany's plan of operations. As the Wehrmacht was comparable in size to the whole Allied force, the German army sought to maximize strength by consolidating its units. The Wehrmacht, hence, deployed seven tank divisions and three motorized divisions to Army Group A, and two tank divisions to Army Group B, the auxiliary attack force.</span><span class="xrefLink" data-dcnode-id="1837" id="jumplink-FN39"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1834" data-google-interstitial="false" data-open="FN39" href="javascript:;" reveal-id="FN39"><sup data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">39</span></sup></a><span data-dcnode-id="1833" instrument_node=""> German targets of attack were also selected to maximize the element of surprise. As in the Schlieffen Plan of World War I, the German army had originally planned to attack Belgium on the way to France, but the Allies anticipated this route and planned a counter assault. An intelligence mishap lead to Hitler's decision to dispatch a smaller force to attack Belgium and the Netherlands while the main force of the German army would strike the weakest point in the French defensive lines, the Ardennes.</span><span class="xrefLink" data-dcnode-id="1832" id="jumplink-FN40"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1829" data-google-interstitial="false" data-open="FN40" href="javascript:;" reveal-id="FN40"><sup data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">40</span></sup></a><span data-dcnode-id="1828" instrument_node=""> This approach, along with the speed at which the Germans advanced, took both the French and the English completely by surprise.</span></p><p class="chapter-para" data-dcnode-id="1820"><span data-dcnode-id="1826" instrument_node="">The battle erupted on 10 May 1940. Within the first three days of battle, the German force had advanced 300 km into the Ardennes. By 14 May, seven German panzer divisions had cleared the Ardennes, ripping a huge hole in the French defensive lines; that evening, the Dutch surrendered.</span><span class="xrefLink" data-dcnode-id="1825" id="jumplink-FN41"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1822" data-google-interstitial="false" data-open="FN41" href="javascript:;" reveal-id="FN41"><sup data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">41</span></sup></a><span data-dcnode-id="1821" instrument_node=""> After 13 days, on the 27 May, the Belgians followed suit. Guderian's 19th Army Corps quickly headed north, averaging 20–40 km per day. By 24 May, Guderian's force had reached the channel coast and completely enveloped the English–French allied force. On 14 June, Paris fell into German hands; eight days later the French surrendered. The French failure to anticipate the speed of the German assault made them unprepared and ill-equipped to establish defensive positions to counter the Wehrmacht advance. They had no alternative but to attempt their own mobile assaults, a task the French were ill-prepared to undertake. Its skilful exploitation of French weakness enabled the Wehrmacht to conquer Western Europe's second largest military in 42 days.</span></p><p class="chapter-para" data-dcnode-id="1813"><span data-dcnode-id="1819" instrument_node="">French prewar planning was clearly inadequate. The French had assumed that the Germans would attack through Belgium, and had accordingly formulated Plans E and D, which called for mobilization of English and French allied forces to Belgium where they would meet the German forces at the Escaut River. The Allies would then push for the Dyle River. This lengthened the distance between the Allied forces and the battlefield and heightened their chances of encountering the German army, but would increase their depth and shorten the length of the Allied front lines. If the Allies had moved more quickly the plan could have succeeded. Unfortunately, the French military commander Gamelin made a minor but fatal adjustment to the plan—a strategy called the Breda Variant. Gamelin ordered the 7th Army Group—originally a reserve force that represented two-thirds of the total French reserves and comprised two tank divisions, two motorized infantry divisions and three first class infantry divisions</span><span class="xrefLink" data-dcnode-id="1818" id="jumplink-FN42"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1815" data-google-interstitial="false" data-open="FN42" href="javascript:;" reveal-id="FN42"><sup data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">42</span></sup></a><span data-dcnode-id="1814" instrument_node="">—to move quickly to the Breda area of the Netherlands and form an unbroken line of defense with the Dutch army.</span></p><p class="chapter-para" data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">The main drawback to this plan was that the 39 divisions behind the Maginot line completely lacked the capacity to conduct mobile operations. Moreover, before the Allied forces could even establish the French–Belgian and French–Dutch defensive lines, they had first to travel a great distance. This was a challenge for the allies because they were considerably less mobile than the Wehrmacht, which meant a greater possibility of meeting the Germans before they reached their planned defensive positions. Another drawback was that it would leave the French interior undefended. The French single-line battle array was patently ill-conceived; a single breach could cause the entire defensive system to fall apart. While the German decision to strike at the Ardennes certainly played a role in the incredible speed of their victory, it would be a mistake to believe that it was the deciding factor in the ultimate outcome of the battle. The Ardennes was just one of the several weak points likely to exist in a line of defense that extended several hundred or more kilometers. If the French had kept the 7th army group in reserve, they might have been able to seal off the breach at the Maas River, thereby significantly delaying the German offensive. This would have bought the Allied supreme command time to redeploy troops.</span></p><p class="chapter-para" data-dcnode-id="1805"><span data-dcnode-id="1810" instrument_node="">The French army's inability to conduct mobile operations and its lack of training with armored forces considerably prejudiced its chances of fending off a high-speed German armor assault. For example, on 15 May, Guderian's 19th panzer corps marched westward exposing its flank. Had the French 3rd armored division and 3rd mortorized infantry division seized the opportunity to cut off the German flank, it could have split Guderian's forces and punished them for their brash advance. Such an attack might very well have changed the outcome of the battle. Yet, the French commanding officer decided against a direct counterattack, and instead ordered the 3rd armored division to spread over a 19 km defensive line with the aim of cutting off any possible westward advance by Guderian's forces. This approach invited defeat as it allowed the Germans to take on the French force one unit at a time. The French predilection to spread its forces too thinly practically guaranteed defeat in the face of concentrated German armor.</span><span class="xrefLink" data-dcnode-id="1809" id="jumplink-FN43"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1806" data-google-interstitial="false" data-open="FN43" href="javascript:;" reveal-id="FN43"><sup data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">43</span></sup></a></p><p class="chapter-para" data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">In summary, although before the outbreak of the World War II military technology favored offense, there was a marked divergence in the French and German response to this trend. The French adhered to a strictly defensive strategy, believing that tanks were suitable only for supporting infantry or acting as mobile firing points on the defensive line. In contrast, German strategy capitalized on the offensive benefits of this new technology by combining it with the blitzkrieg approach. This devastating combination brought Germany an unprecedented victory.</span></p><span data-dcnode-id="1802" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="1800" id="4178431" scrollto-destination="4178431"><span data-dcnode-id="1801" instrument_node="">Changes in Military Strategy in the era of Information-based Warfare</span></h2><span data-dcnode-id="1799" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="1792"><span data-dcnode-id="1798" instrument_node="">Since the 1970s, information technology has emerged as a key component in warfare. It has touched off a revolution in military affairs, changing the battle paradigm from mechanized to information-based warfare.</span><span class="xrefLink" data-dcnode-id="1797" id="jumplink-FN44"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1794" data-google-interstitial="false" data-open="FN44" href="javascript:;" reveal-id="FN44"><sup data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">44</span></sup></a><span data-dcnode-id="1793" instrument_node=""> During this period of transition, America took the lead in adapting new technologies to offensive strategy. Why did the United States undertake this strategic transition?</span></p><span data-dcnode-id="1791" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="1789" id="4178433" scrollto-destination="4178433"><span data-dcnode-id="1790" instrument_node="">Strategic Failure in the 1970s Impels the United States to Change its Policies</span></h3><span data-dcnode-id="1788" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">The development of anti-tank and anti-aircraft weaponry after World War II significantly decreased the superiority of offensive weaponry, restoring the ODB. Unable to gain a clear technological advantage, the United States and the Soviet Union sought to strengthen their respective positions by stockpiling armaments and firepower.</span></p><p class="chapter-para" data-dcnode-id="1779"><span data-dcnode-id="1785" instrument_node="">Generally, a weapon's lethality can be judged by its destructive potential, range and accuracy. In the years leading up to the 1970s, neither the United States nor the Soviet Union made significant improvements as regards precision, but did make significant progress in increasing destructive power potential and range.</span><span class="xrefLink" data-dcnode-id="1784" id="jumplink-FN45"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1781" data-google-interstitial="false" data-open="FN45" href="javascript:;" reveal-id="FN45"><sup data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">45</span></sup></a><span data-dcnode-id="1780" instrument_node=""> In the event of a conflict, therefore, the US and the USSR would employ new and devastatingly powerful arms to lay waste to, and inflict maximum casualties on, as large an area of their respective territories as possible. It was amid this milieu that two strategic failures caused the United States to rethink its military strategy.</span></p><p class="chapter-para" data-dcnode-id="1772"><span data-dcnode-id="1778" instrument_node="">First, in order to compensate for NATO's inferiority in Europe, the United States upheld a ruthless strategy of attrition. In the 1970s, however, the Warsaw Pact countries enjoyed a clear military advantage as regards sheer numbers of mechanized units. Had they elected to conduct a large-scale armored assault, NATO would simply not have been able to hold them off. According to America's own calculations, the Soviet Union had the capacity to conquer Western Europe in 12 days, and could destroy Britain in less than 60 days. Within 6 months, the USSR could conquer all of Europe, parts of the Near East and strategic points in the Far East.</span><span class="xrefLink" data-dcnode-id="1777" id="jumplink-FN46"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1774" data-google-interstitial="false" data-open="FN46" href="javascript:;" reveal-id="FN46"><sup data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">46</span></sup></a><span data-dcnode-id="1773" instrument_node=""> Europe's weaknesses—a battlefield lacking depth, the numerical superiority of Soviet armor and the passive nature of opting to containing Soviet assault solely by firepower—precluded America's victory in any battle of attrition.</span></p><p class="chapter-para" data-dcnode-id="1765"><span data-dcnode-id="1771" instrument_node="">Second, America's failure in Europe was entirely theoretical, but its failure in Vietnam was very real. The United States’ objective in Vietnam was not unification, but the preservation of the South Vietnamese government. This objective required America to wage a limited war and adopt what amounted to a defensive strategy. But American weaponry and operational theory were not suited to combat guerilla warfare. American forces often found themselves expending exorbitant amounts of ammunition on taking out relatively few opponents. For example, the US used long-range strategic bombers to carpet bomb the Ho Chi Minh trail. Every B-52 had a 27-ton bomb capacity, and attacks would sometimes involve over 100 fighter aircraft; bombing runs might involve dropping over a 1000 tons of explosives. But the bombs lacked precision and often missed their targets.</span><span class="xrefLink" data-dcnode-id="1770" id="jumplink-FN47"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1767" data-google-interstitial="false" data-open="FN47" href="javascript:;" reveal-id="FN47"><sup data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">47</span></sup></a><span data-dcnode-id="1766" instrument_node=""> Despite the superiority of the US forces’ equipment, weaponry, and training compared to that of the Vietcong, the ‘highly exhaustive, minimally effective warfare’ they elected to wage was difficult for the United States to sustain.</span></p><span data-dcnode-id="1764" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="1762" id="4178438" scrollto-destination="4178438"><span data-dcnode-id="1763" instrument_node="">A Revolution in Military Technology provides America with the Opportunity to Undertake a Strategic Transformation</span></h3><span data-dcnode-id="1761" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="1751"><span data-dcnode-id="1760" instrument_node="">The newest round of revolutionary military advances is based on information technology (IT) and has resulted in powerful new systems, most notably precision-guided weaponry and C</span><sup data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">4</span></sup><span data-dcnode-id="1757" instrument_node="">ISR.</span><span class="xrefLink" data-dcnode-id="1756" id="jumplink-FN48"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1753" data-google-interstitial="false" data-open="FN48" href="javascript:;" reveal-id="FN48"><sup data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">48</span></sup></a><span data-dcnode-id="1752" instrument_node=""> The introduction of these two technologies has given offence the upper hand and greatly reduced the costs and dangers of waging war.</span></p><p class="chapter-para" data-dcnode-id="1735"><span data-dcnode-id="1750" instrument_node="">The accuracy and effectiveness of guided weapons has increased significantly since World War II, as has the cost effectiveness of precision-guided weaponry.</span><span class="xrefLink" data-dcnode-id="1749" id="jumplink-FN49"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1746" data-google-interstitial="false" data-open="FN49" href="javascript:;" reveal-id="FN49"><sup data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">49</span></sup></a><span data-dcnode-id="1745" instrument_node=""> Experiments have confirmed that doubling the accuracy of a weapon increases its destructive power eightfold. During World War II, for example, it took an average 800 artillery rounds to destroy a single tank. With the Copperhead laser-guided shells of today, neutralizing the same tank could be achieved with a mere three rounds. Bearing in mind that an ordinary shell cost $150 and a Copperhead shell cost $5000, using Copperheads to destroy a tank is twelve times more cost-effective.</span><span class="xrefLink" data-dcnode-id="1744" id="jumplink-FN50"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1741" data-google-interstitial="false" data-open="FN50" href="javascript:;" reveal-id="FN50"><sup data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">50</span></sup></a><span data-dcnode-id="1740" instrument_node=""> Similarly, during the Vietnam War, it took hundreds of fighter aircraft and thousands of bombs to destroy a single bridge. Yet in the first Iraq War, it took just one F-117A stealth bomber to drop a single laser-guided bomb into the air vent of a building and destroy the entire structure.</span><span class="xrefLink" data-dcnode-id="1739" id="jumplink-FN51"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1736" data-google-interstitial="false" data-open="FN51" href="javascript:;" reveal-id="FN51"><sup data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">51</span></sup></a></p><p class="chapter-para" data-dcnode-id="1726"><span data-dcnode-id="1734" instrument_node="">Precision weaponry also drastically reduces casualties on the battlefield, as new technology enables war to be fought out of sight of the enemy. It has changed the operational objective from that of surrounding and eliminating the enemy force to paralyzing its operational systems. Massive troop deployments have switched to C</span><sup data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">4</span></sup><span data-dcnode-id="1731" instrument_node="">ISR systems that launch attacks from beyond visible range. Non-contact, precision warfare has appreciably lowered troop and civilian casualties.</span><span class="xrefLink" data-dcnode-id="1730" id="jumplink-FN52"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1727" data-google-interstitial="false" data-open="FN52" href="javascript:;" reveal-id="FN52"><sup data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">52</span></sup></a></p><p class="chapter-para" data-dcnode-id="1721"><span data-dcnode-id="1725" instrument_node="">The combination of precision-guided weaponry and C</span><sup data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">4</span></sup><span data-dcnode-id="1722" instrument_node="">ISR has also increased operational efficiency by increasing the flexibility of arms, promoting battlefield awareness and reducing reaction time. It enables an army to assemble and deploy large detachments in a short time. This fast-paced style of warfare destroys large numbers of enemy targets by effectively paralyzing their offense and defense capacities.</span></p><p class="chapter-para" data-dcnode-id="1716"><span data-dcnode-id="1720" instrument_node="">Precision weaponry and C</span><sup data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">4</span></sup><span data-dcnode-id="1717" instrument_node="">ISR, however, have little to offer defense. There are generally two ways of improving defense. One is to reinforce the defensive infrastructure so as to increase physical defence from attack. During World War I, for example, trenches and reinforced concrete bunkers proved effective in protecting infantry from artillery fire. Information technology, sad to say, has had virtually no impact on improving defenses.</span></p><p class="chapter-para" data-dcnode-id="1709"><span data-dcnode-id="1715" instrument_node="">The second approach involves anti-ballistic technologies. Several nations are currently developing directed-energy and kinetic-energy anti-missile systems, although research into laser- and particle-beam-directed-energy technology is still at the developmental stage. Kinetic energy technology has received the most attention of any next generation anti-ballistic system.</span><span class="xrefLink" data-dcnode-id="1714" id="jumplink-FN53"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1711" data-google-interstitial="false" data-open="FN53" href="javascript:;" reveal-id="FN53"><sup data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">53</span></sup></a><span data-dcnode-id="1710" instrument_node=""> Information technology is certainly integral to the warning function of anti-ballistic missile systems, but not to their main role of precision-of-the-kill vehicle. Anti-ballistic systems are required to hit high-speed moving targets, in effect to ‘hit a bullet with a bullet’, and the technical difficulties involved in honing their accuracy are far more complex than those of promoting the effectiveness of offensive missiles.</span></p><p class="chapter-para" data-dcnode-id="1693"><span data-dcnode-id="1708" instrument_node="">During 1992–2002, American researchers conducted 11 experiments testing the ability of the Theater High Altitude Area Defense (THAAD) system to intercept a mock missile in flight. Only two of the 11 attempts succeeded.</span><span class="xrefLink" data-dcnode-id="1707" id="jumplink-FN54"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1704" data-google-interstitial="false" data-open="FN54" href="javascript:;" reveal-id="FN54"><sup data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">54</span></sup></a><span data-dcnode-id="1703" instrument_node=""> In order to guarantee a successful interception, anti-missile systems need multiple layers and to be prepared to launch several kill vehicles. For example, the American Theater Missile Defense (TMD) system includes both high and low level defensive systems. The low level system includes the PAC-3 defensive system, the Navy Area Defense (NAD) system and the Middle Enhanced Area Defense (MEAD) system. The high-level defensive system includes the land-based THAAD system, the Navy Theater-Wide (NTW) missile defense system and boost phase intercept (BPI) missile defense capabilities.</span><span class="xrefLink" data-dcnode-id="1702" id="jumplink-FN55"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1699" data-google-interstitial="false" data-open="FN55" href="javascript:;" reveal-id="FN55"><sup data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">55</span></sup></a><span data-dcnode-id="1698" instrument_node=""> From 1995 to its initial deployment in 2007, the entire system will cost $26.6 billion; the cost of its complete deployment is still unknown.</span><span class="xrefLink" data-dcnode-id="1697" id="jumplink-FN56"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1694" data-google-interstitial="false" data-open="FN56" href="javascript:;" reveal-id="FN56"><sup data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">56</span></sup></a></p><p class="chapter-para" data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">The United States’ experience in developing TMD raises three important issues. First, despite American innovation, there is still no single anti-ballistic missile system in the world that guarantees a high rate of interception. Second, while multi-layer anti-ballistic systems are more effective than their unitary counterparts, they are prohibitively expensive, to the point that the United States is probably the only power that can afford to develop them. Third, even if anti-ballistic systems prove as successful at increasing defensive capabilities as the trenches of World War I, they would still not constitute a defensive revolution. It is, therefore, difficult to imagine kinetic energy weapon doing much more than lead to gradual change.</span></p><p class="chapter-para" data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Information technology markedly improves a force's camouflage and deception capabilities, command and control ability, air mobility, and long-range attack precision. It allows the attacker fully to exploit the element of surprise by directing the full force of its power to the most sensitive areas. Information technology, however, offers little benefit to defense. Information-based warfare clearly favors offence.</span></p><span data-dcnode-id="1688" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="1686" id="4178448" scrollto-destination="4178448"><span data-dcnode-id="1687" instrument_node="">The Foundation of America's New Strategy</span></h3><span data-dcnode-id="1685" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="1678"><span data-dcnode-id="1684" instrument_node="">In order to remedy NATO's inferior position in Europe and counter the Warsaw Pact countries’ numerical superiority, the United States developed the AirLand Battle doctrine.</span><span class="xrefLink" data-dcnode-id="1683" id="jumplink-FN57"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1680" data-google-interstitial="false" data-open="FN57" href="javascript:;" reveal-id="FN57"><sup data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">57</span></sup></a><span data-dcnode-id="1679" instrument_node=""> The United States was aware that the USSR intended to construct a large second echelon force to reinforce the primary force during battle. The weak point in the Soviet strategy was that of the vulnerability of troops waiting to be deployed to attack or obstruction. The US strategy, successfully throwing the auxiliary force into confusion prior to its being deployed to the front could offset the Soviet numerical advantage. The United States consequently intended to attack choke points well past the Soviet front lines in order to disrupt the orderly deployment of the second echelon forces.</span></p><p class="chapter-para" data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">The United States learned in the Vietnam War that on certain terrain, guerilla warfare outmatches the most sophisticated firepower, whose purpose is to capture and occupy territory. Surgical strikes, using Special Forces to attack the enemy, political, economic and military control centers are far more effective as they cripple the adversaries’ operational systems and destroy their capacity to resist.</span></p><p class="chapter-para" data-dcnode-id="1665"><span data-dcnode-id="1675" instrument_node="">Although the United States drew upon different operational theories when dealing with the situations in Europe and Vietnam, both conflicts made similar demands on the command structure and weapons platform in requiring the available use of large-scale, high-precision, real-time communication in a vast and complex battle space. Only a system of this degree of sophistication could enable American forces accurately to destroy their opponent's command and control centers. The development of IT-based military technology seemed to be the solution. Having electronic communications, intelligence reconnaissance, precision-strike weapon systems, and other information-based weapon systems at their disposal, American military theorists began to develop the next generation of operational theory. A symbiotic relationship subsequently developed between technological development and operational change. The cumulative effect of a series of changes in operational theory engendered a revolution in strategic thinking. The fusion of 20 years’ innovation in operational theory called for forms of attack that would quickly and decisively defeat an adversary.</span><span class="xrefLink" data-dcnode-id="1674" id="jumplink-FN58"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1671" data-google-interstitial="false" data-open="FN58" href="javascript:;" reveal-id="FN58"><sup data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">58</span></sup></a><span data-dcnode-id="1670" instrument_node=""> The new line of thinking culminated in the release of the September 2002 ‘National Security Strategy of the United States of America’, a radical document that raised the prospect of preemptive action for the first time in modern American history (</span><span class="xrefLink" data-dcnode-id="1669" id="jumplink-F3"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="1667" data-google-interstitial="false" data-open="F3" href="javascript:;" reveal-id="F3"><span data-dcnode-id="1668" instrument_node="">Figure 3</span></a><span data-dcnode-id="1666" instrument_node="">). </span></p><span data-dcnode-id="1664" instrument_node=""> </span><a data-dcnode-id="1663" data-google-interstitial="false" id="4178452" scrollto-destination="4178452"></a><span data-dcnode-id="1662" instrument_node="">
</span><div class="fig fig-section js-fig-section" data-dcnode-id="1648" data-id="F3"><div class="label fig-label" data-dcnode-id="1659"><strong data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">Fig. 3</span></strong></div><div class="graphic-wrap" data-dcnode-id="1652"><img alt="The Process of America's Strategic Transformation." class="content-image" data-dcnode-id="1658" data-path-from-xml="pol014f3.gif" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//oup.silverchair-cdn.com/oup/backfile/Content_public/Journal/cjip/1/2/10.1093/cjip/pol014/2/m_pol014f3.gif%3FExpires%3D1653986738%26Signature%3DbA2fmQ~9IV3kNTyX8qTKaLfcuwu7PrpUsJDaWSKgNAgSL7rnSYk3jSMn244OeVauMrmiZTvEu9QbjpAXlBnojQP-Uybb2y7KP23f0YZpoYgVzzO1PRJYYMtN7y5~sQrMwIEP6ckRVNecu4LduYFg3dkonE7N-bnIoDtJxBwDw4m7QGGMu58IkB8hzXMsPFP2dNI6Xu-9q7fZyT6NeD57cCqJmR0PdKLM0KDtf3St5RPpxO57qJVeuqVLPmIiq42YBNq2yP6Js8rhTsaUNJTPvFHfgBxlDIux526t1tpyqqj4pEvPc1LeBQ29S05J2H0~GYlRTa~tKn7u8urcNByPwQ__%26Key-Pair-Id%3DAPKAIE5G5CRDK6RD3PGA&amp;raw"><div class="fig-orig original-slide" data-dcnode-id="1653"><a class="fig-view-orig js-view-large openInAnotherWindow" data-dcnode-id="1656" data-google-interstitial="false" data-path-from-xml="pol014f3.gif" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/view-large/figure/4178452/pol014f3.gif" target="_blank"><span data-dcnode-id="1657" instrument_node="">Open in new tab</span></a><a class="download-slide" data-dcnode-id="1654" data-google-interstitial="false" data-path-from-xml="pol014f3.gif" data-section="4178452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/DownloadFile/DownloadImage.aspx%3Fimage%3Dhttps%3A//oup.silverchair-cdn.com/oup/backfile/Content_public/Journal/cjip/1/2/10.1093/cjip/pol014/2/pol014f3.gif%3FExpires%3D1653986738%26Signature%3DxYVsb-O7FGMM26FMT4aOpwUAi4bpxTLbKYy~1uE11~6DNyLSD4CEqFfJBsa7Ucmuq38rMSt8rHNSs5I5hbjrix4NV~Pi4vgd9PyEUUbYFhV-0UUf9Jcq8k7oAWa1LIulO8b8HG7vA8uzXiTSTTS34jVO4EKD8uonHgeBHG-cCB-hdO9KYnYqvCHHlgTAPZBFXy-3YqlUARY8Fqqkpx1QjxiVP0tGwFTWrpSWZeBZqWGoXDziv7LWQtvE0yAdAmTpzUnqHuEGK552NoqqGYBz7AVveM-07wFgZt8I7pUKDdfwjPX06el~mvTkGUDq09Ao5BWYvyU4n1G6oxFu15-oNg__%26Key-Pair-Id%3DAPKAIE5G5CRDK6RD3PGA%26sec%3D4178452%26ar%3D313616%26xsltPath%3D~/UI/app/XSLT%26imagename%3D%26siteId%3D5442"><span data-dcnode-id="1655" instrument_node="">Download slide</span></a></div></div><div class="caption fig-caption" data-dcnode-id="1649"><p class="chapter-para" data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">The Process of America's Strategic Transformation.</span></p></div></div><div class="fig fig-modal reveal-modal" content-id="F3" data-dcnode-id="1634" style="display: block;"><div class="label fig-label" data-dcnode-id="1645"><strong data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">Fig. 3</span></strong></div><div class="graphic-wrap" data-dcnode-id="1638"><img alt="The Process of America's Strategic Transformation." class="content-image" data-dcnode-id="1644" data-path-from-xml="pol014f3.gif" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//oup.silverchair-cdn.com/oup/backfile/Content_public/Journal/cjip/1/2/10.1093/cjip/pol014/2/m_pol014f3.gif%3FExpires%3D1653986738%26Signature%3DbA2fmQ~9IV3kNTyX8qTKaLfcuwu7PrpUsJDaWSKgNAgSL7rnSYk3jSMn244OeVauMrmiZTvEu9QbjpAXlBnojQP-Uybb2y7KP23f0YZpoYgVzzO1PRJYYMtN7y5~sQrMwIEP6ckRVNecu4LduYFg3dkonE7N-bnIoDtJxBwDw4m7QGGMu58IkB8hzXMsPFP2dNI6Xu-9q7fZyT6NeD57cCqJmR0PdKLM0KDtf3St5RPpxO57qJVeuqVLPmIiq42YBNq2yP6Js8rhTsaUNJTPvFHfgBxlDIux526t1tpyqqj4pEvPc1LeBQ29S05J2H0~GYlRTa~tKn7u8urcNByPwQ__%26Key-Pair-Id%3DAPKAIE5G5CRDK6RD3PGA&amp;raw"><div class="fig-orig original-slide" data-dcnode-id="1639"><a class="fig-view-orig js-view-large openInAnotherWindow" data-dcnode-id="1642" data-google-interstitial="false" data-path-from-xml="pol014f3.gif" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/view-large/figure/4178452/pol014f3.gif" target="_blank"><span data-dcnode-id="1643" instrument_node="">Open in new tab</span></a><a class="download-slide" data-dcnode-id="1640" data-google-interstitial="false" data-path-from-xml="pol014f3.gif" data-section="4178452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/DownloadFile/DownloadImage.aspx%3Fimage%3Dhttps%3A//oup.silverchair-cdn.com/oup/backfile/Content_public/Journal/cjip/1/2/10.1093/cjip/pol014/2/pol014f3.gif%3FExpires%3D1653986738%26Signature%3DxYVsb-O7FGMM26FMT4aOpwUAi4bpxTLbKYy~1uE11~6DNyLSD4CEqFfJBsa7Ucmuq38rMSt8rHNSs5I5hbjrix4NV~Pi4vgd9PyEUUbYFhV-0UUf9Jcq8k7oAWa1LIulO8b8HG7vA8uzXiTSTTS34jVO4EKD8uonHgeBHG-cCB-hdO9KYnYqvCHHlgTAPZBFXy-3YqlUARY8Fqqkpx1QjxiVP0tGwFTWrpSWZeBZqWGoXDziv7LWQtvE0yAdAmTpzUnqHuEGK552NoqqGYBz7AVveM-07wFgZt8I7pUKDdfwjPX06el~mvTkGUDq09Ao5BWYvyU4n1G6oxFu15-oNg__%26Key-Pair-Id%3DAPKAIE5G5CRDK6RD3PGA%26sec%3D4178452%26ar%3D313616%26xsltPath%3D~/UI/app/XSLT%26imagename%3D%26siteId%3D5442"><span data-dcnode-id="1641" instrument_node="">Download slide</span></a></div></div><div class="caption fig-caption" data-dcnode-id="1635"><p class="chapter-para" data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">The Process of America's Strategic Transformation.</span></p></div></div><span data-dcnode-id="1633" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="1631" id="4178453" scrollto-destination="4178453"><span data-dcnode-id="1632" instrument_node="">Conclusion</span></h2><span data-dcnode-id="1630" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">This article has demonstrated that, in periods of serious military conflict, nations strive to adjust their military strategies to keep up with changes in military technology and the corresponding changes that occur in the offense/defense balance. Nations are usually limited by their technical resources, and in the short-term lack the reliable capacity to develop the technologies that could make their ideal military strategy a realistic possibility. The emergence of the tank at the end of World War I and the development of the atomic bomb at the end of World War II were not creations specifically requested by military strategists. Rather, the development of these technologies was based upon decades of scientific advancement. In other words, technological development is not something that can be controlled, especially in the short-term. In contrast, military strategy can be altered at will and adjustments can produce tangible results in a very short period of time. Thus, during times of war or serious conflict, adjusting strategy according to the available military technology is the most reasonable course of action.</span></p><p class="chapter-para" data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">Yet, as noted, changes in the balance of military technology do not automatically lead to adjustments in military doctrine. For the military to increase its combat effectiveness through the use of technology the end-users, or armed forces, must possess a keen understanding of technological changes. Furthermore, if decision makers fail to appreciate the potential effects of a technological breakthrough, they will be unable to decide on the most appropriate strategy. Why then do nations fail to recognize the effects of changes in military technology on the offense/defense balance? Under what conditions will they decide to make strategic adjustments?</span></p><p class="chapter-para" data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">The experience of two World Wars indicates that nations use the model of the ‘last war’ to fight the next and overlook innovative technological advancements that may have taken place during the inter-war period. This blinkered attitude renders them incapable of making timely strategic adjustments. For example, prior to the First World War, the English, French, Germans, and Russians all believed that the next war would resemble the Prussian–French and Russo–Japanese Wars where the preemptive party had the advantage and conflicts were short and decisive. They disregarded the technological developments that had since taken place and were consequently unprepared for the quagmire of trench warfare in World War I. In the 1920s and 1930s, the English and French strictly adhered to the principles of positional warfare, largely ignoring the offensive potential of tanks, fighter aircraft wireless communication, and other new technologies. In contrast, the Germans embraced these new developments, incorporating them into innovative new operational strategies that enabled them to defeat France, their long-time rival, in fewer than 42 days. In the 20th century, the development of military technology has progressed rapidly—the leading technology in one war might very well be out of date by the start of the next. The experience of the new US-led military revolution indicates that technological change and strategic adjustment should be integrated. Strategic thinking should stay abreast of technological changes and strategists should develop concrete demands for the next round of technological innovations.</span></p><p class="chapter-para" data-dcnode-id="1617"><span data-dcnode-id="1623" instrument_node="">The experience of two World Wars also reveals that the manner of strategic changes depends greatly on whether the ODB is tilted in favor of offense or defense, as each has different characteristics. Carl Von Clausewitz argues that offence has a positive purpose—conquest; whereas that of defence is negative—preservation. In many respects, defense may be easier than offense, but it is only offense that wins ground. According to this line of thinking, an army undertakes defense when it finds itself in a position of weakness; once it possesses the strength required to achieve its objective, it should immediately renounce defense and go on the offensive. The Entente countries’ experience in World War I confirms Clausewitz's view.</span><span class="xrefLink" data-dcnode-id="1622" id="jumplink-FN59"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1619" data-google-interstitial="false" data-open="FN59" href="javascript:;" reveal-id="FN59"><sup data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">59</span></sup></a><span data-dcnode-id="1618" instrument_node=""> After the first battle of the Marne, the French army had stood up to the German assault, dashing Germany's hopes for a quick victory. The French saw Britain's entering the war as an opportunity to launch a counteroffensive, but the superiority of defensive weaponry made it difficult for any party instigating an attack to break through their opponent's defensive lines. Yet, both sides stubbornly held on to the belief that offense was superior. Even after suffering countless casualties, the Entente countries continued to cling to a strategy of offense until 1918, when they finally acknowledged the superiority of defense. As the experience of World War I reveals, when failure occurs as a result of military technology favoring defense, nations implement strategic reforms.</span></p><p class="chapter-para" data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">When military technology favors offense, changes in military strategy originate from a single nation's innovations in operational theory. Prior to World War II, Germany made a huge breakthrough by using large-scale, concentrated units of tanks in the blitzkrieg campains. The English and French, in contrast, retained World War I operational theory, merely dispersing tanks among infantry to support them. Events in the war quickly demonstrated that the German approach made better use of tank offensive potential.</span></p><p class="chapter-para" data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">After the end of World War II, the development of anti-tank missiles and other defensive technologies helped restore the balance between offense and defense. By 1970s, IT began to be employed. It touched off a revolution in military technology, bringing unforeseen improvements to offense, but little to defense, and ultimately disrupting the ODB. By the end of the 1970s, the US was keenly aware of the revolutionary impact information technology would have on the future of warfare and began to reform military doctrine accordingly. Advanced operational theory increased the demand for cutting-edge technology, and so stimulated the technological revolution. In a sense, the creation of new technologies and development of new operational theory formed a mutually reinforcing relationship in which the growth of one stimulated that of the other, America's failure in Vietnam and inability to rectify NATO's disadvantage in Europe also helped spur strategic reform. Strategic failure, in other words, served as the impetus for reform.</span></p><p class="chapter-para" data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">China can draw several lessons from this research. First, because IT-based military technology favors offense, unless a drastic change occurs, further informationalization increases the likelihood of China being drawn into military conflict. Second, while conducting the two-fold task of mechanizing and informationalizing the People's Liberation Army, China must be equally attentive to research and development in both offensive weaponry and offensive operational theory. Third, in addition to paying close attention to the lessons of the last war, China must remain abreast of cutting edge technological developments and how they integrate with the latest operational theory.</span></p><div class="footnote" content-id="FN1" data-dcnode-id="1587"><span class="fn" data-dcnode-id="1588"><span class="label fn-label" data-dcnode-id="1607"><span class="end-note-link" data-dcnode-id="1608" data-fn-id="FN1" rel="nofollow"><sup data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">1</span></sup></span></span><div class="footnote-content" data-dcnode-id="1589"><p class="footnote-compatibility" data-dcnode-id="1590"><span data-dcnode-id="1606" instrument_node="">Representative works of offense/defense theory include: Robert Jervis, ‘Cooperation Under the Security Dilemma,’ </span><em data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">World Politics</span></em><span data-dcnode-id="1603" instrument_node="">, Vol. 30, No. 2, 1978, pp. 167–214; Stephen Van Evera, </span><em data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">Causes of War: Power and The Roots of Conflict</span></em><span data-dcnode-id="1600" instrument_node=""> (Ithaca, N.Y.: Cornell University Press, 1999); Geroge H. Quester, </span><em data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">Offense and Defense in the International System</span></em><span data-dcnode-id="1597" instrument_node=""> (New York: John Wiley and Sons, 1977); Thomas J. Christensen and Jack Snyder, ‘Chain Gangs and Passed Bucks: Predicting Alliance Patterns in Multipolarity,’ </span><em data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">International Security</span></em><span data-dcnode-id="1594" instrument_node="">, Vol. 44, No. 2 (1990), pp. 137–68. For a detailed introduction to the theory see, Sean Lynn-Jones, ‘offense-Defense Theory and Its Critics,’ </span><em data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">Security Studies</span></em><span data-dcnode-id="1591" instrument_node="">, Vol. 4, No. 4, 1995, pp. 660–2.</span></p></div></span></div><div class="footnote" content-id="FN2" data-dcnode-id="1566"><span class="fn" data-dcnode-id="1567"><span class="label fn-label" data-dcnode-id="1583"><span class="end-note-link" data-dcnode-id="1584" data-fn-id="FN2" rel="nofollow"><sup data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">2</span></sup></span></span><div class="footnote-content" data-dcnode-id="1568"><p class="footnote-compatibility" data-dcnode-id="1569"><span data-dcnode-id="1582" instrument_node="">Van Evera maintains that military technology, regulations, deployment and operations all influence a nation's behavior during wartime. Although he does not use the term ‘military strategy’ directly, all of the above elements are encompassed by military strategy. See Stephen Van Evera, </span><em data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">Causes of War</span></em><span data-dcnode-id="1579" instrument_node="">, p. 162. According to the </span><em data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">Chinese Military Encyclopedia</span></em><span data-dcnode-id="1576" instrument_node="">, ‘military strategy’ is the planning and directing of the overall war effort, including all relevant preparations. </span><em data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">Zhongguo junshi baike quanshu: zhangzheng, zhanglue</span></em><span data-dcnode-id="1573" instrument_node=""> (</span><em data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">Chinese Military Encyclopedia: War and Strategy</span></em><span data-dcnode-id="1570" instrument_node="">) (Beijing: Junshi Kexue Chubanshe, 1993).</span></p></div></span></div><div class="footnote" content-id="FN3" data-dcnode-id="1554"><span class="fn" data-dcnode-id="1555"><span class="label fn-label" data-dcnode-id="1562"><span class="end-note-link" data-dcnode-id="1563" data-fn-id="FN3" rel="nofollow"><sup data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">3</span></sup></span></span><div class="footnote-content" data-dcnode-id="1556"><p class="footnote-compatibility" data-dcnode-id="1557"><span data-dcnode-id="1561" instrument_node="">Jervis also discusses the role of geography, but his main focus is technology. See Robert Jervis, ‘Cooperation Under the Security Dilemma,’ </span><em data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">World Politics</span></em><span data-dcnode-id="1558" instrument_node="">, Vol. 30, No. 2 (1978), pp. 167–214.</span></p></div></span></div><div class="footnote" content-id="FN4" data-dcnode-id="1545"><span class="fn" data-dcnode-id="1546"><span class="label fn-label" data-dcnode-id="1550"><span class="end-note-link" data-dcnode-id="1551" data-fn-id="FN4" rel="nofollow"><sup data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">4</span></sup></span></span><div class="footnote-content" data-dcnode-id="1547"><p class="footnote-compatibility" data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">This is assuming that the disparity in power between the two combatants is not large. If the offensive party is significantly stronger than the defensive party, it will undoubtedly be the victor.</span></p></div></span></div><div class="footnote" content-id="FN5" data-dcnode-id="1533"><span class="fn" data-dcnode-id="1534"><span class="label fn-label" data-dcnode-id="1541"><span class="end-note-link" data-dcnode-id="1542" data-fn-id="FN5" rel="nofollow"><sup data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">5</span></sup></span></span><div class="footnote-content" data-dcnode-id="1535"><p class="footnote-compatibility" data-dcnode-id="1536"><span data-dcnode-id="1540" instrument_node="">George H. Quester, </span><em data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">Offense and Defense in the International System</span></em><span data-dcnode-id="1537" instrument_node="">.</span></p></div></span></div><div class="footnote" content-id="FN6" data-dcnode-id="1524"><span class="fn" data-dcnode-id="1525"><span class="label fn-label" data-dcnode-id="1529"><span class="end-note-link" data-dcnode-id="1530" data-fn-id="FN6" rel="nofollow"><sup data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">6</span></sup></span></span><div class="footnote-content" data-dcnode-id="1526"><p class="footnote-compatibility" data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">Starting from 1945 and counting the 1991 Persian Gulf War as the beginning of the era of informationalized warfare, there were 46 years between the latest two eras.</span></p></div></span></div><div class="footnote" content-id="FN7" data-dcnode-id="1515"><span class="fn" data-dcnode-id="1516"><span class="label fn-label" data-dcnode-id="1520"><span class="end-note-link" data-dcnode-id="1521" data-fn-id="FN7" rel="nofollow"><sup data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">7</span></sup></span></span><div class="footnote-content" data-dcnode-id="1517"><p class="footnote-compatibility" data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">For the impact of geography on military strategy, see Robert Jervis, ‘Cooperation Under the Security Dilemma,’ pp. 194–6.</span></p></div></span></div><div class="footnote" content-id="FN8" data-dcnode-id="1500"><span class="fn" data-dcnode-id="1501"><span class="label fn-label" data-dcnode-id="1511"><span class="end-note-link" data-dcnode-id="1512" data-fn-id="FN8" rel="nofollow"><sup data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">8</span></sup></span></span><div class="footnote-content" data-dcnode-id="1502"><p class="footnote-compatibility" data-dcnode-id="1503"><span data-dcnode-id="1510" instrument_node="">For a detailed description of the origins of the Cult of the Offensive, see Jack Snyder, </span><em data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">The Ideology of the Offensive: Military Decision Making And The Disasters of 1914</span></em><span data-dcnode-id="1507" instrument_node=""> (Ithaca: Cornell University Press, 1984). For the relationship between the Cult of the Offensive and the origins of World War I, see Stephen Van Evera, </span><em data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">Causes of War</span></em><span data-dcnode-id="1504" instrument_node="">, Chapter 7.</span></p></div></span></div><div class="footnote" content-id="FN9" data-dcnode-id="1485"><span class="fn" data-dcnode-id="1486"><span class="label fn-label" data-dcnode-id="1496"><span class="end-note-link" data-dcnode-id="1497" data-fn-id="FN9" rel="nofollow"><sup data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">9</span></sup></span></span><div class="footnote-content" data-dcnode-id="1487"><p class="footnote-compatibility" data-dcnode-id="1488"><span data-dcnode-id="1495" instrument_node="">T.N. Dupuy, </span><em data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">The Evolution of Weapons and War</span></em><span data-dcnode-id="1492" instrument_node="">, chapters 21 and 23. </span><a class="link link-uri openInAnotherWindow" data-dcnode-id="1490" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.warstudy.com/" target="_blank"><span data-dcnode-id="1491" instrument_node="">http://www.warstudy.com</span></a><span data-dcnode-id="1489" instrument_node="">.</span></p></div></span></div><div class="footnote" content-id="FN10" data-dcnode-id="1473"><span class="fn" data-dcnode-id="1474"><span class="label fn-label" data-dcnode-id="1481"><span class="end-note-link" data-dcnode-id="1482" data-fn-id="FN10" rel="nofollow"><sup data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">10</span></sup></span></span><div class="footnote-content" data-dcnode-id="1475"><p class="footnote-compatibility" data-dcnode-id="1476"><span data-dcnode-id="1480" instrument_node="">T. N. Dupuy, </span><em data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">The Evolution of Weapons and War</span></em><span data-dcnode-id="1477" instrument_node="">, p. 218.</span></p></div></span></div><div class="footnote" content-id="FN11" data-dcnode-id="1461"><span class="fn" data-dcnode-id="1462"><span class="label fn-label" data-dcnode-id="1469"><span class="end-note-link" data-dcnode-id="1470" data-fn-id="FN11" rel="nofollow"><sup data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">11</span></sup></span></span><div class="footnote-content" data-dcnode-id="1463"><p class="footnote-compatibility" data-dcnode-id="1464"><span data-dcnode-id="1468" instrument_node="">For example, during the Boer War, when the English used a concentrated infantry formation to charge the enemy, they were met with fierce artillery fire. This prevented them from encroaching on the Boer defenses. In the Russo–Japanese War, the power of defense had already become very apparent—soldiers from both sides carried shovels along with their rifles. See Michael Howard, ‘Men Against Fire: Expectations of War in 1914,’ </span><em data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">International Security</span></em><span data-dcnode-id="1465" instrument_node="">, Vol. 9, No. 1 (1984), pp. 43–55.</span></p></div></span></div><div class="footnote" content-id="FN12" data-dcnode-id="1452"><span class="fn" data-dcnode-id="1453"><span class="label fn-label" data-dcnode-id="1457"><span class="end-note-link" data-dcnode-id="1458" data-fn-id="FN12" rel="nofollow"><sup data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">12</span></sup></span></span><div class="footnote-content" data-dcnode-id="1454"><p class="footnote-compatibility" data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Morale can overcome disadvantages in firepower. In the Russo-Japanese War, Japanese soldiers relentlessly charged at the Russian lines, destroying the Russian will to fight.</span></p></div></span></div><div class="footnote" content-id="FN13" data-dcnode-id="1440"><span class="fn" data-dcnode-id="1441"><span class="label fn-label" data-dcnode-id="1448"><span class="end-note-link" data-dcnode-id="1449" data-fn-id="FN13" rel="nofollow"><sup data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">13</span></sup></span></span><div class="footnote-content" data-dcnode-id="1442"><p class="footnote-compatibility" data-dcnode-id="1443"><span data-dcnode-id="1447" instrument_node="">Walter Gorlitz, </span><em data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">Geschichte des deutschen Generalstabes</span></em><span data-dcnode-id="1444" instrument_node="">, trans. Dai Yaoxian (Haikou: Hainan Chubanshe, 2004), pp. 119–26.</span></p></div></span></div><div class="footnote" content-id="FN14" data-dcnode-id="1431"><span class="fn" data-dcnode-id="1432"><span class="label fn-label" data-dcnode-id="1436"><span class="end-note-link" data-dcnode-id="1437" data-fn-id="FN14" rel="nofollow"><sup data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">14</span></sup></span></span><div class="footnote-content" data-dcnode-id="1433"><p class="footnote-compatibility" data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">Howard, ‘Men Against Fire,’ pp. 43–57.</span></p></div></span></div><div class="footnote" content-id="FN15" data-dcnode-id="1419"><span class="fn" data-dcnode-id="1420"><span class="label fn-label" data-dcnode-id="1427"><span class="end-note-link" data-dcnode-id="1428" data-fn-id="FN15" rel="nofollow"><sup data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">15</span></sup></span></span><div class="footnote-content" data-dcnode-id="1421"><p class="footnote-compatibility" data-dcnode-id="1422"><span data-dcnode-id="1426" instrument_node="">I. I. Rostunov, </span><em data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">History of the First World War</span></em><span data-dcnode-id="1423" instrument_node="">, trans. Zhong Shi (Shanghai Yiwen Chubanshe, 1982), p. 133.</span></p></div></span></div><div class="footnote" content-id="FN16" data-dcnode-id="1408"><span class="fn" data-dcnode-id="1409"><span class="label fn-label" data-dcnode-id="1415"><span class="end-note-link" data-dcnode-id="1416" data-fn-id="FN16" rel="nofollow"><sup data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">16</span></sup></span></span><div class="footnote-content" data-dcnode-id="1410"><p class="footnote-compatibility" data-dcnode-id="1411"><em data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">Ibid</span></em><span data-dcnode-id="1412" instrument_node="">., p. 139.</span></p></div></span></div><div class="footnote" content-id="FN17" data-dcnode-id="1397"><span class="fn" data-dcnode-id="1398"><span class="label fn-label" data-dcnode-id="1404"><span class="end-note-link" data-dcnode-id="1405" data-fn-id="FN17" rel="nofollow"><sup data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">17</span></sup></span></span><div class="footnote-content" data-dcnode-id="1399"><p class="footnote-compatibility" data-dcnode-id="1400"><em data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">Ibid</span></em><span data-dcnode-id="1401" instrument_node="">., p. 141.</span></p></div></span></div><div class="footnote" content-id="FN18" data-dcnode-id="1385"><span class="fn" data-dcnode-id="1386"><span class="label fn-label" data-dcnode-id="1393"><span class="end-note-link" data-dcnode-id="1394" data-fn-id="FN18" rel="nofollow"><sup data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">18</span></sup></span></span><div class="footnote-content" data-dcnode-id="1387"><p class="footnote-compatibility" data-dcnode-id="1388"><span data-dcnode-id="1392" instrument_node="">I. I. Rostunov, </span><em data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">History of the First World War</span></em><span data-dcnode-id="1389" instrument_node="">, p. 138.</span></p></div></span></div><div class="footnote" content-id="FN19" data-dcnode-id="1373"><span class="fn" data-dcnode-id="1374"><span class="label fn-label" data-dcnode-id="1381"><span class="end-note-link" data-dcnode-id="1382" data-fn-id="FN19" rel="nofollow"><sup data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">19</span></sup></span></span><div class="footnote-content" data-dcnode-id="1375"><p class="footnote-compatibility" data-dcnode-id="1376"><span data-dcnode-id="1380" instrument_node="">The English, French and German armies, respectively deployed 54, 32 and 67 divisions to the battle. I. I. Rostunov, </span><em data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">History of the First World War</span></em><span data-dcnode-id="1377" instrument_node="">, p. 675.</span></p></div></span></div><div class="footnote" content-id="FN20" data-dcnode-id="1362"><span class="fn" data-dcnode-id="1363"><span class="label fn-label" data-dcnode-id="1369"><span class="end-note-link" data-dcnode-id="1370" data-fn-id="FN20" rel="nofollow"><sup data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">20</span></sup></span></span><div class="footnote-content" data-dcnode-id="1364"><p class="footnote-compatibility" data-dcnode-id="1365"><em data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">Ibid</span></em><span data-dcnode-id="1366" instrument_node="">., pp. 659–70.</span></p></div></span></div><div class="footnote" content-id="FN21" data-dcnode-id="1350"><span class="fn" data-dcnode-id="1351"><span class="label fn-label" data-dcnode-id="1358"><span class="end-note-link" data-dcnode-id="1359" data-fn-id="FN21" rel="nofollow"><sup data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">21</span></sup></span></span><div class="footnote-content" data-dcnode-id="1352"><p class="footnote-compatibility" data-dcnode-id="1353"><span data-dcnode-id="1357" instrument_node="">I. I. Rostunov, </span><em data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">History of the First World War</span></em><span data-dcnode-id="1354" instrument_node="">, pp. 659, 664.</span></p></div></span></div><div class="footnote" content-id="FN22" data-dcnode-id="1339"><span class="fn" data-dcnode-id="1340"><span class="label fn-label" data-dcnode-id="1346"><span class="end-note-link" data-dcnode-id="1347" data-fn-id="FN22" rel="nofollow"><sup data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">22</span></sup></span></span><div class="footnote-content" data-dcnode-id="1341"><p class="footnote-compatibility" data-dcnode-id="1342"><em data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">Ibid</span></em><span data-dcnode-id="1343" instrument_node="">., p. 665.</span></p></div></span></div><div class="footnote" content-id="FN23" data-dcnode-id="1327"><span class="fn" data-dcnode-id="1328"><span class="label fn-label" data-dcnode-id="1335"><span class="end-note-link" data-dcnode-id="1336" data-fn-id="FN23" rel="nofollow"><sup data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">23</span></sup></span></span><div class="footnote-content" data-dcnode-id="1329"><p class="footnote-compatibility" data-dcnode-id="1330"><span data-dcnode-id="1334" instrument_node="">Winston Churchill, </span><em data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">Diyici shijie dazhan huiyilu (Memoirs of the First World War)</span></em><span data-dcnode-id="1331" instrument_node="">, pp. 656–7.</span></p></div></span></div><div class="footnote" content-id="FN24" data-dcnode-id="1315"><span class="fn" data-dcnode-id="1316"><span class="label fn-label" data-dcnode-id="1323"><span class="end-note-link" data-dcnode-id="1324" data-fn-id="FN24" rel="nofollow"><sup data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">24</span></sup></span></span><div class="footnote-content" data-dcnode-id="1317"><p class="footnote-compatibility" data-dcnode-id="1318"><span data-dcnode-id="1322" instrument_node="">I. I. Rostunov, </span><em data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">History of the First World War</span></em><span data-dcnode-id="1319" instrument_node="">, p. 659.</span></p></div></span></div><div class="footnote" content-id="FN25" data-dcnode-id="1303"><span class="fn" data-dcnode-id="1304"><span class="label fn-label" data-dcnode-id="1311"><span class="end-note-link" data-dcnode-id="1312" data-fn-id="FN25" rel="nofollow"><sup data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">25</span></sup></span></span><div class="footnote-content" data-dcnode-id="1305"><p class="footnote-compatibility" data-dcnode-id="1306"><span data-dcnode-id="1310" instrument_node="">I. I. Rostunov, </span><em data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">History of the First World War</span></em><span data-dcnode-id="1307" instrument_node="">, p. 675.</span></p></div></span></div><div class="footnote" content-id="FN26" data-dcnode-id="1292"><span class="fn" data-dcnode-id="1293"><span class="label fn-label" data-dcnode-id="1299"><span class="end-note-link" data-dcnode-id="1300" data-fn-id="FN26" rel="nofollow"><sup data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">26</span></sup></span></span><div class="footnote-content" data-dcnode-id="1294"><p class="footnote-compatibility" data-dcnode-id="1295"><em data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">Ibid</span></em><span data-dcnode-id="1296" instrument_node="">., p. 676.</span></p></div></span></div><div class="footnote" content-id="FN27" data-dcnode-id="1280"><span class="fn" data-dcnode-id="1281"><span class="label fn-label" data-dcnode-id="1288"><span class="end-note-link" data-dcnode-id="1289" data-fn-id="FN27" rel="nofollow"><sup data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">27</span></sup></span></span><div class="footnote-content" data-dcnode-id="1282"><p class="footnote-compatibility" data-dcnode-id="1283"><span data-dcnode-id="1287" instrument_node="">For more detail on the internal political and economic turmoil of the Entente countries, see I. I. Rostunov, </span><em data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">History of the First World War</span></em><span data-dcnode-id="1284" instrument_node="">, pp. 918–26.</span></p></div></span></div><div class="footnote" content-id="FN28" data-dcnode-id="1268"><span class="fn" data-dcnode-id="1269"><span class="label fn-label" data-dcnode-id="1276"><span class="end-note-link" data-dcnode-id="1277" data-fn-id="FN28" rel="nofollow"><sup data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">28</span></sup></span></span><div class="footnote-content" data-dcnode-id="1270"><p class="footnote-compatibility" data-dcnode-id="1271"><span data-dcnode-id="1275" instrument_node="">I. I. Rostunov, </span><em data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">History of the First World War</span></em><span data-dcnode-id="1272" instrument_node="">, p. 927.</span></p></div></span></div><div class="footnote" content-id="FN29" data-dcnode-id="1259"><span class="fn" data-dcnode-id="1260"><span class="label fn-label" data-dcnode-id="1264"><span class="end-note-link" data-dcnode-id="1265" data-fn-id="FN29" rel="nofollow"><sup data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">29</span></sup></span></span><div class="footnote-content" data-dcnode-id="1261"><p class="footnote-compatibility" data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">Also known as ‘infiltration tactics’. Devised by the German General Oskar Von Hutier. A number of German military historians argue that Hutier tactics were the most important theoretical development of World War I.</span></p></div></span></div><div class="footnote" content-id="FN30" data-dcnode-id="1250"><span class="fn" data-dcnode-id="1251"><span class="label fn-label" data-dcnode-id="1255"><span class="end-note-link" data-dcnode-id="1256" data-fn-id="FN30" rel="nofollow"><sup data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">30</span></sup></span></span><div class="footnote-content" data-dcnode-id="1252"><p class="footnote-compatibility" data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">During the Battle of the Somme, the Entente forces bombarded the German lines for seven consecutive days. According to the principles of Hutier tactics, excessive shelling is ill-advised as it reveals to the enemy the location of the next attack, allowing ample time to deploy reserve forces to meet the coming assault.</span></p></div></span></div><div class="footnote" content-id="FN31" data-dcnode-id="1238"><span class="fn" data-dcnode-id="1239"><span class="label fn-label" data-dcnode-id="1246"><span class="end-note-link" data-dcnode-id="1247" data-fn-id="FN31" rel="nofollow"><sup data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">31</span></sup></span></span><div class="footnote-content" data-dcnode-id="1240"><p class="footnote-compatibility" data-dcnode-id="1241"><span data-dcnode-id="1245" instrument_node="">I. I. Rostunov, </span><em data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">History of the First World War</span></em><span data-dcnode-id="1242" instrument_node="">, pp. 973–4.</span></p></div></span></div><div class="footnote" content-id="FN32" data-dcnode-id="1226"><span class="fn" data-dcnode-id="1227"><span class="label fn-label" data-dcnode-id="1234"><span class="end-note-link" data-dcnode-id="1235" data-fn-id="FN32" rel="nofo
