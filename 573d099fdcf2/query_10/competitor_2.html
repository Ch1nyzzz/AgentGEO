llow"><sup data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">32</span></sup></span></span><div class="footnote-content" data-dcnode-id="1228"><p class="footnote-compatibility" data-dcnode-id="1229"><span data-dcnode-id="1233" instrument_node="">The English first used tanks in the Battle of the Somme on 15 September, 1917. They deployed 18 tanks across a 10 km-wide line to support an infantry assault. Within 5 hours, the assault had advanced 4–5 km. One tank in the assault single handedly forced 300 German soldiers to surrender. This was a remarkable achievement, especially taking into consideration that, without the use of tanks, the same amount of progress would have required the expenditure of several thousand tons of ammunition and the sacrifice of tens of thousands of soldiers. I.I. Rostunov, </span><em data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">History of the First World War</span></em><span data-dcnode-id="1230" instrument_node="">, pp. 672–3, 862–4.</span></p></div></span></div><div class="footnote" content-id="FN33" data-dcnode-id="1211"><span class="fn" data-dcnode-id="1212"><span class="label fn-label" data-dcnode-id="1222"><span class="end-note-link" data-dcnode-id="1223" data-fn-id="FN33" rel="nofollow"><sup data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">33</span></sup></span></span><div class="footnote-content" data-dcnode-id="1213"><p class="footnote-compatibility" data-dcnode-id="1214"><span data-dcnode-id="1221" instrument_node="">An alternative proposal called for tanks and other mechanized troops to form their own independent high-speed assault groups in addition to supporting the infantry. For more on the debates about the role of the tank in battle, see Azar Gat, ‘Ideology, National Policy, Technology and Strategic Doctrine between the World Wars,’ </span><em data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">The Journal of Strategic Studies</span></em><span data-dcnode-id="1218" instrument_node="">, Vol. 24, No. 3 (2001), pp. 3–4; Wang Kai, </span><em data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">Jixiehua zhanzheng lun de ‘shengjing’: fulei ‘zhuangjiazhan’ qianshuo (The Bible of Mechanized Warfare Theory: An Elementary Introduction to Fullerton's Armored Warfare)</span></em><span data-dcnode-id="1215" instrument_node=""> (Beijing: Junshi Kexue Chubanshe, 2000), pp. 33–4.</span></p></div></span></div><div class="footnote" content-id="FN34" data-dcnode-id="1193"><span class="fn" data-dcnode-id="1194"><span class="label fn-label" data-dcnode-id="1207"><span class="end-note-link" data-dcnode-id="1208" data-fn-id="FN34" rel="nofollow"><sup data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">34</span></sup></span></span><div class="footnote-content" data-dcnode-id="1195"><p class="footnote-compatibility" data-dcnode-id="1196"><span data-dcnode-id="1206" instrument_node="">After World War I, English tanks fell out of favor. In 1929, the English disbanded an experimental mechanized unit, and it was not until 1931 that England established its first tank brigade, but this unit was unfit for independent operations as it lacked requisite support. In 1934, the English established a second tank brigade giving it the artillery and infantry support it needed to be operational. Not until the battle of France, however, did England finally establish its first armor division. While the French had several armored divisions prior to the start of the war, French commanders insisted on using them to support infantry. Yao Youzhi, ed., </span><em data-dcnode-id="1201"><span data-dcnode-id="1205" instrument_node="">20 Shiji zhanlue lun yichan (The Legacy of 20</span><sup data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">th</span></sup><span data-dcnode-id="1202" instrument_node=""> Century Strategic Theory)</span></em><span data-dcnode-id="1200" instrument_node=""> (Beijing: Junshi Kexue Chubanshe, 2001), p. 158; Wang Kai, </span><em data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">The Bible of Mechanized Warfare Theory</span></em><span data-dcnode-id="1197" instrument_node="">, p. 28.</span></p></div></span></div><div class="footnote" content-id="FN35" data-dcnode-id="1178"><span class="fn" data-dcnode-id="1179"><span class="label fn-label" data-dcnode-id="1189"><span class="end-note-link" data-dcnode-id="1190" data-fn-id="FN35" rel="nofollow"><sup data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">35</span></sup></span></span><div class="footnote-content" data-dcnode-id="1180"><p class="footnote-compatibility" data-dcnode-id="1181"><span data-dcnode-id="1188" instrument_node="">Yao Youzhi, ed., </span><em data-dcnode-id="1183"><span data-dcnode-id="1187" instrument_node="">The Legacy of 20</span><sup data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">th</span></sup><span data-dcnode-id="1184" instrument_node=""> Century Strategic Theory</span></em><span data-dcnode-id="1182" instrument_node="">, pp. 157–8.</span></p></div></span></div><div class="footnote" content-id="FN36" data-dcnode-id="1166"><span class="fn" data-dcnode-id="1167"><span class="label fn-label" data-dcnode-id="1174"><span class="end-note-link" data-dcnode-id="1175" data-fn-id="FN36" rel="nofollow"><sup data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">36</span></sup></span></span><div class="footnote-content" data-dcnode-id="1168"><p class="footnote-compatibility" data-dcnode-id="1169"><span data-dcnode-id="1173" instrument_node="">German tanks were superior to their French and English counterparts. Panzers could travel at 40 km/hour and fire 75 mm shells. Wang Kai, </span><em data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">The Bible of Mechanized Warfare Theory</span></em><span data-dcnode-id="1170" instrument_node="">, p. 28.</span></p></div></span></div><div class="footnote" content-id="FN37" data-dcnode-id="1151"><span class="fn" data-dcnode-id="1152"><span class="label fn-label" data-dcnode-id="1162"><span class="end-note-link" data-dcnode-id="1163" data-fn-id="FN37" rel="nofollow"><sup data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">37</span></sup></span></span><div class="footnote-content" data-dcnode-id="1153"><p class="footnote-compatibility" data-dcnode-id="1154"><span data-dcnode-id="1161" instrument_node="">Yao Youzhi, ed., </span><em data-dcnode-id="1156"><span data-dcnode-id="1160" instrument_node="">The Legacy of 20</span><sup data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">th</span></sup><span data-dcnode-id="1157" instrument_node=""> Century Strategic Theory</span></em><span data-dcnode-id="1155" instrument_node="">, pp. 154–7.</span></p></div></span></div><div class="footnote" content-id="FN38" data-dcnode-id="1140"><span class="fn" data-dcnode-id="1141"><span class="label fn-label" data-dcnode-id="1147"><span class="end-note-link" data-dcnode-id="1148" data-fn-id="FN38" rel="nofollow"><sup data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">38</span></sup></span></span><div class="footnote-content" data-dcnode-id="1142"><p class="footnote-compatibility" data-dcnode-id="1143"><em data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Ibid</span></em><span data-dcnode-id="1144" instrument_node="">., p. 159.</span></p></div></span></div><div class="footnote" content-id="FN39" data-dcnode-id="1125"><span class="fn" data-dcnode-id="1126"><span class="label fn-label" data-dcnode-id="1136"><span class="end-note-link" data-dcnode-id="1137" data-fn-id="FN39" rel="nofollow"><sup data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">39</span></sup></span></span><div class="footnote-content" data-dcnode-id="1127"><p class="footnote-compatibility" data-dcnode-id="1128"><span data-dcnode-id="1135" instrument_node="">Junshi Kexueyuan Junshi Lishi Yanjiubu, </span><em data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">Dierci shijie dazhan shi (di er juan)</span></em><span data-dcnode-id="1132" instrument_node=""> (</span><em data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">History of the Second World War, Vol. 2</span></em><span data-dcnode-id="1129" instrument_node="">) (Beijing: Junshi Kexue Chubanshe, 1995), pp. 40, 45.</span></p></div></span></div><div class="footnote" content-id="FN40" data-dcnode-id="1114"><span class="fn" data-dcnode-id="1115"><span class="label fn-label" data-dcnode-id="1121"><span class="end-note-link" data-dcnode-id="1122" data-fn-id="FN40" rel="nofollow"><sup data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">40</span></sup></span></span><div class="footnote-content" data-dcnode-id="1116"><p class="footnote-compatibility" data-dcnode-id="1117"><em data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Ibid</span></em><span data-dcnode-id="1118" instrument_node="">., pp. 38–40.</span></p></div></span></div><div class="footnote" content-id="FN41" data-dcnode-id="1105"><span class="fn" data-dcnode-id="1106"><span class="label fn-label" data-dcnode-id="1110"><span class="end-note-link" data-dcnode-id="1111" data-fn-id="FN41" rel="nofollow"><sup data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">41</span></sup></span></span><div class="footnote-content" data-dcnode-id="1107"><p class="footnote-compatibility" data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">In contrast, during the Ludendorff Offensive, it took the Germans 16 days to drive 60 km into their opponent's defenses.</span></p></div></span></div><div class="footnote" content-id="FN42" data-dcnode-id="1093"><span class="fn" data-dcnode-id="1094"><span class="label fn-label" data-dcnode-id="1101"><span class="end-note-link" data-dcnode-id="1102" data-fn-id="FN42" rel="nofollow"><sup data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">42</span></sup></span></span><div class="footnote-content" data-dcnode-id="1095"><p class="footnote-compatibility" data-dcnode-id="1096"><span data-dcnode-id="1100" instrument_node="">Barry Posen, </span><em data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">The Sources of Military Doctrine: France, Britain And Germany Between The World Wars</span></em><span data-dcnode-id="1097" instrument_node=""> (Ithaca: Cornell University Press, 1984), pp. 87–93.</span></p></div></span></div><div class="footnote" content-id="FN43" data-dcnode-id="1081"><span class="fn" data-dcnode-id="1082"><span class="label fn-label" data-dcnode-id="1089"><span class="end-note-link" data-dcnode-id="1090" data-fn-id="FN43" rel="nofollow"><sup data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">43</span></sup></span></span><div class="footnote-content" data-dcnode-id="1083"><p class="footnote-compatibility" data-dcnode-id="1084"><span data-dcnode-id="1088" instrument_node="">The only exception to this was Charles de Gaulle's 4th armored division. Yet, even De Gaulle's remarkable performance was unable to salvage the battle for the French. Junshi Kexueyuan Junshi Lishi Yanjiubu, </span><em data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">History of the Second World War, Vol. 2</span></em><span data-dcnode-id="1085" instrument_node="">, pp. 54–5.</span></p></div></span></div><div class="footnote" content-id="FN44" data-dcnode-id="1066"><span class="fn" data-dcnode-id="1067"><span class="label fn-label" data-dcnode-id="1077"><span class="end-note-link" data-dcnode-id="1078" data-fn-id="FN44" rel="nofollow"><sup data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">44</span></sup></span></span><div class="footnote-content" data-dcnode-id="1068"><p class="footnote-compatibility" data-dcnode-id="1069"><span data-dcnode-id="1076" instrument_node="">This includes computer, communications, precision-guidance, remote sensing and surveying, aerospace, global positioning, camouflage, laser and night vision technologies. For more details consult Lin Jianchao and Ji Wenming, eds., </span><em data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">Shijie xin junshi biange gailun</span></em><span data-dcnode-id="1073" instrument_node=""> (</span><em data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">An Introduction to Changes in Military Technology</span></em><span data-dcnode-id="1070" instrument_node="">) (Beijing: Jiefangjun Chubanshe, 2004), pp. 46–52, 135–52.</span></p></div></span></div><div class="footnote" content-id="FN45" data-dcnode-id="1057"><span class="fn" data-dcnode-id="1058"><span class="label fn-label" data-dcnode-id="1062"><span class="end-note-link" data-dcnode-id="1063" data-fn-id="FN45" rel="nofollow"><sup data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">45</span></sup></span></span><div class="footnote-content" data-dcnode-id="1059"><p class="footnote-compatibility" data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">Strategic nuclear weapons are an exception. The impact of nuclear weapons on the offense/defense balance, however, is beyond the scope of this essay.</span></p></div></span></div><div class="footnote" content-id="FN46" data-dcnode-id="1039"><span class="fn" data-dcnode-id="1040"><span class="label fn-label" data-dcnode-id="1053"><span class="end-note-link" data-dcnode-id="1054" data-fn-id="FN46" rel="nofollow"><sup data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">46</span></sup></span></span><div class="footnote-content" data-dcnode-id="1041"><p class="footnote-compatibility" data-dcnode-id="1042"><span data-dcnode-id="1052" instrument_node="">Wang Huiqing, </span><em data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">20 Shiji Xifang Daguo Zhanzheng Jihua Yanjiu</span></em><span data-dcnode-id="1049" instrument_node=""> (</span><em data-dcnode-id="1044"><span data-dcnode-id="1048" instrument_node="">Studies in the War Plans of 20</span><sup data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">th</span></sup><span data-dcnode-id="1045" instrument_node=""> Century Western Powers</span></em><span data-dcnode-id="1043" instrument_node="">) (Beijing: Junshi Kexue Chubanshe, 1997), pp. 94–5.</span></p></div></span></div><div class="footnote" content-id="FN47" data-dcnode-id="1024"><span class="fn" data-dcnode-id="1025"><span class="label fn-label" data-dcnode-id="1035"><span class="end-note-link" data-dcnode-id="1036" data-fn-id="FN47" rel="nofollow"><sup data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">47</span></sup></span></span><div class="footnote-content" data-dcnode-id="1026"><p class="footnote-compatibility" data-dcnode-id="1027"><span data-dcnode-id="1034" instrument_node="">Xu Hezhen, ed., </span><em data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">Zuozhan fangshi de gemingxing bianhua</span></em><span data-dcnode-id="1031" instrument_node=""> (</span><em data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Revolutionary Changes in Battle</span></em><span data-dcnode-id="1028" instrument_node="">) (Beijing: Jiefangjun Chubanshe, 2004), p. 126.</span></p></div></span></div><div class="footnote" content-id="FN48" data-dcnode-id="1012"><span class="fn" data-dcnode-id="1013"><span class="label fn-label" data-dcnode-id="1020"><span class="end-note-link" data-dcnode-id="1021" data-fn-id="FN48" rel="nofollow"><sup data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">48</span></sup></span></span><div class="footnote-content" data-dcnode-id="1014"><p class="footnote-compatibility" data-dcnode-id="1015"><span data-dcnode-id="1019" instrument_node="">C</span><sup data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">4</span></sup><span data-dcnode-id="1016" instrument_node="">ISR means command, control, communications, computers, intelligence, surveillance, and reconnaissance.</span></p></div></span></div><div class="footnote" content-id="FN49" data-dcnode-id="1000"><span class="fn" data-dcnode-id="1001"><span class="label fn-label" data-dcnode-id="1008"><span class="end-note-link" data-dcnode-id="1009" data-fn-id="FN49" rel="nofollow"><sup data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">49</span></sup></span></span><div class="footnote-content" data-dcnode-id="1002"><p class="footnote-compatibility" data-dcnode-id="1003"><span data-dcnode-id="1007" instrument_node="">Lu Zhaoqian and Wang Xingwang, ‘Xinxihua zhangzheng shidai de zui guanjian zhanfa: jingque zhan’ (‘Key Battle Tactics in the Era of Informationalized Warfare: Precision Warfare’), </span><em data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Guoji Zhanwang (International Survey)</span></em><span data-dcnode-id="1004" instrument_node="">, No. 4 (2002), p. 84.</span></p></div></span></div><div class="footnote" content-id="FN50" data-dcnode-id="989"><span class="fn" data-dcnode-id="990"><span class="label fn-label" data-dcnode-id="996"><span class="end-note-link" data-dcnode-id="997" data-fn-id="FN50" rel="nofollow"><sup data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">50</span></sup></span></span><div class="footnote-content" data-dcnode-id="991"><p class="footnote-compatibility" data-dcnode-id="992"><em data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Ibid</span></em><span data-dcnode-id="993" instrument_node="">., p. 84.</span></p></div></span></div><div class="footnote" content-id="FN51" data-dcnode-id="977"><span class="fn" data-dcnode-id="978"><span class="label fn-label" data-dcnode-id="985"><span class="end-note-link" data-dcnode-id="986" data-fn-id="FN51" rel="nofollow"><sup data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">51</span></sup></span></span><div class="footnote-content" data-dcnode-id="979"><p class="footnote-compatibility" data-dcnode-id="980"><span data-dcnode-id="984" instrument_node="">Xu Hezhen, ed., </span><em data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">Revolutionary Changes in Battle</span></em><span data-dcnode-id="981" instrument_node="">, p. 221.</span></p></div></span></div><div class="footnote" content-id="FN52" data-dcnode-id="965"><span class="fn" data-dcnode-id="966"><span class="label fn-label" data-dcnode-id="973"><span class="end-note-link" data-dcnode-id="974" data-fn-id="FN52" rel="nofollow"><sup data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">52</span></sup></span></span><div class="footnote-content" data-dcnode-id="967"><p class="footnote-compatibility" data-dcnode-id="968"><span data-dcnode-id="972" instrument_node="">Lin Jianchao and Ji Wenming, </span><em data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">An Introduction to Changes in Military Technology</span></em><span data-dcnode-id="969" instrument_node="">, p. 233.</span></p></div></span></div><div class="footnote" content-id="FN53" data-dcnode-id="953"><span class="fn" data-dcnode-id="954"><span class="label fn-label" data-dcnode-id="961"><span class="end-note-link" data-dcnode-id="962" data-fn-id="FN53" rel="nofollow"><sup data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">53</span></sup></span></span><div class="footnote-content" data-dcnode-id="955"><p class="footnote-compatibility" data-dcnode-id="956"><span data-dcnode-id="960" instrument_node="">The development of laser weaponry is proceeding relatively rapidly. According to some reports, America will establish the initial phase of a land-based laser weapon system with a range of 500–2000 km sometime this year. Russia and Germany are also in the process of testing laser weaponry. As, however, none of this new technology has been tested in battle, it is difficult to estimate its defensive utility at this point in time. Electromagnetic cannons are also being developed, but are still at the research stage. For more on the development of directed-energy technology, see Xu Hezhen, ed., </span><em data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Revolutionary Changes in Battle</span></em><span data-dcnode-id="957" instrument_node="">, pp. 228–90.</span></p></div></span></div><div class="footnote" content-id="FN54" data-dcnode-id="944"><span class="fn" data-dcnode-id="945"><span class="label fn-label" data-dcnode-id="949"><span class="end-note-link" data-dcnode-id="950" data-fn-id="FN54" rel="nofollow"><sup data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">54</span></sup></span></span><div class="footnote-content" data-dcnode-id="946"><p class="footnote-compatibility" data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">These experiments all used a single anti-ballistic missile to intercept a single missile.</span></p></div></span></div><div class="footnote" content-id="FN55" data-dcnode-id="932"><span class="fn" data-dcnode-id="933"><span class="label fn-label" data-dcnode-id="940"><span class="end-note-link" data-dcnode-id="941" data-fn-id="FN55" rel="nofollow"><sup data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">55</span></sup></span></span><div class="footnote-content" data-dcnode-id="934"><p class="footnote-compatibility" data-dcnode-id="935"><span data-dcnode-id="939" instrument_node="">Yang Hua et al., ‘Meiguo fandao xitong de fazhan lishi he jishu xianzhuang’ (‘The History of the Development of the American Anti-Ballistic Missile System and its Status Today’), </span><em data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Feihang Daodan</span></em><span data-dcnode-id="936" instrument_node="">, No. 7 (2001), pp. 12–16.</span></p></div></span></div><div class="footnote" content-id="FN56" data-dcnode-id="920"><span class="fn" data-dcnode-id="921"><span class="label fn-label" data-dcnode-id="928"><span class="end-note-link" data-dcnode-id="929" data-fn-id="FN56" rel="nofollow"><sup data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">56</span></sup></span></span><div class="footnote-content" data-dcnode-id="922"><p class="footnote-compatibility" data-dcnode-id="923"><span data-dcnode-id="927" instrument_node="">Zhu Feng, </span><em data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Dandao daodan fangyu jihua yu guoji anquan (International Security and the Ballistic Missile Defense Plan)</span></em><span data-dcnode-id="924" instrument_node=""> (Shanghai Renmin Chubanshe, 2001), p. 84.</span></p></div></span></div><div class="footnote" content-id="FN57" data-dcnode-id="908"><span class="fn" data-dcnode-id="909"><span class="label fn-label" data-dcnode-id="916"><span class="end-note-link" data-dcnode-id="917" data-fn-id="FN57" rel="nofollow"><sup data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">57</span></sup></span></span><div class="footnote-content" data-dcnode-id="910"><p class="footnote-compatibility" data-dcnode-id="911"><span data-dcnode-id="915" instrument_node="">Xu Hezhen, ed., </span><em data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Revolutionary Changes in Battle</span></em><span data-dcnode-id="912" instrument_node="">, pp. 65–6.</span></p></div></span></div><div class="footnote" content-id="FN58" data-dcnode-id="893"><span class="fn" data-dcnode-id="894"><span class="label fn-label" data-dcnode-id="904"><span class="end-note-link" data-dcnode-id="905" data-fn-id="FN58" rel="nofollow"><sup data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">58</span></sup></span></span><div class="footnote-content" data-dcnode-id="895"><p class="footnote-compatibility" data-dcnode-id="896"><span data-dcnode-id="903" instrument_node="">For more on innovation in American operational theory, see Chen Yong and Yao Youzhi, </span><em data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Mianxiang xinxihua zhanzhen
