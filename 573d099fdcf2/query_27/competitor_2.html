</span></div><span data-dcnode-id="1240" instrument_node="">Analysing NATO’s Role in Afghanistan</span></h1><span data-dcnode-id="1238" instrument_node="">

</span><div class="student-disclaimer" data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">This content was originally written for an undergraduate or Master's program. It is published as part of our mission to showcase peer-leading papers written by students during their studies. This work can be used for background reading and research, but should not be cited as an expert source or used in place of scholarly articles/books.</span></div><span data-dcnode-id="1203" instrument_node="">
</span><div class="entry" data-dcnode-id="419"><span data-dcnode-id="1202" instrument_node="">
</span><div class="featured-image" data-dcnode-id="1195"><span data-dcnode-id="1201" instrument_node="">
</span><img alt="The U.S. Army" class="" data-dcnode-id="1200" height="455" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.e-ir.info/wp-content/uploads/fly-images/54191/The-U.S.-Army-807x455-c.jpg&amp;raw" srcset="https://www.e-ir.info/wp-content/uploads/fly-images/54191/The-U.S.-Army-404x228-c.jpg 404w, https://www.e-ir.info/wp-content/uploads/fly-images/54191/The-U.S.-Army-709x400-c.jpg 709w, https://www.e-ir.info/wp-content/uploads/fly-images/54191/The-U.S.-Army-709x400-c.jpg 709w" width="807"><span data-dcnode-id="1199" instrument_node=""> </span><div class="img-attribution" data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">The U.S. Army</span></div><span data-dcnode-id="1196" instrument_node="">
</span></div><span data-dcnode-id="1194" instrument_node="">
</span><div class="content -pad" data-dcnode-id="421"><span data-dcnode-id="1193" instrument_node="">
</span><div class="-in" data-dcnode-id="423"><span data-dcnode-id="1192" instrument_node="">
</span><p data-dcnode-id="1189" style="text-align: center;"><strong data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">Analysing NATO’s Role in Afghanistan: What Have Been the Key Challenges for NATO in Undertaking Crisis Management Operations? </span></strong></p><span data-dcnode-id="1188" instrument_node="">
</span><p data-dcnode-id="1180"><span data-dcnode-id="1187" instrument_node="">Assembled in Newport for the recent NATO Summit, alliance leaders spoke of their enduring commitment to Afghanistan and their determination to ensure that the state never again provides a safe-haven for terrorists.</span><a data-dcnode-id="1185" href="#_ftn1" name="_ftnref1"><span data-dcnode-id="1186" instrument_node="">[1]</span></a><span data-dcnode-id="1184" instrument_node=""> This declaration comes at seminal moment in the history of NATO’s engagement in Afghanistan, given that 2014 is the year in which its combat operations in the country draw to a close. NATO’s mission in Afghanistan, its first crisis management operation outside the Euro-Atlantic area, has been described as the Alliance’s ‘most ambitious and demanding task in its history.’</span><a data-dcnode-id="1182" href="#_ftn2" name="_ftnref2"><span data-dcnode-id="1183" instrument_node="">[2]</span></a><span data-dcnode-id="1181" instrument_node=""> This essay will analyse NATO’s crisis management operation in Afghanistan with the intent of identifying the key challenges that have faced the alliance throughout its endeavour. In doing so, it will discuss the contrasting motivations of NATO member states that led to their engagement in this operation, as well as the differing strategies employed by the troop contributing nations once deployed. It will then explore the perceived disparity between certain NATO allies with regards to the sharing of burdens and risks, both at the strategic and tactical level. Finally, it will consider the wider strategic context in an attempt to identify those issues lying beyond the realm of alliance-politics that have posed a challenge to NATO’s operations in the state.</span></p><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1166"><span data-dcnode-id="1178" instrument_node="">Following the US-led invasion of Afghanistan in October 2001 as a response to the September 2001 terrorist attacks upon the United States, the United Nations Security Council (UNSC) authorised the establishment of the International Security Assistance Force (ISAF) in December 2001. ISAF’s initial remit was ‘to assist the Afghan Interim Authority in the maintenance of security in Kabul and its surrounding areas’.</span><a data-dcnode-id="1176" href="#_ftn3" name="_ftnref3"><span data-dcnode-id="1177" instrument_node="">[3]</span></a><span data-dcnode-id="1175" instrument_node=""> NATO’s initial engagement with ISAF came in October 2002 when Germany and the Netherlands, then the nations-in-command of ISAF, requested the assistance of the alliance ‘in the areas of Force Generation, Intelligence, Co-ordination and Information Sharing, and Communications.’</span><a data-dcnode-id="1173" href="#_ftn4" name="_ftnref4"><span data-dcnode-id="1174" instrument_node="">[4]</span></a><span data-dcnode-id="1172" instrument_node=""> In August 2003, NATO assumed full command and control of ISAF, with a declared end-state objective of ‘a self-sustaining, moderate and democratic Afghan government…able to exercise its authority and to operate throughout Afghanistan.’</span><a data-dcnode-id="1170" href="#_ftn5" name="_ftnref5"><span data-dcnode-id="1171" instrument_node="">[5]</span></a><span data-dcnode-id="1169" instrument_node=""> From 2004, ISAF’s operational role began to expand beyond the Kabul region and by 2006 it covered the entirety of Afghan territory.</span><a data-dcnode-id="1167" href="#_ftn6" name="_ftnref6"><span data-dcnode-id="1168" instrument_node="">[6]</span></a></p><span data-dcnode-id="1165" instrument_node="">
</span><p data-dcnode-id="1162"><strong data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Alliance Cohesion? Motivations and Strategies</span></strong></p><span data-dcnode-id="1161" instrument_node="">
</span><p data-dcnode-id="1147"><span data-dcnode-id="1160" instrument_node="">Though it appears that NATO began operations in Afghanistan with a clearly defined objective, it is difficult to conclude that every ally has contributed to the operation with similar motivations or strategies. For instance, it has been widely suggested that a number of allies have contributed simply to satisfy the United States, in an attempt to maintain healthy relations with NATO’s most powerful member state. Alexander Mattelaer has suggested that ‘Europeans, at least by their own calculations, have hardly anything at stake in Afghanistan, apart from providing the minimum required to satisfy American expectations.’</span><a data-dcnode-id="1158" href="#_ftn7" name="_ftnref7"><span data-dcnode-id="1159" instrument_node="">[7]</span></a><span data-dcnode-id="1157" instrument_node=""> Joe Coelmont has gone as far as claiming that some European governments have ‘set an upper and lower limit for their respective contributions, which differ widely, but are all based on the same premise of doing “the minimum necessary” to maintain “good relations” with the US.’</span><a data-dcnode-id="1155" href="#_ftn8" name="_ftnref8"><span data-dcnode-id="1156" instrument_node="">[8]</span></a><span data-dcnode-id="1154" instrument_node=""> This assertion does, indeed, explain a number of issues internal to the alliance with regards to the contribution of troops and the wider debate over burden-sharing in Afghanistan, which will be discussed further below. The desire to maintain strong ties with the United States was especially pertinent for those allies that objected to the US-led invasion of Iraq in 2003, such as Belgium, France, and Germany.</span><a data-dcnode-id="1152" href="#_ftn9" name="_ftnref9"><span data-dcnode-id="1153" instrument_node="">[9]</span></a><span data-dcnode-id="1151" instrument_node=""> Though David Yost’s claim that Poland and the Baltic states committed forces to the Afghan mission in the hope of building solidarity in NATO</span><a data-dcnode-id="1149" href="#_ftn10" name="_ftnref10"><span data-dcnode-id="1150" instrument_node="">[10]</span></a><span data-dcnode-id="1148" instrument_node=""> may be more admirable, it nonetheless also has little to do with the security and prosperity of the Afghan state.</span></p><div class="advads-infeed-1-desktop" data-dcnode-id="1140" id="advads-1532968447" style="margin-bottom: 24px; "><ins class="adsbygoogle" data-ad-client="ca-pub-6827106764042735" data-ad-format="auto" data-ad-slot="" data-dcnode-id="1145" style="display:block;"></ins><span data-dcnode-id="1144" instrument_node="">
</span><span data-dcnode-id="1141" instrument_node="">
</span></div><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1138" instrument_node="">Given the competing motivations of those NATO members involved in operations in Afghanistan, it is perhaps unsurprising that there has also been a distinct lack of coherent strategy that has, arguably, hampered operational effectiveness. Fundamentally, there appears to be differing perceptions between allies as to the nature of the conflict in Afghanistan and the ways in which NATO should conduct its operations in response. More specifically, there is a debate within the alliance surrounding the apparent importance of counter-insurgency (COIN) for achieving ISAF’s goals. Though the US, UK, Canada, and Australia believe COIN should be central to ISAF’s role, states such as Germany believed that this provided an ‘inadequate operational framework for ISAF since from the government’s point of view it overstates the military dimension of the challenge provided in Afghanistan.’</span><a data-dcnode-id="1136" href="#_ftn11" name="_ftnref11"><span data-dcnode-id="1137" instrument_node="">[11]</span></a><span data-dcnode-id="1135" instrument_node=""> The German government, for obvious historical reasons as well as public opinion at home, was far more reluctant to portray its role in Afghanistan as that of war-fighting, and so it believed that ISAF should focus its efforts on stabilization and reconstruction rather than a prolonged and perilous insurgency.</span><a data-dcnode-id="1133" href="#_ftn12" name="_ftnref12"><span data-dcnode-id="1134" instrument_node="">[12]</span></a><span data-dcnode-id="1132" instrument_node=""> This strategic divide was intensified by the fact that Operation Enduring Freedom, the US-led mission in Afghanistan that focused on COIN and counter-terrorism operations, ran in parallel to the NATO ISAF mission. Consequently, ‘the two operations became increasingly blurred, as the necessity of combating a growing Taliban/Al Qaeda insurgency forced ISAF troops into more combat roles.’</span><a data-dcnode-id="1130" href="#_ftn13" name="_ftnref13"><span data-dcnode-id="1131" instrument_node="">[13]</span></a><span data-dcnode-id="1129" instrument_node=""> Once more, that the Provincial Reconstruction Teams (PRTs) working to provide security through reconstruction were developed and led on a nation-by nation basis ‘stood in the way of any consistent NATO or ISAF design.’</span><a data-dcnode-id="1127" href="#_ftn14" name="_ftnref14"><span data-dcnode-id="1128" instrument_node="">[14]</span></a></p><span data-dcnode-id="1125" instrument_node="">
</span><p data-dcnode-id="1120"><span data-dcnode-id="1124" instrument_node="">It appears evident, therefore, that divisions have existed within the alliance since the inception of NATO’s Afghan mission. Lacking motivation and a clear commitment to Afghan security, some allies have committed forces to the operation primarily to validate their close political and military relations with the United States. To make matters worse, those allies who did contribute to operations were unable to agree on a coherent strategy to be implemented by all NATO forces in Afghanistan. The debate concerning the required balance between COIN and stabilization operations has been particularly damaging for both alliance cohesion and operational effectiveness. It was argued in 2007 that the then failure to achieve a satisfactory level of security in the country resulted from ‘the coalition’s failure to develop and implement jointly a coherent strategy for Afghanistan that integrates counter-insurgency, counterterrorism and stability and reconstruction operations.’</span><a data-dcnode-id="1122" href="#_ftn15" name="_ftnref15"><span data-dcnode-id="1123" instrument_node="">[15]</span></a><span data-dcnode-id="1121" instrument_node=""> Clearly, motivations unconnected to the security situation in Afghanistan, combined with a number of competing strategies, have posed significant challenges to NATO in its conduct of this crisis management operation.</span></p><span data-dcnode-id="1119" instrument_node="">
</span><p data-dcnode-id="1116"><strong data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">Sharing Burdens and Sharing Risks</span></strong></p><span data-dcnode-id="1115" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1114" instrument_node="">Alongside disagreements over strategy, NATO’s mission in Afghanistan has been troubled by shortfalls during the force generation process. Troop contributing nations have experienced difficulty in meeting the requirements for the operation set by the alliance in its Combined Joint Statement of Requirements (CJSOR). This statement, comprised of a list of personnel and equipment necessary for the conduct of the operation, is produced by Allied Command Operations (ACO) and presented to NATO members and participating partners.</span><a data-dcnode-id="1112" href="#_ftn16" name="_ftnref16"><span data-dcnode-id="1113" instrument_node="">[16]</span></a><span data-dcnode-id="1111" instrument_node=""> However, a US Department of Defense report presented to Congress stated that in September 2010, ISAF was operating below its CJSOR level by approximately 8900 forces.</span><a data-dcnode-id="1109" href="#_ftn17" name="_ftnref17"><span data-dcnode-id="1110" instrument_node="">[17]</span></a><span data-dcnode-id="1108" instrument_node=""> General John Craddock, Supreme Allied Commander Europe 2006-09, has gone as far as to claim that ‘since mission inception, NATO nations have </span><em data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">never</span></em><span data-dcnode-id="1105" instrument_node=""> completely filled the </span><em data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">agreed</span></em><span data-dcnode-id="1102" instrument_node=""> requirements for forces needed in Afghanistan.’</span><a data-dcnode-id="1100" href="#_ftn18" name="_ftnref18"><span data-dcnode-id="1101" instrument_node="">[18]</span></a><span data-dcnode-id="1099" instrument_node=""> Indeed, the UK House of Commons Defence Select Committee expressed concern in 2007 that such shortfalls were ‘undermining NATO’s credibility and also ISAF operations.’</span><a data-dcnode-id="1097" href="#_ftn19" name="_ftnref19"><span data-dcnode-id="1098" instrument_node="">[19]</span></a><span data-dcnode-id="1096" instrument_node=""> Specific capabilities have been particularly lacking from allied contributions, namely the shortage of helicopters available for use by ISAF forces. This issue was described in 2007 as the ‘single biggest operational problem’ facing the alliance in Afghanistan by a Canadian NATO official.</span><a data-dcnode-id="1094" href="#_ftn20" name="_ftnref20"><span data-dcnode-id="1095" instrument_node="">[20]</span></a><span data-dcnode-id="1093" instrument_node=""> Given that this deficiency originated in an over-reliance on US helicopter capabilities, it is unsurprising that Robert Gates, then US Secretary of Defense, chided in 2007:</span></p><div class="advads-infeed-2-desktop" data-dcnode-id="1085" id="advads-91171943" style="margin-bottom: 22px; "><ins class="adsbygoogle" data-ad-client="ca-pub-6827106764042735" data-ad-slot="4710931000" data-dcnode-id="1090" style="display:inline-block;width:728px;height:90px;"></ins><span data-dcnode-id="1089" instrument_node="">
</span><span data-dcnode-id="1086" instrument_node="">
</span></div><span data-dcnode-id="1084" instrument_node="">
</span><blockquote data-dcnode-id="1079"><p data-dcnode-id="1080"><span data-dcnode-id="1083" instrument_node="">‘the US extended its Aviation Bridging Force in Afghanistan…because the mightiest and wealthiest military alliance in the history of the world was unable to produce 16 helicopters needed by the ISAF commander.’</span><a data-dcnode-id="1081" href="#_ftn21" name="_ftnref21"><span data-dcnode-id="1082" instrument_node="">[21]</span></a></p></blockquote><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1073"><span data-dcnode-id="1077" instrument_node="">NATO allies have also encountered disparity over the sharing of risks at the tactical level. Operational restrictions placed on deployed forces by national capitals have arguably posed one of the biggest threats to alliance unity and operational success. Crucially, these ‘caveats’ have been described by a NATO commander as having ‘the same practical effect as having fewer forces deployed.’</span><a data-dcnode-id="1075" href="#_ftn22" name="_ftnref22"><span data-dcnode-id="1076" instrument_node="">[22]</span></a><span data-dcnode-id="1074" instrument_node=""> Not only, therefore, has the Afghanistan mission been conducted with far fewer forces than the alliance has declared required, but the forces that have been deployed are of reduced utility to commanders. Caveats causing significant difficulty include those that:</span></p><span data-dcnode-id="1072" instrument_node="">
</span><blockquote data-dcnode-id="1067"><p data-dcnode-id="1068"><span data-dcnode-id="1071" instrument_node="">‘ban night-time operations, restrict the geographical mobility of national forces, require consultations with national capitals when making tactical decisions and exclude specific categories of activity.’</span><a data-dcnode-id="1069" href="#_ftn23" name="_ftnref23"><span data-dcnode-id="1070" instrument_node="">[23]</span></a></p></blockquote><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1053"><span data-dcnode-id="1065" instrument_node="">Despite being one of the largest troop contributors to the ISAF mission, Germany’s caveats have caused considerable consternation within the alliance. Identified as operating under some of the most stringent restrictions in Afghanistan, German troops were at one stage ‘required to go to great lengths to avoid confrontations with militants and are prohibited from initiating combat operations, authorised by the German government to fire only in self-defence.’</span><a data-dcnode-id="1063" href="#_ftn24" name="_ftnref24"><span data-dcnode-id="1064" instrument_node="">[24]</span></a><span data-dcnode-id="1062" instrument_node=""> The severity of such restrictions is easily explicable when one considers the lack of public support for operations in Afghanistan, yet another issue that has reduced the political will of the alliance. Polling in 2007 suggested that 57% of Germans wanted an immediate withdrawal of their nation’s troops from Afghanistan, whilst polling in 2010 indicated this figure had risen to as much as 70%.</span><a data-dcnode-id="1060" href="#_ftn25" name="_ftnref25"><span data-dcnode-id="1061" instrument_node="">[25]</span></a><span data-dcnode-id="1059" instrument_node=""> Allied unease regarding the rigidity of Germany’s caveats was amplified by the fact that the vast majority of German troops were stationed in the relatively stable North of the country, whilst other nations such as the UK, US, Canada, and Denmark had considerable deployments in ISAF Regional Commands South/Southwest and East, widely agreed to be the most unstable and volatile regions, resulting in significantly higher troop casualties and deaths.</span><a data-dcnode-id="1057" href="#_ftn26" name="_ftnref26"><span data-dcnode-id="1058" instrument_node="">[26]</span></a><span data-dcnode-id="1056" instrument_node=""> The effect of these so called ‘casualty differentials’ has been particularly straining for NATO, and Stanley Sloan suggests they could ‘leave long-term scars on the alliance.’</span><a data-dcnode-id="1054" href="#_ftn27" name="_ftnref27"><span data-dcnode-id="1055" instrument_node="">[27]</span></a></p><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1047"><span data-dcnode-id="1051" instrument_node="">The combination of NATO’s apparent inability to generate the required forces and equipment for its Afghan mission, as well as the reduced operational value of those troops deployed with caveats, appear to be the two biggest challenges the alliance has faced in the undertaking of this crisis management operation. Fundamentally, that the alliance was unable to meet the requirements of the CJSOR raises grave questions about NATO’s capacity to conduct expeditionary crisis management operations in an effective manner with sufficient forces and the necessary capabilities. There can be little doubt that the likelihood of mission success is considerably reduced if the forces deployed fall short of what the alliance itself has deemed necessary for the operation. This problem is complicated further by the number of caveats that have hindered the ability of ISAF commanders to fully utilise the (already inadequate) troops they have been assigned. Although the caveat situation improved in 2009,</span><a data-dcnode-id="1049" href="#_ftn28" name="_ftnref28"><span data-dcnode-id="1050" instrument_node="">[28]</span></a><span data-dcnode-id="1048" instrument_node=""> it nonetheless remained an issue, alongside that of the casualty differentials between the stable North and the unruly South. Regardless, NATO’s operation in Afghanistan has illuminated serious force generation and risk-sharing issues within the alliance’s response to crisis management operations.</span></p><span data-dcnode-id="1046" instrument_node="">
</span><p data-dcnode-id="1043"><strong data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Not all NATO’s fault: The Wider Strategic Context</span></strong></p><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1029"><span data-dcnode-id="1041" instrument_node="">Though this essay has focussed primarily on the intra-alliance divisions and issues that have posed a challenge for NATO’s operations in Afghanistan, it is important to consider the factors external to NATO that have complicated the alliance’s mission. One such factor is the threat to Afghan security posed by Al Qaeda and Taliban operations in the border regions of Pakistan. On being appointed Commander ISAF, General Stanley A. McChrystal remarked in his initial assessment that Al Qaeda and associates in Pakistan ‘channel foreign fighters, suicide bombers, and technical assistance into Afghanistan, and offer ideological motivation, training, and financial support.’</span><a data-dcnode-id="1039" href="#_ftn29" name="_ftnref29"><span data-dcnode-id="1040" instrument_node="">[29]</span></a><span data-dcnode-id="1038" instrument_node=""> McChrystal’s claim that Al Qaeda and similarly aligned groups were receiving support from elements of Pakistan’s Directorate for Inter-Services Intelligence (ISI)</span><a data-dcnode-id="1036" href="#_ftn30" name="_ftnref30"><span data-dcnode-id="1037" instrument_node="">[30]</span></a><span data-dcnode-id="1035" instrument_node=""> illustrates the magnitude of the threat lying on Afghanistan’s border with Pakistan. Further to this, Stanley Kober pointed out in 2012 that ‘Pakistan’s border areas are not only a sanctuary for the Taliban, they are the route by which most supplies reach NATO forces in Afghanistan.’</span><a data-dcnode-id="1033" href="#_ftn31" name="_ftnref31"><span data-dcnode-id="1034" instrument_node="">[31]</span></a><span data-dcnode-id="1032" instrument_node=""> The ability of Pakistan’s government to deal with this threat will, therefore, be a crucial factor in determining the long-term security and prosperity of the Afghan state, and a factor which, for obvious reasons, NATO as a military alliance, has little control over. The establishment of a Tripartite Commission allowing ISAF, the Afghan government, and Pakistan to discuss military and security issues, as well as the formation of the Joint Intelligence Operations Centre (JIOC) to ensure intelligence coordination, provide two examples of NATO’s efforts to support Pakistan in its counter-terrorism efforts.</span><a data-dcnode-id="1030" href="#_ftn32" name="_ftnref32"><span data-dcnode-id="1031" instrument_node="">[32]</span></a></p><div class="advads-infeed-3-desktop" data-dcnode-id="1022" id="advads-985666870" style="margin-bottom: 22px; "><ins class="adsbygoogle" data-ad-client="ca-pub-6827106764042735" data-ad-slot="4710931000" data-dcnode-id="1027" style="display:inline-block;width:728px;height:90px;"></ins><span data-dcnode-id="1026" instrument_node="">
</span><span data-dcnode-id="1023" instrument_node="">
</span></div><span data-dcnode-id="1021" instrument_node="">
</span><p data-dcnode-id="1007"><span data-dcnode-id="1020" instrument_node="">The second major issue threatening the success of the ISAF mission, particularly its reconstruction and stabilization goals, has been corruption. Throughout NATO’s engagement in Afghanistan, corruption within the Government of the Islamic Republic of Afghanistan (GIRoA) and other bodies has considerably endangered NATO’s aim of a democratic Afghan government. General John R Allen, Commander ISAF 2011-13, has described corruption as ‘the existential, strategic threat to Afghanistan’, even more so than the previously discussed threat from Pakistan-based terrorist organisations.</span><a data-dcnode-id="1018" href="#_ftn33" name="_ftnref33"><span data-dcnode-id="1019" instrument_node="">[33]</span></a><span data-dcnode-id="1017" instrument_node=""> As recently as May 2014, the NGO Integrity Watch Afghanistan (IWA) found that corruption and bribery were on the rise, whilst reporting the view widely-held by Afghan’s that ‘corruption helps the expansion of the Taliban.’</span><a data-dcnode-id="1015" href="#_ftn34" name="_ftnref34"><span data-dcnode-id="1016" instrument_node="">[34]</span></a><span data-dcnode-id="1014" instrument_node=""> This is despite various attempts by ISAF to tackle the issue of corruption, including the establishment of a US-led Task Force in 2010.</span><a data-dcnode-id="1012" href="#_ftn35" name="_ftnref35"><span data-dcnode-id="1013" instrument_node="">[35]</span></a><span data-dcnode-id="1011" instrument_node=""> As the UK House of Commons International Development Committee noted in 2012, ‘corruption is a growing threat not only to the effectiveness of international assistance but also the legitimacy of the state…and ultimately the long term viability of the Government.’</span><a data-dcnode-id="1009" href="#_ftn36" name="_ftnref36"><span data-dcnode-id="1010" instrument_node="">[36]</span></a><span data-dcnode-id="1008" instrument_node=""> Given that NATO’s success in Afghanistan will be evaluated by the enduring stability of Kabul’s democratic institutions, it is no doubt concerning for the alliance that growing corruption has the potential to reverse the already precarious advances in security made by ISAF forces.</span></p><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1003"><strong data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Conclusions on NATO’s Afghan Mission</span></strong></p><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="995"><span data-dcnode-id="1001" instrument_node="">Though ISAF’s combat operations are terminate at the end of 2014, this does not signify the end of NATO’s engagement in Afghanistan. 12000 troops from NATO and partner nations will remain in Afghanistan for the foreseeable future as part of a ‘train, advise, assist’ mission to ensure that Afghan security institutions remain capable of delivering their own security and responding to the threat of terrorism. As of December 2014, force generation for this operation is underway.</span><a data-dcnode-id="999" href="#_ftn37" name="_ftnref37"><span data-dcnode-id="1000" instrument_node="">[37]</span></a><span data-dcnode-id="998" instrument_node=""> It remains to be seen whether the alliance will meet the force generation requirements set out for this new operation. Though NATO’s post-2014 mission in Afghanistan will not entail combat operations and so is difficult to compare to the ISAF operation, it is important to remember that the majority of the challenges posed by the Afghan crisis-management operation are by no means unique to this mission. The debate over burden sharing has existed for nearly as long as the alliance itself, initially regarding defence expenditure but more recently (in the post-Cold War era) concerning material-contributions to crisis management operations. Caveats are almost a fact of life in NATO operations, and featured most recently in Operation Unified Protector, the alliance’s air campaign over Libya.</span><a data-dcnode-id="996" href="#_ftn38" name="_ftnref38"><span data-dcnode-id="997" instrument_node="">[38]</span></a></p><span data-dcnode-id="994" instrument_node="">
</span><p data-dcnode-id="989"><span data-dcnode-id="993" instrument_node="">Regardless of this fact, it is clear that these issues have posed significant challenges for NATO in Afghanistan, arguably more so than in any of the alliance’s other crisis management operations. A number of allies contributed to the operation despite the fact that they were more motivated by alliance politics than a strong commitment to Afghan security. This, in turn, resulted in the alliance’s inability to meet its force requirements for the operation, exacerbated by the restrictive nature of some alliance member’s caveats. Put simply, NATO’s Afghan operation suffered from a distinct lack of alliance cohesion. As Auerswald and Saideman put it, ‘the alliance’s behaviour reflected more a series of decisions by individual member states and less a coordinated design by a multilateral organisation.’</span><a data-dcnode-id="991" href="#_ftn39" name="_ftnref39"><span data-dcnode-id="992" instrument_node="">[39]</span></a><span data-dcnode-id="990" instrument_node=""> Lacking a cohesive strategy, the allies were unable to properly share the burdens or risks that the operation entailed. It is perhaps too soon to assess operational success, especially given the continuing threats posed by Pakistan-based terrorists and Afghan-wide corruption. Nonetheless, it is clear that NATO must learn from the mistakes made in Afghanistan to ensure that it is a capable actor in the realm of crisis management for the future.</span></p><span data-dcnode-id="988" instrument_node="">
