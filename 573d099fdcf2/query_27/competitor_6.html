</span><h1 class="fs-huge" data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">NATO’s response to hybrid threats </span></h1><span data-dcnode-id="1200" instrument_node="">
</span><ul class="list-meta" data-dcnode-id="1190"><span data-dcnode-id="1199" instrument_node="">
</span><li data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Last updated: 16 Mar. 2021 16:21</span></li><span data-dcnode-id="1196" instrument_node="">
</span><li class="last" data-dcnode-id="1192"><span data-dcnode-id="1195" instrument_node="">
</span><span class="icon icon-print" data-dcnode-id="1194"></span><span data-dcnode-id="1193" instrument_node="">
</span></li><span data-dcnode-id="1191" instrument_node="">
</span></ul><span data-dcnode-id="1189" instrument_node="">
</span><ul class="list-i18n" data-dcnode-id="1166"><span data-dcnode-id="1188" instrument_node="">
</span><li data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">English</span></li><span data-dcnode-id="1185" instrument_node="">
</span><li data-dcnode-id="1180"><span data-dcnode-id="1184" instrument_node="">
</span><a data-dcnode-id="1182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natohq/topics_156338.htm%3FselectedLocale%3Dfr"><span data-dcnode-id="1183" instrument_node="">French</span></a><span data-dcnode-id="1181" instrument_node="">
</span></li><span data-dcnode-id="1179" instrument_node="">
</span><li data-dcnode-id="1174"><span data-dcnode-id="1178" instrument_node="">
</span><a data-dcnode-id="1176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natohq/topics_156338.htm%3FselectedLocale%3Dru"><span data-dcnode-id="1177" instrument_node="">Russian</span></a><span data-dcnode-id="1175" instrument_node="">
</span></li><span data-dcnode-id="1173" instrument_node="">
</span><li data-dcnode-id="1168"><span data-dcnode-id="1172" instrument_node="">
</span><a data-dcnode-id="1170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natohq/topics_156338.htm%3FselectedLocale%3Duk"><span data-dcnode-id="1171" instrument_node="">Ukrainian</span></a><span data-dcnode-id="1169" instrument_node="">
</span></li><span data-dcnode-id="1167" instrument_node="">
</span></ul><span data-dcnode-id="1165" instrument_node="">
</span><div class="socialbar" data-dcnode-id="1155"><span data-dcnode-id="1164" instrument_node="">
</span><span data-dcnode-id="1162" instrument_node="">
</span><a class="icon icon-facebook" data-dcnode-id="1161" data-utm-medium="smcweb" data-utm-source="facebook" href="#"></a><span data-dcnode-id="1160" instrument_node="">
</span><a class="icon icon-twitter" data-dcnode-id="1159" data-utm-medium="smcweb" data-utm-source="twitter" href="#"></a><span data-dcnode-id="1158" instrument_node="">
</span><a class="icon icon-linkedin" data-dcnode-id="1157" data-utm-medium="smcweb" data-utm-source="linkedin" href="#"></a><span data-dcnode-id="1156" instrument_node="">
</span></div><span data-dcnode-id="1154" instrument_node=""> </span><span data-dcnode-id="1152" instrument_node="">
</span><section class="content cf" data-dcnode-id="1001"><span data-dcnode-id="1151" instrument_node="">
</span><p class="introtxt" data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">Hybrid methods of warfare, such as propaganda, deception, sabotage and other non-military tactics have long been used to destabilise adversaries. What is new about attacks seen in recent years is their speed, scale and intensity, facilitated by rapid technological change and global interconnectivity. NATO has a strategy on its role in countering hybrid warfare and stands ready to defend the Alliance and all Allies against any threat, whether conventional or hybrid.</span></p><span data-dcnode-id="1148" instrument_node="">
</span><div class="box box-media box-media--stretched" data-dcnode-id="1139"><span data-dcnode-id="1147" instrument_node="">
</span><span data-dcnode-id="1145" instrument_node="">
</span><img alt="Press point by NATO Secretary General Jens Stoltenberg on occasion of the inauguration of the European Centre of Excellence (CoE) for Countering Hybrid Threats" data-dcnode-id="1144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/nato_static_fl2014/assets/pictures/2017_10_171002a-trip-sg-finland/20171002_171002a-008_rdax_775x440s.jpg&amp;raw"><span data-dcnode-id="1143" instrument_node="">
</span><p data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">NATO Secretary General Jens Stoltenberg at the inauguration of the European Centre of Excellence (CoE) for Countering Hybrid Threats (Finland, 2 October 2017)</span></p><span data-dcnode-id="1140" instrument_node="">
</span></div><span data-dcnode-id="1138" instrument_node="">
</span><div data-dcnode-id="1106"><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1134" instrument_node="">
</span><div class="box--highlight" data-dcnode-id="1108"><span data-dcnode-id="1133" instrument_node="">
</span><h3 data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Highlights</span></h3><span data-dcnode-id="1130" instrument_node="">
</span><ul data-dcnode-id="1110"><span data-dcnode-id="1129" instrument_node="">
</span><li data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">The primary responsibility to respond to hybrid threats or attacks rests with the targeted nation.</span></li><span data-dcnode-id="1126" instrument_node="">
</span><li data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">NATO is prepared to assist any Ally against hybrid threats as part of collective defence. The Alliance has developed a strategy on its role in countering hybrid warfare to help address these threats.</span></li><span data-dcnode-id="1123" instrument_node="">
</span><li data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">In July 2018, NATO leaders agreed to set up counter-hybrid support teams, which provide tailored targeted assistance to Allies upon their request, in preparing against and responding to hybrid activities.</span></li><span data-dcnode-id="1120" instrument_node="">
</span><li data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">NATO is strengthening its coordination with partners, including the European Union, in efforts to counter hybrid threats.</span></li><span data-dcnode-id="1117" instrument_node="">
</span><li data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">NATO’s Joint Intelligence and Security Division has a hybrid analysis branch that helps improve situational awareness.</span></li><span data-dcnode-id="1114" instrument_node="">
</span><li data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">The Alliance actively counters propaganda – not with more propaganda, but with facts – online, on air and in print.</span></li><span data-dcnode-id="1111" instrument_node="">
</span></ul><span data-dcnode-id="1109" instrument_node="">
</span></div><span data-dcnode-id="1107" instrument_node="">
</span></div><span data-dcnode-id="1105" instrument_node="">
</span><div class="accordion-wrapper" data-dcnode-id="1081"><span data-dcnode-id="1104" instrument_node="">
</span><ul class="accordion" data-dcnode-id="1083"><span data-dcnode-id="1103" instrument_node="">
</span><li data-dcnode-id="1085"><span data-dcnode-id="1102" instrument_node="">
</span><h2 data-dcnode-id="1098"><a data-dcnode-id="1099" href="#"><span class="icon icon-arrow_accordion" data-dcnode-id="1101"></span><span data-dcnode-id="1100" instrument_node="">What are the hybrid threats NATO faces?</span></a></h2><span data-dcnode-id="1097" instrument_node="">
</span><div class="accordion-content" data-dcnode-id="1088"><span data-dcnode-id="1096" instrument_node="">
</span><div class="inner-content" data-dcnode-id="1090"><p data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">Hybrid threats combine military and non-military as well as covert and overt means, including disinformation, cyber attacks, economic pressure, deployment of irregular armed groups and use of regular forces. Hybrid methods are used to blur the lines between war and peace, and attempt to sow doubt in the minds of target populations. They aim to destabilise and undermine societies.</span></p><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">The speed, scale and intensity of hybrid threats have increased in recent years. Being prepared to prevent, counter and respond to hybrid attacks, whether by state or non-state actors, is a top priority for NATO.</span></p></div><span data-dcnode-id="1089" instrument_node="">
</span></div><span data-dcnode-id="1086" instrument_node="">
</span></li><span data-dcnode-id="1084" instrument_node="">
</span></ul><span data-dcnode-id="1082" instrument_node="">
</span></div><span data-dcnode-id="1080" instrument_node="">
</span><div class="accordion-wrapper" data-dcnode-id="1034"><span data-dcnode-id="1079" instrument_node="">
</span><ul class="accordion" data-dcnode-id="1036"><span data-dcnode-id="1078" instrument_node="">
</span><li data-dcnode-id="1038"><span data-dcnode-id="1077" instrument_node="">
</span><h2 data-dcnode-id="1073"><a data-dcnode-id="1074" href="#"><span class="icon icon-arrow_accordion" data-dcnode-id="1076"></span><span data-dcnode-id="1075" instrument_node="">NATO’s strategy: prepare, deter, defend</span></a></h2><span data-dcnode-id="1072" instrument_node="">
</span><div class="accordion-content" data-dcnode-id="1041"><span data-dcnode-id="1071" instrument_node="">
</span><div class="inner-content" data-dcnode-id="1043"><p data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Since 2015, NATO has had a strategy on its role in countering hybrid warfare. NATO will ensure that the Alliance and Allies are sufficiently prepared to counter hybrid attacks in whatever form they may materialise. It will deter hybrid attacks on the Alliance and, if necessary, will defend Allies concerned.</span></p><span data-dcnode-id="1068" instrument_node="">
</span><p data-dcnode-id="1063"><strong data-dcnode-id="1065"><em data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">To be prepared</span></em></strong><span data-dcnode-id="1064" instrument_node="">, NATO continuously gathers, shares and assesses information in order to detect and attribute any ongoing hybrid activity. The Joint Intelligence and Security Division at NATO Headquarters improves the Alliance’s understanding and analysis of hybrid threats. The hybrid analysis branch provides decision-makers with improved awareness on possible hybrid threats.</span></p><span data-dcnode-id="1062" instrument_node="">
</span><p data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">The Alliance supports Allies’ efforts to identify national vulnerabilities and strengthen their own resilience, if requested. NATO also serves as a hub for expertise, providing support to Allies in areas such as civil preparedness and chemical, biological, radiological and nuclear (CBRN) incident response; critical infrastructure protection; strategic communications; protection of civilians; cyber defence; energy security; and counter-terrorism.</span></p><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Training, exercises and education also play a significant role in preparing to counter hybrid threats. This includes exercising of decision–making processes and joint military and non-military responses in cooperation with other actors.</span></p><span data-dcnode-id="1056" instrument_node="">
</span><p data-dcnode-id="1051"><strong data-dcnode-id="1053"><em data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">To deter hybrid threats</span></em></strong><span data-dcnode-id="1052" instrument_node="">, NATO is resolved to act promptly, whenever and wherever necessary. It continues to increase the readiness and preparedness of its forces, and has strengthened its decision-making process and its command structure as part of its deterrence and defence posture. This sends a strong signal that the Alliance is improving both its political and military responsiveness and its ability to deploy appropriate forces to the right place at the right time.</span></p><span data-dcnode-id="1050" instrument_node="">
</span><p data-dcnode-id="1044"><span data-dcnode-id="1049" instrument_node="">If deterrence should fail, NATO stands ready&nbsp;</span><strong data-dcnode-id="1046"><em data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">to defend any Ally against any threat</span></em></strong><span data-dcnode-id="1045" instrument_node="">. To this end, NATO forces have to be able to react in a quick and agile way, whenever and wherever needed.</span></p></div><span data-dcnode-id="1042" instrument_node="">
</span></div><span data-dcnode-id="1039" instrument_node="">
</span></li><span data-dcnode-id="1037" instrument_node="">
</span></ul><span data-dcnode-id="1035" instrument_node="">
</span></div><span data-dcnode-id="1033" instrument_node="">
</span><div class="accordion-wrapper" data-dcnode-id="1003"><span data-dcnode-id="1032" instrument_node="">
</span><ul class="accordion" data-dcnode-id="1005"><span data-dcnode-id="1031" instrument_node="">
</span><li data-dcnode-id="1007"><span data-dcnode-id="1030" instrument_node="">
</span><h2 data-dcnode-id="1026"><a data-dcnode-id="1027" href="#"><span class="icon icon-arrow_accordion" data-dcnode-id="1029"></span><span data-dcnode-id="1028" instrument_node="">Cooperation beyond NATO</span></a></h2><span data-dcnode-id="1025" instrument_node="">
</span><div class="accordion-content" data-dcnode-id="1010"><span data-dcnode-id="1024" instrument_node="">
</span><div class="inner-content" data-dcnode-id="1012"><p data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">NATO can’t counter hybrid threats alone.&nbsp; Cooperation with partners is essential.&nbsp; The Alliance continues to strengthen its cooperation and coordination with such partners as Finland, Sweden, Ukraine and the European Union (EU) to counter hybrid threats and enhance resilience. As part of their increasingly closer cooperation, NATO and the EU have stepped up their cooperation on dealing with hybrid threats, with a special focus on countering cyber attacks.&nbsp; NATO is also engaging with partners in the Asia-Pacific region to exchange experience on national approaches to countering hybrid threats, such as increased incidence of disinformation and cyber attacks.&nbsp; This has been particularly valuable in the context of the COVID-19 pandemic.</span></p><span data-dcnode-id="1021" instrument_node="">
</span><p data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">In addition, Centres of Excellence work alongside and contribute knowledge and expertise to the Alliance. They are international research centres that are nationally or multi-nationally funded and staffed.</span></p><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">The European Centre of Excellence for Countering Hybrid Threats located in Helsinki, Finland serves as a hub of expertise, assisting participating countries in improving their civil-military capabilities, resilience and preparedness to counter hybrid threats. It was inaugurated in October 2017 by NATO Secretary General Jens Stoltenberg, together with European Union High Representative for Foreign Affairs and Security Policy/Vice-President of the European Commission Federica Mogherini. The Centre is an initiative of the Government of Finland, supported by 27 other nations, as well as NATO and the EU.</span></p><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Other Centres of Excellence contribute to NATO’s efforts to counter hybrid threats, including the Strategic Communications Centre of Excellence in Riga, Latvia; the Cooperative Cyber Defence Centre of Excellence in Tallinn, Estonia; and the Energy Security Centre of Excellence in Vilnius, Lithuania.</span></p></div><span data-dcnode-id="1011" instrument_node="">
</span></div><span data-dcnode-id="1008" instrument_node="">
</span></li><span data-dcnode-id="1006" instrument_node="">
</span></ul><span data-dcnode-id="1004" instrument_node="">
</span></div><span data-dcnode-id="1002" instrument_node="">
