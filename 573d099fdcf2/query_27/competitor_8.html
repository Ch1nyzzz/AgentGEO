</span><p data-dcnode-id="1624"><span data-dcnode-id="1628" instrument_node="">Although there are differences in mandate and impact among the multilateral instruments (MLIs) backed by Russia and China, all of them seek to strengthen the national economic and political position of their sponsor nation. While much of the investment is targeted for economic development, these banks are also tools for advancing Russian and Chinese national interests. It is also clear that both Russia and China are seeking to gain influence in Europe. So far, China has been particularly successful at leveraging MLIs to influence European states. By engaging with EU members and Western Balkan states through the 16+1 format—a China-initiated platform to expand state-level cooperation—and mostly negotiating at the bilateral level instead of at the multilateral or EU-wide levels, China has been able to directly compete with and edge out Europe.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1625" tooltip=""><sup data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">74</span></sup></a></p><span data-dcnode-id="1623" instrument_node="">
</span><p data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">The Western Balkans—a critical region for NATO and the EU—have been a particular focus for high levels of Chinese investment, reducing the influence and leverage of the EU. China now acts as a de facto alternative to the EU and its demands for tough reforms prior to accession, threatening ongoing reform processes and the region’s turn toward Europe. The Balkans are now at a geopolitical crossroads.</span></p><span data-dcnode-id="1620" instrument_node="">
</span><p data-dcnode-id="1614"><span data-dcnode-id="1619" instrument_node="">Growing economic ties to China have led to softening political stances toward China for some EU member states, as Europe more broadly struggles to develop a common approach toward the country on issues such as trade, foreign direct investment, and 5G.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1616" tooltip=""><sup data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">75</span></sup></a><span data-dcnode-id="1615" instrument_node=""> Although Russia lacks the financial capital to economically engage on the same level as China, legacy ties with the Soviet Union as well as common Slavic identity provide a variety of avenues for Russia to influence and compete with the EU and NATO.</span></p><span data-dcnode-id="1613" instrument_node="">
</span><p data-dcnode-id="1600"><span data-dcnode-id="1612" instrument_node="">From a defense perspective, an ongoing dependence on Soviet-era equipment for Central and Eastern European states is a real vulnerability for NATO in the Western Balkans.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1609" tooltip=""><sup data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">76</span></sup></a><span data-dcnode-id="1608" instrument_node=""> A key potential concern is if Russia and China were to provide financing and advantageous offers to countries seeking to recapitalize their defense forces. European states, particularly those that lack capital or might not be approved by existing mechanisms, may be tempted to take advantage of the credit or funds offered, even if they were tied to strategic adversaries. In the past decade, for example, Turkey turned to China and Russia in an effort to modernize its air and missile defense systems with its acquisition of the S-400 air defense system.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1605" tooltip=""><sup data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">77</span></sup></a><span data-dcnode-id="1604" instrument_node=""> In Serbia, Russia has sought to maintain strong defense ties, helping the country modernize its fleet through the acquisition of additional MiG fighter jets.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1601" tooltip=""><sup data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">78</span></sup></a></p><span data-dcnode-id="1599" instrument_node="">
</span><p data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">As the proliferation of infrastructure-focused banks attest, setting up such institutions is not difficult. It also demonstrates that demand exists within Europe for such financing.</span></p><span data-dcnode-id="1596" instrument_node="">
</span></div><span data-dcnode-id="1594" instrument_node="">
</span><div class="chapter1" data-dcnode-id="1590"><span data-dcnode-id="1593" instrument_node="">
</span><div class="chapter1-target" data-dcnode-id="1592" id="recommendations-13" title="Recommendations"></div><span data-dcnode-id="1591" instrument_node="">
</span></div><span data-dcnode-id="1589" instrument_node="">
</span><div class="-mt:1 -xw:4 -mx:a" data-dcnode-id="1584"><span data-dcnode-id="1588" instrument_node="">
</span><h2 class="-t:3" data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">Recommendations</span></h2><span data-dcnode-id="1585" instrument_node="">
</span></div><span data-dcnode-id="1583" instrument_node="">
</span><div class="wysiwyg -xw:4 -mx:a" data-dcnode-id="1465"><span data-dcnode-id="1582" instrument_node="">
</span><p data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">There is a clear need for NATO to have greater access to resources to address gaps in capabilities, finance important alliancewide initiatives, ensure that it can rely on critical infrastructure, expand its influence, and compete with outside powers operating investment banks both within NATO and in regions vital to its core missions. To meet these goals, NATO must create its own bank. There are also clear gaps in the alliance’s existing defense financing instruments and institutions. A NATO bank would therefore complement, not compete, with these existing efforts and institutions. There is not a single MLI in existence that has the mandate to invest in defense and security. With this clear gap in the market, reducing conflict with other MLI mandates should be relatively straightforward. All of these deficiencies point to the need for NATO to create its own financial mechanism.</span></p><span data-dcnode-id="1579" instrument_node="">
</span><h4 data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">Creating a NATO bank</span></h4><span data-dcnode-id="1576" instrument_node="">
</span><p data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">Fortunately, there is plenty of precedent for NATO to follow when considering how to establish a multilateral bank. While creating a bank may be unfamiliar ground for the formation, a NATO bank would emulate the setup and arrangements of myriad existing MLIs. The World Bank, European Bank for Reconstruction and Development (EBRD), and Chinese-led AIIB are all examples of MLIs that raise capital using a range of debt instruments. NATO would not have to chart new ground in the formation or structure of the bank.</span></p><span data-dcnode-id="1573" instrument_node="">
</span><p data-dcnode-id="1569"><strong data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">Capitalize the bank.</span></strong><span data-dcnode-id="1570" instrument_node=""> To set up the bank, allies would make an initial investment. This could be done by simply mirroring the way in which NATO member states make contributions to organizations such as the World Bank and European Investment Bank. The amount that NATO member states are obliged to contribute could be determined proportionally by GDP, which is often how national contributions are determined in other multilateral organizations.</span></p><span data-dcnode-id="1568" instrument_node="">
</span><p data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">The amount of capital the bank would need to hold in liquid reserves would be a small percentage of its overall lending portfolio. In other words, for the bank to lend $10 billion, a NATO bank may only need to hold $1.5 billion in reserves. That $1.5 billion in reserves would accumulate over a number of years. In the bank’s startup phase, it would build its liquidity base by collecting investments from allies over a multiyear period. Once the bank is capitalized, however, it could become self-sustaining.</span></p><span data-dcnode-id="1565" instrument_node="">
</span><p data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">NATO members that contribute to capitalizing the bank could also have this counted toward their 2 percent pledge. For some allies, contributing to an alliancewide fund may be more palatable and popular than increasing domestic spending. Additionally, the contributions to the bank would not be “payments” but rather amount to an investment, as the bank will provide loans to be paid back. Additionally, larger nations such as the United States, Germany, France, and the United Kingdom would not only benefit from the return from interest payments but also the increased investment in defense spurring increased demand for their defense industries. While the United States is the largest arms supplier in the world, European countries have increased production and export efforts, with France, Germany, the United Kingdom, and Spain all falling in the top eight global arms exporters.</span></p><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">The United States would make its contribution to the bank through the same mechanisms that it contributes to other multinational organizations such as the United Nations, IMF, or World Bank. To contribute to the NATO bank, Congress would likely need to increase the overall budget allocations going to multilateral institutions. But the Biden administration may also be able to shift liquidity allocations to provide the bank’s startup capital without actually requiring an additional appropriation from Congress.</span></p><span data-dcnode-id="1559" instrument_node="">
</span><p data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">Once established, the bank would likely be able to reinvest its returns. The objective of the bank would not be to profit but to reduce costs for its lenders. Nevertheless, even low-interest-rate loans will bring back returns. In other words, NATO as an organization could become self-sustaining.</span></p><span data-dcnode-id="1556" instrument_node="">
</span><p data-dcnode-id="1543"><span data-dcnode-id="1555" instrument_node="">Even this capitalization might not be necessary, however, as a NATO bank would likely have a AAA credit rating, and there is precedent for AAA-rated multilateral banks and institutions borrowing without any liquidity in the bank. Instead, they are deemed creditworthy because these institutions would be able, if necessary, to access the cash needed to pay their debts. For instance, the EU established the European Stability Mechanism (ESM) following the 2008 financial crisis. Even without capitalizing the ESM, it was able to provide low-cost financing to Ireland</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1552" tooltip=""><sup data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">79</span></sup></a><span data-dcnode-id="1551" instrument_node=""> and Portugal</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1548" tooltip=""><sup data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">80</span></sup></a><span data-dcnode-id="1547" instrument_node=""> in 2011. The ESM was able to borrow billions due to its AAA status and all of the guarantees from the other Eurozone nations being “callable,” rather than any one nation actually paying in cash.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1544" tooltip=""><sup data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">81</span></sup></a></p><span data-dcnode-id="1542" instrument_node="">
</span><p data-dcnode-id="1536"><span data-dcnode-id="1541" instrument_node="">Therefore, key for NATO in attracting a set of institutional investors would be achieving a AAA credit rating, much like the EBRD, Inter-American Development Bank, and likely the European Commission’s upcoming credit lines to help member states recover from the COVID-19 pandemic. This would enable inexpensive, low-interest loans to finance critical alliance efforts. These rates would likely decrease over time as investors gain confidence in the bank’s ability to repay loans. NATO should also be encouraged by the bond market’s reaction to the recent EU decision to issue debt on the capital markets for the first time.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1538" tooltip=""><sup data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">82</span></sup></a><span data-dcnode-id="1537" instrument_node=""> Investors view EU debt as extremely safe, which means they are likely to view NATO similarly.</span></p><span data-dcnode-id="1535" instrument_node="">
</span><p data-dcnode-id="1531"><strong data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">Headquarter the bank in London. </span></strong><span data-dcnode-id="1532" instrument_node="">The NATO bank could establish its office in London, a NATO member capital and a global financial hub just a short train ride from NATO headquarters in Brussels. With tensions between the United Kingdom and other EU NATO members growing from Brexit, and concerns that this could impact the security relationship, placing a NATO bank in London could help reaffirm the United Kingdom’s commitment to NATO and European security.</span></p><span data-dcnode-id="1530" instrument_node="">
</span><p data-dcnode-id="1526"><strong data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">Set up a robust governance structure.</span></strong><span data-dcnode-id="1527" instrument_node=""> Importantly, NATO member states would retain full authority over the governance of the institution. The bank would be set up with similar guardrails and standards that other lending institutions follow. It would need to put in place thorough due diligence practices to ensure that funds are being allocated and used in line with the bank’s principles. The money would have to be used to benefit NATO, whether that means meeting the formation’s capability targets, investing in new defense and security technologies, or supporting infrastructure to directly benefit military mobility. The management of the bank would have to have project screening and verification teams to ensure that loans are spent in line with the mandate of the entity agreed by member states and allies. If MLIs break their covenants, then they risk their AAA rating. Project management is therefore critical to the functioning of the bank.</span></p><span data-dcnode-id="1525" instrument_node="">
</span><p data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">A governance structure would also be needed and, uniquely for NATO, such a governance body or board of directors should be formed by allied finance ministers. To maintain a AAA rating, markets and credit agencies would likely insist that government finance professionals take on the governance role, which is standard practice for other MLIs. This would also have the benefit of engaging finance ministers in NATO efforts, improving cooperation at the European level, and enabling governments to see the impact of their investments in the alliance firsthand.</span></p><span data-dcnode-id="1522" instrument_node="">
</span><p data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">Importantly, the NATO bank does not need all members to participate in its governance or for all members to join. Additionally, once the bank is established, NATO could consider allowing major non-NATO allies to participate in the bank. A country such as Sweden—a Partnership for Peace member that previously participated in NATO-led missions—that has both excellent borrowing rates and a robust defense industry may seek to participate.</span></p><span data-dcnode-id="1519" instrument_node="">
</span><p data-dcnode-id="1515"><strong data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">Attract borrowers.</span></strong><span data-dcnode-id="1516" instrument_node=""> A major question with the NATO bank is whether countries will borrow from it. However, there are strong reasons to believe that the NATO bank will be in demand.</span></p><span data-dcnode-id="1514" instrument_node="">
</span><p data-dcnode-id="1508"><span data-dcnode-id="1513" instrument_node="">The rates the bank would offer would likely be much lower than many allies could achieve through their own sovereign cost of capital. A NATO bank would leverage the creditworthiness of its wealthier members to provide low-cost financing to its less-wealthy members. For instance, countries such as Germany are borrowing at negative rates, while the rate for NATO members such as Romania is significantly higher; long-term interest rates on German debt are less than 0.5 percent, while for Romania they are greater than 3 percent.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1510" tooltip=""><sup data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">83</span></sup></a><span data-dcnode-id="1509" instrument_node=""> This could mean that roughly half of the member states would get a better borrowing rate than they would on the open market. Banks often help create markets: If you build a bank, as history has shown, borrowers will come.</span></p><span data-dcnode-id="1507" instrument_node="">
</span><p data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">A major focus of the bank’s lending should be targeted at providing financing to retire and replace the Soviet-Russian equipment used by NATO’s Eastern members. Many of these countries are quite concerned about the state of their militaries but simply lack the resources or access to financing to engage in a major recapitalization effort. Budgetary constraints from COVID-19 may worsen their financial situation, making these members hard-pressed to make significant new investments. However, these countries need more access to financing, not less. Low-cost financing tied to defense could serve to incentivize these countries not to cut defense spending.</span></p><span data-dcnode-id="1504" instrument_node="">
</span><p data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">Additionally, the United States and other wealthier NATO members could further incentivize countries to make acquisitions. The United States, for instance, has increased its grant security assistance to Eastern Europe. This funding could be directly tied to helping countries make acquisitions. Additionally, the defense companies benefiting from these acquisitions could offer additional “offsets” to the purchaser, whereby some of the production of the weapons system is done in the recipient country. Therefore, some of the outflow of resources would actually be reinvested into the purchaser’s own country through the creation of jobs and plants.</span></p><span data-dcnode-id="1501" instrument_node="">
</span><p data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">A NATO bank should also encourage joint procurements and could help coordinate recapitalization efforts. For instance, instead of each state buying separately, NATO could help encourage countries to make joint acquisitions, as buying in bulk lowers cost and, critically, would increase interoperability across nations.</span></p><span data-dcnode-id="1498" instrument_node="">
</span><p data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">Lastly, the United States and other NATO members would use their diplomatic clout to press nations to take advantage. Instead of aggressively badgering about 2 percent, the United States would press countries to take advantage of these low-interest loans. At the summit announcing the bank, former Warsaw Pact NATO members should also commit to using the bank and engaging in a bold and ambitious effort to retire and replace aging Soviet-Russian equipment.</span></p><span data-dcnode-id="1495" instrument_node="">
</span><p data-dcnode-id="1491"><strong data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">Empower the bank to make technology investments.</span></strong><span data-dcnode-id="1492" instrument_node=""> The bank would also focus on financing new initiatives and research and development efforts that could prove critical to the alliance. This will require NATO headquarters to work seamlessly with a NATO bank in London. The NATO bank should also seek to work closely alongside the EU’s efforts to spur investment in new defense initiatives. The bank managers with NATO headquarters would have to draw up requests for proposals, carefully vet applicants and their proposals, and then set clear goals and benchmarks. Such investments could not only help develop new technology critical to the alliance but also could help spur technological innovation, especially in Europe. For instance, a NATO bank could invest in 5G across the region. This would clearly have a dual-use function—civilian and military—and help ensure that NATO is not dependent on Chinese communications technology.</span></p><span data-dcnode-id="1490" instrument_node="">
</span><p data-dcnode-id="1486"><strong data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">Emphasize investments in dual-use infrastructure. </span></strong><span data-dcnode-id="1487" instrument_node="">A top immediate priority for the bank should be encouraging investments and upgrades in dual-use infrastructure vital to the defense of the alliance. Prior to COVID-19, the new European Commission had made this area a priority for increased spending in its seven-year budget. However, following the onset of the pandemic, many countries have cut their defense funding. A NATO bank could help bridge this gap by encouraging members to take advantage of the bank to make investments in dual-use infrastructure. NATO also should set priorities for what it wants to fund. Every project would likely be structured differently, with the amount of NATO financing varying depending on the situation.</span></p><span data-dcnode-id="1485" instrument_node="">
</span><p data-dcnode-id="1473"><strong data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">Make the NATO bank a flexible tool. </span></strong><span data-dcnode-id="1482" instrument_node="">While there are plenty of projects for a NATO bank to undertake in the present, there are also many ways the bank can be utilized in the future. For instance, if a crisis were to strike, a NATO bank could be called on to help finance front-line member states. If the alliance were to engage in out-of-area operations, the bank could be used to help members finance those deployments. If NATO were to engage in another Libya-style operation, a NATO bank could help finance reconstruction efforts after the conflict.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1479" tooltip=""><sup data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">84</span></sup></a><span data-dcnode-id="1478" instrument_node=""> If the formation discovered that it urgently needed to acquire a new capability, it could call on the bank to help finance such an effort. For example, following the use of improvised explosive devices by insurgents,</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1475" tooltip=""><sup data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">85</span></sup></a><span data-dcnode-id="1474" instrument_node=""> the U.S. military quickly sought to develop and procure vehicles with V-shaped hulls that could better deflect blasts and subsequently rushed into the production of MRAP vehicles.</span></p><span data-dcnode-id="1472" instrument_node="">
</span><p data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">A NATO bank therefore provides the alliance with a vehicle to quickly invest significant resources without unduly relying on the United States. It could help share the financial responsibility for maintaining and upholding the alliance, which has historically fallen on the shoulders of the United States. And while the United States has benefited immensely from having a thriving alliance, it is also important for other financially capable members to do their part to hold up the organization financially. This has historically centered on spending more on defense and reaching the 2 percent benchmark. But making investments in alliancewide priorities through a NATO bank might very well be more important to the alliance overall than small upticks in domestic defense spending. A NATO bank should therefore be part of the effort to move beyond discussions of the arbitrary and now-divisive issue of 2 percent defense spending.</span></p><span data-dcnode-id="1469" instrument_node="">
</span><p data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">A bank is therefore a tool for the alliance to augment its efforts, fill gaps, and make critical investments. A bank will not solve every problem or fill every gap, result in the recapitalization of former Warsaw Pact member forces, or instantly solve NATO’s mobility problems. But it will provide the formation with a useful tool to help solve these problems and provide an initiative to make progress in filling gaps and addressing shortfalls. Ultimately, the bank could also grow and evolve as it gains experience and confidence.</span></p><span data-dcnode-id="1466" instrument_node="">
</span></div><span data-dcnode-id="1464" instrument_node="">
</span><div class="chapter1" data-dcnode-id="1460"><span data-dcnode-id="1463" instrument_node="">
</span><div class="chapter1-target" data-dcnode-id="1462" id="conclusion-15" title="Conclusion"></div><span data-dcnode-id="1461" instrument_node="">
</span></div><span data-dcnode-id="1459" instrument_node="">
</span><div class="-mt:1 -xw:4 -mx:a" data-dcnode-id="1454"><span data-dcnode-id="1458" instrument_node="">
</span><h2 class="-t:3" data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">Conclusion</span></h2><span data-dcnode-id="1455" instrument_node="">
</span></div><span data-dcnode-id="1453" instrument_node="">
</span><div class="wysiwyg -xw:4 -mx:a" data-dcnode-id="1445"><span data-dcnode-id="1452" instrument_node="">
</span><p data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">The incoming Biden administration should push for NATO to announce its intention to create a bank at one of the initial leaders’ summits. The administration should work closely with NATO Secretary General Jens Stoltenberg and NATO staff on the proposal and should press other member states to get on board. The United States should also work closely with the United Kingdom on this proposal, using it as a vehicle to revive and strengthen their special relationship, which has been strained by the Trump presidency and the fallout from Brexit. The Biden administration should also use its influence to press wealthy member states to contribute to capitalizing the entity and encourage Eastern European members to commit to utilizing the bank and retiring and replacing Soviet-Russian equipment. The United States should also commit to providing additional security assistance to help incentivize these states to engage in this effort.</span></p><span data-dcnode-id="1449" instrument_node="">
</span><p data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">The administration’s support for a NATO bank would send a strong signal to the alliance and to adversaries of American commitment to NATO as a whole. In 2021, NATO will have to contend with a variety of challenges, including the security implications of climate change, the aftermath of the COVID-19 pandemic, a more assertive China and Russia, and the question of how to balance strained national budgets with the need for strategic investments. After four years of the Trump administration, the United States will need to both humbly reengage and encourage the alliance as a whole to find creative solutions to its most pressing challenges. This initiative could be one of those solutions as NATO works to strengthen itself for the future.</span></p><span data-dcnode-id="1446" instrument_node="">
</span></div><span data-dcnode-id="1444" instrument_node="">
