</span><h2 class="-t:3" data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">Introduction and summary</span></h2><span data-dcnode-id="2362" instrument_node="">
</span></div><span data-dcnode-id="2360" instrument_node="">
</span><div class="wysiwyg -xw:4 -mx:a" data-dcnode-id="2355"><span data-dcnode-id="2359" instrument_node="">
</span><p data-dcnode-id="2357"><span data-dcnode-id="2358" instrument_node="">Since its inception more than 70 years ago, the North Atlantic Treaty Organization has been the foundation of the trans-Atlantic relationship. Formed after World War II, NATO became the most formidable military alliance in history. The formation enshrined America’s commitment to European security and created an umbrella of security under which European democracy could flourish. Over the past several decades, NATO has grown to comprise 30 member states, including former Warsaw Pact countries, and faced new challenges. In 2021, the incoming Biden administration will need to both restore America’s commitment to NATO and push the alliance to strengthen itself. In order to do so, it must take up new approaches to spur investment to bolster NATO’s capabilities. The NATO alliance should set up its own bank to invest in key military capabilities, invest in dual-use infrastructure, and strengthen the financial wherewithal of the alliance.</span></p><span data-dcnode-id="2356" instrument_node="">
</span></div><span data-dcnode-id="2354" instrument_node="">

				This site is protected by reCAPTCHA and the Google	</span><a data-dcnode-id="2256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//policies.google.com/privacy"><span data-dcnode-id="2257" instrument_node="">Privacy Policy</span></a><span data-dcnode-id="2255" instrument_node=""> and </span><a data-dcnode-id="2253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//policies.google.com/terms"><span data-dcnode-id="2254" instrument_node="">Terms of Service</span></a><span data-dcnode-id="2252" instrument_node=""> apply.			</span></p><span data-dcnode-id="2250" instrument_node="">
</span></div><span data-dcnode-id="2248" instrument_node="">
</span></div><span data-dcnode-id="2246" instrument_node="">
</span><div class="wysiwyg -xw:4 -mx:a" data-dcnode-id="2161"><span data-dcnode-id="2245" instrument_node="">
</span><p data-dcnode-id="2239"><span data-dcnode-id="2244" instrument_node="">In 2014, following Russia’s invasion of Ukraine and seizure of Crimea, NATO leaders met in Wales for a critical summit. Since the end of the Cold War, and especially following 9/11, the alliance had shifted its focus from its traditional mission of defending Europe to operations abroad. Meanwhile, NATO members significantly reduced defense spending, downsized their forces, and underinvested in modernizing their forces following the Cold War. However, Russian aggression against Ukraine shook the alliance; NATO leaders agreed in Wales that defending Europe would be a top priority and committed to spending at least 2 percent of gross domestic product on defense by 2024.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2241" tooltip=""><sup data-dcnode-id="2242"><span data-dcnode-id="2243" instrument_node="">1</span></sup></a><span data-dcnode-id="2240" instrument_node=""> This pledge was seen as a massive step forward for the alliance, as it would serve to address a growing gap in its capabilities.</span></p><span data-dcnode-id="2238" instrument_node="">
</span><p data-dcnode-id="2225"><span data-dcnode-id="2237" instrument_node="">Since the summit, some progress has been made in strengthening the alliance. NATO members have increased defense spending, deployed forces in Central and Eastern Europe, and begun investing in needed capabilities. In 2019, almost all NATO allies increased their defense spending, with nine countries hitting the 2 percent goal.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2234" tooltip=""><sup data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">2</span></sup></a><span data-dcnode-id="2233" instrument_node=""> Most allies have put plans in place to substantially increase defense spending by 2024.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2230" tooltip=""><sup data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">3</span></sup></a><span data-dcnode-id="2229" instrument_node=""> The alliance is stronger and better prepared to deter Russia than it was six years ago, despite the divisive approach of President Donald Trump, but significant gaps remain. Marginal spending increases by various NATO members were inherently fragmented and often yielded few new major capabilities or failed to address some of NATO’s serious shortfalls. Meanwhile, many member states still have yet to adequately invest in their forces, leading to very low states of readiness and operational strain. Lack of progress toward the 2 percent benchmark has also caused major diplomatic tension within the alliance between the countries meeting their commitments and those that are not.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2226" tooltip=""><sup data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">4</span></sup></a></p><span data-dcnode-id="2224" instrument_node="">
</span><p data-dcnode-id="2214"><span data-dcnode-id="2223" instrument_node="">Now, with the COVID-19 crisis hammering the balance sheets of all NATO members, the prospect for European defense spending looks bleak.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2220" tooltip=""><sup data-dcnode-id="2221"><span data-dcnode-id="2222" instrument_node="">5</span></sup></a><span data-dcnode-id="2219" instrument_node=""> It seems unlikely that there will be significant new investment to address some of NATO’s critical capability gaps. Indeed, the European Union—which had planned to increase funding to upgrade the dual-use infrastructure critical to moving NATO forces—has reduced its planned allocations in its recent budget.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2216" tooltip=""><sup data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">6</span></sup></a><span data-dcnode-id="2215" instrument_node=""> NATO members seeking to keep their economies alive are unlikely to prioritize defense.</span></p><span data-dcnode-id="2213" instrument_node="">
</span><p data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">This is a serious problem for the alliance, and NATO needs to think more creatively about how to support continued alliance investment in the wake of the massive economic contraction caused by COVID-19. Simply demanding that countries spend more on defense, which was not very effective prepandemic, will certainly not work now.</span></p><span data-dcnode-id="2210" instrument_node="">
</span><p data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">What has become apparent is that NATO’s default focus on individual nation-state spending commitments was doing little to address alliancewide issues. Collectively, European NATO members spend as much on defense as Russia, yet the disaggregated and loosely coordinated spending by individual states means that the alliance’s combat strength is well short of what it could be and has left critical gaps in its capabilities.</span></p><span data-dcnode-id="2207" instrument_node="">
</span><p data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node="">NATO, since its founding, has lacked the resources to fill gaps and make investments. The alliance has overlooked one of its potentially most powerful assets—the collective economic and financial clout of its members. NATO has not leveraged its collective financial stature and the position of its many wealthy members to shore up the alliance. In the wake of the COVID-19 crisis, this must change through the creation of its own bank.</span></p><span data-dcnode-id="2204" instrument_node="">
</span><ul data-dcnode-id="2175"><span data-dcnode-id="2203" instrument_node="">
</span><li data-dcnode-id="2195"><strong data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">A NATO bank would resemble other multilateral financial institutions but focus on allied defense priorities. </span></strong><span data-dcnode-id="2200" instrument_node="">A NATO bank, while new for the alliance, would emulate the structure of other multilateral lending organizations. Yet instead of focusing on providing financing for international development as, for example, the World Bank does, it would focus on the defense sector to prompt defense modernization and fund multilateral investments. A NATO bank would leverage the creditworthiness of its wealthy members, enabling it to provide attractive low-interest, long-term loans to members lacking the resources to invest in critical alliance capabilities. For example, former Warsaw Pact NATO members face substantial challenges in retiring old Soviet-Russian weapons systems with new Western-made equipment, and many more have failed to build up and modernize their infrastructure and technology capabilities.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2197" tooltip=""><sup data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">7</span></sup></a><span data-dcnode-id="2196" instrument_node=""> This is not because NATO as a whole lacks the resources but because individual NATO members lack the resources. This, however, makes the alliance overall considerably weaker than it could be.</span></li><span data-dcnode-id="2194" instrument_node="">
</span><li data-dcnode-id="2190"><strong data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">The bank could finance efforts to address critical gaps that might fall through the seams of the alliance, such as modernizing dual-use infrastructure.</span></strong><span data-dcnode-id="2191" instrument_node=""> This could entail upgrading bridges to support heavy military vehicles transit from west to east or investing in secure 5G technology.</span></li><span data-dcnode-id="2189" instrument_node="">
</span><li data-dcnode-id="2185"><strong data-dcnode-id="2187"><span data-dcnode-id="2188" instrument_node="">A NATO bank could provide an alternative to nations and regions turning to banks and lending institutions tied to NATO’s competitors, such as China and Russia.</span></strong><span data-dcnode-id="2186" instrument_node=""> A bank could provide NATO with an important tool to safeguard its access to dual-use infrastructure and strengthen ties with non-NATO member states that are critical to the security of Europe, such as in the Balkans. In a new era of geopolitical competition, a NATO bank could serve as a critical tool.</span></li><span data-dcnode-id="2184" instrument_node="">
</span><li data-dcnode-id="2177"><strong data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">A NATO bank would better equip the alliance to manage the financial challenges of conflict.</span></strong><span data-dcnode-id="2181" instrument_node=""> By not taking into account how to finance the alliance, NATO has not adequately prepared itself for a military conflict. NATO does military planning for all sorts of contingencies, but it does not plan for how to finance these efforts in the event of a conflict. Yet underlying any significant military effort are questions of economic and financial capacity. Military conflict and competition put great economic strain on a nation or power, stressing national budgets and often causing painful and unpopular economic choices. Yet as the NATO alliance has developed and solidified over the past 70 years, it has not organized itself to grapple with these fundamental questions: Who will finance the alliance? How will that be done?
</span><p class="" data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">While the United States has traditionally stepped in, many of NATO’s European members also possess immense financial resources and standing. The alliance does not need to rely solely on the dollar; it can now also rely on the euro as well as the pound. The burden of financing the alliance should not be an American responsibility or fall on the shoulders of select member states but rather be considered a shared responsibility.</span></p><span data-dcnode-id="2178" instrument_node="">
</span></li><span data-dcnode-id="2176" instrument_node="">
</span></ul><span data-dcnode-id="2174" instrument_node="">
</span><p data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">To establish the bank, wealthier members would need to provide initial startup capital, while member states that are the intended recipients for loans would need to agree to participate. NATO allies would set priorities for what the bank should fund, seeking to balance the need to address urgent critical shortfalls with longer-term priorities such as investing in new dual-use technology. The bank would finance NATO priorities, such as defense modernization within the alliance, with a focus on joint acquisitions and replacing outdated Soviet-Russian equipment; strategic investments in dual-use infrastructure; investments in emerging technologies such as 5G development; and crisis response funds.</span></p><span data-dcnode-id="2171" instrument_node="">
</span><p data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">After the turmoil of the Trump administration, there will likely be significant energy on the part of NATO members to embrace new ideas to revive and renew the alliance. The Biden administration should seize the moment and push for NATO to announce the creation of a new bank at the first leaders’ summit. A NATO bank could also serve as a critical tool in the short term by helping to alleviate budgetary pressure caused by the economic fallout from the COVID-19 pandemic.</span></p><span data-dcnode-id="2168" instrument_node="">
</span><p data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">Ultimately, a NATO bank would not magically solve all issues or fill all regional capabilities gaps. It will not solve the budgetary crunch caused by COVID-19. Some members may continue to resist making investments, even if offered extremely low borrowing costs from NATO, and may need institutional pressure and evidence to incentivize an initial buy-in. Yet others will take advantage, especially if the United States were to shift its diplomatic energy from demanding arbitrary spending targets to supporting specific investments that allow capability gaps to be filled. A bank would be a flexible tool that could evolve with NATO priorities and leverage the alliance’s financial clout to strengthen the security of all members.</span></p><span data-dcnode-id="2165" instrument_node="">
</span><p data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">Strengthening the NATO alliance—the foundation for European security and the trans-Atlantic partnership—is absolutely essential. As such, NATO needs to get more innovative in how it seeks to address its shortfalls.</span></p><span data-dcnode-id="2162" instrument_node="">
</span></div><span data-dcnode-id="2160" instrument_node="">
</span><div class="chapter1" data-dcnode-id="2156"><span data-dcnode-id="2159" instrument_node="">
</span><div class="chapter1-target" data-dcnode-id="2158" id="finance-and-defense-a-critical-link-5" title="Finance and defense: A critical link"></div><span data-dcnode-id="2157" instrument_node="">
</span></div><span data-dcnode-id="2155" instrument_node="">
</span><div class="-mt:1 -xw:4 -mx:a" data-dcnode-id="2150"><span data-dcnode-id="2154" instrument_node="">
</span><h2 class="-t:3" data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">Finance and defense: A critical link</span></h2><span data-dcnode-id="2151" instrument_node="">
</span></div><span data-dcnode-id="2149" instrument_node="">
</span><div class="wysiwyg -xw:4 -mx:a" data-dcnode-id="2059"><span data-dcnode-id="2148" instrument_node="">
</span><p data-dcnode-id="2146"><span data-dcnode-id="2147" instrument_node="">Critical to any alliance war effort is the ability to mobilize national resources to finance and fund a prolonged military campaign, not just of an individual nation but also of its allied partners. The history of military alliances is often inextricably linked to the ability of allies to financially support each other.</span></p><span data-dcnode-id="2145" instrument_node="">
</span><p data-dcnode-id="2136"><span data-dcnode-id="2144" instrument_node="">During World War I, Allied forces were reliant on American financier J.P. Morgan to finance the Entente’s war effort. Historian Adam Tooze explains, “By the end of 1916, American investors had wagered two billion dollars on an Entente victory. The vehicle for this transatlantic operation…was a single private bank, the dominant Wall Street house of J.P. Morgan.”</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2141" tooltip=""><sup data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">8</span></sup></a><span data-dcnode-id="2140" instrument_node=""> J.P. Morgan’s efforts were driven in part by business interests and in part by support for the Entente. Tooze concludes, “The result was a quite unprecedented international combination of public-private power.” During the Battle of the Somme in the summer of 1916, J.P. Morgan spent more than $1 billion in the United States on behalf of the United Kingdom, amounting to more than 45 percent of U.K. war spending.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2137" tooltip=""><sup data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">9</span></sup></a></p><span data-dcnode-id="2135" instrument_node="">
</span><p data-dcnode-id="2130"><span data-dcnode-id="2134" instrument_node="">These examples demonstrate the financial underpinnings of any massive allied military endeavor. When states enter into a conflict, they are often willing to spend whatever it takes financially—and states that lack the capacity to finance or support their efforts often flounder. Tooze explains that while the Entente could rely on the United States providing needed supplies for the home front, especially food and coal, Germany could not, which he argues was “an essential factor in deciding the eventual outcome.”</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2131" tooltip=""><sup data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">10</span></sup></a></p><span data-dcnode-id="2129" instrument_node="">
</span><p data-dcnode-id="2120"><span data-dcnode-id="2128" instrument_node="">Furthermore, during WWII, the United States provided military aid through the Lend-Lease Program, significantly bolstering British and Soviet forces.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2125" tooltip=""><sup data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">11</span></sup></a><span data-dcnode-id="2124" instrument_node=""> The United States provided more than $500 billion in equipment such as tanks, fighter aircraft, and ships, but the repayment plan for these “leased” items had an extremely long-term time horizon. The United Kingdom did not fully pay back the United States until December 29, 2006.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2121" tooltip=""><sup data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">12</span></sup></a></p><span data-dcnode-id="2119" instrument_node="">
</span><p data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">Despite the issues of war financing being critical to any military effort, NATO as an established military alliance has not accounted for how to finance a broader and more protracted alliancewide military effort. Nowhere in its organization is there a defined financing vehicle to initiate investments in defense or to sustain the alliance and its members. Countries’ finance ministers have little, if any, role or engagement with NATO. Should a member state fall under attack and need an urgent injection of financing to keep soldiers paid or acquire defense equipment and other critical supplies, this would need to be done outside of the existing alliance structure, likely on a bilateral or ad hoc basis. While unlikely, the potential lack of a defined finance vehicle or structure underscores the need for NATO to prepare for such contingencies.</span></p><span data-dcnode-id="2116" instrument_node="">
</span><h4 data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">The United States as NATO’s financial backbone</span></h4><span data-dcnode-id="2113" instrument_node="">
</span><p data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">NATO has operated on the assumption that its most powerful member, the United States, would play the same role it had during the first two world wars.</span></p><span data-dcnode-id="2110" instrument_node="">
</span><p data-dcnode-id="2105"><span data-dcnode-id="2109" instrument_node="">In the years after WWII, the United States pushed to rebuild Europe, both economically and militarily. While the Marshall Plan provided critical economic assistance, the United States also effectively financed the military reconstruction of Western Europe. Through the 1949 Mutual Defense Assistance Act and the 1951 Mutual Security Act, the United States provided more than $50 billion in today’s dollars in military aid to the newly formed NATO.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2106" tooltip=""><sup data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">13</span></sup></a></p><span data-dcnode-id="2104" instrument_node="">
</span><p data-dcnode-id="2094"><span data-dcnode-id="2103" instrument_node="">When NATO was formed, it was seen as a way of keeping Americans engaged in Europe and preventing the United States from reverting to a post-WWI isolationism. But the United States was also focused on encouraging European rearmament and reducing reliance on the United States, which led to strong early U.S. support for European defense restructuring and integration. U.S. efforts to spur rearmament, particularly in West Germany, were a crucial motivating factor for France to push for European integration through the merging of the coal and steel industries into the European Coal and Steel Community.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2100" tooltip=""><sup data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">14</span></sup></a><span data-dcnode-id="2099" instrument_node=""> The United States also strongly backed a French proposal to create a European Defense Community (EDC), which would have formed a pan-European army.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2096" tooltip=""><sup data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">15</span></sup></a><span data-dcnode-id="2095" instrument_node=""> In the aftermath of WWII, the United States therefore sought and encouraged ways to spur European defense reforms in an effort to strengthen the European pillar of the newly formed alliance, which would have reduced Western Europe’s military and economic reliance on the United States. Ultimately, however, the EDC never took hold and a European Army was never formed. Europe integrated economically, but not militarily.</span></p><span data-dcnode-id="2093" instrument_node="">
</span><p data-dcnode-id="2087"><span data-dcnode-id="2092" instrument_node="">Defense was left to nation-states, coordinated through NATO, leaving the United States not only as the lead military guarantor of European defense but also as its de facto financial backbone. As Western Europe recovered economically, individual NATO members took on responsibility for financing and sustaining investments in their military capabilities, which led to U.S. concerns during the Cold War about European underinvestment in defense.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2089" tooltip=""><sup data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">16</span></sup></a><span data-dcnode-id="2088" instrument_node=""> However, the United States’ military presence in Europe and focus on the Soviet Union meant that it made up for whatever European military deficiencies may have existed.</span></p><span data-dcnode-id="2086" instrument_node="">
</span><p data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">After the Cold War, unlike after WWII, the United States and many NATO members cut defense spending, taking the so-called peace dividend. However, NATO simultaneously expanded eastward, incorporating numerous Warsaw Pact countries. These former Warsaw Pact members had militaries that had been designed and built with the purpose of operating with the Soviet Union against the alliance. Additionally, and similar to NATO’s founding members after WWII, these nations lacked the financial wherewithal to rebuild their militaries. Yet unlike after WWII, the United States made no significant investment to rebuild and transform the militaries of these new members states.</span></p><span data-dcnode-id="2083" instrument_node="">
</span><p data-dcnode-id="2074"><span data-dcnode-id="2082" instrument_node="">When NATO was called on in Afghanistan after 9/11, it was the United States that, through coalition support funds, provided funding and assistance to encourage, support, and sustain member state operations in Afghanistan.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2079" tooltip=""><sup data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">17</span></sup></a><span data-dcnode-id="2078" instrument_node=""> Following Russia’s invasion of Ukraine in 2014, the alliance recognized the need for urgent investment to deter Russia. Members pledged to spend more, and the United States established the European Reassurance Initiative, now called the European Deterrence Initiative.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2075" tooltip=""><sup data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">18</span></sup></a></p><span data-dcnode-id="2073" instrument_node="">
</span><p data-dcnode-id="2067"><span data-dcnode-id="2072" instrument_node="">The European Deterrence Initiative provided tens of billions of dollars to bolster NATO’s capacity to deter Russia. It invested in modernizing and expanding military facilities, provided training assistance to forces, and funded the development of military capabilities.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2069" tooltip=""><sup data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">19</span></sup></a><span data-dcnode-id="2068" instrument_node=""> This American effort has been significant in bolstering NATO’s overall strength. Once again, it was an example of the United States stepping in financially to fill a gap in the alliance.</span></p><span data-dcnode-id="2066" instrument_node="">
</span><p data-dcnode-id="2061"><span data-dcnode-id="2065" instrument_node="">Yet this investment initiative was also limited. U.S. funding has recently focused on encouraging the modernization of Eastern European militaries, but this U.S.-dependent effort is limited in scope, particularly given current budgetary constraints. For instance, although the U.S. State Department will likely continue to provide some funds to strengthen the security and resilience of Eastern NATO members, this is not enough to finance the large acquisitions needed to modernize their forces.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2062" tooltip=""><sup data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">20</span></sup></a></p><span data-dcnode-id="2060" instrument_node="">
</span></div><span data-dcnode-id="2058" instrument_node="">
</span><div class="chapter1" data-dcnode-id="2054"><span data-dcnode-id="2057" instrument_node="">
</span><div class="chapter1-target" data-dcnode-id="2056" id="what-would-a-bank-do-addressing-natos-capabilities-gaps-7" title="What would a bank do? Addressing NATO’s capabilities gaps"></div><span data-dcnode-id="2055" instrument_node="">
</span></div><span data-dcnode-id="2053" instrument_node="">
</span><div class="-mt:1 -xw:4 -mx:a" data-dcnode-id="2048"><span data-dcnode-id="2052" instrument_node="">
</span><h2 class="-t:3" data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">What would a bank do? Addressing NATO’s capabilities gaps</span></h2><span data-dcnode-id="2049" instrument_node="">
</span></div><span data-dcnode-id="2047" instrument_node="">
</span><div class="wysiwyg -xw:4 -mx:a" data-dcnode-id="1971"><span data-dcnode-id="2046" instrument_node="">
</span><p data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">After decades of underinvestment, and as a result of its focus on counterterrorism and counterinsurgency operations in Iraq and Afghanistan, NATO and its members have a number of critical gaps in conventional capabilities to deter peer competitors. Although a bank would not solve all of the alliance’s problems—which include ongoing reliance on aging equipment, chronic infrastructure shortfalls, and gaps in defense spending—many of these areas could be addressed by the creation of this new funding mechanism.</span></p><span data-dcnode-id="2043" instrument_node="">
</span><h4 data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">Reduce reliance on aging Soviet-Russian military equipment</span></h4><span data-dcnode-id="2040" instrument_node="">
</span><p data-dcnode-id="2031"><span data-dcnode-id="2039" instrument_node="">As NATO has pivoted back to a focus on deterring Russia, one great irony is that former Warsaw Pact NATO members continue to use and operate aging Soviet-Russian equipment. Not only is much of this equipment—from fighter jets to tracked vehicles to helicopters—in a decrepit state well below the standards of NATO’s Western members, but the continued use of this equipment also creates a dependence on Russia’s defense industry, as keeping aging equipment operating requires that these countries procure spare parts and components from Russia itself.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2036" tooltip=""><sup data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">21</span></sup></a><span data-dcnode-id="2035" instrument_node=""> This means that NATO defense funds are flowing to the Russian defense industry to enable NATO’s Eastern members to operate equipment to deter Russian aggression. Such spending also violates U.S. sanctions provisions under the Countering America’s Adversaries Through Sanctions Act, which became law in 2017.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2032" tooltip=""><sup data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">22</span></sup></a></p><span data-dcnode-id="2030" instrument_node="">
</span><p data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">Former Warsaw Pact countries never received an injection of financing to modernize their forces after joining NATO. Unlike after WWII, when the United States helped rebuild allied European militaries to deter the Soviet Union, there was no similar pressing threat that warranted massive military expenditures after the end of Cold War. Modernization and the replacement of aging fleets has happened slowly and sporadically. Additionally, the focus on counterinsurgency missions in Afghanistan and Iraq further reduced investment in higher-end military equipment useful for deterring a peer-to-peer competitor.</span></p><span data-dcnode-id="2027" instrument_node="">
</span><p data-dcnode-id="2017"><span data-dcnode-id="2026" instrument_node="">It is clearly past time for NATO’s Eastern members to modernize their forces with equipment interoperable with NATO forces. However, expecting individual countries to do this themselves is unrealistic. Many of NATO’s Eastern members have increased their defense spending following Russia’s invasion of Ukraine and have taken action to defend themselves and deter potential aggression. Poland, for instance, has invested in a broad-based modernization effort, procuring the Patriot missile defense system as well as new helicopters.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2023" tooltip=""><sup data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">23</span></sup></a><span data-dcnode-id="2022" instrument_node=""> Romania has acquired used F-16s from Portugal.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2019" tooltip=""><sup data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">24</span></sup></a><span data-dcnode-id="2018" instrument_node=""> Yet these efforts are piecemeal and disconnected from each other. Moreover, these countries are simply not going to be able to modernize their forces without access to considerable financing. Just as a homeowner would seek a loan to renovate their house or a mortgage to enable them to purchase a house, countries need access to advantageous financing to facilitate the significant investments needed to modernize their forces.</span></p><span data-dcnode-id="2016" instrument_node="">
</span><h4 data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">Solve infrastructure shortfalls</span></h4><span data-dcnode-id="2013" instrument_node="">
</span><p data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">A major military weak spot for the alliance is its inability to move forces quickly and efficiently across the European continent, namely from west to east. Russia has an immense tactical military advantage by being able to amass forces on its territories, giving it the potential to overwhelm the forces of an individual NATO member state, particularly the Baltic states. NATO defense planners would seek to move forces eastward should tensions escalate. But the alliance would face significant difficulty simply moving forces from west to east, as numerous bridges, roads, and rail lines cannot handle the transit of heavy military equipment such as tanks.</span></p><span data-dcnode-id="2010" instrument_node="">
</span><p data-dcnode-id="2000"><span data-dcnode-id="2009" instrument_node="">Although NATO has recently made progress in lowering the barriers to cross-border operations, officials reportedly remain concerned that requirements such as passport checks or outdated infrastructure could stall any coordinated response to a threat within Europe.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2006" tooltip=""><sup data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">25</span></sup></a><span data-dcnode-id="2005" instrument_node=""> Recognizing this barrier, the EU unveiled a “military Schengen zone” in 2018 with the goal of lowering barriers to moving troops and equipment across Europe and fixing existing infrastructure to withstand this sort of movement.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2002" tooltip=""><sup data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">26</span></sup></a><span data-dcnode-id="2001" instrument_node=""> As a first step, NATO would need host members to make the necessary infrastructure investments. Yet the purpose of these investments is for the sake of the whole alliance, not just the member state making the investment. Hence, progress in addressing this significant military gap—the inability to mobilize and transport forces to the fight—has been shockingly slow. This clear gap is perhaps the most substantial risk to NATO’s ability to defend allied territory and highlights the urgent need for an injection of funding.</span></p><span data-dcnode-id="1999" instrument_node="">
</span><p data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">Additionally, NATO may also want to finance investment in infrastructure that is critical to the military capacity of the alliance. This could mean improving ports, power plants, and other rail and road infrastructure. In particular, as potential rivals like China provide investment and take controlling stakes in critical infrastructure including electrical plants and ports—such as the Port of Piraeus in Greece—NATO has a clear stake in ensuring that infrastructure critical to the operations of the alliance remain under member control.</span></p><span data-dcnode-id="1996" instrument_node="">
</span><p data-dcnode-id="1991"><span data-dcnode-id="1995" instrument_node="">Furthermore, NATO could help solve the alliance’s 5G problem. 5G networks are largely for civilian purposes but also have a dual-use military dimension in order to support alliance communications. As concerns mount over the security of potentially Chinese-provided 5G communications networks, NATO could help invest in the formation of a secure 5G network that meets alliance security requirements.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1992" tooltip=""><sup data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">27</span></sup></a></p><span data-dcnode-id="1990" instrument_node="">
</span><h4 data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">Invest in new and emerging technologies</span></h4><span data-dcnode-id="1987" instrument_node="">
</span><p data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">Rapid technological change is transforming warfare. Yet acquisition cycles for procuring new weapons systems are often so lengthy that, by the time of delivery and deployment, the technology has already changed. NATO should support more dynamic procurement efforts, particularly when it comes to defensive systems that could be used to complicate and deter Russian or nation-state incursion. Additionally, NATO should be investing in new technology development and other research that can help spur innovation to bolster the alliance. This could involve providing funding to startups or providing capital to expand ongoing research and innovation. Once the bank is established, its mandate could even expand to include venture efforts that directly fund cutting-edge technology. This effort could also be closely coordinated with the EU.</span></p><span data-dcnode-id="1984" instrument_node="">
</span><h4 data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">Show support for sustaining defense spending levels</span></h4><span data-dcnode-id="1981" instrument_node="">
</span><p data-dcnode-id="1979"><span data-dcnode-id="1980" instrument_node="">Although member states agreed to increase defense spending at the Wales Summit, progress has been slow and sporadic, and a majority of NATO members were unlikely to hit the 2 percent pledge by 2024. This is even more unlikely now with the economic and budgetary fallout from COVID-19. Some NATO members may face severe budgetary shortfalls, making defense spending a potential target for budget cuts. To relieve this pressure, NATO members could use access to inexpensive financing to maintain their current defense spending levels.</span></p><span data-dcnode-id="1978" instrument_node="">
</span><h4 data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">Close the gap in NATO’s defense planning</span></h4><span data-dcnode-id="1975" instrument_node="">
</span><p data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">NATO not only needs to be militarily prepared for protracted conflict scenarios but also should be financially prepared. The alliance should not assume or place the burden of financially backing a massive regional effort on the shoulders of the United States; other NATO members would need to step up as well. But instead of figuring out such financial arrangements in the midst of a crisis, NATO should plan now. If member states are going to fight together, then determining how to finance that effort is critical. A NATO bank should help prompt collaboration and coordination among the formation’s finance ministers and treasury secretaries, which will better prepare the alliance to cope in the event of a conflict.</span></p><span data-dcnode-id="1972" instrument_node="">
</span></div><span data-dcnode-id="1970" instrument_node="">
</span><div class="chapter1" data-dcnode-id="1966"><span data-dcnode-id="1969" instrument_node="">
</span><div class="chapter1-target" data-dcnode-id="1968" id="gaps-in-existing-methods-of-defense-financing-9" title="Gaps in existing methods of defense financing"></div><span data-dcnode-id="1967" instrument_node="">
</span></div><span data-dcnode-id="1965" instrument_node="">
</span><div class="-mt:1 -xw:4 -mx:a" data-dcnode-id="1960"><span data-dcnode-id="1964" instrument_node="">
</span><h2 class="-t:3" data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">Gaps in existing methods of defense financing</span></h2><span data-dcnode-id="1961" instrument_node="">
</span></div><span data-dcnode-id="1959" instrument_node="">
</span><div class="wysiwyg -xw:4 -mx:a" data-dcnode-id="1731"><span data-dcnode-id="1958" instrument_node="">
</span><p data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">The existing landscape of defense lending demonstrates a clear gap that a NATO bank could close. Although many major arms-export nations provide defense financing to countries that make acquisitions from their defense industry, NATO members offer incentives to purchase defense equipment, including through export finance or credit institutions as well as sovereign borrowing mechanisms that help lower the political and financial risks for states. They have also used direct state-to-state lending, which creates a vulnerability for the alliance. These existing mechanisms are laid out below. However, these efforts are often very limited and highly targeted, offer rates that are still too high to address the challenges NATO is seeking to address, and are limited in what they can and cannot fund.</span></p><span data-dcnode-id="1955" instrument_node="">
</span><h4 data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">United States</span></h4><span data-dcnode-id="1952" instrument_node="">
</span><p data-dcnode-id="1947"><span data-dcnode-id="1951" instrument_node="">With the largest defense budget in the world and as the greatest exporter of arms, the United States has been able to shape much of NATO’s military capacity since its formation. In the global defense industry, the United States has traditionally been dominant, accounting for the vast majority of arms exports and acting as the major defense supplier to NATO members’ procurement efforts. In the past five years, the United States was responsible for 36 percent of total global arms exports, with sales 76 percent higher than the world’s second-largest arms exporter, Russia.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1948" tooltip=""><sup data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">28</span></sup></a></p><span data-dcnode-id="1946" instrument_node="">
</span><p data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">Yet the United States does not have a developed defense financing program. The State Department’s Foreign Military Financing (FMF) program—which primarily used to provide loans to countries seeking to acquire U.S.-made military equipment—shifted to providing grants during the 1990s. The United States therefore operates a robust military aid or security assistance program with the State Department and the Department of Defense, providing more than $10 billion each year in grants to foreign partners but rarely providing loans.</span></p><span data-dcnode-id="1943" instrument_node="">
</span><p data-dcnode-id="1930"><span data-dcnode-id="1942" instrument_node="">The closest that the U.S. government has to a lending program is the Defense Security Cooperation Agency’s “dependable undertaking” program.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1939" tooltip=""><sup data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">29</span></sup></a><span data-dcnode-id="1938" instrument_node=""> This program requires a commitment from the purchaser to pay the cost of the goods or services over a set period of time, without requiring cash up front. The Defense Security Cooperation Agency determines whether countries are eligible for dependable undertaking based on their Interagency Country Risk Assessment System rating and input from relevant federal agencies or stakeholders.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1935" tooltip=""><sup data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">30</span></sup></a><span data-dcnode-id="1934" instrument_node=""> This program therefore has a high bar for countries to qualify and essentially allows wealthy purchasers to break up the costs of an acquisition and pay as they go in installments, as opposed to having to pay the entire amount up front. The lack of U.S. financing for less-well-off partners has essentially created a gap in U.S. arms transfers, wherein the United States sells to wealthy countries, gives to poorer countries through its grant assistance, but essentially leaves out middle-income countries that, while moderately financially secure, lack the ability to pay upfront for expensive U.S. weapons systems.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1931" tooltip=""><sup data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">31</span></sup></a></p><span data-dcnode-id="1929" instrument_node="">
</span><p data-dcnode-id="1923"><span data-dcnode-id="1928" instrument_node="">Occasionally, the United States has provided loans to countries to make select acquisitions. For instance, in the early 2000s, fearing that the United States would lose out in Poland’s fighter acquisition competition, the Bush administration offered a special loan from the U.S. Treasury Department that helped ensure Poland selected the F-16.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1925" tooltip=""><sup data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">32</span></sup></a><span data-dcnode-id="1924" instrument_node=""> Without the loan, it is unlikely Poland would have chosen this aircraft. However, despite the success of this loan—Poland not only acquired the F-16 but also met the United States’ loan terms—it did not prompt the U.S. government to revive defense lending.</span></p><span data-dcnode-id="1922" instrument_node="">
</span><p data-dcnode-id="1912"><span data-dcnode-id="1921" instrument_node="">There are unique and special circumstances in which the State Department’s FMF program will provide a loan. Following ISIS incursions into Iraq, for example, the agency leveraged its annual allocations to Iraq to provide an additional $250 million loan.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1918" tooltip=""><sup data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">33</span></sup></a><span data-dcnode-id="1917" instrument_node=""> These loans, however, were costly, because the State Department had to use funding to cover the added risk of lending to a country without a strong credit rating. In other words, the loan cannibalized assistance funding that would have gone to other countries. This creates a significant deterrent to the State Department providing additional loans, particularly given the agency’s current budget-constrained environment. The Trump administration has expressed an interest in renewing an FMF lending program to boost sales of U.S. weapons abroad, potentially offering greater interest rate flexibility and an expanded grant budget.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1914" tooltip=""><sup data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">34</span></sup></a><span data-dcnode-id="1913" instrument_node=""> However, this proposal has made little progress.</span></p><span data-dcnode-id="1911" instrument_node="">
</span><p data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">The United States has also expanded its security assistance to Eastern Europe, with a major focus on transitioning countries away from Soviet-Russian equipment. Yet the level of funding in grant assistance is not sufficient and remains relatively limited in scope. The lack of a financing program makes it difficult for these countries to afford and acquire major weapons systems, even with grant funding. Therefore, a NATO bank would clearly fill a niche that U.S. security cooperation programs do not cover.</span></p><span data-dcnode-id="1908" instrument_node="">
</span><h4 data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">France</span></h4><span data-dcnode-id="1905" instrument_node="">
</span><p data-dcnode-id="1896"><span data-dcnode-id="1904" instrument_node="">France’s defense industry has experienced significant recent growth. According to data from the Stockholm International Peace Research Institute, French arms exports have soared over the past decade. Today, France is the third-largest arms exporter, accounting for 7.9 percent of total global sales.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1901" tooltip=""><sup data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">35</span></sup></a><span data-dcnode-id="1900" instrument_node=""> This large jump, according to a report prepared by French Armed Forces Minister Florence Parly, is “the consequence of the European twist we have given to our export policy.”</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1897" tooltip=""><sup data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">36</span></sup></a></p><span data-dcnode-id="1895" instrument_node="">
</span><p data-dcnode-id="1874"><span data-dcnode-id="1894" instrument_node="">In recent years, France has focused on exporting more to internal partners as opposed to external parties outside of the EU and NATO. This has likely been in response to both Europe’s growing defense industry and widespread criticism over its sales to nondemocratic governments such as Saudi Arabia.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1891" tooltip=""><sup data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">37</span></sup></a><span data-dcnode-id="1890" instrument_node=""> France’s Naval Group has upped its share of international sales, even recently inking an estimated $1.3 billion deal with Romania to buy additional equipment, upgrade existing frigates, and build a new training center and maintenance facility.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1887" tooltip=""><sup data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">38</span></sup></a><span data-dcnode-id="1886" instrument_node=""> The Naval Group also signed a massive deal with Australia in February 2019, committing to an estimated $34 billion submarine contract.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1883" tooltip=""><sup data-dcnode-id="1884"><span data-dcnode-id="1885" instrument_node="">39</span></sup></a><span data-dcnode-id="1882" instrument_node=""> Other notable European sales include orders from Belgium and Spain for helicopters and heavy armored vehicles.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1879" tooltip=""><sup data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">40</span></sup></a><span data-dcnode-id="1878" instrument_node=""> However, as France continues to expand its sales outside of Europe, some of its programs have run into roadblocks due to U.S. regulations. One of France’s most controversial recent sales—Rafale fighter jets to Egypt—met with U.S. opposition due to existing regulations that prevent systems with American components from being sold without clearance from the United States. This prompted French President Emmanuel Macron to ask Trump to intervene and speed up the approval process.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1875" tooltip=""><sup data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">41</span></sup></a></p><span data-dcnode-id="1873" instrument_node="">
</span><p data-dcnode-id="1867"><span data-dcnode-id="1872" instrument_node="">The Compagnie Française d’Assurance pour le Commerce Extérieur (COFACE) supports some of these sales, with military equipment averaging an estimated 20 percent of its yearly activity.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1869" tooltip=""><sup data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">42</span></sup></a><span data-dcnode-id="1868" instrument_node=""> However, the exact numbers and COFACE partners have not been made publicly available. More broadly, the data surrounding these sales are broadly opaque, with confidentiality agreements in place to prevent the sharing of terms and conditions of sales.</span></p><span data-dcnode-id="1866" instrument_node="">
</span><h4 data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">United Kingdom</span></h4><span data-dcnode-id="1863" instrument_node="">
</span><p data-dcnode-id="1854"><span data-dcnode-id="1862" instrument_node="">The United Kingdom is consistently one of the world’s largest arms exporters, with a record £14 billion, or roughly $18.8 billion USD, in sales in 2018.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1859" tooltip=""><sup data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">43</span></sup></a><span data-dcnode-id="1858" instrument_node=""> Like other European member states, the United Kingdom sells a significant percentage of its arms to the Middle East, totaling as much as 80 percent of its sales in 2018. In 2019, however, a U.K. court ruled against the country’s ongoing sales to Saudi Arabia, citing the export policy against selling weapons that could be used to violate international humanitarian law, potentially forcing the country to refocus its sales on democratic allies and partners.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1855" tooltip=""><sup data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">44</span></sup></a></p><span data-dcnode-id="1853" instrument_node="">
</span><p data-dcnode-id="1844"><span data-dcnode-id="1852" instrument_node="">The United Kingdom’s Export Finance agency (UKEF) provides significant support to defense deals involving foreign partners. UKEF complements and supports the government’s import-and-export strategy, working with partner banks in the United Kingdom, partnering with more than 40 national export credit agencies, and consulting with industry bodies. Although UKEF finances export purchases in a variety of sectors, the defense sector has represented a significant portion of its books in recent years.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1849" tooltip=""><sup data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">45</span></sup></a><span data-dcnode-id="1848" instrument_node=""> For example, from 2018 to 2019, the agency guaranteed the sale of 24 Typhoon and nine Hawk aircraft and related goods from BAE Systems and MBDA UK to Qatar. According to UKEF, the package was valued at around £5 billion—the largest single transaction in its history.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1845" tooltip=""><sup data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">46</span></sup></a></p><span data-dcnode-id="1843" instrument_node="">
</span><p data-dcnode-id="1833"><span data-dcnode-id="1842" instrument_node="">Prices for financing are set by a formula, following a few stated guidelines to set the “lowest tenable premium rates.”</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1839" tooltip=""><sup data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">47</span></sup></a><span data-dcnode-id="1838" instrument_node=""> These guidelines are: “premium rates may not undercut the minimum rates set out in the OECD (where applicable) and must comply with our international obligations, including state aid rules; no individual premium can be below the expected loss of the associated transaction; and aggregate premiums must satisfy the premium-to-risk ratio and pricing adequacy index objectives.”</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1835" tooltip=""><sup data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">48</span></sup></a><span data-dcnode-id="1834" instrument_node=""> The rates that are offered are therefore likely in line with rates available in the marketplace, making it challenging for less wealthy and creditworthy buyers to partake.</span></p><span data-dcnode-id="1832" instrument_node="">
</span><h4 data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">Germany</span></h4><span data-dcnode-id="1829" instrument_node="">
</span><p data-dcnode-id="1816"><span data-dcnode-id="1828" instrument_node="">Germany is a major defense exporter, reporting a high of $9.9 billion USD in 2019.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1825" tooltip=""><sup data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">49</span></sup></a><span data-dcnode-id="1824" instrument_node=""> Much like France, the government has worked to reconcile export demands with increased scrutiny on recipients such as the United Arab Emirates and Egypt. Recently, sales within NATO and Europe have increased, with Hungary, the United States, United Kingdom, and Norway all receiving much of the equipment.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1821" tooltip=""><sup data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">50</span></sup></a><span data-dcnode-id="1820" instrument_node=""> Germany and France have worked to harmonize their export standards, as Germany’s prevention of arms exports to non-NATO countries had stymied joint efforts.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1817" tooltip=""><sup data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">51</span></sup></a></p><span data-dcnode-id="1815" instrument_node="">
</span><p data-dcnode-id="1809"><span data-dcnode-id="1814" instrument_node="">Notably, the German government does not “treat arms exports as an instrument of foreign policy,” an important distinction in comparison with the United States, which folds defense lending into its broader foreign policy apparatus.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1811" tooltip=""><sup data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">52</span></sup></a><span data-dcnode-id="1810" instrument_node=""> The government also maintains restrictive policies on exports outside of NATO, the EU, and NATO-equivalent countries. Therefore, much of the country’s sales and lending have been focused on NATO members and partners, incentivizing the creation of new joint programs within the alliance and investment from other members.</span></p><span data-dcnode-id="1808" instrument_node="">
</span><h4 data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">Sweden</span></h4><span data-dcnode-id="1805" instrument_node="">
</span><p data-dcnode-id="1799"><span data-dcnode-id="1804" instrument_node="">Despite the relatively small size of its economy, Sweden is regularly one of the world’s top arms exporters, and has some of the highest numbers of arms sales per capita.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1801" tooltip=""><sup data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">53</span></sup></a><span data-dcnode-id="1800" instrument_node=""> The Swedish producer Saab accounts for much of this, with millions in sales of the Gripen fighter jet in recent years.</span></p><span data-dcnode-id="1798" instrument_node="">
</span><p data-dcnode-id="1789"><span data-dcnode-id="1797" instrument_node="">Much like other European NATO members, the Swedish government recently tightened controls on arms sales, restricting deals with nondemocratic countries or states that violate human rights.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1794" tooltip=""><sup data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">54</span></sup></a><span data-dcnode-id="1793" instrument_node=""> These restrictions are some of the strongest within Europe, after Sweden faced significant criticism for its sales to Saudi Arabia and the UAE in the early 2010s. Notably, Sweden maintains its neutrality but has strong links to NATO. The Swedish defense industry is highly reliant on exports and has strong links to other national producers, including several BAE Systems partners within the country.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1790" tooltip=""><sup data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">55</span></sup></a></p><span data-dcnode-id="1788" instrument_node="">
</span><h4 data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">EU-PESCO</span></h4><span data-dcnode-id="1785" instrument_node="">
</span><p data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">There have been some notable EU-level efforts to recapitalize forces and modernize defense capabilities—some focus on improving joint capacity while others would directly fund new projects or acquisitions.</span></p><span data-dcnode-id="1782" instrument_node="">
</span><p data-dcnode-id="1776"><span data-dcnode-id="1781" instrument_node="">The Permanent Structured Cooperation (PESCO) was established in December 2017 to improve cooperation on defense at the EU-member state level. Twenty-five member states have joined so far, signing binding commitments to invest in joint defense capabilities.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1778" tooltip=""><sup data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">56</span></sup></a><span data-dcnode-id="1777" instrument_node=""> Ultimately, the goal of PESCO is to integrate EU-level defense capacities to the point where they can be used for both national and international operations. Structurally, PESCO falls under the EU’s broader Common Security and Defense Policy (CSDP), meaning that CSDP missions are not necessarily undertaken using PESCO funds.</span></p><span data-dcnode-id="1775" instrument_node="">
</span><p data-dcnode-id="1770"><span data-dcnode-id="1774" instrument_node="">PESCO differs from other forms of European defense cooperation initiatives in that the commitments are legally binding, setting up a more permanent framework for joint investment. There are dozens of ongoing projects covering cyber, air systems, training, and more. Thus far, however, PESCO projects have been very limited and small in scale. PESCO currently has more than 45 approved projects but has not yet been fully utilized by the EU.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1771" tooltip=""><sup data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">57</span></sup></a></p><span data-dcnode-id="1769" instrument_node="">
</span><h4 data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">European Defense Fund</span></h4><span data-dcnode-id="1766" instrument_node="">
</span><p data-dcnode-id="1760"><span data-dcnode-id="1765" instrument_node="">The European Defense Fund (EDF) is a new EU initiative, also established in 2017, that aims to coordinate and increase national investment in defense. Beginning in 2021, the EDF aims to make significant investments in the EU’s defense industrial base, with a budget of €13 billion over the 2021–2027 EU budget cycle.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1762" tooltip=""><sup data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">58</span></sup></a><span data-dcnode-id="1761" instrument_node=""> The fund will directly finance joint research products involving three or more member states through grants, with additional designated funds to jointly develop workable prototypes. Combined with PESCO, the EDF signifies a broader effort at the EU level to invest in emerging technologies and develop a greater capacity for joint action.</span></p><span data-dcnode-id="1759" instrument_node="">
</span><h4 data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">Cooperative Financing Mechanism</span></h4><span data-dcnode-id="1756" instrument_node="">
</span><p data-dcnode-id="1746"><span data-dcnode-id="1755" instrument_node="">The Cooperative Financing Mechanism (CFM) is an initiative of the European Defense Agency—the EU-linked body tasked with improving integration among member states. It is designed to finance collaborative research products or joint defense capability initiatives. Financing is carried out under two main pillars: direct loans through the European Investment Bank and mutually beneficial financial arrangements among member states.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1752" tooltip=""><sup data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">59</span></sup></a><span data-dcnode-id="1751" instrument_node=""> The European Investment Bank has agreed to offer a three-year credit line worth €6 billion to finance dual-use research or capability projects, with the exception of hard weaponry. The second pillar for member states is much more unique and designed to lower the barriers to multilateral projects by enabling states to lend to each other and put excess defense funds into an individual EU account instead of returning them to the national budget.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1748" tooltip=""><sup data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">60</span></sup></a><span data-dcnode-id="1747" instrument_node=""> The CFM will be optional for EU member states and is currently expected to have 11 original members when it launches this year; however, several other EU member states are potential signatories.</span></p><span data-dcnode-id="1745" instrument_node="">
</span><h4 data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">Connecting Europe Facility</span></h4><span data-dcnode-id="1742" instrument_node="">
</span><p data-dcnode-id="1736"><span data-dcnode-id="1741" instrument_node="">The Connecting Europe Facility is an EU-level financing mechanism that invests in transportation, energy, and digital services. Much like other EU-level programs, its major goal is to improve interconnectivity and interoperability among member states.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1738" tooltip=""><sup data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">61</span></sup></a><span data-dcnode-id="1737" instrument_node=""> Although it does not directly contribute to defense investments, many of its projects—such as harmonizing transport infrastructure—are directly relevant to member states’ ability to act jointly.</span></p><span data-dcnode-id="1735" instrument_node="">
</span><p data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">Overall, although there are financing mechanisms available for NATO members, these existing tools are inadequate to address some of NATO’s greatest gaps and most pressing needs. Many of the existing mechanisms are either highly tailored and limited or largely targeted at discrete national sales. None of these countries are focused solely on NATO’s priorities and do not take into account broader strategic goals before finalizing sales or offering credit lines. Additionally, the level of financing offered at a national level, as well as the subsequent rates, are likely far higher than a NATO bank could offer, particularly at scale. Not every European state can access the available credit lines. Furthermore, the loans offered at a national level could complement NATO lending efforts. For instance, a NATO member state seeking to ensure that its defense industry is selected for an acquisition could still offer additional financing or assistance to the purchasing member state to further subsidize and defray lending costs for the purchaser. In this sense, a NATO bank would not be competitive but additive.</span></p><span data-dcnode-id="1732" instrument_node="">
</span></div><span data-dcnode-id="1730" instrument_node="">
</span><div class="chapter1" data-dcnode-id="1726"><span data-dcnode-id="1729" instrument_node="">
</span><div class="chapter1-target" data-dcnode-id="1728" id="dual-use-infrastructure-investment-in-europe-11" title="Dual-use infrastructure investment in Europe"></div><span data-dcnode-id="1727" instrument_node="">
</span></div><span data-dcnode-id="1725" instrument_node="">
</span><div class="-mt:1 -xw:4 -mx:a" data-dcnode-id="1720"><span data-dcnode-id="1724" instrument_node="">
</span><h2 class="-t:3" data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">Dual-use infrastructure investment in Europe</span></h2><span data-dcnode-id="1721" instrument_node="">
</span></div><span data-dcnode-id="1719" instrument_node="">
</span><div class="wysiwyg -xw:4 -mx:a" data-dcnode-id="1595"><span data-dcnode-id="1718" instrument_node="">
</span><p data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">Over the past two decades, there have been a number of infrastructure-focused banks that have emerged to provide financing to European countries. These banks often serve to advance the economic and geopolitical interests of their primary backers, and NATO’s potential rivals—primarily China and Russia—are increasingly using nonmilitary means to gain influence and undermine the alliance, such as by making strategic acquisitions and investments.</span></p><span data-dcnode-id="1715" instrument_node="">
</span><p data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">NATO allies, absent any alternatives and short on financial capital, are increasingly turning to these options to finance critical infrastructure, some of which could have direct defense and security implications. Dual-use infrastructure such as ports, roads, airports, and rails are critical to deploying forces and are therefore critical to the defense of the alliance. This makes investments in this infrastructure from state-backed banks a challenge for NATO.</span></p><span data-dcnode-id="1712" instrument_node="">
</span><p data-dcnode-id="1698"><span data-dcnode-id="1711" instrument_node="">The Greek Port of Piraeus is the clearest example of a state-backed infrastructure investment overlapping with Europe’s security interests. In 2016, China’s shipping firm purchased a majority stake in the port, seeking to turn it into the biggest harbor in Europe and establish a critical link between Asia and Europe.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1708" tooltip=""><sup data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">62</span></sup></a><span data-dcnode-id="1707" instrument_node=""> Since the financial crisis, Greece and China have deepened their ties, with Athens formally announcing in 2018 that it was joining the Belt and Road Initiative.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1704" tooltip=""><sup data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">63</span></sup></a><span data-dcnode-id="1703" instrument_node=""> China has also made investments in other critical sectors, including energy and real estate, hailing the partnership as an example of the future of the Belt and Road Initiative. In late 2019, China announced that the firm would be pouring an additional €600 million into further development.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1700" tooltip=""><sup data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">64</span></sup></a><span data-dcnode-id="1699" instrument_node=""> Although this partnership is an investment in infrastructure, it also has security and defense implications due to a strategic NATO competitor now controlling a critical entry point into Europe and maintaining financial leverage over a member state.</span></p><span data-dcnode-id="1697" instrument_node="">
</span><p data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">However, without a sufficient counterweight within the formation, NATO allies and partners may continue to turn to potential strategic competitors to finance and support major projects. This creates potential serious security concerns, as it increases the influence and leverage of potential NATO rivals over NATO members and may complicate alliance efforts in a crisis. There are several prominent multilateral lending institutions expanding into Europe that are backed by Russia and China. Although their mandates primarily focus on international development and trade, some of these projects, as outlined above, could also have security implications for the alliance. These include:</span></p><span data-dcnode-id="1694" instrument_node="">
</span><ul data-dcnode-id="1672"><span data-dcnode-id="1693" instrument_node="">
</span><li data-dcnode-id="1674"><strong data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">The International Investment Bank (IIB).</span></strong><span data-dcnode-id="1690" instrument_node=""> A $1.4 billion Russian-backed effort investing in energy, biotech, transport, and financial services. Recent investments have included projects in the Czech Republic, Romania, and Slovakia.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1687" tooltip=""><sup data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">65</span></sup></a><span data-dcnode-id="1686" instrument_node=""> Established by the Council for Mutual Economic Assistance under the leadership of the Soviet Union, the bank is now headquartered in Budapest.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1683" tooltip=""><sup data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">66</span></sup></a><span data-dcnode-id="1682" instrument_node=""> Given Chairman Nikolay Kosov’s ties to Russian intelligence and its history, there has been rampant speculation that the bank is a cover for Russia’s intelligence services.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1679" tooltip=""><sup data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">67</span></sup></a><span data-dcnode-id="1678" instrument_node=""> Hungarian laws have enabled the bank to act with little to no official oversight within the state, providing diplomatic immunity to high-ranking IIB officials and offering numerous other benefits to employees such as full tax exemption.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1675" tooltip=""><sup data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">68</span></sup></a></li><span data-dcnode-id="1673" instrument_node="">
</span></ul><span data-dcnode-id="1671" instrument_node="">
</span><ul data-dcnode-id="1657"><span data-dcnode-id="1670" instrument_node="">
</span><li data-dcnode-id="1659"><strong data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">The Black Sea Trade and Development Bank.</span></strong><span data-dcnode-id="1667" instrument_node=""> A Russian-backed bank that invests in infrastructure energy and other regional issues facing the members of the Black Sea Economic Cooperation. Russia is one of the largest joint shareholders, along with Turkey and Greece.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1664" tooltip=""><sup data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">69</span></sup></a><span data-dcnode-id="1663" instrument_node=""> Russia and Turkey are also the largest recipients of loans; however, Greece and Ukraine both receive more than 10 percent of the bank’s currently disbursed funds. Major projects within Europe include energy investments in Bulgaria and oil and gas projects in Greece.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1660" tooltip=""><sup data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">70</span></sup></a></li><span data-dcnode-id="1658" instrument_node="">
</span></ul><span data-dcnode-id="1656" instrument_node="">
</span><ul data-dcnode-id="1641"><span data-dcnode-id="1655" instrument_node="">
</span><li data-dcnode-id="1643"><strong data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">The Asian Infrastructure Investment Bank (AIIB).</span></strong><span data-dcnode-id="1652" instrument_node=""> This bank finances infrastructure and connectivity projects, including energy, financial institutions, water, and transportation.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1649" tooltip=""><sup data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">71</span></sup></a><span data-dcnode-id="1648" instrument_node=""> China is by far the largest shareholder, followed by India and Russia.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1645" tooltip=""><sup data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">72</span></sup></a><span data-dcnode-id="1644" instrument_node=""> However, many Western states are also members and minor shareholders. The AIIB has received the highest credit ratings and is broadly seen as a potential rival to the World Bank and International Monetary Fund (IMF).</span></li><span data-dcnode-id="1642" instrument_node="">
</span></ul><span data-dcnode-id="1640" instrument_node="">
</span><ul data-dcnode-id="1630"><span data-dcnode-id="1639" instrument_node="">
</span><li data-dcnode-id="1632"><strong data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">The New Development Bank.</span></strong><span data-dcnode-id="1636" instrument_node=""> This bank finances infrastructure and economic integration projects that are primarily focused on its founding members. All BRICS members—Brazil, India, Russia, China, and South Africa—are equal partners, with each owning a 20 percent stake. The bank has approved more than $9 billion in loans to its member countries since its founding less than five years ago but has reportedly disbursed less than 10 percent of the funds and struggled to expand its staff and mandate.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1633" tooltip=""><sup data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">73</span></sup></a></li><span data-dcnode-id="1631" instrument_node="">
</span></ul><span data-dcnode-id="1629" instrument_node="">
