estions &amp; Answers #1</span></strong></a></p><p data-dcnode-id="4220"><a data-dcnode-id="4221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/2034" target="_blank"><strong data-dcnode-id="4222"><span data-dcnode-id="4223" instrument_node="">Click here to open Questions &amp; Answers #2</span></strong></a></p><hr data-dcnode-id="4219"><p data-dcnode-id="4216"><strong data-dcnode-id="4217"><span data-dcnode-id="4218" instrument_node="">NOI for IFIB ACT JFTC 21-130</span></strong></p><p data-dcnode-id="4214"><span data-dcnode-id="4215" instrument_node="">Notification of Intent to issue an Invitation for International Bidding (IFIB) for Role Players and Interpreters Contractor Support to the Pre-Deployment Training for NATO Mission in Iraq (NMI).</span></p><p data-dcnode-id="4210"><strong data-dcnode-id="4212"><span data-dcnode-id="4213" instrument_node="">Type of Contract</span></strong><span data-dcnode-id="4211" instrument_node="">: Indefinite Delivery (ID) Requirements Contract (RC).</span></p><p data-dcnode-id="4206"><strong data-dcnode-id="4208"><span data-dcnode-id="4209" instrument_node="">Period of Performance</span></strong><span data-dcnode-id="4207" instrument_node="">: Base period: between 01 April and 31 December 2022. Option periods: there will be four (4) following option periods of 12 months each (years 2023-2026).</span></p><p data-dcnode-id="4204"><span data-dcnode-id="4205" instrument_node="">Issue Date: 24 January 2022, (target date)</span></p><p data-dcnode-id="4202"><span data-dcnode-id="4203" instrument_node="">Bid Closing Date: 07 March 2022, (target date)</span></p><p data-dcnode-id="4198"><a data-dcnode-id="4199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1967/653" target="_blank"><strong data-dcnode-id="4200"><span data-dcnode-id="4201" instrument_node="">Click here to open NOI for IFIB ACT JFTC 21-130</span  data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">IFIB ACT SACT 21-29</span></strong></p><p data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">Invitation for International Bidding (IFIB) for Contractor Support to Headquarter Supreme Allied Commander Transformation, HQ SACT, Norfolk, Virginia, U.S.A. for Custodial Services.</span></p><p data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">This is a Best value, Firm-Fixed Price Contract for Custodial Services in accordance with the General Terms and Conditions.</span></p><p data-dcnode-id="2209"><span data-dcnode-id="2213" instrument_node="">Bids shall be received at HQ SACT, Purchasing and Contracting Office, </span><strong data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">no later than 21 May 2021, 1200 hours, Eastern Standard Time</span></strong><span data-dcnode-id="2210" instrument_node="">, Norfolk, Virginia, USA. No bids shall be accepted after this time and date.</span></p><p data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">The contract awarded shall be effective 01 Jan 2022 or upon date of award, whichever is later, and subject to funding availability. The period of performance is for one (1) base period, 01 January 2022 through 31 December 2022 with a potential of four (4) 12 month option periods.</span></p><p data-dcnode-id="2202"><span data-dcnode-id="2206" instrument_node="">Information in response to a request for clarification to a prospective bidder shall be furnished to all prospective bidders as a Question and Answer amendment. </span><strong data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">Questions will be cut-off for submission 3 May 2021, at 1200 EST</span></strong><span data-dcnode-id="2203" instrument_node="">.</span></p><p data-dcnode-id="2198"><a data-dcnode-id="2199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1491" target="_blank"><strong data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">Click here to open IFIB ACT SACT 21-29 Amendment #2</span></strong></a></p><p data-dcnode-id="2194"><a data-dcnode-id="2195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1493" target="_blank"><strong data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">Click here to open Questions &amp; Answers #1</span></strong></a></p><p data-dcnode-id="2190"><a data-dcnode-id="2191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1497" target="_blank"><strong data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">Click here to open Questions &amp; Answers #2</span></strong></a></p><p data-dcnode-id="2186"><a data-dcnode-id="2187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1528" target="_blank"><strong data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">Click here to open Questions &amp; Answers #3</span></strong></a></p><hr data-dcnode-id="2185"><p data-dcnode-id="2182"><strong data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">NOI ACT SACT 21-29</span></strong></p><p data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">Notification of Intent to issue an Invitation for International Bidding (IFIB) for Contractor Support to Headquarter Supreme Allied Commander Transformation for Custodial Services for HQ SACT, Norfolk, Virginia, U.S.A.</span></p><p data-dcnode-id="2178"><span data-dcnode-id="2179" instrument_node="">Issue Date: 08 April 2021 (target date)</span></p><p data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">Bid Closing Date: 20 May 2021 (target date)</span></p><p data-dcnode-id="2172"><a data-dcnode-id="2173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1393" target="_blank"><strong data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node="">Click here to open NOI ACT SACT 21-29</span></strong></a></p><hr data-dcnode-id="2171"><p data-dcnode-id="2168"><strong data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">RFI ACT SACT 21-25</span></strong></p><p data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">Request for Information (RFI) Call for NATO Nations and Industry to provide inputs to NATO’s Communication and Information Systems (CIS) Security (including Cyber Defence) Capabilities.</span></p><p data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">Nations and Industry wishing to respond to this RFI should read this document carefully and follow the guidance for responding.</span></p><p data-dcnode-id="2159"><span data-dcnode-id="2163" instrument_node="">Due date for submission of requested information: </span><strong data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">02 April 2021</span></strong><span data-dcnode-id="2160" instrument_node="">.</span></p><p data-dcnode-id="2155"><a data-dcnode-id="2156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1380/531" target="_blank"><strong data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">Click here to open RFI ACT SACT 21-25</span></strong></a></p><p data-dcnode-id="2151"><a data-dcnode-id="2152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1484/531" target="_blank"><strong data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">Click here to open RFI ACT SACT 21-25 Questions &amp; Answers</span></strong></a></p><p data-dcnode-id="2147"><a data-dcnode-id="2148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1381/531" target="_blank"><strong data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">Click here to download the survey "RFI-ACT-SACT21-25 CIS Cyber CPP – Requirements" (MS Excel format)</span></strong></a></p><p data-dcnode-id="2142"><span data-dcnode-id="2146" instrument_node="">To enhance understanding of NATO needs and proposed solutions, HQ SACT will schedule a presentation and conduct a collaborative question and answer (Q&amp;A) session with NATO subject matter representatives on </span><strong data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">12 April 2021</span></strong><span data-dcnode-id="2143" instrument_node="">, as part of the TIDE Sprint Cyberspace Track.</span></p><ul data-dcnode-id="2123"><li data-dcnode-id="2138"><strong data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">Session</span></strong><span data-dcnode-id="2139" instrument_node="">: 12 April 2021 | 0930-1200 EST | 1430-1700 GMT | 1530-1800 CET;</span></li><li data-dcnode-id="2134"><strong data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">Description</span></strong><span data-dcnode-id="2135" instrument_node="">: The Cyberspace Capability Development team will provide an overview of the Request For Information (RFI) concerning CIS Security maintenance capabilities, with some information regarding the options of Adopt, Buy or Create. The Cyberspace Capability Development team will then discuss, in a round table format, the unique opportunities and challenges relating to the Adoption, Purchase and Creation of the specific cyberspace capabilities described. Any industry or Nation respondents are invited to participate and offer their feedback. Participants are asked to come prepared to brainstorm alternatives regarding NATO cyberspace capabilities, including out of the box thinking to accelerate NATO cyberspace capability development.</span></li><li data-dcnode-id="2124"><strong data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">Registration</span></strong><span data-dcnode-id="2131" instrument_node="">: Please register for the event by </span><u data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">2 April 2021 (at the latest)</span></u><span data-dcnode-id="2128" instrument_node=""> by sending your contact details to </span><a data-dcnode-id="2126" href="mailto:antoine.landry@act.nato.int"><span data-dcnode-id="2127" instrument_node="">antoine.landry@act.nato.int</span></a><span data-dcnode-id="2125" instrument_node="">. Please include the name, phone number, email address and organization for all participants as applicable.</span></li></ul><hr data-dcnode-id="2122"><p data-dcnode-id="2119"><strong data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">RFI ACT SACT 21-08</span></strong></p><p data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">Request for Information (RFI) Call for Industry input to NATO’s Future Electronic Warfare (EW) Command &amp; Control (C2) Capabilities.</span></p><p data-dcnode-id="2115"><span data-dcnode-id="2116" instrument_node="">Suppliers wishing to respond to this RFI should read this document carefully and follow the guidance for responding.</span></p><p data-dcnode-id="2110"><span data-dcnode-id="2114" instrument_node="">Due date for submission of requested information: </span><strong data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">05 March 2021</span></strong><span data-dcnode-id="2111" instrument_node="">.</span></p><p data-dcnode-id="2106"><a data-dcnode-id="2107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1330" target="_blank"><strong data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">Click here to open RFI ACT SACT 21-08 Amendment #1</span></strong></a></p><p data-dcnode-id="2102"><a data-dcnode-id="2103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1331" target="_blank"><strong data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">Click here to download the response template (MS Excel format)</span></strong></a></p><p data-dcnode-id="2098"><a data-dcnode-id="2099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1389" target="_blank"><strong data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">Click here to download Questions &amp; Answers #1</span></strong></a></p><p data-dcnode-id="2094"><a data-dcnode-id="2095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1390" target="_blank"><strong data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">Click here to download the "Questions &amp; Answers Session Overview Briefing"</span></strong></a></p><p data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">Amendment #1 to RFI ACT SACT 21-08:</span></p><p data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">To enhance understanding of NATO needs, HQ SACT conducted two GoToWebinar collaborative question and answer (Q&amp;A) sessions with NATO subject matter representatives on 22 February.</span></p><p data-dcnode-id="2088"><span data-dcnode-id="2089" instrument_node="">First Session: 0730-0900 EST | 1230-1400 GMT | 1330-1500 CET;</span></p><p data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">Second Session: 0930-1100 EST | 1430-1600 GMT | 1530-1700 CET.</span></p><p data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">To ensure transparency and fairness for companies, these sessions have been recorded and are available to all below.</span></p><iframe allowfullscreen="" data-dcnode-id="1962" frameborder="0" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~4afb759613&amp;raw" width="256"><html data-dcnode-i </span><div data-dcnode-id="1844" id="iw_Loading_box"><div class="iwLoading drk" data-dcnode-id="1845"><div data-dcnode-id="1846"></div></div></div></body></html></iframe><hr data-dcnode-id="1839"><p data-dcnode-id="1836"><strong data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">IFIB ACT SACT 21-02</span></strong></p><p data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">HQ SACT is seeking contract support to establish the conditions in which SACT has timely access to the leading-edge capabilities necessary to tackle challenges and problems whose size and complexity defy solutions by solely using existing staff or tools within NATO’s established organisation. TACTICS II is an integral part of SACT’s comprehensive organizational and operating strategy that enables mission accomplishment by integrating high quality deliverables from trusted industry partners, with the unique and manifold capacities of NATO’s established workforce and toolset.</span></p><p data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">Strategic Factors Driving TACTICS II Contract Deliverables:</span></p><p data-dcnode-id="1826"><span data-dcnode-id="1831" instrument_node="">Driver: Capability Development. As a key part of the NATO Command Structure Functional Adaptation (NCS-FA), NATO is launching a New Governance Model (NGM) for the development of its Common Funded Capabilities. Demand signals for transformative and adaptive products, as described in this SOW, will be generated systematically from the NGM as well as occasionally from other sources. This emphasizes the point that TACTICS II will be used to support long-term, programmed needs, as well to assist in meeting shorter- term pop-up requirements. Examples of support may include requirements elicitation, analysis, experimentation, acceptance testing, etc.</span><br data-dcnode-id="1830"><span data-dcnode-id="1829" instrument_node="">Driver: New Concepts. The NATO Warfighting Capstone Concept (NWCC), which is due to be published in December 2020, is expected to be a watershed, from which a series of subordinate concepts will evolve. Within the CD&amp;E process, TACTICS II is likely to be required to contribute to conceptual developments by supporting early stage research and brainstorming, through refinement, to eventual concept testing.</span><br data-dcnode-id="1828"><span data-dcnode-id="1827" instrument_node="">Driver: Experimentation. NATO nations continue to recognize the value of experimentation in transforming, adapting and innovating for Alliance modernization. Nations cannot afford to make ill-informed investment decisions; this is where experimentation provides a tool through which to discover, test and validate courses of action before committing to decision. Meticulous planning and experiment design work is needed in order to ensure objectivity and the provision of irrefutable evidence. This is time-consuming, technical work. While much of HQ SACT’s Operational Experimentation Branch’s program comprises deliberate, programmed experimentation, there is also a requirement to respond to urgent requirements; this creates a tension, which must be managed, between high quality experimentation and the delivery of essential outcomes for customers, including commanders and forces engaged in current operations. The execution of TACTICS II tasks and the development of deliverables will take place in both programmed and urgent scenarios, contributing to SACT’s ability to steady-state and pop-up demand signals.</span></p><p data-dcnode-id="1822"><strong data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">Period of Performance</span></strong><span data-dcnode-id="1823" instrument_node="">: Base Period: 1 April 2021 – 31 December 2021 with four possible 12 month option periods (1 January 2022 – 31 December 2022, 1 January 2023 – 31 December 2023, 1 January 2024 – 31 December 2024, 1 January 2025 – 31 December 2025). Available options shall be exercised at the sole discretion of the HQ SACT Contracting Officer, based on satisfactory work performance, available funding, and on-going/ evolving work requirements.</span></p><p data-dcnode-id="1812"><strong data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">Bid Closing Date</span></strong><span data-dcnode-id="1819" instrument_node="">: Bids shall be received at HQ SACT, Purchasing &amp; Contracting Office, no later than  </span><s data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">15 January 2021</span></s><span data-dcnode-id="1816" instrument_node=""> </span><strong data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">1 February 2021</span></strong><span data-dcnode-id="1813" instrument_node="">, 09:00 Eastern Standard Time, Norfolk, Virginia, USA. No bids shall be accepted after this time and date.</span></p><p data-dcnode-id="1808"><strong data-dcnode-id="1809"><a data-dcnode-id="1810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1325/524" target="_blank"><span data-dcnode-id="1811" instrument_node="">Click here to open IFIB 21-02 Amendment #1, updating bid closing time.</span></a></strong></p><p data-dcnode-id="1804"><a data-dcnode-id="1805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1341/524" target="_blank"><strong data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">Click here to open Questions &amp; Answers #1</span></strong></a></p><hr data-dcnode-id="1803"><p data-dcnode-id="1800"><strong data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">NOI FOR IFIB ACT SACT 21-02</span></strong></p><p data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">HQ SACT is seeking contract support to establish the conditions in which SACT has timely access to the leading-edge capabilities necessary to tackle challenges and problems whose size and complexity defy solutions by solely using existing staff or tools within NATO’s established organisation. TACTICS II is an integral part of SACT’s comprehensive organizational and operating strategy that enables mission accomplishment by integrating high quality deliverables from trusted industry partners, with the unique and manifold capacities of NATO’s established workforce and toolset.</span></p><p data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">Strategic Factors Driving TACTICS II Contract Deliverables:</span></p><p data-dcnode-id="1790"><span data-dcnode-id="1795" instrument_node="">Driver: Capability Development. As a key part of the NATO Command Structure Functional Adaptation (NCS-FA), NATO is launching a New Governance Model (NGM) for the development of its Common Funded Capabilities. Demand signals for transformative and adaptive products, as described in this SOW, will be generated systematically from the NGM as well as occasionally from other sources. This emphasizes the point that TACTICS II will be used to support long-term, programmed needs, as well to assist in meeting shorter- term pop-up requirements. Examples of support may include requirements elicitation, analysis, experimentation, acceptance testing, etc.</span><br data-dcnode-id="1794"><span data-dcnode-id="1793" instrument_node="">Driver: New Concepts. The NATO Warfighting Capstone Concept (NWCC), which is due to be published in December 2020, is expected to be a watershed, from which a series of subordinate concepts will evolve. Within the CD&amp;E process, TACTICS II is likely to be required to contribute to conceptual developments by supporting early stage research and brainstorming, through refinement, to eventual concept testing.</span><br data-dcnode-id="1792"><span data-dcnode-id="1791" instrument_node="">Driver: Experimentation. NATO nations continue to recognize the value of experimentation in transforming, adapting and innovating for Alliance modernization. Nations cannot afford to make ill-informed investment decisions; this is where experimentation provides a tool through which to discover, test and validate courses of action before committing to decision. Meticulous planning and experiment design work is needed in order to ensure objectivity and the provision of irrefutable evidence. This is time-consuming, technical work. While much of HQ SACT’s Operational Experimentation Branch’s program comprises deliberate, programmed experimentation, there is also a requirement to respond to urgent requirements; this creates a tension, which must be managed, between high quality experimentation and the delivery of essential outcomes for customers, including commanders and forces engaged in current operations. The execution of TACTICS II tasks and the development of deliverables will take place in both programmed and urgent scenarios, contributing to SACT’s ability to steady-state and pop-up demand signals.</span></p><p data-dcnode-id="1786"><strong data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">Period of Performance</span></strong><span data-dcnode-id="1787" instrument_node="">: Base Period: on or about 1 March 2021 – 31 December 2021 with four potential 12 month option periods; 1 January 2022 – 31 December 2022, 1 January 2023 – 31 December 2023, 1 January 2024 – 31 December 2024, 1 January 2022 – 31 December 2025. Available options shall be exercised at the sole discretion of the HQ SACT Contracting Officer, based on satisfactory work performance, available funding, and on-going/ evolving work requirements.</span></p><p data-dcnode-id="1782"><strong data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">Issue Date</span></strong><span data-dcnode-id="1783" instrument_node="">: 23 October 2020</span></p><p data-dcnode-id="1778"><strong data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">Bid Closing Date</span></strong><span data-dcnode-id="1779" instrument_node="">: Estimated 3 December 2020</span></p><p data-dcnode-id="1773"><strong data-dcnode-id="1774"><a data-dcnode-id="1776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1225/489" target="_blank"><span data-dcnode-id="1777" instrument_node="">Click here to open Notification of Intent 21-02</span></a><span data-dcnode-id="1775" instrument_node="">.</span></strong></p><hr data-dcnode-id="1772"><p data-dcnode-id="1768"><strong data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">IFIB ACT SACT 21-01</span></strong><br data-dcnode-id="1769"></p><p data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">HQ SACT is seeking contract support for two studies that will address the future needs of Warfare Development and serve to meet some of the requirements of the initial NATO Warfighting Capability Concept (iNWCC). These studies are:</span></p><ul data-dcnode-id="1743"><li data-dcnode-id="1759"><span data-dcnode-id="1765" instrument_node="">Space Technologies Horizon Scan Study</span><ul data-dcnode-id="1760"><li data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">Identification of which future technologies could be used and how they may be integrated;</span></li><li data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">Identification of risks and opportunities these new technologies and tools present to the Alliance.</span></li></ul></li><li data-dcnode-id="1744"><span data-dcnode-id="1758" instrument_node="">Small Satellites in Military Space Operations Study</span><ul data-dcnode-id="1745"><li data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">Overview of small satellites and availability for potential military use within various functional areas;</span></li><li data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">Potential and limitations of CubeSats in various functional areas;</span></li><li data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">Overview of current and future commercial and govt. capability to launch small satellites;</span></li><li data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">Operational use cases;</span></li><li data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">Identification of risks and opportunities;</span></li><li data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">Recommendations for the Alliance.</span></li></ul></li></ul><p data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">Both studies will be developed over a 12-month period.</span></p><p data-dcnode-id="1737"><strong data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">Period of Performance</span></strong><span data-dcnode-id="1738" instrument_node="">: Base Period: 6 January 2021 – 15 December 2021</span></p><p data-dcnode-id="1730"><strong data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">Bid Closing Date</span></strong><span data-dcnode-id="1734" instrument_node="">: </span><strong data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">03 December 2020</span></strong><span data-dcnode-id="1731" instrument_node="">, 09:00 Eastern Standard Time, Norfolk, Virginia, USA. No bids shall be accepted after this time and date.</span></p><p data-dcnode-id="1725"><strong data-dcnode-id="1726"><a data-dcnode-id="1728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1261" target="_blank"><span data-dcnode-id="1729" instrument_node="">Click here to open IFIB 21-01 Amendment #1 (extending the deadline for submission of proposals to 03 December 2020, 0900 EST)</span></a><span data-dcnode-id="1727" instrument_node="">.</span></strong></p><p data-dcnode-id="1720"><strong data-dcnode-id="1721"><a data-dcnode-id="1723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato. use cases;</span></li><li data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">Identification of risks and opportunities;</span></li><li data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Recommendations for the Alliance.</span></li></ul></li></ul><p data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Both studies will be developed over a 12-month period.</span></p><p data-dcnode-id="1685"><strong data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">Period of Performance</span></strong><span data-dcnode-id="1686" instrument_node="">: Base Period: on or about 4 January 2021 – 31 December 2021</span></p><p data-dcnode-id="1681"><strong data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">Issue Date</span></strong><span data-dcnode-id="1682" instrument_node="">: 9 October 2020</span></p><p data-dcnode-id="1677"><strong data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">Bid Closing Date</span></strong><span data-dcnode-id="1678" instrument_node="">: Estimated 20 November 2020</span></p><p data-dcnode-id="1671"><strong data-dcnode-id="1672"><a data-dcnode-id="1675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1221/488" target="_blank"><span data-dcnode-id="1676" instrument_node="">Click here to open Notification of Intent 21-01</span></a><span data-dcnode-id="1674" instrument_node="">.</span><br data-dcnode-id="1673"></strong></p><span data-dcnode-id="1670" instrument_node=""> </span></div><span data-dcnode-id="1668" instrument_node="">

ing (IFIB) for Information Knowledge Management Functional Administration Deliverable Services to support SharePoint based systems on the Business and Exercise Networks.</span></p><p data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">The Joint Force Training Centre (JFTC) is going to conduct the bidding to select the Provider that shall provide deliverables within information and knowledge management functional administration domain to support SharePoint based systems (such as Enterprise Document Management System (EDMS), Tasker Tracker Plus (TT+), Intranet and Extranet portals) crucial to all the JFTC’s staff (users).</span></p><p data-dcnode-id="1373"><span data-dcnode-id="1376" instrument_node="">Base Period: in or about 01 August - 31 December 2020</span><br data-dcnode-id="1375"><span data-dcnode-id="1374" instrument_node="">Option Periods: there will be three (3) following option periods of 12 months each (years 2021-2023).</span></p><p data-dcnode-id="1369"><a data-dcnode-id="1371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1095/463" target="_blank"><span data-dcnode-id="1372" instrument_node="">Click here to open NOI for IFIB ACT JFTC 20-42</span></a><span data-dcnode-id="1370" instrument_node="">.</span></p><hr data-dcnode-id="1368"><p data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">NOI RFP ACT SACT 20-38</span></p><p data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">Headquarters Allied Command Transformation (HQ SACT), Staff Training Coordination Section (STC) is HQ SACT's enabler and a vehicle for the individual education and training, delivered to all personnel serving with HQ SACT. The STC mission is to provide residential education and training for staff personnel, in order to ensure that every member is fully trained and educated to work effectively.</span></p><p data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">Essential role of STC is to furnish timely and effective educational and training events for familiarization of the incumbent with NATO Alliance and Allied Command Transformation (ACT). Furthermore, facilitate a thorough understanding about ACT`s output, its structure and working processes.</span></p><p data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">The contractor provider's main area of responsibility will be to oversee and manage the seat allocation procedures, required for a candidate to acquire a seat for a specific course at NATO School Oberammergau. The service includes being the Single Point of Contact (SPoC) at ACT, and be responsible for the subject matter expert- completing all students' enrollment from ACT with efficiency and accuracy.</span></p><p data-dcnode-id="1355"><a data-dcnode-id="1357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1097/465" target="_blank"><strong data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">Click here to open NOI for RFP ACT SACT 20-38</span></strong></a><span data-dcnode-id="1356" instrument_node="">.</span></p><hr data-dcnode-id="1354"><p data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">RFI ACT SACT 20-31</span></p><p data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">Headquarters Supreme Allied Commander Transformation (HQ SACT) is issuing this Request For Information (RFI) announcement in order to determine what level of interest may exist for industry demonstrations during Crisis Management Exercise 2021 (CMX21).</span></p><p data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">The purpose of the RFI is to demonstrate state of the art technology during CMX21 that can assist with strategic political/military and operational decision-making and the preparation for and conduct of the CMX. Any demonstration contemplated must be on a non-interference basis with the exercise.</span></p><p data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">The expected input from industry is to confirm their interest in participating in demonstrations during CMX21 by completing the attached template. In general, the template asks questions related to their product or service and how their product or service could contribute to assisting decision-making and training at the strategic political/military and operational levels.</span></p><p data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">ACT values ideas and information provided by industry and seeks their demonstration of knowledge during CMX21 to be as close as possible to political/military operations realities and challenges. CMX21 is an exercise held at NATO Headquarters in Brussels, Belgium and in all the NATO capitals as well as participating military headquarters. It is expected that industry will only be invited to demonstrate at NATO HQ. The exercise is classified up to NATO Secret.</span></p><p data-dcnode-id="1340"><a data-dcnode-id="1341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1166/460" target="_blank"><strong data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">Click here to download RFI-ACT-SACT-20-31 Amendment #1 - Deadline for submission has been extended to 6 July 2020 1200 EST</span></strong></a></p><p data-dcnode-id="1336"><a data-dcnode-id="1337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1088/460" target="_blank"><strong data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">Click here to download RFI-ACT-SACT-20-31</span></strong></a></p><p data-dcnode-id="1332"><a data-dcnode-id="1333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1122/460" target="_blank"><strong data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">Click here to download the minutes from the first Questions &amp; Answers session (27 May 2020, 09:00 EST)</span></strong></a></p><p data-dcnode-id="1328"><a data-dcnode-id="1329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1142/460" target="_blank"><strong data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">Click here to download the minutes from the second Questions &amp; Answers session (17 June 2020, 09:00 EST)</span></strong></a></p><p data-dcnode-id="1324"><a data-dcnode-id="1325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1143/460" target="_blank"><strong data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">Click here to download the pending Questions &amp; Answers from sessions I and II</span></strong></a></p><p data-dcnode-id="1320"><a data-dcnode-id="1321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1089/460" target="_blank"><strong data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">Click here to download the response template (MS Excel format)</span></strong></a></p><hr data-dcnode-id="1319"><p data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">RFI ACT SACT 20-30</span></p><p data-dcnode-id="1313"><a data-dcnode-id="1314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1077/451" target="_blank"><strong data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">Request for Information (RFI) Call for Industry input to NATO’s High Throughput</span></strong></a></p><p data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node=""> Satellite Development Experiment 2020 (HTS DevEx 20).</span></p><p data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">Suppliers wishing to respond to this RFI should read this document carefully and follow the guidance for responding.</span></p><p data-dcnode-id="1306"><strong data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">THIS RFI HAS BEEN CANCELLED.</span></strong></p><hr data-dcnode-id="1305"><p data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">IFIB ACT SACT 20-28</span></p><p data-dcnode-id="1299"><a data-dcnode-id="1300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1083/455" target="_blank"><strong data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">CONTRACTOR SUPPORT TO CAPABILITY DEVELOPMENT – REQUIREMENTS MANAGER</span></strong></a></p><p data-dcnode-id="1293"><span data-dcnode-id="1298" instrument_node="">As part of an adapted organisational structure, ACT is in the process of implementing an improved capability requirements capture process, including the support for traceability, quality assurance, analysis and interoperability standards, to ensure a clear separation between the requirements owner and the solution provider. This process will provide through life traceability and ensure the quality of the requirements using an efficient change management process. ACT will be responsible for tasks such as capability requirements definition, requirements management, systems engineering, architecture development, holistic through life cycle management, capability acceptance, Capability Programme management.</span><br data-dcnode-id="1297"><span data-dcnode-id="1296" instrument_node="">The outputs of the adapted structure are formed from requirements, portfolio, programme and project management principles and practices that enable the direction of capability programmes and a range of projects in a transparent through lifecycle capability approach.</span><br data-dcnode-id="1295"><span data-dcnode-id="1294" instrument_node="">They include comprehensive traceable capability requirements that have been assessed and analysed for alternative solutions and quality assured to provide interoperability, and the delivery of multi-domain and multi-functional C4ISR focused programmes.</span></p><p data-dcnode-id="1290"><strong data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">Bids shall be received at HQ SACT, Purchasing and Contracting Office, no later than 05 Jun 2020, 1200 hours, Eastern Standard Time, Norfolk, Virginia, USA. No bids shall be accepted after this time and date.</span></strong></p><p data-dcnode-id="1286"><a data-dcnode-id="1287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1090/455" target="_blank"><strong data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">Questions &amp; Answers #1</span></strong></a></p><hr data-dcnode-id="1285"><p data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">NOI FOR IFIB ACT SACT 20-28</span></p><p data-dcnode-id="1279"><a data-dcnode-id="1280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.act.nato.int/download_file/view/1078" target="_blank"><strong data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">Notification of Intent to issue an Invitation for International Bidding (IFIB) for Contractor Support for Requirements Management Support.</span></strong></a></p><p data-dcnode-id="1273"><span data-dcnode-id="1278" instrument_node="">HQ SACT is seeking senior contractor support in Requirements Management as part of an adapted organisational structure, ACT is in the process of implementing an improved capability requirements capture process, including the support for traceability, quality assurance, analysis and interoperability standards, to ensure a clear separation between the requirements owner and the solution provider. This process will provide through life traceability and ensure the quality of the requirements using an efficient change management process. ACT will be responsible for tasks such as capability requirements definition, requirements management, systems engineering, architecture development, holistic through life cycle management, capability acceptance, Capability Programme management.</span><br data-dcnode-id="1277"><span data-dcnode-id="1276" instrument_node="">The outputs of the adapted structure are formed from requirements, portfolio, programme and project management principles and practices that enable the direction of capability programmes and a range of projects in a transparent through lifecycle capability approach.</span><br data-dcnode-id="1275"><span data-dcnode-id="1274" instrument_node="">They include comprehensive traceable capability requirements that have been assessed and analysed for alternative solutions and quality assured to provide interoperability, and the delivery of multi-domain and multi-functional C4ISR focused programmes.</span></p><hr data-dcnode-id="1272"><p data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">NOI FOR IFIB ACT SACT 20-24</span></p><p data-dcnode-id="1266"><a data-dcnode-id="1267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.act.nato.int/download_file/view/1053"><strong data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">Notification of Intent to issue an Invitation for International Bidding (IFIB) for Contractor Support for Innovation Branch Multimedia and Campaign Assistance.</span></strong></a></p><p data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">HQ SACT is seeking contract support to assist with the management and execution of specific and significant multi-media capabilities and ensure a sustained media presence not addressed by traditional NATO strategic communication assets. The IH’s main task is to crowd-source support from a worldwide community of experts to develop solutions for NATO’s issues. The priority of the IH communication and media activities is to attract and encourage participation in the IH activities, elicit problem owners and end users to collaborate with the IH. In addition, it is imperative to improve the overall awareness and reputation of the IH. Support is required to assist with developing solutions to target a very specific audience and engage with this audience through various and evolving social media channels. As well, all Innovation Hub activities welcome online participation and are broadcasted.</span></p><hr data-dcnode-id="1263"><p data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">IFIB ACT SACT 20-23</span></p><p data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">HQ SACT is seeking contract support for Software Intensive Projects (SIP) including Solution Architects, DevSecOps Engineers, Full-Stack Developers, Data Science Engineers, UI/DX Designers, Platform Architects. Product Mangers, Agile Acquisition and software Security to expand their iLab Agile DevSecOps operation. The contractors will be embedded within ACT Innovation Lab team and will follow agile methodology to develop required application in incremental, user-centric fashion. The ACT Innovation lab team will follow rapid development cycles, each resulting in Minimum Viable Product, deployable in sandbox environment, and demonstrable to end-users. The Contractors’ embedded within iLab teams, will work under the direction and guidance of the COTR.</span></p><p data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">The preferred location of work performance is the Innovation Lab at Old Dominion University campus in Norfolk, Virginia, or at ACT Headquarters, 7857 Blandy Road, Suite 100, Norfolk Virginia however the option to work remotely is also possible for many of the labour categories. In the case of remote work the contractors will still be considered part of Agile Innovation Lab teams, and will utilize the same toolset as the rest of the team. It will be the contractor responsibility to provide their own devices for conducting the remote work.</span></p><p data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">The intention is to initiate the contract with a core team of personnel across all labour categories; this core team will remain constant and move from one project to another as needed. Additionally, the contract shall have a robust surge capacity and selected contractors will be able to compete for further task order awards as iLab expands its operations.</span></p><p data-dcnode-id="1251"><strong data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">Period of Performance</span></strong><span data-dcnode-id="1252" instrument_node="">: Base Period: on or about 1 January 2021 – 31 December 2021 with four 12 month option periods.</span></p><p data-dcnode-id="1244"><strong data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">Bid Closing Date</span></strong><span data-dcnode-id="1248" instrument_node="">: Bids shall be received at HQ SACT, Purchasing and Contracting Office, </span><strong data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">no later than 15 January 2021, 0900 hours, Eastern Standard Time</span></strong><span data-dcnode-id="1245" instrument_node="">, Norfolk, Virginia, USA. No bids shall be accepted after this time and date.</span></p><p data-dcnode-id="1239"><strong data-dcnode-id="1240"><a data-dcnode-id="1242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1338/490" target="_blank"><span data-dcnode-id="1243" instrument_node="">Click here to open IFIB 20-23 Amendment #2</span></a><span data-dcnode-id="1241" instrument_node="">.</span></strong></p><p data-dcnode-id="1235"><a data-dcnode-id="1236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1318/490" target="_blank"><strong data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Questions &amp; Answers #1</span></strong></a></p><p data-dcnode-id="1231"><a data-dcnode-id="1232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1337/490" target="_blank"><strong data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">Questions &amp; Answers #2</span></strong></a></p><hr data-dcnode-id="1230"><p data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">NOI for IFIB ACT SACT 20-23</span></p><p data-dcnode-id="1224"><a data-dcnode-id="1225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1052/444"><strong data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">Notification of Intent to issue an Invitation for International Bidding (IFIB) for Contractor Support for Innovation Branch Application Development.</span></strong></a></p><p data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">HQ SACT is seeking contract support for Software Intensive Projects (SIP) including Solution Architects, DevSecOps Engineers, Full-Stack Developers, Data Science Engineers, VR/AR Engineers, and Product Mangers to expand their iLab Agile DevSecOps operation. The contractors will be embedded within ACT Innovation Lab team and will follow agile methodology to develop required application in incremental, user- centric fashion. The ACT Innovation lab team will follow rapid development cycles, each resulting in Minimum Viable Product, deployable in sandbox environment, and demonstrable to end-users. The Contractors’ embedded within iLab teams, will work under the direction and guidance of the COTR.</span></p><hr data-dcnode-id="1221"><p data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">RFIP ACT SACT 20-18</span></p><p data-dcnode-id="1214"><a data-dcnode-id="1216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A/ 4"><span data-dcnode-id="705" instrument_node="">IFIB ACT SACT 18-75:</span></strong><span data-dcnode-id="703" instrument_node=""> Invitation for International Bidding (IFIB) for a Pilot Study on Improving Strategic Foresight Analysis (SFA) Using Data Science Tools and Techniques, Automation and Software Support to Analyst at Headquarter Supreme Allied Commander Transformation, Norfolk, Virginia, U.S.A. </span><a data-dcnode-id="701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/budfin/ifib018075b.pdf"><span data-dcnode-id="702" instrument_node="">Read More</span></a></p><hr data-dcnode-id="699"><p data-dcnode-id="687"><a data-dcnode-id="696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/budfin/ifib018001.pdf" rel="noreferrer" target="_blank"><strong data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">IFIB ACT 18-01: Invitation for International Bidding (IFIB) for Contractor support to Headquarters Supreme Allied Commander Transformation for the Satellite Communications (SATCOM) Programme Management Office (PMO), HQ SACT, Norfolk, Virginia, U.S.A.</span></strong></a><br data-dcnode-id="695"><a data-dcnode-id="692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/budfin/ifib018001_amdt1.pdf" target="_blank"><strong data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Amendment #1</span></strong></a><br data-dcnode-id="691"><strong data-dcnode-id="688"><a data-dcnode-id="689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/budfin/ifib018001_qa1.pdf" target="_blank"><span data-dcnode-id="690" instrument_node="">Questions &amp; Answers #1</span></a></strong></p><p data-dcnode-id="683"><a data-dcnode-id="684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/budfin/noi1801.pdf" rel="noreferrer" target="_blank"><strong data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">NOI-IFIB-ACT-SACT-18-01: Notification of Intent to issue an Invitation for International Bidding (IFIB) for Contractor Support for BI-SC Satellite Communication (SATCOM) Project Management Office.</span></strong></a></p><span data-dcnode-id="682" instrument_node=""> </span></div><span data-dcnode-id="680" instrument_node="">
