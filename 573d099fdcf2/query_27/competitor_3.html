</span><h2 class="panel-title" data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">Frequently Asked Questions</span></h2><span data-dcnode-id="673" instrument_node=""> </span></div><span data-dcnode-id="671" instrument_node="">
</span><div class="simple-accordion-description" data-dcnode-id="314"><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="662"><span data-dcnode-id="669" instrument_node="">Below are some frequently asked questions about NATO Contracting. If you can't find an answer to your question, please send an email to: </span><a data-dcnode-id="666" href="mailto:kevin.mills@act.nato.int"><strong data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">kevin.mills@act.nato.int</span></strong></a><span data-dcnode-id="665" instrument_node="">.</span><br data-dcnode-id="664"><br data-dcnode-id="663"></p><ul data-dcnode-id="576"><a data-dcnode-id="661" name="top" title="top"></a><li data-dcnode-id="657"><strong data-dcnode-id="658"><a data-dcnode-id="659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%231"><span data-dcnode-id="660" instrument_node="">I am a business who is interested in bidding on NATO SACT solicitations. Where can I review solicitations and present-day requirements?</span></a></strong></li><li data-dcnode-id="653"><strong data-dcnode-id="654"><a data-dcnode-id="655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%232"><span data-dcnode-id="656" instrument_node="">What kind of security clearance do I need to contract for NATO?</span></a></strong></li><li data-dcnode-id="649"><strong data-dcnode-id="650"><a data-dcnode-id="651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%233"><span data-dcnode-id="652" instrument_node="">Do I already have the necessary clearance?</span></a></strong></li><li data-dcnode-id="645"><strong data-dcnode-id="646"><a data-dcnode-id="647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%234"><span data-dcnode-id="648" instrument_node="">Are NATO security clearances the same as clearances for my nation? In other words, if I already have a national security clearance, do I have NATO clearance as well?</span></a></strong></li><li data-dcnode-id="641"><strong data-dcnode-id="642"><a data-dcnode-id="643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%235"><span data-dcnode-id="644" instrument_node="">Where can I get the necessary security clearance to submit a compliant proposal?</span></a></strong></li><li data-dcnode-id="637"><strong data-dcnode-id="638"><a data-dcnode-id="639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%236"><span data-dcnode-id="640" instrument_node="">Can NATO get me the necessary clearance to start work on my proposal?</span></a></strong></li><li data-dcnode-id="633"><strong data-dcnode-id="634"><a data-dcnode-id="635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%237"><span data-dcnode-id="636" instrument_node="">Who should I use as a point of contact at NATO for discussion before and after submitting a proposal? To whom should I address questions about the project or the Statement of Work?</span></a></strong></li><li data-dcnode-id="629"><strong data-dcnode-id="630"><a data-dcnode-id="631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%238"><span data-dcnode-id="632" instrument_node="">Who else is bidding or submitting a proposal and what price(s) are they quoting?</span></a></strong></li><li data-dcnode-id="625"><strong data-dcnode-id="626"><a data-dcnode-id="627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%239"><span data-dcnode-id="628" instrument_node="">How do taxes and tax exemptions work?</span></a></strong></li><li data-dcnode-id="621"><strong data-dcnode-id="622"><a data-dcnode-id="623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%2310"><span data-dcnode-id="624" instrument_node="">Will work on this project be tax exempt?</span></a></strong></li><li data-dcnode-id="617"><strong data-dcnode-id="618"><a data-dcnode-id="619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%2311"><span data-dcnode-id="620" instrument_node="">Can my proposal deviate from the RFP?</span></a></strong></li><li data-dcnode-id="613"><strong data-dcnode-id="614"><a data-dcnode-id="615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%2312"><span data-dcnode-id="616" instrument_node="">May my company submit more than one proposal?</span></a></strong></li><li data-dcnode-id="609"><strong data-dcnode-id="610"><a data-dcnode-id="611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%2313"><span data-dcnode-id="612" instrument_node="">Does NATO prefer either small or large businesses in its proposal selection?</span></a></strong></li><li data-dcnode-id="605"><strong data-dcnode-id="606"><a data-dcnode-id="607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%2314"><span data-dcnode-id="608" instrument_node="">Is there a possibility that the award will be split (i.e. more than one contractor could receive a portion of the award)?</span></a></strong></li><li data-dcnode-id="601"><strong data-dcnode-id="602"><a data-dcnode-id="603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%2315"><span data-dcnode-id="604" instrument_node="">Are there any categories of firms to which NATO gives special treatment (i.e. registered small business or veteran owned firm)?</span></a></strong></li><li data-dcnode-id="597"><strong data-dcnode-id="598"><a data-dcnode-id="599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%2316"><span data-dcnode-id="600" instrument_node="">Does my business have to be from a NATO Nation in order to submit a proposal?</span></a></strong></li><li data-dcnode-id="593"><strong data-dcnode-id="594"><a data-dcnode-id="595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%2317"><span data-dcnode-id="596" instrument_node="">What is the international bidding process?</span></a></strong></li><li data-dcnode-id="589"><strong data-dcnode-id="590"><a data-dcnode-id="591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%2318"><span data-dcnode-id="592" instrument_node="">My company is from overseas; can my company bid on an RFP that was not posted internationally?</span></a></strong></li><li data-dcnode-id="585"><a data-dcnode-id="586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%2319"><strong data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Must I have a Technical Assistance Agreement (TAA) to do business with NATO?</span></strong></a></li><li data-dcnode-id="581"><a data-dcnode-id="582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%2320"><strong data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Can you provide additional information about visas for non-US contractor personnel from other NATO nations entering the US to perform contractual duties at HQ SACT or other locations within the US?</span></strong></a></li><li data-dcnode-id="577"><a data-dcnode-id="578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%2321"><strong data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Are candidates holding H1B visas acceptable?</span></strong></a></li></ul><p data-dcnode-id="562"><br data-dcnode-id="575"><strong data-dcnode-id="572"><a data-dcnode-id="574" name="1" title="1"></a><span data-dcnode-id="573" instrument_node="">I am a business who is interested in bidding on NATO SACT solicitations. Where can I review solicitations and present-day requirements?</span></strong><br data-dcnode-id="571"><br data-dcnode-id="570"><span data-dcnode-id="569" instrument_node="">Information about NATO solicitations can be found on this page, above, or </span><a data-dcnode-id="567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fbo.gov/" target="_blank"><strong data-dcnode-id="568"></strong></a><strong data-dcnode-id="564"><a data-dcnode-id="565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fbo.gov/"><span data-dcnode-id="566" instrument_node="">http://www.fbo.gov/</span></a></strong><span data-dcnode-id="563" instrument_node=""> under DOD, ODA &amp; NATO.</span></p><p data-dcnode-id="557"><strong data-dcnode-id="558"><em data-dcnode-id="559"><a data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%23top"><span data-dcnode-id="561" instrument_node="">Return to questions</span></a></em></strong></p><p data-dcnode-id="553"><strong data-dcnode-id="554"><a data-dcnode-id="556" name="2" title="2"></a><span data-dcnode-id="555" instrument_node="">What kind of security clearance do I need to contract for NATO?</span></strong></p><p data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">The Statement of Work for the Request for Proposal will specifically state the level of clearance required by NATO. In general, at minimum, NATO SECRET clearance is mandatory.</span></p><p data-dcnode-id="546"><strong data-dcnode-id="547"><em data-dcnode-id="548"><a data-dcnode-id="549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%23top"><span data-dcnode-id="550" instrument_node="">Return to questions</span></a></em></strong></p><p data-dcnode-id="542"><strong data-dcnode-id="543"><a data-dcnode-id="545" name="3" title="3"></a><span data-dcnode-id="544" instrument_node="">Do I already have the necessary clearance?</span></strong></p><p data-dcnode-id="537"><span data-dcnode-id="541" instrument_node="">Generally, providing proof and evidence of proper clearance is the responsibility of the firm submitting a proposal. If the firm already has a security clearance for its home nation, then it probably has access to a NATO clearance; however, the possession of a national security clearance does NOT mean that it holds a NATO security clearance as well. Specific questions can be addressed to the </span><a data-dcnode-id="539" href="mailto:deventsecurity@act.nato.int"><span data-dcnode-id="540" instrument_node="">SACT Security Officer</span></a><span data-dcnode-id="538" instrument_node="">.</span></p><p data-dcnode-id="532"><strong data-dcnode-id="533"><em data-dcnode-id="534"><a data-dcnode-id="535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%23top"><span data-dcnode-id="536" instrument_node="">Return to questions</span></a></em></strong></p><p data-dcnode-id="528"><strong data-dcnode-id="529"><a data-dcnode-id="531" name="4" title="4"></a><span data-dcnode-id="530" instrument_node="">Are NATO security clearances the same as clearances for my nation? In other words, if I already have a national security clearance, do I have NATO clearance as well?</span></strong></p><p data-dcnode-id="521"><span data-dcnode-id="527" instrument_node="">NO. The Statement of Work for the Request for Proposal will specifically state the level of clearance from NATO that the firm will be required to have. NATO's clearance levels function independent of any clearance levels for other nations. However, it is understood that for most NATO nations, granting of a NATO security clearance is handled in a similar manner to that of obtaining a national security clearance. Please contact your National Security Office for information on their procedures for obtaining NATO clearances. Specific questions can be addressed to the </span><a data-dcnode-id="525" href="mailto:deventsecurity@act.nato.int"><span data-dcnode-id="526" instrument_node="">SACT Security Officer</span></a><span data-dcnode-id="524" instrument_node="">.</span><br data-dcnode-id="523"><span data-dcnode-id="522" instrument_node="">Usually, additional investigations do not need to be conducted in order to receive these clearance.</span></p><p data-dcnode-id="516"><strong data-dcnode-id="517"><em data-dcnode-id="518"><a data-dcnode-id="519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%23top"><span data-dcnode-id="520" instrument_node="">Return to questions</span></a></em></strong></p><p data-dcnode-id="512"><strong data-dcnode-id="513"><a data-dcnode-id="515" name="5" title="5"></a><span data-dcnode-id="514" instrument_node="">Where can I get the necessary security clearance to submit a compliant proposal?</span></strong></p><p data-dcnode-id="507"><span data-dcnode-id="511" instrument_node="">It is understood that for most NATO nations, granting of a NATO security clearance is handled in a similar manner to that of obtaining a national security clearance. Please contact your National Security Office for information on their procedures for obtaining NATO clearances. Specific questions can be addressed to the </span><a data-dcnode-id="509" href="mailto:deventsecurity@act.nato.int"><span data-dcnode-id="510" instrument_node="">SACT Security Officer</span></a><span data-dcnode-id="508" instrument_node="">. Usually, additional investigations do not need to be conducted in order to receive these clearances.</span></p><p data-dcnode-id="502"><strong data-dcnode-id="503"><em data-dcnode-id="504"><a data-dcnode-id="505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%23top"><span data-dcnode-id="506" instrument_node="">Return to questions</span></a></em></strong></p><p data-dcnode-id="498"><strong data-dcnode-id="499"><a data-dcnode-id="501" name="6" title="6"></a><span data-dcnode-id="500" instrument_node="">Can NATO get me the necessary clearance to start work on my proposal?</span></strong></p><p data-dcnode-id="493"><span data-dcnode-id="497" instrument_node="">If the firm possesses security clearance from its country, it can obtain a corresponding NATO security clearance. However, the firm is responsible for providing proof of clearance before submitting a bid for the proposal. Further questions can be addressed to Specific questions can be addressed to the </span><a data-dcnode-id="495" href="mailto:deventsecurity@act.nato.int"><span data-dcnode-id="496" instrument_node="">SACT Security Officer</span></a><span data-dcnode-id="494" instrument_node="">.</span></p><p data-dcnode-id="488"><strong data-dcnode-id="489"><em data-dcnode-id="490"><a data-dcnode-id="491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%23top"><span data-dcnode-id="492" instrument_node="">Return to questions</span></a></em></strong></p><p data-dcnode-id="484"><strong data-dcnode-id="485"><a data-dcnode-id="487" name="7" title="7"></a><span data-dcnode-id="486" instrument_node="">Who should I use as a point of contact at NATO for discussion before and after submitting a proposal? To whom should I address questions about the project or the Statement of Work?</span></strong></p><p data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">The appropriate points of contact for any questions are included in the Request for Proposal.</span></p><p data-dcnode-id="477"><strong data-dcnode-id="478"><em data-dcnode-id="479"><a data-dcnode-id="480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%23top"><span data-dcnode-id="481" instrument_node="">Return to questions</span></a></em></strong></p><p data-dcnode-id="473"><strong data-dcnode-id="474"><a data-dcnode-id="476" name="8" title="8"></a><span data-dcnode-id="475" instrument_node="">Who else is bidding or submitting a proposal and what price(s) are they quoting?</span></strong></p><p data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">NATO reserves all information about potential bidders and current bidders as procurement sensitive. However, NATO Contracting Branch ensures maximum visibility to all nations regarding contract opportunities.</span></p><p data-dcnode-id="466"><strong data-dcnode-id="467"><em data-dcnode-id="468"><a data-dcnode-id="469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%23top"><span data-dcnode-id="470" instrument_node="">Return to questions</span></a></em></strong></p><p data-dcnode-id="462"><strong data-dcnode-id="463"><a data-dcnode-id="465" name="9" title="9"></a><span data-dcnode-id="464" instrument_node="">How do taxes and tax exemptions work?</span></strong></p><p data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">International agreements approved by NATO Nations ensure that NATO HQs are exempt from paying taxes and duties on commercially procured goods and services. Generally speaking, Purchasing &amp; Contracting branches can procure goods and services without paying taxes and duties or establish a procedure, under the guidance of the Financial Controller, to recuperate paid taxes or similar fees.</span></p><p data-dcnode-id="455"><strong data-dcnode-id="456"><em data-dcnode-id="457"><a data-dcnode-id="458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%23top"><span data-dcnode-id="459" instrument_node="">Return to questions</span></a></em></strong></p><p data-dcnode-id="451"><strong data-dcnode-id="452"><a data-dcnode-id="454" name="10" title="10"></a><span data-dcnode-id="453" instrument_node="">Will work on this project be tax exempt?</span></strong></p><p data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Because of a series of international agreements, NATO will not pay taxes for goods &amp; services that it procures or will recuperate the funds that it expends upon taxes with the guidance of the Financial Controller.</span></p><p data-dcnode-id="444"><strong data-dcnode-id="445"><em data-dcnode-id="446"><a data-dcnode-id="447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%23top"><span data-dcnode-id="448" instrument_node="">Return to questions</span></a></em></strong></p><p data-dcnode-id="440"><strong data-dcnode-id="441"><a data-dcnode-id="443" name="11" title="11"></a><span data-dcnode-id="442" instrument_node="">Can my proposal deviate from the RFP?</span></strong></p><p data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">A firm may submit an alternative proposal that deviates in part from the Statement of Work from the Request for Proposal IF AND ONLY IF it submits a compliant proposal in addition to the alternative proposal. Any deviations in the primary proposal will result in a detraction of points during the award process.</span></p><p data-dcnode-id="433"><strong data-dcnode-id="434"><em data-dcnode-id="435"><a data-dcnode-id="436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%23top"><span data-dcnode-id="437" instrument_node="">Return to questions</span></a></em></strong></p><p data-dcnode-id="429"><strong data-dcnode-id="430"><a data-dcnode-id="432" name="12" title="12"></a><span data-dcnode-id="431" instrument_node="">May my company submit more than one proposal?</span></strong></p><p data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">A bidding firm must submit a proposal that conforms to the Statement of Work for the Request for Proposal and may submit one or more alternative proposals in addition to the conforming proposal.</span></p><p data-dcnode-id="422"><strong data-dcnode-id="423"><em data-dcnode-id="424"><a data-dcnode-id="425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%23top"><span data-dcnode-id="426" instrument_node="">Return to questions</span></a></em></strong></p><p data-dcnode-id="418"><strong data-dcnode-id="419"><a data-dcnode-id="421" name="13" title="13"></a><span data-dcnode-id="420" instrument_node="">Does NATO prefer either small or large businesses in its proposal selection?</span></strong></p><p data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">NATO awards contracts upon technical merit and cost-effectiveness, choosing the lowest possible cost for the best possible technical product. It seeks the best and most cost-effective solution to problems, regardless of the size of the firm that offers it.</span></p><p data-dcnode-id="411"><strong data-dcnode-id="412"><em data-dcnode-id="413"><a data-dcnode-id="414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%23top"><span data-dcnode-id="415" instrument_node="">Return to questions</span></a></em></strong></p><p data-dcnode-id="407"><strong data-dcnode-id="408"><a data-dcnode-id="410" name="14" title="14"></a><span data-dcnode-id="409" instrument_node="">Is there a possibility that the award will be split (i.e. more than one contractor could receive a portion of the award)?</span></strong></p><p data-dcnode-id="404"><span data-dcnode-id="406" instrument_node="">The technical scoring system is deliberately designed with a very strong incentive to submit a proposal with the required number of people and the desired qualifications. However, it is possible that because of the necessary qualifications to complete the statement of work, NATO will approach bidding contractors in the order of their best value score to provide the proper work for the contract. E.g. the best value submission will be supplemented with the second-best best value submission first, then the third-best until all required personnel and/or resources are acquired.</span><strong data-dcnode-id="405"></strong></p><p data-dcnode-id="399"><strong data-dcnode-id="400"><em data-dcnode-id="401"><a data-dcnode-id="402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%23top"><span data-dcnode-id="403" instrument_node="">Return to questions</span></a></em></strong></p><p data-dcnode-id="395"><strong data-dcnode-id="396"><a data-dcnode-id="398" name="15" title="15"></a><span data-dcnode-id="397" instrument_node="">Are there any categories of firms to which NATO gives special treatment (i.e. registered small business or veteran owned firm)?</span></strong></p><p data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">&gt;All firms are given equal treatment before, during, and after the bidding process.</span></p><p data-dcnode-id="388"><strong data-dcnode-id="389"><em data-dcnode-id="390"><a data-dcnode-id="391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%23top"><span data-dcnode-id="392" instrument_node="">Return to questions</span></a></em></strong></p><p data-dcnode-id="384"><strong data-dcnode-id="385"><a data-dcnode-id="387" name="16" title="16"></a><span data-dcnode-id="386" instrument_node="">Does my business have to be from a NATO Nation in order to submit a proposal?</span></strong></p><p data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">NATO seeks business only from member nations. However, if no Member nation submits a proposal, then a nation from the Partnership for Peace may submit a proposal. But if a firm from a Partnership for Peace nation submits a bid that competes with a bid from a firm of a Member nation, then the bid of the firm from the Partnership for Peace nation must be declared noncompliant.</span></p><p data-dcnode-id="377"><strong data-dcnode-id="378"><em data-dcnode-id="379"><a data-dcnode-id="380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%23top"><span data-dcnode-id="381" instrument_node="">Return to questions</span></a></em></strong></p><p data-dcnode-id="373"><strong data-dcnode-id="374"><a data-dcnode-id="376" name="17" title="17"></a><span data-dcnode-id="375" instrument_node="">What is the international bidding process?</span></strong></p><p data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">NATO regulations require that Requests for Proposals that are predicted to exceed Established Financial Limits (For 2020, all proposals exceeding €152,000) must be posted as an international notification of intent to begin bidding procedures. However, firms from any Member nation may bid on any proposal open for competitive bidding.</span></p><p data-dcnode-id="366"><strong data-dcnode-id="367"><em data-dcnode-id="368"><a data-dcnode-id="369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%23top"><span data-dcnode-id="370" instrument_node="">Return to questions</span></a></em></strong></p><p data-dcnode-id="362"><strong data-dcnode-id="363"><a data-dcnode-id="365" name="18" title="18"></a><span data-dcnode-id="364" instrument_node="">My company is from overseas; can my company bid on an RFP that was not posted internationally?</span></strong></p><p data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">Any firms from any Member nation may bid on any proposal that is open for competitive bidding.</span></p><p data-dcnode-id="355"><strong data-dcnode-id="356"><em data-dcnode-id="357"><a data-dcnode-id="358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%23top"><span data-dcnode-id="359" instrument_node="">Return to questions</span></a></em></strong></p><p data-dcnode-id="351"><a data-dcnode-id="354" name="19" title="19"></a><strong data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">Must I have a Technical Assistance Agreement (TAA) to do business with NATO?</span></strong></p><p data-dcnode-id="347"><span data-dcnode-id="350" instrument_node="">The TAA is a national requirement therefore  NATO does not require a TAA. If the bidding company decides a TAA is necessary it must however include all NATO nations as well other countries that will require support. The TAA should be coordinated with HQ SACT prior to being send to the US Department of State for approval. </span><br data-dcnode-id="349"><span data-dcnode-id="348" instrument_node="">In addition to NATO nations ,NATO is currently providing assistance/training to NATO Partners of Peace nations and ISAF Contributing nations. In the future there is a possibility that assistance/training may be expanded to Mediterranean Dialogue countries depending on the NATO mission.</span></p><p data-dcnode-id="342"><strong data-dcnode-id="343"><em data-dcnode-id="344"><a data-dcnode-id="345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%23top"><span data-dcnode-id="346" instrument_node="">Return to questions</span></a></em></strong></p><p data-dcnode-id="338"><a data-dcnode-id="341" name="20" title="20"></a><strong data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">Can you provide additional information about visas for non-US contractor personnel from other NATO nations entering the US to perform contractual duties at HQ SACT or other locations within the US?</span></strong></p><p data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">The contracting company is responsible for coordinating and arranging work visas.  US authorities have historically issued NATO-5 visas to individuals who intend to or who are providing services in the capacity of a contractor to NATO HQ SACT or its subordinate entities, and their eligible dependents.  This is, however, at the discretion of US authorities and not within  this HQ’s authority to influence or control.</span></p><p data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">If a contract is awarded to a company requiring non-US personnel to enter the US to perform, the contracting company should immediately coordinate with US Consulate officials where its employee’s visa application will be submitted.  US Consulates historically have required an original letter on the contracting company’s letterhead requesting the visa(s), referring to the master contract awarded (and have on some occasions required a copy of the supporting HQ SACT approved contract); confirming the visa applicant’s employment with the company; duration of the contract; duration of anticipated work pursuant to the contract on the company’s behalf; position, title and brief description of duties; length of employment with company; names and status of accompanying dependents; and signed by a designated company representative.</span></p><p data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">If the contractor intends to employ non-US personnel who are already physically present in the United States, please provide that information to the designated HQ SACT Contracting Officer who will coordinate directly with representatives in the HQ SACT Office of the Legal Advisor, as the procedure varies for applications (for changes of visa status or renewals) submitted in the United States.</span></p><p data-dcnode-id="327"><strong data-dcnode-id="328"><em data-dcnode-id="329"><a data-dcnode-id="330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%23top"><span data-dcnode-id="331" instrument_node="">Return to questions</span></a></em></strong></p><p data-dcnode-id="323"><a data-dcnode-id="326" name="21" title="21"></a><strong data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">Are candidates holding H1B visas acceptable?</span></strong></p><p data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">HQ SACT has no view on which visas contractors use to work.  The company's obligation is to ensure the worker is present lawfully in the US and eligible to work, if presence is required in the US to perform the obligations of the contract.  NATO-5 visas are one way to comply with this requirement, but not the only way.</span></p><p data-dcnode-id="316"><strong data-dcnode-id="317"><em data-dcnode-id="318"><a data-dcnode-id="319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/~30555e09a8%23top"><span data-dcnode-id="320" instrument_node="">Return to questions</span></a></em></strong></p><span data-dcnode-id="315" instrument_node=""> </span></div><span data-dcnode-id="313" instrument_node="">
